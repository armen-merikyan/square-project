  <title id="title">Order vs Chaos</title>
  <desc id="desc">This composition explores the emotional tension between trust and suspicion through a split layout. The left half utilizes radial patterns in a calming pale blue, while the right unleashes chaotic grid patterns with jagged red accents against black. This interplay creates a sense of collision and contrast, embodying the pressure and release intrinsic to emotional conflicts. The palette balances calming tones with aggressive reds, portraying a push and pull within the emotional landscape.</desc>
