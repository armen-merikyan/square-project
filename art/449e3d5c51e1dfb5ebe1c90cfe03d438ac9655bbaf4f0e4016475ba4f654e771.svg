<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Discordant Harmony</title>
  <desc id="desc">This piece embodies the emotional tension between restlessness and peace, utilizing a palette that balances vibrant hues with muted tones. The pattern suggests upward momentum on one side, symbolizing restlessness, while the other side descends into calmness, reflecting peace. The collision of static and target patterns creates a visual interruption, while the shadowed edges and broken pixels introduce an element of chaos, enhancing the sense of emotional conflict. The dominant use of dark tones contrasted with hints of light exemplifies the struggle between light and dark, making the viewer sense both memory and motion.</desc>
