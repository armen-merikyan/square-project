<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tension</title>
  <desc id="desc">The artwork embodies the conflict between joy and grief through a palette of bright, warm hues (yellow, orange) juxtaposed with cooler, muted tones (deep blue, muted purple). The left side, representing joy, utilizes a broken dots pattern to introduce a lightness and rhythm, while the right side reflects grief with a crosshatch that conveys weight and tension. The jagged edges and irregular placements evoke a sense of chaos that contrasts sharply with moments of order found in the centered arrangements on the left. This contrast creates a zigzag flow that keeps the viewer engaged, illustrating the push and pull between contrasting emotions. Negative spaces are maintained to allow breaths amidst dense emotional clusters, emphasizing the alternating feelings of joy and grief throughout the composition.</desc>
