<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Symmetry</title>
  <desc id="desc">This piece captures the emotional interplay between longing and resolve. The palette of soft powder pink, warm white, and severe carbon black promotes a balance between tenderness and strength. The significant contrast lies in the center, where a dense cluster of carbon black backgrounds sharp crimson accents that symbolize the tension between desire and certainty. The maze-like pattern inspired by longing collides with the ash field of resolve, manifesting as a fractured symmetry at the corners, denoting a delicate balance between chaos and order, reflecting the central theme of the seed: the conflict of feelings that shape our experiences.</desc>
