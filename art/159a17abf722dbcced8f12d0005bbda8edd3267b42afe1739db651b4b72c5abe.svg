<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Boundaries</title>
  <desc id="desc">The emotional tone captures a struggle between defiance and submission, represented through color contrasts. The palette of black, dark violet, soft gold, and pale green signifies tension, hope, and underlying weight. The alternating patterns of 'checker' for defiance and 'teeth' for submission create a visual conflict, with the upper rows designed to feel dense and assertive while the bottom rows offer more broken, scatter-like quality. The main collision happens between the evenly distributed chaos of the darker tones and the warm gold and pale green that interject into the more subdued sections, creating a shift from calm to pressure.</desc>
