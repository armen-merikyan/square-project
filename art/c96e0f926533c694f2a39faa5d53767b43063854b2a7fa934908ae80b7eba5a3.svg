<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork embodies the emotional tension between vulnerability and strength. The soft mint and faded gold represent vulnerability, while the storm gray and near black signify strength. The composition creates a pressure in one corner to depict a flood against a stack and creates visible echoes of interruptions with the variable patterns of dots and targets. The arrangement of colors suggests a retreat from the emotional edge into the center, reflecting both protection and exposure. The conflict is pronounced around the top-weighted edge, leading to a dense, enriched area contrasted by quieter spaces.</desc>
