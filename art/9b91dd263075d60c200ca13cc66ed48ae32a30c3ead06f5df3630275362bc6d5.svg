<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Tension</title>
  <desc id="desc">This artwork conveys the emotional tug-of-war between restlessness and peace. The palette of sepia, tan, dust gray, and faded blue evokes nostalgia while maintaining a quiet field. The pattern of crosshatch, representing restlessness, collides with the threaded calm of peace, primarily located in the lower left, giving a sense of pressure releasing towards the edge. The edge style has eroded elements, suggesting wear and vulnerability, while allowing light and dark tones to interplay, similar to memories that fade or intensify. Overall, this piece navigates through the complexities of emotional dynamics using color and form without literal representation.</desc>
