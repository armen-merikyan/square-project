<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Tensions</title>
  <desc id="desc">The artwork captures the emotional interplay between vulnerability and strength through dense, layered patterns and contrasting colors. The palette reflects awe and terror, utilizing deep teals as a grounded base while cold gold and cosmic indigo punctuate the composition with bursts of intensity. The main collision occurs in the center, where structured spark patterns clash against the soft stair patterns at the edges, suggesting the conflict between heavy weight and fragile beauty. The use of broken pixels symbolizes imperfections in the narrative, while negative space invites introspection.</desc>
