<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">The emotional tone explores the contrast between peace and restlessness, depicted through a zigzag flow that merges warm and cool colors. The palette features vibrant accents of electric blue and hot magenta against muted shades of signal green and static gray. Dark broken pixels emphasize disruption amidst a base of quiet fields, suggesting memories in motion. The main collision occurs diagonally, where patterns of thread-like restlessness intersect with the tranquility of split-screen peace, echoing the imbalance and interplay of these emotional states.</desc>
