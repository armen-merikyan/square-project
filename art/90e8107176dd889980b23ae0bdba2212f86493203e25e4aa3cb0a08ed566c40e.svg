<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This composition explores the duality of envy and gratitude, reflected through the opposing forces of dark and light. The chosen 'ancient_fire' palette emphasizes warm tones of burnt orange and gold against the starkness of dark reds and charcoals, symbolizing heaviness versus upliftment. The layout follows a 'rising_signal' pattern, where pixels ascend to suggest hope in contrast with the depth of dark colors below. The pattern is structured with soft edges to echo gentle emotions, while incorporating broken pixels to reveal imperfections, mirroring the conflict between positivity and negativity. The main contrast occurs along the center, where bright colors clash against muted, heavy shades, creating a dialogue between feelings of aspiration and burden.</desc>
