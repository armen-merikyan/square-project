<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Pulse</title>
  <desc id="desc">The emotional tone is a struggle between clarity and chaos, symbolizing the 'signal vs noise' conflict through a dominant dark base that represents 'noise' with scattered moments of bright color as a 'signal'. The palette features a dark navy to establish depth contrasted with single accents of bright white and dim cyan that create 'lit edges' and sparks amidst the noise. The collision is centered, where compact segments of bright colors erupt from a cloudy background. Drawing from the seeds, the design represents the memory of clarity surrounded by surrounding distortions, echoing the struggle between retention and erasure in our experiences.</desc>
