<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">This artwork captures the emotional tension of desire vs restraint through vibrant and muted colors. The palette blends hot coral and blood orange representing desire with dust pink and charcoal for restraint, creating a collision of warm and cool tones. The main contrast emerges in the center where the saturated warm colors passionately encroach upon the quieter muted edges, reflecting a struggle between the two emotional states. The layout of a dense center, symbolizing desire, against an outer field of calmer hues embodies the interplay of pressure and release, echoing the seed's themes without literal representation.</desc>
