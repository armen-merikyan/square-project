<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition captures the emotional tension between 'emptiness' and 'desire'. The palette of hot coral and blood orange embodies desire's warmth, while charcoal and hollow blue represent the void of emptiness. The dynamic flow features a diagonal spread from the corner, showcasing desire that clashes and collides with restraint. The pattern mimics a veiled movement, creating a pulsating rhythm. The use of broken pixels introduces intentional imperfections, emphasizing the struggle within.</desc>
