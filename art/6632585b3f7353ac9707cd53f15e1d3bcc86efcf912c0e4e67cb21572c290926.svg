<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone reflects a struggle between warmth and coldness, symbolizing love and betrayal. The palette of pink and red suggests warmth and passion, contrasted with gray and dark maroon representing heartache and chaos. The pattern is set diagonally to illustrate rising signals of love clashing against the chaotic backdrop of betrayal, creating a sense of collision. The layout deliberately leaves negative space to enhance the feeling of fracture and reflection. The arrangement showcases moments of intensity next to areas of calm, embodying the push and pull of complex relationships.</desc>
