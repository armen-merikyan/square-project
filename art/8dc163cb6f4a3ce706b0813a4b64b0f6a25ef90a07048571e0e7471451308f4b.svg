<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Emotion</title>
  <desc id="desc">This piece explores the emotional tension between dread and relief through contrasting colors and patterns. The palette of navy and black symbolizes depth and oppression, while dim cyan introduces pockets of brightness, representing moments of relief. The layout captures the idea of weight, with darker colors dominating the outer edges, while lighter shades ripple within, suggesting an empty room filled with unspoken tension. The ring and spark patterns create a rhythmic interplay, evoking both calm and chaos.</desc>
