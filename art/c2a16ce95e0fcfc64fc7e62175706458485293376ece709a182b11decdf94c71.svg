  <title id="title">Symmetric Tensions</title>
  <desc id="desc">This composition explores the emotional tension between envy and gratitude through contrasting colors and patterns. The selected palette of deep black, pale blue, white, and red evoke rage and calm simultaneously. The dense arrangement on the left side represents envy, while lighter tones on the right depict gratitude, creating visual tension. Broken pixels enhance the feeling of imperfection and distortion, as if a mirror is reflecting a fractured self. The zigzag flow brings a sense of motion across the canvas, while maintaining negative space to prevent overpowering chaos.</desc>
