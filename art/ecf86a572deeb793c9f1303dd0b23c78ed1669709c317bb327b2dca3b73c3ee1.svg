<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This piece embodies the emotional duality of softness and severity through careful color selection and contrast. The palette balances the softness of powder pink and warm white against the severity of carbon black and steel gray, establishing a tension that invites contemplation. The composition favors density on the left side, using darker tones to create a heavy, oppressive feeling, while the right side introduces lighter hues that suggest an opening or release. The use of broken pixels acts as intentional disruptions, echoing feelings of guilt juxtaposed with forgiveness, creating a sense of unresolved tension. The spiraling pattern suggests a psychological journey, with the main collision of dark and light elements occurring at the central threshold, inviting the viewer to explore the transition between these emotional states.</desc>
