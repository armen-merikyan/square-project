<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Desire</title>
  <desc id="desc">The emotional tone reflects a tension between emptiness and desire. The palette combines warm yellows and oranges symbolizing desire, juxtaposed with deep blues and muted purples representing emptiness. The split layout allows for a distinct contrast: the top half bursts with warmth and intensity while the bottom settles into cool, subdued tones. The collision occurs where the colors transition, echoing the internal struggle. Broken pixels disrupt the uniformity, echoing the imperfections of desire meeting the void. The result is an 8x8 square that embodies a narrative of longing, interrupted by quiet shadows.</desc>
