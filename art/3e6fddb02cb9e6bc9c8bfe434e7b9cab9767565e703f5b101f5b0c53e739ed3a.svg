<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Within Static</title>
  <desc id="desc">The emotional tone emphasizes the struggle between clarity (signal) and confusion (noise). The selected palette uses deep navy and black as a foundational grounding, with touches of dim cyan and stark white to create contrast, suggesting tension between visible signals against overwhelming noise. The main collision happens in the center, where the signal pulse emerges amidst a static grid pattern, disrupted by broken pixels. This arrangement symbolizes the persistence of clarity in a distracting environment, embodying the essence of 'signal versus noise'.</desc>
