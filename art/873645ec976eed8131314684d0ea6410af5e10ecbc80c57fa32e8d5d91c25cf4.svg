<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Forces</title>
  <desc id="desc">This composition embodies the emotional tension of defiance versus submission with a split horizontal layout. The top half represents defiance through aggressive dark reds and burnt oranges in a barcode pattern, suggesting upward motion and resistance. The bottom half symbolizes submission using soft echoes of charcoal and muted gold colors, evoking a sense of receding and enclosure. The central collision area utilizes overlapping patterns that interrupt the flow, maintaining a dynamic contrast between the two emotions. Broken pixels create intentional disruptions, enhancing the feeling of conflict woven throughout the piece.</desc>
