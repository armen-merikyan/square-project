<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Split</title>
  <desc id="desc">This piece explores the emotional tension between joy and grief, using a divided composition to reflect the clash of these feelings. The left side employs a warm palette (yellows and oranges) to radiate joy and openness, while the right incorporates cooler tones (deep blues and muted purples) to evoke a sense of heaviness and fragmentation associated with grief. The central area acts as the transition point, symbolizing the ongoing push and pull of these emotions. Hard edges create a stark contrast, accentuating the split-screen effect. Broken pixels introduce imperfection, resonating with the idea of chaotic blends amid structured patterns. The alternate patterns—crosshatch for joy and grid for grief—illustrate the clash of order and chaos, embodying the essence of human emotion. Each pixel's placement reflects a careful orchestration of emotional density against moments of quiet, leaving room for interpretation while maintaining a balance between the two moods.</desc>
