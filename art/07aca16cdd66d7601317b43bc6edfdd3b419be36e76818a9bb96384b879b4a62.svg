  <title id="title">Contrast of Shadows</title>
  <desc id="desc">The emotional tone is one of struggle, capturing the tension between lightness and heaviness. The chosen palette of sepia, tan, dust gray, and faded blue reflects both nostalgia and muted energy. The contrast of bright dots against dark, dense areas embodies the interaction between gratitude and envy, suggesting moments of clarity amidst overshadowing emotions. The zigzag pattern fluctuates between calm and turmoil, creating a visual echo of the conflict expressed in the seed, with an intentional break in the composition to maintain negative space.</desc>
