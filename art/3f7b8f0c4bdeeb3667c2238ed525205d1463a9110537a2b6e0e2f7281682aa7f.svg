<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Echo</title>
  <desc id="desc">This artwork conveys the emotional tension between structured signals and chaotic noise. The palette of deep navy and dim cyan serves to symbolize memory and shelter, while the black represents the engulfing noise. The organized grid pattern contrasts sharply against glitch-like interruptions, echoing the concept of a pulse trying to survive amidst interference. The primary collision occurs in the center where bright accents of white disrupt the darker fields, signifying the struggle of clarity in static. The arrangement reflects an inherent push and pull between quiet moments and intense pressure, evoking a complex emotional landscape.</desc>
