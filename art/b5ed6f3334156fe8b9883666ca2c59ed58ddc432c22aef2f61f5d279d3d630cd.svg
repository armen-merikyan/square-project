<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dichotomy of Emotion</title>
  <desc id="desc">This artwork explores the tension between joy and grief through a deliberate color split. The palette features warm yellows and oranges symbolizing joy, contrasted against deep blues and muted purples representing grief. The layout flows from bottom to top, with ascending warmth on one side and descending coolness on the other, evoking a feeling of conflict and collision. The jagged edges introduce a sense of instability, mirroring emotional turmoil. The arrangement creates a stair-step pattern, adding to the contrast as bright pixels interrupt the darker hues, emphasizing the unpredictable nature of human emotion.</desc>
