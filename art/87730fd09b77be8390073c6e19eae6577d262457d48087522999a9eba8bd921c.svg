<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Crosshatch</title>
  <desc id="desc">This artwork captures the tension between loneliness and connection through the use of a limited palette. Black and dark violet convey isolation, while soft gold introduces warmth and connection. The arrangement creates a rhythm where the darker colors dominate the upper half, suggesting a feeling of weight and pressure, while the lighter golds burst through, creating moments of hope. The random broken pixels evoke unpredictability within a structured grid, advancing the contrast between hidden versus exposed emotions. The piece reflects the clash and interplay of feeling lost yet yearning for connection, crafting an abstract narrative without literal forms.</desc>
