<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This piece embodies the emotional tension between relief and dread, contrasting light against a dark mass. The color palette of vibrant yellows and oranges against muted purples and deep blues reflects this dynamic, emphasizing the struggle between brightness (relief) and weight (dread). The layout adopts a central seed surrounded by pressure patterns to evoke a small symbol battling against oppressive darkness. Broken pixels introduce imperfection, enhancing the emotional resonance of the piece. The flow from top to bottom mirrors the descent of pressure, while maintaining at least 10% negative space to signify quiet amidst chaos.</desc>
