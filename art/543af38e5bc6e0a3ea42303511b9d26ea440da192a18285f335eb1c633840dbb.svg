<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emptive Contrast</title>
  <desc id="desc">The emotional tone captures the tension between desire and restraint, expressed through a dynamic palette that leans into saturation and muted tones. The bright coral and blood orange evoke a sense of heat and urgency, while charcoal and hollow blue introduce a cool containment. This pattern emerges through a central collision at the corner where warm colors overflow, symbolizing desire, against the muted static marks that represent restraint, illustrating a powerful push and pull. The careful placement of colors creates echoes of interaction and interruption, emphasizing the complexity of the emotional landscape.</desc>
