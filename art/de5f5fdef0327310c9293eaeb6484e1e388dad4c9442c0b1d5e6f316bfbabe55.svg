<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Hearts</title>
  <desc id="desc">This artwork captures the emotional spectrum of love and betrayal through a striking contrast of warm and cool tones. The palette reflects love with vivid pinks and reds, while dark maroon and grays symbolize betrayal and chaos. The left half embodies love's warmth, structured around framed patterns, while the right half represents betrayal's coldness, arranged in rings. The deliberate 'crack' across the central axis visually and emotionally interrupts, creating a tension that speaks to the complexities of relationships. Each pixel holds a narrative of density versus emptiness, echoing the themes of rise and fall, leaving a substantial negative space to evoke calm amidst the chaos.</desc>
