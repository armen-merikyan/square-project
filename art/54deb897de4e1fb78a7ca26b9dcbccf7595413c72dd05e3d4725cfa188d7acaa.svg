<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Echoes</title>
  <desc id="desc">The emotional tone captures the tension between love and betrayal, using warm colors like pink and red to signify love, contrasted by darker shades signaling betrayal. This creates an emotional collision in the center, where the warm colors collide with deeper tones, suggesting the struggle between unity and division. The pattern employs a crack and frame design, presenting an inner space that feels both inviting and isolating, embodying the concepts of inside versus outside while maintaining necessary negative space to evoke loneliness and reflection. The edges are intentionally imperfect, enhancing the sense of loss and fragmentation without depicting literal shapes.</desc>
