<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition captures the tension between desire and emptiness using a palette that contrasts warm saturated hues with deep, cool colors. The heavy borders represent restraint, while the bright accentspeek through as signals of longing. The layout merges flowing patterns of desire with abrupt, structured edges of emptiness, echoing a dynamic between push and pull. The 'broken_frame' idea shapes the abstract narrative where the 'beacon' suggests a urge towards light, even constrained by surrounding voids. The emotional interplay is visually represented through the arrangement of colors, creating an aesthetic experience of both longing and confinement.</desc>
