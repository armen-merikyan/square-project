<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This composition embodies the emotional tension between restlessness and peace, where warmer hues symbolize action and unease while cooler tones suggest tranquility and stability. I've used a palette that includes hot coral and blood orange on the edges to represent restlessness, contrasting with the just-off-white dust pink in the center, signifying peace. The main collision occurs where these colors intersect, creating a dynamic visual field that captures the essence of movement against stability. The patterns reflect textured disruptions indicative of memory and moments of pause, embodying the abstract narrative inherent in the seed.</desc>
