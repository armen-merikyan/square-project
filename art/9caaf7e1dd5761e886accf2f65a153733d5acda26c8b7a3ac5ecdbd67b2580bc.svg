<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This artwork captures the tension between joy and grief through a stark contrast of color and pattern. The palette includes bright yellows and oranges to represent joy, clashing with deep blues and muted purples to evoke grief. The layout follows a diagonal split, with the left side exhibiting ordered, repeating light patterns symbolizing joy, and the right contrasting with chaotic noise patterns, representing grief. This split screen creates an emotional wave that ebbs from bright to dark, illustrating the interplay between feeling safe and threatened.</desc>
