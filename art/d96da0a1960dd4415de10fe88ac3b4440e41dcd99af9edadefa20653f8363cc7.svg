<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust</title>
  <desc id="desc">This artwork embodies the tension between trust and suspicion through contrasting patterns of color. The palette merges shades of pale aqua and ink blue to create a serene base, punctuated by alarm red, representing bursts of suspicion. The quiet fields of color juxtapose with the barcoded interruptions, creating visual fragmentation that echoes the emotional dichotomy of reliability versus doubt. The collision shifts diagonally, suggesting a fall from stability towards an uncertain depth, made vibrant through strategic broken pixels that symbolize disruptions in perception.</desc>
