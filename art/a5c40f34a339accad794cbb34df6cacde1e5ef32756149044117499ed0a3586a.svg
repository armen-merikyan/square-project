<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Hearts</title>
  <desc id="desc">The artwork embodies the emotional tension between love and betrayal. The chosen palette features warm tones of pink and red on one side, symbolizing love, contrasted with cold grays and dark maroon tones depicting betrayal. This juxtaposition is designed to create a sense of unresolved tension, with the left side depicting radial patterns of warmth and connection, while the right features a dotted, broken texture representing disconnection. The vertical split layout effectively highlights the contrast, inviting the viewer to explore the collision of emotions, while the imperfection introduced by broken pixels adds a layer of vulnerability. Overall, the composition tells the story of a heart caught between joy and pain, where harmony and discord coexist.</desc>
