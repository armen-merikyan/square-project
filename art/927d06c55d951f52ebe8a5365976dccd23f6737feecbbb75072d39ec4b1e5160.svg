<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Volley of Emotions</title>
  <desc id="desc">This piece captures the tension between rage and calm. The palette juxtaposes warm reds against cool blues and blacks, symbolizing the struggle between overwhelming emotions and the desire for serenity. The layout allows for a split in patterns—split-screen for rage conveys sharp interruptions, while the ladder pattern for calm introduces quiet, rhythmic spacing. The broken pixels disrupt the flow, embodying the chaos of emotions colliding at the center, where the dominant red tones threaten to overflow into the cooler areas, suggesting a perpetual battle between these contrasts.</desc>
