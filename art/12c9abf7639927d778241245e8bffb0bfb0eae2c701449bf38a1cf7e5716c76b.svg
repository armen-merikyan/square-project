<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Weight</title>
  <desc id="desc">This piece captures the emotional tension of fear and hope, using a palette that juxtaposes dark tones with soft, glowing accents to represent contrasting emotions. The main collision occurs at the central vertical line, where dark, jagged colors clash with lighter hues, creating a split between anxiety and a hopeful glow. The broken pixels introduce imperfection, reflecting the chaos in the struggle between these emotions. The abstract pattern takes form from the idea of a diamond, symbolizing the multifaceted nature of fear and hope, while maintaining a negative space that represents moments of introspection.</desc>
