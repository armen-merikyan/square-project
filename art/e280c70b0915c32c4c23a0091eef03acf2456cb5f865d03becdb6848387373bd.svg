<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Control and Chaos</title>
  <desc id="desc">This artwork explores the emotional clash of 'panic' against 'control.' The chosen palette of faded blue, sepia, tan, and dust gray conjures a sense of broken memories, emphasizing the fragility of calm against chaos. The top four rows, influenced by panic, use dot patterns, merging soft shapes that collide against the harder, structured split screen of the control-driven bottom rows. The contrast occurs where darker, denser colors interrupt lighter hues, creating a visual tension echoing the themes of moving inwards from chaos to structure. Broken pixels throughout signify imperfection and the inevitable chaos of life, allowing fragments of light to peek through in the edges, maintaining a sense of unease amid order.</desc>
