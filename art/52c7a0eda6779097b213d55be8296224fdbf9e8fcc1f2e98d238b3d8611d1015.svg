<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Forms</title>
  <desc id="desc">This piece captures the tension between relief and dread through an interplay of dark and light colors. The dominant dark tones (#111111, #222222, #333333) represent chaos and dread, pressing from the edges. In contrast, the lighter shades (#A8E6CE, #FFCCBC, #FFD54F) symbolize moments of relief that break through the heaviness. An asymmetric arrangement creates interruptions, leading to a sense of movement where relief tries to reclaim space within a chaotic frame. The 'arrow' shape seed is abstractly suggested through the directional flow of colors, guiding the viewer's eye and representing the struggle between opposing emotions.</desc>
