<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Silent Tension</title>
  <desc id="desc">This artwork explores the emotional dichotomy between defiance and submission. The colors from the 'serenity_urgency' palette reflect this tension, where the vivid alarm red and clear white serve as accents amidst the subdued mist gray and pale aqua backgrounds. The center of the square is dominated by the bright tones representing defiance, while the edges yield to the quieter hues, creating a gradient of emotional pressure. The collision occurs in the center, where the angular resistance of sharp patterns intersects with the soft backgrounds of gradual noise, embodying the conflict between assertive defiance and enveloping submission. Broken pixels introduce an element of imperfection, echoing the ongoing struggle between these opposing emotional forces.</desc>
