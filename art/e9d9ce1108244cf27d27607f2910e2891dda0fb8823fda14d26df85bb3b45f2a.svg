<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Opposition</title>
  <desc id="desc">This artwork captures the emotional struggle between aspirations (spark) and limitations (ash). The color palette blends warm yellows and oranges to signify energy, with deep blues and muted purples representing restraint and introspection. The dominant spark hues collide with the ashen tones, rooted in a diagonal argument that suggests conflict. The use of lighter colors predominantly on one side evokes hope transitioning into quiet acceptance, while jagged edges introduce a sense of unresolved tension. The mirroring and striped patterns further articulate this push and pull, reinforcing the artwork's narrative of resilience amidst fragility.</desc>
