<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">The emotional tone of the artwork reflects the tension between joy and grief. The upper half embodies joy with rounded, luminous dots of warm yellows and oranges, conveying a sense of lightness and vibrancy. Meanwhile, the lower half portrays grief through a grid pattern of deep blues and muted purples, presenting a more somber and fragmented feeling. The contrast arises where the warm top collides with the cooler, structured bottom, hinting at a narrative of fluctuating emotional states amid chaos and order. The use of broken pixels introduces imperfection, making the piece feel more organic, aligning with themes of hidden versus exposed feelings, and the struggle between order and chaos. Negative space is respected, creating breathing room amidst the density.</desc>
