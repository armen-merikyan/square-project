  <title id="title">Echoes of Safety</title>
  <desc id="desc">This artwork captures the tension between safety and exposure through a split vertical layout, representing a clash of gentle, soft colors and sharp contrasts. The palette of shelter green and warm brown suggests protection while pale skin and cold white embody vulnerability. The main collision occurs in the center, where soft barriers clash with exposed edges, creating emotional resonance. Broken pixels disrupt patterns, symbolizing moments of uncertainty amidst the flow of vertical waves.</desc>
