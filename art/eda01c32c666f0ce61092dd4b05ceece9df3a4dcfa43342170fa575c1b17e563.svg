<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threads of Contrast</title>
  <desc id="desc">This artwork embodies the emotional tension between longing and resolve. The palette, featuring moss green and bone white as dominant colors, evokes a sense of organic warmth while introducing rust and stone gray for depth and grounding. The central area is filled with intertwined, scar-like patterns representing firmness and boundaries, dictated by the 'resolve' emotion, while the open spaces around represent the 'longing'—an expansive quiet that invites reflection. The interaction between threaded lines and scar patterns creates an emotional collision that signifies unresolved feelings. Broken pixels are strategically placed within this composition to introduce intentional disruptions—echoing the core theme of repair versus damage. The zigzag flow guides the viewer's eyes through the piece, illustrating a journey between serenity and urgency. Overall, the arrangement orchestrates a balance of density and negative space, encapsulating the complexity of layered emotions.</desc>
