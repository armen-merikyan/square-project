<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fire and Silence</title>
  <desc id="desc">The emotional tone explores the contrast between vibrant energy and muted aftermath. The chosen palette of navy, black, dim cyan, and soft whites highlights the tension between the spark of life and the stillness of ash. The predominant black and navy in the outer rows represent the engulfing silence of restraint, while the inner rows echo the joyful bursts of spark through scattered lighter tones. The diagonal arrangement creates movement, as if energy flows through jagged edges towards stillness while maintaining a sense of chaos - mirroring the push and pull of the conflicting feelings represented by the seed.</desc>
