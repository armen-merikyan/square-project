<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">The emotional tone is caught in the struggle between panic and control, with a focus on jagged edges representing emotional volatility. The palette, reminiscent of ancient fire, utilizes burnt orange and dark red to evoke feelings of urgency and intensity, contrasted with deeper charcoals that signify control and stability. The arrangement creates a stark collision between dense clusters of warm colors, representing panic, set against cooler, more subdued tones that suggest control. The pattern emerges as a chaotic interaction, mirroring the way control can fray in moments of crisis.</desc>
