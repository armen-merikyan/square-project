<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Transition</title>
  <desc id="desc">The composition explores the emotional tug-of-war between nostalgia and progress, portrayed through dense and empty spaces. The chosen palette of burnt orange, dark red, charcoal, and gold evokes warmth and intensity, contrasting with the quiet emptiness suggesting nostalgia's grounding pull. The split horizontal layout creates tension through verticality, where the top reflects progress with a crack-like texture while the bottom showcases a noise pattern. This collision symbolizes the weight of nostalgia battling against the forward push of modernity, interrupted occasionally by jagged edges representing imperfection.</desc>
