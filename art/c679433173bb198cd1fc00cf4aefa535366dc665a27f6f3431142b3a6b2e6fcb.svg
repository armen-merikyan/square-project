  <title id="title">Tension of Interplay</title>
  <desc id="desc">The artwork captures the emotional interplay of desire and restraint through a bold juxtaposition of saturated colors against muted tones. The palette of red oxide and muted cream reflects the heat of longing tempered by cool gray restraint. The main collision occurs at the center, where bright colors push toward negative space, dramatizing the theme of overflow versus containment. The layout emulates two pulsating centers, marking the conflict between desire and restraint.</desc>
