<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience in Fragments</title>
  <desc id="desc">The emotional tone reflects the tension between spontaneity and stoicism, with a palette that contrasts warm and cool tones to symbolize conflict. The warm shadow nuances represent 'ash,' invoking feelings of decay and settlement, while lamp gold signifies 'spark,' suggesting moments of life and brightness. The collision occurs diagonally across the grid, where the orderly dots of 'ash' meet the fragmented targets of 'spark,' embodying the chaotic yet beautiful struggle between these forces. The pattern, using a scattered repair layout, mirrors the disruption of memory and the emergence of new resilience against the backdrop of erasure.</desc>
