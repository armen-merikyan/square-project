<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Core Tensions</title>
  <desc id="desc">The artwork captures the emotional dichotomy of defiance and submission through a vivid contrast of color and placement. The chosen palette of ripe green, acid green, honey gold, deep olive, and cream suggests both vitality and a sense of overwhelming envy, creating an effect of tension swirling around a serene core. Contrasts between the braiding 'defiance' pattern and the starry 'submission' pattern generate dynamic collisions in the center, where the colors evoke a struggle. Negative space emphasizes the core while maintaining an atmosphere of unresolved complexity. Broken pixels introduce intentional disruptions, reinforcing the theme of conflict within structural beauty.</desc>
