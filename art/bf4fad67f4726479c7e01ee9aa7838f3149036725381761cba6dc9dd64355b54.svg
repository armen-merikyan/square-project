<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Echoes</title>
  <desc id="desc">The emotional tone captures the clash between defiance and submission through contrasting patterns—grid-like dominance of defiance above and flowing, thread-like submission below. The palette of muted colors juxtaposes the intensity of blackened plum with the subtlety of muted cream, suggesting the conflict of sharp edges against softer boundaries. The collision occurs in the center where hard interruptions from the top merge with wispy threads below, symbolizing the intertwining of strength and vulnerability throughout the artwork.</desc>
