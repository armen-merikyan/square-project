<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Shelter</title>
  <desc id="desc">This piece captures the emotional duality of safety and exposure, represented through a contrasting color palette that balances soft browns and greens with vibrant touches of pale skin and open blue. The central density hints at an inner vulnerability, while the edges maintain a thin but present barrier, creating a sense of tension and letting the viewer feel both safety and exposure simultaneously. The layout allows for a collision at the center, where the warm brown dominates, reflecting a protective core amidst a lattice of other colors. Broken pixels disrupt the continuity, adding intentional imperfections that echo the complexities of navigating safety and exposure.</desc>
