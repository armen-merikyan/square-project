<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Friction of Forces</title>
  <desc id="desc">This composition captures the emotional tension between vulnerability and strength through a deliberate imbalance of colors and patterns. The palette's muted greens and grays reflect the calm before a storm, while the more vibrant accents signify moments of conflict and pressure. The main collision occurs at the center, where densely packed crosshatching of storm gray meets the softer, more disarrayed noise pattern of pale mint, symbolizing the battle between stable strength and exposed vulnerability. The broken frame style introduces intentional disruptions, echoing the theme of flood against stack, suggesting that emotions can leak and break free. Negative space is managed carefully to allow glimpses of calm amidst chaos, reinforcing the story of resilience in fragility.</desc>
