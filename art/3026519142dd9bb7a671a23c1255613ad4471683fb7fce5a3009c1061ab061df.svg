<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Reflections</title>
  <desc id="desc">This square embodies the emotional dichotomy of longing and resolve through the use of contrasting colors and patterns. Dark colors represent the deep yearning and unresolved aspects, while bright accents punctuate these with clarity and determination. The arrangement combines rippling waves of desire into the crisp, glitch-like interruptions of resolution. The main collision occurs at the center, where the tension is strongest, creating a dynamic yet contained visual narrative. The palette's mix of cool and warm tones highlights the emotional push and pull, enhancing both the brokenness and the strength inherent in the seed's themes.</desc>
