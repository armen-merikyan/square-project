<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Spectrum of Emotion</title>
  <desc id="desc">This piece visually encapsulates the emotional tension between joy and grief. The palette, featuring warm yellows and oranges juxtaposed with deeper blues and muted purples, mirrors the vibrancy of joy clashing with the sorrow of grief. The top half showcases a structured pattern resembling 'spark' to represent joy, employing bright colors that radiate and expand, while the bottom half displays a fragmented 'frame' pattern in cooler tones indicative of grief. The transition from structured to chaotic across the rows illustrates the constant interplay between these emotions, and is highlighted by the burned edges—implying that while joy often shines, grief can leave behind traces of profound impact. Broken pixels add imperfection to the piece, reinforcing the complexity of human emotions. The negative space is maintained to allow an echo of both emotional states, creating a balanced composition despite the visual tension.</desc>
