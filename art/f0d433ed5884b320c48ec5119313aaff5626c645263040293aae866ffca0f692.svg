  <title id="title">Tension of Duality</title>
  <desc id="desc">This artwork embodies the dichotomy of 'relief vs dread' through a vertical division where the left side uses lighter, softer tones (sepia and tan) to evoke a sense of calmness representing relief, while the right side adopts darker, heavier shades (dust gray and faded blue) to reflect dread. The checker pattern on the left juxtaposes with stripes on the right, creating visual tension. The use of broken edges and occasional pixel imperfections underscores the theme of conflict, with the lighter colors feeling 'faded' against the solid darkness, mirroring the struggle between opposing emotions. Negative space is employed strategically throughout to enhance the feeling of emptiness and unease while maintaining balance.</desc>
