<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Realities</title>
  <desc id="desc">This artwork explores the emotional dichotomy of vulnerability and strength through contrasting palettes and patterns. The chosen colors—black for depth, dark violet for warmth, soft gold for light, and pale green for soft contrasts—create a visual narrative that speaks to the struggle between force and fragility. The central area, dominated by a flood pattern in dark violet, represents vulnerability, while the crisp, barcode-like structure in soft gold signals strength. The soft edges provide a transition zone, capturing the dynamic tension of the emotional themes. The use of broken pixels enhances the sense of imperfection and fragility, compelling the viewer to engage with the layers of meaning and emotional depth.</desc>
