  <title id="title">Rise vs Fall</title>
  <desc id="desc">This piece embodies the emotional tension between joy and grief, with the top half filled with bright yellows and oranges representing joy, while the bottom half uses muted blues and purples to reflect grief. The grid pattern in the upper section contrasts with the radial pattern below, creating a visual collision as color hues shift from vibrant to subdued. Negative space allows the viewer moments of reflection, with the thin outline creating a separation that highlights the duality of the emotions represented.</desc>
