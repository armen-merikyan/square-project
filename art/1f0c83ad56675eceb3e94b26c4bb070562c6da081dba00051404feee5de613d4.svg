<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Last Light Amidst Ash</title>
  <desc id="desc">The artwork encapsulates the tension between vitality and decay, represented by the juxtaposition of bright warm accents (faded gold) against muted cooler shades (storm gray). The diagonal flow introduces motion, while the center is dominated by the warmth of spark, mimicking a flicker of life in a vast sea of ash. This balance exemplifies the emotional conflict reflected in the seed text, suggesting resilience emerging amidst fragility. The ripple pattern lends softness to the ash, while the ladder pattern disrupts that softness, symbolizing a yearning struggle against restraint and the memory of loss.</desc>
