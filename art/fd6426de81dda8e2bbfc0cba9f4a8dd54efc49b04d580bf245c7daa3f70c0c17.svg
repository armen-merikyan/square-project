<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotion Collision</title>
  <desc id="desc">This composition explores the tension between vulnerability and strength through a dynamic interplay of colors. The burnt orange and dark red evoke feelings of strength and intensity, while the softer charcoal and gold elements speak to vulnerability and exposure. The palette draws from ancient fire, suggesting both warmth and danger. Main contrasts are found at the center, where stronger colors collide with lighter tones, creating an echo of conflicting emotions. The edge style conveys both stability and fragility, embodying the musical qualities of rising signals and floods against sparks.</desc>
