<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Duality</title>
  <desc id="desc">This piece explores the emotional tension between love and betrayal through contrasting colors and patterns. The palette of warm pinks and reds juxtaposed with deep gray and dark maroon evokes conflicting feelings, where love emerges as warmth and vibrancy while betrayal manifests in darker tones. The layout employs an off-center pattern; warm stripes intersperse with jagged edges to punctuate the emotional cracks signified by ‘heart_fragment.’ The arrangement creates visual tension, where the collision between the warm and cool creates a dynamic interplay, depicting a story of conflict and resolution.</desc>
