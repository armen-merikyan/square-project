<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece embodies the emotional tension between rage and calm. The palette combines stark reds and tranquil blues, illustrating the explosive nature of rage clashing against the soothing elements of calm. The main contrast occurs along the center diagonal, where jagged red patterns emerge, disrupting the more horizontal, cooler blue fields. The broken pixels symbolize the imperfections and disruptions in emotional states, creating a visual echo of both chaos and serenity. This tension is palpable through the arrangement, as the hot colors try to seep into the cooler space, representing the struggle between containment and overflow inspired by the seed.</desc>
