<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This abstract composition captures the emotional tension between restlessness and peace. The palette features pale mint and faded gold as calming hues, juxtaposed with darker storm gray and near black, symbolizing the unsettling nature of anxiety. The main collision occurs diagonally, where patterns of radial calm confront barcode lines of unrest, reflecting the struggle between serene and chaotic memories. Utilizing broken pixels introduces intentional disruptions that echo the seed’s emotional conflict, emphasizing the push-and-pull dynamic of containment versus overflow.</desc>
