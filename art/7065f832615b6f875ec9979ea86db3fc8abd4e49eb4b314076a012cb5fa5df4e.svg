<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone captures the tension between vulnerability and strength through the juxtaposition of soft, pale colors against deep, warm tones. The palette evokes a feeling of safety ('shelter green' and 'warm brown') while introducing exposure with 'pale skin' and 'cold white.' The main contrast occurs at the center with a broken, fracture-like pattern representing vulnerability, but a ripple pattern of supportive greens suggests an undercurrent of strength. The layout intentionally creates tension with hard edges interspersed with irregularities that mirror life's scars and repairs.</desc>
