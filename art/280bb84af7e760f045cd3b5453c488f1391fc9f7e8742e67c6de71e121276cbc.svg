<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">hunger_vs_restraint</title>
  <desc id="desc">The composition captures the tension between desire and emptiness, creating an emotional landscape where vivid colors collide with muted spaces. The palette blends rich coral and orange hues to represent desire, contrasted by soft pinks and deep charcoals symbolizing emptiness. The overflowing corner introduces an intense saturation, while the surrounding muted fields evoke a sense of restraint. The central collision flows from the energetic corner into quiet areas, embodying the imbalance of yearning against holding back. Broken pixels are strategically placed to enhance this narrative of disruption and longing.</desc>
