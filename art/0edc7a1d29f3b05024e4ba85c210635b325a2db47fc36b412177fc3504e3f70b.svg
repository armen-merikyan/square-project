<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience Amidst Ashes</title>
  <desc id="desc">This artwork captures the emotional tension between 'spark' and 'ash'. The left half uses colors inspired by warmth and energy, featuring burnt orange and gold to embody the concept of spark—quick bursts of vitality. In contrast, the right half employs dark red and charcoal, suggesting the quiet aftermath of ash and restraint. The layout alternates between the two emotional states, creating a split vertical dynamic that evokes a sense of balance yet tension. Intentionally broken pixels introduce disruptions that symbolize the fragility in resilience, while the overall flow encourages a feeling of movement from chaos to calm. The palette resonates with the theme of ancient fire, enhancing both warmth and depth in the emotional narrative.</desc>
