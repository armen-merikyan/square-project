<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This composition embodies the emotional battle between fear and hope through contrasting dark and light colors. The palette of black, dark violet, soft gold, and pale green conveys tension—black and dark violet representing fear, while soft gold and pale green evoke hope. The zigzag pattern created by the arrangement suggests rising signals, with sharp contrasts at the edges and a soft center creating a sense of flow from bottom to top. Broken pixels introduce imperfection, mirroring the fragility of hope amid fear. The negative space allows the composition to breathe, emphasizing the struggle without overwhelming the viewer.</desc>
