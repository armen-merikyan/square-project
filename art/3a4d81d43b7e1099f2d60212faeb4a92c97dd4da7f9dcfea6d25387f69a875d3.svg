<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hinge of Tension</title>
  <desc id="desc">This piece captures the emotional spectrum of defiance and submission through the interaction of dark and light elements, represented by the contrasting colors of carbon black and powder pink. The central pixels bleed into the quiet space around them, creating a powerful yet vulnerable pulse of energy. The diagonal rise of the brighter colors is interrupted by sharper, darker accents, representing the collision of emotions. The palette choices reflect a softness against severity, crafting a visual dialogue about tension and release. Broken pixels strategically disrupt the flow, echoing the theme of imperfection and uneven borders, enhancing the sense of struggle between contrasting forces.</desc>
