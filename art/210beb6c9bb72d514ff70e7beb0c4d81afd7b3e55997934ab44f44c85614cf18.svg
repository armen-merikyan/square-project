<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure in Spiral Pressure</title>
  <desc id="desc">The emotional tone embodies the tension between tenderness and rage, represented by a palette of saturated red and muted pale blue. The contrast of these emotions is illustrated in the central collision, where jagged red forms intrude upon calm blue bands, symbolizing rage penetrating tenderness. The structured layout leverages a spiral pressure motif, inducing a sense of inward motion that contrasts the external chaos. Broken pixels introduce intentional disruptions, echoing the turbulence of guilt and forgiveness, reinforcing the fragile boundaries of the emotional landscape while maintaining a balance of approximately 30% negative space.</desc>
