<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience and Fragility</title>
  <desc id="desc">The composition encapsulates the struggle between vibrancy (spark) and stillness (ash) through contrasting colors. A palette of deep blue and muted purple symbolizes depth and restraint, while bursts of yellow and orange represent energy and urgency. The central concentration of muted purple serves as the main collision point, with zigzag patterns suggesting dynamic movement, while lighter spaces evoke moments of quiet reflection amidst tension. The abstract patterns mimic the emotional tension present in the juxtaposition of hunger and restraint.</desc>
