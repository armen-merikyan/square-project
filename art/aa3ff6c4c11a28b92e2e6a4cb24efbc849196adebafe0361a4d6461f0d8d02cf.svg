<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Desire</title>
  <desc id="desc">This piece captures the tension between emptiness and desire, reflected through a palette of warm yellow and orange contrasted against deep blues and muted purples. The flow from bottom to top signifies rising aspirations, while diagonal patterns of desire conflict with the concentric targets of emptiness. The broken edges introduce an imperfection that mirrors the fragility of this emotional interplay.</desc>
