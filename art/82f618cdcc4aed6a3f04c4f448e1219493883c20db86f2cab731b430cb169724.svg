<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Tranquility</title>
  <desc id="desc">The emotional tone embodies a juxtaposition of restless motion clashing against peaceful stillness, represented by contrasting colors. The palette combines dark, intense hues with lighter, calming shades to symbolize the tension between chaos and serenity. The central collision occurs in the middle 4x4 area, where the checker pattern of peace meets the dot pattern of restlessness. This collision creates a dynamic rhythm that reflects the complexity of memory and motion, while the use of broken pixels suggests interruptions in this emotional flow, enhancing the piece's narrative of finding balance amidst chaos.</desc>
