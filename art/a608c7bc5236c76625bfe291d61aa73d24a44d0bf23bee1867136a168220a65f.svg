  <title id="title">Collision of Light and Shadow</title>
  <desc id="desc">The emotional tone embodies the struggle between vibrancy and decay, illustrated using a palette that contrasts the brightness of hope ('spark') with the dullness of restraint ('ash'). The dense, saturated center of the grid encircles lighter accents while reflecting jagged edges that seem to battle with a muted background, symbolizing resilience against fragility. The 'ladder' and 'dots' patterning create an engaging rhythm that evokes tension and release throughout the composition.</desc>
