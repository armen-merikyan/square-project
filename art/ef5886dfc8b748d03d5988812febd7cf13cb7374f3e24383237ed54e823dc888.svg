<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Calm and Chaos</title>
  <desc id="desc">This artwork encapsulates the emotional tension between rage and calm through a stark contrast in colors and patterns. The palette combines deep reds to signify rage with soft pale blues and whites representing calmness. The core uses a structured stack pattern to convey calmness, while the outer edges feature jagged, broken-frame patterns to exhibit rage, creating a collision effect. The central pattern disrupts the quiet field, suggesting an invasion of chaos into serenity, with intentional broken pixels adding an element of imperfection and uncertainty.</desc>
