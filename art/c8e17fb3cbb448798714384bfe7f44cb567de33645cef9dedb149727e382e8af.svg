<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Longing and Resolve</title>
  <desc id="desc">This artwork explores the emotional tension between longing and resolve. The palette of soft rose clay, cool blue, and distant lilac encapsulates a sense of intimacy and distance, representing contrasts in feeling. The collision happens predominantly in the center, where warm shades of rose clay intersect with cool colors, illustrating the push and pull of emotions. Broken pixels are distributed throughout the square as intentional disruptions, echoing the notion of imperfection that mirrors the idea of repair versus damage. The composition carries a wave-like quality, recalling a pulse that runs through the piece, resonating with quiet spaces amidst dense clusters. The layout follows the 'empty room' concept, leaving spaces for reflection and introspection while also featuring bursts of color to signify urgency and adrenaline, creating a beautiful tension throughout the work.</desc>
