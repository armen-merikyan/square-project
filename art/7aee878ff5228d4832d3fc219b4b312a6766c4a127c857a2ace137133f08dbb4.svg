<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Light</title>
  <desc id="desc">This composition captures the emotional contrast between relief and dread, illustrating the turbulence through a palette of muted colors to evoke a sense of nostalgia and introspection. The warm tan and sepia represent relief, while the cooler dust gray serves to induce feelings of dread. The placement of lighter colors towards the top and darker tones at the bottom symbolizes both the emotional pull of despair and the glimmer of hope. The collision of soft patterns creates dynamic tension, mirroring the theme of broken symmetry. The arrangement's negative space speaks to solitude, enhancing the lingering emotional weight throughout the piece.</desc>
