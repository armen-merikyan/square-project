<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Pulses</title>
  <desc id="desc">The emotional tone reflects the struggle between joy and grief, portrayed through contrasting colors and patterns. The palette of bright yellows and muted blues represents joy and grief respectively. The denser, warm colors pulse from the lower left, while the cooler, fragmented tones create a sense of interruption across the grid, acknowledging the presence of grief in an otherwise joyful scene. The collision occurs where the vibrant yellow flames meet the cool, dropping blue dots, emphasizing the tension between these emotional states.</desc>
