<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tension</title>
  <desc id="desc">The emotional tone is conveyed through the juxtaposition of defiantly bold colors against submissive muted tones. The palette, inspired by love and betrayal, uses a rich mix of pink and red to express defiance, contrasted with gray and dark maroon that imply submission. The collision occurs primarily in the center where bold pink breaks the rigid boundaries of muted gray, creating a visual tension that evokes a push against containment. The patterns of ‘hinge’ for defiance and ‘stack’ for submission create an interplay of interrupted arrangements, exploring the struggle between being enclosed and breaking free. The outer edges reflect a soft collapse toward negative space, leaving room for contemplation beyond the chaos of the center.</desc>
