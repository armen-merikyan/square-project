<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Resilience</title>
  <desc id="desc">This composition explores the emotional tension between spark and ash, representing energetic sparks against the backdrop of muted ashes. The palette blends deep blacks and browns (representing ash) with vibrant reds and a hint of orange (the spark). The dense cluster of dark tones on one side creates a line of pressure, akin to a memory pushing against erasure, while the brighter shades break through, symbolizing resilience. The use of irregular patterns and negative space captures the ebb and flow of tension and release. The jagged edges add to the sense of conflict, while the diagonal layout conveys movement and argument between the elements.</desc>
