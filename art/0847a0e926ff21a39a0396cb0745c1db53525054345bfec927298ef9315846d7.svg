<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Weight</title>
  <desc id="desc">This composition embodies the emotional contrast of relief and dread through its carefully curated color palette and placement. The palette features muted storm gray and near black to represent the heaviness associated with dread, layered against pale mint and faded gold which symbolize moments of relief. The main collision emanates from the center, blending the chaotic crosshatch and orderly stripes to reflect a struggle between chaos and order. This interplay of color and texture creates an abstract dialogue where density interrupts lightness, and broken pixels serve as reminders of imperfection and emotional scars, enhancing the narrative of pressure and release.</desc>
