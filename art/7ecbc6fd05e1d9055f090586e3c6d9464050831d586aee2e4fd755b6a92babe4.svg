<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension's Edge</title>
  <desc id="desc">This artwork captures the dichotomy of panic and control through contrasting densities and patterns. The vibrant electric blue and magenta signify moments of chaos, while the deeper black provides a grounding contrast. Stripes and frames create a visual rhythm, suggesting pressure at the edges and a sense of protection around a hollow center. The angular energy promotes movement, reflecting how control can be both assertive and confining, while chaos disrupts the flow. The arrangement echoes the tumultuous balance between inner calm and outer noise.</desc>
