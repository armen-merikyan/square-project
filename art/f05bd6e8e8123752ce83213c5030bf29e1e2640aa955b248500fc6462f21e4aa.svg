<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory in Motion</title>
  <desc id="desc">This piece embodies the tension between softness and severity. The palette reflects this duality, with soft tones of powder pink and warm white juxtaposed against the sharp crimson and carbon black, creating a rhythmic yet contrasting experience. The collision occurs primarily in the center where the floods of black give way to echoes of pink, suggesting a pulsing heart amidst static noise, a metaphor for the conflicting emotions of guilt and forgiveness. The edge style is feathered, allowing for a gentle transition between these emotional strata, reinforcing the idea of memory being both impactful and fluid.</desc>
