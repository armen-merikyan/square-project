<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Dissonance</title>
  <desc id="desc">The emotional tone captures the conflict between connection and loneliness, represented through contrasting color placements. The palette, drawn from 'ancient_fire', evokes warmth but also darkness, suggesting hidden depths of emotion. The main collision occurs where burnt orange meets dark red, reflecting tension and bursts of connection amidst overarching solitude. The pattern evokes a crosshatch effect, emphasizing the layering of inside versus outside feelings. Negative space is utilized to amplify the stark contrast, ensuring that the loneliness resonates through the artwork.</desc>
