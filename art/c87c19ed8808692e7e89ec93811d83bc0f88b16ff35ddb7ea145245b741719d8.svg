<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork embodies the emotional struggle between restlessness and peace. The palette, inspired by 'gratitude_envy', utilizes bright 'honey_gold' and 'acid_green' to symbolize a restless energy, capturing warmth and intensity. In contrast, cooler 'deep_olive' and 'cream' colors act to contain this energy, embodying calm and stability. The layout's pressure corner evokes a push against boundaries, with warm colors overflowing from the top right corner. This collision creates a dynamic tension between stability and chaos, accentuated by broken pixels that introduce imperfections, enhancing the piece's emotional depth while still preserving moments of negative space.</desc>
