<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This abstract artwork captures the emotional tones of defiance and submission through contrasting colors and patterns. The warm tones of burnt orange and dark red symbolize defiance, while the cool gray tones of charcoal represent submission. The central area utilizes a stair pattern, creating a fierce upward push against the streamlined barcode pattern at the edges, showing a struggle within the boundaries. The palette, dubbed 'ancient fire,' evokes a primal energy, heightening the visual clash between warmth and coolness. Broken pixels add intentional disruption, enhancing the chaotic feel around a crowded center which makes the edges seem like they are in retreat.</desc>
