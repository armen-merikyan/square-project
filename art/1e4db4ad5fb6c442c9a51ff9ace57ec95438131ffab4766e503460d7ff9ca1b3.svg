<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Contrast</title>
  <desc id="desc">This artwork reflects the tension between joy and grief through a thoughtful arrangement of colors. The palette, which combines bright yellows and oranges with deep blues and muted purples, evokes a sense of dynamic emotion. The top half symbolizes joy through a vibrant, ascending stair pattern, while the bottom half embodies grief with a fragmented checkerboard. The contrast between warm and cool colors creates a collision of feelings, particularly in the center where colors bleed into one another, suggesting the hidden complexities of expressing these emotions. The broken pixels introduce imperfection, highlighting the unpredictability of human experience, while the negative space invites contemplation.</desc>
