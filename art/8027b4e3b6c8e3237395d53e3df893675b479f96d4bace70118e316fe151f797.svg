<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone of this artwork explores the tension between safety and exposure. The palette combines soft greens and warm browns (signifying safety) with cooler blues and stark whites (representing vulnerability). The collisions predominantly occur in the center, where the bright blue disrupts the warm earthy tones, creating a dynamic contrast. The pattern of 'frame' suggests an enclosure, while the 'channels' pattern immerses into the openness, mirroring the push and pull of shelter against exposure. Broken pixels introduce unexpected disruptions, enhancing the sense of conflict and complexity without creating identifiable shapes.</desc>
