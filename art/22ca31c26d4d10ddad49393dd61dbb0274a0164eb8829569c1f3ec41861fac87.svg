<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This piece embodies the tension between safety and exposure through a gradient of color layers. The palette oscillates between soft greens and warm browns to capture the softness of shelter vs. the starkness of exposure, with intentional interruptions of pale skin and cold whites representing moments of vulnerability. The main collision occurs in the center, where richer colors collide with lighter ones, embodying the pressure and release experienced in emotional states. The falling pixel layout signifies an inevitable descent, echoing the ideas of exposure and the fragility of shelter, encouraging a reflection on balance between vulnerability and protection.</desc>
