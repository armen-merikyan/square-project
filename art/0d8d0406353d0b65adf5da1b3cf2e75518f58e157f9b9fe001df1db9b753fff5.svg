<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This piece captures the emotional dichotomy between joy and grief, utilizing a palette of warm yellows and oranges contrasted by deep blues and muted purples. The upper half represents joy with a grid pattern emanating energy, while the lower half echoes grief's complexity through a stair-like rhythm. The collision point resides in the center, where bright and dark colors meet—serving as the emotional crossroad, depicting the struggle and coexistence of these feelings. Randomly dispersed broken pixels enhance the imperfection and rawness, reflecting the theme of exposed emotions under the veneer of order.</desc>
