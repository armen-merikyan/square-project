<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The artwork embodies the tension between emptiness and desire through a balanced yet disrupted composition. The palette features warm, saturated colors like hot coral and blood orange to evoke desire, while cooler, muted tones like charcoal and hollow blue represent emptiness. This mix creates a visual push and pull, with hot colors prominently placed in the corners to emphasize the desire that reaches outward and collides with a quieter central space representing restraint. Broken pixels are strategically placed to suggest imperfections and interruptions in the flow, reflecting tension and the struggle of containment. The overall pattern transforms the seed's thematic elements into an abstract representation of emotional collision and resonance.</desc>
