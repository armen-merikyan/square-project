<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Affection</title>
  <desc id="desc">This artwork explores the tension between love and betrayal, symbolizing the conflict through contrasting warm and cool tones. The palette features deep reds and soft pinks to express love, countered by gray and dark maroon to evoke feelings of betrayal. The main collision occurs diagonally, as the crosshatch pattern of love clashes against the structured stripes of betrayal, suggesting a fragmented symmetry. The use of burned edges symbolizes the pain and edges of broken relationships, while the intentional negative space amplifies the sense of emptiness that can accompany betrayal.</desc>
