<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">The emotional tone balances between love and betrayal, using a palette of warm pinks and deep reds to embody warmth, while integrating dark grays suggesting melancholy. The layout utilizes a corner invasion, with vibrant stripes representing love rising diagonally, interrupted by maze-like textures colored in darker tones to symbolize betrayal. This contrast creates a collision where warmth meets darkness, evoking tension and resolution within the space. Broken pixels are deliberately placed along the edges to emphasize the imperfections of emotion, adding depth to the abstract storytelling without defining literal shapes.</desc>
