<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Echoes</title>
  <desc id="desc">This artwork explores the tension between grief and joy, contrasting the heavy, muted tones of grief with bright, explosive hints of joy. The palette utilizes deep blue and muted purple for a sombre foundation, with splashes of yellow and orange creating moments of unexpected brightness. The central square suggests a 'hole,' symbolizing absence, reflecting the quiet pressure of grief surrounded by rhythmic, noisy layers that evoke joy. The layout emphasizes the center versus the edges, while the broken pixels add an element of imperfection, creating a narrative of collision and complexity.</desc>
