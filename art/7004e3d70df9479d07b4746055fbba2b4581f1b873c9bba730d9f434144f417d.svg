<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetric Disarray</title>
  <desc id="desc">This artwork captures the emotional tension between clarity and confusion, mirroring the internal struggle of organization and chaos. The palette of navy and black conveys depth and loneliness while hints of dim cyan introduce a cold clarity. The central alignment represents clarity while the jagged edges and broken mirrors evoke confusion. There’s an intentional collision between solid blocks of navy and void spaces, suggesting a fragmentation of thought, enhanced by an irregular pattern that causes the viewer's gaze to shift, capturing the essence of the seed. The arrangement encourages exploration of both clarity and confusion as the eye attempts to create meaning from an asymmetrical framework.</desc>
