<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Extremes</title>
  <desc id="desc">This artwork reflects the emotional struggle between desire and restraint, leveraging a palette that contrasts warmth with muted tones. The saturated hues of red oxide and small orange evoke strong desire, while the dark blackened plum and iron gray symbolize restraint. The main collision occurs in the center, where warm echoes of color abruptly meet muted fields, suggesting a struggle that feels both dense and fragmented. The deliberate use of broken pixels introduces imperfections, reflecting the difficulties inherent in balancing cravings against limitations. Overall, the piece conveys a feeling of pressing against an unseen boundary, where tension and stillness coexist.</desc>
