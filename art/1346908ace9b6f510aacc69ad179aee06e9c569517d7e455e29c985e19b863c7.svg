<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">This piece explores the emotional contrast between dread and relief. The top four rows, imbued in darker tones, represent the weight and discomfort of dread, evoking feelings of pressure and confinement. The bottom rows, infused with lighter shades, embody relief, like a breath of fresh air after tension. The use of a broken pattern creates an unsettling rhythm that echoes the theme of symmetry versus break. The structured layout guides the eye top to bottom, narrating an emotional journey from a heavy presence to a light release, punctuated by jagged interruptions suggesting unresolved feelings.</desc>
