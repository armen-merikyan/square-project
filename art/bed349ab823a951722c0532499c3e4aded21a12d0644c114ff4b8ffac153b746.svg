<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">The emotional tone reflects a battle between joy and grief. The palette blends warm yellows and oranges (representing joy) with cool blues and muted purples (symbolizing grief). The placement creates a split screen effect with hard edges, emphasizing the stark contrast between emotions. The zigzag flow introduces movement from bottom to top, symbolizing rising grief against spreading joy. Broken pixels add imperfection, representing moments of chaos and disrupted feelings. The overall composition hints at the complexity of emotions, capturing the interplay of pressure and relief.</desc>
