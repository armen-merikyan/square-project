<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Beneath the Surface</title>
  <desc id="desc">This composition embodies the tension between love and betrayal, manifesting through contrasting color densities and patterns. The warm pinks and deep reds represent love, while gray and dark maroon capture the lurking sense of betrayal. The maze reflects the complexity of love, while the checker pattern conveys betrayal's disjointed nature. Main contrasts occur in the central region where the colors unexpectedly collide, creating a 'heart fragment' visual that suggests both warmth and loss. This tension echoes the seed's emotional journey, representing the struggle of opposing forces within a structured grid that speaks to chaos and order.</desc>
