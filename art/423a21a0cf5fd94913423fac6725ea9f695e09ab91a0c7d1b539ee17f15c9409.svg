<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in the Void</title>
  <desc id="desc">The emotional tone reflects a dichotomy between the yearning for connection (longing) and the certainty found in resolve. A palette of warm ivory and soft gold confronts cooler shades of ash gray and deep wine, embodying the battle between desire and acceptance. The vibrant core presents a dense, chaotic arrangement, while the quieter border represents suppressed emotions. The main collision occurs at the center, creating a focal point that resonates with the viewer, while the influences of the edge evoke an echo of emptiness, reminding us of the struggles faced between intimacy and distance.</desc>
