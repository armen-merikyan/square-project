<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Dissonance</title>
  <desc id="desc">This piece captures the emotional tension between trust and suspicion, represented through contrasting dark fields and soft glows. The palette of navy, black, and dim cyan embodies a lonely yet vibrant feeling, with quiet spaces allowing bursts of light to create a dialogue of noise and clarity. The main contrast lies at the diagonal center where dark and light collide, echoing the push-pull of trust's warmth against suspicion's cold. The use of broken pixels adds imperfection and intricacy to the overall composition, reminiscent of fleeting signals amidst static.</desc>
