  <title id="title">Tension of Hearts</title>
  <desc id="desc">The emotional tone reflects an interplay between warmth and heartbreak, symbolizing the conflict of love versus betrayal. The palette, featuring soft pinks and deep reds paired with dark maroon and gray, emphasizes this duality. The main contrast lies in the symmetry versus broken layout, where consistent checker patterns of love interrupt the harsher target patterns representing betrayal. This collision creates a visual tension that expresses the struggle between hope and despair, evoking a sense of an empty room filled with unresolved feelings.</desc>
