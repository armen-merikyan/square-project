<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This piece explores the emotional dichotomy of longing versus resolve through a contrasting palette and arrangement of colors. The top four rows embody 'longing' with static placements of color creating a series of muted transitions, signaling a feeling of reaching towards an undefined distance. The bottom four rows represent 'resolve,' characterized by pulsating bursts of color, implying strength and urgency. The electric blue acts as an accent against deeper blacks and muted tones, creating a compelling visual tension. The collision occurs in the central rows, where the static and pulse patterns overlap, suggesting an interplay of stillness and movement. The broken pixels introduce subtle imperfections, reinforcing the theme of repair versus damage. Overall, the composition maintains a balance of emotion while emphasizing the narrative of duality through structured chaos.</desc>
