<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">The emotional tone conveys the tension between love and betrayal through contrasting warm and cool colors. The palette features deep reds and pinks alongside muted grays, illustrating love's warmth against betrayal's chill. The layout contrasts a framed exterior representing betrayal with a dense inner grid signifying love. This creates a conflict where soft, rounded patterns meet sharp edges, evoking an unresolved emotional collision. Broken pixels in the composition add an element of imperfection, reinforcing the theme of disruption in relationships. The arrangement suggests a journey from warmth to isolation, embodying a lonely signal amid a cacophony of emotions.</desc>
