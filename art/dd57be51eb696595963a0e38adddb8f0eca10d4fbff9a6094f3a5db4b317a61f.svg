<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Time</title>
  <desc id="desc">This artwork captures the emotional dichotomy of nostalgia and progress through a warm vs cool contrast, utilizing an 'ancient_fire' palette. The upper half symbolizes nostalgia using a split-screen of warm burnt orange and subdued dark reds, evoking a sense of memory and warmth. The lower half represents progress with cool charcoal tones and golden highlights, suggesting clarity and ambition. A stark division at the center highlights the rise vs fall theme, where the split creates a visual echo of tension. Broken pixels in the form of slight color deviations add imperfection and depth, reinforcing the theme of time's relentless advance against the backdrop of reminiscence.</desc>
