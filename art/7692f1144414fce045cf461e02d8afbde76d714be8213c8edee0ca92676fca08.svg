<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This composition explores the tension between vulnerability and protection. The outer border formed by deep 'shelter_green' and 'warm_brown' reflects a secure frame, while the inner 4x4 consists of lighter colors like 'pale_skin' and 'cold_white,' symbolizing exposure and quiet vulnerability. The collision between these two emotional states occurs at the center where broken dots interrupt the stable teeth pattern, representing exposure against a secure backdrop. The imbalance of colors creates an emotional narrative, as the dominant warm tones encapsulate safety while cooler colors ebbed through suggesting fragility.</desc>
