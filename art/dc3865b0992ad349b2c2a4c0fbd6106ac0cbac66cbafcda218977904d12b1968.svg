<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">The artwork captures the emotional tug-of-war between defiance (represented by stronger, bolder colors) and submission (reflected in softer shades). The palette, 'hunger_restraint', provides a stark contrast between muted cream and vibrant reds, with dark tones framing the edges. The collision occurs predominantly in the center, where lines of defiance (red stripes) clash with the subtle, receding targets (muted cream), creating a dynamic tension. This composition symbolizes the ongoing struggle inherent in the seed's themes, using spatial patterns to evoke a sense of pressure and release.</desc>
