<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">This artwork embodies the tension between defiance and submission, reflected in the juxtaposition of dense and sparse pixel arrangements. The palette comprises clean whites and deep blacks, creating a striking contrast that emphasizes emotional collision. The main collision occurs at the center, where a burst of orange sparks against the cooler tones, suggesting a burst of defiance emanating from an inward spiral of subdued colors, representing submission. The layout of falling pixels enhances the feeling of descent, symbolizing both the pressure of defiance against the weight of submission. This abstract expression captures the essence of struggle and coexistence, allowing space for quiet reflections amidst dense clusters.</desc>
