<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs. Shelter</title>
  <desc id="desc">This artwork embodies the emotional tones of vulnerability and strength through a dynamic tension in the color choices and composition. The soft pink (#FFC0CB) representing vulnerability forms a pale center, contrasted sharply by dark maroon (#800000) that denotes strength enveloping this area. This creates a collision of open spaces and heavy blocks, representing the delicate balance between exposure and protection. The patterns of broken dots and crosshatch enhance this theme: the vulnerability emerges as scattered, fragile, while the strength is persistent and structured. The main contrast occurs centrally, symbolizing where these emotional states intersect and influence one another.</desc>
