<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Stillness</title>
  <desc id="desc">The emotional tone balances between the chaotic energy of restlessness and the tranquil essence of peace. The selected palette of warm coral and cooler blue hues plays into this dichotomy, serving the contrasting emotions through a rhythmic interplay. The dark charcoal serves as a grounding force and a central collision point, creating a dramatic tension at the center of the grid, embodying both the struggle and the serenity in a confined space. The pattern of echo and fault line enhances this narrative, where the edges reflect gentle expansion yet collide abruptly, symbolizing the conflict of movement versus stillness.</desc>
