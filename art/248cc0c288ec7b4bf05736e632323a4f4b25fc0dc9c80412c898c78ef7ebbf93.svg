<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Order and Discovery</title>
  <desc id="desc">The emotional tone reflects the struggle between certainty and curiosity, with a dense palette suggesting static vs dynamic states. The chosen colors resonate with the concept of desire intertwining with voids: hot coral and blood orange as curious interruptions amidst the calming aura of hollow blue and charcoal. The main collision occurs in the central area of the grid, where warm colors create a striking tension against the cooler background, evoking a sensation of fluctuating signals in a sea of order. This arrangement captures the essence of a journey from chaos to the clarity of understanding while preserving a subtle sense of dread through negative space.</desc>
