<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone reflects the tension between panic and control, encapsulated in contrasting colors. The warm palette of burnt orange and dark red conveys urgency and chaos, while charcoal and gold introduce a semblance of order and structure. The upper rows use a radial pattern to create a sense of growth and rise, while the lower rows employ a broken dot pattern to represent chaos and fragmentation. The main contrast occurs in the transition between warm and cool tones, echoing the shift from control to panic. The introduction of broken pixels adds imperfection, enhancing the chaotic theme inspired by the seed.</desc>
