  <title id="title">Collision of Echoes</title>
  <desc id="desc">This artwork embodies the emotional tension between longing and resolve, visualized through the juxtaposition of muted tones and vibrant highlights. The chosen palette of deep blue, mourning black, and pale yellow reflects a sense of depth and renewal. The left side captures longing with shattered patterns, while the right embodies resolve with ember-like motifs, creating a dynamic contrast along the vertical split. The broken pixels introduce intentional disarray, highlighting the fragility of these feelings, particularly in the center where the two emotions collide most vividly, simulating the push and pull within oneself.</desc>
