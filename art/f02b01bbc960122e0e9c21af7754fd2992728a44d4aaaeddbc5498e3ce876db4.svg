<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Shades</title>
  <desc id="desc">This piece captures the emotional tension between trust and suspicion, indicated by the contrasting dark and vibrant hues. The palette of dark maroon for suspicion collides with softer pinks reflecting trust, creating a visual echo of overlapping feelings. The central collision radiates a pressure border illustrating the constant struggle, while areas of gray signify ambiguity, creating depth against the subjective hues. The abstract nature of the pattern, following a split vertical layout, mimics the idea of competing signals amid noise, highlighting resilience fractured by doubt.</desc>
