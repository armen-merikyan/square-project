<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Containment</title>
  <desc id="desc">The emotional tone of desire versus restraint is expressed through a dynamic palette that contrasts deep saturation with muted tones, symbolizing unfulfilled longing against barriers. The blackened plum and red oxide represent the intense desire, while muted cream and iron gray illustrate the restraint and containment of that desire. The layout features descending pixels, emulating a rain-like pressure that disrupts the canvas, creating a vivid collision in the center where the colors clash. The broken pixels serve as intentional disruptions, enhancing the feeling of tension and unresolved emotion.</desc>
