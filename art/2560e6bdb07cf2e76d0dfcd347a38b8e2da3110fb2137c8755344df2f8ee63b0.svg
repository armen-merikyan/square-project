<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tones</title>
  <desc id="desc">This piece embodies the emotional struggle between softness and severity. The warm tones from the 'softness' palette create a gentle rhythm, contrasting sharply with the cold darkness of the 'severity' palette. The layout starts softly in the corner, using radial patterns to evoke pulsations of warmth that try to fill the space, interrupted by sharper, darker edges that contain the flow. Broken pixels create intentional disruptions, emphasizing moments of guilt and forgiveness while hinting at unresolved tensions. The result is a dynamic interplay between containment and overflow, light and dark, urging the viewer to reflect on these emotional binaries.</desc>
