<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Resilience</title>
  <desc id="desc">This piece symbolizes the emotional tension between defiance and submission. The central area, marked by deeper tones, represents a powerful, unmoved core, while lighter hues and broken pixels on the edges signify fragility and vulnerability. The palette of sepia tones conveys warm nostalgia and muted memories, contrasting against the sharpness of the inner spiral pattern. The collision occurs centrally where defiance meets submission, suggesting an echo of resistance in the face of overwhelming pressure. The design flows from bottom to top, reinforcing the feeling of aspiration and urgency against the backdrop of surrender.</desc>
