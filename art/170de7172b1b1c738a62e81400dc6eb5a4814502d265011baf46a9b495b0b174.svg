  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition captures the tension between vulnerability and strength. The palette of pale mint and storm gray juxtaposes soft tones with deeper, more stable shades, creating a dynamic interplay. The main collision occurs in the center, where muted waves of gray clash against softer mint flows, embodying the emotional exchange of exposure and security. The broken pixels introduce imperfection and an irregular structure, reinforcing the theme of fractured resilience.</desc>
