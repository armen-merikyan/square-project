<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Desires</title>
  <desc id="desc">The emotional tone of this artwork encapsulates the tension between emptiness and desire, with cool blues reflecting a sense of longing and warmth from yellows and oranges suggesting hope. The contrast is stark yet symbiotic, with the left half embodying desire through a grid pattern, while the right represents emptiness with jagged, broken pixels. The collision of these patterns creates an unsettling pulse, echoing the push and pull of emotions. This interplay presents a visual narrative of a heart fragment caught between yearning and void, mirroring the seed concepts into an abstract expression.</desc>
