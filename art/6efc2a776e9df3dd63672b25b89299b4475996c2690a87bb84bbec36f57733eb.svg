<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Trust</title>
  <desc id="desc">This composition reflects the duality of trust and suspicion through a contrasting palette of soft pinks and harsh dark maroons, embodying a sense of tension. The trust is represented by the warm pink, providing a soft glow of potential, while suspicion is emphasized by the dark maroon, depicting a hard shadow over spaces of uncertainty. The patterns collide and intertwine, with patches of suspicion subtly intermingling within the trust areas, suggesting an ongoing struggle between emotions. The broken pixels disrupt the clarity, echoing imperfections in trust, with a significant negative space allowing for breathing room amidst the tension, leaning towards a balance but hinting at unease.</desc>
