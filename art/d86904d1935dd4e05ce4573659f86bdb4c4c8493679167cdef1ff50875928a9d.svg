<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Amidst Flow</title>
  <desc id="desc">This composition embodies the emotional duality of defiance and submission, using a palette that evokes guilt and forgiveness. Deep wine and stain brown dominate the center, representing a strong, assertive push against the softer hues of warm ivory and ash gray. The broken pixels are intentional scars that add an uneven edge to the space, suggesting a struggle between order and chaos. The diagonal rise conveys upward momentum, interrupted by lattice-like structures and fault line patterns, creating a dynamic tension. The structure holds quiet negative space to balance the emotional density, reinforcing the idea of thresholds and movement across the square.</desc>
