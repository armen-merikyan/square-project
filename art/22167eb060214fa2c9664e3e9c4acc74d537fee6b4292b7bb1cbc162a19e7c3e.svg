  <title id="title">Tension in Symmetry</title>
  <desc id="desc">This artwork embodies the emotional discord between panic and control through a stark contrast of colors and patterns. The palette, featuring shades of gray, red, and pink, evokes feelings of urgency and vulnerability alongside stability. The center seed shape is represented by a tightened cluster of agitated tones, while the edges fade into cooler hues, suggesting the encroachment of calm amidst chaos. Broken pixels disrupt uniformity, symbolizing the unpredictability of emotion. Overall, the arrangement is tightly packed in the center with a structured rhythm, interrupted by chaotic accents, creating a palpable tension between the two emotional states.</desc>
