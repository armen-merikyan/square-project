<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotion</title>
  <desc id="desc">This artwork explores the emotional tension between tenderness and rage through a structure where a gentle ripple pattern suffuses the inner core while jagged constellations of red and black burst against a muted backdrop. The palette of black, pale blue, and white creates a stark juxtaposition, reinforcing the pressure of rage against the calm of tenderness. The main collision occurs at the borders of the inner square, where the two patterns meet, symbolizing the tumultuous interaction of these emotions. The use of broken pixels throughout different colors introduces a layer of imperfection, representing the complexity of emotions and their inevitable intermingling.</desc>
