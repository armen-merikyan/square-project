  <title id="title">Exposed Frames</title>
  <desc id="desc">This artwork encapsulates the tension between vulnerability and strength through a palette of warm ivory and deep wine, suggesting warmth and intensity, paired with ash gray for an understated quietness. The soft gold acts as an accent, highlighting points of collision, while the stain brown grounds the piece, evoking the hard edges of strength. The central coil pattern reflects a spiraling inward pressure, with delicate channels illustrating vulnerability intersecting with stark, jagged scar patterns that denote resilience. The arrangement allows for a sense of dynamic movement across the square, embodying the themes of exposure and shelter in a visually engaging manner.</desc>
