<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast in Motion</title>
  <desc id="desc">The emotional tone speaks to the duality of 'defiance vs submission,' where the top rows embody a vibrant pressure through angular maze patterns in signal green and electric blue, symbolizing resolution and resistance. The bottom rows illustrate a receding ripple in hot magenta and static gray, showcasing surrender with a soft, enveloping touch. The main collision occurs in the center, where the stark contrasts of the upper bold colors intersect with the softer lower hues, creating tension and dynamic flow. The composition reflects a journey from strong, vivid emotional states to a quieter, enveloping experience, embodying the abstract essence of the seed's narrative.</desc>
