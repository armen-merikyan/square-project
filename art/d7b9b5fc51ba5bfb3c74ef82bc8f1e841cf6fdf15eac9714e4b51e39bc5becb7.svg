  <title id="title">Duality of Perception</title>
  <desc id="desc">This 8x8 artwork embodies the emotional tension between confusion and clarity through contrasting patterns and colors. The palette of muted tans and grays evokes a sense of nostalgia and memory, reminiscent of broken histories. The arrangement features dense clusters on the edges, symbolizing confusion, while a more open center signifies clarity, creating a dynamic flow from the bottom to the top. The crosshatch pattern enhances this tension, while broken pixels add imperfections, mirroring life's disruptions. The thick outlines hint at boundaries that define our experiences but also leave gaps for reflection.</desc>
