<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Order and Chaos</title>
  <desc id="desc">This abstract piece expresses the emotional pull between control and panic. A palette echoing lime, black, electric blue, and magenta highlights the contrast, where black and lime stripes signify control, while the random distribution of lighter blues and magentas reflect chaos. The patterns ebb and flow from structured edges towards a chaotic center, encapsulating the anxiety of losing grip and the order that tries to reign. The layout develops from one corner, subtly invading the calm with bursts of tension and color, presenting a visual narrative of emotional struggle.</desc>
