<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This artwork captures the tension between emptiness and desire through strong contrasts and a structured layout. The left half reflects desire with a vibrant palette of hot coral, blood orange, and dust pink, symbolizing an intense pull towards fulfillment. The right half embodies emptiness with muted shades of charcoal and hollow blue that create a sense of quiet pressure and hollowness. The collision occurs prominently where the vivid oranges clash with the restrained blues at the dividing line, while broken pixel elements disrupt and scatter throughout, adding complexity and imperfection to the structure. The overall layout emphasizes a vertical split, enhancing the contrast and emotional narrative.</desc>
