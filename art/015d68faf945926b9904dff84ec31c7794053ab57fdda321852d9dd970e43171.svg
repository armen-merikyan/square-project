<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Affection</title>
  <desc id="desc">The tone reflects the tension between love and betrayal. The palette of warm pinks and reds contrasts sharply with cool grays and dark maroons, embodying the inner conflict. The layout follows a falling pixel pattern, creating a sense of descending emotions, while the arrangement of colors exhibits echoes of warmth pouring into voids of coolness, embodying moments of both connection and disconnection. The scattered presence of darker colors represents the cracks and imperfections, imbuing the piece with a fragmented yet rhythmic flow.</desc>
