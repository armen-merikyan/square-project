<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This artwork conveys the emotional tension between envy and gratitude by creating a distinct division across the canvas. The left half employs a chaotic pattern characterized by noise, representing envy, whereas the right half presents a cohesive spark-pattern, embodying gratitude. The color palette, consisting of muted purple for calmness, deep blue for weight, warm yellow for brightness, and orange for intensity, interacts to illustrate the rising vs. falling contrast. The left side's dense clusters of color symbolize the weight of envy, while the right features more open spaces, suggesting lightness and release of gratitude. Broken pixels are intentionally placed to introduce imperfection, emphasizing the fragility of emotions and the idea of a broken mirror reflecting our internal conflicts.</desc>
