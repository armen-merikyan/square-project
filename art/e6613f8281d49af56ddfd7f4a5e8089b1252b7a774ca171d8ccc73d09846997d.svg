<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">The emotional tone reflects a battle between relief and dread. The palette includes pale mint and soft sky to embody relief, contrasted sharply by storm gray and near black that evoke dread. The layout emphasizes a sparse center filled with the lighter colors, suggesting airy relief, which is invaded by a dense cluster of darker hues on one edge, symbolizing encroaching dread. The collision happens off-center to create tension. The central shape, inspired by broken steps, represents the inherent instability of the experience, expressed through the 'broken pixels' that fragment the uniformity, adding a layer of imperfection and realism.</desc>
