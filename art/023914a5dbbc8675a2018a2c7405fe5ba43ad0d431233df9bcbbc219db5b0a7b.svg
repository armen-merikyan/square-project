  <title id="title">Signal vs Noise</title>
  <desc id="desc">The artwork explores the tension between restlessness and peace through contrasting color fields. The palette combines deep blues and mourning black for an emotional depth, intertwined with accents of pale yellow and new leaf to represent fleeting moments of peace amidst turbulence. The vertical split layout emphasizes the dialogue between motion and stasis, with static patterns on the left invoking a sense of chaos, while the right side featuring radial patterns suggests tranquility. The collision occurs in the center, where the structured calm interrupts the restless disarray, symbolizing a fragile balance between opposites.</desc>
