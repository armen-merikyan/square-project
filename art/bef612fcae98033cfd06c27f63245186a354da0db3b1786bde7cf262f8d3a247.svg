<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal and Shadow</title>
  <desc id="desc">This composition explores the tension between trust and suspicion through contrasting colors and patterns. The soft, muted greens and whites symbolize trust, forming an unbroken base in the lower half, while the darker tones represent suspicion, interrupting this calm with jagged strokes. The palette of moss green, bone white, rust, stone gray, and small gold creates a balance of warmth and coolness, reflecting the emotional conflict. The fragmented arrangement suggests a struggle between clarity and interference, with broken pixels reflecting imperfections in communication. The main collision occurs in the center, where trust's patterns braid into suspicion's flood, creating a visual narrative of resilience amidst fragility.</desc>
