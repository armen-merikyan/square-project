<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Longing</title>
  <desc id="desc">The emotional tone reflects the conflict of desire and restraint, illustrated through bright vs. muted colors. The palette—a mix of warm red oxide and small orange against cooler iron gray and blackened plum—creates tension, resembling the push and pull between longing and containment. The main collision occurs in the center where vibrant colors spiral outward, interrupted by a restrained frame of muted tones. This arrangement embodies the struggle of uncontained desire trying to breach emotional borders within a structured lattice of restraint.</desc>
