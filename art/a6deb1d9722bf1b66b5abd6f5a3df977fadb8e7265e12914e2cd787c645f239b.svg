<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">This artwork explores the tension between longing and resolve through color and form. The palette of deep blacks and pale blues suggests both an introspective depth (the longing) and a stark clarity (the resolve). The central area of the grid features a collision of darker tones interrupted by sharp light, symbolizing the conflicting emotions of 'repair vs damage.' The use of broken pixels creates intentional disruptions throughout the piece, adhering to the notion of mirror fractures while maintaining a sense of continuity. The flow rises vertically, reminiscent of a pulse, guiding the viewer's eye from the serene blues at the bottom into the stronger contrasts at the top, reflecting the journey from calm desires to firm resolutions.</desc>
