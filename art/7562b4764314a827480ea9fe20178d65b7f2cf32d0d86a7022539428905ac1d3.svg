<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork embodies the emotional tension between vulnerability and strength. The soft palette of powder pink and warm white represents vulnerability, filling the center with a sense of openness. Sharp crimson and carbon black form a protective contrast at the edges, asserting strength. The broken distribution of colors reflects moments of interruption, echoing the idea of broken mirrors and fragmented safety. The darker tones at the top create a weighted feeling, while lighter hues push towards an exposed center, fostering a sense of conflict and balance. The overall flow moves from a dense top to an airy bottom, capturing the emotional journey from strength to vulnerability.</desc>
