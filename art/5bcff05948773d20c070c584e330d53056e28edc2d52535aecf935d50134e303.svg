<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience in Contrast</title>
  <desc id="desc">This composition captures the tension between spark and ash, using warmth and coolness to evoke a balance of resilience and fragility. The palette of bold hot coral, blood orange, and the subtlety of charcoal and hollow blue creates a vivid interplay of emotion. The main collision is vertical, with warm hues dominating the left side, representing the spark of life, while the cooler ash tones permeate horizontally along the bottom, illustrating restraint and memory. The playful structure encapsulates the tension and release detailed in the seed, portraying the narrative of struggle and balance.</desc>
