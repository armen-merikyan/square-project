<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Dynamics</title>
  <desc id="desc">This artwork reflects the emotional tension of longing vs resolve by using a color composition that combines serene greens with stark blacks and vibrant accents of electric blue and magenta. The patterns of longing are represented through softer, veil-like shapes that gently stretch across the canvas, while the resolve manifests in firm, ember-like clusters, creating a stark contrast. The layer of black at the corners symbolizes repair and damage, framed by splashes of color that evoke light and urgency. The central collision of colors signifies the push-and-pull between hope and anchoring, echoing the seed's themes of brokenness and repair.</desc>
