<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork captures the emotional tension between rage and calm, using a palette of red, pale blue, white, and black to evoke contrasting feelings. The calm, serene colors dominate in soft hues, while sharp red pixels, representing rage, interrupt this quietness, forming a chaotic spiral leading toward the center. This creates a collision of calmness eroded by the urgency of rage, with intentional broken pixels representing disruption, symbolizing the struggle between containment and overflow. This visual narrative conveys a cross-current of emotion—a whisper of calm overwhelmed by bursts of intensity.</desc>
