<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall of Emotion</title>
  <desc id="desc">This artwork juxtaposes the emotional tones of awe and terror, depicted through contrasting colors and patterns. The top four rows embody awe with soft radial patterns in green and blue, reflecting a sense of uplifting brightness, while the bottom half conveys terror using checker patterns in dark shades, instilling feelings of chaos and instability. The palette of lime, electric blue, black, and magenta suggests a mechanical tension; the bright colors juxtaposed against the dark foster a conflict between hope and fear, symbolizing the human experience of memory's duality. The edge style of pixel bleed adds a sense of imperfection, reminiscent of broken memories, while leaving negative space allows breathing room amid emotional density.</desc>
