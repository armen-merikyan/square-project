<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Healing Tension</title>
  <desc id="desc">This artwork embodies the emotional tug between softness and severity through a palette that contrasts gentle, warm tones with deep, dark depths. The colors were chosen to elicit feelings of vulnerability versus strength. The dominant use of carbon black in the edges creates a bold, strict boundary that frames softer nuances. The pulse-like patterns suggest fluctuation—mirroring the push-pull of guilt and forgiveness. The placement of warm white and powder pink serves as interruptions, suggesting moments of respite within the severity. The deliberate breaks in the border symbolize open gates, encapsulating a sense of cyclical healing amidst the intensity of collided emotions.</desc>
