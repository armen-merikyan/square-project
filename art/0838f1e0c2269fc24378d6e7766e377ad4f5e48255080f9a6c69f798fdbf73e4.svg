<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">The emotional tone merges yearning with determination. The selected palette of moss green and rust symbolizes resilience and fragility, while bone white serves as a quiet field contrasting against the dense hues. The significant collision occurs towards the center, where longing's glitch pattern, represented by rust and green, meets the lattice of resolution in white and gray. This abstract pattern captures the tension between intimacy and distance, oscillating between filled and empty spaces, reflecting unresolved emotions shaped by the seed theme.</desc>
