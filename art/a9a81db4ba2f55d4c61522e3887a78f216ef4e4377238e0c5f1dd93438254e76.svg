<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmonies</title>
  <desc id="desc">This composition embodies the emotional tension between softness and severity through a palette that juxtaposes warm whites against deep blacks and greys, evoking a dialogue between light and dark. The warm white and powder pink hint at softness, while the sharp crimson and carbon black introduce severity. The main visual collision occurs centrally, where crosshatched softness meets the rigid structure 'target' pattern of severity, representing an open gate through which both emotions visibly struggle for dominance. The layout flows inward, symbolizing a spiral tension that contrasts quiet spaces with clustered marks and broken pixels, reflecting the themes of guilt and forgiveness.</desc>
