<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Memory</title>
  <desc id="desc">This piece captures the emotional duality of relief and dread, as seen in the contrast of soft, muted colors against deeper tones. The outer edges are framed in darker sepia and dust gray, symbolizing a weighty dread, while the inner section features lighter tones of tan and faded blue, representing moments of relief and calmness. The pattern oscillates between dense clusters and open spaces to hint at broken symmetry, evoking hidden memories and unresolved emotions. The composition reflects the push and pull between heavy weights and light moments in an abstract visual narrative.</desc>
