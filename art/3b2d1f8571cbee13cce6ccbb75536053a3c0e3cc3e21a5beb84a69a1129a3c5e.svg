<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">This artwork captures the emotional tension between envy and gratitude through a contrasting palette of vivid electric blue and deep black, suggesting a struggle between light and shadow. The arrangement of colors reflects the theme of 'empty room' with large areas of negative space, symbolizing potential yet unresolved feelings. The collision is primarily seen around the edges, where electric blue interrupts the muted black, creating a sense of rising feelings caught against falling shadows. This polarization evokes a dynamic interplay of emotion, allowing the viewer to feel both the weight of envy and the lightness of gratitude. The jagged edges of color transition enhance the feeling of instability, while the broken pixel rule adds an element of imperfection, echoing the complexities of emotional conflict.</desc>
