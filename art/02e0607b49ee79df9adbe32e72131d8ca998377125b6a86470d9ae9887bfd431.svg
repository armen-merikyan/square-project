<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This piece embodies the emotional struggle between defiance and submission. The palette is based on vibrant yellows and oranges for defiance, juxtaposed against the muted purples and deep blues representing submission. The central pixels feature an aggressive upward crack pattern signifying resistance, while the contours of a soft downward ladder hint at an underlying submission. The arrangement creates a collision of emotions, where the sharpness of defiance meets the dulled edges of submission, with broken pixels introducing an intentional imperfection, echoing the messiness of such a duality.</desc>
