<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This piece embodies the emotional tension between vulnerability and protection. The palette of shelter green and warm brown invokes a sense of safety, while pale skin and open blue represent exposure. The layout is focused on an overfilled center, creating a sense of pressure, which collides with softer edges – this contrast reflects the dynamics of being weighed down by experiences while also embracing openness. The broken pixels introduce intentional imperfections, suggesting the unresolved nature of these emotions.</desc>
