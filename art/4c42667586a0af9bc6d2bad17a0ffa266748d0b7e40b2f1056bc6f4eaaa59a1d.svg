<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">The emotional tone reflects the juxtaposition of joy and grief, using a palette of warm yellows and oranges contrasted against deep blues and muted purples. The top half embodies joyful rhythms with maze-like warm tones, while the bottom half represents the heaviness of grief with noise-like blue shades. The split horizontal layout emphasizes the conflict, with a visible thin outline providing structure yet allowing for organic interruptions, creating a sense of unresolved tension and emotional collision. The presence of negative space enhances the feeling of emptiness amid the density of color, invoking a poignant narrative of loss and light.</desc>
