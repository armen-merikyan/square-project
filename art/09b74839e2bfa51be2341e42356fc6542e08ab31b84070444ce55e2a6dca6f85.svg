<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Softness and Severity</title>
  <desc id="desc">The emotional tone of softness juxtaposed with severity is expressed through a palette of warm and cool colors. The light colors (powder pink and warm white) create a sense of softness, contrasting sharply with the dark shades (carbon black and steel gray) that evoke severity. Main collisions occur diagonally from the corner, creating an 'invasion' of softness against the rigidity of severity, emphasized by the ripple and radial patterns. This arrangement captures the dynamic tension between the two emotions, leaving intentional negative spaces to maintain an air of unresolved tension.</desc>
