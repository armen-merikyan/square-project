<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece conveys the tension between restlessness and peace. The palette combines soft tones with muted colors, reflecting a state of melancholy wonder. The blue and gray hues suggest a calm serenity while the muted plum adds an element of unrest. The central collision of brighter and darker colors in the center of the piece embodies the ongoing argument between peace (soft cyan, moon white) and restlessness (lavender gray, muted plum). Broken pixels interrupt the flow and validate the theme of exposure versus shelter, creating a narrative of fragmented memory against a backdrop of quiet spaces.</desc>
