<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition embodies the tension between rage and calm through the contrast of a fiery central pattern erupting against a backdrop of cooler, more contained tones. The palette blends intense red and stark black to express the explosive character of rage, while softer pale blue and white are layered to evoke calmness. The main collision occurs where the chaotic mirror patterns of red interact with the radial calmness of blue, creating a dynamic unbalance yet hinting at underlying order. The 'tiny_cross', abstractly translated, allows for both the eruption of energy and its containment, manifesting through broken pixel placements that interrupt the flow, symbolizing the constant conflict between serenity and turmoil.</desc>
