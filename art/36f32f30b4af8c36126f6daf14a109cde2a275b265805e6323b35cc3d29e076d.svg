<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Balance</title>
  <desc id="desc">This artwork captures the emotional tension between panic and control. The chosen palette of yellows, oranges, deep blues, and muted purples represents the clash of joyful warmth against sobering grief. Central to the piece is a chaotic radial pattern reflecting panic, disrupted by sharp, jagged edges symbolizing control. The arrangement focuses on a dense cluster at the center, gradually dissolving into negative space around the edges, echoing an orbiting motion, imbuing the composition with a sense of instability. Such contrasts create a visual narrative about emotional upheaval and balance.</desc>
