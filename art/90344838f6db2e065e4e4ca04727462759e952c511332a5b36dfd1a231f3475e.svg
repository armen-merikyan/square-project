<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork captures the emotional tension between rage and calm, realizing this through a palette of deep reds and cool pale blues. The center features jagged red segments breaking into the calmness of soft blue dots, representing the conflict and clash of emotions. Cooler colors dominate, emphasizing a sense of serenity, while sharp, stark patches of red create the sense of eruption and chaos. The abstract pattern embodies the pulse and collision of emotions, with intentional breaks in the structure to illustrate imperfections and interruptions, embodying the struggle of containment against overflow.</desc>
