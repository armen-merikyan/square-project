<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This composition balances the tension between trust (represented by golden hues and soft features) and suspicion (dark indigo and stark contrasts). The palette, derived from 'awe_terror', creates an emotional landscape where cold gold and deep teal evoke warmth while void black and cosmic indigo invoke shadows of doubt. The main collision occurs at the center where the stark breaks of the halo pattern split through a glitch-like design. This collision expresses the emotional friction of the seed’s themes, showing a fight between clarity and chaos across a vertical axis.</desc>
