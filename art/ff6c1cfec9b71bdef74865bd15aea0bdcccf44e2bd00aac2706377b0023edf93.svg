<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast in Motion</title>
  <desc id="desc">This piece captures the emotional paradox of joy and grief through a dynamic interplay of colors and patterns. The palette combines vibrant yellows and oranges representing joy, alongside deep blues and muted purples that symbolize grief. The main contrast is achieved between the grid of warm colors in the upper-left corner and the maze-like structure in the bottom-right, creating a visual tension that echoes the conflicting emotions of rise versus fall. The zigzag pattern of joy contrasts with the fragmented maze of grief, allowing a collision that reflects the seed's complexity.</desc>
