<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone encapsulates the tension between vulnerability and strength, depicted through the chosen palette of deep teal, cold gold, and cosmic indigo that create a conversation of warm and cool contrasts. The color placement amplifies this narrative; dark fields form a dense base, while lighter accents 'repair' broken patterns, suggesting both exposure and shelter. The main collision occurs at the center, where bright pixels interrupt denser areas, symbolizing vulnerability amidst protective strength. Overall, this arrangement translates the seed's themes into a rhythm of flow and stutter, reflecting the struggle between openness and concealment.</desc>
