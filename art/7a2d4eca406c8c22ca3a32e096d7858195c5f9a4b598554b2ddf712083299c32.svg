<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Ascendance</title>
  <desc id="desc">The artwork embodies the emotional tension between fear and hope. The dark palette with blacks and dark violets represents fear and uncertainty, while soft golds and pale greens symbolize the flickers of hope. Central rows are denser with gold to represent upward movement (hope), contrasted sharply against the lower dark sections, evoking a sense of escaping pressure. The zigzag flow from black to gold illustrates conflict and possibility. Broken pixels introduce imperfection, aligning with the emotional narrative of struggle.</desc>
