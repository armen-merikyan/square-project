<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Emotion</title>
  <desc id="desc">This piece embodies the struggle between joy and grief, combining a vibrant color palette of yellows and oranges representing joy with muted purples and deep blues suggesting grief. The light, spark-like colors are positioned in a zigzag pattern to introduce a sense of rhythmic disorder, reflecting chaos against a backdrop of darker hues that create tension. By centralizing the brighter colors and allowing them to bleed into the muted tones, the arrangement signifies a bridge between contrasting emotions, presenting a balance yet retaining an element of collision. The broken pixels throughout the piece mimic imperfections in human emotion, while strategic use of negative space enhances the feeling of unresolved tension between joy and grief.</desc>
