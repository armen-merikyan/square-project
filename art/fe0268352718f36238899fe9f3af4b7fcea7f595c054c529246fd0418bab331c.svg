<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Echoes</title>
  <desc id="desc">The emotional tone merges love and betrayal, captured through a contrasting palette of warm reds and muted grays, representing affection and heartbreak. The layout follows a frame and core structure, where the outer edges signify betrayal (the darker shades) while the inner 4x4 represents love (in warmer tones). The contrast thrives on the soft edges with a broken pixel effect, evoking a sense of imperfection and tension as the warmth of love confronts the oppressive cool tones of betrayal. The use of checker and mirror patterns allows for dynamic movement and visual 'cracks' that symbolize fractures in trust, echoing the seed's themes.</desc>
