<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Emotions</title>
  <desc id="desc">This piece captures the dichotomy between joy and grief through color and abstract patterns. The palette consists of bright yellows and oranges representing joy, balanced with deep blue and muted purple to embody grief. The clean zigzag structure on one side symbolizes order and joy, while the broken, noisy patterns on the other convey chaos and grief. The central area holds tension between these opposing flows, interrupted by bursts of color. This sets a rhythmic balance of resonance, pressure, and release, mirroring the complexities of human emotion.</desc>
