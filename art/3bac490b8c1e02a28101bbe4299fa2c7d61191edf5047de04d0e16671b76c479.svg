<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensions of Memory</title>
  <desc id="desc">This artwork explores the tension between urgency and calm, drawing from the seed's themes of 'spark' and 'ash'. The palette combines 'alarm_red' as the accent against 'mist_gray' and 'clear_white', creating a compelling contrast that conveys both hunger and restraint. The main collision occurs in the center, where the red sparks interrupt the gray, suggesting disrupted memories. The layered stack pattern for 'ash' alongside the energetic spark pattern for 'spark' embodies the conflict of resilience against fragility, forming a visual narrative without literal representation.</desc>
