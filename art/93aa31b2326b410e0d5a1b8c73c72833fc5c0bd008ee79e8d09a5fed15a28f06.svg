  <title id="title">Halo of Tension</title>
  <desc id="desc">This artwork embodies the emotional contrast between vulnerability and strength through a striking palette of pink, red, gray, and dark maroon. The outer rows depict strength with dense, hard edges, while the lighter, more vulnerable tones occupy the inner core, suggesting an unshielded light. The main collision occurs at the center, where the barcode pattern of vulnerability overlaps with the target pattern of strength, creating a push-and-pull dynamic that reflects the complexities of exposure and protection. The use of broken pixels adds intentional disruptions, enhancing the narrative of fragility amidst resilience.</desc>
