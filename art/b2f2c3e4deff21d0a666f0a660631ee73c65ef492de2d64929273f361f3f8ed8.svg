<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center of Tension</title>
  <desc id="desc">This piece embodies the emotional dichotomy of vulnerability and strength through a stark contrast between dark, muted tones and a small cluster of bright accents in the center. The palette consists of black and dark violet symbolizing strength and shelter, while soft gold and pale green represent the fragile nuances of vulnerability. The main collision of colors happens centrally, where the soft breaks of 'spark' intersect with 'channels' of strength, suggesting moments of exposure and connection. The flow spirals inward, creating a sense of rising tension against a protected core, reflecting the complex relationship between resilience and fragility.</desc>
