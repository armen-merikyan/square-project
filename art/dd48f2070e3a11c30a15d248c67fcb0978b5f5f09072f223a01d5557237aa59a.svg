<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Being</title>
  <desc id="desc">This artwork reflects the emotional contrast between longing and resolve through a palette of muted blues and grays, evoking a sense of melancholy wonder. The blue hues represent depth and fluidity, symbolizing longing, while the lavender-gray offers contrast and a structure that suggests resolve. The checker-like patterns collide with the flowing rain-like arrangement to create a visual echo of unresolved tension, with the central collision happening towards the middle, where the patterns interact and disrupt the continuing flow. Broken pixels punctuate the piece, suggesting scars amidst beauty, embodying the dichotomy of repair vs damage.</desc>
