<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition reflects the tumultuous emotional contrast between rage and calm. The left side, imbued with jagged red patterns, represents explosive emotion, while the right side, characterized by soft blues and whites, signifies tranquility. The palette utilizes stark 'rage_calm' colors—vivid red and muted pale blue—to amplify the tension and division. The contrast lies at the center, where aggressive patterns of shattering red collide with the gentle rings of calm, suggesting that even amidst tranquility, powerful undercurrents exist. The zigzag flow across the artwork embodies the chaotic nature of raging emotions against a background of an eroded symmetry that hints at the challenge of maintaining balance.</desc>
