<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">This pixel art embodies emotional tension between envy and gratitude, expressed through a contrasting palette of dark and vibrant colors. The top half features layers of soft greens and subdued tones representing 'envy', arranged in a stair-step pattern, while the lower half bursts with bright electric blues and magenta hues, symbolizing 'gratitude'. The arrangement gives a sense of an empty room filled with opposing forces: rising density in the upper section creates pressure, whereas the lower section offers relief and brightness. Soft edges soften the transitions, while the small number of broken pixels introduces imperfection, echoing the complexity of human emotions.</desc>
