<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order Amidst Chaos</title>
  <desc id="desc">The artwork captures the emotional dichotomy of control versus surrender through structured arrangements and disordered elements. The palette of navy, black, and dim cyan evokes loneliness and isolation, while the single white acts as a quieting contrast. The main tension resides in the central area, where the structured lattice collides with the maze-like elements of surrender, visually illustrating the experience of pressure and release, creating an emotional flow that suggests an open gate leading into chaos.</desc>
