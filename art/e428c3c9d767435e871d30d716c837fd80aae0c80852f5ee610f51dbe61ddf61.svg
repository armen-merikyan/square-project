<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">The artwork explores the emotional tension between trust and suspicion, using a palette of dark violet, soft gold, and pale green against black. The contrast between the dark hues represents suspicion’s weight, while the softer colors symbolize trust and hope. The pattern mirrors on one side, suggesting an openness towards trust, while the ring pattern on the other conveys suspicion’s entrapment. The central collision of colors along a vertical axis captures the moment of emotional tension, symbolizing the struggle between these contrasting feelings. The negative space softens the intensity, allowing the viewer to engage with the underlying complexities.</desc>
