<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This piece captures the emotional conflict of restlessness against tranquility. The chosen palette juxtaposes dark blacks and deep reds against pale blues and whites, embodying the tension between weight and lightness. The main collision occurs in the center of the square, where intense red pixels disrupt the cooler tones, symbolizing the inner conflict. The edge-crawling pattern reflects a persistent unease while allowing the braid-like peace to emerge intermittently. The broken pixels signify imperfection, enhancing the sense of an unresolved story amidst an otherwise calm layout.</desc>
