<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Resistance</title>
  <desc id="desc">The composition embodies the tension between defiance and submission through color and spatial dynamics. The selected palette of hot coral and blood orange represents defiance with its vibrant energy, while charcoal suggests submission with a grounding depth. The central region captures upward movement through tight clusters of defiant colors, creating a stark contrast against the surrounding emptiness which symbolizes retreat and quiet. The corner pressure layout emphasizes a burst of intensity that spills outward, in a gesture akin to an explosive yet contained spiral, derived from the seed's notions of conflict and blending realities.</desc>
