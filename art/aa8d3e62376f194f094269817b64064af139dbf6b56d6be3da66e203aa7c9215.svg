<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Release and Containment</title>
  <desc id="desc">The emotional tone embodies a tension between the vibrant push of desire and the muted hold of restraint. The palette features hot coral and blood orange as vivid indicators of desire, clashing with the soft, cool tones of charcoal and hollow blue, which signify restraint. The top half of the grid shows desire through bold striped patterns, whereas the bottom half employs scar-like motifs, suggesting a struggle against the confines of muted expression. The main collision occurs in the center, where saturated colors bleed into restrained hues, representing a complex emotional interplay.</desc>
