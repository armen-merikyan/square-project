<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Harmony</title>
  <desc id="desc">The emotional tone reflects a clash between chaos (representing panic) and order (representing control). The palette of warm hues (yellow and orange) contrasts with deep and muted purples, which encapsulate the intense emotional journey. The primary conflict lies in the center, where vibrant colors radiate and collide against the cooler, muted edges while maintaining some negative space, as mandated by the density suggestions from the seed. This creates a visual representation of inner turmoil battling against a structured exterior—drawing inspiration from the mechanism of control versus the instinctive response of panic.</desc>
