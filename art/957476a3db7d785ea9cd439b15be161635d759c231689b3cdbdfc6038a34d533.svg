<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Dual Realities</title>
  <desc id="desc">This artwork explores the emotional tension between longing and resolve. The palette consists of high-impact colors like magenta and electric blue, combined with the grounding presence of black and the brightness of lime, reflecting a struggle between urgency and serenity. The layout of horizontal and vertical movements collides centrally, creating a vivid contrast that interrupts the otherwise serene spaces. Broken pixels are intentionally placed to signify disruptions, embodying the repair versus damage theme, while leading to an inward spiral flow that hints at a complex depth beneath the surface, evoking the seed's emotional tone.</desc>
