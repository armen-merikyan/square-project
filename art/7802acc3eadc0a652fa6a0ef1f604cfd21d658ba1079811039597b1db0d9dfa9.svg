<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This artwork embodies the emotional tension between defiance and submission. The palette, 'hunger_restraint', with its muted cream, red oxide, and deep blackened plum establishes a charged atmosphere, contrasting strength and vulnerability. The central area is densely packed, representing defiance, while softer colors spread outward, signifying submission. The collision of patterns—'islands' and 'fault_line'—clashes in the corner, which is overfilled, causing a visual pressure that ripples through the piece. The dark edges offer a shadowed containment, enhancing the feeling of a struggle within the space.</desc>
