<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Tension</title>
  <desc id="desc">This artwork captures the emotional duality of longing and resolve. The chosen palette of warm tones represents desire and urgency, while cooler tones suggest serenity and calm. The main contrast occurs in the center where vibrant coral and blood orange collide with the placid hollow blue, suggesting a battle between overflowing emotion and contained resolve. The layout, inspired by a halo void, creates a sense of tension in the central area, flanked by sparsely filled edges that evoke feelings of emptiness. Broken pixels are intentionally scattered, representing the imperfections and scars of emotional experiences, enhancing the abstract nature of the composition.</desc>
