<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Repair</title>
  <desc id="desc">This artwork expresses the emotional contrast of longing and resolve through color and pattern. The selected palette evokes resilience with muted moss green and bone white, while rust introduces a sense of damage. The layout climbs upward, symbolizing hope, with a dominant presence of resolve against scattered patches of longing. The interplay of radial and threshold patterns creates a collision at the center, where tension resides, portraying a struggle between contained emotion and the overflow of broken pixels as visual scars that hint at repair and disruption. The quietness of the background balances the density of central colors, emphasizing the heartfelt journey between these opposing emotions.</desc>
