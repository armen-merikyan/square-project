<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This artwork oscillates between the emotions of dread and relief, represented through a palette of muted storm gray and bright faded gold. The storm gray embodies the weight and pressure of dread, accumulating in the upper left, while the faded gold introduces an element of relief, spiraling outward toward the lower right. The dynamic contrast of dense and airy color distributions parallels the emotional collision of order versus chaos, with a quiet channel creating space for introspection. Broken pixels introduce intentional disruption in the flow, echoing the imperfections of anxiety and the quest for release.</desc>
