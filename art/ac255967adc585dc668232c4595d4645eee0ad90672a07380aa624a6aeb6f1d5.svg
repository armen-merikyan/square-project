<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This piece embodies the complex emotional interplay between love and betrayal. The chosen palette of pinks, reds, and darker tones captures warmth and intensity, while gray represents the tension and shadows of conflict. The layout centers around a burst of light colors, symbolizing love, which is disrupted by the encroachment of darker hues, portraying betrayal. The checker and ring patterns juxtapose order with chaos, reflecting an inner turmoil. The broken edges contribute to the sense of fracture, creating an overall tension that echoes the experience of love intertwined with betrayal.</desc>
