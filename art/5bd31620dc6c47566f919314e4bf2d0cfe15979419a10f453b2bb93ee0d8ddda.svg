<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Channel of Contrast</title>
  <desc id="desc">The emotional tone highlights the struggle between vulnerability and strength, represented through a dynamic arrangement of colors that flow from dense to sparse. The chosen palette of signal green, electric blue, dead black, static gray, and hot magenta reflects both confrontation and subtlety, capturing moments of tension and release. The central area is alive with saturated colors suggesting strength, while edges fade into vulnerability with softer hues, illustrating the push and pull of external forces, creating an asymmetrical flow from vivid center to muted edges. A channel of negative space emphasizes the contrast, inviting the eye to traverse the dynamic relationship.</desc>
