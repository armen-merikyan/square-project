<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tensions</title>
  <desc id="desc">This composition explores the emotional tug-of-war between desire and restraint. The color palette of hot coral and blood orange embodies the warmth of desire, while charcoal and hollow blue represent the coolness of restraint. The patterns of broken dots and halo create contrasting movements; while desire seems to overflow, restraint attempts to maintain structure. The main collision occurs in the center, where saturated colors meet muted tones, symbolizing the intense push and pull of emotions. The layout of falling pixels adds a sense of pressure descending upon the grid, amplifying the feeling of tension.</desc>
