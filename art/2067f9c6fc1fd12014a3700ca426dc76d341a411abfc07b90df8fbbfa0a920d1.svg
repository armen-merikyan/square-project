<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Forces</title>
  <desc id="desc">The emotional tone reflects a push and pull between defiance, characterized by angular and vibrant colors, and submission, depicted through softer, muted tones. The palette combines warm coral and soft amber for warmth and vulnerability with cold slate and blue-black for depth and contrast. The main collision occurs along the central axis, where the vibrant scar pattern interrupts the smooth rings of submission, portraying a clear battle between these emotions. Broken pixels add a sense of imperfection, resembling scars that evoke resilience amid surrender. The negative space ensures a breath within the dense composition, achieving a balance of emotion and action.</desc>
