<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Last Light</title>
  <desc id="desc">This composition marries the emotional tension of 'spark' and 'ash' through a stark palette of cosmic indigo and deep teal contrasted with bursts of star white. The pattern of mirror vs. scar suggests an intersection of fluidity and sharp, jagged disruptions, emphasizing the push-pull between hunger and restraint. The top half is a simmering calmness (ash), while the bottom blooms with vibrant activity (spark). The collision occurs in the middle, where muted colors blur into bright, creating a dynamic interplay that resembles resilience against fragility.</desc>
