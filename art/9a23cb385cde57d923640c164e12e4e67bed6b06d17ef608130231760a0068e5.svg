<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone is defined by the tension between desire (saturated colors) and restraint (muted colors), creating a visual echo of collision. The selected palette of red_oxide and small_orange represents warmth and longing, while blackened_plum and iron_gray suggest limitations and a sealed edge, portraying feelings of containment. The main contrast occurs at the center, where the barcode pattern of desire intersects with a radial pattern of restraint, forming a vibrant core surrounded by a more muted border. This interplay heralds the struggle around the concept of hunger against the backdrop of restraint, encapsulated within the sealed edges.</desc>
