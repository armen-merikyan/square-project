<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork captures the emotional tension between desire and restraint, represented through a clash of vibrant and muted colors. The selected palette of hot coral, blood orange, dust pink for warmth and saturation signifies desire, while charcoal and hollow blue introduce coolness and restraint. The main contrast occurs at the center, where saturated colors interact with the boundaries that restrict them. The patterns clash and intertwine, symbolizing the conflict of feelings and urgency that defines love and betrayal, creating a spiraling sense of pressure. The overall composition embodies a dynamic interplay of movement versus stillness, driving the emotional narrative without literal representation.</desc>
