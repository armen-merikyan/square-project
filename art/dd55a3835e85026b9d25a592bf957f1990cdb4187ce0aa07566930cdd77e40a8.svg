<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Strained Light</title>
  <desc id="desc">This piece embodies the tension between fear and hope through a stark contrast of dark, oppressive tones juxtaposed with soft, glowing accents. The palette, consisting of black, dark violet, soft gold, and pale green, reflects the emotional conflict; dark colors represent fear's weight while the lighter hues suggest a glimmer of hope. The arrangement creates a split vertical flow, where checker patterns exert pressure while the mirrored elements attempt to provide balance. This opposition manifests through the collision of dark and light colors in the center, evoking a sense of struggle and resolution.</desc>
