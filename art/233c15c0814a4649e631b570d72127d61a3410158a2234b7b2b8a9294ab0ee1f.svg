<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition captures the emotional tension between vulnerability and strength. The palette, featuring soft corals and deep charcoals, emphasizes a contrast between exposed warmth and protected shadows. The main collision occurs at the center, where strong crosshatch patterns overlap with delicate thread-like forms, symbolizing the interplay of being exposed yet guarded. The larger negative spaces provide a sense of emptiness, enhancing the feeling of vulnerability. The asymmetrical layout reflects a deliberate imbalance, resonating with the underlying themes of the seed.</desc>
