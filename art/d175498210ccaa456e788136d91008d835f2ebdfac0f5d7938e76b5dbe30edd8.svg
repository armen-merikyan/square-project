<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Gratitude and Envy</title>
  <desc id="desc">The emotional tone captures the tension between envy (darkness, confinement) and gratitude (light, openness). The chosen palette of red, black, pale blue, and white reflects this duality: black absorbs light (envy) while pale blue and white emanate calmness (gratitude). The contrast lies predominantly in the center, where stark black pixels collide with the lighter colors representing gratitude, creating a visual weight that signifies fear juxtaposed with hope. Soft edges give the piece a nuanced transition between stark contrasts, echoing the complexity of emotions derived from the seed.</desc>
