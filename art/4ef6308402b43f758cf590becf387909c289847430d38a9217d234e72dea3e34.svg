<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Spaces</title>
  <desc id="desc">This piece embodies the emotional tension of control versus surrender through its constraining dark colors and liberated bright accents. The palette combines 'shelter_green' for stability, 'warm_brown' for grounding, 'cold_white' for interruption, 'pale_skin' for warmth, and 'open_blue' to symbolize freedom. The primary contrast occurs at the center, with a cluster of bright colors conflicting against surrounding muted tones, representing the struggle between restraint and release. The pattern of 'teeth' aligns with the idea of control, while the soft overlays of 'veil' communicate surrender, creating a dynamic visual rhythm that resonates with the essence of the seed.</desc>
