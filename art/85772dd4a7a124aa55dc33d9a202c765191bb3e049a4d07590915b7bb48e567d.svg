<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">The emotional tone explores the dichotomy of tenderness against rage, manifesting in a palette of deep black and saturated red punctuated by soft pale blues and whites. The collision of these colors symbolizes the struggle between soft and sharp emotions, with the jagged edges representing the harsh interruptions of rage in a generally tender environment. Patterns of frame-like structures reflect tenderness, while ladder-like interruptions evoke moments of explosive rage. The central area draws the eye as the clash occurs here, representing a cross-current of emotions, preserving quiet negative space to reflect the inner calm amidst the chaos.</desc>
