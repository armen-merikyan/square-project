<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Embrace</title>
  <desc id="desc">The emotional tone of this piece explores the juxtaposition of love and betrayal, utilizing a palette of warm pinks and reds contrasted with muted grays and dark maroon. This juxtaposition evokes deep emotional conflict, where warmth symbolizes love, and the grays reflect betrayal's coldness. The layout flows from top to bottom, reminiscent of falling tears or ash, enhancing the feeling of loss and tension. The crosshatch pattern suggests discord, while the soft versus sharp contrast symbolizes the struggle between intimacy and distance. The broken pixels introduce imperfection, capturing the essence of a 'broken heart' amidst a seemingly controlled area of 'negative space', allowing emotions to breathe.</desc>
