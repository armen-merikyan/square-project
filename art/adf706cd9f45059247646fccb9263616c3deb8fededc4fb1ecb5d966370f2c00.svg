<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">The emotional tone reflects a dichotomy between heat and contraction, embodying desire as a vibrant push against the restraint of muted boundaries. The palette encapsulates this through deep reds and muted creams, creating a stark contrast where warm accents bleed into cooler, restrained zones. The primary collision occurs in the center where the ripple pattern of desire, represented through warmer colors, is visually restrained by the ladder layout of cooler hues. The arrangement of colors creates a flicker effect, suggesting movement and tension, while the intentional broken pixels disrupt the uniformity, symbolizing the imperfections in the quest for balance. This representation of desire versus restraint embodies the emotional complexity of the seed.</desc>
