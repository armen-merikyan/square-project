<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Connections</title>
  <desc id="desc">The emotional tone of this composition revolves around the tension between love and betrayal, represented through contrasting colors: warm pinks and intense dark maroons. The layout is a contrast of density and emptiness, where warmer tones swirl towards the center in a radial pattern, suggesting love, while darker, fragmented edges hint at the betrayal's intrusion. The broken pixels scatter across the canvas, creating a sense of imperfection and disruption, reflecting the chaos of betrayal while maintaining enough negative space to evoke feelings of longing and loss. The collision occurs where warm colors push back against the cold shadows, encapsulating the struggle between these intense emotions.</desc>
