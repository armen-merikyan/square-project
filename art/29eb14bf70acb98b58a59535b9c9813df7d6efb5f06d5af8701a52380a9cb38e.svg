<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Weight</title>
  <desc id="desc">This piece represents the struggle between fear and hope, using a split vertical layout. The left side embodies fear with dark colors and maze-like patterns, creating a sense of pressure, while the right side symbolizes hope through light and grid patterns that suggest upliftment. The contrast emerges where dark corners meet radiant edges, pulling the viewer's focus and creating an emotional tension. The seed informed the wave shape in color placement, with flowing movement suggesting unpredictability, while maintaining enough negative space to avoid overwhelming chaos.</desc>
