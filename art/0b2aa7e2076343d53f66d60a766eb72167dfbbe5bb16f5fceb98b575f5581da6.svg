  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone contrasts the feelings of vulnerability and protection, represented by a soft palette of greens and neutrals contrasting with sharper blues. The collision occurs through jagged edges where the soothing maze of 'safety' collides with the more chaotic 'exposure'. The patterns and flow reflect a central division, suggesting an ongoing tension between the two states. This layout creates a dynamic visual experience, echoing the tension between safety and exposure.</desc>
