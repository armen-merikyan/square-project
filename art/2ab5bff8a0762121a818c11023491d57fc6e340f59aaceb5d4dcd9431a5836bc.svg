<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry Fractured</title>
  <desc id="desc">This artwork embodies a tension between confusion and clarity. The dark palette, with blacks and deep violets, represents confusion, while the soft gold and pale green serve as a visual attempt for clarity—offering light amidst chaos. The patterns were chosen to alternate between crack-like structures symbolizing breaks in thought and ring-like forms representing clarity. The placement of brighter pixels against darker ones emphasizes the collision of tension and serenity, with the pulse-like flow underscoring the constant battle between these emotions. The broken pixel elements add deliberate imperfections, introducing a sense of unease and randomness, contrasting with the structure of the composition.</desc>
