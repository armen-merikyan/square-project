<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">This piece explores the emotional tension between pride and shame, using a palette of sepia, tan, dust gray, and faded blue to evoke memories. The anchored warm tones represent pride, while cooler, muted shades embody the weight of shame. The layout begins in a corner, exerting pressure that spreads diagonally across the canvas, reflecting a tumultuous rhythm. The edge style of burned edges and broken pixels reinforces an unstable feeling, creating a jagged interplay of crushing calm against overwhelming density. The main contrast occurs where the warmer tones collide with the cooler, echoing the theme of emotional collision.</desc>
