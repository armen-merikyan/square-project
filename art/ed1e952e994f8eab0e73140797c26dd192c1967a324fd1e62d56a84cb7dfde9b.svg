<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This artwork embodies the emotional clash of restlessness and peace. The palette of soft golds juxtaposed with deep wine reflects a spectrum of tension, while ash gray and warm ivory serve as calm, grounding fields. The main contrast occurs at the center, where pressure bands of darker colors collide with lighter, thread-like patterns creating a dynamic flow. This layout captures the essence of memory against motion, suggesting a past that battles against present unrest.</desc>
