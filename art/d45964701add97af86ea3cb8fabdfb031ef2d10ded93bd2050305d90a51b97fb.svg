<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Depths of Resilience</title>
  <desc id="desc">The artwork embodies the emotional contrast between vulnerability and strength through the use of a warm and cool palette, evoking a sense of tension between protection and exposure. The color arrangement features the soft warmth of 'rose_clay' and 'warm_shadow' at the edges, providing a gentle shell, while the dense and striking 'cool_blue' and 'lamp_gold' converge at the center to suggest strength rising through the vulnerability. Broken pixels create intentional disruptions, signifying the scars of experience. The layout opens up towards the top left, inviting a flow that symbolizes the rising signal against the backdrop of hard edges, evoking a sense of balance between exposure and protection.</desc>
