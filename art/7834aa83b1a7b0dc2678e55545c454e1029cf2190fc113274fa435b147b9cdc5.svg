<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Split Perception</title>
  <desc id="desc">This composition embodies the emotional tension between trust (warmth) and suspicion (cool shadow). The palette features dusty grays and soft hues, with compressed reds acting as accents, symbolizing the pressure of conflict. The top rows represent trust with a lattice-like structure, embodying warmth and stability, while the bottom rows evoke suspicion with quiet fields disrupted by dark navy edges. The main collision occurs between warm and cool colors at the center, suggesting a strained connection between two contrasting emotional states.</desc>
