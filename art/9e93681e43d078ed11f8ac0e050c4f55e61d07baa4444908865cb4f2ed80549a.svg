  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone captures the tension between desire and emptiness. The palette features vibrant coral and orange to signify desire while softer tones of dust pink and charcoal reflect emptiness. This creates a visual echo where warm, saturated colors push against cooler, muted fields. The main collision occurs at the center, emphasizing a clash between vibrant patterns and faint emptiness.</desc>
