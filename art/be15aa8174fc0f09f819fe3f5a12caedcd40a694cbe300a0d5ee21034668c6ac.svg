<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Longing</title>
  <desc id="desc">This artwork embodies the contrasting emotions of desire and restraint through a dynamic interplay of saturated and muted tones reminiscent of heat and distance. The palette features hot coral and blood orange representing desire, contrasted by the charcoal and hollow blue embodying restraint. The central collision occurs in the middle rows where saturated patches reach against a locked, muted border, creating a visual spiraling pressure that evokes a sense of longing yet confinement. The broken pixel placements symbolize the imperfection of emotions, enhancing the overall narrative without literal representation.</desc>
