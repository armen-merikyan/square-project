<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Pulse and Reflection</title>
  <desc id="desc">The emotional tone is anchored in a tension between longing for connection and the resolve found in acceptance of brokenness. The selected palette includes warm coral and soft amber to embody the warmth of longing, while the cool tones of cold slate and blue black symbolize the resolve. The larger regions of warmer tones create a dominant feeling of longing (about 65% of the artwork), interrupted by colder, more defined shapes that suggest a structured resolve. The central collision occurs where these colors meet—a pulsing effect reminiscent of a heartbeat that seeks for connection yet feels the weight of isolation. Broken pixels introduce imperfections that highlight the theme of repair vs. damage, underscoring the narrative of longing within structure, with a visual flow that cascades down diagonally, guiding the viewer's eye across the piece into a serene yet urgent contemplation of presence and absence.</desc>
