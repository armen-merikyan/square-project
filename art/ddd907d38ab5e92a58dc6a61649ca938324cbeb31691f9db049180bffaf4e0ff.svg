<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall</title>
  <desc id="desc">This artwork reflects the tension between joy and grief through a contrast of color and form. The warm hues of yellow and orange represent joy, while the cooler tones of deep blue and muted purple embody grief. The upward-moving pixels on one side evoke hope and expansion, while the downward pattern suggests heaviness and fragmentation. The chosen palette supports this emotional journey, creating a visual dance between light and dark, where warmth attempts to break through the cooler shadows. The broken pixels introduce imperfection, enhancing the sense of conflict between the joyous spark and the weight of grief subtly hiding among the more vibrant colors.</desc>
