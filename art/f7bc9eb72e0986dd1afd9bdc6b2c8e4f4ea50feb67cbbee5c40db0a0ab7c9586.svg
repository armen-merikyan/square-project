  <title id="title">Unraveling Dualities</title>
  <desc id="desc">This artwork captures the emotional tension between defiance and submission through a sharp vs soft contrast. The palette features pink and dark maroon which represent the warmth of love and the coldness of betrayal. The color placements create a sense of bottom weight, symbolizing the struggle against submission at the center, culminating in a collision of noise against a muted frame. The bottom-to-top flow suggests a movement toward resolution, while the negative space emphasizes the inner conflict within each pixel cluster, embodying both openness and closure.</desc>
