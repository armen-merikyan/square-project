<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Echoes</title>
  <desc id="desc">The emotional tone centers around the tension of underlying hunger against the restraint of ash. The palette combines the soft, muted tones of ash like 'dust_gray' and 'off_white' with the hot accents of 'compressed_red' to illustrate moments of 'spark.' The primary collision occurs in the center, where a jagged interruption of the barcode pattern from 'spark' sharply interacts with the stacked structure of 'ash,' simulating an emotional debate. The empty space around embodies the feeling of unresolved memories and offers a stark relief against the denser clusters.</desc>
