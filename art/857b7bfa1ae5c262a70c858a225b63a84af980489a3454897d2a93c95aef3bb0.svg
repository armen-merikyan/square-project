<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The emotional tone is drawn from the conflict between control and surrender, represented through contrasting dense patterns and sparse areas. The palette of burnt orange, dark red, charcoal, and gold symbolizes a fiery intensity versus a muted calm. The collision between a structured flame pattern on one side and an island-like scattered pattern on the other creates a visceral tension. The center becomes an overfilled expression contrasted by the surrounding emptiness, representing both constraints and a longing for freedom.</desc>
