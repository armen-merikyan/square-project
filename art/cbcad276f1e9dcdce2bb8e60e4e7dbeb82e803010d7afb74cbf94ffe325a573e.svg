<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Disruption</title>
  <desc id="desc">The emotional tone wavers between confusion and clarity, represented through contrasting dark and light shades. The selected palette of navy, black, single white, and dim cyan illustrates the struggle between order and chaos, with dark colors symbolizing confusion and tension, while whites and cyans suggest a path to clarity. A checkerboard pattern collides against broken dots to enhance the visual dialogue, emphasizing the instability of symmetrical structures and invoking a sense of pulsing rhythm across the canvas. Negative space is intentionally preserved to allow for a breath amid the chaos.</desc>
