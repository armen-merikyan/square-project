<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">This artwork captures the emotional duality of joy and grief, using a color palette that blends bright yellows and oranges to evoke warmth with deep blues and muted purples that suggest sorrow. The pattern reflects a radial ripple where brighter colors pulse outward, while darker tones recede, creating a balance of pressure and release. The grid structure juxtaposes uniformity with asymmetrical interruptions, simulating an emotional experience that oscillates between joy and the weight of loss. Broken pixels introduce an imperfection, symbolizing intrinsic human experiences. This tension is visually expressed through a mix of both crowded and negative spaces, allowing for deep emotional engagement without literal representation.</desc>
