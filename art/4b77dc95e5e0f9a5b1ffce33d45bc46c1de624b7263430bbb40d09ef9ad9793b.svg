<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">This piece navigates the emotional spectrum between defiance and submission, with the upper half presenting strong contrasts reminiscent of pressure through a sharp, stair-like pattern in red and gray tones. The bottom half transitions to a softer, checker pattern in muted pinks and dark maroon, suggesting moments of quiet submission amidst the chaos. The broken pixels throughout instill a sense of imperfection, enhancing the theme of emotional collisions, while maintaining a deliberate asymmetry. The palette reflects a struggle between warmth and coolness, driving the narrative of conflicting emotions.</desc>
