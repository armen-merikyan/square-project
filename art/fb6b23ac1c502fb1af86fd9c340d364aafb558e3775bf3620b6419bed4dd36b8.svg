<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">This abstract composition embodies the emotional tension between vulnerability and strength. The palette, consisting of deep red oxides and muted creams, suggests a battleground of feeling, where the warm hues denote strength and the cooler tones reflect vulnerability. The central collision emerges through the contrast of dense blocks of color on one side, representing strength, interspersed with soft breaks of lighter shades, symbolizing vulnerability. This layout, dictated by the 'mirror_broken' concept, juxtaposes nearly symmetrical sides, disrupted by intentional broken pixels that create an echo of imperfection. This grants the piece a dynamic quality, embodying both safety in the solid colors and exposure in the transient lighter ones.</desc>
