<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">This piece explores the emotional tension between longing and resolve. The color palette, featuring pale aqua and ink blue as primary hues intertwined with alarm red, signifies the urgency of longing juxtaposed against the steadiness of resolve. The outer ring embodies the longing with a static pattern while the inner core represents resolve through a constellation-like design. The broken pixels introduce intentional disruptions, enhancing the feeling of imperfection and echoing the theme of repair versus damage. The main collision occurs in the center, where deep ink blue contrasts against vibrant alarm red, suggesting a dynamic interplay between serenity and urgency.</desc>
