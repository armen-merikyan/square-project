<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tones</title>
  <desc id="desc">This artwork manifests the emotional duality of softness and severity, where the warm whites and soft pinks represent gentle moments, colliding against the sharp contrasts of deep blacks and crimson, suggesting the weight of severity. The pulse marks and ring patterns intertwine, embodying the struggle between clarity and static noise, with a quiet field of light gray enveloping the denser colors, creating an interplay of pressure and relief. The main contrast emerges in the center, where the convergence of lighter and darker colors occurs, amplifying the emotional narrative of the piece.</desc>
