<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This artwork explores the emotional contrast between restlessness and peace, using a palette that harmonizes warm and cool tones. The left half represents peace through soft shades of rose clay and distant lilac, while the right side introduces the dynamic accents of cool blue and warm shadow, each vying for space. The central collision occurs where these colors meet, illustrating the tension between stillness and movement. The pattern of islands on the right side interrupts the flowing embers of the left, while broken pixels add elements of chaos, embodying concepts like memory and momentum.</desc>
