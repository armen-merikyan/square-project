<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order in Disarray</title>
  <desc id="desc">This artwork presents a visual tension between 'restlessness' and 'peace.' The palette, featuring soft pinks and grays contrasted with deep blacks and sharp reds, embodies the emotional struggle. The clean diagonal patterns of the peaceful hues clash with the chaotic, dripping edges of vibrant colors, depicting a narrative of memory and motion interrupted. The dominant black creates a substantial void that pulls the eye, while flickers of crimson ignite moments of intensity, illustrating the jagged journey from chaos to calm. The seed influences appear in the rising signal layout, showing a striving upward, battling with each restless droplet against a serene backdrop.</desc>
