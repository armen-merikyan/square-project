<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone of this piece explores the juxtaposition of vulnerability and strength. The palette, drawn from deep navy and black against softer dim cyan and a highlight of white, creates a stark contrast that speaks to pressure and release. The center, with a dense cluster of dark colors, represents strength, while the pale areas signal vulnerability. The main collision occurs in the center, where these opposing forces interact, creating a palpable tension that embodies the seed's themes. This abstract pattern emerges from the suggested movement and flow of 'cross_current', representing a dynamic interplay of emotional states, while broken pixels introduce imperfection, enhancing the concept of exposure wrapping around structured shelter.</desc>
