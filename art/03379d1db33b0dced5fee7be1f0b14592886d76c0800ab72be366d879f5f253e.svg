<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This artwork channels the emotional dynamics of love and betrayal through a structured yet chaotic layout. The left side embraces shadows of warm pinks and reds, invoking love’s gentleness, framed within a dark maroon that introduces depth and tension. Conversely, the right side, marked by muted gray tones, represents betrayal, featuring patterns that intersect in a maze-like fashion, creating a sharp contrast. The interaction between lighter hues on the left and darker shades on the right creates a cognitive dissonance, reflecting the inherent conflict of the emotions. The broken edges and the asymmetric placement of the colors point to a sense of fragmentation, akin to a relationship tethered between trust and treachery. This arrangement allows for an uninterrupted balance of negative space, evoking a sense of an empty room yet filled with unvoiced signals that linger in the air.</desc>
