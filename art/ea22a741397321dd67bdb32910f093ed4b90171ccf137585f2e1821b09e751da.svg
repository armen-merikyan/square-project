<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">This composition embodies the emotional struggle between defiance and submission. The chosen palette of warm coral and soft amber represents defiance, while cold slate and blue-black embody submission, establishing a vivid contrast. The main collision occurs centrally, where stacked and braided patterns intertwine, evoking a dynamic tension. The broken pixels create a sense of imperfection, echoing an incomplete repair amid the chaos, drawing on the seed's themes of invasion and density, forming an abstract narrative of resistance and enclosure.</desc>
