<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotion</title>
  <desc id="desc">The emotional tone reflects the tension between awe and terror, presented through a palette that juxtaposes warm and cool shades. The dark maroon and reds evoke a sense of terror, while the pink adds a softness, embodying awe. The central line represents stability, surrounded by chaotic patterns that break into the space, illustrating the collision of structured order against fractured moments of memory. The contrast occurs predominantly at the edges, where warm colors burst against cooler shades, suggesting an unresolved emotional interplay. Negative space emphasizes the weight of memory, symbolizing both presence and loss.</desc>
