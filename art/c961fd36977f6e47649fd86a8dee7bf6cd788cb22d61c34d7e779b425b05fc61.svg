<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Embrace</title>
  <desc id="desc">The emotional tone explores the tension between love and betrayal through a contrasting palette of warm pinks and cool grays. The left side embodies love with maze-like patterns suggesting warmth and comfort, while the right side contrasts with sharp, fragmented gray patterns representing betrayal and coldness. This juxtaposition creates a striking visual clash that speaks to the themes of inner conflict and emotional depth. The placement of colors creates a sense of movement from bottom to top, symbolizing an upward struggle, while remaining mindful of negative space, allowing room for reflection. There are broken pixels to introduce imperfection, echoing the fragility of relationships.</desc>
