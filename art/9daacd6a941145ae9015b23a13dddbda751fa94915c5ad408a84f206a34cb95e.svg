<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This piece explores the emotional duality of defiance versus submission. The contrast between the dark, grounding colors (black, dark violet) and the lighter, more ethereal hues (soft gold, pale green) creates a visual dialogue that reflects the push and pull of these emotions. The palette was chosen to embody the tension between fear and hope, with the dark shades weighing down the lighter ones, simulating a struggle. The layout adheres to the idea of corner invasion, diagonally spreading from the bottom left to create a sense of rising pressure. Broken pixels introduce an element of imperfection, representing the chaotic noise in the frame, while allowing for moments of quiet negative space, enhancing the abstract narrative of unresolved tension and emotional complexity.</desc>
