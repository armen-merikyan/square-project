<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resilience</title>
  <desc id="desc">This piece captures the emotional dichotomy of vulnerability and strength through contrasting color placement and patterns. The muted, dusty palette evokes memories while allowing the vibrant hues to serve as signals of strength and hope. The central light tan square represents vulnerability, surrounded by darker, more robust colors to signify strength. The dynamic interplay of 'grid' and 'mirror' patterns creates a visual tension, where the strength of the edges confronts the soft, exposed center, reflecting the ongoing struggle and connection between being vulnerable and feeling strong. Broken pixels disrupt the symmetry, suggesting imperfections inherent in both states of being.</desc>
