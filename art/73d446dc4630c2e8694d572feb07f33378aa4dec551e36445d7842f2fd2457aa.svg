<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">The emotional tone embodies a conflict between joy and grief, visualized through contrasting bright and dark hues. The palette, infused with vibrant yellows and oranges against muted blues and purples, captures the struggle between spark-like joy and heavy grief. The top four rows utilize a checker pattern to represent joy, suggesting moments of expansion, while the bottom rows display broken dots symbolizing grief's fracturing nature. This tension emphasizes the momentum from brightness to weight, creating a dynamic narrative of emotional collision and release. The left-weighted layout further symbolizes imbalance and longing, resonating with the theme of love intertwined with betrayal.</desc>
