  <title id="title">Eroded Symmetry</title>
  <desc id="desc">This artwork conveys the duality of vulnerability and strength through color contrasts and patterns. The palette predominantly features muted tones like sepia and dust_gray, which reflect the fragility of the exposed center, inviting contemplation. The main collision happens at the center where the crosshatch of vulnerability (light colors) meets the patchwork of strength (darker hues), symbolizing the struggle between exposure and protection. The absence of edges creates a sense of open space against dense clusters, embodying the emotional contrasts of safety and exposure, threat and resolve.</desc>
