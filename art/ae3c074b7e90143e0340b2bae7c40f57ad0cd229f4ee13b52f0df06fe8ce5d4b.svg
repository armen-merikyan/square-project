<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition embodies the tension between emptiness and desire, represented through contrasting colors and structured disruptions. The palette of hot coral and blood orange exudes warmth and saturated intensity of desire, while hollow blue and charcoal convey the void of emptiness. The interaction of fractured patterns suggests the struggle of suppressed aspirations. The central collision occurs with chaotic ember-like marks breaking through the cool perimeter, illustrating the relentless push against limits. The overall structure respects the quiet pressure indicated in the seed, balanced with enough negative space to evoke contemplation and yearning.</desc>
