<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Resilience</title>
  <desc id="desc">The emotional tone of 'spark vs ash' embodies a contrast between sudden brightness and settled dust, creating a visual tension. The selected palette, derived from vibrant lime and electric blue against deep black and magenta, reflects the burst of energy versus the weight of restraint. The composition follows a split horizontal layout, where the top 4 rows represent the 'spark' energy with bright, scattered colors, while the lower rows embody 'ash' with muted, channel-like patterns. This design leads to a central collision of contrasting elements, with the top bleeding into the bottom, representing unresolved memory versus erasure.</desc>
