<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissonance of Light and Shadow</title>
  <desc id="desc">This artwork embodies the emotional tension of envy versus gratitude, employing a palette that juxtaposes dark and light as well as warm and cool tones. The juxtaposition of soft gold and dark violet expresses a conflict between warmth (gratitude) and coldness (envy), illustrated through a segmented layout where the top half features zigzag patterns symbolizing envy, while the bottom half reveals a chaotic maze indicating gratitude's complexity. The center-heavy design creates an asymmetric balance, reflecting an unresolved tension, while the use of broken pixels introduces imperfection, emphasizing the fractured nature of these emotions. The emotional narrative flows downward, echoing the experience of grappling with one's feelings as they shift from lightness to weight.</desc>
