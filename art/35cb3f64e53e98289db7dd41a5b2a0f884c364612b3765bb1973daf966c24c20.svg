<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Against Restraint</title>
  <desc id="desc">This piece translates the emotional tension of restlessness vying with peace through a palette that evokes muted calm alongside sharp agitation. The blackened plum suggests depth and restraint, while small orange serves as an accent, symbolizing flickers of energy against a static border. The diagonal layout signifies conflict as the restlessness borders the peaceful corner. The lattice-like pattern slices through the horizontal calm, representing memory and motion. The intentional broken pixels create a sense of chaos within the structured framework, embodying the inherent disturbance of memory. The contrast is predominantly dark against light, inviting the viewer to feel the tension of unresolved emotional states.</desc>
