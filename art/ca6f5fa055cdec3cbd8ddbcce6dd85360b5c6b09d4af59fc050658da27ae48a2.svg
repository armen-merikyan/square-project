<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Echoes</title>
  <desc id="desc">This composition captures the tension between love and betrayal through contrasting colors and patterns. The palette consists of warm pinks and reds symbolizing love, juxtaposed with dark grays and maroons reflecting betrayal. The flow zigzags to echo the emotional turmoil, causing a rhythmic push and pull through the layout. Central to the piece is a chaotic arrangement that conveys both density in the darker regions and emptiness in lighter sections, creating an unresolved emotional conflict. Broken pixels add imperfection, enhancing the sense of turmoil and creating visual interest through interruption.</desc>
