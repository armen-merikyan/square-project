<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Shadows</title>
  <desc id="desc">The emotional tone of 'panic vs control' guided the use of a palette reflecting urgency and warmth, with burnt orange and dark red to evoke heated emotions, contrasted with charcoal for instability. The layout is split vertically, embodying the conflict between control and chaos, where the left side (control) features structured patterns with flaming colors, while the right side (panic) creates noise through fragmented dots of chaotic movement. Key contrast occurs in the collision of saturated colors against muted backgrounds, illustrating unresolved tension and emotional pressure.</desc>
