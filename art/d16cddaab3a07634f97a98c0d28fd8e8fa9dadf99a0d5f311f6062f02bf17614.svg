<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone of this piece reflects a struggle between defiance, represented by vibrant colors at the center, and submission, depicted through softer, muted tones towards the edges. The palette combines warm reds and pinks for the defiant elements with calming grays and dark maroons to evoke feelings of surrender. The main contrast occurs at the center, where defiance (flame pattern) collides with submission (negative cross), creating an intentional disruptive energy in the previously serene environment. The layout follows the 'island and sea' approach, emphasizing an inner cluster of intensity against a backdrop of emptiness, fostering a sense of tension and release within the structured 8x8 composition.</desc>
