<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone captures the tension between the rich saturation of desire and the muted restraint of emptiness. The palette features warm hues like hot coral and blood orange, which embody the saturation of longing, while hollow blue and charcoal represent the quiet, subdued space of emptiness. The main collision occurs in the center of the square, where patches of warm colors burst through the cooler edges, suggesting an imperfect repair or interruption. This reflects the struggle of overflowing desire against the boundaries of containment, allowing a visual echo between vibrant and muted fields, thus telling the story of emotional conflict.</desc>
