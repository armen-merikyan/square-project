<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This abstract piece explores the emotional spectrum between joy and grief, utilizing a palette that juxtaposes warm and cool tones. The top section, embodying joy, features brighter yellows and oranges in a crosshatch pattern, suggesting bursts of energy and expansion, while the descending blue and muted purple segments represent grief, creating a downward pressure akin to tears. The juxtaposition of light and heavy colors plays with the tension of contrasting emotions, with the zigzag flow giving a sense of continuity, evoking a wave-like rhythm. The intentional placement of broken pixels adds an element of imperfection, enhancing the complexity of the feelings, while ensuring that there is enough negative space to allow the piece to breathe and evoke contemplation.</desc>
