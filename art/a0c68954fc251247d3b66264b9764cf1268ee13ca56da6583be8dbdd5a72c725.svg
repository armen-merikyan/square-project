<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Explosive Harmony</title>
  <desc id="desc">The piece captures the emotional tug-of-war between 'rage' and 'calm' through a dynamic color and placement strategy. The palette features red and black as the primary emotions (rage) that burst into the cooler tones of pale blue and white, symbolizing calm. This arrangement reflects the tension between explosive energy and tranquil containment, with pulses of red zigzagging violently through a predominantly blue field. The composition balances symmetry and its negation, allowing colors to clash while still creating a coherent visual narrative that speaks to the theme of contained chaos. The broken pixels enhance the sense of imperfection, embodying the jaggedness of emotional transitions.</desc>
