  <title id="title">Tension in Contrast</title>
  <desc id="desc">This composition captures the emotional tension between relief and dread through a split layout. The top four rows use a braided pattern of light colors, symbolizing soft releases and exhalations, while the bottom four exhibit stacked dark hues reflecting inevitable descent and heaviness. The color palette oscillates between pale mint and storm gray, signifying the struggle between lightness and weight, and strategically placed broken pixels disrupt uniformity, echoing the tension in the emotional narrative. The major collision occurs in the center, where the lighter and darker patterns interrupt each other, embodying the delicate balance between chaos and order.</desc>
