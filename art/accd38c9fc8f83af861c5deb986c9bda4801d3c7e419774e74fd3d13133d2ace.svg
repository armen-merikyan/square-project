<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragile Boundary</title>
  <desc id="desc">The emotional tone captures the tension between vulnerability and strength, expressed through a palette of deep blacks and pale blues reflecting heavy weight versus lightness. The central area, rich in dark tones, conveys strength, while the outer colors mirror the fragility of vulnerability with softer shades. The collision occurs at the broken frame edges, illustrating emotional leaks and interplays between structured strength and delicate interruption. The chosen patterns—a grid representing stability and a braid indicating fragility—visibly disrupt each other, maintaining a balance of density and openness.</desc>
