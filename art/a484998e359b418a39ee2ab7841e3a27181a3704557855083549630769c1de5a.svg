<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Shapes</title>
  <desc id="desc">This abstract artwork captures the emotional tension of defiance versus submission through a clash of warm and cool colors. The palette features vivid hues like hot coral and blood orange, symbolizing defiance and brightness, while muted tones such as charcoal and dust pink embody submission and a receding softness. The main collision occurs centrally where vibrant patterns disrupt the surrounding muted fields, creating a sense of struggle between chaotic energy and quiet restraint. Inspired by the seed's exploration of boundary tensions and spiral dynamics, the arrangement reflects an inward spiral against the edges, creating an immersive sense of pressure and an underlying call for resolution.</desc>
