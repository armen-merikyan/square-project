<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragile Strength</title>
  <desc id="desc">The emotional tone reflects the delicate balance between vulnerability and strength, illustrated through the use of muted colors that imply fragility alongside deeper shades suggesting resilience. The palette of sepia, tan, dust gray, and faded blue captures the essence of both exposed vulnerability and solid strength. The main contrast occurs in the center where a mix of soft noise patterns collide with structured mirror patterns, representing the tension between exposure and shelter. The layout reflects a near symmetry, disrupted intentionally by 3 misplaced colors to echo the theme of imperfection and the concept of 'wound'.</desc>
