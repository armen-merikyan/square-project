<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This piece encapsulates the emotional tension between defiance and submission, using a palette that evokes safety and exposure. The contrast between warmer tones (shelter_green and warm_brown) and cooler elements (cold_white and open_blue) creates a dynamic interplay. The grid-like structure representing defiance clashes with the noise pattern symbolizing submission, reflecting the core of the seed — the push and pull of emotional states. The main collision occurs in the center, representing a threshold where order meets chaos, with intentional broken pixels introducing an element of imperfection, enhancing the feeling of disruption.</desc>
