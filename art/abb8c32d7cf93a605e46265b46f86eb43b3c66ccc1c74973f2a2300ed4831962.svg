<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone reflects the clash between vulnerability and strength, using the palette of warm coral and cold slate to symbolize the two extremes. The central composition reveals a dense cluster of the warm coral, representing strength, surrounded by soft ambers and cold slates suggesting vulnerability. The contrast occurs at the edges where the softer hues collide with the stronger central colors, creating a dynamic interplay of exposure versus shelter. This pattern evokes the tension of rising signals and the complexity of connection and alienation, with broken pixels as intentional disruptions that hint at imperfections in both strength and vulnerability.</desc>
