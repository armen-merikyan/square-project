<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This piece captures the emotional struggle between panic and control through a dynamic arrangement of warm and cool colors. The palette, inspired by 'ancient fire,' blends burnt orange and dark red to evoke urgency against charcoal and gold, suggesting both vibrancy and stability. The central contrast is created where the structured teeth pattern battles the chaotic maze pattern, leading to a feeling of conflict. The flow spirals inwards, reinforcing the idea of a spiraling tension, while broken pixels introduce an element of imperfection, symbolizing the fragility of control amidst chaos.</desc>
