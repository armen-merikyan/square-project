<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">The piece embodies the emotional contrast of restlessness and peace through color placement and tension. The selected palette of moss green, bone white, rust, stone gray, and small gold represents the struggle between cool solace and warm chaos. The collision occurs diagonally across the canvas, where warmer tones burst forth amidst cooler hues, signifying the ongoing fight between tranquility and unease. Broken pixels disrupt the flow, mirroring the unexpected interjections of memory and motion in life, while negative space adds to the feeling of unresolved tension.</desc>
