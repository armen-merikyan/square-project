<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Static</title>
  <desc id="desc">This artwork embodies the tension between restlessness and peace through a gradient of color and texture. The chosen palette—the signal green, electric blue, dead black, static gray, and hot magenta—reflects the chaotic elements of memory and motion. The dark colors suggest depth and uncertainty, while the accents provide moments of vibrancy interrupting that darkness. The main collision occurs diagonally, where static intermingles with bursts of clarity, fostering a sense of dynamic energy. The broken pixels throughout signify the imperfections and interruptions inherent in memory, creating a layered texture that reflects the complexity of the emotional interplay.</desc>
