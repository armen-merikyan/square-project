<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This composition embodies the dichotomy of desire and emptiness. The palette features warm hues of hot coral and blood orange to suggest desire, contrasted sharply with the cool, low-saturation hollow blue to evoke feelings of emptiness. The pattern is dominated by a vibrant center of channels that evoke a warm, inviting pull, while the outer border features a distant, halo-like coolness that symbolizes containment and restraint. The broken pixels introduce a sense of imperfection, echoing the interruptions and disruptions inherent in the struggle between reaching for fulfillment and the constraints holding one back. The center serves as the primary collision point, illustrating how longing can be both vibrant and trapped.</desc>
