<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasts in Exposure</title>
  <desc id="desc">This piece captures the emotional tension of vulnerability and strength through a palette that balances deep navy with dim cyan, representing depth and clarity respectively. The overwhelming black provides a dense foundation, creating contrast with the lighter shades that suggest exposure and fragility. The diagonal flow from the corner symbolizes an invasion of strength, while the broken edges create disruption, reflecting both the pressure and the softness inherent in vulnerability. The use of interrupted patterns illustrates the tension between the emotions, where rhythmic rips of light cut through dense color fields, converging towards the center, the heart of the collision.</desc>
