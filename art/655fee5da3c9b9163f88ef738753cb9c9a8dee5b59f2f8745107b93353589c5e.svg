  <title id="title">Fractured Signal</title>
  <desc id="desc">This piece captures the tension between clarity and chaos, embodying the emotional struggle between signal and noise. The palette features deep navy and dim cyan, suggesting a cool, lonely atmosphere disrupted by bursts of unexpected brightness. The contrast between the densely stacked bands of dark and the lighter accents illustrates the struggle of a coherent pulse amid static interference. The patterns of rain and constellation coalesce into a fragmented narrative, where moments of clarity flare against a backdrop of tumult, echoing the themes of exposure vs. shelter and memory vs. erasure.</desc>
