<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Balance</title>
  <desc id="desc">The emotional tone reflects the struggle between panic and control. The palette of sepia and faded blue relates to memories intertwined with comfort and anxiety, introducing warmth into chaos. The contrast of deep shades against lighter tones creates collision points suggesting friction between control and disorder. Arranging brighter colors (symbols of sparks) into a zigzag pattern contrasts with the heavy, darker mass, creating tension and suggesting an ongoing argument. The design embodies the process of striving for order amidst the chaos depicted through a primarily empty layout with contained bursts of color.</desc>
