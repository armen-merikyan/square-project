<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The artwork conveys the emotional tension between safety and exposure, reflecting the concept of a vulnerable center encased in varying levels of protection. The palette features warm browns and soothing greens to represent safety and shelter, contrasted with cooler whites and blues portraying exposure. The central band of lighter colors signifies a bright, exposed core that battles a dense backdrop, creating a rhythmic flow. This is emphasized by a lattice pattern of exposure intertwined with a thread-like density of safety. The most pronounced collision occurs in the center, evoking a sense of unresolved tension and dynamic interplay. Broken pixels disrupt the uniformity, suggesting imperfection and the complexity of emotional states.</desc>
