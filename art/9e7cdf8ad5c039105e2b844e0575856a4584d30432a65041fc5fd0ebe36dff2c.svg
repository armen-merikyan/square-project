<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This abstract artwork captures the intense emotional tension between fear and hope. The dark palette embodies fear with jagged edges in the top half, illustrated by varying shades of black and dark violet, creating a sense of pressure and chaos. The lower half introduces hope through a maze-like pattern of soft gold and pale green, representing a release and rising light amidst darkness. The contrast arises sharply at the middle, where dense tones collide with lighter shades, echoing the balance between despair and optimism. Broken pixels add imperfection, symbolizing the rawness of emotional experiences.</desc>
