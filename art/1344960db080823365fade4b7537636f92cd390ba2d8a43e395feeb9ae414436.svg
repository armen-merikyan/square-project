<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition embodies the emotional tension between desire and emptiness. The palette, dominated by warm coral and orange tones, represents desire, while cool shades of charcoal and hollow blue suggest emptiness. The layout features one corner overflowing with vibrant colors, representing intense desire, while the rest of the square, marked by quiet barcode patterns, signifies the containment of that desire within the boundaries of restraint. The collision of warm and cool tones is most pronounced in the bottom left corner, enhancing the sense of pressure. Broken pixels are strategically placed to convey a sense of disruption, reflecting the imperfect journey of navigating between these conflicting emotions.</desc>
