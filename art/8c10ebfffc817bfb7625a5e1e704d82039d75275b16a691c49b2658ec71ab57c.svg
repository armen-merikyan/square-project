<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This abstract piece captures the tension between rage and calm through contrasting colors. The palette blends fiery red with soft pale blue and stark white, embodying the collision of hot emotion against a cooler background. The main contrast centers in the upper half, where sharp red zigzag patterns (representing rage) clash against softer horizontal bands of blue, suggesting a struggle for control. Broken pixels and irregular placements illustrate imperfections in the emotional landscape, allowing the viewer to feel both the contained energy and the quiet spaces that seek to ground it.</desc>
