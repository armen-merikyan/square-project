<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">This artwork embodies the emotional dance between defiance and submission, using a palette of soft cyan and muted plum to create a melancholic atmosphere. The collision occurs predominantly in the center with bold patterns of defiance (braid) and softer patterns of submission (radial) clashing, represented by broken pixels that disrupt the smooth flow. The use of dark rain blue alongside lighter colors suggests depth and hidden tension, reflecting the struggle between order and chaos. This yields a dynamic composition while maintaining significant negative space, allowing the viewer to feel the conflict without overwhelming them.</desc>
