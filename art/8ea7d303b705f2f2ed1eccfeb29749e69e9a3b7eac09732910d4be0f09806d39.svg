<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasts of Emotion</title>
  <desc id="desc">This artwork represents the duality of love and betrayal, using a palette of warm pink and red contrasted with the cold gray and dark maroon. The top 4 rows embody love, with grid patterns symbolizing connection and unity, whereas the bottom 4 rows illustrate betrayal, framed in stark, sharper contrasts that suggest a break in trust. The arrangement echoes the themes of 'inside vs outside,' where warmth is displayed in locked patterns against noisy disruptions. Broken pixels introduce an element of imperfection, emphasizing the fragility of emotions in this tension-filled narrative.</desc>
