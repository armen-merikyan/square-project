<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone is a push and pull between rage and calm, depicted through the tension of hot reds colliding with soothing pale blues and blacks. The color palette emphasizes red as the dominating anger, with accents of black for depth and pale blue for tranquility, creating visual conflict. Main contrasts occur where jagged red patterns disrupt calm horizontal blue bands, suggesting chaos trying to breach tranquility. The seed's themes of contained versus overflowing are embodied through the density of color clashes and the spaces left in between, representing the quiet fields. The use of broken pixels introduces intentional disruptions, emphasizing the eroded symmetry aspect of the seed which adds to the narrative of emotional struggle.</desc>
