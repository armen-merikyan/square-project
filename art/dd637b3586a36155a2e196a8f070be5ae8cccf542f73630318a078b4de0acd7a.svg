<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Motion</title>
  <desc id="desc">The emotional tone reflects the tension between transient vitality (spark) and lingering remnants (ash), creating a visual dialogue of contrast. The palette of dark navy and black interspersed with soft dim cyan and white suggests a dormant potential—the weight of memory against the urge to ignite. The collision occurs at the center, where the glitch-like elements of 'spark' disrupt the softer, embers-like patterns of 'ash'. The layout spirals outward, evoking a sense of both pressure and release, while broken pixels hint at the impermanence of memory. This composition is a meditative exploration of resilience and fragility, where warmth meets coolness in an abstract rhythm.</desc>
