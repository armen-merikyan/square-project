<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This artwork explores the emotional duality between love and betrayal through contrasting warm and cool tones. The palette includes vibrant reds and soft pinks representing love, while deep maroons and grays depict the somberness of betrayal. The primary collision occurs around the center of the canvas where intense red interrupts softer pinks, reflecting a peak in emotional conflict. The edges have a burned effect, suggesting a crack forming under pressure, with silent negative space creating a tension between chaos and order. The arrangement is influenced by the seed's themes, such as the struggle between density and emptiness, illustrated by densely packed colors on one side and sparse, quiet areas on the other.</desc>
