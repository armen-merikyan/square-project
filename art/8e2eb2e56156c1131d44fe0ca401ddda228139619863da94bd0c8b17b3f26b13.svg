<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tensions</title>
  <desc id="desc">This piece embodies the emotional dichotomy of defiance and submission through contrasting patterns and colors. The 'quiet pressure' palette complements the tension, combining muted tones with sharp accents to highlight the central conflict. Dark navy dominates the composition, representing defiance, while faint peach subtly recedes, visually narrating submission. The conflict erupts at the center, where maze-like structures crash against softer echo patterns, representing the unstable balance between order and chaos. Broken pixels intentionally disrupt the smooth transition, evoking a sense of imperfection and emotional depth.</desc>
