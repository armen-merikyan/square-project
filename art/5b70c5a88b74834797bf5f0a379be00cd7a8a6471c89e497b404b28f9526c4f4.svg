<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shifting Tides</title>
  <desc id="desc">The emotional tone captures the tension between joy and grief, with joy represented through bright yellows and oranges, expanding outward from the center, while grief is depicted by deeper blues and muted purples, creating a sense of weighted pressure. The arrangement utilizes a diagonal flow to suggest movement and conflict, with central warm colors buttressed by cooler tones, reflecting both connection and separation. Broken pixels introduce imperfection, preserving the essence of grief, complemented by the structured edge style that signifies the boundaries between joy and grief. The abstraction emerges from the interplay of colors and the central focal point, portraying an emotional landscape rather than a physical representation.</desc>
