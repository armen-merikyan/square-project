<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order and Disruption</title>
  <desc id="desc">This artwork captures the tension between trust and suspicion through contrasting patterns. The top half employs a more rigid, structured layout with warmer tones to symbolize stability and trust, while the bottom half features chaotic, overlapping shades that reflect the unpredictability of suspicion. The blackened plum provides a shadowy backdrop, setting a pressure contrast against the muted cream and small orange accents that represent soft glow. The diagonal flow from top left to bottom right emphasizes the fall from clarity into uncertainty, while broken pixels disrupt the patterns, reflecting the fragility of trust in the face of suspicion.</desc>
