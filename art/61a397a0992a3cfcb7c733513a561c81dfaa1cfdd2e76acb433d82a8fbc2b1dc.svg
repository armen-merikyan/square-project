<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Balance</title>
  <desc id="desc">This composition explores the contrasting emotions of vulnerability and strength. The chosen palette of deep reds, soft pinks, and muted grays evokes a sense of complexity; warm tones suggest strength while cooler shades imply vulnerability. The main collision of colors appears centrally, creating a tension between the solid, framed patterns of strength against the delicate, broken thresholds of vulnerability, mirroring the ideas of exposure and safety inherent in the seed. The flow, designed to rise, further emphasizes an optimistic movement from the darker edges to lighter centers.</desc>
