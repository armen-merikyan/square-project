<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonance of Disruption</title>
  <desc id="desc">The emotional tone captures the tension between clarity (signal) and chaos (noise), employing contrasting colors to illustrate the struggle of a coherent pulse amid static. The chosen palette balances bright green and electric blue, symbolizing the signal, against deeper hues of black and gray representing noise. The collision emerges prominently in the center, where the vibrant signal colors clash with muted tones, encapsulating the theme of exposure versus shelter within an abstract framework. Each broken pixel adds to the sense of interrupted memory, echoing the underlying concept.</desc>
