<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Tension</title>
  <desc id="desc">This piece explores the emotional tension between safety and exposure through an asymmetric arrangement of colors. The palette of warm brown, shelter green, and pale skin contrasts against the coolness of open blue and cold white, representing the protective and vulnerable aspects. The main collision occurs in the center, where the warm and cool tones intersect, creating a visual echo that speaks to the delicate balance of pressure and release. Broken pixels in this artwork serve to disrupt the uniformity, adding nuance to the tension of the piece.</desc>
