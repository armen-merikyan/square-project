<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">The emotional tone of this piece captures the tension between quiet and pressure. The palette, consisting of off-white, dust gray, compressed red, dark navy, and faint peach, represents the struggle between a compressed weight and moments of quiet clarity. The dark navy provides a dense border, while the lighter colors create moments of space and lightening in the center, encapsulating the ideas of 'falling pixels' with a descending rhythm. The main collision happens in the center, contrasting the structured stack of pressure from the edges with the more organic stillness of the lighter colors.</desc>
