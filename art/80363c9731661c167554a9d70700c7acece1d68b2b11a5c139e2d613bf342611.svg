<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Order and Chaos</title>
  <desc id="desc">The emotional tone captures the struggle between intense rage and serene calm. The palette was carefully selected to juxtapose vibrant reds and whites against muted blues and blacks, representing the collision of emotions. The main contrast occurs in the top half, where jagged red scars disrupt the calming blue rain-like patterns below, symbolizing the invasion of chaos into serenity. The patterns embody a sense of rising energy, evoking an upward tension while maintaining a defined edge style that suggests a struggle between overflowing anger and contained calmness.</desc>
