<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Inner Space</title>
  <desc id="desc">The emotional tone reflects the tension between envy and gratitude, with the selected palette of lime, electric blue, magenta, and black representing contrasting forces. Lime suggests vibrancy and hope, while black introduces depth and a sense of void. The pattern formed by a maze-like structure represents envy, while the irregular broken dots signify gratitude, colliding in the center of the composition to evoke an inner struggle. The soft edges balance this tension, suggesting a delicate interplay between rising hopes and falling fears, with negative space representing an empty room waiting to be filled with emotion.</desc>
