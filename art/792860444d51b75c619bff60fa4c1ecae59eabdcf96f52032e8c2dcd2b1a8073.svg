<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This artwork captures the emotional tension between love and betrayal through juxtaposed color placements. The use of warm reds and pinks represent love, while darker maroon and gray evoke feelings of betrayal. The lighter colors create a spark against the darker hues, symbolizing fleeting moments of warmth amidst feelings of discord. The contrast emphasizes the idea of an almost mirrored image, where two sides are disrupted by skewed pixels, symbolizing broken trust. Patterns of crosshatch embody betrayal while soft edges signify the tenderness of love, leading to an overall composition that ebbs and flows between pleasure and pain.</desc>
