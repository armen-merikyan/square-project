<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inner Conflict</title>
  <desc id="desc">The emotional tone of 'Inner Conflict' expresses the tension between loneliness and connection, represented through contrasting colors that play off each other. The palette includes deep blacks to symbolize loneliness, punctuated by vibrant electric blues and magentas signifying fleeting connections. The layout, starting from the corner, evokes an invasion from the outside, embodying the struggle of noise (connection) against vast negative space (loneliness). Jagged edges create a sense of brokenness, while the inclusion of a few broken pixels adds a layer of imperfection that fosters a feeling of nostalgia and loss. The collision occurs predominantly in the center where bright colors clash against dark, fostering a dynamic pulse of emotion throughout the piece.</desc>
