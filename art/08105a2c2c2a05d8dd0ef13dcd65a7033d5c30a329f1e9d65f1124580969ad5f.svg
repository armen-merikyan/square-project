<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">The emotional tone reflects the longing of desire contrasted with the suffocating emptiness. The palette of hot coral and blood orange symbolizes desire's intensity, while hollow blue and charcoal evoke a sense of void. The main collision occurs predominantly in the center, where there is an interplay of maze-like patterns depicting desire battling against the calm, tide-like expanse of emptiness, creating a visual rhythm that feels both chaotic and structured. This tension between saturation and void embodies the seed's themes.</desc>
