<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dualities in Color</title>
  <desc id="desc">This artwork captures the tension between quietude and pressure, with a palette that balances soft, light colors against deeper, darker tones. The emotional distribution favors the muted tones, representing calm and stability, while the darker hues press against one side, creating a sense of compression. The movement flows diagonally from dark to light, facilitating a visual counterflow and inviting the viewer into the piece's depth. This interplay echoes the seed's themes of symmetry and disruption, where the outer edges feel eroded while maintaining a central focus point that reflects quiet clarity amidst chaos.</desc>
