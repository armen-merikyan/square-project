<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmony in Conflict</title>
  <desc id="desc">The emotional tone captures the tension between restlessness and peace, portrayed through a combination of clean grid patterns for peace and radial disruptions to reflect restlessness. The palette of warm, muted tones (rose clay and warm shadow) directly contrasts with sharper notes of cool blue and lamp gold, highlighting the moment of collision. This tension manifests in the center where the patterns converge, creating a vibrant chaos against a backdrop of tranquility that echoes the seed's themes of motion and memory. The presence of broken pixels signifies scars, mirroring the struggle of finding balance in contradictory emotions, while leaving intentional negative spaces emphasizes moments of quiet in the midst of unrest.</desc>
