<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Pulses</title>
  <desc id="desc">The emotional tone surrounds the tension between safety and exposure, with a central pulse echoing vulnerability and protection. The palette of soft greens and warm browns balances with cold whites and blues, creating an interplay of subtle warmth and stark exposure. The main collision occurs centrally, where darker colors interrupt lighter ones, suggesting a division and dialogue between vulnerabilities and protective shelters. The patterns reflect the emotional diversity: a flame pattern for exposure introduces dynamic tension, while a negative cross pattern symbolizes safety, creating structured chaos in the space.</desc>
