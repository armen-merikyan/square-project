<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition plays with the emotional duality of desire and emptiness. The palette, featuring hot coral and hollow blue, juxtaposes warm and cool tones to create a pulse of longing against an expansive void. The main contrast is found in the center, where saturated colors interrupt the quiet, halo-like emptiness of the surrounding area. Broken pixels introduce a sense of disruption, echoing the tension between overflowing desire and the containment of void. The spiral counterclockwise flow and descending layout mimic the interplay of longing rising slowly, made more poignant by the edges that hint at restraint, further driving the viewer's emotional engagement with the piece.</desc>
