<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Opposing Forces</title>
  <desc id="desc">The emotional tone captures the struggle between defiance and submission, represented through a palette of mourning black and deep blue as dominant tones reflecting intensity, while pale yellow adds an element of hopeful contrast. The collision occurs mainly in the center, where broken dots of defiance clash against the chaotic noise of submission, breaking the grid-like order and creating tension. This layout represents both the fight for control and the coexistence of opposing emotions, while the uneven placement of colors enforces a sense of disruption and release.</desc>
