<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">The emotional tone of restlessness meets peace through a collision of dark and light elements. The palette uses deep blacks to symbolize weight and tension, contrasted by pale blue and white that convey moments of calm and lightness. The main contrast occurs diagonally across the canvas, with patches of brighter shades interrupting darker areas, representing the delicate balance and struggle between restlessness and peace. The use of broken pixels within the darker areas reflects the imperfections and disruptions of motion, further enhancing the theme. The layout, favoring a mostly empty arrangement with concentrated areas of tension, echoes the feeling of an uneven pulse throughout the piece.</desc>
