<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal and Static</title>
  <desc id="desc">This composition embodies the tension between restlessness and peace through a diagonal argument. The color palette of hot coral and blood orange suggests fervor, representing restlessness, while the dusty pinks and charcoal invoke a sense of calm, depicting peace. The warm tones dominate the top section, while the cooler, muted tones on the lower half signify stability. The illegal pixel disruptions break the surface, mirroring the theme of interference in communication. The stark contrast between the bright accents and subdued backdrops creates an emotional dialogue, reflecting the push and pull between memories of motion and serene moments of stillness.</desc>
