  <title id="title">Weight of Emotion</title>
  <desc id="desc">This artwork juxtaposes the heaviness of grief on the left with the lightness of joy on the right. The colors depict deep blues and muted purples representing grief, contrasted against bright yellows and oranges that denote joy. The grid pattern on the left feels dense and pressing, while the right side has a more open and expanding feel, creating an emotional pulse. Broken pixels emerge along the boundary, signifying disconnection and the fragile nature of emotional sentiments.</desc>
