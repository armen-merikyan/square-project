<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Edge of Tension</title>
  <desc id="desc">The emotional tone conveys a struggle between defiance and submission through intense color contrasts. The chosen muted palette of sepia, tan, dust gray, and faded blue creates a sense of nostalgia and memory fractured by sharp edges of darker tones. The main collision happens at the center, where the dark pixels represent defiance surrounded by the softer edges of submission, suggesting a battle not just visually but also emotionally. The layout emphasizes an uneven distribution, mirroring the complexities of the emotions represented, while incorporating broken pixels to symbolize imperfect memories and experiences. The pattern of maze-like structure collides with flame-like warmth, embodying the duality of pressure and release.</desc>
