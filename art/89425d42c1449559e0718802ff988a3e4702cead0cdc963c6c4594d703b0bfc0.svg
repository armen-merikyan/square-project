<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall</title>
  <desc id="desc">This piece explores the emotional dichotomy of joy and grief, visualized through a radial gradient transitioning from bright yellows and oranges into deeper blues and muted purples. The top half illustrates joy with a swirling, expanding rhythm, while the bottom half portrays grief with heavier, dense clusters, suggesting a downward pull. The intersection is a gentle collision point that creates tension, allowing viewers to navigate between feelings of uplifting joy and the weight of grief. The layout promotes a visual falls-like effect, reinforcing the emotional flow of ascending joy and descending sorrow, while leaving negative space that symbolizes moments of quiet reflection.</desc>
