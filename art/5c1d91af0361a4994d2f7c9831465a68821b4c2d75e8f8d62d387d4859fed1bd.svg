  <title id="title">Hunger Against Restraint</title>
  <desc id="desc">The emotional tone reflects a struggle between desire and emptiness. The palette features warm hues of coral and orange to represent desire, contrasting with the coolness of charcoal and blue for emptiness. The top half of the grid is saturated and explosive, embodying desire, while the bottom half holds a quiet, subdued space depicting emptiness. The interplay between warm, reaching diagonals and cool, faint perimeters fosters a collision of feelings, creating a dynamic tension throughout the piece.</desc>
