<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This artwork encapsulates the emotional tension between joy and grief through contrasting colors and patterns. The palette combines vibrant yellows and oranges to represent joy, contrasted with muted purples and deep blues symbolizing grief. The overall arrangement creates a flow from bright, expanding patterns on one side to heavier, fragmented outlines on the other, mirroring the rise and fall of emotions. The thin outlines establish a boundary, while the broken pixels introduce imperfection, embodying the complexity of these feelings. The layout maintains an adequate negative space, reinforcing the contrast and visual tension.</desc>
