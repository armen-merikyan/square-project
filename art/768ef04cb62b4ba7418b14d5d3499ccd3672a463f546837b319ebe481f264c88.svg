<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Hearts</title>
  <desc id="desc">This piece interprets the emotional conflict of love and betrayal through a dynamic interplay of colors. The chosen palette of pinks and reds reflects the warmth of love contrasted against the darker tones of gray and dark maroon, symbolizing the pain of betrayal. The radial pattern suggests layers of emotional depth, while the stripes create tension and division, embodying the 'inside_vs_outside' theme by contrasting the soft with the sharp. The arrangement leaves negative space, providing breathing room that highlights the emotional tension inherent in the conflicts of love and betrayal. The ‘burned edges’ evoke memories of loss, while the irregular placements suggest brokenness and imperfection, inviting an introspective contemplation of the heart's complexities.</desc>
