  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition uses contrasting colors to express the emotional tension between exposure and safety. The palette blends soft greens and warm browns to symbolize protection while introducing cool whites and blues that evoke a sense of openness. The main collision occurs in the center, where light hues clash with darker borders, reinforcing the idea of pressure within the frame of safety. The vertical split creates a dynamic rhythm that captures the balance between vulnerability and comfort, manifesting through irregular patterns that echo tension and release.</desc>
