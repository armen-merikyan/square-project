<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This piece captures the emotional tension between confusion and clarity. The chosen palette—anchored in burnt orange, dark red, charcoal, and gold—reflects the warmth of clarity against the cooling, darker tones representing confusion. The contrasting light and dark hues create a sense of depth and dynamic tension. The arrangement employs a mirror pattern that is subtly disrupted, creating asymmetry. Key collisions happen at the center where the colors clash and create an illusion of falling pixels, suggesting a breakdown in clarity. This pattern invites contemplation of the emotional push and pull between order and chaos.</desc>
