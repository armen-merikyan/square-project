<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Amidst Static</title>
  <desc id="desc">The emotional tone of the piece centers on the struggle between clarity (signal) and chaos (noise). The selected palette represents this contrast: 'signal_green' symbolizes clear intent, while 'dead_black' and 'static_gray' embody obscured clarity and the noise effect. The layout is structured as a dense island of organized colors (the signal) surrounded by a chaotic sea (the noise), with the main collision of bright accents (electric_blue, hot_magenta) interrupting the quiet fields. Broken pixels are distributed to add layers of complexity, suggesting scars of disruption in an otherwise orderly 'pulse'.</desc>
