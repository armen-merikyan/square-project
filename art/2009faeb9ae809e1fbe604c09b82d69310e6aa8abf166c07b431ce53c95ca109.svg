<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioning Spiral</title>
  <desc id="desc">This composition expresses the emotional tension between vulnerability and strength through contrasting textures and patterns. The palette combines clean white and ice blue for a sense of calm, punctuated by warning orange that acts as a focal point of conflict. The pulse marks signify strength, while the stair patterns represent vulnerability, both colliding at the center of the grid. The layout spirals inward, creating a dynamic flow that amplifies the emotional turmoil of the piece, where the bright accent colors disrupt the muted fields, echoing the sharp contrasts in the seed.</desc>
