<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Torn Affection</title>
  <desc id="desc">This piece embodies the emotional tension between love and betrayal. The left half, filled with warm pinks and soft grays, represents love through a checker pattern that evokes warmth and connection. The right side, dominated by dark maroons and contrasting sharp edges, reflects betrayal, expressed through fragmented noise that suggests disruption and mistrust. The jagged edges along the central divide symbolize the break in symmetry, reinforcing the emotional collision. This combination creates a stark visual dialogue, illustrating the nuances of human emotion through color and form, rather than explicit imagery.</desc>
