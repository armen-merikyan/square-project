<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Harmony</title>
  <desc id="desc">This composition explores the emotional dichotomy between longing and resolve, where longing is represented by broken dots in dim cyan and navy, introducing a sense of depth and fragmentation. Resolve is suggested through the thread-like interspersing of clearer, structured lines in white and light shades, bringing clarity and stability. The collision occurs centrally with a zigzag of clear versus broken elements creating a tension that evokes the push and pull of desire and determination. The use of black provides a quiet space, reinforcing the contrasts between emotional states, while allowing negative space to suggest serenity amidst urgency.</desc>
