<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Awe and Terror</title>
  <desc id="desc">The emotional tone embodies the juxtaposition of awe and terror, using the 'ancient fire' palette to evoke a sense of warmth clashing with darkness. Dark reds and charcoals create a canvas of looming terror, while burnt orange offers pockets of awe within this turmoil. The structured layout mirrors a split-screen effect, inducing a sense of order against the chaos of noise patterns, echoing the dynamic of awe vs terror. The broken pixels and soft edges introduce tension and imperfection, reinforcing the theme of instability within stability, and suggest fragmented memories or experiences.</desc>
