<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center Pulse</title>
  <desc id="desc">This artwork encapsulates the emotional tension between softness and severity through a contrasting palette of muted and sharp colors. The use of powder pink and warm white suggests softness, while carbon black and sharp crimson introduce severity. The central pulse of colors represents a collision between light and dark, with a structured flow descending from the top, evoking the feeling of falling—a blend of vulnerability and strength. The arrangement signifies an open gate, inviting interpretation while maintaining a sense of weight at the bottom, reflecting guilt and forgiveness.</desc>
