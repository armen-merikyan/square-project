<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The artwork captures the tension between vulnerability and strength through a deliberate collision of soft and bold colors. The pale interior symbolizes exposure, while the darker borders invoke a sense of shelter. Using muted plum and soft cyan as the primary palette conveys a melancholic wonder, while contrasting with the deep rain blue and lavender gray, representing resilience against external pressures. The flow from the right creates an imbalance, suggesting the invitation of strength into the vulnerable space. Broken pixels serve as disruptions, reflecting imperfections of emotion. This abstract composition thus narrates a story of resilience amidst vulnerability, illuminated in the center, with stark contrasts at the borders.</desc>
