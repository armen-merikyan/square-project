<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone is defined by the clash between desire's vibrant saturation and the insistent restraint of muted colors. The palette of red oxide and blackened plum represents desire's warmth and comfort, contrasting sharply with muted cream and iron gray, symbolizing the boundaries of restraint. The central collision occurs in the middle rows, where the 'islands' of rich colors are interrupted by the 'negative cross' of muted tones, creating a tension that captures the essence of seeking and holding back. This arrangement embodies the push and pull of craving against confinement, illustrating the spiral pressure of emotions confined within sealed edges.</desc>
