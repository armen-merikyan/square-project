<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone underscores a tension between control and panic, manifesting as structured chaos. The palette combines red and gray tones, where gray represents the stability of control and red symbolizes the disruptive nature of panic. The density of colors clashes at the center, resembling sparks against fractured lines, embodying the collision of emotional states. The patterns juxtapose a consistent maze on the edges against a radial explosion in the core, visualizing the internal battle of turmoil and restraint. The layout emphasizes a 4x4 core surrounded by stable borders, reflecting the idea of an empty room disturbed by unseen forces.</desc>
