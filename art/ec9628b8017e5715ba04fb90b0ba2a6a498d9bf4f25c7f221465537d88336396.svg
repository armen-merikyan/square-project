  <title id="title">Tension Between Light and Weight</title>
  <desc id="desc">The artwork captures the emotional tension between joy and grief using a palette that contrasts the brightness of yellow and orange against the deep blues and muted purples. The left side features more vibrant, noise-like patterns to symbolize joy, while the right side adopts a framed, more structured approach to invoke grief. The central split serves as a hard edge, marking the emotional collision, and the vertical flow complements the layout, echoing a journey from darkness to light, while maintaining density to reflect the struggle between feelings.</desc>
