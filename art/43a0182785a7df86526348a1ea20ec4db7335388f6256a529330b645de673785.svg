<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Connections</title>
  <desc id="desc">The piece explores the tension between loneliness and connection by contrasting deep, muted colors with sharp bursts of brightness. The palette, heavy on shades of red, gray, and dark maroon, echoes feelings of isolation while the soft pink introduces warmth and potential for connection. The grid-like arrangement creates a sense of confinement, interrupted by asymmetrical patterns — the colors collide in this structured layout, symbolizing the push and pull of embracing or shunning connections. The broken pixels add a layer of imperfection, enhancing the emotional resonance and reflecting the raw nature of human relationships.</desc>
