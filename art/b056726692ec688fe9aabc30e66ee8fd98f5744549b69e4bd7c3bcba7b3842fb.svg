<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Clash of Balance</title>
  <desc id="desc">This composition explores the duality between control and surrender through contrasting density and color. The palette of lime, black, electric blue, and magenta evokes a mechanical emotion, with lime offering a vibrant pulse against the deep void of black. The resonance is amplified at the center, where the electric blue and magenta collide, representing pressure against release. The broken dots of the surrender pattern interrupt the rigidity of the control channels, suggesting an emotional stutter step. This juxtaposition allows for both tension and resolution, giving life to an abstract story that is both filled and vast, echoing the themes of containment and overflow.</desc>
