<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center Pulse</title>
  <desc id="desc">This artwork embodies the emotional tonal conflict between defiance and submission. The palette of stain brown, ash gray, warm ivory, soft gold, and deep wine enhances this struggle, suggesting warmth against a backdrop of deeper tensions. The main collision occurs at the center, where crack patterns of defiance in bright jewel tones interrupt the crosshatch lines that recede into muted shades, creating a visual tension that spirals inward, echoing the seed's themes of invasion and density against emptiness. The negative space reinforces the void and uncertainties present in the concept.</desc>
