<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Flame and Shadows</title>
  <desc id="desc">This artwork reflects the emotional contrast between joy and grief through the use of warm oranges and yellows contrasting with deeper shades of blue and muted purples. The outer border embodies grief with its darker hues, providing a frame of heaviness and fragmentation, while the inner core represents joy with a brighter, rising flame-like pattern. This juxtaposition creates a tension that echoes the balance of emotional states, with the flow suggesting an orbit of feelings in conflict and harmony. The use of broken pixels introduces an imperfection that symbolizes the frailty of these emotions, inviting the viewer to contemplate the nuances of joy and grief as interdependent experiences.</desc>
