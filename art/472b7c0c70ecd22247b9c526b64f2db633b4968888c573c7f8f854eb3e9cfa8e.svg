<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork captures the tension between desire and restraint through a juxtaposition of saturated and muted colors. The palette of red oxide, blackened plum, muted cream, and iron gray emphasizes a dynamic interplay, suggesting an emotional pull that meets with a restrained border. The falling pixel layout echoes the gravity of desire, while subtly introduced broken pixels symbolize imperfections in the quest for fulfillment. The primary collision happens centrally, where bright colors are interrupted by the muted field, portraying the struggle between longing and limitation.</desc>
