<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition captures the emotional tension of desire and emptiness through contrasting warm and cool colors. The palette features hot coral and blood orange for desire, infused with hollow blue and charcoal to signify emptiness. A lattice pattern suggests a saturated pull, while the scattered repair layout symbolizes interrupted fullness. The main contrast lies at the center where warm colors collide with shadowy tones, evoking a sense of urgency and restraint against a backdrop of quiet pressure, drawing on the spiral and ordered disruption themes from the seed.</desc>
