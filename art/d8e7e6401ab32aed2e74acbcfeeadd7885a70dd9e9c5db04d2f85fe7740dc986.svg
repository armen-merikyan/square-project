<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">The emotional tone reflects a duality of panic and control, using sharp contrasts between dark and bright shades. The chosen palette of burnt orange, dark red, charcoal, and gold illustrates the struggle between warmth and instability. The layout creates an argument grid where chaotic splits (representing panic) are juxtaposed against stable checker patterns (representing control). Broken edges introduce a sense of imperfection and conflict, suggesting that neither emotion can fully dominate the canvas, and the collision of these colors emphasizes the tension between them. The row arrangement maintains negative space, allowing the composition to breathe while still evoking a sense of unease and disorder.</desc>
