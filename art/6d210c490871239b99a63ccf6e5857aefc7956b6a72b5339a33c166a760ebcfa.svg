<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">This artwork explores the emotional dichotomy of panic and control through a split vertical layout and contrasting palettes. The left half embodies chaos with deep purples and jagged edges, suggesting intensity and disarray, while the right half introduces softer, more reflective greens and golds, representing stability. The collision occurs at the center, where these contrasting emotional flows interact, creating a dynamic tension. The ‘burned edges’ effect is achieved through strategically placed broken pixels, which disrupt symmetry and echo the tumultuous feelings described in the seed.</desc>
