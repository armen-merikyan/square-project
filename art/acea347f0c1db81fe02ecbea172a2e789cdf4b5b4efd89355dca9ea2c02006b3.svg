<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Yearning</title>
  <desc id="desc">This piece captures the emotional collision between desire and restraint through a contrasting palette of warm reds and muted creams against darker, more restrained hues. The saturated red oxide and small orange splashes represent desire, breaking through the muted cream and iron gray lattice, which symbolizes containment. Main contrasts happen in the central area, where vibrant colors push against the boundaries created by cooler tones, illustrating a struggle between saturation and restraint. The layout reflects mirrored tension, interrupted by intentional broken pixels that disrupt symmetry, echoing the complexity of the emotions described in the seed.</desc>
