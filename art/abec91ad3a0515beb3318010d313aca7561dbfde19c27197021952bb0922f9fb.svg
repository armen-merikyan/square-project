<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork captures the emotional tension between rage and calm, represented through a dynamic clash of colors and patterns. The palette, comprising red, black, pale blue, and white, embodies the heat of anger (red) colliding with the soothing quality of calm (pale blue). A diagonal flow begins in the corner, where bright red and black accents erupt, overwhelming the softer blue and white stripes that symbolize controlled calm. The contrast is raw, emphasizing the emotional collision at the top left corner while the calm spreads across the rest of the grid. Broken pixels create an organic disruption, reinforcing the sense of conflict and intensity, manifesting the idea of pressure from one corner that seeks to overflow into the calm, echoing the wrestling sensations of rage and tranquility.</desc>
