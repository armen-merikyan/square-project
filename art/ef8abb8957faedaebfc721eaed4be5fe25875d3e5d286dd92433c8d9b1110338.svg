<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Convergence of Tension</title>
  <desc id="desc">This composition captures the emotional interplay of restlessness and peace, invoking a narrative of tension against calm. The palette blends deep navy with soft dim cyan, symbolizing the internal struggle between a turbulent mind and calming moments of clarity. The palette reflects a balance of heavy and light tones, with the darker shades dominating, representing restlessness (55%+) at the edges. The center features serene patches of color, interrupted by 'broken pixels' representing the disruption of peace, creating an erratic, yet visually engaging flow. The diagonal arrangements echo movement, enhanced by the 'stair_step' shaping that drives the viewer's eye across the square, embodying memory versus motion.</desc>
