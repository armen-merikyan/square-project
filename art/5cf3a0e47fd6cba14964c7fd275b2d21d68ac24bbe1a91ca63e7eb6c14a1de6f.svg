<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balancing Light and Weight</title>
  <desc id="desc">This artwork captures the emotional tension of fear and hope. The dark palette reflects fear through deep blacks and purples, while soft gold and pale green hints suggest hope and light. The top-heavy design embodies an upward flow of hope against a weighted base of fear, using a crosshatch pattern to create a complex emotional landscape. The glowing edges highlight transitions between feelings, while subtle disruptions hint at internal conflict. This composition maintains a clear negative space, inviting contemplation of the struggle between the two emotions.</desc>
