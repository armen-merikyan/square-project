<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold Echo</title>
  <desc id="desc">This artwork embodies the emotional tension between longing and resolve. The warm coral and soft amber tones represent the warmth of yearning, flowing in a rippled pattern across the canvas, while the cold slate and blue-black colors signify resolve, structured as negative crosses, creating a dynamic tension. The collision occurs at the center, where the two patterns overlap, illustrating the jagged transition between introspection and determination. Broken pixels in the corners add texture and depth, representing the imperfections and scars of the emotional journey.</desc>
