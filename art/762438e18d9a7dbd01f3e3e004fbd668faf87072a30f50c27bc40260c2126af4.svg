<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">This artwork captures the emotional duality of love and betrayal, represented through a palette of warm and cool colors. The pinks and reds symbolize love, while the dark maroon and gray embody betrayal, creating a stark contrast that reflects tension and conflict. The use of noise pattern for love contrasts sharply with the striated pattern for betrayal, illustrating their opposing emotional states. The central arrangement creates an impression of struggle, as if the love is being overshadowed by betrayal. Broken pixels add imperfection, mirroring the flaws in human emotions, and the layout serves as an 'argument grid', where each color fights for dominance, invoking a sense of unresolved conflict.</desc>
