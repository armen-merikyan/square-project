<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This composition conveys the tension between control and surrender through the use of fragmented patterns and contrasting colors. The pale mint and soft sky colors represent moments of release and softness, while storm gray and near black create a sense of pressure and confinement. The central portion is visibly occupied by broken dots, suggesting overflow and vulnerability, while the edges maintain a checkerboard pattern that reflects the idea of control. The contrast of dense areas against open spaces evokes feelings of hesitation and reflection, capturing the emotional journey from control to surrender.</desc>
