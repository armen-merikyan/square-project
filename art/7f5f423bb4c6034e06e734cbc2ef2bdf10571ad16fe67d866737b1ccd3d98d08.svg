<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone portrays a struggle between explosive rage and serene calmness. The palette of deep reds and pale blues represents this duality, with black introducing depth and contrast. The center of the grid, filled with high density and sharper colors, symbolizes the 'overfilled' nature of rage, while the edges feature broken dots of cool blue to create a stark contrast with occasional black interruptions. The arrangement reflects the collision of patterns; where the crosshatching of rage meets the soft tranquility of calm. This visual dialogue captures the essence of the seed where chaos meets order, interruptions echoing in a quiet field.</desc>
