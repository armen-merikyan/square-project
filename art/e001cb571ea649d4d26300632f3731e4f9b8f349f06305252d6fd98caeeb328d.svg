<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Clarity Amidst Chaos</title>
  <desc id="desc">This piece explores the interplay between confusion and clarity, reflecting the emotional tension of overlapping paths and false symmetry. The palette of navy, black, and dim cyan evokes feelings of isolation, while flecks of white challenge the density of black, creating tension. The pattern shifts from radial clarity in the center to a chaotic stair-step confusion at the edges, showing a transition from calm to pressure. Broken pixels contribute to the theme of imperfection, enhancing the feeling of disarray against the ordered core.</desc>
