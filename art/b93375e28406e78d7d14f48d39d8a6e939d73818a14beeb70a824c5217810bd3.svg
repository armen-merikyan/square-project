<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece explores the emotional tension between safety and exposure through the juxtaposition of soft, warm shades of green and brown with cool, pale whites and blues. The central row creates a 'passage' that symbolizes the thin seam between vulnerability and protection, allowing for a gentle echo of colors on either side. Broken pixels introduce a level of imperfection that reflects the fragility inherent in this balance, while the swirling patterns of 'fault line' (exposure) and 'shatter' (safety) collide, suggesting an unresolved dialogue between these two emotional states. This composition captures the depth of the human experience as we navigate between seeking shelter and facing the broader world.</desc>
