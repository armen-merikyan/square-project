<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tidal Tension</title>
  <desc id="desc">The emotional tone reflects a struggle between certainty, with its firm boundaries and structured patterns, and curiosity, characterized by unexpected disruptions and ambiguous paths. The palette includes saturated colors like electric blue and magenta for vibrancy, contrasting with the muted black for depth. The collision occurs in the center where the organized grid of certainty (top half) meets the chaotic stepwell pattern of curiosity (bottom half), illustrating a tide that disrupts and intersects each emotional wave, accentuating the push and pull between order and curiosity.</desc>
