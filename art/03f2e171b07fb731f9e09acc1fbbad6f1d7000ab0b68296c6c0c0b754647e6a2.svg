<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Forces</title>
  <desc id="desc">The piece encapsulates the emotional struggle between control and surrender through a palette of muted and warm colors. The dominant warm ivory (#f0e1c6) suggests a yielding softness, contrasted by the darker deep wine (#6d2e2a) and stain brown (#6b4f4c), evoking a sense of primary pressure. The layout features a dense pattern on the right, where the pressure band clashes with quiet channels on the left, symbolizing the conflict. The broken pixels introduce intentional disruptions, reflecting stutter steps and the feeling of an ongoing battle, while leaving ample negative space enhances the emotional narrative of imbalance.</desc>
