<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Stillness</title>
  <desc id="desc">The emotional tone of the piece juxtaposes the turmoil of rage against the tranquility of calm. The palette is drawn from deep reds and blacks representing intensity, while soft pale blue and white embody serenity. The main clash occurs centrally, where jagged patterns of red sharply interrupt the subdued blue background, creating a visual dialogue of tension. This seed’s exploration of signal versus noise reflects in overlapping patterns where warmer colors erupt amidst cooler shades, emulating a retreating calm engulfed by chaos, yet still leaving open spaces reflecting unresolved feelings.</desc>
