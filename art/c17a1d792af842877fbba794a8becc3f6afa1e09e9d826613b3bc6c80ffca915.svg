<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Control</title>
  <desc id="desc">This artwork reflects the emotional tension between panic and control. The chosen palette of navy, black, and dim cyan suggests a sense of depth and solitude, while white creates sharp contrasts that evoke fragile moments of clarity. The arrangement instigates collisions between dense dark clusters and the energizing white pixels, metaphorically embodying the ‘spark’ amid chaos. The pattern flows diagonally, with heavier colors in the corners representing chaos and lighter, sparser colors in the center, suggesting a struggle for stability within a confined space.</desc>
