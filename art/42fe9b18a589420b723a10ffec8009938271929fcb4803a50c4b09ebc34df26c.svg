<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone captures the struggle between desire and restraint, depicted through warm saturated colors clashing against muted tones. The palette reflects this dichotomy: a vibrant red oxide and small orange represent the intensity of desire, while blackened plum and muted cream embody the calm constraints. The dominant saturation in the top left corner resonates with the 'corner invasion' layout, while the stripes representing restraint weave throughout, creating visual tension. The chosen shapes and colors suggest a narrative of longing pressed against barriers, emphasizing both collision and edges.</desc>
