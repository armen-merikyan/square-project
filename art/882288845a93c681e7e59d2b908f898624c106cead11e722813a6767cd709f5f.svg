<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow of Tension</title>
  <desc id="desc">The artwork embodies the emotional tension between defiance and submission. The palette of warm clay and cool blue evokes intimacy and distance, representing the push and pull of these opposing forces. The central cluster of color represents the defiant core, surrounded by a veil-like texture created by muted hues, illustrating submission. The uneven borders emphasize chaos encircling the calm center, creating a dynamic pulse. The grid reflects a structured chaos, manifesting the contrasts of pressure versus release as lifted layers appear to flow inward, suggesting a story of struggle and balance.</desc>
