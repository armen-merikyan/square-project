<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This piece captures the contrasting emotions of dread and relief through a careful arrangement of colors. The top half represents dread with a dark palette that immerses the viewer in a heavy atmosphere, utilizing maze-like patterns that evoke compression and weight. The bottom half provides a sense of relief with lighter, flame-like colors suggesting warmth and release. A clash occurs at the midline where dark hues collide with soft gold and pale green, embodying the tension between despair and hope. The broken pixel edge style enhances the feeling of imperfection and chaotic interplay.</desc>
