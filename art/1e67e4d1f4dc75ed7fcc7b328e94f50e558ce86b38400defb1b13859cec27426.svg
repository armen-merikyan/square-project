<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Echoes</title>
  <desc id="desc">This composition explores the emotional tensions of longing and resolve through a palette that combines clarity with confusion. The intense ink black and vibrant warning orange serve as focal points, creating a collision at the center of the grid, akin to the struggle between chaos and order. Broken pixels introduce dissonance, reflecting moments of unresolved feelings, while clean white and ice blue create a quiet field, embodying both distance and intimacy. The interplay between structured noise and a constellation of longing is portrayed in the patterns across the grid, where a clear diagonal flow punctuates the calm spaces with intense bursts of color, allowing the viewer to experience the depth of emotion in abstract form.</desc>
