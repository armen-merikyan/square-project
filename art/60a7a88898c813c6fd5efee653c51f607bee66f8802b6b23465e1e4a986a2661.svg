<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Dichotomy</title>
  <desc id="desc">This artwork embodies the emotional tension between longing and resolve, highlighting the dual nature of desires intertwined with the harsh realities of existence through a palette that juxtaposes warmth with coolness. The selected colors of 'shelter_green' and 'open_blue' create a calm yet urgent atmosphere, while 'warm_brown' and 'cold_white' introduce contrasting elements of comfort and starkness. The collision occurs prominently in the center, where the maze-like patterns of longing clash with the tooth-like structures of resolve, creating a dynamic tension resolved by quiet edges that suggest both containment and overflow. The arrangement hints at a reflective journey, symbolizing both the scars and repairs from past experiences. Negative space is preserved to enhance the feeling of introspection, allowing the viewer to engage with the emotional narrative.</desc>
