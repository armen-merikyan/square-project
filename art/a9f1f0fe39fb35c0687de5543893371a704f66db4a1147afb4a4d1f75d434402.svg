<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone reflects a delicate balance between strength and vulnerability, illustrated through a juxtaposition of solid hues against lighter, more fleeting colors. The palette of 'melancholy wonder' expresses depth and tranquility, utilizing soft cyan and moon white to convey an exposed lightness, while muted plum and rain blue add weight and stability. The main contrast occurs in the center, where the two emotional states collide, creating a tension that embodies protection versus exposure. The layout reinforces these themes through a split vertical arrangement that establishes a clear dichotomy, where strong, thick edges frame a fragile, delicate center.</desc>
