<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Tension</title>
  <desc id="desc">The emotional tone reflects the struggle between defiance and submission through a symphony of colors. The palette of melancholy wonder—combining rain blue, lavender gray, moon white, soft cyan, and muted plum—evokes a sense of unresolved tension and soft surrender. The center of the square features a dense radial pattern representing defiance, while the edges transition into broken dots signifying submission. This juxtaposition creates a visual pulse that evokes the feeling of being caught between chaos and order. The interruption of quiet channels within this dense color atmosphere suggests an oscillation between the two emotional states.</desc>
