<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">This piece captures the emotional tension between relief and dread through a contrasting color palette of dark maroon and light pink. The arrangement showcases a top-weighted heaviness in the upper part, paralleling life's stresses, while a lighter ring pattern radiates from the lower corner, representing hope. The collision between dense dark colors and lighter tones creates a dynamic interplay, reflecting the unresolved emotions suggested by the seed. The maze-like structure implies complexity, while leaving negative spaces enhances the feeling of emptiness, mirroring an 'empty room' vibe.</desc>
