<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Forces</title>
  <desc id="desc">This artwork captures the emotional dichotomy of vulnerability and strength through a split vertical layout. The left side, filled with softer hues like soft cyan and lavender gray, embodies vulnerability—the colors radiate an unshielded light, creating a sense of exposure. The right side contrasts with stable, sharper blocks of muted plum and rain blue, representing strength and resilience. The collision happens at the center, where radial patterns of vulnerability clash with the static strength, highlighting the tension and interplay between these emotions. Broken pixels disrupt the flow, adding texture and depth, embodying the unpredictability of emotional experiences.</desc>
