<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Terrain</title>
  <desc id="desc">The artwork explores the tension between tenderness and rage through the interplay of color and pattern. A warm red signifies the hot center of rage, while the cool pale blue represents the calmness of tenderness. The layout captures the 'corner invasion' where rage starts in the bottom left corner, suggesting an overwhelming force infiltrating quiet space. The stepwell pattern of tenderness contrasts sharply with the embers of rage, creating a dynamic rhythm. The broken pixels serve as intentional disruptions, symbolizing guilt and forgiveness around the edges, anchoring the chaos of emotion. This piece tells the story of emotional struggle, where warmth confronts an encroaching storm.</desc>
