<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Pressure</title>
  <desc id="desc">The emotional tone captures the tension between 'panic' and 'control' by employing a palette that contrasts warm and cool colors. The use of vibrant yellows and oranges suggests urgent energy, while deep blues and muted purples introduce a sense of calmness, highlighting the emotional collision in the center. The pattern blends checkerboard elements from 'control' and jagged, spark-like structures representing 'panic', leading to an outer gradient effect that evokes the feeling of pressure radiating inward. Broken pixels within the structure add to the imperfection, reinforcing the sense of chaos amid control and enhancing the overall visual narrative.</desc>
