<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Release</title>
  <desc id="desc">This piece contrasts dark, muted tones of ash with bright, scattered sparks to evoke tension between resilience and fragility. The palette, incorporating moss green, bone white, rust, stone gray, and small gold, reflects both the ashes of memory and the vibrance of fleeting moments. The lower left is dense and dark, conveying pressure, while brighter colors ripple outward, suggesting release and the dynamic nature of memory; they collide near the center, creating a focal point of emotional intensity.</desc>
