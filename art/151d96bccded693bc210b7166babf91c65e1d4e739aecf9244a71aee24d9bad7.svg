<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Tension</title>
  <desc id="desc">This composition captures the emotional tension between 'spark' and 'ash'. The palette features deep blues and soft greys representing restraint and settled dust, while pale yellows serve as accents to depict sudden bursts of hope and energy. The jagged edges enhance the feeling of interruption, with broken pixels suggesting scars of memory. The layout flows upward, resembling a struggle for resilience amidst a landscape of ash, leaving intentional negative space to evoke a sense of yearning and emptiness.</desc>
