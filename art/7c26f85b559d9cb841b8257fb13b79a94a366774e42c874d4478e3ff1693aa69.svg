<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow of Trust</title>
  <desc id="desc">This square illustrates the tension between trust and suspicion through a contrasting palette. The muted tans and sepias suggest a foundation of warmth (trust) while the darker gray creates an atmosphere of uncertainty (suspicion). The soft glow of faded blue punctuates the composition, representing signals of hope and clarity amid shadowy gaps. The diagonal lines mimic the stairs—a metaphor for resilience escalating against fragility. The central glow interrupts the darker border, emphasized by the broken pixels that suggest imperfection in the flow of emotions, making the viewer feel the pull between stability and anxiety.</desc>
