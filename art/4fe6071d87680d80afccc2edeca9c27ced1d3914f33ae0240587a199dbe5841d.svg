<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Calm and Chaos</title>
  <desc id="desc">This artwork captures the emotional tension between restlessness and peace. The palette of sepia, tan, dust gray, and faded blue serves to balance the chaotic energy of broken dots against the tranquility of a flooded field. The colors are intentionally placed to suggest a diagonal pull from the bottom left to the top right, enhancing the feeling of movement and tension. The higher density of darker colors interrupts the lighter hues, creating a conflict that draws the eye inward. This interplay of contrasting emotions is visually represented through an asymmetric arrangement, with the collision occurring centrally, where peace and restlessness converge.</desc>
