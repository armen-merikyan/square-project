<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece evokes a duality between vulnerability and strength. The palette features deep blacks and soft golds, symbolizing the stark contrast between something easily breakable and an unyielding foundation. The predominant dark tones create a stable center while the lighter accents suggest an exposed, fragile state. The arrangement of colors reflects an upward flow, embodying hope amidst a rigid structure, suggesting both tension and release as the softer colors break through the darker hues. Collisions of the barcode strength motif with cracks of vulnerability create an interaction of continuity and disruption, anchored around the central eye shape seed, thus reinforcing the theme of balance amid chaos.</desc>
