<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Resonance</title>
  <desc id="desc">This composition captures the emotional tension of joy and grief through a distinct color palette and structured patterns. The outer edges utilize deep blues and muted purples to suggest a sense of heaviness and fragmentation, representing grief, while a stair-step pattern of warm yellows and oranges in the center conveys an open and expanding joy. The arrangement creates a split-screen effect that embodies the struggle between order and chaos, with hard edges reinforcing the boundaries between emotions, suggesting safety amidst threats. Color placement creates a collision at the intersection of these patterns, emphasizing the complexity of human emotion.</desc>
