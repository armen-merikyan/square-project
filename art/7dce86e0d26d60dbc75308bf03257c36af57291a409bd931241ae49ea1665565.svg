  <title id="title">Tension of Overflow</title>
  <desc id="desc">This piece encapsulates the emotional struggle between desire and restraint through a palette dominated by warm corals and oranges, reflective of desire, contrasted against muted blues and charcoals representing restraint. The checker pattern of warm colors collides with the stacked band of cool colors, creating a tension-filled narrative of overflow versus containment. The outline of the colors shifts dynamically, embodying the spiral pressure and lattice feel of the seed text.</desc>
