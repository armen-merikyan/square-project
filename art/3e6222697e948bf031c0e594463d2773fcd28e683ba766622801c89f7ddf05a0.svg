<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Tension</title>
  <desc id="desc">The artwork embodies the emotional duality of longing and resolve through its contrasting colors and structured chaos. The primary palette of deep teal and cosmic indigo evokes depth and reflection, while accents of cold gold and star white punctuate the composition, suggesting hope and clarity. The outer 4 rows represent the resolve, edged sharply in void black, while the inner area reflects longing, characterized by a softer flow and broken pixels to signify imperfection and yearning. The collision occurs centrally, where dense patterns meet, disrupting the calm spaces, echoing the tension of contained vs overflowing emotions. This pattern creates a visual pulse that resonates with the seed's themes of disruption and connection.</desc>
