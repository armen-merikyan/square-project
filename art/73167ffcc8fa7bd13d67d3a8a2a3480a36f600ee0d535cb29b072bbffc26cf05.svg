<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">The emotional tone is a tension between envy and gratitude, depicted through a palette that highlights warm yellows and muted purples against deep blues. The left side features a more structured grid pattern reflecting gratitude, while the rising cascade of colors suggests a falling movement of envy on the right side. The contrast and collision occur through the sharp transitions between the structured warmth and the chaotic coolness, resonating with the feelings of rising hope and falling fear. This interplay creates a sense of movement and balance, as well as visual rhythm, echoing the complexities of the emotions represented by the seed.</desc>
