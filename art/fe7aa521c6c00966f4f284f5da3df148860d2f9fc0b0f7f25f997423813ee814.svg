<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone reflects the juxtaposition of vulnerability and strength, captured through a palette that emphasizes warmth (yellow, orange) against cooler hues (deep blue, muted purple). The main contrast occurs between the dense cluster of strength colors on one side and the spaced, more exposed tone on the other, demonstrating the collision between safety and openness. Negative space is left to represent the tension of exposure, allowing the eye to traverse between the two emotional pulses, symbolizing both connection and alienation as they rise and fall across the composition.</desc>
