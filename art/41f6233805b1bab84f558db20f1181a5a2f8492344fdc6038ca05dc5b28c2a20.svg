<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The emotional tone is defined by the clash between love and betrayal, evoking a sense of inner conflict. The chosen palette of warm pink and red juxtaposed against dark maroon and gray alludes to love's warmth overshadowed by the coolness of betrayal. The main contrast manifests in the density of red that pulses in the center against the more muted edges, representing the emotional turmoil. The layout centers around a dispersing pattern, embodying a heart fragment breaking apart, while still leaving negative space to suggest unresolved feelings. The arrangement captures moments of connection and disconnection, echoing the complexities of human relationships.</desc>
