<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center and Edges</title>
  <desc id="desc">This square embodies the tension between tenderness and rage, creating a visual conversation between calmness and chaos. The colors selected are a limited palette of red for intensity and black for shadows, juxtaposed against pale blue and white representing gentleness. The dominant black suggests a protective force, while the bright tones echo tenderness, manifesting a checkerboard of contrasting emotions that bleed into each other at the center. The arrangement features a quiet halo effect around a dense space, illustrating the emotional battleground between inner peace and external turmoil. This design emphasizes the main conflict at the center, where pressure and gentleness collide, creating a push and pull dynamic across the piece.</desc>
