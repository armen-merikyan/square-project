<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The piece captures the emotional tension between desire and restraint through saturated and muted colors, arranged in a swirling pattern. The rich red-oxide symbolizes heat and longing, while the blackened plum acts as a boundary, representing limitations. The contrast of quiet cream and iron gray in interrupted segments suggests the push and pull of emotions, embodying a spiraling pressure towards a sealed border. This interplay between vibrant colors and darker, muted spaces plays out in a mostly open layout, highlighting the struggle of unexpressed desires against imposed constraints, echoing the feelings of love and betrayal embedded in the seed.</desc>
