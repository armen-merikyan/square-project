<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Contrasts</title>
  <desc id="desc">This artwork explores the emotional tension between envy and gratitude. The palette, combining dark black with vibrant electric blue and magenta, emphasizes the struggle of lightness versus heaviness. The jagged edges create an aggressive, disjointed rhythm, while the dots suggest the presence of emotions swirling in the background. The placement of colors underscores a collision where light colors attempt to break through a dense mass of darker shades, symbolizing the battle of feeling grateful against the weight of envy—encapsulating the essence of desire and contentment in an abstract form.</desc>
