<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This composition explores the emotional tension between vulnerability and strength. The chosen palette of muted purples, deep blues, vibrant yellows, and glowing oranges creates a dynamic contrast. The center of the grid is lighter, symbolizing vulnerability surrounded by darker edges that signify strength. The collision occurs predominantly in the top left corner, where dense blocks of yellow burst against the softer, pale color, creating a ‘pressure corner’ effect. Broken pixels are interspersed throughout to introduce intentional disruptions, suggesting tension in the flow.</desc>
