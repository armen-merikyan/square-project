<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inside vs Outside</title>
  <desc id="desc">The emotional tone explores the juxtaposition of envy and gratitude as conflicting feelings, represented by a palette of dark and vibrant colors, emphasizing the tension. The black and electric blue create a grounding sense of fear and doubt while lime and magenta breathe gratitude and hope into the edges. The contrast lies in the split layout, where the left side encapsulates envy through shadowed tones, and the right holds uplifting brightness, embodying a soft curve of rising and falling energies. The arrangement tells a story of conflict as the edges press towards the center, reflecting an inner battle and outer calm, while the broken pixels give an imperfect echo of human emotion.</desc>
