<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Within Calm</title>
  <desc id="desc">This piece embodies the tension between restlessness and peace. The left palette, featuring soft shades of pale aqua and mist gray, evokes a sense of calmness and serenity. These colors dominate 65% of the composition, creating a peaceful backdrop. The right side, introduced with alarm red and ink blue, symbolizes urgency and movement, thus enhancing the contrast with the tranquil left side. The collision occurs at the center with clashing colors, offsetting the serene light colors. The broken pixels work to symbolize how the emotional state can shatter the tranquility, aligning with the idea of flame against shatter. The overall layout follows a split vertical design, highlighting the contrasting emotional tones through color density and placement.</desc>
