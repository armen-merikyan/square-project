<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Echo</title>
  <desc id="desc">The emotional tone reflects the tension between loneliness and connection, conveyed through a palette of warm yellows and oranges contrasting with deeper blues and muted purples. The arrangement features dense clusters of warm hues at the top, suggesting a stronger sense of connection, giving way to more negative space and cooler tones below, evoking loneliness. The main collision occurs in the middle with the use of broken pixels representing the jagged interplay of emotions, while the crosshatch pattern symbolizes the layers of interaction and misunderstanding, echoing the seed’s themes of hidden versus exposed.</desc>
