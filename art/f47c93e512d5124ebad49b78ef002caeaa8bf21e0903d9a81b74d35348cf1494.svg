<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension at the Edge</title>
  <desc id="desc">This composition reflects the emotional tension between control and surrender, represented through contrasting colors and patterns. The palette, inspired by 'ancient_fire', features burnt orange and dark red to express intensity and pressure, combined with charcoal to add depth and stability. The layout focuses on a hollow center, indicating containment, surrounded by jagged, energetic bursts of color that represent overflow and chaos. Broken pixels introduce intentional disruption, enhancing the sense of scarring and repair, while leaving space emphasizes isolation within the chaos. The central collision occurs in the middle, signifying conflict and emotional release.</desc>
