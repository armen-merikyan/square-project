<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This artwork embodies the emotional surge of confusion colliding with the desire for clarity. The palette, rich in deep red and stark black, utilizes high contrast to evoke feelings of tension and anger, juxtaposed against pale blue for moments of calm. The disjointed placement of colors creates an impression of broken symmetry, portraying the pulse of chaos. Asymmetry within the rows captures the essence of 'falling pixels'—a metaphor for fragmentation within clarity, thus reflecting the seed's themes of conflicts between order and disorder.</desc>
