<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This piece evokes a duality of 'awe' and 'terror' through the interplay of dark and light colors. The densely packed left side reflects order and structure, using shades of black and dark violet for stability. The right side, dominated by soft gold and pale green, presents chaos with its broken patterns, suggesting disarray. The edges are softened to mirror the unpredictable nature of this collision. The composition explores emotional contrast by creating a visual tension that pulls between the familiar and the unfamiliar.</desc>
