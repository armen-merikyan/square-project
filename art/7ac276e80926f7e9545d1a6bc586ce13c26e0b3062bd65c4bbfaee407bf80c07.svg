<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Light and Shadow</title>
  <desc id="desc">The emotional tone speaks of tumultuous transitions between moments of vitality (spark) and settling remnants of loss (ash). The selected palette of sepia, tan, dust gray, and faded blue captures desolation intertwined with hints of life and hope. The main collision occurs centrally where brighter hues burst like sparks against the muted, ash-like boundaries, creating a vivid tension. The layout and flow emphasize density at the core, allowing the patterns of stripes (ash) to break into a constellation-like arrangement (spark) around the edges. This reflects the ongoing internal struggle between vitality and restraint, memory and erasure.</desc>
