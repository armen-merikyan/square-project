<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This artwork embodies the emotional tension between joy and grief, utilizing a palette of warm (yellow, orange) and cool (deep blue, muted purple) colors to create a dynamic interplay. The contrasting hues collide along a diagonal flow that channels both feelings: joyous warmth emerges from the bottom-left corner while a cooler, heavier tone occupies the opposite quadrant, symbolizing grief. This split evokes a balance of emotional highs and lows, while the slightly broken pixels introduce an element of imperfection, representing the complexities of human emotion. The piece creates visual rhythm through the zigzag flow, embodying the push and pull between feelings of warmth and heaviness.</desc>
