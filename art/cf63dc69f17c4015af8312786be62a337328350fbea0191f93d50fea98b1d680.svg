<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This artwork explores the emotional tension between desire and emptiness. The palette combines vibrant hues like hot coral and blood orange with deep charcoal and hollow blue to represent the clash of saturated desire and the faint echoes of emptiness. The central conflict lies in the corner, where warm accents push against muted fields, conveying a struggle for expansion. The broken edges create a sense of disruption, mirroring the dynamic between wanting more and feeling contained. The choice of patterns—pressure bands against stripes—visually embodies this theme of collision.</desc>
