<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Contrast</title>
  <desc id="desc">The emotional tone centers on the interplay between longing and resolve, evoking a sense of tension between reaching out and a firm boundary. The palette, inspired by 'melancholy wonder', integrates soft and muted hues to reflect this duality—rain blue and lavender gray create a serene backdrop, while moon white serves as an accent to signify moments of clarity amidst emotional chaos. The primary collision occurs in the center, where a checker pattern (resolve) interrupts the flame pattern (longing), embodying the push and pull of emotions at play. Broken pixels are scattered throughout, signifying imperfections and the essence of repair within the chaos, enhancing the abstract narrative without literal imagery.</desc>
