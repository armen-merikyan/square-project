<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Duality</title>
  <desc id="desc">This piece explores the emotional tension between loneliness and connection. The palette of burnt orange, dark red, charcoal, and gold creates a warm yet somber ambiance, symbolizing ancient fire. The top half illustrates loneliness through a split-screen pattern, represented by darker shades with greater negative space, while the bottom half represents connection using vibrant alternating stripes. The collision occurs where colors abruptly transition at the midpoint, reflecting tension before integration. The grid-like arrangement symbolizes structure and constraint, with an emphasis on upward movement to echo a desire for connection, despite the underlying loneliness. Broken pixels emphasize the imperfections within this emotional interplay, enhancing the narrative of exposure versus concealment.</desc>
