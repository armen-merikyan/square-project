<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Tension</title>
  <desc id="desc">This composition embodies the emotional battle between control and surrender through a juxtaposition of saturated and muted colors. The dominant black and deep red signal control and pressure, while the pale blue and white symbolize the gentleness of surrender. The organized chaos spirals from an off-center point, reflecting an overflow from the center and a struggle between strength and fragility. The use of broken pixels, notably in the saturated areas, embodies the scars of tension amidst a search for release. The contrast between the dominant black that weighs heavily and the lighter colors that represent moments of relief creates a palpable emotional tension and releases flow through the piece.</desc>
