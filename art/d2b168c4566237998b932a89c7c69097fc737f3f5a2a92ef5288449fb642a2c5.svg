<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">The emotional tone captures the struggle between love and betrayal through a divided palette, using warm reds and pinks on the left to symbolize love, and darker maroon and gray hues on the right to embody betrayal. The contrast is mainly found in the sharp edges versus soft gradients, creating tension. Patterns of grid on the love side collide with radial noise on the betrayal side, reflecting the emotional turmoil of the seed. Empty spaces in the design serve to symbolize loneliness and absence, enhancing the overall impact of the artwork.</desc>
