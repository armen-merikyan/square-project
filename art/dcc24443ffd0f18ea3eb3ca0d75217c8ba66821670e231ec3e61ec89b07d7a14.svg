<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">The emotional tone captures the inner conflict between envy and gratitude, highlighting the collisions of feelings through color and placement. The chosen palette of pink, red, gray, and dark maroon evokes both warmth and tension. The layout uses a central seed surrounded by jagged patterns, creating a visual disruption that paces the viewer’s eye across the piece. The contrast is established through the dense clusters of red against the cooler gray, evoking a sense of pressure and release, while leaving ample negative space to suggest the quiet moments between the emotional spikes.</desc>
