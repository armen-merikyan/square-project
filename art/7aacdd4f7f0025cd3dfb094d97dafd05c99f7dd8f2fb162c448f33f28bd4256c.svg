<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece embodies the emotional duel between rage and calm, utilizing a stark contrast of palettes—fiery reds against cooler blues. The chaotic halo pattern emerges as energetic hot spots (red) fragment the serene pressure bands (pale blue), encapsulating the essence of tension and release, with cooler colors trying to ground the aggressive elements at the core of the piece. The central collision of colors is framed by a quiet, almost impenetrable black border, representing containment and the struggle against overflowing emotions, while maintaining intentional broken pixels that evoke a sense of imperfection and unresolved turmoil.</desc>
