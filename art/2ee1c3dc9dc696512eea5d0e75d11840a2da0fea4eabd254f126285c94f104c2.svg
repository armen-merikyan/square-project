<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interwoven Duality</title>
  <desc id="desc">This piece conveys the emotional tension between fear and hope through a contrasting palette and pattern logic. The dark shades of black and violet evoke a sense of heaviness and fear, while the lighter soft gold and pale green suggest flickers of hope. The jagged edges capture the harshness of fear, while diagonal stripes (reflecting hope) create upward movement. The arrangement also follows a layout reminiscent of a disturbed calm, with sharp, central lines clashing against the softer colors, symbolizing the inner conflict driven by the seed's themes. This composition balances negative space to prevent overwhelming intensity, allowing the emergence of hope amidst fear.</desc>
