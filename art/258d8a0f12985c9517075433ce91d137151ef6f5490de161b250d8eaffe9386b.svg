<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry Fractured</title>
  <desc id="desc">This artwork embodies the emotional tension between confusion and clarity, using a palette of deep reds, blacks, pale blues, and whites to evoke a sense of conflict and resolution. The contrast lies in the dense center, representing clarity, surrounded by broken dots towards the edges, illustrating confusion. The choice of colors creates a dynamic flow, where the warm red suggests a pulsing center flanked by cooler blues and stark whites. The asymmetrical arrangement creates a sense of unease, echoing the 'broken grid' concept of the seed, while still allowing negative space for breathing room. This interplay between visual density and emptiness captures the essence of the emotions well.</desc>
