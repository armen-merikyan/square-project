<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Tension</title>
  <desc id="desc">The emotional tone reflects the struggle between restlessness and peace, represented through a stark contrast of deep black and electric blue against softer lime tones. The layout splits the canvas with a vertical division—left side embodies restlessness with staccato islands of color, while the right side evokes peace through smooth, thread-like flows. Broken pixels introduce intentional disruptions that symbolize the tension within memories and motions, while patches disrupt patterns, suggesting fleeting moments of clarity. The overall balance attempts to convey a sense of unresolved motion contained within structured chaos.</desc>
