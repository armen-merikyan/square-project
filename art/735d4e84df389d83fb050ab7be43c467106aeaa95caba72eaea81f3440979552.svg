<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition encapsulates the tension between desire and restraint. The palette includes a warm saturated red oxide to signify deep longing, contrasted against muted, darker shades representing containment and restraint. The interplay of the 'stepwell' and 'flame' patterns creates a visual tension where brighter colors spill toward a sealed edge, suggesting a yearning that is halted. The layout leaves significant negative space, embodying the feeling of potential yet unfulfilled. The dynamic interplay between the vibrant and muted tones conveys an emotional journey of conflict and hope.</desc>
