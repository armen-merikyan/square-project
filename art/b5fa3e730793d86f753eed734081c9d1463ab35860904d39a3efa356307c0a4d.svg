<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone explores the tension between desire and emptiness, using a palette of warm and cool tones. The saturated hues of hot coral and blood orange represent desire, contrasting with the muted charcoal and hollow blue embodying emptiness. The central collision occurs where the vibrant colors breach the darker borders, hinting at a struggle against containment. The pattern of islands clashing with fault lines visually narrates the chaotic interplay of longing and restriction, completing a narrative of disrupted patterns against cut edges in a confined space.</desc>
