<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inner Echo</title>
  <desc id="desc">This composition reflects the emotional tension between trust and suspicion through a contrasting palette where hot coral and blood orange represent warmth and trust, while charcoal introduces hints of suspicion and pressure. The layout of stacked bands suggests a heaviness at the top, representing the weight of suspicion, while lighter fields below symbolize trust's gentle glow. The main collision occurs vertically, suggesting division yet connection—representing the interplay of noise and signal as both emotions interact and overlap.</desc>
