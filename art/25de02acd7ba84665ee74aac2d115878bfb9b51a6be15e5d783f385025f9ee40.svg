<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilient Fracture</title>
  <desc id="desc">The emotional tone captures a deep contrast between trust (represented by soft and warm colors) and suspicion (illustrated by darker, aggressive tones). The palette of navy and dim cyan suggests tranquility amidst a threatening horizon. The main contrast resides at the center of the artwork, where the softer, brighter colors seem to pulsate against the darker edges, mirroring the layout of two pulsating forces. The background's black and deep navy serve as a canvas of suspicion enveloping bright accents, echoing the split between what is hidden and what is revealed. This arrangement, complemented by scattered broken pixels, symbolizes fractures in trust, reinforcing the theme of resilience against the backdrop of suspicion.</desc>
