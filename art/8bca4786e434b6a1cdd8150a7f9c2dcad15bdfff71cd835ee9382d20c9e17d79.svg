<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece explores the emotional interplay between vulnerability and strength through the juxtaposition of warm and cool colors. The palette, inspired by shades from desire to emptiness, captures the tension between the dominant blood orange and coral against softer hollow blue and charcoal shades. The main contrast occurs in the center, where the warm colors suggest strength, while the cooler colors signal vulnerability and exposure in the edges. The falling pixel layout reflects a sense of descent and heaviness, inviting a feeling of reflection on the balance between protection and exposure in our experiences.</desc>
