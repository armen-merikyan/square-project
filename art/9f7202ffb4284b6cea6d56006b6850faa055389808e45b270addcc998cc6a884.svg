<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance in Conflict</title>
  <desc id="desc">The emotional tone centers on the duality of softness and severity, represented through a palette that juxtaposes gentle pinks with deep blacks and striking reds. The top half carries soft colors that create an upward movement, resonating with the softness, while the bottom half employs darker hues to establish weight and severity. Here, black and crimson create sharp contrasts against warm whites and powder pinks, illustrating a tension that lies between openness and confinement. This collision is neutralized through the use of negative space, allowing for moments of quiet amidst intensity. The spiral influence is suggested through the organized chaos of colors that draw the eye outwards from the center.</desc>
