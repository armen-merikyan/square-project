<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Invasion</title>
  <desc id="desc">This artwork explores the tension between loneliness and connection through contrasting color densities. The chosen palette of black, dark violet, soft gold, and pale green captures the essence of deep emotional landscapes. Black represents solitude, while soft gold symbolizes warmth and connection. The central cluster of dark violet pixels creates a feeling of weight and pressure, surging against the pale green which occupies the negative space, highlighting feelings of longing and incompleteness. The asymmetrical layout encourages the eye to move diagonally, suggesting movement from loneliness to connection while leaving room for contemplation.</desc>
