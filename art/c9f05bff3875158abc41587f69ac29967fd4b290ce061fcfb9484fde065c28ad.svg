<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">This composition embodies the conflict between joy and grief. The palette features warm yellows and oranges representing joy contrasted with deep blues and muted purples symbolizing grief. The arrangement reflects an argument grid layout that visually divides the canvas, with radial patterns from joy clashing with the more structured stripes of grief. The placement creates a dynamic tension where bright and dark pixels collide, illustrating uncertainty and emotional complexity, with sharp edges emphasizing the hard divisions between these feelings.</desc>
