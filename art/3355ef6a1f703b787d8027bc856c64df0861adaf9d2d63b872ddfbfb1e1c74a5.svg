<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork captures the emotional tension of desire striving against the limitations of emptiness. The palette combines warm tones of 'hot coral' and 'blood orange' to convey desire, while muted 'charcoal' and 'hollow blue' represent emptiness and restriction. The top half is saturated with vibrant colors radiating a warm pull, indicating an urge to overflow. In contrast, the lower half adopts a cooler and more subdued palette symbolizing containment and quiet pressure. The broken pixels disrupt the flow, signifying imperfection within the journey between these emotions, with the main collision occurring horizontally across the center of the square, echoing the conflict between aspiration and restraint.</desc>
