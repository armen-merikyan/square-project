<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Gravity of Emotion</title>
  <desc id="desc">This composition captures the tension between tenderness and rage, represented through saturated reds and calm blues. The palette evokes a dichotomy of emotional states: the deep, muted backgrounds suggest quiet and introspection, while bold red pixel clusters represent explosive anger. The layout descends like tears, emphasizing the flow of emotion, with intentional breaks creating a sense of disruption. The main collision occurs centrally, where the red intensity meets the calming blue fields, illustrating the conflict of these feelings while maintaining a structured but visually engaging arrangement.</desc>
