<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This artwork embodies a tension between the emotions of defiance and submission, represented through contrasting patterns and colors. The left half employs a tide pattern in bold tones of ripe green and acid green, symbolizing hard interruptions and bright refusals. The right half utilizes softer hues of cream and honey gold in a rain pattern, suggesting an enclosed field and soft collapses. The arrangement creates a significant collision at the center with overlapping colors, where defiance meets submission, while ensuring a 10% negative space to maintain breathing room amidst the pressure. The design follows a split vertical layout, allowing each emotion to dominate its respective side while the central area serves as the pulsating heart of conflict, echoing the idea of an inward spiral.</desc>
