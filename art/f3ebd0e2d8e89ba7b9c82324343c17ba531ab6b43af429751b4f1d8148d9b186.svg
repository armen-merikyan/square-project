<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Calm and Fury</title>
  <desc id="desc">This piece embodies the emotional tensions between rage and calm through the interplay of colors and spatial dynamics. The palette, featuring stark shades of red and pale blue, signifies the explosive nature of rage against the subtlety of calm. The dominant dark tones create a dense center where warmer, jagged accents break through, representing moments of outburst against tranquility. The spiral layout symbolizes pressure radiating outward, emphasizing a transition from contained emotion to overflowing energy, while maintaining a quiet field around which the chaos unfolds.</desc>
