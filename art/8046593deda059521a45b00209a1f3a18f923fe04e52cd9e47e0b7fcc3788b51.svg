<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensions of Heart</title>
  <desc id="desc">The emotional tone is a complex interplay between the warmth of love and the harshness of betrayal. The palette blends soft pinks and reds to evoke warmth and affection, contrasted sharply with grays and dark maroon, which suggest distance and emotional coldness. The top half portrays love through a 'spark' pattern, filled with a dense arrangement of bright hues embodying passionate connection, while the bottom half employs a 'checker' pattern to signify betrayal, creating a stark contrast and tension with disjointed and darker elements. The broken pixels scattered align with feelings of imperfection and the fragility of relationships, while ensuring at least 10% negative space reflects the necessary quietness within chaos. The overall flow moves from the inside out, emphasizing the pressure of emotions clashing within the heart.</desc>
