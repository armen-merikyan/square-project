<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Growth</title>
  <desc id="desc">The emotional tone navigates between nostalgia and progress, intertwining the warm tones of sepia and tan, suggesting memories and warmth, with cools like faded blue presenting the modern progression. The layout is horizontally split to signify the conflict between these emotional states where nostalgia represents a hushed whisper while progress overlays it with structured noise. The collision occurs around the central axis, where darker tones swim in lighter spaces, creating an echo of unresolved tension. Broken pixels are intentionally scattered, introducing imperfection as a reminder of the past's lingering impact within the structure of progress.</desc>
