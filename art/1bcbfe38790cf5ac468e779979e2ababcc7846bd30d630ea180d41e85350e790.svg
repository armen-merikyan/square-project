<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Innocence</title>
  <desc id="desc">This artwork embodies the emotional tug-of-war between love and betrayal. The palette reflects this dichotomy, where warm pinks and reds symbolize love, contrasting sharply with the cool grays and dark maroon representing betrayal. The top four rows, filled with warm tones, suggest intimacy and connection but are interrupted by shards of cold hues indicative of distrust and vulnerability. The placement of colors introduces a central tension—a collision of emotions—creating layers of depth that evoke feelings of discomfort and longing. The design captures a ‘split-horizontal’ flow, revealing how emotions can oscillate from the inside to the outside, hinting at the abandoned space of an empty room.</desc>
