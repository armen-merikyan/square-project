  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork encapsulates the tension between desire and restraint through an interplay of saturated and muted colors. The chosen palette, 'hunger_restraint,' reflects emotional dynamics where red_oxide represents yearning and small_orange introduces unexpected warmth in contrast. Indications of pressure are visible with the flame and spark patterns colliding predominantly toward the center, suggesting an emotional outburst held back by a structured border of muted cream and iron gray. Broken pixels create intentional imperfections, enhancing the sense of struggle and the unpredictable nature of the emotions involved.</desc>
