<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Color</title>
  <desc id="desc">This artwork evokes the emotional conflict of defiance versus submission through contrasting intensities of color. The palette of electric blue and magenta suggests vibrancy and emotional charge, while the black introduces weightiness that draws the viewer's eye downward, creating a contrast between lightness and heaviness. The jagged edges symbolize the interruptions and collisions in emotions, while the grid pattern reflects submission within the chaos. The arrangement creates visual tension, symbolizing the struggle between opposing forces deftly woven into an abstract form.</desc>
