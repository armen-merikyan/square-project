<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This composition captures the emotional dichotomy between rage and calm, portrayed through a contrast of stark, aggressive colors and soft, cool tones. The palette features deep blacks and bold reds, representing the intensity of rage, juxtaposed with pale blues and whites symbolizing tranquility. The layout evokes a feeling of descent, with darker colors flowing like an overwhelming tide against serene, lighter fields. The collision occurs centrally, where jagged 'scar' patterns disrupt the soothing 'islands' of calm, creating visual tension. This reflects the struggle between containment and overflow, suggesting a narrative of emotional conflict and resilience.</desc>
