<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Gravity of Tensions</title>
  <desc id="desc">This artwork explores the emotional tension between defiance and submission. The chosen palette of burnt orange, dark red, charcoal, and gold evokes a sense of ancient fire and struggle. The left-to-right flow of the falling pixels suggests movement from weighty darkness towards lighter defiance, with broken pixels subtly introducing imperfection. The arrangement creates a collision of density in the lower half, contrasted with more open spaces above, symbolizing emotional weight versus liberation. This structured chaos embodies the interplay of love and betrayal, reflecting the relationship dynamics suggested by the seed.</desc>
