<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory in Motion</title>
  <desc id="desc">This composition captures the tension between the ephemeral spark of motivation and the settled ash of memory. The ash (gray and muted tones) dominates the upper half, representing restraint and the lingering effects of the past. In contrast, bright yellows and deep blues in the lower half symbolize the energy of new beginnings. The collision at the center, where these colors overlap, illustrates the moment of change; jagged edges signify disruption and the complexities of emotions. The chosen palette of mourning and renewal colors enhances this duality, representing both loss and hope.</desc>
