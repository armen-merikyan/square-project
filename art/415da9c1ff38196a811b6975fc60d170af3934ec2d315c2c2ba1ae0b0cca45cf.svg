<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balancing the Tides</title>
  <desc id="desc">This artwork explores the emotional duality of joy and grief through color and pattern. The left half, represented by flame-like patterns in bright yellows and oranges, embodies joy's open and expanding nature, creating a sense of movement. The right side, with muted purples and deep blues in a striped pattern, reflects the heavy and fragmented qualities of grief. The hard edges create a stark division, while the broken pixels introduce an element of imperfection, emphasizing the collision of these contrasting emotions. The piece captures the delicate balance between aspiration and loss.</desc>
