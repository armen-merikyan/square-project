<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork encapsulates the emotional tension between desire and restraint. The palette of deep reds, muted creams, and dark grays reflects the warmth of yearning contrasted with the coolness of control. The outer border, dominated by blackened plum and iron gray, symbolizes restraint, while the inner 4x4 core, using saturated red oxide and small orange, expresses a vibrant pull of desire. The arrangement creates a collision at the center where the two emotions overlap, showcasing tension and interaction, akin to a scar attempting to heal yet still vivid. The broken pixels intervene sporadically, emphasizing imperfections, akin to how desires can feel interrupted by barriers.</desc>
