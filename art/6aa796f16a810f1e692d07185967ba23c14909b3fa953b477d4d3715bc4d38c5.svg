  <title id="title">Echoing Shelters</title>
  <desc id="desc">The emotional tone oscillates between exposure and safety, evoking a sense of vulnerability encased in gentle protection. The chosen palette reflects this duality, with soft greens symbolizing safety and cold whites for exposure, creating an interplay of warmth and vulnerability. The main contrast occurs at the center, where disrupted dots meet expansive quiet fields, suggesting a constant push and pull between tension and ease. The broken pixels interspersed throughout portray intentional flaws, reminding us of the unpredictable nature of safety and exposure in our lives.</desc>
