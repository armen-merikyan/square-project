<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotion</title>
  <desc id="desc">This artwork captures the dynamic interplay between joy and grief through a horizontal split. The top four rows embody joy, utilizing a palette of vibrant yellows and oranges to evoke brightness and expansion. Conversely, the bottom four rows convey grief through muted blues and purples, presenting a dense grid pattern that feels heavy and structured. The central crosshatch borders create tension between these contrasting emotions, while the thin outlines define the segments, enhancing the duality of light and dark. The piece reflects a journey through emotional landscapes, balancing bursts of brightness with waves of depth, just as life oscillates between joy and grief.</desc>
