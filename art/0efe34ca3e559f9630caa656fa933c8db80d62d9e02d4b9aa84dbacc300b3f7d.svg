<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Resonance</title>
  <desc id="desc">The emotional tone reflects the tension between envy and gratitude, represented by the contrasting colors of deep black and vibrant red against cool pale blue and white. The outer rows in dark tones suggest weight and pressure, while the center 4x4 evokes a sense of calmness and gratitude. The soft edges and ring patterns of blue and white create a rising dynamic amidst the grounded black, illustrating the internal conflict and emotional collision emphasized by the seed. Breaking a few pixels intentionally symbolizes the imperfection and disruption inherent in feelings of envy and hope.</desc>
