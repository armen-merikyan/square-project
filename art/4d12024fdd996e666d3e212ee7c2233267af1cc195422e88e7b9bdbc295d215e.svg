<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Crossed Signals</title>
  <desc id="desc">This piece explores the emotional tension between love and betrayal through a palette of warm and muted colors. The contrasting sharp edges of dark maroon and gray create an unsettling interplay, mimicking the collision of trust and doubt. The patterns of teeth and rain evoke the struggle between intimate connection and isolation, symbolized by the alternating clusters that seem to pierce through calm expanses. The intentional placement of broken pixels enhances the sense of fragmentation, echoing the ambivalence in relationships.</desc>
