<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This square explores the emotional tension between trust and suspicion. The palette incorporates quiet tones of off-white and faint peach to represent trust, while dark navy and compressed red evoke suspicion and tension. The pattern hinges on a split layout: a structured, stepped pattern in the inner core symbolizing trust, contrasted by a ripple effect in the outer border reflecting suspicion. The main collision occurs at the center, where structured layers meet chaotic ripples, creating a visual dynamic that embodies resilience amid fragility.</desc>
