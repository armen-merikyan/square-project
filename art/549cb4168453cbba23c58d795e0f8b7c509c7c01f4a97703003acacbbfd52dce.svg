<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This pixel art embodies the emotional tension between longing and resolve. The palette includes warm brown and shelter green as solid foundations of longing, while cool white and open blue edge against them, creating a stark contrast. The arrangement features clusters of intense colors reminiscent of intensity and urgency, while broken pixels introduce deliberate imperfections, reflecting the concept of repair amidst damage. The central collision of colors is intense in the middle, illustrating where emotions collide sharply, before fading into more quiet spaces along the edges, encapsulating the theme of a push-pull dynamic.</desc>
