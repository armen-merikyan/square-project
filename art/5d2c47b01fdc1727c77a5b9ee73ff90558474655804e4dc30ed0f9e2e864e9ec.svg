<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Through Static</title>
  <desc id="desc">The emotional tone is captured as a struggle between clarity and chaos, reflected in the high contrast between dark navy and bright whites. The palette consists of navy, black, a single bright white, and dim cyan, creating a feeling of an overcrowded center surrounded by noise. The patterns clash—a 'stairs' motif in the center suggests a clear path or signal struggling to emerge amidst the 'checker' noise of the edges. The collision occurs prominently in the center, where the vibrant white pushes through the darker background, symbolizing a clear signal amidst static interference. The layout emphasizes an overfilled center against a sparsely populated edge to represent the tension of exposure versus shelter.</desc>
