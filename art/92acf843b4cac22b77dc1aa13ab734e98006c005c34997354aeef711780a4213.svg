<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Tension</title>
  <desc id="desc">The emotional tone reflects the struggle between panic and control, where warmer shades like burnt orange and gold evoke the heat of anxiety, while darker hues like charcoal and dark red anchor this feeling in a heavier emotional weight. The central 4x4 area embodies control with a structured split-screen pattern, surrounded by a chaotic, dotted external frame representing panic. This arrangement symbolizes the battle between outward chaos and an inner desire for stability, with contrasting light and dark pixels at the boundaries creating a visual tension that feels unresolved. The pattern’s essence comes from the conflict defined by the seed, transforming anxiety into an abstract expression of emotional struggle.</desc>
