<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Climbing Tensions</title>
  <desc id="desc">This piece captures the struggle between tenderness and rage through contrasting colors and patterns. The palette combines deep blacks and sharp reds representing rage, with softer pale blue and white suggesting tenderness. The layout ascends to embody hope, while the 'pulse_marks' pattern representing rage collides with the 'checker' pattern of tenderness, creating dynamic tension in the center. Broken pixels introduce disruption, echoing feelings of guilt and release amidst the density of emotions, illustrating both the conflict and convergence of feelings beautifully.</desc>
