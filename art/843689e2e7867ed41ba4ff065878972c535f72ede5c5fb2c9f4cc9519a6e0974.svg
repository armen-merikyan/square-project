<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tension</title>
  <desc id="desc">This composition explores the duality of 'emptiness' and 'desire,' embodied through contrasting warm and cool tones. The palette, derived from the 'ancient_fire' theme, uses burnt orange and dark red to invoke a sense of warmth and longing, while charcoal introduces coolness, embodying emptiness. The arrangement has pixel clusters rising on the left to signify desire while descending on the right to reflect emptiness, creating emotional tension. The burned edges emphasize the passion of desire against the sharpness of loneliness, while the checker pattern blends with sparks to represent the push and pull of human emotion.</desc>
