<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Against Restraint</title>
  <desc id="desc">The emotional tone expresses a conflict between desire and emptiness, represented through warm, saturated colors fighting against cooler muted tones. The palette of hot coral and blood orange conveys warmth and hunger, while hollow blue and charcoal signal emptiness and restraint. The contrasting patterns of 'teeth' disrupt the field of 'broken dots,' embodying the tussle between overwhelming desire and confinement. The main collision occurs in the center, where desire breaks through the soft negative space, creating tension and drawing the viewer's eye.</desc>
