<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tear in the Fabric</title>
  <desc id="desc">The emotional tone contrasts the feelings of loneliness and connection, represented through the chaotic presence of bursts against a subtle grid. The chosen palette, blending deep blues with muted purples and warm oranges, evokes a sense of ancient fire, suggesting warmth and distance simultaneously. The main contrast occurs where the deep blue clashes with vibrant oranges, symbolizing moments of connection that interrupt the pervasive loneliness of the surrounding colors. The seed of 'tear' informs the pixel arrangement, creating asymmetric clusters and voids that echo this dynamic tension between inside and outside, precariously balancing hidden depth against exposed fragments.</desc>
