<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This piece embodies the tension between desire and emptiness, highlighted through a palette that oscillates between warm tones of hot coral and blood orange, representing desire, and cool hues of charcoal and hollow blue, symbolizing emptiness. The layout features a small but vibrant cluster of warm colors interrupting a predominantly dark grid, suggesting an overflow of emotion pushing against barriers. Broken pixels introduce imperfections and disrupt the flow, embodying the struggle against containment. The overall contrast is concentrated towards the edge, where the bright cluster meets the darker field, offering a sense of unresolved motion and tension.</desc>
