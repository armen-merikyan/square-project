<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotions</title>
  <desc id="desc">This artwork embodies the emotional struggle between joy and grief. The left side is characterized by warm, vibrant colors that evoke feelings of brightness and expansion, while the right side uses cooler, muted tones suggesting heaviness and sorrow. The collision between these contrasting color palettes creates a tension that feels both protective and threatening. The hard edges signify boundaries within this emotional landscape, while elements of broken pixels introduce imperfection that reflects the complexity of human emotions. The split design serves to accentuate the ongoing internal battle, embodying the essence of the seed's themes of order versus chaos, and the emotional stair-like progression from grief at the bottom to the lighter hues of joy at the top. This abstract pattern represents the interweaving of two distinct emotional states without representing them literally, focusing instead on feelings and their collisions.</desc>
