<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension &amp; Release</title>
  <desc id="desc">The emotional tone reflects the struggle between control and surrender, represented through a vibrant green center that bursts with energy against a backdrop of muted earthy tones. The palette, drawn from lively greens infused with calm creams and deeper olives, signifies a balance between density and openness. The collision occurs in the center, where the bright 'ripe_green' feels encased in the heavier 'deep_olive', exemplifying the concept of overflowing versus containment. This dynamic interplay expresses the push and pull of emotion and thought, leading to an abstract interpretation of the seed.</desc>
