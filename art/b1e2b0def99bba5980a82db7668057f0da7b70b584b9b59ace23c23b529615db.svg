<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">This piece embodies the contrasting emotions of tenderness and rage through a deliberate choice of palette and arrangement. The darker blacks and reds capture the explosive nature of rage, while the softer pale blues and whites reflect tenderness. The left side of the grid feels muted and calm, contrasting the right side which bursts with chaotic lattice patterns. The digital bleed creates intentional imperfections, enhancing the piece's emotional depth and mirroring the struggle between the two forces. The main collision occurs in the center, where the two emotional spheres clash, representing inner turmoil and resolution.</desc>
