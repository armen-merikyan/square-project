<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Waves of Disturbance</title>
  <desc id="desc">This artwork expresses the emotional struggle between peace and restlessness. The palette combines dark red and burnt orange for warmth with charcoal for grounding, evoking a sense of both tension and calm. Central to the composition is a collision between the fiery, restless thread patterns on one side and the cooler, peaceful flame shapes on the other. This represents the inner conflict as dense clusters of color create a path of interrupted calmness, marked by broken pixels that signify moments of disturbance and repair.</desc>
