<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tear of the Ancient Fire</title>
  <desc id="desc">This composition captures the tension between loneliness and connection through a contrasting interplay of dark and light tones. The palette resides primarily in navy and black, depicting depth and isolation, with sparse hints of dim cyan to represent fleeting connections. The central burst symbolizes an emotional core, while the edges stay muted, echoing the feelings of being hidden yet exposed. The crosshatch pattern evokes a sense of structure—a grid from which emotions can either escape or feel trapped, and the broken pixels introduce a sense of imperfection, enhancing the internal conflict.</desc>
