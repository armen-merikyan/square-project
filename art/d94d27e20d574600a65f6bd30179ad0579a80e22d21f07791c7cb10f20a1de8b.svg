<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Order and Chaos</title>
  <desc id="desc">This piece captures the dichotomy of panic and control through a balanced yet broken layout. The colors are chosen from a warm palette (yellow and orange) against a deep blue and muted purple, symbolizing the clash of emotions. The warm colors correspond to the surge of panic, while the cool colors represent the instinct for control. The structure follows a mirror-broken layout, creating tension through slight asymmetries in the pixel arrangement, where bursts of noise interrupt the underlying order. The spark of yellow within the blue fields serves as a visual motif for an emotional spark against a structured target, while strategically placed broken pixels introduce an element of imperfection, embodying grief amidst joy.</desc>
