<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Ascent</title>
  <desc id="desc">This composition explores the tension between envy and gratitude, manifesting visually through a gradient of dark maroon and gray, representing weight and depth. The jagged pattern reflects the disruption of gratitude amidst the noise of envy, with broken pixels emphasizing imperfection. The layout of falling pixels creates a sense of descent and upheaval, while maintaining a balance of negative space to evoke contemplation. The primary contrast occurs where the darker maroon clashes with lighter grays, symbolizing the struggle between heaviness and lightness. Overall, the arrangement mirrors emotional strife and resolution.</desc>
