<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Wholeness and Fracture</title>
  <desc id="desc">The emotional tone captures the duality of longing and resolve, with elements of brokenness and repair implied in the arrangement. The chosen palette, predominantly from the 'safety_exposure' family, uses shelter green and warm brown to evoke a sense of solidity and warmth, while pale skin tones introduce vulnerability. The sharp contrast between the broken lattice pattern expressing longing and the shatter pattern representing resolve creates a collision at the center of the square. The placement favors density on one side, allowing wider negative spaces to suggest unresolved tension and longing for connection.</desc>
