<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This piece explores the emotional tension between desire and emptiness. The left four columns, representing desire, showcase vibrant hot coral and burnt oranges intermingled with softer hues of dust pink, suggesting a pulsing, saturated energy. In contrast, the right columns embody emptiness and restraint through cool charcoal and hollow blue tones that create a spacious, dissociative feel. The predominant color on the left (desire) pushes against a firmly held boundary of muted shades on the right (emptiness). Broken pixels interrupt the flow, symbolizing the imperfections in the overwhelming desire and quiet containment, leading to a striking collision in the center of the square, where these two forces meet most visibly. This interplay captures the essence of longing while being held back by underlying voids.</desc>
