  <title id="title">Echoes of Time</title>
  <desc id="desc">The artwork explores the emotional tension between nostalgia and progress. The chosen palette of burnt orange and dark red embodies warmth, symbolizing nostalgia, while charcoal and gold introduce contrast, representing progress. The split horizontal layout and falling pixel pattern suggest a descent from memories (top) into the complexity of modernity (bottom). The collisions of color create a visual dialogue: warm tones bleed into cooler, contrasting sections. The few broken pixels hint at imperfection, evoking the idea of fragmented memories amidst relentless advancement, ensuring a balance between density and negative space.</desc>
