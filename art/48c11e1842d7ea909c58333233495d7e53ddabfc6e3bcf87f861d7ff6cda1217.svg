  <title id="title">Interruption and Flow</title>
  <desc id="desc">This composition captures the emotional tension between control and surrender, using a palette of muted pink, dark maroon, and gray to highlight the feeling of overflow versus containment. The thicker outlines create a sense of pressure while the gentle gradients suggest a surrendering softness. The main contrast is located in the center, where dense colors collide to represent a struggle, creating visual echoes of chaos amidst more serene borders. Here, the seed's notion of a 'wound' is abstracted through the use of broken pixels to signify disruption in flow, making the artwork feel like an emotional pulse.</desc>
