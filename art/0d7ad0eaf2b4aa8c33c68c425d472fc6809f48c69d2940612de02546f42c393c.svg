<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Trust</title>
  <desc id="desc">The emotional tone captures the delicate balance between trust and suspicion through contrasting patterns. The left side, representing trust, features a warmer palette with soft gold and warm ivory, signaling stability. In contrast, the right side embodies suspicion, with deeper shades of ash gray and deep wine creating interruptions and blocked paths. The palette harmonizes the feelings of guilt and forgiveness, echoing the complexities of communication. The main collision occurs in the center, where the patterns of shatter and ring visually overlap and create a tension that glows against the chaos, encapsulating the narrative of emergence and fracture.</desc>
