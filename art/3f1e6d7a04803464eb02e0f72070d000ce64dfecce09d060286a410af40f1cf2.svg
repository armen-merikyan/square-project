<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Suspicion</title>
  <desc id="desc">The artwork embodies the emotional tension between trust (balanced warmth) and suspicion (blocked passage). The chosen palette reflects resilience (moss green and stone gray) clashing against fragility (bone white and rust), creating a dynamic contrast. The vertical split signifies the threshold between the two emotions, while diagonal flows suggest movement across this divide. Broken pixels introduce irregularity, echoing life's imperfections. The main collision occurs at the center, where trust's glimmering accent clashes with suspicion's muted tones.</desc>
