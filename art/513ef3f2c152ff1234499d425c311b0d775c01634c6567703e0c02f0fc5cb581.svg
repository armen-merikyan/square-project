<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Bound</title>
  <desc id="desc">This abstract composition captures the emotional tone of desire juxtaposed with restraint, illustrating how yearning pulses in an overfilled center while a muted and crackled border attempts to contain it. The color palette blends warm, saturated hues like red oxide and small orange for desire's passion with dark, muted tones of blackened plum and iron gray representing restraint. The main collision occurs at the center, where the saturated base colors clash against the restrained edges, exhibiting a checker pattern radiating outward toward the cracks of the border, hinting at a struggle against confinement.</desc>
