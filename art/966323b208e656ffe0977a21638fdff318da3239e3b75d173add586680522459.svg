<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This artwork captures the emotional tension between joy and grief through a contrasting palette of warm and cool colors. The joyous elements in yellows and oranges encroach from the left, representing warmth and growth, while deep blues and muted purples hint at the sorrow on the right, like shadows lingering in a space of light. The grid structure indicates order and joy, which disrupts in certain areas with broken pixels, symbolizing grief’s chaotic intrusion. The layout balances a diagonal flow, reinforcing the interplay of opposing emotions, while the design ensures negative space hints at unresolved feelings.</desc>
