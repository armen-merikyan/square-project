<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Passage</title>
  <desc id="desc">This piece embodies the tension between longing and resolve by utilizing a palette of warm and cool colors that contrasts emotional states. The warm tones (rose clay and warm shadow) represent longing and softness, while the cooler hues (distant lilac and cool blue) symbolize resolve and clarity. The main collision occurs in the lower left corner, where dense stacks of warm colors clash against a broader, quieter space filled with cooler tones, suggesting a push and pull between urgency and serenity. The broken edges enhance the sense of reconstruction and complexity, reflecting the fractured emotions within the abstract narrative.</desc>
