<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork captures the emotional tension between desire and restraint using a palette that oscillates between saturated warmth and muted depth. The top four rows reflect the intensity of desire with vibrant oranges and coral, utilizing a grid pattern that symbolizes reaching and pulsing energy. The bottom four rows represent restraint through a mirrored pattern with cooler tones of blue and gray, emphasizing negative space and limited marks. The main collision is evident where the saturated warm colors meet the cool, locked borders, creating a dynamic interplay of emotional states. The broken pixels introduce an element of imperfection and unpredictability, serving as reminders of the underlying tension.</desc>
