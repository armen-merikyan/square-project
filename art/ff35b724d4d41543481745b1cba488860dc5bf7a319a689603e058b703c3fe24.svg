<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Patterns</title>
  <desc id="desc">This artwork embodies a complex emotional landscape, juxtaposing the chaos of grief with the order of joy. The palette—warm yellows and oranges interspersed with deep blues and muted purples—reflects this tension, creating a vibrant pulse disrupted by darker undertones. The top four rows, filled with rounded, broken dot patterns suggest joy, radiating warmth and expansion, while the bottom four rows, with rain-like patterns, evoke deep blue fragments that speak to the weight of grief. The zigzag flow of color pushes through the space, interrupted by burned edges that imply imperfection. This arrangement contrasts calmness with pressure, mirroring the emotions drawn from the seed's concepts.</desc>
