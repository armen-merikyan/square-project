<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Emotion</title>
  <desc id="desc">The artwork explores the emotional tension between joy and grief using a palette of warm yellows and oranges juxtaposed against deep blues and muted purples. This contrast represents the push and pull of happiness and sorrow, framing the center with lighter tones to symbolize joy while allowing the edges to embody a sense of grief. The patterns reflect a fragile symmetry while the broken pixels introduce imperfections, contributing to the narrative of love and betrayal. The arrangement creates a rhythm that feels both stable and unstable, guiding the eye to pulse through the center and outwards with wave-like flows, suggesting an emotional journey that's filled with tension and complexity.</desc>
