<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">The emotional tone of this piece reflects the tension between panic and control, balancing chaotic and stable elements. The chosen palette—dark black (#000000), electric blue (#00FFFF), magenta (#FF00FF), and lime (#00FF00)—evokes a stark contrast between stability and instability, with vibrant tones sparking against deep shadows. The layout mimics a rain-like descent, embodying the feeling of dropping tensions, while broken edges create a sense of imperfection, suggesting both the fragility of control and the overwhelming nature of panic. The contrasting clusters of lime and magenta against the deep black emphasize the conflict much like the discord inherent in love and betrayal, suggesting moments of brightness amidst an underlying heaviness. Negative space surrounds each cluster, enhancing the feeling of emptiness and interiority, as if the viewer is peering into an empty room fraught with tension.</desc>
