<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Repair</title>
  <desc id="desc">The emotional tone blends longing with resolve, creating a narrative of hope amidst struggle. The chosen palette of stain brown, ash gray, warm ivory, soft gold, and deep wine illustrates a quiet field (ashy colors) surrounding the dense, chaotic center (warm golden and deep wine hues). The main collision occurs in the center, where warm tones pulse with a sense of urgency, while the border fades into cooler, quiet shades, invoking the feeling of containment versus overflow. Broken pixels disrupt the flow, reflecting the 'mirror broken' theme through intentional imperfections, suggesting that beauty can emerge from damage. The abstract pattern reveals a conversation between the warmth of resolve and the chill of longing, interacting like threads weaving through a dense story.</desc>
