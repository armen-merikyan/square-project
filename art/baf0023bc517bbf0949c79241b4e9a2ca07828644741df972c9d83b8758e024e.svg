<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Resonance</title>
  <desc id="desc">This artwork captures the tension between joy and grief through a contrasting color palette of bright yellows and muted purples. The top half features a denser arrangement of warm colors, symbolizing joy with an echoing pattern of rain, while the bottom exhibits cooler tones, representing grief with a ring pattern. The collision occurs where the two emotional cores meet, creating an unresolved tension reflective of the complexities of emotional experience. There are broken pixels that add the sense of imperfection, emphasizing the rawness of feelings and the striated nature of existence.</desc>
