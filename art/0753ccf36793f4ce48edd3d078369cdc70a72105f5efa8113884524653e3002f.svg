<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight and Lightness</title>
  <desc id="desc">The composition explores the tension between dread and relief by contrasting heavy dark colors in the outer frame with a lighter central core. The palette, combining burnt orange and dark red against softer gold, conveys the emotional conflict—warmth battling against oppressive darkness. The arrangement features broken dots in the outer layers, signifying dread, while the inner core reflects a rain pattern for relief, representing moments of clarity and calm amidst chaos. The composition leans towards a sense of symmetry with intentional disruptions, hinting at cracks that allow both emotions to coexist in the space, fulfilling the seed's exploration of balance and interruption.</desc>
