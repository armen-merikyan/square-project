<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tension</title>
  <desc id="desc">This artwork captures the opposing emotions of joy and grief through a palette that contrasts vibrant yellows and oranges with muted purples and deep blues, reflecting an oscillation between hope and heaviness. The layout rises from bottom to top, hinting at an escape or ascent, while the hard edges suggest an unyielding emotional landscape. The use of maze-like patterns in the grief sections clashes with crack-like patterns in the joy sections, creating a visual dichotomy that illustrates the tension between safety and threat. The arrangement allows for a significant contrast in density, with the bottom regions darker, symbolizing grief, and the upper regions brighter, signifying joy.</desc>
