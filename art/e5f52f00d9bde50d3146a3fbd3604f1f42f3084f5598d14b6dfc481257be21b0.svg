<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This artwork reflects the emotional duality of joy and grief through a deliberate split horizontal layout. The top half embodies joy with bright yellows and oranges, expressed in a striped pattern reminiscent of warmth and light. The bottom half, representing grief, utilizes muted purples and deep blues in a broken pattern, signifying chaos and a sense of heaviness. The contrast is focal, occurring at the midline, with a chaotic break in the lower section suggesting hidden struggles against the backdrop of warmth above. This arrangement allows for an emotional exploration of opposing feelings, fostering an engaging visual dialogue over the structured layout.</desc>
