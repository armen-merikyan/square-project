<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Light and Weight</title>
  <desc id="desc">The emotional tone captures a dichotomy between explosive rage and subdued calm. The palette, a blend of red and pale blue with contrasts of black and white, symbolizes the struggle between heavy darkness and bright bursts of color. The primary clash occurs in the center, where the checker pattern denoting rage collides with softer rain-inspired patterns, creating a dynamic tension. The layout of having dark borders framing a light core adds to the feeling of weight bearing down on calmness, while small disruptions in the pattern introduce a sense of fracture and movement, mirroring the 'crack against mirror' theme from the seed.</desc>
