<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Longing and Resolve</title>
  <desc id="desc">This piece conveys the emotional tension between longing and resolve through its contrasting warm and cool colors. The palette, featuring red oxide and blackened plum, suggests depth and intensity, while muted cream and iron gray introduce calmness. The left side embodies longing with scattered, ember-like patterns, while the right conveys resolve with steady, threshold-like structures. The collision occurs centrally, where the two patterns disrupt each other, illustrating the struggle between the two emotions. Broken pixels enhance imperfections, symbolizing the process of repair amidst damage.</desc>
