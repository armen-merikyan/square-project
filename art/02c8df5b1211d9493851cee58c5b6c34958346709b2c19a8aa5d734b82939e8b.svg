<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This composition represents the emotional tension between safety and exposure, using a palette that speaks to vulnerability and protection. The warm brown and shelter green suggest stability and safety, while the pale skin and open blue evoke feelings of vulnerability and openness. The collision occurs in the central band, where the color warm brown meets open blue, creating visual tension and echoing the themes of pressure versus release. The use of broken pixels introduces intentional imperfections, symbolizing the fraught nature of safety and exposure—neither state is entirely secure or completely free. The pattern of stacked bands reflects layers of emotion, shifting from stable, protective colors at the top to lighter, more vulnerable tones below, resonating with the overarching theme of exposure versus shelter.</desc>
