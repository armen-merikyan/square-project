<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">This composition explores the emotional tension between love (warm colors) and betrayal (cool tones). The palette includes shades of pink and red representing love, contrasted with gray and dark maroon representing betrayal. The layout creates a diagonal flow from the warm corner to the cool across the grid, with collisions of colors at the dividing lines. Broken pixels introduce imperfection capturing the essence of emotional conflict. The arrangement suggests a rhythmic interplay between quiet and chaotic feelings, evoking the contrasts of intimacy and mistrust.</desc>
