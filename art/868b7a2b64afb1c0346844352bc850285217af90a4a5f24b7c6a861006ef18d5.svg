<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Calm</title>
  <desc id="desc">This composition embodies the emotional tension between quiet and pressure through a striking interplay of colors and patterns. The palette combines 'off_white' and 'faint_peach' to evoke calmness while 'compressed_red' and 'dark_navy' introduce dynamic pressure. The main collision occurs in the center where dense 'broken_dots' representing pressure meet the expansive 'channels' of quiet. This juxtaposition mirrors the seed concept of shattering against a tide, with sharp edges creating a visual argument against the tranquil background.</desc>
