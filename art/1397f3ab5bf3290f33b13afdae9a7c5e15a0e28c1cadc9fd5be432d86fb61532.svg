<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Serenity</title>
  <desc id="desc">The emotional tone contrasts restlessness with peace, suggesting an intense push and pull. The palette features vibrant warm colors like hot coral and blood orange to evoke feelings of unrest, juxtaposed with cooler shades like charcoal and hollow blue, representing calm. The main collision occurs at the center with concentrated warm hues interrupting the cooler background, embodying the tension between motion and stillness. Eroded symmetry creates a sense of disbalance, mirroring the chaotic aspect of restlessness while keeping a semblance of peace at the corners.</desc>
