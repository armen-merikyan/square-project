<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Boundaries</title>
  <desc id="desc">The emotional tone reflects the struggle between control and surrender. Utilizing a palette of clean white and ink black contrasted with soft violet gray and warning orange enhances the contrasting themes. The left side of the square embodies control with a 'veil' pattern creating a structured yet soft arrangement, while the right side features a 'glitch' pattern depicting chaos and interruption. The main collision occurs in the center, where both patterns overlap and introduce broken pixels, symbolizing the fraying edges of emotional pressure. This piece encapsulates a feeling of conflict and coexistence within boundaries, suggesting a dialogue between containment and overflow.</desc>
