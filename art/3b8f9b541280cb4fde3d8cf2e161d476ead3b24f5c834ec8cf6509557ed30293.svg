<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Static</title>
  <desc id="desc">The emotional tone emphasizes the struggle between clarity and interference. The dark colors represent the noise—distracting and chaotic—while the bright accent colors symbolize the audible signals trying to emerge from the static. The central pulse evokes a feeling of resilience against the overwhelming backdrop of noise. The palette, featuring navy and black with hints of white, maintains a stark contrast and suggests depth against the chaotic interference, emphasizing the struggle for clarity. The collision occurs primarily in the center, where the 'scar' pattern disrupts the smoother noise of the constellation-like shapes, representing the heart of the emotional battle.</desc>
