<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Serenity</title>
  <desc id="desc">This piece captures the push and pull between restlessness and peace through a palette of deep contrast. The dominant color is a rich static gray, representing tranquility, while splashes of electric blue and hot magenta suggest restless energy. The collision occurs predominantly in the center, where bright colors disrupt the gray, reflecting tension amidst stillness. The lattice pattern evokes peace, and the crosshatch areas introduce restlessness, creating a vibrant dialogue across the grid. Broken pixels introduce intentional imperfections, echoing memories that linger beneath the surface.</desc>
