<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragile Balance</title>
  <desc id="desc">This piece embodies the tension between vulnerability and strength, utilizing a palette of deep navy, soft whites, and muted cyan to juxtapose calmness against deep emotional currents. The center struggles against the perimeter, representing the push and pull of the duality within the seed. The static pattern of strength meets the frame of vulnerability, creating a dynamic clash that resonates with the feeling of safety vs exposure. Broken pixels introduce intentional disruptions, portraying scars in a once coherent structure, which reflects the fragility of balance. Main collision occurs at the center where the heavy navy dominates, illustrating strength, while raw white frames echo vulnerability's softness.</desc>
