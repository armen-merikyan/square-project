<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece captures the tension between certainty and curiosity through a contrast of colors and patterns. The palette features pale mint and soft sky to reflect gentle certainty, while storm gray introduces a sense of curiosity and disruption. The main collision occurs in the center, where the dense pattern of broken dots overlaps the soft threshold of muted colors, illustrating the conflict between solid structures and inviting unknowns. This creates an emotional narrative of exposure and shelter, where the center serves as a fragile island surrounded by a calming sea of quieter colors. The broken pixels add intentional disruptions, reflecting the unresolved nature of curiosity against a backdrop of order.</desc>
