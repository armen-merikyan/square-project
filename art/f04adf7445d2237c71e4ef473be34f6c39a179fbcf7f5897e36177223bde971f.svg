<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone captures the tension between desire and emptiness, represented through a vivid palette that bleeds heat and cold. Hot coral and blood orange symbolize the yearning that is central to the piece, while charcoal and hollow blue serve as borders of containment, amplifying the sense of longing. The dominant warm colors occupy the center where they converge and clash against the cooler tones at the edges, embodying the narrative of a saturated pull met with resistant boundaries. This collision creates an abstract flow that mentions the duality in the seed—interpreting the friction between the craving for more and the constraints imposed by emptiness. The barcode pattern reflects a hollow field that frames the heated desire in a digital, almost mechanistic way, emphasizing the conflict between the palpable warmth of desire and the rounded edges of restraint.</desc>
