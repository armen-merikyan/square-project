<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone centers on the conflict between desire and emptiness, illustrated through a warm palette of corals and oranges contrasted against deep charcoal and hollow blue. The entropy of desire is represented by a dense, chaotic patchwork pattern, while the quiet channel of negative space embodies emptiness. Key collisions occur where the dense threads of color intersect with patches of quiet color, conveying tension and yearning within structured boundaries, encapsulating the essence of struggle against restraint.</desc>
