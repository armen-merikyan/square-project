<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Chaos and Order</title>
  <desc id="desc">This artwork captures the emotional interplay of confusion and clarity, represented through stark contrasts between the black and white palette. The rigid structure of symmetry is disrupted by unexpected flashes of pale blue, representing noise breaking the calm. The arrangement flows diagonally, embodying a sense of falling—a visual pulse that disrupts the expected pattern. The use of broken pixels introduces a sense of imperfection and confusion, aligning with the emotional seed. The negative space leaves room for contemplation, allowing the viewer to sense the tension between chaos and serenity.</desc>
