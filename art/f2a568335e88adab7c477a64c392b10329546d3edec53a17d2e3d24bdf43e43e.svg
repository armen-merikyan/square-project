<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow and Containment</title>
  <desc id="desc">This artwork explores the emotional dichotomy between rage and calm through color placement and intensity. The palette, consisting of red, black, pale blue, and white, encapsulates the tension—red embodying rage and black as an aggressive backdrop, while pale blue offers a cool, calming presence. The main contrast occurs between the vibrant red pixels that dominate the composition, representing raw emotion trying to spill over, and the expansive black that attempts to contain it, creating negative space that invites contemplation. The zigzagging pattern—an ode to both the machine-like precision and the inherent chaos—suggests movement and collision between these emotional states, grounding the artwork in a narrative of conflict and resolution.</desc>
