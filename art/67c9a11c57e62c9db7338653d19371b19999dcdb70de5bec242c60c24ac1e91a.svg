<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Want and Void</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of emptiness and desire. The top half, representing desire, is filled with vibrant coral and orange shades that pulse with energy, creating an intense feeling of longing. The bottom half embodies emptiness with cooler hues of charcoal and hollow blue that evoke a sense of space and quiet pressure. The main contrast occurs along the horizontal divide, where warm saturated colors collide with the subdued, hollow tones. The broken pixels introduce intentional disruptions, echoing the themes of containment and overflow, while the spiral arrangement enhances movement and resonance between the two emotional states.</desc>
