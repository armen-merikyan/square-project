<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotions of desire and restraint are represented through a contrasting palette of saturated and muted tones. Bright coral and blood orange symbolize the intense pull of desire, while charcoal and hollow blue embody the cool containment of restraint. The main collision occurs in the center where bright colors meet the darker, more muted tones, illustrating the struggle between these forces. The quiet channel layout, with a negative space path cutting through the dense colors, reflects the tension between longing and limitation. This abstract pattern embodies the turmoil of emotion without depicting anything literal.</desc>
