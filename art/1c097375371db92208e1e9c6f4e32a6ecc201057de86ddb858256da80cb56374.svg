<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Balance</title>
  <desc id="desc">This composition embodies the tension between 'panic' and 'control.' The outer edges, rendered in deep charcoal and dark red, symbolize overwhelming emotions, while the inner core, featuring a gradient of burnt orange and gold, represents focused clarity and control. The stark contrast creates a dynamic collision, with soft shapes disrupted by jagged lines, echoing the struggle between chaotic feelings and grounded thought. The chosen palette of 'ancient_fire' brings warmth and intensity, amplifying the emotional narrative, while the pattern of 'teeth' and 'target' illustrates the clash of intensity against deliberation. The arrangement ensures a careful balance of negative space, allowing for moments of quiet within the tumult.</desc>
