<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">The emotional tone embodies a struggle between defiance and submission, represented through contrasting colors and geometric patterns. The palette of lime, black, electric blue, and magenta reflects vibrancy against the depth of darkness, where the black serves as a boundary or frame against which the brighter colors clash and blend. The main collision occurs in the center, with electric blue pixels asserting dominance, interrupted by the softer radial gradient of magenta that symbolizes submission. The falling pixel layout emulates weight and descent, suggesting emotional release, while the use of broken edges adds a layer of imperfection, enhancing the concept of unresolved tension. This pattern captures the essence of love's complexities, translating the seed into a visually emotional narrative.</desc>
