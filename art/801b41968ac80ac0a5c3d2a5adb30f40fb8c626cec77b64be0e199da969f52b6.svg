<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory vs Motion</title>
  <desc id="desc">This piece encapsulates the tension between control and surrender through the use of contrasting colors, creating a visual dialogue. The darker tones ('deep_olive', 'ripe_green') represent control, formulated in thread-like patterns across the canvas. Conversely, the lighter hues ('honey_gold', 'cream') evoke a sense of surrender and openness, creating a flowing, teeth-like pattern that interrupts the rigid lines of the darker shades. The central collision spot is a dynamic interplay between the two palettes, suggesting an overflow of emotion held in a structured outline. Broken pixels scatter across the composition to add intentional disorder, enhancing the tension of the piece while ensuring that it maintains a coherent abstract quality.</desc>
