<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone hinges on the tension between envy and gratitude, expressed through a warm palette of burnt orange and dark red vs a cooler charcoal and gold. The contrast is sharp where heavier colors collide with lighter hues, creating a sense of pressure surrounding a fragmented center, symbolizing broken mirrors. The central heaviness evokes both weight and lightness, while zigzag patterns suggest chaotic interruptions amidst a structured grid. Broken pixels add imperfection, imbuing the piece with a layer of complexity reflecting the dualities within the emotions.</desc>
