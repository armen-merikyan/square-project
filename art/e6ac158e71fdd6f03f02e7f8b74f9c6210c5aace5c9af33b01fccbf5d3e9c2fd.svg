<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Saturation</title>
  <desc id="desc">This composition captures the emotional struggle between desire and emptiness by employing a palette of vibrant and muted colors. The warm tones of hot coral and blood orange represent desire, while hollow blue and charcoal embody the feeling of emptiness. The main contrast occurs diagonally across the square, with the dense, warm colors spilling into the cold edges, creating a palpable tension. Broken pixels enhance this feeling of disruption while the radial and braid patterns intertwine, suggesting a dynamic movement that resists containment yet is framed by hard edges.</desc>
