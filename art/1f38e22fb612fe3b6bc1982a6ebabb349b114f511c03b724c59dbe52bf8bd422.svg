<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs. Shelter</title>
  <desc id="desc">The emotional tone of this artwork reflects the tension between safety and exposure, where soft colors evoke protection while the heavier tones convey an underlying pressure. The palette consists of shelter green and warm brown for safety contrasts, while pale skin and cold white suggest exposure. The main collision occurs vertically, symbolizing the split between safety (left side, soft green and brown) and exposure (right side, pale and cold colors), creating echoes of vulnerability and resilience as the textures pulse and flood into one another. Broken pixels add an intentional disruption that evokes a sense of reality amidst the interplay of emotion.</desc>
