<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Tides</title>
  <desc id="desc">This piece evokes the emotional duality represented by envy and gratitude through a balanced yet contrasting color palette of navy and dim cyan against stark black and white. The composition juxtaposes structured, orderly dots symbolizing gratitude with a chaotic crack pattern reflecting envy. The layout creates an invasion from one corner, producing a flow that moves through the piece, embodying both pressure and quiet. The overall impression captures how emotions collide yet harmonize.</desc>
