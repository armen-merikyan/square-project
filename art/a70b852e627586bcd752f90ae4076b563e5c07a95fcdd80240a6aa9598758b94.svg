<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">The emotional tone navigates between profound emptiness and saturated desire. The palette emerges from the warm glow of desire (hot coral and blood orange) clashing against low-saturation emptiness (charcoal and hollow blue), creating a visually impactful contrast. Central collision occurs in the middle rows, where the vibrant colors pulse against a space of subdued tones, echoing the struggle between longing and constraint. The design hints at pressure with stacked formations that transition to floods of color, establishing a rhythmic tension that embodies the seed's themes of containment and overflow.</desc>
