<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Tensions</title>
  <desc id="desc">This artwork represents the emotional duality of control and surrender through contrasting colors and patterns. The palette of hot coral, blood orange, and charcoal emphasizes warmth against the cooler hollow blue, establishing a visual dialogue. The central area uses thicker outlines and intense colors to convey pressure, while distant clusters of lighter hues offer a sense of release and quiet. The collision of dense and sparse spaces reflects the balance between the tense push of control and the soft yielding of surrender, embodied in the wave motif that organizes the chaos of colors.</desc>
