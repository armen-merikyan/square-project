<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Dark</title>
  <desc id="desc">The emotional tone showcases the collision between warmth and coldness, reflecting the duality of softness and severity. The palette combines gentle pinks and white with deeper blacks and grays to create a sense of contrast and tension. The main contrast lies in the central area, where warm colors punctuate a largely dark field, symbolizing the last light against a backdrop of severity. This pattern echoes a spiral movement, suggesting an organic flow and release, evoking feelings of guilt and forgiveness, transitioning from dense to airy, mirroring the seed's narrative.</desc>
