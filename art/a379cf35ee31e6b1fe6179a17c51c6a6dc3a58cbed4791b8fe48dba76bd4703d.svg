<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Colliding Currents</title>
  <desc id="desc">This composition embodies the emotional tension between vulnerability and strength through a dynamic interplay of colors and patterns. The warm coral and soft amber represent strength, forming a dense core in the center, contrasted by the cooler hues of cold slate and blue-black that create a feeling of vulnerability at the edges. The collision occurs at the center where a spark-like pattern reflects strength against a gridded vulnerability, evoking a feeling of being both protected and exposed. The gradual fade from density to quiet space signifies the emotional conflict of desire against emptiness, filled with a sense of yearning. This tension is deliberately echoed by broken pixels that suggest imperfections in this emotional landscape.</desc>
