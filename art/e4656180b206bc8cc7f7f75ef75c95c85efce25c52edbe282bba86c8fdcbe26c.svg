  <title id="title">Emotional Dichotomy</title>
  <desc id="desc">This artwork explores the tension between joy and grief through a structured layout of colors that represent these opposing emotions. The outer section combines deep blues and muted purples to symbolize grief, embodying a heavier emotional tone, while the inner core bursts with vibrant yellows and oranges reflecting joy. The contrast lies in the hard edges that define the boundaries between chaos and order—highlighting the struggle within. The zigzag flow symbolizes the unpredictable nature of emotions, with select broken pixels introducing imperfection, enhancing the sense of fragmented feelings.</desc>
