<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of a Pulse</title>
  <desc id="desc">The emotional tone represents a struggle between clarity (signal) and interference (noise). The chosen palette incorporates strong contrasts: 'signal_green' symbolizes the clear pulse, while 'static_gray' and 'dead_black' represent elements of noise. The central collision occurs in the middle of the grid, where the green path, indicative of clear thought, encounters magenta, denoting chaotic interruptions. Each broken pixel disrupts the rhythm, enhancing the feeling of fragments of memory trying to surface amidst static, embodying the seed's theme of conflict and exposure.</desc>
