<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilient Fragments</title>
  <desc id="desc">The emotional tone captures the tension between spark and ash, symbolizing resilience emerging from fragility. The palette of hot coral and hollow blue evokes warmth against cooler shadows, with the jagged edge style suggesting disruption. The ash-like ring pattern creates a quiet space interspersed with bright, toothy sparks of color, merging visually at the center. This interruption visually narrates a journey from restraint to release, embodying the memory of conflict.</desc>
