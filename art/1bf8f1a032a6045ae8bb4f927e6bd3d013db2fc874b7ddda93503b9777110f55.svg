<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Release</title>
  <desc id="desc">This artwork captures the emotional juxtaposition of control and surrender. The warm tones (sepia and tan) represent control and strength, while the cooler hues (dust_gray and faded_blue) embody surrender and vulnerability. The layout favors an open center that invites disruption while being partially contained by a thick outline, symbolizing pressure against release. Color collisions between muted fields and brighter accents play out the tension between these emotions, with the primary interaction occurring centrally, where warmth meets coolness—reflecting the stutter step of each emotional pull.</desc>
