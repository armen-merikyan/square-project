<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Mind Threads</title>
  <desc id="desc">This composition explores the emotional tension between longing and resolve. The use of ripe green and acid green creates a contrast that suggests a pulse between growth and stagnation. The honey gold serves as an accent, illuminating the edges while patches of deep olive reinforce themes of containment and strength amidst brokenness. The dominant presence of green reflects the longing, with a patterned interaction of elements reminiscent of patchwork, symbolizing the collision of feelings. The broken pixels punctuate the surface, highlighting imperfection and echoing the ‘mirror broken’ motif, while maintaining a balance of negative space to foster reflection.</desc>
