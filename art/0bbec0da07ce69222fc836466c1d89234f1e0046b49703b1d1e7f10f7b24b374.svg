<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Controlled Chaos</title>
  <desc id="desc">This artwork embodies the struggle between panic and control. The color palette of deep navy and black contrasts with the bright dim cyan, suggesting an underlying tension. The layout showcases a jagged edge style that disrupts smoothness, symbolizing conflict. Control is expressed through radiating rings of dark colors converging toward the center, while lighter hues play around the edges, depicting chaos encroaching into the controlled space. The broken pixels create a sense of imperfection, reinforcing the idea of 'machine emotion' amid structured chaos.</desc>
