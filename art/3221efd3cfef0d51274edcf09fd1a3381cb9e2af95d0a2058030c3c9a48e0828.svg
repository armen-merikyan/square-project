<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Resilience</title>
  <desc id="desc">This artwork embodies the ongoing tension between trust and suspicion. The rich palette blends muted earthy tones of red oxide and blackened plum, symbolizing the deep undercurrents of suspicion, juxtaposed with lighter notes of muted cream and small orange, representing moments of trust and hope. The diagonal flow creates a sense of dynamic motion across the piece, with clusters of colors interrupted by quiet expanses of iron gray and negative space, forming a spiral that evokes the tension of a pressure border. Key collisions between light and dark areas invoke the feeling of resilience amidst fragility, reflecting the duality within the seed's themes.</desc>
