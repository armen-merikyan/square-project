<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">The emotional tone captured here reflects a struggle between the warmth of desire and the cool restraint exerted from the edges. The palette of #FF6F61 (hot coral), #F57C20 (blood orange), #F1C9C1 (dust pink), #333333 (charcoal), and #00BFFF (hollow blue) exemplifies this tension, with warm hues overflowing towards the cooler borders. The collision primarily occurs diagonally, where the warm colors invade from the corner towards the center, interrupted by the cool swept edges representing restraint. This dynamic push-pull creates a visual echo of the thematic conflict, encapsulating how love can simultaneously uplift and restrain.</desc>
