<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone of this piece balances vulnerability and strength through a pale exposed center, surrounded by deeper colors representing stability. The palette of pale aqua and mist gray evokes serenity, while touches of alarm red add urgency amidst the calm. The main collision occurs vertically, where the lighter top descends into darker, denser colors in the lower sections, echoing the idea of falling pixels. The broken pixels subtly disrupt the fluidity, emphasizing the contrasts in exposure and protection, embodying the essence of the seed.</desc>
