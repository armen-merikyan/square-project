<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Shadows</title>
  <desc id="desc">This piece captures the emotional tension between trust and suspicion. The contrasting palette combines vibrant electric blue and signal green for trust, symbolizing clarity and stability, with soft grays and dead black representing suspicion, evoking unease and noise. The pattern of a crosshatch against broken frames creates a collision of light and shadow, reflecting the push and pull of these emotions. The layout split horizontally puts trust in the top half, gently gliding into the bottom half's unnerving arrangements, while maintaining some negative space for calmness amidst chaos.</desc>
