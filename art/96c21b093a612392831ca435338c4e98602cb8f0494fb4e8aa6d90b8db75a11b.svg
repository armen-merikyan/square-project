<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry of Fractured Control</title>
  <desc id="desc">The piece explores the tension between panic and control. The chosen palette of sepia, tan, dust gray, and faded blue evokes a sense of nostalgia, guiding the viewer through a journey of emotional weight. The contrast lies primarily in the radial patterns representing panic, which collide against the structured concentric rings symbolizing control. An imbalanced distribution of colors presents a narrative of instability and invasion, mirroring the chaos of betrayed expectations. The broken pixels add an element of imperfection that reinforces the chaotic aspects of the theme, while the negative space invites contemplation.</desc>
