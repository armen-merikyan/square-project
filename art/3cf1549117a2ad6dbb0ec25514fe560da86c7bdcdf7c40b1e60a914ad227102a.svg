<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inner Echoes of Emotions</title>
  <desc id="desc">This artwork captures the duality of rage and calm through a grid layout, fostering a sense of balance amidst tension. The color palette oscillates between the intense red representing rage and the cool pale blue symbolizing calm. The top-down flow conveys a rise, as if emotions are ascending, while the edge being bottom-weighted creates a feeling of grounding amidst conflict. Broken pixels are sporadically placed to evoke disruption in calmness and amplify the rawness of rage. The positioning and contrast of colors reflect the emotional battles between these states, illustrating a pulse between quietness and intensity.</desc>
