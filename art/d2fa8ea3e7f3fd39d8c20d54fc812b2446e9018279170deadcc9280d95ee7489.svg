<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">This piece navigates the emotional tension between longing and resolve. The deep black and serene pale blue create a sense of depth and contrast, while the white accents pulse through in sharp moments of clarity, representing both repair and fractures. The zigzagging pattern mimics a barcode, imparting a rhythmic tension that holds the viewer’s gaze. The arrangement balances the starkness of black with gentle light, suggesting a conversation between chaos and calm. Central collisions of tone happen where pale blue meets black, creating a heartbeat of light amidst the shadows, echoing the seed's themes of tension and release.</desc>
