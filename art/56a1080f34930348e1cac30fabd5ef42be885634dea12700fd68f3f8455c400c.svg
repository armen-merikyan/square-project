<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition embodies the emotional tension between vulnerability and strength. The top half, dominated by soft greens and creamy neutrals, contrasts with the assertive deep olives and sharp honey golds below, illustrating the push and pull of open exposure against protective strength. The patterns of 'tide' and 'mirror' collide at the center, creating visual friction that represents the struggle between these opposing forces. The palette reflects complexity—warm honey and ripe greens convey vulnerability, while darker olives and acids signify strength.</desc>
