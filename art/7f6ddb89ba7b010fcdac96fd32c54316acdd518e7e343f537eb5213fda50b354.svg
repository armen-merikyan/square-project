<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tidal Rhythms</title>
  <desc id="desc">The emotional tone embodies a push-pull dynamic between certainty and curiosity. The 'burnt orange' and 'dark red' represent the warmth of certainty, forming a solid base in the outer frame. In contrast, the inner core features 'charcoal' and 'gold' in swirling ripple patterns, reflecting the spirit of curiosity. The sharp vs soft contrast emerges through the interplay of solid colored edges against softer, intertwining gradients, creating an ongoing dialogue between order and chaos. The accidental broken pixels serve as tactile disruptions in an otherwise structured grid, emblematic of the ebb and flow set forth by the seed's themes.</desc>
