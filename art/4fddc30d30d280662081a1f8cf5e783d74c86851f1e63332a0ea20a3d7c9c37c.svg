<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Resilience</title>
  <desc id="desc">This piece captures the contrasting emotions of spark and ash, representing hunger versus restraint. The emotional tone is a play between the dynamic, bright pulse of 'spark' as represented by sharp crimson, and the subdued, soft quality of 'ash' embodied in shades like warm white and steel gray. The palette incorporates both strength and subtlety, with a bright cluster of sharp crimson indicating vitality, surrounded by the grounding tones of warm white and carbon black, creating an isolated impact. The collision occurs towards the center, where the radial pattern symbolizing 'ash' overlaps with the pulse marks of 'spark', suggesting a tension between growth and decay. This interplay of patterns evokes the fragility of resilience amid overwhelming pressures, creating an abstract story of emotional conflict and balance.</desc>
