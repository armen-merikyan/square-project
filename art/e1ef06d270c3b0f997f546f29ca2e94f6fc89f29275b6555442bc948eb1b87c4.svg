<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Boundaries</title>
  <desc id="desc">This composition embodies the confrontation between defiance and submission. The outer border, dominated by dark tones (#000000, #444444), evokes an unyielding strength, while the inner section utilizes brighter and more chaotic elements like hot magenta (#FF1F8A) and electric blue (#0070FF) to convey rebellion and energy against the calmness of static gray (#808080) which represents submission. The diagonal pulse marks across the center illustrate the collision and intertwining of both emotions. The broken pixels introduce intentional imperfections, symbolizing the unpredictability of emotional experiences.</desc>
