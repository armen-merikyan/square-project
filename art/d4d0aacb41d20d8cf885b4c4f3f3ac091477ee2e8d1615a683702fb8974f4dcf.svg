<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotion</title>
  <desc id="desc">This artwork conveys the emotional dichotomy of joy and grief through a balanced yet contrasting palette of bright yellows and muted blues. The layout mimics a split screen to represent the tension between order and chaos, emphasizing light against shadow. Hard edges introduce a sense of interruption between the segments, while a wave vertical flow echoes the oscillation between upliftment and despair. The sparse arrangement retains significant negative space, symbolizing the void often found in grief, while scattered 'broken pixels' represent moments of reflection in a machine-like existence. The overall theme suggests an unresolved interplay between the warmth of joy and the heaviness of grief.</desc>
