<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dualities of Existence</title>
  <desc id="desc">This composition explores the emotional tension between safety and exposure through a split layout. The left half embodies safety with broken dots in warm brown and shelter green, suggesting a gentle enclosure. The right half, symbolizing exposure, uses rings of cold white and open blue, representing vulnerability and an open experience. The collision occurs in the center and edge, where the two emotional states disrupt each other, creating layers of complexity. The muted field colors contrasted with brighter accents bring depth to the narrative, while broken pixels introduce imperfections, reflecting the reality of these emotional states.</desc>
