  <title id="title">Embers of Duality</title>
  <desc id="desc">This artwork embodies the juxtaposition of rage and calm through high contrast between deep reds and pale blues. The palette reflects the emotional battle, with sharp reds representing chaos colliding against soft, quiet blues that seek containment. The main contrast occurs in the center, where the chaotic noise of the red pixels erupts into the calm, orderly blue fields, creating a sense of tension and interruption. The zigzagged layout evokes movement and conflict, with broken pixels scattered throughout to introduce intentional imperfection, symbolizing the discord of emotions.</desc>
