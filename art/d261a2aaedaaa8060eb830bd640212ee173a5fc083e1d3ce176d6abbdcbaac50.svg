<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise Against the Fall</title>
  <desc id="desc">This composition explores the push and pull of control versus surrender, embodied in contrasting patterns and color relationships. The palette of quiet pressure includes off-white and faint peach for the surrendering core, embodying a gentle descent. Dark navy and compressed red form the assertive frame, providing tension as they collide with the softer inner sections. The outer edges create a thick outline, symbolizing control, while the delicate inner portion, marked by pulse-like energy, suggests vulnerability and overflow, leading to visual discomfort and reflection.</desc>
