<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal Fracture</title>
  <desc id="desc">This composition reflects the emotional tension between emptiness and desire through a contrasting color palette of deep navy and cool dim cyan against stark blacks and hints of white. The top half symbolizes desire with fragmented patterns mimicking frames, while the bottom embodies emptiness through a staircase pattern that conveys a descent or loss. The central collision zone merges the two concepts, with broken pixels introducing an imperfection that underscores a fractured heart signal, enhancing the raw emotional undercurrent. The layout, split horizontally, accentuates the dual nature of the themes, inviting the viewer to experience the rise and fall of emotional states.</desc>
