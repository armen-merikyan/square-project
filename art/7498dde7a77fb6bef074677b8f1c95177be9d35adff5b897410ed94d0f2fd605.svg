<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Wedges</title>
  <desc id="desc">This artwork reflects the emotional tension between trust and suspicion by utilizing a diagonal layout where trust in soft greens and creams occupies the lower left, while suspicion in deep olives and accentuated shadows fills the upper right. The chosen palette evokes a sense of contrasting warmth and coolness, embodying security with the lighter tones and tension with darker elements. The collision occurs at the diagonal edge, creating an echo of uncertainty against a soft glow, illustrating the struggle between hope and doubt, framed within sealed edges for a stark boundary.</desc>
