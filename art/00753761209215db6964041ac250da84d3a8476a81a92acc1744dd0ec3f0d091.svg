<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork embodies the emotional struggle of defiance and submission through stark contrasts in color and pattern. The palette of black, dark violet, soft gold, and pale green evokes an interplay of tension—black and dark violet signify defiance, while the soft gold and pale green represent moments of submission. The main collision occurs at the center where an echo pattern in dark violet converges with a lattice of soft gold, creating an energy that suggests conflict and resolution. Imperfections from broken pixels enhance the chaotic feel, while the negative space enforces a breathing room within the piece, allowing the opposing forces to coexist yet remain in tension.</desc>
