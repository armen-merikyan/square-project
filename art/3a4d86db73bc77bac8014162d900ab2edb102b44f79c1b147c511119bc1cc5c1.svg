<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Distance</title>
  <desc id="desc">The emotional tone balances between longing's subtle warmth and resolve's steady clarity. The color palette features soft, warm shades of rose clay and distant lilac juxtaposed with the cool blue, creating tension. The main contrast appears in the center, where the inner patterns intertwine but never fully merge, symbolizing the interplay of intimacy and distance. Both patterns of longing and resolve exist in a dance, overlapping yet distinct, echoing the intention behind the seed while never presenting literal imagery.</desc>
