<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict in Balance</title>
  <desc id="desc">This artwork conveys the emotional tension between defiance and submission. The warm, burnt orange and dark red signify defiance, while the cooler tones from the charcoal and gold reflect submission, creating a dynamic contrast. The left side features a stair-pattern suggesting upward defiance, clashing against a crosshatch texture on the right that evokes submission and restraint. The overall tension is emphasized by the bottom-weighted arrangement, which feels heavier amidst the abstract narrative of open versus closed spaces.</desc>
