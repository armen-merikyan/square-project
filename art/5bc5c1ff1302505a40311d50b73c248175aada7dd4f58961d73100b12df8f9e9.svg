<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Connection</title>
  <desc id="desc">This piece captures the emotional tug-of-war between loneliness and connection. The palette features deep, dark maroon and soft pink tones to symbolize the struggle and yearning for warmth amid isolation. The contrast is embedded in the matrix where stronger colors clash or dissipate into lighter, softer shades, creating a dynamic rhythm of pressure and release. The use of jagged edges and broken pixels emphasizes the theme of fragmentation in connection—a single pixel representing the hope of unity amid pervasive voids. The layout suggests an 'empty room' where loneliness finds space to explore the depth of feeling, resonating with the core theme of the seed.</desc>
