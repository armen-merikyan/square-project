<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">The emotional tone reflects the tension between the feelings of relief and dread. The palette of pale mint and faded gold evokes a sense of warmth and lightness, while storm gray and near black create a heavy, ominous backdrop. The composition features clusters of dots contrasted against braided patterns that signify chaos within the measured symmetry of the grid. The collision occurs predominantly in the center, where the dominant dark tones interact with lighter, revealing spaces, emphasizing a struggle between heaviness and brightness. The idea of 'window' as a metaphor shapes the entire piece to suggest transparency amidst burden, echoing the complexities of emotional layers.</desc>
