<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This piece embodies the emotional struggle between restlessness and peace. The palette incorporates muted tones like sepia and dust gray to evoke a sense of nostalgia, while the flickering accents of faded blue introduce a pulse of energy and movement. The main collision occurs at the center where warmer tones break through cooler undertones, creating tension and arresting the eye. The patterns 'embers' and 'islands' alternate across the canvas, representing the dynamic conflict and eventual resolution, while the broken pixels add depth and imperfection, mirroring the complexity of memory versus motion.</desc>
