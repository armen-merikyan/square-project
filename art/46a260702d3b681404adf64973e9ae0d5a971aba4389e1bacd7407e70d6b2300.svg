<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Disorder</title>
  <desc id="desc">This artwork captures the emotional tension between confusion and clarity. The left side, filled with dark shades (#000000 and #1F1F1F), uses the checker pattern to depict chaotic movement and uncertainty, while the right side gradually shifts towards lighter shades of blue and magenta to symbolize clarity and calmness. The broken pixels introduce imperfections, echoing the sense of fragmented clarity. The electric blue acts as a pulse, contrasting starkly against the deeper blacks, creating a visual rhythm that pulls the viewer's eye across the piece. The split vertical layout emphasizes the juxtaposition between chaos and clarity, echoing the seed-inspired emotional landscape. Each color and pattern choice contributes to the overarching experience of oscillation between confusion and clarity.</desc>
