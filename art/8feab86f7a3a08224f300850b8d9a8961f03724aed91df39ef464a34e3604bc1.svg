<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Torn Connections</title>
  <desc id="desc">The artwork captures the emotional contrast between loneliness and connection. The palette consists of sepia, tan, dust gray, and faded blue, evoking nostalgia and warmth alongside feelings of isolation. The centered diamond shape creates a focal point, surrounded by density and negative space, signifying hidden depths versus exposed vulnerabilities. A top-weighted flow directs the viewer's gaze downward, amplifying tension between isolation at the periphery and the warmth at the core. Each broken pixel enhances the theme of imperfection in connection, signifying the tear in our social fabric.</desc>
