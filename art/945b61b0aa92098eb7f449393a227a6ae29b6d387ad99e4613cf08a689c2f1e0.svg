<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The artwork conveys a deep emotional tension between desire and emptiness. The palette features a vibrant mix of hot coral and blood orange, representing desire's saturated pull. In contrast, the charcoal and hollow blue symbolize the emptiness that holds it back, creating a sense of quiet pressure. The central area, dense with warm colors, contrasts starkly with the cooler edges, which evoke containment. This collision creates an inviting yet restrained atmosphere, demonstrating an internal conflict that resonates through the arrangement and color dynamics.</desc>
