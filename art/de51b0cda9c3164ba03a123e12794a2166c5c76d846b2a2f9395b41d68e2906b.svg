<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Strength Through Vulnerability</title>
  <desc id="desc">This composition explores the emotional tension between vulnerability and strength, using a palette drawn from shades of pink, red, gray, and dark maroon to symbolize love and betrayal. The contrasting textures, represented by stripes and pulse marks, intertwine throughout the grid. The central area is densely arranged with deep reds, embodying strength, while the surrounding edges present a softer, more exposed palette, suggesting vulnerability. The layout features a broken frame to symbolize the interruptions and fractures in connection that arise from these contrasting emotions. The main collision occurs in the center, highlighting the stark differences and interplay between solid and soft tones.</desc>
