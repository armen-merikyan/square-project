<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition embodies the emotional tension between defiance and submission through a striking contrast of bright accents centrally placed against muted tones that envelop them. The chosen palette of off-white, dust gray, compressed red, dark navy, and faint peach creates a subtle interplay of light and shadow, evoking feelings of quiet strength versus encompassed fragility. The collision occurs predominantly in the center with the vibrant compressed red creating a focal point that boldly asserts itself against the surrounding muted layers, reflective of the core value of defiance challenged by enclosing pressures. This structure reflects the seed's concept, depicting an inward spiral that constrains while being visibly interrupted by outward bursts, which symbolize resistance.</desc>
