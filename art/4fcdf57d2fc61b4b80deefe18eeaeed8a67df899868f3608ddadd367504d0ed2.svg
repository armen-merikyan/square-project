<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone juxtaposes vulnerability and strength, represented through a palette of cool, muted tones suggesting melancholy and introspection. The primary colors flow from a deeper rain blue at the edges into a soft cyan at the center, creating a gentle gradient that signifies a complex emotional landscape. The collisions occur around the center, where the hues of muted plum and lavender gray interrupt the calmness, implying areas of tension and emotional conflict. The broken edges reflect the fragility inherent in vulnerability, while the presence of the halo pattern evokes strength emanating from a stable core. This composition mirrors the seed's themes of exposure and safety, creating a cohesive narrative of struggle and resilience.</desc>
