<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Light and Weight</title>
  <desc id="desc">This artwork captures the emotional tension between fear and hope through a careful juxtaposition of dark and light tones. The selected palette, consisting of deep black and dark violet for fear, alongside pale green and soft gold for hope, reflects the struggle between these opposing feelings. The top half of the canvas employs a crack pattern that symbolizes fear through irregularity and jagged edges, while the bottom utilizes a rain pattern representing uplifting hope and fluidity. The glowing edges evoke the illuminating potential of hope peeking through darkness. The most vibrant colors collide at the horizontal split, emphasizing the emotional contrast central to the composition. An intentional negative space in the middle invites reflection, creating a heartbeat between turmoil and serenity.</desc>
