  <title id="title">Echo of Shelter</title>
  <desc id="desc">This artwork encapsulates the tension between safety and exposure. The palette features muted greens and browns for safety, while pale skin and cold whites represent vulnerability. The collision occurs off-center, creating a protected space against an encroaching texture, echoing the contrasts of softness and severity. The jagged edges evoke a sense of interruption, delivering a visual narrative of pressure yielding to release within the confines of a designated shape, reinforcing the emotional duality of the seed.</desc>
