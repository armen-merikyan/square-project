<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a dynamic struggle between vibrant desire and muted restraint. The palette combines hot coral and blood orange to embody the saturating pull of desire, countered by the calming depth of charcoal and hollow blue to illustrate restraint. The center is dense and saturated, creating a vivid collision at the core, while the steady ripple pattern of the restraint color adds textural interruption at the borders. Such arrangement emphasizes the locking effect against expansion, invoking feelings of both tension and yearning, embodying the spiral pressure of emotional conflicts.</desc>
