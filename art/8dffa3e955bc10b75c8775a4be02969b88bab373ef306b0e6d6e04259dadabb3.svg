<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamics of Resistance</title>
  <desc id="desc">Emotional tone emerges from the struggle between defiance and submission, framed in a grid where bold patches of deep sepia and muted dust gray convey a sense of conflict. The color palette reflects a transformation from the chaotic whispers of soft collapse to sharp, bright refusals, indicating struggle. The main collision occurs at the center, where bright colors clash against dark, symbolizing the unease of a threshold; the patchwork of defiance juxtaposed with the fluid, flood-like submission conveys a heartbeat resembling pulse marks against a glitch, marking moments of tension and release. Each row is designed to reflect this oscillation, leading to a dynamic, abstract composition.</desc>
