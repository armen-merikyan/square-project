  <title id="title">Contrast of Tension</title>
  <desc id="desc">This artwork explores the emotional tension between defiance and submission through color and pattern. The chosen palette of soft hues and dark accents reflects a quiet pressure, providing a balance of dense vs. empty. The top half employs a veil pattern representing defiance with bolder contrasts and angular placements, while the bottom half uses dots suggesting submission, marked by softer, more enclosed placements. The central area is dense, representing a collision of ideas, while the edges are quieter, allowing for reflective space amidst the chaos.</desc>
