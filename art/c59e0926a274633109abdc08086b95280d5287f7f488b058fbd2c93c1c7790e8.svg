<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece conveys a tension between desire and emptiness, utilizing a palette of warm tones (hot coral and blood orange) for desire juxtaposed against muted shades (charcoal and hollow blue) representing emptiness. The layout focuses on a bright cluster in the center, expressing yearning, while the surrounding dark areas signify longing and lack of fulfillment. The core collision occurs at the center where warm colors pulse towards the edges, contrasted by stark cool tones, creating an emotional push and pull within the frame. Broken pixels introduce an element of imperfection that echoes the disruptive nature of desire restrained by its borders.</desc>
