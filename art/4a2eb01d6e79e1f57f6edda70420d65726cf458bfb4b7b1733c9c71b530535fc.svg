<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Embrace</title>
  <desc id="desc">The emotional tone represents a struggle between warmth and coldness, capturing the essence of 'love vs betrayal'. The palette, featuring red and soft pink combined with gray and dark maroon, symbolizes the warmth of love contrasted against the chill of betrayal, suggesting a turbulent emotional landscape. The arrangement reflects a balance of dense areas and negative space, portraying the tension of a heart fragmented—some areas are chaotic while others feel calm. This reflects the rising signal of hope amidst the diagonal fall of despair and mistrust. The use of crosshatch and target patterns creates an echo of conflict within the composition, disrupting the otherwise fluid flow.</desc>
