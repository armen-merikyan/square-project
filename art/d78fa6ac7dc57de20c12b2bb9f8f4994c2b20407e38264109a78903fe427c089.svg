<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">The emotional tone explores the push and pull between defiance and submission, using the contrasting shades of red and black to emphasize conflict and weight. The pale blue offers a moment of distance, contrasting with the dominant colors for reflection. The layout is mirrored with intentional imperfections to showcase the chaos inherent in structured relationships, visualizing the mental tug-of-war. A bottom-weighted design balances the chaotic elements, suggesting the weight of submission while the lighter top evokes defiance, forming a dense narrative within the pixel structure.</desc>
