<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Between Severity and Softness</title>
  <desc id="desc">This piece captures the tension between softness and severity through an interplay of muted and vibrant colors. The palette of powder pink, warm white, and sharp crimson contrasts with the deep tones of carbon black and steel gray, creating a visual representation of emotional conflict. The small pulse-like marks, rendered in subdued colors, collide against the larger quiet fields, echoing the feelings of guilt and forgiveness as they occupy space on the canvas, emphasizing their divergence. The layout, featuring two pulses, enhances this opposition while leaving a soft negative space to suggest an open gate of potential.</desc>
