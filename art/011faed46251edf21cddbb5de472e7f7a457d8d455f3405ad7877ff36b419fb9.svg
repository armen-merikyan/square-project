<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition encapsulates the emotional tension between vulnerability and strength, with a pale center representing exposure and darker edges symbolizing protection. The palette leans on dark navy and black to create a sense of weight and shadow, while the lighter dim cyan hints at fragile illumination. The central collision occurs in the middle, where the bright cyans and muted blacks interact, leaving the surrounding edges darker—symbolizing a protective barrier around an exposed core. The selected patterns of spark (for strength) and ring (for vulnerability) deliberately interrupt and integrate, forming a visual narrative of conflict and coexistence.</desc>
