<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This artwork captures the tension between defiance and submission through contrasting colors and patterns. The mourning black and deep blue convey a sense of weight and resistance, while the pale yellow and new leaf hues suggest renewal and hope. The center, marked by diagonal shatter patterns, creates a collision point, set against the soft radial patterns of submission in the corners. This balance evokes an emotional space where order meets chaos, embodying the threshold of emotional states. The introduction of broken pixels adds imperfection, enhancing the narrative of conflict and resolution.</desc>
