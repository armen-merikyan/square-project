<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Intent</title>
  <desc id="desc">This piece embodies the emotional tension between longing and resolve, alternating between warm accents and cool shadows to provoke a visceral reaction. The palette, consisting of hot coral and blood orange against the depth of charcoal and hollow blue, highlights the struggle between desire and emptiness. The patterns of 'flood' and 'spark' collide at the center, where the intensity of longing engulfs the resolve, creating a striking focal point that invites contemplation. The broken pixels disrupt the flow, symbolizing interruptions in emotional clarity, and maintaining negative space fosters an introspective balance.</desc>
