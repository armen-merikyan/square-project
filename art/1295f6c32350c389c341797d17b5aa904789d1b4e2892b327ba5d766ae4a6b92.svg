<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition visualizes the tension between desire and emptiness. The chosen colors reflect a saturation of yearning (hot coral, blood orange) against the muted tones (charcoal, hollow blue) that evoke constraints. The layout spirals, symbolizing the pull toward a center filled with warmth, contrasted by cooler, empty edges. Broken pixels are employed to disrupt this yearning, suggesting wounds in the journey of desire, while maintaining areas of negative space to emphasize absence.</desc>
