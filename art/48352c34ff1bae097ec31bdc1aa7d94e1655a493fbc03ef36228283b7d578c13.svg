<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Currents</title>
  <desc id="desc">This composition represents the emotional dialogue between tenderness and rage through contrasting colors and arrangements. The outer border, in deep blacks and muted whites, symbolizes the pressure and explosive nature of rage, while the inner core evokes tenderness through softer blues and gentle interruptions of light. The chosen palette of 'rage_calm' combines stark red with pale blue to explore this emotional spectrum. The collision occurs prominently in the center where the calm inner core meets the chaotic outer frame, depicting an intimate yet tumultuous relationship, embodying the core versus frame layout while also allowing for an echo of tenderness amidst rage.</desc>
