<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Embrace</title>
  <desc id="desc">This artwork encapsulates the emotional conflict between vulnerability and strength. The selected palette of warm clay against cooler blues and distant lilacs represents the balance of intimacy and distance, fitting the central theme of exposure versus shelter. The composition has a defined flow from the bottom left to the top right, where stronger, root-like colors cluster, emanating a sense of strength and stability. The gentle pressure of outward colors hints at vulnerability, creating an interplay that reminds us of the quiet force within fragility. Broken pixels at intervals disrupt the smooth surface, hinting at life's imperfections and the beauty within them.</desc>
