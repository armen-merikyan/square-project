  <title id="title">Ebb and Flow</title>
  <desc id="desc">This artwork embodies the emotional tension between softness and severity. The lighter shades of powder pink and warm white represent the softness and gentle edges, while the depth of carbon black and sharp crimson contrast with severity and strictness. The light elements create pulses against darker radial tones, signifying a perpetual struggle between openness and constraint. The checker pattern competes with a broken frame, visually illustrating collision while leaving space that evokes introspection.</desc>
