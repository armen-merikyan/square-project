<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece represents the emotional tension between rage and calm through the interplay of sharp, jagged red accents with cooler, softer tones of blue and white. The upper half is dominated by a grid pattern, symbolizing the chaos and explosiveness of rage, while the lower half features embers of calm that create a sense of balanced negativity across the canvas. The collision occurs at the center, where rage collides with calm, creating a stark separation yet a vivid interaction of colors and patterns, illustrating the concept of an echo mark where emotions bleed into one another.</desc>
