<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">This piece conveys a struggle between restlessness and peace, utilizing deep and muted tones to express the emotional weight of memory against the lightness of motion. The palette is carefully curated with mourning black and deep blue for gravity, alongside pale yellow and new leaf for a sense of renewal. This contrast creates a dynamic interplay where deep hues dominate (65%) and lighter accents punctuate to suggest moments of hope and escape. The arrangement uses clustered patterns of dark squares representing chaos against a gentle top gradient, which embodies the quiet yet persistent pull of peace. The broken pixels introduce intentional disruption, embodying the idea of a shattered peace amidst unresolved motion.</desc>
