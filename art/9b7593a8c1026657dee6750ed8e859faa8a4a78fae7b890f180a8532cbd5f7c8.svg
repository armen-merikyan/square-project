<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">hunger_vs_restraint</title>
  <desc id="desc">The emotional tone of this artwork represents the tension between desire and emptiness. The palette was chosen to juxtapose vibrant warm colors (hot_coral, blood_orange) against muted cool tones (charcoal, hollow_blue), embodying the push and pull of yearning and lack. The main contrast culminates near the center of the grid, where broken dots of warmer hues collide with crosshatch patterns of cooler shades, signifying an interruption of desire bound by the edges of emptiness. These shapes echo the spiral and frame mentioned in the seed, creating an abstract visual dialogue of overflowing emotion restrained by external limits, with an intentional inclusion of broken pixels to suggest rawness and imperfection.</desc>
