<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">This piece explores the emotional tension between calm and rage through a carefully chosen palette of stark contrasts. The reds represent explosive energy and rage, while the use of blacks and pale blues symbolizes a calming presence trying to contain these aggressive emotions. The layout is intentionally mirrored but disrupted by broken pixels, suggesting a conversation between chaos and serenity. The collision happens primarily in the center, where fiery reds clash against the quiet realms of pale blue, creating an impactful visual narrative that embodies both contained overflow and the scars of emotion.</desc>
