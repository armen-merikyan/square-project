<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This piece embodies the emotional dichotomy of vulnerability against strength through its color patterns and spatial arrangement. A central pale space (#F4D0B5) represents vulnerability amid a protective framework of deeper hues. The use of shelter green (#5A9B60) and soft brown (#8B5B29) juxtaposes the feelings of grounding and safety against exposed elements. The edges are defined yet irregular, marking the contrast between hard edges and soft breaks, while broken pixels introduce intentional imperfections. The main collision occurs diagonally, where the pale center interacts with more saturated colors, echoing the tension between exposure and sanctuary.</desc>
