<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">The artwork captures the emotional tension between longing and resolve through contrasting color pairings. The dark palette evokes a feeling of depth and complexity, while subtle accents suggest moments of hope and connection. The pattern features overlapping flow—soft ripples representing longing intermingle with firm threads of resolve, creating a dense center with a subtle halo effect around it, signifying a boundary between the emotional states. The collision occurs predominantly in the center, embodying the struggle of these feelings. Broken pixels introduce intentional disruptions, echoing the imperfections in the emotional experience.</desc>
