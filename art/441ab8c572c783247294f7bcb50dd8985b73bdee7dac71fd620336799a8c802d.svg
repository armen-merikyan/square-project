<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Edgebound Conflicts</title>
  <desc id="desc">This abstract piece captures the essence of emotional collision using a palette of burnt orange, dark red, charcoal, and gold. The left side embodies defiance with its warm, vivid colors, while the right portrays submission with cooler, muted tones. The thin outline suggests a boundary between emotions, creating a tension that echoes the seed's concept of contrast and pressure. Each row reflects a shift in density, symbolizing the ongoing battle between these contrasting feelings, while strategically placed 'broken pixels' introduce an element of imperfection, echoing real emotional experiences. The layout, divided vertically, visually represents the split between oppositional forces, fostering a narrative of struggle and release.</desc>
