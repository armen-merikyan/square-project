<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork conveys the emotional tension between desire and restraint through a dynamic color palette of saturated and muted tones. The palette transitions from warm coral and blood orange, representing desire, to cool charcoal and hollow blue, symbolizing restraint. The central collision appears in the core of the piece, where vibrant colors radiate outward, juxtaposed against the restrained edges. This interaction captures a visual narrative of longing within confines, echoing the spiral pressure theme of the seed. The 'ring' pattern evokes a cyclical push and pull, while strategically placed broken pixels introduce a sense of imperfection and authenticity.</desc>
