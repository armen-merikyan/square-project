<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of restlessness and peace through contrasting patterns and colors. The upper half, representing restlessness, uses darker shades of red and maroon with a crosshatch pattern that visually stutters and creates an unsettled border. The lower half contrasts with softer pinks and grays in a 'teeth' pattern signifying peace and gentle balance. The collision occurs at the center where the tension of the dark against the light creates a vivid emotional dialogue, echoing the seed's themes like 'memory vs motion'. The use of broken pixels adds imperfections, mirroring the complexity of emotions intertwined in our memories.</desc>
