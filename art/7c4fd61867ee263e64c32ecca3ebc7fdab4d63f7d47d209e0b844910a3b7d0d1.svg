<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal Within Shadows</title>
  <desc id="desc">The emotional tone reflects the tension between trust—a warm, glowing presence—and suspicion, represented by static and harsh contrasts. Using a color palette of signal green, electric blue, dead black, static gray, and hot magenta creates a visual conflict where warm and cold collide. The main contrast happens diagonally, suggested by the split between the soft glow of green and the hard shadow of black, echoing the broader theme of resonance amidst noise. The abstract arrangement suggests an island of trust struggling against waves of suspicion, with broken pixels symbolizing imperfections in communication.</desc>
