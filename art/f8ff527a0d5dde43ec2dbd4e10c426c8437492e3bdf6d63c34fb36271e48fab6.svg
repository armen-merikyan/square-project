<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Connected Solitude</title>
  <desc id="desc">This artwork evokes a sense of emotional tension between loneliness and connection. The jagged presence of deep blues represents isolation, contrasted sharply with areas of muted yellow and orange that suggest warmth and togetherness. The palette 'joy_grief' speaks to the complexity of these emotions—lightness battling heaviness. The pattern mimics broken dots which symbolize fragmented memories and feelings, while the layout maintains enough negative space to invite the viewer to reflect on their own experiences. The left-heavy arrangement implies a weight of loneliness, interrupted by splashes of color that reach out, portraying the struggle for connection amidst solitude.</desc>
