  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects a fragile strength battling exposure and shelter. The palette consists of moss green and bone white for a sense of resilience touched by vulnerability, with rust and stone gray grounding the piece in weight and depth. The main contrast occurs in the center, where radial strength patterns clash with vulnerable pressure bands, creating a visual whirlpool of tension and release, maintaining at least 10% negative space to evoke breathing room amidst emotional pressure.</desc>
