<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilient Sparks</title>
  <desc id="desc">This piece embodies the emotional tension between resurgence and decay, where the top half represents 'spark' through warm, vibrant colors, suggesting ignition and energy, while the bottom half portrays 'ash' through muted, cooler tones that echo restraint and fading. The palette of moss green, bone white, rust, stone gray, and small gold reflects resilience and fragility, balancing the vigor of the fiery tones against the somber shades below. The main collision occurs at the boundary, fostering a dynamic contrast, while broken pixels introduce intentional disruption to evoke a sense of memory and erasure. This interplay captures the essence of the seed, transforming contrasting emotional states into an abstract dialogue.</desc>
