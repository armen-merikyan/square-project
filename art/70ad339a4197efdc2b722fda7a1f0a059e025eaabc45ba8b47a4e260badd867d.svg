<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">This composition explores the tension between desire and restraint through color and arrangement. The warm hues of red_oxide and small_orange evoke desires that spill into the grid while the muted tones of blackened_plum and muted_cream represent attempts at containment. The palette contrasts saturated warmth against cooler, muted edges, forming steady stillness. The main collision occurs in the corner, where overflowing warm colors collide with contained, quiet fields, illustrating the struggle of longing bound by restraint. The shape seed, 'stair_step,' manifests as the rhythmic layering of colors, echoing the highs and lows of emotional pressure.</desc>
