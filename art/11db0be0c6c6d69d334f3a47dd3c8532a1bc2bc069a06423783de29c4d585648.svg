<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Centered Collision</title>
  <desc id="desc">The artwork embodies the emotional tension between softness and severity, utilizing a palette that merges gentle powder pinks and warm whites with dark accents of carbon black and sharp crimson. The center is densely saturated with the soft tones, producing a gentle warmth, while the edges consist of stark darks that create a contrasting boundary. The use of stacked patterns in the center represents resilience and comfort, while the dotted patterns at the edges reflect a harshness and the intensity of severity. This interplay creates a sense of conflict and balance, effectively celebrating the emotional narrative from 'guilt to forgiveness'.</desc>
