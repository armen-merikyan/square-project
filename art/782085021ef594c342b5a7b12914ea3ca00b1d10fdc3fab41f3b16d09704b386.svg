<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece embodies the emotional interplay between vulnerability and strength through an asymmetrical arrangement. The color palette merges colder tones of black and electric blue, creating a stark contrast against warmer magenta and lime green. The dense cluster of colors in the top left corner signifies pressure and strength, cascading outward towards the softer, lighter tones, representing vulnerability and exposure. The broken pixels introduce intentional disruption, suggesting the effects of life's pressures while maintaining a sense of flow from the corner into the exposed center, guiding the viewer's emotional journey through shades of safety and exposure.</desc>
