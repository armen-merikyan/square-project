<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This composition conveys an emotional tension between desire and restraint, using a palette that juxtaposes the warmth of saturated colors against the muteness of cooler tones. The overwhelming presence of hot coral and blood orange represents the pulsing desire, while the muted charcoal and hollow blue provide a stark boundary, symbolizing the held restraint. The cluster of warm colors in the center clashes against the cooler, darker edges, highlighting the dynamic between attraction and limitation. The ripple and stripe patterns create a sense of movement across the space, underlining the push and pull inherent in the seed's themes.</desc>
