<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Calm and Chaos</title>
  <desc id="desc">This composition captures the emotional tension between restlessness and peace, utilizing a palette inspired by cosmic indigo, void black, and cold gold. The arrangement features a cluster of brighter colors surrounded by darker tones, evoking a sense of desolation countered by fleeting moments of light. The main contrast arises in the top quadrant, where flashes of light (cold gold) echo against deep darkness (void black), suggesting a struggle between chaos and tranquility. The patterns of 'grid' and 'thread' collide but don’t overwhelm each other, creating a layered narrative of movement and stillness, mirroring the seed's themes of memory and motion.</desc>
