<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Want</title>
  <desc id="desc">This composition explores the emotional duality of emptiness and desire through a contrast of warm and cool colors. The palette features deep blacks and electric blues clashing with vibrant lime and magenta, representing the tension between void and fulfillment. The flow rises from bottom to top, symbolizing a yearning for elevation against the backdrop of darkness. As the colors collide and intermingle, the pattern evokes both noise and rain, creating a sense of dynamic rhythm. Broken pixels add a layer of imperfection, enhancing the feeling of uncertainty while maintaining negative space that embodies the weight of longing.</desc>
