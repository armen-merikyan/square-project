<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Signals</title>
  <desc id="desc">The emotional tone reflects a struggle between clarity (signal) and confusion (noise). The palette combines deep navy and dim cyan for the signal with black as the obstructive noise, creating a stark contrast intended to showcase the collision between a singular focused pulse and the chaotic interference. The pattern utilizes a central bright pathway disrupted by darker edges to embody the essence of 'signal vs noise', leaving negative space that represents quiet amidst chaos. The layout emphasizes how the noise envelops but doesn’t completely consume the signal, allowing for moments of clarity to shine through.</desc>
