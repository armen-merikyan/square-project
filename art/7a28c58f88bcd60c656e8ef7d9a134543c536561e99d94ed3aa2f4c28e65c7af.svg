<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This artwork conveys the emotional tension between desire and emptiness. The palette of vibrant 'hot_coral' and 'blood_orange' clashes with muted tones like 'charcoal' and 'hollow_blue,' emphasizing the yearning that feels trapped within a constrained space. The 'rising_signal' layout suggests upward aspiration. The diagonal collisions of the pulse and threshold patterns interrupt the flow, representing the chaos within our wants versus voids. Broken pixels inject a sense of imperfection, reinforcing the theme of unfulfilled desire.</desc>
