  <title id="title">Order in Disruption</title>
  <desc id="desc">This artwork embodies the tension between restlessness and peace, utilizing a palette of contrasting colors—cool whites and blues alongside darks and vibrant oranges. The grid on the left represents peace through a balanced structure, while the right reflects restlessness with a disrupted ash field pattern. The collision occurs diagonally, emphasizing the tension point, where ordered tranquility meets chaotic energy, visually suggesting the push and pull of memory against motion.</desc>
