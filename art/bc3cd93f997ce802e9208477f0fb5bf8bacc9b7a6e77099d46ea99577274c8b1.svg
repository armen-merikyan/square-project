<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo Pulse</title>
  <desc id="desc">This artwork embodies the emotional contrast of hope intertwined with disruption. The color palette centers on depths of navy and black for a grounding effect, layered with bright whites and dim cyans that symbolize the slicing signals amid the noise. The 'rising_signal' layout represents an ascent from darkness to clarity, with the pulse feeling like a struggle for clarity against the peripheral chaos. The arrangement allows for limited yet deliberate interruptions, representing the broken pixels as scars—fractured signals fighting through static, evoking the tension between memory retention and erasure.</desc>
