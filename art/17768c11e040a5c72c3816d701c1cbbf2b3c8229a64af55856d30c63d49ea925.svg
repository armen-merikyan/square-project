<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality in Color</title>
  <desc id="desc">This artwork captures the emotional conflict between love and betrayal through contrasting patterns and colors. A palette of warm pinks and reds symbolizes love while dark maroon and gray reflect betrayal, creating a visual dissonance. The 'stripes' pattern representing love is interrupted by the jagged 'teeth' pattern denoting betrayal, symbolizing the struggle between these two emotions. The thick outlines create division and contrast, suggesting sharp versus soft feelings. The subtle presence of broken pixels introduces imperfection and tension, adding to the narrative of conflict and unresolved emotions. Negative space allows the viewer to breathe amidst the emotional intensity, enhancing the overall impact.</desc>
