<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Heights</title>
  <desc id="desc">This piece evokes the emotional struggle between envy and gratitude through a gradual gradient of dark to light colors, reflecting the tension between heavy feelings and the lightness of hope. The choice of colors—from black to dim cyan—underscores the depths of feelings, while the arrangement mimics a rising flow, suggesting movement toward resolution. The edges are softened to enhance the sense of echo and interruption, maintaining a quiet yet charged emotional space overall. The visual narrative highlights the push and pull of opposing feelings, creating a dynamic balance throughout the composition.</desc>
