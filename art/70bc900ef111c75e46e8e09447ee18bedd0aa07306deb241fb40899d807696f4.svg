<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Echoes</title>
  <desc id="desc">The emotional tone of this artwork contrasts loneliness with connection, reflecting the tension of isolation and the desire for closeness. The selected palette, 'joy_grief,' utilizes warm yellow and orange against deep blue and muted purple to symbolize warmth and connection battling against the coolness of loneliness. The flow is upward, suggesting hope, while the pattern of dots embodies loneliness, disrupted irregularly by stronger colors, symbolizing connection. The asymmetry and spacing create a narrative of longing amid an environment of noise, encapsulating the tensions of the seed.</desc>
