<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Orbit of Emotion</title>
  <desc id="desc">The emotional tone of this composition reflects a struggle between panic and control, encapsulated in contrasts of light and dark colors. The palette of sepia, tan, dust gray, and faded blue creates an atmosphere that hints at nostalgia but also tension—invoking feelings of instability amidst a memory. The main contrast lies in the jagged edges of the pattern, with dark tones intruding upon lighter spaces, symbolizing the push and pull between chaos (panic) and order (control). This interplay is visually represented through a central shape that, while abstractly resembling a wall, remains non-representational by using broken pixels to introduce a sense of imperfection and tension, creating a core surrounded by pressure from all sides.</desc>
