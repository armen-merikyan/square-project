<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tears in the Sky</title>
  <desc id="desc">This composition reflects the emotional tension between tenderness and rage, captured through a stark contrast of colors. The palette features deep reds and blacks on one side, embodying rage, while the other showcases pale blues and whites, symbolizing tenderness. The central conflict lies in the bleeding pixels that create jagged edges, representing the collision of emotions. The soft and rounded overlaps introduce a gentle rhythm amidst the harsh grid pattern, illustrating the push-pull of feeling guilty versus forgiving. The split vertical layout enhances the division, while the broken pixels symbolize imperfection and disturbance, keeping the work grounded in a sense of chaos and beauty.</desc>
