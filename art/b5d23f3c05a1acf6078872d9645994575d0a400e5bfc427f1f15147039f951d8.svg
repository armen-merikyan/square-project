<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interwoven Emotions</title>
  <desc id="desc">The emotional tone reflects a struggle between rage and tenderness, embodied in my choice of a dark palette offset by muted tones. The collision occurs centrally, where sharp lattice patterns of red overlap the softer, rounded textures of pale blue. This embodies the contrasting feelings of rage and tenderness, suggesting a landscape of emotional duality—with hard edges breaking into softer forms, creating a ‘repair vs damage’ narrative. Negative space plays a role by allowing breathing room for emotions across the composition, creating a visual representation of the internal conflict in the seed.</desc>
