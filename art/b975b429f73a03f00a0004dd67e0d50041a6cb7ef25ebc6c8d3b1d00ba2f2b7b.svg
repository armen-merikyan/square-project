<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Disruption</title>
  <desc id="desc">This composition embodies the struggle between clarity and chaos, captured through the contrasting use of sharp, bright colors against muted tones. The palette incorporates electric blue and signal green to represent the readable rhythm (signal), while static gray and dead black symbolize the interference (noise). The collision occurs prominently in the center, where the vibrant colors intersect with darker layers, creating a sense of interruption amidst a background of negative space. The 'root' shape seed inspired a maze-like pattern representing the complexity of navigating through static, as well as the journey of memory against erasure, evoking feelings of isolation amid connectivity.</desc>
