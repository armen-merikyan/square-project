<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Patterns</title>
  <desc id="desc">The emotional tone captures the dynamic tension between clarity and confusion. The palette of red and pale blue introduces a stark contrast, embodying rage and calm. The arrangement echoes the confusion motif with broken grids of black that seem to disrupt the flow, while the pale blue provides an anchor of clarity. The use of thick outlines creates a feeling of confinement, contrasting against the erratic placements that hint at eruption and release, demonstrating the push and pull between the two emotional states. The negativity of space is preserved, enabling the contrast to breathe.</desc>
