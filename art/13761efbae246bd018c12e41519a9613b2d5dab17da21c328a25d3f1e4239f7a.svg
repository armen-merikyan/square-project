<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Shadows and Light</title>
  <desc id="desc">This piece conveys a struggle between fear and hope, utilizing a palette of black, dark violet, soft gold, and pale green. The deep blacks and violets represent the weight of fear, while the soft gold and pale green evoke hope and rising energy. The contrast between the dense, grid-like patterns of fear and the light, noise-like textures of hope creates a collision of emotions. The split vertical arrangement mirrors the idea of an inner conflict, with fear tending toward the left and hope bursting forth on the right. Glowing edges imply a glimmer of possibility amidst darkness, while broken pixels introduce imperfection, emphasizing the unpredictable nature of emotion.</desc>
