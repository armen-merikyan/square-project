<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Resilience</title>
  <desc id="desc">This artwork explores the tension between vulnerability and strength through a contrasting palette of muted colors and organic shapes. The colors are carefully chosen from the 'quiet_pressure' palette, utilizing off_white and faint_peach as a backdrop against the compressed_red and dark_navy which symbolize strength. The collaboration of the echo and thread patterns creates a dynamic yet controlled collision in the center, where the dark navy cuts through the lighter hues, representing the struggle and connection between the two emotional states. The layout creates a hollow center that hints at vulnerability surrounded by a protective halo of strength, leaving intentional voids as reminders of fragile moments.</desc>
