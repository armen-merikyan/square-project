<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Inversion</title>
  <desc id="desc">This square captures the tension between longing and resolve through a contrast of warmth and coolness. The sepia and tan shades evoke a sense of nostalgia and memory, while the dust gray and faded blue reflect clarity and cold resolve. The dominant presence of the warm colors (65%) occupies the bottom left corner, growing as it spreads diagonally across the composition, interrupted by patches of gray and blue that represent moments of clarity and resolve. Broken pixels are sparsely integrated, suggesting scars in memory and repair amidst disruption.</desc>
