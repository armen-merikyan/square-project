<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">This abstract composition explores the emotional duality of safety versus exposure. The chosen colors—warm browns and greens symbolize the safety of an enclosure, while pale pinks and open blues represent the vulnerability of exposure. The grid-like pattern of the safety colors collides with the broken dot patterns of exposure, creating a visual tension that echoes the theme of protection versus openness. The dominant collision occurs slightly off-center, suggesting the struggle between the two emotional states. The use of broken pixels adds an imperfect quality, representing vulnerability and scars within the frame of safety.</desc>
