<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs. Chaos</title>
  <desc id="desc">The emotional tone derived from the seed reflects a juxtaposition of calmness and rage. I chose a bold palette of red and pale blue to capture this dichotomy, allowing the chaotic red tones to disrupt the tranquil spaces of pale blue. The pattern features striped blocks of red that collide with a grid layout of blue, creating a sense of movement and tension across the canvas. The jagged edges represent the disruptive nature inherent in emotional collisions, while leaving ample negative space ensures that the viewer can breathe within the composition, enhancing the sense of pressure before release.</desc>
