  <title id="title">Tension of Emotions</title>
  <desc id="desc">This composition reflects the emotional contrast between joy and grief through a carefully selected palette of warm oranges and yellows alongside muted blues and purples. The use of symmetry with imperfection defines a sense of balance disrupted—the left side teems with warmth while the right hints at cool melancholy. Key contrast emerges along the horizontal axis, where warm colors pulse against cooler tones, echoing a heart's conflicting rhythms. The broken patterns emphasize this struggle, mirroring the uneven nature of emotional experiences.</desc>
