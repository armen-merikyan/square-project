<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone captures the tension between vulnerability and strength. The selected palette consists of soft hues like rose clay and distant lilac, representing vulnerability, intertwined with more assertive colors like warm shadow and lamp gold, symbolizing strength. The main collision occurs in the center where the 'flood' and 'broken dots' patterns merge, creating a dynamic interplay between filled and empty spaces, embodying the conflict of exposure and protection. The negative space around the edges offers a calming contrast to the dense center, reinforcing the overall narrative of balance amidst disruption.</desc>
