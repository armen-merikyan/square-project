<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This composition captures the emotional dichotomy between restlessness and peace. The palette of stain brown, ash gray, warm ivory, soft gold, and deep wine builds tension; the brown and gray convey a sense of weight and unease, while the lighter colors suggest moments of calm. The left half embodies 'restlessness' with uneven placements of darker tones, creating stuttered lines, whereas the right reflects 'peace' through balanced, gentle hues that provide breathing space. The primary collision occurs at the vertical split, creating an intentional disruption as the eye moves diagonally across the grid. The patterns resonate with the emotional tone, where the 'embers' of restlessness flicker against 'teeth' of peace, hinting at unresolved motion.</desc>
