<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Control and Surrender</title>
  <desc id="desc">This composition reflects the emotional tone of 'control vs surrender' through the juxtaposition of distinct color blocks. The palette features deep, muted colors which evoke both a sense of restraint and a softened release, embodying the oscillation between hold and let go. The primary collision occurs at the center with an overflow of the muted cream accented by the red oxide, suggesting an overfilled core being contained by the darker colors that frame the edges. The use of broken pixels represents moments of disruption within this emotional struggle, while the mirror layout provides a structured format to highlight the imbalance inherent in the theme.</desc>
