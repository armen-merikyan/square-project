<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal and Silence</title>
  <desc id="desc">This abstract piece embodies the emotional contrast between tenderness and rage. The palette of deep reds juxtaposed with soft blues evokes a sense of tension and release, encapsulating the quiet yearning against intense frustration. The outer frame in black and red signifies the rage while the inner core of pale blue suggests tenderness. The collision of patterns—the harsh, split-screen breaks echoes of rage, while subtle, overlapping gentle crosses represent tenderness. A significant central area showcases this contrasting dialogue, leading the viewer through an emotional spiral from calm to intensity, ultimately revealing the complexities of human experience.</desc>
