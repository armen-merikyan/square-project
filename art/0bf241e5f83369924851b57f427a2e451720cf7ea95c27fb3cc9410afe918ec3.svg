<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone captures the delicate balance between safety and exposure. The palette combines 'shelter green' for a protective feel, 'pale skin' for vulnerability, and 'open blue' for exposure, creating a soft tension. The main collision occurs in the center, where dark 'warm brown'  interrupts the lighter hues, emphasizing the contrast between security and risk. The arrangement uses diagonal flow to suggest a descent, with interrupted clusters mimicking the rhythm of tears or raindrops, resonating with the seed’s themes of pressure and release.</desc>
