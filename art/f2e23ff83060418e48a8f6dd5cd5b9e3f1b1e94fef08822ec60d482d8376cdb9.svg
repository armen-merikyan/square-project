<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Disruption</title>
  <desc id="desc">This 8x8 composition reflects the tension between clarity and interference, embodying the emotional contrast of signal and noise. The palette of navy, black, white, and dim cyan conveys a somber yet hopeful quality, capturing moments of clarity amid chaos. The layered placement of colors evokes a pulse—brighter fields are interrupted by darker static, showcasing broken edges that represent scars of disruption. The main collision occurs towards the center, where a clear channel of white struggles against dense clusters of dark noise, representing the ongoing conflict of finding clarity in chaos.</desc>
