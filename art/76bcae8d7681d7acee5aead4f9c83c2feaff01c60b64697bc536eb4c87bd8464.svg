<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">The emotional tone encapsulates the conflict between tenderness and rage. The palette of red for rage and soft blues for tenderness creates a visual tension, with black representing the pressure point where these emotions collide. The arrangement positions the vivid red accents in the upper left, representing an overflow of rage, while the cooler blue checker patterns recede to the bottom right, suggesting tenderness as a calming force. The interaction creates a dynamic flow, reminiscent of a channel where one emotion interrupts and bleeds into another, maintaining an underlying quiet space to highlight the tension.</desc>
