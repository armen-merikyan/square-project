<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">The Divide</title>
  <desc id="desc">The emotional tone of the artwork conveys the tension between loneliness and connection through contrasting patterns and colors. The palette combines warm yellows and oranges to evoke an urge for connection, against cooler deep blues and muted purples that represent isolation. The left side features radial patterns symbolizing loneliness, creating a sense of negative space, while the right employs a crosshatch pattern suggesting connection through intricate layering. The top-weighted layout enhances this feeling of pressure at the top, echoing the conflict of being hidden versus exposed. The bursts of color at the center represent a tear, bringing a moment of intensity to the overall composition.</desc>
