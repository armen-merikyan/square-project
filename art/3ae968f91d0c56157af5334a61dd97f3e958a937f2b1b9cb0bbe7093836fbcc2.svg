<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Vulnerability</title>
  <desc id="desc">This artwork embodies the emotional tension between safety and exposure. The left side, dominated by warm brown and soft shades of shelter green, represents gentle protection and enclose, creating a soothing atmosphere. In contrast, the right side uses stark cold white and open blue, portraying stark vulnerability. The collision of these colors at the central seam, where soft and harsh tones meet, illustrates the delicate balance between safety and exposure, while broken pixels signify the transient nature of this balance. This layout reflects the passage of emotional states, accentuated through the static versus ash field patterns, enhancing the overall narrative of resilience against pressure.</desc>
