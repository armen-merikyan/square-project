<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow of Strength</title>
  <desc id="desc">The emotional tone contrasts vulnerability and strength, creating a visual narrative of protection versus exposure. The palette of muted cream, red oxide, and blackened plum represents the subtle interplay of force and fragility. The top half features heavier, darker colors, representing strength, while the bottom introduces a lighter, more fragmented appearance, symbolic of vulnerability. The main collision occurs centrally, where dark noise patterns meet lighter dot patterns, suggesting tension and connection. Imperfections, represented by broken pixels, emphasize the theme of vulnerability and the scars we carry, whilst maintaining a sense of space throughout.</desc>
