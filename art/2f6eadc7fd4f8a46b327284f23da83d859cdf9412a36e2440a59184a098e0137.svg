<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects the struggle between vitality (spark) and somberness (ash). The palette features 'hot coral' and 'blood orange' representing bursts of energy, contrasted against softer tones like 'dust pink' and 'charcoal' to signify restraint and erasure. The flow from corner to corner creates an energetic ascent, where vibrant colors invade muted edges, representing a collision of memories and emotions. The center is filled with intensity, breaking through the edges, which symbolize the struggle for balance between resilience and fragility.</desc>
