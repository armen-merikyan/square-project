<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure in Silence</title>
  <desc id="desc">This composition embodies the emotional tension between quietness and pressure. The chosen palette mixes soft, muted tones with sharp, dark contrasts, illustrating the struggle between calm and force. The color arrangement holds dense clusters of dark navy on the left, suggesting pressure and weight, while the softer off-white and faint peach colors disperse towards the right, creating an airy release. The patterns collide dramatically in the center, where the dense and loose elements intersect, embodying the chaotic push and pull of emotions derived from the seed.</desc>
