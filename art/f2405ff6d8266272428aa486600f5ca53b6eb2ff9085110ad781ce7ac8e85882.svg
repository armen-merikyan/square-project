<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inside vs Outside</title>
  <desc id="desc">This artwork embodies the tension between control and surrender. The palette of warm shadows and cool blues reflects emotional contrasts: warm shades represent control and contained pressure, while the cooler tones signify open edges and surrender. The dense center, framed by lighter edges, illustrates the theme of containment bursting out. The 'veil' pattern traps darker colors within the layers, while the lighter cracks reveal the underlying turmoil, establishing a dynamic contrast at the center where chaos meets calm, fostering an emotional story of conflict and release.</desc>
