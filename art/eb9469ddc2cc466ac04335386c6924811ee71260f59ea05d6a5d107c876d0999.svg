  <title id="title">Order in Chaos</title>
  <desc id="desc">This piece captures the tension between calm and rage, using a palette of intense reds and soft blues. The left side of the square features a chaotic radial pattern symbolizing rage, while the right embodies calm with dispersed dot patterns, creating a relaxed flow. The stark contrast between the bold fiery red and serene pale blue reflects the emotional turmoil and balance suggested by the seed. The drawn elements echo interference and weight, engaging the viewer in an emotional ebb and flow.</desc>
