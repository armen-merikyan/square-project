<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overture of Tension</title>
  <desc id="desc">This piece explores the emotional tug-of-war between rage and calm. The palette juxtaposes hot reds and cool blues, with red dominating 65% of the canvas to depict intensity. The patterns of the halo for rage burst outwards, colliding into the softer maze of calm, suggesting a dynamic struggle between explosion and tranquility. The main contrast occurs in the center where red sparks interrupt the blue maze, creatively using the shape seed concept in a non-literal form to represent emotional thresholds. Broken pixels add intentional disturbances, embodying rejection and acceptance.</desc>
