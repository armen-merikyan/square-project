<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of the Unseen</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of longing and resolve through contrasting colors and placements. The muted greens and browns suggest serenity and safety, while the bright accents of open blue create moments of urgency and intensity. The central density mirrors the heart of longing, surrounded by empty spaces that evoke the tension of resolve. The arrangement of colors creates a pulse, illustrating the collision between the quiet field of longing and the firm structure of resolve, revealed in overlapping patterns and sharp edges. Broken pixels disrupt this flow, adding an element of imperfection that speaks to damage and repair.</desc>
