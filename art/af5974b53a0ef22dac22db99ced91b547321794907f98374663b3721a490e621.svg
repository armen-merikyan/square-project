<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition reflects the emotional contrast between vulnerability and strength. The muted cream and blackened plum represent vulnerability's pale interior, while the intense red oxide symbolizes strength's dense foundation. The collision occurs at the center, where the delicate constellation pattern of muted colors intertwines with the harsh negative cross pattern, creating a chaotic yet harmonious balance. The edges are lit, providing a sense of shelter while leaving room for exposure in the center. The layout, with pressure in one corner, drives the viewer's eye across the square, suggesting tension and release, akin to a flood pushing against a boundary. This creates a rich narrative of emotional dialogue within an abstract framework.</desc>
