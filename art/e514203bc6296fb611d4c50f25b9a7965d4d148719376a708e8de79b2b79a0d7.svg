<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure Frame</title>
  <desc id="desc">This piece explores the emotional tension between safety and exposure through a deliberate contrast of colors and patterns. The palette of shelter green and warm brown evokes feelings of protection and natural grounding, while pale skin and open blue symbolize exposure and airiness. The dominant dark ring pattern represents safety surrounding a lighter central lattice, creating a visual echo of pressure versus release. The interplay between the warm and cool tones embodies the gentle pull between security and vulnerability, while broken pixels introduce imperfections, representing the inherent complexities of these emotions.</desc>
