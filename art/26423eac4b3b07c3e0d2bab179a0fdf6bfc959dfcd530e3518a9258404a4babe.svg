<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Dissonance</title>
  <desc id="desc">The emotional tone juxtaposes the chaos of panic with the stability of control. The central radial pattern in lively lime and electric blue represents control, while the jagged edges rendered in deep blacks and striking magentas evoke panic. The collision occurs as the darker shades impose asymmetrical interruptions against the vibrant core, reflecting a struggle for equilibrium. This interplay embodies the essence of the seed as the struggle between opposing forces unfolds within an abstract landscape.</desc>
