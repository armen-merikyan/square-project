<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">The emotional tone captures the tension between longing and resolve, using a palette of electric blue and magenta to symbolize urgency and serenity respectively. The contrast is highlighted by a central collision of densely braided patterns suggesting longing, against clear, channel-like formations depicting resolve. Broken pixels interrupt the flow, signaling moments of repair and damage, while the overall layout spirals inward, creating a rhythm of pressure that challenges the boundary of containment. This arrangement invites viewers to feel the push and pull of emotions, echoing the inner conflicts represented by the seed.</desc>
