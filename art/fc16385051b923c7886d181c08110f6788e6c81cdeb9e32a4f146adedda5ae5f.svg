<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece reflects the emotional pull between desire and emptiness, using a palette that captures warm saturation with cool containment. The main color collision happens at the center, where vibrant hues of hot coral and blood orange push against the darker, more subdued edges of charcoal and hollow blue, creating a tension that represents the struggle of unfulfilled longing. The arrangement allows for quiet spaces surrounded by more densely packed colors, effectively echoing the themes of pressure and relief intrinsic to the seed.</desc>
