<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Embrace</title>
  <desc id="desc">The emotional tone conveys a dialogue between love and betrayal, captured through a push and pull of warm and cool colors. The palette, featuring pinks and deep maroon, symbolizes affection's warmth against the cold shards of betrayal. The upper half of the grid illustrates love's framed embrace with structured patterns, while the chaotic lower half reflects betrayal through disrupted crosshatch elements, creating a stark contrast. Collisions occur in the middle rows where colors clash to reflect emotional turmoil, evidenced by asymmetry and broken pixels that hint at imperfections in relationships. The overall design suggests an unresolved tension, balancing past warmth with present discord.</desc>
