<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Affection</title>
  <desc id="desc">This piece evokes the tension between love and betrayal through a nearly symmetrical layout disrupted by broken pixels. The warm palette featuring pink and red reflects love, while deep gray and dark maroon introduce an unsettling presence of betrayal. The contrast is highlighted through a crosshatch pattern on one side symbolizing love, while the cracks signify betrayal. The arrangement creates emotional flow from bottom to top, suggesting a rise in intensity, reinforcing the abstract story of conflict and unresolved emotions.</desc>
