  <title id="title">Echo of Safety</title>
  <desc id="desc">This artwork explores the tension between vulnerability and shelter, reflecting a soft barrier around a bright, exposed center. The color palette of greens and browns evokes a sense of safety, while the whites and blues suggest openness and exposure. The main contrast occurs at the center, where saturation collides with quieter edges, showcasing the push and pull of safety versus exposure. Broken pixels were introduced to symbolize imperfections, adding a layer of emotional complexity.</desc>
