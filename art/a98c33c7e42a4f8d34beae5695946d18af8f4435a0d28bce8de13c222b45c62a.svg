<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Torn Emotions</title>
  <desc id="desc">This piece captures the emotional tug-of-war between joy and grief. The left side is imbued with warm yellows and oranges, suggesting bursts of joy, while the right introduces deep blues and muted purples, embodying the weight of grief. The nearly symmetrical arrangement is interrupted by strategically placed broken pixels, enhancing the sense of disturbance and complexity. The contrast between the vibrant left and the shadowed right creates a pulse-like rhythm, reflecting the ongoing battle within. The grid pattern against circles echoes the structured chaos of emotions.</desc>
