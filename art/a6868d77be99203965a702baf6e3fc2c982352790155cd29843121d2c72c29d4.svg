<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotion Collision</title>
  <desc id="desc">This artwork captures the tension between envy and gratitude through contrasting colors and patterns. The palette of yellows and muted purples speaks to the warmth of gratitude clashing with the coolness of envy. The zigzag flow creates a sense of movement that echoes the emotional push and pull represented by the 'inside vs outside' layout. The broken edges establish imperfection, symbolizing the inherent conflict in acknowledging both emotions, while negative space enhances the focus on tension.</desc>
