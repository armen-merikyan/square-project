<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Torn Echoes</title>
  <desc id="desc">This artwork embodies the emotional clash between loneliness and connection. Using a deep palette of black, dark violet, soft gold, and pale green, the configuration illustrates a central tension. The left half, representing loneliness, utilizes a maze-like pattern with minimal presence of soft gold to evoke emptiness and a sense of isolation. In contrast, the right half employs a stair pattern, suggesting connection and upward flow with vibrant touches of pale green. The burst effect centrally disrupts the grid, highlighting a collision of feelings, mirrored by the dark outlines that frame the split. Negative spaces reflect the depth of emotional experience, suggesting areas of unspoken longing. Each pixel tells a part of the story—a tension between felt isolation and the yearning for connection, enshrined in a deeply abstract form.</desc>
