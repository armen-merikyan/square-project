  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone explores the tension between safety and exposure, using colors that evoke both warm shelter and cool exposure. The chosen palette features shelter green and warm brown contrasted with pale skin and cold white, resulting in an emotional landscape that oscillates between comfort and vulnerability. The collision occurs centrally, where the warmer colors represent a soft barrier encasing a cooler, more exposed center, demonstrating the delicate interplay between protection and openness. The falling pixels layout visually encapsulates the idea of rain or tears, enhancing the rhythm of pressure versus release through the gradient transition of colors.</desc>
