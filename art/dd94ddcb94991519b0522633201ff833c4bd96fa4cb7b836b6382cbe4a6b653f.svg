<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Tension</title>
  <desc id="desc">The emotional tone of this artwork captures the interplay between relief and dread, symbolizing a push and pull against chaos and calm. The palette, featuring muted sepia, tan, and dust gray tones, offers a sense of nostalgia and weight, contrasting with the faded blue that injects a feeling of lightness. This creates a visual representation of tension, where dark, heavy colors converge towards the top, suggesting the overwhelming nature of dread, while lighter hues are distributed lower, symbolizing hope and relief. The broken pixels disrupt the symmetry, embodying the fractured nature of emotions. The layout mirrors itself with intentional imperfections, representing the asymmetry of emotional balance. The flow is counterclockwise, guiding the eye across the piece while the color placements highlight the collision between peace and disturbance, drawing attention to areas of quiet space and dense clusters.</desc>
