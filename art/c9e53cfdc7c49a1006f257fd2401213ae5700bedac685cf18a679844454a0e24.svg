<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tides of Contrast</title>
  <desc id="desc">The emotional tone reflects a struggle between certainty and curiosity, embodied in the dichotomy of stacked, orderly patterns clashing with broken dots that suggest questions and uncertainty. The calm color palette of off-white and faint peach represents a sense of clarity and relief, while the deeper navy and compressed red colors create tension and evoke a sense of chaos just beneath the surface. The main collision occurs centrally, where orderly stacked patterns break into a more chaotic configuration, symbolizing the tension of rising signals against established boundaries. This layout presents the idea of a protective center surrounded by the chaotic exploration typical of curiosity, creating a striking contrast that speaks to inner conflict.</desc>
