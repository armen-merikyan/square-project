<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece illustrates the emotional tension between vulnerability and strength. The center is rendered with pale tones to symbolize exposure, while darker edges form a protective frame, suggesting resilience. The palette balances bright accents of signal green and hot magenta against stately dead black and static gray, accentuating the push and pull between openness and safety. Main contrasts occur diagonally, where softer, thinning veils of color intersect with bold, strong thresholds, representing emotional collision. Broken pixels sprinkle throughout as imperfect scars, adding depth and unease while preserving a sense of intentionality. The overall composition invites contemplation of resilience amid fragility.</desc>
