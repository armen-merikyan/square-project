<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Balance</title>
  <desc id="desc">The emotional tone captures the dynamic tension between control and surrender, visualized through a palette that balances warmth and coolness. The colors—shelter green, warm brown, pale skin, cold white, and open blue—evoke feelings of safety and exposure, suggesting an emotional landscape marked by comfort and tension. The main contrast occurs centrally with warm colors clustering, while cooler shades expand into negative space, signifying a push-pull between presence and absence. The seed's themes translate to a spiral layout where dense colors (control) radiate outward, interrupted by lighter spaces (surrender), echoing the notion of planned confinement versus natural flow.</desc>
