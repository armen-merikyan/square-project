<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Fracture</title>
  <desc id="desc">The artwork embodies the dichotomy of joy and grief through a split layout. The left side is filled with warm, vibrant yellows and oranges in a stripe pattern, representing joy's brightness and order. In contrast, the right side employs muted blues and purples in a ring pattern, signifying grief's weight and chaos. The hard edges introduce a sense of tension between the two emotions, while the broken pixels create imperfections that echo the rawness of emotional experiences. The main collision occurs at the central line, where joy's vibrancy meets grief's somberness, creating a pulse of emotional conflict that defines the piece.</desc>
