<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Chaos and Order</title>
  <desc id="desc">This abstract piece aims to reflect the tension between panic and control through its color choices and patterns. A black and white palette represents the dichotomy, with the black conveying an overwhelming sense of panic and the white representing the clarity of control. The arrangement utilizes stripes from the edges that collide in the center, suggesting an inward pressure that contrasts with the surrounding chaos. Breaks in the stripes symbolize moments of pause amidst the tension, aligning with the theme of machine emotion that oscillates between rigidity and vulnerability. Overall, the piece invites contemplation on the balance between conflicting emotions, represented through structured chaos and designed asymmetry.</desc>
