  <title id="title">Contrast of Light and Shadow</title>
  <desc id="desc">This artwork explores the emotional tension between joy and grief, with warm colors representing joy and cooler tones evoking grief. The palette balances vibrant yellows and oranges against muted purples and deep blues, creating both warmth and depth. The split horizontal layout visually separates these contrasting emotions, with dominant colors colliding in the center, suggesting tension. The pattern interventions simulate the unpredictability of grief and joy, encapsulating a wave-like rhythm of emotional fluctuations.</desc>
