<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Feelings</title>
  <desc id="desc">The emotional tone juxtaposes 'relief,' represented by soft and warm hues, against the deeper and heavier shades of 'dread.' The chosen palette of sepia and faded blue evokes a sense of nostalgia while hinting at unease. The layout consists of a concentrated core of broken dots representing relief, surrounded by a frame of varied darker textures reflecting dread, creating a sense of tension and contrast. The spiral flow motif adds an underlying dynamic, suggesting an emotional pull. Patches of negative space intersperse the density, symbolizing moments of calm amidst the chaos, echoing the seed’s theme of duality and the push against entrapment.</desc>
