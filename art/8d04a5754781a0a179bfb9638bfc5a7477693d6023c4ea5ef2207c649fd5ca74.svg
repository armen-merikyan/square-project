<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This composition channels the emotional clash of love and betrayal by juxtaposing warm colors representing love, like soft pink and deep red, against dark maroon and gray symbolizing betrayal. A crosshatch pattern in the core emerges amidst darker stripes, creating a visual tension that contrasts with the stability of the framework. The deliberate spacing leaves negative areas to emphasize the emotional distance and quietly broken echoes of a deceptive comfort. The burned edges hint at scars of betrayal while sharp edges intersect softly to depict the merging of joy and pain.</desc>
