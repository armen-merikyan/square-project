<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Locked Pulse</title>
  <desc id="desc">This composition juxtaposes the vibrant energy of desire against the muted confines of restraint. The color palette blends saturated tones like hot coral and blood orange, representing warmth and longing, with deeper, restrained hues like charcoal and hollow blue. The outer borders embody restraint with a maze pattern, creating a solid frame of muted tones. In contrast, the inner 4x4 grid bursts with a lattice pattern signifying desire, allowing colors to spill toward the edges, embodying a struggle between the two emotions. This design achieves a tactile sense of collision where intense hues frequently interrupt the cooler, calmer sections, suggesting a dance of longing and control.</desc>
