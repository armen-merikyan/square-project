<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone explores the contrasting sensations of safety and exposure. The chosen palette balances warm browns and greens representing safety against the cool blues and pale whites symbolizing exposure. There’s a main collision in the central area with the ripple pattern on one side clashing against the structured barcode pattern. This encapsulates the idea of soft safety surrounding a vulnerable open center, capturing the tension between protection and exposure without a literal representation.</desc>
