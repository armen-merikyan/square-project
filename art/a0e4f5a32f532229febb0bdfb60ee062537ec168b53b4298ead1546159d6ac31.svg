<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Disrupted Harmony</title>
  <desc id="desc">This piece embodies the tension between confusion and clarity through a split composition utilizing warm (tan, sepia) and cool (faded blue, dust gray) tones. The left side represents confusion with chaotic stripes and broken pixel edges, creating a sense of disarray, while the right side contrasts with sharper shapes evoking clarity, interspersed with teeth-like patterns. The palette's muted tones evoke nostalgia and broken memories, forging a resonance with the emotions of the seed. The contrast occurs predominantly at the boundary where confusion meets clarity, reflecting emotional collision.</desc>
