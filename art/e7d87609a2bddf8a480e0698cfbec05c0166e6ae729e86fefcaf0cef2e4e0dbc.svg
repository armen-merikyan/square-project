<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">This composition embodies the emotional tension between envy and gratitude, using a palette of burnt orange, dark red, charcoal, and gold to convey warmth and depth. The outer layer represents envy with broken dot patterns in darker hues, creating a contrasting chaos to the gratitude housed in the inner 4x4 core, which adopts a smoother frame-like structure. The softness of gold represents the flow of gratitude amidst the noise of envy, capturing a rising versus falling dynamic. Strategic placements of broken pixels deepen the sense of imperfection and emotional pressure, while carefully chosen negative space ensures contemplation and balance.</desc>
