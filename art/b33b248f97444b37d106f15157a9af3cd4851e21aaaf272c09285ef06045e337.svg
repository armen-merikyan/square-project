<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone reflects a clash between the fleeting intensity of 'spark' and the subtler, fading presence of 'ash', symbolizing resilience and fragility. I chose a vivid palette of lime and electric blue to represent the spark's brightness, contrasted against the dark, muted backgrounds emulating ash. The primary collision occurs in the center, where clusters of vibrant dots emerge unexpectedly amid maze-like textures, symbolizing both interruption and repair. Broken pixels are strategically placed to emphasize chaos and imperfection, supporting the conceptual struggle of hunger vs restraint. The overall flow suggests a spiraling tension between the chaotic and the orderly.</desc>
