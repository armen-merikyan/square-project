<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition captures the emotional interplay between vulnerability and strength, where pale mint represents sensitivity, housed within the stark contrast of storm gray reflecting resilience. The edges feature a thick, protective outline (near black), while the center’s softness (pale mint) reveals an open tenderness. The predominant color flow creates echoes of strength, interrupted by the stepwell design that suggests vulnerability, mirroring the conflict and balance of exposure versus safety. The broken pixels serve as intentional scars, enriching the narrative of imperfection within the journey.</desc>
