<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork embodies the tension between vulnerability and strength through its contrasting colors and structured chaos. The pale center represents vulnerability, surrounded by a more solid framework of dark tones reflecting strength. The palette of cosmic indigo, void black, star white, cold gold, and deep teal evokes a feeling of awe mixed with terror, suggesting an emotional depth. The main collision of colors occurs at the center, where the pattern of dotted vulnerability meets the dense, targeted strength, creating a dynamic interplay that draws the eye. The erosion of symmetry at the edges signifies the fragility inherent in strength and resilience.</desc>
