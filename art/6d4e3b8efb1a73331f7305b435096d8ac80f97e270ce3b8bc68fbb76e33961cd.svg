<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The piece explores the emotional spectrum of rage and calm, using a palette of red and pale blue to emphasize the tension between hot and cool. Rage is represented by the vibrant reds breaking through the structured calm of the blue horizontal bands. The collision occurs in the center, where jagged red spikes intersect with serene blue expanses, creating a visual representation of emotional struggle. The use of black enhances depth, suggesting an underlying tension that invites contemplation, while broken pixels disrupt uniformity, representing imperfections in emotional expression.</desc>
