<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Amidst the Static</title>
  <desc id="desc">The emotional tone reflects a struggle between clarity and distortion, symbolizing the tension of signal versus noise. The chosen palette—deep blacks and electrifying blues with bursts of hot magenta—reflects this conflict, capturing both the darkness of interference and the vibrancy of clear signals. The collision occurs centrally where waves of electric blue intersect, creating a sense of movement and urgency. Broken pixels create intentional disruptions within the otherwise structured flow, embodying the idea of memory versus erasure in a visually compelling way.</desc>
