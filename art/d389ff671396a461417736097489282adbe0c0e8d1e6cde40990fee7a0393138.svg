<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece captures the emotional tension between rage and calm through a dynamic interplay of color and pattern. The warmer red tones signify rage, selectively piercing through the cooler pale blue and white tones that embody calm. The palette, consisting of red, black, pale blue, and white, sets a stark contrast, evoking feelings of intensity against serenity. The layout features a diagonal argument where the emotional clash occurs primarily across the diagonal center, emphasizing the conflict in a visually engaging manner. The broken pixels introduce intentional irregularities, embodying the theme of eroded symmetry and creating a narrative of disruption amidst the calm.</desc>
