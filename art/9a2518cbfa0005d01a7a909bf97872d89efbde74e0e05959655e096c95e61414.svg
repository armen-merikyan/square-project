<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">This abstract work embodies the emotional duality between longing and resolve. The chosen palette features warm and cool colors—rose clay and distant lilac are intertwined with lamp gold, suggesting warmth and underlying tension. The contrasting color choices reflect both serenity and urgency, creating a visual pulse. The main collision occurs centrally where the 'thread' and 'broken frame' patterns clash, symbolizing the interplay of hope amidst repair and disruption. Jagged edges are employed to echo brokenness, enhancing the narrative of conflict and resolution. Negative space is utilized to separate the emotional beats, suggesting distance yet connection.</desc>
