<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Tension</title>
  <desc id="desc">The emotional tone of this artwork captures the struggle and contrast between fleeting sparks of vitality and the permanence of ash, symbolizing resilience in fragility. The selected palette of powder pink and sharp crimson vs. carbon black captures the warmth of sparks against the cool severity of ash. The layout presents a vertical split, showcasing a dense cluster of vibrant colors on the left, representing invigorating moments against the more muted tones on the right, exhibiting weight and restraint. The jagged pattern of the left side collides with the barcode-like lines of the right, reflecting the tension between memory and erasure, enhancing the emotional depth throughout the composition.</desc>
