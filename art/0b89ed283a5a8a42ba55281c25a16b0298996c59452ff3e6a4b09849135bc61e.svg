  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition contrasts the explosive energy of rage against the tranquil calmness. The palette of black, red, pale blue, and white highlights the emotional tension, where deep reds and blacks clash with the soothing pale blue, representing calm. The diagonal layout disrupts this balance, with the intense reds dominating the left corner and a quiet blue field spilling into the opposite edge. Broken pixels introduce intentional disruptions that suggest an ongoing battle between feelings, enhancing the dynamic contrast throughout the piece.</desc>
