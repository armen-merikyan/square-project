<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Graceful Collision</title>
  <desc id="desc">This composition embodies the emotional tug-of-war between strength and vulnerability. The palette transitions from a bright yellow (representing strength) to deep blue and muted purple (symbolizing vulnerability). The dominant yellow's presence at the corner is set against a stark transition to muted tones elsewhere, creating a pressure-filled environment, akin to a flood against a spark. The 'stairs' and 'braid' patterns create movement and tension across the grid. The 'pressure_corner' layout emphasizes a dynamic imbalance, defining where the greatest emotional collision occurs. The use of broken pixels further illustrates imperfections, mirroring the struggles present in the themes of exposure and shelter.</desc>
