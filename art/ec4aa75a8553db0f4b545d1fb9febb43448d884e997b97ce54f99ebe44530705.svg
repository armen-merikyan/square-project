<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger &amp; Restraint</title>
  <desc id="desc">The emotional tone reflects the tension between longing (desire) and confinement (restraint). The palette is crafted from saturated reds and muted creams, symbolizing the intensity of desire against the backdrop of soft, restrained tones. In this 8x8 grid, a dominant warm red pulse (representing desire) collides with areas of blackened plum and muted cream, creating a sense of struggle and contrast. The two small centers pulsing toward each other are found in the middle, surrounded by a lattice of muted colors that echo restraint. The layout engages with negative space to evoke a feeling of something unsaid, while intentional disruptions (broken pixels) add to the emotional complexity, ensuring that the grid doesn't feel static or controlled.</desc>
