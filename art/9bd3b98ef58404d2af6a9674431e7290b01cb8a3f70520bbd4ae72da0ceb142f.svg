<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Light and Shadow</title>
  <desc id="desc">This artwork captures the emotional tension between joy and grief through contrasting palettes and arrangements. The left side represents joy with warm, spark-like yellows and oranges, while the right side uses deep blues and muted purples to convey grief. The patterns ‘flame’ for joy and ‘target’ for grief illustrate a fight between liveliness and heaviness. The clash occurs at the center, where bright colors are interrupted by darker, more subdued tones, creating a dynamic interplay that reflects the complexities of human emotion. The decision to split horizontally underlines the duality, while the presence of broken pixels throughout infuses a sense of imperfection, adding depth to the emotional narrative.</desc>
