<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Stillness</title>
  <desc id="desc">The emotional tone reflects the duality of peace and restlessness, creating a contrast that is visually brooding yet inviting. The palette of warm coral, soft amber, cold slate, blue black, and signal cyan evokes warmth and tension, capturing the essence of a fleeting memory clashing with a motion-fueled future. The main collision occurs diagonally, where warm tones intersect with cooler colors, symbolizing the struggle between calm and chaos. The closed corners reinforce a feeling of containment, while the arrangement creates a sense of dynamic motion held back by clear structure, allowing for a meditation on the tension between these forces.</desc>
