  <title id="title">Contrast of Ash and Spark</title>
  <desc id="desc">This artwork embodies the emotional clash of 'spark' and 'ash,' emphasizing the resilience of life amid decay. The palette, featuring burnt orange and dark red, evokes both warmth and danger, contrasting with the somber charcoal that represents stillness and memory. The arrangement follows a broken frame layout, where jagged edges disrupt the square, symbolizing tension between structure and chaos. The spark pattern of hinge clashes with the ash ripple, creating a dynamic movement toward the center, where the colors collide most intensely. Negative space is utilized to maintain a sense of calm, emphasizing the impact of the more vibrant tones.</desc>
