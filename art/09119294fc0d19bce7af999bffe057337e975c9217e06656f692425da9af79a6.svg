<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This composition explores the dualities of softness and severity, merging gentle tones with striking contrasts. The palette is derived from soft powder pinks and warm whites that evoke softness, juxtaposed with depth brought by carbon black and sharp crimson, which introduce severity. The primary collision occurs centrally, where crisscross patterns of soft islands interrupt more structured lattice formations, symbolizing the tension between memory (softness) and enforceable feelings (severity). The bottom-weighted design emphasizes the heaviness of the darker colors, while allowing gentle expanses to suggest airiness, resulting in a balanced and intentional flow of emotion.</desc>
