  <title id="title">Between Calm and Turmoil</title>
  <desc id="desc">The emotional tone encapsulates the tension between restlessness and peace, portraying conflict through a heavy use of dark colors and sharp contrasts. The selected palette of muted cream, red oxide, and blackened plum reflects the duality of calm moments disrupted by dense patches of motion. The main contrast is established through a central diagonal pattern that interrupts the static state, echoing the struggles of memory versus movement. This visual collision emphasizes discomfort while still suggesting moments of tranquility.</desc>
