<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tones of desire and restraint collide through a saturated palette of reds and muted creams, encapsulated in a structured tension. The contrast arises from the dominance of warm hues spilling over the border of cooler muted tones, reflecting a struggle between aspiration and limitation. The pattern's 'hinge' and 'radial' forms generate a sense of pressure, while the broken pixels introduce intentional imperfections, echoing the interruptions in desire. The central collision emerges at diagonal edges, creating a dynamic that flows outward like a pulse.</desc>
