<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure Against Weight</title>
  <desc id="desc">This piece explores the tension between vulnerability and strength. The palette, combining hot magenta and electric blue against static gray and dead black, enforces a stark contrast that illustrates the emotional push and pull of a pale exposed center and a dark, thick edge. The falling pixel layout adds a sense of descent, reflecting a quiet vulnerability overshadowed by the heaviness of safety and exposure. The collision occurs mostly in the center, where the pink and blue interact against the gray, suggesting an unresolved conversation between weight and lightness.</desc>
