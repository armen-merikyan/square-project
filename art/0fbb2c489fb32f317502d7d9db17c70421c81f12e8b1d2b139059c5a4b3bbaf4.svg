<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Released</title>
  <desc id="desc">The artwork captures the emotional tension between restlessness and peace through a deliberate arrangement of colors that oscillate between calm and vibrancy. The palette draws from soft, muted tones like lavender gray and moon white to express peace, contrasted with deeper shades like rain blue and muted plum to evoke restlessness. The main collision happens centrally, with an uneven pulse mark pattern suggesting motion, while the tranquility of the pulse marks brings moments of equilibrium on the edges. This interplay of contrast conveys a journey from chaos to calm.</desc>
