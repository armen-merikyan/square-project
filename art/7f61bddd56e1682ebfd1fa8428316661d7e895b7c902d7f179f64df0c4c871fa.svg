<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Stripes of Emotional Dichotomy</title>
  <desc id="desc">The emotional tone of 'panic vs control' evokes a clash between chaos and order. I chose a color palette of electric blue, lime, magenta, and black to embody both tension and coherence. The black and electric blue represent control with their calm and stable nature, while lime and magenta introduce chaos and energy, clashing against the former, creating visible tension. The top half employs a striped pattern, symbolizing the rush of panic, while the bottom half uses crack-like placement representing controlled structure. The main contrast occurs where the bright lime and magenta striations intersect with solid black and blue fields, suggesting the struggle between an uncontrollable external force and an inner quest for stability. This pattern becomes a visual echo of the seed's conflict, with a flow from left to right suggesting energy being funneled towards a central core of calm.</desc>
