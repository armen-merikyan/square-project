<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tidal Tension</title>
  <desc id="desc">This piece embodies the emotional conflict between certainty and curiosity through contrasting patterns and colors. The dominant muted plum signifies solidity and assurance, while the lighter hues of moon white and soft cyan represent the fluctuations of curiosity. The layout, which features intentional breaks in the border, allows for a sense of chaos as colors escape structured confines. The collision occurs centrally, where the dull weight of muted plum meets the bright flame pattern of soft cyan, symbolizing the push and pull between stability and exploration.</desc>
