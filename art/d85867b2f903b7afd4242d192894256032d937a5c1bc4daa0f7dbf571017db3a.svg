<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipsed Affection</title>
  <desc id="desc">The emotional tone weaves a narrative of conflict between warmth and coldness, echoing love's embrace contrasted by betrayal's sharpness. The palette encapsulates this tension: soft pinks and reds embody love, while the grays and dark maroon suggest betrayal. The arrangement creates a flow from top to bottom, accentuating the decay of love, where the noise pattern represents affection being clouded by betrayal's maze. Broken pixels introduce imperfection, creating a visual metaphor for heartbreak. The placement induces a disturbance, with warm colors clashing against muted tones, evoking feelings of longing and discord.</desc>
