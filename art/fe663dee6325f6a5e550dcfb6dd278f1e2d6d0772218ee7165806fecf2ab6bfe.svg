<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Explosive Calm</title>
  <desc id="desc">The emotional tone captures a tension between explosive rage and serene calm, represented by strong contrasts in color. The palette of deep blacks and vibrant reds provide a jarring yet striking representation of fury, while soft pale blues and whites evoke a sense of stillness. The main collision occurs at the center, where jagged red tones sharply interrupt the calm blue background, symbolizing disruption. The zigzagged pattern of the rage elements creates visual noise, while the horizontal calm sections seek to contain that energy, reflecting the struggle between these two emotions.</desc>
