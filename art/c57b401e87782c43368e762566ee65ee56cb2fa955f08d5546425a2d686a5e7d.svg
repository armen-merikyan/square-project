  <title id="title">Overflow and Containment</title>
  <desc id="desc">This artwork captures the struggle between rage and calm through color. The palette leverages dramatic contrasts, with red and black representing rage, while pale blue and white embody calmness. The central collision of jagged red pixels against smooth blue stripes creates a tension within a generally quiet space, mirroring the emotional turmoil described in the seed. The design features diagonal flow, mimicking an explosive gesture that meets structured calm, creating a layered narrative of containment amidst chaos.</desc>
