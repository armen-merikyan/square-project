  <title id="title">Ebb and Flow</title>
  <desc id="desc">This artwork embodies the tension between 'longing' and 'resolve'. The warm brown and shelter green evoke a sense of stability while juxtaposed against the pale skin tones and open blue, representing yearning. The layout directs the eye from a dense corner, rich in color, towards quieter spaces, illustrating the emotional pull from chaos to calm. The halo edge references the 'halo' seed through the soft transition of colors, creating a border that visually resonates with both spaces. Broken pixels create a sense of fragmented memories and echoes, enhancing the complexity of emotion.</desc>
