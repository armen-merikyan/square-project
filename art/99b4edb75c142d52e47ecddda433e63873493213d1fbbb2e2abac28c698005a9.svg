<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resilience</title>
  <desc id="desc">This artwork expresses the emotional tension between longing and resolve, using a palette of warm and cool colors to create contrast. The warm hues of hot coral and blood orange represent longing, suggesting a sense of urgency and desire, while cool tones like charcoal and hollow blue symbolize resolve, introducing a calming presence. The pattern employs split screen dynamics to create a visual collision in the center, where fragmented colors suggest imperfection and disruption, reflecting the themes of repair and damage. By organizing the rows to shift from dense clusters of warmth to calmer expanses, it conveys a narrative of emotional layering, echoing the complexities of hope and resilience against adversity.</desc>
