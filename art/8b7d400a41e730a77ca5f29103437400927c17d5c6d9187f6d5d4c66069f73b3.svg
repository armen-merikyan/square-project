<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience in Collision</title>
  <desc id="desc">The emotional tone reflects a tension between vulnerability and strength, embodied through contrasting color placements. The palette includes deep red oxide and muted cream to depict moments of both sheltering support and exposed fragility. The dominant blackened plum interrupts soft cream formations, creating a collision of emotional states. This reflects the seed's concepts of ‘exposure vs shelter’—the vulnerable center suggested through light and airy hues, surrounded by harsh edges of darker tones invoking strength. The layout of descending pixels illustrates a flow reminiscent of tears or rain, establishing a sense of descent and gravity, as well as a release of pressure punctured by radiant accents.</desc>
