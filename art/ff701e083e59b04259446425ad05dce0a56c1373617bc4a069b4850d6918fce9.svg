<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Contrast</title>
  <desc id="desc">The emotional tone reflects the struggle between defiance and submission, represented through a division in color and structure. The left side exudes a deep maroon intertwined with soft gray, signifying defiance's strength wrapped in vulnerability. In contrast, the right side is punctuated with lighter shades of pink, creating a sense of submission intertwined with hope. The deliberate asymmetry and division suggest a bottom-heavy weight that echoes the tension of falling and rising, aligning with the 'falling pixels' theme. The patterns alternate between mirror and dotted, enhancing the conflict and weaving a narrative of emotional friction and unresolved tension.</desc>
