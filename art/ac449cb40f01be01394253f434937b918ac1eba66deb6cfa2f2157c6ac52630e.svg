<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This composition explores the emotional dichotomy of safety and exposure through color and pattern. The chosen palette of shelter green, warm brown, pale skin, cold white, and open blue evokes both a sense of grounding and vulnerability. The main contrast lies in the center where the warm brown and pale skin create a stark divide between the protective green and the open blue, suggesting tension and the potential for connection or division. The glitch pattern embodies exposure, with broken pixels representing imperfection and disturbance, while the ladder pattern subtly builds a sense of safety, contrasting against the chaotic flow of the glitch. Together, they create an abstract representation of the emotional conflict inherent in navigating the space between risk and security.</desc>
