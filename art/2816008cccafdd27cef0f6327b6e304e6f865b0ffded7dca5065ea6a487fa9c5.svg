  <title id="title">Tension of Emotions</title>
  <desc id="desc">The emotional tone reflects the struggle between panic and control, represented by contrasting colors and patterns. The chosen palette of pink, red, gray, and dark maroon symbolizes love and betrayal, introducing warmth yet heaviness. The main contrast emerges in the central light colors against a dense darker background, echoing the conflict of being overwhelmed yet seeking stability. The layout draws from the idea of a small bright spark amidst a heavy mass, creating tension through color placement and pattern collisions.</desc>
