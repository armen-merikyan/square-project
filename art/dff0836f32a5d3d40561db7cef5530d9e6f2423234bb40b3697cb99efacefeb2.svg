<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Signals</title>
  <desc id="desc">The piece captures the emotional duality of clarity and chaos, embodied in the contrast between vivid and muted colors. The palette, characterized by deep navy and stark white, creates a space of tension between warmth and coolness. The main collision occurs diagonally, with thick outlines framing a central path of vibrant, flame-like color, representing the signal, while surrounding static environments in muted tones symbolize noise. The arrangement echoes the seed's notions of exposure and shelter, where bursts of color push against darker fields, representing memory versus erasure and interruptions of clarity amid static noise.</desc>
