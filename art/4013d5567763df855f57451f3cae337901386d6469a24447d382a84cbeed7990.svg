  <title id="title">Tension of Hearts</title>
  <desc id="desc">This composition explores the emotional dichotomy of love and betrayal through a palette of warm and cool tones. The intermingling of pinks and maroons with grays creates a striking contrast that represents the push and pull of affectionate and painful experiences. The dark edges symbolize the cracks formed by betrayal, while the empty central space suggests a longing or absence, embodying the 'dense vs empty' theme. The layout facilitates a flow from chaos (bottom left) to calm (top right), enhancing the sense of tension and resolution.</desc>
