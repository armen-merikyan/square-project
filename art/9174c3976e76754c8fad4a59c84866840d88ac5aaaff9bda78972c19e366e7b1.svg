<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The emotional tone reflects a conflict between defiance and submission, manifesting in a grid split vertically. The left half employs glitch patterns evoking disruption and resistance, using muted colors like rain_blue and lavender_gray to signify the boldness of defiance. In contrast, the right half utilizes a lattice pattern with soft hues like moon_white and soft_cyan, embodying submission and a sense of softness. The largest collision occurs in the central column, where colors merge and disrupt each other, illustrating the interaction of these contrasting emotions. The palette evokes a melancholic wonder, supporting both states in conversation, while leaving negative spaces to express feelings of stillness amidst tension.</desc>
