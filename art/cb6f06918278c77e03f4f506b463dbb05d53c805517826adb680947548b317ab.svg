<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center Against the Edge</title>
  <desc id="desc">This artwork captures the tension between defiance and submission, reflected in the stark contrast between the vibrant inner colors and the subdued outer edge. The palette balances electric blue and magenta, symbolizing defiance, against the quiet black background representing submission. The central collision occurs where the patchwork pattern of vibrant colors faces the teeth-like structure of the muted black, creating a dynamic rhythm that embodies the struggle of opposing emotions while leaving significant quiet space to allow the viewer to reflect. The diagonal flow reinforces movement, suggesting an upward struggle amidst chaos.</desc>
