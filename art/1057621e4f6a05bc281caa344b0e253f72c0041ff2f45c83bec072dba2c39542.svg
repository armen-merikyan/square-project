<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">This piece captures the emotional duality of longing and resolve. The warm coral and soft amber tones symbolize distant warmth and unfinished approaches, while the colder slate and blue-black suggest a clear boundary and firm axis. The layout presents a tension between a foggy area of longing on the left and a structured, resolved space on the right, creating a visual argument. Broken pixels scattered throughout symbolize disruption and imperfection, echoing the seed's themes of repair versus damage. The composition favours a serene quiet field contrasted with sharper accents, enhancing the overall sense of conflict and balance.</desc>
