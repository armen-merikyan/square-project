<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The composition embodies a struggle between defiance and submission through the contrasting interplay of colors. The warm ivory and soft gold create a quiet field of submission, arranged as a lattice, while the deep wine and ash gray reflect the boldness of defiance, mirrored in sharp patterns that interrupt the calmness. This grid of colors cascades down in a ‘falling_pixels’ layout, establishing movement that hints at either ascent or descent. The carefully placed broken pixels add intentional disruptions, echoing the tension between order and chaos as they create a texture that’s unevenly distributed, fostering a sense of layered emotional complexity.</desc>
