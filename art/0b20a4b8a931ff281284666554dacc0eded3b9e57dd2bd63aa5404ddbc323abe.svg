<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erosion of Quiet</title>
  <desc id="desc">This composition embodies the emotional tug-of-war between restlessness and peace through the juxtaposition of warm and cool colors. The palette is chosen to reflect connection (warm coral and soft amber) contrasted with alienation (cold slate, blue-black, and signal cyan). The main collision occurs from the warm lattice of pattern that signifies peace, disrupted by crosshatch elements that suggest tension and movement. This interplay is centered but feels off-balance, enhancing the feeling of unresolved motion through intentional breaks in the pixel pattern.</desc>
