  <title id="title">Emotional Waves</title>
  <desc id="desc">The piece encapsulates the tension between joy and grief through a split layout—left side depicting joy as bright radial patterns, while the right side channels grief with checker-like density. The palette juxtaposes vibrant yellows and oranges against deep blues and muted purples, suggesting warmth battling with heaviness. The collision occurs centrally where joy meets grief, creating a stark but harmonious contrast. The thin outlines and broken pixels contribute to the imperfect beauty reflective of emotional experiences.</desc>
