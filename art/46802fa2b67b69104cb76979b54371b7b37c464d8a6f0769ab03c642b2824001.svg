<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone conveys a conflict between desire and emptiness, represented by saturated colors pushing against darker, subdued hues. The palette of hot coral, blood orange, and dust pink evokes warmth and yearning, while charcoal and hollow blue symbolize restraint and emptiness. The main collision happens in the center, where the vibrant diagonal forms (representing desire) intersect with the stark edges (representing constraint), creating a tension that reflects the seed's themes. The layout is designed in a diagonal wedge pattern, suggesting a pull towards fullness meets a blocked overflow, with broken pixels introducing intentional disruptions to enhance the feeling of conflict.</desc>
