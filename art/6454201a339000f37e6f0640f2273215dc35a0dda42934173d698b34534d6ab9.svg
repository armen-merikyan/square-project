<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This artwork expresses the tension between vulnerability and strength through a balanced use of light and dark tones. The palette features soft off-whites and faint peaches contrasted against the deeper dark navy and compressed red, symbolizing the spectrum of emotional states. The arrangement focuses on a strong center with a fragile outer edge, utilizing a 'stepwell' pattern against 'teeth' for collision, emphasizing both exposure and shelter. The jagged edges represent broken thresholds, while the negative space disrupts the density, creating an open feeling amidst the pressure of density. The main collision occurs centrally, accentuating the duality of experience.</desc>
