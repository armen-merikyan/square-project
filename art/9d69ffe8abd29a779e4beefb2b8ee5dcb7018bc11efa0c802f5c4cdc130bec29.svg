<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Pulses</title>
  <desc id="desc">This artwork captures the emotional tone of vulnerability and strength by featuring a central pulse of exposed light (soft pink) shielded by darker, harder edges (dark maroon). The palette of love and betrayal colors emphasizes warmth and sorrow. The stark contrast between muted gray fields and striking red accents creates an intense collision at the center, representing the core of tension and connection. The patterns of broken dots (vulnerability) and scarred edges (strength) interleave, suggesting a dialogue of exposure and protection. The negative space surrounding the central formations helps to echo the emotional dissonance present within.</desc>
