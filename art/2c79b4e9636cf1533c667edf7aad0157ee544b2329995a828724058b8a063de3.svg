<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Reflections</title>
  <desc id="desc">The emotional tone reflects the push and pull between longing and resolve, expressed through a palette of muted greens and warm browns, accented by cooler tones to create depth. The 'near_vs_far' pairing emerges with a prominent collision of crosshatched longing at the center, symbolic of connection, interrupting the structured pressure bands of resolve. The arrangement incorporates broken pixels to introduce flaws in the texture, representing both damage and repair, creating a narrative of tension where serenity and urgency coexist.</desc>
