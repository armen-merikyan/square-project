<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order in Chaos</title>
  <desc id="desc">This composition embodies the tension between joy and grief through the warm glow of orange and yellow contrasting against the cooler tones of deep blue and muted purple. The upper half is structured in a clean frame pattern, suggesting joy and openness, while the lower half breaks into fragmented stairs, embodying grief's drooping and broken feel. The sharp edges and thin outlines create a division that communicates the emotional conflict, while preserving a sense of dynamic flow from top to bottom, hinting at a rising wave of emotions meeting a somber undercurrent.</desc>
