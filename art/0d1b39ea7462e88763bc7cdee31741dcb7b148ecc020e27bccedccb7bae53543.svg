<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center of Emotion</title>
  <desc id="desc">The artwork embodies the tension between vulnerability and strength through a structured juxtaposition of colors. The palette features 'pale mint' and 'soft sky' juxtaposed against 'storm gray' and 'near black', reflecting lightness against weight. A significant contrast occurs at the center where the pale colors ripple outwards, colliding with the darker, more solid edges that stabilize the composition. The iteration of 'broken pixels' serves as intentional imperfections that suggest moments of vulnerability within a composed structure, embodying the seed metaphorically as a pillar representing strength.</desc>
