<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Suspicion</title>
  <desc id="desc">This artwork captures the emotional tension between trust and suspicion through a dynamic interplay of colors. The palette, featuring hot coral and blood orange, embodies warmth and energy, while charcoal and hollow blue convey cooler, more reserved feelings. The main collision occurs diagonally across the square, where the warm hues of trust clash with the deeper, cooler tones representing suspicion, creating a striking visual dialogue. The rising signal flow represents hope amidst uncertainty, while broken pixels introduce intentional disruption, echoing the complexities of human emotions. The resulting composition feels layered and resonates with both the softness of trust and the jagged outlines of suspicion.</desc>
