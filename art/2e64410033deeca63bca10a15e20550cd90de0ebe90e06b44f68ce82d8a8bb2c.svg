<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Contrast</title>
  <desc id="desc">This piece embodies the emotional tension between dread and relief using a palette dominated by navy and dim cyan, conveying depth and hidden weight. The left side represents dread through a darker, more chaotic arrangement, while the right side embraces a serene pattern of rings, suggesting relief. The main contrast occurs at the vertical midpoint, where dark, broken pixels clash against lighter, symmetrical patterns, illustrating a struggle between chaos and calm. The emotional tones of both relief and dread resonate through the juxtaposition of patterns—'crack' on the left versus 'ring' on the right—creating a visual narrative of conflict and harmony.</desc>
