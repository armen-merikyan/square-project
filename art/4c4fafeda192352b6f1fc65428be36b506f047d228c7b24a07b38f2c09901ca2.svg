<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Essence</title>
  <desc id="desc">This composition embodies the emotional tension of love intertwined with betrayal, illustrated through contrasting warm and dark colors. The palette of pinks and reds symbolizes love, while the inclusion of gray and dark maroon captures the somber weight of betrayal. The overall flow is right to left, evoking an ancient, almost primal feeling of rising tension and unresolved conflict. The broken pixels disrupt anticipated symmetry, creating a visual representation of disconnection and intensity. This 8x8 pattern echoes the complexities of emotional experience, hinting at both connection and alienation.</desc>
