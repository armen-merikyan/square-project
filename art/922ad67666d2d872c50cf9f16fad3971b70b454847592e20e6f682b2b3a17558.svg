  <title id="title">Fractured Sentiment</title>
  <desc id="desc">This artwork captures the emotional clash of love and betrayal through warm and muted colors juxtaposed against sharp contrasts. The palette of pinks and dark maroons represents love's warmth, while greys depict betrayal's coldness. The central pattern reflects a diamond shape, fragmented by broken and overlapping segments, signifying broken trust within a protected space. The flow moves outward, creating a tension that feels both protective and chaotic, embodying the pain of betrayal against the softness of love.</desc>
