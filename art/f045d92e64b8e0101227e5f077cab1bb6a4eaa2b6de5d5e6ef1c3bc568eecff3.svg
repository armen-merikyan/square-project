<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonance of Dissonance</title>
  <desc id="desc">This composition expresses an emotional wrestling between defiance and submission, illustrated through contrasting colors and patterns. The vibrant yellows and oranges represent defiance, while the muted purples and deep blues embody submission. The central cluster of brighter colors portrays aggressive movement, while the surrounding darker tones recede, symbolizing vulnerability. The layout creates tension along the diagonals, allowing the patterns to collide and intertwine, as if both emotions are fighting for dominance. This creates a dynamic visual echoing the inner conflict suggested by the seed.</desc>
