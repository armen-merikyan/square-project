<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erosion of Calm</title>
  <desc id="desc">The emotional tone is a tension between rage and calm, using a palette of deep reds and pale blues to symbolize heat and coolness. The colors collide diagonally, with explosive reds dominating the upper left corner and cooler bluish tones spilling in from the bottom right, creating a disrupted harmony. The jagged reds represent the chaos of emotions erupting against the structured calmness of the blues, speaking to the tension of containment versus overflow. It's a narrative of a quiet space being invaded, embodying the feeling of unease prevalent in the seed's themes.</desc>
