<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Currents</title>
  <desc id="desc">This composition captures the emotional interplay between defiance and submission. The colors represent defiance through sharp contrasts in blues and soft grays, symbolizing a hard interruption in the emotional landscape. The palette, drawn from 'melancholy_wonder', combines muted plum for a sense of inner turmoil with the soft cyan hinting at a tranquil surface tension. The collision occurs centrally where the checker pattern of defiance meets the hinge pattern of submission, suggesting an open gateway that invites reflection. The jagged edges symbolize the struggles between these two forces, while broken pixels disrupt the uniformity, adding depth and texture.</desc>
