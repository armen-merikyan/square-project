<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The emotional tone balances vulnerability and strength, using the palette of moss green, bone white, rust, stone gray, and small gold. The central square is a patchwork representing vulnerability, surrounded by a thread pattern signifying strength. This interplay creates a stark contrast between soft and hard edges, with the main collision occurring centrally, where the delicate patches of bone white and small gold flicker against the rooting strength of earthy tones and deep greens. The design echoes the themes of exposure versus shelter through layered density and minimal negative space that invites the viewer into an emotionally charged space.</desc>
