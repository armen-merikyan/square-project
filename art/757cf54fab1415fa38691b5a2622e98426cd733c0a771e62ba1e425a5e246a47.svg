  <title id="title">Echo of Patterns</title>
  <desc id="desc">This piece captures the emotional tension between longing and resolve, represented through a palette that juxtaposes warm coral and soft amber against cold slate and blue-black. The collision occurs at the center where longing's constellation pattern breaks into resolve's glitch, suggesting fractures and repairs. The layout spirals outward, creating a sense of movement and dynamic pressure while maintaining an open negative space, allowing calm and chaos to coexist. The broken pixels introduce intentional imperfections, reflecting life’s unpredictability. The overall arrangement conveys a narrative of striving against obstacles and the duality of emotion.</desc>
