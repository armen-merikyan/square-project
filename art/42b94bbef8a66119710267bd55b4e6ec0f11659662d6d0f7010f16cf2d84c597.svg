<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Boundaries</title>
  <desc id="desc">This artwork explores the emotional tension between defiance and submission by juxtaposing darker, more oppressive colors on the left, symbolizing a weighty, defiant struggle, with softer, lighter tones on the right that hint at a submission. The use of red accentuates the sense of urgency and conflict, while pale blue suggests an underlying calmness. The pattern choice of flame represents defiance with chaotic energy on the left side, while the target pattern denotes a more subdued, focused submission on the right, symbolizing how noise and clarity clash in the emotional landscape. The layout creates a vertical split that accentuates this tension, allowing for a dynamic visual flow from left to right, while the broken pixels incorporate imperfection and the unpredictability of emotion.</desc>
