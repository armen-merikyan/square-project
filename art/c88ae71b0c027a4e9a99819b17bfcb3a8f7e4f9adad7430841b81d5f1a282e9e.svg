<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Emotion</title>
  <desc id="desc">This piece embodies the tension between trust and suspicion through contrasting color arrangements and pattern types. The palette of soft pink and warm white offers a gentle warmth, representing trust and stability, while sharp crimson and carbon black introduce a stark intensity, symbolizing suspicion and doubt. The crosshatch pattern, representative of trust, is interrupted by jagged ladder formations, evoking suspicion. The central collision occurs where these patterns meet, illustrating the emotional conflict. This grid layout captures the sense of disorder, and the inclusion of broken pixels adds to the imperfection, reflecting the intricate nature of human relationships.</desc>
