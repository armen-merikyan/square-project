<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow and Containment</title>
  <desc id="desc">The emotional tone captures a dynamic contrast between explosive rage and serene calm, represented through the aggressive jagged reds contrasted against muted blues and blacks. The palette blends the visceral quality of rage (hot reds, deep black) with the softness of calm (pale blue, white), while creating a central pulse of conflict through jagged frames interrupted by noise-like fields. The collision occurs predominantly toward the center, emphasizing the struggle between containment and overflow, where the chaotic reds break through the blue quiet fields, evoking a sense of tension and release as one emotion disrupts the other.</desc>
