<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall</title>
  <desc id="desc">The emotional tension of panic versus control is explored through contrasting warm and cool colors, generating a complex battle across the pixel grid. The palette 'fear_hope' combines dark violet and soft gold to signal anxiety and calmness, respectively. The arrangement of colors follows an upward movement on one side and a downward pull on the other, symbolizing instability and the chaotic dialogue between hope and despair. Broken pixels are introduced to signify the imperfection in this struggle, while the preserved negative space allows moments of reflection.</desc>
