<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Confluence</title>
  <desc id="desc">This composition captures the duality of tenderness and rage through stark contrast. The left half embodies tenderness with a soft and muted palette, represented by pale blue and white in a barcode pattern that evokes gentle energy. The right half showcases rage in a jagged, vibrant red spark pattern, creating a fractured visual tension against the muted colors. The flow moves from gentle to intense, with the main collision located at the central vertical divide, embodying the struggle of emotions colliding. This piece serves as an abstract interpretation of the seed's exploration of conflicting feelings and the challenge of navigating between them.</desc>
