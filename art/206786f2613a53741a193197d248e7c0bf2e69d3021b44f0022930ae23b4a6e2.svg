  <title id="title">Collision of Light and Shadow</title>
  <desc id="desc">This artwork embodies the emotional tension between softness and severity. The palette features a delicate blend of powder pink and warm white to evoke softness, balanced against carbon black and steel gray, which introduce a sense of severity. The collision is central, as lighter colors emerge from the dark mass that dominates the square, creating an echo of conflict and resolution. The broken pixels add an element of imperfection and disruption, lending a tactile quality. Overall, this composition narrates a story of emotional push and pull, celebrating the interplay of light and dark.</desc>
