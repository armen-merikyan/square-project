<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Heartbeats</title>
  <desc id="desc">The emotional tone captures the tension between love and betrayal, displayed through a contrasting palette of warm pinks and deep maroon against muted grays. The pattern flows in a diagonal fall, representing the collapse of order into chaos. The placement of broken pixels creates a sense of interruption and fragmentation, simulating the feeling of a heart divided. The chaos emerges where dark maroon collides with the warmth of pink, providing a visual echo of pain against the calmness of gray, representing the disarray of emotions.</desc>
