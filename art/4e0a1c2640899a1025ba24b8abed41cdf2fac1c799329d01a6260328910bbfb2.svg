<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inner Tension</title>
  <desc id="desc">This artwork explores the emotional collision between fear and hope, using a contrasting palette of dark violet representing fear, and soft gold and pale green representing hope. The black edges symbolize a protective frame around the core, while the broken pixels introduce an intentional imperfection that reflects the tension of emotions battling within. The division in colors creates a split-screen effect, enhancing the feeling of pressure from the outside, meeting the rising hope in the center. The layout balances negative space with dense color clusters, echoing the interplay between calmness and intensity, leading the eye inward where the two emotional states collide.</desc>
