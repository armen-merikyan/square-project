<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This composition embodies the tension between defiance and submission, with a quiet, soft center representing submission surrounded by harsher, contrasting colors that symbolize defiance. The warm coral and soft amber provide a sense of vibrancy in the center, while cold slate and blue-black create shadows around it, suggesting the conflict between light and dark. The collision occurs predominantly at the edges, where assertive colors intrude upon the gentler center, representing an emotional challenge. The broken pixels act as disruptions in the patterns, further enhancing the notion of an interrupted flow amidst pervasive emotional tension.</desc>
