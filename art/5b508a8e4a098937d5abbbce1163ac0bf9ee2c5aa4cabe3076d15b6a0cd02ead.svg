<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragments of Resilience</title>
  <desc id="desc">This piece captures the emotional duality of vulnerability and strength. The palette of soft cyan, moon white, and muted plum evokes a sense of fragility merging with stability. The dominant checker pattern symbolizes vulnerability, interrupted by dot patterns representing strength, creating a tension that reflects the interplay between exposure and safety. The main collision occurs centrally, where these patterns interact, suggesting a struggle yet yielding to hope as the colors sweep upward, evoking growth from the weight of existence.</desc>
