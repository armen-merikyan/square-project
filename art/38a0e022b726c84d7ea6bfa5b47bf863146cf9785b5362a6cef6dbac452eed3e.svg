  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This artwork captures the tension between safety and exposure through contrasting textures and colors. The palette mixes warm brown and shelter green to signify the comfort of protection, while cold white and open blue symbolize the vulnerability of exposure. The main contrast occurs in the center, where crosshatch patterns represent chaotic exposure, colliding with static patterns that provide a sense of undisturbed safety on the edges. The layout divides the canvas into mirrored halves, disrupted subtly to evoke themes of asymmetry and inherent conflict.</desc>
