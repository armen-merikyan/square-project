<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Hearts</title>
  <desc id="desc">The emotional tone juxtaposes warmth and cool distance, encapsulating the duality of love and betrayal. The palette utilizes pinks and reds to evoke passion, intertwined with darker tones of gray and maroon to represent the bitterness of betrayal. The prominent contrast arises from the interplay between dense clusters of warm colors on the left and cooler spaces on the right, suggesting a tension between connection and separation. This is further articulated by broken edges that signify imperfections and emotional fractures, reflecting how love can shatter into betrayal. The layout flows from an intense emotional density to more subdued spaces, echoing the rising signal of hope and the underlying chaos of heartbreak.</desc>
