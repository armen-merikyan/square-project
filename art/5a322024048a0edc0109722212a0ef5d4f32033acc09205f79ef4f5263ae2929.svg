<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order in Chaos</title>
  <desc id="desc">This piece explores the emotional tension between control and panic through color and pattern. The upper section employs a controlled mirrored grid in shades of electric blue and lime, representing stability and order. In contrast, the lower section fractures into a chaotic grid with magenta and black, reflecting the sense of panic and disruption. This collision between the two opposing forces is visually depicted through sharp transitions in color and pattern, making the viewer feel the interplay between these intense emotions. The broken pixel elements in the chaotic zone highlight imperfections, resonating with the feeling of unpredictability and instability. The overall composition maintains enough negative space to suggest an empty room, enhancing the emotional weight and isolation within the piece.</desc>
