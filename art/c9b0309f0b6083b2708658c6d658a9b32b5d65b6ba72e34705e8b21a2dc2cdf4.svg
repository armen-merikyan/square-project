<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emergent Tension</title>
  <desc id="desc">The composition captures the emotional struggle between trust and suspicion, using a palette of muted tones to create a sense of quiet pressure. The dark navy serves as the primary color, dominating roughly 65% of the layout, suggesting the weight of suspicion. In contrast, faint peach and compressed red provide unexpected bursts of warmth, hinting at trust with their soft glow. The collision occurs centrally, where the dark navy and light tones interact, symbolizing the internal conflict between hope and doubt. The gradual ascent of colors evokes a sense of rising tension, reflective of the dual nature of the seed.</desc>
