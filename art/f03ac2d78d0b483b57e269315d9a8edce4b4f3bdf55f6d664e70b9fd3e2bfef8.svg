<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Peaks</title>
  <desc id="desc">The emotional tone captures the duality of yearning and limitation. The palette combines saturated hues like hot coral and blood orange to represent desire, contrasted with the muted tones of charcoal and hollow blue symbolizing restraint. The layout creates a broken path of vivid color against more subdued tones, emphasizing the collision between aspiration and borders. The main contrast occurs at the center, where warm colors collide with muted edges, invoking the struggle of desire seeking release yet held tightly by restraint.</desc>
