<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Forces</title>
  <desc id="desc">This abstract composition expresses the emotional tension between defiance and submission through a carefully curated palette of electric blue, lime, magenta, and black. The left side employs a flame pattern representing defiance with an energetic rhythm, while the right side uses a checker pattern to embody submission's structures. The layout is split vertically, echoing the duality of the emotions. The edges are stark and heavy, creating sharp contrasts. The arrangement becomes a narrative of conflict and weight, where the bottom half is denser, suggesting a gravity of emotions. The top has more negative space, indicating openness in defiance against the encapsulating submission below.</desc>
