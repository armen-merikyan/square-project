<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This artwork encapsulates the emotional tension between control and surrender. The palette, anchored in deep navy and black with accents of dim cyan and white, illustrates a contrast between warmth and coolness, reflecting the inner struggle of balance. The checker pattern represents control, juxtaposed with the free-form tide pattern symbolizing surrender, creating a dynamic interaction. The central collision of colors draws attention to the heart of the square, while maintaining negative space allows for moments of quiet reflection amid the density, evoking a sense of overflow and contained chaos. This composition effectively narrates the oscillation between firm boundaries and gentle release—each pixel deliberately placed to convey the overarching theme.</desc>
