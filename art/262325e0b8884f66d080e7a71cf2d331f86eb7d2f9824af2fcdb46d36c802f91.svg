<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone captures the struggle between defiance and submission, represented through a stark contrast of dark and muted colors against vibrant accents. The palette of black, dark violet, soft gold, and pale green evokes a tension between fear and hope, with the black at the edges symbolizing enclosure and submission while softer colors swirl towards the center representing defiance. The central region is densely filled with a patchwork of colors, colliding with the subdued border, creating a dynamic flow where defiance emerges against the edges of submission. The broken pixels introduce intentional disruptions akin to scars that represent struggles while emphasizing the collision where deep emotions entwine.</desc>
