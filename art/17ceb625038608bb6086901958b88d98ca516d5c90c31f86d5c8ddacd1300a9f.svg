<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dualities of Light and Shadow</title>
  <desc id="desc">The emotional tone reflects the struggle between fear and hope through a split vertical layout where dark, oppressive colors (fear) clash with lighter, uplifting hues (hope). The palette features black, dark violet (to represent fear), alongside soft gold and pale green (to signify hope). The crosshatch pattern evokes a sense of dynamic tension, while jagged edges embody fragmentation. Main contrast occurs in the center as dark corners surround a bright core, creating a visual echo of pressure versus relief. The overall arrangement suggests an unresolved motion between these opposing emotions.</desc>
