<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Gravity of Contrast</title>
  <desc id="desc">This piece embodies the emotional tension between softness and severity, reflected through a palette that shifts from the gentle warmth of powder pink and warm white to the starkness of carbon black and sharp crimson. The arrangement creates a spiral movement, with a tight cluster of dark colors in the lower left, suggesting heavy weight, while the upper right loosens into lighter hues, creating a visual echo of release. This follows the pattern of ‘split screen’ for severity juxtaposed against a ‘thread’ for softness, mirroring the emotional conflict represented by the seed. The placement of broken pixels serves as intentional disruptions, fortifying the sense of unresolved tension.</desc>
