<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Unraveled</title>
  <desc id="desc">The emotional tone navigates the contrast of love and betrayal through a dramatic split layout. The chosen palette of pinks and maroons on one side represents warmth and intimacy, while grays and dark colors on the other symbolize isolation and turmoil. The main contrast appears as a visual echo where soft pinks collide with sharp dark maroons, representing the tension between affection and betrayal. This is reflected in the maze-like pattern on the 'love' side, suggesting paths intertwined yet complex, while the grid pattern on the 'betrayal' side evokes rigidity and structure, hinting at the restrictive nature of betrayal. The design embraces negative space to echo loneliness, enhancing the emotional weight of the piece, creating a full circle of unresolved feelings within the abstract.</desc>
