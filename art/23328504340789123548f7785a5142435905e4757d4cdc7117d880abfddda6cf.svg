<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tension</title>
  <desc id="desc">The composition reflects the duality of joy and grief through a split horizontal arrangement. The upper half employs bright yellows and soft oranges symbolizing joy, and utilizes a maze-like pattern to create movement and flow. The lower half adopts muted blues and purples to embody grief, incorporating a crosshatch pattern that conveys a sense of tension and heaviness. The main collision occurs at the middle line where the vibrant energy of joy clashes with the subdued tones of grief, creating a visual and emotional starkness that encapsulates the complexity of these conflicting feelings.</desc>
