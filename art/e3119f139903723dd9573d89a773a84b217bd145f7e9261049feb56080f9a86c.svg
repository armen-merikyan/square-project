<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">The emotional tone of this piece embodies the struggle between joy and grief through the use of contrasting colors and patterns. A palette of bright yellow and orange represents warmth and expansion, while dense blues and muted purples signify heaviness and introspection. The grid-like layout creates a structural tension against the crosshatch pattern, creating a sense of conflict and duality. Warm colors occupy the upper half, while cooler tones dominate the bottom, reflecting the split horizontal dynamic. The broken pixels introduce imperfection, allowing for an organic feel amidst rigid structure, evoking a sense of unresolved feelings and emotional waves.</desc>
