<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Order and Chaos</title>
  <desc id="desc">This composition reflects the emotional polarity of control versus panic, utilizing color and structure to manifest this dichotomy. The rich dark colors represent panic and chaotic energy, featuring broken patterns that suggest instability, while the lighter hues symbolize control and an effort for balance. The pixel placement creates a central spark of brighter colors, erupting from the lower corner, suggesting a disturbance trying to reach upward. The tension is visually highlighted with a staggered diagonal flow from dark to light, channeling the narrative of a fragile state striving for equilibrium, yet constantly threatened by the encroachment of chaos.</desc>
