<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition embodies tension between defiance and submission through contrasting patterns of stripes and glitch. The palette mixes stark black and white with pale blue and red, representing the volatility of defiance against the softness of submission. The collision occurs predominantly around the center where defiance's sharp lines cut into the more fluid, glitch-like disruptions of submission. The negative space around the outer edges emphasizes the chaotic struggle within, creating an abstract narrative of conflict. The chosen layout supports this by providing symmetry that erodes at the borders, echoing the concept of order versus chaos.</desc>
