  <title id="title">Tension in Layers</title>
  <desc id="desc">The artwork embodies the emotional contrast of relief and dread, reflecting a struggle between dense, chaotic layers and lighter, serene spaces. The chosen palette of pale mint and soft sky provides an uplifting undercurrent while storm gray and near-black add weight and pressure. The collision predominantly occurs at the center, where dark and light hues intersect, creating a spiral effect that draws the eye and evokes a sense of tension and release.</desc>
