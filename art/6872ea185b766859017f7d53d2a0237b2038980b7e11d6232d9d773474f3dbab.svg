<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This composition explores the tension between desire and restraint through a saturated palette that signifies longing contrasted with muted tones symbolizing containment. The left side, filled with vibrant hues, experiences a crosshatch layout, representing an intense pull towards fulfillment. The right side uses a checker pattern to show the boundaries of restraint, creating a stark contrast in emotional weight. The collision occurs centrally, conveying a struggle between expansion and the rigid edges which contain it. This seed's abstract qualities transformed into visual metaphors capturing emotional conflict and space.</desc>
