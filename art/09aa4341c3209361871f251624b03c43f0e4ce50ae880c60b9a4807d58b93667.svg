<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">This composition explores the emotional duality of safety and exposure. The palette combines warm brown and shelter green to create a sense of security, while pale skin and open blue introduce elements of fragility and airiness. The collision occurs centrally, where the warm tones intertwine with cooler shades, symbolizing the tension between protection and vulnerability. The edge is characterized by weighted diagonals, echoing the idea of pressure meeting release, with irregular, broken pixels creating intentional disruptions that embody the complexity of the emotions explored.</desc>
