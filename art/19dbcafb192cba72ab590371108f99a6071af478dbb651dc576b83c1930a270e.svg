<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of the Hinge</title>
  <desc id="desc">This piece explores the duality of control and surrender, manifesting as a tension-filled rise from a dark base to lighter hues above. The palette of cosmic indigo, cold gold, and deep teal symbolizes the struggle between the heavy weight of containment (void black) and the shimmering hope of release (star white). The distributed patterns of echo and target create colliding trajectories, where the center bursts with pressure, while edges softly open, suggesting the ongoing internal conflict. Broken pixels introduce intentional disruptions, enhancing the narrative of imperfect balance between control and surrender.</desc>
