<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This piece explores the tension between tenderness and rage, where muted blues contrast against sharp reds, creating a dynamic interplay. The quiet channel of pale blue serves as a backdrop, echoing softness while allowing the jagged red and black to intrude, symbolizing interruptions of rage. The pattern alternates between broken dots and smooth shatter effects, representing the collision of emotions, with the central area experiencing a sharper expression of rage. This evokes a narrative of struggle and harmony within chaos.</desc>
