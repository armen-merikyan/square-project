<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Tension</title>
  <desc id="desc">The emotional tone reflects a battle between restlessness and peace. The palette of hot coral, blood orange, and dust pink serves as vibrant highlights against the muted depths of charcoal and hollow blue, suggesting a flickering flame amid heavy darkness. The main collision occurs in the center, where the warm accents vie for attention against cooler fields, embodying the tension and unresolved motion symbolized by the diagonal arrangement, leading the eye in a spiral. Broken pixels introduce intentional disruptions, echoing the sense of imperfection and memory. This creates a visual dialectic between chaos and calm.</desc>
