<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">The emotional tone is rooted in the tension between longing (the warmth and reach) and resolve (compressed strength), portrayed through a palette of burnt orange, dark red for warmth, charcoal for depth, and gold as a highlight. The predominant color is a warm burnt orange, representing longing, filling the left corner. The contrast arises as charcoal segments cut across in a diagonal fashion, symbolizing resolve and introducing a firmness against the warmth. The design creates a visual echo between the warmth and cool distance, with broken pixels scattered to suggest imperfections, further emphasizing the emotional discord. This collection evolves around the interplay of layers and negative space, embodying the intricate dance between hope and determination.</desc>
