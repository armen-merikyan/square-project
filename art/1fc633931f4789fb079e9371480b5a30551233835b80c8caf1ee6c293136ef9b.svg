<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmonic Tension</title>
  <desc id="desc">The artwork captures the emotional tension between joy and grief through contrasting color arrangements that echo the highs and lows of the human experience. The palette combines vibrant yellows and oranges symbolizing joy with muted purples and deep blues representing grief. Predominantly, the joy patterns ripple through the bottom half in a 'spark' layout while the grief 'crosshatch' pattern interjects from the top, resulting in a visual tension that mirrors the complexities of feeling. The strategic placement of negative space allows for breathing room, while the intentional use of broken pixels introduces an element of imperfection, reinforcing the chaotic nature of emotions.</desc>
