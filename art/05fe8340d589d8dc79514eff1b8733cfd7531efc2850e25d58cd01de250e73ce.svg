<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This artwork encapsulates the emotional push and pull between restlessness and peace. The color palette combines soft mint and pale sky to evoke tranquility, contrasted sharply with storm gray and near black to represent unease. The main collision of color occurs toward the center of the piece where the patterns of negative crosses clash with constellations, symbolizing the tension between movement and static memory. The broader shapes and irregularities represent closed corners and breaking edges, embodying the struggle in the themes presented in the seed.</desc>
