<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This composition plays on the emotional pull between saturated desire and the enclosing nature of restraint. The top four rows embody the desire with vibrant colors like red oxide and small orange, radiating warmth and an inviting reach. The bottom rows shift to muted tones like blackened plum and iron gray, forming a lattice structure that represents confinement and boundaries. The central collision point occurs where the vibrant colors begin to encounter the edges of muted tones, creating an unrest that speaks to the tension of wanting more while feeling held back. The broken pixels intentionally disrupt the flow, suggesting imperfections and moments of interruption, reinforcing the complex emotions of yearning against limitation.</desc>
