  <title id="title">Symmetry and Disruption</title>
  <desc id="desc">This artwork captures the tension between trust and suspicion through contrasting emotional palettes. The soft glow of light, represented by soft cyan and moon white, contrasts against the hard shadows created by dark lavender gray and muted plum. The central collision occurs in the diagonal split, where darker tones create a feeling of unease, while lighter tones suggest openness and trust. The broken pixels introduce intentional imperfection, echoing the fragility of trust amidst underlying suspicion.</desc>
