<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This piece embodies a tension between longing and resolve, reflecting emotional ripples. The colors from the 'awe_terror' palette create contrast: deep teal and cosmic indigo evoke the depths of desire, while cold gold and star white assert clarity and strength. The main collision is at the center where these darker and lighter tones interact, reminiscent of an unresolved pulse, surrounded by a quieter sea of void black. Patterns of patchwork and threshold create layered distance and intimacy, embodying both repair and damage.</desc>
