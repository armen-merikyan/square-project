<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Striking Collision</title>
  <desc id="desc">This artwork embodies the emotional tension between defiance and submission, represented through a saturated center filled with dark, vivid colors, symbolizing resistance, and softened edges to suggest vulnerability. The palette includes deep wine for strength, warm ivory for softness, and ash gray as a quiet counterbalance, creating a dynamic interplay. The main contrast occurs at the center, where colors clash and collide, embodying the struggle between the emotions. Broken pixels introduce imperfections, mimicking the unpredictability of human experience. The patterns of rain (defiance) and targets (submission) overlap and interrupt, enhancing the sense of conflict while maintaining a visual coherence that speaks to a deeper emotional narrative.</desc>
