<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This piece embodies the emotional struggle between vibrant life (spark) and quiet, fading remnants (ash). The palette combines warm, earthy tones with stark contrasts to evoke a sense of resilience amid fragility. The diagonal layout promotes movement from the corner, where warmth and brightness clash with muted grays and soft whites, illustrating a dynamic interplay. Broken pixels add intentional imperfection, emphasizing the theme of memory alongside erasure. The overall rhythm flows from the top left, creating a compelling echo effect across the grid.</desc>
