<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">The Weight of Connection</title>
  <desc id="desc">This artwork embodies the emotional tension between loneliness and connection through a contrast of rich, warm colors against darker, muted backgrounds. The palette of burnt orange and dark red captures the essence of ancient fires, suggesting warmth yet evoking a sense of isolation. Central to the piece is a burst of vibrant colors that symbolizes hidden connections amidst the external loneliness. The arrangement flows diagonally, creating a sense of movement while also expressing the heaviness of ambient emptiness, with at least 10% negative space to evoke contemplation and weight.</desc>
