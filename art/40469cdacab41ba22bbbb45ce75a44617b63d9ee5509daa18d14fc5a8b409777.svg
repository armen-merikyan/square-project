<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece embodies the emotional tension of defiance versus submission through a stark contrasting palette. The outer border, heavily utilizing muted tones like '#5B3A29' (warm brown), encapsulates a feeling of confinement and isolation, while the inner core employs brighter snippets of color such as '#B9D9D9' (cold white) to symbolize the vibrancy of defiance. The collision primarily occurs at the boundary between these two emotions, reflecting an inward spiraling dynamic where the conflict is palpable yet abstract. The chosen patterns—dots for defiance and islands for submission—create visual disruptions that resonate with the conceptual theme of pressure and release, culminating in a dense center that juxtaposes against an airy frame, inviting contemplation on the complexity of emotional states.</desc>
