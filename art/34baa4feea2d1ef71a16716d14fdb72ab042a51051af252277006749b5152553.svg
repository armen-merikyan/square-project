<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in the Frame</title>
  <desc id="desc">The emotional tone captures a dynamic struggle between restlessness and peace. The palette combines soft mint and fading gold to embody calmness with undercurrents of storm gray and near black that evoke turmoil. The outer border (dominating color flows) suggests peace through its lighter tones, while the inner grid-like pattern embodies restlessness with a contrasting density of darker shades. The collision between these emotional states is central, creating an unsettling balance within an otherwise serene frame, emphasizing the need for resolution that remains unresolved. The seed shaped the layout into a contrasting core and edge, manifesting the argument between motion and stillness.</desc>
