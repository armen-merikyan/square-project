  <title id="title">Signal in the Noise</title>
  <desc id="desc">This artwork explores the tension between trust and suspicion through a contrasting palette of warm coral and cold slate. The arrangement features soft amber and signal cyan asserting pulsation amidst the background of blue-black and splashes of dark slivers. The main collision occurs diagonally, evoking a sense of movement from soft glow to hard shadow, reflecting the push and pull of emotional pressures. The layout maintains intentional negative space to signify moments of doubt, while broken pixels create an edge of imperfection that enhances the theme of resilience and fragility.</desc>
