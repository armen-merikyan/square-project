  <title id="title">Tension Between Control and Chaos</title>
  <desc id="desc">This artwork captures the emotional dichotomy between control and panic through a juxtaposition of structured checker patterns and chaotic ring forms. The palette, named 'broken_memory', showcases sepia, tan, dust_gray, and faded_blue to evoke nostalgia and a sense of fragmentation, highlighting the contrast between calm and distress. The radial focus and jagged edges introduce a sense of turmoil, where the collisions of darker colors disrupt the order, creating an unsettling rhythm. At the center, the density of colors echoes the pervasive tension, while the 'broken pixels' subtly represent imperfections amidst the chaos. This layout encapsulates the overarching theme of navigating inner turbulence against a backdrop of potential control.</desc>
