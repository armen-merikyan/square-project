<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Horizon of Contrast</title>
  <desc id="desc">This composition explores the tension between vulnerability and strength. It uses a palette of deep black, soft pale blue, and contrasting bright white to illustrate the collision of feelings. The dark outer edge, representing strength, creates a thick frame that emphasizes protection. Meanwhile, the lighter inner area swirls with pale blue, providing a vulnerable core that feels exposed and fragile. The broken pixels scattered throughout suggest imperfections and scars, echoing the concept of a shattered mirror. The overall flow is tilted, indicating a dynamic interaction between the rigid strength and the soft vulnerability, with the main collision located at the core where these emotions intertwine.</desc>
