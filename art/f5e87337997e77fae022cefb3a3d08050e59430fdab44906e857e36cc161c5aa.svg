<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Currents</title>
  <desc id="desc">This piece explores the emotional tension between awe and terror, illustrated through a palette of muted sepia, tan, and faded blue colors to represent broken memories. The contrast between soft edges and jagged disruptions conveys a feeling of instability, evoking the tension between safety and threat. The center is a calm blue, suggesting stability, surrounded by a turbulent mix of darker colors that collide against lighter patches. This arrangement produces a sense of pressure radiating outwards, capturing the essence of the seed through an abstract narrative of conflict and harmony.</desc>
