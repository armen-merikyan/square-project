<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Overflow</title>
  <desc id="desc">The emotional tone encapsulates a struggle between deep desire and strict restraint, visualized through a palette that conveys warmth clashing against muted tones. The contrasting colors, primarily warm accents of red oxide and small orange against a backdrop of iron gray and muted cream, represent the push and pull of emotions. The main collision occurs centrally, where hot colors attempt to break the boundaries set by the cooler hues, signifying desire pushing through the constraints of restraint. The spiral pressure theme translates into swirling arrangements and broken frames, which disrupt the flow but also create a sense of depth and introspection.</desc>
