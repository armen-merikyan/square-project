<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Distortion</title>
  <desc id="desc">This abstract artwork captures the emotional duality of quietness and pressure. The chosen palette of 'quiet_pressure' uses muted tones like off-white and faint peach to create richness while compressing deeper blues and reds to denote tension. The key contrast occurs diagonally across the square, where softer colors collide with darker ones, suggesting the instability between calm and chaos. The broken pixel elements subtly disrupt the flow, embodying the shatter against the tide, evoking a sense of fluidity against rigidity.</desc>
