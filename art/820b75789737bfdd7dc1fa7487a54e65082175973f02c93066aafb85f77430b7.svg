<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflicted Symmetry</title>
  <desc id="desc">This piece captures the emotional tension between panic and control through contrasting color placements and patterns. The palette of sepia, tan, dust gray, and faded blue reflects a sense of nostalgia intertwined with unease. The center is denser, symbolizing control, while the edges fade into less saturated hues to evoke feelings of panic. The clash of a grid-like layout against softer, flowing edges illustrates the push-pull between chaos and order, creating an overall narrative of conflict and resolution.</desc>
