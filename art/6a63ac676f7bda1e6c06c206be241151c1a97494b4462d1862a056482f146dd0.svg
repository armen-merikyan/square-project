<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Clash of Signals</title>
  <desc id="desc">This artwork embodies the emotional tension between certainty and curiosity. The palette consists of soft pink and warm whites contrasted with the severity of carbon black and sharp crimson. Here, warm tones suggest curiosity and exploration while the darker colors represent the certainty and boundaries we often encounter. The edges are defined with stark bars of black, creating a blocked edge that interrupts the warmer center of overlapping patterns. The chaos of color in the center reflects the ebb and flow of curiosity against the structured borders of certainty. Broken pixels were strategically placed to enhance the sense of disruption and tension, portraying emotional scars akin to relief and dread, while the central conflict portrays a rich interaction of light and shadow, inviting the viewer to delve deeper.</desc>
