<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Calm Disturbance</title>
  <desc id="desc">The artwork captures the tension between restlessness and peace through dynamic contrasts and a swirling rhythm. The palette of moss green and rust suggests resilience intertwined with fragility, while bone white introduces an element of calmness. The main collision occurs diagonally across the canvas, where the gentle shatter pattern representing peace meets the stuttered negative cross pattern symbolizing restlessness. This duality reflects the push and pull of emotion as represented by the seed, creating a dance between tranquility and agitation.</desc>
