<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Color</title>
  <desc id="desc">This artwork encapsulates the emotional dichotomy of joy and grief through contrasting palettes and structures. The left side (joy) is represented by softer, warm yellows and oranges that expand and pulse with life, creating a kind of inviting warmth. In contrast, the right side (grief) uses deeper blues and muted purples, evoking a sense of weight and fragmentation. The pattern of broken dots on the grief side introduces a sense of interruption and disconnection, while the stairs pattern on the joy side suggests upward movement and growth. The collision occurs at the center where brightness meets deep saturation, creating a tension that symbolizes the struggle between these emotions. The overall balance is a reflection of the complexity of human experience, allowing both feelings to coexist in harmony yet in conflict.</desc>
