<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork reflects the emotional tension between softness and severity. The upper half employs a warm palette of powder pink and warm white to convey softness and gently blend the shapes, illustrating a feathered contact with the viewer. The lower half employs sharp crimson and carbon black to enforce severity with a broken frame pattern, creating a dark rule over the soft tones. The main collision occurs in the center, showcasing an interplay of pressure bands against a stark contrast. This exploration of emotional duality is further emphasized by sparing dark accents that symbolize guilt and forgiveness, as suggested by the seed.</desc>
