<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow and Containment</title>
  <desc id="desc">The piece invokes emotional tension between desire and restraint, captured through a vibrant yet restrained palette. The balance of warm hues that pulse (#FF6F61, #FF3E00) against cooler, muted tones (#A0A7D3, #222B37) creates a visual echo of the conflict represented by the seed. The interplay occurs predominantly in the center, where saturated accents collide with the cooler borders, enhancing both the feeling of overflow and the attempt at containment. The structured nature of the layout reflects lattice-like organization amidst emotional chaos.</desc>
