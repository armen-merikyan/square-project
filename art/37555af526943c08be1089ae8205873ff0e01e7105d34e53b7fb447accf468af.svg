<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Trust and Suspicion</title>
  <desc id="desc">This composition conveys the emotional struggle between trust and suspicion through contrasting color blocks and patterns. The palette captures mourning and renewal with deep blues and pale yellows, emphasizing the dynamic between soft, trusting ripples and sharp, suspicious hinges. The main collision occurs center-left, where the dark hues symbolizing suspicion clash with the lighter tones of trust, creating visual tension. The layout, an 'argument grid,' showcases a split vertical pattern that reinforces the duality of the seed, manifesting in an overall feeling of unresolved tension and emotional complexity.</desc>
