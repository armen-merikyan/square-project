<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork explores the tension between rage and calm through color and pattern dynamics. The palette combines fiery reds with soft blues and blacks, representing the emotional conflict. The central part features a dense grid of red, signifying explosive energy that spills over into the cooler blue areas, suggesting containment. The hard edges contrast with the quiet fields, creating a visual dialogue of pressure and interruption. The zigzag pattern evokes movement, while the broken pixels introduce a sense of imperfection, portraying the turmoil of emotions. This arrangement invites the viewer to navigate the chaotic interplay of feelings captured in an abstract form.</desc>
