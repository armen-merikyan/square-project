<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">The emotional tone centers around the conflict between panic and control, embodied through the contrasting palette of deep navy, black, and the dimness of cyan. The main collision occurs where the bright, almost aggressive, sparks of white space attempt to break through a dense, dark mass. The layout reflects a small central seed of light representing hope surrounded by the surrounding weight of chaos, creating a pressure that feels both oppressive and freeing simultaneously. The arrangement captures a narrative of resilience against the pervasive shadow of panic, emphasized by the zigzag flow that embodies movement and disruption, while the fragmented pattern hints at brokenness amidst the search for order.</desc>
