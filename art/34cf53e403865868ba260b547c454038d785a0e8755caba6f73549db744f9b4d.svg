<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">This piece captures the emotional juxtaposition of joy and grief, presented through a vertical layout inspired by falling pixels, reminiscent of rain or tears. The palette of warm yellows and oranges contrasts with the deep blues and muted purples, representing the dichotomy of happiness and sorrow. The pattern incorporates a noise effect for joy, creating vibrant, chaotic clusters, while a mirror effect symbolizes grief's reflective nature, establishing stillness amidst movement. Hard edges enhance the notion of conflict, allowing sharp transitions between colors, denoting safe spaces vs. threatening environments. The layout maintains negative space for quiet reflection, ensuring emotional balance within the chaos.</desc>
