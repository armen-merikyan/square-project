<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Signals</title>
  <desc id="desc">This piece explores the emotional tension between emptiness and desire, using a palette of muted tones that embody 'broken memory.' The contrast lies in the jagged edges of darkness against the warmth of emerging light, echoing the narrative of a central longing disturbed by surrounding desolation. The flow radiates outward, evoking a heartbeat that disturbs the stillness, while broken pixels introduce imperfection, enhancing the emotional weight of both warmth and coolness in the arrangement.</desc>
