<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">The emotional tone explores the tension between love and betrayal, represented through the palette of warm pink and deep maroon against muted grays. The outer edges reflect the heavier feelings of betrayal in darker tones, while the core embraces noise patterns of love in lighter shades. A mix of structured noise and warped patterns suggests a collision of emotions—soft visuals interrupted by sharp contrasts. The layout mirrors this duality, with a defined edge causing an intentional dissonance that invites the viewer to explore the balance between pressure and release.</desc>
