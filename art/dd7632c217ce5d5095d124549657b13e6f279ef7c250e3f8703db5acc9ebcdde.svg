<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tidal Echoes</title>
  <desc id="desc">This composition reflects a tension between quietness and pressure through the juxtaposition of dense pixels in dark navy against softened fields of understated peach and gray. The dense 'island' of dark colors captures the weight of pressure, while the lighter colors flow around it, suggesting clarity and confusion. The collision occurs at the center where darker tones break against lighter hues, creating a dynamic conversation between the two emotional states—harmony amidst discord.</desc>
