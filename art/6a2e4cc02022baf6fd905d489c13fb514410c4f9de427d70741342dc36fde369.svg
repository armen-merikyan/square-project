<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece expresses the emotional tension between safety and exposure through a palette that juxtaposes warmer, sheltering colors against cooler, more vulnerable shades. The bright cluster on the left, representing exposure, contrasts against the muted dark tones on the right, symbolizing safety. An asymmetric flow is created, with strong color collisions that echo the tension crafted by the seed's themes of pressure and release. The broken pixels add intentional disruptions, emphasizing the fragility of the exposed areas and echoing memories of past experiences.</desc>
