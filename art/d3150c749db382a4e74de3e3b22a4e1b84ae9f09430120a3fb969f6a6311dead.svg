<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Amidst Static</title>
  <desc id="desc">The artwork embodies the emotional struggle between clarity and chaos, reflecting the seed's themes of 'signal vs noise' and 'memory vs erasure'. The palette combines vibrant 'signal green' and 'hot magenta' as sharp accents amidst deep 'dead black' and 'static gray', symbolizing interference and readability. The main collision occurs off-center, representing the attempt to establish a coherent rhythm against the backdrop of scattered noise. This tension is accentuated by broken pixels that create intentional disruptions, mirroring the unpredictability of memory and clarity.</desc>
