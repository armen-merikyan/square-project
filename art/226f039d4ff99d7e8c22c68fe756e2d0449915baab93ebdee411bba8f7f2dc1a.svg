<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Order and Chaos</title>
  <desc id="desc">This piece embodies the emotional tension of rage and calm through a juxtaposition of sharp reds and cooler blues. The palette reflects this dichotomy, with black representing deep calmness contrasting against the explosive heat of red. The arrangement emphasizes a spiral clockwise flow, symbolizing the way chaos (sharp, jagged patterns) breaks down the calm (horizontal, soft bands), suggesting a narrative of intrusion and disruption. Broken pixels introduce imperfection, enhancing the emotional theme of collision between states of being.</desc>
