  <title id="title">Tectonic Tension</title>
  <desc id="desc">This artwork explores the emotional tone of tension and release through a stark juxtaposition of warm and cool colors. The palette includes deep blues and vibrant oranges to illustrate emotional collisions. The top half features cooler colors that feel quiet and expansive, while the bottom introduces warm hues that suggest intensity and pressure. The main contrast occurs diagonally, where deep blues collide with bright oranges, symbolizing the push and pull of contrasting feelings.</desc>
