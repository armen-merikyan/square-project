<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Contrast</title>
  <desc id="desc">This piece explores the emotional dichotomy of emptiness and desire through a structured yet chaotic arrangement of colors. The contrasting palette of deep navy and black represents the weight of emptiness, while hints of dim cyan bridge the gap toward a warm longing for connection. The left side embodies a grid-like emptiness, symbolizing order, while the right side's target-like bursts represent chaotic desire, with broken pixels offering a nod to the imperfections of these feelings. The flow from left to right reflects a journey, encapsulating the ongoing struggle between these emotional states.</desc>
