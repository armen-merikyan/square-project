<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece embodies the tension between vulnerability and strength through a carefully curated palette and pattern dynamic. The dominant color is black, representing strength with a looming, stable presence along the edges. Bright accents of electric blue and magenta disrupt the monochromatic space, evoking feelings of exposure and vulnerability, suggesting a contrast with the dark, stable edges. The layout of this piece suggests an open gate, with abrupt shifts in color creating a sense of incoming force, reflecting the duality of protection and exposure. The use of broken pixels introduces intentional disruptions, symbolizing scars and layers of complexity in feelings—amplifying the themes of vulnerability versus strength.</desc>
