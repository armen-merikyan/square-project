<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Distorted Harmony</title>
  <desc id="desc">The emotional tone captures the tension between clarity and confusion, reflecting a fractured symmetry. The palette of lime, electric blue, and magenta evokes machine emotion, contrasting the dark grounding of black. The layout of falling pixels suggests a descent, while the sharp vs soft contrast plays out through thick outlines on edges with hollow centers. The piece suggests a movement from density in the center to more negative space at the edges, hinting at an unresolved emotional state. The broken pixels introduce imperfection, enhancing the sense of collision between clarity and chaos.</desc>
