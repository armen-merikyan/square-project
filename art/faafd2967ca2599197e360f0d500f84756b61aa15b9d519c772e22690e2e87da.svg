<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Stairway of Emotions</title>
  <desc id="desc">This artwork explores the tension between joy and grief, using a split composition to create a visual narrative that contrasts the vibrancy of joy with the somber nature of grief. The left half employs a warm palette of yellows and oranges representing joy framed by structured lines, evoking a sense of order and brightness. The right half employs deep blues and muted purples reflecting sadness, with broken patterns to suggest fragmentation. The hard edges create a dynamic contrast, while the stair-step layout symbolizes a journey through emotions. The arrangement manifests a push and pull between safety and threat, encapsulating the duality of experiencing profound emotions.</desc>
