  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone contrasts vulnerability and strength, reflected in the palette of deep navy and bright white. The strong, stepwell pattern creates a stable presence while thin stripes suggest lightness interspersed with fragile elements. The main collision occurs in the center, where darker colors envelop lighter ones, revealing a push-and-pull between safety and exposure. This dynamic embodies the inherent tension in the seed, translating complex emotions into an abstract form.</desc>
