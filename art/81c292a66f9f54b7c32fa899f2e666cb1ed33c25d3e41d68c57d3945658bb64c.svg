<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This artwork explores the duality of control and surrender through contrasting elements. The palette of moss green and rust symbolizes resilience and fragility, while the bone white provides a grounding quietness. The dominant hue is the deep moss green, creating a feeling of containment on one side and a lighter, more chaotic side with rust and faint stone gray representing the idea of overflow and surrender. The broken pixels introduce intentional disruptions, mirror the struggle between these two emotional states, and guide the eye dynamically across the composition. The central focus creates a tension that hints at the overflow, where the structured tide pattern of control meets the forced chaos of fault lines.</desc>
