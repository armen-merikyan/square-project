<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Quiet Collision</title>
  <desc id="desc">This piece encapsulates the emotional tension between tenderness and rage through contrasting colors and patterns. The palette features deep reds for rage, representing explosive energy and intensity, countered by soft pale blues that embody tenderness and a sense of calm. The main collision occurs diagonally across the square, where the intense reds destabilize the gentler blues, making for an engaging interplay of emotions. The broken pixels add a layer of imperfection and chaos, symbolizing the ways in which these emotional states bleed into each other, reinforcing the idea of internal conflict and the complexities of forgiveness and guilt.</desc>
