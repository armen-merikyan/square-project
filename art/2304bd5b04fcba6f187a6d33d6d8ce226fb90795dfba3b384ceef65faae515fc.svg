<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Release</title>
  <desc id="desc">The emotional tone balances control with surrender, expressing a push-pull dynamic through organized chaos. The palette consists of warm and cool tones representing intimacy and distance, with the warm shadow and cool blue making up the primary contrast. The center serves as a swelling point with denser colors, contrasted by lighter shades edging outward, suggesting an overflow from containment. The broken pixels disrupt the fluidity, creating an intentional stutter in the flow. This design embodies the collision between solid boundaries and fluid dynamics, evenly embracing both sides of the emotional spectrum.</desc>
