  <title id="title">Pressure Point</title>
  <desc id="desc">This artwork captures the emotional tension between desire and restraint. The palette, consisting of deep reds and muted creams, mirrors the push and pull of passion versus control, with warm saturated colors representing desire, and cooler muted tones embodying restraint. The main contrast occurs at the center, where bright marks surge outward, colliding with areas of quiet, contained space, symbolizing the struggle against emotional boundaries. The layout begins in the corner, with a diagonal spread that suggests an invasion of desire into the domain of restraint, creating a feeling of imbalance and unresolved tension.</desc>
