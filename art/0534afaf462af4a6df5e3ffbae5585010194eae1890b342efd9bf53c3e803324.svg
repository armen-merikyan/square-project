  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone embodies the tension between desire and restraint. The selected palette features saturated colors like hot coral and blood orange representing desire, while charcoal and hollow blue symbolize restraint. This dichotomy creates a strong contrast across the 8x8 grid. The layered patterns of stacked desire and channel-like restraint culminate in a central collision, suggesting a moment of tension that is visually engaging and compellingly abstract.</desc>
