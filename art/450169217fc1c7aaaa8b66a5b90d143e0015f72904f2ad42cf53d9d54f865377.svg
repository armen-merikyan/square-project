<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Entropy</title>
  <desc id="desc">This composition explores the tension between defiance and submission through color choice, highlighting a struggle between vibrant and muted tones. The palette consists of shelter green and warm brown as dominant colors, suggesting resilience and warmth, while pale skin adds subtle softness. The flow spirals inward, with a contrast of dense clusters (defiance) at the center against quieter spaces that suggest softness and yielding (submission) at the edges. The main collision occurs centrally, where broken pixels interrupt the flow, manifesting the aspect of emotional scars. This grid aims to capture the dissonance and resolution within the abstract narrative.</desc>
