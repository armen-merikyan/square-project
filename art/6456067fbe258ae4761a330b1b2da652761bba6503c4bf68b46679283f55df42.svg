<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone stems from the contrast between the soft vulnerability of an exposed center and the robust strength of a protective frame. I chose a palette that mixes warm and cool tones to create intimacy against distance: the warmth of rose clay and lamp gold clashes with the cooler distant lilac and cool blue, representing the interplay between strength and vulnerability. The collision occurs in a diagonal sweep from the top left to the bottom right, creating a visual tension that embodies the theme of broken mirrors and constellations. Broken pixels scatter around, symbolizing imperfections in strength, while the overall structure maintains a central empty space, emphasizing exposure.</desc>
