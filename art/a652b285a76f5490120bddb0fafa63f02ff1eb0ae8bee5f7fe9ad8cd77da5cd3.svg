<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This composition reflects the tension between nostalgia and progress through a split layout, capturing the emotional struggle of past warmth versus the coldness of advancement. The palette combines bright yellows and muted purples, symbolizing the contrast between joy and grief. The upper region is filled with broken dot patterns depicting the past's fragmented memories, while the lower half features a dense crosshatch representing the relentless nature of progress, creating a visual collision that evokes feelings of both comfort and discontent. The intentional 'drip' flow adds to the sense of gradual movement and change.</desc>
