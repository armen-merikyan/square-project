<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone revolves around the dichotomy of desire and restraint, portrayed through a palette of warm and cool interactions. The saturation of hot coral and blood orange represents the intense pull of desire, while the muted presence of charcoal and hollow blue symbolizes restraint. The main collision occurs in the center where the vibrant barcode pattern of desire collides with the braided restraint pattern, creating a dynamic tension across the square. The broken pixels introduce imperfections, emphasizing the struggle between expansion and confinement.</desc>
