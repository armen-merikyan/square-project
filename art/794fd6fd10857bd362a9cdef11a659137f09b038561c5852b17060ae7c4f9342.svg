<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This artwork captures the duality of Joy and Grief through color contrast and pattern density. Utilizing a palette of yellow and orange for warmth (representing joy) and deep blue and muted purple for heaviness (representing grief), the central area is lightened with bright tones to symbolize hope, while edges embody shadows of sorrow. The flow from right to left emphasizes grief's pull, interspersed with grid-like, organized joy—a stark contrast to broken dots representing grief, creating a visual echo of emotional tension. There are intentional broken pixels for imperfection, enhancing the narrative of love betrayed and hope disrupted.</desc>
