<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Control and Surrender</title>
  <desc id="desc">This piece embodies the emotional tension between control and surrender through a juxtaposition of structured and fluid patterns. The palette of clean white, ice blue, ink black, violet gray, and warning orange creates a vivid contrast that evokes a sense of pressure surrounding a softer, more yielding center. The patterned clash of fault lines and pulse marks symbolizes the push and pull of conflicting emotions. Central collision is felt as thick outlines of containment battle against the softer pulse at the heart of the artwork, establishing a landscape of emotional flux.</desc>
