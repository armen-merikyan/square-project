<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition balances the emotional tones of vulnerability and strength through a carefully chosen palette that conveys warmth and coolness. The contrast between the subdued hues of hollow blue and the vibrant shades of hot coral and blood orange represents the tension between safety and exposure. The main collision occurs in the center, where brighter colors punctuate the softer tones, suggesting interrupted continuity and the fragility of strength. The scattered repair layout forms a sense of brokenness—a reflection of the mirror concept—while maintaining an open area for contemplation, drawing from the seed's essence.</desc>
