<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The artwork explores the tension between love and betrayal, utilizing a palette of warm pinks and reds against cooler greys, indicating the emotional collision. The top half (betrayal) employs a checker pattern of dark maroon and grey, representing the chaos of broken trust, while the bottom half (love) features softer, crosshatched pinks and reds, suggesting warmth and connection. The split layout features a diagonal contrast where the colors of passion encroach upon the shadows of deceit, underscoring the inherent conflict in intimacy. This piece embodies the emotional weight of the seed through asymmetrical balance, with its broken pixel elements adding depth to the narrative of imperfection.</desc>
