  <title id="title">Tension of Resting Pulse</title>
  <desc id="desc">This composition explores the emotional duality of restlessness and peace through the use of muted and bold colors that create a sense of conflict. The palette features deep blacks and muted creams to embody quiet balance juxtaposed against intense red and orange accents that symbolize emotional unrest. The primary contrast occurs in the center, where the 'teeth' pattern of restlessness collides with the softer 'target' patterns of peace, reflecting how memories intersect with motion. The arrangement fosters a sense of tension at the crossing point, while the broken pixels introduce intentional imperfections, echoing the flawed nature of memory against a backdrop of calm.</desc>
