<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetrical Fracture</title>
  <desc id="desc">This composition conveys the emotional tension between love and betrayal through contrasting warm and cool tones. The palette of pinks and dark maroon represents love’s warmth, while the grayscale elements symbolize betrayal’s cold intrusion. The collision of warm colors at the center suggests intimacy, while sharp edges emanating outwards introduce an unsettling break, embodying the ‘broken edges’ concept. The asymmetrical placement of colors suggests an ‘empty room’ filled with tension, enhancing the emotional narrative of inner conflict and the feeling of being overwhelmed. The interplay of density in the central colors and the surrounding empty space creates a rhythm between connection and isolation, portraying an abstract story of love interrupted by doubt.</desc>
