<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This piece conveys the emotional tension between defiance and submission. The chosen palette evokes urgency (alarm_red) and serenity (pale_aqua), creating a dynamic interplay. The contrast is most evident near the center, where bright colors clash against soft, muted tones, embodying the push and pull of emotions. The structure is eroded symmetrically, suggesting a constant battle between rigidity and fluidity, a spiral inward accentuating the distance between hard edges and soft collapse.</desc>
