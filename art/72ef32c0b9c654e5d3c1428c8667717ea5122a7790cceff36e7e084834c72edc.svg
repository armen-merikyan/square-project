<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Desire and Restraint</title>
  <desc id="desc">This composition embodies the emotional tension of desire versus restraint through a dynamic use of color. The palette, featuring saturated reds and muted creams, reflects the intensity of desire and the calming nature of restraint. The stronger reds invade the left corner, creating a bright halo effect, while the muted colors form a structured grid pattern resisting this invasion. The collision occurs prominently in the center, where bright accents disrupt the calm, symbolizing the struggle between the two emotions. The sealed edges contribute to a feeling of containment, while broken pixels add disruptions that suggest moments of tension and release.</desc>
