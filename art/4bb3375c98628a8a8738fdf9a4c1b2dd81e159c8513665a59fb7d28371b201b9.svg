<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Asymmetric Pulse</title>
  <desc id="desc">This artwork embodies the tension between joy and grief, balancing bright warmth against deep blues. The upper rows represent joy with a radial pattern in yellows and oranges, signifying expansion and spark-like energy. The lower rows reflect grief through muted purples and deep blues, suggesting a weighty, radial descent. The hard edges introduce a feeling of abrupt change, mirroring disruption. The balance shifts between dense joyful colors and the emptiness of grief, with occasional interruptions creating a dynamic rhythm, highlighting the emotional narrative drawn from the seed's exploration of conflicting feelings.</desc>
