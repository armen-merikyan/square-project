<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Control and Surrender</title>
  <desc id="desc">This composition reflects the emotional tension between control and surrender. The palette of stain brown, ash gray, warm ivory, soft gold, and deep wine creates a narrative of conflict and resolution, where warm tones denote a sense of surrender and cool tones represent control. The main collision occurs at the center, where the barcode pattern of surrender overlaps with the quiet field of control, signifying a struggle. The use of broken pixels introduces imperfections, reflecting the chaotic nature of this balance. Overall, the layout spirals outward from a point of tension, suggesting dynamic movement and emotional fluctuations.</desc>
