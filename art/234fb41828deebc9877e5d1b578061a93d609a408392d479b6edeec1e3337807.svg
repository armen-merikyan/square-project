  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects a tension between vulnerability and strength, with the palette chosen to embody this duality. Darker colors symbolize strength while muted tones suggest vulnerability. The primary collision occurs in the center, where dense black marks meet softer cream dots, creating a visual clash that mirrors the emotional fight of exposure against protection. The edge style furthers this with a halo border, implying the fragility yet tenacity of the inner space, suggesting both safety in exposure and the threat of breaking.</desc>
