<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Pulse</title>
  <desc id="desc">This piece explores the emotional tension between clarity and distortion, represented through a layered structure of darker colors to signify noise and brighter hues for signal. The dominant navy and black establish a quiet density, allowing the lighter dim cyan to emerge as a limited but impactful signal in the midst of overwhelming static. Broken pixels disrupt the pattern, reflecting moments of interference and chaos. The scattered repair layout aligns with the theme of maintaining a clear path through turbulent emotions, evoking a sense of both isolation and resilience.</desc>
