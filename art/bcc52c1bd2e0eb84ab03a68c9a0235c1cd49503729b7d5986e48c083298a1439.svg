<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shattered Resilience</title>
  <desc id="desc">This piece embodies the emotional tension between vulnerability and strength through contrasting colors and patterns. The palette of burnt orange and dark red represents strength with its warmth and intensity, while charcoal and gold introduce a sense of softness and fragility, underpinning a vulnerable core. The arrangement features a chaotic fall of colors, creating a sense of disturbance against a stable center. Dominated by strong colors, they collide against soft, pale areas, suggesting the fight between exposure and protection. This collision happens primarily from the top down, echoing a slow descent to ground the piece.</desc>
