  <title id="title">Rise and Fall of Emotions</title>
  <desc id="desc">This composition reflects the tension between joy and grief through an upward and downward flow. The palette balances bright yellows and oranges symbolizing joy with muted blues and purples representing grief. The collision occurs in the central rows where bright colors disrupt the darker tones, creating an emotional push-pull. The broken pixels introduce imperfection, echoing the chaotic nature of emotions.</desc>
