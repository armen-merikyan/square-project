<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Pulse</title>
  <desc id="desc">The emotional tone revolves around the tension between clarity and chaos, reflected in the choices of a vibrant, electric palette against deep, muted bases. The 'signal' represented by bright green and electric blue imparts a sense of urgency amidst the 'noise' of static gray and dead black, emphasizing the struggle of clear communication in an overwhelming environment. The dominant green (representing signal) occupies the central and left sections, while moments of interruption occur in the right sections with magenta accents, creating collision points. This arrangement visually navigates the themes of exposure versus shelter, conveying a quiet confrontation with chaotic external influences.</desc>
