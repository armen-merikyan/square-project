<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Balance</title>
  <desc id="desc">This artwork embodies the dichotomy of confusion and clarity through a split layout. The top half uses a pattern of geometric precision with sharp contrasts in dark and light colors (navy, dim cyan, white), symbolizing clarity against a backdrop of broken pixels. The bottom half contrasts with the soft, overlapping composition of muted greys and deep blacks, representing confusion. The emotional tension arises where these two halves collide—a sharp outline framing the softer chaos. The palette, chosen from the lonely_signal theme, expresses isolation yet intensity, allowing the viewer to navigate the emotional layers.</desc>
