<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Tranquility</title>
  <desc id="desc">This piece explores the emotional juxtaposition of restlessness and peace. The palette combines warm oranges and yellows to evoke comfort against the deep blues and muted purples representing uncertainty and chaos. The pattern of lattice contrasts with channels, creating a visual tension where bright colors intersperse with darker, muted shades. The layout features a bright cluster off-center that draws the eye, emulating a last light amidst a surrounding dimness, symbolizing hope amid uncertainty. Broken pixels represent imperfections, enhancing the sense of an ongoing struggle between tranquility and disturbance.</desc>
