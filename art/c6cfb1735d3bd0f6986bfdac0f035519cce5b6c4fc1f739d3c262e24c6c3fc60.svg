<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Tension</title>
  <desc id="desc">The emotional tone contrasts the explosive energy of rage with the softness of tenderness, creating a visual tension. The palette combines saturated red and muted blues, embodying the heat of anger and calm of forgiveness. The dominant dark mass (#000000) simulates rage while lighter hues of pale blue and white pierce through, suggesting moments of tenderness and hope amidst the turmoil. The central collision occurs at the center of the square, where intense colors interact chaotically, representing the struggle between emotions. Patterns of 'veil' and 'broken frame' echo both the overwhelming density of rage and the gentle interruptions of tenderness, maintained through broken pixels creating a dynamic, imperfect flow throughout the piece.</desc>
