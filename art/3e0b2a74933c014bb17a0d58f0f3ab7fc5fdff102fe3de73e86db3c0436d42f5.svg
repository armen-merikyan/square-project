<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Forms</title>
  <desc id="desc">This composition captures the emotional dichotomy of defiance and submission through strong contrasting colors and patterns. The palette blends bright yellows and greens that signify defiance (target) against softer, muted fields of cream and deep olive that express submission (teeth). The center of the square is more densely filled with angular resistance, while the edges embody softness and gradual collapse. The edge style provides hard boundaries, creating a visual fray at the intersection of these emotional layers, evoking a sense of collision. The arrangement reflects an inward spiral towards the core, suggesting a protective yet invasive narrative, aligning with the seed's themes of conflict and surrender.</desc>
