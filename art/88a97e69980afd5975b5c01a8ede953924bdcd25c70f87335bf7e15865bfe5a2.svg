  <title id="title">Tension and Resolution</title>
  <desc id="desc">This artwork captures the emotional tension between 'longing' and 'resolve' using a palette of green tones symbolizing growth and transformation against warm golds representing warmth and yearning. The overfilled corner expresses overflowing emotion, while the quiet fields create distance, indexing the idea of broken connections. The patterns of checker and shatter visually collide, illustrating the interplay between unfinished desires and fixed determination, creating a dynamic but disordered rhythm throughout the grid.</desc>
