<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This composition captures the emotional struggle between fear and hope by contrasting deep, dark hues with illuminated, soft tones. The choice of black and dark violet conveys a sense of fear and weight, while the soft gold and pale green evoke feelings of hope and lightness. The layout embraces a split vertical pattern to emphasize the duality between these emotions. Each pixel contributes to a sense of fragmentation, as there are broken elements (dots for fear and a split-screen for hope), creating an echo of pressure and release. The luminous edges symbolize the 'glowing edges' mentioned in the seed, allowing light to break through the surrounding darkness.</desc>
