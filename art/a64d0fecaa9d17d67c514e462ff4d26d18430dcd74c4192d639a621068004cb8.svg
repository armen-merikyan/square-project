<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Connection</title>
  <desc id="desc">This composition explores the duality of loneliness and connection through contrasting colors and structures. The palette of black, dark violet, soft gold, and pale green reflects a struggle between warmth and isolation. Central soft gold echoes hope and connection amidst a maze of darker colors representing loneliness. The zigzag flow suggests a pulse between the two emotional states. Broken pixels throughout create an imperfect sense of connection and openness, enhancing the hidden vs. exposed themes of the seed, while negative space fosters a sense of loneliness.</desc>
