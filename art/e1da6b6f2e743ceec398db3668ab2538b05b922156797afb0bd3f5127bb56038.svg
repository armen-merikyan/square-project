<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone of this artwork embodies resilience and fragility, reflecting the tension between the spark of life and the weight of ashes. The palette—comprised of sepia, tan, dust gray, and faded blue—captures soft residues of ash in warm tones while sparking vibrancy and dynamic light in cooler shades. The arrangement bars against emotional cadence creates a confrontational visual where darker ash tones dominate (63%) but are sharply interrupted by scattered light (37%). This forms a sense of movement from the bottom left to the top right, reflecting the upward and downward motions in the dual pulse layout, symbolizing contrasting emotions that resonate through memory and erasure, creating a jagged yet rhythmic pattern across the grid.</desc>
