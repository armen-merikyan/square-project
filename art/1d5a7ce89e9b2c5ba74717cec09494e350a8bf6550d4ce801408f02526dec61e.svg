<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inner Fracture</title>
  <desc id="desc">This artwork embodies the tension between defiance and submission, represented through the dynamic interplay of sharp contrasts and subdued fields. The palette, featuring shades of pink, red, gray, and dark maroon, evokes a sense of emotional upheaval—warm colors suggesting defiance, while the cooler grays signify submission. The core collision occurs in the center, where vivid disruptions (represented by brighter hues) intersect with a surrounding veil of muted tones, mirroring the concept of a protected or attacked center. This duality creates a visually compelling ascent from the bottom to the top, reflecting hope amidst chaos. The broken pixels are scattered throughout, forming intentional disruptions that underscore the fragmented struggle inherent in the emotional narrative.</desc>
