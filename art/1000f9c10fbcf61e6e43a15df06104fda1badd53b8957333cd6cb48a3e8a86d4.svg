<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Channels</title>
  <desc id="desc">This composition reflects the emotional tension between defiance and submission, depicted through the collision of dark and dim colors. The palette of navy and black juxtaposes with the dim cyan and white, creating a visual echo of struggle and softness. The central area, marked by a denser arrangement of broken dots in dark shades, represents defiance, while lighter, softer dotted patterns in the upper corner symbolize submission. The flow is diagonal, suggesting a rise from quiet submission to bold defiance. Broken pixels interrupt the smoothness, symbolizing resistance against conformist tendencies.</desc>
