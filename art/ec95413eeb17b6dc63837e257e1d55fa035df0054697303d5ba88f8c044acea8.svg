<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone explores the juxtaposition of vulnerability and strength, with a predominantly dark palette accented by lighter hues to illustrate contrasts between tension and release. The colors chosen reflect a sense of awe and terror, creating a dynamic interplay between a dense foundation of dark tones and lighter, more fragile accents. The main collision occurs centrally, where softer pastels interrupt the darker, more structured areas, suggesting moments of exposure amidst a protective framework. This layout embodies the spiral pressure, drawing the viewer's eye toward a faint point of vulnerability at the center, thereby reinforcing the theme of strength in the face of fragility.</desc>
