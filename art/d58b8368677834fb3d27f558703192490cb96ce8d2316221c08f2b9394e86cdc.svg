  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork embodies the tension between desire and emptiness, portrayed through a palette that mixes warm, saturated colors with muted, dark tones. The contrast lies in the brighter central cluster of warm hues, suggesting an active desire, while the surrounding darkness represents the vast emptiness. The pattern combines broken dots for the warmer emotions, colliding with a noise texture that signifies restraint, creating a rich interplay that draws the eye across the square while leaving significant negative space to enhance the feeling of stillness at the borders.</desc>
