<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inside vs Outside</title>
  <desc id="desc">The artwork explores the emotional tension between joy and grief, using a yellow and orange palette to signify joy, contrasting with deep blues and muted purples that reflect grief. The left side represents joy through warm, radiating patterns, while the right side depicts the heavy, fragmented nature of grief. The colors collide at the center, where the interactions create an area of tension, breaking the symmetry yet binding the emotions. This abstract composition emphasizes the push-pull dynamic of these feelings through the grid layout and alternating patterns, invoking a feeling of pulsating life amid stillness and fragmentation.</desc>
