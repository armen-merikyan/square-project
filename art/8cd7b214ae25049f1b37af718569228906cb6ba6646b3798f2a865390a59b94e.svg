<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This composition expresses a dynamic tension between restlessness and peace. The black and deep red signify pressure, capturing the restless pulse of existence, while pale blue and white provide soothing moments, representing peace. The chosen palette explores the contrast of intensity and calm, wherein the bright red flashes through the black, akin to a flame cutting through darkness. The central collision occurs towards the center, embodying a swirling motion that both interrupts and harmonizes with more gentle areas. The structured yet chaotic placement of broken dots in the restlessness pattern collide against a tide-like rhythm of peace, creating a dialogue of emotion, driven by the shape seed of 'pillar' interpreted via these abstract qualities.</desc>
