<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Contrasts</title>
  <desc id="desc">This composition explores the emotional tension between calmness and agitation, using a palette that speaks of both fear (dark colors) and hope (soft gold and pale tones). The arrangement of dark violet and black creates a sense of unrest, while the soft gold and pale green act as light-filled patches of peace. The main collision occurs diagonally, where the 'stripes' of restlessness intersect with the 'tide' of peace, creating a visual rhythm that suggests a stuttering pulse amidst a quiet field. The layout emphasizes two centers of tension moving through a shared negative space, reinforcing the emotional push and pull of memory against motion.</desc>
