<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Hope and Fear</title>
  <desc id="desc">This artwork captures the emotional interplay between fear and hope, as suggested by the seed. The palette of black, dark violet, soft gold, and pale green represents these contrasting feelings — the dark tones embody fear while the lighter shades evoke hope. The left side, filled with a grid pattern of dark colors, symbolizes fear through a dense and rigid structure, while the right side features a flame-like pattern of soft gold and pale green that releases into a feeling of lightness and warmth. The jagged edges and split vertical layout create a tension between the two emotional states, embodying collisions that arise from pressure and the resultant release. The negative space helps to emphasize the impacts of both emotions, reflecting the quiet amidst chaos.</desc>
