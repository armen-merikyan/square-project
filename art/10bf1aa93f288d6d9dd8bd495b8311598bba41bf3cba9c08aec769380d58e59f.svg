  <title id="title">Tension of Emotion</title>
  <desc id="desc">This artwork embodies the emotional duality of love and betrayal, where warmth and coolness collide. The palette draws from soft pinks and deep maroons to evoke love's embrace against betrayal's sharp edges. The upward flow symbolizes hope and disconnection, while the sharp contrasts emphasize conflict through intersecting lines of dark maroon and gray. The arrangement features intentional disturbances, embodying the 'burned edges' concept, which symbolizes the scars left by betrayal. Each pixel interacts to create a complex visual rhythm that tells a fragmented story of contrasting feelings.</desc>
