  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition explores the tension between desire and emptiness through a vibrant palette contrasting hot coral and blood orange against deeper charcoal and hollow blue tones. Central saturation pulls towards a corner filled with color, while the opposite side remains subdued, letting the eye linger in a vast, hollow expanse. The interplay of crosshatching and rippling patterns evokes a sense of pressure and release, symbolizing desire attempting to overflow but constrained by an invisible boundary. The presence of broken pixels introduces intentional disruptions, enhancing the theme of struggle between fullness and void.</desc>
