<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Weight</title>
  <desc id="desc">This piece embodies the emotional conflict of envy and gratitude, represented through a duality of light and heavy tones. The palette comprises a range of pinks and grays, symbolizing fleeting warmth versus the weight of darkness. The zigzag flow is emphasized by an interplay of brighter and dimmer sections, disrupting the symmetry and mirroring outlined in the layout. The arrangement forms stairs that symbolize movement and progression against a backdrop of noise, addressing the struggle between opposing emotional states while allowing negative space for breathing room. The broken pixels introduce imperfection, mirroring the idea of 'mirror_broken', enhancing the tension without overwhelming clarity.</desc>
