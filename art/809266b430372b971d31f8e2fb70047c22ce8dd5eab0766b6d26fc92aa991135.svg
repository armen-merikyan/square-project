<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Stillness</title>
  <desc id="desc">This artwork captures the emotional contrast between pressure and quiet through a careful arrangement of colors and patterns. The palette combines muted tones of off-white, dust gray, and faint peach to represent quietness, while compressed red and dark navy introduce an element of pressure. The main collision occurs along the diagonal, where the glitch-like patterns of pressure disrupt the softer stripes of quiet, creating a tension that feels both unresolved and full of potential. The placement of glitch patterns on one side gradually recedes into the quieter, open space on the opposite side, suggesting a flow from density to freedom, aligning with the seed's themes of pressure and release.</desc>
