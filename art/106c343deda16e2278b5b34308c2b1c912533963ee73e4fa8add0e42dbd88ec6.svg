<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Amidst Static</title>
  <desc id="desc">This artwork captures the emotional contrast of signal versus noise through a split layout. The top half utilizes brighter colors like signal green and electric blue to represent clarity and focus, while the bottom half employs a darker palette, including static gray and dead black, to convey chaos and confusion. The glowing edges act as a transition between the two sections, where the collision of the bright signal path interrupts the dark static, symbolizing moments of clarity in confusion. The pattern is designed to evoke a readable pulse, contrasting sharply against the dense noise below, embodying the tension between clarity and disruption.</desc>
