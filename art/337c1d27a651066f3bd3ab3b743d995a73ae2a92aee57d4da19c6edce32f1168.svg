<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs. Chaos</title>
  <desc id="desc">This composition embodies the emotional dichotomy of trust and suspicion through contrasting patterns and colors. The palette features muted tones like 'blackened_plum' and 'muted_cream' symbolizing stability and fragility, while vibrant 'small_orange' introduces tension. The left side, filled with distinct 'dots', signifies trust, while the irregular 'shatter' pattern on the right interrupts the field, embodying suspicion. The central collision represents a conflict between assurance and doubt, effectively utilizing broken pixels to enhance the narrative of imperfection and tension throughout the piece.</desc>
