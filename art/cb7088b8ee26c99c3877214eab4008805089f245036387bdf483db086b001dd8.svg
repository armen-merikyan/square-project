<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tension of panic contrasted with the stability of control is expressed through a palette that evokes a sense of ancient warmth. The burnt orange and dark red signify the chaos and underlying fear of panic, while charcoal provides a grounding stability. Gold appears as a spark in the pattern, representing moments of clarity or hope amidst the turmoil. The layout is designed to ascend, suggesting a rising signal of hope against the weight of anxiety. Broken pixels introduce imperfections, complementing the theme of 'stable vs unstable,' reinforcing the narrative of push and pull between feelings of control and chaos.</desc>
