  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone of this piece contrasts the vulnerability of a pale center against a robust, dark border that represents strength. The palette includes warm tones of coral and orange, symbolizing desire and energy, alongside cool shades of charcoal and blue, reflecting emptiness and calmness. The primary collision occurs at the grid's center, where the pressure band pattern meets the denser crosshatch, illustrating the tension between exposure and shelter. This arrangement visually narrates a struggle, creating layers of emotional complexity.</desc>
