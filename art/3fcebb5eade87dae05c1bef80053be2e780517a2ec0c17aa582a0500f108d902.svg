  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone of this composition reflects the struggle between desire and emptiness. The palette of warm coral and orange suggests hunger while the charcoal and hollow blue represent calm restraint. The contrast predominantly occupies the bottom half of the square, illustrating an emerging tension where desire reaches upwards yet collides with the boundaries of containment. Broken pixels randomly disrupt the fluidity of the warm patterns, evoking the imperfections of longing that prevent full satisfaction. The layout begins at the corner and exhibits a diagonal spread, mirroring the narrative of conflict and yearning.</desc>
