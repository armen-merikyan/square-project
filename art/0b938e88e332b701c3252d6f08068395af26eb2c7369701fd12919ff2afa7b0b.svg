<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center of Tension</title>
  <desc id="desc">The pixel arrangement reflects the emotional duality of fear and hope. The central pixels glow with a soft gold (#D8B70A), representing hope, while the darker edges evoke fear through deep blacks and dark violets. The contrast between the glowing center and dark edges creates tension, while the crack and broken dots patterns express the struggle between the two emotions. This abstract representation is about feeling the pull of hope against the weight of fear in a fragmented world.</desc>
