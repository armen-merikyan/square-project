<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">The composition expresses an emotional tug-of-war between calm and rage. The palette incorporates deep reds as a nod to rage contrasted against soft pale blues to symbolize calmness. The chaotic noise from red pixels collides with organized horizontal patterns in blue, creating a visual tension. The layout reflects a center that is heavy with darker tones leading outwards to lighter, calmer hues, representing the crack against the mirror, with the dominant darker area pressing up against the lighter area, suggestive of expansion and release.</desc>
