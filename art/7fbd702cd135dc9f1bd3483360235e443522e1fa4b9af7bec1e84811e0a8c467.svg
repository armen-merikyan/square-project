<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Waves of Tension</title>
  <desc id="desc">The emotional tone is driven by the push-pull of clarity (certainty) against the unknown (curiosity). The 'fear_hope' palette serves to hold this duality, with dark violet and black representing the weight of certainty, while soft gold and pale green evoke curiosity and warmth. The main collision occurs in the center where dense, barcode-like patterns of black and violet clash with the checker-patterned soft gold and pale green, creating a dynamic interaction that feels both protective and exploratory. This abstract composition mirrors the rising signal of curiosity that disrupts the boundaries typified by certainty, leading to a sense of unresolved tension.</desc>
