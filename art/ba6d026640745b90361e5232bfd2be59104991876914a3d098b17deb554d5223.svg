<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Shelters</title>
  <desc id="desc">This piece embodies the interplay of vulnerability and strength through a carefully curated palette that balances muted tones with bright accents. The dense, darker colors suggest strength and rootedness, while the lighter, softer hues evoke a sense of fragility and exposure. The central collision, where darker colors meet a pale field, represents the tension between protection and vulnerability. The 'wound' shape seed manifests as a spiral pressure of dense blocks distorting lightness, creating a dynamic flow that is both chaotic and harmonious, symbolizing the struggle between shelter and exposure.</desc>
