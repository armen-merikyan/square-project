<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light and Weight</title>
  <desc id="desc">The emotional tone is established through the contrast between the warmth of sparks and the coolness of ash. Utilizing a palette that juxtaposes shelter green and warm brown against pale skin, cold white, and open blue creates a dynamic interplay of safety and exposure. The main collision occurs at the center where dense 'spark' colors disrupt the softer 'ash' hues, symbolizing tension between energy and exhaustion. The chosen patterns of maze and fault line highlight this confrontation while intentional broken pixels introduce imperfections that reflect real emotional experiences.</desc>
