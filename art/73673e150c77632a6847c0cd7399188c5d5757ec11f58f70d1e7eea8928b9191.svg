<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetrical Disarray</title>
  <desc id="desc">This composition reflects the emotional tension between confusion and clarity through a stark contrast of muted grays and red accents. The choice of a 'love_betrayal' palette gives weight to the emotional pull, with gray representing confusion and dark maroon signifying clarity. The density of color in the center collides with more open spaces, emulating a pulse of unresolved tension. Broken pixels are introduced at random positions to emphasize disorder, while areas of negative space prevail to convey the idea of calm amidst chaos—achieving a rhythm of collision. The pattern is intentionally asymmetrical, allowing one side to shout while the other whispers.</desc>
