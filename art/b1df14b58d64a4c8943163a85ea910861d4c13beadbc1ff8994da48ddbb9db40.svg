<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This artwork embodies the contrast between the emotional states of longing and resolve. The palette, consisting of burnt orange, dark red, charcoal, and gold, evokes warmth and urgency mirroring the tension between desire and determination. The arrangement features a diagonal argument, with longing expressed through a patchwork of faded warmth filling the lower corner while resolve appears more structured and defined at the upper edge. Out of the intended 64 cells, the broken pixels punctuate the flow, creating points of disruption that enhance the narrative of repair and damage, while the overall breathable negative space invites contemplation. The collision point is centralized, leading the viewer’s eye across the canvas in a wave-like rhythm, voicing both serenity and urgency in this abstract emotional landscape.</desc>
