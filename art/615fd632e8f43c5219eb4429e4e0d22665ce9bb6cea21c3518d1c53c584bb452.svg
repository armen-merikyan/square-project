<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger for Restraint</title>
  <desc id="desc">The composition reflects a stark emotional tone of longing and constraint, representing 'emptiness' through muted colors and open spaces while 'desire' is depicted by the vibrant saturation of contrasting hues. The main collision occurs towards the upper corner, where saturated colors densely cluster, representing desire pushing against the restricting muted backdrop of emptiness, creating tension and a feeling of overflow. The chosen palette of hot coral, blood orange, and charcoal helps establish a heat of yearning against the coolness of hollow blue, mirroring the push-pull dynamic of desire vs. containment.</desc>
