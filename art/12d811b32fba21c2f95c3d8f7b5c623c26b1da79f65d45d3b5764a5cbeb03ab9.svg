<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tension</title>
  <desc id="desc">The emotional tone of this piece is centered around the push and pull of desire versus restraint. The palette, derived from the colors 'red_oxide', 'blackened_plum', 'muted_cream', 'iron_gray', and 'small_orange', reflects both the warmth of desire and the coolness of restraint. The contrast features saturated colors that seek to overflow boundaries while muted tones provide a lower pressure containment. The collision occurs mainly in the center where vibrant red and orange disrupt the gray and cream backdrop, symbolizing the struggle between freedom and restraint. This layering captures a dynamic flow upward, suggesting hope amidst tension, embodying the concept of a veil trying to rise.</desc>
