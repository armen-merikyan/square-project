<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Tension</title>
  <desc id="desc">This abstract artwork embodies the emotional duality of panic and control, contrasting a structured upper region with a more chaotic lower half. The 'broken memory' color palette evokes nostalgia and disquiet, with warm sepia and tan grounding the piece alongside cool faded blue and dust gray hues. The central conflict is expressed through a rhythmic interplay of horizontal stripes (control) and crosshatch patterns (panic), while 'broken pixels' randomly disrupt the expected flows, creating depth and tension. As the viewer's eye moves through the composition, they experience interconnected tension and release, mirroring the emotional journey from control to instability.</desc>
