<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tide of Certainty</title>
  <desc id="desc">This piece embodies the push and pull between certainty and curiosity through its color choices. The moss green and bone white represent grounded certainty, while rust and small gold serve as sparks of curiosity amidst a sea of calm gray representing chaos. The arrangement suggests an island amidst a tide, with clear delineation of 'safe' spaces and interruptions. The collision occurs in the center, where the green clumps meet the swirling rust, echoing a persistent signal amid soft noise and interference. The use of broken pixels on the edges modifies the clean lines, symbolizing the tension between order and chaos.</desc>
