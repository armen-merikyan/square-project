<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Void</title>
  <desc id="desc">This piece explores the emotional tension between quietude and pressure, utilizing a palette that balances muted tones with intense accents. The dark navy (#1A1A4B) symbolizes depth and pressure, while faint peach (#FFEDD5) embodies quiet softness. The dominant cluster of dark colors in the left half of the grid represents tension, while the lighter colors emerge from the center, suggesting a release into clarity. The deliberate use of broken pixels represents shatters in the pattern, introducing echoes of confusion amidst clarity, reinforcing the theme of collision and flow.</desc>
