<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Struggle of Forces</title>
  <desc id="desc">This artwork captures the emotional conflict between defiance and submission, paralleled through a structured yet chaotic layout. The left side (defiance) uses a dot pattern in deeper hues to reflect a pulse of resistance, while the submission side balances with a grid of lighter shades that denote weightlessness. The chosen palette of dark navy and contrasting whites symbolizes the tension between strength and fragility, with broken pixels introducing imperfection that echoes the turmoil of love and betrayal. The flow from left to right, amidst a bottom-heavy focus, brings forth a sense of movement from pressure to release, illustrating the journey from struggle to acceptance.</desc>
