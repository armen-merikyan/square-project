<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Color</title>
  <desc id="desc">This artwork contrasts restlessness and peace through a blend of sharp, vibrant colors and muted tones. The top half represents restlessness with a crosshatch pattern using electric blue and hot magenta, suggesting a chaotic energy, while the bottom showcases a crack pattern in more subdued tones of static gray and dead black, evoking a sense of calm. The main collision occurs where the two halves meet, accentuated with a broken pixel effect that introduces imperfections, akin to memories disrupting peace. This interplay invites the viewer to experience both the urgency of motion and the tranquility of stillness.</desc>
