<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Calm</title>
  <desc id="desc">This artwork reflects the tension between restlessness and peace, using color and placement to evoke a feeling of movement clashing with tranquility. The palette, inspired by 'awe_terror', contrasts deep indigo and black with light highlights of gold and white, symbolizing the struggle between dark thoughts and the clarity of peace. The main collision occurs diagonally across the canvas, where the fault line pattern of restlessness disrupts the calmer ladder design of peace, creating a visual narrative that mimics emotional disruption. Broken pixels embody imperfections and tensions in memory, enhancing both chaos and serenity. This interplay of solid colors interspersed with negative space promotes a sense of unresolved balance.</desc>
