<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Whispers of Collision</title>
  <desc id="desc">The emotional tone of this artwork captures the tension between longing and resolve. The chosen palette of powder pink, warm white, carbon black, steel gray, and sharp crimson reflects the softness of longing against the stern severity of resolve. The main collision occurs at the center, where dense clusters of crimson and black disrupt the warm, softer tones surrounding them, suggesting an inner struggle amidst a backdrop of calm. The broken pixel elements add intentional imperfection, evoking a sense of fractured desires and the pursuit of wholeness. This composition uses an island of warmth enveloped by a cool sea of gray to embody a complex emotional interplay.</desc>
