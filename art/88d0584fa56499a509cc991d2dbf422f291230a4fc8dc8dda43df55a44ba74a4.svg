  <title id="title">Pressure vs Release</title>
  <desc id="desc">This artwork explores the emotional tension between relief and dread. The chosen palette consists of a balance between muted storm gray and near black to represent dread, contrasted with soft sky and faded gold to signify relief. The layout features dense clusters on the right, gradually loosening to quieter spaces, echoing the shift from pressure to release. Broken pixels create intentional disruptions, enhancing the emotional narrative without literal representation.</desc>
