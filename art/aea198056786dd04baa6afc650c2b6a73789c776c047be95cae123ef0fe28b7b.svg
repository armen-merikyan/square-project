<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Intertwined Echoes</title>
  <desc id="desc">This artwork conveys the emotional tension of longing contrasted with the resolve to overcome it. Utilizing a palette of muted cream, red oxide, and iron gray, the dominant color is iron gray (approx. 60%) representing resolve, while accents of red oxide and muted cream evoke a sense of longing. The main collision occurs at the center, where dots representing longing interplay with echoes symbolizing resolve, creating a dynamic tension that visually narrates the balancing act of emotions. Broken pixels are sparsely interspersed, creating intentional disruptions to signify the imperfections of emotional experiences.</desc>
