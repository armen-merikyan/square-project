<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Reflection of Emotion</title>
  <desc id="desc">The emotional tone reflects the duality of envy and gratitude, contrasting feelings represented through a color palette of dark and vibrant shades. The left side features deeper colors (black and electric blue) to evoke the weight of envy, while the right side's lighter shades (lime and magenta) represent the uplifting emotions of gratitude. The use of broken edges and a split vertical layout embodies the tension between the two emotions, allowing for a visible division yet a coherent flow that spirals outward. The slight imbalances in pixel positioning create interruptions that further emphasize the fractured mirror concept, suggesting the chaos and beauty within conflicting feelings. The interplay among colors suggests a dynamic collision, creating an abstract narrative around emotional conflict and resolution.</desc>
