<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal in the Static</title>
  <desc id="desc">This composition contrasts the struggle between clarity and confusion, using a palette that evokes a sense of loneliness and isolation, represented by deep navy and black. The top four rows embody the 'signal' with ordered, structured elements symbolized by the barcode pattern, while the bottom four rows represent 'noise' with the chaotic stairs pattern. The main collision occurs where the two emotional states meet, creating tension in the center, accentuated by the introduction of broken pixels that serve as moments of disruption. This arrangement tells the story of a clear intention trying to emerge amidst the clutter of life, drawing a visual parallel to the seed's themes.</desc>
