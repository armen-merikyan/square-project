<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Symmetry</title>
  <desc id="desc">This piece explores the tension between clarity and confusion through a carefully structured yet disrupted grid layout. The palette of deep black, bright red, soft pale blue, and stark white reflects a contrasting emotional spectrum—where black and red embody confusion and rage, and pale blue and white symbolize clarity and calmness. The visual clash occurs in the center, where the patterns of black seem to crack through the red and pale blue, suggesting a confrontation between peace and chaos, while leaving negative space to breathe the uncertainty of emotion.</desc>
