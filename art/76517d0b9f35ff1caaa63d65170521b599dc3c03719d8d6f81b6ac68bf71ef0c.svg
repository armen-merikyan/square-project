<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Contrast</title>
  <desc id="desc">The emotional tone reflects the tension between joy and grief. The palette incorporates vibrant yellows and oranges to evoke joy and deeper blues and muted purples to represent grief. The main contrast occurs horizontally across the center, signifying the split between order and chaos. The joy section exhibits crosshatch patterns, creating a sense of expansion and lightness, while the grief side features striped patterns that hold a heaviness, suggesting loss. This duality creates a rhythm that feels both pulsating and restrained, echoing the interplay of joy and sorrow.</desc>
