<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This artwork embodies the emotional tension between control and surrender through sharp contrasts of color. The chosen palette of lime, black, electric blue, and magenta evokes a machine-like precision yet hints at a chaotic inner state. The black provides a firm boundary, echoing the idea of control, while the vibrant lime and electric blue create bursts of energy, reflecting the formidable force of surrender. The collision occurs at the center, where the colors collide, representing the duality of pressure against release in the thick outlining. The broken pixels introduce imperfections, suggesting disruptions in the flow and the complexities of both emotions, creating an intricate dance of memory and motion.</desc>
