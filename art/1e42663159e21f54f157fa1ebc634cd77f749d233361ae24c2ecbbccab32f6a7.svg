<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Fire</title>
  <desc id="desc">The artwork captures the emotional tension between resilience (spark) and fragility (ash). The palette, drawn from ancient fire tones, uses burnt orange and dark red as intense accents, punctuating the charcoal backdrop. The center is dense with these vibrant colors, representing the spark of life, while the edges in soot and shadow illustrate the lingering ash of memory. The diagonal flow creates a rhythm of collision, where fragmented frames of ember-like colors interrupt the somber field, suggesting conflicts of restraint and hunger, where one emotion dominates yet fights against encroaching stillness.</desc>
