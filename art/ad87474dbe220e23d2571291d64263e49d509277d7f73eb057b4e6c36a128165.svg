<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Dichotomy</title>
  <desc id="desc">The emotional tension between 'longing' and 'resolve' is captured through a divided palette and contrasting patterns. The warm tones of burnt orange and gold evoke a sense of warmth and desire on the left, while the darker red and charcoal represent strength and resolution on the right. The dominant color in the left half creates a feeling of density and pulse, interrupted by broken pixels symbolizing longing's imperfection. The right side is more structured, signifying a firm resolve, with sharp lattice-like patterns that clash with the softer, more fluid designs on the left. This collision creates a visual narrative of aspiration meeting stability, creating depth and resonance.</desc>
