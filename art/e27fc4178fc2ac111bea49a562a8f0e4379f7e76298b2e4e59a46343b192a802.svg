<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This composition embodies the emotional tension of desire versus emptiness through contrasts in color and structure. The palette, featuring warm hues like hot coral and blood orange, captures desire, while the cooler shades of charcoal and hollow blue create an emptiness that feels expansive yet contained. The central dense cluster of hot coral and blood orange mimics the warmth of desire, contrasting sharply with the cooler, quieter fields that surround it. This dynamic represents the push and pull between overflowing desire and the restraint imposed by emptiness. The broken pixels throughout serve as intentional interruptions, reflecting the imperfections in the pursuit of fulfillment. The arrangement retains clear negative space, allowing for a subtle pulse and rhythm within the composition, hence reflecting the complexity of longing and the duality of the narrative.</desc>
