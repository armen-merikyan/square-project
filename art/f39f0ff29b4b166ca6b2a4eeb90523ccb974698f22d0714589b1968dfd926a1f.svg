<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Layered Tension</title>
  <desc id="desc">The emotional tone contrasts 'desire' with a warm color palette against 'emptiness' using cooler, low-saturation shades. The arrangement embodies a struggle between the pulsing warmth of desire and the hollowed edges of emptiness. The top rows pulse with vibrant hues, creating a felt tension while contrasting the muted blues of the lower rows. This evokes a wave-like movement where the desire begins to surge, only to encounter the containment of emptiness along the edges. The collision is most prominent at the transition between the two emotions, creating a dynamic yet unresolved tension throughout the piece.</desc>
