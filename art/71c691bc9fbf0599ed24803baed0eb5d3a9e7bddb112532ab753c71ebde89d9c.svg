<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone captures the tension between rage (represented by sharp reds and chaotic patterns) and calm (revealed through softer blues and horizontal structures). The chosen palette emphasizes this duality, with black providing a strong contrast and white softening the harshness. The main collision occurs in the center, where red checker patterns collide with the quiet blue noise, symbolizing the struggle between chaos and tranquility. This arrangement reflects the concept of a ring (intense emotion) clashing with the quiet field (calm), eroding symmetry and creating a dynamic yet controlled composition.</desc>
