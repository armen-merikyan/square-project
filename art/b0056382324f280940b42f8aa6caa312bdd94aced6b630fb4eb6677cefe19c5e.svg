<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This abstract piece expresses the tension between vulnerability and strength. The palette features deep hues of cosmic indigo and void black representing strength, contrasted with delicate accents of star white and cold gold that evoke a sense of vulnerability. The arrangement follows a corner invasion layout with dark colors spreading diagonally, creating visual weight, while lighter colors punctuate the space, mimicking stars in a constellation against a night sky. Broken pixels are introduced to emphasize imperfection and reinforce the concept of exposed vulnerabilities. The composition invites viewers to feel both the tension and interplay of shelter and exposure, fostering a dynamic emotional landscape.</desc>
