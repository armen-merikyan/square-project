<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Yearning</title>
  <desc id="desc">This abstract artwork reflects the emotional tug-of-war between emptiness and desire, embodied by the contrasting colors and patterns. The palette combines warm pinks and reds with cooler grays, creating a dynamic visual tension. The patterned arrangement, with broken dot textures representing desire and flame patterns for emptiness, creates a sense of movement from left to right, echoing the rise and fall of emotional signals. The broken edges introduce imperfection, enhancing the feeling of loneliness in the heart fragment center. Overall, the composition expresses a complex narrative of longing, noise, and the interplay between light and shadow.</desc>
