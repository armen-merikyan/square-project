<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Beneath the Surface</title>
  <desc id="desc">This artwork illustrates the emotional tension between defiance and submission through contrasting patterns and colors. The palette combines earthy moss green and rust against the softness of bone white and stone gray, creating a visual dialogue of resilience and fragility. The main collision occurs at the center, where lattice-like structures of defiance interrupt the softer ash fields of submission, suggesting a paradoxical coexistence. The flowing layout mimics descending pixels, echoing the struggle between chaos and order. Broken pixels provide intentional disruptions, reinforcing themes of imperfection and battling tension.</desc>
