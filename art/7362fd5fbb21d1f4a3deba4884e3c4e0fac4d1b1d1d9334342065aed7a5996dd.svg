<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Points</title>
  <desc id="desc">This composition navigates the emotional spectrum of defiance and submission through contrasting colors and patterns. The palette, named 'melancholy_wonder,' reflects a sense of fragility and tension, using soft hues like lavender_gray and moon_white to represent submission and deeper tones like rain_blue and muted_plum to evoke defiance. The central area pulses with glitch-like interruptions, suggesting a tension between chaos and order, as the patterns of dots (defiance) clash against hinge-like shapes (submission). The main collision occurs in the center, where the contrasting energies engage, while the feathered edges create a gradual transition to quiet space, embodying the theme of openness versus closure. Intentional broken pixels add an element of imperfection, echoing the inherent struggle in the emotional narrative.</desc>
