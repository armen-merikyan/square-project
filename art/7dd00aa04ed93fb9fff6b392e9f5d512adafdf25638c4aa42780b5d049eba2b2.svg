<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">This piece embodies the emotional tension between joy and grief through a contrasting palette of bright yellows and muted blues. The yellow tones signify joy and light, creating a sense of upliftment, while the deep blues and purples suggest the weight of grief. The split horizontal layout captures the conflict, with brighter pixels rising on the upper half representing joy, and darker tones tumbling downward, signifying grief. The use of broken pixels adds an element of imperfection, enhancing the raw emotional impact without depicting symbols or recognizable shapes, thus maintaining pure abstraction.</desc>
