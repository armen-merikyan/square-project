<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger in Restraint</title>
  <desc id="desc">This composition explores the emotional tension between tenderness and rage through the use of sharply contrasting colors and patterns. The palette of red, black, pale blue, and white creates a visual narrative where the warmth of red and the softness of pale blue resonate with tenderness, while the starkness of black and white conveys feelings of frustration and restraint. The main contrast occurs in the central area, where noise from the sharp reds interacts with the rippling softness of the pale blue, suggesting a collision of emotional states. The falling pixel layout mirrors the idea of rain, giving a dynamic visual flow that evokes a sense of unresolved emotion, further amplified by the intentional broken pixels that disrupt the harmony, symbolizing guilt or forgiveness. Overall, the pattern reflects a push-pull tension, embodying the complexity outlined in the seed text.</desc>
