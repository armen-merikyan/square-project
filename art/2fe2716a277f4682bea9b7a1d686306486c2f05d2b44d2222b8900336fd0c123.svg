<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This piece embodies the struggle between restlessness and peace, with a diagonal flow that represents memory intersecting with motion. The palette combines the oppressive weight of dead black and static gray contrasting with the vibrancy of signal green, electric blue, and hot magenta, illustrating the push and pull of emotions. The main collision occurs at the center, unifying the tension of opposing energies while leaving breathing space at the edges—a nod to peace. Broken pixels lend a sense of chaos, echoing the narrative of shatter and flame, while maintaining an underlying quiet symmetry that allows for a gentle resolution.</desc>
