<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork captures the emotional tension between desire and emptiness, using a palette that transitions from warm coral to cool charcoal. The warm colors symbolize desire, reaching outward, while the cooler shades convey feelings of containment and stillness. The structured arrangement, with densely packed warm tones colliding against the quieter edges, represents a longing for overflow and connection, yet framed by the reality of restraint. This pattern creates visual tension, reflecting the pull between emotion and void. The central area bursts with heat, symbolizing desire, while the edges are intentionally broken to allow glimpses of emptiness, inviting the viewer to engage in the conversation between the two.</desc>
