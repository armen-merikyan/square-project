<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition reflects the emotional tension between joy and grief, utilizing a split layout to juxtapose vibrant, expanding warmth against muted, weighted sorrow. The warm yellows and oranges in the left half embody joy and energy, depicted through a stripe pattern, while the deep blues and muted purples on the right communicate grief through a checker pattern, creating a sense of chaos and disturbance. The arrangement of colors creates a collision in the center, where joy's bright sparks meet grief's heavy tones, suggesting an unresolved conflict. Broken edges introduce imperfection, reinforcing the theme of emotional collision. The presence of negative space enhances the feeling of weightlessness against density, inviting contemplation.</desc>
