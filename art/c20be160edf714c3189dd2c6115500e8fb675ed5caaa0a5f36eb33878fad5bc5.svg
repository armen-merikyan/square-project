<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Order</title>
  <desc id="desc">The emotional tone captures the conflict between structured visuals (signal) and chaotic interferences (noise). The palette features deep navy as the dominant signal hue, contrasting with stark black and dim cyan to represent noise; these choices reflect solitude against distortion. The central pixels are dense, creating a physical pulse, while surrounding static interruptions emulate noise. The main collision occurs visibly between the center and borders, merging the controlled rhythm of islands with the shattering chaos of static; echoes of movement create a narrative of trapped clarity in the midst of distortion.</desc>
