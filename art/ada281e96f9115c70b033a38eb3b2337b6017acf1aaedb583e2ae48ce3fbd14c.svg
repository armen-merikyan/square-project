<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece explores the emotional tension between rage and tenderness, embodied through a dynamic color palette. The deep blacks and muted greys represent the encroaching rage, while soft blues and whites embody tenderness, creating a contrast that echoes the conflict between these emotions. The outer frame showcases aggressive, jagged marks clashing against a calm inner core of gentle stripes, while the broken pixels symbolize unresolved feelings, disruptions, and the complexity of human experience. The central collision invites viewers to navigate the struggle between containment and overflow, mirroring the abstract themes provided.</desc>
