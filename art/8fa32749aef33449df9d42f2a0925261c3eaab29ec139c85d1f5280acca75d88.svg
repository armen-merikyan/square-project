<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Light and Shadow</title>
  <desc id="desc">The emotional tone is defined by the juxtaposition of softness and severity. The chosen palette of powder pink (softness), warm white (illumination), and sharp crimson (severity) creates a conversation of light vs dark, each pulse representing the ebb and flow of these emotions. The main collision occurs at the center with the bold crimson and deep gray stripes clashing against the gentle rings of lighter hues. This embraces the seed's duality and open gate concept through a rhythmic yet interrupted pattern.</desc>
