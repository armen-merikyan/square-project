<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This composition explores the emotional dynamics between vulnerability and strength. The chosen palette balances cool greens and warm golds to reflect the tension between safety and exposure. The scattered marks of gentle cream highlight vulnerable areas against the stronger olive and green blocks, creating a fracture of strength within vulnerability. The collision happens centrally, embodying the core theme of the seed. Broken pixels subtly interrupt the uniformity, suggesting scars of past experiences, while maintaining a significant negative space that invites reflection on the balance between pressure and release.</desc>
