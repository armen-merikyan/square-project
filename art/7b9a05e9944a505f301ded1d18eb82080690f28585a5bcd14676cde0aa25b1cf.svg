<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Waves</title>
  <desc id="desc">This artwork embodies the emotional tension of awe versus terror through a duality of color and pattern. The chosen palette combines deep blacks and vivid soft golds to represent the stark contrast between fear and hope. The structure incorporates an upward movement on one side and a downward cascade on the other, creating a dynamic interplay that mirrors the conflict between stability and instability. Broken pixels introduce an element of imperfection that aligns with the theme of broken memories reflected in the seed, while the rhythmic patterns of order (checker) and chaos (stairs) foster a visual narrative of rising tension and release.</desc>
