<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast in Chaos</title>
  <desc id="desc">This composition reflects the interplay of joy and grief, with the bright yellows and oranges representing joy expanding from the bottom left corner, while the deep blues and muted purples evoke a sense of grief, creating a push-and-pull effect. The pattern of dots symbolizes fragmented thoughts, contrasting sharply against the mirrored shapes of joy. The central area represents a conflict zone of emotion, where both happiness and sorrow collide. The bottom-weighted edges and hard contrasts emphasize a sense of security disrupted by chaotic fluctuations, aligning with themes of order versus chaos.</desc>
