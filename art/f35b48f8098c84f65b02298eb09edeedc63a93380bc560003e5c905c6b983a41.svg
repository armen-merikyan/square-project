<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">The emotional tone captures a tension between trust and suspicion, utilizing a warm vs cool contrast. The palette of lime, black, electric blue, and magenta punctuates the piece with vibrancy while the stark black introduces depth and chaos. The arrangement follows a split horizontal layout, where the upper rows represent trust through structured framing patterns, and the lower rows embody suspicion with broken, jagged textures. This collision of feelings is visually illustrated through the juxtaposition of clean lines against chaotic interruptions, embodying the essence of release and pressure.</desc>
