<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Conflict</title>
  <desc id="desc">This abstract piece contrasts the softness of powder pinks and warm whites against the severity of carbon black and sharp crimson. The emotional tone shifts from gentle inner reflections to the stricter realms of emotion, embodying a conflict of guilt and forgiveness. The palette juxtaposes cold and warm hues, creating tension while allowing the viewer to navigate the undulating rhythms of softness and harshness. The rows exhibit vertical shifts in density, with the central collision occurring between the soft and severe bands—a spiral of color representing both the open gate of soft emotions and the stacked weight of severity.</desc>
