<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Layered Contrasts</title>
  <desc id="desc">This artwork embodies the conflicting emotions of confusion and clarity through the juxtaposition of warm and cool colors. The choice of yellow and orange reflects warmth and brightness, symbolizing clarity, while deep blue and muted purple create cool, unsettling depths, reflective of confusion. The patterns employed—target for clarity and stripes for confusion—collide in the center, where density increases towards the edges, leading to a visual and emotional 'falling' away. Broken pixels disrupt the symmetry, cultivating a sense of uncertainty and imperfection, which mirrors the themes from the seed.</desc>
