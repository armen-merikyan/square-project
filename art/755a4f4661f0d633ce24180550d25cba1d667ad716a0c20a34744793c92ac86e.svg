<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Extremes</title>
  <desc id="desc">The emotional tone draws from the contrasts of spark (vibrant, energetic) and ash (quiet, settled). The palette of black, electric blue, lime, and magenta promotes tension between brightness and darkness. The primary collision happens diagonally, contrasting the vibrant 'spark' colors against the subdued 'ash' tones. Patterns emerge from the arranged sections, embodying the struggle between hunger and restraint alongside an overwhelming presence of memory versus erasure, resulting in an abstract visual reflection of resilience and fragility.</desc>
