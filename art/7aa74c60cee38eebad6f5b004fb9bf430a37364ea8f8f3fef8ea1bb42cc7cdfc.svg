<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This composition captures the emotional tension of 'spark vs ash' with stark contrasts between a vibrant corner (the 'spark') and a muted backdrop (the 'ash'). The palette evokes a melancholic wonder; with colors like rain blue and muted plum expressing depth and fragility. The overfilled corner is juxtaposed against soft cyan and lavender gray, which fade into negative space, creating an imbalance that enhances the tension. The 'tide' pattern for 'spark' is shattered by 'ash' – represented through scattered dots, creating a dynamic collision. The layout enhances pressure as one corner erupts while the rest remains subdued, echoing the themes of resilience against erasure.</desc>
