<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">This piece encapsulates the emotional duality of longing and resolve using a palette reflecting warmth and intensity. The colors, such as warm ivory and deep wine, suggest an intertwining of serenity and urgency, representing the complexity of emotional states. The main contrast is illustrated through the central accumulation of deep wine against the lighter warm ivory, creating a sense of collision and the struggle between compression and release. This abstract pattern draws from the seed's metaphor of a broken mirror, reflecting tension and harmony as they rise from the base, representing hope and escape through color placement.</desc>
