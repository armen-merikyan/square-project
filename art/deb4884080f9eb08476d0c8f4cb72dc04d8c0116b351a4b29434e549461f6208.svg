<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Contrasts</title>
  <desc id="desc">This artwork explores the emotional tension between restlessness and peace through diagonal disruptions and color patches. The palette, consisting of deep maroons and soft pinks, captures warmth's intensity against cool gray, embodying the push and pull between unsettled and serene emotions. The main collision occurs at the center, where darker hues intermingle with lighter patches, symbolizing how memory and motion clash, creating a dynamic flow that leads outward, suggesting both escape and enclosure. The uneven distribution and intentional broken pixels represent the scars of conflict, maintaining a sense of unresolved energy.</desc>
