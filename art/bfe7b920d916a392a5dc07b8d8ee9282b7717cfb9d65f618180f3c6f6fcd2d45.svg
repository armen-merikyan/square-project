<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone captures the tension between rage and calm, embodying a clash where fiery reds encroach upon the cooler blues and whites, suggesting a struggle for dominance. The palette of red, pale blue, black, and white reflects this duality: red epitomizes anger while pale blue embraces tranquility. The primary contrast occurs at the top left where intense red, representing rage, collides with a softer blue, embodying calm. This collision and the jagged, shattering pattern of rage disrupt the regularity of the calmer, more contained lines, creating a visual representation of emotional struggle. The broken pixels add imperfections, enhancing the volatility and tension within this abstract setting.</desc>
