<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece embodies the tension between exposure and safety, represented through vertical bands that suggest a split. The palette features warm brown and shelter green to evoke feelings of enclosure and protection, contrasting with pale skin and cold white that signify vulnerability. The main collision occurs centrally, where the softer colors ripple outward, interrupted by heavier shades that frame this open space, creating a dynamic interplay of protection and exposure. Broken pixels add an intentional disruption, hinting at the imperfections of these emotional states. The flow is horizontal, giving the sensation of waves shifting between safety and exposure, with a negative space that enhances the feeling of emotional outskirts. The resulting abstract artwork reads as a layered emotional strata, grappling with vulnerability and shelter.</desc>
