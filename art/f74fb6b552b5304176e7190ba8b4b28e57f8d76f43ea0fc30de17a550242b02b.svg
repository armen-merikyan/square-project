<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotion</title>
  <desc id="desc">The emotional tone reflects the tension between envy and gratitude, embodied through sharp versus soft contrasts. The palette of 'ancient_fire' incorporates burnt orange, dark red, charcoal, and gold, providing a warm yet volatile interplay. The zigzag pattern signifies the oscillation between heavy emotions and lighter reflections. Main contrasts happen at the edges, with gold peeking through the charcoal areas, suggesting an interruption of gratitude amidst the weight of envy. This arrangement creates a rising feel, symbolizing the ascent of hope in a complex emotional landscape.</desc>
