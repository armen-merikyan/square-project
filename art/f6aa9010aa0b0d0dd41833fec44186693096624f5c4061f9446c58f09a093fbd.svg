<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Tension</title>
  <desc id="desc">The emotional tone reflects a clash between softness and severity, represented through a palette of delicate powder pink and warm white against the depth of carbon black and sharp crimson. The main contrast occurs towards the center of the grid, where flowing 'embers' of softer colors collide abruptly with the rigid 'ripple' patterns of darker hues, suggesting an emotional heartbeat against a backdrop of gravity. The broken edges of the layout symbolize fractured moments of intensity where the emotions interact, creating a narrative of tension and release that embodies the seed’s complexity.</desc>
