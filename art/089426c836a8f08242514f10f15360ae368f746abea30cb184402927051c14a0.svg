<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Tones</title>
  <desc id="desc">This artwork embodies the emotional tension between softness and severity through contrasting color placements and textures. The palette combines warm pinks and whites to suggest gentleness, while deep blacks and steel grays introduce a sense of sharpness and weight. The main collision occurs in the center where warm tones attempt to spill over the cool, strict boundaries of darker hues. The diagonal layout reinforces this argument, mimicking the sensation of pressure against relaxation. The broken pixels add deliberate imperfections, enhancing the artwork's narrative of struggle and balance between emotional states.</desc>
