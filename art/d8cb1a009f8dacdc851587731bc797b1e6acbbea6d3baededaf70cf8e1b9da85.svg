<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This artwork captures the emotional tension between desire and emptiness through its contrasting color palette. The warm tones of hot coral and blood orange evoke a saturated pull of desire, with a stacked pattern that reaches towards the corner. In contrast, the cool tones of charcoal and hollow blue represent the emptiness and constraint, framing the warm colors and creating a barrier. The broken pixels impart a sense of disruption, enhancing the sense of conflict between the drawn-in warmth and the bounded, faint edges of emptiness. The main collision occurs in the corner, where the warmth of desire conflicts with the boundary of emptiness, suggesting an unresolved tension between longing and the edges that restrict it.</desc>
