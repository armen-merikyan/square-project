<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Sparks and Ashes</title>
  <desc id="desc">This composition embodies the emotional conflict of spark and ash, where the high contrast of warm and cool colors captures the idea of ignition against decay. The chosen palette features earthy tones such as moss green and stone gray, reflecting resilience and fragility. The arrangement creates a clash in the center with a bright gold accent breaking through the darker, ashy surrounds, summarizing the tension between vitality and stillness. The edge style emphasizes jagged contrasts in texture, enhancing the idea of memory vs erasure and the sensation of interrupted flow between contrasting visuals.</desc>
