<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">The emotional tone reflects a tumultuous struggle between envy and gratitude, where gratitude seeks light amid the shadows of envy. The palette, inspired by the 'broken_memory' theme, captures muted tones that suggest a soft, fading past—sepia and dust gray represent despair, while faded blue offers a glimpse of hope. The main contrast lies at the center, where light panels intersect with darker edges, evoking a push-and-pull dynamic. This arrangement reflects the seed's themes of movement, tension, and the overlapping emotional states transitioning from fear to hope.</desc>
