<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of States</title>
  <desc id="desc">The emotional tone embodies a conflict between defiance and submission, portrayed through the contrasting colors and shapes. The palette—cosmic indigo, void black, star white, cold gold, and deep teal—evokes a sense of awe and tension, where the deep tones symbolize defiance against the paler hues of submission. The arrangement features a blocked edge style, with a central core of chaotic pulse marks suggesting vibrancy and life amidst the quieter, more subdued outer borders, illustrating the theme of colliding emotions. The relational dynamics between order and chaos are visually encapsulated by uneven distributions of colors, where fragmented interactions represent the friction of opposing feelings.</desc>
