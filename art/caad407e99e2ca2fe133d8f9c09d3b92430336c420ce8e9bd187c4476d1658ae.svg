<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Tension</title>
  <desc id="desc">The emotional tone captures a struggle between defiance and submission, visually emphasizing an opposing dynamic. Using the 'hunger_restraint' palette, warm red oxide contrasts with cooler shades like iron gray, representing defiance against a backdrop of submission. The layout splits the canvas vertically, fueling tension between the left and right sides, while the ash field and echo patterns intertwine—one side bold and rising, the other yielding and soft. The collision resides centrally, with advanced broken pixel disruptions acknowledging chaos, while maintaining a clear boundary. Negative space is utilized to encourage a breath amidst the conflict, sparking reflection rather than resolution.</desc>
