<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This composition explores the emotional clash between restlessness and peace, utilizing a palette that reflects both nostalgia (deep blue, pale yellow) and a sense of calm (stone, mourning black). The main contrast happens diagonally across the square, where restless elements (streaks of deep blue and pale yellow) interrupt smoother patches (stone and black), creating a visual tension that translates the seed's themes into abstract forms. The broken pixels add intentionality to the disruptions, presenting a balance between structured calm and chaotic motion, while negative space ensures that the eye can rest amidst complexity.</desc>
