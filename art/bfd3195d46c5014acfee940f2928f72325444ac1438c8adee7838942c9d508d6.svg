<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">The emotional tone balances quiet and pressure, employing dark colors to express the density and weight of pressure while lighter hues suggest moments of clarity. The soft, muted palette features off-white, dust gray, and faint peach, acting as the quiet moments amidst dense areas of compressed red and dark navy—representing pressure. The main collision occurs diagonally across the square, with ripple patterns clashing against quiet islands, creating tension and flow from bottom to top while intentionally leaving negative space to reflect the contrast between quiet and pressure.</desc>
