<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece embodies the tension between vulnerability and strength through stark contrasts and emotional resonance. The palette chosen, particularly the cosmic indigo and void black, encapsulates both the weight of strength and the subtlety of exposure. The central collision of pale hues with darker edges suggests a protective boundary around an exposed core, creating visual tension. The patterns of crosshatch and stepwell intertwine to reflect the complex nature of security versus fragility, while broken pixels represent imperfections embraced. The asymmetry redirects the gaze, emphasizing an enduring struggle between open and enclosed spaces, fully aligned with the abstract narrative derived from the seed.</desc>
