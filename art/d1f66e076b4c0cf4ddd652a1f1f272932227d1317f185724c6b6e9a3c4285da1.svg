<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Desire</title>
  <desc id="desc">This piece explores the emotional tension between longing and resolve, a dance of desire compressed by restraint. The hot coral and blood orange represent the passionate, unresolved yearning, while the charcoal and hollow blue symbolize the calming, steady presence of resolve. These contrasting colors collide in the center of the square, suggesting a core of intensity amidst a subtle field of dust pink that acts as a quiet space. The ring and thread patterns create a rhythm of separation and connection, deepening the sense of intimacy and distance, with intentional broken pixels adding imperfections, reflecting the ongoing struggle of desire against reality. The overall composition maintains a balanced negative space, evoking a feeling of suspended emotion—where longing appears to pulse against a steady resolve.</desc>
