<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Sanctuary</title>
  <desc id="desc">The emotional tone contrasts the concepts of safety and exposure, creating a dynamic push and pull between sheltered warmth and exposed vulnerability. The palette marries cool colors of cold white and open blue with warm earthy tones, reflecting the tension between protection and unveiling. The central area, representing exposure, is a lighter pale skin, ringed by deeper shades of warm brown and cold white, symbolizing the dual nature of safety as both comforting and confining. The main collision occurs horizontally across the center, where the lightest color intersects with the richer tones, representing the coexistence of pressure and release. The broken pixel disruption enhances the feeling of imperfection, reflecting the fragility of this balance.</desc>
