<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This piece reflects the emotional tension between desire and emptiness. The warm tones of hot coral and blood orange symbolize desire, creating a vibrant pull at one corner, while the cooler hues of charcoal and hollow blue signify emptiness and containment. The broken dot pattern embodies the disintegration of fullness, contrasting sharply with the ladder-like structure of desire, illustrating an overflow versus containment dynamic. The central collision expresses a chaotic energy, disrupted and scattered yet vividly alive, echoing the sentiment of a pull toward something unattainable.</desc>
