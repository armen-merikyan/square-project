<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure &amp; Release</title>
  <desc id="desc">This piece evokes the emotional intensity of awe and terror through a palette of burnt orange, dark red, charcoal, and gold. The outer border displays a rhythm of dark hues, creating a stark contrast with the inner core, where lighter stripes depict a rhythmic flow of awe. The central composition is intentionally uneven, with broken pixels suggesting imperfection and tension, embodying the emotional collisions described in the seed while maintaining a 10% negative space to invite a sense of quiet amidst the chaos.</desc>
