<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Corner</title>
  <desc id="desc">This artwork captures the emotional contrast between quietude and pressure through dense, clustered color on one corner (representing pressure) that dynamically loosens towards the opposite side (representing quiet). The palette combines muted tones of off-white and dust gray with sharp accents of compressed red and dark navy, creating visual tension and energetic collision. A radial pattern suggests softness in one area while a framing pattern implies a weighted confinement in another. The overall layout diverges from symmetry to convey a sense of disruption and flow, glaringly highlighting the thematic intersection of calm and tumult.</desc>
