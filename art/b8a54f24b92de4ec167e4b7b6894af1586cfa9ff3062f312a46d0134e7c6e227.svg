<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork reflects a tension between defiance and submission through contrasting color placement. The palette, 'mourning_renewal,' captures deep emotional hues ranging from mourning black and deep blue symbolizing defiance, to soft stone and pale yellow depicting submission. The design features a quiet channel of negative space, suggesting calmness amidst pressure, with dense areas where colors collide sharply, creating a pulsating feeling. Broken pixels disrupt uniformity, hinting at chaos within structure. The diagonal rise leads the viewer's eye across the art, pushing the narrative of conflict between the closed and open. This evokes an emotional experience of navigating thresholds.</desc>
