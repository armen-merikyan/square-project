<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Under Sparks</title>
  <desc id="desc">This artwork embodies the tension between the fiery bursts of sparks and the quiet decay of ash, manifesting as dense clusters of color that transition into softer, more subdued tones. The chosen palette of stain brown, ash gray, warm ivory, soft gold, and deep wine reflects the contrast of vibrancy and restraint. The central collision occurs where the darker hues of ash gray and deep wine assert themselves, balanced by bursts of gold that represent moments of spark and vitality. The pattern flows from an anchored density at the bottom left, loosening into emptiness as it spreads, capturing the struggle of resilience against the erasure of memory.</desc>
