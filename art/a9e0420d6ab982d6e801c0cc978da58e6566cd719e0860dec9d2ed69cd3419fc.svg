<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Weight</title>
  <desc id="desc">This 8x8 abstract composition captures the emotional tension between relief and dread, showcasing a struggle between light and dark. The palette of navy and black represents a deep void of dread, while dim cyan introduces elements of relief, reminiscent of a fleeting hope. The arrangement features dense blocks of dark colors on the left side, colliding with lighter stripes on the right, signifying a push-pull dynamic. The top-weighted layout reflects the oppressive atmosphere of dread, balanced by the lighter colors which seek to break through, creating visual echoes of symmetry and disruption.</desc>
