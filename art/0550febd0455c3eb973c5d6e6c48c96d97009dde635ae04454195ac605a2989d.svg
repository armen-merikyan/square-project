<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Control and Panic Interwoven</title>
  <desc id="desc">The emotional tone captures the tension between panic and control, where warm reds clash against cool blues to reflect chaos versus stability. The palette, 'rage_calm', incorporates aggressive red and calm pale blue, embodying the emotional extremes. The left section, utilizing radial patterns, evokes a sense of control, while the right, made up of stripes, represents panic. The hard edges create a split that intensifies the color collision, particularly at the center, where both emotional patterns visually clash, forming a narrative of struggle between order and disorder.</desc>
