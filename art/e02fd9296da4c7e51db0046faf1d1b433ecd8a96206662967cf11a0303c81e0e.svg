<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Weight</title>
  <desc id="desc">This artwork explores the emotional conflict between nostalgia and progress. The color palette of muted purples, warm yellows, and deep blues signifies a journey—warm hues evoke nostalgic feelings, while the cool tones represent progress. The juxtaposition of bright and dark colors creates tension and collision, echoing the struggle between memory and advancement. The 'target' pattern suggests a focal point against an increasingly complex backdrop, with disrupted symmetry reflecting life's unpredictable rhythm. Negative spaces introduce calm amidst the chaos, leading to a sense of unresolved motion, embodying the dual nature of hope and melancholy.</desc>
