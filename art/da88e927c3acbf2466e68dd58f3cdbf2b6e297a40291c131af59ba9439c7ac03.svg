  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork juxtaposes vulnerability and strength through an emotional palette of muted cream, red oxide, and blackened plum, evoking a sense of tension and balance. The arrangement reflects the asymmetry of strength manifested as a stable center surrounded by vulnerable, softer tones, creating a flood of color that clashes and harmonizes. The thick outlines invoke protective borders, while broken pixels in specific areas represent the interruptions in both emotions, emphasizing the push and pull between exposure and shelter. This composition utilizes a stacked bands layout, where movement from light to dark showcases a counterflow of feelings, inviting the viewer into the depth of emotional experience.</desc>
