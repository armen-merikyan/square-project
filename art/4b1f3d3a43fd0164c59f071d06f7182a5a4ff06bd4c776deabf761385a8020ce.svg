<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Yearning</title>
  <desc id="desc">This composition explores the emotional contrast between desire and emptiness. The vivid colors of hot coral and blood orange signify desire, creating a warm, pulsing center of energy. In contrast, the charcoal and hollow blue represent emptiness, bringing a coolness that suggests restraint and containment. The arrangement utilizes stripes to depict desire, overlapping with scar-like imperfections that echo emptiness. This interplay occurs prominently towards the center, invoking both tension and motion, symbolizing the struggle between aspiration and limit.</desc>
