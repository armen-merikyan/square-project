<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Ascendancy</title>
  <desc id="desc">This artwork captures the emotional tension between joy and grief through contrasting colors and patterns. The palette features bright yellows and oranges that evoke joy, while deep blues and muted purples impart feelings of grief. The layout ascends from bottom to top, symbolizing a journey from heaviness to lightness. The collision of bright shapes against darker fields represents the struggle between these emotions, with hard edges creating a sense of tension. The abstract pattern, inspired by the seed concepts, utilizes a stair-step quality for grief, suggesting a burden, while rain-like patterns signify joy, indicating vibrant moments amidst sorrow.</desc>
