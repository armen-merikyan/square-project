  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition captures the tension between desire and emptiness. The palette includes warm colors like hot coral and blood orange representing desire, while cooler shades like charcoal and hollow blue suggest emptiness. The main collision occurs in the top left corner, where warmth spreads through the canvas, interrupted by cooler blocks. The 'glitch' pattern conveys the chaotic nature of desire striving against containment, encapsulating the emotional struggle of overflow versus restraint.</desc>
