<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Crown of Tension</title>
  <desc id="desc">The artwork reflects the emotional tension between defiance and submission through a striking contrast of bold and muted colors. The palette of moss green and rust symbolizes resilience amid fragility. The central crown shape occupies a gentle gradient, representing stability, while angular rust accents create a sense of attack, interrupting the quiet. The lower edge is heavier, suggesting a weight of chaos, while the upper tones maintain a subtle calm. The interplay of these elements serves to evoke a narrative around the negotiation of power and surrender, embodying an unresolved dialogue.</desc>
