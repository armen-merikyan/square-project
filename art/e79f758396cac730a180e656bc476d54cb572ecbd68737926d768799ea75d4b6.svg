<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragile Equilibrium</title>
  <desc id="desc">This artwork embodies the tension between vulnerability and strength, evoking a sense of tumultuous calm. The color palette—drawing from hot coral, blood orange, and hollow blue—captures this emotional duel, with warm tones representing strength contrasted against cooler shades suggesting vulnerability. Central to the composition is the collision of textures and density in the center, where clear blocks of strength disrupt softer threads of vulnerability, echoing a fracture in a mirror. The use of broken pixels introduces intentional scarring, enhancing the complexity and rawness of the experience, while maintaining a whisper of negative space that invites contemplation.</desc>
