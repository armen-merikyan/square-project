<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Embrace</title>
  <desc id="desc">The emotional tone reflects the duality of loneliness and connection, manifested through contrasting dark and bright colors. The palette suggests isolation (black, navy) against interstitial signals of connection (dim cyan, bright white). The top four rows depict loneliness with dense noise patterns and darker hues, while the bottom rows transition to brighter, softer colors to symbolize connection. There’s a notable collision in the center where dark tones abruptly contrast with lighter shades, suggesting a burst or disruption in emotional flow, embodying the push-and-pull of being trapped versus seeking connection.</desc>
