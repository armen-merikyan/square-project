<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Strained Balance</title>
  <desc id="desc">This composition explores the emotional tension between softness and severity using a palette of gentle pinks and stark blacks. The soft hues create a warm undertone that contrasts sharply with deep blacks, representing the struggle to expand beyond one's limitations. The main collision occurs in the center where the checker pattern (softness) intersects with the hinge pattern (severity), reflecting a push-pull dynamic. Randomly placed broken pixels introduce elements of imperfection, highlighting the unpredictable nature of emotional experiences, while maintaining a narrow channel of negative space to evoke contemplation.</desc>
