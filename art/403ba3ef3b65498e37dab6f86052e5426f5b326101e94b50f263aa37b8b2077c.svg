<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Dissonance</title>
  <desc id="desc">This artwork captures the tension between awe and terror, conveying emotional contrast through a split vertical layout. The left side, representing awe, uses lighter tones of sepia and faded blue to create a sense of elevation and uplift, while the right side embodies terror with darker, earthier shades. The collision occurs at the center, where the colors interact, mirroring the chaos of broken memories and fractured experiences. The soft edges of the colors provide a gentle transition, yet the subtle introduction of broken pixels disrupts this flow, suggesting instability amidst the calm. The overall rhythm ebbs and flows, capturing the essence of tension between calm order and chaotic disruption.</desc>
