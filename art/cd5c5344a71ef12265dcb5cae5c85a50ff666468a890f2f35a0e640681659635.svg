  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects the tension between vulnerability and strength, illustrated through a contrast of light and dark colors. The selected palette includes warm shadow and cool blue to embody intimacy and distance. Strong radial patterns highlight the concept of strength in the outer bands, while ladder motifs suggest vulnerability within the exposure at the center. The main collision occurs in the central area, creating dynamic movement between dense and sparse regions that echoes the themes of pressure and release. The edges are softly broken, adding depth and a sense of imperfection, enhancing the overall narrative.</desc>
