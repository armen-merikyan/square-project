<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Separation</title>
  <desc id="desc">The composition captures the emotional duality of longing and resolve through a mix of saturated and muted colors. Using a palette that juxtaposes warm brown and shelter green with pale skin and cold white evokes feelings of intimacy against a cold distance. The center of the grid is dense, symbolizing the overwhelming emotion of longing, while the muted borders reflect resolve and distance, resting on the quiet, cohesive blue foundation. The dynamic tension emerges from the contrast between the tightly clustered inner colors and the expansive, lighter outer areas, embodying a struggle between chaos and order as the colors ebb and flow in a diagonal cross-current.</desc>
