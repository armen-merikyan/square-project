<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This piece embodies the collision of calm and rage through a carefully balanced palette of stark contrasts. The dominant colors, black representing rage and pale blue signaling calm, establish a pulsing rhythm across the canvas. The flat checker patterns on one side compete against an erratic arrangement of 'broken dots' on the other, creating a visual tug-of-war that captures emotional tension. The sharp edges add intimacy to each color block, emphasizing moments of pressure and quiet release within the turmoil.</desc>
