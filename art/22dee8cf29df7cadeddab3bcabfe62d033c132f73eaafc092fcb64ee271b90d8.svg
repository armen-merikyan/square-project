<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">The emotional tone captures a tension between nostalgia and progress. The palette of sepia, tan, dust gray, and faded blue evokes a sense of muted warmth against the backdrop of a cold future. The top half reflects structured nostalgia, using a soft pattern of sparks contrasting with the chaotic lower half, filled with dots signifying progress. The sharp division stems from the split horizontal layout, where the upper area maintains clarity and calmness while the bottom explodes with chaotic energy, creating visual tension and implying weight and release.</desc>
