<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece encapsulates the dynamic tension between vulnerability and strength. The palette blends warm tones—like #E3B8A0 (rose clay) and #C6A85A (lamp gold)—with cooler shades—such as #A6C8E9 (cool blue) and #B6A5C4 (distant lilac)—to create a dance of intimacy and distance. Stripes representing strength collide with flame-like forms that convey vulnerability, creating a chaotic yet harmonious 'argument grid' pattern. The main collision occurs at the center where the warm and cool colors intertwine. Broken pixels disrupt the symmetry, evoking a sense of exposed fragility within robust frameworks, following the seed's essence of emotional complexity.</desc>
