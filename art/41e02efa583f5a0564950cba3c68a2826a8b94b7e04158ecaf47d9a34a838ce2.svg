<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone is characterized by a tension between craving and denial. The palette consists of vibrant coral and muted charcoal, creating a strong contrast that echoes the struggle inherent in desire versus restraint. Warm tones dominate, representing desire's pull, while cooler, darker colors outline the boundaries, symbolizing restraint. The main collision occurs in the center, where rippling warm colors intersect with dimensional halos of muted colors, creating a visual metaphor for the clash of emotions and leaving ample negative space to signify the insatiable hunger tempered by boundaries.</desc>
