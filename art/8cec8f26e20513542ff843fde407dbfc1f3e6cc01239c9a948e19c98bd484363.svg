<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Frames</title>
  <desc id="desc">This piece captures the emotional interplay between certainty and curiosity through a structured layout of descending pixels that evoke a sense of weightlessness and directionality. The dark, anchoring colors represent certainty, holding the composition down, while bright accents symbolize curiosity, offering glimpses of potential. The contrast emerges from the top-down flow, where darker tones dominate yet are punctuated by rising signals of lighter colors, suggesting hope or answers just beyond reach. The palette reflects clarity tinged with confusion; deep black and ice blue create a striking visual tension against the gentle white and warning orange highlights. Broken pixels introduce a sense of disruption, echoing the themes of chaos and order.</desc>
