<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Strata</title>
  <desc id="desc">This piece embodies the emotional tension between longing and resolve through dense color bands interacting with quiet spaces. The warm hues of yellow and orange represent a longing's vibrancy, contrasting with the cool deep blue and muted purple that symbolize a firm resolve. The layout follows a stacked band approach, where density is fluctuating, creating a sense of emotional movement across the canvas. The primary contrast occurs centrally, where bands of longing echo outward, meeting the steady streams of resolve. Broken pixels disrupt the flow, representing moments of doubt in the journey towards closeness.</desc>
