<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Shelter</title>
  <desc id="desc">This piece expresses the tension between safety and exposure, blending warmth and vulnerability through the chosen palette. The warm brown and shelter green suggest a gentle protection, while the cold white and open blue imply exposure and vulnerability. The center is dense with quieter colors, representing the safety zone, contrasted by bright, echoed colors at the border, which represent exposure. The broken pixels disturb the orderly flow, representing imperfections in the balance of safety and exposure, creating a visual tension that draws the eye inward.</desc>
