  <title id="title">Contrast in Motion</title>
  <desc id="desc">The emotional tone captures the struggle between control and panic. The dark hues represent the suffocating nature of panic, while the vibrant colors suggest bursts of control. The palette of lime, electric blue, black, and magenta creates a clash between cold and warm emotions. The pattern plays with density on one side, indicating chaos, while the opposite side favors a structured split, representing control. This conflict reflects the seed's essence, as the stripes emphasize the friction between radial calmness and edge chaos.</desc>
