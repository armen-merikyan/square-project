<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Braid of Longing and Resolve</title>
  <desc id="desc">The artwork captures the emotional tension between longing and resolve, represented by a dialogue of dark and light. A muted palette of deep blacks and dark violets acts as the backdrop, symbolizing longing and the weight of unattained desires. Accented by soft gold and pale green, the brighter patches emerge in a braid-like manner, threading through the darkness—this serves to depict resolve, the drive to reach beyond calmness into clarity. The overall dynamic evokes a push and pull, as dense areas of color collide with quieter, softer spaces, creating a narrative of struggle between completion and void. The introduction of broken pixels gives way to imperfections, signifying the fractured journey of aspiration.</desc>
