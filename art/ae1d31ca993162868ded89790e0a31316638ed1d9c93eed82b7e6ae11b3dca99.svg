<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The interplay of vulnerability and strength is expressed through a palette that evokes fear and hope. Dark violet represents strength, providing a dense foundation, while soft gold symbolizes vulnerability with its unshielded light at the core. The arrangement begins at the corner, creating an invasion of the dark shades into the lighter ones, mirroring the tension between the exposed center and protective edges. This dynamic is designed to visually interrupt and disrupt, echoing the emotional complexity of the seed, where light collides with weight, creating a tension-filled atmosphere throughout the grid.</desc>
