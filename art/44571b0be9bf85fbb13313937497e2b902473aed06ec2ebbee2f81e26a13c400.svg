<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone contrasts restlessness with peace, suggesting a visual and emotional oscillation. The palette chosen—soft powder pink, warm white, stark carbon black, subtle steel gray, and sharp crimson—captures the warmth of peace alongside the intensity of restlessness. The upper rows embody chaos (crosshatch pattern), while the lower rows represent tranquility (flame pattern). The main collision occurs in the center, where warm hues disrupt dark tones, echoing the push and pull of memory and motion. This asymmetry reinforces the theme of dynamic tension versus calm resolution, encapsulating the essence of the seed.</desc>
