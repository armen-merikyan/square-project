<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symphony of Tension</title>
  <desc id="desc">This piece encapsulates the emotional struggle between awe and terror through contrasting palettes representing each feeling. The sepia and tan colors anchor the sense of nostalgia and awe, while dust gray and faded blue introduce a haunting presence, evoking terror. The arrangement follows a split-screen layout, where mirrored patterns clash with broken elements, suggesting a balance between order and chaos. The intent was to create a dynamic flow from right to left, embodying a sense of movement, tension, and unresolved emotion as colors collide and overlap, bringing depth to the narrative.</desc>
