<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoed Dissonance</title>
  <desc id="desc">This artwork captures the tension between trust and suspicion through an 8x8 grid divided vertically. The left side emanates warmth and stability with soft pastels, suggesting trust, while the right side embodies chaos and unevenness with darker tones that evoke suspicion. The soft glow of the warm colors collides with the sharp, fragmented patterns of the cooler side, creating a visual dialogue of balance and stress. The use of broken pixels introduces intentional imperfections, suggesting vulnerability within the apparent order. The main contrast occurs along the vertical center, where distinct patterns overlap, enhancing the emotional turmoil.</desc>
