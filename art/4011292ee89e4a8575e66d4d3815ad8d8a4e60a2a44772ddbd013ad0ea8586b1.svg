<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition embodies the conflict between emptiness and desire through contrasting color choices. The warm tones of hot coral and blood orange pulse within a dominant hollow blue background, representing the depth of emptiness. The edge style of double outlines symbolizes containment while allowing fluid patterns that ripple outward. Broken pixel indicators create imperfect overlaps, enhancing the sense of chaos amid restraint, where desire struggles against limitation. The core collision occurs in the center, where pressure bands of warm colors meet the scarred spaces of blues, creating an emotional tug-of-war that visually narrates frustration and longing.</desc>
