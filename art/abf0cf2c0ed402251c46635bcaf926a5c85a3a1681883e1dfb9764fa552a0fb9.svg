<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">This composition emphasizes the emotional tug-of-war between desire and restraint. Through a spiral flow, warm colors spill out towards the edges, symbolizing desire, while cooler, muted shades create a countering pressure, representing restraint. The color palette, rooted in earthy tones of red oxide and blackened plum combined with muted cream and iron gray, suggests an intense emotional landscape. Key contrasts emerge at the center where hot colors collide with cool fields, illustrating the struggle inherent in the seed's narrative. The inclusion of broken pixels injects an intentional imperfection, resembling scars of emotional battles fought within us.</desc>
