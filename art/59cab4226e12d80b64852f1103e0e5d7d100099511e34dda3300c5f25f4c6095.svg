<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Boundaries</title>
  <desc id="desc">The emotional tone explores the push and pull of defiance and submission, illustrated through contrasting colors and patterns. The use of muted grays and a single accent of faded gold represents an uneasy balance. The palette 'relief_dread' encapsulates anxiety and calm, with storm gray dominating 70% of the space to signify submission, against injection of pale mint and faded gold in a barcode pattern suggesting defiance. The primary collision occurs centrally, where layers of color interrupt each other through an outward spiral flow, creating tension and engagement. The broken pixels introduce imperfection, echoing the nature of order vs chaos within the constraints of the seed.</desc>
