<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Dark</title>
  <desc id="desc">The emotional tone encapsulates the struggle between joy and grief, represented through a palette of warm yellows and oranges against deep blues and muted purples. This contrast creates visual tension, with a heavy density in the outer layers hinting at grief's weight, while the inner 4x4 grid bursts with vibrant energy exploring joy. The patterns evoke a radial pulsation of grief colliding with cracks of joy, forming an asymmetric backdrop. The negative spaces allow moments of quiet within the visual chaos, enhancing the emotional complexity through fragmented placements that embody the essence of the seed's duality.</desc>
