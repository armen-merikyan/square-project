<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Quiet Conflict</title>
  <desc id="desc">This piece captures the emotional tension between peace and restlessness through color and pattern. The outer layer uses darker shades to represent peace, providing a stillness that is contrasted by the core's chaotic crosshatch pattern in brighter colors. The palette of black, dark violet, soft gold, and pale green creates a feeling of depth and warmth. The main collision occurs at the center where the restless pattern interrupts the calm, suggesting a struggle between memory and motion. This arrangement prompts a dynamic yet abstract narrative without forming identifiable shapes.</desc>
