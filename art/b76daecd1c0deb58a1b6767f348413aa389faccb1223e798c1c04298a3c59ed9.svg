<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Tension</title>
  <desc id="desc">This piece explores the emotional dichotomy between control and panic, utilizing a palette that blends vibrant pinks and dark maroons to symbolize love betrayed and hidden turmoil. The left side's ring pattern represents panic with its chaotic nature, while the right half's target pattern illustrates the structured semblance of control. The arrangement begins densely and shifts to emptiness, echoing the feeling of instability within a stable exterior. Broken pixels are scattered throughout to emphasize imperfection and unpredictability, while the glowing edges highlight the tension in the contrasts.</desc>
