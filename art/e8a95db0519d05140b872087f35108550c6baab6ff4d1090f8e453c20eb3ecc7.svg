<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone contrasts the explosive nature of rage with the tranquility of calm. Using a palette of red, black, pale blue, and white, the composition captures this dynamic tension. The collision occurs prominently in the top left corner, where jagged red patterns emerge violently into a reserved field of blue and white, illustrating the struggle between contained emotions and overwhelming outbursts. The broken edges enhance the theme of erosion and disruption, reinforcing the idea of a spiraling emotional journey. The overall flow is clockwise, creating a sense of movement that echoes the conflict within the space.</desc>
