  <title id="title">Signal vs Noise</title>
  <desc id="desc">The artwork embodies the tension between restlessness and peace, using a palette of yellow, orange, deep blue, and muted purple to create emotional depth. The left side, dominated by warm colors, represents restlessness—chaotic patterns of channels interrupt a quiet field on the right, symbolizing peace. The main collision occurs diagonally through the center, portraying the struggle between momentum and stillness. Broken pixels introduce imperfections, echoing disrupted memories and noise in the emotional landscape.</desc>
