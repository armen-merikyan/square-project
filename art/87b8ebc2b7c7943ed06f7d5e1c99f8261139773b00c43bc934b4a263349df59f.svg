<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">The artwork explores the emotional tension between envy and gratitude, creating a vivid interplay of dark and light. A palette of deep blacks and soft pale blues establishes a dichotomy that pulls the viewer into a reflective state. The main contrast occurs at the edges, where the outer darker areas meet the lighter tones in the center, symbolizing the pressure of external noise against the softness of internal gratitude. Elements of broken pixels disrupt the flow, allowing imperfection to add depth to the narrative, suggesting the complexities of human emotion. The spiral clockwise layout mimics a journey inward, capturing the essence of rising and falling feelings, while leaving enough negative space for contemplation.</desc>
