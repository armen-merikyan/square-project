<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetrical Disruption</title>
  <desc id="desc">This artwork captures the tension between confusion and clarity, employing a palette of pink, red, gray, and dark maroon to evoke emotional resonance. The contrasting colors create a dialogue of warmth and coldness, suggesting both comfort and disruption. The pattern reflects a 'mirror_broken' layout where symmetrical elements are offset by broken pixels to illustrate instability. The dominant dark hues are punctuated by vibrant colors in the center, indicating a nexus of clarity surrounded by chaos. The pixel bleed style enhances this sense of disturbance, as edges appear jagged and in transition, symbolizing the difficulty of maintaining balance between the sharper moments of clarity and the fuzziness of confusion.</desc>
