  <title id="title">Strained Harmony</title>
  <desc id="desc">The emotional tone captures the tension between envy and gratitude, manifesting through a palette of warm yellows and oranges clashing with deep blues and muted purples. The arrangement reflects an almost mirroring structure, symbolizing the constant push and pull between appreciation and longing. The center is dense with warm hues while the edges soften with cooler tones, creating a paradox of intimacy and distance. Broken pixels introduce a sense of imperfection and unrest, disrupting the flow while maintaining negative space to embody emotional depth.</desc>
