<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This composition embodies the emotional pull of desire countered by the starkness of emptiness. The colors picked from the palette evoke warmth and vibrancy against muted tones, creating a dialogue between need and limitation. The central area, featuring low saturation, suggests empty space, while the surrounding ring of vibrant colors represents the overwhelming desire that remains unfulfilled. The dynamic use of broken pixels introduces intentional disruption, echoing the tension inherent in the emotional narrative.</desc>
