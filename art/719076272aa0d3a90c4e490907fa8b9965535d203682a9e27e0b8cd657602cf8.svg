<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in the Frame</title>
  <desc id="desc">This piece embodies the emotional tug-of-war between restlessness and peace. The selected palette, featuring pale aqua and mist gray, conveys tranquility while the alarm red punctuates moments of agitation. The layout, 'open_gate', allows for an energetic flow from right to left, symbolizing invitations to movement versus desires for stability. The collision between the structured frame (representing peace) and chaotic broken dots (representing restlessness) occupies the center space, emphasizing this duality. Broken pixels introduce intentional disruptions that echo the feeling of unease amidst serenity, creating a visual narrative of tension and release.</desc>
