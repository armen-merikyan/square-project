<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Crosshatch</title>
  <desc id="desc">The composition conveys the tension between loneliness and connection, with a focus on the center where an inner shape confronts surrounding noise. The palette, a mix of deep black and bright red against cooler blues and whites, emphasizes the stark contrast between isolation and warmth. The top-weighted layout draws attention to the tension at the top which dissipates downwards into more muted sections, echoing themes of hidden emotions and exposure. The patterns—stripes contrasting with scattered bursts—create a rhythmic pulse, suggesting a push and pull between conflicting feelings, while maintaining an abstract integrity free from literal representation.</desc>
