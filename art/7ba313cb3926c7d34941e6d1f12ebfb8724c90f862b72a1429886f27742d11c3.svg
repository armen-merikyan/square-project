<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Tensions</title>
  <desc id="desc">This piece embodies the emotional conflict between defiance and submission through contrasting patterns of color. The central pixel arrangements evoke a clash between structured, rigid placements (submission) and organic, reflective values (defiance) that mirror off each other, creating a dynamic push-pull effect. The dark palette represents the weight and pressure of the emotions while the lighter shades signify an opening toward resolution. The dense lower half draws the viewer in, while the lighter, more open top offers a contrast of potential clarity amidst chaos, echoing the seed's themes of contrast and collision.</desc>
