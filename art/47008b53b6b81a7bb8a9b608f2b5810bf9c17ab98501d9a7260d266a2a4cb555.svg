<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork explores the emotional tension between ephemeral bursts of energy (spark) and the lingering residues of experience (ash). The palette balances vibrant hues of hot coral and blood orange with the softness of dust pink and the weight of charcoal. The main contrast occurs in the center, where jagged patterns collide with smoother waves, embodying a conflict of memory vs. erasure. The broken frame layout invites the viewer to witness emotion seeping through, while deviating from balanced distribution emphasizes the chaotic interplay of tension and calm.</desc>
