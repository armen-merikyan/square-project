<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This piece explores the emotional tension between spark and ash, representing moments of ignition and decay. The palette is bold, with contrasting electric blue and magenta invoking sudden brightness against a backdrop of deep black, emphasizing feelings of both hunger and restraint. The arrangement reflects a spiral pressure layout, with the electric colors emerging abruptly in lower density spaces, while the black grounds the composition. The jagged edges and broken pixels introduce a sense of fragility within resilience, capturing the push and pull of memory and erasure.</desc>
