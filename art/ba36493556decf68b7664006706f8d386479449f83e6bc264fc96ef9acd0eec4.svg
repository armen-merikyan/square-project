<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">This composition evokes the tension between sudden bursts of energy (represented by warm oranges) and the oppressive quietness of ash (gray tones). The contrast of these elements creates a visual dialogue about resilience and fragility. The open gate layout allows dynamic flow from the warm, energetic pulses at the bottom left, fading into the cooler, muted fields across the grid. The jagged edges and broken pixels introduce an element of disruption, symbolizing memory's imperfection and the fleeting nature of sparks amidst ash. The organized chaos captures the seed's essence.</desc>
