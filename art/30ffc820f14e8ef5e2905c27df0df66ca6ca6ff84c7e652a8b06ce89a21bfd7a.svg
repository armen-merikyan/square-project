<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This pixel art captures the emotional contrast between emptiness and desire through a dynamic interplay of warm and cool colors. The palette features saturated coral and orange representing desire, while muted pink and deep blue evoke a sense of emptiness. The layout of two small centers creates a rhythmic rise and fall, vibrating against the negative space that acts as a boundary. Broken pixels introduce intentional imperfection, symbolizing disruptions in the emotional flow, while an asymmetric balance emphasizes the collision between overflowing desire and confined restraint. Overall, the piece resonates with an abstract story of yearning constrained by invisible boundaries.</desc>
