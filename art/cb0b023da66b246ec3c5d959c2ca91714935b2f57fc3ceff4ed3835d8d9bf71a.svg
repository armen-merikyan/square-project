<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension &amp; Release</title>
  <desc id="desc">This composition reflects the emotional tension between joy and grief. The warm tones of yellow and orange contrast against the cool, muted purples and deep blues, creating a visual conflict that embodies both pressure and release. The palette evokes feelings of joy and grief, enhancing the vibrancy on one side while the other recedes into quiet tones. The jagged edges create tension, while a dominant grid pattern on the left evokes joy, juxtaposed with the fragmented, teeth-like patterns of grief on the right, creating an echo of emotional collisions.</desc>
