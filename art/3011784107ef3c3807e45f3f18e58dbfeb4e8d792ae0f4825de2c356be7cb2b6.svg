<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork navigates the emotional binary between vulnerability and strength through a color palette that reflects fragility (pale green) against stability (dark violet). The play of broken dots and static patterns creates a collision at the center, symbolizing the tension of contrasting emotions. The upward flow mirrors hope amidst fragility, while the darker edges establish a sheltering boundary, leaving negative space that highlights the exposed center. These elements culminate in an abstract expression of the themes present in the seed.</desc>
