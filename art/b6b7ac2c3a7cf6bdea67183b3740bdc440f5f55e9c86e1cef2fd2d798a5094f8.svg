<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">This artwork captures the emotional tension between clarity and chaos—the 'signal' represented by bright greens and blues against the dense, static grays and blacks of 'noise'. The palette reflects the contrast between bright moments of clarity (electric blue, signal green) and overwhelming background noise (static gray, dead black). The layout features a central bright cluster that suggests a pulse of life amidst shadows, with broken pixels scattered throughout to symbolize imperfections and disruptions, embodying the notion of memory versus erasure. The visual structure leads the eye from vibrant signal clusters to darker ends, evoking a dynamic interplay of exposure and shelter, creating both resonance and tension.</desc>
