<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in the Void</title>
  <desc id="desc">This artwork captures the emotional dichotomy of envy and gratitude through contrasting colors and patterns. The palette of deep black, dark violet, soft gold, and pale green reflects fear and hope, creating tension. The central area features a dense cluster of soft gold and pale green, symbolizing gratitude and the warmth it brings, while the surrounding pixels of dark violet and black convey the coldness of envy. The interplay of stripes and grid patterns creates a visual argument, with the soft edges echoing the gentle push-pull of emotions. The piece leaves ample negative space, embodying the emptiness of an unfulfilled desire and the hope that lingers to fill it.</desc>
