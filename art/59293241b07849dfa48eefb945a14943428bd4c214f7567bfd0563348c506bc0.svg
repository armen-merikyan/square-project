<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Dissonance</title>
  <desc id="desc">This composition embodies the tension between defiance and submission. The chosen palette of pale aqua, mist gray, alarm red, ink blue, and clear white conveys a range of emotions from calm serenity to urgent intensity. The center, marked by a subtle clash of ink blue and alarm red, symbolizes defiance, while the surrounding mist gray represents submission, creating a palpable contrast. The broken pixels introduce irregularity, enhancing the artwork's abstract narrative. The flow of the composition echoes a pulse, suggesting movement through the diagonal rise while the uneven borders encapsulate the chaotic balance between order and disorder.</desc>
