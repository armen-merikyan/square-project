<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Points</title>
  <desc id="desc">The emotional tone of this artwork explores the duality of fear and hope through stark contrasts and spatial dynamics. The palette combines dark violets and soft golds to embody the tension between shadows and light, reflecting the 'collisions of emotion'. The sharp versus soft contrast emerges prominently in the center, where a burst of soft gold breaks through the surrounding dark, jagged edges, representing hope's persistence amidst fear's encroachment. The structured density on the edges and the negative space in the center create a narrative of pressure and release, evoking a feeling of a moment suspended in tumult.</desc>
