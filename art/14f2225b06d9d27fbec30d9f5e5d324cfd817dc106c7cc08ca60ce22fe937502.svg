<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition balances the themes of strength and vulnerability by using a dark base with singular light accents. The palette features deep navy for rooted strength and a singular white to symbolize exposed vulnerability. The central contrast emerges diagonally, where dense areas of dark colors clash with lighter hues, creating an impactful collision of strength against gentle exposure. The layout mimics a corner invasion, highlighting how vulnerability can unexpectedly disrupt established strength. The placement of broken pixels adds intentional disruptions, giving the artwork depth and implying imperfections found within emotional experiences.</desc>
