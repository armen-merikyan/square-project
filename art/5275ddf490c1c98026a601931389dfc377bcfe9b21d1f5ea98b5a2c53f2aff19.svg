<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Repair</title>
  <desc id="desc">This piece embodies the emotional pull between 'longing' and 'resolve.' The left half represents yearning with soft pinks and a patchwork pattern suggesting fragility and connection. In contrast, the dark maroon and firm edges on the right express a sense of strength and resolution. The interplay of both sides creates a dynamic tension, amplified by broken pixels that symbolize scars and repairs. The overall composition flows from left to right, emphasizing a journey from longing into resolve.</desc>
