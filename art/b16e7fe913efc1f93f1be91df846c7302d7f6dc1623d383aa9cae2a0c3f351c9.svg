<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This composition conveys an emotional tone reflecting both vulnerability and strength. The palette blends deep blacks with pale blues and whites to illustrate the dance between darkness (strength) and light (vulnerability). The main collision occurs at the center where dense stripes of black strike against airy channels of pale blue, symbolizing pressure contrasting with softness. Broken pixels interrupt the otherwise strong lines, reminding us of the fragility inherent in strength. The layout maintains a central focus with an exposed area, in keeping with the theme of vulnerability versus strength.</desc>
