<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">This composition captures the emotional tension between awe and terror, using a palette of dark and light tones to symbolize the contrast. The use of deep black (#000000) and pale blue (#A1C8E0) represents the heavy weight of terror against the illuminating spark of awe. The jagged edges and split screen layout suggest a battle between stability and chaos. The broken pixels introduce imperfection, reflecting the 'broken memory' theme, while maintaining negative space to allow the tension to breathe.</desc>
