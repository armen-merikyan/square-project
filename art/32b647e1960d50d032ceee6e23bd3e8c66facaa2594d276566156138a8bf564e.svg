<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This artwork reflects the emotional tension between vulnerability and strength. The palette of pink, red, gray, and dark maroon conveys warmth and intensity, symbolizing a clash between softness and robustness. The lighter colors in the center represent vulnerability, while the darker tones strengthen the edges, creating a frame for the more delicate core. The main collision occurs at the center, where different patterns—broken dots for strength and flame for vulnerability—intersect, embodying the concept of exposure versus shelter.</desc>
