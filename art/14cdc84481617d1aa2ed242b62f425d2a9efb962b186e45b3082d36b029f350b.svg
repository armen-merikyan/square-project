<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Existence</title>
  <desc id="desc">The emotional tone reflects the duality of emptiness and desire, captured through the contrast of warm and cool colors to express tension. The palette choices, primarily from the 'ancient_fire' family, highlight the warmth of burnt orange and dark red, symbolizing desire, while charcoal adds depth and weight of emptiness. This 8x8 arrangement uses radial patterns to suggest a rising signal against a backdrop of decay, creating a swirling motion that encapsulates the upward pull of desire and the downward weight of loneliness. The collision happens in the central structure, where the warm colors interrupt the cool space, while the burned edges add an element of imperfection, suggesting a fragment of a heart in motion. Negative space maintains a sense of emptiness throughout, emphasizing the emotional struggle.</desc>
