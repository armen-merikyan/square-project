<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order Emerging from Chaos</title>
  <desc id="desc">This abstract artwork captures the emotional dichotomy between envy and gratitude, revealing a visual tension between dark and light. The color palette, sourced from 'fear_hope', utilizes warm tones of soft gold against the overwhelming depths of black and dark violet, symbolizing the battle between positivity and negativity. The top four rows feature a dense, maze-like pattern reflecting envy—confused and chaotic—while the bottom four rows showcase a structured checker pattern symbolizing gratitude, illustrating how feelings can coalesce into clarity. The contrast is most pronounced where the maze edges bleed into the smoother checker pattern, representing emotional intersections. The arrangement fosters an unsettling resonance of rising and falling emotions, allowing space for contemplation and reflection.</desc>
