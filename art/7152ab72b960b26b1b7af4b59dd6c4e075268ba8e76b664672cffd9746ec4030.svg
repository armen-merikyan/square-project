<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">This artwork explores the tension between clarity and distortion, symbolizing the struggle between readable signals and disruptive noise. The palette combines the vibrant signal green and electric blue as focal points against static gray and dead black, creating a visual dialogue of clarity versus confusion. The top four rows densely embody the signal, forming a clear channel expression that pulses, while the bottom half becomes an echoic disturbance with chaotic patterns. Broken pixels introduce intentional imperfection, allowing a play of memory and erasure, feeding into the notion of fleeting clarity disrupted by the overwhelming static.</desc>
