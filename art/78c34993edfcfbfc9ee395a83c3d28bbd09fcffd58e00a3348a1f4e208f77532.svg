<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Release</title>
  <desc id="desc">This piece captures the emotional tension between 'quiet' and 'pressure'. The palette of off-white, dust gray, compressed red, dark navy, and faint peach portrays a warm vs cool contrast, establishing a dense core of emotion on the left transitioning to a quieter space on the right. The broken pixels symbolize disruptions amid swirling patterns, as the pulse marks of pressure contrast against the softer maze-like structure of calm, suggesting the struggle and interplay between chaos and serenity. The collision occurs along a diagonal line from the lower left to upper right, suggesting movement and counterflow.</desc>
