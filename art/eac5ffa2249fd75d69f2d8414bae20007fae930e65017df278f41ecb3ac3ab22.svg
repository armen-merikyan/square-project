<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamics of Containment</title>
  <desc id="desc">This piece conveys a complex emotional tension between calm and fury, utilizing a palette that juxtaposes intense reds with tranquil blues and blacks. The darker colors represent the quiet fields of containment, while the bright reds suggest a chaotic overflow of emotion. Distinct wave patterns emerge from soft, braided calm layers interrupted by sharp static figures of rage, creating a vibrant rhythmic pulse throughout the grid. The layout features two contrasting centers, one representing calm and the other rage, which interact dynamically across the piece.</desc>
