<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasts of Connection</title>
  <desc id="desc">This pixel artwork embodies the tension between loneliness and connection. The palette leans towards warm hues of yellow and orange, representing the desire for connection, juxtaposed with deep blues and muted purples that suggest isolation. The pattern of crosshatching and framing echoes the tension between feeling exposed and hidden, while the use of broken pixels introduces an element of unpredictability that enhances the emotional depth. The layout mirrors itself with slight asymmetries, symbolizing the fractured nature of relationships and the feeling of being alone in a crowd.</desc>
