<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Emotion</title>
  <desc id="desc">This piece captures the conflicting emotions of defiance against submission through a stark palette of black, pale blue, and white, representing the tension between contrast and balance. The left-to-right flow is accentuated by a mirrored layout, disturbed by 'broken pixels' which represent interruptions in emotional continuity, emphasizing struggle. The use of dense black juxtaposed with softer blues invokes feelings of weight and lightness, a dance of pressure and release. Overall, the arrangement reflects layered complexities inherent in emotions towards rejection and acceptance.</desc>
