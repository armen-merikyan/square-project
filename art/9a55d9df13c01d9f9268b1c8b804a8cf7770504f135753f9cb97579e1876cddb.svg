<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Spaces</title>
  <desc id="desc">This abstract piece captures the emotional tension between panic and control. The use of a dark palette with navy and black evokes a sense of confinement and instability, while the dim cyan intersperses a cold, minimal light—representing moments of clarity amidst chaos. The outer edges adopt a hard edge style to emphasize the boundaries of control, while the fragmented pixels signify the intrusion of panic. The center, filled with dim cyan and soft grays, represents an orbit of calm wavering within surrounding unease. The overall structure hints at an echo of conflict between empty spaces and clustered thoughts, inviting the viewer to navigate an emotional labyrinth.</desc>
