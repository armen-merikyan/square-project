<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Trust</title>
  <desc id="desc">This composition explores the tension between trust and suspicion through a palette that balances resilience with fragility. The soft glow of bone white contrasts sharply against the deeper moss green and rust accents, representing the layers of doubt creeping into the space of certainty. The chaotic arrangement suggests interruption, reflecting the uneven distribution of emotions where trust dominates yet is challenged by suspicion. The diagonal fall of color creates movement, while the feathered edges indicate vulnerability surrounding a central calm area formed by lighter hues.</desc>
