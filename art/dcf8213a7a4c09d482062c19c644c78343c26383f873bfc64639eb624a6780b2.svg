<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This composition embodies the emotional tension of desire versus restraint through a blend of saturated and muted colors. The palette of red oxide, blackened plum, muted cream, iron gray, and small orange reflects both warmth and limitation, creating a dialogue between vibrancy and subtlety. The main collision occurs in the center, where the rain pattern of warmth disrupts the lattice of muted restraint, creating a striking contrast that conveys the push-pull dynamic of desire against the boundaries of restraint. Broken pixels introduce intentional imperfections, enhancing the raw emotional quality of the piece while maintaining negative space to allow breathing room amidst the tension.</desc>
