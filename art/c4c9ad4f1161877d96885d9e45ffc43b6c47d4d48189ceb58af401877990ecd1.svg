<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Vulnerability</title>
  <desc id="desc">The composition captures the emotional tug-of-war between safety and exposure through contrasting color zones. Using soft greens and warm browns to signify safety, complemented by pale skins and cold whites for exposure, the piece evokes a sense of vulnerability enclosed by gentle weight. The distinct split-screen pattern suggests division and interaction, where contrasting colors pulse against each other amidst negative space. The collision point, centered and highlighted by a warm brown, reflects the tension while the remaining sections offer both softness and severity, embodying the multifaceted experience of human emotion.</desc>
