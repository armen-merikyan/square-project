<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Suspicion</title>
  <desc id="desc">This composition captures the emotional tension between trust and suspicion through color and pattern. Charcoal serves as the stable background, representing trust's solid foundation. Hot coral and blood orange create flashes of warm intensity, evoking feelings of suspicion and urgency. The glitch-like patterns introduce disruptions, highlighting the emotional chaos in the face of underlying stability. The main collision occurs in the center, where the vibrant colors interrupt the muted tones, showing the interplay of emotions. Negative space allows for breathing room, balancing the chaos with moments of calm.</desc>
