<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal Fracture</title>
  <desc id="desc">The artwork captures the tension between trust and suspicion, represented by the contrasting colors of soft enclosure (signal green and static gray) against interruptions of hard shadow (electric blue and hot magenta). The central pulse of trust radiates outwards while suspicion lurks in fragmented shapes, creating a dynamic interplay. This follows the seed's theme of resilience against fragility, as the arrangement suggests a movement from calmness to pressure, with broken pixels disrupting the continuity to symbolize hesitation or doubt.</desc>
