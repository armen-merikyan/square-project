<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos of Relief</title>
  <desc id="desc">The emotional tone reflects a dynamic tension between dread and relief, expressed through contrasting color palettes. The dark shades (#000000, #3B3B3B, #5A5A5A) represent dread with heavy saturation, while the lighter hues (#89CFF0, #A3D9B4, #F5E47A) evoke feelings of relief. The main collision occurs in the center, where the dark and light colors overlap, creating a visual struggle. The use of organized chaos, represented by irregular broken pixels, hints at the complexity of these emotions while the 'corner_invasion' layout signifies how dread starts to invade the space but is gradually countered by relief. The result is an abstract pattern that conveys the push and pull of contrasting feelings.</desc>
