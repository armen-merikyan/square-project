<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This composition captures the emotional dichotomy of joy and grief through color and pattern. The warm tones of yellow and orange suggest joy, while deep blue and muted purple introduce the grief aspect. The zigzag flow symbolizes movement and conflict, with contrasting warm and cool colors colliding at the edges, representing the push and pull of life's emotional complexities. The design includes broken pixels to create a sense of fragmentation, aligning with grief, against a backdrop of more rounded, vibrant areas that suggest expansion and hope.</desc>
