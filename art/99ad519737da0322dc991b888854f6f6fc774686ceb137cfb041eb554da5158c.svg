<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light and Weight</title>
  <desc id="desc">This composition embodies the contrast between joy and grief, reflecting the emotional collision of brightness against darkness. The upper rows use vibrant yellows and oranges to signify joy, arranged in a zigzag pattern that creates a sense of movement and rising energy. The lower rows embody grief through deeper blue tones and muted purples, presenting a heavier and more fragmented appearance. The checker against spark motif introduces structure amidst chaos, offering a visual bridge between conflicting emotions. The broken pixels add imperfection, enhancing the emotional depth and complexity.</desc>
