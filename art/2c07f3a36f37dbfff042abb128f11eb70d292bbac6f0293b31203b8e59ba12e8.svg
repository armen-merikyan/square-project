<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Flicker of Echoes</title>
  <desc id="desc">This piece captures the complex emotions of loneliness and connection through a palette inspired by fire—warm burnt orange, dark red, and contrasting charcoal and gold. The use of broken edges and unsymmetrical patterns reflects a sense of disarray typical of memories that haunt yet connect us. The fiery tones evoke warmth fighting against the dark, echoing loneliness, with clusters of warmth suggesting connections. The placement of colors creates tension, emphasizing the contrast of light and weight as bright pixels occasionally interrupt deeper hues, representing moments of connection among fragmented memories.</desc>
