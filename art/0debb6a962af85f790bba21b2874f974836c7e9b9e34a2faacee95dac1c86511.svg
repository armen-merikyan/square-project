<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Repair</title>
  <desc id="desc">The emotional tone strikes a balance between longing's incomplete satisfaction and resolve's assertive strength. The soft, muted colors of pale mint and soft sky represent longing, creating a quiet space, whereas the storm gray and near black provide a sense of structure and strength for resolve. The collision occurs at the central seam, where longing's fragile mirror pattern intersects with resolve's more rigid split-screen, conveying the tension of a thread holding two opposites together. Broken pixels add intentional disruption, indicating scars of past damage amidst a call for repair.</desc>
