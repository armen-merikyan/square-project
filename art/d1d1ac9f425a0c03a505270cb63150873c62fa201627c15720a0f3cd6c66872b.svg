<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This piece captures the tension between 'relief' and 'dread' through a stark contrast of colors and patterns. The bright electric blue and lime green represent moments of hope and escape, fighting against the overpowering presence of black and muted tones which convey heaviness and dread. The grid pattern signifies the structure of the empty room, while imperfections introduced by broken pixels symbolize the disruption in symmetry and the emotional break. The layout evokes a sense of climbing pressure from bottom to top, suggesting a struggle between upward momentum and the weight of despair, embodying the seed's conflict beautifully.</desc>
