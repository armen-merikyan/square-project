<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork encapsulates the tension between emptiness and desire through a palette that contrasts vibrant warmth with muted tones. The core of the piece features a dense cluster of hot coral and blood orange, representing desire, while the surrounding areas are filled with hollow blue and charcoal, evoking emptiness. The collision occurs centrally, where the vibrant colors struggle against the edges defined by the cooler hues, creating a visual representation of tension and restraint. Broken pixels introduce intentional imperfection, reflecting the struggle against containment and the desire to overflow.</desc>
