<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone explores the tension between desire (represented by warm coral and orange hues) and emptiness (expressed through muted blue and charcoal). The palette evokes warmth and longing, while the layout splits the square, creating a clear delineation. The collision happens at the center of the piece, where saturated colors break against softer fields. The use of broken pixels interrupts the pattern, reflecting the unsettling nature of desire surrounded by emptiness, embodying the seed's themes of containment and overflow.</desc>
