<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Layers</title>
  <desc id="desc">This artwork explores the emotional tension between defiance and submission through contrasting patterns and colors. The palette combines 'shelter_green' and 'warm_brown' to symbolize the protective nature of defiance against the soft embrace of submission, representing inner conflict. The central region, where noise and stepwell patterns collide, evokes tension as sharp, upward bursts of bright color disrupt muted fields. This arrangement speaks to the chaos of inner struggle, illustrating the notion of a protective center invaded by swirling layers of emotion, mirroring the theme of resilience amid vulnerability.</desc>
