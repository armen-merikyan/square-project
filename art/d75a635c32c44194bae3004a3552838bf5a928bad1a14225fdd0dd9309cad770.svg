<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Spectrum</title>
  <desc id="desc">This artwork captures the tension between joy and grief through a palette of warm yellows and muted purples, blending lighter tones that suggest joy with deeper, heavier shadows that represent grief. The contrast is emphasized through a diagonal flow, creating a zigzag effect that forces the viewer's eye to traverse the square and feel the emotional battle. The broken pixels introduce a sense of imperfection and flux, suggesting that both joy and grief can coexist within the same emotional space, while the empty areas create a breathable calm amidst the intensity of the colors. The pattern of 'rain' for joy interacts with 'broken dots' for grief, reflecting an ongoing struggle between lightness and heaviness. All together, it embodies the play of order versus chaos, with the color interactions suggesting ongoing signals of emotionality.</desc>
