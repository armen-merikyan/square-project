<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This composition embodies the tension between love and betrayal with a palette of soft pinks and deep maroons juxtaposed against gray. The arrangement speaks to the contrast of shared warmth (love) versus the coldness of isolation (betrayal). The flow from top to bottom mimics falling tears or a descending tumult of emotions, while broken pixels in the layout evoke a sense of imperfection and fracture akin to a broken heart. The inner pixel cluster, softer in hue, signals warmth, while sharper, darker edges create a sharp contrast, emphasizing the emotional collision at the center.</desc>
