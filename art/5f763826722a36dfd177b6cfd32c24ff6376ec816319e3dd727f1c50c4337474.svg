<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece explores the emotional tension between vulnerability and strength through a contrasting color palette of burnt orange and dark red for intensity, while charcoal and gold add depth and highlights. The central pixels are designed with a broken dots pattern representing strength, while the surrounding ones employ a crosshatch to convey vulnerability. The layout creates a tension point in the center where these patterns intersect, symbolizing the collision of these emotional states. Broken pixels add intentional disruptions, symbolizing flaws and imperfections in strength and sanctuary, consistent with the seed's themes.</desc>
