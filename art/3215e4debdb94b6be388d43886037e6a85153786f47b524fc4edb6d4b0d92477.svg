<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Dynamics</title>
  <desc id="desc">This artwork captures the emotional tension between love and betrayal. The left side utilizes warm hues of pink and red to evoke love's warmth, while the right side employs cool grays and dark maroon to symbolize the coldness of betrayal. The split layout contrasts these emotions, with a chaotic pattern on the betrayal side that resembles cracks, representing disorder and conflict. The contrasting densities of color create a visual rhythm, echoing the heart's fracture amidst the intertwined feelings of closeness and distance. The 'burned edges' add a textural discrepancy, enhancing the sense of imperfection and unresolved emotions, while maintaining negative space throughout to symbolize calm amid chaos.</desc>
