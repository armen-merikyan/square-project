<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order in Chaos</title>
  <desc id="desc">This artwork explores the tension between softness and severity through a thoughtful color palette and arrangement. The dominant colors, powder pink and warm white, symbolize softness and innocence, creating gentle fields. In contrast, carbon black and sharp crimson introduce severity and sharpness, disrupting the soft flow. The pattern begins in the top-left corner, symbolizing an invasion of chaos into tranquility, while the bottom rows maintain a heavier weight, suggesting a grounding presence amidst the turmoil. This collision between emotions reflects the duality of guilt and forgiveness, where softness seeks to envelop severity but is constantly interrupted.</desc>
