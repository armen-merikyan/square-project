<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Command</title>
  <desc id="desc">This composition embodies the emotional tension between control and surrender through a stark contrast of colors. The use of electric blue and magenta represents bursts of intense feeling and energy, while the black acts as a heavy anchor, symbolizing containment and pressure. The arrangement of colors in jagged edges creates a stuttering step that visually interrupts the flow, aligning with the seed's themes of overflowing and containment. The center is dense, with bright accents radiating tension outward, suggesting an emotional collision around the core, while negative space allows for quiet contemplation surrounding this dense focal point.</desc>
