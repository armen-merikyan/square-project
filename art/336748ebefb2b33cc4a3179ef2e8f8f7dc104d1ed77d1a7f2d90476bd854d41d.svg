<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Crossing Echoes</title>
  <desc id="desc">This composition explores emotional tension between longing and resolve, displayed through contrasting patterns of ripple and noise. The warm clay and distant lilac hues embody the feeling of longing, while structured noise in the deeper cool blues and warm shadows signifies resolve. The collision of these emotional states is manifested at the center, with more chaotic patterns colliding with the softer ripples. The use of broken pixels introduces imperfection, alluding to the faults and uncertainties of connection, while ensuring a negative space that echoes the distance between the two emotions.</desc>
