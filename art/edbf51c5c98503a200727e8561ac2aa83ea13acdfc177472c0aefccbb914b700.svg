  <title id="title">Eroded Symmetry</title>
  <desc id="desc">The artwork embodies the duality between trust and suspicion through a split of cool and warm tones, with pale mint and soft sky representing trust, while storm gray and near black evoke suspicion. The ring pattern on the left suggests stability, while the islands on the right display fragmentation. The center serves as the main collision point, where two contrasting patterns create a tension, reflecting the struggle between certainty and doubt. The slight incorporation of broken pixels enhances the imperfection and emotional dissonance inherent in this theme.</desc>
