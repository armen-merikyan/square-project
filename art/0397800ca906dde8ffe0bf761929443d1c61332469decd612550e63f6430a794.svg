<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance in Flux</title>
  <desc id="desc">This composition navigates the emotional duality of strength and vulnerability, visually represented through the use of a warm palette with cool accents. The strength is conveyed through the stable, clear blocks of warm coral, forming a strong central structure, while the vulnerability appears as softer barcodes in shades of cold slate and signal cyan, creating tension. The contrast is orchestrated primarily in the center, where the barcode-like weak structures intersect and disrupt the strong grid of warm blocks, embodying the struggle and interdependence of the two emotions. Negative space is maintained to enhance the breathability of the composition, evoking a sense of yearning.</desc>
