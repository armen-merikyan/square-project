  <title id="title">Echoes of Control</title>
  <desc id="desc">This artwork captures the tension between panic and control using a palette inspired by ancient fire. The use of burnt orange and dark red evokes a sense of warmth and urgency, contrasting with cooler charcoal tones that provide grounding. The layout suggests falling pixels, representing a descent into chaos, while a mix of structured and broken patterns reflects stability versus instability. The main collision happens where tightly arranged 'target' patterns of control intersect with scattered 'dot' patterns of panic, creating a visual representation of emotional conflict.</desc>
