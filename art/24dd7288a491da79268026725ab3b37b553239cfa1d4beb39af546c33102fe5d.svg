<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">The emotional tone of this piece explores the duality of fear and hope, creating a dynamic tension that reflects both bright possibility and darker uncertainties. The chosen palette of black, dark violet, soft gold, and pale green serves to symbolize fear as depth and heaviness against hope’s illuminative potential. The vertical split layout allows fear to emerge from the left side in jagged patterns, while hope trails upward from the right in a softer, stair-like flow. The contrast of bright gold and green against deep shadows creates a collision between light and weight, suggesting an eternal struggle that invites the viewer to reflect on their own experiences of pressure and uplift.</desc>
