  <title id="title">Collision of Calm and Chaos</title>
  <desc id="desc">This artwork embodies the emotional tension between restlessness and peace. The palette features warm browns and cool whites to represent the dichotomy—dusty warmth captures the sense of unrest, while cold whites suggest the tranquility of a serene state. The main contrast occurs diagonally across the grid, where the structured stacking of cool colors meets the cracked, jagged warmth of restless tones, resulting in visual friction that echoes the feelings of memory against motion. The broken pixels serve as intentional disruptions, emphasizing a narrative of struggle between competing emotional states.</desc>
