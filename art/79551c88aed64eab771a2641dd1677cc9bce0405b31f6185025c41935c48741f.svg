<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This piece embodies the emotional tension between quietude and pressure—the top four rows express a soft, muted quality while the bottom four rows convey a dense, glitch-like chaos. The palette features off-white and faint peach to evoke tranquility, contrasted by compressed red and dark navy representing pressure. The sharp transitions suggest a collision at the border where stillness meets agitation, manifesting as a diagonal shift in color density. Overall, the structure creates a visual wave that resonates with the argument for balance amid conflict.</desc>
