<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of a Pulse</title>
  <desc id="desc">The emotional tone reflects a battle between clarity (signal) and distortion (noise). The palette of deep navy and crisp white conveys a feeling of solitude amidst the chaos of dim cyan for background noise. The signal is represented by bright white clusters at center, creating a pulse effect, while navy and subtle gray tones form the surrounding noise that encroaches. The arrangement follows a falling pattern, suggesting the overwhelming descent of noise as it weighs on the clear signals. Broken pixels disrupt the flow, adding to the feeling of disintegration amidst static.</desc>
