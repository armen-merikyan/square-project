<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This composition explores the emotional tension between safety and exposure. The warm brown and shelter green evoke a sense of protection, forming a soft barrier in the layout. The paler colors ripple throughout, suggesting vulnerability and a thin shelter for contrast. The collision occurs in the center where the brightness of the cold white and open blue disrupts the soothing tones, symbolizing exposure amidst safety. The asymmetry emphasizes a struggle between these emotions, while broken pixels add depth and imperfection to the overall structure, illustrating the vulnerability of exposed elements against protective surroundings.</desc>
