<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Emotion</title>
  <desc id="desc">This artwork captures the emotional battle between fear and hope through a careful arrangement of light and dark colors. The palette, consisting of deep blacks, dark violets, soft golds, and pale greens, reflects the push and pull of the two emotions. The contrast is most pronounced at the center, where dark edges collide with lighter hues, suggesting a burst of hope amidst fear. The chosen pattern of crack and mirror reflects this struggle and creates a dynamic flow from dark to light, embodying the tension and eventual release. The deliberate inclusion of negative space reinforces the feeling of isolation that often accompanies fear, while the upward movement towards hope resists the downward pressure of the dark corners.</desc>
