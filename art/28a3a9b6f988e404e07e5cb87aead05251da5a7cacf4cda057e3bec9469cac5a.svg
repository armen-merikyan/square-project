<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This abstract piece contrasts joy and grief through an interplay of dense warm and cool colors. The palette of yellows and oranges signifies joy, while deeper blues and muted purples epitomize grief. The split horizontal layout creates a clear division, suggesting the emotional push between light and dark feelings. The wavy vertical lines promote a sense of movement and rhythmic tension, while the crosshatch pattern introduces an element of complexity, hinting at the intertwined nature of contrasting emotions. Negative space is utilized to evoke quietness amidst density, fostering a juxtaposition that resonates with the seed's themes of conflict and harmony.</desc>
