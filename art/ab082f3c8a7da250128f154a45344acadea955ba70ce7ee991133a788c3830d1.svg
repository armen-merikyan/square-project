<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Certainty and Curiosity</title>
  <desc id="desc">The emotional tone reflects the tension between the solid foundations of certainty and the fluid exploration of curiosity. I chose a palette that contrasts warm browns and cool greens to embody this struggle—warmth of certainty grounding amidst the curious, open blue. The main collision occurs in the center with a burst of open blue accenting muted tones, creating a sense of movement. The broken pixel disruptions symbolize moments of questioning within the established boundaries, echoing the tension of rising signals against traditional structures.</desc>
