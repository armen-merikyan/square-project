<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece embodies the emotional tension between rage and calm, emphasizing the battle between hot, expressive colors and cooler, serene tones. The palette was selected to juxtapose the fiery red against the calming pale blue and white, symbolizing the moments where chaos interrupts peace. The arrangement reflects a zigzag flow, reinforcing the conflict, with warmer, sharper colors occupying the bottom and central regions while cooler spaces at the corners create the quiet field. This clash, especially centered, suggests a volatile energy trying to break free from containment.</desc>
