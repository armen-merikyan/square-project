  <title id="title">Fractured Affection</title>
  <desc id="desc">The emotional tone navigates between warmth and tension, encapsulating the dichotomy of love and betrayal. The palette combines pink and red for warmth with dark maroon for somber contrasts, illustrating the softness of affection against the sharpness of betrayal. The main contrast occurs in the left and right columns representing love and betrayal, respectively, while the subtle shifts in grayscale provide complexity against the vibrant tones. The arrangement is intentionally asymmetrical, signifying the fractured nature of emotions as reflected in the seed.</desc>
