<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger in Restraint</title>
  <desc id="desc">The emotional tone is characterized by the struggle between desire and emptiness, represented through contrasting colors. The palette combines the warm vibrancy of desire with the cool desaturation of emptiness, invoking a sense of pulsating tension. The main collision occurs at the center where warm coral and orange hues meet subdued charcoal and blue, symbolizing an overwhelming urge pressed against a boundary of containment. The arrangement reflects spirals and disordered flows that echo the notion of pressure and release, with broken pixels acting as intentional disruptions, enhancing the narrative of longing against limitations.</desc>
