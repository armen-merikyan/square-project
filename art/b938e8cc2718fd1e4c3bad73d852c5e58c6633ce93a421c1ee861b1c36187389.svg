<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality in Pixels</title>
  <desc id="desc">The emotional tone reflects the struggle between vulnerability and strength. The color palette of signal green, electric blue, hot magenta, dead black, and static gray conveys a sense of tension; busy colors represent strength while muted tones embody vulnerability. The collision occurs at the center where the contrasting patterns of flame (strength) and barcode (vulnerability) disrupt each other, creating visual friction. This arrangement suggests an inner 'core' of turmoil surrounded by protective layers, embodying the journey from exposure to shelter.</desc>
