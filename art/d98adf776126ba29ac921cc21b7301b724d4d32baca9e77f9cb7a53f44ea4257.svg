<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Balancing Forces</title>
  <desc id="desc">This artwork captures the emotional undertone of defiance versus submission using contrasting elements of dark and light. The palette draws from 'rage_calm', with deep blacks representing submission's weight and lighter blues indicating defiance's optimism. The central focus is a jagged edge of black intersecting with pale blue hints, evoking disruption against an otherwise subdued frame. As the colors cascade from heavier to lighter, the arrangement symbolizes a tension between openness and closure, speaking to the struggle between love and betrayal. Moreover, some pixels are intentionally broken, introducing imperfections that reflect the chaos within these emotional states.</desc>
