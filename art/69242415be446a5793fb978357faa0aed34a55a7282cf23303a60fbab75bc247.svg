<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece captures the emotional conflict between emptiness and desire through its split-horizontal layout, conveying the tension of a saturated pull versus a secured boundary. The top half uses colors like hot coral and blood orange, representing desire in a vibrant ash-field pattern that suggests a reaching diagonals motif, while the bottom half employs charcoal and hollow blue to depict emptiness with a distant veil-like quality. The main collision occurs at the midline, where warm saturation meets cool restraint, highlighting the struggle between overflowing desire and containment. The selected palette and broken pixels symbolize disruptions in the emotional flow, enhancing the piece's narrative of tension and unresolved longing.</desc>
