<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a struggle between saturated desires and muted restraints. The pick of deep, rich colors like red oxide and blackened plum symbolizes the warmth of longing, both visceral and intense. In contrast, muted cream and iron gray evoke the sensation of constraints keeping that heat in check. The layout of falling pixels resembles tears or rain, where the saturation flows but is met with a resistant edge, creating an impactful climax in the center of the square, where desire and restraint collide. This arrangement promotes a visual tension that mirrors the emotions articulated in the seed.</desc>
