  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This artwork explores the interplay between vulnerability and strength. The soft hues of the palette convey vulnerability, with a pale emphasis on the center. This exposed area contrasts against deeper, more saturated tones representing strength, creating a dynamic clash within the composition. The jagged edges symbolize brokenness, with intentional disruptions throughout. The layout highlights negative space, representing the tension between the two emotional poles while the pulse of contrasting colors disrupts the static flow, encapsulating an emotional rhythm.</desc>
