  <title id="title">Fractured Resilience</title>
  <desc id="desc">This artwork conveys the emotional tension between vulnerability and strength through a palette of soft and harsh tones. The sepia and tan colors evoke a sense of nostalgia and warmth, while the dust gray and faded blue introduce elements of coldness and detachment. The main collision occurs in the center where broken dots symbolize vulnerability amid stronger stepwell patterns representing resilience. The balance of colors and spatial elements reflects both exposure and shelter, inviting contemplation of the interdependence of these emotional states.</desc>
