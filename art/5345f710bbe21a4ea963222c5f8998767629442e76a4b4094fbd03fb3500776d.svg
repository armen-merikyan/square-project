<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamics of Exposure</title>
  <desc id="desc">This artwork captures the emotional contrast between vulnerability and strength through its color selection and patterning. The palette consists of soft (powder pink, warm white) and severe (carbon black, steel gray, sharp crimson) colors, symbolizing the push and pull of these emotions. The arrangement of colors features a dense, stable center (black and gray) surrounded by soft pink and white, suggesting a protective core against the outside pressures and vulnerabilities. The main collision occurs in the center with darker shades, while lighter tones create gentle channels that lead toward the edges, embodying the tension between exposure and shelter. The broken pixels introduced are intentional disruptions that symbolize scars while enhancing the abstract narrative of connection and alienation.</desc>
