<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulses of Contrast</title>
  <desc id="desc">This piece explores the emotional tension between strength and vulnerability through a palette that juxtaposes soft tones with deeper shades. The color transitions from muted lavenders and soft cyans create an echo of vulnerability, while the denser, darker rain blue and muted plum suggest strength. The central collision occurs as two lighter centers pulse against a brooding negative space, symbolizing the struggle and coexistence of these feelings. The jagged edge style reinforces the concept of breaking barriers, while intentional broken pixels add depth, representing the scars of experience. Overall, the arrangement encourages a narrative of conflict and coexistence without literal representation.</desc>
