<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Broken II: Tension and Release</title>
  <desc id="desc">This composition captures the tense emotional interplay between longing and resolve. The palette, inspired by burnt orange and dark red, conveys urgency and depth, while the charcoal and gold allow for contrasts and highlights. The collision occurs in the center, where the structured 'hinge' pattern of resolve meets the fragmented 'teeth' pattern of longing, creating a sense of reaching and retreating. Negative spaces throughout whisper of serenity that underpins the urgency, echoing the themes of 'contained vs overflowing.'</desc>
