  <title id="title">Chaotic Balance</title>
  <desc id="desc">This artwork embodies the tension between panic and control. The palette of electric blue, lime, magenta, and black creates a dynamic interplay of vibrant energy and deep voids, suggesting a struggle between feelings of instability and moments of focus. The outer rows depict a chaotic burst of color (reflective of panic) against a structured core of darker, stable tones (embodying control), while broken pixels interrupt patterns to signify disorder within a structured layout. The stark contrasts amplify the emotional intensity.</desc>
