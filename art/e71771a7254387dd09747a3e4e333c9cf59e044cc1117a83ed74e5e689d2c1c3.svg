  <title id="title">Fractured Balance</title>
  <desc id="desc">This composition embodies the emotional clash between love and betrayal. The warm tones of pink and red represent love, creating a cozy atmosphere marred by the sharp contrasts of dark maroon and gray, which signify betrayal and inner conflict. The palette of love_betrayal evokes tenderness yet introduces tension with the darker hues. The mirrored layout has intentional breaks to illustrate the disruptions inherent in emotions, while the crosshatch pattern against smooth surfaces symbolizes the chaos within stability. Main collisions occur where the warm colors disrupt the cool shades, creating an energetic push-pull across the canvas.</desc>
