<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order Amidst the Chaos</title>
  <desc id="desc">This composition reflects the tension between control and panic, using a palette that juxtaposes warm yellows and deep blues to illustrate the clash of emotions. The radial pattern lends a sense of order on one side while harsh stripes break in from the other, creating a visual echo of instability. The arrangement of colors intentionally leaves empty spaces, suggesting an 'inside vs outside' dynamic, while the contrasting sections provide a vivid narrative of conflict, centered around the concept of an 'empty room' filled with unexpressed emotions.</desc>
