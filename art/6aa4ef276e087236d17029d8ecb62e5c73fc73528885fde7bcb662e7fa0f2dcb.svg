<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echos of Shelter</title>
  <desc id="desc">The emotional tone captures the tension between safety and exposure, with an emphasis on how protective barriers can coexist with openness. The palette, featuring shelter green and warm brown, creates a warm, secure feel punctuated by cold white representing exposure. The split from left to right creates a visual tension, as 'safety' aligns with darker, heavier colors on the left, while 'exposure' lightens towards the right, creating a gentle crescendo of open space. The main collision occurs at the central vertical boundary where rich warmth meets a light, airy shell, embodying the concept of protection versus vulnerability without literal interpretation.</desc>
