<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasted Whispers</title>
  <desc id="desc">This piece explores the emotional tension between softness and severity through the juxtaposition of warm and cool colors. The palette of powder pink, warm white, carbon black, steel gray, and sharp crimson reinforces this contrast, highlighting edges with gentle hues and darker tones. The collision occurs centrally, where the heavier black and crimson tones meet the lighter pinks and whites, creating a sense of pressure and release. The spiral pattern inspired by the seed evokes a sense of movement, suggesting an inward pull against the boundary, thereby embodying both guilt and forgiveness through overlapping forms.</desc>
