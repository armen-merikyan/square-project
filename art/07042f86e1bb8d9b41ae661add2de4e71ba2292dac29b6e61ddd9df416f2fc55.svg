<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Facing Duality</title>
  <desc id="desc">This piece captures the emotional contrast between loneliness and connection through color density and placement. The palette of burnt orange, dark red, charcoal, and gold evokes warmth but also a sense of ancient fire, representing the rawness of loneliness alongside flickers of connection. The left half is dominated by a crosshatch pattern in darker shades with lighter accents to indicate the isolation, whereas the right incorporates sparking gold touches within a richer background. The top weighting and jagged edges interject an abruptness, embodying the unresolved tension between the two emotional states. Negative space is respected to reinforce the theme of isolation, making the vibrant clusters on the right appear almost as bursts of connection against a backdrop of quiet solitude.</desc>
