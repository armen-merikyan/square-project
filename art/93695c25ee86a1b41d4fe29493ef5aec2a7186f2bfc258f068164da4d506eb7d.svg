<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This artwork encapsulates the emotional duality of joy and grief through a dynamic flow. The upward movement on one side contrasts with the downward drift on the other, suggesting a tension between expansion (joy) and constriction (grief). The palette of bright yellow and orange versus deep blue and muted purple enhances this contrast, creating a visual echo of light against shadow. As the zigzag pattern reflects both joy's grid-like structure and grief's mirror-like depth, the arrangement reflects the complexities of human emotion. The imperfect edges and spaces provide breaks, signifying moments of pause and reflection amidst the emotional flow.</desc>
