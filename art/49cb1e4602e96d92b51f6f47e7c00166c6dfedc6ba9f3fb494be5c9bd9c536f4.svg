  <title id="title">Tension of Symmetry</title>
  <desc id="desc">This artwork captures the emotional dichotomy of love and betrayal through contrasting shapes and colors. The palette of reds and grays conveys warmth and coldness, suggesting intimacy and pain. The structured diagonal rise creates a sense of movement, while the sharp edges clash against softer hues to emphasize the tension between the emotions. The pattern reflects a maze on one side (love) and chaotic teeth-like textures on the other (betrayal), exemplifying the collision of these feelings without literal representation.</desc>
