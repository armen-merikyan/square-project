<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This artwork captures the emotional tension between envy and gratitude through contrasting colors. The palette of warm yellows and oranges symbolizes gratitude, while deep blues and muted purples convey the weight of envy. The presence of staggered patterns—rings and split screens—illustrates the dynamic between stability and disruption, with one half rising while the other falls. There are intentional collisions where warm colors encroach on cooler ones, representing the interplay of emotions. The 'tear' shape seed is abstractly suggested through the zigzag lines and off-center placement, enhancing the feeling of imbalance amid beauty. Broken pixels are subtly introduced, creating a visual sense of imperfection and resonance through the color flow.</desc>
