<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict and Harmony</title>
  <desc id="desc">The emotional tone captured here is a dialogue between rage and calm. The palette features strong contrasts with vibrant reds clashing against the soft tranquility of pale blue and whites, suggesting a struggle between emotional extremes. The red dots representing rage are intentionally placed to disrupt the calm blue grid that embodies serenity, with the dots breaking out of contained boundaries—echoing the chaos within a structured environment. The composition plays with rising signals, where energy flows from a denser bottom upward, evoking a sense of hope amidst turmoil. The main collision occurs in the center where the rage dominates—a visual representation of overwhelming emotion grappling with an attempt at order.</desc>
