<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers and Glimmers</title>
  <desc id="desc">This artwork captures the dichotomy of sparkle and dullness, contrasting the vibrancy of life with the remnants of what once was. The palette, dominated by darks and punctuated with bright oranges, reflects the interplay of ash-like calm and sudden ignition. The center is engulfed in a jagged mass of deep-gray color, symbolizing restraint and quiet, while peppering vibrant accents that burst forth, suggesting resilience and the longing for renewal. The pattern reflects an echo of conflict, with a balance of dense, muted fields interspersed with dynamic sparks, serving as a metaphor for memory against erasure.</desc>
