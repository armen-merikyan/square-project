<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Flame and Dust</title>
  <desc id="desc">The emotional tone of the piece revolves around the juxtaposition of dynamic energy ('spark') and remnants of stillness ('ash'). The palette—dominated by electric blue and lime mixed with black and magenta—creates a stark contrast, representing the tension between vibrancy and decay. The collision occurs centrally, where the bright colors (representing 'spark') clash with the darker tones (depicting 'ash'), evoking a sense of conflict and transformation. The layout follows an 'eroded symmetry,' suggesting deterioration and unevenness, emphasizing the struggle between opposing forces of hunger and restraint, while broken pixels add to the sense of imperfection and memory. The flow is an outward spiral, guiding the eye around the contrasts, with negative space symbolizing moments of quiet between bursts of energy.</desc>
