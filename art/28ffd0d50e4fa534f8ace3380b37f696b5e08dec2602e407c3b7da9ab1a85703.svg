<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tension</title>
  <desc id="desc">The emotional tone of the artwork reflects a juxtaposition between envy and gratitude, illustrated through an interplay of warm and cool colors. The black and deep maroon tones suggest the weight of envy, while soft pinks and grays signify moments of gratitude. The palette creates a contrasting atmosphere—dense dark colors in the top rows represent the oppressive nature of envy, while lighter colors in the bottom rows evoke a sense of relief and gratitude. The broken pixels introduce imperfection, emphasizing the underlying tension between hope and fear, a visual echo of the emotional journey from conflict to resolution. The zigzag flow across the center suggests movement toward the edges while maintaining a protective or confrontational stance at the core.</desc>
