<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Waves of Tension</title>
  <desc id="desc">The emotional tone embodies a struggle between yearning and determination, represented by bending flows of color. The chosen palette of faded gold, soft sky, and storm gray establishes a narrative of contained brightness against somber depths. The main collision occurs diagonally, where soft hues ripple into deeper shadowy zones, symbolizing the push-pull between longing and resolve. Broken pixels are dispersed to suggest imperfections and scars, reinforcing the narrative of repair versus damage. The overall structure echoes a diagonal ascent, emphasizing the striving upward motion inherent to resolve, while also leaving quiet spaces as moments of introspection.</desc>
