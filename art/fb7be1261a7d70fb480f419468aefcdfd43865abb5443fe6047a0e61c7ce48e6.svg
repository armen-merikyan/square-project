<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition expresses the emotional tension between vulnerability and strength through contrasting colors and patterns that reflect the themes of exposure and shelter. The palette of signal green, electric blue, dead black, static gray, and hot magenta is chosen for its dynamic interplay, contrasting vibrancy against muted tones, embodying the idea of strong presence versus soft vulnerability. The main collision occurs in the center, where the vibrant electric blue disrupts the surrounding quieter static gray, signifying a strong, exposed core amidst uncertain edges. The layout of horizontal and vertical movements adds a sense of tension and conflict to the piece, evoking waves of emotional currents. Broken pixels are strategically placed to introduce imperfection and suggest that strength is often a defense against the rawness of vulnerability.</desc>
