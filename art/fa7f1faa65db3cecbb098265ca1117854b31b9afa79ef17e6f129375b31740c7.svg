<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This piece explores the emotional tension between desire and restraint, using a palette that juxtaposes warm and cool tones. Hot coral and blood orange represent desire, creating a saturated pulse that clashes with the cooler tones of charcoal and hollow blue, symbolizing restraint. The pattern of negative cross and stack creates a dense 'island' in a larger field, representing the struggle between reaching for desires and the limitations that contain them. The composition features broken pixels to disrupt the otherwise structured flow, suggesting unpredictability in emotional responses. The center of the square serves as the main collision point, highlighting the heart of this emotional conflict.</desc>
