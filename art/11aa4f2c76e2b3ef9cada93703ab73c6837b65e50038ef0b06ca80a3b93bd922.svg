<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This composition explores the emotional dialogue between softness and severity through a spiraling pattern, embodying a clash between gentle hues and stark contrasts. The palette of powder pink, warm white, and carbon black creates pathways of warmth paired with sharp edges, while sharp crimson serves as dynamic punctuation within a serene steel gray background. The spiral layout invites the eye into a central vortex of emotional tension, balancing quiet fields of color with jagged interruptions. The structured chaos reflects the themes of guilt and forgiveness, suggesting a story of underlying energy amidst calmness.</desc>
