<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone is a vivid conflict between desire and restraint, depicted through a saturated color palette with coral and orange, symbolizing hunger and longing. In contrast, muted charcoal and hollow blue serve to embody the themes of containment and pressure. The central collision occurs diagonally, with the warm colors stacked against the calmer, dot-patterned restraint, highlighting the tension of longing versus limitation. The broken pixels introduce subtle imperfections, reflecting the struggle inherent in desire.</desc>
