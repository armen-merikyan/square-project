  <title id="title">Tension of Inversion</title>
  <desc id="desc">This piece captures the emotional tension between defiance and submission through color and pattern. The palette consists of pale aqua and mist gray as soft, soothing backgrounds, contrasted sharply by alarm red and ink blue representing assertiveness and resistance. The main collision occurs in the center, showcasing bright, angular shapes that feel assertive against more subdued backgrounds, capturing an essence of chaotic order. The broken pixels add an element of glitch, reflecting imperfection that resonates with struggle and resilience.</desc>
