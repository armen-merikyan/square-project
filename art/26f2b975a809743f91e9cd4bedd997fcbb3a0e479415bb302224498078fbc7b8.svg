<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This piece captures the emotional dichotomy between love and betrayal through high contrasts and a sense of upward momentum. The palette predominantly features warm tones of pink and red to signify love, juxtaposed against cooler shades of gray and dark maroon that symbolize betrayal. The contrast lies in the density of the warm colors at the bottom, representing hope, which gradually transforms into empty spaces and cooler shades towards the top, suggesting a looming sense of loss or emptiness. The chosen shape seed of 'door' inspires the diagonal rise and jagged edges, emphasizing openings and fractures within the emotional narrative, while broken pixel placement introduces an imperfection that reflects the fragility of these emotions and relationships.</desc>
