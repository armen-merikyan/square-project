<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory and Motion</title>
  <desc id="desc">This artwork embodies the emotional tension between softness and severity through the use of pale colors and dark tones. The palette features powder pink and warm white to evoke a soft, forgiving atmosphere, contrasted by carbon black and sharp crimson, which denote severity and guilt. The main contrast occurs in the center, where soft and severe palettes collide, symbolizing the open gate that invites shifting emotions. The balance reflects the push and pull of memory and motion, integrating chaotic spark patterns interspersed with the calm of a split-screen effect, encapsulating the spiraling nature of thought.</desc>
