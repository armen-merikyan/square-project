<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Tides</title>
  <desc id="desc">This artwork captures the tension between certainty and curiosity. The left side embodies certainty with a structured pattern of moss green dots representing stability, while the right introduces curiosity through mirrored disruptions in bone white and rust. The central collision point is where the two colors blend, echoing a response to the initial structure. The contrasting palette of earthy greens and soft whites, punctuated by the warm rust, speaks to resilience amidst chaos, reflecting the push towards knowledge against the pull of the familiar. The structured left half transitions into fragmented patterns as if reaching into unknown depths, creating an organic rhythm between order and chaos.</desc>
