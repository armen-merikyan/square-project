<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Silent Clash</title>
  <desc id="desc">The emotional tone is one of a silent battle between defiance and submission. The chosen palette of ice blue and ink black contrasts with a stark clean white, symbolizing tension between light and darkness. The main collision occurs in the center, where dark and light pixels interact chaotically, reflecting confusion and the struggle of opposing forces. The patterns were inspired by 'scars' (defiance) and 'targets' (submission), creating a visually engaging spiral effect that represents inward conflict and layered patterns of resistance and compliance.</desc>
