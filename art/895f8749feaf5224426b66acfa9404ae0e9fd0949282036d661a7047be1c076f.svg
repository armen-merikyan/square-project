<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This piece embodies the tension between panic and control through stark contrasts and interrupted patterns. The chosen palette of yellows and muted purples signifies joy and grief, mirroring the emotional depth of the seed. The top half expresses a chaotic grid-like pattern, evoking a sense of overwhelming pressure, while the bottom half represents control, arranged in softer rings that provide a counterbalance. The jagged edges and broken pixels enhance the feeling of unpredictability against the desire for order, contributing to a narrative of fragmentation and cohesion within the abstract composition.</desc>
