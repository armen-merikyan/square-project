<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs. Chaos</title>
  <desc id="desc">This artwork embodies the emotional tension between 'spark' and 'ash', illustrating a conflict between brightness and mutedness. The palette includes soft cyans and muted plums to reflect warmth and depth while the jagged colors echo the chaos of memory and erasure. The contrasting elements collide in the center, creating a dynamic spiral, allowing viewers to sense the pressure of maintaining order within chaos. As the fixed grid translates into a spiral layout, it suggests movement from calm (bottom-right) toward disruption (center), creating a gradual buildup of emotional intensity.</desc>
