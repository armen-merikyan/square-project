<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone reflects a tension between defiance and submission, illustrated through the dominant dark maroon that represents resistance, contrasted against muted gray tones representing submission. The palette evokes feelings of love and betrayal, emphasizing the dynamic interplay between these emotions. The central collision, where the dark maroon occupies the middle, creates a bold interruption, while lighter gray tones gently recede to the edges, capturing the visual metaphor of conflict. The use of broken pixels in the edges introduces an unintentional distortion, symbolizing chaos against a foundational structure, reinforcing the idea of 'mirror broken' layout.</desc>
