<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Longing</title>
  <desc id="desc">The emotional tone reflects the tension between emptiness and desire, expressed through a palette that oscillates between warmth and coolness. The contrasting colors mirror the push and pull of longing, with burnt oranges and charcoals creating density around the edges, while golds and dark reds pulsate from the center. As the flow spirals inward, the placement invites a sense of rising tension to a peak, followed by release in sparse spaces. This results in an abstract pattern that embodies unresolved motion and emotional collision.</desc>
