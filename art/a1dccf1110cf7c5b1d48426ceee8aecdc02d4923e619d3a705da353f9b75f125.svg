<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">The emotional tone navigates the juxtaposition of fear and hope, encapsulated in a palette that transitions from dark to light. The colors portray a sense of pressure, layering dark violet with soft gold to reflect the struggle between dense, jagged edges of fear and the delicate, upward glimmers of hope. The pattern exhibits a radial dynamic with sharp contrasts at the edges and softer transitions within, evoking a feeling of rising tension and a search for balance. This embodies the struggle of finding light amid darkness, creating a rhythmic flow with broken pixels representing fractures in perception.</desc>
