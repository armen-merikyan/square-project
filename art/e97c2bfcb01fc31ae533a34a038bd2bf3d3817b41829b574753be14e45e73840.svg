<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Echoes</title>
  <desc id="desc">This composition captures the tension between longing and resolve, represented through juxtaposed patterns of broken pixels and static textures. The palette, drawn from 'awe_terror', uses deep teal and cosmic indigo to evoke depth and introspection, while cold gold acts as a striking accent, illuminating the resolve within darker spaces. The main collision occurs in the center where static and teeth patterns interrupt and overlap, suggesting a struggle between the desire for connection and the feeling of incompleteness. Negative space is preserved along the edges, creating a feeling of vastness and anticipation.</desc>
