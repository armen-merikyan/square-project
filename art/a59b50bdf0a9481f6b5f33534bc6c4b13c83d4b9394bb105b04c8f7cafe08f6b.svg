<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Safety and Exposure</title>
  <desc id="desc">The composition embodies the tension between the emotional states of safety and exposure, using a palette of shelter green, warm brown, pale skin, cold white, and open blue. The central area represents exposure—soft yet potentially vulnerable—while the surrounding colors provide a sense of weight and shelter. Broken pixels disturb the smoothness, introducing an element of imperfection, reinforcing the idea of vulnerability. The layout spirals towards a soft center, creating a movement that oscillates between quiet calm and pressure, embodying the duality of the seed. The sharp contrasts between muted hues and vibrant accents evoke emotional tension, drawing the viewer into an abstract narrative of opposing forces.</desc>
