<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">hunger vs restraint</title>
  <desc id="desc">This piece conveys the emotional tension between desire and emptiness through a stark palette of hot coral and blood orange contrasted with the muted tones of charcoal and hollow blue. The central area represents the overwhelming pull of desire, while the surrounding muted fields suggest a feeling of emptiness, creating a visual island amidst the quiet seas. The jagged edges symbolize disrupted flows of emotion, resonating with the feelings of containment and overflow inherent in the seed. The broken pixels introduce intentional imperfection, evoking a sense of unresolved tension within the structured layout.</desc>
