<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece embodies the emotional tension between desire and emptiness, where warm tones of passion intersect with cool, muted hues that symbolize restraint. The use of hot coral and blood orange provides a vibrant pulse of desire, while the charcoal and hollow blue serve as quiet, expansive fields representing emptiness. The broken pixels in the arrangement create interruptions, echoing the feelings of longing amidst containment. The layout features two central pulses that evoke a sense of opposing forces, and the contrast of saturation creates a visual tension that ties back to the seed's exploration of overflow versus containment. This is further emphasized by a blend of structured yet disrupted patterns, culminating in an abstract narrative of emotional conflict.</desc>
