<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Reflection</title>
  <desc id="desc">This artwork reflects the emotional complexities of longing and resolve. The palette of sepia, tan, dust gray, and faded blue expresses a sense of nostalgia and introspection, merging warmth with a cool undertone. The dominant color, a faded blue, embodies the longing aspect, while the structured tan sections articulate resolve. The pixel arrangement, featuring dense clusters in one corner flowing into empty spaces, creates a visual tension, illustrating the push and pull of emotions—one side overflowing with 'repair' and the other maintaining 'damage.' The broken pixels introduce intentional imperfections and scars, enhancing the narrative of struggle and reconciliation within oneself.</desc>
