<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Shelter</title>
  <desc id="desc">This piece conveys a tension between safety and exposure through its color palette, evoking warmth from the 'shelter_green' and 'warm_brown' juxtaposed with the cooler 'pale_skin' and 'cold_white.' The open center suggests exposure, while the surrounding colors frame it in a protective manner. Key contrasts occur at the vertical split, creating a flow from heavy darker hues on one side to lighter shades on the other, which embodies the collision of pressure and release inherent in the seed.</desc>
