<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece embodies the tension between vulnerability and strength through a sharp contrast of colors. The central pale area symbolizes exposure, surrounded by a dense outer layer that represents shelter. The chosen palette of yellow, orange, muted purple, and deep blue evokes a sense of warmth contrasted by melancholic undertones. The collision occurs in the center, where the light yellow meets deep blue, creating a visual dichotomy that mirrors the themes of lightness and weight. The broken pixels are incorporated to introduce imperfections, symbolizing emotional scars and the fragility of the balance between these opposing themes.</desc>
