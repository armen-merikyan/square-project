<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Pulse</title>
  <desc id="desc">The emotional tone of this piece reflects the tension between longing and resolve. The palette, drawn from the safety_exposure theme, combines the warmth of 'shelter_green' and 'warm_brown' with the coolness of 'cold_white' and 'open_blue,' representing the dichotomy of comfort and exposure. The visual collision occurs predominantly in the center, where the sharp contrasts of dark and light colors mimic the complexities of human emotion—where longing bleeds into resolve. The patterns of longing and resolve intersect and disrupt each other across the grid, echoing feelings of repair and damage as they overlap yet remain distinct.</desc>
