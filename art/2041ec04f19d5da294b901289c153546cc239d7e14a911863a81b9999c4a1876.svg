<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This artwork captures the emotional duel between vulnerability and strength. The black and navy colors signify strength, rooted in a dense base, while the lighter dim cyan and white colors represent vulnerability and exposure. The composition starts from the bottom left corner, creating a diagonal rise that suggests a quick ascent of signals amidst heavy edges that frame the center. The checker and teeth patterns symbolize the collision of soft breaks and hard lines, resulting in a tension that has both stability and chaos. The placement of broken pixels adds intentional disruptions throughout the structure, enhancing the sense of vulnerability. The balance of blues and whites signals a quiet internal conflict, allowing the viewer to explore the layers of emotional depth.</desc>
