<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition conveys the emotional tension between emptiness and desire, using a palette of warm coral and deep charcoal to represent the intensity of longing against the cool restraint of space. The conflict is visually summarized through a dominant central saturation of hot coral surrounded by broken dot patterns in charcoal and hollow blue, suggesting a boundary that keeps desire contained. The deliberate positioning of broken pixels introduces imperfection and a nod to the 'cut edges' referenced in the seed, emphasizing the interrupted flow.</desc>
