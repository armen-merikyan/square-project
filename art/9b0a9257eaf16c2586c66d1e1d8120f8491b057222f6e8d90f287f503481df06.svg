<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory in Motion</title>
  <desc id="desc">This artwork reflects the tension between control and surrender, manifesting through a central dense area of deep reds and pinks that symbolize overwhelming emotion and pressure. The borders fade into softer grays, representing a gentle letting go, creating a stark contrast between the vibrant center and the subdued edges. The collision occurs at the center, where the heavy outlines form a knot-like shape, suggesting an ongoing struggle to contain intensity. The use of broken pixels introduces imperfection, embodying the unavoidable disruption in our emotional landscapes.</desc>
