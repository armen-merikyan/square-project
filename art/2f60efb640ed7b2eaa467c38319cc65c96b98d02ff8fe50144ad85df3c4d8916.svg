  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork captures the emotional tension between rage and calm through the juxtaposition of bold red and soft pale blue colors. The palette represents intensity and tranquility, where red creates an energetic halo effect surrounded by a calmer blue field. The central collision occurs at the core where the red sparks meet the blue, symbolizing containment versus overflow. The layout features a dense center interspersed with cooler tones radiating outwards, embodying a clouded yet soothing expanse influenced by the seed's concept of ringing against a quiet field.</desc>
