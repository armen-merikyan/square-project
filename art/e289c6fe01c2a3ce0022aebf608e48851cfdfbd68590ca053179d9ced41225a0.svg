<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Longing</title>
  <desc id="desc">This artwork embodies the tension between longing and resolve, suggesting a complex emotional landscape. The palette, drawn from 'ancient_fire', combines burnt orange, dark red, charcoal, and gold to create a warm yet conflicted atmosphere. The burnt orange and gold colors symbolize warmth and intimacy while the dark red and charcoal embody the underlying chaos and disorder. The composition features a central collision, where dense patches of dark colors evoke feelings of longing, interrupted by lighter spaces that represent resolve. This interplay between density and emptiness reflects the journey from desired connectivity to the realization of distance, evoking a sense of emotional depth and complexity.</desc>
