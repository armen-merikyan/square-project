<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Flow</title>
  <desc id="desc">This abstract piece balances the tension between restlessness and peace, using contrasting colors and patterns to evoke a sense of motion and stillness. The palette features hot coral and hollow blue that interlace in a chaotic yet structured manner, encapsulating the emotional push and pull. The main collision occurs diagonally, where maze-like patterns of warmth confront lattice-like areas of calm. This layout reflects the turmoil of memory tangled with motion, embodying the essence of fragmented experiences while allowing for quiet spaces. The broken pixels serve as intentional disruptions, symbolizing flawed connections within personal memories.</desc>
