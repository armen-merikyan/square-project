<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Emotion</title>
  <desc id="desc">The emotional tone reflects a dichotomy between relief and dread, creating tensions throughout the arrangement. The palette of lime, electric blue, black, and magenta evokes vibrancy and heaviness—light against darkness. The flow and layout focus on the central idea of a heart fragment, showcasing a small bright shape surrounded by darker hues, representing an emotional contrast. The predominance of black offers a backdrop of dread, while accents of lime and electric blue create moments of relief. Asymmetrical placements of bright colors interrupt the dark fields, generating a visual tension that represents a struggle between calm and chaos. The broken pixels introduce imperfection, aligning with themes of uncertainty and the fractured nature of emotions.</desc>
