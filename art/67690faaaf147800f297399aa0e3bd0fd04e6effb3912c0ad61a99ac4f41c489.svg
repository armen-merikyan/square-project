<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This piece captures the emotional duality of nostalgia and progress, using the warm tones of burnt orange and dark red to convey a sense of pressure and intensity, contrasted against the cool, calming shades of charcoal and gold. The top half reflects nostalgia through framing patterns of warmth, while the bottom half embodies progress with rings of cooler tones, suggesting movement and growth. The collisions arise at the transition between these sections, marked by broken pixel placements that introduce a sense of imperfection amidst the structure.</desc>
