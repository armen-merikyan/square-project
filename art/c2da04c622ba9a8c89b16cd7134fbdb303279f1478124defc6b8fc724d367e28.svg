<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Boundaries</title>
  <desc id="desc">The emotional tone of 'desire vs restraint' is manifest through a composition that blends warm and cool tones, highlighting the conflict between reaching out and holding back. The palette of red oxide, small orange, muted cream, blackened plum, and iron gray captures this dichotomy, where red and orange represent desire while blackened plum and gray embody restraint. The main contrast is between the diagonally expanding warm colors in the top left corner, which draw the eye and create an energetic sweep, battling against a more subdued restrained space that holds the bottom right. The collision happens where warm colors push against the muted islands of restraint, creating a dynamic pattern akin to a struggle between expansion and boundary, reflective of the seed's themes.</desc>
