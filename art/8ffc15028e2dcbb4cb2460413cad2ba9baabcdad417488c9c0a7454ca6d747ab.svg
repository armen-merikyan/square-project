<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Abstract Space</title>
  <desc id="desc">This composition embodies the emotional conflict between defiance and submission through color and shape. The palette features cosmic indigo and cold gold to evoke an awe-tinged contrast, where the darker tones protect the brighter ones, symbolizing a center being invaded yet holding its ground. The patterns of tide (defiance) and stripes (submission) create rhythmic layers, with the center dominated by the strong colors, representing a core of resistance against the encroaching edges. Broken pixels intersperse some rows, suggesting imperfections amidst conflict, while a couple of fields are left intentionally muted to avoid overwhelming the viewer, keeping a window of quiet reflection amid turmoil.</desc>
