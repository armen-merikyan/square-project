<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Resists</title>
  <desc id="desc">This 8x8 pixel artwork embodies the emotional tension between desire and emptiness. The hot coral, blood orange, and dust pink reflect the saturation of desire, overwhelming and oppressive yet hopeful, applied in layers that represent a subtle buildup of tension and conflict. In contrast, the hollow blue and charcoal create a cooling emptiness, a faint perimeter that hints at restraint or containment. The artwork features a central collision of contrasting warm and cool colors, suggesting a struggle where desire reaches toward a locked boundary. Broken pixels scatter throughout, signifying disruptions in this search for fulfillment, while strategic placements ensure a quiet negative space that leaves a feeling of ambiguity and unresolved longing.</desc>
