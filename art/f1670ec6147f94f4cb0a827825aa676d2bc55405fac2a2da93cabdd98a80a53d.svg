<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension &amp; Tranquility</title>
  <desc id="desc">This composition navigates the emotional terrain of restlessness and peace, utilizing a palette that oscillates between deep greens and soft creams—where deep olive suggests grounding, while honey gold introduces warmth. The main contrast lies at the center, where swirling patches of restlessness (the rain pattern) collide with the threshold of peace. The composition embodies a scattered repair, with broken pixels hinting at imperfections and chaotic lines disrupting the calm, reflecting the tension between a feeling of motion and the desire for stillness.</desc>
