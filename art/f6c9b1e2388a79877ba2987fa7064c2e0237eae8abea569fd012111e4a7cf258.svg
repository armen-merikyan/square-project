<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition evokes a tension between vulnerability and strength through the juxtaposition of a pale, unshielded center with a bold, darker outer framework. The use of muted tones like 'dust_gray' and 'off_white' creates a sense of fragility and openness in the core, while rich, saturated colors like 'compressed_red' and 'dark_navy' provide a stabilizing contrast, suggesting strength. The edge style features pixel bleed, creating a sense of imperfection and disruption, reflecting the theme of 'mirror broken.' The collision occurs predominantly at the center, where the lighter 'embers' pattern intersects with the 'constellation' pattern of darker colors, illustrating the dynamic between exposure and safety. This 8x8 grid uses broken pixels intentionally to enhance the emotional depth, creating an abstract rhythm that invites the viewer into the emotional story.</desc>
