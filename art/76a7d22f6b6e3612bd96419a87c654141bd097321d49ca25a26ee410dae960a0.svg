<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Fracture</title>
  <desc id="desc">This piece captures the duality of joy and grief, contrasting bright tones with deep blues. The left side, representing joy, utilizes a radial pattern with vibrant yellows and oranges to evoke feelings of expansion. The right side, symbolizing grief, employs a grid pattern with muted purples and deep blues to express fragmentation and heaviness. The stark division serves as a visual metaphor for the emotional turbulence of living amidst joy and sorrow, and the hard edges create a tension that highlights the conflict between the two states. Each color strategically collides, illustrating the struggle between safety and threat.</desc>
