<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This composition explores the emotional dichotomy of relief and dread through contrasting color densities and patterns. The palette combines the calming tones of pale mint and soft sky against the weight of storm gray and near black. The dense center symbolizes an overwhelming sense of dread, while the outer edges, featuring lighter colors and broken pixels, signify an emerging relief. The crossing patterns of noise and stairs illustrate the chaotic fight of emotions, with the collision occurring centrally where chaos bleeds into clarity.</desc>
