<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Echo</title>
  <desc id="desc">This artwork explores the conflict between joy and grief through a split vertical layout. The left side uses bright yellows and oranges representing joy, while the right incorporates deep blues and muted purples reflecting grief. The exchange of color creates a visual pulse, echoing the tensions of love and betrayal. The asymmetry of broken pixels introduces imperfection and interruption, grounding the piece in emotional realism, while the soft edges add warmth. The contrasting densities capture the essence of the seed's themes, inviting the viewer to navigate the complexities of these intertwined emotions.</desc>
