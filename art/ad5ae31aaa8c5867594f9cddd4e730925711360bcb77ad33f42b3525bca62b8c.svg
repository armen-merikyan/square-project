<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This artwork captures the duality of joy and grief through a stark contrast in color and pattern. The left side features the warmth of yellow and orange representing joy, arranged in a crack pattern that expands outward, symbolizing growth and upliftment. The right side embodies grief with a deep blue and muted purple arranged in a fragmented dot pattern, suggesting heaviness and sorrow. The center heavy edge creates a visual tension, a pulse where joy pushes against grief, illustrating their conflict and coexistence. The overall composition adheres to a geometric flow while intentionally introducing broken pixels, mirroring the disruption caused by emotional turmoil, leaving negative space to amplify the heaviness of grief in unintended stillness. This pinpointed layout visually narrates the struggle between opposing emotions.</desc>
