<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order and Chaos</title>
  <desc id="desc">The artwork explores the emotional contrast between panic and control, represented through a split-horizontal layout. The top rows denote control with structured frames of gray and dark maroon, while the bottom rows embody panic through chaotic red and pink 'target' patterns. The palette of love and betrayal emphasizes emotional depth, with gray representing detachment that collides with vibrant colors, creating a tension between stability and disruption. Main collisions occur where red interrupts gray, showcasing inner turmoil. The composition echoes the seed's themes by centralizing control (top) and externalizing chaos (bottom), mirroring the struggle inherent in balancing emotion with restraint.</desc>
