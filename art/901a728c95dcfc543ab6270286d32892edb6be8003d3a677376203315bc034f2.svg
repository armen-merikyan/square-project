  <title id="title">Fractured Equilibrium</title>
  <desc id="desc">This artwork embodies the clash between panic and control. The palette of sepia, tan, dust gray, and faded blue conveys a somber memory, where warm and cool hues collide. The left side exhibits a controlled crosshatch pattern representing order, juxtaposed against the chaotic broken dots on the right, reflecting panic. Minor disruptions create a sense of imperfection, while the overall arrangement hints at a balanced yet unstable state. The structured mirroring in layout emphasizes conflict, and the negative space offers a breath between the emotional weight.</desc>
