<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone of this artwork is derived from the tension between love and betrayal. The chosen palette incorporates warm pinks and reds, representing love, contrasting with darker grays and maroon to symbolize betrayal's weight. The flow follows a diagonal invasion, creating a sense of chaos as it disrupts the surface of calm. The pattern employs radial elements with broken pixels to illustrate a disrupted harmony, where dense clusters of red and pink collide with voids of gray, conveying the emotional conflict. This interplay of colors creates unresolved motion and a sense of friction between two opposing forces.</desc>
