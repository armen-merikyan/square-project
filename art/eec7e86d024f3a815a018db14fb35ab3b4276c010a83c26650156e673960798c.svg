<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This piece embodies the tension between joy and grief, with a primary focus on contrasting warm and cool tones. The left side, dominated by yellows and oranges, represents the warmth of joy, using a mirroring pattern to evoke expansion and light. Conversely, the cool depths of deep blue and muted purple on the right side convey grief, implemented with crosshatch patterns to suggest heaviness. The interplay creates a visual collision at the center, where the textures and colors meet, symbolizing the delicate balance between uplift and weight. The layout emphasizes a split-screen aesthetic, reflecting the recurring themes of order versus chaos and safety versus threat. This tension captures a dynamic emotional rhythm, inviting the viewer to reflect on the contrasts of human experience.</desc>
