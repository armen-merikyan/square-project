<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Existence</title>
  <desc id="desc">This composition captures the emotional tension between joy and grief, represented through contrasting color palettes of bright yellows and deep blues. The layout flows from a central series of bright pixels outward, reflecting joy as the force radiating away, while the darker colors surrounding them create a sense of encroaching grief. The arrangement suggests an inward spiral, mimicking how joy can feel threatened yet remains central, thereby embodying resilience amidst sorrow. The jagged edges introduce a 'hard' feeling of disruption, enhancing the emotional landscape.</desc>
