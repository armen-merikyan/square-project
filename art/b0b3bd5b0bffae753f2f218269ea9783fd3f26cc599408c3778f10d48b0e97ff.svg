  <title id="title">Contrasting Echoes</title>
  <desc id="desc">This artwork navigates the emotional terrain of envy and gratitude through a deliberate use of contrasting colors and forms. The dark palette of black and muted tones echoes feelings of envy, while brighter, more open colors represent gratitude. The center of the artwork is dense and darker, creating a weight that contrasts against lighter edges. The zigzag pattern formed by the placement of colors emphasizes movement and conflict, while the presence of 'broken pixels' disrupts the flow, embodying a fractured emotional state. This visual narrative captures the tension between these two emotions while leaving enough negative space to convey moments of reflection.</desc>
