<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Interference</title>
  <desc id="desc">This 8x8 pixel art composition captures the emotional tension between control and surrender. Using a palette of warm and cool tones—hot coral and charcoal against dust pink and hollow blue—it reflects the collision of pressured containment and gentle release. The main contrast occurs in the center, where thicker outlines and vibrant colors struggle against the delicate, dispersed patterns of surrender. It represents the chaotic push and pull of emotions, echoing the 'signal vs noise' theme inherent in the seed.</desc>
