<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Forces</title>
  <desc id="desc">The artwork embodies the emotional tug-of-war between panic (represented by chaotic, sharp contrasts) and control (shown through more structured patterns). The palette of deep reds and blacks signifies the intensity of panic, while pale blue and white introduce calmness, creating a rhythm of pressure and release. The main contrast lies in the jagged, hard boundaries of reds colliding against softer blues, signifying the clash of emotions. The broken pixel elements introduce imperfections, reinforcing the theme of 'broken vs. whole.' This mirrors the seed's narrative of tension, order, and chaotic beauty.</desc>
