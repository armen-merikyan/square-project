<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece captures the tension between defiance and submission through contrasting colors and patterns. The palette of muted rose clay and cool blue creates a soothing background, while splashes of warm shadow and lamp gold introduce an assertive energy. The main collision occurs in the center, where the scar pattern of defiance interrupts the structured stepwell of submission, symbolizing the struggle between resistance and acceptance. The uneven borders provide a sense of disruption and tension, echoing the seed's themes of conflict and flow.</desc>
