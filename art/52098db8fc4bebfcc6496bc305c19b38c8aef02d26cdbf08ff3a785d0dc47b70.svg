<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Shadows</title>
  <desc id="desc">The emotional tone of this piece embodies the tension between relief and dread, showcasing how one emotion can disrupt the other. The palette incorporates deep blacks that represent dread and cooler pale blues that suggest relief, creating a dialogue between darkness and tranquility. The main collision occurs at the center where intense blacks bleed into soft blues, enriching the contrast. The layout flows from a corner, channeling an 'invasion' of darker blocks that disrupt the calmer hues, reflecting a battle between a crowded sense of dread against the vast emptiness of relief. This dynamic results in an abstract representation of the seed's themes, ensuring a tension-filled, yet serene environment.</desc>
