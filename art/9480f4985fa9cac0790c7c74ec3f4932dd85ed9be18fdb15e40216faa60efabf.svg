<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone is a dynamic interplay of desire and emptiness, represented by color contrasts and placements. The palette contains warm, vibrant colors like hot coral and blood orange to depict desire, contrasted with muted tones of charcoal and hollow blue that signify emptiness. The main collision occurs at the center with a dense warm pull of color clashing against the cooler, muted edges, creating a visual tension that speaks to the balance and struggle of the emotions. The 'stacked_bands' layout enhances this, depicting layers of emotional strata where warmth flows against a backdrop of coolness, echoing the overarching themes of containment and overflow.</desc>
