<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Emotion</title>
  <desc id="desc">This artwork interprets the emotional interplay between joy and grief through color, texture, and spatial arrangement. The warm hues of yellow and orange represent joy, breaking through the darker, muted shades of deep blue and purple that evoke grief. The left side employs a dense zigzag pattern, signifying the chaotic nature of grief, while the right side displays a more scattered spark motif to invoke joy's uplifting essence. The stark contrast between the sides symbolizes the tension between order and chaos, with a balance of negative space allowing 'breathing room' for reflection. This creates a visual resonance that highlights the push and pull of human emotion.</desc>
