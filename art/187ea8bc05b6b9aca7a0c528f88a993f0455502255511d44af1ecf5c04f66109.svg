<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This artwork embodies the contrast between panic and control through a split layout. The top four rows represent the emotion of control with orderly patterns in dark violet (representing contemplation) and soft gold (depicting hope), while the bottom four rows express panic with scattered dots and flashes of black and pale green to evoke chaos. The chosen palette creates tension, with darker shades grounding the upper section and brighter hues introducing an uneasy vibrancy below. The interplay between structured grids and erratic dots symbolizes the struggle between stability and instability, suggestive of emotional turmoil and a search for balance. The negative space is intentionally preserved to represent the emptiness of an unfilled room, echoing the theme of isolation amid internal conflict.</desc>
