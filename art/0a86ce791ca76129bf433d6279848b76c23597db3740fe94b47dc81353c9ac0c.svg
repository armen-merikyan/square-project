<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Forms</title>
  <desc id="desc">This composition embodies the emotional tension between control and surrender through a structured flowing grid contrasted with chaotic flames. The palette of burnt orange, dark red, charcoal, and gold represents warmth and urgency, juxtaposed against deeper shadows and muted fields of color. The primary collision occurs at the center where the grid pattern meets the flame pattern, embodying the struggle between containment and overflow. Broken pixels scattered around enhance the feeling of imperfection, while quiet spaces invite introspection into the overall dialogue of pressure and release.</desc>
