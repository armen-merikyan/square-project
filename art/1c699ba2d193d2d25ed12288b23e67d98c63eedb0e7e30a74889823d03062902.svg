<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone centers around the juxtaposition of vulnerability and strength, which is reflected in the palette featuring muted, earthy tones to create depth while allowing for moments of lightness. The contrast lies in the interplay between dense, dark rows representing strength versus lighter, more fragmented bands symbolizing vulnerability—these are intentionally scattered and interrupted. The seed shapes the abstract pattern by suggesting a shifting landscape where strength forms a protective barrier, while vulnerability seeps through the cracks, establishing a visual narrative of tension and resolution.</desc>
