<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">The emotional tone juxtaposes grief's heaviness with joy's brilliance. The palette transitions from muted purples and deep blues to vibrant yellows and oranges, reflecting this dichotomy. The contrast is visually stark, with muted fields of purple and blue at the bottom, representing grief, contrasted by bright yellow and orange patterns above, symbolizing joy. The overall split layout and flow from bottom to top embody the struggle between the two emotions, while the checker and dot patterns create an unsettling rhythm, like waves crashing against the steady pull of existence.</desc>
