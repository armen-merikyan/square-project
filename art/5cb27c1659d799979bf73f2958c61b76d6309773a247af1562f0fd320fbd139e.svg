<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Flux</title>
  <desc id="desc">This artwork embodies the tension between joy and grief, using a palette that contrasts warm and cool colors: yellows and oranges evoke joy, while deep blues and muted purples signify grief. The composition features a mirrored layout with subtle disruptions that indicate disorder amidst perceived order. A noticeable contrast occurs along the horizontal split, where warm tones diminish and cool tones rise, reflecting the emotional tide. Patterns of crosshatch on the joyful side clash against a grid from grief, symbolizing the interplay of these emotions. The edge style, presenting a burned effect, reinforces the rawness of these feelings, enhancing the sense of hidden versus exposed vulnerability.</desc>
