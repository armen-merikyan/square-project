<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos in Control</title>
  <desc id="desc">The artwork embodies the emotional conflict between panic and control through contrasting colors and patterns. The dominant black and electric blue shades suggest a sense of control and stability, while the vibrant magenta introduces elements of chaos and unease. The radial pattern mirrors a crown-like focus in the center, underscoring a struggle between order and disorder, amplified by broken pixels that disrupt the smoothness. This tension is conveyed by the interplay of solid stripes against the more chaotic splashes of color, culminating in a dynamic rhythm where control and panic continuously collide.</desc>
