<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Clarity and Longing</title>
  <desc id="desc">This artwork expresses the emotional tension between longing and resolve. The palette features bold contrasts with black as a grounding element, electric blue and magenta symbolize the high-energy push and pull of desire, while lime acts as a quiet field of potential. The collision occurs mainly at the center where dense patches emerge from the edges, echoing the theme of pressure in one corner. This layout suggests the complexity of emotions intersecting and the need for balance against chaos, creating a narrative that feels both urgent and hopeful.</desc>
