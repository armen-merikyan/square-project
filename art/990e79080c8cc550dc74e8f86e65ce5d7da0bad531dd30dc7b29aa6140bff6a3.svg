<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Heart's Echo</title>
  <desc id="desc">The emotional tone captures the tension between the stark emptiness and the burning desire, represented through a split color arrangement. The palette of burnt orange and dark red evokes warmth and yearning, while charcoal represents shadow and void, creating sharp contrasts. The composition features a rising zigzag pattern on one side to symbolize desire amid the cool, staggered emptiness, creating a collision of feelings. This pattern reflects the struggle of wanting against the feeling of absence, with negative space enhancing the whisper of loneliness.</desc>
