<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance in Tension</title>
  <desc id="desc">This composition explores the emotional spectrum between relief and dread through an interplay of color and pattern. The top four rows depict relief with lighter tones and sparks of intensity, contrasted by darker, denser patterns in the bottom rows reflecting dread. The use of pink and red suggests warmth and intensity, while gray and dark maroon evoke heaviness and unease. The top-weighted edge and the split horizontal layout enhance the tension between lightness and darkness, allowing for a visual representation of the struggle between calm and rage.</desc>
