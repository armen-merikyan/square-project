<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Serenity</title>
  <desc id="desc">This piece captures the emotional tone of longing intertwined with resolve through a tension of color and placement. The palette of off-white, dust gray, compressed red, dark navy, and faint peach presents a nuanced conversation between calm and chaos. The dominant dusty gray represents resolve, while the softer off-white and red hints at longing. The primary collision occurs at the center, where radial patterns of longing intertwine with streaks of resolve, creating an echo of a fractured boundary. The quiet spaces suggest the weight of unfulfilled desires amidst strong, structured patterns, embodying the duality present in the seed.</desc>
