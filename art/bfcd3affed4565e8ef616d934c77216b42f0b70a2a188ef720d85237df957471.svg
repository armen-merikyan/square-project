<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This 8x8 grid captures the emotional tension between longing and resolve through a carefully curated palette that reflects warmth and gentleness in 'stain_brown' and 'soft_gold,' contrasted sharply by the stronger hues of 'deep_wine' and 'ash_gray.' The collision of stacked patterns creates both a quiet field and an unsettling density, emphasizing a seam where the two emotional states meet. Broken pixels are strategically placed to mirror the imperfection of the healing process, creating layers of depth and complexity in this abstract pattern.</desc>
