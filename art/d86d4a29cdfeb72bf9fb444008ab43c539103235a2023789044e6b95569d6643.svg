<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">This piece navigates the emotional landscape between restlessness and peace through a jagged edge style. The palette suggests intimacy with warm clay and distant lilac, contrasting with cool blue that represents the unsettled borders of motion. The main clash occurs in the center, where calm islands of color are interrupted by staccato fragments, signifying memory's chaotic vibrations against a backdrop of tranquility. This layout speaks to the tension of a broken frame, with spaces revealing emotional leaks, reinforcing the theme of controlled contrast.</desc>
