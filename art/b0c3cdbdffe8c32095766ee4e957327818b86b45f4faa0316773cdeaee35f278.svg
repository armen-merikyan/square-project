<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This composition captures the emotional interplay between longing and resolve through a palette of warm ivory, soft gold, deep wine, ash gray, and stain brown. It reflects a stark contrast of rich, deep colors representing resolve against softer, airy tones symbolizing longing. The spiral layout evokes a feeling of pushing and pulling, as if colors coil around a center, creating tension and depth. As the soft tones spill towards the edges, they collide with denser dark hues, manifesting the push and pull between clarity and desire. Broken pixels are interspersed within this structure, further enhancing the feeling of imperfection and emotional scars. The main contrast is found in the center, where the warm colors struggle against the cooler ash gray, representing unresolved feelings.</desc>
