<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Divided Echoes</title>
  <desc id="desc">This work embodies the emotional contrast between love and betrayal through a split horizontal layout. The top half employs a warm palette—including pinks and reds—symbolizing love, arranged in an open-grid pattern that suggests unity and connection. The bottom half uses darker tones of gray and dark maroon, using a stair-like pattern that signifies uncertainty and betrayal. The stark contrasts create a collision of emotions, with warmer colors echoing upwards into the cooler tones below, visually representing the tension between feelings of warmth and cold isolation. Broken pixels introduce an element of imperfection and dissonance, reflecting the complexity of human emotions.</desc>
