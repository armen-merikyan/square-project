<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Doubt</title>
  <desc id="desc">This piece captures the emotional tension between trust and suspicion, reflected through a palette of pale mint and storm gray, representing a soft embrace interrupted by darker, harder notes. The patterns of constellation (trust) and radial (suspicion) collide mostly in the center, where brighter colors cluster and pulse amidst a backdrop of muted, darker hues. The layout is intentionally asymmetric to evoke a sense of struggle between clarity and confusion, embodying the essence of signal versus noise.</desc>
