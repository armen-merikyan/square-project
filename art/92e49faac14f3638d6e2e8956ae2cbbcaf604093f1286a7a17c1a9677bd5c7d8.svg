<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensions of Quiet Constellations</title>
  <desc id="desc">This composition embodies the emotional contrast of tenderness and rage, where the palette of deep blacks and pale blues symbolizes a battle between calm and aggressive energy. The central collision of black and white creates a stark focus, akin to a dark star amidst a stormy backdrop, evoking a sense of unresolved tension. The soft, gentle spaces of pale blue suggest quiet tenderness, while the bold black patches signify rage, with intentional pixel disruptions indicating emotional scars and repairs. The 'quiet_channel' layout allows for a negative space that separates these emotional zones, creating a dynamic flow that spirals through the piece.</desc>
