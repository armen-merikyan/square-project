<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Tension</title>
  <desc id="desc">The emotional tone explores the tension between quiet and pressure. Drawing from the palette of soft whites and dark navy symbolizes the quietness and pressure respectively, while the compressed red adds an accent of urgency. The grid pattern conveys a sense of compression across the square, interrupted by sections of echoed faint peach that represent moments of clarity. The collision is felt dominantly in the lower left corner, where the pressure colors cluster, contrasting against a muted top right, creating an impression of a release. This layout embodies an inward spiral flow, suggesting a calm emergence from density, with broken pixels creating intentional disruptions throughout, enhancing the emotional narrative of shattering against calm tides.</desc>
