<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Shadows and Light</title>
  <desc id="desc">The emotional tone encapsulates the conflict between fear and hope, using a palette of dark violet, soft gold, and pale green to contrast the sharpness of jagged edges with a central glow that suggests rising hope amidst surrounding darkness. This is depicted through a dense pattern focusing on the central seed, which symbolizes hope, against a backdrop of chaotic color collisions that represent fear. The arrangement allows for negative space that evokes both emptiness and potential, conjuring the duality of the human experience.</desc>
