<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tones of vulnerability and strength are depicted through a juxtaposition of soft, pale hues representing exposure and robust, darker tones symbolizing strength. The palette includes colors like pale aqua and mist gray to create a soothing foundation, with alarm red providing tension and urgency. The main contrast occurs in the center where delicate lines collide with solid blocks, representing the ongoing struggle between vulnerability and protection. The hollow center, surrounded by deeper shades, evokes a feeling of both openness and confinement, aligning with the layout of halo_void.</desc>
