<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">The emotional tone balances longing and resolve, representing an internal tension. The palette of pale mint and storm gray illustrates muted longing contrasted by the strength of faded gold, creating an atmosphere of quiet urgency. The main contrast lies in the center, where a braided pattern interlocks with a flood-like flow, suggesting a collision of unresolved emotions. The interplay of quiet fields and saturated edges captures the essence of repair against damage, embodying the seed's abstract narrative.</desc>
