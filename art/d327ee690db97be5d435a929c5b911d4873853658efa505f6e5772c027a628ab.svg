<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Euphoria</title>
  <desc id="desc">This artwork explores the tension between joy and grief, utilizing a palette that combines light and dark hues to represent these emotions. The dominant yellow and orange tones suggest brightness and openness, representing joy, while the deeper blues and muted purples capture the weight of grief. The arrangement creates a zigzag pattern, symbolizing the rise and fall of emotion, with a central focus that anchors the chaotic interplay of color, reminiscent of a bridge between the two states. Jagged edges introduce imperfection, reflecting the disruption of grief in the celebration of joy, accentuating contrasts throughout the piece, where warm colors echo against cooler tones, creating an emotional collision.</desc>
