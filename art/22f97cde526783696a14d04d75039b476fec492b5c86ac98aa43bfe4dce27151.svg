<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symphony of Dissonance</title>
  <desc id="desc">This piece explores the emotional tension between the feelings of relief and dread, represented through contrasting color patterns. The left side consists of a grid pattern in soft gold and pale green, symbolizing relief and hope, while the right side features jagged cracks of dark violet against black, illustrating dread and disruption. The palette strikes a balance between light and dark tones, emphasizing the conflict within the 'empty room' concept. The collision happens at the vertical center, where a soft gold pixel interrupts the dark mass, mirroring the emotional struggle of finding calm amid chaos.</desc>
