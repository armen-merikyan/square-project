<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Desire</title>
  <desc id="desc">This piece embodies the emotional tension between desire and emptiness. The chosen palette of hot coral and blood orange conveys a vibrant yearning, while the charcoal and hollow blue represent the contrasting void. The main collision occurs centrally, where the ripple pattern of desire clashes with the echo of emptiness, creating a rhythmic push and pull. The organization suggests a spiral motion, embodying the struggle between expansion and restraint, echoing the seed's themes.</desc>
