<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast in Motion</title>
  <desc id="desc">This artwork explores the emotional dichotomy between joy and grief, structured around a clear division that enhances the tension between order and chaos. The top half uses a palette of vibrant yellows and oranges symbolizing joy, with ring patterns suggesting expansion and lightness. In contrast, the bottom half embodies grief through muted blues and purples, employing jagged, teeth-like patterns that convey fragmentation. The deliberate grid-like edge gives way to a flowing movement from the top to bottom, emulating rain or tears. The collision occurs between warm and cool colors, illustrating an emotional tug-of-war that feels both dynamic and agonizing, with points of interruption creating a sense of unresolved tension.</desc>
