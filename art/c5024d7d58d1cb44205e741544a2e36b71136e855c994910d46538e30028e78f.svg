<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emptiness</title>
  <desc id="desc">The emotional tone explores the push and pull between emptiness and desire. The palette reflects a contrast of warm (magenta) and cool (electric blue) tones, suggesting the conflict between these two feelings. The main contrast plays out in a diagonal flow, where the warm colors ignite in the center, gradually fading into cool shadows, invoking a sense of longing. The 'flame' pattern influences fiery moments amidst cooler voids, while the 'mirror' pattern reflects an imperfect balance. Broken pixels in the edges hint at vulnerability, emphasizing the struggle between fullness and emptiness.</desc>
