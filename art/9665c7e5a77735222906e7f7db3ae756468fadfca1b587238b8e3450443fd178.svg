<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension &amp; Release</title>
  <desc id="desc">This piece captures the emotional dichotomy of envy and gratitude, exploring the tension between contrasting feelings in a dynamic rhythm. The palette of red and white against a black base represents the emotional clash, where red denotes raw energy and pressure, while white suggests a calm release. The composition is designed to create an upward vs. downward flow, with colors colliding sharply in specific areas to evoke the feeling of disrupted harmony, resembling a sporadic heartbeat. An intentional arrangement of broken pixels introduces imperfection, adding depth and a sense of unresolved emotion.</desc>
