<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">This abstract composition explores the emotional contrast between relief and dread. The palette of electric blue and lime embodies vibrancy and unexpected brightness, while the dominant use of black introduces a heavy, oppressive weight. The left side is designed using the 'frame' pattern to evoke a sense of relief, featuring more open spaces that invite calmness. Conversely, the right side utilizes a 'teeth' pattern that juxtaposes tightly packed aggressive elements, creating feelings of tension and confinement. The collision occurs where brightness is almost swallowed by the heaviness, representing the struggle between lightness and density. The arrangement emphasizes a top-to-bottom movement, echoing the feeling of being weighed down, while the broken pixels disrupt the flow, reflecting the inherent imperfections in this emotional journey.</desc>
