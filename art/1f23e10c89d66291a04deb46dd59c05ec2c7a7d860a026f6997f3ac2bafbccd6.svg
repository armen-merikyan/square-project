<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tensions</title>
  <desc id="desc">This artwork explores the emotional dichotomy between defiance and submission through contrasting colors and patterns. The palette consists of warm oranges and yellows juxtaposed against muted blues and purples, symbolizing joy against grief. The 'corner invasion' layout encourages a rising tension from the bottom left to the upper right, while the dotted pattern of defiance collides with a rain-like submission aesthetic, creating a dynamic pluralistic narrative. The fragmented pixel distribution emphasizes a sense of disturbance, echoing the theme of 'falling pixels' and resulting in an unresolved emotional composition that invites viewer interpretation.</desc>
