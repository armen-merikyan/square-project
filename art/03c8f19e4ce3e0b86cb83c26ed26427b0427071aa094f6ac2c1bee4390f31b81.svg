<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This artwork explores the emotional collision between 'emptiness' and 'desire.' The palette of deep reds and blacks contrasted with pale blue and white suggests a battle between overwhelming pressure and the yearning for calm. The arrow shape seed informs an upward and downward movement in the pixel arrangement, creating a sense of dynamic tension. Broken pixels introduce imperfection, symbolizing the jarring nature of unfulfilled desire amid a contrasting emptiness. The flow spirals counterclockwise, enhancing the emotional journey from dense clusters to open spaces, reflecting the push and pull of emotional release.</desc>
