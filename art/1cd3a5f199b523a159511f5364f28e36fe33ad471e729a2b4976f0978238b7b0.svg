<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece captures the emotional tension of desire pushing against the boundaries of emptiness. The use of hot coral and blood orange represents desire, with warmth and vibrancy, contrasting sharply with the calmness of hollow blue and the solidity of charcoal that symbolize emptiness and restraint. The ‘open_gate’ layout suggests movement towards freedom, with the top-left corner featuring a concentration of warmer colors, while the lower-right corner slowly fades into cooler tones, representing a tranquil closure. Broken pixels represent interruptions, enhancing the emotional intensity while maintaining negative space for reflection.</desc>
