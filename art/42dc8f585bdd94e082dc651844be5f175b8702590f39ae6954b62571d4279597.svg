<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Containment</title>
  <desc id="desc">This piece embodies the tension between restlessness and peace, illustrated through a jagged pattern of dark hues colliding with lighter accents. The palette uses muted cream to soften the intensity of the surrounding dark colors, resembling longing amidst constraint. The compositional flow starts from the corner, creating a dynamic diagonal movement that disrupts the calm space created by the light tones. The presence of broken pixels adds a layer of imperfection, representing fleeting moments of clarity amidst chaos.</desc>
