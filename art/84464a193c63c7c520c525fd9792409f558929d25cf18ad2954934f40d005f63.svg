<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone captures the tension between desire and emptiness, with the palette of hot coral and blood orange symbolizing an intense yearn, while hollow blue and charcoal introduce a contrasting stillness. The main collision occurs at the center, where saturated colors burst against muted, restrained fields, reflecting the push and pull of unmet aspirations. The eroded symmetry layout, paired with broken frame patterns, enhances the disruption while ensuring that emptiness is experienced through negative space in the corners.</desc>
