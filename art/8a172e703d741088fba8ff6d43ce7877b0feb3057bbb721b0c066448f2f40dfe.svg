  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork reflects the tension between vulnerability and strength through the contrast of soft, warm colors against cooler, stable hues. The palette emphasizes shelter with muted greens and earthy browns, while the pale skin and cold white introduce vulnerability. The layout features a pressure corner, where dense patterns of strength collide with the delicate crosshatch of vulnerability. The broken pixels disrupt the symmetry, symbolizing imperfections and the interplay of emotions within the piece.</desc>
