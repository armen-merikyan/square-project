<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Orbiting Control</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of 'panic vs control' through a structured yet chaotic arrangement of colors. The palette of navy, black, single white, and dim cyan elicits feelings of loneliness and isolation, evoking the emptiness described in the seed. The top four rows represent control with a pattern of 'noise,' characterized by a stable, dense layering of dark blues and blacks, symbolizing groundedness. In contrast, the bottom four rows express panic with a 'stairs' pattern, showcasing a lighter arrangement with an irregular jump in colors, which introduces visual chaos and turmoil. The interplay between the dark, stable upper section and the bright, disrupted lower section creates a vivid emotional tension, resonating with the idea of conflicting feelings within an empty room. Broken pixels are integrated subtly, suggesting imperfections that enhance the overall narrative without overshadowing the abstract concept.</desc>
