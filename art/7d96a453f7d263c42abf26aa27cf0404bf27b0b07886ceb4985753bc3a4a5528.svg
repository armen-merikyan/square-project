<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Light and Weight</title>
  <desc id="desc">This piece captures the emotional tension between panic and control through a compositional strategy that juxtaposes dense dark fields against bright, vibrant pixels. The palette of red, black, pale blue, and white reflects the fiery energy and calm rationality inherent in the struggle. The main contrast is between dark blacks that create a feeling of weight and control in one half, while the opposing side features bursts of bright red and pale blue, evoking sparks of panic amidst a chaotic backdrop. The abstract representation springs from the seed's theme of tension and conflict, forming a zigzagging flow that dances through the square, creating an echo of unresolved emotions.</desc>
