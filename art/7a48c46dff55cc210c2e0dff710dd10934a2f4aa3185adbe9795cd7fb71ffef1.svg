<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Stillness</title>
  <desc id="desc">This piece explores the tension between restlessness and peace, using a palette inspired by muted tones of sepia and faded blue that suggest memory and reflection. The diagonal layout creates a dynamic flow where the softer, peaceful colors occupy one wedge and the vibrant, restless accents cut through them, symbolizing a struggle between calm and chaos. The use of broken pixels introduces imperfection, reinforcing the memory aspect while creating intentional disruptions in the grid. The main collision occurs diagonally, where the peaceful tones meet the brighter accents, illustrating a push and pull between serenity and intrusion. This arrangement gives a pulse to the piece, echoing emotional undercurrents without depicting any concrete symbols.</desc>
