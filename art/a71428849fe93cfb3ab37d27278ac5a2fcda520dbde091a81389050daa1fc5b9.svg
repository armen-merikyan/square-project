<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Resilience</title>
  <desc id="desc">The artwork embodies an emotional tension between longing and resolve. The cool moss green reflects the deep yearning and quiet spaces associated with longing, while the firm stone gray represents a structured resolve. The contrast between the rust accent and the bone white creates moments of collision, suggesting interruption and repair. This visual narrative reflects the dynamics of overcoming brokenness through resolution. By positioning the accent colors centrally against a muted background, the piece captures the essence of that emotional struggle.</desc>
