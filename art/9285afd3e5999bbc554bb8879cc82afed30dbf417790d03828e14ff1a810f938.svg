<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Resilience</title>
  <desc id="desc">This composition captures the tension between 'spark' and 'ash'—the vibrant yet fleeting moments of brightness clashing with the subdued remnants of stillness. The selected palette intertwines warm 'rose_clay' and 'lamp_gold' as accents against the cooler 'distant_lilac' and 'warm_shadow', creating an emotional dialogue that oscillates between warmth and chill. The main contrast peaks through the center where jagged patterns of spark (gold accents) intermingle with the textured ash (gray tones), representing the collision of quick bursts against the weight of memory. The asymmetry and broken pixels introduce a narrative of imperfection and resilience, inviting viewers to ponder the delicate balance of fragility within strength.</desc>
