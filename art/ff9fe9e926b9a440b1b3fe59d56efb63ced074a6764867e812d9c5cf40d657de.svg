<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tension</title>
  <desc id="desc">The emotional tone expresses a struggle between defiance and submission, reflected in the jagged contrasts of dark and light colors. The palette of warm coral and cold slate creates an underlying tension that mirrors the push and pull of the opposing emotions. The main collision occurs in the center, where static patterns of defiance (warm coral) disrupt the softer dot patterns of submission (soft amber) across a tranquil background of blue black. This layout invokes a feeling of dynamic chaos meeting structured order, with broken pixels adding intentional imperfections to enhance the sense of conflict.</desc>
