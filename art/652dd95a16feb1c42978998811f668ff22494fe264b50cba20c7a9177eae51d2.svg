<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order in Chaos</title>
  <desc id="desc">This composition embodies the emotional tension between panic and control. The palette, derived from warm sepia and faded blue tones, accentuates the contrasts of comfort against anxiety. The radial pattern in the center suggests a force pulling inwards, representing panic, while the clean stripes towards the edges evoke control. The collision happens where these opposing patterns intersect, creating visual noise that disrupts the calm sufficiency of the outer colors. This dynamic illustrates the push-and-pull of emotions - where serenity meets chaotic disruption.</desc>
