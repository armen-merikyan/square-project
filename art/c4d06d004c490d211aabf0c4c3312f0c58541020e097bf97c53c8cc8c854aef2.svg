<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Conflux</title>
  <desc id="desc">This artwork encapsulates the tension between tenderness and rage through a contrast of muted blue tones against sharp reds. The palette allows for a dynamic interplay where the calm pale blue represents tenderness while the aggressive reds signify rage, meeting in the center where the most overlap and collision occurs. The zigzag flow and stacked bands create layers of emotional intensity, with distinct separations that evoke a sense of struggle between these contrasting feelings. Broken pixels scatter through the composition, symbolizing imperfections and disruptions that arise in emotional landscapes.</desc>
