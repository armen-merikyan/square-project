<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between States</title>
  <desc id="desc">This composition embodies the emotional dichotomy of longing and resolve. The color palette, suggested by 'melancholy_wonder', evokes a sense of soft contemplation, with hues like rain blue and muted plum contrasting the clarity of moon white. The left half uses a target pattern to represent longing: soft ceaseless pulses of muted tones barely interrupting the quiet. The right side utilizes a maze pattern for resolution, compressed strength manifesting in sharper lines of soft cyan and lavender gray. Collisions occur as the two patterns intersect in the center, representing a junction where emotions clash. Broken pixels add intrigue and imperfection, reminding us that recovery is not linear but layered, full of scars and repairs. Negative space is preserved, emphasizing the weight of longing against the structured fullness of resolve, captured within an 8x8 grid that narrates this emotional complexity.</desc>
