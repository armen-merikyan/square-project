<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict in Spectrum</title>
  <desc id="desc">The emotional tone of this piece embodies the tension between rage and calm. The palette, utilizing stark contrasts of red (representing rage) against pale blue (symbolizing calm), emphasizes this duality. The sharp vs. soft contrast manifests strongly as broken dots representing rage clash with smooth, spaced patterns of pale blue to create a 'split screen' effect. This layout embodies an argument grid, with the chaotic red elements interrupting the calm blue, reflecting the struggle between internal emotions. The intentional placement of black adds depth, making the vibrant colors pop and highlighting the feeling of pressure within the chaos, while negative spaces provide breathing room, enhancing the overall tension in the composition.</desc>
