<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collisions</title>
  <desc id="desc">This artwork expresses the dual emotions of longing and resolve. The palette comprises warm brown and shelter green to evoke warmth and protection, countered by cold white and pale skin tones that represent vulnerability and exposure. The dense central cluster reflects a place of intimacy and tension (longing), while the surrounding quieter pixels symbolize the calm space of resolve. The main collision occurs at the center, where the intense colors contrast sharply against the soft, muted background, illustrating the tension between desire and the need for stability. This arrangement draws the viewer's eye inwards, mirroring the emotional pull between closeness and distance.</desc>
