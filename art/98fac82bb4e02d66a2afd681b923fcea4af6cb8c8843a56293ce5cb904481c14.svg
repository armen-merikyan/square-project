<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Tension</title>
  <desc id="desc">The emotional tone of this piece encapsulates a struggle between defiance and submission, with angular resistance represented by sharp contrasts against softer, muted tones. The palette is drawn from earthy reds and muted creams to evoke depth and warmth, while hints of dark plum and gray inject tension. The main collision occurs along a diagonal line from corner to center, evoking a sense of encroachment, as one emotion's strength pushes against the weakness of the other. This arrangement reflects the ideas of invasion and conflict present in the seed, creating a dynamic tension that invites contemplation.</desc>
