  <title id="title">Tension Between Calm and Chaos</title>
  <desc id="desc">This artwork captures the emotional conflict between restlessness and peace through a contrasting palette of warm and cool tones. The warm colors reflect rot and restlessness, while the cool tones symbolize tranquility. The arrangement of colors creates a central collision, with brighter accents attempting to burst outward, surrounded by a boundary of cooler, soothing colors. This tension is visually represented through diagonal patterns that echo conflict and movement, while muted fields of color signify the peace that feels just out of reach, invoking the feeling of memory against persistent motion. Imperfections in placement evoke breaks and interruptions characteristic of a restless mind, allowing viewers to sense the struggle between chaos and calm.</desc>
