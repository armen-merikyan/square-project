<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inward Spiral of Contrast</title>
  <desc id="desc">The emotional tone embodies a clash between defiance and submission, depicted through stark contrasts of color and form. The chosen palette of clean white and warning orange juxtaposes the depth of ink black and violet gray, symbolizing tension and resistance. A central bright orange pulse collides with muted gray backgrounds, characterized by 'glitch' and 'noise' patterns, reflecting the push-and-pull dynamic. The main collision occurs at the center, while the edges exhibit an uneven border creating an impression of invasion and encirclement, tying in the seed's essence into an abstract expression.</desc>
