<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This pixel art composition explores the emotional duality between envy and gratitude. Using a palette of warm yellows and oranges contrasting with deep blues and muted purples, it captures the tension and flow between these feelings. The pattern reflects a structured, clean layout merging into chaotic interruption, signifying 'order' on one side with organized rings of warm colors, and 'chaos' on the other through broken, jagged segments of cooler hues. The edge style, corner-heavy, creates an off-centered balance that evokes a sense of unease, symbolizing negotiation between competing emotions. The negative space allows breathing room, presenting an abstract representation of heaviness vs lightness within the confined square form.</desc>
