<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Signal</title>
  <desc id="desc">The emotional tone emphasizes a struggle between clarity and chaos, represented by a palette of vibrant greens and cool grays. The contrast lies in bright 'signal' greens and hot magenta interrupting the static noise of dark blacks and muted grays. The arrangement mimics a central pulse being engulfed and ruptured by surrounding disturbances, creating an asymmetric rhythm that reflects the idea of memory battling interference. The seed of 'crack' manifests as fractured pathways of color that resonate with the exploration of exposure versus shelter.</desc>
