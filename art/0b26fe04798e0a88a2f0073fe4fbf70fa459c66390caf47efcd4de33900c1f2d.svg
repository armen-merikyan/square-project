<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Echoes</title>
  <desc id="desc">The emotional tone is rooted in the conflict between love and betrayal, reflected in the use of warm reds and cool grays. The palette creates a tension, where pinks symbolize love’s softness, while dark maroon and grays suggest underlying fractures. The left columns utilize a softer split-screen pattern to represent love, while the right incorporates a ring pattern signifying the disruption of betrayal. The main contrast lies in the transition between the warm and cool zones, interrupted by broken pixels that create a visual dissonance, embodying the seed's themes of tension and emotional noise.</desc>
