<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Shelter</title>
  <desc id="desc">This composition reflects the emotional tension between safety and exposure, illustrated through an interplay of warm and cool colors. The chosen palette of shelter green, warm brown, pale skin, cold white, and open blue captures both the comforting and the vulnerable aspects of the theme. The main collision occurs in the central vertical band where pale skin and cold white create a stark contrast against the deeper hues. This symbolizes the exposed center being either protected or left vulnerable, while the surrounding spaces echo the warmth of safety. The upward flow in the layout suggests an aspiration towards shelter or illumination amidst complexity.</desc>
