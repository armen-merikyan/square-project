<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition captures the emotional oscillation between desire and emptiness through color placement. The palette features warm colors like hot coral and blood orange interspersed with deep charcoal and hollow blue, creating tension. The bright accents from the desire patterns clash with the vast, muted spaces of emptiness, particularly in central rows creating a pulse of saturation against a quiet background. The varied textures symbolize the struggle between overflowing emotions and constrained spaces, illustrating the core conflict of the seed.</desc>
