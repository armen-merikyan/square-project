<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Light and Shadow</title>
  <desc id="desc">This artwork encapsulates the emotional tension between fear and hope through a split composition. The left side, representing 'fear,' utilizes darker hues (black and dark violet) to invoke a sense of weight and oppression, depicted through a noise pattern and jagged edges. The right side represents 'hope,' with lighter colors (soft gold and pale green) emerging against a split-screen pattern, suggesting upward movement and breaking through barriers. The central column serves as a collision point where light interrupts dark, enhancing the feeling of duality. Jagged edges contrast against glowing forms, creating a dynamic interplay of pressure and release.</desc>
