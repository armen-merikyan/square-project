<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone reflects a struggle between emptiness and desire, illustrated through the use of a contrasting palette. The warmer colors of hot coral and blood orange represent desire, while the cooler tones like charcoal and hollow blue evoke feelings of emptiness and containment. The arrangement features a burst flow with density shifting across layers, where the center forms a vibrant pulse, asserting a warm saturation but is bordered by muted, cooler edges that embody restraint. This collision serves to highlight the tension between longing and the limits set by external confines, paralleling the seed's thematic exploration of pressing desires against a backdrop of void and limitation.</desc>
