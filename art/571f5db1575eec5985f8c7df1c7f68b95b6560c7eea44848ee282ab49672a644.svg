<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Bounded Tension</title>
  <desc id="desc">The emotional tone reflects a dynamic interplay between softness and severity, presenting a saturated pull against a locked border that symbolically conveys hunger vs. restraint. I chose a palette that juxtaposes the warmth of soft pinks and whites against the starkness of deep blacks and grays, embodying the contrasting feelings of gentleness and rigidity. The main collision occurs at the center, where the blending patterns of softness (shatter) and severity (crosshatch) converge, resulting in visual friction that invites exploration and introspection. The arrangement creates an elegant tension while maintaining a quiet background to allow for pockets of negative space, emphasizing the emotional narrative.</desc>
