<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects an intense pull of desire reaching for liberation but restrained by borders that symbolize limitations. The palette of hot coral and blood orange illustrates the warmth and urgency of desire, while dust pink and charcoal introduce muted undertones representing restraint. The main contrast arises at the center where the saturated hues collide with darker edges, reinforcing the theme of struggle between expansion and confinement. The arrangement employs diagonal sweeps from the corner to suggest the dominant emotional force of desire, encapsulated within jagged edges that suggest pressure against boundaries. Broken pixels enhance the visual narrative of disruption and vulnerability within this emotional landscape.</desc>
