<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Doubt</title>
  <desc id="desc">The emotional tone is a tension between trust and suspicion. A palette of moss green, bone white, rust, stone gray, and small gold reflects resilience while hinting at fragility. The dark tones evoke suspicion, while lighter shades suggest trust, creating an interplay of contrasting emotions. The layout rises diagonally, leading the eye up, with dynamic clashes occurring in the center—enhancing the feeling of a struggle between hope and doubt. Broken pixels create intentional imperfections, reinforcing the theme of interrupted signals and the fragile nature of trust.</desc>
