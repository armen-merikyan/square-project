<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Disruption</title>
  <desc id="desc">This composition explores the tension between awe and terror through the duality of order and chaos. The palette of electric blue, lime, magenta, and black amplifies emotion, with electric blue and lime embodying awe while black and magenta evoke a sense of terror. The upper half features a structured crack pattern representing awe, while the chaotic target-like pattern below disrupts the visual flow, representing terror. Broken edges introduce intentional imperfections, reinforcing the sense of instability. The main collision is the transition from the orderly to the chaotic, creating a pulse of emotional tension throughout the mosaic, inviting viewers to navigate the space between serenity and disarray.</desc>
