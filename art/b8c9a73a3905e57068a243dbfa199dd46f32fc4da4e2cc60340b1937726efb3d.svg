<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Calm</title>
  <desc id="desc">This artwork embodies the tension between rage and calm through color and contrast. The palette uses deep reds to express intensity and a spectrum of blues to suggest tranquility. The main collision occurs diagonally across the piece: jagged red scars break into soft blue fields, illustrating an emotional outburst against a backdrop of calm. The use of broken black pixels introduces a sense of fragmentation, reinforcing the idea of eroded symmetry amidst the tumultuous feelings represented. The quieter areas provide a visual release from the hot, demanding colors.</desc>
