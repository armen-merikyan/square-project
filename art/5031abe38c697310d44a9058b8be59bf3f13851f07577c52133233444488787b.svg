<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tone</title>
  <desc id="desc">This pixel art embodies the conflicting emotions of defiance and submission through contrasting patterns and colors. The 'mourning_renewal' palette of deep blacks, blues, and hints of pale yellow captures the depths of grief and renewal. The central spiral diverges into a ripple of broken frames, representing defiance colliding with the enclosing field of submission. Sharp versus soft contrasts are evident, creating a sense of pressure that emphasizes the emotional struggle. Negative spaces are maintained to allow breath within the intensity, representing a delicate balance between resilience and vulnerability.</desc>
