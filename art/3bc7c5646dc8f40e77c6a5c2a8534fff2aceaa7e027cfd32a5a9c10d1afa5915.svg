<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The emotional tone embodies the tension between longing and resolve, captured through a palette of soft and severe colors. The top half illustrates longing with radial patterns in powder pink and warm white, suggesting distant warmth amidst uncertainty. The bottom half portrays resolve in steel gray and sharp crimson, expressing firm boundaries and clear resolve. The collision of colors occurs in the center where their patterns overlap, creating a dynamic interaction that echoes the contrasts of the seed. The broken pixels introduce elements of imperfection, reinforcing the theme of ‘repair vs. damage.’</desc>
