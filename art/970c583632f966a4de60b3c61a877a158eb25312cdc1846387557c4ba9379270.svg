<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rising Tension</title>
  <desc id="desc">This artwork embodies the tension between defiance and submission through its color contrast and distribution. The contrasting palette of dark navy and black against softer dim cyan and shades of white illustrates a struggle between weight and lightness, suggesting emotional depth and conflict. The composition features a heavy bottom weight, symbolizing the anchored presence of submission, while the upper part breaks into lighter tones, hinting at an aspiration towards defiance. The layout flows upward, echoing hope yet interrupted by dark edges, creating an unsettled rhythm that resonates with the seed's themes of conflict and emotion.</desc>
