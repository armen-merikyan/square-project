<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Pulse</title>
  <desc id="desc">This piece captures the emotional tension between defiance and submission through its color contrast and arrangement. The palette, 'lonely_signal', embodies a cold, stark quality with navy and black creating a sense of chaos, while small bursts of dim cyan provide an unexpected brightness, reflecting defiance. The layout divides the square vertically, establishing a split between the two emotional states, with patterns of checker and barcode creating visual interference—a reminder of chaos within structured order. The broken pixels disrupt the expected flow, symbolizing the jagged nature of conflict, tension, and release, while preserving spaces of quiet among the dense areas. The main collision occurs at the center where bright colors meet dark tones, emphasizing the struggle between the two emotional extremes.</desc>
