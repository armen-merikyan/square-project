<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light Meets Weight</title>
  <desc id="desc">This composition conveys the struggle between joy and grief through contrasting colors and patterns. The warmth of yellows and oranges symbolizes joy, while deep blues and muted purples represent grief. The palette reflects the emotional tension with vibrant warmth clashing against dark heaviness. The patterns create an interaction: maze-like elements of joy punctured by stark stripes of grief, demonstrating a dynamic interplay of emotions. The thin outline gives a sense of fragility amidst density, embodying the wave-like flow of emotion from lightness to heaviness.</desc>
