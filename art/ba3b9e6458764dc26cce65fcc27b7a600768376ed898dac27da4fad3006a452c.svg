<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Refuge</title>
  <desc id="desc">The emotional tone explores the delicate balance between vulnerability and strength, captured in an abstract interplay of colors. The palette features warm and cool tones—'rose clay' and 'warm shadow' signal strength and grounding, while 'cool blue' and 'distant lilac' embody vulnerability and softness. The dominant density of darker colors in the center clashes against the quieter hues surrounding it, representing a refuge. Broken pixels integrated at random positions serve as intentional disruptions, embodying the tension of exposure. The central focus evokes a sense of both safety and risk, aligning closely with the seed's narrative of conflict and interplay.</desc>
