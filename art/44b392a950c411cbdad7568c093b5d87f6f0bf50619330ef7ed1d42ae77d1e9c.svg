<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Weight</title>
  <desc id="desc">This piece captures the evocative emotional dance between joy and grief. The palette features bright yellows and oranges representing joy, clashing with deep blues and muted purples symbolizing grief. The sharp contrast is deliberate, creating a chasm between light and dark, echoing life's unpredictability. The arrangement follows a 'bottom-to-top' layout, representing a rise, with color placement reflecting the tensions of 'safe vs threatened' as lighter colors begin to infiltrate heavier tones. Imperfections introduced through broken pixels highlight the chaotic overlap of these emotions, making the overall composition feel dynamic while preserving negative space for reflection.</desc>
