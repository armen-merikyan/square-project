<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Fracture</title>
  <desc id="desc">The emotional tone juxtaposes awe's expansive beauty against the unpredictability of terror. Drawing from the 'lonely_signal' palette, the colors create visual tension, with navy providing depth contrasting with the starkness of black, while touches of white and dim cyan introduce unexpected highlights against the dark. The broken dots in the left half create an echo of the terror while soft edges modulate the transition, exemplifying stability versus instability. Each pixel placement corresponds to a wave of emotion flowing outward from the center, introducing fractal breaks that represent fragmentation and memory, embodying 'symmetry_vs_break.'</desc>
