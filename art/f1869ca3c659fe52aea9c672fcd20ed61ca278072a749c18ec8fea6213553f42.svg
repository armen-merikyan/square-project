  <title id="title">Shifting Layers of Emotion</title>
  <desc id="desc">This artwork captures the tension between fear and hope through contrasting color placement and patterns. The palette, featuring black, dark violet, soft gold, and pale green, reflects the dual nature of the emotions: dark tones representing fear and lighter tones representing hope. The arrangement has a stark upper half dominated by dark colors with sharp lines suggesting pressure, while the bottom half introduces soft gold and pale green, suggesting a rising, hopeful signal. The zigzag pattern adds an element of disturbance, echoing the conflict of emotions, while the corner-heavy composition draws focus towards the interplay at the center where these feelings collide.</desc>
