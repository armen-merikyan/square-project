<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">This composition captures the emotional tone of love juxtaposed with betrayal, manifesting through the chosen palette of warm pinks and reds against the cool grays and dark maroon. The top half conveys love with soft, toothy patterns in pinks and reds, suggesting warmth and connection, while the bottom reflects betrayal through a structured grid of cool grays and dark maroon, implying a sense of cold isolation. The main contrast occurs where these two emotional realms collide, creating a palpable tension. The use of broken pixels introduces imperfection, representing the flaws inherent in relationships, while negative space enhances the feelings of emptiness and confrontation. The seed's themes of inside vs outside and bottom to top inform the vertical layout, creating a pulse-like rhythm that pulls the viewer's eye through the piece.</desc>
