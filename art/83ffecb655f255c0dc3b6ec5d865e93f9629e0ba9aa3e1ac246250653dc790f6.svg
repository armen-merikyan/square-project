<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Balance</title>
  <desc id="desc">This artwork reflects the emotional tension between longing and resolve. The warm ivory and soft gold serve as symbols of hope and repair, while the deep wine and ash gray embody a sense of damage and yearning. The 'halo' and 'checker' patterns collide visually, representing the conflicting emotions. The central area is more densely populated to embody resolve, while the edges remain softer to evoke a sense of longing, creating a visual push and pull. The choice of palette accentuates the warmth of hope against the coolness of loss, with deliberate broken pixels introducing disruption and imperfection, reflecting the weariness of repair in the midst of damage.</desc>
