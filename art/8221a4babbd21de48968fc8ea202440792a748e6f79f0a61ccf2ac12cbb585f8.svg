<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tension</title>
  <desc id="desc">This piece embodies the emotional dichotomy of longing and resolve through a palette reflecting warmth and coolness, creating an intimate tension. The warm coral and soft amber colors express a constant yearning, while the cold slate and blue-black provide firm grounding. The main collision between the 'crack' (longing) and 'lattice' (resolve) patterns occurs around the center, suggesting a struggle between chaos and order. The quiet negative space channel runs horizontally, amplifying the feelings of containment versus overflow, enhancing the contemplative quality of the composition.</desc>
