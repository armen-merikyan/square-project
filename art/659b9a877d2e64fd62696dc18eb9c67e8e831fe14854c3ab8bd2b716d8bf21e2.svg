<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Balance</title>
  <desc id="desc">The emotional tone contrasts envy and gratitude, symbolizing tension between heaviness and lightness. The palette, rooted in 'ancient_fire' colors, uses burnt orange and dark red to represent the weight of envy, while gold denotes the uplifting essence of gratitude. The central area is dominated by the warm, heavy colors to illustrate the struggle, while the lighter gold serves as an echo of relief and appreciation, battling against the intense dark red and charcoal. Broken pixels disrupt the symmetry, demonstrating unpredictability within the emotional landscape. The zigzag pattern introduces friction and rhythm, capturing the dynamic clash between emotions as they interlace within a structured framework, creating a visual narrative of conflict and resolution.</desc>
