<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece embodies the emotional tug-of-war between softness and severity. The palette, featuring soft pinks and harsh blacks, creates a stark contrast where warmth meets coolness, representing an internal conflict. The central collision occurs as the pulse marks, depicting severity, interrupt the braids of softness, suggesting a struggle between opposing forces. The layout emphasizes negative space which allows the viewer's eye to navigate the tension created by densely packed colors beside quieter fields.</desc>
