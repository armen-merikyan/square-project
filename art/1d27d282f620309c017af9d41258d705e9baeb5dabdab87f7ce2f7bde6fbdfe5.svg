<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory and Motion</title>
  <desc id="desc">This piece captures the emotional duality of 'spark' versus 'ash', showcasing the tension between vibrancy and monotony. The palette of warm pink and red against muted grays and dark maroon evokes a sense of conflict, representing the flashes of life against the remnants of what once was. The upper four rows utilize vibrant stripes to denote 'spark', while the bottom fades into ash-like frames. The main collision occurs in the center where vibrant reds disrupt the cooler tones, mimicking the struggle between motion and stillness.</desc>
