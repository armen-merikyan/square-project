  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">In this abstract artwork, the emotional tone reflects a delicate tension between vulnerability and strength. The color palette, comprising deep blue and mourning black, conveys weight and depth, while pale yellow introduces lightness, representing both exposure and the hope of renewal. The layout features a broken frame, where the irregularities symbolize emotional leaks and struggles of strength opposing vulnerability. The main contrast occurs at the center where the radial strength pattern intersects with rippling vulnerability, creating a dynamic interaction. Intentional broken pixels add scars and interruptions, amplifying the sense of imperfection and layered emotions.</desc>
