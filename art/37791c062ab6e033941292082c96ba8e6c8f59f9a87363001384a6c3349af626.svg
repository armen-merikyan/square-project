<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Quiet Collision</title>
  <desc id="desc">This piece expresses the emotional tension between longing and resolve through color and arrangement. The palette of burnt orange, dark red, charcoal, and gold creates a warm, passionate atmosphere—reflecting longing—yet the dense clusters of dark hues contrast sharply with lighter spaces, embodying moments of resolve. The main collision occurs toward the center, where radial patterns of resolve (darker tones) meet quieter fields of longing (light orange and gold), creating visual and emotional tension. The use of negative space emphasizes the struggle between these emotions, echoing the seed's themes of balance between intimacy and distance.</desc>
