  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition juxtaposes the softness of tenderness with the sharpness of rage. The palette of deep reds and quiet blues represents emotional extremes, while black creates boundaries and defines space. The upper half utilizes circular, gentle patterns to convey tenderness, whereas the bottom erupt with jagged lines of red representing rage. The central collision of these contrasting emotions manifests as overlapping patterns—evoking a sense of struggle and harmony simultaneously, embodying the dynamic interplay of highs and lows in emotional experience.</desc>
