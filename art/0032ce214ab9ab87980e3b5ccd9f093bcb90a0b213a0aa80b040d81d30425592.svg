<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Being</title>
  <desc id="desc">The emotional tone contrasts 'joy' with 'grief', represented by a palette of bright yellows and oranges alongside deep blues and muted purples. This duality creates a visual tension where warmth collides with heaviness. The pattern flows from bottom to top, mimicking rising emotions, yet features hard edges to signify the abrupt interruptions of grief. The crosshatch and target patterns create a sense of organized chaos, where the joyful bright colors pulse against the subdued tones, evoking both safety and threat within the emotion landscape.</desc>
