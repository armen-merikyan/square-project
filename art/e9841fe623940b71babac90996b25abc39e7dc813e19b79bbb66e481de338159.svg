<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Boundaries</title>
  <desc id="desc">This artwork embodies the tension between the concepts of safety and exposure. The color palette of soft greens and warm browns symbolizes safety, while pale skin tones and cold whites illustrate exposure. The arrangement features heavy ripples on one side, which represent safety’s comforting presence, contrasting with brighter, dot-like echoes on the other side, suggesting vulnerability. This clash of patterns not only plays out visually but also narrates an emotional battle between feeling protected and open. The dominant presence of warm brown contrasts with the unprotected whites, creating a dynamic interplay visualizing a push and pull, akin to the feelings of confronting one’s vulnerabilities.</desc>
