  <title id="title">Exposure &amp; Shelter</title>
  <desc id="desc">This composition captures the emotional tension between safety and exposure through contrasting colors and patterns. The warm brown and shelter green represent protection around a vulnerable pale skin hue at the center, symbolizing safety. The cold white and open blue splashes echo the feeling of exposure, creating an airy space around the dense edges. Here, the main collision occurs at the center, where the soft colors intermingle, suggesting the fragility of shelter against the pressure of exposure. The subtle breakup of pixels adds a layer of imperfection, reflecting the complexity of navigating these emotions.</desc>
