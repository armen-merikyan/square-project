<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Weight</title>
  <desc id="desc">This artwork embodies the emotional tones of fear and hope, expressed through a contrast of dark and light elements. The palette combines deep blacks and dark violets to represent fear, juxtaposed with soft golds and pale greens to symbolize hope. The central area emerges brighter, but is surrounded by darker edges, illustrating the clash between lightness and weight. Broken pixels infuse a sense of imperfection and unpredictability, while a crosshatch pattern suggests tension and complexity. The overall composition creates a dynamic contrast, echoing the struggle of these emotions.</desc>
