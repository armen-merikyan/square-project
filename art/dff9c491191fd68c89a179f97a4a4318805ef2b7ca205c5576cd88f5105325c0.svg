<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow of Emotion</title>
  <desc id="desc">The piece captures the emotional tension between emptiness and desire, embodied by the clash of cool and warm colors. The palette transitions from deep black to vibrant electric blue and magenta, illustrating a contrast between depth and intensity. The upward movement across the left side symbolizes aspiration through desire, while the descending darker shades on the right reflect the weight of emptiness. This duality creates a dynamic visual experience that resonates with the sentiments of rise versus fall.</desc>
