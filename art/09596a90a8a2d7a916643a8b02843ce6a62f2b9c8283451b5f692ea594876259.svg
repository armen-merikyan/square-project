<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erosion of Calm</title>
  <desc id="desc">This work captures the emotional contrast of rage and calm, with jagged red patterns disrupting a cooler, more serene palette. The dominant black encroaches upon pale blue fields, forming the collision of sound and silence. The spiral layout suggests a tension at the center that unfolds into the calm edges, symbolizing the contained emotional struggle indicated by the seed. Broken pixels introduce an element of imperfection, adding depth and evoking an emotional response through visual noise.</desc>
