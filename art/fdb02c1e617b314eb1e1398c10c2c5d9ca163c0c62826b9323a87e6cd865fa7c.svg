<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition embodies the emotional struggle between ignition and decay. Utilizing a palette of signal green, electric blue, dead black, static gray, and hot magenta, it juxtaposes vibrant sparks against muted ashes, symbolizing tension between growth and restraint. The left side features jagged patterns representing 'spark' with bright colors and explosive shapes, while the right embodies the 'ash' in soft, faded hues. The central collision, where colors overlap dramatically, creates a visual rhythm of tension and release, allowing for contemplation of resilience against fragility.</desc>
