<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone captures the tension between defiance and submission using a palette that evokes safety and exposure. The warm brown and shelter green represent the defiant and stable core, while pale skin and cold white indicate the enclosing, submissive borders. The central confrontation happens with the warm tones asserting against the cool edges, creating a collision of emotional weights. Each color placement reflects this dynamic, yielding a rhythmic push and pull across the square, shaped by the seed's themes of conflict, structure, and density.</desc>
