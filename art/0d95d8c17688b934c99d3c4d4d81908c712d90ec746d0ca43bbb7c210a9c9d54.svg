<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Spiral of Tension</title>
  <desc id="desc">This composition reflects a battle between rage and calm through the use of a bold color palette that embodies these emotions. The warm reds represent the intensity and eruption of rage, while the soothing pale blue and whites bring balance and tranquility. The layout flows upward with a central hot spot of red surrounded by calming shades that spiral outward, creating a visual tug-of-war. The interplay of maze-like rage patterns colliding with glitchy calm elements evokes a sense of chaos versus peace. This tension is further expressed through broken pixels that introduce intentional disruptions and scars, suggesting ongoing conflict and unresolved emotion without depicting literal imagery.</desc>
