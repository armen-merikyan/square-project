<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tide of Contrast</title>
  <desc id="desc">The emotional tone captures the tension between vulnerability and strength, represented through the juxtaposition of soft, pale colors against vivid, dense ones. The selected palette of hot coral, blood orange, dust pink, charcoal, and hollow blue creates a warm-cool emotional tension, with muted pastels signaling vulnerability and vibrant tones suggesting strength. The collision of static and dots patterns reflects an interplay between fragility and resilience, primarily anchored at the center while gradually shifting towards edges that feel more vulnerable. This dynamic creates a visual rhythm that resonates with the theme of exposure juxtaposed against safety, drawing on the seed's essence of brokenness and contrast.</desc>
