<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Voids and Vigor</title>
  <desc id="desc">This artwork reflects the emotional tension between vulnerability and strength. The palette combines warm shadow and distant lilac to create a sense of intimacy and distance, highlighting the contrasting feelings. The center features a strong lattice pattern that shows stability, while surrounding islands create undercurrents of vulnerability. A solid black pixel introduces a moment of interruption. The main collision occurs at the center, where the strong pattern collides with more fragmented, delicate forms around it, illustrating the battle between exposure and shelter.</desc>
