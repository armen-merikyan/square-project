<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Clash of Light and Shadow</title>
  <desc id="desc">This artwork explores the tension between fear and hope through a contrasting palette of darkness and light. The dark colors symbolize fear, creating jagged edges that convey pressure, while the soft gold and pale green represent hope and signify upward flow, suggesting light breaking through. The choice of vertical split and a stair-like pattern evokes a tumultuous journey towards liberation. The arrangement uses negative space to enhance feelings of emptiness amid vibrancy, illustrating the balance between the weight of despair and the desire for light.</desc>
