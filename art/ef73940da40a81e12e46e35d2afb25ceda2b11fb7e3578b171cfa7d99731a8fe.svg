<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition explores the emotional tension between rage and calm, using a palette of red for intensity and pale blue for tranquility. The spatial arrangement creates a balance where red, representing rage, attempts to overflow from its confines, while cooler colors contain this energy. The radial pattern of the warm hues clashes with the sparks of calm, suggesting moments of explosive disturbance amidst serene quiet. The composition features a dominant dark field interrupted by bright accents, revealing a story of struggle and coherence between conflicting emotional states, with the central area representing the core collision. The layout maintains negative space, emphasizing the sparsity against the riot of emotion, fitting the concept of an empty room filled with tension.</desc>
