<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Cascade</title>
  <desc id="desc">This piece reflects the tension between joy and grief through a palette of warm oranges and yellows accentuated by cool muted purple and deep blue. The upper half uses stair-like patterns representing joy, creating upward momentum, while the lower half introduces fragmentation and heavier tones of grief, suggesting depth. The contrasting colors combined, create a wave-like application across the canvas that feels both expansive and constrained. The broken pixels disrupt the order, evoking a sense of chaos amid the structure, embodying the push and pull of these emotions.</desc>
