  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone explores the dichotomy of safety and exposure, using a palette that balances warm brown and shelter green with cool white and open blue. The main contrast occurs vertically, where dense warm clusters on the left embody protection, while the right offers a cool, sparse opening that echoes exposure. The pattern reveals a collision of soft rain-like textures against the sharp rings signifying anxiety, visually manifesting the tension between comfort and vulnerability.</desc>
