<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Disrupted Balance</title>
  <desc id="desc">This composition reflects the tension between defiance and submission through an emotional palette of muted hues and jagged contrasts. The palette includes red oxide for strong visual presence, blackened plum for shadow and depth, and small orange as a vibrant interruption. The central area illustrates defiance, utilizing a stair-like progression that rises diagonally, while the surrounding border features softer dots, representing submission. Broken pixels introduce a sense of imperfection, emphasizing the collision between chaotic and ordered elements, thus creating a narrative of struggle and resolution.</desc>
