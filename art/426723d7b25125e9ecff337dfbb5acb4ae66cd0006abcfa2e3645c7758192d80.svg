<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The artwork captures the emotional tension between joy and grief through contrasting palettes—bright yellows and muted purples. The outer pixels are weighted with deeper blues, portraying grief and heaviness, while the inner grid-like maze reflects joy's vibrancy, creating a visual push-pull effect. The broken pixels integrate imperfection, embodying the fragility of these emotions. The diagonal flow emphasizes the rising spirit against underlying sorrow, mirroring the complexities of emotion as they collide and intertwine, creating a dynamic, unresolved composition.</desc>
