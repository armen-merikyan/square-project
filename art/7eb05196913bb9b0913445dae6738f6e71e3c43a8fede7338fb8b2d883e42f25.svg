<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilient Sparks Amidst Ash</title>
  <desc id="desc">This artwork embodies the emotional tension between ignited resilience (spark) and the quiet remnants of restraint (ash). The chosen palette of dust gray for subtle grounding, complemented by compressed red for vibrant energy, creates a dynamic interplay where bright colors break through darker hues. The main collision occurs in the central region, where the echo pattern of the spark clashes with the negative cross additions of ash, creating disruptive energy across a primarily gray canvas. The composition allows for routes of contained chaos through jagged edges, reflecting memory and erasure in the piece's rhythmic flow.</desc>
