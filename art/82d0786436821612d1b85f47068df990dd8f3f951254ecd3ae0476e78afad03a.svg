  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork evokes a clash between rage and tenderness, with a darker, saturated palette representing rage on the outer border and a soft, muted interior symbolizing tenderness. The mix of sharp edges in the outer rows cuts into the inner softness, illustrating emotional tension. The vivid contrasts highlight the struggle between these emotions, creating a powerful narrative of conflict and resolution, with broken pixels adding an element of imperfection and depth.</desc>
