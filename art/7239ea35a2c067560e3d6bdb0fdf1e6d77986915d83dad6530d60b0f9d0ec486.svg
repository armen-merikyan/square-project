<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The artwork embodies the emotional dichotomy of loneliness and connection by contrasting dense clusters of warm tones with expansive cool areas. The chosen palette of pinks, reds, and greys reflects love and betrayal, aiming to evoke the intensity of conflicting feelings. The top half suggests connection through a pattern of warm colors pressed against one another, while the bottom half embodies loneliness with negative space and varying shades of grey that fracture the pattern, creating a sense of isolation. The broken edges allow for visual imperfection, enhancing the theme of emotional collision, while the flow from bottom to top represents a journey from isolation to potential reconnection.</desc>
