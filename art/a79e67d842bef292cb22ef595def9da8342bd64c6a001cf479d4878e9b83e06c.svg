<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tide of Emotion</title>
  <desc id="desc">This artwork reflects the interplay between certainty and curiosity. The structured palette of muted cream and blackened plum symbolizes certainty, contrasting with small orange's vibrant curiosity. The arrangement uses dense clusters to create movement from the center outwards, resembling a tide that disrupts the calm edges. The intention was to evoke a sense of rising tension and chaotic energy against a backdrop of stability. The main collision occurs in the center, showcasing how certainty can encircle and contain the more tumultuous elements of curiosity.</desc>
