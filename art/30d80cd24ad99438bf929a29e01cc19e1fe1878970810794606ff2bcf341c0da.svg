<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Stillness and Movement</title>
  <desc id="desc">The emotional tone reflects a dynamic contrast between the unsettled nature of restlessness and the serene balance of peace. The palette, consisting of warm shadow, cool blue, and distant lilac, illustrates the interplay of emotion where warmer hues suggest motion and cooler shades invoke calmness. The main contrast occurs diagonally across the composition, with stuttered hinge patterns representing restlessness colliding against the tranquility of soft stripes, embodying the tension between these feelings while allowing patches of negative space to give the eye a resting point.</desc>
