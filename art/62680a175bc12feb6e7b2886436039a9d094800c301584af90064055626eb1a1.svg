<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Asymmetry</title>
  <desc id="desc">This composition reflects the emotional tension between control and surrender. The palette of navy and dim cyan provides a cool foundation, representing control, while sparse isolated bursts of white signify surrender attempting to invade. The main contrast occurs centrally, where the cooler tones push against the brighter accents, creating a visual stutter. The layout suggests an empty space filled only with fragmented signals, embodying the themes of overflow and containment.</desc>
