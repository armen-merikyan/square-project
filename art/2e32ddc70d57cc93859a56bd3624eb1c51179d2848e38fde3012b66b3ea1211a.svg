<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory in Motion</title>
  <desc id="desc">This abstract artwork embodies the tension between control and surrender. The muted palette of sepia, tan, dust gray, and faded blue reflects a nostalgic memory, while the collision of pulse marks (control) interspersed with softer threshold areas (surrender) creates depth and emotional dynamism. The central colors signify pressure, and the broken pixels act as interruptions, reinforcing the theme of fragmented memory and unresolved feelings. The scalar dynamic, with a mixture of dense regions and quiet spaces, mirrors the oscillation between restraint and release, echoing the seed's emotional narrative.</desc>
