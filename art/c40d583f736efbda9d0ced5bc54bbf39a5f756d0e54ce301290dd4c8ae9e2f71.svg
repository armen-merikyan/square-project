<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Tones</title>
  <desc id="desc">This artwork embodies the emotional struggle between desire and restraint through a dynamic arrangement of colors. The palette features saturated corals and oranges representing desire, contrasted against muted grays and blues symbolizing restraint. The central collision occurs in the halo-effect layout, where warmer tones leak toward the edges but are contained by cooler colors, signifying the push and pull of emotions. Patterns of 'teeth' and 'stepwell' interweave, creating a sense of pressure and release, while intentional broken pixels disrupt the smoothness, adding to the narrative of imperfection within longing.</desc>
