<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This square explores emotional tension through a palette that contrasts warmth and coolness. The top half (desire) is saturated with hot coral and blood orange, emphasizing yearning and vibrancy, while the bottom half (restraint) uses charcoal and hollow blue to represent muted feelings. The collision occurs at the dividing line, where warmer tones meet cooler hues, suggesting a struggle. The patterns of swirling disrupts the fixed order, signifying an inward spiral of desire pushing against the locked border of containment. In this arrangement, negative space enhances the sense of pressure, highlighting the emotional pull of desire against the confinement of restraint.</desc>
