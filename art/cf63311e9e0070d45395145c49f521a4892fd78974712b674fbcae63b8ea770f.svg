<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">This piece embodies the emotional tug-of-war between dread and relief, utilizing a palette of dark maroon and gray to evoke heaviness and unease contrasted by sudden bursts of vibrant pink and red that symbolize liberation and joy. The layout seizes upon a divided core versus a framed exterior, capturing tension through the collision of lighter and darker hues within an outer border that suggests constraint and restriction. The broken pixels introduce an element of imperfection, enhancing the inherent chaos in the composition. Overall, this arrangement speaks to the struggle within confined spaces, echoing both the feelings of rage and calm through its color placements.</desc>
