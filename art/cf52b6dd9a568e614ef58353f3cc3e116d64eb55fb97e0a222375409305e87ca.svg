<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The artwork conveys a tension between vulnerability and strength through contrasting colors and patterns. The palette of hot coral and blood orange provides warmth and emotional intensity, while the cool hollow blue serves as a quiet field, emphasizing the balance between exposure and protection. The central collision occurs with the strong negative-cross pattern in the lower left, juxtaposed against soft ripple patterns on the upper right, visually representing the conflict between dense and fragile emotions. The use of broken pixels adds intentional disruption, echoing feelings of vulnerability amid a structured, yet abstract, foundation.</desc>
