<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition captures the emotional tension between emptiness and desire. The palette features warm, saturated colors like hot coral and blood orange, representing desire, contrasted against cooler colors like charcoal and hollow blue, symbolizing emptiness. The arrangement creates a spiral flow, where the densely packed colors in the center pulse outward, simulating a rising signal that meets the containment of the edges. Broken pixels are strategically placed to evoke interruptions, enhancing the theme of disruption vs. order. The dominant warm tones occupy about 65% of the square, illustrating the overwhelming nature of desire, while allowing empty spaces to convey an essence of restraint. This tension between warmth and coolness, between fullness and hollowness, embodies the struggle of aspiration against boundaries.</desc>
