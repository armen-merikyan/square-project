<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This abstract composition captures the emotional tension between vulnerability and strength. The selected palette of ripe green, acid green, honey gold, deep olive, and cream evokes a complex interplay of warmth and coolness, symbolizing both growth and desire. The main collision occurs between the intense greens at the center, representing strength and supportive density, contrasted with pale accents of cream suggesting vulnerability and openness. The broken pixels introduce intentional imperfections, reflecting scars or leaks in the protective shell. This layout embodies an 'open gate', inviting conflicting energies while maintaining a sense of balance and quiet.</desc>
