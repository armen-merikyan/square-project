<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between the Cracks</title>
  <desc id="desc">This piece embodies the emotional tension between longing and resolve through its interplay of muted and vibrant colors. The palette of pale mint and storm gray conveys a sense of yearning while faded gold and near black represent strength and locking in resolve. The central tension occurs with the juxtaposition of light and dark in the middle rows, suggesting a pulse between contrasting emotions. The use of broken pixels creates imperfection and echoes the fragile state of repair versus damage as expressed in the seed.</desc>
