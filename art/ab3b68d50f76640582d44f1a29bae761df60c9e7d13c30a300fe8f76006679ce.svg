<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Harmony</title>
  <desc id="desc">The emotional tone captures the tension between warmth (love) and desolation (betrayal). The chosen palette of pinks and dark maroons emphasizes love's softness against betrayal's harshness. A checker pattern symbolizes order, while broken, jagged edges represent chaos. The main contrast occurs between vibrant pinks disrupted by deep maroon spots, reflecting emotional interruptions and fractures. This grid-like composition reveals density versus emptiness, telling a story of a heart fragmented yet surrounded by chaotic beauty.</desc>
