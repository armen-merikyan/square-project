<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Longing</title>
  <desc id="desc">This artwork expresses the emotional tension between emptiness and desire through the contrasting color palette of dark navy, muted blacks, and a subtle light cyan. The use of warm tones represents desire, while cooler colors illustrate a sense of emptiness. The main collision occurs where dark pixels abruptly meet lighter ones, symbolizing the struggle between these feelings. The mirror layout introduces intentional breaks to indicate imperfection and loneliness. Each pattern interacts dynamically, suggesting conflict yet maintaining an airy negative space, embodying the unresolved loop of longing.</desc>
