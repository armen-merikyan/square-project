<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The composition explores the emotional contrast between vulnerability and strength by creating a center pulse where a pale exposed square meets dense darks at the edges. The colors chosen reflect warmth (coral and blood orange) clashing against cooler, heavier tones (charcoal and hollow blue), embodying a clash between safety and exposure. The broken pixel elements introduce imperfection, enhancing the theme of vulnerability, while the dark edges suggest strength, stability, and boundaries. The central collision area invites a feeling of transition from safety to exposure, amplifying the tension between these opposite emotions.</desc>
