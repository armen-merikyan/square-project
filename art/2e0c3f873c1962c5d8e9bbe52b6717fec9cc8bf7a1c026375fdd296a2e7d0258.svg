<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This piece captures the tension between trust and suspicion, employing a contrasting palette of cool blue and stark black with accents of white and red. The left side represents trust with broken dots symbolizing stability, while the right side erupts in rigid stripes indicative of suspicion, creating a visual clash. The collision occurs centrally, creating an emotional pivot that highlights the duality in the seed concept. The broken pixels disrupt the pattern further, introducing intentional chaos which adds to the narrative of emotional conflict.</desc>
