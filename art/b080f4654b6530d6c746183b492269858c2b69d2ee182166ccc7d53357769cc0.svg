<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This piece embodies the tension between vulnerability and strength using a palette drawn from themes of mourning and renewal. The deep blue serves as a stable foundation, representing strength, while pale yellow highlights moments of vulnerability, interspersed throughout the design. The contrasts occur particularly in the center, where pulse marks collide with islands to create a dynamic interplay of pressure and release. This abstract arrangement reflects the emotional dichotomy of open exposure against a backdrop of protective density, symbolized by the rising signal layout. Broken pixels introduce intentional imperfection, enhancing the narrative of struggle and resilience.</desc>
