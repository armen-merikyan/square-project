  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork embodies the emotional tension between vulnerability and strength, using a soft palette that contrasts deep blues and mourning blacks against pale yellows and fresh greens. The composition reflects a swirling, layered density where the center feels both exposed and fragile, while the surrounding colors provide a protective embrace, suggesting a struggle between safety and exposure. The broken pixels reflect the imperfections that come with vulnerability, creating an intentional disruption. The dominant color at the center captures the essence of vulnerability while providing a contrast to the stronger, deeper colors on the outer rings.</desc>
