<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Connections</title>
  <desc id="desc">This artwork explores the emotional tension between love and betrayal. The palette of pink, red, gray, and dark maroon symbolizes warmth and affection contrasted against shadows of doubt and loss. The main collision occurs at the diagonal axis, where soft pastels clash with the deeper, richer colors, creating a dynamic tension. The layout flows from top to bottom, resembling descending feelings, while the broken edges and contrasting patterns evoke feelings of fragmented relationships, maintaining a balance of chaos and calm. The presence of negative space punctuates the heaviness, suggesting emptiness amidst noise. The overall piece invites reflection on the duality of intimacy and disillusionment.</desc>
