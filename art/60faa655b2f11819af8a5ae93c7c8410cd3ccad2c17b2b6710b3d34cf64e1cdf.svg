<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotion</title>
  <desc id="desc">This composition embodies the emotional tension between tenderness and rage, characterized by a collision of saturated and muted colors. The palette features deep red and black to evoke the intensity of rage, contrasted with soft pale blue and white to represent tenderness. The layout flows diagonally, starting from the corner with the red and black colors representing rage and gradually transitioning into the softer hues. The use of broken pixels introduces an element of chaos and ruptured symmetry, reinforcing the emotional struggle depicted in the seed. The main collision occurs towards the center, where these emotions intersect, creating a visual story of conflict and coexistence.</desc>
