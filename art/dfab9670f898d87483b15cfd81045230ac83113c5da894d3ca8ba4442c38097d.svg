<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a tension between deep desires and the boundaries that constrict them. The palette of hot coral, blood orange, and dust pink evokes warmth and longing, while charcoal and hollow blue provide a cool contrast that signifies restraint. The main collision occurs in the center, where saturated colors clash and interact with muted fields, creating a dynamic interplay that encapsulates the theme of restricted emotional flow. Inspired by the seed concepts, the arrangement employs a patchwork for desire and echoes for restraint, emphasizing their struggle within a sealed boundary.</desc>
