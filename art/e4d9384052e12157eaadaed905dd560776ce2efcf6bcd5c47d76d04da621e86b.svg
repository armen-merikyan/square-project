<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilient Pulse</title>
  <desc id="desc">This composition captures the emotional tension between longing and resolve through a palette that reflects resilience and fragility. The use of moss green and stone gray creates a visual tension, where the lighter bone white allows space for the longing aspect to express itself. The main collision occurs in the center, where the yellow hue of small gold disrupts the otherwise muted palette, embodying a spark of resolve amidst the echoes of longing. The layout of two pulsing centers within a quiet field reinforces the theme of intimacy and distance, suggesting a dialogue between the emotions. The broken pixels introduce an element of imperfection, representing the scars of experience, while negative spaces maintain breathing room for contemplation. Overall, the piece echoes the push and pull of inner conflict through its abstract layering and use of color.</desc>
