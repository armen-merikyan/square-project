<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Time</title>
  <desc id="desc">This piece explores the emotional landscape of nostalgia versus progress by using a warm palette of burnt orange and dark red against a muted charcoal. The upper section uses a pattern of broken dots (representing progress) to create a structured yet fragmented feel, while the lower section employs a tooth pattern (symbolizing nostalgia) to evoke memories, suggesting a battle between structured chaos and comforting disorder. The top half feels light and dynamic, while the bottom is grounded and dense, capturing the essence of rise vs. fall.</desc>
