<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Struggle of Color and Form</title>
  <desc id="desc">The emotional tone articulates a tension between defiance and submission, using the contrasting patterns of constellation and checker. The chosen palette of shelter green, warm brown, pale skin, cold white, and open blue emphasizes both warmth and distance. The main contrast manifests at the center, where vibrant colors collide against softer tones, representing the struggle of defiance against yielding. The asymmetry of broken pixels disrupts the flow and adds to the theme of invasion, where patterns overlap and interrupt each other.</desc>
