<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This artwork embodies the emotional tension between safety and exposure. The chosen palette of soft greens, warm browns, and pale tones reflects a spectrum of sheltering and revealing qualities. The contrast lies in the dense warm brown in one section colliding with the open cool blue, symbolizing safety's grip against the rawness of exposure. The arrangement follows a split vertical pattern, creating a defined border that subtly erodes, suggesting the fragility of protection. This artwork captures the essence of conflict between the desire for safety and the risk of exposure.</desc>
