<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Shelter</title>
  <desc id="desc">This piece emanates a tension between safety and exposure through its color and layout. The cool, soft blue (#A4C8E1) represents the theme of exposure, encapsulating a sense of vulnerability. It is juxtaposed with the stable warm brown (#A75D35) surrounding it, hinting at safety and protection. The combination of a pale center with subtle patterns of disturbance resonates with the idea of shifting pressures. Broken pixels add intentional disruptions to the flowing circularity, echoing the collision of emotions suggested in the seed text. The overall flow is designed to spiral outward, inviting the viewer to feel both pushed away and drawn in.</desc>
