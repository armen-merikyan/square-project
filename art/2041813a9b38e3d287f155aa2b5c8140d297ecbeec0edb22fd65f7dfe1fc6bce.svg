<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Extremes</title>
  <desc id="desc">This piece embraces the intense emotional tug-of-war between defiance and submission. The palette, drawn from the 'ancient_fire' family, features burnt orange and dark red to represent raw, fiery defiance, while charcoal and gold embody the weight of submission, providing a sense of gravity. The composition is bottom-weighted, creating a visual imbalance that mirrors the emotional struggle, with darker colors grounding the piece. The center feels almost 'fractured' due to broken pixel placements, creating dissonance that suggests both disturbance and beauty. The varying textures of flame (defiance) and crack (submission) add to the mixed emotional landscape, punctuated by spaces of negative space that suggest unresolved tension.</desc>
