<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone of this artwork explores the tension between desire and emptiness, creating a visual narrative that portrays longing restricted by boundaries. The palette, featuring vibrant shades of hot coral and blood orange juxtaposed with softer tones of dust pink and charcoal, reflects the saturation of desire fighting against faint edges symbolizing emptiness. This contrast is primarily located at the center of the piece, where the 'broken dots' pattern of desire collides with the softer, more subdued areas representing emptiness, creating a dynamic interplay of engagement and withdrawal. The spiral flow echoes this motion, curving toward an off-center point while maintaining an air of quiet pressure through strategic negative space.</desc>
