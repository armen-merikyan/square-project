  <title id="title">Echoes of Safety</title>
  <desc id="desc">This composition captures the tension between vulnerability and protection. The palette combines shelter green and warm brown for a grounded feeling, while pale skin and cold white suggest exposure. The layout features two pulsing centers representing safety and exposure, utilizing a mix of quiet fields and crack patterns that interrupt each other. The main collision occurs at the center, where high contrast and vibrant colors meet, evoking echoes of the emotional tension described in the seed.</desc>
