  <title id="title">Melancholic Harmony</title>
  <desc id="desc">This artwork captures the tension between joy and grief through a careful arrangement of colors. The palette of vibrant yellows and muted purples reflects the lightness of joy against the heavy tones of grief. The stark contrast between warm and cool is illustrated through the outer border and the inner core, symbolizing chaotic emotions framed by calmness. The zigzag flow evokes a sense of rising tension, while the burnt edges suggest fragility. The strategic placement of colors creates a visual collision that emphasizes the emotional struggle, allowing the viewer to feel both the spark of joy and the weight of grief.</desc>
