<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">The emotional tone reflects a tension between fullness and lack, mirroring the struggle between desire (warm hues) and emptiness (cool hues). The palette of hot coral and blood orange symbolizes the saturated pull of desire, while the hollow blue serves as a large blank area representing emptiness. The main collision happens in the center, where warm colors collide with cool stripes indicating restraint and overflow. The use of broken pixels introduces intentional disruptions, enhancing the feeling of tension and contrast within the ordered chaos of the layout.</desc>
