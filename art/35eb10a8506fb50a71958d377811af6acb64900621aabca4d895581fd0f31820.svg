<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The composition explores the emotional tension between awe and terror through the placement of deep navy and dim cyan, exposing inner conflict. The left side represents awe with a cool color palette, featuring more structured, frame-like arrangements, while the right side, implying terror, is filled with chaotic dots that break the order. A soft edge style allows the viewer's eye to edge into both zones without sharp boundaries, reflecting an overarching blend of stability and instability, echoing the seed’s concept of a protected versus an attacked center.</desc>
