<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension between Longing and Resolve</title>
  <desc id="desc">The emotional tone reflects a struggle between desire and determination. The palette, comprised of warm coral and soft amber, evokes a quiet warmth and an urgent light against cold slate and blue-black shadows that represent introspection and depth. The main collision occurs in the central region where the lattice of resolve intersects with longing's halo, creating a push-pull effect. Broken pixels disrupt the uniformity, symbolizing the imperfections of human emotion and experience, while still allowing for expanses of negative space to breathe, preventing the square from feeling overly dense.</desc>
