<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This square captures the dynamic tension between tenderness and rage using a carefully selected palette that juxtaposes saturated reds with muted blues and blacks. The upper section, dominated by warm reds, represents the explosive nature of rage, while the lower section features softer, pale blues signifying tenderness. The colors collide in the center, creating a tension that echoes through the pattern as it moves upward on one side and downward on the other, fostering a sense of conflict and resolution. The 'hinge' shape seed reflects the delicate balance between these emotions, allowing for a fluid conversation between polarity and softness.</desc>
