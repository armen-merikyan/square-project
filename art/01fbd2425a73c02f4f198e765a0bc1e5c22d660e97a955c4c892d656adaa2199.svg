<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This artwork encapsulates the duality of restlessness and peace through its color palette of soft aqua and soothing gray contrasted with vibrant red and deep blue. The dominant pale aqua serves as a calm central field, while the alarm red provides urgent bursts that shatter the stillness. The interplay of stepwell and target patterns creates a visual dialogue of motion versus stillness, reflecting memories colliding with present pace. Subtle broken pixels introduce intentional disruptions, emphasizing the emotional tension present in the work.</desc>
