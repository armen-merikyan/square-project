<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This artwork embodies a dynamic contrast between hardness and softness, represented by the colors of deep wine and warm ivory. The central square of deeper hues creates a sense of protected space (defiance), while lighter, more muted tones suggest surrounding chaos and an enclosing submission. The diagonal arrangement of colors signifies a rise toward tension, interrupted by the glitch-like quality of broken pixels that disrupt the flow and harmony, creating a sense of unease and unresolved emotion. The overall palette emphasizes a struggle between the weight of darkness and the lightness of interference, embodying the seed's themes.</desc>
