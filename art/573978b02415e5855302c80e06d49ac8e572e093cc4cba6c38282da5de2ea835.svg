  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the tension between vulnerability and strength, using a palette that swings from vibrant to muted. The dominant darks create a protective border, while the central lighter colors express vulnerability. The collision occurs at the center, where pulse marks emerge from muted fields, inviting a sense of fragile exposure against a sturdy framework. This interplay reflects the essence of the seed, conveying emotional contrasts through intentional disruptions in the placement of color blocks.</desc>
