<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Confrontation</title>
  <desc id="desc">The emotional tone captures the tension between defiance and submission, with a palette of warm coral and cold slate reflecting warmth against coolness. The collision occurs prominently in the central columns, where the defiant framing shows angular resistance against the soft ash fields of submission. The broken pixels introduce intentional disruptions, suggesting a fracture in the balance. The overall pattern suggests an inward spiral that invokes both defense and invasion through color and arrangement, emphasizing the challenge of maintaining space while being encroached upon.</desc>
