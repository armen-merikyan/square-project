<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Calm and Chaos</title>
  <desc id="desc">This composition explores the emotional tension between peace and restlessness, where the top half embodies a serene yet fragmented reality, using soft colors like pale mint and soft sky. The bottom half erupts with motion—a ripple pattern of storm gray and near black, representing unfulfilled desires. The collision occurs in the central divide, where the gentle textures are interrupted by sharp contrasts, echoing a struggle between tranquility and agitation. The palette captures the subtle transitions of emotion, with broken pixels creating intentional imperfections that reflect feelings of unrest. The closed corners provide stability to the chaotic energy, framing the emotions within a constrained space, enhancing the dynamic interaction of light and dark throughout the piece.</desc>
