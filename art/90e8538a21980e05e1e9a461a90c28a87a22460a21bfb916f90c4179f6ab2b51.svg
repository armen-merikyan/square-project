<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This artwork leverages emotional tensions between envy and gratitude, expressed through an ancient fire palette of burnt orange, dark red, charcoal, and gold. The color contrasts serve as a visual representation of pressure and release—warm tones signify the internal strife of emotions clashing, while cooler shades provide counters that create an impression of open space and calmness. The seed of 'hole' manifests in a central void that reflects uncertainty and interruption, accentuating the surrounding tension. By leaving significant negative space, the piece invites contemplation of balance between noise and quiet.</desc>
