<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Amidst Static</title>
  <desc id="desc">The artwork harnesses the emotional tension between clarity and confusion, embodied in the contrasting colors. The palette, featuring strong accents like signal green and electric blue against muted tones of static gray and dead black, illustrates the struggle between the coherent pulse (signal) and the chaotic noise. The borders reflect a protective shelter while the center bursts with vivid colors, symbolizing a fragile readability amidst a dense backdrop. The placement of broken pixels adds intentional disruptions, hinting at memories or echoes that refuse to fade.</desc>
