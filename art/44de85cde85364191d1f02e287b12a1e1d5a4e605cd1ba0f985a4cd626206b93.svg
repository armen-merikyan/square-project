<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone grapples with the juxtaposition of strength and vulnerability, expressed through dense black and electric blue representing strength in the upper half, where a rain pattern cascades down. The exposed center, depicted with pale colors like static gray and hot magenta, conveys vulnerability, making an intentional contrast with broken pixels disrupting the flow, suggesting vulnerability under pressure. The overall collision of patterns creates a heartbeat rhythm, symbolizing the push and pull of desire versus emptiness, encapsulated in a sealed edge to maintain focus.</desc>
