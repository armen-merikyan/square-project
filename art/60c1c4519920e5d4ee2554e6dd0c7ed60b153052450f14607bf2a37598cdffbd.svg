<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Connection</title>
  <desc id="desc">The emotional tone of loneliness versus connection is expressed through a visual clash between warm and cool tones. The palette of burnt orange and dark red evokes the warmth of connection, while charcoal introduces a sense of void or loneliness. The placement of colors creates a dynamic tension where the central flame-like pattern symbolizes connection, restrained by negative space that signifies loneliness. The contrast of dense clusters on the left reflects connection and warmth, while the right remains sparse, highlighting emptiness and isolation.</desc>
