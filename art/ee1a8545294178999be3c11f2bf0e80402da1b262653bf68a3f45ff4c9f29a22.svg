<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shattered Clarity</title>
  <desc id="desc">This piece reflects the tension between 'confusion' and 'clarity' using a duality of color and pattern. The outer frame represents confusion through the use of deep, muted shades, while the inner core symbolizes clarity with brighter colors radiating outward. The thick outline adds to the sense of confinement and contrast between the full-bodied outer layer and the hollow inner square. The palette of muted purple, deep blue, bright yellow, and orange illustrates a dance of emotion and conflict, suggesting warmth against detachment. The broken pixel elements disrupt symmetry, echoing the seed's themes of fragmentation and emotional conflict.</desc>
