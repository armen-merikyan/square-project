<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This artwork captures the duality of envy and gratitude through the use of contrasting shades and patterns. The warm tones of burnt orange and dark red provoke feelings of envy, while the golden hues represent gratitude, reflecting an inner emotional conflict. The layout mirrors on each side with broken pixels to signify the imperfections in thoughts. The radial pattern in the center symbolizes rising hope amidst the surrounding noise (represented by denser, darker edges). This tension creates a visual narrative of soft edges versus harsh contrasts, evoking an emotional pull from the center to the edges, invoking both rising and falling states.</desc>
