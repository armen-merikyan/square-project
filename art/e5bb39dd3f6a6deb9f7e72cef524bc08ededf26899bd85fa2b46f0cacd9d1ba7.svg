<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Resilience</title>
  <desc id="desc">The emotional tone reflects a struggle between vibrancy and decay, embodied in the juxtaposition of bright spark colors against muted ash tones. The palette of 'rose_clay', 'warm_shadow', 'cool_blue', 'distant_lilac', and 'lamp_gold' establishes an intimate distance, allowing us to feel both warmth and a hint of coldness. The primary collision occurs diagonally, where the sharp angles of 'spark' patterns intersect with the smoother, more fluid 'ash' patterns. The broken pixels introduce imperfections, symbolizing the fragility in resilience. This composition creates a sense of dynamic conflict that resonates with the themes of memory and erasure, all conveyed through an abstract lens without literal representation.</desc>
