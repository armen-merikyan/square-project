<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symphony of Tension</title>
  <desc id="desc">This artwork embodies the emotional contrast between envy and gratitude, depicted through a palette of burnt orange and deep red against a backdrop of charcoal and gold. The structured 'maze' pattern represents gratitude's complex, interwoven nature, while the grid pattern symbolizes the cold, composed lines of envy. The dense color weight at the edges evokes a feeling of oppression, contrasted with lighter shades that create unsettling negative space at the core. The placement of broken pixels adds an element of corruption, embodying the flawed perception of mirrored feelings in the center, emphasizing that weight of emotions can shift like a mirage. This abstract composition invites the viewer to reflect on the invisible weight carried within the duality of these contrasting emotions.</desc>
