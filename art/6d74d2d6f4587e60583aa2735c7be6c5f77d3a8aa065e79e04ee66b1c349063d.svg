<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone reflects the tension between vulnerability and strength. A muted palette of reds and grays suggests both warmth and restraint, with blackened plum representing the depth of vulnerability. The placement of colors forms a dynamic collision at the center where strength (represented by stronger, clearer colors) meets the squish of vulnerability (the softer hues). The layout of falling pixels symbolizes the gentle descent of both emotional contrasts—a gradual exposure against a protective barrier. Broken pixels create intentional interruptions, enhancing the feeling of imperfection and tension within the frame, while the overall balance leaves a 10% negative space for breath and reflection.</desc>
