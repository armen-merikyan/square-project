<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipsed Pulses</title>
  <desc id="desc">This composition embodies a clash of emotions, with an emphasis on the tension between defiance and submission. The chosen palette, 'rage_calm', juxtaposes the fierce black and red tones with the softness of pale blue and white. The angular resistance of defiance radiates out from the center while the soft receding nature of submission pulls towards the edges. The layout features two small centers that pulse against each other, creating a dynamic interaction. The main collision occurs in the center with the bold strikes of red interrupted by quiet blue and white fields, with intentional broken pixels introducing elements of imperfection and disruption. This structure evokes the feeling of an inward spiral, suggesting a conflict between maintaining control (defiance) and yielding to the surrounding pressure (submission), transforming the seed into a visual narrative of emotional interplay.</desc>
