<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Calm</title>
  <desc id="desc">This artwork delves into the emotional dichotomy of restlessness versus peace, illustrated through a palette that juxtaposes warm, vibrant colors against a somber, cooler background. The deliberate placement of warm hues, such as hot coral and blood orange, against shades of charcoal evokes a sense of tension and chaos, embodying restlessness. Meanwhile, the inclusion of hollow blue and dust pink provides the soothing counterpart, symbolizing moments of peace amid turmoil. The edges feature burned characteristics, representing the harshness of conflict, while intentional broken pixels signal disruptions, enhancing the narrative of contrast and collision. The main impact is centered diagonally, symbolizing motion and energy that both disrupt and connect contrasting states.</desc>
