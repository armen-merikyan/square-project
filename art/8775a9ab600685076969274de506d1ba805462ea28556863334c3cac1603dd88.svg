<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Contrast</title>
  <desc id="desc">This piece encapsulates a tension between relief and dread through a juxtaposition of soft and heavy colors. The palette features cool tones (pale_mint, soft_sky) suggesting relief, while darker shades (storm_gray, near_black) evoke a sense of dread. The arrangement juxtaposes dense patterns with open spaces, emphasizing the emotional collision at the center where the warm faded gold interrupts the cooler surrounding colors. The seed's essence manifests in the spiral-like arrangement of brighter accents against a heavier background, reflecting an ancient conflict of feelings.</desc>
