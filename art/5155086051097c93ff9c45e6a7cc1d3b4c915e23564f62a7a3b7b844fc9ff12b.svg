<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Flux</title>
  <desc id="desc">The emotional tone of this artwork captures the duality of panic and control, using a palette that embodies fear (black, dark violet) and hope (soft gold, pale green). The contrasting colors create a push-pull dynamic, with black and violet dominating the edges to signify chaos and pressure, while gold and green emerge from the center, suggesting control and aspiration. The pattern oscillates between a checker and frame motif, reflecting the struggle between structured control and the encroaching waves of panic. The negative space is preserved to convey moments of breath amid tension, while broken pixels introduce imperfection and a sense of unpredictability. This square becomes a visual representation of an emotional confrontation, navigating between fragmented chaos and emerging clarity.</desc>
