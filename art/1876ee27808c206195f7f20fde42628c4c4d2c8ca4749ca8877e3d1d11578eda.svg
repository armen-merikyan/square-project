  <title id="title">Tension Between Worlds</title>
  <desc id="desc">This artwork captures the emotional contrasts of loneliness and connection through a deliberate use of color and pattern. The dominant black and deep reds symbolize isolation and pressure, while pale blue and white introduce moments of connection and lightness. The arrangement reflects a struggle between these competing feelings, echoing the idea of inside vs outside, as patterns clash in an asymmetric layout. Areas of negative space indicate loneliness, while concentrated sections present connection, embodying the tension of hidden vs exposed emotions.</desc>
