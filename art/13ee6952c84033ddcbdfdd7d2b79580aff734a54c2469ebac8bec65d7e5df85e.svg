<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Halo</title>
  <desc id="desc">This composition embodies the emotional contrast between vulnerability and strength. The color palette merges clean white and ice blue to suggest clarity and vulnerability, while deeper shades of ink black and violet gray signify strength and protection. The central collision happens in the core, where the blue and white develop a patchwork of subtle transitions, surrounded by an outer thread-like frame of darker colors anchoring the square. The structured layout echoes the ideas of exposure and shelter, driving the narrative of a fragile core fortified by firm boundaries, invoking a sense of tension and resilience as well as alienation and connection.</desc>
