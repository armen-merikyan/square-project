<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">This piece captures the emotional dichotomy of joy and grief through contrasting color palettes—warm yellows and muted purples. The layout follows a split vertical format, creating an interplay between the vibrant, rounded joy patterns on the left and the drooping, low grief patterns on the right. The hard edges amplify the tension between these emotions. Dominant colors collide in the center to evoke a sense of conflict, while broken pixels add imperfection, reflecting the chaos of human emotion within structured confines, ultimately telling a story of unresolved feelings.</desc>
