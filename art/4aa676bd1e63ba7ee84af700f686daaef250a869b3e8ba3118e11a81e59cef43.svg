<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse in Static</title>
  <desc id="desc">The emotional tone of the artwork revolves around the struggle between clarity (signal) and chaos (noise). The palette of deep navy and dim cyan embodies isolation and cold observation, while the stark contrast of white punctuates the composition, representing moments of insight amidst overwhelming noise. The primary collision occurs in the center where the readable rhythm of white lines (signal) dances against the dense, static black darkness (noise). This central feature mimics the concept of a pulse striving to emerge through a field of interference.</desc>
