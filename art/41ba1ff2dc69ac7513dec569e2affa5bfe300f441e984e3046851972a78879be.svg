<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">This artwork captures the emotional tension between longing and resolve through a dynamic interplay of colors and patterns. The chosen palette of burnt orange and dark red conveys deep warmth and intensity, contrasting against the quiet charcoal and gold. The composition features a sparse center channel, evoking a sense of intimacy and distance amidst densely packed warm colors that symbolize longing. Broken pixels introduce intentional disruption, suggesting the imperfection and complexity of human emotions. The main collision point emerges at the heart of the piece, where organized chaos meets structured resolve, reflecting a journey through emotional landscapes.</desc>
