<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Desire and Restraint</title>
  <desc id="desc">This composition embodies the emotional struggle between desire and restraint. The palette of warm hues like hot coral and blood orange represents desire, while muted tones like charcoal and hollow blue signify restraint. The contrasting warmth of desire sweeps through the lattice-like structure of restraint, suggesting an unresolved tension. The main collision occurs in the center, where the hotter colors leak through intentional breaks, symbolizing desire's encroachment against restraint, creating an overall sense of dynamic movement and emotional complexity.</desc>
