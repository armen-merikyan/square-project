  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition explores the emotional dichotomy between vulnerability and strength. Using the 'shelter_green' and 'cold_white' from the palette emphasizes the tension between protective and exposed feelings. The colors converge in the middle, where the stronger hues create a firm presence while the softer shades evoke openness. The layout is a diagonal argument, illustrating the struggle between the two states, where warmer tones rise against cool whites, creating an echo of pressure. Broken pixels inject intentional disruptions, further accentuating the theme of vulnerability amidst strength.</desc>
