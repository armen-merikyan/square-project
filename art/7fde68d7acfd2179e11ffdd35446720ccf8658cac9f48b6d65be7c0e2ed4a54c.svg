<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This piece embodies the clash between control and panic, where the color palette of burnt orange, dark red, charcoal, and gold reflects an ancient fire, symbolizing both warmth and danger. The central focus is a rhythmic interplay of muted and vibrant colors, suggesting a struggle between the calm of control and the chaos of panic. The edge style is jagged, enhancing the feeling of disruption, while the broken pixels introduce an element of imperfection, mirroring human emotion. The arrangement creates a sense of inward pressure, drawing the eye to the center, yet leaves ample negative space on the edges, representing a tension-filled contrast that evokes raw emotional energy.</desc>
