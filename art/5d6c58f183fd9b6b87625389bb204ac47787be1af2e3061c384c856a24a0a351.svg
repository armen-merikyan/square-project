<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Dissonance</title>
  <desc id="desc">The emotional tone of awe versus terror is captured through a dynamic use of the machine_emotion palette featuring electric blue, magenta, lime, and black. The contrasting colors create a tension between the idea of awe represented by softer hues and the stark depth of terror conveyed through darker tones. The layout flows like rain, introducing a scatter that speaks to chaos, while broken pixels symbolize imperfection and fractured memories. The use of broken dots against sharper, spark-like patterns enhances the collision of feelings, creating an abstract narrative of fluctuating stability and unrest.</desc>
