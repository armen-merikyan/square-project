<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulses of Resolution</title>
  <desc id="desc">This piece captures the emotional tension between longing and resolve through contrasting patterns. The palette, borrowed from tones of guilt and forgiveness, juxtaposes muted browns and warm ivories with striking soft golds and deep wines. The broken edges give a sense of imperfection, echoing the theme of repair versus damage. The central collision occurs in the middle of the grid, where the checker pattern of longing interacts with the framed resolve. Negative space signifies the distance felt in longing, while the denser areas surround the frame, emphasizing resolution's firm boundaries.</desc>
