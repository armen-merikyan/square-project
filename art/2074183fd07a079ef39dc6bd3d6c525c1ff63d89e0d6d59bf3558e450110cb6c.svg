<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symphony of Trust and Suspicion</title>
  <desc id="desc">This artwork embodies the emotional tension between trust and suspicion through color contrast and placement. The palette, inspired by 'gratitude_envy', combines honey gold for warmth and stability with deeper tones like deep olive and ripe green, creating a visual tension that represents both reassurance and doubt. The inner 4x4 grid, dominated by soft green glitches, symbolizes trust, while the jagged, darker edges introduce suspicion, representing the pressure of uncertainty. The diagonal shifts from saturated colors to muted shades enhance the dynamic flow, suggesting a journey from confidence to doubt, embodying the conflict in the seed.</desc>
