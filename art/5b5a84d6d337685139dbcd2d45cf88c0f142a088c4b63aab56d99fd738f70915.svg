<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone revolves around the tension between vulnerability and strength, illustrated through an interplay of pale and muted colors contrasted against strong, dark edges. The chosen palette evokes feelings of protection and exposure—strength from the deep reds and dark plums, and vulnerability from the soft cream. This collision occurs centrally, demonstrating a deep contrast that reflects the thematic focus of rising against an oppressive weight, while maintaining quiet negative space in corners for openness. The patterns embody a patchwork of strength that rises, surrounded by a frame of fragility, evoking the complex dynamics of safety and risk.</desc>
