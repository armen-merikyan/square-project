<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Fracture</title>
  <desc id="desc">This artwork encapsulates the emotional tension between joy and grief. The upper half is bright, featuring vibrant yellows and oranges that suggest warmth and openness, showcasing a pattern of lively noise against calmer hues. The lower half contrasts sharply with muted purples and deep blues, symbolizing heaviness and fragmentation, structured in a jagged pattern that impacts the cohesiveness. The intentional placement of broken pixels introduces a sense of imperfection and disarray, aligning with the theme of a near-mirror image disrupted by the chaos of grief. The palette transitions from light to dark, emphasizing the clash between radiant joy and enveloping sorrow.</desc>
