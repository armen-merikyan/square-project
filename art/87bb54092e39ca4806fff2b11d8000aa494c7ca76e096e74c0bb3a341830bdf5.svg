<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork explores the emotional dichotomy of vulnerability and strength through a combination of stark contrasts and overlapping patterns. The palette features deep blacks and whites to embody strength and vulnerability, while pale blue provides an introspective space for quiet reflection. The central collision of colors creates a sense of tension, contrasting the deep blacks of strength against the pale blues of vulnerability, inviting the viewer to reflect on the interplay of these emotions. The arrangement of color serves as a metaphor for the two states clashing and coexisting, evoking a narrative of exposure intertwined with shelter.</desc>
