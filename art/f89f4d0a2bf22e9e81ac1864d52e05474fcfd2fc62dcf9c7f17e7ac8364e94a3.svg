<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotions</title>
  <desc id="desc">The artwork embodies the tension between rage and calm. The left half resonates with deep reds and blacks, evoking explosive energy and sharp contrasts, while the right half's pale blues and whites represent tranquility and lightness. The jagged patterns of red clash against the subdued blue grid, illustrating emotional conflict. This chaotic yet structured distribution reflects a rising signal, where the crack against a mirror symbolizes vulnerability within strength. The bottom half appears more saturated, suggesting weight, while the top is left somewhat open, representing a release into calmness.</desc>
