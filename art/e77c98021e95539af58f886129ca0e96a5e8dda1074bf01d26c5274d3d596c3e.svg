<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone centers on the contrast between strength and vulnerability. The palette features clean white and ink black to signify lightness and depth, respectively, with warning orange as an accent to signify tension. The central collision occurs with the soft barcode pattern of vulnerability easing into the ripple pattern of strength, creating an asynchrony of conflict and coexistence. The layout engenders diagonal movement, representing the push-pull dynamic of exposure to shelter. Broken pixels add intentional imperfection, emphasizing the fragility within strength.</desc>
