<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Channels</title>
  <desc id="desc">The emotional tone here reflects the juxtaposition of defiance and submission through contrasting colors and patterns. The palette features deep, muted tones to illustrate a sense of hunger and restraint, with a shattering defiance (represented by the bold red-oxide) breaking through a halo effect of muted cream and soft gray. The quiet channel layout carves through the pixel grid, suggesting tension as it provokes an image of a push and pull relationship, where the dominant darker colors signify defiance and the lighter colors symbolize submission. The deliberate placement of broken pixels disrupts the flow, reflecting the complexities of the seed's themes.</desc>
