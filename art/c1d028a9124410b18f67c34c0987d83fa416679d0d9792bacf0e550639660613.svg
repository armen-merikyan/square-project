<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This composition explores the emotional tension between relief and dread. The left side is dominated by calming mint and soft sky colors, suggesting a sense of open space and exhalation. The right side, in contrast, utilizes storm gray and near black to create a feeling of heaviness and inevitable descent. This juxtaposition embodies the struggle between stability and anxiety, with broken pixels scattered throughout to represent disruptions and breaks in continuity. The layout is intentionally split, pushing the viewer's eye across the square, highlighting the shifts from density to openness, dictated by the emotional score of the seed.</desc>
