<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Clarity</title>
  <desc id="desc">The emotional tone explores the duality of quiet versus pressure, with a shift from a dense assembly towards a calming expanse. The palette incorporates dark navy and compressed red to convey pressure, contrasted with tones of off-white and faint peach suggesting quietude. The diagonal arrangement initiates at the top left, where pressure builds and then gradually releases across the canvas, with pixel clusters and lattice patterns colliding, forming a transition from dense to airy. Broken pixels serve as intentional disruptions, mirroring shattering against an underlying calm.</desc>
