<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry Fractured</title>
  <desc id="desc">The emotional tone balances between 'panic' with its chaotic clashing hues and 'control,' represented by the structured layout. The palette of lime, electric blue, magenta, and black creates high contrast; electric blue and lime suggest a sense of calmness and machine-like precision against the chaotic magenta. The focus falls off-center, capturing tension from the edges moving inward, punctuated by the broken pixels that symbolize imperfections in perceived control, generating emotional temperature through collision. Lines of dots in chaotic areas disrupt radials, while mirrored sections hint at stability in chaos.</desc>
