<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">The emotional tone converges on the juxtaposition of awe and terror, captured through a palette of electric blue, magenta, and black. The top half of the composition reflects awe with structured grids of blue and magenta, creating a sense of expansive order. The bottom half represents terror, with fragmented placements and softer edges introducing an unsettling chaos. The contrasts happen through heavy black in the lower rows, weighing down the lighter upper half, symbolizing the tension and collision of emotions, as well as the internal struggle of memory and perception. This piece embodies the narrative of inner conflict through distinct color placements that evoke both wonder and dread.</desc>
