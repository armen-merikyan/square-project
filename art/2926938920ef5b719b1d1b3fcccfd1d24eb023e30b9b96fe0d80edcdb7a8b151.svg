<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Boundaries</title>
  <desc id="desc">The emotional tone of this artwork explores the struggle between desire and restraint, utilizing contrasting colors to visualize this conflict. The palette of warm reds and muted creams against deep purples and blacks amplifies the tension, with saturated colors spilling into the cooler shades, suggesting an overflow of intense emotions that clash against ordered constraints. The main collision occurs in the center, where the vibrant reds and oranges, representing desire, meet the deep blacks and muted tones, symbolizing restraint, creating a spiral-like movement across the canvas. This configuration embodies the push and pull of attraction versus inhibition.</desc>
