<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">The emotional tone captures the push and pull between desire and restraint. The dark, rich palette of red oxide and blackened plum symbolizes intense desire, while muted cream and iron gray represent restraint, creating a contrast of warmth against coolness. The vibrant small orange accents pierce through the layers, emphasizing breaks in the sealed edges that suggest an overflow of emotion. The static and striped pattern types collide, giving a sense of chaos restrained within a boundary. The collision of saturations at the center draws attention, embodying the struggle between yearning and restraint.</desc>
