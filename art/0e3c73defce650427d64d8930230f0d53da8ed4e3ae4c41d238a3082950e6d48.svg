<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Touch of Longing</title>
  <desc id="desc">This piece encapsulates the emotional tension between desire and emptiness, using a warm palette to represent desire against cooler tones symbolizing emptiness. The palette includes hot coral and blood orange, evoking warmth and longing. A main collision occurs in the center, where the warm colors burst into cooler tones, echoing the theme of overflowing desire against the constraints of containment represented by the stark edges. The patterns of warmth collide with pressure bands of emptiness, illustrating the struggle and tension portrayed in the seed.</desc>
