<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Flow of Emotion</title>
  <desc id="desc">This artwork explores the emotional juxtaposition of tenderness and rage. The palette blends saturated reds and soft blues to signify an inner struggle, using darker colors for the rage and lighter, muted tones for tenderness. The main contrast flows from bottom to top, symbolizing hope amidst chaos, with jagged pixels interrupting gentle rings, representing both discord and calm. The colors merge and collide, creating tension and softness, reflecting the complexity of balancing these emotions. The abstract pattern evokes a sense of climbing through challenges and finding spaces of peace within turmoil.</desc>
