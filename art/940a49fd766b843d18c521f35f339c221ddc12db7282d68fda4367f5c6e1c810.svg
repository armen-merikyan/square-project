<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Amidst Static</title>
  <desc id="desc">This artwork explores the tension between clarity and obscurity, reflecting the duality of signal and noise. The palette of deep navy and black speaks to loneliness, while the muted dim cyan punctuates the composition as an accent, creating a sense of momentary clarity. The collision happens centrally where the patterns of isolation (dark tones) and interruptions (bright tones) meet, symbolizing the struggle between memory and erasure. The split-screen and mirror patterns evoke a pulsing rhythm against a distracting static backdrop, capturing the abstract essence of the seed.</desc>
