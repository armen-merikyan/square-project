<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This artwork embodies the tension between joy and grief through contrasting color choices and patterns. The joyful section is represented by bright yellows and muted oranges that intersperse with deeper blues and purple tones, reflecting grief. The arrangement is intentionally diagonal, echoing a sense of movement between rising and falling, symbolizing the upward push of joy against the downward pull of grief. The broken pixels create a fragmented beauty, suggesting the imperfection of emotions, while the neglected spaces add to the feeling of unresolved tension. Overall, the piece captures a complex emotional experience without depicting a literal narrative.</desc>
