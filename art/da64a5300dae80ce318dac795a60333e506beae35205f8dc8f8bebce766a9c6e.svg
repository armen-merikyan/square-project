<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Fracture</title>
  <desc id="desc">This composition explores the tension between rage and calm through contrasting color patterns. The palette features deep reds to represent the intensity of rage, contrasted against muted pale blues and whites embodying serenity. The eruptions of bright colors represent the 'islands' of rage, while the larger blocks of cool tones create a negative space that invites calmness. The diagonal flow created by sharp jagged patterns uncovers an emotional collision where the warmth of intense anger disrupts the cooler, tranquil areas, emphasizing an ongoing struggle between these two states. The constrained areas experience more mutation while the calmer tones prevail, reflecting the idea of calm amidst chaos.</desc>
