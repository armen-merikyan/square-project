<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">This composition embodies the emotional tension between rage and calm through color and arrangement. The palette combines deep reds for intensity and cooler blues and whites to represent calmness. The stark contrast occurs at the center, where jagged red patterns ripple outward, clashing against smoother blue fields. This embodies the chaos of rage spilling into a tranquil space, while contiguous paths create a sense of containment. The glitch-like layout adds disturbance, reflecting eroded symmetry. Each broken pixel signifies imperfection and emotional scars, enhancing the rawness of the piece.</desc>
