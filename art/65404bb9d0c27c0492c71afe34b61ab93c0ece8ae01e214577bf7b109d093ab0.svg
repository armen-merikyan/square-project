<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This composition captures the emotional contrast between love and betrayal. The left side, representing love, employs warm tones of pink and red in a striped pattern, creating a sense of warmth and connection. In contrast, the right side, depicting betrayal, utilizes darker maroon and gray tones with a rain-like pattern, introducing an element of disruption and coolness. The hard edges delineate the split, emphasizing the conflict while still leaving intentional negative space, symbolizing the loneliness amid connection. The arrangement suggests an asymmetrical balance where the warmth of love is subtly interrupted by the coolness of betrayal, embodying a complex emotional landscape.</desc>
