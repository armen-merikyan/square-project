<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interwoven Duality</title>
  <desc id="desc">This piece conveys the emotional tension between fear and hope through a contrasting palette and pattern logic. The dark shades of black and dark violet symbolize fear with jagged edges found in the corners, while soft gold and pale green flicker across the central area, representing hope as a rising signal. The arrangement plays with collision, where darker tones press against lighter pixels, creating a feeling of pressure and release. A grid-like pattern stands juxtaposed with the sharp, broken dot formations, forming a visual tension where despair meets optimism, echoing the complexity of human emotion.</desc>
