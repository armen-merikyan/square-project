<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tectonics</title>
  <desc id="desc">The artwork conveys the dual emotional landscapes of awe and terror through contrasting colors and patterns. The chosen palette of yellow, orange, deep blue, and muted purple reflects the tension between warmth and coolness, embodying the collision of these emotions. The layout reflects a battle between intense colors and muted tones, arranged in an argument grid that flows from the outside inward, suggesting an encroaching pressure. The checker pattern evokes awe with its organized disruption, while the broken dots introduce an element of chaos, symbolizing terror. The negative space is intentional, allowing the eye to rest among the emotional noise, contributing to the overall balance and unresolved tension of the piece.</desc>
