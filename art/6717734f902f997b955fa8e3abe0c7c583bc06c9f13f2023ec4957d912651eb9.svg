<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Resilience</title>
  <desc id="desc">This piece reflects the emotional tension between the sharp vitality of 'spark' and the muted decay of 'ash.' The palette incorporates bright yellows and oranges representing sparks and ignitions, contrasted with muted purples and deep blues evoking ash and restraint. The primary clash occurs diagonally, embodying the struggle between the two emotional states—a visual argument. The 'spark' pattern employs bold stripes, while 'ash' employs a soft constellation layout, producing a dynamic interplay that highlights resilience contrasted against fragility.</desc>
