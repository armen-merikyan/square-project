<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Extremes</title>
  <desc id="desc">This composition embodies the emotional duality of defiance and submission through distinct layers of contrast. The palette of deep navy and black represents an overwhelming feeling of pressure, while the dim cyan and white offer moments of clarity and lightness—echoing the tension between a dark, enclosing field and brief escapes of brightness. The arrangement of colors forms a spiral pressure dynamic, where darker tones dominate, creating an enclosed space that evokes a sense of chaos. The off-center placement encourages movement, as if navigating through disorder. Broken pixels introduce intentional disruptions, paralleling the theme of defiance against a quiet submission.</desc>
