<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Emotion</title>
  <desc id="desc">This artwork captures the tension between love and betrayal through a carefully constructed palette of warm pinks and cool grays, symbolizing the warmth of love clashing with the coldness of betrayal. The diagonal rise creates a sense of movement, with radial patterns to represent love flowing outward, while sharp, dotted lines introduce elements of hesitation and discord, reflecting betrayal. The composition is weighted toward one corner, generating a feeling of invasion and pressure, while intentionally leaving empty space to signify loneliness and emptiness. The broken pixels across the design embrace imperfection, allowing the emotional narrative to resonate deeper, suggesting that beauty emerges from conflict.</desc>
