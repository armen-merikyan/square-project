<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">The composition conveys a dynamic interplay between the concepts of quiet and pressure. The palette is nuanced, consisting of off-white and faint peach to introduce softness, contrasted by dark navy and compressed red representing tension. This emotional duality is expressed through a threshold layout, where denser clusters of color on one edge transition into lighter, quieter fields across the canvas. The encounter of sharp and soft edges emphasizes the sense of collision while maintaining a balance between compressed density and still negative space, allowing the viewer to oscillate between feeling heavy pressure and liberating calmness.</desc>
