<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamics of Yearning</title>
  <desc id="desc">The emotional tone balances longing and resolve, with the dominant shadow of longing represented by dark colors juxtaposed with bright accents symbolizing resolve. The palette of signal green and electric blue punctuates the muted fields of static gray and dead black, creating tension. The main collision occurs in the central area, where the shattering pattern aims to disrupt the smooth halo void layout, representing the struggle between distance and intimacy. Broken pixels introduce imperfection, adding depth to the longing felt within the structured environment.</desc>
