<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece embodies the conflict between defiance and submission through a central block of darker colors symbolizing strength and resistance, surrounded by lighter shades that imply retreat and enclosure. The palette, chosen for its subtleties, balances the weighty dark navy (#001F3F) against the airy faint peach (#F2C94C), creating a tension that reflects the emotional score derived from the seed. The patterns of stairs and rain collide at the center and edges, with broken pixels representing the imperfections found in this emotional struggle. The main contrast occurs at the boundaries where pressure from the surrounding area collides with the unmoving heart of the piece.</desc>
