<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Defiant Tides</title>
  <desc id="desc">This artwork creates a dialogue between the emotional contrasts of certainty and curiosity, highlighting the tensions between structured order and chaotic exploration. The palette chosen comprises soft pastels like pale mint and storm gray, suggesting a calm yet turbulent interplay of emotions. The main collision occurs in the central rows, where the ripple patterns of curiosity interrupt the firm stripes of certainty, representing the rising signals of conflict and connection. Broken pixels are intentionally scattered throughout to signify disruptions in calmness, embodying the essence of relief and dread, leading the viewer toward reflections on personal experiences with order and chaos.</desc>
