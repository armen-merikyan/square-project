<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Tension</title>
  <desc id="desc">This abstract composition visualizes the tension between control and surrender through contrasting colors and patterns. The outer frame in clean white and ice blue represents control—structured, calm, and cool. In contrast, the inner 4x4 space, with a chaotic mix of violet gray and warning orange, conveys surrender and overflow, where the colors clash and intersperse disruptively like intense emotion spilling out. The emergence of broken pixels enhances the sense of imperfection and unpredictability, while also providing visual breaks akin to a stuttering pulse. The central collision of colors signifies a struggle for balance between containment and release, embodying the essence of the seed.</desc>
