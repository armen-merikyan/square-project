<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone revolves around the fragile balance between vulnerability and strength, represented through colors that evoke warmth and depth. The palette features pinks and reds to symbolize warmth of strength, contrasted by gray and dark maroon, which hint at vulnerability and heaviness. The main collision of ideas occurs in the center, where lighter tones are overshadowed by dark, jagged boundaries, representing both exposure and protection. This arrangement utilizes broken pixels to disrupt uniformity, enhancing the story of resilience amid fragility, and conveying a journey from solid grounding to an open, undefined space.</desc>
