<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone of this piece explores the tension between vulnerability and strength. The palette of navy and black evokes depth and grounding, while the dim cyan adds a touch of starkness that signifies light and exposure. The main collision occurs in the center where thick, stable shapes of dark colors meet lighter hues, creating tension that reflects the delicate balance of being exposed and sheltered. The broken pixels intentionally disrupt the harmony, symbolizing the imperfections in both strength and vulnerability. The stacked bands layout echoes the emotional strata, allowing the viewer to feel the gradual shift from heavy to light, reinforcing the idea of safety versus exposure.</desc>
