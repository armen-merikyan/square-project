  <title id="title">Tension of Emotion</title>
  <desc id="desc">This composition explores the interplay between joy and grief using a distinct palette of warm and cool tones. The color choices reflect the emotional states—with bright yellows and oranges symbolizing joy, while deep blues and muted purples convey grief. The contrast is primarily centered in the middle rows, where brighter hues disrupt the cooler, heavier edges, visually representing the tension between these feelings. The central wave pattern suggests a dynamic motion of emotion, while the outer frame adds structure and stability, hinting at the underlying conflict and resolution in the emotional experience.</desc>
