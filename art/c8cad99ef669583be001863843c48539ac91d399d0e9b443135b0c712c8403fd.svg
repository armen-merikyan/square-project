<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Whispers in Collision</title>
  <desc id="desc">This artwork encapsulates the emotional tension between longing and resolve through contrasting color patterns; the palette, 'melancholy_wonder', includes 'rain_blue', 'lavender_gray', 'moon_white', 'soft_cyan', and 'muted_plum', reflecting a serene yet urgent atmosphere. The main conflict occurs in the center where the rain pattern of the 'resolve' collides with the checker pattern of 'longing', symbolizing the tension between stability and yearning. Broken pixels interrupt the flow to represent damage, while quiet fields create spaciousness, ensuring the piece communicates a nuanced emotional experience.</desc>
