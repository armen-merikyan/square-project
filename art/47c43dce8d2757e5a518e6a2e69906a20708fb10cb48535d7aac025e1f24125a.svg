<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Friction of Elements</title>
  <desc id="desc">This piece embodies the tension between defiance and submission through contrasting colors and patterns. The chosen palette of ripe green, acid green, honey gold, deep olive, and cream reflects moments of both conflict and harmony. The main contrast occurs at the center with acidic greens radiating outward into softer cream hues, representing defiance's bright refusal against a backdrop of quiet acceptance. Broken pixels disrupt smoothness, echoing tension and release. Overall, the layout of an island surrounded by sea captures the emotional push-pull of these two states.</desc>
