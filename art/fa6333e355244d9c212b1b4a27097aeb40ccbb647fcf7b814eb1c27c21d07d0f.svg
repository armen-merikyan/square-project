<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Boundless Longing</title>
  <desc id="desc">This piece encapsulates the tension between desire and restraint. The dominant dark hues of blackened plum and iron gray create a firm containment against bright accents of red oxide and small orange, illustrating desire spilling over a muted background of muted cream. The 'island and sea' layout is evident, with deep, vibrant colors representing desire clustered closely, while cooler, muted areas reflect restraint, creating a conversation marked by contrasts and interruptions in space. The spiral pressure in the composition reflects the conflicting emotions at play, distributed asymmetrically to enhance visual tension.</desc>
