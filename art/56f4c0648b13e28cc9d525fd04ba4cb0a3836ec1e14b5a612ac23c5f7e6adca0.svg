<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This 8x8 abstract piece explores the emotional tension between panic and control. The left side consists of warm colors, representing chaos, with jagged patterns resembling teeth that evoke a sense of instability. The right side employs cooler, muted tones and a dot pattern indicative of order. The main contrast lies in the transition from the turbulent warm palette to the calming cool side, symbolizing the struggle between emotional extremes. The placement of broken pixels adds an element of imperfection, reflecting interpersonal conflicts like love and betrayal, providing a compelling narrative of juxtaposition and unresolved emotions.</desc>
