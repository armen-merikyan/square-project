<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Affection</title>
  <desc id="desc">The emotional tone captures the tension between love and betrayal, represented through the contrast of warm and cool tones. The chosen palette of pink, red, gray, and dark maroon creates a fragmented feel, mirroring the idea of a nearly mirrored image disrupted by an imperfect edge. The layout moves diagonally across the canvas, with the flow starting from the corner, symbolizing how love can invade spaces with bright colors, while the betrayal side becomes subdued and fractured with lower contrast, creating a striking collision. The broken pixels add an element of imperfection, reinforcing the discord inherent in the theme.</desc>
