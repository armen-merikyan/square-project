<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">The Threshold of Emotion</title>
  <desc id="desc">This artwork captures the battle between fear and hope by splitting the composition vertically. The left side, representing fear, uses darker shades that suggest pressure and jagged edges—emphasized through the crack pattern. The right side embodies hope with brighter, uplifting colors like soft gold and pale green in a spark pattern, suggesting movement upwards. The glowing edges highlight the contrast against the darker tones. The vertical split signifies the push and pull of emotions, where the dark, dense left side collides with the lighter, sparse right side, creating an echo of tension and release that reflects the emotional weight of the seed.</desc>
