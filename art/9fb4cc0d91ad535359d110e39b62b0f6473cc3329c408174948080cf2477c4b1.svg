<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Change</title>
  <desc id="desc">This artwork captures the emotional tug-of-war between nostalgia and progress. The color palette of warm yellows and muted purples evokes the dual feelings of joy and grief. The layout splits the canvas horizontally, the top half carrying a structured, orderly pattern reflecting progress, while the bottom introduces broken pixels, representing the fragmented nature of nostalgia. This dynamic creates a visual tension where orderly progression meets chaotic memory. The higher concentration of colors in the top half contrasts with the cooler tones and negative space below, emphasizing a sense of weight and release.</desc>
