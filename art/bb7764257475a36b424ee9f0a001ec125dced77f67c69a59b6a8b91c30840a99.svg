<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Calm and Chaos</title>
  <desc id="desc">The emotional tone reflects a struggle between two contrasting states: restlessness and peace. The palette combines warm (rust and small gold) and cool (moss green and stone gray) hues to embody this tension. The broken frame pattern symbolizes restlessness, with jagged edges that interrupt the structured ladder pattern of peace. The collision occurs along a diagonal, where cool greens mix with warm rust, suggesting an unresolved motion. This layout honors the 'moon' shape seed by creating asymmetrical layers of calm vs. disturbance, capturing the abstract essence of memory and motion.</desc>
