<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece explores the tension between rage and calm through color and arrangement. The palette utilizes stark contrasts of red and black to embody rage, while pale blue and white represent the calm. The layout features a scattered repair motif, illustrating the struggle of chaotic emotions trying to break through contained calm. The broken pixels introduce disruption, reflecting the conflict within. The dominant red areas collide with the cooler calm tones primarily in the center, suggesting a burst of emotion interrupted by quiet spaces, creating an emotional narrative of pressure and release.</desc>
