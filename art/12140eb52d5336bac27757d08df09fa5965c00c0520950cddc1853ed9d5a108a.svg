<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece encapsulates the emotional tension between panic and control. The palette of burnt orange, dark red, charcoal, and gold reflects a fiery struggle, symbolizing chaos against stability. The layout emphasizes negative space, suggesting emptiness amidst turmoil, while the broken pixels evoke imperfections inherent in both emotions. Contrasting the dense center with lighter edges creates a visual nexus—a center of urgency battling the restrained chaos of the surrounding colors.</desc>
