<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Conflict and Calm</title>
  <desc id="desc">This artwork captures the tension between restlessness and peace through contrasting colors and patterns. The top four rows, influenced by restlessness, are filled with dark, sharp colors like deep grays and muted plums, symbolizing tension and chaos. The bottom four rows embody peace, using lighter, more serene shades like soft cyan and lavender gray, suggesting calmness and serenity. The collision occurs diagonally, where the dark accents disrupt the lighter fields, creating a dynamic interaction while still maintaining identifiable sections. The piece reflects a struggle between memory's weight and the motion towards calm.</desc>
