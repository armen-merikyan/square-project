<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Waves</title>
  <desc id="desc">The emotional tone contrasts defiance's angular and bright interruption with submission's soft and enclosed fields. The chosen palette of powder pink and warm white represents softness, while carbon black and sharp crimson add severity, creating a tension where bright accents clash with muted colors. The collision predominantly occurs in the center, where the halo pattern from defiance radiates outward, interrupted by the radial submission pattern, creating a visual dynamism that evokes an inward spiral. The split layout enhances this emotional contrast, leaving space for quiet reflection amidst the densely packed colors.</desc>
