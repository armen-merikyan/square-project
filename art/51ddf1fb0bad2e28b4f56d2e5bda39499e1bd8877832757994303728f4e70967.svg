<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Fracture</title>
  <desc id="desc">The emotional tone oscillates between confusion and clarity, represented through a stark palette of grays with splashes of red and pink. The outer rows convey clarity with deeper shades, contrasting with the inner rows that embody confusion through broken and fractured placements, symbolized by the pattern of teeth. The collision of colors creates a dynamic tension—the greys represent a fog of uncertainty while the reds add tension and urgency. This captures the essence of a core feeling radiating outward, illustrating the transition from a stable center to chaotic edges, mirroring the seed's theme of emotional dichotomy.</desc>
