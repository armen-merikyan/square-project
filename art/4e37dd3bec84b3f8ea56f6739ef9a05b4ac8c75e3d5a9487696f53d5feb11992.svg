  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This composition conveys the emotional tension between safety and exposure, utilizing a palette that reflects warmth and vulnerability. The warm brown and shelter green create a sense of safety, while the pale skin and cold white suggest exposure. The contrast is centered, with the upper left housing a dense area of soft colors while the lower right leans towards a cooler exposure. The broken frame layout facilitates a sense of inviting vulnerability, echoing the tension between protection and liberation.</desc>
