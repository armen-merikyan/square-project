<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threads of Tension</title>
  <desc id="desc">This piece captures the emotional duality of relief and dread through contrasting colors and structured patterns. The palette combines the heaviness of dark violet and black, representing dread, with the lightness of soft gold and pale green, representing relief. The vertical split layout emphasizes the conflict, where the left side contains a dense checker pattern (dread), and the right side features a lighter ring pattern (relief). The visual impact is heightened by the edge style that pulls weight toward the bottom, conveying a sense of imbalance and tension while allowing negative space to breathe in the upper rows. The usage of broken pixels introduces a sense of imperfection, mirroring the theme of conflict between symmetry and break.</desc>
