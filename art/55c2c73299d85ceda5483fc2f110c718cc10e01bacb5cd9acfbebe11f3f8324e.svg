<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges: A Dance of Tensions</title>
  <desc id="desc">This artwork captures the emotional tension between control and surrender through contrasting color strategies. The palette, rich in lime and electric blue, embodies vibrancy interspersed with moments of quiet darkness (black) to represent containment and pressure. The center is densely populated with lime, indicating overflow and tension, while the edges consist of quieter, darker colors, suggesting surrender and vulnerability. The stuttered pattern of layers represents interrupted flow, a metaphor for the emotional battles within the space. Broken pixels are integrated to introduce intentional imperfections, enhancing the sense of conflict.</desc>
