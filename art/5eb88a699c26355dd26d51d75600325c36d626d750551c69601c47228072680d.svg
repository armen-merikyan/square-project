<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissonant Harmony</title>
  <desc id="desc">This piece explores the emotional dichotomy of fear and hope, with a palette of deep blacks and violets juxtaposed against soft gold and pale green, symbolizing the tension between darkness and light. The outer edges evoke a sense of encroaching fear through jagged patterns, while the radiant center suggests hope through smooth, upward patterns. The arrangement emphasizes collision—darkness at the corners creating a stark contrast with the lighter core, portraying an inner struggle. Broken pixel elements add imperfection and fragility, embodying the journey between collapse and uplift.</desc>
