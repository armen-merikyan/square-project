<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Held Back</title>
  <desc id="desc">This composition channels the emotional dynamics of desire and restraint through a contrasting palette and layout. The top rows use warm, saturated colors to represent desire's pull, while the muted tones below convey the restraint that slows its progression. Here, the diamond shape metaphorically illustrates both the beauty and hardness of these emotions, reflected in the collision of the warm 'braid' pattern with the cooler 'ladder.' The main contrast occurs at the boundary where these two emotions meet, creating a striking tension throughout the piece.</desc>
