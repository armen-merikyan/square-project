<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Constrained Yearning</title>
  <desc id="desc">This artwork expresses the emotional tension between desire and restraint through the clash of warmer saturated colors against cooler muted tones. The palette of hot coral and dust pink symbolizes the passionate pull of longing, while charcoal and hollow blue evoke a sense of containment and calm. The central collision between saturated lattice patterns and the quiet channel of negative space creates a visual dialogue of push and pull, reflecting the spiral pressure of conflicting emotions. This tension is emphasized with broken pixels disrupting the flow, portraying the imperfection of emotional experiences.</desc>
