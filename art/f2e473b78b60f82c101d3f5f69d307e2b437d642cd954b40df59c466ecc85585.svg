<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This abstract composition embodies the emotional tension between desire and emptiness. It features a saturated core of warm colors representing intense desire, indicating a yearning towards the edges that symbolize containment. The palette, including blood orange and hot coral, creates an active emotional pull, contrasted by the low-saturation hollow blue and charcoal edges suggesting restraint. The main collision occurs at the center, where channels of desire clash against structured borders, capturing the essence of overflow versus containment. The edge style is cut, adding an element of interruption, while a sense of calm is maintained through large negative spaces, ensuring an unresolved emotional climax that feels devoid yet longing.</desc>
