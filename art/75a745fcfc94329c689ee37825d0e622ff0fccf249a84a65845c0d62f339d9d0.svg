<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes and Pulses</title>
  <desc id="desc">This composition explores the tension between clarity and interference, representing the emotional journey of signal versus noise. The palette of navy and black symbolizes the depth and weight of noise, while the dim cyan serves as a beacon of clarity amid chaos. The pattern divides the square into two emotional sections; the top portrays dense noise with layered, muted colors representing interference, while the bottom features organized shapes punctuated with the contrast of bright accents, reflecting a signal fighting to emerge. The broken pixels introduce intentional disruptions, illustrating the scars of memory and erasure, following the seed's guiding themes of exposure and echo.</desc>
