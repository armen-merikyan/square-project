  <title id="title">Fractured Signal</title>
  <desc id="desc">The emotional tone explores the tension between love and betrayal. The palette comprises warm pinks and reds juxtaposed with cool grays and dark maroons to highlight this contrast. Density is reflected in the outer layer's muted tones, while the inner fragmented core features broken patterns suggesting heartache and chaos. The main collision occurs at the shifting lines between warm and cool tones, creating a 'fractal' outburst amid a structured background, symbolizing conflict within relationships.</desc>
