<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition explores the tension between restlessness and peace through contrasting elements. The palette combines tranquil moss green and bone white to represent peace with vibrant rust as an accent that introduces restlessness. The placement of pieces aligns with the 'open gate' layout, creating a palpable feeling of entry and openness on the left, while the right remains structured and layered, emphasizing the emotional collision of environment. The asymmetry and intentional 'broken pixels' introduce imperfection, mirroring the restless feelings and creating an echo of movement and pause.</desc>
