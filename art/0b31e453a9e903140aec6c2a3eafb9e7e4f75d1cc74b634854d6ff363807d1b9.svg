<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inner Conflicts</title>
  <desc id="desc">This composition explores the tension between fear and hope through a stark contrast of dark and light colors. The palette features a mix of warm, bold blacks and dark violets on the edges to symbolize fear, while soft golds and pale greens at the core evoke feelings of hope and growth. The outer border cradles the inner core, representing the pressure of fear pressing inward towards a singular bright spark of hope. The jagged edges of the dark colors collide with the gentle rings of gold and green, illustrating the emotional push and pull between despair and aspiration as the viewer's eye spirals inward, reflecting the inner turmoil of conflicting emotions.</desc>
