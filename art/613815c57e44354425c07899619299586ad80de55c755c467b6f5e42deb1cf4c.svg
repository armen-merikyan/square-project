<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Dissonance</title>
  <desc id="desc">The emotional tone embodies the clash between clarity and confusion, represented through a palette of red and gray. The outer border embodies clarity with structured patterns in subdued tones, while the inner core erupts with chaotic splashes of deeper reds, illustrating a pulse of emotion amidst what appears orderly. The sharp vs. soft contrast accentuates the tension, with a striking collision at the center disrupting the symmetry, invoking a sense of fleeting calm being overwhelmed by tumult. The broken pixels create imperfections, underscoring the theme of distorted perception within familiar confines.</desc>
