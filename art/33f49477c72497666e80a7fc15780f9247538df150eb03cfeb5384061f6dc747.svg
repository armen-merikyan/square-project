<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This artwork embodies the tension between quiet and pressure, with a dominant background of muted tones creating a soft horizon of calm. The palette features off-white and faint peach as quiet fields, contrasted sharply by the deeper, more compressed red and dark navy that surge through the composition. This diagonal flow introduces a sense of motion, where the pressure builds and begins to shatter against the island of quiet colors, creating echoes of fragmented sharpness. The balance is skewed toward the pressure, with broken pixels illustrating imperfections and collisions throughout the grid, accentuating the emotional theme of contrasting states.</desc>
