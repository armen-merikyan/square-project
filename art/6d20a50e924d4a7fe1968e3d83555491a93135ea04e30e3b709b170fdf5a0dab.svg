<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interference Patterns</title>
  <desc id="desc">This composition evokes the emotional tension between clarity and obscurity. The palette of deep navy and dim cyan represents the coldness of noise and interference, while the stark contrast of black and white offers a bright path, symbolizing the desired signal amidst chaos. The hard edges create defined boundaries, contributing to the feeling of collision between structured thought and erratic noise. The core 4x4 area is dominated by the signal (light colors), while the outer edges resonate with noise (darker shades), embodying the oscillation between safety (shelter) and danger (exposure). The pattern of broken pixels suggests memory fragments that interrupt, reflecting the theme of memory vs erasure.</desc>
