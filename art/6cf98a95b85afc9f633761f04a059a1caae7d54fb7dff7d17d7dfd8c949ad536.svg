<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erosion of Containment</title>
  <desc id="desc">This artwork captures the emotional dichotomy of rage and calm via a contrasting palette of deep blacks and vibrant red alongside quiet pale blue and stark white. The sharp edges of red pixels interrupt the soothing horizontal maze of blue, highlighting the conflict. The patterns form a visual tension where the overwhelming red marks breach the calmness of the blue, suggesting a collision in emotional states. The dominant use of harsh shapes against relaxed ones illustrates the frail nature of stability amidst chaos, closed edges narrate eroded symmetry, while an intentional incorporation of broken pixels adds to the organic feel of wear and imperfection, staying true to the seed's notion of contained versus overflowing emotion.</desc>
