<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Signal</title>
  <desc id="desc">This piece embodies the tension between clarity (signal) and chaos (noise), formatted to reflect an emotional landscape of interference and clear intention. The palette captures the stark contrasts of signals through vibrant greens and blues against a backdrop of muted grays and blacks. The main collision occurs at the center, where fragmented, bright paths of green face interruptions by darker tones, illustrating an ongoing struggle between recognizable rhythms and overwhelming static. The design employs broken pixels to symbolize memory erasure and disruptions, favoring a carnal yet rhythmic flow that conveys both disturbance and persistence.</desc>
