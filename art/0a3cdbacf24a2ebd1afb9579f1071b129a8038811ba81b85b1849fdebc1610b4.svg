<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow of Emotion</title>
  <desc id="desc">This artwork captures the tension between longing and resolve through a contrast of warm browns and soft golds versus deeper, cooler tones. The warmth represents yearning while the darker tones symbolize resolve, creating a dynamic pulse throughout the arrangement. The palette's earthy quality evokes a sense of grounding, while the 'flame' and 'frame' patterns intermingle to create spaces of collision and quiet. With the main contrasts clustering towards the center, the piece feels like it reaches upward, suggesting hope and aspiration captured in an abstract form.</desc>
