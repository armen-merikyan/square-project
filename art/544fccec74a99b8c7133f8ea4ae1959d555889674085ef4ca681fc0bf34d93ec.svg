<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tensions</title>
  <desc id="desc">This composition captures the emotional tension between spark and ash — vitality juxtaposed against decay. The selected palette of vibrant coral, oranges, and soft grays represents this duality: the warmth of the spark countered by the cool neutrality of ash. The layout creates a spiral flow, where dynamic crosshatch patterns collide with halo-like quiet fields, asserting each emotional state while leaving space for reflection. This results in a piece where jagged edges meet smooth gradients, symbolizing resilience within fragility.</desc>
