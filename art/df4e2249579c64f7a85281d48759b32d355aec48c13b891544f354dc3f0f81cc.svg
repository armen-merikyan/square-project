<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissonant Harmony</title>
  <desc id="desc">This piece encapsulates the emotional tug-of-war between joy and grief. The palette combines bright yellows and oranges to evoke joy, while deep blues and muted purples represent grief. The main contrast lies in the left-weighted arrangement with a dense cluster of bright colors battling the more fragmented blues on the right, creating a visual dissonance that reflects the conflict expressed in the seed. The rising signal layout helps convey a sense of hope amidst brokenness, as the warm hues pulse outward while cold tones shift inward, reflecting the heart's struggle. Broken pixels in darker shades disrupt the symmetry, symbolizing betrayal and emotional fragmentation.</desc>
