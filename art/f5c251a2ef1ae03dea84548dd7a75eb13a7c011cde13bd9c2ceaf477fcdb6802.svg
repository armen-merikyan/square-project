<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone suggests a tension between deep desire and suffocating emptiness. I chose a palette that contrasts warm, vibrant colors (hot coral and blood orange) representing desire with muted tones (charcoal and hollow blue) illustrating emptiness. The main collision occurs diagonally, where the vibrant colors encroach from the corner, creating a compelling tension against the cooler, restricting backdrop. This pattern reflects the seed’s themes of struggle and confinement, with subtle broken pixels to enhance the imperfection of the experience.</desc>
