<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone here resonates with the tension between desire's saturation and the encompassing emptiness. The palette features warm colors like hot coral and blood orange to invoke the yearning feeling of desire, contrasted against the cooler, muted charcoal and hollow blue that represent the hollowness of emptiness. This contrast is vividly displayed in a spiral pattern that coils inward, creating a dynamic, energetic pull toward a void. The broken pixels intentionally disrupt the surface, echoing the imperfection of human emotions and desires, enhancing the narrative of wanting amidst containment. The negative space throughout the composition ensures that the essence of emptiness isn't overshadowed, creating a balanced yet compelling conflict within this abstract piece.</desc>
