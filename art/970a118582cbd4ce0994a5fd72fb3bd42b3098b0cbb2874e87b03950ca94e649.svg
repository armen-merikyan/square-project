<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Stillness</title>
  <desc id="desc">The artwork captures the emotional tone of 'restlessness vs peace' by contrasting chaotic ring patterns with serene crosshatch elements. The selected palette of deep black, vibrant electric blue, and soothing lime reflects the tension and calm, with black and blue representing restlessness, while lime stands for peace. The arrangement places electric blue and black colors in the chaotic upper half, symbolizing restlessness, while the calming lime takes root in the lower half, suggesting peace. The main collision occurs diagonally where the two emotional states overlap, creating a visual tension that communicates unresolved emotion without literal representation.</desc>
