<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Constellations</title>
  <desc id="desc">This artwork conveys a tension between tenderness and rage through distinct yet colliding color patterns. The palette incorporates saturated reds depicting rage, accented with muted pale blues representing tenderness, and surrounding shadows of black for depth. The interaction occurs mainly in the center, where warm reds (rage) intersect with the cooler pastel tones (tenderness), creating a stark contrast. Eroded edges suggest a sense of fragmentation and imperfection, symbolic of emotional scars and the complexity of feelings. The layout emphasizes pressure from the top left, with a corner packed densely, allowing softened colors to spread quietly outward, invoking feelings of transition and introspection.</desc>
