<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece embodies the emotional tension of desire juxtaposed with restraint. The warm reds and muted creams represent the vibrant pull of desire, while the darker blacks and greys illustrate the restraints imposed. The arrangement emphasizes a central pulse of warmth that battles against a periphery of containment, achieved through varied patterns of saturation and muted tones. The broken pixels symbolize disruption, echoing the complex relationship between longing and limitation.</desc>
