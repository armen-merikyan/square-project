<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict in Symmetry</title>
  <desc id="desc">The emotional tone captures the tension between love and betrayal. The palette blends warm pinks and reds with cooler grays and dark maroons, embodying the warmth of love and the cold edge of betrayal. The design features a grid pattern that contrasts dense clusters of soft dots (symbolizing love) on one side against sharper maze-like sections (symbolizing betrayal) to reflect the struggle for space and emotional control. The broken pixels introduce imperfection, underscoring the theme of an imperfect relationship. The arrangement allows for both density and negative space, enhancing the sense of conflict and unresolved feeling.</desc>
