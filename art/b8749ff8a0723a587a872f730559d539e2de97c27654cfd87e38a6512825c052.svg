<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The composition explores the tension between desire and emptiness, using color and placement to evoke emotional depth. The warm hues of coral and blood orange symbolize desire's intensity, while the cooler shades of charcoal and hollow blue embody emptiness. The left half fills the canvas with vibrant frames, contrasted by the right half's constellation-like quietness, creating a striking visual dialogue. The juxtaposition of saturated colors with muted fields illustrates the struggle of longing against an unyielding boundary, reflecting the dynamics of pressure and relief within the emotional landscape.</desc>
