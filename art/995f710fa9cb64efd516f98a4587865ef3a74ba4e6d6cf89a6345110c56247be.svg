<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone revolves around the contrasting themes of safety and exposure. The chosen palette includes soft, comforting greens and browns to represent safety, juxtaposed against pale colors indicative of vulnerability. The main tension lies within the central spiraled pattern, with the cooler colors representing exposure swirling around warmer, stabilizing hues that convey safety. This creates a visual echo effect that symbolizes the push and pull between shelter and vulnerability. The layout of colors suggests a gentle spiral of pressure emanating from the center, representing the tension and conflict of emotions without forming any recognizable shapes or patterns.</desc>
