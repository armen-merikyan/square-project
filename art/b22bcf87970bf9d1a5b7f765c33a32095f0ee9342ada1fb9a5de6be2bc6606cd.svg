<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order in Chaos</title>
  <desc id="desc">The emotional tone is derived from the tension between panic and control. The palette of deep blacks and soothing soft golds evokes a sense of fear juxtaposed with fleeting hope. The primary contrast occurs between the chaotic black and violet edges against a structured gold center, where the layering mimics a sense of control being eroded by panic. The layout flows like falling pixels, creating an impression of descent from calm to chaotic, while occasional broken pixels enhance the sense of interruption, contributing to the theme of structured chaos.</desc>
