<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Time</title>
  <desc id="desc">The emotional tone captures the tug-of-war between nostalgia and progress, represented through contrasting patterns and colors. The selected palette of pink, red, gray, and dark maroon reflects warmth and emotional depth, embodying love and betrayal. The split horizontal layout showcases the collision of full and hollow spaces, echoing the struggle of memories (checker pattern) against the relentless flow of change (rain pattern). Bottom-weighted alignment emphasizes the heaviness of nostalgia, while the top's lighter, drippy colors illustrate the fleeting nature of progress, creating an unresolved tension across the grid.</desc>
