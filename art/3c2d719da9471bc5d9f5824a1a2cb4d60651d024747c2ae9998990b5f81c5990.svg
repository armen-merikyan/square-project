  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The artwork explores the emotional tension between vulnerability and strength through contrasting color saturation and structured patterns. Using warm coral and cold slate, it combines a strong, defined center resembling strength with softer, ripple-like patterns representing vulnerability. The primary collision occurs at the center, where dark shades meet lighter hues, creating a dynamic visual push and pull. This represents the complex interplay of raw exposure balanced against the need for protection.</desc>
