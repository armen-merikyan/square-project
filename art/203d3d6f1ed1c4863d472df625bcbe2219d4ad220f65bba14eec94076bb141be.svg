<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Certainty and Curiosity</title>
  <desc id="desc">The emotional tone captures the tension between the stability of certainty and the explorative quality of curiosity. The chosen palette, consisting of muted greens and warm browns, sets a grounded foundation, while the open blue and cold white introduce a sense of intrigue. The contrast emerges prominently in the center of the composition, where curved patterns of curiosity collide with the firm boundaries of certainty, creating an interruption that draws the eye. The layout starts from a corner to highlight the invasion of curiosity within a structured order, embodying the push and pull of these emotional states.</desc>
