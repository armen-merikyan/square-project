  <title id="title">Fractured Harmony</title>
  <desc id="desc">This piece captures the emotional duality of restlessness and peace through bold contrasts and layered patterns. The palette of ripe green, acid green, honey gold, deep olive, and cream suggests growth amidst turmoil, with warmer tones representing peace and cooler tones evoking restlessness. A dominant pattern of negative crosses in the top half clashes with the quieter fields in the bottom half, illustrating the tension between motion and stillness. The main visual disturbance occurs in the central column, where restlessness intersects with serenity, creating an unresolved emotional landscape.</desc>
