<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Yearning</title>
  <desc id="desc">This composition embodies the emotional dichotomy of longing and resolve through its use of contrasting colors and spatial arrangements. The palette of warm oranges and yellows juxtaposed against cooler deep blues and muted purples signifies the struggle between yearning and determination. The pattern transitions reflect the aching tension found in the pursuit of goals, with the corner invasion layout allowing the longing to surge diagonally while the resolve remains grounded in fixed lattice formations at intervals. The broken pixels introduce intentional disruptions that echo the imperfections in pursuit, while maintaining a necessary quieter negative space, allowing the vibrant colors to breathe and impart a sense of unresolved motion and desire.</desc>
