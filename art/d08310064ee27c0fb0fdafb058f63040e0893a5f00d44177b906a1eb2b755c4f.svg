<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Emotions</title>
  <desc id="desc">This artwork embodies the emotional duality of envy and gratitude, expressed through a palette of deep navy and soft dim cyan. The dense edges push toward a silent center, enhancing the tension between the inner calm and the outer pressure of noise. The pixel arrangement yields irregular clashes, simplifying the complexity of human emotion into a rhythm of contrasting patterns—a representation of rising hope against falling fears. The negative space invites the viewer to reflect amidst emotional noise, with broken pixels introducing intentional imperfection, evoking vulnerability.</desc>
