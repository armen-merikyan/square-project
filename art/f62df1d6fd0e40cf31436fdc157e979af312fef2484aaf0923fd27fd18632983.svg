<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Balance</title>
  <desc id="desc">The emotional tone navigates between clarity and confusion, where the top half represents clarity through structured patterns and the bottom half embodies confusion with chaotic, overlapping colors. The palette of lime, electric blue, magenta, and black symbolizes the energetic tension between these opposing emotions. Main contrast occurs where electric blue pierces through the noise of the magenta, creating a visual pulse amidst the chaotic background, suggesting a battle between harmony and disorder. The seed focused on 'broken pixels' led me to incorporate deliberate dissonance, creating a fractured yet engaging visual narrative.</desc>
