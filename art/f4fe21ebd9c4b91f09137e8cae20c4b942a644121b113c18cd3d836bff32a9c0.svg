<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Calm</title>
  <desc id="desc">This artwork explores the tension between peace and restlessness through contrasting color fields. The palette of warm shadow and cool blue suggests an emotional interplay: the calmness of pale field colors against the disturbances of vibrant patches. The dominant pattern of static elements at the top evokes tranquility, while the flame-like accents at the bottom embody energy and movement. The unexpected broken pixels serve as disruptions that symbolize shatters of peace, enhancing the weight of memory and motion. The conflict between the static and the dynamic is palpable, creating a narrative of unresolved emotional tension.</desc>
