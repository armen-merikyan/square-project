<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone plays between desire and emptiness, represented by warm, saturated colors juxtaposed against low-saturation tones. The palette includes hot coral and blood orange to evoke warmth and longing, while charcoal contributes to the feeling of restraint and emptiness. The main contrast occurs centrally with a layered density of warm colors climbing upward, suggesting hope, clashing with larger blank areas of quiet blue conveying containment. This reflects the tension of overflow versus containment as colors overlap and disrupt expected patterns in a non-linear narrative of desire against the edges of emptiness.</desc>
