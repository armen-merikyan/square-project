<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interference Pattern</title>
  <desc id="desc">This artwork conveys the tension between clarity and chaos, structured around a central pulse that navigates through a field of static interference. The palette of navy and dim cyan reflects the coldness of isolation (noise) against a singular bright white (signal), inviting calm amidst disturbance. The diagonal layout creates a visual argument between the two emotions, with broken pixels serving as deliberate interruptions that enhance the theme of memory versus erasure. The bright central path of the signal becomes overlaid with darker, more chaotic disturbances, mirroring the challenge of maintaining clarity in a world filled with noise.</desc>
