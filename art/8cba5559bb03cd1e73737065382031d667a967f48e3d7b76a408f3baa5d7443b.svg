<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This artwork captures the tension between softness and severity, using a palette that contrasts warm whites and powder pinks against stark carbon black and steel gray. The left side, embodying 'softness', features a maze-like pattern that drifts and flows, creating a soft, feathered contact. The right side conveys 'severity', with a radial interplay that feels harsh and rigid. A cluster of warm colors purposely collides with the cold colors around it, with the dominant collision occurring centrally, representing emotional struggle and resolution. The balance of negative space enhances the feeling of tension, allowing the eye to breathe amidst the loudness of color in this abstract narrative.</desc>
