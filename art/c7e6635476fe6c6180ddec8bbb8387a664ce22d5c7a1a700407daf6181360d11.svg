  <title id="title">Emotion Tension in Pixels</title>
  <desc id="desc">This artwork encapsulates the emotional dichotomy of joy and grief through a structured yet fragmented layout. The palette consists of bright yellows and oranges representing joy, paired with deep blues and muted purples that evoke grief. The contrast arises in the arrangement, where joyful stripes emerge in the center, disturbed by chaotic edges, creating a sense of both protection and threat. Broken pixels scatter across the layout, symbolizing the imperfections of these intertwined emotions, while leaving intentional negative space for reflection.</desc>
