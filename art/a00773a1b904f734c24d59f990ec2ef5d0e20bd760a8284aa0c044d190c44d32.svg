<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This composition translates the emotional tones of 'spark' and 'ash' into a dynamic interplay of bright and muted colors. The palette of black, dark violet, soft gold, and pale green embodies both hope and despair, where soft gold represents ignition and warmth (spark) while dark violet evokes the settled dust and fading warmth (ash). The composition flows diagonally, creating a distinct tension between the upward push of soft gold and the downward pull of dark violet, with jagged edges allowing for a sense of disruption throughout. The conflict between these energies is manifested in the collision of patterns: the veil of soft gold meets the crosshatch of dark violet, with structured chaos that interrupts monotony, representing the essence of denial versus acceptance. The arrangement incorporates broken pixels to introduce intentional imperfections and disruptions, enhancing the emotional depth of the work.</desc>
