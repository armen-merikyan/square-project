<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone is a blend of vulnerability and strength, depicted through the contrast between the soft scar-like patterns (representing vulnerability) and the solid, stable checker-style patterns (representing strength). The chosen palette, including bold black and electric blue, embodies the raw intensity of strength, while softer hues like lime represent the fragility of vulnerability. The main collision occurs in the center where the checker pattern interrupts the surrounding scar texture, creating a dynamic play between chaos and stability. This reflects the seed's essence of conflict between exposed sensitivity and protective strength, symbolized by the beacon concept without literal representation.</desc>
