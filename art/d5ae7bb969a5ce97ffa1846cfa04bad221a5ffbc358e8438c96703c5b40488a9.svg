<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The artwork embodies the emotional tension between defiance and submission, expressed through the collision of structured 'mirror' patterns that dominate the center and chaotic 'noise' patterns that enclose it. The palette reflects 'resilience fragility', where moss green represents growth and defiance, while bone white provides a soft, submissive contrast. The pulse of rust and gold offers an undercurrent of alive energy amidst the conflict, accentuating the center as a focal point of resistance against the surrounding chaos. This arrangement evokes a feeling of pressure from the edges towards the quiet center.</desc>
