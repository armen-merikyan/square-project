  <title id="title">Friction of Existence</title>
  <desc id="desc">This composition contrasts relief and dread, vividly representing emotional turbulence with a stark interplay of dark and light colors. The use of deep grays and blacks establishes weight and pressure, while lighter shades of mint and soft sky suggest moments of clarity and hope. The spiral movement counterclockwise introduces an echoing rhythm of tension and release. The layout strategically contrasts dense masses with a thin, narrow negative space path, emphasizing the struggle between confinement and expansion. Broken pixels act as reminders of imperfection, adding depth to the emotional narrative.</desc>
