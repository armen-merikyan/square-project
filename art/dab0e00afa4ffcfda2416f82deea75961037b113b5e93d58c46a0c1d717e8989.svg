<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Containment</title>
  <desc id="desc">This artwork captures the emotional tension between desire and restraint. The palette features warm accents like hot coral and blood orange juxtaposed against cooler, muted tones such as charcoal and hollow blue. The layout extends from the corner, embodying the notion of desire spreading diagonally into a locked negative space, representing restraint. The main collision occurs along the diagonal flow, where the saturated colors momentarily pulsate against the subdued shades. This interplay suggests a yearning that meets its boundary, embodying the struggle expressed in the seed.</desc>
