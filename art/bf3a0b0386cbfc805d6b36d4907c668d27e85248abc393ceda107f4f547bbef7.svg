  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The artwork captures a dynamic interplay between the tension of exposure and the comfort of safety. A dominant, soft pale center embodies vulnerability, while the corners are filled with dense, warm shades suggesting protection. The choice of soothing greens and browns juxtaposes the cold whites and blues, echoing the conflict between warmth and distance. The structured maze of safety collides with the abrupt stairs of exposure, creating an emotional fracture centralized in the corner, where the contrast between tension and stability is most pronounced.</desc>
