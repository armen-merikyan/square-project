<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork embodies the emotional tension between desire and emptiness, highlighted by a saturated palette of warm hues clashing against cooler tones. The dense coral and blood orange evoke longing and intensity, while the charcoal and hollow blue represent muted restraint and quietude. The main contrast occurs centrally, causing a dramatic collision of emotion as the vibrant colors threaten to spill beyond their confines. The layout, based on subtle islands surrounded by a sea of color, captures the struggle between the inner hunger and the external limitations of space. Broken pixels are strategically placed to represent imperfections, while preserving the overall abstract quality of the piece.</desc>
