<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Sea</title>
  <desc id="desc">The composition balances the tension between restlessness and peace through a dynamic arrangement of colors. The darker tones represent restlessness with their heavier presence on one side, while the lighter colors symbolizing peace create a gentle counterbalance. The main contrast occurs in the center where the diagonal lines of darker shades clash with patches of muted cream and small orange. This conflict evokes emotions of unease meeting tranquility, creating a sense of movement against a backdrop of calm. The pixel arrangement suggests motion but remains abstract, allowing viewers to interpret their own memories and feelings.</desc>
