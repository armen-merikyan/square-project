<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Tensions</title>
  <desc id="desc">This composition explores the emotional dichotomy of vulnerability and strength through the contrasting themes of density and exposure. The palette of burnt orange, dark red, charcoal, and gold evokes an ancient, elemental feel, suggesting both warmth and intensity. The outer ring symbolizes strength (with darker tones representing thick barriers), while the inner core (lightened to burnt orange with golden highlights) embraces vulnerability, suggesting softness and exposure. The intention is to create a collision of these contrasting emotional states at the center, where warmth (indicating desire) battles against chaos (reflecting empty spaces). Broken pixels and asymmetric designs reflect scars and ruptures, adding to the narrative of strength meeting vulnerability.</desc>
