<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Fragmentation</title>
  <desc id="desc">The emotional tone navigates between panic and control, reflected in the dichotomy of sharp contrasts and muted tones. The chosen palette - sepia, tan, dust gray, and faded blue - evokes a sense of nostalgic unease, balancing warmth against coolness. The main contrast emerges on the grid where the left side, characterized by frames of tan, clashes with cooler shades of dust gray and faded blue on the right. This collision of calm and chaotic forms an almost mirrored yet imperfect composition, portraying the tension of ordered chaos that the seed suggests.</desc>
