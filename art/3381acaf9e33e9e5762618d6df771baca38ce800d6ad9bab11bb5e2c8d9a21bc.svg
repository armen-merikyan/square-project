<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Equilibrium</title>
  <desc id="desc">The emotional tone captures the tension between panic and control, depicted as dark, structured hues fighting against lighter, irregular textures. The palette transitions from deep navy and black to lighter shades of white and dim cyan to illustrate the struggle and the encroaching chaos. The main contrast, evident through the arrangement of darker 'teeth' patterns against the more muted 'frame' styles at the edges, symbolizes a push-and-pull between stability and anxiety. This aligns with the seed's thematic elements about a central conflict, using negative space strategically to evoke feelings of hollowness amidst density.</desc>
