<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order Meets Chaos</title>
  <desc id="desc">This artwork embodies the tension between control and panic through a dichotomous layout, with the left side showcasing ordered dots in lime and electric blue, evoking feelings of control. The right side disrupts this order with a maze pattern in deep black and magenta, suggesting chaos and entropy. The contrast arises at the center where the organized dots abruptly collide with the erratic maze, symbolizing the intrusion of panic into a controlled space. The negative space ensures the viewer's eye can navigate the tension, while broken pixels introduce a sense of imperfection, reinforcing the theme of collision.</desc>
