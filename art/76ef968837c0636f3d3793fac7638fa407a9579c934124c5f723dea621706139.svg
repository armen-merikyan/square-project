<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Echo</title>
  <desc id="desc">This piece conveys the emotional struggle between defiance and submission through contrasting elements of heavy and soft tones. The palette features dominant blacks and dark violets representing weight and oppression, with soft gold and pale green providing contrasting lightness and hope. The arrangement suggests a ‘bottom-weighted’ layout, evoking the sense of grounding from below, while the uneven pixel placements echo themes of falling and instability. The collision between dense edges and open centers emphasizes the tension, revealing the complex dance between holding on and letting go.</desc>
