<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissonance in Harmony</title>
  <desc id="desc">This piece captures the emotional dichotomy between trust and suspicion through a stark left-right split: the left side is warm, inviting, and gentle, while the right side is cool, distant, and fragmented. I chose a palette with moss green and bone white for the trust side, symbolizing warmth and resilience, contrasted with rust and stone gray for the suspicion side, invoking unease. The main collision occurs vertically, where the cool tones of suspicion break into the warm hues of trust, portraying tension. Broken pixels on the suspicion side symbolize fragility in human connections, illustrating the delicate balance of trust and suspicion.</desc>
