<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Conflict</title>
  <desc id="desc">This artwork embodies the emotional tension between emptiness and desire. The top half features warmer hues, a flex of noise that reflects the chaotic nature of desire, while the bottom employs cooler tones symbolizing emptiness. The sharp contrast between vibrancy and muted shades accentuates the conflict. The palette includes yellows and oranges for warmth, countered by deep blues and muted purples that invoke a sense of space and solitude. The central tension is felt where the warm and cool colors collide, creating a visual echo of unresolved feelings. Here, the broken pixels disrupt the flow, lending a sense of imperfection to both emotions, reinforcing the story of a fragmented heart yearning for connection amidst isolation.</desc>
