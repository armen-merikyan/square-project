  <title id="title">Tension of Light and Weight</title>
  <desc id="desc">The interplay between joy and grief is captured through a palette that merges bright yellows and oranges representing joy, and deep blues reflecting grief. The upper half contains lighter hues forming a crosshatch pattern, suggesting brightness and open space, while the lower half is denser, darker, and maze-like, embodying heaviness and fragmented emotion. This split reinforces the tension between lightness and weight, with the overall composition suggesting an unresolved pull. Broken pixels create intentional imperfections that reflect the complexity of emotions.</desc>
