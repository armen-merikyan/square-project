<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Convergence of Tensions</title>
  <desc id="desc">This artwork captures the emotional struggle between defiance and submission. The warm coral and soft amber represent bright acts of defiance, while the colder colors like blue-black and cold slate allude to submission, creating a contrast of warmth versus coolness. The central cluster of coral is vibrant against the dense, muted fields of the surrounding cool tones, symbolizing a flicker of defiance in a submissive landscape. Broken pixels inject intentional disruptions, echoing the chaos of emotions, while negative space emphasizes both isolation and collision. The layout hints at a dim setting, illuminated by the dynamic center. This interplay of colors and patterns creates a narrative of struggle and tension throughout the square.</desc>
