<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Shelter</title>
  <desc id="desc">The emotional tone shifts between vulnerability and warmth, reflected in the palette of greens and browns enhancing the shelter aspect, while icy whites and blues reflect exposure. The dominant warm hues create a protective atmosphere, while cooler accents thread through the composition like echoes of uncertainty, creating the echo effect as it moves from left to right. Main collision points emerge as concentrations of color interrupt the softer backgrounds, representing pressure against release while still leaving space for vulnerability to exist.</desc>
