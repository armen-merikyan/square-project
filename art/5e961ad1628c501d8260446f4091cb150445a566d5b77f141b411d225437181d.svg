<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tension</title>
  <desc id="desc">The emotional tone reflects the contrast between envy and gratitude, expressed through a divided palette. Dark hues on the left suggest the weight of envy, while lighter colors on the right embody gratitude. The center serves as a focal point of tension, showcasing the noise between these emotions. The checker pattern on the left collides with the frame pattern on the right, creating a rhythmic heartbeat of contrasting feelings. Broken pixels add imperfection, reflecting the unpredictable nature of these emotional experiences.</desc>
