<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This piece captures the dynamic tension between joy and grief, represented by the contrasting warm yellows and oranges against cooler muted purples and deep blue. The palette was chosen to reflect the duality of emotions, with joy represented as a light source clashing against heavier tones of grief. The outer areas possess a crosshatch pattern, suggesting a heaviness and complex layering of feelings, while the inner core radiates joy in a radial pattern, symbolizing a burst of light amidst shadows. The hard edges and irregular placement create a sense of interruption, echoing the struggle between feeling safe and threatened. The arrangement also echoes a stair-step flow, hinting at movement from chaos to order, yet remaining abstract and open for interpretation.</desc>
