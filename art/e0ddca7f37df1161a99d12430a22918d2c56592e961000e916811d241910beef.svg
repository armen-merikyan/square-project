<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Affection</title>
  <desc id="desc">The emotional tone reflects the tension between love and betrayal, using a palette that amplifies warmth and vulnerability against coldness and distance. The colors of pink and red symbolize love, while dark maroon contributes to the feeling of betrayal. This juxtaposition leads to a primary contrast in the layout, where pairs of soft shapes echo in the top half of the square, disrupted by sharp edges as they descend, reminiscent of a crosshatched pattern in the lower section. The interplay of density at the top and stark empty spaces below evokes feelings of loss and isolation, aligning with the themes of 'inside vs. outside' and 'lonely signals.' The use of broken pixels introduces imperfection, suggesting a flawed emotional landscape. This abstract arrangement captures the volatility and complexity between intertwined feelings, creating a narrative of unresolved tensions and emotional disarray.</desc>
