<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Heartbeats</title>
  <desc id="desc">This piece captures the emotional contrast between joy and grief through the use of a palette that reflects warmth and depth. The central segment is both bright and fragmented, mirroring the pulse of life and the weight of loss. The outer border, themed with muted shades, creates a protective frame around the inner core while the jagged pattern of grid reflects grief's constraints and the teeth-like pattern represents joy's sharp, fleeting moments. The arrangement strategically emphasizes density in the center and quietness towards the edges, creating an emotional ebb and flow that resonates with the narrative of love and betrayal.</desc>
