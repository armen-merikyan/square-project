<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resilience</title>
  <desc id="desc">The emotional tone navigates between vulnerability and strength, where the muted palette of dark violet and soft gold embodies the struggle between fear and hope. The center resonates with a dense arrangement of soft gold, symbolizing strength in vulnerability, while the dark violet edges create a sense of struggle, framing the acidic contrasts. The collision occurs centrally, with softer colors bleeding into harsher tones that illustrate the tension of exposure against shelter and the push of rising signals against incoming floods, forming an abstract interplay between safety and exposure.</desc>
