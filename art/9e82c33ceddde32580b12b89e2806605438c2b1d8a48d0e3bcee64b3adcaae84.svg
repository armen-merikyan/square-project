<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Tension</title>
  <desc id="desc">The artwork explores the emotional dichotomy between rage and calm, channeling their interactions through a spiral layout. The palette combines striking reds and tranquil pale blues, visually representing hot bursts of emotion clashing with cool containment. The composition's structure gives an edge-heavy appearance, where the center radiates bright red contrasts, encapsulating feelings of aggression while fading into a serene blue field, embodying a sense of calm. Broken pixels intermittently interrupt the flow, suggesting both scars of conflict and moments of quiet clarity.</desc>
