<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast in Chaos</title>
  <desc id="desc">This artwork explores the emotional tension between fear and hope, presenting a dynamic interplay of contrasting elements. The chosen palette of dark violets represents fear's sharp edges and pervasive pressure, while soft gold and pale green evoke hope’s gentle glow and uplifting flow. The layout emphasizes a corner invasion, beginning with dark tones that signify fear but progressively introducing lighter hues to suggest the rising signal of hope, invoking a sense of struggle and resilience. Sparsely placed broken pixels create a feeling of imperfection, adding depth and enhancing the visual echo between hope and fear.</desc>
