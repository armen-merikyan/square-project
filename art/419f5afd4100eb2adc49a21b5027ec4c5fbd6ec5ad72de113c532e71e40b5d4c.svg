<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Hope and Structure</title>
  <desc id="desc">This artwork explores the emotional conflict between longing and resolve, using a palette that emphasizes both vibrancy and depth. The use of electric blue and lime creates a lively pulse suggesting hope, while the black adds depth, reflecting resolve. The main contrast occurs centrally with layered blue and black vertical bars representing structure colliding with softer, more fluid arrangements of lime and magenta, representing longing. This remains abstract, emphasizing pattern and emotional resonance rather than clear forms.</desc>
