<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symphonic Dissonance</title>
  <desc id="desc">The emotional tone reflects a struggle between clarity and confusion, effectively represented by contrasting electric blue and black with the vibrant tones of lime and magenta. The layout creates an invasion from the corner, showcasing a wave-like flow that expresses confusion through radial patterns. The main contrast emerges between the dense colors forming collision points in the middle and the quieter edges, encapsulating a dynamic tension. The use of broken pixels introduces imperfections that resonate with the concept of 'broken symmetry'. This arrangement generates an abstract narrative of pulsing emotions, caught in a push-and-pull between disorder and clarity.</desc>
