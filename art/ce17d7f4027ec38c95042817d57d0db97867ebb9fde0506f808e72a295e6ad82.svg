<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Desire</title>
  <desc id="desc">This artwork embodies the emotional contrast of 'emptiness vs desire' through a palette of warm and cool tones. Warm reds and pinks represent desire while cooler grays and dark maroon illustrate emptiness. The upward movement in the layout symbolizes rising hope while the disjointed pixels create a sense of loneliness. Collisions between colors enhance emotional tension—a quiet warmth colliding with heavy, cool shades, much like a signal attempting to break through noise. The radial pattern expresses emptiness, contrasted by the crosshatch of desire, encapsulating the tug-of-war felt in these emotions.</desc>
