<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone captures a battle between a saturated, warm desire represented by bright coral and orange hues, and a sense of emptiness marked by deep charcoal and blue tones. The palette utilizes warm colors to create a pulsating core that conflicts with cooler fields that represent hollowness. The main collision occurs in the center, where bright dots suggest desire against a muted flame-like background, embodying pressure and containment. The edges are feathered to imply openness while allowing the outer darker tones to encroach, embodying stifling restraint. Broken pixels randomly distributed lend an imperfection and disruption to the ideal forms, emphasizing the tension between longing and limitation.</desc>
