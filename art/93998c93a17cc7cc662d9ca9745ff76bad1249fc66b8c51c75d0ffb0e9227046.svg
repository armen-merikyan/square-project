<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Orders</title>
  <desc id="desc">This artwork explores the tension between defiance and submission through a duality of dense, maze-like patterns against a softer split-screen effect. The palette conveys quiet pressure with off-white and faint peach creating a calm field, while dark navy and compressed red introduce conflict and interruption. The main collision resides in the center, where the maze pattern intersects with a more subdued field, allowing for a visual representation of emotional push and pull. Broken pixels used throughout serve as intentional disruptions, enhancing the sense of disturbance in an otherwise ordered space.</desc>
