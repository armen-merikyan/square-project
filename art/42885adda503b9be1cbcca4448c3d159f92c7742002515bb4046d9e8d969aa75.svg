<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hungry Restraint</title>
  <desc id="desc">This piece explores the emotional tension between desire and emptiness. The palette blends hot coral and blood orange to evoke a saturated, warm pull of desire, paired with charcoal and hollow blue representing a faint, distant perimeter of emptiness. The left side is dominated by saturated colors symbolizing hunger, while the right side displays cooler, muted tones suggesting restraint. A central collision occurs as the intense warmth of desire meets the quiet pressure of emptiness, resulting in an uneven rhythm that disrupts the edge style, suggesting the struggle between overflow and containment. The use of broken pixels amplifies this disruption, creating a dynamic tension throughout the piece.</desc>
