<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Amidst Distortion</title>
  <desc id="desc">The emotional tone captures a struggle between clarity and distortion, reflecting the essence of the seed through contrasting elements of signal (the clear pulse) and noise (static interference). The palette features a lonely signal with navy and black as dominant colors, representing a heavy backdrop, while dim cyan peeks through, suggesting flickering moments of clarity. The collision occurs centrally, where the clear paths of the signal clash with static patterns, creating a compelling dynamic across the canvas. Patterns of 'stairs' and 'rain' visually convey the struggle as they intermittently overlap, symbolizing how memories can both rise and drown in static.</desc>
