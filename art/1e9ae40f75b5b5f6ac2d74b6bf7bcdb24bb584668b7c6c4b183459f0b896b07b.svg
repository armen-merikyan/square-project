<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece explores the emotional contrasts of vulnerability and strength. The palette combines warm coral and soft amber suggesting vulnerability, while cold slate and blue-black bring in the element of strength. The main collision occurs in the center, where the pressure bands representing vulnerability meet the channel-like structures of strength. This abstract arrangement embodies the push-and-pull of feelings associated with exposure versus protection, illustrated through a mix of dense and quiet spaces.</desc>
