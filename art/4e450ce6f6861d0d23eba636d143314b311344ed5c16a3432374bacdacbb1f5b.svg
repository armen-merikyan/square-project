<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This piece embodies the emotional tension between connection and loneliness. The dark palette represents isolation, with dense colors crowding the edges, mimicking the feeling of weight and pressure. The brighter electric blue and lime represent fleeting moments of connection, shining through as single pixels amidst a sea of darkness, suggesting that connection is often precious and rare. The contrasting placement intensifies the emotional collision, making the bright pixels feel both vibrant and fragile against the surrounding muted background, capturing the essence of longing amidst void.</desc>
