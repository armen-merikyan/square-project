<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Broken Symmetry</title>
  <desc id="desc">This piece captures a dynamic interplay between love and betrayal, using warm reds and pinks alongside the coldness of grays and dark maroon to evoke emotional tension. The layout mirrors itself but introduces intentional breaks—four pixels displaced to illustrate disruption in harmony. The contrast of warm vs. cool, and the broken edges, suggest a rhythmic pulse of both quiet moments and sudden interruptions, reflecting on the complexities of emotional connections.</desc>
