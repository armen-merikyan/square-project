<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork explores the tension between overwhelming desire and the constraints of emptiness. The palette combines warm hues like hot coral and blood orange to signify desire, juxtaposed against cooler tones of charcoal and hollow blue that represent the confines of emptiness. The main collision occurs diagonally across the piece, where saturated colors collide with muted areas, interrupting the flow and emphasizing the struggle between saturation and void. The arrangement of colors hints at a spiral pattern, reinforcing the spiral counterclockwise theme, while the use of broken pixels breaks the regularity, symbolizing the imperfections and unpredictable nature of emotional experiences.</desc>
