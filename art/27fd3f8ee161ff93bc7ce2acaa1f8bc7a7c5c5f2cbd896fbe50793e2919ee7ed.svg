<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This artwork embodies the duality of vulnerability and strength through color contrasts and patterns. The selected palette of blues and grays is soothing yet melancholic, creating a tender backdrop that suggests vulnerability with soft cyan and moon white as the main fields. In contrast, dense blocks of muted plum and deeper shades create a sense of strength and grounding. The collision of 'broken dots' representing vulnerability on one side against 'target' blocks representing strength on the other, emphasizes the emotional tug-of-war depicted in the seed. The main contrast occurs at the center, creating a dynamic flow that invites the viewer to explore the threshold between exposure and shelter.</desc>
