<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Collision</title>
  <desc id="desc">This artwork explores the emotional tension between confusion and clarity. The palette of electric blue and lime contrasts starkly against the deep black, symbolizing clarity piercing through the chaos of emotion. The broken dot patterns convey random collisions and interruptions within the flow, creating a sense of dynamic rhythm. The top-weighted edge style enhances this sensation, with denser colors at the top hinting at rising pressure. The layout leaves negative space to indicate quiet moments amidst the emotional turmoil, embodying the essence of release within tension.</desc>
