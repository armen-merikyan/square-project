<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order in Chaos</title>
  <desc id="desc">This artwork explores the emotional dichotomy between joy and grief. The palette transitions from muted purples and deep blues representing grief to vibrant yellows and oranges that evoke joy. The left half features a dense cluster pattern reminiscent of rain, expressing heavy emotions, while the right side uses more open space in a wavy, lively arrangement to depict joy. The intersection of arranged chaos and structured order illustrates the complexity of emotional experiences, embellished with thin outlines to emphasize transitions, while broken pixels disrupt symmetry, invoking the notion of imperfect beauty in emotional truths.</desc>
