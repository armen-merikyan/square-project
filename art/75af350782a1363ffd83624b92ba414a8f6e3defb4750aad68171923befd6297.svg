<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece explores the tension between sparks of energy and the settling dust of ash. Using a palette of warm ivory, soft gold, deep wine, ash gray, and stain brown, the artwork creates an emotional landscape that highlights contrasts: bright accents of 'spark' punctuate the more subdued 'ash.' The main contrast occurs at the center, where radial patterns of warmth collide with jagged, subdued stripes, suggesting an ongoing struggle between vitality and decay. The broken frame layout introduces intentional gaps that symbolize emotional leaks, emphasizing fragility amidst resilience.</desc>
