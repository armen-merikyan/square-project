<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos and Composure</title>
  <desc id="desc">This composition embodies the duality of panic and control through a swirling blend of colors. The palette combines deep blacks and stark whites to showcase the tension between order and chaos. Controlled patterns of pale blue represent calm and stability in contrast to the red, which emerges sporadically to symbolize disruption and panic. The arrangement follows a falling pixel layout, with clusters creating moments of density interrupted by negative space, evoking the sensation of an empty room that oscillates between feeling serene and claustrophobic.</desc>
