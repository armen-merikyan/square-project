<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Longing</title>
  <desc id="desc">The emotional tone captures the tension between emptiness and desire through a palette that juxtaposes the deep blacks and dark navy with flickers of warmth from muted whites and cool dim cyan. The collision occurs at the edges where the warmth fights against pervasive darkness, representing desire pushing against the void. The arrangements echo a rhythm of rising and falling emotions, with the contrast highlighting a lonely signal amidst an expanse of negative space. The layout, inspired by the 'empty room', brings forth an overall feeling of longing and tension.</desc>
