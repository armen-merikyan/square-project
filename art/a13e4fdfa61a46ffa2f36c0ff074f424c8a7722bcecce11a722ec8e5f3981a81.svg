<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone balances between softness and severity, with a palette of soft pastels contrasting sharp darks. The interplay between warmth (powder pink, warm white) and depth (carbon black, steel gray) reflects the tension in the seed's themes. The main collision happens centrally, where a sharp crimson accent interrupts the softer bars, symbolizing a pulse against a dense background. This arrangement suggests a quiet strength emanating from the chaos, reminiscent of forgiveness emerging from guilt — a conflict richly layered yet visually distinct.</desc>
