<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Suspicion</title>
  <desc id="desc">This artwork embodies the tension between trust and suspicion. The left side is a gradient of deep, muted colors representing instability and chaos (suspicion), while the right side features warmer, grounding tones that inspire a sense of trust and safety. The palette includes shades that resonate with both warmth (warm brown, shelter green) and coolness (cold white). The main collision occurs along a diagonal split, where soft, glowing edges respond to hard shadows, suggesting the contrasting emotions at play. Broken pixels are interspersed, symbolizing imperfection and the delicate balance between vulnerability and resilience.</desc>
