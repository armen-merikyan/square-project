  <title id="title">Conflict Horizon</title>
  <desc id="desc">This artwork explores the tension between defiance and submission through a color palette that balances vibrant and muted tones. The central area, packed with bold contrasts, portrays defiance using a braided pattern of ripe green and acid green, while the outer edges fade into a softer pool of cream, suggesting submission. The collision occurs where the vibrant center meets the quiet perimeter, embodying the struggle between chaos and order. This layout evokes a sense of an uneven border, symbolizing thresholds and the complexity of emotional spaces.</desc>
