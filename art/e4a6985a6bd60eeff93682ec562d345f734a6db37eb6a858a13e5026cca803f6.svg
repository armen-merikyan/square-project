<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Falling Layers of Contrast</title>
  <desc id="desc">The emotional tone oscillates between vulnerability and protection, embodied through a palette of warm brown and cold white. The layout allows colors to descend like anticipated rain, where the central section contrasts softly with a dense border. This collision allows for a sense of impending exposure against a stable frame, creating a continuous echo of weight and lightness, enhancing the feeling of softness meeting severity. The broken pixels disrupt the flow subtly, representing scars of experience.</desc>
