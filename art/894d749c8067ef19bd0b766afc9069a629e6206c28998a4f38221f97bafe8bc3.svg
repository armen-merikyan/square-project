<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone depicts the ongoing struggle between emptiness and desire, captured through a contrasting palette of warm, vibrant colors that symbolize desire (hot coral, blood orange) against the muted, colder shades that represent emptiness (charcoal, hollow blue). The central collision occurs at the edges of the grid, where the warm accents try to overflow into the colder backgrounds, suggesting a dynamic tension. The layout style of 'broken_frame' creates intentional gaps, embodying the idea of containment with disruptions, while the patterns of 'thread' for desire and 'pulse_marks' for emptiness intertwine, showcasing their constant conflict.</desc>
