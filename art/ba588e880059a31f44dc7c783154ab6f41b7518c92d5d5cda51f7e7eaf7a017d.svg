<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light and Weight</title>
  <desc id="desc">This abstract composition captures the dual emotional tones of relief and dread. The palette of deep navy and dim cyan represents the weight of dread contrasted with the lightness implied in the abstract white spaces. The arrangement emphasizes a heavy pattern of grid on the outer edges symbolizing dread, while the inner core exhibits a maze pattern reflecting relief. A top-down flow creates a visual pull, where the densely packed colors at the bottom transition to lighter hues at the top, echoing a journey from heaviness to hope. Broken pixels enhance the sense of imperfection, capturing interruptions within the emotional experience.</desc>
