<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Boundaries</title>
  <desc id="desc">The emotional tone juxtaposes the heated pull of desire with the cool limit of restraint. Bright, saturated colors (hot coral, blood orange) are positioned against muted shades (charcoal, hollow blue) to evoke a struggle between overflowing passion and contained emotions. The energetic brush of warm colors interrupts the cooler, more restrained lattice, creating visual collisions that suggest the push and pull of strong feelings. Each row embodies a different band of density, transitioning from warmer tones at the center to cooler edges, echoing the emotional journey implied by the seed.</desc>
