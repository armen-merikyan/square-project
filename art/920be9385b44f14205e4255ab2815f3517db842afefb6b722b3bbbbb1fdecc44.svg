<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Edges</title>
  <desc id="desc">This artwork explores the emotional tension between defiance and submission through contrasting colors and patterns. The palette of ripe green, acid green, and honey gold emphasizes vibrancy amidst darker tones of deep olive and cream. The main collision occurs at the center where active flame patterns of defiance clash with the receding tide patterns of submission, creating an evocative spiral effect. Broken pixels symbolize disruptions within this emotional landscape, enhancing the inner conflict depicted. The quiet channel layout allows for visual conversation between density and emptiness, maintaining a balance that's visually engaging.</desc>
