<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Suspicion</title>
  <desc id="desc">The emotional tone is centered on the tension between trust and suspicion, represented through a palette that balances warmth with cooler, more distant hues. The main contrast occurs between the soft glow of warm shadow colors against cool blue tones, creating a dynamic interaction reminiscent of the inner conflict described in the seed. The abstract pattern emerges from the chosen broken line shape seed, presenting a sense of fragmented security, where stable forms are interrupted by moments of uncertainty, echoing the concepts of pressure and resilience. This interplay generates visual tension that captures the essence of the seed's narrative.</desc>
