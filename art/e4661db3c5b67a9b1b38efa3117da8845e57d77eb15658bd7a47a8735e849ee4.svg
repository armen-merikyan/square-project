<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition embodies the emotional tension between control and surrender, with a saturated pull towards a locked border refusing expansion. The palette of black, dark violet, soft gold, and pale green mirrors the contrast in themes: the darkness representing control, and the light tones hinting at surrender. The main collision occurs at the center, where the frame-like pattern suggests strong containment while the checker pattern interrupts, echoing the theme of overflowing versus containment. The arrangement of broken pixels adds a sense of imperfection, enhancing the emotional depth and suggesting the struggle of balance between these contrasting energies.</desc>
