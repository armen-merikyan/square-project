<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Suspicion</title>
  <desc id="desc">The emotional tone reflects the tension between trust and suspicion. The chosen palette of muted colors—off white, dust gray, compressed red, dark navy, and faint peach—underscores a quiet pressure, suggesting moments of both warmth and unease. The main collision occurs at the center, where deep shadows (dark navy) clash with soft glows (faint peach), symbolizing the battle between hope (trust) and doubt (suspicion). Broken pixels interrupt the field—representing fractures in trust—while the layout of dense center with struggling borders aligns with the theme of containment versus overflow.</desc>
