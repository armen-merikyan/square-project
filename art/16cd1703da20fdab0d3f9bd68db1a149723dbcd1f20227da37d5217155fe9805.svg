<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition embodies the struggle between 'defiance' and 'submission' through contrasting color densities and patterns. The darker shades symbolize the defiant core, pressed against the softer hues of submission at the edges. The palette consists of black for intensity, electric blue for vibrancy, and magenta as an emotional spark, creating a rhythm of collision and quiet spaces. The centerpiece appears turbulent with flame-like patterns, while edges reflect a maze-like submission, fostering emotional tension. Broken pixels introduce intentional disruptions, enhancing the narrative of struggle and rebellion within a confined space.</desc>
