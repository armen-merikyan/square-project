<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos and Balance</title>
  <desc id="desc">This pixel art conveys emotional tension between 'panic' and 'control' through a juxtaposition of colors and patterns. The palette, including black, electric blue, lime, and magenta, embodies a mechanical emotion, representing the clash of structured control versus chaotic panic. The left side features a stable pattern resembling rain, while the right diverges into a checker pattern, symbolizing fragmentation. The central tension is emphasized by disruptive placements of bright colors against a mostly dark palette, creating a feeling of instability and unpredictability. The imperfect nature of 'broken pixels' enhances the chaos, reinforcing the emotional theme.</desc>
