<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmony of Tension</title>
  <desc id="desc">The emotional tone of this piece captures the interplay between tenderness and rage. The selected palette of deep reds and muted blues reflects this duality, suggesting both explosive energy and calm restraint. The main contrast occurs with the presence of dark jarring pixels interacting with soft blue tonal fields, a representation of interrupted memories, highlights of tenderness breaking through explosive patterns of rage. The layout embraces negative space, allowing quietness to coexist with bursts of color, emphasizing the feeling of collision between the two emotional states.</desc>
