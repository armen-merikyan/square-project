<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This composition embodies the emotional struggle between desire and restraint. The chosen palette of red oxide and muted cream represents the hot intensity of longing, while blackened plum and iron gray suggest the cool, contained nature of restraint. The arrangement creates a dynamic interplay of shadowed regions and bright clusters, reflecting the collision of these emotions. The central bright cluster emerges from a muted background, symbolizing the persistent flicker of desire trying to break through the confines of restraint. This tension is visually expressed through a layered threshold pattern that disrupts the flow, allowing for a narrative of longing and containment.</desc>
