<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Resolution</title>
  <desc id="desc">This artwork embodies the emotional pull between longing and resolve, mirroring an internal battle. The palette combines warm coral and soft amber, representing warmth and a sense of reach, with cold slate and blue-black, giving depth and a feeling of distance. The central arrangement features stripes to evoke longing while stairs symbolize resolve, creating a dynamic tension. The collision occurs in the center where the contrasting patterns interact, disrupted by 'broken pixels' to depict flawed beauty, echoing the idea of repair versus damage. Negative space is intentionally left to allow breathing room between dense clusters, symbolizing unresolved emotion.</desc>
