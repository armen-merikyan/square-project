<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Affection</title>
  <desc id="desc">This artwork conveys the emotional tension between love and betrayal through a structured yet fragmented design. The upper half uses warm colors from the palette—pink and red—representing love with softened contrasts and mirrored patterns. The lower half transitions to darker tones—dark maroon and gray—symbolizing betrayal through a split-screen effect, creating dissonance. The broken edges enhance this theme, suggesting a fractured relationship. Color placement creates a visual echo, where warm tones clash with cold, delivering a narrative that evolves from warmth to emotional chill.</desc>
