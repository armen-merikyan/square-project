<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension between Stillness and Motion</title>
  <desc id="desc">This artwork embodies the emotional contrasts between restlessness and peace. The palette combines soft sky and pale mint to invoke calmness alongside storm gray and near black to suggest movement and tension, creating a visual dialogue. The distribution of colors oscillates in density, with muted fields interspersed with vivid accents representing the chaotic interplay of memories against motion. The central focus is interrupted by broken pixels, representing the scars and disruptions in one’s peace. Main collision occurs diagonally, manifesting as stutters of color that imply both an unsettling rhythm and a strive for stability.</desc>
