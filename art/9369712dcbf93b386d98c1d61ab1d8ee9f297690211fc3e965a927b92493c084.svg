<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This piece captures the tension between the ephemeral bursts of life (spark) and the lingering remnants of past moments (ash). The selected colors reflect that duality: warm browns and greens evoke safety and shelter, while cold whites and pale skins suggest fleeting moments. The arrangement features a hollow center, emphasizing the conflict and interaction between light (spark) and shadow (ash), creating an inward spiral flow that echoes both resilience and fragility. The placement of broken pixels introduces intentional imperfections, enhancing the theme of memory against erasure, while maintaining clear negative space to allow for breath and reflection amidst the tension.</desc>
