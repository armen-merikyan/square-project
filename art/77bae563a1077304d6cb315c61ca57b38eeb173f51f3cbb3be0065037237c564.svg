<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork embodies the emotional battle between rage and calm. The top half represents rage with warm, intense reds and blacks, showing compressed energy with jagged patterns that suggest chaos. The bottom half, in cooler pale blues and whites, contrasts the previous aggression and serves to evoke calmness through smoother, maze-like patterns that feel spacious and even. The main collision occurs at the horizontal divide, creating an unsettling yet engaging juxtaposition that reflects the tension implied by the seed. The broken pixels introduce intentional disruptions, symbolizing moments of overflow and erasure.</desc>
