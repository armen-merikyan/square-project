<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This artwork contrasts the emotional tones of joy and grief. The upper half utilizes warm shades of orange and yellow as a representation of joy, flowing in a wave-like pattern to evoke lightness and openness. The lower half embodies grief through deep blues and muted purples, arranged in a fragmented manner, evoking heaviness and a sense of loss. The stark division symbolizes the conflict between the two emotions, while the use of broken pixels introduces imperfection, enhancing the instability of grief versus the order of joy. Overall, the composition visually narrates a cyclical struggle, drawing on the duality presented in the seed.</desc>
