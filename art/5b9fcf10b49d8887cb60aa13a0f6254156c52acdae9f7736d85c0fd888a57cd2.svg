<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Disarray</title>
  <desc id="desc">The emotional tone reflects the tension between confusion and clarity. The use of dark navy and black provides a grounding base, evoking a sense of quiet amidst chaos. Dim cyan introduces a cool contrast that pulsates against the darker palette, creating visual vibrancy. The checker pattern reflects the confusion while the maze pattern offers moments of clarity. The layout starts from the top-left corner with dark tones dominating, spreading towards lighter and more vibrant colors in an effort to convey the push and pull of emotions, with broken pixels introducing imperfection and highlighting the struggle between symmetry and disruption.</desc>
