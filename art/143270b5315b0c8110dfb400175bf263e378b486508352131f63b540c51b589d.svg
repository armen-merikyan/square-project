<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dual Echo</title>
  <desc id="desc">This composition explores the emotional tension between loneliness and connection through a split vertical layout. The left half embodies loneliness with darker, muted shades—dusty sepia and gray hues creating a sense of isolation and weight. The right side bursts with brighter tan and faded blue accents, symbolizing connection and warmth. The arrangement features stair-like patterns on the left, intersected by dot patterns on the right, creating a visual discussion of hidden versus exposed feelings. The loss of symmetry enhances the concept of imbalance between solitary and communal experiences.</desc>
