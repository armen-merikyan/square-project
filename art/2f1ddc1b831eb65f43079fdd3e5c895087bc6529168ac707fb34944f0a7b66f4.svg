<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Offset</title>
  <desc id="desc">The composition captures the emotional tension between relief and dread through contrasting color arrangements. The warm tones of burnt orange and gold represent moments of relief, symbolized by the broken dots pattern that disrupts the heaviness of dark red and charcoal, embodying dread. The top-weighted edge style emphasizes a push-and-pull dynamic, with denser patterns at the top gradually dispersing towards the bottom, suggesting a transition from dread to possible relief. This arrangement reflects the conflict of emotion, echoing the seed's themes of symmetry and break.</desc>
