<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">The emotional tone reflects the struggle between panic and control, with a palette of warm hues symbolizing vibrancy (yellow and orange) against the cool depths of muted colors (deep blue and muted purple). The left half of the artwork represents panic through radial patterns, creating a sense of chaotic energy, while the right half embodies control using cracks that feel grounded and structured. The main contrasts occur where the warm colors clash with the muted, surrounded by negative space to suggest the feeling of emptiness and echo. This arrangement encapsulates the duality of emotion inspired by the seed, shaping an abstract narrative of oscillation between chaos and stability.</desc>
