<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">The artwork embodies a tension between tenderness and rage, capturing the struggle between soft hues and aggressive contrasts. The palette plays with saturated reds juxtaposed against cool pale blues, illustrating the emotional weight of guilt and forgiveness. The layout emphasizes a vertical split, where the left showcases a soft, stacked pattern that symbolizes tenderness, while the right employs fragmented, violent strokes representing rage. The central collision creates a sense of pressure, suggesting an internal conflict. The use of broken pixels invites an imperfection that resonates with the theme of guilt, producing both a visual and emotional 'bleed' across the section. This promotes a rhythm of quiet moments colliding with explosive bursts, inviting the viewer to navigate the complexity of feelings.</desc>
