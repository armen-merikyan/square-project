<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Echoes</title>
  <desc id="desc">The emotional tone oscillates between the vitality of 'spark' and the somberness of 'ash.' The chosen palette of lime, black, electric blue, and magenta creates a vivid contrast—lime and magenta symbolizing the bursts of energy against the grounding black, evoking the remnants of ash. The main collision occurs in the central rows, where bright, glitchy patterns of 'spark' intersect with the muted halos of 'ash,' demonstrating an interplay of resilience and fragility. Sections of disrupted pixels further emphasize the disruption in memory and continuity, leaving negative space to evoke a sense of longing. This tension, expressed through visual chaos, reflects a narrative of conflict between vitality and decay.</desc>
