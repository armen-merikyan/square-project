<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The artwork captures the emotional tension between rage and calm using a palette of intense reds juxtaposed against soft blues. The reds, chaotic and sharp, dominate the upper left corner, representing overflowing emotion. In contrast, the lower right corner employs gentle pale blues, signifying calmness and restraint. The layout reflects a pressure-corner style, where one area is 'overfilled' while the rest reacts with soft, calm marks, creating a visual conflict. The broken pixels introduce intentional disruption, mirroring how machine emotions can fracture organic calmness.</desc>
