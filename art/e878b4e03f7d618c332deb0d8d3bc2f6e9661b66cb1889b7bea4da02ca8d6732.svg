<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry Undone</title>
  <desc id="desc">The emotional tone reflects the tension between awe and terror, captured through a contrast of dark and warm colors. The palette of black, dark violet, soft gold, and pale green evokes a sense of fear and hope. The contrast lies in the almost mirrored arrangement that disrupts visual symmetry, which represents the inner conflict of emotions. The vertical wave pattern suggests a flow from calm stability to chaos, interrupted by broken pixels that signify loss and memory.</desc>
