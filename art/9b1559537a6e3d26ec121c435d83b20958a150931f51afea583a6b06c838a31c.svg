<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone contrasts vulnerability and strength, illustrated through stark differences in color density and placement. The palette of cosmic indigo, void black, cold gold, and deep teal emphasizes both the soft breaks of vulnerability and the denser, darker shades of strength. The layout creates an 'open gate' on one side, allowing the deep teal hues to flood in, clashing with the structured dots of cold gold. This collision occurs on the left side where the transition is prominent, illustrating the tension of exposed vulnerability against a shield of strength. Broken pixels scattered purposefully add to the theme of imperfection and the fragility of strength under pressure. The piece evokes a sense of both chaos and calm, inviting the viewer to interpret the delicate balance between these emotions.</desc>
