<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This composition reflects the emotional duality of joy and grief through a contrasting palette of vibrant yellows and muted blues. The yellow tones rise in a split-screen layout, symbolizing joy as they emphasize hope and brightness. Beneath, deeper blues symbolize the heaviness of grief, anchoring the emotion. The collision occurs between the rising warmth of yellow and the descending weight of blue, creating a rhythmic wave effect, suggesting a dynamic push-pull in emotional experience. The jagged edges create a fractured yet cohesive narrative, embodying the intertwining chaos and order of human feelings.</desc>
