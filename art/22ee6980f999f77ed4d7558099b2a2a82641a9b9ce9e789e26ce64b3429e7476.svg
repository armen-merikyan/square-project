<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This composition explores the interplay between quiet and pressure, embodying the tension between muted tranquility and overwhelming force. The palette includes off-white and dust gray for quiet fields, contrasted with compressed red and dark navy, which evoke intensity and pressure. The main collision occurs in the diagonal flow, where ladder patterns of red break against softer ash fields, encapsulating the tension of sharp vs. soft edges. The 4x4 center conveys a sense of calm that is disrupted toward the edges, creating an emotional narrative that resonates with the seed's themes.</desc>
