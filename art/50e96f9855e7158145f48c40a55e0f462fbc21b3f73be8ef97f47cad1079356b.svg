<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Darkness</title>
  <desc id="desc">The emotional tone contrasts joy's vibrant warmth against grief's heavy restraint. The palette—bright yellows and oranges clash with muted blues and purples—visually represents the struggle between weight and levity. The layout splits the canvas vertically, with joyful noise on the left and grieving frames on the right, enhancing the sense of tension. Collisions occur where the boundaries blur, suggesting motion and interplay. The zigzag pattern in blocked pixels introduces a notion of disrupted order, mirroring chaos amid rising signals.</desc>
