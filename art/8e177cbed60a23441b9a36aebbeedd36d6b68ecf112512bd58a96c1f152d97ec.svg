<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone oscillates between longing and containment, where the desired warmth is caught against a boundary of muted restraint. The selected palette features hot coral and blood orange to represent desire's pulse, while charcoal and hollow blue introduce calming yet constraining elements. The main contrast arises in the bottom left corner, where saturated colors clash with muted tones, illustrating a push against the sealed edges—a metaphor for desire reaching towards unattainable freedom. This arrangement, inspired by the seed, creates an abstract collision of emotions that shifts from vibrant saturation to quietude, suggesting an internal struggle.</desc>
