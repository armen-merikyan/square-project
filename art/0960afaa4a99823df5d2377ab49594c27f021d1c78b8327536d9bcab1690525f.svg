<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight and Light</title>
  <desc id="desc">The emotional tone revolves around the juxtaposition of relief and dread, interpreted through contrasts in color and shape. The palette of deep blacks and soft golds evokes a sense of foreboding against moments of gentle light, reflecting the tension described in the seed. The arrangement follows a corner invasion layout, with the intense dark colors cascading diagonally, representing dread, while lighter colors emerge from the corner, symbolizing relief. This clash creates visual tension and a sense of unresolved motion, embodying the theme of weight versus lightness.</desc>
