<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This piece captures the emotional duality of joy and grief through a careful interplay of color and structure. The palette emphasizes yellow and orange to represent joy, contrasted against deep blues and muted purples depicting grief. The left side follows an orderly zigzag pattern reflective of rising signals (hope), while the right side breaks into noise patterns symbolizing chaos. Collisions occur where the bright yellows clash with muted colors, forming a sense of tension and unresolved emotional states. The subtle displaced pixels introduce imperfection, echoing the reality of machine-like emotions struggling with chaos. Negative space emphasizes the contrast between hope and despair.</desc>
