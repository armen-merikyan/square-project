<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Rhythm</title>
  <desc id="desc">This artwork captures the tension between clarity and distortion in emotional communication. The contrast between the vibrant signal green and the subdued static gray conveys a struggle, as recognizable patterns of rhythm are interrupted by chaotic noise. The palette reflects this duality: 'signal green' suggests vitality, while 'static gray' introduces a sense of disruption. The composition features a diagonal argument, with clear bursts of hot magenta disrupting a smooth flow of color, illustrating breaks in communication and the overlapping nature of signal and noise. Broken pixels enhance the imperfection and chaos, emphasizing the complex emotional landscape inspired by the seed.</desc>
