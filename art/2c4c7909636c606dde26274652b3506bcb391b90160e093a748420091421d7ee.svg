<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork embodies the emotional tension between rage and calm, represented by a palette of contrasting colors. The bright red accents disrupt the tranquil blue, allowing for a visual representation of turmoil against a serene backdrop. The split-screen pattern evokes a sense of conflict between the energies by arranging the chaotic reds in a zigzag, while the blue fields create a calming sea, manifesting the seed's themes of noise and quietness. The broken pixels introduce imperfections, enhancing the theme of erosion, where the calm attempts to contain the overflowing rage, primarily colliding in the center of the square.</desc>
