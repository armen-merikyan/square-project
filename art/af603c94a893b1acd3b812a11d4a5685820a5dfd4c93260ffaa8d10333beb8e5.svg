<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Emotions</title>
  <desc id="desc">This piece reflects a tension between envy and gratitude, using a palette of deep navy and black contrasted with vibrant dim cyan and white. The diagonals illustrate 'corner invasion,' with heavy dark colors battling lighter ones, signifying emotional weight. Stripes representing envy and checker patterns for gratitude interact, suggesting an ongoing collision of feelings. The broken pixels introduce intentional imperfections, encapsulating the notion of a fractured perspective and mirroring the emotional struggle, allowing for a defined center amidst the noise.</desc>
