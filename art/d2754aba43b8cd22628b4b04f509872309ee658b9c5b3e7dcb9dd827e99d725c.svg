<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Light and Weight</title>
  <desc id="desc">The artwork represents the emotional tension between fear and hope through a distinct split layout. The top four rows embody fear with darker tones and a target pattern, displaying compression and jagged edges, while the bottom four reflect hope with softer golds and pale greens arranged in a stair-like ascent, suggesting upward movement. The center contrast occurs at the vertical split, where dark colors meet luminous accents, embodying the interplay of light and weight. Broken pixels echo the imperfections of emotion, providing an element of unpredictability.</desc>
