<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory in Motion</title>
  <desc id="desc">The emotional tone is represented through a collision of warm reds symbolizing rage and cool blues representing tenderness. The palette uses deep blacks for contrast, while soft pale blues provide a quiet space within the tension. The main collision occurs diagonally, with jagged red patterns cutting into gentle blue layers, creating interrupted moments of intensity. This represents the push-pull dynamic of the seed, where tenderness struggles against the overwhelming force of rage, echoing the concept of 'inside vs outside'. The layout and edge style reinforce the emotional dichotomy, giving it structure while allowing for delicate disruptions throughout the piece.</desc>
