<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition embodies the emotional tension between desire and emptiness through the interplay of warm and cool tones. The palette, featuring saturated colors like hot coral and blood orange, reflects the warmth of unfulfilled longing, while the hollow blue and charcoal provide a grounding coolness representing emptiness. The main collision occurs along the central axis, with warm colors swirling outward while cool stripes disrupt their flow, creating a sense of push and pull, much like the struggle of desire against restraint. This layout of 'mirror_broken' enhances the feeling of duality, with displacements heightening the interaction between the two emotions.</desc>
