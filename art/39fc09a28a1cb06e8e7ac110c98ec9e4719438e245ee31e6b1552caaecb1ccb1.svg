<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">The emotional tone reflects the tension between trust, represented through softer hues and warmer colors, and suspicion, depicted with darker and more fractured tones. The palette is chosen for its contrast: the pale mint and soft sky suggest warmth and reassurance, while storm gray and near black introduce an element of unease. The collision predominantly occurs on the central vertical seam, where the warm and cool tones battle in a diagonal cascade, resembling stair steps that ascend from darkness to light. The use of broken pixels adds intentional disruptions, symbolizing uncertainty and complexity in relationships, reinforcing the abstract story of navigating trust amidst suspicion.</desc>
