<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Colors</title>
  <desc id="desc">This composition encapsulates the emotional tension between restlessness and peace. The palette, featuring burnt orange and dark red, evokes warmth and energy, while charcoal and gold introduce calm and light, representing peace. The layout creates a spiraling flow, with warm colors coiling inwards and sharper dark hues edging out, highlighting the contrast. The broken pixels disrupt the patterns, creating echoes of chaos amidst the structured flow, indicative of 'flame against shatter'. The central clash of colors captures the essence of 'diagonal argument', where both emotions collide yet coexist.</desc>
