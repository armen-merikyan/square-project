<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotions</title>
  <desc id="desc">This abstract artwork conveys the tension between tenderness and rage through its color choices and arrangement. The dominant deep red (#ff4444) conveys the intensity of rage, dominating the central area. Surrounding this, cooler and paler colors like pale blue (#88ccee) and white (#ffffff) intersperse to introduce gentleness and calm. This juxtaposition reflects emotional complexity. The hard edges of the dark colors create contrast against more muted tones, embodying the conflict between internal and external emotional landscapes. The broken pixels act as intentional scars contrasting the smooth transitions of the more tender colors, highlighting imperfections inherent in emotional experiences.</desc>
