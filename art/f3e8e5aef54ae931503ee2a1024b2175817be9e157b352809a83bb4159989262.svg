<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork represents the tension between control and surrender using color interplay. The deep olive and acid green evoke a sense of underlying pressure, reflecting control, while the softer cream and honey gold introduce gentle yields of surrender. The layout centers around a dense cluster, interrupted by lighter tones that suggest quiet moments, implying emotional overflow amid restraint. Broken pixels create intentional disruptions, giving the piece a sense of unresolved motion, akin to a fluctuating battle between tensions. The collision occurs in the center, where density meets openness, capturing the core of the emotional narrative.</desc>
