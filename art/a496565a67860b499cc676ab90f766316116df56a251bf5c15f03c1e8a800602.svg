<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dual Waves</title>
  <desc id="desc">The emotional tone of this piece juxtaposes joy and grief through a contrasting palette of warm yellows and muted purples. The top half features lighter colors representing joy, while the bottom half blooms in deeper shades indicating grief. The layout emphasizes a symmetrically broken mirror, invoking feelings of tension and release. The visual flow resembles waves, creating fluid movement across the square. The edge style is jagged to enhance the feelings of interruption and collision between the bright and muted colors, suggesting turmoil layered upon joy. The use of a few broken pixels skews perfect symmetry and introduces imperfection, embodying the ongoing struggle between these emotions.</desc>
