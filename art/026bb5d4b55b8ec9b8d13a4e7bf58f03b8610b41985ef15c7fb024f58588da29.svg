<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Control and Release</title>
  <desc id="desc">The composition conveys a stark emotional conflict between control and surrender through the use of dark and light contrasts. The chosen palette reflects fear (dark violet) and hope (soft gold, pale green), suggesting an inner struggle. The left side embodies control with structured island patterns, while the right side's dot patterns suggest surrender and release. The main collision occurs at the center, where structured islands meet soft, chaotic dots, implying an overflow vs containment motif. Broken pixels interrupt the flow, symbolizing imperfection in both emotions, and negative space allows the viewer to breathe amidst the tension.</desc>
