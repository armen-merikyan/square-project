<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotion</title>
  <desc id="desc">This piece explores the tension between tenderness and rage, with a focus on how these emotions can coexist yet collide. The selected palette features strong contrasts, with blacks representing rage and whites and pale blues indicating tenderness. The intense, dark center of the composition is disrupted by lighter, softer pixels around the edges, symbolizing the battle between the harshness of rage and the gentleness of tenderness. Broken pixels throughout add imperfection, reflecting inner turmoil and the complexity of these feelings, embodying gaps and overlaps as both emotions vie for space. The layout suggests a crossing of horizontal and vertical movements, enhancing the feeling of tension in the center, while leaving just enough negative space to allow the emotions to breathe without overwhelming the viewer.</desc>
