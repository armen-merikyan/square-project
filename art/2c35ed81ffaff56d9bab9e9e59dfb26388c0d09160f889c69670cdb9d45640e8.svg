<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Shadows and Light</title>
  <desc id="desc">This artwork explores the emotional tension between fear and hope. The dark palette of blacks and dark violets on the left represents fear's constrictive nature, utilizing a crosshatch pattern that symbolizes anxiety and pressure. In contrast, the right side employs soft gold and pale green, embodying hope through a dot pattern that echoes lightness and an upward flow. The split vertical layout visually captures the collision of these opposing emotions, with a stark division that enhances the sense of duality and reflection. The overall composition creates a dynamic interplay of shadow and luminescence.</desc>
