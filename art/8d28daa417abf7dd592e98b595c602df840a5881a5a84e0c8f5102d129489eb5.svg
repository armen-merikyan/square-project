<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Echoes of Safety</title>
  <desc id="desc">This piece captures the emotional tension between safety and exposure, with a soft central area representing vulnerability surrounded by jagged edges as a protective barrier. The colors mirror this contrast: shelter green and warm brown signify safety while pale skin and open blue represent exposure. The collision occurs predominantly along the center, where the sharp edges of the frame interlace with softer tones, illustrating the dynamic interplay of pressure and release. The use of broken pixels enhances the feeling of imperfection and disruption, suggesting a reality that is defined by both protection and fragility.</desc>
