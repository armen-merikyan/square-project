<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork explores the emotional tension between rage and calm through a contrast of vibrant reds and soothing pale blues. The layout pushes warm colors into a corner, suggesting an overflow that disrupts the tranquil horizontal patterns of blue and white. The inclusion of darker hues adds depth, creating an undercurrent of noise with orderly lattice forms being invaded by chaotic glitch disruptions, embodying the conflict of containment versus explosiveness, resulting in an abstract narrative of emotional collision and containment.</desc>
