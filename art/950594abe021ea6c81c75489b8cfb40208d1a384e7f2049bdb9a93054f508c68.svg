<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Ignite and Fade</title>
  <desc id="desc">The emotional tone is built around the dichotomy of 'spark' representing ignition and energy, contrasted against 'ash' symbolizing decay and quietude. The palette, inspired by cosmic indigo and cold gold, evokes a sense of awe and fragility, with accentuating colors like star white and deep teal bringing vibrancy amidst the muted ash tones. The primary contrast occurs at the center, where jagged patterns of warmth vie for space against a backdrop of faded, cool tones, representing memory and erasure. This layout creates a push-pull dynamic, invoking feelings of tension and release, echoing the abstract nature of the seed.</desc>
