<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone of this piece captures the delicate balance between vulnerability and strength, with a central dense cluster juxtaposed against light negative space. The chosen palette of navy, black, single white, and dim cyan reflects solitude and quiet intensity, offering a stark contrast to emphasize the tension. The main collision occurs in the center where strong, dense colors meet the more subtle, nearly empty spaces, symbolizing the ongoing negotiation between exposure and protection. The patterns of stacked vulnerability surround a stable core, creating a visual braid that echoes the emotional complexity of the seed.</desc>
