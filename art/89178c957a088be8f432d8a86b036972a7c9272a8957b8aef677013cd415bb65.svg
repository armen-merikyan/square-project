<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">The emotional tone reflects the duality of joy and grief, each captured through contrasting color fields. The palette combines bright yellows and oranges to symbolize joy, against muted purples and deep blues representing grief. The layout's jagged edges create a visual tension that mirrors the conflict of emotions—safe vs threatened—where one side feels welcomed and the other side is more chaotic. The patterns shift across the canvas, with stripes in joyful tones interrupted by fragmented frame patterns of grief. This collision creates a dense emotional landscape, emphasizing the push and pull between the contrasting states. The design adheres to the mirror-broken layout with slight deviations, symbolizing the inherent imperfections in emotional experiences. A 10% negative space is preserved at the center to suggest the complexity of navigating these feelings.</desc>
