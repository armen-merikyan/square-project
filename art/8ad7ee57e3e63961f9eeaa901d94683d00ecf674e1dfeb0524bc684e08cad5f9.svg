<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tension</title>
  <desc id="desc">This artwork captures the clash between panic and control through jagged edges and an interplay of colors where dense hues represent chaos while lighter shades signify calm. The black and white contrast evokes the struggle of feeling trapped inside a room, with sparks of pale blue representing fleeting moments of hope or clarity. The arrangement flows from a corner, suggesting invasion by anxiety, while maintaining a slight negative space to depict moments of control amidst turmoil. Colors collide sharply, primarily between dark and light, creating a rhythm of emotional push and pull.</desc>
