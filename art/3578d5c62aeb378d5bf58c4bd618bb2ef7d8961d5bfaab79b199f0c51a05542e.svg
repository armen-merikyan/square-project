<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">This composition explores the emotional tension between longing and resolve through contrasting patterns and colors. The left side, representing longing, uses green and brown stripes to evoke a sense of reaching out, while the right side embodies resolve with a halo effect in pale skin and cold white, suggesting stability and strength. The distinct separation offers a quiet field, interrupted by imperfect pixels, visualizing the 'repair_vs_damage' theme, reflecting the delicate balance between hope and disappointment. The central collision between the soft white halo and the muted green of longing accentuates this emotional interplay.</desc>
