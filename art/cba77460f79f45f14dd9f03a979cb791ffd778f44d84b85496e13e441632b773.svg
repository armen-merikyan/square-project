  <title id="title">Tension in Duality</title>
  <desc id="desc">This artwork encapsulates the emotional tension between trust and suspicion through contrasting textures and colors. The selected palette of moss green and bone white as the predominant hues evokes a sense of resilience, while accents of rust and stone gray introduce the shadowy depths of suspicion. The layout follows a quiet channel structure, where a dense field of colors aligns against a narrow line of negative space, enhancing the idea of pressure meeting a calm border. The diagonal flow and intentional broken pixels introduce a sense of disruption, symbolizing the fragile balance between two emotional states.</desc>
