<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Tension</title>
  <desc id="desc">The emotional tone of this piece reflects the tension between softness and severity, illustrated through the use of warm and cool colors that collide and intertwine. The chosen palette of powder pink, warm white, and accents of sharp crimson against stark carbon black creates a balance of warmth and severity. The arrangement features a spiral layout with radial flows in soft areas and sharp stair patterns in severe ones, contributing to a central collision where warmth and confinement meet. This reflects feelings of guilt and forgiveness, signaling an underlying complexity in emotional experiences. Negative space is preserved to signify vulnerability amidst weight.</desc>
