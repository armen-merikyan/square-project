<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetric Disruption</title>
  <desc id="desc">This abstract piece represents the tension between awe and terror through color contrasts and spatial dynamics. The palette mixes vibrant lime and electric blue with the starkness of black and magenta to evoke a powerful emotional landscape. The outer border employs a grid pattern, reflecting a structured framework, while the inner core oscillates with flame-like irregularities, symbolizing chaos and release. The layout emphasizes the contrast of stability and disruption, creating a visual dialogue of collision between structured awe and chaotic terror, and maintaining a sense of necessary negative space to prevent overwhelming density.</desc>
