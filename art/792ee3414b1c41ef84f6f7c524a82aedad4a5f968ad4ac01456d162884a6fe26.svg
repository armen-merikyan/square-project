<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Change</title>
  <desc id="desc">The emotional tone captures the struggle between nostalgia and progress, presented through a split horizontal layout to emphasize this dichotomy. The palette—rich pinks and dark maroons—represents warmth intertwined with the weight of darker emotions, symbolizing both love and betrayal. The top half ('nostalgia') features a stepped pattern that recalls memories, reflecting stability, while the bottom half ('progress') is filled with broken dots suggesting erratic movement and change. The main collision occurs between the structured, warm tones of nostalgia and the cooler, fragmented elements of progress that drip downward, evoking a sense of tension and anticipation.</desc>
