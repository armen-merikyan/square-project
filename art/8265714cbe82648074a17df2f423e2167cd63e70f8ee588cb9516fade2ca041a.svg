<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs. Chaos</title>
  <desc id="desc">This piece captures the emotional tension between calm and rage. The chosen palette of deep red, black, pale blue, and white reflects a struggle between explosive energy and serene clarity. The left side exhibits a calm pattern where cool tones flow softly, while the right side erupts in sharp, jagged red contrasts that create a discordant right. The hard edges enhance the sense of conflict, while the intentional placement of broken pixels signifies imperfection and adds to the chaotic feel. The emotional chaos is mirrored but interrupted, suggesting a collision that invites contemplation.</desc>
