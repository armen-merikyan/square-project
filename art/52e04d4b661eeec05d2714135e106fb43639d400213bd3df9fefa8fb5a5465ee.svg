<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Island of Static</title>
  <desc id="desc">The emotional tone of this piece reflects the conflict between a clean pulse of signal and the chaotic noise surrounding it. I chose a palette dominated by deep navy and black to convey the weight of noise, contrasted with vibrant accents of dim cyan and white signifying clarity. The main collision occurs in the center where the echo (signal) disrupts the surrounding chaotic field (noise). The abstract arrangement results from visualizing dense clusters of activity juxtaposed against quieter regions, embodying the metaphor of an island of calm amidst sea turbulence.</desc>
