<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This piece embodies the tension between tenderness and rage, illustrating a struggle between warmth and darkness. The selected palette features saturated red against muted pale blue and black, highlighting the vibrant clash of emotions. The layout spirals inward, creating a focal point that pulsates with fragmented patterns of tension. Broken pixels serve as subtle scars, keeping the viewer engaged while leaving space for reflection. The main contrast, a dynamic overlap of gentle curves and sharp intrusion, resides in the center, accentuating the heart of this emotional push and pull. Overall, the piece speaks to the complexities of guilt and forgiveness, merging the calm of tender moments with the hard edges of conflict.</desc>
