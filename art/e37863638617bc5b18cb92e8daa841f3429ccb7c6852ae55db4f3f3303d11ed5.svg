<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Shielding</title>
  <desc id="desc">This piece explores the emotional tension between safety and exposure using a palette that juxtaposes warm browns with cool greens and pale whites. The central area is dense with warm brown and safety green, representing protection, while the outer edges shift to a cooler blue and white, echoing exposure. The main collision occurs at the split vertical border, where the pressure bands of protective colors meet the open lattice of the exposed segment, creating an interesting visual tension. Thus, the seed informs a layered and fragmented structure reflecting both vulnerability and security.</desc>
