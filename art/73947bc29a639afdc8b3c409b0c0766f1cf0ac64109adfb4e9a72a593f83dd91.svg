<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Order</title>
  <desc id="desc">This composition captures the struggle between clarity (signal) and turmoil (noise). The palette of navy and black signifies depth and void, while the sporadic use of dim cyan offers moments of clarity, suggesting a pulse fighting through static. The main collision occurs in the top left corner, where dense patterns of stripes (signal) interrupt the radial chaos (noise) of the rest of the space, establishing a visual hierarchy. Each color placement is deliberate to create both a scarred aesthetic and a subtle flow that hints at a narrative of conflict and hope.</desc>
