  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This abstract piece explores the tension between vulnerability and strength through a contrasting color palette and layout. The selected colors of ripe green, honey gold, and deep olive provide depth and warmth, while pale cream emphasizes fragility. The pattern of dots indicates vulnerability, intermingling with strong halos that signify resilience. The central collision between the two emotional states creates a rhythmic push-pull, symbolizing the delicate balance between exposure and protection.</desc>
