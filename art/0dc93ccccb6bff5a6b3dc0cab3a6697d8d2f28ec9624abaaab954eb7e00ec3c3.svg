  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the tension between restlessness and peace, expressed through a contrasting palette of warm corals and cool slates. The central area is heated with warm colors representing restlessness, while the periphery fades into cool tones, encapsulating peace. The arrangement of colors creates an interrupted flow, with a dominant warm section colliding with cooler hues, suggesting movement and stillness interspersed across the canvas. The broken pixels serve as intentional disruptions, adding texture and a sense of imperfection, mirroring the emotional complexity of memories that clash with a yearning for tranquility.</desc>
