<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">The emotional tone captures a balance between 'longing' (represented by cooler colors) and 'resolve' (warmth from energizing hues). The palette of shelter green, warm brown, pale skin, cold white, and open blue emphasizes emotional depth, reflecting both safety and exposure. The collision occurs centrally, where patterns of longing (broken frame) and resolve intermingle, creating a stark contrast against a quiet background, embodying the struggle between chaos and order. The halo void layout enhances this interplay by defining edges while leaving negative space that reflects distance and intimacy.</desc>
