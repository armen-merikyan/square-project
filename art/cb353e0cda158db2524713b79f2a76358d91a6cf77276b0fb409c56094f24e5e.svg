<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The emotional tone juxtaposes 'desire' and 'restraint.' The bright and hot colors symbolize desire, while the muted tones embody restraint. The palette mixes saturated reds and oranges for warmth with cooler grays and creams for containment, creating a visual conflict. The upper rows are dominated by saturated colors, representing an overwhelming push, while the lower rows introduce muted tones, capturing a sense of restraint and boundary. The primary contrast occurs at the center, where bright and muted collide and intertwine, forming a diamond-like tension across the square.</desc>
