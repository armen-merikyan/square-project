<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tones</title>
  <desc id="desc">This composition evokes the emotional tension between softness and severity through color placement and dynamics. The palette integrates powder pink and warm white that signify softness against the grounding presence of carbon black and steel gray, representing severity. The arrangement features a heavy central density gradually releasing outward, creating an overflow that reflects the clash between containment and release, while broken pixels disrupt predictability, adding layers of texture and depth. The main collision is centrally located, where vibrant colors contend against cooler surroundings, suggesting a pulse of emotional energy against a backdrop of restraint.</desc>
