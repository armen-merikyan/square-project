<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shelter and Exposure</title>
  <desc id="desc">The emotional tone conveys the tension between safety and exposure, with soft earthy tones representing shelter and a pale center symbolizing vulnerability. The palette features warm brown and shelter green as dominant colors, creating a sense of warmth and enclosure. The contrast between these warm hues and a stark cold white background illustrates an echo of invasion, where excess pressure is felt in the edges. Main collisions occur at the center, where dense dots disrupt the soft ash field pattern, fostering a sense of tension and flickering movement. This interplay reflects the complexities of protection and vulnerability shaped by the seed.</desc>
