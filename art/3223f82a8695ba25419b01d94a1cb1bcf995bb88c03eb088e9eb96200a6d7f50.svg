<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Weight and Lightness</title>
  <desc id="desc">This artwork represents the emotional struggle between defiance and submission, using a palette that evokes both fear and hope. The black and dark violet create a heavy, bottom-weighted presence, while the soft gold and pale green introduce moments of lightness and hope. The central focus softly contrasts with the darker edges, resembling a struggle for liberation. The split-screen pattern reflects the duality in the seed's emotional score, illustrating a wave-like flow from left to right, culminating in a sense of unresolved tension and release. The presence of broken pixels suggests imperfections and the chaos of emotions, enhancing the abstract storytelling of colliding feelings.</desc>
