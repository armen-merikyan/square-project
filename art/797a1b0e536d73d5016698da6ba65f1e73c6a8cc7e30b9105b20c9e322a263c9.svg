<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Disarray</title>
  <desc id="desc">This piece explores the tension between confusion and clarity using a palette that juxtaposes deep blacks, whites, and pale blues. Each color offers an emotional counterpoint, with black grounding the chaotic energy of pale blue. The random placements of darker colors create collisions against lighter hues, symbolizing thoughts that clash amidst a swirl of clarity and confusion. The dynamic arrangement evokes a sense of falling pixels that reflects the idea of centers and edges with thicker outlines, resulting in a layered and complex yet abstract narrative.</desc>
