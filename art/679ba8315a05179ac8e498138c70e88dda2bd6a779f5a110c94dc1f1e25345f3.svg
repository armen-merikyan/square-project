<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">The emotional tone captures the dichotomy of joy and grief through a fluid arrangement of warm and cool colors. The palette of yellow, orange, muted purple, and deep blue embodies the lifting warmth of joy clashing with the somber tones of grief. The sharp vs. soft contrast creates tension where bright yellow and orange flame-like hues burst against muted purples and deep blues that evoke weight and depth. A rising signal layout suggests an upward struggle from grief towards joy, while interruptions in the pattern evoke hidden emotions, leaving some negative space to highlight the unresolved feelings beneath the surface.</desc>
