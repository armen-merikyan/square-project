<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Transformation</title>
  <desc id="desc">This artwork captures the tension between nostalgia and progress by using a palette of muted pinks and deep maroons, embodying warmth and weight. The top half features lighter tones—representing nostalgia—gradually descending to darker, heavier shades—symbolizing progress and its associated burdens. The asymmetry in color placement creates an emotional collision at the center, where the lighter colors drip down into the darker hues, suggesting the inevitability of change while maintaining echoes of the past. The burned edges give a sense of imperfection, resonating with the idea of fragmented memories.</desc>
