<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Heartbeat</title>
  <desc id="desc">This piece conveys the discord between love and betrayal through a carefully structured contrast. The palette of pinks and grays suggests warmth plagued by uncertainty, representing love's embrace tainted by betrayal. The outer border reflects order with vertical stripes symbolizing love, while the inner 4x4 area introduces chaotic patterns with dark maroon, suggesting cracks in the façade. The placement of brighter pixels against muted ones creates tension, symbolizing rising emotions clashing with a backdrop of calm. The choice of broken pixel placements further amplifies the idea of imperfection in relationships.</desc>
