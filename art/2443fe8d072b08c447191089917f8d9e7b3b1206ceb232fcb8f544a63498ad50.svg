<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Exposure</title>
  <desc id="desc">This composition contrasts vulnerability and strength through a soft honey-gold center surrounded by deep olive and ripe green edges, suggesting a protective frame around an exposed core. The checker pattern represents vulnerability, creating a thin shell encasing a pale interior, while the fault line pattern signifies strength with dense, uneven distribution. The central contrast occurs at the heart of the square, where the two patterns collide and interact, echoing the emotional tension outlined in the seed. The use of broken pixels introduces imperfection, enhancing the narrative of exposure and shelter, while the negative space frames the contrasting elements, allowing the composition to breathe.</desc>
