  <title id="title">Tension of Patterns</title>
  <desc id="desc">The artwork captures the emotional struggle between longing and resolve, visualized through a layered composition using warm burnt orange and dark red against a backdrop of charcoal. The main contrast occurs in the central area, where the densely packed crosshatch representing resolve collides with the sparking interruptions of longing, creating an energetic push-and-pull dynamic. Broken pixels introduce intentional disruptions, evoking a sense of imperfection that relates to the emotional narratives embedded in the seed.</desc>
