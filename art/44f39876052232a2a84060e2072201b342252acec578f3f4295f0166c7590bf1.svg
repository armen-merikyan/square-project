<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension &amp; Release</title>
  <desc id="desc">This piece captures the emotional duality of defiance and submission through hard-edged contrasts. The left half, representing defiance, features bold, dark colors, creating a dense, oppressive feel, while the right half suggests submission with softer, lighter hues that evoke a sense of easing. The vertical split aligns with the narrative of conflict, emphasizing the collision of intense emotions. The bottom-weighted layout enhances this by suggesting a struggle to uplift. Broken pixels provide an imperfect rhythm that echoes the tension of love and betrayal within the palette chosen: dark violet and soft gold interplay to signify hope against despair.</desc>
