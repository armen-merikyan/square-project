<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This composition embodies the emotional duality of love and betrayal through color juxtaposition and spatial tension. The top four rows explore the warmth and unity associated with love, using soft hues of pink and red to create the target pattern, suggesting connection and intimacy. In contrast, the bottom four rows represent betrayal with a cooler gray and dark maroon palette, employing a stair-like structure that implies fragmentation and disintegration of trust. The sharp vs. soft contrasts manifest clearly here, where soft tones meet hard edges, creating a visual echo of the inner turmoil suggested by the seed. The use of broken pixels introduces an element of imperfection, symbolizing the unpredictability of relationships, while the flow from top to bottom signifies a descent from warmth to coldness, mimicking the emotional journey.</desc>
