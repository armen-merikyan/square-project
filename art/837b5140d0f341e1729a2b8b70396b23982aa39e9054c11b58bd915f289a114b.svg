<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Resolve</title>
  <desc id="desc">This artwork embodies the emotional clash of defiance and submission through contrasting elements. The warm tones of honey_gold and ripe_green represent defiance, standing strong against the coolness of deep_olive, which symbolizes submission. The layout emphasizes a stark halo around a quieter central area, echoing a protective or confrontational stance. The pattern of the grid reflects order, disrupted by subtle displacement in the frame - reminiscent of a glitch. The sparse insertions of broken pixels add an element of imperfection, enhancing the sense of conflict and tension. The negative space serves to amplify the emotions, leaving room for contemplation amid the chaos.</desc>
