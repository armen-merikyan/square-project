<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaotic Harmony</title>
  <desc id="desc">The emotional tone reflects the duality of awe and terror, showcased through contrasting patterns of radial for terror and flame for awe. The palette, drawn from the 'ancient_fire' theme, employs burnt orange and dark red to evoke warmth yet discomfort, grounded by charcoal in the edges, suggesting an underlying chaos against stability. The arrangement features a stark contrast in density, with brighter colors placed in central rows, denoting the core of awe, surrounded by darker dots representing fractured memory and terror, suggesting a tension between two forces. As the colors flow diagonally, they create visual waves, echoing the instability of emotions that fluctuate within the confines of an ordered space, leaving negative space to enhance the feeling of unease and anticipation.</desc>
