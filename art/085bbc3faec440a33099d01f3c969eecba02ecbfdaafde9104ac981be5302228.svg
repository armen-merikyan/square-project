<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This artwork conveys the emotional tension of pressure against quietude through a contrasting palette of dark navy and faint peach. The palette was chosen to evoke a sense of heavy density (dark navy) meeting light, airy spaces (faint peach). The central collision occurs in the diagonal distribution of densely packed colors in the top left, contrasting with the remaining lighter hues that suggest clarity and confusion. The glitch pattern introduces element of disruption, while the pressure band creates rhythmic softness. The overall structure emerges from the interactions inspired by the seed, mimicking a feeling of being trapped yet longing for release.</desc>
