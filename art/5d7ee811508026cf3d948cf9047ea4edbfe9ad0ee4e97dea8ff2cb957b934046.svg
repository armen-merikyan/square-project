<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmony in Dissonance</title>
  <desc id="desc">The emotional tone combines restlessness and peace, captured through the tension of contrasting colors. A muted navy and dim cyan represent calm and serenity, while black introduces an element of unrest and shadow. The main collision occurs in the center where the black overlaps with navy, fragmenting into patches of lighter tones, suggesting memory and movement. The repetitive patterns of echo and mirror create an unsettling rhythm, enhancing the theme of motion against stillness while leaving strategic empty spaces to prevent overwhelming chaos.</desc>
