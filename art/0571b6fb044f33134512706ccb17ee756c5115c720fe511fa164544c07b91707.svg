<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Balance</title>
  <desc id="desc">This composition embodies the emotional tension between love and betrayal through stark contrasts. The left side, reflecting love, utilizes warm pinks and reds arranged in a dynamic crosshatch pattern that evokes warmth and connection. The right side, representing betrayal, features cool grays and dark maroons in a hard-edged stair pattern, suggesting distance and conflict. The burned edges provide a sense of imperfection, highlighting the emotional fractures within the artwork. The negative space encourages reflection, allowing emotions to resonate without being overwhelming.</desc>
