<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Resolution</title>
  <desc id="desc">The emotional tone here contrasts between longing and resolve, showcasing a struggle between stretched diagonals of desire and solid pillars of strength. The palette of cosmic indigo and void black suggests depth and mystery, while the cold gold and star white add moments of brightness—reflecting hope and aspiration. The dominant diagonal flow initiates from the top left corner, representing longing, gradually intertwining and colliding with dense clusters of resolve towards the bottom right, encapsulating the tension between chaos and order. Broken pixels throughout signify fragile moments in the journey, underscoring the tumultuous nature of desire and stability.</desc>
