<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Pulses</title>
  <desc id="desc">This artwork embodies the tension between desire and emptiness through color and placement. The warm coral and blood orange represent the fervent energy of desire, creating a 'pulse' effect that draws attention to the center. In contrast, the charcoal and hollow blue hues articulate a sense of emptiness and restraint, forming a quiet perimeter that holds the chaos within. The central collision of these colors at the heart of the square evokes an ongoing struggle, showcasing the push and pull of feelings toward fulfillment. Broken pixels introduce intentional disruptions, symbolizing the imperfections in pursuit.</desc>
