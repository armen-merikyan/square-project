<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow and Containment</title>
  <desc id="desc">The emotional tone captures the tension between rage and calm, represented through a palette of red and pale blue, symbolizing heat and tranquility. The sharp red pixels (rage) densely occupy the center, while cooler blue tones (calm) attempt to frame and contain them, manifesting control and struggle. The opposing patterns—maze and teeth—collide at the center, illustrating an intense emotional battle. Broken pixels introduce disruptions, suggesting scars from this confrontation, while the layout focuses the heat inward—a central core of intensity against the backdrop of cooling calm.</desc>
