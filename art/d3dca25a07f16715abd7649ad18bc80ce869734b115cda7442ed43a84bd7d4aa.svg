<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Fields</title>
  <desc id="desc">This composition channels the emotional dichotomy of longing and resolve through a layout that embodies emptiness and fullness. The cosmic indigo and cold gold represent the yearning for connection, while void black and deep teal symbolize containment and strength. The main contrast occurs along the center, where stripes of resolve overlap with fields echoing the feeling of longing. The intended disarray of broken pixels introduces imperfections, embodying the struggles inherent in achieving balance. The overall arrangement tells a story of desire pushing against the boundaries of resolution.</desc>
