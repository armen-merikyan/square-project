<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Distress</title>
  <desc id="desc">The emotional tone oscillates between confusion and clarity, driven by a palette of deep navy and stark black against soft dim cyan and single white. This creates a powerful contrast that brings forth a feeling of uncertainty while hinting at underlying clarity. The layout, inspired by descending pixels, mirrors the flow of thoughts in turmoil, suggesting an outward journey from a heavy core. The asymmetric distribution of colors fosters collisions, where dark clusters break against lighter segments, representing the conflict between structured thought and chaotic emotion. Broken pixels, representing the imperfections of machinery, cascade through, reinforcing the theme of disruption and resolution.</desc>
