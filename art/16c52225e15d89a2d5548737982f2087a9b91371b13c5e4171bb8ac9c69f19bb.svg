<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoed Signal</title>
  <desc id="desc">The emotional tone conveys the struggle between clear signals and overwhelming noise. The palette combines deep black and soft grays to represent noise, with bright greens and electric blues symbolizing the persistent signal. The contrast occurs between dense clusters of muted colors on the edges, erupting into vibrant accents at the center, illustrating disruption and interruption within a mostly calm exterior. This promotes a feeling of tension against stillness, reflective of the seed's themes.</desc>
