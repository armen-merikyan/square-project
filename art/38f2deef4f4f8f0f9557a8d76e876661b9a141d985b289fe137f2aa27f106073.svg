<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipsed Signals</title>
  <desc id="desc">This artwork embodies the emotional tension between emptiness and desire through a contrasting palette of warm reds and cool blues, with black representing the overarching void. The upper part of the composition utilizes a checker pattern to depict desire, while the lower half breaks into a mirror-like distortion, embodying emptiness. The asymmetrical arrangement represents a rise and fall, with hints of noise disrupting the expected flow, symbolizing the inner conflict expressed in the seed. The broken edges create an imperfection that reflects the 'burned' aspect, adding depth to the feelings of fragmentation and longing.</desc>
