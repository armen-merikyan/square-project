<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This artwork expresses the tension between longing and resolve through contrasting colors and patterns. The palette of moss green and stone gray creates an earthy feel, embodying both resilience and fragility. The main collision occurs at the center, where a structured lattice intersects a flowing staircase pattern, suggesting a meeting point of two emotional states. Broken pixels interrupt the flow, instilling a sense of imperfection and complexity. Negative space is preserved on the edges to amplify the tension, illustrating the 'threshold' where feelings may shift between density and calm, echoing the seed's themes of repair versus damage.</desc>
