<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Control and Surrender</title>
  <desc id="desc">This piece explores the psychological tension between the concepts of control and surrender. The colors evoke a sense of decay and nostalgia, using a muted palette of sepia, tan, dust gray, and faded blue to create a fragile landscape. The contrast lies mainly in the bold centralized pattern of darker shades that represents control, surrounded by lighter tones suggesting surrender and openness. This collision, both visually and emotionally, occurs through the overlapping 'rain' and 'echo' patterns, forming a dynamic narrative of internal conflict.</desc>
