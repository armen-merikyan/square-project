  <title id="title">Tension Within</title>
  <desc id="desc">The emotional tone reflects the duality of love and betrayal through a contrast of warm and dark elements. The palette of pink and dark maroon creates a foreground of warmth that engages with a cold, gray backdrop—representing the conflict between closeness and separation. The pattern juxtaposes dots representing love, interspersed with broken pixels that emerge, embodying betrayal. Main collisions occur at the edges where warmth meets the dark, creating a fragmented tension that hints at unresolved feelings.</desc>
