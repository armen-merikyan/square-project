  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This artwork embodies the tension between softness and severity, creating a rich emotional landscape. The palette of powder pink and warm white represents softness, while carbon black and sharp crimson introduce severity. The main collision occurs in the center, where sharp crimson and carbon black meet powder pink, generating a striking contrast that symbolizes the struggle between guilt and forgiveness. The broken pixels introduce imperfections, reflecting the messiness of emotional experiences. This dynamic arrangement allows the viewer to feel the push and pull of emotions, echoing the spiral of internal conflict.</desc>
