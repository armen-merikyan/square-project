<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This composition embodies the emotional tension between envy and gratitude through color contrast and layout choices. The palette of red, pale blue, black, and white emphasizes strong emotional states, with red representing envy and the cool tones reflecting gratitude. The outer edges, layered in darker shades, confront and pin down the inner, brighter core, creating a visual tension that mimics the anxiety of envy. The arrangement hints at fragmentation through soft edges and minor color breaks, signifying the interruption of peace by disruptive emotions. The use of negative space promotes a sense of quiet amidst the chaos—inviting the eye to navigate between feelings of rising hope and falling despair.</desc>
