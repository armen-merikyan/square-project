<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This piece explores the tension between restlessness and peace, using a palette that includes warm reds and muted creams against dark tones to represent emotional highs and lows. The dominant feeling of unrest takes up the lower left space, while lighter, static patterns create a calming effect in the upper right. The main collision occurs at the center where the colors clash, embodying the struggle between motion and serenity. The seed's imagery of 'flame against shatter' is abstractly represented by the interplay of vibrant and dark colors, inviting the viewer to navigate their own feelings through the juxtaposition.</desc>
