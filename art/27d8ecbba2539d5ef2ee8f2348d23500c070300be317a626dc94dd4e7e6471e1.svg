<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Fracture</title>
  <desc id="desc">This piece explores the emotional interplay between longing and resolve through contrasting patterns and colors. The palette of muted purples with striking yellows represents the depth of yearning (longing) against the firm structure of resolve. The barcode and glitch patterns collide in the central rows, creating a visual tension that symbolizes the push and pull of repair versus damage. The lit edges suggest clarity amidst chaos, while the broken pixels introduce intentional imperfection, echoing the theme of a mirror broken. Overall, the layout promotes a sense of argument between the two emotional states.</desc>
