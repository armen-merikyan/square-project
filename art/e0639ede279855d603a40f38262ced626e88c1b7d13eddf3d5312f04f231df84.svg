<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Waves of Contrast</title>
  <desc id="desc">The emotional tone of 'emptiness vs desire' is captured through a balance of bold, warm colors representing desire contrasted against cooler, darker tones illustrating emptiness. The palette of soft gold, pale green, dark violet, and black serves to illustrate warmth against cooler hues, embodying internal conflict and longing. The main collision exists centrally, where warm tones are interrupted by darker edges, highlighting the tension of aspiration amidst void. The use of broken pixels introduces imperfections, symbolizing the scars of desire and the fractured nature of hope, creating a dynamic and textured composition.</desc>
