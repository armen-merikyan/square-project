<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Emotions</title>
  <desc id="desc">The emotional tone oscillates between the explosive energy of rage and the subdued essence of calm. Using a palette of deep reds for rage and soft, pale blues for calm creates an inherent tension. The outer border, representing rage, erupts with broken, jagged pixels that clash against the tranquil solid core of calm in the center. The placement of colors suggests a wave of pressure emanating outward, interrupted only by moments of quiet. The design reflects the seed's duality, highlighting the struggle of containment versus overflow through the contrasting color dynamics.</desc>
