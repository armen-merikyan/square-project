<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Conflict</title>
  <desc id="desc">This artwork embodies the tension between defiance and submission through its contrasting colors and structure. The warm tones of hot coral and blood orange create a sense of aggression and energetic insistence, while the cooler hues of charcoal and hollow blue introduce a feeling of retreat and softness. The bright coral splashes in the corner disrupt the darker background, suggesting an invasion of defiance that clashes with the enveloping calm of submission. The static pattern represents the rigidity of defiance while the mirror-like elements evoke a reflective quality of submission, resulting in a dynamic visual conflict that mirrors the emotional tension expressed in the seed.</desc>
