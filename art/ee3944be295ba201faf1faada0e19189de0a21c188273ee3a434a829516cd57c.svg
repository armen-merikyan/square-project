<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This composition embodies the emotional push and pull of softness contrasting with severity. The soft pastels of powder pink and warm white evoke gentleness, while deep shades of carbon black and sharp crimson create stark contrasts that suggest sharp divides in emotion. The layout reflects a threshold, where the softness begins to blend seamlessly into the harshness of severity. The collision primarily occurs in the center, fostering tension and dynamism between the patterns, with static gentle layers on one side meeting the rigid hinge patterns of severity.</desc>
