<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Light</title>
  <desc id="desc">This artwork captures the tension between envy and gratitude through contrasting colors and jagged formations. The palette blends warm yellows and oranges symbolizing gratitude with deeper blues and muted purples representing envy, creating emotional depth. The layout initiates from the corner, suggesting a chaotic invasion of one emotion over another. The hard edges and broken pixels signify the frayed nature of conflicting feelings, while the negative space allows for breathing room, suggesting moments of calm amidst turmoil.</desc>
