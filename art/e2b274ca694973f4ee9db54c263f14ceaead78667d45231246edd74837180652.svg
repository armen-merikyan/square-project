<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone signifies a dynamic interplay between desire and emptiness, represented through a palette that emphasizes warmth and saturation contrasted with cooler, subdued tones. Bright hues on one edge suggest an overflow of desire, while darker areas depict feelings of containment and constraint. The main collision occurs centrally, where vibrant colors swirl towards the periphery of emptiness, echoing a spiral longing that is ultimately interrupted by the cooler shades. The arrangement yields a visual tension that captures the essence of opposing forces. The use of broken pixels adds intentional disruptions, symbolizing the struggle against the edges of containment.</desc>
