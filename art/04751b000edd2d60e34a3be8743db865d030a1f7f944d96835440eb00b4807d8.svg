<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow of Emotion</title>
  <desc id="desc">This artwork captures the tension between joy and grief through a balance of bright and muted tones. The palette includes vibrant yellows and oranges representing joy, juxtaposed with deep blue and muted purple signifying grief. The contrasting colors create a flow that feels both harmonious and fractured, as if punctuated by moments of intense emotion. The layout is nearly symmetrical but includes intentional breaks and a scattering akin to the way emotions can shift unexpectedly. Here, joy is represented through dotted patterns on the right side, while the left uses a stair pattern to evoke a sense of heaviness and ascent. Negative space is utilized to symbolize the gaps left by absence, creating a breathing room amidst dense emotional landscapes.</desc>
