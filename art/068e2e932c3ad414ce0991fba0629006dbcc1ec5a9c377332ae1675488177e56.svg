<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition conveys a strong emotional tension between defiance and submission. The moss green and rust act as bold, defiant anchors in the central region, demonstrating angular resistance. The surrounding softer tones of bone white and stone gray serve as a contrasting embrace, suggesting submission through soft transitions. The spiral flow invites the viewer to explore the collision between the densely stacked pattern at the center and the lighter crosshatched areas at the edges, which subtly recede. Broken pixels introduce intentional imperfections, echoing the overall theme of conflict between permanence and fragility.</desc>
