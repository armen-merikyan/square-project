<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Bound</title>
  <desc id="desc">This piece explores the emotional tension of desire and restraint through a contrast of saturated and muted colors. The palette is derived from the themes of hunger and restraint, using deep reds and blackened plums to evoke warmth and heat, while muted creams and grays suggest suppression and bound limitations. The concentration of warm colors primarily in the central areas collides visually with the cooler edges, symbolizing desire reaching against the edges of restraint, represented by muted fields. The 'glitch' pattern reflects an urgency and brokenness, while the 'stacked' approach encapsulates the feelings of confinement, creating a narrative of yearning trapped within borders.</desc>
