<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition captures the tension between saturated desire and muted restraint. The palette mixes warm tones of red_oxide and small_orange to evoke craving, contrasted by cool tones of blackened_plum and iron_gray for containment. The central clash occurs through diagonal barcode patterns pushing against the negative cross, creating a dynamic visual dialog that reflects the tension of escaping from restraint while encompassing the harshness of containment. The broken pixels introduce an element of imperfection echoing the conflict between the two emotional states. Negative space features subtly to invoke the feeling of something yearning for expression yet confined, allowing the viewer to sense both the strong push of desire and the quiet weight of restraint.</desc>
