<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">This piece captures the emotional tension between joy and grief through contrasting colors and patterns. The left half uses a palette of warm yellows and oranges, symbolizing joy and vitality, while the right half employs cooler muted purples and deep blues, representing grief and weight. The overall left-weighted composition accentuates the feeling of an asymmetrical balance, where joy bursts forth but is constrained by the pull of grief. Broken pixels disrupt the symmetry, enhancing the theme of existential conflict, echoing how joy can often intertwine with sadness. Negative space is carefully preserved to prevent overcrowding, allowing both emotional expressions to breathe and resonate.</desc>
