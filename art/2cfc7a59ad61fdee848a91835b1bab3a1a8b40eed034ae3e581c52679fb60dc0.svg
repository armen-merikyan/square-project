<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger &amp; Restraint</title>
  <desc id="desc">This artwork embodies the emotional tension between desire and restraint, utilizing warm, saturated hues of coral and orange that symbolize desire. The contrasting muted tones of charcoal and hollow blue represent restraint, creating a dynamic interplay. The palette resonates with the struggle of reaching for something held just out of grasp. The dominant warm colors suggest an overwhelming pull towards fulfillment while cooler hues border the matrix like sealed edges, enforcing limits. The collision occurs centrally, where dense color clusters interrupt muted bands, echoing life's complex emotional landscapes.</desc>
