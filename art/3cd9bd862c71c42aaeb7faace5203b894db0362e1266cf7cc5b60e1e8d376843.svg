<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tear in the Connection</title>
  <desc id="desc">The artwork portrays the emotional contrast between loneliness and connection through a central burst of warmth surrounded by darker, more muted colors, symbolizing isolation. The chosen palette of burnt orange and charcoal represents the ancient fire of connection battling the coldness of loneliness. The density is concentrated at the center, where a burst of expression contrasts against expansive empty spaces, invoking feelings of hidden exposure. This tension echoes the themes of the seed, where connection is sought amidst the veil of loneliness.</desc>
