  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This artwork captures the emotional tension between longing and resolve through contrasting colors and patterns. The use of burnt orange and dark red conveys urgency and desire, while charcoals and golds introduce a sense of clarity and strength. The main collision occurs around the center, where the 'broken_dots' pattern of resolve meets the 'noise' of longing, creating an echo of interaction. Negative space and asymmetry allow for feelings of overflow against containment, visualizing the push and pull of emotion.</desc>
