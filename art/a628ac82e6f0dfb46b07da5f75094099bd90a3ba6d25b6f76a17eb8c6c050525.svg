<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone reflects the tension between love and betrayal, using a palette that juxtaposes warm pinks and reds against the cooler tones of gray and dark maroon. The dominant elements are crosshatch patterns symbolizing love's warmth, interspersed with sharper, flame-like edges to represent betrayal. This creates a dynamic contrast and collision in the composition, where the top half flows in overlapping warmth, while the bottom exhibits chaotic, uneven patches that evoke a sense of loss. The layout incorporates empty spaces that symbolize isolation and unfulfilled connections.</desc>
