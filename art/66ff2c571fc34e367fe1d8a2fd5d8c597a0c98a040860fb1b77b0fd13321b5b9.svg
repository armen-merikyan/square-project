<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Whispers of Contrast</title>
  <desc id="desc">The emotional tone is one of deep conflict and uneasy coexistence, embodying trust's warm stability against suspicion's jagged edges. The selected palette includes rose clay and warm shadow to suggest intimacy and grounding, while cool blue and distant lilac introduce an element of distance and ambiguity. The main contrast occurs at the center where darker tones push against lighter fields, creating an echo of tension. The jagged, split pattern represents suspicion weaving through the calmer, split-screen shapes of trust, narrating the struggle between conflicting emotions in a delicate balance of density and space.</desc>
