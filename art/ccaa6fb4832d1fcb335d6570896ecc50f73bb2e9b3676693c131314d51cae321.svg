  <title id="title">Overflow and Containment</title>
  <desc id="desc">This artwork captures the emotional tension between rage and calm. The palette features sharp contrasts with reds and blacks representing rage, while soft blues and whites embody calmness. The center of the grid showcases jagged red scar-like patterns that break into serene pale blue floods, embodying the struggle between chaos and serenity. The layout suggests an open gate, where the explosive red interrupts the calm blue, representing an ongoing emotional conflict.</desc>
