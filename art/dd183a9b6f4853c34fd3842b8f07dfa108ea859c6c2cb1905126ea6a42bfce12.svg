<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone revolves around the tension between desire and emptiness, captured through color and placement. The palette features warm tones like hot coral and blood orange, suggesting desire, contrasted with cooler hollow blue and charcoal, reflecting emptiness and restraint. The main collision occurs diagonally, creating a visual disruption against the dominant empty field, enhancing the sense of quiet pressure juxtaposed with saturated intensity. This interplay forms the abstract narrative inspired by the seed, moving from a central echo of desire into a disordered zone of quiet emptiness.</desc>
