<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Layers</title>
  <desc id="desc">This artwork embodies the emotional tension between defiance and submission, expressed through sharp contrasts and layered placements. The palette, combining pale aqua and alarm red, creates an urgent yet serene atmosphere, promoting feelings of disturbance interwoven with calmness. The patterns—ring for defiance and stack for submission—collide at the center, creating a focal point that represents emotional turmoil. The structured breaks in the border enable the inner energy to escape, hinting at the conflict between the protected center and encroaching edges.</desc>
