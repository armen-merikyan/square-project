<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This piece embodies the emotional dichotomy of defiance versus submission through a contrasting palette of electric blue and warm magenta against a backdrop of black. The black represents the weight of submission, while electric blue signals defiance and vibrancy. The rows' split layout emphasizes the emotional clash, with the top half reflecting defiance in dynamic patterns symbolizing teeth, while the bottom half adopts a softer, target-like organization to evoke submission. Broken pixels scattered throughout introduce imperfection, reinforcing the weight of tension and unresolved feelings.</desc>
