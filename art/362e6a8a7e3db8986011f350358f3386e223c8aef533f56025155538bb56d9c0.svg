<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs. Shelter</title>
  <desc id="desc">The emotional tone juxtaposes tenderness with rage, creating a dynamic tension. The palette reflects this with deep reds (representing rage) contrasted against the quiet calm of pale blue. The center features a quiet field of pale blue, symbolizing protection, while surrounding jagged reds echo the intensity of emotion. The edge style evokes pixel bleed, suggesting vulnerability and imperfection, while broken pixels introduce intentional disruptions. The overlap mimics the collision of feelings, making the central calm a focal point amidst turbulence.</desc>
