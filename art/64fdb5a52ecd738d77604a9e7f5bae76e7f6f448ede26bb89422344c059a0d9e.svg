<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This artwork explores the tension between spark and ash, representing sudden brightness versus burnt quiet. The chosen palette of cosmic indigo, void black, star white, cold gold, and deep teal plays with both warm and cool tones, contributing to a feeling of awe and subtle terror. The main contrast occurs in the pressure corner, where the bright colors clash against dark and muted tones, evoking urgency and restraint. The patterns of channels representing spark and teeth for ash overlap imperfectly, suggesting a collision of emotions while preserving negative space to enhance the sense of fragmentation.</desc>
