<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">This artwork expresses the emotional tension between longing and resolve, with a focus on the contrasting qualities of light and dark. The chosen palette of ripe green, acid green, honey gold, deep olive, and cream suggests both vitality and decay, reflecting the duality of hope and disrepair. The main collision occurs in the center where warm golden tones split through cooler greens, symbolizing the pulse of emotions battling against the stark void. Imperfections are intentionally scattered to create a sense of brokenness and repair, resonating with the theme of healing amidst damage. This arrangement plays out the abstract story of reaching for serenity while confronting urgent emotions.</desc>
