<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Suspicion</title>
  <desc id="desc">The emotional tone centers around a tension between trust and suspicion, represented by a palette of muted, dark tones contrasting with soft, luminous accents. The layout features an eroded symmetry with an overlapping pattern of lattice and pressure bands, symbolizing the interaction of stability and variability. The main collision occurs at the diagonals and edges where the dark palette sets the foundation while the soft gold breaks through, echoing the struggle between noise and signal.</desc>
