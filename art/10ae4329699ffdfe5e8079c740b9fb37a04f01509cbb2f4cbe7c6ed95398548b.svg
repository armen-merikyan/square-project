<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The artwork embodies the emotional dichotomy of trust and suspicion through a split vertical layout. The left side leans towards trust with warm deep teal, symbolizing openness and balance, while the right side employs void black and cold gold to evoke suspicion and blocked pathways. The interplay between soft glow and hard shadow suggests tension, accentuated by the collision of the spark pattern against the crosshatch. The palette chosen reflects an awe-terror theme, creating a subtle tension. The broken pixels disrupt the smoothness, representing the inherent fragility within resilience, enhancing the narrative of precarious balance.</desc>
