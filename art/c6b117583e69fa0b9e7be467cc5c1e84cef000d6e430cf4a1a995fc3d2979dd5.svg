<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Desire</title>
  <desc id="desc">The emotional tone captures the push and pull between desire and restraint, using a palette that contrasts warm, vibrant colors representing yearning (hot coral, blood orange) with cooler, muted tones that signify containment (charcoal, hollow blue). The primary collision occurs in the center, where the brighter checker pattern of desire meets the structured negative cross of restraint, creating a dynamic interplay. This captures a sense of overflow against the backdrop of sealed edges, suggesting an intensity of emotion that is both palpable and contained within a structured lattice.</desc>
