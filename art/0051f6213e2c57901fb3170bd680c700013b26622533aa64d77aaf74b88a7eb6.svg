<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Emotion</title>
  <desc id="desc">This artwork represents the emotional struggle of tenderness vs rage, illustrated through a contrast of sharp, jagged pixels (rage) against softer, glitch-like forms (tenderness). The color palette of black for intensity, pale blue for calmness, and white for space creates a tension between hot and cool emotions. The main collision is in the central area, where braids of red pixels disrupt the serene flow of muted blue, suggesting the way rage can intrude into a quiet mind. The negative space acts as a quiet channel, emphasizing the density of emotions around it.</desc>
