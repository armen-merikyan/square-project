<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone captures the tension between safety and exposure through a carefully chosen palette that embodies both protection and vulnerability. The palette includes 'shelter_green' for stability, 'warm_brown' for groundedness, 'pale_skin' for vulnerability, 'cold_white' for openness, and 'open_blue' for the airy feeling of exposure. The main contrast occurs in the center where thin horizontal patterns of light and dark collide, representing a barrier against harsh surroundings. The 'crosshatch' pattern on one side denotes safety, while 'stepwell' patterns on the other side illustrate layers of exposure—creating rhythmic interaction. This reflects the complex emotional landscape of seeking shelter while daring to be open, creating a coherent abstract narrative woven throughout the square.</desc>
