<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork explores the emotional dichotomy of softness and severity through a delicate balance of light and dark hues. The palette incorporates powder pink and warm white to convey softness, contrasted with carbon black and steel gray to illustrate severity. The spatial arrangement prioritizes a dense cluster of light in the upper left, which gradually dissipates into heavier, darker shades towards the lower right, suggesting a journey from brightness into restraint. The use of a grid pattern for softness and a braid for severity creates an energetic collision that reflects tension and release—a visual representation of guilt and forgiveness.</desc>
