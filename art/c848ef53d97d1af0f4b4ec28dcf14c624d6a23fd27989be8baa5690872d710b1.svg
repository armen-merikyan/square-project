<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Anchors</title>
  <desc id="desc">This artwork expresses the tension between vulnerability and strength by juxtaposing a soft, pale center against a darker, more rigid outer layer. The palette of burnt orange, dark red, charcoal, and gold embodies an ancient fire theme, suggesting warmth and intensity contrasted with unshielded light. The checker pattern represents strength with a rigid structure, while the stepwell introduces vulnerability through descending, uneven layers. The collision occurs centrally, symbolizing exposure, yet the dark borders offer a subtle protection, playing on the concept of shelter amidst vulnerability.</desc>
