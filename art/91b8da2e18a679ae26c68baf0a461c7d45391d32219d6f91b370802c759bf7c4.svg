<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the tension between vulnerability and strength through the contrasting colors of pale mint and storm gray. The soft tones represent the exposure of the inner self, while the deeper shades provide a sense of strength and grounding. The main collision occurs at the center, where these colors collide, creating a focal point of tension. The 'crack' and 'frame' patterns create a sense of disruption (vulnerability) alongside stability (strength), arranged in a porous edge to reflect the emotional complexity of safety and exposure.</desc>
