<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Safety</title>
  <desc id="desc">The emotional tone reflects the tension between safety and exposure, represented through the contrasting pinks of vulnerability and greens of protection. The palette incorporates soft green (#A8D5BA) and pale skin (#F2D4C2) to convey a sense of gentle safety, while subtle colder shades like cold white (#D8E6EA) and open blue (#4A90E2) suggest exposure. The left-right imbalance in colors captures the split between the two emotions, with a main collision occurring at the center, where soft edges intersect sharply, creating an echoing effect. Intentional 'broken pixels' imply disruptions in this echo, fostering a feeling of imperfection in the balance between exposure and shelter.</desc>
