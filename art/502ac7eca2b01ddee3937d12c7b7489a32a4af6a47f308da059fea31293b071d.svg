<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Tension</title>
  <desc id="desc">This composition embodies a constant push and pull between the feelings of softness and severity. Utilizing a palette of powder pink and carbon black, the warm hues create an inviting contrast against stark darks, suggesting emotional depth and tension. The patchwork pattern symbolizes severity, interspersed within a noise pattern that reflects softness. The predominant dark elements weight the lower half, while lighter colors spiral upwards, representing a struggle between guilt and forgiveness, and exposing the dynamics of emotional conflict.</desc>
