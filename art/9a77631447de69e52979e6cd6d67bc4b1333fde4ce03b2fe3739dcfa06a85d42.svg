<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Collision</title>
  <desc id="desc">This composition embodies the emotional clash between tenderness and rage. The palette features saturated reds and muted blues, symbolizing the intensity of rage contrasted against the softness of tenderness. The arrangement creates a dynamic flow from a concentrated central heat represented by reds with jagged pixels, bleeding into cooler, reflective blues at the edges, resembling a ‘quiet channel’ where calmness attempts to hold the chaos at bay. Broken pixels interrupt the mirrored pattern of tenderness, reinforcing the narrative of internal conflict and forgiveness, with deliberate gaps symbolizing vulnerability.</desc>
