<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Tension</title>
  <desc id="desc">The emotional tone reflects a struggle between revival and decay, symbolized in the palette through vibrant sparks of red and subdued gray tones representing ash. The contrast anchors itself in the left columns’ maze of sparking colors intersecting with jagged channels of gray. This collision occurs in the center, where the vibrant spark attempts to break through the muted ash, creating tension and unresolved motion. The layout of a split vertical reinforces the dichotomy of emotions, while intentional broken pixels introduce imperfections, suggesting resilience amidst fragility.</desc>
