<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This artwork explores the emotional tension between panic and control through a combination of warm and cool colors. Utilizing a radial pattern for control, the central area is filled with bright, warm tones like yellow and orange to evoke a sense of hope and joy, while the edges introduce deeper, muted purples and blues representing chaos and grief. The balance between these contrasting colors creates a visual echo of stability surrounded by turbulence, with broken pixels interrupting the flow to emphasize imperfections and the fractured nature of our emotions. The overall composition is designed to provoke contemplation on the dynamic interplay of these feelings, with negative space allowing for a breath in the emotional experience.</desc>
