<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">The emotional tone here embodies a struggle between defiance and submission, depicted through a palette of intense colors juxtaposed with muted shades. The dominant colors—signal green and hot magenta—create a glowing contrast against the static gray and dead black, embodying the tension of defiance in the center amidst the submission swirling outward. The collision occurs in the center, where bright accents intersect with darker tones, creating a vibrant disruption. The spiral patterns of both submission and defiance weave together, suggesting inner conflict and resolutions yet to come.</desc>
