<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory Motion</title>
  <desc id="desc">This artwork embodies the conflict of restlessness and peace through a divided layout. The top half, representing restlessness, utilizes dark, unsettling colors that create a stack pattern, evoking chaotic energy. The bottom half embodies peace with softer, calming hues forming a flame pattern that offers a sense of flow and harmony. The contrasting dark against light in sharply delineated areas heightens the emotional tension, while careful interruptions and broken pixels symbolize disturbances in memory. The palette selection, with cosmic indigo and deep teal, aims to reflect a balance of anxiety and tranquility.</desc>
