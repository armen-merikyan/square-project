<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Resolve</title>
  <desc id="desc">This composition explores the interplay between longing and resolve. The palette of melancholy tones—rain blue, lavender gray, moon white, soft cyan, and muted plum—carries emotional weight, encapsulating the tension of the unresolved. The main collision occurs at the center where warm (soft cyan) meets cool (lavender gray) creating a pulse that contrasts with the surrounding negative space. Broken pixels disrupt the flow, suggesting damage but also repair, resonating with the themes of the seed. The layout invites the viewer to feel the push and pull of serenity and urgency.</desc>
