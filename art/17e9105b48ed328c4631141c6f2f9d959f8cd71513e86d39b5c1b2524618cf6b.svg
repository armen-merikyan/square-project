<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Echoes</title>
  <desc id="desc">This artwork captures the tension between joy and grief through a split horizontal layout. The left half uses a checker pattern in warm yellows and oranges, suggesting brightness and openness, while the right half employs a maze-like arrangement in muted purples and deep blues to convey a sense of heaviness and fragmentation. The contrasting warm and cool colors create a visual push and pull, embodying the emotional weight of the seed. The broken edge styles add imperfection, reflecting the unpredictable nature of emotions. Each shift and collision between bright and muted fields resonates with the complex narrative of human experience.</desc>
