<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone of this piece presents the struggle between desire and emptiness. The palette, featuring hot coral, blood orange, dust pink, charcoal, and hollow blue, creates a tension where vibrant colors at the corners represent the force of desire while the muted gray and blue signify the emptiness encroaching. The main collision occurs in the center, where vibrant spirals of color confront the empty spaces. The layout emphasizes a diagonal spread from the corner, illustrating the contrast of expanding desire against the constraints of emptiness. Broken pixels disrupt the pattern, symbolizing the challenges of this emotional conflict.</desc>
