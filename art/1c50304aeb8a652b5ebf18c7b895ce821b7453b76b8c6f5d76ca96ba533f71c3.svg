<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Reflective Discontent</title>
  <desc id="desc">This piece explores the emotional tension between envy and gratitude. The palette features deep blacks and a soft gold, symbolizing hidden turmoil against a backdrop of muted hope. The dominant contrasting colors are black and gold, creating a striking juxtaposition that suggests both a sense of rich appreciation and underlying discontent. The outer rows are darker, representing envy, while the inner squares intermingle soft golds and greens to embody gratitude, creating a push-pull effect. The pattern suggests a layered complexity, with broken pixels scattered throughout to evoke imperfection and human experience—an echo of noise contrasting with moments of softness, aligning perfectly with the emotional themes derived from the seed.</desc>
