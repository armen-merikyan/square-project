<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Embrace</title>
  <desc id="desc">This artwork embodies the emotional tension between longing and resolve, utilizing contrasting colors to illustrate a journey from desire to stability. The palette consists of rich hues like red oxide and blackened plum contrasting with muted cream and iron gray, depicting the push and pull of these emotions—oscillating between warmth and restraint. The main collision occurs in the center with dense clusters of deeper colors representing longing, while the surrounding lighter tones symbolize resolve, echoing a sense of boundaries and safety. The layout mirrors to suggest connection yet disrupts it with broken pixels, enhancing the sense of imperfection in pursuit of intimacy. The negative space creates breathing room, allowing for reflection in the chaos of emotion.</desc>
