<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Fracture</title>
  <desc id="desc">The emotional tone captures the tension between love and betrayal, using warm pinks and deep maroons as a backdrop to signify warmth and security, juxtaposed against colder grays to represent distrust and break. The layout suggests an empty room, which enhances the feeling of isolation and introspection. The diagonal rise and crosshatch patterns create a dynamic contrast where the emotional collision happens, especially in the middle rows where sharp angles meet soft transitions, symbolizing a breaking point. The burned edges are implied through color disruption, introducing imperfections that evoke complexity in emotional experiences. This arrangement maintains negative space to emphasize feelings of emptiness, while allowing colors to collide on symmetry versus break.</desc>
