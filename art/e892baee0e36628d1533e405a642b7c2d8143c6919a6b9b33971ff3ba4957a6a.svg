<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This piece embodies the intense emotional clash between love and betrayal through the interplay of sharp and soft colors, arranged in contrasting patterns. The palette incorporates warm pinks and reds to evoke love, balanced by the darker tones of gray and dark maroon that introduce a feeling of betrayal. The central crosshatch, representing love, collides with the ring of darker hues that signify betrayal, creating tension around the edges, while leaving negative space to enhance the feeling of isolation and emptiness. The burned edges suggest a history of pain, emphasizing the layered complexity of relationships.</desc>
