<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Contained</title>
  <desc id="desc">This composition embodies the emotional tension between desire and emptiness. The palette combines warm tones of hot coral and blood orange to represent desire, interacting with the cold, muted hues of charcoal and hollow blue that signify emptiness. The layout of 'falling pixels' suggests a descent into the quiet void of containment against the warm and saturated pulse of longing. The predominant use of warm colors in the center collides with the cooler colors towards the edges, creating a stark contrast that emphasizes the struggle between saturation and absence, reinforcing the theme of conflict between overflow and containment. Broken pixels create intentional disruptions that reflect the struggle and barriers within that desire. Overall, the composition captures a sense of emotional push and pull, leaving ample negative space to enhance the feeling of emptiness.</desc>
