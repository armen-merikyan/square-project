<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This composition illustrates the tension between quiet moments and the weight of pressure using a distinct color palette. The muted tones of off_white and faint_peach reflect quietude, while the deeper shades of compressed_red and dark_navy convey a sense of pressure and density. The main collision occurs across the diagonal, where the hard edges of dark colors break into softer pastel fields, creating an interplay of calm and chaos harmonious yet fragmented, reflecting the essence of 'shattering against tide'.</desc>
