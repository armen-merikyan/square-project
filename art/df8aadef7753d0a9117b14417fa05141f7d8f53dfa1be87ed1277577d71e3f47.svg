<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Light and Shadow</title>
  <desc id="desc">The emotional tone embodies the tension between fear and hope. The palette of dark violet and black captures despair and uncertainty, while soft gold and pale green symbolize the spark of hope. The main contrast lies in the diagonal flow, where dark colors cluster in the corners, creating a heavy weight that contrasts with the lighter, soft dots representing rising hope. This creates a visual collision that reflects the push and pull between these emotions, drawing the eye from darkness towards light, encapsulating the idea of 'inside_vs_outside' as a movement from despair to potential.</desc>
