<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry vs Break</title>
  <desc id="desc">This composition explores the emotional duality of confusion and clarity, reflected in a palette of stark contrasts. The rich blacks anchor the piece like deep shadows of confusion, while the pale blues and whites represent moments of clarity that break through the chaos. The center-heavy edge style creates a denser experience closer to the core, while pixels that descend evoke a sense of falling into uncertainty before the brighter pixels rise, suggesting clarity pushing outward. Broken pixels introduce imperfection, reflecting the emotional turmoil and dissonance inherent in the juxtaposition of opposing feelings.</desc>
