<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece represents the emotional tension between safety and exposure, reflecting on the gentle weight of protection versus the bright vulnerability of being open. The palette, featuring soft greens and warm browns, symbolizes safety, while the pale skin tones and cold whites evoke exposure. The contrast between these colors serves to create an echoing tension, with the centered soft tones representing vulnerability surrounded by a heavier border of safety. Broken pixels are strategically placed to inject imperfection and disruption, embodying the struggle between the two emotions.</desc>
