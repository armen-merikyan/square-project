<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone explores the tension between the vibrancy of sparks and the quiet of ashes, represented using sharp contrasts in the palette. The darker hues embody restraint, while the brighter shades symbolize bursts of energy. The collision occurs diagonally through the piece, illustrating pressure as the cooler colors attempt to contain the warmer sparks. By utilizing broken pixels, I added an element of imperfection, enhancing the narrative of resilience against fragility. The layout is defined by a quiet channel of negative space that harmonizes the overall density, guiding the eye through the art.</desc>
