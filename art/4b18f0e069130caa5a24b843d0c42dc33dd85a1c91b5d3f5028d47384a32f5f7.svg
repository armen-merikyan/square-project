<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition conveys the emotional tension between softness and severity through a deliberate color choice: warm pastels teaming with stark blacks and grays. The collision occurs mainly in the center, where a pulse-like rhythm of brighter colors gently interacts with darker tones, creating an echo effect that implies a pull and restraint. The pattern follows a ripple for softness in the left half and a ring structure on the right for severity, visually battling each other yet coexisting in a state of dynamic conflict. Broken pixels add intentional disruption, reflecting the imperfections in balancing these emotions.</desc>
