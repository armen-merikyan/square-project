<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Turbulent Harmony</title>
  <desc id="desc">The emotional tone reflects a balance between chaos and calm, utilizing colors from the 'mourning renewal' palette to express the duality of restlessness and peace. The juxtaposition of deep blue and mourning black evokes depth and gravity, while pale yellow interrupts as a bright accent, hinting at moments of clarity amidst turmoil. The pattern of static for peace and checker for restlessness is visible in the density of colors, creating a stark contrast predominantly centered to represent a collision of emotions. Broken pixels scatter throughout, symbolizing imperfections in memory and the attempt for coherence, aligning with the theme of patching and repairing emotional disruptions.</desc>
