<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Broken Harmony</title>
  <desc id="desc">This piece captures the emotional tension between love and betrayal through a careful balance of warm and cool colors. The palette features shades of pink and red representing love, contrasted with dark maroon and gray illustrating betrayal. The placement creates a split symmetry, echoing the broken mirror concept, where warm colors penetrate areas of cold. This layering creates a subtle collision, embodying both togetherness and isolation, as the edges exhibit sharpness interrupted by soft hues, hinting at vulnerability amidst the facade. The arrangement of colors allows for negative spaces, reinforcing the feeling of emptiness in contrast with the dense emotional pressure present in other areas.</desc>
