  <title id="title">Fractured Balance</title>
  <desc id="desc">This artwork captures the emotional tension between panic and control through contrasting colors and patterns. The palette of warm yellows and oranges against muted purples and deep blues represents joy and grief, suggesting a struggle between bright hope and shadowy anxiety. The broken dots create unexpected disruptions within the otherwise orderly radial stripes, emphasizing a feeling of collision. The placement prioritizes edge density, allowing for chaos to emerge from the central calm, illustrating the narrative of a centered struggle radiating outward.</desc>
