<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Change</title>
  <desc id="desc">This composition embodies the tension between fear and hope through its color choices and abstract arrangement. The palette features deep blacks and violets to reflect the weight of fear, contrasted with the softer hues of gold and pale green symbolizing hope. The sharp edges clash against the soft, zigzag patterns, creating a dynamic flow from dark, compressed corners towards a luminous central core, representing the rising signal of hope. The arrangement uses broken pixels to evoke imperfection and vulnerability, enhancing the emotional depth without resorting to literal imagery.</desc>
