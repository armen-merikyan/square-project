<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This artwork embodies the tension between fleeting sparks of energy and the settling of ashes. The palette of muted greens and browns symbolizes the weight of restraint, while the vibrant accents of open blue inject bursts of vitality to suggest resilience. The main collision occurs in the central 4x4 grid, where the sparks (blue accents) interrupt the grounded tones, visually representing the struggle between appetite (desire) and restraint (prohibition). The jagged edges of the broken frame pattern evoke memories of conflict, contrasting with the softer, soothed structure of the ash's negative cross pattern around it. This layering reflects the dynamic fluctuations of memory and erasure, allowing for depth and engagement.</desc>
