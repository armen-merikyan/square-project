<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Dualities</title>
  <desc id="desc">This piece captures the emotional turmoil between fear and hope through the use of a dark palette contrasting with small bursts of lighter shades. The left half features broken dots to symbolize fear, creating a fragmented feeling, while the right half adopts a framing technique with pale green and soft gold to represent hope. The zigzag flow symbolizes the back-and-forth nature of these emotions, with the center holding the tension of both worlds colliding, evoking a sense of internal struggle and eventual resolution. The jagged edges on the left further emphasize the sharpness of fear, while smoother transitions on the right invoke softness and comfort.</desc>
