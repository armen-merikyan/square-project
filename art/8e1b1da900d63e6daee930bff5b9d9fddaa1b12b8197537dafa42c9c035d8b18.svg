<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Clarity</title>
  <desc id="desc">This artwork juxtaposes feelings of pressure and quiet through contrasting color densities—dark navy and compressed red create a sense of urgency, while faint peach and off-white invoke softness and calm. The collision manifests diagonally, with dense clusters on one side shattering into negative space, embodying a journey from compression to release. The pattern reflects an eroded symmetry, hinting at instability within balance, aligning with the 'counterflow' expressed in the seed.</desc>
