<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition captures the tension between defiance and submission through a spiral layout radiating from a protected center, using a palette of mourning black and pale yellow. The colors create a stark contrast between the bold defiance represented by bright, broken dots against a backdrop of soft radial patterns, evoking feelings of resistance and surrender. The arrangement creates a visual pulse, with quiet fields making up the outer edges, interrupted by exuberant bursts of color that symbolize sparks of conflict, embodying the emotional migration from stillness to tension.</desc>
