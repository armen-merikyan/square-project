<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Vulnerability</title>
  <desc id="desc">This composition embodies the emotional tension between safety and exposure through the use of contrasting colors. The warm browns (#A0522D, #D2691E) create a safe enclosure around the cooler hues of pale skin (#FFDAB9) and cold white (#F0F8FF), suggesting soft barriers against bright vulnerability. The dense center is marked with a tide-like rhythm of dark green (#4B8B3B) that attempts to intrude into the edges of softened warmth. Broken pixels disrupt the smoothness, symbolizing scars and imperfections that life presents. The main collision occurs at the center with dark greens pushing against the soft whites, indicating the ongoing battle between pressure and release.</desc>
