  <title id="title">Tide's Tension</title>
  <desc id="desc">This composition captures a dialogue between pressure and quiet, emphasizing a dense center breaking into softer edges. The palette conveys muted tones punctuated by sharp accents, symbolizing the tension between emotional weight and tranquil space. The collision occurs in the diagonals, where warm compressed red meets the cooler hues of dark navy and off-white, reflecting the struggle between chaos and calm that the seed suggests.</desc>
