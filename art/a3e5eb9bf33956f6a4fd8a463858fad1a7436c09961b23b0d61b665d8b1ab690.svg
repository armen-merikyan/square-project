<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The artwork embodies the emotional tension between rage and calmness by contrasting warm, explosive reds with cool, serene blues. The jagged glitch patterns collide with the steady ladder-like formations, representing the chaotic noise of inner turmoil against the tranquil backdrop. This dichotomy is concentrated towards the center, creating a focal point where the two emotions meet, evoking a sense of struggle and harmony. The palette was selected to amplify this contrast, ensuring that the brighter, more aggressive colors disrupt the calmness, while the black serves to frame and contain the chaos, adding depth.</desc>
