  <title id="title">Overflowing Containment</title>
  <desc id="desc">The emotional tone juxtaposes explosive rage with serene calmness. The palette of red and pale blue invokes heat and tranquility, while black and white add depth and contrast. The main collision occurs in the top left corner, where vibrant reds sharply disrupt the calm blue channels, mirroring an overflow of emotion against a quiet field. This reflects the theme of 'overflow vs containment', as tension builds from a potent center spreading outward, creating echoes and interruptions.</desc>
