<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Waves</title>
  <desc id="desc">This pixel art piece captures the emotional tension between defiance and submission through contrasting colors and patterns. The palette features bright lime and electric blue representing defiance, while magenta and black suggest submission. The diagonal layout creates a wedge of vibrant colors that interrupts a darker, softer side, reflecting a dynamic shift between resistance and yielding. The broken pixels intentionally disrupt the flow, embodying the clash between order and chaos, further enhancing the overall feeling of tension and contrast. The arrangements create an unsettling rhythm, echoing the pulse of conflict and resolution.</desc>
