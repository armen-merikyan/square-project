<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Resonance</title>
  <desc id="desc">This artwork captures the emotional tension between joy and grief through juxtaposing bright and muted colors. The warm yellows and oranges symbolize joy, bringing energy and vibrancy, contrasting with the deep blues and muted purples representing grief, suggesting weight and introspection. The layout features a central off-center burst of warm colors with cooler, darker colors surrounding it, creating a visual and emotional 'push and pull,' echoing the checkered motif of joy fighting against grief. The arrangement induces a feeling of both intensity and calm, making use of negative space predominantly within darker hues, preserving a sense of depth. Broken pixels intersperse the colors, symbolizing fragmentation and the imperfect nature of emotions.</desc>
