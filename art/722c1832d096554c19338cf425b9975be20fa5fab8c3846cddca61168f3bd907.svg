<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">The emotional tone captures a tension between vulnerability and strength, with a balanced yet interrupted flow from light to dark. The palette of pale mint, soft sky, storm gray, near black, and faded gold reflects feelings of exposure and strength, where paler shades represent fragility and deeper shades denote resilience. The main collision occurs in the center where the light and dark elements collide, signifying the constant struggle and interaction between these emotions. The layout emphasizes a threshold, creating a passage where tension visually manifests through the arrangement of colors and the strategic placement of broken pixels to convey emotional scars.</desc>
