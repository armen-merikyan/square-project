<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry Disrupted</title>
  <desc id="desc">This composition embodies the emotional tension between confusion and clarity. The top four rows illustrate clarity with a consistent, ascending 'stairs' pattern in a soft sepia and faded blue palette, suggesting a gradual build-up of understanding. The bottom four rows reveal chaos with broken pixel placement framed by darker hues, creating an overwhelming sense of disruption. The use of soft edges contrasts sharply with larger blocks of dense, darker colors, symbolizing the emotional struggle between order and fracture. This layout reflects the central theme of widely different emotional states coexisting, showcasing the impact of central versus edge dynamics, where clarity radiates outwards and confusion coalesces within.</desc>
