<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This composition explores the emotional tension between safety and exposure. The palette emphasizes the warmth of sheltering colors like warm brown and shelter green, contrasting with the bright vulnerability suggested by cold white and pale skin. The center of the square—where colors collide—displays a patchwork of intense colors, echoing the theme of 'exposure', while the surrounding areas feature a calming flood of darker hues, suggesting safety. The intentional use of 'broken pixels' adds disruption and imperfection, further enhancing the theme of pressure and release, resonating with the seed's emotional undertone.</desc>
