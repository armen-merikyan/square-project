  <title id="title">Hunger Constricted</title>
  <desc id="desc">This composition captures the tension between desire (hot_coral, blood_orange) and restraint (charcoal, hollow_blue) through a dynamic interplay of saturated and muted colors. The upward progression suggests hope while the jagged edges emphasize barriers, creating a visual pressure band against the serene background of crosshatch patterns. The presence of broken pixels symbolizes imperfection, echoing the complex emotions underlying the themes of longing and confinement.</desc>
