<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This artwork explores the emotional tension between envy and gratitude, using contrasting elements. The palette comprises a mix of dark violet to evoke a sense of introspection, soft gold signifying warmth and hope, and pale green representing growth amid dark emotions. The composition has a defined contrast where dark areas (envy) clash with lighter fields (gratitude), creating a feeling of unresolved tension. The outer rows are filled more densely to symbolize the boundaries of emotion and the interplay of rising and falling—the darker hues loom, while softer colors emerge in pockets, echoing the idea of 'outside inward.' The soft edges suggest warmth while the broken pixels hint at imperfection, aligning with the struggle between hope and fear.</desc>
