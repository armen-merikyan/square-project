<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Trust</title>
  <desc id="desc">The emotional tone reflects a struggle between trust and suspicion, portrayed through contrasting elements. The warm tones of moss green (#4A8B45) and stone gray (#7A7B7C) signal trust, while cooler tones like bone white (#E6E1D3) and rust (#C65D38) symbolize the tension of suspicion. The palette creates a layered effect, with moss green dominating to suggest resilience, while the diagonal patterns of channels and ash fields introduce both smoothness and abrupt disruptions, hinting at fragility. The main contrast occurs in the center, where the denser concentration of darker tones meets lighter backgrounds, evoking a sense of uncertainty within stability.</desc>
