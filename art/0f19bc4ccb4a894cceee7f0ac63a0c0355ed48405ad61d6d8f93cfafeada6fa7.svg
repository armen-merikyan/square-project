<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Turbulence</title>
  <desc id="desc">The emotional tension between panic and control inspired the juxtaposition of warm and cool tones. The selected palette of sepia, tan, dust gray, and faded blue suggests a familiarity with chaos, while avoiding literal representation. The outer edges of the piece contain darker hues, inciting a sense of confinement and disquiet, contrasting with lighter central colors suggestive of the core of control or safety amidst chaos. This layout captures an upward flow, symbolizing the struggle against feeling ungrounded, with disruptions in the center representing sparks of hope or clarity in moments of turmoil.</desc>
