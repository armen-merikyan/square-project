<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos and Control</title>
  <desc id="desc">This artwork encapsulates the emotional tension between panic and control, using a palette of bold red and calming pale blue to represent this duality. The stark contrasts between lighter and darker shades create an unsettling rhythm, suggesting the chaos of broken clusters against a stable backdrop. The intentional misplacement of some colors acts as 'broken pixels'—an echo of disruption amid the otherwise ordered stripes, embodying the seed's themes of instability versus security. The flow is radial, symbolizing the orbit of tension around a central chaotic heart, while maintaining the necessary negative space for breathing room.</desc>
