<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Quiet Collision</title>
  <desc id="desc">This artwork embodies the emotional tension of 'longing' and 'resolve'. The palette combines deep blacks and violets to create a sense of depth and mystery, contrasting with soft golds and pale greens that introduce a hopeful note. The arrangement features a central collision of strong colors creating a 'pulse', while softer edges surround them to allow the 'quiet channel' of negative space to breathe and contrast the dense inner patterns. The placement of broken pixels further emphasizes the theme of 'repair_vs_damage', generating visual disruptions that evoke a sense of both urgency and serenity in the viewing experience.</desc>
