<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This artwork conveys the tension between joy and grief through contrasting palettes and arrangements. Joy is represented through bright yellows and oranges arranged in a regular checker pattern, while grief is depicted with deeper, muted purple and blue in a chaotic maze-like structure, interrupting the order. The left side is predominantly weighted with orderly joy, while the right is fragmented, representing grief and chaos. The flow emanates from the center, with colors spiraling outward, suggesting a pulsing heartbeat amidst these dichotomies. The use of broken pixels introduces imperfection, enhancing the narrative of unresolved emotions. The deliberate imbalance in negative space allows the viewer to feel the weight of grief amidst the buoyancy of joy. Overall, the artwork tells a story of emotional struggle, the collision of brightness against shadows.</desc>
