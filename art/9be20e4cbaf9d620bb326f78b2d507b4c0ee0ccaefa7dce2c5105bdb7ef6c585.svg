<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone reflects a struggle between the overwhelming pull of desire, represented by warm, saturated colors, and the containment of restraint, conveyed through cooler, muted shades. The palette of hot coral, blood orange, and charcoal serves to symbolize the heat of longing and the barrier of restraint. The main collision occurs in the center, where desire explodes into a lattice pattern, interrupted by shards of cool charcoal, denoting the tension between longing and the boundary. This juxtaposition creates a visual narrative that evokes the complexity of yearning against the constraints of inhibition. The chosen layout introduces a sense of broken marks, suggesting an incomplete experience of longing against the solidified structure of restraint, creating an abstract composition full of dynamic emotion.</desc>
