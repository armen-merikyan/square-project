<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Intersection of Light and Density</title>
  <desc id="desc">This composition leverages the emotional contrast between vulnerability and strength through the use of a divided palette. The color choice includes a mix of stark black, electric blue, and vibrant magenta against a muted lime background. The collision happens diagonally across the grid, where the stronger colors impose themselves onto the more vulnerable, lighter areas, illustrating a tension between exposure and protection. The barcode and stair patterns intertwine, creating a complex visual narrative that embodies both chaos and structure, reflective of the seed's themes.</desc>
