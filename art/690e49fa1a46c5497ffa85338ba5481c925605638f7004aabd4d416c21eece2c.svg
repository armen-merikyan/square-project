<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Falling Asymmetry</title>
  <desc id="desc">This piece captures the tension between confusion and clarity through a contrasting palette of warm sepia tones against cooler dust gray and faded blue. The composition embodies a flow from top to bottom, where colors fall like pixels, emphasizing the descent of clarity into chaos. The thick outlines in some areas create stark boundaries that break the symmetry, while overlapping pixel patterns represent confusion. This deliberate conflict and periodic introduction of 'broken pixels' enhances the feeling of disruption. The overall rhythm fluctuates between organized segments and chaotic clusters, illustrating the emotional dialogue between rage and calm.</desc>
