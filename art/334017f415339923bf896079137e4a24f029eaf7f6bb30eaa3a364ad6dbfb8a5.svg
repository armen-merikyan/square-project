<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Resilience</title>
  <desc id="desc">The artwork embodies the emotional contrast between strength and vulnerability, visualizing how one can exist alongside the other. The palette, composed of moss green, bone white, rust, stone gray, and small gold, reflects a narrative of resilience amidst fragility. The center is a dense mix of earthy greens and warm rusts, symbolizing strength and stability, while the edges are lighter with bone white and stone gray, suggesting vulnerability. The collision of heavy and thin patterns — as seen in the central area versus the borders — creates dynamic movement, representing the push and pull between exposure and shelter. This creates a striking asymmetry that draws the viewer's eye towards the center, where the most intense colors meet, generating a sense of tension and release.</desc>
