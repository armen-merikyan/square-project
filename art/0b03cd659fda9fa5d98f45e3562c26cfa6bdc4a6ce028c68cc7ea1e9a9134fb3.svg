<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipsed Stability</title>
  <desc id="desc">The emotional tone is rooted in the struggle between vulnerability and strength, represented through the contrasting block patterns of dark and light. The color palette features deep black and electric blue accentuated by lighter shades of magenta and lime, embodying the collision of strength (dark) and vulnerability (light). The focus is on the center of the square where layers of color stack and echo towards the edges, creating a sense of depth and movement, reflective of the swirling dynamics of protection and exposure. Broken pixels are introduced intentionally to suggest imperfections and the fragility of safety in contrast with the solidity of strength.</desc>
