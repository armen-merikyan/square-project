  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone reflects a balance between envy (dense, structured patterns) and gratitude (light, open spaces). The chosen palette of sepia, tan, dust gray, and faded blue conveys a muted nostalgia that contrasts heaviness and lightness. The core collision occurs in the center with darker shades symbolizing envy pressing against lighter hues denoting gratitude. The zigzag pattern hints at movement and the dynamic struggle between these emotions, creating a rhythm that flows upwards and downwards, aligning visually with the theme of 'rise vs fall'.</desc>
