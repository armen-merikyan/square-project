<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">This piece explores the emotional tension between restlessness and peace. The palette incorporates shelter green and warm brown to evoke grounding qualities, contrasted with cold white and open blue, representing moments of disturbance and motion. The main collision occurs from the corner, where the maze patterns representing restlessness disrupt the radial peace, creating an echo of conflicting emotions, while broken pixels add intentional dissonance, akin to memories that intrude upon calm moments.</desc>
