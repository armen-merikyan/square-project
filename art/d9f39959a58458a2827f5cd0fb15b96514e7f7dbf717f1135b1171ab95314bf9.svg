<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition explores the emotional tension between loneliness and connection through an arrangement where four rows reflect loneliness with large negative space and subtle color echoes, while the bottom four represent connection with more engaged patterns. The palette, with warm yellows and muted purples, denotes joy amidst grief, reinforcing the feelings of weight and lightness. The primary contrast occurs where the muted hues of loneliness collide with the brighter tones of connection, creating a visual push-pull. The abstract narrative of broken memories and echoes is conveyed through the intentional placement of colors, forming a soft edge that interrupts the larger fields of darker colors, enhancing the sense of vulnerability.</desc>
