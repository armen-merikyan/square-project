<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collisions</title>
  <desc id="desc">This composition reflects the emotional tension between tenderness and rage, embodied through a palette of red, pale blue, black, and white. The central area, dominated by deep reds (rage), contrasts sharply against the surrounding muted blues and whites (tenderness). The deliberate imbalance emphasizes a quiet, protective halo around a jagged center, symbolizing the inner struggle of emotions. Broken pixels add imperfections that represent guilt and forgiveness in the emotional landscape, manifesting as texture within the chaos of color. The layout follows the 'island_and_sea' structure, where layers of emotion collide and interact, suggesting a dynamic interplay of feeling—a calm sea edged by turbulent islands.</desc>
