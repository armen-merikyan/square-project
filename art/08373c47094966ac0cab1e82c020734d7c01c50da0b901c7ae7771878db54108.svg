<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tidal Expectations</title>
  <desc id="desc">The emotional tone expresses a tug-of-war between longing and resolve. The palette combines warm hues of hot coral and blood orange, representing intense yearning, with cooler tones of charcoal and hollow blue for calm strength and resolve. The central collision occurs diagonally, creating an imbalance that echoes longing while stripes of resolve rise contextually. This leads to tension between dense visual elements and quiet spaces—a visual metaphor for the push-pull nature of desire, where layers of longing clash with boundaries of resolve, creating an emotional landscape that is both conflicted and compelling.</desc>
