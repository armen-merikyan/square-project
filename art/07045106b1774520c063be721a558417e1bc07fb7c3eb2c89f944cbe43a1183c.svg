<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Currents</title>
  <desc id="desc">This composition explores the emotional tension of desire and restraint through the use of saturated and muted colors. The palette includes warm tones of hot coral and blood orange to represent desire, contrasted by charcoal representing restraint. The dense patterns of desire collide with the structured, orderly restraint represented by layers of muted colors. The main contrast occurs centrally, where warm colors spiral outward from a muted core, suggesting an overflow of emotion trying to break free from contained boundaries. The arrangement embodies a narrative of yearning interrupted by the limits we impose on ourselves, with intentional broken pixels adding hints of imperfection and unpredictability.</desc>
