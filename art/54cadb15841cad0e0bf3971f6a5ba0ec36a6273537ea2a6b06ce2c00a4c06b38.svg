<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Echoes</title>
  <desc id="desc">This piece explores the juxtaposition of joy and grief through color and placement. The warm palette of yellows and oranges represents joy, while the deep blues and muted purples evoke a sense of grief. The left side, dominated by circular dotted patterns, embodies the expansive nature of joy, contrasting sharply against the more structured, ringed patterns of grief on the right. The bottom-heavy arrangement gives a sense of weight, as if grief might threaten to overwhelm the lighter color tones above. Each 'broken pixel' introduces an element of imperfection, embodying the chaos within emotional experiences.</desc>
