<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This composition conveys the emotional tension between quietness and pressure. The palette blends off-white and faint peach as soft, muted fields to represent tranquility, with compressed red and dark navy as dense, disruptive accents to symbolize pressure. The main contrast erupts in the center, where the sharp edges of the pressure collide with the soft tones, creating an interplay of density and space—evoking the idea of a quiet channel through dense patterns. The abstract pattern plays with interruptions between sharp and soft edges, embodying the seed’s themes of symmetry versus break and clarity against confusion.</desc>
