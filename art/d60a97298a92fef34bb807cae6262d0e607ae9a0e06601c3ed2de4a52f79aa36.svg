<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Vulnerability and Strength</title>
  <desc id="desc">The artwork expresses the emotional contrast between vulnerability and strength through an interplay of color and patterning. The palette combines deep teal as a nod to vulnerability's soothing, yet unstable essence, while cosmic indigo represents strength's stable core. The center emerges as a veil of soft light indicating vulnerability, which is interrupted by sharp edges of darker tones from the checker pattern, suggesting strength's unyielding presence. The flow from edges inward embodies the theme of exposure and shelter, allowing the viewer's eyes to drift through dense clusters contrasted by quiet spaces. The intentional imperfections symbolize emotional scars, creating a dynamic visual narrative.</desc>
