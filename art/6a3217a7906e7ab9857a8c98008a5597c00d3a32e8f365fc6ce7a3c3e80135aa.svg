<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interference Between Forces</title>
  <desc id="desc">This composition explores the emotional tension between defiance and submission through a palette evoking love and betrayal. The dark maroon serves as the defiant core, representing strength and unyielding spirit, while grays symbolize submission's softness, hinting at encroachment and the feeling of being enclosed. The intensity of signal versus noise is depicted through the contrast of warm reds against muted tones, creating a visible collision. The wave shape seed is abstractly represented through intertwining colors that suggest fluidity and contour disruptions—the center is bold and expressive while edges dissolve into quiet areas. The pattern has been organized with intentional breaks to evoke a sense of tension throughout the piece, giving it a pulse of emotion that invites contemplation.</desc>
