<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tones</title>
  <desc id="desc">This artwork embodies the emotional tension between softness and severity. The palette of powder pink and warm white contrasts sharply with carbon black and sharp crimson, symbolizing the ambivalence in the seed. The black colors form a dense base that portrays the weight of severity, while the pink and white provide lighter, softer moments. The structure follows a descending pixel layout to suggest a sense of falling or flowing, allowing for a subtle interplay between dense and light areas. The primary collision occurs towards the center where the sharp crimson interrupts the softness of the pink, indicating a moment of tension and release. This arrangement reflects the complex dance between guilt and forgiveness, intensity and tranquility, creating an emotional narrative that resonates beyond the visual.</desc>
