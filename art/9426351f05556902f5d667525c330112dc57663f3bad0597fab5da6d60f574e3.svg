<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition explores the tension between softness and severity, illustrated through the careful balance of warm and cool colors. The palette consists of powder pink and warm white to represent softness, contrasted sharply with carbon black and sharp crimson signaling severity. The arrangement channels pixels downward, invoking a falling sensation, while cooler tones seek to contain warmer accents, creating visual and emotional noise indicative of internal conflict. The main collision of colors occurs at the center, where the warm crimson sparks against the darker shades, creating a pulse of energy within the quieter spaces, echoing the seed's thematic contradictions.</desc>
