<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension at the Edge</title>
  <desc id="desc">This artwork evokes a struggle between defiance and submission, with the core of the piece characterized by dark colors that signify resistance, surrounded by a soft and lighter palette representing submission. The use of cold slate and warm coral contrasts directly as the center, representing a secure yet bombarded space defined by a haloesque pattern at its periphery. The arrangement facilitates an emotional flicker with collisions at the center as vibrant colors break through a subdued field, reflecting the intricate dance of tension and release inherent in the themes of the seed. Insistent interruptions symbolize moments of challenge interspersed with quieter, more subdued areas, creating a rhythm of chaos and calm.</desc>
