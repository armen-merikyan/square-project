<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Doubt</title>
  <desc id="desc">This composition captures the tension between trust and suspicion through a contrasting palette of dark and vibrant colors. The use of electric blue and hot magenta symbolizes trust's warmth, while dead black and static gray represent the shadows of suspicion. The chaos on one side, disrupted by broken pixels, meets a more structured approach on the other, creating a visual dialogue of emotional conflict. The dominant placement of darker tones suggests looming doubt, while the lively accents break through, alluding to resilience amidst fragility.</desc>
