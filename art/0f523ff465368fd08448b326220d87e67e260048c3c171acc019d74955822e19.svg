<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Near vs Far</title>
  <desc id="desc">This composition captures the tension between restlessness and peace through a dynamic color palette and layered patterns. The dark hues signify a restless undertone, while the soft gold offers moments of peace. The collision occurs diagonally, suggesting upward movement (hope) alongside the quiet pulling motion of darker tones. The arrangement reflects a 'rising signal' where colors spark and mirror each other, allowing for a gentle oscillation in emotional tone. The broken pixels add unexpected disruptions, creating a sense of imperfection and the complexity of memory versus motion.</desc>
