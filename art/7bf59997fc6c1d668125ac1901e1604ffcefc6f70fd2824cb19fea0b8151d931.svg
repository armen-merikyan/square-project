<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Resolve</title>
  <desc id="desc">The emotional tone reflects the tension between longing and resolve. The selected palette of deep blue, mourning black, pale yellow, new leaf, and stone establishes a somber yet contrasting foundation. Deep blue and mourning black evoke a sense of distance and yearning, while pale yellow symbolizes emerging hope. The main contrast surfaces at the center where new leaf breaks into the darker edges, representing a collision between the desire for repair and the recognition of damage. This creates a dynamic interplay, where structured resolve meets emotional voids, establishing a rhythm that gives life to the abstract pattern.</desc>
