  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This piece explores the tension between vulnerability and strength through a palette of soft yellows and dramatic deep blues, interspersed with muted purples. The arrangement features an exposed center, symbolizing vulnerability, surrounded by controlled edges of strength, represented by dot patterns. The main collision occurs in the center where soft field colors meet bold accents, creating a narrative of tension and balance, as if a joyous light is both exposed and shielded.</desc>
