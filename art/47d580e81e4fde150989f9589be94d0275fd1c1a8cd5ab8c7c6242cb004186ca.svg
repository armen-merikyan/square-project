  <title id="title">Tension Between Shades</title>
  <desc id="desc">The emotional tone of 'envy vs gratitude' is conveyed through a palette of warm and cold tones, creating tension. The pattern uses a zigzag layout that transitions from density on one side (representing envy) to lighter segments on the other (representing gratitude). The collision of saturated reds and soft grays echoes the duality of these emotions, while broken pixels disrupt the flow, mirroring life’s unpredictability and complexity. This patterned disarray captures the essence of centered vs off-center focus, drawing the eye around the canvas while maintaining a sense of visual balance.</desc>
