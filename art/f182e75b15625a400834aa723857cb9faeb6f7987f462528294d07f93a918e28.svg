<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This artwork represents the tension between defiance and submission through contrasting colors and patterns. The palette, inspired by 'broken_memory', utilizes muted tones like sepia and dust gray to embody quiet moments, while bursts of faded blue symbolize vibrant defiance. The central conflict occurs around the middle, where brighter colors collide with softer tones, creating an emotional push and pull, reflecting the seed's theme of order versus chaos. The uneven borders symbolize the fragility of compliance against the stronghold of defiance. Broken pixels add intentional disruptions, enhancing the feeling of conflict and tension throughout the piece.</desc>
