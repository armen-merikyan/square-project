<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Currents</title>
  <desc id="desc">This artwork captures the emotional tug-of-war between love and betrayal. The palette mixes warm pinks and reds with muted grays and dark maroon to emphasize this duality. The contrast lies predominantly between soft warm colors representing love and sharp, darker tones suggesting betrayal. The split symmetry reflects the theme of misaligned emotions, while the upward flow from bottom to top symbolizes hope amidst emotional chaos. Interruption occurs through deliberate placement of darker hues that disrupt the warmth, creating a visual echo of the contrasting feelings inherent in the seed.</desc>
