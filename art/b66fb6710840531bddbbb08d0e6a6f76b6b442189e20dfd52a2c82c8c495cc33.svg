<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Bound</title>
  <desc id="desc">This composition embodies the tension between desire and restraint. The use of deep, saturated reds reflects the intense pull of yearning, delicately contrasting with muted blackened plums that symbolize restraint and containment. The central area focalizes this collision, demonstrating a spiral of pressure as the warm tones attempt to encroach upon the sealed edges represented by the cooler, darker colors. The negative space, kept sparse yet intentional, reinforces the sense of longing. This intricate play of saturation and muted hues creates a visual journey between the two emotional states, encapsulating the complexity of love and betrayal without resorting to literal depictions.</desc>
