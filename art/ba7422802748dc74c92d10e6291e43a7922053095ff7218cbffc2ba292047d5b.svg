<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of the Void</title>
  <desc id="desc">The emotional tone reflects the clash of defiance and submission, with a central hollow space surrounded by bold and soft colors to signify resistance and vulnerability. The chosen palette, 'melancholy_wonder', comprises muted and ethereal colors: rain blue conveys depth, lavender gray signifies calm contrast, and soft cyan adds a tranquil touch, while muted plum and moon white provide moments of tension. The broken pixels interrupt the rigid patterns of the patchwork and pressure band, creating scars that symbolize emotional complexity. The main collision occurs at the center, with dynamic disruptions pushing against the edges, embodying a push and pull between order and chaos.</desc>
