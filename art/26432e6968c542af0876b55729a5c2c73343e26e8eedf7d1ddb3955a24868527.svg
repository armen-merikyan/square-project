<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dual Emotions In Color</title>
  <desc id="desc">The composition embodies the emotional tension between envy and gratitude. The palette, consisting of black, dark violet, soft gold, and pale green, reflects the contrast between dark feelings of envy and the softer light of gratitude. The central area is slightly denser, hinting at the weight of envy, while the softer edges allow hope to ripple outward. This pattern creates a visual echo of rising versus falling, encapsulating the push-pull dynamic of both emotions. The 'rising_signal' flow guides the viewer’s eye upward, while subtle clashes between the colors suggest unresolved tension.</desc>
