<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The piece embodies the emotional tension between vulnerability and protection, utilizing a palette that features warm brown and shelter green to suggest safety, contrasted with the cold white and open blue that evoke exposure. The dominant warm brown, representing safety, occupies the center while the top and bottom edges, in cool tones, create an echoing boundary that both supports and challenges the central form. The use of stripes and dots creates a visual conflict that interrupts the peace of the background, resulting in a powerful emotional interplay reflective of the seed's themes.</desc>
