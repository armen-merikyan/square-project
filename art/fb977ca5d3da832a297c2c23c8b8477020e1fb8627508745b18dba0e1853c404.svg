  <title id="title">Tension of Memory</title>
  <desc id="desc">This composition captures the emotional dichotomy of 'spark vs ash' through contrasting textures and colors. The warm, bright accents suggest sparks of life and energy, while the muted, gray tones represent ash and resignation. The layout is intentionally disrupted, with jagged edges suggesting conflict and interaction between memory and erasure. The 'crack' pattern represents resilience, fighting against the 'glitch' of fragility. The main collision occurs in the center, where vibrant colors disturb the softer hues, emphasizing the tension between vitality and decay.</desc>
