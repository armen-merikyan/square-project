<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Opposites</title>
  <desc id="desc">This artwork captures the emotional struggle between defiance and submission through a dynamic interplay of dark and light shades stemming from the chosen palette. The contrast of vibrant pinks and deep maroons represents passionate defiance clashing with subdued grays indicating submission. The layout spreads diagonally from the top left corner, embodying an invasion of defiance that pushes against a backdrop of stability. Broken pixels in the center serve as a representation of vulnerability amidst strength, while negative space at the edges invites contemplation, echoing the seed's themes of imbalance and emotional conflict.</desc>
