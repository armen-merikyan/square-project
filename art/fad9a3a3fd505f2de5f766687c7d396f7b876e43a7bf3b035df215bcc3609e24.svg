<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Space</title>
  <desc id="desc">This piece expresses the emotional tension between defiance and submission, using a palette that balances soft warmth with striking severity. The checkerboard pattern reflecting defiance is disrupted by the barcode-like submission elements, creating visceral conflict at the center while swirling outward in a spiral, suggesting both attack and retreat. The dense clusters of black contrast sharply with lighter hues, evoking a sense of rising pressure and unresolved emotions that intermingle in a dance of color and form.</desc>
