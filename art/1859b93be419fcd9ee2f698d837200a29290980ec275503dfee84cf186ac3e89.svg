<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Friction of Veils</title>
  <desc id="desc">The emotional tone reflects the tension between loneliness and connection through contrasting palettes of deep red and pale blue. The outer edge symbolizes detachment and isolation, while the central core hints at potential connectivity, represented with bursts of white and softer blue. Broken pixels create an imperfect border, leading to feelings of disturbance and vibrancy, echoing the internal struggle of hidden versus exposed emotions. This composition uses the idea of a tear not literally, but as an abstract representation of disruption, integrating the concepts of burst and crosshatch as layered feelings.</desc>
