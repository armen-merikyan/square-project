<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Grid</title>
  <desc id="desc">The emotional tone of 'loneliness vs connection' translates into a stark contrast of deep blacks and muted blues balanced by slight touches of cyan. The palette captures the essence of isolation and subtle warmth, using navy as a foundation of depth and black to create a hidden, layered weight. The placement of lighter colors, akin to distant connections, interrupts the heavier segments, creating moments of exposure amidst the dark density. The arrangement follows a descending flow, mimicking tears or falling ash, while implementing a pattern of crosshatch in light tones against the dark, enhancing the sensation of the tension between isolation and seeking connection. The grid-like feel added by the burned edges acts as both a boundary and a point of conflict—highlighting the relationship between the inside and outside emotions.</desc>
