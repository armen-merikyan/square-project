<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">In the Balance of Chaos</title>
  <desc id="desc">This piece explores the tension between panic and control through a striking palette of burnt orange, dark red, charcoal, and gold, symbolizing the warmth of chaos against the anchor of control. The contrasting placement of colors creates a visual fight between structured patterns and jagged interruptions, embodying the argument of order versus chaos. One side exhibits structured mirroring to evoke control, while the other applies a 'spark' pattern, symbolizing the chaos of panic. The imperfect placement of a few broken pixels accentuates the idea of disruption, reinforcing the dynamic relationship between two emotional experiences while maintaining necessary negative space to avoid overwhelming density.</desc>
