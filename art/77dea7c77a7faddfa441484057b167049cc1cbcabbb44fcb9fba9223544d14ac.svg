<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">This artwork embodies the emotional tension between vulnerability and strength through a blend of saturated and muted colors. The palette of 'signal_green', 'electric_blue', 'dead_black', 'static_gray', and 'hot_magenta' represents the flooding signal and hard edges. The central area is heavier with clear blocks of electric blue and signal green, symbolizing strength, while the surrounding muted static gray and dead black ring convey vulnerability. Encountering collisions and overlaps represents the struggle between exposure and shelter, capturing the essence of dynamic conflict. The broken pixels provide intentional disruptions, enhancing the theme of conflict and connection.</desc>
