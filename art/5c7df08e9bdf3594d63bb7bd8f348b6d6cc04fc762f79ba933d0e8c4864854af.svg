<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Converging Tensions</title>
  <desc id="desc">This pixel art piece embodies the emotional tension between vulnerability and strength through contrasting color patterns. A palette of pale aqua and mist gray conveys serenity, interrupted by vibrant alarm red and deep ink blue to embody urgency. The densest colors occupy the center, symbolizing strength, while lighter, more fragmented pixels break along the edges, suggesting vulnerability. The design offers a collision of stability and instability, with broken pixels representing flaws or interruptions in perceived safety, ultimately creating a sense of dynamic tension that parallels the seed’s themes.</desc>
