<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Light and Shadow</title>
  <desc id="desc">This artwork captures the emotional dichotomy of relief and dread through a careful interplay of contrasting colors and shapes. The palette draws from 'ancient_fire,' utilizing burnt orange and dark red to symbolize dread's weight against the lighter gold representing relief. The layout mirrors itself with minor breaks to illustrate both symmetry and imperfection, while the broken edges create a sense of unrest. The pattern of target-like shapes hints at focus amidst chaos, contrasting sharply with the surrounding negative space that suggests emptiness. The vertical flow echoes a journey from top-weighted stress to a lighter resolution below, enhancing the emotional tension and release inherent in the seed.</desc>
