<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition embodies the tension between defiance and submission through a split horizontal layout. The top four rows are dominated by shades of 'faded_gold' and 'storm_gray', representing defiance with a hardened yet radiant feel, while the bottom four rows soften into 'soft_sky' and 'pale_mint', suggesting submission and quiet. The subtle use of 'near_black' edges introduces a chaotic element, enhancing the clash. The radial patterns create an upward pulse in the upper section and a downward flow below, symbolizing the struggle between ascension and receding. The carefully placed broken pixels introduce imperfection, reinforcing the theme of conflict.</desc>
