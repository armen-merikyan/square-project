<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Color</title>
  <desc id="desc">This piece reflects the emotional struggle between desire and restraint through the use of contrasting color densities. Saturated hues, like red oxide and small orange, dominate the corner, representing the pull of desire. In contrast, muted cream and iron gray create a cool barrier against the heat, symbolizing restraint. The broken pixels add an element of imperfection and disruption, physically manifesting the conflict. The lattice pattern recalls structured emotional control while spirals indicate a complex, overwhelming desire that seeks to escape. The overall layout emphasizes a corner pressure, challenging the boundaries of containment, creating a dynamic rhythm of emotional tension.</desc>
