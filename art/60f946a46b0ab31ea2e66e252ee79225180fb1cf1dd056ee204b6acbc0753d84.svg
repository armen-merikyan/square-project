<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Boundaries</title>
  <desc id="desc">The emotional tone explores the contrast between vulnerability and strength, utilizing a palette rich with deep teal, cold gold, cosmic indigo, void black, and star white. The center of the 8x8 grid embodies the strength with a stable, bold color presence, while the outer edges gradually fade into softer, muted tones illustrating vulnerability and instability. The collision occurs at the border, where bold colors interact with softer tones to create a tension that echoes the struggle of balance. This dynamic reflects the themes of erosion and break, as colors interrupt each other, honoring the seed's emotional complexity.</desc>
