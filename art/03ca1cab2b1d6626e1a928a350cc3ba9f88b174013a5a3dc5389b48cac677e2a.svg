<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Growth and Decay</title>
  <desc id="desc">This artwork conveys the emotional tension between the concepts of spark (representing potential and energy) and ash (symbolizing restraint and remnants). The selected colors of deep olive and honey gold highlight the vibrant push against the muted undertones of cream and ripe green, creating a dynamic interplay. The diagonal layout accentuates this push, with richer colors occupying the top-left corner while softer tones recede to the bottom-right. A zigzag flow generates movement, enhancing the feeling of struggle between vitality (spark) and acceptance (ash). Intentional broken pixels disrupt the flow, suggesting the fragility of memory vs. the strength of resilience connected to the central 'knot' shape, leading to an evocative yet abstract narrative.</desc>
