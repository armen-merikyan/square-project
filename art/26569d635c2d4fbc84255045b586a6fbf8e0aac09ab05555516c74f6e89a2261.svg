<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotions</title>
  <desc id="desc">This abstract artwork embodies the emotional tension between tenderness and rage, achieved through a palette of stark contrasts. The dominant hues of deep red and black represent rage, while accents of soft pale blue and white reflect tenderness. The design features a strong diagonal movement, with the left side heavily contrasted by hot reds and deep blacks creating an overwhelming sense of pressure, while the right transitions to gentler tones, punctuated by clustered black pixels hinting at scars of past turbulence. The collision occurs primarily along the center axis, symbolizing the emotional push-pull in the narrative. This pixel arrangement plays on the themes of quiet and chaos, letting patterns of illumination break through darker tones just as vulnerability emerges amidst raw emotions.</desc>
