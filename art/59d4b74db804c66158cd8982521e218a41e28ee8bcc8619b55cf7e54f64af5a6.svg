  <title id="title">Emotional Collision</title>
  <desc id="desc">This composition explores the tension between joy and grief, utilizing warm and cool colors to suggest emotional contrasts. The palette mixes bright yellows and oranges with deep blues and muted purples, representing the collision of light and weight. The layout suggests a split horizontal flow, with soft stripes of joy interspersed with heavier forms reminiscent of grief, creating visual tension and pauses. Broken pixel placements scatter a sense of imperfection and memory throughout the piece, inviting reflection and resonance.</desc>
