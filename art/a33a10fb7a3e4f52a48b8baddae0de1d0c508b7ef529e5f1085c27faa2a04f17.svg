  <title id="title">Fractured Love</title>
  <desc id="desc">The emotional tone contrasts warm love (represented by pink and red) against the coldness of betrayal (gray and dark maroon). The palette suggests warmth intertwined with darker, more chaotic elements, creating an unsettling yet inviting experience. The main collision occurs in the center where warmth is interrupted by cooler tones, symbolizing the crumbling connection. The flowing pattern from top to bottom evokes a sense of rising tension that eventually crashes, reflecting the seed's suggestion of emotional turmoil through an abstract arrangement of lines and broken pixels.</desc>
