<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center of Conflict</title>
  <desc id="desc">This piece captures the emotional tension between defiance and submission. The contrasting colors of warm red oxide and muted cream create a sense of conflict, with blackened plum acting as a heavy backdrop symbolizing resistance. The loose structure of stripes representing submission overlaps sharply with angular hinges suggesting defiance, giving the illusion of chaos from order. The edges are burned to enhance the feeling of intrusion and interruption, with intentional broken pixels providing an impression of scarred perseverance. Overall, the center is dense, while the edges recede into a quieter tone, reflecting a struggle between assertiveness and retreat.</desc>
