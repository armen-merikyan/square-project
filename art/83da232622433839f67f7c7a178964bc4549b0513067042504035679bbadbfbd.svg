  <title id="title">Chaos and Control</title>
  <desc id="desc">This 8x8 piece embodies the struggle between panic and control through contrasting colors and patterns. The burnt orange and dark red evoke emotional heat and tension, representing panic, while the charcoal and gold establish a framework of control and order. The layout employs a grid pattern where broken sections serve as interruptions, symbolizing chaos. The defined edges enhance the tension while maintaining implied negative space that upon closer inspection reveals the conflicts within. The interplay between warm and cool colors amplifies the feeling of unresolved motion and emotional collision.</desc>
