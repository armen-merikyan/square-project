<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone of this piece reflects the juxtaposition between vulnerability and strength, represented through a dynamic interplay of colors. I chose a palette that balances warm and cool tones, emphasizing the tension between a soft, exposed center (#D4B29D) and a thicker, stable border (#7A3E3F) that denotes strength. The main collision occurs in the center where the 'glitch' pattern interrupts the 'lattice,' creating a visual echo of pressure against the open space. This asymmetry aligns with the seed’s themes, capturing the essence of tension and emotional depth without resorting to literal imagery.</desc>
