<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Dynamics</title>
  <desc id="desc">This artwork embodies the tension between certainty and curiosity through a color palette that juxtaposes mourning black and deep blue against pale yellow and new leaf. The main collision occurs in the center, where dense, saturated colors encounter the more muted edges. Here, the seed's themes of order and chaos are represented; the clean radial pattern of certainty breaks with the organic, irregular lines of curiosity. The arrangement suggests a rising signal, with colors layering upwards while maintaining significant negative space around the periphery, reflecting a balance between control and exploration.</desc>
