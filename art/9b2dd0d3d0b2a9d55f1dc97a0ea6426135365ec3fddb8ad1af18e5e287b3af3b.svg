<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This piece explores the emotional tension between dread and relief. The palette features muted storm gray and near black to represent dread, juxtaposed with soft sky and faded gold for a sense of relief. The main contrast occurs at the center, where a dark mass is interrupted by lighter dots that represent an exhale of space, embodying the struggle between pressure and release. The patterns of tide and dots merge and collide, creating a dynamic rhythm while also maintaining negative space to suggest breathability amidst chaos.</desc>
