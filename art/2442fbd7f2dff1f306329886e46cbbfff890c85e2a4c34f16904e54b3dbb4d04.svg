<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Change</title>
  <desc id="desc">This piece captures the tension between nostalgia and progress. The palette reflects this, featuring dark navy to evoke the weight of memory, contrasted with lighter dim cyan to symbolize forward momentum and hope. The top half represents nostalgia, with a consistent, dense pattern resembling flames, while the bottom half breaks into chaotic rings, suggesting the unpredictability of progress. The main contrast lies in the jagged edge where a heavy void meets reflective movement, portraying the collision between past comfort and future uncertainty.</desc>
