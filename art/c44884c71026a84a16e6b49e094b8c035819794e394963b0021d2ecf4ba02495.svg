<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone juxtaposes rage and calm through the palette of deep reds and soft blues. The top half (rage) is filled with jagged, disruptive patterns that suggest turmoil, while the bottom half (calm) uses smooth, dot-like arrangements to evoke containment. The main collision occurs at the boundary between the two, highlighted by a shift from chaotic reds to serene blues, with broken pixels adding intentional disruption that reflects the struggle of emotions clashing. The balance intentionally skews to convey the overpowering nature of rage.</desc>
