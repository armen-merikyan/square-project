<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tides of Emotion</title>
  <desc id="desc">The emotional tone explores the tension between certainty and curiosity, embodied by the collision of structured patterns and unpredictable flows. The palette of 'melancholy wonder'—composed of rain blue, lavender gray, moon white, soft cyan, and muted plum—carries a somber yet inquisitive feel. The contrast manifests through strong, firm sections embodying certainty against softer, disrupted areas reflecting curiosity. The pixel design features broken dots on one side representing certainty and a target pattern introducing curiosity, leading to an intentional disruption at the central seam. This arrangement echoes the idea of rising signals meeting receding edges, creating a dynamic interplay within the grid.</desc>
