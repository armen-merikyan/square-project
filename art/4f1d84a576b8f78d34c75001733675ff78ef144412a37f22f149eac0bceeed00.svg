<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Balance</title>
  <desc id="desc">This composition explores the tension between restlessness and peace, utilizing a palette of warm and cool tones to represent the emotional conflict. The chosen colors—red oxide and small orange for restlessness against muted cream and iron gray for peace—create a warm versus cool dynamic. The main collision occurs diagonally across the square, where bright accents burst into a cooler muted area, embodying the notion of flame against shatter. Broken pixels evoke a sense of imperfection and interruption, ensuring that the square feels alive and dynamic without losing its abstract character.</desc>
