<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition explores the emotional tension between vulnerability and strength. The palette 'relief_dread' employs pale mint and soft sky tones to convey a sense of exposure, while storm gray and near black create a grounding weight, suggesting strength. The collision of these emotional tones occurs in the center, where broken pixels disrupt the otherwise flowing halo pattern, invoking a feeling of protective vulnerability. The spatial arrangement adheres to an empty room layout, with a meaningful empty space enhancing the narrative of safety versus exposure.</desc>
