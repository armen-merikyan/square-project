<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow and Containment</title>
  <desc id="desc">The emotional tone juxtaposes explosive rage with serene calmness. The palette of deep red (`#FF0000`), soft pale blue (`#A3C1DA`), stark white (`#FFFFFF`), and deep black (`#000000`) creates a dynamic tension. The outer rows, rich in dark tones, symbolize the forceful eruption of rage, while the inner pixels, predominantly blue and white, evoke a soft, quiet calm that's trying to contain the surrounding chaos. The distribution hints at a central struggle, where intense red zigzags of anger cut through the cool thresholds of calm in a pattern of noise versus signal. Broken pixels insert intentional imperfection, implying that the calm is never fully uninterrupted. This design conveys both a clash and an unresolved dialogue between the embedded emotions.</desc>
