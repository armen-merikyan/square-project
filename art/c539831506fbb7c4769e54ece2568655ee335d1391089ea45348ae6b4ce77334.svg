<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Softness and Fury</title>
  <desc id="desc">The artwork explores the emotional tension of tenderness and rage through the juxtaposition of contrasting colors and patterns. The palette is drawn from the rage_calm theme: a saturated red represents inner turmoil, while softer pale blue hues provide a calming counterbalance. Using a pattern of broken dots (for tenderness) amidst jagged, hinge-like structures (for rage), the central collision occurs in the grid's middle, creating a visual representation of emotional conflict. This aligns with the seed's notion of an inner struggle framed by a quieter backdrop.</desc>
