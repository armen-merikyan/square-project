<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Edges</title>
  <desc id="desc">This artwork captures the emotional clash between defiance and submission through a split vertical layout. The left side embodies defiance with sharp, block-like patterns in bold colors like 'lamp_gold' and deep 'rose_clay', suggesting a refusal to conform. In contrast, the right side yields to submission with soft 'cool_blue' and muted 'distant_lilac', creating a feeling of enclosure and tranquility. The collision occurs centrally, where the bright gold sharply interrupts the cool blues, reflecting the tension between these opposing forces. Broken pixels introduce imperfections, signifying the scars of conflict, while maintaining a calm negative space to allow the colors to breathe.</desc>
