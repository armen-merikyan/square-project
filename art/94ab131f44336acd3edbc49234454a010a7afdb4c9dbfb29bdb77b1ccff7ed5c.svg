<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Edge of Reflection</title>
  <desc id="desc">This abstract composition captures the emotional tension between vulnerability and strength by utilizing a palette of muted and bright colors that clash and reinforce each other. The contrasting shades of 'storm_gray' and 'faded_gold' serve to represent the scars of vulnerability against a backdrop of stability. The main collision occurs in the center through a cluster of heavier tones, while lighter shades sweep from the edges, suggesting safety amidst exposure. Inspired by the concept of a 'fault', the imperfect arrangement gives a sense of depth and intimacy, echoing both fragility and resilience.</desc>
