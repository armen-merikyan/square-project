<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork conveys the emotional tension between vulnerability and strength through contrasting colors and patterns. The palette draws from mourning black and deep blue for strength, juxtaposed against pale yellow, representing vulnerability. The central collision of colors—a dense, dark foundation with light accents—symbolizes the struggle between protection and exposure. The layout reflects a cross current, where horizontal and vertical movements overlap, creating tension, especially in the center, where the bright accents break through the darker tones, suggesting a moment of clarity amidst chaos. Broken pixels add intentional disruption, representing scars from vulnerability while expressing resilience.</desc>
