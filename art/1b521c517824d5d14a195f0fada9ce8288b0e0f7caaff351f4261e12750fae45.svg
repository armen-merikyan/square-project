<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow and Containment</title>
  <desc id="desc">This piece explores the emotional tension between rage and calm, utilizing a palette of stark contrasts. The hot-red hues are interspersed with cool pale blues, embodying the collision between explosive energy and quiet space. The composition features a structured layout that simulates a ‘broken frame’, with edges that hint at eroded symmetry, allowing the rage elements to escape while calm patterns pulse rhythmically, suggesting boundaries being both contained and overflowed. The arrangement creates a visual rhythm that oscillates between chaotic interruption and serene consistency.</desc>
