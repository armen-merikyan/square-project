<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The artwork embodies the tension between vulnerability and strength, depicted through a dense corner filled with deep reds and dark maroons, symbolizing strength, contrasting against softer pinks and grays representing vulnerability. The collision of the thick, striped patterns in the corner and the delicate target patterns creates a sense of exposure. The interplay suggests an ongoing narrative of pressure, protection, and emotional push and pull. The arrangement also intentionally leaves negative space, symbolizing the ignored or unseen parts of vulnerability, maintaining balance amidst the chaos.</desc>
