<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This artwork encapsulates the emotional conflict of restlessness versus peace. The cool blues (#A3C1E0) and distant lilac (#CFA5D8) suggest calm; however, they are interrupted by warm shadows (#EDCA95) and a bold lamp gold (#FFC107) that emerge and clash, representing restlessness. The collision and shifts in color create an echoing effect, with symmetry gradually eroded, contributing to an unsettling rhythm that encapsulates both memory and motion. The design forms an atmosphere of tension, challenging the viewer to engage with the contrast and flow. The broken pixels add intentional disruptions, enhancing the sense of unpredictability.</desc>
