<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Shelter</title>
  <desc id="desc">This composition captures the emotional tension between safety and exposure through the use of contrasting colors and textures. The upper half (safety) employs warm earth tones with broken dot patterns to represent gentle weight and soft barriers. The lower half (exposure) uses cooler tones and a target pattern, emphasizing vulnerability and lightness. The collision of the two emotions occurs in a thin line where the warm and cool colors meet, creating a delicate balance that mirrors the themes of pressure and release. The overall visual flow orbits around this central line, allowing the piece to suggest both stability and fragility.</desc>
