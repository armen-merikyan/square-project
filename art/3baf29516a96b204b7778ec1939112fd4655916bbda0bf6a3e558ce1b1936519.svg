<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This abstract composition reflects the emotional contrast between defiance and submission through the interplay of dark and bright colors. The palette of electric blue, lime, and magenta enhances the sense of tension and disruption. The bold center, illustrating defiance, is surrounded by a border of enclosed fields indicating submission. The collision occurs at the center where chaotic noise breaks through structured lines, suggesting an overwhelming urge to push against constraints. Broken pixels represent the imperfections of both emotions, reinforcing the narrative of struggle within the overall calmness of the layout.</desc>
