<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Harmony</title>
  <desc id="desc">This piece explores the emotional clash between love and betrayal, utilizing a warm vs. cool palette to evoke tension. The colors transition from warm reds and pinks representing love to cooler grays and dark maroon signifying betrayal, reflecting the shift from calm to pressure. The placement of colors in diagonal layers creates a sense of rising signal interrupted by chaotic broken edges, echoing the disharmony of love betrayed. The increased density in certain rows symbolizes emotional concentration while preserving negative space, accentuating the fragility of the feelings portrayed.</desc>
