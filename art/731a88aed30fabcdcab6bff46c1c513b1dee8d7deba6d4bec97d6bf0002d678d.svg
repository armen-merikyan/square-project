  <title id="title">Contrast of Hearts</title>
  <desc id="desc">This piece explores the emotional dichotomy of love and betrayal through a blend of warm and cool tone contrasts. The palette of pinks and warm grays contrasts with deep maroons, embodying warmth and tension. The checker pattern reflects betrayal while the central sparking pattern signifies love. The layout intentionally uses broken pixels to create imperfection, emphasizing the fragility of relationships, while maintaining sufficient negative space to convey unease. The scattering flow influences the emotional rhythm, suggesting a shift between calmness and pressure as reflected in the arrangement of colors.</desc>
