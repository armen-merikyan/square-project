<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Trust</title>
  <desc id="desc">The emotional tone shifts between trust and suspicion, captured through a palette of muted and subtle colors that establish an undercurrent of tension. The chosen colors—off-white for a soft glow, dust gray providing a neutral backdrop, compressed red for punctuating friction, dark navy for depth, and faint peach to introduce warmth—represent the delicate balance between reassurance and doubt. The central collision occurs where the dark navy stairs pattern interacts with the faint peach ash-field, suggesting a struggle between clarity and confusion. The diagonal flow embodies a descent, mirroring the escalating pressure from top to bottom, akin to tears or ash drifting down, thereby creating a moving, layered visual narrative.</desc>
