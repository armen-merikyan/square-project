<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Locked Longing</title>
  <desc id="desc">The emotional tone of this piece oscillates between deep desire and firm restraint. The palette chosen, featuring warm tones like hot coral and blood orange against deep charcoal and hollow blue, emphasizes the tension in the desires that push against the boundaries. The main collision occurs in the center where saturated patches of coral confront muted spaces, representing the conflict between yearning and limitation. Broken pixels introduce irregularities that symbolize imperfections in achieving harmony, while maintaining a slight negative space reinforces the concept of unattainable longing.</desc>
