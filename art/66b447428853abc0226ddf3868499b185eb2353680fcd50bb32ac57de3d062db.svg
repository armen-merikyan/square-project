<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Shelter</title>
  <desc id="desc">The emotional tone captures the tension between safety and exposure, using a palette that blends quiet sheltering tones with open, vulnerable hues. Cool tones of 'cold_white' and 'open_blue' occupy the left, symbolizing exposure, while 'shelter_green' and 'warm_brown' dominate the right, suggesting safety and enclosure. The main contrast occurs along a vertical split where the warm hues gradually replace the cool, creating an echo of softness meeting pressure. The broken pixels add imperfections to symbolize the fragility of the borders between these emotions, emphasizing the tension of the opposing forces while maintaining an abstract identity.</desc>
