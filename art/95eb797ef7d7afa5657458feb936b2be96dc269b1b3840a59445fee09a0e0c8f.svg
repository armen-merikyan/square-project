<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">The artwork conveys the emotional tension between joy and grief through a deliberate juxtaposition of clean patterns and chaotic disruptions. The palette combines bright yellows and oranges to represent joy with deep blues and muted purples embodying grief, creating a visual narrative of hope climbing amidst sorrow. The transition from structured noise on one side to fragmented stripes on the other illustrates a movement from stability towards emotional chaos, capturing the duality of human experience as colors collide and overlap, evoking both light and heaviness. The 'broken pixels' introduce imperfection, allowing the piece to resonate with the raw edges of life.</desc>
