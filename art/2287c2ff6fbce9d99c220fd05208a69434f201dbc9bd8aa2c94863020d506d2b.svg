<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hinged Balance</title>
  <desc id="desc">The emotional tone is a juxtaposition of rigidity (control) and fluidity (surrender). This is reflected in the contrast of the warm coral and soft amber colors against the cold slate and blue-black. The central collision occurs where the radial pattern of surrender transitions into the structured stairs of control, depicting a tension between overflow and containment. The palette evokes a sense of connection amidst alienation, symbolizing the struggle between a measured approach and emotional release. The patterns interact, creating dissonance while still providing areas of negative space to breathe, emphasizing both emotion and disruption.</desc>
