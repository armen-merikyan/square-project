<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This composition embodies the emotional tension of rage versus calm, with the use of a dynamic palette. The darker reds represent the intense feelings of rage bursting forth while the cooler pale blues and whites symbolize calmness striving to contain it. The layout showcases two small centers of contrasting colors (red and blue) pulsing towards each other, creating a sense of collision in the middle of the square. The barcode pattern representing calm is interrupted by the patchwork of rage, resulting in a rhythmic ebb and flow throughout the piece. Broken pixels are scattered, serving as intentional disruptions, highlighting the unresolved tension.</desc>
