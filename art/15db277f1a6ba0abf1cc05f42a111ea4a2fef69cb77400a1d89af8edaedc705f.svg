<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Yearning</title>
  <desc id="desc">The emotional tone speaks to the tension between desire and emptiness. The palette, comprising warm tones of hot coral and blood orange juxtaposed with the coolness of charcoal and hollow blue, represents this contrast. The main collision occurs near the center where the warm, saturated colors meet the quiet fields, symbolizing the struggle of desire against the boundaries of emptiness. The arrangement allows for intentional disruptions with broken pixels that echo the theme of containment, ensuring a visually dynamic exploration of the seed's themes.</desc>
