<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Emotions</title>
  <desc id="desc">This artwork captures the tension between vulnerability and strength through stark color contrasts and pattern dynamics. The palette, derived from muted cream, red oxide, and blackened plum, mirrors the interplay of safety and exposure. A central collision occurs between the vibrant red oxide of strength and the delicate muted cream symbolizing vulnerability, creating a visual narrative of conflict and balance. Broken pixels disrupt neatness, highlighting fragility within strength, and the feathered edges suggest an ongoing push and pull between the two emotions. The overall composition conveys a sense of tension, yet with spaces that invite contemplation.</desc>
