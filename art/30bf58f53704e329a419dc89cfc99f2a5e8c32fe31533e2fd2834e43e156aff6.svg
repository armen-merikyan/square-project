  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition explores the delicate balance between vulnerability and strength, represented by a pale aqua core surrounded by darker hues. The contrast heightens emotional tension, with soft lattice patterns inside gently breaking against denser embers at the edges. The palette of pale aqua, mist gray, alarm red, ink blue, and clear white illustrates a clash of urgency and calm. The collision occurs at the center and the edges, creating a sense of safety exposed to the elements.</desc>
