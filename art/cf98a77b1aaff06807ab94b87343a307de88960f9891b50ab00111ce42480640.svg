<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tides of Certainty</title>
  <desc id="desc">The emotional tone reflects the tension between certainty and curiosity through contrasting warm and cool colors. The composition leverages a palette of warm coral and soft amber, representing the calm and clear aspects of certainty, juxtaposed with cold slate and blue-black, embodying the chaotic intrigue of curiosity. The main collision occurs in the center, where the vibrant warm colors ebb towards the cooler tones, simulating the dynamic flow described in the seed. This captures the essence of rising signals amidst the chaos, illustrating a journey from certainty’s structured pulse upward into curiosity’s open paths.</desc>
