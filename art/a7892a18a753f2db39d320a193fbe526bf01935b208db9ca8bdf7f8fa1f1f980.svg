<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Currents</title>
  <desc id="desc">The emotional tone reflects the struggle between strength and vulnerability, manifesting as a dense center surrounded by contrasting, turbulent borders. The color palette, drawn from cosmic indigo, cold gold, and deep teal, evokes a sense of awe and terror, reinforcing the intensity of the emotions at play. The striking collision is at the center where smooth radial patterns of vulnerability break against the jagged stripes of strength, creating a visual push-and-pull that mirrors the emotional conflict inherent in the seed. Negative space allows for breathing room amid chaos, suggesting an underlying desire for balance amidst turmoil.</desc>
