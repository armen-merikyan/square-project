<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Longing</title>
  <desc id="desc">This piece captures the emotional tension between longing and resolve through a palette of stain brown, ash gray, and warm ivory, merging two patterns reflecting the state of mind. The upper half is dense with shattering forms representing resolve, while the lower half uses flowing marks to illustrate longing. The stark contrast of dark and light colors creates a visual sensation of rising and falling, echoing the constant push and pull. The collision occurs at the center where both emotional patterns meet, symbolizing the heart’s struggle between chaos and order.</desc>
