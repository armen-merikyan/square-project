<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">The emotional tone reflects a struggle between restlessness and peace, captured through contrasting patterns. The palette of muted blues and grays conveys a sense of melancholy while introducing pops of soft cyan that speak to moments of clarity. This contrast is focal at the center as warm accents disrupt the cooler tones—symbolizing the sporadic nature of memory amidst the quest for calm. The edge style promotes a gradual retreat from disturbed patterns into negative space, embodying the tension of unresolved thoughts. Broken pixels are strategically placed to enhance the feeling of imperfection in harmony.</desc>
