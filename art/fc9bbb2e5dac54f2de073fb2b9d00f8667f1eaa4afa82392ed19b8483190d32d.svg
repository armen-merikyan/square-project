<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">The emotional tone juxtaposes restlessness and peace by employing a palette that balances dark hues of void black and cosmic indigo against the lighter accents of star white and cold gold. This evokes a sense of tension and release, where the central area represents an exposed calm, while chaotic strokes of deep teal and introspective combinations signify the encroaching restlessness. The two patterns—broken frame and braid—collide dynamically within an open gate layout, highlighting where tranquility meets flickers of agitation towards the corners, embodying the struggle between stillness and motion.</desc>
