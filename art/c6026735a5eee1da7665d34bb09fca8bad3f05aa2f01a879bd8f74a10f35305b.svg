<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">This composition embodies the emotional tug-of-war between panic and control. The palette of 'ancient_fire' features burnt orange and dark red for warmth and intensity, while charcoal and gold provide grounding contrasts. The edges are left weighted with chaotic broken dots to symbolize panic, while the wave shape suggests control's spark, encircled by layers of dense color to create a feeling of pressure that ebbs and flows. The central focus, marked by clearer patterns, is juxtaposed against dense arrangements pushing from the edges, echoing the juxtaposition of order and chaos.</desc>
