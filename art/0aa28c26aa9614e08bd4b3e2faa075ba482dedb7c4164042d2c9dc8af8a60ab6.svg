<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Connections</title>
  <desc id="desc">The artwork embodies the tension between loneliness and connection through a palette that juxtaposes stark white with deep blacks and muted blues, representing isolation versus warmth. The design features a central 4x4 area mimicking connection with radial patterns using pale blue, surrounded by a noisy black border, symbolizing loneliness. The asymmetry and occasional broken pixels introduce feelings of disarray and memory, reflecting the emotional weight of the seed. The intentional placement creates a push and pull between the dense edges and the gentle core, depicting the fragility of connection amidst overwhelming feelings of isolation.</desc>
