<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Clarity and Chaos</title>
  <desc id="desc">This composition explores the emotional dichotomy of confusion and clarity, using a palette that juxtaposes vibrant electric blue and magenta with the dark grounding nature of black. The left side, representing clarity, employs a structured, frame-like arrangement of clean lines, while the right side embodies confusion through scattered, rain-like patterns of color that disrupt symmetry. The placement of broken pixels adds to the feeling of chaos interrupting a balanced design, creating an unresolved tension that invites viewers to reflect on their own experiences of clarity pierced by confusion.</desc>
