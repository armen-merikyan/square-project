<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow of Emotion</title>
  <desc id="desc">This artwork embodies the tension between restlessness and peace. The top half, dominated by deep teal and stark star white, represents restlessness through a crosshatch pattern, evoking a sense of unsettled energy and dynamic movement. In contrast, the bottom half, with its soothing cosmic indigo and void black, embraces peace through a braided pattern, illustrating calmness and symmetry. The collision of bright accents in the upper section against the muted fields below fosters visual tension, reflecting the struggle between serenity and chaos. Broken pixels disrupt the flow, symbolizing the unpredictability of emotions.</desc>
