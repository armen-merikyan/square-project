  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone reflects the tension between the warmth of safety and the bright vulnerability of exposure. The palette combines warm browns and greens for a sense of grounding safety with cold whites and pale skin tones suggesting fragility and openness. The left side features dense islands of safety contrasting with thin stacks of exposure on the right. The collision occurs in the center, where the contrasting patterns overlap, creating a dynamic balance of colors that evoke a journey from calm acceptance to the fragility of being open.</desc>
