<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal Against Static</title>
  <desc id="desc">This artwork embodies the emotional tension between restlessness and peace, utilizing a palette that contrasts warm tones with muted grays to evoke a sense of unsettled calm. The color rust acts as a fiery accent within calming fields of moss green and bone white, suggesting a memory of motion that conflicts with the tranquility of the surrounding space. The entrance of broken pixels disrupts the overall flow, merging the defined edges into a chaotic center, emphasizing the dynamic interplay of light and dark. The composition is structured around a hollow center that radiates outward, embodying the idea of a pulse trying to break through static while leaving negative space intact, enhancing the feeling of unresolved motion and echo.</desc>
