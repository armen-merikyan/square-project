<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This composition captures the struggle between relief and dread through a careful arrangement of color and pattern. The use of soft gold and pale green represents relief, radiating warmth and brightness, while black and dark violet signify dread, creating a grounded tension within the piece. The layout flows outward, showcasing the contrast between densely packed darker tones and the lighter, more open pixels, suggesting an emotional journey from pressure to release. The grid of lighter colors introduces a rhythm against the darker rain-like pattern, encapsulating the emotional collisions throughout the design.</desc>
