<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragments of Contrast</title>
  <desc id="desc">This piece embodies the tension between longing and resolve through spatial and color dynamics. The warm white and powder pink signify an emotional warmth, representing the yearning aspect, while the steel gray and carbon black provide structural strength, echoing the theme of resolve. The deliberate placement of broken pixels introduces imperfection, symbolizing damage and repair. The central collision occurs on the left, where warm tones intersect with sharper contrast, resulting in a pulse-like effect. This layout creates tension and resolution across the grid, resonating with the thematic seed's emotional complexity.</desc>
