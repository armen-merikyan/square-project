<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center of Collision</title>
  <desc id="desc">This artwork captures the emotional tension between defiance and submission, where a strong focal point in burnt orange (representing defiance) is met by the softer, receding presence of dark red (representing submission). The sharp edges of the scar pattern create a hard interruption against the softer shatter pattern that forms the background, emphasizing the struggle between order and chaos. The use of charcoal as a transition color provides depth, while hints of gold offer a glimmer of hope amidst the turmoil. The flow is intentionally directed from the edges inward, suggesting a pull towards the central conflict, symbolizing an unresolved emotional tension.</desc>
