<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">The artwork conveys the emotional dichotomy between 'defiance' and 'submission', using a palette that combines warmth with coolness to illustrate tension. The bright contrasts symbolize defiant bursts amidst the subdued tones of submission, creating a clash at the center that serves as the focal point. The chosen colors suggest safety ('shelter_green', 'warm_brown') and exposure ('open_blue', 'cold_white'), embodying the space between protection and vulnerability. The broken pixels represent glitches, adding to the overall sense of interruption and a chaotic pulse against a quiet backdrop, while adhering to the asymmetry dictated by the flow of zigzag.</desc>
