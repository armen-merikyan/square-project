<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This abstract composition evokes the emotional dichotomy of restlessness and peace. The palette, which includes deep reds and muted creams, captures the essence of heat against calmness—flame-like accents meeting darker tones that suggest shadow and memory. The main contrast emerges in the overfilled corner, symbolizing the chaotic rush of feeling, while the surrounding quieter areas allow for reflective space, embodying peace. This arrangement illustrates the idea of motion (restlessness) clashing with moments of stillness (peace), adhering closely to the seed's themes of conflict and resolution.</desc>
