<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Convergence of Tension</title>
  <desc id="desc">The emotional tone explores the clash between peace and restlessness, reflected in the color choices. The palette consists of calming tones like pale aqua and mist gray juxtaposed with sharp alarm red and deep ink blue, creating a dynamic tension. The main collision appears diagonally across the square, where the deep colors intrude into the lighter spaces, suggesting a struggle between calm and chaos. The split-screen pattern represents peace while the pulse marks convey restlessness, merging in a way that leaves space for both emotions to coexist. Broken pixels punctuate the surface, breaking up any sense of uniformity to reinforce the idea of interruption.</desc>
