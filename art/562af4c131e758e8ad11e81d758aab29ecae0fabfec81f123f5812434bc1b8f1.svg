<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects a delicate interplay between vulnerability and strength, using a palette of pastel hues that evoke a sense of melancholy wonder. The colors—rain blue, lavender gray, soft cyan—serve as a muted contrast, while the deeper muted plum acts as an anchoring field. The main collision happens in the center, where the ‘broken_frame’ and ‘glitch’ patterns intersect, symbolizing the tension of exposure and protection. This tension is reflected in the sparse arrangement of pixels, with intentional disruptions creating the sense of an imperfect yet beautiful structure, reminiscent of life's fragility versus its resilience.</desc>
