<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Tension</title>
  <desc id="desc">The artwork reflects the emotional tension between softness and severity. The color palette—featuring powder pink and sharp crimson—contrasts soft and harsh tones, symbolizing the interplay of guilt and forgiveness. The collision occurs at the center where the stacked softness meets the ember-like severity, creating an evocative threshold. This layout, with density at the bottom and lightness rising, embodies the struggle and release between polar emotions, illustrating the spiral of internal struggle characteristic of the seed's themes.</desc>
