<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This piece embodies the emotional contrast between joy and grief through color arrangement and spatial flow. The palette incorporates bright yellows and oranges symbolizing joy, juxtaposed against deep blues and muted purples reflecting grief. The split horizontal layout creates a distinct separation of emotion, with the upper half radiating warmth and vibrancy, while the lower half conveys a sense of heaviness and introspection. The pattern structure evokes both order and chaos, suggesting an orbiting dynamic, while broken pixels introduce imperfection, representing the collision between hidden and exposed feelings.</desc>
