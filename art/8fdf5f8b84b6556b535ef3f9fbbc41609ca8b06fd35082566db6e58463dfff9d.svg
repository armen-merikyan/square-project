<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tides</title>
  <desc id="desc">This composition captures the duality of joy and grief, using colors from the 'joy_grief' palette to represent the emotional tension. The top half employs warm yellows and oranges to signify joy, arranged in an expanding maze pattern that evokes a sense of upward movement and hope. In contrast, the bottom half utilizes muted purples and deep blues portraying grief, arranged in a crosshatch pattern to create density and heaviness. The jagged edges of the piece suggest disruption, while broken pixels introduce imperfection, reinforcing the theme of fragmented emotions. The asymmetrical layout with a higher density at the bottom and lighter upper half embodies the struggle between chaos and order, resonating with the seed's essence.</desc>
