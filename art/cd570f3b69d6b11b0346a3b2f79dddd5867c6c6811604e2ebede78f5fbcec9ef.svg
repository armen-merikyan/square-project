<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork explores the emotional tension between safety and exposure. The left side utilizes a patterned checker of warm browns representing shelter, crystallizing feelings of protection, while the right side employs a target-like arrangement of cooler colors, suggesting the open vulnerability of exposure. The overall palette of shelter green, warm brown, pale skin, cold white, and open blue enhances the contrast between warmth and coolness. The primary collision occurs at the vertical center, where the two emotions overlap and engage in a visual interplay of soft backgrounds and defined edges, embodying the braiding against ripple conceptual flow drawn from the seed's essence.</desc>
