<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Boundaries</title>
  <desc id="desc">The emotional tone encapsulates the struggle between desire (represented by the vibrant colors of hot coral and blood orange) and restraint (symbolized by the muted charcoal and hollow blue). The palette reflects a push-pull of saturated warmth colliding with cool containment. The main contrast emerges in the center where the flood of desire intermingles with the maze-like restraint, creating a dynamic interplay. The spiral and lattice concepts suggest a complexity to this relationship, enhancing the feeling of tension through the layout of repeated patterns. Negative space provides breathing room amidst the emotional intensity, aligning with the themes of overflow versus containment.</desc>
