<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Signals</title>
  <desc id="desc">This piece navigates the emotional tension between trust and suspicion. The palette of cool static gray and vivid electric blue contrast against the deep black, representing the weight of suspicion, while vibrant signal green offers a soft glow of trust amid overwhelming noise. The central cluster of bright colors introduces disruption against a foundation of darker hues, capturing the fragility of trust amidst suspicion. The pattern flows diagonally, creating a sense of movement and impact through interrupted channels, emphasizing dynamic moments of collision and resonance.</desc>
