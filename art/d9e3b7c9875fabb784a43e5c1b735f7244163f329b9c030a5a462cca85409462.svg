<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal and Silence</title>
  <desc id="desc">This piece explores the emotional duality of 'spark and ash' through contrasting colors and patterns. The palette combines warm whites and sharp crimson, symbolizing urgency and brightness against the muted tones of carbon black and steel gray, representing restraint and dust. The interaction of vibrant 'tide' patterns collides with the static, jagged 'channels' of ash, creating a dynamic tension that embodies the struggle between resilience and fragility. The quiet channel of negative space suggests contemplation amidst the dense color of emotion.</desc>
