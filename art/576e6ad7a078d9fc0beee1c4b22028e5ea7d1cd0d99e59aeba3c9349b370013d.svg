<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Broken Harmony</title>
  <desc id="desc">The emotional tone reflects a tug-of-war between warmth and coldness, symbolizing love and betrayal. The palette of pink, red, gray, and dark maroon presents a dichotomy of warmth (representing love) and muted, somber tones (representing betrayal). The central contrast occurs diagonally, where vibrant reds clash against the softer grays. The seed's abstract themes of 'empty room' and 'burned edges' inspired the jagged texture created through broken pixel placements, reflecting emotional disruption and creating tension throughout the piece. Each color block shifts from dense warm zones to lighter, more desolate areas, creating an upward flow suggestive of hope amidst fractures.</desc>
