<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone juxtaposes 'joy' as bright and open against 'grief' as heavy and blue-toned. The palette is filled with warm yellows and oranges on the left, symbolizing expansion and brightness, while deep blues and muted purples drift into the right, embodying fragmentation and weight. The main contrast occurs along the vertical split where colors collide, creating an interplay of light and dark. The seed's themes inspire a wave-like flow in the arrangement, mirroring the push and pull between these emotions. The presence of 5 broken pixels introduces imperfection, underscoring the chaotic nature of the feelings, while at least 10% negative space maintains a balance, allowing the emotional intensity to breathe.</desc>
