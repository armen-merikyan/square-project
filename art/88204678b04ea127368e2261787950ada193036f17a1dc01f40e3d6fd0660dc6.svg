<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger's Prison</title>
  <desc id="desc">This composition captures the emotional tension between desire and restraint. The palette of hot coral and blood orange evokes warmth and yearning, representing desire, while the muted charcoal suggests the weight of restraint. The central dense cluster of warm tones collides with the colder, muted edges, emphasizing the conflict and frustration of longing held back. The grid structure reflects the 'lattice against pressure' concept, with slight disruptions to indicate unresolved feelings. The main collision occurs toward the center, where vibrant colors pulse against the sealed, quiet edges.</desc>
