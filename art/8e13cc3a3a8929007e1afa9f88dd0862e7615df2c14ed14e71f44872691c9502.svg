<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone contrasts desire (warm pull, dense, active) with emptiness (quiet pressure, faint marks, minimal space). The palette, consisting of hot coral, blood orange, dust pink, charcoal, and hollow blue, reflects this tension through warm saturation juxtaposed against cool quietness. The layout emphasizes a split between the strength of desire filling the top four rows and the introspective nature of emptiness occupying the bottom, creating a tension that flows from vibrant saturation to a muted echo. The broken pixels introduce intentional disruptions in the color flow, symbolizing the struggle between reaching outwards and being constrained. This contrasts creates a central collision of intense and soft, with colors spiraling inwards towards both warmth and hollowness, embodying the interplay of longing and restraint.</desc>
