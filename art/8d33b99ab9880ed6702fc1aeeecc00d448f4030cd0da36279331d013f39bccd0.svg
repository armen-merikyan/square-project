  <title id="title">Tension in the Frame</title>
  <desc id="desc">This artwork conveys a tension between the softness of warm whites and powder pinks against the sharp severity of carbon black and steel gray. The palette creates a push and pull that mirrors the duality of the seed concept, emphasizing conflict and resolution. The layout features a border with deliberate breaks, symbolizing separation and intersection of emotions. The main collision occurred centrally with dark and light colors coalescing, while soft fields pulse outwards, embodying a delicate balance of sound and silence, pressure and release.</desc>
