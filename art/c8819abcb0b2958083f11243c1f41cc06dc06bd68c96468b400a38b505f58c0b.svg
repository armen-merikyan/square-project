  <title id="title">Rise vs Fall</title>
  <desc id="desc">This artwork captures the tense dichotomy of panic and control through dense, jagged patterns versus softer gradients. The palette of black, dark violet, soft gold, and pale green suggests a clash of despair and hope. The main contrast lies in the checkerboard's chaos against the more controlled flame-like patterns, reflecting the push and pull of emotions as they rise and fall within the confines of the square. The edges are purposefully broken, implying the fragility of both states.</desc>
