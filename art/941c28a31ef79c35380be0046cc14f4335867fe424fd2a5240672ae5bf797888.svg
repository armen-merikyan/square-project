<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone hinges on desire's warmth clashing with the coldness of restraint, manifesting through a saturated palette of hot coral and blood orange against the muted charcoal and hollow blue. The core of desire bursts forth in the center, represented through dense clusters, while restraint's calmness holds the edges, creating a stark contrast. The abstract pattern embodies a spiral of pressure where desire seeks expansion but is met with sealed boundaries, evoking the conflict from the seed.</desc>
