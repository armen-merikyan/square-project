<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone blends vulnerability and strength, manifesting in the contrast between the dense, dark borders and the softer center. The color palette of navy, black, and dim cyan conveys a lonely signal of isolation and depth, while the single white serves as a point of light, representing exposure. The main collision occurs at the center, where a flood-like pattern meets the mirrored strength of the border, embodying the feeling of simultaneous protection and exposure. This pattern reflects the collision of emotional narratives within the abstract structure, emphasizing the push and pull between vulnerability and strength.</desc>
