<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This piece captures the conflict between defiance and submission through its rigid structures and soft arcs. The palette combines lime and electric blue for the upward defiance and contrasting black and magenta for the softer, collapsing edges. The main collision occurs in the center, where sharp angles of brightness meet the gentle fold of darker tones, echoing the complexity of emotions represented in the seed. The layout of falling pixels creates a sense of movement, while spaces intentionally left empty maintain an air of tension, hinting at unresolved narratives.</desc>
