<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This composition captures the emotional conflict of joy versus grief through warm yellows and oranges engendering joy, contrasted with muted purples and deep blues representing grief. The layout flows bottom to top, suggesting an ascent towards hope amidst layered patterns. The use of crosshatch and radial patterns embodies the push and pull between the two emotions. The central area feels both protected and fractured, highlighting the tension of safe versus threatened. The edges feature hard, jagged definitions, emphasizing chaos while maintaining a structured core, allowing for both visual and emotional engagement.</desc>
