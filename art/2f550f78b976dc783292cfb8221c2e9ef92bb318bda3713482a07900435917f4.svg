<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This piece captures the emotional tension between love and betrayal using a carefully selected palette of warm pinks and reds contrasted by cooler greys and dark maroons. The left half embodies love with softer, circular patterns, while the right half represents betrayal through broken, ring-like formations. The placement of colors suggests a battle between symmetry and disruption, a quiet room interspersed with sharp interruptions. The main contrast is created where warm colors collide with darker tones, suggesting the tension of conflicted emotions, all while preserving a significant amount of negative space to evoke feelings of emptiness and unresolved conflicts.</desc>
