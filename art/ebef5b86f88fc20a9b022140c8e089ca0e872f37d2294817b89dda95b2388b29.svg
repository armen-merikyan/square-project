<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Calm</title>
  <desc id="desc">The emotional tone contrasts restlessness with peace, weaving a narrative of tension and tranquility. The chosen palette of deep blacks and soft blues suggests a stark balance of heavy, chaotic emotion against serene calmness. The black represents the heavier emotional weight of restlessness, while the pale blue introduces a sense of peace and quiet. The main collision resides at the center with a chaotic pattern that interrupts the quiet gradient, creating an overarching narrative of struggle amidst calm. The forms of 'embers' and 'stairs' play off each other through structured chaos, reflecting the duality of the seed in an abstract way.</desc>
