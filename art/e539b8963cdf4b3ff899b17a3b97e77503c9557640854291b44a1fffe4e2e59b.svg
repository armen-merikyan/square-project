<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition explores the tension between vulnerability and strength through a delicate arrangement of color and pattern. The palette, which includes shades of pink, red, gray, and dark maroon, encapsulates both warmth and depth, symbolizing emotional contrasts. The soft glows of pinks and reds represent vulnerability, while the deeper, shadowy gray and maroon suggest strength. The arrangement emphasizes an off-center dominant color (maroon), which symbolizes strength, while broken dots represent moments of vulnerability. There is a clear collision of soft, warm hues against muted shadows, creating a narrative of exposure, protection, and balance within the constraints of negative space. The use of broken pixels adds intentional disruption, mirroring the imperfections of emotional experiences, particularly around the edges, reinforcing the theme of shelter against external pressures while still allowing glimpses of open vulnerability.</desc>
