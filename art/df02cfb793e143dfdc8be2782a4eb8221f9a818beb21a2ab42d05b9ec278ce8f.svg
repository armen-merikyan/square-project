<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Ascent</title>
  <desc id="desc">This artwork captures the emotional duality of joy and grief through contrasting warm and cool colors. The palette features bright yellows and oranges to symbolize fleeting joy, juxtaposed with deeper blues and muted purples representing the weight of grief. The upward and downward pixel movements create a tension that embodies the struggle between hope and despair. The grid-like patterns of grief are layered with sharper, jagged patterns of joy, fostering a sense of collision and unresolved tension throughout the composition. The empty spaces serve to emphasize the emotional gaps experienced in moments of both happiness and sorrow.</desc>
