<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Convergence of Tensions</title>
  <desc id="desc">This artwork captures the emotional tension between desire and restraint. The warm colors, representing desire, overflow diagonally from the corner, invoking a relentless pulse. Meanwhile, the muted tones embody restraint, creating an echo of containment; they clash in a visually dynamic way. The palette of hot coral, blood orange, and charcoal dominate, suggesting intensity with balanced depths of hollow blue. The swirling glitch pattern against the halo design enforces the nature of longing amidst confinement. The main collision occurs in the center, suggesting a struggle, while intentional broken pixels disrupt the flow, representing moments of betrayal. This alludes to the complex interplay of human emotions, beautifully translated into an abstract form.</desc>
