<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Constellation</title>
  <desc id="desc">This composition embodies the duality of tenderness and rage with a visual representation of collision and contrast. The palette, consisting of deep black and bright white, paired with the soft pale blue, evokes both the weight of anger and the lightness of gentleness. The main contrast occurs at the center where the black dense pixels meet scattered white and pale blue, suggesting a dynamic struggle between heavy emotions and gentle moments. The pattern of channels representing rage collides with the split-screen softness of tenderness, creating a visual rhythm. The 'island and sea' layout embodies a small dense emotional presence surrounded by quieter spaces, reflecting the internal struggle between the two conflicting feelings.</desc>
