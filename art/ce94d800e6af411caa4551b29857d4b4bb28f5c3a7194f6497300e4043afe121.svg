<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Control</title>
  <desc id="desc">This artwork explores the emotional interplay of panic and control through a color palette embodying love and betrayal. Warm reds and soft pinks clash with darker maroons and grays, representing the tension between stability and instability. The layout of the pixels mimics falling elements, emphasizing the sensation of descent into chaos. The splits in color portray moments of interruption and conflict, while negative space reflects the emptiness of an ‘empty room’ feeling. The jagged edges signify the abruptness of emotional spikes, creating a visual rhythm that suggests both comfort and the fear of loss.</desc>
