<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Tension</title>
  <desc id="desc">This composition embodies a juxtaposition of relief and dread, highlighting their emotional contrasts. The dark depths of storm gray and near black represent the weight of dread, while the soft sky and faded gold evoke feelings of relief. The arrangement of bright tones in fragmented paths suggest incomplete repairs against looming shadows, embodying a slow spiral of persistence amidst chaos. The structure showcases broken pixels as intentional scars, enhancing the narrative of disruption and unresolved tension. The main collision occurs in the top left, where the heavy colors taper into lighter accents, simulating a struggle between heavy weight and lightness in the visual space.</desc>
