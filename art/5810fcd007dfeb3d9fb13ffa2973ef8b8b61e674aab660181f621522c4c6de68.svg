<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Fracture</title>
  <desc id="desc">This artwork captures the emotional conflict between confusion and clarity through the juxtaposition of soft sepia and faded blue tones. The central area, dominated by darker shades, suggests solidity and grounding, while the edges introduce lighter, more fragmented colors that evoke a sense of disarray and confusion. The choices reflect the seed’s theme of tension between structured clarity and chaotic perception. The broken pixel effect symbolizes imperfections in understanding, creating a visual dialogue between the solid center and the dynamic edges.</desc>
