<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of vulnerability and strength through a palette of deep, muted colors that contrast with brighter accents. The use of blackened plum and iron gray provides a sense of strength, wrapped around a softer core of muted cream symbolizing vulnerability. The central collision occurs where the strength-infused patterns of maze break away into softer crosshatch, representing vulnerability. The edges are uneven, signifying breaks where emotions seep through, creating a visual representation of pressure and release throughout the piece. The arrangement reflects a dynamic flow — a balance of density and emptiness, embodying the complex interplay of opposing emotions.</desc>
