<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This artwork encapsulates the emotional tension between 'panic' and 'control'. The warm colors of red and pink suggest the chaotic pulse of panic, while the cooler gray tones create a stabilizing presence, embodying control. The chosen palette emphasizes the push-pull between the two emotions. The radial pattern at the center suggests a focal point of control, while the broken dots spreading outwards represent the chaotic nature of panic. The composition contrasts dense clusters on the edges with more negative space towards the center, creating a sense of conflict that mirrors the theme of the seed.</desc>
