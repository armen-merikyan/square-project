<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tension between rage and calm shapes this piece, with an interplay of striking reds signifying rage and soft blues depicting calmness. The selected palette contrasts stark, warm hues fighting for space against the cooler blues, representing calm's attempts to contain the fiery outburst. The collision occurs predominantly in the center as bright red zigzag patterns characteristically slice through the tranquil bands of blue, creating a sense of dynamic interruption. This embodies the essence of the seed — a conflict of emotions interacting within defined boundaries and the chaos of eruptions amidst serenity.</desc>
