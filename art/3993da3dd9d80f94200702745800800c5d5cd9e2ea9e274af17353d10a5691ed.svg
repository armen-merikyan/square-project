<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Echoes</title>
  <desc id="desc">The emotional tone captures the tension of defiance against submission, represented by a center deeply saturated with dark colors that signify unresolved conflict while the edges are lighter, depicting an attempt to recede or submit. The palette of mourning black and deep blue establishes a backdrop of weightiness, while the pale yellow provides an accent of defiance. The main collision occurs in the center, where bold colors disrupt a lighter fringe, embodying resistance. Overall, the balance of dark and light reflects the interplay between these opposing emotions, creating a rhythmic, layered pattern that mimics the struggle between pressure and quiet.</desc>
