<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This artwork captures the tension between love and betrayal, utilizing a palette of warm pinks and reds contrasted against cool, muted grays and dark maroon. The top half features soft stripes that evoke warmth, symbolizing the comfort of love, while the bottom half employs a rain-like pattern to express betrayal's chaotic and dissonant nature. The interplay of sharp edges and soft transitions conveys conflict, as pairs of pixels create visual interruptions, reinforcing the emotional pull between feelings of connection and separation. The overall balance is punctuated by negative space, suggesting the emptiness that accompanies a shattered bond.</desc>
