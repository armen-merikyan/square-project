<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This piece embodies the emotional tone of vulnerability contrasted with strength. The palette of signal green, electric blue, and hot magenta creates tension through opposing warmth and coolness, representing sheltering safety versus unshielded exposure. The dominant use of dark colors corresponds to strength, while lighter blocks reflect fragile moments. The main contrast occurs at the center, where the collision of channel and ladder patterns interrupts their flow, signifying a breaking point amidst the struggle for balance. This association alludes to themes of safety versus exposure, inviting the viewer to reflect on these intertwined emotions.</desc>
