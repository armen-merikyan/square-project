<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">This composition embodies the struggle between joy and grief. The palette splits into warm yellows and oranges symbolizing joy on one side, while muted purples and deep blues encapsulate the heaviness of grief. The contrast emerges sharply at the center, where the patterns of crosshatch and frame interact, creating a tension that flares in the middle and dims at the edges. This plays into the seed's themes of symmetry versus break, where orderly repetitions clash with intermittent disruptions, exemplified by the broken pixels which offer an imperfection that mirrors the emotional landscape.</desc>
