<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow and Containment</title>
  <desc id="desc">This composition represents the tension between rage and calm through abrupt patterns and color contrasts. The vibrant reds symbolize rage, cutting into the cooler pale blue hues that represent calm, establishing a visual narrative of conflict and coexistence. The horizontal and vertical stripes evoke a sense of tension, where each interruption embodies fragments of the emotional struggle. The palette of red and pale blue, along with shades of black and white, emphasizes the edge of chaos against an undercurrent of serenity. The main collision occurs centrally, showcasing the clash between aggressive and passive impulses.</desc>
