<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Quiet Resistance</title>
  <desc id="desc">The emotional tone reflects the tension between defiance and submission, illustrated through the contrasting palettes of muted sepia and dust gray against vibrant accents of faded blue. The main collision occurs in the center with intense color disruptions that echo the feeling of conflict while layers recede to soft edges. The 'falling_pixels' layout suggests a cascade of emotions, with defined patterns of 'stepwell' for defiance breaking up the soft 'tide' of submission. The intentional distribution creates pockets of noise and calm, capturing the essence of the seed's dynamics.</desc>
