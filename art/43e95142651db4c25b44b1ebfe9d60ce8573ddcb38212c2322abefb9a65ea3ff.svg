<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Broken Resolve</title>
  <desc id="desc">This piece embodies the emotional tension between longing and resolve. The soft mint and sky blues represent longing and serenity, while the storm gray and near black convey the strength and edges of resolve. The upward layout evokes a sense of hope, while the scattered pattern of conflicting colors depicts the fractures within the journey. The central collision of muted dark colors with brighter edges illustrates the struggle between feeling contained and overflowing. The use of broken pixels adds intentional imperfections, symbolizing repairs and the scars of longing. This composition ultimately balances between the two emotional tones, reflecting a narrative of striving against disruption and fragmentation.</desc>
