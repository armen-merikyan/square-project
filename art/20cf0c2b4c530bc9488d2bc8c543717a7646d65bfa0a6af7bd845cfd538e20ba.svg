<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall</title>
  <desc id="desc">The emotional tone focuses on the contrast of tenderness and rage, embodied in an upward and downward flow of colors. The chosen palette mixes saturated red to symbolize anger and deep blacks for gravity, contrasted with soft pale blues representing calmness. The collision occurs centrally, where jagged edges of red interrupt the smoother threads of blue, embodying the inner struggle of rage versus tenderness. The 'hole' shape seed manifests as a void where collision and overlapping emotions exist, conveying a sense of tension and imperfection in a rising or falling motion.</desc>
