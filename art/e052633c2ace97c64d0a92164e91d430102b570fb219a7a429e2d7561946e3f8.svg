<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rising Tension</title>
  <desc id="desc">The emotional tone captures the clash between defiance and submission. The selected colors of moss green, bone white, rust, and stone gray evoke resilience against fragility. The chaos of broken pixels interrupts the orderly rise of colors, creating tension in the composition. The main contrast occurs in the center, where the vigorous crack pattern of defiance collides with the soft covering of submission, symbolizing the unresolved battle between resistance and yielding. The 'rising_signal' layout enhances the theme of upward struggle, suggesting hope amidst conflict.</desc>
