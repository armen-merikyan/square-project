<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece embodies the tension between desire and emptiness through a predominantly warm palette with contrasting muted fields. The main emotional tone is derived from a clash of passionate saturation and the chilling weight of absence, represented by the central collision of bright coral and deep charcoal. The corner-invasion layout captures desire as it spreads diagonally, while containing edges symbolize restraint, creating a feeling of being drawn toward yet held back. The use of broken pixels adds intentional disruption, further accentuating the theme of hunger restrained in a locked border.</desc>
