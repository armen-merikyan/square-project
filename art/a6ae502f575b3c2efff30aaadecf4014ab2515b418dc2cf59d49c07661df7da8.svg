<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Harmony</title>
  <desc id="desc">This piece captures the emotional duality of joy and grief through contrasting colors and patterns. The yellow and orange tones represent joy, radiating warmth and brightness, while the muted purple and deep blue introduce a sense of heaviness and depth associated with grief. The arrangement follows a central seed layout, where the brighter colors maintain a rhythmic, striped pattern against the stark cracked areas of the darker shades, echoing the tension of order versus chaos. The collision occurs where the stripes and cracks intersect, creating a visual dialogue between safety and threat, ultimately leaving negative space that emphasizes the unresolved emotion throughout the piece.</desc>
