<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Emotion</title>
  <desc id="desc">This composition embodies the emotional juxtaposition of joy and grief, represented by contrasting color choices and patterns. The palette juxtaposes warm yellows and oranges, symbolizing joy, against deep blues and muted purples representing grief. The sharp, hard edges imply conflicts and tensions between order and chaos. Each pixel arrangement creates an underlying rhythm; bright dotted patterns represent joy, expanding outward, while sinking ring patterns indicate the weight of grief. The main contrast happens in the center, where joy vibrantly pulsates against the darker, heavy background, creating a dynamic visual narrative of emotional conflict and resilience.</desc>
