<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Boundary Breach</title>
  <desc id="desc">This composition interprets the emotional duel between rage and calm through a dynamic juxtaposition of colors and forms. The palette of blacks and reds signifies the intensity of rage, while pale blues evoke a sense of calm. The top-left corner bursts with sharp, jagged red pixels to represent explosive energy, while cooler blue tones ripple outward, suggesting containment. The contrasting patterns of shatter and echo collide in both quadrant and rhythm, particularly at the corner where pressure peaks. This layout visually communicates the struggle between overwhelming emotion and subdued tranquility, embodying the conceptual essence of the seed.</desc>
