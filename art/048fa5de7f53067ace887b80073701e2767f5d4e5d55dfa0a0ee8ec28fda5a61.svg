<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Contrasts</title>
  <desc id="desc">The artwork embodies the emotional tension between softness and severity through a defined palette. The gentle hues of powder pink and warm white create a soft backdrop, while sharp crimson and carbon black inject severity and urgency into the piece. The top four rows exude warmth and a sense of healing, showcasing patchwork patterns that suggest subtle interactions. In contrast, the bottom rows feature more distinct pulse marks in stark colors, emphasizing sharp boundaries and a sense of weight. The central collision occurs where light meets dark, creating a focal point that invites contemplation amidst the chaos—echoing the seed themes of guilt and forgiveness.</desc>
