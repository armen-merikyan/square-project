<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This artwork explores the emotional tension between defiance and submission through a deliberately unbalanced color palette of warm yellows and oranges against cool deep blue and muted purples. The collision happens predominantly diagonally from the top left to bottom right, mimicking an invasion of defiance into a space of submission. The broken pixels introduce a sense of imperfection and disruption, emphasizing the constant clash between the structured and the chaotic. The quiet field of muted colors contrasts sharply with the dominant warm tones, leading to a visual narrative of tension and unresolved motion.</desc>
