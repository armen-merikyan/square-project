<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">The emotional tone captures the duality of joy (light, expanding) and grief (heavy, fragmented). The palette blends bright yellows and oranges representing joy with deep blues and muted purples symbolizing grief. The upper half expresses chaos through fragmented grid patterns, while the bottom introduces expanding mirror elements, creating a tension that echoes the underlying emotions. The hard edges separate the flow, transforming it into a visual split screen, encapsulating a dialogue between protection and threat.</desc>
