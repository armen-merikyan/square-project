<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Clash of Calm</title>
  <desc id="desc">This artwork explores the tension between restlessness and peace through contrasting colors and patterns. The chosen palette of lime, black, electric blue, and magenta reflects the emotional spectrum: lime offers a breath of peace, while black anchors the restless energy. The arrangement splits vertically; the left side embodies static calm with seamless fields of lime and black, while the right disrupts with a dynamic pattern of electric blue and magenta, embodying motion and conflict. The central collision occurs at the border, where the heavy dark mass of black confronts the vibrant accents, creating a vivid visual argument. The edge style features hard edges, emphasizing the abruptness of these emotional states. Broken pixels introduce intentional irregularities, suggesting the struggle between these conflicting feelings, ultimately cultivating a rich narrative of tension and release.</desc>
