<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This composition embodies the emotional tension between desire and emptiness through a contrasting color palette. The warm hues of hot coral and blood orange are set against cooler tones of charcoal and hollow blue, representing the pull of desire meeting the boundaries of restraint. The arrangement leans toward density in the center while allowing for negative space towards the edges, showcasing the quiet pressure of unfulfilled longing. Broken pixels introduce disruptions, symbolizing moments where desire seeps through structured edges.</desc>
