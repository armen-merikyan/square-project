  <title id="title">Inner Conflict</title>
  <desc id="desc">This artwork expresses the tension between tenderness and rage through contrasting colors and patterns. The chosen palette of reds for rage and pale blues and white for tenderness creates a visual push-pull, with warmth colliding against cooler tones. The layout allows an open flow where ordered stripes (representing tenderness) clash with sharper edges (expressing rage) in the center, creating a dynamic emotional terrain. Broken pixels reinforce the sense of disruption and vulnerability, reflecting the complexities of guilt and forgiveness encompassed in the seed.</desc>
