<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Connections</title>
  <desc id="desc">The emotional tone contrasts feelings of loneliness with fleeting connections. The palette features warm, earthy tones of burnt orange, dark red, charcoal, and gold, representing ancient fire—a flickering warmth amidst darkness. The grid motif illustrates loneliness, while vibrant colors bursting through scattered arrangements suggest moments of connection. The top-heavy layout emphasizes isolation, with concentrated colors at the top disrupting the otherwise neutral base, embodying the battle between feeling hidden and exposed.</desc>
