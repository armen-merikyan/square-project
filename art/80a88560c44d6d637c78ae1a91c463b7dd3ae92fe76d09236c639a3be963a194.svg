<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece embodies the tension between softness and sharpness, juxtaposing tender blue hues against explosive reds. The palette reflects emotional states: softer colors symbolize tenderness and protection, while stark reds scream rage and agitation. The dominant deep red accentuates the center of the grid, creating a collision with surrounding muted blues, which serve as a shield. The broken pixels introduce intentional disruptions, symbolizing the unpredictability of emotions in contrast. The pattern emerges from the metaphorical 'veil', suggesting layers of complexity and the nuances between exposure and shelter.</desc>
