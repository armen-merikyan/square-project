<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Ashes</title>
  <desc id="desc">The emotional tone captured here reflects the tension between warmth and coolness, using a palette that balances muted, ash-like colors with bright, energetic highlights. The arrangement emphasizes a central collision, representing the argument of spark (energy) versus ash (restraint). The jagged pattern overlays lead to a wave-like flow across the canvas, with the soft sky blue and faded gold suggesting resilience against a backdrop of storm gray, highlighting the dichotomy of memory versus erasure. The edge style of 'lit edges' frames the center, creating a dynamic interaction between forms, while leaving areas of quiet space enhances the overall tension within the art.</desc>
