  <title id="title">Balance of Tensions</title>
  <desc id="desc">This artwork embodies the emotional struggle between control, represented by dense, dark tones, and surrender, illustrated through lighter, quieter colors. The palette contrasts deep teal and void black with star white and cold gold, creating a dynamic visual tension. The main collision occurs in the center, where the dark colors press against sharper, brighter accents, visually narrating the theme of control vs. surrender. The patterns emerge through a split vertical layout, allowing density and quietness to coexist while maintaining an abstract harmony.</desc>
