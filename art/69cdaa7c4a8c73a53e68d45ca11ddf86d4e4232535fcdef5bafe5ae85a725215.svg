<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall</title>
  <desc id="desc">The emotional tone juxtaposes grief's deep melancholy against joy's spark of life. The palette reflects this tension, with deep blues embodying sorrow and warm yellows symbolizing joy. The grid pattern on the bottom half contrasts with the chaotic crosshatch atop, illustrating how emotions can be ordered yet chaotic simultaneously. The majority of the piece remains open, allowing for breathing space yet hinting at hidden depths. The collision occurs where the warm tones intersect with cooler hues, representing the unpredictable nature of emotional experiences.</desc>
