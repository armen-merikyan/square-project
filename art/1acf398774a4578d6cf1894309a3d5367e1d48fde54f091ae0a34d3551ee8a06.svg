<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Dissonance</title>
  <desc id="desc">The abstract pattern expresses the emotional tone of confusion versus clarity through the juxtaposition of muted and sharp colors. The palette of sepia, tan, dust gray, and faded blue reflects a 'broken memory' theme, suggesting nostalgia intertwined with lost clarity. Contrasting regions of dense radial patterns represent confusion, while the framing of clearer colors around the edges signifies clarity. The intentional placement of broken pixels throughout creates an unsettling tension that disrupts the symmetrical flow, echoing the conflict between stable and unstable feelings. The arrangement suggests a journey from chaos to coherence.</desc>
