<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">The emotional tone of this piece reflects the tension between tenderness and rage, achieved through a palette of deep red, muted black, pale blue, and soft white. The main contrast occurs diagonally, where rage represented by jagged red threads fights against the softness of tenderness illustrated with gentle pressure bands in light blues and whites. The composition encapsulates an internal struggle, the collision of heat and calm. The shape from the seed, although not represented literally, manifests through the patterns of interruption and flow, suggesting something fragile that fights against chaos.</desc>
