<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone explores the tension between defiance and submission, expressed through a contrasting palette of dark and light tones. The 'lonely_signal' color palette of navy, black, single white, and dim cyan inherently conveys isolation and internal conflict, mirroring the duality of the seed. The central 4x4 grid portrays defiance with a broken pixel frame, while the edges, represented in a checker pattern, adhere to submission. The flow from left to right emphasizes the dynamics of weight and noise, with the bottom weighted to suggest heaviness pressing upwards. The contrast emerges starkly between the rigid edges and the softer core, creating a sense of unresolved conflict and interrupted motion.</desc>
