<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veins of Resolve</title>
  <desc id="desc">This composition captures the emotional tug-of-war between longing and resolve, using a palette that evokes both warmth and strength. The deeper hues of blackened plum convey longing, enveloping the center's smaller island of muted cream, representing the warmth of resolve. The collision at the center creates a point of tension, where these emotional currents intersect, while the outer layers in iron gray reflect chaos, drawing the eye into the distance. Broken pixels introduce subtle disruptions, mirroring emotional scars that challenge composure. The balance of dense vs. empty spaces speaks to the intricate relationship between intimacy and distance, suggesting a layered emotional landscape.</desc>
