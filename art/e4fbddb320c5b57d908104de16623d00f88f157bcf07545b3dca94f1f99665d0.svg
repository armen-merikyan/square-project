<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast and Convergence</title>
  <desc id="desc">The artwork captures the emotional conflict between rage and calm using a palette that contrasts deep blacks and vibrant reds with cooler pale blues and whites. The black and red surge from the center, communicating explosive emotion, while the cooler colors attempt to create pattern and calm at the edges. This juxtaposition generates a swirling tension throughout the piece, suggesting the inner struggle and balance between opposing feelings. The 'broken pixels' strategy enhances the sense of imperfection in emotional expression, while the overarching diagonal pattern adds to the feeling of ascendant conflict. Negative space is preserved to allow each color’s impact to resonate visually.</desc>
