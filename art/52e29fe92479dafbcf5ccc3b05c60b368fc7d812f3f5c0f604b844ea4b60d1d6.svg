<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This composition embodies the emotional tug-of-war between joy and grief. The upper half employs bright, warm colors that suggest expansion and lightness, creating a sense of joy, while the lower half uses darker, muted tones to express heaviness and fragmentation associated with grief. The palette transitions from bright yellows and oranges to deep blues and muted purples, representing the chaos and order of emotional experiences. The patterns reflect the tension within these feelings, with uplifting teeth-like shapes contrasting against fragmented broken dots. The visual intersection creates a pulse of emotional conflict, inviting the viewer to explore the space between exposure and concealment.</desc>
