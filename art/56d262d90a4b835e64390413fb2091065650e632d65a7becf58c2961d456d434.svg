  <title id="title">Tension of Boundaries</title>
  <desc id="desc">The emotional tone shifts between the heat of desire and the coolness of restraint. The palette combines saturated reds and muted creams with blackened plum for depth, capturing the struggle between overflowing passion and containment. The main collision occurs in the center where vibrant colors rise, breaking through muted areas, illustrating a battle between expansive desire and oppressive restraint. This abstract composition evokes a feeling of conflict, with some sections holding back warmth while others reach towards brightness.</desc>
