<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall</title>
  <desc id="desc">The emotional tone reflects the tension between joy and grief. The palette combines bright yellows and oranges to represent joy against deep blues and muted purples depicting grief, showcasing a stark contrast in emotional weight. The arrangement splits the 8x8 grid horizontally, signifying a dynamic push and pull between the two emotions. The flow of the colors mimics waves, with brighter colors crashing against darker hues, symbolizing joyful moments that disrupt the heaviness of grief. Broken pixels introduce imperfection, enhancing the theme of hidden versus exposed emotions.</desc>
