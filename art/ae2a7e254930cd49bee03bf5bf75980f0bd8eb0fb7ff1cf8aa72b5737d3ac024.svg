<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragments of Desire</title>
  <desc id="desc">This artwork explores the emotional tension between emptiness and desire. The color palette features warm tones of sepia and tan juxtaposed against cooler faded blue and dust gray, creating a visual conflict that evokes feelings of longing and nostalgia. The top half emulates a rising flow with brighter colors moving upward, representing desire, while the bottom half uses muted colors to symbolize emptiness, creating a sense of descent. A pattern of 'teeth' in the top area transitions into 'target' shapes below, reflecting the struggle and collision of these emotions. The asymmetrical arrangement introduces a constant whisper of unresolved tension, enriched by the presence of broken pixels that suggest imperfection, emphasizing the narrative of longing and fragmentation.</desc>
