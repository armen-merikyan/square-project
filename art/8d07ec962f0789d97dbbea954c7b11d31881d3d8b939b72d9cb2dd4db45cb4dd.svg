  <title id="title">Fragmented Duality</title>
  <desc id="desc">This pixel art captures the emotional tension between clarity and confusion through contrasting colors and forms. The dusty blues and sepias represent a broken memory, emphasizing a sense of nostalgia and disruption. The checker pattern interspersed with solid fields creates a visual friction that reflects the interplay of certainty and chaos, while the thin borders keep the focus on the collision of feelings. The design's organization hints at a mirror, but with intentional disruptions to evoke dissonance, exploring the concept of false symmetry and the emotional weight of imperfection.</desc>
