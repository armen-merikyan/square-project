<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality in Motion</title>
  <desc id="desc">The emotional tone captures the tension between rage and calm, illustrated through the contrasting palette of deep reds and serene pale blues. This 8x8 pixel composition features an intentional imbalance created by sharp, jagged red pixels (representing rage) cutting through horizontal layers of calm, pale blue (indicating serenity), evoking a story of collision and resolution. The use of black represents a mirror-shard effect, enabling a visual echo of rage's sharpness against the cool tranquility of calm. The diagonal flow draws the viewer's eye across the canvas, suggesting movement—a constant struggle between these two states, fluctuating through light and weight. The design utilizes a broken pattern to introduce imperfection, reflecting the subdued chaos within calmness and the unpredictable nature of rage.</desc>
