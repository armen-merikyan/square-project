  <title id="title">Contrasting Shores</title>
  <desc id="desc">This artwork embodies the tension between safety and exposure, depicted through a pale center contrasting with darker edges. The palette of shelter green and warm brown suggests stability and grounding, while the open blue and cold white introduce a sense of vulnerability. The placement of broken dots around the edges symbolizes leaks of emotion and interruptions in safety, while maintaining a quiet field at the center. The main collision occurs in the center where softer colors clash with heavier, darker outlines, echoing the theme of exposure against a protective border.</desc>
