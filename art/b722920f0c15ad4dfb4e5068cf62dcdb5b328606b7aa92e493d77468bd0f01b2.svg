<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Behind Restraint</title>
  <desc id="desc">This composition explores the duality of restlessness and peace using contrasting patterns. The palette of muted purples and deep blues anchors the piece, while the warm yellows and oranges introduce tension, serving as accents for motion. The texture alternates between orderly noise and a broken frame, emphasizing the emotional collision in the center of the grid—a metaphorical spark gap that represents a moment of unresolved motion. The balance of negative space ensures a feeling of restraint against overwhelming pressure, allowing the calm patches to breathe amidst complexity.</desc>
