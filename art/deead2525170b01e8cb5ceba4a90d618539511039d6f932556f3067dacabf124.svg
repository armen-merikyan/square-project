<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone reflects the push and pull between vulnerability and strength, with a soft pale center representing exposure and darker edges suggesting shelter. The palette features muted greens and browns paired with light and cold colors to illustrate safety(fresh green) versus exposure (cold white). The main contrast collides in the center, where the light colors break into denser, darker hues, illustrating the tension between safety and the risk of the unknown. The spiral pressure layout reflects the swirling conflict between these emotional states, leaving intentional spaces to evoke feelings of disconnection and openness.</desc>
