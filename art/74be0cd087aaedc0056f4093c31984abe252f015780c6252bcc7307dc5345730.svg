<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order in Chaos</title>
  <desc id="desc">This composition explores the emotional dichotomy of restlessness and peace through distinct color placements and patterns. The outer frame, representing chaos, is filled with darker tones to create a sense of density and pressure, while the inner core introduces a lighter palette, symbolizing calmness and structure. The contrast occurs diagonally, where the chaos encroaches into the peaceful core, allowing interrupted transitions between the two states. The chosen palette of muted tones juxtaposed with sharper hues reflects a tension akin to memory clashing against the fluidity of motion. Broken pixels disrupt the order, embodying moments of uncertainty in a structured environment, reinforcing the overall theme.</desc>
