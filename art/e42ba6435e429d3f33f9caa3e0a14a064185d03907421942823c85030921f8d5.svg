<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a struggle between control and surrender, captured through contrasting patterns of density and openness. The palette of signal green, electric blue, and hot magenta against dead black and static gray symbolizes a tension between vibrant energy and enveloping restraint. The main contrast occurs at the central region, where vibrant colors collide and interrupt a surrounding field of negative space, illustrating the conflict between overwhelming desire and confinement. This pattern emerges from the seed's themes of pressure and release, creating a visual narrative of emotional layers shifting from the center outward, embodying both hunger and the constraints that contain it.</desc>
