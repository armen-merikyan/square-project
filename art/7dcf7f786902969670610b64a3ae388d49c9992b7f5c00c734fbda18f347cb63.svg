  <title id="title">Signal vs Noise</title>
  <desc id="desc">This artwork captures the tension between peace and restlessness through contrasting patterns and colors. The palette of signal green, electric blue, and hot magenta represents vibrant energy against the muted tones of dead black and static gray, alluding to static interruptions in memory. The aggressive radial pattern symbolizes restlessness while the pressure band pattern embodies peace. The intersection of these forms creates a dynamic clash at the center, suggesting the chaos of thought and emotion as they bleed into quiet spaces.</desc>
