<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition captures the emotional dichotomy of vulnerability and strength through texture and color. The soft, pale hues contrast sharply with deeper, saturated tones, creating an interplay that suggests both protection and exposure. The use of 'powder pink' and 'warm white' conveys vulnerability, while 'carbon black' and 'sharp crimson' mark the strength and pressure within the artwork. The central collision of the darker colors introduces a sense of tension, supported by a spiraling flow inward, echoing the themes of being drawn towards or away from the center. The overall placement and broken pixels lend a sense of imperfection that reflects the fragility of vulnerability, contrasted with the resilient strength surrounding it.</desc>
