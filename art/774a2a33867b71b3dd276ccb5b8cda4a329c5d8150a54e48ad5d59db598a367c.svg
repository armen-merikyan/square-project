<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Stillness</title>
  <desc id="desc">This artwork embodies the emotional tug-of-war between restlessness and peace. The palette combines deep teal and void black for a profound sense of calm, contrasted with cosmic indigo as a restless push. The grid pattern represents structured chaos, while the ember-like sparks of star white create interruptions. The main collision of deep teal and cosmic indigo is present in the center, representing a struggle between soothing depths and frantic motion, capturing the essence of the seed's tension.</desc>
