<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Emotion</title>
  <desc id="desc">This composition embodies the emotional conflict between panic and control, illustrated through contrasting color placements and abstract patterns. The palette consists of deep reds and blacks interspersed with pale blues and whites to signify the struggle between chaos and calm. The left side resonates with order, displaying structured patterns reminiscent of control while the right subtly erupts into asymmetry, capturing the essence of panic. The deliberate use of broken pixels and the negative space suggest unresolved tension, reinforcing the jagged edges of anxiety against the smoothness of rationality.</desc>
