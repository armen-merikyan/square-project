<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Connections</title>
  <desc id="desc">This artwork expresses the tension between loneliness and connection through color placement and contrast. The palette of deep reds, grays, and subtle pinks evokes feelings of warmth and isolation simultaneously. The center, represented by a cluster of pinks, symbolizes connection, while the gray and dark maroon surrounding it embodies loneliness. As the colors graduate from center to edges, the arrangement creates a feeling of pressure and distance, highlighting the core emotion of isolation contrasted with the desire for connection. The broken edge style reinforces the idea of imperfection in relationships and emotions.</desc>
