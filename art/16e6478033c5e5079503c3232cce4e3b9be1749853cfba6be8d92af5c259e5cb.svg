<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of the Knot</title>
  <desc id="desc">This composition embodies a tension between longing and resolve. The palette of cosmic indigo, deep teal, cold gold, star white, and void black reflects a contrast between calm and urgency. The central tension is created with broken pixels that disrupt smoother patterns, symbolizing the push and pull of emotions. The arrangement echoes the seed’s narrative: a wide field of calm (the deep teal) and sparks of warmth (the cold gold) create a rhythm of serenity enlivened by tension, while the mirror-like quality of the layout hints at the incongruities inherent in the narrative of repair versus damage.</desc>
