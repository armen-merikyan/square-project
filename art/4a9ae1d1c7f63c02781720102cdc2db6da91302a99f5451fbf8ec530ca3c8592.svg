<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Strength and Vulnerability</title>
  <desc id="desc">This artwork captures the emotional interplay between vulnerability and strength, presenting a pale aqua center representing vulnerability, encircled by deep, assertive colors embodying strength. The palette focuses on contrasts—soft hues like mist gray and pale aqua highlight the unshielded core, while strong accents in alarm red and ink blue encapsulate a sense of urgency and protection. The collision occurs in the dense center, creating a visual struggle with the softer outer edges, emphasizing the duality of exposure and shelter.</desc>
