<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shifting Fractals of Emotion</title>
  <desc id="desc">This artwork captures the duality of confusion and clarity through its contrasting shades and patterns. By employing a palette inspired by 'broken memory' with muted sepia, tan, and gray tones, it evokes a sense of nostalgia and ambiguity. The arrangement of colors showcases jagged edges and bursts of chaos in the center, creating a strong focal point. Meanwhile, the edges transition into a more subdued region, representing clarity. The broken pixels contribute imperfection, enhancing the feeling of disruption. Overall, this piece reflects the emotional complexities of navigating between clarity and confusion while inviting the viewer to explore the layers of meaning between the two.</desc>
