<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">The emotional tone reflects a struggle between the quiet stillness and compressed pressure. The color palette includes muted tones like dust gray and faint peach to signify softness and calm, while compressed red and dark navy represent intensity and pressure. The main contrast occurs along the diagonal flow, creating a visual tension where the soft glitched quiet intersects with the dense constellatory pressure. Broken pixels introduce intentional imperfections, echoing the theme of disruption and instability.</desc>
