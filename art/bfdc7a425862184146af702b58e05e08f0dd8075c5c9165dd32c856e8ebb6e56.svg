<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Connection</title>
  <desc id="desc">This artwork embodies the emotional tension between loneliness and connection. The palette of warm yellows and oranges contrasts against deep blues and muted purples, symbolizing the warmth of connection fighting against the coldness of isolation. The central focus is lighter, suggesting connection, while the darker outer pixels convey the weight of loneliness, with the arrangement reflecting a push and pull from the edges to the center. Broken pixels are scattered throughout, representing fragmented memories and connections. Overall, the piece captures the nuanced dynamics of feeling connected yet profoundly alone.</desc>
