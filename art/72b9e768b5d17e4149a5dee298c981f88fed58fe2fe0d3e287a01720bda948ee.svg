<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Space</title>
  <desc id="desc">This abstract artwork embodies the emotional dichotomy of relief and dread, reflected through a contrasting color palette of deep blacks and bright whites. The black signifies heavy dread, while the white represents relief and calmness. The layout evokes an empty room, with stark contrasts between dense, dark areas and lighter, open spaces. The top-weighted structure adds tension, suggesting a staircase leading to a crack of light, an echo of hope within the oppressive darkness. Discrete broken pixels introduce imperfection, emphasizing the theme of a struggle between order and chaos. The combination of checkerboard patterns suggests calmness, while stair-like disruptions hint at instability, encapsulating the core conflict of the seed.</desc>
