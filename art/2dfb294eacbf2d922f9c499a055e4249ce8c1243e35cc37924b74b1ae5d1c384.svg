<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This piece embodies the emotional dichotomy of joy and grief through a structured yet chaotic layout. The warm palette of yellows and oranges symbolizes joy, while the muted purples and deep blues reflect the weight of grief. The placement of warm colors rises in a zigzag pattern from the bottom left, creating a feeling of expansion and lightness, contrasted by darker hues that spread from the top right, invoking heaviness and fragmentation. The piece utilizes broken pixels to introduce an element of imperfection, enhancing the chaotic transition between the two emotional states. The negative space allows breathing room, evoking a sense of unresolved tension between joy and grief.</desc>
