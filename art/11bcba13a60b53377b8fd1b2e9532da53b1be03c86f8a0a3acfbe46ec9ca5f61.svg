<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Constellation</title>
  <desc id="desc">This artwork embodies the emotional tension between tenderness and rage, creating a dynamic interplay through color and pattern. The palette of deep reds and muted blues reflects the contrasting feelings—rage represented by the boldness of red, while tenderness emerges through the softness of pale blue and white. The inner region captures the intense pressure of these emotions coiling toward the center, illustrated by sharper, jagged patterns of red, and softer, rounded edges of blue. Broken pixels introduce imperfection, evoking feelings of guilt and forgiveness as they punctuate the flow of the arrangement, allowing tension to ebb into moments of quiet. This arrangement captures the changing states of emotion while maintaining abstract integrity without drawing from literal interpretations.</desc>
