  <title id="title">Tension of Duality</title>
  <desc id="desc">This artwork captures the emotional contrast between desire and restraint through a palette that oscillates between saturated reds and muted creams. The warmer colors hint at urgency and longing, while the cooler tones impose a boundary, suggesting instability within the desire. The placement of broken pixels introduces imperfections, emphasizing the struggle between the two emotions. The central collision occurs with a dense warm band cutting through cooler muted layers, creating visual tension that resonates with the abstract narrative of longing and containment.</desc>
