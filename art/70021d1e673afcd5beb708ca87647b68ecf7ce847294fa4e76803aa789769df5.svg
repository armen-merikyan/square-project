  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects a delicate balance between vulnerability and strength, with a split horizontal layout. The top half embraces vulnerability through fragile colors like distant lilac and light accents, portraying an exposed yet enticing quality. The bottom half represents strength via deeper, more stable colors like warm shadow and lamp gold, suggesting resilience. The jagged edges and broken pixels introduce intentional disruptions, mimicking life's complexities. The central collision of cool blue in the middle embodies a cross-current of emotion, revealing the essence of this abstract interaction.</desc>
