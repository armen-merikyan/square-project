<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Echoes</title>
  <desc id="desc">This piece embodies the emotional tension between joy and grief through a carefully selected palette featuring warm yellows and oranges juxtaposed with deep blues and muted purples. The layout is structured as a divided frame, where the outer section embodies grief, depicted in darker, fragmented hues, while the inner core represents joy, splintering out in bright, crack-like patterns. The hard edges create a sense of conflict, echoing the contrast between safety and threat. The pattern formation invokes the feelings of pressure and release, with the joyful colors breaking through the heavier tones, signifying hope amidst sorrow.</desc>
