<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory Marks</title>
  <desc id="desc">The emotional tone of softness clashes with severity through the interplay of a pale, warm palette interrupted by sharper, darker hues. The choice of powder pink and warm white creates a field of gentle contrast, while carbon black and sharp crimson introduce tension. The structured tension subtly ebbs and flows across the grid, symbolizing a pulsing rhythm echoing the themes of guilt vs. forgiveness and the balance of chaos within order. While the darker colors weigh down the composition, the lighter colors suggest a serene, gently inviting space, feeling both constricted and liberated. The central collision is felt along the vertical axis, where soft and sharp colors intermingle, creating a sense of unresolved dynamic motion.</desc>
