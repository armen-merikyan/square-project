<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erosion of Control</title>
  <desc id="desc">The emotional tone encapsulates the tension between panic and control, expressed through a split between a structured pattern and chaotic interruptions. The palette of deep burnt orange and dark red evokes a sense of heat and urgency, while the lighter gold adds a glimmer of hope amidst the chaos. The left side features a cracked pattern symbolizing control, while the right is filled with random dots representing panic. The hard edges create a clear demarcation of emotions, fostering a visual clash at the center, drawing the eye to the pivot between stability and instability. This embodies the struggle and interplay between these contrasting states of mind.</desc>
