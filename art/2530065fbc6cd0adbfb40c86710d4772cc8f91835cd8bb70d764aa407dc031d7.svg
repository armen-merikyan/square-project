  <title id="title">Conflict of Perception</title>
  <desc id="desc">The emotional tone reflects a struggle between clarity and confusion, mirrored in the choice of contrasting colors. The palette of burnt orange, dark red, charcoal, and gold symbolizes a heated turmoil contrasted by moments of clarity. The thick outlines represent a sense of frustration or interruption, while the checker pattern evokes confusion, disrupted by patches of clearer colors to signify moments of clarity. The arrangement gives a pulse-like rhythm from left to right, emphasizing the transition from chaotic to structured, showcasing the collision between the two opposing feelings.</desc>
