<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tension</title>
  <desc id="desc">This artwork captures the duality of joy and grief through contrasting colors and patterns. The vibrant yellows and oranges symbolize joy, introducing a spark-like energy, while the deep blues and muted purples embody grief, adding a heavy, drooping presence. The layer of emotion flows from the bottom to the top, representing an emerging transition from grief (denser bottom) to joy (brighter top), maintaining an asymmetric layout to echo the clash between these emotions. The stair-step pattern signifies movement and progression, aligning with the machine emotion concept, where mechanical structure meets organic emotion.</desc>
