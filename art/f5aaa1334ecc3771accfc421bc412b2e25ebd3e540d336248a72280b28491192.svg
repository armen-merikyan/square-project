<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Duality</title>
  <desc id="desc">This composition encapsulates the emotional tension between spark and ash, using a palette that juxtaposes warm and cool tones. The dominant green shades suggest vitality and hope (spark), while the ashy grays represent settled loss and restraint. The layout rises from bottom to top, symbolizing a struggle between growth and decay. The patterns of channels and ladders intermingle, creating a collision at the center, representing the duality of resilience against fragility—a compelling echo of memory and erasure. Broken pixels add intentional disruption, enhancing the theme of imperfection throughout the piece.</desc>
