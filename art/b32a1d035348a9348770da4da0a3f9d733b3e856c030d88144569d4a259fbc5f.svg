<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece captures the tension between desire and emptiness, depicting a saturated warmth in the upper regions and a hollow coolness below. The color palette features bright, warm tones like hot coral and blood orange that are contrasted with cooler shades of hollow blue and charcoal, creating a conflict that echoes the emotional pull of longing against the boundary of restraint. The pattern layout rises from the bottom, signifying hope, while the structured yet imperfect placement of colors embodies the struggle between the urge to overflow and the call to contain. Disruptions in the form of broken pixels symbolize the fractures in this emotional landscape, adding complexity to an otherwise structured grid. The main collision is found at the center, where the warm tones punctuate the cooler regions, indicating a fierce interaction between overflowing desire and the quiet of emptiness.</desc>
