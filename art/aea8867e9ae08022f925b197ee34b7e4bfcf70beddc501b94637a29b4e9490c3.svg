<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Desire's Ascent</title>
  <desc id="desc">The emotional tone conveys a struggle between emptiness and desire, represented through a palette of warm (reds, pinks) and cool (grays) tones. The rising and falling movements in the arrangement hint at a tension where desire climbs upward, while emptiness feels like a descending weight. Broken pixel elements introduce a sense of imperfection and fragility, symbolizing heart fragments amidst a chaotic longing for connection. The warm colors push against the cool grays, creating a visual noise that echoes the internal conflict of wanting more yet feeling alone. This collision of emotional states translates into a layered pattern reflecting both tension and release.</desc>
