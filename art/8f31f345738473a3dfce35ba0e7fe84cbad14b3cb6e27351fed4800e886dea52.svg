<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shattered Echoes</title>
  <desc id="desc">This piece embodies the emotional juxtaposition of vulnerability and strength. The selected palette of pink, red, gray, and dark maroon represents warmth clashing with subdued tones, indicating the struggle between intimacy and harsh reality. The collision primarily occurs in the center where sparse, muted sections, symbolizing vulnerability, interrupt bold gray patches that embody strength. The spiral flow from the edges towards the heart fragment emphasizes the inward tension, creating a sense of pressure that is both protective and exposing.</desc>
