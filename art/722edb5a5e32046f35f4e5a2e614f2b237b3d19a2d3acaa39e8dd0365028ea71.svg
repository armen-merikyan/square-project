<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This artwork encapsulates the emotional dichotomy of joy and grief by employing contrasting colors and patterns. The warm, spark-like yellows and oranges representing joy collide with the deep blues and muted purples embodying grief. The piece features a checkerboard pattern of joy vibrant hues, visually rising from the bottom left while the deep cooling colors descend from the top right, illustrating a conflict between elevating happiness and heavy sorrow. The edge style contributes to a sense of imperfection, reflecting the complexities of these emotions, while at least 10% of the space remains quiet, enhancing the overall tension.</desc>
