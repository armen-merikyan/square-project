<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shattered Horizons</title>
  <desc id="desc">This artwork embodies the tension between fear and hope through a split vertical layout. The top half, representing fear, employs deep and dark hues that create a jagged tension, while the bottom half, symbolizing hope, features lighter colors with a glowing edge, suggesting uplift and flow. The overall palette balances black, dark violet, soft gold, and pale green to evoke a sense of depth and contrast. The main collision occurs where the dark upper colors abruptly meet the lighter lower section, representing a stark emotional transition, framed by the jagged patterns against the flowing shapes.</desc>
