<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Memory</title>
  <desc id="desc">This artwork explores the emotional contrast between nostalgia and progress through a split horizontal layout, symbolizing the tension between reminiscence of the past and the drive for future advancement. The warm palette of burnt orange and dark red reflects the heat of memory and longing, while the charcoal serves as a grounding force, evoking unyielding time. The arrangement introduces broken pixels on the right side, disrupting the mirrored calm of the left, which represents order and the past. Vertical columns hint at progress, with the top warmer and settling into grounded, cooler tones below, suggesting layers of emotional depth.</desc>
