<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This artwork encapsulates the emotional tension between restlessness and peace through a carefully curated palette of serene and urgent colors. The lighter tones of pale aqua and mist gray represent a sense of calm, while the alarm red and ink blue introduce fluid unease, creating a dynamic where one side evokes stillness and the other, motion. The diagonal layout captures the push and pull between these themes, with the red and blue weaving through the composition, representing disruption and pulse against the soft lattice of the serene colors. The central collision of colors—where the emotions intersect—conveys the tension between these opposing feelings, making the viewer feel the weight of unresolved conflicts and moments of serenity simultaneously.</desc>
