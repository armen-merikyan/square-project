  <title id="title">Gravity of Contrast</title>
  <desc id="desc">The emotional tone of this composition is derived from the duality of awe and terror, captured through the juxtaposition of the light and dark colors from the palette. The use of electric blue and magenta against the deep black evokes a sense of both wonder and fear. The layout imitates falling pixels to illustrate descent into chaos, while maintaining a structured grid inspired by the feeling of order. The collisions between the vibrant colors and the dark background create tension, making the artwork pulsate with emotional depth and a sense of unresolved conflict.</desc>
