<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Calm and Chaos</title>
  <desc id="desc">This artwork captures the emotional tension between tenderness and rage, employing a palette of stark contrasts with warm reds and muted blues. The outer border of black and deep blue evokes a sense of rage, while the inner four rows, composed of soft stripes in pale blue and white, suggest tenderness and calm. The collision occurs centrally, where the hot red channels interrupt the cooler stripes, creating a visual dialogue that reflects the seed's themes: inside vs outside, and the interplay of guilt and forgiveness. The broken pixels introduce imperfections that symbolize the rawness of human emotion.</desc>
