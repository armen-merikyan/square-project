<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Fury and Tranquility</title>
  <desc id="desc">The emotional tone contrasts rage with calm, where hot reds and deep blacks symbolize explosive energy, and soft pale blues with whites represent serene containment. The palette creates a tension between vibrant and muted colors, reflecting the struggle between these emotions. The main collision occurs centrally, as red embers disrupt cool echoes of blue, embodying the moment of conflict, while broken pixels introduce imperfection and chaos into the design. The layout follows a mirror broken pattern, creating nearly symmetrical sides but with deliberate discrepancies highlighting the eroded symmetry of rage encroaching upon calm.</desc>
