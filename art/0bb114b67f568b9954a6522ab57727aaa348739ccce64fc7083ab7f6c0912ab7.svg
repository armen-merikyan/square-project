<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Edge Pressure</title>
  <desc id="desc">This artwork embodies the tension between vulnerability and strength. The palette of muted cream, red oxide, and blackened plum conveys an emotional depth intertwined with a sense of restraint. The dominant hues of blackened plum create a dense, protective barrier across the corners, representing strength, while the softer muted cream at the center symbolizes vulnerability and openness. Stripes interrupt the solidity, suggesting an instability beneath the surface, while the halo pattern radiates from the core, echoing a sense of desire. The collision occurs at the bordered edges where strength meets the center's soft light, manifesting in an emotional dialogue of protection and exposure.</desc>
