<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension between Distant and Close</title>
  <desc id="desc">The emotional tone explores the juxtaposition of longing and resolve. The color palette of moss green, bone white, rust, and stone gray reflects themes of resilience and fragility, enhancing this emotional narrative. The main collision happens in the center through the intense contrasts of the warmer rust amidst the cooler tones, suggesting a struggle between the two emotions. The layout employs a mirror-broken structure, echoing the conflict of order versus chaos, where the patterns of flame (longing) and dots (resolve) permeate the space. Overall, the piece seeks to balance density and emptiness, with areas of quiet that accentuate the hidden tensions.</desc>
