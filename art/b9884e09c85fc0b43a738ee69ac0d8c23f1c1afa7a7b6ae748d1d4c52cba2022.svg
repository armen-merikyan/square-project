<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This piece embodies the tension between desire and emptiness. The palette features warm tones like hot coral and blood orange to evoke a sense of longing, contrasted against cooler shades of charcoal and hollow blue that suggest restraint and balance. The placement of colors creates a ripple effect that pulls towards the center, interrupted by darker hues that frame and contain that desire. There are deliberate disruptions through broken pixels, representing the imperfections in the pursuit of fulfillment and hinting at the emotional turbulence. The main collision occurs centrally, where warm colors are surrounded by darker, quieter tones, illustrating the struggle between an active inner pulse and a surrounding field of emptiness.</desc>
