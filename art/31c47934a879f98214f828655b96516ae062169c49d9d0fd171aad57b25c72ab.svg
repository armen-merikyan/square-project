<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Currents</title>
  <desc id="desc">This artwork embodies the emotional tension of 'panic' versus 'control' through a dynamic interplay of ordered and chaotic patterns. The central area, echoing 'control', uses structured, maze-like patterns in electric blue and bright lime, contrasting sharply with the chaotic, radial eruptions in magenta and shades of black that represent 'panic'. The use of hard edges and broken pixels gives a sense of instability and disruption, reflecting the chaotic nature of panic. Negative space was strategically integrated, ensuring at least 10% remains empty to suggest the breath of control amidst the chaos, allowing tension to resonate within the artwork's confined space.</desc>
