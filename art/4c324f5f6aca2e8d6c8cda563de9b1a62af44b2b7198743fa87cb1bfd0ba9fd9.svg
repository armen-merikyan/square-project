<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tranquility</title>
  <desc id="desc">This composition explores the emotional dichotomy between restlessness and peace, using a carefully curated palette of muted and dark tones that provoke a sense of tension and calm. The patterns of rings representing restlessness disrupt the orderly grid of peace, particularly at the diagonal center, where the two emotional states collide. The use of red oxide and small orange as highlights evokes warmth amidst the coolness of blackened plum and iron gray. Broken pixels, scattered in the design, symbolize the scars of memory that interrupt both the calm and the chaos, creating a narrative of ongoing struggle.</desc>
