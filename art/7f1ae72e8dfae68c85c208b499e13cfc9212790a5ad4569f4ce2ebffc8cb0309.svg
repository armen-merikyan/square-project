<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This piece captures the dance between joy and grief through contrasting colors and placements. The vibrant yellows and oranges symbolize joy, while the deep blues and muted purples represent grief. These colors collide within a radial pattern that ebbs and flows diagonally across the square, suggesting movement between the emotional extremes. The central region is denser, mimicking a wave shape that disperses toward the edges, creating a contrast—a chaotic joy against a backdrop of sorrow. This tension between light and shadow, structure and chaos, echoes the essence of the seed, forming a compelling emotional narrative without literal imagery.</desc>
