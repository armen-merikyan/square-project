<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Abstraction</title>
  <desc id="desc">This composition balances emotional tension between relief and dread through a stark palette of warm yellows and muted purples against deep blues. The edge of the canvas uses deep blue to represent dread, while the inner core reflects the lightness of relief. The asymmetrical patterns, mimicking stairs, create a sense of upward struggle but are disrupted by broken pixels, symbolizing cracks in perception. The color flow moves from top to bottom, echoing the heaviness at the top and the gradual lightening towards the center, embodying a push and pull between stress and calm.</desc>
