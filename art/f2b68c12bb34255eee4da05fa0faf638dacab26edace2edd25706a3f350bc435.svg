<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The artwork captures the contrast between sudden brightness (spark) and settled dust (ash). Using the palette of vibrant electric blue and hot magenta against deep dead black and static gray, the composition embodies the tension between explosive energy and quiet introspection. The outer frame of darker colors suggests the containment and stillness of ash, while the inner core bursts with bright, energetic patterns suggesting conflict and motion. The layout was designed to favor the spark, creating a central clash of colors that eludes balance, with jagged edges illustrating disruption. This arrangement conveys a sentiment of resilience within fragility, as the vibrant forms attempt to overwhelm the soft boundaries of the ash-like edges.</desc>
