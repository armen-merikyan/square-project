<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow of Emotion</title>
  <desc id="desc">This composition plays with the emotional tension between joy (represented through warm yellows and oranges) and grief (depicted in deep blues and muted purples). The palette captures the spark of joy amidst the heaviness of grief, while the contrast between bright pops and darker tones creates a dynamic collision of feelings. The layout reflects a corner invasion, where joy spreads upward, creating an uplifting rhythm that clashes with the heavy, descending hues of grief, suggesting a wave of emotion. The pattern reflects flames versus deep waters, illustrating a battle of light against dark, echoing the duality of the seed text.</desc>
