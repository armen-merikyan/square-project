<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Echoes</title>
  <desc id="desc">This artwork conveys the emotional tension between love and betrayal through the deliberate arrangement of colors, capturing a push and pull of warmth (reds and pinks) contrasting with cooler muted tones (grays and dark maroon). The left side employs a denser pattern with softer transitions representing love, while the right disrupts this softness with sharp contrasts and disorder, reflecting betrayal. The interplay emphasizes broken symmetry, with elements intersecting diagonally, suggesting rising tension. Negative space is preserved for a feeling of emptiness, lending contrast to the intense color dynamics.</desc>
