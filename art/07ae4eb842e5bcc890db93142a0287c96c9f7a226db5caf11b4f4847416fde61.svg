<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece reflects the emotional tension between vulnerability and strength through a contrasting color palette of soft lavenders and deep blues. The pattern of strength forms a grid that anchors the piece while the constellation of lighter colors disrupts it, representing vulnerability. The main collision happens in the top right corner, where the density of colors is greater, creating an overpowering sense of pressure and intensity. The layout has intentional broken pixels to suggest imperfection and a 'tear' in the pattern is implied, embodying the emotional conflict expressed in the seed.</desc>
