  <title id="title">Pulse of Contrast</title>
  <desc id="desc">This artwork explores the emotional tension between softness and severity through color and spatial arrangement. The palette combines powder pink and warm white to convey gentleness, while sharp crimson and carbon black introduce intensity, creating a dynamic push-pull effect. The layout features two small centers pulsating against an expansive negative space, embodying a rhythm of pressure and release. This interplay reflects the duality of guilt and forgiveness, where light emerges amidst darker tones. The broken pixels intentionally disrupt the uniformity, representing flaws in emotional states, leading to a compelling collision in the center of the square.</desc>
