<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipsed Emotion</title>
  <desc id="desc">This artwork captures the emotional tension between love and betrayal through color placement and contrast. The use of warm pinks and reds suggest love, while dark maroon and gray introduce a feeling of betrayal. The color choices also represent the duality of safety and threat, with lighter hues fighting against the edges of darker tones, reflecting inner conflict in a seemingly empty room. The pattern of color rises from the bottom to the top, emulating hope yet intertwined with flames of turmoil, ensuring a deliberate collision between the warm and cool elements, emphasizing both connection and disconnect.</desc>
