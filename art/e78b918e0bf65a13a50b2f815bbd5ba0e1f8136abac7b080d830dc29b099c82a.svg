<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold Between Forces</title>
  <desc id="desc">This artwork embodies the tension between defiance and submission, using a palette from the 'broken_memory' family to reflect the emotional weight of the theme. The dominant dark tones symbolize defiance, creating sharp contrasts with lighter accents that introduce softness and vulnerability. The checker pattern for defiance collides with the broken dots of submission, especially along the diagonal, mimicking the dynamic of conflict and resolution. The negative space allows for an 'open_gate' feeling, inviting a sense of uncertainty and exploration while maintaining structure.</desc>
