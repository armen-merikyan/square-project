  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition captures the tension between restlessness and peace, a dialogue between unsettled dynamics and gentle regions of calm. The palette evokes awe and terror, combining dark cosmic indigo with shimmering star white and subtle cold gold. The patchy arrangement insights an incomplete repair, embodying the conflicting aspects of motion and memory. The dominant dark tones at the edges contrast with a pale center, a space of quiet contemplation, leading to a visual collision that symbolizes the interplay between chaos and tranquility.</desc>
