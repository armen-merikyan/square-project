<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">The artwork explores the duality of joy and grief through a split layout that emphasizes contrasting color palettes. The left side embodies joy with bright yellows and oranges scattered as dots, symbolizing vibrancy and lightness. The right side contrasts with deep blues and muted purples arranged in stripes, suggesting the heaviness and fragmentation of grief. The edges are weighted towards the top, echoing the emotional tension between stability and chaos. The broken pixels introduce imperfection, enhancing the narrative of unresolved emotions.</desc>
