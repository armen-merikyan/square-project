  <title id="title">Tension of Yearning</title>
  <desc id="desc">This composition embodies the emotional tension between desire and emptiness. The palette combines saturated colors like hot coral and blood orange to symbolize desire, while hollow blue and charcoal represent emptiness. The collision occurs at the center, where warm colors pulse outward, disrupted by the cool tones creating a sense of containment. The patchwork and target patterns interact to mirror the push and pull between overflowing desire and restrained emptiness, captured in opposing spatial rhythms.</desc>
