<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone captured here navigates the duality between the gentle embrace of softness and the stark reality of severity. The palette, composed of powder pink, warm white, carbon black, steel gray, and sharp crimson, embodies this contrast — soft, delicate hues represent forgiveness and acceptance, while deep, incisive colors herald guilt and harshness. The main collision occurs in the center, where warm and cool tones intermix, creating an echo of 'pulse marks' that suggest an emotional heartbeat against a radial backdrop, facilitating both chaos and calm. The layout emphasizes a diagonal spread, with a dominant soft color occupying the corner, allowing the severity to invade gradually, reflecting the psychological narrative of conflict and resolution.</desc>
