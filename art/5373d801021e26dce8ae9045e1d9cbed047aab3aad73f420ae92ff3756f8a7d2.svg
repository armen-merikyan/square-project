<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Resilience</title>
  <desc id="desc">The emotional tone reflects the tension between vulnerability and strength, explored through the palette of earthy greens and muted warm tones. The frame-like borders embody strength, while the center showcases a pale white area representing exposure. This core is interrupted with sharp contrasts of rust and gray, creating a collision of protection and exposure. The seed inspired a pattern of escaping edges that anchors the composition, illustrating a dynamic interplay of solid and ephemeral, as well as the balance of density and receding spaces.</desc>
