<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tenderness and Rage</title>
  <desc id="desc">This piece embodies the emotional tension between tenderness and rage through the use of a contrasting palette of warm reds and cool pale blues. The overall composition features a dominant dark color suggesting rage, while softer, lighter colors peek through like quiet moments of tenderness. The main collision occurs in the center where jagged reds intersect with smoother blue hues, symbolizing the struggle between opposing emotions. Fractured rows of color create a visual rhythm that evokes the theme of 'brokenness' in emotional experience while also allowing for moments of calm space. The arrangement emphasizes unevenness, reflecting the unpredictable nature of human emotions.</desc>
