<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Flicker &amp; Fade</title>
  <desc id="desc">This square captures the emotional tension between the intense bursts of life (spark) and the quiet remnants of loss (ash). The palette features deep reds and muted creams to reflect the fiery desire against a backdrop of fragility and fading memories. The collision occurs centrally, where radial bursts of red and smaller, static grey shapes interrupt the tranquil background, expressing the conflict of restraint and urge. The jagged edges create an organic feel, emphasizing imperfection and the echoes of memories, contributing to an overall sense of hope rising from ashes.</desc>
