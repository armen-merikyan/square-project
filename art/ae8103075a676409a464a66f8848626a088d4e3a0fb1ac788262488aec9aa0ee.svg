<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">The emotional tone of this piece reflects the ongoing struggle between restlessness and peace. The palette employs deep blacks and blues to convey a sense of mourning and hidden depth, contrasted by the pale yellow representing fleeting moments of tranquility. The composition centers around a channel motif which carries echoes of fluidity and movement, creating a stark dichotomy at the center of the artwork. Restlessness is depicted through pulsing marks diverging from the center, while the softness of the surrounding color fields offers sanctuary. The well-defined edges light against dark invoke the sensation of constraint on freedom, amplifying the emotional tension.</desc>
