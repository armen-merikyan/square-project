<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The artwork captures the emotional tension between tenderness and rage through a dynamic array of colors. The chosen palette of saturated red and muted pale blue creates a stark contrast, representing the duality of overwhelming anger (red) invading a serene calm (pale blue). This clash unfolds diagonally across the canvas, where the sharp, glitch-like effects of red pixels break through the softer tide-like patterns in blue, establishing a scene of conflict and interplay. Broken pixels introduce intentional disruptions, reinforcing themes of guilt and forgiveness as they symbolize imperfections. The layout's corner invasion emphasizes this emotional climb, echoing the struggle between containment and overflow in every pixel.</desc>
