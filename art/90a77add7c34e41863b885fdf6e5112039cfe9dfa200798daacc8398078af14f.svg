<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition embodies the tension between emptiness and desire through a palette of warm and cool colors. The warm tones represent desire with a gathered glow, while the cooler shades embody emptiness through low saturation. The central collision occurs at the core, where the warm colors pulse outward, disrupting the quiet pressure of the cool background. The broken pixels create intentional disruptions reflecting the struggle to contain desires against an expansive negative space, suggesting a growing tension that remains unresolved. The arrangement captures the emotional dance of yearning and restriction, where the central warmth reaches toward the edges, but is offset by the hollow coolness that constrains its expansion.</desc>
