<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Space</title>
  <desc id="desc">The emotional tone captures the struggle between love and betrayal, creating a visual representation of deep contrasts. The palette features warm pink and red for love, juxtaposed against dark gray and maroon to symbolize betrayal. The contrast emerges through a 'zigzag' flow that introduces abrupt interactions between gentle and harsh colors, mimicking the conflict of emotions. The central arrangement is deliberately asymmetric, with broken pixels adding imperfection to the 'flame' motif, reflecting vulnerability. The layout retains negative space to illustrate emptiness, evoking a sense of isolation within intimacy.</desc>
