<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone of 'Hunger vs Restraint' is represented through the contrasting palette of warm corals and cool blues, depicting the struggle between desire and emptiness. The sharper edges and overflowing colors illustrate desire's pressing force amidst the quiet, expansive spaces symbolizing restraint. The main collision occurs at the center with bursts of hot coral enveloped by the subdued hollow blue, reflecting a tension of overflowing emotion against a contained perimeter, representing the seed's theme. Broken pixels disrupt the smooth flow, adding an imperfection embraced in the emotion of yearning.</desc>
