<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Edges of Emotion</title>
  <desc id="desc">This composition explores the tension between trust and suspicion through a palette evoking melancholy and wonder. The muted tones of lavender gray and soft cyan suggest quiet reflection, while contrasts of deep rain blue and muted plum introduce elements of disturbance and depth. The collision occurs in the lower-right quadrant, representing suspicion's sharp intrusion into the softer, quieter spaces of trust. The central darker hues represent pressure and boundaries, while scattered lighter colors around emphasize an open space that hints at resilience amidst fragility, aligning with the themes expressed in the seed.</desc>
