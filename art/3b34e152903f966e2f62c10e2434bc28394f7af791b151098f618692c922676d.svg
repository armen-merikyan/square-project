<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragments of Tension</title>
  <desc id="desc">This piece explores the emotional tug-of-war between relief and dread, reflected in the color palette that juxtaposes cool, pale hues against darker, weighted tones. The heavy dark squares concentrate around the center, representing dread, while the lighter dots scatter outward, giving a sense of relief. The broken pixels interrupt the flow, embodying the tension created by chaos and order. The use of the horizon as a conceptual anchor brings to mind the idea of distant calm colliding with present weight.</desc>
