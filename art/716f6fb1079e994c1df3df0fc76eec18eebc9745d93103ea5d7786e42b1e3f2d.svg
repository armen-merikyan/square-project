<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Duality</title>
  <desc id="desc">This artwork embodies the emotional tension of vulnerability and strength through a palette of warm and cool tones. The juxtaposition of hot coral and blood orange (representing strength) against the coolness of hollow blue (symbolizing vulnerability) creates a dynamic conflict in the center while offering areas of quiet with dust pink. The main collision occurs where the darker tones of charcoal meet the vibrant accents, illustrating the push and pull of exposure versus shelter. The negative space invites contemplation on the unresolved emotional patterns while the broken pixels signify imperfections, adding depth to the abstract narrative.</desc>
