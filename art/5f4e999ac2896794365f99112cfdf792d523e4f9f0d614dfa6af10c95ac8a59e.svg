<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Shades</title>
  <desc id="desc">This artwork conveys the emotional struggle between envy and gratitude. The chosen palette of pink, red, gray, and dark maroon reflects the warmth and intensity of these contrasting feelings. The placement of brighter shades towards the edges and darker tones in the center suggests a gravitational pull from the outside in, representing gratitude trying to balance the inner turmoil of envy. The 'rising_signal' layout is mirrored in the upward movement of patterns, embodying hope (rising) against the weight of despair (falling) with broken pixels creating imperfections that symbolize the unpredictability of emotions.</desc>
