<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo Pulse</title>
  <desc id="desc">This composition explores the emotional dichotomy of 'signal' and 'noise'. The palette is deliberately restricted to shades of navy, black, and hints of dim cyan, embodying a lonely signal amidst an overwhelming noise. The arrangement features a strong central pulse, represented by the dark blue, contrasting sharply against the lighter, more disrupted black and white fields that signify noise. The deliberate use of broken pixels creates an intentional disruption in the perceived pattern, reflecting both the fragility of memory and the persistent echo of interference. The patterns intersect yet do not completely align, symbolizing tension and unresolved motion between clarity and static. Here, the collision occurs centrally, allowing the viewer to feel the push and pull of two distinct emotional spaces.</desc>
