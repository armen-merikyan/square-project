<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Friction of Calm</title>
  <desc id="desc">This piece embodies the emotional dichotomy of restlessness versus peace through contrasting color choices. The muted purples form a calm backdrop, interrupted by vibrant yellows and oranges that symbolize restlessness, moving across the grid in a zigzag flow. The center of the square is more densely populated with bright colors, representing emotional tension, while the edges maintain a quieter presence, illustrating the interplay between motion and stillness. The patterns of channels and lattice weave together, suggesting a memory under pressure and the reality of ‘light vs dark’. Broken pixels create intentional disruptions that echo the delicate balance of these feelings.</desc>
