<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Contrasts</title>
  <desc id="desc">This piece explores the emotional dichotomy of love and betrayal through a juxtaposition of warm and cool tones. The primary palette utilizes soft pinks and reds representing love, contrasted against cooler shades of gray and dark maroon symbolizing betrayal. Vertical rows alternate to suggest the emotional push and pull, while some colors collide, creating a fractured yet harmonious feeling—representing the interplay between safety and threat. The patterns include softly blended 'dots' for love interspersed with the 'rain' of gray, evoking a sense of noise within the emptiness. The layout features mirrored symmetry with intentional misalignments, creating an echoing sense of tension. The broken edges enhance the theme of imperfection, amplifying the emotional weight without overt representation.</desc>
