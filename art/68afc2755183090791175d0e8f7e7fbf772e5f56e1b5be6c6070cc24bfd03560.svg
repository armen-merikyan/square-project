<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">This artwork embodies the emotional tension between restlessness and peace through a palette that juxtaposes warm and cool colors. The warm shades of rose clay and lamp gold represent the urge for comfort, while the cool blue and distant lilac introduce a sense of calm and distance. The main clash occurs diagonally, where the dot pattern of peace interacts with the edgy spark of restlessness, creating a dynamic yet controlled chaos. Broken pixel elements offer intentional disruptions, embodying the feeling of false echoes in memories, while enough negative space preserves breathing room amidst agitation.</desc>
