<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure of Desire</title>
  <desc id="desc">The artwork embodies the emotional tensions of desire and restraint, showcasing warm colors dominated by hot coral and blood orange, representing desire, against muted charcoal and hollow blue that signify restraint. The central collision occurs where these broader patches intersect, creating drama. The negative space amidst the patterns allows for a visual breath, enriching the feeling of pressure creating a narrative of yearning contained. The selection of patterns, especially 'negative_cross' intertwined with 'channels', reflects the push and pull between these two emotional states, echoing the themes of the seed.</desc>
