  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone juxtaposes rage, represented by sharp red and dark contrasts, against calm, symbolized by pale blues and whites. The composition adheres to a vertical split, with the left half dominated by glitch patterns creating tension, while the right invokes calm through hinge patterns. The collision occurs at the center, where stark differences merge, echoing the theme of containment against overflowing energy. The use of broken pixels sustains the feeling of disruption and eroded symmetry, accentuating the art's narrative.</desc>
