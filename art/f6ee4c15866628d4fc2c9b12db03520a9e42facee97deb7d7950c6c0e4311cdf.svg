<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">This piece explores the contrast between awe and terror through an asymmetrical layout featuring a clean, patterned side juxtaposed against a chaotic, broken pixel side. The palette of lime, electric blue, magenta, and black reflects both vibrancy and darkness, suggesting a tension between hope and fear. The left side utilizes structured maze patterns evoking awe, while the right employs chaotic crosshatches to invoke terror. The central wave flows counterclockwise, emphasizing the duality as well as the broken memory theme with slight imperfections scattered throughout to symbolize fragmentation and instability amidst an otherwise stable format.</desc>
