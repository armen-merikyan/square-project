<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Dichotomy</title>
  <desc id="desc">The emotional tone centers on the tumult between love and betrayal, drawing on contrasting themes of warmth and coldness. The selected palette of pink, red, gray, and dark maroon reflects the passion of love intertwined with the coolness of betrayal. The placement of warm shades in concentrated patches suggests love seeking to dominate the cool backgrounds of betrayal, creating tension. The pattern employs cracks as visual reminders of broken trust, while negative space interjects signals of chaos and calm. The main contrast occurs between the warm, dense clusters juxtaposed against empty, cool expanses, embodying the friction of competing emotions.</desc>
