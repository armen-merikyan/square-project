<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">This abstract composition captures the emotional tug-of-war between longing and resolve. The palette features soft tones of powder pink and warm white, alongside the severity of carbon black and steel gray, creating a contrast between warmth and coldness, intimacy and distance. The main collision occurs in the center where densely packed patterns of longing (crosshatch) clash with steadier, resolved shapes (pressure bands), symbolizing the interplay between chaos and order. Negative space is intentionally maintained to evoke a sense of longing, using quieter colors that suggest unfinished desire.</desc>
