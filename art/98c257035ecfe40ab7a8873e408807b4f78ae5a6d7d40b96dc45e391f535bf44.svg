<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Certainty and Curiosity</title>
  <desc id="desc">This artwork captures the emotional tension between certainty and curiosity through contrasting patterns of color placement. The cool blues and soft cyans represent the calm yet firm structures of certainty, while the muted plums and lavender grays evoke the unresolved and questioning essence of curiosity. The main collision occurs in the top left corner where dense blocks of blue maintain a firm boundary, while the interference of lighter, more playful colors creates a dynamic rhythm—echoing the struggle between order and the unpredictable nature of curiosity. The negative space is preserved to allow the eye to breathe, symbolizing the need for reflection amidst emotional flux.</desc>
