<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast and Collision</title>
  <desc id="desc">The emotional tone reflects a push-pull dynamic between emptiness, represented by dark and muted colors, and desire, expressed through the warmth of reds and soft blues. The chosen palette, 'rage_calm', embodies this tension, where deep black contrasts with bright highlights, signifying friction and hope. Conversely, the layout flows from the corner, suggesting desire invading through the negative space, while the patterns of 'crosshatch' and 'ring' create an interplay of density and emptiness—mimicking a heart fragment's loneliness amidst an expanding signal of warmth. The collision of sharp and soft edges emphasizes the emotional conflict, resulting in an abstract representation of the seed.</desc>
