<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Ascent</title>
  <desc id="desc">This artwork encapsulates the emotional conflict between relief and dread through a dynamic color palette. The palette features bright, uplifting yellows and oranges, symbolizing hope and relief, contrasted with deep blues and muted purples, embodying dread and weight. The flow is designed to evoke upward movement, as if striving for relief. However, interruptions created by dark patches signify emotional dissonance, representing how the lightness fights against the heaviness. Each row reflects a tension between symmetrical design and broken patterns, illustrating a struggle where relief attempts to emerge from the depths of dread. The arrangement captures an abstract narrative of ascent amidst inner turmoil, inviting the viewer to navigate through peaks and valleys of emotion.</desc>
