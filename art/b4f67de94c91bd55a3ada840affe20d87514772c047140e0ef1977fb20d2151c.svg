<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Wholeness and Fracture</title>
  <desc id="desc">This composition explores the emotional dichotomy of longing and resolve, captured through a clash of colors and patterns. The palette features muted shelter green and warm brown to evoke a sense of grounding, contrasted with the serene cold white and open blue, representing vision and clarity. The main contrast emerges in the center, where warm and cool tones collide, echoing the struggle of repair versus damage. The layout employs a split-screen pattern against a fault line to embody this emotional tension, with broken pixels scattered to signify disruption within the overall serene grid.</desc>
