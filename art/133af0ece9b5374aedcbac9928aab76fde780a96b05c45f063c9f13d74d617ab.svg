<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This composition dives into the emotional tension between longing and resolve, utilizing a palette that embodies serenity and urgency. Pale aqua and mist gray represent longing with their calming, expansive qualities, while alarm red and ink blue symbolize the assertiveness and stability found in resolve. The layout features an invasion from the corner, where longing in warm tones begins and resolute, cooler colors move in diagonally, colliding at the center, creating a dynamic visual tension. Broken pixels applied here enhance the sense of disruption, portraying the inner conflict of emotion.</desc>
