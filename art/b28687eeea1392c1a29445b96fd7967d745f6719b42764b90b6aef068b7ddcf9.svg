<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Shades</title>
  <desc id="desc">The emotional tone explores the contrast between fear and hope, invoking a sense of impending tension. The palette of dark violet and soft gold reflects this duality; dark colors symbolize fear, while the gold hints at hope. The arrangement employs diagonal flows to suggest a rising signal, with sharp edges representing tension colliding against softer, more hopeful elements, like the ‘spark’ of the lighter tones breaking through the recesses of darkness. The imperfect mirror layout introduces an element of chaos, echoing the unpredictability of emotion, while maintaining over 10% negative space to prevent overwhelm.</desc>
