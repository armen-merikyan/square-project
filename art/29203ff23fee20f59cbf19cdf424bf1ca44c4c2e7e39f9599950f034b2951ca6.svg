<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This artwork embodies the emotional duel between fear and hope, creating a visual tension that mirrors the themes of the seed. The palette consists of deep, dark colors to represent fear and soft, warm colors for hope—highlighting contrasts that resonate with the inner struggle between dark and light. The pattern reflects a zigzag flow, representing the sharp breaks of anxiety versus the gentle rise of optimism. The corner-heavy edge style emphasizes the feeling of pressure emanating from one side, while broken pixels add unpredictability and imperfection, reinforcing the complexity of the emotions at play. The composition ultimately invites the viewer to navigate the interplay between chaos and calm, mirroring the essence of the seed.</desc>
