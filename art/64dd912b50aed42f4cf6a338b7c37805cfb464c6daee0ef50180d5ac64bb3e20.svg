<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Currents</title>
  <desc id="desc">This artwork captures the duality of joy and grief through distinct color clusters and structured chaos. The palette bridges bright yellows and oranges, representing joy, against deep blues and muted purples signifying grief. The bottom half gains density and weight, while the top remains expansive and brighter, suggesting a rise from chaos to order. Broken pixels introduce a sense of imperfection, emphasizing the emotional collision inherent in life’s experiences. The placement of colors creates tension while leaving voids, allowing for moments of reflection amidst contrast.</desc>
