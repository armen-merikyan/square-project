<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This composition captures the emotional tension between desire (represented by warm, saturated colors) and emptiness (expressed through cool, muted tones). The palette features vibrant coral tones that pulsate with warmth, contrasting against the serene, hollow blue which embodies a sense of absence. The left four columns are dominated by rippling waves of desire, while the right four columns reflect a more disrupted overlay, suggesting a containment at the edges with cool charcoal and distant marks. The main collision of feelings occurs where the warm colors hit the cool, echoing the unresolved dynamic of wanting yet being held back, with broken pixels amplifying the tension and imperfections in this abstract narrative.</desc>
