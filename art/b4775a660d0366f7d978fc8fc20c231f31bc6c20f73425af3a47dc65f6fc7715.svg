  <title id="title">Tension of Truth</title>
  <desc id="desc">This artwork reflects the emotional complexity of love and betrayal through a gradient of warm and cool tones. The palette—a mix of soft pinks and dark maroons—symbolizes the tender warmth of love contrasted with the harshness of betrayal. The layout flows from the bottom to the top, suggesting a rising tension, while broken pixels introduce a sense of chaos and imperfection. The interplay of overlapping colors represents the conflicts between hope and despair, revealing a story that resonates emotionally, yet remains abstract in form.</desc>
