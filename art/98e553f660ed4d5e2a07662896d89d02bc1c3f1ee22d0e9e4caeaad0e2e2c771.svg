<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Boundaries</title>
  <desc id="desc">The emotional tone explores the conflict between desire and restraint, represented through a warm palette contrasting with cooler tones. The rich reds and orange suggest the allure of desire, while the grays and muted creams symbolize the boundaries and limitations of restraint. Strong contrast collides in the center, where warm and cool colors interact, representing the push and pull of these emotions. The arrangement is layered to emphasize depth, echoing how desire seeks freedom against the constraints of societal norms.</desc>
