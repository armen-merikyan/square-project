<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tension</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of defiance and submission. The palette, inspired by 'broken memory', utilizes sepia, tan, and faded blue to evoke a sense of history and weight while suggesting warmth against cold. The central collision occurs where the dense sparks of color disrupt the softer stripes, creating tension. The interplay is meticulous, suggesting a spiral that begins from the edges, leading inward, reflecting an inward struggle. The broken pixels added in the corners emphasize imperfection and chaos, resonating with the emotional challenge suggested by the seed.</desc>
