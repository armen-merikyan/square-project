<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order and Chaos</title>
  <desc id="desc">This piece captures the emotional contrast between panic and control, illustrated through the chosen colors and their arrangement. The palette of deep reds and stark whites juxtaposes the heated intensity associated with panic against the calm of control. The top half represents control through structured maze-like patterns in darker shades, while the bottom half devolves into chaos with broken checker-like arrangements. This creates a visual tension, where the structured forms of dark colors erupt into chaotic patterns of lighter hues, embodying the emotional struggle between these two states. The pixel bleed effect introduces imperfection, enhancing the emotional impact and reflecting the inherent conflict within the seed's themes.</desc>
