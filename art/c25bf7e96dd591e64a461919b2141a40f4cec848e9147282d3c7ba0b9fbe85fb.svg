<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamics of Exposure</title>
  <desc id="desc">This artwork embodies the tension between vulnerability and strength. The stark contrast of black and pale blue signifies a battle between safety and exposure, with the black serving as a thick edge protecting lighter areas. The central structure is designed to be impactful, rendered with strong dominant colors interrupted by fibrous patterns representing vulnerability. The 'crack' shape metaphorically suggests the fragility in strength. This collision and overlapping of dense colors inspire a shift from calm assurance to tumultuous energy, challenging the viewer to feel the full range of emotions depicted.</desc>
