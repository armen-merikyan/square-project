  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork embodies the emotional tension between desire and restraint, where a saturated pull toward bold reds and oranges represents longing, while muted pastels and cool tones signify the lock of restraint. The palette intentionally plays with warm vs cool contrasts for emotional pull, while the zigzag flows and falling pixel layout signify the gradual descent of desire against the restricting edges. The primary collision occurs in the center where the colors overlap, echoing a struggle for space, and the broken pixels create intentional imperfections, enhancing the feelings of tension and unresolved emotion.</desc>
