<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Halo of Longing</title>
  <desc id="desc">This piece embodies the emotional tension between 'emptiness' and 'desire,' where a bright, saturated palette pushes against darker, muted fields. The hot coral and blood orange accents radiate outward, suggesting the pull of desire, while the charcoal and hollow blue represent the edges of emptiness that constrain and interrupt. The empty corners and center create a sense of quiet pressure, with broken pixels incorporated to symbolize the imperfections in the balance between craving and containment. The spiral layout echoes the internal struggles that exist within, framing a halo of yearning around a void.</desc>
