<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone captures the tension between longing and suppression. The chosen palette contrasts warm reds and muted creams against darker shades, reflecting desire's vibrant pull juxtaposed with restraint's calming presence. Central collision occurs at the wave-like pattern, where deeper colors interrupt the glow of lighter tones, creating a narrative of competing forces—one reaching out while the other holds back. This design follows the spiral pressure, enhancing the dissonance between saturation and muted tones, embodying the essence of the seed text.</desc>
