<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone of this artwork embodies the tension between safety and exposure. The palette features saturated greens and browns suggesting stability (shelter) contrasted with pale skin tones and cold whites indicating vulnerability (exposure). The top-weighted edge style forms a protective border, while the descending pixels represent incoming pressure and the delicate balance between the two emotions. The principal collision manifests where the warmer tones interrupt the cooler ones, creating a visual echo of the emotional dichotomy. The playful braid and patchwork patterns interweave, evoking a sense of complexity in the narrative, while maintaining clarity in the abstract structure.</desc>
