<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamics of Emotion</title>
  <desc id="desc">This composition encapsulates the tension between rage and calm through a careful division of colors and patterns. The colors black and red in the top half represent the compressed, jagged noise of rage, creating an oppressive density that contrasts starkly against the pale blue and white calmness below. The main collision occurs at the boundary between these two emotional realms, emphasized by the jagged, disruptive red in an otherwise soft, mirroring pattern of blue. This arrangement mirrors the disruption of calm by intense emotional signals, reflecting both chaos and tranquility in one frame.</desc>
