  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork reflects the emotional tension between desire and emptiness, captured through a palette that combines warm and cool tones. The dominant colors (coral and orange) represent desire, while the deep charcoal and hollow blue illustrate emptiness. The main collision occurs in the center, where warm colors meet a dark void, creating a strong contrast that amplifies the feeling of reaching versus restraint. The 'mirror' pattern adds layers of subtle complexity, while the broken pixels introduce intentional disruptions that symbolize the friction between conflicting emotions.</desc>
