<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotion</title>
  <desc id="desc">This artwork captures the tension between desire and restraint through contrasting colors and patterns. The palette leverages saturated hues from 'desire_emptiness', employing vibrant tones on the left side (desire) to represent warmth and pull, while cooler muted tones on the right side (restraint) signify containment. The main collision occurs at the vertical center, where the dense, patterned checker of hot coral and blood orange interacts with the structured ladder of charcoal and hollow blue, embodying the conflict of overflowing passion versus controlled restraint. Broken pixels disrupt this flow, subtly reflecting the scars of love and betrayal, making the composition feel both dynamic and restrained.</desc>
