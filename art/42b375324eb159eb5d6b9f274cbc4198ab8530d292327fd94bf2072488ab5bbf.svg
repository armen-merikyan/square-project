<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resilience</title>
  <desc id="desc">The artwork conveys a strong emotional tension between trust and suspicion by using a contrasting palette of muted moss green and passive bone white paired with the vibrant accents of rust and small gold. The left side, symbolizing trust, utilizes softer, more harmonious colors that resonate with stability. In contrast, the right side expresses suspicion through jagged, fractured placements and darker tones like stone gray, disrupting a sense of equilibrium. The structured diagonal fall pattern suggests a gradual ascent from chaos (right) to calm (left), embodying resilience amidst fragility. Broken pixels serve to interrupt the flow, channeling feelings of vulnerability while hinting at a deeper, underlying strength.</desc>
