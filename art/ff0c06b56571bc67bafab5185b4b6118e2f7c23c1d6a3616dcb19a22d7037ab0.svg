<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Affection</title>
  <desc id="desc">This piece embodies the emotional tension between love and betrayal, using a palette that emphasizes warmth (pink, red) alongside cooler, more muted tones (gray, dark maroon). The broken symmetry suggests a split in harmony, while the interplay of patterns creates collision—rows of noise contrasted against split screens. The design flows diagonally, creating movement and suggesting a rise from pain to hope. The scattered broken pixels evoke the imperfection of human emotion, maintaining a balance with negative space to emphasize the absence felt in emotional turmoil.</desc>
