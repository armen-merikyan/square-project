<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger in Containment</title>
  <desc id="desc">The emotional tone is a tug-of-war between desire and emptiness, displayed through a palette that conveys warmth and coolness. The colors selected—hot coral and blood orange—represent the craving of desire, while charcoal and hollow blue echo the coldness of emptiness. The collision occurs prominently in the center where the warm colors meet the darker edges, symbolizing a push against a boundary. Patterns of saturation oppose quieter fields, reflecting an internal struggle. The layout follows an upward climb, suggesting a rising tension as one feels the pull of desire merging with the constraints of emptiness, displaying the abstract journey of longing and containment.</desc>
