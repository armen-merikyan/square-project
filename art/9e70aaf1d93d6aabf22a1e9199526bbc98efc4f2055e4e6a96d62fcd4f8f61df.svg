<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The composition captures the emotional collision of grief and joy through the juxtaposition of deep blues and muted purples representing grief against bright yellows and oranges symbolizing joy. The chosen palette evokes a layered emotional response, with warm colors radiating from the center, surrounded by cooler tones, illustrating a rising signal of hope through emotional pressure. The layered grief pattern, resembling stairs, contrasts with the radial burst of joy, creating dynamic tension with broken pixels that convey imperfection. The layout encourages an upward movement, symbolizing aspiration amidst heaviness while maintaining a significant negative space for breathing room.</desc>
