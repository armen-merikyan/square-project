  <title id="title">Tension of Edges</title>
  <desc id="desc">This composition explores the interplay of 'defiance' and 'submission' through a dynamic clash between stacked patterns and negative cross shapes. The palette mixes warm coral and soft amber, representing a quiet warmth, with cool blue-black and signal cyan, suggesting the stark contrast of resistance. The main collision occurs in the center, where darker tones intersperse with lighter ones, reflecting chaos meeting stability. The 'window' shape seed influences the border, creating a confining structure that signifies constraint versus openness.</desc>
