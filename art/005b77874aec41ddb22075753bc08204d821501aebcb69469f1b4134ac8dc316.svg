  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone blends the faint warmth of ash with the vibrant bursts of spark to capture the tension between resilience and fragility. The selected palette of warm shadow and distant lilac evokes intimacy amidst distance, suggesting both connection and separation. The contrast resides centrally with braiding patterns of warmth interrupted by jagged edges of cool tones, creating dynamic collisions that symbolize inner conflicts. Broken pixels scatter throughout, reflecting memories that were once vibrant but are now worn. This composition represents the struggle against emotional exhaustion while simultaneously embracing the quiet moments of stillness.</desc>
