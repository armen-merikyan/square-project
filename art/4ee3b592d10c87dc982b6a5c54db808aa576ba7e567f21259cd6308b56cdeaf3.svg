<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Emotion</title>
  <desc id="desc">This artwork captures the push and pull between joy and grief through a structured, yet broken layout. The palette is a mix of warm oranges and yellows representing joy, contrasted with deep blues and muted purples symbolizing grief. The center holds a denser cluster of warm tones, hinting at joy, while the outer edges feature cooler colors as a reminder of grief. The collision occurs where the warm and cool tones meet, creating a dynamic tension. The broken pixels simulate imperfections in emotion, suggesting that even amidst joy, grief lingers, echoing the complexities of human experience. The pattern flows with a spiraling rhythm, representing the pulse of our emotional experience throughout.</desc>
