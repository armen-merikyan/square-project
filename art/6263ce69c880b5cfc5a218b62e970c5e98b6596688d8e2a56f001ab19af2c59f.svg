<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Presence</title>
  <desc id="desc">The artwork explores the emotional dynamics between vulnerability and strength through a split vertical design. The left side, embodying strength with radial patterns in deep greens and browns, creates a dense, structured field that suggests resilience. Overlapping patterns introduce interruptions with soft pastel shades on the right, reflecting vulnerability. The gentle color transitions and sharp contrasts between colored segments symbolize the push and pull of emotional states, where the center serves as a collision point of pressure and release. The palette draws from nature, suggesting safety and exposure, further enhancing the emotional narrative of protection and openness.</desc>
