<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Echoes</title>
  <desc id="desc">This artwork captures the emotional landscape of loneliness and connection. The top rows, representing loneliness, utilize a muted palette of dark blues and purples, creating a feeling of isolation and negative space. The bottom rows shift toward warmer tones, symbolizing connection through a burst of yellows and oranges, reflecting warmth and interpersonal dynamics. The contrasting patterns - cracks for loneliness and a tight grid for connection - provide a visual dialogue of tension between both emotional states, with the thicker hues layered against a backdrop of emptiness. The layout emphasizes a push and pull between the two moods, creating a sense of depth and complexity that resonates with the seed's themes of hidden versus exposed.</desc>
