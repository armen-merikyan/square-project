  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork explores the emotional dichotomy of emptiness and desire. The palette features warm tones of hot coral and blood orange, which pulse with a feeling of yearning, contrasted against cool charcoal and hollow blue that signify restraint and emptiness. The main collision occurs in the center, where saturated, barcoded stripes of desire clash with noise patterns representing the faint, disrupted outline of containment. The broken pixels mimic jagged edges and interruptions, enhancing the narrative of an overflow struggle against borders.</desc>
