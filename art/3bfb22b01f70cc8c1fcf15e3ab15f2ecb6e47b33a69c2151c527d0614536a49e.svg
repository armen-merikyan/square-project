<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This artwork evokes the emotional tension of 'spark' versus 'ash', creating a dynamic interplay between brightness and softness. The palette features warm browns for groundedness and shelter green for resilience, harmoniously integrating accents of pale skin and cool whites to reflect restraint's presence. The flow of the composition echoes a diagonal argument with contrasting waves, where 'spark' emerges as jagged bursts in the upper corner while 'ash' settles softly below. The intentional scattering of broken pixels introduces imperfection, representing memory and erasure, while the quiet channel of negative space provides a crucial breath within the dense arrangements, emphasizing the struggle between these emotional extremes.</desc>
