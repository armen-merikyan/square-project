<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Presence</title>
  <desc id="desc">This piece explores the emotional dichotomy of longing vs resolve through a palette emphasizing black for intense resolve and pale blue for a soft, longing echo. The contrasting saturated black shapes overlay muted fields of pale blue, creating collisions that represent the struggle between the two emotions. The chosen diagonal layout reflects the tension of two emotional forces pushing against each other, while the incorporation of broken pixels signifies the imperfections that accompany both longing and resolve. This composition evokes a sense of dynamic interplay and imbalance, viewing the themes as interwoven rather than distinct binaries.</desc>
