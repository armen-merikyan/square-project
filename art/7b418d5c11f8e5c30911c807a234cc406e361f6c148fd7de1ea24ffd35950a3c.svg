<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotion</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of tenderness versus rage. The palette, featuring saturated reds and muted blues, represents the tension between explosive and calm feelings. The main contrast occurs at the center, where bright red crosshatch lines disrupt the softer, broken dot textures of pale blue, creating a chaotic collision. The open gate layout allows the rage to overflow from one side, embodying the struggle to contain intense emotions against a backdrop of quiet spaces. The presence of broken pixels adds intentional imperfections, symbolizing the scars of emotional conflict.</desc>
