<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaotic Equilibrium</title>
  <desc id="desc">This artwork embodies the emotional contrast between rage and calm by creating a dynamic tension through color and placement. The sharp, jagged areas in red symbolize the outbursts of rage, while the lighter, spaced areas in pale blue signify calmness. The black serves as a heavy backdrop, representing weight and density, while white provides sharp interruptions—suggesting noise and clarity. The top-left corner starts with compressed pixels that expand diagonally, symbolizing rage fighting for space against the spread of calm, creating a story of a conflicting inner state with an ultimately unresolved tension in the center-heavy layout.</desc>
