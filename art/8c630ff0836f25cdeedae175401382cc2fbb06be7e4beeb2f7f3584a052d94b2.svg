<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone navigates the tension between desire and emptiness, featuring warm saturations to embody desire and cooler, muted tones representing emptiness. The palette includes hot coral and blood orange that pulse vibrantly against a backdrop of charcoal and hollow blue, creating a visual tug-of-war. The layout reflects these contrasting emotions by occupying diagonal wedges: one side pulsates with warmth, while the other recedes into quiet. The main collision occurs in the center, symbolizing an unresolved struggle, infused with broken pixels that introduce intentional scars, mirroring the overarching themes of containment and overflow.</desc>
