<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Balance</title>
  <desc id="desc">The emotional tone oscillates between feelings of panic and control, encapsulated through a carefully chosen palette of dark violet, soft gold, and muted greens contrasted against black. The top four rows, reflective of 'control,' feature structured patterns of crosshatching, suggesting stability and restraint. In contrast, the lower rows represent 'panic' through fractal-like chaos of jagged colors and disjointed placements, evoking a sense of urgency and instability. The arrangement creates a collision points of tension where stability meets chaos, conveying the struggle of navigating these opposing emotions. The negative space allows the colors to breathe, enhancing the effect of contrast and suggesting either moments of stillness or an absence felt in an empty room.</desc>
