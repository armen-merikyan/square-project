<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Release</title>
  <desc id="desc">This piece captures the emotional tension between control and surrender through a clash of structured versus chaotic patterns. The use of a monochrome dark palette ('mourning_black' and 'deep_blue') suggests weight and pressure, while lighter colors like 'pale_yellow' introduce moments of release and contrast. The radial pattern from 'control' layers in a focused deployment, converging towards the center, while 'surrender' manifests in a checker-like disruption. The primary collision occurs in the center, where density pulls against an opened edge, embodying a struggle between containment and overflow.</desc>
