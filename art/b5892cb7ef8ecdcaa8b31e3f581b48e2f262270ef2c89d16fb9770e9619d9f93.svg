<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Calm</title>
  <desc id="desc">This composition explores the emotional tension between rage and calm through color and placement. The palette is dominated by red to evoke heated emotions, contrasted with pale blue and white to suggest calmness and space. The layout forms a spiral pressure, where bright red sparks clash against the cooler, subdued tones of blue and white, creating a sense of collision at the center. The broken pixels add intentional disruption, mirroring the chaotic energy of rage while the surrounding crack patterns represent calm attempting to contain this overflow. The balance is skewed towards the red, capturing the essence of conflict and intensity, with clear large-scale structure maintained for readability.</desc>
