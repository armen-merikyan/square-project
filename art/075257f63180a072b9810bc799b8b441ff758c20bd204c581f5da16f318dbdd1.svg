<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Dissonance</title>
  <desc id="desc">The emotional tone focuses on the collision between pride (represented by warmth) and shame (represented by coolness). The selected palette of sepia, tan, dust gray, and faded blue creates a nostalgic feeling, creating a tension that mirrors the emotional contrast in the piece. The placement of colors creates clusters of quiet against denser areas, embodying the rhythm and release articulated in the seed. The distribution aligns with a vertical split, emphasizing the discord between emotions, with four columns dedicated to each feeling. Broken pixels add a sense of imperfection, highlighting the art's narrative of unresolved tension. Overall, the abstract pattern reflects the struggle between feeling exposed and the urge to shield oneself, encapsulated within a structured yet chaotic composition.</desc>
