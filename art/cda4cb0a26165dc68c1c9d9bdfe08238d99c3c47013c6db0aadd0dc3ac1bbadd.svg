<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Dissonance</title>
  <desc id="desc">This piece explores the emotional interplay between confusion and clarity. The palette of deep navy and bright white reflects the tension between darkness and light—symbolizing clarity amidst chaos. The left side, more saturated with dark hues, evokes confusion, while the right leans towards lighter tones, suggesting clarity. The broken pixel theme introduces an intentional disruption in the pattern, reinforcing the tension between the solid shapes and the empty space, embodying the struggle of coherence amid fragmented thoughts. The spiral flow extends from the center outward, mimicking a dispersal of clarity that gradually meets chaotic edges. This design showcases a dynamic contrast and an echo of unresolved feelings, resulting in a visual rhythm that resonates with the themes of the seed.</desc>
