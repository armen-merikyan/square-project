<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Duality</title>
  <desc id="desc">The emotional tone juxtaposes love and betrayal, reflected in warm reds and cool grays. The palette suggests warmth through pinks, contrasted with the coldness of dark maroon gray. The dominant collision between the soft warmth of love and the harshness of betrayal manifests in a mirrored layout with intentional breaks. Key pixels embody this duality, creating an echo of symmetry disrupted by randomized breaks, as seen in the diagonal rise from one side to the other, paralleling the idea of sharp vs soft through contrasting hues. This resulted in a composition that feels both intimate and fragmented, embodying the tension between connection and disconnection.</desc>
