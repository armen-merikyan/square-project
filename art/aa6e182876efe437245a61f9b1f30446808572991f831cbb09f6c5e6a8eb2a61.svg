<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetric Collapse</title>
  <desc id="desc">This piece captures the emotional contrast between 'confusion' and 'clarity' through a structured yet broken layout. The palette of electric blue and magenta on a black base embodies a mechanical emotionality, presenting density versus emptiness. The left side focuses on 'teeth'-like angular patterns evoking a sense of chaos, while the right leans towards 'crack', suggesting clarity amidst confusion. The thick black outlines add definition, creating a tension between full saturation and hollow space, accentuating the emotional collision at the center where confusion begins to dissipate outward.</desc>
