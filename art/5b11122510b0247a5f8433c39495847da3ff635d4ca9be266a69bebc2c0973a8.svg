<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilient Fracture</title>
  <desc id="desc">The emotional tone captures the tension between vibrant sparks of life and the quiet residue of ash, suggesting both resilience and fragility. The palette balances warm yellows and oranges symbolizing sparks against muted purples and deep blues representing ash, allowing for a dynamic collision in the center, where bright colors push against the cooler tones in a spiral pattern. This interplay echoes themes of pressure and containment. The broken pixels introduce intentional disruptions, enhancing the theme of memory and erasure, while also honoring the heart fragment shape by suggesting an abstract emotional flow rather than a tangible form.</desc>
