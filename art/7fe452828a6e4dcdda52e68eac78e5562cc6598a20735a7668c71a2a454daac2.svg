<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This artwork explores the emotional dichotomy of control and surrender. It features muted colors from the 'broken_memory' palette, suggesting a nostalgic weight, with sepia and faded blue offering a calm yet complex background. The primary contrast emerges at the center, where lighter colors 'overflow' against darker, more contained tones, resembling the struggle between a chaotic push and a stabilizing force. Patterns of dots represent control, while gradient steps reflect the slow, relinquished descent of surrender. Broken pixels are interspersed to symbolize moments of imperfection and the emotional scars from this tension. This composition illustrates a quiet battle—defining how contrasts collide and negotiate within the confines of the square, alluding to personal struggles devoid of literal imagery.</desc>
