  <title id="title">Echoes of Resistance</title>
  <desc id="desc">The emotional tone swings between defiance and submission, depicted through contrasting color patterns of dark and vibrant energy. The palette of electric blue and lime represents tension and life, while black brings depth and weight. The layout hints at a mirrored structure, yet with deliberate breaks to convey imperfection and chaos. The broken dot and radial patterns echo the struggle between forces, with the left side representing a chaotic burst of resistance against the right's more subdued acceptance. The 10% negative space allows the piece to breathe, highlighting the dense emotional turmoil.</desc>
