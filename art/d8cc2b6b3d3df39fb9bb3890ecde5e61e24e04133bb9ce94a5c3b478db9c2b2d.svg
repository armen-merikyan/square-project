<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Sanctuary</title>
  <desc id="desc">This composition explores the emotional tension between safety and exposure through a cascading ripple effect juxtaposed against a fault line. The palette, combining shelter green and warm brown with accents of cold white and open blue, embodies a feeling of soft security contrasted by the vulnerability of exposure. The central area showcases an interplay of colors, where pale skin tones symbolize exposure colliding with the heavier, warmer tones representing safety. The broken pixels intentionally disrupt the harmony, suggesting imperfect protection. The collision mainly occurs in the center, emphasizing a struggle between safety and exposure, creating a visual narrative of tension and release.</desc>
