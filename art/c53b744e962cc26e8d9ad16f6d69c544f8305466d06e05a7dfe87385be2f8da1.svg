<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Quiet and Tension</title>
  <desc id="desc">The artwork encapsulates the emotional dichotomy between longing and resolve, using a palette evoking nostalgia with sepia and tan tones alongside soft blues. The contrasting elements are centered around a jagged boundary, symbolizing the tension between the desire to repair and the reality of damage. The crosshatch pattern evokes a sense of unresolved pulse while the quiet fields deliver an aura of serenity, leading to an inner spiral flow that transforms discomfort into reflection. The use of broken pixels introduces intentional disruptions, reinforcing the theme of repairs amidst the chaos.</desc>
