<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone captures the struggle between the feeling of safety and exposure. I chose a palette of 'shelter green' and 'warm brown' to symbolize safety with tones that emanate stability, contrasting with 'open blue' and 'cold white' that represent vulnerability and exposure. The main collision occurs in the center with dense hues of brown framing a more exposed pale area, reflecting 'protection' against 'openness'. The 'island and sea' layout suggests a dense center surrounded by softer edges, reminiscent of safety vs. vulnerability. Broken pixels create intentional disruptions symbolizing imperfections and the harsh realities of exposure.</desc>
