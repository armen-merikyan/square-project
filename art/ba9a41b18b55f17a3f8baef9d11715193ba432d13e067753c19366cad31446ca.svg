<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">The emotional tones of longing and resolve create a rich interplay between warm and cool colors, with 'longing' resulting in layers of sepia and tan that evoke nostalgia and distance, while 'resolve' brings in the cooler tones of dust gray and faded blue to suggest clarity and firmness. The palette intentionally uses a broken memory aesthetic, where the saturation peaks at the center but is contained unevenly by muted borders. The core collision resides centrally, intensifying the contrast between densely packed colors against relatively empty edges, emblematic of the struggle between desire and stability. Each broken pixel symbolizes the unresolved nature of this emotional duality.</desc>
