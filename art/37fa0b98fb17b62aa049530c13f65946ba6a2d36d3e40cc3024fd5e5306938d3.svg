<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Gratitude</title>
  <desc id="desc">This artwork explores the emotional dichotomy of envy and gratitude through the juxtaposition of dull, dark hues representing envy against the softer, warmer tones of gratitude. The pattern evokes an inner tension, where stripes (representing envy) clash with teeth-like shapes (indicating gratitude). The diagonal flow creates a sense of encroachment from one corner of the canvas, reflecting the push and pull of these emotions, while maintaining negative space to suggest absence and contemplation.</desc>
