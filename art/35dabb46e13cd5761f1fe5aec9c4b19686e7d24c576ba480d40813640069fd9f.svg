  <title id="title">Light vs Weight</title>
  <desc id="desc">This artwork embodies the tension between relief and dread, using a contrasting palette of dark violet and soft gold against a backdrop of empty space. The top-heavy arrangement amplifies the feeling of imbalance, while broken pixels introduce imperfection, suggesting the precarious nature of calm amidst chaos. The interplay of warm and cool tones visualizes the emotional collision, inviting viewers to feel the push and pull of these opposing states.</desc>
