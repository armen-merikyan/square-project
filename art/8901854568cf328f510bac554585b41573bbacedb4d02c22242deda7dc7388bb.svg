<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">The emotional tone balances between restlessness and peace, illustrated through a contrasting palette of deep blues and soft grays, creating tension between the bright warm accents and the cool muted fields. The main collision occurs in the center, mimicking a chaotic flare of energy against a backdrop of calm. This duality encapsulates the push and pull of memory versus motion, where brighter marks of restlessness rise and encroach upon the serene spaces of peace, visually represented through jagged 'stair' patterns colliding with more controlled 'maze' patterns in the layout.</desc>
