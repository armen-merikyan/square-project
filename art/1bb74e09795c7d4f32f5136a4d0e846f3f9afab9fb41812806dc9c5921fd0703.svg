  <title id="title">Fractured Harmony</title>
  <desc id="desc">The abstract piece explores the tension between love and betrayal through contrasting colors and emotional flows. The palette of warm pinks and cool dark maroons encapsulates the emotional depth while allowing for a vibrant yet somber interplay. The top half represents love with paired shapes and lighter tones, while the bottom half illustrates betrayal with darker, chaotic pixel arrangements. The use of broken pixels symbolizes imperfection and heartbreak, while the zigzag flow brings a sense of movement and confusion, capturing the essence of conflict and unresolved emotions.</desc>
