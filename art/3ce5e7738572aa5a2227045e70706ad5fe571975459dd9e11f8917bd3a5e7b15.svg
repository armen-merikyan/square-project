<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Disrupted Harmony</title>
  <desc id="desc">This piece illustrates the emotional tension of defiance versus submission, represented through a battle of light and dark. The color palette features deep navy and black to signify weight, contrasted with bright dim cyan, embodying fleeting moments of hope. The pattern flows vertically from bottom to top, suggesting upward struggle amidst chilling contrasts. The bottom-heavy arrangement emphasizes surrender, while scattered broken pixels introduce imperfection, mirroring life’s turmoil and unresolved feelings. The interplay between structured lines and fragmented areas reflects the push and pull between confrontation and acquiescence.</desc>
