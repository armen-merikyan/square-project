<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tension</title>
  <desc id="desc">This piece embodies the emotional duality of defiance and submission, using a palette that interplays warm yellows and oranges with cool muted purples and deep blues. The central area bursts with brighter hues, suggesting defiance, while the edges soften into darker tones, evoking submission. The purposefully broken pixels across the artwork reflect moments of discord and interruption, illustrating a struggle between pushing forward and yielding. The density in the darker rows suggests the weight of submission while the vibrant center contrasts this, hinting at persistent defiance. The layout creates a visual tension that shifts from sharp, angular disruption to a calm, flowing closure, embodying a nuanced emotional journey.</desc>
