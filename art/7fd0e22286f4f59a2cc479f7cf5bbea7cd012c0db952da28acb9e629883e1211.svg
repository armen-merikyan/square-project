<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">The artwork captures the emotional duality of longing and resolve through contrasting palettes and structured chaos. The chosen colors, primarily greens and golds, symbolize growth and healing against a backdrop of serene creams, evoking a feeling of urgency tied to a sense of calm. The collision occurs predominantly in the center as the upward diagonal flow disrupts the otherwise stable bottom half, representing resolve. Broken pixels are strategically placed to reflect imperfection and fragmentation, mirroring the theme of a broken mirror. The overall arrangement balances the density of longing with the serenity of resolve, creating a dynamic tension throughout the piece.</desc>
