<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Emotion</title>
  <desc id="desc">The piece explores the ongoing tension between joy and grief, using warm yellows and bright oranges to represent joy, contrasted by deep blues and muted purples signifying grief. The layout is a 'mirror broken' concept, creating a sense of almost symmetrical balance but with deliberate disruptions suggesting chaos hidden within order. The zigzag pattern echoes rising signals of hope against the backdrop of heavier emotions, while the broken edges symbolize the imperfections in both joy and grief. This balancing act invites viewers to reflect on their own experiences of these intertwined emotions.</desc>
