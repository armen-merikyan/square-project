  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This piece captures the tension between desire and emptiness through a clash of saturated and muted colors. The palette comprises rich oranges and pinks representing desire alongside cooler blues and grays symbolizing emptiness. The corner layout evokes a rising pressure in the composition, while the zigzag flow creates anticipation and unease. The broken pixels introduce intentional disruptions, echoing the nature of desire that is often thwarted or restrained.</desc>
