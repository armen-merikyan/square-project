<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Invasion of Resilience</title>
  <desc id="desc">This composition captures the tension between defiance and submission using a palette that embodies resilience and fragility. The use of moss green and rust creates a grounded feeling, while bone white provides a stark contrast to signify submission. The patterns of static defiance mixed with the staircase flow of submission create a push-pull effect, with the primary collision occurring in the center where both emotions intersect. The uneven border and broken pixels introduce a sense of chaos, reflecting the invasion theme—where defiance begins in the corner and gradually spreads across the canvas, battling against the subdued center.</desc>
