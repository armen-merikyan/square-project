<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Echo</title>
  <desc id="desc">The emotional tone explores the conflict between control and surrender, represented through a composition that tightly constrains colors on the left, gradually releasing them into a lighter, more open right side. The selected palette of moss green and bone white conveys resilience and fragility, while rust and stone gray add depth and earthiness. The contrast lies primarily along a diagonal flow from dense to empty, with the center being an intense collision of darker hues, signifying pressure before giving way to a quiet, lighter field, embodying a release. The use of broken pixels in the transition adds an element of imperfection and rawness, enhancing the theme of disturbance between states of being.</desc>
