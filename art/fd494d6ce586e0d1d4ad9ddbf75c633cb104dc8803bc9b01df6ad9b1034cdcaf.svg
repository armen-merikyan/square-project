<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone reflects the tension between panic and control. The warm colors (yellow, orange) represent the chaos and energy of panic in the upper four rows, while cool tones (deep blue, muted purple) signify the calm and restraint of control in the bottom rows. The contrast is heightened by the use of broken edges and a split layout that divides the two emotions. The arrangement of colors suggests shifts in intensity and creates a rhythm of rising pressure and descending calm, echoing the narrative of the seed as it transitions from chaos to order.</desc>
