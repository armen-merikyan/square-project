<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Central Tension</title>
  <desc id="desc">This piece embodies the contrasting emotions of vulnerability and strength through a clash of color and texture. The palette of pale mint, soft sky, and faded gold suggests a tender atmosphere, while storm gray and near black introduce a sense of weight and pressure. The split screen pattern on one side represents vulnerability, while the broken dots signify strength on the opposite side. The central collision occurs where the two patterns meet, illustrating the tension between the two emotional states. This layout suggests that while vulnerability permeates from the corner, strength pushes back, creating a dynamic narrative of exposure and resilience.</desc>
