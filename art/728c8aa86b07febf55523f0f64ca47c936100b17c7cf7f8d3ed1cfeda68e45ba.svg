<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoed Resolve</title>
  <desc id="desc">This composition contrasts the emotional states of longing and resolve, symbolizing a journey between these feelings. The muted palette of off-white, dust gray, and faint peach embodies a sense of serenity, while the compressed red and dark navy introduce emotional intensity and a focal push. The quiet channel structure creates a narrow path of negative space, allowing for a dense clash between the echoing longing patterns and target marks of resolve. The heart of the piece erupts in the center, showcasing a collision of calm and chaos, reflecting the complex narrative of emotional tension.</desc>
