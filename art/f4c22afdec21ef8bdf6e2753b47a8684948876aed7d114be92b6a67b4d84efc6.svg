<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This piece embodies the emotional tension between trust and suspicion through a split vertical layout, suggesting collision between a clean echoing pattern and a disrupted stacked formation. The color palette blends warm shadows with cool blues, representing the conflict of warmth in trust against the cool detachment of suspicion. Key contrasts emerge in the center, where the soft glow of rose clay meets the harsh dark of distant lilac, signifying the struggle between resilience and fragility. Broken pixels create intentional disruptions that symbolize breaches in trust and hints of suspicion.</desc>
