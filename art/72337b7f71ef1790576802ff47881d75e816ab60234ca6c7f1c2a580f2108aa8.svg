<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Symmetry</title>
  <desc id="desc">This piece embodies the tension between clarity and confusion through a palette that juxtaposes dark violet with soft gold and pale green. The flow, moving from the corner inward, creates a feeling of invasion by the chaotic elements, while the organized stripes of clarity offer visual respite. Key contrasts emerge through the thick outlines of dark colors against lighter, softer ones, suggesting collision between emotions. Broken pixels add intentional imperfection, enhancing the theme of symmetry versus break. Overall, the work narrates a story of grappling with clarity in the presence of chaos.</desc>
