<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This composition embodies the contrasting emotions of longing and resolve, represented through a color palette that evokes warmth and richness. The use of ripe green and honey gold suggests a nurturing yet unsettled longing, while the deep olive and acid green offer a grounded contrast reflecting resolve. The center of the piece serves as a pulsating collision of these emotions—a vibrant merging point between the two patterns (tide and fault line), creating a visual dialogue that feels both dynamic and contained. Broken pixels introduce imperfections, reflecting the transient nature of feelings and experiences, while negative space accentuates the tension between the overwhelming and the serene.</desc>
