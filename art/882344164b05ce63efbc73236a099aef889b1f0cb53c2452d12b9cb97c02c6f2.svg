<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tide of Tension</title>
  <desc id="desc">The artwork embodies the emotional conflict between quiet and pressure. Using a palette of muted and contrasting colors, it juxtaposes an off-white and faint peach against deeper tones like dark navy and compressed red, suggesting both lightness and heaviness. The dense left side represents pressure with a torrent of colors that 'tide' and clash, while the right side offers a quieter space filled with negative space indicating calmness. The diagonal flow establishes a sense of conflict and movement, emphasizing the tension between order and chaos while maintaining a clear visual structure.</desc>
