<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Tension</title>
  <desc id="desc">This abstract composition captures the emotional struggle between restlessness and peace, reflecting a push and pull between conflicting states. The palette is anchored in deep blues and muted shades contrasting with pale yellow, symbolizing the tension between darkness (restlessness) and light (peace). The rising layout suggests aspiration, with pixels clustered at the bottom to represent a foundation of disturbance, gradually lightening towards the top, embodying hope. The diagonal flow creates a tension that interrupts the flat grid layout, while broken pixels introduce intentional imperfections, echoing moments of discord in an otherwise serene atmosphere. The main collision occurs along the diagonal, where the colors abruptly transition from darker, denser hues to lighter, more tranquil shades, illustrating the emotional narrative of yearning for peace amidst turmoil.</desc>
