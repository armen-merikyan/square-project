<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tear of Connection</title>
  <desc id="desc">This artwork explores the contrast between loneliness and connection through a geodesic pattern that emanates from the center, represented by dark colors, suggesting a hidden core under pressure. The palette includes navy and dim cyan to evoke depth and calmness while creating a stark collision with the darker elements. The flow suggests a pulsating energy, with broken pixels symbolizing the imperfect nature of human relationships. The inner burst faces the quiet outer edges, emphasizing the emotional struggle of connection against isolation.</desc>
