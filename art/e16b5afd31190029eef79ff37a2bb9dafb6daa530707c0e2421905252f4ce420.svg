<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This abstract composition captures the emotional conflict between desire and emptiness. The palette includes warm hues like hot coral and blood orange representing desire, contrasted with cooler shades of charcoal and hollow blue symbolizing emptiness. The layout reflects the rising signal, where warmer colors climb upwards indicating aspiration, while the lower rows feature darker, more muted tones that create a sense of containment and interruption. The predominantly warm upper section dominates the grid, allowing the cooler colors to punctuate the composition, creating a striking visual tension and illustrating the push-and-pull of longing trapped within boundaries.</desc>
