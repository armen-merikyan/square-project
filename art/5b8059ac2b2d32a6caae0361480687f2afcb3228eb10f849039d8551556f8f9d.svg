<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">The emotional tone of this artwork juxtaposes explosive rage against a serene calm, illustrated through color placements. The palette features intense reds symbolizing rage contrasted with pale blues and whites that evoke calmness. The conflict occurs predominantly in the center through the use of radial patterns clashing with softer, halo-like edges, creating an interplay of pressure and release. The edges, shadowed and eroded, represent the ongoing tension between the contained and overflowing emotions, embodying the noise and signal interplay. This abstract composition captures the essence of the seed through an unresolved emotional narrative, maintaining a chaotic yet harmonious balance.</desc>
