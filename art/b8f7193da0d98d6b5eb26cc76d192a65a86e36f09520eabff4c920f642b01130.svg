<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotion</title>
  <desc id="desc">This piece embodies the tension between fear and hope, using a split horizontal layout to represent duality. The top half reflects fear with dark and jagged colors, creating a dense, oppressive atmosphere. In contrast, the bright, warm tones in the bottom half symbolize hope, inviting upward movement and light. The interplay of dark blacks and violets meets soft gold and pale green, illustrating a burst of emotions at the center. The use of broken pixels adds a level of imperfection, mirroring the unpredictable nature of human feelings.</desc>
