<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This composition expresses the tension between safety and exposure through contrasting colors and patterns. The palette includes 'shelter_green' and 'warm_brown' suggesting warmth and safety, while 'cold_white' and 'open_blue' introduce vulnerability and exposure. The primary collision occurs in the vertical center, where the hard edges of safety meet the soft, fading ripples of exposure. The abstract patterns of stripes and threads intermingle, hinting at the dialogue between these oppositional feelings, creating a dichotomy that embodies the seed's themes.</desc>
