<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition explores the emotional tension between desire and restraint through a juxtaposition of saturated and muted colors. The palette features vibrant hues such as hot coral and blood orange, representing desire, which clash against the cooler, muted tones of charcoal and hollow blue that signify restraint. The collision occurs in the center of the grid, where the static pull of desire meets the glitchy, interrupted patterns of restraint. The structured, sealed edges symbolize confinement, while the inner turmoil is represented by the disorderly clash of tones, embodying the tension inherent to longing. This abstract arrangement encapsulates the essence of a locked barrier against a saturated pull, maintaining a readable design while evoking a sense of struggle and emotion.</desc>
