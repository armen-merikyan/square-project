<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Resolve</title>
  <desc id="desc">This composition captures the emotional tension between longing and resolve through contrasting colors and spatial dynamics. Utilizing the 'clarity_confusion' palette, the stark contrast of ice blue against ink black highlights the feeling of yearning against a backdrop of steadiness. The collision of the spark pattern, suggesting longing, with the mirror pattern, indicating resolve, appears prominently in the center, where jagged elements represent the broken fragments of a 'crack.' The layout balances quiet negative space with bursts of tension, reflecting a serene urgency, creating an emotional pulse throughout.</desc>
