<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition embodies the emotional tension between desire and emptiness through color and structure. It utilizes a palette of warm reds and cool blues to evoke feelings of warmth and containment against a backdrop of hollowness. The main collision of colors occurs diagonally from the top corner to the bottom, where a warm coral pulse meets a soft, muted hollow blue, creating a tension that symbolizes yearning against restraint. Broken pixels disrupt an otherwise balanced layout, enhancing the sense of imperfection and longing. This aligns with the overarching narrative of the seed, representing the struggle between growth and limitation while ensuring adequate negative space to suggest absence.</desc>
