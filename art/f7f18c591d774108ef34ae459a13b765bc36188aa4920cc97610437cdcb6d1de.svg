  <title id="title">Tension in Shelter</title>
  <desc id="desc">This artwork explores the emotional dichotomy between safety and exposure through a split-horizontal layout. The top half leans into the warm, inviting shades of safety with a pattern that resembles teeth, suggesting a gentle enclosure. The bottom half disrupts with harsh, cool stripes representing exposure, culminating in tension as they vie for space. The palette leverages warm browns and soft greens for safety, contrasting sharply with cold whites and pale hues for exposure, manifesting the collision vividly in the center of the grid.</desc>
