<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The artwork embodies a tension between vulnerability and strength. The palette combines earthy moss green and rust with softer bone white and stone gray to reflect a balance of resilience and fragility. The strength pattern, represented by barcodes, contrasts with the vulnerability of rings. The center showcases an exposed pale area, interrupted by bold, dark lines that symbolize protection and damage. The composition follows an 'open gate' layout, allowing an incoming flow that emphasizes the contrast between a safe core and the external pressures. Broken pixels subtly disrupt the flow, hinting at past scars yet suggesting ongoing strength.</desc>
