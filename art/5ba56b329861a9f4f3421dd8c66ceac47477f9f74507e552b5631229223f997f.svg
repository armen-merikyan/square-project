<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Weight</title>
  <desc id="desc">This composition reflects the emotional duality of defiance and submission, using a palette that juxtaposes the depth of black and dark violet with the softer, questioning tones of pale green and soft gold. The movement from bottom to top symbolizes the rise of hope against the gravity of weight, with the dark hues weighted at the base echoing a sense of struggle. Broken dots pattern outwards from the center to form a chaotic yet controlled delineation, capturing the noise against a frame while retaining a sense of openness amidst closed clusters, embodying the tension and release inherent in love and betrayal.</desc>
