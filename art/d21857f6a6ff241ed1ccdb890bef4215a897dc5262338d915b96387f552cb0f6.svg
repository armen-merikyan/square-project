<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This piece embodies the emotional tension between safety and exposure through contrasting colors and patterns. The selected palette of soft greens and warm browns evokes a sense of shelter, while cooler blues and pale tones suggest vulnerability. The main collision occurs in the middle rows where the two emotional states press against each other, emphasizing the dialogue between protection and exposure, underscored by the stepwell and island patterns that disrupt symmetry, creating a visual narrative of tension and release.</desc>
