<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Asymmetry</title>
  <desc id="desc">The emotional tone reflects a deep interplay between restlessness and peace, capturing the tension of motion against a backdrop of serenity. The color palette, heavily reliant on warm tones like hot coral and blood orange, contrasts sharply with the cool charcoal and hollow blue, evoking feelings of urgency and calmness. The main collision occurs diagonally, where the warm colors dominate one corner and meet the cool colors, suggesting a push-pull dynamic that reflects both chaos (restlessness) and refuge (peace). This diagonal movement helps to express the idea of memory and motion—an emotional journey that flares brightly against the quiet. The broken pixels add intentional disruptions, mimicking the imperfections of memory, creating a layered composition that is both inviting and unsettled.</desc>
