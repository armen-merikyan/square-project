<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Dissonance</title>
  <desc id="desc">The emotional tone of longing and resolve creates a foundational tension, mirrored by the selected palette of intense black, calming pale blue, and stark white. This evokes themes of repair against damage, where the deep colors represent longing and the bright accent of white symbolizes resolve. The main collision exists within the central square, marked by darker tones clustering on one diagonal versus the more resolved lighter colors, establishing a dynamic interplay between the two tensions. The patterns of crosshatch and stack collide in the composition, with broken pixels intentionally disrupting the flow, symbolizing the fractures in harmony. This representation conveys the contrast between inner turmoil and a striving for steadiness, as if pushing against unseen boundaries.</desc>
