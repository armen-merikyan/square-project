  <title id="title">The Balance of Exposure</title>
  <desc id="desc">The emotional tone reflects a balance between vulnerability and protection. The chosen palette of shelter green and warm brown conveys safety, while the cold white and open blue suggest exposure. The contrast occurs mainly in the center where a dense band of pale skin interacts with a lighter echo of cold white—representing the tension of pressure versus release. The abstract pattern emerges from the vertical split and the layered bands, merging softness and severity through a subtle play of density, crafting a visual narrative of resilience amidst vulnerability.</desc>
