<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Edges of Emotion</title>
  <desc id="desc">This artwork embodies the tension between defiance and submission. The palette captures a 'broken memory' theme with muted earth tones (sepia and tan) against softer shades (dust gray and faded blue) to elicit a sense of nostalgia and introspection. The main contrast occurs in the center, where the darker, more defiant colors (sepia and dark tan) collide with the lighter, more submissive shades (dust gray and faded blue), suggesting a battle of emotions. The falling pixel layout evokes the feeling of cascading thoughts, while intentional disruptions (broken pixels) partially obscure the order, adding to the chaotic feeling but maintaining spaces of quiet. This relationship fosters an abstract tension, reflecting the complexity of navigating emotional thresholds.</desc>
