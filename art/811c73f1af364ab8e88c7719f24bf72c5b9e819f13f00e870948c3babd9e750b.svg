<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Emotion</title>
  <desc id="desc">This 8x8 composition embodies the emotional dichotomy of envy and gratitude through contrasting color placements and patterns. The palette, inspired by 'lonely_signal,' incorporates deep navy and black to represent the weight of envy, contrasted by softer hues of dim cyan to evoke the lightness of gratitude. The layout follows a corner invasion, suggesting that envy begins in a shadowed corner, gradually spreading outwards, while gratitude attempts to rise against this heaviness. Broken pixels introduce a sense of imperfection and unresolved emotion, creating an echo of tension where colors collide and interact.</desc>
