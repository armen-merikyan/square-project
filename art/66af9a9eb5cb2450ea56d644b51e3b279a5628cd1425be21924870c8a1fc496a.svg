<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects a tension between vulnerability and strength, captured through a palette tilted towards softer shades while maintaining a strong base. The clash of warmer reds with grays signifies moments of protection versus invasion, creating a vibrancy within the subdued. The primary contrast unfolds at the center, where blocks collide, suggesting an exposed core. The arrangement of patterns — glitch and crosshatch — illustrates uncertainty interrupted by reliable structures. Broken pixels at the edges offer an intentional disruption, enhancing the sense of fragility and defense, emphasizing the overall narrative of stability against pressure.</desc>
