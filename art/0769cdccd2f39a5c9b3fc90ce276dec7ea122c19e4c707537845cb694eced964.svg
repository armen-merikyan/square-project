<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Desire</title>
  <desc id="desc">This artwork explores the emotional tension between desire and restraint, utilizing a palette that juxtaposes vibrant colors with muted tones. The main contrast occurs centrally with warm pulses of hot coral and blood orange pushing against the cooler hues of charcoal and hollow blue, suggesting a struggle between the vibrant push of desire and the holding back nature of restraint. The chosen shape seed, 'door', influences the grid's layout where warmer colors spill over into the surrounding quiet fields, simulating the idea of a threshold between the intense yearning and the calm of held borders. These emotional dynamics are visually represented through ripple patterns and quiet fields layering over each other, creating a dense yet airy atmosphere that encapsulates unresolved tension.</desc>
