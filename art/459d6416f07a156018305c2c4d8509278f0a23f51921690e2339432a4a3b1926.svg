  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone highlights the tension between safety and exposure, with a palette that reflects warm and cool contrasts. The warm browns suggest stability and shelter, while the pale skin and gentle greens evoke vulnerability. The bright clusters of color in the center create a focal point of exposure, contrasting against darker surrounding fields for a sense of interruption. The layout allows negative space to breathe through, reflecting the balance between protection and openness, while using a braided pattern to hint at complexity within the simplicity of the design.</desc>
