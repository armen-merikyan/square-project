  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition reflects the emotional tension between vulnerability and strength, illustrated through a contrasting palette of deep blacks and pale blues, with white accents. The collision occurs predominantly in the central area with stark, bright patches that symbolize unshielded light against a darker backdrop, resembling fractured strength amid vulnerability. The arrangement is intentionally asymmetrical, leaving space for interpretation while maintaining a scattered repair layout that metaphorically conveys the struggle between exposure and the desire for safety.</desc>
