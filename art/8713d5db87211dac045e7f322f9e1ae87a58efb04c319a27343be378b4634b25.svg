<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This artwork explores the thematic tension between envy and gratitude through the contrast of warm and cool colors, symbolizing the struggles these emotions present. The palette, featuring deep blacks and soft golds against pale greens and dark violets, generates a dynamic interplay that mirrors the upward movement of a stair step while maintaining an element of brokenness and imperfection. Key collisions occur at the boundaries of lighter and darker tones, representing conflict and resolution in emotional experience, with asymmetry reflecting the 'centered vs off-center' theme introduced by the seed.</desc>
