<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotion Collision</title>
  <desc id="desc">The emotional tone reflects a stark contrast between joy and grief, symbolizing a struggle between lightness and heaviness. The chosen palette of yellows and oranges represents joy with their bright, warm qualities, while deep blues and muted purples evoke feelings of grief and weight. The layout is split vertically, emphasizing the collision of emotions across the center. The upper half features a crosshatch pattern symbolizing joy, while the lower half's rain pattern reflects grief. The stark division between these two emotional expressions is enhanced by thick edges and broken pixels introducing imperfection, suggesting the complex, jagged nature of feeling safe yet threatened. The artwork conveys an internal battle with bright spots of joy colliding with heavy, muted fields, creating a visual narrative of emotional tumult.</desc>
