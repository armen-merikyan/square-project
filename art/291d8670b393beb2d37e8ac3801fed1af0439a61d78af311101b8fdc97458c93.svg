<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Emotions</title>
  <desc id="desc">This piece embodies the tension and harmony between envy and gratitude. The selected palette of deep blacks, calming pale blues, and stark whites reflects the contrasting emotions—black representing the weight of envy and white signifying the lightness of gratitude. Horizontal patterns emerge through the grid of envy on the left, contrasting with the soft radial dispersing forms of gratitude on the right, enhancing the story of rising and falling emotional states. The broken pixel details introduce a sense of imperfection, symbolizing the subtle discord and beauty found in capturing these feelings.</desc>
