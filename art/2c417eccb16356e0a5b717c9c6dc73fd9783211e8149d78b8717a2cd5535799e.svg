<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This piece explores the emotional dichotomy of joy and grief. The palette combines bright yellows and oranges to evoke joy, contrasting with deep blues and muted purples representing grief. The contrast is emphasized by a left-weighted arrangement that hints at asymmetry, with vibrant colors pulsing on the left while muted tones ripple on the right. The broken edges play into the theme of fragmentation in emotions, echoing the concept of tension between connection and betrayal, creating a dynamic visual rhythm that suggests a narrative of fluctuation between light and dark feelings.</desc>
