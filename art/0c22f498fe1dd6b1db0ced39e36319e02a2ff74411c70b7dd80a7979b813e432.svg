<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Duality</title>
  <desc id="desc">The artwork captures the emotional dichotomy of longing and resolve by juxtaposing darker and warmer tones in a radial flame pattern. The dark shades of blackened plum and iron gray convey a sense of depth and weight, representing longing as a yearning gap. In contrast, the warmer hues of small orange and muted cream symbolize resolve, shining like embers within the dark. The main collision occurs in the center, where sharply contrasting colors intermingle, suggesting a dynamic tension in this emotional struggle. The layout is framed as an open gate, allowing the light to seep through the darker edges, highlighting the contrast between contained desire and the overflow of vibrant energy.</desc>
