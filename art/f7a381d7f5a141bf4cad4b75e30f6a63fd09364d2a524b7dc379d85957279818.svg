<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Conflict</title>
  <desc id="desc">This artwork reflects the tension between clarity and chaos, encapsulating the emotional struggle of 'signal vs noise.' The palette of cool (electric blue and dead black) and warm hues (hot magenta and signal green) evokes conflicting feelings of focus against distraction. The predominant dark tones occupy the majority of the space, representing the noise, while brighter accents pierce through, suggesting signals fighting for attention amid interference. The pattern flows diagonally, creating a dynamic sense of movement and collision at the center, symbolizing the pulse of memory trying to surface against an echo of static.</desc>
