  <title id="title">Rise vs. Fall</title>
  <desc id="desc">This artwork captures the emotional tension between spark and ash through contrasting colors and patterns. The palette of rose clay, warm shadow, cool blue, distant lilac, and lamp gold suggests intimacy and distance, echoing the struggle between vibrant sparks of life and the residual ash of restraint. The layout collides vertical and horizontal movements to create a tense crossing in the center, emphasizing a battle of energies. Broken pixels add imperfection, echoing memories and erasures within the structure, while maintaining a quiet space that balances the density of color, with the main collision happening around the central axis.</desc>
