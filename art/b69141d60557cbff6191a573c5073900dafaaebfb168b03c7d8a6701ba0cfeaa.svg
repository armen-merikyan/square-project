<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipsed Emotions</title>
  <desc id="desc">The emotional tone reflects the collision of tenderness and rage, achieved by contrasting a muted palette with vivid commands. The black, pale blue, and saturated reds create tension, suggesting quiet defiance against vibrant, compressed anger at the center. The clusters of bright accents break into the calm spaces, symbolizing the intermingling and struggle between these emotional states. The negative spaces foster breathing room within this tension, representing quiet introspection amidst chaos, while the broken pixels introduce imperfection, mirroring the complexities of guilt and forgiveness.</desc>
