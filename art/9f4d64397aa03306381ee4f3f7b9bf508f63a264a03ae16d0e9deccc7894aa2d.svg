<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone juxtaposes rage and calm, illustrated through a palette of stark contrasts: deep black and vibrant red denoting turmoil, complemented by gentle pale blue and white suggesting tranquility. The arrangement features explosive tension (diagonal breaks) colliding with areas of more muted, horizontal calmness, particularly evident in the corners where quiet fields are unsettled by bursts of intensity. The pattern draws from the seed's thematic elements—broken symmetry and containment—resulting in a visual narrative of chaotic emotion contained within structured boundaries, echoing themes of machine-like precision versus organic emotion.</desc>
