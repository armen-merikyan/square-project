<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Signals</title>
  <desc id="desc">The emotional tone of the piece embodies a struggle between clarity and chaos, represented by the 'signal vs noise' dichotomy. The palette utilizes deep navy and black to establish a sense of depth and shelter, contrasted with splashes of dim cyan and bright white that act as signals piercing through the the static. The main collision occurs in the center row, where bright signals attempt to emerge from a backdrop of noise, signifying a moment of clarity amid confusion. The layout's mirroring reflects the tension between dualities, while the use of broken pixels introduces intentional imperfections that interrupt the flow, mirroring the concept of memory and erasure.</desc>
