<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between States</title>
  <desc id="desc">The composition embodies the emotional dichotomy of longing and resolve through a subtle interplay of color and structure. The palette features black and dark violet representing longing and uncertainty, contrasted by soft gold and pale green to symbolize a fragile resolution and hope. The main contrast occurs along a diagonal stretch, where the soft gold occupies the majority, representing resolve, while the darker tones encroach from the corner, suggesting longing's pervasive nature. Broken pixels are introduced sporadically to create visual scars, enhancing the themes of damage and repair. This configuration invites the viewer to feel the tension and relief of these emotional contrasts without defining them literally, but rather through the language of color and form.</desc>
