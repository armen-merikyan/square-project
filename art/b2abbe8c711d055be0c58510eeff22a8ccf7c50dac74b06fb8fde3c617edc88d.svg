<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Duality</title>
  <desc id="desc">This composition navigates the emotional contrasts of awe and terror through a structured chaos. The chosen palette, anchored in maroons, reds, and subtle grays, highlights the tension between warmth and coldness, with dark maroon symbolizing the depths of terror and inviting an awe-inspired reaction. The vertical flow mirrors descent, suggesting both gravity and pressure, intersected by broken dots that evoke fragmented memories, imparting a sense of instability and reflection. The layout supports a split-screen feeling, oscillating between distinct emotional regions that create an unresolved collision, embodying the theme of inside vs outside in a visual dialogue.</desc>
