  <title id="title">Erosion of Order</title>
  <desc id="desc">This artwork reflects the tension between control and surrender through contrasting emotional states. The palette, featuring clean whites and icy blues against darker grays and accents of warning orange, suggests clarity challenged by confusion. The main contrast occurs at the center where structured islands of control meet soft, halo-like edges of surrender, representing a transition from rigidity to fluidity. Broken pixels scatter throughout to symbolize imperfections in the balance, creating a narrative of conflict and release.</desc>
