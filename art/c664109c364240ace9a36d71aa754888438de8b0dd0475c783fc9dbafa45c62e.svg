<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order and Disruption</title>
  <desc id="desc">This artwork reflects the emotional duality of restlessness versus peace through contrasting colors and patterns. The palette includes deep black for grounding (mourning), blue representing calmness, and pale shades illustrating hope. The left side presents structured, static patterns symbolizing peace, while the right side breaks into ash-like fields, suggesting restlessness. The light gradient climbing from the bottom contrasts sharply with dark disruptions above, embodying hope interspersed with chaos. The primary collision is diagonal, emphasizing the tension between these two emotional states.</desc>
