<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Affection</title>
  <desc id="desc">The emotional tone reflects the complexities of love and betrayal. The palette incorporates warm pinks and reds alongside cooler grays, emphasizing the contrast between warmth and coldness, representing love's glow versus betrayal's chill. The broken patterns embody the notion of a corrupted symmetry, with jagged edges interrupting the flow, suggesting tension. The main collision occurs at the center where warm tones intersect with dark maroon shades, creating an unsettling discord. This abstract pattern emerges from the seed by weaving emotional tension through color placement and rhythmic patterns, inviting contemplation of the intricate dynamics within relationships.</desc>
