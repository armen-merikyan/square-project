<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order in Chaos</title>
  <desc id="desc">This piece evokes the emotional tension between trust and suspicion. The palette brings warmth with soft gold and warm ivory, contrasting with the deep wine and ash gray to highlight unease. The main collision occurs diagonally across the square, where the chaotic shatter pattern of suspicion, represented by darker tones, meets the calm, connected warmth of trust. The broken pixels represent disruptions in trust, while a central grouping of brighter colors symbolizes resilience amidst the ash field. The structure feels dense in one corner while allowing for negative space to breathe in another, embodying the tension of the duality within the emotional seed.</desc>
