<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Exposure</title>
  <desc id="desc">This composition explores the tension between safety and exposure, using a muted palette that contrasts the enveloping warmth of browns and greens against the cold clarity of whites and pale skin tones. The main collision occurs diagonally, where the soft, crosshatched warmth (safety) meets the jagged interruptions of the broken frame (exposure). The interplay reveals a struggle between the comfort of shelter and the vulnerability of being open, expressed through fragmented edges that suggest both protection and risk.</desc>
