  <title id="title">Emotional Rift</title>
  <desc id="desc">This artwork captures the emotional tension between envy and gratitude, utilizing a palette of muted sepia tones paired with soft blues to invoke a sense of nostalgia and complexity. The contrast of light and dark colors illustrates the struggle between light (gratitude) and dark (envy) as they occupy the edges and center of the grid. The pattern mirrors the conflicts of rising and falling emotions, where soft edges blend yet clash with intentional imperfections, creating a narrative of unresolved emotional turmoil.</desc>
