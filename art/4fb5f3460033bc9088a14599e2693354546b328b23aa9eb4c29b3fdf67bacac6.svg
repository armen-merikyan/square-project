<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes in Static</title>
  <desc id="desc">This composition evokes the emotional tension between clarity and clutter, mirroring the dynamic of signal and noise. The chosen palette features deep navy for groundedness, complemented by black to add intensity and depth. Dim cyan represents a moment of clarity amidst the chaos, while whites create moments of disruption and interruption. The collision mainly occurs through sharp contrasts where square patterns of navy and clean white clash with the chaotic tide patterns in dim cyan and black, suggesting a struggle for clarity. The layout employs a broken frame, allowing glimpses of negative space to symbolize gaps in communication. The chaotic noise of darker hues pushes against the structured grid of white, thus portraying a visceral narrative of order fighting against entropic noise.</desc>
