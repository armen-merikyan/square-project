<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure of Contrast</title>
  <desc id="desc">The emotional tone reflects the tension between envy and gratitude, represented through the stark contrast of bright yellows and muted purples. The palette suggests joy caught in a weight of grief. The structure creates a central visual emphasis, highlighting a small bright shape (yellow) against a heavier, darker mass (muted purple), with crosshatch patterns for envy and dots for gratitude, emphasizing the inner conflict and unresolved feelings. The zigzag pattern gives a sense of movement, suggesting a stair-step motion against the noise of life. Broken pixels create imperfection, enhancing the theme of a shattered mirror between feelings.</desc>
