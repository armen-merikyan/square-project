<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece conveys the emotional dichotomy between vulnerability and strength through contrasting patterns and colors. The palette features shelter green for stability, warm brown for earthiness, pale skin for exposure, cold white representing isolation, and open blue for hope. The main collision occurs in the center with a pale skin color surrounded by dense lattice patterns of brown and green, symbolizing the tension between the desire for shelter and the peril of exposure. The edges are intentionally fragmented with broken pixels to represent the frailty and interruptions inherent in these emotions.</desc>
