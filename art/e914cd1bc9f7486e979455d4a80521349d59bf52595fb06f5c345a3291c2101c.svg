<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Currents</title>
  <desc id="desc">The composition reflects the emotional turmoil of defiance colliding with submission, represented through angular patterns and soft overlapping textures. The palette of moss green and stone gray evokes resilience against the fragility symbolized by bone white and rust. The bold central pulse marks clash with the receding barcodes in the edges, creating a clear focal point at the center where tension peaks, while also incorporating broken pixels to emphasize vulnerability. This dynamic interplay suggests a narrative of resilience amidst underlying submission, depicted through visual tension and color contrast.</desc>
