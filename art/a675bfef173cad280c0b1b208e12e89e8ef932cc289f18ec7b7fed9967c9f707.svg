<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Resistance</title>
  <desc id="desc">The emotional tone dives into the clash of defiance and submission, where the heart of the square exhibits stability through deep wine and warm ivory. The background uses ash gray to recede and create a soft barrier, while stain brown serves as a grounding element. The collision occurs in the center, where angular 'stairs' pattern of warm gold meets the scattered 'dots' of deep wine, embodying the battle between order and chaos. This shape seed, embodied by the concept of a 'wound', informs the tension—suggesting healing through recognition of scars and memories.</desc>
