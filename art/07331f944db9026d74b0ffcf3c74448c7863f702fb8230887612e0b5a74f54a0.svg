<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Between Shadows</title>
  <desc id="desc">This artwork embodies the duality of joy and grief through contrasting colors and patterns. The central diamond shape echoes the core emotions, surrounded by a mix of warm and cool tones. The palette, featuring yellows and muted purples, invokes brightness and sorrow simultaneously, creating a vibrant tension. The arrangement is intentionally unbalanced, with heavier elements on the left reflecting grief, while brighter, lighter colors on the right symbolize joy. This contrast captures the conflicting emotions, while the scattered broken pixels signify imperfection and the complexity of these feelings. The interplay between dense and empty spaces reflects the rhythm of the pulse, drawing the viewer into an emotional journey.</desc>
