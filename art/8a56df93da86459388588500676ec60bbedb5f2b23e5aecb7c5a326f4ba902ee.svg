<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects an internal struggle between softness and severity, where gentle textures collide with stark limits. The palette balances warm whites and tender pinks against the harsh richness of carbon black and sharp crimson. This contrast evokes a sense of yearning and confinement, represented through layers of raw, pulsating color that radiate from the center, interrupted by muted fields. The main collision occurs centrally, where softness layers blend while severity’s black dots punctuate, creating a tension that resonates throughout the piece.</desc>
