<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between States</title>
  <desc id="desc">This artwork expresses the emotional tension between restlessness and peace through the interplay of colors and patterns. The palette, drawn from soft mint and storm gray, reflects a battle between calmness and unease. The faded gold highlights suggest fleeting memories intruding on serene moments. The central arrangement is dense and chaotic, symbolizing restlessness, while the burnt edge style adds a touch of brokenness, mirroring closed corners and interruptions. This creates both a focal point of struggle and a surrounding space of quieter fields, embodying the complex emotions of memory and motion.</desc>
