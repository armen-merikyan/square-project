<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Suspicion</title>
  <desc id="desc">The emotional tone explores the fracture between trust and suspicion, represented by a strong dominance of soft hues against dark shadows. The palette combines warm greens and soft creams to convey trust, interspersed with deep olive creating a lattice of suspicion. The layout simulates descending pixels, suggesting a soft fall, representing the weight of uncertainty. The collision occurs in the middle, where the warm glow clashes with darker slivers, embodying the tension between the two emotions. Broken pixels add a sense of imperfection, echoing the complexities within relationships.</desc>
