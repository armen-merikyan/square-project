<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This artwork explores the emotional tension between longing and resolve through color contrast and density. The chosen palette of deep blacks and dark violets evokes a sense of heaviness and depth, while the soft gold and pale green add moments of hope and lightness. The composition features a dense area of dark colors in one corner, representing longing through chaotic, shattering patterns, while the opposite area features a structured grid layout representing resolve. The predominance of darker shades accentuates the feeling of weight and the central collision of color symbolizes the struggle between these emotions, creating a sense of push and pull within the confined space.</desc>
