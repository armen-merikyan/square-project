<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Layers</title>
  <desc id="desc">The emotional tone reflects the coexistence of awe and terror, captured through contrasting colors and placements. The palette consists of sepia, tan, dust gray, and faded blue, evoking a sense of memory and nostalgia. The outer frame uses muted tones symbolizing pressure and noise, while the inner core in inkier shades suggests a quiet space of reflection. The center carries the most contrast, with a spiral counterclockwise flow creating implied motion, signifying the collision of feelings. Broken pixels are used sparingly to evoke imperfections, allowing for a hint of chaos within the structured design, while maintaining around 10% negative space for breathing room.</desc>
