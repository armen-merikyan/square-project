<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This artwork embodies the emotional clash of 'rage' and 'calm', symbolizing the dynamic push and pull between explosive energy and soothing tranquility. The palette balances fiery reds and deep blacks, representing rage, against the soft pale blue, signifying calmness. The use of bright accents disrupts the subdued background, creating a visual echo of tension. The narrow channel of cooler tones cutting through the dense red and black arrangement represents a quiet space that intermittently surfaces through the chaos, illustrating the contrasting forces at play. The broken pixels introduce intentional disruptions, amplifying the sense of unease and unpredictability inherent in the emotional spectrum described by the seed. The main collision occurs along the center, tapering outward towards the edges, making the core of the piece feel alive and volatile, while still allowing pockets of calmness to resonate throughout.</desc>
