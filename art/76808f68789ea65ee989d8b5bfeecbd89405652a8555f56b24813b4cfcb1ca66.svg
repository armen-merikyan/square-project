  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects the battle between vulnerability and strength. The palette features soft off-white and faint peach for vulnerability, contrasted by the dense dark navy for strength. The collision occurs through stark dualities: the calm, muted lighter colors in the center push against the intense and heavy dark hues at the edges. The broken lines represent the imperfections inherent in the balance between these emotions, leading to a sense of disorder and tension in a structured grid layout.</desc>
