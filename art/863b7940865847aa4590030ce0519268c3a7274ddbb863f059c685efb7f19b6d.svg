<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This artwork conveys the emotional dichotomy of restlessness and peace. The palette combines soft moss green and bone white as calmer elements contrasting against rust and stone gray to signify disruption. The edge crawl reflects restlessness through jagged, broken pixels and the structured clutter of lattice patterns, symbolizing motion, while the halo void layout captures the peaceful center, emphasizing a space of quiet amidst chaos. The predominant use of green sets a serene tone, making the tension at the borders feel like an unsettling whisper, aligned with the seed's themes of memory and motion.</desc>
