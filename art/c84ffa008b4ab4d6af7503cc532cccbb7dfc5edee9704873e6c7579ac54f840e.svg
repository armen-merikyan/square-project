<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Fracture</title>
  <desc id="desc">The interplay of awe and terror embodies a juxtaposition of light and dark, warmth and cold. The palette of pink, red, gray, and dark maroon encapsulates love and betrayal, creating a rich emotional landscape. The left side, filled with soft tones of pink and red, evokes feelings of awe, while the right side's darker hues create a heavy sense of terror. The arrangement features a mix of dot and maze patterns, visually representing a collision of emotions. The hard vertical split emphasizes contrast, allowing each half to pulsate with its own rhythm, while remaining interconnected. Broken pixels disrupt uniformity, enhancing the emotional tension. Negative space is maintained subtly, allowing breathing room in the composition without overwhelming pressure.</desc>
