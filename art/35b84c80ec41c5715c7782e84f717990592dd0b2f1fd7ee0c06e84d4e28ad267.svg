<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">The emotional tone is a juxtaposition of warmth (love) and coldness (betrayal), represented through a palette of pinks and dark maroon to evoke tension. The pattern follows a grid for betrayal in the outer frame, contrasting with soft, stair-like elements in the inner area symbolizing love. Asymmetrical arrangements create collisions, highlighting the struggle between feelings, while burnt edges hint at fading warmth, echoing the theme of love lost. The piece strikes a balance between negative space and density, reflecting a lonely signal amidst chaotic noise.</desc>
