  <title id="title">Collision of Calm</title>
  <desc id="desc">The emotional tone explores the tension between restlessness and peace, reflected in the choice of colors that contrast warm and cool hues. The palette features deep teal as the dominant color, invoking tranquility, while bursts of cosmic indigo and cold gold interrupt in the corners, symbolizing unrest. The layout suggests a corner filled with dense color, spreading towards a quieter space towards the center, representing exposure against shelter. Broken pixels create intentional disruptions, enhancing the feeling of a chaotic yet beautiful interplay between serenity and turbulence, speaking to memories in motion.</desc>
