<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">This artwork captures the emotional dichotomy between longing and resolve, employing a palette that includes dark navy and black to express depth, contrasted with bright dim cyan for lit edges that signify hope and resolution. The broken pixels disrupt the flow, creating intentional scars, while the layout emphasizes a cross-current of horizontal and vertical movements that collide in the center, symbolizing the tension between the two opposing emotions. The patterns—a fault line for longing and crosshatch for resolve—interact dynamically, producing a sense of both contained pressure and overflowing urgency.</desc>
