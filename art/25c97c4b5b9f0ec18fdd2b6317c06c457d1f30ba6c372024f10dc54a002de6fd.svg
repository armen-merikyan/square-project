<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The artwork presents a complex interplay between rage and calm. The palette of red, pale blue, black, and white encapsulates hot versus cool emotions, with red dominating as a representation of rage. The patterns of crosshatch (for rage) and braid (for calm) collide asymmetrically, creating a tension that plays out diagonally from corner to corner. The arrangement evokes a sense of tears falling—each color taking its place in a descending order, symbolizing an overflow of feelings that briefly find calm before being interrupted. The use of broken pixels introduces intentional imperfections, reminiscent of emotional scars, while maintaining a balance of negative space to prevent overwhelming pressure. Overall, the composition captures a narrative of emotional conflict, showing hot passions contained yet constantly threatening to spill over.</desc>
