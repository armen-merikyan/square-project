<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Foundations</title>
  <desc id="desc">The emotional tone juxtaposes vulnerability's fragility against strength's density. The palette of cosmic indigo, void black, star white, cold gold, and deep teal reflects the awe-terror dichotomy, with darker tones suggesting shelter and lighter ones embodying exposure. The central collision occurs in the grid's heart—where cold gold dots resemble a fragile beacon, interrupted by crack-like patterns in deep teal. This setup emphasizes the contrast between exposed connectivity and the weight of hidden strength, creating a rhythmic tension encapsulating the seed's themes.</desc>
