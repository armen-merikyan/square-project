<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry and Disruption</title>
  <desc id="desc">This artwork embodies the tension between clarity and confusion through contrasting color placement. The palette chosen from the 'ancient_fire' scheme evokes warmth and intensity, playing against a backdrop of muted tones that convey complexity. The top half, representing clarity, utilizes structured patterns more aligned with symmetry, while the bottom half, reflecting confusion, exhibits chaotic checker patterns with broken pixels. The collision of these two emotional states is abrupt, symbolizing the struggle between maintaining order and yielding to chaos. The interplay of burned oranges and dark reds provides depth, while the charcoal creates a grounding effect, emphasizing the emotional narrative of disruption.</desc>
