<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of a Signal</title>
  <desc id="desc">This artwork captures the tension between clarity and chaos, using signal green and electric blue to symbolize clarity and focus, juxtaposed against static gray and dead black representing noise and interference. The left side is dominated by the structured ladder pattern of signal colors, while the right side reflects the chaos of static noise, disrupted intentionally with broken pixels, creating a feeling of interrupted memory. The collision occurs at the center, where organized light meets darker, wavy disorder.</desc>
