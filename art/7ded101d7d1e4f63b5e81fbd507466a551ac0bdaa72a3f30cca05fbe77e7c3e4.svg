<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Dichotomy</title>
  <desc id="desc">This square composition represents the emotional tension between joy (left side) and grief (right side). The palette was chosen to evoke warmth and reflection: bright yellows and oranges symbolize joy, while muted purples and deep blues echo grief. The left half features sharp, angular shapes suggesting 'teeth' of joy, contrasted with softer, noise-like patterns for grief, highlighting the chaos against an order of feeling. The split layout accentuates the push and pull of emotions, dramatically framing the collision of joy and grief in an abstract manner.</desc>
