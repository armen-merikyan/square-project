<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal of Desire</title>
  <desc id="desc">The emotional tone reflects a conflict between emptiness and desire, expressed through a palette of electric blue and magenta contrasted against deep black. The arrangement creates a visual tension: the left side symbolizes desire with bright, vibrant colors (electric blue and magenta) radiating out, creating a rising signal pattern, while the right embraces emptiness through cooler, muted tones transitioning into black. This diagonal flow embodies isolation, where the noise from the left disrupts the stillness of the right, creating a lived-in space filled with both warmth and coldness, emphasizing the spatial struggle between hopefulness and desolation.</desc>
