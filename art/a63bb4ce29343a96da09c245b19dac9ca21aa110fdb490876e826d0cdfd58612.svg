<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Trust</title>
  <desc id="desc">The emotional tone captures the tension between trust and suspicion, reflected in the color choices of soft mint and pale sky contrasting against storm gray and near black. The collision creates a visual representation of both emotions battling in space, with the gradient of calmness (soft colors) disrupted by darker, heavier shadows, symbolizing suspicion. The layout is designed to suggest a spiral, reflecting the inner turmoil of these opposing forces, while maintaining a noticeable 10% negative space, inviting the viewer to ponder the emptiness that often accompanies suspicion.</desc>
