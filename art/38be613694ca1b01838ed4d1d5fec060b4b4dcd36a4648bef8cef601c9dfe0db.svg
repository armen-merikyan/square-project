<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Pulses</title>
  <desc id="desc">This artwork captures the emotional tension between longing and resolve through an interplay of muted greens and warm browns nestled within cold whites and open blues. The 8x8 grid displays a central collision of colors with dark jarring spots strategically placed, echoing the broken yet repairable elements of the seed. Longing is symbolized by lighter colors radiating warmth, while resolve emerges through darker, locked shapes, creating a dynamic pulse across the composition. The negative space lends serenity to the composition, focusing on the dialectic between tension and peace, where one color interrupts another, embodying the theme of contained versus overflowing emotions.</desc>
