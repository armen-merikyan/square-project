<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger in a Sealed Space</title>
  <desc id="desc">This piece embodies the tension between desire and emptiness. The palette, featuring warm tones like hot coral and blood orange against the cool hollow blue, evokes a vibrant struggle between abundance and restraint. The central conflict occurs in the corner where dense colors overwhelm, while the spiraling tide pattern disperses outward, reflecting the struggle for containment. The broken pixels disrupt the rhythm, suggesting that even amid desire, flaws remain. This arrangement captures the emotional essence of yearning and limitation.</desc>
