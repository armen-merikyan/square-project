<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Repair</title>
  <desc id="desc">This piece explores the interplay between vulnerability and strength, using a palette of soft colors representing safety (pale mint, soft sky) against darker tones that evoke strength and weight (storm gray, near black). The strong contrast lies in the center, where denser patterns of stripes (strength) collide with lighter pressure bands (vulnerability). The layout scatters repair-like pixels to reflect the idea of brokenness and patching. The negative space allows for breathing room, contributing to a dual sensation of tension and release, symbolizing the balance found within vulnerabilities.</desc>
