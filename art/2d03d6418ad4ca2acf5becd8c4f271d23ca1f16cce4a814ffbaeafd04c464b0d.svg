<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Connections</title>
  <desc id="desc">This composition captures the tension between longing and resolve through the play of warm and cool colors. The palette blends soft amber and warm coral as a focal point of intimacy and warmth against the cold slate and blue-black that represent distance and chaos. The main collision of colors occurs diagonally, symbolizing a fall or descent while simultaneously suggesting a rising resolve. Broken pixels are scattered throughout to embody imperfection, echoing the struggles in seeking connection amidst chaos. The quiet spaces form a halo around areas of density, emphasizing the theme of emotional distance and flow between connection and alienation.</desc>
