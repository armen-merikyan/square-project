<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">This composition embodies the tension between restlessness and peace through a dynamic interplay of colors. The palette combines stark contrasts: deep blacks and static grays representing noise, while vibrant signal greens and electric blues evoke a sense of clarity and tranquility. The main collision occurs in the central area, where chaotic, mirrored patterns clash, creating a fragmented pulse. The edge style of broken pixels introduces intentional imperfections, mimicking disruptions in memory and motion, while the outer layers maintain a quieter demeanor, embodying an open space of peace. This square tells a story of a struggle for clarity amidst chaos.</desc>
