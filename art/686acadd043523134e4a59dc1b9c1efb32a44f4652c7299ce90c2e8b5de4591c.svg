<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone shifts between defiance and submission, with a dense, saturated center dominated by crosshatch patterns in deep blues and muted plums, representing defiance. The soft cyan and lavender gray hues around the edges symbolize submission, creating a gradual receding contrast. The main collision occurs as the vibrant center pushes against the quiet channels at the edges. This design captures the tension between chaos and order, creating a visual echo of struggle and continuity.</desc>
