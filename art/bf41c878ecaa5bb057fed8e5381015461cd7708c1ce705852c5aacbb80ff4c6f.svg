<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Silent Tension</title>
  <desc id="desc">The emotional tone of this piece conveys a juxtaposition of love's warmth against the coldness of betrayal. The palette of soft pinks and deep maroons represents affection while gray serves as an unsettling background, indicating the subtle fracture of trust. The left side uses a crosshatch pattern to create a warm, interconnected feel, while the right employs a checker pattern to introduce discord and distance. The main contrast occurs along the vertical axis, highlighting the split between comfort and tension. This use of layout, pattern, and color draws on the seed's themes of emotional collision and unfilled spaces in relationships.</desc>
