<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Gratitude and Envy</title>
  <desc id="desc">This artwork explores the emotional contrast between envy and gratitude, using color and pattern to depict their conflict. The palette of warm yellow and orange juxtaposed against deep blue and muted purple creates a visual tension, representing the rise of gratitude countering the fall of envy. The layout follows a diagonal flow where gratitude begins from the bottom left and gradually spreads upward, while envy exudes from the edges, echoing feelings of displacement amidst richness. Broken pixels introduce imperfection, suggesting the complex nature of emotions. The negative space efficiently symbolizes the emptiness of unfulfilled desire, creating balance against density. This composition tells a story of subtle intrusion—noise in the form of envy colliding with the softer edges of gratitude, creating a nuanced emotional landscape.</desc>
