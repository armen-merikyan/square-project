<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance Amidst Chaos</title>
  <desc id="desc">This composition reflects the emotional tension between control and panic. The choice of a navy and black palette adds depth and suggests control, while hints of dim cyan signify the chaotic, irregular nature of panic. The main contrast occurs in the center, where orderly stripes radiate outward, disrupted by 'pixel bleed' effects that introduce brokenness, aligning with the emotional theme. The edges are intentionally burned and jagged, contrasting with a more structured radial pattern at the center, capturing the essence of encroaching chaos onto a stable core.</desc>
