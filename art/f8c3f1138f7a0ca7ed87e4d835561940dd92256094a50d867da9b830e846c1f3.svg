<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This artwork encapsulates the emotional tension of emptiness and desire through contrasting colors and disrupted patterns. The hot coral and blood orange dominate, representing desire with their vibrant warmth. In contrast, the charcoal and hollow blue introduce feelings of emptiness and restraint, creating a striking juxtaposition. The composition utilizes a checker pattern that embodies an ordered desire, clashing with glitch patterns to signify interruption and chaotic overflow. The spatial arrangement creates a central narrative of longing while leaving negative space to evoke a feeling of unresolved tension, solidifying the idea of hunger against a stifling boundary.</desc>
