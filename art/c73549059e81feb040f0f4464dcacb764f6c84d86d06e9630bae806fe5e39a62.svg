<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Depths</title>
  <desc id="desc">The emotional tone emphasizes the struggle between emptiness and desire, represented through a palette of black, electric blue, lime, and magenta. The contrast is manifested where the cool depths of black collide with the warm aspirations of lime and magenta, portraying a heart fragmented by longing. The ash grey tones create gradients of noise against radial patterns, evoking feelings of fading desires. This interplay of color creates rhythmic flow from left to right, punctuated by darker edges, symbolizing the weight against the rising signals of hope. The maze pattern represents emptiness while the broken dots signify desire, allowing the viewer to interpret a narrative of aspiration amidst solitude.</desc>
