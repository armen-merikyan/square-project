<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Joyful Grief</title>
  <desc id="desc">This artwork captures the tension between joy and grief through contrasting colors and patterns. The outer edges embody muted purple and deep blue tones, representing grief's weight and heaviness, while the central 4x4 section radiates vibrant yellows and oranges symbolizing joy and openness. The hard edges accentuate the stark division and emotional collision between these states, while a staggered arrangement suggests a stepwise transition from one feeling to another. The overall layout represents a protective core surrounded by an encroaching heaviness, evoking a sense of dynamic interplay between safe and threatened.</desc>
