<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Resolve</title>
  <desc id="desc">This piece captures the emotional push and pull between longing and resolve, reflected through contrasting color densities. The 'signal_noise' palette evokes urgency with electric blue and hot magenta, introducing vibrancy, while static gray and dead black provide grounding. The zigzag flow of color placement creates movement reminiscent of tears or rain, establishing a narrative of repair amidst damage. The central collision between the quiet static gray and vibrant signal green acts as a focal point, embodying the tension of resolve in contrast with longing.</desc>
