<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Change</title>
  <desc id="desc">The design captures the tension between nostalgia and progress, represented by the warm tones of burnt orange and dark red clashing with cool charcoal and gold. The top half is densely packed, evoking nostalgia's complexity, while the bottom half uses a target pattern to symbolize forward momentum. The collision occurs in the transition, where memories disrupt the flow of progress. The use of negative space enhances the feelings of uncertainty and calm within rage, creating an unresolved narrative.</desc>
