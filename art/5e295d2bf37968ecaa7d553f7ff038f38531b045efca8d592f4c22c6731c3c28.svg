<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Points</title>
  <desc id="desc">This composition evokes a narrative of emotional tension between rage and calm. The palette consists of deep, intense reds and blacks representing rage, juxtaposed against lighter, softer blues and whites that symbolize calm. The main collision occurs in the center where pulse marks of red interject amid the stripes of pale blue, illustrating an explosive interruption within an otherwise serene space. The rhythmic pattern of stripes gives a feeling of containment while the jagged eruptions serve as a metaphor for overflowing chaos, layered throughout the piece, creating a push and pull dynamic that reflects the seed's themes of conflict and balance.</desc>
