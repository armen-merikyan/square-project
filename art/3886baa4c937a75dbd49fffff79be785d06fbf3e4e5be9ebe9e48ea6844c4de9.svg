<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissonant Waves</title>
  <desc id="desc">This piece embodies the tension between relief and dread through contrasting colors and patterns. The chosen palette features muted storm gray and near black to evoke a sense of weight, while faded gold and pale mint introduce moments of brightness, suggesting relief. The collision occurs centrally, where dense blocks meet lighter hues, creating a sense of pushing against or pulling away. The patterns of channels and hinges emphasize movement and interruption, mirroring the emotional tug-of-war between the two forces represented in the seed.</desc>
