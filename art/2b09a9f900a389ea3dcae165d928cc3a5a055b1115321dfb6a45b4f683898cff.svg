<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This piece embodies the emotional pull between desire and restraint through color interactions and abstract patterns. The warm palette of hot coral and blood orange reflects desire, contrasted against muted charcoal and hollow blue that signify restraint. The arrangement creates a frictional tension, with warm colors emerging in the center, which represents desire trying to break through sealed edges of cooler hues. The structure allows for quiet spaces that accentuate the emotional struggle. The deliberate placement of broken pixels introduces imperfection, mirroring the complexities of love and betrayal, accentuating the theme of a craving restrained.</desc>
