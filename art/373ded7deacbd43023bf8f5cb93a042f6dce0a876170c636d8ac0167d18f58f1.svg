<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonance of Tension</title>
  <desc id="desc">This piece captures the emotional spectrum between longing and resolve through a blend of muted and vibrant tones. The pale mint and soft sky represent longing, while storm gray and near black embody resolve. The layout suggests a rising signal, echoed through the interplay of both colors, creating a sense of upward motion toward resolution. The arranged patterns—braid for longing and crack for resolve—create visual disruptions that echo the emotional contrasts described in the seed, culminating in a central collision of hues where emotion reaches its peak tension. At least 10% negative space is preserved to evoke a sense of absence, enhancing the overall narrative of the piece.</desc>
