<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Stillness</title>
  <desc id="desc">This composition embodies the emotional tug-of-war between restlessness and peace. The palette drawing from deep navy and soft dim cyan evokes a sense of depth and calm while allowing moments of stark contrast against intense black. The layout spirals around an off-center burst of chaotic patterns, signifying motion, while the quiet edges of dim cyan and navy play into peace, displaying tension. Broken pixels suggest disruption in the search for balance, echoing the themes of memory versus motion. The quiet and the pulse collide predominantly in the center, showcasing a rise from calm into gentle chaos, illustrating the conflicting nature of the emotions represented.</desc>
