<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone contrasts defiance with submission, symbolized through an uneven grid where the center remains bold and dark against lighter, softer edges. The palette combines strong black and ice blue with hints of warning orange to signify tension and potential chaos. The broken pixels disrupt uniformity, providing an impression of scars on the canvas. The central diamond shape is surrounded by patterns of defiance and submission, creating a dialogue of push and pull within the grid while leaving intentional negative space to convey quiet amidst the chaos.</desc>
