<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tension</title>
  <desc id="desc">The artwork expresses the emotional contrast between envy and gratitude through a split vertical layout. The left side represents envy with sharper, cooler tones and a dot pattern implying density and clutter, while the right side embodies gratitude with warmer, softer shades and cracks suggesting fragility and depth. The broken pixels strategically disrupt the flow, mirroring the tension described in the seed. The resulting visual narrative explores how these conflicting emotions coexist, creating a dynamic balance between chaos and harmony.</desc>
