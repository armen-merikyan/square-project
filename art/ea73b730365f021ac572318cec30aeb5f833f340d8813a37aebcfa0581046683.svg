<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Island of Tension</title>
  <desc id="desc">This abstract pixel artwork conveys the emotional tension between restlessness and peace through contrasting colors and patterns. The use of a light, pale mint center surrounded by storm gray and near black creates a palpable tension, suggesting motion against stability. The choice of a palette dominated by calming hues (pale mint and soft sky) clashing with deeper, darker tones (storm gray and near black) represents the struggle between serenity and anxiety. Broken pixels subtly interrupt the smooth flow, symbolizing imperfections and disruptions in peace. The main collision occurs centrally, invoking a sense of urgency fighting against tranquility.</desc>
