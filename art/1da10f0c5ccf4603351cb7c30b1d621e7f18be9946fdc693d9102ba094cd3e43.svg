<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Essence</title>
  <desc id="desc">This composition explores the emotional landscape between vulnerability and strength. The chosen palette of soft yellows and muted purples represents warmth and grief, with deep blue adding weight. The layout features a near border that encapsulates but also breaks, allowing light (yellow) to spill through, symbolizing exposure. The strength is expressed through dense purple blocks, offering solidity against the delicate lattice of yellow, which signifies vulnerability. The main collision occurs in the center, where these emotional states intertwine, creating a dynamic tension between sheltered density and exposed light.</desc>
