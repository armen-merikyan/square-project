<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">This piece explores the emotional tension between relief and dread. The choice of the 'fear_hope' palette of blacks, dark violets, soft golds, and pale greens evokes both anxiety and solace. The contrasting dark blocks, depicting dread, collide with softer dot patterns of gold and green, illustrating fleeting moments of relief. The composition flows from the top down, with a heavier presence breaking symmetry to enforce discomfort, while leaving intentional negative space to suggest emptiness and openness, representing an empty room. Broken pixels add an element of imperfection, highlighting the concept of a crack in symmetry.</desc>
