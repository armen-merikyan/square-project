  <title id="title">Tension of Dualities</title>
  <desc id="desc">This composition reflects the emotional tension between joy and grief using a contrasting palette of vibrant yellows and oranges against muted blues and purples. The left side represents joy with rounded patterns, while the right is chaotic and fragmented to symbolize grief. The hard edges emphasize the split, with broken pixels adding an element of imperfection, reinforcing the emotional struggle. The interplay between densely packed colors and empty space signifies the push and pull of these opposing emotions.</desc>
