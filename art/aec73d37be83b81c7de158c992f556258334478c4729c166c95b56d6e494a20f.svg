<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience and Fracture</title>
  <desc id="desc">This artwork embodies the clash between vibrancy and decay. The palette combines moss green, rusty undertones, and bone white, symbolizing resilience amidst fragility. The dominant color of moss green suggests growth and hope, while subtle rust signifies wear and erosion. The main collision happens in the center where the ‘spark’ patterns of lighter tones sharply contrast the ‘ash’ fields of muted grays, creating a dynamic tension that conveys emotional struggle. This interplay encapsulates the core themes of the seed, illustrating a dialogue between aspiration and restraint, life and memory, in a fragmented yet coherent abstract design.</desc>
