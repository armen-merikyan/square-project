<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition explores the emotional tension between tenderness and rage through contrasting colors and patterns. The palette, a blend of saturated reds (for rage) and muted pale blues (for tenderness), enhances this duality. The primary conflict occurs in the center where jagged red ripples (representing rage) collide with gentle, overlapping flame-like patterns (symbolizing tenderness). Negative space allows the emotions to breathe, creating a narrative of protection amidst chaos. The layout emphasizes a cross-current, where opposing emotions intersect and influence each other yet maintain distinct boundaries.</desc>
