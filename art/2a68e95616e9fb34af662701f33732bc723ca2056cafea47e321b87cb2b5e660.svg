<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition captures the emotional tension between vulnerability and strength through the juxtaposition of softer and harder elements. The color palette, a mix of soft powder pink and sharp crimson, mirrors this dynamic: the warmer tones symbolize vulnerability while the darker shades represent strength. The arrangement features a dense concentration of darker colors around the edges to provide a strong perimeter, while lighter hues occupy the center, creating a sense of exposed vulnerability. The layout combines flowing textures with sharp contrasts that embody the themes of collision and connection vs. alienation. Imperfect 'broken' pixels introduce intentional disruptions, signifying the fragility within strength and the scars left by moments of exposure. The center vs. edges layout and the deliberate tension point in the middle emphasize the internal struggle inherent in these concepts.</desc>
