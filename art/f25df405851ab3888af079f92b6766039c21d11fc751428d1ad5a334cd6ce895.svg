<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This artwork explores the emotional dichotomy of defiance and submission through a structured yet chaotic composition. The palette of pink, red, gray, and dark maroon evokes themes of love and betrayal, suggesting a turbulent emotional landscape. The left-to-right flow represents a struggle between forces; the dark hues weigh down the lower half, while the lighter colors disrupt and break through, introducing tension. The checkerboard pattern symbolizes the harsh contrasts of submission against a rigid structure, while the ring pattern reflects defiance and strength in the centered elements. Broken pixels introduce an intentional imperfection, hinting at unresolved emotions, enhancing the narrative of conflict.</desc>
