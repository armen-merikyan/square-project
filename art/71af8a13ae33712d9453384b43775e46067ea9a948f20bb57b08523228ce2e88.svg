<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Pulses</title>
  <desc id="desc">The composition reflects the tension between clarity (signal) and distortion (noise). The palette features deep navy and dim cyan to evoke calm amidst chaos, enhanced by black for depth. The collision is at the center where a 'pulse' of bright white emerges against the surrounding darker colors, embodying struggle against interference. The pattern utilizes distinct layering—hard edges clash with soft gradients—reflecting the idea of a signal trying to emerge through noise. Broken pixels enhance the notion of scars and interruptions, embodying the fragility of clarity in a chaotic environment.</desc>
