<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Quiet Tension</title>
  <desc id="desc">This artwork explores the emotional tension between trust and suspicion, characterized by a stark contrast between warm and cool tones. The selected palette features soft colors like off-white and faint peach to symbolize trust, layered against the muted dust gray and dark navy representing suspicion. The layout is symmetric yet eroded, with the main collision occurring diagonally across the grid, creating a visual tug-of-war. The structure evokes a sense of a fragile balance, with broken pixels representing the imperfections in communication—the noise within the signal.</desc>
