<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone captures the pull between desire and restraint. The palette features warm hues like hot coral and blood orange for the saturated pulse of desire, contrasted with cooler tones like charcoal and hollow blue to embody restraint. The main collision occurs in the center, where the saturated colors overlap muted fields, creating a tension that suggests both yearning and confinement. The layout, suggestive of an empty room, emphasizes the feeling of space and pressure against sealed edges, bringing forth a narrative of longing and limitation.</desc>
