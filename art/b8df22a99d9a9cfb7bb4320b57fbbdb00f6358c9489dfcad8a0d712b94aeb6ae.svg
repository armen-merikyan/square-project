<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Asymmetry</title>
  <desc id="desc">This artwork embodies the emotional contrast of emptiness and desire through a split-screen pattern. The left side uses cool colors that suggest emptiness; black and dark grays fill the spaces, creating a sense of void. The right side, however, bursts with lime and electric blue, reflecting desire and vibrancy. The rising signal is suggested by an upward movement in the cooler pixels, while the desired colors retreat, echoing the tension between rising hope and falling despair. Thin outlines add definition but hint at fragility, while the broken pixels emphasize imperfections within the desire and emptiness. The layout and color placement invite the viewer to navigate through contrasting emotional landscapes, provoking introspection.</desc>
