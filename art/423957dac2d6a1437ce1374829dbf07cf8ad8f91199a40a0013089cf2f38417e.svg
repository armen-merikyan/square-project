<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rhythms of Interruption</title>
  <desc id="desc">This artwork embodies the struggle between clarity (signal) and chaos (noise), using a palette of vibrant and muted hues to depict emotional contrasts. The dominant dark hues represent noise, while the brighter accents suggest fleeting signals amidst the static. The center is intentionally left hollow to evoke absence, surrounded by jagged edges in light and dark that create a sense of turbulence and friction, reflecting the themes of exposure versus shelter and fragmented memories. This layout encourages the viewer's eye to navigate through the collision of crowded patterns and negative spaces, embodying a pulse searching for clarity in a noisy environment.</desc>
