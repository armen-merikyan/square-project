<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Edges of Tension</title>
  <desc id="desc">The emotional tone captures the push and pull between vulnerability and strength, represented through soft and hard contrasts. The palette balances serene tones of pale aqua and mist gray with the urgency of alarm red and ink blue, echoing the complexity of safety versus exposure. The main collision occurs in the center with a dense cluster of darker hues, symbolizing strength, while lighter shades surround it, creating a pulse of vulnerability. This results in a rhythm that swings from calm to intense, inviting introspection without depicting literal forms.</desc>
