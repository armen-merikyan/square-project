<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Falling Asymmetry</title>
  <desc id="desc">This composition captures the emotional tension between confusion and clarity through a stark color contrast of deep charcoals and vibrant burnt oranges. The center is intentionally broken with crosshatch patterns, symbolizing confusion, while the edges maintain a dense weight to evoke a sense of clarity. The thick outline serves as a boundary that suggests both protection and entrapment, enhancing the tension between full and hollow spaces. The visual flow moves outward from the center, allowing the eye to interact with dense clusters and voids, representing emotional release amidst chaotic scattering. The choice of palette reflects an 'ancient fire,' embodying both the destructive and illuminating aspects of emotion.</desc>
