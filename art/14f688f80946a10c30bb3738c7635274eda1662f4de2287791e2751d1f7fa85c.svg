<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">The emotional tone juxtaposes defiance (represented by saturated colors) against submission (softened tones). The palette of lime, electric blue, magenta, and black captures this tension. Dark edges imply weight, while brighter centers suggest hope or defiance, allowing a flow upward like rising signal. The arrangement highlights vertical conflict—darker hues at the bottom weigh down the lighter, rebellious sparks, creating a rhythm of collision and quiet space at the center. This interplay of colors symbolizes the struggle between opposing emotions and their journey.</desc>
