<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Fracture</title>
  <desc id="desc">This piece embodies the tension between the spark of creativity and the ash of restraint, utilizing a palette of electric blue and magenta against a backdrop of black. The collision occurs primarily in the center, where brighter colors disrupt the calm, muted tones, creating a dynamic rhythm. The arrangement of color mimics the irregularity of memory and the conflict of urges—where jagged edges meet soft gradients, resonating with the seed keywords. The patterns of thread and rain evoke a sense of motion and depth, while the negative space invites a feeling of pause and contemplation.</desc>
