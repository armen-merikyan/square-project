  <title id="title">Tension in Balance</title>
  <desc id="desc">This artwork channels the emotional turmoil of 'panic' versus the serene steadiness of 'control.' The warm tones of sepia and tan evoke a sense of urgency and discomfort associated with panic, while the cooler hues of faded blue and dust gray signify calmness and clarity. The outer border employs cool colors to create a controlled feel, while jagged edges reflect the tension of the inner chaos. The use of broken pixels creates an unsettling harmony, suggesting imperfections in control. The clash between structured borders (control) and chaotic interior patterns (panic) captures an emotional battle, reflecting the struggle to find balance amidst chaos.</desc>
