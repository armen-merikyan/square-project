<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone explores the tension between desire and emptiness. The palette includes saturated colors representing desire—hot coral and blood orange—contrasted with muted tones of charcoal and hollow blue representing emptiness. The colliding patterns of flame (desire) within the inner square and dots (emptiness) form a chaotic yet captivating structure, creating a visual sense of a deep hunger constrained by a stark perimeter. The edges are intentionally burned, suggesting both imperfections and the struggle against containment.</desc>
