<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">The emotional tone is a juxtaposition of dread and relief, represented by the dense dark colors versus the lighter, softer hues. The palette transitions from stormy gray to the soothing pale mint, capturing a sense of tension and release. The main collision occurs in the center where deep colors clash with lighter shades, mirroring a chaotic spiral pattern that lends itself to feelings of uncertainty. The seed's concept of a 'cage' manifests through interlocking layers that become more open towards the edges, subtly embodying the idea of a release from confinement.</desc>
