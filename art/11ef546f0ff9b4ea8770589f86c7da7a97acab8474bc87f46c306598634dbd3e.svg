<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs. Edges</title>
  <desc id="desc">The emotional tone illustrates a clash between defiance and submission, where the strong burnt orange (defiance) at the center wrestles against the surrounding darkness (submission, black and charcoal). The use of hard edges creates a distinct border that emphasizes the tension between the bold, warm palette and the cool, muted tones. This collision reflects the rhythmic struggle of emotions, creating a dynamic pulse that captures both pressure and release. The strategically placed 'broken pixels' introduce imperfection, symbolizing chaos within the clarity of the main patterns, which echo the complexities of emotion itself.</desc>
