<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This composition illustrates the emotional tension between envy and gratitude through a stark contrast of colors where dark violets represent envy, creating a heavy and oppressive left side, while the soft golds and pale greens signify gratitude, introducing warmth and lightness on the right. The zigzag pattern subtly implies movement and conflict, mimicking stairs that suggest progression but also interruption. The broken pixels create imperfections that echo the fragility of emotions, primarily in the center where the collision between heavy and light occurs.</desc>
