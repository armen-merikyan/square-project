<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Colors</title>
  <desc id="desc">This artwork symbolizes the emotional dichotomy of joy and grief through contrasting warm and cool colors. The left side features bright yellows and oranges representing joy, arranged in a broken dot pattern that allows for expansion and warmth. The right side employs deep blues and muted purples creating a rain-like texture, symbolizing the weight of grief. The bottom-weighted arrangement and deliberate placement of broken pixels convey a sense of instability, embodying the concept of safe versus threatened. The edge styles create a jagged division, enhancing the split screen effect and allowing an interaction between the order of joy and the chaos of grief.</desc>
