<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shadows of Duality</title>
  <desc id="desc">This composition explores the emotional tension between vulnerability and strength. The palette of black, white, pale blue, and red captures the duality: stark contrasts signify strength and stability, while the more muted tones represent vulnerability and exposure. The collision point occurs in the central rows, where black and red intersect awkwardly with the pale blue, symbolizing the struggle between opaque shielding and fragile openness. The negative space preserves a sense of quiet amidst complexity, allowing the viewer to reflect on the deeper implications of the emotional journey.</desc>
