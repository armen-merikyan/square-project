  <title id="title">Dualities in Tension</title>
  <desc id="desc">This composition reflects the emotional conflict between envy and gratitude through a palette that juxtaposes emotion-driven colors. The stark contrast of deep blacks and vibrant whites mimics the struggle of light vs. weight, presenting a broken mirror effect that creates a sense of chaos wrapped in calculated layers. The zigzag and stair-like patterns imply both ascent and descent, symbolizing the push and pull of these two emotions. Broken pixels reinforce imperfection and tension, making the center feel both heavy yet vulnerable.</desc>
