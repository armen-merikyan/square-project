<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Elements</title>
  <desc id="desc">This composition captures the emotional clash of 'spark' and 'ash'—the vibrant energy of potential against the weight of remnants. The palette chosen features deep wine and warm ivory as the dominant colors, reflecting both brightness and warmth clashing against muted ash gray and stain brown which suggest a shadow of restraint and memory. The main contrast occurs in the upper left corner, where rippling bright tones collide with jagged, shattering textures—a visual echo of the tension between energy and restraint. The pattern oscillates between density and quiet space, embodying the push-pull of resilience against fragility.</desc>
