  <title id="title">Fragmented Affection</title>
  <desc id="desc">This artwork explores the tension between love and betrayal through color and pattern. The palette combines warm pinks and reds with deep grays and dark maroon, emphasizing emotional contrast. The 'broken dots' pattern in the left half embodies love's warmth, while the rain-like flow on the right side evokes betrayal's sharpness, creating a deliberate asymmetry. The collision of soft and harsh colors creates a visual narrative of emotional turmoil, while the layout leaves negative space to signify emptiness and unresolved feelings.</desc>
