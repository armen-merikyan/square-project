<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Heart</title>
  <desc id="desc">This composition explores the emotional tension between joy and grief through a balance of colors and patterns. The warm, rounded yellows and oranges embody joy, while muted purples and deep blues signify grief. The layout starts with vibrant colors at the bottom left, indicating joy’s emergence, and transitions into cooler tones, creating a visual flow that zigzags across the canvas. The sharp contrasts between the warm and cool colors amplify the emotional collision, particularly where lighter colors jostle with darker, heavier tones, suggesting both connection and conflict. The broken pixels are placed strategically throughout to disrupt symmetry, reflecting the imperfections of love and betrayal, while maintaining a strong presence of negative space to invite contemplation.</desc>
