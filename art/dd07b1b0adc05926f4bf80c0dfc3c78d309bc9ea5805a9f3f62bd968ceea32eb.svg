<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This piece embodies the emotional conflict of joy and grief through stark contrasts in color and pattern. The palette features bright yellows and oranges as a representation of joy, juxtaposed with muted blues and purples that evoke grief. The layout flows from a dense, dark base, suggestive of grief, rising toward lighter hues, symbolizing fleeting joy. The use of 'target' and 'maze' patterns introduces a rhythm of chaos against a backdrop of order, emphasizing the struggle between safety and threat. Broken pixels add a layer of imperfection, mirroring the emotional complexities of the themes.</desc>
