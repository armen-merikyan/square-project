<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shattered Contrasts</title>
  <desc id="desc">This artwork captures the tension between fear and hope through deep colors and structured patterns. The palette, consisting of dark violet for fear and soft gold for hope, creates a striking contrast that plays out across the square. The layout establishes an outside-inward flow, enriching the inner space with bursts of lighter colors and checker patterns that suggest jitter and unease. The edges are left soft, embodying a sense of vulnerability against jagged patches that hint at fractured emotions. Through deliberate color placement and hidden negative space, the piece conveys a narrative of aspiration caught within a backdrop of anxiety.</desc>
