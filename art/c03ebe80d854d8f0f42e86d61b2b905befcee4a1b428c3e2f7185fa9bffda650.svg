<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Flame of Contrasts</title>
  <desc id="desc">The emotional tone emerges from the struggle between desire and emptiness, represented through an interplay of warm and cool colors. The palette features vibrant yellows and oranges against deep blues and muted purples, offering a stark contrast. The arrangement features upward bursts of warm tones on the left representing desire, gradually shifting into cooler, muted shades towards the right, embodying emptiness. The composition plays with noise patterns on the outer edges and dot patterns towards the center, creating a pulsating flow that channels both excitement and isolation. The broken pixels add an element of imperfection, enhancing the emotional tension throughout the piece.</desc>
