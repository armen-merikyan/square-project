<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">This composition embodies the emotional dance between joy and grief. The palette combines bright yellows and oranges representing joy, juxtaposed against deeper blues and muted purples conveying grief. The left-weighted layout illustrates an asymmetry that symbolizes the struggle between the two emotions, creating a collision that resonates at the center. The use of broken pixels introduces imperfection, echoing the theme of betrayal while maintaining at least 10% negative space for a sense of breathability amidst tension.</desc>
