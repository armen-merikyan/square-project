<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Tension</title>
  <desc id="desc">This piece captures the emotional dichotomy of rage and calm, framed by a palette of intense reds and cool blues. The bright reds burst through as jagged rings, representing rage, while the soft pale blues form a broken dot pattern, suggesting calm. The collision predominantly occurs in the center, where the vibrant intensity of rage confronts the soothing calm. The flow descends like falling rain, hinting at the gradual emotional shift from intensity to stillness, while the presence of broken pixels reflects moments of disruption in this emotional landscape.</desc>
