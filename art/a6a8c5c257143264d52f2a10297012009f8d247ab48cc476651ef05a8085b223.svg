<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order and Chaos</title>
  <desc id="desc">This artwork reflects the emotional contrasts of joy and grief through a palette dominated by warm oranges and yellows on the left, symbolizing joy, which gradually succumbs to cooler, muted blues and purples to represent grief on the right. The left side features a flame-like pattern implying warmth and expansion, while the right, characterized by broken dots, signifies disruption and loss. The edge is bottom-weighted to suggest a gradual descent into grief, with areas of negative space disrupting the flow. The arrangement creates tension between symmetrical order and asymmetrical chaos, highlighting the emotional complexity of love and betrayal.</desc>
