<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This artwork embodies the emotional duality of defiance and submission through a contrasting palette of warm and cool tones. The main collision occurs in the center with a crack pattern representing defiance, while horizontal stripes of submission create rhythms that challenge the bold verticals. The chosen colors—yellow and orange for warmth, muted purple and deep blue for coolness—intersect in a dynamic dance of tension and release, suggesting both confinement and the urge to break free. The broken edges create a sense of leaking emotion, contributing to the theme of an uneven border between chaos and order, resonating with the seed's themes.</desc>
