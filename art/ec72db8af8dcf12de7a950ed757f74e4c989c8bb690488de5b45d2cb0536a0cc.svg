<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition captures the emotional tension between 'spark' and 'ash', representing sudden bursts of energy versus the soft residue of loss. The palette melds warm ivory and soft gold to evoke light amidst the weights of deep wine and ash gray, suggesting a complex emotional landscape. The broken edges reflect the jaggedness of memory and erasure, with the collision primarily occurring in the central region, creating a halo effect. The structure balances negative space with dense clusters, allowing for a rhythmic interplay of tension and release.</desc>
