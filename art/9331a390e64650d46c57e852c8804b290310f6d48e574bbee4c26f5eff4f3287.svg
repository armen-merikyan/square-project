  <title id="title">Echoes of Exposure</title>
  <desc id="desc">This artwork captures the emotional tension between safety and exposure through a balanced yet discordant composition. The palette reflects the contrast: 'shelter_green' and 'warm_brown' symbolize safety, while 'open_blue' and 'cold_white' evoke exposure. The collision occurs vertically at the center, where the patterns of broken dots (representing exposure) disrupt the targeted shapes (representing safety). The placement creates a dynamic flow and rhythm, inviting the viewer to navigate the emotional landscape of vulnerability and protection.</desc>
