<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Harmony</title>
  <desc id="desc">This artwork embodies the emotional contrast between love and betrayal, interwoven with themes of order and chaos. The palette of warm pinks and reds signifies love, intertwined with dark maroon and gray to evoke feelings of betrayal. The placement of colors creates a rhythm of rising signals along the vertical axis, reinforcing a sense of hopeful ascent while hints of chaos bleed through the edges, creating an overall impression of broken symmetry. The dominant clash occurs between the warm tones at the top and the darker shades toward the bottom, symbolizing the tension between the uplifting aspects of love and the destructive nature of betrayal. This dynamic interplay fosters an abstract narrative that reflects the complexity of emotions—a push and pull of contrasting feelings.</desc>
