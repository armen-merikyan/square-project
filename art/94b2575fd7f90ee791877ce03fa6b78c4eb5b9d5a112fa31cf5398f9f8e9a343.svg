<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Crossing Currents</title>
  <desc id="desc">This piece embodies the emotional dichotomy of longing and resolve through a dance of light and dark colors, capturing the tension between density and emptiness. The palette choice of ripe green, acid green, honey gold, deep olive, and cream evokes a sense of both vibrancy and warmth versus cool separation. The central collision occurs where the deep olive intersects with the vibrant honey gold, symbolizing the pivotal moment of conflict between longing and resolve. Patterns of scattered pulse marks on one side contrast with structured checker patterns on the opposing side, creating a visual rhythm that suggests movement and potential.</desc>
