<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Wholeness and Fracture</title>
  <desc id="desc">The composition captures the emotional tension between longing and resolve using a balance of muted and vibrant colors. The use of the palette—electric blue and magenta—provides visual friction against the black and lime, symbolizing locked shapes and distant warmth. The main collision occurs towards the bottom left, where denser tones of electric blue clash with the gentle expanse of lime, reflecting the layered complexities of 'repair vs damage.' Broken pixels are integrated as intentional imperfections, suggesting an echo of past resolutions. The arrangement conveys a sense of urgency intertwined with moments of serenity, as patterns of longing (hinge) meet the clarity of resolve (ash_field).</desc>
