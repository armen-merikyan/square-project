<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Shelter</title>
  <desc id="desc">This piece captures the emotional tension between the enclosed safety of a warm environment and the vulnerability of exposure. The warm brown (#8B4513) and soft shelter green (#A8D5BA) in the upper half embody a feeling of comfort and protection, while the pale skin (#F8D2B4) and cold white (#D6E1E3) below expose emotional fragility. The main contrast occurs where these colors intersect, suggesting a transformational space that echoes between safety and vulnerability. The use of broken pixels introduces intentional disruptions, symbolizing scars from experiences of exposure. The vertical layout allows for a distinct separation yet also a conversation between the two emotional states in harmony with the implied polarization of pressure and release.</desc>
