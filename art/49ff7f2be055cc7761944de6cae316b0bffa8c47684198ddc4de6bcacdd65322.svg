  <title id="title">Emotional Collisions</title>
  <desc id="desc">This artwork captures the tension between defiance and submission, using the palette 'joy_grief' to express contrasting emotions through warm and cool colors. The central columns echo dense pressure with deep blue and muted purple, while the surrounding rows introduce rhythmic breaks of yellow and orange, suggesting moments of quiet release. The pattern embodies interrupted flows, embodying emotional collisions that create a narrative of conflict and resolution.</desc>
