<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This piece captures the emotional tension of contrasting elements—spark and ash—through a palette of deep teal and cosmic indigo, embodying the duality of vitality and decay. The pattern of crack and embers creates a jagged, uneven rhythm across the square, emphasizing collisions and interruptions. The layout of two pulses reinforces the idea of opposing forces, while the negative space allows breath and reflection amidst the density. The main collision occurs diagonally, suggesting dynamic tension and unresolved motion.</desc>
