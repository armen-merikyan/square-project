<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Calm and Fury</title>
  <desc id="desc">This artwork embodies the emotional tension between rage and calm. The palette of deep blacks and bright reds against softer pale blues and whites illustrates this duality clearly. The collision between the jagged rage pattern, represented by reds and blacks, and the gentle, contained calm represented by cooling blues and whites creates an impactful visual dialogue. Sharp and warm colors push aggressively into the cooler, calmer space, mimicking a wave-like motion of pressure and release. The negative space ensures visual breathing room, while the arrangement reflects the chaotic struggle for dominance, highlighting the eroded symmetry hinted at within the seed.</desc>
