<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Boundaries</title>
  <desc id="desc">The emotional tone reflects a struggle between longing (represented by muted browns and soft blues) and resolve (depicted through stronger grays and blacks). The choice of the palette conveys a sense of nostalgia through faded hues while hints of sharp contrasts interrupt the flow, suggesting a collision between the desire for connection and the weight of distance. The broken pixels introduce intentional disruptions, enhancing the metaphor of repair versus damage, with clusters of darkness towards the upper left and lighter patches sprawling diagonally towards the opposite corner, embodying the layout's corner invasion. This arrangement suggests movement and tension, creating an interplay between calm serenity and underlying urgency.</desc>
