<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonance of Spark and Ash</title>
  <desc id="desc">This composition captures the emotional tension between vitality (spark) and decay (ash) through a deliberate balance of color and asymmetry. The palette features a mix of clean white and ice blue to evoke restraint and clarity, while the inclusion of warning orange provides bursts of energy that mimic the dynamic tension of sparks. The radial pattern of ash hints at the chaos of memories, while rain-like interruptions from the spark accentuates the struggle against erasure, creating a conversation across the square. The center focus creates an echoing effect guiding the eye, with fragmented sections bringing visual tension to the edges. Together, these elements embody resilience against fragility.</desc>
