<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonance of Collision</title>
  <desc id="desc">This composition captures the tension between the illuminating spark and the somber ash, contrasting bright accents with muted fields. The palette of cosmic indigo and star white embodies the spark’s vitality, while void black and deep teal evoke the ash’s somber weight. The diagonal flow disrupts the orderly spread, with jagged edges suggesting fracture and chaos amidst potential. Each row subtly varies, creating an interplay of tension and release that reflects the deeper themes of resilience and fragility.</desc>
