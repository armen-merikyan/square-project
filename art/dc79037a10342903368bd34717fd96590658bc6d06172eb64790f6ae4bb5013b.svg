<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition reflects the emotional tension of vulnerability and strength through a contrasting palette of dark mourning black, deep blue, and pale yellow. The strong glitches of the depths collide with soft sparks of light that symbolize exposure. The edge style is porous, with broken pixels disrupting the flow, highlighting the collision between a protected center and the outer chaos. The balance of intense contrasts and quiet fields of color creates a narrative of tension and release.</desc>
