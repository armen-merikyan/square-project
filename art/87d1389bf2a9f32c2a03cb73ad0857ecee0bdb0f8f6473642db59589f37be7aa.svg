<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Among Static</title>
  <desc id="desc">The emotional tone reflects a struggle between clarity and chaos. Utilizing navy and dim cyan from the 'lonely_signal' palette evokes a sense of depth amidst disorder. Here, the navy signals a stable presence while the intermittent dim cyan sparks through, mirroring the chaos of noise. The collision of patterns—clear, sharp edges from the signal and soft dots from noise—creates a visual tension central to the grid, where imperfections are intentionally placed. This conflict illustrates the ongoing battle of maintaining signal amidst overwhelming noise.</desc>
