<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Emotion</title>
  <desc id="desc">The emotional tone reflects a tension between defiance and submission, using colors to represent conflict and coexistence. The palette combines sepia and faded blue to create a nostalgic yet weighty feel, suggesting memory and emotional echoes. The center features a more rigid grid pattern (defiance) contrasted with a circular, softer pattern (submission) at the edges, indicating the push and pull of feelings. The collision happens between the structured, darker hues and the lighter, fragmented colors introduced by broken pixels, reflecting unresolved tension and the struggle between opposing forces. The design retains negative space, emphasizing the void of unresolved emotions, allowing viewers to feel the imbalance and complexity within this abstract expression.</desc>
