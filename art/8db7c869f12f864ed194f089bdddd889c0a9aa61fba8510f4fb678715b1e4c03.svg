<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition explores the emotional tension between spark and ash, representing vitality clashing against remnants of the past. The palette of black, dark violet, soft gold, and pale green evokes fear and hope, suggesting a complex narrative of resilience versus fragility. The top four rows embody the spark with vibrant patterns and colors, while the bottom four rows depict ash with more muted tones, where jagged edges create visual interruptions. The dominant spark occupies the upper half, allowing intentional negative space to amplify the feeling of exposure.</desc>
