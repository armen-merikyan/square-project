  <title id="title">Collision of Tension</title>
  <desc id="desc">The emotional tone reflects the inner turmoil of defiance and submission, using a muted palette of sepia, tan, and gray to convey the weight of conflict. The contrasting patterns of checker and split_screen evoke a visual argument, while the edge style of pixel bleed emphasizes the impermanence of resolution. Main collisions occur between the darker hues at the edges and lighter shades in the center, symbolizing the struggle between heavy pressures and lighter aspirations. The negative space supports feelings of unresolved tension and freedom, embodying the push and pull depicted in the seed.</desc>
