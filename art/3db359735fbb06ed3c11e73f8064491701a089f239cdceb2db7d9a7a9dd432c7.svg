<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetrical Disarray</title>
  <desc id="desc">The emotional tone reflects the tension between panic and control, using a palette of navy, black, white, and dim cyan to evoke feelings of solitude and urgency. The main contrast arises from the structured outer frame of dark hues representing control, while the chaotic inner core employs broken patterns and lighter shades to illustrate panic's intrusion. The arrangement of colors and the method of ‘pixel bleed’ connect the feelings of intensity and disruption, creating a narrative of tension and release.</desc>
