<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symphony of Emotion</title>
  <desc id="desc">This piece captures the emotional tension between joy and grief, employing a palette that contrasts bright yellows and oranges against muted purples and deep blues. The central pixels represent the pulse of joy, surrounded by fragmented and darker tones that embody grief. The layout centers around a wave shape, symbolizing the ebb and flow of emotions. Patterns of crosshatching create a rhythmic clash that communicates both harmony and discord. The outer edges feature thin outlines to accentuate the feeling of being either contained or overwhelmed, echoing the themes of love and betrayal. The distribution includes negative space, allowing for an airiness that contrasts with the dense clustering of colors in the center, suggesting a conversation between stability and interruption.</desc>
