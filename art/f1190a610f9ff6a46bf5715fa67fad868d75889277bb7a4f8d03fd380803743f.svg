<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Harmony</title>
  <desc id="desc">This artwork presents the emotional tension between vulnerability and strength through a split horizontal layout. The top rows, representing vulnerability, are filled with soft and pale hues that illustrate an exposed feeling, while the bottom rows, symbolizing strength, use darker, more robust tones to create a sense of stability. The palette, drawn from the 'guilt_forgiveness' family, enhances this emotional dichotomy. Broken pixels scattered across the layout disrupt the rows, visually suggesting the imperfect nature of these emotions. The collision happens centrally, where the soft noise and strong frame intertwine, creating an abstract narrative of conflict and resolution.</desc>
