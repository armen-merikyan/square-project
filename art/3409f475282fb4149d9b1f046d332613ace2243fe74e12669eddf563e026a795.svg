<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embrace of Tension</title>
  <desc id="desc">This artwork captures the emotional duality of longing and resolve, suggesting a visual conversation between the two. The chosen palette, reminiscent of warmth and depth, uses muted purple and deep blue to portray longing's quiet ache, contrasted sharply by vibrant yellows and oranges symbolizing resolve's brightness and clarity. The arrangement features a central collision where warm and cool tones intersect, accentuating the push and pull of these contrasting emotions. The scattered shapes reflect the 'scattered repair' layout, with careful placement of negative space enhancing the sense of incompleteness and tension, embodying both intimacy and distance.</desc>
