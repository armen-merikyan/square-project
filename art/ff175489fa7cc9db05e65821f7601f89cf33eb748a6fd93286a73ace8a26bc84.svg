<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience in Asymmetry</title>
  <desc id="desc">This artwork conveys the emotional tension of vulnerability and strength through a juxtaposition of delicate and bold colors. Utilizing soft mint and storm gray creates a contrast between lightness and weight, where pale tonalities symbolize exposure and dark hues imply protection. The central collision of the radial pattern (representing vulnerability) with the pulse-mark accents (symbolizing strength) emerges at the core of the square, evoking a feeling of tension against a balanced backdrop. The broken pixels interrupt the flow, embodying the 'mirror broken' concept—suggesting fragmentation within cohesion.</desc>
