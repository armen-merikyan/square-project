<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition captures the emotional tension between desire and emptiness, with a dominant warm palette representing yearning against a backdrop of cool, low-saturation colors symbolizing restraint. The contrast is most pronounced in the center, where vibrant coral and orange 'climb' upwards, clashing with the hollow, muted blues around the edges. This visual conflict creates a rhythmic dynamic, echoing the struggle between overflowing desire and the boundaries that contain it.</desc>
