<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Boundaries</title>
  <desc id="desc">This composition captures the emotional struggle between desire and restraint. The palette employs deep reds and muted creams to signify warmth (desire) battling against cool grays (restraint). The main collision occurs in the central square, where the red hues press against the gray borders, illustrating the tension of yearning for expansion while being constrained. The split-screen pattern illustrates desire's radial energy against restraint's structured limits. The edges show breaks that symbolize the fragility of containment, reflecting on the suffocation of desire by protective boundaries.</desc>
