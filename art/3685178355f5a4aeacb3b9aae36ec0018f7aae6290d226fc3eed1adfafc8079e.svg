<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Torn Connection</title>
  <desc id="desc">This artwork embodies the emotional tug-of-war between loneliness and connection through a striking palette of pinks, reds, and grays. The outer rows of dark maroon and gray represent isolation—the 'loneliness'—while the inner core utilizes lighter pink hues reflecting attempts at connection amidst the gray shadows. In the center, a burst of pink symbolically contrasts with the more subdued outer sections, representing the heartbeat of emotion—a hidden vibrance against the overwhelming darkness. The broken pixels introduce imperfections, signaling the constant struggle between these opposing feelings. The arrangement flows from dark to light, capturing a gradual emotional release, while the gridlike pattern ties it all together, evoking a sense of structure in chaos.</desc>
