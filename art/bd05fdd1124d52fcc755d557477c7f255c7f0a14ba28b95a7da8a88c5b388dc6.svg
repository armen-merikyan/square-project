<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebbing Forces</title>
  <desc id="desc">This composition captures the emotional tension of defiance versus submission. The palette of hot coral, blood orange, and charcoal contrasts sharply with the quiet hollows of blue and dust pink, creating zones of density and emptiness. The main contrast occurs in the central region, where pulse-like marks of fiery colors collide with muted teeth patterns, enhancing a sense of conflict. The use of broken pixels introduces an imperfection that reflects the theme of conflict's disruption, while maintaining enough negative space to let the viewer's eye find quiet amidst the chaos.</desc>
