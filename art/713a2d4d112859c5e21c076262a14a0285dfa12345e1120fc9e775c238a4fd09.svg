<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Affection</title>
  <desc id="desc">This composition captures the struggle between love and betrayal through contrasting warmth and coldness. The palette is rooted in shades of pink and red—symbolizing love—against darker tones of gray and dark maroon that introduce elements of betrayal. The left half emerges as a frame-like pattern with jagged edges, representing the embrace of love, while the right half interrupts with a grid pattern that conveys chaos and disarray. The presence of broken pixels on the right enhances the feeling of fragmentation where emotions clash, while the negative space allows the emotional tension to breathe, suggesting unresolved feelings. Main contrasts occur in the edges; the warmth of the left colliding against the cooler, more chaotic right highlights the emotional intensity of the piece.</desc>
