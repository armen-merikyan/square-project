<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Between Tides</title>
  <desc id="desc">This artwork captures the emotional dynamic between longing and resolve. The palette of deep teal, void black, and cosmic indigo provides a foundation of density and introspection, while the cold gold and star white serve as accents that punctuate moments of clarity and desire. The layout features two small pulsating cores within a quiet expanse, illustrating conflict and harmony; mostly filled with void black and deep teal indicates longing's weight, while golden accents suggest resolution. The contrast arises where warmth meets darkness, echoed by broken pixels that introduce intentional imperfections, representing the unseen struggles of intimacy and distance. This composition creates a rhythm that feels alive, oscillating between pressure and release.</desc>
