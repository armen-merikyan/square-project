<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">The artwork embodies the emotional struggle between panic and control, visualizing this through an 8x8 format that contrasts dense, dark colors with lighter, more vivid hues. Using a palette of lime, electric blue, and magenta against black, the work reflects the clash of stability and instability. The top-heavy layout creates an unsettling balance, where brighter sparks compete against the weight of deeper colors, suggesting a sense of turmoil within a structured space. The mirror-broken layout—reflecting with slight adjustments—symbolizes the imperfect nature of seeking control amid chaos.</desc>
