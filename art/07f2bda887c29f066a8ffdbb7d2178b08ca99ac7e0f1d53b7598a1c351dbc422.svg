<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Boundaries</title>
  <desc id="desc">This artwork embodies the delicate balance between vulnerability and strength through its contrasting colors and placements. The warm hues of yellow and orange represent strength, creating a dense focal area at the center, while the cooler shades of deep blue and muted purple suggest vulnerability, which softly envelops the edges. The pattern of 'rain' replicates the feel of exposure, while 'target' evokes a sense of rooted presence. Broken pixels within the center symbolize cracks in strength, conveying the emotional tension of safety in exposure. The layout emphasizes a dense center versus a struggling, fragile perimeter, highlighting the artwork's thematic exploration of vulnerability against strength.</desc>
