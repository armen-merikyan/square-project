<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Suspicion</title>
  <desc id="desc">This composition explores the duality of trust and suspicion through distinct emotional patterns. The top half uses a stair-like arrangement in soft pinks to evoke trust, while the bottom introduces a chaotic ring pattern in deep maroon and gray, reflecting suspicion. The contrasting flow emphasizes a collision between emotional states, with the glowing edges enhancing the sense of movement and pressure in a confined space. Negative space is preserved, allowing the viewer to feel the tension of the palette — warm pinks meeting muted dark tones, symbolizing the complex interplay of these emotions.</desc>
