<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition embodies a tension between rage and calm through color and pattern. The palette juxtaposes intense reds against softer blues, creating emotional contrast. The rage is represented with jagged, broken frames in the upper corner, suggesting an eruption, while the calm manifests in smooth, even fields across the rest of the square. The interplay of the two energies reflects the seed's themes of collision between structured noise and serene quietude. The broken pixels create intentional disruptions, and the arrangement seeks to evoke a sense of echoing chaos contained by calmness.</desc>
