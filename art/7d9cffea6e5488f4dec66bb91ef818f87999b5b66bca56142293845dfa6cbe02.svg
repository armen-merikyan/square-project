<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Collision</title>
  <desc id="desc">The emotional tone highlights the delicate struggle between tenderness and rage. The chosen palette—dominantly dark and muted with sharp accents—reflects the contrasting moods; blacks and deep reds evoke rage while soft pale blues suggest tenderness. The composition's primary clash occurs in the center, where a radial pattern of soft blues collides with the pressure bands of red, creating a visual tension. The idea of a 'door' suggests barriers, inviting contemplation of inside vs outside as the contrasting emotional forces interact. The broken pixels introduce intentional flaws, symbolizing the imperfections in this duality.</desc>
