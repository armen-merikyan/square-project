<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Embrace</title>
  <desc id="desc">The emotional tone is a juxtaposition between love's warmth and the sharp edges of betrayal. The palette of pink, red, gray, and dark maroon reflects this emotional duality. The dominant use of warm colors on one side transitions into darker, cooler tones, creating a clear tension. The layout follows a diagonal flow, representing the rising signal of love, countered by chaotic cracks symbolizing betrayal. The broken pixels add an unexpected imperfection that echoes the theme of fractured emotions, capturing the essence of the seed in an abstract composition.</desc>
