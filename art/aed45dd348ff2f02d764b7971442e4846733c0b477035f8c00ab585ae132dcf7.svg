<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Dark</title>
  <desc id="desc">The emotional tone of this artwork reflects the dichotomy of fear and hope. The palette mixes deep blacks and dark violets with soft gold and pale green to evoke the underlying tension of fear while allowing fleeting moments of hope to emerge. The central division (split vertical) signifies the clash between the two emotions. Warm and cool contrasts create a dynamic flow, where dark, jagged edges represent fear while soft, glowing edges in the top half symbolize hope. This interplay results in a pattern that feels both anxious and uplifting, capturing the struggle between dense weight and the desire to rise. Broken pixels introduce imperfection, emphasizing the struggle against a polished, mechanical sobriety, allowing glimpses of light to shatter the dark corners.</desc>
