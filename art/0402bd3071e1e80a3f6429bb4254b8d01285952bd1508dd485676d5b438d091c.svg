<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This composition explores the emotional tension between loneliness and connection. The color palette, 'broken_memory', consists of muted sepia, tan, dust gray, and faded blue, conveying a sense of nostalgia and introspection. The central area is dense with color to represent internal connections, while the outer rectangles use lighter shades to evoke the feeling of isolation. The zigzag flow suggests movement from isolation towards connection, creating a shift from dark and dense to lighter, softer colors, capturing the ebb and flow of emotions. The arrangement includes broken pixels to introduce an element of imperfection, embodying the rawness of feeling exposed yet hidden. Negative space is intentionally left in the corners to symbolize moments of solitude, maintaining at least 10% empty areas to reflect the theme of loneliness amidst connection.</desc>
