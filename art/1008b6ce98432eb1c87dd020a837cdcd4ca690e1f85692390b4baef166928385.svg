<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This artwork captures the tension between the quiet and pressure emotions. The palette of muted hues like dust gray and off-white represents the quiet fields, while the compressed red introduces punctuations of pressure. The arrangement features dense clusters of deeper colors at one corner, gradually giving way to lighter shades, mirroring a release of pressure across the square. The main collision happens diagonally where deep navy interrupts the lighter colors, suggesting a narrative of a wave breaking, adding a dynamic tension to the otherwise calm fields, embodying the seed's duality of clarity and confusion.</desc>
