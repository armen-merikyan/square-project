<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition captures the emotional tension between rage and calm through contrasting colors and patterns. The palette of intense red and deep black versus soft pale blue and white reflects the struggle between explosive energy and soothing calm. The main collision occurs in the center where jagged, cracked red shapes (representing rage) disrupt the more structured and tranquil blue patterns (representing calm), generating a visual dialogue of chaos and serenity. Broken pixels throughout symbolize imperfections and abrupt disruptions in emotional balance, contributing to an overall sense of conflict and resolution that resonates with the seed's themes.</desc>
