<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Waves of Tension and Calm</title>
  <desc id="desc">The emotional tone of this artwork is a dynamic interplay between restlessness and peace. The palette of warm coral and orange tones collides with dark charcoal and tranquil hollow blue, representing the tension expressed by restless emotions alongside the serenity sought in peace. The main collision occurs diagonally, creating a visual tension where the vibrant hues seem to push against the calming blues, mimicking the struggle between memory and motion. The pattern of a grid encapsulates restlessness, while the surrounding ring signifies peace, allowing the viewer to feel the push and pull of emotions. Broken pixels are scattered throughout to suggest cracks in this emotional landscape, reflecting imperfection and a sense of unresolved journey.</desc>
