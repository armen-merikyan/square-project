<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Reflections of Strength</title>
  <desc id="desc">The artwork conveys a dynamic interplay between strength and vulnerability, symbolizing the contrast through the selected colors. A muted palette of deep charcoal (#333333) provides a grounding presence, while splashes of bright hot coral (#FF6F61) and blood orange (#FF3D00) act as disruptors, representing moments of vulnerability. These colors cluster towards the center, suggesting an active core under pressure, clashing against the defensive outer layers of softer hues like dust pink (#E4B7C2) and hollow blue (#A3C4E0). The arrangement reflects a central 'mirror' of potent emotion, where vulnerability is both exposed and guarded, complemented by the fractured edges to echo a sense of brokenness without literal depiction. Each row maintains a balance of negative space, ensuring the artwork breathes, while allowing the emotional tension to resonate subtly across the grid.</desc>
