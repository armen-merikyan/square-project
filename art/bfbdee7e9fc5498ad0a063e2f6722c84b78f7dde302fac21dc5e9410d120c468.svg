<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">The emotional tone captures the tension between the warm pull of desire and the contained restraint. The palette blends saturated tones of hot coral and blood orange to express longing, contrasted by the muted fields of charcoal and hollow blue for restraint, conveying a struggle. The main collision occurs centrally, where the dense pattern of desire meets the sharp edges of restraint in a quiet channel, emphasizing the push and pull of emotional pressure. The abstract pattern reflects this dynamic struggle without depicting any literal imagery.</desc>
