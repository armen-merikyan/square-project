<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone oscillates between the heat of rage and the tranquility of calm. The palette of deep black, bright red, and soft pale blue creates powerful contrasts: black represents containment, while red signifies the eruptive nature of rage. The cooler, calmer hues of pale blue introduce a soothing tension against the fiery accents. The arrangement showcases a strong diagonal flow, where dense clusters of rage (red) intersect with quiet spaces (pale blue and black), particularly emphasizing the center and corner for collision. Broken pixels symbolize eruptions that disrupt an otherwise calm surface, invoking the unpredictable nature of emotion as it ebbs and flows between chaos and serenity.</desc>
