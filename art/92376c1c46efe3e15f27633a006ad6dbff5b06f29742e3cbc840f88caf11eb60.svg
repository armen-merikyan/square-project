<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Forces</title>
  <desc id="desc">This artwork embodies the emotional struggle between defiance and submission, represented through a contrast of warm and cool colors. The chosen palette of pink, red, gray, and dark maroon evokes feelings of love, betrayal, and weight—mirroring the heaviness of submission and the vibrancy of defiance. The flow is a rising signal that suggests a movement from the bottom upwards, akin to hope or resistance. The main collision occurs at the center, where the brighter pixels (pink and red) intersect with darker shades (gray and maroon), creating a tension that invites the viewer to contemplate the push and pull of opposing forces. The placement of 'broken pixels' introduces imperfection, reinforcing a sense of ongoing struggle and complexity in relationships. Negative space is utilized effectively, ensuring the composition does not overwhelm but allows for contemplation amidst the chaos of color and emotion.</desc>
