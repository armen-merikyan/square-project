<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone reflects a juxtaposition of rage and calm, resonating through the use of contrasting colors. The palette of reds and whites represents the explosive feelings of rage, while pale blue symbolizes calmness, providing a counterbalance. The structure showcases a 'rising signal' layout, with dark colors at the bottom representing containment, bleeding upward into the chaotic reds of rage. The main collision occurs in the center, where jagged patterns of red penetrate the cooler hues, illustrating an emotional struggle transcending limits. The blend of crack (calm) and scar (rage) creates a compelling visual narrative of tension and disruption, all while maintaining a readable abstract form.</desc>
