<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">The piece explores the tension between joy and grief through a palette of vibrant yellows and muted blues. A diagonal spread captures joy in the upper left corner, cascading downwards as grief permeates the lower right. The contrasting patterns—crack for joy and noise for grief—create an echo of intensity and interruption. Hard edges define the boundaries, suggesting a struggle between safety and threat. Broken pixels introduce imperfection, mirroring the unpredictable nature of emotions. The density shifts from the light and expansive upper section to heavier, more compressed lower portions, embodying the complexity of these intertwined feelings.</desc>
