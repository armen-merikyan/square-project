<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Calm and Chaos</title>
  <desc id="desc">This artwork embodies the emotional tension between restlessness and peace. The chosen palette of deep black juxtaposed with pale blue and white reflects a battle between darkness and light, symbolizing inner turmoil versus tranquility. The diagonal layout emphasizes conflict—a dense cluster of restless broken dots in black bleeding into a more serene negative cross of pale blue and white represents the struggle for peace disrupted by memory and motion. The intentional placement of broken pixels adds an element of imperfection, signifying the scars left by unresolved emotions. The composition creates a rhythmic stutter that echoes the persistent nature of thought, ultimately allowing the viewer to feel the complexities of this emotional landscape.</desc>
