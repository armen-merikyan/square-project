<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This artwork embodies the emotional tension between desire and restraint through the color palette and layout. The use of warm, saturated colors like hot coral and blood orange represents the pull of desire, whereas muted shades in charcoal and hollow blue reflect the binding nature of restraint. The central collision occurs in the center, where vibrant colors overlap with the darker hues, creating a sense of tension and unresolved motion. The layout features a smaller, denser area (representing desire) surrounded by a quieter field (representing restraint). This reflects the struggle between an internal yearning and external boundaries, translating the seed into an abstract pattern without identifiable objects.</desc>
