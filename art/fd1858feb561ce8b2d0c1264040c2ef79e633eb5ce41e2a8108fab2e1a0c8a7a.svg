<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the tension between 'spark' and 'ash' through a palette of deep blacks, soft golds, and muted greens. The dominating dark tones represent restraint, while the intermittent golds suggest bursts of energy—sparks in the midst of ash. The arrangement echoes a diagonal argument of light against darkness where the golden tones flicker within a predominantly dark space, symbolizing resilience amid fragility. The broken pixels create intentional disruptions, echoing memories or fleeting moments, paralleling the conflict of exposure vs shelter.</desc>
