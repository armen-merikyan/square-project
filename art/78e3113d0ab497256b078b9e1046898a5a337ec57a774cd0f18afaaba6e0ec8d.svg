<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Trust</title>
  <desc id="desc">The emotional tone reflects a dichotomy between trust and suspicion. The chosen palette of deep reds, grays, and soft pinks embodies warmth and tension—red symbolizes suspicion while pink offers the gentle undertones of trust. The main collision of colors occurs in the top left corner, where intense dark maroon clashes with softer pinks, creating a pressure point that radiates outwards, interrupting the otherwise stable flow. The patterns of channels and frames suggest a layered complexity that reflects the contrasts of the emotions expressed in the seed.</desc>
