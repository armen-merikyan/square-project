<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Yearning</title>
  <desc id="desc">The emotional tone reflects the tension between emptiness and desire, using a palette that juxtaposes cool blacks and violets against warm golds and greens. The top four rows convey longing and emptiness through dark, muted tones with minimal variation, creating a quiet, heavy atmosphere. The bottom four rows introduce soft gold and pale green spark-like patterns, symbolizing desire's flickering presence. The interference of colors creates collisions of warmth and darkness throughout the piece, embodying a struggle between static emptiness and the urge to rise—a narrative of yearning against the backdrop of solitude.</desc>
