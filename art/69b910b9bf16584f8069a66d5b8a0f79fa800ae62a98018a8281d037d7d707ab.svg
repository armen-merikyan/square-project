<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone juxtaposes vulnerability and strength through a palette that balances deep, dark colors with soft, luminous accents. The collision occurs in the center, where the pale yellow emerges against the robust deep blue, representing a moment of fragility surrounded by strength. The patterns of 'fault lines' and 'flame' resonate with the emotional contrast, with broken pixels disrupting the flow, symbolizing cracks in the facade of strength and shelter. Overall, the piece represents a struggle between exposure and protection, echoing the seed's themes.</desc>
