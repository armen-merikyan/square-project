<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Spirals</title>
  <desc id="desc">The emotional tone of the artwork expresses a struggle between defiance and submission through the use of sharp contrasts and spiraling densities. The palette—composed of warm pink and red tones contrasted with dark maroon and gray—emphasizes the tension of these opposing emotions. The main collision occurs at the center where saturated colors clash with quieter edges, symbolizing a chaotic inner turmoil surrounded by an uncertain environment. The central pattern evokes a sense of disruption and intensity, reflecting the ‘wound’ shape seed without depicting it literally.</desc>
