<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Forces</title>
  <desc id="desc">The piece embodies the emotional clash between defiance and submission, utilizing a palette of vibrant and dark tones. The bright accents of hot magenta and signal green represent the defiance, interspersed with the softer, receding tones of static gray and dead black to show submission. A central pulse of electric blue collides with quiet gray tones, suggesting a surge against calm, creating a visual representation of tension. The disordered placement creates a sense of imbalance, reflecting the chaos of crossing emotional currents, while broken pixels provide an intentional disruption to convey the imperfections inherent in navigating these feelings.</desc>
