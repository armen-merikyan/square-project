<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolution</title>
  <desc id="desc">This artwork embodies the tension between longing and resolve, represented by contrasting colors and patterns. The palette, selected from the 'fear_hope' family, features dark violet and soft gold to evoke feelings of yearning and strength. The top four rows embody 'longing' through a patchwork of dark hues creating a sense of dense emotion and quiet space, while the bottom four rows showcase 'resolve' in a stepped pattern of greens and golds, suggesting a firm rise. The collision occurs at the midpoint, where dark colors meet the lighter tones, reflecting the interplay between desire and determination. Broken pixels introduce intentional imperfection, simulating the scars of experience. The negative space allows the viewer to breathe within the density, enhancing the emotional weight of the piece.</desc>
