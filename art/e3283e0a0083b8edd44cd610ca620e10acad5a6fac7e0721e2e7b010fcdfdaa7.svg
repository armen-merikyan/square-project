<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry Disrupted</title>
  <desc id="desc">The emotional tone oscillates between envy and gratitude, illustrated through a palette transitioning from dark to light. The deliberate contrast highlights both emotions, with dark hues suggesting the weight of envy while lighter shades inspire a sense of elevation akin to gratitude. The main collision occurs in the central column where dark and light pixels meet, creating tension. Asymmetrical placement escalates the sense of distortion and imbalance, mirroring the complexity of conflicted feelings. The slight break in symmetry adds a layer of imperfection, inviting the viewer to consider the beauty found within emotional conflict.</desc>
