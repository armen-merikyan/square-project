<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Containment</title>
  <desc id="desc">This composition embodies the emotional struggle between desire and restraint. The palette was chosen to reflect warmth and depth ('red_oxide' and 'small_orange' for desire) juxtaposed with muted tones ('muted_cream' and 'iron_gray' for restraint). The bright accents protrude against the more subdued background, embodying the desire to overflow while maintaining a sense of containment with darker shades. The main visual tension occurs in the center where warm tones collide with cooler ones, echoing the emotional spiral of the seed while allowing for moments of disruption through broken pixels, evoking a sense of both longing and betrayal.</desc>
