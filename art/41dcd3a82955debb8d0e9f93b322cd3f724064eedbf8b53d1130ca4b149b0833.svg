<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This abstract composition explores the emotional tension between longing and resolve, where soft, warm hues hint at longing while sharper, cooler shades represent a firm resolve. The palette of rose clay, warm shadow, cool blue, distant lilac, and lamp gold creates a dynamic backdrop of intimacy and tension. The dominant presence of distant lilac (representing longing) fills the central rows, interrupted by the structured presence of cool blue and gold, creating a visual collision at the midpoint. This embodies the idea of emerging from chaos (lower rows) into clarity (upper rows), reflecting the push and pull of emotion. The layout follows a rising signal motif, suggesting an upward movement typical of hope, while broken pixels introduce imperfection, reflecting moments of uncertainty. Each colored section tells a story of transition, as contrasting patterns overlap to evoke the complexity of human emotions.</desc>
