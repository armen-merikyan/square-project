<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Chaos</title>
  <desc id="desc">The piece embodies the tension between panic and control, using a palette of deep navy and black to evoke a sense of darkness and fear, contrasted with sharp stripes of white and dim cyan representing clarity amidst chaos. The central pixelation reflects the seed's call for control, while the surrounding bleed suggests the encroaching sense of panic. The arrangement allows for full contrast with hollow spaces creating negative space, echoing the uncertainty of the emotional interplay. An asynchronicity in patterns emphasizes the disruption caused by overlapping emotions.</desc>
