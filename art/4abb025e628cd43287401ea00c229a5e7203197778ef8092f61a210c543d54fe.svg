<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tension</title>
  <desc id="desc">This composition explores the push and pull between joy and grief. The palette combines warm yellow and orange with deep, muted blues and purples, contrasting light and shadow to reflect the emotional dichotomy. The pattern of upward movement on one side (representing joy with sharp, tooth-like spikes) clashes against the downward flow of muted colors (representing grief in soft, radial transitions). This results in a rich interplay that embodies both chaos and order, creating moments of collision and quiet space.</desc>
