<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Emotion</title>
  <desc id="desc">This artwork embodies the duality of fear and hope through a striking contrast of color and composition. The dark tones represent fear's jagged edges and pressure, enveloping the bright accents reflecting hope's soft glow. The palette—black, dark violet, soft gold, and pale green—creates emotional tension and highlights the collision of moods. The inner 4x4 grid bursts with lighter hues amidst a darker border, emphasizing the struggle between contrasting feelings. The arrangement suggests an emerging hope amidst an oppressive atmosphere, respecting the rules of negative space to create a balance between dense emotion and quiet reflection.</desc>
