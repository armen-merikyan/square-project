<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Perception</title>
  <desc id="desc">This piece explores the interplay between confusion and clarity through a dichotomy of dark and light colors. The palette of black, navy, and dim cyan embodies feelings of depth and isolation, while the inclusion of white introduces starkness and relief against the dark backgrounds. The central pattern radiates outward, reflecting a clamorous spiral of emotions where clarity attempts to break through confusion. Jagged edges and broken pixels in certain areas symbolize disruption, resonating with the theme of conflict between understanding and chaos. Negative space is utilized to create a sense of breath and relief amid the densely packed colors, highlighting the emotional tension present in the artwork.</desc>
