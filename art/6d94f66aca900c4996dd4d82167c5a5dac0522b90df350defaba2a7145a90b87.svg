<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collisions of Desire and Determination</title>
  <desc id="desc">This piece captures the emotional tension between longing and resolve through a palette of cosmic indigo, void black, star white, cold gold, and deep teal. The dominant indigo and cold gold create a feeling of reaching for something afar while firm contrasts in void black outline fragments invoke the sense of resolve. The shatter patterns reflect urgency breaking through the calm, while the ring patterns of longing create a swirl of quiet intimacy. The central collision occurs diagonally, where yearning meets a structured boundary, signifying the push and pull of emotions.</desc>
