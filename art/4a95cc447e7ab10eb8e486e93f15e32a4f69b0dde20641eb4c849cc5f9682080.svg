<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall of Emotion</title>
  <desc id="desc">This artwork reflects the dichotomy of panic and control through contrasting colors and patterns. The palette features deep reds and soft pinks for warmth, balanced by shades of gray, embodying conflict. Control represents vibrations of structured grids (light grays depicting order), while panic disrupts this with jagged cracks of the darker maroons and reds. The layout divides the canvas, with panic dominating the upper rows and control grounding the lower, creating a visual representation of emotional tension. The use of broken pixels introduces imperfection, reflecting the chaotic experience of managing control amidst chaos.</desc>
