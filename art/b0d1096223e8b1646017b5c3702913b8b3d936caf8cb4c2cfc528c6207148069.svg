<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry and Discord</title>
  <desc id="desc">The emotional tone reflects a tension between trust and suspicion. The palette combines deep blacks and dark violets representing the shadows of suspicion, contrasted with soft gold and pale green embodying the warmth of trust. This creates a pervasive sense of conflict. The main contrast lies along the vertical split, where the 'stairs' pattern of suspicion, made with darker shades, collides and interrupts the flowing 'thread' pattern synonymous with trust. This collision represents the struggle between support and blockage, reflecting emotional tension inherent in the seed's themes.</desc>
