<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Light and Weight</title>
  <desc id="desc">The emotional tone oscillates between envy and gratitude, represented through a palette of vibrant lime and electric blue against deep blacks and magenta. The contrast of the light colors against dark backgrounds creates a dynamic tension, echoing the struggle between a small bright shape (gratitude) and heavy dark masses (envy). This composition employs a zigzag flow that hints at the disruption and conflict of emotions. The patterns reflect a frame of envy that encroaches on the more structured grid of gratitude, while broken pixels introduce imperfection, mirroring the theme of a 'broken mirror'. The layout draws attention to both the center and the edges, with asymmetrical placements heightening the abstract story and visual rhythm of unresolved emotional collisions.</desc>
