<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone captures the tension between desire and emptiness. The palette includes warm vibrancy from "hot coral" and "blood orange" juxtaposed with somber tones of "charcoal" and "hollow blue" to signify restraint. The contrast centers in the top-left corner where vibrant warm colors collide with dark, hollow spaces, emphasizing the struggle between overflowing desire and the constraints of emptiness. The patterns emerge in a threshold of saturation interrupted by the empty spaces, embodying the spiral inward of thoughts left unfulfilled.</desc>
