<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">The emotional tone oscillates between grief and joy, captured through a palette of deep blues and vibrant yellows. The muted blue tones represent grief's weight and fragmentation, while the bright yellows symbolize joy's expanding, spark-like essence. The arrangement creates a zigzag pattern, evoking rising signals of hope amid chaos, with a prominent focus on contrast in the center, where joy's brighter edges interrupt the solid blue base. This reflects the tension between these opposing emotions, balanced with negative space that suggests unresolved feelings.</desc>
