<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Climbing Tensions</title>
  <desc id="desc">This composition explores the emotional dichotomy of tenderness and rage through a palette that contrasts saturated colors with muted tones. The collision of the intense reds representing rage with the soft pale blues signifies a struggle between harshness and gentleness. The main tension occurs at the edges where the deep black and pale blue interplay disruptively, symbolizing a hard boundary yet inviting flow. The abstract layout invites one to witness the pulse of conflict and resolution across the grid, embodying both the quiet and explosive elements of the seed.</desc>
