<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resistance</title>
  <desc id="desc">This artwork embraces the emotional tension between defiance and submission. The chosen palette, "mourning_renewal," evokes a sense of complexity with deep blue and mourning black representing defiance, while pale yellow and new leaf suggest softness and submission. The interaction of halo (defiance) and barcode (submission) patterns creates a noticeable collision, especially around the center—symbolizing the battle between the two emotions. The diagonal rise pattern enhances the feeling of upward momentum, countering the downward flow suggested by muted areas. Broken pixels introduce imperfection, enhancing the abstract nature without implying literal forms, while strategic use of negative space balances the density created by the interaction of colors, ensuring the piece stays compelling at a glance.</desc>
