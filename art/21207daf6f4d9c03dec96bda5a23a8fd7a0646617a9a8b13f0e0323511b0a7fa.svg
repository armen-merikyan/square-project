<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This composition reflects the emotional dichotomy of love and betrayal through a deliberate pattern of warm and cool colors. The palette integrates warm pinks and reds symbolizing love, contrasted by dark maroons and grays representing betrayal, encapsulating the tension between these two states. The layout mirrors the left and right sides, but with intentional disparities illustrating the 'broken' aspect of the theme. The flow bursts emerge in the corners, suggesting chaotic interruptions in an otherwise symmetric structure, enhancing density on one side while leaving more negative space on the other. Thus, while the overall form hints at balance, the disruptions signify unresolved emotions, echoing the inherent conflict within the seed.</desc>
