<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This artwork reflects the emotional tension between desire and emptiness. The chosen palette of warm coral and blood orange embodies a yearning glow, while the deep charcoal and hollow blue evoke a sense of distance and cool restraint. The arrangement features a soft glow radiating from the center, illustrating the saturating pull of desire, while the darker edge represents containment, symbolizing a border that refuses expansion. The overlaps of the shatter and constellation patterns create intentional collisions, enhancing the feeling of conflict between the two emotional states. The placement of broken pixels introduces disruptions that suggest scars of unmet desire within the structured chaos of the design, with the main collision occurring in the center, emphasizing the core struggle.</desc>
