<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Contrast</title>
  <desc id="desc">This artwork embodies the juxtaposition of joy and grief through a split horizontal layout where warmth and coldness meet. The palette merges vibrant yellows and oranges representing joy with deep blues and muted purples denoting grief. Central to the piece, stark color collisions provide an emotional tension, reflecting the chaotic nature of conflicting feelings. The wave-like flow ascends from a heavy base, suggesting a rise in joy amid lingering grief, while the jagged edges evoke the turmoil inherent in the experience. The occasional broken pixels introduce an intentional imperfection, enhancing the sense of fragmented emotion and allowing for moments of quiet negative space.</desc>
