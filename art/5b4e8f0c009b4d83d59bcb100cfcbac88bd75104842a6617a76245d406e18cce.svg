<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Yearning</title>
  <desc id="desc">This artwork embodies the emotional pull between desire and emptiness. The palette merges saturated colors such as hot coral and blood orange to evoke a sense of longing, clashing against the low-saturation shades of charcoal and hollow blue, representing restraint and distance. The center of the piece creates a collision of warmth and coolness, reflecting the core tension between overflowing desire and the containment imposed by emptiness. The broken pixels introduce intentional disruptions, enhancing the feelings of discomfort and craving while maintaining negative space that symbolizes the void left by unfulfilled desires. Overall, this arrangement communicates a narrative of aspiration constrained by limitations.</desc>
