  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This square captures the emotional tension between emptiness and desire, with the palette reflecting desire's warmth (coral, blood orange) against cooler, muted areas (charcoal, hollow blue). The contrast is most prominent in the center, where saturated hues collide with spaces of low saturation, exhibiting a clear flow amidst the broken dots and negative cross patterns. The placement and selection of broken pixels introduce intentional disruptions that echo the concept of contained overflow.</desc>
