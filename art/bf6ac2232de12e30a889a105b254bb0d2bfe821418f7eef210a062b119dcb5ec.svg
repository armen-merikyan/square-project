<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Tensions</title>
  <desc id="desc">This piece captures the emotional struggle between relief and dread. Using a palette of faded gold, storm gray, and pale mint, the artwork oscillates between light and dark, mimicking a pulse of tension. The main collision occurs in the center, where a bright core of pale mint fights against the heavy mass of storm gray. The broken pixels and crosshatched patterns represent fragmentation and chaos, while the framed composition hints at a sense of order. The arrangement evokes feelings of anxiety that dissipate in softer, more open spaces.</desc>
