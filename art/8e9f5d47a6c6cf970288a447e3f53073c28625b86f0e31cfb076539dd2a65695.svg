<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Boundary Pulse</title>
  <desc id="desc">This artwork embodies the emotional tension between vulnerability and strength. The palette of signal green, electric blue, and hot magenta captures the vibrancy of exposed sensations against a backdrop of static gray and dead black, visually representing protection versus exposure. The flow of colors moves from the corner, with islands of vulnerability emerging from a stable base, suggesting a dynamic interplay between a strong foundation and gentle intrusion. The collision happens at the center, where areas of dense color create stark contrasts, embodying the struggle of connection versus alienation. Broken pixels create ruptures in calm, enhancing the narrative of ongoing conflict and resolution.</desc>
