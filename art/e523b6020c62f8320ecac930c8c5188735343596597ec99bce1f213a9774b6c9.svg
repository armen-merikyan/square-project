<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Fracture</title>
  <desc id="desc">This composition embodies the tension between control and panic, reflected in the contrasting patterns of bold and cracked textures. The palette of black, dark violet, soft gold, and pale green creates a dynamic tension, where the softness of green suggests hope and joy, while the darker hues represent chaos and grief. The flow from bottom to top signifies ascent amid turmoil, with interrupted lines creating a sense of unease. Broken pixels are introduced to enhance the feeling of imperfection and disruption, reflecting the struggle between symmetrical order and chaotic interruptions. Key collisions occur in the central area, where darker sections clash with lighter hues, emphasizing the emotional complexity of the piece.</desc>
