  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone of this artwork highlights the tension between vulnerability and strength, represented by the juxtaposition of soft mint and storm gray. The color palette was carefully chosen to reflect these themes; pale mint symbolizes vulnerability and softness, while storm gray embodies strength and stability. The contrast in patterns—maze for strength and stairs for vulnerability—creates a dynamic flow from the center outward. The main collision occurs in the middle section where the vibrant pale mint meets the deep storm gray, capturing a sense of conflict and interaction between emotions. Broken pixels introduce intentional imperfections that suggest scars, adding depth to the narrative without losing the abstract essence.</desc>
