<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">The emotional tone juxtaposes warm, vibrant colors representing desire against muted, colder shades symbolizing restraint. The palette of hot coral and blood orange dominates the border, creating a saturated pulse, while the cooler hollow blue and charcoal contrast within the center, ensuring a clear boundary yet allowing for visual flow. The main collision occurs at the center, where the desire patterns, depicted through broken dots, intertwine with the muted frame of restraint, illustrating a struggle between liberation and restraint, echoing the themes of love and betrayal.</desc>
