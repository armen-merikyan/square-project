<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Equilibrium</title>
  <desc id="desc">This piece embodies the tension between vulnerability and strength, reflected through a palette of serene and urgent colors. The cool tones of pale aqua and mist gray suggest vulnerability, while the alarming red and ink blue symbolize strength and intensity. The layout plays with two pulses emerging from the center, creating a dynamic collision of emotion that suggests both conflict and cohesion. Broken pixels introduce imperfection, echoing the theme of vulnerability, while the structured flow guides the viewer's eye outward from the center, illustrating the push and pull of emotional weight. The overall arrangement leaves negative space that amplifies the contrasting feelings, making the art a poignant exploration of harmony within contrast.</desc>
