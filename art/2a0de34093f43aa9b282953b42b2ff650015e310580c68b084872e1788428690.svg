<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The emotional tone is derived from the interplay between control and surrender, represented through the tension of dense clusters on one edge bleeding into a lighter, more open space. The chosen palette of ripe green and honey gold evokes a sense of growth and warmth, while deep olive represents pressure. The collision of patterns occurs centrally, mirroring the struggle implied by the seed, with clusters dominating the left side but yielding to quiet areas on the right, illustrating the narrative of pressure giving way to release.</desc>
