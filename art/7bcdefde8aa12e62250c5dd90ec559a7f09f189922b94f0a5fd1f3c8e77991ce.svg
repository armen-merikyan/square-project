<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">The emotional tone reflects the contrast between longing and resolve, using a warm color palette of hot coral and blood orange to depict the tension and dynamic interaction of emotions. The cooler tones of charcoal and hollow blue represent the vastness and quiet distance, emphasizing the struggle for intimacy against the backdrop of emptiness. I arranged the palette to create a central focus in the piece where bright warm tones collide with cool shadows, embodying the push and pull of desire versus stability. The layout employs a center seed approach; the stratified warmth builds outward in stripes, overlayed with flame-like patterns creating an organized chaos that signifies the conflict and resolution inherent to the emotional contrasts. Broken pixels disrupt the gradients, suggesting imperfection and the natural variability of human feelings.</desc>
