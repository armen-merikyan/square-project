<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Worlds</title>
  <desc id="desc">This piece explores the emotional tension between 'awe' and 'terror'. The left side reflects order through a gradient of dark to soft gold tones, symbolizing stability amidst chaos, while the right introduces broken elements and bursts of pale green that evoke feelings of disturbance and unpredictability. The palette, rooted in a 'fear_hope' theme, captures the duality of emotion through contrasting warm and cool tones. Key collisions happen where the clean lines of the active left side intersect with the chaotic right, embodying an unresolved narrative. Overall, the piece suggests conflict and interplay between beauty and fear, perfectly resonating with the seed concepts.</desc>
