  <title id="title">Tension of Sheltered Exposure</title>
  <desc id="desc">This artwork captures the emotional dichotomy between safety and exposure. The palette, featuring warm browns and cool greens, evokes a sense of shelter and vulnerability. The main collision occurs in the lower left corner, where deeper colors suggest pressure, with lighter shades transitioning upward to indicate softness and release. The split vertical layout enhances the sense of divided space, mirroring the push-pull dynamic between protection and exposure, reminiscent of natural textures and disruptions.</desc>
