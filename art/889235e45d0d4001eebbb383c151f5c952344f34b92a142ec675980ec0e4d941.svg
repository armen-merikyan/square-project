<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Contrast</title>
  <desc id="desc">This abstract piece explores the emotional tension between defiance and submission. The palette utilizes vibrant hues like lime and electric blue juxtaposed against the static quality of black, expressing the pulse of defiance within the confines of submission. The conflict radiates from the center, invoking an upward spark against a background of descending, softer tones representing quiet submission. The broken pixels subtly interrupt the flow, resembling scars of conflict. This layout conveys both an empty room of potential and a tightly contained space, symbolizing the struggle between opposing forces.</desc>
