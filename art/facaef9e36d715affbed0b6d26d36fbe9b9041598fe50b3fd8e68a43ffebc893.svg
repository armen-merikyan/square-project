<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone captures the tension between love and betrayal, represented through a stark contrast of warm and cool colors. The palette consists of shades of pink and red to convey warmth and affection, offset by gray and dark maroon, suggesting betrayal and heartbreak. The main collision occurs between the tightly packed warm colors juxtaposed with the emptiness of the cooler shades, inviting reflection on emotional conflict. The abstract pattern plays with the flow from bottom to top, mimicking rising signals clashing with diagonal falls, while broken pixels introduce an imperfection consistent with the theme of fractured connections.</desc>
