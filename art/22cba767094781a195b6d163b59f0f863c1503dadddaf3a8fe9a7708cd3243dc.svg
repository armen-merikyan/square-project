<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Hunger and Restraint</title>
  <desc id="desc">This artwork creates a dialogue between the burst of energy represented by 'spark' and the subdued presence of 'ash'. The left side employs vibrant reds to express hunger and desire through the 'hinge' pattern, creating a visual flicker of excitement. Conversely, the right side adopts deeper black and gray tones to symbolize restraint and memory, structured in 'channels' to convey a settled quality. The jagged edges at the center visually collide, echoing the tension between light and dark, presence and absence. The use of negative space, particularly around the edges, enhances the feeling of restraint, while the central collision signifies the struggle and intersection of opposing forces.</desc>
