<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects the struggle between vulnerability and strength, where the center is pale and exposed, contrasted by stronger boundaries fighting to contain it. The color palette favors soft pastels and muted tones, suggesting a fragile core surrounded by deeper, darker edges. The collision occurs around the center, symbolizing where strength pushes against vulnerability, creating tension. This abstract pattern captures the dynamic and layered emotions indicated by the seed—where desire and emptiness meet in an unresolved, spiraling dance.</desc>
