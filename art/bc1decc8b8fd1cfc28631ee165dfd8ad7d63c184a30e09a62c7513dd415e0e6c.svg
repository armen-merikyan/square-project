  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects the dichotomy of vulnerability and strength, using a palette inspired by guilt and forgiveness. The colors shift from deep wine for strength to soft gold and warm ivory representing vulnerability. The contrast occurs primarily along the center, where the barcode and patchwork patterns collide, creating visual tension. The intentional broken pixels disrupt the symmetry, echoing the seed's themes of vulnerability and strength while maintaining an abstract focus.</desc>
