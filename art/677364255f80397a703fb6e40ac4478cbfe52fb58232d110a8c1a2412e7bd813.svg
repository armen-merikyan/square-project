<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Dissonance</title>
  <desc id="desc">This artwork captures the emotional tone of awe and terror using a palette of electric blue, magenta, lime, and black. The heavily contrasting colors create a visual clash between order and chaos, where structured stripes of awe (in electric blue) meet jagged disruptions of terror (in magenta) that echo throughout the piece. The arrangement flows from the corner, leading the viewer's gaze inward, mirroring the intent of both drawing one in and creating a sense of instability. The split screen effect between soft and sharp edges serves to enhance the underlying tension, representing memory fragmented by time.</desc>
