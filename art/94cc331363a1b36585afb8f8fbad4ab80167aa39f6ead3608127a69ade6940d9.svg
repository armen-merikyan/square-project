<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonance of Dissonance</title>
  <desc id="desc">This artwork embodies a tension between longing and resolve through its color distribution and pattern approach. The palette 'quiet_pressure' combines muted tones like off-white and dust gray, suggesting a background of calm overshadowed by fragments of compressed red that rise like bursts of urgency. The collision of the patchwork pattern representing longing and the hinge pattern of resolve manifests in the central grid, where brighter red edges interrupt the monochrome tones, evoking feelings of repair against damage. The layout resembles falling pixels, creating a serene descent of color while still leaving pockets of negative space, enhancing emotional depth.</desc>
