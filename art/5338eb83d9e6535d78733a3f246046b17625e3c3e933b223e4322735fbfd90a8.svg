  <title id="title">Fractured Signals</title>
  <desc id="desc">This artwork represents the emotional dichotomy of love and betrayal, using a palette that contrasts warm pink and red tones with cold gray and dark maroon. The colors clash and converge, signifying the tension between nurturing affection and painful disillusionment. The layout of rising pixels reflects both hope and an escape from emotional turmoil, while the bottom-weighted structure creates a sense of pressure bearing down. The broken and sharp edges, mixed with soft transitions, mimic the inner turmoil of a lonely signal amidst chaos, evoking a struggle between connection and isolation.</desc>
