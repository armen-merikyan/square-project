<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">The Balance of Tension</title>
  <desc id="desc">This piece embodies the emotional tension between joy and grief through color and arrangement. The left side bursts with warm yellows and oranges representing joy, while the right side features muted purples and deep blues, signifying grief. The clash occurs sharply down the middle, emulating the contrast between order and chaos. The broken pixels introduce imperfection, mirroring the fusion of emotions. The layout creates an empty space around the central dynamic, showcasing the overwhelming nature of both feelings yet maintaining a semblance of balance.</desc>
