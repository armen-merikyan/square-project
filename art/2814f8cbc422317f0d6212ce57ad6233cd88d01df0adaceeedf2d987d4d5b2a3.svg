<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Desire Contained</title>
  <desc id="desc">The artwork conveys an emotional battle between desire, characterized by warm, saturated colors, and emptiness, represented by cool, low-saturation tones. The chosen palette integrates 'hot coral' and 'blood orange' to represent desire, while 'charcoal' and 'hollow blue' symbolize the restraint of emptiness. The main collision occurs in the center, where the warm colors push against the cooler tones, creating a visual tension. The layout follows a diagonal flow, with desire occupying one wedge and emptiness the other. The broken pixels introduce intentional disruptions, mirroring the conflict expressed in the seed, enhancing the overall abstraction without becoming literal.</desc>
