<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Light and Weight</title>
  <desc id="desc">This composition embodies the emotional dichotomy of joy and grief through an 8x8 pixel grid. The top half bursts with spark-like, rounded shapes, represented by warm yellows and oranges, conveying joy as vibrant and uplifting. In contrast, the bottom half is laden with deep blues and muted purples, suggesting grief through horizontal stripes, symbolizing heaviness. The hard edges create a stark division, enhancing the tension where joy and grief collide. The layout emphasizes the battle between brightness and darkness, showcasing the emotional interplay of fragmented hope against enveloping sorrow.</desc>
