<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collisions</title>
  <desc id="desc">This piece reflects the tension between envy and gratitude using contrasting colors that evoke a range of emotions. The palette includes electric blue and magenta for vivid emotional expression, set against deep black for grounding. The central black square represents stillness amidst surrounding chaos, symbolizing internal conflict—envy swirling around gratitude. The arrangement emphasizes a collision between busy patterns evocative of 'teeth' and calm, staggered lines suggestive of 'stairs'. The off-center placement of vibrant colors against a muted backdrop enhances the sense of pressure. Negative space is preserved to allow the viewer to breathe amongst the emotional intensity, creating a narrative that is both chaotic and reflective.</desc>
