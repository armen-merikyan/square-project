<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Shadows and Light</title>
  <desc id="desc">This artwork embodies the emotional tension between fear and hope through its vertical split layout. The left side, dominated by dark colors like black and dark violet, uses harsh crack patterns to evoke fear and confinement. In contrast, the right side introduces a softer palette with pale green and hints of soft gold, creating a feeling of uplift and possibility through broken dots. The use of jagged edges on the left and glimmering elements on the right represents the collision of heavy emotions: the weight of fear against the lightness of hope. The central vertical divide reinforces the struggle between these contrasting states, while the broken pixels add imperfection, reflecting the complexity of motion between emotions. Negative space is carefully preserved to maintain a whisper of calm amid the tension, enhancing the overall sense of balance and unease.</desc>
