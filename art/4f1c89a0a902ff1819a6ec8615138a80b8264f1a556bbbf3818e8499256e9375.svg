  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition explores the emotional contrast between safety and exposure, using a palette that combines warm brown and cool blue to symbolize protection and vulnerability respectively. The layout employs a quiet channel at the center, dividing dense clusters of crack and broken frame patterns, which reflect pressure against vulnerability. The tension arises from the collision of warm colors on one side and cool colors on the other, manifesting a push and pull between the conflicting emotions, echoing the seed's themes of pressure and release.</desc>
