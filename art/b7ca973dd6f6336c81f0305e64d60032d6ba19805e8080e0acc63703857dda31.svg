  <title id="title">Collision of Resilience</title>
  <desc id="desc">This piece contrasts themes of vulnerability and strength, using a palette that represents both shelter and exposure. The colors oscillate between warm browns and cool whites to create tension in the center while leaving negative space around the edges. The main collision is felt in the center, where the brown hues intersect with pale skin tones, suggestive of vulnerability rising against a backdrop of strength. The arrangement of colors creates a spiral effect, emphasizing the journey from exposure to shelter, with broken pixels disrupting the uniformity, representing scars of experience.</desc>
