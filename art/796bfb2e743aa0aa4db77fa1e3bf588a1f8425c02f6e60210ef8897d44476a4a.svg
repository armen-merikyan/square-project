<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This piece reflects the duality of joy and grief, illustrated through a split layout emphasizing color contrast and emotional tension. The left side is infused with bright yellows and oranges to represent joy, forming an expanding, cheerful pattern, while the right side adopts deeper blues and muted purples to communicate the heaviness of grief in a structured checker pattern. The collision occurs along the central dividing line, where warm tones attempt to push against the contrasting cools, creating visual tension. The 'crack' shape seed is abstractly expressed through the boundary, symbolizing the fragility of emotional states. The overall composition balances negative space with intensity, suggesting oscillation between joy and grief.</desc>
