<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">This artwork captures the dichotomy of 'love vs betrayal' through a palette representing warmth (pinks and reds) contrasted with the coolness of gray and dark maroon, reflecting the conflicted feelings. The pattern features a crosshatch denoting love's warmth countered by noise representing betrayal, creating a dynamic tension. The sharp edges contrast the soft hues, enhancing the emotional impact. Negative space is deliberately included, allowing the viewer to breathe amidst the turmoil, with the main collision occurring at the intersection of warmth and coldness, symbolizing the lingering pain and beauty in human relationships.</desc>
