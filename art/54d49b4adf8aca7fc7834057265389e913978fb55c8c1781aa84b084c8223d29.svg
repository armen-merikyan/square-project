<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Conflict</title>
  <desc id="desc">This artwork captures the emotional tension between longing and resolve through the juxtaposition of warm and cool colors. The selected palette of yellow, orange, deep blue, and muted purple evokes feelings of intensity and calm simultaneously. The main collision occurs in the center, where the glitch pattern of longing interrupts the more structured resolve pattern, creating a visual push-pull dynamic. The presence of broken pixels signifies repairs and imperfections, reinforcing the theme of contrasts while retaining a sense of abstract continuity.</desc>
