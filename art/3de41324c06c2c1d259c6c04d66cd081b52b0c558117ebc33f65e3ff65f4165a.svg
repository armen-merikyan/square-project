  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork reflects the emotional duality of vulnerability and strength through color and placement. The aggressive black and electric blue create a stark contrast against softer lime and magenta, positioning strength as a striking outer layer. The wave-like flow of colors symbolizes rising hope while representing the push and pull of emotions. The collision occurs primarily at the center, illustrating the struggle between exposure and protection, while the broken pixels introduce intentional disruptions, mirroring the chaos of emotional experiences.</desc>
