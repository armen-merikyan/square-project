  <title id="title">Tension of Exposure</title>
  <desc id="desc">This artwork captures the emotional duality of restlessness and peace through contrasting colors. The palette's mix of deep blacks and pale blues represents the tension between calming peace and chaotic motion. The main collision occurs in the center, where a balance of pale blue interrupted by dark accents creates both anxiety and tranquility. The edges feature broken frames that echo the restless motion, while patches of color suggest fleeting memories, embodying the evolving nature of experience as opposed to static existence.</desc>
