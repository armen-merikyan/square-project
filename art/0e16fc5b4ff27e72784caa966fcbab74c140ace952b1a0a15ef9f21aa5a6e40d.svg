  <title id="title">Tension Between Layers</title>
  <desc id="desc">The emotional tone contrasts restlessness and peace. The chosen palette of black, electric blue, lime, and magenta teeters between calmness and vibrancy, creating a visual narrative where the darker, more saturated elements represent restlessness, while the subtle highlights suggest moments of peace. The main collision occurs in the center, where pulse marks of electric blue erupt against a backdrop of black, conveying motion fighting against stillness. The seed of 'wound' inspired jagged overlaps and interruptions, manifesting as abstract patterns across the canvas, forming a layered depth that both invites and unsettles.</desc>
