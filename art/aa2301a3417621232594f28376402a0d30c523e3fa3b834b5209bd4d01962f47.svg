<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Colliding Tensions</title>
  <desc id="desc">This composition embodies the emotional duality of softness and severity. The palette of powder pink and sharp crimson creates a visual tension, representing softness and severity, while carbon black and steel gray ground the piece, introducing weight. The thread-like soft patterns emerge from the central region and push against the more rigid islands of dark colors which dominate the edges. The broken pixels serve as intentional disruptions, enhancing the dichotomy of calm versus chaos encapsulated by the seed. The flow from top to bottom emphasizes descent into depth, suggesting a narrative of conflict resolved through forgiveness and acceptance.</desc>
