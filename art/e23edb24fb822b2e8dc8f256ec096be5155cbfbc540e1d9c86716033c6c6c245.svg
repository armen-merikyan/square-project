<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Meets Restraint</title>
  <desc id="desc">This piece embodies the emotional push and pull of desire against the confines of emptiness. The palette features warm coral and orange hues representing desire, contrasting against cooler shades of charcoal and blue that signify restraint. The main collision occurs in the central area, where warm crosshatches disrupt a channel-patterned emptiness, creating a visual tension. This arrangement mirrors the dialogue within the seed, illustrating the struggle between a warm pull and a cold barrier, while maintaining areas of negative space to evoke a sense of longing and interruption.</desc>
