<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This composition explores the emotional tension between joy and grief through a contrasting palette of bright yellows and muted blues, evoking feelings of hope against heaviness. The layout employs mostly empty space, with a concentrated burst of color creating a focal point. The joy is represented by high saturation yellows framed against the deeper, subdued blues symbolizing grief, leading to a push-pull effect in visual balance. Using jagged edges gives a dynamic feel to the piece, while the broken pixels introduce the idea of imperfection and memory, enhancing the emotional intensity of the contrasting feelings.</desc>
