<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece captures the emotional tension between emptiness and desire, using a palette that reflects intense warmth alongside quiet voids. The colors oscillate between saturated pulses of blood orange and hot coral, denoting desire, contrasted with distant, low-saturation hues to represent emptiness. The main collision happens towards the center, where fiery colors push against the cooler and muted tones, creating a dynamic interruption. The contrasting flows of 'flood' versus 'split screen' express an inherent struggle between expansion and containment, highlighting the tension rooted in unmet desires. This is where the form of the piece emerges abstractly from the seed, suggesting conflict without visual representation of the concepts.</desc>
