<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmony in Disarray</title>
  <desc id="desc">This artwork explores the tension between restlessness and peace through a contrasting palette of muted tones and bright accents. The primary palette includes warm reds and oranges that invoke restlessness, while muted cream and grays suggest calmness. The collision is centrally focused, with chaotic patches of scar-like interruptions contrasted against a more serene background, symbolizing calm amidst the chaos. The edge style represents an uneven border, akin to unfinished repairs, allowing the viewer to feel the emotional weight of memory and motion, evoking a lingering sense of unease layered beneath the tranquility.</desc>
