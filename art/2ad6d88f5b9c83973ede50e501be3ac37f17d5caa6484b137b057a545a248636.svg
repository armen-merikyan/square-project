<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissonance in Harmony</title>
  <desc id="desc">The emotional tone oscillates between awe and terror, reflecting an uneven balance. The palette of red, pale blue, black, and white conveys a stark contrast between warmth and cold, stable feelings and dark chaos. The main contrast occurs where the vibrant red intersects with obscure black areas, suggesting moments of tension and release. The placement of soft edges and broken pixels introduces an element of imperfection, echoing the anxiety found in memories. Together, they create a dance of stability against instability, inviting the viewer to linger on the emotional depth.</desc>
