  <title id="title">Fractured Affection</title>
  <desc id="desc">The emotional tone reflects the tension between love and betrayal, using a palette of pinks and grays to symbolize warmth clashing with coldness. The contrast is primarily between the warm (pink, red) and the desaturated (gray, dark maroon). The diagonal flow suggests a rising conflict, with a broken gradient pattern emphasizing the imperfections that represent betrayal. The checker and grid patterns create a visual rhythm that echoes the emotional collision while maintaining a balance of negative space, enhancing feelings of emptiness and tension.</desc>
