<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Perception</title>
  <desc id="desc">The work reflects the emotional tension between nostalgia and progress, utilizing a palette that evokes warmth (burnt orange, gold) and starkness (dark red, charcoal). The top four rows embody nostalgia with soft, flowing patterns reminiscent of rain, while the bottom four contrastingly display the fiery intensity of progress. This split creates a 'drip' effect that subtly interrupts the flow, showcasing the battle of full versus hollow emotions. The broken pixels emphasize imperfection, mirroring the conflict between hope and reality, while maintaining negative space to allow breathing room amidst density.</desc>
