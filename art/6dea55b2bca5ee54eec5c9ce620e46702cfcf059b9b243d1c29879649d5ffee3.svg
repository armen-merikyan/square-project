<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork embodies the psychological duality of vulnerability and strength. The palette features muted tones like off-white and dust gray representing vulnerability, while compressed red and dark navy symbolize strength. The main collision occurs in the center where thick edges meet fainter hues, creating a tension between the two emotional states. The patterns, with strength represented by dense pressure bands at the top and vulnerability through a split screen and lighter tones below, manifest a flow from calm to pressure, echoing the complexities of self-defense and exposure.</desc>
