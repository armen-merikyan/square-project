<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone revolves around the struggle between desire, represented by warm, saturated colors, and the emptiness symbolized by cooler, faint tones. The palette features hot coral and blood orange for desire, contrasted against the deep, subdued hollow blue and charcoal to signify emptiness. The main collision occurs at the center, where warmer tones spiral upward, reflecting an overflowing desire pressing against a muted boundary of cooler shades that echo emptiness and containment. Broken pixels scatter through, introducing intentional disruption and embodying the thematic tension of control versus release.</desc>
