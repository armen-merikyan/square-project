<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transience</title>
  <desc id="desc">This composition embodies the emotional duality of 'longing' and 'resolve.' The warm and earthy palette evokes feelings of nostalgia and depth, while the contrast between dense blocks and empty spaces suggests the push and pull of desire and determination. A central collision occurs where deep wine meets soft gold, symbolizing the tension between chaos and order, as longing infiltrates the steady boundaries of resolve, creating an emotional center that draws the eye and stirs reflection. Broken pixels are scattered throughout, hinting at imperfections and the scars of unresolved feelings, reinforcing the idea of a journey rather than a destination.</desc>
