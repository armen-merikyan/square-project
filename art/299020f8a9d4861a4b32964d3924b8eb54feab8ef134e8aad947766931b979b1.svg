<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork captures the emotional tension between emptiness and desire, manifested through a juxtaposition of saturated hues and expansive negative space. The palette, comprising hot coral and blood orange as accent colors juxtaposed against desaturated charcoal and hollow blue, illustrates a warm pull towards fulfillment contrasted by a cool sense of containment. The main collision occurs through dense dot patterns representing desire that interact dynamically with the grid elements surrounding them, evoking a sense of yearning constrained by external boundaries, enhancing the overall narrative of restraint and hunger.</desc>
