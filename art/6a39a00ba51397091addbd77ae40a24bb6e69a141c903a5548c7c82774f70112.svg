<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork embodies the emotional duel between rage and calm. The left half features a chaotic array of deep reds and blacks, suggesting anger and explosive pressure, while the right half presents softer blues and whites, creating a tranquil space. The palette deliberately contrasts warm tones associated with rage against cooler, more serene hues. The main collision occurs at the vertical center, where the jagged, chaotic red patterns meet the soft, horizontal blue textures, symbolizing the tension between containment and overflow. Broken pixels are incorporated to reflect imperfections and disruptions, enhancing the emotional complexity of the piece.</desc>
