<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">This composition expresses the emotional collision between emptiness and desire, utilizing a stark palette of navy, black, white, and dim cyan to create a balance of pressure and quiet. The outer frame represents the theme of protection with soft, dark hues, while the inner core contrasted with rhythmic stripes of white breaks the tone, invoking desire. The slight gaps introduce negative space, allowing the colors to breathe and play off one another, creating an echo of emotions. The flow spirals counterclockwise, mirroring the shifting dynamics of these feelings.</desc>
