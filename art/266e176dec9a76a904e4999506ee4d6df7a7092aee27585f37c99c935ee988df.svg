<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Stripes of Emotion</title>
  <desc id="desc">This piece captures the tension between panic and control through contrasting color placement and pattern interplay. The dark palette suggests depth and fear, while soft gold introduces a glimmer of hope amid the chaos. The split-screen design represents control, rhythmically intersected by radial elements that evoke panic, creating a conflict where the center glows against darker edges, creating a visually striking collision. The broken pixels introduce imperfection to reflect the unpredictability of emotion, while the negative space allows breathing room, symbolizing the transition from chaotic thoughts to serene clarity.</desc>
