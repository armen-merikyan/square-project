<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">The emotional tone juxtaposes the tension of restlessness against the tranquility of peace. I used a palette that balances soft colors like pale mint and soft sky against deeper storm gray and near black, representing the heavy weight of unrest. The main collision of emotion manifests at the center where the checker pattern of peace clashes with the erratic embers of restlessness. The layout emphasizes the encroaching chaos from the edges into a restrained core, creating a visual narrative of struggle against limits, colored by memory and motion.</desc>
