<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Currents</title>
  <desc id="desc">This piece captures the emotional dichotomy of longing and resolve. The muted creams symbolize warmth and yearning, contrasted against the stark iron gray that denotes firmness and stability. The arrangement features a scattered repair layout that disrupts visual harmony, as longing (represented by a barcode pattern) collides with the hinge-like structure of resolve. Broken pixels introduce imperfections, expressing moments of fragility amidst the strength of resolve. The main visual contrast occurs centrally, where these two emotional paths intersect, creating a dynamic tension that encapsulates the themes of intimacy and distance.</desc>
