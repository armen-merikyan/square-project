<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Light</title>
  <desc id="desc">This composition reflects the emotional tone of fear and hope through a deliberate contrast of jagged edges and soft glows. The palette of black, dark violet, soft gold, and pale green conveys an interplay of darkness and illumination, representing fear as shadowed corners emerging from deeper hues, while hope radiates through lighter accents. The square employs a diagonal layout that embodies 'corner invasion,' with darker tones occupying one side, bursting forth with golden highlights that create a sense of uplift. The crosshatch pattern against a mirrored background suggests an echo of emotions, maintaining tension while leaving enough space for light to penetrate, creating an abstract story of struggle and resilience.</desc>
