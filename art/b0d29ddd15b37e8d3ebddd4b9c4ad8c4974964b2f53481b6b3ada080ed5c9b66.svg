<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This abstract piece explores the emotional tension between control and surrender. The chosen palette of burnt orange, dark red, charcoal, and gold reflects warmth paired with shadows, representing the struggle between a saturated pull and a locked border. The central collision of warm oranges sharply contrasts with darker edges, creating a visual narrative of pressure overwhelmed by the desire to break free. The ripple pattern used for both emotions introduces rhythmic overlap, while broken pixels introduce imperfection, symbolizing the nuances of each emotional experience.</desc>
