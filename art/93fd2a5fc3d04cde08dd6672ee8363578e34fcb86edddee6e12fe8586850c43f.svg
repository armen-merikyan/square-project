<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork captures the emotional tension between rage and calm. The bright reds represent the explosive energy of rage, while the cool blues suggest the tranquility of calm. The layout creates a spiral flow that evokes pressure from both emotions, with sharper jagged edges colliding into softer horizontal bands. The use of broken pixels adds intentional disruptions, symbolizing the dissatisfaction of containment juxtaposed against the urge to overflow. The color choices were made to reflect this internal conflict, specifically through the palette of red, black, pale blue, and white—each serving to emphasize the dynamic feelings of intensity and quietness.</desc>
