<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Isolation</title>
  <desc id="desc">The emotional tone is rooted in the tension between loneliness and connection. The chosen palette of burnt orange and dark red represents the deep, ancient fire of isolated feelings, while charcoal and gold introduce an element of connection—sparks glowing in the dark. The top half uses harsh contrasts and dense areas with familiar split-screen patterns to depict loneliness, while the bottom half introduces interwoven stripes suggesting connection, spaced apart to invoke the idea of connection across a chasm. The collision happens at the center, where the weight of the upper half meets the lighter, brighter lower half, creating a sense of tear or rupture. Overall, the composition embodies a struggle between feeling hidden and the desire to burst through the isolation.</desc>
