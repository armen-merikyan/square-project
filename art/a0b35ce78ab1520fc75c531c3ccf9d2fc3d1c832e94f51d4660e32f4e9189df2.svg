<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">This artwork captures the emotional tug of war between panic and control. The palette of electric blue and magenta introduces a vibrant contrast to the deep black, embodying the chaos of panic. The left side leverages a maze pattern to represent control, while the right side erupts with jagged sparks reflecting uncontrolled emotion. The palette choice enhances the overall narrative of conflict, with colors clashing around a central void implying a hole or absence—a metaphor for unresolved feelings. The asymmetry suggests a battle not easily reconciled, with sections of calmness interrupted by frenetic bursts. The broken pixels are scattered to reinforce imperfection and instability, aligning with the chaotic nature of the seed.</desc>
