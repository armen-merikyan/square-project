<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">This composition captures the duality of joy and grief through a palette of warm yellows and oranges juxtaposed with deep blues and muted purples. The symmetrical layout is disrupted by subtle breaks, reflecting emotional tension. Waves of color flow vertically, symbolizing rising joy contrasted by the heavy, horizontal presence of grief. The use of stripes on one side contrasts with a flame-like pattern on the other, achieving a visual echo of expansion and constriction, while the jagged edges enhance the sense of brokenness and interruption.</desc>
