<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This abstract piece embodies the emotional tensions between safety and exposure. The palette incorporates muted greens and browns to represent shelter, alongside cool whites and blues to signify exposure. The dominant green ripples upwards, symbolizing a push towards safety, contrasted with harsh white echoes that disrupt the flow, reflecting exposure’s inherent instability. The collision at the center emphasizes a tug-of-war between these emotions, while allowing negative space to breathe and enhance the sense of tension.</desc>
