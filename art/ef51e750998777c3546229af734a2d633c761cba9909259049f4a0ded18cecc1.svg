  <title id="title">Exposure Encased</title>
  <desc id="desc">The emotional tone contrasts the safety of a warm barrier against the vulnerability of exposure. The palette employs soft greens and earth tones to suggest shelter, while pale and cold colors signify openness. The central collision occurs with the stark division between the warm brown and the cold white, representing the thin, fragile boundary of safety versus exposure. This duality reflects the seed's themes through fluctuating patterns of dots and floods, capturing the push-pull of shelter in a rough world.</desc>
