<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Dichotomy</title>
  <desc id="desc">This piece embodies the tension between joy and grief, illustrating their coexistence through color and placement. The joyful elements emerge in warm, bright hues from the top, reflecting expansion and openness. In contrast, deeper blues at the base embody heaviness and subtle rot, suggesting sorrow and weight. The lack of outlines blurs the boundary between these emotions, emphasizing the flow and pulse of feelings. Broken pixels introduce an element of imperfection, reminiscent of emotional scars, while the overall layout forms a visually engaging descent, merging joy and grief in a symphony of contradiction.</desc>
