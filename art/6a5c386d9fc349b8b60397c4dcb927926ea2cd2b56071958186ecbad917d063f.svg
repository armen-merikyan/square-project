<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone of this artwork reflects the tug-of-war between defiance and submission. The palette of red oxide, blackened plum, muted cream, iron gray, and small orange provides a stark contrast between heavy hues of resistance and lighter shades that evoke softness. The use of broken pixels introduces interruptions in patterns (a glitch effect) that mirror the chaotic interplay of emotions. The conflict centers in the middle, where dense clusters of dark colors coalesce, interrupted by bursts of light, representing the friction between the two states. This captures the essence of the seed, transforming literal concepts into an abstract exploration of emotional complexity.</desc>
