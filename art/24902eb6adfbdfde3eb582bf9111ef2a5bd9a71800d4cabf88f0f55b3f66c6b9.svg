<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Amidst Calm</title>
  <desc id="desc">The emotional tone conveys a battle between restlessness and peace, represented through contrasting colors and placement. The palette combines vibrant hot coral and blood orange with muted charcoal and hollow blue, creating a dynamic yet soothing display. Main contrast occurs along the diagonal, where restless 'stairs' patterns clash with the tranquil 'ash field', directing visual flow and indicating unresolved motion. The broken pixels introduce imperfection, echoing the seed's theme of 'flame against shatter', thus portraying a narrative of tension and balance.</desc>
