<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone embodies a tension between 'safety' and 'exposure'. The warm browns and soft greens symbolize safety and shelter, while cool whites and open blues reflect exposure and vulnerability. The center contains a pale skin tone, acting as a vulnerable focal point that can either be sheltered by warm colors or overwhelmed by cooler tones on the right. This pattern suggests a conversation between softness and severity, indicated by the rising flow from bottom to top, stirring feelings of hope amidst pressure. The layout emphasizes vertical movement while broken pixels introduce an element of disruption, capturing the fragility of safety against the relentless nature of exposure.</desc>
