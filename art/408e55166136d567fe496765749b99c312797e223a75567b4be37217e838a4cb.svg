<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Surges</title>
  <desc id="desc">This composition captures the emotional tension between desire and emptiness. The palette, featuring hot coral and blood orange, signifies the strong pull of desire, while charcoal and hollow blue illustrate the vast emptiness. The warm tones flow towards a center of contrast, interrupted by cooler edges, emphasizing a structured yet eroded symmetry. The clustered colors create a sense of dense pressure, while the quiet blocks of emptiness enhance the overall feeling of restrained yearning. The broken pixels add intentional imperfections, suggesting disruptions in an otherwise orderly space.</desc>
