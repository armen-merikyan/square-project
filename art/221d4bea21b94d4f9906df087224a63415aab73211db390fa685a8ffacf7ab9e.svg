<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos Within Control</title>
  <desc id="desc">This composition embodies the tension between panic and control, balancing dark, muted tones with sporadic brighter sparks to create a sense of unease and uncertainty. The chosen palette, 'broken_memory', enhances the emotional dichotomy through warm sepia tones juxtaposed against cooler faded blues. The central heavy edge aligns with a dense lower layer, which contrasts with lighter spots, symbolizing fleeing moments of control amidst overwhelming chaos. The layout offers a corner invasion, suggesting the encroachment of panic, while breaks in color represent the inherent instability of these emotions.</desc>
