<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow and Containment</title>
  <desc id="desc">This piece explores the emotional tension between desire and restraint through a contrasting palette. The warm hues of hot coral and blood orange represent the pull of desire, creating a spiral pattern that emanates from the center. Simultaneously, the cooler notes of charcoal and hollow blue form a 'lattice' structure that restricts and contains the warmth at the edges. The main contrast occurs in the central diamond shape, highlighting the collision of warmth and coolness, embodying the struggle between expansive longing and constrained boundaries. Broken pixels disrupt the flow, suggesting imperfections in the emotional experience, enhancing the complexity of this abstract piece.</desc>
