<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Tension</title>
  <desc id="desc">This artwork embodies the emotional tension between defiance and submission. The chosen palette of black, dark violet, soft gold, and pale green evokes a sense of fear and hope. The contrast is highlighted by jagged edges that represent collisions of feeling, surrounded by soft curves suggesting areas of release. The central square frame offers a focal point that heightens pressure from the contrasting patterns: stripes representing defiance and stairs symbolizing submission. The arrangement creates flow throughout the piece, signaling a pulse that oscillates between rigid and yielding, reinforcing the theme.</desc>
