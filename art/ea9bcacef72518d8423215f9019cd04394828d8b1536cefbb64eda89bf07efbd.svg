<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition captures the tension between connection and loneliness through a strategic use of color and pattern. The palette of navy, black, and dim cyan evokes a sense of isolation tempered by specks of muted light, symbolizing fleeting connections. Main contrasts arise from the densely clustered 'dots' of loneliness in the center, against the spacious, sparse 'broken_dots' at the edges, which signifies attempts at reaching out. The imperfect edges and broken pixel elements create a sense of roughness and tension, merged with a quiet pulse that mirrors the push and pull of emotional experiences evoked by the seed.</desc>
