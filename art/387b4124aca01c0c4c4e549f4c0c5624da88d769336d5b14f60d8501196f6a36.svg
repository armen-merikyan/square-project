<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Exposed Strength</title>
  <desc id="desc">This composition embodies the emotional dichotomy between vulnerability and strength. The chosen palette of dark maroon, red, gray, and pink evokes feelings of passion, tension, and fragility, creating a narrative of exposure and protection. The strong dark colors anchor the design, while lighter shades peek through, representing vulnerability. The main contrast occurs in the central area, where dense 'island' shapes meet jagged 'teeth' patterns, creating a dynamic interplay that invites movement and emotion. This interplay between calm (negative space) and density offers a glimpse into the theme of sheltering strength amidst exposure.</desc>
