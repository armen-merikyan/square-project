<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">The emotional tone juxtaposes longing with a sense of resolve, illustrated through a palette of burnt orange and gold against dark red and charcoal, embodying both warmth and depth. The collision occurs centrally, as bright thread-like patterns of longing weave through segmented shards of resolve, creating a dynamic visual tension. This interplay reflects both the desire for connection and the strength of boundaries, while broken pixels disrupt the flow, indicating the imperfections of these emotions. The layout favors a small, active bright cluster amidst a darker backdrop, mirroring the essence of a last light against the night.</desc>
