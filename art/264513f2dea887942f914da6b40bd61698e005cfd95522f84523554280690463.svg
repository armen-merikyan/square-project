<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone balances between vulnerability and protection. The palette employs a soft green and warm brown to represent safety, while pale skin tones and open blue invoke exposure. The main contrast arises in the center, where densely packed colors collide, illustrating the tension between pressure and release, symbolizing the struggle of safety enveloping a fragile core. The layout leads from the corner, enhancing the feeling of invasion and encroachment, while subtly incorporating broken pixels for imperfection, suggesting the complexity of sheltering an exposed center.</desc>
