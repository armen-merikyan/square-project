<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tenderness and Rage</title>
  <desc id="desc">The emotional tone juxtaposes the softness of tenderness against the explosive energy of rage. The selected palette moves between deep reds and muted tones in pale blue and black, encapsulating the tension between high saturation and calm. The main collision occurs in the top left corner with jagged, static expressions of red overlaid on gentle blue fields, creating a visual representation of anger breaching protected spaces. The broken frame pattern of tenderness provides contrast against the symbolically sharp aspects of rage, crafted from the essence of the seed.</desc>
