<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone of this artwork encapsulates the tension between love and betrayal, mirrored through the warm hues juxtaposed with darker tones. The palette, with its soft pinks and deep maroons, evokes warmth and intimacy alongside a sense of sadness and fracture. The upper four rows represent love, featuring softer, lighter shades that flow seamlessly, suggesting connection and warmth. Conversely, the lower rows embody betrayal with darker and more chaotic colors, introducing broken pixels that visually disrupt the symmetry. The contrast lies in the split horizontal layout: the loving warmth of pinks and reds collides with the harsher, colder grays and dark maroon, representing an emotional landscape that is both soothing yet tumultuous. The arrangement highlights the heartbreak of the heart fragment, underscoring the theme of a corrupted mirror image.</desc>
