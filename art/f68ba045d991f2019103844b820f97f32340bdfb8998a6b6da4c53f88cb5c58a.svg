<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Scattered Repairs</title>
  <desc id="desc">This composition explores the emotional tension between vulnerability and strength. A delicate pale blue serves as the exposed center, representing fragility and unshielded light. The surrounding darker colors—black and deep red—create a protective frame, emphasizing strength and stability. The contrast occurs primarily in the center, where vulnerability floods into the strength from the edges, but is interrupted by bright patches representing moments of clarity or connection amid a backdrop of chaos. The layout embodies scattered repair, with broken pixels representing cracks in the facade, making the overall feel dynamic yet fractured.</desc>
