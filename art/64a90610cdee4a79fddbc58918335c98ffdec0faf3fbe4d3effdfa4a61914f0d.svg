<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs. Shelter</title>
  <desc id="desc">This artwork embodies the emotional tension between vulnerability and strength, expressed through a stark contrast of colors and patterns. The selected palette of burnt orange, dark red, charcoal, and gold suggests warmth and resilience but also discomfort and exposure. The central area features the soft, wave-like 'tide' pattern representing vulnerability, while the rigid 'patchwork' pattern of darker tones surrounding it symbolizes strength. The primary collision occurs at the center, where soft curves meet jagged edges, creating a tension that represents the struggle between feeling sheltered and exposed under pressure. This arrangement encourages viewers to contemplate their own experiences of vulnerability balanced against resilience.</desc>
