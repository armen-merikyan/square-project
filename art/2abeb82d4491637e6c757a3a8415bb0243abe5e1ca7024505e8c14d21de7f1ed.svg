<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone captures the conflict between desire and restraint, represented through a balance of warm and muted colors. The palette mixes vibrant reds and oranges for desire with deep purples and grays for restraint, creating contrasting pulls. The collision occurs diagonally, with vivid colors spilling into the muted space, evoking a sense of tension and push-pull while maintaining the integrity of the 8x8 grid. The patterns of crack and threshold create an irregularity that suggests motion, echo, and interruption, honoring the seed's themes without literal representation.</desc>
