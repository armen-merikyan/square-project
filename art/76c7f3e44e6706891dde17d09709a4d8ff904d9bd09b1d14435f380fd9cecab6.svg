<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone navigates between vulnerability and strength, creating a dynamic interplay of texture and contrast. The color palette of warm coral and cold slate contrasts soft amber against a foundation of blue-black, symbolizing tension and relief. The small central form, representing vulnerability, is enveloped by stronger radial patterns of strength. This juxtaposition delivers an overall sense of exposure shielded by boundary, while the intentional placement of broken pixels introduces imperfection, enhancing the theme of vulnerability against strength's assertiveness. The main contrast occurs in the central third of the square, where the light colors meet darker tones, creating an interrupted flow and visual collision that resonates with the seed's narrative.</desc>
