<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition captures the emotional dichotomy of rage vs calm through color and pattern. The chosen palette of deep blacks and vibrant reds embodies the intensity of rage, while pale blues and whites suggest a calming presence. The main collision occurs in the center, where jagged, scar-like patterns of red clash against soft, rain-inspired cool fields of blue, illustrating the struggle between intense emotion and serene tranquility. The broken frames create intentional disruptions, symbolizing leaks of emotion and the complexity within the human experience.</desc>
