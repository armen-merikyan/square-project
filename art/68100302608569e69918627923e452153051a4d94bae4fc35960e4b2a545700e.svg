<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Contrast</title>
  <desc id="desc">This piece evokes the emotional pull between emptiness and desire through a zigzag of colors echoing warmth and depth. The palette combines the fiery tones of hot coral and blood orange to represent desire, contrasted with the muted edges of charcoal—a metaphorical boundary. The collision occurs through a spiral arrangement that draws the eye toward the center, where the most vibrant colors refuse to escape a restrained black frame. The broken pixels suggest a roughness in a seemingly flawless attempt to connect emotional states, intertwining softness and harshness.</desc>
