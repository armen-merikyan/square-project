<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition explores the emotional tension of desire conflicting with the feeling of emptiness. The palette blends warm hues like hot coral and blood orange, representing desire, with cooler shades such as charcoal and hollow blue that embody emptiness. The central collision occurs in the fourth and fifth rows, where the vibrant and muted colors intersect, creating a visual narrative of a saturated pull (desire) trying to breach a firm boundary (emptiness). The patterns of flame and checker interlace throughout the grid, enriching the conflict. Broken pixels add intentional disruptions, echoing the imperfect nature of these emotions. The negative space maintains a sense of calm amidst the chaos, preserving the grid's readability while hinting at the quiet pressure underlying the piece.</desc>
