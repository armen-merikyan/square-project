<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Signals</title>
  <desc id="desc">The emotional tone combines the clarity of 'signal' with the confusion of 'noise.' The chosen palette of navy and black contrasted by bright white and dim cyan reflects this duality. The top half embodies the clear, readable rhythm of the signal using a vertical barcode pattern, while the bottom half, in chaotic static, represents interference, interspersed with quiet spaces that interrupt the flow. The main collision occurs at the boundary between these two halves, heightening the contrast and suggesting the tension between clarity and confusion.</desc>
