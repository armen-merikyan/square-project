<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Fire and Dust</title>
  <desc id="desc">The artwork reflects the emotional dichotomy of spark and ash, symbolizing hope and decay. The color palette balances muted tones of stone gray and bone white with vibrant accents in rust and small gold. This contrast is positioned centrally, where the sparks (brighter colors) interrupt the softer ash fields, creating tension in the middle while maintaining negative space periphery. The diagonal flow reinforces movement from bottom left to top right, echoing the struggle between awakening and settling.</desc>
