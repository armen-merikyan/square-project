<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Resilience</title>
  <desc id="desc">The emotional tone represents a tug-of-war between vulnerability and strength, illustrated through the collision of cool, deep colors that signify strength against brighter, lighter colors suggestive of vulnerability. The palette embodies this struggle: deep blacks anchor the piece, while electric blue and magenta highlight sparks of tension in the center. The main contrast occurs at the center where the layering of patterns (tide vs. crosshatch) creates a dense yet fractured texture, reflecting the push and pull of exposure and protection. The impact of the seed is felt through the diagonal flow that invites the viewer's focus yet provides space for reflection, embodying the complexity of connection and alienation.</desc>
