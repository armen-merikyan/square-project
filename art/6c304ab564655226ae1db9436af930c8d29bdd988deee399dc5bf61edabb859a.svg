<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tension</title>
  <desc id="desc">This piece captures the emotional tension between softness and severity, represented through a palette of warm pink and stark black. The warm white serves as a bridge between densely packed dark hues, suggesting a flickering light amidst the weight, while sharp crimson offers stark punctuation against an otherwise muted background. The layout opens up at one end to suggest an emerging energy, embodying the flow of pressure and release. The split-screen pattern reinforces the juxtaposition of severity on one side and gentleness on the other, with broken pixels added to evoke imperfection and tension in the composition.</desc>
