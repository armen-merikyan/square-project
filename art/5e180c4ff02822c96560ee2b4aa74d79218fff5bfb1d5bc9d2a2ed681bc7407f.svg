<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Shadows and Light</title>
  <desc id="desc">This piece explores the emotional duality of fear and hope through its contrasting dark and light palette. The colors chosen are black and dark violet representing fear, juxtaposed with soft gold and pale green symbolizing hope. The central area is dense with darker colors, creating a feeling of pressure and weight, while the lighter colors emerge at the periphery, suggesting upward movement and potential. The pattern mimics a crosshatch flow, creating tension that echoes the struggle between pressure and release, embodying the seed's themes without depicting literal forms.</desc>
