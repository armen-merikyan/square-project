<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Shelter</title>
  <desc id="desc">The emotional tone centers around the tension between safety and exposure, captured through a palette of muted greens and browns that symbolize shelter and warmth, countered by pale whites and open blues denoting exposure. The pattern interplay resembles a split-screen, with one side (safety) denser and layered, while the other (exposure) remains lighter and more fragmented. The main contrast occurs in the center where the warm brown meets cold white, emphasizing a border of protection versus openness. The piece embodies the complexity of emotional states, with a deliberate collision point guiding the eye and echoing the concepts of pressure and release.</desc>
