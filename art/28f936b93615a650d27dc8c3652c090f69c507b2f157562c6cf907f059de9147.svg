<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Calm and Chaos</title>
  <desc id="desc">The artwork captures the emotional dichotomy of restlessness and peace through a palette suggesting hope (soft gold, pale green) clashing against darker tones (black, dark violet). The arrangement emphasizes a diagonal argument that fosters movement, as if the lighter colors fight against the oppressive dark. The patterns of quiet fields and veils merge and collide around the center, creating an abstract pulse that represents memory and motion. Broken pixels were integrated to disrupt the harmony, enhancing feelings of tension, while leaving intentional negative spaces to encapsulate moments of calm amidst chaos.</desc>
