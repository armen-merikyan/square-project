<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erosions of Emotion</title>
  <desc id="desc">This piece captures the tension between tenderness and rage through a palette that reflects inner conflict. The use of deep blacks interspersed with soft pale blues and stark whites creates a dramatic contrast that embodies emotional collision. The layout features jagged edges symbolizing rage on one side, while smoother, partial patterns represent the softness of tenderness, suggesting a narrative of conflict and resolution. The main contrast occurs in the center with a burst of white against black—this collision reflects the push and pull of guilt and forgiveness, creating a rhythmic climb towards emotional release.</desc>
