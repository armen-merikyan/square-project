<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Desire</title>
  <desc id="desc">This piece embodies the tension between desire and emptiness through the use of warm and cool tones clashing throughout. The palette of burnt orange, dark red, charcoal, and gold reflects both warmth and desolate spaces, with their placement symbolizing the push-pull of aspirations and the void. The contrast between dense clusters of warm colors and cooler areas creates a sense of rhythmic movement from left to right, while the hard edges emphasize the boundary between conflicting emotions, echoing the theme of a lonely signal amidst chaotic noise.</desc>
