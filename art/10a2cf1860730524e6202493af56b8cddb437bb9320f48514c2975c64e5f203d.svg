<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This artwork explores the contrast between fear and hope through a split vertical layout. The outer rows embody a dense, encroaching darkness, highlighting fear with jagged, maze-like patterns in darker colors. Light penetrates the center, symbolizing hope, with a small burst of soft gold to suggest upward flow and rising energy. The palette of dark violet, black, and soft gold emphasizes a shift from heavy to light, creating an emotional tension that speaks to the balance of fear and hope within. The jagged edges and glowing accents provide a contrast that narrates a story of inner struggle against the backdrop of safety and potential.</desc>
