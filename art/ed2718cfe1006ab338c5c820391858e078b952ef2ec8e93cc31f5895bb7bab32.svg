  <title id="title">Locked Longing</title>
  <desc id="desc">This piece embodies the emotional push and pull between desire and restraint. The palette features hot coral and blood orange to evoke strong feelings of passion and longing, while the muted charcoal provides contrasting restraint. The pressure band pattern symbolizes the struggle against boundaries, manifesting in the grid-like arrangements of the brighter colors versus the locked muted tones. The main collision occurs in the center, where the bright cluster of saturated colors meets the darker edges, suggesting a desperate reach for freedom amidst confinement.</desc>
