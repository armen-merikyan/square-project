<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall</title>
  <desc id="desc">This composition captures the emotional tension between envy and gratitude through a contrasting palette. Warm yellows and oranges reflect gratitude, while deep blues and muted purples express envy. The upward movement of colors symbolizes hope, while the downward shifts suggest heaviness. While maintaining a soft edge style, broken pixels create imperfection, echoing the complexities of emotion. The layout shies away from literal representation but instead invites a visceral response to the quiet versus tense dynamics conveyed through the arrangement.</desc>
