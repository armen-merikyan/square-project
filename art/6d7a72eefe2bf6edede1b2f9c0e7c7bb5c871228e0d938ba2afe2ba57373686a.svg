<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Poise</title>
  <desc id="desc">This piece embodies the emotional tension between defiance (on the left) and submission (on the right). The palette of black, red, pale blue, and white represents this dynamic, with red signifying defiance and the cooler tones symbolizing submission. The left side utilizes bold, jagged stripes to echo the defiant nature, while the right side features soft broken dots, portraying a sense of fragility. The central weight is emphasized by denser clusters towards the bottom, suggesting a push and pull between opposing forces. The colors collide in sharp contrast, creating a rhythm of tension and release, reflecting the complex nature of interpersonal relationships captured in the seed text. The composition embraces a center-heavy design with significant negative space to allow emotions to resonate without feeling overwhelmed.</desc>
