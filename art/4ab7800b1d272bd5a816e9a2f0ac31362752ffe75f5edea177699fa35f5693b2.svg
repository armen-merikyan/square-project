<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of restlessness and peace, evoking a gentle pulse against an uneven rhythm. The chosen palette—soft aqua, misty gray, vibrant red, deep ink blue, and clear white—reflects serenity and urgency, suggesting a delicate balance. The placement of colors forms an interrupted diagonal, emphasizing contrast with patches of tranquility colliding against restless, erratic accents. The corner invasion layout creates a sensation of spreading unease while leaving space for calmness to resonate, highlighting the layered narrative of exposure against shelter. Broken pixels disrupt the flow, adding texture and imperfection, symbolizing the scars of memory against the backdrop of motion.</desc>
