<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Desire Constrained</title>
  <desc id="desc">This piece embodies the tension between desire and emptiness through a core palette of warm corals contrasting against cool, muted charcoals and blues. The emotional tone captures a feeling of hunger pushing against a faint perimeter, with warmer colors occupying the central area while cooler shades provide the borders, emphasizing the desire's reach towards containment. The placement of colors suggests a dynamic push-pull interaction, with the higher density of warm hues symbolizing desire, and their encroachment toward the cooler areas signaling the struggle against restraint. Broken pixels add intentional imperfection, echoing distractions and interruptions in this emotional flow, creating a balance between colliding warmth and quietness.</desc>
