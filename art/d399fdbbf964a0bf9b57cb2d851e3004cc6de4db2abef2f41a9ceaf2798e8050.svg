<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Between Boundaries</title>
  <desc id="desc">This artwork embodies the emotional tension between defiance and submission through sharp contrasts and broken patterns. The chosen palette of cosmic indigo, void black, star white, cold gold, and deep teal represents the struggle, where cold gold serves as an accent against the darker hues, suggesting peaks of resistance. The chaotic, glitch-inspired pattern in the center disrupts the orderly, stacked defiance, representing the push and pull of the two emotional opposites. Broken pixels add a sense of imperfection and disruption, while maintaining a mostly controlled structure, allowing quiet black spaces to breathe between dense clusters. The layout's unfinished border suggests an ongoing battle, with emotions leaking through in waves.</desc>
