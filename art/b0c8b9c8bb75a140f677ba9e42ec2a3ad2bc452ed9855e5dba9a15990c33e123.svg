<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Bursting Duality</title>
  <desc id="desc">The emotional tone reflects the tension between fear and hope, utilizing dark and light contrasts to create a vivid narrative. The chosen palette combines deep blacks and dark violets to represent fear, interspersed with soft golds and pale greens that embody the essence of hope. The main contrast emerges in the center, where lighter tones disrupt the darker edges, suggesting a burst of emotion. The concept of 'burst' is mirrored through a flame-like pattern of hope against the jagged edges of fear, merging into a unique interplay of feelings. The vertical split reinforces the duality, while allowing room for quiet negative space along the edges.</desc>
