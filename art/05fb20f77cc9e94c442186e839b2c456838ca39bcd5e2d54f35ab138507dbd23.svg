<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the emotional tension between vulnerability and strength through contrasting color placements. The outer border of deep blues and black represents strength—a dense, protective boundary. In contrast, the inner area utilizes pale yellow and softer greens, symbolizing vulnerability and openness. The collision occurs near the center, where pale hues bleed into the strong frame, suggesting a push against boundaries. The deliberate broken pixels create subtle disruptions in the calm center, echoing the feelings of exposure and fragility, while the overall frame structure ensures clarity and balance. This reflects the delicate interplay between safety and exposure, drawing on the seed's themes of tension and contrast.</desc>
