<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Exposure</title>
  <desc id="desc">This artwork captures the tension between vulnerability and strength through a carefully chosen palette of warm and cool tones that reflect emotional warmth and isolation. The collision between the soft ripple patterns representing vulnerability and the dense noise of the strength forms an engaging dialogue. The central conflict emerges through contrasting placement, where the warm clay colors interlace with cooler blues, suggesting a balance of exposure and protection. The layout is symmetrically eroded; delicate edges deflate into a more powerful core, reflecting the theme of disturbance in stability. The negative space enhances this effect, drawing the eye to the central emotional core.</desc>
