<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This artwork encapsulates the emotional tension between desire and emptiness through a carefully selected palette and structured layout. The primary colors, hot coral and blood orange, represent intense desire and dominate the central area, creating a saturated pulse that resonates outward. In contrast, charcoal and hollow blue evoke feelings of emptiness, forming a lattice pattern that intersperses with crosshatch, symbolizing the struggle of overflow contained within rigid borders. The color arrangement features intentional broken pixels that disrupt symmetric flows, embodying the collision of yearning and restraint, with the edge style emphasizing receding transitions. The dominant area of desire occupies about 65% of the grid, visually communicating the theme of a saturated pull reaching toward unyielding boundaries.</desc>
