<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Centering Tension</title>
  <desc id="desc">The emotional tone captures a struggle between defiance and submission, reflected through the clash of sharp angular patterns against softer, rippling fields. The palette of powder pink, warm white, carob black, steel gray, and sharp crimson represents a balance between softness and severity, where the darker hues dominate to reflect defiance, while lighter colors provide moments of submission. The main contrast occurs at the center, where black sharply disrupts lighter tones, suggesting conflict. This arrangement invites the viewer into a vortex of layered emotions that echo the themes of the seed through texture and color density.</desc>
