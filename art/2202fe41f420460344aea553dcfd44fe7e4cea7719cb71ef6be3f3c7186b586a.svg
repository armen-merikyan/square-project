<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This piece explores the tension between tenderness and rage through a carefully chosen palette of deep reds, soft blues, and stark contrasts of black and white. The layout follows a halo pattern, creating a hollow center that channels rage outward, while softer hues creep in, signifying tenderness. The broken pixel elements disrupt the flow, symbolizing interruptions in emotional states, and creating a visual collision that enhances the feeling of struggle. The dominant color of red represents rage, occupying the outer regions, while pale blues suggest quiet moments breaking through in an otherwise chaotic visual space.</desc>
