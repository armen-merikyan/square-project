<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">The emotional tone explores the struggle between defiance (represented by bright and contrasting colors) and submission (portrayed through softer, muted tones). The chosen palette of quiet pressure includes compressed red and dark navy to emphasize tension against faint peach and dust gray, highlighting the fluctuation between chaos and calm. The collision occurs at the edges, where bold colors infringe upon softer hues, representing an invasion of intense emotion. This layout suggests an inward spiral where the core remains protected amidst the conflict, embodying the seed's essence of contradiction and interaction.</desc>
