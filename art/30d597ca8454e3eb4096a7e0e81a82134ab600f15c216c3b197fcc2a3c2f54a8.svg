<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This piece captures the emotional dichotomy of strength and vulnerability through a balanced palette of soft ambers and coral juxtaposed against cold slates and deep blacks. The central collision of the warm coral, representing strength, contrasts with the surrounding lighter hues reflecting vulnerability. The main contrast occurs at the center, where the tension of strength meets the softness of exposure. The edges carry a subtle darkness, anchoring the vibrant center while allowing for negative space to resonate, illustrating the delicate balance between safety and exposure.</desc>
