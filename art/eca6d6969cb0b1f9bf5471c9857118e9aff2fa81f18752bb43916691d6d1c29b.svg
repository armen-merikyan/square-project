<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Torn Connections</title>
  <desc id="desc">The composition embodies the dualities of loneliness and connection through the stark contrast of a dense center against a sparse outer layer. The palette of black, dark violet, soft gold, and pale green evokes complex emotions—black and dark violet create feelings of isolation, while soft gold and pale green suggest warmth and potential connection. The central area bursts with a concentrated cluster to symbolize hidden energies and tensions, while the outer edges remain jagged and empty, representing the loneliness that breaks into the perceived closeness of connection. This juxtaposition forms an abstract narrative of seeking connection amidst solitude.</desc>
