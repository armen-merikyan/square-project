  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone captures the tension between vulnerability and strength. The palette, featuring soft gold, deep wine, and warm ivory, reflects a contrast of warmth and tension, creating a sense of depth and complex emotion. The main collision occurs in the center where broken dots symbolize the strength and frame the softness of the edges, hinting at vulnerability. In this composition, the layering of colors and patterns creates an echo of both pressure and release, with broken pixels introduced to disrupt perfection.</desc>
