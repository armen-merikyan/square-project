<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">The emotional tone of longing and resolve is represented through the juxtaposition of soft and strong colors. Warm white acts as the light space of longing, while sharp crimson represents resolve, creating a visual tension. The collision happens in the center of the square where the broken dots pattern—symbolizing the fracture of longing—intersects with the quiet field that embodies resolve. The patterns suggest an unresolved motion, with areas of intensity interrupted by muted fields, echoing the narrative of striving against constraints.</desc>
