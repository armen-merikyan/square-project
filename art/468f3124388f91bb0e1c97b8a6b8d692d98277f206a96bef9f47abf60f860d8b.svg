<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">This composition captures the emotional tension of joy and grief through contrasting palettes. The bright yellows and vibrant oranges symbolize joy, arranged in a zigzag pattern that conveys movement and spark. In contrast, the muted purples and deep blues reflect grief, forming a heavier presence around the borders and creating a sense of weight. The collision occurs at the transition points, where bright colors abruptly meet the darker hues, portraying an emotional struggle between lightness and heaviness. The palette was selected to reflect the duality and complexity of the feelings involved, while the negative space maintains a sense of calm amidst the chaos. The seed influenced the central focus of brightness, juxtaposed against a darker framework, amplifying the experience of interconnected emotions.</desc>
