<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience and Remnants</title>
  <desc id="desc">This artwork channels the dichotomy of spark versus ash, using a palette of sharp crimson and soft powder pink to create a tension between vibrant energy and settled quiet. The bold crimson hues collide with the muted gray of carbon black and steel gray, capturing the essence of hunger versus restraint. The inner 4x4 core thrives with channel-like patterns, while broken dot styles punctuate the rigid outer frame, echoing the theme of memory versus erasure. The grid features intentional disruptions from broken pixels, adding an element of imperfection and suggesting resilience amid fragility. The main contrast occurs at the central intersection, showcasing an intense burst of energy against a background of softened ash, embodying both the urgency of a spark and the weight of ashes.</desc>
