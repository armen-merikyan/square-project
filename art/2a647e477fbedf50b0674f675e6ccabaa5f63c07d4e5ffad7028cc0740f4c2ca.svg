<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">This 8x8 pixel artwork embodies the emotional duality between 'trust' and 'suspicion.' The chosen palette features warm tones of hot coral and blood orange to evoke trust, contrasted with deeper shades of charcoal suggesting suspicion. The flow emphasizes a rightward tension where the softer maze-like structures parallel with sporadic pulse marks interrupt each other, representing the struggle between resilience and fragility in both trust and suspicion. The main collision occurs at the right edge, where darker hues spike against brighter colors, creating the illusion of pressure building against a soft background, mirroring the seed's themes of conflict and imbalance.</desc>
