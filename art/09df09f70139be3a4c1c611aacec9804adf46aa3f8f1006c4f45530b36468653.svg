<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This artwork channels the emotional dichotomy of tenderness and rage through color and pattern. The bold blacks and deep reds evoke surge and intensity, while soft pale blues whisper calm and introspection. The dense pixelation in the left corner shows rage's pressure, while the gradual release into lighter hues towards the right hints at tenderness. The interplay creates a dynamic flow, symbolizing the constant struggle between these emotions, while broken pixels introduce an intentional disruption that speaks to vulnerability. This balance and collision reflect the core of the seed, translating its complexities into abstract form.</desc>
