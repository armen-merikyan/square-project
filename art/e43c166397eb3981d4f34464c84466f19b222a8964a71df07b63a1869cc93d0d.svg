<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall</title>
  <desc id="desc">This composition captures the emotional tension of tenderness and rage through a split horizontal layout. The top half, representing tenderness, features soft blues and whites in a ripple pattern, creating a gentle, uplifting flow. In contrast, the bottom half embodies rage with sharp reds and blacks in a patchwork style, evoking a sense of compression and impact. The palette, combining calm blues with intense reds, illustrates the collision of two emotional states, especially at the midline, where the two patterns meet, suggesting an unresolved tension between the emotions. Broken pixels disrupt the flow, adding imperfection and depth, enhancing the dynamics of inner conflict.</desc>
