  <title id="title">Fragile Harmony</title>
  <desc id="desc">This artwork explores the tension between restlessness and peace. The cool colors of rain blue and soft cyan dominate, establishing a serene atmosphere, while the warmer muted plum and lavender gray create interruptions within that space, symbolizing conflict and motion. The outer border reflects a calm peace, while the inner area features restless crosshatch patterns that contrast sharply. The asymmetry of placement and the deliberate broken pixels signify the imperfections of memory and emotion, creating an echo of instability against the stillness of the outer frame.</desc>
