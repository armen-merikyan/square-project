<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Embrace</title>
  <desc id="desc">The emotional tone captures the tension between love and betrayal, using a palette of warm reds and cool grays that signify warmth against coldness. The outer rows represent a chaotic, burning feeling of betrayal, while the inner rows reflect a more muted, softer love, each creating distinct zones that echo contrast. The central focus is disrupted, with sharp edges clashing against softer tones, hinting at a fractured relationship. The main collision occurs at the center, where dynamic patterns echo the struggle between protection and exposure. Overall, the design offers a fragmentary yet balanced exploration of the emotional seed, rendered abstractly through intentional color placements.</desc>
