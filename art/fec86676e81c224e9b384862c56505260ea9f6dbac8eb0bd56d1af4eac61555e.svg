<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Center and Edge</title>
  <desc id="desc">This artwork embodies the emotional tension of 'panic' versus 'control', illustrated through a contrast of colors and patterns. The bright yellows and oranges symbolize the frantic energy of panic, while the deep blues and muted purples express the grounded nature of control. The pattern of radiating stripes from an implied center pushes against darker edges, depicting a struggle between lightness and weight. This duality is defined by the thick outlines that cause a sense of confinement, mirroring feelings of both chaos and calm. This juxtaposition of central brightness punctuated by encroaching darkness suggests an ongoing battle between internal stability and external chaos.</desc>
