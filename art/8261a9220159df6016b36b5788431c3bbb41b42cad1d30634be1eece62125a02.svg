  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition embodies the emotional tension between restlessness and peace through a structured yet dynamic arrangement. The palette of ripe green, acid green, and honey gold signifies vitality and calmness, while deep olive and cream offer contrasting softness, evoking a feeling of balance amidst chaos. The main collision occurs diagonally across the canvas, where vibrant colors clash with quiet backgrounds, representing a memory versus motion narrative. The design respects the quiet channel layout, leaving sufficient negative space that amplifies the sense of potential disruption.</desc>
