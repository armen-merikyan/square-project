<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Realities</title>
  <desc id="desc">The emotional tone is a spectrum between fear and hope, illustrated through a contrast of dark and light colors. The palette of black, dark violet, soft gold, and pale green represents fear's heaviness against hope's glimmering potential. The dominant use of noise and jagged edges reflects the chaotic nature of fear, while the soft gold and pale green stripes suggest moments of hope and light amidst that chaos. The vertical split embodies the tension of opposing emotions, with the main collision occurring at the center where the colors clash, creating a dynamic rhythm. This layout reveals the inner struggle between darkness and light, giving a palpable sense of emotional evolution.</desc>
