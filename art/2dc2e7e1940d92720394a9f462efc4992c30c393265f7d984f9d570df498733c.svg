  <title id="title">Exposure Against Shelter</title>
  <desc id="desc">The emotional tone reflects a tension between vulnerability and protection. The palette combines warm browns and greens to evoke safety, contrasting them with lighter blues and whites to symbolize exposure. The top rows utilize warmer, muted tones representing shelter, while the bottom half features cooler and brighter colors that suggest vulnerability and openness. The primary collision occurs in the middle of the grid, where these contrasting emotional patterns blend and interrupt each other, creating a dynamic visual narrative.</desc>
