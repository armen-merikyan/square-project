<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional contrast between defiance and submission is portrayed through saturated colors at the center and muted tones along the edges. The bold central colors represent defiance, with a chaotic barcode pattern interrupted by floods of quiet color. The choice of mourning_black and deep_blue speaks to heaviness and depth, while pale_yellow brings an accent of hope or energy. The uneven borders evoke a feeling of chaos and uncertainty. This artwork visually narrates an emotional pulse of tension and resolution, as the vibrant middle stands starkly against the subdued periphery.</desc>
