<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Friction and Release</title>
  <desc id="desc">This artwork expresses the tension between defiance and submission through a contrast of colors and patterns. The palette, featuring deep blues and muted purples against vibrant yellows and oranges, captures the complex emotional landscape of joy intertwined with grief. Light and weight are echoed in the contrast between bright and dark hues, where falling pixels represent a dynamic flow from left to right, suggesting movement and conflict. The broken pixels introduce imperfection, underscoring the emotional narrative around love and betrayal while maintaining a balance of negative space, allowing the viewer to contemplate the clash of emotions.</desc>
