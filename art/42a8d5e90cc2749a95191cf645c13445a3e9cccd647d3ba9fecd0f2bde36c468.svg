<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone of this piece contrasts the gentle embrace of softness with the harsh edges of severity. The palette of powder pink and warm white represents softness, while carbon black and sharp crimson evoke severity. The main contrast occurs at the center, where warm colors of pink and white not only overflow but also collide with the cold, dark hues. These interactions reflect a journey from control to chaos, illustrating the tensions inherent in emotions like guilt and forgiveness. The grid creates a structure to highlight moments of noise against signal, embodying both tension and release in the abstract pattern.</desc>
