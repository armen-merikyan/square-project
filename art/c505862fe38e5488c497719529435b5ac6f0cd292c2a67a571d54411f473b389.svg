<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall of Emotion</title>
  <desc id="desc">This artwork encapsulates the emotional tension between control and panic. The chosen palette of deep burnt orange and dark red contrasts with cool charcoal and gold, embodying intensity and quiet at odds. The upward and downward movement of pixels creates rhythmic collisions, illustrating the tumultuous dance of emotion. Patterns of crosshatch represent control while the checker layout depicts panic, creating a visual argument. The hard edges add defined barriers, emphasizing the stark conflict between emotions.</desc>
