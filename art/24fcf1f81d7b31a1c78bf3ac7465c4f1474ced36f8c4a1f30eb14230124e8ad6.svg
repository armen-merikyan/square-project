<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This abstract pixel art encapsulates the contrasting feelings of love and betrayal through a split vertical layout. The left half uses warmer hues (pinks) to represent love, with crosshatch patterns suggesting connection and warmth. The right side employs darker tones (maroon and gray) to convey betrayal, with framed chaotic arrangements that evoke separation and tension. The collision occurs at the center, where the soft transitions of pink hit the harsh edges of darkness. An intentional imbalance creates emotional pressure, with some pixels intentionally corrupted to symbolize broken bonds.</desc>
