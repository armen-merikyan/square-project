<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone is centered around the delicate balance between vulnerability and strength. The palette combines muted tones like off-white and dusty gray to represent vulnerability, juxtaposed with deep dark navy to symbolize strength. The top half of the square represents the vulnerability aspect through shatter patterns, creating a contrast in texture, while the bottom half channels strength through glitch patterns, introducing a sense of rhythm and control. This results in a central collision of pressures where the patterns meet, representing a space of emotional tension and reflection.</desc>
