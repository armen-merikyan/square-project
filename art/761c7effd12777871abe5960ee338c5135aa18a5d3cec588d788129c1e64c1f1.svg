<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">This artwork captures the emotional tension between panic and control through a palette of dark and light colors. The navy and black represent heavy chaos, while the dim cyan and white act as small sparks of order and clarity. The placement of colors creates a visual wave, reflecting the push and pull of emotional states, with stark collisions between dark and bright pixels to create a feeling of disturbance and release. Angled bands of color suggest zigzag patterns, aligning with the seed's themes of conflict while also leaving intentional negative space to evoke a feeling of 'hole' or absence, emphasizing the struggle. The arrangement overall conveys a sense of duality—between the chaotic vs. the structured, the filled vs. the empty, echoing the core theme of contrasting emotions.</desc>
