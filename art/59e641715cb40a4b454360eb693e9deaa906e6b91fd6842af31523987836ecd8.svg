<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Resonance</title>
  <desc id="desc">This piece explores the tension between defiance and submission, using a palette of melancholy wonder to draw contrasts in emotional expression. The deep blues and soft cyans suggest calm undercurrent while the muted plum adds a layer of tension. The centerpiece, representing defiance, is reinforced with brighter accents surrounded by a denser pattern that slips towards submission, emphasizing a spiral of emotional conflict. Broken pixels are utilized to disrupt the rhythm, reflecting moments of imperfection in the struggle. The layout channels negative space through a quiet path, allowing for moments of reflection amidst dense color application.</desc>
