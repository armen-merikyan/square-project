<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork explores the emotional tension between desire and emptiness through contrasting color densities and patterns. The palette, drawing from 'hot coral' and 'blood orange' for desire, and 'charcoal' and 'hollow blue' for emptiness, creates a vivid yet restrained feel. The primary collision occurs in the central row, where warm saturated tones compete with cooler shades, embodying the struggle for expansion against a locked border. The 'rain' and 'halo' patterns collide through scattered warm colors at the center and gentler tones along the edges. Broken pixels introduce intentional disruptions, adding depth and complexity to the emotional interplay, while ensuring the presence of negative space promotes the sensation of yearning.</desc>
