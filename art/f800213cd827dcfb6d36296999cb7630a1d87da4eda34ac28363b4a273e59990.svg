<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Motion</title>
  <desc id="desc">This composition captures the emotional tension between restlessness and peace through a carefully chosen palette and pixel arrangement. The dominant color of deep blue (#00008B) delivers the weight of restlessness at the edges, while pale yellow (#FFFFE0) serves as a soothing contrast, reflecting moments of peace. The collision occurs at the center, where dark and light pixels intersect, symbolizing the struggle between these contrasting emotions. The glitch pattern disrupts spatial harmony, representing memory's fragmentary nature, while the rising layout conveys the hope of movement towards tranquility. Overall, the artwork embodies the interplay of chaos and calm, mirroring an internal dialogue between contrasting feelings.</desc>
