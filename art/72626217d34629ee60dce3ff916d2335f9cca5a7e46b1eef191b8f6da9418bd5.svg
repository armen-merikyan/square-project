<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Resolve</title>
  <desc id="desc">This piece embodies the emotional tug-of-war between longing and resolve. The outer frame of pale mint (#98E0D9) and faded gold (#E0C68B) represents a warm but distant embrace, creating a yearning atmosphere. The inner core pulses with a robust ripple pattern in storm gray (#4B4E54) and near black (#1A1D21), suggesting a resolute center that stands against chaos. The contrasting colors are intentionally placed to create a visual echo of tension, mirroring the 'fault line' mentioned in the seed. Broken pixels add fractures, hinting at unresolved emotions and interrupted lines of thought, while some negative space invites the viewer to pause. The overall composition balances between density and emptiness, channeling the bittersweet nature of longing versus the strength of resolve.</desc>
