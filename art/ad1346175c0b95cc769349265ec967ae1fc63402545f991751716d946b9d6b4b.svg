<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Distortion</title>
  <desc id="desc">This piece explores the tension between clarity and disruption, mirroring the pulse of a signal caught in noise. The palette combines dark hues to represent the chaotic static and bright greens and magentas to illustrate the clear signals within that chaos. The central collision happens in the middle of the square, where the bright accents attempt to emerge from the surrounding static gray, creating a focal point amidst a dense atmosphere. This reflects the theme of 'signal vs noise' and the struggle of clarity amidst confusion.</desc>
