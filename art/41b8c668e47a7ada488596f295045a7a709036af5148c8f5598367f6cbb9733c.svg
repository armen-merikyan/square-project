<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Amidst Static</title>
  <desc id="desc">The emotional tone evokes the tension between clarity and confusion. The palette of navy, black, single white, and dim cyan creates a deep, resonant background that represents static noise, contrasted by a stark, clean pulse in lighter shades. This is where the main collision resides—at the center, where clean lines of white and cyan layer over darker hues, suggesting an attempt to emerge from chaos. The broken pixels introduce imperfections, adding an element of realism to the abstraction, akin to memory's faulty echoes.</desc>
