<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">This artwork captures the emotional tension between 'longing' and 'resolve' through contrasting colors and placement. The palette features deep black for grounding mixed with vibrant electric blue and magenta representing urgency and longing, while lime symbolizes new beginnings. The collision occurs predominantly in the upper left corner, where the dense cluster of colors signifies emotional overflow, pushing against the quiet black background framing the piece. The use of broken pixels introduces an element of imperfection, reflecting the jagged nature of emotional experience. Overall, the piece visually narrates a journey from chaotic longing towards a center of steely resolve, with each color choice symbolizing varying intensities of emotion.</desc>
