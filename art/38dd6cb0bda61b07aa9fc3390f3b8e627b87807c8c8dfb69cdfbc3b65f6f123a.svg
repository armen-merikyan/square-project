<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This artwork encapsulates the emotional tension between peace and restlessness. The chosen palette of dark violet and soft gold represents contrasting emotions—darkness symbolizing restlessness, while soft gold offers a serene touch. The main collision occurs in the center, where the strong flickering of darker colors confronts the illuminated soft gold and pale green, echoing a battle between memory (the past) and motion (the present). The layout emphasizes a 'cross-current', with horizontal and vertical tones clashing, creating visual unrest amidst the calm, which echoes the defined themes of duality and conflict in the seed.</desc>
