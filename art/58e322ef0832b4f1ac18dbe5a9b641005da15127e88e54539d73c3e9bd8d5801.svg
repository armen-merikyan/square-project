<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Worlds</title>
  <desc id="desc">This artwork captures the emotional dichotomy of longing and resolve. The palette of shelter green, warm brown, and pale skin tones evokes a sense of safety yet exposure, creating a nurturing yet anxious atmosphere. The left half's broken dots represent longing with scattered, vulnerable elements, while the right half's teeth pattern symbolizes the firm boundaries of resolution. The main contrast occurs centrally, where these two emotions collide, creating a dynamic tension that is both soothing and unsettling, simulating the struggle between reaching out and establishing clarity.</desc>
