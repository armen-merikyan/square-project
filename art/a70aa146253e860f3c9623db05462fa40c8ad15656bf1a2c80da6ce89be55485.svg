<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Balance</title>
  <desc id="desc">The artwork encapsulates the emotional duality of trust and suspicion through the juxtaposition of contrasting colors and patterns. Using a palette of deep blacks and pale blues, the darker tones suggest suspicion's heaviness, while the pale shades represent trust's soft glow. The main contrast occurs along the diagonal axis, where sharp edges collide with the soft transitions of negative cross patterns, creating a visual echo of tension. The scattered, imperfect arrangement mirrors the unpredictability of trust in a suspicious environment, with broken pixels introducing an intentional sense of disruption.</desc>
