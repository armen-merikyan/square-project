<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This composition encapsulates the emotional tension of restlessness versus peace, expressed through the use of pattern and contrast. The palette, which includes soft sky and faded gold against storm gray and near black, provides a serene background with punctuating moments of tension. The main collision occurs diagonally, where the restless split-screen pattern meets the peaceful stripes, suggesting a dynamic movement across the square, mirroring the ongoing battle between serenity and chaos. Broken pixels introduce intentional dissonance, further enhancing the feeling of 'flame against shatter', while maintaining a measured negative space that allows the viewer's eye to rest amidst the tumult.</desc>
