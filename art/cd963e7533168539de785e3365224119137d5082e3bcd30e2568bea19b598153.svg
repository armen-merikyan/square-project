<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Echoes</title>
  <desc id="desc">This composition explores the emotional tension between love and betrayal, using contrasting warm and cool tones to represent the dichotomy. The palette consists of pinks and reds for warmth (love), contrasted with grays and dark maroon (betrayal). The layout spreads from the lower left corner diagonally, creating a visual flow that evokes movement from emptiness to density. The noise pattern represents love's vibrant but chaotic essence, while the deliberate placement of dots signifies betrayal's subtle intrusions. Broken pixels introduce an element of imperfection, embodying the fractures in emotion that arise from these conflicting feelings. The interplay between soft and sharp edges further enhances the tension, with a significant amount of negative space to reflect emptiness amidst the emotional chaos.</desc>
