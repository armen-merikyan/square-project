<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork expresses the emotional turmoil of desire against a backdrop of emptiness. The palette of hot coral and blood orange creates a saturated warmth, echoing the intensity of desire. The quieter hollow blue hues represent the emptiness and containment. The center is dense and pulsating, depicting an overflow of desire that struggles against the cooler edges, reflecting restraint. The collision occurs predominantly in the center where the checker pattern of desire meets the frame, interrupting the flow and creating dynamic tension.</desc>
