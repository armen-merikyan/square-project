<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipsed Signals</title>
  <desc id="desc">This piece explores the emotional tension between fear and hope through stark contrasts and broken patterns. The palette features deep black and dark violet to represent fear, contrasted with soft gold and pale green which symbolize hope. The outer edges are dominated by darker shades, conveying a sense of heaviness and jagged chaos, while the center is illuminated softly, suggesting a glimmer of hope amidst the darkness. The arrangement follows a 'frame and core' layout, where the dense outer layers collide with the brighter inner core, embodying the tension of 'sharp vs soft' and 'inside vs outside'. The grid patterns throughout maintain a sense of structure, despite the broken pixels that introduce an element of imperfection.</desc>
