<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos in Contrast</title>
  <desc id="desc">This artwork captures the emotional tension between relief and dread through a juxtaposition of colors and patterns. The palette includes 'pale_mint' and 'faded_gold' that suggest warmth and comfort, balanced against 'storm_gray' and 'near_black' representing weight and unease. The central collision occurs where dark colors meet lighter ones, creating a visual 'pressure corner' that draws the eye inward, invoking a spiral motion away from chaos. The arrangement of broken pixels intentionally disrupts order, suggesting imperfections and the complexity of the emotional interplay.</desc>
