<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order Amidst Chaos</title>
  <desc id="desc">This composition reflects the tension of 'panic vs control' through the juxtaposition of ordered patterns and broken structures. The palette evokes a sense of warmth and grief, with yellows for joy and muted purples symbolizing grief, creating a contrast that amplifies emotional conflict. The central space remains intentionally sparse, representing 'empty room,' while chaotic elements disrupt the symmetry, embodying the emotional turmoil of the seed. The flow of 'orbit' is suggested through circular patterns that contrast against sharp interruptions, highlighting an ongoing struggle.</desc>
