<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Boundaries</title>
  <desc id="desc">The emotional tone reflects a tension between defiance and submission, with sharp contrasts of angular resistance in bright colors contrasted by softer, muted field colors. The chosen palette of ripe green and honey gold invokes feelings of growth and warmth, while deep olive offers grounding and creates a certain depth. The main collision occurs at the center, where defiance, represented through the bold teeth pattern, meets the noise pattern flowing outward, suggesting disturbance versus harmony. Broken pixels disrupt the uniformity, mirroring the unpredictability of the emotional struggle, all while maintaining a clear spatial hierarchy that encourages visual contemplation.</desc>
