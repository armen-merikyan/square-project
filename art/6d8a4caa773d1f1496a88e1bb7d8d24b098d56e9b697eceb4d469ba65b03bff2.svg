  <title id="title">Fragmented Patterns</title>
  <desc id="desc">This artwork explores the emotional tension between love and betrayal through a palette of warm reds and cool grays. The top half features a crosshatch pattern that symbolizes love's warmth, while the bottom half employs a ring-like pattern to evoke feelings of betrayal. The contrast arises from the sharp edges of dark maroon clashing with soft pinks, suggesting a collision of emotions. Broken pixels introduce imperfection, reinforcing the theme of unresolved feelings. The empty spaces create negative space, inviting reflection on the intensity of both emotions.</desc>
