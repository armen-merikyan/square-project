<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotion</title>
  <desc id="desc">This piece captures the emotional dichotomy of fear and hope through a split vertical layout. The left side embodies fear with darker tones and crack patterns, representing weight and compression, while the right side uses rising, radial patterns in soft golds and pale greens to evoke hope and lightness. The use of negative space keeps the composition balanced but tense, emphasizing the conflict between these emotions. The glowing edges create an atmospheric effect that suggest a breakthrough or a door unlocking, embodying the emotional journey from fear towards hope.</desc>
