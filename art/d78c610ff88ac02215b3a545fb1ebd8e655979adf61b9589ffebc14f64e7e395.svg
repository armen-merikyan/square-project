<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Time</title>
  <desc id="desc">This artwork reflects the emotional duality of nostalgia and progress through its color choices and layout. The dark side embodies nostalgia with shades of black and dark violet, creating a weighty, introspective atmosphere. In contrast, the right side, representing progress, features lighter colors like soft gold and pale green, invoking feelings of hope and forward motion. The split layout creates a vibrant tension between density and lightness, suggesting a struggle between holding onto the past and moving forward. The broken pixels add an element of imperfection, symbolizing the fluid nature of memory and advancement.</desc>
