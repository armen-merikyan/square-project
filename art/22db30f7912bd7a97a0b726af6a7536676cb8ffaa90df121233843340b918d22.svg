<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonant Static</title>
  <desc id="desc">This composition embodies the tension between clarity and chaos, reflected through the contrasting palette of vivid green and muted grays. The bright 'signal green' represents the elusive clarity amidst 'static gray' representing noise. The arrangement creates a sense of falling, with 'broken pixels' introducing intentional disruptions to evoke memory and erasure, while maintaining visual legibility. The center of the piece acts as a focal point where the most intense color clashes, suggesting the pulsing rhythm of life amidst static interference.</desc>
