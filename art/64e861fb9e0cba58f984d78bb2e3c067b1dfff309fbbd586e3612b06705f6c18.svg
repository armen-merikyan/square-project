<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dichotomy of Light</title>
  <desc id="desc">This artwork captures the emotional tension between fear and hope through contrasting colors and patterns. The chosen palette of black, dark violet, soft gold, and pale green evokes the duality of anxiety and optimism. The left side features dark hues, creating weight and stress, while the right introduces softer, glowing colors that symbolize hope and potential. The layout flows from bottom to top, suggesting an upward movement towards hope amidst the darkness. The use of broken pixels adds an element of imperfection, emphasizing the struggle between light and weight. The central area is intentionally left empty, echoing the fear of the unknown, while the outer edges pulse with color, representing potential bursts of energy and hope. This piece ultimately communicates the interplay of contrasting emotions, echoing the complexity of human experience.</desc>
