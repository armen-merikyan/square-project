<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">The emotional tone reflects tension between trust and suspicion, illustrated through a blend of warm and cool tones. The warm coral and soft amber suggest trust, while cold slate and blue-black evoke suspicion. The layout of scattered repair brings forth abrupt interruptions in patterns—mirroring the conflict of emotions. Key contrasts occur where bright colors break into muted spaces, creating a visual dialogue of connection amidst alienation. The diagonal flow emphasizes both a fall and ascent, reflecting resilience against fragility, with broken pixels representing imperfections in trust.</desc>
