<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone of this piece juxtaposes the warmth of safety against the coolness of exposure. The selected palette transitions from warm browns and greens that convey shelter to pale, open colors representing vulnerability. The left side of the grid embodies safety through a crosshatch pattern, thickened by rich colors and layered density, while the right side employs a stair-step configuration using paler tones to suggest lightness and exposure. A deliberate central collision of textures and colors symbolizes the tension between protection and openness, with broken pixels introducing intentional disruptions that add depth.</desc>
