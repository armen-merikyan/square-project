<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">This piece explores the emotional tension of defiance versus submission through dense contrasts of color and space. The palette of electric blue and magenta embodies vibrancy and energy, creating friction against the depth of black. The arrangement emphasizes a struggle between openness and confinement, with the central area representing defiance and the edges suggesting a feeling of submission. The layout draws the eye from left to right, emphasizing movement and tension, while maintaining negative space to reflect unresolved emotions. The broken pixels introduce imperfection, further enhancing the feeling of collision between competing emotions.</desc>
