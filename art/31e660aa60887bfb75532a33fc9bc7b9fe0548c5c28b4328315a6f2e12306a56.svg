<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This composition contrasts the serene and structured aspects of peace with the fragmented and dynamic elements of restlessness. The left side, representing peace, features soft, flowing patterns in shades of blue and plum. The right side, embodying restlessness, showcases a chaotic radial pattern with more intense colors that appear to disintegrate. The central collision occurs along the vertical axis, where these contrasting patterns meet, symbolizing the tension between calm and agitation, memory and motion. The palette, derived from 'melancholy wonder,' balances muted tones with bright accents, effectively enhancing the emotional dichotomy.</desc>
