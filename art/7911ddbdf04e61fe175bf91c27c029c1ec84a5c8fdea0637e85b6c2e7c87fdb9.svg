<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissonance in Balance</title>
  <desc id="desc">The artwork evokes a struggle between dread and relief, reflecting the weight of accumulated pressure and the ensuing release into open spaces. The palette of pale mint, soft sky, storm gray, near black, and faded gold contrasts lightness with depth. The dark colors cluster heavily in the top-left corner, introducing a sense of dread, while lighter tones radiate outward, mimicking relief and brightness. The interaction between the heavier upper section and the looser, airy parts below embodies the emotional conflict suggested by the seed, illustrating the chaos of pressure at the corner that gradually releases into order. Broken pixels throughout add an element of imperfection—echoing the unpredictable nature of experiences and emotions.</desc>
