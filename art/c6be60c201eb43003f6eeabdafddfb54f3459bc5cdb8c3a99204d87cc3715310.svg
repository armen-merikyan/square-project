<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fires of Connection</title>
  <desc id="desc">The emotional tone reflects a struggle between feelings of loneliness and connection. The palette, inspired by 'ancient fire', encompasses deep burnt oranges and darker reds, suggesting warmth and intensity fighting against isolation. The main collision occurs in the center where warm colors burst outward, symbolizing connection, while cooler, darker hues in the corners create a sense of loneliness. The use of broken pixels introduces imperfection, echoing the complexity of emotional states. The layout ascends from darker shades at the base to vibrant center hues, signifying the hope of rising from loneliness.</desc>
