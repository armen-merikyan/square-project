<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Desires</title>
  <desc id="desc">This composition captures the emotional intensity of desire against the constraints of restraint. The use of hot coral and blood orange conveys the saturation of longing and passion, while charcoal provides structure, representing restraint. The layout of stacked bands shifts from intense color at the bottom to cooler overlaid shades, showcasing the tension between desire and control. The pattern types—target for desire and radial for restraint—are visibly interrupted, creating an organic weave of emotions. The central collision occurs in the middle rows where saturation meets muted tones, exemplifying the struggle that defines the seed's narrative.</desc>
