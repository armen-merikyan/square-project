<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork explores the emotional tension between vibrant sparks of energy and the subdued presence of ash, encapsulating the contrasting experiences of hunger and restraint. The palette is carefully chosen to reflect a balance between dark hues representing ash (black, dark violet) and bright accents (soft gold) symbolizing the spark. The main contrast resides in the center where these colors collide, emphasizing the dynamic conflict. The islands and ash fields create overlapping textures that suggest both fragmentation and continuity, encapsulating a process of resilience amidst erasure, mirroring the contradictions in the seed's emotional journey.</desc>
