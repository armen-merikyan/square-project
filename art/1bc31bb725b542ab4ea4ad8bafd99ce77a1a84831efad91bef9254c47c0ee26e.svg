<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This piece explores the emotional tension between softness and severity. The palette combines delicate powder pink and warm white with deeper notes of carbon black and sharp crimson, creating a visual dialogue of gentleness against starkness. The density of colors in the lower rows, hinting at severity, contrasts sharply with lighter, scattered shapes above that convey softness. The collision occurs through a diagonal invasion of dark tones that subvert the airy lightness, embodying feelings of guilt and forgiveness as suggested by the seed.</desc>
