<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This abstract piece explores the duality of envy and gratitude through weighty contrasts and lightness. The palette, featuring vibrant lime and electric blue against deep black, creates an emotional resonance of tension and relief. The arrangement highlights upward movement on one side, symbolizing ambition (envy) versus a downward pull on the other, reflecting acceptance (gratitude). Each color collision signifies emotional upheaval, while the broken pixels introduce imperfection, echoing the fractured nature of self-comparison. The overall composition maintains a sense of negative space, allowing the sentiment to breathe amidst the organized chaos.</desc>
