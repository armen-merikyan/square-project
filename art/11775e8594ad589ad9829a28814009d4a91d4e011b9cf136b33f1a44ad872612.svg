<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Colliding Realms</title>
  <desc id="desc">The artwork embodies the emotional tension between trust and suspicion, manifesting as an abstract collision of colors and patterns. The palette features mourning black and deep blue to evoke feelings of mystery and depth, while pale yellow and new leaf introduce warmth and renewal, emphasizing the contrast between the two emotional states. The left side reflects trust through a balanced patchwork pattern, while the right side displays suspicion through chaotic pressure bands. The central collision is dynamic, where these emotions meet at the vertical split, embodying the idea of an open gate to alternate realms, allowing the viewer to experience the push and pull of these opposing feelings.</desc>
