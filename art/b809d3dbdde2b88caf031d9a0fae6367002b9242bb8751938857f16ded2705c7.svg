<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone navigates between vulnerability and strength, encapsulated by a soft palette that contrasts strong, defined structures against pale, open spaces. The palette reflects a balance between warm whites and stark blacks, embodying feelings of fragility and resilience. The collision emerges in the center, where dense dots of carbon black—representing strength—overlay soft maze patterns in powder pink, signifying vulnerability. The broken pixels disrupt the flow, creating a sense of unease and imperfection, emphasizing the theme of exposure against shelter.</desc>
