<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry vs Break</title>
  <desc id="desc">The emotional tone of this piece reflects the fine balance between trust and suspicion, captured in a split horizontal layout. The upper four rows employ a 'rain' pattern of soft creams and warm reds to convey trust, creating an inviting and cohesive flow. The bottom four rows use a 'thread' pattern of deep plums and stark blacks to evoke suspicion, emphasizing tension and concealment. The collision occurs at the row transition where the warm hues colliding with dark, sharp colors create a sense of unease. This stark contrast disrupts the symmetry, embodying the complex nature of these emotions. The inclusion of muted tones ensures a quiet field, while the occasional broken pixel introduces flaws, representing vulnerabilities in both trust and suspicion.</desc>
