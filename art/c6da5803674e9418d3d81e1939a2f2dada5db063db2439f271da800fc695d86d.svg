<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition captures the emotional tension between restlessness and peace through contrasting colors and placements. The palette features calm greens and browns to evoke peace, while sharp, bold colors suggest restlessness. The main collision occurs diagonally across the canvas, where calmer colors attempt to contain the vibrant accents, representing the struggle between finding serenity and grappling with chaos. The interspersed broken pixels add intentional disruptions, embodying moments of imperfection and unpredictability within this emotional landscape.</desc>
