<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Contrast</title>
  <desc id="desc">The emotional tone captures the dichotomy between joy and grief, with the palette reflecting bright yellows and oranges for joy, contrasted against muted purples and deep blues representing grief. The left side is lighter and more vibrant, creating a sense of hope, while the right side is heavier, signifying loss and tension. The crosshatch patterns enhance the feeling of collision between the two emotions, establishing a rhythm of opposing forces. The center does not represent symmetry perfectly; instead, it features a dominant left side, creating balance within the created chaos.</desc>
