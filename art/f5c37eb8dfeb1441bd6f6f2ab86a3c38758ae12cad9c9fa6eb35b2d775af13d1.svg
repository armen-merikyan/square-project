<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Restraint</title>
  <desc id="desc">This artwork captures the tension between desire and restraint by using a palette that juxtaposes warmth and coolness. The bright reds and small oranges represent the gathering glow of desire, while muted creams and iron grays symbolize the calm, contained restraint. The main collision occurs in the top-left corner, where warm dots (desire) invade the restrained embers (cool tones), creating a dynamic push and pull across the canvas. The layout reflects a 'corner invasion,' with the desire spreading outward, forming a spiral pressure that seems to both seek release and be pulled back.</desc>
