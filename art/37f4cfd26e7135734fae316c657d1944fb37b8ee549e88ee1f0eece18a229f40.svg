<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tones</title>
  <desc id="desc">The emotional tone combines softness with sharp severity, reflecting a visual story of contrasting warmth and coldness. The chosen palette of powder pink and warm white provides a gentle base, while carbon black and sharp crimson serve as piercing accents nudging into this softness. The main collision occurs in the central row, where bursts of warmth against dark textural gradients create a sense of tension and release. The patterns of 'hinge' and 'negative_cross' create moving flows that oppose one another in the layout. This design captures a pulse-like rhythm against an ambient background, allowing for an exploration of guilt and forgiveness flowing through visual space.</desc>
