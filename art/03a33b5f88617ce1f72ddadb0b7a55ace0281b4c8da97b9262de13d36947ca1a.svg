<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">The composition explores the contrast between the vibrant energy of 'spark' and the muted tones of 'ash'. The palette, drawn from soft rose-clay and warm shadows juxtaposed with cool blues and gold, reflects intimacy and distance. The main collision occurs with the organized chaos of the diagonal flow, reminiscent of a fluctuating memory against the quiet of erasure. Two distinctly different patterns, 'crack' for ash and 'glitch' for spark, express the duality of resilience and fragility, creating tension in their meeting point at the center.</desc>
