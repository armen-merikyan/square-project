<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Defiance and Submission</title>
  <desc id="desc">The artwork reflects the emotional dichotomy of defiance and submission using a palette that conveys both awe and terror. Dark tones of void black and deep teal signify submission with space that feels enclosed, while the cosmic indigo and star white add bursts of defiance through their brightness. The layout follows a two-pulse pattern where the central colors introduce collision, creating a visual tension, as hard interruptions in the otherwise flowing pixelation represent the struggle between the two states. The edges employ a weighted diagonal style, echoing the fluctuating balance between chaos and order, creating an uneven border that mirrors the emotional journey suggested by the seed.</desc>
