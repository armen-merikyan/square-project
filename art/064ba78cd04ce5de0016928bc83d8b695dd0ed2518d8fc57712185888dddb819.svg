<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center of Emotion</title>
  <desc id="desc">This composition encapsulates the tension between joy and grief as contrasting emotional states. The chosen palette includes vibrant yellow and orange to signify joy, contrasted against muted shades of deep blue and muted purple representing grief. The layout features a split-screen effect, reflecting the juxtaposition of these emotions. The main collision occurs where bright yellows meet deep blues, creating a stark emotional juxtaposition. The flow is top to bottom, with the upper part brimming with warmth and light while the lower part sinks into darker, muted tones. This reflects the battle between hope and melancholy, creating a layered narrative that invites viewers to explore depths of feeling. The edges are defined and rectangular, symbolizing the rigidity of emotions while leaving negative space to breathe, signifying the unresolved tension that exists in the duality of feelings.</desc>
