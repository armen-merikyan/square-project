<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">This composition captures the emotional turmoil of restlessness colliding with the tranquility of peace. The warm colors from the 'ancient_fire' palette (burnt orange, dark red, gold) evoke a sense of urgency and chaos, resonating with restlessness, while the cooler tones (charcoal) contribute to a serene balance, reflecting peace. The main conflict arises diagonally from the corner where the burnt orange and dark red intersect with the charcoal and gold, creating an intense visual pulse. The broken pixels add intentional disruption and complexity, hinting at memories and motion. This interplay creates a conversation between calm and chaos, illustrating the constant push and pull of these two emotional states.</desc>
