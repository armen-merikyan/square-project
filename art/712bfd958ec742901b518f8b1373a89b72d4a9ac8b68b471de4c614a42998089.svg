<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone centers on the tension between desire and emptiness, illustrated by contrasting colors and patterns. The palette mixes warm hues (hot coral, blood orange) that represent desire with cooler tones (charcoal, hollow blue) symbolizing emptiness. The collision between the warm 'spark' pattern of desire and the cool 'stripes' of emptiness occurs predominantly in the center, suggesting a struggle where warmth attempts to push against the boundaries of containment. The layout mirrors itself while introducing deliberate disruptions, capturing the essence of 'mirror_broken.' The density of warm colors contrasts the vastness of cooler hues, creating a dynamic flow that spirals counterclockwise, evoking a sense of rising tension toward the edges.</desc>
