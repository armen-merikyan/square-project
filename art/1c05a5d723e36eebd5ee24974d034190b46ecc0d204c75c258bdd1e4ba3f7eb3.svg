<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This piece embodies the tension between quietness and pressure through a composition where muted fields and sharp contrasts collide. The palette features off-white and faint peach, representing calmness, contrasted with compressed red and dark navy, symbolizing pressure. The layout divides the square diagonally, emphasizing the struggle and balance between these emotional states. The barcode pattern of the pressure colors creates an energetic push along the bottom edge, while the stepwell of quiet colors eases across the upper portion, representing a gentle release against the weight of the darker tones. The resulting dynamic evokes feelings of struggle and resolution, encouraging viewers to reflect on their own experiences of tension and calm.</desc>
