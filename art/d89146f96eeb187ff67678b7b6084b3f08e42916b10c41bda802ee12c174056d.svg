<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Edges of Tension</title>
  <desc id="desc">This piece explores the emotional contrasts of quiet and pressure through the careful arrangement of color and space. The palette, grounded in soft off-white and faint peach, provides a sense of calm amidst the more aggressive reds and navy that dominate the edges, symbolizing pressure. The main contrast occurs at the intersection of the dense core and the softer periphery, where the patterns of echo and glitch collide, hinting at confusion and clarity. The ‘veil’ shape seed manifests as a halo of tension around a looser core, encapsulating the turmoil within a quiet frame.</desc>
