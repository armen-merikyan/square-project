<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interference &amp; Rhythm</title>
  <desc id="desc">This composition captures the conflict between clarity and chaos, reflecting the duality of 'signal vs noise'. The palette features deep navy as the dominant field, symbolizing stability and depth, while brighter, glimmering accents of dim cyan represent the readable rhythm trying to emerge from the static. The noise, depicted as scattered crosshatch patterns, incorporates broken pixels to create intentional imperfections, emphasizing the fractured nature of communication. The main contrast occurs at the center, where chaotic marks of dark tones collide with fleeting bright pathways, creating a sense of tension and unresolved motion. The layout reflects the struggle for control within the square, balancing between silence and interruption, order and disturbance.</desc>
