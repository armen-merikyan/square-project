<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">This artwork captures the tension between the softness of gentle pastels and the severity of deep, dark tones. The palette blends warm whites and powder pinks with stark carbon black and steel gray, illustrating an emotional interplay. The primary collision occurs in the center, where bright accents are aggressively interrupted by denser, darker colors, embodying the struggle between lightness and heaviness. The rising signal layout pushes upward, symbolizing hope and the quest for elevation amidst weighty shadows, while broken pixels create intentional disruptions that evoke imperfection and turbulence in the narrative.</desc>
