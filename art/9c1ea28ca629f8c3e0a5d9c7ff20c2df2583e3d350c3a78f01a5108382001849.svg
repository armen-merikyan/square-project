<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Sympathetic Fragmentation</title>
  <desc id="desc">This piece reflects the emotional tension between warmth and isolation, embodying the duality of love and betrayal. The palette—consisting of soft pinks and deep maroons—conveys warmth but is disrupted by dull grays suggesting the shadow of betrayal. Contrasts emerge with a gradient flow from the bottom to the top, portraying ascent, yet interrupted by sharp, burned edges that speak to broken belonging. The structured arrangement hints at paired forms, while the broken pixels add unexpected imperfection, resonating with feelings of loneliness and fragmentation, reminiscent of an empty room filled with static silence.</desc>
