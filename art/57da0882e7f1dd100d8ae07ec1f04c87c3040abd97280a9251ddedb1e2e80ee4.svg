<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dual Pulses of Emotion</title>
  <desc id="desc">The emotional tone captures the tension between longing (which is expressed through warmer greens and golds) and resolve (expressed through deep olives and cream hues). The interplay between these colors creates a rhythm of desire and firmness. The layout emphasizes two small centers mirroring a pulse, with one dominating section colored in ripe green, while the other contrasts with honey gold. The edge style adds dynamics through thick outlines that define the tension. 'Broken pixels' create deliberate disruptions in the pattern, enhancing the sense of repair amidst damage, embodying the conflict of the seed.</desc>
