<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone captures the struggle between funneled rage represented by sharp red shapes and the soft, forgiving echoes of pale blue and white. The palette—shades of red reflecting intensity and black for depth—contrasts with the gentler hues of blue and white, symbolizing tranquility. The layout features diagonal wedges where rage pushes outward, creating tension along the boundary. Broken pixels disrupt the uniformity, suggesting emotional scars within the pattern while maintaining a sense of organized chaos. This arrangement conveys a narrative of conflict, resolution, and the complexity of emotional experiences.</desc>
