<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tidal Tension</title>
  <desc id="desc">The emotional tone portrays the interplay of quietness and pressure. The palette features muted colors like 'off_white' and 'faint_peach' representing calmness, contrasted against the deeper 'dark_navy' and 'compressed_red' to manifest pressure and tension. The main collision occurs diagonally across the square, where the softness of the 'hinge' pattern on one side jostles against the dense 'stairs' of the pressure pattern, creating a dynamic visual rhythm that hints at conflict and resolution. The form of the 'knot' is abstractly represented through the density of colors that create tension and release.</desc>
