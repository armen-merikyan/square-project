<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition balances the emotional tension between rage and calm, with the left half dominated by hot sparks of red and black that signify eruption and chaos, while the right half embodies the cool, steady pressure of pale blue and white, symbolizing calmness. The decision to split the canvas vertically emphasizes the clash between the two emotional states. The broken pixels add intentional disruption, evoking a sense of erosion and tension. The overall layout with sharp patterns creates a sense of zigzag motion, pulling the viewer's eye across the square, highlighting the collision between contained calm and an overflowing rage.</desc>
