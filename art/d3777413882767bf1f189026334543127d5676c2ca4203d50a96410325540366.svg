<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall</title>
  <desc id="desc">This artwork conveys the emotional tension between joy and grief, exploring themes of symmetry and breakage. The left side, representing grief, employs muted purple and deep blue tones with a ring pattern to evoke a sense of drooping heaviness and fragmentation. In contrast, the right side bursts with brighter yellow and orange in a checker pattern, symbolizing joy's optimism and expansion. The glowing edges create a visual contrast that emphasizes the struggle between these emotions, with asymmetrical placements adding layers of complexity. The center seed acts as a pulse point, pushing against the stark divide, suggesting an arrow moving through the emotions.</desc>
