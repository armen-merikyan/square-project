<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone captures a delicate friction between tenderness and rage, represented through a palette of red, pale blue, white, and black. The dominant rage pulls the eye upward across the canvas, expressing a rising intensity through stacked patterns while the tender pale blue stairs provide a protective yet vulnerable response. The central collision area, marked by a chaotic pattern of red against soft blue, suggests an emotional struggle, allowing the viewer to interpret the ebb and flow of tension, hope, and vulnerability. The edge style introduces a blocked frame that forces the colors inward, enhancing tension and form while allowing imperfections to breathe into the structure of the piece, embodying the weight of emotion.</desc>
