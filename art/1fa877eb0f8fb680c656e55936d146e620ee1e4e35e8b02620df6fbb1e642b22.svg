<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Flame of Contrasts</title>
  <desc id="desc">This piece embodies the emotional tension between joy and grief through a deliberate clash of warm and cool colors. The palette draws from yellows and oranges for joy, suggesting brightness and energy, contrasted against deep blues and muted purples representing grief, evoking heaviness and depth. The split screen layout illustrates the dichotomy, with a fluid mix flowing diagonally across the canvas, where the warmer tones spread from one corner, embodying joy and movement, while the cooler tones anchor the opposite side, representing sorrow's weight. The chosen broken pixels add a layer of imperfection, hinting at the unresolved nature of these emotions. The interaction creates a visual narrative of wave-like motion, interlocking and colliding in a way that evokes both a warmth and a chill, highlighting the complexity of human emotions.</desc>
