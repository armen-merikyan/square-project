<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Waves</title>
  <desc id="desc">This piece embodies the emotional struggle between calm and rage, represented by a palette that balances stark blacks and whites with soft pale blue. The main contrast appears at the center, where the maze pattern of black suggests turmoil, while the outer radial pattern in pale blue evokes tranquility. The surrounding pixels intermingle in a near-mirror layout, with purposeful broken pixels creating disruption, enhancing the sense of conflict. The soft edges blur the line between calm light and heavy darkness, reflecting the seed's themes of interaction, orbit, and emotional tension.</desc>
