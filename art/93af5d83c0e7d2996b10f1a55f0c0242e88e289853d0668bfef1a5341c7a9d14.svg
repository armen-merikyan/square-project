<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece captures the emotional dance between joy and grief through warm and cool colors in an 8x8 format. Utilizing a palette of bright yellows and oranges to symbolize joy and muted purples and deep blues to represent grief, the arrangement is split vertically, illustrating the tension between these opposing feelings. The left side is structured in a grid pattern to portray order and joy, while the right employs a frame pattern to suggest the boundaries around grief. The broken pixels introduce a sense of imperfection, resonating with the emotional theme, as grief often disrupts our perceived order. The overall effect evokes a narrative of struggle and balance, reflecting the interplay of light and darkness in human experience.</desc>
