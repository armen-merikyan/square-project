<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">The artwork captures the emotional tension between softness and severity through a palette that balances warm whites and powder pink against the starkness of carbon black and sharp crimson. The braiding pattern symbolizes softness, engaging with the steeper stairs of severity, suggesting a conflict. The center serves as the collision point where bright crimson juts out against muted backgrounds, creating a dynamic rhythm. The overall flow is diagonal, hinting at movement or struggle, with a slight presence of negative space to suggest unresolved tensions.</desc>
