<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">The artwork embodies the conflict between longing and resolve using a muted palette that conveys a sense of serenity with a hint of urgency. The soft mint and storm gray dominate, suggesting a quiet intensity. The overlapping patterns of negative cross for longing and crosshatch for resolve create tension, particularly prominent in the central bright cluster, symbolizing hope amidst dimness. The intentional broken pixels introduce scars of past damage, echoing the theme of repair versus damage without literal representation.</desc>
