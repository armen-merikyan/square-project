<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This artwork captures the emotional tension between control and surrender through its contrasting color palette and layout. The use of deep olive and ripe green conveys a sense of contained pressure, while the lighter tones of honey gold and cream suggest a gentle yielding. The central collision of the two contrasting patterns—threshold and pressure band—draws the eye inward, creating a dynamic push and pull. The deliberate placement of broken pixels adds intentional disruption, emphasizing the theme of stutter and hinge, representing moments of tension and release within the emotional spectrum.</desc>
