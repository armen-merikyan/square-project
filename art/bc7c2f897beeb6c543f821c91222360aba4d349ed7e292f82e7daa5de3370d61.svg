<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasts of Emotion</title>
  <desc id="desc">The emotional tone reflects a struggle between vitality (spark) and decay (ash). The palette features vibrant yellows and oranges for the spark, balanced by deep blues and muted purples to represent ash, creating a visual dialogue of tension and calm. The main collision occurs in the center where bright colors interact chaotically with the darker, more subdued tones, manifesting a battle between impulse and restraint. This arrangement evokes the push-pull of memory and experience that life encapsulates.</desc>
