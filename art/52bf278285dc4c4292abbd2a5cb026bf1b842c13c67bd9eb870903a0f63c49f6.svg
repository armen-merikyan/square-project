<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition embodies the emotional tension between rage and calm through its contrasting colors and patterns. The palette includes hot reds to symbolize rage and cooler pale blue and black tones for calmness, creating an intense emotional dialogue. The primary collision occurs in the center with irregular stripes resembling a breaking wave of rage, which disrupt the serene radial calmness surrounding it. The arrangement reflects the concepts of containment versus overflow, where vibrant color marks threaten to breach more peaceful regions, evoking feelings of unrest against a backdrop of stability.</desc>
