<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Signal</title>
  <desc id="desc">The artwork conveys an exploration of the tension between control and surrender, demonstrated through a juxtaposition of dense, contained areas and spaces that suggest release. The palette juxtaposes vibrant electric blue and hot magenta against more subdued static gray and dead black, embodying the collision of assertive signals against competing noise. The spiral layout subtly leads the viewer's eye toward the fragmented center, symbolizing the pressure that surrounds a dynamic release point. Broken pixels are strategically placed to enhance the sense of imperfection and disruption, reflecting the emotional complexities of surrendering amidst control.</desc>
