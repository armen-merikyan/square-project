<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone of this composition reflects a struggle between the dynamic energy of 'spark' and the subdued remnants of 'ash'. The chosen palette of warm white, sharp crimson, steel gray, and carbon black contrasts the vibrancy of life against the existential residue of what remains. The main collision occurs at the center, where the crimson sparks burst against the gray ash-like fields, emphasizing the tension between urgency and restraint. The diagonal argument is represented through the placement of the warm white, which penetrates the darker edges, suggesting a wave of energy cutting through stasis, while the jagged edges evoke a sense of raw memory and the scars of past experiences.</desc>
