<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece embodies the emotional tension between emptiness and desire. The palette features warm, saturated colors like hot coral and blood orange representing desire, contrasted by the cool, muted tones of charcoal and hollow blue symbolizing emptiness. The patterns of lattice and flood create a dynamic collision at the center; desire builds upward while emptiness blankets the periphery, forming a quiet pressure against the vibrant core. The layout allows for breathing space, inviting the viewer into a dialogue of tension and release.</desc>
