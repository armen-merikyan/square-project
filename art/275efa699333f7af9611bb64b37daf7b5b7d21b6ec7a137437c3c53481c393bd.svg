<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Tension</title>
  <desc id="desc">This piece explores the emotional contrast between vulnerability and strength using a palette of dark navy and dim cyan against stark white, symbolizing the stark reality of exposure. The layout features diagonal organization, allowing the strength represented by solid stripes to dominate on one side, while the vulnerable pale tones create a threshold on the other. The collision between these emotional states occurs at the center, creating a quiet tension. Broken pixels disrupt the flow, hinting at the imperfection intrinsic to both vulnerability and strength, reinforcing the theme of exposure versus shelter.</desc>
