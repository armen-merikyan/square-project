<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Echoes</title>
  <desc id="desc">This piece captures the emotional tension between restlessness and peace. The chosen palette of pale aqua and alarm red sharpens the contrast between serene moments (represented by cool tones) and urgent bursts of energy (represented by warmer tones), reflecting echoes of memory in motion. The collision occurs primarily in the center, where broken pixels disrupt the wave-like patterns of calm periphery, indicating an upward movement of hope and chaos. The overall layout is designed to flow from the edges inward, creating a sense of control being challenged by the unresolved ambivalence of conflicting emotions.</desc>
