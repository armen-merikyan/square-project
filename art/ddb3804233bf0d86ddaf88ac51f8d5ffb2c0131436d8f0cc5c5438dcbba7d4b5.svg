<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotion</title>
  <desc id="desc">This artwork captures the tension between joy and grief through a split vertical layout. The left half uses bright yellows and oranges to embody joy, represented by broken dots for a brighter, expanding feel. The right half employs deeper blues and muted purples to convey grief, framed in structure to emphasize heaviness. The main contrast occurs where the bright elements meet the darker tones, indicating an emotional collision. The jagged edges add intensity, while the occasional broken pixels introduce imperfection, echoing life's complexities. The negative space of the bright left side against the denser right creates a balance that invites reflection on the duality of these emotions.</desc>
