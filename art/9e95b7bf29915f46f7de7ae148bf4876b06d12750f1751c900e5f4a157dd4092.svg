<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This composition encapsulates the emotional tension between exposure and safety using a split vertical layout. The use of pale tones on one side (representing exposure) contrasts sharply with deeper, richer colors (safety) on the opposite. The central rows maintain a ripple effect created by lighter hues, while darker borders act as a protective barrier, emphasizing the collision between vulnerability and enclosure. This duality is mirrored through glitch patterns on the safety side and constellation-like placements on the exposure side, creating a dynamic visual story.</desc>
