<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone captures the duality of vulnerability and strength, creating a central dichotomy. The chosen palette of moss green, bone white, rust, stone gray, and small gold invokes resilience and fragility—moss green represents strength while bone white embodies vulnerability. The contrasting colors collide primarily at the center where pale colors meet denser ones, illustrating a tension between protection and exposure. The use of broken pixels introduces intentional disruptions, resonating with the theme of uneven strength and the fragility of the exposed. The overall composition evokes a narrative of pressure at the center with an escape towards the edges, achieving a balance between quiet fields and jarring interruptions.</desc>
