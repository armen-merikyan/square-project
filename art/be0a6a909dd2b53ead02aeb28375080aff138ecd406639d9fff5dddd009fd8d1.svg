<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse in Static</title>
  <desc id="desc">The emotional tone reflects the struggle between clarity and chaos, captured through a palette of vibrant and muted tones. The use of green to represent the signal is contrasted sharply with the noise of gray and black, creating a visual tension that echoes the seed's themes of exposure and interruption. The arrangement flows from the top down, mimicking falling pixels, with intentional disruptions to emphasize the layered complexity of memory and erasure. The central pulse is located in the middle, surrounded by waves of noise, establishing a dynamic interplay between focus and distraction.</desc>
