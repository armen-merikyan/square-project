<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Broken Connections</title>
  <desc id="desc">The emotional tone highlights the tension between love and betrayal, contrasting warm reds and pinks with cold greys and dark maroon tones. The palette amplifies feelings of warmth and vulnerability (love) vs. the harshness and pain of betrayal. The primary contrast occurs centrally and along the diagonal where warm colors meet cooler shades. The pattern's fragmented, crosshatch-like arrangement represents the conflict, creating an abstract space that feels both cluttered and void, echoing the themes of emptiness and disconnection suggested by the seed.</desc>
