<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Pulses</title>
  <desc id="desc">This pixel art explores the emotional contrast of defiance and submission through the interplay of colors. The palette blends serene colors like pale aqua and mist gray with the striking alarm red and deep ink blue. The dominant defiance is represented by embers against a muted ash field, creating a rhythmic tension across the square. The center pulses in both dark and light, representing conflict, while the uneven borders introduce a sense of disruption, symbolizing the chaotic elements of life. The negative spaces allow for a breath, suggesting a threshold where emotions collide yet coexist.</desc>
