<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension &amp; Release</title>
  <desc id="desc">This 8x8 composition embodies the emotional struggle of longing and resolve. The palette of navy and dim cyan echoes feelings of loneliness and serenity, while the deep black provides a strong contrast that signifies resolve amidst chaos. The diagonal flow suggests movement and falling, with clustered checker patterns in one corner gradually giving way to an open grid area, creating a space for both density and emptiness, reflecting the emotional undertones of intimacy and distance. Broken pixels interrupt the smooth grid, symbolizing the imperfections inherent in longing.</desc>
