  <title id="title">Tension of Shelter and Exposure</title>
  <desc id="desc">The emotional tone reflects a balance between feelings of safety and exposure, contrasting warmth and coolness. The selected palette features shelter green and warm brown representing safety, while pale skin and open blue evoke a sense of exposure. The main collision occurs vertically in the center, where the softer greens and browns meet stark blues and whites, illustrating a tension between gentle weight and vast air. This arrangement captures a pulse-like rhythm with the layered patterns, creating a visual story of conflicting emotional states.</desc>
