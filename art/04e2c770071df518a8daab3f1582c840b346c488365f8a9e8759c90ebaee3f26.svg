<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone juxtaposes vulnerability with strength, representing a tension between protecting the soft center and allowing exposure to the outside. The palette combines quiet pressure colors that evoke a sense of gentleness (faint peach, off white) contrasted by stronger, darker tones (dark navy and compressed red). The main collision of density occurs at the center, where thin shells collide with robust blocks, creating a visual reminder of both stability and fragility. The broken pixels interrupt this flow, symbolizing scars of vulnerability while maintaining clarity throughout the composition.</desc>
