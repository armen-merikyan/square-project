<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">This artwork explores the emotional tension between relief and dread through color density and spatial arrangement. The palette includes lime and electric blue for vibrancy, representing moments of relief, and black and magenta to convey a sense of dread. The composition adopts a corner invasion layout, where bright colors emerge from the bottom left, contrasting heavily with the darker colors that dominate the upper areas, creating a visual sense of pressure against the light. The broken pixels introduce imperfection, enhancing feelings of unease. The interplay between maze-like patterns in lighter colors and noise in darker hues represents the fight between calm moments and heavy dread.</desc>
