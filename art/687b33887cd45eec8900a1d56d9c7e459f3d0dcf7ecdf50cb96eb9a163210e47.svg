<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tear in Connection</title>
  <desc id="desc">This artwork explores the tension between loneliness and connection, with a central filled square symbolizing isolation amidst a surrounding chaotic play of colors. The contrasting palette of deep, warm magenta and cold electric blue invokes a clash between warmth (human connection) and cool detachment (loneliness). The outer rows lean darker, hinting at emotional weight and hidden layers, while the inner square bursts with vibrancy, suggesting the spark of connection within. The arrangement follows a zigzagging flow, emphasizing the push and pull between negative space and density, while broken pixels disrupt perfection, echoing the theme of interrupted connections.</desc>
