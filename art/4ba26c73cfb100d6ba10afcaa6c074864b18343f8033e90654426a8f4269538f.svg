<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Vulnerability</title>
  <desc id="desc">This artwork embodies the tension between safety and exposure through the use of a palette that conveys warmth and coolness. The pale skin (#F5D5C3) at the center represents vulnerability, while the warm brown (#8B5A2B) and shelter green (#3C8F3C) form protective boundaries. The interaction of dense clusters of cold white (#E0F7FA) on one side against softer open blue (#A3D6E7) on the other highlights the concept of pressure versus release. The broken pixels (irregular placement of darker shades) serve as intentional disruptions, symbolizing the complexities of emotions that arise within the themes of safety and exposure.</desc>
