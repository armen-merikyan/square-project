<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone is a clash between rage and calm, depicted through a palette of deep reds and cool blues. The intersection of sharp, jagged lines in red against soft pulse marks of pale blue creates dynamic tension in the center, symbolizing an overflow of emotion against a backdrop of calmness. The pattern mirrors the struggle of maintaining control amidst chaos, with a predominance of calm colors surrounding a hot center, illustrating the fragile balance between these opposing feelings and the concept of signals fighting against noise. Broken pixels disrupt the composition, adding a layer of imperfection, reminiscent of human emotion.</desc>
