<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">The composition represents the emotional duality of joy and grief. The left side uses warm yellows and oranges to express joy, employing a radial pattern that suggests expansion and liveliness. The right side contrasts this with muted purples and deep blues representing grief, where a crackling texture evokes weight and somberness. This juxtaposition creates a palpable tension, with the bright colors attempting to rise and break through the heavier hues, exemplifying the struggle between joy and grief. The zigzag flow enhances the connection between the emotions, while the split layout emphasizes their separation yet inherent links.</desc>
