<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory in Motion</title>
  <desc id="desc">This artwork captures the tension between tenderness and rage. The palette combines muted pale blue with explosive reds, suggesting vulnerability amid chaos. The density of darker shades creates an echoing backdrop, interrupted by brighter pixels to symbolize moments of clarity or outburst. The falling pixel layout enhances the sense of motion, as colors descend like emotional rain, with the predominant collision occurring in the center where reds briefly pierce through the muted blues. This juxtaposition reflects the internal conflict of feelings, as tenderness and rage collide, forming a vibrant yet delicate ebb and flow.</desc>
