<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Control and Surrender</title>
  <desc id="desc">This composition explores the duality of control and surrender through the emotional tones present in the palette and layout. The upper half uses the colors associated with control—dark cosmic indigo and void black—creating a dense, structured environment that feels contained and rigid. In contrast, the lower half employs the lighter cold gold and deep teal to represent surrender, introducing a sense of flow and release. The breaking pixels interspersed create moments of disruption, suggesting an overflow that challenges the structural pressure above. The dominant collision occurs in the center, where the boundary between the two contrasting emotions meets, illustrating the struggle between containment and liberation.</desc>
