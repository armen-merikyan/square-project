<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Torn Connections</title>
  <desc id="desc">The emotional tone of loneliness vs connection is represented by a contrasting palette that emphasizes deep, resonant blues and blacks juxtaposed with isolated whites to evoke feelings of both solitude and connection. The center shows a burst of energy amidst a web of broken patterns, suggesting hidden connections that strive to emerge yet remain partially obscured. The use of negative space enhances the feeling of isolation, while the uneven distribution of colors creates a tension between the chaos of connections and the calm of loneliness. The collision of dense areas surrounded by emptiness illustrates the struggle to connect in an overwhelming world.</desc>
