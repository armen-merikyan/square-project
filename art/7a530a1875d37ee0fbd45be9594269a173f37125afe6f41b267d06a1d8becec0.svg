  <title id="title">Pulse of Duality</title>
  <desc id="desc">This artwork embodies the emotional tension between joy and grief, represented through contrasting color choices. The yellow and orange tones symbolize joy as vibrant and open energy, while the deep blue and muted purple colors signify grief's somber and fragmented aspects. The grid pattern resembles stability and structure on one side, while the chaotic arrangement of darker shades introduces an element of disruption, echoing the emotional conflict. The layout emphasizes a symmetrical frame that contrasts with a ‘broken’ core, intriguing the viewer to find harmony within chaos.</desc>
