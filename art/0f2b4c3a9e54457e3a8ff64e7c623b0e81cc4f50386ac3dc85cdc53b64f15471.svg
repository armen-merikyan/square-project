<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Climb Through Conflict</title>
  <desc id="desc">The emotional tone of this piece reflects the duality of tenderness and rage, portraying a struggle between a soft, nurturing warmth and sharp, punctuated outbursts. The palette incorporates deep black, vibrant red, and softer hues of pale blue and white, cleverly interplaying warm vs. cool for emotional tension. The main collision occurs in the center where the bold intensity of red suggests rage intersects with the calmness of blue, creating a visual narrative of conflict and resolution. The upward and downward pressure within the piece suggests a climb that echoes the struggle between the opposing emotions through varied patterns of pulse and braid.</desc>
