<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Static</title>
  <desc id="desc">This composition embodies the tension between clarity and chaos, with bright signal green representing a pulsating core striving for presence amidst the chaotic static gray, which takes up a significant part of the square. Electric blue accents introduce a cool pulse that disrupts the noise, while scarred black and hot magenta evoke the sharp edges of the emotional core. The main contrast occurs in the center, where the signal competes with the surrounding noise, creating a rhythm of pressure and release that mirrors the clash of emotion described in the seed.</desc>
