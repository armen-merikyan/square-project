<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Duality</title>
  <desc id="desc">This artwork explores the juxtaposition of joy and grief through a segmented layout. The palette, featuring warm yellows and oranges mixed with cool deep blues and muted purples, embodies the emotional tension inherent in the contrast. The top half represents joy with a radial pattern that spirals gently, while the bottom half embodies grief through a more chaotic maze design, creating a sense of collision and disruption. The broken edges reflect imperfection and fracture, embodying both the unexpected joy and pervasive grief. Key contrasts emerge along the horizontal divide, where joyful colors vibrate against the somber hues below, illustrating the push and pull of these emotions.</desc>
