<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Chaos and Order</title>
  <desc id="desc">The emotional tone captures the struggle between clarity and confusion, illustrated by contrasting the structured grid with chaotic patterns. The chosen palette—lime, black, electric blue, and magenta—evokes a sense of machine precision versus organic disruption. The main contrast occurs in the edges where chaos invades the targets of clarity, creating a pulse-like rhythm within the 8x8 space, reflecting the inherent tension between symmetry and breakdown, as the darkness juxtaposes with the brightness. Through a fragmented checker pattern against a backdrop of targets, the artwork embodies a story of struggle, with the broken pixels enhancing this narrative of imperfection and collision.</desc>
