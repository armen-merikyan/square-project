<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece explores the emotional dichotomy of softness and severity through a blend of delicate and harsh colors. The use of powder pink and warm white creates a gentle base, while sharp crimson and carbon black introduce severity, emphasizing the tension between vulnerability and protection. The layout, designed to rise upward, symbolizes hope, while the edge sparks evoke the feeling of unexpected interruptions. The collision between soft rain patterns and sharp echo marks generates a dialogue of emotional contrasts, illustrating a push-pull dynamic that resonates with the concepts of guilt and forgiveness.</desc>
