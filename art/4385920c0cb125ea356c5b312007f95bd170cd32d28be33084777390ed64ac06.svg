<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Frequencies</title>
  <desc id="desc">The emotional tone of this piece embodies the clash between clarity (signal) and confusion (noise). The palette mixes signal green and hot magenta to create a vivid narrative of a readable pulse struggling against a backdrop of chaotic static. The main collision occurs along a diagonal axis, where the clean lines of green intersect with the disruptive energy of magenta, representing the tension found in memory and erasure. Shadows of dead black and static gray provide depth and suggest a brooding undercurrent of unresolved emotion, illustrating the push-and-pull dynamic of life's frequencies.</desc>
