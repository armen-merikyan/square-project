<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Ambiguity</title>
  <desc id="desc">The emotional tone juxtaposes defiance and submission, captured through a palette of cosmic indigo, void black, star white, cold gold, and deep teal. The contrast between the darker cold colors (defiance) and the lighter accents (submission) creates an emotional pulse that is both dense and empty, reflecting a struggle. The main collision occurs in the center, where angular patterns of defiance conflict with circular forms of submission, leaving negative space in the corners that adds to the tension.</desc>
