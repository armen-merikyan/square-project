<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonance of Tension</title>
  <desc id="desc">This artwork expresses the emotional duel between defiance and submission. The chosen palette of muted grays and a singular deep navy represents the quiet pressure of conflict, while accents of compressed red and faint peach introduce bursts of energy amidst the monochrome. The left side embodies defiance, utilizing sharp island patterns against a darker backdrop. The right side embodies submission, with softer, stair-like patterns flowing downward. The collision occurs primarily in the center, where the tension sharply contrasts the structured resistance and fluid surrender. The arrangement symbolizes an uneven balance, with an intentional use of broken pixels to echo disruption and imperfections arising from the struggle.</desc>
