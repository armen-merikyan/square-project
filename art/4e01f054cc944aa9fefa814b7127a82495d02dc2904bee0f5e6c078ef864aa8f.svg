<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone encapsulates a struggle between desire, represented by a palette of saturated hues, and the emptiness denoting lack and restraint. The palette, consisting of hot coral and blood orange, symbolizes warmth and craving, while charcoal and hollow blue signify the void and containment. The main collision occurs in the center, where vibrant tones ripple outward, clashing with the muted 'hinge' patterns at the edges that symbolize containment. This duality emphasizes the tension and overflow of desire, balancing with the quiet pressure of emptiness, creating an organized chaos in the structure, reflecting the seed's thematic essence.</desc>
