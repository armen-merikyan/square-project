<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symphonic Discord</title>
  <desc id="desc">This piece captures the tension between confusion and clarity. The palette of black, dark violet, soft gold, and pale green illustrates a spectrum of emotions — the deep darkness symbolizes confusion and despair, while the soft gold offers a glimmer of clarity. The central pixel shows layers of dense gold breaking apart into the contrasting violet and black edges, echoing the idea of shifting clarity amidst chaos. The jagged edges and broken pixel placement emphasize imperfection and the rupture of symmetry, creating a dynamic interplay of density and negative space that speaks to the push and pull of conflicting emotions.</desc>
