<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Disarray</title>
  <desc id="desc">The emotional tone of the piece is derived from the contrast between panic and control. The palette, with navy and black grounding the work alongside a single white and dim cyan, reflects a sense of depth and tension. The layout flows from a corner, representing the invasion of chaos into an ordered space. The use of patterns—crosshatch for control and a maze for panic—creates a friction that highlights the central theme of symmetry versus brokenness. The collisions are noticeable in the stark color contrasts and uneven distribution, with darker areas pulsing against lighter ones, suggesting emotional turbulence. This arrangement embraces the abstract qualities of the seed, turning the conflict of order and chaos into a color pattern that invites contemplation.</desc>
