<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This piece captures the emotional tug-of-war between pressure and quiet. The palette features dark navy and compressed red representing dense pressure, clashing against the lightness of off-white and faint peach that symbolize softness and clarity. The composition showcases a radial pattern emerging from the bottom-left corner, where the denser colors crowd, creating a sense of weight. The quiet field gradually transitions towards the right, breaking apart into softer hues. This juxtaposition evokes a feeling of tension versus tranquility, with intentional breaks in the pixel arrangement symbolizing the shattering and regeneration of thought.</desc>
