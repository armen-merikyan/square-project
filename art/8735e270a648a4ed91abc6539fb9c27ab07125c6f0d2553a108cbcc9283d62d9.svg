<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tenderness and Rage</title>
  <desc id="desc">This artwork embodies the emotional tension between tenderness and rage through a high-contrast palette of warm red and cool blue. The anger is represented by irregular sparks of red, interrupting a serene, climbing barcode pattern in pale blue and black. The center symbolizes a confrontation where rage disrupts the quiet flow, while the edges retain a sense of muted calmness. The collision is centered, enhancing the narrative of internal struggle and the push and pull between protection and aggression. This tension is further accentuated by broken pixels, adding to the chaotic nature of the confrontation, reminiscent of guilt and forgiveness in conflict.</desc>
