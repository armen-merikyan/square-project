<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Tension</title>
  <desc id="desc">This artwork explores the emotional clash between control and surrender through the use of a stark palette that signifies deep contrast. The chosen colors of cosmic indigo and cold gold evoke feelings of tension and warmth, respectively, while the addition of void black serves as a grounding element. The arranged pixels illustrate the 'thick outline' of control at the edges, clashing with the softer tones of surrender that fill the center, embodying an 'overfilled' feel. Main contrasts collide in the middle, creating a visual tension that embodies the emotional push and pull suggested by the seed text.</desc>
