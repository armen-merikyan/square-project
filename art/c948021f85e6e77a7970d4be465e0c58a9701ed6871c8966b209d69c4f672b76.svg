<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Control and Panic</title>
  <desc id="desc">The emotional tone depicts a struggle between panic and control, depicted through the use of contrasting colors in horizontal and vertical stripes. The palette, consisting of sepia, tan, dust gray, and faded blue, works to encapsulate the theme of broken memories suggesting a nostalgic yet disorienting feeling. The main collision occurs in the center, with darker tones emanating outwardly, evoking a sense of chaos battling for structure. The broken pixels add an element of imperfection, enhancing the feeling of unease, as they disrupt the otherwise organized flow of lines. Overall, the composition reflects a gradual transition from a state of calmness to an eruption of chaotic tension, visually narrating an inward spiral of emotion.</desc>
