<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Release</title>
  <desc id="desc">This artwork explores the tension between quiet and pressure through sharp contrasts and soft fields. The chosen palette—comprised of muted off-white, dust gray, faint peach, and stark compressed red against a dark navy—reflects both emotional intensity and calm. The pressure builds on the left side with darker colors that create a sense of weight, while the right transitions into softer, lighter hues, suggesting a release into quietness. The layout descends like falling pixels, echoing the emotional journey from high density to wide, open space, while intentional broken pixels add imperfection, reflecting the complexity of clarity and confusion.</desc>
