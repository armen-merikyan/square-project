<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotionally Unraveled</title>
  <desc id="desc">This artwork explores the contrasting emotional realms of joy and grief, reflecting their interplay. The top half is vibrant, dominated by bright yellows and oranges, symbolizing the expanding warmth of joy. The bottom half transitions to muted purples and deep blues, embodying the heaviness of grief. The pattern employs broken dots for grief, creating a fragmented feel that clashes with the structured, teeth-like patterns of joy. The lack of clear outlines creates a sense of fluidity between these states, echoing their coexistence.</desc>
