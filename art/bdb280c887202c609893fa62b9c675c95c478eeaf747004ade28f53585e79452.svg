<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmony in Dissonance</title>
  <desc id="desc">This piece explores the emotional dichotomy of joy and grief through color patterns and contrasts. A warm palette of yellow and orange represents joy, contrasting against the deep blue and muted purple that reflect grief. The central diamond shape symbolizes the root of emotions, surrounded by fragmented patterns that reflect the struggle between the two sentiments. The left-weighted design suggests an imbalance, where warmth attempts to pull forward but collides against the cool, dense backdrop. This creates a pulse of emotion, while maintaining negative space that allows for breath and contemplation.</desc>
