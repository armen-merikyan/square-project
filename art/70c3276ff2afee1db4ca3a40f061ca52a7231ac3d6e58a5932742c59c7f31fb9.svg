<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">The emotional tone combines rage and tenderness, suggesting a struggle between raw, jagged edges and soft, nurturing spaces. The palette of red, black, pale blue, and white captures this dichotomy, with red representing rage's intensity, and pale blue and white embodying tenderness and calm. The arrangement features layered bands where the vibrant red interrupts muted blacks and soft blues to illustrate a dominant emotion, portraying tension and collision in each pixel's placement. Main contrasts occur in the center, where radial rage patterns collide with the gentler, ring-like tenderness patterns, emphasizing conflict yet creating a visual harmony through their interaction. This composition tells a story of emotional fracturing, peace amid turmoil, and the interplay of contrasting forces.</desc>
