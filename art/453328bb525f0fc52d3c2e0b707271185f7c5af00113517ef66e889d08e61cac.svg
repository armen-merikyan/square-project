<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This piece captures the emotional tension between tenderness and rage through a contrasting palette featuring saturated reds representing rage and soft blues embodying tenderness. The arrangement focuses on dense clusters of red in the outer borders, portraying an intense emotional pressure, while the inner area transitions into softer blue dotted patterns, suggesting release and calmness. The collision occurs in the central rows where the vibrant red 'rain' patterns sharply contrast with the serene blue 'dots', creating a dialogue of warmth against coolness and chaos against tranquility.</desc>
