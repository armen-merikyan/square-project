<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tension</title>
  <desc id="desc">This composition embodies the emotional tension between rage and calm through a stark contrast of colors and patterns. The palette emphasizes anger with deep reds and sharp blacks while introducing calm through cooler pale blues and whites, framing the chaos within a calm center. The collision occurs prominently in the border, where the harsh maze-like patterns interact with the smooth, structured ladder of the inner core. This juxtaposition symbolizes the struggle between containment and overflow, evoking a powerful visual narrative of disrupted serenity and emotional turmoil.</desc>
