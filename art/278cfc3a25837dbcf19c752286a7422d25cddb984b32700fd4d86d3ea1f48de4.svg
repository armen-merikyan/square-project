<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This 8x8 composition embodies the emotional tension between tenderness and rage, contrasting warm and cool colors. The palette employs deep blacks to represent rage, interspersed with soft pale blues to symbolize tenderness. The arrangement features horizontal and vertical warm stripes clashing against cooler segmented patches, creating a sense of collision at the center. Broken pixels disrupt the flow, echoing the imperfect nature of raw emotions, while maintaining enough negative space to ensure each element breathes. This design channels the seed into an abstract narrative of emotional push and pull, with the intense colors creating an atmosphere of urgency and quiet reflection.</desc>
