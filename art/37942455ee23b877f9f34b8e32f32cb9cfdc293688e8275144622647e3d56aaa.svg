<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Shelter</title>
  <desc id="desc">The emotional tone juxtaposes safety (grounded, stable) with exposure (vulnerable, open). The palette combines calming greens and browns with whites and blues to signify a tranquil center contrasted by an echoing outer layer. The collision happens in the center where a lighter texture of vertical lines (exposure) meets the denser, ladder-like arrangement (safety) creating a sense of both pressure and release. The arrangement, combined with broken pixel placements, conveys the underlying tension and fragility of this duality.</desc>
