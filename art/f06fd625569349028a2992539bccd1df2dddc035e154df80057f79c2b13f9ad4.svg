<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone contrasts love and betrayal, depicted through a palette of warm pinks and reds against cool gray and dark maroon. The split layout highlights the balance and imbalance of these emotions, with the top half emitting warmth and connection, while the bottom half disrupts this harmony with colder tones symbolizing betrayal. The placements create a dynamic rhythm; broken dots represent love with warmth, and frames express betrayal in a cold, structured manner, evoking tension and unresolved emotions. The strategic use of negative space enhances the feeling of emptiness as well as passion, drawing the eye towards the tension between clusters of color and areas of calm.</desc>
