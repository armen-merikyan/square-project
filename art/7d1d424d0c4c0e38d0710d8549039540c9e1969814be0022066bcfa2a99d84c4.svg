<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Restraint</title>
  <desc id="desc">The emotional tone of this piece speaks to the conflict between desire's warm pull and the cold edges of restraint. The palette combines saturated reds and muted creams with dark blacks and grays, illustrating this internal struggle. The overlapping patterns represent the push-pull dynamic of yearning and confinement, creating a palpable tension. The arrangement is deliberate in how it applies color: warmth dominates one side, while muted tones suggest boundaries on the opposite, enhancing the notion of colliding feelings. The presence of broken pixels introduces imperfection, echoing the complexity of love and betrayal.</desc>
