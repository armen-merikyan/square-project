<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension between Light and Shadow</title>
  <desc id="desc">This artwork embodies the emotional contrast of joy and grief through a dynamic interplay of colors, reflecting the push and pull between bright hues and their muted counterparts. The warm tones of orange and yellow evoke a sense of joy, while deep blues and muted purples represent grief and calmness. Centering the brighter colors amidst darker shades allows for a visual ‘bridge’ where light attempts to pierce through shadows. The diagonal rise in arrangement captures the idea of rising signals intertwined with zigzagged edges, creating a feeling of asymmetric disruption and echoing emotional tension.</desc>
