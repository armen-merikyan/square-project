<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Amidst Static</title>
  <desc id="desc">This composition explores the tension between clarity and chaos as represented by a sharp, bright cluster of colors in the center battling against a background of muted tones. The palette incorporates deep navy and black for a dense, heavy background that evokes a sense of noise, while the white provides a stark contrast, symbolizing the persistent signal striving for attention. Broken pixels scattered throughout add a sense of imperfection, suggesting echoes and interferences in memory. Overall, the pattern is designed to communicate a struggle—one recognizable pulse surrounded by a swirling static field, embodying the fight between clarity (signal) and confusion (noise).</desc>
