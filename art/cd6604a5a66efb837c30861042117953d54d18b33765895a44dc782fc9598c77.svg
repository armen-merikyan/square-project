<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Resilience</title>
  <desc id="desc">This abstract composition explores the contrasting emotions of vulnerability and strength through a carefully selected palette and pattern interplay. The colors evoke resilience with a moss green base, suggesting a dense foundation, juxtaposed against bone white and rust to represent fragility and exposure. The layout creates a sense of spaciousness, with a dominant moss green highlighting strength while fragmented patterns of negative cross mimic the vulnerability of a thin shell. The intersecting patterns symbolize connections and alienation, illustrating the tension between shelter and exposure. The collision occurs in the center, creating a focal point that captures the viewer's attention amidst the calm and chaos. This work reflects emotional complexity, aiming to leave space for contemplation amidst the bursts of color.</desc>
