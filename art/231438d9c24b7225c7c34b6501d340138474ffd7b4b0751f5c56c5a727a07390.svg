<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Opposites</title>
  <desc id="desc">The emotional tone captures the essence of longing and resolve, with longing represented by glitch patterns and resolve through scars, creating a dynamic dance of tension. The chosen palette features warm coral and soft amber to evoke longing, contrasted against cold slate and blue black for resolve, symbolizing emotional depth and the tumultuous nature of personal conflict. The collision occurs in the center, where warm and cool colors intermingle, indicating the struggle and integration of feelings. The layout emphasizes a halo void, where the spread of colors leads to a sense of expansive negativity, allowing breathing space that hints at the inability to fully resolve conflicting emotions.</desc>
