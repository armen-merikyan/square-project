<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">This artwork explores the emotional tension between rage and calm, represented through a palette of warm reds juxtaposed with cooler pale blues and stark blacks. The bright red pixels symbolize explosive emotions that breach boundaries, while pale blue and black offer a soothing counterbalance, creating tension. The primary collision occurs in the central-left portion, where the chaotic ladder pattern of red 'erupts' into the calm horizontal scars of blue, illustrating the raw energy of noise against quietness. Broken pixels throughout bring imperfect beauty, reinforcing the theme of tension and emotional disruption.</desc>
