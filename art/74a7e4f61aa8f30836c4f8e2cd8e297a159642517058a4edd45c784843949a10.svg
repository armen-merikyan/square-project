<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork captures the emotional juxtaposition of desire and emptiness through a palette that embodies warmth and coolness. The predominant use of hot coral and blood orange suggests the intense pull of desire, while the presence of charcoal and hollow blue represents the constraints of emptiness. The design features an off-center buildup of stacked colors (desire) contrasted against crosshatched, faint grid-like spaces (emptiness), creating a feeling of tension and unresolved push. The broken pixels add imperfection, symbolizing cuts in our yearning. Overall, the arrangements of colors evoke a spiral movement toward the center, representing a rising signal amidst the vast emptiness.</desc>
