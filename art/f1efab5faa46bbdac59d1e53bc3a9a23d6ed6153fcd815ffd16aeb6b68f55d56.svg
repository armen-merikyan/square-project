<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between States</title>
  <desc id="desc">This composition explores the emotional duality of fear and hope through a palette of contrasting colors. The dark tones represent fear, creating a dense, murky layout, while soft gold and pale green hues work against these to suggest the presence of hope, represented as small, glowing accents. The sharp edges of the dark sections symbolize the fear's encroachment, while the warm light is positive and uplifting, creating a rising feeling in the center. The zigzag patterns mirror the movement between these contrasting emotions as they collide and integrate, embodying the complexity of our emotional landscapes.</desc>
