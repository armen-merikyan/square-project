<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Relief</title>
  <desc id="desc">This artwork explores the emotional tension between pressure and quietude, represented by a clash of densely packed colors at the lower edge and lighter tones that emerge towards the top. The chosen palette of muted tones like dust gray and faint peach contrasts with the darker compressed red and dark navy, embodying a soft horizon against a tight center. The layout follows the stacked bands, depicting an ascending flow from pressure to release. The symmetry and collision occur mainly at the midpoints, creating a visual argument between stability and disruption, resembling shadows and light in an abstract landscape.</desc>
