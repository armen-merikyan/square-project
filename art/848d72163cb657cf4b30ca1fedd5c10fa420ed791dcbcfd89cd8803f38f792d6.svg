<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Paths</title>
  <desc id="desc">This abstract piece explores the emotional juxtaposition of longing and resolve through a clash of structured patterns. The color palette combines soft pastel tones of pale mint and soft sky with deeper storm gray and near black, suggesting a push and pull between calmness and tumult. The two opposing broken dot patterns create moments of density interspersed with quieter spaces, representing the push for connection against the backdrop of emotional distance. The main collision occurs in the center, where the density of colors interrupts the flow, symbolizing the struggle between desire and completion.</desc>
