<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Dissonance</title>
  <desc id="desc">This piece captures the emotional tension between longing and resolve through the contrasting use of color and pattern. The palette of signal green and electric blue against deep blacks evokes a sense of hope amidst chaos. The central collision of darker tones creates a sense of weight and pressure, symbolizing resolve. Meanwhile, lighter greens and blues attempt to break through, embodying longing. The patterns 'crack' and 'hinge' visually represent the struggle of these emotions, with cracks dispersing from the center and solid hinges providing a framework, creating a dynamic interplay of density and emptiness.</desc>
