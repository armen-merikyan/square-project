<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">The emotional tone reflects the juxtaposition of envy and gratitude, embodying a tension between heaviness and lightness. The palette of pink, red, gray, and dark maroon captures the intensity of emotions—warm hues representing gratitude countering the cool grays of envy, creating a vibrant contrast. The layout unfolds an outer border of structured symmetry (mirroring envy) while the chaotic inner frame bursts with flames of warmth (gratitude). The broken pixel elements reflect imperfections within these emotions, and the negative space allows moments of calm amidst emotional pressure. The arrangement conveys an echo of disturbance interrupted by peaceful moments, allowing the viewer to sense a tension that is both unsteady and contemplative.</desc>
