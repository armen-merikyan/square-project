<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This piece captures the tension between joy and grief through a color palette that juxtaposes warm yellows and oranges against deep blues and muted purples. The left-weighted layout symbolizes the pull of grief, while the right side, filled with joy tones, suggests an upward movement. The flow outward from the center creates a pulse-like rhythm, allowing more empty space to evoke a feeling of longing. Broken pixels emphasize imperfection, enhancing the emotional contrast between symmetry and disruption.</desc>
