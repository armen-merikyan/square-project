<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmonic Conflict</title>
  <desc id="desc">This piece embodies the tension between fear and hope through contrasting dark and light colors. The dark corners in the palette represent fear, while the soft gold and pale green serve as symbols of hope and possibility. The left side, denser and more chaotic, embodies the weight of fear as it collides with the lighter, upward-flowing right side, suggesting a transition towards hope. The layout reflects a mirrored effect with intentional broken pixels to evoke a feeling of imperfection, enforcing the idea of flux within the emotional landscape.</desc>
