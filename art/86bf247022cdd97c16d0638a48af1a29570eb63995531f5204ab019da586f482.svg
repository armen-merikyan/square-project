<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone embodies the tension between vulnerability and strength, represented by a soft core surrounded by stronger hues as a protective barrier. The palette features 'shelter green' and 'warm brown' contrasting softly against 'cold white' and 'open blue', suggesting a landscape of emotions where one feels both exposed and sheltered. Main contrast occurs at the center where warm browns collide with colder tones, echoing feelings of pressure and release. The resulting pattern takes form through broken pixels suggesting imperfection, with scattered repairs emphasizing resilience and fragility.</desc>
