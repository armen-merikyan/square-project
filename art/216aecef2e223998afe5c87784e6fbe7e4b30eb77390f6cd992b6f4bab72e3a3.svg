<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Frequencies</title>
  <desc id="desc">This artwork embodies the tension between trust and suspicion through a split layout. The left half, representing trust, uses soft pink and muted gray tones that suggest warmth, stability, and a ripple of reassurance. In contrast, the right side embodies suspicion with harsh reds and dark maroon, employing radial patterns to evoke disturbance and interruption. The collision occurs at the vertical division line, where the pink barely bleeds into the skeptical tones, creating a compelling visual tension. A few broken pixels add intentional imperfections, symbolizing the fragility inherent in trust. Together, these elements create an abstract map of emotions that resonate with the seed's themes of signal versus noise, illuminating how trust and suspicion coexist and collide.</desc>
