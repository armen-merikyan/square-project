<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This artwork embodies the push-pull dynamic of defiance and submission through the use of sharp contrasting colors and jagged shapes. The central area reflects defiance with bold reds and blacks, creating a jagged disruption in an otherwise soft echo of pale blues and whites, representing submission. The clash occurs at the center, where these colors fuse and create tension, suggesting conflict and resolution while leaving ample negative space to highlight the emotional overload. The pattern evokes a spiral of chaos resolved into stillness, illustrating the struggle between resistance and yielding.</desc>
