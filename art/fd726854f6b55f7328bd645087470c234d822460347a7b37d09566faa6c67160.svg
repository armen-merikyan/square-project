<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensions of Tranquil Disturbance</title>
  <desc id="desc">This artwork embodies the emotional tension between restlessness and peace, reflecting a visual argument through contrasting patterns. The palette of deep navy and black suggests a calm foundation, while dim cyan introduces pulses of unease, echoing the idea of fleeting memories. The composition features dense clusters of darker colors toward one corner, symbolizing the weight of restlessness, which gracefully transitions into lighter tones, embodying peace, across the canvas as if escaping into the void. The jagged outlines of scar-like interruptions create a dialogue between the controlled calm and chaotic motion, visually representing 'closed corners' and the 'diagonal argument.'</desc>
