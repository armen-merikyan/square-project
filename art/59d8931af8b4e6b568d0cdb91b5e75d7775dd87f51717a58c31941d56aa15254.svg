<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone of this piece explores the tension between love and betrayal. The chosen palette of warm pinks and reds juxtaposes dark maroon and gray to signify the coexistence of passion and pain. The contrast is most vivid in the diagonal split where warm colors clash against cooler grays, creating an interruption in flow that reflects emotional turmoil. Each row features a pattern that mirrors this sentiment by layering colors in a way that creates a sense of pressure at one side while maintaining open space on the other, symbolizing the feeling of being trapped in an empty room. The ‘broken pixels’ in the design add to the feeling of imperfection, echoing the theme of betrayal subtly within the abstract structure.</desc>
