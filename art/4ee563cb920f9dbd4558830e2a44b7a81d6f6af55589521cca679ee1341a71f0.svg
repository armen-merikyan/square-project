<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weighted Tension</title>
  <desc id="desc">This composition explores the emotional dance between relief and dread, balanced yet disrupted. The palette of warm burnt oranges and dark reds contrasts sharply with the heavy charcoal, reflecting the internal struggle. The dense top half portrays dread, using a split-screen pattern, while the lighter, crosshatched lower half symbolizes relief, creating visual tension. The jagged edges introduce imperfection, emphasizing the possible breaking of symmetry and creating a visual echo of conflict throughout the piece. The overall flow is top-heavy, suggesting a struggle between pressure and release.</desc>
