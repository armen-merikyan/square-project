<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Affection</title>
  <desc id="desc">This piece explores the emotional tension between love and betrayal, using a warm palette of pinks and reds contrasted with cold grays and dark maroons. The left side embodies love through a staircase pattern, where shapes rise warmly, while the right features a grid representing betrayal, with sharp edges disrupting the symmetry. The slight imperfections in the pattern symbolize the chaos in relationships, presenting a visual clash that evokes both attraction and disillusionment.</desc>
