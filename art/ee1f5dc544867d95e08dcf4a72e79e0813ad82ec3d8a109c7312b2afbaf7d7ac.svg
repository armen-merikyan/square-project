<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotion</title>
  <desc id="desc">This composition explores the tension between rage and calm. The outer border embodies calmness with muted cool tones, while the inner 4x4 section erupts with vibrant reds, representing the rage that intrudes upon tranquility. The symmetrical structure is disrupted by radial patterns and broken pixels that symbolize the conflict within the emotional landscape. The palette, drawn from contrasting reds and cool blues, establishes a clear emotional divide, with intense reds dominating the central area, creating a central clash. This design encapsulates the essence of contained chaos breaking through stillness.</desc>
