  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone reflects a tension between safety and exposure. The color palette features warm brown and soft shelter green contrasting with cold white and open blue, suggesting a protective boundary around an exposed core. The main collision occurs with the warm tones clashing against the cool, creating a feeling of pressure as marks coil around an off-center point, echoing the duality of protection and vulnerability.</desc>
