<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This piece embodies the conflict between joy and grief through its contrasting palette and layout. Bright yellows and oranges represent joy, symbolizing light and open spaces, while the deep blues and muted purples convey the weight of grief. The outer layer utilizes a dense grid pattern for grief, contrasted with a target-like arrangement in the center for joy, creating a sense of tension. The thin outline acts as a boundary, enhancing the emotional division yet highlighting the coexistence of these feelings. The disruption in symmetry and the intentional placement of broken pixels evoke feelings of fragmentation and memory.</desc>
