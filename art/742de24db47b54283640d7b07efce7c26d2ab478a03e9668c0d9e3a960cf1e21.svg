<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Silent Pulse</title>
  <desc id="desc">This piece embodies the emotional tug-of-war between longing and resolve. The color palette of off-white and dark navy contrasts softness with depth, evoking a sense of quiet pressure against the tension of unresolved emotion. The layout rises from bottom to top, suggesting hope or escape. The collision between the flowing veil pattern of longing and the structured split-screen resolve creates a dynamic interplay, symbolizing broken bridges through the employment of intentional disruptions and broken pixels throughout. These disruptions mirror the themes of repair versus damage and the fragility of the pulse—reflecting life's inherent conflicts.</desc>
