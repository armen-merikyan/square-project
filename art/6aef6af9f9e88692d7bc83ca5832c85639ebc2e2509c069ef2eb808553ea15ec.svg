  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork explores the tension between desire and emptiness through a dynamic interplay of colors. The palette includes vibrant hues representing desire, such as hot coral and blood orange, juxtaposed with the cooler tones of charcoal and hollow blue, symbolizing emptiness. The layout features a corner block where energy is constrained, suggesting a push against the edges while maintaining quiet pressure in negative space. The contrasting zones create a visual collision that embodies the struggle between overflowing desire and the boundaries we enforce.</desc>
