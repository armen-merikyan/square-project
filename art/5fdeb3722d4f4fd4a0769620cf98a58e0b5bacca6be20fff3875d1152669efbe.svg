<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Longing</title>
  <desc id="desc">This composition captures the emotional tension between longing and resolve. The palette of warm yellow and orange juxtaposed against the cool deep blue and muted purple reflects the push and pull between warmth and distance. The central diagonal flow signifies movement—either towards resolution or an abyss of unresolved feeling. The broken edges introduce imperfection, hinting at a disrupted journey. The negative space creates a sense of quiet amidst the pulsating colors, echoing the struggle of intimacy and distance, while the collision of patterns reflects the complexity of human emotion.</desc>
