<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Wholeness and Fracture</title>
  <desc id="desc">This artwork captures the emotional contrast of longing and resolve. The palette consists of off-white and faint peach for warmth and lightness, contrasting with dark navy and compressed red to evoke a sense of tension. The left half (longing) employs negative cross patterns of muted tones, while the right half (resolve) showcases patchwork of stronger colors. This split vertical layout represents the dichotomy of emotional states, with jagged edges suggesting interruptions and brokenness, while a few selected broken pixels (in dark navy and gray) disrupt the structure, echoing the theme of damage and repair.</desc>
