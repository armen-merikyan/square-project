<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ember and Radiance</title>
  <desc id="desc">This composition captures the tension between spark and ash, depicting a battle between ignition and fading. The chosen palette of moss green, bone white, rust, stone gray, and small gold reflects resilience and fragility, where moss green and gold dominate the canvas, representing hope and brilliance. The pattern ‘pressure_band’ creates a clustered density at the bottom rising into a more sparce, lighter area, representing hunger for light and sustenance. The main contrast occurs diagonally, with stark gray ashes colliding against vibrant bursts of gold, echoing the themes of memory versus erasure.</desc>
