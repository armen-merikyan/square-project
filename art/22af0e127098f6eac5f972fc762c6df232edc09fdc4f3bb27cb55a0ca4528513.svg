<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The artwork embodies a journey through emotional landscapes, juxtaposing feelings of envy and gratitude. The outer border in deep blue symbolizes the weight of envy, contrasting against a core of muted purple in a target pattern representing gratitude. The flow leads diagonally upwards, suggesting a release from tension. The palette of yellows and oranges offers warmth against the deep tones, while broken pixels introduce imperfection, embodying the collision of emotions. Negative space is preserved to allow each color to resonate, reinforcing the idea of unresolved tension and eventual release.</desc>
