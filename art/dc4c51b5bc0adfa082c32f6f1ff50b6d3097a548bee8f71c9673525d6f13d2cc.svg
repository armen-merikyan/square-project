<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork embodies the emotional tension between vulnerability and strength by creating a split composition. The left side uses soft, muted colors to signify vulnerability, while the right side employs stronger, more defined colors to represent strength. The contrast occurs along the vertical divide, symbolizing a horizon where exposure meets safety. The palette—featuring delicate powder pinks, warm whites against the severity of carbon black and sharp crimson—further enhances this duality. The choice of patterns, with stripes on the 'strength' side and a grid on the 'vulnerability' side, encounters in the center, reflecting the interplay between these opposing emotions. Broken pixels introduce imperfections, embodying the unpredictable nature of safety and exposure.</desc>
