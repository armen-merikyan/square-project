<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece captures the emotional tension between emptiness and desire. The palette strategically contrasts warm, saturated colors symbolizing desire with cool, muted tones representing emptiness. The rising signals embedded within the layout embody a spiraling tension that hints at an urgent yearning restrained by a faint perimeter—the thick edges encapsulate the feeling of containment. Broken pixels disrupt the pattern, creating intentional imperfections that evoke chaotic moments amidst stillness. The primary collision occurs off-center, creating a dynamic imbalance that invites the viewer to explore the interplay of warmth and coolness.</desc>
