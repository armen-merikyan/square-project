<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This piece reflects a complex emotional interplay between longing and resolve. The predominantly anchored hues of deep electric blue and black signify strength and resolution, forming a firm base. In contrast, vibrant magenta introduces warmth and hints of unresolved longing, creating a stark emotional tension. The placement of the colors in diagonal patterns suggest motion and flow, which resonates with the concepts of cross-currents and falling. The halo border surrounds the core, enhancing the sense of separation between the densely packed areas and the quiet emptiness, where broken pixels serve as intentional disruptions, adding depth to the composition.</desc>
