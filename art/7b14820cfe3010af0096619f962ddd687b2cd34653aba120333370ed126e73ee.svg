<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This piece embodies the tension between desire and restraint through the juxtaposition of warm and muted colors. The palette features deep hues of red oxide and blackened plum as dominant forces, interspersed with muted cream and iron gray to represent restraint. Broken pixels introduce imperfection and interruption, reinforcing the concept of desire pressing against sealed edges of limitation. The dense island of saturation against a quieter field conveys emotional pressure beautifully, marking a landscape of longing and containment.</desc>
