<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dualities in Flux</title>
  <desc id="desc">This composition reflects the emotional tone of joy and grief as a dynamic balance of contrast. The palette combines bright yellows and oranges representing joy with deep blues and muted purples embodying grief. The left side, with crosshatch patterns, suggests spark and expansion, while the right side features dense flame-like textures, signifying heaviness. The deliberate broken pixels create imperfection, further emphasizing the emotional turbulence. The layout separates these emotions, inviting the viewer to explore the tension and release between two opposing forces.</desc>
