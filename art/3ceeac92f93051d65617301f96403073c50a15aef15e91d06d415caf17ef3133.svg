<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Knowing and Seeking</title>
  <desc id="desc">This piece grapples with the emotional contrasts of certainty, represented by bold, saturated colors and structured stripes, juxtaposed against the softer textures and exploratory forms of curiosity, expressed through crosshatch patterns. The color palette consists of deep reds and grays to evoke a sense of urgency yet comfort, while the dark maroon threads balance the exuberance. The main collision occurs in the central rows where the rigidity of certainty meets the fluidity of curiosity, suggesting a dynamic tension. Each broken pixel adds an element of imperfection, further symbolizing the unpredictability of exploration within structured confines.</desc>
