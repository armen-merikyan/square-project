<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork captures the interplay between vulnerability and strength, represented through a dynamic collision of colors. The palette of soft rose clay and cool blues evokes intimacy intertwined with distance, reflecting the emotional duality of the seed. A vibrant gold accent contrasts sharply against muted fields, emphasizing the tension between exposed vulnerabilities and protective edges. The central area is more saturated, representing strength, while the edges fade to softer hues, illustrating a gradual weakening—as if the strength is bolstered by a boundary that is fragile but necessary. The broken pixels introduce intentional disruptions, symbolizing moments of vulnerability within a structure of strength. Overall, the abstract layers and chaotic arrangement embody a struggle for control, culminating in the formation of an emotional narrative without the need for literal representation.</desc>
