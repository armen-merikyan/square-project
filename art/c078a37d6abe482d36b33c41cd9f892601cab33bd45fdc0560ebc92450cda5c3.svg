<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Amidst Static</title>
  <desc id="desc">The emotional tone reflects a struggle of clarity (signal) against a backdrop of chaos (noise). The palette of navy and dim cyan conveys a sense of depth and isolation, while the subtle white provides sparks of clarity. The main contrast occurs at the center where clean channels (signal) intersect with barcodes of interrupted static (noise), suggesting a pulse that fights to maintain its presence inside the surrounding confusion. The broken pixels signify disruptions and memory fragments, making the viewer aware of moments that interrupt the flow.</desc>
