<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Symmetry</title>
  <desc id="desc">This artwork embodies the emotional contrast of defiance and submission through a bold use of black and red to signify resistance within an expansive pale blue and white background representing softness and receding. The checker patterns roll through the center, indicating a strong, unmoved core, while the fault line patterns fade into edges, suggesting the soft collapse and intrusions of submission. The layout of eroded symmetry allows for a collision that occurs from the center towards the edges, establishing a narrative of conflict between strong emotional energy and surrendering quiet. Broken pixels disrupt the symmetry, echoing imperfection and vulnerability, while the chosen palette emphasizes tension and deliverance through the interplay of darkness and light. Overall, the arrangement creates a dynamic and engaging visual story without relying on concrete imagery.</desc>
