<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos: A Dance of Emotions</title>
  <desc id="desc">The emotional tone reflects a tug of war between panic and control, expressed through sharp contrasts and a structured layout. The palette of black, dark violet, soft gold, and pale green evokes a sense of fear and hope, with black and dark violet framing the chaotic aspect while soft gold and pale green embody the control. The main collision occurs where the softer colors intersect with the darker ones, creating tension that illustrates the struggle between the perceived chaos of panic and the desire for control. The orderly stripes merge into a radial disruption, representing the spark of chaos within an otherwise controlled setting.</desc>
