<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory vs Motion</title>
  <desc id="desc">This piece embodies the tension between tenderness and rage, represented by a palette that juxtaposes the starkness of red (rage) against the gentleness of pale blue (tenderness). The quiet channel layout creates a path of calm through the chaotic splatter of colors, evoking both the feels of unresolved emotions and the journey through them. The patterns, comprising jarring splits and soft dots, intentionally collide in the center, where the emotional clash is most pronounced. The use of broken pixels throughout the piece adds an element of disruption, symbolizing the scars we carry from our emotional battles, while allowing space for quiet reflection amidst the chaos.</desc>
