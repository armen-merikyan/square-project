<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Connections</title>
  <desc id="desc">This piece embodies the emotional tension between loneliness and connection through contrasting colors and spatial arrangements. The palette of black, pale blue, and white reflects deep isolation (black) while also hinting at potential connections (pale blue and white). The thick outer edge symbolizes protection yet creates a barrier, emphasizing loneliness. Within the center, a lighter contrast disrupts the darkness, suggesting fragile connections that emerge amidst isolation. Broken pixels add imperfection, while the zigzag flow creates a dynamic feeling, reflecting the conflict of being both hidden and exposed. The design iterates on the concept of a core that struggles against the periphery, embodying the emotional complexity of the seed.</desc>
