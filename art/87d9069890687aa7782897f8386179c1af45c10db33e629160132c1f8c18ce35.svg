<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">This piece embodies the emotional interplay between defiance and submission, where the central tension feels dense and saturated against a backdrop of softer hues. The use of deep wine and soft gold creates a striking contrast that symbolizes defiance, while warm ivory and ash gray represent submission. The placement of the bolder colors towards the center suggests an inward spiral of pressure, colliding with the quieter spaces around it to highlight moments of tension and release. The broken pixels disrupt the smooth flow, adding an element of imperfection indicative of conflict. The 10 percent negative space acts to accentuate these contrasting emotional landscapes.</desc>
