<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Climbing Through Collisions</title>
  <desc id="desc">The emotional tone juxtaposes tenderness and rage, reflecting an internal conflict illustrated by the chosen palette of saturated reds and soft blues. The patterns of radial tenderness meet the sharp dots of rage, creating a dynamic collision at the center, signifying the struggle between hope and despair. This layering reflects the ascent of emotions, with darker tones grounding the lighter shades, echoing the weight of guilt and the release of forgiveness. The arrangement invites a sense of movement and tension, perfect for the climbing layout.</desc>
