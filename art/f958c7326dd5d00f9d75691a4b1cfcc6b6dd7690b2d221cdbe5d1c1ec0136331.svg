<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone of this piece juxtaposes joy and grief, embodying a dynamic flow that rises from grief’s heavy blues to joy’s bright yellows. The palette reflects this emotional duality: deep blues symbolize grief while yellows and oranges signify joy and warmth. The contrast occurs through pixel placement, with grief dominating the lower part of the composition—depicted in deep blue and muted purple—against the brighter, warmer colors of joy occupying the upper quadrants. Hard edges separate these colors, creating a clear boundary that enhances the tension of two contrasting emotions. The stair-step rhythm of color placement steps upward to invoke joy while evoking feelings of interruption and collision with grief at the base, creating an abstract representation of life's emotional push-and-pull.</desc>
