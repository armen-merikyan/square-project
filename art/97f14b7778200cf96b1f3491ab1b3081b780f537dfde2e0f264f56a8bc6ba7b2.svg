<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Echoes</title>
  <desc id="desc">The artwork explores the emotional tension of safety and exposure through a dynamic interplay of colors. The palette includes warm browns and soothing greens symbolizing shelter, contrasted by pale soft whites and open blues depicting exposure. The balance tips towards safety (approx. 65%) while allowing exposure to underlie the composition, creating a visual dialogue. The stark contrast occurs in the center, where shades collide, reflecting the conceptual split; borders are rendered softly to signify vulnerability yet are framed tightly suggesting protection. This pixel arrangement evokes feelings of weight against lightness, pressure against release, embodying the essence of the seed.</desc>
