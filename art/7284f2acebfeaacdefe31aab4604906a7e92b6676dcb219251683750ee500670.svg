<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This piece captures the delicate balance between vulnerability and strength, visualized through an exposed center that contrasts layered colors symbolizing shelter. The warm palette of hot coral and blood orange represents strength, while dust pink and hollow blue illustrate a sense of vulnerability. The dominant flow from bottom to top echoes the themes of rising vs. falling, creating a visible collision that draws the eye towards the center. The layout forces an emotional passage where colors bleed into one another, suggesting conflict but also harmony. Broken pixels intermittently disrupt the patterns, emphasizing the scar-like quality of vulnerability. The interplay of muted and vibrant colors embodies the emotional shifts reflected in the seed.</desc>
