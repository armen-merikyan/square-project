<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork captures the tension between two emotional states: rage and calm. The palette of red and pale blue suggests hot anger contrasted by cooler, more tranquil moments. The use of black and white amplifies this dynamic, serving as points of tension and calm, respectively. The predominant patterns feature jagged edges of red elements 'shattering' through soft, horizontal strokes of blue, creating an impact of explosive force against a serene backdrop. This collision happens centrally, drawing the eye inward, evoking a sense of chaos emerging from a peaceful field. The broken pixels add physicality to the emotions, representing scars and disruptions in the symmetry, enhancing the abstract storytelling.</desc>
