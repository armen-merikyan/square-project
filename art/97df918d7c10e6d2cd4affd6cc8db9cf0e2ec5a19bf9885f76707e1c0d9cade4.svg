<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This piece represents the conflict of restlessness against peace through a palette of warm coral and soft amber contrasting with cold slate and blue-black. The design reveals a diagonal flow from the top corner to the opposite edge, suggesting motion and struggle while maintaining patches of tranquil color. The interplay between glitch-inspired disruptions and areas of static calm evokes a memory of interrupted peace, embodying the themes of motion and recollection. The collision occurs at the center, where the restless and serene collide, creating a compelling tension.</desc>
