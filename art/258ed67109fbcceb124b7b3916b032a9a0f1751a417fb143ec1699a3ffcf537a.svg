<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shades of Contrast</title>
  <desc id="desc">This piece explores the emotional duality of softness and severity, using a palette that transitions between gentle and stark tones. The top half uses soft, muted colors like powder pink and warm white, suggesting gentle transitions and fluidity, while the bottom half introduces sharper contrasts with carbon black and steel gray, embodying a sense of rigidity and boundary. The collision occurs sharply at the center, where the softness of the upper rows meets the severity of the lower ones, creating a visual tension that resonates with the seed's themes of conflict and resolution. The broken pixels introduce imperfection, hinting at underlying struggles of guilt and forgiveness, mirroring the emotional content of the seed.</desc>
