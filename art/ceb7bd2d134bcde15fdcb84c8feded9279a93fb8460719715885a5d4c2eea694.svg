<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects a struggle between vulnerability and strength, represented by a pale aqua core surrounded by the contrasting stability of ink blue. The color palette emphasizes serenity and urgency, using pale aqua and mist gray for softness, while alarm red introduces intense bursts of emotion. The outer edge in a barcode pattern showcases strength with dense ink blue contrasting against an exposed, lighter inner square (4x4) filled with an ash field motif that hints at fragility and quiet. The significant collision occurs centrally where patterns meeting create a sense of tension and balance, while broken pixels disrupt the flow, symbolizing imperfections and moments of vulnerability.</desc>
