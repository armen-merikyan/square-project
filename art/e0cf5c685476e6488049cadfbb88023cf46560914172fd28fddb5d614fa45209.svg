<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Currents</title>
  <desc id="desc">The piece explores the emotional tension between rage and tenderness by contrasting jagged, stark lines of deep blacks and reds against soft, muted pales and whites. The upper half uses aggressive diagonal 'stairs' to echo rage, while the lower half softens into islands, suggesting tenderness through gentle overlaps. The main collision occurs at the center where the dark, jagged elements bleed into the softer hues, embodying the conflict between these contrasting emotions. The use of broken pixels enhances the sense of disruption and unresolved tension, creating an evocative narrative of inner struggle.</desc>
