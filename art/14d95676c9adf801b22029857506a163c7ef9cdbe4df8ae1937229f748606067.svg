<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Exposure</title>
  <desc id="desc">This piece embodies the emotional tension between peace and restlessness through a varied palette of greens and warm tones. Ripe green and deep olive represent a quiet, balanced space, while the honey gold adds bright accents that suggest moments of interruption and conflict. The primary collision occurs in the diagonal elements, where calmer tones meet restless patches, creating a disrupted rhythm—mirroring the tension of memory versus motion. The design ensures that the central area remains exposed while borders teem with movement and agitation, symbolizing the guarded yet open nature of one’s inner states.</desc>
