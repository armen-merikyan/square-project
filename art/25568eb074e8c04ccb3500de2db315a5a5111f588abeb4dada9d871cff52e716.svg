<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Fracture</title>
  <desc id="desc">The emotional tone oscillates between panic and control, translating into a stark visual battle across the square. The palette, inspired by 'love_betrayal', presents deep reds and soft pinks juxtaposed against gray and dark maroon, signifying the clash between vibrant emotional outbursts and muted reflections of control. The top half showcases patterns of broken dots suggesting chaos and urgency, while the bottom half uses radial stripes to depict a more controlled ambiance, representing the struggle between the two emotions. The broken pixels add deliberate imperfections, reinforcing the theme of a fractured emotional state—a dance between feeling overwhelmed and seeking stability. The main contrast lies in the interplay between densely packed colors of panic and the hollow spaces of control, creating a visual dialogue rich in tension and emotion.</desc>
