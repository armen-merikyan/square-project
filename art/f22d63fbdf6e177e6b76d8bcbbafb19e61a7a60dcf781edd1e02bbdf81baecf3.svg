<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">The artwork embodies the emotional tension between longing and resolve. The palette blends stain brown and soft gold to signify warmth and the weight of emotion, while ash gray adds a reflective quality reminiscent of contemplation. The main collision occurs in the center, where deep wine interrupts quiet ivory fields, symbolizing the confrontation between aspiration and security. Layers of stacked patterns contrast with broad fields, creating a story of connection amidst separation. Broken pixels strategically disrupt the clarity, hinting at repairs and scars in the emotional landscape.</desc>
