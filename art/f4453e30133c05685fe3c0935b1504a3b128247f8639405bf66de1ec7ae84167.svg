<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Disarray</title>
  <desc id="desc">This piece embodies the emotional tension between confusion and clarity through contrasting patterns and colors. The palette, derived from 'broken_memory', features sepia, tan, dust gray, and faded blue, representing warmth against a muted background, evoking a sense of nostalgia amidst chaos. The layout flows diagonally, starting with a concentrated dark center that spills outward, creating an impression of 'falling pixels.' This arrangement highlights the collision of solidity and emptiness, capturing the emotional dissonance of broken patterns reminiscent of a grid but with intentional disruptions. The spaces left vacant enhance the message of confusion by suggesting unresolved thoughts, while thick outlines create a boundary that feels both protective and constricting.</desc>
