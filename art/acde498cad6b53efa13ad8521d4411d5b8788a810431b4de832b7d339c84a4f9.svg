<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects the struggle between control and surrender, where the top half embodies the pressure of containment and straight channels using saturated greens and muted golds, while the bottom half represents the softness of yielding with a blend of dots in lighter yellows and greens. The main contrast occurs at the center, where the colors collide, revealing a gentle descent from the pressure above to the released state below, symbolizing the tension and eventual release. The chosen palette conveys both anxiety and warmth, thus echoing the themes of feeling confined yet yearning for freedom.</desc>
