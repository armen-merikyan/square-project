<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Near vs Far</title>
  <desc id="desc">This piece embodies the emotional tension between 'longing' and 'resolve,' reflected through a palette depicting warmth and depth. The colors—yellow and muted purple versus deep blue and orange—suggest warmth and pull, merging distant echoes with intimate marks. The main collision occurs at the center, creating a core of tension that attracts the eye, while broken pixels introduce intentional disruption, mirroring the theme of repair and damage. The interplay of bright accents and deeper tones communicates an unresolved motion that captures the essence of the seed.</desc>
