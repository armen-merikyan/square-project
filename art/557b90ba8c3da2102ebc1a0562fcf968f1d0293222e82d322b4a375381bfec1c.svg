<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veins of Emotion</title>
  <desc id="desc">This artwork explores the emotional tension between longing and resolve. The soft palette of pale aqua and mist gray creates a serene backdrop, while alarm red accentuates the moments of urgency, reflecting the pulse of emotion. The dominant color in the center represents resolve, while the outer edges carry the longing, symbolizing a reaching gap. The broken pixels symbolize the imperfections and scars of experience, creating an interplay between repair and damage. The structured layout spirals inward, reinforcing the idea of compression and expansion, echoing the push and pull of the emotions in the seed.</desc>
