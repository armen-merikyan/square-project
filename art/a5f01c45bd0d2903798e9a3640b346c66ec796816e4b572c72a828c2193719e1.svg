  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The artwork captures the tension between vulnerability and protection, using a palette that contrasts warm and cool tones. The left side represents safety with soft browns and greens, creating a warm enclosure, while the right side uses pale blues and whites to reflect brightness and exposure. The arrangement echoes a central collision point that radiates emotional tension, signifying the interplay between pressure and release. The split vertical layout emphasizes this duality, and the addition of broken pixels introduces intentional disruptions, enhancing the narrative of imperfection and complexity.</desc>
