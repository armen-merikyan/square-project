<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This piece captures the emotional tension between desire and restraint, using a palette that juxtaposes warm saturated hues with cool muted tones. The coral and orange evoke strong desire, while the charcoal and hollow blue represent the coldness of restraint. The corner overflow with dots signifies an explosive demand for release, colliding with braided patterns that act as barriers, visually narrating the conflict. The arrangement favors a saturation of emotion in one area while allowing negative space to suggest the limits imposed by external factors.</desc>
