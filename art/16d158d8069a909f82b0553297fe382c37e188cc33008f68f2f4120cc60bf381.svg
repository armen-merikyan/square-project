<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">This composition encapsulates the tension between restlessness and peace. The dark navy (#001F3F) serves as the primary anchor, occupying the lower left diagonal, representing peace and quiet. It contrasts with bursts of compressed red (#FF4136) on the opposing edge, symbolizing restlessness. The palette, with off-white (#F8F8F8) and faint peach (#FFD1B0), introduces a sense of calm against the darker tones while maintaining a feeling of signal noise through scattered patterns. The use of interrupted lines and a central collision point captures an emotional argument between tranquility and agitation.</desc>
