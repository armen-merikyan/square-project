<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Trust</title>
  <desc id="desc">The emotional tone reflects the conflict between trust and suspicion, as brought forth by the seed. The palette, consisting of muted greens and browns alongside soft whites and blues, represents safety and exposure, hinting at warmth and comfort under tension. The stark contrast between warm and cool tones creates a push and pull, ultimately symbolizing the central conflict of trust battling suspicion. The collision of solid, stable stacks of color against the thread-like distortions conveys a sense of pressure and fracturing of trust exactly where these two emotions meet—an engagement in the center surrounded by the surrounding patterns of disquiet.</desc>
