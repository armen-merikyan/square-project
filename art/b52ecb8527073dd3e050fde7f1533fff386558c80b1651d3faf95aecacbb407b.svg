<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone straddles the tension between desire and emptiness. The palette, dominated by vibrant shades of hot coral and blood orange, evokes a saturated urgency, while the dusty pink and charcoal represent a softer, empty space—conflicted yet intimate. The main collision occurs in the central area where desire meets restraint, illustrated through concentrated dots and expansive voids, effectively portraying an overflowing urge constrained by negative space. This duality of emotion resonates toward the edges, creating an echo of imbalance reflecting the struggle between yearning freedom and confined reality.</desc>
