<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition reflects the emotional tension between rage and calm through a palette of red, pale blue, black, and white. The bright reds erupt against the softer blues, representing the struggle of explosive emotions versus a soothing calm. The chaotic 'veil' pattern collides with an even 'checker' motif, creating a visual representation of pressure and release at the center of the grid where colors clash the most. Broken pixels scattered throughout serve as intentional disruptions, echoing the theme of imperfection amidst containment, aligning with the seed's emotional and abstract qualities.</desc>
