  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork captures the emotional tension of 'defiance' and 'submission' through jagged, broken patterns alongside smooth fields. The palette features a blend of calm (pale aqua and mist gray) with sharp accents (alarm red and ink blue) to express conflict and resolution. The main contrast occurs at the center, where defiance (the shatter pattern) meets submission (the fault line), creating a dynamic visual narrative that echoes the seed's themes of tension and balance.</desc>
