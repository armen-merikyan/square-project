  <title id="title">Inner Conflict</title>
  <desc id="desc">This artwork embodies the tension between panic and control through a contrast of colors reflecting warmth and coolness. The sepia palette represents memories and nostalgia, while the darker edges symbolize the weight of panic. Central stripes signify control, contrasting with chaotic frame patterns that echo the feeling of encroachment around the edges, creating a visual representation of emotional conflict. The use of broken pixels throughout evokes imperfection and disruption, ensuring a dynamic yet abstract visual that captures the essence of the tension without literal representation.</desc>
