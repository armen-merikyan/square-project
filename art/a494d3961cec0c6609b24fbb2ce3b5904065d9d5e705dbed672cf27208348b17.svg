<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This composition explores the tension between control and surrender through a diagonal invasion pattern. The palette combines warm ivory and soft gold to represent restraint, while deep wine and ash gray signify surrender. The central collision occurs with a dense cluster of darker tones at the lower left, creating a visual weight that feels overfilled, contrasting with the lighter, more yielding colors radiating outward. The broken pixel elements introduce imperfection, suggesting emotional scars, while the arrangement symbolizes the push and pull of opposing forces.</desc>
