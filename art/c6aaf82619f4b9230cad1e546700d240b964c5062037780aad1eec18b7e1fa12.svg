<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Central Tension</title>
  <desc id="desc">Rooted in the emotional dichotomy of defiance and submission, this composition captures a struggle between bright angular interruptions (defiance) and soft, receding fields (submission). The selected palette of warm coral, cool slate, and signal cyan echoes the contrast, with the coral representing warmth and resistance, while slate evokes calm and enclosure. The central area is densely packed to signify conflict, creating an uneven border that still allows for necessary negative space. The haphazard arrangement symbolizes disruption and reflection on chaos and order, with collisions occurring at the grid center, dynamically representing the core of the theme.</desc>
