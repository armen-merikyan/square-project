<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Edges</title>
  <desc id="desc">This piece captures the emotional dichotomy of defiance (angular, sharp contrasts) versus submission (soft, enveloping forms). The palette, inspired by 'melancholy wonder', contrasts deep blues and soft grays, creating a space where tension and serenity coexist. The main collision happens in the center, where sparks of defiant colors clash against a gentle field, reflecting the struggle between the inner core and the outer border. The broken pixels introduce imperfection, enhancing the rawness of the emotional interplay.</desc>
