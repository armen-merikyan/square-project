<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow of Emotion</title>
  <desc id="desc">This artwork represents the emotional tension of joy against grief, using contrasting colors and patterns to express the dynamic interplay between the two emotions. The palette combines bright yellow and orange for joy with deep blue and muted purple for grief, illustrating an interplay of light and shadow. The layout features a central seed surrounded by chaotic crosshatching for grief and more orderly maze patterns for joy, creating a stark contrast. The flows of color shift from warm to cool, embodying the emotional transition from chaos to order, reflecting safety and threat.</desc>
