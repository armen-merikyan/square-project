<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Flame of Tension</title>
  <desc id="desc">This composition captures the emotional duality of vulnerability versus strength. The chosen palette of burnt orange, dark red, and charcoal mirrors the intensity of these opposing forces. The contrasting broken dot pattern suggests strength while the targeting pattern implies vulnerability, creating a dynamic tension in the center. The uneven edge style combined with intentional broken pixels gives a sense of disruption and hardness against an otherwise soft and exposed middle, representing the push and pull of desire and emptiness across the grid. The layout rises toward the top, symbolizing hope despite conflicts.</desc>
