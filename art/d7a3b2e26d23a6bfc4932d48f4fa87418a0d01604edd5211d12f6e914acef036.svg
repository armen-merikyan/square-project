<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetric Fracture</title>
  <desc id="desc">The emotional tone of this piece captures the tension between panic and control. The palette features burnt orange, dark red, charcoal, and gold, symbolizing a deep primal intensity while embodying chaos. The contrast between the controlled, orderly flame patterns in the top half and the chaotic checkerboard patterns in the bottom half evokes a sense of argument and unresolved tension. The broken pixels add imperfection, reflecting the theme of disruption in symmetry, while the warm color scheme suggests underlying emotional volatility. Overall, this arrangement renders an abstract confrontation where the upper orderly space contrasts violently with the lower chaotic section, capturing the essence of 'symmetry vs break.'</desc>
