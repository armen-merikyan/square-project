<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Yearning</title>
  <desc id="desc">This composition explores the emotional duality of emptiness and desire. The palette, drawn from 'love_betrayal'—pink, red, gray, and dark maroon—reflects warmth entangled with a sense of loss. The left half employs a mirrored pattern to symbolize desire, while the right utilizes a checkerboard to represent emptiness, creating a stark contrast. The collision between the two themes is accentuated with glowing edges, signifying unresolved tension, while broken pixels add to the essence of imperfection, enhancing the narrative of longing. Spaces are left intentionally to suggest unfulfilled desire amidst chaos.</desc>
