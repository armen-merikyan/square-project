<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone represents the struggle between unfulfilled desire and the presence of empty space, creating dynamic tension. The palette employs vibrant colors like hot coral and blood orange to signify desire's pull, contrasted with muted charcoal and hollow blue to evoke feelings of emptiness. The main collision occurs where the brighter colors invade from the top left corner, creating a saturated area that represents yearning, while the cooler, quieter tones retreat towards the peripheries, suggesting containment. The mirror and radial patterns intertwine, reflecting desire's vibrant push against the surrounding emptiness. Deliberate broken pixels introduce imperfection, emphasizing the unresolved nature of the emotional conflict.</desc>
