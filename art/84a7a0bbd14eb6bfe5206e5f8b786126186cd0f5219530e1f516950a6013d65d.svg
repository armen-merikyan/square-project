<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This composition juxtaposes the emotional tones of emptiness and desire. The palette of vibrant oranges and cool blues reflects the contrast between warm, saturated longing and distant, muted vacancy. The main collision occurs around the center, where a cluster of intense colors pushes against the peripheries of subdued hues, suggesting both tension and repair. Patterns of spark and rain collide to evoke a spiral of longing that notably disrupts the quiet, ordered blocks of emptiness. The result is an abstract pattern speaking to a duality of emotion without literal representation.</desc>
