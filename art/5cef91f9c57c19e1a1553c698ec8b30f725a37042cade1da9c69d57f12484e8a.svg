<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Hope</title>
  <desc id="desc">The emotional tone reflects a dance between longing and resolve, embodied in the contrast of vibrant and subdued colors. The hot coral and blood orange evoke an urgent warmth, suggesting desire and intensity, while the charcoal and hollow blue introduce a sense of quiet introspection. The layout of near vs far manifests in densely packed accents interrupting the muted spaces, creating a narrative of repair amid damage. The flowing diagonal pattern enhances the feeling of motion between these emotional states, culminating in a central collision that draws the viewer's eye, echoing the tension of the seed.</desc>
