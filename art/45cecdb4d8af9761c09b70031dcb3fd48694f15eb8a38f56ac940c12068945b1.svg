<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Inside Static</title>
  <desc id="desc">The emotional tone reflects the tension between clarity and confusion, as represented by the contrast of bright accents against dark, chaotic backgrounds. The palette of navy, black, white, and dim cyan serves to illustrate the 'lonely signal' fighting through the noise, with muted fields juxtaposed by sharp interruptions. This is visually embodied through the main collision in the center, where dense elements of 'noise' disrupt the structured 'signal' pattern, echoing the theme of an order being worn down by chaos.</desc>
