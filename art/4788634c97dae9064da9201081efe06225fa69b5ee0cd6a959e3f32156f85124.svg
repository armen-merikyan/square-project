  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork explores the emotional tension between vulnerability and strength, creating an unstable balance. The palette of sepia, tan, dust gray, and faded blue reflects a muted memory while contrasting soft backgrounds against darker accents. The main collision, centered in the grid, uses the crack pattern to disrupt while the noise pattern suggests fragility. The hollow center with darker edges symbolizes exposure encased by the protective layers, evoking feelings of both pain and safety.</desc>
