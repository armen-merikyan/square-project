<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inner Chaos</title>
  <desc id="desc">This artwork encapsulates the tension between defiance and submission through a dynamic interplay of dark and light colors. The center radiates warmth and resistance, reflecting defiance with bright sparks of gold overriding subdued lilacs, signaling chaos and energy. The edges evoke submission through cooler blues and shadows, softly receding into the background. The use of broken pixels introduces intentional disruptions, echoing the central theme of conflict. The narrow negative-space path traverses the square, creating a visual journey that amplifies the central struggle.</desc>
