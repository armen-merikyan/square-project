<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This artwork captures the emotional tension between desire and emptiness. The warm colors on the left (reflecting desire) create a saturated pull, while the cooler tones on the right (emphasizing emptiness) maintain a sense of calm restraint. The collision occurs in the center, where warm and cool colors blend, signifying the struggle between expansion and containment. The structured layout reinforces this duality, while the broken pixels introduce intentional disruptions, echoing the imperfections of desire. The pattern of the left side flows in a braid while the right side suggests steps, enhancing the contrast further.</desc>
