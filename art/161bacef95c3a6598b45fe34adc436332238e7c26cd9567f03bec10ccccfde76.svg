  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The artwork embodies the tension between rage and calm, utilizing a palette that incorporates black and various shades of blue and red. The black represents the compressed, aggressive energy of rage, while the pale blues contribute to the undercurrent of calm. The main collision occurs at the corner, where jagged red elements pierce through the softer blue patterns, illustrating a struggle between containment and overflow. The irregular distribution of colors and broken pixels keeps the feel dynamic and unbalanced, echoing the unpredictable nature of emotion.</desc>
