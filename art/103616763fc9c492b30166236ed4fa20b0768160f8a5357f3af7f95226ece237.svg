<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tears of Gratitude and Envy</title>
  <desc id="desc">This artwork embodies a tension between envy and gratitude through a contrasting palette of dark violet and soft gold, capturing the emotional clash. The falling pixel layout evokes a sense of descent, aligning with the rising and falling motifs in the seed. Gravelly black backgrounds represent the weight of envy, while soft pastels juxtapose the hopeful side of gratitude, allowing for an echoing conflict throughout the piece. Where the darker hues create dense clusters, the lighter colors introduce soft interjections, reflecting the imperfect harmony between the two emotions.</desc>
