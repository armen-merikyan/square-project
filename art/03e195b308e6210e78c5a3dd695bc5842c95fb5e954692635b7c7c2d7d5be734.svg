<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece contrasts the heaviness of envy and the lightness of gratitude through its color choices and arrangement. The 'ancient_fire' palette embodies the tension: burnt orange and dark red in the outer frame suggest envy and weight, while gold hints at the warmth and gratitude in the center. The spiral pattern of the inner pixels creates a sense of calm amidst rising tension in the edges, illustrating the struggle between these emotions. The broken pixels add an element of imperfection, emphasizing how underlying feelings disrupt a perceived harmony, with negative space allowing for reflection and breath within the composition.</desc>
