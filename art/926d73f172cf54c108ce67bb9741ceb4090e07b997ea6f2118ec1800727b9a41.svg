<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in the Veil</title>
  <desc id="desc">This composition conveys the emotional tension between rage and calm through a carefully chosen palette of deep reds, contrasting blacks, and serene blues. The center creates a chaotic noise pattern, representing rage, while softer horizontal channels of pale blue suggest calm in the surrounding areas. The collision of hot reds and cool blues is pronounced at the borders, symbolizing the struggle of containing overwhelming emotions within a quiet space, while broken pixels add disruption, enhancing the feeling of eroded symmetry. This interplay of color and form reflects the journey from tumult to tranquility inherent in the seed concept.</desc>
