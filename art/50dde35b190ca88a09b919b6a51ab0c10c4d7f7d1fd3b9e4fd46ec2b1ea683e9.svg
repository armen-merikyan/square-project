<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork embodies the emotional tension between desire and restraint through color and pattern. The palette features warm reds and muted creams that reflect a yearning and urgency against a backdrop of more subdued tones like blackened plum and iron gray, reinforcing the sense of containment. The collision occurs centrally, where warm colors spiral upwards amidst darker, restrained edges, suggesting a struggle for escape. The broken pixels add intentional disruptions, symbolizing scars from unfulfilled desire. This interplay reflects the complexity of desire versus restraint, with one emotion dominating while still allowing for movement and interruption.</desc>
