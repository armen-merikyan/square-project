<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadows</title>
  <desc id="desc">This piece explores the emotional tension between fear and hope. The color palette combines deep blacks and dark violets to represent fear's weight, while soft gold and pale green interrupt as symbols of hope. The main contrast manifests between the dense dark corners creating a sense of entrapment and the brighter center pixels offering a hint of light breaking through, suggesting resilience. The zigzag pattern complements this tension, embodying a rising signal, interrupted yet flowing, symbolizing the battle between the two emotional states.</desc>
