<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Signals</title>
  <desc id="desc">This piece embodies the emotional struggle between emptiness and desire. The chosen palette of reds and whites against a backdrop of blacks symbolizes warmth battling against coolness, illustrating the push and pull of hope rising against a heavy weight of darkness. The broken textures introduce imperfection, reflecting the complex nature of longing and loss. The main contrast appears between the bright whites and reds on the left, symbolizing desire, and the surrounding black, representing emptiness, creating a visual tension that echoes the seed's narrative.</desc>
