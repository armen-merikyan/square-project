<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Yearning</title>
  <desc id="desc">This abstract composition captures the emotional tension between longing and resolve. The palette, featuring warm and cool tones like 'rose_clay' and 'cool_blue', reflects the interplay of intimacy and distance. The central collision occurs diagonally, where patterns of longing—a braided texture—intersect with the strong, locked forms of resolve. The dominant presence of 'warm_shadow' brings a sense of compressed strength, while quiet spaces allow for reflection. Broken pixels introduce intentional imperfections, enhancing the sense of emotion within the structure while maintaining negative space to emphasize the contrast between desire and stability.</desc>
