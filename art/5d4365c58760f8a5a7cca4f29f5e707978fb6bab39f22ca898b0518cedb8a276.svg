  <title id="title">Duality in Confusion</title>
  <desc id="desc">The emotional tone oscillates between restlessness and peace, represented through the contrast of deep, saturated colors and lighter, muted tones. The selected palette of navy, black, dim cyan, and white evokes a sense of isolation and quietness against a backdrop of chaos. The main collision occurs centrally, where the darker hues challenge the softer colors, symbolizing the struggle between the urge for movement and the desire for calm. The layout leverages a mirror-like symmetry but intentionally disrupts it with strategic placements of colors, representing the incomplete balance in the mind. The broken pixels introduce intentional flaws, adding to the complexity of this emotional landscape, while maintaining a 10% negative space throughout.</desc>
