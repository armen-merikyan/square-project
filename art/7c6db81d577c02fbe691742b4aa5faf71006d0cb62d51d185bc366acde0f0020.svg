<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Boundless Containment</title>
  <desc id="desc">This piece embodies the emotional tension between desire and restraint. The palette, featuring warm tones like hot coral and blood orange, represents the passionate pull of desire, while cooler shades like charcoal and hollow blue convey the subtle strength of restraint. The vibrant colors dominate around the edges, creating an outer frame that visually conflicts with the more muted inner core, mimicking the struggle between external aspirations and internal limitations. This central collision results in an energetic swirling pattern that reflects a spiral pressure, where the warmth of desire attempts to break free from contained forms, encapsulating the essence of love and betrayal captured in the seed.</desc>
