  <title id="title">Symmetry Fractured</title>
  <desc id="desc">This artwork explores the tension between clarity and confusion through contrasting color placement and patterns that emerge from the center, radiating outward. The selected palette of dark maroon, red, gray, and pink embodies warmth offset by a sense of betrayal, suggesting a deeper emotional turmoil. The main collision occurs through the juxtaposition of vibrant warm colors against void-like gray spaces, reflecting the broken paths of understanding amidst overlapping confusion. The rules for broken pixels are applied to enhance the imperfection within the clarity, creating a vivid experience of tension and rupture.</desc>
