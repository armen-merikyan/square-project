<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This artwork captures the tension between defiance and submission. The dense center represents an unmoved core of brightness (defiance), while the muted edges symbolize a receding softness (submission). The palette, a gradient of bright yellows and oranges against deep blues and muted purples, creates a contrasting emotional landscape. The main collision happens at the center, where the vibrant grid of defiance meets the intricate spark pattern of submission, illustrating a struggle that remains unresolved. This reflects themes of conflict and coexistence, embodied through the chosen color and structure.</desc>
