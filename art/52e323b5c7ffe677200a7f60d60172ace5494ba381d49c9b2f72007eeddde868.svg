<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Resistance</title>
  <desc id="desc">This artwork embodies the emotional tension between defiance and submission through contrasting patterns and colors. The central diamond shape serves as the focal point around which the duality unfolds. The palette combines warm coral and cold slate to evoke the struggle between warmth (defiance) and coolness (submission), interspersed with accents of signal cyan creating interruptions and connections. The collision occurs at the heart, where densely packed dots representing defiance clash against softer braided patterns symbolizing submission. This creates a narrative of oscillation between feeling empowered and constrained, achieved via the distribution of color and broken pixels embodying disruption.</desc>
