<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Paths</title>
  <desc id="desc">The emotional tone reflects a delicate balance between vulnerability and strength. The chosen palette, inspired by cosmic indigo mixed with void black, creates a sense of awe and terror, mirroring the contrast between safety and exposure. Central to the piece is a stark white path representing vulnerability, surrounded by rich colors denoting strength, with muted tones to suggest quietness. The collision occurs in the center, where a thick, dark border meets a thin, bright channel of white, capturing the essence of contrasts in life. The several broken pixels introduce intentional disruptions, aligning with the theme of fractured strength and exposed vulnerabilities.</desc>
