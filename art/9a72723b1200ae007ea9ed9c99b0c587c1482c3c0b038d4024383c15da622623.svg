<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The piece captures the emotional tension between vulnerability and strength through a deliberate arrangement of colors. The palette of signal green, electric blue, dead black, static gray, and hot magenta creates a balance of calm and tension. The central area features a pale interior surrounded by darker tones, illustrating a protective layer that juxtaposes with the minor disruptions of broken pixels, signifying vulnerability. The serene channel of negative space cutting through the center emphasizes both emotional states, while pulsating patterns of strength and gentle threads of vulnerability intertwine, creating a soft yet powerful rhythm.</desc>
