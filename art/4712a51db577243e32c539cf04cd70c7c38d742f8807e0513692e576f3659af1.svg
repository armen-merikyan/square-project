<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Clarity</title>
  <desc id="desc">This piece explores the emotional dichotomy of confusion versus clarity through a structured yet fragmented layout. The palette, drawn from the 'joy_grief' theme, juxtaposes vivid yellow and muted purple to embody clarity and confusion, respectively. The outer border reflects calmness with deep blues, encasing a chaotic core filled with overlapping patterns of color to evoke tension and disarray. The deliberate placement of broken pixels increases the sensation of disturbance, crafting a visual disruption that resonates with feelings of confusion. Ultimately, the interplay between thick outlines defining the segments contrasts the soft, chaotic center, symbolizing the struggle for clarity amid turmoil.</desc>
