<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Trust</title>
  <desc id="desc">This composition explores the emotional tension between trust and suspicion through a contrasting palette of vibrant and dark colors. The use of lime and electric blue represents trust, creating a visual 'bridge' of stability across the central axis, while black and magenta introduce elements of suspicion and shadow. The layout is intentionally broken and mirrored, suggesting imperfections in perception, while the soft glow of lime is interrupted by the hard edges of black and dark shades, illustrating the push and pull between the two emotions. The collision of these colors and patterns occurs predominantly in the central rows, creating a focal point of tension and complexity.</desc>
