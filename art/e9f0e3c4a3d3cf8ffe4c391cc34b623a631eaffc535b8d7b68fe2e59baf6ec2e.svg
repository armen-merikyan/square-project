<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Fragments</title>
  <desc id="desc">The emotional tone blends the fleeting energy of 'spark' with the quiet stillness of 'ash'. The palette juxtaposes the calm optimism of pale aqua and clear white against deeper shades of alarm red and ink blue, symbolizing conflict and contrast. The layout favors a void in the center framed by jagged, dynamic borders, which provides a sense of both protection and exposure. Broken pixels add intentional disruptions throughout the grid, echoing the theme of resilience amid fragmentation. The collision of warm and cool colors creates a push and pull that embodies the emotional complexity of tension and release.</desc>
