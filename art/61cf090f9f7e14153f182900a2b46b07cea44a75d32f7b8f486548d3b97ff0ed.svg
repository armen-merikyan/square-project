<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone balances vulnerability and strength, creating a tension that resonates through the color palette of hot coral, blood orange, dust pink, charcoal, and hollow blue. The collision occurs in the center, where warm colors interrupt the cool, echoing the struggle between exposure and protection. Broken pixels provide intentional disruptions, representing scars and the acts of shielding or revealing. This piece encapsulates the abstract pattern of resistance and fragility.</desc>
