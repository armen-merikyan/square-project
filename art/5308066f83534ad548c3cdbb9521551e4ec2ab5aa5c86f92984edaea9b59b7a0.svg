<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Whispers of Tension</title>
  <desc id="desc">The artwork captures the emotional tension between trust and suspicion through its contrasting colors and fragmented patterns. The muted, darker colors represent suspicion, while warmer, lighter hues suggest trust. The main collision of hues occurs in the center, where deep blacks clash with small splashes of orange, symbolizing a fractured trust. The palette combines muted creams and reds with ash tones to evoke a sense of unease, while the structured layout creates an experience of verticality and flow that mirrors the emotional gradient from trust to suspicion, resulting in an engaging visual journey.</desc>
