<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The artwork embodies the tension between restlessness and peace through its contrasting patterns and colors. The palette, 'melancholy_wonder', features a balance of muted tones like 'lavender_gray' and 'muted_plum' to evoke tranquility, while accents of 'moon_white' and 'soft_cyan' create bursts of energy that represent restlessness. The dominant squares of dark colors disrupt the soft radial pattern with hard boundary marks, indicating the conflict inherent in memory and motion. The main collision occurs in the center, representing a quiet space encircled by more chaotic, uneven edges, embracing the theme of edges crawling and closed corners. The use of broken pixels serves as intentional scars, suggesting interruptions in the emotional flow, thereby enhancing the abstract story conveyed by the seed.</desc>
