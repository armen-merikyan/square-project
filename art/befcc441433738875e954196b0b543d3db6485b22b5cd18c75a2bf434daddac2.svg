<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Desires</title>
  <desc id="desc">This artwork explores the emotional tension between longing and resolve, making use of a palette titled 'hunger_restraint'. The palette comprises muted, warm tones of red oxide and small orange that embody desire, contrasted with the cooler, darker shades of blackened plum and iron gray, evoking restraint. The diagonal pattern suggests the push and pull of emotions, where broken pixel placements symbolize interrupted intentions amidst a complex web of feelings. The flow runs from top to bottom, illustrating a journey from aspiration to grounded reality, with a notable collision of color towards the center where longing significantly dominates the visual narrative.</desc>
