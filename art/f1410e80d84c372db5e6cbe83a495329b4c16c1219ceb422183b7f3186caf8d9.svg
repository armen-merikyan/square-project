  <title id="title">Inside vs Outside</title>
  <desc id="desc">This artwork captures the emotional clash between panic and control through contrasting color placement and patterns. The palette features warm yellows and oranges representing control, contrasted with cool deep blues and muted purples symbolizing panic. The top half exhibits radial patterns to evoke a sense of structure and control, while the bottom half uses a crack pattern, suggesting chaos and panic. The delineation emphasizes the tension between the central calm and the surrounding chaotic energy, where the pixel bleed adds imperfection, enhancing the emotional narrative of struggle and confrontation.</desc>
