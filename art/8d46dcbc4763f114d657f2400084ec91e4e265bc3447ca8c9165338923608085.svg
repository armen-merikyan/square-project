<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tectonic Balance</title>
  <desc id="desc">This abstract piece embodies the emotional tension between joy and grief through sharp contrasts and layered patterns. The palette of yellow and orange introduces warmth and vibrancy—representing joy—while deep blue and muted purple evoke a sense of depth and heaviness—symbolizing grief. The composition is split top to bottom, where bright, round shapes are punctuated by dot patterns, mimicking raindrops, corresponding to the heavy feelings of grief that settle amidst the joy. The juxtaposition of bright colors in the upper rows collides with the subdued tones below, conveying the interplay between safety and threat within emotions. The layout and the use of broken pixels add imperfection, mirroring the fragmented nature of emotional experiences.</desc>
