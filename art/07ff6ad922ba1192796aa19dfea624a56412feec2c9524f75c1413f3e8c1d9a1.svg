<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork embodies the emotional tension between loneliness and connection by contrasting dense clusters of color with negative spaces. The use of black and dark violet suggests isolation and solitude, while soft gold emerges as a symbol of potential connection. The split vertical layout emphasizes the divided emotions - the left side represents loneliness with jagged edges and crack patterns, creating an uneven and lonely atmosphere. In contrast, the right side proposes a connection through structured bursts of soft gold surrounded by pale green, representing hope and growth. The palette's vibrancy is juxtaposed with darker tones to create conflict and echo the intention of finding balance amidst feelings of isolation. By manipulating the patterns and shapes with a sense of brokenness, the piece cultivates a narrative of yearning and complexity without suggesting literal forms.</desc>
