<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision at the Horizon</title>
  <desc id="desc">This piece represents the tension between vulnerability and strength through color density and layout. The palette of black, dark violet, soft gold, and pale green emphasizes contrasting emotional tones—dark shades suggest strength and protection, while pale tones evoke vulnerability. The main collision occurs at the center, where the softer tones clash with stronger colors, mirroring the clash of emotional states. The broken frame layout suggests cracks in security, while the inclusion of intentional broken pixels embodies the imperfections inherent in the struggle between these emotions. The overall effect is a harmonious yet fragmented interaction, embodying the complexity of safety and exposure.</desc>
