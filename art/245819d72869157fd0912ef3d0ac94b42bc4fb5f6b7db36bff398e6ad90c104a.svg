<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order and Chaos</title>
  <desc id="desc">This artwork explores the tension between tenderness and rage, contrasting muted calmness with a chaotic flare of intensity. The palette mixes deep blacks with saturated reds to evoke a visceral emotional pulse while soft blues provide a calming counterpoint, hinting at tenderness. The main collision between the harsh, jagged red signals and the rounded blue rings occurs off-center, symbolizing the struggle between rage and calmness within the layout of an ‘empty room’. The broken pixels represent disruptions in emotional flow, hinting at imperfections in our experiences of intimacy and conflict. This arrangement allows an interplay of emotions through density and quietness, leading to a contemplative narrative.</desc>
