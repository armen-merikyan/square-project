<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise Against Fall</title>
  <desc id="desc">This composition embodies the emotional tension between light and dark, represented through the contrast of bright, warm colors against muted, cooler tones. The 'spark' elements create a sense of sudden brightness and energy, while the 'ash' elements establish a grounding and settled atmosphere. The use of broken dots and islands gives a visual impression of interruption and memory, with the bright field in the center suggesting vitality clashing against the somber, shadowy edges. The upward flow of colors invokes a feeling of hope and resilience amid the weights of restraint and erasure.</desc>
