<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs. Weight</title>
  <desc id="desc">This artwork explores the tension between relief and dread, using a palette that evokes the muted tones of memory and depth. The upper half, reflecting relief, features radial patterns in lighter sepia and tan, creating a luminous atmosphere. In contrast, the lower half denotes dread with dense crosshatching of dark grays and faded blues, suggesting weight and pressure. The intentional breakdown in color and patterns mirrors emotional collisions, creating a dynamic visual experience that invites the viewer to navigate through varying emotional landscapes.</desc>
