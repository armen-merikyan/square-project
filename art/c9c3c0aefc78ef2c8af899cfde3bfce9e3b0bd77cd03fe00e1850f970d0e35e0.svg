<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a stark contrast between yearning and limitation, using a palette that emphasizes warm tones of desire against cooler shades of emptiness. The left side exhibits saturated reds and oranges representing desire, formed in a ladder pattern that indicates upward movement, while the right side uses low saturation colors to create a flood-like effect of containment. This split layout showcases the collision of ambition and restraint, with an intentional displacement through broken pixels that suggest imperfections in pursuit. The main contrast occurs along the vertical divide, echoing an aesthetic tension of overflowing desire held back by quiet emptiness.</desc>
