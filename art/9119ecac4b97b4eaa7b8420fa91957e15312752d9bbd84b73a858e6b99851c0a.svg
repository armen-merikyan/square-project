<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone conveys a struggle between warmth and coolness. The palette was selected to reflect intense desire through bright, saturated colors like hot coral and blood orange, contrasting against muted charcoal and hollow blue to signify restraint. The primary collision occurs in the center, where hopeful dots of desire erupt against a structured ladder-like pattern of restraint, creating tension and visual interest. The spiral flow enhances the sense of inward pressure, resonating with the theme of desire striving against boundaries.</desc>
