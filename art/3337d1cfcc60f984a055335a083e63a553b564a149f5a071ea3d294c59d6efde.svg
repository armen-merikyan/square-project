  <title id="title">Flickering Boundaries</title>
  <desc id="desc">This artwork captures the emotional tension between longing and resolve, represented through the tension of contrasting colors. The palette of burnt orange, dark red, charcoal, and gold evokes warmth and urgency, while the placement of broken pixels creates intentional interruptions, symbolizing damage. The layout is designed to feel as if pixels are descending like rain, reinforcing a quiet, reflective space against denser areas. The central collision occurs in the middle, highlighting contrasts in emotional states and the complexity of containment versus overflow.</desc>
