<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects a contrast between the vulnerable exposure at the center and the protective strength offered by the surrounding colors. The chosen palette of melancholy wonder, with blues and soft grays, captures a sense of quiet conflict. The collision occurs diagonally, where the strength patterns of deep blue and muted plum intersect with the lighter, pressure band colors of soft cyan and moon white. This balance conveys the dynamic tension of vulnerability meeting strength, showcasing a fight between despair and assurance within an abstract composition.</desc>
