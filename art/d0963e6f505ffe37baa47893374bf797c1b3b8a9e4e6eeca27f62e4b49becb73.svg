<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This artwork conveys the emotional dichotomy of desire and restraint through a deliberate interplay of saturated and muted colors. The outer border, representing restraint, features darker tones creating a sense of containment, while the inner core bursts with brighter hues of desire. The contrast peaks at the juncture between the core and border, suggesting a breaking point. The diamond shape acts metaphorically as a lattice that maintains the structure yet feels pressured by the inner vibrant pulse. The colors used evoke warmth (red oxide, small orange) against cooler, muted fields (blackened plum, muted cream, iron gray), embodying the tension of yearning, containment, and emotional collision.</desc>
