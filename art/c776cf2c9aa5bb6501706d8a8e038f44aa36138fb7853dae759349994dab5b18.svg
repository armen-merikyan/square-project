<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone of this abstract piece contrasts vulnerability with strength, showcasing a delicate interplay between starkness and softness. The palette, composed of pale mint, soft sky, storm gray, near black, and faded gold, evokes feelings of both relief and dread. The main collision occurs in the center, where the softer checker pattern of vulnerability meets the denser channel pattern of strength, creating a dynamic tension. The fragmented vs. whole contrast is illustrated through a mixture of clear and broken pixels, highlighting imperfection in an otherwise structured layout. This pattern reflects the essence of the seed through an outward spiral flow that emphasizes the duality of exposure and safety.</desc>
