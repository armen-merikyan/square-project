<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Shadows</title>
  <desc id="desc">The artwork captures the emotional dichotomy of envy and gratitude through contrasting colors and patterns. A dark palette symbolizes envy, representing weight and heaviness, while the lighter shades embody gratitude, suggesting lightness and release. The central contrast occurs at the point where dark areas zigzag, creating a rhythm that disrupts the overall flow. Broken pixels mimic the jagged experience of emotions, while the asymmetrical layout allows the feelings of pressure to pulse outward from the center, reflecting an unresolved internal narrative.</desc>
