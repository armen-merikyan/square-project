<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This artwork embodies the emotional struggle between restlessness and peace. The chosen palette features muted tones of moss green and stone gray to evoke a sense of calm, juxtaposed with vibrant accents of rust and small gold, which symbolize the unease and tension. The layout creates a narrow negative space that travels diagonally, enhancing the contrast between densely packed patterns and quiet fields. The collision occurs in the center, where the patterns symbolizing restlessness (veil) disrupt the calm (thread). The use of broken pixels introduces intentional disruptions that reflect the theme of interrupted peace.</desc>
