<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">The emotional tone conveys the tension between desire and emptiness. The palette features warm coral and orange to represent desire, contrasted with cool charcoal and hollow blue to symbolize emptiness. The main collision occurs around the central area where warm colors vie for attention against a backdrop of cooler tones, suggesting a struggle for fulfillment against a backdrop of restraint. Patterns of 'veil' in warm tones layered over the 'glitch' of cool hues evoke a sense of both chaos and order, embodying the seed's themes of tension and unfulfilled yearning.</desc>
