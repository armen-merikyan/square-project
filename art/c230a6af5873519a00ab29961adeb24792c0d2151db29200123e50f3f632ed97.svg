<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erosion of Signals</title>
  <desc id="desc">The emotional tone is one of conflict—defiance versus submission, where strong contrast occurs between the dense center and the outer regions. The palette of dark violet and soft gold represents fear and hope, encapsulating the tension. The center displays strong blocks of dark violet reflecting defiance, interrupted by soft golden checker patterns symbolizing submission at the edges. The main collision happens towards the center, creating a visual hierarchy with clear shifts from dense to empty spaces, reflecting the spiral of inner conflict suggested by the seed.</desc>
