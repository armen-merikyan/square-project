<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Emotion</title>
  <desc id="desc">This composition channels the tension between relief and dread through a carefully constructed palette and pixel arrangement. The warm yellows and oranges represent relief, clashing with the muted purples and deep blue that embody dread. The flow from bottom to top reflects a struggle to rise above an oppressive weight. The pattern of symmetry is disrupted by broken pixels in the representation, signifying the imperfect nature of these emotions. Predominantly dark pixels anchor the piece, contrasting with lighter tones that offer hints of escape and lightness, creating a dialogue between the two emotional states.</desc>
