<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Longing</title>
  <desc id="desc">The emotional tone balances the contrast between emptiness and desire. A dark palette encapsulates loneliness while cooler tones amplify the feeling of distance. The bright accents fight against the surrounding dullness, creating a collision of yearning and void through the visual tension of the piece. The core 4x4 grid of lighter colors represents the desire that struggles to emerge from the enveloping darkness. The burned edges suggest trauma while the slight broken pixels introduce imperfection, mirroring the struggles of desire amidst emptiness.</desc>
