<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">This piece embodies the emotional tug-of-war between joy and grief, utilizing a contrasting palette of bright yellows and muted purples to symbolize warmth and heaviness. The structured layout suggests an encroaching wave of joy from a corner, meeting a fragmented wave of grief that disrupts the symmetry. The inclusion of broken pixels introduces imperfection, reflecting the chaotic nature of emotional experiences. Overall, the composition features rhythmic patterns that pulse with feeling, creating an abstract narrative filled with tension and resolution.</desc>
