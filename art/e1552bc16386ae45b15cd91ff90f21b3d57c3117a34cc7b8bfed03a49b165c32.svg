<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Presence</title>
  <desc id="desc">The emotional tone reflects a conflict between panic and control, with surrounding warmth pushing against a cool central core representing stability. The palette of burnt orange, dark red, charcoal, and gold evokes a sense of ancient fire, symbolizing urgency and comfort. The outer border in warm tones encapsulates the feeling of panic, while the inner core leans towards cooler hues, suggesting control and calmness amidst chaos. The arrangement features broken pixels, adding imperfection to the overall presentation, resonating with themes of disruption and emotional collision. The pattern flows inward, emphasizing the contrast between chaotic sparks of urgency and moments of stable reflection, creating a dynamic tension between feelings of being unmoored and grounded.</desc>
