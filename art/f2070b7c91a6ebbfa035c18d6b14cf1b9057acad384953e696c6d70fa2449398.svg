  <title id="title">Fractured Harmony</title>
  <desc id="desc">The artwork embodies a tension between 'panic' and 'control'—with the center exhibiting a controlled radial pattern while the edges vary with chaotic, flame-like stripes. The palette 'broken_memory', featuring sepia and faded blue, evokes nostalgia and unease, reflecting how memories can stabilize or overwhelm. The contrast lies predominantly between the structured center and the chaotic border, suggesting the emotional struggle within, akin to a machine that both regulates and disorients. The slight broken pixels add an organic touch amidst the control, representing imperfections in our emotional landscapes.</desc>
