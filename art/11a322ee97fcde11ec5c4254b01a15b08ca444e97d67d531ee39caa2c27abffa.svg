<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">The artwork reflects the emotional tension between desire and restraint through a carefully curated palette that juxtaposes warm hues of desire with cooler tones representing restraint. The use of saturated colors at the center creates a sense of urgency and heat, while the muted, darker colors form a lattice around them, echoing the conflict of holding back intense feelings. The collision occurs primarily in the center, where warmth bursts against the cool containment, illustrating both pressure and saturation. The arrangement emphasizes stutter-step movement, creating visual rhythm that embodies the struggle. Overall, it embodies a story of emotional overflow and the boundaries of love and longing.</desc>
