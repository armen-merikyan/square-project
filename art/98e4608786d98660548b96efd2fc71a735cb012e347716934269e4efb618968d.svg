<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Healing</title>
  <desc id="desc">This composition captures the emotional tension between longing and resolve through contrasting warm and cool hues. The chosen palette of rose clay and distant lilac evokes intimacy while cool blue introduces a sense of distance. The main collision occurs in the center, where the densely packed lattice of resolve interrupts the surrounding quiet fields, embodying the struggle between repair and damage. The edges are softened to create a weighted diagonal influence, allowing the viewer's eye to traverse the piece as if moving through emotional layers of a broken state being mended.</desc>
