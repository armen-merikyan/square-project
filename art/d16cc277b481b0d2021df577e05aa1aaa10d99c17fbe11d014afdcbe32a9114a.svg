<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone of this piece explores the tension between spark and ash, contrasting brightness with softness. The colors selected—warm coral and soft amber for the 'spark' emotion and cold slate and blue-black for the 'ash'—create an interplay of vibrant and muted areas. The vertical flow mimics the rise and fall of emotions, with a jagged edge interrupting the calm. The central collision, where vibrant coral interacts with slate, encapsulates the struggle between resilience and fragility, embodying the core of the seed's themes.</desc>
