<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Harmony</title>
  <desc id="desc">This artwork explores the emotional dichotomy of joy and grief through color and composition. The top half embodies joy, employing vibrant yellows and oranges in an expansive frame-like pattern, suggesting openness and elation. The bottom half contrasts with subdued blues and muted purples, arranged in fragmented spark patterns, representing the heaviness of grief. The asymmetry introduced by broken pixels, particularly on the boundary between joy and grief, enhances the feeling of transition and tension. The glowing edges create a sense of warmth on the joyful side, which sharply meets the cooler, deeper tones of grief, thus embodying the seed's themes of symmetry versus break.</desc>
