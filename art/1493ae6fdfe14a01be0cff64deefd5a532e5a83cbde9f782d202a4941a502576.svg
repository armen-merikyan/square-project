<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Yearning and Certainty</title>
  <desc id="desc">This artwork embodies the emotional struggle between longing and resolve through contrasting color placements. The warm coral (#FF6F61) and soft amber (#FFD54F) convey an emotional warmth and drive of desire, while cold slate (#6A7B9D) and blue-black (#1D1F21) provide weighty contrasts representing the solid foundation of resolve. The composition's central area is densely packed with warm tones to suggest overwhelming emotion, while soft edges with cooler colors create a sense of distance, mirroring intimacy and disengagement. Broken pixels disrupt the flow, representing the imperfect nature of human emotions and the collision of desire and certainty across the square.</desc>
