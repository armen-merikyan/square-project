<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balancing Exposure</title>
  <desc id="desc">This piece captures the emotional duality of vulnerability and strength through careful color placement and arrangement. The muted cream provides a soft, exposed center representing vulnerability, framed by dense, darker hues to signify strength. The clash of organized 'teeth' patterns against the dispersed 'pulse marks' creates a tension that reflects the struggle between seeking shelter and the intimacy of exposure. The edge style emphasizes unevenness, with broken pixels introducing intentional imperfection, echoing the fragility inherent in the subject matter. The layout's split verticality embodies the ongoing dialogue between the two emotional states.</desc>
