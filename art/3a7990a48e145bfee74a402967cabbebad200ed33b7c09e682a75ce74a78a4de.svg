<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Yearning</title>
  <desc id="desc">This piece explores the emotional tension between emptiness and desire, using a palette of warm lime and cool shades of black, electric blue, and magenta. The contrasting colors create a dynamic visual narrative: the warm tones emerge as bursts of desire amidst the cooler, emptier backgrounds, suggesting a constant struggle. The broken dots pattern embodies the idea of emptiness, while the checker-like structure represents desire, resulting in a heartbeat-like rhythm across the piece. The jagged edges introduce an element of imperfection, enhancing the emotional depth through collision of forms and color.</desc>
