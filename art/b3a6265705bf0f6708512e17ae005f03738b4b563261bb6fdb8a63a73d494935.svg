<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork captures the emotional tension between rage and calm. The palette of red and pale blue dominates, symbolizing hot emotional bursts clashing with cooler, more subdued tones. The chaotic patches of red intersect with horizontal bands of cool blue, representing the struggle between containment and overflow. The central collision creates a vibrant dynamic, echoing the concept of pulses in opposing directions, while leaving spaces that hint at a quiet field, reflecting a deeper, introspective calm beneath the chaos. The use of broken pixels throughout adds an imperfection that suggests the erosion of symmetry and control, aligning with the theme of machine emotion.</desc>
