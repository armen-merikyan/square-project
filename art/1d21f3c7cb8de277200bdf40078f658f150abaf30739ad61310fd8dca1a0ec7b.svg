<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Heights</title>
  <desc id="desc">This artwork explores the emotional dichotomy of longing and resolve through a palette of deep blues, muted purples, yellows, and oranges. The warm hues symbolize longing, creating a feeling of distant warmth and evocation, while the cooler tones depict resolve, reflecting steadiness and strength. The main contrast happens diagonally, where broken dots of longing intermingle with a structured lattice representation of resolve, resulting in a dynamic interplay between chaos and order across the canvas. The spatial arrangement leaves significant quiet spaces, embodying the themes of distance and intimacy implied by the seed.</desc>
