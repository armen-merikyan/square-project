<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">The emotional tone reflects a dance between dense pressure and serene quietude. The palette of off-white, dust gray, compressed red, dark navy, and faint peach encapsulates this duality; muted tones exude calm, contrasted by sharper reds indicating pressure. The diagonal layout begins with a concentration of darker hues in the top corner, loosening toward lighter shades, symbolizing a release from tension. The interplay of soft (quiet) and hard (pressure) edges manifests a clash that embodies the theme of 'shatter against tide'. This creates a dynamic visual story where each color battle influences the other's presence, resulting in a fragmented yet cohesive whole.</desc>
