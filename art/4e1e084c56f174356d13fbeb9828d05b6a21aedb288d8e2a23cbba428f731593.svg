<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This piece embodies the emotional tension of softness confronting severity through contrasting colors and patterns. The chosen palette—soft powder pink and warm white against sharp crimson and carbon black—creates a dialogue between gentle and harsh elements, reflecting the push and pull of their characteristics. The center is dense and filled with a radial softness that subtly collides with the flooding severity at the edges, imparting a sense of pressure that suggests unresolved emotion. The incorporation of broken pixels serves as intentional disruptions, symbolizing the imperfections found in the balance of guilt and forgiveness, thus contributing to the overall narrative of emotional complexity.</desc>
