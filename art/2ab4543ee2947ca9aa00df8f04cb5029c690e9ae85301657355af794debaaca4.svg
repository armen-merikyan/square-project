<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This composition conveys the emotional interplay between joy and grief through contrasting elements. The palette blends warm yellows and oranges with deep blues and muted purples, representing a spectrum from light to heavy emotions. The left side features a broken dot pattern, symbolizing the fragmented joy, while the right employs a grid, evoking the order of grief. This creates a stark contrast that highlights the collision of feelings, with the introduction of 'burned edges' to signify the rawness of grief. The off-center placement of color clusters creates a dynamic flow, reinforcing the theme of imbalance between joy and grief.</desc>
