<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This composition explores the emotional contrast between vulnerability and strength, using a palette that transitions from pale pastels to deeper hues to symbolize the weight of emotions. The soft cyan and moon white represent vulnerability and exposure, while muted plum and lavender gray bring in strength and stability. The main collision occurs at the center where the braided patterns of vulnerability intersect with the striped patterns of strength, creating a dynamic tension. The layout features a threshold with a clear negative space to enhance the feeling of openness and exposure.</desc>
