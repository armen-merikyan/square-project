<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Heat and Dust</title>
  <desc id="desc">The emotional tone embodies a struggle between vibrancy and desolation. The palette features sharp contrasts between 'spark' colors like electric blue and hot magenta alongside muted tones of static gray and dead black, representing the tension of ignited passion against settled dust. The collision occurs centrally, where a bright cluster of accents confronts a nearly pervasive shadow, echoing the dynamic interplay of remembrance and erasure inherent in the seed. The patterns of 'islands' and 'target' create tension and interruption, illustrating the battle between the forces of yearning and restraint.</desc>
