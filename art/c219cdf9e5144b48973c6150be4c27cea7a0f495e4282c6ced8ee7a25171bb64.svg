<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Calm and Chaos</title>
  <desc id="desc">The emotional tone oscillates between restlessness and peace, highlighting the struggle between constant motion and desired stillness. The palette comprises warm oranges and yellows contrasted against deeper blues and muted purples, creating a visual dialogue of warmth meeting coolness. The collision of 'broken frame' and 'noise' is emphasized through erratic patterns in the center, disrupting an otherwise calm background, representing the push and pull of memory against a backdrop of stillness. The arrangement intentionally utilizes broken pixels to signify imperfections, symbolizing the scars of memory dealing with restlessness.</desc>
