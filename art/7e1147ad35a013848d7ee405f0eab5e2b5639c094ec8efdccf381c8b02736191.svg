<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Echoes</title>
  <desc id="desc">This artwork navigates the emotional landscape between joy and grief. The palette combines bright yellows and oranges representing joy on one side, with deep blues and muted purples capturing the essence of grief on the other. The stark contrast between light and dark colors creates a layered depth, illustrating the dichotomy of emotions. The left side follows a structured mirror pattern, while the right incorporates broken pixels that disrupt this order, symbolizing the chaos of grief infiltrating joy. The edges are hard, representing the abruptness of emotional shifts, while the arrangement suggests a staircase movement, reflecting gradual changes in intensity from the bottom to the top. The piece captures a shifting balance between expanding joy and the heaviness of grief, ultimately portraying the complexities of human emotion.</desc>
