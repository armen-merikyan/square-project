<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This piece embodies the tension between softness and severity. The top half utilizes light, soft tones—powder pink and warm white—creating a serene, gentle atmosphere, suggesting openness and forgiveness. The bottom half embraces darker hues—carbon black and sharp crimson—implying weight and intensity, invoking guilt and pressure. The division is intentionally pronounced, with soft rain-like patterns dripping downward colliding with the rigid lattice of sharp contrast below, symbolizing the struggle between fluidity and tension. The broken pixels serve as irregularities, mimicking emotional cracks, enhancing the story of internal conflict and resolution.</desc>
