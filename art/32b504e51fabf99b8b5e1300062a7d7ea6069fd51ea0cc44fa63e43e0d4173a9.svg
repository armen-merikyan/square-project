<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This work embodies the tension between vulnerability and strength, represented through a palette of pale aqua and mist gray for vulnerability, contrasted with alarm red and ink blue, symbolizing strength. The broken frame layout with minimal negative space captures the feeling of an exposed center, and the collision of static and halo patterns creates a visual representation of emotion overlapping and interrupting. The central red pixel interrupts the cooler tones, signifying a flare of strength amidst vulnerability.</desc>
