<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This piece embodies the emotional tension between safety and exposure through a palette that evokes warmth and vulnerability. The deep greens and warm browns establish a protective frame, while the pale skin and cold white hues suggest fragility in the center. The layout serves as an eroded symmetry, where a dense edge collides with an open center. This contrast is accentuated through a split-screen pattern, creating visual tension and inviting contemplation on the dynamics of shelter versus openness. Broken pixels disrupt the surface, implying imperfections within the protective boundary, allowing for a sense of vulnerability amidst the solidity.</desc>
