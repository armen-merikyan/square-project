<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between States</title>
  <desc id="desc">This abstract piece captures the emotional tension between longing and resolve through contrasting warm and cool tones. The chosen palette of warm coral and soft amber evokes a sense of longing, while the cold slate and blue-black represent resolve. The collision occurs in the center, where these contrasting patterns overlap, displaying both a flood of longing and the firm boundaries of resolve. The presence of broken pixels serves as reminders of imperfections and repairs in our emotional landscape, contributing to a narrative of struggle between completeness and incompleteness.</desc>
