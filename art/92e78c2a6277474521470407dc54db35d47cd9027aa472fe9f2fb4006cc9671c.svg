<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Weight</title>
  <desc id="desc">The emotional tones of panic and control create a juxtaposition within the piece. The palette combines dark violet and black to represent weight and instability, contrasted sharply with soft gold and pale green to evoke a sense of hope and control. The flow from bottom to top signifies ascent amidst tension. The checker and radial patterns reflect the chaotic interplay of emotional states, with bright colors interrupting the darker lattice, providing sparks of light amidst overwhelming weight, manifesting the struggle between stability and chaos as suggested by the seed.</desc>
