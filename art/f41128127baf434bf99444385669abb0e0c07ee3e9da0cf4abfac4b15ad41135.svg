<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Want and Void</title>
  <desc id="desc">The artwork conveys an emotional tug-of-war between the vibrant pulse of desire and the stark emptiness that confines it. The palette, featuring saturated colors like hot coral and blood orange against cooler tones like charcoal and hollow blue, highlights this contrast. The use of crosshatch for desire creates a sense of movement striving outward, while the maze-like patterns of emptiness form restrictive boundaries, symbolizing the tension between overflow and containment. The primary collision occurs along the center, where warm colors push against cooler, creating an unresolved dynamic that draws the viewer's eye throughout the piece.</desc>
