<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">The composition captures the emotional tension between joy and grief, utilizing a palette that juxtaposes warm tones of yellow and orange against deep blues and muted purples. This evokes the heaviness of grief with blue tones in the lower half, symbolizing depth and weight, contrasted sharply by bright, uplifting stripes of joy in the upper half. The split layout mirrors the inner conflict between these emotions, while the crosshatch and checker patterns create an uneasy rhythm, reflecting the imperfect overlaps of experience. With broken pixels introducing intentional disruptions, the piece channels the concept of balance and imbalance—each color capturing a fragment of an emotional journey. Negative space further highlights the contrast, inviting contemplation on what remains unspoken amidst the competing feelings.</desc>
