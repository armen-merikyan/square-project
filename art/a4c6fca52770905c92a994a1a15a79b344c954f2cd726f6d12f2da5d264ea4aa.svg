<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork encapsulates the emotional tension between joy and grief, using a palette of warm yellows and cool blues to create a visual dialogue. The left side displays denser clusters of muted purples representing grief, while the right emerges with brighter yellows and oranges embodying joy. The asymmetry introduces a stark contrast, echoing the conflict of love and betrayal. The arrangement establishes a rhythm, where the central area pulsates with warmth, disrupted by cooler tones at the edges, suggesting both a protective and a broken barrier.</desc>
