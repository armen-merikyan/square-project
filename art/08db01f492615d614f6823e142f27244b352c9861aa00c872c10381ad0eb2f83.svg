<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Tensions</title>
  <desc id="desc">This piece explores the emotional dichotomy between panic and control. The palette blends deep navy and black tones, symbolizing the tense pressure of panic, contrasted with clearer, lighter hues suggesting control. The left side, filled with darker shades, features crack patterns to evoke feelings of breakdown, while the right side uses a framed pattern that provides structure, representing control. The arrangement creates a sense of collapsing pressure inward towards the center, where the struggle between emotions is most intense, visually encapsulating the seed's complexities.</desc>
