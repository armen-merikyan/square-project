<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo and Pulse</title>
  <desc id="desc">This piece explores the tension between clarity and chaos, utilizing a dark palette with bright accents to illustrate the struggle of a readable signal amid noise. The chosen colors represent solitude (navy and black) and bursts of vivid contrast (dim cyan and white), mirroring the emotional push and pull of memory versus erasure. The wave-like tide pattern (representing 'signal') intersects a static scatter (representing 'noise'), with the center serving as a collision point where the two emotions battle for dominance.</desc>
