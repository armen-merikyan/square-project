<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This artwork explores the interplay between restlessness and peace, with a stark contrast highlighted in the edges of the composition. The outer darker colors represent restlessness, creating a weighted 'frame' that contrasts with the lighter, more fluid inner core. The palette of greens, honey gold, and cream evokes growth, warmth, and subtle brightness, suggesting both calmness and agitation. The center section is filled with a dense 'flood' of colors, suggesting motion and dynamism, interrupted by sections of negative space. This juxtaposition mirrors the emotional tone of the seed—fluctuating between peace and unrest, creating a dialogue of balanced tension throughout the square.</desc>
