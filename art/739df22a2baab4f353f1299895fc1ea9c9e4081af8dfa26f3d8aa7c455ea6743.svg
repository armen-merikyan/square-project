  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork captures the emotional tension between defiance and submission through contrasting colors and patterns. The palette includes bold electric blue and magenta for defiance, contrasted with quiet black and lime representing submission. A broken frame layout captures the 'uneven border' concept, with areas of calm interrupted by pulsating colors, embodying 'threshold' and 'chaos'. The central focus hints at a protective core amid surrounding disturbances, creating an abstract narrative of conflict and resolution.</desc>
