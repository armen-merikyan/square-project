<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Disarray</title>
  <desc id="desc">This piece captures the tension between envy and gratitude, illustrating how these emotions inhabit a shared space in our psyche. The dark tones (reds and blacks) represent envy, creating a dense, claustrophobic feel in the top half, while the soft, pale blue and white colors evoke a sense of gratitude and openness in the lower half. The asymmetrical pattern creates an interruption; dark colors bleed into the lighter areas, emphasizing the struggle between these conflicting feelings. The broken pixels introduce imperfections, symbolizing the chaos and noise arising from the emotional conflicts represented in the seed.</desc>
