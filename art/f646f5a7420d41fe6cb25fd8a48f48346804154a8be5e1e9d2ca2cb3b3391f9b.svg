<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">This artwork captures the emotional contrast of intense desire battling against the boundaries of restraint. The palette, drawn from the 'hunger_restraint' theme, employs saturated reds and muted creams to signify heated passion colliding with muted self-control. The edge style is soft, creating a quiet channel through the dense, vibrant patterns that represent desire, while glitch-like interruptions symbolize restraint. The main contrast occurs in the center, where bright colors pulse against muted tones, evoking an emotional conflict between longing and limitation.</desc>
