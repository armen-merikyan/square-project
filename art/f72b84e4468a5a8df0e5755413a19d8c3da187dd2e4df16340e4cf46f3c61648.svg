<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork explores the dynamic tension between rage and calm. The left half, driven by an aggressive red and chaotic patterns, symbolizes rage with jagged bursts echoing a sense of interruption and pressure. Conversely, the right half employs muted, pale blue tones embodying calm and serene flows, contrasting the dense structure on the left. The broken pixels represent imperfections and emotional scars, channeling an abstract narrative of conflict and coexistence. The color palette of red and blue signifies intense emotional extremes, with black serving as depth and white creating quiet moments, allowing for readable composition amidst chaos.</desc>
