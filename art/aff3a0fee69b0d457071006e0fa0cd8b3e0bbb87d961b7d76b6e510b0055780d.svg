  <title id="title">Tensions of Light and Shadow</title>
  <desc id="desc">This composition explores the push and pull between defiance and submission, where the dense and muted colors of submission pool in the corners, overshadowing a bright, active center symbolizing defiance. The palette reflects melancholy wonder with dark shades contrasted by vibrant clusters, translating the concept into a visual narrative of tension. The center-circle pattern brings forth a feeling of protection amidst an encroaching spiral of submission.</desc>
