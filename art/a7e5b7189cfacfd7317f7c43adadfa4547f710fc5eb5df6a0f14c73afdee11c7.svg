<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilient Fragments</title>
  <desc id="desc">The emotional tone juxtaposes the vibrant presence of 'spark' with the quiet residue of 'ash.' I used a palette of lively pink and red against the muted gray and dark maroon to express tension between vitality and decay. The dynamic arrangement, with bright colors clashing against subdued ones, reflects a memory of intensity overshadowed by exhaustion. The deliberate broken pixels create disruptions in the flow, embodying the jagged edges of experience, where moments of brilliance collide with lingering shadows.</desc>
