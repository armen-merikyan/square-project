<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonant Collisions</title>
  <desc id="desc">The emotional tone reflects the interplay between longing and resolve—soft edges around stark contrasts. The palette, inspired by 'relief_dread,' balances muted notes of pale mint and storm gray against a deep near-black, symbolizing calm amidst chaos. The primary collision occurs centrally, where softer forms of longing ('fault_line') clash with the defined shapes representing resolve ('channels'), creating an emotional tension perfected by intentional broken pixels that disrupt the flow while inviting contemplation. The 10% negative space enhances this dichotomy, suggesting intimacy in distance.</desc>
