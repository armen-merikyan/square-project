<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This piece contrasts warm and vibrant colors representing desire with muted and cool tones symbolizing emptiness. The interplay of these colors creates a dynamic tension, reflected in the arrangement that showcases two pulsating centers, surrounded by negative space that implies longing. The use of broken pixels introduces an element of disruption, enhancing the theme of containment against a backdrop of overflowing energy. The layout is a nod to conflict, capturing the push-pull between desire and restraint within a confined space.</desc>
