<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Worlds</title>
  <desc id="desc">The emotional tone reflects a struggle between warmth and coolness, echoing the desire for connection against a backdrop of emptiness. The chosen palette of sepia, tan, dust gray, and faded blue creates a visual representation of muted longing. The main contrast is between the warm tones on the left, denoting desire, and the cool ones on the right, representing emptiness. The layout suggests a stark division with complex patterns of desire (maze) clashing against the simplicity of emptiness (stripes), creating an interplay that flows from left to right, highlighting both absence and yearning.</desc>
