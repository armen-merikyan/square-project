<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Shelter</title>
  <desc id="desc">The emotional tone explores the dichotomy of vulnerability and strength. The palette, 'melancholy_wonder,' uses soft tones to evoke sensitivity while layering on strong contrasts through deeper color placements. The dominant color, muted plum, represents strength, creating a heavy frame around the lighter core, which embodies vulnerability. The main collision occurs at the center where lighter shades break through the border, hinting at exposure amidst safety. This interplay creates a structured yet dynamic atmosphere, reflecting the complexity of emotions captured in the seed.</desc>
