<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Control</title>
  <desc id="desc">The emotional tone captures the struggle between chaos and order. The palette of muted and earthy tones suggests a broken memory, evoking nostalgia and instability. The contrast primarily occurs with dark shades at the edges and lighter colors clustering toward the center. This arrangement reflects a push-pull dynamic, where darker tones represent panic that encroaches upon the light, symbolic of control. The pattern of dots colliding with crosshatch lines expresses the inner conflict felt during moments of distress, heightened by a few broken pixels to introduce imperfection, enhancing the sense of struggle without literal representation.</desc>
