<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Whispers of Tension</title>
  <desc id="desc">This abstract piece captures the emotional tone of softness clashing against severity. The palette features powder pink and warm white representing softness, contrasted with carbon black and steel gray to embody severity. The square's central collision occurs with a cluster of intense colors, reflecting the struggle between quiet softness and harsh realities. As broken pixels disrupt the surface, they echo the themes of guilt and forgiveness, enhancing the layered dialogue within the composition. The diagonal flow brings a sense of movement towards the bottom while leaving enough negative space to maintain emotional balance.</desc>
