<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Boundless Tensions</title>
  <desc id="desc">This piece embodies the emotional pull between desire and restraint through stark contrasts in color. The palette using saturated warm tones like hot coral and blood orange represents desire, while muted colors like charcoal and hollow blue symbolize restraint. The main collision occurs in the center, where warm hues seem to burst outward, attempting to break free from the calm, cool contained edges, creating a dynamic visual tension. The stepwell pattern for desire interacts with the veil pattern of restraint, demonstrating a push-pull effect that is both vibrant and subdued, embodying the essence of the seed's emotional conflicts.</desc>
