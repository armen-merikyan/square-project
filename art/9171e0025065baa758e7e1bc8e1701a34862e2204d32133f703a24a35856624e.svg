<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Echoes</title>
  <desc id="desc">The emotional tone captures the duality of restlessness versus peace, symbolized through an interplay of motion and calm. The palette combines cosmic indigo for depth, void black for quietness, star white for accents, cold gold for warm energy, and deep teal for complexity. The loud vs. quiet contrast manifests in the center’s shatter pattern, creating movement that collides with the peaceful checkerboard edges. These contrasts represent memories and the tension between fractured thoughts and serene spaces, resulting in an abstract representation of internal dialogue.</desc>
