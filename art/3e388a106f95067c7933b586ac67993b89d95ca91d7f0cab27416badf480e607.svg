<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Intersecting Tensions</title>
  <desc id="desc">This artwork expresses the emotional dichotomy of longing and resolve through a palette that juxtaposes warm and cool tones while embodying tension. The use of dark maroon and pink conveys warmth and intimacy, representing longing, while gray represents the distance and restraint of resolve. The layout of stacked bands allows for a visual rhythm that mimics emotional strata, where the deep tones of dark maroon dominate the left side, creating pressure, with the warmer pinks softly interrupting the pattern on the right, introducing a sense of yearning. The broken pixel elements create intentional disruptions, hinting at a trembling bridge between these emotional states. The central collision occurs near the mid-left of the composition, guiding the viewer's eye toward the intersection of desire and determination while ensuring at least 10% negative space to allow for reflection. Overall, this abstract pattern captures the push and pull between these conflicting feelings without resorting to literal representation.</desc>
