<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotions</title>
  <desc id="desc">The emotional tone is derived from the juxtaposition of grief and joy. Using a palette of deep blue to embody grief's heavy, muted nature contrasts against the warm yellows and oranges, signifying the expansiveness of joy. Each side mirrors the other but introduces subtle disruptions, creating a tension where order meets chaos. The arrangement follows a zigzag flow, representing the push and pull of emotions while leaving intentional negative space to convey the weight of absence and the possibility of joy breaking through. The clash of patterns—grid and crack—embodies the structural integrity of grief up against the organic vitality of joy.</desc>
