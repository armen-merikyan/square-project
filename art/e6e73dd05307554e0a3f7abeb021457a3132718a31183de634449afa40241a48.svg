<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Harmony</title>
  <desc id="desc">This piece embodies the tension between restlessness and peace by employing a palette of muted cream, red oxide, and iron gray to create an emotional landscape. The warm accents evoke feelings of energetic motion, while cooler colors establish calm intervals, fostering a push-pull dynamic. The dominant red oxide breaks into the soothing muted cream through erratic flame-like patterns, capturing the essence of overwhelming memories colliding with serene moments. The main contrast occurs centrally, harmonizing the feelings of disruption and tranquility, where the edges give way to darker tones, illustrating erosion and the inevitable interplay of light and dark.</desc>
