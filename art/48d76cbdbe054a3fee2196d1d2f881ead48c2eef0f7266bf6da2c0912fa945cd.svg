<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Safety's Echo</title>
  <desc id="desc">This artwork embodies the tension between safety (deep greens and warm browns) and exposure (pale and cold colors), formulated through a split vertical layout that gives a sense of both pressure and release. The gentle ring of green and brown forms a protective border, while pale skin and cold white echoes ripple inwards, suggesting vulnerability. The domination of soft colors against the striking contrast creates an interweaving effect reminiscent of braided emotional threads. Broken pixels introduce subtle random disruptions, enhancing the feeling of imperfection and evoking deeper layers of emotional experience.</desc>
