  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition embodies the emotional tension between rage and calm, utilizing a palette of red, pale blue, black, and white. The bright reds signify intense emotion and pressure, while softer blues represent calm and tranquility. The main contrast occurs in the center, where jagged red 'stack' patterns collide with horizontal 'fault line' calmer areas, illustrating the battle between overwhelming feelings and serene spaces. The broken pixels introduce intentional imperfections, enhancing the chaos lurking beneath calm appearances, creating an abstract visual journey of contained vs overflowing emotions.</desc>
