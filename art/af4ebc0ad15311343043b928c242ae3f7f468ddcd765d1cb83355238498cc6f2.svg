<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Tension</title>
  <desc id="desc">This piece conveys the push and pull between clarity and chaos by utilizing an intense palette of signal green, electric blue, and hot magenta against a background of static gray. The collision occurs diagonally, where the smooth transitions of the signal colors meet jagged patches of noise, invoking a sense of pulsating tension within the structured chaos. The composition reflects on the emotional themes of interference and discomfort juxtaposed against a fleeting, clean pulse, mirroring the complexities of human emotion in a machine-dominated world.</desc>
