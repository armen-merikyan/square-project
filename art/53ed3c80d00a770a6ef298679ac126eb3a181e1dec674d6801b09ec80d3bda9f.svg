<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Divide</title>
  <desc id="desc">This composition reflects the push and pull between envy and gratitude through contrasting color patterns and placements. The left side embodies a radial pattern in deep blue and muted purple, representing envy, with clustered hues that evoke tension and chaos. In contrast, the right side features a stair-step layout with warm oranges and yellows, portraying gratitude through softer echoes of light that rise upward. The jagged edges amplify this conflict, while careful placements of broken pixels interrupt the flow, solidifying the theme of instability against a backdrop of hope. The negative space lends breathability, suggesting emotional gaps amidst the turbulence.</desc>
