<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Control and Chaos</title>
  <desc id="desc">The emotional tone captures the tension between panic and control, represented by contrasting colors where softer tones are confined to the central area, exuding control, while harsher pixels bleed outwards, suggesting panic and chaos. The palette consists of muted hues of sepia and tan, interspersed with darker gray and faded blue to evoke a sense of nostalgia mixed with turmoil. The layout emphasizes a vertical split, creating a visual dialogue between the two emotions. Broken pixels add imperfection, contributing to the narrative of tension.</desc>
