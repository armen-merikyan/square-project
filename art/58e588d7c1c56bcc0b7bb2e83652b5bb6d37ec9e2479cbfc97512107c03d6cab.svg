<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">The emotional tone reflects the duality of love and betrayal, where warmth clashes against coldness. The chosen palette of pink, red, gray, and dark maroon highlights this tension, with warm colors representing love and cooler tones suggesting betrayal. The layout emphasizes the split between the two emotions, while the edges hint at fragility. The sharp versus soft contrast is mirrored in the diagonal rise, symbolizing rising tension overshadowed by inevitable collapse. The patterns of spark and stairs create a rhythm that oscillates between hope and despair, capturing the essence of the seed's emotional narrative, achieving a balance between pressure and release within the negative spaces.</desc>
