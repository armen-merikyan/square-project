<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">The emotional tone oscillates between 'longing' and 'resolve', with a primary focus on seeking clarity within chaos. The palette—shades of navy and black interspersed with dim cyan and white—reflects distant warmth intertwined with clear boundaries. This creates a stark contrast, with a central collision where both emotions meet, represented by a broken frame pattern amidst a flame-inspired flow. The arrangement intentionally juxtaposes dense clusters against quiet spills of negative space, illustrating an unresolved tension that emanates from the seed concept of repair versus damage.</desc>
