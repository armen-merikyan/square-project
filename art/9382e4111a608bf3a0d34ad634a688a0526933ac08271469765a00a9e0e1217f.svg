<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Longing and Resolve</title>
  <desc id="desc">This piece captures the emotional duality of longing and resolve, employing a palette that balances deep blues with muted greys and a hint of pale yellow to convey both a sense of weight and hopeful illumination. The center features a collision of broken pixels which represents repair and damage, creating tension between the steady pulse of resolve and the fragmented nature of longing. The composition uses stark contrasts between tightly clustered colors and negative spaces to evoke a feeling of both containment and overflow, reflecting the theme of ‘contained vs overflowing’ suggested in the seed.</desc>
