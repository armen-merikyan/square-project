<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone underlying this artwork presents a conflict between warmth and betrayal, represented by the soft pink and dark maroon hues. The top half of the piece embodies love through a noise pattern, featuring vibrant pinks that pulsate with energy, while the bottom half reflects betrayal using a maze-like structure of dark maroon and gray, creating feelings of entrapment. The contrast between the flowing warmth of the upper half and the harsh, fractured geometries of the lower half symbolizes the tension between affection and deceit. Crevices in the pixel arrangement hint at the cracks of a broken connection, enhancing the sense of fragmentation. Altogether, the composition balances density with openness, establishing a visual narrative about emotional conflict.</desc>
