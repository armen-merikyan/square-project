<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Boundaries</title>
  <desc id="desc">This artwork embodies the emotional tension between control and surrender. The palette incorporates muted tones like dusty gray and faint peach to suggest softness, while the compressed red adds urgency, imbuing the piece with both pressure and release. The split vertical layout highlights the collision between a thicker, darker left side (representing control) and a softer, lighter right side (representing surrender). The central area, rich with overlapping colors, creates an 'overfilled' sensation, symbolizing struggles between constriction and freedom. The chosen patterns reflect rigid pressure bands on the left versus flowing braids on the right, enhancing the narrative of emotional discord.</desc>
