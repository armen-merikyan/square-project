<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Dualities</title>
  <desc id="desc">This composition embodies the tension between longing and resolve. The chosen palette combines warm and cool tones to represent the emotional depth of desire (rose clay, warm shadow) against the clear boundaries of determination (cool blue, distant lilac). The broken dots pattern juxtaposed with islands creates a dynamic visual rhythm, suggesting interrupted continuity in the playful collision of colors. The main contrast occurs around the center, where the density of warm colors pushes against the cooler, sparking an emotional pulse through the grid. Broken pixels enhance the feeling of imperfection, echoing the themes of repair versus damage, while maintaining enough negative space to allow the emotions to breathe and resonate.</desc>
