<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Containment</title>
  <desc id="desc">The emotional tone represents a struggle between longing (desire) and confinement (restraint). The palette features saturated hues like hot coral and blood orange, suggesting intense yearning, while muted tones like charcoal invoke a sense of holding back. The left half, dominated by the warm colors, conveys a saturated pulse of longing, while the right half presents cooler muted shades, symbolizing the struggle against that yearning. The collision occurs near the central divide, where the warmth heats the cool, creating tension. The chosen patterns, broken frame for desire and ripples for restraint, contrast in their flow—one reaching out, the other holding firmly, visually narrating the dynamics of longing vs. containment.</desc>
