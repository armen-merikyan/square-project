<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interference of Resistance</title>
  <desc id="desc">The emotional tone reflects a tension between defiance, symbolized by the striking use of hot coral and blood orange, against the softer, subdued feelings of submission represented by dust pink and charcoal. A layout of dense pressure with a broad channel of negative space accentuates this contrast, while the uneven edges speak to chaos amid order. The glitch pattern collides profoundly with the pressure band, igniting a dynamic pulse throughout the square, driven by the crack shape seed as an abstract metaphor for conflict.</desc>
