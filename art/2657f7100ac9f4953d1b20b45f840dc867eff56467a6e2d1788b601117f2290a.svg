<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Echoes</title>
  <desc id="desc">The emotional tone explores the dichotomy between loneliness and connection, using a palette of electric blues and vibrant magenta against the grounding black to evoke a sense of conflict and tension. The layout splits the artwork into contrasting halves, emphasizing the larger negative space associated with loneliness in the top half, while more clustered connections appear in the bottom. The use of broken pixels hints at memories that are fractured, creating a story of longing and disruption. The clash of dense groups of color with soft edges articulates the push and pull between feeling isolated and desiring connection.</desc>
