<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition navigates the emotional tension between vulnerability and protection. The left half, dominated by cool greens and a pale skin neutral, embodies softness and exposure, while the right half employs warm browns and an echo of cold white to encapsulate stability and shelter. The sharp contrast between the soothing left side and the more chaotic texture of the right suggests a tension between the two motifs. Broken pixels introduce moments of imperfection, hinting at the fragility present in the idea of shelter. The split vertical layout visually represents the dichotomy, with colors colliding at the center echoing the emotional crossover of safety and exposure.</desc>
