<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Contrast</title>
  <desc id="desc">The artwork embodies the tension between restlessness and peace through a zigzag flow and diagonal layout. The chosen palette—shelter green and cold white for tranquility, and warm brown and pale skin for warmth—contrasts sharply against the too-cool, calm blue, depicting a restless interplay of emotions. The central collision arises from layered ripples of restlessness in the lower left, pushing against the protective, mirror-like symmetry of peace in the upper right, emphasizing the emotional battle.</desc>
