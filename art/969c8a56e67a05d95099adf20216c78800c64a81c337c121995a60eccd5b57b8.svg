<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Forces</title>
  <desc id="desc">This artwork embodies the emotional tension between panic and control through the deliberate placement of colors and patterns. The palette, inspired by 'broken_memory', features muted sepia and tan tones contrasted with sharper faded blues, representing the struggle between chaotic emotions (represented by the crosshatch pattern) and a sense of control (embodied by the rain pattern). The structured arrangement flows in a zigzag, suggesting instability while still maintaining central heaviness and an overall balance of negative space, reflecting the emptiness of the room and the internal chaos. The artwork evokes a narrative of a small spark of clarity fighting against a weighty backdrop of confusion, aligning with the seed's themes of emotional conflict and balance.</desc>
