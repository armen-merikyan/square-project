  <title id="title">Fractured Harmony</title>
  <desc id="desc">This artwork encompasses the emotional tension of 'panic' versus 'control,' with a contrasting palette that reflects the dichotomy of stability and disorder. The left side employs warmer, muted tones that evoke a sense of pressure ('panic'), while the right side features cooler, stable colors that represent order and calmness ('control'). The arrangement suggests a zigzag rhythm that echoes conflict, complemented by uneven placements representing broken moments. Imperfections add a layer of authenticity, drawing attention to the chaotic nature while maintaining a semblance of structure.</desc>
