<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the tension between spark (energy, life) and ash (quiet, decay). Utilizing a palette of warm brown and shelter green as the dominant hues, the piece exudes a sense of grounded resilience contrasted by splashes of cold white and open blue that signify fleeting sparks of vitality. The center features aggressive collisions of thread-like patterns against patchwork, creating a sense of interruption in the composition. The tension is intensified with broken pixels representing scars or disruptions in the narrative, while maintaining a negative space that invites contemplation without overwhelming the viewer. Overall, the artwork suggests a dialogue between chaos and calm, resilience and fragility, evoking feelings of nostalgia and urgent remembrance.</desc>
