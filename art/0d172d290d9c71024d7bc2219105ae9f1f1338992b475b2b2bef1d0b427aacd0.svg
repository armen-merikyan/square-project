<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory in Motion</title>
  <desc id="desc">This composition captures the tension between fleeting sparks of energy and the settled remnants of ash. The palette of burnt orange, dark red, charcoal, and gold embodies a warmth that suggests both vitality and restraint. The contrasting colors collide diagonally across the square, with the lighter gold piercing the deeper hues, symbolizing moments of clarity amidst the material weight of memory. The pattern emerges from the interplay of broken frames and glitch effects, representing the fractured nature of recollection and emotion. The overall flow draws the eye downward, like falling ash or tears, yet remains interrupted by bursts of light evoking resilience.</desc>
