<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Pulses</title>
  <desc id="desc">The artwork captures the tension between the clarity of signal and the chaos of noise, embodying the emotional tone of interference with clearly defined sections of calm and disruption. The chosen palette of navy, black, and dim cyan reflects loneliness and the quiet edge of clarity amidst the noise. The main collision occurs centrally, where structured 'stepwell' patterns of signal overlap with the scattered 'ripple' patterns of noise, creating an abstract notion of memory challenged by erasure. Broken pixels throughout signify disruptions, inviting a layered sense of legacy and impermanence.</desc>
