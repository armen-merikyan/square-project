<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotive Convergence</title>
  <desc id="desc">This piece captures the tension between longing and resolve. The outer 2 rows embody longing with a soft gradient of shadows, creating an expansive, quiet field that evokes a sense of distance and yearning. The core 4 rows, filled with a sharp, disrupting pattern of bright colors, represent resolve, forming a striking contrast to the outer rows. The palette, inspired by 'gratitude_envy', reflects both warmth and tension, influencing the emotional tone deeply. The collision occurs centrally, where the two opposing feelings interact, creating an engaging visual dialogue. Broken pixels intermittently disrupt the resolve layer, suggesting imperfections and echoing themes of vulnerability within strength.</desc>
