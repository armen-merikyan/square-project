<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure Against Resistance</title>
  <desc id="desc">This piece captures the emotional tension between vulnerability and strength through a palette of soft and severe colors. The dominant use of powder pink and warm white evokes a sense of fragility and openness, while sharp crimson and carbon black inject themes of resilience and power. The radial pattern for vulnerability collides with the structured target pattern of strength, playing out in an argument grid layout. The main collision occurs centrally, depicting a struggle where the soft hues attempt to push through the sturdier edges, leaving intentional broken pixels as scars and imperfections to highlight the ongoing battle between these contrasting forces.</desc>
