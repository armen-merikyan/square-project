  <title id="title">Tension of Hearts</title>
  <desc id="desc">This artwork embodies the emotional turmoil between love and betrayal, utilizing a color palette that transitions from warm pinks and reds to cool grays and dark maroon. The contrasting patterns of checker and frame create a push-pull dynamic, where the symmetry is disrupted by streaks of dissonance. The flow from top to bottom allows for a gradual descent into emotional complexity, while the broken pixels symbolize the disruption of trust. The intentional use of negative space invites the viewer to reflect on empty moments amid emotional chaos, evoking feelings of solitude and conflict.</desc>
