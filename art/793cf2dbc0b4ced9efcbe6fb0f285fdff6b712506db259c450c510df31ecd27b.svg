<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a tension between desire and restraint, characterized by a push and pull through color contrast. The palette consists of vibrant, saturated colors like hot coral and blood orange, symbolizing desire, juxtaposed with muted tones like charcoal, representing restraint. The central collision occurs through diagonal and horizontal movements that interlace, creating an intense area of pressure in the center, echoing the interplay of yearning and containment. The broken pixels introduce imperfections, hinting at disruptions in flow and boundaries, further enhancing the narrative of a passionate reach toward the edges of confinement.</desc>
