<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">This artwork embodies the emotional tension between hope (spark) and weariness (ash). The palette of mourning black, deep blue, new leaf, pale yellow, and stone evokes a journey through darkness into renewal, with quiet fields representing ash and crosshatch strokes signifying sparks. The collision occurs centrally, where deep blue and pale yellow intersect, suggesting a struggle between opposing forces. The broken frame layout allows for deliberate gaps, symbolizing leaks of unresolved emotion through jagged edges. Overall, the piece captures a push-pull feeling of resilience confronting fragility.</desc>
