<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Hearts</title>
  <desc id="desc">The piece conveys a tug-of-war between love and betrayal, using warm pinks and reds to represent love's embrace against the colder, muted grays and dark maroons symbolizing betrayal. The piece utilizes a diagonal flow to suggest rising tension, while the broken edge style reflects the jagged emotional landscape. The inner space features soft cracks symbolizing love's fragility, surrounded by stark darker hues signifying betrayal's grip. This collision creates a visual echo of emotional conflict, highlighting the delicate balance and pressure within relationships.</desc>
