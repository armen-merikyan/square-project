<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust</title>
  <desc id="desc">This composition captures the tension between trust and suspicion through a balanced interplay of warm and muted tones. The palette consists of deep wine and ash gray to suggest depth and subtle intrigue, while soft gold and warm ivory offer a sense of comfort and stability. The main contrast occurs at the intersection of these tones, creating a collision of soft warmth against darker shadows, reflecting the emotional turbulence of trust versus suspicion. The broken dots pattern represents suspicion, interrupting the steady ripple of trust, suggesting a central echo mark that embodies fragility amid resilience. The arrangement leaves negative space that emphasizes the emotional weight of the concepts.</desc>
