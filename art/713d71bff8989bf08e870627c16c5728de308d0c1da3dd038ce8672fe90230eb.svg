<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Affection</title>
  <desc id="desc">The emotional tone of this piece contrasts love and betrayal, represented through warm and cool colors. The palette combines shades of pink and red for warmth with gray and dark maroon for coldness, suggesting a struggle between intimacy and discord. The diagonal layout introduces tension as the warm colors rise from one corner, colliding with the darker tones that emerge irregularly, akin to cracks in a solid surface. The pattern of dense versus sparse areas reflects the heart fragment—a symbol of emotional duality—while hard edges invoke the feeling of an unresolved conflict.</desc>
