<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tectonic Imbalance</title>
  <desc id="desc">This artwork represents the emotional conflict between envy and gratitude, captured through jagged edges and contrasting colors. The palette of black, dark violet, soft gold, and pale green reflects a spectrum of coldness and warmth, where dark tones signify envy and softer hues represent gratitude. The tension primarily arises at the edges, where the bold patterns of envy (stripes) collide with the gentle framing of gratitude. This disruption invites introspection, echoing the empty room themes in the seed. The spacing allows for negative space, enhancing the idea of a vast emotional landscape with an unsettled core.</desc>
