<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Connection</title>
  <desc id="desc">This piece captures the emotional tension between loneliness and connection through color and pattern. The left side reflects loneliness with muted greys and maroon to evoke isolation, using a crosshatch pattern to create a sense of distance and separation. In contrast, the right side bursts with vibrant pinks and reds, symbolizing connection, employing a noise pattern that conveys the chaotic energy of togetherness. The split vertical layout emphasizes the emotional divide, while a blend of broken pixels introduces unpredictability, representing imperfections in relationships. The central area showcases both emotions colliding, hinting at the complexity of moving between isolation and community.</desc>
