  <title id="title">Tension of Duality</title>
  <desc id="desc">This artwork explores the emotional tones of softness and severity through contrasting colors and patterns. The palette combines warm white and powder pink to represent softness, while carbon black and sharp crimson embody severity. The central row features a collision of brighter colors against muted fields, highlighting the dynamic tension, as soft colors overflow beyond the boundary created by the dark and sharp elements. The 'cross_current' layout emphasizes movement in two directions, enhancing the emotional stakes and suggesting an unresolved dialogue between conflicting forces.</desc>
