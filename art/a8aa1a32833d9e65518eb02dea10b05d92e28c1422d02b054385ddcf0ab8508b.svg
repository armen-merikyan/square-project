<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Existence</title>
  <desc id="desc">This composition explores the duality of 'spark' and 'ash', where vibrant energy meets soft residue. The palette consists of electric blue as an accent against a black background, representing sudden brightness contrasted with a quiet, fading presence. The top half follows a barcode pattern reflecting controlled, rhythmic ash, while the bottom half features islands suggesting scattered bursts of spark. The central intersection is chaotic, representing the tension between resilience and fragility amidst a backdrop of jagged edges. The broken pixels add intentional disruptions to echo the impermanence of memory and the struggle between hunger for more versus the need for restraint.</desc>
