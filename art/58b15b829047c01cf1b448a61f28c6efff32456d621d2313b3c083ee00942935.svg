<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">The emotional tone captures the dichotomy between peace and restlessness. The palette, rich with dark maroon, gray, pink, and red, contrasts a weighty darkness against fleeting brightness. The central conflict occurs diagonally, where the lighter colors intrude into the heavier edges, suggesting movement amid stillness. Patterns of stepwell embody restlessness with chaotic, uneven clusters, while broken frame patterns suggest structured peace along the edges, creating a dynamic, unresolved tension.</desc>
