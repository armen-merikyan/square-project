<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece evokes the emotional tension of vulnerability and strength through a deliberate collision of colors and patterns. The outer edges consist of deep, muted colors representing the weight of exposure and shelter, creating a thin protective layer around the vibrant central area that radiates strength and stability. The chosen palette of black, dark violet, soft gold, and pale green embodies fear and hope, creating a stark contrast that emphasizes vulnerability's fragility against strength's assertiveness. The collision occurs at the center, where the edges' darkness presses inward against the light, symbolizing the interplay of protection and exposure, thus capturing the essence of the seed text and transforming it into an abstract narrative.</desc>
