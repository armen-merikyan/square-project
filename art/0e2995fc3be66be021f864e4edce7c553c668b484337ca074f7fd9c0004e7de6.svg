<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure Encased</title>
  <desc id="desc">This piece captures the dynamic tension between safety and exposure. The soft, warm tones of the borders contrast with the pale, almost fragile center, suggesting vulnerability. The use of deep greens and browns evokes a sense of shelter, while the cool whites and blues imply the starkness of exposure. The arrangement emphasizes the collision of these emotions, starting from the corner and expanding diagonally to showcase an echo effect where pressure meets release. The artwork effectively reflects the rhythm of safety enveloping the open space, with echoes of the opposing emotion subtly bleeding into that central area.</desc>
