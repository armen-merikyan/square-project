<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Echoes</title>
  <desc id="desc">This composition captures the tension between tenderness and rage through contrasting color palettes and patterns. The deep blacks and sharp reds represent the intensity and urgency of rage, while the muted pale blues and whites evoke a gentle tenderness. The piece features a primary collision in the central area, creating a visual narrative of emotional upheaval. The 'falling pixels' layout emphasizes a descent of emotions, mirroring the quiet chaos of a rain-soaked constellation. Broken pixels act as unexpected scars, reinforcing the theme of imperfection and vulnerability amidst the chaos of rage.</desc>
