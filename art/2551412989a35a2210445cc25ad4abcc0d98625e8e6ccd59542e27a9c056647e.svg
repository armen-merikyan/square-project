<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inner Turmoil</title>
  <desc id="desc">This composition reflects the emotional tension between 'panic' and 'control.' The palette 'broken_memory' was chosen for its muted yet warm tones, representing the fading clarity of control amidst chaos. The central dark mass disrupts the lighter perimeter, creating a collision of emotions. Stripes radiate outward, signifying panic's encroachment, while maintaining an echo of structured dots that symbolize control in the background. The arrangement also leaves a significant amount of negative space, illustrating the void when control is lost. Overall, the pixel arrangement captures the struggle between chaos and order, with jagged edges enhancing the feeling of unease.</desc>
