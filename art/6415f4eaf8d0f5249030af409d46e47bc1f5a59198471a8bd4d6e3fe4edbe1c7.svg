<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Tension</title>
  <desc id="desc">The emotional tone of this piece reflects the tension between relief and dread, encapsulated in the contrasting colors and their arrangement. The chosen palette of sepia, tan, dust gray, and faded blue echoes a sense of broken memories, where the lower tone embodies dread and the upper lighter shades suggest relief. The heavy dark colors frame the canvas, while lighter colors create a pattern of stripes, symbolizing the fight for calm amidst chaos. The sharp edges enhance the collision between these emotions, and the broken pixels introduce imperfection—reflecting the cracks in our emotional states. The layout guides the viewer from top to bottom, reinforcing the feeling of weighted pressure releasing into lighter space, embodying the dynamic interplay between control and chaos.</desc>
