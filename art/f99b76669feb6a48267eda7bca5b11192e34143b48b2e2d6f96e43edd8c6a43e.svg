<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">This artwork explores the emotional tension between tenderness and rage through a palette that juxtaposes deep reds (representing rage) with softer tones like pale blue and white (symbolizing tenderness). A dense lattice pattern of red clashes with the delicate thread-like flow of blue, creating a striking contrast that captures the collision of these feelings. The arrangement evokes a sense of unrest, with a central band of intense color interspersed with quiet fields, symbolizing the push and pull of internal experiences influenced by external chaos. The 'root' shape seed is abstractly expressed through the layering, emphasizing an underground tension.</desc>
