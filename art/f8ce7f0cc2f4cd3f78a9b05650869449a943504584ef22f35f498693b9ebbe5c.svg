<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Shadows and Light</title>
  <desc id="desc">This composition explores the emotional battle between fear and hope. The palette, featuring stark contrasts of black and soft gold, illustrates fear's jagged edges against hope's delicate light. The checker pattern of fear creates dense, chaotic zones, while the broken dots of hope break the rhythm, suggesting fleeting moments of brightness amidst darkness. The arrangement uses a center-heavy layout with the dark colors encapsulating a central soft gold pixel, representing the core of hope struggling against external pressures. Areas of negative space evoke the weight of looming fear, while structured clashes between bold and subtle colors enhance the drama of collision.</desc>
