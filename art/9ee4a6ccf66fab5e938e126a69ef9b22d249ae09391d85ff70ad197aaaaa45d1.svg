<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">The emotional tone juxtaposes awe and terror, creating a tension between lightness and heaviness. The chosen palette, rooted in shades of pink, red, gray, and dark maroon, symbolizes the warmth of awe against the gravity of terror. The contrast emerges in the arrangement, with lighter colors positioned to the center contrasting against the darker edges, embodying a split-screen effect. Each color subtly bleeds into the others, representing memory and instability, while respecting a necessary negative space, invoking an emotional echo. The composition encourages the viewer to navigate the feelings of the light and the weight, evoking a sense of both comfort and unease.</desc>
