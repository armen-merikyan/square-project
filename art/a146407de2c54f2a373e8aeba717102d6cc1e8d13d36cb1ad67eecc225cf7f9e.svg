<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Converging Forces</title>
  <desc id="desc">The emotional tone is one of tension between calmness and rage, reflected in a palette of deep black, stark white, pale blue, and bright red. The black and white form the quiet channel that contains the intense red, representing rage breaking through calm. The collision occurs prominently in the center, where jagged red patterns erupt against horizontal blue fields, suggesting a disruption in serenity by chaotic force. The seed words driven from themes of noise vs signal and symmetry give rise to an abstract, jagged structure that evokes a sense of conflict and emotion.</desc>
