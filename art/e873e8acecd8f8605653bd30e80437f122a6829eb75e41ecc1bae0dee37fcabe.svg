<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Longing</title>
  <desc id="desc">This composition embodies the emotional tension between longing and resolve. The palette features deep teal and cosmic indigo as dominant hues representing longing, contrasted by sharp white accents symbolizing resolve. The interplay of hard and soft edges creates a tension between stability and disruption. The center of the grid serves as the main collision, where the crosshatch of resolve disrupts the surrounding frame of longing, while broken pixels introduce intentional imperfections, echoing themes of damage and repair.</desc>
