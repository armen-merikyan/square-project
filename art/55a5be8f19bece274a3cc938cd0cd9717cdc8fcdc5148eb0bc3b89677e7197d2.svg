<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Desire</title>
  <desc id="desc">This artwork embodies the emotional struggle between desire and restraint through a vibrant clash of colors. The palette, featuring hot coral and blood orange, expresses intense longing, while charcoal and hollow blue introduce an element of cool restraint. The pressure band pattern captures the overwhelming nature of desire, while dotted shapes symbolize the barriers that hold it back. The main collision occurs in the center, where warm colors interlace but are confined by muted edges, creating a visual narrative of longing constrained by limitations. This compression of space through color and pattern reinforces the dialogue between craving and containment, embodying the tension suggested by the seed.</desc>
