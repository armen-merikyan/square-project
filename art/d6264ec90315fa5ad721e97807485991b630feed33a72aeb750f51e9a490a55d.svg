<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow and Containment</title>
  <desc id="desc">This work explores the emotional tug-of-war between rage and calm, represented through contrasting textures and colors. The palette features intense reds that signal an emotional outburst—symbolizing rage—interspersed with soft, pale blues reflecting calm. The layout embodies a scattered repair where bright pixels disrupt darker backgrounds, suggesting a struggle to contain chaos. Main collisions occur in the center, where hot reds and cool blues clash without resolution, echoing the tension between these two emotional states.</desc>
