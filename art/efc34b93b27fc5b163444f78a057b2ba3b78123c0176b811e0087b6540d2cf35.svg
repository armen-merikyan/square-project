<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Tension</title>
  <desc id="desc">This art piece reflects the emotional dichotomy of trust and suspicion through a structured grid. The outer border represents suspicion with dark hues of #2C2A3B and #4E4B59, creating a pressure zone. The inner core, utilizing warm tones like #D6C7B6 and #AA5A2A, symbolizes trust and resilience in the face of pressure. The collision happens at the central axis where the trust colors intercept the suspicion colors, providing a rich contrast that hints at conflict and resolution. Through broken pixels, the piece feels dynamic, portraying how trust can break amidst suspicion.</desc>
