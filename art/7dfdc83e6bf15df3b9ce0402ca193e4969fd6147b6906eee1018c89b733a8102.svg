<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork captures the emotional collision between defiance and submission by juxtaposing dense color fields representing defiance with softer, receding tones symbolizing submission. The palette of mourning black and deep blue signifies the depth of the struggle, while new leaf and pale yellow represent moments of resilience and hope. The main contrast occurs at the center, where the strong angular structure of the star shape collides with the softer edges, illustrating the tension between firmness and fragility in human emotions. The broken pixels create intentional disruptions, echoing the complexity of the feelings in the seed.</desc>
