<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Pulses</title>
  <desc id="desc">This piece reflects the emotional contrasts of longing and resolve through a structured palette of greens and golds, fostering a feeling of yearning that meets firm determination. The deep olive and honey gold create a vibrant center, suggesting resolve, while the cream fields evoke longing in surrounding negative space. Noteworthy, the collision of colors occurs towards the center, with touches of ripe green layered for depth against a static ash field, embodying the push and pull of emotions. Broken pixels introduce deliberate imperfections, creating a dynamic interplay that invites the viewer to feel the tension.</desc>
