<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">The emotional tone is a dynamic interplay between joy and grief, captured through contrasting colors and forms. The bright yellows and oranges symbolize joy, while the muted purples and deep blues represent grief, creating a visual tension. This tension is emphasized by a checker pattern in the grief section and a target pattern in the joy section, reflecting the structured chaos of life's experiences. The negative space is deliberately maintained to suggest calmness amid the emotional collision, allowing the joyful bursts to resonate against the heavier, darker tones.</desc>
