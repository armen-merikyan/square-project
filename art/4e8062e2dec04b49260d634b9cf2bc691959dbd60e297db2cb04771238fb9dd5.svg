<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Essence</title>
  <desc id="desc">This composition captures the delicate balance between vitality and decay, emphasizing the tension between the quick bursts of spark and the soft remains of ash. Utilizing a palette of off-white, dust gray, compressed red, dark navy, and faint peach creates a muted yet poignant atmosphere, where red accents symbolize bursts of energy amidst the stark gray representing moderation and exhaustion. The central focus exhibits a radial clash of colors that suggests a struggle while the edges hold a thicker outline reflecting jaggedness and unresolved emotions. This composition resonates as a story of resilience against fragility, an ongoing conflict within the viewer’s psyche.</desc>
