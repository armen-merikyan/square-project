<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensions of Light and Shadow</title>
  <desc id="desc">This composition explores the emotional interplay between joy and grief, presenting a contrast of expanding warmth against heavy blues. The palette includes bright yellows and oranges for joy, juxtaposed with muted purples and deep blues representing grief. The arrangement is centered with density on one side, creating a visual tension that echoes the emotional complexity of the seed. The broken pixels introduce imperfections to signify the unpredictability of emotions, while soft edges maintain a sense of connection. The overall rhythm flows downward, symbolizing the weight of grief juxtaposed with the upward movement of joy.</desc>
