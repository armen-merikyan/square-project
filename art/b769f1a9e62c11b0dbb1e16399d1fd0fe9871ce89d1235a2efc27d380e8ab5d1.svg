<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">The work reflects the emotional struggle between envy and gratitude, using a contrasting palette of dark navy and light dim cyan to signify heavy feelings clashing with lightness. A mirroring layout embodies conflict while soft edges create a sense of fluidity, tension residing in the central area while edges retreat, leaving negative space. The pattern alternates between clusters of noise and radial bursts, representing the push-and-pull of the emotional landscape.</desc>
