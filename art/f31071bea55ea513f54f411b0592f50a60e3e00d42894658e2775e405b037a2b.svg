<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of the Bound</title>
  <desc id="desc">This artwork encapsulates the emotional tone of longing and resolve through a contrasting palette of resilience and fragility. The use of moss green and rust brings a sense of organic depth while bone white serves as a quiet field. In the center, colors collide as a focal point of tension, mirroring the struggle between longing's soft edges and resolve's firm structure. The main collision emerges in the center, allowing for a push-pull effect within the otherwise serene layout, embodying empathy between the contrasting emotions.</desc>
