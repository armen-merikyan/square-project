<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Emotion</title>
  <desc id="desc">This artwork explores the emotional tension between defiance and submission through contrasting colors and patterns. The color palette of pink, red, gray, and dark maroon reflects the interplay of warm and cool tones, symbolizing love and betrayal. The left and right sides are almost mirrored but disrupted with broken pixels, creating a visual imbalance that represents the conflict between security (submission) and uncertainty (defiance). The dot and crack patterns across the matrix convey the underlying noise and energy of the emotional landscape, while maintaining negative space to emphasize moments of quiet amidst the chaos. The central weight is illustrated by the darker hues, signifying a deeper emotional weight that is released at edges, evoking a sense of unresolved motion.</desc>
