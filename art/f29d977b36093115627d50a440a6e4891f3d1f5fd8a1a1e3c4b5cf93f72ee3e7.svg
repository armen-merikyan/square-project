<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This piece captures the interplay between joy and grief, represented through bright yellows and oranges against muted purples and deep blues. The horizontal split evokes the tension between order and chaos. The crosshatch pattern of joy merges softly into the dot patterns symbolizing grief, creating a pattern rich in emotional resonance. The placement of contrasting colors in the upper and lower rows creates visual tension, reflecting the oscillation between hope and despair, with warmer colors echoing the flicker of hidden flames in the midst of heavy, somber tones.</desc>
