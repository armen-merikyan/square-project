<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork embodies the emotional conflict between desire and emptiness through color and pattern. The warm tones symbolize desire (represented through hues like hot coral and blood orange), while the cooler shades suggest emptiness (utilizing colors like charcoal and hollow blue). The central area, with a density of vibrant colors, contrasts against the calmer corners, representing the pressures of overflowing desire against the boundaries of restraint. The negative spaces evoke feelings of loss, leaving room for contemplation, while the broken pixels disrupt the surface, imitating scars of longing. Overall, the interplay of saturated and muted tones creates a narrative of tension and unresolved emotion.</desc>
