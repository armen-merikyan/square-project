  <title id="title">Fractured Embrace</title>
  <desc id="desc">This artwork translates the duality of love and betrayal into a contrasting palette that reflects warmth against the harshness of a broken connection. The deep reds and pinks symbolize love's warmth, while the gray and dark maroon represent the cold betrayal that fractures it. The layout adheres to a frame-and-core structure, where a vibrant core is encased in darker hues. The arrangement emphasizes a spiral flow that suggests tension, movement, and unresolved emotions between the inner and outer spaces. The use of broken pixels introduces an imperfection that mirrors the fragility of emotions. The collision occurs at the boundaries of the contrasting colors, symbolizing the tension between the two feelings.</desc>
