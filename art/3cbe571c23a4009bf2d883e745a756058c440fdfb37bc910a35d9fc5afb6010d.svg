<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">This artwork navigates the emotional landscape of longing and resolve, represented through a palette of muted greens and browns punctuated by cooler shades. The main collision occurs in the center, where a lattice of longing meets the scattered dots of resolve. The chosen palette suggests safety and exposure, evoking a sense of calm amidst tension. The slight disruptions—broken pixels—act as scars in the surface, hinting at the complexities within. The layout of the piece adheres to the 'mirror_broken' concept, enhancing the feeling of contrast while preserving enough negative space to allow introspection.</desc>
