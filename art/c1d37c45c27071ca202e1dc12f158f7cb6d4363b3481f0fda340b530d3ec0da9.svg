<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This artwork embodies the emotional tension between ignition and decay, using contrasting tones to reflect the struggle between vibrant bursts of life (spark) and the quiet aftermath of existence (ash). The 'fear_hope' palette captures the duality of these feelings—dark violet and black evoke a sense of weight and restraint, while soft gold and pale green add moments of brightness and freshness. The main collision occurs diagonally across the grid, where the sharp, crack-like patterns of soft gold disrupt the muted echoes of ash, symbolizing resilience against the lingering memory of erasure. The layout gives a sense of brokenness, while leaving ample negative space to evoke contemplation.</desc>
