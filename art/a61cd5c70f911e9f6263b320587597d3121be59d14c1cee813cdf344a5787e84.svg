  <title id="title">Spiral of Contrast</title>
  <desc id="desc">This artwork embodies the emotional tension between vulnerability and strength, utilizing a palette that reflects desire and emptiness. The strong edges of charcoal create a protective boundary around the pale center, representing vulnerability, while the warm coral and blood orange accents spark connection amidst the surrounding weights of muted hues. The flow is spiral, indicating the turbulence of shifting emotions, and the interplay of crosshatch and channel patterns enhances the collision of feelings, suggesting a dynamic movement inward and outward.</desc>
