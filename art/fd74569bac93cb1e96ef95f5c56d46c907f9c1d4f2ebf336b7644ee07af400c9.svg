<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Dread and Curiosity</title>
  <desc id="desc">This piece embodies the emotional tension between certainty and curiosity through contrasting colors and patterns. The palette combines muted tones of off-white and gray with the more intense hues of compressed red and dark navy, reflecting the underlying conflict of a structured world grappling with unpredictable questions. The dominant vibe of certainty forms a heartbeat pattern throughout the composition, with interruptions of curiosity hinted at by patchwork-like arrangements. The central collision occurs where dense clusters of navy clash with the starkness of ivory, creating visual friction that captures the essence of inquiry amidst stability.</desc>
