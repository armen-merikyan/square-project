<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This abstract piece explores the emotional tension between rage and calm through contrasting colors and arrangements. The palette combines deep reds and blacks, representing rage, with soft pale blues and whites symbolizing calm. The layout, featuring two pulsating centers, highlights the collision between emotional extremes. The patterns of threads and barcodes create an impression of interruption and symmetry erosion, manifesting the struggle of contained versus overflowing emotions. Broken pixels serve as intentional disruptions, adding depth and complexity to the chaos of the composition.</desc>
