<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone of this piece reflects the tension between safety and exposure, using colors that signify warmth and comfort against stark openness. The palette was chosen to evoke a feeling of cozy containment (warm_brown, shelter_green) in juxtaposition with pale and cold nuances, representing vulnerability (cold_white, pale_skin, open_blue). The layout follows a diagonal wedge, with the heavier, darker colors on one side suggesting safety, gradually giving way to lighter, more exposed colors symbolizing vulnerability, echoing the tension between pressure and release. The broken pixels introduce intentional disruptions in the solid colors, akin to scars or imperfections amidst comfort, further accentuating the emotional dialogue. The main collision occurs along the diagonal, where safety and exposure interact vividly.</desc>
