<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This artwork encapsulates the emotional tension between love and betrayal through contrasting color usage and patterns. The vibrant reds and pinks suggest warmth and affection, representing love, while the grayed tones and darker maroons signify the complexity and coldness of betrayal. The layout features softer edges transitioning into stark contrasts, evoking feelings of intimacy clashing against distance. The use of dot patterns for love and mirrored, broken patterns for betrayal creates a visual rhythm that pulses through the piece, leaving a significant amount of negative space to invoke a sense of emptiness and longing.</desc>
