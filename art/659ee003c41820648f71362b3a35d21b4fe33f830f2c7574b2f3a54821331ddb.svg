<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal Through Static</title>
  <desc id="desc">The emotional tone reflects a tension between fleeting sparks of vitality and settled ash, suggesting resilience amidst fragility. The chosen palette of pale aqua, mist gray, alarm red, ink blue, and clear white embodies this contrast. The main collision occurs in the center with bright accents of red against soft grays, creating an interruption in the overall subtle pattern. The ‘flame’ shape seed is developed through jagged edges, representing the conflict between survival and the remnants of what once was, captured through the repetition of the spark pattern in radiant sections that clash with the ash's structured decline.</desc>
