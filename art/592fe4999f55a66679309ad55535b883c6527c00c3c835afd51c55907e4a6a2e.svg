<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Yearning</title>
  <desc id="desc">The artwork embodies a tension between longing and resolve. The use of a palette that includes deep black and vibrant electric blue suggests a dramatic emotional contrast, with the black representing a silent void of longing, and the electric blue acting as a vibrant point of resolve. A central collision of colors, represented by the intense hot magenta, serves as the emotional focal point, breaking the cool gray tones that surround it. The layout is governed by an open space on one edge, indicating an entry of chaotic energy into an otherwise orderly arrangement, creating a narrative of disruption against a structured background. Broken pixels introduce intentional imperfections, reinforcing the theme of unresolved feelings.</desc>
