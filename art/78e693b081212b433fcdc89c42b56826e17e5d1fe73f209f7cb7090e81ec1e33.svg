<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">The emotional tone contrasts between relief and dread, encapsulated by a balanced palette of intense lime and electric blue against the heaviness of black and dark shades. The arrangement flows from the top, creating a visual metaphor for descent—a release of structure into chaos. Main contrast occurs between the luminescent accents and the dark foundations, evoking a struggle between lightness and weight, reflecting the seed's themes of breaks versus symmetry. The pixel placement introduces an asymmetry that symbolizes disruption within a rigid emotional framework.</desc>
