<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Existence</title>
  <desc id="desc">This piece embodies the emotional tension between panic and control. The top half is dominated by dark, muted tones, representing chaos and uncertainty, while the bottom half, with brighter hues, suggests a yearning for order and control. The palette of sepia, tan, and subtle blues reflects an air of nostalgia, hinting at the 'broken memory' theme. The zigzag pattern contrasts sharply with the symmetrical control below, creating collisions of feeling across the space. Each broken pixel is an imperfection, emphasizing that chaos, while insignificantly present, influences the whole artwork.</desc>
