<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Elements</title>
  <desc id="desc">This artwork captures the emotional tension between panic and control through a juxtaposition of dark and light shades. The palette reflects a lonely signal, with navy and black providing a grounding base while single white and dim cyan offer a contrast that feels oscillating and uncertain. The structure suggests rising signals from bottom to top, representing hope contrary to chaos. The control represented by the teeth pattern clashes with the chaotic grid of panic, emphasizing a struggle between these emotions. Broken pixels disrupt cohesion, illustrating an imperfection in the very essence of control. The composition feels asymmetrical where the dark colors form a border, reflecting control, while lighter shades bleed inwards, suggesting an encroaching panic. The main collision occurs between the dense clusters at the edges and the open center, creating tension and unease in the viewer's perception.</desc>
