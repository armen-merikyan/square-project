<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone explores the duality of restlessness and peace, captured through an 8x8 grid that contrasts calming colors against energetic outbursts. The palette of pale aqua and mist gray evokes serenity, while alarm red and ink blue introduce urgent accents, representing tension. The main collision occurs diagonally, where the warm tones of alarm red clash with the cool hues, suggesting a narrative of fluctuating emotions—searching for peace amid a backdrop of restlessness. This tension is further embodied in fragmented patterns, an echo of the complexity of memory, shaped by the central arrow-like movement that pushes upward on one side and descends on the other, symbolizing the dynamic between rise and fall throughout the composition.</desc>
