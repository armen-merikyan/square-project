<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Tension and Release</title>
  <desc id="desc">This piece captures the emotional dichotomy of longing and resolve through a palette that reflects intimacy and distance: soft pink evokes warmth, while dark maroon represents strength. The collision occurs at the center, where more muted, subdued tones meet vibrant colors, suggesting a struggle between desire and stability. The patterns of 'teeth' and 'pressure_band' create dynamic tension, interrupted by deliberate 'broken pixels' that symbolize imperfections in both longing and resolution. Each color field delineates these emotional states, while negative space embodies the quiet waiting inherent in longing, balancing the composition.</desc>
