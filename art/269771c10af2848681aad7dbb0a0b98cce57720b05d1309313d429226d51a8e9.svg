<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">The Bound Between Light and Shadow</title>
  <desc id="desc">The emotional tone reflects the struggle between fear and hope, with dark corners representing fear’s grip alongside glowing edges symbolizing hope. The palette is chosen to juxtapose dark violet for fear with soft gold and pale green for the glimmers of hope. The pattern combines checker textures for fear on one side, while a radial burst of color represents hope on the other, creating a visible tension. The split vertical layout emphasizes the collision of these emotions, suggesting an inner conflict that resonates throughout the composition.</desc>
