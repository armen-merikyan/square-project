<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Tensions</title>
  <desc id="desc">The emotional tone reflects a deep split between trust and suspicion. The palette incorporates muted greens and grays with sharper rust colors to create tension. The left side embodies trust through a soft glow of moss green and bone white, while the right side embodies suspicion with harder contrasts like rust and stone gray. The central axis acts as a pressure border, indicating where these emotions collide. The patterns of negative crosses symbolize trust’s underlying strength, while the pressure bands on the suspicion side suggest a fragmented reality. The arrangement reflects a fracture in stability, allowing glimpses of hope mixed with doubt, portrayed through the 10% negative space that breaks the visual continuity.</desc>
