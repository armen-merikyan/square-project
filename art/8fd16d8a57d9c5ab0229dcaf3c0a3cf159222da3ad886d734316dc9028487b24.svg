<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This artwork embodies the duality between restlessness and peace through its contrasting color arrangements. The palette blends cool tones of ice blue and clean white with darker accents like ink black and violet gray. The top half represents peace with a mirrored, structured arrangement, while the bottom half disrupts this stability with broken frames and wandering markers, suggesting the tension of chaos. The interaction between the two quadrants creates a sense of unresolved motion, highlighted by strategic placements of warmer colors like warning orange, especially in the collision area near the center, marking a vibrant confrontation between order and chaos.</desc>
