<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The artwork captures the emotional tension between vulnerability and strength. The palette of warm ivory, deep wine, and ash gray indicates an earthy warmth with hints of sadness, evoking feelings of shelter against exposure. The central hover of warm ivory represents vulnerability, surrounded by heavier, darker tones that suggest strength. The main contrast is between the soft, exposed center and dense, barcode-like edges, embodying the collision of emotions. The layout features a dense island amidst quieter pixels, embodying a balance of safety and exposure. The composition reflects the seed’s themes through abstract patterns without literal interpretation.</desc>
