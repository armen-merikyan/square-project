<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tidal Currents of Emotion</title>
  <desc id="desc">This piece embodies the emotional tension between certainty and curiosity. The palette of sepia, tan, dust gray, and faded blue suggests a grounded familiarity with a hint of shifting uncertainty, mirroring the push and pull between order and chaos. The main collision occurs centrally, where the bold glitch patterns of certainty disrupt the flowing braid patterns of curiosity, reflecting the tension of rising signals and receding edges. The negative space is strategically placed, enhancing the sense of interruption and echo throughout the composition.</desc>
