<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition evokes a duality between vulnerability and strength, using a palette that reflects the warmth of vulnerability contrasted with the cool, protective tones of strength. The main collision occurs at the center where warm coral and soft amber clash against cold slate and blue-black, illustrating the tension between exposure and shelter. This tension is amplified by a thick edge style that frames the lighter colors, while broken pixels create imperfection, symbolizing scars and the idea of vulnerability. The quiet channel of negative space allows the viewer to breathe amidst the emotional density, reinforcing the contrast between the heavy and light elements and the overarching themes present in the seed text.</desc>
