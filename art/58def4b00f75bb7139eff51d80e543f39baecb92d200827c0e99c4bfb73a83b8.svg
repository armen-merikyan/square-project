<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure Sheltered</title>
  <desc id="desc">The emotional tone oscillates between vulnerability and protection, illustrated by a central pale area surrounded by darker tones. The palette features 'shelter_green' and 'warm_brown' as grounding anchor colors to suggest safety, while 'open_blue' and 'cold_white' dominate the exposed areas, highlighting the tension of exposure. The main collision occurs where ripple-like patterns of blue meet the static regions of brown, creating a dynamic interplay that illustrates the struggle between safety and exposure. This arrangement interprets the seed's emotional landscape through a diagonal wedge layout, capturing the essence of both states.</desc>
