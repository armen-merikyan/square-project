<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">This piece explores the emotional dichotomy of defiance and submission, represented through a palette of warm and cool tones that suggest tension and interplay. The chosen colors—burnt orange, dark red, charcoal, and gold—highlight the struggle between weightiness and lightness. A bottom-weighted approach mirrors the idea of pressure, while diagonal arrangements of warm hues interject against cooler, darker regions, creating a sense of interruption and rhythm. The broken pixels introduce a level of imperfection, symbolizing both vulnerability and resilience, making the overall composition abstract yet deeply evocative.</desc>
