<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order Amidst Disarray</title>
  <desc id="desc">This artwork reflects the emotional tension between envy and gratitude through contrasting patterns—a checkerboard on one side representing envy, and a maze-like structure on the other to symbolize gratitude. The palette 'ancient_fire' consists of burnt orange, dark red, charcoal, and gold, invoking warmth and depth that speak to the heavy emotions presented. The layout creates a mirrored effect, intentionally broken in a few places to represent the imperfection of emotions. The warm colors collide with the cool shades, suggesting a struggle between the two emotional states, creating a compelling narrative of imbalance and harmony.</desc>
