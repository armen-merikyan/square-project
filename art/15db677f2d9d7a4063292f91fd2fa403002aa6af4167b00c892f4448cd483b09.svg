<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This piece embodies the emotional tension between desire and restraint. The warm tones of red oxide and small orange symbolize the pull of desire, while the muted cream and iron gray reflect the constraints that thwart this urge. The central area features a more saturated pattern around a halo of negativity, representing the containment of passion. The edge styles create a feeling of shadowed confinement, enhancing the overall narrative of pressure and interruption. The use of broken pixels adds intentional scars to this narrative, depicting the struggle of longing contained. The primary collision occurs as warm colors attempt to breach the border created by cooler, restrained tones, symbolizing the unresolved conflict of desire yearning for release.</desc>
