<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shadows of Splitting Waves</title>
  <desc id="desc">The emotional tone of awe versus terror informs a composition of contrast, where dark hues embody terror, contrasting with soft gold and pale green representing awe. The layout features descending pixels suggesting a flow from the center outward, yet the broken pixel edges introduce a sense of chaos within a generally ordered flow. The main collision occurs where the dark pixels encroach upon lighter areas, creating tension and instability within the calm. The palette reflects a spectrum from dark violet (chaos) to soft gold (hope), establishing a visual narrative about the fragile balance between order and disruption.</desc>
