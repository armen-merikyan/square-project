<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Vulnerability</title>
  <desc id="desc">This composition evokes the emotional tension between safety and exposure, illustrated through a carefully chosen palette and contrasting patterns. The colors ‘shelter_green’ and ‘warm_brown’ represent the comforting aspects of safety, while ‘open_blue’ and ‘cold_white’ embody the starkness of exposure. The pattern of dots serves to suggest the unpredictability of exposure, while halo effects of the warmer colors create a sense of soft enclosure. The layout presents a ‘broken_frame’ where distinct color breaks suggest leaking emotion. The main collision occurs in the center, where more vibrant colors interact with neutral tones, portraying the delicate balance between vulnerability and protection. The use of negative space further emphasizes the emotional contrast, allowing for quiet reflection against denser color fields.</desc>
