<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Heart's Dichotomy</title>
  <desc id="desc">This piece embodies the emotional tension between love and betrayal, using a palette of warm red and pink hues to express love while introducing gray and dark maroon to signify betrayal. The composition reflects a split symmetry—half the grid reveals warmth and connection, while the other half offers cold disarray, creating tension. The main collision occurs diagonally, where warm and cool colors interact, suggesting an unresolved relationship between the two emotions. Broken pixels contribute to a sense of imperfection and tension, representative of fragility in love and the chaos of betrayal.</desc>
