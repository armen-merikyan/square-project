  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone reflects the tension between safety and exposure, represented by a pale center contrasted with darker borders. The palette, featuring shelter green and warm brown, suggests a grounded safety, while cold white and open blue introduce a sense of exposure. The main collision occurs at the center where dense warm colors expel into a cooler space, symbolizing the balance between protection and vulnerability. This composition embodies the complexities of emotional shelter through abstract patterning.</desc>
