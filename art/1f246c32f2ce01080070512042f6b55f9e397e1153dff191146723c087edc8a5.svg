<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tension of vulnerability versus strength is represented through the stark contrast of light and dark colors. A warm palette of hot coral and blood orange is contrasted against the depth of charcoal, invoking feelings of tension and security. The inner 4x4 area, representing vulnerability with a pressure band pattern, collides with the outer frame of strength. Dominance of dark tones at the corners leads to a lighter center, suggesting both safety and exposure, mirroring the ideas of a horizon where light meets weightlessness.</desc>
