<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Control</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of panic versus control through a carefully balanced palette of dark and light colors. The contrasts represent stability and instability: deep blacks and whites echo themes of void and clarity, with pale blue serving as a fragile midpoint. The jagged pattern of 'noise' signifies the turbulence of panic, while the organized flow hints at the structure of control. Anchoring the piece is a sparse arrangement—an unexpected interruption that creates tension and evokes a sense of conflict within the viewer.</desc>
