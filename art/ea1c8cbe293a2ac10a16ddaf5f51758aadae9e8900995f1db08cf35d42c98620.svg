<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotion</title>
  <desc id="desc">The emotional tone reflects the tension between joy and grief, contrasting bright spark-like colors with muted heavy tones. The palette of bright yellows and oranges reflects joy, while deep blues and muted purples signify grief. The layout exhibits ordered maze patterns on one side, interrupted by checker patterns, representing chaos. This juxtaposition creates a stark edge, symbolizing a collision of feelings, where the lighter colors break against the muted ones, drawing attention to the emotional struggle. Negative space is preserved to suggest emptiness, enhancing the feeling of loss amidst joy.</desc>
