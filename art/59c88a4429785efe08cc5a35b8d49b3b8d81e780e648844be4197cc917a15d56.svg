<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Balance</title>
  <desc id="desc">The emotional tone of vulnerability and strength is echoed through a split palette of dark cosmic indigo and void black contrasted with the bright star white and cold gold. The upper half embodies strength with dense ember-like clusters, while the lower half showcases a ripple effect representing vulnerability. The main collision occurs at the center, where the dark base meets the luminous highlights, creating a tension that suggests both resilience and fragility. The choice of a porous edge style creates a sense of openness, echoing the duality of exposure and shelter in the seed.</desc>
