<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Silence</title>
  <desc id="desc">This artwork captures the emotional tension between defiance and submission through the interaction of colors and patterns. The palette, featuring hot coral, blood orange, and hollow blue, suggests vibrancy and depth—bright colors represent defiance, while more muted tones like charcoal reflect submission. The main contrast occurs in the center where high-energy pulses collide with quieter, softer bands, evoking a sense of tension and release. The layout of stacked bands creates a visual flow that reinforces the emotional dichotomy of order versus chaos. Broken pixels disrupt the uniformity, symbolizing the imperfections in this battle between opposing emotions.</desc>
