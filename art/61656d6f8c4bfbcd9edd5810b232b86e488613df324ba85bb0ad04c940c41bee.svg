<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone conflicts between rage and calm, represented by a contrasting palette of reds and cooler blues. The warm colors are concentrated in the center to suggest explosive emotion, while the cooler tones spread outward, creating a sense of space and containment. This arrangement illustrates the struggle between overwhelming force and serene quietness, echoing the seed's themes of noise and calm. The broken pixels add intentional disruption and eroded symmetry, emphasizing the idea of a fight for space and balance. The zigzag pattern of the inner squares creates tension as it interrupts the smoother outer edges, representing the collision of these conflicting emotions.</desc>
