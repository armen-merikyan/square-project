<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This piece embodies the emotional conflict between panic and control by layering dense patterns against spaces of quiet. The navy and black establish a foundation of introspection, while dim cyan delivers flashes of urgency like sparks. The central checkered pattern suggests control, juxtaposed with chaotic crosshatches that evoke a sense of instability. The overall layout plays with negative space, emphasizing the struggle between the enclosed and the expansive, embodying a subtle cosmic dance, where clusters of color collide against emptiness.</desc>
