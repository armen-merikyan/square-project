<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Trajectory of Emotion</title>
  <desc id="desc">This artwork embodies the emotional tension between joy and grief, represented through a split layout transitioning from warm yellows and oranges above to cooler blues and muted purples below. The bright upper half suggests energy and expansion (joy), while the weighted, crosshatched lower half conveys depth and heaviness (grief). The sharp contrasts and broken patterns illustrate the orbit and collision of these feelings. The use of negative space emphasizes the emotional pull and release, allowing moments of quiet amidst the density below.</desc>
