<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Connections</title>
  <desc id="desc">This artwork captures the emotional tension between loneliness and connection through its strong contrast of warm and cool colors. The center, a muted gray, serves as the solitary point of focus, symbolizing isolation, while surrounding pixels in reds and pinks provide a burst of warmth representing connection. The imbalance in color density reflects the struggle between being hidden and exposed, with the dark maroon edges framing the emotional space. The pattern's pulse-like flow mimics the heartbeats of yearning for connection yet feeling the weight of loneliness. Broken pixels introduce a sense of imperfection, echoing the fragility of relationships.</desc>
