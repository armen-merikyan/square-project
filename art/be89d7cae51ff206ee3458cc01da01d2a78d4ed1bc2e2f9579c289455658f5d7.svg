<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition explores the emotional tension between rage and calm, with the central area reflecting a fiery intensity through sharp reds, while the periphery embodies a cool, serene blue. The palette juxtaposes hot reds and blacks with quieter pale blues and whites, creating a visual clash. The dense center disrupts the calm surrounding it, illustrating a contrast between aggression and serenity. The broken pixels act as disruptions, simulating scars of emotional turmoil, emphasizing the struggle for containment around the vibrant heart of rage. Instead of a central shape, the patterns of embers and dots abstractly echo the emotional collision, making this artwork a metaphor for contained chaos.</desc>
