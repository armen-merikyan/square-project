<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Yearning</title>
  <desc id="desc">The composition captures the dance between desire and restraint through bold, warm tones contrasted against cooler, muted fields. The emotional tone is marked by bright accents of coral and blood orange representing desire, while charcoal and hollow blue embody restraint. The primary collision occurs in the center, where the crosshatch patterns of warm colors interrupt the surrounding flood of cool ones, embodying a conflict of emotion. The chosen layout resembles an island amid a sea, depicting a strong and vibrant core striving for freedom but held back by the edges of accountability. Broken pixels are scattered to symbolize the imperfections and scars of this emotional struggle.</desc>
