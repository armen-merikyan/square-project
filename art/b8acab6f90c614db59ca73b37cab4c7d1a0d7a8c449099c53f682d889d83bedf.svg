<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebbing Tensions</title>
  <desc id="desc">The emotional tone captures the delicate balance between vulnerability and strength, represented through a mix of warm and cool colors. The palette emphasizes connection and alienation with a strong focus on warm coral and cold slate. The main collision occurs as the soft amber 'teeth' pattern of vulnerability intersperses with the dense constellation pattern of strength, creating a visual tension where light and shadow meet. This reflects the duality of human experience, as different pressures and flows interact in the grid: an entrance on one side and an anchored center contrasting with flowing edges to symbolize the push and pull of emotions influenced by the seed.</desc>
