<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork embodies the emotional tension between safety and exposure. A gentle palette of green and brown offers a sense of shelter, while stark accents of pale skin and cold white inject feelings of vulnerability and exposure. The main contrast occurs in the top-left corner where dense patterns of 'flame' overlap softer 'teeth' patterns, creating an interrupted echo effect. The composition scatters toward the bottom-right, allowing for a subtle release in density and preserving negative space to signify the calm amidst chaos.</desc>
