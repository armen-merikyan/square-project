<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This piece captures the emotional tension between joy and grief through contrasting color placement. The joy aspect is represented by bright bursts of yellow and orange, arranged like a checker pattern, symbolizing expanding energy. Conversely, the grief is evoked by deeper blues and muted purples, laid out in a maze-like formation, reflecting fragmentation and holding tension. The asymmetry, with heavier colors on the left and lighter on the right, underscores an emotional imbalance, visually suggesting a pulse with peaks and troughs. This abstract representation emerges from the seed's themes of love, betrayal, and the inner conflict of joy versus grief, balancing light and dark.</desc>
