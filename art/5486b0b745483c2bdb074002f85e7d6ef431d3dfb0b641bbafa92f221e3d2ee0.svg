<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This artwork reflects the emotional battle between joy and grief through contrasting colors and patterns. The bright yellows and oranges symbolize joy, represented by a striped pattern, while the muted purples and deep blues evoke grief, portrayed as broken dots. The layout of the colors spreads diagonally from the bottom corner, amplifying the emotional tension as joy rises against the heavier grief, creating a vivid interplay. The use of hard edges emphasizes the struggle between these emotions, with sections of dense color interrupted by negative space, fostering a sense of unease and unresolved emotion at the intersection of these two states.</desc>
