<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Pulses</title>
  <desc id="desc">The emotional tone captures a struggle between longing and resolve, manifested through sharp contrasts. The chosen palette of lime, black, electric blue, and magenta expresses tension and vibrancy, while the dark base provides a grounded foundation. The edge style, inspired by a 'broken_frame', accentuates the theme of interruptions, leaving spaces that evoke a sense of absence and yearning amidst the vibrant patterns. The main collision occurs in the center, where the 'teeth' pattern of resolve intersects with the 'stairs' of longing, disrupting an otherwise steady composition, symbolizing how the desire for connection breaks through structured stability.</desc>
