<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition embodies the emotional tension between defiance and submission, represented through color contrast and structured chaos. The palette balances the soft tones of powder pink and warm white against the severity of carbon black and sharp crimson, reflecting an internal struggle. The stark black, dominating the edges, symbolizes defiance, while softer inner colors signify submission, creating a spiral effect that invites the eye inward. Significant interruptions from broken pixels enhance the feeling of disruption and imperfection, mimicking the conflict of emotions. The overall arrangement promotes a sense of unease, yet it remains grounded, inviting contemplation of the tension.</desc>
