<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Emotion</title>
  <desc id="desc">This piece embodies the emotional tension between joy and grief, using a palette of bright yellow and orange to symbolize joy, and deep blues and muted purples to represent grief. The left side incorporates heavier darker colors to evoke a sense of weight, while a diagonal spread of brighter tones pushes through, echoing the pulse of joy fighting against the heavy mass of grief. The structured grid suggests stability, yet the introduced broken pixels disturb this symmetry, hinting at the unresolved nature of the emotions. The central arrow shape abstracts the feeling of directionality in this battle of emotions without becoming literal, leading the viewer's eye yet remaining intangible.</desc>
