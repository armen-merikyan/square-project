<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Points of Light</title>
  <desc id="desc">This artwork reflects the emotional tension between fear and hope, employing a color palette of blacks, dark violets, soft golds, and pale greens to evoke contrasting feelings. The stark blacks and dark violets surround the lighter hues, creating a sense of pressure as they dominate the outer edges, while soft golds and pale greens emerge as 'targets' of hope amidst the chaos. The pattern is intentionally uneven, with sudden introductions of light that disrupt the dark backgrounds, mimicking the disturbances of emotion. The flow radiates outward, suggesting that light is trying to break free from the confines of darkness, while empty spaces maintain a balance and allow for a breath of relief, reinforcing the theme of negative space throughout the layout.</desc>
