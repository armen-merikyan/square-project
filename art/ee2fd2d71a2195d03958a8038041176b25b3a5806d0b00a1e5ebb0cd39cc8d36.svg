<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This piece captures the emotional tension between envy and gratitude. The palette combines warm reds and cool grays to express this contrast. The upward sections reflect gratitude while the downward zigzag paths depict envy, creating an unresolved dynamic. Broken pixels introduce an imperfect texture suggesting the clash of emotions. The layout centers around a small focus point, symbolizing the weight of these feelings, with cooler colors bleeding into the warmth, highlighting the interaction between the two.</desc>
