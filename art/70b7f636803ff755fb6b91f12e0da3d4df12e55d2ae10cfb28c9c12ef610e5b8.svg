<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">The emotional tone encapsulates the tension between joy and grief, expressed through color contrast. The palette consists of vibrant yellows and oranges representing joy, juxtaposed against deep blues and muted purples symbolizing grief. This interplay creates a visual narrative of lightness struggling against heaviness. The left-weighted layout suggests an imbalance with darker colors collecting on one side, symbolizing burdened emotions. The zigzag flow, combined with mirroring and cracking patterns, adds to the sense of conflict and fragility, while leaving intentional negative space for breath and contemplation.</desc>
