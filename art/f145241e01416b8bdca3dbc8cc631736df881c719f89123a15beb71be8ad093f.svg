<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry vs. Break</title>
  <desc id="desc">This piece explores the emotional tension between awe and terror by using a carefully selected palette of deep blacks, soft golds, dark violets, and pale greens, suggesting a duality of stability and disturbance. The split-horizontal layout emphasizes contrast, with the top rows echoing radial patterns of awe while the bottom rows present a stair-like structure of terror, creating a rhythmic yet jarring visual dialogue. The placement of broken pixels introduces a sense of imperfection, reinforcing the theme of broken memory, while the negative space allows the viewer to breathe amidst density, amplifying the emotional impact. Overall, the composition signifies the precarious balance between order and chaos, stability and instability.</desc>
