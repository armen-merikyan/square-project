<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragments of Connection</title>
  <desc id="desc">The emotional tone reflects a struggle between loneliness and connection, expressed through a palette of contrasting colors. The chosen colors of deep black and vibrant electric blue contrast sharply against softer magenta and lime green, embodying the tension of isolation. The center remains heavily weighted with darker tones, suggesting a core feeling of loneliness, while the outer pixels burst outward with brighter hues, suggesting the yearning for connection. This contrast aligns with the idea of an off-center focus, echoing a hidden yet fractious relationship between inside and outside emotions.</desc>
