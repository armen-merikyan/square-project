  <title id="title">Center vs Edges: Emotional Collision</title>
  <desc id="desc">The emotional tone captures the duality of grief and joy, using a palette that juxtaposes bright yellows and oranges with deep blues and muted purples. The layout adopts a mirrored format that reflects the heart's push and pull, with hard edges emphasizing confrontation and separation. Collisions occur where bright colors clash with darker shades, highlighting emotional conflict. Each side embodies a distinct emotional realm, yet some pixels are purposefully misaligned, echoing the imperfections of life, creating tension and resonance through visual echoes.</desc>
