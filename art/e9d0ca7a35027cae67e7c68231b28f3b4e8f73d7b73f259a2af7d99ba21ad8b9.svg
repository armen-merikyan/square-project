  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the tension between light and dark, representing 'spark' and 'ash' through a dynamic contrast. The palette features cosmic indigo and star white to symbolize aspiration and fragility, with deep teal adding depth. The patterns collide—checker against pressure bands—creating a chaotic yet structured visual tension. The main collision occurs at the diagonal center, evoking an emotional pulse of resilience and vulnerability that mirrors the narrative of memory versus erasure.</desc>
