<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Tension</title>
  <desc id="desc">This composition explores the emotional tension between vulnerability and strength, utilizing a palette of deep black, dark violet, soft gold, and pale green. The black and dark violet form a dense and heavy base, representing strength and protection at the edges, while the soft gold and pale green characterize the soft and exposed center, illustrating vulnerability. The arrangement spirals around the center point, creating a sense of pressure and dissolving into quiet negative space as the colors transition toward the edges. Broken pixels introduce imperfections, symbolizing the fragility of balance between strength and vulnerability.</desc>
