<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Waves and Anchors</title>
  <desc id="desc">The emotional tone of this composition captures the tension between longing (presented through radial patterns depicting a search or pull) and resolve (reflected in the teeth-like edges suggesting strength and permanence). The palette of muted plums and soft cyans juxtaposes warm and cool tones, evoking a sense of melancholy yet providing the comfort of familiarity. The main contrast occurs in the center, where a dense cluster of active colors collides with surrounding quiet fields, embodying feelings of hope and uncertainty.</desc>
