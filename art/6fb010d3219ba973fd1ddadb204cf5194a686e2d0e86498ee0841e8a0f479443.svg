<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension between Flow and Structure</title>
  <desc id="desc">The emotional tone captures the push and pull between longing (represented by softer, muted colors) and resolve (represented by bolder, more defined colors). The palette chosen includes soft sky and storm gray to evoke depth and uncertainty against the stability of near black and faded gold. The main contrast occurs in the central portion of the square, where the maze pattern of resolve intersects destructively with the grid pattern of longing, creating an intense visual momentum indicative of the tension between emotional states. The quiet spaces suggest that while longing creates expansiveness, the resolve is what ultimately tries to settle and stabilize the experience.</desc>
