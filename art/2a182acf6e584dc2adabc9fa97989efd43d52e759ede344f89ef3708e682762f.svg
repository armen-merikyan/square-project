  <title id="title">Tension of Presence</title>
  <desc id="desc">This artwork captures the emotional contrast of love and betrayal through a palette of warm pinks and deep maroons against muted greys, symbolizing the struggle between connection and disconnection. The grid patterns illustrate the conflict, while the placement of contrasting colors creates a dynamic tension that ebbs from the center to the edges, mirroring the duality of inside versus outside. Broken pixels add a layer of imperfection and fragility, conveying the transient nature of relationships.</desc>
