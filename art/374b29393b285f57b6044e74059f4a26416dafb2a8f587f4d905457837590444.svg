<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Centrifugal Tension</title>
  <desc id="desc">This composition captures the emotional tension between defiance and submission. The palette of moss green, bone white, rust, stone gray, and small gold represents resilience amidst fragility. The vibrant moss green emerges as a defiant core color, surrounded by muted tones that suggest submission. The broken pixels serve as intentional scars, disrupting and reinforcing the core and a chaotic noise pattern around it. The main collision occurs in the center where the higher contrast moss green meets the soft edges of the surrounding colors, representing a struggle between the vibrant 'defiance' and the enveloping, more subdued 'submission'. This design embodies the emotional struggle of maintaining strength against overwhelming pressure, illustrating the complexity of resistance and acceptance.</desc>
