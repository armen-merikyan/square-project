<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Contrast</title>
  <desc id="desc">This composition explores the emotional spectrum between envy and gratitude by creating a stark contrast between warm and cool tones. The selected palette of yellows and oranges conjures warmth and positivity, depicting gratitude, while deep blue and muted purple introduce depth and a sense of richness associated with envy. The patterns are woven asymmetrically, where the flow of colors suggests an inward pull and an echo of noise like emotional tension. Key contrasts manifest as sudden shifts from the cozy warmth of gold to the deep blues across the canvas, highlighting the colliding sensations between the two emotions. Broken pixels subtly disrupt the order, suggesting turmoil within the beauty of gratitude, encapsulating an empty room filled with layered feelings.</desc>
