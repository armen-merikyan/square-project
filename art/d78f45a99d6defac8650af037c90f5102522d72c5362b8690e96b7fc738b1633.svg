<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Thought</title>
  <desc id="desc">This composition illustrates the emotional conflict between envy and gratitude, with the colors and patterns symbolizing their interplay. The burnt orange and dark red represent envy’s intensity, encapsulated in circular forms that radiate outward, contrasting against the structured, frame-like patterns of gratitude in muted tones. The layout divides the canvas into areas of tension and calm, creating a dynamic flow that echoes the push and pull of contradictory emotions. The inclusion of broken pixels adds imperfection and disruption, enhancing the theme of inner conflict, while ensuring negative space allows breath and contemplation.</desc>
