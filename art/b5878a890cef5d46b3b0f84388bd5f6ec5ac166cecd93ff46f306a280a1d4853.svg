<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This artwork represents the emotional turmoil and contrast between love and betrayal through a carefully curated palette of warm and cool tones, signifying the tension between these feelings. The use of pinks and reds symbolizes love, while darker shades evoke a sense of betrayal and chaos. The arrangement highlights a split between dense clusters of color on one side—reflecting passionate moments—contrasting with a much more sparse area, invoking feelings of loss and emptiness. The row patterns create visual disruptions, echoing the emotional rifts suggested by the seed, while some deliberately broken pixels enhance imperfection, embodying the fragility of relationships. Overall, the composition invites the viewer to explore the deep-seated emotions of conflict, reflection, and unresolved tension.</desc>
