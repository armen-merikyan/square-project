<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition conveys the tension between restlessness and peace through a dynamic juxtaposition of colors and patterns. The palette features soft mint and sky tones representing peace, while dark greys and near-black embody restlessness. The two small centers radiate outward, establishing a contrast that embodies the struggle between calmness and chaotic motion. The radial pattern of the peaceful colors collides with the barcode-like disturbance of the restless tones, creating a visual echo of internal conflict. The arrangement embraces both positive and negative spaces, allowing for a sense of depth and unyielding interruption within a confined 8x8 grid.</desc>
