<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Resonance</title>
  <desc id="desc">This piece embodies the emotional tension between joy and grief through contrasting colors. The left side, representing joy, utilizes a palette of vibrant yellows and oranges that evoke warmth and an expanding feeling, reminiscent of a flame. In contrast, the right side reflects grief with deep blues and muted purples, creating a maze-like appearance that conveys a sense of heaviness and introspection. The split in the center, between bright, warm colors and darker, cooler hues, symbolizes the dichotomy of emotions. The layout emphasizes an invasion of joy into grief, creating a dynamic flow that mimics the push and pull between light and dark, order and chaos.</desc>
