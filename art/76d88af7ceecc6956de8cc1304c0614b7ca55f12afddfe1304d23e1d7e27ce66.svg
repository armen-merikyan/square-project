<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Resolve</title>
  <desc id="desc">This composition reflects the emotional tension between longing and resolve through a structured grid layout that alternates between calm and pressure. The muted palette of off-white, dust gray, faint peach, and compressed red represents the balance of serenity and urgency. The central collision happens between the stark compressed red and soft tones, creating a focal point of intensity surrounded by a thread-like arrangement of subtle stripes and stairs, invoking both a sense of lost connection and the hope of repair.</desc>
