<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensions of Containment</title>
  <desc id="desc">The emotional tone of this artwork reflects the conflicting forces of desire and restraint. The palette, featuring saturated reds contrasted with muted creams and deep grays, embodies a push-and-pull dynamic. The top half is dominated by vibrant reds and oranges, signifying desire with a pulsating rhythm, while the bottom half utilizes muted tones to evoke feelings of restraint and containment. The main collision occurs at the split, where these two emotional clusters meet, symbolizing the tension between the yearning for fulfillment and the boundaries that hold it back. The spiral pattern captures the idea of pressure, while the broken pixels add intentional disruptions that represent scars of love and betrayal, creating a rich narrative within the square.</desc>
