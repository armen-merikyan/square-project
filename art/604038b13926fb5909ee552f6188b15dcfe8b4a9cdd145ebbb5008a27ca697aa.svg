<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Protection</title>
  <desc id="desc">The emotional tone of the piece reflects a dichotomy between safety and exposure, where a cool, pale center evokes vulnerability, surrounded by a warm, richly textured frame representing protection. The selected palette emphasizes this contrast through a blend of soft greens and browns that portray safety, juxtaposed with colder blue and white tones symbolizing exposure. The main collision occurs in the vertical split down the center, creating tension between the two emotional states. The selected patterns further express this idea: the inner patchwork embodies the fragility of exposure, while the sturdy, rhythmic pressure bands from the outer frame reinforce the need for shelter. Overall, this artwork illustrates the complex interplay between feeling safe and confronting vulnerability, resonating through its color and structure.</desc>
