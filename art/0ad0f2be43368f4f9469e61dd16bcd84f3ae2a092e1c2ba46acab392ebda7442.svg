<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Form</title>
  <desc id="desc">This composition explores the emotional dichotomy between vulnerability and strength through contrasting colors and patterns. The palette of cosmic indigo, void black, star white, cold gold, and deep teal embodies feelings of awe and terror, creating a rich emotional background. The central quilted design, mimicking a weakened eye shape, combines symmetrical with broken cross patterns to symbolize strength being challenged. The main conflict occurs in the center, surrounded by a dense constellation-like pattern radiating outward, allowing for quiet negative space at the edges. This interplay evokes a sense of layered tension and unresolved emotion, reflective of the seed's themes.</desc>
