<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Echoes</title>
  <desc id="desc">This artwork captures the emotional nuances of longing and resolve through contrasting color use and structure. The top half reflects longing, using softer greens and muted golds to evoke a sense of unfulfilled desire and subtle pulses of hope. The bottom half represents resolve, embracing deeper olives and brighter yellows to signify strength and determination. The collision between the two emotions occurs in the transition from the cooler greens to the warmer yellows, illustrating the dynamic struggle between desire and action. The palette symbolizes gratitude and envy, while broken pixels introduce intentional disruptions, mirroring the imperfections of our emotional experiences.</desc>
