<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tide of Vulnerability</title>
  <desc id="desc">This piece embodies the emotional tension between strength and vulnerability. The palette of deep blues and muted blacks offers a melancholic depth, while soft specks of pale yellow represent the fragile light of safety. The layout spirals inward juxtaposing weighted, dark hues against the fragile brightness of the yellow. The main collision of color occurs at the center, echoing the tension of a broken mirror — strength encasing a vulnerable core. Broken pixels symbolize the subtle imperfections of resilience.</desc>
