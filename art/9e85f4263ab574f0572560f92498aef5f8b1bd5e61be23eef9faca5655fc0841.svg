<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between States</title>
  <desc id="desc">This piece embodies the emotional contrast of defiance and submission through a palette that interplays urgency and serenity. The choice of alarm red and ink blue creates a clear visual dichotomy, where the aggressive red represents defiance, dominating the center, while the mist gray and pale aqua provide a calming backdrop of submission at the edges. The broken_dots pattern disrupts the grid-like order, which echoes the chaos implied in the seed. The collision primarily occurs near the central region where the colors clash, reflecting an upward surge against a lowered boundary, creating a rhythm of resistance and surrender.</desc>
