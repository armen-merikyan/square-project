<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece explores the emotional tension between vulnerability and strength. The palette, which combines muted cream, red oxide, and blackened plum, reflects the contrast of light and dark emotions. The use of dense, heavy colors like iron gray juxtaposed with the thin, lighter hues symbolizes the collision between protection and exposure. The layout of falling pixels creates a visual motif of pressure descending, resonating with the flooding nature of vulnerability clashing with solid strength. The broken pixels introduce intentional disruptions, reinforcing the idea of imperfection amidst struggle, as the center remains open yet surrounded by complex layers of color.</desc>
