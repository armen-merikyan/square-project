<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotion Clash: Memory and Motion</title>
  <desc id="desc">This artwork contrasts the feelings of tenderness and rage, reminiscent of a quiet river interrupted by jagged edges of heat and volatility. Utilizing a palette of red for the hot center of rage against the soft, muted pale blue suggests emotional tension. The clean textures of white create an open channel amidst the dense black and saturated color fields, mirroring the push and pull of inner struggle. The design incorporates broken pixels as intentional disruptions, representing moments of guilt and forgiveness. The main collision occurs in the center, where the sharper red jags interrupt the serene blues, illustrating the clash between protective tenderness and visceral rage.</desc>
