<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Structures</title>
  <desc id="desc">This composition explores the emotional spectrum of defiance and submission through a carefully selected palette. The dominant colors—warm coral and signal cyan—represent the stark contrast between assertive and passive feelings. The central collision occurs in the middle rows, where angular resistance meets soft collapse, creating a tension that reflects the chaotic interplay between structured shapes and broken pixels reminiscent of glitch. The placement of muted colors at the edges creates a quiet boundary, offering a contrast against the bold central accent colors, embodying the theme of order versus chaos.</desc>
