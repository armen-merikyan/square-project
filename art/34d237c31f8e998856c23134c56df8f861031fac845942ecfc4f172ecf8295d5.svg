<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Shelters</title>
  <desc id="desc">This composition embodies the emotional tension between vulnerability and strength, with a contrasting palette of soft and severe tones. The pale exposed center represents vulnerability, surrounded by darker, denser areas that signify strength. The primary collision occurs in the center, where warmth (sharp crimson) meets coolness (carbon black) to create a striking focal point. Patterns of dots (strength) and floods (vulnerability) interact unevenly, suggesting an ongoing struggle. Overall, the artwork captures the essence of exposure while still providing a sheltering feeling around it.</desc>
