<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Contrast</title>
  <desc id="desc">The emotional tone balances the tension of spark and ash, representing resilience against fragility. The palette combines warm coral and soft amber as bright accents against the cold slate and blue-black, emphasizing the collision of memory versus erasure. The center seed of a pillar is surrounded by shattering patterns of ash and framing shapes of sparks, creating a dynamic play of light and shadow, echoing the complexity of human experience. The broken pixels introduce intentional disruptions, enhancing the artwork's depth and emotional narrative.</desc>
