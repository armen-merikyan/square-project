<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece explores the emotional landscape of vulnerability and strength, contrasting soft, pale colors with strong, dark ones. The ‘signal_noise’ palette encapsulates this struggle—quiet signal greens and electric blues represent vulnerability, while the hard edges of dead black convey strength. The main collision occurs diagonally across the square, where these opposing emotions collide and overlap, creating a dynamic tension. Broken pixels introduce intentional disruptions, embodying the imperfections found in both vulnerability and strength. The overall flow is counter to traditional, creating an engaging engagement that reflects the duality of these concepts in a spatial arrangement.</desc>
