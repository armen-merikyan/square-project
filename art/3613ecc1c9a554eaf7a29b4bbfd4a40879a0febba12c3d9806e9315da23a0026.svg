<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmony in Conflict</title>
  <desc id="desc">The piece embodies a dynamic tension between tenderness and rage through contrasting color and pattern. The palette of deep reds and blacks evokes a sense of passionate intensity, while muted tones of pale blue and white add a layer of calmness, reinforcing the emotional conflict. The main collision of colors occurs in the upper left corner, where fierce, jagged red patterns bleed into softer blue shapes, simulating a struggle between these opposing forces. The layout spreads diagonally, emphasizing movement from the chaos of rage toward a more serene resolution, creating a narrative that captures the essence of resolution through conflict.</desc>
