<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Time</title>
  <desc id="desc">This piece explores the emotional contrast between nostalgia and progress through a balanced yet clashing palette. The colors—lime, electric blue, and magenta—represent vibrant memories colliding with the starkness of progress, illustrated through hard edges creating a visual tension. The bottom-weighted arrangement embodies a battle between heaviness and lightness, suggesting that while nostalgia holds weight, the upward push towards progress introduces a distraction. The negative spaces capture echoes of the past, while abrupt color transitions evoke the conflict inherent in this emotional dichotomy.</desc>
