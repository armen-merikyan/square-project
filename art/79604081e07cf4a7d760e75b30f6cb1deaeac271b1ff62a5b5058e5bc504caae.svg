<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition explores the emotional processes of defiance and submission through contrasting colors of warm (magenta, electric blue) and cool (black, lime) tones. The central area features a burst of the vibrant magenta, representing defiance, while the edges are subdued in black and lime, suggesting a sense of quiet submission. Edges are weighted toward the bottom, creating a visual tension that symbolizes a struggle between contrasting emotions. Broken pixels interrupt the flow, illustrating imperfections in emotional expression. The mirror layout introduces intentional asymmetry to portray the chaotic nature of human emotion, allowing for both collision and harmony.</desc>
