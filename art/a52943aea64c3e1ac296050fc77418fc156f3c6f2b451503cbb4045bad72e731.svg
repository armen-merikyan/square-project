<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger versus Containment</title>
  <desc id="desc">The emotional tone reflects the struggle between desire and restraint; warm colors suggest longing while muted tones signify caution. The selected palette maintains saturation for desire (hot coral, blood orange) and coolness for restraint (charcoal, hollow blue), creating a compelling contrast. The collision occurs at the center, where a cluster of vibrant colors interrupts the surrounding muted space, symbolizing desire's force against the sealed edges of restraint. Patterns of target and broken frames evoke this push and pull, saturating the surface while allowing muted areas to breathe, embodying a balanced tension between longing and containment.</desc>
