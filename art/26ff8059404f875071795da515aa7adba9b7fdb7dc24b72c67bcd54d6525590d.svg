<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">The emotional tone balances between longing and resolve, creating a tension that plays out through color placement. The muted palette of off-white, dust gray, and faint peach contrasts sharply against the deeper compressed red and dark navy, emphasizing the collision between warmth and stability. The central collision occurs with a group of compressed red pixels breaking through muted color fields in an asymmetric arrangement, evoking both unease and resolution. This reflects the seed's tension between repair and damage, presenting an abstract representation of duality. The broken pixels scattered throughout add intentional disruption, enhancing the chaotic yet structured quality of the piece.</desc>
