<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">The emotional tone embodies a struggle between panic and control, represented by a stark contrast of colors and their placement. The palette of deep blacks and striking whites highlights the weight of control against the looming panic presented in the surrounding blues. The top rows express the erratic nature of panic through a rain-like pattern of fractured colors while the bottom rows present a more structured, stable flow akin to stairs, suggesting resilience. This interplay illustrates a dance between stability and chaos, amplifying the chaotic essence of panic juxtaposed against the grounding force of control.</desc>
