<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This piece explores the emotional contrast between restlessness and peace. The palette, featuring warm reds and muted grays, conveys a sense of disturbance versus calm. The bright reds and dark maroons create collisions across the grid, reflecting the chaos of restless feelings, while softer patches of gray introduce moments of tranquility. The predominant dark corners represent encroaching restlessness, with scattered lighter colors imitating moments of serene clarity amidst the noise. The diagonal movement captures the theme of motion against stillness, effectively translating the emotional seed into an abstract composition.</desc>
