<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dichotomy of Light and Shadow</title>
  <desc id="desc">This piece captures the emotional tension between fear and hope through stark contrasts and layered textures. The upper rows embody fear with dark hues and jagged patterns, illustrating sharp edges and a sense of confinement. In contrast, the lower rows evoke hope through softer colors and smoother elements, suggesting an upward flow. The use of black, dark violet, soft gold, and pale green reflects the duality inherent in the seed, with rich blacks anchoring the fear and gentle golds and greens hinting at light amidst darkness. The main collision occurs where the dark upper pixels sharply confront the lighter lower ones, creating tension that invites contemplation.</desc>
