<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">The emotional tone captures a tension between rage and calm, represented through a palette of red (representing intensity) and cooler colors like pale blue and black (symbolizing calmness). The red hues dominate 60% of the square, aligning with the chaotic energy of rage, while the cooler tones create a calming backdrop. The dominant collision occurs in the center, where the fragmented maze of red pixels intersects with the structured checker pattern of blue, conveying a battle between order and chaos. The broken pixels introduce intentional disruption, echoing the idea of eroded symmetry and adding depth to the narrative of containment versus overflow.</desc>
