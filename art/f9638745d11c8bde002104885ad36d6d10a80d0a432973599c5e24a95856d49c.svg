<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Duality</title>
  <desc id="desc">This artwork captures the emotional duality of clarity and confusion. The top half features a structured checker pattern in muted reds and soft grays, signaling clarity amidst chaos. The bottom half transitions into a denser grid of dark maroon and stark pink, visualizing the disarray and broken symmetry evoked in the seed. The use of contrasting colors accentuates the pulsing tension between organization and disorder, while the almost reflective quality of the upper section clashes against the jagged disruptions below, embodying the essence of the dual emotional landscape. Overall, the piece is a study in balance, suggesting a heartbeat of calm disrupted by chaotic impulses.</desc>
