<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Confluence of Tension</title>
  <desc id="desc">This piece captures the emotional conflict between safety and exposure. The palette includes 'shelter_green' and 'warm_brown' to represent safety, against the bright accents of 'open_blue' and 'cold_white' symbolizing exposure. The dense center of pale skin tone colors contrasts sharply with the darker shades on the edges, creating a feeling of pressure released at the borders. The vertical split also suggests a rippling effect as the two contrasting emotions collide, echoing the theme of vulnerability versus protection.</desc>
