<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Fracture</title>
  <desc id="desc">This composition embodies the emotional juxtaposition of defiance versus submission through color arrangement and intensity. Using a muted palette of sepia, tan, dust gray, and faded blue, I created a 'broken frame' layout that suggests confinement yet allows emotion to leak through. The central area is marked by defiance, illustrated through brighter, block-like forms, while the edges fade into softer, submissive tones, inviting a reflective tension. The deliberate breaks in the pattern, punctuated with broken pixels, symbolize disturbances and interruptions within contemplation. The main collision occurs at the center with stronger colors fighting against the muted edges, capturing a visual narrative of inner struggle and emotional tension.</desc>
