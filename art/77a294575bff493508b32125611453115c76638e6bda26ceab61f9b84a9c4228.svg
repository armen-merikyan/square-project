<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension between Light and Shadow</title>
  <desc id="desc">This composition captures the emotional dichotomy of fear and hope. The left side, representing fear, employs darker shades with jagged patterns reflecting broken dots, creating a claustrophobic feel. In contrast, the right side uses lighter colors and crosshatch patterns that evoke a sense of rising light and escape, suggesting hope. The collision occurs in the center where dark and light colors meet, embodying the tension of these opposing emotions. The layout reinforces a split vertical contrast, mirroring the internal struggle expressed in the seed.</desc>
