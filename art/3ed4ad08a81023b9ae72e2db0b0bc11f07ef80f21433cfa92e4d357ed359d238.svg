<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Soft and Severe</title>
  <desc id="desc">This artwork embodies the tension between softness and severity through a stark color palette of powder pink and carbon black. The left side, characterized by patchwork-like arrangements of light colors, symbolizes softness, while the right exhibits sharp cracks of dark colors representing severity. This juxtaposition creates a rhythmic flow that rises from the bottom, leading to a visual pulse marking across the center, where the two emotions collide, creating an echo of contrast. The use of broken pixels in various rows introduces intentional disruptions, enhancing the sense of guilt and forgiveness that pervades the emotional landscapes suggested by the seed.</desc>
