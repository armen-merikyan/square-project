<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This piece explores a dichotomy of longing and resolve, using a palette that embodies 'broken memory' with sepia and faded blue tones which suggest nostalgia and emotional weight. The sharp contrasts between deep blues and softer tans create a dynamic interplay, capturing the tension between feelings of serenity and urgency. The central grid represents the structural resolve, while the irregularities reflect the imperfections of longing, achieving a balance that feels both contained and overflowing. The intentional use of broken pixels embodies the 'repair vs damage' theme, creating echoes within the composition.</desc>
