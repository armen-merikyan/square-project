<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Fracture</title>
  <desc id="desc">The artwork explores the tension between love and betrayal, using contrasting warm colors of pink and red to evoke feelings of love, set against cold grays and dark maroon to symbolize betrayal. The layout is intentionally asymmetrical, allowing negative space to convey emptiness and solitude, representing an 'empty room' feeling. The sharp vs. soft contrast is represented through the juxtaposition of hard edges in the darker colors against softer pink hues. The use of broken pixels throughout introduces imperfections, embodying the idea of betrayal within love, as seen in the 'diamond' and 'ancient fire' motifs reflected in sharp contrasts and intersecting lines that create a sense of conflict and fracture.</desc>
