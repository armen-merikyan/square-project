<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Tension</title>
  <desc id="desc">This composition captures the emotional dichotomy of longing and resolve. The palette combines muted tones of dust gray and faint peach with sharper contrasts of compressed red and dark navy, highlighting tension as different emotional energies collide. The layout creates a visual argument between two patterns: a split screen reflecting longing, characterized by open negative spaces and soft edges, versus noise indicating resolve, marked by a thicker, disrupted texture. The main collision occurs centrally, where the patterns overlap and disrupt each other, symbolizing the struggle to find balance between desire and determination.</desc>
