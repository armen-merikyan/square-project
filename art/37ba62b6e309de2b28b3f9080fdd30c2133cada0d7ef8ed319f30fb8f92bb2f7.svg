  <title id="title">Tension Between Heights</title>
  <desc id="desc">This artwork explores the emotional contrast between longing and resolve through a juxtaposition of warm sepia tones and cool faded blues. The top half embodies longing with a radial pattern, suggesting a pull and depth, while the bottom half stabilizes into a negative cross, representing resolve and order. The collision occurs at the middle, where the warm tones of sepia meet the cool blues, creating a vibrant point of tension. Broken pixels interrupt the flowing shapes, reinforcing the idea of broken memory and connection.</desc>
