<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Tension</title>
  <desc id="desc">This artwork captures the emotional struggle between defiance and submission through a composition that features dominant warm tones against contrasting cold hues. The bright coral and soft amber represent defiance, creating a sense of angular resistance and upward movement. In contrast, the colder shades evoke submission, with a lowering effect and the sensation of enclosure. The central passage creates a threshold where these emotions collide, introducing tension through their interplay. Broken pixels introduce imperfection, further enhancing the emotional resonance and maintaining a sense of unease around a mostly structured framework.</desc>
