<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Stillness</title>
  <desc id="desc">This composition captures the emotional dichotomy between restlessness and peace through color placement and structure. The palette, featuring cool blues and vibrant oranges, creates a nuanced interplay of calm (ice blue) and agitation (warning orange). The top four rows embody restlessness with a maze-like pattern of broken pixels, suggesting irregular, staccato movement, while the bottom rows signify peace with larger patches of clean white, resonating with quietude. The main collision occurs diagonally, blending the orange accents into the pale field, creating a dynamic contrast that symbolizes the push and pull of memory versus motion, where the boundaries are soothed by white space yet disrupted by vibrant touches, mirroring the conflict between chaos and serenity.</desc>
