<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Subtle Collision</title>
  <desc id="desc">The composition reflects a tension between emptiness and desire, using vibrant colors to denote longing while muted shades represent restraint. The chosen palette, featuring hot coral and blood orange for desire, contrasts with charcoal and hollow blue to symbolize emptiness. The predominant warm tones, occupying about 65% of the space, are interrupted by orderly grids that suggest containment and quiet pressure against chaotic stripes. This layering conveys the emotional struggle implied by the seed, with a subtle collision occurring centrally as warm accents emerge unexpectedly through cooler colors.</desc>
