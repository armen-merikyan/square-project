<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shattered Connections</title>
  <desc id="desc">The emotional tone navigates the tension between love and betrayal, represented through a juxtaposition of warm and cool colors. The palette features warm pinks and reds symbolizing love, contrasted with dusky grays and dark maroon representing betrayal. The upper half exhibits swirling radial patterns, embodying love’s warmth, while the bottom half displays striped patterns, suggesting the fractured and misaligned nature of betrayal. The main contrast occurs where the warm colors collide with the cooler hues, reflecting the struggle between trust and deception. The use of broken pixels evokes imperfection, hinting at the fragility of relationships. Negative space is preserved to convey a sense of longing amidst tension.</desc>
