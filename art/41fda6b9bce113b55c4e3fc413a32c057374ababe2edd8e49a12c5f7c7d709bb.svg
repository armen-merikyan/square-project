<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise Against Fall</title>
  <desc id="desc">This piece embodies the tension between certainty and curiosity, with a dominant color representing 'certainty' (deep cool blue) infiltrating the lighter, exploratory colors (soft warm shadow and distant lilac). The upward pixel flow on the left contrasts with the downward motion on the right, creating a continuous push and pull against both hard edges and softer curves. The broken pixels serve as deliberate interruptions, manifesting layers of complexity and thought, aligning with the conceptual impulses of the seed while ensuring an abstract representation of the themes rather than pictorial symbols.</desc>
