<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Fracture</title>
  <desc id="desc">The emotional tone swings between defiance and submission, captured through bold contrasts of deep red and pale aqua. The palette suggests urgency with alarm red colliding against calmness of mist gray and pale aqua. Centered chaos, defined by the pattern of ‘negative cross’, is surrounded by quieter fields, creating tension and interruption, an echo of the struggle between pressure and release. The collision occurs at the center, reflecting the spiral of conflict and resolution, while broken pixels introduce intentional imperfections, representing the scars of experience.</desc>
