<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">This piece explores the emotional tension between dread and relief, using a palette that embodies muted tones with bright accent colors to suggest a struggle between density and openness. The predominant storm gray occupies the top left, denoting dread, while the pale mint moves toward the bottom right, symbolizing relief. The collision occurs predominantly in the center, where the braided relief pattern meets the noisy dread pattern, creating a visual dialogue of pressure versus release. The broken pixels impart a feeling of imperfection and volatility, reinforcing the theme. Negative space is preserved to allow the colors to breathe, establishing areas of calm amidst the dense moments.</desc>
