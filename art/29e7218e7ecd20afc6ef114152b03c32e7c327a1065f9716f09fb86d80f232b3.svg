<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This piece represents the tension between safety and exposure through contrasting textures and colors. The warm, earthy tones of shelter in the top half create a sense of comfort and protection, while the cool, pale shades of exposure below evoke vulnerability and openness. The color placement reflects the emotional journey from a stable frame to an exposed center, with a dominant central collision suggesting the push and pull of these feelings. Broken pixels disrupt the surface, enhancing the idea of imperfections in both safety and exposure.</desc>
