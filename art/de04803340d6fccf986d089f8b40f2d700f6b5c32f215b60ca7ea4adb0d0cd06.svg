<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition captures the emotional struggle between restlessness and peace. The palette features a mix of muted greens and browns to represent a quiet ground (#556B2F, #8B4513) contrasted against bright accents of pale white (#F5F5F5) and cold blue (#ADD8E6), symbolizing bursts of tension and the fleeting nature of peace. The 'island_and_sea' layout emphasizes a dense center with the lighter colors. The main contrast happens at the center where the motion of restlessness disrupts the surrounding calmer colors, signified by jagged edges and broken pixels for imperfection—echoing the theme of unresolved emotions and a pull towards expansion.</desc>
