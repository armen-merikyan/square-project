<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center Against the Current</title>
  <desc id="desc">This composition captures the emotional tension between vulnerability and strength through a contrasting palette of deep teal and cosmic indigo alongside bright accents like star white and cold gold. The layout represents a spiral pressure, with the central area exhibiting strength through denser, clearer blocks, while the edges express vulnerability with softer, more exposed colors. The arrangement of colors creates collisions that echo the struggle of opposing forces - the dense center with a cold, firm foundation against a backdrop of lighter, more fragmented patterns. The broken pixels introduce an imperfection that reflects the intersection of these emotional states, leaving spaces that suggest both desire for connection and moments of emptiness.</desc>
