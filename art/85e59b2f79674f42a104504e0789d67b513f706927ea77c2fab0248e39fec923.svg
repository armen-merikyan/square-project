<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Serenity</title>
  <desc id="desc">The artwork captures the emotional tension of longing contrasted with the firmness of resolve. The palette combines warm pink and red with deep gray and dark maroon, representing passion paired with somber reflection. The center features a collision of noise (dark maroon and gray) and delicate veil patterns (pink and red) that suggests a struggle between vulnerability and strength. The jagged edges symbolize the damaged yet hopeful nature of the mirrored concepts—broken yet yearning for wholeness. The negative space creates breathing room, allowing the emotions to resonate without overwhelming the viewer.</desc>
