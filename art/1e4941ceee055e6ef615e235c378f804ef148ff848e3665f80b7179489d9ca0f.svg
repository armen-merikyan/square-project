<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece embodies a struggle between the warm saturation of desire and the cool emptiness of restraint. The palette features warm coral and orange accents that pulse against a backdrop of deep charcoal and hollow blue, representing the conflict of overflowing desire contained within rigid boundaries. The center showcases a barcode pattern, symbolizing desire's reach, while the outer halo effect conveys a sense of distance and vacancy, merging into quiet pressure. Broken pixels disrupt the harmony, hinting at imperfection and the violation of containment. The overall structure fosters an emotional tension between density and emptiness, illustrating the dynamic struggle of the emotions defined in the seed.</desc>
