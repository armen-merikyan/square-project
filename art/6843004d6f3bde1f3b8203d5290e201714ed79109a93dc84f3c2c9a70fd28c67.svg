<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone reflects the tension of joy battling against the heaviness of grief. The palette combines bright yellows and oranges to represent joy and muted purples and deep blues for grief. The top four rows showcase an upward stair-step pattern reflecting joy's expansive nature, while the bottom four rows employ a darker grid representing grief's weight. The contrast occurs at the border between the two patterns, where the hard edges of joy collide with the muted chaos of grief, creating a dynamic interplay of emotions.</desc>
