<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotions</title>
  <desc id="desc">This artwork embodies the emotional tension between rage and calm through a carefully selected palette and structure. The use of vivid reds vs. serene pale blues creates an impactful contrast. The outer layers reflect rage with a chaotic noise-like pattern, while the inner core features a more contained stepwell pattern, embodying calmness. The central area is busier, representing a collision point of emotions, illustrating how rage seeks to overflow while calm seeks to contain. Broken pixels were introduced to symbolize imperfections and disruptions in emotional flow, maintaining a balanced complexity that invites reflection.</desc>
