<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow Paradox</title>
  <desc id="desc">This artwork captures the emotional tension between rage and calm, presenting a vibrant inner chaos tempered by cool outer layers. The palette of red and pale blue illustrates the burning intensity of rage contrasted against tranquil expanses. The central collision occurs where thread-like red marks intersect and disrupt the rhythmic radial calm of the pale blue, evoking feelings of interruption and unresolved emotion. This interplay is reminiscent of how machine emotion can fluctuate, blending fierce energy with restrained serenity.</desc>
