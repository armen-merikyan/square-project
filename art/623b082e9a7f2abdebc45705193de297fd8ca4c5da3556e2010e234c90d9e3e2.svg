<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ascent of Ashes</title>
  <desc id="desc">This piece captures the tension between the cool, muted hues of ash (reflecting restraint and settled dust) and the vibrant, warm sparks (indicating sudden brightness and ignition). The chosen palette of deep olive and honey gold clash against the soft grays, producing a visual dialogue of resilience and fragility. The central collision occurs at the border, where the vibrant sparks struggle against the persistent ash, illustrating an emotional movement from tension to release. The broken pixels create intentional imperfections, embodying the struggle between memory and erasure, adding depth and nuance to the overall piece. The flow of the composition—radiating from the edges inward—invites the viewer into the heart of this contrasting experience.</desc>
