<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shattered Connections</title>
  <desc id="desc">This composition reflects the emotional tension of loneliness versus connection through a stark contrast of filled and empty spaces. The muted purples and deep blues represent isolation, while the yellows and oranges symbolize warmth and potential connection. The center features a burst of colors, echoing the concept of a 'tear' through loneliness, surrounded by darker hues that create a weighty border, implying protection yet also confinement. The pattern flows from top to bottom, fostering a sense of dynamic movement between the peaks of connection and troughs of loneliness, while crosshatching invites an intricate interplay in the grid of emotions.</desc>
