<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Caught Between Echoes</title>
  <desc id="desc">This artwork expresses the emotional conflict between longing and resolve. The palette, drawn from guilt and forgiveness, features the deep, muted tones of stain brown and deep wine to represent longing, contrasted with the soft gold and warm ivory embodies the clarity of resolve. The dominant barcode pattern suggests a yearning for structure amidst breakdown, while the broken dots in the core convey both repair and damage. The 'lit_edges' technique creates an interplay of sharpness that draws the eye to the boundaries, reflecting the tension between emotional containment and overflow. The collision occurs prominently at the center, where the patterns disrupt each other, creating a visual representation of an unresolved emotional state.</desc>
