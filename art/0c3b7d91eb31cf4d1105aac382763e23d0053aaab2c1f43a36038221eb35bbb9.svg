<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Balance</title>
  <desc id="desc">This piece encapsulates the emotional tension between panic and control, using a palette reflecting fear (black, dark violet) and hope (soft gold, pale green). The contrast is stark, with darker colors dominating the top half to represent chaos and imbalance, while the lighter gold and green in the bottom offers a sense of resolution. The broken pixels introduce imperfection, embodying the struggle between the two emotions. The zigzag pattern echoes the dynamic conflict and release, creating a rhythmic ebb and flow like waves of emotional disruption, while maintaining symmetry disrupted by strategic disarray.</desc>
