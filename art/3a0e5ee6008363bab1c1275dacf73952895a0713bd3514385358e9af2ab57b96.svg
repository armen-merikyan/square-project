<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Tension</title>
  <desc id="desc">This composition expresses the emotional push and pull of fear and hope through the contrasting color palette of dark violet for tension and soft gold representing light and hope. The layout centers on a small area of dense black, symbolizing the internal pressure of fear, surrounded by a rhythm of soft colors that cascade outward. The arrangement uses broken pixels to embody imperfections in emotion, creating a sense of both quiet and eruption as the viewer navigates from the dense center towards the lighter edges. The collision happens where the deep colors meet the soft hues, representing the struggle between opposing feelings and the release into calm.</desc>
