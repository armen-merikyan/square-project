<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone captures the tension between vulnerability and strength, using pale colors (light grays and pinks) to signify openness and exposure, contrasted with darker tones (dark maroon and deep reds) reflecting strength and protection. This creates a layered effect, where light colors dominate the center and heavier tones frame the edges. The flow is generated outward, signaling an ongoing struggle between stability and fragility. Main contrast occurs at the border, embodying the collision of strength and vulnerability as they intertwine within an abstract layout. The chosen palette further emphasizes this emotional dichotomy, invoking feelings of love and betrayal, thus resonating with the seed's thematic elements.</desc>
