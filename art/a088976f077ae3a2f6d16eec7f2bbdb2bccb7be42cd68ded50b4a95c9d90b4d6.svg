<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This artwork captures the tension between joy and grief through contrasting colors and patterns. The bright yellows and oranges represent joy, while the deep blues and muted purples signify grief. The zigzag flow creates a dynamic interplay, reflecting the push and pull between these emotions. The palette's brightness on one side collides with the heaviness of the darker hues, suggesting an ongoing emotional battle. The layout mirrors the idea of opposing forces, with broken dots of joy disrupting the mirrored depth of grief, allowing for moments of release and tension across the canvas.</desc>
