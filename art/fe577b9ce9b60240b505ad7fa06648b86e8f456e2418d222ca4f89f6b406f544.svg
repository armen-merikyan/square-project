<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Strength</title>
  <desc id="desc">This piece reflects the tension between vulnerability and strength through a diagonal flow, where muted cream emerges from the corner, suggesting vulnerability, and stark blackened plum and iron gray provide a dense, protective barrier. The palette mirrors an emotional spectrum of hunger and restraint, where the vivid small orange pops against subdued colors, creating an energetic collision. Broken pixels are intentionally scattered to introduce imperfection, mirroring the fragility that underlines strength.</desc>
