<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This artwork embodies the emotional struggle between nostalgia and progress, represented through the palette of deep blacks, stark whites, and subtle blues. The top half, evoking nostalgia, features interspersed broken pixels that disturb the flow, suggesting fragmented memories. The bottom half progresses with a steady ascent of blue tones, symbolizing hope and forward movement. The contrast and collision occur at the horizontal split that defines the two emotional territories, allowing viewers to experience a push and pull between the known past and the uncertain future.</desc>
