  <title id="title">Between Shelter and Exposure</title>
  <desc id="desc">The emotional tone of this artwork explores the tension between the protective qualities of safety and the vulnerability of exposure. The soft greens and warm browns create a comforting backdrop, suggesting safety, while the pale skin and cold white highlight the exposed areas, invoking a sense of vulnerability. The broken pixels introduce a sense of disruption, representing the fragile boundary between comfort and exposure. The main collision occurs in the center, where the contrasting patterns of broken dots and flooded colors intertwine, emphasizing the duality of these emotions throughout the piece.</desc>
