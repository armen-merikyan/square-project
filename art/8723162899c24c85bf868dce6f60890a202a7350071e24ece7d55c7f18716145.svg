<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This abstract composition embodies the conflict between rage and calm through a dynamic color interplay. The palette, featuring deep blacks and soft pale blues, represents the tension between intense emotion and tranquility. The grid-like pattern on the left signifies rage—sharp, compressed, and assertive—while the spark pattern on the right reflects calmness, allowing for flow and gentle spacing. The collage of colors reveals stark contrasts: the solid, heavy blacks collide with soft, reflective blues, creating a visual dialogue that emulates the push and pull of these opposing feelings. The use of broken pixels introduces imperfection, evoking fractures in both calm and rage, further enhancing the emotional depth.</desc>
