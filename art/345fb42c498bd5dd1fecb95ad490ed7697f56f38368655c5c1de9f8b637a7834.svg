<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Chaos</title>
  <desc id="desc">This composition explores the emotional tension between rage and calm, echoing the conflict between bright, chaotic elements and the subdued, cool fields. The selected palette of reds and blues creates a visual noise, while the heavily weighted black forms contain the bright colors, suggesting an ongoing struggle. Interruption occurs in clustered, sharp reds that breach the calmer blue spaces, establishing a feeling of collision. The zigzag movements represent the unpredictable nature of this emotional dance, with eroded symmetry reflecting parts of calm disrupted by sparks of chaos, all stemming from the initial ideas associated with the seed.</desc>
