<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">The emotional tone reflects a struggle between vulnerability and strength, embodied in the interplay of colors. The palette features warm orange and yellow for strength, contrasting with cool deep blue and muted purple representing vulnerability. The collision occurs in the center, with a dense focus on warm tones surrounded by the cool, creating a visual tension that narrates the abstract story of exposure and protection. Broken pixels introduce imperfection and chaos, symbolizing the messiness of emotions, while the layout centers the struggle in an asymmetrical fashion, enhancing the emotional weight.</desc>
