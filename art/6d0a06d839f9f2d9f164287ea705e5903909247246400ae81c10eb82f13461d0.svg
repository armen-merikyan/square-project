<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotion Collision</title>
  <desc id="desc">This piece navigates the emotional spectrum between joy and grief through a contrasting palette of bright yellows and deep blues. The joyful 'flame' pattern emerges in the top half, symbolizing optimism, while the 'split_screen' layout allows for a visual tension against the muted, heavy blues of grief. The interplay of colors leads to a central pulse of orange, representing the heart of the conflict. The broken pixels create an element of imperfection and suggest the unresolved nature of emotions. The collision between bright accents and subdued fields embodies the ongoing struggle between joy and sorrow.</desc>
