  <title id="title">Fragmented Trust</title>
  <desc id="desc">This artwork explores the emotional tension between trust and suspicion. The warm tones of yellow and orange symbolize trust, contrasted by the deep blues and muted purples representing suspicion. The diagonal flow creates dynamic movement, suggesting a conflict between a reliable path and disruptive shadows. The broken dots pattern adds an element of imperfection, enhancing the idea of interrupted connections. The central focus is on a collision of colors, where trust takes precedence, yet suspicion subtly intrudes, creating a layered narrative of resilience against fragility.</desc>
