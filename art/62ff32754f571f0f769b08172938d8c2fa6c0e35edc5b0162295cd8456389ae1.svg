<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs. Weight</title>
  <desc id="desc">The emotional tone balances between dread and relief, evoking tension through contrasts. The palette, featuring lime and electric blue against a backdrop of black, vividly illustrates the struggle between bright hope and dark heaviness. The dynamic collision is represented by disarrayed patterns of 'broken dots' and 'teeth,' symbolizing symmetry disrupted by chaos. The upward flow mirrors the ascent from the depths of dread towards the promise of relief, with negative space reinforcing feelings of emptiness while maintaining a sense of gravity.</desc>
