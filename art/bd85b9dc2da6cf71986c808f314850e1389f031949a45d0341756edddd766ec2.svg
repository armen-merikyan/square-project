<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone juxtaposes joy and grief, represented through a vibrant palette of yellow and orange against deep blues and muted purples. The clash of warm and cool colors signifies the tension between the two states. The layout mirrors on both sides, with deliberate interruptions to represent the struggle inherent in grief against the uplifting aspect of joy. The stair-step pattern on the joy side suggests ascension, while the rain pattern on the grief side embodies heaviness, creating a dynamic contrast that encapsulates the seed's themes.</desc>
