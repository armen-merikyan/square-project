<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry Interrupted</title>
  <desc id="desc">This artwork conveys the emotional tension between love and betrayal through a dichotomy of warm and cool colors. The palette of pink and dark maroon captures the warmth of love, while the gray introduces a colder, more unsettling contrast symbolizing betrayal. The layout suggests an empty room, using a spiral counterclockwise flow that guides the eye towards moments of collision where the color intensities shift dramatically. Disrupted patterns create a sense of imbalance, representing the internal struggle of longing and loss. The broken pixels enhance the feeling of imperfection and fragmentation, underscoring the tension in relationships. This abstraction embodies the emotional complexity of the seed without resorting to literal imagery.</desc>
