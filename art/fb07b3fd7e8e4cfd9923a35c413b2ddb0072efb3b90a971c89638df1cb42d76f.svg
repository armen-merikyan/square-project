  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork captures the tension between rage and calm through a contrasting palette of fiery reds and cool blues. The jagged red shapes, representing explosive emotions, erupt from a quieter pale blue and black background, embodying the battle between containment and overflow. The crossing patterns of negative cross and barcodes depict chaotic eruptions colliding with structured calm. Both edges are defined with a closed corner style to signify boundaries, while broken pixels add intentional disruptions, further enhancing the emotional narrative.</desc>
