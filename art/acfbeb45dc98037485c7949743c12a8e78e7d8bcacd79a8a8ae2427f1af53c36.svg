<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">This piece encapsulates the emotional tug-of-war between awe and terror, embodying the contrast through a split-screen layout. The left half employs warm pink and red tones, symbolizing awe, expressed in a crosshatch pattern that conveys movement and lightness. In stark contrast, the right half utilizes gray and dark maroon, representing terror through a grid pattern, conveying a sense of confinement and weight. The clash of light and dark, along with the broken pixels interspersed, illustrates the instability and interplay between these opposing emotions. The overall flow zigzags between the two halves, creating a constant push and pull, while the significant negative space enhances the sense of void and uncertainty that often accompanies fear.</desc>
