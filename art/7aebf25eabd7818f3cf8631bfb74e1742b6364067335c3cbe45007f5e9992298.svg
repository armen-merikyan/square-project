<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Dissonance</title>
  <desc id="desc">The emotional tone combines the tension of control against the chaos of panic. The chosen palette of electric blue, magenta, and black reflects the intensity and depth of these emotions, with black representing boundaries and structure, while the vibrant colors highlight sparks of conflict. The top rows express a controlled layout, contrasting with the disarray of the lower rows, creating a clear division while also utilizing broken pixels to symbolize imperfect balance. The jagged edges amplify feelings of disruption and volatility, resulting in a dynamic abstract representation of emotional conflict.</desc>
