  <title id="title">Fractured Affection</title>
  <desc id="desc">The emotional tone evokes a struggle between love and betrayal, expressed through warm pinks and dark maroons juxtaposed with cool grays. The palette reflects intimacy and hurt, with sharp, jagged edges representing betrayal's abrupt intrusion into warmer, softer forms. Contrast emerges in the top-down flow, where darker hues disrupt the smoother light tones, mimicking the conflicted feeling of a broken mirror. The arrangement suggests a split yet unified space, with diagonal patterns interrupted by sharp lines, signifying conflict and resolution shaking hands.</desc>
