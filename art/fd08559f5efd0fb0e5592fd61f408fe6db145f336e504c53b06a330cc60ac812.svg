<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">This artwork embodies the emotional tension between rage and calm through contrasting colors and patterns. The fiery reds represent the explosive nature of rage, while the soft pale blue suggests calm. The lattice pattern of red disrupts the mirror calm of blue, embodying the signal versus noise dynamic. The main collision occurs in the center, where passionate chaos meets orderly tranquility, echoing the themes of containment versus overflow and mechanical emotion. The irregularity introduced by broken pixels emphasizes the imperfections and disruptions inherent in emotional experiences.</desc>
