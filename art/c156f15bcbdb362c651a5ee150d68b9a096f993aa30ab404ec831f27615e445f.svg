<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Duality</title>
  <desc id="desc">This composition explores the emotional tension between joy and grief through opposing color palettes, with warm yellows and oranges representing joy intersecting with the cooler, muted purples and deep blues of grief. The layout reflects a split screen, emphasizing the contrast of these emotions: joy occupies the upper half, breaking into a playful rhythm of broken dots, while the lower half echoes a heavier, ring-like pattern representing grief. The hard edges enforce a sense of conflict, while broken pixels introduce an element of imperfection, illustrating the turbulent intersection of these emotions.</desc>
