  <title id="title">Fractured Affection</title>
  <desc id="desc">This composition captures the emotional tension between love and betrayal through a palette of pinks and dark maroon, symbolizing warmth versus bitterness. The broken pixels evoke a sense of imperfection and chaos, while the layout flows diagonally from a dark corner into a lighter space, suggesting an invasion of feelings. The patterned use of soft warmth against sharp disturbances creates a visual rhythm reflecting emotional conflict, where sharp edges interrupt softer tones—a metaphor for broken trust in love.</desc>
