<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Ambiguity</title>
  <desc id="desc">The artwork embodies the emotional struggle between confusion and clarity. The dark maroon serves as a grounding color, representing confusion through its depth and richness, while lighter tones like pink and gray break into the composition, suggesting fleeting clarity. The edges are intentionally jagged to evoke a sense of brokenness, contrasting with smoother patterns in the center that symbolize clarity emerging. This juxtaposition creates a dynamic tension, where the darker outer frame encroaches upon the lighter inner core, illustrating a narrative of overcoming chaos. The overall contrast lies in the dense outer layer against the open inner space, embodying both fullness and hollowness—a dance between structured pressure and open release.</desc>
