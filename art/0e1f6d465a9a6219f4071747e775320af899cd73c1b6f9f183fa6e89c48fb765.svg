<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">This composition embodies the tension between confusion and clarity with two distinct emotional zones. The left side represents confusion, using an aggressive pattern of flame-like colors (#C05A66, #F1B2A5, #F282A4) against a subdued background (#B9D6D8, #A3C6C4, #F0E4D7). Conversely, the right side portrays clarity through calm, horizontal stripes of cool blues and serene tans (#A3C6C4, #B9D6D8) suggesting stability and order. The palette of faded blue and tan invokes a nostalgic feel while allowing the viewer to sense the disruptive patterns of overlapping flame. The broken pixels scattered throughout amplify the feeling of imperfection and chaos, reinforcing the seed's exploration of duality. This blend of symmetry and fragmentation offers a visual narrative that resonates with the underlying emotions.</desc>
