<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interplay of Extremes</title>
  <desc id="desc">This piece captures the emotional tension between 'sparks' of brightness and the remnants of 'ash' through an asymmetric arrangement of colors. The palette, including deep olive and honey gold, suggests a struggle between restraint and freedom. The warm spark colors interrupt the cooler ash tones, creating a collision effect at the center, which mirrors the conflicting notions of resilience and fragility. The deliberate placement of broken pixels adds visual imperfection, enhancing the narrative of memory losing its clarity amidst sharp contrasts.</desc>
