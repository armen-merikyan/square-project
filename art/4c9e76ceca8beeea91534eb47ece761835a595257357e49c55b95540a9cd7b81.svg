<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Shadows and Light</title>
  <desc id="desc">The artwork explores the emotional dichotomy of envy and gratitude, with a stark contrast between free flowing colors and sharp edges to convey tension. The palette of lime, black, electric blue, and magenta invokes feelings of unease and hope, representing the struggle between the dark (envy) and the bright (gratitude). The center, using broken patterns, suggests an attack or pressure, surrounded by soft patterns that echo an inward flow, reflecting a calm center amidst chaos. This balance of color density in the middle against softer edges provides a visual representation of the emotional narrative.</desc>
