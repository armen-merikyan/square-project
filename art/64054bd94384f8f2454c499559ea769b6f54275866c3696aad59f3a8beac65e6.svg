  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition reflects a tension between vulnerability and strength. The palette consists of muted tones like ‘off_white’ and ‘dust_gray’ to represent vulnerability, while deeper colors like ‘compressed_red’ and ‘dark_navy’ suggest strength. The arrangement creates a stark contrast, with dense clusters in one corner representing a flood of pressure, while the opposite side remains more open. This interplay resonates with the emotional weight of vulnerability as it collides with a sense of shelter and protection, reflected through structured patterns and broken pixels that symbolize the journey of seeking stability amidst exposure.</desc>
