<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetric Fracture</title>
  <desc id="desc">The emotional tone of this composition reflects the struggle between the sudden burst of energy (spark) and the quiet afterburn (ash). The palette includes warm whites and sharp crimson to evoke both the brightness associated with sparks and the muffled tones of ash. The main collision occurs diagonally across the square, where bright accents disrupt the muted background, representing a moment of tension. The asymmetry in pixel placement and intentional broken pixels convey a sense of conflict and resolution, drawing from the idea of memory versus erasure, where some aspects linger while others fade. This pattern captures the push and pull between vitality and restraint, echoing the seed's themes.</desc>
