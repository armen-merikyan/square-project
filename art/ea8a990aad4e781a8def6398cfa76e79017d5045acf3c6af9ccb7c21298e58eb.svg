<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Vulnerability</title>
  <desc id="desc">This piece captures the emotional tension between safety and exposure, where the soft, pale colors evoke a sense of vulnerability surrounded by gentle weight. The warm browns and greens represent safety while the cooler blues signify exposure. The central area reflects a split between echoing patterns of exposure on the right and a more stable, rain-like texture of safety on the left. The collision happens at the center, creating a visual dialogue between the two emotions, embodying the dynamic interplay of thin versus heavy, and pressure against release.</desc>
