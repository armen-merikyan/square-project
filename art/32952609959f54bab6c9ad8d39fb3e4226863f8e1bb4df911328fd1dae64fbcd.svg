<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">The emotional tone explores the contrast between restlessness and peace. The palette uses warm ivory and soft gold for soothing elements, contrasted with deep wine and ash gray to evoke unease and tension. The main collision occurs diagonally, where defined maze-like patterns representing peace intersect with sparking chaotic designs, representing restlessness. This layout reflects the ongoing battle between these two emotional states, suggesting memory versus motion in a visual narrative.</desc>
