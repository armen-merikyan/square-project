<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow and Containment</title>
  <desc id="desc">This piece embodies the tension between tenderness and rage. The palette of red, black, pale blue, and white reflects the clash of emotions. Bright red accents symbolize rage, peeking through softer, muted tones that represent tenderness. The central collision occurs in the top rows where vibrant red contrasts sharply with cool, quiet pale blue layers, representing the conflict between inner turmoil and external calm. Broken pixels throughout suggest the disruption of emotions, echoing feelings of guilt and forgiveness amidst the emotional landscape. The stacked bands layout enhances the idea of layers of feeling, creating a dynamic flow from rage at the top to a more tender resolution towards the bottom, embodying the complexity and duality of human emotions.</desc>
