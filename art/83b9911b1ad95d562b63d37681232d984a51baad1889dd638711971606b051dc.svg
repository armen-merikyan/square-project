<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Desire</title>
  <desc id="desc">This composition captures the emotional tension between desire and restraint. The palette features deep reds and muted creams to contrast the passionate urgency of desire with the cool, locked spaces of restraint. The central clash occurs with vibrant reds and small_orange breaking into the more subdued tones, symbolizing desire's reach into restraint. The interplay of densely clustered 'braid' patterns with the quieter 'mirror' shapes encapsulates the theme of pressure versus containment in an abstract lattice. The use of broken pixels introduces intentional imperfection, echoing the experience of love and betrayal.</desc>
