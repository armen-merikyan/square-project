<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Past and Future</title>
  <desc id="desc">The emotional tone reflects the struggle between nostalgia and progress, which is captured through the use of warm oranges and yellows contrasting against cool deep blues and muted purples. The layout emphasizes a vertical split, allowing nostalgia to bleed into progress in the middle, creating a sense of collision. The patterns of 'target' on the nostalgia side reflect focus and memory, while the 'stripes' of progress represent movement and direction. Broken pixels introduce imperfection, highlighting the tension and unresolved feelings in the narrative.</desc>
