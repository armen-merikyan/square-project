<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Reflection</title>
  <desc id="desc">The emotional tone is rooted in the contrast between desire's warm allure and restraint's cold containment. The palette of deep reds and muted creams emphasizes this tug-of-war: the red_oxide and small_orange portray desire’s warmth, while blackened_plum and muted_cream keep restraint grounded. The collision occurs primarily in the center, where the patterns—a scattering heat motif against a more solid ash field—invite the viewer to feel the push and pull of these emotions, manifesting the struggle described by the seed.</desc>
