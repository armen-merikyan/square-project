<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece evokes a tense balance between strength and vulnerability. The palette combines warm shadow and distant lilac to symbolize intimacy and distance, representing the contrasting emotions in the seed. The thick outlines frame a lesser density of colors in the corners, suggesting a sheltering presence, while the central area feels exposed with sparse, broken pixels, representing fragility. The main collision occurs centrally where the densely packed colors of the edges clash with the softer hues, creating a visual echo of both pressure and release.</desc>
