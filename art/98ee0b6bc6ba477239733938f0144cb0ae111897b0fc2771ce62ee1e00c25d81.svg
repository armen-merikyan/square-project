<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork embodies the emotional interplay of vulnerability and strength, represented by a striking contrast between deep burnt orange and muted charcoal tones. The subtle flow from warm hues at the top to cool tones below creates tension, as if strong currents of emotion collide, evoking both protection and exposure. The edge style introduces imperfection and instability, hinting at the fragility of the center. The broken pixels act as scars, revealing the nature of pressure and release, while also incorporating necessary negative space to emphasize the duality of presence and absence.</desc>
