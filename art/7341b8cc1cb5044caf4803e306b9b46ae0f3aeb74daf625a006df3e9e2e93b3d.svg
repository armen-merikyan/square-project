<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs. Noise</title>
  <desc id="desc">This piece explores the emotional tension between the vibrancy of 'spark' and the weight of 'ash'. The palette combines warm yellows and oranges with muted purples, suggesting a blend of hope and weariness. The main collision occurs centrally, where the bright sparks disrupt the muted ash, mimicking the struggle of resilience against the fading of memory. The composition rises from the bottom, indicating a desire for elevation amidst interference. Broken pixels create intentional disruptions, emphasizing the imperfect nature of memory and experience, enhancing the overall theme of conflict and survival.</desc>
