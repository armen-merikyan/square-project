<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This piece represents the emotional conflict between desire and restraint, reflected through warm and saturated colors against a muted background. The palette of red oxide and muted cream creates a base tension, representing longing. The collisions between bold colors create dynamic patches of interaction across the square, especially towards the center where the two patterns—desire's warmth and restraint's coolness—intersect. The placement of broken pixels introduces imperfection, echoing life's unpredictability and minor disruptions within our desires. The unclosed edges symbolize a lack of resolution, enhancing the sense of ongoing struggle captured in the grid layout.</desc>
