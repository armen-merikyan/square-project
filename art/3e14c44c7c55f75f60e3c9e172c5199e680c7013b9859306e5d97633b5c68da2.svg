<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality in Motion</title>
  <desc id="desc">The emotional tone reflects the tension between 'joy' and 'grief'. The palette combines vibrant yellows and oranges, representing joy, with cooler muted purples and deep blues, evoking grief. The top half radiates with warm sparks indicative of joy, while the bottom half aligns with the fragmented waves of grief. The main contrast lies in the shift between these two halves, illustrated through pixeled density and an intermittent negative space that echoes the emotional push and pull. The overall arrangement highlights symmetry challenged by broken patterns, symbolizing a struggle between these feelings.</desc>
