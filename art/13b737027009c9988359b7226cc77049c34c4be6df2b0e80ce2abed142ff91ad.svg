  <title id="title">Embers of Contrast</title>
  <desc id="desc">The artwork captures the emotional tension between joy and grief, depicted through contrasting colors and patterns. A palette of bright yellows and oranges symbolizes joy, while deep blues and muted purples evoke grief. The pattern flows from a checker-like density at the bottom, symbolizing joy, transitioning into a dot pattern at the top representing grief, thus visualizing the conflict. The interaction between bright and muted colors creates a dynamic visual tension across the canvas.</desc>
