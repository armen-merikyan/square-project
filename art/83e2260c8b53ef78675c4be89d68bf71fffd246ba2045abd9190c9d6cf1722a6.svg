<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Currents</title>
  <desc id="desc">The emotional tone captures the struggle between tenderness and rage, represented through a palette that oscillates between the saturated intensity of red and the muted calm of pale blue and black. The black creates a heavy background that conveys rage, while the pale blue introduces elements of serenity, acting as a ‘quiet channel’ amidst emotional upheaval. A dominant dark top half transitions into lighter fields, simulating the effect of rain pouring downward, creating a sense of fracture and descent. Overlapping patterns of scattered light amid dense, dark areas represent conflict and collision, where the pixel bleed effect adds chaos, while maintaining some intentional disarray to exhibit the imperfections of emotions. The tension culminates in the center, echoing the struggle between clashing emotional states.</desc>
