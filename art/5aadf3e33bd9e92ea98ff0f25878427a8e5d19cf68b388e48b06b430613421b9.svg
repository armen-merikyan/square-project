<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece captures the emotional tension between rage and calm through contrasting colors and patterns. The palette of deep black and vibrant red embodies rage, while soft pale blue and white represent calm. The jagged edges of the red grid aggressively interrupt the structured flow of the mirror-like blue, creating a visual argument at the center of the square. The arrangement seeks to illustrate the constant push-and-pull of these competing emotions, with a dominant presence of calm as it attempts to contain the overflowing intensity of rage, reflected in the scattered placement of broken pixels.</desc>
