<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork explores the emotional tension between rage and calm. The palette is a juxtaposition of vivid reds to symbolize the heat of rage against serene pale blues and whites representing calm. The flooding pattern of reds from the center is interrupted by scattered calm dot patterns, indicating containment amidst chaos. The collision occurs between the concentrated red area and the surrounding cooler tones, suggesting a struggle for balance between overflowing emotion and the attempt to maintain serenity. The layout features dense bands of emotion, reflecting a layered stack of feelings, reinforcing the central theme.</desc>
