  <title id="title">Exposure &amp; Shelter</title>
  <desc id="desc">The artwork captures the emotional contrast of vulnerability and strength through a layered band structure. The palette consists of muted earth tones and soft whites to signify both resilience and fragility. The stronger, darker hues at the edges represent strength, while lighter, fragile tones dominate the center, echoing vulnerability. The dominant flow from dark to light suggests a gradual shift from external strength to inner exposure, reflecting the seed's themes of shelter and connection.</desc>
