  <title id="title">Tension of Emotions</title>
  <desc id="desc">The artwork embodies the tug-of-war between joy and grief, contrasting bright warm tones against deep muted colors. The palette includes vibrant yellows and oranges representing joy, countered by cooler, shadowy blues and purples to suggest grief. The collision occurs in the center, where bright pixels pulse against a heavier background, echoing the emotional complexity of love and betrayal. The layout features a central focus, surrounded by an irregular pattern to reflect emotional imbalance, while leaving negative space to convey unresolved feelings.</desc>
