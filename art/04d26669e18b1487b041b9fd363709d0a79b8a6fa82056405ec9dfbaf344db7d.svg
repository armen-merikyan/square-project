<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmony in Disarray</title>
  <desc id="desc">The emotional tone captures the tension between confusion and clarity, with strong contrasts represented through a palette of dark reds and burnt oranges offset by deeper charcoals. The palette reflects the raw intensity of rage and the warmth of calm, suggesting a pulse of emotion. The placement of lighter and darker shades alongside thick outlines creates a sense of interruption and collision, particularly in the central rows, where the brightness emerges from the surrounding chaos, thus amplifying the narrative of clarity breaking through confusion. The interplay of striped and crosshatched patterns evokes a feeling of structured disorder.</desc>
