<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone juxtaposes the softness of gentle hues against the severity of sharp contrasts. The palette is chosen to evoke warmth (powder pink, warm white) versus the cool, hard presence of black and gray. The left side embodies softness with blended transitions, while the right side presents severity in stark, defined islands, colliding in the center. The pattern captures the tension of brightness overflowing into darker spaces, suggesting an emotional interplay of guilt and forgiveness.</desc>
