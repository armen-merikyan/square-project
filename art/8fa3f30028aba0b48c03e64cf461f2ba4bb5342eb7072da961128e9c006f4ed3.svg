<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order in Chaos</title>
  <desc id="desc">This artwork explores the tension between restlessness and peace through a deliberate clash of contrasting color patterns. The palette of navy, black, and dim cyan evokes a sense of darkness and depth, while punctuated accents of single white provide moments of brightness against the darker tones. The left side represents stability through a staircase pattern, while the right side gradually shifts to a veil pattern that suggests disarray, reflecting the 'memory vs motion' theme. The primary collision occurs along a subtle diagonal axis, marking the contrast of movement against stillness. Intentionally broken pixels introduce imperfection and uncertainty, echoing the fragmented nature of memory and the complexity of inner emotional landscapes. Negative space is maintained, allowing the piece to breathe and evoke contemplation, embodying the struggle between chaos and calm.</desc>
