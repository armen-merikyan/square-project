<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">This piece explores the emotional dichotomy between relief and dread through stark contrasts in color and form. The chosen palette of vibrant lime, deep black, electric blue, and bold magenta embodies the vibrancy of relief clashing with the weight of dread. The pattern arrangement reflects a mirror-broken layout, symbolizing the tension created by symmetry disrupted. The central contrast happens in the top section, where the bright colors vie against the darkness below, suggesting a struggle for dominance amidst an empty space. This dynamic evokes a sense of both calm and chaos, aligning beautifully with the seed's emotional landscape.</desc>
