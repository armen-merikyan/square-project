  <title id="title">Contrast of Light and Weight</title>
  <desc id="desc">This artwork embodies the emotional tension between relief and dread, using a palette of deep navy and black to represent dread contrasted against soft dim cyan and single white for emotional relief. The composition flows from the bottom to the top, with a corner invasion layout that creates a feeling of accumulation and release. The pattern of mirror-like shapes creates tension yet suggests symmetry is being broken, while ghostly flame-like forms provide warmth amidst the darkness, evoking a sense of unresolved emotional complexity.</desc>
