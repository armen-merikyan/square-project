  <title id="title">Fragmented Truth</title>
  <desc id="desc">The artwork embodies the tension between trust and suspicion through contrasting layers of dark and light. The navy and dark hues form a dense 'sea' of suspicion, while the soft whites and dim cyans punctuate this density, offering fleeting moments of trust. The diagonal fall and pressure borders create a sense of both enclosure and fragmentation, visually representing the dynamic interplay of emotions. Main collisions occur in the center, where darker colors meet lighter tones, symbolizing the struggle between openness and hidden depths.</desc>
