<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This piece captures a duality of joy and grief through a balanced yet imperfect symmetry. The color palette of bright yellow and orange represents joy, while muted purples and deep blues explore the weight of grief. The grid structure against scattered dots emphasizes the emotional tension, with color collisions occurring at the center where joy and grief intersect, suggesting a pulse of conflicting emotions. By leaving negative space in the arrangement, I evoke a sense of emotional resonance and reflection. In essence, the layout reflects the central conflict between these emotional states, imbuing the artwork with both a structured feel and a sense of disruption.</desc>
