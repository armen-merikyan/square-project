<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Dualities</title>
  <desc id="desc">The emotional tone oscillates between warmth and coldness, represented by a palette that contrasts soft pinks with harsh dark maroon. The layout captures love in the top rows through framed patterns, creating a comforting space, while betrayal in the bottom rows uses a grid-like arrangement, suggesting confinement and sharp edges. The collision occurs in the transition between these emotions, allowing for a whisper of intermingled colors. The seed's themes of inside versus outside and crosshatching against noise create an abstract rhythm where warmth embraces coolness yet remains interrupted by sharper tones.</desc>
