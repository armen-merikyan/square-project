<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Braid of Exposure</title>
  <desc id="desc">This piece explores the tension between safety and exposure, using contrasting colors to embody vulnerability and warmth. The palette includes soft tones of 'shelter_green' and 'warm_brown' representing safety, interspersed with 'cold_white' and 'open_blue' to symbolize the harshness of exposure. The layout reflects an overfilled corner that gradually spreads through the piece, creating a visual echo of pressure. The main collision occurs in the center where the soft and muted colors interact with the bright and defined edges, representing the clash between sanctuary and vulnerability, thus allowing the emotional narrative of protection versus risk to unfold in color.</desc>
