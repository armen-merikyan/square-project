<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">The emotional tone evokes a struggle between desire and restraint—an inner conflict that generates both heat and cool detachment. The palette was selected to reflect this duality: the warm reds represent desire and passion, while the cool blacks and muted creams signify restraint and containment. The primary collision occurs at the center, where warm colors seem to overflow, bumping against the organized cool grid patterns representing restraint. The broken pixels introduce intentional imperfections, suggesting the chaotic nature of these emotions, while maintaining a readability that encourages exploration of the square's layers and depth. Overall, the composition tells a story of tension balanced by structure, reflecting the seed's themes without concrete representation.</desc>
