<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece captures the emotional tension between vulnerability and strength through a juxtaposition of pale and warm hues. The chosen palette, including shelter green and warm brown, reflects the nuanced interplay of these emotions. The dense, stable center in dark shades contrasts with the light, fragile edges created by broken pixels. The collision occurs at the center, symbolizing a heart fragment that exposes vulnerability while vying for strength against eroded symmetry. This creates a visual push-pull that embodies desire and emptiness without literal representation.</desc>
