  <title id="title">Fractured Balance</title>
  <desc id="desc">This artwork captures the emotional tension between panic and control using a palette that evokes a sense of uncertainty. The use of dark maroon represents weighed-down feelings, while pink infuses a burst of energy – an echo of joy amid grief. The thick outlines suggest structure while the broken pixels introduce imperfection, creating a fracture in the order. The diagonal flow mimics a falling, cascading sense of chaos interrupted by moments of vibrant control, portraying the eternal struggle between the two emotions.</desc>
