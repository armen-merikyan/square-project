<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tension</title>
  <desc id="desc">The composition captures the emotional tension between desire and restraint. The warm reds and oranges on the left evoke a saturated pulse of longing, while the muted tones of gray and cream on the right convey the containment and pressure of restraint. The center acts as a dynamic collision point where these emotions intersect, represented by contrasting patterns of overlapping warm fault lines and cool rings. The placement favors the warm side, reflecting the dominant emotion. Broken pixels introduce imperfections, enhancing the sense of tension and disruption in the narrative.</desc>
