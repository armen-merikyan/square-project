<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Lattice</title>
  <desc id="desc">This artwork captures the emotional duality of desire and restraint through a strategic interplay of warm and muted colors. The palette, consisting of red oxide, blackened plum, muted cream, iron gray, and small orange, evokes an internal struggle, with warmer hues representing desire breaking against cooler, restrained tones. The main contrast occurs in the center, where a lively ladder pattern intersects with the softer pulse marks, creating a sense of collision and unresolved tension. The overall flow spirals inward, mirroring the emotional pressure and drawing viewers' eyes into the heart of the piece.</desc>
