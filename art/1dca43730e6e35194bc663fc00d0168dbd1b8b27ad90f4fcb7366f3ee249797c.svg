<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This artwork embodies the emotional conflict between 'panic' and 'control'. The chosen palette of vibrant lime, electric blue, and deep magenta represents heightened states of emotion, contrasting with the grounding presence of black. The center is deliberately filled with strong colors, resembling an explosive energy, while the edges are softer and more muted to evoke a sense of control. The fractured pattern suggests pixel bleed, hinting at imperfection and chaos, while the overall layout creates movement from the center outward, symbolizing a struggle from the core of emotion to the surrounding calm. The asymmetry in the arrangement reinforces the tension between strength and vulnerability.</desc>
