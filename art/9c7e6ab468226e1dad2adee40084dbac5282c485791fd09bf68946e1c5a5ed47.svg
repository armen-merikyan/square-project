<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Bridging Gaps</title>
  <desc id="desc">The emotional tone reflects a duality between the pull of longing and the strength of resolve. The palette features soothing pale aqua and mist gray to represent longing, contrasted with strong alarm red and deep ink blue that symbolize resolve. This collision forms the foundation of the composition, with a steady flow from the center, where longing's braids intermingle with the structured islands of resolve. The layout splits the grid horizontally, creating a visual tension that echoes the themes of balance and conflict within the emotions.</desc>
