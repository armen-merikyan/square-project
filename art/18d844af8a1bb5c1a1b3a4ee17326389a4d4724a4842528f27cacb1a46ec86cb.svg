<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Calm</title>
  <desc id="desc">The emotional tone contrasts the chaotic restlessness with a serene peace, embodied by the checker pattern for restlessness and a flood for peace. The color palette balances muted tones with warm accents, especially featuring deep blacks and reds against soft creams. The main collision resides diagonally, where the chaotic blocks of restlessness meet the gentle waves of calm, echoing the conceptual battle between memory-induced motion and the stillness sought in peace. Broken pixels represent interruptions in the flow, suggesting both scars from the past and the ongoing struggle. The structure maintains clear large-scale readability while conveying a rich emotional narrative.</desc>
