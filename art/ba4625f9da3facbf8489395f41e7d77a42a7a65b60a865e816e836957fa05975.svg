<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork captures the emotional tug-of-war between desire and emptiness. The palette, featuring warm and vibrant shades like hot coral and blood orange, represents the intense yearning that seeks expression. In contrast, the presence of hollow blue and charcoal symbolizes the void of unfulfilled desire. The center area is saturated, embodying overwhelming emotion, while the borders are designed to feel structured yet constraining, illustrating the struggle against overflow. The collision of the warm hinge pattern with the fragmented shatter pattern enforces this underlying conflict visually, creating an abstract representation of inner turmoil.</desc>
