  <title id="title">Pull of Dissonance</title>
  <desc id="desc">This composition embodies the tension between restlessness and peace through a heavy contrast of colors and layout. The chosen palette of warm coral and soft amber represents a longing for peace, while cold slate and blue-black invoke a sense of turmoil and unease. The main collision occurs diagonally, reflecting the conflicting emotions of memory versus motion with stronger hues pushing against softer tones in an intentional overlapping pattern. The broken pixels serve as disruptions that symbolize the fragmented nature of the emotions present, enhancing the overall feeling of unresolved tension.</desc>
