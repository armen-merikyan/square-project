<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Emotion</title>
  <desc id="desc">The emotional tone explores the tension between envy (dark, sharp) and gratitude (bright, soft). The chosen palette of yellow, orange, deep blue, and muted purple creates contrasts that reflect warmth against coolness. Specifically, the deep blue and muted purple represent the heavy, dense aspects of envy, while the vibrant yellows and oranges evoke the lightness of gratitude. The pattern with cracked and striped effects showcases the collision of feelings—broken yet flowing, chaotic yet structured. The disbalance between dense outer borders and a lighter center symbolizes the struggle of center vs edges.</desc>
