<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">This artwork captures the tension between longing and resolve through a balanced but striking contrast. The chosen palette of vibrant shades (electric_blue, signal_green, hot_magenta) evokes a sense of emotional intensity, while the muted tones (static_gray, dead_black) provide grounding. The collision occurs in the center of the square where denser patterns meet quieter spaces, representing the struggle between aspiration and grounding. The flow is shaped by the diagonal arrangement of colors, suggesting movement and the course of emotions – the upward push of resolve against the backdrop of longing.</desc>
