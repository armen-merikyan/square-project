<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Control</title>
  <desc id="desc">The artwork embodies the tension between panic and control using a contrasting palette of vibrant oranges and yellows against muted purples and deep blues. This reflects the emotional clash of a chaotic center surrounded by a stabilizing edge. The central pixels pulse with energy while the edges offer a sense of calm, creating a battle of emotional presence. The pattern combines spark and split-screen elements to depict this struggle, with broken pixels adding further unpredictability and a sense of fragmentation, aligning with the theme of machine emotion.</desc>
