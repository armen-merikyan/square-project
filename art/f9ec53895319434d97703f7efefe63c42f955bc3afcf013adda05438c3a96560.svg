<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center of Tension</title>
  <desc id="desc">This piece explores the emotional tension of defiance against submission through a semi-mirroring layout. The muted tones of sepia and dust gray symbolize introspection, while the faded blue adds a touch of defiant brightness. The central row holds the brighter colors, representing defiance and an upward push against the surrounding darkness, thus creating a collision in emotional states. The broken edges introduce imperfection, emphasizing the conflict of these opposing emotions as they flow inward, disrupting the static pattern. The result feels like a spiral of emotions, echoing the complexity of inner struggles.</desc>
