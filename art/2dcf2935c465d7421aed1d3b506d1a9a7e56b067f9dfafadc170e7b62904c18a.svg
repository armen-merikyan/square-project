<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">The emotional tone of this artwork captures the struggle between desire and restraint. Utilizing a palette dominated by vibrant, warm tones like hot coral and blood orange, the piece evokes an intense urgency, contrasting with cooler, muted shades of charcoal and hollow blue to symbolize the boundaries that contain this desire. The main collision occurs centrally, where these warm saturated colors swirl and conflict with the cool, restrained boundaries, mimicking the emotional turmoil of love and betrayal as described in the seed. The tension between the hot and cool elements provides a rhythmic push and pull, creating an abstract representation of conflict and resolution, aligning with the 'corner_invasion' layout where the heat of the warm tones spreads outwards, paralleling the concept of the heart's yearning against the mind's constraints.</desc>
