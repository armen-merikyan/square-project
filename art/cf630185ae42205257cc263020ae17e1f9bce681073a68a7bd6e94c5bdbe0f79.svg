<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal and Echo</title>
  <desc id="desc">This piece explores the emotional tension between control and surrender. The color palette of hot coral and dust pink suggests warmth, urgency, and human emotion, while muted shades like charcoal and hollow blue represent calmness and containment. The central collision arises from a checker pattern encircling an open, quiet field, visually manifesting the interplay between rigidity and freedom. The layout suggests rising energy, evoking feelings of hope amidst noise, while broken pixels introduce intentional disruptions, representing the struggle between the desire for stability and the freedom to release.</desc>
