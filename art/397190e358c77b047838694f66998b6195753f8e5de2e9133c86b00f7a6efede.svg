  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece embodies the tension between safety and exposure through vibrant contrasts and structured chaos. The chosen palette reflects the duality of warm and cool tones, suggesting shelter with greens and browns against the starkness of pale skin and open blue. The collision occurs primarily in the center where the static safety pattern meets the barcode exposure pattern, creating a dynamic push and pull. Broken pixels disrupt the flow, hinting at imperfections in shelter and moments of vulnerability, culminating in a visual narrative of emotional complexity.</desc>
