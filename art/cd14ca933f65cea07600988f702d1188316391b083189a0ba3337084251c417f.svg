<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Echoes</title>
  <desc id="desc">This artwork reflects the tension between envy and gratitude, where the colors create a dynamic interplay of emotion. The palette combines deep maroons and muted grays with a vibrant pink to represent feelings of yearning and appreciation. The contrast manifests in a central bright pixel surrounded by a darkened perimeter, creating an inward flow that invites contemplation. The arrangement of colors reflects an unsettling balance—an echo of gratitude rising against the weight of envy, with soft edges suggesting the fleeting nature of both emotions. The broken pixels introduce imperfection, symbolizing raw, unrefined feelings, while careful negative space allows the colors to breathe, capturing a moment of quiet amidst the emotional struggle.</desc>
