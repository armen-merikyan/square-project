<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Longing and Resolve</title>
  <desc id="desc">The emotional tone captures the tensions between longing and resolve, contrasting warmth and coolness. The palette employs muted purple and deep blue to evoke a sense of depth and introspection, while hints of yellow and orange serve as accent colors for emotional highlights. The composition features a diagonal flow embodying dynamic tension, disrupted by a halo pattern on one side and a structured, mirrored pattern on the other, symbolizing the chaotic search for connection against a backdrop of stasis. The central collision occurs along the diagonal, where the more chaotic, warm colors meet the cooler, resolved hues, illustrating the push and pull of emotion.</desc>
