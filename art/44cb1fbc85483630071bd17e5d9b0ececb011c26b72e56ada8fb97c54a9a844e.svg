<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interference Pulse</title>
  <desc id="desc">The emotional tone captures a struggle between clarity and chaos. The palette consists of deep navy, muted blacks, stark whites, and dim cyans, representing the synthesis of signals amidst noise. The central area is dense with dark tones suggesting interference (noise), while lighter shades surround it to evoke space and clarity (signal). The collision occurs at the center, where the dark hues of memory and chaos clash with the lighter areas of exposure and focus. The patterns of shatter (noise) interrupt the quiet field of structure, reflecting the tension of ‘signal vs noise’ while allowing some negative space for breathing room in this textured composition.</desc>
