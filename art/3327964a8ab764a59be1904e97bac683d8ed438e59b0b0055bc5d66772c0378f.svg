<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">The emotional tone bridges the rigidity of control and the yielding nature of surrender. The palette, a mix of deep blues and pale yellows, evokes a sense of mourning yet renewal, creating a somber foundation with bursts of hope. The contrast primarily lies at the center where the darker hues press against the lighter shades, symbolizing pressure versus release in a dynamic interplay. This central collision of dark and light illustrates the struggle between containment and overflow, while the 'island and sea' layout adds density at the core surrounded by quieter tones, emphasizing the emotional tension of the seed.</desc>
