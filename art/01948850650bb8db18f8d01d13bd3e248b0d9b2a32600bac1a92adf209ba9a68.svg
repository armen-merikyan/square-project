<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone of this composition reflects a tension between desire and restraint, utilizing contrasting colors to illustrate this conflict. The warm palette includes saturated hues like hot coral and blood orange representing desire, while cooler tones of charcoal and hollow blue symbolize restraint. The layout presents a densely packed central 'island' of warmth, surrounded by a calmer sea of muted colors, creating a visual pull towards the center. The main collision occurs at the center, where the warm colors meet the cool edges, representing the push and pull of desire against the sealed boundaries of restraint. Broken pixels introduce imperfection, signifying emotional disruptions, enhancing the narrative of craving. The overall pattern flows in a clockwise spiral, suggesting movement yet constrained by the edges, embodying the push-pull dynamic of the theme effectively.</desc>
