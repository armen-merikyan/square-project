<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone navigates the tension between defiance and submission, using a palette that combines cosmic indigo and cold gold to convey both quiet resistance and subtle surrender. The center of the composition is illuminated by brighter colors representing defiance, while the outer edges, filled with deep teal and void black, represent submission. The main collision occurs in the center, where the brightness of the colors resonates against the dimmer tones, creating a visual echo of conflict. The broken pixels disrupt the patterns to represent the imperfect nature of these emotions, adding depth and texture to the 8x8 square.</desc>
