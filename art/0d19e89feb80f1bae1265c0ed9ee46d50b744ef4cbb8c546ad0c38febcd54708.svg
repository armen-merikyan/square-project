<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Broken Harmony</title>
  <desc id="desc">This composition reflects the emotional duality of love and betrayal through a split yet resonant structure. The palette combines warm pinks and reds for love with darker maroons and grays to represent betrayal, creating a tension that propels the viewer’s gaze diagonally across the canvas. The main contrast arises at the center, where mirrored shapes collide, highlighting imperfections. Each row gradually shifts from warm to dark, creating an echo of emotion that resonates with the themes of symmetry and disruption; the broken pixel placement adds to the sense of disarray, marking imperfection as a natural part of love.</desc>
