<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Light</title>
  <desc id="desc">This composition captures the emotional collision between fear and hope through contrasting dark and light colors. The palette combines deep blacks and dark violets to signify the weight of pressure with soft golds and pale greens offering a glimpse of rising hope. The flow from outside to inside symbolizes the journey from dense emotion to emotional release. The placement of broken pixels and jagged edges reflects the chaotic nature of these feelings while the target pattern at the center suggests small, persistent glimmers of hope against the noise.</desc>
