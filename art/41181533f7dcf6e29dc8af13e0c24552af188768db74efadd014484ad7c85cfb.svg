<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This composition explores the emotional conflict between safety and exposure. The palette balances a soft shelter green and warm brown with stark cold whites and pale skin tones. The arrangement represents a spiral pressure layout where the cooler colors emerge from the center, simulating exposure and the open air, while the warmer colors encompass the edges, representing layers of safety and stability. The broken pixels create deliberate disruptions, offering a sense of imperfection amidst the ongoing flow, accentuating the tension and contrasts. The main collision of hues occurs off-center, symbolizing a struggle between the enclosure and the unleashed emotions within.</desc>
