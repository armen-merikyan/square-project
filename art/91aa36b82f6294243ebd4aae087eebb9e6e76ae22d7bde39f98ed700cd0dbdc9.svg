  <title id="title">Exposure in Shelter</title>
  <desc id="desc">The emotional tone explores the tension between vulnerability and strength, using a palette of soothing greens and earthy browns contrasted with pale and cold accents, representing safety and exposure. The main collision occurs near the center with dense and narrow patterns of strength (the rain) intertwining with the soft maze of vulnerability, creating both tension and balance. Broken pixels are intentionally placed for disruption, reflecting the flaws and scars inherent in the themes of exposure and protection.</desc>
