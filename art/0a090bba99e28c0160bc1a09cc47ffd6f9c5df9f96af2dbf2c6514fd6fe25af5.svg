<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Duality</title>
  <desc id="desc">The piece embodies the contrasting emotions of joy and grief. The palette combines bright yellows and oranges to symbolize joy, while deep blues and muted purples represent grief. The pattern contrasts these emotions through chaotic crosshatching representing joy in the upper half, while a denser, maze-like layout in muted tones represents the weight of grief below. The horizontal split emphasizes the tension between the two states, suggesting that joy can often be disrupted by underlying grief, creating a dynamic interplay across the square. The placement of colors allows for a sense of flow from brightness to heaviness, embodying the emotional turbulence described in the seed.</desc>
