<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast in Motion</title>
  <desc id="desc">The emotional tone juxtaposes the brightness of joy against the somberness of grief, depicted through a vibrant palette of yellow and orange clashing with deep blue and muted purple. The forced relationship between light and dark illustrates a zigzagging path of emotions—from the rising signal of joy (bright colors) to the ash-like quality of grief (bluish tones). The composition employs a radial pattern for joy with expanding blocks, interrupted by teeth-like edges of grief, creating a sense of balance yet disturbance. This duality represents the chaotic beauty of contrasting feelings, with broken pixels adding subtle discomfort, maintaining negative space for emotional breathing.</desc>
