<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Last Light</title>
  <desc id="desc">This composition conveys an emotional tension between softness and severity. The palette features powder pink and warm white to represent softness, while carbon black and sharp crimson illustrate severity. The dense, dark lower half of the artwork contrasts against a small cluster of warm whites and pinks towards the upper side, creating a sense of hope amidst the weightiness. The spiral pattern suggests a slow, gradual movement through emotional complexity, while the broken pixels serve as intentional disruptions in the otherwise structured grid, reflecting the imperfections within the emotional landscape. The arrangement amplifies the feeling of unresolved tension, as the bright colors push through the darkness, echoing the theme of guilt and forgiveness.</desc>
