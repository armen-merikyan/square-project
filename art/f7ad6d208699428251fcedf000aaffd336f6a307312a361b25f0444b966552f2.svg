<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This piece captures the tension between envy and gratitude through a contrasting palette of electric blue and magenta against a backdrop of black. The pattern mirrors the emotional conflict, weaving jealousy with a ring-like structure while gratitude emerges from a more fragmented, irregular form. The arrangement presents a central heavy square that feels threatened yet protected by the surrounding chaotic elements, embodying light pressures against weighty reflections. The jagged interplays symbolize a zigzag through experiences, creating an asymmetry that conveys unresolved tension.</desc>
