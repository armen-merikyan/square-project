<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Harmony</title>
  <desc id="desc">This composition explores the emotional dichotomy of joy and grief through contrasting colors and patterns. The warm yellows and oranges represent joy, radiating outward in a bright frame pattern which suggests expansion. In contrast, the deep blue and muted purple embody grief, appearing as radial forms that cluster toward the center, creating a sense of pressure. The jagged edges imply chaos juxtaposed against the organized warmth, symbolizing the tension between order and disruption. The interplay of these elements evokes a subtle rebalancing among feelings, allowing for a narrative of unresolved emotions.</desc>
