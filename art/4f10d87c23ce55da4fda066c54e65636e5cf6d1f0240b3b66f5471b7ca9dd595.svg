<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Contrast</title>
  <desc id="desc">The emotional tone juxtaposes certainty and curiosity, creating a dynamic tension across the board. The palette includes warm coral for vibrancy, soft amber for comfort, cold slate that represents certainty and restraint, blue-black as the overwhelming force of chaos, and signal cyan as a spark of curiosity. The main collision occurs in the central four squares, where certainty's orderly constellation pattern interrupts the curious stack formation, suggesting a narrative of conflict between desire for structure versus exploration. This interplay creates a visual pulse resonating from the tense edges toward a center that is both inviting yet restrained, embodying a constant push and pull between these emotions.</desc>
