<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inverted Desires</title>
  <desc id="desc">The emotional tone of this piece reflects a complex interplay of longing and resolve. The palette, using muted cream for warmth, red oxide for intensity, and blackened plum for depth, captures the tension between aspirations and barriers. The main contrast occurs diagonally, where the structured resolve (crosshatch pattern in muted cream) collides with chaotic longing (embers' soft reds), suggesting an internal conflict. The broken pixels introduce imperfections, symbolizing the disruptions in this emotional narrative, promoting the idea of a yearning that both embraces and repels.</desc>
