<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Near vs Far</title>
  <desc id="desc">This artwork explores the emotional tension between longing and resolve. The top half represents longing using softer, pulse-like marks in muted shades of static gray and signal green, creating a sense of unfinished approach. In contrast, the bottom half embodies resolve, with firmer stepwell patterns in strong doses of electric blue and hot magenta, reflecting clarity and determination. The main collision happens in the center, where the two halves meet and disrupt each other, evoking the feelings of tension and echo. Broken pixels are introduced as intentional disruptions, resembling scars in the fabric of emotion, enhancing the contrast between the serene longing and the steady resolve.</desc>
