<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Resistance and Embrace</title>
  <desc id="desc">The emotional tone reflects a duality of defiance and submission, using angular clashes of dark colors against soft gradients. The palette of mourning black, deep blue, new leaf, pale yellow, and stone suggests a cycle of reformation and renewal amidst chaos. The main contrast occurs in the center where rigid black cracks interrupt the nurturing pale background, creating a sense of conflict. This design mirrors the seed's concept through aggressive upward movements in layout, embodying hope against submission, represented as a spiral of color around the center.</desc>
