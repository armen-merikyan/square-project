  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone reflects the struggle between defiance and submission: the left half projects solidity and brightness, while the right conveys softness and subtlety. The palette, featuring off-white and compressed red, indicates quiet pressure, creating a strong visual tension. The collision occurs along the vertical split, with vibrant static marks contrasting against the smoother thread-like patterns symbolizing submission, drawing the viewer’s eye to the center as a focal point of conflict and depth.</desc>
