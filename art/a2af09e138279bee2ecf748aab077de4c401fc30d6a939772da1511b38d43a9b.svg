<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Layers</title>
  <desc id="desc">The emotional tone expresses a conflict between vulnerability and strength, represented through a palette of vibrant and muted colors. The black serves as a protective envelope for the brighter accents of lime, electric blue, and magenta. The center, a chaotic mixture of colors, symbolizes the exposed struggles, while the edges with darker tones suggest a protective boundary. The contrast occurs primarily in the center, creating a feeling of intensity against the calm outskirts. Hence, the arrangement becomes a narrative of tension and resilience, embodying the qualities of the seed in an abstract way.</desc>
