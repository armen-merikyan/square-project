<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This work captures the tension between restlessness and peace through an interplay of chaotic ladder patterns on the left and structured checker patterns on the right. The palette transitions from dark to light, representing the journey from night to dawn—dark violet and black convey heaviness and unrest while pale green and soft gold evoke tranquility. The main collision point is at the vertical center, where the chaotic energy of the left meets the calming order of the right, creating a dynamic yet balanced composition that suggests memory and motion through color and form.</desc>
