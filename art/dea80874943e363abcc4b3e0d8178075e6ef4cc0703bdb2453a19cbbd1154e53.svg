<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition captures the emotional duality of safety versus exposure. The top four rows evoke a sense of vulnerability with cracked shades of cold white and open blue, reminiscent of a pale, exposed center. The bottom four rows provide a warm enclosure with deep tones of warm brown and shelter green, suggesting protection and stability. The contrasting thin vs heavy texture brings tension to the surface, while disruptions mimic real emotional scars. The split layout serves to emphasize this dichotomy, with the main collision at the center reflecting the tension between the two zones.</desc>
