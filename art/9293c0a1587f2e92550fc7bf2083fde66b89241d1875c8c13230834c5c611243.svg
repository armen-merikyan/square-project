<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Spaces</title>
  <desc id="desc">The emotional tone contrasts the chaos of panic with the stability of control. The chosen palette of burnt orange and dark red suggests instability and heat, while charcoal provides grounding. The top four rows encapsulate panic through a radial pattern, filled with rich, warm tones, creating a feeling of vibrant pressure. The bottom four embody control with a crosshatch pattern, using darker, cooler shades for structure, symbolizing a quieter inner space. Main contrast occurs where the warm colors intersect with cooler shades, representing the conflict between external panic and internal calm, echoing the seed's themes of inside versus outside.</desc>
