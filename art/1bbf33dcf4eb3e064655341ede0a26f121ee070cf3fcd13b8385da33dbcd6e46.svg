<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Signal</title>
  <desc id="desc">This composition reflects a dynamic tension between clarity and chaos, embodying the conflict of 'signal vs noise'. The left half uses muted shades of navy and black to signify noise—areas that dissolve into the static of grey and dark blue, invoking feelings of confusion. In contrast, the right half bursts with vibrant dim cyan and a hint of white, representing the signal's clear pulse attempting to emerge through the overwhelming static. The shatter pattern provides fragmented interruptions of light against the dark noise, suggesting fleeting clarity amidst chaos. The strategic placement of disrupted pixels acts as scars, highlighting moments of disturbance in the flow. The layout channels this emotional battle while keeping enough negative space to preserve a sense of breath amidst the noise.</desc>
