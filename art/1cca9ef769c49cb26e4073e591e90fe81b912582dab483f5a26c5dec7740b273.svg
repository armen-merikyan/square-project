<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Embracing Vulnerability</title>
  <desc id="desc">The emotional tone is a delicate balance of safety and exposure. The palette consists of muted safety greens and browns framed by pale skin tones, with contrasting accents of cold white and open blue to invoke feelings of both warmth and exposure. The main contrast occurs in the vertical split; the outer safety colors clash softly with the inner exposure patterns, creating an echo of conflict between a protective barrier and a vulnerable core. This collision emphasizes the theme of emotional tension, with a checker pattern representing exposure and a spark pattern illustrating the safety, all while broken pixels introduce intentional imperfections, suggesting scars or memories.</desc>
