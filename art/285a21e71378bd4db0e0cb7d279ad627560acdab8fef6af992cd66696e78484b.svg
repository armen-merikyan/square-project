<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Edge and Center</title>
  <desc id="desc">This artwork explores the tension between softness and severity through a palette that juxtaposes muted warm whites and vibrant crimson against deep blacks and cool grays, emphasizing the contrast of inner feelings versus outer forces. The halos of light and dark colors create a radial rhythm, suggesting a pulsing energy that emanates from the center, while the broken pixels symbolize moments of imperfection and vulnerability. The edges are softened yet edged sharply, contrasting our internal softness with external severity, encapsulating the emotional turmoil described in the seed.</desc>
