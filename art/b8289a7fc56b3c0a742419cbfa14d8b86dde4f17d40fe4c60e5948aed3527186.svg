<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Strata of Strength and Vulnerability</title>
  <desc id="desc">The emotional tone captures the dynamic tension between strength and vulnerability, conveyed through a palette of burnt orange, dark red, charcoal, and gold. The dark colors representing strength form a thick edge, while the lighter tones suggest vulnerability in the center, creating a soft break. The central collision occurs in the middle rows, where strength and vulnerability overlap, suggesting a push-pull dynamic that reflects the complexities of safety and exposure. The broken pixels add intentional imperfections, enhancing the raw emotion of the piece.</desc>
