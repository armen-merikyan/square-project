<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This artwork encapsulates the emotional tension between joy and grief. The palette oscillates between warm yellows and oranges, symbolizing joy, and deep blues and muted purples representing grief. The upper rows exhibit a clean, ordered pattern reflecting joy, while the bottom rows dissolve into fragmented spaces, portraying grief's intrusion. The wave-like transition through color shifts creates a rhythmic flow from order to chaos, enhancing the sense of contrast and collision, while broken pixels introduce imperfection, capturing the rawness of emotion. The layout emphasizes negative space, echoing an empty room filled with unspoken truths.</desc>
