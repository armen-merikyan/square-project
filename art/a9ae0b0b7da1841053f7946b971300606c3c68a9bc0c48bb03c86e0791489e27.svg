<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shattered Light</title>
  <desc id="desc">This abstract piece explores the emotional tension between fear and hope. The top half utilizes darker shades from the palette, with black and dark violet creating a sense of pressure and confinement, reflecting fear's grasp. Contrastingly, the bottom half employs soft gold and pale green which indicate hope and lightness, radiating upward as if escaping from the weight above. The vertical split captures the duality of emotions, emphasizing the stark divide while allowing for a subtle glow around the edges that suggests optimism amidst darkness. The deliberate placement of broken pixels further enhances the idea of imperfection in the emotional experience.</desc>
