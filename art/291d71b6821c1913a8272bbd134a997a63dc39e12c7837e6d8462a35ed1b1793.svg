<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Crossing Currents</title>
  <desc id="desc">This composition embodies the tension between defiance and submission through juxtaposed color fields. The emotional palette, featuring mourning black and deep blue, conveys a strong contrast, while soft tones of pale yellow and new leaf symbolize submission. The predominant presence of deep blue captures defiance, creating a stark central focus that interrupts the softer edges, conveying an ongoing struggle. The arrangement mirrors the cross-current layout, capturing both the density of conflict and the quiet pull of submission. Intentional broken pixels add disruptions, embracing imperfection as part of the emotional journey.</desc>
