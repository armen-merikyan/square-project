<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the tension between vulnerability and strength through a balanced interplay of colors that reflect emotional depth. The palette of cosmic indigo, void black, star white, cold gold, and deep teal creates an atmosphere of awe and terror, emphasizing strength with darkness and vulnerability with lightness. The main collision occurs at the center, where structured maze patterns (strength) meet loose stripes (vulnerability), creating a dynamic passage. The negative space occupies around 15% of the grid, reinforcing the sense of an exposed center, reminiscent of an unprotected light in a storm.</desc>
