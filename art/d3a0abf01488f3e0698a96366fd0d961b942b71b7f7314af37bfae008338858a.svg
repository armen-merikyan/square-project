<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rising Emotions</title>
  <desc id="desc">This composition represents the duality of joy and grief through a contrasting palette of bright yellow and soft blue. The top half features vibrant, angular patterns reminiscent of joy's spark against a backdrop of orderly muted purples. In contrast, the bottom half embodies grief, using deeper blues and muted purples to evoke heaviness, creating a visual tension that echoes the struggle between rising joy and subdued grief. The zigzag and split-screen patterns emphasize this emotional ebb and flow, effectively capturing the essence of the seed.</desc>
