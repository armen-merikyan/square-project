<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Harmony</title>
  <desc id="desc">This artwork explores the tension between joy and grief, symbolized through contrasting palettes of bright yellows and muted purples. The top half, echoing joy, features a crosshatch pattern that radiates warmth, while the bottom resonates with grief through dotted shadows. The central disturbance caused by the darker tones interrupts the brightness, creating a visual rhythm that reflects the duality of the emotional core. This interaction mimics a wave, where exuberance meets sadness, resulting in an unresolved yet harmonious feeling.</desc>
