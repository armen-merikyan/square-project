<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Abstract Conflict Between Restlessness and Peace</title>
  <desc id="desc">The emotional tone conveys a struggle between calmness and chaotic movement. The palette of muted off-white, deep dust gray, and compressed red offers a quiet base while interjecting warmth and tension. The contrast is made salient through the intense edge between restful pale colors and darker, more aggressive shades. The main collision occurs centrally, where restless shattering patterns meet the placid constellations, creating a visual narrative of turmoil against a peaceful backdrop. The seed inspired a layout that suggests motion disrupted by serene intervals, capturing a dynamic ebb and flow in an abstract form.</desc>
