<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast in Collision</title>
  <desc id="desc">This piece captures the emotional tension between rage and calm. The palette blends fiery reds with tranquil pale blues and soothing whites, expressing a visual narrative of explosive force contained within quiet spaces. The layout features dense, jagged patterns (representing rage) contrasted against gentle, echoing waves (representing calm). The collision occurs prominently in the center, where warm colors disrupt the cooler tones, creating a sense of chaos amidst serenity. This reflects the seed's exploration of noise and calm interjections, structured through intentional broken pixels evoking imperfections in emotion.</desc>
