<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Emotion</title>
  <desc id="desc">This piece explores the tension between defiance and submission through color contrast and pixel arrangement. The palette, 'ancient_fire', features dark reds and charcoals to represent deep emotional undertones, layered with burnt orange for energy and movement. The outer edges utilize a broken pattern that establishes a sense of noise, echoing the chaos of conflicting emotions, while the softer, maze-like patterns in the center embody the intricacies of submission. A concentrated area of negative space in the middle enhances the feeling of uncertainty, suggesting a pending resolution, reflective of themes of love and betrayal. The flow moves diagonally, suggesting movement and collision from left to right, expressing the dynamic interplay between the opposing forces.</desc>
