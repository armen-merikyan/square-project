<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Longing and Resolve</title>
  <desc id="desc">This piece captures the emotional tension of longing and resolve. The palette, drawn from awe and terror, employs deep teals and cosmic indigos for yearning, contrasted with metallic cold gold to signify resolve. The main contrast occurs diagonally, suggesting a cross-current of emotions: the upward diagonal of resolve clashes with the rippling patterns of longing. Broken pixels disrupt the flow, representing the imperfections of emotional experiences. The arrangement embodies a quiet space on one side, with dense clusters on the other, creating a dynamic interplay between intimacy and distance.</desc>
