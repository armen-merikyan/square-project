<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure &amp; Release</title>
  <desc id="desc">The emotional tone explores the tension between quietude and pressure, represented through a palette that balances soft and dark hues. The colors were chosen to evoke a sense of creeping density (dark navy, compressed red) paired with lighter, calming notes (off white, faint peach). The main contrast occurs in the center, where the darker colors collide with the serene, lighter shades, representing the 'shatter against tide' motif. The abstract pattern is shaped by the duality of hard edges (dark colors creating sharp contrasts) retreating into softer, flowing shapes (light colors creating a spacious feel), embodying the balance between chaos and tranquility.</desc>
