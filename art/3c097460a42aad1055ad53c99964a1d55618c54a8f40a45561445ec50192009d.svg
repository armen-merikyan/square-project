<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Facets of Dissonance</title>
  <desc id="desc">The artwork embodies the tension between defiance and submission, employing a palette of black, red, pale blue, and white to express contrasting emotions. The deep blacks create a sense of heavy interruption and angular resistance, while the pale blue and white stripes evoke softness and enclosure. The main contrast occurs in the center, where the barcode pattern of resistance collides with softer stripes, both fighting for dominance across the canvas. This interplay of colors and patterns resonates with the themes of chaos and order, depicting a battle of emotions facing each other, encapsulated in a grid that suggests both conflict and unresolved tension. The deliberate inclusion of broken pixels serves to introduce imperfection, highlighting the fragility of balance in emotional conflicts, while ensuring negative space remains to invoke a sense of quiet amidst the chaos.</desc>
