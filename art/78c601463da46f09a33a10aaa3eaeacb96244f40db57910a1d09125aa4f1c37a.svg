<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone of this artwork reflects the tension between softness and severity, showcased through the palette of 'powder pink', 'warm white', 'carbon black', 'steel gray', and 'sharp crimson'. The gradient from soft hues to darker, more severe tones illustrates the push-pull between exposure and shelter in the composition. The main collision occurs near the center, where warm and cool tones interact, echoing the themes of light versus dark and vulnerability against rigidity. The broken pixels introduce intentional imperfections, enhancing the sense of an open gate inviting uncertainty while maintaining a defined boundary with jagged edges. This pattern embodies the complexities of guilt and forgiveness, embodying the emotional layering created by each color’s placement and intensity.</desc>
