<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Resonance</title>
  <desc id="desc">This composition evokes a tension between defiance and submission through a palette of soft pinks and stark blacks. The central area is darker, representing defiance with carbon black, while the edges dissolve into lighter hues of powder pink and warm white, suggesting a retreat towards submission. The grid-like structure of submission is interrupted by fault lines of sharper colors, creating significant contrast and asymmetry, accentuating the emotional collision at the center. The choice of colors and interrupted patterns literally express the inward spiral of conflict: solid versus fading presence.</desc>
