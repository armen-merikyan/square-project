<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This artwork explores the dynamic tension between quiet and pressure through an asymmetrical yet anchored design. The dominant colors are dark navy and dust gray, suggesting a heavy sense of compression and pressure on the left side, contrasted sharply with soft tones of off-white and faint peach that evoke calm and clarity. The pixel arrangement uses dense clusters towards the left, simulating weight that gradually releases into more negative space towards the right—mimicking the feeling of a breaking wave against an island. The broken pixels introduce intentional imperfections, echoing the shattering tide concept within the emotional landscape.</desc>
