<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tears of Color</title>
  <desc id="desc">This artwork explores the emotional tension between joy and grief, utilizing a palette of yellow, orange, deep blue, and muted purple. The interplay of bright colors represents joy, while the heaviness of deep blue embodies grief. The structured rise of the warm colors contrasts with the cool, drooping blues, forming a dynamic zigzag pattern across the canvas. The checked arrangement hints at order amidst chaos, as bright sparks attempt to break through the subdued, heavy edges. The composition creates collisions in emotional tone, inviting the viewer to navigate through layers of tension, release, and quiet spaces created by negative space.</desc>
