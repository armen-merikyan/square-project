<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Boundaries</title>
  <desc id="desc">The composition explores the emotional pull between desire and restraint, echoed in the saturated reds and muted creams that collide under a consistent rhythm. The palette creates a warm vibrancy amidst cold, blackened plum tones, signifying underlying tension. The pattern features noise elements pushing against organized targets, emanating from a central collision area, creating tension that draws attention to the edges, evoking a sense of longing constrained by invisible barriers. The broken pixels symbolize the imperfections in experiences of love and betrayal, while the use of negative space amplifies feelings of emptiness and desire for expansion.</desc>
