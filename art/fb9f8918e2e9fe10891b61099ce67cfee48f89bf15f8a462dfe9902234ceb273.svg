<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Tension</title>
  <desc id="desc">The emotional tone juxtaposes relief against dread, represented through a palette of deep navy and cool dim cyan contrasting with stark white. The layout of falling pixels emulates a sense of decay, as weights collapse from a top-heavy mass, creating visual tension in the composition. The broken pixels introduce an element of disruption, reinforcing the emotional collision. The use of stripes reflects the rhythmic pull of dread, while lighter spaces suggest fleeting moments of relief. This interplay expresses an unresolved tension, inviting the viewer to feel the push and pull of emotions within an abstract structure.</desc>
