<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This composition explores the emotional duality of quiet versus pressure through a palette that balances muted tones with structured density. The dark navy represents the weighted borders of pressure, while the faint peach acts as a soft horizon, creating a calm space amidst tension. The use of broken pixels introduces imperfections, echoing moments of disruption within the understated flow. The main collision occurs centrally, where the dense clusters of dark colors confront softly rippled lighter shades, illustrating a struggle between stillness and movement derived from the seed's themes of conflict and duality.</desc>
