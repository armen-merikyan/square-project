<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">The emotional tone reflects a conflict between restlessness and peace, creating a dynamic yet balanced abstract representation. The palette of black, dark violet, soft gold, and pale green conveys a journey from darkness into light, symbolizing the dichotomy of feelings. A quiet field of pale green provides a calming backdrop, disrupted by deep dark shapes and wandering accents in gold, mimicking restless memories, with the main collision occurring in the center as the dark and light struggle for space. The patterns of crack and static further enhance this tension, while the edges are softly outlined to signify an in-between state, capturing the essence of memory and motion.</desc>
