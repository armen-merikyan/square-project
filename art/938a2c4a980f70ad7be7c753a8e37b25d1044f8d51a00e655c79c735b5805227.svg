<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Emotions</title>
  <desc id="desc">The emotional tone juxtaposes the inner calm against the pressures of rage, embodied in a palette of red and blue contrasted by black and white. A diagonal flow emphasizes the rush of chaos piercing through the calm, creating a tension that echoes the 'rage vs calm' seed. The arrangement of calm, maze-like blue against the jagged, split-screen red channels a chaotic interior breaking through a tranquil exterior. The composition unfolds tension and release, capturing the essence of the seed's narrative through abstract form.</desc>
