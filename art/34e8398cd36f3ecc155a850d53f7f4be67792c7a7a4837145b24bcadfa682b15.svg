<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Currents</title>
  <desc id="desc">This artwork embodies the emotional tension between softness and severity, represented through an interplay of gentle dots and sharp checker patterns. The palette combines soft powder pink and warm white to invoke a sense of lightness, disrupted by the cold depth of carbon black and sharp crimson. The main contrast occurs diagonally from the corner, showcasing the encroachment of severity into the softness, creating an echo of collision. The broken pixels weave imperfection into this narrative, emphasizing the struggle between the two emotional states.</desc>
