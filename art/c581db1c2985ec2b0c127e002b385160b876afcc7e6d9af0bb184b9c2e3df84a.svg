<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotion</title>
  <desc id="desc">The emotional tone is a juxtaposition of envy and gratitude, represented through the bold contrast between dark and light colors. The central focus is a bright pale blue, symbolizing gratitude, which battles the surrounding deep black representing envy. The soft edges of the colors evoke a sense of rising and falling emotions, while the broken pixel style introduces imperfection, mirroring the complex nature of these feelings. Negative space is used strategically to prevent overwhelming density, creating a quiet backdrop that enhances the central conflict.</desc>
