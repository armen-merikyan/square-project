  <title id="title">Symmetry vs Break</title>
  <desc id="desc">The artwork encapsulates the tension of envy and gratitude, using a palette that blends warm pinks and deep maroon to visualize emotional complexity. The contrasting corners create a visual zigzag that embodies conflict—colors shift from soft gratitude to a harsher, intense red, illustrating the collision between aspiration and resentment. The near-mirrored layout has intentional broken pixels, introducing imperfection and echoing the theme of a disrupted balance. This asymmetry suggests a narrative of lightness vs weight, inviting interpretation of how these emotions coexist yet disrupt each other.</desc>
