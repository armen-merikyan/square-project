<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Spiral</title>
  <desc id="desc">This piece explores the tension between defiance and submission through a contrasting palette and pattern. The warm ivory and soft gold dominate the center, symbolizing defiance with strong, angular shapes, while the deep wine and ash gray encase it at the edges, representing submission with softer, thread-like patterns. The deliberate broken pixels introduce chaos and imperfection, enhancing the sense of conflict. The arrangement of colors creates a visual echo between clustered warmth and quiet edges, mirroring the complexities of the seed's emotional struggle.</desc>
