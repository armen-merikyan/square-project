<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Invisible Threads</title>
  <desc id="desc">This composition embodies the duality of loneliness and connection through contrasting emotions. The top half reflects loneliness with cooler, muted colors (#4A4E69, #9A8C98, #C9ADA7, #F8EDD9) representing isolation and space, while the bottom half uses warmer shades (#FBCBB0, #D5AAE8, #A0C4F0, #F0E6D2) symbolizing connection and warmth. The placement features a burst of color in the center, suggesting an area of connection amidst darkness, while the crosshatched edges introduce tension and disruption, mirroring the push-pull of hidden vs. exposed feelings. The irregularities in a few pixels hint at a broken continuity, aligning with the ancient fire theme of enduring yet flickering existence.</desc>
