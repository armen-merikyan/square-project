<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interplay of Trust and Suspicion</title>
  <desc id="desc">This composition explores the emotional tension between trust and suspicion. The selected palette of warm hues (yellow and orange) juxtaposed with cool tones (deep blue and muted purple) reflects this duality. Trust is represented by a gentle ripple pattern on one side, invoking warmth and stability; while the suspicion side features a disruptive crosshatch, visualizing doubt and fragmentation. The central clash occurs at the vertical split where calm radiant colors meet stark, jagged contrasts. The layout's stacked bands amplify the shift in emotional density across the square, embodying the interplay of safety versus uncertainty. The usage of broken pixels serves as intentional disruptions, echoing the fragility in relationships, enhancing the abstract expression of these opposing emotions.</desc>
