<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This artwork explores the emotional dichotomy of 'longing' and 'resolve' through a palette that balances warm coral and soft amber against the cooler cold slate and blue-black. The collision of the longing pattern (ash_field) contributes muted warmth while the resolve (barcode) provides structure. The layout is a broken frame that subtly reveals negative space, representing emotional gaps. The main contrast occurs at the center, where warm colors clash with cooling tones, evoking a sense of unresolved yearning and strength. The broken pixels introduce deliberate disruptions, emphasizing moments of intimacy and distance, crafting an abstract narrative of tension and transition.</desc>
