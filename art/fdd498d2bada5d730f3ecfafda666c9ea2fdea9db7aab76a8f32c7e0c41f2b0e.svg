<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Echoes</title>
  <desc id="desc">The emotional tone juxtaposes the warmth of love against the coldness of betrayal, creating a tension that permeates the composition. The palette, featuring soft pinks and reds intertwined with deep grays and dark maroon, reflects this duality—warm loving tones colliding with harsher shades, suggesting scars of past betrayals. The main contrast occurs in the gradient from soft colors that flow diagonally, which is disrupted by sharper transitions and some broken pixels, representing the imperfections and betrayals within love. The seed's themes translate into a swirling pattern of warmth and conflict, echoing the struggle between love and betrayal while maintaining an abstract format.</desc>
