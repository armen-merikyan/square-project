<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interference Pulse</title>
  <desc id="desc">This piece embodies the emotional contrast of clarity against chaos, reflecting the struggle between signal and noise. The chosen palette emphasizes tension with deep blacks representing noise, while vibrant greens and electric blues symbolize clear signals. The central pulse of green emerges from the chaos, surrounded by dots of static that interrupt its clarity, creating a visual echo of memory and lingering noise. The layout suggests a broken frame where bursts of color penetrate through, indicating exposure amidst shelter.</desc>
