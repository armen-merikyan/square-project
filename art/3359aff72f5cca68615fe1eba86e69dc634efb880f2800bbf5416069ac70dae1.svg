<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This artwork encapsulates the emotional contrast between safety and exposure through its color dynamics. The color palette combines warm brown and shelter green to evoke a sense of stability and protection, while open blue and cold white represent vulnerability and exposure. The dominant warm tones occupy 65% of the artwork, creating a protective enclosure around a pale center, which draws the eye and represents the raw vulnerability of exposure. The collision of these colors occurs centrally, with soft transitions to create a feeling of both pressure and release, mirroring the conceptual conflict in the seed.</desc>
