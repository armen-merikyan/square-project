<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This square encapsulates the emotional tension between rage and calm. The upper four rows, filled with deep blacks and sharp reds, represent the chaotic, jagged nature of rage suggested by the 'lattice' pattern, invoking a sense of pressure and unrest. In contrast, the lower rows shift towards a serene palette of pale blues and whites, embodying the calming effect of containment as if trying to encapsulate the fury above. The main collision occurs at the central horizontal line, a visual divide embodying the struggle between these emotional states. The edge style emphasizes hard contrasts, enhancing the feeling of friction and displacement between the two moods, while broken pixels disrupt the symmetry, suggesting the complexity of navigating these emotions.</desc>
