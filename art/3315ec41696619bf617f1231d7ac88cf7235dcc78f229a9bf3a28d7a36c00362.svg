<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition embodies the emotional tension between defiance and submission. The palette, inspired by 'rage_calm,' combines the stark contrast of red and black with the soft hues of pale blue and white, creating a backdrop of emotional volatility against a sense of calmness. The central position is marked with an intense black, representing an unmoved center of defiance, while the surrounding colors weave a lattice of submission. The collision occurs primarily in the central four squares where dark and light values intersect, creating a push and pull that defines the core theme of the piece. The mirror-like layout is purposefully disrupted by a few broken pixels to evoke a sense of invasion and imperfection, emphasizing how the center holds against an almost mirrored chaotic environment.</desc>
