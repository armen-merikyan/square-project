<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This piece captures the emotional duality of longing (represented by lighter hues) and resolve (depicted with darker tones). The palette blends soft off-white, faint peach, and dusty grays with compressed reds and dark navy, creating a spectrum of warmth and depth. The left four columns embody longing through broken frames, using a desaturated approach that feels open yet incomplete, while the right columns present resolve as compact, structured thresholds, layering pixels to depict strength within patterns of stability. The main collision occurs centrally, where the softer textures of longing meet the resolute lines of resolve, hinting at an unresolved journey between these emotions.</desc>
