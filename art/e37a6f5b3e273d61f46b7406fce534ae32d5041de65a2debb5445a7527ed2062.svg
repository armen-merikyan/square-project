<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dichotomy of Resolve and Longing</title>
  <desc id="desc">This piece explores the emotional tension between longing and resolve through contrasting sharp and soft elements. The palette of deep navy and dim cyan creates a serene yet urgent atmosphere, while the inclusion of black emphasizes moments of disruption. The left half evokes longing through broken, fragmented patterns, while the right half embodies resolve through more structured, rain-like forms. The main contrast occurs in the center, where the two emotional states collide, suggesting an underlying narrative of repair amidst chaos.</desc>
