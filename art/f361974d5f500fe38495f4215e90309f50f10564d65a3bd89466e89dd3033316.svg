<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">The emotional tone explores the tension between confusion and clarity, using a palette inspired by ancient fire to highlight warmth against darkness. The burnt orange and gold convey a sense of a flickering flame, while dark red and charcoal introduce depth and uncertainty. The layout spreads confusion from the bottom left, creating a diagonal wave of color until it recedes into clarity at the top right, with broken pixels introducing imperfections representing moments of doubt. The thick outline and checker pattern evoke a sense of structured chaos, while the central broken line suggests a fractured journey, reflecting the emotional tumult of clarity breaking through confusion.</desc>
