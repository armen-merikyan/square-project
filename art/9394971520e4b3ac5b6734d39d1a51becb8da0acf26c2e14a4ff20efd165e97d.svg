<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict in Silence</title>
  <desc id="desc">This piece embodies the tension between love and betrayal through a distinct color palette. Warm pinks and reds occupy the top half to represent love, suggesting warmth and connection, while the darker grays and deep maroon in the lower half signify betrayal, emitting a sense of coldness and withdrawal. The transition from soft edges to sharper contrasts signifies the emotional shift from intimacy to sharp pain. The intricate arrangement of colors – intersecting grids for betrayal and fluid patterns for love – illustrates the complex interplay of these emotions, echoing the dualities of the seed text.</desc>
