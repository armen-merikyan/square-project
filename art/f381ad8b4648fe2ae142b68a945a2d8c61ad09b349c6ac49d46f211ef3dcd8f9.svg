<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Halo</title>
  <desc id="desc">This composition captures the duality of vulnerability and strength through contrasting colors and patterns. The darker tones of dead black and static gray serve as a dense base, embodying strength, while the vibrant signal green and electric blue provide moments of exposed light and energy, illustrating vulnerability. The collision of braids and cracks motivates the abstract forms, where the center resonates with solidity and the edges dissolve into quieter tones, creating a visual narrative of protection being gradually eroded. The overall layout, inspired by eroded symmetry, emphasizes this tension of balance where the strong and weak elements coexist.</desc>
