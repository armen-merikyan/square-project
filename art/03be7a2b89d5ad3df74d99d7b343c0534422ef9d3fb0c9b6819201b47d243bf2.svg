<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension's Canvas</title>
  <desc id="desc">This piece explores the duality of love and betrayal through contrasting color and pattern dynamics. The warm pinks invoke a sense of closeness, while the dark maroon represents the heaviness of betrayal. The layout creates a push-pull effect, with soft crosshatch patterns representing intimate ties and sharper, blocky edges symbolizing the jarring nature of betrayal. The interplay of colors and the 'argument_grid' layout allows for a narrative of conflict, echoing the emotional struggle of 'inside_vs_outside'. The sparse arrangement ensures negative space enhances the feeling of an empty room, reflecting loneliness and the stark contrast between the two emotional states.</desc>
