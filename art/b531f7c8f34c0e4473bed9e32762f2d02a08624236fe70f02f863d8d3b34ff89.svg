  <title id="title">Fractured Harmony</title>
  <desc id="desc">This artwork explores the tension between restlessness and peace through an emotional landscape of color. The chosen palette of deep blue, muted purple, yellow, and orange balances warmth and coolness, leading to a clash that suggests both memory and motion. The central area is dense with a maze-like pattern (representing restlessness), while the surrounding lighter colors suggest moments of calm and quiet space. Broken pixels interject throughout, symbolizing the imperfect nature of experience and memory. The layout promotes a narrow path of negative space, creating a visual conflict that highlights the collision of emotions and echoes the themes of the seed.</desc>
