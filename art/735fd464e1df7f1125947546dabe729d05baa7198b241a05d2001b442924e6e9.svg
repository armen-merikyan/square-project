<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">The artwork captures the duality of joy and grief through a contrasting palette. The brighter yellows and oranges represent joy, while deep blues and muted purples echo grief. The left-weighted composition creates tension, where vibrant colors clash against darker tones, symbolizing the pull between happiness and sadness. The crosshatch pattern of joy interplays with the radial structure of grief, creating a chaotic yet rhythmic flow that suggests interaction between contrasting emotions. This arrangement delivers a sense of imbalance, echoing the complexity of love and betrayal, with a noticeable negative space offering breathing room amidst the emotional saturation.</desc>
