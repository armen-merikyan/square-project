<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Containment</title>
  <desc id="desc">This composition captures the emotional dichotomy of 'desire' versus 'restraint.' The palette is centered around warm and saturated hues like hot coral and blood orange, conveying urgency and energy, while cool tones like charcoal and hollow blue provide a counterbalance, representing containment. The primary collision occurs in the center, where warm colors spiral outward, clashing with muted tones, which create a sense of tension and pressure. This arrangement reflects the nuances of emotional conflict—evoking both the pull of desire and the pressure of restraint in an intricate interplay.</desc>
