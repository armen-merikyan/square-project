<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">The artwork embodies the conflict between envy and gratitude, utilizing contrasting palettes of warm yellows and oranges against deep blues and muted purples. The pattern choice reflects the teeth of envy with sharp, jagged placements on one side, while gratitude's frame is represented through softer, more rounded arrangements on the other. The collision between these styles creates an emotional tension at the center, mimicking the ebb and flow of rising hope against the backdrop of fear. Negative space allows for contemplation, suggesting an empty room filled with potential.</desc>
