<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">The artwork translates the emotional duality of 'love' and 'betrayal' through contrasting colors. A palette of warm pinks and reds symbolizes love, while dark maroon and gray encapsulate feelings of betrayal. The diagonal movement from bottom to top suggests emotional ascent and tumult, with sharper edges contrasting against softer hues, creating tension. The arrangement evokes a mirrored layout disrupted by broken pixels, embodying the complexities of relationships—how love can often be marred by distrust, leading to an interplay of warmth and shadow. Multiple colors collide in dissonant ways, highlighting the inner struggle of conflicting feelings.</desc>
