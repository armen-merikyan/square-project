<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Fortitude</title>
  <desc id="desc">The emotional tone in this composition reflects a tension between vulnerability and strength. The selected palette of 'desire_emptiness' presents hot hues like blood orange and coral against grounding shades of charcoal and hollow blue, depicting the clash of warmth and coolness typical of inner struggles. The main collision occurs at the center where a dense checker pattern of vulnerability meets a bold channel of strength, representing the exposure against protection. Broken pixels add a layer of imperfection, suggesting scars of experience, while the negative space provides a moment of quiet reflection. This captures the essence of striving for balance between fragility and resilience.</desc>
