<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weights of Emotion</title>
  <desc id="desc">This composition embodies the tension between relief and dread through a deliberate color separation. The palette, derived from a 'broken memory' theme, utilizes muted sepia and faded blue to reflect the complexity of emotions. The left side is dense with darker tones representing dread, while the right offers lighter colors suggesting relief. This contrast creates a visual echo of emotional conflict, with a subtle 'rain' pattern on the relief side interrupted by 'split screen' motifs of dread, telling a story of struggle amidst calm. Each pixel's placement is intentional, fostering an impression of imperfection that resonates with the seed's themes of broken symmetry and pressure.</desc>
