<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tidal Asymmetry</title>
  <desc id="desc">This piece encapsulates the emotional tension between quietness and pressure. The outer edges use dark navy to create an almost oppressive boundary, suggesting pressure. Within, softer colors like faint peach and off-white emerge, symbolizing quiet space. The arrangement favors pressure on the left, gradually releasing towards the right, embodying shattering against the tide through color shifts. The broken pixels add imperfection, reminiscent of chaotic tides, enhancing the contrast between calm and turbulent emotions.</desc>
