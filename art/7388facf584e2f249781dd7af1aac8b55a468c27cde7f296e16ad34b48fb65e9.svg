  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece represents the emotional tension between vulnerability and strength, with a central quiet space in pale colors suggesting exposure, contrasting with warm, rich hues of burnt orange and dark red. The grid pattern on one diagonal represents vulnerability, while the ring pattern illustrates strength on the opposite. The main collision occurs at the center, where thin and heavy elements intersect, symbolizing the struggle between openness and protection. Broken pixels interrupt flow, enhancing the theme of imperfection in safety and exposure.</desc>
