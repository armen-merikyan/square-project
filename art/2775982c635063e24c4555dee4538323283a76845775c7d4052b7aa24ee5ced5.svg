<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Tension</title>
  <desc id="desc">The emotional tone evokes a battle between defiance and submission, illustrated through angular 'crosshatch' patterns colliding with structured 'stacked' blocks. The 'clarity_confusion' palette was chosen to portray a contrast between the lightness of 'clean_white' and 'ice_blue' against the depth of 'ink_black' and 'violet_gray.' The bright 'warning_orange' injects pulse and vibrancy, suggesting tension and resistance. The center acts as the locus of collision with an uneven border, signifying chaos pressing against a quiet boundary—a threshold between these two emotional states.</desc>
