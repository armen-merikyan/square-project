<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This artwork captures the emotional interplay between envy and gratitude through contrasting colors and placement. The soft pinks symbolize gratitude, emerging from the corners, while the darker maroons reflect envy, clustering towards the center. The palette creates tension and balance, exemplifying the push and pull between these emotions. The jagged edges introduce imperfection, allowing for a bleed that represents noise and disruption in what could be a serene space. The overall composition oscillates with a rhythm that evokes the complexity of both feelings.</desc>
