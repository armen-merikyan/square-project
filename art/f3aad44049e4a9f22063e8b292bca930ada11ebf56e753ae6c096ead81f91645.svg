<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone highlights a tension between yearning and confinement. The palette consists of warm colors representing desire (hot coral, blood orange) clashing with cooler tones symbolizing emptiness (charcoal, hollow blue). The layout features an off-center accumulation of saturated colors juxtaposed with expansive negative space, creating a sense of imbalance. The use of the ring pattern for desire and echo for emptiness synthesizes the emotional pull towards the edges, establishing a central collision point that embodies both hunger and restraint.</desc>
