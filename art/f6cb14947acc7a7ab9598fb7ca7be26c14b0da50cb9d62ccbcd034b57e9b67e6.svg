<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This piece explores the tension between restlessness and peace through contrasting patterns. The palette features deep blacks and dark violets to represent the weight of unrest, while soft gold and pale green introduce a hint of hope and tranquility. The collision of stripes and halo shapes signifies the struggle between conflicting emotions, creating a dynamic flow from dense clusters towards lighter spaces. The layout, akin to a spiral, amplifies movement while leaving intentional gaps that evoke a sense of quiet amidst chaos.</desc>
