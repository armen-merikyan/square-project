<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This piece expresses the tension between trust and suspicion through contrasting color schemes and patterns. The left half, representing trust, utilizes warmer hues like 'new_leaf' and 'pale_yellow' arranged in a soft noise pattern that evokes stability and comfort. The right half embodies suspicion, using darker tones such as 'mourning_black' and 'deep_blue', organized in a lattice pattern that creates a sense of fragmentation and unease. The juxtaposition of the soft glow against hard shadows creates a dynamic collision at the vertical split—symbolizing the complexities of human emotions. The overall composition acknowledges resilience and fragility, with intentional disruptions (broken pixels) enhancing the narrative of imperfection in the pursuit of order amidst chaos.</desc>
