<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Synthesis</title>
  <desc id="desc">This composition captures the emotional tension between exposure and shelter through a balanced interplay of colors. The palette, consisting of lime, electric blue, black, and magenta, emphasizes stark contrasts reminiscent of vulnerability and strength. The central area radiates a pale hue (lime), suggesting exposure, while the surrounding edges are cloaked in darker tones (black and magenta) that provide a sense of protection. The collision of dense black and magenta against the lighter core creates an ongoing tension that reflects life's duality, which the seed text encapsulates. Broken pixels scattered throughout evoke the imperfect nature of experiences, enhancing the theme of connection and alienation.</desc>
