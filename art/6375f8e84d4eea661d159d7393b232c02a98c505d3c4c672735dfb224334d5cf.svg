<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Echoes</title>
  <desc id="desc">This artwork embodies the tension between joy and grief through contrasting colors and patterns. The left half, representing joy, features bright yellows and oranges in a crack pattern that evokes energy and expansion. In contrast, the right half captures grief with deep blues and muted purples arranged in dots, suggesting fragmentation and weight. The symmetry vs break motif is illustrated with a ripple effect, using soft edges to create a gentle transition between the two halves, while intentionally leaving areas of negative space to enhance the emotional depth. The intersections of color create moments of collision that echo the complex relationship of these emotions.</desc>
