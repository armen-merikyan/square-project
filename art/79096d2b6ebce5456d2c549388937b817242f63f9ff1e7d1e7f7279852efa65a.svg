<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">The emotional tone oscillates between awe and terror, symbolizing the stark contrast of stability and chaos. The palette of warm and cool colors (yellows, oranges, deep blues, muted purples) embodies the conflicting feelings, where the 'awe' is represented by a checker pattern on one side and the 'terror' emerges from a more fractured, spark-like arrangement. The contrast peaks in the center, splitting clean order from disarray, leaving spaces to suggest unresolved tension and memory's fractured nature.</desc>
