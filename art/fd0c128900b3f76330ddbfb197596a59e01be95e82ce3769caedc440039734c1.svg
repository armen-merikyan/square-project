<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This artwork embodies the emotional duality of fear and hope through its contrasting color palette and layout. The use of black and dark violet dominates to evoke a haunting sense of fear in the corners, while soft gold and pale green introduce warmth and light, symbolizing hope from within. The arrangement displays a mirrored layout but with intentional disruptions to convey the jagged, inconsistent nature of feeling. The overlapping patterns—the sharp edges of fear contrasted by the gentle, dot-like forms of hope—create a visual tension that reflects inner conflict, while broken pixels add layers of imperfection, enhancing the depth of the emotional narrative.</desc>
