  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone reflects the tension between fleeting brightness and settling ash, captured through the contrasting palette of vibrant greens and browns against muted whites and blues. The top half of the composition signifies 'spark' with brighter accents and lively patterns, while the bottom half embodies 'ash' with softer, blended hues. The collision of these emotions occurs along a central horizontal division, allowing the patterns of rain and targets to interact dynamically. This creates visual tension and suggests the duality of resilience and fragility, echoing the themes of restraint and hunger through structured chaos and introspective calm.</desc>
