<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Contrast</title>
  <desc id="desc">This composition captures the tension between softness and severity through a blend of soft pastel tones and stark darks. The warm whites and powder pinks represent an inviting softness, while the carbon black and steel gray inject a sense of severity and weight. The arrangement features a diagonal separation, with severe colors on one side and soft tones on the other, creating a pulse of emotional tension. Broken pixels disrupt the flow, representing the imperfections inherent in navigating guilt and forgiveness, while the echoing patterns of light versus dark lend a rhythmic quality, suggesting an ongoing dialogue between contrasting emotions.</desc>
