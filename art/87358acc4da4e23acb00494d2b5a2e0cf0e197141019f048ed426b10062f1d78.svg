  <title id="title">Chaos and Order</title>
  <desc id="desc">This artwork conveys emotional tension between control and panic, with the colors representing warmth and coolness in a dialogue. Dark maroon and red represent emotional intensity, striking against softer greys and pinks that embody a sense of calm. The contrast is emphasized at the edges where the dense color fields collide with lighter sections, representing a struggle between tight control and overwhelming chaos. The arrangement of solid rows pushes inward towards the center seed, encouraging an inward tension that feels both threatening and unifying.</desc>
