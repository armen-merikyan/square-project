<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Resolve</title>
  <desc id="desc">This composition captures the tension between longing and resolve through a stark palette of cosmic indigo and deep teal, symbolizing the emotional depth in contrast with void black. The upper half represents longing with a stepwell pattern, creating a sense of descent and echoing emptiness, while the bottom conveys resolve using dot patterns, showcasing compressed strength. The collision occurs centrally, where thin broken lines interrupt the structured dots, representing the existential struggle between fragility and strength, alluding to the brokenness denoted by the seed. The negative spaces are intentionally left to offer breathing room, reflecting serenity amidst urgency.</desc>
