<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmony of Doubt</title>
  <desc id="desc">The emotional tone reflects the tension between trust and suspicion, balancing lighter hues that convey warmth with darker shades that evoke feelings of doubt. The chosen palette combines clean whites and soft blues to represent trust and clarity, while deep blacks and violet grays introduce elements of suspicion and obscurity. The main contrast occurs along the diagonal spanning from the top-left to bottom-right, where rippled patterns of suspicion collide with scar-like imprints of trust. This interplay crafts a narrative of resilience interlaced with fragility, capturing the conflicted essence of the seed through abstract color placement.</desc>
