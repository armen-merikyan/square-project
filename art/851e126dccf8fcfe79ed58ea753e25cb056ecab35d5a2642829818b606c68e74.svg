  <title id="title">Exposure vs. Shelter</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of vulnerability and protection through color and pattern. The palette, featuring soft greens and warm browns, represents shelter and safety, while cold whites and open blues signify exposure. The left half employs a stacked pattern to convey stability, contrasting with the patchwork on the right, which creates a sense of chaotic vulnerability. The collision occurs centrally with a gentle gradient shift, suggesting a delicate balance between pressure and release, wrapped in an 8x8 structure but leaving intentional negative spaces to reflect restraint.</desc>
