  <title id="title">Tension in Motion</title>
  <desc id="desc">This composition captures the emotional tension between rage and calm through a disruptive interplay of colors. The palette features deep blacks and vivid reds representing rage, contrasted with soft pale blues and whites for calm. The central collision occurs at the diagonal axis, where the jagged, warm colors intrude into the cooler space, evoking a sense of chaos against tranquility. The patterns embody flame and grid forms, representing both the heat of anger and the structure of calm, creating visual echoes of conflict and resolution across the square.</desc>
