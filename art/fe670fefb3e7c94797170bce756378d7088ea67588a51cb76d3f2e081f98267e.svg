<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Hearts</title>
  <desc id="desc">This artwork captures the emotional tension between love and betrayal through a careful balance of warm and cool colors. The palette of soft pinks and deep reds symbolizes love, while the dark grays represent betrayal. The outer rows are deliberately more chaotic, invoking a sense of noise and disruption, while the inner 4x4 grid invokes order and calm. The collision of the warm central square against the dark, irregular edges suggests the conflict in relationships, where love is often surrounded by elements of doubt and pain. Broken pixels are intentionally scattered to represent imperfection and fragility.</desc>
