<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow and Containment</title>
  <desc id="desc">This artwork explores the emotional tension between rage and calm through a deliberate clash of colors and their arrangement. The color palette combines intense reds representing rage with soft blues symbolizing calm. The main collision occurs in the upper-left corner, where the vibrant reds and blacks push outward, while tranquil hues of pale blue and white attempt to create a stable base along the edges. This complex interaction between contrasting colors emphasizes the chaotic energy of broken patterns against a backdrop of soft horizontal calm. The broken pixels scattered throughout symbolize the battle between containment and overflow, disrupting symmetrical balance.</desc>
