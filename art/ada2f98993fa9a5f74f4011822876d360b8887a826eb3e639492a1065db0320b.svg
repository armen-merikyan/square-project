<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Motion</title>
  <desc id="desc">This composition explores the tension between restlessness (represented by sharp contrasts) and peace (symbolized by softer hues). The chosen palette—a blend of deep blue, mourning black, pale yellow, new leaf, and stone—reflects a duality: the dark depths of unrest intersecting with soothing elements of calm. The primary contrast lies centrally with the collision of sharp, shattering patterns and smooth, thread-like textures, leading the eye across the canvas and embodying a sense of movement and fragmentation. The added broken pixels symbolize interruptions, amplifying the feeling of a ‘pulse’ amidst static noise, capturing the essence of both memory and motion in abstract form.</desc>
