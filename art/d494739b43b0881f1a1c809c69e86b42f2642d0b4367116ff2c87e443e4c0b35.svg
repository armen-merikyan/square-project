<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Existence</title>
  <desc id="desc">The emotional tone captures the delicate balance between vulnerability and strength, reflected through contrasting colors. The palette blends warm browns and greens for stability with cooler whites and blues to signify exposure and fragility. The arrangement creates a central collision of deep hues against softer, lighter colors, embodying the idea of a protected center facing pressure from the edges. The two pulses of color symbolize the push and pull of conflicting emotions, interspersed with intentional breaks representing disruptions in the pattern, illustrating the complexities of desire and fear.</desc>
