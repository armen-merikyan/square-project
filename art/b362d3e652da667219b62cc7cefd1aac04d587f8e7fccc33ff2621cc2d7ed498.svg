<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges: A Tension of Emotion</title>
  <desc id="desc">The emotional tone reflects a dynamic interplay of softness and severity. The chosen palette, featuring powder pink for softness and carbon black for severity, creates a poignant contrast. The left side, embodying softness, employs gentle noise patterns, while the right side displays a more defined, ring-like severity. The collision occurs predominantly in the center, where the softer elements bleed into the sharper edges, emblematic of guilt forgiving itself against a backdrop of firm boundaries. The structure hints at openness, yet the dominant dark hues weigh down the experience, embodying tension—a push and pull of emotions.</desc>
