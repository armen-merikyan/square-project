<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">The emotional tone oscillates between the sharp pang of envy and the soft warmth of gratitude, creating a dynamic interplay across the pixel canvas. The chosen palette of deep reds, muted grays, and delicate pinks reflects this duality; the reds evoke intensity and urgency, while the grays ground the piece in a sense of somber reflection. The layout divides the canvas vertically, with the left side expressing envy via broken dots, reflecting chaos, while the structured grid of gratitude on the right symbolizes stability and hope. The accidental imperfection of broken pixels enhances the emotional tension, mimicking the disturbances found in both sentiments. The contrast of soft edges against harsher tones creates an ebb and flow, suggesting a coexistence of feelings rather than a resolution.</desc>
