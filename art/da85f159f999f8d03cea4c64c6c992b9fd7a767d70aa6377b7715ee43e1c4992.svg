<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">The composition explores the emotional tension between quietude and pressure. The palette includes off-white and faint peach to represent quietude, contrasting with compressed red and dark navy that evoke weight and density. The main collision occurs at the center, where sharp, dark colors collide with softer, lighter colors, illustrating a tense crossing. The chosen patterns of pressure (dense bands) and quiet (maze-like spaces) create a dynamic flow that encapsulates the abstract qualities of the seed.</desc>
