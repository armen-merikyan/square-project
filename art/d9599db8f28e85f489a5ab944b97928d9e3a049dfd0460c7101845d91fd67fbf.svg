<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Boundaries</title>
  <desc id="desc">The emotional tone reflects the tension between rigid control and gentle surrender. The palette, consisting of soft pinks and deep charcoals contrasted with vibrant coral, suggests an emotional spectrum, where the coral represents intensity and desire, while the softer colors signify vulnerability. The main collision occurs at the center, where dense layers of color spill from controlled edges, embodying the fight between containing forces and the desire to overflow. This seed translated into a spiraling motion that forms a sense of inevitable change, as colors disrupt and that speak to life’s chaotic interactions.</desc>
