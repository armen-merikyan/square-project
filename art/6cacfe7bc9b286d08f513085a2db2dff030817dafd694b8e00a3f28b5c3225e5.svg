<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This artwork reflects the emotional contrast between envy and gratitude through soft curves colliding with sharp edges, symbolizing the noise of internal conflict. The chosen palette of deep blue and muted purple suggests depth and complexity, while the warm tones of yellow and orange represent fleeting joy. The pattern sees warm colors rising against cooler shades, reinforcing the idea of rising vs. falling, and creating a visual dialogue of tension released into space. Collisions happen at the center, where the warmth meets the coolness, evoking a sense of unresolved feeling balanced against negative space.</desc>
