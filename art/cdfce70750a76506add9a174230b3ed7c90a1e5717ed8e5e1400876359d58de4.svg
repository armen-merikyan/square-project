<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Shelter</title>
  <desc id="desc">This piece contrasts vulnerability and strength through a split horizontal layout. The top half uses lighter colors representing openness and fragility, while the bottom half employs darker, denser colors symbolizing stability and rootedness. Black and electric blue create tension at the center, while the interruption of bright magenta marks the collision of feelings. The arrangement reflects the emotional dynamics of exposure against containment, embodying the complexities articulated by the seed.</desc>
