<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This artwork encapsulates the emotional tension between tenderness and rage. The palette consists of saturated reds symbolizing rage and cooler tones of pale blue and black representing tenderness. The primary collision occurs in the center, where reds sharply contrast against the muted blue, suggesting a battle between emotions. The arrangement uses a broken frame pattern for tenderness that interrupts the stair-like pattern of rage, creating a visual tension. The layout leaves negative space to represent the quietness that exists alongside turmoil, illustrating an inner world that struggles between the emotional extremes of tenderness and rage.</desc>
