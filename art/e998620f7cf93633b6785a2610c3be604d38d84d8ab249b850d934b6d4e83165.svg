<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork captures the emotional tension between defiance and submission through vivid contrasting colors and patterns. The selected palette of 'hot coral', 'blood orange', 'dust pink', 'charcoal', and 'hollow blue' creates a warm yet somber ambiance, signifying the struggle between these opposing forces. The checker pattern represents defiance, taking space aggressively in the center, while the stripes symbolize submission, receding towards the edges. The main collision occurs at the center, where bright colors meet subdued tones, suggesting a battle for control and presence within the spatial confines of the piece. The quiet channel of negative space at the sides accentuates the density of the central patterns, embodying the conflict described in the seed.</desc>
