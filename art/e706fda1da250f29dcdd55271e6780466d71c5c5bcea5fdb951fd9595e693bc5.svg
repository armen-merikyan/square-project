<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Threads</title>
  <desc id="desc">The emotional tone of this artwork reflects a dynamic interplay between longing and resolve, expressed through the palette of warm and cool tones. The colors, such as hot coral and dust pink, embody warmth and an essence of desire, while charcoal and hollow blue introduce feelings of coolness and distance. This creates a saturated vs muted contrast, particularly at the central collision where patchwork patterns of resolve emerge amid the more fluid thread patterns of longing. The placement of colors suggests a center of gravity where one might feel both the pressure of compression and an urge to reach out, embodying the themes of connection and disruption. The broken pixels intentionally introduce scars, echoing the feelings of damage and repair throughout the piece. The quiet spaces around the patterns maintain an air of calm, balancing the emotional intensity with moments of serenity against urgency.</desc>
