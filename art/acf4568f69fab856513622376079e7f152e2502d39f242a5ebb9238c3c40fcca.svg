<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Boundless Tension</title>
  <desc id="desc">The emotional tone reflects a tension between desire and restraint, embodied in the contrast of saturated warm colors against muted cooler tones. The red and orange accents represent desire, breaking through the lattice of muted cream and gray that embodies containment. The layout, divided diagonally, establishes a visual argument where desire bursts towards the center, disturbed by the cool edge of restraint. Broken pixels introduce intentional disruption, enhancing the feeling of tension. This arrangement conveys an unresolved push-pull dynamic, evoking the complexities of love and betrayal.</desc>
