<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This piece captures the emotional dichotomy between love and betrayal through contrasting color fields and patterns. The warm colors (pink and red) suggest love while the darker tones (grays and dark maroon) evoke feelings of betrayal. Central collision occurs where soft pinks crash against the sharpness of dark maroon, representing broken trust within a once harmonious space. The layout embraces a corner invasion, allowing warmth to erupt outward while giving room for the darker tones to creep in through asymmetrical placements, invoking a tense narrative of conflict and resolution.</desc>
