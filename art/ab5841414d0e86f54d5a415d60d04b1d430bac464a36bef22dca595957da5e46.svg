<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Contrasts</title>
  <desc id="desc">This piece captures the duality of joy and grief, using a palette of bright yellows and muted blues. The bright colors represent joy, creating dynamic dots that pulse through the composition, while the darker tones reflect grief through a fragmented checker pattern, creating a visual tension. The layout descends like tears, embodying the emotion of loss while the bright sections symbolize moments of joy trying to break through. The edges are slightly broken, reinforcing the imperfect nature of emotions and offering a textured sense of disturbance amidst order.</desc>
