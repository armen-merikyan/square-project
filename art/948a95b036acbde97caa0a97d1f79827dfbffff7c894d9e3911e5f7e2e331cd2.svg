<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">The emotional tone contrasts restlessness and peace, captured through the use of a rich palette. The color choices emphasize this tension, with deep olive and honey gold representing restlessness, while cream functions as a quiet field of peace. The main collision occurs diagonally through the center, where warmer colors interrupt the cooler tones, creating tension. The patterns of 'ladder' (for restlessness) and 'ring' (for peace) collide, while intentional broken pixels create visual disruption, enhancing the sense of memory vs motion.</desc>
