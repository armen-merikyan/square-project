  <title id="title">Fractured Harmony</title>
  <desc id="desc">This artwork captures the emotional tension between love and betrayal through contrasting color pairs—soft pinks representing love against deeper, sharper maroons conveying betrayal. The layout rises from the bottom to the top, suggesting a trajectory of hope intertwined with uncertainty. The broken pixels enhance the feeling of imperfection, adding depth and visual 'noise' that reflects the internal conflict of the emotional theme. The composition has a balance between serene and abrasive qualities, where soft edges clash with sharper, darker tones, symbolizing the friction between the two emotions.</desc>
