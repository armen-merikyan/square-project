<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Static Pulse</title>
  <desc id="desc">The emotional tone captures a struggle between clarity and distortion, represented by the conflict of deep navy and black against bursts of dim cyan and white. The palette was chosen to evoke feelings of isolation (navy) contrasted with moments of clarity (white). The primary collision occurs at the center, symbolizing the impactful presence of the signal striving to remain coherent amidst chaotic noise. This seed inspired a fractured pattern where clean lines meet jagged interruptions, creating a visual metaphor for communication and memory.</desc>
