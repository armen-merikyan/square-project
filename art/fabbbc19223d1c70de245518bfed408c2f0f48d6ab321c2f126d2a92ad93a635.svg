<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition captures the emotional tension between fiery sparks and cool ash. The palette of burnt orange, dark red, charcoal, and gold reflects a balance between warmth and restraint, addressing themes of resilience and fragility. The layout is a rising signal, conveying hope as warmer colors ascend through cooler tones, with broken pixels creating intentional disruptions throughout the piece. This portrayal reflects the struggle between ignition and quiet decay, suggesting a narrative of memory and erasure. The collision is strongest at the center, where warmth interrupts the surrounding coolness, emphasizing the contrasting elements.</desc>
