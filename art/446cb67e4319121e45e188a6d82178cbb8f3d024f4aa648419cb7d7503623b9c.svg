<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Signals</title>
  <desc id="desc">This piece delves into the emotional tension between vulnerability and strength. The core of the artwork features a soft amber center, symbolizing vulnerability, contrasted by the colder, darker blues and blacks surrounding it, representing strength. The palette incorporates warm coral as a subtle accent, introducing a sense of connection amidst the chaos. The collision occurs towards the central area where the colors shatter between each other, mirroring the fragility of exposure in the face of hard edges. Through the use of broken pixels, the piece maintains a sense of imperfection that enhances its emotional depth, producing a narrative of quiet yet intense struggle.</desc>
