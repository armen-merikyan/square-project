<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This composition embodies the emotional dichotomy of safety versus exposure through the strategic use of color and layout. The palette intertwines soft greens with muted browns and pale tones to convey both protection and vulnerability. The main collision occurs at the center, where warm browns and pale skin crisscross to symbolize the tension of exposure wedged within the calming embrace of shelter. The barcode pattern on one side and the ripple on the other reflect the conflict between pressure and release while maintaining a channel of negative space that traverses vertically, allowing for visual breathing room amid the dense color narrative.</desc>
