<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone captures the duality of vulnerability and strength, represented through the interplay of soft colors and stark contrasts. A pale aqua serves as the soft center, surrounded by a misty gray that encapsulates vulnerability, while heavier shadows of alarm red and ink blue provide strength. The layout's pressure corner emphasizes a dense accumulation of color that disrupts the flow, leading to an observable clash at the top right corner. This arrangement creates a narrative of exposure met with the desire for shelter, embodying the tension between openness and protection. The broken pixels add intentional imperfections, mirroring life's fractures in the quest for safety.</desc>
