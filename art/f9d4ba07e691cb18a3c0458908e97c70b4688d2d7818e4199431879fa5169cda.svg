<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order Meets Chaos</title>
  <desc id="desc">The emotional tone captures a tension between control and surrender, represented visually through opposing patterns. The palette comprises deep blue for depth and contemplation, mourning black for weight and restraint, new leaf for the hint of fresh beginnings, pale yellow for fragile hopes, and stone for stability. The main collision occurs at the center, where the scar pattern of control meets the veil of surrender. This reflects the duality of feelings present in the seed: a struggle between maintaining control and the inevitable yielding to chaos.</desc>
