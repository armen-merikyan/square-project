  <title id="title">Fractured Embrace</title>
  <desc id="desc">The emotional tone explores the tension between love and betrayal, using a palette of soft pinks and deep maroons to represent warmth contrasted with the harshness of betrayal. The layout mimics falling pixels, evoking tears or ash—reflecting emotional descent. The collision occurs diagonally, where vibrant red bursts against a muted gray, symbolizing a heart fractured by contrasting feelings. The broken edges create an imperfection that speaks to the complexity of these emotions, while negative space enhances the sense of isolation amidst density.</desc>
