<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory in Motion</title>
  <desc id="desc">The emotional tone reflects a struggle between control and surrender. The selected palette of moss green and bone white symbolizes the rigidity of control, contrasted by the warmth of rust and the soft gray representing surrender. The center features a dense assembly of color, representing pressure and overflow, while the edges release into quieter tones, suggesting yielding. The collision of structured ladder patterns and scattered barcodes visually narrates the tension and release, embodying the seed's theme of overlap and contradiction.</desc>
