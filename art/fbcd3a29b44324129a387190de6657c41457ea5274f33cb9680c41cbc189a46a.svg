<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This composition embodies the contrast between pressure and quietness expressed through a dense cluster of colors on one edge and a lighter palette that spreads outward, representing a gradual release. The muted palette of off-white and dust gray contrasts sharply with the compressed red and dark navy, establishing a dialogue between intense compression and soft isolation. The seed's duality is reflected in the stepwell and barcode patterns, which intersect and interrupt each other, creating tension in the otherwise harmonious layout.</desc>
