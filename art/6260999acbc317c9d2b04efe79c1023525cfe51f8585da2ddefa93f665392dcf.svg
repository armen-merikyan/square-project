<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Collision of Emotion</title>
  <desc id="desc">This artwork embodies the conflict of tenderness against rage, with dominant black evoking the weight of anger contrasted by the soft pale blue that represents tenderness. The layout features a diagonal split where the intense dark mass overtakes one corner while lighter hues reside in the opposite, creating tension. The palette mixes saturated reds and blacks with muted blues and whites, signifying opposing emotions and giving a sense of depth and complexity. The 'fault' shape seed manifests as broken pixels piercing through the softer colors, representing emotional ruptures and chaotic intersections, ensuring a rich narrative without visual symbols.</desc>
