  <title id="title">Pulse of Resistance</title>
  <desc id="desc">This artwork reflects the emotional tension between defiance and submission, engaging with the ideas of pressure and release. The palette features deep blacks contrasted with vibrant electric blues and magentas, illustrating the fight against suppression (defiance) while integrating softer tones alluding to submission. The color arrangement exhibits a pulsing center surrounded by chaotic yet structured edges, suggesting a collision between bold action and quiet acceptance. The intentional placement of broken pixels represents scars and disruptions in the flow, introducing imperfection that enhances the overall tension and complexity of the piece.</desc>
