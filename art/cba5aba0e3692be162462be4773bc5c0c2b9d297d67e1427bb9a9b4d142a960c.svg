<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork encapsulates the emotional turmoil of rage battling with the tranquility of calm. The palette juxtaposes deep blacks, which symbolize the intensity of rage, against soft pale blues that invoke calmness. The outer black border functions as a pressure border, embodying explosive rage that threatens to overflow. In contrast, the inner 4x4 grid is filled with organized pale blue ripples that represent calmness attempting to create containment. The main collision occurs in the center with a surge of brighter reds, dominating the piece (65%), symbolizing the chaotic confrontation. The interspersed broken pixels introduce intentional disruptions, suggesting scars from the tumultuous emotional dance between these two states, maintaining the overall abstract essence without literal imagery.</desc>
