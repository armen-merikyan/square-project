<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Contrast</title>
  <desc id="desc">This piece embodies the tension between relief and dread through a stark palette of black, red, pale blue, and white. The dark colors foster a sense of heavy pressure, while the pale colors introduce a contrasting lightness that feels fragile against the weight. The collision of dense black sections with scattered accents of pale blue and red creates an echoing effect, evoking the struggle of balance and symmetry versus disruption. The asymmetry established through the placement of colors evokes an unsettling rhythm, embodying both the fear of bleakness and a glimmer of hope or relief. It reflects the emotional push-pull inherent in the seed's themes of crack and weight.</desc>
