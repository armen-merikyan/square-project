  <title id="title">Overflow &amp; Containment</title>
  <desc id="desc">This artwork embodies the tug-of-war between restlessness and peace. The outer boundary features deep and muted colors that suggest a calm containment, while the central 4x4 area uses brighter colors to evoke an unsettled dynamic. The palette of mourning black, deep blue, new leaf, pale yellow, and stone bridges the gap between sadness and renewal, contrasting dark and light effectively. The main collision occurs in the center, where the vibrant new leaf green pushes against a background of stone grey, illustrating a struggle for fulfillment and peace amidst chaos.</desc>
