<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This artwork captures the emotional tension between desire and emptiness. The chosen palette of hot coral, blood orange, and dust pink represents the intense pull of desire, contrasted by the hollow blue and charcoal representing the emptiness. The collision occurs at the center where the warm saturated colors sharply interact with the cooler, muted tones, creating an area of visual tension that embodies 'hunger vs. restraint'. The layout of the piece is intentionally divided to reflect the struggle between overflowing desire and the containment of emptiness, allowing for a narrative of dynamic conflict and resolution through color placement.</desc>
