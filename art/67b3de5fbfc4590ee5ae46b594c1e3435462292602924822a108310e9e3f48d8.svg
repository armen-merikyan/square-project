<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Tension</title>
  <desc id="desc">The emotional tone explores the dichotomy of control and surrender. The palette features 'softness_severity' colors—powder pink and warm white convey warmth and gentleness, while carbon black and sharp crimson introduce stark contrasts that embody pressure and intensity. The major collision occurs diagonally from the center, where an overflowing grid meets controlled negative space. Broken pixels disrupt patterns subtly, suggesting imperfections in both control and surrender, resonating with the movement from structure to release.</desc>
