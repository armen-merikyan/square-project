<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">This artwork embodies the emotional tension between restlessness and peace through contrasting color placements. The palette, derived from 'awe_terror', combines deep, rich colors like cosmic indigo and void black with hints of cold gold and star white to create a sense of both chaos and calm. The main collision occurs diagonally, channeling energy across the canvas with clusters of sharp, vibrant hues colliding against softer fields, symbolizing the interplay between memory (peace) and motion (restlessness). Broken pixels introduce intentional disruptions echoing the theme of interference while maintaining negative space to provide an overall balance and readability. This piece captures the essence of an unsettling yet meditative moment.</desc>
