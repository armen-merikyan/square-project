<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Lattice</title>
  <desc id="desc">The emotional tone reflects the push and pull between desire and restraint, depicted through a contrast of saturated fiery colors against muted, cool tones. The palette features hot coral and blood orange to signify desire, while charcoal and hollow blue embody the feeling of restraint. Color placement creates a zigzag flow, with bright clusters punctuating the otherwise contained composition. The main collision occurs diagonally, where the saturated patchwork bursts through the restrained pulse marks, symbolizing the struggle between these conflicting emotions. The broken pixels add dynamic tension, portraying imperfections in an idealized emotional experience, compounding the overall abstraction of the piece.</desc>
