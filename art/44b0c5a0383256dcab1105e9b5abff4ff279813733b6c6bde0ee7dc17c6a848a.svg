<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Across the Threshold</title>
  <desc id="desc">This piece explores the emotional conflict between defiance and submission, embodied in the dynamic interplay of warm and cool colors. The palette, drawn from 'joy_grief', combines muted purples and deep blues as a quiet core, radiating outward to vibrant yellows and oranges for defiance. The uneven border captures the chaos of edges, while the center maintains a sense of order. The collision occurs prominently at the center, where bold radial patterns of defiance disrupt the surrounding threads of submission, suggesting emotional tension and unresolved struggles, while providing enough negative space to breathe.</desc>
