  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This piece captures the emotional tension between safety and exposure, presenting a gentle contrast where the outer dark colors represent a protective border, while lighter hues in the center express vulnerability. The color palette incorporates warm browns and soft greens for comfort, with pale skin tones and cold white suggesting fragility and openness. The collision occurs between the soft core and the heavier outer frame, drawing the eye inward in an inward spiral, reinforcing the themes of pressure and release.</desc>
