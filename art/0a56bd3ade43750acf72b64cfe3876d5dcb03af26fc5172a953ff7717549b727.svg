<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition captures the emotional tension between defiance and submission. The palette of bright yellows and oranges against deep blues and muted purples creates a striking contrast that embodies the struggle between clarity and obscurity. Defiance manifests in sharp, jagged patterns (bright colors) clashing with soft, patchwork backgrounds (muted colors). The central region is dominated by a chaotic collision of colors, while the edges offer a quieter, more subdued contrast, echoing themes of invasion and density. The broken pixels symbolize disruptions amidst the tension, further enhancing the narrative of conflict and resolution.</desc>
