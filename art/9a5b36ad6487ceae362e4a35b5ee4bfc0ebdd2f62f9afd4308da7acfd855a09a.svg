  <title id="title">Rise vs Fall</title>
  <desc id="desc">This artwork captures the duality of joy and grief, manifesting their emotional weight through the chosen palette. The bright tones of yellow and orange symbolize joy's expansion, contrasted against the deep blues and muted purples that evoke the heaviness of grief. The left-weighted design and diagonal rise convey a tension between upward movement and descent, illustrating a struggle between hope and despair. Imperfections are integrated to reflect the reality of these emotional experiences, while the negative space emphasizes quiet moments amidst chaos.</desc>
