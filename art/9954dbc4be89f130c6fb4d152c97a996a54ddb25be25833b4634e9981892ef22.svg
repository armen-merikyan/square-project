<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Pulses</title>
  <desc id="desc">This piece explores the tension between safety and exposure with an emphasis on contrasting softness and severity. The chosen palette integrates 'shelter_green' and 'warm_brown' for warmth and protection, coupled with 'cold_white' and 'open_blue' to represent vulnerability and exposure. The interplay of tide (for exposure) and static (for safety) creates an emotional echo across the canvas, with a strong emphasis on negative space to invite contemplation. The main collision occurs in the center, where dark and light colors meet, embodying the struggle between enclosure and openness. The result is an abstract representation of emotional complexity as reflected in color and arrangement.</desc>
