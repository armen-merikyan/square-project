<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone reflects a deep tension between desire and restraint, captured through a palette that juxtaposes rich, saturated colors with muted hues to symbolize the pull of yearning against the confines of self-control. The contrast emerges from a warm, fiery center that is visually interrupted by cooler, darker boundaries. The color placement creates spirals of pressure that cascade down, echoing the imagery of falling pixels, with clustered spots of deep interplay among red oxide and blackened plum against muted cream and iron gray, maintaining a sense of negative space to emphasize longing. The broken pixels introduce imperfection, reinforcing the struggle between wanting and restriction.</desc>
