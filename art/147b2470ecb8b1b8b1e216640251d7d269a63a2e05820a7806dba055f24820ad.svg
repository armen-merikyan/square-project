  <title id="title">Tension of Pulses</title>
  <desc id="desc">This artwork represents the emotional contrast between relief and dread through the juxtaposition of colors and patterns. The chosen palette of pale mint and faded gold symbolizes bright relief, while storm gray and near black convey a sense of impending dread. The layout reflects two pulsing centers creating a dynamic tension against negative space. The main collision occurs at the center, where light and dark colors interact, creating an echo of conflict. Broken pixels disrupt uniformity, reinforcing the feeling of tension and imperfection.</desc>
