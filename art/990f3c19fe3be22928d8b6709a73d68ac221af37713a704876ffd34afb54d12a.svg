<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">The emotional tone encapsulates the tension between desire and restraint, with saturated colors spilling versus muted tones attempting containment. The palette blends hot coral and blood orange with grounded charcoal and hollow blue, emphasizing the collision of warmth against cool restraint. The main contrast occurs in the top left, where vivid colors disrupt the otherwise calm order, resembling an overflow from the structure and echoing the theme of emotional struggle. The shape seed of a tiny cross is abstracted into a lattice, creating complexity within the perceived boundaries.</desc>
