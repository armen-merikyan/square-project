<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Suspicion</title>
  <desc id="desc">This piece captures a tension between feelings of trust and suspicion through contrasting colors and patterns. The palette uses deep blacks and dark violets to embody the weight of suspicion, while soft gold and pale green introduce moments of hope and light. The main collision occurs in the center, where dense patterns of soft gold interplay with dark areas, suggesting the struggle of trust within an environment filled with static interference. The pattern’s flow mimics a wave, enhancing the fragmented feel of the experience.</desc>
