<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tension</title>
  <desc id="desc">The artwork embodies the emotional tension between 'spark' and 'ash', visually translating this contrast through a dynamic layout that evokes resilience alongside fragility. The palette merges deep navy and black with abrupt flashes of dim cyan, creating waves of intensity that permeate a mostly subdued environment. The collision occurs dramatically in the center, where the crosshatch from the spark sharply interrupts the more subdued striped ash, embodying the struggle between hunger and restraint. This layering demonstrates the inherent conflict of memory versus erasure, hinting at layers of meaning beneath the surface. The intention was to encapsulate the dichotomy of vibrant life against a backdrop of settled ash, echoing the themes of aspiration caught in a landscape of restraint.</desc>
