<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos of Pulses</title>
  <desc id="desc">This artwork embodies the emotional tension between signal and noise. The deep navy and black establish a grounded, quiet base contrasting sharply with the dim cyan and hints of white. The dense patchwork of darker hues illustrates interference, while the ladder-like arrangement of brighter colors symbolizes a readable pulse fighting its way through chaos. The lower left corner serves as the origin point where chaos begins to invade, shifting the composition to reflect a diagonal spread of tension and disruption, aligning with 'corner invasion'. The layers of depth represent exposure against shelter, creating a tangible sense of memory against erasure.</desc>
