  <title id="title">Memory &amp; Motion</title>
  <desc id="desc">This artwork explores the emotional tension between softness and severity, utilizing a palette that balances powdery pinks with stark blacks. The warm whites introduce an element of gentleness, countering the sharp contrasts created by the carbon black. The arrangement features broken pixels, signifying disruptions and moments of guilt interrupting the rhythm of forgiveness, while the central collision emphasizes a dense black area surrounded by lighter, softer hues, illustrating the push and pull between the two emotional states. The chosen layout allows for layered densities that echo this emotional struggle throughout the artwork.</desc>
