<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilient Tides</title>
  <desc id="desc">This composition captures the emotional tension between vulnerability and strength. The outer border, dominated by deep blacks and grays, symbolizes a strong protective layer, utilizing a stripes pattern that conveys stability. The inner 4x4, more frail with pale colors and a stacked pattern, represents vulnerability. The collision occurs at the center where these contrasting textures meet, creating a dynamic visual tension that evokes a feeling of conflict and coexistence. The palette reflects the softness of vulnerability with light tones and the severity of strength with dark edges, creating layers of emotional complexity.</desc>
