<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone fluctuates between panic and control, embodying a struggle reflected in the clash of colors. The palette of deep reds, blacks, pale blues, and whites creates a tension between warmth and coolness. The layout emphasizes diagonal movement, illustrating the invasion of chaos into the structure represented by the 'split screen' pattern. Central collisions occur where the red and pale blue interact, suggesting sparks of emotion amidst darkness. This composition tells a story of frayed edges and unresolved tension brought on by the seed's themes.</desc>
