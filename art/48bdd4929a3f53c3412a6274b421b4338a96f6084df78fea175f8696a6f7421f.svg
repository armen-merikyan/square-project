<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension &amp; Tranquility</title>
  <desc id="desc">This artwork encapsulates the emotional tension between restlessness and peace, where the burnt orange and dark red evoke a sense of discomfort and agitation. In contrast, the gold and charcoal bring a soothing balance. The composition employs a 'cross_current' layout, with a central collision of contrasting warm and cool tones, creating an optical vibrancy that reflects the 'flame against shatter' concept. The broken pixels disrupt the tonal flow, adding to the unease while maintaining a shared space of quiet beauty, reinforcing the depth of the emotional journey.</desc>
