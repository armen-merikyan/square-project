<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tear in the Signal</title>
  <desc id="desc">This artwork explores the emotional tension between loneliness and connection through the contrasting use of deep blacks and dim cyans. The palette suggests a sense of isolation (black) contrasted with distant hope (cyan), creating a push-and-pull that echoes the theme of separation versus togetherness. The composition is top-weighted – darker colors dominate the top, while lighter shades dwell at the bottom, invoking a rising signal, evoking a sense of yearning. Pixels within the grid pattern reflect bursts of energy against moments of quiet, fostering a rhythmic pulse that embodies the complex emotions captured in the seed.</desc>
