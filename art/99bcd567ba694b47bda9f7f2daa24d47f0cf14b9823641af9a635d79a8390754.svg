<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Suspicion</title>
  <desc id="desc">The emotional tone embodies a conflict between trust and suspicion, with colors flowing from warm to cool to signify this duality. The palette of hot coral, blood orange, and hollow blue signals warmth clashing against the chill of shadows and suspicion. The main collision occurs in the center where vibrant hues ring the cooler, uncertain areas, embodying the tension of life and emotion trapped between clarity and ambiguity. The patterns—mirrors reflecting trust and rings of suspicion—collide, suggesting a spiral of conflicting emotions. Broken pixels create intentional imperfections, adding depth to trust's fragile state and suspicion's harsh edges.</desc>
