<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Colliding Echoes</title>
  <desc id="desc">The emotional tone centers on contrasts between the vibrant energy of 'spark' and the muted remnants of 'ash'. The chosen palette of off_white, dust_gray, compressed_red, dark_navy, and faint_peach evokes a sense of quiet tension and emotional range. The composition flows diagonally, with stark contrasts between the crack pattern representing spark and a halo pattern for ash—suggesting the struggle of memory and erasure. The main collision occurs in the center, where the vibrant red disrupts the surrounding muted space, symbolizing resilience amidst the fragility of memory.</desc>
