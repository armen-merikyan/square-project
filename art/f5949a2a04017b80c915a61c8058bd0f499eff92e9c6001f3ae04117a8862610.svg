<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork embodies the emotional struggle between tenderness and rage through an abstract composition. The palette combines deep reds symbolizing rage and muted blues representing tenderness, creating a stark contrast in the square. The left half features jagged patterns in red (rain), denoting explosive emotions while the right half presents softer fields of blue (quiet channel) to evoke warmth. The center serves as the collision point, symbolizing the vulnerability of tenderness facing the onset of rage. Broken pixels introduce intentional disruptions, representing guilt and forgiveness in an imperfect world. Overall, the structure reflects a split between two states of being while maintaining an undercurrent of interplay and tension.</desc>
