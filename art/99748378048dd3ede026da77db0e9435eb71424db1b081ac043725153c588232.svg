<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">This artwork embodies the emotional conflict between restlessness and peace. The palette of pink, red, gray, and dark maroon creates a warm emotional core that feels both passionate and heavy. The main collision of colors occurs in the center, where glitch patterns (representing restlessness) interrupt the softer negative cross patterns (symbolizing peace). Broken pixels add intentional imperfections, echoing the chaos of memory versus motion. The edges crawl gently into darker tones, suggesting a quiet retreat, while the vibrant center pulls attention, illustrating the conflict within serenity.</desc>
