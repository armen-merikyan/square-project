<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This composition captures the tension between confusion and clarity through a carefully selected palette of black, red, pale blue, and white. The contrast of dark and light colors creates a visual clash, symbolizing confusion against the pursuit of clarity. The use of contrasting patterns—a checker for confusion and stairs for clarity—not only enhances this tension but also suggests movement from the edges to the center, as if clarity is trying to break through. The deliberate placement of broken pixels introduces a sense of imperfection, echoing the theme of corruption within what may seem orderly. This alignment of color and shape results in an abstract representation of emotional turmoil and resolution without any direct representation.</desc>
