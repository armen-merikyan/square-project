<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Harmony</title>
  <desc id="desc">The emotional tone is a balance between yearning (longing) and resolution (resolve), expressed through the use of muted and vibrant colors. The palette features 'quiet_pressure' colors like dark navy for depth, compressed red for urgency, and faint peach as a gentle contrast. The near vs far layout allows the pulse of colors to create a dynamic tension, with disrupted pixels suggesting the fragility of the longing and the strength of resolve. The main collision occurs in the center, where compressed red and faint peach stutter against the subdued dark navy, pushing back on each other while maintaining an abstract coherence, echoing the complexity of the emotional themes.</desc>
