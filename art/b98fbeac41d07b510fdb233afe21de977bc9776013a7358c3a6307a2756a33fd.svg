<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone oscillates between vulnerability and strength, creating a dynamic interaction. The palette includes deep blues and pale yellows that symbolize strength's stability and vulnerability's exposure. The top half of the grid expresses a cool, muted strength, while the bottom contrasts with warm, vibrant colors reflecting vulnerability. The main collision occurs at the center, where the transition between emotions is stark, capturing the essence of 'exposed vs protected'. Broken pixels are incorporated to suggest imperfections and disruptions, reinforcing the theme of vulnerability throughout the piece. Overall, the composition allows for a tension-filled yet harmonious experience, embodying the complexity of the seed's themes.</desc>
