<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This piece contrasts the emotional tones of pressure and quiet by using a carefully chosen palette. The darker hues represent dense pressure, overwhelming the top half, and transition into softer, lighter colors that suggest a sense of quiet below. The collision occurs diagonally, where the sharp red jags against the muted off-white, creating the tension of breaking through. Broken pixels are introduced throughout to symbolize interruption and imperfection, enhancing the emotional depth of the piece while keeping the overall structure readable.</desc>
