<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This composition embodies the struggle between control and surrender. The palette features warm rust and soft bone white for confinement, while cooler moss green and stone gray represent surrender. The central clash occurs with the vibrant small gold interrupting the muted tones, creating a dynamic exchange where containment is overwhelmed. Patterns of embers and crosshatch weave together, suggesting a stutter step against the backdrop of restriction, evoking both pressure and emotional release.</desc>
