<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of the Reconciling Edge</title>
  <desc id="desc">The emotional tone communicates a push and pull between longing, manifesting as static distribution, and resolve, illustrated through more dynamic flame patterns. The palette of moss green and bone white represents resilience and fragility, while rust and stone gray denote the collision between hope and pain. The primary contrast occurs at the bottom left corner, where colors collide vehemently, creating a visual narrative of pressure spilling into the quieter spaces above and to the right, echoing a sense of unresolved tension. The broken pixels are strategically placed to symbolize the imperfections in this emotional journey.</desc>
