<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory vs Motion</title>
  <desc id="desc">This piece explores the emotional tension between softness and severity. The palette comprises powder pink and warm white to evoke softness, contrasted by carbon black and sharp crimson to represent severity. The center of the piece features an overlap of pulse marks in a darker spectrum, interrupted by gentle rain patterns of lighter hues, symbolizing the collision between memory (softness) and forward motion (severity). The intentional placement of darker colors in the center adds weight and depth, illustrating a bottom-heavy tension. Broken pixels throughout suggest imperfections and an unresolved journey between guilt and forgiveness. The layout embodies a struggle for dominance in the emotional landscape, with quiet fields of color creating moments of reflection amidst stark contrasts.</desc>
