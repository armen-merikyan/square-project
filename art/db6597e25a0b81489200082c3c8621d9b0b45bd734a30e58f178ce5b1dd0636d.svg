<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition reflects the emotional tension between vulnerability and strength through a contrasting palette of muted cream and dark plum with energetic accents of small orange. The top left is dense with deep colors suggesting strength, anchoring the square, while the pale center signifies vulnerability, leaving it exposed to incoming flows of color. The collision happens where the orange interrupts the muted tones, representing the struggle between safety and exposure. Broken pixels are used to create intentional disruptions, enhancing the feeling of fracture and imperfection, much like the emotional state it embodies.</desc>
