  <title id="title">Fragmented Harmony</title>
  <desc id="desc">The emotional tone captures the tension between joy and grief, represented through a vibrant palette of warm colors and muted tones. The warm yellows and oranges symbolize joy, while deep blues and muted purples signify grief. The layout flows from the bottom left, where joy radiates, creating a wave-like motion that contrasts with moments of grief, interspersed like broken dots amidst dense areas. The jagged edges amplify the sense of fragmentation, while the goal was to achieve balance with intentional negative space throughout.</desc>
