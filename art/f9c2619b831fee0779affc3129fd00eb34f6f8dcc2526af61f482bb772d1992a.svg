<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone of this piece oscillates between softness and severity, encapsulating the delicate balance between vulnerability and protection. The palette blends warm hues of powder pink and warm white alongside colder notes of carbon black and steel gray, creating a compelling contrast that embodies the tension between these emotional states. The main collision occurs at the center, represented by a radial pattern moving against a stark braid that emerges from the edges, symbolizing the intrusion of severity into the softness of the center, where open gates welcome both light and shadow. The broken pixels introduce intentional disruptions, echoing memories of guilt and forgiveness, while maintaining quiet spaces to allow for reflection.</desc>
