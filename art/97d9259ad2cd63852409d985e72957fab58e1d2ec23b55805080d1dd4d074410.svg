<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects a tension between vulnerability and strength. The palette combines deep black with vibrant electric blue, magenta, and bright lime, creating a contrast between a dense, protected core and lighter, exposed outer edges. This highlights the collision between safety and exposure at the center of the square, enhanced by broken pixels suggesting the imperfections of vulnerability. The pattern of 'islands' for vulnerability creates delicate patches within bolder, thicker 'spark' elements that represent strength, capturing the essence of emotional duality.</desc>
