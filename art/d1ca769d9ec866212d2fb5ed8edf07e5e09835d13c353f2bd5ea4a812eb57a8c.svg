<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This piece explores the emotional dichotomy of awe and terror through color and placement. The palette of deep navy and black contrasts with accents of dim cyan and single white, emphasizing the tension between the two feelings. The left side is dominated by a radial pattern suggesting a rise—a feeling of elevation and expansion—while the right side's split design evokes a sense of chaos and uncertainty. Broken pixels create imperfections that mirror the fragile nature of memory. The composition maintains balance with negative space, creating a dialogue between the two emotional states.</desc>
