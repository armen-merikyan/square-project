<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This piece captures the emotional dichotomy of restlessness and peace through a fragmented yet harmonious interplay of colors. The palette of muted moss green and stone gray represents tranquility, while rust and gold introduce chaotic bursts of energy, depicting moments of unease and recollection. The left side incorporates cooler colors with channels indicating peaceful flows, contrasting sharply with the warmer accents on the right, suggesting restlessness and motion. The main collision occurs centrally, blending cool and warm to create a dynamic tension, while broken pixels disrupt the flow, symbolizing interruption and memory.</desc>
