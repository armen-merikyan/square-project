<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This piece explores the emotional contrast of joy versus grief, represented through a palette using bright yellows and oranges for joy on the top half, transitioning into deep blues and muted purples for grief in the bottom half. The tidy rows of warm colors represent the order and brightness associated with joy, while the jagged edge and darker hues introduce chaos and heaviness below. The contrasting patterns echo the struggle between positivity and sorrow. The hard edges augment the feeling of tension and separation, creating a visual experience of climbing upward from a dense emotional weight to an elevated sense of lightness and joy, with echoes of grief manifested in broken pixel placements throughout. The arrangement also leaves ample negative space for the viewer to engage with the emotional narrative.</desc>
