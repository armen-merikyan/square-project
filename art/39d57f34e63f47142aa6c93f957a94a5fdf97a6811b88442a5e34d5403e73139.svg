<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone contrasts the warmth of safety with the vulnerability of exposure. The palette combines soft greens and browns to evoke shelter, balanced against pale, cool whites and blues that signify exposure. The collision occurs along the vertical split, where dense clusters of 'noise' patterns in the warm tones meet the quiet fields of 'exposure' colors, interrupted by broken pixels that symbolize the leaks of emotion. The layout creates a nearly closed frame, allowing for controlled exposure, illustrating a conflict between shelter and vulnerability.</desc>
