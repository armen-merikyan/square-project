<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetrical Disruption</title>
  <desc id="desc">This piece explores the tension between panic and control by utilizing a stark contrast between dark and vibrant colors. The palette consists of black as a grounding element for control, while electric blue and magenta inject a sense of frenetic energy, embodying panic. The layout is split vertically, creating a balance yet collision of emotion as one side clamors with chaotic patterns while the other presents a structured grid. The pixel bleed edge style introduces imperfection and fluidity, emphasizing the theme of control being disrupted by sudden emotional pulls, manifesting an overarching narrative of tension and unresolved conflict.</desc>
