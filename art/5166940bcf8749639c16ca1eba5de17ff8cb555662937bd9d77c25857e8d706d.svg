<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This composition embodies the emotional tension of shame and pride through contrasting warm and cool colors. The palette of deep blue and muted purple represents pride, evoking depth and confidence, while yellow and orange suggest the intensity of shame and vulnerability. The left side of the grid features a structured stair-like pattern reflecting pride's ascent, while the right side displays an irregular flow that disrupts the symmetry, representing shame's chaotic nature. The broken pixel strategy introduces imperfections, mirroring the inherent messiness of these emotions, and providing intervals for quiet space against denser clusters, enhancing the sense of conflict and resolution within the viewer.</desc>
