<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Churning Refuge</title>
  <desc id="desc">The artwork expresses an emotional tension between relief and dread, capturing the interplay between hope and anxiety. The palette of pale mint, soft sky, storm gray, near black, and faded gold is used to juxtapose lightness against darkness, emphasizing moments of brightness fighting through heavier forms. The main collision occurs in the center where the 'channels' pattern of relief meets the 'flame' pattern of dread, creating a visual tension. Broken pixels introduce intentional disruptions, echoing the uneven battle between order and chaos. This composition conveys both an upward flow of hope and the weight of looming dread through its color placement and density.</desc>
