<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone explores the duality of love and betrayal, depicted through contrasting warm and cool hues. Selected from a palette of pink, red, gray, and dark maroon, the colors reflect warmth and passion alongside cold detachment. The primary contrast happens between the warm outer edges and the cooler core, creating a visual echo of love being enveloped by betrayal. Broken pixels are strategically placed to introduce imperfection, symbolizing fragility in relationships. Patterns of soft noise flow into sharper elements, emphasizing the tension between gentleness and betrayal's harsh impact. Overall, this piece embodies a narrative of unresolved emotions and conflict, translating the seed into emotional patterns rather than literal imagery.</desc>
