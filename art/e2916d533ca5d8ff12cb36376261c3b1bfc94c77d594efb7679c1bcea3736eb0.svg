  <title id="title">Balance of Tension</title>
  <desc id="desc">This artwork explores the interplay of rage and calm through a contrast of light and dark colors. The black signifies the depth of rage, while pale blue represents calmness. The use of a mirrored layout introduces tension with slight imperfections, embodying the emotional turbulence of the theme. The first four rows evoke a dense, compressed feeling centered around dark colors, while the next four offer a quieter, spaced-out experience with pale blues and whites, highlighting the contrasts between lightness and heaviness, pressure and release.</desc>
