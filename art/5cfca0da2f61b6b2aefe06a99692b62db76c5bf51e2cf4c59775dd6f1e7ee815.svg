<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">The emotional tone of longing and resolve is expressed through a palette of ripe green, acid green, and honey gold, creating a dynamic tension between warmth and coolness. The contrast lies at the center of the composition, where the quadratic dots of longing (in the ripe green) collide with the strong, structured lines of resolve (in deep olive). A broken edges style introduces imperfections, symbolizing the complexity of these emotions, while negative space invites contemplation. The resulting composition reflects the duality of intimacy and distance, with each mark telling a story of connection and separation.</desc>
