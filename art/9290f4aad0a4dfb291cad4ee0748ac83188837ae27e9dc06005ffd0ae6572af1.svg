<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">The composition captures the interplay between control and surrender through dense, saturated centers contrasted by thinner edges. The chosen palette of sepia, tan, dust gray, and faded blue evokes a nostalgic, broken memory, grounding the chaotic center with muted tranquility. The central clash represents surrender, as it spills outward, while the jagged borders impose a sense of containment. Intentional disruptions—broken pixels—introduce imperfection, allowing the piece to breathe amidst the tension, illustrating the struggle between pressure and release.</desc>
