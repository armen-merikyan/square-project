<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Paths</title>
  <desc id="desc">This artwork embodies the emotional tension between longing and resolve, using a palette that captures warmth and depth. The colors transition from warm corals to dark charcoals, representing the journey from desire to clarity. The dominant section, marked by dense coral and orange, symbolizes resolve, while the scattered dust pinks and blues echo feelings of longing. The structured rising flow and intersecting patterns of stripes and flood evoke a sense of upward movement, suggesting hope amidst chaos. The defined halo edge creates a boundary that emphasizes the contrast between inner conflict and external resolution.</desc>
