<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">The emotional tone oscillates between the stark contrast of 'spark'—a sudden brightness depicted by vibrant colors—and 'ash'—the muted grays symbolizing residue. The palette of mourning_black and pale_yellow creates a tension that captures the 'hunger_vs_restraint' theme, with predominant dark tones representing restraint and lighter accents indicating fleeting sparks of vitality. The main collision happens diagonally, where flame-like patterning intersects with channeling forms, echoing a visual struggle between these emotions. Broken pixels introduce an element of imperfection, embodying the fragility and resilience described in the seed.</desc>
