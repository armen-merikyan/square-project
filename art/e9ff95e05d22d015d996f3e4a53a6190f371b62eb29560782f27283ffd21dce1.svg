<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory vs Motion</title>
  <desc id="desc">This piece embodies the emotional dichotomy of softness and severity through a palette of 'powder pink' and 'carbon black' with 'sharp crimson' accents. The top rows utilize soft stripes that gradually transition into darker, static elements in the bottom rows, creating a visual tension that interrupts the flow. The layout emphasizes a split between the calming past and the contrasting imperatives of the present, with a collision in the center where 'light_vs_dark' intensifies. This reflects the tension of memories against the push of ongoing existence.</desc>
