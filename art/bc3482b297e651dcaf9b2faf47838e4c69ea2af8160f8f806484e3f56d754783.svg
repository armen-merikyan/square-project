<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Light and Shadow</title>
  <desc id="desc">This piece evokes the tension between fear and hope through a careful balance of dark and light. The chosen palette—black, dark violet, soft gold, and pale green—creates a stark contrast, with the dark colors representing fear and the lighter ones embodying hope. The grid pattern on the left symbolizes confinement while the rain pattern on the right suggests release, echoing the conflict of emotions. 'Glowing edges' highlight the contrast, and the split design divides the canvas, mirroring the internal struggle of opposing feelings. The placement allows bursts of light within a darker frame, creating a rhythmic pulse of color that conveys both pressure and uplift.</desc>
