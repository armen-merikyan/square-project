<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotions</title>
  <desc id="desc">The abstract composition explores the push and pull between love and betrayal through a contrasting palette of warm and cool tones. The deep reds and grays represent the warmth of love, while the dark maroon signifies the cold aspects of betrayal. The layout starts from the corner and diagonally invades the space, symbolizing how emotions can seep into different areas of life. The use of a crosshatch pattern for love brings a gentle rhythm, offset by a checker pattern for betrayal, creating tension and interruption. Broken edges add to the feeling of imperfection and unresolved emotions in the composition.</desc>
