  <title id="title">Fragmented Trust</title>
  <desc id="desc">This artwork embodies the emotional tension between trust and suspicion, utilizing a palette of deep navy, black, dim cyan, and a touch of white to create a contrast between warmth and the coldness of doubt. A strong central vertical line echoes the concept of conflict, while muted patterns symbolize the delicate balance between resilience and fragility. The diagonal fall suggests movement into uncertainty, where suspicion lurks in the darker borders, allowing the soft glow of trust to leak through in the center.</desc>
