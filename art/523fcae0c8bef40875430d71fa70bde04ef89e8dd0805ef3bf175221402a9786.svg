<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Contrast</title>
  <desc id="desc">This artwork embodies the emotional conflict of envy versus gratitude through a duality in color and arrangement. The selected palette of deep blue, muted purple, orange, and yellow juxtaposes heavy, darker tones of envy at the top rows, mimicking the weight of those emotions, with lighter, airier gratitude tones below, creating an upward counterflow. The zigzag pattern introduces a rhythmic tension, as if negotiating between lifting and grounding. Central focus is augmented by broken pixels that add to the narrative of imperfection amidst the bright, organized chaos.</desc>
