<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between States</title>
  <desc id="desc">This piece embodies the emotional tension between defiance and submission through a deliberate arrangement of colors and patterns. The palette combines 'pale aqua' and 'mist gray' for a quiet foundation, interrupted by bold 'alarm red' and 'ink blue', symbolizing conflict and urgency. The collision occurs centrally, where stacked patterns representing defiance confront the glitch-like disorder of submission. Broken pixels introduce imperfections, enhancing the theme of resistance versus surrender. The negative space around these interactions serves to emphasize the emotional weight of the conflict within the boundaries of the 8x8 grid.</desc>
