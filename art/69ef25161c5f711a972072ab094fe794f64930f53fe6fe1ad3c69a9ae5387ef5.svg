<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Emotion</title>
  <desc id="desc">This composition contrasts the heavy weight of grief with the lighter touch of joy, divided horizontally to reflect the duality. The palette consists of yellow and orange for joy, creating warmth and brightness, while deep blue and muted purple represent grief, bringing depth and weight. The collision occurs between the structured broken dots of joy in the top rows and the irregular stair-step representation of grief in the bottom rows. The palette emphasizes emotional transitions, suggesting a wave of feelings that interplay with each other, hinting at hidden depths beneath visible chaos.</desc>
