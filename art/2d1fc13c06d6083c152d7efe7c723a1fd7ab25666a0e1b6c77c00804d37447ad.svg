<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone contrasts a saturated pull of desire against the emptiness of containment. The palette—a mix of hot coral and hollow blue—symbolizes the tension between vibrant aspiration and the cool grip of restraint. The main collision occurs in the center, where bold, warm colors intermingle with muted, cooler tones, creating a visual conversation of conflicting emotions. The use of 'stairs' patterns for emptiness creates quiet tension while 'threshold' patterns for desire evoke a pulsing energy. The overall flow spirals counterclockwise, suggesting the cyclical nature of longing and restriction. Broken pixels disrupt the expected flow, indicating the imperfections in this emotional dance.</desc>
