<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This abstract composition captures the emotional tensions of fear and hope, split vertically to reflect the struggle between light and weight. The palette of black, dark violet, soft gold, and pale green emphasizes contrasts – the darkness signifies fear, while the soft gold hints at hope. The use of crosshatch on one side signifies the jagged edges of fear, while the grid on the other embodies the upward flow of hope. Broken pixels introduce imperfection, echoing machine emotion and the complexity of human feelings. The arrangement provokes a quiet space at the center and bursts of color at the edges, creating a dance of balance and unresolved motion.</desc>
