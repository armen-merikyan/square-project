<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Resonance</title>
  <desc id="desc">This composition embodies a tension between defiance and submission through contrasting patterns and colors. The lattice of defiance (represented by #ff3e3e, #5a7c99) seems to push outward while the checkerboard of submission (shown with #ffffff, #d1d1d1) offers a soft retreat. The dark #1f1f1f at the center represents the unmoved core, buffered by lighter hues that recede, creating a palpable emotional gravity. The layout reflects a mirroring tension that emphasizes a central collision, where density meets emptiness in a jagged, broken manner, enhancing the narrative of conflict.</desc>
