<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of vulnerability and strength through an interplay of density and negative space. The palette, composed of burnt orange, dark red, charcoal, and gold, reflects the intensity of these emotions—red expressing strength and orange vulnerability. The layout emphasizes a central bright cluster (the exposed center) amidst darker shades, symbolizing the tension between safety and exposure. The patterns of rings (strength) and noise (vulnerability) collide predominantly in the center, where the emotional contrast is most pronounced. Broken pixels add a sense of imperfection and memory, evoking how desires can juxtapose against emptiness in our lives. This creates an abstract narrative of resilience amid fragility.</desc>
