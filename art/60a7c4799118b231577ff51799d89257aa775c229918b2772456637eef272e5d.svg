<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Waves</title>
  <desc id="desc">This artwork captures the emotional conflict between joy and grief through contrasting colors and patterns. The palette of warm yellows and oranges symbolizes joy, while deep blues and muted purples represent grief. The layout features a dynamic interplay of dense and empty spaces, reflecting how grief can overshadow joy. The layering of checker patterns against deeper tones creates a rhythm of interruption, suggesting the push and pull of conflicting emotions. The broken pixels evoke a sense of imperfection, representing the fragility of these feelings, while achieving balance through the use of negative space. The design flows with a zigzag movement, enhancing the sensation of oscillation between peak joy and profound grief.</desc>
