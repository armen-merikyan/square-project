<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shifts of Emotion</title>
  <desc id="desc">The emotional tone contrasts between envy and gratitude create a visual dialogue, where darkness (envy) collides with lightness (gratitude). The palette of navy, black, and dim cyan accentuates this tension, fostering feelings of both heaviness and relief. The arrangement emphasizes a central distribution of lighter colors battling against the denser darker edges, resonating the notion of a soft edge fighting against noise. The pattern evokes a sense of imbalance—rising and falling—as colors move in a fragmented way, creating a narrative of interruption and resolution.</desc>
