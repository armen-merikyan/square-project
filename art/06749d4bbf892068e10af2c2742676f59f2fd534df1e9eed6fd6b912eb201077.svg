<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">The piece portrays the dynamic tension between certainty and curiosity through a contrasting palette of warm coral and cold slate. The left side (certainty) is dominated by structured patterns of fault lines creating a sense of solidity, while the right side (curiosity) features more fragmented and softer islands, suggesting movement and questioning pathways. The main collision occurs in the center where these patterns overlap, creating a visual dialogue that speaks to the push and pull of these emotions. The central area is vivid, interrupting the flow otherwise governed by a more subdued and muted palette. These intentional breaks add complexity and imperfection to the composition, reflecting the layered emotions described in the seed.</desc>
