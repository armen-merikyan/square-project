<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Forms</title>
  <desc id="desc">The emotional tone revolves around the struggle between order and chaos, reflecting a dominant sense of certainty with accents of curiosity. The palette combines warm browns and cool greens, representing safety yet straining against the undefined chaos in pale and cold hues. The main contrast erupts near the center of the canvas, where structured forms collide with fragmented spaces, evoking the imagery of a cage breaking open. This tension is captured through the interplay of lattice and split screen patterns with deliberate placements of broken pixels, symbolizing disruption amidst an otherwise ordered arrangement.</desc>
