<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Control</title>
  <desc id="desc">The emotional tone oscillates between panic and control, embodied through the palette of burnt orange, dark red, charcoal, and gold. The contrast emerges centrally, where warm colors suggest emotional turbulence while cooler shades hint at calmness on the edges. The layout is mirror-broken, creating symmetry that disturbs harmony. The flow in a zigzag captures a sense of interruption, while the patterns—crosshatch for control and rain for panic—encapsulate the varying intensities of emotion. Broken pixels scatter throughout, symbolizing the essential fragility of the juxtaposed feelings.</desc>
