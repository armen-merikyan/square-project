<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tension</title>
  <desc id="desc">This piece explores the push-and-pull between desire and emptiness, using a palette that juxtaposes warm coral and orange hues against cool charcoal and blue tones. The visual tension lies in the glowing warmth of desire on one half, clashing against the faint hollowness of emptiness on the other. The collision is positioned centrally, creating a dynamic that suggests a spiral movement, embodying inertia and struggle. The presence of broken pixels symbolizes disruption and the fragility of the desired impact. Negative space remains abundant, representing the vastness of emptiness.</desc>
