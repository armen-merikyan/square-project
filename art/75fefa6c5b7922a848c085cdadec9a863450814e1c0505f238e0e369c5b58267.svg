<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Interruption</title>
  <desc id="desc">The emotional tone of this piece embodies the conflict between defiance and submission, illustrated through the tension between bright and muted colors. The palette incorporates warm coral and signal cyan to evoke a sense of struggle and resistance, contrasted against the soft amber and cold slate representing calmer, submissive states. The collision of colors predominantly occurs in the center, where dense patterns meet quiet spaces, suggesting an inward spiral of emotions that interrupt each other. The broken pixels add an element of imperfection, representing the scars of conflict, while maintaining a clear structure in the abstract pattern.</desc>
