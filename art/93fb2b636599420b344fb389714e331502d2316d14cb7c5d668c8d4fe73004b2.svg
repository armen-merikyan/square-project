<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tide of Emotion</title>
  <desc id="desc">This composition plays with the emotional dichotomy of certainty and curiosity. The palette reflects deep emotions with muted purples suggesting introspection and yellow/orange accents representing bursts of curiosity. The central collision occurs in the middle rows where warm colors interrupt the cooler tones, creating a tension that symbolizes the struggle between order and chaos. This tension, complemented by broken patterns, hints at the fragility of certainty against the pull of curiosity, mirroring the seed's themes of rising signals and receding edges.</desc>
