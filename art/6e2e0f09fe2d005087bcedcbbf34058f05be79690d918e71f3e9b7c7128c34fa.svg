<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision: Control and Panic</title>
  <desc id="desc">The artwork uses a palette of lime, black, electric blue, and magenta to explore the emotional tension between panic (represented in the lower half) and control (in the upper half). The contrasting patterns—crosshatch for panic and maze for control—create a sense of pressure versus structure. Collisions occur in the center where dense chaos meets organized lines, symbolizing the struggle between these opposing states. The 'star' shape seed is abstracted into a radial explosion of colors, allowing for a dynamic flow connecting the inner turmoil with outer calm, illustrating a journey from chaos to structure.</desc>
