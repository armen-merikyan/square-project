<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Longing</title>
  <desc id="desc">This artwork captures the emotional tension between longing and resolve through a contrast of soft edges and distinct patterns. The palette of off-white, dust gray, compressed red, dark navy, and faint peach evokes a sense of quiet pressure and unresolved emotion. The primary conflict appears at the center with dense clusters of dots expressing longing, enveloped by horizontal stripes symbolizing resolve, creating a visual echo that speaks to repair versus damage. This duality is accentuated by the carefully arranged broken pixels, representing both scars and moments of clarity amidst the chaos.</desc>
