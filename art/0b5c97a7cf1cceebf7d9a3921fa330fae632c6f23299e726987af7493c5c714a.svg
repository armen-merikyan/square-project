<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Stripes of Sentiment</title>
  <desc id="desc">This piece embodies the emotional tension between 'panic' and 'control.' The selected palette of muted sepia, tan, and dust gray suggests a memory-laced past, while the faded blue adds a touch of calm that disrupts the surrounding chaos. The contrast arises from the tight central cluster of deeper colors creating an intense core of control, while the lighter hues around it imply a bleeding outward into the panic of uncertainty. The striped patterns flow from the center to edges, visually representing a movement towards vulnerability and outward pressures, embodying the struggle between stability and disruption.</desc>
