<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Ascent</title>
  <desc id="desc">This composition explores the emotional duality of longing and resolve through color and pattern. The palette features warm shades of 'rose_clay' and 'lamp_gold' to evoke a sense of intimacy contrasted with cooler hues like 'cool_blue' and 'distant_lilac' that add a sense of distance and urgency. The major collision occurs in the lower left corner, where dense clusters of warm colors battle against quiet fields of cool tones, representing the struggle between compressed strength and a distant warmth. The uneven border enhances the dynamic tension, while broken pixels introduce cracks in the surface, suggesting the fragility of resolve amidst longing.</desc>
