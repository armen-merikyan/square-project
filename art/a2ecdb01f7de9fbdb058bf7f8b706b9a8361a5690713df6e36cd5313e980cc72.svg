<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This artwork captures the tension between the dynamic energy of sparks and the muted calm of ash. I chose a palette that reflects this duality—bright accents of 'faded_gold' and 'soft_sky' clash with the darker tones of 'storm_gray' and 'near_black'. The arrangement showcases a primarily dark field with small bright bursts interrupting the flow, symbolizing moments of resilience in the face of fragility. The radial pattern on the left represents a controlled spark while the noise pattern on the right suggests fragmentation and memory. The central collision of colors creates a focal point that disrupts the surrounding space, reflecting the emotional struggle between clarity and chaos.</desc>
