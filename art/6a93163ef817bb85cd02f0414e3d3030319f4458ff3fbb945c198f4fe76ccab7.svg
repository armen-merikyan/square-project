<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal Amidst the Static</title>
  <desc id="desc">The emotional tone is characterized by a struggle between clarity and interference. The palette employs deep navy and black to evoke the weight of noise, contrasted sharply against lighter dim cyan and single white, symbolizing moments of clear signal. This setup creates a rhythmic pulse in a sea of static, with soft glows illuminating edges where noise interrupts the signal, primarily centered for impact. The use of broken pixels disrupts the uniformity, adding to the feeling of interference, while keeping a meaningful object off-center enhances the sense of space and tension.</desc>
