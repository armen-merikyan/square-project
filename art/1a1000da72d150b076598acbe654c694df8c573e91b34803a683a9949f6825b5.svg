<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rhythmic Collision</title>
  <desc id="desc">This piece explores the emotional tension between loneliness and connection, using a palette of dark violet, soft gold, and pale green set against black. The layout focuses on an argument between clusters of color that either connect or create distance. The rhythm of placement suggests a pulse, where dark colors create pressure in the center, disrupting the surrounding softer hues, symbolizing the fight between isolation and the urge for connection. The pattern incorporates a wave-like shape to add fluidity while maintaining structure, with broken pixels introducing imperfection, resonating with the emotional undercurrents of the seed.</desc>
