<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition embodies the emotional tug-of-war between vulnerability and strength. The chosen palette of clean white, ice blue, and ink black represents the struggle—a stark contrast of lightness and depth, reflecting moments of exposure versus protection. The dominant presence of ice blue suggests a calming strength, with black providing a striking backdrop that defines the boundaries while white areas represent vulnerability. The collision occurs centrally, where radial and tide patterns intersect, creating an intentional chaos around a hollow space. This mirrors the emotional journey from safety to exposure, illustrating the dynamic interplay of strength and vulnerability in a visceral abstract form.</desc>
