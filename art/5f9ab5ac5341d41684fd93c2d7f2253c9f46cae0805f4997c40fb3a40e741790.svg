<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order and Chaos</title>
  <desc id="desc">The artwork represents the emotional tension between tenderness and rage through a contrasting palette of deep reds and serene pale blues. The left side maintains a gentle, mirrored pattern suggesting tenderness, while the right erupts into jagged stacks of red, representing the raw edges of rage. The central collision serves as a focal point, bridging these contrasting emotions, and emphasizes the experience of quiet channels within a storm, symbolizing the duality of peace amidst chaos. The deliberate inclusion of broken pixels disrupts the harmony, suggesting the imperfections inherent in emotional experiences. Negative space is preserved to reflect moments of calm amid the intensity, further enhancing the dialogue between the two emotional states.</desc>
