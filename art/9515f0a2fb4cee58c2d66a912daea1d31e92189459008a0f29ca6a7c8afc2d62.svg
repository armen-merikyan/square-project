<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonance of Collisions</title>
  <desc id="desc">The emotional tone of this piece encapsulates the tension between pride and shame through contrasting colors that evoke deep feelings. The dark palette (black) represents shame's weight, while bright accents (electric blue, lime, and magenta) signify the fleeting nature of pride. This collision is emphasized by the diagonal fall of the colors, where high-energy blues intersperse with soft magentas and deeper blacks, creating a rhythmic fluctuation that mirrors the emotional ups and downs described in the seed. The edges are defined sharply to enhance the feeling of pressure, while negative space is used to provide moments of stillness amidst the chaos.</desc>
