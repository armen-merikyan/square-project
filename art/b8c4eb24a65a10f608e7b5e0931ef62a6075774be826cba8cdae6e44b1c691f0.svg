  <title id="title">Tension Frame</title>
  <desc id="desc">This artwork embodies the emotional tension of 'relief' and 'dread' through contrasting colors and spatial arrangements. The palette of soft and muted tones (pale mint and storm gray) represents the weight of dread while punctuated areas of faded gold provide moments of relief. The central square exhibits a heavy density, creating an impression of dread, while the lighter colors expand at the edges, suggesting the opening relief. This structured imbalance maintains the emotional narrative of confronting chaos within order, with the dynamic flow contained within the spiral layout suggesting movement from pressure to release.</desc>
