<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone embodies tension and contrast between desire and emptiness. The palette of hot coral, blood orange, and dust pink conveys a saturated pull of desire, while charcoal and hollow blue represent the hollow fields of emptiness. A dominant warm color rises from the bottom left corner, where the saturation presses outward into a quiet, cooler field, suggesting overflow against containment. The conflict unfolds through diagonal stripes of color that intermittently disrupt the quiet fields, embodying the chaotic spiral and interplay of contrasting emotions.</desc>
