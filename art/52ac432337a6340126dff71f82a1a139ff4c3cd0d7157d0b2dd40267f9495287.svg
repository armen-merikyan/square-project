<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotions</title>
  <desc id="desc">This artwork embodies the tension between tenderness and rage, utilizing a contrasting palette of deep red and pale blue to represent these emotions. The main collision occurs at the center of the canvas, where the braiding of tenderness meets the jagged interruptions of rage. Broken pixels scatter throughout, symbolizing the scars of emotion and the impact of inner struggles. The overall composition features a horizontal and vertical clash, enhancing the feeling of a cross-current, reflecting the complexity of emotional interplay. The layout fosters a sense of movement and intensity while preserving quiet spaces along the edges.</desc>
