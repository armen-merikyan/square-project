<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Wave of Tension</title>
  <desc id="desc">This artwork captures the duality of awe and terror through a striking contrast of rich, dark colors against bright, warm accents. The central motif creates a sense of focus yet evokes a feeling of uncertainty with the interplay between jagged edges of darker colors and the softer patterns of warmth. The palette of burnt orange and gold denotes a flicker of hope contrasted against the oppressive dark reds and charcoals, embodying the struggle between order and chaos. The pattern reflects a balance of maze-like complexity on one side and a systematic approach on the other, illustrating the emotional tug-of-war inspired by the seed.</desc>
