<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Vulnerability</title>
  <desc id="desc">This artwork embodies the tension between safety and exposure through a balanced palette that contrasts warm brown and shelter green with pale skin and cold white. The soft central area illustrates vulnerability, while the darker border creates a protective frame. The left and right sides nearly mirror, disrupted by broken pixels that introduce a sense of imperfection, hinting at the unpredictability of life. The halo and pressure band patterns collide in the center, suggesting a constant flux between safety and exposure.</desc>
