<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo and Pulse</title>
  <desc id="desc">This composition explores the tension between clarity and confusion. The palette employs deep navy and black to symbolize the density of noise, contrasted with dim cyan and a single white accent representing the fleeting signal of clarity. The top four rows project a chaotic noise pattern, reflecting interference and static, while the bottom four rows offer glimpses of rhythm and pulse. The center pulsation is disrupted by irregular placements of broken pixels, creating 'scars' in the noise—emphasizing memory and erasure. The emotional collision happens at the boundary between the two halves, where patterns of noise clash against the attempts at clarity.</desc>
