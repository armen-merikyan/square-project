<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Heavy Reflection</title>
  <desc id="desc">This artwork captures the emotional duality of 'envy vs gratitude' through a contrasting palette and pattern structure. The colors of dark maroon and muted gray represent the complexity of envy, while brighter pink hues evoke the lighter feeling of gratitude. The overall layout descends like rain, suggesting an emotional spillover, where heavier, darker colors cluster, creating a central weight against lighter pixel edges, illustrating the tension between pressure and release. The zigzag pattern formed by mirroring creates an echo of emotional conflict, and the broken pixels add an element of imperfection, emphasizing the rawness of these feelings. Negative space is used to suggest moments of clarity within turmoil.</desc>
