  <title id="title">Echo of Shelter</title>
  <desc id="desc">The emotional tone contrasts safety and exposure through a dense outer pattern (intense shelter) and a soft inner core (bright exposure). The palette incorporates warm browns and soft pastels to create a balance between grounding and vulnerability. The main collision occurs along the central vertical axis, where the dense 'stairs' pattern of safety abruptly interrupts the lighter 'broken dots' of exposure, suggesting an echo of conflict between stability and openness.</desc>
