<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipsed Symmetry</title>
  <desc id="desc">This artwork channels the tension between clarity and confusion through a dual palette of vibrant yellow and muted purples. The left side features structured stripes of yellow, symbolizing clarity, while the right side grows chaotic with erratically placed sparks of deep blue and orange to evoke confusion. The hard edges amplify the sense of division, reflecting the emotional collision of stability against disorder. The seed's theme of falling pixels and broken elements is represented in the irregularity of color placement, creating an abstract rhythm of rising clarity towards the center, interrupted by dark patches that embody confusion.</desc>
