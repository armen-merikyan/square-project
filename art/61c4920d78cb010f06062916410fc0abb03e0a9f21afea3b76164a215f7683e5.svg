<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Ascendancy</title>
  <desc id="desc">The emotional tone is a struggle between joy and grief, represented through a contrast in color weights. The palette mixes warm yellows and oranges symbolizing joy with deeper blue and muted purple, embodying grief. The colors ascend from bottom to top, visually articulating hope amidst tension, while hard edges suggest boundaries between safe and threatened emotions. The main collision occurs in the transition from light to dark tones, creating a visual push-pull as they interlace through the grid, forming pattern disruptions typical of the emotional battle.</desc>
