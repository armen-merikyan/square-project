<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Heat and Chill</title>
  <desc id="desc">The emotional tone centers on the struggle between longing (desire) and limitation (restraint). The chosen palette of hot coral and blood orange echoes the warmth of desire, while dust pink and charcoal represent the muted pull of restraint. The grid's left side vibrates with warmer colors, peaking in the center where saturation collides with cooler hues, creating a visual tension. Broken pixels disrupt the flow, symbolizing imperfect desires and moments of hesitation, with a mirroring layout that reinforces this dynamic yet imperfect balance.</desc>
