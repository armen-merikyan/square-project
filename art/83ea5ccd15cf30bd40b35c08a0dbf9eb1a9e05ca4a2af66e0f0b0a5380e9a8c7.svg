<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension's Edge</title>
  <desc id="desc">This piece embodies the emotional dichotomy of desire and restraint through a rich interplay of saturated hues and muted tones. The chosen palette of hot coral and blood orange reflects desire's warmth, while charcoal and hollow blue convey the weight of restraint. The contrasting checker and grid patterns create a visual tension, where bright colors spiral toward a locked border—symbolizing the struggle between reaching out and being held back. The piece features intentional broken pixels, suggesting scars and imperfections in this battle of emotions, while maintaining negative space to emphasize the 'locked' feeling of constraint.</desc>
