<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Flux</title>
  <desc id="desc">The emotional tone captures the fierce tension between rage and calm, manifesting in a palette of stark contrasts: deep blacks against vibrant reds, representing the turbulent energy of rage, while softer pale blues and whites suggest moments of calm and clarity. The main collision occurs in the center, where jagged, monochrome lines interrupt smoother, horizontal bands of color, echoing the patterns of noise versus signal. The layout metaphorically opens a gate, allowing turbulent energies to swirl and encroach upon a stilling space, creating a narrative of movement suspended in time.</desc>
