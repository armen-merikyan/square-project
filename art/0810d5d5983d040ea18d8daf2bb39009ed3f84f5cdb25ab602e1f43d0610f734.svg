<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Amongst Static</title>
  <desc id="desc">The emotional tone captures the struggle between clarity (signal) and chaos (noise). The palette mixes vibrant signal green and hot magenta against muted static gray and dead black, creating tension. The primary collision occurs centrally, where the clean pulse of green interrupts the static scatter of magenta, visualizing the concept of readable rhythms trying to emerge from interference. This arrangement leaves intentional breaks, embodying memory and erasure, while the edge style of open corners invites an exploration of exposed extremes.</desc>
