<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Flame and Ash</title>
  <desc id="desc">The emotional tone highlights the struggle between vibrant moments of spark and settled residues of ash. The palette blends electric blues and magenta to represent the intensity of spark, contrasting with the softer blacks, enhancing feelings of restraint against hunger. The main collision occurs diagonally, where bold colors clash with muted shades, creating tension that reflects a radial movement and jagged edges of memory and erasure. The arrangement invites viewers to experience the push-and-pull of resilience against fragility, embodying the abstract concept without specific imagery.</desc>
