<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilient Intersections</title>
  <desc id="desc">This composition explores the emotional tension between quick bursts of energy (spark) and the soft residue of experiences (ash). The palette, derived from muted sepia and dust gray with accents of faded blue, creates a sense of layered memory. The main collision between these elements occurs in the center, where dense clusters of color interrupt lighter fields, representing the struggle between hunger (desire) and restraint (containment). The patterns of lattice and halo interplay, forming a visual echo of contrast that reflects resilience against fragility through jagged edges.</desc>
