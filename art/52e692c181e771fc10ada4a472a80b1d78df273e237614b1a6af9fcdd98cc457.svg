<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger for Silence</title>
  <desc id="desc">This composition reflects the contrasting emotions of desire and emptiness. The top half, rich in warm hues (reds and pinks), embodies desire through a negative cross pattern that appears to bubble up, conveying a sense of longing and a saturated pull. The bottom half uses cool, muted tones (charcoal and hollow blue) framed by darker edges, echoing the concept of emptiness and containment. The contrast occurs prominently where the warm and cold colors intersect, creating tension that signifies the struggle between the two emotions. The broken pixels introduce intentional disruptions, enhancing the feeling of imperfection and unresolved longing.</desc>
