<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger in Restraint</title>
  <desc id="desc">This composition navigates the tension between desire and emptiness through color contrast and arrangement. The palette—featuring hot coral and blood orange—evokes a warm pull of desire, countered by the cool calmness of hollow blue, which represents the sense of emptiness. The corner invasion layout creates an asymmetrical dynamic where saturated colors creep diagonally across the space, interrupted by negative areas of charcoal interspersed to evoke the feeling of containment and restraint. Broken pixel elements introduce disruption, echoing the emotional jaggedness of the theme. The composition maintains a quiet pressure that suggests longing without resolution.</desc>
