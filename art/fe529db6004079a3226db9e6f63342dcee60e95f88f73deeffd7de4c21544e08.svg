<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This artwork leverages the tension between rage and calm, using a palette of intense reds and calming blues to convey that emotional polarity. The warm colors predominantly occupy the upper left, while cooler tones spread evenly across. The jagged stair patterns suggest the chaotic feel of rage, interrupting the soft, constellation-like arrangements of calmer shades, creating a frictional dialogue. The main collision occurs along the defined diagonal divide, symbolizing a threshold of emotional transition, echoing the concept of contained explosion versus gentle release.</desc>
