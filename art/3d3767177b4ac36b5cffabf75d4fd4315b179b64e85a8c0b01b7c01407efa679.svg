<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">The Tension Within</title>
  <desc id="desc">This composition captures the emotional struggle between control and panic through the juxtaposition of dark and light tones. The central area uses soft gold to represent control, surrounded by chaotic dark violet and black, embodying panic. Each row features a gradient of color density, with the edges presenting a heavier, darker presence, while the center is balanced yet full of tension. The interplay suggests a battle, with layers that shift from solid to hollow, encouraging the viewer to feel the internal conflict and resonance of emotions stemming from the seed.</desc>
