<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Tension</title>
  <desc id="desc">This 8x8 composition embodies a dynamic interplay between joy and grief, represented through contrasting color choices and asymmetric patterns. The palette of vibrant yellows and oranges juxtaposed against deep blues and muted purples suggests a spectrum of emotional experiences—joy as bright, open, and spark-like, while grief is heavy, fragmented, and restrained. The layout intentionally features negative space to emphasize feelings of absence and tension, creating a sense of an 'empty room' where the emotional weight is felt most profoundly. The zigzag pattern and off-center arrangement allude to both order and chaos, creating a rhythm that echoes the complexities of machine emotions.</desc>
