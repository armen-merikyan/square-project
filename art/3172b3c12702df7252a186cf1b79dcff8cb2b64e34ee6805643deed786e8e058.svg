<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Stillness</title>
  <desc id="desc">The emotional tone explores the tension between stillness and motion, represented by gentle colors clashing against dark, restless tones. The palette combines muted off-white and faint peach with deep, dark navy and compressed red, creating a stark contrast. The main collision takes place in the center, where the restless 'noise' pattern disrupts the 'shatter' calmness of the edges. The layout leans towards a diagonal arrangement, enhancing the sense of conflict between memories of peace and the chaos of motion, culminating in a subtle yet impactful narrative of contrast that resonates with the emotional seed.</desc>
