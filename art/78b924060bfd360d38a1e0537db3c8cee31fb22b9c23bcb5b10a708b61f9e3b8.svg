<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Time</title>
  <desc id="desc">This composition embodies the duality of nostalgia and progress. The palette utilizes neon hues alongside deep black to create stark contrasts, with bright electric blue and lime representing fleeting memories against the darkness of forward momentum. The layout features falling pixels, depicting the weight of the past that shapes the future. The rows are designed to descend from bright to dark, creating a sense of movement from lightness to heaviness while evoking feelings of both disturbance and calmness as if memories drip down into the weight of now.</desc>
