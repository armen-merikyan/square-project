<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tide of Tension</title>
  <desc id="desc">The artwork embodies a clash between certainty and curiosity, with a dominant dark side suggesting stability and the opposing lighter side representing exploration. The palette of navy, black, and dim cyan conveys a mysterious depth, while the hint of white adds a spark of curiosity. The interplay between the patchwork of dark colors on one side and the fragmented barcode-like patterns of lighter hues creates a dynamic tension, suggesting the struggle between order and chaos. The collision occurs toward the bottom right corner, where the vibrant curiosity jostles against the grounded certainty above, encapsulating the emotional ripple of rising signals amid the receding chaos.</desc>
