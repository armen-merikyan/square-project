<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Suspicion</title>
  <desc id="desc">This composition reflects the emotional tension between trust and suspicion through a palette rooted in guilt and forgiveness. The darker tones represent suspicion, embodying a shadowy presence, while the warmer hues evoke a soft glow of trust. The split vertical layout creates a strong visual divide, heightened by irregularities that evoke a feeling of disturbance. The center showcases a collision of deep wine and warm ivory, creating an intensity of emotion that forces interaction. The use of broken pixels serves to symbolically fracture that emotional boundary, emphasizing the delicate balance between coherence and discord.</desc>
