  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This composition evokes an emotional tension between desire and emptiness, using a palette that reflects warmth and coolness. The top half expresses a saturated pull with rich colors, while the bottom half suggests a restrained presence with softer tones. The stark contrast between bright accents and muted fields creates a visual tension. The 'beacon' shape seed guided the layout and interplay of patterns, leading to a sense of collision between the two emotional states, embodied in the abrupt transition from warm to cool tones.</desc>
