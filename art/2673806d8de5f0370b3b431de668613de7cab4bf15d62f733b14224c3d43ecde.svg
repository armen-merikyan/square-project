<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Reckoning</title>
  <desc id="desc">This artwork embodies the emotional discord between envy and gratitude, reflected in the contrasting colors and patterns. The palette, featuring lime, black, electric blue, and magenta, creates a visual tension—warm magenta and lime experiences collide with the cool and heavy tones of black and blue. The layout suggests a mirror, yet with intermittent breaks that embody the imperfections of emotional reconciliation. The soft edges hint at a rising vs. falling movement, while negative space adds an aspect of emptiness, enhancing the overall tension and invitation to introspection. The pattern distribution emphasizes both chaotic and orderly emotions, culminating in a complex narrative of conflict.</desc>
