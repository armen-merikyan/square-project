<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Boundaries</title>
  <desc id="desc">This composition explores the emotional dichotomy of control versus surrender. The palette, a blend of warm (honey gold, ripe green) and subdued (deep olive, cream) tones, reflects warmth battling coolness, suggesting a complex emotional landscape. The main collision occurs in the center, where warm hues (representing control) interact with cooler tones (suggesting surrender), creating a visual tension. Broken pixels introduce subtle imperfections, enhancing the theme of disrupted flow. The diagonal wedge layout symbolizes the push-pull dynamic inherent in the concepts.</desc>
