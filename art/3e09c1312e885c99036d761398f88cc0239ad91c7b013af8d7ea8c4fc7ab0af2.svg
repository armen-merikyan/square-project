<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">This piece embodies the emotional tone of tension between rage and calm, using a palette of red and black for intensity and pale blue and white for serenity. The dominant black and red colors create a strong visual collision on the left, while the softer pale blue and white lend a sense of calm on the right. The layout flows clockwise, with broken dots representing calmness, disrupted by jagged edges of rage, creating an abstract narrative of grappling emotions. The colors clash and harmonize, shifting from chaos to quiet, embodying the push and pull of emotional release amid pressure.</desc>
