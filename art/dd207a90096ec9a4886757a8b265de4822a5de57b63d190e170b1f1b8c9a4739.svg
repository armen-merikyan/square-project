<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition embodies the emotional contrast between emptiness and desire. The dark, muted palette of charcoal and hollow blue creates an expansive sense of emptiness, while splashes of hot coral and blood orange pulse with life, suggesting desire. The corner invasion layout initiates an emotional push from the edge toward the center, revealing the tension of desire reaching out against the confinement of the surrounding emptiness. The broken dots pattern reflects disruption and imperfection, capturing the chaotic nature of longing, while the saturated threshold of color embodies the overwhelming feeling of need. The main contrast occurs in the central area where the bright colors collide with the quiet, dark fields, creating a dynamic tension.</desc>
