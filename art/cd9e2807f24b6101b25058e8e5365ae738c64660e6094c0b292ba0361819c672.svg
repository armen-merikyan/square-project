<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Motion</title>
  <desc id="desc">The emotional tone contrasts the settled nature of peace against the turbulence of restlessness. The palette of soft gold, warm ivory, ash gray, deep wine, and stain brown was chosen to reflect feelings of warmth and nostalgia while also presenting a stark backdrop suggesting unease. The arrangement promotes a visual conversation between calm and chaos through the use of interrupted lines in the left side and dense clusters of color on the right. The broken pixels serve as imperfections that echo the restlessness experienced, providing a tangible disruption of flow that disrupts any sense of serenity. The diagonal arrangement of colors encapsulates the 'rise_vs_fall' essence of the seed.</desc>
