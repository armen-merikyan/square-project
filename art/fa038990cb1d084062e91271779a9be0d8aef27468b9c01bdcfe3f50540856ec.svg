<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Emotion</title>
  <desc id="desc">This piece contrasts the heaviness of dread with the lightness of relief through a strategic placement of dark and light colors. The palette, featuring navy and dim cyan, reflects somber undertones, while the intentionally broken pixel arrangement introduces an element of imperfection, mirroring the chaos of emotion. The top-weighted design emphasizes an emotional pull downward, as if gravity itself holds the viewer's gaze. The interplay between darker backgrounds and lighter 'rain' patterns creates an echoing sense of conflict, revealing tension amidst scattered spaces that symbolize emptiness and solitude.</desc>
