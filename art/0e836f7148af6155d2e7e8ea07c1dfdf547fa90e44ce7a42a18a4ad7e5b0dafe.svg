<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Contrasts</title>
  <desc id="desc">This composition captures the emotional dichotomy between envy and gratitude, suggested through the contrasting palettes of muted greens (for envy) and warm tans (for gratitude). The zigzag motion of colors creates tension and a sense of lightness against heavier tones, embodying the idea of weight. The layout flows like falling pixels while maintaining negative space, representing moments of introspection amidst clashing emotions. The broken pixels interrupt the smooth transitions, echoing the theme of imperfection in emotional experiences.</desc>
