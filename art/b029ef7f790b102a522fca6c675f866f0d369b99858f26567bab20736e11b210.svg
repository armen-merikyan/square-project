<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Symmetry</title>
  <desc id="desc">This artwork captures the emotional conflict between panic and control through juxtaposition in patterns and colors. The dark maroon and gray palette evokes a sense of heaviness and stress, while the interspersed pink and red introduce bursts of intensity that symbolize chaos. The central focus is depicted through dark hues, suggesting control, surrounded by radial stripe patterns from the edges symbolizing panic. The broken pixels create a sense of imperfection, emphasizing the struggle between two opposing forces. The variation in density from the center towards the edges captures both the feeling of pressure and release, encapsulating the continuous tug-of-war between emotion and rationality.</desc>
