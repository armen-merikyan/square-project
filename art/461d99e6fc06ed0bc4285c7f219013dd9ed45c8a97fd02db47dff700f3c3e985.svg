<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork explores the tension between desire and restraint, channeling a saturated pulse of color into a contained space. The color palette consists of warm hues like hot coral and blood orange reflecting desire, while the cooler shades such as hollow blue and charcoal symbolize restraint. The arrangement creates a dynamic interplay where dense clusters of saturated colors clash with the quiet spaces on the edges, embodying the battle within. The chaotic spiral of warm colors is interrupted by cool threads, symbolizing the struggle between the urge to expand and the confinement imposed by negative space. This leads to a central tension, visually representing how desires may reach eagerly but are ultimately contained.</desc>
