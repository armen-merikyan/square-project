<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece embodies the emotional duality of vulnerability and strength. The central area utilizes dense and stable colors, primarily a muted purple, suggesting protection, while the periphery employs brighter, warmer colors like orange and yellow to represent exposure and vulnerability. The main contrast surfaces through a collision between warm tones in the corners and a cooler, deeper blue around the edges, echoing the tension between safety and unguardedness. The use of broken pixels adds a dynamic quality, reflecting imperfections inherent in both strength and vulnerability, while ensuring the piece remains abstract and non-representational.</desc>
