<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos and Order</title>
  <desc id="desc">The emotional tone of the piece contrasts the feelings of panic and control, manifested through the pattern of an empty room where structure meets chaos. The palette of lime, black, electric blue, and magenta embodies vibrancy against darkness, representing the clash between stability and unpredictability. The electric blue and lime represent control and order, while flashes of magenta signify the intrusions of chaos. This interplay creates tension as the stronger colors ('control') dominate one side while the other fades into a chaotic interplay of hues, evoking a sense of instability. The broken pixels introduce imperfection, adding to the feeling of disruption, while maintaining enough negative space to suggest a quiet tension, inviting contemplation on the balance between chaos and order.</desc>
