<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Balance</title>
  <desc id="desc">The emotional tone balances restlessness and peace through contrasting colors and patterns. The earthy palette evokes a sense of raw emotion (red oxide, blackened plum) battling against calmness (muted cream, iron gray). The layout emphasizes a pressure corner, where deeper, darker colors mingle with light hues, creating a swirling effect at the top right. This reflects the seed's themes of motion versus stillness, suggesting interrupted flow and unresolved tension, where patches of peace attempt to hold against the chaos of restlessness.</desc>
