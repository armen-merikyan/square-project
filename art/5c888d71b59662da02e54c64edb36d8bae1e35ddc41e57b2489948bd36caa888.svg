<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotions in Flux</title>
  <desc id="desc">This piece encapsulates the emotional tension between joy and grief through the use of contrasting colors. The bright yellows and oranges evoke bursts of joy akin to flames, while the muted purples and deep blues reflect the heavy weight of grief. The composition adheres to a split layout, visually dividing the canvas into two emotional realms. The collision between the warm, vibrant left side and the subdued, cooler right side represents an ongoing struggle between these feelings, filled with broken pixel elements that signify imperfection and chaos inherent in authentic emotion. The subtle flickers of light amidst the dark create a rhythm, representing the oscillation between hope and despair.</desc>
