<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Calm</title>
  <desc id="desc">The emotional tone shifts between restlessness and peace, embodied in warm and cool colors. The chosen palette of hot coral, blood orange, dust pink, and charcoal suggests a push-pull dynamic, where the warm colors occupy the diagonal wedge representing restlessness, while the hollow blue and lighter tones represent peace in the opposite wedge. The collision occurs in the center of the grid, where colors meet and intermix, creating a tension that resonates with the contrast of overwhelming noise and serene calm. Broken pixels are purposely introduced to signify disruptions in this emotional landscape, leading to a fragmented yet cohesive whole.</desc>
