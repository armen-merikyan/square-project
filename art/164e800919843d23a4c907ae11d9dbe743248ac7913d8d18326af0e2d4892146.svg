<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Uncertainty</title>
  <desc id="desc">This artwork explores the emotional contrasts between joy and grief through a blend of vibrant and muted hues. Warm yellows and oranges collide with the deep blues and purples, symbolizing the tension between expanding joy and the weight of grief. The left side features a dotted pattern representing joy, while the right adopts a grid layout for grief, creating a palpable split. The main collision occurs centrally where vibrant colors disrupt the organized grid, heightening emotional intensity. Negative space is strategically incorporated to enhance feelings of emptiness and tension, inviting viewers to navigate their own emotional journey.</desc>
