<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Echo</title>
  <desc id="desc">The emotional tone oscillates between the oppressive dread represented by darker shades and the fleeting relief depicted by lighter colors. The palette of sepia, tan, dust gray, and faded blue illustrates broken memory and provides a nostalgic yet heavy atmosphere. The contrast between dense dark blocks and fragmented lighter patterns creates tension and unease, reflecting the seed's themes of symmetry versus break and layering weight. The rule of falling pixels emphasizes a sense of descent and gravity, encapsulating the emotional struggle of raising memories intertwined with feelings of despair.</desc>
