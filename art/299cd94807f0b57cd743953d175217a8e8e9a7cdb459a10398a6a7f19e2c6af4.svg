<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order Meets Chaos</title>
  <desc id="desc">The emotional tone revolves around the tension between spark and ash, reflecting resilience versus fragility. The palette balances mourning black with a soft residue of gray and highlights of vibrant color that symbolize life and sudden bursts of energy. The main collision occurs diagonally across the center, where the clean pattern of the spark contrasts sharply against the jagged, glitch-like pattern of ash. This arrangement visually narrates a story of conflict and resolution, echoing the dynamic emotions involved.</desc>
