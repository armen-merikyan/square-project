<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">The emotional tone addresses the duality of restlessness and peace, with a palette reflecting 'melancholy wonder'—cool blues and soft purples juxtaposed with muted whites. The left side employs a radial disruption pattern to embody restlessness, while the right features the calm of structured stairs for peace. Main collision occurs at the center, where these two contrasting emotions interact, creating a visual representation of tension against resolution. The inclusion of broken pixels intentionally disrupts the ordered side, signifying shattering moments amid tranquility.</desc>
