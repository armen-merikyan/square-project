<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This piece embodies the emotional tension between vulnerability and strength. The core palette of muted off-white and dust gray suggests fragility and quietness, while compressed red punctuates the composition with bursts of emotional intensity. The layout focuses on a small bright cluster that creates a striking contrast against the overall dimness, representing fleeting moments of strength amidst pervasive vulnerability. The flow suggests fractured motions with a barcode-like pattern reflecting strength on one side and a stepwell texture signaling vulnerability on the other. This collision is most pronounced at the center, where the two patterns mingle, creating an intentional interplay between chaos and balance.</desc>
