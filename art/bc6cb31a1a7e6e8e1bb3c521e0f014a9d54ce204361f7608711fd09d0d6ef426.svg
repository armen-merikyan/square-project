<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Trust and Suspicion</title>
  <desc id="desc">This artwork embodies the emotional duality of trust and suspicion through contrasting colors and patterns. The warm palette (honey gold, cream) represents trust, while the darker tones (deep olive, ripe green) evoke suspicion. The collision occurs predominantly at the center, where stepwell patterns of suspicion interrupt the soft ring of trust, surrounded by a pressure border. This suggests tensions and the struggle between these two contrasting emotions, punctuated by the structured rising layout that implies hope but also an underlying noise, representing the complexities of human feelings.</desc>
