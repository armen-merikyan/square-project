<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Edges</title>
  <desc id="desc">The artwork explores the emotional conflict between defiance and submission through a primarily dark palette, evoking a sense of tension and unease. The use of deep wine and stain brown provides a warm yet heavy foundation, symbolizing submission's weight, while the vibrant accents in soft gold disrupt the quiet with bursts of defiance. The patterns of broken dots and frames create a chaotic rhythm that echoes toward the center, where the main collision of colors occurs. Here, the contrasting emotions coil tightly around an off-center focal point, representing the ever-present struggle between control and chaos.</desc>
