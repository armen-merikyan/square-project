<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">This artwork embodies the emotional duality of joy and grief. The palette of bright yellows and muted purples captures joy's brightness and grief's heaviness, creating a tension between the two emotions. The left side features brighter colors in a 'stairs' pattern, symbolizing joy's upward movement, while the right side uses a 'target' pattern in darker tones, reflecting the weight of grief. The top-weighted edge emphasizes the struggle against gravity, enhancing the sense of conflict. The deliberate placement of broken pixels introduces imperfection, suggesting the complexity of human emotions, while the negative spaces provide moments of relief amidst the dense arrangements.</desc>
