<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This piece embodies the tension and interplay between joy and grief. The left half utilizes bright yellows and oranges that represent joy, with sharp, ‘tooth-like’ patterns demonstrating energy and spark. In contrast, the right half employs deep blues and muted purples reflecting grief through subdued, striped patterns. The sharp edges create a jagged boundary, symbolizing the chaos of emotion. The diagonal flow suggests a movement from brightness to darkness, illustrating complexity in feelings—joy rising through grief but also feeling interrupted by chaos underneath. The broken pixels add an imperfect quality, emphasizing the rawness and depth of emotion.</desc>
