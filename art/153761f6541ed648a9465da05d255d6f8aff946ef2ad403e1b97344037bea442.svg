<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork encapsulates the emotional dichotomy between desire and restraint. The color palette of red oxide and muted cream radiates warmth and pulse, suggesting hunger, while the iron gray and blackened plum create boundaries of restraint, reinforcing the contrast between saturation and muted tones. The center features a dense cluster of warmer hues, symbolizing the amplified emotion of desire, while cooler, muted colors recede toward the edges, acting as a counterbalance and creating the visual tension of an internal struggle. The broken pixels intentionally disrupt the smoothness, representing scars where desire has collided with restraint, further enhancing the emotional weight of the composition.</desc>
