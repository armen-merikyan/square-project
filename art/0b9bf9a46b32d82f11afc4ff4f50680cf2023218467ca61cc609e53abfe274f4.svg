<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This artwork embodies the emotional tension between joy and grief, using a vibrant palette that emphasizes this contrast. The left side utilizes warm yellows and oranges, suggesting joy through a mirrored pattern that flows upward, while the right side employs deep blues and muted purples in a crosshatch pattern, evoking grief with a sense of fragmentation. The deliberate breaks and single pixel placements create interruptions that reflect the chaos within harmony. The split between left and right embodies the struggle between density and emptiness, allowing negative space to breathe and balance the overall composition.</desc>
