<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shadows of Strength</title>
  <desc id="desc">The emotional tone captures the dual nature of vulnerability and strength, creating a tension between raw exposure and protective layers. Using a palette of 'safety_exposure' colors, I emphasized a warm brown as the dominant field, representing strength and stability, against accents of cold white and open blue suggesting vulnerability and exposure. The central collision occurs at the edges where the deeper colors meet the lighter shades, embodying the push and pull of signals rising inward, creating a feeling of both shelter and exposure. This balance is disrupted intentionally with broken pixels to add texture, echoing imperfection in the conflict of these emotions.</desc>
