<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Discovery</title>
  <desc id="desc">This composition captures the emotional dichotomy between certainty and curiosity, represented through contrasting colors and patterns. The palette features deep navy and black to evoke a sense of grounded certainty, while dim cyan introduces a cooler, inquisitive note. The dark colors dominate the grid, creating a stable foundation, while bursts of dim cyan crack through, conveying curiosity's disruptive nature. The layout pressures one corner with rich colors, creating a visual heartbeat that suggests movement and an upward journey, embodying the rising signal. Overall, the arrangement illustrates a collision of structured paths and emerging cracks, reflecting the ongoing tension between knowing and exploring.</desc>
