<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This artwork embodies the tension between vulnerability and strength. The palette features soft hues of lavender gray, soft cyan, and moon white to represent fragility and lightness, contrasted with deeper tones of rain blue and muted plum to symbolize strength and grounding. The central area reflects vulnerability with a pale interior surrounded by dense, stronger color blocks exhibiting a crack-like pattern. The 'halo_void' layout emphasizes negative space, creating a contrast between the sparse center and the more populated edges, mirroring the contrast of exposed feelings against protective barriers.</desc>
