  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone explores the tension between love and betrayal, represented by warm and cool colors. The palette features soft pinks and reds symbolizing love on the outer edges, while deeper gray and dark maroon tones in the center indicate the quiet pain of betrayal. The contrasting patterns of a grid in the outer frame suggest order and warmth, and dotted chaos inside represent fragmentation. The main collision occurs where the transition between warm edges and cooler center takes place, embodying the theme of rising signals and falling trust.</desc>
