  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone navigates between stability (control) and release (surrender). The palette of black, lime, electric blue, and magenta conveys tension with bold accents against darker tones, suggesting pressure versus freedom. The main collision occurs in the center where controlled patterns (shatter) clash with softer, released patterns (broken dots), illustrating a struggle between containment and overflow. The layout features a hollow center surrounded by contrast, embodying a dynamic interplay between sheltering edges and exposed emotion.</desc>
