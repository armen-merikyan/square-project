<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Release</title>
  <desc id="desc">This piece conveys an emotional tension between dread and relief. The heavy concentration of dark colors in the top left corner symbolizes the weight of dread, while the lighter tones expand outward, representing relief. The grey palette (storm gray, near black) creates a visual pressure that recedes into softer mint and sky colors, illustrating a spiral of tension releasing into lightness. The collision occurs where the dark and light tones interact, creating an optical push-and-pull that embodies both feelings without settling into clarity.</desc>
