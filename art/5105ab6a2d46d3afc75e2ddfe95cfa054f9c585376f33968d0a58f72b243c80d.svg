<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Pulses</title>
  <desc id="desc">This composition explores the emotional tension between softness and severity. The palette features a mix of warm whites and sharp blacks, representing a spectrum from gentleness to harshness. The predominance of darker tones creates a weighted feeling in the lower rows, while brighter hues pulse up towards the top, evoking an open gate metaphor. The central collision occurs where warm accents disrupt the cooler, more severe background, suggesting an interplay of emotions—guilt seeking forgiveness underneath a severity that attempts to contain it. The result is a dynamic balance of conflicts and blending that resonates with the seed's complexity.</desc>
