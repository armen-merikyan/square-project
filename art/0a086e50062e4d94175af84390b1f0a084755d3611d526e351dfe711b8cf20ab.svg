<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotion Collision</title>
  <desc id="desc">This artwork encapsulates the struggle between joy and grief. The contrasting palette of vibrant yellows and oranges alongside muted blues and purples emphasizes the emotional dichotomy. The outer rows are heavier with dark hues, embodying grief, while the inner core bursts with bright, expanding colors reflecting joy. The asymmetrical placement of broken pixels introduces a sense of interruption, allowing collision between opposing feelings, while the negative space invites contemplation of unresolved emotion. This composition reflects a pulse of emotion in constant flux, capturing the essence of personal struggle and the unpredictable nature of love and loss.</desc>
