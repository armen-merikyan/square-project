<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">The emotional tone of this piece captures the tension between restlessness and peace. The palette combines warm hues of hot coral and blood orange with cooler tones of charcoal and hollow blue, creating a dialogue of desire and emptiness. The main collision occurs at the center of the square, where brighter colors interrupt darker fields, suggesting the struggle of memory against the fluidity of motion. Deliberate breaks along the edges symbolize the 'broken frame' layout, allowing areas of negative space to convey peace amidst the underlying chaos of restlessness.</desc>
