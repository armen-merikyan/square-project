<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resilience</title>
  <desc id="desc">This artwork expresses the tension between the vibrancy of life's sparks and the quiet shadows of loss. The palette blends bright yellows and oranges representing 'spark' with muted purples and deep blues reflecting 'ash,' creating a dynamic contrast. The layout design divides the canvas, suggesting a threshold of experience, where jagged edges interrupt the calm, lending an imperfect quality. The patterns—stepwell for the spark and crosshatch for ash—create a rhythmic pulse that captures the essence of conflicting emotions, hinting at memories that linger between resilience and fragility.</desc>
