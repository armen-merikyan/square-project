<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This artwork captures the tension between tenderness and rage, represented through an interplay of warm and cool hues. The palette combines saturated red, a manifestation of rage, with muted tones of pale blue and black to evoke tenderness. The layout creates a threshold, splitting the canvas into two emotional realms intersecting at the center. The jagged pattern of reds suggests chaos, while the gentle checker of blue implies softness – an emotional collision representing the complex nature of human feelings. The edges fade to imply a sense of vulnerability, inviting contemplation on guilt and forgiveness. Broken pixels disrupt the harmony, reflecting the imperfections in emotions.</desc>
