<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Tensions</title>
  <desc id="desc">The emotional tone of defiance contrasted against submission creates a dynamic interplay where the core tension symbolizes a struggle for dominance visually expressed through color and disruption. The palette features warm hues of hot coral and blood orange symbolizing defiance against a backdrop of cooler dust pink and charcoal, emulating surrender. The collision occurs at the center, where these colors meet, representing the core of the conflict amidst eroded symmetry at the edges, suggesting that the submission softens the impact while defiance remains vibrant. Broken pixels introduce intentional flaws, resembling the scars of this internal battle, and the negative spaces enhance the emotion of emptiness, complementing the theme of desire and desolation.</desc>
