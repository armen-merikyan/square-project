<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Dark</title>
  <desc id="desc">This artwork captures the emotional struggle between fear and hope. The palette of deep black, dark violet, soft gold, and pale green establishes two distinct emotional zones. The heavier presence of dark colors in the corners suggests a fear element, whereas the brighter central pixels suggest hope rising. The zigzag pattern breaks the uniformity, creating a tactile sense of interruption and chaos against the structured hope. The broken pixels further emphasize imperfection in both emotions, suggesting resilience amidst tension. Patterns clash and collide, with a central light shining against the oppressive darkness—mirroring the struggle within.</desc>
