<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Release</title>
  <desc id="desc">This piece captures the emotional duality of joy and grief through a sharp contrast in colors and patterns. The left side embodies grief with muted purples and blues arranged in a crosshatch pattern, suggesting heaviness and introspection. The right side, vibrant with yellows and oranges in a stair-step layout, symbolizes joy and expansion. The jagged edges create disruptions, emphasizing collision and tension, while leaving negative space to enhance emotional impact and reflect the stillness amid chaos. The interplay of the two halves illustrates the struggle between pressure and release.</desc>
