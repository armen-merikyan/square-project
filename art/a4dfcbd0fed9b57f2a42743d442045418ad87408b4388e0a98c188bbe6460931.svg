<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">The emotional tone portrays a clash between defiance and submission, capturing the essence of resistance and yielding. The palette consists of vibrant oranges and yellows against muted purples and deep blues, creating an emotional warmth pitted against cool, introspective sadness. The main contrast and collision occur diagonally, with the defiant warm hues clustering densely in one corner, representing boldness, while the retiring cool colors drift toward the opposite edge, indicating submission. Broken pixels introduce intentional disruption, echoing the tension between these opposing forces. The composition embodies a dynamic flow of conflict, where the center represents the anxious peak of this duality.</desc>
