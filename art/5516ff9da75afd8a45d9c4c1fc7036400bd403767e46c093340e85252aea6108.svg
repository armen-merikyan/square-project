  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the tension between vulnerability and strength through its color dynamics and layout. The palette 'hunger_restraint' features a deep red oxide that represents strength, contrasted against soft muted creams suggesting vulnerability. The layout highlights a jagged edge, where colors appear to either shield or break away, conveying a sense of pressure and emotional conflict. The broken pixels introduce intentional imperfections, echoing the theme of exposure, while leaving strategic negative space for visual breathing room. The central collision occurs in the middle, where muted cream clashes against a strong blackened plum, embodying the struggle at the intersection of both emotions.</desc>
