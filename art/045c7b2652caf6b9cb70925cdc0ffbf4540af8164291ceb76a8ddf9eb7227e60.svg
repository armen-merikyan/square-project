<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Longing and Resolve</title>
  <desc id="desc">This artwork captures the emotional tension between longing and resolve through its contrasting color fields. The top half features a ripple pattern with warm clay and distant lilac representing rich undercurrents of desire, while the bottom half uses pressure bands of cool blue and warm shadow to evoke the firmness of resolve. The collision of these two emotional states is concentrated around the diagonal flow of the artwork, reflecting a movement from calm to tension. The use of the halo border introduces a frame that both restricts and liberates, embodying the duality of intimacy and distance, while broken pixels serve as intentional disruptions, hinting at fragility amidst strength.</desc>
