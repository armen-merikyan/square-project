<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">This piece captures the emotional tension between joy and grief through a dynamic interplay of colors. The palette is derived from bright yellows and oranges to symbolize joy, contrasted with deep blues and muted purples representing grief. The composition features a structured grid on the left, representing the stability of joy, while the right side intentionally disrupts this order with 'broken dots,' symbolizing grief's unpredictability. The edges are bottom weighted, creating a sense of heaviness that contrasts with the lightness of the center, echoing the pulse of emotions within the square layout.</desc>
