<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Echo</title>
  <desc id="desc">The artwork reflects the contrasting emotional states of joy and grief, rooted in a split-screen layout. The left side employs bright colors (yellow and orange) to signify joy, featuring broken dot patterns that evoke a sense of expansion and warmth. In contrast, the right side adopts muted blues and purples, embodying grief through dense dots, suggesting fragmentation. The interplay creates a feeling of tension and release, mirroring the cyclical struggle between feeling safe versus threatened. The central area, marked by subtle shifts in color, symbolizes the complexity of emotional experience, acting as a bridge between hope and melancholy.</desc>
