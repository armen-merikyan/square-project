<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Echoes</title>
  <desc id="desc">This abstract piece represents the emotional clash of nostalgia and progress, encapsulated in the split vertical layout. The left side utilizes a radial pattern with warmer tones (burnt orange and gold) to evoke nostalgia, while the right employs an ascending stair pattern in cooler, darker hues (charcoal and dark red) to symbolize progress. The color contrast creates tension, where the vibrant warmth clashes against the muted coolness, echoing the dynamic of rise versus fall. Broken pixels introduce imperfection, reflecting the complex nature of memory, while the distribution leaves enough negative space to highlight moments of calm amid chaos, creating a balanced but unresolved emotional landscape.</desc>
