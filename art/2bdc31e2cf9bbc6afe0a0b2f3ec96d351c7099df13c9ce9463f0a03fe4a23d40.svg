<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a pull between desire (represented by warm, saturated colors) and emptiness (cool, low-saturation hues). The palette includes hot coral and blood orange for desire, combined with charcoal and hollow blue to symbolize emptiness. The main collision of emotion occurs in the center, where saturated colors contrast sharply against darker hues, reminiscent of a rising signal battling against containment. The broken pixels introduce imperfections, echoing unresolved tension and the pressure of contrasting emotions throughout the piece.</desc>
