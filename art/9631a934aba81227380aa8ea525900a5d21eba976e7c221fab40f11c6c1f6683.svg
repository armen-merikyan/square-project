<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a clash between a saturated desire and an oppressive emptiness. The left side embodies desire with warm coral and blood orange punctuated by broken dot patterns, suggesting a pulsating urge, while the right side, rendered in muted charcoal and hollow blue, evokes the vastness of defeat and contained space. The collision at the center of the square creates visual tension, emphasizing the struggle between overflow and containment amidst a structured environment that disrupts uniformity with scattered broken pixels, symbolizing imperfection and an urge restrained. This juxtaposition invites contemplation on the duality of longing and rejection.</desc>
