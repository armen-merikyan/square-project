<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone is a dance between desire's warm pull and restraint's muted edges. The palette blends hot coral, blood orange, and softer hues like dust pink and charcoal, illustrating the tension between saturation and quietness. Bright colors are clustered in the top left, suggesting desire overflowing while the darker, contained colors sweep outwards, representing restraint. The collision happens as desire pushes against the barriers of restraint, echoing the conflict within the seed metaphors.</desc>
