<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Waves of Tension</title>
  <desc id="desc">This piece explores the emotional tension between control and panic, framing a chaotic zigzag pattern against a backdrop of order. The warm reds and cool grays create a striking contrast that speaks to the clash of emotions. The palette reflects a narrative of love betrayed, utilizing deep maroon to emphasize moments of high tension amidst the lighter tones of pink and gray. The broken pixels introduce an element of imperfection, symbolizing the interrupted sense of control. This composition is both chaotic and structured, echoing the patterns of argument and resolution within human emotions.</desc>
