<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Yearning</title>
  <desc id="desc">The emotional tone is a struggle between warmth representing desire and coolness illustrating emptiness. The palette comprises warm shades like hot coral and blood orange signifying overwhelming desire, contrasted with the cool hollow blue representing volume and distance. The center is dominated by clustered warm colors that pulse against a backdrop of cooler hues, creating an unresolved tension. Patterns of rain and crosshatch collide, depicting the chaotic interplay of yearning and restraint, while broken pixels provide intentional disruptions echoing the sensation of desire thwarted by boundaries. The edge style emphasizes the sealed containment of want, enhancing the narrative of struggle.</desc>
