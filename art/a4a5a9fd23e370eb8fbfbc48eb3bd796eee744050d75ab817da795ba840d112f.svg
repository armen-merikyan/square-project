  <title id="title">Hunger Along Constraints</title>
  <desc id="desc">This artwork embodies the emotional tension between desire (represented by warm colors) and restraint (manifested through muted tones and limited marks). The palette consists of vibrant shades like hot coral and blood orange to evoke desire, contrasted with charcoal and hollow blue to symbolize restraint. The main collision occurs diagonally, where the vibrant 'rain' pattern of desire meets the sharp, structured 'teeth' pattern of restraint, creating a dynamic interplay that speaks to the push and pull of these emotions. This collision reflects the struggle between yearning and limitation, resulting in a complex yet harmonious composition.</desc>
