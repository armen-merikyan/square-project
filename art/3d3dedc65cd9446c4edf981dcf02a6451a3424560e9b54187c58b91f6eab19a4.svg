<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Tension</title>
  <desc id="desc">The emotional tone oscillates between restlessness and peace, reflecting a tension where memory grapples with movement. The chosen palette—moss green, bone white, rust, stone gray, and small gold—symbolizes resilience while addressing fragility through muted and warm tones. The primary contrast occurs at the diagonal edge, where the dissonant patterns of shatter and negative cross collide, creating an interruption in flow. This represents the seed’s dual nature, where light faces dark, suggesting an unresolved push against calmness and a striving for balance, ultimately capturing the push and pull of emotions in an abstract form.</desc>
