<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Sparks</title>
  <desc id="desc">The juxtaposition of ash and spark conveys an emotional tension that is both destructive and illuminating. The palette chosen—pale aqua, mist gray, alarm red, ink blue, and clear white—represents serenity amidst urgency. The top half reflects the spark's vibrancy with dynamic cross patterns, while the lower half embodies ash's muted noise, creating a stark contrast where the two collide in the center. This layout, combined with broken pixels, evokes a narrative of resilience against erasure and highlights the experience of memory interspersed with moments of sudden clarity.</desc>
