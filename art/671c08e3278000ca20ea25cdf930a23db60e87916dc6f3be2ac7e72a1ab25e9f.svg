<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition captures the emotional tone of 'softness vs severity' through a dialogue of color interplay and structural patterns. The palette combines soft hues of powder pink and warm white to represent gentleness, while the sharp crimson and carbon black embody the severity and weight of tension. The layout features an 'open gate' allowing for a dominant soft emotion (light tones) to occupy the central space but interrupted by dense, maze-like patterns of heavy tones. The intentional placement of broken pixels suggests disruptions in form, illustrating guilt and forgiveness as undercurrents. The rhythm created by the colors oscillates between calm and pressure, bringing forth a story of emotional conflict without literal representation.</desc>
