<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Echo</title>
  <desc id="desc">The emotional tone balances longing and resolve, with echoing layers representing conflict and harmony. The warm palette reflects 'softness' (powder pink, warm white) contrasting 'severity' (carbon black, steel gray, sharp crimson), creating a push-pull dynamic. The main collision occurs in a diagonal trajectory from the top corner, where the warm colors attract attention yet encounter the solidity of darker shades, suggesting tension between hope and repair versus damage. The use of broken pixels introduces intentional imperfections, enhancing the feel of disruptions and echoes, while negative space preserves introspection and avoids overcrowding.</desc>
