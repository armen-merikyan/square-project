<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order in Chaos</title>
  <desc id="desc">This piece embodies the tension between joy and grief, juxtaposed through a play of colors and patterns. The palette includes bright yellows and oranges representing joy, contrasted sharply against deep blues and muted purples symbolizing grief. The left half of the canvas employs a radial pattern overflowing with vibrancy, while the right uses a ring pattern that conveys a sense of containment and heaviness. Interruption is achieved through broken pixels disrupting symmetry, allowing for a feeling of unresolved emotions. The central pulse engages the viewer, leading them through a navigational grid that represents the conflict between structure and chaos, ultimately highlighting the depth of human experience.</desc>
