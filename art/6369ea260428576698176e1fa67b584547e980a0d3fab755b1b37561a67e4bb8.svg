<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inner Turmoil</title>
  <desc id="desc">This artwork captures the emotional tension between panic and control. The palette, dominated by electric blue and black, evokes urgency and depth, while the magenta introduces sparks of chaotic energy. The outer frame, created from the solid darker colors, represents control, while the fragmented, brighter hues within suggest the erratic nature of panic. The asymmetrical distribution of colors creates a sense of imbalance and urgency, reflecting the conflict between these emotions. The arrangement channels a zigzag pattern that mimics the disruptive nature of an argument, emphasizing friction yet maintaining zones of calm to symbolize moments of control.</desc>
