  <title id="title">Tension of Existence</title>
  <desc id="desc">This composition dives into the emotional dichotomy of tenderness and rage. The selected palette of saturated reds and muted pale blues captures the intensity of rage alongside the subtlety of tenderness. The main collision occurs in the center where jagged red patterns, representing rage, interrupt softer checker patterns of blue, symbolizing tenderness, creating a dynamic tension. The quiet channel layout allows both emotional states to be expressed with a balance of negative space enhancing the contrast.</desc>
