<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone embodies a conflict between softness and severity, informed by the central theme of containment versus overflow. The warm whites and powder pinks on the left side represent softness, while the stark carbon black and sharp crimson on the right embody severity, creating a striking contrast. The use of pulse marks on the left collides with sharp crosshatches on the right, manifesting the tension between these emotions. The primary interaction occurs at the center, suggesting a breaking point where softness meets hard lines. This arrangement reflects the spiral motion of the seed, emphasizing a flow that enhances the feeling of conflict and resolution within the square.</desc>
