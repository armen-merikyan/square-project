<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork conveys the conflict between the raw intensity of rage and the serene calm. The chosen palette of red, pale blue, and black visually represents this duality, with red symbolizing rage—intense and disruptive—while the pale blue signifies calmness and quietude. The arrangement follows a downward flow pattern, evoking an image of falling pixels, where the scarred black of rage disrupts the smoother tones of calm. The clash occurs prominently in the center, where jagged red interruptions penetrate the softer blue dots, thus embodying the emotional collision of containment versus overflow. The use of broken pixels adds intentional imperfections to both the rage and calm areas, reinforcing the theme of erosion. Negative spaces allow moments of pause amidst the emotional tension, creating a rhythmic breath within the artwork.</desc>
