<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone explores the tension between trust and suspicion. The palette of cosmic indigo and deep teal conveys a sense of depth and mystery, while cold gold acts as a bright accent amidst the darkness, representing fleeting trust. The split between darker hues and lighter tones creates a stark contrast, suggesting a collision between the stable and the unpredictable. The layout features a broken frame that symbolizes fractures in trust and the unpredictability of suspicion, as if the emotions are constantly leaking into one another. The arrangement emphasizes a diagonal flow, invoking a sense of instability against a backdrop of softness. Overall, the composition reflects the complexity of emotional states without becoming literal, allowing the viewer to feel the tension through color alone.</desc>
