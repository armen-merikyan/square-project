<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Silence</title>
  <desc id="desc">This composition embodies the clash between restlessness and peace. The color palette of pink, red, gray, and dark maroon enhances emotional depth, with pink embodying peace and warmth while the reds inject restlessness and urgency. The soft transitions of crosshatch patterns representing peace collide with the static disruptions symbolizing restlessness, creating tension primarily around the central axis—an area where the two emotions meet. The layout signifies falling pixels, echoing the gentle chaos of memory against the stuttering pulse of motion. Such contrasts generate a visual experience of unresolved dynamics, inviting viewers to explore their own reflections of calm and urgency.</desc>
