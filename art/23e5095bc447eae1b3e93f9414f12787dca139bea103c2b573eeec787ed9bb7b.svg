<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory and Motion</title>
  <desc id="desc">The emotional tone is rooted in the tension between the fleeting brightness of 'spark' and the muted remnants of 'ash', illustrating the push-pull of these contrasting states. The chosen palette of red and black provides a stark representation of volatility and calm, where red signifies bursts of energy and black serves as a grounding force. The split vertical layout emphasizes the collision of emotions: the left side mirrors energetic patterns while the right conveys a sense of calm decay. The main contrast occurs in the center, where explosive patterns collide with subdued echoes, suggesting the struggle between remembrance and forgetting. Broken pixels throughout serve to create intentional disruptions, enhancing the sense of memory's fragility.”,</desc>
