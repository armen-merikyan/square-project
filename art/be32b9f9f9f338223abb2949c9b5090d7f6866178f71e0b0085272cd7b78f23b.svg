<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This piece embodies the emotional tension between longing and resolve. The palette of moss green and rust evokes both resilience and fragility, reflecting the seed's themes. The top half contains the negative cross pattern of longing—disrupted lines in muted tones creating a feeling of incomplete forms. In contrast, the bottom half uses glitch-like patterns of more intense colors that signify resolve, with interspersed quiet fields to echo the pulse of difficult emotions. The intentional placement of broken pixels introduces visual scars that break the harmony, enhancing the theme of repair vs. damage, with a main collision of color occurring horizontally to separate the two emotional states distinctly.</desc>
