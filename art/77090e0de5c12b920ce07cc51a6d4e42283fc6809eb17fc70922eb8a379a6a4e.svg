<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger's Restraint</title>
  <desc id="desc">This composition reflects the tension between the contrasting emotions of emptiness and desire. The palette features warm tones like hot coral and blood orange that represent desire, designed to saturate the outer edges, while low-saturation colors like hollow blue and charcoal are used in the center to evoke a sense of emptiness. The main collision occurs at the border, where the saturated desire colors dramatically meet the subdued inner 4x4 section, symbolizing the struggle against containment. The broken pixels introduce intentional imperfection, enhancing the emotional pull of the piece.</desc>
