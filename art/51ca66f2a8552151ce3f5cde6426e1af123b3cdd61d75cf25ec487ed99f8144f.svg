  <title id="title">Tension of Pulses</title>
  <desc id="desc">This artwork explores the emotional themes of longing and resolve through contrasting colors and spatial arrangements. The palette combines vibrant coral and blood orange representing tension and desire, with softer shades of dust pink and hollow blue representing calmness and emptiness. The central collision occurs with dense clusters of warm hues interrupted by cooler tones in the corners, creating a dynamic push and pull. The layout of two pulsating centers encapsulates the essence of the emotional score - a struggle towards connection, marked by fragmented patterns that suggest both intimacy and distance, thus translating the seed into a compelling abstract narrative.</desc>
