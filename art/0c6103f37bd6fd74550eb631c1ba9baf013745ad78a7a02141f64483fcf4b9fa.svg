<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">This composition embodies the emotional tension between restlessness and peace through the use of contrasting colors and patterns. A palette of mourning black and pale yellow portrays the deeper themes of memory and motion. The left half, representing restlessness, features bold static patterns in darker tones creating an unsettled, jagged effect. The right, symbolizing peace, employs a radial pattern in warm yellows and deep greens, creating a sense of balance and tranquility. The central collision of colors signifies the intense struggle between these two emotional states, lending complexity to the overall narrative structure.</desc>
