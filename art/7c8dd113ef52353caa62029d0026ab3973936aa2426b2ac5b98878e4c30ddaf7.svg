<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Tensions</title>
  <desc id="desc">This composition captures the emotional oscillation between the brightness of spark and the dullness of ash. The palette is centered around dark violet, soft gold, and muted greens to evoke feelings of both hope and despair, with black grounding the entire piece. The main contrast collides diagonally, where the jagged edges of static patterns transform into softer channels, suggesting a struggle between restraint and the urge to burst forth. The broken pixels introduce a sense of imperfection, creating a narrative of resilience amidst fragility.</desc>
