<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This composition embodies the emotional tension between desire and emptiness. The rich, warm palette of hot coral and blood orange suggests an intense longing, while low-saturation hollow blue and charcoal represent feelings of restriction and void. The 'open gate' layout creates a flowing dynamic where saturated colors spiral gradually towards the black edge, interrupting the calm spaces. A central collision zone forms around heated colors, surrounded by quieter tones, creating a visual metaphor of tension between yearning and containment, sparking a conversation about absence and fulfillment.</desc>
