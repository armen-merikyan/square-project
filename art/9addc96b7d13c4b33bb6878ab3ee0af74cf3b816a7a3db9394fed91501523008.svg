<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This artwork encapsulates the emotional tug-of-war between control and panic. The palette of deep reds and blacks contrasts with pale blues and whites, symbolizing the chaotic emotions battling against the calm facade. The central pixels bleed into the edges, creating a radiating tension that suggests pressure building inward. The use of jagged edges introduces imperfection and discomfort while leaving conscious negative space to evoke feelings of ambivalence and unrest. The rhythm created by vertical stripes against a radial flow reinforces the idea of controlled chaos. The composition speaks to the dichotomy of feeling both overwhelmed and self-contained.</desc>
