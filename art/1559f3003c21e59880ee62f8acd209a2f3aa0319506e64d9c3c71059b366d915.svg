<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This composition embodies the tension between desire and emptiness through a carefully chosen palette. The warm tones of hot coral and blood orange suggest a strong yearning, while the cooler dust pink and hollow blue create an aura of detachment, capturing emptiness. The edge style introduces a contrast of weighted diagonals that interrupt the otherwise more fluid placements. Central elements of saturation collide sharply with tranquil tones at the border, enhancing the feeling of an insatiable pull restrained by a metaphorical barrier. The spiral flow suggests movement, while broken pixels introduce disorder, mimicking the inherent instability within desires and fears of containment.</desc>
