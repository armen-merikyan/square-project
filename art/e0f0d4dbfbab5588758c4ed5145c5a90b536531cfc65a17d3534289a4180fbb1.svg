<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Hold</title>
  <desc id="desc">This artwork conveys a tension between desire and restraint through a dynamic interplay of saturated and muted colors. The warm hues of hot coral and blood orange symbolize deep yearning and vitality, while dust pink and charcoal introduce moments of quiet restraint and reflection. The layout of stacked bands reflects emotional strata, with brighter colors clustered toward the center, creating a pulse of longing flanked by softer, muted edges that evoke containment. The main contrast occurs centrally, where vibrant colors collide with the muted fields to illustrate the struggle between freedom and the confines of emotional boundaries, echoing the abstract tumult of love and heartbreak from the seed.</desc>
