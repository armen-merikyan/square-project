<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Waves</title>
  <desc id="desc">This composition embodies the emotional interplay of longing and resolve through juxtaposed color fields. The palette features soft tones of powder pink and warm white to evoke a sense of longing, contrasted against firm shades of carbon black and steel gray representing resolve. The main collision occurs along a diagonal axis, where the circular lattice of longing bleeds into the structured split-screen of resolve, creating an unresolved tension. Broken pixels introduce imperfection, symbolizing the fractures in the pursuit between these emotions. Overall, the negative space supports breathing room amidst the dense interactions, enhancing the feeling of a threshold.</desc>
