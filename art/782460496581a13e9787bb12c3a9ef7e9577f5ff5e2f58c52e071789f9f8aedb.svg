  <title id="title">Pulse of Chaos</title>
  <desc id="desc">This artwork embodies the tension between defiance and submission. The use of warm coral (#FF6F61) and soft amber (#FBC02D) symbolizes bright refusal and angular resistance, while cold slate (#4A4A4A) and blue black (#000A1D) convey the soft collapse of submission. The contrasting colors create a dynamic rhythm across the grid, with the main collision occurring in the center, suggesting a struggle between two pulsing centers of emotion. The broken pixels introduce imperfection, reflecting glitch and disturbance within the overall order, while the uneven border emphasizes the chaotic nature of this emotional battle.</desc>
