<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Dualities</title>
  <desc id="desc">The artwork embodies the emotional dichotomy of joy and grief, utilizing a palette that contrasts vivid yellows and oranges against deep blues and muted purples. This choice evokes a visual tension between light and shadow, representing the interplay between uplifting and heavy emotions. The layering of colors in a descending pattern mimics the notion of rain, suggesting tears or overwhelming feelings. The jagged edges create a sense of disruption while the organized arrangement introduces a semblance of order, paralleling the chaotic nature of grief contrasted with the simplicity of joy. The visual structure aims to reflect a heart fragmented yet striving for balance and connection amidst emotional turbulence.</desc>
