<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Longing</title>
  <desc id="desc">The emotional tone represents the struggle between yearning and control, depicted through a densely saturated center (rings of desire) against muted edges (glitch of restraint). The palette of red oxide and muted cream reflects intensifying desire with the contrasting holding power of gray and blackened plum, creating a layered depth in color dynamics. The painted diamond pattern suggests moments of beauty amidst conflict, while the broken pixels introduce a deliberate disruption, symbolizing unresolved feelings. The central collision of color draws the eye, creating a pulse of tension.</desc>
