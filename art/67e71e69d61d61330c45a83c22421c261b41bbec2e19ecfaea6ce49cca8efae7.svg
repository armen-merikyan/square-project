<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Motion</title>
  <desc id="desc">This piece captures the tension between restlessness and peace by contrasting dynamic, vibrant colors against muted, calm tones. The use of compressed red as an accent sparks a sense of urgency, while pale field and dust gray provide a tranquil backdrop, embodying the quiet pressure of the unseen. The layout prioritizes a bright cluster in the center, symbolizing fleeting moments of clarity amidst the chaos. The uneven border hints at the disarray of thoughts, reflecting the emotional journey of memory vs motion.</desc>
