<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Echoes</title>
  <desc id="desc">This composition embodies the emotional tension between envy and gratitude through a palette of deep, muted colors. Black and dark violet suggest heaviness and internal conflict, while soft gold and pale green represent lightness and hope. The dense arrangements on the edges create a stark contrast to soft negative spaces inward, echoing the feeling of longing versus appreciation. By utilizing a grid for gratitude and a split screen for envy, the tension between these emotional states manifests as a conflict of patterns that draws the eye inward, symbolizing introspection amidst external chaos.</desc>
