<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Reflection</title>
  <desc id="desc">This artwork captures the emotional tension between longing and resolve, reflected in an interplay of warm and cool colors. The palette of cosmic indigo and cold gold is chosen to amplify feelings of both depth and urgency. The collision occurs centrally, where deeper hues echo a sense of unresolved yearning against brighter accents that represent the hope of resolution. The chosen patterns, 'teeth' and 'static', create dynamic interruptions while leaving silent spaces to suggest the quiet contemplation amidst turmoil. Broken pixels are scattered to illustrate the imperfections inherent in the journey of repair versus damage.</desc>
