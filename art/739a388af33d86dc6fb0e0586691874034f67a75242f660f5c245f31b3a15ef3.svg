<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the juxtaposition of vulnerability and strength through a delicate balance of colors. The palette of soft pinks and whites represents vulnerability and exposure, while deep blacks and steel grays signify strength and density. The dominant black and gray tones create an imposing presence, while the lighter hues form a fragile core that seems to be under pressure. The main collision occurs in the center with the bright pink and white cluster, symbolizing sudden exposure amidst a protective shell. The edge style is open, allowing moments of 'light' to escape, creating a rhythm that reflects themes of exposure against safety.</desc>
