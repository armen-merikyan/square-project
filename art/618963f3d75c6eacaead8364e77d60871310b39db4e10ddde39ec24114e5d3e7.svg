<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone captures a dynamic tension between desire and emptiness, where the warm, saturated colors reflect a yearning pull while the cooler tones form a restrained boundary. The palette blends vibrant shades of hot coral and blood orange with the muted hollowness of charcoal and hollow blue to create contrast. The main collision occurs in the center, where energetic colors collide with dark, quiet spaces, reflecting the struggle of being trapped yet craving expansion. The abstract patterns illustrate this conflict, weaving warmth through an eroded symmetry that hints at containment.</desc>
