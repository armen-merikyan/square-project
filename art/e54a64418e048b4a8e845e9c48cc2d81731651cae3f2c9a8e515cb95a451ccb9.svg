<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dual Echoes</title>
  <desc id="desc">The emotional tone oscillates between trust (represented by softer, lighter colors) and suspicion (darker, dense hues), capturing the tension within the duality. The palette features black for depth and solidity, electric blue for vibrancy and conflict, lime as a symbol of trust, and magenta as a stark accent that disrupts the flow. The layout follows a center seed with radial distribution from the middle, signifying pressure surrounding a central idea, creating a dynamic collision point. This piece conveys a story of resilience against the fragilities of interpersonal trust, echoed in the layered patterns and intentional disruptions.</desc>
