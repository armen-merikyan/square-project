<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Stillness</title>
  <desc id="desc">The emotional tone depicts the struggle between restlessness and peace, illustrated through a layout where a central light field is both exposed and surrounded by dense color bands that create a sense of pressure. The color palette combines muted off-whites and dust grays to portray peace, contrasted sharply with compressed reds and dark navies representing restlessness. The main collision occurs in the center, where the two contrasting emotions interrupt and blend, creating a rhythm of tension that ebbs and flows across the grid, echoing the conflict within memory and motion.</desc>
