  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition embodies the emotional tension between rage and calm, expressed through a palette of red, pale blue, and black. The reds punctuate the grid with explosive energy, while the cooler blue flavors provide a sense of containment. This is emphasized through mirrored patterns of rage clashing against the horizontal channels of calm, resulting in an asymmetrical balance anchored towards a corner. The broken pixels introduce intentional disruptions, simulating the feeling of eroding symmetry, transforming emotion into a spatial experience.</desc>
