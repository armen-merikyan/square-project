<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Signals</title>
  <desc id="desc">The emotional tone is a collision of defiance (represented by bright colors and sharp patterns) against submission (expressed through softer tones and noise). The palette combines warm coral and soft amber to create a sense of warmth and engagement while juxtaposed against cold slate and blue-black that add depth and a hint of melancholy. The main contrast occurs between distinct crosshatch patterns, signifying defiance, and noise textures representing submission—both fighting for dominance in different sections of the grid. This reflects themes of tension and imbalance, echoing the seed's motifs of chaos and quiet channels.</desc>
