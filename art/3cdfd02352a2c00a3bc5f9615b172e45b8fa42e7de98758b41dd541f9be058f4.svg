<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Boundless Desires</title>
  <desc id="desc">This artwork embodies the tension between desire and restraint. The chosen palette of muted cream (#D9CBA1), blackened plum (#4A2C2C), iron gray (#545454), and accent colors of red oxide (#6F3C3C) and small orange (#FF8C00) creates a striking contrast. Bright patches of small orange represent the overwhelming push of desire against the muted backgrounds of blackened plum and iron gray, symbolizing containment. The central collision happens in the upper left, where the vibrant warm colors disrupt the darker, restrained fields, inviting a sense of struggle but also warmth and hope. The interplay of ripple and split-screen patterns highlights the emotional pull of wanting more, juxtaposed with the confinement of existing circumstances, embodying the abstract qualities extracted from the seed.</desc>
