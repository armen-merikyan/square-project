<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This artwork conveys the emotional tones of joy and grief through a stark contrast between vibrant and muted colors. The left side utilizes warm tones of yellow and orange to represent joy—illustrating sparks and an expanding energy. In contrast, the right half encapsulates grief with deep blue and muted purple, giving a feeling of weight and heaviness. The split layout captures the struggle between these emotions. The jagged edges create a sense of interruption, while the absence of outlines allows the colors to merge, signifying the complexity of human emotions. The placement of colors aims to evoke a wave-like flow that mimics the ebb and flow of feelings, with pockets of quiet space enhancing the impact of denser clusters on each side.</desc>
