<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Tension</title>
  <desc id="desc">This composition contrasts feelings of panic and control, interpreting them through a palette of bold and muted colors. The top four rows reflect the chaotic energy of panic with bright electric blue and magenta, while the bottom four embrace control with deeper blacks and subtle grays. The placement of colors creates a dynamic rhythm, with lighter colors breaking through darker fields, suggesting sparks of hope amidst a backdrop of anxiety. The 'crack' shape seed emerges as fractured patterns in the chaotic upper half, symbolizing instability and tension in contrast to the orderly lower half. The negative space is preserved to enhance the feeling of an empty room, allowing the viewer to engage with the emotions conveyed.</desc>
