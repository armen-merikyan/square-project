<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Resilience</title>
  <desc id="desc">This artwork represents the emotional tension between longing and resolve. The palette, comprising muted moss green, rust, and bone white, conveys a sense of fragility and resilience, mirroring themes from the seed. The main contrast occurs between the dense, warm rust tones clustered in the center, symbolizing resolve, and the cooler, quiet moss green surrounding them, representing longing. The layout forms an 'island and sea' where the inner island of resolve collides with the vast space of longing, creating a visual tension that embodies both retreat and advance. The introduction of broken pixels serves as intentional flaws that echo the theme of mending, suggesting that both emotions coexist in a complex interplay.</desc>
