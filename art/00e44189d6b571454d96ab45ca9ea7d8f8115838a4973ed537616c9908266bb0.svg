<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse in Static</title>
  <desc id="desc">This composition reflects the emotional tension of signal versus noise. The palette combines vibrant signal green and electric blue (representing clarity and rhythm) with static gray and dead black (symbolizing interference and static clutter). The main collision occurs in the center where the bright dots of signal clash with the chaotic gray, creating a vivid pulse interrupted by darker areas. This interplay captures the essence of the seed’s duality—communication amidst disruption, shaped into an abstract rhythm that feels both urgent and fragmented.</desc>
