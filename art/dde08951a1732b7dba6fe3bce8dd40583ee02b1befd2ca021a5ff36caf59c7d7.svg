<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Conflicts</title>
  <desc id="desc">The emotional tone embodies a struggle between desire's warmth and restraint's cool containment. The palette features rich hues of red oxide for passion, blackened plum for depth, and contrasted muted creams and iron gray to symbolize boundaries. Saturated colors collide with muted tones, creating an intense focal point in the center, mimicking the push and pull of desire against restraints. The layout is symmetric yet compromised at the edges, suggesting vulnerability and disruption, representative of the emotional interplay described in the seed.</desc>
