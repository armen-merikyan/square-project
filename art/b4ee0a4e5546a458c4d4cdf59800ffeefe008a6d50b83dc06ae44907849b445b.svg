<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Existence</title>
  <desc id="desc">The emotional tone juxtaposes serene fields against unsettled edges, suggesting an ongoing struggle for peace amidst chaos. The palette of burnt orange, dark red, charcoal, and gold evokes warmth and intensity, while cooler spaces represent calm. The main collision occurs in the center, where brighter accents disrupt darker, more muted fields, embodying the contrast of restlessness and peace. The abstract pattern flows diagonally, reflecting an argument between motion and stillness, with broken pixels introducing intentional disruptions, enhancing the sense of memory and fleeting moments.</desc>
