<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone contrasts vulnerability's thin shell against strength's dense base, illustrated through soft pale colors enveloped in deep maroon and punctuated with gray accents. The palette of pink, red, gray, and dark maroon enhances the emotional depth, creating a delicate tension. The arrangement features a central dense area that contrasts with lighter, more exposed colors around it, embodying the seed's theme of collision between safety and exposure. The main collision is at the center, where darker shades encapsulate lighter ones, suggesting an ongoing battle between structure and fragility. This abstract pattern invites reflection on moments of emotional pressure framed within the vulnerabilities we navigate.</desc>
