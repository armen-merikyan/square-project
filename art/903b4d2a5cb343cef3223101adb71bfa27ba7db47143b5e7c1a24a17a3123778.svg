<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This artwork explores the tension between quietness and pressure through a palette that combines muted tones with sharper contrasts. The dark navy and compressed red serve to create a strong boundary, while the off-white and faint peach provides a soft contrast that embodies the quiet emotions. The main collision occurs at the center, where the darker tones disrupt the lighter ones, embodying the theme of breaking symmetry and creating a sense of movement from the bottom to the top, symbolizing a rise from pressure to release. The interaction of broken dots and islands fosters an interplay of dense clusters and pause, representing the fight between chaos and calm.</desc>
