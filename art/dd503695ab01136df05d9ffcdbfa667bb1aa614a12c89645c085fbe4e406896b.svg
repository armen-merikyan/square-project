<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This composition embodies the emotional struggle between emptiness and desire, where warm, saturated hues clash against cool, muted colors. The palette reflects the theme: hot_coral and blood_orange convey desire, while charcoal and hollow_blue symbolize emptiness. The dominant center of warm color illustrates rising intensity, colliding with the ordered yet disrupted grid that implies containment. The edge style suggests sparks of chaos against the tightly controlled center, creating visual tension. Broken pixels subtly interrupt the harmony, embodying the imperfections of longing.</desc>
