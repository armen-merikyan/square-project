<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erosion of Trust</title>
  <desc id="desc">This artwork explores the tension between trust and suspicion through contrasting pixel placements and colors. The choice of a palette with warm reds and cool greys symbolizes the dichotomy between warmth of trust (represented by pink and red) and the coldness of suspicion (depicted by gray and dark maroon). The central contrast, primarily located in the middle rows, creates a split pattern with a ripple effect on one side (trust) and a more static grid on the other (suspicion). Broken pixels introduce imperfection and further emphasize the theme of fragility versus resilience, adding to the complexity of emotions. Each color and arrangement contribute to a narrative of evolving emotional states, resembling a landscape where trust intermittently falters under suspicion.</desc>
