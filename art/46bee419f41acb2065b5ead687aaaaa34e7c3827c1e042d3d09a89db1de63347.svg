<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Edge of Balance</title>
  <desc id="desc">This abstract composition represents the tension between panic and control, illustrated through color and structure. The palette of dark maroon, red, pink, and gray evokes emotional depth, with reds symbolizing intensity and gray embodying a cooler, more controlled facet. The flow originates from the center, with a contrasting pattern of chaos (represented by zigzags and mirrors) colliding against more ordered sections (with a stair-like structure). Key collisions are found in the transition zones, where dark hues meet brighter peaks, creating a visual spark that feels both inviting and unsettling. The arrangement intentionally maintains negative space to suggest a sense of isolation within the chaos, embodying the essence of joy entwined with grief.</desc>
