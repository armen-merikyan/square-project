<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This composition portrays the emotional tension between light (spark) and dark (ash). The palette of navy, black, and dim cyan embodies weight and depth, while single white provides a striking accent, representing hope amidst heaviness. The conflict is centered with the bright spark (white) interrupting the deep navy and black background. The 'threshold' layout suggests a transition, a seam where these emotions collide, creating a narrative of resilience against fragility. The broken pixel effect disturbs the smoothness, echoing the imperfections of memory and the struggles of restraint vs hunger.</desc>
