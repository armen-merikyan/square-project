<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Pulse</title>
  <desc id="desc">This piece reflects the emotional tension between love and betrayal. The warm tones of pink and red suggest intimacy, while the darker gray and maroon signal underlying betrayal. The composition contrasts chaotic, jagged edges representing betrayal with smoother areas reflecting calm love, suggesting an unresolved tension. The color placements create a heartbeat rhythm, with quiet spaces punctuated by bursts of intense color around the edges, reflecting the feeling of a heart fragment caught in the conflict of emotions. The broken pixels introduce an element of imperfection, enhancing the theme of emotional disarray.</desc>
