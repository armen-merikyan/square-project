<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork explores the emotional duality between vulnerability and strength. The palette features warm hues of orange and yellow to represent strength, contrasted by cooler, muted purple and deep blue to signify vulnerability, creating tension. The central area, composed of lighter tones, symbolizes an exposed core, while the darker edges create a protective frame. A 'hinge' pattern of warm colors intersects with a 'lattice' of cooler tones, disrupting the flow and intensifying the narrative of protection versus exposure. The flow spirals clockwise, giving a dynamic movement that echoes the internal struggle between feeling safe and feeling open. Broken pixels introduce imperfection, enhancing the abstract story.</desc>
