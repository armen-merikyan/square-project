  <title id="title">Tension of Elements</title>
  <desc id="desc">This artwork embodies the struggle between 'spark' and 'ash' through a dynamic contrast of colors. The palette evoking 'cosmic indigo' represents potential and brightness, while 'void black' and 'soft ash grays' anchor the piece in quiet stillness. The left-to-right flow leads through a complex interplay of jagged lines and negative space, suggesting an internal dialogue of energy and restraint. The collision happens prominently in the center with a burst of gold disrupting the cooler tones, allowing the viewer to feel the push and pull of memory and erasure, resilience in fragility.</desc>
