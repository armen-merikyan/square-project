  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects a balance between vulnerability and strength, symbolizing the tension between exposure and protection. The palette utilizes deep navy and bright white, creating a strong contrast that underscores the dominant emotion of strength while allowing for soft interruptions of vulnerability. The main collision occurs at the center, where brighter pixels rupture the darker surrounding, suggesting a battleground of emotions. The split screen and scattered repair patterns resonate with the theme of brokenness versus mending, creating a visual interplay that expresses complexity and depth.</desc>
