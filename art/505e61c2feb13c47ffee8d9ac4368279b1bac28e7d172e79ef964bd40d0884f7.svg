<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Motion</title>
  <desc id="desc">The emotional tone reflects a battle between longing and resolve. The chosen palette of signal green, electric blue, and hot magenta conveys both urgency and serenity, where cool tones embody resolve and warmth represents longing. The main collision occurs in the central area with dense layering of the bright colors, emphasizing the struggle of these emotions in a confined space against quieter fields. The hooks from the shape seed evoke the tangential aspects of repair versus damage, weaving through the overall composition.</desc>
