<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition embodies the tension between rage and calm, creating a compelling narrative of emotional conflict. The use of stark black alongside a pale blue serves to delineate the hot, intense edge of rage against the softer, muted tones representing calm. The arrangement exhibits a diagonal flow, where the cooler colors create a quiet channel slicing through denser, chaotic patterns, symbolizing both the struggle and coexistence of these emotions. Key collisions occur where jagged red pixels interrupt the serenity of blue fields, illustrating an explosive impact that questions the boundaries of containment. Broken pixels across the grid introduce an element of imperfection, echoing the theme of eroded symmetry reflected in the seed. Overall, this 8x8 grid visualizes an abstract realm where emotional turmoil meets stillness, drawing the viewer into an exploration of complex contrasts.</desc>
