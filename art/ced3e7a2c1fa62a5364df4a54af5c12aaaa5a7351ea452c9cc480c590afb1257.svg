<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone is a negotiation between tenderness and rage, leading to a composition that intertwines softness with sharpness. The palette of black, red, pale blue, and white conveys the intensity of rage contrasted with the gentleness of tenderness. The main contrast occurs at the center where jagged edges in red collide with soft, braided patterns in pale blue, representing internal conflict and release. The arrangement creates a shared space of rising tension around the center, with calm fields pushing gently against the overall pressure, reflecting both the desire to expand and the weight of restraint.</desc>
