<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tide of Strength and Vulnerability</title>
  <desc id="desc">This artwork embodies the emotional dance between strength and vulnerability. The chosen palette of shelter green, warm brown, pale skin, cold white, and open blue speaks to the notions of safety and exposure: the green and brown grounding strength, while pale and cold tones evoke fragile vulnerability. The main contrast occurs in the corner where heavy dark tones collide with lighter echoes of warmth, creating tension. As the viewer moves across the canvas, the transition from dense corner to lighter, sparser edges mirrors the constant push-pull between stability and fragility, mimicking the ebb and flow of tides, reflecting the essence of the seed.</desc>
