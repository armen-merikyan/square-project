<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Corner</title>
  <desc id="desc">This artwork embodies the tension between control and surrender, represented by a clash of solid, grounded colors and soft, diffuse ones. The palette includes moss green and rust to highlight the emotions of resilience and fragility. The layout starts with a dense cluster in the corner, contrasting with more open areas to suggest an overflow and eventual release. The echoing pattern of control collides with the raindrop-like softness of surrender, creating a visual narrative of tension and resolution. The use of broken pixels introduces intentional imperfection, suggesting a fragility amid strength, emphasizing the emotional weight of the seed.</desc>
