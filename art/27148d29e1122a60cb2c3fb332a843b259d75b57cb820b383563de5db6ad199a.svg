<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Control and Surrender</title>
  <desc id="desc">The emotional tone reflects a dynamic push-pull between control and surrender, with the palette evoking warmth through hot coral and blood orange, contrasted by the coolness of charcoal and hollow blue. The collision primarily occurs at the center, where the intense heat of the coral interacts with the softer, yielding tones of dust pink, creating a tension-filled heartbeat. The cracked pattern symbolizes the surrender breaking through an otherwise controlled frame, suggesting emotional overflow and the yearning for release.</desc>
