<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Emotions</title>
  <desc id="desc">This piece explores the tension between tenderness and rage through a contrast of sharp and soft colors. The palette, chosen from deep reds and muted blues, symbolizes rage’s intensity and tenderness’s calmness, respectively. The bright accents emerge from a dense base, illustrating the struggle between emotional states. The main collision occurs in the center with jagged red interactions cutting into a serene blue background, emphasizing conflict amid the softer tones. The composition's layout, with a quiet field of negation on the edges, enhances the emotional depth and complexity, representing the multifaceted nature of inner turmoil.</desc>
