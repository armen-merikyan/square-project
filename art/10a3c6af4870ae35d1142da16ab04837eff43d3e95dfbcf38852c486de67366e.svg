<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Control</title>
  <desc id="desc">The emotional tone reflects a balance between panic and control, where the palette of deep black and stark white plays against softer pale blue, creating contrast that embodies the chaos of arguments and the grounding quality of structure. The blocked patterns evoke a sense of control from the chaotic zigzags and broken lines, creating tension. These edges feel jagged, suggesting the friction between the two emotional states. The layout descends like rain, with scattered broken dots representing moments of panic disrupting the more uniform appearance of control, while the negative spaces reflect moments of calm amidst intensity.</desc>
