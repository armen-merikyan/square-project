<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tension</title>
  <desc id="desc">This piece contrasts the emotional tones of 'quiet' and 'pressure' through the palette of muted and saturated colors. The dark navy (#001F3F) represents pressure, dominating the lower rows and forcing upward movement, while soft off-white (#F8F8F8) and faint peach (#FFDDC1) create moments of calmness in the upper half, representing quietness. Broken pixels are scattered throughout, adding intentional imperfections that mimic the shattering effects described in the seed. The main collision occurs in the central area, where dense clusters of gray (#B0C4DE) abruptly meet softer hues, symbolizing the struggles between calm and chaos.</desc>
