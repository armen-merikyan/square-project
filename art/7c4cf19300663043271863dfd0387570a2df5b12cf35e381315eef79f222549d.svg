<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This artwork embodies the emotional tension of joy versus grief through a split horizontal layout that creates a visual dynamic of order and chaos. The upper half employs spark-like yellows and warm oranges to signify joy, evoking brightness and expansion. In contrast, the lower half is filled with muted purples and deep blues, portraying grief's heaviness and softness. The flame-like pattern flows downward, symbolizing tears or ash, while broken pixels disrupt the uniformity, enhancing the theme of hidden vs exposed emotions. The palette promotes a collision of bright and subdued tones, creating a vivid narrative of emotional oscillation.</desc>
