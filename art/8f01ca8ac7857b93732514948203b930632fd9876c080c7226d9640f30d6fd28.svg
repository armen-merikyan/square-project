  <title id="title">Tension of Duality</title>
  <desc id="desc">The emotional tone is rooted in the contrast between love and betrayal, using a palette of pink, red, gray, and dark maroon to convey warmth and darkness. The layout reflects the 'corner_invasion', with the intensity of love emanating outward while moments of betrayal punctuate the flow. The main collision occurs in the center, where rich colors clash with fragmented gray, signifying a conflict of emotion. This abstract representation mirrors the complexities of relationships, using sharp and soft edges to evoke tension and harmony simultaneously.</desc>
