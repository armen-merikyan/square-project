<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Forces</title>
  <desc id="desc">This piece captures the emotional dichotomy of defiance and submission. The palette, drawing from deep teal and void black, conveys a mysterious depth while cold gold and star white offer stark contrast, symbolizing the sharp edges of conflict. The center is predominantly dark, representing defiance, while softer, quieter edges speak to submission. The central collision is represented by an influx of lighter colors that intrude upon the darker boundary, creating an interplay of pressure and release, mirroring the seed's themes of invasion and spiraling tension.</desc>
