<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Strength</title>
  <desc id="desc">This piece explores the tension between vulnerability and strength through a palette that represents both safety (shelter green, warm brown) and openness (pale skin, cold white, open blue). The main collision occurs at the center, where lighter and darker greens intersperse, symbolizing the flux between exposure and protection. The diagonal layout emphasizes this interplay, while broken pixels introduce intentional disruption, suggesting imperfection within the struggle of these emotions. The outward spiral flow suggests a dynamic rising signal amid hard edges of contrast.</desc>
