<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork explores the emotional tension between vulnerability and strength. The off-white and faint peach colors symbolize the exposed and soft nature of vulnerability, while the dark navy and compressed red offer a contrasting stable center, suggesting strength. The palette promotes a quiet yet rich emotional landscape, weaving together light and dark to create dynamic tension. The main collision occurs in the center where radial strength patterns intersect with the noise of vulnerability, hinting at the complexity of these emotions. The composition's falling pixel layout reflects the flow of ongoing struggles—both those that feel like a flood and the densely stacked moments of resilience.</desc>
