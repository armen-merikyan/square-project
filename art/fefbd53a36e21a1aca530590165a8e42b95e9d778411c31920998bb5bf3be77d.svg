<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Waves</title>
  <desc id="desc">This piece reflects the dual emotional landscape of envy and gratitude. The palette of dark navy and soft cyan evokes a sense of loneliness versus calm acceptance, allowing for depth and contrast. The rising signal layout suggests an upwards flow of hope disrupted by jagged patches representing envy. The visual chaos of cracks in the pattern introduces a tension, creating a narrative of the struggle against emotion while acknowledging the soft edges that represent the gentler aspects of gratitude. The strategic placement of broken pixels adds imperfection, reinforcing the continuous interplay of emotions in a space filled with both noise and softness.</desc>
