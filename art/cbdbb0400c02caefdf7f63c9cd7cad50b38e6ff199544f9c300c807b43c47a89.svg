<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipsed Duality</title>
  <desc id="desc">The emotional tone reflects a struggle between fear and hope, captured through a palette of deep blacks and vibrant golds. The contrast emerges from the dense black edges, representing fear's confinement, while glowing soft gold at the center symbolizes hope's light. This arrangement creates a vertical split, embodying the notion of weight juxtaposed with lightness. The pattern captures the tension of straight lines colliding with curves, emphasizing a dance between rigid structure and organic flow, culminating in a burst of color and feeling.</desc>
