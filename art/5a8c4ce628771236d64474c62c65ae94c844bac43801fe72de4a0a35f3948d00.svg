<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Elements</title>
  <desc id="desc">The emotional tone reflects instability between strength and vulnerability, using a color palette of powder pink, warm white, carbon black, steel gray, and sharp crimson to symbolize both softness and severity. The central conflict occurs with warm whites and soft pinks invading the edges dominated by stark blacks and grays, suggesting exposure despite the hard edges of the outer layer. This collision creates a sense of rising signal against a backdrop of flood-like darkness, emphasizing emotional weight through asymmetric placements and broken pixels that interrupt the balance.</desc>
