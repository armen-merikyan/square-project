<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal Noise</title>
  <desc id="desc">This composition embodies the emotional duel of restlessness and peace. The color palette, featuring pale aqua and alarm red, represents serenity juxtaposed against urgent, unsettled energy. The primary contrast emerges from the intense red (representing restlessness) converging towards the central area, while the cooler tones recede toward the edges, illustrating a struggle between calm spaces and chaotic bursts. The flame, as an abstract metaphor, creates a pulsating effect, while the organization in diagonal wedges amplifies the tension of conflicting emotions at play.</desc>
