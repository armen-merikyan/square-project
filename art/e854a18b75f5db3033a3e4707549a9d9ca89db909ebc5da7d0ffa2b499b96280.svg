<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Tension</title>
  <desc id="desc">The emotional tone reflects a struggle between the chaos of panic and the calm of control. The selected palette of yellows and deep blues serves to highlight the stark contrast between warm versus cool emotions, where the bright yellows symbolize panic and the deep blues represent control. The collision between these colors occurs primarily within the center of the artwork, where dense yellow tones fight against areas of stable blue, creating a sense of instability and unresolved motion. The broken pixels create an illusion of imperfection, reinforcing themes of unpredictability and emotional turmoil, while maintaining a structured layout with meaningful negative space around the chaotic center to represent the distinction between inner and outer worlds.</desc>
