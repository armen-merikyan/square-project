<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers and Flashes</title>
  <desc id="desc">The emotional tone reflects a tension between the vibrancy of 'spark' and the somber residue of 'ash.' The palette is chosen to capture warmth from the coral and amber while balancing it with the cooler slate and black tones, echoing the contrast of hope against despair. The layout emphasizes a pressure corner filled with 'spark' patterns that interrupt and collide with the linear 'ash' structure, creating a dynamic rhythm. The main collision is at the upper left corner, where bursts of color push against the subdued textures, symbolizing resilience amidst fragility.</desc>
