<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Pursuit</title>
  <desc id="desc">This artwork captures the emotional tension between longing and resolve through a contrasting palette of muted greys and bright accents. The broken and incomplete patterns symbolize the struggle of repair and damage, with dark spaces representing longing, while vibrant edges suggest resolve. The collision occurs centrally, where the warm compressed red interrupts the cooler tones, mirroring the desire to bridge the emotional gaps. The negative space accentuates the feeling of a reaching gap, conveying an overarching narrative of pursuit infused with both serenity and urgency.</desc>
