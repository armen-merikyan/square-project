<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Boundaries</title>
  <desc id="desc">The emotional tone reflects the struggle between desire, represented by saturated colors, and restraint, illustrated by muted shades. The palette includes hot coral and blood orange for dynamic pulsation, contrasted against the stillness of charcoal and hollow blue. The central collision occurs as the brighter hues attempt to break the frame established by the darker tones, symbolizing the push-pull dynamic. The patterns of flood and frame create a dense field disrupted by selective broken pixels, suggesting imperfection against an overarching boundary that contains but never fully restrains.</desc>
