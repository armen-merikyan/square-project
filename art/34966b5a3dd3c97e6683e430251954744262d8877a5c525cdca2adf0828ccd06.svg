<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Scattered Repair</title>
  <desc id="desc">The emotional tone reflects a struggle between exposure and protection, embodied by a soft yet resilient core surrounded by complex layered colors. The palette, featuring warm and cool tones, creates a balance between intimacy and distance, where warm shadow and lamp gold suggest warmth and connection. Contrasts, such as the heavy pinks against the cooler blues, signify strength meeting vulnerability. The main collision occurs centrally, where the paler colors interact with darker edges, symbolizing the tension between being seen and hidden. The abstract pattern emerges from the concept of a veil, representing a thin boundary between safety and exposure, and achieving a dynamic form through visual disruption.</desc>
