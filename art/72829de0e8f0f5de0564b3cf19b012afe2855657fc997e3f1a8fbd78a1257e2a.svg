<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Intersection of Tensions</title>
  <desc id="desc">This artwork embodies the emotional conflict between 'rage' and 'calm' through stark color contrasts and overlapping patterns. The palette features intense reds representing rage, contrasted against cool, peaceful tones of pale blue and white symbolizing calm. The rows suggest a collision where visual chaos of sharp reds begins from the bottom left, radiating outward while being partially contained by the serene blue spaces, creating a sense of disorder meeting quietude. The placement of darker colors creates tension and fragmentation, echoing the themes of noise against clarity. Broken pixels throughout hint at imperfection and disruption, further enhancing the story of battling emotions.</desc>
