<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone of this artwork contrasts the intensity of desire with the hollow nature of emptiness. The top half radiates warm colors—bright corals and blood oranges—symbolizing saturation and longing, while the bottom half employs cooler, muted tones of charcoal and hollow blue, signifying distance and containment. The primary collision occurs along the horizontal divide, family of hues complementing one another yet disrupting the viewer's gaze as they clash at the center. The palette was chosen to embody warmth against coolness, a reflection of inner conflict, utilizing broken pixels to represent imperfections, a nod to the inherent struggle between wanting and restraint. This composition evokes a sense of layered density above a quiet, expansive void, inviting contemplation on the balance of these opposing forces.</desc>
