<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Thresholds</title>
  <desc id="desc">This artwork explores the emotional tension between defiance and submission, characterized by a central lattice pattern that represents submission against the angular resistance of defiance. The selected palette, 'guilt_forgiveness,' blends soft gold and warm ivory representing warmth and an inviting calm, contrasting with deep wine and ash gray to evoke tension and disruption. The main collision occurs at the center, where these opposing emotions interact, representing both protective and aggressive qualities, enhanced by strategic broken pixels that provide an imperfect and raw edge to the composition.</desc>
