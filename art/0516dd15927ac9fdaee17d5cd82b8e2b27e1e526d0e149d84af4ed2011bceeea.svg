<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">The emotional tone of defiance vs submission is conveyed through the stark contrast of colors and arrangements. The palette of lime, black, electric blue, and magenta reflects a clash of boldness and subtlety, encapsulating the fight between heavy and light emotions. The pattern shifts from noise in the top rows, symbolizing defiance with jagged, chaotic placements, to dotted calmness in the bottom rows, representing submission. The falling pixels motif emphasizes the descent from tumult to tranquility. Central clashes, particularly along intersections of black with electric blue and magenta, create focal points of tension. At least 10% of the grid remains negative space, enhancing the feelings of uncertainty and open vs closed emotions within the composition.</desc>
