<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Restraint</title>
  <desc id="desc">This composition embodies the tension between desire and emptiness. The palette's warm hues—hot coral and blood orange—express desire, while the charcoal and hollow blue evoke a sense of emptiness and restraint. The rhythmic spark pattern meets the structured ladder, creating a dynamic collision that speaks to the push and pull of emotions. Central clusters of warm colors create focus, while the edges, framed in cool tones, represent boundaries and containment, inviting the viewer to feel both a pull towards warmth and a retreat to cool disconnect.</desc>
