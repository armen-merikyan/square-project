<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Unfulfilled Horizons</title>
  <desc id="desc">This artwork embodies the emotional struggle between emptiness and desire, expressed through a contrasting palette of warm and cool colors. The layout features a clear distinction: the outer rows represent the desire with brighter, warmer colors, creating a sense of aspiration and energy. Meanwhile, the central rows reflect emptiness, employing darker, cracked patterns that symbolically suggest a void. The composition moves left to right, reinforcing the idea of rising tension, where warm shades pulse against cooler tones. Broken pixels introduce a raw, imperfect quality, paralleling the fragmentation of heart and experience.</desc>
