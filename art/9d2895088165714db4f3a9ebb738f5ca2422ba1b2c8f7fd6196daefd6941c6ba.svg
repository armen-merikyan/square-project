<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition reflects the emotional tension between safety and exposure through a carefully chosen color palette and layout. The predominant use of gentle greens and soft browns creates a sense of shelter, while pale skin tones and open blues suggest vulnerability and exposure. The falling pixel layout facilitates a slow descent of colors, echoing the conflicting feelings of pressure and release. The dominant hue resides in the central column, where safety meets exposure, visually illustrated by alternating patterns of softer ('teeth') and sharper ('halo') forms, creating a gentle clash that embodies the seed's essence. Broken pixels introduce an element of imperfection, enhancing the emotional narrative without becoming literal representations.</desc>
