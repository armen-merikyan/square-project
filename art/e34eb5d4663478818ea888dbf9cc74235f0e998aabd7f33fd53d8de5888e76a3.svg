<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition captures the tension between vulnerability and strength. The palette of 'cosmic indigo' and 'cold gold' creates a mysterious ambiance, juxtaposed with 'void black' to symbolize depth and 'star white' as a fleeting hope, suggesting a luminous contrast against the murky darkness. The main collision occurs at the center, where dark and light pixels war against each other, visually representing the emotional conflict of strength juxtaposed with exposed vulnerability. Broken pixels are intentionally scattered to create an imperfection that echoes real emotional experiences, while also allowing for negative space to evoke quiet contemplation amidst the chaos, aligning with the conceptual weight of safety versus exposure.</desc>
