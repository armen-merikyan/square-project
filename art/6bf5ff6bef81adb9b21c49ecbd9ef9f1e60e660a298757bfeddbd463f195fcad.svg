<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Intent</title>
  <desc id="desc">The emotional tone reflects the struggle between desire (longing) and determination (resolve), using a color palette that balances warmth and severity. The contrast emerges primarily in the center where soft hues of powder pink and warm white collide with sharp crimson and carbon black, symbolizing a heartbeat of urgency against quiet moments. The pattern of checker (resolution) confronts the flame-like motifs (longing), enabling visual tension that speaks to a pulse of existence amidst a backdrop of negative space, achieving an abstract representation of the complexities outlined in the seed.</desc>
