<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This piece explores the emotional tension between trust and suspicion, contrasting soft, stable patterns with jagged, uncertain interruptions. The palette, composed of warm sepia, tan, cool dust gray, and faded blue, reflects a sense of broken memory and ambiguity. The main collision occurs in the center where stripes of trust clash with the threshold patterns of suspicion, creating a visual dialogue about the complex interplay of these feelings. The design showcases a diagonal flow, reinforcing the invasion of suspicion into the secure domain of trust, while leaving intentional broken pixels to symbolize the scars of uncertainty.</desc>
