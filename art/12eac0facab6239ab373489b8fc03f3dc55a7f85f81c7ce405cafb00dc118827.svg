<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone reflects the tension between warmth and coldness, symbolizing love's embrace clashing with the betrayal's harsh reality. The palette consists of warm pinks and reds juxtaposed against dark maroons and grays, creating rich emotional contrasts and depth. The layout is split, establishing distinct zones for love and betrayal, where the left side features maze-like patterns representing the complexity and warmth of love, while the right employs noise patterns reflecting the chaotic aftermath of betrayal. Broken pixels introduce imperfection, symbolizing the fragility of both love and trust. The dominant contrast occurs in the middle, where warmth and cold collide, forming the artwork's emotional pulse.</desc>
