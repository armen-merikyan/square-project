<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Forms</title>
  <desc id="desc">This artwork reflects an emotional composition where defiance and submission collide through contrasting colors and patterns. The palette combines warm clay and shadow with cool blues and lilacs to represent the tension between two states. The pattern of defiance employs a stair-like structure to embody resistance, while the submission pattern uses crosshatching to create an enveloping softness, hinting at the weight of quiet surrender. The main contrast occurs in the center, where a dense cluster of color creates a feeling of pressure against the surrounding quieter hues, embodying the emotional push and pull between strength and vulnerability. The interplay of bright and muted tones captures both confrontation and retreat, echoing the central seed of tension in a distinct abstract form.</desc>
