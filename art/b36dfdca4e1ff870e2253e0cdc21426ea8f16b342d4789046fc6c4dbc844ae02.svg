<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dualities of Emotion</title>
  <desc id="desc">This piece symbolizes the tension between fear and hope through contrasting patterns and colors. The palette combines deep blacks and dark violets to represent fear with soft gold and pale green embodying hope. The randomness of 'broken dots' symbolizes chaos, while 'flame' patterns suggest a rising signal of hope. The central density of colors creates an unsettling energy, while the edges fade into darker tones, evoking the corners of fear. The layout suggests an argument grid, enforcing a push and pull, representing how emotions can clash within the mind.</desc>
