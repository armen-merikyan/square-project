<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Strained Harmony</title>
  <desc id="desc">The emotional tone captures the tension between restlessness and peace, illustrating a challenge between two opposing states. The palette, inspired by 'mourning renewal', creates a contrast between deep blues and pale yellows to evoke a sense of sorrow intertwined with hope. The primary collision occurs diagonally across the square, where the static calmness of the blue fields meets the restless tide-like movements created by yellows. Broken pixels are interspersed to represent moments of disruption and echo the 'shatter' concept while maintaining an overall structure that is readable and abstract. This arrangement reflects the ebb and flow of memory against motion, creating a vivid narrative without literal imagery.</desc>
