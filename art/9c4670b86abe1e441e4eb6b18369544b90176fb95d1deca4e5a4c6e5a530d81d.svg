<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Containment</title>
  <desc id="desc">This composition explores the emotional clash between desire and restraint. The left half features saturated reds and oranges, symbolizing fiery desire with a pattern of warm, intersecting diagonals as it spills toward the center. The right side contains muted colors—dark grays and blacks—forming a more structured and contained lattice that embodies restraint. Color saturation varies intentionally to invoke emotional tension, with the central region creating a collision point where vibrant warmth meets cool containment, leaving a subtle navigation of negative space. The spiral pressure implies a dynamic pull within the interaction of emotions, making it rich in both color and conceptual depth.</desc>
