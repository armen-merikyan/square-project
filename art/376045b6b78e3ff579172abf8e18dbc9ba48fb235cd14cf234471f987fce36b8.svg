<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Flicker of Memory</title>
  <desc id="desc">The emotional tone of this artwork symbolizes the tension between the ephemeral nature of 'spark' and the lingering effects of 'ash'. The palette includes pale mint and faded gold to represent the brilliance of sparks, while soft sky and storm gray evoke the remnants of ash—a soft yet powerful contrast. The main contrast occurs in the central area where jagged edges represent conflict, suggesting memory being both fragile and resilient. Patterns of ‘veil’ and ‘threshold’ create a visual dialogue—layered lines echoing chaos and clarity, marrying the ideas of tension and release through color and arrangement.</desc>
