<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetric Disarray</title>
  <desc id="desc">The emotional tone is a juxtaposition of clarity and confusion, reflected through a palette of red, pink, and gray, suggesting emotional intensity. The top half carries structured grids to represent clarity, while a disordered frame pattern dominates the bottom half, embodying chaos. Main contrast occurs where the structured grid meets the chaotic frame, creating a visual tension that mimics the conflict between clarity and confusion. The use of broken pixels introduces imperfection, emphasizing the theme of disruption amid an underlying rigidity. Negative space is intentionally woven throughout, suggesting moments of breath amidst tumultuous emotions.</desc>
