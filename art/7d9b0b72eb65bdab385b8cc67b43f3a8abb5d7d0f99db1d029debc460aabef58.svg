<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This piece explores the tension between desire and emptiness through a vibrant palette of warm and muted colors. The chaotic center, filled with hot coral and blood orange, symbolizes overwhelming desire, while the cooler shades of charcoal and hollow blue at the edges represent containment and emptiness. The contrasting collision occurs in the center, where dense saturation meets a lattice of low saturation, echoing the struggle between overflowing desire and the urge to hold back. Broken pixels disrupt the smooth gradient, adding layers of imperfection and enhancing the sense of pressure and restraint.</desc>
