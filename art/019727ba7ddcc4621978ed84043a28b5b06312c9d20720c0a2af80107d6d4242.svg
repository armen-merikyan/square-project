<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition represents the emotional tension between calm and rage, where the rage is channeled and contained within defined areas, while the calm seeks to seep through the edges. The palette alternates between strong reds and cooler blues to signify the hot emotional bursts against serene backdrops. The broken pixels create a sense of disruption, reflecting the chaotic nature of rage. The main clash occurs diagonally, where vibrant reds disrupt the tranquil blues, emulating the struggle of these emotions in a single space.</desc>
