<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition explores the emotional tension between desire and restraint. The chosen palette of deep reds and muted creams creates a stark contrast between heat and calmness. The flow is zigzag, representing the push-pull dynamic of yearning yet being held back. The layout, which centers on a hollow void surrounded by density, emphasizes the tension; main collisions between saturated colors at the edges disrupt the muted fields inside, symbolizing longing trapped within limitations. Broken pixels introduce intentional disruptions, creating a sense of imperfection and realism. In this way, the seed transforms the emotional narrative into a visual dialogue of bounded passion and quiet stillness.</desc>
