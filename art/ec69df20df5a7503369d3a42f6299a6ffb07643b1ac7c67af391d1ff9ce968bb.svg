<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone navigates between restlessness and peace, suggesting a struggle between chaotic energy and serene balance. The palette features soft creams and vibrant greens, representing calmness juxtaposed against the urgency of sharper, darker hues like deep olives and acid greens, evoking both numbness and vitality. The main collision occurs in the upper left corner where warm colors gather and push against cooler tones that spread throughout the rest of the grid, echoing a pressure corner layout. This interplay captures the essence of the seed, morphing it into an abstract tapestry of tension and tranquility.</desc>
