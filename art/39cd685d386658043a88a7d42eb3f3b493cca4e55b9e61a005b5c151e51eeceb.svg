<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork embodies the emotional tensions between vulnerability and strength through a deliberate contrast of color intensity and placement. The palette of deep wine and warm ivory accentuates the heavy pressure represented by dense brown outlines, while the soft gold introduces fleeting moments of vulnerability, echoing the delicate balance between protection and exposure. The central collision occurs at the center where soft hues collide with the starkness of the surrounding edges, drawing the eye inward yet creating a feeling of tension, much like a braid under pressure. Overall, the pattern reflects a complex interplay of emotional states, encapsulated within an 8x8 structure that is both readable and evocative.</desc>
