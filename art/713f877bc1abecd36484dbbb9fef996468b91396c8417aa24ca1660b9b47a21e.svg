<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Control and Release</title>
  <desc id="desc">This artwork captures the emotional interplay between control and surrender. The color palette features warm and cool tones that suggest intimacy (rose clay, warm shadow) interspersed with the overcooling cold blue and distant lilac, creating a tension that embodies the struggle between containment and overflow. The collision occurs in the center, where the dense patterns of the barcode (symbolizing surrender) meet the veil of control that emerges from the corners, suggesting both conflict and coexistence. This grid-like organization, marked by broken pixels, introduces a texture that evokes moments of interruption, like a stutter in acceptance.</desc>
