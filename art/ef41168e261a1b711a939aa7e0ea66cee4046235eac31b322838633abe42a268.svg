<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow of Emotion</title>
  <desc id="desc">This piece explores the delicate balance and tension between joy and grief. The palette merges warm yellows and oranges with cooler deep blues and muted purples to highlight contrast. Joy is expressed in rounded warm colors on the left, surrounded by lighter moments of empty space suggesting hope. Grief, represented on the right, is heavier with dark blues and deeper colors, filling the areas with a feeling of weight. The use of thin outlines and broken pixels provides an imperfection that echoes the complexities of human emotion while maintaining a beautiful, abstract rhythm.</desc>
