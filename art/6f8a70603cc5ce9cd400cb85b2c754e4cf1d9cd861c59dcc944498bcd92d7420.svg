  <title id="title">Collision of Tension</title>
  <desc id="desc">This artwork captures the emotional tension between defiance and submission through contrasting colors and patterns. The palette combines warm reds and pinks signifying defiance with cooler gray and dark maroon tones representing submission. The colors clash around the center, dominating the square, reflecting the conflict inherent within the themes. The rising signal layout reflects an upward movement, suggesting hope and escape. Broken pixels introduce intentional disruptions, symbolizing scars or resistance within a structured flow.</desc>
