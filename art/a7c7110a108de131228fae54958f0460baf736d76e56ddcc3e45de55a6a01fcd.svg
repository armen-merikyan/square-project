<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of the Flame</title>
  <desc id="desc">This piece captures the emotional dichotomy of 'spark' and 'ash,' symbolizing the tension between resilience and fragility. The chosen palette of brown, gray, warm ivory, soft gold, and deep wine combines muted and vibrant colors, representing the clash between hunger (intense desire) and restraint (contained longing). The layout features a broken central flow, embodying the pulse of two contrasting emotional forces, with broken pixels scattered throughout to convey imperfections and disruptions, echoing memory and erasure. The main collision occurs diagonally across the square, where the warm tones clash against the cooler grays, creating a rhythm of tension and release.</desc>
