<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict in Layers</title>
  <desc id="desc">The emotional tone reflects the push and pull between desire (represented by saturated tones) and restraint (muted shades), creating a visual interpretation of tension. The selected palette features 'red_oxide' and 'small_orange' for warmth and pulse, while 'blackened_plum' and 'muted_cream' provide contrast and depth. The layout 'rising_signal' creates a dynamic upward movement, embodying hope against a backdrop of limitations. Main contrast occurs centrally, where the crosshatched desire pattern collides with the radial restraint pattern, creating a palpable conflict.</desc>
