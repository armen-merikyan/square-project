<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece captures the emotional tension between spark and ash, representing sudden brightness clashing against soft remnants. The chosen palette of lime, black, electric blue, and magenta showcases the vibrancy of life against the background of erasure. The central area glows with lime and electric blue, representing resilience and the urge to burst forth, while surrounding layers fade into darker hues, suggesting restraint and decay. A radial halo pattern invites the eye to explore the central glow while jagged edges create interruptions, emphasizing the fight against erasure. The composition dance along the tension of structured bands of color, balancing chaos with moments of clarity and quiet.</desc>
