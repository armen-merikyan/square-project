<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece captures the emotional tension between vulnerability and strength. Utilizing a palette of soft mint and storm gray, contrasting elements from the 'shatter' and 'halo' patterns create a visual heartbeat. The centered collision of pale mint against storm gray suggests an exposed core amid encroaching pressure, while broken pixels introduce intentional imperfections, representing scars and vulnerabilities. The dominance of gray conveys stability, with lighter accents indicating hope and fragility. Overall, the composition's layout of negative space reinforces a feeling of anticipation—a push and pull of emotions within a complex narrative.</desc>
