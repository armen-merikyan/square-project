<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Strength</title>
  <desc id="desc">The artwork captures a tension between strength and vulnerability by juxtaposing dark, robust colors with soft, pale hues. The use of black as a dominant color represents strength, while pale blue suggests vulnerability, creating a visual contrast that echoes the emotional conflict suggested by the seed. The layout allows for intersecting patterns, with barcode structures on the darker edges clashing against the light flood of blue at the center, symbolizing a struggle for balance. Broken pixels introduce intentional imperfections, echoing the idea of 'broken mirrors' and the fragility of strength. The central collision of colors represents an emotional crossroads, addressing the themes of safety versus exposure in a visually compelling way.</desc>
