  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone captures the duality between strength and vulnerability. The chosen palette features muted and neutral tones, including off-white and dust gray, embodying softness and shelter, while compressed red serves as an accent, hinting at hidden intensity. The left side is dominated by static patterns reflecting strength, while the right flows with tidal patterns indicating vulnerability. The collision occurs at the center, where the two emotional currents overlap, creating an unresolved tension that embodies sheltering yet exposed spaces.</desc>
