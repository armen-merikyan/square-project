<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">This composition captures the duality of joy and grief through an interplay of colors and patterns. The palette combines bright yellows and oranges, representing joy, with muted purples and deep blues, symbolizing grief. The contrast arises from the central crack shape surrounded by a frame pattern, creating a dynamic tension between the bright internal energy and the outer weightiness. The asymmetric placement of broken pixels introduces imperfection, suggesting the fragility of emotions, while maintaining a sense of structure within the chaos. Thus, the seed manifests as a vivid dance of resonance and conflict within the grid's confines.</desc>
