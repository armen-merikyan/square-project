<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Reflection</title>
  <desc id="desc">This piece explores the emotional conflict of envy and gratitude through a contrast of heavy, darker tones (envy) on top, balanced by lighter, soft tones (gratitude) below. The palette comprising reds, blacks, and soft blues creates a stark visual tension, echoing the jagged edges created by broken pixels. The zigzag pattern created through the placement of colors represents the tumultuous journey between these two emotions, embodying the weight of envy against the lightness of gratitude. The structure encourages the viewer's gaze to traverse the canvas, symbolizing the delicate balance between these conflicting feelings.</desc>
