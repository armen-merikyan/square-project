<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Containment</title>
  <desc id="desc">The artwork embodies the emotional dichotomy of desire and restraint through contrasting colors and patterns. The use of saturated colors like hot coral and blood orange evokes intense emotional pulls, while the muted charcoal and hollow blue represent the holding back of these impulses. The layout showcases desire occupying one diagonal wedge, creating a strong focal point in the center, while the restraint in the opposite wedge emphasizes containment. The patterns—a halo for desire and a ladder for restraint—interact at the center, representing the conflict of emotions through overlapping colors and shapes. Broken pixels are employed strategically to suggest imperfection and tension, adding to the overall narrative of unresolved conflict.</desc>
