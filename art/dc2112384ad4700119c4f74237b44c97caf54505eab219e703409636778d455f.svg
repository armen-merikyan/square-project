<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">This artwork explores the emotional tension between longing and resolve through patterns and color contrasts. The chosen palette of pale aqua and mist gray reflects the complexities of both emotions—serenity underlines longing, while alarm red and ink blue add urgency and depth to the sense of resolve. The core features a crosshatch pattern representing resolve, compact and strong along the center, while the teeth pattern symbolizing longing occupies the periphery, suggesting a yearning that exists at the outer edges. The collision occurs predominantly at the center where the two patterns intersect, visually representing a struggle between the two states. Broken pixel disruptions create the sense of imperfection and distance, evoking the feeling of a mirror that not only reflects but shatters, leading to new forms of understanding.</desc>
