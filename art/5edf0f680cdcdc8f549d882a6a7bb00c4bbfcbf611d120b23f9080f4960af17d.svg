<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The artwork encapsulates the tension between love and betrayal through a carefully chosen palette of warm and cool colors. The primary colors, pink and dark maroon, represent love, while gray symbolizes the coldness of betrayal. The contrast of these emotions unfolds diagonally, mimicking the rising tension represented by the seed. Jagged edges and a crosshatch pattern add sharpness against softer transitions, reinforcing the motif of imperfection. Moreover, the choice to keep density low in certain areas speaks to the empty room implied by the seed, inviting viewers to reflect on what is absent amidst the emotional noise.</desc>
