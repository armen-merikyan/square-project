<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">This artwork explores the emotional tension between defiance and submission through a carefully constructed palette of navy, black, and dim cyan—colors representing weight and depth while interplaying with white bursts to signify moments of defiance. The dominant black and navy create a heavy, grounding effect on the bottom, while lighter colors float above, representing submission and echoing the seed's themes of conflict. The layout features a grid that evokes a sense of argument, with broken pixels creating imperfection and tension. The subtle transitions in color highlight the push and pull of opposing forces, where dense clusters collide with open spaces, embodying the emotional struggle from the seed.</desc>
