<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolution</title>
  <desc id="desc">This artwork explores the emotional tension between longing and resolve. The palette of electric blue, lime, and black captures the vibrancy of urgency against a backdrop of muted reflections. The main collision occurs centrally, where the tight maze pattern of resolve in electric blue interacts fiercely with the more fluid, flame-like longing in lime. This interplay creates a visual argument, embodying the struggle to contain yet express one's emotions, as the broken dots interrupt the flow, adding layers of complexity and texture.</desc>
