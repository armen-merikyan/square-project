<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Spaces</title>
  <desc id="desc">This artwork captures the emotional tension between defiance and submission, reflected through the use of contrasting colors and patterns. A palette of shelter green, warm brown, pale skin, cold white, and open blue establishes a grounding feeling while hinting at exposure and vulnerability. The stark contrast between dark edges and lighter centers creates a sense of collision and boundary, evoking the push and pull of an inner struggle. The broken frame pattern signifies defiance, while stacked layers embody submission, with an uneven border that embodies chaos edging into order. The zigzag flow intersperses definite motion with quiet pauses, allowing for tension to build and then recede throughout the composition.</desc>
