<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotions</title>
  <desc id="desc">The emotional tone juxtaposes serenity with underlying agitation. The palette combines moss green and bone white for peaceful fields, interrupted by rust and stone gray that reflect restlessness. The main contrast occurs diagonally, signifying a struggle between structured calm and chaotic interruptions. The layout’s division captures this tension: one side embodies order through stripes while the other disrupts this with a split-screen chaotic arrangement. The placement of broken pixels enhances the feeling of imperfection, suggesting cracks in peace.</desc>
