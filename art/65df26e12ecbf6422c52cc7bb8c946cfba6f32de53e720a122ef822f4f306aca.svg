<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Presence</title>
  <desc id="desc">The emotional tone reflects a struggle between longing and resolve, apparent in the jagged diagonal lines created with the rich greens and the warmth of the honey gold. The contrasts are dense on one side, representing the pressure of longing, while the opposite side is sparser, illustrating the clarity of resolve. This collision embodies the seed's themes, as the hues interact, pulling the viewer's attention diagonally across the square, evoking the push and pull of desire for closeness against the chill of distance.</desc>
