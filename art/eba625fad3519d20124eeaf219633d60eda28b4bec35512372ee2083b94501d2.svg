<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece captures the emotional tension between desire (represented by warm, saturated colors) and emptiness (illustrated through darker, cooler tones). The palette of hot coral and blood orange symbolizes the heat of longing, while hollow blue and charcoal evoke a sense of isolation. The central collision occurs where these colors meet, representing the threshold between explosive cravings and imposed limitations, articulated through flowing patterns that disrupt and interact across the grid. Broken pixels are incorporated to emphasize the imperfections and struggles intrinsic to desire versus containment.</desc>
