<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order Amidst Chaos</title>
  <desc id="desc">This composition embodies the emotional tension between 'panic' and 'control,' reflected in the use of a contrasting palette of vibrant lime and electric blue against deep black and soft magenta tones. The left side of the grid follows a structured pattern, echoing control, while the right side disrupts that order with random placements, evoking a sense of chaos. The arrangement suggests a collision between a stable center and surrounding instability, with the scattered vivid colors representing sparks of emotion fighting against a backdrop of emptiness, alluding to the theme of an ‘empty room’—a space filled with potential yet fraught with unease.</desc>
