<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone captures the conflict between desire and restraint, illustrated through a palette of rich colors and muted undertones. The use of saturated red_oxide and bright small_orange creates focal points representing desire, while the blackened_plum and iron_gray convey confinement and limitation. The diagonal layout forces collision between warm and cool tones, creating tension as the vibrant hues are interrupted by the darker edges. This abstract representation reflects the struggle and push against the sealed boundaries which symbolize restraint within the heat of desire, making the pattern dynamic and layered.</desc>
