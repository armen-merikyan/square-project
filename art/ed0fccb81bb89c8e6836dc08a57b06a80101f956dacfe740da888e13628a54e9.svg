  <title id="title">Exposure in Contrast</title>
  <desc id="desc">This artwork captures the delicate balance between vulnerability and strength through a palette of warm and cool tones reflecting emotional tension. The main contrast lies in the central block of vibrant coral and soft amber, symbolizing strength, while surrounding cooler shades of slate and black depict vulnerability. The idea of the ember shape seed informs the radial pattern that spreads from the center, while broken pixels are interspersed among the frame-like structure, illustrating the theme of exposure against protection.</desc>
