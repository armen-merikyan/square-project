<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">The emotional tone embodies a dynamic tension between desire and emptiness. The selected palette of hot coral, blood orange, dust pink, charcoal, and hollow blue reflects yearning and restraint, with vibrant colors representing desire encircled by muted tones representing emptiness. The collision happens primarily at the center where broken dots of desire overlap with the flooding emptiness, creating a visual echo of contrasting emotions. This arrangement reflects the concept of a saturated pull reaching toward an unyielding boundary, conveying the push-pull nature of longing and containment.</desc>
