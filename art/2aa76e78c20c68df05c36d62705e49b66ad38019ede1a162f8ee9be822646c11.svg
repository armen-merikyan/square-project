<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Waves of Turmoil and Serenity</title>
  <desc id="desc">This artwork captures the tension between restlessness and peace. The palette features soft, cool tones symbolizing calm (lavender_gray, moon_white) contrasted with deeper muted hues (rain_blue, muted_plum) representing chaos. The diagonal layout emphasizes the clash, as the vibrant accents emerge from the calm sea of colors. Intentionally broken pixels disrupt the flow, embodying that sense of shattering, while the quiet fields symbolize memory. The interplay between dark and light colors enhances the feeling of unease against comfort, suggesting an unresolved emotional journey.</desc>
