  <title id="title">Halo of Emotion</title>
  <desc id="desc">The artwork captures the tension between defiance and submission through contrasting colors and patterns. The palette embraces 'safety_exposure' with earthy greens and warm browns symbolizing a sense of enclosure against the cool, open blues and whites representing freedom and exposure. The hollow center, surrounded by chaotic ripples and broken frames, illustrates the struggle between order and chaos. Main collision happens at the edges, creating an uneven border that invites exploration and interruption.</desc>
