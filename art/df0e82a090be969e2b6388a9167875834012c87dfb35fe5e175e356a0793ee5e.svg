<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">The artwork reflects the emotional dichotomy between restlessness and peace. The palette, drawn from deep navy, black, and dim cyan, embodies a lonely yet serene atmosphere, accentuating the struggle of quiet moments disrupted by flashes of intensity. The main collision occurs diagonally across the grid, where structured patterns of peace (stair-like) interrupt the chaotic veil of restlessness. This tension symbolizes the ongoing battle between calm and chaos, accentuated by broken pixels that represent the fragmented emotions encountered in memory and motion.</desc>
