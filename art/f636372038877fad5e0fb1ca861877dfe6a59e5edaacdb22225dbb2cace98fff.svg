<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Clash of Echoes</title>
  <desc id="desc">The emotional tone conveys the tension between rage and tenderness. The palette juxtaposes passionate reds for rage against soft pale blues for tenderness, creating a vivid contrast. The left half features deeper, saturated colors representing the intensity and chaos of rage, while the right half uses muted tones for tenderness and calm. The main collision occurs at the vertical center where the jagged threshold pattern of rage meets the gentle target pattern of tenderness, symbolizing how these emotions can bleed into one another. Broken pixels disrupt the order, reflecting the imperfections in emotional experiences.</desc>
