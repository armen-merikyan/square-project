  <title id="title">Contrast of Emotion</title>
  <desc id="desc">This artwork embodies the juxtaposition of softness and severity through a palette of soft pastels and deep darks. The collision occurs in the center where the 'crack' pattern of softness meets the stark 'stack' of severity, creating tension. It depicts a flow where softness invites severity, amplifying the emotional impact of each hue. The broken pixels disrupt the symmetry, reinforcing the theme of conflict within harmony, while preserving negative space enhances the open gate metaphor.</desc>
