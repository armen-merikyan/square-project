<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition expresses the tension between vulnerability and strength. The color palette of sepia, tan, dust gray, and faded blue evokes a sense of faded memory and longing. The central saturation creates a dynamic that embodies strength, while the contrasting lighter border represents vulnerability. Dots, symbolizing vulnerability, clash with the static blocks of strength, primarily dominating the central area, creating a gradient tension at the edges where the two emotions collide. Broken pixels act as intentional disruptions, suggesting scars or faults in the facade of strength. The layout is dense at the center with echoes of open space around, creating a balance that resonates with the given seed.</desc>
