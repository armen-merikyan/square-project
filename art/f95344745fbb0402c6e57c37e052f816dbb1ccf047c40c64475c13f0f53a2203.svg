<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Quiet Channel of Emotion</title>
  <desc id="desc">This composition captures the emotional tension between longing and resolve. The soft amber and warm coral create a sense of yearning, contrasted by the cold slate and blue-black, which represent a firm, steady resolve. The main collision occurs in the center with a dense pattern of lattice against the quieter crack pattern of longing, suggesting an interplay between hope and stability. Broken pixels are used to symbolize the remnants of the past, creating intentional imperfections that invite reflection.</desc>
