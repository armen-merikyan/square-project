<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork contrasts the themes of vulnerability and strength through a dynamic interplay of colors and patterns. The ice blue and clean white colors represent clarity and vulnerability, while ink black introduces strength and density, creating a palpable tension. The center of the grid, filled with muted hues, suggests an exposed vulnerability, while the surrounding dark colors create a protective border. The zigzag flow emulates movement, lending a sense of rising, as if hope or escape is attempted against the weight of presence. Broken pixels disrupt the symmetry, symbolizing the imperfections and scars in the struggle between these emotions.</desc>
