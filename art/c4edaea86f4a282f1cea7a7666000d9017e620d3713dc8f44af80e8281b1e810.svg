<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Reflection</title>
  <desc id="desc">This piece explores the emotional contrast between fear and hope through a split vertical layout, reflecting the conflict inherent in human experience. The dark colors of the palette represent fear, with jagged edges and a split personality, while the hints of soft gold and pale green symbolize hope, glowing against the shadow. Each half reflects a different emotional state, yet both sides collide at the center, creating a burst of tension—a moment of confrontation. The texture variation suggests a machine-like quality, echoing the rigidity of the emotional landscape.</desc>
