<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragments of Resilience</title>
  <desc id="desc">This piece captures the tension between brightness and darkness, symbolizing the struggle of 'spark' against 'ash'. The palette features vibrant hot magenta and electric blue, juxtaposed with static gray and dead black. The clash of maze and crack patterns forms a distinct division in the grid, with the standout burst of hot magenta representing resilience, dominating the upper half, while the cooler tones symbolize restraint and fading memory in the lower half. Broken pixels introduce intentional disruption, reinforcing the concept of fragmented memory and contrasting force.</desc>
