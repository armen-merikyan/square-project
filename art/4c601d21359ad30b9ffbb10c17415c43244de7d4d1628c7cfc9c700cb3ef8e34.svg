<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This artwork explores the emotional tension between quietness and pressure, emphasizing a core conflict where dense, dark colors represent pressure while softer tones suggest quiet moments. The chosen palette of off-white, dust gray, and dark navy creates a stark contrast that defines the boundaries of pressure and calm. The dense cluster of darker colors dominates the upper left corner, suggesting pressure, while the lighter tones dissipate towards the lower right, symbolizing release. The diagonal flow mimics arguments, with hard edges colliding against softer backgrounds, leading to an unsettling yet inviting composition.</desc>
