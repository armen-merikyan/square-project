<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Within the Tension</title>
  <desc id="desc">This composition embodies the emotional tug-of-war between awe and terror, contrasting the warm tones of pink and red with the coolness of gray and dark maroon. The palette suggests a narrative of love tinged with betrayal. The zigzag flow combined with soft edges evokes a dynamic tension, where the eye is drawn center-outward, mimicking a wave of oscillating emotion. The sharp vs. soft contrast is embodied in the placement of darker colors against lighter ones, intersecting at various points to mirror the push and pull of stability against instability. Broken pixels introduce an imperfection, reflecting fractured memories intertwined with a hopeful rise, while maintaining a necessary portion of negative space to represent gaps in emotional clarity.</desc>
