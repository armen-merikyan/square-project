<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Distortion</title>
  <desc id="desc">This artwork explores the emotional duality of joy and grief, expressed through contrasting colors and sharp transitions. The top section embodies joy with bright yellows and oranges, while the bottom represents grief using muted purples and deep blues, creating a split-screen effect. The patterns are defined as sharp edges representing tension (grief) versus rounded, soft placements illustrating joy, resulting in a dynamic interplay. The color placement disrupts the viewer’s understanding of safety versus threat, creating a sense of unrest echoing human emotions. Negative space is preserved to emphasize interruption between the two emotional states while remaining abstract without literal imagery.</desc>
