<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects the tension between desire and restraint, embodied through a dynamic clash of warmth (saturated colors representing desire) and cool, muted tones (symbolizing restraint). The palette includes hot coral and blood orange for the passionate pull, contrasted with charcoal and hollow blue to represent containment. The main collision occurs at the center where saturated colors create an explosive energy, while the threads of muted hues weave around it, enforcing the feeling of pressure against a sealed edge. The staircase and thread patterns collide at this focal point, suggesting the push and pull of emotions.</desc>
