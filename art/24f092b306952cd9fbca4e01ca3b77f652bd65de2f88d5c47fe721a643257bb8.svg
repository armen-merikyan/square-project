<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tides of Emotion</title>
  <desc id="desc">The artwork evokes the struggle between certainty and curiosity through a palette balancing soft pinks and stark blacks. The soft colors embody warmth and comfort, while the darker tones signify severity and tension. The predominant warm whites and carbon blacks create a sharp contrast, where the chaos of curiosity punctuates the otherwise ordered structure. The main collision occurs centrally with densely packed warm pixels interrupted by cooler, darker shades. This layout symbolizes the tension between rising signals of curiosity while being grounded by the pillars of certainty.</desc>
