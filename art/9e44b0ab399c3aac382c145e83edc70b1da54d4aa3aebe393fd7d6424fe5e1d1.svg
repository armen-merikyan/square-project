<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a struggle between desire, represented through vibrant warm hues, and emptiness, modeled by darker, muted shades. The palette involves fiery colors like blood orange and hot coral that signify intensity and longing contrasted against the quiet, hollow blue background that symbolizes vast emptiness. The main collision appears near the center, where a cluster of bright colors interrupts a sea of dim tones, creating tension akin to a pull toward a locked boundary. The presence of broken pixels adds scars to the smooth areas, representing imperfections and the disruption of desire. This arrangement deliberately avoids symmetry to emphasize the conflict and contrast between fullness and absence.</desc>
