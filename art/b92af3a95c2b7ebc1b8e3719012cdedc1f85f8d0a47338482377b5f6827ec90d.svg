<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Depths</title>
  <desc id="desc">This piece conveys a sense of emotional contrast through the juxtaposition of dark and light colors. The palette incorporates cool navy and dim cyan against a backdrop of deep black, embodying the themes of emptiness and desire. The central light pixel breaks into surrounding dense dark, symbolizing rising hope amidst profound loneliness. The patterns echo a feeling of struggle, with stripes symbolizing emptiness and rain representing desire. This collision suggests a movement from dark heaviness to flickers of light, laying bare the raw dynamics of human emotion.</desc>
