<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hinge Between States</title>
  <desc id="desc">This composition captures the tension between control and surrender through a split layout. The top half employs a barcode pattern representing control with precise, dark cosmic indigo and void black, creating a 'locked border' feeling. Meanwhile, the bottom half utilizes a more fluid thread pattern in deep teal and cold gold, symbolizing surrender's soft, yielding nature. The collision occurs centrally where the contrast is strongest, mirroring the emotional struggle between containment and overflow. Broken pixels introduce intentional imperfections, enhancing the sense of disruption. Overall, the palette evokes awe and terror, underscoring the emotional intensity of this juxtaposition.</desc>
