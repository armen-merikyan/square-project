<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Embrace</title>
  <desc id="desc">This composition explores the emotional dichotomy of safety and exposure. The color palette, featuring muted greens and warm browns against pale skin and cold white accents, embodies the gentle weight of safety versus the bright vulnerability of exposure. The primary contrast occurs through a diagonal echo effect, where the barcode pattern representing exposure collides with the tide pattern symbolizing safety, creating a sense of tension and resolution. The arrangement leaves ample negative space, mimicking an open center, while the broken pixels within the patterns serve as intentional disruptions, illustrating the fragility of balance between these emotions.</desc>
