<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Desire</title>
  <desc id="desc">This composition explores the emotional tension between desire and restraint through a clash of vibrant and muted colors. The palette of 'hunger_restraint' offers rich reds and muted creams to embody warmth and cool containment respectively, echoing the contrasting emotions. The primary collision occurs in the center, where bright red and small orange pixellations break through a more contained background of muted cream and blackened plum, suggesting the struggle between what's held back and what pushes through. The design reflects spirals of pressure, resonating with the emotions expressed in the seed, utilizing asymmetrical patterns to enhance the feeling of interruption and imbalance.</desc>
