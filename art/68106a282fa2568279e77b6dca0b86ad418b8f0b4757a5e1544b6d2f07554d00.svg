<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Duality</title>
  <desc id="desc">The emotional tone reflects a balance between control and surrender, captured through two contrasting patterns. The palette features deep blues and pale yellows to symbolize depth and lightness, while the black serves as a grounding element. The top four rows (control) showcase fragmented dots to create a sense of contained pressure, while the bottom four (surrender) exhibit a checker pattern for a feeling of openness and yielding. The collision occurs at the center of the grid, where the two patterns meet, symbolizing the tension between control and surrender, and leaving ample negative space to reflect quiet moments amidst chaos.</desc>
