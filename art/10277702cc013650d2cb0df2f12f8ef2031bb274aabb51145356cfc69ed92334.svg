<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal in the Static</title>
  <desc id="desc">This composition reflects the emotional conflict of restlessness opposing serene peace. The palette, featuring muted soft tones of powder pink and warm white juxtaposed with the sharp contrasts provided by carbon black and steel gray, conveys the tension between calmness and chaos. The diagonal layout captures this conflict, as peace occupies one wedge while restless colors fiercely interrupt from the opposite side. The intentional broken pixels create disruptions that symbolize fleeting memories and static noise, enhancing the overall tension and depth of the artwork, while leaving ample negative space for reflection.</desc>
