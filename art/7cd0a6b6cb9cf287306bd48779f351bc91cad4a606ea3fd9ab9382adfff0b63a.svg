<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone captures the tension between vulnerability and strength, using a palette that juxtaposes warmth and coolness to represent exposure (soft amber, warm coral) against feelings of protection (cold slate, blue black). The main contrast shimmers in the center, where warmer colors collide with darker tones, illustrating the feeling of oscillation between safety and exposure. The layout mirrors on the left and right yet includes intentional disruptions, reflecting the broken and imperfect nature of both strength and vulnerability. The pattern used echoes across the grid, reinforcing the dynamic interplay of care and risk.</desc>
