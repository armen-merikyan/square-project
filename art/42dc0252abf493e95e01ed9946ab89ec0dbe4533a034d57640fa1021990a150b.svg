<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Divided Resilience</title>
  <desc id="desc">This piece embodies a tension between defiance and submission, reflected through a warm palette of hot coral and blood orange against cooler charcoal and hollow blue. The primary contrast occurs in the center where bright, bold colors clash with muted tones, manifesting the conflict of emotions. The ordered 'barcode' pattern for submission overlays the 'split_screen' for defiance, creating an asymmetric tension that lines the edges with quiet expanses of gray, suggesting an unyielding barrier amidst an open space. Broken pixels introduce intentional disruptions that echo the theme of resistance amidst submission.</desc>
