<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center and Edges</title>
  <desc id="desc">The emotional tone reflects the delicate balance of vulnerability against the strength of structure. I chose a palette with muted colors like off_white and dust_gray to embody a sense of softness, contrasted with compressed_red and dark_navy to represent strength and pressure. The main collision occurs at the center where the stripes of vulnerability meet the glitch patterns of strength, creating an interplay of resistance and softness. The arrangement reflects the tension of pressure bordering the unyielding center, with purposeful negative space at the corners to emphasize the collision and flow of emotion throughout the grid.</desc>
