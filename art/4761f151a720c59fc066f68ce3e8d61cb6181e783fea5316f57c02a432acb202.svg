<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interference</title>
  <desc id="desc">The emotional tone reflects a push-pull between defiance and submission. The palette is intentionally chosen to contrast warm earth tones with cool shades, representing the struggle of being enclosed yet exposed. The central area is dense with dark colors, suggesting defiance and strength, while the edges feature lighter hues symbolizing softness and retreat. The main collision occurs in the center, where rich shades press against lighter fields, creating an echoing effect of tension and release. The overall pattern suggests a maze-like complexity of emotion, informed by the seed’s abstract qualities of conflict and resonance.</desc>
