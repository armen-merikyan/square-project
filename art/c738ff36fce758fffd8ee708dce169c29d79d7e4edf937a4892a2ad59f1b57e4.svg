<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece resonates with the emotional tension between vulnerability and strength, depicted through an exposed center surrounded by softer colors that invoke fragility, alongside deeper shades to suggest stability. The selected palette incorporates earthy tones representing resilience and fragility, where bone white signifies purity and unshielded light, while moss green suggests growth and a hint of strength. The layout is intentionally off-center, with the flowing patterns of spark interrupting the stronger, structured stairs. Here, the main collision occurs in the center where the layers of strength and vulnerability blend yet disrupt each other, creating a compelling visual narrative about finding balance between these conflicting emotions.</desc>
