<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast in Tension</title>
  <desc id="desc">The artwork captures the emotional duel between relief and dread through color placement and texture. The warm tones evoke feelings of security, while the cooler, darker shades represent an underlying tension. The palette of sepia, tan, dust gray, and faded blue creates an atmosphere of broken memory. The design employs a falling layout to symbolize downward pressure, leaving negative space to enhance the feeling of emptiness. Broken edges in the distribution of colors lend to an asymmetric pattern, echoing the push-pull of conflicting emotions. The colors collide diagonally: lighter hues battling denser, darker blocks, illustrating the struggle between calm and rage.</desc>
