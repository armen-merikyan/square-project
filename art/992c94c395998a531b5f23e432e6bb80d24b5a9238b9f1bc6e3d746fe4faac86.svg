<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This piece captures the emotional tension between trust and suspicion using a palette that evokes warmth and conflict. The colors range from soft pinks and reds to deep grays and dark maroon, representing trust's inviting nature against suspicion's darker undertones. The layout features an almost mirrored composition that disrupts itself with intentional broken pixels, creating fractures in the perceived order. The major collision occurs along a diagonal that divides the square, symbolizing an ongoing battle between stability and chaos.</desc>
