<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Against Restraint</title>
  <desc id="desc">The emotional tone reflects a struggle between longing (desire) and confinement (restraint). The palette was chosen to embody deep feelings of warmth and muted restraint, balancing saturated reds with somber muted greys and creams. The primary collision occurs in the center where the intense reds encounter the constrained gray and black, visually representing emotional pressure against an unyielding border. The patterns of broken frames signify desire pushing outward while thread patterns suggest the confines of restraint, creating an echo of tension.</desc>
