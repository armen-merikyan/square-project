<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Corner</title>
  <desc id="desc">This composition explores the emotional tension between quiet and pressure. The color palette balances soft tones of off-white and faint peach against darker, more intense shades like dark navy and compressed red, creating a sense of depth and contrast. The top left corner is densely packed with a flood of quiet colors, giving way to a more open, chaotic lower right, echoing the concept of pressure exerting control while simultaneously inducing confusion. The layout leads the eye diagonally, capturing the essence of struggle and release within a seemingly ordered space that ultimately disrupts the viewer's perception.</desc>
