<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">The emotional tone balances between the tension of pressure and the softness of quietness. The palette combines muted hues like off-white and dust gray to depict quietness, contrasted by the deeper tones of compressed red and dark navy, symbolizing pressure. The layout represents a rising signal with dense colors at the bottom gradually loosening into lighter shades, creating a sense of upward motion. The main collision occurs diagonally across the square, where bold accents clash with softer fields, echoing the themes of clarity vs. confusion and a break against symmetry.</desc>
