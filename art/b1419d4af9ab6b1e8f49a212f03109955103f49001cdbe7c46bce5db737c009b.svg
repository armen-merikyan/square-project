<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This piece embodies the emotional wrestling of restlessness and peace. The palette of cosmic indigo and void black creates a deep, contemplative space, while the cold gold and star white punctuate the canvas with moments of clarity and agitation. The collision occurs diagonally across the grid, where the stacked patterns of peace and restlessness overlap, suggesting unresolved motion between calmness and unease. This reflects the themes of digital signal noise versus serene memory, resonating with the idea of movement caught within static embraces.</desc>
