<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Tension</title>
  <desc id="desc">The emotional tone captures a struggle between defiance and submission, reflected in the clash of bold versus subdued colors. The chosen palette of cosmic indigo, void black, star white, cold gold, and deep teal emphasizes a cosmic void that runs beneath the surface tension, while broken pixels signify moments of imperfection and tension. The main contrast occurs in the center where a block of deep teal disrupts a chaotic background of indigo and black, reflecting the emotional collision of strength against surrender. This configuration creates both pressure and a quiet pulse, encapsulating the dynamic tension within the seed's abstract narrative.</desc>
