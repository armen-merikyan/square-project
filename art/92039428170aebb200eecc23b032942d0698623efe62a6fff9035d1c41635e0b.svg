<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Containment</title>
  <desc id="desc">This composition embodies the emotional tension of desire and restraint through a dynamic interplay of warm and cool colors. The selected palette of 'hunger_restraint' evokes an overwhelming yet contained feeling, with the bright red oxide pulling at the muted cream and blackened plum, creating a swirling spiral that draws attention to the center while still leaving space around the edges. The main collision occurs at the center where bright warm colors meet cooler, contained shades, symbolizing the conflict between an insatiable longing and the imposed boundaries of restraint. The spiral pattern reflects this movement, while the distinct clusters within the braid pattern create a sense of locked space, punctuated by broken pixels that hint at imperfections, reinforcing the theme of love and betrayal.</desc>
