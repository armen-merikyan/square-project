<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the tension between vulnerability and strength, as suggested by the seed. The color palette, comprising muted tones of sepia, tan, dust gray, and faded blue, reflects a sense of nostalgia and fragility. The central region, dominated by a pale, exposed color, signifies vulnerability, while darker hues at the edges provide a protective frame that conveys strength. The main collision occurs in the center-left, where the patterns of the 'rain' and 'maze' intertwine, creating a visual dialogue that echoes the central theme of exposure against shelter. The broken pixels offer intentional disruptions, symbolizing the inherent imperfections in this emotional struggle.</desc>
