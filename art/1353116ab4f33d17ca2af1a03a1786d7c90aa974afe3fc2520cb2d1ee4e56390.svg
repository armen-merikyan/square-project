<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece captures the emotional tension between defiance and submission through a stark contrast of colors and patterns. The dominant use of dark colors (#000000, #333333) encircles lighter accents (#FFA500, #A0C8E1), representing defiance pressing against the calm of submission. The checker pattern in the center suggests a structured defiance, while the surrounding static texture evokes a subdued submission. The arrangement intentionally uses broken pixels to create a sense of interruption and imperfection, enhancing the complexity of emotions portrayed. The center acts as a point of pressure surrounded by the softer edges, illustrating a struggle between two emotional states.</desc>
