<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Collision</title>
  <desc id="desc">This piece explores the emotional tension between defiance and submission through the use of contrasting color placement and patterns. The palette—dominated by electric blue and accented with lime—evokes a sense of defiance, while the muted black serves to ground the composition in submission. The central collision occurs in the lower corner, heavily filled and contrasting with negative space in the upper area, suggesting a struggle between overwhelming pressure and a desire to create calm. The broken dots pattern suggests moments of defiance, while the ripple effect implies the ongoing influence of submission. Together, they create a dynamic flow that embodies both chaos and restraint.</desc>
