<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Opposites</title>
  <desc id="desc">The emotional tone of this piece reflects a tension between vulnerability and strength. The palette of shelter green, warm brown, pale skin, cold white, and open blue creates an interplay between warmth and coolness, mirroring the dichotomy of lightness versus weight. The main collision occurs diagonally, with strength in the lower left using broken dots creating a dense foundation against the softer, sparser spark pattern in the upper right. The arrangement echoes the ideas of closed corners and the horizon, suggesting both safety and exposure. Negative space is preserved in the upper zone to symbolize vulnerability, letting the palette breathe and create a dynamic visual tension.</desc>
