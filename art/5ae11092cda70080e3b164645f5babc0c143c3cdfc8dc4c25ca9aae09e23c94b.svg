<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition expresses the emotional tension of desire and emptiness through a stark palette contrasting warm vibrant colors against cool muted tones. The top half uses stripes of hot coral and blood orange to evoke the yearning of desire, while the bottom half employs dots of charcoal and hollow blue to represent emptiness and containment. The main collision of these emotions occurs at the horizontal split, emphasizing the struggle between a pull toward warmth and an enclosing chill, embodying the complexity of human emotion.</desc>
