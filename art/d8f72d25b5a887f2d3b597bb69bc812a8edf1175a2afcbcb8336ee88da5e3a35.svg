<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">This piece embodies the emotional oscillation between fear and hope. The palette of black, dark violet, soft gold, and pale green plays into contrasts where darkness envelops the edges while soft gold acts as a beacon of light in the center. The structure represents a collision of patterns: jagged fear constructs against the flow of hopeful stripes, depicting the interplay of chaos and calm. The negative spaces around these elements leave room for contemplation, highlighting the tension within alternating colors. Ultimately, this piece manifests the complexity of human emotions without reverting to literal imagery.</desc>
