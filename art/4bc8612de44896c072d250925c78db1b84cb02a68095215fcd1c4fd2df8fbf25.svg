<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Order and Release</title>
  <desc id="desc">This composition embodies the emotional tension between control and surrender through contrasting warm and cool colors. The structured layout reflects control with measured, stair-like patterns in darker tones, while the softer rain-like patterns in warm pastel colors symbolize surrender. The center serves as a collision point; the warmth of the center spills into the cooler, darker edges, creating a visual narrative of overflow and containment. The palette of rose clay and distant lilac provides intimacy balanced against cool blue, echoing a feeling of both warmth and aloofness, while broken and irregular pixels suggest imperfections, inflections of a more chaotic emotional landscape.</desc>
