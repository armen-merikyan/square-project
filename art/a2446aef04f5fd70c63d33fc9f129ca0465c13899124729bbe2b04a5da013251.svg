<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The emotional tone juxtaposes defiance with submission, where the palette of deep blues, mourning black, and pale yellow creates tension through the contrasting cool and warm colors. The center of the grid represents defiance with an upward flow pattern, while the edges reflect submission through softer, receding colors. The collision occurs at the central pixels, where hard interruptions clash with softer sparks, simulating both conflict and resolution, echoed in the spiral pattern that drives inward. The broken pixels are intentional scars emphasizing imperfection, suggesting an ongoing struggle between density and emptiness.</desc>
