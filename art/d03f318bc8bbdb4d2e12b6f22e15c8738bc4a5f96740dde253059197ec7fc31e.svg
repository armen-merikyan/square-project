  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone balances vulnerability and strength, highlighting the tension between dense, dark shades and softer pastels. The palette includes shelter green and pale skin to convey warmth and protection against deep blues representing exposure. The main collision occurs at the center, where densely packed sections of glitch-like lighter colors break into heavier bands, creating a sense of struggling against barriers. This reflects the overarching theme of safety encountering an unprotected open space, embodying the complexities of the seed's themes.</desc>
