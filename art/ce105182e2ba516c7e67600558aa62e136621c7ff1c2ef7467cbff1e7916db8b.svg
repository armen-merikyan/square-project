<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Dissonance</title>
  <desc id="desc">This composition embodies the tumult of love and betrayal through an abstract lens. The palette combines warm tones of pink and red with cooler grays and dark maroon to symbolize emotional turbulence. The contrast is accentuated through a split arrangement where warm colors collide against muted tones, creating a rhythm that reflects an inner struggle. The placement mimics the flow from right to left, symbolizing the push and pull of emotions, while allowing for negative space to maintain an impactful silence amidst the chaos. The 'diamond' shape seed manifests subtly through the color arrangements rather than literal representation.</desc>
