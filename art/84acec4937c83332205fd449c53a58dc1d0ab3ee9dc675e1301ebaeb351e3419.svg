  <title id="title">Tension of Yearning</title>
  <desc id="desc">This composition embodies the struggle between longing and resolve, utilizing a palette that oscillates between warmth and coolness. The colors hot coral and blood orange suggest urgency and desire, while charcoal and hollow blue introduce a sense of calm and distance. The primary collision occurs in the center where the warmer tones tumble downward amidst cooler spaces, representing the tension of yearning against the weight of resolution. Broken pixels are scattered intentionally, evoking moments of interruption and the feeling of a mirrored surface that is cracked yet holding together.</desc>
