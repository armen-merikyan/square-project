<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">This artwork captures the emotional tension between joy and grief through a juxtaposition of patterns. The palette blends bright yellows and oranges, symbolizing joy, against muted purples and deep blues, representing grief. The top half embraces joyful grid-like structures, while the bottom is filled with a checker pattern reflecting disarray and sorrow, honoring the split-screen concept. The hard edges signify a boundary between these emotions, creating a stark contrast that evokes feelings of both safety and threat. The placement and density shift from calm to pressure, suggesting a narrative of tension amidst tranquility.</desc>
