<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Core Collision</title>
  <desc id="desc">The emotional tone of this artwork embodies the tension between vulnerability and strength, evoking feelings of both exposure and protection. I chose a palette of lime, black, electric blue, and magenta to symbolize a juxtaposition of light and darkness. The black offers a grounding contrast, while lime and electric blue create a vibrant, pulsating energy, suggesting rising signals against the backdrop of shelter. The layout, inspired by a spiral pressure, draws colors toward the center—creating a dynamic push and pull that mirrors conflict and connection. The main collision occurs in the center where the strong edges of black sharply contrast with the soft dots of lime and magenta, representing the interaction of resilience against fragility. Broken pixels are strategically placed in the perimeter, creating intentional disruptions akin to cracks in strength, contributing to the theme of vulnerability.</desc>
