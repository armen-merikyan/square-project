<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork explores the emotional tension between vulnerability and strength through a contrasting palette of dark navy and soft whites. The arrangement creates a dynamic shift from a thick, dominant border representing strength, to a softer exposed center symbolizing vulnerability. The 'flood' pattern collides with 'target', creating an interruption that emphasizes the fragile nature of the center while maintaining a steady flow from the corner to the center. The piece conveys a dialogue of resilience and fragility, with negative spaces allowing the intense colors to breathe amidst the overwhelming presence.</desc>
