<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Chiaroscuro</title>
  <desc id="desc">This composition explores the tension between love and betrayal through sharp contrasts and subtle echoes. The palette combines warm pinks and reds with cold greys and dark maroons, representing love's warmth alongside the cool, distant feeling of betrayal. The layout employs a mirror-broken structure, creating a symmetrical appearance disrupted by mismatched colors that symbolize misalignment in relationships. The patterns of dots invoke a sense of connection that fades into both softness and sharpness, illustrating the push and pull of emotional duality. The negative space is maintained to invite contemplation, echoing the theme of an empty room laden with unspoken tensions.</desc>
