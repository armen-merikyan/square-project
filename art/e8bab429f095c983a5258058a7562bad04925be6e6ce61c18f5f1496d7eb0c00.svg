<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Between Safety and Exposure</title>
  <desc id="desc">The emotional tone is a delicate balance of safety and exposure, represented through a palette that contrasts warm browns symbolizing security and soft greens for vulnerability. The composition features a dense central area with ring patterns of open blue and pale skin, serving as a protective core against the broken dots in the surrounding layers. This juxtaposition evokes an echo of tension, with the borders struggling against the saturated center. The main collision happens vertically, symbolizing the split between safety and exposure, creating a rhythmic pulse throughout the piece.</desc>
