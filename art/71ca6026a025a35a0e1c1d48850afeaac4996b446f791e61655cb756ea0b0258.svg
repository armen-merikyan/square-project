<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict and Containment</title>
  <desc id="desc">This piece conveys the emotional tension between rage and calm through contrasting colors and patterns. The palette incorporates deep blacks and fiery reds to represent rage, while soft pastel blues and whites symbolize calm. The main contrast occurs between the center and the edges, where the jagged red 'thread' pattern disrupts the calm 'spark' pattern of pale blue, echoing the struggle between overwhelming chaos and quiet containment. The intentional broken pixels serve as scars from emotional eruptions, creating an overall sense of unresolved motion, fitting the seed's themes of collision and tension.</desc>
