<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Order and Release</title>
  <desc id="desc">The artwork evokes a dynamic interplay between control and surrender. The dark colors on the left symbolize structure, restraint, and confinement, while the lighter colors on the right suggest openness, release, and vulnerability. The central pivot point represents the overfilled center, where oppositional forces collide and interact. The chosen palette reflects both safety and exposure, embodying the nuanced tension of the emotional seed. The central area is dense, creating a feeling of pressure, contrasting with surrounding lighter fields that offer a soft surrender. Broken pixels are intentionally scattered to represent disruptions in the neatness of control, hinting at the complexity of surrendering amid rigidity. This composition resonates with the themes of conflict and balance, navigating between constraining order and the beauty of unguarded release.</desc>
