<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Control and Surrender</title>
  <desc id="desc">The emotional tone of this piece reflects a battle between control and surrender, with the pattern representing a struggle against fluidity. The selected palette of muted creams and warm tones embodies feelings of restraint and hunger, while the dark shades introduce a tension that contrasts with the softness of the lighter colors. The central collision occurs in the vertical center, where warmer tones almost overflow into darker edges but are contained by cooler grays, symbolizing the interplay of pressure and release. Broken pixels punctuate the surface to evoke an element of imperfection and vulnerability inherent in any attempt to contain turmoil.</desc>
