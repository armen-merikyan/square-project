  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone of this composition balances strength's rooted contrast with vulnerability's soft breaks. The palette features strong navy and black to signify strength, against dim cyan and white to depict vulnerability. The main contrast occurs where the dark upper rows collide with the lighter lower ones, creating a tension between structure and fragility. The direction of flow suggests an ongoing struggle, as the crosshatched patterns in the top half meet the noisy patterns below, simulating the interplay of safety and exposure expressed through the seed’s themes.</desc>
