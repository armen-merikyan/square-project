<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Emotions</title>
  <desc id="desc">This pixel art captures the tension between envy and gratitude through a contrast of dark and light colors. The palette mainly consists of navy and black juxtaposed against softer shades of dim cyan and white, representing the heaviness of envy against the lightness of gratitude. The composition flows downward, suggesting an unsettling rain of emotions, with clusters of darker tones placed towards the edges, creating a sense of pressure and forming a central void that symbolizes an empty room. This negative space evokes feelings of longing and introspection, while broken pixels disrupt the symmetry, hinting at the imperfections in emotional experiences.</desc>
