<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light versus Weight</title>
  <desc id="desc">The emotional tone captures a struggle between joy and grief, represented by the contrast of warm yellows and oranges against deep blues and muted purples. The palette conveys joy with bright colors while grounding the piece in darker hues to indicate grief. The collision occurs in the center with light elements clashing against darker, heavier tones, embodying the seed's essence of 'pulse' and 'grid against dots.' The layout features a corner invasion, intensifying this emotional juxtaposition. Broken pixels surface the imperfection of experience, enhancing the abstract narrative.</desc>
