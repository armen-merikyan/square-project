<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork explores the emotional tension between tenderness and rage, utilizing a palette of deep blacks and intermittent bright reds along with soft blues and whites to navigate this contrast. The central dense area, marked by aggressive pulse marks (rage) in red, clashes against the calmer, softer flame-like patterns of pale blue and white that attempt to contain it. The layout mirrors an overfilled center, wherein the outer bands act as a gentle restraint against the more chaotic center. Broken pixels throughout evoke a sense of imperfection and raw emotion—a reminder of the struggle between conflicting feelings. The contrasts, particularly at the center where emotion collides, create a dialogue between these two powerful states, allowing the viewer to perceive the layers of complexity in human emotion.</desc>
