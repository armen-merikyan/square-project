<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience and Fragility</title>
  <desc id="desc">This piece explores the tension between fleeting sparks of life and the settling quiet of ash, using color and placement to reflect emotional duality. The warm coral and soft amber represent sparks, while the cold slate and blue-black symbolize the weight of ash. The diagonal layout emphasizes the conflict between these two states, where the brighter hues are concentrated in one wedge, colliding with the darker mass. Broken pixels introduce intentional imperfection, signifying the fragility of memory and existence, enhancing the abstract narrative.</desc>
