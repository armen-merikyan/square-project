<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tear of Connection</title>
  <desc id="desc">The emotional tone reflects the tension between isolation and intimacy, with the top half embodying 'loneliness' through a muted palette of dark reds and charcoals, creating an oppressive feeling. The bottom half contrasts with a burst of warmth and gold, representing 'connection' and a sense of illuminated hope. The crosshatched patterns contribute to a visual rhythm that echoes the push and pull of the emotional themes, while the tear shape subtly disrupts the overall grid, suggesting imperfection and the fragility of connections.</desc>
