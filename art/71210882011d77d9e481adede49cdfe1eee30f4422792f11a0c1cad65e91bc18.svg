<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Contrast</title>
  <desc id="desc">This artwork explores the emotional contrasts between loneliness and connection. The palette, consisting of warm yellow and orange against deep blue and muted purple, reflects this duality. The center is intentionally a muted purple, representing connection, while the surrounding pixels are warm but chaotic, symbolizing loneliness. The use of a mirror pattern for isolation disrupts the connections made with the dot pattern, creating a visual conflict. The left-weighted edge style echoes a feeling of imbalance, as if the weight of loneliness pulls down the bright connections. Overall, the arrangement creates a sense of tension—a push-and-pull between the desire for connection and the reality of solitude.</desc>
