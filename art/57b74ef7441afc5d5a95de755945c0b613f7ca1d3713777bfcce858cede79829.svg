<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone embodies a dynamic tension between desire and restraint, using a palette that juxtaposes saturated reds and muted creams against deep blacks and grays. The main contrast occurs centrally, where a saturation of red-oxide and small-orange creates a 'pull' effect, interrupted by dark iron gray and blackened plum, symbolizing boundaries of restraint. This arrangement echoes the spiral pressure and the sealed edges from the seed, capturing the essence of longing restrained by invisible boundaries. The broken pixels introduce intentional disruptions that enhance the emotional weight of the composition, resonating with love's complications and the interplay of hope and confinement.</desc>
