<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Fracture</title>
  <desc id="desc">This composition explores the dual emotional states of nostalgia and progress through a vivid contrast between warmth and depth. The palette combines vibrant yellows and orange with muted purples and deep blues, symbolizing the bright flashes of memory clashing with the weightiness of time's passage. The left side embodies nostalgia with structured grid-like patterns, suggesting a calm past, while the right side represents progress with mirrored, fluid patterns suggesting forward motion and unresolved clutter. The interplay between these two emotional zones creates a visual tension, reminiscent of a heartbeat fluctuating between comfort and ambition.</desc>
