<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Boundaries of Longing</title>
  <desc id="desc">This piece captures the tension between longing and resolve through contrasting dark and light tones. The palette of pale aqua, mist gray, alarm red, ink blue, and clear white creates a sense of urgency and serenity. The darkest colors crowd the upper left corner, representing the overflow of longing, while lighter tones expand downwards, suggesting an emerging resolve. The broken pixel placements enhance the feeling of imperfection, introducing weights of damage amidst the clarity. The center pulse acknowledges the heartbeat between these two emotions, evoking an unresolved journey towards balance.</desc>
