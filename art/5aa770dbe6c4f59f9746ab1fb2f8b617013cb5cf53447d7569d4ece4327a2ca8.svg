<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">The emotional tone juxtaposes desire, represented through warm coral and blood orange, against emptiness characterized by cool shades of charcoal and hollow blue. The pattern of a maze evokes a saturated pull while the embers suggest a quiet loss. This interplay creates tension, with the main collision occurring in the center, where warmth meets coolness, emphasizing the struggle between overflowing desire and restrained emptiness.</desc>
