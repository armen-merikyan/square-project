<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Connections</title>
  <desc id="desc">The artwork embodies the tension between loneliness and connection. A palette of warm yellows and muted purples conflicts with deep blues, creating a rich emotional landscape. The abrupt shifts from scrambled 'flame' patterns in the corners to the soothing 'dots' in the center evoke feelings of quiet isolation versus moments of shared warmth. The arrangement disrupts the flow, inviting viewers to explore the spaces between the colors, representing the delicate dance of human relationships and the memories of connection amidst solitude.</desc>
