<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Duality</title>
  <desc id="desc">This abstract piece captures the emotional contrasts between confusion and clarity through a dynamic interplay of color and structure. The palette features warm oranges and yellows clashing against deep blues and muted purples, symbolizing a conflict of emotions. The layout suggests negative space, emphasizing the weight of the broken pixels on one side, which disrupts the symmetry and invites reflection. Each row of the pixel arrangement conveys a progression through quiet tension to a dense cluster of noise, representing the push and pull between peace and chaos.</desc>
