<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Meets Restraint</title>
  <desc id="desc">This piece expresses the tension between desire and emptiness through a split layout, with the top four rows filled with vibrant, warm colors that symbolize desire and ambition, creating a saturated emotional pull. In contrast, the bottom four rows use cooler and darker shades representing emptiness and restraint. The collision occurs at the horizontal divide, where the heat of the upper section meets the chilling void below, suggesting both pressure and containment. The overall pattern reflects a spiral flow that amplifies movement toward a locked boundary, mirroring the emotional struggle inherent in the theme.</desc>
