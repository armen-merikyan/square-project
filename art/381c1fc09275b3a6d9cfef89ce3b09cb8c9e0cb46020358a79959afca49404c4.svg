<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork captures the emotional interplay between restlessness and peace. The chosen palette of black, dark violet, soft gold, and pale green creates a tension between warm and cool tones, embodying the struggle between chaotic motion and serene containment. The left half utilizes a checker pattern to represent peaceful stability, while the right half employs a ladder pattern to suggest disruptive energy. The main collision occurs where these two patterns intersect, creating a visual center that feels both unsettled and balanced. Broken pixels disrupt the smoothness of the arrangement, hinting at the imperfection of memory and experience, which aligns with the seed's exploration of emotional contrasts.</desc>
