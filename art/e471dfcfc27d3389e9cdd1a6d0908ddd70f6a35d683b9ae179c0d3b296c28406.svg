<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Edge of Tension</title>
  <desc id="desc">This artwork evokes the emotional tension between the contrasting themes of defiance and submission. The palette is drawn from the 'signal_noise' family, combining electric blue and hot magenta for vibrant peaks of defiance that clash with muted static gray and dead black representing submission. The central conflict occurs where bright patterns of the defiance resemble barcodes, ready to clash with the more subdued maze of submission. The layout emphasizes this struggle at the center, with an echoing flow that leads the eyes through the tension-filled composition.</desc>
