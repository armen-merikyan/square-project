<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure Sheltered</title>
  <desc id="desc">This piece conveys a duality of safety and exposure, illustrated through the color arrangement and emotional contrasts. The palette consists of muted, warm colors (shelter_green, warm_brown) interspersed with cooler, stark tones (cold_white, open_blue) to represent the tension between vulnerability and protection. The composition features thick, dark borders representing safety juxtaposed with lighter, more intricate patterns of pale and cold colors that infuse a sense of exposure. The main collision occurs in the center, where darker, more stable colors encroach upon lighter, more chaotic hues like ripples against a safe shore, creating a narrative of tension and interaction between 'islands' of safety and a 'constellation' of exposure.</desc>
