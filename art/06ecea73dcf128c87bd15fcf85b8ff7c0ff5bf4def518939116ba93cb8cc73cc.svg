<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Dissonance</title>
  <desc id="desc">The artwork embodies the emotional tension between pride and shame through a carefully chosen palette focused on deep navy and muted dim cyan, suggesting a narrative of isolation amidst complexity. The use of pixel bleed edges introduces an element of imperfection. The placement of darker colors with sudden bursts of light conveys pressure and release, with a spiraling flow creating rhythm. The asymmetric patterns resonate with echoes of memory and emotion without forming recognizable shapes, focusing on the collision of feelings rather than representation.</desc>
