<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This artwork conveys the tension between longing and resolve using a palette of signal green, electric blue, and hot magenta over a backdrop of static gray and dead black. The broken pixels introduce intentional imperfections, representing fractures in the emotional experience. The layout divides the canvas, emphasizing the contrast where longing flows towards the edges while resolve asserts presence in a central band. The flow and patterns evoke a pulse-like rhythm, drawing the eye into the predominant feeling but leaving enough negative space to suggest unresolved emotions.</desc>
