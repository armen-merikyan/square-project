<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This composition embodies the tension between quiet and pressure, utilizing a palette that juxtaposes muted tones with sharp contrasts. The center of the artwork is dominated by a saturated dark navy, representing density and pressure, while softer off-white and faint peach extend outward, creating a shimmering echo of quiet. The arrangement is intentionally dense in the center, where blues collide with warm tones, while the edges provide a softer gradient, echoing the retreat of tension. The interplay of 'channels' and 'constellations' patterns captures the fluid shift between hard edges and soft spaces, driven by the diagonal flow overarching the piece.</desc>
