<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Tension</title>
  <desc id="desc">This piece embodies the emotional conflict of panic versus control through a dense, jagged color arrangement, emphasizing the clash between chaos and order. The palette, drawn from the 'ancient_fire' collection, utilizes burnt orange and dark red to evoke warmth and intensity, contrasted by charcoal and gold, creating a stark yet elegant tension. The main collision occurs in the center, where jagged patterns of panic (crack pattern) interrupt the more symmetrical control (mirror pattern). This contrast points to the instability inherent in our psyche during moments of conflict, capturing both the anguish of chaos and the desire for control.</desc>
