<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Silent Pulse</title>
  <desc id="desc">This artwork conveys the tension between clarity and chaos, reflecting the emotional weight of 'signal vs noise.' The palette features signal green and hot magenta to represent the vibrant pulse amidst static gray and dead black representing noise. The central collision between soft, muted colors and sharp, bright accents symbolizes the struggle of maintaining clear communication in a world filled with distractions. The layout evokes crossing currents, creating a feeling of disturbance and interruption, while broken pixels disrupt the pattern, hinting at moments of memory and erasure.</desc>
