<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Resolve</title>
  <desc id="desc">This composition embodies the emotional dichotomy of longing and resolve through a careful arrangement of color and contrast. The palette, featuring moss green, bone white, rust, stone gray, and small gold, evokes feelings of resilience amid fragility. The pale hues contrast elegantly with deeper tones, symbolizing the interplay between hope (resolve) and yearning (longing). The center of the square is where the two emotional patterns collide, creating a visual tension reflective of their intertwined nature—a 'hinge' of longing adjacent to a 'glitch' of resolve. Broken pixels are interspersed across the grid, representing scars of past damage that intertwine with the need for repair. This tension, punctuated by negative space, articulates an ongoing narrative of pushing and pulling, togetherness and distance.</desc>
