<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Conflict</title>
  <desc id="desc">This abstract composition encapsulates the emotional tension between longing and resolve. The palette was carefully chosen from earthy tones—moss greens, bone whites, and rusts—to evoke a sense of grounded warmth yet fragile balance. The main contrast occurs diagonally, where dense stripes of the resolve color (rust) intersect with flickering flame-like patterns representing longing (bone white) around the edges. Broken pixels scattered throughout add intentional disruption, creating a visual narrative of unresolved feelings and the push-and-pull between chaos and order. The layout of open gates—both dense and empty—mirrors the internal struggle of seeking connection amidst distance.</desc>
