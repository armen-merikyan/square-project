  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone of this artwork contrasts vulnerability and strength, depicted through a muted palette combined with sudden bright accents. The palette features pale aqua and clear white to represent exposure, while depth is signified through mist gray and alarm red, creating tension. The main collision occurs in the center, where dense 'braid' patterns clash with the softer 'flame' patterns, echoing vulnerability's burst against a backdrop of strength. Negative space is maintained, allowing the eye to rest amidst the active pixels, suggesting a dialogue between light and dark.</desc>
