<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict in Quiet Tension</title>
  <desc id="desc">This piece encapsulates the emotional tension between defiance and submission. The palette of muted colors like dark navy and faint peach creates a quiet pressure, while contrasting elements of compressed red punctuate the composition, symbolizing bright refusal at its core. The outer border suggests order but melds into chaotic patterns, demonstrating a struggle of space and form. Broken pixels disrupt the surface, embodying the essence of glitch and the imperfection of resolution, representing the struggle between serenity and tension.</desc>
