<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Trust and Suspicion</title>
  <desc id="desc">This artwork captures the emotional duality of trust and suspicion through its use of contrasting colors and patterns. The palette combines shadowy blacks with the luminous pale blue and stark white to evoke tension. The left side employs a noisy, dark cluster, symbolizing suspicion, while the right side features a calm, open array of soft whites and blues representing trust. The center collision creates an emotional threshold, where one emotion transitions into another, highlighting their interconnectedness yet distinct nature. This reflects the underlying theme of resilience and fragility, using the stair-step shape as a metaphor for negotiating trust in a complex world.</desc>
