<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This artwork captures the emotional juxtaposition between envy and gratitude. The palette of deep blacks paired with soft gold and muted greens creates a dynamic range, suggesting richness layered over darkness. The patterned approach exhibits 'rain' for envy with descending rows of darker hues interspersed with 'crosshatch' touches of lighter gold that symbolize gratitude. Central heaviness disrupts the flow, with the stronger colors drawing the eye inward, creating a battle between calmness and discord. Randomly placed broken pixels introduce imperfection within structured patterns, echoing the seed's themes of weight and light, contributing to the sense of a mirrored imbalance.</desc>
