<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Pulse</title>
  <desc id="desc">The emotional tone captures the conflict between clarity (signal) and chaos (noise). The palette blends dark navy and black as the background, symbolizing density and distortion, while bright dim cyan punctuates as the signal in a patchwork pattern, clashing against broken dots representing noise. The central collision occurs where dim cyan disrupts the dense black, evoking a struggle for dominance. This grid layout represents the argument between the two forces, with negative space facilitating breathing room amidst tension, capturing the essence of the seed's complexity without literal forms.</desc>
