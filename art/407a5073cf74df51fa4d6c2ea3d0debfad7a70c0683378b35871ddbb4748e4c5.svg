<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Echoes</title>
  <desc id="desc">This composition conveys a tension between love and betrayal through a palette of warm reds and soft grays juxtaposed against deeper maroons. The emotional tone is established by the interplay of sharp versus soft edges, conveying both comfort and discomfort. The use of crosshatch patterns introduces a textural complexity that evokes a sense of conflict—like a relationship frayed at the edges. The central focus creates a dynamic where warmth is intermittently interrupted by cooler tones, suggesting moments of vulnerability amidst chaos. The layout of falling pixels mimics tears or fleeting moments, emphasizing emotional flow while maintaining significant negative space to reflect solitude.</desc>
