<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Tranquility and Turmoil</title>
  <desc id="desc">This piece embodies the duality of defiance and submission through an interplay of color and pattern. The palette, inspired by 'guilt_forgiveness,' mixes warm ivory and soft gold against deeper shades like deep wine and ash gray, creating a tension between warmth (submission) and darker hues (defiance). The collision occurs diagonally across the square, where defiant sharp angular patterns break through the softer flame-like flows of submission. Broken pixels introduce a sense of imperfection, reflecting the struggle between order and chaos, further enhancing the emotional depth and narrative tension of the piece.</desc>
