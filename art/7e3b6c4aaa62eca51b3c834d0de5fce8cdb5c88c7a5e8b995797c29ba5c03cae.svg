  <title id="title">Order in Fracture</title>
  <desc id="desc">The emotional tone reflects the clash between panic and control, illustrated through a palette of subdued colors that evoke a sense of fading memories. The contrast between the cooler tones of faded blue and warm sepia highlights the tension between stability and chaos. Main collisions occur at the edges, where the radial patterns of chaos interrupt the controlled maze, creating a sense of disturbance in an otherwise stable space. The arrangement captures the essence of an empty room with broken memories, where each color acts as a whisper of what once was.</desc>
