<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork represents the emotional tension between vulnerability and strength, capturing the delicate balance through a stark color contrast. The palette of navy and dim cyan evokes a feeling of solitude, while scattered white accents symbolize fragile points of exposure. The checker and target patterns collide in the center, reflecting tension and interruption, emphasizing strength battling against the encroaching vulnerability. Negative space allows breath, capturing the essence of desire for emptiness amidst structural density.</desc>
