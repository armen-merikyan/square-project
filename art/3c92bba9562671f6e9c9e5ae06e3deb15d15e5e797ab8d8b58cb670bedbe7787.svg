<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Yearning Bound</title>
  <desc id="desc">This artwork conveys the tension between emptiness and desire. The bright, warm hues represent strong desires, creating a stark contrast against the muted, darker tones evoking emptiness. The palette uses hot coral and blood orange as focal points amidst a lattice of deep charcoals and hollow blues, symbolizing the pull of yearning against a restrained backdrop. The flow is left to right, allowing the fiery accents to push against the edges, disrupted by the cool containment of the charcoal. The collision occurs at the center, where warmth clashes with darkness, representing unresolved emotional narratives.</desc>
