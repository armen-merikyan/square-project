  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This artwork captures the tension between vulnerability and strength. The palette combines warm yellows and oranges to suggest strength, contrasted by soft muted purples and a deep blue to echo vulnerability and depth. The central collision occurs at the center, where steps of dense blocks meet the softer static patterns, creating a visual representation of a threshold. The closed corners provide a sense of containment while allowing light and fluctuation to penetrate, embodying the complex interplay of safety and exposure.</desc>
