<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast in Motion</title>
  <desc id="desc">The emotional tone reflects the struggle between envy and gratitude, depicted through a split vertical layout. The left side, representing envy, uses darker tones for pressure and tension, while the right side, embodying gratitude, employs lighter colors suggesting openness and appreciation. The palette combines electric blue for energy, lime for growth, and black for depth, creating a striking contrast. Patterns of stairs on the left and checkerboard on the right emphasize the conflict of ascent versus balance. The collision occurs where lighter colors interrupt the darker, invoking a sense of unresolved tension and transition, echoing the jagged aspect of the broken mirror concept.</desc>
