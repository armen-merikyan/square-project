<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse amid Static</title>
  <desc id="desc">This composition explores the emotional tension between clarity (signal) and chaos (noise). The palette incorporates vivid greens and blues against dark blacks and grays, embodying the struggle for coherence within disarray. The 'stack' pattern of green signals is interrupted by chaotic dots in magenta, creating a collision in the center, representing the pulse of memory amid confusion. The diagonal layout emphasizes the contrast between density and negative space, resulting in a rhythmic yet disjointed interplay that visually narrates the story of struggle and memory.</desc>
