<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamics of Calm and Chaos</title>
  <desc id="desc">This artwork explores the emotional tension between restlessness and peace by juxtaposing warm, vibrant colors against cooler, neutral tones. The palette includes warm honey gold and ripe green, contrasting with deep olive and cream to symbolize the collision of chaotic energy and serene comfort. The inner 'keyhole' shape formed by the lighter colors is intent on revealing a sense of inner peace amidst the surrounding 'scar' patterns of darker, restless colors, creating a visual echo of memory and movement. The edge crawl of darker colors simulates the feeling of encroaching pressure, while the lighter center hints at sanctuary.</desc>
