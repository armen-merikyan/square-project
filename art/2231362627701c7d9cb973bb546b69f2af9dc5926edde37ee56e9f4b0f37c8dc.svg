<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This piece conveys the emotional duality of relief versus dread through contrasting palettes. The lighter colors (pink, soft gray) introduce a sense of relief, while deeper tones (dark maroon, red) invoke dread. The arrangement features a top-weighted design, where the heavy colors concentrate at the top, shifting towards a gradual release at the bottom with rain-like patterns in lighter hues, illustrating a journey from tension to calmness. The clashes between colors create visual tension and emotional conflict, echoing the struggles inherent in the seed.</desc>
