  <title id="title">Tear and Mend</title>
  <desc id="desc">The emotional tone of 'longing vs resolve' is captured through a juxtaposition of calm and tension. The palette of ice blue and warning orange highlights the struggle between serenity and urgency. The main contrast occurs in the middle, where sharp pulses of orange disrupt a sea of blue, symbolizing broken connections. The patterns of lattice and pulse marks reflect both the unfulfilled desire and the building strength, creating an abstract visual narrative of growth amidst fragility.</desc>
