<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Trust and Shadow</title>
  <desc id="desc">The emotional tone of 'trust vs suspicion' fosters a collision between light and dark, manifested in an 8x8 grid. The chosen palette of cosmic indigo, void black, star white, cold gold, and deep teal conveys uncertainty and warmth, contrasting the feelings of suspicion and trust. The main interplay occurs in the central diagonal where light elevates in brightness while dark edges constrain the space, illustrating the tension of openness bordered by shadow. Patterns reminiscent of rain disrupt the islands of gold, symbolizing fractured trust in a chaotic realm.</desc>
