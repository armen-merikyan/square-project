  <title id="title">Divided Resonance</title>
  <desc id="desc">This artwork embodies the tension between trust and suspicion, with a dominant cool palette of greys to reflect suspicion, creating an ash-like field. The burnt orange glows symbolizing trust interrupt the darker tones, suggesting an underlying warmth amidst the shadowy edges, where clean patterns break apart. The collision occurs centrally, illustrating how trust and suspicion coexist, while the broken pixels represent imperfections and disruptions, adding depth to the emotional narrative.</desc>
