  <title id="title">Tension of Duality</title>
  <desc id="desc">This artwork explores the emotional tug-of-war between envy and gratitude, captured through a vivid palette that contrasts deep maroons against bright pinks. The upper half represents envy through a zigzag pattern of dark colors, evoking tension and heaviness, while the lower half, filled with warm pink tones, suggests a lighter, more grateful tone. The sharp contrast creates a dynamic interplay between oppressive weight and the uplifting power of appreciation, embodied in an off-center balance that suggests instability yet harmony.</desc>
