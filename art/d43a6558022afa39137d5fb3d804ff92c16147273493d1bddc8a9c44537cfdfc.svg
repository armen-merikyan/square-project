<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This composition captures the emotional collision between confusion and clarity through the contrasting elements of dense color fields and negative space. The chosen palette, 'broken_memory', features sepia, tan, dust gray, and faded blue, echoing the memories of civilization—complex and layered like emotions. The left side presents confusion with scattered patterns of deep tones, while the right side hints at clarity through more muted and defined arrangements. The tension is evident in the hard edges creating abrupt transitions between colors, while the diagonal fall flow emphasizes a descent into complexity before reaching resolution across the artwork.</desc>
