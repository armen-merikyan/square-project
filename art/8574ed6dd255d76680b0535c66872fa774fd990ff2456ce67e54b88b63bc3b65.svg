<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">The emotional tone captures the conflict between fear and hope, using a palette of deep blacks and violets against softer golds and greens. The contrast between jagged edges (fear) and soft centers (hope) creates a visual disruption that mirrors the inner turmoil of the emotions. The layout mimics a mirror broken by a few deliberate misalignments, embodying the 'inside vs outside' concept where hope emerges amidst a chaotic background. The upward flow of the composition suggests rising signals of hope, while the darker tones represent fears, interspersed to create a sense of both pressure and release.</desc>
