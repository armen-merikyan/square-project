<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmony in Tension</title>
  <desc id="desc">This pixel art composition explores the emotional duality of joy and grief as a visual interplay of warm yellows and cool blues. The palette reflects both moods: bright yellows and oranges signify joy, infused with deep blues to embody grief. The structured radial pattern on one half, representing joy, clashes sharply against chaotic stripes symbolizing grief on the other half, creating a palpable tension. The broken pixels introduce imperfection and disruption, inviting the viewer to engage with the complexities of emotion. The contrast between light and dark spaces illustrates the push and pull between order and chaos, while the overall composition maintains a sense of negative space to avoid overwhelming the viewer, embodying a conversation of unresolved feelings.</desc>
