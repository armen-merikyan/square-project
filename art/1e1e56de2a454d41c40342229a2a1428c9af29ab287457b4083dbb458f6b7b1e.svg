<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetric Disruption</title>
  <desc id="desc">This piece embodies the tension between calmness and rage through contrasting elements. The palette of deep black, white, and subtle hues of pale blue emphasizes the emotional dichotomy, while the layout provides a spacious room for contemplation against jagged noise. The predominance of black on the left creates a weighted feeling, contrasting with lighter elements that represent open spaces. The introduction of broken pixels disturbs the expected symmetry, encapsulating the 'crack against mirror' theme and enhancing the feeling of lonely signals amidst a chaotic backdrop.</desc>
