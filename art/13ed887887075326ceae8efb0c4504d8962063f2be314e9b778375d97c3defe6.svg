<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Tension</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of defiance and submission through contrasting textures and colors. The chosen palette of warm coral, soft amber, cold slate, blue black, and signal cyan evokes a dynamic interplay between warmth and coolness, representing the tension at the threshold between two opposing forces. The collision occurs predominantly towards the bottom left, where warmer tones clash with cooler shades, creating an impression of resistance against encroaching boundaries. The broken pixels disrupt regularity, enhancing the sense of conflict and illustrating the chaotic nature of the emotional landscape suggested by the seed.</desc>
