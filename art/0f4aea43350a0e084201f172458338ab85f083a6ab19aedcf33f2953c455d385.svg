<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Signal</title>
  <desc id="desc">This artwork embodies the tension between signal and noise, using a palette that reflects vibrancy and distortion. The chosen colors of green and blue provide a clear path (signal) amidst chaotic grays and blacks (noise). The left half emphasizes signal through rhythmic patterns of greens and blues with occasional interruptions of hot magenta, while the right half introduces a static gray field with flashes of muted energy. This juxtaposition not only highlights their emotional clash but also embodies the themes of exposure vs shelter, capturing the layered complexity of memory and erasure.</desc>
