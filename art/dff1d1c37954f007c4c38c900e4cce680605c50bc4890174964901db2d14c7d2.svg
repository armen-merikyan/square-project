<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Weight</title>
  <desc id="desc">This artwork captures the emotional dichotomy of vulnerability and strength through contrasting colors and patterns. The chosen palette of shelter green, warm brown, pale skin, cold white, and open blue creates an interplay of warmth and coolness, representing safety and exposure. The main collision occurs in the center where deep hues clash with soft tones, evoking a sense of weighted pressure amid delicate fragility. Broken pixels introduce intentional imperfections, enhancing the sense of vulnerability without compromising strength. The flow mimics the notion of a bridge, subtly layering the patterns of strength and vulnerability to depict an underlying story of resilience and exposure across an intricate emotional landscape.</desc>
