<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">The emotional tone suggests a tension between love and betrayal, highlighted through a palette of warm pinks and reds clashing with muted grays and dark maroon, symbolizing conflict and contrast. The arrangement features a grid-like pattern on one side representing love's warmth, while the disrupted pixelation on the other conveys feeling of betrayal. This juxtaposition creates a meaningful dissonance, echoing the theme of an empty room where emotions collide, the sharpness of a broken edge against soft gradients pushing the narrative of symmetry vs. break.</desc>
