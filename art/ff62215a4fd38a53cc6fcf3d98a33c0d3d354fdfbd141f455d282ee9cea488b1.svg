<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Suspicion</title>
  <desc id="desc">The emotional tone of this piece centers on the tension between trust and suspicion, using a palette that evokes both warmth and cold through cosmic indigo and star white against void black. The diagonal layout suggests conflict where one wedge, representing trust, is filled with soft dots contrasting against the stepwell patterns of suspicion on the opposite side. The collision occurs centrally, symbolizing an emotional tug-of-war, while the use of broken pixels introduces deliberate imperfections, reflecting the fragility of both emotions. This approach results in a dynamic and layered abstract piece that conveys a visual narrative of balance and dissonance.</desc>
