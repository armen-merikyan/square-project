<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">The emotional tone reflects the tension between nostalgia and progress, where one side represents missed memories (faded colors) while the other indicates forward motion (jarring contrasts). The palette of sepia and muted tones on the nostalgia side evokes a sense of reminiscence, while harsher breaks in color signal progress. The main contrast lies in the hard edges of the progress side colliding with the soft textures of nostalgia, interrupting the flow and establishing a dialogue between the two emotions. This composition captures the juxtaposition of a fractured memory against the rhythm of progression.</desc>
