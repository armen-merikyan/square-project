  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">The emotional tone navigates between joy and grief, capturing both bright expanses and heavy moments through contrasting palettes. Warm yellows and oranges represent joy, breaking against deep blues and muted purples that embody grief. The split-screen pattern allows for vivid joy to cascade downwards while grief occupies the upper part. Hard edges reflect the stark divide between stability and turmoil, creating a sense of interrupted harmony.</desc>
