<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition explores the tension between desire and emptiness, reflecting the emotional pull towards fulfillment while facing constraints. Utilizing a palette of warm coral and orange tones alongside a deep charcoal, the left half embodies desire with its saturated colors and an overlapping 'braid' pattern, suggesting vibrancy and warmth. The right half, featuring softer, muted tones like hollow blue and dust pink in a 'negative-cross' pattern, evokes a sense of quietness and spatial emptiness. The edge style is heavily center-focused, allowing the dense left side to collide with the restrained right. A few broken pixels symbolize interruptions in this emotional landscape, making the artwork resonate as a powerful conversation between saturation and void.</desc>
