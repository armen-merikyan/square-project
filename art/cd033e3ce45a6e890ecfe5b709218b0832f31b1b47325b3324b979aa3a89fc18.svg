<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone embodies the clash of joy and grief, showcased through a palette of bright yellows and muted blues. Bright colors form a dynamic central space representing joy, while deep blues and purples create a surrounding heaviness of grief. The layout flows from bottom to top, suggesting a rise from the depths of grief towards the elevation of joy. The deliberate contrast between bright, energetic colors and dark, somber hues highlights their conflict and interplay, with a crosshatch pattern representing joy's vibrancy disrupting the maze-like structure of grief, creating an engaging viewing experience.</desc>
