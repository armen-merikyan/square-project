<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Containment</title>
  <desc id="desc">The emotional tone juxtaposes desire and restraint, with brighter colors suggesting heat and passion and muted tones representing limitation and control. The palette features hot coral and blood orange for desire, interrupted by charcoal and hollow blue for restraint. This creates a dynamic tension where the central collision occurs, suggesting breaking boundaries. The pattern moves in a spiral, representing the pressure of conflicting desires against a backdrop of held borders. The arrangement preserves negative space and intentional disruptions embodying the emotions' conflict.</desc>
