<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Spirits</title>
  <desc id="desc">This composition explores the emotional interplay between defiance and submission, represented through contrasting patterns of ember-like chaos and a crosshatched containment. The palette of deep red, black, pale blue, and white evokes a balance of rage and calm, signifying the struggle between resistance and surrender. The central negative space serves to highlight the raw intensity of the defiant colors, creating a pulsating tension that embodies both struggle and enclosure, allowing the ash-like feel of defiance to collide with the serene submission in an asymmetric pattern.</desc>
