<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Signal</title>
  <desc id="desc">This piece captures the emotional tension of clarity amidst chaos. Utilizing bright 'signal_green' for the pulse and 'hot_magenta' to represent the noise, the contrast suggests a struggle for attention. 'Electric_blue' adds depth, while 'static_gray' and 'dead_black' create a dense background echoing the interference. The layout is asymmetric, with broken pixels representing disruptions. The center focus anchors the work, evoking a balance between memory and erasure while retaining the abstract nature by avoiding any literal interpretations.</desc>
