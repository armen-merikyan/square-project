<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This piece captures the emotional tones of longing, represented by soft, light colors on the left, opposing the solid, darker tones of resolve on the right. The warm whites and soft pinks evoke a sense of yearning, while the carbon black and sharp crimson provide a grounding, resolute energy. The split vertical layout emphasizes the contrast between chaos and order, with each side colliding in the middle, where density meets open space. This structure reflects the struggle between intimacy and distance, mirroring the complexities of each emotional state expressed through the patterns used.</desc>
