<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Embrace</title>
  <desc id="desc">This composition captures the tension between love and betrayal through a contrasting color palette of warm pinks and reds against colder grays and dark maroon. The layout embodies an argument grid, where love attempts to radiate with warmth but is crosshatched by sharp boundaries of betrayal that create fractures across the canvas. The use of broken pixels introduces imperfection, conveying the idea of solitude amidst connection. Each color placement promotes emotional collisions—warm hues pressing against the cool, suggesting a push and pull of relationships, with negative spaces reflecting loneliness. The final arrangement evokes a sense of unresolved tension and depth.</desc>
