<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the emotional tension between control and surrender. The palette of muted cream, blackened plum, and red oxide suggests depth and richness, evoking feelings of weight and hesitation. The contrasting patterns—fault lines of control against halos of surrender—create an intricate tension within the square. The main collision occurs in the center, depicting the struggle where order and chaos meet, while the broken pixels introduce an element of imperfection, symbolizing the fragility of control. Negative space is used strategically to reflect the quiet amidst the chaos, allowing for contemplative pauses that drive the viewer's eye across the canvas.</desc>
