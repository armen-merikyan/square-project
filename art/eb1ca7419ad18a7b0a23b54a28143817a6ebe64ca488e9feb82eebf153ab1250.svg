<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This composition explores the emotional tension between restlessness and peace, using a palette that conveys both serenity and urgency. The colors transition from pale aqua and mist gray representing calm, to alarm red and ink blue suggesting a dynamic shift. The central collision occurs at the diagonal seam where the ripple pattern of restlessness interrupts the structured crack of peace, creating a visual dialogue of contrasting emotions. The palette choice supports the narrative of juxtaposition, with muted fields giving space for the vibrant accents to resonate.</desc>
