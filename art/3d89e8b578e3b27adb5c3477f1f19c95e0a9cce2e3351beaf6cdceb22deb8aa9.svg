<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Tone</title>
  <desc id="desc">This composition explores the emotional tension between softness and severity, using the contrast of sharp crimson against a carbon black backdrop to signify severity, while the gentle transitions of warm white and powder pink evoke softness. The layout features a narrow negative-space channel that generates a feeling of conflict, with severe colors clustered towards the edges and softer hues in the center. The collision occurs in the middle sections where the patterns of ripple and shatter disrupt each other, creating intentional broken pixels that enhance the theme of emotional struggle.</desc>
