<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece conveys the emotional tension between control and surrender through a stark contrast of colors. The palette of rose clay and cool blues captures intimacy and distance, suggesting both warmth and coldness. The main collision occurs in the center where saturated colors flow into muted edges, representing the struggle between overflowing emotion and confinement. Patterns of stairs and scars interrupt each other, reflecting the emotional stutter of control yielding to surrender. The asymmetrical layout and intentional broken pixels enhance the sense of tension and release.</desc>
