<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Ember and Ash</title>
  <desc id="desc">The emotional tone reflects a struggle between the brightness of sparks and the muted presence of ash, projecting the tension between hunger for light and the restraint of darkness. The palette of ‘safety_exposure’ includes soothing greens, warm browns, pale hues, cool whites, and striking blue to convey layered emotions. The diagonal flow creates a dynamic movement leading from the bright, crisp edge sinking into darker, muted fields, representing the central confrontation of spark vs ash. The pattern collision between dotted accents and cracked textures creates an iterative break in the design, emphasizing the themes of resilience and fragility throughout the composition.</desc>
