<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">The composition captures the tension between conflicting emotions: sparks of energy and creation clash with the remnants of ash, symbolizing restraint. The palette incorporates warm reds and muted cream tones, illustrating hunger and vitality set against cool grays representing ash and quietness. The play between the checker pattern of 'spark' and the broken frame of 'ash' collides in the center, amplifying the emotional intensity. This collision creates rich contrasts and a sense of motion, while the halo edge style encapsulates the chaotic energy consistent with the theme of resilience vs. fragility.</desc>
