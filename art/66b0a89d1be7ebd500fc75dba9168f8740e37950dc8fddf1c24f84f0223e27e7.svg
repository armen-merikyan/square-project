<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork explores the tension between rage and calm through the juxtaposition of bold reds and tranquil pale blues. The main collision of emotion occurs in the center, where the sharp, aggressive red marks cut through the soft, horizontal blue stripes, symbolizing the explosive energy trying to overflow its calm surroundings. The patterns clash, creating a sense of interruption, portraying a deeply felt emotional struggle. The chosen palette conveys intensity and serenity, with the broken pixels adding an element of imperfection that reflects the complexity of human emotion. Negative space is respected, contributing to a sense of both confinement and release, further enhancing the abstract story.</desc>
