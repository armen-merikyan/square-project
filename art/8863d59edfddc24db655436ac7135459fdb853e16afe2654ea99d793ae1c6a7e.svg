  <title id="title">Pulse of Memory</title>
  <desc id="desc">This artwork embodies the emotional tension between 'spark' and 'ash,' contrasting fragmented bursts of vibrant color against muted, burnt tones. The palette of soft cyan, lavender gray, and rain blue evokes a sense of melancholy wonder, while the jagged edges and diagonal flows create a dynamic pulse, suggesting a memory's fleeting nature. The collision occurs predominantly in the center, where bright threads of color strongly interrupt the muted fields, mirroring the struggle between desire and restraint.</desc>
