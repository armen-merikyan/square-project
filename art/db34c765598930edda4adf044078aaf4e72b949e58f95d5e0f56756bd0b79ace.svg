<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Control</title>
  <desc id="desc">This composition captures the tension between control and surrender through a dynamic interplay of color and texture. The palette features muted tones of sepia, tan, dust gray, and faded blue, evoking a sense of nostalgia and contemplation. The contrasting patterns of broken dots (representing control) colliding against flowing channels (symbolizing surrender) create an emotional dialogue across the canvas, with the center heavily occupied by dense clusters of colors, signifying the overwhelming nature of control. Intentionally placed broken pixels introduce moments of imperfection, enhancing the theme of disruption. This artwork communicates a narrative of balance and conflict, inviting the viewer to explore the abstract nuances of emotion.</desc>
