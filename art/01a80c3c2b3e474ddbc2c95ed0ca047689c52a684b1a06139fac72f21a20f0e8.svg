<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">The emotional tone hinges on the conflict between fear and hope, characterized by dark, jagged patterns clashing against soft, upward flows of lighter hues. The palette, featuring dark violets and soft golds against pale greens, symbolizes the struggle between heaviness and lightness. The left side conveys fear through dense grid patterns in dark colors, creating a sense of confinement, while the right side embodies hope with a target-like formation of lighter colors that suggest rising signals. This interplay creates a dynamic contrast with collisions in both color and shape, embodying the duality envisioned in the seed.</desc>
