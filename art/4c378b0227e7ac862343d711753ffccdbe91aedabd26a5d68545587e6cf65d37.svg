<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Tension</title>
  <desc id="desc">The emotional tone is a dance between defiance and submission, represented by contrasting moments of density and quiet. The palette leans toward deep navy and black for the dominant moments of defiance, contrasted by dim cyan and white representing submission and the quiet channel. The main collision occurs in the center, where burst patterns of noise and constellation forms interrupt the space, creating a push-pull dynamic that speaks to the tension of the seed. The broken edges symbolize the vulnerability of both emotions leaking into and disrupting the ordered frame.</desc>
