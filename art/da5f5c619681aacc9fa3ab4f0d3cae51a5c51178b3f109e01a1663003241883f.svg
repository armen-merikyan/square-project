<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Embrace</title>
  <desc id="desc">This piece embodies the emotional tension of love and betrayal through contrasting hues and abstract patterns. Warm pinks and reds signify love, while dark grays and maroons convey feelings of betrayal, creating a polarized emotional landscape. The interplay of dense clusters of color versus empty spaces illustrates the push and pull of a fractured relationship. Randomly broken pixels within the layout disrupt the near symmetry, enhancing the theme of imperfection and emotional fallout. The zigzag flow represents the tumultuous nature of the emotional experience, while the burned edges add a sense of rawness and urgency to the composition.</desc>
