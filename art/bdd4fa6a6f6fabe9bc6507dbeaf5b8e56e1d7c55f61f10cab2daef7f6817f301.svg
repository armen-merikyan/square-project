<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoed Vulnerability</title>
  <desc id="desc">The emotional tone captures the tension between safety and exposure, conveyed through a palette of soft greens and browns representing shelter, contrasted against the airy blues and whites that signify vulnerability. The center is a pale skin tone, suggesting openness, surrounded by deeper colors, creating a protective barrier. The main contrast occurs vertically, with cooler colors echoing on one side while warmer tones subtly ripple against the edges, embodying both pressure and release. The arrangement reflects an abstract negotiation of space, evoking feelings of both warmth and exposure.</desc>
