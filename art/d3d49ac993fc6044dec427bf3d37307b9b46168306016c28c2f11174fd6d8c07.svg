<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Crossing Currents</title>
  <desc id="desc">This square embodies the tension between vulnerability and strength. The palette of muted purple, deep blue, bright yellow, and warm orange blends soft warmth with heavy tones, embodying both exposure and shelter. Central collision occurs with vibrant yellow squares that interrupt the surrounding muted blues and purples, mirroring the contrast between the clear spark of vulnerability and the dense weight of strength. The broken pixels create a sense of imperfection, echoing the fragility of connection amidst alienation while maintaining an abstract flow of movement across the grid.</desc>
