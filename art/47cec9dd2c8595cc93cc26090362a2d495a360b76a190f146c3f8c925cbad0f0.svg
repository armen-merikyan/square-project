<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork reflects the emotional contrast between vulnerability and strength through the use of a split vertical layout. The left side represents vulnerability with softer, muted colors like pale aqua and mist gray, evoking a sense of fragility and exposure. The right side contrasts this with stronger colors, alarm red and ink blue, symbolizing resilience and solidity. The central collision creates tension, visually hinting at an attack on the stability of the center through fragmented patterns associated with both emotions. Broken pixels in the form of subtle disruptions emphasize both exposure and protection, inviting the viewer to navigate the complex dynamics of connection and alienation.</desc>
