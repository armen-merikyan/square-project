<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tension</title>
  <desc id="desc">This piece captures the struggle between defiance and submission through a layered palette of muted tones like sepia and faded blue, representing weight and lightness. The falling pixel layout creates a sense of descent, suggesting an emotional weight pulling down. The collision of warm and cool colors in jagged patterns evokes tension while allowing negative space to breathe, creating conflict and release. The pattern of 'broken_dots' interspersed with 'flame' enhances this duality, as sharp points contrast against softer edges, embodying the emotional complexity suggested by the seed.</desc>
