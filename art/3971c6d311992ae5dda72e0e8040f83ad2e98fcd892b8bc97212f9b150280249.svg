<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow of Emotion</title>
  <desc id="desc">The piece captures the dynamic relationship between awe and terror through a tensioned palette of deep navy and dim cyan against stark white. The central area represents a wave of calm emotions disrupted by dark, chaotic edges—suggesting an internal conflict. The interplay between dense clusters and negative space emphasizes moments of pressure and relief, while the soft edges create a feeling of instability, contrasting with the ‘broken pixels’ representing memory and fragmentation. The layout follows a vertical flow mirroring the descent of emotions, ultimately creating an abstract narrative of struggle and sublime beauty.</desc>
