<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Disconnected Flame</title>
  <desc id="desc">This piece represents the tension between loneliness and connection through the interplay of warm and cool tones. The sepia and tan colors evoke nostalgia and broken memories while the faded blue introduces a sense of distance and disconnection. The central flame-like areas collide with dots suggesting broken connections, while the layout presents an upward signal but is weighted on one side, indicating imbalance. This evokes the emotional struggle between hope and despair, emphasizing the emptiness of the surrounding space.</desc>
