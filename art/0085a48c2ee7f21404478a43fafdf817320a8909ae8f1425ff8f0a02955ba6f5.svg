  <title id="title">Fractured Trust</title>
  <desc id="desc">This artwork conveys the emotional tension between trust and suspicion, using a palette that mixes warm and cool tones. The dark colors represent suspicion, creating a contrast against the subtle warmth of trust. The main collision occurs diagonally from the top left corner, where soft glows of green and magenta clash with the penetrating shadows of black. Patterns of order and chaos emerge from the split, capturing resilience against fragility amidst broken pixels that disrupt the flow and enhance the emotional narrative.</desc>
