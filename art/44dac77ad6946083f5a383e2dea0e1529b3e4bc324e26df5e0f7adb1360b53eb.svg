<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">The emotional tone embodies the tension between joy and grief, with a light and bright palette contrasted against muted, deep blues and purples. The pattern showcases joy through a checker-like arrangement on the right compared to the radial spread of grief on the left. This contrast creates an asymmetric balance, reflecting the feeling of a heavy mass being broken by moments of brightness, where colors collide and interact dynamically, echoing the complexity of love and betrayal.</desc>
