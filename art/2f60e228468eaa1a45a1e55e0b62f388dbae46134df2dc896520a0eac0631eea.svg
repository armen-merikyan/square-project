<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symbiotic Tensions</title>
  <desc id="desc">This artwork encapsulates a narrative of dualities, contrasting restlessness and peace through color choices and their placement. The palette of mourning black, deep blue, new leaf, pale yellow, and muted stone creates a dynamic interplay between heaviness and lightness. The design features a maze-like texture to evoke peace, juxtaposed against crack patterns representing restlessness. These elements collide primarily at the center, where darker tones give way to lighter hues, symbolizing the tension between memory and motion. The use of broken pixels adds intentional disruption, enhancing the feeling of fragmentation and echoing the seed's theme of closed corners and diagonal arguments.</desc>
