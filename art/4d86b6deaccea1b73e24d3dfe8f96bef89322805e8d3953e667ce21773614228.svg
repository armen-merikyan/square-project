<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoed Depths</title>
  <desc id="desc">This composition embodies the emotional tension between softness and severity, structured around a corner invasion layout that breathes a sense of movement from gentle warmth to stark coldness. The palette incorporates powder pink and warm white as grounding soft colors, while sharp crimson and carbon black denote severity and noise. The radial pattern suggests a pulse or signal attempting to resonate amid static interruptions. The contrast is captured by the diagonal flow of warmth colliding against the darker tones that propagate through the center, revealing a story of struggle and grace in balance.</desc>
