<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Restraint</title>
  <desc id="desc">The emotional tone conveys a struggle between an intense desire represented by warm, saturated colors (hot coral, blood orange) and the cool emptiness symbolized by deep, muted shades (charcoal, hollow blue). The primary contrast emerges at the center, where vibrant colors burst outwards, interrupted by shadowy, expansive areas, echoing the tension of containment versus overflow. The overall pattern reflects a chaotic push against the borders set by contrasting color fields, reinforcing the themes of desire and restriction.</desc>
