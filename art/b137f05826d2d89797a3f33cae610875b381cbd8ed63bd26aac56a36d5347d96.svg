<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotions of vulnerability and strength are embodied in the delicate interplay of colors, where soft pastel tones (dust pink and hollow blue) meet the bold presence of hot coral and blood orange. The arrangement emphasizes a central softness that is both bordered and disrupted by darker charcoal lines, symbolizing the contrasting forces of protection and exposure. The pattern's collision at the center signifies the tension between strength and fragility, enhanced by the asymmetry of broken pixels, creating an evocative narrative of emotional complexity.</desc>
