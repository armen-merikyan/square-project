  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the emotional tension between vulnerability and strength. It utilizes a palette evoking warmth and coolness, featuring coral and slate to reflect contrast. The main collision occurs at the center, where soft channel patterns intersect with stable dot elements, embodying a fragile core surrounded by a protective yet imperfect boundary. The broken pixels introduce intentional disruptions, enhancing the sense of exposure, while maintaining an overall balance with quiet space. The design suggests both an invitation and a barrier, symbolizing the dynamic interplay of safety and exposure.</desc>
