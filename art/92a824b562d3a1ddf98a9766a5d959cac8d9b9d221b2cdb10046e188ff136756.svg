<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork embodies the tension between rage and calm through a clash of visual elements. The palette consists of warm reds signifying energy and calm pale blues symbolizing tranquility. The structure is a quiet channel that divides the chaotic density of reds and darks on one side from the serene palette of blues and whites. The dominant patterns of sharp, jagged red intersect with the softer, stacked blue, suggesting a conflict that interrupts fluidity with bursts of angular movement. The broken pixels serve as intentional disruptions, introducing scars that narrate the emotional struggle inherent in this dynamic. The overall impression is one of pressure bubbling beneath a calm surface, reflecting a complex emotional landscape that resonates with the seed's themes.</desc>
