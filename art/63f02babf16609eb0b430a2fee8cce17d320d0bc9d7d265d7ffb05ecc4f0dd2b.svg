<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone centers on the dichotomy of spark (brightness, direction) versus ash (dimness, static). The selected palette—shelter green, warm brown, pale skin, cold white, and open blue—reflects the contrasting warmth of life against the monochrome feel of decay. The collision occurs in the center where the dense, jagged, maze-like patterns of ash meet the scattered noise representing sparks. This interaction captures the tension between resilience and fragility, illustrated through uneven patterns creating a sense of chaotic order within the defined space.</desc>
