<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Resolve</title>
  <desc id="desc">This piece explores the emotional interplay between longing and resolve through a diagonal invasion of warmer tones on a cooler background. The palette features pale mint and soft sky to create a sense of longing, while storm gray and near black ground the composition in a steady resolve. The main collision occurs diagonally across the square, as the shatter pattern of longing interrupts the veil pattern of resolve, creating a visual narrative of tension and connection amidst contrasts of density and emptiness.</desc>
