  <title id="title">Light Through Shadows</title>
  <desc id="desc">This composition balances the emotions of joy and grief through a warm palette of yellows and oranges contrasting with deeper hues of muted purples and blues. The arrangement is influenced by the idea of a corner invasion where lighter colors pulse from the bottom left, creating asymmetry. The sharp vs soft contrast is highlighted through hard edges of dark colors colliding with bright areas, suggesting a story of conflict between lightness and heaviness, expanding towards a brighter contrast while leaving negative space for introspection.</desc>
