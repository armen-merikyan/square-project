<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality in Tension</title>
  <desc id="desc">This composition navigates the emotional spectrum of relief and dread. The contrasting palette of pale mint and storm gray emphasizes the struggle between lightness and heaviness. The dominant muted shades (near black and storm gray) create an atmosphere of dread, while the radial pattern provides bursts of relief through faded gold and soft sky, suggesting moments of hope. The collision occurs centrally, where dense dark tones meet the light, creating an argument that is visually felt. Broken pixels disrupt the overall consistency, enhancing the idea of chaos within an ordered grid.</desc>
