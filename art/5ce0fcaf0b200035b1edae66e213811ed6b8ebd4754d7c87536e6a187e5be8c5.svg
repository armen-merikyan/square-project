  <title id="title">Tensioned Echoes</title>
  <desc id="desc">The emotional tone oscillates between warmth and betrayal, with a palette highlighting soft pinks and harsh grays to reflect the juxtaposition of love and loss. The top rows resonate with broken dots to represent love—soft yet fragmented, while the bottom rows utilize a checker pattern to embody the stark betrayal with hard contrasts. The edges are purposely uneven, creating a sense of unease and echoing the theme of imperfect relationships.</desc>
