<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolution</title>
  <desc id="desc">This composition captures the emotional tension between 'longing' and 'resolve'. The warm burnt orange and dark red symbolize longing, while the cooler charcoal represents resolve. The central clash occurs with the vibrant gold, reflecting a pulse-like energy amidst broken pixels that disrupt symmetry. This reflects the idea of a crack mirroring the push and pull between aspiration and completion, framed by a quiet negative space that enhances the themes of distance and incompletion.</desc>
