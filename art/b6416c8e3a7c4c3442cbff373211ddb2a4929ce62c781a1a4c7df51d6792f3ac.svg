<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition harnesses the emotional tension between rage and calm through contrasting elements of sharpness and softness. The palette of deep reds and pale blues captures the fierce struggle of bright, dynamic rage overwhelming the stable calm. The jagged edges of red patterns disrupt the horizontal structure of cool tones, which embody tranquility. The dominant red clusters reflect an explosive interruption at the center, while the quiet blues push back along the edges, inducing a sense of overflow and containment. This interplay creates a rhythmic tension across the grid, suggesting a rise in both pressure and hope, echoing the seed's themes.</desc>
