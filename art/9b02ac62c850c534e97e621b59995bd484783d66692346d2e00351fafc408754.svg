<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork explores the emotional tension between vulnerability and strength through contrasting palettes and arrangements. The warm hues of hot coral and blood orange suggest energy and resilience, while the cooler shades of hollow blue and charcoal provide a sense of calm and introspection. The collision of the soft dot pattern representing vulnerability with the fault line structure of strength creates a cinematic conflict that captures the essence of exposure in a protective space. The primary contrast is found in the center, where the colors merge and interact, embodying the push-pull dynamic of the seed's themes.</desc>
