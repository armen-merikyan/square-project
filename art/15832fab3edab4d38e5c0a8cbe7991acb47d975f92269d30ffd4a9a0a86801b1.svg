<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Collision</title>
  <desc id="desc">The artwork reflects the emotional tension of 'collisions' and 'pressure' through a contrasting palette dominated by shades of deep red, gray, and muted maroon, symbolizing both conflict and release. The left side showcases a structured pattern reminiscent of nostalgia with a crosshatch motif, while the right breaks into chaos with mirrored but disrupted elements. The edge style is top-weighted, emphasizing a feeling of weight pressing down. Broken pixels introduce imperfection to signify emotional anomalies, creating an interplay between order and disorder across the canvas.</desc>
