<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Dissonance</title>
  <desc id="desc">This artwork reflects the emotional tension between awe and terror, illustrating a struggle for control between order and chaos. The palette of navy and dim cyan introduces a contrast of depth, where dark spheres of fear (navy) collide with light hints of wonder (dim cyan), representing the push and pull of these emotions. The central filled square symbolizes a seed surrounded by chaos, represented by soft edges and broken pixels, ensuring an imperfect yet harmonious flow. The arrangement embodies an inner stability disrupted by external chaos, leaving space for contemplation and resonance, embodying echoes of dissonant experiences.</desc>
