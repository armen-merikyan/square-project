<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone juxtaposes the dynamic energy of 'spark' against the subdued, somber essence of 'ash'. I selected a palette that includes bright accents of sharp crimson to represent sparks of energy, balanced with muted tones like carbon black and steel gray to evoke the stillness of ash. The central collision occurs at the diagonal where the warm, vibrant colors demand attention while cooler shades attempt to contain them, resulting in an interplay of light and shadow. This tension illustrates the ongoing battle of resilience versus fragility, echoing the themes of hunger and restraint.</desc>
