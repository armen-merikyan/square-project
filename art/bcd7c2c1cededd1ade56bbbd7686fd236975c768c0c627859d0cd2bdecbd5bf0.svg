<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Memories</title>
  <desc id="desc">This composition captures the tension between nostalgia and progress by juxtaposing dense, dark colors in the top half with lighter, vibrant hues in the bottom. The dark palette evokes feelings of nostalgia, represented by heavy blues and purples, while the bright yellows and oranges in the lower segment symbolize the vibrancy of progress. The split-horizontal layout emphasizes this emotional contrast, creating a drip-like effect where colors seem to flow from top to bottom. The targeted radial pattern in the bottom half intersperses with muted, solid shapes in the top half, mirroring the struggle between holding on and moving forward. Broken pixels introduce a sense of imperfection, reflecting the complexity of memories against a grid of evolving experiences. The negative space ensures clarity in this emotional density, allowing the viewer to feel the tension more acutely.</desc>
