<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Rising Emotions</title>
  <desc id="desc">This composition embodies the tension between joy and grief through a spectrum of colors inspired by the emotional tones of the seed. The use of bright yellows and oranges represents joy, expanding outward, while deep blues and muted purples reflect the heaviness of grief, creating a stark contrast. The placement of lighter colors on one side (suggesting rising signals) collides with darker tones on the opposite side (suggesting weight and fragmentation), facilitating an emotional push and pull. The zigzag pattern evokes a sense of instability, while the lack of hard edges signifies the fluidity between these competing emotions. The layout allows for negative space that enhances the feeling of unresolved motion and the complexity of human emotion.</desc>
