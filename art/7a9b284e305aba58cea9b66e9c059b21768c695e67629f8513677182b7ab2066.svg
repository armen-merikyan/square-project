<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Existence</title>
  <desc id="desc">This artwork embodies the duality of vulnerability and strength. The outer frame of warm brown and shelter green represents steadfast strength, providing a protective boundary. In contrast, the cool tones of pale skin and cold white within the inner 4x4 space signify vulnerability, creating a tender core. The collision occurs in the center, where the contrasting colors meet, symbolizing the intersection of these emotions. Broken pixels scatter across the piece, suggesting the imperfections of life, reflecting the 'mirror broken' aspect from the seed. The choice of colors evokes a sense of safety and exposure, echoing the themes of the seed.</desc>
