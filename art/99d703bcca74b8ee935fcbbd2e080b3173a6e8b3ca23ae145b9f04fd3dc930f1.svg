<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork embodies the emotional tension between desire and emptiness through a pattern of contrasting colors. The palette consists of warm, saturated tones of blood orange and hot coral, expressing the yearning of desire, contrasted against the muted charcoal and hollow blue, which signify a sense of emptiness. The main collision occurs where the warm colors resist the graphite-like confinement of the darker shades, representing the push and pull between overflow and containment. The broken pixels introduce disruptions, reflecting both chaos and repair in the narrative of desire confronting boundaries. The central shape metaphor of a wave suggests an ongoing struggle, with edges weighted towards the left, anchoring the visual restlessness of this abstract piece.</desc>
