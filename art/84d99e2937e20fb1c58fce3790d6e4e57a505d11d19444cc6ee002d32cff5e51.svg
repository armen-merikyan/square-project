<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse in Shadows</title>
  <desc id="desc">This composition conveys a dynamic interplay between clarity and static, reflecting the emotional themes of signal vs noise. The palette centers around vibrant 'signal green' and 'hot magenta' against a more subdued 'static gray' and 'dead black,' creating a clash between the perceptible and chaotic. The center pulses heavily with green to represent strong signal, while magenta interjects erratically as noise at the edges, leading to a striking contrast. This arrangement reflects the colliding qualities of exposure and shelter, emphasizing isolation amidst chaos as the 'tiny_cross' shape serves as a metaphor for balance within disturbance.</desc>
