<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone reflects the tension between envy and gratitude, with bold and muted colors creating a complex interplay. The palette features burnt orange and dark red to evoke moments of intensity, contrasted by charcoal and gold for moments of warmth and appreciation. The asymmetric patterns symbolize the zigzagging push and pull between these emotions, while the broken pixels represent the imperfection inherent in these feelings. Negative space is effectively used to allow breath and movement within the composition.</desc>
