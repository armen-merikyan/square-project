<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">The emotional tone is built around the duality of trust and suspicion, represented by a palette that balances warmth (bone_white, small_gold) against colder hues (stone_gray, moss_green, rust). The contrast occurs diagonally, igniting a tense push-pull between a soft, inviting checker pattern and the radial uncertainty. Broken pixels introduce disruptions, symbolizing vulnerability within resilience. The piece captures the collision of overlapping emotions—trust as calming warmth meeting the uncertainty of suspicion—while negative space ensures breathing room in the chaotic overlap.</desc>
