<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition reflects the emotional duality of 'emptiness' and 'desire' through a dynamic interplay of color and texture. The warm, saturated tones of hot coral and blood orange represent desire, while soft shades of dust pink and charcoal convey a sense of emptiness, creating a stark contrast. The layout features descending pixels, mimicking the feeling of pressure and overflow while leaving intentional quiet spaces. The broken frame pattern interacts with the stacked elements, suggesting collision and disruption, manifesting a tension that flows from the center outwards. The final piece serves as a visual tension between warmth and coolness, density and void, capturing an abstract narrative of longing constrained by external boundaries.</desc>
