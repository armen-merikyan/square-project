<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Island of Contrast</title>
  <desc id="desc">This composition juxtaposes strength and vulnerability through a central dense cluster of icy deep teal against a backdrop of void black and cosmic indigo, creating a feeling of protection battling exposure. The palette evokes awe and terror, with cold gold and star white serving as accent colors that interrupt the darker tones, representing moments of brilliance amid hardship. The broken pixels introduce intentional disruptions to reflect vulnerability, while the overall layout maintains a strong sense of balance, ensuring one colour dominates yet allows for quiet space to breathe. The primary collision occurs in the center, enhancing the sense of conflict represented by the shape of the tiny plus, suggesting connection within isolation.</desc>
