<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This composition reflects the emotional tensions of joy and grief through a divided layout, with the left half embodying joy's vibrant warmth and the right half echoing grief's somber tones. A zigzag flow moves upward in the joyful section, represented by bright yellows and oranges, while the grief section consists of muted blues and purples, creating a stark contrast. Jagged edges suggest the tumult of emotions while broken pixels add a sense of imperfection, capturing the rawness of human experience. The deliberate negative space allows feelings to breathe, hinting at unresolved tensions in both joy and grief.</desc>
