<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Flux of Emotions</title>
  <desc id="desc">The composition explores the emotional dichotomy between rage and calm through a deliberate arrangement of colors and shapes. A palette of deep reds and blacks bursts against serene light blues and whites, creating a tension that reflects the clash of powerful emotions. The layout employs an 'island and sea' concept, where a dense cluster of warm colors (rage) overtakes the cooler backdrop (calm) in the center, symbolizing invasion. The pattern merges pressure bands of jagged reds striving outward, interrupted by calm, horizontal blue grids that fragment and contain the chaos. This intentional collision evokes the struggle between overwhelming feelings and the quiet they disrupt, embodying the essence of the seed through abstract forms and spaces.</desc>
