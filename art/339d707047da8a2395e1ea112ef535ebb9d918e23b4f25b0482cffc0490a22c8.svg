<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece captures the emotional tension between desire and emptiness. Using 'hot coral' and 'blood orange' as dominant colors evokes warmth and urgency, while muted 'charcoal' and 'hollow blue' introduce an element of containment and quietness. The collision between saturated and muted colors is centrally located, reflecting a struggle for dominance in the canvas, embodying the theme of overflow versus containment. The disorder of pixel placement emphasizes broken pixels to create an imperfect, dynamic quality, suggesting pressure and tension throughout the arrangement. The layout, with noise patterns interrupting the frame, creates a visual debate of chaos and order, illustrating the emotional contrasts derived from the seed text.</desc>
