<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork embodies the tension between desire and emptiness. The warm hues of hot coral and blood orange represent desire, reaching upward to signify aspiration and emotional pull, while the cooler tones of hollow blue and charcoal embody the sense of emptiness and restraint. The layout of rising signal creates a movement from the bottom to the top, reinforcing a sense of hope and escape. A broken pixel motif introduces intentional disruptions throughout the piece, enhancing the contrast between the warm saturation and the faint emptiness, suggesting a struggle against containment. The main collision occurs at the center, where colors blend but also clash, representing the complexity of conflicting emotions. The design maintains a significant area of negative space to emphasize the absence that desire longs to fill.</desc>
