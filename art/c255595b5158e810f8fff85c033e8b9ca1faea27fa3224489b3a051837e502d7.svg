<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">This artwork captures the emotional tension between rage and calm using a palette of black, red, pale blue, and white. The contrast is heightened with sharp, jagged red pixels colliding into calm blue horizontal segments, reflecting a struggle between overloaded energy and quiet restraint. The pattern echoes a spiral, shifting focus towards the center where emotions intensify, suggesting an eruption of feeling from a contained space. The broken pixels introduce imperfection, further enhancing the rawness of the emotion without resorting to explicit imagery.</desc>
