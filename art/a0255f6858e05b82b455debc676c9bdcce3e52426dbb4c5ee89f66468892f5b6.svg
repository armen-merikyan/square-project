<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This artwork reflects the emotional tension between pressure and quiet. The palette includes soft off-whites and faint peaches to evoke a quiet space, contrasted by deep dark navy and compressed red representing pressure points. The main collision occurs where the bright peach cluster interacts with the dark navy, illustrating a push-pull sensation. The patterns of spark and patchwork embody the clash of feelings while maintaining an abstract harmony, shaped by the seed's notions of pressure and clarity crossing.</desc>
