<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The emotional tone explores the struggle between control and surrender. The palette features warm browns and shelter greens to reflect grounded stability against the cold whiteness conveying existential release. The main collision occurs at the center, where cooler colors meet the warmth, representing the pressure point of tension. The 'beacon' shape seed manifests as a radiating pattern of control in the diagonal, while softer veils of surrender flow in from the corners, creating an asymmetrical balance that evokes the dance between containment and overflow.</desc>
