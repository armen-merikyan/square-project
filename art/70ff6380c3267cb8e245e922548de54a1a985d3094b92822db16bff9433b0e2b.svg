<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This abstract composition explores the tension between 'restlessness' and 'peace' through a stark color contrast of mourning black and deep blue balanced by the warmth of pale yellow. The broken frame layout symbolizes confinement, with deliberate gaps allowing for color escape, reflecting both emotional conflict and the necessity for release. The pattern of dots represents peace, subtly interrupted by the tide-like flow of restlessness, creating a dialogue between calm and motion. The main collision occurs centrally, where the patterns intertwine and disrupt one another, embodying the struggle expressed in the seed.</desc>
