<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erupting Calm</title>
  <desc id="desc">This piece embodies the tension between rage and calm through its stark palette and contrasting patterns. The top rows represent 'rage' with jagged reds and sharp blacks creating a chaotic intensity, while the bottom showcases 'calm' with soothing blues and whites in a checker pattern. The intersection of these two emotional states is deliberately placed in the middle rows, illustrating the collision between overflowing emotion and quieter containment, while the broken pixels enhance the feeling of disruption and imperfection within the calm. This evokes a sense of conflict and resolution, encapsulating the essence of the seed's narrative without using literal imagery.</desc>
