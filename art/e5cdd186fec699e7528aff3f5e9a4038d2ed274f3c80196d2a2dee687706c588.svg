<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Echoes</title>
  <desc id="desc">This artwork explores the emotional dichotomy between loneliness and connection through contrasting warm and cool colors. The palette of pinks and dark maroons is used to evoke warmth and intimacy, while the grays introduce a feeling of isolation. The composition is structured with a 4x4 inner square representing connection—marked by warmer tones and denser patterns—surrounded by an outer layer of cool grays that evoke emptiness. This layout creates a visual strain, emphasizing the interplay between hidden emotions and exposed feelings. The art embodies bursts of color that suggest explosive connections amidst vast negative space, echoing the struggle between heart and silence.</desc>
