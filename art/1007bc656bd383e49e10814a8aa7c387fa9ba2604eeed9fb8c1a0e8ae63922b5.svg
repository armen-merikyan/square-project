<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Motion</title>
  <desc id="desc">This artwork embodies the tension between restlessness and peace through a dynamic array of colors and patterns. The contrasting palette of deep black, pale blue, and vibrant white reflects both calm and chaotic emotions. The central collision of colors disrupts calm, symbolizing memory and motion, where brighter pixels fight against darker edges representing static interference. The layout employs scattered repairs, countering feelings of unrest with moments of peace, creating a visual narrative of fluctuating emotional states. The forms intertwine, imbuing the piece with movement, while patches represent the fragmented nature of memory, leaving negative space as a reminder of unexpressed thoughts and feelings.</desc>
