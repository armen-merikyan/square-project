<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This artwork wrestles with the themes of vulnerability and strength through stark color contrasts. The palette, composed of cosmic indigo and void black, evokes a strong emotional tension, while the softer hues of star white and cold gold reflect fragile moments. The center of the grid is densely packed, representing strength, while the shatter pattern cascades outwards, creating a vulnerable edge. The collision occurs prominently in the center, where the bold grid meets the fractured patterns, creating an emotional tug-of-war. The play between filled and empty spaces captures the essence of exposure versus shelter.</desc>
