<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Reflection</title>
  <desc id="desc">This artwork embodies the emotional duality of envy and gratitude through contrasting dark and light colors that play against one another. The palette features deep blacks and dark violets representing heaviness and envy, while soft gold and pale green symbolize lightness and gratitude. The layout follows a rising signal, climbing upward, evoking hopefulness amidst darker tones. The interplay creates a visual tension that reflects the struggle between these emotions—a sense of rising amidst falling—highlighted by broken pixels, adding depth to the narrative. The pattern choices give rhythm, with the overcrowded lower portion contrasting against the sparse clarity of the upper parts, mirroring inner conflict.</desc>
