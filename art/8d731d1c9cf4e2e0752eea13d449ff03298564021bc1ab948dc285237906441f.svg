<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light and Weight</title>
  <desc id="desc">This pixel art composition contrasts the emotional tones of joy and grief. The palette of bright yellows and muted purples represents joy's warmth against grief's weight. The dense, dark lower section embodies heaviness while the airy, open upper area symbolizes joy, reflecting a struggle between these emotions. The use of a grid pattern at the bottom (grief) and a maze-like complexity at the top (joy) captures this emotional tension. The broken pixels in the lower part emphasize imperfection and disruption, enhancing the narrative of conflict both visually and emotionally.</desc>
