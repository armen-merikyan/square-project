<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Contrasts</title>
  <desc id="desc">The emotional tone of this composition reflects a struggle between vulnerability and strength. The palette, featuring deep teal and cosmic indigo, evokes a sense of awe mixed with terror, embodying the fragility of the centered pattern against the harshness of the void black and cold gold. The main contrast occurs at the center, where light (star white) meets dark, creating a tension that illustrates the pulse of competing emotions. Patterns of strength and vulnerability collide, with thick lines of stability disrupted by cracks, symbolizing the coexistence of protection and exposure.</desc>
