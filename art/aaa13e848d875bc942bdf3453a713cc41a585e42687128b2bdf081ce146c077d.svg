<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork conveys the emotional tension between vulnerability and strength through a thoughtful palette of muted colors. The central area pulsates with warmth from the warm sepia tones, suggesting strength, while the edges are dimmed with dark grays and blues, embodying vulnerability. The arrangement creates a stormy interplay between clusters of brightness surrounded by vast negative space, inviting contemplative thoughts about the balance of exposure and protection. The flowing pattern of 'flood' clashing with 'embers' generates a dynamic rhythm, suggesting pressure borders that interrupt a tranquil display. The broken pixels inject intentional imperfections, heightening the sense of unresolved emotional territory in this abstract square.</desc>
