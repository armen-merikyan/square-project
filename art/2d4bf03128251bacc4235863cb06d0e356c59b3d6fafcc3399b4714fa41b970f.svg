<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Signal</title>
  <desc id="desc">This piece captures the emotional tension of signal versus noise by utilizing a dark palette with vibrant interruptions. The colors navy and dim cyan represent the noise and chaotic static, while a bright white center pulse acts as a beacon of clarity amidst the confusion, suggesting moments of 'last light.' The main collision happens at the center, with the bright signal cutting through the dense layers of noise, embodying the struggle for coherence within chaos, as the abstract patterns collide, overlap, and suggest a narrative of searching for memory within the interference.</desc>
