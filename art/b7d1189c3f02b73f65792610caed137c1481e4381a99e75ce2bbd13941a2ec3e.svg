<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Dualities</title>
  <desc id="desc">This work captures the emotional tension between joy and grief through a split-screen effect. The palette combines bright yellow and orange, representing joy, with deep blue and muted purple to evoke grief. The contrasting colors are symmetrically placed to reflect the collision of these feelings, while the hard edges emphasize a sense of rigidity in emotion. The layout reveals a shift from a bright upper section to a darker lower half, reinforcing the pushing and pulling of emotional weight, as well as moments of chaos that intertwine within an overarching structure.</desc>
