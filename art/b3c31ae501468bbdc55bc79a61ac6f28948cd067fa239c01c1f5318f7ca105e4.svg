<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonant Disruption</title>
  <desc id="desc">This artwork captures the struggle between clarity and chaos, mirroring the tension between signal and noise. The palette blends deep navy and black for weighty calm, contrasted by bright accents of dim cyan and white, signaling a readable pulse amidst a static background. The corner invasion layout drives density diagonally across the piece, reflecting the spread of noise into once clear space, while intentional broken pixels disrupt the potential for a serene grid, embodying echoes of memory and the persistence of noise. The artwork balances thick solid colors with quiet spaces, illustrating a feeling of layered emotional conflict.</desc>
