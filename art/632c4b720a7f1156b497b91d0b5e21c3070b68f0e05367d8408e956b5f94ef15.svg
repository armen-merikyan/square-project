<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition expresses the emotional tension between desire and restraint. The color palette was chosen to reflect this duality: the saturated red-oxide represents desire's warmth, while the muted cream and blackened plum symbolize restraint and containment. The main collision occurs centrally, where the lattice pattern of desire intertwines with the flood of restraint, creating a dynamic duality. Edges remain sealed to signify the pressure of boundaries, while deliberate broken pixels introduce subtle imperfections that echo the struggle between the two emotions, inviting contemplation on how one can affect the other.</desc>
