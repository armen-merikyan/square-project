<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Spaces</title>
  <desc id="desc">This artwork embodies the conflict between panic and control, emphasized by a diagonal flow that moves from dark to light. The palette merges deep blacks and dark violets to establish a sense of claustrophobia and tension, while soft gold and pale green provide moments of unexpected lightness, representing hope amidst distress. The central weight of the composition is created by dark colors clustering towards the center, echoing feelings of an interior space under pressure, contrasted by lighter colors unfurling towards the corners, suggesting an escape or a release from confinement. The use of broken pixels across the design introduces a sense of imperfection, adding to the narrative of fragility and disruption in stability.</desc>
