<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece captures the tension between vulnerability and protection as represented by a pale center surrounded by darker, heavier colors. The warm brown and shelter green provide a grounding safety, contrasting sharply against the open blue, symbolizing exposure. The maze and broken frame patterns interact through a vertical split, creating visual tension and echoing the juxtaposition of safe enclosure and open vulnerability. This collision manifests at the center, where exposure meets shelter, represented by varying densities of color. Broken pixels and uneven distribution enhance the emotional complexity of the piece, embodying the nuances of seeking safety amidst possible exposure.</desc>
