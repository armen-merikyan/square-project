<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast Within Chaos</title>
  <desc id="desc">The emotional tone reflects a tension between the deeper, darker shades of envy and the lighter, brighter tones of gratitude. Using a palette of black, dark violet, soft gold, and pale green, the artwork hints at feelings of lurking jealousy contrasted with moments of appreciation and lightness. The left side features clean, structured patterns representing envy with a targeted approach, while the right side breaks into chaotic noise, representing a release towards gratitude, allowing for echoing shifts of color. The arrangement's central focus reflects heavy emotions causing a ripple of contrast across the canvas, with a few broken pixels adding imperfection, symbolizing how these feelings disrupt our inner mirror.</desc>
