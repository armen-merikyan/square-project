<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos vs Clarity</title>
  <desc id="desc">The emotional tone juxtaposes panic with control, channeling a narrative of conflict and balance. The palette combines dark navy and black to symbolize chaos alongside the soft light of dim cyan and white for control, creating a visual tension. The primary contrast occurs between dense dark colors at the bottom that resonate with panic, and lighter hues that rise, suggesting an ascent towards clarity and calm. The spark of light against the heavy edges echoes the struggle of control over chaos, establishing a rhythm that is both oppressive and hopeful.</desc>
