<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">The emotional tone explores the interplay between safety and exposure, embodied through a balanced palette. The warm brown and shelter green symbolize safety and protection, while the open blue and cold white echo vulnerability and exposure. This tension is visually represented by dense clusters of warm hues gradually interrupted by cool contrasts, creating a dynamic yet fragile rhythm across the square. The diagonal layout emphasizes the collision of these emotions, where the rich colors dominate the upper left, fading towards the cooler, lighter tones at the lower right, representing a journey from security to exposure.</desc>
