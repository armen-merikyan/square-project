  <title id="title">Emotional Dynamics</title>
  <desc id="desc">This artwork explores the tension between safety and exposure through a rhythmic interplay of contrasting colors. The chosen palette integrates gentle greens and browns to signify shelter and safety, contrasted with cool whites and pale hues to evoke feelings of vulnerability and exposure. The central collision emerges through a spiral pattern that shifts from stability at the edges to a frail center, underscoring the psychological pull between protection and openness. Broken pixels create intentional disruptions, enhancing the overall narrative of emotional intricacies and the balance of heaviness against fragility.</desc>
