<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">The emotional tone reflects a conflict between panic and control, manifested through stark contrasts in color and structure. The chosen palette of yellow and orange indicates warmth, suggestive of the chaotic energy of panic, while deep blue and muted purple ground the piece, adding layers of control and introspection. The asymmetry created by a radial pattern interrupted by central stripes evokes a sense of dynamic tension—where panic threatens to disrupt stability. The result is a composition that resonates with the push and pull of emotional extremes, supported by ‘broken pixels’ adding layers of imperfection, reinforcing the feeling of vulnerability amidst control.</desc>
