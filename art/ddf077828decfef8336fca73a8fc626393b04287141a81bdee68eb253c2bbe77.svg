<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Strength and Vulnerability</title>
  <desc id="desc">This artwork encapsulates the tension between vulnerability and strength. The palette, comprising hot coral and blood orange against deeper charcoals and hollow blues, reflects the tension between warmth and depth. The central arrangement features a thicker scar pattern representing strength at the edges, colliding with a soft veil pattern suggesting vulnerability in the center. This interaction creates a visual narrative of emotional conflict and connection, where stronger colors pulse around a quieter middle, suggesting a louder world surrounding a fragile core.</desc>
