<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Confusion</title>
  <desc id="desc">This composition captures the tension between clarity and confusion through contrasting color placements and patterns. The left side, representing clarity, utilizes a structured pattern with yellows and deep blues, conveying stability and brightness. The right side, symbolizing confusion, incorporates muted purples and oranges in a split-screen layout, creating a dissonance between the sections. Interspersed broken pixels create interruptions, amplifying the sense of disturbance. The overall flow is an orbit, suggesting movement around a central point of tension, while maintaining negative space to avoid chaos, reinforcing the balance of emotion within the abstract form.</desc>
