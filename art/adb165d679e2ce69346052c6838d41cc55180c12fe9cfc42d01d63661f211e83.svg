<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Flames</title>
  <desc id="desc">This piece embodies the emotional tension between joy and grief. The upper half features warm yellows and oranges, representing joy, set against a backdrop of deep blue and muted purples in the bottom half, invoking the weight of grief. The contrasting brightness and darkness introduce a dynamic dialogue of hidden vs. exposed feelings. The tilt of colors creates a sense of flow that suggests both disturbance and harmony, mirroring the seed's themes of order vs. chaos, while the broken pixels add a touch of imperfection, symbolizing the complexity of the emotions experienced.</desc>
