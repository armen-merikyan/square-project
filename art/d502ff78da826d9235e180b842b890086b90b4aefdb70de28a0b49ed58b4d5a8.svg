<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This artwork explores the tension between quiet and pressure, creating a visual rhythm that mirrors the emotional push and pull involved in these feelings. The palette of muted off-white, dust gray, and a compressed red punctuates the density of the edges with softer fields, representing the gentle calm fighting against the sharpness of inner conflict. The main collision occurs in the center where deeper colors collide, suggesting a chaotic core that flows outward into wider spaces that feel relieved and quiet. The pattern transitions from layered and dense structures at the edges to softer, more open areas towards the center, embodying the interplay of pressure dissipating into stillness.</desc>
