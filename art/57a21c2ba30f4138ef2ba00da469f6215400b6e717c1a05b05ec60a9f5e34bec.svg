<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Calm Disruption</title>
  <desc id="desc">The emotional tone embodies a tug-of-war between peace and restlessness, using pale mint and faded gold to represent tranquility, while storm gray conveys tension. The top four rows introduce a structured echo with more gentle patterns, while the bottom introduces chaotic thread patterns, suggesting a collision in the center where restlessness disrupts peace. This tension is visually represented by the contrasting colors and uneven distributions that play against each other. The edge style of faded borders gives a sense of depth, while the presence of broken pixels adds intentional imperfections that mimic the struggles of memory against motion.</desc>
