  <title id="title">Constrained Longing</title>
  <desc id="desc">This artwork encapsulates the emotional tone of desire versus restraint, creating a visual narrative of tension and containment. The palette includes saturated colors like red oxide and small orange to evoke warmth and longing, with muted shades like blackened plum and muted cream representing restraint. The collision occurs centrally, where patterns of desire (ash field) sweep across restrained spaces (constellation), creating a dynamic tension. The broken pixels introduce intentional disruptions, symbolizing the imperfections in the pursuit of desire against the sealed edges of restraint.</desc>
