<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">The emotional tone embodies the struggle between restlessness and peace. The palette of moss green, bone white, rust, stone gray, and small gold reflects resilience and fragility, suggesting the conflicting states. The layout contrasts the diagonal flow of restlessness, represented by jagged edges and dense color patches in warm hues (rust), against peaceful, muted fields in cooler tones (moss green and bone white). The central area is interrupted by pockets of pressure, where darker colors collide with lighter shades, embodying the tension and movement of ideas like memory and motion. The pattern mixes pressure bands with islands, illustrating the emotional interplay of motion against a backdrop of calming spaces. Broken pixels serve as intentional scars across the piece, emphasizing the imperfections and disruptions inherent in the emotional experience.</desc>
