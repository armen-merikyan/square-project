<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Terrain</title>
  <desc id="desc">This composition explores the interplay between rage and calm by positioning jagged, bright pixels (representing rage) against serene cooler fields (representing calm). The palette consists of deep red for aggression, pale blue for tranquility, stark white as contrast, and black as an anchoring presence. The main collision occurs diagonally from the top left, creating a visual tension that emerges as bright accents push against the more subdued areas, evoking a sense of halted motion. The 'corner_invasion' layout emphasizes this clash, while broken pixels introduce intentional disruptions to suggest erosion, underscoring the theme of containment versus overflow.</desc>
