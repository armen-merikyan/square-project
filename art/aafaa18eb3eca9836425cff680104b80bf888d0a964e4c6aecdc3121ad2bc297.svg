<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone encapsulates a delicate balance of vulnerability and strength, represented through contrasting colors and placements. The palette features muted tones like off-white and dust gray alongside compressed red and dark navy, highlighting the tension between open exposure and protective strength. The main collision occurs in the center where rippled patterns of vulnerability confront the shattering intensity of strength, creating a dynamic interplay of light and density. Negative space is strategically left to signify moments of quiet amidst the chaos, echoing the themes of the seed: safety in exposure and the fragility of strength.</desc>
