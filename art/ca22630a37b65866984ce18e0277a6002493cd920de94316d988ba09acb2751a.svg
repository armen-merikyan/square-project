<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Shelter</title>
  <desc id="desc">The emotional tension between vulnerability and strength is expressed through a palette that balances muted tones of gray (dust_gray, dark_navy) with hinting sparks of compressed_red and faint_peach. The main collision occurs at the center, where soft pulses of the exposed colors clash against the heavier, stable blocks framing the edge, creating a narrative of conflict and resolution. This abstraction draws on the suggested ideas of exposure versus shelter, dominating the perspective with strength while allowing vulnerability to seep through in layers.</desc>
