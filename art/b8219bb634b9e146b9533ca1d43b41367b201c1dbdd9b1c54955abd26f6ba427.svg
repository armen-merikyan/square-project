<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Held</title>
  <desc id="desc">The emotional tone captures the tension between desire and restraint, represented through a palette that oscillates between vibrant colors and muted tones. The bright hot coral and blood orange shades signify craving and intensity, while the darker charcoal and hollow blue embody the containment and quietness of restraint. The main collision occurs in the central area with a dense cluster of the saturated colors, interrupted by muted tones echoing outwards, showcasing an island of anticipation amidst quieting space. The abstract pattern veers from circular motions of the spiral pressure to the structured locks of the lattice concept, reflecting the dance between freedom and limitation.</desc>
