<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast Within Chaos</title>
  <desc id="desc">The emotional tone reflects the tension between panic and control, illustrated through a clash of vibrant and muted tones. The palette uses dark navy and black to represent weight, contrasted by sporadic bright pulses of dim cyan and the piercing white, suggesting moments of clarity amid chaos. The striped pattern against radial lines creates a rhythm of interruption, echoing the struggle between dynamic motion and the stillness of control. The layout emphasizes centrality with outward push, embodying a narrative of internal conflict and resolution.</desc>
