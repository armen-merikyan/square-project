<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Patterns</title>
  <desc id="desc">The emotional tone revolves around the struggle between panic and control, represented through contrasting patterns. The palette of red, pale blue, black, and white reflects intense emotions, where red represents panic and black signifies control. The outer edges incorporate crosshatch lines creating tension, while the center radiates with a more controlled, calm pattern. The collision happens toward the center, with colors bleeding into each other, creating an unresolved dynamic that mirrors the emotional conflict. Negative space is preserved to enhance the feeling of uncertainty.</desc>
