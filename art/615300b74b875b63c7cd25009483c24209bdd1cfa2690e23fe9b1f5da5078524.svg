<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork explores the emotional tension between vulnerability and strength by employing a palette representing fear and hope. The black and dark violet lend depth and solidity, contrasting with the soft gold and pale green that symbolize a fragile, exposed essence. The main emotional collision occurs at the center, where the 'embers' of vulnerability meet the 'veil' of strength, creating a dynamic interplay. The design incorporates broken pixels as intentional disruptions at the edges, symbolizing imperfections in the desire for safety and the inherent instability of exposure.</desc>
