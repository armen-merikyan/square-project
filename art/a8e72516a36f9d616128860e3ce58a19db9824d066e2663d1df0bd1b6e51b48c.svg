<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Essence</title>
  <desc id="desc">This artwork captures the emotional tension between vulnerability and strength. The palette, chosen from clean shades of white and ice blue contrasted by ink black and warning orange, reflects the delicate interplay of calm and chaos. The main collision occurs at the top left corner, with a dense cluster of dark colors creating a stark contrast against the lighter blues, evoking feelings of security battling against exposure. The strength pattern resembles rain, while vulnerability takes form as a barcode, emphasizing the tension in their boundaries and interactions. This lively abstraction invites viewers to feel the push and pull of these opposing forces, expressed through careful color placement and disrupted patterns.</desc>
