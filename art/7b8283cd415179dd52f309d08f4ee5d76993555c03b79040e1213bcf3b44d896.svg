<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shifting Perspectives</title>
  <desc id="desc">This artwork embodies the emotional tension between clarity and confusion through color and placement. A palette of yellow, orange, deep blue, and muted purple evokes a wide range of emotions. The bright yellows and oranges represent clarity, while the deep blues and muted purples delve into confusion. The arrangement juxtaposes bold central colors radiating outward into softer hues, allowing space for ideas to collide without becoming overwhelming. The 'half square' shape simultaneously hints at imperfection and a sense of incomplete understanding, illustrating the struggle of navigating clarity amidst confusion.</desc>
