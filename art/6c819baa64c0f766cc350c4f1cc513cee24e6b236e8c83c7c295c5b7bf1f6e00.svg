<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">The artwork reflects the emotional dichotomy of control and surrender, using a palette of guilt and forgiveness. The deep wine and ash gray create a sense of pressure, while the warm ivory and soft gold introduce lightness, illustrating the constant push and pull of these contrasting emotions. The main collision occurs in the center, where the grid-like control pattern disrupts the gentle descent of the lattice, creating an interrupted rhythm that embodies the tension between a contained state and a released one.</desc>
