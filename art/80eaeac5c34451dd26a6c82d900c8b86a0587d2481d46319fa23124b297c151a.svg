<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This piece captures the emotional tension between envy and gratitude, using a palette of electric blue, lime, magenta, and black to evoke contrasting feelings. The center is dynamic and brilliant, representing gratitude, while the edges are darker and more muted, embodying envy. The composition features diagonal flows that convey a sense of tension and movement, while soft edges intermingle with hard stripes and rings, creating a visual dialogue reminiscent of noise against silence. The central areas are busy with vibrant colors while edges are more subdued, offering a discernible negative space that allows the viewer's eye to rest. The interplay of colors conveys an inner conflict, drawing the viewer into a world of rising emotions and falling shadows.</desc>
