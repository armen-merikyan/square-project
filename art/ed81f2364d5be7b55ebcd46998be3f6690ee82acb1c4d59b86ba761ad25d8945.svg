<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This artwork captures the emotional contrast of trust and suspicion through a duality of texture and color. The left side, representing trust, features a soft palette of pale mint and soft sky, conveying openness and ease. The right side, embodying suspicion, integrates storm gray and near black, reflecting barriers and uncertainties. The central area embodies tension with faded gold hints spilling into the darker shades, suggesting illumination amidst shadows. The broken pixels introduce intentional disruptions, symbolizing the cracks in trust. The diagonal flow contrasts sharpness with curve, embodying resilience against fragility.</desc>
