  <title id="title">Echoes of Resistance</title>
  <desc id="desc">This artwork captures the emotional tension between defiance and submission. The upper rows exhibit energy and brightness using warm coral and signal cyan, representing defiance with broken dot patterns. The lower rows transition to the cooler hues of cold slate and blue black, evoking submission in a halo pattern that suggests enclosure and soft retreat. The contrasting layouts create a vertical disturbance that alludes to the chaotic pulse within a quiet channel, reflecting the struggle of opposing emotions. Broken pixels serve as intentional scars, creating intersections and imperfections that enhance the vibe of conflict and resonance between the color fields.</desc>
