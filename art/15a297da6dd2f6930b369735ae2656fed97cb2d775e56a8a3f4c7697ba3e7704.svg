<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">The Tension of Desire</title>
  <desc id="desc">This piece captures the emotional conflict of desire and restraint. The palette combines warm tones of red oxide and small orange with muted cream and iron gray, creating a visual tension. The dense clusters of saturated colors, representing desire, are juxtaposed against quieter, muted fields that evoke restraint. The main contrast occurs in the center, with dynamic upward movements suggesting hope, yet confined by the edges symbolizing limits. The broken pixels add imperfection, reflecting betrayal, as the desires press against the sealed borders, creating a visceral, abstract expression.</desc>
