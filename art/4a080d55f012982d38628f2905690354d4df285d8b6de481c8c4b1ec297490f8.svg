<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Hearts</title>
  <desc id="desc">This piece explores the emotional tension between love and betrayal. The chosen palette of pink, red, gray, and dark maroon embodies warmth and conflict, with vibrant elements battling against muted backgrounds to illustrate the push and pull of affection and treachery. The density of color on one side creates an intense pressure, while the opposite side remains more empty, suggesting the aftermath of heartbreak. The placement of the colors creates a subtle diagonal flow, representing both rising signals of hope and the downward pull of betrayal, with cracks of gray symbolizing broken trust.</desc>
