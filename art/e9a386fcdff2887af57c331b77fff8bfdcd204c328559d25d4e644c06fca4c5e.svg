<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tides of Surrender</title>
  <desc id="desc">This artwork conveys the emotional tension between control and surrender. The palette, softened with muted plum and soft cyan, creates a melancholic feel that resonates with themes of overflow and containment. The dominant color is a gradient of rain blue, suggesting a layered depth of control, while lavender gray serves as the quiet contrast, symbolizing release. The central collision occurs with a stutter step of broken pixels that introduce intentional imperfections, echoing interruptions in the flow. The organized, yet asymmetrical arrangement allows for a tension-filled narrative of pressed emotion against the larger, quiet expanse, reflecting the push and pull of the two emotional states.</desc>
