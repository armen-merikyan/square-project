<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Boundaries</title>
  <desc id="desc">This piece captures the emotional tension between defiance and submission. The palette, termed 'melancholy wonder', employs muted hues like lavender gray and soft cyan to evoke a sense of quietness. The sharp contrast of rain blue and muted plum stripes represents defiance colliding with areas of soft, pulsing sparks of submission. The main collision occurs in the center, visually representing a boundary where these two emotions intersect, creating a structured chaos that invites the viewer to explore the space between order and fluidity.</desc>
