<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Tensions</title>
  <desc id="desc">This piece embodies the emotional dance between defiance and submission. The palette features vibrant hues of hot coral and blood orange representing defiance, contrasting with the softer tones of dust pink and charcoal symbolizing submission. The diagonal layout provides a stark division, where vibrant colors clash with muted shades, suggesting a tension between opposing forces. The central area is deliberately left open, creating a quiet channel that resonates with the idea of thresholds and interruptions. Broken pixels scatter through the vibrant areas, symbolizing chaotic glitches, contributing to the overall sense of unresolved emotion.</desc>
