<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Tension</title>
  <desc id="desc">The emotional tone captures the struggle between control and surrender, where the top half represents containment through a maze-like pattern of darker hues, while the bottom half embraces a softer, halo-like release using lighter shades. The palette combines moss green for depth, bone white for tranquility, rust for warmth, stone gray for stability, and small gold for accentuating tension. The central collision emerges from a dense core of darker colors pressing against the lighter edges, symbolizing the tension and intersection of the two opposing emotions. This arrangement echoes the seed's themes of overflow and containment as well as interruption and release, creating a dynamic abstract story.</desc>
