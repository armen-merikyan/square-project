<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Constrain</title>
  <desc id="desc">This composition explores the emotional duality of desire and restraint through the clash of warm saturated colors and cool muted tones. The palette of hot coral and blood orange evokes intense longing, while charcoal and hollow blue introduce a counterpoint of calm and containment. The main collision occurs in the center, where the warm colors spiral outward, reminiscent of desire pressing against the boundaries set by cool hues. This encapsulates the contrasting forces of attraction and limitation, creating a dynamic visual rhythm that reflects the seed's themes.</desc>
