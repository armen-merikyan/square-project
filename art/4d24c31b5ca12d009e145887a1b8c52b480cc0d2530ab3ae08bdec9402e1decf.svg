  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition embodies the tension between vulnerability and strength. The palette merges warm brown and pale skin to symbolize the exposed interior, while shelter green and open blue represent the protective aspects. The main contrast arises from a central pale area surrounded by muted shades that swirl, creating a sense of pressure and release. Broken pixels add intentional imperfections that echo the fragility implied by the theme, while keeping much of the grid clear to honor the safety aspects of exposure.</desc>
