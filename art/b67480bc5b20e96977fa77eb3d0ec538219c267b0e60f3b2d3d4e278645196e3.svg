  <title id="title">Echoing Shelters</title>
  <desc id="desc">This artwork captures the emotional tension between vulnerability and strength, where the outer frame represents resilience with bold, dark colors while the inner area reveals a softer, more exposed core. The palette blends deep shades of red oxide and blackened plum with muted cream to suggest a contrast of weight and lightness, symbolizing the fight between shelter and exposure. The collision occurs in the center, where thick edges of strength clash with the delicate flood of vulnerability. Broken pixels create intentional disruptions that evoke scars and imperfections, enhancing the narrative of tension and connection.</desc>
