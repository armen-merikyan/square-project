<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Longing and Resolve</title>
  <desc id="desc">This composition evokes the emotional tension between longing and resolve by contrasting warm and cool tones. The palette includes 'pale_aqua' for a sense of distance and calm, 'mist_gray' for an unfinished feeling, 'alarm_red' as an accent representing urgency and intensity, and 'ink_blue' for depth and resilience. The central collision occurs in the middle of the grid, depicting both chaotic density and quiet spaces to illustrate the push and pull of emotions. The edges are sealed to support the sense of enclosure, while the scattered color marks and broken pixels convey imperfection and the unresolved nature of these emotional states. The layout exhibits symmetry diminished by the density of the colors, mirroring the internal conflict of longing and resolve.</desc>
