<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition embodies the emotional tension between vulnerability and strength through stark contrasts and complex layering. The selected palette of dark colors like '#000000' and bright accents such as '#FF0000' represent the interplay of safety and exposure, while also reflecting on the duality of light and weight. The collision occurs centrally, where the soft staircase pattern of vulnerability interrupts the dense ash field of strength, creating a visible tension. Broken pixels serve as intentional disruptions reminiscent of scars, suggesting the complexity of these emotions and the impact of experience.</desc>
