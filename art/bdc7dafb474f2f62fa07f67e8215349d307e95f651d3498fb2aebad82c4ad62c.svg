<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition contrasts the contained calmness of cool colors with the intense eruptions of warmth, embodying the duality of rage and calm. The use of black, pale blue, and white promotes clarity and quiet fields, while the bursts of red intrude sharply into the structure, representing emotional outbursts. The arrangement reflects a broken frame, with shapes that stagger rhythmically across the square, suggesting a stutter step of emotions colliding. The deliberate placement of broken pixels, particularly in the top corners, emphasizes disruptions and echoes the theme of contained chaos bursting at the seams.</desc>
