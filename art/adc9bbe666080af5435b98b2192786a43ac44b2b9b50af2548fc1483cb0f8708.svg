<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Confrontation of Calm and Rage</title>
  <desc id="desc">This piece embodies the emotional tension between calmness and rage, represented through a palette of black, red, pale blue, and white. The cooler colors (pale blue and white) create vast negative spaces that encapsulate calm, while the sharp reds puncture through with compressed intensity, symbolizing rage. The main collision occurs centrally, where warmer red patterns disrupt the cooler calm. This overlapping creates an abstract visual tension reflecting the battle of emotions described in the seed, leading to a dynamic 8x8 layout.</desc>
