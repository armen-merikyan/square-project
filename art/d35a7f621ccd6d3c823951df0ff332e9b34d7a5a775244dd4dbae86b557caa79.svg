  <title id="title">Light and Weight</title>
  <desc id="desc">This piece captures the emotional tension between joy and grief, using a palette of warm yellows and cool blues to reflect their contrasting energies. The sharp edges represent the hard realities of grief, while the soft transitions in the warmer tones symbolize joy's expansiveness. The diagonal spread from low density at the top to high density at the bottom mimics the journey from lightness to heaviness, illustrating the push and pull of these intertwined feelings.</desc>
