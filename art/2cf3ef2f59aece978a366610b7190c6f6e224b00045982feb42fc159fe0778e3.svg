<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Containment</title>
  <desc id="desc">The emotional tone captures the push-and-pull between desire, represented by saturated warm colors, and restraint, expressed through muted, cooler tones. The palette includes vibrant hues like hot coral and blood orange to symbolize longing, while charcoal and hollow blue inject a sense of restraint and calm. The central collision occurs where saturated marks attempt to breach a lattice of muted colors, emphasizing a heart of conflict amidst a controlled border. This tension creates a dynamic rhythm, inviting the viewer to explore the complex emotions underlying the abstract patterns.</desc>
