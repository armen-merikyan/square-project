<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotion</title>
  <desc id="desc">This artwork translates the emotional contrast between envy and gratitude into a visual dialogue. The warm burnt orange and gold symbolize gratitude, while dark red and charcoal embody envy, creating a push and pull of emotions. The central placement of lighter colors contrasts with denser, darker edges, evoking a sense of weight against lightness. Broken pixels introduce imperfection, resembling the complexity of emotional states, while negative space enhances the feeling of unresolved tension, inviting the viewer to ponder the delicate balance between these conflicting emotions.</desc>
