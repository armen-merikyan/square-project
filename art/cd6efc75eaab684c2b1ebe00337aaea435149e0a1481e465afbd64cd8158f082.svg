<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Broken Memory</title>
  <desc id="desc">The emotional tone of confusion vs clarity is represented through a contrast in density and color placement, with dark blocks at the edges echoing chaos while lighter colors spiral outward, suggesting clarity. The chosen palette reflects a nostalgic yet fragmented memory with sepia and faded blue hues conveying a sense of lost clarity within confusion. The main collision happens where the darker shades abruptly meet the lighter ones, creating tension and movement from the center toward the edges, representing an attempt to escape the disorder. The pattern embodies a rising signal, where broken pixels are subtly integrated to enhance the feeling of imperfection.</desc>
