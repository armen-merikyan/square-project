<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Resilience</title>
  <desc id="desc">This artwork conveys the emotional tension between spark and ash through a contrast of vibrant red and muted grays, representing the struggle between vitality and decay. The pulse marks signify sudden bursts of energy, while the noise pattern evokes the sense of fading memories. The main collision occurs in the center, where the bright accents of red clash against the cooler, ashen tones, embodying the push and pull of resilience against fragility. The layout is eroded symmetry, suggesting wear and time. The overall palette evokes a narrative of conflict and balance, creating a visual dialogue between the extremes of energy and stillness.</desc>
