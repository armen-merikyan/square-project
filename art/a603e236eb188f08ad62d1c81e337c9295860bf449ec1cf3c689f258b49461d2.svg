<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The artwork captures the emotional tension between desire and emptiness through the use of vibrant and muted colors. The palette of hot coral, blood orange, and hollow blue reflects the depth of yearning contrasted against the hollowness that containment implies. The dominant warm colors occupy the center space, denoting desire's reach, while the cooler, more muted tones create an edged boundary that hints at restraint. The placement of colors is intentionally disrupted, with deliberate breaks mirroring the emotional 'broken frame' concept from the seed, suggesting unresolved tension. The overall effect carries an echo of pressure and quiet longing against sharp contrasts.</desc>
