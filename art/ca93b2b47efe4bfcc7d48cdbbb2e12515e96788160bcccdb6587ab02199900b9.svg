<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Corner</title>
  <desc id="desc">The emotional tone expresses a tension between trust and suspicion, with a focus on pressure and release. The selected palette of mourning black and deep blue contrasts sharply with the brighter tones of pale yellow and new leaf, reflecting the struggle between dark, oppressive feelings and lighter, more hopeful ones. The main contrast occurs at the top left corner where deep blue and black collide with the soft yellows, creating a focal point. The pattern emerges from a radial structure for trust that disrupts the ember-like suspicion pattern, embodying a narrative of tension and resilience against fragility.</desc>
