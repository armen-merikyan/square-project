  <title id="title">Tension of Saturation</title>
  <desc id="desc">This artwork captures the emotional tension between desire and restraint, using a palette that contrasts warm, saturated hues with cooler, muted tones. The split vertical layout emphasizes the battle of these emotions, where the left side bursts with vibrant heat while the right remains grounded and contained. The main collision occurs at the center, where swirling warm colors meet structured, quiet tones, reflecting the push and pull of desires against boundaries. Broken pixels create intentional disruptions, echoing the unresolved nature of tension.</desc>
