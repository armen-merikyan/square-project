<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone of this artwork reflects a balance between tension (panic) and stability (control). The chosen palette of bright yellows and oranges against deep blue and muted purple embodies joy's brightness colliding with the heaviness of grief, creating a complex emotional landscape. The main contrast occurs where energetic, punctuating dots (representing panic) disrupt the more fluid and structured ring patterns (representing control) in a manner that showcases unstable harmony. The shape seed of 'crack' permeates throughout, suggesting fractures within the confines of control, echoing the underlying theme of conflict between defined boundaries and chaotic bursts of emotion.</desc>
