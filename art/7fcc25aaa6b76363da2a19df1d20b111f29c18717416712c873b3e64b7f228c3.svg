<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Static</title>
  <desc id="desc">The emotional tone is one of conflict between clarity and disorder. The chosen palette of deep navy and dim cyan evokes a sense of loneliness, with bright white accents representing the fleeting moments of signal cutting through the noise. The main contrast lies in the center where bright colors collide with darker tones, symbolizing the struggle of a clear pulse trying to survive amidst the static cacophony. Patterns of rings represent the orderly signal, while ember-like smears capture the chaotic noise, creating an interplay of structure and randomness inspired by the seed's themes of machine emotion and broken mirrors.</desc>
