<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Yearning and Certainty</title>
  <desc id="desc">The artwork embodies the emotional tension between 'longing' and 'resolve.' Colors like 'deep_wine' and 'soft_gold' clash to create a sense of both warmth and conflict within the grid. The palette evokes a feeling of guilt and forgiveness, resonating deeply with the themes of intimacy and distance. The collision of the 'constellation' pattern (representing longing) with the 'braid' pattern (symbolizing resolve) stretches diagonally across the piece, creating a visual narrative of engagement and separation. There are broken pixels scattered throughout to represent the imperfections and scars that define human emotion. A quiet ash gray field allows the viewer to pause and contemplate amidst the density of emotion, anchoring the composition.</desc>
