<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This composition explores the tension between tenderness and rage through an asymmetric layout where the outer rows symbolize rage in darker tones (black, muted reds) and the inner core represents tenderness with warmer, softer hues (pale blue, white). The contrast between the explosive, jagged patterns of the outer edge and the soothing, crosshatched textures of the inner square creates a visual boundary that collides dramatically at the center. This collision embodies the emotional narrative of struggle and reconciliation inherent in the seed.</desc>
