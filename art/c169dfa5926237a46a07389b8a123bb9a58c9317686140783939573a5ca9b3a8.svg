<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interplay of Exposure and Shelter</title>
  <desc id="desc">This artwork conveys the dynamic tension between vulnerability and strength through contrasting color blocks. The palette includes moss green for grounding, bone white for exposure, rust for warmth, stone gray for solid barriers, and small gold for highlights. Central to the composition is an interplay of thick and thin patterns, with the barcode representing strength dominating the left side (60%) while the framed lighter interior depicts vulnerability on the right. A ripple effect stems from the center, creating an intentional collision between the two emotional states, emphasizing connection versus alienation.</desc>
