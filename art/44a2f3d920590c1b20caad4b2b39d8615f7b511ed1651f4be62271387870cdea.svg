<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This artwork explores the tension between 'spark' and 'ash,' suggesting moments of ignition against settled remnants. The palette transitions from vibrant 'ripe green' and 'acid green' representing sparks of life and energy to muted 'deep olive' and 'cream' illustrating lingering ashes and restraint. The diagonal contrast emerges prominently in the central rows, embodying the push and pull of opposing emotions. Jagged edges disrupt the surface, invoking a sense of broken memory and resilience. The overall layout is intentionally divided, creating the feeling of a threshold between two drastically different emotional landscapes, resonating with the ideas of memory versus erasure.</desc>
