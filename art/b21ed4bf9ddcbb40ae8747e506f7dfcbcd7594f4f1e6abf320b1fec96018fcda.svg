<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Desire and Emptiness</title>
  <desc id="desc">This abstract square embodies the emotional tension of 'spark' versus 'ash' through a contrasting palette of warm and cool tones. The top half features energetic cracks of 'hot_coral' and 'blood_orange,' resembling sparks of life against the subdued, dusty fields of 'charcoal' and 'dust_pink' below, representing ash and restraint. The main collision occurs in the center where jagged edges of warmth meet the softness of coolness, echoing the struggle between desire and emptiness. The broken pixels create intentional disruptions that symbolize fragility in resilience. Negative space invites breath, ensuring the composition avoids overwhelming density. Overall, the patterns suggest a wave of emotion captured in a locked frame.</desc>
