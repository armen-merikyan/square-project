<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light and Weight</title>
  <desc id="desc">The emotional tone reflects a duality of softness and severity, where the light tones of powder pink and warm white clash with the dense, heavy presence of carbon black and steel gray. This resonant contrast embodies a struggle, symbolized by the top rows depicting softness with a crackling, lively pattern, while the bottom rows manifest a noise-like rigidity. The broken pixels introduce an element of imperfection, enhancing the texture and creating an emotional weight. The composition invites viewers to navigate the tension between lightness and heaviness, represented in a split-horizontal layout that supports a clear narrative of collision and balance.</desc>
