<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Echoes</title>
  <desc id="desc">This composition explores the emotional landscape of longing and resolve through contrasting colors and patterns. The palette combines deep black and electric blue, invoking a sense of both void and energy, while the bright magenta acts as a pulse amidst the darker tones. The left half features a flame pattern reflecting longing—emotionally charged and chaotic—while the maze pattern on the right signifies the strength and structure of resolve. The collision of these two patterns occurs centrally, where the disarray of longing meets the order of resolve, creating a dynamic tension that reflects the ongoing struggle within the emotional themes of the seed.</desc>
