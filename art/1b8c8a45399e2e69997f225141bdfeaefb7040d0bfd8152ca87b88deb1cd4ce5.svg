<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light and Weight</title>
  <desc id="desc">This piece embodies the emotional contrast between softness and severity through a split horizontal layout. The top half uses soft pastels (#F0C6D0, #F6E7E8, #E0C3C9) to represent tenderness and forgiveness, while the bottom half introduces darker tones (#282828, #585858, #3B3B3B) to convey severity and guilt, thus juxtaposing the two feelings. The collision occurs at the center where the colors overlap and transition, creating an echo of tension. The chosen palette reflects a balance of light and dark, illustrating the push and pull between these emotions while leaving ample negative space to emphasize their contrast. Broken pixels intentionally interrupt the smooth flow, adding unpredictability to the overall composition, symbolizing imperfections in emotions.</desc>
