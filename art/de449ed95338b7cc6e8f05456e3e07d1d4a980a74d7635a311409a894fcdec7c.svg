<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The artwork captures the emotional dichotomy between safety and exposure. A palette derived from calm shelter greens and warm browns is juxtaposed against the coolness of open blues and pale skin tones to create tension. The left and right sides mirror each other, yet minor disruptions in color create a sense of imperfection, symbolizing the struggle between protection and vulnerability. The central collision of softer and harsher colors illustrates the tension between safety (grounding browns) and exposure (glitchy blues).</desc>
