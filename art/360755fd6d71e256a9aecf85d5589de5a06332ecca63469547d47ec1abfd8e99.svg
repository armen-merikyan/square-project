<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal Noise</title>
  <desc id="desc">The emotional tone contrasts restlessness with peace, capturing an interplay of chaotic energy against serene calm. The palette of reds and blacks against pale blue and white evokes tension—a dark core of anxiety lightened by glimpses of tranquility. The diagonal pattern of restless bars on the left collides with smoother stripes of peace on the right, showcasing the struggle between the two emotions. Broken pixels create intentional disruptions, reinforcing the conflict within a generally clear structure. The layout emphasizes a vertical split, allowing the viewer to experience the push and pull of conflicting feelings.</desc>
