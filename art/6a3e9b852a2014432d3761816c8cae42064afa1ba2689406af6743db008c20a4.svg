<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs. Shelter</title>
  <desc id="desc">The emotional tone reflects the tension between safety and exposure. A palette of shelter green and warm brown evokes security while pale skin and open blue add a sense of vulnerability, creating a rich context for the contrasting feelings. The collision occurs in the center, where dense patches of warm brown confront softer tones like pale skin, generating visual tension. This arrangement symbolizes pressure along the border that holds back the expansive and raw nature of exposure.</desc>
