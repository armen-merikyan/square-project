<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Uneasy Pulses</title>
  <desc id="desc">This composition reflects the emotional tension between tenderness and rage through the use of a contrasting palette of deep reds and muted blues. The central area, marked by jagged patterns, symbolizes the collision of rage, while gentle grid structures surround it, representing tenderness. The flow of colors moves from the exterior inward, creating a sense of pressure towards the center, allowing the quieter spaces to echo the feelings of guilt and forgiveness inherent in the seed. The broken pixels disrupt the symmetries to embody feelings of imperfection and the struggle to balance these competing emotions.</desc>
