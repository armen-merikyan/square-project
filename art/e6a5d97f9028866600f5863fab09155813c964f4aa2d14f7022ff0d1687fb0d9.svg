<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Vessel of Echoes</title>
  <desc id="desc">This work explores the emotional tension between safety and exposure, with a dense, warm center suggesting safety surrounded by cool, open edges representing exposure. The palette features cozy browns and greens contrasting with cold whites and soft blues, creating a collision at the center where warmth meets chill. The radial patterns of exposure clash with the threshold patterns of safety, creating a visual 'echo' in the right column. The intentional disruptions (broken pixels) remind us of the fragility of the balance between protection and vulnerability.</desc>
