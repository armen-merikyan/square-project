<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of joy and grief, configured with a contrast between warm, soft yellows and oranges reflecting joy against cooler, muted blues indicating grief. The palette is strategically chosen to illustrate the emotional spectrum where warm colors expand and breathe, while the cooler shades create a heaviness and density. The arrangement features a crosshatch pattern on one side, promoting a sense of interruption and complexity while the other side remains more open and airy, suggesting the quietness of grief. The balance between dense clusters of color and negative space effectively conveys an unresolved tension, echoing the theme of rising joy versus falling grief.</desc>
