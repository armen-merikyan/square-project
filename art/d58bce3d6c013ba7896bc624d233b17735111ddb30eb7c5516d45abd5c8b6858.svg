<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Disruption</title>
  <desc id="desc">This composition embodies the tension between clarity and interference. The palette, featuring signal green and electric blue for the accent colors, juxtaposes against the muted tones of static gray and dead black, creating a vivid contrast of pulse against noise. The radial pattern representing signal meets the grid of noise, with the most dramatic collision occurring at the center, symbolizing a struggle for clarity amidst chaos. Broken pixels are strategically placed to echo the notion of 'scarred vs smooth', introducing intentional disruptions that enhance the narrative. This piece captures the essence of a vibrant signal trying to resonate within a spectrum of noise.</desc>
