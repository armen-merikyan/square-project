<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotions</title>
  <desc id="desc">This artwork navigates the tension between tenderness and rage, capturing a spectrum of feelings through contrasting colors and patterns. A palette of reds symbolizes the heated fury, while muted blues and whites represent calmness. The arrangement features strong edges on one side (rage) which bleed and interrupt soft, flowing bands of color on the other (tenderness). The collision occurs centrally, where the hot red hues clash against the cool blues, illustrating the emotional struggle inherent in the themes of opposition and relief emanating from guilt and forgiveness. The 'flame' pattern merges chaotically with the 'fault_line,' creating an organic rhythm that echoes the psychological turmoil of the seed concept.</desc>
