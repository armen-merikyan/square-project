<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrasting Realities</title>
  <desc id="desc">The emotional tone reflects a dynamic tension between restlessness and peace, embodied through a palette that juxtaposes earthy moss green with stark bone white, symbolizing a clash between groundedness and ethereality. The rust and stone gray colors introduce a sense of weight and memory, while the small gold accent creates contrasting sparks of activity amidst calmness. The main collision occurs diagonally, with static patterns representing restlessness intersecting with scar patterns of peace, inviting the viewer to experience the discomfort of abrupt shifts against a serene backdrop. The layout, inspired by stacked bands, effectively captures the layering of emotional strata, resulting in an artwork resonating with feelings of both tension and tranquility.</desc>
