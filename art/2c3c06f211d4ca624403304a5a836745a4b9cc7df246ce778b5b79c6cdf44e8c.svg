<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Confinement</title>
  <desc id="desc">This piece embodies the emotional struggle between desire and restraint. The palette consists of deep reds and muted creams that serve to highlight the fiery intensity of longing against the subdued boundaries imposed by cooler grays and blacks. The top left corner bursts with warmer colors evoking desire, while the cooler colors dominate the rest of the frame, creating contrast and a sense of confinement. The broken pixels add a sense of disruption, representing moments of betrayal within love, introducing imperfection in this interplay. Overall, the abstract pattern reflects a collision of emotional forces that are constantly negotiating space.</desc>
