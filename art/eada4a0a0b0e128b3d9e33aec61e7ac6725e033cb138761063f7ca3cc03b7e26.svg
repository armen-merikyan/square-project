  <title id="title">Fractured Echo</title>
  <desc id="desc">This piece captures the emotional tension between defiance and submission, using sharp contrasts to represent both states. The palette of warm and cool colors mirrors the push and pull of the interaction, where the brighter accents evoke a sense of defiance, while the muted tones signify submission. The center of the square holds a dense cluster of colors, symbolizing the core of conflict, while the outer regions fade into quieter fields, creating a sense of encroachment. Broken pixels disrupt the overall coherence, echoing the idea of fragmentation in the emotional experience.</desc>
