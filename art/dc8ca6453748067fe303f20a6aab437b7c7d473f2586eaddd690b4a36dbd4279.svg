<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Shelter</title>
  <desc id="desc">This composition embodies the emotional dichotomy of safety and exposure. The soft green and warm brown evoke a sense of protective comfort while contrasting with pale and cold colors suggesting vulnerability and exposure. The dynamic arrangement of the colors creates a collision between the comforting shelter and open space, reflecting the tension of being both vulnerable and shielded. The presence of broken pixels introduces imperfection, underscoring the fragility of perceived safety. The dominant cool colors in the top rows establish an echo of vulnerability, while the lower rows ground the piece with warmth, creating a balanced yet tense atmosphere.</desc>
