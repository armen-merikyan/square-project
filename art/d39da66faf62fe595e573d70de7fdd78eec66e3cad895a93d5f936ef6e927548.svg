<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This composition captures the tension between 'longing' and 'resolve' through careful placement of colors and patterns. The outer border, representing longing, features soft, muted colors that evoke a sense of warmth and distant embrace. The inner square embodies resolve with sharper, defined patterning reminiscent of barcodes, creating a sense of compression and clarity. The collision occurs centrally, where these two emotional realms meet and interact, framed by a calm negative space that allows them to breathe. Each chosen color represents the quiet pressure of suppressed feelings contrasting with expressions of strength, reflected in the structured inner pattern.</desc>
