<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Balance</title>
  <desc id="desc">This piece embodies the duality of envy and gratitude through a palette that juxtaposes warm and cool tones. The sepia and tan colors reflect warmth linked to gratitude, while the dust gray and faded blue evoke feelings of envy through their cooler tones. The zigzag pattern represents the conflict between lightness and weight, creating tension in the contrast between rich colors on one side and muted shades on the other. This composition features broken pixels to emphasize imperfection, aligning with the idea of a broken mirror, and leaving negative spaces that symbolize unresolved emotions and quiet moments amidst chaos.</desc>
