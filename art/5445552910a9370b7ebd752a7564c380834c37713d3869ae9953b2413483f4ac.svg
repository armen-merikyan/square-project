<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inner Conflicts</title>
  <desc id="desc">This piece captures the emotional tension of tenderness and rage, using a stark palette of red and muted tones to express contrast. The top half represents tenderness with gentle mirror patterns in soft, pale blues and whites, while the bottom half abruptly shifts into jagged, ripple patterns of deep red and black, representing rage. The main collision occurs in the center, where calm meets chaos, illustrating the struggle between these emotions. The selections dynamically interplay, creating a visual conversation that echoes the themes of protection and rupture.</desc>
