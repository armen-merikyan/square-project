<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmony in Collision</title>
  <desc id="desc">This piece captures the tension between joy and grief using a palette that contrasts vibrant yellows and oranges with deep blues and muted purples. The left side evokes joy, with expanding warm tones representing growth and brightness, while the right side introduces cooler, drooping blues that embody grief. The zigzag pattern allows for a rhythmic interaction between order and chaos, creating a visual echo of rising signals and burnt edges. The deliberate placement of darker tones intermittently within the warmer section signifies intersections of emotion—where joy meets grief. Overall, the composition reflects a balance of structured chaos and emotional depth, emphasizing the complex interplay between contrasting moods.</desc>
