<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This artwork reflects the interplay between quiet spaces and dense clusters of color, a visual metaphor for emotional collisions. The palette oscillates between cool and warm tones, emphasizing the contrast of pressure against quiet interludes. The use of deep teal (#007F7F) suggests hidden depths, while bright coral (#FF6F61) acts as an emotional accent, creating moments of tension that echo throughout the piece. The arrangement is intentionally asymmetric, allowing for discord to arise from the organized chaos, resulting in a rhythm of release and pressure that mirrors the complexity of human emotion.</desc>
