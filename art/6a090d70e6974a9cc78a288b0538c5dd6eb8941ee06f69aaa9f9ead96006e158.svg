<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Quiet Collision</title>
  <desc id="desc">The artwork captures the emotional tension between defiance and submission. The palette, featuring soft cyan, muted plum, and lavender gray, evokes a melancholic wonder contrasting sharp, angular breaks against soft, flowing forms. The central area indicates a defiant presence with bright, broken dots, while the edges feature smoother pressure bands, symbolizing submission. The main contrast occurs at the center, where bright colors collide with more subdued tones—a representation of conflict. The layout introduces the idea of scattered repair, as broken pixels find brightness, suggesting resilience against the background of anguish. This design communicates a deep and nuanced narrative of emotional complexity, embodying the core themes of the seed text.</desc>
