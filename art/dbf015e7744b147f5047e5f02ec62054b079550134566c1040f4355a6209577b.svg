<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ascent and Descent</title>
  <desc id="desc">The artwork explores the emotional push and pull between envy (darkness, pressure) and gratitude (lightness, release). The selected palette conveys a sense of nostalgia and reflection, utilizing sepia and dusty greys contrasted with a faded blue to represent the weight of envy against the lightness of gratitude. The collision occurs where deeper shades meet lighter tones, creating tension. The pattern reflects a zigzag flow, symbolizing the uneven journey of emotions—ascending from dark to light, with broken edges representing imperfections in feelings and experiences.</desc>
