<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">This artwork explores the emotional contrast of joy and grief through color, moving from bright yellows to deep blues. The palette captures the essence of joy with dots symbolizing openness and light while introducing maze-like patterns in muted purples and blues to represent grief. The left side presents a joyful ascent, radiating warmth, whereas the right side contrasts with a descending maze, evoking feelings of heaviness and fragmentation. The jagged edges emphasize tension between this split. Active collisions of bright against muted colors create a visual narrative of push and pull between these emotions, challenged by inherent complexities of experience.</desc>
