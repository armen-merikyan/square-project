  <title id="title">Emotional Collision</title>
  <desc id="desc">The composition explores the tension between joy and grief, informed by the contrasting colors of a warm palette (yellows and oranges) against cooler tones (deep blue and muted purple). The layout simulates a nearly mirrored image, where asymmetrical disruptions create an uneven flow that reflects emotional collisions. The use of broken pixels enhances the sense of fragmentation and imperfection, reinforcing the theme of emotional pressure and release.</desc>
