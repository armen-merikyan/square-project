<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">The emotional tone captures the oscillation between tenderness and rage, embodied in warm reds and muted blacks juxtaposed against cool pale blues and whites. The palette reflects the delicate balance of calm (pale blue) amidst the explosive rage (red). The main collision occurs in the center, where the echo of red jagged patterns interrupts the steady flow of gentle blue hues. This reflects the push and pull of the emotions described in the seed, taking visual form through irregular pixel placements that suggest both pressure and release.</desc>
