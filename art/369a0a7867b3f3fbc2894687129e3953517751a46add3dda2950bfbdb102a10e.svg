<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This composition explores the dynamic contrast between quiet and pressure. The palette features muted tones like 'dust_gray' and 'faint_peach' to create a calm base, while 'compressed_red' and 'dark_navy' introduce tension and depth. The use of jagged edges and a broken frame layout emphasizes both confinement and escape, with densely packed colors bleeding into areas of negative space. The collision occurs diagonally, where the dark and soft tones intersect, suggesting a struggle between clashing emotions.</desc>
