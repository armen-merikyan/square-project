<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition captures the tension between desire and restraint, where the saturated warmth of desire pushes against the muted edges of restraint. The chosen palette features rich reds and muted creams, symbolizing pulsating desire and containment. The dominant red_oxide creates a feeling of hunger that fills the upper left corner, while the iron_gray forms structured borders, indicating the constraints that prevent expansion. Patterns of islands (desire) and braid (restraint) interact asymmetrically, hinting at an unresolved tension that invites contemplation.</desc>
