<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This composition encapsulates the emotional tension between vulnerability and strength through a dynamic interaction of colors. A dark outer border manifests strength, creating a protective frame around a pale center that suggests vulnerability. The palette of burnt orange, dark red, and gold illustrates an ancient fire, evoking warmth amid the cool charcoal tones. The main contrast occurs between the dense border and the lighter inner cluster, representing a clash of stability against fragility. The noise pattern evokes a chaotic yet delicate interplay of strength, while the maze pattern imbues a sense of stability, forming a visual story of exposure against a backdrop of shelter.</desc>
