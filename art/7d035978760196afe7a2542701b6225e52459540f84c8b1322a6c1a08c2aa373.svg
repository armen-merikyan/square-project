<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Resilience</title>
  <desc id="desc">This piece captures the emotional tension between moments of ignition and the quiet aftermath of loss. The palette of warm ivory, deep wine, and soft gold represents sparks of vitality, while ash gray and stain brown symbolize the remnants of restraint. The main contrast arises from a central cluster of bright colors intersecting jagged edges, embodying the struggle of resilience against overwhelming weight. This enhances the idea of memory vs. erasure as bright accents intermittently break through darker fields, reflecting fractured recollections or emotional bursts amidst encroaching silence.</desc>
