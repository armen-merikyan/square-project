<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Colliding Signals</title>
  <desc id="desc">The emotional tone reflects the tension between trust and suspicion. The palette of dark tones and a soft blue accent captures this duality: black represents suspicion and uncertainty, while pale blue symbolizes trust and clarity. The main collision occurs near the center where dark echoes are interrupted by soft glowing pixels, representing trust attempting to emerge amidst suspicion's noise. The layout is influenced by the idea of scattered repair from the seed, allowing bright accents to patch up darkened areas, echoing resilience in fragile spaces.</desc>
