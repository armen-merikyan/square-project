<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition explores the emotional tension between tenderness and rage. The palette of black, red, pale blue, and white embodies this duality, with the black and deep red representing rage and the pale blue and white reflecting tenderness. The layout emphasizes a dim atmosphere with an active bright cluster in the center suggesting a protected smallness, which contrasts the surrounding compressed and chaotic field of darker tones. The ash field pattern collides with the scar pattern, creating interruptions that reflect emotional struggles and complexities. With intentional broken pixels, this composition depicts the residual marks of past feelings, representing guilt and forgiveness. The emotional weight swells from black and red towards the lighter center, suggesting a climb towards clarity amidst chaos.</desc>
