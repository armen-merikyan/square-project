  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the tension between strength and vulnerability through contrasting colors and forms. The palette blends serene hues like pale aqua and mist gray to echo vulnerability with the urgent presence of alarm red that signifies strength. The central collision occurs in the lower left corner, creating pressure against surrounding spaces. This arrangement reflects the broken yet protective nature of the horizon, displaying how vulnerability is cradled by strength, all while remaining abstract and open to interpretation.</desc>
