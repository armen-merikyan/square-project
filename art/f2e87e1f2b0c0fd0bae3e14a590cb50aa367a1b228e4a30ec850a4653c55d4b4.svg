<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">The emotional tone encapsulates a struggle between longing's soft warmth and the steady strength of resolve. The palette reflects this duality, featuring warm coral and soft amber to depict longing, contrasted by the cooler tones of cold slate and blue-black to embody a sense of resolve. The patterns—stripes for longing that ripple with yearning, and staircase shapes for resolve that convey upward movement—collide at the center, where the main emotional tension occurs. A strategic application of broken pixels serves as sharp interruptions, representing the scars of emotion that coexist. This maintains a clear structure while allowing for spaces of negativity, creating depth and weight in the narrative.</desc>
