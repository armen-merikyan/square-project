  <title id="title">Fractured Affection</title>
  <desc id="desc">The contrasting emotional tones of love and betrayal are expressed through a combination of warm pinks and rich dark maroon hues, creating tension across the canvas. The maze pattern reflects the intricacies of love while the split-screen theme introduces inherent conflicts, echoing the betrayal. The arrangement creates a diagonal rhythm that suggests tension, with a left-heavy density transitioning into open spaces, symbolizing emotional release. The burned edges enhance the feeling of brokenness, while irregular placements of darker colors disrupt the otherwise mirrored layout, emphasizing corruption within symmetry.</desc>
