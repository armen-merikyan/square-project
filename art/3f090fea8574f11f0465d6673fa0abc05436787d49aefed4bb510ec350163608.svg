  <title id="title">Tension of Heart</title>
  <desc id="desc">The emotional tone reflects the conflict between vulnerability and strength, illustrated through contrasting colors. The palette uses deep wine and warm ivory to evoke warmth and shelter, while ash gray acts as a bridge between strength and vulnerability. The collision of ‘glitch’ and ‘stack’ patterns at the center suggests an ongoing struggle, with the glitch symbolizing interruptions from strength and stacked layers representing the build-up of vulnerability. This layout conveys a strong emotional narrative while leaving intentional negative space to enhance the theme.</desc>
