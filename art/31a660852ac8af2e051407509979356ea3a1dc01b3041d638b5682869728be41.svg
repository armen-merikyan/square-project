<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Yearning</title>
  <desc id="desc">This piece embodies the tension of desire fighting against the void of emptiness. The warm colors of yellow and orange symbolize the desire, contrasting sharply against the deep blue and muted purple, representing emptiness. The layout of descending pixels evokes a sense of falling, while the burned edges introduce a jagged, imperfect quality, reflecting the chaotic nature of longing. The interplay between the warm and cool hues creates a visual rhythm of ebbing presence and absence, suggesting a heart's fragmented signals amidst a backdrop of solitude.</desc>
