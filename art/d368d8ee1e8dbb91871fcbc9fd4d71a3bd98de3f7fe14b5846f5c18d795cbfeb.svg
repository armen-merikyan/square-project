<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone captures the delicate interplay between vulnerability and strength. The palette consists of soft and warm colors (pale_skin, cold_white, and shelter_green) contrasting with deeper shades (warm_brown, open_blue), evoking a sense of safety intertwined with exposure. The core center is saturated with vibrant hues, reflecting strength, while thin borders of pale colors embody vulnerability, creating tension. The main contrast occurs where the vibrant contrast meets the softer edges, emphasizing a collision of sensations that mirrors the themes of tension and protection. The 'door' metaphor suggests an entryway to vulnerabilities and strengths alike, creating an abstract spatial narrative within the grid.</desc>
