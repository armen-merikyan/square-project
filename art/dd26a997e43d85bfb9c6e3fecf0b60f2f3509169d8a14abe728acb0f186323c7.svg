<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs. Shelter</title>
  <desc id="desc">This artwork draws from the emotional tension of vulnerability and strength, represented by a soft, exposed center and a dense base. The palette of clean white and ice blue creates a sense of calm that contrasts with the striking warmth of warning orange, illustrating the interplay between safety and exposure. The layout features one corner overloaded with color, resulting in an unsettling density that reacts against a backdrop of negative space. This collision occurs at the upper left, creating a dynamic movement from the vibrant colors toward the quieter sections, symbolizing a 'sweep' of emotions that both overwhelms and provides safety. The broken pixels introduce intentional imperfections, echoing the fragility of strength. The pattern combines glitch elements with flood-like swathes, illustrating this complex relationship.</desc>
