<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Intensity of Contrast</title>
  <desc id="desc">This composition embodies the emotional tension between defiance and submission. The dark colors represent defiance, creating a stark contrast to the lighter, warmer tones representing submission. The use of navy and dim cyan creates a tone of solitude and introspection, while the black serves as an aggressive boundary that sparks energy inward. The arrangement features a solid border of dark hues, encasing a lighter core that introduces warmth and softens the harsh interruptions of the outer frame. The central clash occurs within the 4x4 inner square, where the 'flame' and 'pulse marks' patterns converge, visually representing the collision of these emotional states.</desc>
