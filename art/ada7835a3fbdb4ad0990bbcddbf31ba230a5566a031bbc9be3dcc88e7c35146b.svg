<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of the Divide</title>
  <desc id="desc">This artwork embodies the emotional tension between rage and calmness, illustrated through contrasting patterns and colors. The warm reds and blacks symbolize rage, compressed into sharp, angular forms on the left. In opposition, the cool pale blues and whites denote calm, spreading in radial patterns on the right, highlighting a serene space. The collision arises where these two emotional states meet, emphasizing an unsettling contrast with jagged breakthroughs from the red pixels into the calm blue spaces. The layout amplifies the division and interplay of these emotions, suggesting a push and pull between chaos and tranquility.</desc>
