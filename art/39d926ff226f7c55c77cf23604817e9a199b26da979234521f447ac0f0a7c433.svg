<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">The emotional tone reflects the tension between panic and control. The chosen palette of vibrant lime and electric blue signifies the chaotic spark of panic, juxtaposed with stable black and magenta, suggesting control. The composition features a descent pattern, representing the emotional flow of turmoil as it moves downward, creating a top-heavy weight. The collision occurs where the structured patterns of control intersect with chaotic, broken elements of panic, symbolizing an emotional fracture. The layout maintains negative space to suggest emptiness, referencing the 'inside_vs_outside' concept, while embodying the 'empty room' feeling.</desc>
