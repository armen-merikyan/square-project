  <title id="title">Spiral of Exposure and Shelter</title>
  <desc id="desc">The emotional tone reflects a tension between control and surrender through a contrasting palette of deep olive and honey gold, symbolizing richness and vulnerability. The main contrast collides in the center, creating a visual 'stutter' where surrounding tension spills outward while maintaining an off-center harmony. Broken pixels introduce intentional imperfections, resembling scars of emotion that disrupt the expected flow, aligning with the theme of exposure versus shelter.</desc>
