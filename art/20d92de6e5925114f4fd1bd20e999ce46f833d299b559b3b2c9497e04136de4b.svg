  <title id="title">Tension of Order and Chaos</title>
  <desc id="desc">This artwork explores the emotional contrast of panic and control through a structured yet fragmented layout. The selected palette of reds and grays signifies intense emotions, where the soft maroon edges hint at chaos within control. The rising and falling contrast is embodied through a zigzag pattern on one side, echoing tension, while the broken dots represent a search for grounding amidst disorder. Gaps in color create negative space, suggesting a breath in the chaos, reflecting both relics of joy and grief.</desc>
