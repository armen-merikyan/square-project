<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Emptiness and Desire</title>
  <desc id="desc">This piece reflects the emotional tension between emptiness and desire, using a palette that juxtaposes warm, vibrant colors with cooler, muted tones. The brighter hues represent desire's warmth and pull, while the cooler shades symbolize emptiness and containment. The main contrast occurs centrally, where the vibrant coral and orange hues collide with a more muted charcoal, creating a visual argument between the two emotional states. The patterns are layered to evoke the struggle for control within a confined space, with intentional disruptions breaking the rhythm, mimicking the frustrations in the dance of desire against the constraints of emptiness.</desc>
