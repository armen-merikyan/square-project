  <title id="title">Fractured Harmony</title>
  <desc id="desc">This artwork captures the emotional tension between love and betrayal through the use of a warm color palette dominated by pinks and reds against cooler, muted grays. The soft edges create a sense of intimacy while the arrangement features both dense clusters and negative spaces that suggest an inner conflict. The vertical flow mimics descending emotions like tears, hinting at both fragility and strength. The chaotic noise pattern on one side clashes with the softer crack pattern, reinforcing the theme of contrast and collision, where one can find beauty entwined with heartbreak.</desc>
