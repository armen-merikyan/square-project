<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Harmony</title>
  <desc id="desc">This composition reflects the emotional dichotomy between dread and relief through color and contrast. The deep blues and muted purples create a heavy backdrop that feels oppressive, mirroring the feeling of dread. In contrast, the warm yellows and oranges punctuate the composition, acting as moments of relief and brightness that break through the density. The bottom-weighted edge style enhances the sense of heaviness underlying the piece. A checker pattern infuses the relief colors, creating lively contrast against the noise pattern of the darker shades. This structured chaos suggests a rhythm of continuous collision and release, evoking the emotional journey implied by the seed.</desc>
