<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotional Currents</title>
  <desc id="desc">This artwork explores the emotional tension between softness and severity. The palette features warm white and powder pink to embody softness, clashing against the stark intensity of carbon black and sharp crimson, representing severity. The layout forms a narrow channel, symbolizing pathways of guilt versus forgiveness and the push-pull of light against dark. The pulse marks serve as points of interruption within a dense cluster, creating a dynamic rhythm of emotional density contrasted with quiet spaces throughout the piece.</desc>
