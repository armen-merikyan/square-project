<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">The emotional tone of 'longing' versus 'resolve' presents a narrative of tension and balance. The chosen palette of sepia, tan, dust gray, and faded blue symbolizes the blend of warmth and coolness, where sepia and tan echo memories of longing, while the cooler tones represent clarity and resolve. The dense center emphasizes the collision between these emotions, while the quiet edges reflect the overwhelming sense of yearning versus the grounding aspects of resolution. Broken pixels have been strategically placed to introduce deliberate imperfections, symbolizing the struggle between repair and damage, embodying how unresolved feelings persist amidst attempts to stabilize them.</desc>
