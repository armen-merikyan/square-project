<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetric Fracture</title>
  <desc id="desc">This piece explores the emotional tension between confusion and clarity through its contrasting patterns and color placements. The chosen palette of deep reds, grays, and muted tones reflects feelings of betrayal and emotional fragility. The use of broken dots signifies a departure from symmetry, introducing chaos and visual confusion, while the crosshatch pattern suggests moments of clarity. The jagged edges and falling layout evoke a descent into instability, drawing the viewer's eye across the frame, emphasizing the contrast between dense clusters of color and negative space, representing unresolved tension and fragmented emotions.</desc>
