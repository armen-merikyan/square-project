<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos Contained</title>
  <desc id="desc">The emotional tone reflects a tension between explosive rage and subdued calm, manifesting through contrasting hues and patterns. The palette juxtaposes deep reds (symbolizing rage) against cooler blue tones (representing calm), embodying the conflict. The layout showcases density in the center, where red escalates in intensity, disrupting a quiet blue field at the borders, emphasizing containment versus overflow. Broken pixels erupt along this edge, suggesting scars of conflict, while quiet fields radiate a serene presence. The visual dynamics of zigzagging patterns of rage against smooth gradients create an echo of chaos trying to breach quiet, capturing the essence of the seed.</desc>
