<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">This composition explores the emotional dichotomy of love and betrayal through color and pattern. The warm palette of pink and red juxtaposes with the cool gray tones to represent love's warmth clashing with the harshness of betrayal. The first half of the composition is dense with pinks, embodying love, while the second half incorporates grays to depict betrayal, creating a visual noise that represents internal conflict. The splitting pattern evokes a mirroring broken symmetry, and the deliberate placement of 'broken' gray pixels disrupts this balance, echoing the theme of imperfection in relationships. Negative space is strategically utilized to enhance the feeling of emptiness, emphasizing the emotional impact of betrayal versus love.</desc>
