<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of the In-Between</title>
  <desc id="desc">This composition explores the emotional tension between certainty and curiosity, reflected in the contrasting colors of deep blue and muted purple that define structure and ambiguity. The palette's warm orange and yellow accents represent fleeting moments of joy and warmth against the cooler tones, creating a pulsing energy throughout. The dominant deep blue background evokes a sense of certainty, while the chaotic interruptions of the brighter colors symbolize curiosity and exploration. The layout follows an eroded symmetry, suggesting a push-and-pull between order and chaos, enhanced by broken pixels that introduce intentional disruptions. This captures the essence of rising signals through the contrast of calmness at the edges and vibrant chaos at the center, embodying the journey from certainty to curiosity.</desc>
