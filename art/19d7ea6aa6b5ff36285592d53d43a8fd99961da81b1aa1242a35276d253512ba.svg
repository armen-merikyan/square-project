<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Stillness</title>
  <desc id="desc">The emotional tone embodies the jagged contrast between restlessness and peace. The palette, consisting of ripe green and honey gold, highlights tension through vivid colors clashing against softer, cream-colored backgrounds. The inner 4x4 section represents peace with circular patterns while the outer edges represent restlessness with scarred textures. The main collision occurs diagonally, symbolizing a push and pull between calm and chaos, as if peace is desperately attempting to break through tumultuous memories. The broken pixels add disruption, enhancing the sense of conflict, while maintaining readability and emotional clarity.</desc>
