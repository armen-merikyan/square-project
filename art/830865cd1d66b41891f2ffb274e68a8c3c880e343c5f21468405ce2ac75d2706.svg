<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Pulses</title>
  <desc id="desc">The artwork captures the emotional duality of longing and resolve through intersecting patterns. The palette—a mix of hot coral, blood orange, dust pink, charcoal, and hollow blue—creates warmth contrasted with cooler tones, suggesting both a yearning and a grounding solidity. The broken pixel spots introduce intentional disruption, representing moments of fracture amidst repair. The main collision occurs in the center, where the echo-like patterns of resolve clash with the maze-like threads of longing, reinforcing the idea of tension in proximity. This arrangement reflects the thematic duality of the seed in a purely abstract sense.</desc>
