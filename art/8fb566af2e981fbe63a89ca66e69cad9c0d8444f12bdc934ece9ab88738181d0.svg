<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Beneath the Surface</title>
  <desc id="desc">This piece embraces the tension between defiance and submission, depicted through sharp and soft contrasts, echoing a pulse-like flow. The palette of black, dark violet, soft gold, and pale green represents a struggle between heavy emotional weight and lightness, creating depth as well as the suggestion of an undercurrent. The organization showcases a bottom-weighted composition, with darker colors dominating the lower half, symbolizing emotional gravity, while the lighter hues hint at fleeting moments of hope or openness. The mixture of grid and radial patterns introduces complexity and a sense of layered conflict, embodying the essence of love and betrayal without overt representation.</desc>
