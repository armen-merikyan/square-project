<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">The emotional tone is a dichotomy between restlessness and peace, captured through a blend of linear and chaotic patterns. The palette of moss green, bone white, rust, stone gray, and small gold reflects resilience and fragility, with earthy hues suggesting grounded peace disrupted by sharper, dynamic accents. The central collision occurs through a halo of light colors contrasting edges of darker tones, symbolizing the tension between tranquility and agitation. The maze-like pattern suggests restlessness, while the channel-like structures evoke peace, integrating to create dynamic tension across the grid that resonates with the seed's themes of imbalance and memory.</desc>
