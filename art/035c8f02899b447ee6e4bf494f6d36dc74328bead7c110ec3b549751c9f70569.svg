<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasts of Emotion</title>
  <desc id="desc">The emotional tone of longing vs. resolve manifests in the color palette, where soft tones of off-white and faint peach suggest warmth and an underlying desire, while the deeper hues of dark navy and compressed red inject a sense of tension and urgency. The layout employs a broken frame, giving structure while allowing emotional leakage through gaps. The resolution is visually represented through the negative cross pattern—strong lines that intersect and disrupt the shattering effect of longing. The arrangement juxtaposes dense clusters of darker tones against more open fields of lighter colors, creating tension in a complex emotional narrative.</desc>
