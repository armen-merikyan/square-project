<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Stillness</title>
  <desc id="desc">This piece embodies the push and pull between restlessness and peace through its color selection and arrangement. The warm hues of rust and small gold represent the underlying agitation, while the cooler tones of moss green and stone gray instill a sense of calm. The central collision of bright colors against the muted background creates a visual narrative of chaotic motion restrained by tranquil spaces, aligning with the theme of motion versus memory. The broken pixels introduce imperfections, embodying both disruptions and scars that emerge from past memories and current restlessness.</desc>
