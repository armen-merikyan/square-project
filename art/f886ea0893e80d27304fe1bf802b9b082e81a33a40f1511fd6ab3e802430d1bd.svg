<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Joy and Grief</title>
  <desc id="desc">The artwork embodies the emotional tension of joy contrasted with grief, using a palette that oscillates between warm tones of yellow and orange to represent joy, and deep blues and muted purples to symbolize grief. The rhythm of the pixel arrangement facilitates a rise from darker hues at the bottom, suggesting a hopeful ascent toward brighter colors, yet the asymmetrical patterns introduce breaks that communicate a sense of fragmentation and loss. The focus of the composition is in the center, where the color shifts are most pronounced. The use of a limited palette fosters a contained emotional landscape, while the presence of broken pixels implies imperfections intrinsic to personal experiences of love and betrayal.</desc>
