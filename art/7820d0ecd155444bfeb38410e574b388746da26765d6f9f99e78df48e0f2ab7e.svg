<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Embrace</title>
  <desc id="desc">This artwork conveys the emotional complexity of love and betrayal through a chaotic color arrangement. The contrasting palette of warm pinks and reds against cool grays represents the tension and the duality of these feelings. Clusters of denser colors collide with lighter patches, suggesting moments of pressure that break the overall harmony, echoing the emotional turmoil. The edges are sharply defined to amplify the intensity of the contrasts, mimicking the decisive moments in relationships where love feels fragile amidst the threat of betrayal. The use of space accentuates this dynamic, creating a rhythm of presence and absence, invocations of love, and echoes of loss.</desc>
