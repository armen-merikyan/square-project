<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rising Tension</title>
  <desc id="desc">The emotional tone of joy vs grief is represented through contrasting color palettes and patterns. The left side embodies joy with bright yellows and oranges in a dotted pattern, suggesting expansion and vibrancy. The right side channels grief with deep blues and muted purples arranged in a crosshatch, eliciting a sense of heaviness and remembrance. The collision occurs at the center where the joyful dots interact with the grief patterns, creating a dynamic, unresolved tension. Burned edges from the concept of 'zigzag' imply disruption, enhancing the contrast of rising signals amidst zigzagging emotional flows.</desc>
