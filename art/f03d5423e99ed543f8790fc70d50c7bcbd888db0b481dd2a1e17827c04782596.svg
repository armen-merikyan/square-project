<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone of this artwork reflects a conflict between the pull of desire and the rigid nature of restraint. The palette features warm, rich colors like red oxide and muted cream, symbolizing desire, contrasted with darker shades like blackened plum and iron gray to represent restraint. The main collision occurs centrally, where the maze-like patterns of desire clash with the structured crosshatch of restraint, creating a dynamic pressure that is both enticing and limiting, mirroring the seed’s themes. The intentional use of broken pixels introduces a sense of imperfection that enhances the emotional tension, while the negative space subtly reinforces the idea of unfulfilled longing.</desc>
