<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shattered Pulse</title>
  <desc id="desc">This artwork embodies the emotional tension between yearning and determination, captured through the contrast of deep blacks and vibrant greens. The palette was chosen to represent both the heaviness of longing and the brightness of resolve, allowing the electric blue to interrupt the surface with energy and anticipation. The main collision is centralized, where the dark hues are intermittently punctuated by lively color 'bursts', reflecting the dynamic of a heartbeat. The layout mimics falling pixels, suggesting a cascade of emotions as experiences intertwine and overlap, resonating with the theme of repair versus damage.</desc>
