<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This piece embodies the emotional juxtaposition of joy and grief through color and arrangement. The palette, dominated by bright yellows and oranges evocative of joy, contrasts starkly with deep blues and muted purples symbolizing grief. The split layout introduces tension; the top half features a cleaner, more ordered pattern of joyful broken dots, while the bottom half breaks into a more chaotic ring motif representing grief. This dynamic creates a conversation between light and dark, expansion and constriction, capturing the duality of the emotional experience. The interplay of these patterns and colors encapsulates the complex narrative of human emotions.</desc>
