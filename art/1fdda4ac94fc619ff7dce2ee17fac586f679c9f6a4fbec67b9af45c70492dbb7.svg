<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This composition captures the emotional tension between restlessness and peace through contrasting colors and patterns. The palette blends warm reds with cooler grays, symbolizing the struggle of emotion. The arrangement features a zigzag flow, where the top pixel pairs reflect motion and turmoil, while the bottom grounds it with calm, equilibrating gray tones. The sharp edges of the red ignite urgency, creating a shatter effect alongside the stability of the gray, portraying a battle of emotions. Eroded edges accentuate the tension, suggesting weariness from conflict, fitting the abstract narrative derived from the seed.</desc>
