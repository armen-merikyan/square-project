<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Contrasts</title>
  <desc id="desc">The emotional tone of longing versus resolve is expressed through a palette that evokes nostalgia and tension. The muted tones of sepia, tan, and dust gray represent the longing aspect, reminiscent of memories and unresolved feelings, while faded blue injects a subtle depth of resolve, evoking calmness amidst the emotional turbulence. The placement of darker tones in the bottom rows suggests the weight of longing, creating a base layer of density. In contrast, the top rows feature lighter colors, symbolizing the clear boundary of resolve. The collision between muted grays and a vibrant blue is concentrated in the center, where the emotional struggle feels most intensified, reflecting the barrier between states of being. Broken pixels throughout serve as scars of repair in the midst of the emotional journey, providing intentional imperfections that echo the inherent messiness of human experience.</desc>
