<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This artwork embodies the tension between quietness and pressure, utilizing a palette of off-white, dust gray, compressed red, dark navy, and faint peach. The main contrast occurs on a diagonal line, where rich reds and the faint peach collide against cooler tones of navy and gray. This evokes the feeling of a dense core gradually releasing into a more open space, reflecting the emotional journey from tension to calm. Broken pixels create intentional visual disruptions, representing moments of clarity amidst confusion, in line with the theme of 'shatter against tide.'</desc>
