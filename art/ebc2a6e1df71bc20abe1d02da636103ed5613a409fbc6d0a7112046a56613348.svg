<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Forces</title>
  <desc id="desc">This artwork embodies the emotional duality of defiance versus submission, utilizing a palette dominated by navy and black to evoke depth and heaviness against sharp contrasts provided by dim cyan. The arrangement is intentionally left-weighted, suggesting a struggle between opposing forces, with darker colors at the edges representing submission and lighter hues at the center implying defiance. The use of broken pixels throughout the piece symbolizes imperfection, adding to the chaotic interplay of light and dark, noise and silence, ultimately expressing a complex emotion that resonates with the seed's themes.</desc>
