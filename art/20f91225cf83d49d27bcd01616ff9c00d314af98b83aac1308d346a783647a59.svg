<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality in Motion</title>
  <desc id="desc">This artwork explores the emotional tension between confusion and clarity through a structured yet chaotic grid. The palette, 'broken_memory,' with its muted sepia tones and soft blues, evokes a sense of fragmented memory and unresolved emotions. The contrast occurs between dense clusters of darker shades representing confusion and lighter tones suggesting clarity, leading to a visual pulse of energy across the canvas. The 'broken_pixels' element introduces intentional imperfections, reflecting moments of distortion amid the orderly; the interplay of rigorous symmetry and deliberate breaks enhances the overall narrative of balance interrupted. The arrangement of colors mimics the push and pull of emotions in a state of flux, allowing the viewer to feel the underlying rhythm between chaos and serenity.</desc>
