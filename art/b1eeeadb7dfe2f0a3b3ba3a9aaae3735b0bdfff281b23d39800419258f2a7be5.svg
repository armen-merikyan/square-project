<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This artwork embodies the emotional struggle between panic and control. The palette, comprising shades of red, black, pale blue, and white, reflects intensity and calmness merging together. The left side builds a dense red cluster symbolizing panic and chaos, while the right leans toward subdued pale blue and white, representing control and clarity. The arrangement of colors hints at a diagonal fall—invoking feelings of weight and instability juxtaposed against a brighter, calmer side. This strong visual contrast emphasizes the narrative of internal conflict sparked by the seed.</desc>
