<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Tension</title>
  <desc id="desc">The emotional tone blends fear and hope, illustrated through the interaction of dark and light tones. The palette, consisting of black, dark violet, soft gold, and pale green, reflects the tension between dense weight and fragile brightness. This contrast is delineated in a split vertical layout: the left side symbolizes fear with a maze of dark hues and jagged patterns, while the right side embodies hope with glowing edges and softer tones. The conflict between chaos and serenity erupts along the vertical divide, punctuated by bursts of soft gold reminiscent of tiny sparks of hope amid a formidable darkness. The layout leaves negative space representing the quiet uncertainty between emotions, balanced yet tumultuous.</desc>
