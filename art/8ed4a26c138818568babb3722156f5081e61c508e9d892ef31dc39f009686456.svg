<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This abstract piece embodies the tension between vulnerability and strength, channeling the emotional duality depicted in the seed. The chosen palette of ripe green and honey gold suggests growth and warmth, while deep olive provides a grounding contrast. The layout is asymmetric, with a dense cluster of bright colors in the top left, interrupted by softer, dimmer regions hinting at vulnerability. The main collision occurs at the corner, symbolizing the intersection of light and shadow where strength is guarded yet exposed. The intentional placement of broken pixels introduces a sense of imperfection and disruption, echoing the fragility of the emotional narrative. Each color block disrupts the flow, inviting contemplation of resilience amid exposure.</desc>
