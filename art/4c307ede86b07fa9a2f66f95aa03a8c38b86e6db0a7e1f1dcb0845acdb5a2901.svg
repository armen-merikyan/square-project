<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Strength and Exposure</title>
  <desc id="desc">This composition embodies the emotional tension between vulnerability and strength through a warm coral center surrounded by cooler shades. The soft amber represents the exposure, while the cold slate and blue-black provide contrast, suggesting an environment that feels both protected and invaded. The pattern combines stairs and a grid to create a structured yet fluid rhythm, symbolizing the wave-like flow of emotions. The contrast resides primarily in the center, where the warm coral juxtaposes the cooler colors, creating a visual 'spark' amidst the 'flood.' Intentionally placed broken pixels bring a sense of imperfection, enhancing the idea of vulnerability.</desc>
