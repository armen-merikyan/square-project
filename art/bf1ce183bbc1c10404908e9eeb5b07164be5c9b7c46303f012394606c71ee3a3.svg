<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This piece juxtaposes the emotional tones of 'quiet' and 'pressure' through a split composition—left four rows convey soft, subtle colors (representing quiet) while the right four rows embody denser, sharper hues (representing pressure). The palette combines muted off-white and peach with darker navy and compressed red, suggesting a gradual escalation of emotional weight from the left to the right. Centered tension occurs where the two halves clash, driving a narrative of conflict and release. The diagonal flow of both patterns creates an echo of movement between the two contrasting feelings, inviting contemplation of their relationship in a visually balanced yet dynamic arrangement.</desc>
