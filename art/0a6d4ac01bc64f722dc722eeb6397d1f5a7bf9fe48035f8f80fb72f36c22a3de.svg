<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Pulse</title>
  <desc id="desc">The emotional tone expresses the tension between longing and resolve. The palette combines soft pink and warm white to convey a sense of gentle urgency, while the dark accents of carbon black and steel gray represent the deeper struggles of damage and repair. The center is where longing dominates, embodied through jagged edges and elongated stripes that evoke a sense of reaching out or holding back. This creates a feeling of unresolved energy, with clear negative space highlighting the broken elements surrounding the core. The collision happens predominantly in the central region, where the stripes of longing intersect with the structured lines of resolution, creating visual tension. Overall, the arrangement is intentional, allowing for an abstract representation of complex emotions without literal imagery.</desc>
