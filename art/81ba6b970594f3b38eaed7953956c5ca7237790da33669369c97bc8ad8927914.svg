<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This composition encapsulates the emotional dichotomy of desire and restraint. The chosen palette, with rich reds and muted creams, evokes a saturated pulse contrasted against deeper, contained hues like blackened plum and iron gray, symbolizing restraint. The central collision occurs within the upper half, resembling a rising signal of desire constrained by the dark edges. The flame-like patterns exhibit dynamic upward movement but clash with the scar-like containment at the borders, emphasizing a tension of aspiration versus limitation. This duality dominates the piece, where bright accents struggle against muted backdrops, creating a visually arresting exploration of emotional conflict.</desc>
