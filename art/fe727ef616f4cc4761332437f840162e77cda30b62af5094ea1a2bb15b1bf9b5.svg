<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">The emotional tone contrasts the heaviness of fear represented by dark, jagged edges in the top four rows with the uplifting, hopeful patterns in the bottom four rows, conveying a journey from stress to resolution. The palette, which includes deep blacks and dark violets reflecting fear, contrasts sharply with hopeful soft golds and pale greens representing growth and positivity. This interplay creates a dynamic tension, echoing the central theme of 'inside vs outside.' The layout allows for a visual elevation, where the bottom half rises against the weight above, continuously interrupted by broken pixels that symbolize imperfection in this journey.</desc>
