<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Desire and Emptiness</title>
  <desc id="desc">This composition embodies the duality of 'emptiness' and 'desire' through the juxtaposition of warm and cool tones. The palette incorporates reds to represent desire and blacks, and pale blues to convey emptiness. The edge style is top-weighted, emphasizing gravity and pressure while maintaining some areas of negative space. The pixel arrangement evokes an emotional rhythm that shifts from dense clusters representing yearning to quiet spaces representing solitude. The broken pixels create a sense of imperfection, echoing the heart's fragmentation. Overall, this piece reflects a story of yearning against the backdrop of silence, conveying a powerful emotional tension.</desc>
