<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Control</title>
  <desc id="desc">The artwork conveys a struggle between control (depicted in darker, muted shades) and panic (expressed through bright, expressive bursts of color). The palette of deep blue, muted purple, soft yellows, and oranges reflects a juxtaposition between sorrowful weight and vibrant energy. The top rows symbolize control through a tight, dense arrangement of dark colors, resembling a machine-like rigidity. The bottom rows represent panic with an outward radial pattern that feels erratic against the structured upper half. The asymmetry and interaction between these contrasting emotions create a dynamic visual flow, emphasizing the emotional tension of the seed.</desc>
