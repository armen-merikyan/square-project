<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Emotion</title>
  <desc id="desc">This piece captures the emotional tension of relief against dread using a palette that juxtaposes soft pinks and reds with heavier grays and dark maroon hues. The bright colors symbolize fleeting moments of relief, while the darker tones represent the oppressive weight of dread. The layout presents an empty room with an off-center arrangement of colors, creating a feeling of imbalance, echoing the struggle between relief and dread. The checker pattern for relief contrasts with the crosshatch for dread, illustrating a visual collision within the confined space, enhancing the emotional depth of the work.</desc>
