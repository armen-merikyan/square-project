<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger in Restraint</title>
  <desc id="desc">This abstract piece captures the tension between desire and emptiness. The warm palette of hot coral and blood orange emerges from a foundation of charcoal and hollow blue, creating a dynamic visual conversation. The center is densely packed to represent desire, while the borders remain muted and restrained, echoing feelings of containment. The broken pixels offer deliberate disruptions, reminding us of interruptions in our chase for fullness, reflecting both the longing and the void. The layout uses stacked bands, allowing for a smooth transition from vibrant to quiet hues, emphasizing the emotional pull from saturation to emptiness.</desc>
