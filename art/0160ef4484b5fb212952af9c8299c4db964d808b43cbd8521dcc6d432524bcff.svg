<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Longing</title>
  <desc id="desc">This artwork embodies the emotional tension between longing and resolve through its contrasting colors and chaotic arrangement. The palette of moss green, bone white, rust, stone gray, and small gold was chosen to depict resilience and fragility, creating a dialogue between warmth and coolness. The maze-like patterns for longing collide with the defined channels of resolve, primarily in the central area where colors intersect, creating a sense of pressure. The long, narrow channel of negative space dividing the square reflects a quiet moment amidst the emotional chaos, emphasizing the thematic duality of containment versus overflow.</desc>
