<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotion's Edge</title>
  <desc id="desc">The emotional tone reflects the tension between envy and gratitude, utilizing a palette of muted reds and grays to emphasize this contrast. The layout surrounds the powerful center (deep maroon) with a soft gradient of pink and gray, portraying the struggle for dominance between emotions. The outer depth suggests the weight of invisible layers, while patterns of tiny dots (gratitude) collide with the sharpness of targeted clusters (envy), creating a tension-rich piece that feels both heavy and soft. This arrangement embodies the complexity of feeling, the push-pull relationship of the emotions represented in the seed, with a noticeable distribution of negative space to signify emptiness amidst pressure.</desc>
