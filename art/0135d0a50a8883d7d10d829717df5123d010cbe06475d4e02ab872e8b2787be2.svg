<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork embodies the tension between defiance and submission through a striking color palette of black, dark violet, soft gold, and pale green. The black serves as the unmoved center, symbolizing resistance, while surrounding layers of soft gold and dark violet create an overwhelming sense of enclosure. The contrast emerges predominantly in the center, where the collision of light and dark represents an ongoing struggle. The broken pixels introduce intentional disruptions, enhancing the emotional depth and imperfect beauty of this abstract narrative. Thus, the influence of the seed shapes a complex interplay of emotions, woven within the structure of the 8x8 grid.</desc>
