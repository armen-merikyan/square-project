<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Resonance</title>
  <desc id="desc">This piece captures the emotional tension between vulnerability and strength through a layered structure. The upper half uses a 'stack' pattern painted in deep navy and dim cyan, representing strength with bold, rooted colors. The lower half employs a 'grid' pattern in softer black and muted whites that contrast the density above, reflecting vulnerability. The center, where colors collide, embodies a pivotal point of tension, highlighting exposure against steadfastness, suggesting a narrative of delicate balance versus protective strength.</desc>
