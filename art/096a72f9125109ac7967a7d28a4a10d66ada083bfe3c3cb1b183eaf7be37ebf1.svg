<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Emotions</title>
  <desc id="desc">The artwork explores the emotional tension between envy and gratitude through contrasting colors and patterns. The navy and dim cyan create a cool atmosphere that hints at inner conflict, while the black adds depth and a sense of void, reflecting feelings of emptiness. The left half features a checker pattern representing envy—structured yet jagged—while the right half's noise pattern conveys the complexity of gratitude—chaotic yet rich. The broken edges introduce imperfection, emphasizing that both states are intertwined, creating a visual narrative of conflict and introspection, ultimately suggesting a balance between tension and release.</desc>
