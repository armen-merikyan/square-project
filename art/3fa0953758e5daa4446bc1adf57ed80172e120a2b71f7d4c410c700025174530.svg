<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone we aimed for was a tension between softness and severity, evoking warmth and coldness simultaneously. I chose a palette featuring powder pink and warm white for softness, contrasted against the sharp crimson and carbon black to embody severity. The main collision happens at the center where the sharp crimson interrupts the quiet field of powder pink, representing guilt and forgiveness entwined. The layout reflects a corner invasion, where the softness spreads diagonally, clashing with the severity along the edge, creating a visual pulse that suggests a rhythm of tension and release.</desc>
