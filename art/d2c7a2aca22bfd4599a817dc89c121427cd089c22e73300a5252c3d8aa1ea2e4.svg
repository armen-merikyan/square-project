<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in the Void</title>
  <desc id="desc">This piece embodies the emotional struggle between desire and emptiness, using a palette rich in saturation to express longing, contrasted against dark voids representing restraint. The warm tones of coral and orange cascade diagonally from the corner, mimicking a rising signal that quickly collides with solid charcoal edges, depicting the confrontation of yearning. Quiet pressures are illustrated by soft hints of dust pink, integrating subtle negative space while maintaining the theme of overflow versus containment. The broken pixels suggest disrupted patterns of thought, enhancing the tension without creating literal symbols.</desc>
