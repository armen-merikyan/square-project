<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure in the Halo of Safety</title>
  <desc id="desc">This abstract composition captures the emotional tension between safety and exposure. The palette features 'shelter_green' as the primary calming color, combined with 'warm_brown' to add grounding depth. The pale 'cold_white' and 'open_blue' colors create a sense of exposure in the hollow center, with a collision of patterns represented by the alternating pulse marks and stairs. The edge style of open corners reflects vulnerability, while broken pixels serve as intentional disruptions, introducing an element of unpredictability within the structure. Overall, the design embodies a slow sink into stability while evoking feelings of both protection and openness.</desc>
