<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece explores the emotional tension between panic and control through an abstract visual format. The contrast between the warm burnt orange and dark red symbolizes the chaos of panic, while the cooler charcoal represents the calm of control. The layout splits the artwork vertically, creating a distinct clash between the two emotional states. The zigzag pattern evokes a sense of turmoil and instability, suggesting a spark of conflict at the heart, while the surrounding broken-edge pixels deliver the feeling of vulnerability. The use of negative space enhances the impact of the colors, leaving voids that mirror uncertainties, embodying the dynamic interplay of control against the chaotic pull of panic.</desc>
