<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inner Tension</title>
  <desc id="desc">This artwork explores the emotional dichotomy of vulnerability and strength. The chosen palette of hot coral, blood orange, dust pink, charcoal, and hollow blue conveys both warmth and coldness, reflecting the tension between exposure and protection. The strong, dark boundaries outline a central area where lighter, fragmented colors pulse, symbolizing vulnerability battling through layers of strength—a flood encountering a spark. The asymmetric placement of colors creates a sense of flow moving inward from the corners, while intentionally broken pixels introduce imperfection, echoing the complexities of emotional reactions. The main collision occurs in the center, drawing the viewer's eye and emphasizing the struggle between conflicted emotions.</desc>
