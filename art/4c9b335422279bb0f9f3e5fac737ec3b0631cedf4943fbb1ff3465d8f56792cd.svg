<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">The emotional tone embodies the struggle between defiance and submission—a push and pull manifested through color placement. The palette of sepia, tan, dust gray, and faded blue evokes nostalgia while maintaining an air of quiet tension. Contrasts emerge in the use of heavy blocks of darker colors at the bottom to suggest weight, counterbalanced by lighter, more scattered pixels above, symbolizing hope or escape. The arrangement captures the essence of falling pixels and open vs closed spaces, where noise breaks into the relative calm of the design, suggesting interruption and unresolved motion. Each section of the square shifts from density to openness, creating a rhythm that embodies the complexity of love and betrayal.</desc>
