<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Shadows</title>
  <desc id="desc">The emotional tone of this piece captures the tension between vulnerability and strength, depicted through contrasting patterns of a dense patchwork representing strength on the bottom half, and a delicate lattice symbolizing vulnerability on the top half. The chosen palette of deep blue for stability, muted purple for reflection, bright yellows and oranges for accents, visually narrates the struggle between harsh realities and fleeting light. The central contrast appears between the saturated colors of strength below and the lighter, more airy colors above, suggesting a narrative of survival yet seeking protection while maintaining exposure. Broken pixels create intentional imperfections in the lattice, hinting at exposure and the fragility within. Overall, this work is about the balance of light and weight, safety, and the acceptance of vulnerability within strength.</desc>
