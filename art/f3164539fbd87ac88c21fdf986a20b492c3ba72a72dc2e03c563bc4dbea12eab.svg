<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition captures the emotional tension between desire and emptiness through a split vertical layout. The left side is dominated by warm, saturated colors (#FF6F61, #FF4F30, #FFC3B0), embodying desire and a pull towards fulfillment. In contrast, the right side uses cooler tones (#2B2D42, #8D99AE, #F8F9FA), suggesting a sense of emptiness and restraint. The stark borders between the sides represent blocked aspirations, creating a sense of tension and quiet pressure. Broken pixels introduce subtle imperfections, echoing the flawed nature of desires that are hard to attain. This arrangement evokes a dynamic interplay of yearning and containment, conveying a rich narrative without literal representation.</desc>
