<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Warmth and Void</title>
  <desc id="desc">This composition reflects the emotional conflict between desire and emptiness. The chosen palette of burnt orange, dark red, charcoal, and gold represents warmth and yearning (desire) against cooler, muted tones indicating absence (emptiness). The contrast is stark, with bright segments colliding with heavy, dark masses to evoke an argument where the two emotional states struggle for dominance. The layout flows from the outside inward, suggesting an external yearning pulling toward internal emptiness, while the broken edges symbolize imperfection, adding to the tension between the competing feelings. Each pixel arrangement hints at the heart's fragment, embodying the longing and solitude illustrated in the seed text.</desc>
