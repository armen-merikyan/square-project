<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Radiance</title>
  <desc id="desc">The emotional tone reflects the tension between ephemeral spark and the weight of ash. The palette contrasts deep teal and cosmic indigo (cold vs. heat) with bright star white and cold gold accents, depicting the fight between light and oppressive darkness. The structure is split horizontally; the top four rows emphasize lively patterns of sparks, while the bottom is more subdued, showcasing ashen threads. There’s an intentional collision of dynamic rings against thread-like patterns that embodies resilience and fragility, suggesting both a memory fighting against erasure and the weight of past struggles.</desc>
