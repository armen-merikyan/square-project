  <title id="title">Tension of Yearning</title>
  <desc id="desc">This square captures the emotional conflict between desire and restraint through a dynamic interplay of warm and cool colors. The chosen palette embodies heat with 'blood_orange' and 'hot_coral' contrasting against the cooler 'hollow_blue' and 'charcoal'. The strong center is marked by a cluster of vibrant hues symbolizing desire, while the edges are muted, creating a containment effect. The patterns of 'fault_line' and 'embers' visually collide in the center, where the desire patterns breach the boundary of restraint, suggesting a constant battle between yearning and limitation, reflecting the seed's themes.</desc>
