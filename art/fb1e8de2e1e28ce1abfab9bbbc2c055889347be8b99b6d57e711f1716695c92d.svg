<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Tension</title>
  <desc id="desc">The emotional tone reflects a dynamic tension between defiance and submission, captured through a palette that combines warm and cool tones. The vibrant gold represents defiance, clashing against the subdued tones of ash gray and stain brown, which signify submission. The main contrast occurs in the center with a lattice pattern of assertive colors that breaks into the softer channel patterns at the edges, visualizing the tug-of-war between resistance and compliance. The negative space remains intact to suggest a threshold that allows for quiet moments amidst the chaos, echoing the complexities of this emotional landscape.</desc>
