<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Exposure</title>
  <desc id="desc">This artwork captures the tension between vulnerability and strength through the use of contrasting color fields. The warm coral and soft amber represent the strength of presence, while cold slate and blue-black evoke a feeling of vulnerability and emptiness. The collision at the center creates a sense of unease, reflecting the fragility of the exposed center, flanked by dense blocks. The radial pattern emerges softly, interspersed with stair-like patterns that suggest layered support but are undermined by the broken pixels at the edges, symbolizing disruption and imperfection in a seemingly symmetrical foundation.</desc>
