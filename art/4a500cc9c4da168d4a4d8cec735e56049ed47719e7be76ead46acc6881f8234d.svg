<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilient Struggles</title>
  <desc id="desc">This composition embodies the tension between the bright, igniting spirit of 'spark' and the muted, quiet remnants of 'ash'. The palette combines muted bone white, moss green, and rust to reflect the resilience and fragility inherent in both concepts. The layout of falling pixels aids in expressing emotional weight, while the primary collision occurs in the central area, where brighter colors briefly interrupt the lower-density ash tones. The irregular placement of colors, with some broken pixels, creates intentional imperfection, suggesting an emotional landscape of struggle and balance, resonating with themes of hunger versus restraint.</desc>
