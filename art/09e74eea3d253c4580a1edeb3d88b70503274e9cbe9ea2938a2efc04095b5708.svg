<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This pixel composition captures the emotional dichotomy of panic and control through contrasting colors and patterns. The deep blacks represent the weight of panic, while the lighter blues and whites evoke a sense of calmness and control. The left half employs a checker pattern to symbolize order, while the right half features a chaotic arrangement of broken dots to illustrate instability. The pixel bleed edge style creates a sense of tension as the two halves interact, enhancing the theme of struggle between inner calm and chaotic surroundings. The layout splits the canvas vertically, allowing the viewer to feel the push and pull between these contrasting emotions, echoing the idea of 'outside inward'.</desc>
