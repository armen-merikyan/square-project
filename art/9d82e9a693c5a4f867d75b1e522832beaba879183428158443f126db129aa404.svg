  <title id="title">Tension Between Desire and Emptiness</title>
  <desc id="desc">This artwork conveys a dynamic emotional tension between the warm pull of desire and the cool hollowness of emptiness. The chosen palette includes 'hot coral' and 'blood orange' for warmth, expressing desire, contrasted with 'charcoal' and 'hollow blue' reflecting emptiness, creating a rich interplay. The main collision occurs in the center, where warm and cool tones interact, symbolizing the struggle between overflow and containment, enhanced by broken pixels to signify imperfections. The layout presents stacked bands to suggest shifting emotional density, while leaving spaces around them to enhance the feelings of quiet pressure and anticipation.</desc>
