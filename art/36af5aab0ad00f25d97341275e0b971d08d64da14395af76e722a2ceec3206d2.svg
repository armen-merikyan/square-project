<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone captures the tension between desire and restraint. The warm, saturated reds and oranges clash against muted creams and grays, representing the heated pull of longing reaching toward the locked edges of control. The central collision occurs at the middle of the grid, emphasizing a clash between giving in and holding back. Patterns of pulse marks (desire) and pressure bands (restraint) intertwine, creating a rhythmic yet tense composition. The broken pixels add depth, symbolizing imperfections in the struggle.</desc>
