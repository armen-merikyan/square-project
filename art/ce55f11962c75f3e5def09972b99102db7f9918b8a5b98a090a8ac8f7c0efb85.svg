<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone of this artwork contrasts defiance and submission through a layout that features two small points of color in a sea of negative space. The palette employs warm hues like hot coral and blood orange for defiance, creating tension against cooler tones of charcoal and hollow blue representing submission. The main collision is at the center where the defiant colors pulse outward, creating a dynamic push against the surrounding calm, almost mirroring a heartbeat. The design reflects a pulse of resistance meeting a backdrop of emptiness, resonating with the complexity of emotional thresholds and boundaries.</desc>
