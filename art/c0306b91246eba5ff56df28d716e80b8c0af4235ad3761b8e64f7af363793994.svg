<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Love and Betrayal</title>
  <desc id="desc">The emotional tone of this artwork represents the complex interplay between love and betrayal. The palette, consisting of pink, red, gray, and dark maroon, emphasizes warmth and danger, creating a visual tension. The main contrast arises from the juxtaposition of warm pinks against the cooler gray tones, creating conflict in the middle rows, where areas of dense color collide with spaces of quiet. Inspired by the seed's themes, the pixel arrangement suggests a diagonal shift from love’s warmth at one corner to the shadows of betrayal enveloping the piece, echoing the idea of an invasion of emotions where one side gradually overtakes the other. This piece captures both rhythmic flow and jarring interruption, reflecting the intricacies of emotional experiences.</desc>
