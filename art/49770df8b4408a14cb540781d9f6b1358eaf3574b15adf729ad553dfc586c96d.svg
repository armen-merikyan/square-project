<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Longing</title>
  <desc id="desc">This composition explores the emotional tension between emptiness and desire through a juxtaposition of warm and cool colors. The palette features deep blacks and soft golds to convey the weight of emptiness against fleeting sparks of desire represented by pale greens and dark violets. The left side maintains order through a stripe pattern, evolving into chaos on the right with a noise-like application of muted tones, suggesting a breakdown of clarity. The subtle shifts create a tension that embodies the conflict inherent in the seed, while maintaining visual balance with sufficient negative space.</desc>
