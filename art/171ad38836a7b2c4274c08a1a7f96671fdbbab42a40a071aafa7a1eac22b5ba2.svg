<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone juxtaposes the calming softness of tenderness against the explosive intensity of rage. The palette consists of deep blacks and vibrant reds, symbolizing rage, contrasted with pale blues and whites representing tenderness, creating a warm vs cool dynamic. The layout captures the essence of diagonal argument with intense reds breaking into quieter blues, where the primary collision occurs through sharp, jagged textures of rage cutting into fluid patterns of tenderness. The arrangement reflects a narrative of tension and release, echoing the duality of both emotions. Broken pixels create intentional irregularity that enhances the piece's expressiveness.</desc>
