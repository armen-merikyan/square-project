<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This artwork represents the emotional tension between quietude and pressure, where dense pixels reflect an overbearing weight. The chosen palette—off-white, dust gray, compressed red, dark navy, and faint peach—evokes a spectrum ranging from soft to intense, merging calm tones with sharp accents. The central collision occurs in the middle of the square where compressed red meets off-white stripes, creating a vivid separation. The pattern reflects the idea of a 'shattered tide,' with dense clusters giving way to softer areas, mirroring the ebb and flow of pressure and release.</desc>
