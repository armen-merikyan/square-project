<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Clarity</title>
  <desc id="desc">The emotional tone balances between confusion, represented by darker hues, and clarity, depicted through lighter colors. The palette focuses on deep navy and black to embody confusion, layered with bright dim cyan and white to symbolize clarity. The thick outer edges confine an inner frame, generating a tension where confusion meets clarity. The broken pixels scattered in the center create an impression of falling apart, enhancing the sense of conflict and unresolved emotion. The flow from bottom to top suggests a journey from confusion to clarity, yet the asymmetry and interruptions in color placement evoke a feeling of unrest.</desc>
