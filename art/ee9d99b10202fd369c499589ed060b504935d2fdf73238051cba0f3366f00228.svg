  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork explores the emotional tension between defiance and submission, using a bold contrasting color palette. The main collision occurs at the center, where vibrant colors are surrounded by more subdued tones, symbolizing an internal struggle. The use of broken pixels signifies imperfections and disruptions in the emotional narrative. The outer layer utilizes deep, dark hues to convey submission, while the center pulsates with defiance through brighter accents, embracing the idea of an unmoved core amidst external pressures.</desc>
