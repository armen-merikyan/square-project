<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonance of Tension</title>
  <desc id="desc">The emotional tone reflects a battle between defiance and submission, articulated through contrasting patterns and colors. The palette of deep navy and black provides a foundational strength, while the dim cyan introduces a sharpness that instigates conflict. The left half symbolizes defiance using a halo pattern, portraying resilience against softer threshold patterns of submission on the right. The collision occurs in the central axis, manifesting an unsettling tension where these two emotions interact, creating dynamic energies across the square. Broken pixels disrupt symmetry, adding complexity and suggesting imperfection in the struggle between opposing forces.</desc>
