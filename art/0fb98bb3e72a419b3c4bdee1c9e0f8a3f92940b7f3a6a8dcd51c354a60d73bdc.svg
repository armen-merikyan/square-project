<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Hearts</title>
  <desc id="desc">This piece encapsulates the emotional tension between desire and emptiness. The palette consists of deep navy, black, and dim cyan, symbolizing the weight of loneliness contrasted with the flickers of yearning represented by bright white accents. The layout favors a corner invasion, where dense areas filled with dark hues make the lighter colors appear as ephemeral signals of hope against the backdrop of a deeper emptiness. The use of broken pixels adds to the theme of fragmentation, interspersing the canvas with sudden interruptions that imply both desire and a longing that can never be fully fulfilled.</desc>
