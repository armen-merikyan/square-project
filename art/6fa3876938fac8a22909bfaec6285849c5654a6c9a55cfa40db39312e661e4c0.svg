<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Exposure</title>
  <desc id="desc">This composition captures the emotional tension between safety and exposure. Utilizing a palette of shelter green (#A8E1BB), warm brown (#B5947D), pale skin (#ECD5C5), cold white (#F2F4F8), and open blue (#A2C2E2), it evokes a feeling of duality. The lighter shades reflect the vulnerability of exposure, contrasted by deeper hues that suggest the firmness of safety. The central channel of negative space, cut through layered pressures, illustrates this push and pull, where the serene blue collides with the rich, grounded brown, suggesting a space of quiet amidst tension.</desc>
