<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Silence</title>
  <desc id="desc">This composition embodies the emotional duel between panic and control, visualized through contrasting colors and patterns. The predominant palette, featuring navy and dim cyan, creates a cold, lonely atmosphere, while the incorporation of black provides depth representing control amid chaos. The collision arises from dense clusters of broken pixels creating a sense of instability, echoing the theme of love betrayal. The structured chaos insinuates pressure from the edges towards the center, with empty spaces acting as a breath of calm, reinforcing the concept of an empty room. This layout captures the essence of a tumultuous emotional state, reflecting the struggle between a serene core and turbulent exterior.</desc>
