<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">The emotional tone navigates the tension between longing and resolve, reflected in the palette of moss green for growth, bone white for clarity, rust for warmth and decay, stone gray for stability, and a hint of small gold for aspiration. The main collision occurs at the center of the square, where the spark pattern of longing meets the glitch pattern of resolve, creating a dynamic interplay between the two emotional extremes. Negative space is preserved to enhance a sense of distance, symbolizing longing, while sharper pixels interrupt denser areas, providing a visual echo of resolve.</desc>
