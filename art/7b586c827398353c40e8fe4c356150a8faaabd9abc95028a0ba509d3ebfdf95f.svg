<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Presence</title>
  <desc id="desc">This artwork captures the emotional dichotomy of loneliness and connection through a contrasting color palette that emphasizes muted tones against a bright center. The faded blue embodies a sense of calm and solitude, while the sepia elements suggest warmth, creating a tension between isolation and potential closeness. The main collision occurs in the center, where muted tones surround a bright electric pixel, symbolizing the fragility of connection within a broader landscape of loneliness. The top-weighted edge style and broken pixel placements simulate an imperfect environment, reinforcing the theme of hidden versus exposed emotions, echoing the complexity of human connection.</desc>
