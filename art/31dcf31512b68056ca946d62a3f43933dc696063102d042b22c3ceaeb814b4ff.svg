<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tide of Tension</title>
  <desc id="desc">This composition explores the emotional tension between certainty and curiosity, structured to reflect an inner conflict of order against chaos. The palette, featuring stark contrasts of red and black against pale blue and white, signifies a struggle between clarity (certainty) and disruption (curiosity). The top half maintains solid bands indicative of pressure, while the bottom half is fractal and interspersed with broken dots symbolizing a quest for understanding. The contrast culminates where the top and bottom meet, creating a sense of collision and energy, capturing the essence of waves pushing against a shore, or channels of thought filled with questions. Negative space is respected, allowing some areas to breathe amidst the tension.</desc>
