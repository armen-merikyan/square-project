<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Contrast</title>
  <desc id="desc">The emotional tone navigates the tension between awe (warmth) and terror (darkness). The palette, 'ancient_fire,' emphasizes burnt orange and dark red, suggesting a primal force. The layout is largely empty, echoing the inner conflict—filled areas abruptly interrupting softer hues, symbolizing chaos crashing against ordered softness. This evokes a push-pull dynamic that captures the essence of memory and emotional fragmentation, exemplified by patterns resembling flames interspersed with frames. The interplay of colors reveals asymmetry, offering a rhythmic quality as it draws the eye inward.</desc>
