<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Quiet Tension</title>
  <desc id="desc">This composition explores the emotional duality of restlessness and peace. The palette blends warm coral and soft amber for a soothing foundation, contrasted with cold slate and blue-black representing the restless edge. The outer border, dominated by the cooler tones, creates a sense of confinement, while the inner 4x4 reflects warmth and balanced shapes, showcasing the tension between seeking peace and the chaos of memory. Here, the collision comes alive through the stark contrast of color density, hinting at unresolved feelings of movement within a static space.</desc>
