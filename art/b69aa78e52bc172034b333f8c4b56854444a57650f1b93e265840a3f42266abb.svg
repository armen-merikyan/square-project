<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone combines the yearning for fullness (desire) contrasted with the starkness of emptiness. The palette features warm hues, like hot coral and blood orange, representing desire, clashing with muted shades of charcoal and hollow blue that signify emptiness. The main collision occurs in the center with vivid lines representing desire battling against the expansive, low-saturation areas that convey containment. The pattern flows downwards like a rain of pixels, symbolizing the struggle between overflow and restraint, while intentional broken pixels introduce imperfection, echoing interruptions in our emotional landscape.</desc>
