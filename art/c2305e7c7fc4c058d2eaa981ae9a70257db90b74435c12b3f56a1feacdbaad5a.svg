<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Struggle of Spectrum</title>
  <desc id="desc">This composition navigates the emotional landscapes of panic and control, represented through a juxtaposition of dense patterns and contrasting lighter fields. The colors of deep blue and muted purple suggest a cool, contemplative state, while incisions of orange and yellow evoke fleeting moments of warmth and tension. The control emerges through orderly stripes, rising diagonally, whereas the rainlike disruptiveness of the opposite emotion spills over, creating a tension that bleeds outwards, signifying a struggle within the center of the piece. The central position experiences turmoil as colors collide, creating emotional oscillation. The arrangement acts as a dialogue of control and anxiety, where stark contrasts elucidate the interconnected dynamics of both feelings.</desc>
