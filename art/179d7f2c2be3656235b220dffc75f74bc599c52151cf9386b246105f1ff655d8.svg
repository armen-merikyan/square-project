<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Threshold</title>
  <desc id="desc">This pixel composition embodies the emotional tension between tenderness and rage. The palette consists of deep reds, calming pale blues, and stark blacks and whites, presenting a stark contrast reminiscent of emotional collisions. The 'quiet_field' pattern of soft blues symbolizes tenderness layered beneath aggressive, jagged red fragments, representing rage. The center of the square acts as a pressure point where these emotions collide, disrupted by broken pixels that create a sense of imperfection and depth, allowing the viewer to sense the emotional complexity without depicting literal objects.</desc>
