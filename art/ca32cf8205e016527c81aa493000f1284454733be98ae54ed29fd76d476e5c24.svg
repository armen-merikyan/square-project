<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Connections</title>
  <desc id="desc">This composition captures the emotional struggle between loneliness and connection. The palette is anchored by deep, dark colors, primarily in the navy and black spectrum, evoking a sense of isolation, while the single white hue represents an attempt for connection or hope. The contrast occurs at the center where darker tones collide with the lighter color, suggesting a burst of emotion in an otherwise contained environment. The flow moves diagonally, embodying a sense of invasion, as loneliness spreads from the corners while connection attempts to emerge at the center. The repetitive, flame-like patterns symbolize the flicker of connection amidst the overarching darkness. The intentional breaks in color create 'broken pixels,' maintaining an imperfection that mirrors the jagged relationships in our lives, ensuring at least 10% negative space enhances the overall sense of isolation.</desc>
