<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">The emotional tone captures a struggle between defiance and submission, expressed through a palette of red, black, pale blue, and white. The conflict is represented in a diagonal layout, where defiance in red dominates the upper left, suggesting strength and aggression, while submission in pale blue and white occupies the lower right, indicating a melancholic retreat. The colors create an echo of tension, with broken pixels creating intentional disruptions that mimic the scars of conflict. The collision manifests prominently in the center, where vibrant red clashes against the softer backgrounds, illustrating the heart of struggle. The arrangement invites the eye to navigate through calm to dense clusters, evoking a landscape of emotional battle.</desc>
