<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Desire</title>
  <desc id="desc">The emotional tone encapsulates the tension between desire and emptiness. The chosen palette, comprised of muted sepia and tan alongside faded blue, represents a warm coolness that contrasts the inner emotional struggle. This arrangement creates a zigzag flow, symbolizing the rise and fall of emotions, primarily through the top-left warm tones reflecting desire, which collide against the cooler bottom-right that signifies emptiness. The edges are given softened outlines, allowing for transitions while maintaining presence in the field of abstract color. Broken pixels in the design embody imperfections and resonate with the heart fragment motif, subtly disrupting the order to evoke a sense of incomplete longing.</desc>
