<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Echos</title>
  <desc id="desc">This piece represents the emotional tension between vulnerability and strength through a contrast of dark, deep colors and lighter accents. The palette of mourning black and deep blue underscores vulnerability, while the pale yellow signifies lightness and exposure. The main collision occurs centrally, where structured grids meet more chaotic echoes, suggesting the struggle between opposing forces. This dynamic interplay is framed by hard edges, embodying both the starkness of strength and the fragility of vulnerability.</desc>
