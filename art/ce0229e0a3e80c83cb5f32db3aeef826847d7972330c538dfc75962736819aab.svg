<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Presence</title>
  <desc id="desc">This piece captures the emotional dichotomy of defiance and submission through a swirling radial pattern juxtaposed with negative cross formations. The color palette, drawn from 'hunger_restraint', contrasts intense reds and dark plums with muted creams and grays, representing tension and moments of calm. The dominant dark colors occupy the center, creating a sense of defiance, while the lighter shades creep outwards, suggesting submission. The composition utilizes broken pixels to evoke disturbance within the calm, enhancing the narrative of internal conflict and the struggle between control and surrender. The collision occurs at the center where the radial red spirals disrupt the soft downward movement of the lighter colors, symbolizing a tumultuous emotional landscape.</desc>
