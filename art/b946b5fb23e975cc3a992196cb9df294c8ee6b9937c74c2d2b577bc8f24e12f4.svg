<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilient Asymmetry</title>
  <desc id="desc">This piece captures the emotional tension of 'spark vs ash' through the contrast of vibrant bursts of color against muted tones. The palette of moss green, bone white, rust, and stone gray signifies resilience and fragility intertwined. The layered patterns create a mirroring effect while intentionally disrupting symmetry with broken pixels to evoke a sense of struggle and memory. The main collision occurs in the center, where warmer hues intersect sharply against cooler shades, illustrating the conflict between vitality and remnants of decay. This composition invites contemplation on the balance between life and stillness, capturing the essence of both spark and ash.</desc>
