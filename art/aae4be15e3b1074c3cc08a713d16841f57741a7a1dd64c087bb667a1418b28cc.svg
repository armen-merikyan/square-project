<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork captures the emotional tension between defiance and submission through a contrasting color palette of warm rust and soft bone white against a backdrop of moss green and stone gray. The central pixels evoke an enclosed field, representing submission, while the surrounding area exhibits the flickering push of defiance, creating a layered dynamic. The structure flows from a quiet core to busy edges, embodying the theme of a protective center under pressure from surrounding negativity and echoing disturbances, reflecting a noise of both strength and fragility.</desc>
