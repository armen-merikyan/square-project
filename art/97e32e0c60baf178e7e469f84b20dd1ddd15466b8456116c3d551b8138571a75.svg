<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal and Noise</title>
  <desc id="desc">This piece captures the emotional tension between trust and suspicion through its contrasting color fields. The chosen palette of warm coral tones and cool blues reflects the dichotomy; coral represents trust, with a soft glow that offers warmth, while the charcoal and hollow blue evoke a sense of suspicion and distance. The layout employs a diagonal split, with coral channels on one side, representing trust, progressively giving way to dense radial patterns of suspicion. The main collision occurs at the center, where the two emotions overlap, creating an intense focal point amid the cooler, more chaotic surroundings. This arrangement encourages a feeling of both connection and tension, expressing the complex narratives embedded within the emotive seed.</desc>
