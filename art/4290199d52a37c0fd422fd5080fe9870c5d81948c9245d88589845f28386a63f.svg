<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow and Containment</title>
  <desc id="desc">The emotional tone contrasts rage and calm, represented by the dynamic clash between sharp reds and soft blues. The palette features red to denote intensity and black for depth, with pale blue and white providing calming fields that absorb the explosive hues. The main collision occurs at the center where the jagged pattern of rage disrupts the orderly, spaced threads of calm, creating a disruption that feels both contained and overflowing. The seed's themes of broken symmetry and emotional tension result in an abstract representation of a battle between explosive energy and serene containment.</desc>
