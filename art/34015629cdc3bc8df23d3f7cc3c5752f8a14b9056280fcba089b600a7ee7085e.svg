<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry and Disruption</title>
  <desc id="desc">This composition embodies the tension between clarity and confusion, depicted through a stark divide in colors. The left side, in shades of dark violet and black, creates a dense, imposing atmosphere reflecting confusion, while the right side transitions to soft gold and pale green, evoking clarity. The contrast between the saturated left and the luminescent right illustrates a collision of feelings. Broken pixels introduce an element of imperfection, suggesting a chaotic experience in what should be a symmetrical layout. The jagged edges applied enhance the sense of disruption in an otherwise structured space, symbolizing the jagged nature of emotional conflict.</desc>
