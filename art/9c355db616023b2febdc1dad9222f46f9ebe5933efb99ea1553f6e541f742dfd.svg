<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The artwork explores the emotional tension between panic and control, with a controlled central pattern surrounded by chaotic colors representing disorder. The palette of pinks and reds juxtaposed with dark maroon signifies love intertwined with betrayal, evoking a sense of longing yet conflict. The central hexagons reflect control, while the surrounding jagged edges symbolize the encroachment of chaos. The artwork intentionally maintains negative space to highlight the struggle between these contrasting emotional states, reflecting the series of sparks and underlying turmoil suggested by the seed.</desc>
