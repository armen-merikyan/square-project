<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Strength and Vulnerability</title>
  <desc id="desc">This artwork illustrates the tension between vulnerability and strength through a careful arrangement of colors and patterns. The palette employs cosmic indigo and cold gold to signify deep emotional contrasts, while void black and deep teal establish a backdrop of dense emotion. The central area remains the most exposed and light, indicative of vulnerability, and stark edges invoke strength and stability. The collision occurs at the center, where muted teal meets vibrant gold, symbolizing the conflict between shelter and exposure. The edges contain more solid colors, suggesting fortification. This arrangement forms a spiral pattern, compelling the viewer's eye into the heart of the piece, where strength and vulnerability truly coexist.</desc>
