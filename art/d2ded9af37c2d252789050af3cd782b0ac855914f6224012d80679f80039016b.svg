<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">This piece embodies a struggle between longing and resolve, depicted through contrasting colors and patterns. The palette of warm brown and cool blue symbolizes the tension between emotional warmth and cold logic. The inner grid feels dense and orderly, representing resolve, while the outer halo of pale skin and cold white suggests a longing, introducing space and quiet. The intentional disruptions of broken pixels evoke echoes of distance, enforcing the inner struggle without depicting any literal imagery.</desc>
