<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Dynamics of Emotion</title>
  <desc id="desc">This artwork explores the tension between panic and control through a dynamic color palette and an asymmetric arrangement. The palette, consisting of red for panic, pale blue for calmness, and black and white for depth and contrast, illustrates the emotional clash at the boundaries of the artwork. The outer ring of dark colors symbolizes control and stability, while the inner area, with the vibrant red and pale blue dashes, embodies the chaos of internal conflict. Broken pixels represent imperfection and disruption of stability, allowing for an unsettling yet compelling flow outward from the center. The main collision arises where bold reds interrupt the cooler tones, reflecting the volatile nature of love and betrayal within a quiet, empty space, echoing feelings of isolation amidst turmoil.</desc>
