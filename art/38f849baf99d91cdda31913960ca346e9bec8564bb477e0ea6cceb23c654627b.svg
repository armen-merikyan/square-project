<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork embodies the emotional tension between vulnerability and strength. The central area, filled with pale aqua, suggests exposure, while surrounding deeper hues of ink blue and alarm red symbolize a protective boundary. The patterns of pulse marks juxtapose the ember-like clarity, creating a rhythmic flow from the center outward. The sharp contrast between the soft inner colors and the dense edges enhances the theme of safety clashing with exposure. The 10% negative space invites contemplation, emphasizing the balance between open and closed feelings derived from the seed.</desc>
