  <title id="title">Shattered Horizon</title>
  <desc id="desc">This artwork explores the emotional contrast between vulnerability and strength, particularly through the lens of a horizon, where light and shadow collide. The palette of black, dark violet, soft gold, and pale green represents the tension between safety and exposure. The central area, utilizing a stacked pattern to signify strength, is disrupted by flame-like trails of lighter colors that reflect moments of vulnerability. The bottom-to-top flow suggests rising tension, while the broken pixels introduce an element of chaos and imperfection, echoing the theme of a broken mirror reflecting contrasting realities.</desc>
