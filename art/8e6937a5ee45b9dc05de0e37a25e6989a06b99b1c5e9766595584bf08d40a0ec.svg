<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Silent Conflict</title>
  <desc id="desc">The emotional tone captures a tension between the void of emptiness and the fervor of desire. The chosen palette combines deep navy and black to illustrate emptiness, punctuated by vibrant dim cyan to symbolize desire's flicker. The left side is dense with dark shades—representing solitude—while the right blooms into brighter, cooler tones, suggesting yearning. The pattern juxtaposes smoothness with sharp cracks, indicating the emotional fracture inherent in longing. The split layout reinforces the divide yet hints at their inevitable interplay, culminating in an overall visual narrative of unresolved longing and hope.</desc>
