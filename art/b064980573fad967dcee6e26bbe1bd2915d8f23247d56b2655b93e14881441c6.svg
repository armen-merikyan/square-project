<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Hinge</title>
  <desc id="desc">This artwork captures the emotional dynamic of control versus surrender, with a central clash of colors representing the overflow of emotion contained within a rigid framework. The palette, which includes warm tones like hot coral and blood orange, contrasts sharply with cooler shades of charcoal and hollow blue, symbolizing the tension between pressure and release. The center is dense, suggesting an overfilled state, while softer edges imply a surrendering softness, creating a dance of intensity around the outlined heart of the piece. The pattern mimics a radial approach in the center, surrounded by a yielding mirror-like border, representing the ebb and flow of emotional control.</desc>
