<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Rupture</title>
  <desc id="desc">This artwork explores the emotional tension between rage and tenderness. The palette, featuring deep reds and softer blues, represents the heated core of rage surrounded by the gentleness of tenderness. The main collision occurs in the center, where sharp, jagged islands of crimson break into muted blue, symbolizing the struggle between harshness and softness. The patterns intertwine to create a sense of vertical movement—elements climb and tumble against each other, reflecting the themes of ascent and collapse inspired by the seed text.</desc>
