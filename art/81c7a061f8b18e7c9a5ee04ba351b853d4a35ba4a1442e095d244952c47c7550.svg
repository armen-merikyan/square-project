<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the interplay between strength and vulnerability by using a dark, dense palette to represent strength and a softer, lighter edge to denote vulnerability. The central clash of black and navy evokes a feeling of intensity, while the softer dim cyan and white create a quiet space that suggests fragility. The main contrast occurs at the center where deep colors collide, embodying the struggle between containment and exposure in life. This layering mimics the intricacy of a braid, representing the complexity within these emotions.</desc>
