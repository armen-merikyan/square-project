<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Desire and Emptiness</title>
  <desc id="desc">The emotional tone navigates between the saturation of desire and the hollowness of emptiness. The palette combines deep 'hot coral' and 'blood orange' to represent heated desire, with muted 'charcoal' and 'hollow blue' contrasting the illusion of emptiness. The pattern alternates between a lattice of space (emptiness) and an ash field of color (desire), creating a diagonal tension from one side to the other, symbolizing the struggle of desire pushing against the borders of restraint and emptiness. Broken pixels intentionally disrupt the flow, embodying the scars of contention.</desc>
