<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This abstract piece explores the emotional dichotomy of fear and hope through the contrasting colors and their arrangement. The chosen palette of deep blacks and dark violets symbolize fear, while hints of soft gold and pale green represent hope. The layout feels corner-invading, where darker colors occupy one side, creating a pressure that gradually gives way to lighter colors, suggesting the rise of hope. This collision of dark and light maintains a balance of emotions, echoing the experiences of anxiety that can transition into optimism. The broken pixels create an imperfect, jagged edge, enhancing the tension inherent in the theme.</desc>
