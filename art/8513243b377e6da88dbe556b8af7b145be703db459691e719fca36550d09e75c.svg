<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Boundary Overflow</title>
  <desc id="desc">The emotional tone of this piece contrasts restlessness with fleeting peace. The palette chosen reflects a delicate balance between warm whites and rich darks, showcasing both the calm and the chaos. The warm whites represent breaks of peace, while stark blacks and grays evoke restlessness and unresolved motion. The main collision occurs at the center, where vibrant warm colors meet subdued cool tones, creating a dialogue between containment and overflow. The broken pixels subtly introduce imperfections, mirroring the interrupted peace amidst ongoing disturbance. The design flows in an inward spiral, emphasizing the tension between motion and stillness while respecting the negative space for reflective breath.</desc>
