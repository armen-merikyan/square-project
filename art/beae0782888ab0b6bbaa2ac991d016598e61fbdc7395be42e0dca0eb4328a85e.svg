<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This piece captures the tension between nostalgia and progress through a split-horizontal pattern. The top half features warm colors to represent optimism and growth (progress), while the bottom half uses deeper, muted tones, suggesting reflection and emotional depth (nostalgia). The jagged edges introduce a sense of disruption, highlighting conflict between the states. The contrast arises in the transition of warm to cool colors, with prominent breaks in the pattern echoing the sense of time's complexity and the weight of memories. The imperfect arrangement evokes a drip-like quality, suggesting an ongoing balance between what was and what is.</desc>
