<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Echoes</title>
  <desc id="desc">This piece captures the emotional duality of joy and grief, contrasting the warmth of bright colors against deeper, muted tones. The palette combines bright yellows and oranges with deep blues and muted purples to evoke feelings of happiness and sorrow. The left side is adorned with a structured grid of joyful colors representing joy’s energy, while the right incorporates chaos through broken pixel placements, revealing the depth of grief. The tension between an ordered left side and a fragmented right presents a visual conversation between light and shadow, life and loss, which aligns directly with the seed's exploration of emotional conflict.</desc>
