<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality in Motion</title>
  <desc id="desc">The emotional tone contrasts softness and severity, realized through a dynamic palette of muted and vivid colors. The chosen palette of powder pink and sharp crimson captures the gentle undertones of softness while contrasting sharply with the deep carbon black and steel gray of severity. The main collision occurs diagonally from the bottom left to the top right, where dots suggest a light, ephemeral quality while fault lines interrupt the rhythm, symbolizing the ongoing tension between guilt and forgiveness. Negative space enhances the rising signal layout, allowing the stark contrast to breathe within this abstract composition.</desc>
