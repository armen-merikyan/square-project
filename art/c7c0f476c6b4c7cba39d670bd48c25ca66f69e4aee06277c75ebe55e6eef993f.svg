<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Boundaries</title>
  <desc id="desc">The artwork captures the emotional tension between desire and restraint through a color palette that reflects both warmth and containment. Saturated hues of red oxide and small orange represent the yearning and vibrancy of desire, while muted cream and iron gray embody the constraint. The clash occurs diagonally, where desire extends from the bottom left towards a sealed edge of restraint at the top right, symbolizing an unfulfilled push against a boundary. Broken pixels create a sense of imperfection, emphasizing the struggle inherent in the emotional experience and adding depth to the overall tension.</desc>
