<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow of Emotion</title>
  <desc id="desc">The piece explores the tension between joy and grief, reflected in a balanced palette of warm oranges and cool deep blues. The left side features rising brightness that echoes joy and expansion, while the right side embodies the heaviness of grief through fragmented, muted purples. Interruption occurs where colors collide, emphasizing the emotional complexity. The layered patterns suggest a staircase of feelings, blending warmth and coolness in a spiral motion which connects the two contrasting states. A few broken pixels interrupt the flow, mirroring the imperfections in emotional experiences.</desc>
