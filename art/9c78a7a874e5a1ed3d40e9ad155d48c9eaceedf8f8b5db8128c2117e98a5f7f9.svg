<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Calm</title>
  <desc id="desc">The emotional tone is derived from contrasting feelings of restlessness and peace. The palette merges warm brown and shelter green to evoke a grounded, yet unsettled essence, while cold white and open blue insert tranquility. The pattern shows a division where the left side represents peace through orderly placement, represented by green and brown, while the right embraces restlessness with braids of fragmented colors suggesting motion and disruption. The focal point of collision is at the center where patterns intersect, embodying the tension between confinement and freedom, stability and chaos.</desc>
