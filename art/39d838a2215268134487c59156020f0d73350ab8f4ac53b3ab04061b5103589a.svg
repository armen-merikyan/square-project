<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tearful Balance</title>
  <desc id="desc">This piece encapsulates the emotional tension of envy and gratitude, showcasing a central pivot that embodies the dichotomy. The left side employs muted, heavier tones of sepia and dust gray, representing envy—dark, brooding, and centered. In contrast, the lighter tones of faded blue and tan on the right side symbolize gratitude and hope, rising and expanding towards the edges. The patterns applied create a visual tension where the frame-like structure intersects a staircase motif, enhancing the conflicted emotional flow 'center_outward'. Broken pixels intentionally interrupt the flow, mirroring the jagged edges of human emotion. The negative space remains vital, allowing the piece to breathe while emphasizing the emotional weight.</desc>
