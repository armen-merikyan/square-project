<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inside the Circle of Tension</title>
  <desc id="desc">This composition captures the tension between panic and control, mirrored through contrasting colors and patterns. The outer 4x4 grid utilizes sharp, jagged edges and an alternating dark and light palette to signify control, while the inner section suggests chaos through bright, dynamic strokes of color. The muted tones juxtaposed with sparks of vibrant yellow evoke feelings of isolation against a structured background, suggesting an empty room filled with emotional noise and unresolved emotions. The use of negative space enhances the feeling of emptiness, while scattered 'broken' pixels disrupt the stability, signifying imperfection and the weight of love betrayal.</desc>
