<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Stillness</title>
  <desc id="desc">This composition explores the emotional duality of pressure and quiet. The palette features muted tones like dust gray and faint peach to create a soft groundwork, contrasted with deep compressions of dark navy and compressed red, suggesting dense emotional pressure. The layout presents a collision at the center, where the 'heavy' rings of red push against the lighter constellation of peach, implying tension and resolution. Broken pixels add intentional disruptions, reflecting moments of shatter in the quiet, crafting both clarity and confusion in the overall visual narrative.</desc>
