<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This composition embodies the emotional tension between envy and gratitude, represented by a struggle between dark and light colors. The chosen palette, dominated by navy and black (symbolizing envy) and accented with white and dim cyan (representing gratitude), creates a stark contrast. The layering of stripes and frames suggests movement and duality, reflecting the zigzag and weight themes from the seed. The left-weighted edge style and diagonal growth amplify the narrative tension, with the heavier colors crowding one side to represent the urgency of envy, while lighter shades create breathing room symbolizing gratitude. Broken pixels introduce imperfection that mirrors the complexity of emotion, echoing the seed's narrative of collision and subtle release.</desc>
