<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Waves of Emotion</title>
  <desc id="desc">This composition embodies the tension between joy and grief, creating a dialogue of contrasting emotions. The warm palette derived from shades of yellow and orange represents joy, while the cooler tones of muted purple and deep blue provide an undercurrent of grief. The split-horizontal layout emphasizes this dichotomy, with vibrant colors at the top cascading into muted shades below, suggesting a flow of emotions. The central area is slightly interrupted by broken pixels, representing imperfection and complexity in navigating these feelings. The patterns evoke a sense of movement and depth, mirroring the waves of emotion that rise and fall.</desc>
