<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Opposites</title>
  <desc id="desc">This artwork encapsulates the tension between fear and hope through contrasting colors and patterns. The palette features dark hues representing fear with accents of soft gold and pale green, symbolizing hope. Fear manifests in the left side with jagged, crack-like placements while the right side displays a structured target pattern representing hope. The composition flows from bottom to top, suggesting an upward movement from fear’s heaviness to the lightness of hope. Broken pixels introduce imperfection, mirroring the unpredictability of emotions.</desc>
