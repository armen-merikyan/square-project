<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Weight</title>
  <desc id="desc">This artwork presents a visual narrative of joy and grief through contrasting colors and patterns. The palette combines bright yellows and deep blues, representing joy as a radiant spark clashing against a muted background of grief. The checker pattern captures joy's dynamic energy, while the dotted texture evokes grief's weight. The balance of these elements creates a tension that invites viewers to explore emotional complexity, with negative space allowing room for reflection and unresolved feelings. The asymmetry in color placement enhances the theme of collision and resolution within the emotional spectrum.</desc>
