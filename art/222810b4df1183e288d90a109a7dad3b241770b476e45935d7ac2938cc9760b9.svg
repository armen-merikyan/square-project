<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This piece reflects the emotional tension between restlessness and peace, using colors to create a dynamic interplay of calm and disturbance. The palette combines pale aqua for tranquility, mist gray for quietness, alarm red to punctuate areas of unrest, ink blue to represent depth, and clear white as a field of balance. The central patch-like motif symbolizes memories, while surrounding radial patterns represent motion and conflict. The main collision occurs in the center, captured by the alarm red and ink blue against the calm pastels, highlighting the struggles of finding peace amid chaos. Negative space is retained to enhance the feeling of unresolved motion and to allow the colors to breathe, creating an abstract dialogue between the two emotional states.</desc>
