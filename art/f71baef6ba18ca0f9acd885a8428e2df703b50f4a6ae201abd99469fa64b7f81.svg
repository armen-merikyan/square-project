<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone alternates between a vibrant pull of desire and the cold edges of restraint. The palette of hot coral, blood orange, and muted dust pink symbolizes warmth and yearning, juxtaposed against deep charcoal and hollow blue representing restraint and containment. The main collision occurs diagonally, where warm colors attempt to break free but are contained by dark edges, creating tension across the square. This abstract pattern depicts the struggle of desire against the limitation of restraint, translating complex emotional dynamics into a visual narrative.</desc>
