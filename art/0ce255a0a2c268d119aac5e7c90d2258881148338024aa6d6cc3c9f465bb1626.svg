  <title id="title">Tension in Balance</title>
  <desc id="desc">This composition captures the emotional dichotomy between restlessness and peace. The palette incorporates moss green and bone white to evoke tranquility, while rust and stone gray introduce tension and complexity. The main collision occurs in the center, where pulsating marks of rust interrupt the calm white, suggesting a break in serenity. Negative space emphasizes the feeling of isolation amid noise, contributing to the overall narrative of movement against stillness.</desc>
