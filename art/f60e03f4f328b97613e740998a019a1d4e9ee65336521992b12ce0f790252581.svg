<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shattering Calm</title>
  <desc id="desc">This composition captures the emotional tension between quiet and pressure. The palette combines muted hues like off-white and dust gray with bursts of compressed red, symbolizing the push and pull of the contrasts. The denser lower-left corner suggests a buildup of pressure, while the lighter colors drift towards the opposite side, echoing quiet release. The diagonal arrangement emphasizes collision and flow, creating a visual argument of stability disrupted by bursts of energy, making the piece both a shatter and a spark.</desc>
