<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos and Order</title>
  <desc id="desc">The emotional tone explores the tension between panic and control, represented by contrasting color placements. The chosen palette of burnt orange, dark red, charcoal, and gold conveys a fiery intensity and depth, suggesting urgency and grounding simultaneously. The hard edges create a stark separation between the chaotic crosshatch pattern (representing panic) and the structured spark pattern (representing control), leading to an internal conflict portrayed through abrupt color changes and placements. Negative space was carefully maintained to allow breathing room within the chaos, embodying the tension of being pulled in multiple directions while still searching for order.</desc>
