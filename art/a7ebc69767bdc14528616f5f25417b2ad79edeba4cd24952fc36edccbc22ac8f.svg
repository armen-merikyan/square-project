<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Boundaries</title>
  <desc id="desc">This artwork embodies the emotional tension between safety and exposure through color placement and pattern dynamics. The primary palette of shelter green, warm brown, and pale skin suggests a nurturing safety, contrasted by open blue and cold white that evoke exposure to external elements. The interplay of these colors, with a heavy emphasis on the green and brown, creates an enveloping sense of protection around a brighter, exposed center. The arrangement of broken pixels manifests the imperfections that arise from pressure, while the overall vertical split reinforces the duality of experiences. The rhythmic use of colors captures an echoing effect, where the warmth of the edges softly collides with the starkness of the center, encapsulating a narrative of vulnerability and resilience.</desc>
