<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece encapsulates the emotional struggle between desire and emptiness. The warm colors, such as #F05454 (hot coral) and #FF6E40 (blood orange), represent desire’s vibrant pull, while the cooler tones of #0353A4 (hollow blue) act as a counterbalance, representing the restraint and emptiness. The dense clusters of warm colors create a saturation at the center, disrupted by the cool shades that emerge from the edges, signifying the containment of overflowing emotion. Broken pixel placements introduce interruptions, mimicking the jagged edges of this emotional tug-of-war, wherein the central focus resists the border that keeps it confined. The overall flow is a subtle climb, reflecting an aspiration that continually meets boundaries, creating a tension that invites reflection and engagement.</desc>
