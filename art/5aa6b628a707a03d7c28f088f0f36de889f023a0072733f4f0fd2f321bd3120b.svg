<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Calm</title>
  <desc id="desc">The piece embodies a tension between restlessness and peace, using a range of colors to symbolize emotional states. The juxtaposition of dark shades with lighter hues creates a contrast that reflects the struggle between chaos and serenity. The chosen palette of deep reds and soft blues captures the essence of dynamic movement against a backdrop of calmness. The diagonal layout not only guides the viewer's eye but also emphasizes the conflict, with darker colors occupying the edges to suggest boundary and confinement, while lighter colors seep in from the center, gradually offering a sense of calmness amid the tension. This exploration of sensory collision forms a layered rhythm, illustrating how opposing emotions can coexist within a confined space.</desc>
