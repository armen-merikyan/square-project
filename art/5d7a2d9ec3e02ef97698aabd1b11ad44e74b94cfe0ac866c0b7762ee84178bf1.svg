<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">This piece embodies the emotional tension between envy and gratitude, with warm versus cool colors creating a dynamic interplay. The palette of yellow and muted purple reflects the warmth of gratitude against the coldness of envy. The mirrored layout presents a subtle discord, where slight variations introduce an element of imperfection, while the zigzag flow emphasizes the wavering between emotions. The contrast lies in the center-heavy design, with denser colors juxtaposed against lighter negative space, mirroring the feeling of weight carried by envy, yet leading to a sense of lightness through gratitude.</desc>
