<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone navigates between safety and exposure, creating a juxtaposition where light and shadow interact. The palette of warm browns and cool whites embodies this dynamic, with ‘shelter_green’ and ‘open_blue’ providing accents that encourage a subtle rhythm. The central collision occurs in the middle of the square, invoking a crossing of ‘noise’ and ‘ripple’ patterns: dense texture on one side gives way to softer, more fluid marks on the other. This duality of shape and space mirrors the tension of protective shelter against the vulnerability of exposure, culminating in an abstract composition that resists direct interpretation.</desc>
