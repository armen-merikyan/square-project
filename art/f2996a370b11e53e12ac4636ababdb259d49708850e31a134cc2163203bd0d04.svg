<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition reflects the emotional tension between desire and restraint through a palette of deep reds, muted creams, and dark plums. The use of broken dots for desire creates a sense of urgency and vitality, while the dot pattern represents the restraint, signifying containment. The layout features a sealed border with strategic breaks, allowing color to spill into the negative space, influencing the feeling of restriction versus release. The primary clash occurs centrally, where the vibrant reds and oranges of desire disrupt the muted sections of restraint, capturing the struggle and beauty of this emotional dichotomy.</desc>
