<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressured Duality</title>
  <desc id="desc">The emotional tone represents the tension between fear and hope, highlighted through contrasting dark and light colors. The palette of black, dark violet, soft gold, and pale green emphasizes this dynamic—dark colors signify fear, while gold and green suggest glimmering hope. The contrast is most striking in the burst of soft gold that breaks through the darker background, reflecting a shift from pressure to lightness. The split layout creates a diagonal flow, with colors transitioning from deep shadows into lighter tones, embodying the complex interplay of emotional states inherent in the seed concepts.</desc>
