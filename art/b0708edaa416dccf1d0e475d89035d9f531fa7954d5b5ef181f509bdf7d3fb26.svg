<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Broken Symmetries</title>
  <desc id="desc">The emotional tone shifts between love and betrayal, manifesting through contrasting colors. The warm tones of pink and red indicate love, while the darker grays and dark maroon illustrate the betrayal aspect, emphasizing a feeling of tension. The arrangement reflects a diagonal rise, with cooler colors spilling in from the edges to break the symmetry. This creates a narrative of disruption, where one side feels warm yet chaotic, while the opposite side reflects a cool detachment. The inclusion of 'burned edges' is captured through sharp contrasts and misaligned color blocks, symbolizing emotional fractures. The composition maintains a 10% negative space, emphasizing isolation and the emptiness often felt in such emotional narratives.</desc>
