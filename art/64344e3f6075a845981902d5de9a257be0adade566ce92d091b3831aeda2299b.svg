<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inward Spiral of Tension</title>
  <desc id="desc">This artwork reflects the emotional dichotomy of defiance and submission through a carefully selected palette of soft and stark contrasts. The dominant color, carbon black, symbolizes defiance, creating a strong center from which other colors spiral outward, representing submission. The warm whites and sharp crimson serve as vibrant sparks against the dense black background, creating moments of tension as they interrupt the calm. The pattern is anchored by an inward spiral that symbolizes struggle and resolution, with broken pixels introducing intentional imperfections that suggest the chaotic nature of this emotional landscape.</desc>
