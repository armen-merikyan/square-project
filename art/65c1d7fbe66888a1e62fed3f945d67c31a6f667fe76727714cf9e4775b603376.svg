<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Longing</title>
  <desc id="desc">The emotional tone speaks to a struggle between longing and resolve, depicted through the contrasting use of colors and patterns. The palette draws from the warmth of hot coral and blood orange, representing urgency and desire, alongside the calmness of hollow blue and charcoal, evoking deep contemplation. The broken pixel style suggests imperfection and repair within the layout's hollow center, which forms a sense of depth and distance. The main collision occurs in the center where vibrant dots disrupt the steady frame, amplifying the tension between aspiration and containment. The overall effect aims to create a swirling sense of echo, where unresolved feelings pulse against a solid structure.</desc>
