<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This composition explores the emotional duality of joy and grief. The outer layers are vibrant yellows and oranges representing joy, creating an impression of brightness and expansion. The inner core features deep blues and muted purples, embodying grief with a split screen pattern emphasizing contrast. The juxtaposition between the joyful outer checker pattern and the grief-infused split screen in the center encapsulates an emotional collision, echoing the feelings of disruption and harmony derived from the seed. Negative space enriches the artwork, allowing it to breathe and highlighting the tension between density and emptiness.</desc>
