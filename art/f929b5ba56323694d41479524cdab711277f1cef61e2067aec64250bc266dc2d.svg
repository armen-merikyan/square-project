<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Balance</title>
  <desc id="desc">The emotional tone of vulnerability vs strength is captured through contrasting saturated colors (like hot magenta and signal green) against muted tones (like static gray and dead black). This palette evokes the tension between lightness and weight, with the exposed center representing vulnerability under a thick edge of strength that frames it. The main collision happens in the center, where the vibrant colors interact dynamically within the subdued background, creating a pulse of energy that suggests both conflict and connection. This interplay reflects the complexities in the seed, turning the abstract qualities of 'safety' and 'exposure' into a visual confrontation.</desc>
