<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Boundaries</title>
  <desc id="desc">This piece captures the emotional tension between desire and restraint through the juxtaposition of warm, saturated colors against a muted background. The palette includes intense hues like hot coral and blood orange to convey the warmth of desire, while charcoal adds a sense of restraint. The main contrast occurs in the center, where warm colors are densely clustered, creating a dynamic focal point that embodies longing. The layout reflects a boundary of dark colors attempting to contain the vibrant inner chaos, representing a struggle between the desire to break free and the constraints imposed by societal expectations. The broken pixels add intentional disruptions that symbolize imperfections in emotional experiences and the ways in which our desires often clash with reality.</desc>
