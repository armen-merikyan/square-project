<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Transitional Thresholds</title>
  <desc id="desc">This artwork captures the struggle between vulnerability and strength as well as the interplay of light and weight. The palette features shelter green, warm brown, pale skin, cold white, and open blue, invoking a sense of safety intertwined with exposure. The center, representing strength, is marked by darker, denser colors, while the edges, symbolizing vulnerability, employ lighter tones with intentional broken pixels to disrupt the flow, creating a visual tension. The primary collision occurs in the center where thick, warm colors blend into the thin, pale surroundings, representing the confrontation of opposing emotions and the precarious balance between safety and exposure.</desc>
