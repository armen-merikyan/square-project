<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">The emotional tone of this artwork seeks to balance the transformative qualities of spark and ash—one representing vibrant life and sudden bursts, while the other signifies quiet decay and the remnants of fire. The chosen palette of shelter green, warm brown, pale skin, cold white, and open blue evokes contrasts between warmth and coolness, mirroring the conflict between hunger and restraint. The main contrast in this piece occurs in the middle, where dense clusters of warm browns and greens suddenly break into cooler, airy whites and blues, creating an interruption that draws the eye. The 'teeth' pattern for 'spark' creates jagged edges, suggesting life's sudden flashes, while the 'flood' pattern for 'ash' creates a softer, more enveloping transition, embodying erosion and memory. This intentional collision serves to reflect resilience amidst fragility, as the space dims towards the edges, allowing for breathing room that captures a balance of chaos and serenity.</desc>
