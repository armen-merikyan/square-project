<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Worlds</title>
  <desc id="desc">The emotional tone explores the duality of safety versus exposure, where soft greens and warm browns represent the comforting embrace of safety while pale skin and open blue suggest vulnerability and exposure. The central collision occurs at the center of the pattern, where the dense, maze-like structure of the safety palette battles with the ladder-like open spaces of exposure, creating a visual tension that reflects the seed's themes. Broken pixels in the corners symbolize imperfections in this interplay between protection and exposure. Negative space allows for moments of contemplation and highlights the overall emotional narrative.</desc>
