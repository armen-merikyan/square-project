<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Tension</title>
  <desc id="desc">The composition embodies an emotional trajectory between defiance and submission. The palette evokes a sense of hunger and restraint, with deep reds signifying intensity and muted creams providing a softer, quieter contrast. The main collision occurs in the center where dense static patterns of defiance collide with the softer stair-like submissions around the edges, suggesting an inward spiral of emotion struggling against outer forces. The overall flow is slow, resembling falling pixels, while the broken pixel placements introduce intentional imperfections, reinforcing the theme of conflict and resolution.</desc>
