<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone centers on the tension between vulnerability and protection, represented by a juxtaposition of warm browns and greens against cooler whites and blues. The palette blends soft tones conveying safety while using sharper accents to depict exposure. The main collision occurs centrally, where patches of safety are interrupted by dotted patterns reflecting exposure, symbolizing how one can either benefit from or suffer under the weight of surroundings. This visual tension mirrors the seed's thematic duality, evoking a sense of dynamic interplay between confinement and freedom.</desc>
