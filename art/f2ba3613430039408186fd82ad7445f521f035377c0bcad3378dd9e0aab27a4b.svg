<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The artwork explores the tension between the explosive energy of rage and the tranquil essence of calmness. The palette primarily uses bold reds to signify the intensity of rage, contrasted against soft pale blues and whites representing calm. The corner features a dense cluster of bright reds, symbolizing an overflow of emotion, while cooler tones recede, creating a quiet field. The arrangement simulates a zigzag pattern that disrupts the calm, demonstrating collision and reaction between these states. The use of broken pixels adds further depth, suggesting the wear of these emotional battles.</desc>
