<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Shelter</title>
  <desc id="desc">The emotional tone expresses a balance between safety and exposure, portraying a protective enclosure with a gentle embrace of light. The palette, featuring earthy greens, warm browns, and pale blues, embodies safety while the cold white intersperses a feeling of stark exposure. The main contrast occurs where the warm tones collide with the cool ones, particularly at the center, creating tension against the defined edges. The pattern blends the 'broken_frame' of safety with the 'grid' of exposure, resulting in a dynamic interplay that suggests movement and conflict.</desc>
