<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">The emotional tone reflects the struggle between defiance and submission. The palette of black, dark violet, soft gold, and pale green creates a contrast between the heavy, absorbing tones (defiance) and lighter, hopeful accents (submission). The upper half of the grid showcases a chaotic rain pattern in darker shades, suggesting pressure and defiance, while the lower half reveals a structured grid in softer colors indicating submission and containment. This juxtaposition creates a visual echo of conflict and resolution, balanced by the density of the top rows against the openness of the bottom rows.</desc>
