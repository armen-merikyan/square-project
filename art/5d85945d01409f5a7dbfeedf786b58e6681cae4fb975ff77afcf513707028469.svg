<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Symmetry and Chaos</title>
  <desc id="desc">This piece explores the emotional tension between clarity and confusion through contrasting colors and patterns. The palette of black, dark violet, soft gold, and pale green evokes feelings of fear and hope, bridging the spectrum of clarity with murky confusion. The top half uses a mirrored pattern to symbolize clarity, but is interrupted by broken pixels that introduce elements of chaos, while the bottom half employs a flame-like chaotic design, offering visual tensions against the structured top. This arrangement demonstrates a pulsing rhythm of clarity breaking into confusion, emphasizing collision through neon colors caught against darker backgrounds.</desc>
