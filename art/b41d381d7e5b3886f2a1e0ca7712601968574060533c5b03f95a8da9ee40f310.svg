<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Calm and Fury</title>
  <desc id="desc">This composition captures the emotional struggle between rage and calm, using a palette of red, pale blue, black, and white to convey tension. The left side exhibits sharp diagonal patterns of aggressive reds, while the right evokes calmness through soft, horizontal bands of pale blue. The stark contrast between the saturated color of the rage and the soft hues of calm represents the collision of emotions. Broken pixels are introduced sparingly, creating a jagged rhythm that enhances the sense of disturbance. Overall, the piece illustrates the constant push and pull between these opposing emotions, culminating in a visually dynamic experience.</desc>
