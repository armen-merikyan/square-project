<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This piece embodies a tension between desire and emptiness. The warm tones of hot coral and blood orange represent the overpowering sensation of desire, while the muted presence of charcoal and hollow blue signal the hollowness of restraint. The layout reflects an argument grid, where rippling patterns of warmth chaotically encounter quiet fields of coolness, creating a dynamic friction across the canvas. There’s a noticeable contrast at the center, focusing emotional energy that suggests an intense struggle within the constraints. Broken pixels introduce imperfections that further enhance the narrative of disruption and containment.</desc>
