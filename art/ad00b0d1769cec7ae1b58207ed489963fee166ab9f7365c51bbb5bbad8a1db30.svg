<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interference Pulse</title>
  <desc id="desc">This piece captures the tension between the clear pulse of signal and chaotic noise. The color palette of navy, black, and dim cyan contrasts the smoothness of quieter areas against the static disruption. The strong, dark edges represent the barriers of structured thought, while broken dots reproduce the sense of a fragmented signal trying to slice through scattered noise, responsible for the sense of a battle against chaos. The central collision of darker hues draws the eye, creating a chaotic but engaging composition.</desc>
