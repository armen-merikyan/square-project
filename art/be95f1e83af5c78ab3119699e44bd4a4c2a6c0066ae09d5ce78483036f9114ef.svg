<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal in the Static</title>
  <desc id="desc">This composition encapsulates the emotional tension between control and surrender. The palette presents a stark contrast with deep blacks symbolizing control and lighter shades representing surrender, creating a dialogue between presence and absence. The central pixel cluster conveys a sense of overflow amidst muted noise, illustrating a struggle where control thickens the outline yet yields to the infiltrative whispers of surrender around it. The pattern alternates between structured containment and softer echoes, where the broken pixels disrupt the smoothness, indicating flaws in both control and surrender—providing the piece with dynamic tension.</desc>
