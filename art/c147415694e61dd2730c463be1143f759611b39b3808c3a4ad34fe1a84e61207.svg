<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Balance</title>
  <desc id="desc">This piece conveys the tension between vulnerability and strength through contrasting colors and areas of density. The palette of sepia, tan, dust gray, and faded blue evokes a sense of nostalgia and fragility, reflecting the emotional undertone of 'broken memory.' The main collision occurs at the center with a bright cluster of color surrounded by darker tones, visually representing the struggle between safety (vulnerability) and exposure (strength). The pattern mimics a heart fragment while maintaining an abstract feel, ensuring clarity even in its emotional complexity.</desc>
