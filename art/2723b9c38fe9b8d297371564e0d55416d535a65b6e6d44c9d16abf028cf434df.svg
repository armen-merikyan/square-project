<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Hunger and Restraint</title>
  <desc id="desc">This composition illustrates the emotional contrast between desire and emptiness through a visual balance of saturation and space. The chosen palette of hot coral and blood orange represents warmth and yearning, while the charcoal and hollow blue suggest a cold, spacious void. The central pattern embodies pulsing desire, surrounded by the restrictive borders of empty space. The collision occurs predominantly in the center, where the vibrant marks disrupt the quiet expanses, creating a dynamic tension that resonates with the concept of hunger against restraint.</desc>
