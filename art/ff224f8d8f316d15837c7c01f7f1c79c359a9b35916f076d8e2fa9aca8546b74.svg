<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Doubt</title>
  <desc id="desc">This composition explores the emotional tension between trust and suspicion, using a palette of dark navy and black to represent suspicion, contrasted with soft dim cyan to depict trust. The center is dense and chaotic, embodying suspicion with a textured noise pattern, while the outer edges are smoother, representing trust and resilience. The broken pixels create intentional disruptions, echoing moments of fragility amidst strength. The diagonal flow suggests a dynamic push-pull between these states, creating a haunting sense of tension that feels both vulnerable and hopeful.</desc>
