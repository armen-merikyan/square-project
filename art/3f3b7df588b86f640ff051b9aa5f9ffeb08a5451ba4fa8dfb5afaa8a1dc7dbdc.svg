<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Change</title>
  <desc id="desc">This artwork expresses the emotional dichotomy between nostalgia and progress. The palette of burnt orange, dark red, charcoal, and gold symbolizes warmth and memory against the cold precision of advancement. The outer border creates a contrast of hollowness with deeper tones, representing nostalgia's weight and framing the brighter inner section, suggesting progress. Broken pixels throughout disrupt the routine, adding imperfection and resonance, reflecting the emotional tension of a world in flux. The split screen pattern and dense clusters challenge the viewer to find balance amid the chaos of change.</desc>
