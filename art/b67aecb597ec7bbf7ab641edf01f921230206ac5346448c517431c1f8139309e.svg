<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory vs Motion</title>
  <desc id="desc">This composition explores the emotional tension between the concepts of 'spark' (sudden brightness) and 'ash' (settled dust), using a palette that reflects mourning renewal. The outer border, filled with deeper tones of mourning black and stone, evokes a feeling of fragility, while the inner core pulses with pale yellow and new leaf, symbolizing resilience and quiet renewal. The main contrast occurs at the center, where jagged edges visually collide with softer shapes, creating a dynamic tension as spark and ash interact. The pattern of stripes provides a structured rhythm, interrupted by patches of solid fields, embodying the push and pull of memory against erasure. By maintaining negative space, the artwork also invites contemplation, allowing the viewer to engage with the emotional journey represented.</desc>
