<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Conflict</title>
  <desc id="desc">This piece explores the emotional tension between love and betrayal through contrasting colors: warm reds and soft pinks represent love, while dark grays and maroons symbolize betrayal. The layout of battling patterns, with flame-like warmth on one side and a maze of despair on the other, illustrates a conflict. Sharp edges create a sense of fracture, while broken pixels introduce imperfection, embodying the complexities of relationships. The chosen colors and patterns evoke feelings of either warmth or cold detachment, revealing an unresolved dialogue.</desc>
