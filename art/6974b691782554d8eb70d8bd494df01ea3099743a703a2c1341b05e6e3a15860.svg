<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Hearts</title>
  <desc id="desc">This artwork reflects the emotional tension between love and betrayal, using warm pinks and reds on one side to symbolize love, contrasted with darker grays and maroons representing betrayal. The left 4 columns are filled with a subtle striped pattern, embodying love's warmth and connection, while the right 4 columns feature a more chaotic grid pattern, reflecting the disrupted nature of betrayal. The main collision occurs at the center line where warm colors meet cold, echoing the theme of split sentiments. Imperfections in pixel placement enhance the feel of broken symmetry, representing fractured relationships. Negative space is strategically maintained to evoke a sense of loss and emptiness amidst the conflicting emotions.</desc>
