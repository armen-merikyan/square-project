<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Presence</title>
  <desc id="desc">The emotional tone of this piece contrasts calm and explosive energy, represented by a palette of deep blacks and vibrant reds against cool pale blues and soft whites. The composition uses 'open_gate' layout, leaving space for an influx of 'rage' represented by jagged red patterns which disrupt the 'calm' horizontal threads of pale blue. The main collision occurs centrally, where the hot red of 'rage' invades the serene blue, reflecting the tension between chaos and stillness. The layout, flow, and color choices embody the seed concepts, creating a dynamic interplay of contained energy against flowing calmness.</desc>
