<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">The emotional tone explores the tension between defiance and submission through contrasting colors and patterns. The chosen palette of black and electric blue symbolizes the depth of submission against the vibrancy of defiance, while magenta introduces a sense of emotional disturbance. The layout is divided vertically to emphasize the split between these emotions, presenting light elements on the left side and heavier tones on the right. The introduction of broken pixels adds a layer of imperfection, symbolizing the unresolved nature of these conflicting feelings. The arrangement creates a visual tension that captures the dynamics of love and betrayal, echoing a narrative of falling apart while attempting to hold together.</desc>
