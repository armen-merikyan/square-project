<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece embodies the emotional tension between defiance and submission, creating a visual argument within the 8x8 space. The palette of muted cream for softness juxtaposed against the strong red oxide represents the peaks of struggle against a backdrop of retreat. The pattern type of islands symbolizes defiance—chunks of resistance—while broken dots illustrate submission as they dissolve into the corners. The primary collision occurs along a diagonal, where intense color blocks meet softer tones, suggesting a dynamic interplay between opposing forces. Negative space is intentionally included, allowing for breath and reflection amid conflict, while broken pixels introduce imperfections that symbolize the scars of this struggle.</desc>
