<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Trust</title>
  <desc id="desc">The emotional tone oscillates between trust and suspicion, encapsulating the struggle of understanding one's environment. The palette of guilt and forgiveness—rooted in warm ivory and deep wine—reflects a soft tension that combines both warmth and shadow. The layout, inspired by a spiral pressure, orchestrates a flow towards the center where the contrasting colors collide, creating a dynamic visual conflict. As broken pixels disrupt the pattern, they embody the fractures in trust. The piece captures the unresolved motion of relationships, where light and dark coexist yet repeatedly disrupt one another.</desc>
