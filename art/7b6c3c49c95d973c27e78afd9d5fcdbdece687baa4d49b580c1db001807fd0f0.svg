<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Shadows</title>
  <desc id="desc">The emotional tone of 'defiance versus submission' plays out in the grid with the left side reflecting defiance through static patterns, utilizing darker colors representing resistance and assertiveness. Conversely, the right side, embodying submission, features lighter, more layered colors suggesting a softening and receding contrast, symbolizing surrender. The collision between the two emotional states occurs vertically, with a distinct separation that evokes a tension surrounding the central axis. The palette of melancholic colors instills a sense of reflective contemplation, where muted tones clash with quiet whispers of brightness, showcasing the push-pull narrative described by the seed.</desc>
