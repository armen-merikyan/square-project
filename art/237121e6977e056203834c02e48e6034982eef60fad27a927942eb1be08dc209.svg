<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects the push-pull dynamic between vulnerability and strength through contrasting colors. The palette combines soft tones of off-white and faint peach, signaling vulnerability, against deeper, compressed reds and dark navy hues symbolizing strength. The main contrast occurs in the central row where pale colors interrupt more saturated tones, creating a visual echo that embodies a fragile defense against the overwhelming pressure of the surrounding hues. The layout features stacked bands, suggesting a shift in density and emotional temperature, while intentional broken pixels introduce disruption, mirroring the complexities of the emotional state defined by the seed.</desc>
