<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall of Emotion</title>
  <desc id="desc">This piece explores the duality of joy and grief through an asymmetric, split layout that embodies both tension and balance. The palette of yellow and orange represents joy's brightness and warmth, while subtle blues and muted purples express the heaviness of grief. The left side pulsates with target-like patterns, invoking joy's spark, while the right side features ring-like patterns to convey the fragmented essence of grief. The contrast between the dynamic left and the heavier right creates a visual collision, capturing the essence of emotional conflict. Broken pixels interrupt on both sides, adding a sense of imperfection and complexity against the structured grid, evoking a sense of love and betrayal that underpins the emotional narrative.</desc>
