<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">This artwork captures the emotional tension between vulnerability and strength. The palette features muted tones of dust gray and faint peach representing vulnerability, contrasted against the robust dark navy and compressed red indicative of strength. The arrangement—dots symbolizing strength in the periphery and a ladder-like pattern in the center—creates a dynamic collision at the edges, suggesting an interplay of pressure and calm. The central void acts as a metaphorical 'hollow center', embodying both emptiness and the need for protection, which flows into the outer layers, ultimately illustrating a complex emotional landscape of stability juxtaposed with fragility.</desc>
