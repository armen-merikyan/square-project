  <title id="title">Signal vs Noise</title>
  <desc id="desc">This artwork embodies the tension between calm and chaos, using a palette of soft, warm hues mixed with cool shadows to symbolize peace and restlessness, respectively. The main contrast appears along the diagonal, where a quiet lattice pattern intersects with more chaotic stacked blocks, representing the collision of memory and motion. Strategic broken pixels create intentional disruptions that resonate with the theme of static amidst clarity, reinforcing the emotional narrative of unresolved movement and the search for stability.</desc>
