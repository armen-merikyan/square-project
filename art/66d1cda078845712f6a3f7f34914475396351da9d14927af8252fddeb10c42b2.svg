<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience and Fragility</title>
  <desc id="desc">The emotional tone reflects a struggle between resistance and surrender, with the moss green symbolizing defiance and the bone white representing submission. A center dominated by moss green creates a feeling of strength against an encircling chaos of rust and stone gray, highlighting the tension of defiance and the quiet acceptance of one's surroundings. The abrupt presence of small gold marks suggests moments of hope amidst imperfections, with broken pixels woven throughout as disruptions that embody unresolved emotions. The layout maintains negative space to evoke the emptiness of submission, allowing the viewer to sense the weight of both chaos and order.</desc>
