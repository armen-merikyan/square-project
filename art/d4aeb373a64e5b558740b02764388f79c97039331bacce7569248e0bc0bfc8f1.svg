<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Tension</title>
  <desc id="desc">This composition embodies the emotional duality of defiance and submission through stark contrasts. The chosen palette reflects mourning and renewal—deep blacks and blues symbolize the weight of submission, while the pale yellow and new leaf green suggest the persistence of defiance and growth. The collision occurs diagonally, with bold stripes breaking through softer fields, illustrating the tension between order and chaos. The 'broken_line' shape reinforces this theme, suggesting a fracture that simultaneously maintains its structure while inviting chaos. The negative space on the edges serves to balance the dense center, allowing for a slow sink into the underlying emotions.</desc>
