<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This artwork embodies the emotional collision between pride and shame through a split horizontal layout. The top half, representing 'pride', uses a pattern of warm burnt orange and gold that radiate vibrancy and confidence, while the bottom half, embodying 'shame', employs a grid of dark red and charcoal tones that evoke weightiness and introspection. The contrasting colors create a visual tension, as the warmth from the top struggles against the heaviness of the bottom, embodying the push-pull of conflicting emotions. Broken pixels disrupt the patterns, symbolizing the imperfections inherent in our emotional experiences. This dynamic setup captures the essence of pressure and release, echoing the complexity of human feelings.</desc>
