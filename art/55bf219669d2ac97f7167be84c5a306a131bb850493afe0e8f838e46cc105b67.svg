<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Wedges of Emotion</title>
  <desc id="desc">This composition embodies the emotional tension between longing and resolve. The palette combines sepia and faded blue to express warmth and distance, while dust gray adds a quiet contemplative space. The diagonal layout creates a strong dynamic, with longing occupying the lower left through a split screen pattern, emphasizing its wide quiet field and an echo of distant memory. Resolve, on the upper right, uses a maze pattern that interrupts the longings flowing through the middle, suggesting struggle against inner chaos. Broken pixels introduce imperfections, reinforcing the theme of collision within structured yet fragile emotional frameworks.</desc>
