<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragile Strength</title>
  <desc id="desc">The emotional tone reflects the coexistence of vulnerability and strength. The palette of moss green, bone white, rust, stone gray, and small gold embodies resilience against fragility, highlighting contrasts between soft and hard edges. The main collision occurs in the center, where a dense pattern of ripples (vulnerability) interrupts a backdrop of fault lines (strength), creating a visual dialogue. The quiet channel layout emphasizes negative space, inviting contemplation and discomfort as the patterns collide, embodying the essence of the seed.</desc>
