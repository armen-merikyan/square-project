<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Conflict</title>
  <desc id="desc">This artwork captures the emotional tension between defiance and submission through a stark contrast of color and pattern. The palette features sepia tones and muted shades, evoking a sense of broken memory. The central interaction reflects a pulsating conflict between two opposing forces. The broken pixels symbolize disruptions in this emotional landscape. The arrangement creates quiet spaces of tan and faded blue, counteracting the dense clusters of ash-gray, suggesting both pressure and release. The piece resonates with the inward spirals and corner invasions of the seed, creating an abstract representation of the themes of noise versus signal.</desc>
