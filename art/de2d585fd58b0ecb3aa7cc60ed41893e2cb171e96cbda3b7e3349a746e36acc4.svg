<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This piece explores the complex emotional contrast of relief and dread through a carefully chosen palette that evokes lightness and heaviness. The palette, which includes soft mint and storm gray, reflects the tension between bright, spacious feelings (relief) and dark, heavy sensations (dread). The main collision occurs in the center, where the chaotic patterns of 'broken_frame' interrupt the soothing flow of the 'maze', reflecting an ongoing internal struggle. This dynamic use of color placement, with intentional broken pixels that disrupt continuity, also enhances the piece's emotional weight, making the viewer contemplate the balance between order and chaos.</desc>
