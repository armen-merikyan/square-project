<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tensions</title>
  <desc id="desc">The emotional tone captures the struggle between defiance (expressed through bright coral and blood orange accents) and submission (seen in the softer pinks and dark charcoal). The palette evokes a sense of desire intertwined with emptiness. The central collision, where the vibrant colors clash with muted tones, forms a visual tension that resonates with the themes of signal vs. noise and inward spirals. The layout mirrors on either side but is disrupted by broken pixels, embodying the idea of a door being both an entry and a barrier, provoking thought without literal depiction.</desc>
