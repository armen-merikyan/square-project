<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory in Motion</title>
  <desc id="desc">This artwork explores the tension between softness and severity. The palette consists of powder pink and warm white to convey gentleness, juxtaposed with carbon black and sharp crimson for severity. The center is saturated with dark colors, suggesting weight and gravity, while the lighter tones at the edges create a contrast of openness. The collision occurs in the center, where these emotions meet, creating a dynamic interplay. The abstract pattern reflects the idea of memory, with dark shapes representing the weight of guilt and the soft colors suggesting forgiveness and the potential for release.</desc>
