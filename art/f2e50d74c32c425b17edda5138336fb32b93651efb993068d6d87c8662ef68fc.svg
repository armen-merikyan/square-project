<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Meets Restraint</title>
  <desc id="desc">The emotional tone of this artwork balances the deep yearning of desire with the starkness of emptiness. The palette of hot coral and blood orange represents the warmth of desire and the spark of rising signals, while charcoal and hollow blue convey the weight of containment and quiet pressure. The main collision occurs in the center, where warm colors radiate outward in a radial pattern, colliding with the cooler halo-like edges that suggest an absence or emptiness. The diagonal layout emphasizes the tension between the two emotions, with desire dominating the central area while emptiness takes shape around the edges, creating an impactful juxtaposition.</desc>
