<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Dualities</title>
  <desc id="desc">This composition channels the emotional interplay between love and betrayal through a palette of warm pinks contrasting with deep maroons and grays. The layout mimics an empty room, capturing a sense of isolation disrupted by sharp color transitions that signify conflict. The asymmetrical arrangement alludes to broken symmetry, embodying both hope and despair; the flowing diagonal rise suggests a tension that rises through the piece, indicating a struggle between warmth and coolness. The introduction of broken pixels adds an element of imperfection, echoing the underlying theme of betrayal. The colors challenge the viewer to navigate the emotional circuit of warmth (love) versus harshness (betrayal).</desc>
