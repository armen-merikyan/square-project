<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Between Borders</title>
  <desc id="desc">This artwork captures the tension between defiance and submission, represented through contrasting colors and patterns. The top four rows, embodying defiance, use bright, angular marks with electric blue and hot magenta to create a sense of pressure. The bottom four rows reflect submission with muted tones and 'hinge' patterns that suggest a downward movement, employing static gray and dead black. The collision occurs in the center where these emotional colors interrupt each other, creating a visual dialogue of conflict and harmony. The use of broken pixels introduces imperfections, emphasizing the tension and unpredictability within the arrangement.</desc>
