<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Tension</title>
  <desc id="desc">This abstract composition explores the duality of trust and suspicion, with a focus on emotional tension. The palette of yellow (representing trust) and deep blue (indicating suspicion) plays a pivotal role in creating contrast. The warm yellows are confined to one corner, symbolizing trust's protective glow, while the cool blues, using a glitch pattern, create interruptions and a sense of unease. A diagonal flow represents the struggle between these emotions, where the edges reflect a pressure border. The deliberate inclusion of broken pixels enhances this narrative of fragility within resilience, symbolizing the scars of trust amidst suspicion. This design thus embodies a balanced yet disturbed coexistence of conflicting feelings.</desc>
