  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone contrasts strength and vulnerability, with the upper half dominated by strong, dark colors symbolizing density and protection, while the lower half employs lighter hues that reflect fragility and openness. The palette, consisting of shelter green and warm brown, is balanced with cool tones like open blue and cold white, enhancing the collision between strength and vulnerability. The main contrast occurs in the center where darker shades meet lighter ones, echoing the theme of pressure against exposure.</desc>
