<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Trust</title>
  <desc id="desc">This artwork represents the emotional tension between trust and suspicion through contrasting colors and patterns. The palette features pale aquas and mist grays symbolizing trust, contrasted with alarm reds and ink blues that evoke suspicion. The main collision occurs at the center where these emotions overlap, reflecting uneven reflections and blocked passages. The 'falling pixels' layout creates an impression of cascading emotional weight, embodying both the pressure of suspicion and the softness of trust, while broken pixels introduce intentional disruptions to evoke fragility.</desc>
