<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow of Emotion</title>
  <desc id="desc">This composition embodies the tension between certainty and curiosity, manifesting an ebb and flow of organized structure interrupted by chaotic markings. The palette of hot coral, blood orange, and dust pink provides warmth that contrasts against the cool depth of charcoal and hollow blue, suggesting a dialogue between warmth and coolness. The main collision occurs in the center, where structured barcode patterns intersect with a more chaotic noise-like arrangement, creating tension. The use of broken pixels introduces a sense of imperfection, reflecting the unpredictability of emotions, while maintaining quiet negative space to avoid overwhelming the viewer. This work draws from the seed's themes of rising signals and receding edges to illustrate a balance between the known and the unknown.</desc>
