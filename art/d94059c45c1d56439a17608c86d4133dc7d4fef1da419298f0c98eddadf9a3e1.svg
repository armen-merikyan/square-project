<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Signals</title>
  <desc id="desc">This piece juxtaposes the emotional tension between emptiness and desire using a palette that balances dark and warm tones with cooler contrasts. The black and dark violet on the left evoke feelings of void and yearning, while the soft gold and pale green on the right symbolize hope and desire. The arrangement follows a spiral flow, allowing the viewer's eye to dance around the center—representing conflict and resolution, mirroring the pull of empty space against the warmth of aspiration. Broken edges introduce an imperfection that reflects life's unpredictability, enhancing the emotional landscape.</desc>
