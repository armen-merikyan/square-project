<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Calm and Fury</title>
  <desc id="desc">The artwork captures the emotional duel between calm and rage, utilizing a palette where vibrant reds and blacks clash with soft blues and whites. The cooler colors dominate, establishing a tranquil base while chaotic red elements erupt, symbolizing the overflow of fierce emotions. The composition features jagged red patterns cutting through a descending flow of blue, embodying the idea of interruption and collision. Negative space is preserved, creating a veil of quiet amidst the explosive colors, suggesting a suppressed tension. This arrangement evokes a sense of anticipation and unresolved conflict, shaped by the language of the seed.</desc>
