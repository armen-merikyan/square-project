<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Sparks and Ashes</title>
  <desc id="desc">This artwork captures the emotional tension between vitality (spark) and decay (ash), utilizing a palette of electric blue, magenta, lime, and black to evoke a clash of energy and stillness. The contrast arises from pulsating marks reminiscent of fiery sparks against soft, dot-like residues of ash, embodying the struggle of resilience against fragility. The collision of these patterns weaves a narrative of longing and restraint, with the main conflicts occurring diagonally across the canvas, creating an aesthetic rhythm of chaos and order.</desc>
