  <title id="title">Tension in Balance</title>
  <desc id="desc">This artwork embodies the emotional tension between safety and exposure through its contrasting color palette and arrangement. The warmer tones (shelter green and warm brown) dominate the left half, creating a sense of gentle enclosure, while the cooler tones (pale skin and open blue) emerge on the right, suggesting bright vulnerability. The layout conveys a vertical split, with a strong presence of the calm yet piercing whites, punctuating interactions between the colors. The broken pixels act as intentional disruptions, echoing the theme of complexity within simplicity, creating layers of narrative and emotion.</desc>
