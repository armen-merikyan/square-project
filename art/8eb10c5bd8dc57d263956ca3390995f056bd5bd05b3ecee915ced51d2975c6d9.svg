<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Veil</title>
  <desc id="desc">The emotional tone of this piece is a battle between containment and overflow, characterized by a striking contrast between the brighter red accent colors representing rage and the cooler pale blue hues symbolizing calm. The palette reflects a balance of warm and cool tones, with broken pixels introducing intentional disruptions. The design features diagonal interactions originating from the corner, creating a visual collision where the fiery reds dynamically encroach upon the soft blues, suggesting tension and conflict. This arrangement evokes feelings of chaos intersecting with tranquility, embodying the essence of the seed through its abstract form.</desc>
