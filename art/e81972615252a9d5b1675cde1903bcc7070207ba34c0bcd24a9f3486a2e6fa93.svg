<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Tension</title>
  <desc id="desc">The emotional tone explores the push-pull of longing and resolve, conveyed through a palette of sepia and faded blue tones. The colors were chosen to evoke nostalgia and calmness alongside urgency—sepia for warmth and memory, and faded blue for a cool, distant yearning. The main collision happens diagonally from the corner, where the longing pattern of thresholds overlaps with the structured glitches of resolve, creating a dynamic tension. This interplay illustrates an emotional journey between the broken and the whole, balancing negative space with dense clusters.</desc>
