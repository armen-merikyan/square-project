<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This composition reflects the emotional tug-of-war between panic and control, depicted through a stark contrast of colors. The palette of deep blacks contrasts with the cool pale blues and the aggressive presence of reds, capturing the struggle of chaotic feelings against a backdrop of order. The outer border, representing the heavier, darker emotions, encloses a more rhythmic pattern of lighter colors that seem to struggle within the frame. A subtle zigzag pattern hints at the unpredictability of the inner emotions, while the burnished edges suggest the scars of past conflicts. This generated tension signifies the complex interplay of joy and grief.</desc>
