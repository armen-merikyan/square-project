<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">The emotional tone captured here reflects the balance between safety and exposure, where the warm earth tones signify shelter against the coolness of vulnerability. The palette, including 'shelter_green' and 'pale_skin', suggests warmth and openness, while the contrasting cold white brings an element of stark exposure. The main visual collision occurs along the diagonal, where the warm tide-like patterns of safety intermingle with the stack-like structure of exposure, suggesting a dialogue between protection and vulnerability. The intentional 'broken pixels' create disruptive intrusions that echo the complexity of this emotional interplay.</desc>
