<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">This artwork captures the duality of 'emptiness' and 'desire' through a stark contrast in colors and patterns. The palette features warm tones of lime and electric blue against cooler shades of black and magenta, symbolizing the push and pull of emotional states. Colors collide, creating a sense of tension and unresolved feelings, with the black creating negative space that acts like a void, contrasting against the vibrant patterns of the checker design representing desire. The layout embodies an argument grid, depicting a visual struggle between the broken dots of emptiness and the structured checker of desire. The jagged edges add a sense of disturbance, highlighting the emotional fragmentation.</desc>
