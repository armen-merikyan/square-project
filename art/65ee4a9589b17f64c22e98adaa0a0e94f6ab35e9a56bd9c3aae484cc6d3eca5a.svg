<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory vs Motion</title>
  <desc id="desc">This composition captures the emotional tension between tenderness and rage. The palette of deep blacks and soft blues represents the intensity of rage, contrasted with muted, gentle tones illustrating tenderness. The collision occurs diagonally across the square, with cold, sharp blacks disrupting softer, wavy blues. The patterns embody the notion of movement clashing with emotional gravity, suggesting an inner conflict. The empty space hints at quiet contemplation amid chaos, playing into the theme of 'inside vs outside'.</desc>
