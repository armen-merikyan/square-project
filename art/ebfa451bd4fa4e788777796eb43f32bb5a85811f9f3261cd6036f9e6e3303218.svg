<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This piece explores the emotional tension between joy and grief, embodying the duality of existence through contrasting colors and patterns. The palette incorporates bright yellows and oranges for joy, intertwined with deep blues and muted purples representing grief. The upper half exudes warmth with rhythmic waves symbolizing joy, while the lower half fractures into sharp, chaotic patterns, evoking grief. This split creates a dynamic collision between hope and sorrow, reflecting the nature of human experience. The inclusion of broken pixels emphasizes imperfection, layered density, and the unpredictable nature of emotion, enhancing the piece's depth while maintaining essential negative space for balance.</desc>
