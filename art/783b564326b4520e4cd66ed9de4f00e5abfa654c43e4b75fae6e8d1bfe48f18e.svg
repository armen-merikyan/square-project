<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dichotomy of Tension</title>
  <desc id="desc">This piece explores the emotional collision between loneliness and connection. The chosen palette of navy and dim cyan symbolizes depth and quietness, while black represents the weight of isolation. The pattern employs bold stripes to exhibit loneliness against a flowing zigzag layout that suggests movement toward connection. The contrast of dark vs light colors illustrates the push and pull of emotional experiences. Broken pixels introduce an element of imperfection, reflecting the complexity of human emotions, while the arrangement creates a sense of rising tension and quiet release.</desc>
