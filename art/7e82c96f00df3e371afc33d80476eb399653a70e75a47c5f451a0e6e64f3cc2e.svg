<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone navigates the tension between tenderness and rage. I chose a palette of saturated red and muted blue to illustrate this conflict. The red represents the heat of rage as it bursts through the calmer, cooler shades of blue, suggesting a struggle for dominance. This contrast is most pronounced in the central region, where jagged 'embers' collide into softer 'islands,' reflecting a confrontation between these emotions. Broken pixels introduce intentional disruption, embodying guilt and forgiveness, while maintaining pockets of negative space that ensure the composition breathes.</desc>
