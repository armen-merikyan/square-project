<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Disarray</title>
  <desc id="desc">This piece reflects the emotional dichotomy of confusion and clarity through a palette of yellow, orange, deep blue, and muted purple. The stark contrast between warm and cool tones suggests a push and pull, evoking a sense of tension and balance. The layout descends like falling pixels, creating a vertical flow that enhances the feeling of disorder breaking into order. The jagged flame-like pattern paired with the structured stair pattern embodies the breaking and rebuilding process in emotions, with negative space utilized to reflect moments of clarity amidst confusion.</desc>
