<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Order and Release</title>
  <desc id="desc">This piece explores the emotional conflict of control against surrender through a diagonal composition that starts with structured islands of muted cream, representing control, contrasting with dense clusters of blackened plum and small orange that symbolize chaos and surrender in the center. The palette conveys a 'hunger restraint' theme, with rich yet subdued tones creating a heaviness against lighter fields, generating a tension that evokes both pressure and release. The broken pixels introduce intentional disruptions, enhancing the sense of conflict within the framework of the piece.</desc>
