<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotions</title>
  <desc id="desc">This artwork embodies the emotional contrasts of tenderness and rage through a strategic use of color and layout. The palette features dominant reds infused with muted tones of black and pale blue, creating a visual tension between harshness and softness. The center showcases a clash of saturated reds—representing rage—surrounded by the calming influence of pale blue and negative space, evoking tenderness. Broken pixels are interspersed to introduce controlled disruptions, mimicking the chaos of emotions. The layout reflects an eroded symmetry, where tension emerges at the central axis, symbolizing the collision of feelings amid quietude and disturbance. The interplay of colors invites the viewer to explore the nuances of internal struggles, echoing themes of guilt and forgiveness.</desc>
