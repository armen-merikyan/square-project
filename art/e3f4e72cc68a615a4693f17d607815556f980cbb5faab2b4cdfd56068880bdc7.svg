<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Pulses</title>
  <desc id="desc">The emotional tone reflects the struggle between certainty and curiosity. The palette of pale aqua and mist gray provides a serene base, accented by alarm red and ink blue to evoke a sense of urgency. This contrast illustrates the collision of ordered patterns (certainty) and irregular, dynamic spaces (curiosity) within the grid. The central collision occurs with a stark red pulse against soft edges, embodying the push and pull described in the seed, inviting the viewer to navigate through the tension.</desc>
