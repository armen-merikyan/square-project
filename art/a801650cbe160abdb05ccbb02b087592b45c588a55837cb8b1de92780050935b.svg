<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance in Tension</title>
  <desc id="desc">This piece reflects the emotional dichotomy between longing and resolve through its color palette and contrasting patterns. The top half, dominated by deeper greens and browns, evokes a sense of reaching out and desire, while the bottom half introduces structured, lattice-like patterns in pale skin tones and cold whites, conveying resolve and clarity. The slight disruption, created by intentional broken pixels, enhances the tension between chaos and order, emphasizing the themes of intimacy and distance.</desc>
