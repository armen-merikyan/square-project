<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Frequencies</title>
  <desc id="desc">This composition conveys the emotional tone of conflict between clarity and chaos. The selected palette of vibrant electric blue and hot magenta against a backdrop of muted tones represents bright pulses of signal fighting through layers of noise. The contrast between the structured lines of signal ('echo' pattern) and the chaotic disruptions ('negative_cross' pattern) creates a visual rhythm that suggests interference and disruption. The center of the square holds the most vivid colors, representing the main pulse, while the edges fade into noise, illustrating exposure and shelter. The broken pixels are used to emphasize interruptions within the overall flow, bridging the defined moments of clarity with sections of decay.</desc>
