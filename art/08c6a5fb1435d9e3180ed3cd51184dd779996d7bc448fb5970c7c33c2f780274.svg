<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">The emotional tone of this artwork reflects the tension between desire and emptiness. The selected palette of hot coral, blood orange, dust pink, charcoal, and hollow blue conveys a vibrant pull contrasted with darker voids, symbolizing the struggle between an insatiable need and the confines of containment. Intense colors at the top descend, creating a visual feeling of overflow that meets the sealed edges of charcoal down below—in essence illustrating the tension of rising signals within the boundaries. The use of broken pixels introduces disruptions that simulate the scars of experience, while the arrangement results in areas of quiet pressure that disrupt the visual noise. This 8x8 grid encapsulates the emotional narrative as it plays with saturated warmth and cooler neutrality, emphasizing both longing and the frustration of restraint.</desc>
