<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure &amp; Shelter</title>
  <desc id="desc">This composition embodies the emotional contrasts of strength and vulnerability. The palette of moss green, bone white, rust, stone gray, and small gold represents resilience and fragility, capturing the essence of protective strength against exposed delicacy. The soft glow of the bone white meets the muted tones of gray and rust, creating a narrative of incoming marks against a stable center. Main contrast occurs at the center, where lighter colors intersect with heavier saturation, implying a struggle between security and exposure in a cross-current flow. The patterns of pulse marks and rain evoke memory and emotion, while intentional broken pixels introduce a sense of imperfection, symbolizing the scars of vulnerability. The arrangement creates negative space to emphasize openness, yet holds to a guided structure that reflects inner strength.</desc>
