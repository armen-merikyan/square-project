  <title id="title">Contrast of Time</title>
  <desc id="desc">This piece reflects the tension between nostalgia and progress on a vertical split. The top half embodies nostalgia with a pattern of deeper blues, suggesting memory's weight, while the bottom half portrays progress through a lighter palette with stark contrasts, representing clarity and movement forward. The emotional collision occurs where the dark navy meets the brighter cyan, creating a visual dialogue of stability versus tension, hinting at the struggle of moving from familiar comfort into the unknown.</desc>
