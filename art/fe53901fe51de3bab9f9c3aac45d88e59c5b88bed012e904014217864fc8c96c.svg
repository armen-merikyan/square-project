<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interwoven Tensions</title>
  <desc id="desc">The emotional tone of this piece reflects the fragility of vulnerability clashing with the resilience of strength. The palette embodies desire for emptiness, combining warm colors like hot coral and blood orange with cooler shades such as hollow blue and charcoal, creating an intentional contrast. The collision happens off-center, where strong islands of color (representing strength) interrupt lines of glitch-like distortions (representing vulnerability). This juxtaposition suggests a narrative of conflict—strength protecting against the intrusions of vulnerability, capturing the complex interplay of emotions suggested by the seed.</desc>
