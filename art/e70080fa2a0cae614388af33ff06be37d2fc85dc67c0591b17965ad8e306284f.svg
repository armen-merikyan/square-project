  <title id="title">Echoes of Shelter</title>
  <desc id="desc">The emotional tone navigates the tension between safety and exposure, evoking a sense of both vulnerability and protection. The palette combines warm browns and greens suggesting safety, alongside cool soft whites and blues representing exposure. This creates a visual rhythm where warm tones dominate the upper half, providing a stable frame, while cool tones in the lower half create an echoing sense of openness. The split vertical layout emphasizes the collision of these opposing feelings, with the main contrast occurring where the two colors meet, highlighting a gentle boundary that struggles against exposure while inviting a release of emotion.</desc>
