<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Waves of Reflection</title>
  <desc id="desc">This piece captures the emotional tension between envy and gratitude through a color palette of lime, electric blue, magenta, and black. The design's flow is counterclockwise, mimicking the spiraling conflict between lightness and heaviness, represented through jagged transitions and dense clusters that suggest both chaos and calmness. The contrast is most noticeable in the center, where bright colors are juxtaposed against darks, embodying the collision between uplifting gratitude and the deep weight of envy, while broken pixels introduce a sense of imperfection, representing the fragmented state of emotions. Negative space surrounds the center, allowing for breath and contemplation, echoing the narrative of the complexities of human feelings.</desc>
