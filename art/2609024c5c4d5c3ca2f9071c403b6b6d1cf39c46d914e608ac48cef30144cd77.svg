<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This piece embodies the struggle between control and panic through its contrasting colors and patterns. The outer border in dense black represents overwhelming panic, composing a claustrophobic frame. In contrast, the inner 4x4 is marked with gentle pale blue flames, suggesting brief moments of control. The checker pattern interrupted by singular elements of warmth (red) sparks emotional intensity, capturing the conflict inherent in the seed. Color plays a pivotal role: the black exudes a sense of weight, while the pale blue offers fleeting calm. This juxtaposition creates a dynamic tension, evoking a narrative of instability against underlying control.</desc>
