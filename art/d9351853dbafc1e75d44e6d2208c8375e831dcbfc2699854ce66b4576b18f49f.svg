<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Held Desire</title>
  <desc id="desc">This composition captures the emotional conflict of desire pushing against the confines of restraint. The warm hues of hot coral and blood orange dominate the center, symbolizing the saturated pulse of longing, while the muted fields of charcoal and hollow blue form a structured, encasing border, representing containment. The palette reflects a tension between vibrancy and soberness, suggesting a struggle between aspiration and limitation. The main collision occurs centrally, where the vibrant colors clash with darker borders, creating an intense visual tension that echoes the emotional struggle. Broken pixels introduce intentional imperfection, symbolizing the disruptions inherent in the desire versus restraint dynamic.</desc>
