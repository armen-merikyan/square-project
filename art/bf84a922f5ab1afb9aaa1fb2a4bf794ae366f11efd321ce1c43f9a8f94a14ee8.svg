<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This artwork encapsulates the emotional duality of trust and suspicion through a split layout. The top half employs a ring pattern, utilizing a palette of moss green, bone white, and small gold to create a sense of warmth and security. The bottom half uses a flood pattern with rust and stone gray to convey tension and doubt. The main collision occurs where these two realms meet, creating a dialogue between stability and disruption. The use of broken pixels and the edging technique highlights the contrast of protection against invasion, embodying resilience amidst fragmentation.</desc>
