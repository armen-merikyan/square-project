<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Disruption</title>
  <desc id="desc">The emotional tone suggests a struggle between clarity (signal) and chaos (noise). The palette of signal green and electric blue reflects the vibrancy of clear pathways disrupted by static gray and hot magenta, embodying interference. The main collision occurs at the bottom-left corner, where dense noise overpowers the weak signal, symbolizing an invasion of chaos in the intended clarity of communication. The broken pixels introduce intentional imperfection, echoing the fragility of memory against overwhelming static.</desc>
