<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hungry Restraint</title>
  <desc id="desc">The emotional tone reflects a struggle between vibrant desire and controlling restraint, represented through a saturated palette of warm tones contrasting with muted edges. The chosen colors create a dynamic interplay: deep reds and soft creams depict the throbbing pull of desire, while iron gray and blackened plum suggest the weight of limitation. The primary collision occurs in the center, where warm vibrant hues begin to intertwine with the reserved, muted shadows, allowing the tension to reflect the complexity of love and betrayal. Broken pixels introduce intentional imperfections, mirroring the fractured nature of human emotion.</desc>
