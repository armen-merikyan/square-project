<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience in Contrast</title>
  <desc id="desc">The emotional tone reflects the clash between vitality and desolation, mirroring the conflict of spark and ash. The palette illustrates this with deep teal and cosmic indigo suggesting intensity and life, contrasted against the void black representing restraint and ash. The main collision occurs at the center, where the vibrant split-screen pattern intersects with fragments of quiet islands, indicating tension. The layout’s broken frame invites emotional leakage, while the uneven color distribution ensures the piece speaks of turmoil and resilience without being overly symmetrical.</desc>
