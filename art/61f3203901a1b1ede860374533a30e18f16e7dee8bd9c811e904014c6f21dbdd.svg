<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Convergence and Divergence</title>
  <desc id="desc">This piece embodies the tension between panic and control, utilizing a palette that oscillates between deep red and soft pink to evoke emotional contrast. The central pixels introduce a radial pattern suggesting control, while surrounding crosshatch stripes symbolize chaos. The juxtaposition of dense color contrasts against lighter hues illustrates the struggle of control against encroaching panic. The imperfection introduced through broken pixels enhances the sense of unease, creating a feeling of disarray, while the layout's mirroring effect suggests a dynamic push and pull, embodying the core theme of the seed.</desc>
