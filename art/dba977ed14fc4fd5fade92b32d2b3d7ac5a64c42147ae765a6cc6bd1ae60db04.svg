<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Enclosed</title>
  <desc id="desc">The emotional tone reflects a deep contrast between the fierce energy of desire and the oppressive emptiness surrounding it. I selected a palette that combines vibrant tones like hot coral and blood orange, representing desire, interspersed with muted charcoal and hollow blue tones to evoke a sense of emptiness. The arrangement creates a spiral flow suggesting a rising tension within a confined space, where warm, saturated hues collide with the darker, more subdued colors, causing an echo of emotional conflict. The deliberate placement of broken pixels provides a visual disruption, mimicking the idea of desire being confined or interrupted. The main collision occurs centrally, with brighter colors battling against the boundaries established by the cooler tones, representing the struggle between wanting and the limits imposed by absence.</desc>
