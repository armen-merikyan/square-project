<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of defiance and submission by using a palette that contrasts dense, dark tones with lighter, more subdued colors. The deep wine and soft gold create a striking resistance at the edges, while ash gray and warm ivory invoke echoes of submission in the center. The main collision occurs at the central void, surrounded by sparks of color, symbolizing the tension between an unyielding center and encroaching softness. This layout resonates emotionally with the themes of invasion and pressure against release.</desc>
