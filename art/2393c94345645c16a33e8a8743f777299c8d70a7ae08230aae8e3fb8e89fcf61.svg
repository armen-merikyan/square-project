<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Signals of Trust</title>
  <desc id="desc">The emotional tone oscillates between trust (soft glows, stable base) and suspicion (dark slivers, blocking passages). The palette favors black as the grounding suspicion, punctuated by pale blue to evoke a fragile trust. The main contrast collides at the center, where the glitched suspicion pattern meets the target pattern of trust, symbolizing tension. The layout reflects erosion and decay, creating both negative space and rhythmic disruption.</desc>
