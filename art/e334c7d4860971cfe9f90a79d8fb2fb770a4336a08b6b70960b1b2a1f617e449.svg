<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension's Embrace</title>
  <desc id="desc">This composition expresses the emotional tension between defiance and submission through a deliberate asymmetry. The palette combines intense black and vibrant red to depict warmth and aggression, contrasting with the coolness of pale blue and soft white to invoke calm and uncertainty. The diagonal pattern suggests a rising energy—the central 'knot' feels defended yet also open, portraying the struggle between opposing forces. Broken pixels create intentional disruptions, adding a layer of complexity to the overall structure, representing imperfection. The balance is skewed towards submission, showcasing a dominant calm surface interrupted by aggressive strokes of defiance, mirroring the emotional battle described in the seed.</desc>
