<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resistance</title>
  <desc id="desc">This artwork captures the tension between clarity and confusion, mirroring the duality of signal and noise. The dominant dark tones create a shadowy presence, suggesting the weight of memory and interference, while the scattered accents of cyan represent moments of clarity and escape. The center holds a void, symbolizing isolation, encircled by ripples of lighter tones that try to break through the static, embodying a struggle for presence in the noise. The palette reflects loneliness yet hints at connection, with contrasting colors colliding to create a dance of despair and hope.</desc>
