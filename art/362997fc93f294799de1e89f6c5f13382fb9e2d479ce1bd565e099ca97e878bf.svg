<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interference Pulse</title>
  <desc id="desc">The emotional tone reflects a struggle between clarity and distortion, symbolizing the tension of a clean pulse attempting to maintain itself amid chaotic noise. The palette combines deep navy tones for the signal and softer dim cyan for a more understated contrast, establishing a resonance between the dark energetic pull of the noise and the attempt at order. The primary collision occurs along the diagonal, where structured static lines intersect with chaotic rain-like patterns, representing the confrontation between signal and noise. This translates the seed's themes of conflict and structure into an abstract dialogue, with broken pixels scattered throughout as scars of disruption in the pursuit of clarity.</desc>
