<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotions</title>
  <desc id="desc">This artwork conveys the tension between the explosive energy of rage and the tranquil nature of calm. The palette features deep reds and blacks representing the intensity and heat of rage, contrasted with pale blues and whites reflecting calmness and serenity. This interplay creates a dynamic clash, evident through the jagged pressure bands of red piercing through softer, horizontal stripes of pale blue. The dominant red occupies the bottom left corner, radiating diagonally to suggest an invasion into quietness. The intentional inclusion of broken pixels introduces fragmentation and interrupts the flow, symbolizing moments of disruption within emotional context. The arrangement captures a vivid narrative of struggle and balance, embodying a powerful abstract synthesis of the emotional seed.</desc>
