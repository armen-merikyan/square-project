<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Contrast</title>
  <desc id="desc">The artwork embodies the emotional tensions of exposure and safety through contrasting colors that create zones of pressure and release. The use of shelter green, warm brown, pale skin, cold white, and open blue creates a palette reflecting warmth against vulnerability. Main contrasts occur where lighter shades of pale skin and cold white interrupt the solid barrier of shelter green and warm brown. The split vertical approach divides the space, emphasizing the duality of safety and exposure while allowing the colors to collide and blend in the central area, portraying an abstract representation of emotional interplay.</desc>
