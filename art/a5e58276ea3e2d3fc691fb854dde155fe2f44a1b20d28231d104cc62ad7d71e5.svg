<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Contrast</title>
  <desc id="desc">The emotional tone captures a dance between longing and resolve, where warm tones of 'rose clay' and 'warm shadow' symbolize yearning, while cooler 'distant lilac' and 'cool blue' resonate with strength and clarity. The arrangement—a series of small clusters suggesting proximity and distant echoes against significant negative space—reflects the dynamics of two pulses that are both in collision and in conversation. The palette creates a shift between intimacy and distance, with the collision happening prominently in the center where the warm and cool colors intersect. The broken pixels add subtle disruption, echoing the imperfections of the emotional landscape.</desc>
