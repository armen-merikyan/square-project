<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry Fractured</title>
  <desc id="desc">The emotional tone balances between calm and rage, using a palette of deep blacks and calm whites with a touch of chaotic reds. The top half exhibits a structured calm with horizontal pale blue and white stripes reminiscent of soft waves, while the lower half erupts into jagged red patterns that slice through the calmness, presenting an emotional conflict. This work invites the viewer into the heart of disturbance surrounded by serenity, emphasizing the tension inherent in 'open vs closed' through hard edges and broken continuity.</desc>
