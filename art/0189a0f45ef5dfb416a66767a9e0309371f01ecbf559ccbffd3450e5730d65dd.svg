<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork embodies the emotional collision between joy and grief through a carefully curated palette of vibrant yellows and deep blues. The symmetry of the layout reflects the struggle between stability and discord, as brighter colors emanate from the center, contrasting with the darker hues that encroach from the edges. The pulse of emotion is mirrored yet disrupted, suggesting both connection and betrayal, where imperfect breaks in the color flow emphasize moments of tension and release. This juxtaposition creates an abstract narrative of emotional struggle, cycle, and the beauty of imperfection.</desc>
