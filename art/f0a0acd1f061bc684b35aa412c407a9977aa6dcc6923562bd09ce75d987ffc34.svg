<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Resistance</title>
  <desc id="desc">The emotional tone reflects a tension between defiance and submission. A palette of sepia, tan, dust_gray, and faded_blue was chosen to evoke a sense of memory and nostalgia, with muted warmth contrasting against cooler tones. The main collision occurs at the top left corner, where a dense cluster of warm colors 'forces' its way into the space. This aligns with the concept of a corner invasion, portraying a moment of pressure against the backdrop of quieter field colors. The design captures an abstract narrative of struggle, simultaneously conveying interruption and flow, creating a rhythmic escape from dense to empty spaces.</desc>
