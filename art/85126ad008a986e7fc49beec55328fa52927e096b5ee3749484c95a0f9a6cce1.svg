<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light's Tension</title>
  <desc id="desc">This artwork evokes an emotional struggle between relief and dread. The contrasting palette of soft, cool hues (pale mint, soft sky) meets heavy, dark tones (near black, storm gray) to symbolize the tension between light and weight. The placement of brighter colors clustered in the center interrupts the otherwise dark rows, embodying an unresolved motion typical of spiral dynamics. Broken pixels are used to create moments of disruption, enhancing the feeling of chaos within order. The layout emphasizes a struggle where brightness resonates against a backdrop of dimness, representing the delicate balance of hope and anxiety.</desc>
