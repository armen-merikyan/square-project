<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Held Back</title>
  <desc id="desc">The emotional tone explores the tension between emptiness and desire. The chosen palette incorporates warm colors (hot coral, blood orange) representing desire, clashing with muted and cool tones (charcoal, hollow blue) signifying emptiness. The grid pattern of the warmer hues contrasts against the random dot pattern, symbolizing conflicting impulses. The primary collision occurs centrally, showing how desire peaks but is confined by the surrounding emptiness. The overall organization of pixels suggests a flow from dense warmth at the center to quieter edges, embodying a spiral of tension.</desc>
