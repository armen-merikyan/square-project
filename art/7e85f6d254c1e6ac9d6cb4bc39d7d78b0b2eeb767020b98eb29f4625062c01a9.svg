<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This artwork embodies the emotional tension between dread and relief. A muted, near-black base (#000000) represents the heavy weight of dread, while lighter accents, such as faded gold (#D6C85F) and pale mint (#B0E0D2), suggest relief and space. The composition features dense clusters in the top left corner that gradually dissipate and loosen toward the bottom right, embodying the idea of pressure giving way to release. The swirling pattern combines the spark of dread with the radiating flow of relief, creating a dynamic yet abstract narrative without clear outlines, perfectly aligning with the seed's themes.</desc>
