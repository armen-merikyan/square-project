<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Inner Conflict</title>
  <desc id="desc">This piece encapsulates the emotional tensions between longing and resolve. The chosen palette of yellow and deep blue reflects warmth and depth, respectively. The soft glow of yellow contrasts with the hard shadow of dark blue, creating a vivid interplay in the center. The collision occurs predominantly in the center, where patterns of longing and resolve disrupt each other, creating an intentional tension. This structure mirrors the complexity of emotional struggles, embodying both the strong desire for connection and the grounding force of determination. Broken pixels subtly indicate imperfections in resolution, inviting contemplation on the themes of intimacy and distance.</desc>
