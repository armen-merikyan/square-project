<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">The emotional tone captures the struggle between defiance and submission, symbolized through the use of contrasting colors. Burnt orange and dark red represent defiance, clashing against the heavier presence of charcoal, which embodies submission's weight. The layout flows towards the right, suggesting a movement from chaos (left side) to resolution (right), with unexpected interruptions formed by the placement of lighter colors. The palette conveys a warmth that is contrasted by the coldness of the darker tones, representing both conflict and connection in emotional states. The spaces left negative allow the viewer's eye to move and reflect, echoing the themes of openness versus closure.</desc>
