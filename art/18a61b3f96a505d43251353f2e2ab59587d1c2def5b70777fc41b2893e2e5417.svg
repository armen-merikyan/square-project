<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Duality</title>
  <desc id="desc">This artwork visually explores the tension between confusion and clarity. Divided vertically, the left side embodies confusion through a radial pattern of descendants in varying shades of gray and muted pink, representing distorted symmetry and a sense of chaos. The right side, contrastingly, employs a brighter palette of pinks and reds, reflecting clarity and vitality, flowing seamlessly from left to right. The edge style, pixel bleed, adds depth and a sense of imperfection, symbolizing the intermingling of ordered clarity and chaotic confusion. The disarray introduced through broken pixels generates an emotional resonance of unresolved conflicts inherent in the theme.</desc>
