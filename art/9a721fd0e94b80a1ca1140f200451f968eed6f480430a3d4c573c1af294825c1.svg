<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory in Motion</title>
  <desc id="desc">The emotional tone reflects a juxtaposition between the fleeting ignite of 'spark' and the static residue of 'ash,' embodying a struggle between vitality and stillness. The chosen palette evokes resilience with muted greens and grays, accented by warm rusts and golds to symbolize fleeting moments. The main contrast occurs in the bottom corner where a cluster of dynamic 'stairs' pattern clashes with 'static' tones, creating a notable disruption. This intersection symbolizes memory's volatility against the weight of erasure.</desc>
