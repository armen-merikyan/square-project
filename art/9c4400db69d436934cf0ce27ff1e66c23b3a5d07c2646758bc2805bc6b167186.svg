<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This artwork captures the emotional tension between safety and exposure. The chosen palette balances gentle greens and warm browns with cool whites and shades of blue, expressing contrasts of warmth (safety) against the coolness of openness (exposure). The central area features a pale open blue, acting as a vulnerable focal point surrounded by darker tones, symbolizing surrounding protection yet a sense of encroachment. Intentional broken pixels create disruptions to mirror the tension of the themes, with heavier hues framing lighter ones—providing both a visual and emotional border that plays into the notion of ‘thin versus heavy.’ Overall, the composition reflects a dynamic interaction of contrasts and emotional narratives while maintaining an abstract form.</desc>
