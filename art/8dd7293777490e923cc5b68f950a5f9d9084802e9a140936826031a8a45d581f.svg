<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Balance</title>
  <desc id="desc">This artwork embodies the tension between vulnerability and strength through color and composition. The palette incorporates dark tones like 'dead_black' to symbolize strength, contrasted with lighter hues for vulnerability, allowing for an emotional journey within the grid. The central area features a crosshatch pattern to represent stability, while softer hues in a halo form around it, suggesting exposure. The deliberate breaks in the border create openings for the stronger colors to bleed into the more vulnerable spaces, embodying emotional collision and growth. Negative space punctuates the tension, inviting reflection on safety versus exposure.</desc>
