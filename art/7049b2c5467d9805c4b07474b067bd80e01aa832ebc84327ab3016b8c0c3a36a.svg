  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The composition captures the emotional duel between calm and rage through a play of color and pattern. The palette consists of intense reds and muted blacks, representing the explosive nature of rage contrasted against the coolness of pale blues and whites, signifying calm. The central collision of the jagged red marks interrupts the serene bands of blue, emphasizing the theme of containment versus overflow. The arrangement creates tension and visual rhythm, balanced by negative space at the corners to avoid confusion and maintain clarity in the abstract expression.</desc>
