<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Divergence</title>
  <desc id="desc">This abstract piece explores the emotional tension between defiance and submission, utilizing a palette that contrasts the depth of dark reds and blacks against the softness of pale blues and whites. The primary collision occurs in the center, where dark colors pull towards dominance while lighter hues create a sense of openness. The layout is asymmetrical, reflecting a struggle between opposing forces, while the flow of hues suggests falling movement, representing the weight and dispersion of emotions. Broken pixel elements represent imperfections in the experience of love and betrayal.</desc>
