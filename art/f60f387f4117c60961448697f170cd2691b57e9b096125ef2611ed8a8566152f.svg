<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This artwork captures the tension between restlessness and peace using a palette of pink, red, gray, and dark maroon. The colors flow from dense warm clusters in the top left to cooler, quieter spaces in the bottom right, illustrating the emotional movement from chaos to calm. The primary collision occurs along the diagonal—between sharp reds and softer grays—symbolizing the struggle between memory (the warm reds) and motion (the cool grays). Broken pixels disrupt smooth transitions, adding depth and complexity, mimicking the unpredictability of emotions.</desc>
