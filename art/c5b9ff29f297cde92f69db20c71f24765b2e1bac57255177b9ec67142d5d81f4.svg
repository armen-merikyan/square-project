<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tidal Fracture</title>
  <desc id="desc">This composition explores the tension between quiet and pressure through contrasting colors and patterns. The muted palette of off-white and faint peach creates a soft horizon, representing calmness, while the dark navy and compressed red introduce dense pressure, akin to a high-tide wave. The main collision occurs at the center, where sharp edges of dark colors interrupt the quiet space, forming a halo effect. Broken pixels disrupt the smoothness, suggesting a shattering clarity against the soft island theme, embodying confusion amidst clarity. This tension creates a rhythmic wave that flows from the edges inward, capturing the emotional complexity of the seed.</desc>
