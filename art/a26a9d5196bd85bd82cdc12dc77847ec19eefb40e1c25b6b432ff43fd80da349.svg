<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Pulse and Pattern</title>
  <desc id="desc">The emotional tone draws from the dichotomy of longing and resolve, reflecting an undercurrent of urgency yet an aspiration for calm. The palette of ripe green and honey gold evokes warmth and a hint of envy, contrasting the deep olive's densification against cream's lightness. The collision of patterns—thread and checker—creates a center-focused pulse where the two emotions interact, illustrated through varied pixel clusters and strategic negative space that suggests tension and release. Broken pixels add intentional scar-like imperfections, influencing the viewer's perception and emphasizing the dynamic conflict inherent to the seed themes.</desc>
