<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of the Heart</title>
  <desc id="desc">The emotional tone represents the struggle between desire and restraint, with a focus on saturation and containment. The palette combines deep, saturated colors like red_oxide and blackened_plum, contrasted with muted cream and iron gray to evoke a tapestry of both longing and limitations. The center is dense with a mirror pattern symbolizing desire, colliding with a lattice structure reflecting restraint, creating a visual tension. Negative space flows through, illustrating a quiet channel that disrupts the pressure around it, reinforcing the theme of sealed edges and locked boundaries.</desc>
