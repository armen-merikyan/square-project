<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">The emotional tone oscillates between awe and terror, utilizing a palette of burnt orange, dark red, charcoal, and gold. The contrasting colors not only highlight tension but also evoke a sense of unease and wonder. The arrangement disrupts traditional flow with a dense vertical stripe of dark reds and oranges against the softer greys of charcoal, creating a split-screen effect that mirrors the seed's themes of order vs chaos. The edges are weighted with stronger colors while soft gradients interrupt the expected balance, echoing the instability of emotions. Each broken pixel adds imperfection, channeling the idea of fragmented memory.</desc>
