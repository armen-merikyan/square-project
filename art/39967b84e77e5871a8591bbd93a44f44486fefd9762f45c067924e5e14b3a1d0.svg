<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This composition contrasts the raw intensity of rage with the soft depth of tenderness. The palette contains deep reds to represent rage, balanced against muted tones of pale blue and white that embody tenderness. The top four rows encapsulate rage with jagged, broken pixel arrangements, suggesting an explosive quality, while the bottom four rows unfold in gentle ripples, creating an emotional balance. The deliberate placement of black channels interspersed with the softer hues highlights the collision between order and chaos, allowing the viewer to sense a harmonious struggle that echoes the complexities of emotion.</desc>
