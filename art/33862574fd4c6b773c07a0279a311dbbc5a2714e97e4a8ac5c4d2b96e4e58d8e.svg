<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Memory</title>
  <desc id="desc">This composition captures the emotional struggle between peace and restlessness, embodying a journey from chaos to calm. The colors reflect a palette of muted warmth with sepia and tan representing the memories and muted restlessness, contrasted by faded blue which suggests a serene sky or space. The main collision occurs at the diagonal leading from the bottom left to the top right, where dense pixel clusters (restlessness) dissolve into lighter negative space (peace), symbolizing the tension between the two emotional states. Broken pixels add intentional disruptions, representing the incomplete nature of memory and emotion.</desc>
