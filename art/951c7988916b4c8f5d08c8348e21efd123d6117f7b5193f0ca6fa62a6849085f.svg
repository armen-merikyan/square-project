<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Colliding Echoes</title>
  <desc id="desc">This artwork embodies the emotional tension of 'spark' versus 'ash'. The bright yellows and oranges represent the sparks of life and energy, colliding against the muted purples and deep blues suggesting the ash—the quiet remnants of restraint and the gentler moments of memory. The pattern of scattered 'embers' interspersed with 'rain'captivates this struggle, creating a lively rhythm while maintaining tension at the center of the square where colors clash and overlap. The flow is stuttered, representing the push and pull of accumulated experiences and the urge to break free from previous constraints, drawing on the 'crack' shape seed as an organizing metaphor.</desc>
