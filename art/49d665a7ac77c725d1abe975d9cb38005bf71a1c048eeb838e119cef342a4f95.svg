<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">The Weight of Echoes</title>
  <desc id="desc">The emotional tone reflects the struggle between relief and dread. The palette combines deep black (representing dread) with contrasting pale blue and stark white (symbolizing moments of relief). The arrangement is top-weighted, mirroring the heaviness of dread that unfolds downward, creating a sense of pressure. Symmetry is disrupted with blocked patterns suggesting brokenness, while the flow from the top induces a feeling of descent. This visual collision captures the essence of the seed by embodying a tension where order confronts chaos, inviting the viewer to explore the emptiness and fullness of emotional contrasts.</desc>
