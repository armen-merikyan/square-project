<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Duality</title>
  <desc id="desc">This composition captures the emotional conflict between love and betrayal through an interplay of warm and cool tones. The palette features soft pinks and vibrant reds to suggest love, interspersed with dark maroons and grays to evoke a sense of betrayal. The layout shifts between chaotic patterns and smooth gradations, creating visual friction. The main collision occurs in the center, where bright and muted colors clash, reflecting rising tension and fractured emotions. The arrangement hints at both resistance and movement, illustrating a heart in turmoil while leaving negative space to signify unresolved feelings.</desc>
