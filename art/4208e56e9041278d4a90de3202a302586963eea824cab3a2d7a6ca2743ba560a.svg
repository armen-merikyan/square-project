<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Longing and Resolve</title>
  <desc id="desc">This composition evokes emotional tension between longing, represented by a patchwork of faded and muted colors, and resolve, illustrated with clearer, more defined patterns. The color palette of sepia, tan, dust gray, and faded blue reflects a sense of nostalgia while maintaining a calm foundation. The thick edges around the more dynamic areas emphasize the collision of these emotions, with the lower left corner filled with concentrated dark hues representing urgency, contrasting with lighter areas that suggest serenity and hope. The use of broken pixels throughout enhances this narrative of imperfection and repair, creating disruptions that echo the theme of emotional conflict.</desc>
