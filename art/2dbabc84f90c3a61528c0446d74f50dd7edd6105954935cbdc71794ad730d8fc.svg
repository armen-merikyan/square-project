<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipsed Echoes</title>
  <desc id="desc">This artwork explores the emotional tension between emptiness and desire through contrasting colors and patterns. The palette combines warm reds and pinks with cool grays and dark maroon, signifying the struggle between warmth (desire) and coolness (emptiness). The layout uses an upward motion on one side versus a downward pull, symbolizing rise versus fall. Broken pixels introduce imperfection, echoing the fragility of emotions, while the patterns create a visual dialogue, with broken dots representing desire and a split screen for emptiness. The primary collision occurs where warm tones meet cool tones, highlighting unresolved longing.</desc>
