<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone reflects a delicate tension between safety and exposure. The palette is chosen to convey warmth and protection from the calming shelter green and warm brown, countered by the cold white and pale skin tones which evoke exposure. The bold open blue at the edges provides vibrancy, representing the confrontation of safety with exposure. The main contrast occurs vertically, with radially patterned safety colors clashing against the static exposure colors. This layout introduces a controlled chaos where the colors blend and interrupt one another, creating a narrative of tension and resolution.</desc>
