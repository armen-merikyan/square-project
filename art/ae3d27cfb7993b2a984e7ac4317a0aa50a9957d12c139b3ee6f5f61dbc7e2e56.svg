<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Harmony</title>
  <desc id="desc">This piece captures the emotional tension between longing and resolve by contrasting the chaotic, broken dotted patterns representing longing with the structured, clear 'teeth' pattern representing resolve. A muted palette with deep teal and cosmic indigo serves as the base, suggesting a quiet emotional space, while accents of cold gold introduce a vibrant pulse. The collision occurs between the inner 4x4 space of pronounced patterns against the solid outer border, highlighting the conflict and interplay of feelings. The design avoids literal representation while inviting the viewer to experience the ebb and flow of emotion visually.</desc>
