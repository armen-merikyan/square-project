<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">The emotional tone navigates between longing's soft yet urgent pull and resolve's firm grounding. The palette combines deep black and dark violet to create foundational shadows, with soft gold and pale green providing touches of hope and light. The main contrast combines clustered patterns of longing—represented by the crosshatch—on the left, and structured, broken patterns of resolve—represented by negative cross—on the right. This collision creates a narrative tension that suggests a conversation between repair and damage, highlighted by intentional broken pixels disrupting the flow. The arrangement mirrors a pulse where the two emotions interplay through central, congested patterns surrounded by quieter negative space.</desc>
