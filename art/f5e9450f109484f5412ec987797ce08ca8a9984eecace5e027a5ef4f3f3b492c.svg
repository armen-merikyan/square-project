<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transmission</title>
  <desc id="desc">This piece embodies the emotional duality of 'signal vs noise', exploring the persistent yet precarious nature of communication. The selected palette of navy and dim cyan evokes a feeling of solitude and depth, contrasting against stark black and white interruptions that symbolize the chaotic noise disrupting clarity. The dynamic flow captures a spiral motion radiating from an off-center pulse, representing the fragility of the signal amidst static interference. As the colors collide and overlap, they create a visual narrative of tension, evoking memories of fragmented communication. The arrangement embraces negative space, maintaining clarity while allowing for disruptive elements to coexist.</desc>
