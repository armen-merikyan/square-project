<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tidal Pulses</title>
  <desc id="desc">This composition explores the tension between quietude and pressure through the use of color contrast and spatial arrangement. A palette of muted tones suggests a theme of calm (off white, dust gray, faint peach) vs. deeper, weighted emotions (compressed red, dark navy). The lattice pattern on one side contrasts with a soft tide pattern on the other, symbolizing the push-pull nature of the emotional landscape. The vibrant compressed red serves as a central disruptive point, surrounded by the calming off white and dust gray, creating a collision at the center, reflecting the struggle between these forces.</desc>
