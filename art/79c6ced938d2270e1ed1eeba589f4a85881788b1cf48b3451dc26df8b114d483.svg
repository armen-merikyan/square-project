<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">The emotional tone creates a battlefield between the explosive nature of rage and the serene qualities of calm. The selected palette of red, black, pale blue, and white captures this duality, where sharp, jagged red tones (rage) clash against the softer, horizontal lines of calm blue and white. The main collision occurs in the center, where the chaotic checker pattern of rage confronts the quiet rain-like patterns of calm, embodying the struggle between containment and overflow. Broken pixels introduce a sense of imperfection and emotional scars, reinforcing the turmoil present in this abstract piece.</desc>
