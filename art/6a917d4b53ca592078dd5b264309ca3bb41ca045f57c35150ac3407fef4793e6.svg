<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece embodies the emotional tension between desire and emptiness, using a palette of warm saturation from 'hot coral' and 'blood orange' against the cool, subdued tones of 'charcoal' and 'hollow blue'. The diagonal layout creates a visual argument where the warm colors push against a cooler, restrictive boundary that embodies the feeling of containment. The main contrast occurs in the center, where the warmth of desire collides with the cooler spaces of emptiness, interrupted by selected broken pixels to evoke a sense of imperfection and struggle. The structured patterns, representing desire, weave through fault lines of emptiness, visually speaking to the emotional story of hunger opposed by the limits of restraint.</desc>
