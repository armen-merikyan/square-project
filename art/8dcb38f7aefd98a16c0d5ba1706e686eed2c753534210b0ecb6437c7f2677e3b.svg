<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This artwork explores the emotional duality of emptiness and desire through opposing patterns. The colors of yellow and orange evoke desire, while muted purple and deep blue represent emptiness, creating a vibrant contrast. The grid and crosshatch patterns symbolize a struggle between control and surrender, emphasizing the pressure of conflicting emotions. The thick edges provide a frame that encapsulates the tension while leaving negative space to breathe. This piece narrates a story of emotional collision, from dense, warm areas to quiet, cool interruptions.</desc>
