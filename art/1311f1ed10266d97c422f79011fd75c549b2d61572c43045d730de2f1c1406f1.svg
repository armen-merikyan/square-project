<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Fracture</title>
  <desc id="desc">The emotional tone explores the tension between envy and gratitude, represented through contrasting shades of navy and black, suggesting depth and weight. The use of 'spark' for gratitude and 'dots' for envy creates a dynamic, scattered texture that breaks the symmetry, reflecting a nearly mirrored image corrupted by an uneven flow. The palette, 'lonely_signal', speaks to isolation yet hints at connection, with negative space ensuring emotional breathing room. The pattern’s collision is most prominent in the distribution of the lighter shades among the darker ones, creating a tension-filled, abstract narrative.</desc>
