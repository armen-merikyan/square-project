<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience and Fragility</title>
  <desc id="desc">The emotional tone radiates from the dynamic interplay between warm 'spark' colors and the cold 'ash' palette, representing resilience amidst fragility. The palette combines vibrant honey golds and greens with muted greys, establishing a balance. The diagonal pattern evokes a feeling of movement and contrast, with summoning pulses that collide—a stark brightness amid quiet, settled ash. This composition reflects the themes of conflict and duality within a harmonious structure, fostering a tension that speaks to the complexity of memory and erasure.</desc>
