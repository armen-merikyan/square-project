<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Static Pulse</title>
  <desc id="desc">The emotional tone navigates between trust and suspicion, depicted through a structured palette that oscillates from dense darks to muted fields of color. The colors pivot from a warm muted cream to darker, more suspicious tones of blackened plum to suggest an anxious undercurrent. The main contrast erupts in the center where pulsating warm tones clash with colder shadows, hinting at the struggle between clarity and confusion. The vertical split in visual weight creates an echo of the theme ‘signal versus noise’ using a ripple pattern on one side and pulse marks on the other, capturing the emotional collision inherent in the seed.</desc>
