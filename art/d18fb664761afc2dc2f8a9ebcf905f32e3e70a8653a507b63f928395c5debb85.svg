<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Emotion</title>
  <desc id="desc">This piece evokes the contrast between joy and grief through a dynamic color composition. The palette combines bright yellows and oranges symbolizing joy, with deep, muted purples representing grief. The joy is woven through the maze pattern on the right while grief manifests as a heavy ring structure on the left, creating a rhythmic push-pull. The broken pixels introduce imperfection and interruption, echoing the tension in the emotional landscape suggested by the seed. Overall, this arrangement captures the essence of conflict within a structured, yet chaotic space.</desc>
