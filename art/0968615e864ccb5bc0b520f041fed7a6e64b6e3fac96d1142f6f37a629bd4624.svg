<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Resonance</title>
  <desc id="desc">The emotional tone reflects a struggle between a clear, rhythmic signal and chaotic noise. The palette of dark colors (navy, black) emphasizes the oppressive weight of noise, while the dim cyan serves as a glimmer of clarity. The contrast type features hard edges in clustered placements, creating a visual clash that represents conflict. The pattern of falling pixels mirrors the idea of a singular pulse attempting to break through the static, where broken pixels introduce intentional disruptions, suggesting scars from the noise. The chaotic noise is prevalent in the lower half, while the upper half remains more structured, highlighting the dominance of signal over noise.</desc>
