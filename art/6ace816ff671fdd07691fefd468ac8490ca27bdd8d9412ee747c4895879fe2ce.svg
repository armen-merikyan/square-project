<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Vulnerability</title>
  <desc id="desc">This composition captures the tension between safety and exposure through a split vertical layout. The use of a muted palette with shelter green and warm brown reflects a protective softness contrasted against cold white and open blue that evoke exposure. The interplay of broken dots and halos creates a visual echo on the right, suggesting the gentle pull of vulnerability amidst a stable frame. Main collisions occur along the vertical split, integrating soft spots of color that punctuate the narrative of balance and disarray.</desc>
