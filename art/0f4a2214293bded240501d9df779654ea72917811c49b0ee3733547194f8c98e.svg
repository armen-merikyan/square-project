<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Pulse and Restraint</title>
  <desc id="desc">The emotional tone encapsulates the struggle between the warmth of desire and the cool containment of restraint. The palette combines vibrant colors representing desire, like hot coral and blood orange, with muted tones like charcoal and hollow blue to embody restraint. The main collision occurs in the center through diagonal warm stripes against a barcode-like pattern, suggesting tension and release across negative space, echoing the spiral pressure and sealed edges of desire held back. This pattern conveys the chaotic interaction of impulses, while also leaving room for contemplation.</desc>
