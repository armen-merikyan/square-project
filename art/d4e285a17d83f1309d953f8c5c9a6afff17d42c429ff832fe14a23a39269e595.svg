<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece embodies an emotional dichotomy between rage (represented by hot reds and stark blacks) and calm (illustrated through cool pale blues and whites). The palette juxtaposes intense warmth against serene coolness, drawing on the tensions expressed in the seed. The main contrast occurs in the central area where jagged 'ladder' patterns of rage collide with softer 'tide' movements of calm. Despite a defined boundary, the colors suggest unresolved motion and struggle against containment, echoing the themes of noise versus signal.</desc>
