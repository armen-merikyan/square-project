<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Pulse</title>
  <desc id="desc">This piece reflects the emotional tension between softness and severity through the contrasting palette of powder pink, warm white, and carbon black. The warm colors symbolize softness and forgiveness, while the dark hues represent severity and guilt. The spiral layout creates a dynamic movement, with colors overlapping to form a lattice pattern that echoes noise against the pulse marks, suggesting an ongoing battle between clarity and interference. The main collision occurs in the center where the warmth of pink meets the coldness of black, encapsulating the struggle of signal versus noise in our emotional landscapes.</desc>
