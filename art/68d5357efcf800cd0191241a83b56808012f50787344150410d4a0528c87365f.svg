<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shadows of Duality</title>
  <desc id="desc">The emotional tone of envy versus gratitude manifests through contrasting shades: dark violets representing envy juxtaposed with soft golds for gratitude. The palette evokes a sense of lightness against weight, embodying the struggle between heavy thoughts and moments of appreciation. The left-weighted edge style gives a sense of imbalance, further enhanced by selected broken pixels creating disruptions in the abstract symmetry. This results in an emotional tug-of-war captured through vertical waves of color, illustrating the interplay between conflicting sentiments.</desc>
