<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger in Restraint</title>
  <desc id="desc">This composition captures the emotional interplay between desire and emptiness, represented by a warm color palette clashing against cooler tones. The palette of hot coral, blood orange, and dust pink signifies desire, while charcoal and hollow blue evoke feelings of emptiness. The primary contrast occurs in the center where warm hues surge, interrupted by jagged edges of cooler shades that contain and disrupt this warmth, reflecting the tension of overflowing longing restrained. The 'halo_void' layout emphasizes a hollow core surrounded by a saturated ring, symbolizing the emotional push and pull of these conflicting feelings.</desc>
