<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasts in Motion</title>
  <desc id="desc">This piece embodies the emotional tension between vitality and decay, as symbolized by 'spark' and 'ash'. The chosen palette of rich dark navy, soft faint peach, and muted dust gray reflects a balance of vibrant energy and reflective calm. The primary collision occurs diagonally across the center, with dense jagged ash patterns interrupted by sharp, bright stripes of warm red, instilling feelings of urgency and tranquility in tandem. The patterns were shaped by the concepts of restraint and release, representing the ever-present struggle between memory and erasure. This is achieved through an asymmetric layout that enhances the sense of movement and emotional flow throughout the square.</desc>
