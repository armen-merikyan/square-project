  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone of this piece balances the stark contrasts of safety and exposure. The palette uses warm browns and shelter greens to represent safety, balanced against pale skin and cold white for exposure. The grid pattern embodies a sense of protection, while the crosshatch symbolizes the chaotic nature of exposure. The main collision occurs at the center where the two patterns overlap, highlighting the tension between safety and vulnerability. Broken pixels are strategically placed to create imperfections, echoing the emotional scars of conflict between these themes.</desc>
