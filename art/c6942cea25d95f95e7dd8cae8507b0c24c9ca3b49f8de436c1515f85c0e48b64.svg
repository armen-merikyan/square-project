<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Centre vs Edges</title>
  <desc id="desc">This artwork explores the emotional dichotomy between vulnerability and strength through its color palette and layout. The dominant color, a deep blackened plum, signifies strength, forming a dense base around a central muted cream area that represents vulnerability and exposure. The contrasting colors create a ripple effect, with soft layers pushing against the solid edges, suggesting a tug-of-war between safety and risk. Broken pixels introduce imperfections, suggesting scars, echoing the theme of connection versus alienation inherent in the seed. The central placement of muted cream surrounded by dark tones creates a visual representation of the vulnerable core being both protected and attacked by its environment.</desc>
