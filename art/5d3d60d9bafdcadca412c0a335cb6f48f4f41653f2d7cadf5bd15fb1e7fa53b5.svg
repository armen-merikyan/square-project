<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Islands</title>
  <desc id="desc">This artwork explores the tension between defiance and submission through a dynamic interplay of color and form. The palette, inspired by 'resilience_fragility', emphasizes earthy and muted tones like moss green and bone white, representing submission, while rust and small gold accents represent defiance. The central block of dense, warm colors collides with the quieter, cooler edges of gray and white, illustrating the protective or opposing force around a calm core. The broken pixels create intentional disruptions, suggesting the complexity of emotions and inherent imperfections in the struggle between these forces.</desc>
