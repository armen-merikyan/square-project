<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Light and Shadow</title>
  <desc id="desc">This artwork reflects the duality of fear and hope through an intentional blend of dark and light colors. The palette features deep blacks and dark violets to evoke a sense of heaviness and introspection, contrasting with small accents of soft gold and pale green that represent glimmers of hope. The upper rows create a feeling of pressure with denser dark hues, while lower rows gradually introduce lighter colors, suggesting a rising signal of hope. The zigzag pattern formed by the placement of brighter colors interrupts the darker flow, creating a dynamic visual tension that resonates with the seed's theme of rising from the depths of fear towards a soft, hopeful center.</desc>
