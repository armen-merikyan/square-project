<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmony in Collision</title>
  <desc id="desc">The emotional tone balances restlessness and peace through the juxtaposition of vibrant and muted colors. The palette of deep charcoal juxtaposed with warm coral and blood orange creates tension, embodying the conflict between calm and chaos. The collision is concentrated in the center, where warm colors break through cold, dark tones, visually echoing the struggle between memory's weight and the movement towards tranquility. The layout descends like falling pixels, enhancing the sense of motion and fluidity, reflecting the themes of memory and motion within the composition.</desc>
