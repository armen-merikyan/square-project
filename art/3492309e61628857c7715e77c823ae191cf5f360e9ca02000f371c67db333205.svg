<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Whispers of Contrast</title>
  <desc id="desc">The emotional tone of this composition navigates the tension between 'signal' as bright routes and clear accents, and 'noise' as static scatter and false echoes. The chosen palette of navy, black, single white, and dim cyan embodies a lonely signal amidst resonance. The collision between deeper hues and a vibrant white pulse creates a center-focused dynamic, symbolizing a clean pulse seeking clarity in overwhelming static, with 10% negative space allowing the viewer to breathe amidst the interference. Broken pixels are purposefully placed to convey disruptions, reflecting memory's fragility.</desc>
