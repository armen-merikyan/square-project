<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The artwork explores the emotional tension between joy and grief, conveyed through contrasting warm and cool tones. The palette of yellow and orange signifies joy as bright and inviting, while deep blue and muted purple represent the heaviness of grief. The composition uses a zigzag pattern to suggest movement and conflict: vibrant broken dots convey joy, while rings echo grief's weight and repetitiveness. The contrast occurs where bright pixels clash against darker, muted areas, creating visual tension, representing the emotional push and pull inherent in the concept of joy versus grief. The broken edges allow for a fractured quality, hinting at the imperfections of emotions.</desc>
