  <title id="title">Exposure Shelter</title>
  <desc id="desc">The emotional tone reflects the contrast between vulnerability (exposure) and protection (safety). The chosen palette transitions from warm browns and greens suggesting safety, to cooler whites and pale skin tones representing exposure. Main contrast occurs vertically, where the heavier tones push against the softer hues, suggesting a battle of emotional weight and lightness through a split design. The abstract pattern mirrors the idea of bands shifting density, echoing the tension of pressure and release.</desc>
