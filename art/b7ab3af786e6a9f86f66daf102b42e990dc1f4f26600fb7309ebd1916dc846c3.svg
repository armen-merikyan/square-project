  <title id="title">Fractured Balance</title>
  <desc id="desc">The emotional tone embodies a struggle between panic and control, depicted through a split layout contrasting organized patterns against chaotic disruption. The palette of electric blues and magentas symbolizes the intensity of conflict and emotion, while the black represents the underlying chaos. The upper rows exhibit structured, flame-like patterns, signifying control, while the lower rows break into crack patterns, representing panic. The collision of these designs evokes a sense of tension and energy, with burned edges adding a sense of danger and imperfection to the artwork, creating a resonant feeling of unresolved motion.</desc>
