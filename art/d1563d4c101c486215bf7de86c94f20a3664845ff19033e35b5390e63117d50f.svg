<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Joy and Grief</title>
  <desc id="desc">This artwork visually expresses the tension between joy and grief through a palette of warm and cool tones. The vibrant yellows and oranges represent joy and expansion, while the deep blues and muted purples evoke feelings of grief and heaviness. The composition reflects 'order vs chaos' where structured patterns of joy in the upper left rush diagonally downward, disrupted by fragmented edges and broken pixels to symbolize grief's interference. The color placement creates a sense of collision and flowing motion, suggesting an ongoing struggle between these emotions.</desc>
