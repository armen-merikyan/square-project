  <title id="title">Duality of Tension</title>
  <desc id="desc">The emotional tone explores the conflict between softness and severity, which is mirrored in the palette of light and dark shades. The selection of warm whites and powder pinks intermingles with stark carbon black, providing a visual echo of tension. The main collision occurs at the off-center point where the spiral flow draws in powder pink threads interrupted by dense black and gray accents, suggesting a movement from calm to pressure while still integrating negative space for relief.</desc>
