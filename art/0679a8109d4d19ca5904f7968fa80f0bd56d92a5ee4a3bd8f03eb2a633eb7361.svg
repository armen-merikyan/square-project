<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Embrace</title>
  <desc id="desc">This piece expresses the emotional tension between love and betrayal through its contrasting color palette and irregular placements. The palette of pinks and grays represents warmth entwined with coldness—a visual metaphor for affection shadowed by mistrust. The dense clusters of warmer pinks in the corners contrast sharply with the stark gray and dark maroon encroaching into the center, symbolizing the conflict between closeness and separation. This contradiction creates a compelling visual narrative of a heart divided. The broken pixels and uneven arrangements imply chaos and disorder within the previously harmonious emotional space.</desc>
