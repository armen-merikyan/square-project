<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">The artwork embodies the dual emotional states of defiance and submission, creating tension at the center where both emotions collide. The palette consists of deep black and dark violet, evoking a sense of uncertainty and conflict, interspersed with soft gold and pale green that symbolize fragile hope and retreat. The contrasting patterns—checker for defiance and grid for submission—interact at the central threshold, leading to a chaotic yet structured arrangement. Broken pixels are strategically placed to introduce imperfections, representing disruptions in coherence, aligning with the theme of edge static and creating a visual narrative of conflict and resolution.</desc>
