<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Suspicion</title>
  <desc id="desc">The emotional tone contrasts trust's warmth against suspicion's dark edges, reflected in the palette. The use of navy and dim cyan suggests a depth of calm and a whisper of uncertainty. The left side embodies trust with glitch patterns that flow gently, while the right disrupts the calm with sharper, stacked configurations symbolizing suspicion. The collision occurs centrally, where clean and chaotic elements interact, representing the struggle between these two feelings. Overall, the abstract pattern reflects a story of connectivity and tension inherent in relationships.</desc>
