<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The piece explores the emotional dichotomy of love and betrayal through a contrasting palette of warm pinks and reds juxtaposed with deep grays and dark maroon. The upper section leads with vibrant warmth, symbolizing love, while the lower integrates darker tones representing betrayal, creating a tension that visualizes emotional conflict. The pattern is laid out to create a sense of diagonal rise, echoing hope, yet the broken pixel elements introduce a sense of imperfection and disarray, enhancing the theme of disruption in symmetry. The overall effect captures the fragility of harmony amidst emotional turmoil.</desc>
