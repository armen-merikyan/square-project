<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory Pulse</title>
  <desc id="desc">The emotional tone juxtaposes softness with severity, representing guilt and forgiveness through contrasting colors. A warm palette of powder pink, warm white, and sharp crimson meets cool tones of carbon black and steel gray, suggesting a struggle between light moments and deeper shadows. The main collision occurs centrally, where the ‘channels’ of softness disrupt the ‘noise’ of severity, crafting an echo of emotional turmoil and release. Broken pixels introduce intentional dissonance, creating a sense of fun yet haunting imperfection that reflects the tangibility of memories.</desc>
