<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Strain</title>
  <desc id="desc">The emotional tone blends elements of rage and calm through contrasting visuals. The palette involves vibrant reds representing the rage and cooler tones of pale blue and white that embody calmness. The pattern features jagged clusters (rage) colliding with horizontal stripes (calm), creating a visual tension that mimics the push and pull of these emotions. The main contrast occurs diagonally, where the brighter reds overflow against more subdued backgrounds, symbolizing the struggle between contained emotion and the eruption of intensity. This arrangement captures the essence of the seed by focusing on emotional collision rather than literal representation.</desc>
