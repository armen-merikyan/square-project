<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of joy and grief by juxtaposing vibrant yellows and oranges against muted purples and deep blues. The left side, representing joy, uses a structured frame-like pattern to suggest expansion and brightness, while the right side, embodying grief, employs fragmented teeth-like shapes that impart a sense of heaviness and sorrow. The top-heavy edge style reinforces the flow from bottom to top, creating a sense of rising tension and unresolved feelings as colors collide,. This data-driven approach encapsulates the relentless struggle between order and chaos.</desc>
