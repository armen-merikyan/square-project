<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Clash of Flare and Fade</title>
  <desc id="desc">This piece captures the emotional tension between spark and ash, represented through contrasting patterns and colors. The palette of deep navy and grays reflects the fading heat of ash, paired with bursts of dim cyan to symbolize the scattered light of sparks. The main collision happens within the center, where these contrasting elements intertwine, creating an echo of movement that suggests tension between restraint and hunger. The broken pixels symbolize imperfection and memory, enhancing the feeling of fragility. The visual rhythm flows diagonally, embodying the arguments between the two states.</desc>
