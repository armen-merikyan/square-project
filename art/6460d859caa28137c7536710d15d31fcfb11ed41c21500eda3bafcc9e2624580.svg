<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symphony of Discord</title>
  <desc id="desc">This piece explores the tension between confusion and clarity, presenting a nearly mirrored layout that becomes disrupted through deliberate broken pixels. The palette, featuring deep navy and sharp black interspersed with soft dim cyan and intermittent white, reflects the emotional push and pull between starkness and subtlety. The main contrast arises from the collision of densely packed dark elements against lighter accents, mimicking the chaotic pulse of emotions while hinting at underlying clarity. The randomization within a predominantly structured arrangement evokes feelings of interruption within a familiar shape, encouraging the viewer to reflect on the beauty of imbalance.</desc>
