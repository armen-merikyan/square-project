<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threads of Contrast</title>
  <desc id="desc">This piece embodies the emotional tension between longing and resolve, with an interplay of quiet and dynamic elements. The palette of ripe green and honey gold reflects a balance of warmth and discomfort, suggesting vitality amid yearning. The main collision is centered where the glowing colors of resolve inject life into the emptiness—a reflection of reconstruction. Broken pixels introduce imperfections, reinforcing the theme of repair amidst damage, while generous negative space amplifies the sense of distance and longing, allowing the viewer to dwell on the contrasts presented.</desc>
