<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This artwork captures the tension between pressure and quietness. The chosen palette of muted tones with hints of warmth suggests an emotional landscape — with dark navy and compressed red representing the weight of pressure while faint peach and off-white convey quietness and clarity. The main contrast occurs where the crosshatch pattern overlaps with the negative space, mainly concentrated towards the upper left, creating a visual echo of tight clustering breaking into softer fields. This reflects the seed's themes of conflict and release, visually depicting a shattering against the quiet backdrop.</desc>
