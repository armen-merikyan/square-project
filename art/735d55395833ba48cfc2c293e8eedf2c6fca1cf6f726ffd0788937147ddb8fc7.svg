  <title id="title">Tension of Hearts</title>
  <desc id="desc">This artwork explores the emotionally charged dynamics of love and betrayal through contrasting color choices and patterns. The warm pinks and reds represent love, while the grays and dark maroons embody betrayal. The left side exhibits calm, soft gradients symbolizing affection, while the right side is disrupted by sharp, fragmented edges, reflecting feelings of mistrust. The central diamond shape invokes a sense of structure amidst chaos, creating a visual discourse between stability and emotional fracture, with broken pixels symbolizing imperfection. This allows for a narrative that both connects and divides, highlighting the delicate balance of love's warmth against betrayal's chill.</desc>
