<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition explores the emotional tension between tenderness and rage, with a hot center of red indicating rage contrasted by cooler, muted tones around it representing tenderness. The palette includes deep black and pale blue to create stark contrasts, while white serves as a quiet field to enhance the emotional depth. The arrangement features diagonal flows of intense colors colliding with the soft, rounded barcode patterns of gentler hues, symbolizing the struggle of competing feelings. Broken pixels disrupt the flow, embodying imperfection and the complexity of emotions.</desc>
