<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of rage and calm through a clash of color and pattern. The chosen palette of red, black, pale blue, and white highlights the explosive energy of rage against the serene containment of calm. The main focus is a central dark maze-like structure representing chaos and intensity, surrounded by a more ordered, ring-like configuration in pale blue and white, suggesting calm. Intentionally placed broken pixels enhance the sense of disruption, symbolizing the conflict between overwhelming feelings and moments of tranquility. Overall, the disruption and contrast evoke a narrative of emotional tension, where eruptions of intensity collide with quietude.</desc>
