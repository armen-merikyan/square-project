  <title id="title">Collision of Abstractions</title>
  <desc id="desc">The artwork explores the emotional tension between defiance and submission. The palette of guilt and forgiveness, featuring warm ivory and deep wine, suggests warmth contrasted with restraint. The central diagonal rise represents an assertion of defiance, while the radial soft gold and ash gray patterns embody submission and quietness. Broken pixels intentionally disrupt the symmetry, creating a feeling of tension and imperfection, allowing for a unique conversation between order and chaos.</desc>
