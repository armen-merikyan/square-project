  <title id="title">Erosion of Calm</title>
  <desc id="desc">The emotional tone represents the clash between rage and calm, where the cool blues symbolize tranquility and the aggressive reds echo chaos and intensity. The palette juxtaposes sharp reds which suggest anger and emotional turmoil against soft pale blue and white hues that signify peace and quiet. The pattern utilizes broken dots on the left side to illustrate the interruption of calm by the overwhelming noise of the reds on the right which depict a feeling of suffocation. The placement embraces a split vertical layout, where the left half (calm) is orderly and structured while the right (rage) is chaotic and spontaneous, culminating in a central collision that challenges serenity.</desc>
