<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition captures the intense emotional contrast of rage and calm through the juxtaposition of warm, aggressive reds and muted, soothing blues. The palette is deliberately chosen to reflect the dichotomy: fiery reds push against tranquil cool tones, suggesting a visual conflict where bright elements overflow into calm spaces. The arrangement employs a dense 'island' of red patterns amidst a sea of calming blues, creating a battlefield of emotion. The 'ladder' pattern of red signifies eruption and chaos, while the pale blue 'lattice' provides a stabilizing counterbalance. Key collisions occur at the center where the red overwhelms, creating a sense of tension and release.</desc>
