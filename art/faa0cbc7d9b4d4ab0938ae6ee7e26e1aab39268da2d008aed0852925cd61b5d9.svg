<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">The artwork captures the emotional dichotomy of defiance and submission. The palette of signal green, electric blue, and hot magenta represents vibrant resistance against the muted undertones of static gray and dead black, creating a rich visual tension. The central pixels are brighter, suggesting an island of defiance surrounded by a chaotic sea of softer lattice patterns, while broken pixels disrupt expected patterns, enhancing the theme of struggle between order and chaos. The overall design echoes pulsating rhythms, mirroring the dynamics of quiet channels and fractured borders that challenge the viewer's perception.</desc>
