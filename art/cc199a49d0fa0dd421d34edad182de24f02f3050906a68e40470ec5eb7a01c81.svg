<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Signal</title>
  <desc id="desc">The emotional tone captures the conflict between clarity and chaos, represented through contrasting colors. The palette features signal green and hot magenta to symbolize intensity and interruption, while dead black and static gray embody the noise. The central pulse emerges through a lean channel of green, surrounded by magenta static—a tangible collision that conveys memory and presence against erasure. This graphic narrative hints at exposure and shelter, framed by a deliberate broken border to evoke the sensation of leaking emotions.</desc>
