<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Emotions</title>
  <desc id="desc">This composition expresses the juxtaposition of love and betrayal through contrasting warm and cool shades. The top half features warm tones of pink and red, symbolizing love's warmth and connection, arranged in a striped pattern reflecting order. The bottom half adopts cool gray and dark maroon shades, representing betrayal and chaos, depicted with a mirror-like disruption to signify breakdowns in trust. The composition flows diagonally, capturing an emotional rise and fall, while strategically placed negative spaces prompt reflection, enhancing the overall tension and complexity between love and betrayal.</desc>
