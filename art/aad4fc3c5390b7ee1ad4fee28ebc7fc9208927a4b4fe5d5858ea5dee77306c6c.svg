<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Forces</title>
  <desc id="desc">This artwork embodies the emotional tension between defiance and submission through a dynamic color palette. The moss green and rust serve to illustrate defiance with energy, while the softer bone white and stone gray evoke a sense of submission and quietude. The central spiral of deeper colors creates a pressure point, surrounding an open space that represents unresolved feelings. The contrasting elements collide predominantly in the central area, which emphasizes the struggle visually without literal representation. The broken pixels introduce disruption, enhancing the feeling of imperfection and collision throughout the piece.</desc>
