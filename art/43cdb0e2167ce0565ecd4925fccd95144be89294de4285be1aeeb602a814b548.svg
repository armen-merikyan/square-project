<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Order and Chaos</title>
  <desc id="desc">This piece plays on the emotional duality of panic and control. The palette, rooted in deep navy and contrasting stark white, captures solitude and chaos. The asymmetrical arrangement of dark-to-light pixels creates an unsettling balance, manifesting the seed's tension. They hint at a struggle where the central area, rich with saturated colors, represents control, clashing with the faded stripes at the edges, embodying the encroaching panic. This structured disorder forms a narrative of impending pressure without literal imagery.</desc>
