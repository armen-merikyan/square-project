<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece explores the emotional tension between vulnerability and strength, characterized by a pale exposed center surrounded by darker, heavy borders. The color palette draws from soft mint and sky for lightness, contrasting with storm gray and near-black for density. The collision occurs at the center where the grid pattern of vulnerability interacts with the surrounding ring structure of strength, creating an asymmetrical yet dynamic composition. The layout leads the viewer's eye outward in a spiral, emphasizing the interplay between exposed centers and protective edges.</desc>
