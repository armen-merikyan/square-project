<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaotic Harmony</title>
  <desc id="desc">The artwork captures the emotional tension between signal and noise, with deep navy as a calming backdrop symbolizing clarity and focus. The scattered dots of dim cyan represent interruptions and echoes, while stark black reflects the hard edges and chaos. The central collision occurs in the middle, where the noise pattern intersects with the signal—a few broken pixels strategically disturb the rhythm, portraying the concept of a signal trying to break through the chaos. This interplay embodies the struggle of maintaining order in a world of randomness, translating the emotional seed into an abstract structure.</desc>
