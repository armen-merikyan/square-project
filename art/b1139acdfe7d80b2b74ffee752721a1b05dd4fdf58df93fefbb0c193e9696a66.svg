  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This artwork reflects the emotional tension between safety and exposure, with a core of warmth surrounded by cool, contrasting depths. The combination of glitch and noise patterns introduces a dynamic presence that plays between the secure center and the unfolding borders. The light warm brown and pale skin colors emerge, representing exposure, while cooler colors frame them, echoing the protective aspect of safety. The arrangement hints at pressure and release as warmer tones densely populate the center, gradually giving way to colder, softer edges.</desc>
