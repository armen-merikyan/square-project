<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Currents</title>
  <desc id="desc">This piece captures the emotional tension between softness (gentle pastel hues) and severity (deep, stark colors) to illustrate the delicate passage of signals amidst noise. Colors like powder pink and warm white embody softness, while carbon black and steel gray represent severity, creating a conflict at the center of the square. The structure emphasizes this central collision, expressing how softness occasionally breaks through harsh boundaries, yet remains undercut by the pervasive presence of darker tones.</desc>
