<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition explores the emotional tension between emptiness and desire, creating a visual narrative of pull and containment. The palette combines warm colors representing desire (hot coral, blood orange) with cooler, muted shades to represent emptiness (charcoal, hollow blue). The main collision of tones occurs at the center, where stacked blocks of warm hues clash against the surrounding quiet fields, symbolizing the struggle between overwhelming desire and the weight of restraint. Broken pixels add intentional disruption, mirroring the chaotic nature of these emotions.</desc>
