<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a struggle between the desire represented by saturated colors and the emptiness created by muted tones and negative space. The palette includes hot coral and blood orange to symbolize the pulsating desire, while the hollow blue and charcoal suggest containment and emptiness. The main collision occurs in the center with vibrant colors meeting the subdued edge, illustrating the push and pull of desires that reach towards but are confined by boundaries. The interplay of frame and fault line patterns visually narrates this tension, creating an abstract representation of longing restrained.</desc>
