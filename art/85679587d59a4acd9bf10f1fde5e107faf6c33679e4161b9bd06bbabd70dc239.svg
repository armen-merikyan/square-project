  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork embodies the emotional tension between spark and ash, utilizing a palette of soft cyan, lavender gray, and muted plum to convey a sense of melancholy wonder. The main collision occurs in the center where the brighter spark colors clash with deeper ash tones, creating a dynamic interplay of light and dark. The layout follows a 'broken frame' where edges are disrupted, echoing the fragility of resilience. Broken pixels mar the surface, suggesting the impact of memory and erasure, while the negative space allows for a quiet pause amidst the visual tension.</desc>
