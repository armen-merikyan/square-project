<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Overflow</title>
  <desc id="desc">The emotional tone represents a struggle between the warmth of desire and the coolness of restraint. The selected palette, inspired by saturated reds and muted creams, visually conveys the push-and-pull of emotions, with warm reds dominating the composition to signify desire and cool tones providing balance and restraint. The main collision occurs at the center, where brighter colors meet muted backgrounds, echoing the tension and release in the seed's theme of love and betrayal. The lattice pattern interrupts the radial desire, embodying the conflict and dynamic interplay of energies.</desc>
