<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This artwork captures the emotional tension between restlessness and peace through an intentional play of colors and patterns. A dominant dark maroon encapsulates the edges, evoking a sense of heavy weight and an underlying restlessness, while the inner light pink and gray fields symbolize fleeting moments of peace. The abrupt collision of darker shades against the lighter core reflects the struggle between these emotions, with broken pixels adding a sense of disruption. The diagonal pattern accents convey motion, while the sealed edges create a boundary that hints at confinement. Overall, the composition embodies a dialogue between contrasting emotional states, inviting reflection on the dynamic interplay of memory and motion.</desc>
