<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Constellation</title>
  <desc id="desc">This piece explores the emotional tug-of-war between tenderness and rage, juxtaposed in an abstract format. The chosen palette of red, black, pale blue, and white symbolizes the fiery intensity of rage against the calming qualities of tenderness. Predominantly black and white field creates a canvas of quiet, from which red 'maze-like' structures emerge in the center to convey the burst of rage. Concurrently, the soft, rounded edges of the pale blue pixels provide a protective and tender contrast, creating an emotional dialogue. This collision of colors and patterns manifests the theme of broken frames, representing moments of repair amidst chaos, giving a sense of unresolved emotion that resonates with the seed's qualities.</desc>
