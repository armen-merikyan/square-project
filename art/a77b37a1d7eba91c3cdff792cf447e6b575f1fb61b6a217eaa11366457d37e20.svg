<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Chaos</title>
  <desc id="desc">The emotional tone of this piece captures the tension between confusion and clarity, represented by a stark contrast between dark and light. The selected palette of black, dark violet, soft gold, and pale green emphasizes this emotional juxtaposition, with the black and dark violet suggesting depth and confusion, while the soft gold and pale green signify moments of clarity. The layout is divided horizontally, with the top half representing clarity through a structured arrangement of bright colors that pulse in rhythm, while the bottom half conveys confusion with an irregular pattern of broken pixels and muted colors. This interplay creates a dynamic tension, evoking feelings of asymmetry and unresolved emotions, truly embodying the ‘symmetry vs break’ theme via its abstract composition.</desc>
