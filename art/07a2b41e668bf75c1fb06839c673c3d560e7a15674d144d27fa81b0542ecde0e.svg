<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoed Borders</title>
  <desc id="desc">The artwork conveys the emotional tension between desire and restraint through a carefully chosen palette of warm and cool colors. Dark shades like blackened plum and muted cream reflect the deep-seated hunger, while iron gray and small orange create a sense of urgency in the contrast. The central collision occurs where warmth meets coolness, with the maze-like patterns of desire overlapping the rippled restraint, symbolizing the push and pull of internal conflict. The negative space is intentionally utilized to signify the weight of unfulfilled longing, creating a barrier that emphasizes the edges of the emotional state.</desc>
