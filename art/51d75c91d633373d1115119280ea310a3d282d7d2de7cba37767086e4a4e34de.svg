  <title id="title">Tension of Bounds</title>
  <desc id="desc">The artwork captures the emotional dichotomy of warm, saturated tones symbolizing desire clashing against the muted, restrained edges representing boundaries. The palette features robust reds and blacks for emotional intensity, contrasted with muted creams and grays to signify the turmoil of restrained aspirations. The primary collision occurs centrally, where yearning colors spiral into a tightly controlled lattice, reflecting the push and pull of desire versus restraint, while maintaining a porous edge that hints at potential release yet remains contained.</desc>
