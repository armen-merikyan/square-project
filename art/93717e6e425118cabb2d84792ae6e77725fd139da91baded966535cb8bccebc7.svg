<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This piece captures the emotional interplay between joy and grief through its color choices and placements. The vibrant yellows and oranges invoke joy and energy, reminiscent of flames, while the deep blues and muted purples ground it in grief, embodying a heaviness that interrupts the brightness. The asymmetry achieves a split-horizontal layout, emphasizing the contrast between the chaotic brightness of joy and the subdued calm of grief. By sporadically placing broken pixels, I introduce a sense of imperfection, enhancing the tension between the two emotional states.</desc>
