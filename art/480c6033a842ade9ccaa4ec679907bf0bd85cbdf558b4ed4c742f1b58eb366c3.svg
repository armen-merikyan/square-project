<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">The artwork visually narrates the emotional tug-of-war between desire's vibrant urgency and the calming stability of restraint. A palette of hot coral and blood orange suggests the intensity of desire, while charcoal and hollow blue embody restraint. The central collision, where intense colors clash with muted ones, represents the moment of struggle, reflecting the push and pull between conflicting emotions. The 'stepwell' and 'ladder' patterns overlap, creating a rhythmic tension across the square, embodying the spiraling pressure and layered complexity of love and betrayal.</desc>
