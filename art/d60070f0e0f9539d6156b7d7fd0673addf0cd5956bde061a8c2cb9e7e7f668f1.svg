<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition embodies the emotional tug-of-war between rage and calm. Warm colors, particularly the reds, represent the chaotic and sharp emotions of rage, colliding with the cooler hues of pale blue and white that embody calmness and serenity. The palette juxtaposes vibrant, intense colors against soft, subtle tones, creating a tension that suggests an ongoing battle within the emotional landscape. The layout reflects a scattered repair, with red jagged pixels cutting through the calm, echoing the interface of energy and peace while maintaining a broken edge style that mimics tension. The dominant rage color at the center disrupts structured calming bands, suggesting an interruption of peace by overwhelming emotions, while still respecting negative space to avoid a complete visual saturation. The emotional contrast occurs at the center and edges, creating a balancing act between chaos and calm.</desc>
