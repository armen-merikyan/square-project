<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Colliding Forces</title>
  <desc id="desc">This composition embodies the emotional tension between defiance and submission through a dynamic interplay of color and structure. The palette is derived from the theme of 'awe and terror', utilizing deep teal to symbolize depth and tension while cold gold reflects the brightness of defiance. The contrast type combines rising and falling tones which signify a struggle between the two emotional states. The placement of muted black fields near the edges with luminous gold and teal spirals in the center creates a focal point of conflict, embodying the collision of bold defiance against retreating submission.</desc>
