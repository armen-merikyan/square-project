<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Eras</title>
  <desc id="desc">The artwork embodies the juxtaposition of nostalgia and progress—elements that represent a sense of memory and moving forward. The chosen palette of sepia and dust gray evokes feelings of warmth and reminiscence, while the faded blue introduces a refreshing contrast, representing forward momentum. The pattern of broken dots for nostalgia and a maze-like structure for progress creates a visually dynamic collision across the horizontal split, reflecting the tension and uncertainty in the emotional experience. The bottom-weighted layout enhances the feeling of weight, suggesting that our past holds us down, while the upper area remains open and airy, indicative of potential and future. The usage of broken pixels embodies imperfection, adding an element of chaos to the otherwise structured exploration of emotion.</desc>
