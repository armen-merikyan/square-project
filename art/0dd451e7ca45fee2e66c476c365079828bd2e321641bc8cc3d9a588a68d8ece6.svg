<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Motion</title>
  <desc id="desc">The emotional tone expresses a tension between the solidity of certainty and the fluidity of curiosity. The palette incorporates soft moss green and bone white to create a sense of calm, contrasted by rust and stone gray that introduce depth and complexity, reflecting the chaotic undertones. A small gold accent energizes the composition, allowing for moments of brightness that challenge the dominant colors. The pulse of the layout pulsates in a rising motion with dynamic interactions between maze-like patterns of certainty and braid patterns of curiosity, leading to a central collision of colors that hints at struggle and resolution. The outer edges maintain broken spaces, permitting feeling to escape, illustrating the interplay between emotional containment and release.</desc>
