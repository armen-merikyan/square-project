  <title id="title">Conflict of Elements</title>
  <desc id="desc">This artwork embodies the tension between warmth and decay, represented through a saturated palette of reds against stark blacks. The top half draws from the 'spark' emotion, showcasing dynamic stripe patterns in red, creating a sense of movement and energy. The bottom reflects 'ash', utilizing static patterns in shades of black and gray to evoke restraint and hushed memory. The central contrast occurs between these two emotional states, emphasizing the collision of vibrancy and muted tones, symbolizing the inextricable link between vitality and loss, activity and stillness.</desc>
