<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This composition captures the emotional dichotomy of restlessness and peace, represented through a palette of greens and golds that signify growth and calmness mixed with deeper shades suggesting agitation. The layout features a quiet channel that cuts through a dense stepwell pattern, emphasizing the collision of motion with stillness. The off-center composition flows diagonally while the interrupted lines in the stepwell pattern create an unsettled border, translating the seed's essence into abstract forms.</desc>
