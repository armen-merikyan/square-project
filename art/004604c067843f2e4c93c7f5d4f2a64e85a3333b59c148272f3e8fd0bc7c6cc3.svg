<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos in Color</title>
  <desc id="desc">The emotional tone is derived from the struggle between panic and control, reflected in the contrasting patterns and colors. The palette, featuring shades of pink and dark maroon, embodies the warmth of emotion against the coldness of chaos. The central part represents control with structured crosshatch patterns, while the edges disrupt this order with chaotic cracks, suggesting an 'outside-inward' approach. This juxtaposition leads to a collision between calmness in the center and unrest at the edges.</desc>
