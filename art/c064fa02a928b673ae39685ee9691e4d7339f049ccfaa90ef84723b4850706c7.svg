<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">The emotional tone explores the tension between hope and fear, using a palette that contrasts dark violet and soft gold to embody this duality. Dark colors, reflecting fear, provide a foundation, while soft gold introduces a fluctuating sense of hope. The composition features a split emphasis, with a vertical flow suggesting the struggle between these emotions. Each color burst radiates like a flame, while the glowing edges create a transition effect. The absence of symmetry creates a sense of unresolved tension, representing the machine-like nature of emotional struggles. With at least 10% negative space, the piece leaves room for interpretation, emphasizing the collision of feelings rather than structured form.</desc>
