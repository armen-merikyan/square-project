<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragile Resilience</title>
  <desc id="desc">This composition embodies the tension between vulnerability and strength through the juxtaposition of light, soft colors and dark, heavy hues. The palette of pale mint, storm gray, and faded gold offers a sense of calm drifting into confrontation, reflecting the emotional battle in the seed. The central diamond shape represents the core of strength, heavily contrasted by the surrounding patterns mimicking vulnerability, characterized by thin, interrupted lines. This collision is vivid in the middle rows where lighter hues meet darker backgrounds, shaping a poignant visual narrative of balance and disruption.</desc>
