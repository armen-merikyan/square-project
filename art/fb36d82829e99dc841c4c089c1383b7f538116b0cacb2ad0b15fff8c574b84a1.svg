<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Calm and Chaos</title>
  <desc id="desc">This abstract piece embodies the emotional tug-of-war between restlessness and peace. The left side features a cool color palette representing tranquility, with soft ambers and deep slates forming a broken frame that suggests stability. Conversely, the right side erupts into warm corals and intense cyans presenting a chaotic burst of energy and urgency. The central collision point manifests as a diagonal argument where the quiet warm ambers clash against restless cool hues, embodying the disruptive but harmonious relationships in memory and motion. Broken pixels are used to intentionally disrupt the flow, invoking scars of memory amidst smooth gradients. The overall composition oscillates between quiet space and dense clusters reflecting unresolved tension.</desc>
