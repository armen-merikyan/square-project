<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone of this piece oscillates between the saturation of desire and the constraints of restraint. The palette features deep, rich tones of red oxide and blackened plum that embody the fervor of longing, while muted cream and iron gray represent the boundaries that hold this desire at bay. The diagonal layout juxtaposes a ladder pattern, suggestive of aspiration, against a checker pattern that symbolizes limitation, creating a powerful collision of forces. The sealed edges imply a tension, as colors press toward the border without escaping, encapsulating the struggle between yearning and containment.</desc>
