<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symphony of Tension</title>
  <desc id="desc">The emotional tone reflects the juxtaposition of panic and control, manifesting in a palette that oscillates between the warm hues of joy (yellow, orange) and the cool depth of grief (deep blue, muted purple). The contrast is stark, with warmer patterns—spiky and chaotic—colliding against cooler, ring-like formations suggesting stability. The positioning conveys a central spark of warmth surrounded by a chaotic aura, illustrating the central theme of emotional conflict, as the edges show more controlled colors while the center disrupts with brighter hues. This captures the oscillation between feeling overwhelmed and regaining composure.</desc>
