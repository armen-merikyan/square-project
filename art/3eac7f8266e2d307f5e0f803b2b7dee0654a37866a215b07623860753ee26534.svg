<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">The emotional tone captures the push-pull between longing and resolve, where the muted colors reflect the depth of yearning contrasted by the strength of resolve. The palette, drawn from shades of red oxide and blackened plum, establishes an atmosphere of hunger tempered by restraint, creating tension. The primary collision occurs off-center, where quiet fields of muted cream and iron gray collide, creating a visual heartbeat—suggestive of pulse, while the scattered broken pixels introduce imperfections, symbolizing repair against damage. The layout allows negative space to breathe, emphasizing the contrast between emotional states.</desc>
