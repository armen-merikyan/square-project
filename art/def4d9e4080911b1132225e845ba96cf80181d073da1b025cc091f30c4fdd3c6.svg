<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Motion</title>
  <desc id="desc">The emotional tone balances the defiance of bright colors against the submission of muted tones. The palette of pink, red, gray, and dark maroon evokes a spectrum of conflicting feelings. The central area bursts with intensity, while the edges recede, creating a quiet channel. The falling pixels layout draws the eye downwards, suggesting a tension between upward ambition and downward retreat, embodying the contrasting themes of order vs chaos and open vs closed. The deliberate placement of broken pixels adds imperfection, marking the threshold of emotional transitions.</desc>
