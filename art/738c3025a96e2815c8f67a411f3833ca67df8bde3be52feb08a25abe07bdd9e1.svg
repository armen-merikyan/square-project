<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order Amidst Chaos</title>
  <desc id="desc">This composition embodies the emotional tension between trust and suspicion through contrasting patterns and colors. The palette of burnt orange and dark red conveys deep emotions, while the muted tones of charcoal serve as a quiet background, representing suspicion. The dominant section composed of 'stepwell' patterns symbolizes trust, creating a structured calmness that contrasts sharply with the 'stripe' patterns of suspicion. The main collision occurs where trust meets suspicion in the central rows, creating visual tension that mimics the emotional narrative from balance to unrest.</desc>
