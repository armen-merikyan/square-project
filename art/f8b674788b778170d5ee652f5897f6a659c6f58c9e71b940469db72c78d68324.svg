<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Symmetry</title>
  <desc id="desc">This piece represents the emotional collision between clarity and confusion, creating a push and pull that reflects the pressures of expression and release. The selected palette of burnt orange and dark red juxtaposed with charcoal and gold evokes a sense of warmth and intensity against an undercurrent of shadow and depth. The placement of dark colors creates dense pockets of pressure, while scattered lighter tones represent moments of relief and clarity among confusing patterns. The broken edge style introduces an imperfection, emphasizing the theme of 'false symmetry' through unevenness, leading the viewer through the maze-like confusion before settling into moments of stark contrast that glide smoothly along the diagonal rise flow.</desc>
