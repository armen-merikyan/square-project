<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">This artwork embodies the emotional struggle between envy and gratitude. The palette of deep reds and stark blacks represents the intense, often destructive nature of envy, while the soft hues of pale blue and white symbolize the calm and uplifting essence of gratitude. The contrast flows from the outer borders, filled with dark and dense colors, towards a lighter central core, echoing the tension between the noisy, chaotic edges and the serenity sought within. The inner 4x4 grid features a structured pattern reflecting the order of gratitude amid the surrounding turmoil of envy. Broken pixels throughout add an imperfection that mirrors the complexity of these emotions within a confined space.</desc>
