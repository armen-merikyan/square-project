<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Contrast</title>
  <desc id="desc">The emotional tone navigates the tension between envy and gratitude, presented through a palette of soft pinks and deep maroons that reflect the complexity of these feelings. The center has a cluster of grayish tones to symbolize the presence of fear and uncertainty, while the edges dissolve into warmer colors, representing hope and gratitude. A collision occurs where the darker maroon meets the lighter hues, creating a visual contrast that embodies the ongoing dialogue between opposing emotions. The pattern incorporates broken dots to represent gratitude against a framework of envy, aligning with the 'empty room' concept to emphasize space and the 'crack' as a reminder of fragility. This composition invites viewers to explore the vivid intricacies of these feelings while maintaining an abstract narrative.</desc>
