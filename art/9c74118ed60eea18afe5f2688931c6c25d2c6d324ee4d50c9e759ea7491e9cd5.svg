<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Pulse</title>
  <desc id="desc">The artwork embodies the tension between clarity and interference, symbolizing the struggle of a clean pulse against layers of noise. Utilizing a palette of 'signal green', 'electric blue', 'dead black', 'static gray', and 'hot magenta', I aimed to represent clear signals colliding with chaotic noise. The composition fills one corner excessively, generating pressure that contrasts with the quieter areas, thereby reflecting memory versus erasure through its intensity and negative space. The patterned chaos of barcode and fault lines echoes the emotional collision of memories with distortions, manifesting a dialogue between presence and absence.</desc>
