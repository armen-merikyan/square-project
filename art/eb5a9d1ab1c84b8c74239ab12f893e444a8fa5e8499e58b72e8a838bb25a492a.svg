<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a tension between desire and emptiness, using a palette that oscillates between saturated warmth and deep coolness. The chosen colors—hot coral, blood orange, dust pink, charcoal, and hollow blue—represent the pulsating pull of desire conflicting with the confines of restraint. The main collision occurs in the center where the warm channels of desire disrupt the colder, scar-like patterns of emptiness, capturing the essence of a longing that cannot quite overflow. This arrangement is intentionally scattered with broken pixels to symbolize the imperfections and scars of yearning.</desc>
