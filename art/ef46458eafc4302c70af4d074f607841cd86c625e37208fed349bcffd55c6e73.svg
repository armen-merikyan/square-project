<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">hunger_vs_restraint</title>
  <desc id="desc">This abstract composition embodies the emotional pull between emptiness and desire. The palette of warm coral and orange hues suggests a fiery yearning contrasted against cooler shades of charcoal and hollow blue representing a sense of absence. The arrangement features a dense center, indicating the presence of desire, surrounded by quieter, muted colors that signify emptiness. The deliberate breaks in the edges create moments of interruption, echoing the conflict between overflowing yearning and solid containment. This collision of colors and patterns invites contemplation of how desire often clashes with perceived limitations.</desc>
