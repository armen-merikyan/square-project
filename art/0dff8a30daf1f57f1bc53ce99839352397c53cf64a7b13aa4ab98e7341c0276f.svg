<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Extremes</title>
  <desc id="desc">This composition reflects the emotional pull of softness and severity through a split layout. The left side, saturated in soft tones like powder pink and warm white, embodies a gentle, inviting feel, while the right side, featuring sharp crimson and carbon black, introduces harsh contrasts that signify restraint. The lattice pattern on the soft side visually softens the interaction, while the negative cross on the severe side creates a striking disruption, culminating at the center where both emotions collide. This arrangement illustrates conflicting feelings, creating a narrative of guilt and forgiveness that ebbs and flows, mirroring the pulse and weight of the seed's themes.</desc>
