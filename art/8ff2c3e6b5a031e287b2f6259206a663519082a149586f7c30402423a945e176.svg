<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Balance</title>
  <desc id="desc">This composition captures the emotional tension between vulnerability and strength through a palette of deep blue, muted purple, vibrant orange, and soft yellow. The deep blue represents strength, while patches of soft yellow symbolize vulnerability. The main collision occurs in the center, where strong blocks of blue and orange overlap with softer, more scattered elements of yellow and muted purple, suggesting an uneasy coexistence. The layout creates a sense of empty space, enhancing the impact of the central conflict, while the broken pixels add an intentional imperfection that echoes fragility.</desc>
