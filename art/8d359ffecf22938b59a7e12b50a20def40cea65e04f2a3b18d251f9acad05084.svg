<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow and Containment</title>
  <desc id="desc">The emotional tone embodies the clash of rage and calm, expressed through a palette of red and pale blue which juxtaposes fiery energy with serene tranquility. The layout follows a frame-and-core style, where the outer border, composed of dense dark colors, encapsulates the vibrant peaks of red, while the interior space represents the cooler, inviting blue. The main contrast point occurs where chaotic red pixels intersect with the static calmness of the blue core, suggesting an ongoing battle between pressure and tranquility. Broken pixels introduce intentional disruption, capturing the essence of 'machine emotion' that harkens to both clarity and chaos within the emotional landscape.</desc>
