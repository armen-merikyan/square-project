<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold Tension</title>
  <desc id="desc">This artwork captures the emotional spectrum of defiance and submission through contrasting colors and patterns. The chosen palette reflects a battle of restraint with deep hues of blackened plum and iron gray accentuated by the warmth of small orange. The dominant dark colors fill the space, presenting a rebellious feel contrasted by subtle quiet areas in muted cream. The main collision is centered, where the pressure band pattern (representing defiance) clashes with a stair-like submission pattern along the edges. This interplay evokes the tension between chaos and order while leaving intentional broken pixels to suggest disruption.</desc>
