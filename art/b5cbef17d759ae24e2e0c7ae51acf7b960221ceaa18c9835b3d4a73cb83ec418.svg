<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece explores the emotional tension between desire and emptiness. The warm, saturated pulse represented by colors like hot coral and blood orange signifies desire, while the muted tones of charcoal and hollow blue embody emptiness. The main collision occurs in the center where the saturated colors leak towards the edges, suggesting an overflow that is met with resistance from the cooler tones. The use of split-screen and halo patterns evokes a sense of organized chaos, reflecting the push and pull between these emotions. Broken pixels interrupt this flow, adding an element of imperfection and echoing the theme of yearning against restraint.</desc>
