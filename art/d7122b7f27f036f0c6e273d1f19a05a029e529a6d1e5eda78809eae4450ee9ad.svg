<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Opposites</title>
  <desc id="desc">The composition reflects a dance between defiance and submission through color and pattern. The palette embodies 'mourning renewal' with deep blue representing defiance and pale yellow signifying submission. This creates a charged contrast at the center, where edges crisp with the angular bright yellow pierce into the darker hues, emphasizing tension. As the diagonals rise, the quiet channel of space hints at the unresolved emotions, while scattered broken pixels introduce imperfection, symbolizing the interruptions in both themes. The grid maintains readability while revealing a complex emotional landscape that embodies the seed’s implied contrasts.</desc>
