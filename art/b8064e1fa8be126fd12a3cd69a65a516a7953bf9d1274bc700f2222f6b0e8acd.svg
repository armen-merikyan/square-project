  <title id="title">Order vs Chaos</title>
  <desc id="desc">This artwork embodies the tension between restlessness and peace through contrasting color patterns. The palette of dark navy and black intersects with dim cyan and touches of white, suggesting a depth of emotion—darkness portraying restlessness while the lighter shades offer a sense of calm. The layout creates a central collision point, where horizontal and vertical movements clash, further emphasizing tension. The inclusion of a few broken pixels adds intentional disruption, representing memories that are jarring yet significant.</desc>
