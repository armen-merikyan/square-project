<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Contrast</title>
  <desc id="desc">This piece explores the emotional tension between calm and rage, using a palette of deep blacks and vibrant reds as anchor colors for rage, contrasted by soft blues and whites representing calm. The main collision occurs at the center where jagged reds pierce through the cool calm colors, symbolizing intrusion and emotional disruption. The flow of the piece is diagonal, implying a movement from chaotic emotion to quieter spaces, reflecting the seed’s themes of signal vs. noise and overflowing containment.</desc>
