<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Control and Panic</title>
  <desc id="desc">This artwork captures the emotional struggle between control and panic through a stark contrast of dark and light colors. The palette of deep blacks and vibrant reds, heightened with touches of pale blue and white, evokes a sense of urgency and conflict. The outer ring of black signifies the heavy weight of panic, while the bright inner core reflects moments of control and clarity, suggesting a fight within an empty room. The pattern of dense chaos versus structured grids illustrates this emotional turbulence, with broken pixels adding an imperfect, raw edge to the composition, enhancing the feeling of instability.</desc>
