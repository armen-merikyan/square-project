<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Conflict</title>
  <desc id="desc">This artwork encapsulates the emotional tone of 'softness vs severity' through an interplay of muted and vibrant colors, suggesting a struggle between gentle and harsh contrasts. The palette of powder pink, warm white, carbon black, steel gray, and sharp crimson embodies the theme of comfort versus rigidity. The layout spirals outward from a central point to signify expanding thoughts and feelings, with soft gradients colliding with harsh blocks of color, representing various emotional weights. The broken pixels disrupt the smooth areas to add depth, echoing the dance between guilt and forgiveness, enhancing the abstract nature of the piece.</desc>
