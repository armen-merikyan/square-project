<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Balance</title>
  <desc id="desc">The emotional tone captures the tension between defiance and submission, reflecting an urgent contrast that drives the viewer through a conflicted space. The palette of dark navy and black provides a stark, muted base, symbolizing order and chaos intertwined, while dim cyan and white accentuate moments of clarity and echo. The main collision occurs at the center where broken dots (defiance) clash with a maze pattern (submission), creating a visual interruption within the structured border. The layout of the outer border shows submission, enforcing a sense of confinement, while the core explodes with defiance, suggesting an unresolved emotional struggle, capturing the essence of the seed's themes.</desc>
