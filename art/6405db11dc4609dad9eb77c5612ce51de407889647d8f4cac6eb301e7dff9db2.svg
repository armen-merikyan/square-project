<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast in Motion</title>
  <desc id="desc">The emotional tone navigates between joy and grief, using a palette of yellow and deep blue to express warmth and heaviness. The grid-like arrangement represent order, juxtaposed with zigzagging patterns that convey chaos, suggesting the rise and fall of emotions. The bright colors are concentrated off-center, creating a significant contrast with the muted background, illustrating the collision between joy (represented with bright yellows and oranges) and grief (wrapped in deep blues and muted purples). This composition evokes feelings of pushing through despair with glimmers of hope.</desc>
