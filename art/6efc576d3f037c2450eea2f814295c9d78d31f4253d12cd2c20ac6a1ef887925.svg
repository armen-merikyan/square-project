  <title id="title">Duality in Motion</title>
  <desc id="desc">This artwork explores the emotional tension between awe and terror, utilizing a contrasting palette of vibrant yellow and muted purple. The outer rows, dominated by deep blues and muted purples, evoke a sense of chaos and depth, contrasting with the bright centers of yellow and orange that symbolize moments of awe. The pattern reflects instability with broken pixels, suggesting fragmented memories and disrupted stability. The layout separates contrasting energies—frame against core, fostering a visual narrative of confrontation yet coexistence.</desc>
