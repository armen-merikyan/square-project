<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">The emotional tone explores the dichotomy between trust and suspicion, utilizing a palette that reflects relief and dread. The soft mint and faded gold suggest hope and warmth, contrasting sharply with storm gray and near black, which embody unease and pressure. The layout emphasizes a diagonal argument, with trust (grid) forming a pattern across the left and suspicion (constellation) pressuring from the right, leading to an intense collision in the center. This interplay of colors and patterns echoes the complex nature of the emotional themes presented in the seed.</desc>
