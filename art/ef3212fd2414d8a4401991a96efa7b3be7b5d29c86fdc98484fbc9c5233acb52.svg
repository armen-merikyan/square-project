<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Emotion</title>
  <desc id="desc">This composition explores the tension between rage and calm through a palette dominated by striking red against serene pale blue and white, embodying sharp contrasts and quiet depths. The main collision emerges in the central area where mirror-like jagged red patterns disrupt the gentle stair-like arrangements of blue and white, illustrating the push-and-pull between explosive energy and a calming presence. The layout reflects the idea of two pulsating forces moving toward each other, emitting feelings of pressure and release as the hard edges of red intersect with the calm of the cooler tones. Broken pixels lend an intentional imperfection, suggesting the chaos often found within subtlety, allowing for a more profound emotional narrative to unfold.</desc>
