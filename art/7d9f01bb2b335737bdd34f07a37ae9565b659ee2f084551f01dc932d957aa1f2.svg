<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in the Void</title>
  <desc id="desc">The artwork captures the emotional tension between panic (turmoil represented by saturated shades) and control (calmness depicted with soft earth tones). The palette of sepia, tan, and dust gray contrasts with bursts of faded blue, symbolizing the struggle of spark against weight. The pixels depict a near symmetry disrupted intentionally, representing the 'broken' aspect of control in chaos, with dense clusters emerging from a quiet backdrop. Light and dark tones create a dialogue of weight versus lightness, echoing the seeds' themes of inner turmoil and stability.</desc>
