  <title id="title">Contrast of Exposure</title>
  <desc id="desc">This composition embodies the emotional tension between vulnerability and strength through a contrasting palette of dark and light. The main collision of color happens at the center, with soft yellows suggesting exposure fighting against the deep blues that symbolize shelter. The arrangement of broken dots leads to a sense of movement and rising hope amid the heavier tones, reflecting the theme of strength emerging from a vulnerable state. The chosen colors highlight the quiet spaces against dense clusters, creating a palpable tension between calm and pressure.</desc>
