<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">The emotional tone of defiance against submission is conveyed through the contrasting color palette of warm yellows and oranges against deep blues and muted purples. The arrangement plays out in a dynamic left-to-right flow, suggesting movement while also trapping the weight of the darker colors towards the bottom, embodying conflict. The patterns of sparks and rings represent the clashing emotional states, creating echoes of pressure around a central void, implying tension and unresolved feelings. The broken pixel effect introduces imperfection, echoing the unpredictability of love and betrayal, while maintaining a contemporary abstract form without literal representation.</desc>
