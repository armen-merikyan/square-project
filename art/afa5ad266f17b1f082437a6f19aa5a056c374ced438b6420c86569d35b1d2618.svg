<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Divided Essence</title>
  <desc id="desc">The emotional tone juxtaposes warmth associated with love against the coldness of betrayal. The chosen palette of pink, red, gray, and dark maroon reflects affection and emotional conflict. The left side uses a crosshatch pattern, representing love's complexity and connection, while the right is marked by sharper, striped forms to illustrate the starkness of betrayal. The contrast, highlighted by gray and red, symbolizes the tension of duality. The use of broken pixels breaks the monotony, enhancing feelings of imperfection and discord, and invites introspection in this abstract visual narrative.</desc>
