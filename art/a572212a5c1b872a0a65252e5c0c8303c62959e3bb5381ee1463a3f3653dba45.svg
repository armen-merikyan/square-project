<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone reflects a struggle between desire and emptiness, using a palette that juxtaposes warmth and coolness. The colors chosen — hot coral and blood orange symbolize the vibrant pull of desire, while charcoal and hollow blue evoke a sense of emptiness and restraint. The layout features a bright cluster (desire) focused at the center contrasting with the surrounding lattice pattern of muted tones (emptiness). The main collision occurs at the center where warmth clashes against the cooler edges, mirroring the emotional tension implied by the seed. Overall, this composition effectively communicates the theme of desire restrained by an outer boundary, visually captured through expected patterns of saturation and subtle distance.</desc>
