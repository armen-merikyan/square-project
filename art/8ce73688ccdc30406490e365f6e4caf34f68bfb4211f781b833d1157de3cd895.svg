<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Horizons</title>
  <desc id="desc">This artwork captures the emotional tension between awe and terror by utilizing a palette of vibrant lime, electric blue, and magenta against a grounding black. The left side of the composition follows an orderly pattern, representing awe, while the right side is fragmented and chaotic, evoking terror. The soft edges create a gentle transition between the two contrasting halves, with broken pixels enhancing the sense of instability and memory loss. This choice reflects the duality of human experience—hope and fear colliding in a suspended moment.</desc>
