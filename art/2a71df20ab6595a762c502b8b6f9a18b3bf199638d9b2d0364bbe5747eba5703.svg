<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Signal</title>
  <desc id="desc">This artwork embodies the emotional contrast between 'signal' and 'noise'. The palette combines deep 'dead_black' with bright 'hot_magenta' to navigate through conflicting edges, suggesting a sharp divide between clarity and distortion. The main collision occurs centrally, with a complex maze pattern interrupted by checker-like static, reflecting the idea of a readable pulse trying to survive amidst interference. The subtle use of broken pixels adds imperfection and depth, representing the struggle between memory and erasure, while the rising layout hints at hope breaking through static noise.</desc>
