<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Longing and Resolve</title>
  <desc id="desc">This composition embodies the emotional tension between longing (represented by soft, muted colors) and resolve (depicted by bolder, structured hues). The selected palette of shelter green, warm brown, pale skin, cold white, and open blue creates contrasts that evoke warm nostalgia against a backdrop of cold clarity. The main collision occurs diagonally, where the patchwork of longing meets the framing structure of resolve, illustrating the push and pull of these emotions. Broken pixels add intentional disruptions, mirroring the imperfection in balancing these feelings. A quiet space surrounds the denser patches, allowing the viewer to reflect on the interplay of intimacy and distance.</desc>
