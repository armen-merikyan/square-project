  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition explores the tension between vulnerability and strength. The palette of soft cyan and moon white contrasts with muted plum, representing a delicate exposure against the sturdiness of clear blocks. The central area features a pale glow, indicating vulnerability, while darker colors along the edges build a sense of protection and encroaching pressure. The collision happens at the center, where the two emotional states pulse toward each other across the expanse of negative space, suggesting an unresolved tension.</desc>
