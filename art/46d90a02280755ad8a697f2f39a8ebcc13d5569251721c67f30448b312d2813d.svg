<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Motion</title>
  <desc id="desc">This artwork explores the tension between clarity and confusion, utilizing a palette that juxtaposes warm and cool tones. The presence of soft yellow and orange signifies clarity, while deep blue and muted purple evoke confusion, creating a visual discord. The chosen layout flows from one corner, illustrating the invasion of calm (yellow/orange) that steadily becomes more fractured and jagged (deep blue/muted purple) towards the opposite edge. The arrangement emphasizes a collision between dense clusters of color and patches of negative space, representing both the pressure of clarity and the chaotic dissonance of confusion. The broken pixel elements enhance this sense of imperfection, echoing the emotional theme of machine emotion, as they interrupt the harmony. Overall, this 8x8 piece encapsulates a dual narrative where clarity struggles to emerge from the chaos, embodying the essence of the seed text in a truly abstract manner.</desc>
