<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Static Pulse</title>
  <desc id="desc">The emotional tone balances between chaos (represented by dark, muted tones) and clarity (the bright, striking color at the center). The palette of navy, black, dim cyan, and white symbolizes loneliness and struggle against noise. The main contrast occurs in the center where a pressure band ascends amidst a staggered, ladder-like noise, echoing the disruption of signals in a chaotic environment. The arrangement of colors emphasizes a sense of rise and hope, despite the sharp interruptions, reflecting the journey from noise to a clearer signal.</desc>
