<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of confusion versus clarity, using the defined palette of sepia tones to evoke nostalgia and depth while contrasting fragments of noise across the composition. The left side embraces a fractured pattern with overlaying frames representing the confusion, while the right balances it with smoother transitions suggesting clarity. The jagged edges introduce tension, emphasizing the break in symmetry and creating a pulse of energy that echoes throughout the piece. The application of broken pixels further enhances the theme of imperfection in the search for clarity.</desc>
