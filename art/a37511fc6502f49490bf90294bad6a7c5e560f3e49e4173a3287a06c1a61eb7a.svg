<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Weight</title>
  <desc id="desc">This piece embodies the emotional tug-of-war between defiance and submission through its structured color contrast. The color palette of dark violet, soft gold, and pale green symbolizes the interplay between heavy emotions and light hopes. The layout rises from the bottom, suggesting a hopeful ascent amidst struggles. The broken pixel application introduces imperfections, reflecting the chaos inherent in love and betrayal. The bottom-weighted design accentuates the pressure of submission while the outlined patterns (stairs and checker) embody both the defiant and submissive tensions, creating a dynamic yet structured visual narrative.</desc>
