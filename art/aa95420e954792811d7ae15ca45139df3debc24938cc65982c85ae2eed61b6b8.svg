<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos and Serenity</title>
  <desc id="desc">This piece embodies the emotional tension between rage and calm, achieved through a contrasting palette of deep reds against pale blues and blacks. The chaotic 'broken_dots' pattern represents the intensity of rage, while the 'patchwork' formation provides containment and serenity. The center features a burst of red, symbolizing a heated conflict, surrounded by a calmer blue field, creating a boundary that captures the emotional collision. The jagged edges enhance the feeling of disruption and urgency. Negative space is utilized to maintain tension without overwhelming the senses.</desc>
