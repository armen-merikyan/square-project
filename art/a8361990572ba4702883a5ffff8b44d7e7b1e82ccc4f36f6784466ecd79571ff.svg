<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tidal Conflicts</title>
  <desc id="desc">This piece encapsulates the emotional clash between certainty and curiosity, embodying static disruption against a rising signal. The palette mixes soft and harsh tones—powder pink and warm white create a calm base, while carbon black and sharp crimson inject tension and urgency. The main collision occurs diagonally where curiosity floods into the steady certainty, disrupting the edges like rising tides against rigid channels. The eyes are drawn toward the interaction at the center, a heartbeat of conflict balanced with quiet negative space.</desc>
