<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Contrasts</title>
  <desc id="desc">The emotional tone oscillates between tenderness, represented by soft blue and muted whites, and rage, depicted with deep reds and stark blacks. The palette reflects this dichotomy, capturing the quietness of tenderness against the intensity of rage. The main collision occurs in the center, where angry reds clash with the calming blues, creating a dynamic push-pull effect. The pattern incorporation of 'stepwell' for rage and 'lattice' for tenderness manifests as a textured conflict, while the presence of broken pixels introduces a sense of imperfection, mirroring internal struggles.</desc>
