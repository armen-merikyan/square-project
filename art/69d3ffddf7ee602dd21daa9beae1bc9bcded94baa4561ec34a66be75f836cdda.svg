<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tear of Connection</title>
  <desc id="desc">The emotional tone contrasts loneliness and connection, using a palette inspired by ancient fire to evoke warmth against the coolness of isolation. The layout is split horizontally to mirror the emotion pairing, with rich, deep colors in the top half representing loneliness, while vibrant stripes in the bottom signify connection. The main collision occurs at the boundary of these sections, where dark pixels pierce through the warm bursts, reflecting the tension between hidden desires and exposed connections. The central tension is symbolized by broken pixels that convey imperfection amidst resilience.</desc>
