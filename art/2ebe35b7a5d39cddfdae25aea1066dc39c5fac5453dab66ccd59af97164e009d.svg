<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Points</title>
  <desc id="desc">The emotional tone of 'desire vs restraint' is captured by a high-contrast palette featuring warm saturated colors that represent desire, clashing against muted shades that convey restraint. The main collision occurs in the top left corner, where bright reds and oranges burst forth, symbolizing intense desire, while darker colors create barriers throughout the grid, representing restraint. The pattern emerges from the interplay of 'glitch' and 'split screen,' creating a feeling of chaotic pressure while maintaining an organized chaos. This reflects the pencil-thin edge of containment fused with an overwhelming sense of longing.</desc>
