<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Contrasts</title>
  <desc id="desc">This piece conveys an emotional tension between longing and resolve through a dynamic interplay of colors and forms. The palette, derived from the awe_terror theme, uses deep teal for depth and mystery, cosmic indigo for nostalgia, and cold gold as an accent to highlight moments of hope and complexity. The jagged edges amplify the feeling of discord, suggesting both damage and repair. The main collision occurs in the center, where patches of deep teal disrupt the veil-like patterns of cosmic indigo, reflecting a struggle for balance and harmony. The negative space allows for contemplation, making the viewer aware of the longing amidst the chaotic resolution, echoing the seed's themes of pulsation and interruption.</desc>
