<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Self</title>
  <desc id="desc">This abstract art explores the emotional tension between tenderness and rage. The palette of deep reds and muted blacks represents the tumultuous clash of these feelings, while the pale blue acts as a calming force in the composition. The layout features a scattered repair motif, where larger blocks of deep color interrupt smaller, brighter tones, creating a stark contrast that invites contemplation. The main collision occurs centrally, where the rage in saturated red meets the quiet reflection of pale blue, embodying the struggle between raw emotion and a yearning for calm. This arrangement forms an emotional channel that resonates with the seed's themes of duality and introspection.</desc>
