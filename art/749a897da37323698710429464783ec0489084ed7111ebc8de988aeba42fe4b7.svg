<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Duality</title>
  <desc id="desc">This square embodies the emotional tension between desire and restraint. The saturated colors represent the fervor of longing, while the muted shades symbolize containment. The central area reveals a collision with warmer reds and oranges juxtaposed against cooler grays and blacks, creating a stark contrast that emphasizes the struggle. The patterns of stairs (desire) rise against the braided restraint, illustrating the upward pull of yearning within enforced boundaries. The visually interrupting broken pixels add an element of chaos, embodying the push and pull of emotion.</desc>
