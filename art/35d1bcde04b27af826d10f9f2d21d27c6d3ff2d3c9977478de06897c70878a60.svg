<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone of this artwork juxtaposes feelings of restlessness and peace, expressed through a strategic placement of colors that create tension and calm. The palette of moss green, bone white, rust, stone gray, and small gold conveys a sense of resilience against fragility, embodying both coercive and soothing qualities. The contrast is primarily manifested in the central area where the pale moss green meets a chaotic stack pattern of rust and stone gray. This collision resonates with the notion of a gate left open, whether for peace to enter or for restlessness to invade. Throughout the piece, broken pixels act as intentional disruptions, emphasizing the narrative of tension within tranquility, with a significant amount of negative space ensuring visual breathing room, reflective of a whisper of peace juxtaposed against the harsher accents of rust. The flow captures the waves of memory versus motion, and the layout suggests an opening rather than a closure, enhancing the dynamic interplay of emotion and space.</desc>
