  <title id="title">Pulse Between Shadows</title>
  <desc id="desc">This artwork expresses the emotional duality of longing and resolve through a carefully chosen palette of burnt orange, dark red, charcoal, and gold. The warm tones represent longing, with barcodes suggesting a rhythmic tension, while the lattice pattern in the darker tones depicts the steady strength of resolve. The main collision occurs between the center rows, where the two emotional patterns intertwine, creating an echo of unresolved emotion against a backdrop of quiet space, fostering a narrative of intimacy and distance. The inclusion of broken pixels symbolizes the imperfections of yearning, while maintaining a clear negative space to emphasize the emotional pull within the grid.</desc>
