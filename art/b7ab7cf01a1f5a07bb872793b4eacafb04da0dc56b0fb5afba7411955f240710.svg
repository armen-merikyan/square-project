<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Harmony</title>
  <desc id="desc">This artwork conveys the emotional tone of longing clashing with resolve through dense color arrangements. The chosen palette of warm ivory, soft gold, deep wine, ash gray, and stain brown expresses the complexities of intimacy and constraint. The main contrast occurs at the center, where overlapping patterns of flood and veil create an ocular pulse that echoes between warm and cool tones. Negative spaces complement the visual texture, allowing the eye to navigate the layered conflict between contained forms and free-flowing spaces, inspired by the concept of a knot.</desc>
