<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ember and Flame</title>
  <desc id="desc">This artwork embodies the tension between the ignited potential of 'spark' and the tranquil decay of 'ash'. The contrasting palette of warm coral and soft amber against cold slate and blue-black creates a visual interplay of smooth and jagged edges, evoking both resilience and fragility. The collision at the center, where warmth confronts cool tones, suggests a narrative of struggle and memory, where elements of hunger and restraint play out in an abstract landscape. The layering creates a rhythm that echoes the push and pull of energy, leaving intentional broken areas that symbolize moments of memory lost or fragmented.</desc>
