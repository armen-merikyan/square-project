<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Pulses</title>
  <desc id="desc">This piece explores the tension between clarity and chaos, where a vibrant green pulse struggles to exist amid static distractions represented by darker colors. The palette emphasizes a bright accent (#00FF00) that stands out against a backdrop of muted tones, creating a push-and-pull sensation in the composition. The edge style emphasizes hard contrasts, with broken pixels introducing intentional irregularities, echoing themes of disruption and imperfection. The main collision occurs near the center of the square, where the bright green connects with the static gray, symbolizing an attempt to find order within chaos.</desc>
