  <title id="title">Overfilled Compass</title>
  <desc id="desc">This artwork captures the tension between control and surrender, with dense clusters of warm tones colliding against the cooler, open areas. The palette of hot coral and blood orange represents the heavy pressure of control, while the dust pink and hollow blue evoke a sense of gentle surrender. The central design is thick and irregular, symbolizing overflow and a thick outline, contrasted by lighter edges, suggesting release and breath. The emotional story unfolds through a collision of warmth meeting the coolness, demonstrating interaction between contrasting feelings.</desc>
