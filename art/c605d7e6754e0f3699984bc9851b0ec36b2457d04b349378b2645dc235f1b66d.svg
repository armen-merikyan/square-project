<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">This abstract artwork embodies the conflict between desire and restraint through a deliberate color palette and spatial arrangement. The warm hues of red oxide and small orange represent desire, pulsing through the grid in a ladder-like pattern, attempting to overflow beyond the sealed edges. In contrast, the cooler shades of blackened plum and muted cream create a flame-like pattern, symbolizing the restraint that seeks to contain this warm pull. The interplay of these patterns creates a visual tension that captures the essence of conflict, echoing the emotional depth of the seed. The main collision occurs centrally, where warm and cool tones are nearest, creating a dynamic center that draws the eye. Negative space is preserved to imply constriction and choice, while broken pixels introduce an element of imperfection, reinforcing the themes of love and betrayal.</desc>
