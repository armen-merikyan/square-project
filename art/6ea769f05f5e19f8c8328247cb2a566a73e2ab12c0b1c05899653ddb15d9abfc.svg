<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Resistance</title>
  <desc id="desc">This artwork conveys the tension between defiance and submission. The palette, composed of moss green, bone white, rust, stone gray, and small gold, suggests resilience embedded within fragility, reflecting the struggle between the two emotions. The main collision occurs in the center, where darker colors suggest defiance push against lighter, more submission-oriented tones, creating a sense of pressure. The 'falling_pixels' layout with the 'teeth' and 'glitch' patterns emphasizes a sense of movement and disruption, reflective of both an inward spiral and corner invasion, evoking both resistance and the subtle pull of submission.</desc>
