<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Safety</title>
  <desc id="desc">This artwork reflects the emotional tug-of-war between vulnerability and strength. The chosen palette of mourning black (#000000), deep blue (#003366), new leaf green (#66B3A2), pale yellow (#F6EB61), and stone gray (#BDBDBD) illustrates the interplay between dark, stable colors representing strength and soft, light hues symbolizing vulnerability. The dense core of deep blue serves as a stable center, while the surrounding layers of pale yellow and green exhibit fragility. The main collision occurs at the center, where the deep blue and pale yellow collide, representing the tension of exposure versus shelter. Broken pixels in the piece introduce intentional design imperfections, evoking the unpredictability and imperfections of emotional experiences.</desc>
