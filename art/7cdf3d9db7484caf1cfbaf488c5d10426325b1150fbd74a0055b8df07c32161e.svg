<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This piece explores the tension between vulnerability and strength through a contrasting color palette of warm and cool tones—warm shadow and lamp gold suggest strength, while distant lilac and cool blue reveal vulnerability. The arrangement creates a dynamic flow, divided by a seam that represents an emotional threshold. Broken pixels introduce irregularity, enhancing the theme of exposure. The barcode pattern embodies strength, while the negative cross conveys vulnerability, creating a clash at the center of the square, representing emotional collision.</desc>
