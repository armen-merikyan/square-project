<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Dissonance</title>
  <desc id="desc">The emotional tone oscillates between trust and suspicion, creating a lively tension. The palette, derived from the love_betrayal theme, includes warm pinks and reds contrasting with darker maroons and grays, evoking a deep emotional landscape. The main collision—intense reds and soft grays—nestles in the center, where vibrant lines mimic the pattern of a 'ladder' against 'constellations', symbolizing suspicion and trust respectively. The edges give a jagged feel, representing the tension of pressure and a soft glow. This structure leaves space for contemplation while also provoking intrigue through density and interruptions, truly reflecting the complexity of the seed.</desc>
