<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">The emotional tone contrasts the feeling of panic, represented by intense colors and chaotic patterns, with a sense of control, depicted through a structured grid and cooler hues. The palette blends warm yellows and oranges for joy with deep blues and muted purples symbolizing grief, creating a visual friction. The main contrast occurs in the transition from the vibrant chaos at the top to the cooler, orderly bottom, reflecting the struggle between emotional states. The broken edges amplify tension, invoking a sense of vulnerability among structured forms.</desc>
