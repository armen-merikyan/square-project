<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Safety</title>
  <desc id="desc">This composition explores the emotional tension between safety and exposure. The color palette of warm brown and shelter green suggests security and protection, while pale skin and cold white convey vulnerability and exposure. The main contrast occurs at the center, where a shattering pattern of rigid lines collides with softer lattice forms along the edges. The structure embodies a protective embrace that intermittently breaks down, creating visual echoes of both safety and risk. The use of broken pixels introduces intentional imperfections, suggesting that even in safety, exposure lurks beneath.</desc>
