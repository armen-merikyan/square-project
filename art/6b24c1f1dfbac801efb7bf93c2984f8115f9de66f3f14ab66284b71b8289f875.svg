<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone explores the duality of love and betrayal, embodying both warm and cold hues through the chosen palette of pink, red, gray, and dark maroon. The main contrast occurs diagonally across the composition, where the soft warmth of love interacts sharply with the cooler, more muted tones representing betrayal. This tension is reflected in the 'broken line' shape, suggesting both connection and fracture, while the asymmetrical pattern creates an unresolved feeling. The design embodies a climactic rise, as if moving through a dense emotional landscape towards a breaking point.</desc>
