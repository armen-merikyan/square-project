<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">The emotional tone reflects the tension between envy and gratitude, expressed through a split-screen layout. The use of the 'ancient_fire' palette conveys warmth while introducing depth and shadows. The main collision occurs between the burnt orange of gratitude and the dark red of envy, creating a pulsating rhythm throughout. The pattern of zigzagging forms symbolizes the interrupted flow of emotions and the struggle between polarities. Broken pixels are strategically placed to represent imperfections in harmony, enhancing the abstract nature of the piece.</desc>
