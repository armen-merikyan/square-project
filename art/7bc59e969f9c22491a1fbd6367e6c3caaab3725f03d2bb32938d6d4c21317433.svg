<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Abstraction</title>
  <desc id="desc">The artwork reflects the emotional tension between love and betrayal through a contrasting palette of warm and cool colors. The warm colors (pink and red) represent love, while dark maroon and gray elements introduce a feeling of betrayal. The layout suggests descending pixels, creating a sense of falling or loss, further emphasized by the split in the flow. The broken pixels add an element of imperfection, suggesting emotional disruption. The interplay of sharp and soft edges presents a dual narrative—cohesion versus fracture—while maintaining negative space to evoke feelings of longing and emptiness.</desc>
