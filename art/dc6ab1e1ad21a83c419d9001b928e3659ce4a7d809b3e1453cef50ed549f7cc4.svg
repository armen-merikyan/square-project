<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Duality</title>
  <desc id="desc">The emotional tone contrasts defiance with submission, represented by warm hues versus muted tones. The palette features yellow and orange to signify warmth and energy for defiance, while deep blue and muted purple convey a sense of calm submission. The layout emphasizes a vertical split, allowing one emotion to confront the other. The contrast arises from the left side's brighter tones clashing against the darker, noise-patterned right side, creating tension. The staggered, stair-like pattern of defiance on the left juxtaposed with the chaotic noise on the right captures the essence of an internal struggle, highlighting themes of pressure and release. Negative space balances the composition, fostering a feeling of unresolved motion.</desc>
