  <title id="title">Dual Currents</title>
  <desc id="desc">This artwork captures the emotional tension between trust and suspicion by featuring a stark contrast between warm and cool colors. The palette consists of 'shelter green' and 'warm brown' representing trust, while 'cold white' and 'open blue' symbolize suspicion. The layout features two pulses, indicating the push and pull between the conflicting emotions. Main contrasts occur in the central rows where light and warmth intersect, creating a dialogue of noise and clarity. The intentional broken pixels disrupt symmetry, adding a sense of uncertainty and fragility reflecting the theme of the seed.</desc>
