<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erosion of Boundaries</title>
  <desc id="desc">The emotional tension between safety and exposure is captured through a palette that balances soft greens and pale tones against stark whites and warmer browns. The contrast of colors at the border and center emphasizes the feeling of vulnerability versus protection. In this abstract arrangement, the split vertical design mirrors the conflict between the ‘open center’ and ‘gentle weight’ of green and brown, creating a collision of patterns that evoke both shelter and exposure. The fragmented pixels introduce a sense of imperfection that speaks to the frailty of boundaries, supporting the narrative of the seed by intertwining 'knot-like' connections with erratic disruptions that reflect life's unpredictable nature.</desc>
