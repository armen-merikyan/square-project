  <title id="title">Tension Pattern</title>
  <desc id="desc">The emotional tone conveys a struggle between chaos and order, utilizing the palette of warm yellows and oranges against deep blues and muted purples. The central theme of panic versus control is reflected by the juxtaposition of broken dotted patterns representing control against an overarching rain pattern of chaos. The arrangement creates a collision where brighter colors at the edges represent panic while darker tones center, suggesting a battle for focus amidst turmoil. Through strategic placement, the gradients create a sense of upward movement while leaving negative space for breathing room, adhering to the rules from the seed's art direction.</desc>
