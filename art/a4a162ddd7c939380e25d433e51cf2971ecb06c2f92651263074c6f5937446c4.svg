<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Boundaries of Emotion</title>
  <desc id="desc">This composition captures the emotional tug-of-war between desire and restraint. The warm palette of hot coral and blood orange evokes a sense of saturated longing, while cooler shades like charcoal and hollow blue introduce a sense of containment. The diagonal argument layout allows the vibrant warm colors to dominate the top-left wedge, suggesting desire, while the cooler colors occupy the bottom-right, embodying restraint. The contrast between the colliding patterns of ash field and crosshatch enhances the tension, symbolizing the delicate interplay between these emotions. The piece carries an abstract tension of pressure, overflow, and containment, inviting contemplation of how opposing desires shape one's emotional landscape.</desc>
