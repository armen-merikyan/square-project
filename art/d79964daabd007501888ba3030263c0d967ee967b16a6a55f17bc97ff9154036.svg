<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Echoes</title>
  <desc id="desc">The artwork captures the emotional struggle between strength and vulnerability. The palette, inspired by 'ancient fire,' features burnt orange and gold as warm tones representing strength, while dark red and charcoal embody vulnerability's shadow. The striking contrast occurs in the center where the dense checker pattern (strength) clashes with the scattered target pattern (vulnerability) which spreads from the corner, creating a dynamic visual conflict. The broken pixels disrupt the flow, symbolizing imperfections in safety and exposure.</desc>
