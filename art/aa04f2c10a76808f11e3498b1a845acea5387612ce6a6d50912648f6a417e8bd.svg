<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos and Order</title>
  <desc id="desc">The emotional tone of this piece explores the struggle between 'panic' and 'control', reflected in the chosen palette combining dark and light tones. The colors transition from deep blacks and violets, symbolizing a heavy, panicked state, while soft golds and pale greens represent a calm, controlled response. The main contrast exists at the center, where pale greens push against the dark corners, creating a sense of unease and struggle. The pattern evokes a push and pull between controlled structure (control) and chaotic bleed (panic), aligning with the center versus edges theme.</desc>
