<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Relief</title>
  <desc id="desc">The emotional tone is captured through contrasting colors of deep black and vibrant electric blue, symbolizing dread and relief respectively. The palette evokes a mechanical sentiment through its luminescent colors against a foundational darkness, suggesting a struggle between lightness and heaviness. The weightier black shades create a sense of looming dread, while the bright electric blue gemstones interrupt that space, embodying moments of relief. The arrangement aims to present an empty room where the blue serves as an unexpected relief breaking the black mass, creating a visual tension of pressure and displacement. The flow is predominantly vertical, reflecting the descent of emotion from the top while maintaining a sense of equilibrium through asymmetrical placements that reflect breaks in symmetry, echoing the narrative of struggle through imbalance.</desc>
