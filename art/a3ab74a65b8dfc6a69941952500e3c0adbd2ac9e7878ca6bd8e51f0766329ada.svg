<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a struggle between the pull of desire, represented by saturated colors, and the confinements of emptiness, rendered through muted hues and negative space. The palette combines hot coral and blood orange, signifying the intense yearning, while charcoal and hollow blue express the calm emptiness. The main contrast oscillates at the grid's center, where saturated color collides with deeper, quieter tones, creating a visual tension that speaks to the longing for release from restraint. This arrangement reflects the seed's themes by suggesting a descent of desire that confronts the border of emptiness, underscoring the complexity of emotional collisions without resorting to direct representation.</desc>
