<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Conflict</title>
  <desc id="desc">The emotional tone captures the contrast between defiance and submission, represented by the dark assertive tones and lighter, softer shades. The palette of stain brown, ash gray, warm ivory, soft gold, and deep wine creates a dialogue between heaviness and lightness. The main collision occurs in the center, where warm ivory efforts to penetrate the deeper shadows, creating a dynamic of struggle and emergence. Patterns of stepwell and spark create layered depths juxtaposed with fleeting brightness, echoing the tension and release inherent in the seed.</desc>
