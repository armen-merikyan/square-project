<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Echo</title>
  <desc id="desc">This piece explores the tension between tenderness and rage through contrasting colors and patterns. A palette of deep red and black conveys the intensity of rage, while pale blue and white introduce moments of tenderness and calm. The collision of jagged, aggressive red shapes against the softer, muted blue suggests an emotional struggle, with rage asserting itself through dominant placements. The layout features a broken frame, allowing colors to leak and interact, creating a sense of unresolved motion. The 10% negative space echoes the internal struggle of the seed's themes.</desc>
