<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Tension</title>
  <desc id="desc">This artwork explores the emotional duality of fear and hope through jagged contrasts and soft glows. The black and dark violet outer border conveys a sense of fear with its stark, heavy presence, while the central area, filled with soft gold and pale green, suggests hope and light. The palette forms a balance of dark versus light, where the inner flame-like pattern of hope subtly collides with the outer checker-like fear. The design refrains from filling the canvas entirely, creating negative space that allows the viewer to breathe amidst the tension, reflecting the seed's theme of rising signals and zigzags of emotion.</desc>
