<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Shelter</title>
  <desc id="desc">The emotional tone of this piece captures the tension between vulnerability and strength through a structured lattice of deep teal and cosmic indigo, representing strength, contrasted by the exposed cold gold and star white, evoking feelings of fragility. The layout follows a spiral pressure motif, creating a dynamic flow that draws attention towards a pale center, suggesting an exposed interior. Broken pixels introduce intentional disruptions, enhancing the theme of vulnerability. The collision at the center highlights the interaction between the darker, stronger colors and softer, lighter ones, symbolizing not just resistance but also connection amidst isolation.</desc>
