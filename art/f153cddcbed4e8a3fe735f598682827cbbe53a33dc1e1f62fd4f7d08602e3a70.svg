  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition captures the tension between vulnerability and strength through a diagonal division. A soft, pale palette with bone white at the center suggests frailty, while deeper hues of moss green and rust around the edges provide a sense of shelter and stability. The color collision occurs at the diagonal axis, creating a visual argument that represents both the pressure of a strong exterior and the delicate nature of the inner space, embodying the seed's themes without depicting literal images.</desc>
