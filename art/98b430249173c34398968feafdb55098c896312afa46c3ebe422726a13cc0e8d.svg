<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotions</title>
  <desc id="desc">The emotional tone blends the deep intensity of rage with the gentle essence of tenderness. The palette, featuring red, pale blue, black, and white, allows for dramatic contrasts, where saturated colors collide with muted fields. The primary contrast occurs in the center with aggressive red and tranquil blue, creating a focal disruption. The pattern reflects a diagonal spread from the corner, emphasizing the 'corner_invasion' layout where tenderness gradually infiltrates the raging chaos, symbolizing the complex interplay between these emotions as discussed in the seed.</desc>
