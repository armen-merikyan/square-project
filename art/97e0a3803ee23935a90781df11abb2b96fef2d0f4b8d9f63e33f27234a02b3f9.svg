<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This piece explores the dichotomy between relief and dread through a contrasting palette of soft pastels against dark tones, indicating a struggle between calmness and anxiety. The bright colors represent relief, while the dark colors symbolize dread. The collision occurs centrally where both patterns meet—one of flames, representing relief, and one of stairs, representing dread. The composition is intentionally imbalanced to emphasize the weight of dread, akin to a heavy presence pushing against lighter spaces. Broken pixels disrupt the structure symbolizing the imperfections inherent in emotional experiences. The layout accentuates the passaged division of feelings, bringing forth a gentle tug-of-war against the confines of perception.</desc>
