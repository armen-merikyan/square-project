<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Calm and Chaos</title>
  <desc id="desc">This artwork explores the emotional dichotomy of restlessness and peace, structured through a grid that embodies both calmness and frayed edges of tension. The chosen palette contrasts clean white and ice blue for the peaceful elements against the more aggressive ink black and warning orange, invoking a sense of unease at the edges while maintaining a serene center. The diagonal flow draws the eye from the quiet corners into the chaotic center, symbolizing the interruption of peace by restlessness. Broken pixels enhance the imperfection, suggesting movement and disruption in what is otherwise a symmetrical layout.</desc>
