<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone of this piece reflects the tension between vulnerability and strength, with a focus on contrast through color and arrangement. The palette, reminiscent of quiet pressure, uses pale and subdued tones to evoke a sense of exposure, while darker accents ground the composition and suggest strength. The main collision occurs in the center, where the split screen pattern of strength meets the flood pattern of vulnerability, creating a visual pulse that interrupts the space. This interaction symbolizes the delicate balance of feeling exposed yet supported, embodying the essence of the seed's contrasting themes.</desc>
