<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tides</title>
  <desc id="desc">This piece explores the emotional tension between rage and calm through contrasting colors and patterns. The warm reds surge in the center, representing rage, while the cooler pale blue and black hues recede to create a calm field. The palette choice reflects the struggle between emotional forces, with high contrast indicating a core collision of feelings. The patterns of shatter and quiet fields interact amidst broken pixels, adding intentional flaws that embody the theme of conflict. The main collision occurs in the center, drawing the viewer’s focus amidst the chaos of color and form.</desc>
