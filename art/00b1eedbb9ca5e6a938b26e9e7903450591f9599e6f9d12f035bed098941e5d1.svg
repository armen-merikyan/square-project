<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition reflects the tension between restlessness and peace. The chosen colors stem from a 'guilt_forgiveness' palette, mixing warm ivory and deep wine for emotional conflict. The pale center symbolizes peace being encroached upon by darker, more restless accents, particularly in the edges. The pattern of pulse marks collides with broken dots, creating an uneven rhythm. Main contrasts are located in the upper left toward the corner, resonating with pressure and intensity, while allowing for some negative space to symbolize freedom and calm amidst chaos.</desc>
