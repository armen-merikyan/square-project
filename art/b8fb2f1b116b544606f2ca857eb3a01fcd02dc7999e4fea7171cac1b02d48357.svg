<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Calm and Dread</title>
  <desc id="desc">This composition illustrates the emotional contrast between awe and terror through the juxtaposition of soft and hard edges. The left side (representing awe) utilizes a maze-like pattern in electric blue and lime, suggesting complexity and wonder against a darker background, while the right side (reflecting terror) employs broken dots in magenta and black, embodying disruption and chaos. The flow from bottom to top hints at an upward journey toward clarity, interrupted by moments of instability and overlap, capturing the essence of the seed's themes of order versus chaos. The use of broken pixels adds an element of imperfection and memory, enhancing the abstract nature of the artwork.</desc>
