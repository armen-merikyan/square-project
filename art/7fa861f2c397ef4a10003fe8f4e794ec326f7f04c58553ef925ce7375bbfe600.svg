<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Ambivalence</title>
  <desc id="desc">The emotional tone of this piece centers on the tension between longing and resolve, as seen through the juxtaposition of warm browns and cold whites. The palette reflects safety and exposure, with deep shades suggesting density and light ones representing emptiness. The central contrast occurs at a diagonal from the upper left to the lower right, illustrating the conflict of order (resolve) versus chaos (longing). The arrangements mirror the patterns of longing through split screens and sparks of resolve as they collide in the center, symbolic of overcoming gaps. The use of broken pixels adds a layer of imperfection, embodying the scars of experience.</desc>
