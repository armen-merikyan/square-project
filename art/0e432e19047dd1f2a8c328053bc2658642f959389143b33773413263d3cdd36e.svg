<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Tensions</title>
  <desc id="desc">This artwork embodies the emotional duality of 'rage vs calm.' The selected palette of red, pale blue, black, and white represents the intense heat of rage alongside the coolness of calm. The warm reds create a sharp, jagged tension, while softer pale blues evoke serenity. The dominant central red zone is overridden by quiet blue patterns streaming outward, demonstrating both containment and overflow. The spiral pressure layout emphasizes the push and pull of these emotions, with broken pixels intentionally disrupting the symmetry, creating a dynamic yet delicate balance.</desc>
