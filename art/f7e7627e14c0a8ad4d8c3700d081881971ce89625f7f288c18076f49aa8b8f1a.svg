<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">The emotional tone captures the tension between pressure and quiet. The palette mixes muted tones of off-white and dust gray with sharper accents of compressed red and dark navy, embodying contrast. The dense collection of colors on the left signifies pressure, while the gradual loosening to quieter hues on the right embodies release. The main collision occurs along the center diagonal, disrupting flow and creating tension between the opposing emotional states.</desc>
