<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Torn Connections</title>
  <desc id="desc">This artwork explores the emotional contrast between loneliness and connection through color and pattern. The top half reflects loneliness with deep, muted colors of burnt orange and dark red in a crosshatch pattern, suggesting weight and isolation. In contrast, the lower half introduces potential connection with brighter accents of gold forming a checker pattern amidst the shadows, symbolizing interaction amid solitude. The thick edges reinforce the boundary between these emotional states, while the broken pixels introduce a sense of imperfection, reflecting the struggles within. The layout emphasizes a split between pressure and release, embodying the tension of seeking connection.</desc>
