<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition depicts the emotional tension between desire and emptiness. The palette blends vibrant hues of hot coral and blood orange, symbolizing desire, against muted tones of charcoal and hollow blue representing emptiness. The collision occurs diagonally, with desire occupying a vibrant wedge and emptiness cascading from the opposite corner, further interrupted by glitch patterns and negative crosses. The reference to spiral and sound signals reflects the dynamic pull of longing while maintaining the tranquility of quiet pressure through unfilled spaces. Broken pixels introduce irregularity echoing the conflict, making the piece resonate with the tension of yearning constrained.</desc>
