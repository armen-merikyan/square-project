<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">This artwork embodies the tension between control and surrender through contrasting colors and patterns. The palette, derived from 'ancient_fire', incorporates burnt orange, dark red, charcoal, and gold, representing warmth and intensity. The emotional collision is centered where dark red and charcoal meet a bright gold highlight, symbolizing the pressure of control against the allure of release. The 'rain' and 'split_screen' patterns collide, with the control aspect dominating the upper left quadrant, while the surrender subtly influences the lower areas. The imperfect arrangement reflects the difficulty in balancing these opposing emotions.</desc>
