<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Harmony</title>
  <desc id="desc">This artwork captures the tension between restlessness and peace through intertwining patterns of 'constellations' and 'dots'. The palette, inspired by 'awe_terror', employs cosmic indigo and void black for depth, contrasted with the shimmering brightness of star white and cold gold to evoke fleeting moments of clarity amidst the noise. The center forms a strong collision of light and darkness, disrupting the edges that fade into soft spaces, reinforcing the concept of motion against stillness. The layout suggests an eroded symmetry, leaving room for negative space that echoes memory and contrast, embodying the endless dance between tranquility and turmoil.</desc>
