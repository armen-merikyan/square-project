  <title id="title">Tension of Asymmetry</title>
  <desc id="desc">This artwork explores the emotional collision between envy and gratitude using a dichotomy of warm and cool colors. The left side embodies envy with electric blues and sharp lines of stripes, while the right radiates gratitude through warm magentas and flame-like bursts. The fractured arrangement depicts the tension of a broken mirror, turning inward and outward, creating a dynamic flow of pressure and release, with deliberate imperfection adding to the narrative of unresolved emotion.</desc>
