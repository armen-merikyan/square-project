<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone suggests a juxtaposition between the gentle nature of softness and the austere impact of severity. The palette of powder pink and warm white embodies softness, while carbon black and steel gray introduce severity. The main contrast emerges at the center, where radial patterns of dark colors pulsate outward, interrupted by lighter colors in a ladder pattern. The open center reflects exposure while the outer edges echo shelter, creating a tension between the protective and the vulnerable.</desc>
