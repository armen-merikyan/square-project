<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Zigzag of Emotions</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of fear and hope through contrasting color placement and patterns. The dark colors represent the weight of fear, clustered heavily on the left side with broken dot patterns, suggesting chaos and anxiety. In contrast, the right side employs soft gold and pale green in an upward stair-like flow, symbolizing hope and the light breaking through. The balance created by the sharp versus soft edges intensifies the emotional tension, while the introduction of 'broken pixels' evokes a sense of imperfection and vulnerability.</desc>
