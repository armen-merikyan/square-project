<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition captures the tension between vulnerability and strength. The color palette, with warm tones like hot coral and blood orange contrasting with cool shades like charcoal and hollow blue, embodies this emotional duality. The distinct broken dots of strength clash with the fragile spark patterns of vulnerability, creating an intricate narrative of exposure within the secured boundaries of the 8x8 grid. The edge style brings a sense of pressure, while intentional broken pixels introduce imperfection, representing scars from the struggle. The main collision occurs at the center, where the two emotional patterns intermingle, creating a poignant visual representation of coexistence and conflict.</desc>
