  <title id="title">Tension of Balance</title>
  <desc id="desc">This artwork explores the emotional conflict between restlessness and peace. The palette features soft mint, pale sky, and storm gray to represent peace, while deep blacks introduce an element of mystery and tension. The contrasting colors create a dynamic dance within the grid, with the main collision happening diagonally through the center. Broken pixels emphasize interruptions, achieving a balance yet leaving a sense of unresolved motion, embodying the struggle between stability and chaos.</desc>
