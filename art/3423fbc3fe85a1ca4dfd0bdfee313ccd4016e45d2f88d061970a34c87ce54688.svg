<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This piece embodies the emotional duality of control and surrender through a pulse of muted colors and irregular patterns. The palette draws from the 'broken_memory' collection, incorporating sepia tones, faded blues, and grays to evoke a sense of nostalgia and chaos. The center holds dense overlaps of patchwork designs representing pressure, colliding with braided edges suggesting control. The main contrast occurs in the center, where colors clash, reflecting the tension between the need for order and the chaos of surrendering. The scattered broken pixels within maintain a sense of disruption, enhancing the narrative of interference and muted signals.</desc>
