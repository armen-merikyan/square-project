<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges: The Clash</title>
  <desc id="desc">The emotional tone conveys a battle between defiance and submission, represented by contrasting color patterns. The palette of red, black, pale blue, and white suggests intensity (defiance) against calmness (submission), creating a dynamic visual tension. The left side embodies defiance with a flame-like pattern using red and variations of black, while the right side employs a barcode pattern with pale blue and white to signify structure and retreat. The center, where these two emotional fields overlap, showcases a powerful interplay, symbolizing conflict. Broken pixels disrupt this tension, embodying imperfections in both emotions, while negative space allows viewers to breathe amidst the chaos, particularly in submission's calmer areas.</desc>
