<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonance of Emotion</title>
  <desc id="desc">This composition embodies the emotional struggle and interplay between longing and resolve. The palette of soft pink, warm white, and sharp crimson contrasts with deep charcoals and steel grays, creating a visual tension that engages the viewer. The outer rows embody the steadfastness and clarity of resolve, while the inner 4x4 area fluctuates with longing through deliberate, broken pixels and softer hues. The collision occurs at the transition between the inner and outer layers, suggesting an inner complexity of feeling against the calmness of the periphery, reflecting the depth of personal experience encapsulated in the seed.</desc>
