<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">The artwork explores the emotional tension between restlessness and peace. The palette features dark violet and soft gold, reflecting hope amidst turmoil. The central arrangement creates a stark contrast with dark colors representing restlessness, while lighter tones balance it, suggesting peace. The diagonal flow of colors mimics constant motion, broken by patches of quiet space reflecting moments of relief. Broken pixels disrupt the otherwise structured design, enhancing the sense of chaos and unpredictability in memory, representing shatter and flame.</desc>
