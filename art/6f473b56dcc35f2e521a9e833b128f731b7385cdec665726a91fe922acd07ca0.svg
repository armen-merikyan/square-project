  <title id="title">Hunger Against Boundaries</title>
  <desc id="desc">The emotional tone reflects the tension between desire and restraint, illustrated through a saturated core versus a muted, boundary-like edge. The warm palette of hot coral and blood orange symbolizes desire while the charcoal introduces restraint, creating a dynamic where the dense center is juxtaposed with a struggling outer layer. The collision occurs primarily at the center, where stacked warm colors interact with the cooler, muted hues in a ladder-like progression, representing the push and pull of conflicting emotions.</desc>
