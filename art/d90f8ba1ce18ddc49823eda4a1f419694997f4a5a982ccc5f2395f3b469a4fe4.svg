<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmony in Conflict</title>
  <desc id="desc">The emotional tone explores the delicate balance between joy and grief, represented through contrasting colors and structured patterns. The palette combines vibrant yellows and oranges symbolizing joy, with muted purples and deep blues representing grief. The top half features a ring pattern indicating joy, while the bottom is more chaotic, with flame-like bursts of color suggesting grief. A zigzag flow captures the tension and resolution, allowing edges that are hard yet broken, hinting at the complexities of emotions in a split-screen format.</desc>
