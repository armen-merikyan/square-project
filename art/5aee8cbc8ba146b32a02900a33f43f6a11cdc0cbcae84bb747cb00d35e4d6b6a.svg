<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in the Center</title>
  <desc id="desc">The emotional tone of this piece represents the clash of panic and control, depicted through warm colors at the edges pushing inward against the cool central hue. The palette integrates joyful yellows and oranges contrasted with deep blues and muted purples, embodying the coalescence and disarray of feelings. The core is a deep blue, signifying a sense of calm amidst turmoil, while warmer tones resonate at the periphery, suggesting encroaching anxiety. Asymmetrical stripes in warm hues blend into radial patterns, creating a tension-filled pulse, as they weave through a canvas of pixelation, invoking the sense of a crown of emotions worn under pressure.</desc>
