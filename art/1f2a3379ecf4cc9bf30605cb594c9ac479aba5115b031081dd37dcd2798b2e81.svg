<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetrical Fracture</title>
  <desc id="desc">This piece embodies the emotional tension between confusion and clarity. A carefully chosen palette of dark maroon, gray, and soft pink creates a striking visual narrative, with areas of both dense texture and open space to reflect the chaotic echoes of confusion. The edges are thickened to emphasize boundaries, while the central 4x4 grid serves as a harmonious contrast against the jagged outer frame, highlighting the notion of broken symmetry. The radial pattern on the outer edges interrupts the calmness of the center, allowing the viewer to feel the pulse of emotion as they navigate through the piece.</desc>
