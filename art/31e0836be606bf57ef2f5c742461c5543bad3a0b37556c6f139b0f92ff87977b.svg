<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Spiral</title>
  <desc id="desc">This artwork embodies the emotional clash between relief and dread through the use of color density and placement. A dominant calm mint green (#B2E0D9) represents relief, occupying approximately 65% of the grid, contrasting against the ominous near-black (#212121) that introduces an unsettling weight. The spiral pattern flows from the corner, creating tension as it moves outward, interrupted by stark, jarring blocks of storm gray (#7A7B7D) that evoke a sense of chaos. The use of broken pixels enhances this narrative of disruption, suggesting scars of conflict within the overall calm. The light accents of faded gold (#E4C111) punctuate the darker sections, providing brief moments of brightness.</desc>
