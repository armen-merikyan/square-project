<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience in Ashes</title>
  <desc id="desc">The emotional tone captures the balance between 'spark' and 'ash', symbolizing hope versus remnants. The palette, using soft pastels with sharp contrasts, evokes warmth and severity, representing the clash between vitality and fading memories. The concentration of dark shades at the bottom juxtaposed with lighter colors rising toward the top illustrates an upward struggle, embodying both tension and release. The diagonal clash suggests interruption and conflict, while the scattered arrangement of lighter dots and linear overlays reflects the chaos of memory amid restraint, illustrating a dynamic discomfort that's both complex and engaging.</desc>
