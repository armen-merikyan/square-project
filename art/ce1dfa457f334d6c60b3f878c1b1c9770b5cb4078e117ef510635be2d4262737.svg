<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">The emotional tone reflects the tension between love and betrayal, symbolized through a palette of warm pinks and reds clashing against darker, muted grays and maroons. The use of stripes for love contrasts sharply with betrayal's frames, creating a push-pull dynamic in the center where the colors collide. Broken pixels add imperfection, enhancing the sense of loss and conflict, while the mirrored layout introduces a sense of confusion and distortion in the pattern, depicting the fracture in relationships. The composition captures both warmth and a sense of emptiness, suggesting the consequences of broken trust.</desc>
