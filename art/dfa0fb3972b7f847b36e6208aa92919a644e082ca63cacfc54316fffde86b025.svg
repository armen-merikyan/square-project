<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This piece explores the contrasting emotional tones of joy and grief. The warm yellows and oranges evoke a sense of joy and brightness, while muted purples and deep blues introduce an undercurrent of grief and sadness. The layout flows from the bottom left, where joyful colors start, zigzagging upward to mimic a rising signal intertwined with chaos. The grid pattern representing grief juxtaposes with the warmer rings of joy, creating visual tension. This contrast emphasizes the collision between the expanding joy and the heavy grief, highlighting the complexities of human emotion.</desc>
