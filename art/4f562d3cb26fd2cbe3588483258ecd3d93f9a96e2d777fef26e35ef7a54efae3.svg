  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The artwork captures the tension between desire and emptiness through saturated colors and contrasting muted tones. The palette, featuring warm hues like hot coral and blood orange, symbolizes desire, while the deeper shades of charcoal represent emptiness. The arrangement creates a diagonal flow that suggests movement and urgency, emphasizing a central cluster of warm tones that collide with cooler edges. Broken pixels introduce intentional imperfections, illustrating the struggles of containment and overflow within the emotional frame.</desc>
