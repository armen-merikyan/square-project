  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork juxtaposes emotional tension between vulnerability and strength, encapsulating the delicate balance of exposure and protection. The chosen palette of guilt and forgiveness reflects warmth with soft gold and warm ivory clashing against the deeper tones of stain brown and deep wine, demonstrating a spectrum of emotional weight. The main collision occurs in the center with soft gold, interrupting the stable ash gray bands that represent strength. The arrangement of rows varies in density, highlighting the contrast between the thick, clear blocks of strength at the top and the lighter, more vulnerable channels below, creating a narrative of shifting safety and exposure.</desc>
