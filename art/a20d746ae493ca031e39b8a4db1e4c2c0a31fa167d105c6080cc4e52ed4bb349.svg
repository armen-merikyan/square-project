  <title id="title">Inner Strain</title>
  <desc id="desc">This artwork embodies the tension between trust and suspicion through a dynamic arrangement of warm and dark colors. The burnt orange and dark red serve to represent raw emotion and pressure, while the charcoal adds a layer of quiet contemplation, enhancing the contrast. The layout mirrors a complex emotional tug-of-war, where certain pixels intrude unexpectedly, creating a sense of disturbance. The broken pixels invite the viewer to engage with the imperfections that encapsulate the emotional clashes described in the seed.</desc>
