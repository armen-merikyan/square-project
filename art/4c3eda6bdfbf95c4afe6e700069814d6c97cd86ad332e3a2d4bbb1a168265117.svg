<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Amidst Static</title>
  <desc id="desc">This piece conveys a core emotional tension between clarity and chaos, embodying the concept of 'signal vs noise.' The palette juxtaposes the sharp contrast of 'signal_green' and 'hot_magenta' against the subdued 'static_gray' and 'dead_black.' The dominant black creates a quiet field, allowing the electric blue and vibrant green to pulse through like a signal trying to break through interference. The layout mirrors itself with slight disruptions, reflecting the idea of broken symmetry that echoes the suggested narrative of exposure and shelter. The main collision occurs in the center, where the vibrant colors meet the muted tones, representing the struggle between clear communication and loss in the midst of noise.</desc>
