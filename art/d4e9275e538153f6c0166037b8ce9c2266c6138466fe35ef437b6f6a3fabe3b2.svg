  <title id="title">Tension of Dichotomy</title>
  <desc id="desc">This artwork encapsulates the emotional core of longing versus resolve, illustrated through a dynamic interplay of color and form. The palette contrasts warm brown and shelter green, representing intimacy and resolve, with cold white and open blue to reflect longing and distance. The central blue shapes radiate outward in a halo, creating a sense of tension against a backdrop of denser green, embodying both connection and separation. Broken pixels disrupt the symmetry, evoking intimacy's complexities. The composition maintains an asymmetrical balance, with negative space emphasizing a clear emotional narrative.</desc>
