<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece embodies a tension between brightness and desaturation, echoing the struggle between spark and ash, life and stillness. The palette blends muted blacks and dark violets that ground the canvas against bursts of soft gold and pale green accents. The main collision occurs in a jagged diagonal pattern at the center where the vibrant sparks push against the stable ash tones, illustrating a battle and conversation between energy and calm, hope and resignation. The broken pixels create intentional disruptions, symbolizing the imperfections inherent in both memories and fleeting moments.</desc>
