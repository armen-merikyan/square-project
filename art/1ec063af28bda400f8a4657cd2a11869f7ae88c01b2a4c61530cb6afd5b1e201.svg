<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This composition embodies a struggle between fear and hope, using a contrasting palette of black, dark violet, soft gold, and pale green to evoke deep emotional resonance. The interplay of jagged edges represents the unsettling feelings of fear, while the glowing edges suggest a flicker of hope amidst chaos. The central vertical split captures the duality, where dense clusters of dark colors on one side abruptly collide with lighter hues on the other, creating visual tension. Patterns of flame-like chaos weave through structured maze-like patterns, indicating a dance between unpredictability and order, emphasizing both emotional weight and the yearning for light.</desc>
