<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs. Shelter</title>
  <desc id="desc">This artwork embodies the emotional tension between safety and exposure. The palette features warm brown and shelter green to evoke warmth and protection, contrasted with cold white and open blue representing exposure. The arrangement emphasizes a gentle pressure at the edges, creating a secure frame around a pale center that hints at vulnerability. The structured stripes flow vertically, symbolizing safety, while the tide-like patterns weave through, suggesting the ebb and flow of exposure. The interaction creates an echo of tension and release, with broken pixels adding imperfection that reflects the struggles between these emotions.</desc>
