<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">The emotional tone blends loneliness and connection, illustrating the tension between the crowd and the isolated. The palette of yellow, orange, deep blue, and muted purple reflects joy and grief, establishing a visual contrast that pulsates with energy yet evokes quiet contemplation. The sharp vs soft contrast is realized through jagged edges and broken dots, allowing vibrant colors to collide against more muted tones, creating rhythmic movements that suggest emotional release amid ongoing pressure. Overall, the piece captures layered experiences of solitude and togetherness, with intention placed on the negative space to enhance feelings of isolation.</desc>
