<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Resistance</title>
  <desc id="desc">This piece embodies the tension between clarity (signal) and chaos (noise). The palette of deep navy and black, punctuated by bright dim cyan and soft white, creates a contrast of calmness and vibrancy. The arrangement features a dominant dark field to represent noise, while the bright edges emerge like signals attempting to reach through chaos. The sequential rise of color reflects a struggle, paralleling the upward layout of hope against the background static. Broken pixels execute intentional disruptions, emphasizing the fracture between clear signals and static noise.</desc>
