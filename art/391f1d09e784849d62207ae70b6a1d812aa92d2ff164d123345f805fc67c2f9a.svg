<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Emotional Echo</title>
  <desc id="desc">The piece reflects the emotional tension between joy and grief using a palette of yellow and deep blues, suggesting warmth and coolness. The top half employs circular patterns in brighter hues to express joy, while the bottom half features a checker pattern of muted purples and deep blues to depict grief. The contrasting patterns create a visual narrative of conflict and balance, interrupted by hard edges that symbolize the sharpness of feelings. Negative space allows for breathing room, evoking relief amidst the heavier emotions.</desc>
