<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Yearning and Certainty</title>
  <desc id="desc">This artwork captures the emotional tension between longing and resolve. The palette, featuring deep wine and warm ivory, evokes warmth and nostalgia while contrasting with cool ash gray that signifies distance and unresolved feelings. The collision occurs in the center, where clusters of soft gold disrupt the quiet fields of ash gray, representing the interplay of hope against despair. The diagonal flow suggests movement towards resolution, yet the broken pixels represent interruptions—fleeting moments of clarity disrupted by emotional echoes. Each layer is intentionally placed to echo the theme of intimacy and distance, creating a visual representation of the complex emotions flowing through this piece.</desc>
