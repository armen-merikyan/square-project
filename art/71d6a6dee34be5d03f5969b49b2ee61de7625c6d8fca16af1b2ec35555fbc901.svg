<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hungry Restraint</title>
  <desc id="desc">This artwork expresses the emotional tension between desire and emptiness. A palette of warm tones from coral to orange reflects the visceral pull of desire while cool depths of charcoal and hollow blue invoke emptiness. The central area is dense with warm colors, hinting at overflow and the rising signal of unfulfilled wishes, while the outer edges contain these hues, creating a sealed barrier. The arranged blocks contrast sharply with soft static patterns, representing the disruptive clash of emotions. Broken pixels introduce imperfections that symbolize the struggle of desire against enforced limits.</desc>
