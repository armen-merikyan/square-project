<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">This composition embodies the emotional tension between longing and resolve. The use of deep blacks and electric blues forms a moody backdrop that portrays the weight of longing, while the accents of lime and magenta represent moments of resolve and clarity. The palette creates a stark contrast, with the main collision occurring in the center, where the vibrant colors clash sharply against the dark fields, suggesting a crossing of paths and emotional chaos versus order. Patterns of flooding and stacking alternate, creating a rhythm that invites the viewer to feel both the pull of distance and the assertiveness of presence, resonating with the seed's themes.</desc>
