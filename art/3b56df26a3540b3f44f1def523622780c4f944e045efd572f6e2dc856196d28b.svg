  <title id="title">Overflowing Signals</title>
  <desc id="desc">This artwork embodies the tension between control and surrender, reflected in the contrasting color palette of vibrant orange and muted blues. The center is flooded with warm hues, suggesting overflow, while cooler colors at the edges imply containment. The jagged edges symbolize disruption and chaos, representing thoughts splintering against boundaries, while the asymmetrical placement of colors creates a zigzag flow that guides the eye through the piece. Broken pixel elements introduce intentional imperfections, reinforcing the dynamic struggle of pressure versus release.</desc>
