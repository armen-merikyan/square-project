<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Tension</title>
  <desc id="desc">The emotional tone oscillates between panic and control, captured through contrasting colors and placement. The palette of navy, black, and dim cyan reflects a lonely emotional spectrum, with emptiness against intensity. This juxtaposition is visually represented in the left side, dominated by a split-screen pattern of darker hues, creating a feeling of containment and calm. The right transitions into a chaotic crosshatch, suggesting an uncontrolled burst of noise and movement. Negative space is preserved to reflect a sense of unease, while broken pixels interrupt the flow, enhancing the underlying conflict between the contrasting emotions.</desc>
