<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Clash of States</title>
  <desc id="desc">This artwork reflects the emotional tone of restlessness versus peace through dense clusters and muted colors. The chosen palette embodies contrasts with red oxide symbolizing tension against muted cream for calm, while blackened plum adds depth. The main collision occurs at the center, where the crosshatch pattern of restlessness interacts with the calming channels of peace, creating a visual dialogue. The edge crawl suggests an unsettling border that struggles to contain the vibrant center, echoing the theme of motion against static memory.</desc>
