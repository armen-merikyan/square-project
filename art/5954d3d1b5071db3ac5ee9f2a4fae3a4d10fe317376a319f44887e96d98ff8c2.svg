<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Dark</title>
  <desc id="desc">The artwork captures the emotional duality of fear and hope by juxtaposing a dark, dense left side with a brighter, more open right side. The palette consists of deep black and dark violet to evoke a sense of fear, contrasted with soft gold and pale green to signify hope. The density on the left signifies fear, while the lighter tones on the right suggest hope reaching out. The zigzag and maze patterns create a dynamic feeling, while the broken pixels add an element of imperfection, emphasizing the struggle between these emotions. Collisions occur at the center where dark and light meet, creating an unresolved tension that reflects the complexity of the emotions at play.</desc>
