<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">This artwork encapsulates the emotional tension between longing and resolve. The palette featuring moss green, bone white, rust, stone gray, and small gold reflects a complex interplay of serenity and urgency. The moss green dominates, representing a feeling of 'contained longing,' while the rust serves as a strong contrast indicating 'resolve.' The arrangement, with a cluster of colors in one corner, embodies a pressure dynamic where the colors seem to overflow, representing a yearning that is both filled and hindered. The broken pixels add layers of imperfection, depicting the scars of experience. Overall, the piece tells a story of emotional collision through patient quietness and sharp intervention, inviting viewers to explore the nuances of feeling within abstract form.</desc>
