  <title id="title">Pulse of Restraint</title>
  <desc id="desc">The emotional tone reflects the struggle between deep desire and overwhelming emptiness. The chosen palette of hot coral and blood orange represents saturated longing, while the cool tones of charcoal and hollow blue create a backdrop of space and quiet. The main contrast occurs diagonally across the canvas, where the fiery 'flame' pattern representing desire disrupts the calmer 'stairs' pattern of emptiness. This collision creates visual tension, symbolizing the push and pull between fulfillment and restraint.</desc>
