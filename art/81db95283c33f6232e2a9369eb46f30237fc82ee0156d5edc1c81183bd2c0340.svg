  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone juxtaposes vulnerability against protection. The palette blends shelter green and warm brown, symbolizing safety, with accents of pale skin and cold white, evoking exposure. The main contrast occurs around the center, creating a tension between the soft barrier and bright vulnerability. The vertical split aligns with the seed's theme of division, allowing colors to collide asymmetrically while maintaining a whisper of negative space—echoes of softness and severity intertwined in the composition's core.</desc>
