<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interwoven Emotions</title>
  <desc id="desc">The artwork explores the tension between fear and hope through color and composition. The palette combines dark tones of black and violet, evoking fear, against the softer accents of pale green and gold, representing hope. The central cluster of bright colors creates a rising signal against the surrounding darkness, illustrating the conflict and dashed hopes. The jagged edges emphasize the sharp contrast against the muted spaces. The layout centers on an almost empty room, allowing the viewer to feel the weight of the surrounding color while maintaining the essential negative space.</desc>
