<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Desire and Restraint</title>
  <desc id="desc">This piece embodies the emotional contrast of desire and restraint through a dynamic interplay of saturated and muted colors. The palette of deep reds and soft creams suggests intensity versus calm, where warm hues symbolize desire's aggressive pull, while muted tones signify restraint's protective barrier. The layout of mirrored rows with intentional broken pixels creates a visual tension, as the bold colors overflow against their softer counterparts, mimicking the struggle between reaching for more and holding back. The central collision occurs in the middle rows, illustrating the heart of the emotional conflict and the spiraling pressure of desire against the latticework of restraint.</desc>
