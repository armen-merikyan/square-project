  <title id="title">Duality in Motion</title>
  <desc id="desc">This artwork explores the tension between vulnerability and strength through a palette that juxtaposes soft pastels with deeper shades. The main contrast lies in the center where soft hues are disrupted by stronger, darker tones, creating a focal point that suggests conflict. The arrangement of colors mimics a braided structure, with some areas tightly packed and others more sparse, embodying the push and pull inherent in the seed's concepts of flood and stack. The inclusion of broken pixels serves as a reminder of imperfection and resilience amid turmoil.</desc>
