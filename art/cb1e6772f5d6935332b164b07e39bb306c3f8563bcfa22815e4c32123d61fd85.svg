<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This piece captures the emotional oscillation between panic and control through contrasting patterns and colors. The chosen palette of sepia, tan, dust gray, and faded blue reflects a nostalgic yet chaotic sentiment, with muted tones grounding the viewer while flashes of brighter color create moments of tension. The collision appears in the checker and ring patterns; the rings emanate from a central void, suggesting stability disrupted by jagged checker patterns, echoing the struggle between randomness and order. The arrangement pushes flow from bottom to top, instilling a sense of rising turmoil as the composition unfolds.</desc>
