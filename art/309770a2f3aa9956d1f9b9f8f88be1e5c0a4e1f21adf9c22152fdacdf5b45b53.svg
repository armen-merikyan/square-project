  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone captures a delicate balance between vulnerability and strength, depicted through a muted palette layered with brighter accents. The contrasting dark hues represent stability and defense, while lighter tones suggest fragility and openness. A collision occurs in the center of the square where the brightest colors are, symbolizing the conflict between weakness and resilience. The seed’s notion of ‘fold’ inspires the organic yet structured layout, creating an abstract pattern that evokes a sense of tension, echoing the theme of protective shelter against exposure.</desc>
