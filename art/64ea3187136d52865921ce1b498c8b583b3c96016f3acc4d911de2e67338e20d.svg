<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Time</title>
  <desc id="desc">This piece embodies the emotional interplay between nostalgia and progress through a contrast of warm and cool colors. The palette of burnt orange and dark red represents the weight of memories, while charcoal and gold symbolize the brightness of advancing futures. The horizontal split layout evokes a sense of rising tension, with the top half reflecting nostalgia through scattered pixel dots, while the bottom employs radial patterns to illustrate progress. The jagged edges introduce an element of disruption, emphasizing the collision between fullness and hollowness, effectively conveying a push-pull dynamic of emotional states accentuated by the strategic use of broken pixels.</desc>
