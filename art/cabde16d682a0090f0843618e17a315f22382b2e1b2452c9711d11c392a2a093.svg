<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry of Tension</title>
  <desc id="desc">The emotional tone captures the dichotomy of trust and suspicion through a palette balancing warmth and coolness. The deep blue and muted purple dominate, representing suspicion's shadowy presence, while the hint of yellow and orange signifies trust’s warmth. The central collision of colors echoes the tension of the emotions, creating a vertical split where varying patterns of ‘glitch’ and ‘split-screen’ weave together, portraying the push and pull of fear and faith. This results in a fragmented yet cohesive flow that invites the viewer to reflect on their own interpretations of these complex sentiments.</desc>
