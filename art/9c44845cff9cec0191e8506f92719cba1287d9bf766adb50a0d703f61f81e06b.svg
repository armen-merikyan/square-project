<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Pulses</title>
  <desc id="desc">This piece embodies the emotional dynamic between desire (represented by bright, warm colors) and restraint (depicted through muted tones). The palette, with hot coral and blood orange asserting themselves against cooler charcoal and hollow blue, creates a tension that is visually felt. The layout follows two pulsating centers that draw attention towards the center while also maintaining a surrounding negative space. Broken pixels intermittently interrupt the structure, adding elements of chaos within the contained boundaries, allowing for a sense of flow from left to right. The abstract nature resonates with the concept of unresolved emotional dynamics, where desire seeks to break free but is rhythmically restrained, embodying the core dichotomy of the seed.</desc>
