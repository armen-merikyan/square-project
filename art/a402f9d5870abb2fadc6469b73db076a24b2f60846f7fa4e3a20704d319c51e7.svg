<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Echoes</title>
  <desc id="desc">This artwork embodies the emotional tension between tenderness (softness, quietness) and rage (explosive disruption). The palette combines deep reds and stark blacks representing intense emotions, contrasted with softer pale blues and whites to evoke tranquility. The grid displays a clash at the center—where the rage pattern (crosshatch) intersects with the tender echo pattern. Broken pixels introduce imperfections, enhancing the chaotic yet gentle narrative that speaks to the complexities of forgiveness and the duality of inner feelings. The overall composition, weighted towards chaos, invites reflection on the pull between calm and turbulence.</desc>
