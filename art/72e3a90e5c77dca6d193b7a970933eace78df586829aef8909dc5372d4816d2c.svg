<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Control</title>
  <desc id="desc">This piece explores the tension between panic and control, using a palette that reflects isolation with navy and black, countered by the starkness of white and dim cyan. The central structure suggests stability, surrounded by dynamic patterns that evoke chaos and noise. The arrangement prompts a dialogue between calm and tumult, with emphasis on the collision of dark and light to represent the emotional turmoil versus the illusion of control.</desc>
