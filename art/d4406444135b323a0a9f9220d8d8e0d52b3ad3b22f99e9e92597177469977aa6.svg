<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone of this piece captures the tension between vulnerability and strength through a range of colors that ebb and flow across the square. The color palette combines warm coral and soft amber to represent light and vulnerability, contrasted against the deep blue-black and cold slate symbolizing strength and grounding. The primary collision occurs in the center, where the glitch patterns of strength disrupt the ladder-like patterns of vulnerability, creating a visually engaging conversation. The negative space complements this dynamic, emphasizing the open environment and allowing the contrast to breathe, echoing the themes of exposure and shelter.</desc>
