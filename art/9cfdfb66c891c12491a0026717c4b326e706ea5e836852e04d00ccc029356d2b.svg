<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork embodies the emotional tension between defiance and submission. The dominant color palette of warm shadow and cool blue represents warmth in conflict with cool calmness, establishing a rhythmic clash. The central region emphasizes defiance with bright hues, while the edges represent submission through muted tones, creating a spiraling effect. Broken pixels deliberately introduce imperfections, symbolizing the chaotic relationship between these emotions. Central darkness collides with brighter colors to represent strong energy pushing outwards against subdued backgrounds, crafting a narrative of confrontational movement against stillness.</desc>
