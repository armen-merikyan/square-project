<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal versus Noise</title>
  <desc id="desc">The emotional tone captures the dichotomy between restlessness and peace, expressed through a clash of colors and patterns. The palette of sepia, tan, dust gray, and faded blue reflects a sense of memory and motion, with sepia and tan representing the calmer aspects, while dust gray and faded blue suggest the flicker of restless energy. The contrast occurs primarily in the diagonal arrangement, where the warm tones of the lower left corner (restlessness) battle against the cool tones on the upper right (peace). Broken pixels amplify the sense of disturbance, acting as interruptions in an otherwise smooth flow, symbolizing the intertwining of these two emotions.</desc>
