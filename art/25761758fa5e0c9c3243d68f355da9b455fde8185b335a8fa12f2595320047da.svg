<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This piece encapsulates the tension between rage and calm through a vibrant color palette that uses sharp reds and soft blues. The pattern reflects a dynamic collision; warm reds, representing intensity and eruption, clash against cool blues symbolizing tranquility and containment. The central zigzag pattern interspersed with negative space creates a passage through which these emotions oscillate, reflecting the contrasting moods. Broken pixels appear as unsteady interruptions, evoking a sense of imperfection and raw humanity within a structured layout. The overall composition maintains an 80% dominance of the calm emotional palette, balancing the intensity of rage effectively.</desc>
