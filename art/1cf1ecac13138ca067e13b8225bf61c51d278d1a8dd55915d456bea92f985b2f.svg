<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone captures the fragile balance between vulnerability and strength. The palette, featuring bright coral and orange against deep charcoal and hollow blue, symbolizes the tension between warmth and coldness. The main contrast occurs in the center, where radial strength patterns from the palette intersect with echoing broken pixels, representing moments of softness and interruption. The design embodies a 'sea' of calmness surrounding an 'island' of density, mirroring the complexity of emotional experiences.</desc>
