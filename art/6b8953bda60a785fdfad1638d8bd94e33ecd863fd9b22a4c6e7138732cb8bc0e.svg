<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone captures the push and pull between loneliness and connection, with warm colors creating tension against cooler hues. A palette of deep reds and soft grays symbolizes the complexities of love and betrayal. The main contrast arises from a radical placement of red against a background of gray, suggesting flames of passion amidst the cold weight of isolation. The pattern flows diagonally, evoking both an invasion of emotion from the corner and the disarray of broken memories. This irregularity is emphasized by the broken pixels which disrupt uniformity, creating a sense of imperfection reflective of emotional experiences.</desc>
