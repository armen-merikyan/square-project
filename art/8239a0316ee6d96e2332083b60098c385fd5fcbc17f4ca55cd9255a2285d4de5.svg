<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Horizons</title>
  <desc id="desc">This artwork captures the push and pull between strength and vulnerability. The palette includes deep teal and cosmic indigo to suggest depth and mystery, countered by cold gold and star white to bring a sense of lightness and exposure. The central area, filled with dense colors, contrasts sharply with the lighter edges, symbolizing a protective yet exposed core. Broken pixels in the pattern signify imperfections, reinforcing the theme of vulnerability, while the overall composition's closed corners create a sense of confinement, encapsulating the emotions of safety against exposure.</desc>
