<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotions</title>
  <desc id="desc">This artwork evokes a dynamic play between the feelings of rage and calm. The choice of black and red creates an intense, sharp energy symbolizing rage, while pale blue and white interject softness and space for calm. The layout draws rage from the bottom left corner, gradually transitioning to calm towards the top right, establishing a diagonal flow that suggests rising tension. The incorporation of broken pixels introduces imperfection, mirroring the glitch and collision inherent in emotional experiences. It visually narrates a struggle against heaviness, leaving ample negative space to reflect isolation and introspection in connection with the seed.</desc>
