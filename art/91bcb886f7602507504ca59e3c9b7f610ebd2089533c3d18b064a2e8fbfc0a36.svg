<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers and Illumination</title>
  <desc id="desc">The emotional tone weaves between fleeting brightness and muted remnants, reflecting the conflict between energy and stillness. The chosen palette of melancholy blue, soft lavender, and pale white represents quiet depth against bursts of soft cyan and muted plum, capturing both restraint and hunger. The main collision occurs in the center where sparks of brightness meet ash-like overlays, creating tension and interruption through jagged patterns that evoke a flickering memory, while maintaining a dynamic tension with broken pixels that disrupt the uniformity, emphasizing imperfection and resilience amidst fragility.</desc>
