<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Contrast</title>
  <desc id="desc">This piece explores the emotional landscape of strength and vulnerability. The selected palette of soft rose clay, warm shadow, cool blue, distant lilac, and lamp gold evokes a sense of intimacy and distance, creating a juxtaposition between warm and cool tones. The layout reflects a diagonal argument, where vulnerability (represented by softer colors) occupies the lower left, while strength (thicker, more saturated colors) asserts itself in the upper right. The pulse marks for strength collide with the stepwell patterns of vulnerability, creating a dynamic flow. The broken pixels introduce intentional disruptions, echoing the fragility within strength. The overall composition encourages reflection on the balance between safety and exposure.</desc>
