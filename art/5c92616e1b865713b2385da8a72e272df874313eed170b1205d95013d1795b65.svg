<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a dynamic struggle between the deep yearning of desire and the constraining nature of emptiness. The chosen palette of hot coral, blood orange, and dust pink evokes warmth and energy, embodying desire, while charcoal and hollow blue introduce feelings of depth and calmness, signifying emptiness. The main contrast emerges in the center where coral hues sharply collide with the cool, dark edges—symbolizing the tension between aspiration and limitation. Spirals represent the movement of desire, propelled outward yet restrained by the borders created by charcoal shades, suggesting an eternal push and pull. Broken pixels add intentional disruptions, enhancing the sense of imperfection and growth amid the struggle for expansion.</desc>
