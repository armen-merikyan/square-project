<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece conveys the emotional tension of vulnerability against strength, utilizing a palette of sepia, tan, dust gray, and faded blue to evoke memories of stability and exposure. The main contrast occurs between the dark, dense edges and the bright clusters at the center, symbolizing the collision of exposure and shelter. The broken edges signify imperfection and the battles between hard and soft states, while maintaining a negative space that invites contemplation. The patterns colliding—strength framed and vulnerability in an ash field—echo the emotional themes through their visual disruptions.</desc>
