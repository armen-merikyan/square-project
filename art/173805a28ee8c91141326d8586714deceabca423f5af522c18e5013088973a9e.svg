<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork captures the tension between defiance and submission through a dynamic color palette that oscillates between vibrancy and muted tones. The juxtaposition of ripe green and deep olive against soft cream and honey gold creates a contrast that symbolizes the struggle between freedom and constraint. The central cascade of bright accents, akin to rising energy, meets subdued edges to reflect chaos versus order. Broken pixels add to the integrity of imperfection, reinforcing the notion of interrupted flow, while the uneven border hints at an ongoing tension. The grid emphasizes a pulse-like rhythm, suggesting movement yet embracing stillness within the context of the conflicting emotions.</desc>
