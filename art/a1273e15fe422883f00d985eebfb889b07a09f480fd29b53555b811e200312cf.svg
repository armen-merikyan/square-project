<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Boundless and Bound</title>
  <desc id="desc">The artwork evokes a power struggle between control and surrender, illustrated through a palette of deep navy and soft dim cyan. The contrasting hues suggest a vibrant inner tension radiating from a darker outer space, with dense clusters of control (dots) juxtaposed against free-flowing, softer areas that symbolize surrender (flood). The main collision occurs in the center, creating an emergent light that draws the eye, while broken pixels introduce imperfections that resonate with the chaotic balance of the theme.</desc>
