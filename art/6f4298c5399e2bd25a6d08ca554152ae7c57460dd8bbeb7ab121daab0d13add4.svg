<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">The emotional tone juxtaposes restlessness and peace, represented through the palette of warm (red) and cool (pale blue) colors. The palette suggests underlying tension with bright accents illuminating the darker fields, reflecting internal conflicts. The main contrast collides diagonally, emphasizing an invasion from one corner, symbolizing encroaching restlessness while maintaining patches of calmness. The layout embodies a corner invasion with broken pixels to introduce elements of imperfection and disruption, further enhancing the emotional complexity.</desc>
