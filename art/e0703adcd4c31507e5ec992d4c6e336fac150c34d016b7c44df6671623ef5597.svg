<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Tranquility</title>
  <desc id="desc">This composition captures the emotional tone of 'restlessness vs peace' through a dynamic arrangement of stark contrasts and soothing hues. The palette of pale mint and storm gray symbolizes calmness disrupted by unsettling elements, while the near black and faded gold evoke moments of tension and interruption. The collision occurs centrally, where the split-screen pattern representing restlessness meets the serene stripes of peace, creating an engaging visual tension. The layout is intentionally overfilled in the top left corner, suggesting pressure and movement while maintaining quiet negative space toward the bottom right, reflecting a gradual release from chaos to tranquility.</desc>
