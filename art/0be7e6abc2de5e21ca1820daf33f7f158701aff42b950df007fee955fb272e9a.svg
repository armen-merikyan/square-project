<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetrical Disruption</title>
  <desc id="desc">This piece explores the emotional struggle between panic and control, reflected in the color contrasts and their placements. The palette of deep blue suggests depth and stability, while bursts of orange and yellow introduce tension, echoing feelings of panic. The arrangement emphasizes wide negative space to evoke an empty room, contrasting with unexpected spikes of color that serve as 'sparks' amidst the disorder. The top-weighted visual balance hints at instability, underscoring the conflict between the urge for control and the unpredictable nature of inner turmoil.</desc>
