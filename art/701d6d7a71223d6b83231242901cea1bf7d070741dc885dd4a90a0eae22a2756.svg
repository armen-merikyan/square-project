<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Crown of Tension</title>
  <desc id="desc">This composition explores the emotional duality of panic and control through contrasting arrangements of color and form. The chosen palette evokes a sense of unease (red and dark maroon) juxtaposed with grays that suggest a sense of calm or control. The stripes at the center represent the harsh pressures of panic, while the more subdued grays create spaces for control. Broken pixels introduce a sense of imperfection and chaos that enhances the emotional tension, allowing the artwork to embody the struggle between stability and disorder.</desc>
