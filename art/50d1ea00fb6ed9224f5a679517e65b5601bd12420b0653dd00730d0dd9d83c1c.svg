<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Dark</title>
  <desc id="desc">This composition explores the emotional dichotomy of envy and gratitude, encapsulated through contrasting colors and patterns. The palette of deep black and bright pale blue portrays the heavy weight of envy against the lightness of gratitude. The layout design pits two opposing structures—frame versus stairs—against each other, creating visual conflict. The main collision occurs as the soft edges of pale blue intrude into the dense black, suggesting an inward tension as gratitude attempts to emerge from the void of envy. The application of broken pixels adds a sense of imperfection, illustrating fear and hope intertwined in this emotional experience.</desc>
