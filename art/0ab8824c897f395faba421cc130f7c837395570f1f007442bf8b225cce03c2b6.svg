<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Duality</title>
  <desc id="desc">This piece captures the emotional tension of love and betrayal through contrasting warm and muted colors. The left half features soft pinks and reds for the love motif, while the right half introduces darker grays and maroons to symbolize betrayal. The pixel arrangement reflects a diagonal rise, suggesting movement from clear expressions of affection toward sharp, unresolved feelings. Broken pixels disrupt the symmetry, reinforcing the idea of distortion in what was once whole. The palette evokes warmth through the reds and pinks while contrasting the chill of betrayal represented by deep maroon and gray, illustrating the collision of emotions.</desc>
