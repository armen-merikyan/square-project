<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust</title>
  <desc id="desc">This piece embodies the emotional push and pull between trust and suspicion, captured through the interplay of warm and cool colors. The chosen palette of pink, red, gray, and dark maroon illustrates love, warmth, and hidden dangers, suggesting intimacy yet frailty. The contrast centers around a dense 'island' of glitch-like pixels in the middle, embodying trust, surrounded by a softer 'sea' of crosshatch patterns, representing suspicion. The broken pixels introduce intentional disruptions, symbolizing the complexities of human emotion, making the piece resonate with the themes of the seed.</desc>
