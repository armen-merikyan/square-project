<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Tension</title>
  <desc id="desc">This composition represents the push and pull between restlessness and peace. The palette of deep black and striking red embodies the tension of conflict, while pale blue and white signify tranquility. The center features a collision of vibrant spark-like reds against heavy black, illustrating a struggle between chaos and calm. The mirrored layout, offset by carefully placed broken pixels, adds a sense of imperfection and unease, suggesting a narrative of disrupted harmony. The arrangement creates a rhythm that captures the essence of movement intertwined with stillness.</desc>
