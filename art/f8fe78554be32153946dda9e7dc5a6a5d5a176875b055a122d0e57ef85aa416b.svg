<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone juxtaposes the chaotic intensity of rage against the serene calm of peacefulness. The palette uses red to signify aggression, while pale blue and black represent tranquility and depth, creating a dynamic tension. The layout creates a collision effect at the center, where jagged red pixels cut through cooler blue stripes, echoing a battle between overwhelming emotion and quiet containment. Broken pixels serve as intentional disruptions, enhancing the sense of chaos amidst calm. The arrangement feels layered, allowing for both momentary pauses (negative space) and bursts of energy in a controlled chaos.</desc>
