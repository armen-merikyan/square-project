<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork evokes the emotional tension between vulnerability and strength, using a palette that reflects guilt and forgiveness. The dominant color, deep wine, represents strength and serves as the dense island in the middle of a lighter sea of ash gray and warm ivory, suggesting quiet juxtaposition. The lattice and stepwell patterns collide around the center, creating an exposed feel while the edges remain more structured and protective. Broken pixels introduce visual scars, enhancing the sense of vulnerability. The overall composition flows in an outward spiral, contrasting the complex interior with the calm outer layer.</desc>
