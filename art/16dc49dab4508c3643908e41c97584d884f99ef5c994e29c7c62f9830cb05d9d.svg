<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition explores the emotional clash between rage and calm through deliberate color contrasts and patterns. The palette includes black (representing rage), pale blue (symbolizing calm), and white to create stark highlights against dark regions. The dense black and red create a compressed feeling of rage, while pale blue and white introduce islands of calm. The layout features a quiet channel that runs diagonally through the piece, creating space for reflection. The collision between jagged red echoes of rage and the soft islands of calm reflects the inherent struggle between these two emotions in a visually abstract manner.</desc>
