<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Touch</title>
  <desc id="desc">The emotional tone navigates the contrast between rage and tenderness, with sharp jagged reds colliding against soft pale blues and whites. The palette embodies hot intensity against cool calmness, amplifying the dynamic conversation within the canvas. The arrangement presents a central burst of anger symbolized by red cracks penetrating through quieter spaces of blue and white, indicating moments of tenderness. The main collision occurs around the center and slightly to the left, where hot colors aggressively interrupt the flow of cool colors, creating a vibrant tension. This reflects the seed's themes of internal conflict and emotional push-pull.</desc>
