<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Motion</title>
  <desc id="desc">This artwork captures the emotional tension between 'spark' and 'ash', with the left diagonal filled with vibrancy symbolizing moments of energy, while the right side hints at the stillness and consignment of ash. The palette includes muted tones for restraint alongside punctuations of brighter hues, symbolizing flashes of hunger or desire. The primary contrast occurs at the diagonal, where bright colors like small_orange and muted_cream intersect with grays and blacks. The jagged edges create a sense of memory's fleeting nature, revealing how emotions interrupt and shape one another.</desc>
