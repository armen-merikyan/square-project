  <title id="title">Tension in Balance</title>
  <desc id="desc">The artwork explores the emotional dichotomy between joy and grief. The color palette contrasts deep blues, symbolizing grief, with vibrant yellows and oranges that represent joy, creating a striking interplay. The use of noise patterns on one side and a checkerboard effect on the other conveys the clash of order and chaos. Main contrast happens in the zigzag arrangement, drawing the eye across from warmth to coolness, evoking a sense of rising alertness against a backdrop of heaviness.</desc>
