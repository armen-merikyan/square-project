<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos: An Emotional Collision</title>
  <desc id="desc">This artwork explores the tension between trust and suspicion through contrasting patterns and colors. The left side, representing trust, is structured in a 'stairs' pattern using warm yellows and oranges, symbolizing lightness and warmth. In contrast, the right side embodies suspicion with a chaotic 'checker' pattern, using deeper blues and muted purples, suggesting uncertainty and weight. The interaction between these patterns creates a rhythm of collision, where the colors simultaneously clash and complement, embodying the emotional landscape dictated by the seed. This layout encourages a narrative of movement from calm to pressure, with areas of negative space evoking a momentary pause amidst density.</desc>
