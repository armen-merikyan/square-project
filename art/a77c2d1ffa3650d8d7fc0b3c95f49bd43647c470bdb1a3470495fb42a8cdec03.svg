<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This piece captures the emotional tension between desire and restraint, using contrasting palettes of deep reds and muted shades. The warm tones symbolize yearning, breaking through the borders of locked space. The main contrast occurs in the center, where saturation meets muted edges, illustrating the struggle between intense desire and its constraints. The piece flows diagonally to enhance the dynamic movement between these two emotions, represented by layered patterns of frames and ladders wrestling for space.</desc>
