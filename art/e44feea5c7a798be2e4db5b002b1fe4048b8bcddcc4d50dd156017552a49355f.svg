<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interwoven Tensions</title>
  <desc id="desc">This artwork captures the emotional dialogue between softness and severity. The contrast in the palette, with powder pinks and sharp crimson against steel gray and carbon black, reflects a duality of warmth and coldness. The main collision occurs in the center, where the mirrored softness meets a more fragmented, severe pattern, creating tension and movement. The layout suggests a small core of softness that is hemmed in by a surrounding noise of severity, representing the emotional interplay of protection versus vulnerability.</desc>
