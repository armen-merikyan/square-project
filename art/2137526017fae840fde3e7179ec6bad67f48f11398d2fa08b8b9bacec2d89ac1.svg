<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Interplay</title>
  <desc id="desc">The piece embodies the tension between trust and suspicion through a contrasting palette of cool blues and muted purples. The soft cyan represents trust, creating a serene base, while the dark hues introduce an element of suspicion and tension. The main collision occurs at the center, where the bright and dark tones intersperse, symbolizing emotional conflict. The layout opens at the right edge like a gate to channel energy from suspicion to emerging trust, enhancing the dynamic flow across the canvas. Broken pixels induce intentional flaws that mirror the fragility within trust, adding depth without losing clarity.</desc>
