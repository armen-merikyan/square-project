<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Dualities</title>
  <desc id="desc">This piece explores the emotional tension between envy and gratitude, expressed through a high-contrast palette of black, white, and pale blue, accented with red. The arrangement intentionally creates a heavy center, where darker hues dominate, suggesting the weight of envy, while lighter colors pulse outward, echoing the essence of gratitude. The zigzag pattern disrupts the visual flow, creating tension and interruption, allowing feelings of both calm and rage to coexist, thus representing the collision of contrasting emotions effectively.</desc>
