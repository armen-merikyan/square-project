<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone oscillates between vulnerability and protection, reflecting the tension of exposure against safety. The color palette of warm brown and shelter green embodies safety, complemented by the cold white of exposure, creating a stark contrast. The composition divides the square vertically with warmer hues on one side, representing safety as a static barrier, while the cooler hues symbolize exposure as a fluid thread weaving through the pattern. The chosen design features intentional disruptions—broken pixels, scattered in the form of cold white and pale skin—suggesting fragility and moments of vulnerability within the protective embrace of warm brown and shelter green. Such interruptions convey a feeling of unease and dislocation, forming a narrative that embodies the tension within the seed text.</desc>
