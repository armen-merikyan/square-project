<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">This artwork embodies the emotional struggle between panic and control. The chosen palette of black, dark violet, soft gold, and pale green creates a contrast between dark, oppressive tones and lighter, hopeful hues. The grid pattern representing panic is juxtaposed with dot patterns symbolizing control, generating tension as the stark vertical lines clash with softer circular forms. The use of broken pixels introduces imperfection, reflecting the chaotic nature of emotions. The arrangement creates a dynamic with the center radiating outward, suggesting a battle between internal dread and the external calm of control.</desc>
