<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork embodies the emotional tension between desire and emptiness. The clash between warm, saturated hues, symbolizing desire, and low-saturation tones representing emptiness is emphasized within a structured layout. The outer border in muted tones encapsulates a core of vibrant broken dots, relaying the struggle of an overwhelming drive restrained by boundaries. The chaotic placement of edges and broken pixels underlines the disorder inherent in this emotion, resonating with the ‘cut edges’ and ‘order vs disruption’ elements from the seed.</desc>
