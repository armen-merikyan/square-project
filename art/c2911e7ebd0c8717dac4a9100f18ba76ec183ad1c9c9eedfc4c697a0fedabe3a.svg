  <title id="title">Fragmented Trust</title>
  <desc id="desc">The emotional tone explores the tension between trust and suspicion, using a palette that complements the quiet pressure theme. The colors alternate between muted gray tones, representing suspicion, and soft peach and off-white hues, symbolizing trust. The main collision occurs in the center where darker pixels intrude, suggesting a fracture in trust. This duality creates a rhythm of interruption versus stability, reflected through the diagonal flow and broken structure, embodying resilience amidst fragility.</desc>
