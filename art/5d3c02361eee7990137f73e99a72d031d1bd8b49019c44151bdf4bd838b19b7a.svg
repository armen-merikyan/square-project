<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This work captures the tension between love and betrayal through the interplay of warm and cool colors, reflecting warmth with pinks and reds contrasted sharply against the dark greys and maroon edges that evocate a sense of loss. The layout features a grid where the structured lines of crosshatch clash with the scattered, incomplete elements, symbolizing the fractured state of a relationship. The inclusion of slightly misplaced pixels lends an air of imperfection, reinforcing the theme of broken symmetry. The palette was chosen to embody both warmth and ache, creating a stark emotional tension.</desc>
