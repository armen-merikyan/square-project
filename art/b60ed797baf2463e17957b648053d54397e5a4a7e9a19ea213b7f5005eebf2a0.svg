<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Bounded Curiosity</title>
  <desc id="desc">The emotional tone oscillates between the starkness of certainty (represented by clean whites and dark blacks) and the fluid nature of curiosity (expressed through softer blues and vibrant oranges). The palette captures a play of clarity against ambivalence, creating a visual tension that embodies a search for meaning. The primary contrast occurs diagonally, where the structured checker pattern of certainty meets the static, unpredictable disruptions of curiosity, generating an echoing rhythm that pulls the viewer’s gaze. This arrangement mirrors the intended struggle between being confined and the desire to explore, shaping the artwork into an abstract narrative that invites contemplation.</desc>
