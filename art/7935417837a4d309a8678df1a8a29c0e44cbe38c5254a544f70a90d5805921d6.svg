<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Resonance</title>
  <desc id="desc">This composition explores the dichotomy of love and betrayal, encapsulated in a high-contrast palette. The warm tones of pink and red symbolize love, while the cooler greys and dark maroon signify the coldness of betrayal. The layout is predominantly empty, referencing the isolation of an 'empty room' juxtaposed with the intense emotional noise created through the pattern. Here, the contrasting colors collide at the center, creating a dynamic tension. Sharp edges create a sense of unease, balanced by softer tones representing love, suggesting a push and pull between conflicting emotions. The arrangement invites viewers to navigate the complexities of these feelings without depicting literal objects—emphasizing emotional weight and space instead.</desc>
