<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Disrupted Connections</title>
  <desc id="desc">This artwork explores the emotional dichotomy of loneliness against connection using a palette inspired by faded memories—a collection of sepia, tan, dust gray, and faded blue. The contrast is built on warm colors clashing with cooler tones, invoking a sense of tension but also an underlying connection. The rows exhibit a top-weighted density with lighter colors bleeding outward from the center, echoing the seed's themes of isolation and exposure. There are intentional broken pixels to provide a sense of imperfection, reinforcing the fractured nature of connection. The pattern reflects a checkerboard of fragmented experiences, illustrating the push and pull of human interaction with hints of quiet space amidst denser clusters, evoking both warmth and detachment.</desc>
