<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Unveiled Tensions</title>
  <desc id="desc">The emotional tone reflects the dichotomy of defiance and submission, visualized through an interplay of bright, bold colors against soft, muted tones. The palette combines 'off_white', 'dust_gray', 'compressed_red', 'dark_navy', and 'faint_peach' to evoke both warmth and calm yet sharp contrast. The edge style suggests shadows that augment the feeling of pressure and collapse within the square. The main collision occurs in the center with dense, dark colors representing defiance, while the softer hues subtly retreat to the edges, conveying submission, creating tension and dynamic rhythm. The seed inspired spiraling patterns that suggest movement and invasion, rather than literal shapes, guiding the abstract composition to embody emotional complexity.</desc>
