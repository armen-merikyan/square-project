<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Balance</title>
  <desc id="desc">This piece captures the tension between fear and hope through contrasting dark and light colors. The deep blacks and dark violets create a sense of weight and pressure, reflecting fear, while soft gold and pale green symbolize the lightness and promise of hope. The arrangement is designed to split vertically, with darker hues occupying the left side, intersected lightly by brighter accents. The edges have a pixel bleed effect, giving it a dynamic feel, echoing the struggle between opposing emotions. The broken pixels add imperfection, enhancing the theme of confrontation and imbalance.</desc>
