<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">The emotional tone reflects a struggle between the notions of control and surrender, depicted through a palette that contrasts the pressure of dark colors with soft, pale blues. The design features a dense black central outline, embodying control, surrounded by rippling waves of pale blue, representing surrender. The dominant black creates a visual weight in the center, which is disrupted by softer hues that suggest a gentle transition towards release. This composition captures the essence of overflowing containment and the delicate equilibrium between force and ease.</desc>
