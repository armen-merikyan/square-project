<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Static Echo</title>
  <desc id="desc">This piece explores the tension between trust and suspicion by juxtaposing dense clusters of warm and cool colors. The yellow and orange create an atmosphere of trust while muted purple and deep blue inject an air of suspicion. The layout features a narrow channel disrupting the density, echoing the emotional splits suggested by the seed. The subtle glow of yellows against darker shades represents resilience amidst fragility, while broken pixels introduce intentional imperfections, mirroring the disruptions of signal versus noise.</desc>
