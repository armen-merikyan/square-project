<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes in Contrast</title>
  <desc id="desc">The emotional tone reflects a dynamic struggle between longing and resolve, symbolizing two opposing forces within a structured grid. The palette shifts between soft, warm hues like rose clay and distant lilac representing longing, contrasted with the steadiness of cooler, darker shades like warm shadow and cool blue which embody resolve. The collision occurs primarily in the center where the dense pixel clusters meet quiet fields, illustrating an emotional push and pull. Each row builds on this tension, flowing from warmer tones to cooler ones, embodying the interplay of desire and restraint as abstract distance.</desc>
