<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This abstract piece encapsulates the emotional clash between vulnerability and strength. The palette features warm and cool tones, reflecting intimacy (rose clay and warm shadow) against distance (cool blue and distant lilac), emphasizing the tender interplay of exposed versus protected spaces. The center showcases a pale core, symbolizing vulnerability, surrounded by a grid pattern that represents strength through a ladder motif. The emphasis is on the collision of these patterns at the center, creating a pulsing dynamic where pale light disrupts the surrounding intensity, capturing the tension between desire and emptiness.</desc>
