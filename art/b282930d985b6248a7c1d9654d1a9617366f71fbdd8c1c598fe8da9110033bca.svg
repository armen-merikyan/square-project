  <title id="title">Wave of Contrast</title>
  <desc id="desc">The emotional tone reflects a duality of joy and grief, expressed through contrasting warm and cool colors. The chosen palette of yellow, orange, deep blue, and muted purple represents this emotional clash, with joy symbolized by warm, expansive colors and grief by deeper blues. The layout mirrors itself with subtle breaks to convey the push-pull of emotions—inferring waves of movement between high-density joy and the quiet, maze-like nature of grief. The collision occurs primarily in the center where warm colors interrupt cool, suggesting a point of tension.</desc>
