<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">The emotional tone reflects a tension between softness and severity, encapsulating how gentle edges emerge yet feel constrained by dark boundaries. The palette combines warm white and powder pink to evoke softness, juxtaposed with the sharp crimson and carbon black for severity, creating a stark contrast that resonates within the layout. The inner 4x4 uses stacked patterns of warmth, interrupted occasionally by deep black to represent severity—signifying the pulsating tension in relationships and emotions. The collision between the soft core and hard edges magnifies the dichotomy of guilt and forgiveness, reflecting an unwillingness to fully embrace either state.</desc>
