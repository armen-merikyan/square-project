<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order and Chaos</title>
  <desc id="desc">This composition contrasts the heaviness of grief with the lightness of joy. The palette includes deep blues and muted purples to represent grief, contrasted against bright yellows and oranges symbolizing joy. The upper rows feature a structured pattern embodying order, while the lower rows break apart to evoke chaos, creating a zigzag flow. The edges are sharp to enhance the feeling of being threatened by chaos encroaching from below, contrasting with the orderly upper section to suggest an internal conflict between safety and turmoil.</desc>
