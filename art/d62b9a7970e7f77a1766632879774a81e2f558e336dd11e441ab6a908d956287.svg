  <title id="title">Tension of Dualities</title>
  <desc id="desc">This artwork explores the emotional tension between love and betrayal, utilizing a palette of warm pinks and reds contrasted with cool grays and dark maroons. The top half embodies the warmth and radial patterns representing love, while the bottom half depicts sharp, striped patterns evoking betrayal. The flow from warmth to cool is punctuated by broken pixels that symbolize imperfection and disruption within relationships. The layout embraces a split horizontal division, emphasizing the divide between the two emotions, while the color density shifts create a narrative of quiet chaos, echoing the feelings of loneliness and internal conflict.</desc>
