<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">The emotional tone captures the struggle between clarity (signal) and interference (noise). The chosen palette of dim cyan and navy evokes solitude and depth, while the thin outlines create defined but fragile boundaries, symbolizing the edge between understanding and confusion. The main collision occurs at the center where bright cyan (signal) meets the deep navy (noise), illustrating the pulse of clarity attempting to navigate through static disruptions. The ladder pattern suggests upward movement and aspiration, while the rain pattern intersperses interruptions, maintaining a sense of dynamic tension throughout the square.</desc>
