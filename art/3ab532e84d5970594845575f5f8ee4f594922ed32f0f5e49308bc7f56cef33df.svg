<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This composition evokes the emotional tension between joy and grief. The top four rows explore joy through a checkerboard pattern combining warm yellows and oranges, suggesting brightness and openness. The bottom four rows depict grief with fragmented, stripe-like patterns in deep blues and muted purples, illustrating heaviness and introspection. The sharp contrast between the structured upper half versus the chaotic lower communicates a battle between exuberance and sorrow, mirroring the complex nature of human emotion. Broken pixels infuse imperfection, while negative space allows for breathing room amidst intensity.</desc>
