<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Distortion</title>
  <desc id="desc">This composition captures the dichotomy of clarity and chaos described in the seed. The palette consists of navy and dim cyan, creating a base of quiet against deeper, darker contrasts. The pattern's collision, represented by the 'teeth' and 'stairs', forms a dense center that struggles against the surrounding static, embodying the central theme of 'signal vs noise'. The use of broken pixels introduces intentional imperfections, amplifying the emotional tone of disruption, while maintaining an open-corner square frame to reflect moments of clarity amidst the chaos.</desc>
