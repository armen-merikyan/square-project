<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Borders</title>
  <desc id="desc">The emotional tone here contrasts the contained pressure of control with the opened edge of surrender. The palette, featuring pale mint and storm gray, reflects the tension between calmness and heaviness. The collision occurs predominantly in the center six pixels, where vibrant soft sky and deep near black clash, creating a visual tug-of-war that suggests both an overflow from the rigid border of control and an enticing lure towards surrender. The jagged edges enhance the feeling of disruption and broken continuity, emphasizing the emotional struggle.</desc>
