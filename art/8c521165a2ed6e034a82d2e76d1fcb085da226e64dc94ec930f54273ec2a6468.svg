<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Contrast</title>
  <desc id="desc">This piece embodies the emotional tension between love and betrayal through the juxtaposition of warm and cool colors, with a palette of pinks, reds, greys, and dark maroon. The upward flow suggests hope, while the crosshatching pattern creates visual noise that disrupts this ascent—reflecting the complexity of emotional states. The main collision occurs where vibrant reds clash against muted greys, evoking feelings of passion overshadowed by distrust. The arrangement invites reflection on the nuances of relationships, remaining abstract to honor the complexity of these emotions.</desc>
