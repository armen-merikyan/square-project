<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">The emotional tone oscillates between joy and grief, represented by a palette of warm yellow and orange contrasted with deep blues and muted purples. The bright colors start from the left, symbolizing joy, and are intricately intertwined with the heavier, darker colors representing grief, creating a sense of collision and tension across the grid. The layout and patterns use an asymmetrical flow, introducing 'flame'-like bursts of joy against 'stair'-like gravitations of grief, further enhanced through a few broken pixels to suggest imperfection and complexity. The seeds of pulse and symmetry versus break enhance the experience of movement and interrupted continuity.</desc>
