<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Signals</title>
  <desc id="desc">The emotional tone reflects a struggle between bright defiance and subdued submission, captured in the vibrant warm coral and signal cyan clashing against the heavier muted hues of blue_black and cold_slate. The center features a dense cluster of colors, symbolizing the resistance and upward motion inherent in defiance, while the edges soften to imply submission's downward pull. The layout mirrors on either side with subtle breaks, encapsulating the feeling of disruption and echoing the seed's themes of invasion and spiraling tension.</desc>
