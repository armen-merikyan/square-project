<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Boundaries</title>
  <desc id="desc">The emotional tone captures the dance between desire's vibrant saturation and restraint's muted containment. The palette is chosen for its contrast—the hot coral and blood orange represent desire, while charcoal and hollow blue embody restraint. The collision occurs primarily in the center, where saturated colors erupt against more limited hues, reflecting the struggle between reaching out and being confined. The layout features a vivid center like a spiral consuming edges, with scattered, broken pixels acting as interruptions that resonate with the theme of love and betrayal.</desc>
