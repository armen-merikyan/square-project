<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Emotion</title>
  <desc id="desc">The emotional tone reflects a tension between defiance (represented by darker, bolder shades) and submission (the lighter, more neutral colors). The chosen palette of deep navy and black against hints of dim cyan signifies loneliness and contrast. The pattern flows from top to bottom, suggesting a sense of falling; the arrangement emphasizes weight and pressure, especially in the darker rows, while lighter spaces allow for breathing or open moments. There are intentional collisions where darker pixels heavy-handedly interrupt lighter sequences, suggesting moments of conflict within the overall composition.</desc>
