<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Boundaries</title>
  <desc id="desc">This artwork conveys the emotional tension between desire and restraint, showcasing saturated colors bursting against muted backgrounds. The bright coral and orange pulse marks symbolize desire, encroaching into the space of restrained, charcoal dots. The composition's edges are sealed, creating a boundary where desire seeks to overflow into the restrained sections. Central collision occurs as deep hues subtly intertwine with energetic splashes, reflecting dynamic human emotion. The design echoes themes of love and betrayal as pressures build and release, resulting in a vibrant yet contained piece.</desc>
