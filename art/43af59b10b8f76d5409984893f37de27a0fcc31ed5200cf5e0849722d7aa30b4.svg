<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition captures the emotional tension between vulnerability and strength through the use of contrasting colors and patterns. The palette features muted cream, blackened plum, and red oxide to evoke feelings of restraint and hunger. The lattice pattern representing strength collides with the fluid channels representing vulnerability, creating a dynamic interplay. The central area is denser and warmer, radiating strength, while the surrounding colors are quieter and cooler, symbolizing vulnerability. Broken pixels are intentionally placed to create an imperfect edge, emphasizing exposure amidst shelter.</desc>
