<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Echoes</title>
  <desc id="desc">This abstract artwork embodies the emotional duality of loneliness and connection. The left half, representing loneliness, is dominated by darker, muted colors, creating a sense of isolation and negative space. Each 'stair' pattern adds a sense of depth and disconnectedness while yielding to the upper weight. Conversely, the right side employs lighter, brighter tones, using 'dot' patterns to represent fleeting moments of connection. The central burst reflects a clash of these two emotional states, creating a collision of feeling. The overall composition plays with hidden versus exposed elements, adhering to the split vertical layout and allowing for a meditative tension between the two sides.</desc>
