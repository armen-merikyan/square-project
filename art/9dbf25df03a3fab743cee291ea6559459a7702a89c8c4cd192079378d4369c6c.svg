<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Resistance</title>
  <desc id="desc">This piece represents a dynamic struggle between defiance and submission. The central colors are dark and intense, illustrating a strong resistance at the core ('defiance'), while the outer ring of softer colors conveys a sense of surrounding pressure and gentleness ('submission'). The palette includes icy blues and blacks to emphasize contrast, while vibrant orange sparks disrupt the somber tones, creating an emotional tension that echoes the seed's themes of noise versus clarity and inner conflict. The arrangement imposes a spiral-like motion emanating from the center, suggesting an inward pull against outward pressure, a dance between density and emptiness, culminating in an intriguing visual story of unresolved emotion.</desc>
