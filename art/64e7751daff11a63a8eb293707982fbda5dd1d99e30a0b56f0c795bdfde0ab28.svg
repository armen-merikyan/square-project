<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Intersecting Tensions</title>
  <desc id="desc">This piece explores the emotional dichotomy of softness versus severity, represented through a palette that juxtaposes warmth and coolness. The use of powder pink and warm white denotes softness while carbon black and sharp crimson emphasize severity. The primary contrast arises from a dense center pulse in dark colors, transitioning to lighter hues toward the edges, suggesting a quiet channel around a heavy core. The patterns—crosshatch for softness and stripes for severity—intertwine and collide, reflecting the emotional complexity and tension between opposing feelings, as the piece embodies both pressure and release. The broken pixels scattered throughout add imperfection and dynamism, enhancing the narrative of guilt and forgiveness. The layout intentionally leaves negative space, enhancing the viewer's engagement with the contrasting elements.</desc>
