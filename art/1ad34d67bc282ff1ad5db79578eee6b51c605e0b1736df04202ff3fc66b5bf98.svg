<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tear of Connection</title>
  <desc id="desc">This piece captures the emotional tension between loneliness and connection through a contrast of darker and lighter tones. The black represents the weight of loneliness while the soft gold and pale green hint at the desire for connection. The layout signifies rising hope in an abstract nature, with waves of color suggesting bursts of energy within the void. The cracks symbolize hidden struggles and the broken pixels add an element of imperfection, representing the raw reality of this emotional landscape.</desc>
