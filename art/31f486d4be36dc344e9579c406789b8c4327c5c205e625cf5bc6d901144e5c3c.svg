<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Suspicion</title>
  <desc id="desc">This composition captures the emotional dance between trust (represented by the structured warmth of gold and burnt orange in the upper half) and suspicion (symbolized by dark reds and charcoals that break the pattern in the lower half). The strict pattern in the top rows contrasts with the jagged, erratic elements below, emphasizing the collision of emotions. The palette, 'ancient_fire', was selected for its warmth, inviting initial trust but introducing dark tones to evoke the tension of suspicion. The flow is outward from the center, suggesting an expansion of feelings. The use of broken pixels introduces an imperfection that enhances the overall narrative of emotional turbulence.</desc>
