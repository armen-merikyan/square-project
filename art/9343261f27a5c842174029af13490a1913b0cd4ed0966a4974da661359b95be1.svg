<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Fractures</title>
  <desc id="desc">This piece embodies the tension of pride and shame through a dynamic interplay of light versus dark. The chosen palette of sepia, tan, dust_gray, and faded_blue evokes a sense of nostalgia and depth. The composition's outer border is defined by darker shades, symbolizing shame, while the inner section contrasts with lighter tones, representing pride's brilliance. Broken edges give an impression of disruptions and imperfections, enhancing the emotional collide of feelings. Patterns weave a narrative of radial pride mixed with the interrupting ring of shame, leaving deliberate negative space to signify unresolved feelings.</desc>
