<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">The emotional tone explores the duality of joy and grief through a balancing act of colors—where bright yellows expand in clusters, echoing joy and vibrant life, intersecting with deep blues that convey a sense of weight and sorrow. The palette of yellow, orange, deep blue, and muted purple creates a melodrama of brightness intertwining with heaviness, suggesting the collisions and resolutions between opposing feelings. The zigzag pattern reflects moments of uplift and downturn, symbolizing the emotional undulation of life while the placement of colors maintains negative space, inviting contemplation and allowing viewers to explore their feelings of joy against the heaviness of grief.</desc>
