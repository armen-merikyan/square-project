<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This abstract composition reflects the emotional tension between rage and calm through a spread of contrasting colors and fragmented patterns. The use of dominant black and red suggests explosive rage, while the pale blue introduces a sense of calmness. The layout—focused on a halo void—creates a visual disruption in the middle, with red jagged edges clashing against soft blue fields, depicting an emotional disturbance. The balance of chaotic and serene hues echoes the seed's themes of containment and overflow, with broken pixels used to evoke scars from emotional battles. The arrangement creates a narrative of tension and resolution, inviting the viewer to explore the nuances of this complex emotional landscape.</desc>
