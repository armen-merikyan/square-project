<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resistance</title>
  <desc id="desc">This piece captures the tumultuous relationship between defiance and submission through a clash of warm and cool tones. The palette, inspired by 'guilt_forgiveness,' mixes deep wine for emotional weight, soft gold as a subtle focal point, and ash gray to denote the quiet spirals of submission. The main tension radiates from the center, where the darker shades press against lighter, airy colors, creating a dynamic interplay that suggests both the struggle and acceptance inherent in the emotional themes. Broken pixels serve as intentional disruptions, signifying the scars of conflict and the push-pull of inner turmoil. The overall structure maintains clear readability, yet offers complex layers beneath the surface.</desc>
