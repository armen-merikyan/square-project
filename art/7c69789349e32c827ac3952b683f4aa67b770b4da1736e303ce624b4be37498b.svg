<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tectonics</title>
  <desc id="desc">The emotional tone explores the dichotomy of panic and control, represented by a palette of deep navy and stark black, punctuated by hints of dim cyan and a solitary white. The arrangement employs a falling pixel layout, introducing tension between denser clusters of color towards the edges and sparse negative space at the center. This echo of panic within the structured lines of control suggests a flow from chaotic descent to a calm stillness, creating a visual tension that captures the essence of the seed.</desc>
