<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition embodies the emotional contrast between vulnerability and strength. The inner 4x4 grid represents fragility with muted colors, while the outer frame symbolizes resilience using stronger hues. The palette mixes earthy greens and soft whites with rust and gray accents to reflect a balance between exposure and safety. The main collision occurs at the center where the vulnerability (scar pattern) interrupts the structured strength (frame pattern), creating a compelling tension. The broken pixels add intentional disruptions to enhance the narrative of fragility within safety.</desc>
