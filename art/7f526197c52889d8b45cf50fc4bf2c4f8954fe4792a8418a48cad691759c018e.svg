<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">The emotional tone explores the tension between crowded pressure and serene quiet. The chosen palette of off-white, dust gray, compressed red, dark navy, and faint peach provides a visual balance of soft and hard edges. The main collision of colors arises from the deep navy and compressed red manifesting on one side, contrasting sharply against the lighter hues that symbolize calm. This pattern embodies the seed's essence, illustrating the push and pull felt when quiet meets pressure, with a diagonal spread enhancing the narrative of conflict and release.</desc>
