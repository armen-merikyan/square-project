<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This composition embodies the emotional tension of restlessness against the serene backdrop of peace. The chosen palette features calming hues like shelter green and cold white, tempered with warmer accents such as warm brown to signify the conflict inherent in memory versus motion. The main collision occurs diagonally from the top left to the bottom right, where broken frame patterns around a dense island of colors play against a veil of quieter tones, mirroring the push and pull of these opposing emotions. The negative space allows for reflection, enhancing the feeling of edge crawl while areas of denser color evoke the flames of restless memory.</desc>
