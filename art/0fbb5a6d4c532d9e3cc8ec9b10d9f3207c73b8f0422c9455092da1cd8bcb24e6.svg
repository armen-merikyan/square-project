<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Signals</title>
  <desc id="desc">The emotional tone reflects an interplay between trust and suspicion, embodying the tension between stability and disruption. The palette combines muted greens and browns for the trust side with cooler blues and whites representing suspicion. The organization starts solid in the top-left corner, gradually breaking apart towards the bottom right, symbolizing the encroaching chaos of suspicion. Highlights of cold white and open blue create harsh contrasts against the warmer, grounded colors, illustrating the collision between comfort and uncertainty. The main contrast occurs diagonally, creating a dynamic split that emphasizes the emotional narrative of resilience against fragility.</desc>
