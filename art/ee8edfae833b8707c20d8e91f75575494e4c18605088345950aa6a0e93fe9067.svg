<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Tension</title>
  <desc id="desc">This piece embodies the emotional dichotomy of vulnerability and strength through a carefully curated palette of off-white, dust gray, compressed red, dark navy, and faint peach. The main contrast emerges at the center where the gravity of deep navy and the lightness of off-white collide, suggesting a struggle between shelter and exposure. The checker pattern signifies strength while the stack pattern reflects vulnerability. Broken pixels create intentional disruptions, symbolizing moments of distress amid stability, rendering an abstract narrative of tension and release.</desc>
