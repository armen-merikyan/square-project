<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrasts</title>
  <desc id="desc">This artwork embodies the emotional tension between control and panic through a dynamic interplay of colors and patterns. The chosen palette of sepia, tan, dust gray, and faded blue evokes a sense of nostalgia tinged with quiet reflection. The main contrast occurs between the muted sepias at the edges and the cooler tones radiating from the center, symbolizing the pressure of silent emotion breaking through. Interspersed broken pixels enhance the feeling of collision and imperfection, representing the chaotic interplay of feelings amidst calmness. The diagonal flow suggests a gradual invasion of emotion, reinforcing the narrative of shifting rhythms from tranquil to turbulent.</desc>
