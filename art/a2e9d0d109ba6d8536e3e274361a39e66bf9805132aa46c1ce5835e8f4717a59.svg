<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tension</title>
  <desc id="desc">This composition captures the emotional duality of rage and calm, expressed through a juxtaposition of sharp reds and soft blues. The vibrant reds depict unrestrained rage, cutting through the calm, pale blues that represent tranquility. The center, heavily influenced by the red wave pattern, creates a strong contrast against the cooler shades, suggesting an emotional core under threat. Broken pixel placements introduce imperfection, enhancing the abstract story of struggle and balance within the constrained space. The piece engages the viewer with a sense of movement, where sharp verticals clash with horizontal calm, embodying the conflict of feelings implied by the seed.</desc>
