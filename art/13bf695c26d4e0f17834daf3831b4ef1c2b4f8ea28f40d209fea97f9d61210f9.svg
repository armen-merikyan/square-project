<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Time</title>
  <desc id="desc">This artwork reflects the emotional contrast between nostalgia and progress through its palette and layout. The chosen colors—burnt orange, dark red, charcoal, and gold—invoke warmth and a sense of underlying tension, reminiscent of faded memories and the promise of advancement. The left side uses a pattern akin to 'teeth,' signifying the jagged remnants of past experiences, while the right side flows like 'rain,' suggesting the fluid nature of progress. The center showcases a weighted dark area, disrupting the flow and creating a collision that embodies the struggle between holding on and moving forward, with intentional broken pixels to invite imperfection and evoke memory.</desc>
