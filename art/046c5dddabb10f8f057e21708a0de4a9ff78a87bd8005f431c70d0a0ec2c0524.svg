<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience in Flux</title>
  <desc id="desc">The emotional tone is a juxtaposition of strength and vulnerability, expressed through a palette that balances muted and vibrant colors: moss green (strength), bone white (vulnerability), rust (collision), stone gray (foundation), and small gold (accent). The central collision of colors occurs in the form of dense patterns of moss green broken by pale cracks and deep hues of rust, representing vulnerability breaking into strength. The quiet negative space underscores the chaotic central path, symbolizing the tension between control and overflow.</desc>
