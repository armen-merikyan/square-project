<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This composition explores the tension between rage and calm through explosive and soft visual elements. The use of a predominantly black palette contrasts sharply with moments of pale blue and white, suggesting a violent collision against a serene background. The pattern transitions from a calm maze on the left to jagged radial bursts of red on the right, illustrating the chaotic impetus of rage breaking into tranquility. The arrangement reflects a corner invasion, with elements of density building towards the top right, evoking a sense of rising pressure and conflict. Broken pixels add an imperfect edge, enhancing the emotional narrative of fracture within emotion.</desc>
