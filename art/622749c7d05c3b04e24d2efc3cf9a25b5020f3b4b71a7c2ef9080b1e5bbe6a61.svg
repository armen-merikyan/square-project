<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This artwork explores the emotional tone of 'quiet' contrasting with 'pressure'. The palette features muted tones of 'off_white' and 'dust_gray' for quietness, with 'compressed_red' and 'dark_navy' introducing tension and pressure. The top half employs a crosshatch pattern representing quiet space, while the bottom half uses a grid pattern symbolizing dense pressure. The center collision interrupts the flow, creating a visual breach between calmness and intensity. By blending these techniques, the piece visually embodies the journey from stillness to tension, reflecting the emotional dynamics of the seed.</desc>
