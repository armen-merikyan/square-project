<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Dualities</title>
  <desc id="desc">The emotional tone created is one of unresolved tension between trust and suspicion. The palette, drawing from muted cream, red oxide, and blackened plum, evokes warmth alongside dark undertones, embodying the push-and-pull of these emotions. The sharp edge style and asymmetrical layout create a sense of imbalance, enhancing the feeling of instability. The main collision occurs centrally where 'trust', represented by a soft echo pattern, meets 'suspicion', a stark and stacked formation, reflecting the layers of complexity in relationships. The broken pixels introduce imperfections, suggesting the fragility inherent within trust, while the negative space emphasizes the vacuum of unresolved emotions.</desc>
