<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Longing and Resolve</title>
  <desc id="desc">This artwork captures the emotional tension between longing and resolve through the juxtaposition of ordered and chaotic patterns. The palette features calm aqua and misty grays with sharp alarm red accents, creating a visual dynamic that reflects the contrast between inner yearning and stability. The central collision is found in the intersection of dense clusters of red against the quieter pastel background, suggesting an unresolved push and pull, while the broken pixels add a layer of imperfection, echoing the fragility of emotional states. Overall, the piece embodies the delicate balance between intimacy and distance, achieved through rhythmic interruptions and layered densities.</desc>
