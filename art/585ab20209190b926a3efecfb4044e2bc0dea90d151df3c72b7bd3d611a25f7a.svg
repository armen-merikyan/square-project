<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This artwork explores the emotional juxtaposition between joy and grief. The upper rows, showcasing a vibrant palette of yellows and oranges, evoke warmth and a sense of joy, characterized by sharp, zigzagged patterns reminiscent of smiles and spark-like moments. In contrast, the lower rows delve into the muted depths of grief, with soft blues and purples that create a heavy, flame-like texture, suggesting a struggle against an underlying chaos. The hard edge between the two halves exemplifies the collision of these emotions while incorporating broken pixels for a sense of imperfection and realism. This piece symbolizes the duality of human emotion through color and contrast, manifesting the complex dance between light and dark within our experiences.</desc>
