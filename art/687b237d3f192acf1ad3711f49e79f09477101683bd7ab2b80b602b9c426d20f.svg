<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Reach and Hold</title>
  <desc id="desc">The emotional tone explores the interplay between desire, represented by vibrant and saturated colors, and restraint, illustrated through muted tones. The palette of hot coral and blood orange symbolizes yearning, while charcoal and hollow blue evoke a feeling of confinement. The main contrast occurs in the center, where the strong colors push against the darker, contained sections, creating a visual clash. This arrangement reflects the spiral pressure of conflicting emotions, mirrored in the interplay between frame and split-screen patterns. The arrangement forms a locked lattice against bursts of warmth, encapsulating the conflicting energies of love and betrayal.</desc>
