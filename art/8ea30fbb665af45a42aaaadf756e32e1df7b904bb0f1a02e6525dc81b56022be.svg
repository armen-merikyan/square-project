<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse in the Static</title>
  <desc id="desc">The emotional tone captures a dynamic tension between a clear, bright signal and fragmented noise. The palette, featuring signal green, electric blue, hot magenta, static gray, and dead black, reflects a vivid interplay where the green represents a hopeful clarity, while the magenta suggests disruptive forces. The collision occurs in a diagonal manner, where noise braids through the stronger signal, echoing the themes of interruption and resonance. The structured layout emphasizes the contrast between the two emotions, creating an abstract composition that visually narrates the struggle against distortion.</desc>
