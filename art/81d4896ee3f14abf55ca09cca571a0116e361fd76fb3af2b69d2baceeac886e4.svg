<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This artwork explores the emotional contrast of joy and grief through vibrant yellows and muted blues, creating a visual tension that reflects the duality of human experience. The split horizontal layout evokes a sense of fragmentation, while the vertical wave flow suggests the ups and downs of emotion. The checker pattern denotes conflict, hinting at the struggle between light and shadow. Subtle broken pixels disrupt uniformity, symbolizing the imperfections of memory and emotion, while maintaining ample negative space to evoke spaciousness amongst the dense clusters. The piece ultimately invites the viewer to reflect on the complexities of joy and grief as intertwined experiences.</desc>
