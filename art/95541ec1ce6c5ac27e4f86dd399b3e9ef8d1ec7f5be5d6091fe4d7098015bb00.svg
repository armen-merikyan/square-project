<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This artwork captures the emotional conflict of relief versus dread through a contrasting color palette and structured chaos. The deep storm gray and near black colors represent dread with dense, dark clusters on one side, creating pressure. In contrast, the lighter pale mint and soft sky colors depict relief, allowing light and open spaces to emerge counter to the darker tones. The checker pattern of dread collides with the static pattern of relief, creating a structured imbalance. The broken pixels are scattered, simulating disruptions, echoing the tension between order and chaos inherent in the seed.</desc>
