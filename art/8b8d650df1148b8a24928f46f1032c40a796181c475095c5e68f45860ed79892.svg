<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This artwork embodies the conflict between defiance and submission through the interplay of angular, bright colors against muted fields. The use of hot coral and blood orange expresses the intensity of defiance, while the charcoal and hollow blue suggest the stillness of submission. The top rows evoke chaotic defiance with crack-like patterns, reflecting upward momentum, while the bottom rows present softer, shattering edges representing retreat. The center of the piece serves as a threshold, where the two emotions collide, showcasing that tension between contrasting forces is notable in both warmth and coolness.</desc>
