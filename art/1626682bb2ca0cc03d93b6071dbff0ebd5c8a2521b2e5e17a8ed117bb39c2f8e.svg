<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contradiction</title>
  <desc id="desc">This composition embodies the emotional tension between confusion and clarity. The palette combines dark and warm tones of burnt orange and dark red against crisp charcoals and golds, creating a strong contrast that echoes the struggle between clarity and chaos. The layout of falling pixels suggests a descent into disorder, with broken pixels strategically placed to disrupt symmetry, reinforcing the theme of false harmony. Each row conveys a pulse: some dense and energetic, others soft and open, reflecting the quiet versus noise dynamic. Overall, the artwork embodies a narrative of collision while remaining abstract, allowing emotional interpretation without a literal representation.</desc>
