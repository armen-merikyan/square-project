  <title id="title">Fragile Borders</title>
  <desc id="desc">The emotional tone embodies the conflict between safety and exposure, with soft greens and warm browns representing shelter, while pale skin tones and cold whites evoke vulnerability. The palette is intentionally chosen to contrast secure warmth with exposed fragility. The main collision appears at the center, where the warm tones clash against cooler aspects, evoking a push and pull of emotions. The zigzag pattern highlights moments of tension, while broken pixels suggest imperfections in the protective layers, embodying the theme of fragmented safety.</desc>
