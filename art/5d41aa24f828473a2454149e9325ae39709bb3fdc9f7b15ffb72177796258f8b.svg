<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Contrasts</title>
  <desc id="desc">The emotional tone represents the balance between 'longing' and 'resolve,' capturing a longing embodied in ethereal, fluid colors against the solid and defined hues representing strength. The palette—soft aqua and gray are juxtaposed with piercing red and deep blues—reflects serenity mixed with urgency. The main contrast occurs in the bottom-left corner where intense colors intersect with quiet fields, emphasizing the theme of overflow vs. containment. This placement suggests a pulse—where colored bursts echo outward from a core of tension, creating a rhythmic visual heartbeat amidst fragmented edges.</desc>
