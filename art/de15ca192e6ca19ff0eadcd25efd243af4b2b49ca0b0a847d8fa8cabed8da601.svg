<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Exposed Flame</title>
  <desc id="desc">This piece captures the delicate tension between vulnerability and strength. The palette, inspired by 'broken_memory,' employs soft sepia and faded blue hues that represent exposure against the dense gray tones signifying strength. The central collision occurs at the heart of the grid, showcasing thick blocks of stronger colors battling against the gentle crosshatch patterns that symbolize fragility. The edge-weighted layout amplifies the sense of shelter versus exposure, creating visual pressure while leaving intentional gaps to denote vulnerability. The arrangement conveys a narrative of struggle and connection amid isolation.</desc>
