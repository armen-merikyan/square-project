<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Flow of Tension</title>
  <desc id="desc">This composition explores the emotional juxtaposition of rage and calm through the utilization of contrasting color palettes and patterns. The main colors, bright red and pale blue, signify the emotional extremes of anger and serenity. The left side of the square is dominated by jagged, sharp red hues, while the right embodies soft, horizontal blue tones, embodying calmness. The collision occurs prominently at the center, where the anger spills over into the calm space, creating an echo of tension that reverberates throughout the grid. Broken pixels serve as moments of disruption, further enhancing the feeling of a fight between containment and overflow. The structure follows the open gate layout, allowing the red to encroach upon the quiet blue, suggesting an inevitable conflict that persists.</desc>
