  <title id="title">Tension of Stillness</title>
  <desc id="desc">This artwork encapsulates the emotional dichotomy between restlessness and peace using a palette that blends the warmth of pink and red with the depth of gray and dark maroon. The deliberate arrangement of colors utilizes disturbed halos and broken dots to express moments of anxiety colliding with serene spaces, particularly in the central area where the patterns conflict. The lighter colors in the center symbolize fragile peace, while darker edges evoke a sense of unrest, creating a visual tension that reflects the complexities of memory and motion.</desc>
