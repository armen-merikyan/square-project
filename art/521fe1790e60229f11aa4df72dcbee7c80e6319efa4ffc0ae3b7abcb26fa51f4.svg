<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece captures the delicate balance between vulnerability and strength, visualizing the emotional tension through color and form. The palette of stain brown, soft gold, and deep wine evokes a sense of warmth juxtaposed with ash gray and warm ivory, creating a dynamic between muted and rich tones. The main collision occurs in the center, where dense layers of 'flame' patterns disrupt a surrounding smoother 'echo', embodying the conflict between exposure and shelter. The broken pixels introduce intentional imperfections, suggesting ongoing struggles against the pressures of strength, while leaving around 15% negative space to highlight the quietness necessary to reflect on these themes.</desc>
