<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This abstract artwork captures the emotional struggle between rage and calm through its contrasting color palette of deep reds and soft blues, representing the chaotic spark of rage against the tranquil expanse of calm. The central collision occurs where the jagged red sparks intersperse with the cooler, muted blue, hinting at the tension between overflowing emotions and the effort to maintain serenity. The tense zigzag pattern emerges from the interplay of sharp angles and horizontal calm, following the layout of two pulsing centers. The use of broken pixels introduces intentional interruptions, enhancing the theme of containment versus overflowing rage, inviting contemplation of the forces at play beneath quiet surfaces.</desc>
