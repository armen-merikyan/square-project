<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Forces</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of defiance versus submission through the contrasting color palette of deep navy and stark white, symbolizing strength against fragility. The black serves as a frame, imparting weight and structure while the dim cyan adds a hint of lightness and hope. The spatial arrangement creates a sense of imbalance, with heavier colors concentrated toward the corners, suggesting bottom weight and pressure. The central pixels play with patterns — a crosshatch of defiance against a framed submission — to evoke conflict and resolution, inviting the viewer to navigate through tension and quietness in this abstract expression.</desc>
