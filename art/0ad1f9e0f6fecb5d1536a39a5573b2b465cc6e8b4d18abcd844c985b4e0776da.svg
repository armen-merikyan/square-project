<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Intimacy</title>
  <desc id="desc">The emotional tone of longing and resolve is expressed through contrasting warm and cool colors. The palette consists of hot coral and blood orange, evoking a sense of desire and urgency, against the cooler, more subdued charcoal and hollow blue that bring a sense of calm and containment. The main collision occurs at the center with a dense cluster of warm tones subtly interrupted by cooler shades, illustrating the push and pull between intimacy and distance. The shatter from longing meets the structured stack of resolve, creating an abstract interplay that conveys emotional depth and complexity.</desc>
