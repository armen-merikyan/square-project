  <title id="title">Conflict of Emotion</title>
  <desc id="desc">This artwork embodies the tension between rage and calm, employing a palette that juxtaposes sharp reds with soft blues and blacks, reflecting the emotional intensity of the seed. The top half, dominated by red and black, conveys the energy of rage through stacked patterns, while the bottom half, in subtle pale blue and white, offers a calming rain-like texture. The collision occurs distinctly in the horizontal split, where the heat of the top clashes against the coolness below, echoing the idea of an inward spiral where emotions ebb and flow.</desc>
