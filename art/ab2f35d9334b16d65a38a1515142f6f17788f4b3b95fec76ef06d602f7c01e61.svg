<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Tension</title>
  <desc id="desc">This composition embodies the emotional tension between 'rage' and 'calm.' The palette of red and pale blue establishes a stark contrast where red signifies explosive energy while the pale blue represents tranquility. The layout creates a cross-current flow with dense, jagged patches of red indicating disruption, colliding with cooler, calm areas framed in blue, reflecting an ongoing struggle between containment and overflow. The broken pixel implementation introduces intentional disruptions that echo the theme of eroded symmetry, emphasizing the chaos of 'rage.' Central to the piece is a tension point where both emotional states collide, creating a vivid narrative across the grid.</desc>
