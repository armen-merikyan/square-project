<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This artwork conveys the tension between awe and terror through a contrasting palette of warm reds and cool grays, evoking a sense of upheaval. The pattern arrangement reflects upward movement on one side and downward on the other, depicting an emotional collision between stability and chaos. By incorporating broken pixels, the composition feels imperfect yet dynamic, mirroring the complexity of memory. Soft edges introduce a gentleness that contrasts sharply with the darker tones, further enhancing the narrative of overwhelming emotions battling for dominance. The layout focuses on a central seed—a crown—evoking notions of aspiration amidst turmoil.</desc>
