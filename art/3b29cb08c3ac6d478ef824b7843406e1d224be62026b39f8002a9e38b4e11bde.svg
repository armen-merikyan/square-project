<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition embodies a tension between desire and restraint, expressed through a palette of red oxide and muted cream against a backdrop of dark purples and grays. The emotional tone reflects an internal struggle, where the saturated reds push toward the edges, symbolizing desire, while the blacks and muted hues create a lattice of restraint. The arrangement of colors forms an almost spiral pressure at the center, showcasing a dynamic collision as the vibrant colors forcefully interact with the muted backgrounds, illustrating the theme of conflict within a confined space. The layout mirrors an island surrounded by a sea of quiet, leaving negative space to reinforce feelings of restraint.</desc>
