<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone juxtaposes the fervent chaos of rage against the soothing embrace of calm. The warm palette dominated by reds symbolizes the eruption of emotions, while the cooler pale blue introduces a contrast that seeks to contain it. The central collision of bright red patterns aggressively breaks through the surrounding softer shades, reflecting a dynamic struggle. Echoes of this tension and flow are captured by the zigzag and ember patterns, creating an undulating rhythm throughout the square. The use of broken pixels adds imperfections, enhancing the feeling of a volatile conversation between two opposing forces.</desc>
