<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Tranquility</title>
  <desc id="desc">This piece explores the emotional dichotomy between restlessness and peace. The palette consists of calming pinks and deep maroons to evoke a sense of love, contrasted with the unsettling gray shades that represent turmoil. The top half is dominated by soft hues and a teeth-like pattern, suggesting peace through quiet symmetry, while the bottom half erupts into a crosshatch pattern that captures motion and restlessness. The broken pixels introduce imperfections which echo the transience of calm amidst chaos, creating a dynamic tension at the center where these feelings collide.</desc>
