<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse in Static</title>
  <desc id="desc">The piece explores the tension between signal and noise through a palette that juxtaposes vivid signal green and electric blue against darker shades of dead black and static gray. The collision happens diagonally, where the bright colors ripple through the static noise represented by the muted spectra, creating an unsettling yet rhythmic experience reflective of the seed's themes of conflict and interruption. The use of broken pixels introduces intentional imperfections that symbolize the scars of communication, while maintaining a sense of balance with the negative space.</desc>
