<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Desire and Restraint</title>
  <desc id="desc">This artwork captures the emotional tension between desire and restraint through a dynamic interplay of colors. The palette harmonizes warm reds and cool muted creams, creating a conflict reflected in the contrasting patterns. The structure features stacked warm colors in the center to represent the pull of desire, while static cool colors on the edges signify the limits of restraint. The main collision occurs at the center, where the pulsating shapes of warmth threaten to overflow into the restrained coolness, suggesting an unresolved emotional narrative. The use of broken pixels introduces intentional imperfections that symbolize scars from past experiences, reinforcing the theme of tension and release.</desc>
