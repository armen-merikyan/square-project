<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signals of Intrusion</title>
  <desc id="desc">This artwork embodies the emotional tone of vulnerability and strength, mirroring the tension between exposed and protected states. The palette of signal green, electric blue, and hot magenta creates a striking contrast, representing the rising signal against the static gray background, evoking a sensation of urgency intertwined with calm. The main collision occurs at the center, where the negative cross pattern of strength intersects with the tide of vulnerability, creating an interplay of solidity and fragility. Broken pixels disrupt the flow, adding to the organic complexity of the piece, as if revealing scars of the emotional struggle.</desc>
