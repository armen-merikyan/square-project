<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition explores the emotional dichotomy of emptiness versus desire, reflected through contrasting color saturation and pattern logic. The upper rows, saturated with warm colors, embody desire's pull—vivid reds and pinks swirl around a quiet, hollow blue that represents emptiness in the bottom rows. The main contrast occurs in the center where desire collides with the containment of emptiness, creating tension. The edge style of uneven borders suggests the chaotic nature of these emotions while maintaining structured boundaries, inviting the viewer to explore the feeling of longing and restriction.</desc>
