  <title id="title">Fractured Light</title>
  <desc id="desc">This composition captures the emotional dichotomy of defiance and submission through a contrast of dark, muted tones and sharp, bright accents. The selected palette combines moss green and rust to embody resilience against a backdrop of uncertainty, while bone white serves as a sudden burst of clarity, representing refusal. The layout suggests a 'last light' with concentrated brightness in one corner, indicating resistance, while the darker areas symbolize enclosure and quiet submission. The use of broken pixels across the grid introduces imperfections that echo the clash between order and chaos in these emotions, creating an atmosphere that feels both tense and unresolved.</desc>
