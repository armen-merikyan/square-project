  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork conveys tension between vulnerability and strength through contrasting colors and patterns. The palette includes warm coral and orange to represent strength and cool blue for vulnerability. The bold edges reflect strength while the lighter halo patterns create a sense of delicacy. The main contrast occurs towards the center, where intense colors collide with muted backgrounds, symbolizing the clash between protection and exposure.</desc>
