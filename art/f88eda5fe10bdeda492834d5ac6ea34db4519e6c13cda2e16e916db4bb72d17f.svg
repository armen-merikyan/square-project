<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone explores the tension between longing and resolve, with a soft palette that balances severity and softness. The colors emerge from the palette's themes: an interplay of 'softness_severity', signifying the urgent yet serene landscape of emotions. The outer border, evocative of longing, uses warm whites and gentle pinks to depict an unfinished approach, while the inner core disrupts this with sharp crimson and carbon black, embodying resolve with a dense, noisy texture that interrupts the serenity. The primary collision occurs at the center—an echo of both emotions merging yet remaining distinct, shaping a narrative of searching for balance amid imperfections.</desc>
