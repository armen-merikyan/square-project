<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal and Static</title>
  <desc id="desc">This piece embodies the emotional dichotomy of trust and suspicion, with a palette drawn from mourning and renewal. The darker colors signify suspicion, while the softer hues represent trust. High contrast is achieved through jagged edges and disrupted patterns, creating a sense of tension. The main visual collision occurs in the center, where dark and light colors interlace, symbolizing the struggle between clarity (trust) and confusion (suspicion). The layout spirals outward from the center, mimicking the way trust seeks to extend amidst the noise of doubt, adhering to the theme of resilience against fragility through broken pixels that create intentional disruptions.</desc>
