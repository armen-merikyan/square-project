<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Dissonance</title>
  <desc id="desc">The emotional tone reflects the tension between love and betrayal, embodied through the contrast of warm and cool tones. The palette combines pinks and reds, representing love's warmth, against grays and dark maroons that symbolize cold betrayal. The central focus emerges from subtle diagonals suggesting a rise, while sharp colors collide with softer hues, creating echoes of unresolved emotions. The broken pixels integrate imperfections, representing disparity within the emotional narrative, and the layout leaves intentional negative space to mirror the feeling of emptiness and unresolved tension in a relationship.</desc>
