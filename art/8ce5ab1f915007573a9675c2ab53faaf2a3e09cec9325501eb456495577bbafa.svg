<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This piece explores the tension between joy and grief through contrasting colors and patterns. The palette encompasses bright yellows and deep blues to emphasize emotional highs and lows. Joy is represented by warm, bright tones that rise in the top half, while cooler, more muted tones encapsulate grief at the bottom, creating a zigzag effect that visually represents the chaotic interplay of these emotions. The placement of broken pixels adds to the feeling of fragmentation, enhancing the narrative of collision and unresolved emotion.</desc>
