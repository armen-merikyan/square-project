<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Resilience</title>
  <desc id="desc">The emotional tone is one of tension between brightness and the residue of what has passed. The palette combines warm coral and soft amber to embody the spark of vitality against the cold slate, representing ash and restraint. The collision occurs diagonally where the grid-like pattern of ash (soft hues) interrupts the bright, flowing stars (large contrasting dots). This arrangement plays with themes of memory vs. erasure—keeping the spark alive amidst the ash. The broken pixels add a sense of imperfection and depth. The composition maintains clear negative space while allowing the two emotions to coexist dynamically.</desc>
