<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotion Collision</title>
  <desc id="desc">The emotional tone of the piece oscillates between joy and grief, utilizing the 'split_horizontal' layout. The upper half displays brighter, rounded hues symbolizing joy, using yellows and oranges that evoke warmth and brightness ('joy palette'). The lower portion employs deep blues and muted purples to express grief, embodying melancholy and depth. Contrast is established where the warm joyous colors meet the cooler, heavier tones, reminiscent of a wave oscillating between calm (joy) and turbulent (grief) emotions. This arrangement visually captures the tension and dynamism of navigating through these feelings, suggesting the collision and coexistence of joy against grief. The relatively balanced placement of colors alongside strategically broken pixels introduces an intentional imperfection, representing the complexity of human emotional experience. The layout maintains over 10% negative space to avoid overwhelming the viewer, encouraging reflection between the contrasting tones.</desc>
