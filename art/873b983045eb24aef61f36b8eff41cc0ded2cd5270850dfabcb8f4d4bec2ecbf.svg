<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Conflict</title>
  <desc id="desc">This artwork encapsulates the tension between rage and calm through a contrasting palette of deep red and cool pale blue against a backdrop of black and white. The arrangement follows a flowing top-to-bottom layout that suggests tears or ash falling, embodying weightlessness intertwined with heavy emotions. The jagged, cracked pattern disrupts the otherwise orderly grid of calmness, symbolizing conflict and echoing the violent reflections of rage. The broken pixels introduce imperfection, enhancing the overall emotional resonance and providing negative space for breath amidst the chaos.</desc>
