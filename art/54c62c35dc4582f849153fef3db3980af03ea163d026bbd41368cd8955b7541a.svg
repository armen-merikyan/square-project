<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone captures the tension between desire and emptiness. The palette of hot coral and blood orange represents the throbbing pulse of longing, while charcoal and hollow blue evoke vastness and restraint. The central collision occurs with a dense cluster of warm colors at one end, spilling into a hollow blue void, emphasizing the struggle of overflowing desire against containment. The layout, inspired by 'two pulses,' conveys movement between saturation and quietness, creating a dynamic yet harmonious tension.</desc>
