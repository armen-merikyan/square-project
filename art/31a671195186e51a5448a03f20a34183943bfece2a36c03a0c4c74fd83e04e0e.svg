<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Time</title>
  <desc id="desc">The artwork explores the emotional contrast between nostalgia and progress, illustrating a split-focused narrative. The palette of yellow, orange, deep blue, and muted purple captures warmth and depth, reflecting complex feelings. The main contrast lies in the top-heavy arrangement of brighter colors clashing against a muted lower section, representing nostalgic warmth fighting against the coolness of progress. The seed shaped the design into horizontal waves that evoke a sense of rise against a weighty background, creating visual tension without literal representation.</desc>
