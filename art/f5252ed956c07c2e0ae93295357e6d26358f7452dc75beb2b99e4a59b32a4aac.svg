<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Signals</title>
  <desc id="desc">This artwork captures the tension between clarity and chaos, reflecting the emotional undertones of 'signal vs noise'. The palette features deep tones of navy and black to represent the consuming noise, contrasted by the luminance of single white and dim cyan that symbolize clarity and truth. The central pulse, located slightly off-center, is where colors collide—creating a stark division between the clean, readable rhythm and the static noise. Broken pixels introduce imperfections that echo the theme of memory vs erasure, reinforcing the narrative of struggle between clarity and chaos. The arrangement incorporates a significant area of negative space, emphasizing the vastness of the noise wrapping around the signal.</desc>
