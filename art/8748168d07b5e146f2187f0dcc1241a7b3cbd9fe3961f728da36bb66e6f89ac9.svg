<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">The piece explores the duality of joy and grief through a contrasting palette of warm yellows and deep blues. The top half employs a broken dot pattern to evoke joy, creating an expanding rhythm, while the bottom half introduces a more mirrored, heavy arrangement symbolizing grief with deep blue tones. The palette choice reflects warmth battling against the coldness of grief, emphasizing emotional tension. The left side is slightly denser, creating a subconscious weight on that side, introducing imbalance that resonates with the concepts of betrayal and unresolved emotions.</desc>
