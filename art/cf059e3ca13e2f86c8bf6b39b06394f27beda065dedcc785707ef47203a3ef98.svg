  <title id="title">Desire Contained</title>
  <desc id="desc">This artwork represents the emotional tension between desire and emptiness. The palette comprises warm and cool tones to evoke a pull towards openness while contrasting with stark boundaries. The main collision occurs in the central rows, where saturated colors spill but are contained by darker shades, creating a dynamic interplay of hope and restraint that reflects the seed's themes of rising signals and containment.</desc>
