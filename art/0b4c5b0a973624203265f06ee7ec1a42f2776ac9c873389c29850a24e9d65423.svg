<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Form</title>
  <desc id="desc">This composition embodies the emotional dichotomy of defiance and submission. The left half, representing defiance, uses sharp crimson and carbon black to create a sense of upward energy with aggressive interruptions. The right half, symbolizing submission, employs warm white and powder pink for a softer, calming presence. The interplay occurs centrally, where these contrasting patterns (the hinge of defiance and the scar of submission) collide, reflecting tension. An inward spiral layout guides the eye, creating depth and movement, while intentional broken pixels add disruption, enhancing the layered feelings suggested by the seed.</desc>
