<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Equilibrium</title>
  <desc id="desc">The emotional tone reveals the juxtaposition of vulnerability and strength, encapsulated through contrasting colors. The chosen palette, combining pale aqua and mist gray as dominant colors with alarm red and ink blue accents, conveys a balance between calmness and urgency. The collision occurs in the center, where the checker pattern representing strength intersects with a patchwork of vulnerability, symbolizing a conflict yet reliance on each other. This arrangement captures the essence of tension and harmony, creating a visual counterpoint to the seed's themes.</desc>
