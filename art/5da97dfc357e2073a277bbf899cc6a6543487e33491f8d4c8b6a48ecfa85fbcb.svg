<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inner Tension</title>
  <desc id="desc">This piece explores the emotional contrasts of awe and terror through color density and placement. The palette, derived from deep navy and black paired with harsher whites and dim cyans, symbolizes the tension between calm awe and the fear that can arise in chaotic moments. The layout of 'falling pixels' emphasizes a descent, creating a rhythmic contrast between the dense colors at the edges and the lighter center. Broken pixels add an element of imperfection, further enhancing the feelings of instability and unease where light clashes with shadow, suggesting a collision of emotions. The negative space invokes quiet contemplation amidst tumult.</desc>
