<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Fracture</title>
  <desc id="desc">This composition reflects the emotional conflict of 'spark vs ash' through a palette of muted blacks and dark violets interrupted by soft gold and pale green. The ash-like colors settle in a lower layer, symbolizing 'settled dust' and 'burnt quiet,' while the broken dots of gold represent brief moments of 'sudden brightness' that punctuate the composition. The main collision occurs in the center, where the sparks clash against the ash tones, visually representing a struggle between vitality and decay, thereby creating a sense of rising tension. The layout suggests an upward flow, embodying a striving for hope amidst the weight of restraint and memory, while also allowing enough negative space for contemplation and introspection.</desc>
