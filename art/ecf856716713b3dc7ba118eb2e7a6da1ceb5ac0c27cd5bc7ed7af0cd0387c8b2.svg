<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Order and Chaos</title>
  <desc id="desc">This piece aims to embody the emotional struggle between defiance and submission. The palette of sepia, tan, and dust gray carries a somber undertone, allowing the brighter faded blue accents to pulsate through the darker background, signifying moments of resistance against the encroaching order. The primary collision occurs in the center of the grid where the maze-like submission patterns clash with the island-like defiance. The arrangement is uneven and allows for negative space to create a feeling of tension and echo. The layout of descending pixels suggests a falling, chaotic energy while the defined patterns confront the edges creating a boundary.</desc>
