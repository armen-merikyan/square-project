<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Contrast</title>
  <desc id="desc">The emotional tone pivots between awe and terror, depicted through a stark contrast in colors and patterns. The palette combines deep navy and black, echoing the weight of terror, while the bright whites and dim cyan represent fleeting moments of awe, creating a powerful tension. The split layout resonates with the theme of order vs chaos, where soft edges interrupt the rigidity, hinting at broken memories. Main collisions occur in the central area, where light meets dark, emphasizing the struggle between stability and instability, reflected in the layout's rising signal. The composition feels alive, a visual representation of tension and release.</desc>
