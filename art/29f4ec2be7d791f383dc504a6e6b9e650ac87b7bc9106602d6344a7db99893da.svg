  <title id="title">Rise vs Fall</title>
  <desc id="desc">This artwork captures the emotional tension between joy and grief through contrasting bright and muted tones. The chosen palette of yellows, oranges, deep blues, and muted purples embodies the lightness of joy against the heaviness of grief. The layout presents a split view with structured rising patterns on one side (joy) and descending, breaking patterns on the other (grief). The symmetrical vs. broken contrast reflects connection and rupture. Color collisions occur at the center, creating a dynamic edge where emotions clash and harmonize.</desc>
