<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Containment</title>
  <desc id="desc">This artwork captures the emotional dichotomy between desire and restraint. The palette leans towards saturated warm tones to embody desire, with colors like hot coral and blood orange creating a pulsing warmth. In contrast, cooler hues like charcoal and hollow blue represent restraint, creating a boundary effect. The central collision occurs where these colors meet, suggesting a spiraling tension as desire reaches outward, yet is encased by cooler tones that constrict it. The use of broken pixels adds an element of imperfection, subtly suggesting scars of past desires or failures. This creates a narrative of emotional struggle, where longing is felt intensely yet restrained.</desc>
