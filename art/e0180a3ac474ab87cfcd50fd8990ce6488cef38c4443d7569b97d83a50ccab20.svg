<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tension</title>
  <desc id="desc">This artwork encapsulates the emotional tug-of-war between rage and calm, displayed through contrasting textures and colors. The upper half utilizes a grid of cool pale blues, symbolizing calm with a sense of order and peace. In contrast, the lower half erupts with jagged red stripes, representing the lack of control and explosive emotions. The choice of the palette derives from the seed's contrasting emotions, aiming to evoke tension through the collision of strong light against dark shadows. The colors collide at the middle, enhancing the feeling of disruption and resolution, echoing the theme of balance and imbalance.</desc>
