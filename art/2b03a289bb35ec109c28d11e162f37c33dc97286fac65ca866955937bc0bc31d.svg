<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Pressure</title>
  <desc id="desc">This piece embodies the emotional tension between envy and gratitude. The palette blends deep black and dark violet, representing the weight of pressure and shadowy depths (envy), while soft gold and pale green suggest moments of lightness and hope (gratitude). The arrangement creates a collision of colors, focusing on the contrast between darker tones at the top, spilling into lighter hues below. This flow mirrors a descent from weight to release, representing the journey through emotional landscapes. Asymmetrical placements disrupt the expected order, resonating with the complexity of feelings involved.</desc>
