<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall</title>
  <desc id="desc">This artwork captures the emotional contrasts between joy and grief through a jagged layout that reflects chaos and order. The warm palette of yellows and oranges represents joy, while muted purples and deep blues communicate grief. The piece features a rising pattern on the left with bright, expansive colors that transition into heavy, fragmented hues on the right. The interplay of radiant and muted colors embodies the push and pull of human emotions, creating a visual conflict that invites contemplation. Staggered pixel placements add a sense of interruption, resembling steps that invite movement across the screen, reflecting the emotional journey of facing both joy and grief in life's moments.</desc>
