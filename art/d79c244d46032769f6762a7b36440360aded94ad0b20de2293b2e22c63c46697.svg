<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Chaos</title>
  <desc id="desc">This piece embodies the tension between 'panic' and 'control.' The palette of navy, black, and dim cyan evokes a sense of solitude and deep emotion, while the arrangement creates a collision of full and hollow spaces. The flow from center to edges creates an unsettling tension, suggesting a battle between rigid order and chaotic feedback. The broken pixels introduce imperfections, mirroring the idea of a machine trying to maintain control over itself, adding a layer of emotional weight to the abstract narrative.</desc>
