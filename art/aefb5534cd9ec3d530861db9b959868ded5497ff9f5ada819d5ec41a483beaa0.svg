<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This composition explores the emotional duality between restlessness and peace. The top half uses bright signal greens and electric blues, representing vibrant energy and restlessness, with a crosshatch pattern that creates a sense of chaotic movement. The bottom half contrasts with muted tones of dead black and static gray, embodying tranquility and peace, represented by a crack texture implying subtle interruptions. The uneven distribution emphasizes the tension, centering the main clash in emotional intensity along the horizontal divide, where the vivid and calm colors collide. The overall energy oscillates between dynamic pulses and quiet spaces, inviting reflection on the interplay of memory and motion.</desc>
