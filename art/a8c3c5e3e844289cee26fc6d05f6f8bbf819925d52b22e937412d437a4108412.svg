<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shadows of Ignite</title>
  <desc id="desc">This artwork captures the tension between the fleeting energy of sparks and the permanence of ash, layering warm accents against cool, muted backgrounds. The palette of soft cyan, lavender gray, and muted plum represents both the vibrant spirit and the somber afterlife of fire. The collision occurs diagonally, where bright areas of quick, jagged sparks intersect with broader fields of quiet ash, illustrating a push-pull of memory and erasure. The layout creates a dense core interrupted by surrounding calm, engaging the viewer in a conversation about resilience amidst fragility.</desc>
