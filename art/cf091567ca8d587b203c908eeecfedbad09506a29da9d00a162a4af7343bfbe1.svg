<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers in the Void</title>
  <desc id="desc">The emotional tone captures the tension between restlessness and peace, illustrated through a palette that contrasts warm fiery hues with chilling deeper tones. The bright yellows and oranges symbolize brief bursts of energy and memory, while the muted purples and deep blues create a calming, reflective space. The central collision occurs diagonally, disrupting the serene top layer with sparks of warm color, suggesting the constant fight between peace and restlessness. Overall, the arrangement creates a sense of movement that flows downwards, akin to falling ash, highlighting the push and pull of conflicting emotions.</desc>
