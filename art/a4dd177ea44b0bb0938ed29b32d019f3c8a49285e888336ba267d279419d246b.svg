<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipsed Harmonies</title>
  <desc id="desc">The emotional tone of this piece revolves around the tension between longing and resolution. The palette combines muted greens and browns with cooler blues and grays, suggesting a dichotomy of safety and exposure. The layout reflects an 'empty room,' creating a space filled with quiet before the storm. The main collision occurs in the off-center placement, where structured diagonal patterns of resolution collide with soft, frame-like borders of longing, highlighting the nuances of distance and intimacy. Overall, the piece invites the viewer into the interplay of density and emptiness, marked by intentional 'broken pixels' that signify disruption and fragility.</desc>
