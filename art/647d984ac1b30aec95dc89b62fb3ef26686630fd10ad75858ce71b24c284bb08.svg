<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symbiotic Tumult</title>
  <desc id="desc">This composition captures the clash between tenderness and rage, using a predominantly dark palette to convey tension while introducing warmth through subtle accents. The deep blacks and reds represent rage, spreading from a corner to create a sense of pressure. In contrast, the cooler pale blue and white hues emerge as softer fields, suggesting tenderness and calm amidst the intensity. The clash happens in the lower left corner, where jagged red pixels disrupt smooth blue bands, simulating a push and pull of emotions. The edge style, being corner-heavy, directs the viewer's focus towards that area, embodying the conflict and connection inherent in the contrasting emotions represented by the seed.</desc>
