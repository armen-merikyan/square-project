<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Doubt</title>
  <desc id="desc">This abstract piece explores the tension between trust and suspicion. The palette features muted, earthy tones like red oxide and blackened plum, suggesting a warmth that contrasts with the cooler shades of iron gray, reflecting an imbalance in feelings. The main collision occurs along the diagonal, where soft wave patterns representing trust clash with sharp, pulse mark disruptions of suspicion. This interplay breathes life into the notion of resilience against fragility, echoing the complexity of human emotions.</desc>
