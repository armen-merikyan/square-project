<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resilience</title>
  <desc id="desc">This artwork embodies the emotional tension between spark and ash, portraying the conflict of hunger and restraint. The palette transitions from deep blue, representing the weight of memory and restraint, to pale yellow, signifying bursts of energy and vitality. The use of negative space creates a narrow channel that visually disrupts the otherwise dense patches of ashen gray and vibrant spark colors, symbolizing resilience against the backdrop of fragility. The pattern juxtaposes quick bursts of color with dense gray fields, reflecting unresolved emotional collisions. The central area features the most pronounced contrast, where energetic colors collide with heavy tones, capturing the essence of dynamic struggle and quiet reflection.</desc>
