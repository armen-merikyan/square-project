<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light and Weight</title>
  <desc id="desc">The emotional tone captures the conflict between dread and relief. The palette, 'lonely_signal', utilizes deep navy and black to convey heaviness, while dim cyan pops as a point of relief. The layout contrasts the top four rows (relief) with bottom four rows (dread), emphasizing the weight of darkness below. The collision occurs where the bright cyan appears against the dark mass, illustrating a struggle. Broken pixels disrupt the symmetry, mirroring the 'symmetrical vs broken' theme from the seed, creating an overall abstract tension.</desc>
