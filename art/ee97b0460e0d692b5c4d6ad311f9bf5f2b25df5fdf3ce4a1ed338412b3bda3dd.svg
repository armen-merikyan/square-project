<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Lightness</title>
  <desc id="desc">This artwork encapsulates the emotional duality of relief versus dread through juxtaposition of bright and dark tones. The palette, drawn from 'ancient_fire,' features burnt orange and dark red to evoke warmth and intensity amidst a charcoal foundation representing heaviness. The top-weighted arrangement creates a sense of pressure that transitions to relief at the lower section, punctuated by 'rain' patterns interspersed among 'ring' motifs to symbolize the interplay of calm and chaos. Broken pixels disrupt symmetry, enhancing emotional tension while sustaining negative space. The overall flow guides the eye from heaviness to lightness, suggesting a path of emotional release.</desc>
