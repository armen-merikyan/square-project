  <title id="title">Emotional Collision</title>
  <desc id="desc">The artwork explores the tension between joy (bright yellows and oranges) and grief (muted purples and deep blues). It uses a split-screen layout to represent the emotional duality. Hard edges create a sense of conflict, while the diagonal flow captures the dynamic movement of feelings. The bright elements interrupt the darker tones, suggesting hope amidst sorrow. The broken pixels introduce imperfection, inviting a contemplation of the chaos in life.</desc>
