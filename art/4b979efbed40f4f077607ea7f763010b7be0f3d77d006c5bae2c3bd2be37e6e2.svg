<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece expresses the tension between restlessness and peace through a dynamic arrangement of colors. The warm tones of faded gold and storm gray suggest bursts of energy that break across the cooler pale mint and soft sky, representing calm. The diagonal pattern accentuates the push and pull of memory against motion, with a main collision occurring in the center where the warmer colors disrupt the tranquility of the surrounding cool tones. The structure adheres to an empty room layout, creating a spacious environment highlighted by intentional broken pixels, allowing for a sense of imperfection within the rhythm.</desc>
