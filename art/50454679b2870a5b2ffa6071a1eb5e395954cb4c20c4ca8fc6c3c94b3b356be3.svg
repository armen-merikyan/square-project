<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This artwork captures the emotional tension between quietude and pressure. The outer border, painted in deep, muted colors like dark navy and compressed red, conveys a sense of weight and compression, representing pressure. The inner area, using softer tones like off-white and faint peach, embodies a quiet, expansive space, fostering a feeling of release. The main collision occurs in the transition zone, where soft and hard edges meet, visually suggesting a struggle between dense clusters and open areas. The random placement of broken pixels amplifies the feeling of shattering against a tide, creating an intentional disruption that mirrors the chaos inherent in the seed phrase.</desc>
