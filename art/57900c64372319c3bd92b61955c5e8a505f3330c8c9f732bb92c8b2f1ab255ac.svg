<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Quietude</title>
  <desc id="desc">This artwork explores the emotional tension between defiance and submission. The chosen colors, with muted tones of dark navy and dusty gray opposing the bright compressed red, convey a constant struggle between two forces. The center is occupied predominantly by the quiet fields of off-white and faint peach, representing submission, while the edges are disrupted with glitch-like interruptions of darker colors, highlighting moments of resistance. The composition flows diagonally, creating rhythm and echo that encapsulates the essence of the seed’s themes.</desc>
