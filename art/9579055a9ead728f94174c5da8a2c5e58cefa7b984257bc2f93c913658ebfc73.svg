  <title id="title">Tension Between Light and Weight</title>
  <desc id="desc">This composition embodies the emotional tension between envy and gratitude, using contrasting colors to represent heavy feelings against lighter impulses. The palette consists of deep black and dark violet to symbolize envy, contrasted with soft gold and pale green to represent gratitude. The layout is split vertically, conveying the dichotomy and the emotional struggle. The zigzag pattern and broken pixels emphasize the imperfections and chaos of these feelings, where the main collision occurs in the center, creating a dynamic visual echo between heaviness and lightness.</desc>
