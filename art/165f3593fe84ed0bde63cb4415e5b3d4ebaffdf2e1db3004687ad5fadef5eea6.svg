<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">The emotional tone captures the tension between warmth of trust and the coldness of suspicion. The palette reflects a spectrum from deep teal to void black, evoking feelings of uncertainty but framed by an ash field of gray, blending warmth and shadow. The main contrast arises from the dense center suggesting suspicion, disrupted by softer edges representing trust. The seed's 'crown' metaphor translates to a halo of color surrounding a void, with broken pixels scattered to create disruptions in the pattern, evoking the complexity of emotional states.</desc>
