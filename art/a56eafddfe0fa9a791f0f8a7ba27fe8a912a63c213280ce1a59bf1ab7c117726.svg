<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This artwork explores the emotional dichotomy between joy and grief through contrasting color placements and patterns. The palette consists of bright yellow and orange representing joy, offset by deep blue and muted purple symbolizing grief. The choice of bright dots for joy and heavy stripes for grief creates a visual tension across the horizontal split. This interplay echoes feelings of expansion and entrapment, where joyful bursts compete against the gravity of grief. The flow direction enhances this, pushing the viewer's gaze from a dense, muted lower half to a vibrant upper half, mimicking the rising signal of hope amid despair.</desc>
