<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Symmetry in Motion</title>
  <desc id="desc">This composition captures the emotional tension between defiance and submission through a dichotomy of colors and patterns. The palette of mourning black, deep blue, new leaf, pale yellow, and stone evokes a sense of renewal amidst remnants of resistance. The center, dominated by cooler tones, represents the unmoved core of defiance, while the surrounding warmer colors signify submission edging in. The deliberate placement of broken pixels adds disruption, mimicking the complexities of emotional contrast. The collision is focused at the center, where the stark differences in emotional tones collide, creating an ambiguous narrative of struggle and acceptance.</desc>
