<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Serenity</title>
  <desc id="desc">The emotional tone revolves around the conflict between restlessness and peace, captured through a careful balance of colors. A palette dominated by deep navy and black creates a feeling of weight and stillness, while dim cyan offers a soothing accent, suggesting a quiet pulse amidst distractions. The main contrast occurs at the center, where jagged interruptions of lighter shades collide with darker fields, representing disruptions in memory and motion. The arrangement and pattern evoke an abstract spiral, guiding the eye toward the center point, yet never allowing for true stillness.</desc>
