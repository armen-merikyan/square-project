<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone combines defiance and submission, expressed in contrasting patterns to showcase a struggle between hope and retreat. The chosen palette of black, dark violet, soft gold, and pale green evokes feelings of both tension and calm. The primary collision occurs at the center of the grid where the lattice pattern of defiance intersects with the negative cross of submission. This creates a dynamic push and pull that embodies conflict, with black and violet colors representing the pressure of defiance, and soft gold and pale green adding softness and retreating tones. The invasive collision at the center provides visual weight, while the edges remain less saturated, allowing the vibrant colors to dominate the space and draw the viewer's focus.</desc>
