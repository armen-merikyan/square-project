<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition explores the emotional tension between desire and restraint. The warm hues of coral and blood orange represent desire, pulling towards the edges with a glowing intensity, while cooler tones of charcoal and hollow blue signify restraint, creating a sealed boundary. The arrangement forms a central spiral pattern, suggesting a tension that builds toward the edges but ultimately remains contained. By incorporating broken pixels, I've added visual scars and complexities that interrupt the flow, echoing the theme of an unfulfilled hunger.</desc>
