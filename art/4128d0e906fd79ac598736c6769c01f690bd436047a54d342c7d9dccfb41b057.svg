<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">hunger_vs_restraint</title>
  <desc id="desc">This artwork embodies the emotional tension between desire and emptiness. The palette, featuring warm saturations like hot coral and blood orange juxtaposed with cooler tones of charcoal and hollow blue, creates a contrast that enhances the feeling of longing versus containment. The diagonal layout creates a strong collision between the patchwork of desire and the channels of emptiness, suggesting an overflow being held back. The use of broken pixels adds intentional disruptions, emphasizing the struggle between saturation and space. The overall composition captures a narrative of heightened tension, where the push for expansion is met with constraints, illustrating the 'hunger' for fulfillment against the backdrop of 'restraint'.</desc>
