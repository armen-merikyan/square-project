<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall</title>
  <desc id="desc">This artwork captures the emotional tension between envy and gratitude through contrasting colors and patterns. The use of dark reds and burnt oranges represents the intensity and edge of envy, while the gold signifies moments of gratitude that shine through. The color arrangement features a rising motion on one side and falling on the other, illustrating the push and pull between these emotions. The outer squares, darker and more saturated, symbolize the heavier feelings, while the center is lighter, suggesting hope and acknowledgment amidst the noise. Broken edges create an imperfect rhythm that resonates with the fragility of emotional states.</desc>
