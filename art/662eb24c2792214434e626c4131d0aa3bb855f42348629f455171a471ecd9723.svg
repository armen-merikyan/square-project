<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This composition encapsulates the emotional conflict between defiance and submission through contrasting color use. The palette of black, dark violet, soft gold, and pale green visually narrates a struggle between heaviness and weightlessness. The left half, resonating with defiance, uses darker shades to create a dense feeling, while the right half, symbolizing submission, employs softer tones that evoke lightness. The use of broken pixels introduces imperfection and speaks to the unresolved tension within the conflict, capturing the essence of light versus weight, where colors collide and echo throughout the frame.</desc>
