<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This artwork embodies the tension between vulnerability and strength. The palette, drawn from opposing emotions, features bright yellows and oranges representing strength and resilience, contrasted against muted purples and deep blues symbolizing vulnerability and depth. The central collision occurs where the bright colors intersect with darker tones, creating a sense of a flickering heart amidst a stormy horizon. The arrangement of 'stairs' for vulnerability and 'stacking' for strength has created a gritty texture, expressed through broken pixels to suggest imperfection and exposure. The interplay, along with intentional negative spaces, evokes the emotional complexity of safety against anxiety, manifesting a striking visual narrative.</desc>
