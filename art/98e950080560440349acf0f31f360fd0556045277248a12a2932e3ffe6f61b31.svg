  <title id="title">Shattered Affection</title>
  <desc id="desc">The emotional tone captures the conflict between love and betrayal, illustrated through a palette of warm pinks and deep maroons contrasted against cool grays. The layout spreads from the corner, creating a diagonal flow that symbolizes tension. The use of cracked patterns reflects the emotional fracture, while negative space reinforces the theme of loss and emptiness. Key contrasts occur in the relationships between warm and cool colors, embodying the tumultuous transition from affection to betrayal.</desc>
