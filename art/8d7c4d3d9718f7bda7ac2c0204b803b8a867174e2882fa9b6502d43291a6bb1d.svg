  <title id="title">Tension of Threads</title>
  <desc id="desc">This artwork contrasts the emotional tensions of envy and gratitude through its color scheme, where muted sepia and tan echo feelings of nostalgia and reflection, while bursts of faded blue provide a cool disruption, symbolizing calm amidst chaos. The dense center evokes heaviness, reinforcing the idea of a 'center heavy' concept, while lighter peripheries create a sense of movement, mimicking the zigzag of steps while preserving negative space. Broken pixels introduce imperfection, embodying the fragility of emotions.</desc>
