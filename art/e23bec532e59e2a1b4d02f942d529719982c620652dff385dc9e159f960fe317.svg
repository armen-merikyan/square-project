  <title id="title">Weight of Emotion</title>
  <desc id="desc">This composition conveys a tension between control and panic, highlighted by the clash of a dense dark palette against a few vibrant accents. The colors reflect the 'love_betrayal' theme, with dark maroon and gray representing heavy emotions, while pink and red provide sharp contrast. The layout descends like raindrops, creating an unsettling flow that encapsulates the feelings of instability and weight. The broken pixel elements introduce irregularity, emphasizing the theme of disruption within control.</desc>
