  <title id="title">Embers of Contrast</title>
  <desc id="desc">The emotional tone oscillates between warmth of love and the coldness of betrayal. The palette includes deep maroons contrasting with vibrant pinks to symbolize this emotional conflict. The main collision occurs in the center with sharp vs soft colors creating a dynamic push-pull, while the broken edges signify imperfections in emotional stability. The design utilizes negative space to evoke feelings of an emptied room, conveying a sense of loneliness amidst chaos.</desc>
