<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse in the Static</title>
  <desc id="desc">The emotional tone navigates through turbulent restlessness and serene peace. The palette, consisting of muted neutral tones with bold dark navy and compressed red, captures the conflict between static noise and piercing interruptions. The diagonal flow reflects how the two emotional states pulse towards each other, with dark navy and compressed red creating a strong contrast against the softness of off-white and faint peach, illustrating the gradual struggle between calm and chaos. The broken pixels introduce intentional imperfections, resonating with the theme of disrupted memory, while the overall layout holds significant negative space, giving room for both emotions to resonate.</desc>
