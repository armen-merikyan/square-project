<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure &amp; Shelter</title>
  <desc id="desc">The emotional tone balances the vulnerability of exposure against the warmth of safety. The palette, rich in greens and browns, evokes a sense of shelter while the pale skin and cold white represent the exposure. The center is dense and vibrant, clashing with the muted edges to illustrate the main contrast of pressure versus release. This is achieved by layering stripes and tide patterns that echo the split vertical layout, creating a visual braid of tension and relief.</desc>
