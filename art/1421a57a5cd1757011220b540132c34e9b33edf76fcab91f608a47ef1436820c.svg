<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Longing</title>
  <desc id="desc">The emotional tone embodies a struggle between warmth and coolness, reflective of desire and emptiness. The chosen warm palette mixes pinks and deep reds to convey desire while contrasting dark maroons and grays to represent emptiness. The contrast is primarily between the warm hues on the left side, symbolizing rising signals of longing, and the cooler, darker hues on the right, representing overshadowed voids. Jagged edges interrupt the flow, enhancing the feeling of imperfection and struggle. The broken pixels further emphasize this clash, allowing for echoes of color to ripple through the composition, creating an abstract narrative of longing and isolation.</desc>
