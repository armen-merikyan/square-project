<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between States</title>
  <desc id="desc">This piece embodies the emotional tension between defiance and submission. The palette, named 'resilience_fragility,' uses moss green and rust color combinations to evoke warmth against the cold, muted tones of stone gray and bone white. The center holding darker shades symbolizes resistance, surrounded by lighter colors, which represent the pull of submission creating an inward spiral flow. Broken pixels are distributed to introduce intentional disruptions, highlighting imperfections amidst order. The contrasting heaviness of the colors colliding at the center reflects both a hard interruption and a soft collapse, creating a visual narrative steeped in emotional conflict and atmospheric texture.</desc>
