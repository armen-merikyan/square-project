<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece explores the emotional contrast between vulnerability and strength through a combination of warm and cool tones. The selected palette emphasizes muted cream and blackened plum for a rich depth, while the small orange acts as a sharp accent. The collision occurs centrally, where density from the strength patterns meets the soft breaks of vulnerability, creating an interplay that is dynamic yet harmonious. The layout of stacked bands visually represents the shifting density and temperature, highlighting the delicate balance of protection and exposure suggested by the seed.</desc>
