<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Calm in Rage</title>
  <desc id="desc">The emotional tone embodies a clash between intense rage and serene calm, using a palette of red, pale blue, and black to illustrate the tension. The main contrast occurs in the middle, where jagged red markings (representing rage) interrupt the serene, horizontal bands of pale blue (representing calm). This chaos is enclosed by soft whites, providing a veil, while intentional broken pixels hint at imperfections and disruptions in both emotional states. The arrangement follows a rising signal layout, echoing a fight between containment and overflow.</desc>
