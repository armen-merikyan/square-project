<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This artwork explores the tension between certainty and curiosity through a palette of warm and cool tones, juxtaposed with structured and disordered patterns. The central area is pale, representing openness and exposure, surrounded by darker, denser colors, which act as a protective or constraining frame. The strong contrast between the bright center and the chaotic corners highlights the push and pull of emotional security versus exploration. The pattern of 'islands' of certainty colliding with 'rain' of curiosity creates interruptions that reflect the dynamic dialogue between these opposing feelings.</desc>
