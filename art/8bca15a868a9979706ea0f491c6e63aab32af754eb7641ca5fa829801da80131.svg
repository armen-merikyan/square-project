<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This artwork embodies the tension between envy and gratitude through a contrasting color palette of deep navy and dim cyan, suggesting depth and calm amidst chaos. The outer border represents heavy envy, using darker shades to evoke weight and pressure, while the lighter, grid pattern in the center reflects gratitude, creating a sense of order and stillness. The placement of broken pixels introduces imperfection, reinforcing the idea of a broken mirror, reflecting fragmented emotions. Overall, the design flows from the dense outer edges into a lighter core, encapsulating a journey from turbulence to serenity.</desc>
