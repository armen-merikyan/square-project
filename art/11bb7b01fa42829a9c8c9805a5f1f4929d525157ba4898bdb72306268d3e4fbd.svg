<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition embodies the emotional tension between rage and calm. The palette juxtaposes vibrant reds as an accent against deep blacks and pale blues, representing a collision of hot bursts of energy against serene, muted spaces. The layout employs a dominant dark field that creates a quiet space, interrupted by fiery clusters of red (#FF4500) that suggest volatile emotions erupting from the calm. The broken pixel motif disrupts the order, reinforcing the theme of eroded symmetry and machine-like precision. The center features an intense clash of colors, drawing the eye and encapsulating the struggle between containment and overflow.</desc>
