<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece portrays the emotional tug-of-war between desire and restraint. The chosen palette features warm and muted colors, representing intense longing (red oxide, small orange) juxtaposed against limitations (blackened plum, iron gray). The contrast is most palpable in the center, where noise patterns of desire converge with the broken frame of restraint, creating a visually tense yet cohesive experience. The layout emphasizes movement across the canvas, interrupted by sealed edges, suggesting a boundary that can’t be breached. Overall, the spiral flow enhances the sense of pressure, while broken pixels symbolize the imperfections arising from this emotional conflict.</desc>
