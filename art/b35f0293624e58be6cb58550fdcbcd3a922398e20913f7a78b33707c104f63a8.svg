<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Flux</title>
  <desc id="desc">This artwork embodies the emotional tension between panic and control through a carefully arranged palette of dark violet and soft gold contrasting against the black base. The central area, through the use of softer colors, represents an attempt at control, while jagged edges in darker hues illustrate encroaching panic. Colors collide in the outer areas, creating chaotic grid-like patterns, resonating with a feeling of pressure. The piece captures a spiral flow, suggesting movement from calmness at the center toward an overwhelming chaos at the edges.</desc>
