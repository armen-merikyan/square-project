<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition captures the emotional tension between rage and calm. The warm reds signify rage, while the cooler pale blue represents calm. The conflict arises where sharper, sharper jagged pixels (shatter pattern) collide with smoother horizontal gradations (stairs pattern) flowing throughout the piece. The main contrast occurs in the center, where the red disrupts a sea of blue, showing the struggle of containment versus overflow. Each broken pixel adds an intentional imperfection, evoking the rawness of emotion and echoing the chaotic interferences inherent in the noise of our experiences, while the structured arrangement suggests a quest for equilibrium.</desc>
