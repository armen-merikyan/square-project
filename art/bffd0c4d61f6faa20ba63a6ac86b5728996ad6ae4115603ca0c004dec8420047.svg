<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">The emotional tone reflects a battle between explosive rage and soothing calm. The palette juxtaposes fiery red and tranquil pale blue, representing the tension between these emotions. The dominant black represents density and containment, while white symbolizes sparse openness. The primary collision occurs in the off-center quadrant, where bright, jagged red dots (rage) pierce through the cooler, horizontal patterns of pale blue and white (calm) that dominate the majority of the grid. Broken pixels disrupt the patterns, embodying the 'eroded symmetry' from the seed, creating intentional imperfections that reflect emotional conflict.</desc>
