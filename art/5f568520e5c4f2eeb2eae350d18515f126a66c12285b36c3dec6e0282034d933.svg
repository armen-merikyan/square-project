<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">The emotional tone reflects the struggle between softness and severity, a dance of light and dark. The palette utilizes powder pink and warm white to create a gentle backdrop, while deep colors like carbon black and sharp crimson interrupt the serene lattice with harsh tidal waves, representing severity. The center of the piece is heavily weighted with smart contrasts, creating an echo effect as colors collide toward the middle, reinforcing the themes of guilt and forgiveness while leaving ample space for quiet reflection.</desc>
