<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmony in Dissonance</title>
  <desc id="desc">This piece embodies the emotional tension between joy and grief, using a palette that contrasts deep blues and muted purples for grief against the brightness of yellows and oranges for joy. The layout features a diagonal split, representing the clash of order and chaos. The clean crosshatch of joy stands in stark contrast to the fragmented stripes of grief, creating a visual dialogue of collision and echo. Negative spaces are deliberately maintained to evoke a sense of longing and absence, illustrating the interplay between hidden emotions and exposed realities.</desc>
