<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetrical Fracture</title>
  <desc id="desc">This composition embodies the emotional tension between confusion and clarity through a contrast of colors and arrangements. The palette—consisting of striking reds and calming pale blues against black and white—creates a visceral impact, capturing the essence of rage amid calmness. The layout features almost mirrored sides disrupted by intentionally misplaced colors, visually manifesting the themes of broken symmetry and the friction between clarity and chaos. The density of black and white with hints of red illustrates pulse and interruption, while the subtle pale blue evokes a sense of calm juxtaposed against the chaos surrounding it, resulting in a rich emotional tapestry that tells a story of conflict and reconciliation.</desc>
