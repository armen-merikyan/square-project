  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects a balance between vulnerability and protection. The palette embodies warmth with shelter green and warm brown contrasting against the pale skin and cold white, representing exposure. The checker pattern on one side embodies the exposure, while the flood pattern provides a sense of safety on the other. The main collision of color occurs in the center of the square, creating a tense intersection of feelings, optimal for the split vertical theme. The intentional broken pixels introduce disruption, symbolizing the fragility within the contrast.</desc>
