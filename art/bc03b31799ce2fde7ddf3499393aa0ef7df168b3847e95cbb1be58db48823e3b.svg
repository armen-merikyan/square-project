<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Emotion</title>
  <desc id="desc">The emotional tone reflects the tension between joy and grief, represented through warm and cool colors. The palette of yellow and orange embodies joy, while deep blue and muted purple signify grief, creating a striking contrast. The outer pixels embody grief's weight through a checker pattern, while the inner four pixels exhibit joy's bright, expanding nature with a stair-like structure, symbolizing the dynamic tension present in our emotions. The layout creates a strong visual dialogue between protected joy and exposed grief, resulting in a piece that encapsulates both feeling and reflection.</desc>
