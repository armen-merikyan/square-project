<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork captures the emotional tension between the vibrant energy of sparks and the subdued remnants of ash. The palette of muted plum, soft cyan, and lavender gray portrays a melancholic wonder, while the contrast of hot accents symbolizes resilience against the calm yet fragmented structures of ash. The bright cluster in the center represents a spark of hope surrounded by a sea of cool tones, emphasizing the struggle between vitality and quiet decay. The pattern features broken dots and mirror-like reflections encircling the active center, creating a sense of collision and interruption that embodies the essence of the seed.</desc>
