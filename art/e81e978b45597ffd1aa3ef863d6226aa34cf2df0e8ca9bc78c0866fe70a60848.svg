<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Emotion</title>
  <desc id="desc">The emotional tone captures the struggle between fear and hope. The palette blends dark hues with soft gold and pale green, representing fear's oppressive darkness against hope's luminous potential. The center is starkly contrasted with surrounding darkness, embodying 'center vs edges'. Jagged lines echo fear, while glowing touches of gold and green represent the rise of hope, creating a dynamic interplay of tension. This design employs negative space effectively, ensuring that while fear dominates, hope's light remains palpable, inviting contemplation.</desc>
