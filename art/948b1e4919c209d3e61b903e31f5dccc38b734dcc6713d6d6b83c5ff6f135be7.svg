<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The composition explores the tension between desire and emptiness through color juxtaposition and spatial dynamics. The palette consists of warm tones like blood orange and hot coral representing desire, while hollow blue and charcoal symbolize emptiness. The main contrast occurs at the center, where vibrant 'desire' colors collide with the muted emptiness tones, invoking a feeling of conflict. Broken pixel disruptions introduce imperfection, aligning with the concept of containment versus overflow, capturing the essence of the seed through dynamic movement and emotional resonance.</desc>
