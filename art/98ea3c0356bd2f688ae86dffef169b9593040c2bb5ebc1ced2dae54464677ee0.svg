<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Edge of Exposure</title>
  <desc id="desc">The emotional tone reflects a tension between vulnerability and strength, expressed through a palette of crisp whites and heavy blacks contrasted with ice blue and warning orange accents. The center's vulnerability is defined by the soft break of the thin shell-like colors, encapsulated by abrupt and rugged black edges suggesting strength. The main collision occurs in the center, where light meets darkness, creating a dynamic play of contrast and emotional narrative over the grid. The design captures the push and pull of security and exposure, echoing the themes in the seed.</desc>
