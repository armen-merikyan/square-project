<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone is a tension between desire and emptiness. The warm and vibrant palette of coral and orange signifies desire, while the cooler tones of charcoal and hollow blue symbolize emptiness. The central collision occurs with a dense cluster of warm colors surrounded by muted fields, reflecting an overflow of desire constrained by the edges of emptiness. This generates an abstract pattern that speaks to the power of longing and the inescapable boundaries we face. The broken pixels disrupt the flow, leaving intentional gaps to represent quiet pressure, enhancing the overall narrative of reaching without fulfillment.</desc>
