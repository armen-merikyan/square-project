<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Desire Contained</title>
  <desc id="desc">The emotional tone reflects the struggle between void and longing, captured through a palette that balances warm saturation with subdued tones. The colors of hot coral and blood orange symbolize warmth and desire, contrasted with charcoal and hollow blue which represent emptiness and containment. The main collision occurs in the center where the bright colors push against the dark edges, creating a dynamic tension. The arrangement incorporates broken pixels to enhance the sense of disruption and imperfection, emphasizing how desire can be intense yet feeling trapped. The composition as a whole resonates with themes of quiet pressure and the push-pull of emotional extremes.</desc>
