<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Contrast</title>
  <desc id="desc">The emotional tone of the piece embodies the dichotomy of 'spark' and 'ash', reflecting both sudden energy and fading intensity. The palette, dominated by gray and red, effectively highlights the struggle between momentum and restraint. The upper rows burst with vibrant reds symbolizing 'spark', while the lower rows are grounded in muted grays representing 'ash'. The main contrast occurs centrally, where the red and gray interplay, illustrating a collision between energetic hope and subdued reality, evoking feelings of conflict and resolution. The chosen layout distills the essence of a split horizontal dynamic, accentuating the journey from energy to calm, while ensuring sufficient negative space enhances our perception of this emotional exchange.</desc>
