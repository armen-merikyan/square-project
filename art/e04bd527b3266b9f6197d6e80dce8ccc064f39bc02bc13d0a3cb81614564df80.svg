<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This composition captures the tension between quietude and pressure through density and negative space. The palette uses muted grays and soft tones to create a backdrop of tranquility, punctuated by compressed reds that represent heaviness and urgency. The arrangement starts densely in the bottom left, evoking a weighty presence that gradually disperses as it breaks through to lighter colors, symbolizing release. The sharp vs. soft edge concept manifests in hard lines juxtaposed against softer gradients, while the main collision occurs across the diagonal, enhancing the feeling of disruption between opposing emotional states. The broken pixel approach introduces intentional imperfections, adding depth and character.</desc>
