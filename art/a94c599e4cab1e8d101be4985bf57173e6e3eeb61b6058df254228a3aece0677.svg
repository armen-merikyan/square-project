<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Longing</title>
  <desc id="desc">The emotional tone reflects a tension between longing—represented by muted colors and gaps—and resolve—embodied in stronger, structured hues. The palette of sepia and dust gray conveys nostalgia and memory, while the faded blue serves as an accent, creating an unsettling yet intimate contrast. The main collision occurs diagonally, symbolizing the struggle between chaos and order, with broken pixels interspersed to suggest disruption as well as an attempt at connection. Overall, the arrangement reflects the intricacies of human emotion, blending warmth and distance.</desc>
