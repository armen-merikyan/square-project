<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetrical Fractures</title>
  <desc id="desc">This artwork expresses the emotional contrast of love and betrayal through an asymmetrical pixel arrangement that highlights the tension between warm and cool colors. The chosen palette of pink, red, gray, and dark maroon signifies love's warmth clashing with the cold isolation of betrayal. The broken edges evoke the fractures in relationships, while the negative space symbolizes emotional voids. The pattern represents the conflict, with the darker tones colliding into softer hues, suggesting a struggle between vibrant connectivity and painful disconnection. The layout reflects an empty room filled with emotional echoes, creating a visual sense of loneliness and missed connections.</desc>
