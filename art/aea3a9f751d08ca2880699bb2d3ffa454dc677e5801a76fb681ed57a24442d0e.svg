<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This artwork captures the emotional tension between 'longing' and 'resolve'. The palette, derived from the 'hunger_restraint' theme, contrasts warm red-oxide with the mute tones of blackened plum and muted cream, reflecting the pull of desire against a backdrop of restraint. The pattern of rings and hinges conveys a clash: smooth longing from the center, interrupted by sharp resolve at the borders. This collision manifests as the inner space is densely filled while the edges hint at emptiness, embodying the struggle between desire and firm grounding.</desc>
