<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This composition reflects the emotional tension between trust and suspicion. The top half uses a 'crack' pattern in soft greens and glowing accents to represent trust, creating a stable, inviting environment. The bottom half employs a 'barcode' pattern in darker shades, symbolizing suspicion through fragmentation and contrast. The palette, including lime and black, strengthens the emotional dichotomy. The main collision occurs horizontally in the middle, where soft hues interact with harsh lines, emphasizing the struggle between openness and concealment.</desc>
