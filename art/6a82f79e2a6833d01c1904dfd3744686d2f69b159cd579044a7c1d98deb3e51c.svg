<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Tension</title>
  <desc id="desc">The emotional tone revolves around the juxtaposition of defiance and submission. The palette chosen—cosmic indigo, void black, star white, cold gold, and deep teal—reflects a sense of awe and terror, enhancing the emotional clash of the artwork. The bright cold gold accents represent moments of defiance against the darker void black, symbolizing submission. The main collision of colors occurs at the center, where the tension is most palpable, drawing the eye into a spiral of conflict that gradually recedes towards the edges, mirroring the concept of eroded symmetry. Broken pixels introduce an intentional disruption, suggesting scars of conflict amid the overall structure of the piece, while maintaining about 10% negative space to enhance readability and emotional depth.</desc>
