<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Trust</title>
  <desc id="desc">This artwork captures the emotional dichotomy of trust versus suspicion through the interplay of muted and vibrant colors. The palette combines soft sky and faded gold with storm gray and near black, emphasizing warmth against dark shadows, representing trust amid underlying suspicion. The spiral layout enhances the sense of pressure and dynamic flow, where trust predominates in bright, soft hues, while suspicion inhabits the darker edges, creating a collision centered around the middle of the grid. This tension between the two emotions is visually represented through the use of broken pixels that disrupt what could otherwise be a calm pattern, embodying resilience against fragility.</desc>
