<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece explores the tension between rage and calm, utilizing a palette of red, black, pale blue, and white to evoke emotional contrasts. The black and deep red represent the raw, aggressive aspects of rage, while the soft pale blue and white embody calmness and serenity. The main collision occurs in the center of the square, where jagged red fragments interrupt the peaceful blue background, illustrating the struggle for dominance. The choice of broken pixels scattered throughout evokes a sense of ruptured symmetry, reinforcing the chaos within calmness. Thus, the abstract pattern emerges from the interplay between these emotional extremes, reflecting the described seed's essence.</desc>
