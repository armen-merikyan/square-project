<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Tension</title>
  <desc id="desc">This abstract piece embodies the emotional tension between defiance and submission through a contrasting color palette that oscillates between warm and cool tones. The predominant layers of deep cool blue (#1D4E89) signify defiance and strength, while softer hues like warm shadow (#D3B59C) bring an element of submission and calm. The juxtaposition of these emotions is most evident at the center, where the colors collide. The blocked sections create a sense of interruption and flow, evoking a spiral movement that suggests conflict and resolution, while intentional broken pixels introduce disruption, maintaining visual interest and reflecting the nature of the emotional themes.</desc>
