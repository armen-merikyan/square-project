<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Conflict</title>
  <desc id="desc">The composition explores the tension between emptiness and desire, represented by the clash of warm and cool colors. The palette draws from 'ancient_fire', invoking burnt orange and dark red to symbolize desire's heat against the coolness of charcoal and gold representing emptiness. The center is a jagged clash of burnt oranges echoing desire, while the surrounding cooler hues form stripes and rhythmic rain patterns, suggesting a dynamic pulse that ebbs and flows. This creates an unresolved narrative where the heart is fragmented amidst a sea of contrasting textures and pressures, ultimately depicted through the balance of density and negative space.</desc>
