<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">This composition captures the emotional struggle between desire and emptiness. The palette, featuring warm tones like hot coral and blood orange, embodies the intensity of desire, while the cool hollow blue and deep charcoal introduce a sense of emptiness. The top four rows represent desire with vibrant ember patterns showing warmth and saturation, contrasting with the lower four rows that echo the void, utilizing mirror-like emptiness and spatial dissonance. The main collision occurs in the center, where saturated colors meet muted tones, symbolizing the conflict between overflowing emotions and containment.</desc>
