<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Under Rising Signals</title>
  <desc id="desc">The emotional tone reflects the duality of fear and hope, portrayed through a palette of dark and soft colors. The contrasting black and dark violet create a heavy foundation, embodying fear, while the soft gold and pale green represent hope, subtly placed to suggest a rising signal from the center. The arrangement plays with tension—a sharp interruption at the edges versus a gentle glow in the center. The 'rain' effect represented by vertical disruptions positions the conflict between the oppressive corners and a piercing glimmer of potential, echoing a sense of both anxiety and uplift.</desc>
