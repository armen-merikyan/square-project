<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Desire's Restraint</title>
  <desc id="desc">The emotional tone of this artwork contrasts themes of desire and emptiness, represented through color saturation and arrangement. The warm colors of 'desire' create a saturated area in the top left, pulsating with energy as they peak towards the central wedge. In contrast, the lower right corner embraces darker, muted colors of 'emptiness' that feel distant and cool, creating a feeling of restraint against the heat of the top section. The broken pixels disrupt the flow, suggesting imperfect interplays between these two states. This arrangement points to the collision of an unfulfilled craving against barriers, reflected both in color and spatial dynamics, while the layout's diagonal argument emphasizes the struggle between the two emotions.</desc>
