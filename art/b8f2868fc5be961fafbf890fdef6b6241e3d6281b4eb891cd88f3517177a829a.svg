<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Shelter</title>
  <desc id="desc">This piece embodies the emotional tension between safety and exposure, expressed through a split vertical layout that captures a collision of warmth and vulnerability. The left half, representing safety, utilizes warm browns and greens to evoke shelter and enclosure, while the right half, suggesting exposure, employs pale and cold hues to illustrate fragility and openness. The gentle radial pattern of warm colors contrasts with the echoing and interrupted shapes on the right, creating a dialogue of pressure and release. A few broken pixels add intentional disruptions, symbolizing the imperfections inherent in both safety and exposure.</desc>
