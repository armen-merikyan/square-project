<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Oscillation</title>
  <desc id="desc">This piece captures the emotional tension between joy and grief, utilizing warm colors of yellow and orange to represent joy, while the muted purple and deep blue symbolize grief. The contrast between the bright warmth and deep, muted tones creates an oscillating feel, suggesting a wave of emotions. The stair-step pattern implies an upward struggle, reflecting aspiration against weight. The flow is from outside to inward, creating a sense of the emotions compacting towards the center, while maintaining negative space to emphasize moments of quiet amidst chaos. Incidentally broken pixels scatter across the piece to symbolize imperfection, resonating with the narrative of hidden versus exposed feelings.</desc>
