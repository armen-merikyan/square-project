<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">The artwork embodies the tension between tenderness and rage, reflected in the contrasting palette of muted pale blue against vibrant red. The flow suggests a gradual entrance of rage into a space of tenderness, symbolizing inner struggle. The collision at the center, where red jagged threads overlap with soft blue cracks, evokes a sense of both chaos and delicate calm. Broken pixels introduce intentional disruption, enhancing the theme of emotional complexity. The layout, an open gate, allows for this interaction while maintaining negative space to reflect introspection.</desc>
