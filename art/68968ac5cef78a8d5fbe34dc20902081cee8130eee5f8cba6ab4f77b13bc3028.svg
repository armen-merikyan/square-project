<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Yield</title>
  <desc id="desc">This composition captures the emotional tug-of-war between control and surrender. A palette integrating warm white and sharp crimson represents the intensity of control, counterbalanced by the muted tones of carbon black and steel gray for the theme of surrender. The overflow in the center suggests pressure, while the borders attempt to contain this energy, creating an unresolved tension that invites exploration of the viewer's emotional landscape.</desc>
