<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emission of Contrast</title>
  <desc id="desc">The emotional tone captures the battle between vitality and deterioration, represented through warm and cool color contrasts. The palette blends clean white and warning orange—symbols of the spark—with violet gray and ink black, embodying ash and restraint. The primary contrast occurs diagonally, emphasizing a breakdown in structure with jagged edges interrupting smooth radial patterns. This arrangement reflects the narrative of resilience and fragility as the vibrant colors struggle against the softer, muted tones, evoking memories of intensity and quietness.</desc>
