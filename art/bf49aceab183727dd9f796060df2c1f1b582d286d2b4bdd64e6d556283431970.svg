<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Clarity</title>
  <desc id="desc">This artwork reflects the push and pull between confusion and clarity. The chosen palette of pinks and grays speaks to emotional tension — pinks suggest warmth and connection, whereas grays add a sense of ambiguity and uncertainty. The central contrast between dark maroon and gray creates a visual 'teeth against broken dots' effect, emphasizing a struggle between solid presence and fragmented ideas. The radial pattern hints at chaotic confusion in its radiance, while the thick outline suggests a boundary of clarity. The arrangement of colors is intentional in creating interruptions and echoing the theme of halves and fully realized spaces, allowing for both a calm center and disruptive edges.</desc>
