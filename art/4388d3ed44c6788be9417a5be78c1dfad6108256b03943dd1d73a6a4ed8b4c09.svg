<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The emotional tone suggests a struggle between control (measured, framing colors) and surrender (fluid textures). The palette of cosmic indigo and cold gold evokes a sense of awe and tension, with deep teal providing depth amidst a soft void black that symbolizes the constraints of control. The main collision occurs at the center where the structured frame of control meets the soft rain-like patterns of surrender, creating a dynamic interplay that embodies the essence of pressure versus release.</desc>
