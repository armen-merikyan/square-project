<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Falling Tensions</title>
  <desc id="desc">This piece embodies the emotional conflict between defiance and submission through color contrasts of warm and cool tones. The palette, derived from a 'broken memory' theme, features sepia and dusty greys that coalesce around flickering warm spots, representing moments of resistance amidst overwhelming weight. The layout engages in a dynamic tension where lighter pixels seem to fall against darker ones, creating an illusion of shifting balance. The collision occurs predominantly in the center, where lighter colors disrupt the heavier, muted edges, symbolizing the battle between openness and closure, resonating with the seed's narrative.</desc>
