  <title id="title">Contrast of Emotions</title>
  <desc id="desc">This artwork captures the tension between envy and gratitude through a carefully chosen palette of vibrant lime and electric blue against a heavy black. The color placement reflects the dynamic of rising vs falling, with brighter tones at the center suggesting hope, surrounded by darker, muted tones that evoke feelings of fear and emptiness. The broken edges create a sense of imperfection and interruption, representing the noise that exists between these emotions. The pattern flows from edges toward the center, emphasizing the shift from outside inward, creating a visual rhythm that resonates with the idea of pressure and release within the emotional spectrum.</desc>
