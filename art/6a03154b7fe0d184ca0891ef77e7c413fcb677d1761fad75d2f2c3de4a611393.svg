<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Currents</title>
  <desc id="desc">This artwork embodies the emotional tension between vulnerability and strength, illustrated through contrasting colors and chaotic patterns. The palette features earthy moss greens and deep rusts that speak to resilience, juxtaposed with pale bone whites that suggest fragility. The center reflects a burst of color density, representing strength, while the outer edges fade into softer tones, expressing vulnerability. The collision happens around the center, where strong channels of color interrupt delicate layers, symbolizing the push and pull of emotions as they spiral outward. The broken pixels throughout add intentional imperfections, echoing the theme of scars and repairs, all while maintaining an 80% density to suggest pressure against soft edges. Overall, this abstract arrangement evokes a deep narrative of connection and alienation, visualizing the struggle between exposure and shelter.</desc>
