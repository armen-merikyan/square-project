<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Pulse and Static</title>
  <desc id="desc">The artwork embodies the emotional tension between 'signal' and 'noise' through contrasting colors that evoke clarity versus static. The deep navy serves as a grounding color reminiscent of depth and consistency, while stark whites punctuate the piece, embodying bursts of clarity amid chaos. The balance of dense dark and softly fractured lighter shades reflects the idea of a pulse striving to maintain presence amidst interference. Broken pixels add intentional flaws, suggesting scars of an interrupted emotional journey, with the collision predominantly centered, emphasizing the struggle between clarity and chaos.</desc>
