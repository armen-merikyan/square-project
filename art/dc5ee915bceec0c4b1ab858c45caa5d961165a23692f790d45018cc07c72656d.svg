<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetrical Disruption</title>
  <desc id="desc">The emotional tone embodies the tension between restlessness and peace, represented through a structured but imperfect pattern. Bright colors on one side symbolize restlessness (interruptions, frantic textures), while muted tones suggest peace (soft, soothing spaces). The palette combines 'shelter_green' and 'warm_brown' to evoke safety amidst chaos, contrasted by the tranquil 'cold_white' and expressive 'open_blue'. The main collision occurs diagonally, creating an unsettling push against the steady form. Broken pixels introduce intentional disruptions, echoing the chaos against a backdrop of yearning for calm.</desc>
