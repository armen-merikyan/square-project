<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall</title>
  <desc id="desc">The emotional tone blends the tension of 'spark' with the calm of 'ash,' reflecting the duality of resilience versus fragility. The chosen palette integrates warm hues, like 'hot coral' and 'blood orange,' representing sparks of energy, against cooler tones such as 'charcoal' and 'hollow blue,' symbolizing the settled remnants of ash. The diagonal dynamic creates a gradient that suggests movement from energy to rest, with a major contrast at the center where colors collide, emphasizing the push and pull between the two emotions. The uneven border enhances the notion of imperfection, mirroring our innate experiences of fragmentation and wholeness.</desc>
