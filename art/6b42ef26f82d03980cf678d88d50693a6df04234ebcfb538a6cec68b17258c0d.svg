<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Pulses</title>
  <desc id="desc">The artwork conveys an emotional tension between longing (represented by delicate, lighter colors) and resolve (depicted through dense, solid hues). The palette includes pale mint and soft sky to evoke softness and an ethereal quality, while storm gray and near black provide weight and grounding. The main collision occurs in the center where the flow transitions dramatically between patterns, with a dense grid interrupting the stepwell design, illustrating a struggle between calmness and urgency. This juxtaposition of emotional states is expressed through controlled chaos, allowing the viewer to feel the tension between serenity and the desire for movement.</desc>
