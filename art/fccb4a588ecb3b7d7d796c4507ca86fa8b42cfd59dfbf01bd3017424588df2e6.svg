<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Locked Yearning</title>
  <desc id="desc">The emotional tone juxtaposes the intense pull of desire against the constraints of restraint. The selected palette incorporates vibrant hues like hot coral and blood orange to symbolize desire, interspersed with muted charcoal and hollow blue representing the weight of restraint. The outer border holds the intense warm colors while the inner 4x4 space reveals cooler tones and fluctuating patterns mimicking channels and cracks. The collision happens visually across the central area where the warm colors press against the cooler muted tones, creating an emotional tension suggesting a struggle between yearning and control, reflecting the essence of the seed's themes.</desc>
