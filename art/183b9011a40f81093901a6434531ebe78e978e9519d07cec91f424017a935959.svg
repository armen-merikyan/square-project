<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This artwork captures the tension between envy and gratitude using an asymmetrical flow that draws the viewer's eye from the edges inward. The chosen palette of sepia, tan, dust gray, and faded blue reflects a spectrum of emotions—faded warmth representing gratitude contrasted against deeper muted tones suggesting envy. The collision occurs in the central area, where fragmented patterns from broken dots and cracks evoke a sense of imperfection and emotional complexity. The 10% negative space reinforces the feeling of an empty room, further enhancing the contrast between presence and absence. This arrangement conveys a story of rising hope battling against the weight of fear, encapsulating the essence of the seed text in an abstract manner.</desc>
