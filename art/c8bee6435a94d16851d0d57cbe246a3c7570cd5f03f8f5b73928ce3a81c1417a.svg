<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tension</title>
  <desc id="desc">This piece captures the emotional duality of relief and dread through contrasting color placements and symmetry combined with intentional breaks. The palette, 'ancient_fire', conveys warmth amidst darkness, illustrating how light (burnt orange, gold) attempts to penetrate the oppressive mass (dark red, charcoal). The arrangement induces a tension that embodies both a feeling of stability on the left and an unsettling disruption on the right, symbolizing an emotional journey. The mirror broken layout creates a repetitive echo of these emotions, while the strategic placement of broken pixels introduces imperfections, suggesting an irregular path toward relief amidst pervasive dread.</desc>
