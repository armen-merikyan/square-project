<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center of Disruption</title>
  <desc id="desc">The emotional tone captured shifts between defiance and submission, with strong contrasts created by the selected palette of ripe green, acid green, honey gold, deep olive, and cream. The center of the square features bright, angular colors to signify defiance, while the outer edges offer muted tones that recede into submission. The collision of the two emotions occurs diagonally, with the defiant colors radiating from the center and softening towards the edges. This representation allows for a visual echo of pressure against quiet space, creating a dynamic rhythm of conflict and resolution.</desc>
