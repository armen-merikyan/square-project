<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This piece explores the tension between joy and grief, represented by a contrasting palette of warm yellows and muted purples. The upper half, filled with vibrant yellow and orange, suggests sparks of joy that overflow in a split-screen manner. In contrast, the lower half embodies heavier, fragmented energy with muted purples and deep blues. The asymmetry created by the wave-like flow and crosshatch patterns introduces a rhythmic dialogue of rising and falling emotions. The intentional use of broken pixels enhances the sense of imperfection, echoing the duality of grief and joy in our experiences. Overall, the interplay of color and arrangement forms a narrative of emotional collision, balance, and release.</desc>
