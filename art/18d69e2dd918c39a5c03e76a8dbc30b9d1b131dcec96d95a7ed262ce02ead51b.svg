<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Growth</title>
  <desc id="desc">The emotional tone of this artwork explores the tension between nostalgia and progress. The palette is drawn from contrasting colors of warmth and depth, with pinks and reds representing nostalgia, and grays and dark maroons representing the weight of progress. The arrangement features a horizontal split where lighter colors cascade diagonally, symbolizing progress intruding upon the nostalgia that flowers in the corners. The collision happens where the light colors encounter dark blocking shapes, creating an interplay of fullness against emptiness—a reflection of the complex emotions embedded in growth and change. The pixel bleed edges subtly soften the transitions, suggesting the memory's lingering presence within the starkness.</desc>
