<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition explores the tension between rage and calm through bold contrasts and patterns. The palette combines intense reds and deep blacks against softer pale blues and whites, reflecting emotional turbulence and quiet moments. The dominant black and red pixels create sharp, diagonal disruptions in the center, while calmer pale blue and white horizontal elements attempt to contain this explosion. Broken pixels sporadically interrupt the flow, representing the scars of emotion and the inevitability of collision. The interplay of maze-like calm against jagged rage embodies the emotional score of the seed.</desc>
