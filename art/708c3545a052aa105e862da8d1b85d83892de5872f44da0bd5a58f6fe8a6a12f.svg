<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece captures the emotional tension between desire and emptiness, employing a palette that evokes warmth and longing contrasted by cool, restrained tones. The main contrast happens in the center, where a saturated flood of warm colors symbolizes desire, colliding with hollow blue edges that embody emptiness. The spiral flow suggests an inward pull while representing the irresistible nature of desire against a boundary that refuses expansion. Broken pixels intermittently disrupt the otherwise composed structure, adding an element of imperfection that reflects the theme of interrupted longing.</desc>
