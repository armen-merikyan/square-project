<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">The emotional tone reflects the tension between longing and resolve, created by the juxtaposition of warm and cool colors. The navy and dim cyan evoke a spectrum of calm and urgency, while the dominating black adds depth and gravity. The lighter tones act as echoes, hinting at distant warmth amidst a firm boundary of resolve. The central collision of colors suggests pulses drawn inward, disrupted by intentional broken pixels, embodying the theme of repair versus damage. The negative space allows the viewer to breathe, portraying the struggle between containment and overflow, echoing the fragmentary nature of connection and solitude.</desc>
