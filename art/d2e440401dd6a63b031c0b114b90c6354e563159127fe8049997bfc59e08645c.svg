<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Awe and Terror</title>
  <desc id="desc">This composition juxtaposes two contrasting emotional states: awe and terror. The palette of electric blue and magenta introduces a vibrant intensity that feels both exhilarating and unsettling. The split design gives a sense of order above the chaotic lower section, representing the tension between security and instability. The use of 'broken pixels' evokes memories and imperfections, reflecting the fragmented nature of these emotions, while the patterns of crack reinforce the visceral experience of awe and pain. The main contrast occurs vertically, where the serene electric blue clashes with the chaotic magenta below, suggesting an oscillation between calm and tumult.</desc>
