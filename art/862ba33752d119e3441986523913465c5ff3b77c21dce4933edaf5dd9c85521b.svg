<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This composition embodies the emotional tones of control vs surrender by utilizing a palette of deep black contrasted with vibrant lime and electric blue. The central collision occurs in the middle rows, where heavy dark hues articulate containment, while the bright accents suggest moments of release and escape. The 'stair' pattern mirrors control, while the 'ripple' pattern echoes surrender, resulting in a dynamic tension as they overlap. The piece balances the weight of the dark outline with the lightness of colors at the edges, evoking a struggle between repression and liberation.</desc>
