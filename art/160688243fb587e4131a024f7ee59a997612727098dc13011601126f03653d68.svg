  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork explores the tension between rage and calm. The palette features stark contrasts with bright reds representing rage, while soft pale blues embody calm. The collision occurs primarily in the center where jagged red formations clash against horizontal blue echoes, emphasizing the emotional struggle. The eroded symmetry layout allows chaotic energy to push against controlled calm, creating a visual narrative of conflict, release, and unresolved tension.</desc>
