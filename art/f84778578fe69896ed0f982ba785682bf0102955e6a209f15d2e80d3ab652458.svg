<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition embodies the tension between rage and calm, expressed through contrasting color patterns. The top half, dominated by a mix of vibrant red and black, symbolizes rage with an aggressive stair-like pattern, creating a sense of pressure and disruption. The bottom half introduces pale blue and white in calm, channel-like patterns that evoke a sense of tranquility and space. The chosen colors reflect the emotional dichotomy: the boldness of red against the serene calmness of blue creates an emotional intersection. The broken pixels introduce intentional disruptions, highlighting the imperfection within the rigid structure of calm, while allowing for a subtle chaos that suggests unresolved emotions. This layout of split horizontal rows showcases a stark divide that is visually compelling and maintains abstract integrity, utilizing color and form to convey feelings rather than representation.</desc>
