<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">The emotional tone juxtaposes the calm of peace against the agitation of restlessness, creating a dynamic pulse. The palette of sepia, tan, dust gray, and faded blue reflects both nostalgia (memory) and urgency (motion). The prominent use of a muted tan field represents tranquility, while wandering accents of faded blue echo the discomfort of restlessness. The main collision occurs diagonally, where the stronger dark tones clash with lighter shades, embodying the struggle between unquiet thoughts and serene memories, creating a tension that invites contemplation. The edge static adds a sense of enclosure, while broken pixels disrupt the flow, enhancing the emotional juxtaposition.</desc>
