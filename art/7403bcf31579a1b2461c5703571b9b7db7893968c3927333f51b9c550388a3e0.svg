<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tidal Strength</title>
  <desc id="desc">This composition juxtaposes feelings of vulnerability against strength through color and pattern. The palette primarily features strong tones of black and electric blue, interspersed with softer magenta and lime, representing the collision of strong forces with the fragility of the lighter elements. The dense black tones dominated the center—symbolizing a heavy, rooted feeling—while the lighter colors spread across the edges, creating a sense of exposure and vulnerability. The broken pixels introduce intentional disruption, reinforcing the concept of broken safety amidst strength, while the corner pressure layout emphasizes the emotional tide cascading from the edges towards the center.</desc>
