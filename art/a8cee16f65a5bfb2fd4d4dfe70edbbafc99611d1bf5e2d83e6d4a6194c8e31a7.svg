<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse in Broken Echoes</title>
  <desc id="desc">This piece explores the emotional tension between longing and resolve, represented through the collision of soft, muted colors against sharp, assertive shapes. The chosen palette reflects the depth and complexity of this emotional struggle, utilizing dark maroon and gray to embody longing, contrasted with vibrant pinks and reds signifying resolve. The main contrast emerges in the center, where chaotic noise meets structured sparks, symbolizing the interplay between repair and damage. The pattern reflects a central pulse amidst scattered, broken elements, illustrating the push and pull of hope against despair—capturing the essence of the seed in an abstract form that invites introspection.</desc>
