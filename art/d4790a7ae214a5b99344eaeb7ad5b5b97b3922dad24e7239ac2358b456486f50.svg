<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This composition visually represents the tension between panic and control. The palette consists of deep navy and black to signify weight and chaos, contrasted with single white and dim cyan representing sparks of control and clarity. The use of hard edges emphasizes the stark difference, with the brighter colors sprawling from the corners, indicating a conflict pushing against darkness. The zigzag pattern in the placement echoes chaos but is contained within the overall frame, suggesting a break amid the order. The broken pixels inserted into dense areas create imperfections, reflecting the discomfort of that tension, while still allowing for negative space to breathe, illustrating how control can emerge from chaos.</desc>
