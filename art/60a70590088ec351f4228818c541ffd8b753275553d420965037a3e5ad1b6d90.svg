<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragile Tensions</title>
  <desc id="desc">The emotional tone reflects the delicate balance between vulnerability and strength, portrayed through a palette that mixes soft, muted colors with sharper accents. The chosen colors—rose clay, warm shadow, cool blue, distant lilac, and lamp gold—suggest intimacy and distance, embodying the central conflict. The pattern features a collision of 'rain' like strokes against 'patchwork' like solid blocks, centered on the 4th and 5th rows to emphasize tension. Broken pixels introduce disruption, creating an abstract suggestion of a mirror splintering—the moment of exposure against the need for safety.</desc>
