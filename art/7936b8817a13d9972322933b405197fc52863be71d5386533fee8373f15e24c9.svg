<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center Pulse</title>
  <desc id="desc">This piece explores the emotional tension between control and surrender through a juxtaposition of dense and muted colors. The palette, 'hunger_restraint', evokes a sense of strain and subtle release, with rich reds and purples contrasting the lighter, more subdued tones of cream and gray. The collision occurs centrally with a heavy use of 'negative_cross' pattern to signify pressure, surrounded by softer 'checker' spaces that hint at surrender, creating a visual pull from the edges toward the center. Broken pixels scattered throughout introduce imperfection, symbolizing interruptions in control, which enhance the overall dynamic of tension and release.</desc>
