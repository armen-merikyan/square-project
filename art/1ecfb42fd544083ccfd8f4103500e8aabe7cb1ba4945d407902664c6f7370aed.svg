<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Caught Between Tides</title>
  <desc id="desc">The emotional tone reflects the tension between longing and resolve, using muted colors to signify quiet despair mixed with moments of clarity. The chosen palette of pale mint, soft sky, storm gray, near black, and faded gold represents the complexities of desire against the strength of determination. The main contrast occurs at the center, where dark and light colors collide, embodying the struggle. Each broken pixel symbolizes the scars of conflict, enhancing the overall narrative of tension and release, while the patterns interweave to evoke a sense of rhythm and pulse, reflecting the idea of being caught in a cycle without resolution.</desc>
