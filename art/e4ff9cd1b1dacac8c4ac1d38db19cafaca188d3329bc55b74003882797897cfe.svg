<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This piece embodies the emotional tension between joy and grief through contrasting color placements. The warm yellows and oranges represent joy in the center, radiating outward, suggesting expansion and openness. The edges are filled with deep blues and muted purples, reflecting grief's weight and the feeling of fragmentation. The edge style is broken to signify imperfection and vulnerability. The arrangement creates a stair-step effect, providing visual rhythm and a sense of motion from the chaotic edges to the more structured center, encapsulating the theme of conflict between safety and threat.</desc>
