<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">This piece embodies the emotional tension between confusion and clarity, reflecting their duality through a contrasting palette of warm oranges and cool blues. The left side contrasts soft yellow dots—symbolizing clarity—against a chaotic grid of deep blue crosshatch on the right, representing confusion. The thick outline serves to define the two emotional spaces while allowing the mix to pulse between warm and cool, capturing the essence of uncertainty versus understanding. The broken pixels disrupt the symmetry just enough to create a sense of dynamic motion, embodying the fluctuation of emotions.</desc>
