<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Amidst Static</title>
  <desc id="desc">This piece captures the emotional tension of conflict between clarity ('signal') and chaos ('noise'). The chosen palette contrasts vibrant elements of signal green and electric blue with the muted tones of dead black and static gray. The arrangement features a strong central pulse in green and blue disrupting patterns of static gray, showcasing the struggle for clarity within overwhelming interference. Broken pixels scattered throughout mimic memory leaks, asserting a sense of imperfection and unresolved tension. The flow is left to right, emphasizing the journey through noise toward clarity.</desc>
