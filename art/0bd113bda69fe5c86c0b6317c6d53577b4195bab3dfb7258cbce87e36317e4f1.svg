<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork embodies the emotional tension between rage and calm. I've chosen a palette of reds for rage (representing explosive energy) against cool grays and pale blues for calm (symbolizing serenity). The central contrast occurs in the middle, where jagged red 'frame' marks intersect with soft blue 'pulse' patterns, creating a collision of emotions. The presence of black acts as a grounding factor, further emphasizing the edge of chaos and calm. This arrangement reflects the concept of 'knot', not as a literal image, but as a metaphor for intertwined emotions, where rage attempts to break through the calm yet coexists in contained waves.</desc>
