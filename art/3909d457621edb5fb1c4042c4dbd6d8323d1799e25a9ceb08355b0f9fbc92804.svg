<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone captures the tension between defiance and submission, represented through a contrasting palette of dark and light colors. The color choices reflect a struggle—rich deep greens for defiance collide with muted creamy tones signaling submission. The main contrast occurs in the center, creating an evocative visual narrative of resistance surrounded by softness. This arrangement encapsulates the notion of an inward spiral, echoing the themes of invasion and veiling, while broken pixels disrupt the flow, adding layers of complexity to the overall experience.</desc>
