<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Shelter</title>
  <desc id="desc">This composition conveys the tension between safety and exposure through the interplay of colors and patterns. The muted tones of shelter green and warm brown represent safety, creating a protective presence around the lighter hues of pale skin and cold white that evoke exposure. The center space is predominantly warm brown, symbolizing stability, while the peripheral bands alternate between pale skin and cold white, suggesting open air and vulnerability. The broken pixels throughout add a sense of imperfection and disturbance, creating a rhythm of pressure that contrasts with the tranquil middle. This arrangement embodies a delicate balance, where shelter gives way to exposure, emphasizing emotional texture.</desc>
