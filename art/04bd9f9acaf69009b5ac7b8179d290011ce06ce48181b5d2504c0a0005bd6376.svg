<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry vs Break</title>
  <desc id="desc">This artwork explores the emotional tension between awe and terror, represented through a stark contrast of warm and cool tones. The palette combines muted purple and deep blue to evoke a sense of depth against bursts of yellow and orange, reminiscent of light amidst shadow. The layout is split vertically to signify order versus chaos, with the left representing awe through a rain-like pattern of softer edges, while the right embraces terror through more chaotic textures. Broken pixels create a sense of imperfection, enhancing the feeling of instability, while negative space ensures the composition breathes, allowing the viewer to navigate the emotional landscape of this juxtaposition.</desc>
