<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Absence</title>
  <desc id="desc">This composition explores the emotional contrast of envy and gratitude through the juxtaposition of dark and vibrant colors. The palette features deep black, electric blue, bright lime, and magenta, reflecting feelings of heaviness and lightness. The top half represents envy with noise-like patterns in dark shades, suggesting a crowded mental space, while the soft spark of lime and magenta in the bottom half conveys gratitude, creating a serene contrast. Broken pixels enhance the imperfect nature of emotional struggles, while leaving negative space invites contemplation and balance amidst conflict.</desc>
