<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoed Pulses</title>
  <desc id="desc">This composition portrays the emotional conflict between clarity and confusion, embodying a 'signal vs noise' dialogue. The palette of navy, black, and dim cyan was chosen to evoke feelings of solitude and isolation, while the white serves as a stark contrast, representing clarity. The collision occurs centrally, where lines of signal interruption meet areas of dense noise, suggesting the ongoing struggle. The asymmetry of the piece creates visual tension, reflecting the unpredictable nature of memory and amid echoed experiences.</desc>
