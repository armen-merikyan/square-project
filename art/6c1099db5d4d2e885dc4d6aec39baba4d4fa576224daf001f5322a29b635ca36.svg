  <title id="title">Tension and Containment</title>
  <desc id="desc">This artwork explores the emotional dichotomy of desire and restraint through saturated and muted colors. The warm tones (#FF6F61, #FF5E15, #FFD1DC) in the top half symbolize the powerful pull of desire, contrasting with the cooler shades (#4B4B4B, #2B2D31, #A6C8E0) of the bottom half which represent restraint. The collision occurs in the center, where the boundaries are blurred, creating a vibrant tension. The broken pixels scattered throughout evoke a sense of imperfection and disturbance, emphasizing the struggle between the two emotions.</desc>
