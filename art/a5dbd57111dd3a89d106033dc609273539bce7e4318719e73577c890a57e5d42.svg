<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Tomorrow</title>
  <desc id="desc">This piece captures the tension between fear and hope through a vivid color contrast and a zigzag pattern that suggests upward movement against the background. The dark palette symbolizes fear, invoking sharp edges and dense corners, while the soft golds and pale greens represent hope, echoing a rising signal in the center. The pattern of collision reflects the struggle of navigating emotions. Broken pixels interrupt the flow, representing moments of uncertainty in the journey from fear to hope.</desc>
