<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Existence</title>
  <desc id="desc">This composition captures the emotional tension between emptiness and desire, represented through a contrast of saturated, warm colors versus cooler, muted tones. The palette of hot coral and blood orange conveys desire’s pull, while shadowy charcoal and hollow blue embody the empty spaces. The main collision occurs at the center, where the barcode-like pattern of desire disrupts the flood of muted tones, echoing the feelings of being confined yet yearning for more. The edges are sharply defined, symbolizing the boundaries that contain these intense emotions but allow for hopeful bursts of color.</desc>
