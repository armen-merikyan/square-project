<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">The emotional tone reflects a juxtaposition of desire and emptiness, creating a visual tension that resonates throughout the piece. The palette juxtaposes warm golds and cool tones to articulate the struggle between warmth of desire and the chill of emptiness. The left side flows with warmer tones in a structured maze pattern that signifies desire, while the right side fractures into cool muted shades, conveying emptiness through target-like interruptions. The placement of broken pixels on the right disturbs the symmetry, adding depth to the emotional narrative of a fragmented heart.</desc>
