  <title id="title">Exposed Shelter</title>
  <desc id="desc">The emotional tone contrasts safety and exposure through color. The palette includes warm brown and shelter green to evoke protection, contrasted with cool, open blue and pale skin tones representing vulnerability. The arrangement displays an echoing movement from the center to the edges, with a heavier emphasis on greens and browns on the left, transitioning into blues and whites on the right, symbolizing the tension of exposure meeting security. The intentional broken pixels create visual disruptions, illustrating the fragile border between these emotions.</desc>
