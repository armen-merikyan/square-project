<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork contrasts vulnerability and strength through color and pattern. The palette includes deep teal for an emotive anchor, cosmic indigo to suggest strength, and void black as a backdrop for vulnerability. The predominant use of dark colors with breaks of lighter tones signifies areas of exposure and highlights pressure around an exposed center, evoking an emotional pull. The arrangement reflects a collision of strength represented by dots against the ash-like field of vulnerability creating a dynamic interplay, drawing the observer's eye to the central conflict.</desc>
