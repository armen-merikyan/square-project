<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Ascent</title>
  <desc id="desc">The artwork captures the emotional tension between longing and resolve, using a palette that suggests vulnerability (soft sky and pale mint) against a backdrop of strength (storm gray and near black). The halo void layout creates an illusion of a center where intimacy meets distance, highlighting a main collision at the center of the composition. Broken pixels intentionally interrupt the resolution, symbolizing the chaos in striving for clarity. Overall, the art embodies the contrasting feelings of reaching for connection while navigating the emptiness around it, evoking personal introspection.</desc>
