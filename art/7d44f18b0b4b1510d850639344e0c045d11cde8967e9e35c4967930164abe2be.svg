<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This composition embodies the emotional duality of 'joy vs grief' through contrasting colors and spatial arrangement. The warm yellows and oranges signify joy, while muted blues and purples convey the heaviness of grief. The top half features bright and clean patterns that suggest the rising signal of joy. The zigzag arrangement introduces a wave-like flow that contrasts the soft edges of grief, creating a broken pixel effect that symbolizes imperfection and emotional turmoil. The tension manifests visually where the ordered warm pixels collide with the disordered cool ones, reflecting the subtle push and pull between hope and sorrow. Spaces are intentionally left unfilled to maintain a sense of calm amid density.</desc>
