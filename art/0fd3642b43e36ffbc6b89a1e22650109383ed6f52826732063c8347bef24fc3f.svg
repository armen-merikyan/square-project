<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition embodies the emotional dichotomy of vulnerability and strength through a balance of dense and pale tones. The palette, anchored in dark violet and soft gold, evokes feelings of fear and hope, framing a juxtaposition of strength against the fragility of the pale green center. The collision between the robust frame and the delicate ripple pattern illustrates the tension between exposure and safety, placed prominently through a central seam of contrasting colors, where edges wear hints of imperfection to signify scars of vulnerability. This arrangement invites the viewer to reflect on the delicate interplay between shelter and exposure.</desc>
