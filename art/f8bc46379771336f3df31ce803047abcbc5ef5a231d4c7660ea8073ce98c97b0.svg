<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Control and Chaos</title>
  <desc id="desc">The emotional tone juxtaposes the chaos of panic with the structured calm of control. The palette of electric blue, magenta, lime, and black embodies machine emotions—invoking both futuristic precision and organic fluidity. The upper rows showcase a tight radial pattern suggestive of order, while the lower rows descend into a dense maze. This shift illustrates the collision between control and panic through a stark contrast of cool structural lines against warm chaotic swirls, embodying the struggle between centered stability and erratic external pressures. Pixel bleeding introduces imperfection, emphasizing emotional disturbance.</desc>
