<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragile Trust</title>
  <desc id="desc">The emotional tone of this piece is anchored in the juxtaposition of trust and suspicion, characterized by a tension between soft and harsh elements. The palette is derived from earthy and muted tones like moss green and bone white, symbolizing resilience amidst fragility. The contrast is highlighted with scattered patterns representing suspicion (dark halos) and a static structure of trust (soft grids), reflecting a battle for stability. Central collisions form near the middle square, where soft glows intersect with shadows, symbolizing the duality of the emotional experience of trust versus suspicion. This tension results in an abstract narrative of a fragile yet hopeful bond marred by uncertainty.</desc>
