<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Light and Shadow</title>
  <desc id="desc">This artwork translates the emotional dichotomy of fear and hope. The chosen palette of deep blacks and soft golds represents the intensity of fear contrasting against the subtle glow of hope. The stark contrast occurs in the crisscrossing patterns of dark against light, creating a burst effect that echoes the tension between light and weight. This split vertical layout embraces the reflective qualities suggested by the seed, with a dominant dark edge mirroring the central light, establishing asymmetry that evokes a sense of unresolved motion.</desc>
