<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emptiness and Desire</title>
  <desc id="desc">The emotional tone captures the struggle between despair (emptiness) and longing (desire). The palette choice of red, black, pale blue, and white embodies warmth against coolness, reflecting this tension. Contrasts emerge with black as a stark backdrop, punctuating desires represented by bright reds, while pale blues whisper of emptiness. The zigzag flow introduces a dynamic rhythm, connecting the warmth of red pulsating against the stillness of the cool hues. The arrangement is evenly distributed to allow negative space, reflecting the duality of feeling. Broken pixels enhance the sense of imperfection, resonating with the theme of fragmentation.</desc>
