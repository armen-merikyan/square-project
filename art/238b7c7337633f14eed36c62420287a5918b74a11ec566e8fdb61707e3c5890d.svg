<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This square embodies the emotional tension between defiance and submission with a design that features a resilient core surrounded by softer, chaotic interactions. The bright coral and blood orange stand for defiance, creating a central grid structure, while the muted charcoal and hollow blue reflect submission, forming a patchwork around it. The randomness and broken pixels signify disruption, reflecting an imperfect yet organic transition from an ordered center to chaotic edges, echoing the seed’s themes of openness and closure. The main contrast occurs at the center, where vibrant colors collide with the softer hues, highlighting their struggle.</desc>
