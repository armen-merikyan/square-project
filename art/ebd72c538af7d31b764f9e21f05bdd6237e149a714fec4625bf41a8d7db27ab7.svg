<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This composition evokes a spectrum of emotions through contrasting use of color, where deep blues represent grief and muted purples symbolize a quiet joy. The layout flows from bottom to top, creating a sense of upward movement, reflecting the struggle between joy and grief. The hard edges and structured pattern introduce a sense of order amidst chaos, while scattered broken pixels add imperfection, depicting the complex nature of emotion. The central area holds brighter colors, symbolizing hope, surrounded by deeper, heavier tones that signify weight and sadness.</desc>
