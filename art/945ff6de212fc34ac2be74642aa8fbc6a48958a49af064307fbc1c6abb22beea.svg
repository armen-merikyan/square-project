<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Beneath the Surface</title>
  <desc id="desc">This artwork encapsulates the emotional tension between defiance and submission using a palette of burnt orange, dark red, charcoal, and gold—the juxtaposition of warmth against darkness symbolizes the struggle between lightness and weight. The arrangement flows from left to right, depicting falling pixels that suggest weight and pressure. Dark colors dominate with intermittent bright pixels that create collisions suggesting open versus closed emotions, emphasizing both quiet and noise. The intentional break with a few 'broken pixels' reinforces the idea of imperfection in this emotional landscape.</desc>
