<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Calm</title>
  <desc id="desc">This composition contrasts the explosive energy of rage with the serene containment of calm. The left half employs deep reds and vibrant blacks, representing the passionate, sharp interruptions of rage through jagged patterns. Conversely, the right half features soft blues and whites, creating horizontal waves that symbolize serene calm. The collision at the center, where chaos meets tranquility, showcases a clash of emotions, amplified by dispersed broken pixels that lend the artwork a sense of imperfection, resonating with the theme of eroded symmetry.</desc>
