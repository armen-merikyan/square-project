<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork explores the emotional tension between vulnerability and strength through a balance of warm red and cool pale blue. A radial pattern represents strength at the center, while a veil pattern of softer colors suggests vulnerability radiates outward. The contrast focuses on the middle rows, where dense red collides with lighter shades, creating a sense of pressure around an unshielded core. The use of broken pixels introduces intentional disruption akin to scars, reflecting the fragility within strength. The layout embodies 'stacked bands,' depicting emotional strata that shift in density. Negative spaces ensure breathing room within the chaos, representing moments of stillness in vibrant turmoil.</desc>
