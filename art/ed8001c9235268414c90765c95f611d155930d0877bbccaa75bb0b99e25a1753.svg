<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall</title>
  <desc id="desc">This composition explores the emotional tension between joy and grief. The palette features warm yellows and oranges on one side, symbolizing joy, while deeper blues and muted purples represent grief on the other. The sharp contrast between these colors, along with the rising signal layout, creates a powerful interplay of expansion and weight. The upward movement on the joy side and downward descent on the grief side illustrates the dualities of hope and loss. Patterns of stripes for joy and crosshatch for grief intersect dynamically, further highlighting the collision of emotions while maintaining a sufficient negative space to evoke a sense of breath amid chaos.</desc>
