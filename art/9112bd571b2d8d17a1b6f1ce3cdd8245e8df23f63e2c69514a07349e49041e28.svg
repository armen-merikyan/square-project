<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Softness and Fury</title>
  <desc id="desc">This piece captures the emotional struggle between softness and fury, employing a split layout to emphasize the contrast. The top four rows feature muted colors that convey tenderness, creating a soft texture that feels almost protective. In contrast, the bottom rows use saturated reds and blacks, creating a stark, jagged pattern that embodies rage. The collision occurs at the middle, where the noise of the upper pattern intersects with the sharpness of the lower rows. This represents the tension of inner emotions clashing with external pressure. By incorporating broken pixels, the artwork achieves an imperfect beauty, suggesting the complexity of forgiveness and guilt.</desc>
