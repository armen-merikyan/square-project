<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasts of Persistence</title>
  <desc id="desc">This piece embodies the emotional struggle between defiance and submission, represented through a contrast in color density and placement. The 'ancient_fire' palette, incorporating burnt orange and dark red, evokes a sense of strength and resistance. Meanwhile, cooler shades of charcoal and gold suggest retreat and veiled submission. The arrangement features a dominant center, which conveys a sense of steadfast defiance, while the surrounding bands suggest receding pressure, drawing the eye in a counterclockwise spiral, creating visual tension. Broken pixels are strategically placed to impart a sense of imperfection and disruption, amplifying the conflict and emotional nuance.</desc>
