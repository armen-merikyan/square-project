  <title id="title">Overflow and Containment</title>
  <desc id="desc">This composition captures the emotional tension between 'rage' and 'calm'. The palette features vibrant red and black representing rage, contrasted against cooler pale blue and white to signify calmness. The collision occurs predominantly in the top left corner where warm colors burst into a more structured, organized cooler palette. This creates an effective dialogue between chaos and serenity, manifesting the struggle between overflow and containment through jagged cracks against stacked horizontal bands.</desc>
