<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Intersection of Duality</title>
  <desc id="desc">This composition explores the contrasting emotions of joy and grief through a palette of warm yellows and muted blues. The left half embodies joy with bright, vibrant colors expanding outward, while the right side reflects grief with deeper blues and fragmented patterns that contrast sharply against the warmth. The composition uses a center-heavy edge style, representing the emotional core where joy and grief meet, resulting in a tension-filled visual narrative. The layout creates an asymmetric imbalance, visually communicating the juxtaposition of safety against threat, leading to a rhythm that flows from the center to the edges.</desc>
