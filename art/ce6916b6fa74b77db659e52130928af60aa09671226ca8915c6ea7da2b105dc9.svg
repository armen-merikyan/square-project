<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">The emotional tone oscillates between fear and hope, embodied through a distinct contrast of color and pattern. A dark, jagged edge mimics fear, framing a soft golden core representing hope, creating a sense of conflict. The outer black and violet hues create density, while the inner pale green and soft gold escape from that density. The rows reflect this tension through a mix of stark darkness and gentle light, imbuing a clash of emotions, accentuating the rising signal of hope within a framing of fear.</desc>
