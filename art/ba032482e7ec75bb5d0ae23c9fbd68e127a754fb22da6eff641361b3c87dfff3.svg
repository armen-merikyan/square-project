<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This piece embodies the emotional duality of joy and grief through a contrasting palette of warm and cool tones. The yellows and oranges signify the joy, radiating from the center, while the deep blue and muted purple create a surrounding sense of grief, portraying weight and depth. The main contrast occurs horizontally, with brighter colors pushing against darker hues, symbolizing the struggle between light and dark emotions. The maze pattern on the brighter half reflects complexity and expansion, while the frame in the darker half encases the emotions, hinting at confinement. The lack of literal shapes implies the overwhelming nature of these emotions without representing them directly.</desc>
