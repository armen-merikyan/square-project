  <title id="title">Overflow of Emotion</title>
  <desc id="desc">This artwork explores the tension between desire and restraint, represented through the use of saturated reds and muted creams. The palette embodies the emotional struggle, where the vibrant colors push outward, symbolizing desire, while the muted colors contain and restrain. The main collision occurs in the center, where bright reds spiral against the contained muted areas, illustrating the dynamic shift of emotional pressure. The layout emphasizes a diagonal flow, representing an invasion of desire from the corner, ultimately creating an abstract narrative of conflict and containment.</desc>
