  <title id="title">Emotional Echoes</title>
  <desc id="desc">This composition explores the tension between trust and suspicion. The palette of hot coral and blood orange represents warmth and vibrancy associated with trust, while charcoal and hollow blue bring a cool tone of suspicion. The main collision occurs at the center where static patterns of trust overlap with broken dots of suspicion, creating a dynamic conflict. The layout invokes a broken frame, leaving intentional gaps suggesting vulnerability and intrusion. Imperfections, created through broken pixels, further emphasize emotional scars and disruptions, echoing the inner struggles between these contrasting feelings.</desc>
