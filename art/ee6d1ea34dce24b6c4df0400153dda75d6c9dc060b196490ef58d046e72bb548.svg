<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Longing and Resolve</title>
  <desc id="desc">This artwork explores the tension between longing and resolve through the interplay of color and placement. The palette balances deep, dark hues of black and dark violet with lighter accents of soft gold and pale green, creating a contrast that evokes both yearning and stability. The central collision occurs diagonally, where dense channels of longing (dark violet and soft gold) intersect with grid-like structures of resolve (pale green), resulting in an overlap that resonates with intimacy yet maintains distance. The layout emphasizes an empty room, with most spaces left open, allowing the patterns to breathe and create a feeling of potential and unresolved emotion.</desc>
