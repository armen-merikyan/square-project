<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Connection</title>
  <desc id="desc">This artwork captures the emotional tension between loneliness and connection through a split vertical layout. The left side features darker, muted tones of burnt orange and dark red, representing the weight and isolation of loneliness. The right side contrasts this with bright, luminous golds, symbolizing connection and warmth. The arrangement conveys a sense of invasion from the corners, reflecting how loneliness often creeps in. Broken pixels interspersed throughout enhance the feeling of imperfection and memory. The balance of negative space further emphasizes the contrast of fullness versus hollowness in connections we seek.</desc>
