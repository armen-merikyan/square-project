<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork embodies the emotional tension of vulnerability against strength using a palette titled 'broken_memory'. The muted tones of sepia and dust gray suggest fragility, while the faded blue introduces an element of calm amidst the chaos. The layout features a diagonal argument where strength occupies one wedge, depicted through dense, circular patterns, while vulnerability presses in from the opposite diagonal through stacked, thinner forms. The collision of emotions is centered, representing the tension between exposure and protection. Broken pixels create intentional disruptions to emphasize imperfection and the flawed nature of emotional experiences, while the negative space further highlights the raw, unshielded light of vulnerability.</desc>
