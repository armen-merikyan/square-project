<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Emotions</title>
  <desc id="desc">The emotional tone echoes the struggles between vulnerability and strength, accentuated by the warmth of coral contrasting with the coldness of slate. The composition embodies a duality, with the pale center (soft amber) serving as an exposed heart, encircled by heavier, dark shades (blue-black). The top-down pixel arrangement represents the falling pixels theme, creating a sense of incoming pressure meeting a fragile core. Intentionally broken pixels bridge the two emotional states, allowing fleeting connections and abrupt interruptions throughout the layout.</desc>
