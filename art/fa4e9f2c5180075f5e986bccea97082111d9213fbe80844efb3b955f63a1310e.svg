<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The artwork embodies the emotional tension between yearning and limitation, with a palette that reflects warmth and intensity of desire against the cool, muted tones representing restraint. The saturated colors in the center create a powerful pull towards the edges, which are framed by darker, sealed colors creating a locked-in feeling. The tension is emphasized by the patched arrangement of warm hues conflicting with the structured ladder-like cool tones, suggesting a struggle between freedom and confinement. The broken pixel elements serve as reminders of imperfection within the emotional states depicted, further enhancing the narrative of desire held back by restraint.</desc>
