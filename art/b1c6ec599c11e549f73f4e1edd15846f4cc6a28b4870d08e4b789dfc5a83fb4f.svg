<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">The composition reflects the emotional struggle between longing and resolve, depicted through a split vertical layout where the left side embraces soft, warm tones (longing) and the right side introduces firm, cold colors (resolve). The palette of signal green, electric blue, hot magenta, dead black, and static gray embodies this duality—soft yet urgent in their contrasts. Main collision occurs at the center, where the colors are intentionally disrupted to illustrate the tension of emotions through broken pixels. The rings pattern further enhances the idea of interconnected feelings, creating a rhythm of pulse against a backdrop of quiet space.</desc>
