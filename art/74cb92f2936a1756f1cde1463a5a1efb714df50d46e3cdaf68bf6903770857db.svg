<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory vs Motion</title>
  <desc id="desc">This artwork captures the tension between softness and severity through stark contrast and interwoven color patterns. The palette of powder pink and warm white introduces a sense of gentle warmth, while the carbon black and sharp crimson create a severe structure, depicting memory's pulse against motion's weight. The main collision occurs in the center, where the soft broken dots collide with the harsher embers, representing the struggle between guilt and forgiveness.</desc>
