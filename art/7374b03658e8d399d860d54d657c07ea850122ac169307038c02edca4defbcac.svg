<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Desire and Restraint</title>
  <desc id="desc">This composition explores the emotional tension between desire and emptiness, using a palette that contrasts warm and cool tones. The vibrant colors (hot coral and blood orange) represent desire, while the darker hues (charcoal and hollow blue) signify emptiness. The arrangement features a dense cluster in one corner, suggesting a 'small dense island' of desire, contrasting with a quieter field that evokes a sense of emptiness. The use of broken pixels introduces intentional imperfections that symbolize the struggle between these emotions. The color placement encourages the feeling of a magnetic pull towards the vibrant, yet restrained by the surrounding emptiness, allowing for visual tension and depth.</desc>
