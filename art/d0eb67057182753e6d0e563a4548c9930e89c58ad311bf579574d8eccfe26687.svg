<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Being</title>
  <desc id="desc">The emotional tone reflects a tumultuous interplay between envy and gratitude, captured through jagged patterns suggesting discord and lingering moments of appreciation. The palette blends deep black as a weighty presence with electric blue as a hint of hope, and magenta introduces an emotional pulse of turbulence. The arrangement zigzags upward creating a visual tension, with bright colors interrupting dark swathes, representing moments of clarity amidst heaviness. Each broken pixel adds to the rawness of the experience, creating a complex narrative that evokes a duality of feelings.</desc>
