<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Extremes</title>
  <desc id="desc">This artwork explores the emotional contrast of relief and dread, situated within a frame of muted colors that allows vibrant combinations to emerge in the center. The chosen palette of yellow and deep blue encapsulates a dance between warmth and coolness, suggesting an ongoing battle between joy and unease. Bright yellow accents interrupt the quiet blues and purples, creating focal points that convey bursts of emotion amidst surrounding calm. The layout is structured to emphasize a strong contrast: the outer edges represent dread with darker tones, while the center mirrors relief with its lighter, more expressive colors. The intentional asymmetrical arrangement of the ‘ring’ pattern evokes tension, illustrating a struggle between opposing forces as they collide and interact, while leaving negative space to signify the weight of emotional absence or emptiness. The presence of broken pixels allows for imperfection, enhancing the idea of unresolved feelings and experiences.</desc>
