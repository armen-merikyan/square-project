<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fissured Serenity</title>
  <desc id="desc">This artwork captures the struggle between relief and dread through contrasting colors and patterns. The muted tones represent the heavy presence of dread while the bright accents signify moments of relief. The central collision occurs where dark and light hues intermingle, evoking tension and release. The palette blends soft sky blue and faded gold with storm gray to symbolize a crack in an otherwise oppressive space. The seed's concept manifests through swirling lines and fragmented clusters, illustrating a chaotic spiral inching towards the serenity of a brighter core.</desc>
