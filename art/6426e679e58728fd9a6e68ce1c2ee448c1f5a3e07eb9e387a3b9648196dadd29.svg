<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Pulse</title>
  <desc id="desc">The artwork embodies the emotional tension between softness and severity, utilizing a palette that juxtaposes warm whites and powder pinks against deep blacks and sharp crimson. This contrast forms a visual echo of the push and pull between 'signal' and 'noise', with lighter hues representing softness layered atop darker tones indicating severity. The central collision occurs toward the center, where a radial pattern of severity intersects the softer, hinge-like structure, creating a nuanced narrative of tension and release. Broken pixel disruptions reference imperfection and the chaotic nature of emotional states within the composition.</desc>
