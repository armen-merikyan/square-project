  <title id="title">Conflict in Color</title>
  <desc id="desc">This composition captures the emotional tension between restlessness and peace using a palette that embodies warmth and coolness. The dominant hues of warm coral and soft amber represent the serene aspects of peace, while cool slate and blue-black evoke feelings of restlessness. The arrangement features a central collision at the diagonal, where the warm colors provide a soft pulse interrupted by intense darks, suggesting a flame against shatter. The broken pixels enhance this disturbance, creating an edge crawl effect and adding to the complexity of the emotional narrative.</desc>
