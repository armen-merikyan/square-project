<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This composition explores the emotional tension of 'tenderness vs rage' by creating a visual narrative of contrast. The palette features saturated reds pushing against muted blues and blacks, representing the stark difference between rage and calm. The main collision occurs in the central rows, where channels of warmer hues (rage) interrupt the cooler tones (tenderness), suggesting conflict and resolution. Broken pixels scattered throughout symbolize imperfections and emotional scars, enhancing the rawness of this abstract idea.</desc>
