<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Edge of Connection</title>
  <desc id="desc">This piece navigates the emotional tension of connection and loneliness through contrasting areas of density and void. The palette, composed of warm oranges and deep blues, signifies joy and grief, emphasizing the yearning for connection amidst isolation. The left side is filled with a maze-like pattern of muted purples and oranges, resembling complex thoughts and barriers of loneliness, while the right features a more open, sparking arrangement with yellows and deep blues representing connection and vitality. The broken pixels scattered throughout introduce a sense of imperfection and disruption, mirroring the fragile nature of memories and emotions. Overall, the composition evokes a push and pull between fullness and emptiness, encouraged by the layout's split vertical design, illustrating a journey from dense emotional weight to lightness.</desc>
