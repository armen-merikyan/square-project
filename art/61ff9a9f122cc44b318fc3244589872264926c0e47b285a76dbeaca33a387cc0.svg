<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order in the Chaos</title>
  <desc id="desc">The emotional tone represents a conflict between control (structured, regular patterns) and surrender (soft, yielding textures). The palette is inspired by muted yet rich colors that evoke depth and tension—red oxide for warmth and urgency, blackened plum for complexity and shadow, muted cream for softness, iron gray for grounding, and small orange as an accent for brightness amidst the chaos. The main collision of the piece occurs at the center, where the structured 'threshold' pattern meets the freeform 'stairs' pattern, visually narrating the struggle between restraint and release. The use of broken pixels introduces intentional imperfections, symbolizing the disruption inherent in this emotional duality.</desc>
