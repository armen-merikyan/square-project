<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Calm and Chaos</title>
  <desc id="desc">The emotional tone oscillates between awe and terror, creating a dynamic tension. The left half employs stair-like patterns in pale blue and white, evoking a sense of order and calm. The right half disrupts this with ring patterns in saturated reds and blacks, representing chaos and instability. This collision leans on a safe_vs_threatened contrast, where soft edges blend the two emotional extremes, while the pockets of negative space enhance the feeling of broken memory. The palette reinforces the duality, with cool tones suggesting calm juxtaposed against warm, aggressive reds, depicting the spiral of emotions.</desc>
