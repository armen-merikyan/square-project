<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Void</title>
  <desc id="desc">The emotional tone captures the interplay of desolation and vitality. The palette of cosmic indigo, void black, star white, cold gold, and deep teal reflects a contrast of hope (spark) against decay (ash). The main contrast occurs diagonally, where vibrant colors collide with muted shades, encapsulating the struggle between restraint and hunger. The pattern emerges from an asymmetrical flow that creates tension and release, as well as echoes of memory and presence.</desc>
