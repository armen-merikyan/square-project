<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects a dynamic between vulnerability and protection. The selected palette embodies this through 'shelter_green' and 'warm_brown' representing safety, contrasted with 'open_blue' for exposure. The persistent echo of 'cold_white' allows for an expansive but refreshing space against the weight of the central colors. The main contrast occurs in the center, where the colors collide—creating a gradient from calm to pressure, suggesting the push-pull nature of exposure. Broken pixels further enhance the irregularity, suggesting vulnerabilities in the protective edges while maintaining the integrity of an abstract story.</desc>
