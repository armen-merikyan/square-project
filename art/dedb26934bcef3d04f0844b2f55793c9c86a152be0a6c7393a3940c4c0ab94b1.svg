  <title id="title">Silent Collision</title>
  <desc id="desc">This artwork reflects the emotional tension between trust and suspicion by juxtaposing warmer hues against deep, muted fields. The palette of hot coral, blood orange, and dusty pink evokes warmth and connection, while the charcoal and hollow blue introduce a cool, detached backdrop. The main collision occurs in the center, where the radiant colors break through darker edges, symbolizing resilience in conflict. The ‘halo’ shape seed manifests as an abstract cluster of brightness navigating through shadows, creating a sense of dynamic tension and emotional depth.</desc>
