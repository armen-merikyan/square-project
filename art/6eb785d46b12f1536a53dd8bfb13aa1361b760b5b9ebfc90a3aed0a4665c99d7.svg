<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">The emotional tone reflects the contrast between envy (represented by darker, muted tones) and gratitude (represented by lighter, more vibrant hues). The palette integrates shades of pink, red, gray, and dark maroon to establish warmth against a backdrop of unsettling emotions. The composition embodies a collision of structured, mirror-like patterns on one side (envy) and spontaneous, sparkling patterns on the other (gratitude), creating a dynamic flow left to right. The main contrast occurs at the center, where the ordered and chaotic elements intersect, hinting at the tension between these emotional states. The soft edge style enhances the sense of movement while leaving ample negative space, allowing quietness to coexist with emotional noise.</desc>
