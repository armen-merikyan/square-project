<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry Disrupted</title>
  <desc id="desc">This abstract artwork explores the emotional tension between trust and suspicion through a split horizontal layout. The top half represents trust with a warm palette of greens and blues, suggesting stability and comfort. The bottom half depicts suspicion with stark blacks and magentas, creating visual dissonance. The use of halos in the upper section contrasts with scar-like disruptions in the lower half, embodying resilience against fragility. Broken pixels introduce intentional imperfections, enhancing the narrative of disruption and the struggle inherent in maintaining trust amidst uncertainty.</desc>
