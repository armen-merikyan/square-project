<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This piece captures the emotional tension between quietness and pressure. The palette combines soft tones of off-white and faint peach for tranquility, contrasted against the deeper shadows of dark navy and compressed red that evoke pressure. The layout emphasizes two pulsing centers (represented by the grids of colors), adorned with broken pixels that introduce intentional chaos and movement. The main collision occurs in the center, where soft colors meet hard edges, illustrating the struggle between stillness and intensity.</desc>
