<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This piece explores the tension between softness and severity, using a palette that juxtaposes warm whites and gentle pinks against sharp blacks and grays. The warm colors convey a sense of tenderness, while the dark hues evoke severity. The collision occurs in the center through a bold contrast, embodying a pulse-like rhythm that suggests conflict. The layout's threshold reflects the meeting point of these emotional currents, while the use of broken pixels introduces intentional disruptions, symbolizing the imperfections inherent in emotional experiences.</desc>
