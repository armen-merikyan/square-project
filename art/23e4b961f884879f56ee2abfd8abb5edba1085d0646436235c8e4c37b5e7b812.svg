<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This artwork encapsulates the dynamic interplay between warmth and coolness, reflecting the emotions of love (warm reds and pinks) and betrayal (cool grays and dark maroons). The palette emphasizes tension, with contrasting colors arranged to provoke feelings of pressure and release. The layout starts in the corner, allowing the 'love' section to dominate while the 'betrayal' element interrupts it, creating a visual story of conflict and resolution. The use of broken pixels introduces imperfection, aligning with the emotional themes of the piece while maintaining negative space for balance.</desc>
