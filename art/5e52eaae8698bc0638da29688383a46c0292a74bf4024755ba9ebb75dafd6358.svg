<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork explores the emotional tension between safety and exposure, using a palette that hints at protective and vulnerable qualities. The warm brown represents safety, while the cool open blue signifies exposure. The main contrast occurs in the center with a dense arrangement of dots (exposure) colliding against a flooded field of gentle safety colors at the edges. The placement of broken pixels introduces intentional imperfection, disrupting the flow and echoing life's unpredictability. This combination creates a dynamic visual narrative of tension and release, ultimately aiming for a balance yet leaving room for exploration.</desc>
