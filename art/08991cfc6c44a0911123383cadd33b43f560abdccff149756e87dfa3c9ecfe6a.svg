<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Balance</title>
  <desc id="desc">The emotional tone encapsulates the struggle between defiance and submission, evident in the stark contrast of colors and patterns. The palette, featuring deeper navy and stark black, suggests weight and gravity, while lighter dim cyan acts as a signal of hope against the dense backdrop. The top rows represent 'defiance' with aggressive noise patterns, creating a chaotic yet structured feel, while the bottom rows display 'submission' through radial patterns, symbolizing a gentle, enclosing embrace. The collision occurs primarily through the interplay of dark and light, invoking a sense of tension and unresolved emotions—a harmonious balance caught in a moment of struggle.</desc>
