<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Control and Surrender</title>
  <desc id="desc">The emotional tone encapsulates a contrast between the rigidity of control and the fluidity of surrender. The chosen palette of soft gold, warm ivory, deep wine, ash gray, and stain brown represents the balance of warmth and restraint, reflecting guilt intertwined with the soft acceptance of yielding. The main collision occurs between the outer edges, representing control with a thick border framing a more fluid inner core depicting surrender. This juxtaposition creates a visual tension that expresses a dynamic interplay of emotions.</desc>
