  <title id="title">Contain and Overflow</title>
  <desc id="desc">This artwork embodies the emotional tensions of desire and restraint. The palette, influenced by warm red oxide and muted cream, represents the warmth of longing against the cooler iron gray and blackened plum that symbolize containment. The central collision occurs where bright, warm colors overwhelm muted tones, creating tension and depth. Patterns of braid and ring reflect spiraling pressures and the intertwining of emotions, emphasizing the push-pull dynamic inherent to the seed. Negative space enhances the overall balance, keeping the composition abstract while still emotionally resonant.</desc>
