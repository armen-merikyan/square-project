<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Amidst the Static</title>
  <desc id="desc">The emotional tone captures a struggle between clarity (the signal) and chaos (the noise). The palette merges the tranquil depth of static gray with vibrant accents of signal green and hot magenta, illustrating the battle between consistency and disruption. The central cluster of vivid colors against a primarily gray backdrop symbolizes the clear pulse fighting to be heard amidst the static, reminiscent of memory wrestling with erasure. Main collisions occur at the center, serving as the emotional heartbeat of the piece.</desc>
