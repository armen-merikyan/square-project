<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">The emotional tone juxtaposes grief's muted, fragmented blues with joy's vibrant bursts of warmth. The palette features deep blues and muted purples representing grief on the top while lively yellows and oranges signify joy below, reflecting the battle between order and chaos. The center holds a crack pattern for joy, interrupted by crosshatch lines of grief to create an imperfect coherence. The negative space in transition echoes the emotional split, inviting contemplation on resilience amidst tension.</desc>
