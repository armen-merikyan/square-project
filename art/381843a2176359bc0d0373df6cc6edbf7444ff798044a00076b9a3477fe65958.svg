  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone is captured through the use of contrasting colors that evoke control and surrender. The palette balances deep, muted tones with bright accents, representing pressure against a soft release. The main collision occurs centrally where the saturated blues and lavenders compete with the softer cyans and whites, embodying an overfilled space held within a locked border. The layout's 'scattered repair' theme creates an interplay of chaotic construction and contained purity, mirroring the tension between overwhelming desire and restrictive boundaries.</desc>
