<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoed Embrace</title>
  <desc id="desc">This piece explores the emotional dynamic between safety and exposure through a palette that balances warm browns with cool greens and blues. The dark outer colors create a feeling of safety, framing the lighter center that suggests vulnerability and exposure. The main contrast occurs where the warm brown meets the pale skin, suggesting a collision of emotional states while echoing the vulnerability of the exposed center. The broken frame allows for interruptions, resembling the conflict described in the seed, leading to a visual narrative of tension and release.</desc>
