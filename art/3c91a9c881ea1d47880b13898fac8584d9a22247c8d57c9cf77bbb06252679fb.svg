<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Shelter</title>
  <desc id="desc">This piece embodies the tension between the feelings of safety and exposure. The warm browns and soft greens create a protective atmosphere, while the pale skin and cold white shades represent the starkness of exposure. The left and right sides maintain a mirrored layout, punctuated by subtle discrepancies that represent interruptions in safety, echoing the central theme of vulnerability. The collision happens at the center, where the cooler tones encounter the warmth, inviting a reflection on the boundaries that keep us safe versus those that leave us open. The selected pattern types of islands and echoes suggest fragmented moments of peace amid constant exposure.</desc>
