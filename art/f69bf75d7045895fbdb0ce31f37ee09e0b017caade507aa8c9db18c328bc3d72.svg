  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork captures the tension between defiance and submission through a series of contrasting patterns and color densities. Using a palette evocative of hunger and restraint, the dark and muted colors create a foundation of pressure, while the brighter accents suggest interruption and sparks of life. The dominant dark tones represent the unyielding center, while the lighter colors spiral inward, illustrating the struggle of submission against defiant resistance. The quiet channel in the grid symbolizes a pathway through this emotional conflict, leaving spaces that echo the concepts of invasion and density, providing room for reflection amidst the chaos.</desc>
