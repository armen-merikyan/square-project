<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Disrupted Harmony</title>
  <desc id="desc">This artwork explores the emotional interplay between confusion and clarity, manifesting as a vertical split where the left side embodies confusion through a chaotic arrangement of cool colors, while the right side suggests clarity with warmer, more structured tones. The palette combines soft pinks and reds with deep grays and dark maroons, representing the tension between vibrancy and shadow. Broken pixels introduce imperfection, reflecting the fragmented nature of clarity amidst confusion. The overall arrangement disrupts the symmetry, creating a visual pulse that evokes a feeling of both disorder and calm resolution, embodying the theme of the seed.</desc>
