<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory and Motion</title>
  <desc id="desc">This artwork represents the tension between 'control' and 'surrender'. The warm, muted tones signify nostalgia (guilt), while the cooler, brighter accents indicate lightness and potential release (forgiveness). The color palette creates a layered depth; the dark hues signify containment, while the gold and ivory suggest a soft yielding. The primary collision occurs in the center, where desaturated colors of guilt meet the vibrant touch of forgiveness, symbolizing an emotional threshold. The use of broken pixels introduces intentional disruptions, echoing the theme of imperfect memory entwined with motion.</desc>
