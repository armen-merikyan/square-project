<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Shadows</title>
  <desc id="desc">This piece captures the emotional dichotomy of loneliness and connection, with the outer rows representing loneliness through darker hues and negative space, while the inner section bursts with lighter colors symbolizing connection. The palette combines deep black and fiery red with pale blue and white, creating an evocative contrast. The use of stairs for loneliness and maze patterns for connection elevates the feeling of being trapped but longing for closeness. The top-heavy composition enhances the tension, pushed against the frame, producing a sense of instability and reveal.</desc>
