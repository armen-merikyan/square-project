  <title id="title">Tension of Order</title>
  <desc id="desc">This artwork captures the duel between panic and control through color chaos and organization. The palette blends vibrant yellow and orange to represent sparks of emotion against deep blue and muted purple, creating a stark visual tension. The zigzag pattern suggests a struggle, while the broken pixels introduce imperfection, showcasing how control can be disrupted. The grid structure in the layout serves to signify order, yet it's marred by patches of chaos that evoke the feeling of grief intertwined with joy.</desc>
