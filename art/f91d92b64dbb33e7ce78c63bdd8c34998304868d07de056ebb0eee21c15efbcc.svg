<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal and Static</title>
  <desc id="desc">The emotional tone is rooted in the dichotomy of trust and suspicion, embodied through contrasting colors that represent stability versus uncertainty. The palette pulls from 'awe_terror' with cosmic indigo and void black symbolizing depth and shadow, while cold gold and star white serve as accents of hope and clarity. This tension creates a visual pulse where trust (represented by soft, warm colors) battles against suspicion (depicted in stark, cool tones). The main collision occurs at the center, where the chaotic broken dots of suspicion intersect with the more stable scar patterns of trust, creating visual static amid a background of calm. The shape of a knot informs the layering of colors—complex and interwoven yet abstract, leaving negative space that suggests the unresolved nature of trust versus suspicion.</desc>
