<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone contrasts between the fiery urge of rage and the serene presence of calm, using a palette that oscillates between vivid red and cool pale blue, creating a dynamic tension. The top half illustrates rage through sharp, jagged arrangements in red, representing the chaotic bursts and intensity; while the bottom half employs calm, subtle stair-like patterns in pale blue, signifying quiet and introspection. The main contrast occurs at the center where red sharply meets blue, embodying the collision of emotions. This design captures the seed's themes through a visual narrative of tumultuous experience balanced by calmness, mirrored in the orderly and chaotic sections of the grid.</desc>
