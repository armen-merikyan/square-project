<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">The emotional tone reflects the struggle between certainty and curiosity, with a chosen palette of muted off-white, dust gray for calm certainty, alongside dynamic bursts of compressed red and dark navy to represent the chaos and curiosity. The left half embodies certainty with clear pulse marks, while the right half, with its radial pattern, interrupts the flow towards the center—a collision of ordered and chaotic. Broken pixels contribute to the sense of imperfection, reflecting the inherent tension in the emotional landscape.</desc>
