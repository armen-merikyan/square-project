<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Chaos and Order</title>
  <desc id="desc">This composition captures the emotional tension between panic and control. The dark outer edges symbolize chaos, using deep blacks and dark violets, creating a 'burned edge' effect that suggests encroaching instability. Within, a soft gold and pale green core employs a broken dot pattern to evoke control, offset by noise bursts that mimic chaotic interruptions, representing panic. The interplay between increasingly dense areas near the edges and a softer, more spacious center illustrates a push-pull dynamic that resonates with the theme of battling emotions. Overall, the design creates a captivating dialogue between full vs. hollow spaces, culminating in a striking abstraction of emotion.</desc>
