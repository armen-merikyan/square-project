<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">An Unfolding Paradox</title>
  <desc id="desc">This abstract composition embodies the emotional tension between softness and severity. The palette features a blend of warm whites and soft pinks contrasted against dark, cold colors of carbon black and steel gray, representing emotional depth and heaviness. The main contrast occurs at the center where the red pulse marks interrupt the smooth flow of the lighter shades, symbolizing a collision between guilt and forgiveness. The spiral and weighted pattern creates a sense of continuous movement, reflecting the complexity of human emotions, while maintaining enough negative space to emphasize the emotional journey.</desc>
