  <title id="title">Collision of Presence</title>
  <desc id="desc">This artwork captures the tension between vulnerability and strength through a contrasting palette of black, red, pale blue, and white. The central area symbolizes the exposed core, while the darker edges represent protective density. The main collision occurs horizontally, with pulsating marks of red breaking through the calm of the pale blue, illustrating how strength envelops and sometimes intrudes upon vulnerability. The use of broken pixels brings intentional imperfection, echoing the emotional struggle within the piece.</desc>
