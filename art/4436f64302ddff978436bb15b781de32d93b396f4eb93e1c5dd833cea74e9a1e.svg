<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The artwork captures the emotional tension between longing and resolve through contrasting color densities and patterns. The use of muted sepia and tan from the 'broken_memory' palette conveys a sense of nostalgia and softness, while stark 'fault_line' and 'stripes' patterns create a rhythmic disruption. The center is where the two emotions collide, leading to a fluctuating pulse of quiet and intensity, representing the push and pull of repair versus damage. Broken pixels scattered throughout enhance the feeling of imperfection, resembling memories that linger yet are incomplete.</desc>
