<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tidal Tensions</title>
  <desc id="desc">This piece captures the emotional duality of certainty and curiosity. The left side employs structured pulse marks to represent certainty, while the right introduces ember-like effusions to symbolize curiosity. The contrast between the sharpness of black and crimson against the softness of pink and warm white amplifies the tension. The arrangement is mirrored yet disrupted, aligning with the themes of order versus chaos, creating an evocative narrative of rising signals. The central collision happens between the organized pulse and the infectious embers, suggesting an unresolved push and pull.</desc>
