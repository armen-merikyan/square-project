<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Tension</title>
  <desc id="desc">The emotional tone reflects the battle between defiance and submission, captured through stark contrasts between the central 4x4 square of intense, radial patterns signifying defiance, and a border of more subdued stair-step gradations representing submission. The palette of lime, electric blue, magenta, and black embodies a tension between vibrance and void, where the luminous colors collide against the dark edges. The placement of colors creates a dynamic flow from the outer edges inward, invoking a sense of weight and an ongoing struggle. The intentional spacing provides a negative space that mimics the feeling of unresolved conflict, suggesting both open and closed emotions in the arrangement.</desc>
