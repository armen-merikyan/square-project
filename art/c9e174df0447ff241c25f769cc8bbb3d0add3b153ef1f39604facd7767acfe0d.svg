  <title id="title">Tension Between Boundaries</title>
  <desc id="desc">The emotional contrast of longing and resolve manifests in this piece through a palette of earth tones and subtle highlights. The serene bone white and moss green create a quiet field, while rust and small gold punctuations symbolize urgency and tension. The composition focuses densely at the center, creating a vibrant clash of dots and fault lines that evoke the struggle between containment and overflow. The broken pixels signify repairs and imperfections, enhancing the underlying narrative of damage and resolve.</desc>
