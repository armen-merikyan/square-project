<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This square embodies the emotional tension between tenderness and rage. The palette balances saturated reds representing rage against muted pale blues and whites symbolizing tenderness, allowing for an expressive collision at the center. Integrating a grid pattern that overlaps with hinge-like jagged edges invites both chaos and calm, representing the push and pull of opposing feelings. The open gate layout offers a pathway for this contrast to flow inward, bringing an evocative confrontation between exposed areas and protective barriers, reflecting the idea of vulnerability amidst turmoil.</desc>
