<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Edges of Conflict</title>
  <desc id="desc">The emotional tone reflects the tension between envy (dark, heavy colors) and gratitude (lighter, airy shades). The chosen palette of sepia, tan, dust gray, and faded blue captures nostalgia and contrast, while the composition showcases a dynamic interplay between dense areas and negative space. The rows exhibit a zigzag pattern that creates a push-pull dynamic—representing the push from envy and the pull of gratitude. Broken pixels intermittently disrupt cohesion, symbolizing the 'mirror broken' concept, adding a raw, unfinished quality that emphasizes the conflict inherent in the emotions.</desc>
