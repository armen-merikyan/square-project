<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This composition explores the interplay between longing and resolve, with a tension between brokenness and wholeness reflected in the palette of burnt orange, dark red, charcoal, and gold. The use of broken pixels introduces imperfection, underscoring the themes of repair and damage. The rows are arranged to create a sense of quiet space dominated by a firm central axis of contrast, where burnt orange forms the core and dark red serves as both a boundary and a depth of emotion. The stark edges evoke a sense of sealed tension, while bursts of gold punctuate the work, suggesting moments of light within the struggle. The dominant use of color creates a rhythm that mirrors the emotional collision of aspirations versus reality, guiding the viewer through a journey of introspection and contemplation.</desc>
