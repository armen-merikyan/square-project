<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Resilience</title>
  <desc id="desc">This composition embodies the emotional contrast of longing and resolve. Using a palette of moss green, bone white, rust, stone gray, and small gold, each color reflects a different aspect of these emotions. The broken frame layout allows for inner tension, employing negative space as a vessel for quiet rupture against denser clusters of color. The central collision between rust (representing resolve) and moss green (signifying longing) creates an emotional pulse, echoing a sense of urgency within the serene boundaries of light and dark. Broken pixels scatter throughout, introducing deliberate imperfections that deepen the narrative of repair amidst damage, suggesting the scars of experiences borne out of emotional tensions.</desc>
