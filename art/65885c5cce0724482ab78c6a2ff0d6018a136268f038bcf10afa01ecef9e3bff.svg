<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Borders</title>
  <desc id="desc">This square captures the emotional tension between control and surrender through its contrasting palette of dark violets and soft golds against a foundation of black and pale greens. The outer edges are heavily outlined, establishing a barrier that represents control, while the lighter, open center signifies surrender and release. The row patterns are represented with alternating stripes and 'teeth' shapes, colliding in the center to demonstrate their competition for space, resulting in visual tension—one that feels quite dense and chaotic yet simultaneously holds an element of hope. The broken pixels introduce unexpected disruptions, mirroring the unpredictability of emotional states, making the composition abstract and open to interpretation.</desc>
