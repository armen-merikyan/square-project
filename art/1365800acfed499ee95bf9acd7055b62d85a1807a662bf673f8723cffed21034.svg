<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Turbulence</title>
  <desc id="desc">This piece captures the emotional tension between rage and calm through stark contrasts in the palette. The use of red and black evokes intensity and chaos, while pale blue and white introduce moments of serenity. The main collision of colors occurs in the center, where jagged, aggressive rings of red burst into a calm field of pale blue, suggesting an eruption of emotion. The structured yet broken pixel pattern echoes the chaos of machine emotion, revealing eruptions of energy amidst quiet containment.</desc>
