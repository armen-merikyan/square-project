<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Strata of Emotion</title>
  <desc id="desc">The emotional tone conveys a tug-of-war between panic and control, with the palette of pink, red, gray, and dark maroon creating a clash of warmth and coolness. The upper half uses a grid pattern symbolizing control, presenting a structured, solid feel, while the lower half adopts a stair pattern that creates a sense of chaotic movement. The contrast is strongest at the edges, where the structured grids of the upper half collide with the dynamic, shifting patterns below, echoing the conflict of feeling confined and free. This aligns with the notion of center versus edges, as the center provides a deceptive calm surrounded by the turmoil of emotion. The introduction of broken pixels adds an element of imperfection and unexpectedness, enhancing the emotional depth.</desc>
