<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Edge of Protection</title>
  <desc id="desc">This composition embodies the tension between vulnerability and strength, reflected in its palette of burnt orange, gold, dark red, and charcoal. The central area dominates with a strong, checker pattern representing strength, while delicate veil-like interruptions symbolize vulnerability around the edges. The collision happens at the border, where vibrant warmth meets muted tones, suggesting the harmonious conflict of safety and exposure. Negative spaces enhance the feeling of something hidden yet emerging, evoking whispers of light through shadows.</desc>
