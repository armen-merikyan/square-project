<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipsed Resonance</title>
  <desc id="desc">This artwork captures the tension between defiance and submission through an interplay of bold colors and soft whispers. The primary palette of pale mint and faded gold signifies quiet determination alongside the storm gray that represents veiled submission. The center is stark and unresolved, where bright colors burst forth like sparks, reflecting defiance, while the edges soften into quieter tones, invoking submission gracefully receding. The layout features eroded symmetry, with noise emerging from the central collision, echoing a complex emotional landscape shaped by the initial seed.</desc>
