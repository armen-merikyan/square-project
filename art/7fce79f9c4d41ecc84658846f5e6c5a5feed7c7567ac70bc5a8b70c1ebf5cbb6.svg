  <title id="title">Order and Chaos</title>
  <desc id="desc">This piece captures the tension between panic and control through color and pattern. The warm tones of burnt orange and dark red clash against the charcoal and gold, creating a visual representation of emotional collisions. The grid follows a structured flow on one side while random target patterns punctuate the chaos on the other, expressing the struggle between order and disruption. This interplay of colors reflects rhythm and release, illustrating a moment where pressure meets crisp quiet spaces.</desc>
