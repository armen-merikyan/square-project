<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This artwork embodies the emotional tension between desire and restraint through a palette combining bright saturation and muted tones. The central collision occurs in the diagonal sweep from the corner, where the intensity of the hot coral and blood orange colors clash with deep charcoal and hollow blue, reflecting the push and pull of yearning against limits. The crosshatch and split-screen patterns represent the conflicting emotions, with broken pixels hinting at moments of disruption in the flow. The overall composition maintains a sense of negative space, reinforcing the theme of longing and boundaries.</desc>
