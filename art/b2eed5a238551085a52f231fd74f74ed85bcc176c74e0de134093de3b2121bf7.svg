<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Harmony</title>
  <desc id="desc">The artwork embodies the tension between confusion and clarity through stark contrasts in tone and texture. The chosen palette—dark maroon to symbolize deep confusion contrasted with softer pinks representing clarity—creates a visual rhythm that oscillates between dense clusters and airy spaces. The top half features a grid pattern, chaotic and layered, embodying confusion, while the bottom half is structured in a checker pattern, symbolizing clarity. The intentional placement of broken pixels introduces disruption, resonating with the theme of a fractured perception. Overall, the piece reflects a pulse-like flow, capturing the emotional oscillation between order and chaos.</desc>
