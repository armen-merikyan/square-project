<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Tension</title>
  <desc id="desc">The artwork explores the emotional nuance between defiance and submission by utilizing a palette that oscillates between cool and warm tones. Muted plum provides a gentle field base, representing submission, while vibrant rain blue disrupts the calmness, signifying defiance. The pattern diverges diagonally, invoking a sense of motion and tension, as colors collide and merge. The center features higher intensity colors that serve as a point of punctuated resistance against softer, receding edges, emphasizing the theme of open vs closed within the space. Broken pixels introduce intentional imperfection, allowing for visual echoes of chaos against a backdrop of order, creating a visual threshold that is both inviting and challenging.</desc>
