<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This piece captures the emotional duality of vulnerability and strength through a visual collision of light and dark colors. The palette is intentionally balanced between pale blue, red, and contrasting blacks and whites to evoke feelings of tension and calmness. The dominant strength theme emerges in strong, defined patterns, while the vulnerability aspect surfaces in softer, more fragmented elements. The central collision forms around the mid-grid, where opposing patterns of stepwell and stairs intersect dramatically, embodying the battle between retreat and defense.</desc>
