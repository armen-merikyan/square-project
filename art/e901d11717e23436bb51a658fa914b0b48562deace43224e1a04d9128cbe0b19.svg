<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This artwork explores the emotional interplay of desire represented through saturated colors against the restraint of emptiness denoted by muted tones. The chosen palette balances vibrant hot coral and blood orange with the cooler hollow blue and charcoal, embodying the tension between longing and containment. The dense center, where warm colors collide, symbolizes desire overflowing, while the border's quiet blues illustrate restraint, echoing a sense of quiet pressure. The broken pixels intersperse disruptions in patterns of crosshatch and frame, reinforcing the conflict between desire and emptiness. The layout is purposefully dense in the center, with negative space framing the edges to represent the struggle of desire against limitations.</desc>
