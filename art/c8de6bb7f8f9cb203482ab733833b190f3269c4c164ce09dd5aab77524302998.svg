<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Patterns</title>
  <desc id="desc">This composition evokes the emotional tension between defiance and submission, represented by the contrasting use of bold, dark tones against soft, lighter colors. The palette of faded gold, storm gray, and pale mint conveys both warmth and restraint, encapsulating the push and pull of defiance. The predominant dark colors create a sense of protection (defiance), while lighter colors around the center show a retreating softness (submission). The collision point centrally emphasizes this inner battle. The distinct patterns symbolize the magnified clash of worlds—one vibrant, the other subdued. The broken pixels add intentional disruptions to highlight the imperfections of conflict and tension.</desc>
