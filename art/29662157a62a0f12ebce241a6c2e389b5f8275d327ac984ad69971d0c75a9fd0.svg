  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This artwork captures the tension between vulnerability and strength by contrasting a soft, pale center with darker, harder edges around it. The palette features sepia and tan to evoke warmth and nostalgia, while dust gray and faded blue introduce a reflective quality, symbolizing the emotional layers of 'exposure_vs_shelter.' The collision occurs predominantly in the center where soft hues collide with stronger edges, illustrating the struggle between being open and being protected. The irregular placement of colors embodies imperfections, echoing the seeds of connection and alienation.</desc>
