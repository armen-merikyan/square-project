<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Torn Echoes</title>
  <desc id="desc">This piece explores the emotional tension between love and betrayal. The palette incorporates warm pinks and reds to signify love, contrasted with deep grays and dark maroons that suggest betrayal and chaos. The main contrast occurs in the diagonal flow of color; the top row features an eruption of warmth, disrupted by cold, heavy tones, symbolizing the crumbling trust. The layout is intentionally sparse, creating a negative space that embodies emptiness and heartbreak, while broken pixels are introduced to reflect the theme of imperfection amidst deep feelings.</desc>
