<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Threshold</title>
  <desc id="desc">The emotional tone emphasizes the delicate tension between safety and exposure. A palette of shelter green, warm brown, and cold white captures this dynamic, contrasting warmth with coolness to suggest vulnerability and protection. The main collision occurs in the center where pale skin tones echo the border of safety, creating a frame that invites exploration yet underscores the fragility of the exposed center. The carefully placed broken pixels introduce intentional disruptions, representing imperfections in the concept of safety, translating the seed's narrative of vulnerability into an abstract pattern.</desc>
