<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipsed Emotions</title>
  <desc id="desc">This artwork captures the emotional duality between love and betrayal through contrasting colors and patterns. The palette of warm pinks and reds represents love, while the deep gray and dark maroon suggest betrayal. The upward flow reflects the struggle and tension between rising hope and a sinking feeling of betrayal. The sharp edges clash with soft gradients, illustrating the broken symmetry of emotions, and creating a sense of discomfort. The pattern combination of stripes and a maze adds complexity, reflecting the inner turmoil of navigating these feelings. The broken pixel effect introduces an imperfect beauty, mirroring the theme of split connections.</desc>
