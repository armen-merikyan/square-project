<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece embodies the emotional tension between vulnerability and strength, using a palette of deep blacks, dark violets, soft golds, and pale greens to suggest fear and hope. The main collision occurs in the center, where dense, saturated colors represent strength, surrounded by softer, more vulnerable tones that struggle to contain it. The patterns of ripple and embers reflect the push and pull of these emotions. The broken pixels introduce an element of imperfection, symbolizing the way vulnerability coexists with strength. The layout emphasizes a dense center, surrounded by a thinner border, creating a feeling of pressure and containment, embodying the contradictions inherent in vulnerability and strength.</desc>
