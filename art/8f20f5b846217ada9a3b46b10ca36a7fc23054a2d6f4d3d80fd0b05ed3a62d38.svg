<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone navigates the contrast between vulnerability and strength, depicted through a palette of warm coral, soft amber, cold slate, blue-black, and signal cyan. The colors create a dialogue where the dark scheme of blue-black delineates a strong protective frame, interfacing with a fragile center signified by warm hues. The collision occurs at the center, where the patterns of fault lines intersect with bold geometric targets, illustrating the tension between protection and exposure. The arrangement allows for quiet spaces within the busy 4x4 core, emphasizing the dialogue of strength repelling against the softness of vulnerability, allowing the inner chaos of emotions to peek through.</desc>
