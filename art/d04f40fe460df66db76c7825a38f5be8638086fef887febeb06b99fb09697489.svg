<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symphony of Tension</title>
  <desc id="desc">This artwork encapsulates the emotional interplay of joy and grief represented through varying densities and contrasts. The upper half, reflecting joy, employs a bright palette of yellow and orange presented in a checker pattern, symbolizing openness and the radiance of happiness. In contrast, the lower half embodies grief with muted purple and deep blue hues arranged in a noise-like pattern, depicting heaviness and fragmentation. The center serves as the heart of the piece, establishing a pulse that both connects and divides these emotional states. The asymmetry, especially with a left-weighted emphasis and broken pixels, reinforces the narrative of interruption and unresolved tension, mirroring feelings of love and betrayal that exist in the spectrum between these two emotions.</desc>
