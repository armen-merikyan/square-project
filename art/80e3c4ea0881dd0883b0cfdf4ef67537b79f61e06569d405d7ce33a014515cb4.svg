<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Static Pulse</title>
  <desc id="desc">This composition captures the emotional dialogue between clarity (signal) and confusion (noise). The chosen palette of signal green and electric blue against static gray and dead black creates a vivid contrast that embodies a readable rhythm disrupted by bursts of magenta. The central pulse of signal colors attempts to break through the surrounding noise, emphasizing the theme of interference. The layout, featuring a broken frame, allows for deliberate leaks of emotion, with the noise pattern of embers creating a chaotic yet compelling backdrop to the steady pulse of the signal. The arrangement reflects the irruption of signal through layered noise, embodying the tension of exposure versus shelter.</desc>
