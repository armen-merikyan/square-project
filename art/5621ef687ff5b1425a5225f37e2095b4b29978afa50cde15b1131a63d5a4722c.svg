<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects the tension between vulnerability and strength, represented through a soft lavender-gray dominating the composition for gentleness, while deep rain blue marks assert strength and stability. The balance between these colors forms a diagonal sweep from the corner, illustrating a 'corner invasion' sensation, where vulnerability encroaches into the stable space. The contrast type creates a dialogue between safety and exposure, while the broken pixels (in muted plum and moon white) introduce disruptions, mirroring the fragility of a mirror broken. The ambient negative space reinforces the emotional breadth, encapsulating the feeling of open exposure. This arrangement abides by the guide's constraints, ensuring an abstract narrative flows through emotion and color.</desc>
