<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Heartbeats</title>
  <desc id="desc">The emotional tone captured here oscillates between feelings of desire and emptiness, contrasting warm hues of desire against cool tones representing emptiness. The palette of electric blue and magenta conveys vibrancy and longing, while black serves as a grounding void. This creates a visual friction where the bright colors express yearning, and the darker shades represent a deep void. The main collision of colors occurs in the transition from the top warmer tones to the cooler hues at the bottom, suggesting a psychological shift from aspiration to solitude. The fragmented edges of some pixels evoke imperfections, embodying the theme of a heart fragment in the midst of desire and isolation. Overall, the piece visually narrates the push and pull between these conflicting emotions, with strategically placed negative space to emphasize both tension and release.</desc>
