<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotion</title>
  <desc id="desc">This abstract composition conveys the clash between tenderness and rage through a carefully chosen palette combined with a diagonal layout. The 'rage' side is characterized by jagged red tones, representing explosive energy, while the 'tenderness' side utilizes softer pale blue hues, embodying gentleness. The jagged arrangement on one side interrupts the calm flow of the other, creating tension that invites reflection on the dualities of emotion. The intentionally placed broken pixels create a disrupted rhythm, accentuating the complexities of guilt and forgiveness interspersed within the piece.</desc>
