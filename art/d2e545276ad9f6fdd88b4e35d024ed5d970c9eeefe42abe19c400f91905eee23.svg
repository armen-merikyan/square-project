<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone explores the tension between envy and gratitude. The palette of burnt orange and dark red evokes a sense of warmth but also intensity, reflecting the struggle between these emotions. The arrangement features upward movements on one side versus downward patterns on the other, creating a dialogue of hope and despair. The broken pixels introduce an element of imperfection, symbolizing the fragility of emotions while contrasting with stable colors that echo gratitude. This interplay creates a vibrant yet structured field, suggesting the complexities of human experiences while respecting the negative space rule.</desc>
