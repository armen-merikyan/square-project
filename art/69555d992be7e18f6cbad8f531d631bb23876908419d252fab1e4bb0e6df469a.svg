<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">The emotional tone embodies a struggle between restlessness and peace, using a palette that juxtaposes bright electric blue and vibrant lime against the heavy presence of black. This creates a stark contrast that reflects inner turmoil and the search for calm. The main collision occurs centrally, where dynamic patterns of static-like disruptions meet the tranquility offered by broader black fields. The seed of the moon inspires an interplay of light and dark, echoing the contrasting emotions through asymmetric arrangements. Each row features disrupted uniformity, enhancing a sense of unease while allowing pockets of peace to emerge within the chaos.</desc>
