<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Uncertainty</title>
  <desc id="desc">This composition explores the emotional dichotomy between panic and control. Utilizing a palette of soft gold, dark violet, and pale green with black for depth, it portrays tension. The soft gold symbolizes fleeting hope amidst a backdrop of darker tones representing control. Hard edges and broken pixels create a sense of conflict—a brightness occasionally interrupted by the weight of dark clusters. The vertical rising motion is intended to suggest an escape from the heaviness below, illustrating emotional tension on the brink of a breakthrough or collapse.</desc>
