<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Dualities</title>
  <desc id="desc">This composition embodies the emotional conflict between joy and grief through a juxtaposition of bright and muted tones. The palette, featuring warm yellows and oranges against deep blues and muted purples, reflects the contrasting emotional states. The structured grid on one side symbolizes order, while the disrupted dots on the other signify chaos, creating a sense of tension. Imperfect placements of colors introduce brokenness, mirroring the abruptness of feelings. The central connection point represents the bridge between these emotions, enhancing the narrative of unresolved feelings.</desc>
