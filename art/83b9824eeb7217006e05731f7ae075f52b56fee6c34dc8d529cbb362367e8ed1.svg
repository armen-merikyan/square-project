  <title id="title">Collision of Resistance</title>
  <desc id="desc">This composition reflects the emotional tension between defiance and submission, using sharp contrasts and patterns to evoke struggle. The colors represent clarity (clean white and ice blue) facing the chaotic submission (ink black and violet gray). The main contrast is at the center, where the crack pattern of defiance meets the spark pattern of submission, creating a dynamic emotional conflict. Broken pixels add disruption, emphasizing the imperfect nature of this interplay, while ample negative space allows tension to linger.</desc>
