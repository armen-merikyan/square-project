<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Isolation</title>
  <desc id="desc">The emotional tone reflects the tension between loneliness and connection, encapsulated by the contrasting colors of burnt orange and dark red mixed with moments of shadowy charcoal, suggesting the heaviness of isolation. The structure includes a central focus that appears both protected and under duress, where the warmer hues clash with deeper, darker tones, creating an evocative pulse of feeling. The palette marked by 'ancient_fire' speaks to the consuming nature of loneliness while still allowing sparks of connection to emerge, represented by lighter tones and placements that break the rigid pattern and hint at hope amid despair.</desc>
