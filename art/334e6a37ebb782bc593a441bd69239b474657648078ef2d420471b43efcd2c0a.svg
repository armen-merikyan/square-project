<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This composition embodies the tension between joy and grief through contrasting color patterns. The left side employs a structured grid pattern in cooler tones of deep blue and muted purple, reflecting the fragmentation and weight of grief. In contrast, the right side bursts forth with an expanding radial arrangement in warm yellows and oranges, symbolizing joy. The jagged edges where the two sides meet depict a collision of emotions, creating a visual tension that suggests both harmony and chaos, embodying the emotional push-pull dance of life.</desc>
