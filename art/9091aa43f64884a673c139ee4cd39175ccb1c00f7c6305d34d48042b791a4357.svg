  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This piece embodies the emotional tension of joy and grief, where contrasting hues convey the complexity of these feelings. The palette features deep blues to reflect grief, balanced with bursts of yellow-orange representing joy. The grid pattern disrupts the flow of dots, symbolizing interruptions in emotional stability, while the left-weighted design creates a visual imbalance that mirrors inner conflict. The arrangement creates colliding moments of light against darker fields, exploring the push and pull of love and betrayal.</desc>
