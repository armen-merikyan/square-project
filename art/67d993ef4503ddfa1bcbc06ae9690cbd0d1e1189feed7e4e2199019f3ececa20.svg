<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Unbound</title>
  <desc id="desc">The emotional tone of this piece reflects the juxtaposition of 'quiet' and 'pressure'. The palette—comprising muted off-white and gray tones with bursts of compressed red—creates a sense of restless, shattering energy against a calm backdrop. The pressure collected in the corner disrupts the soft transition across the composition, introducing chaos into the stillness, while the broken pixels represent imperfections in clarity, emphasizing the tension of the theme. The main contrast occurs at the edge where dark navy clashes with faint peach, embodying the shattering against an otherwise subdued field.</desc>
