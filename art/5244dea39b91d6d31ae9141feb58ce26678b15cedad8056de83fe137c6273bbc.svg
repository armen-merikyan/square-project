<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">The emotional tone navigates the terrain between joy and grief, embodying the tension of 'rise vs fall' with a palette that juxtaposes the brightness of yellow and orange against the muted qualities of deep blue and muted purple. Joy's crack pattern appears in bursts of brightness that challenge the heaviness of grief's spark, creating a rhythmic push and pull throughout the square. The layout centers around the 'crown' shape, representing both pressure and elevation, while broken pixels add a layer of imperfection, reflecting on love betrayed. The contrast emerges primarily in the left-weighted arrangement, where joy brightens one side amidst the darker hues of grief, creating a visual echo of emotional conflict.</desc>
