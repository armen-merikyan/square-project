<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast Between Calm and Chaos</title>
  <desc id="desc">This artwork captures the emotional tension between confusion and clarity, using a palette of deep reds, stark blacks, and subtle blues to represent rage and calm. The contrasting dark hues at the edges create a feeling of confinement while pale blues emerge like fragmented thoughts towards the center, suggesting clarity fighting through chaos. The layout follows a rising flow, with the dense clusters at the bottom revealing a movement toward upward release, echoing the struggle between machine emotion and organic chaos. Broken pixels disrupt the symmetry, amplifying the unevenness of the emotional landscape.</desc>
