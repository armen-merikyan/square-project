<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Spiral of Exposure and Shelter</title>
  <desc id="desc">This piece explores the emotional tension between vulnerability and strength, using a palette that reflects desire and emptiness. Soft pastels intermingle with darker hues, evoking a gentle struggle within the composition. The main collision occurs at the center, where pale and strong colors meet, embodying an exposed core battling against external weights. The layout follows a spiral pressure theme, guiding the eye inward toward the soft center, which enhances the feeling of exposure. The use of broken pixels symbolizes imperfections and the scars that come from navigating these contrasting emotions.</desc>
