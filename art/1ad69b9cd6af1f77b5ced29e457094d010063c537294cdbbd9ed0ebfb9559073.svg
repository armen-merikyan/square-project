<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory vs Motion</title>
  <desc id="desc">This artwork explores the tension between 'spark' and 'ash', embodying both vitality and remnants. The color palette includes hot coral and blood orange as expressive accents against the muted tones of charcoal and dust pink, representing the dominance of memory (ash) amidst the vitality (spark). The layout is intentionally sparse, with the vibrant checker pattern (spark) interrupting the softer scar texture (ash) to evoke a sense of conflict and resolution. The focal point is located centrally, where colors collide, creating a narrative of resilience (the spark) battling against erasure (the ash), reflective of the emotional duality embedded in the seed text.</desc>
