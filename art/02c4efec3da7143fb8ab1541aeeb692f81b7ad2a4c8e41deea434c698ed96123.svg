<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Flame of Contrast</title>
  <desc id="desc">This pixel composition explores the emotional dichotomy of joy and grief. The palette combines warm yellows and oranges to represent joy, while deep blues suggest grief. The top half utilizes brighter tones to evoke an uplifting sense, contrasting sharply with the cooler, muted blues in the lower half that evoke a sense of sorrow. The use of a checker pattern establishes a rhythm yet feels disrupted with broken pixels, enhancing the theme of chaos versus order. The split layout reflects the emotional turbulence of containing both joy and grief, creating a wave-like movement across the piece, while maintaining enough negative space for emotional reflection.</desc>
