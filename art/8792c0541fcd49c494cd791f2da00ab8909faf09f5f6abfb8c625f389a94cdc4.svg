<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Foundations</title>
  <desc id="desc">This piece represents the emotional tension between vulnerability and strength through contrasting densities and colors. The central area, signified by pale aqua and mist gray, conveys a sense of vulnerability with lighter tones suggesting fragility and clarity. The edges, framed in deeper ink blue and alarm red, suggest the strength that supports or encroaches upon the center. The use of spark and lattice patterns creates a dynamic interaction across the canvas. A key collision occurs at the center, where the calmness of the lighter colors is interrupted by the imposing strength of the darker shades, reflecting the emotional push and pull described in the seed. The arrangement evokes the narrative of a protective boundary that is both stable and precarious, defining the dance of pressure and release within the abstract layout.</desc>
