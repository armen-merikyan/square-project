<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">This artwork embodies the emotional duality of confusion versus clarity through a disrupted symmetrical design. The palette features a dominance of navy and black with accents of dim cyan, enhancing contrasts between obscurity and lucidity. Rows mirror each other closely, yet deliberate broken pixels introduce chaos, symbolizing fragments of clarity. The pattern transitions from structured grids on one side to jagged teeth on the other, evoking a tension reflecting confusion amidst a quest for symmetry, with thick outlines providing grounding. The flow directs the viewer inward, promoting introspection even against the chaos, leading to unresolved feelings of calm and rage intermingled.</desc>
