<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork captures the emotional tension between desire and restraint. The palette of red oxide and blackened plum evokes heat and intensity, while the muted cream and iron gray represent containment and calm. The central collision happens in the middle of the square, where a ripple pattern meets a crosshatch, representing the struggle between overwhelming desire and the impulse to hold back. This interplay creates a rhythmic flow from the corners, illustrating a journey from saturation to muted spaces, mirroring the seed's themes of longing and limitation.</desc>
