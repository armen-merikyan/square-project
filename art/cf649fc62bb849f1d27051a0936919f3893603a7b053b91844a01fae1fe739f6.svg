<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This piece encapsulates the emotional tension between safety and exposure. The selected palette features 'shelter green' and 'warm brown' to convey a sense of warmth and protection, counterbalanced by 'cold white' and 'open blue' representing vulnerability. The main contrast occurs vertically, suggesting a split between dense safety (bottom) and vulnerable exposure (top). Each color placement serves to evoke interactions and interruptions, creating a dynamic dialogue between the two emotional states, where the center reveals the softness weaved through the harder edges.</desc>
