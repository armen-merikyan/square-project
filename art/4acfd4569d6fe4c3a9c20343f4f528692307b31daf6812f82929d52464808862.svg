<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo Pulse</title>
  <desc id="desc">The emotional tone captures the struggle between clean, readable signals and chaotic noise. The palette—comprising the vibrant electric blue and hot magenta against a backdrop of static gray and dead black—creates a visually striking contrast. Darker colors underscore the noise while vibrant hues represent the persistent signal. The collision occurs in the center of the square, where the bright paths of signal green and hot magenta intersect with the heavier static regions. This embodies the essence of the seed, reflecting how memory and noise interplay within a defined threshold.</desc>
