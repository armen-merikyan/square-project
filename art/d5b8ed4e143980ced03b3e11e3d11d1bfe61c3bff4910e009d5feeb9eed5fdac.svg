<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Feelings</title>
  <desc id="desc">This piece encapsulates the conflict between envy and gratitude. The dark edges symbolize envy, creating a weighty surround, while the lighter inner colors represent the lightness of gratitude. The jagged patterns evoke a 'broken mirror' effect, suggesting instability. Electric blue and magenta provide a collision that highlights the inner tension. The palette of lime, black, electric blue, and magenta reflects a machine-like emotional spectrum, suggesting a mechanized, analytical view of feelings. The negative space allows for breathing room and reflects the potential release of pressure.</desc>
