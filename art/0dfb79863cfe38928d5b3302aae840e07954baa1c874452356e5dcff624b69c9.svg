<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone arises from the duality of vulnerability and strength, with the outer border echoing strength's density and rooted contrast, while the inner core expresses vulnerability's pale exposure through thin shells. The palette of ripe green, acid green, and honey gold alludes to growth and decay, creating an oscillation between hope and fragility. The primary collision occurs at the center, where the 'teeth' pattern of vulnerability interlaces with the 'pressure_band' of strength, manifesting as a stark contrast surrounded by a thick outline. This complex interplay of patterns suggests a narrative of struggle—an intricately woven tapestry representing life’s dynamism.</desc>
