<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Suspicion</title>
  <desc id="desc">The emotional tone reflects a struggle between trust and suspicion, where soft warm tones collide with hard dark shades. The palette features a gradient from pink (trust) to dark maroon (suspicion), creating a tension that is visually present in both the maze-like patterns of trust and the barcode of suspicion. The main contrast occurs centrally, where colors clash in an asymmetrical pattern, underscoring the conflict between assurance and doubt. The spiral layout allows for a dynamic flow that conveys both pressure and release, resonating with the seed’s themes of resilience and fragility.</desc>
