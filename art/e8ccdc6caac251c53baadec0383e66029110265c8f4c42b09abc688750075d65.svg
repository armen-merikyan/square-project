<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast in Harmony</title>
  <desc id="desc">This composition balances the soft and warm qualities of powder pink and warm white against the cold, severe tones of carbon black and sharp crimson. The outer border in darker shades creates a strict boundary that encapsulates a lighter inner core, invoking feelings of tension between openness and enclosure. The glitch pattern introduces breaks to represent moments of noise and chaos, while the halo pattern in the center provides a gentle contrast, delivering a sense of calm amidst severity. The collision of warmth and severity emphasizes the emotional dichotomy suggested by the seed: a dance of guilt and forgiveness, pressure and release, all framed by a subtly disruptive chaos.</desc>
