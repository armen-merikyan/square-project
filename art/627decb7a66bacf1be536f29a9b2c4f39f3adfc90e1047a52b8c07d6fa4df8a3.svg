<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">The emotional tone reflects a struggle between panic (represented by dense, chaotic patterns) and control (embodied by more structured, stable arrangements). The chosen palette of navy, black, and dim cyan conveys a sense of loneliness and introspection, while the inclusion of white offers brief moments of clarity against the darker colors. The main contrast emerges from the checker pattern of panic, which intersperses with the framed structure of control, creating a visual narrative of a fractured symmetry. This tension intertwines through both flow and density, generating a sense of orbit and pull. Broken pixels disrupt the overall symmetry, enhancing the feelings of instability and the dichotomy between order and chaos, echoing the complexities of love and betrayal.</desc>
