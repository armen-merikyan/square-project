<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone captures a tension between the stark emptiness and vibrant desire, reflected in the palette of coral and orange against the subdued charcoal and hollow blue. The contrasts collide predominantly in the center, where thick, warm hues abruptly meet the cooler, glitchy edges that symbolize containment. The barcode pattern represents desire, encroaching on the blank areas. Broken pixels introduce intentional disruption, echoing the theme of unresolved longing and boundary.</desc>
