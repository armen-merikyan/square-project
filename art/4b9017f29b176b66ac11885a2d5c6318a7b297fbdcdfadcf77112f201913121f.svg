  <title id="title">Inner Turmoil, Outer Light</title>
  <desc id="desc">In this piece, the emotional tone reflects conflict through a juxtaposition of dark, dense colors symbolizing fear on the left side, contrasted with lighter, hopeful hues on the right. The chosen palette of black, dark violet, soft gold, and pale green evokes themes of pressure and release. Each side explores a distinct pattern: jagged, striped patterns convey a sense of chaos, while a subtle checkered pattern introduces rhythm and calmness. This layout enhances the narrative of collision and release, achieving tension in the center column where dark and light clash.</desc>
