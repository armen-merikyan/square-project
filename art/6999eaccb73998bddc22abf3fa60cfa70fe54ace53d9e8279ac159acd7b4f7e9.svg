<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Pulse</title>
  <desc id="desc">This abstract piece symbolizes the emotional tension between 'longing' and 'resolve'. The palette of signal green, electric blue, dead black, static gray, and hot magenta reflects a balance of energy and calm, depicting a struggle between urgency and serenity. The primary collision occurs in the center, where the barcode-like patterns of resolve interrupt the crack-like patterns of longing, creating a visual story of conflict and hope. The broken pixels scattered throughout serve as intentional reminders of damage and repair, enhancing the thematic complexity, while maintaining a negative space for breath.</desc>
