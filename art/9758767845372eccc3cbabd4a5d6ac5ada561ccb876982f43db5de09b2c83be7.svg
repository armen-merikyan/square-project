<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Tension</title>
  <desc id="desc">This piece captures the emotional dichotomy between defiance and submission through a battle of colors. The dominant navy serves as the unmoved center, representing defiance, against the glitchy, retreating dim cyan and subtly breaking pixels that illustrate submission. The contrast is intentionally heavy, allowing a sense of pressured stillness to emerge at the center, while the edges convey a more chaotic, wide-reaching softness. The chosen palette reflects a lonely signal, where the quiet field dominates yet allows for echoes of activity at the perimeter.</desc>
