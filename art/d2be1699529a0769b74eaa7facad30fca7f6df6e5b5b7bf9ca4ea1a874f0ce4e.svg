<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall</title>
  <desc id="desc">This artwork captures the emotional duality of awe and terror through contrasting colors and patterns. The palette of electric blue and magenta against a stark black foundation evokes a sense of vibrancy yet underlying instability, aligning with the seed's themes. Vertical movement in the color arrangement embodies waves of emotion—one side suggests rising awe, while the other hints at falling terror, framed by a soft edge. The subtle broken pixels introduce imperfection, simulating the fractures of memory and emotion, while maintaining a sense of order amidst chaos. The checker pattern represents stability in awe, contrasting with the split-screen design embodying terror, emphasizing the collision of feelings central to the experience.</desc>
