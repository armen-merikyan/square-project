<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">The composition balances the severity of darkness with the softness of pastel colors, creating a dynamic tension across the canvas. The chosen palette of powder pink, warm white, sharp crimson, steel gray, and carbon black introduces a gentle yet striking contrast, emphasizing the collision between softness and severity. The main intersection occurs at the center where soft rain-like patterns interact with jagged, island-like shapes, allowing quiet spaces to shape emotional weight amidst a controlled chaos. The spiral flow adds a rhythmic quality, guiding the viewer's eye while hinting at an internal struggle between guilt and forgiveness.</desc>
