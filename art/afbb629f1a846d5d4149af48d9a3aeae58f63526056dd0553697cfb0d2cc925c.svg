<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This composition explores the emotional tension between love and betrayal through the use of contrasting colors and patterns. The palette consists of warm hues (pink, red) symbolizing love, juxtaposed with cooler tones (gray, dark maroon) representing betrayal. The 'falling_pixels' layout leads to a sense of chaos descending, with diagonal movement suggesting both ascent ('rising_signal') and descent ('diagonal_fall'). This creates a broken symmetry where the warmth of love is disturbed by fragments, echoing the heart's turmoil. The color placement emphasizes density versus emptiness, with clusters of intense color occasionally interrupted by negative space, reflecting the delicate balance of emotions. The 'spark' pattern of betrayal contrasts against the 'maze' of love, evoking the complex interactions of these feelings.</desc>
