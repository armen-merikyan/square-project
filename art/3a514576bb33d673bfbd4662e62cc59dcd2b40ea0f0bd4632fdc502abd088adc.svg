  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This artwork explores the emotional tension between safety and exposure, utilizing a cooler palette to symbolize the vulnerability of exposure and a warmer palette to represent the comfort of safety. The contrast is manifested through the vertical stripes of cold blue and pale skin tones, suggesting an interrupted flow and tension between being uncovered and enclosed. This collision happens primarily along the central axis, creating a visual echo of pressure and release, which reflects the duality of the concepts in the seed.</desc>
