<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This composition explores the emotional duality of trust and suspicion using contrasting colors and patterns. The palette of lime, black, electric blue, and magenta signifies energy and tension, while the layout flows diagonally from a corner, reflecting the tension spread throughout the piece. The spark-like pattern of suspicion collides with the softer broken dots of trust, creating a dynamic visual force. The application of broken pixels introduces imperfection, suggesting emotional complexity and the unresolved nature of feelings.</desc>
