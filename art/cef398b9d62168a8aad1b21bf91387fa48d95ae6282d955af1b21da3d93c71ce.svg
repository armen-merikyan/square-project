<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Balance</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of defiance and submission through contrasting colors and patterns. The palette, 'mourning renewal', features deep blue for depth and mourning black as a grounding force against the more lively pale yellow representing fragility, symbolizing the push-pull interaction between strength and yielding. The subtle arrangement of lattice and spark patterns represents chaos versus order; the center is more vibrant, suggesting a statement of defiance, while the edges dissolve, depicting submission. The broken frame layout adds tension with intentional gaps that allow emotion to leak through, creating a dynamic visual flow.</desc>
