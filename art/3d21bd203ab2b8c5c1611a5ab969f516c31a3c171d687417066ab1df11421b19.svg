<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroding Aspirations</title>
  <desc id="desc">This piece explores the emotional tension between desire, represented by hot coral and blood orange, and restraint, embodied by charcoal and hollow blue. The palette contrasts warmth and coolness culminating in an evolving pattern. The primary collision of these emotions occurs near the center with saturated colors bursting outward, while muted tones contain them at the edges, creating a visual tension that resonates with both longing and containment. The spiral pressure theme is reflected in the layout, with flowing channels that subtly navigate the grid.</desc>
