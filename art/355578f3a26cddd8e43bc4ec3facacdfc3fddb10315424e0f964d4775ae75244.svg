<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Echo</title>
  <desc id="desc">This artwork captures the juxtaposition of joy and grief through a color palette that evokes warmth and depth. The tones transition from yellow and orange, symbolizing joy, to deep blues and muted purples representing grief. The left side of the composition is weighted with warmer colors in a structured pattern, while the right side introduces broken pixels that disrupt the symmetry, suggesting the chaos of grief. This contrast creates a visual pulse, embodying the emotional collision indicated by the seed. The background remains spacious, emphasizing the tension between clustered and empty areas, enhancing the narrative of love and betrayal.</desc>
