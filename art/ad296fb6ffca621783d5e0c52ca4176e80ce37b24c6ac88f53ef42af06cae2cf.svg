<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">The emotional tone explores the tension between vulnerability and strength, reflecting a delicate interplay of colors. The palette represents awe and terror, balancing the weight of deep teal and cosmic indigo against the clarity of star white and cold gold. This contrast creates a visual echo—a collision where strength meets vulnerability in the central area, mimicking a broken mirror's reflection. The layout’s eroded symmetry and outward spiral flow contribute to a sense of chaos and serenity, while the pattern types, 'shatter' and 'ash_field,' represent moments of interruption and quiet space. Broken pixels, as intentional disruptions, enhance the feeling of vulnerability amidst strength, making the central composition feel attacked yet resilient.</desc>
