<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Unresolved Tension</title>
  <desc id="desc">This composition explores the duality of emptiness and desire. The palette combines deep blacks and electric tones to create a sense of yearning against a backdrop of cold absence. The top rows, representing desire, are infused with spots of magenta and electric blue, suggesting vibrant aspirations that disrupt the space. The lower rows embody emptiness through layers of cooler tones and negative space, which impart a stark contrast and impression of solitude. The jagged edges evoke a sense of fragmentation, depicting the heart's longing amidst vast emptiness, while the broken pixels disrupt the harmony, exemplifying imperfection. The overall flow is from top to bottom, drawing the eye through the emotional conflict inherent in the piece.</desc>
