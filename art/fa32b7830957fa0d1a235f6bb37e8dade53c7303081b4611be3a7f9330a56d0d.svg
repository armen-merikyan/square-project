<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Distortion</title>
  <desc id="desc">The emotional tone reflects a dynamic struggle between clarity and chaos, embodying the tension of a readable pulse fighting a backdrop of distortion. The selected palette encompasses the stark contrast between the hopeful signal green and vibrant electric blue against the muted static gray and dead black, suggesting an interplay of vibrancy and overwhelming noise. The main collision occurs in the top left corner, where the signal colors dominate amidst scattered static gray, creating a sense of pressure and disruption, while echoing the seed's theme of broken connections and jagged edges. The radial noise pattern disrupts the more structured stair pattern of the signal, illustrating the battle between order and chaos.</desc>
