<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Affection</title>
  <desc id="desc">The emotional tone of this piece explores the tension between love and betrayal. Utilizing a palette of warm pinks and reds contrasting with deep grays and dark maroon symbolizes the warmth of love in collision with the coldness of betrayal. The main contrast appears in the diagonals and intermittent shapes, representing symmetry disrupted by broken patterns. The piece evokes feelings of complexity where warmth meets sharp edges, creating a conversation around fractured relationships. The arrangement embodies the idea of mirroring with intentional imperfections, allowing for a dynamic interplay of pressure and release within the composition, reflecting the push-pull dynamics of affection and trust.</desc>
