<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This composition reflects the interplay of joy and grief, using a split-screen approach to symbolize the tension between order and chaos. The palette—bright yellows and oranges for joy, contrasted with deep blues and muted purples for grief—creates a strong visual dialectic. The hard edges emphasize the starkness of these emotions, while the zigzag flow adds rhythm and movement, echoing the ups and downs of emotional experience. The layout fosters a feeling of confinement, protective yet threatening, mirroring a tug-of-war within the self.</desc>
