<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The artwork explores the emotional tension between defiance and submission. The palette 'ancient_fire' of burnt orange, dark red, charcoal, and gold emphasizes warmth and intensity, portraying defiance through vibrant colors while submission is represented by softer, muddier shades of the same. The collision is centered, with defiant orange and red confronting charcoal and gold patterns, suggesting a protective center surrounded by encroaching noise. The patterns, a constellation for defiance and pulse marks for submission, create a rhythmic flow leading the eye through the work. Negative space and broken pixels introduce deliberate imperfections and a sense of vulnerability, enhancing the emotional narrative between static resilience and dynamic erosion.</desc>
