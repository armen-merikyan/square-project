<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Heart Fragments</title>
  <desc id="desc">This composition represents the emotional contrast of love and betrayal through a palette of warm reds and pinks contrasting with deeper maroon and gray shades. The top half embodies love with soft, interwoven crosshatched patterns while the bottom evokes betrayal with sharper, aggressive stripes and scattered pixels suggesting fragmentation. The central tension comes from this visual clash—suggesting a split in one's emotions, intertwined yet at odds, resonating with the seed's theme of a broken heart. The use of negative space adds weight, enhancing the feeling of emptiness and unresolved conflicts.</desc>
