<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Contrasts</title>
  <desc id="desc">This composition explores the tension between desire and restraint through a saturated yet muted palette. The top four rows, dominated by warm reds and oranges, embody desire with stripes that create a rhythmic pulse. In contrast, the lower rows feature muted tones of cream and gray, employing a target pattern that contains the warmth above, indicating restraint. Broken pixels create intentional imperfection, adding depth to the emotional exchange. The primary collision occurs at the boundary where warm and cool colors meet, representing the struggle of hope against limitation.</desc>
