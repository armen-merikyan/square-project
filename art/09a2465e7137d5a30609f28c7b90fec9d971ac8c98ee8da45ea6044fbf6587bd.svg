<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threads of Contrast</title>
  <desc id="desc">This artwork evokes the emotional tension between longing and resolve, captured through distinct patterns and color choices. The palette of soft powder pink and warm white contrasts against deep carbon black and steel gray, embodying the essence of warmth against severity. The placement of deep colors occupies the left corner, radiating outwards in diagonal strokes, suggesting a strong presence of longing. Meanwhile, sharper crimson accents sporadically interrupt the flow, representing resolve and determination. The broken pixel elements strategically disrupt the symmetry, embodying the theme of damage vs. repair. Overall, the composition invites contemplation on the space between yearning and resolution.</desc>
