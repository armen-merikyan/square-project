<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resonance</title>
  <desc id="desc">This composition highlights the tension between 'spark' and 'ash' through a careful choice of colors and their arrangement. The palette features mourning black and deep blue to evoke introspection and restrained emotions, while pale yellow introduces moments of brightness and hope. The predominant dark tones fill 70% of the piece, with sharp, jagged edges representing the memory and erasure motif—drawing attention to the center where contrasts converge. Interrupted bands of color suggest collision and conversation between opposing forces, creating a dynamic rhythm throughout the grid.</desc>
