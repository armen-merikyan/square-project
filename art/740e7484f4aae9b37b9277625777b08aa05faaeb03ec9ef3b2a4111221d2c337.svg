<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Unveiled</title>
  <desc id="desc">The emotional tone is derived from the juxtaposition of tenderness and rage, manifesting as a stark contrast. A palette of deep reds and blacks anchors the intense emotional weight, while soft pale blues and whites introduce a quiet softness. The outer border shrouded in darkness creates a menacing presence, while the lighter inner square offers a glimpse of calm. The pattern dynamics—static chaos of rage clashing with gentle stripes of tenderness—create visual tension, with the main collision occurring towards the center, representing the heart of emotional conflict. The deliberate placement of broken pixels enhances the imperfection, echoing the stains of guilt and forgiveness, and punctuating moments of quiet amidst the turmoil.</desc>
