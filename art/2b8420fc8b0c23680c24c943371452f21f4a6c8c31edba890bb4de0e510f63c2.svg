<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This artwork embodies the emotional tension between awe and terror. The palette, inspired by 'ancient_fire', combines burnt orange, dark red, and charcoal to evoke a primal contrast between warmth and darkness. The outer border, in depth-yielding dark tones, represents terror, while the central area expresses awe through warmer and lighter shades in a maze-like pattern. The placement of broken pixels introduces imperfections and unpredictability, highlighting the instability woven into experiences of contradiction. Layering and edge styles create rhythmic flows that suggest movement and interruption, mirroring the unresolved nature of emotions within the piece.</desc>
