<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tension</title>
  <desc id="desc">The emotional tone explores the conflict between control and surrender, using a palette that evokes mourning and renewal. Deep blue and mourning black establish depth and pressure, while pale yellow represents the faint hope of release. The hard edges create a sense of constriction, contrasting with softer, drippy patterns that suggest yielding and overflow. The main collision occurs at the center of the grid, where linear dark patterns (control) encounter vibrant bright marks (surrender), symbolizing the tension between holding tightly and the urge to let go. This square embodies the complexity of human emotion—finding balance in chaos.</desc>
