<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Pulses</title>
  <desc id="desc">This composition embodies the emotional juxtaposition of longing and resolve through a clash of warm and cool colors. The palette blends vivid shades of hot coral and blood orange symbolizing urgency and desire, contrasted with serene hollow blue and charcoal representing calmness and depth. The collision occurs centrally, where the two patterns—a flame representing longing and a maze symbolizing resolve—intertwine, suggesting an emotional push and pull within a defined structure. The broken pixels accentuate the imperfections inherent in these emotional states, while the negative space allows for the sense of distance and quiet that accompanies longing.</desc>
