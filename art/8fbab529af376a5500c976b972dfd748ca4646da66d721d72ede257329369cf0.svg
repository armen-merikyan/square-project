<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This piece embodies the emotional dichotomy of restlessness and peace through contrasting colors and chaotic patterns. The palette consists of vibrant hues such as electric blue and magenta against deep black, invoking a sense of urgency versus calm serenity. The static pattern represents restlessness, while the crack pattern alludes to peace, marking a visual collision in the center where both emotions meet. The layout emphasizes a cross-current dynamic, contrasting horizontal and vertical movement, which highlights the tension. Broken pixels serve as intentional disruptions, reflecting the inconsistency of emotions. Negative space contributes to the sense of restraint, achieving balance across the composition.</desc>
