<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Shelter</title>
  <desc id="desc">The emotional tone directly explores the tension between safety and exposure. The selected palette reflects this: vibrant greens and browns embody safety, while soft whites and blues suggest exposure. The left columns, dominated by the green and brown checker pattern, represent gentle weight and a stable frame, merging softly into the right columns that embody exposed edges and open air, marked by the scar-like interruptions of pale and cold tones. The main contrast occurs through the abrupt color changes at the vertical divide, suggesting a dynamic tension between heavy and thin sensations, reminiscent of the boundaries of a vessel disrupted by ripples of color.</desc>
