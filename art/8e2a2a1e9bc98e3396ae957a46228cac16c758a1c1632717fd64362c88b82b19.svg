<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone combines strength and vulnerability, creating a dynamic tension. The duel between dense, dark tones and pale, soft hues illustrates the fragility of the exposed center against the weight of surrounding pressures. The chosen palette of pale mint and storm gray represents both relief and dread, embodying the contrast of safety versus exposure. The main collision occurs at the center, where strong dark tones break into lighter areas, suggesting a delicately eroded symmetry that draws the eye inward while retaining negative space, communicating a sense of unresolved tension.</desc>
