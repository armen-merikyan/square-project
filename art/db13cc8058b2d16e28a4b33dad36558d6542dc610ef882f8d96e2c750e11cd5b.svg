<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in the Fracture</title>
  <desc id="desc">This abstract piece explores the duality of confusion and clarity through contrasting colors and patterns. The chosen palette of black, dark violet, soft gold, and pale green evokes a sense of fear and hope, representing clarity amidst the chaos. The main collision occurs in the center where dark hues clash with lighter tones, symbolizing the struggle between confusion and understanding. The flowing pattern radiates outward, while careful placement of 'broken pixels' introduces intentional imperfections, enhancing the emotional complexity of the piece. The layout reflects a diagonal tension, where clarity tries to invade but is interrupted by chaotic areas, embodying a 'half-square' concept of form.</desc>
