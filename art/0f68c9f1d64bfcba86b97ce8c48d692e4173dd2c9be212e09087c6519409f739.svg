<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone is a dynamic interplay of vulnerability and strength, symbolizing a fragile core shielded by resilient edges. The palette, inspired by 'joy_grief', blends warm yellows and oranges with deep blues and muted purples, reflecting tension between light and shadow. The main contrast lies in the center where light hues collide with heavier, darker tones, embodying exposure and shelter. This abstract arrangement conveys a dialogue of protection versus exposure, as the broken pixels disrupt the expected patterns, symbolizing imperfection in the balance of strength.</desc>
