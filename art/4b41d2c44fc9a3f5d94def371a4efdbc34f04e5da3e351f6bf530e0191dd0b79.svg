<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Near vs Far</title>
  <desc id="desc">This composition conveys an emotional tension between longing and resolve, using contrasting patterns and colors to symbolize the struggle between these feelings. The left side, representing longing, features a grid pattern in soft, muted greens and warm honey gold, suggesting a search or reach for connection. In contrast, the right side, embodying resolve, employs a channel pattern with deeper olive and cream dynamics, offering a sense of structure and stability. The collision occurs along the central divide, where colors intermingle, creating a feeling of tension and complexity, reflecting the emotional journey captured by the seed.</desc>
