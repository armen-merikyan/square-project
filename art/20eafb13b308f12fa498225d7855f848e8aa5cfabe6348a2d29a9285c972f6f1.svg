  <title id="title">Duality of Emotion</title>
  <desc id="desc">This piece captures the emotional tension between longing and resolve through a blend of warm and cool tones. The color palette balances the distant warmth of yellow/orange with the deep, muted blues and purples, creating collisions of feeling. The pattern reflects a diagonal flow, with dense clusters emerging from thin lines, representing the tension between intimacy and distance. Broken pixels introduce intended disruptions that signify unresolved emotional states and echoes of memory, emphasizing the contrast between structured resolve and chaotic longing.</desc>
