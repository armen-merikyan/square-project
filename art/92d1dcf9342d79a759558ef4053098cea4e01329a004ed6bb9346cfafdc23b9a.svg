<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This composition navigates the emotional tension between restlessness and peace. The palette reflects muted cream for calmness, contrasted with dark shades of blackened plum and iron gray, representing pressure and chaos. The dense clustering of colors on the left implies a buildup of restlessness while flowing into a lighter area signifying peace on the right. The center is where the main collision occurs, framed by negative space that allows breathing room for the viewer. It captures movement through the glitch pattern, which disturbs the more tranquil negative cross form, embodying memory vs motion.</desc>
