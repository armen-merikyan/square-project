<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone embodies the tension between unfulfilled desire and the starkness of emptiness. The selected palette combines warm, saturated colors (hot coral, blood orange) to symbolize desire against cooler, muted shades (charcoal, hollow blue) punctuating the empty space, representing restraint. The main collision occurs in the center where vibrant colors intersperse with fragmented fields of low saturation, suggesting a pull that meets a barrier. This composition aims to visually narrate the struggle and the contrasts of yearning versus containment.</desc>
