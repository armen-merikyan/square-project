<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This composition encapsulates the complex emotions of joy and grief, using a split layout to express the contrasting feelings. The upper rows, representing joy, utilize bright yellows and oranges, promoting an open, rounded feeling with a dotted pattern that suggests movement and bliss. In contrast, the lower rows depict grief with deeper blues and muted purples, arranged in a grid pattern, which reflects heaviness and order, creating a stark collision with the vibrant upper rows. The color collision between vibrant yellows and deep blues evokes a dialogue between celebration and sorrow, as if joy is gently piercing through the weighty veil of grief. This duality, mixed with a slight breakdown of pixels, adds an element of imperfection and realism to the abstract narrative.</desc>
