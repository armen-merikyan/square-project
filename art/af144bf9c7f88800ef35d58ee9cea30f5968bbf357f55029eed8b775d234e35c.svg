<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotions</title>
  <desc id="desc">This artwork embodies the tension between 'tenderness' and 'rage', represented visually by color contrasts and spatial dynamics. The chosen palette—dominated by deep reds and blacks—infuses a sense of intensity, while pale blues and whites introduce moments of calm. The arrangement features dense clusters of dark hues on one side (representing rage) and more relaxed, muted tones on the opposite side (symbolizing tenderness). A spiral layout concentrates these feelings toward an off-center point, enhancing the drama of collision, where reds and blacks awkwardly interrupt softer blues, reflecting emotional conflicts. Broken pixels add imperfection, suggesting scars of past struggles, reinforcing the emotional depth of the piece.</desc>
