<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetrical Disruption</title>
  <desc id="desc">This piece explores the tension between joy and grief through a split vertical layout, creating a stark contrast. The left side, embodying joy, uses a 'noise' pattern with warm yellows and oranges, representing openness and vibrant energy. The right side, reflecting grief, employs a 'radial' pattern with deeper blues and muted purples, conveying sadness and fragility. The hard edges enhance the feeling of disruption, emphasizing the clash of these emotions, while the strategic placement of broken pixels introduces imperfection, echoing real emotional experiences. The negative space suggests moments of reflection amidst emotional turbulence, allowing the viewer to feel the rhythm of both joy and grief side by side.</desc>
