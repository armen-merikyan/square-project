<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Unseen Forces</title>
  <desc id="desc">This composition captures the emotional struggle between love and betrayal through a stark contrast of colors and patterns. The warm pink and red tones invoke affection, while the gray and dark maroon are reminiscent of pain and conflict. A crosshatching pattern representing love clashes against a grid symbolizing betrayal, creating a rich tension across the square. The edges exhibit a burned quality, suggesting decay or damage in what once was whole, allowing for both soft and sharp contrasts in visual language. This arrangement embodies the interplay of inner and outer conflicts, making it a reflective piece on human emotion.</desc>
