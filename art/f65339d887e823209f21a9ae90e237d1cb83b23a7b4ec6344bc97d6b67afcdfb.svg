<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">This artwork captures the emotional tension of softness and severity through a harmonious palette that transitions from a warm, feathered touch to sharp, defined edges. The lighter tones represent softness, spilling into darker, more severe regions, creating a visual weight that pulls the eye upward, mirroring the rising signal theme. The collision of the smooth transitions and rigid pressure bands generates a pulse effect that suggests movement and dynamism, reflecting the interplay of guilt and forgiveness, a space where emotions overlap yet remain distinct.</desc>
