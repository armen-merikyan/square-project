<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Opposites</title>
  <desc id="desc">This composition captures the emotional tension between defiance and submission. The palette uses dark violet to symbolize the weight of defiance contrasted with soft gold representing the subtlety of submission. The dense cluster of darker colors in the center suggests a strong presence, while the lighter edges symbolize retreat and openness. The sharp corners of the arrangement create a visual clash that echoes the seed's themes of conflict and resolution.</desc>
