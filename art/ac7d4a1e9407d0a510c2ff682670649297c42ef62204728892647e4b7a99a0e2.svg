<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Intersection</title>
  <desc id="desc">This composition captures the emotional duality of vulnerability vs strength through a palette that balances warmth and coolness. A soft, warm brown radiates from the center, symbolizing vulnerability, while a deep shelter green frames the edges, representing strength. The interplay of interrupted radial patterns and a threshold sensibility creates a central collision, where the warm brown meets the cooler tones of pale skin and cold white, echoing the tension between exposure and protection. Broken pixels are scattered throughout, adding intentional imperfections, enhancing the sense of fragility within strength, while maintaining significant negative space to evoke contemplation and a gentle ebb of balance.</desc>
