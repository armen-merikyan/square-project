<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition embodies the emotional struggle between rage and calm through an interplay of warm and cool colors. The palette combines deep reds to express anger with softer blues for tranquility. The main collision occurs in the center, where jagged, chaotic red tones intersect with a more structured blue checker pattern, symbolizing the tension of emotions. Broken pixels introduce imperfections reminiscent of emotional scars, while the layout adhering to a broken frame creates a sense of movement, allowing feelings to escape. This piece captures a dynamic narrative of internal conflict and momentary harmony.</desc>
