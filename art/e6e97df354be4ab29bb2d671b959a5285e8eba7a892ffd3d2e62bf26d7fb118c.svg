<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition explores the emotional tension between vulnerability and strength. The chosen palette invokes serenity with pale aqua and mist gray, while the alarm red introduces urgency, symbolizing the thin line between exposure and safety. The layout features a deliberately sparse design with an emphasis on an exposed center, contrasting the dense, pulsating patterns that signify strength. Broken pixels create intentional disruptions that enhance the feeling of vulnerability. The central collision point, where strong marks interfere with delicate dots, illustrates the push and pull of emotional dynamics. Overall, this abstract piece embodies a dialogue between vulnerability and protection while maintaining a strong rhythmic flow, resonating with the seed's themes of pressure and interaction.</desc>
