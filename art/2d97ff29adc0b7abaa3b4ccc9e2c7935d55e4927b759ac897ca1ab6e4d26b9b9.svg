<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Defiance</title>
  <desc id="desc">This composition contrasts the themes of defiance and submission through a tension-filled arrangement of colors. The somber palette of deep blue and mourning black represents the weight of submission and the encasing emptiness, while the pale yellow and new leaf colors evoke moments of defiance and bright refusal that pierce through the darkness. The central collision of dense clusters hints at an inward spiral, representing an attack on the protected center, which is disrupted by the surrounding noise of the muted tones, creating a visual representation of the emotional conflict implied by the seed.</desc>
