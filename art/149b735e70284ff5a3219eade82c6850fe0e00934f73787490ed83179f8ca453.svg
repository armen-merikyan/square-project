  <title id="title">Symmetry in Disarray</title>
  <desc id="desc">This artwork captures the tension between trust and suspicion through contrasting color placements. The palette reflects warmth and depth with bright yellows and muted purples, suggesting warmth amidst underlying doubts. Main contrasts collide diagonally, creating a pressure border between the nurturing yellow and the dark purple, embodying the emotional split from one side to the other. This representation of resilience and fragility evokes a story of stability that is at risk of collapse.</desc>
