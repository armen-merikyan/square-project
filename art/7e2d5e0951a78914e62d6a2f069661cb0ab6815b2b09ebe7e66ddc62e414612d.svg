<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Against Restraint</title>
  <desc id="desc">This composition translates the emotions of desire and emptiness into a rich dialogue. The palette of vibrant warm colors (hot coral, blood orange) juxtaposed against cooler muted shades (charcoal, hollow blue) creates a tension that embodies the struggle between longing and limitation. The central cluster of saturated colors represents desire, while the broader spaces of low saturation reflect emptiness. The edges are intentionally 'burned' to signify the boundaries that desire cannot breach, with breaks (broken pixels) that interrupt the pattern, suggesting the frustration of containment. The layout features two small centers that pulse across the canvas, merging and contrasting to enhance their emotional discourse.</desc>
