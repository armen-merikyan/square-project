<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Ambivalence</title>
  <desc id="desc">This piece navigates the emotional terrain between longing and resolve, portraying tension through contrasting colors and patterns. The palette of sepia, tan, dust gray, and faded blue reflects a sense of nostalgia and unreality, embodying memories that both haunt and uplift. In the composition, the left side, dominated by longing (using scar patterns), is painted in muted tones that evoke distance and a sense of gap, while the right side portrays resolve with embers of brighter colors, suggesting strength and determination. The collision occurs at the border, where dense color layers intermingle and disrupt one another, manifesting the push and pull of these opposing emotions, with intentional broken pixels throughout representing the scars of unresolved feelings.</desc>
