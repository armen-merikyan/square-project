<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">The emotional tone captures the struggle between defiance and submission, using colors to embody tension and calm. The palette of 'quiet_pressure' features muted tones like off white and dust gray to create a calm environment against deeper contrasting colors such as compressed red and dark navy which symbolize the pulses of defiance. The main collision occurs in the center, where patterns of checker (defiance) interact with a constellation layout (submission), creating visual tension echoing the 'quiet channel' theme with a fragmented flow that embraces both interruption and balance. Broken pixels scattered throughout symbolize flaws and imperfections in the conflict, reinforcing the theme without literal depiction.</desc>
