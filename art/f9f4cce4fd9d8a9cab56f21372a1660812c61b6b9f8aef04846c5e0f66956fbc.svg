<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebullient Conflict</title>
  <desc id="desc">This piece encapsulates the emotional tension between rage and calm through jagged and smooth elements. The palette of red, pale blue, black, and white conveys a stark contrast between the explosive, hot nature of rage and the cool, soothing presence of calm. The warm red occupies the center, bursting outwards, while the calming blues create horizontal layers around it, interrupted by sporadic black marks symbolizing both noise and containment. This organization resonates with the idea of 'contained vs overflowing,' illuminating the struggle inherent in these emotions.</desc>
