<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symphony of Tension</title>
  <desc id="desc">This piece captures the tension between restlessness and peace through a play of color and pattern. The palette consists of warm rose clay and cool distant lilac, representing emotional warmth and quiet introspection, respectively. The left half features stuttered rain-like patterns in darker shades, symbolizing movement and unrest, while the right half offers smooth ripple patterns in lighter tones for calmness. The main contrast occurs along a diagonal, suggesting a conversation between two emotions. Broken pixels intermittently disrupt the flow, emphasizing the chaos in peace. The overall composition evokes a feeling of unresolved motion where left and right coexist yet struggle for dominance.</desc>
