<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Forces</title>
  <desc id="desc">This artwork explores the emotional dichotomy of desire and restraint through a palette that combines saturated reds with muted grays. The warm hues of red oxide and small orange represent the pull of desire, while the cooler tones of blackened plum and iron gray embody restraint. The diagonal 'stairs' indicate a dynamic push towards fulfillment, while the 'crack' patterns interrupt, suggesting limitations. The main collision occurs in the center, where bright colors break through a structured gray background, depicting the tension and struggle between wanting and holding back.</desc>
