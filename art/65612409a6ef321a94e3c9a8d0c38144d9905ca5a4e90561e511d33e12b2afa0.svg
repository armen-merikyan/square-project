<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Wholeness and Fracture</title>
  <desc id="desc">This artwork reflects the emotional contrasts of longing and resolve through a palette of muted and vibrant colors. The gentle hues of rose clay and distant lilac represent longing, whereas the sharp accents of lamp gold mirror resolve. The composition features a central collision of rich color noise and structured gradients, evoking a rising tension. Broken pixels fragment this narrative, symbolizing disruption and the quest for repair within a backdrop of serenity hinted by negative space. The falling pixel layout brings a sense of rhythm to the piece, enhancing the emotional dialogue between strength and fragility.</desc>
