<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Amidst Static</title>
  <desc id="desc">This composition captures the emotional tension between clarity and chaos. The dark tones (#000000, #444444) represent the noise—disruptive, static-like, and oppressive—while the vibrant accents (#00FF00, #FF00FF) symbolize the signal—bright, fleeting, and alive. Central to the piece is a collision of colors suggesting a readable rhythm trying to break free from the surrounding noise, embodying the seed's theme of tension between exposure and shelter. The deliberate placement of broken pixels adds intentional imperfections, enhancing the sensation of interference and echo. This layout conveys the struggle for clarity against a backdrop of chaotic signals.</desc>
