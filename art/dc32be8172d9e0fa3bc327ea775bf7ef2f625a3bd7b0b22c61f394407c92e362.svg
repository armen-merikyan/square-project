  <title id="title">Contrast of Tension</title>
  <desc id="desc">This piece embodies the emotional conflict between envy and gratitude, using a muted palette that evokes both nostalgia and weight. The broken edges symbolize the cracks in self-perception and the ongoing battle between lightness and heaviness. The center is dense with dark colors, illustrating envy, while the lighter hues at the edges suggest gratitude creating a spiral flow that draws the eye outward, emphasizing the tension between the feelings.</desc>
