  <title id="title">Tension of the Heart</title>
  <desc id="desc">The emotional tone captures the clash of love's warmth and betrayal's coolness. The palette blends warm hues of pink and red, evoking love, with dark maroon and gray representing betrayal. The interplay between stripe patterns (symbolizing love) and crosshatch (symbolizing betrayal) creates a tension-filled surface. Main collisions occur at the center and edges, where light and shadow contrast, presenting an unresolved emotional narrative that reflects both yearning and fracture.</desc>
