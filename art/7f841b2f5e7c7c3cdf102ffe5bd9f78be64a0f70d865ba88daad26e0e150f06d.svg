<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold Echo</title>
  <desc id="desc">This artwork captures the tension between defiance and submission through a stark palette of sepia, tan, dust gray, and faded blue. The outer border exhibits calm, muted colors, embodying the quality of submission—a quiet, enclosed space that recedes. In contrast, the central area pulses with more vivid variations and irregular broken pixels, showcasing defiance through angular, fractured patterns that interrupt the calm. The dynamic diagonal rise from one corner to the opposite creates a sense of motion and pressure while maintaining ample negative space, ensuring that the interpretation remains abstract and emotive.</desc>
