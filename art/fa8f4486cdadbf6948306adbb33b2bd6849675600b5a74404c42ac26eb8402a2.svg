<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork embodies the tension between vulnerability and strength, manifesting through a palette that juxtaposes the warmth of soft golds against cooler shades of gray and deep wine. The outer border, composed of strong, deep colors, represents strength, containing a pale, vulnerable core that suggests an exposed fragility. The use of broken pixels throughout introduces intentional imperfections, echoing vulnerability. The center's lighter shades create a contrast with the dark edges, visually forming a shell around the core. The emotional collision predominantly happens at the border where stark contrasts are most evident.</desc>
