<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Tension</title>
  <desc id="desc">This abstract composition evokes the emotional duel between defiance and submission. The selected palette of yellow (defiance), orange (warm pressure), deep blue (cool retreat), and muted purple (soft encasing) creates a striking contrast between vibrant, assertive shapes and softer, receding tones. The main collision occurs at the center spiral which symbolizes both resistance and acceptance, while punctuated broken pixels serve as disruptions that amplify the visual tension and narrative. The layout follows a spiral pressure pattern, suggesting a movement inward, creating an echo of conflict that manifests in the arrangement of warmer tones pushing against cooler fields, invoking a sense of both struggle and synthesis.</desc>
