<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Dissonance</title>
  <desc id="desc">This composition explores the tension between clarity and chaos, representing 'signal' as punctuated vibrant colors contrasting with 'noise' embodied by static and darker hues. The palette features signal green and electric blue as accents amidst dead black and static gray, illustrating the conflict of distinct signals lost in a murky background. The main collision occurs in the center, where the clearer 'signal' colors intermittently breach darker 'noise' bands, creating a pulsating rhythmic flow that evokes a struggle for coherence amidst interference. The asymmetry and imbalanced color distribution reinforce the emotional narrative of overcoming chaos with clarity.</desc>
