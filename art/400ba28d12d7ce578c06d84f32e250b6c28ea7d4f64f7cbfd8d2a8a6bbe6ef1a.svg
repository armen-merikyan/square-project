<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Stillness and Motion</title>
  <desc id="desc">This artwork captures the emotional juxtaposition of restlessness and peace. The main palette consists of signal green and electric blue as vibrant accents, contrasting with the deep dead black and static gray to evoke a sense of calm amidst chaos. The clashing patterns of braid (representing peace) and patchwork (representing restlessness) collide in the center, symbolizing the struggle between serene balance and unsettling movement. As the viewer's eye travels through the arrangement, the patterns interrupt each other, creating tension while maintaining an element of quiet negative space around them, inviting contemplation.</desc>
