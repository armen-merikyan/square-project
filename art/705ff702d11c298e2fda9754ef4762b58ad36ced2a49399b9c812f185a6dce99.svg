<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast in Motion</title>
  <desc id="desc">This artwork delves into the emotional tension between nostalgia and progress. The palette of black, electric blue, and magenta echoes a mechanical emotion while imbalance is depicted through a split horizontal layout. Nostalgia manifests with a subtle checker pattern represented by blacks and dark blues, suggesting depth and introspection. In contrast, progress is symbolized by vibrant magentas and electric blues, embodying forward movement and tension. The placement of colors creates a push-pull dynamic, particularly in the center which acts both as a conflict zone and a focal point. The interaction between the structured grid and a bottom-weighted effect produces a sense of instability, emphasizing the differences between the calm of nostalgia and the chaos of progress.</desc>
