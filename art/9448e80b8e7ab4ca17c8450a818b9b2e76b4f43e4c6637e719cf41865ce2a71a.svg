<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork embodies the complex interplay between desire and restraint, utilizing a palette that juxtaposes saturated and muted tones to reflect emotional tension. The warm corals and oranges illustrate the pull of desire, while the charcoal and hollow blue give a sense of limitation. The central area features warmer, ladder-like patterns representing desire, contrasted by static structures of restraint that adhere to the edges. The broken pixels symbolize disruptions in the narrative, echoing betrayal and unresolved feelings, creating a dynamic yet contained composition that invites contemplation.</desc>
