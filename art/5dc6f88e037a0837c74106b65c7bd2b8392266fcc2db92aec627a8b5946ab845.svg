<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in the Balance</title>
  <desc id="desc">The emotional tone captures the pull between longing and resolve. The palette of red oxide, blackened plum, muted cream, iron gray, and small orange evokes a sense of hunger and restraint. The layout emphasizes a corner filled with dense textures and overlapping patterns, which creates a pronounced collision. Longing is expressed through chaotic negative cross patterns, while resolve manifests as steady stripes, meeting at the center where they collide, symbolizing the push and pull of emotion. The placement of muted colors surrounding bright accents represents the distance between intimacy and distance, allowing for a vast yet complex space.</desc>
