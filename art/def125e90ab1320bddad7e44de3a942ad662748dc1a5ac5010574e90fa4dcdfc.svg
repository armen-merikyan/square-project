<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry and Chaos</title>
  <desc id="desc">This artwork captures the emotional tension between confusion and clarity. The chaotic outer borders in burnt orange and dark red represent confusion, using a ring pattern that disrupts perceived symmetry. The inner core, in shades of gold and charcoal, fosters clarity through a rain-like gradient that brings order. The edges are thick to suggest a strong boundary while remaining imperfect with broken pixels, emphasizing interruption within structure. Overall, the piece reflects a struggle between harmony and disarray.</desc>
