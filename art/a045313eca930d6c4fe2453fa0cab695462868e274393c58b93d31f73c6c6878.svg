<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">This artwork represents the emotional dichotomy of defiance and submission through a balance of stark contrasts and textured patterns. The palette chosen—black, red, pale blue, and white—captures the intensity of conflict and calmness. Black and red create a heavy, threatening weight, while pale blue and white introduce moments of respite and clarity. The arrangement is asymmetrical, with darker colors at the edges around a cluster of lighter tones in the center, reflecting the struggle between the edges of control and the core of vulnerability. The interplay of noise from the edges colliding with softer internal components expresses the tension and conflict suggested by the seed.</desc>
