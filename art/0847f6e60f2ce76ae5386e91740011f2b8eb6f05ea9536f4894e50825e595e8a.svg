<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Signals</title>
  <desc id="desc">The emotional tone reflects a contrast between signal clarity and the chaos of noise. The palette, dominated by deep navy and muted blacks with accents of dim cyan and pure white, underscores the struggle between the readable pulse (signal) and the interference (noise). The main collision occurs vertically through the center, where the cracked patterns of noise disrupt the steady rhythm of signal, creating a dynamic tension. The use of broken pixels introduces intentional imperfections, symbolizing distortions in memory and communication, while leaving some negative space to suggest quiet amidst the chaos.</desc>
