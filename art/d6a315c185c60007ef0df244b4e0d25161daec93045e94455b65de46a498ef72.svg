<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">This artwork captures the delicate interplay between longing and resolve, using a palette of muted colors to evoke a quiet emotional backdrop juxtaposed with sharper accents. The off-white and dust gray create a spacious field representing longing, while compressed red and dark navy bring moments of intensity and firmness, symbolizing resolve. The two patterns, 'stairs' for longing and 'teeth' for resolve, clash at the center, generating a visual tension that embodies the emotional contrasts of aspiration versus stability. The layout coils inward, suggesting a centrifugal pull from the edges toward a quiet center, inviting the viewer to explore the complexities of intimacy and distance within the piece.</desc>
