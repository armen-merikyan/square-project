<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">The Weight of Time</title>
  <desc id="desc">This piece captures the emotional tension between nostalgia and progress. The use of dark navy and black evokes a sense of depth and reflection (nostalgia), while the brighter dim cyan introduces moments of hope and future potential (progress). The broken edges create a sense of fragmentation, hinting at the conflict between these two emotional states. The arrangement suggests an upward movement meeting a downward pull, reflecting the rise vs. fall dichotomy. The color density fluctuates throughout, creating echoes of both calm and rage, offering a layered narrative that resonates with the theme of time and growth.</desc>
