<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inner Conflict</title>
  <desc id="desc">The emotional tone represents the tension between trust and suspicion, creating a dichotomy of experience. The palette, derived from 'relief_dread', consists of pale mint for a soft glow, soft sky to evoke an airy trust, storm gray and near black for shadows of suspicion, and faded gold as an accent linking the two. The main clash occurs in the center, where broken dots (trust) play against negative cross (suspicion), signaling an ongoing negotiation between the two emotions. The layout emphasizes a dense 'island' of brighter hues surrounded by a quieter sea of darker tones, illustrating the contrast between the inner state of confidence and the overwhelming noise of doubt. This pattern encapsulates the complex weave of resilience amidst fragility, resonating with the grounded yet turbulent nature of the seed.</desc>
