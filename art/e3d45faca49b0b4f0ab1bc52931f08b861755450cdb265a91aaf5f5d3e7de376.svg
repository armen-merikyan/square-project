<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Serenity</title>
  <desc id="desc">This piece explores the emotional dichotomy between restlessness and peace, translating this tension into color and pattern. The palette of pale aqua and mist gray creates a base of serenity, while alarm red and ink blue introduce urgency and restlessness, symbolizing conflict. The layout, based on eroded symmetry, allows for an unsettling edge that contrasts with the quiet core. The main collision occurs at the center with layers of red and blue against the tranquil aqua, suggesting an unstable foundation. The edge style, left weighted, enhances the feeling of compression while leaving intentional negative space for balance. Broken pixels introduce imperfections, echoing the instability found in memories and motion. Overall, the piece invites viewers to feel the push and pull of emotional experiences within the chaos of life.</desc>
