<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This composition conveys the emotional tension between pride and shame. The palette, 'fear_hope,' blends deep black and dark violet with soft gold and pale green, suggesting a complex emotional landscape. The contrasting left and right columns evoke a sense of push and pull—pride's vibrant gold and green countered by the subdued depth of violet and black. The arrangement embodies vertical movement, reflecting a rise on one side while creating a sense of fall on the other, mirroring the emotional nuances of hope and fear.</desc>
