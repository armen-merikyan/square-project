<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone leans towards the struggle between protection and exposure. The chosen palette of clean white, ice blue, ink black, violet gray, and warning orange explores clarity against confusion. The main contrast occurs in the soft glow of the light colors versus the hard shadows created by darker tones, with an emphasis on vulnerability in the central area. The abstract pattern was influenced by the structural metaphor of a wall, using irregular placements to suggest the erosion of edges and corners while maintaining a stable center. This creates a dynamic interplay of strength and vulnerability, evoking both security and fragility.</desc>
