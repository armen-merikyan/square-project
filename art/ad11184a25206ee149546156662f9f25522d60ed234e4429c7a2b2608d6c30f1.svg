<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Affection</title>
  <desc id="desc">The emotional tone reflects the duality of love's warmth and betrayal's coldness. The palette integrates soft pinks and deep maroons, representing love's vibrancy contrasting with the muted grays of betrayal. The main collision occurs in the center where dark maroon and bright pink create an unsettling tension, reflecting conflict. Layout suggests balance with symmetries broken by subtle disruptions, conveying emotional dissonance through textures resembling crosshatches and soft edges. This arrangement captures the essence of a fractured emotion, evoking a sense of longing and confusion.</desc>
