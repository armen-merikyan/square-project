<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This artwork captures the dynamic tension between tenderness and rage through an 8x8 grid composition. The palette of deep reds and pale blues represents the dichotomy: rage with its explosive, sharp color intensity and tenderness in its soft saturation. The central clash occurs where the sharply contrasting colors meet, creating a field of visual discomfort surrounded by 'quiet' colors dispersing outward, echoing themes of compression and release. The layout suggests a deliberate fall from rage to tenderness, integrating ‘broken pixels’ to introduce an element of imperfection, reinforcing the emotional themes of guilt and forgiveness. The balance between these emotions is accentuated by the arrangement, enhancing the narrative of constant negotiation between opposing feelings.</desc>
