<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Dissonance</title>
  <desc id="desc">This composition captures the emotional dichotomy between panic and control, utilizing a palette of warm and cool hues to evoke a sense of tension. The contrasting colors of muted purple and deep blue are placed against vibrant yellows and oranges, creating moments of collision and unresolved interaction. The layout spreads diagonally from the corner, where a checkerboard pattern (representing control) meets a split-screen effect (symbolizing panic) towards the opposite side, creating visual pressure. Broken pixels in certain areas emphasize imperfection while supporting the underlying theme of instability against a backdrop of stability. The defined edge style, with burned edges, enhances the feeling of chaos in contrast with calm patches.</desc>
