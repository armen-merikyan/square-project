<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Equilibrium</title>
  <desc id="desc">This artwork embodies the tension between panic and control, with colors suggesting a struggle of emotions. The muted palette of sepia, tan, and dust gray offers a sense of nostalgia and broken memory, paired with soft faded blue as a reminder of calmness. The structure employs a nearly mirrored layout with unexpected pixel 'breaks' that evoke a sense of disruption. The collision of dark and light patterns symbolizes the battle of full and hollow emotional states, specifically focusing on rhythmic density in the central area contrasted by quiet edges. The pixel bleed technique adds to the imperfection, inviting the viewer to explore the chaos beneath the surface of control.</desc>
