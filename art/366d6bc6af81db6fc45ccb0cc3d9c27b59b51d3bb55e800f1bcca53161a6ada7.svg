<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Clarity</title>
  <desc id="desc">This artwork embodies the tension between clarity and chaos, reflecting the emotional struggle of 'signal vs noise'. The palette of deep navy, contrasting black, and dim cyan creates a sense of isolation and tension, while the white serves as an accent to signify moments of clarity amidst the chaos. The dominant darker tones represent noise, comprising the upper four rows, while the lower rows depict sharper and clearer lines, symbolizing emergent signals. The flow is diagonal, enhancing the sense of a rising pulse against the static backdrop of noise, allowing the viewer to sense the disruption that makes clarity meaningful.</desc>
