<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Gratitude and Envy</title>
  <desc id="desc">This composition evokes a tension between the emotions of envy and gratitude, reflected in the contrasting colors. The palette leverages rich navy and dim cyan to convey a feeling of depth and complexity, while the black serves as a grounding void, embodying the 'empty room' aspect of the seed. The top four rows, filled predominantly with darker shades, reflect envy—dense and oppressive. In contrast, the bottom four rows utilize lighter tones to represent gratitude, creating a visual uplift. The pattern of cracks in the upper section and stairs in the lower introduces a rhythmic motion that echoes the rising versus falling theme inherent in the seed. Additionally, the use of broken pixels along the edges suggests imperfection, reinforcing the emotional collision of fear and hope.</desc>
