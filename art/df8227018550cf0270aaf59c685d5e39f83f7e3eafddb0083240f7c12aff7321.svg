<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry and Fracture</title>
  <desc id="desc">The emotional interplay of awe and terror is captured through contrasting patterns and color distributions. The palette of black, white, pale blue, and red creates a confrontation between calmness and disturbance. The solid blacks and whites provide stability, while the pale blue introduces an airy, almost uplifting quality, countered sharply by the aggressive red that pulses through the composition. Main contrasts appear where paler dots disrupt the denser, solid surfaces, creating moments of tension and interjection. The vertical wave is represented through the structure of the layout, where one side holds a flowing gradient and the opposite side breaks into fragmented dots, symbolizing the dichotomy of a structured universe unraveling into chaos.</desc>
