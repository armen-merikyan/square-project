<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">The emotional tone oscillates between trust and suspicion, translated into a palette that is both vibrant and dark. The colors of hot coral and blood orange suggest warmth and trust, while shades of charcoal introduce an underlying tension representing suspicion. The dominant warm colors take up approximately 60% of the canvas, pushing the darker colors into corners, creating a collision in the layout. The use of broken pixels adds intentional disruptions, symbolizing the fragility of trust and resilience amid doubt. This interplay creates a rhythmic motion across the negative space, where pulses of trust clash fluidly with shadowed hints of suspicion, resulting in a cohesive abstract narrative.</desc>
