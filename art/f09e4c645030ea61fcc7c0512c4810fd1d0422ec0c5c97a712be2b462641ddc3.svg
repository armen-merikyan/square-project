<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition explores the emotional tension between chaos and serenity. The warm reds symbolize explosive rage, while the cooler pale blues represent calm containment. Stripes of red clash against broken dot patterns of blue and white, creating a dynamic interplay. The collision occurs centrally, as the intense patterns of rage intrude upon the softer edges of calm, suggesting a struggle between these emotions. Black provides stark contrast, heightening the sense of pressure, while scattered broken pixels add intentional disruption, echoing the theme of eroded symmetry.</desc>
