<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light</title>
  <desc id="desc">This abstract artwork contrasts fear and hope through an interplay of dark and light colors. The chosen palette of deep blacks, dark violets, soft golds, and pale greens reflects the emotional spectrum. The broken dots represent the jagged texture of fear, while the checker pattern of the top layer symbolizes hope. The composition has a sense of collision as areas of pressure marked by the dark tones surround lighter spaces, evoking a struggle between these emotions. The weight of the dark colors at the corners creates a feeling of confinement, echoing the inner battle of hope pushing against fear. This composition leaves negative space, implying room for resilience among the overpowering emotions.</desc>
