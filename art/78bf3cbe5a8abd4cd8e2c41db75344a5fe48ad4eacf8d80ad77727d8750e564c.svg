<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolution</title>
  <desc id="desc">This piece embodies the tension between longing and resolve. The black and dark violet colors express depths of longing, while soft gold and pale green symbolize moments of resolution and hope. The collision occurs diagonally across the center, where the flooded soft gold contrasts starkly against the dense clusters of dark violet, creating an emotional push and pull. The broken frame adds an intentional disruption, suggesting the struggle between order and chaos, echoing the experience of longing for connection while grappling with the solidity of resolves.</desc>
