<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center of Tension</title>
  <desc id="desc">This artwork captures the emotional core of 'defiance' and 'submission' through contrasting colors and patterns. The palette of deep teal, cosmic indigo, and cold gold creates a stark imbalance between the rich, intense center and the subdued edges, symbolizing pressure against release. The dark void black serves as a quiet field, setting the stage for the sharp collision between the inward spiral of defiance in bright gold bars and the receding patterns of submission in softer tones within the center. This juxtaposition creates an energy of conflict, with the center representing a stronghold of emotion amidst the surrounding chaos, enhanced by subtle broken pixels that disrupt monotony, suggesting moments of imperfection and realness.</desc>
