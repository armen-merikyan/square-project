<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This piece encapsulates the emotional struggle between relief and dread. The upper half (relief) features lighter, calming hues like pale mint and faded gold, arranged in a broken frame pattern, suggesting an opening or exhale. In contrast, the lower half evokes a sense of dread with dark stormy colors and disruptive teeth patterns that appear ominous. The center serves as a collision point where these emotions meet, creating tension yet inviting contemplation. Broken pixels hint at imperfections and scars of experience, enriching the narrative of duality.</desc>
