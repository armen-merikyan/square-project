<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold Pulse</title>
  <desc id="desc">This artwork conveys the emotional tension between defiance and submission, represented through the interplay of strong, contrasting colors. The palette of moss green, bone white, rust, stone gray, and small gold hints at resilience versus fragility, positioning defiance in the center with pulsating, upward forms, while submitting tones recede toward the edges. The emotional collision explodes diagonally from the bottom left, creating visual tension that embodies a barrier being breached, thereby evoking an abstract narrative of tension and surrender.</desc>
