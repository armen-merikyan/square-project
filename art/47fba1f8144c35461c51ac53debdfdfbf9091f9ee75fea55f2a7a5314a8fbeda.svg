<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Held Back</title>
  <desc id="desc">This piece contrasts the emotional tension between desire and emptiness. The palette combines vibrant hues of hot coral and blood orange, symbolizing desire's intensity, with muted tones of charcoal and hollow blue representing emptiness. The central area is saturated, creating a feeling of overflow, while the edges are cut sharply, symbolizing the containment. The collision happens in the center where the saturated colors collide with the cooler hues, expressing a dynamic push against each other, reflecting the core idea of overflowing desire being restrained by emptiness.</desc>
