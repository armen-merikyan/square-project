<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This composition illustrates the emotional pull between certainty and curiosity through contrasting colors and patterns. The muted purples represent the calm certainty that defines boundaries, while vibrant yellows and oranges introduce the unpredictable spark of curiosity and energy. The narrow path of negative space cutting diagonally serves as a metaphor for the tension and struggle between these emotions, creating a sense of flow from bottom to top, symbolizing the rising signal of curiosity against the static backdrop of certainty.</desc>
