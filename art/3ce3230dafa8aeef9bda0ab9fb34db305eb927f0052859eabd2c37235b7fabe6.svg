<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Boundaries</title>
  <desc id="desc">The emotional tone reflects the struggle between the raw heat of desire and the structured coolness of restraint, resulting in an asymmetrical composition that highlights the collisions and conflicts inherent in these feelings. The chosen palette of deep reds and muted creams illustrates the intense emotional pull contrasted against the constraining barriers. The layout, suggesting an off-center design, emphasizes the pressure dynamics with an intentional 'overflow' of warmth from the reds, juxtaposed by the cool, orderly bars of gray which represent restraint, creating a visible marked contrast that captures the essence of the seed.</desc>
