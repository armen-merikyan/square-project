<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece juxtaposes the emotional extremes of tenderness and rage through an asymmetrical layout. Hot reds dominate the center, symbolizing rage, while subdued tones of pale blue and black provide a contrasting coolness on the edges, embodying tenderness. The layout resembles an open gate, suggesting a breach or entrance for heated emotions to spill into a quieter realm. The intersectionality of sparks and veils creates a rhythm of conflict and resolution that captures a moment of emotional tension. The use of broken pixels introduces imperfection, echoing the complexity of guilt and forgiveness inherent in the emotional tones.</desc>
