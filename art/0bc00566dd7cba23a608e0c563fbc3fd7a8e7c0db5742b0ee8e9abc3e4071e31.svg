<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">This abstract composition encapsulates the emotional duality of joy and grief through an intentional clash of color and form. The upper half utilizes brighter hues of yellow and orange, symbolizing joy and warmth, while the lower half employs muted purples and deep blues, representing grief and turmoil. The stark transition at the center suggests a split-screen effect, highlighting the coexistence and conflict between these strong emotions. The hard edges create a sense of tension and separation, while placement of 'broken pixels' within the joy section captures the fragility of happiness, making room for the negative space to enhance emotional depth. The overall flow from top to bottom conjures a feeling of movement from light to dark, echoing the intricate balance between hope and sorrow.</desc>
