<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Resolution</title>
  <desc id="desc">The emotional tone resonates between longing and resolve, contrasting a soft, yearning quality with a firm, structured presence. The palette incorporates pale mint and soft sky, representing the calmness of longing, while storm gray and near black evoke the solidity of resolve. This tension is visually represented in the grid by a spiral arrangement, where deeper colors 'lock' in the center, while lighter shades frame and suggest distance. The use of broken pixels introduces intentional imperfections symbolizing emotional scars, highlighting contrasts in density across the square. The main collision occurs as the dark colors converge towards the center while the lighter shades echo around, suggesting the struggle between chaos and order.</desc>
