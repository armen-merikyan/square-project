<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Frames</title>
  <desc id="desc">This composition explores the emotional tension between longing (top rows) and resolve (bottom rows). The muted warm palette evokes hunger and restraint, mirroring the feelings of reaching paired against the firm structures below. The use of broken pixels introduces intentional disruptions, symbolizing the scars of longing. The jagged edges emphasize the collision of emotions, while the split horizontal layout allows a clear contrast, with longing dominating the upper half and emphasizing its spacious quiet against the denser resolved structure below. The pulse of color moves from warm to cool, forming an integrated story of tension and stability.</desc>
