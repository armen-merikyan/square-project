  <title id="title">Tension of Control</title>
  <desc id="desc">This artwork captures the emotional tension between panic and control through a stark contrast between dark and light hues. The palette, featuring deep blacks and reds alongside pale blues and whites, embodies the struggle of a commanding presence against chaotic influence. The pattern showcases vertical stripes that clash with a radiating background, suggesting conflict. The broken pixel edges introduce imperfection, enhancing the sense of unease and fragmentation, where the center builds pressure, but the edges retreat into calm, embodying the theme of control amidst chaos.</desc>
