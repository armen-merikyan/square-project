<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This piece conveys the emotional tension between defiance and submission. The palette combines deep blacks, dark violets for power, soft gold to symbolize hope, and pale greens to evoke subtle quietness. The tension is marked by a sharp contrast in textures: the rigid, jagged patterns of defiance (represented by dark violets and blacks) collide with the softer, flowing forms of submission (represented by soft golds and pale greens). The uneven borders create a fractured frame, allowing space for a dynamic interplay between the chaotic and the serene, ultimately representing a threshold where emotions collide.</desc>
