<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Repair</title>
  <desc id="desc">The emotional tone embodies the duality of longing and resolve, captured through a palette that contrasts muted warmth with deep shadows. The palette—anchored by red oxide and blackened plum—evokes a sense of depth alongside muted cream and iron gray for tonal balance. The outer border is dense with resolve, providing a clear structure, while the inner core renders channels of longing, subtly interrupted by broken pixels, suggesting imperfection and the beauty of repair amidst damage. The main collision occurs at the center, between the structured islands of color and the flowing channels, embodying a narrative of tension and release.</desc>
