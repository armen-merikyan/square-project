<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Forces</title>
  <desc id="desc">The emotional tone contrasts feelings of panic and control, where the chaotic nature of darker hues collides with the calmness of lighter ones. The palette, consisting of sepia, tan, dust gray, and faded blue, evokes a sense of nostalgia and tension, supporting the theme of a broken memory. The negative space is emphasized, suggesting 'control' through the presence of lighter hues at the center while darker colors are concentrated toward the edges, creating a visual narrative of pressure. The layout invites a diagonal flow, capturing a sense of movement from the outer chaos inward, amplifying the themes of 'panic' versus 'control'.</desc>
