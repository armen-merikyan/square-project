<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Safety and Exposure</title>
  <desc id="desc">This abstract composition embodies the tension between safety and exposure through a palette of shelter green, warm brown, cold white, and open blue. The contrast lies in the soft, warm earthy tones occupying the left diagonal wedge, representing safety and stability, while the cooler tones of pale skin and cold white surge on the right, echoing exposure and vulnerability. The central area where these two emotions collide is intentionally disrupted with broken pixels, suggesting imperfection and the fragility of safety. The 'stack' pattern on the safety side juxtaposes with the 'tide' pattern on the exposure side, visually representing their interplay and conflict. This arrangement evokes a narrative of being simultaneously shielded and exposed, with the rich color contrast amplifying the emotional tension.</desc>
