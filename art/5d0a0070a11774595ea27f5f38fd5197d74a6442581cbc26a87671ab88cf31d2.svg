<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Disruption</title>
  <desc id="desc">This composition explores the tension between clarity and chaos, reflecting the emotional struggle of 'signal vs noise'. The palette, dominated by electric blues and hot magenta, conveys a vibrant pulse amidst dark static greys and blacks, emphasizing the struggle for clear communication. The main contrast occurs in the center, where the structured 'stairs' of signal collide with chaotic 'channels' of noise, interrupted by subtle broken pixels that evoke a sense of imperfection and memory. This interplay of order and disruption invites the viewer to feel the clash of exposure and shelter.</desc>
