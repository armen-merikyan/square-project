  <title id="title">Tensioned Separation</title>
  <desc id="desc">The emotional tone blends feelings of love and betrayal through the juxtaposition of warm and cool colors. The palette consists of deep reds and tranquil grays to emphasize the tension between warmth and coldness. The left half features a stair-like pattern evoking love's ascent, while the right uses a grid to signify the rigidity of betrayal. This split layout symbolizes the contrasting emotional states, while the glowing edges introduce a sense of unresolved tension, with broken pixels to hint at imperfection...</desc>
