<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Order and Emotion</title>
  <desc id="desc">This piece explores the emotional juxtaposition between joy and grief. The palette of vibrant yellows and deep blues represents joy's brightness against the weight of grief's muted purples. The left side features structured grid patterns representing grief's heaviness while the right side bursts forth with chaotic frames of yellow and orange symbolizing joy. The soft edges allow for a gentle transition, yet the broken pixels introduce intentional imperfections, creating tension and movement, reflecting the pulse of conflicting emotions. The arrangement strives to evoke the push and pull between order and chaos, encapsulating the essence of the seed.</desc>
