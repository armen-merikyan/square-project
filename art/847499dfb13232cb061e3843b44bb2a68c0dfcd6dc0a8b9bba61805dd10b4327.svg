  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition navigates the emotional landscape of vulnerability and strength by emphasizing contrast between soft halos and robust islands. The top half reflects vulnerability with pale variations, using distant lilac and cool blue that suggests fragility. The bottom half counters with assertive blocks of warm shadow and lamp gold, imparting strength and structure. The zigzag flow ties the two halves together, while intentional broken pixels throughout create subtle disruptions, amplifying the theme of exposure against protection.</desc>
