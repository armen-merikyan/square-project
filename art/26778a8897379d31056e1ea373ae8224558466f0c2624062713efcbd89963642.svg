<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos in Order</title>
  <desc id="desc">This piece embodies the emotional tension between panic and control. The palette of pink, red, gray, and dark maroon symbolizes love and betrayal, creating a stark contrast between warm bursts and calmer shades. The arrangement features dots that represent the chaos of panic interspersed with split-screen sections offering a sense of order. The varying concentrations and broken pixels create a rhythmic pulse, suggesting conflict and resolution through visual collision, allowing the viewer to feel the underlying narrative of joy and grief as they navigate through the abstract landscape.</desc>
