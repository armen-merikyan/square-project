<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Affection</title>
  <desc id="desc">This abstract piece explores the emotional tension between love and betrayal through contrasting warm and cool colors, creating a rhythmic dance between harmony and discord. The palette, dominated by shades of pink and red with undertones of gray and dark maroon, symbolizes warmth yet carries a wounded edge, reflecting the complexities of affection. The main contrast arises from the split between symmetry and chaos, visible in the juxtaposition of structured grid patterns against fragmented breaks that signify the imperfections in relationships. The patterns reflect a diagonal rise, hinting at hope emerging through turmoil. Broken pixels are strategically placed to enhance the feeling of rupture within a seemingly familiar design, evoking a narrative of both connection and isolation.</desc>
