<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition embodies the emotional tension between safety and exposure through contrasting color fields. The chosen palette—shelter green for protective warmth, warm brown to suggest stability, pale skin for vulnerability, cold white for exposure, and open blue reflecting air—visually represents these themes. The arrangement creates a dominant central 'island' of color, juxtaposed with quieter outer edges to suggest the dichotomy of protection and vulnerability. Broken pixels introduce intentional ruptures, echoing the conflict between a rigid boundary and the soft encroachment of exposure, resulting in a dynamic relationship across this abstract space.</desc>
