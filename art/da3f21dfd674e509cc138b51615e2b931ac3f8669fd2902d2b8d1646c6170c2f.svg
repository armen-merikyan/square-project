<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Tension</title>
  <desc id="desc">This composition reflects the emotional dance between defiance and submission, using a palette inspired by fear and hope. The dark violet and black represent the oppressive weight of submission, while the soft gold and pale green suggest the flickering light of defiance and hope. The grid-like flow climbing upwards echoes a signal of rising tension and emotion, with broken pixel elements interspersed to signify disruptions and glitches. The main collision happens diagonally across the square, portraying an ongoing struggle—where the upward momentum meets the grounded weight of dark tones.</desc>
