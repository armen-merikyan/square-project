<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects an interplay of desire represented by a saturated palette that evokes warmth and attraction, clashing against a backdrop of emptiness conveyed through cooler grays and a significant negative space. The chosen palette of hot coral, blood orange, dust pink, charcoal, and hollow blue captures this tension well. The collision occurs prominently in the center, where the warm colors pulse against quiet, hollow regions, mimicking the struggle between pressing desire and the void of emptiness. The patterns of pressure and echo are used to create this rhythm as they overlap, evoking a sense of conflict in longing and containment.</desc>
