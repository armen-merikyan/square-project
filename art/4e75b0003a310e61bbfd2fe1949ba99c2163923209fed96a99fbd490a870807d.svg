<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory in Motion</title>
  <desc id="desc">The emotional tone leans towards a collision of new beginnings and remnants of the past, captured through contrasting polarities of warmth (sparks) and coolness (ashes). The palette consists of vibrant colors like electric blue and hot magenta to represent sparks of energy, while the dead black and static gray symbolize the remnants and stillness of ashes. The main collision occurs diagonally, using the spiral pressure layout to create a tension between the jagged movements of memory ('echo' for ash) and the sharp, sudden bursts of vitality ('dots' for spark). This reflects the struggle between movement and restraint, mirroring the emotional complexities of resilience against fragility.</desc>
