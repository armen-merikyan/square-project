<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Calm</title>
  <desc id="desc">The emotional tone juxtaposes restlessness and peace, creating an unresolved tension that radiates through the design. The palette of red, black, pale blue, and white represents the struggle between heated emotions and tranquil spaces, with the red and black suggesting a volatile core, while pale blue introduces moments of serenity. The main contrast emerges diagonally, where the chaotic 'embers' of red and black collide with the cracked 'peace' represented through pale blue and white. This arrangement reflects the conflicting nature of memory and motion—remnants of past disturbances emerging against attempts to create a quiet space.</desc>
