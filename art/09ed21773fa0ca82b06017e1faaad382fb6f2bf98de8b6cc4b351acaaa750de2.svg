<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This artwork captures the emotional dichotomy between restlessness and peace. The palette incorporates deep colors like cosmic indigo and void black to create a dark, chaotic feeling, offset by colder accents of star white and cold gold that suggest fleeting moments of tranquility. The dominant section of the grid reflects the pressure of restlessness, primarily on one side, where colors collide in a halo pattern, representing disruption and motion. The soft edges contrast with the sharpness of dark hues, suggesting the gentle pull of deep teal and calming whites on the opposing side. The broken pixels introduce imperfections, symbolizing the cracks in stitched memories, while negative spaces create breathing room that echoes the theme of peace through memory.</desc>
