<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition embodies a tension between softness and severity, using sharp contrasts to reflect the cold boundaries of severity, while employing gentle edges to represent underlying softness. The selected palette—powder pink, warm white, carbon black, steel gray, and sharp crimson—skillfully navigates this dichotomy, with lighter tones radiating warmth and the darker shades imposing a sense of severity. The main collision occurs centrally, with the radial pulse marks of softness intersecting sharply with the grayscale blocks of severity, inviting a sense of grappling between exposure and shelter. The layout is an argument grid, where the patterns of glitch and target visibly collide, reinforcing the narrative of conflict within the square while maintaining clarity and rejecting iconography.</desc>
