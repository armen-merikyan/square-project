<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition reflects the emotional tension between safety and exposure. The palette captures warmth and softness with earth tones of brown and green, contrasted by pale skin and cold white—mirroring the duality of shelter and openness. The barcode pattern represents exposure by using vertical lines that interrupt the surrounding horizontal mirror patterns of safety, creating a sense of collision and dynamic flow. The central focus is pale skin, signifying vulnerability, which is framed by the darker edges to evoke protection. The intentional broken pixels reflect moments of imperfection in this relationship between safety and exposure, enhancing the artwork's depth.</desc>
