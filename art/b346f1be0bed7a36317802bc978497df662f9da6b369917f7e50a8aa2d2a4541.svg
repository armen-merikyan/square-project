<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Calm</title>
  <desc id="desc">The emotional tone contrasts rage with calm, using a palette of red, black, pale blue, and white to reflect tension and tranquility. The black and red spikes create a staccato rhythm, interrupting the soft ripples of pale blue and white, suggesting a struggle between chaos and serenity. The central collision occurs with the jagged red pixels cutting through the quieter surrounding blues and whites, embodying the jaggedness of rage against the gentle calmness. The composition's layout, emphasizing a small dense 'island' of chaos within a larger quiet field, is inspired by the seed's exploration of eroded symmetry and emotional landscapes.</desc>
