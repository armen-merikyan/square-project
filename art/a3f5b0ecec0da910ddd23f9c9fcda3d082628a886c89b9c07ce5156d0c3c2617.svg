<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece embodies the emotional pull between desire and emptiness through contrasting warmth and coolness. The warm colors on the left evoke a sense of saturation and yearning while the cool, muted tones on the right allude to absence and quietude. The palette of hot coral, blood orange, and hollow blue creates a vivid clash at the center—where desire's warmth meets emptiness's cool hush. The use of broken pixels in an otherwise structured layout represents disruptions in this emotional narrative, emphasizing the fight against containment. The distinct left-right split renders desire more pronounced, creating a visual balance that retains a sense of tension and unresolved motion.</desc>
