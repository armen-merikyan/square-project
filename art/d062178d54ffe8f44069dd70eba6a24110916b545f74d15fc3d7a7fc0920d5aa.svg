<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork embodies the tension between safety and exposure through a contrasting color palette of soft and warm tones. The gentle greens and browns suggest a protective environment, while sharp blues and whites introduce an element of vulnerability. The emotional flow is reflected in a pulse of warm colors that dominate the left half, with cooler tones interrupting quietly from the right, representing an open gate. The main collision occurs vertically along the center, disrupting the perceived safety with a hint of exposure, echoing the seed's narrative of duality.</desc>
