<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">The Tension of Control</title>
  <desc id="desc">This artwork embodies the emotional clash of panic and control through a carefully selected palette of deep reds juxtaposed against pale blues and stark whites, creating sharp contrasts that embody chaos and order. The layout disperses colors in a diagonal flow, suggesting an unequal struggle between tension and calm, while broken pixels represent fractures in control. Central to this piece is a zigzag pattern that suggests both a spark of chaotic energy and controlled movement, conveying a narrative of pressure and release.</desc>
