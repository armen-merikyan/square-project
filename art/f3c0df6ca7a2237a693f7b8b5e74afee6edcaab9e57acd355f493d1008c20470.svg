<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This composition embodies the tension between control and surrender, using dark and muted tones for restraint contrasted with bright colors hinting at surrender. The central area is dense with open blue and warm brown, representing an overfilled center pushing against sealed edges of safe whites and greens. Broken pixels introduce intentional disturbances that suggest moments of pressure and release. The result captures the emotional struggle of desire versus limitation, with the collision of colors creating a visual stutter, echoing the tension detailed in the seed.</desc>
