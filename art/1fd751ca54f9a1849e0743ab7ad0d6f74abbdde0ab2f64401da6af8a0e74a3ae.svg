  <title id="title">Overflow and Containment</title>
  <desc id="desc">This artwork navigates the tension between rage and calm through a dynamic palette of deep reds and calm blues. The dense, jagged red sections represent chaos and compressed emotion, while the cooler, softer blues attempt to encapsulate that intensity, creating a visual push and pull. The arrangement features sharp edges and contrasting patterns — 'embers' for rage and 'fault lines' for calm, leading to a prominent collision in the center, where the emotions intersect. This conflict narrates a struggle between control and chaos, expressed through the choice of colors and their placement.</desc>
