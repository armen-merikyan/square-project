<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tension</title>
  <desc id="desc">This piece captures the emotional dichotomy of defiance against submission, reflecting the tension between weight and lightness, and openness versus closure. The selection of a palette dominated by reds, pinks, and dark maroon accentuates this emotional clash. The colors collide dynamically across the square, where darker hues suggest intensity and the brighter tones suggest a levity that feels both inviting and confrontational. The 'noise' pattern resonates with the key theme of disruption, swirling outward from a dark center, creating an outward pressure that feels expansive, yet contained by the edges, symbolizing the struggle between containment and release inherent in the seed themes. The layout ensures that negative space is respected, emphasizing the emotional gaps that punctuate the experience.</desc>
