<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Polarity</title>
  <desc id="desc">The piece explores the duality of joy and grief through contrasting colors and patterns. The warm palette of yellows and oranges represents joy, while muted purples reflect grief. The layout exhibits a center seed with outward pressure, creating a visual tension that reflects emotional complexity. The contrast is keenly felt at the center where joyful yellow intersect with the muted purple, suggesting collision between opposing feelings while maintaining a symmetrical structure that is subtly broken by random dark pixels, embodying the imperfections of memory and emotion. This intricate arrangement creates both calmness and pressure, a dance between elevation and decline, echoing the pulse of human experience.</desc>
