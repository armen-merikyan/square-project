<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone captures the tension between hope and fear, creating a dynamic interplay where darker colors represent pressure and anxiety while lighter shades signify potential growth and release. The palette of black, dark violet, soft gold, and pale green creates a stark contrast that is visually engaging, emphasizing the 'outside inward' flow where darker pixels cascade down, creating a sense of blockage against the vibrancy of the edges. The structured pattern of fear through grids juxtaposes the hopeful rising stripes, echoing the collisions of these emotions.</desc>
