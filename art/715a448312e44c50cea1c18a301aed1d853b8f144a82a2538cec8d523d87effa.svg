<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger in Restraint</title>
  <desc id="desc">The emotional tone blends the depths of desire with the confines of restraint. The palette, featuring #A52A2A (red oxide), #6B4C79 (blackened plum), #E6D5C1 (muted cream), #7A7D82 (iron gray), and #FF8C00 (small orange), reflects a balance of warmth and cooler muted tones, with the richer colors invoking desire and the grays suggesting boundaries. The main contrast happens where the bright saturated colors collide with the more muted tones, highlighting the tension between yearning and limitation. The abstract pattern emerges from the interplay of crosshatch (desire) and broken dots (restraint), illustrating emotional push and pull while maintaining an island of depth within a negative space that allows breathing room for interpretation.</desc>
