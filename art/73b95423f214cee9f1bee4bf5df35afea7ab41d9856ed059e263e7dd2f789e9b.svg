<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Stillness</title>
  <desc id="desc">This piece embodies the struggle between restlessness and peace. The palette, sourced from 'broken_memory', introduces sepia and tan tones, symbolizing nostalgia and the past, contrasted with subtle blue-gray hues representing calmness. The arrangement uses a checker pattern to reflect movement and disruption, while the lattice reflects peace and symmetry. The main contrast occurs centrally, where restless elements collide with calming lines, creating emotional tension and visual engagement. The edge boundaries are sealed, enhancing the feeling of an enclosed space, underlining the push and pull dynamic that resonates with the seed's themes of memory and motion.</desc>
