<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light</title>
  <desc id="desc">This piece serves as an exploration of the emotional contradictions found in joy and grief. The upper half, reflecting joy, employs bright yellows and warm oranges, expanding outwards with a rhythmic, circular 'ring' pattern that conveys an uplifting essence. In contrast, the lower half channeling grief adopts muted purples and deep blues, arranged in a jagged 'teeth' pattern suggesting heaviness and fragmentation. The central clash where these two emotions meet captures the tension between order (patterns) and chaos (disruption), further emphasized by the right-weighted edge style that conveys a sense of imbalance. The overall flow, reminiscent of wave motions, represents life's ebb and flow of emotions, while broken pixels introduce thoughtful imperfections, creating a sense of authenticity amid the emotional landscape.</desc>
