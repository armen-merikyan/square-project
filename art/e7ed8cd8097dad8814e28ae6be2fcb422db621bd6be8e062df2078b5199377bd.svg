<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Containment</title>
  <desc id="desc">The artwork explores the emotional tension between desire and restraint through a palette of saturated and muted colors. The dominant warm tones represent desire, echoing an intense pull towards brightness, while the cooler shades symbolize the boundaries and containment matched by a thread-like pattern. The collision occurs at the center, where warm hues intermingle with darker, restrained colors, creating an abstract lattice that embodies both emotional release and control, resembling the tension of love and betrayal without literal representation.</desc>
