<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall</title>
  <desc id="desc">This artwork embodies the contrasting emotional tones of joy and grief through an 8x8 grid where the top four rows express joy with an expansive radial pattern in warm yellows and oranges, while the bottom four rows convey grief with a heavier, muted grid in deep blues and muted purples. The placement creates a dynamic flow that rises on one side and falls on the other, mirroring the push and pull of these emotions. Broken pixels introduce imperfection, enhancing the emotional depth and complexity within the symmetry versus break theme. The overall contrast brings a sense of tension, echoing the interplay between joy and grief throughout the composition.</desc>
