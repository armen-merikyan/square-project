<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The artwork explores the emotional tension between vulnerability and strength through a carefully structured palette of muted tones (dust gray, off-white) interrupted by vivid accents (compressed red) to signify moments of collision. The layout employs a scattered repair approach, where broken pixels subtly disrupt the symmetry of the pattern, reflecting the interplay of strength supporting vulnerability. Central tension lies in the palette’s interaction, where fiery red represents unshielded emotions clashing against a soft gray shelter, creating an emotional pulse across the composition.</desc>
