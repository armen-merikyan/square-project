<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Heartbeats</title>
  <desc id="desc">The emotional tone reflects a tumultuous dynamic between love and betrayal, illustrated through a palette of warm reds and cool grays. The top four rows represent love with warm pinks and reds, forming a dense pattern of paired shapes that resonate with warmth and connection. The bottom four rows evoke betrayal with cool grays and dark maroons, reflecting cracks and interruptions, creating an atmosphere of emptiness and distance. The collision of these contrasting colors highlights emotional tension—the shift from harmony to discord. The pattern of color placement emphasizes a heart's vulnerability, revealing both tenderness and pain.</desc>
