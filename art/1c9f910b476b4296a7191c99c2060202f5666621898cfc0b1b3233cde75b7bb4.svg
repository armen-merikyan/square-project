<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Shadows</title>
  <desc id="desc">This piece embodies the emotional tension between relief and dread through a gradient of heavy dark tones contrasted by a few brighter elements. The chosen sepia and tan palette suggests warmth while evoking nostalgia, contrasting the oppressive dark shades. The arrangement creates a sense of weight at the top, as if something is pressing down, while brighter patches at the bottom indicate a bottom elevation symbolizing relief. The broken pixels disrupt the symmetry, adding emotional dissonance and suggesting imperfection in the calm. The layout sees the eye flow from darker to lighter areas diagonally, enhancing the narrative of moving through dread towards a state of calm.</desc>
