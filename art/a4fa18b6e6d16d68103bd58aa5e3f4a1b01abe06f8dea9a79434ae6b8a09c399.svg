<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Echoes</title>
  <desc id="desc">This piece contrasts the tension between restlessness and peace through a clash of bold and muted colors. The palette, chosen from the 'hunger_restraint' set, conveys both warmth with 'small_orange' and 'red_oxide' and coolness through 'blackened_plum' and 'iron_gray'. The dominant color blocks suggest a quiet atmosphere broken by sporadic bursts of vivid color, reflecting memory and motion's inherent conflict. The flow connects the corners diagonally, creating a sense of movement, while broken pixels add disruption, hinting at the unsettled nature of emotions. The vibrant cluster at the top right serves as the main collision point, illustrating a light against a darker background, embodying the struggle between calm and turbulence.</desc>
