  <title id="title">Order vs. Chaos</title>
  <desc id="desc">The emotional tone reflects the duality of joy and grief, creating a tension between organized patterns and fragmented forms. The palette combines bright yellows and oranges to symbolize joy, contrasted with deep blues and muted purples that resonate with grief. This interplay leads to a visual narrative where the left side embodies a calm order, while the right introduces disruption. The edge styles enhance the perception of brokenness amidst structure, reflecting moments of collision and release.</desc>
