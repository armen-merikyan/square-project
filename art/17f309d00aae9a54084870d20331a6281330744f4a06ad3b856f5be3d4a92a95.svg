<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Boundaries</title>
  <desc id="desc">This composition embodies the struggle between desire and emptiness, with saturated colors representing yearning contrasting against deeper, muted tones symbolizing restraint. The warm hues, drawing from the palette of 'hot coral' and 'blood orange', spill from the top-left corner in a chaotic yet confined manner, representing desire's overflowing attempts to breach containment. The charcoal hues create a sense of hollowness, reinforcing the feeling of emptiness. Broken pixels introduce imperfections, suggestive of reality's interruptions, allowing the viewer to feel the rhythmic tension formed by the collision of emotions, enhanced by the lattice-like structure that keeps the desire in check.</desc>
