<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger versus Restraint</title>
  <desc id="desc">This composition captures the emotional contrast between desire and emptiness through a combination of vibrant and muted colors. The outer border, filled with low saturation hues, represents emptiness, while the inner 4x4 grid bursts with warm, dynamic colors that suggest desire. The use of broken pixels creates intentional disruptions that symbolize the tension between overflowing urge and the boundaries of containment. The central collision of energy draws the viewer's eye, embodying a push-pull dynamic that resonates with the seed’s themes. The palette of hot coral, blood orange, and charcoal creates a stark yet harmonious visual dialogue.</desc>
