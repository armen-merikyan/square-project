<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">The emotional tone explores the push and pull of joy and grief, manifesting as contrasting areas of light and dark. The selected palette mixes warm yellows and oranges with cool muted purples and deep blue to represent the complexity of these emotions. The arrangement breaks the image into balanced chaos, with some areas densely packed, while others remain bare, highlighting tension in both the order of the zigzag pattern and the chaos of scattered pixels. Glowing edges emphasize the emotional shifts, creating a sense of rising signal amidst the noise.</desc>
