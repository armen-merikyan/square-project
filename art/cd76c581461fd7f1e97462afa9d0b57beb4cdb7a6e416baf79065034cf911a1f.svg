<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone embodies a struggle between desire and emptiness, representing a dynamic pull against a locked border. The palette combines warm tones like hot coral and blood orange to symbolize desire, contrasted with the cooler hues of charcoal and hollow blue to depict emptiness. The central 4x4 area vibrates with radial patterns of warm colors, conveying saturation and yearning, while the edges project a threshold of quiet, low-saturation colors reflecting restraint. The primary collision occurs at the intersection between desire and emptiness, creating a tension in the composition, where the inner space seeks expansion but is contained by the outer border. Broken pixels introduce intentional disruptions, enhancing the theme of unfulfilled desire, adding to the overall emotional complexity.</desc>
