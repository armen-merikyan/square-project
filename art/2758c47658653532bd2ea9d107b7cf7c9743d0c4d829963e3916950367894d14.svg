  <title id="title">Pressure Collide</title>
  <desc id="desc">This artwork captures the emotional tension between desire and restraint using a palette that contrasts warm vibrancy against cool saturation. The central collision occurs where hot coral and blood orange mark edges, suggesting a dynamic pull. Meanwhile, muted shades of charcoal and hollow blue create boundaries, enforcing a sense of containment. The spiral flow and maze pattern evoke the complex interplay between wanting and withholding, embodying the emotional essence of the seed. Broken pixels disrupt this tension, further emphasizing the imperfections in desire and emotion.</desc>
