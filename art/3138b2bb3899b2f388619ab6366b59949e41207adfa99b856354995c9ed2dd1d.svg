<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Desire</title>
  <desc id="desc">The emotional tone captures the interplay of longing and resolve. The palette of dark navy and black, along with subdued dim cyan and occasional whites, illustrates the weight of longing against the clarity of resolve. The main contrast occurs diagonally across the canvas, creating a clash between dense areas and quiet spaces, reflecting the push-pull dynamic of desire and determination. The use of stepwell and halo patterns conveys a sense of depth and strength amidst moments of fragility, capturing the essence of the seed’s themes.</desc>
