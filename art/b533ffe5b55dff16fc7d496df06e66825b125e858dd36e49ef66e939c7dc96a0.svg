<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tension</title>
  <desc id="desc">This artwork embodies the collision between tenderness and rage through a contrasting palette of saturated reds and muted blues. The layout suggests two pulses, with the red ‘rage’ pixels aggressively pushing toward the cooler blue tones, which embody ‘tenderness.’ The thick black outline signifies the tension boundary where these emotions clash, creating a visual echo of conflict and resolution. The intentional placement of broken pixels introduces a sense of imperfection, giving life to the emotional narrative without depicting literal objects.</desc>
