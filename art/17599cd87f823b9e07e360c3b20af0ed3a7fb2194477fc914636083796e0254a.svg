<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall of Emotion</title>
  <desc id="desc">This piece explores the tension between joy and grief, utilizing a split palette of bright yellows and muted purples to signify the contrasting emotional states. The upward-leaning pixels on one side amplify joy, represented through warm colors, while the downward-facing pixels on the other evoke grief, through darker tones. The edges are structured sharply, enforcing a sense of order amid the emotional chaos, while the overall layout with diagonal pressure suggests an interplay between rising hopes and descending sorrows, raw and real.</desc>
