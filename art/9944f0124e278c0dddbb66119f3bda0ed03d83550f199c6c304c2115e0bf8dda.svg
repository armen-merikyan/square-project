<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Hearts</title>
  <desc id="desc">This composition explores the dichotomy of desire and restraint through bold contrasts and spatial arrangements. The palette mixes saturated reds and muted creams, reflecting the push and pull of longing against the confines of self-control. The main collision occurs in the center, where warm tones spiral outwards, surrounded by cooler boundaries formed by muted colors—a representation of desire breaking the edges of restraint. The composition utilizes asymmetric patterns that evoke the struggle between the vibrant energy of a beacon and the structured confines of a thread, effectively capturing the emotional essence of the seed text.</desc>
