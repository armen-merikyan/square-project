<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This composition captures the emotional dichotomy of fear and hope. The palette combines dark tones for fear—black and dark violet—with soft accents of pale green and soft gold representing hope. The central glow of the lighter colors creates a focal point amidst jagged edges and noise, evoking pressure and tension. The zigzag pattern represents a struggle, while the placement of single pixels in the outer rows creates an echo of hope amidst the oppressive darkness of fear, emphasizing the interplay of inside and outside feelings.</desc>
