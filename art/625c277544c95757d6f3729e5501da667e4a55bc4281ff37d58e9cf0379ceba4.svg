<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone revolves around the interplay of severity and softness, illustrating boundaries being pushed and contained. The palette, featuring warm hues of pink and white alongside the starkness of black and gray, creates tension. The main contrast occurs in the central rows where bright colors (sharp crimson and warm white) collide with darker tones, emphasizing the clash between soft and severe. This influence of 'hinge' as a shape seed translates into a balanced yet torn aesthetic, creating a feeling of both openness and restraint, mimicking the themes of guilt and forgiveness.</desc>
