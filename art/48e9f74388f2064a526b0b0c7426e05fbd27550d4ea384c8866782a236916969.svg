<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">This piece embodies a struggle between the feeling of emptiness and the yearning desire, conveying an emotional tension through its color palette of warm oranges and cool blues. The left side is filled with vibrant, energetic hues representing desire, while the right showcases muted, deep blues symbolizing emptiness. The jagged edges suggest imperfect boundaries, a reflection of the conflicting emotions. Collisions of color occur where warm tones interact with cool, further amplifying this emotional discord. The layout is split vertically, allowing for a dramatic shift from the warmth of desire to the colder aspects of emptiness, creating a compelling narrative.</desc>
