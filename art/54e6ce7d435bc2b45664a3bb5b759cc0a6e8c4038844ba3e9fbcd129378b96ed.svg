<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Yearning</title>
  <desc id="desc">This pixel art piece interprets the emotional struggle between emptiness and desire. A palette of warm coral and blood orange represents the vibrant pull of desire, while charcoal and hollow blue evoke a sense of emptiness. The collision occurs in the center, where densely packed warm colors are interrupted by cooler hues, reflecting a tangible tension. The spiraling flow suggests an inward pull against an edge, where desire seeks to overflow while being contained by boundaries. The chaos of broken pixels adds to the disruption of form, encapsulating the struggle inherent in the thematic contrasts of the seed.</desc>
