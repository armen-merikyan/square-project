<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Across Dimensions</title>
  <desc id="desc">This artwork captures the emotional conflict between quietude and pressure through a palette that blends off-white, soft gray, and deep navy to explore contrast and collision. The dense concentration of colors on the left edge signifies pressure, gradually softening into quieter tones towards the right. The deliberate intersection of sharp and soft patterns plays with the idea of breaking symmetry, while the broken pixels introduce intentional disruptions echoing emotional shattering. The placement of darker colors creates weighted boundaries that juxtapose against the lighter fields, allowing dynamics of tension to echo diagonally across the square, evoking a struggle between clarity and confusion.</desc>
