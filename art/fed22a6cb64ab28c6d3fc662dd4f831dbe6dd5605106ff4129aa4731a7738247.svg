<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Containment</title>
  <desc id="desc">This artwork encapsulates the tension of rage and calm through contrasting colors and patterns. The jagged, sharp red hues symbolize explosive rage, while the cool pale blue and black represent calmness attempting to contain the chaos. The central collision occurs where bright reds intersect with the quiet blues, creating emotional tension and balance within the overall composition. The broken pixels (variations of blacks and grays) serve as scars, reminding us of the disruptions in order. The layout of dark colors with a focal point of brightness encapsulates the 'last light,' representing fleeting moments of calm amidst chaos.</desc>
