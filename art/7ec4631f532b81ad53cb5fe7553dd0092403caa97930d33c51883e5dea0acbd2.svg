<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Dichotomy</title>
  <desc id="desc">The emotional tone reflects the struggle between love and betrayal, using warm colors like pink and red to represent love, contrasted with dark maroon and gray to symbolize betrayal. The palette balances warmth and coolness while the jagged edges introduce tension. The layout of falling pixels suggests the weight of emotional descent. Across the 8x8 grid, colors disrupt each other in diagonal rises, representing the conflict between softness (emotional warmth) and sharpness (betrayal), creating a rhythmic echo of unresolved feelings. The strategic placement of the broken pixels introduces imperfection, enhancing the story of contrast and tension.</desc>
