  <title id="title">Tension of Exposure</title>
  <desc id="desc">The emotional tone navigates between feelings of safety, represented by soft browns and greens, and exposure, illustrated through pale blues and whites. The palette offers a base of warm shelter contrasting against cool, open gestures, indicating a push and pull. The main collision occurs at the center, where lighter colors break into darker edges, suggesting a spiral entrapment and release. Broken pixels introduce intentional disruptions across the canvas, amplifying the feeling of tension and unpredictability inherent in the dialogue between safety and exposure.</desc>
