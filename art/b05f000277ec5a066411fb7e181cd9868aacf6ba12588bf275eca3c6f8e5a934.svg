<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Disrupted Harmony</title>
  <desc id="desc">The artwork captures a contrast between confusion and clarity, with a palette that merges burnt orange and charcoal to symbolize warmth battling against cool, muted tones of clarity like gold. The layout is split horizontally, creating tension as the top rows evoke clarity through ring patterns, whereas the bottom rows embody confusion through a mirrored, broken approach. The thick outline enhances the feeling of fragmentation. There's a balance of density that serves as an echo, suggesting noise against clearer, defined spaces, allowing for moments of visual breath among the chaos.</desc>
