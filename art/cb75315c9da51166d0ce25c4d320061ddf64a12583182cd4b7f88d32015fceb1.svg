<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork embodies the tension between rage and calm through a structured chaos. The left half features aggressive reds and dark tones representing rage, expressed as sharp, jagged patterns that suggest an explosive force. The right half, in contrast, uses softer pale blues and whites, reflecting calmness through smoother, shatter-like structures. The split layout enhances the visual collision where these two emotional states meet, creating an abrupt interruption at the central vertical axis. The use of broken pixels adds imperfection, symbolizing the struggle between containment and overflow amidst the overlapping emotional currents.</desc>
