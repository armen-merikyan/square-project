<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork embodies the contrast of 'spark' as scattered light and energy against the subdued tones of 'ash,' representing settled dust and faded intensity. The color palette balances a soft warmth with deep severity, using powder pink and carbon black to evoke tension. The structure follows a vertical split, where the left side focuses on vibrant colors to symbolize sparks of sudden brightness, while the right side exhibits grays and whites signifying restraint and calmness. Broken pixels create intentional disruptions, enhancing the narrative of memory clashing with erasure, thus portraying the dichotomy of resilience and fragility.</desc>
