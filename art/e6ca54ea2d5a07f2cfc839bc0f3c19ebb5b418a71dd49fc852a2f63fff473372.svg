<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Containment</title>
  <desc id="desc">The emotional tone navigates through tension between desire (represented by saturated colors) and restraint (muted tones). The palette features a juxtaposition of vibrant `small_orange` and deep `blackened_plum`, creating a vivid collision. The main contrast occurs diagonally across the square, where warm, saturated colors pulse against cooler, restrained tones. The layout suggests a dance between these two forces, with the 'rain' pattern of desire cascading over the structured 'dots' of restraint, illustrating the push and pull inherent in love and betrayal, all while maintaining a delicate balance of negative space.</desc>
