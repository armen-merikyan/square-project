<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Flood and Spark</title>
  <desc id="desc">This composition explores the emotional tension between vulnerability and strength through color and pattern. The central square, filled with warmer burnt orange, represents strength, creating a bold contrast against the cooler, muted dark red and charcoal surrounding it. The checkerboard pattern within the center reflects structural stability, while the soft, negative cross pattern around it suggests exposure. The collisions between the dense center and the sparser edges evoke a sense of conflict and connection. The choice of colors from the 'ancient_fire' palette highlights this tension, with warm shades contrasting against deeper tones, creating an abstract narrative of protection against exposure.</desc>
