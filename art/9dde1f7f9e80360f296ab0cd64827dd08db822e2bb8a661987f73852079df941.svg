<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Balance</title>
  <desc id="desc">This artwork captures the emotional tension between vulnerability and strength through a delicate interplay of colors and patterns. The palette combines warm clay and cool blue tones, evoking intimacy juxtaposed with distance. The broken dots pattern signifies vulnerability and is interrupted by solid maze-like sections that represent strength. The collision occurs prominently in the center, where a pale core is met by more dense, darker edges, suggesting the struggle between exposure and shelter. The design reflects an open gate layout, creating an inviting yet opposing flow that embodies internal conflict and connection. Broken pixels add intentional imperfections, embodying the unpredictability of emotional experiences.</desc>
