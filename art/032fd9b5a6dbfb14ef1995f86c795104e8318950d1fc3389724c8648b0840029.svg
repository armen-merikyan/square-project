<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in the Void</title>
  <desc id="desc">This abstract composition captures the emotional struggle between panic and control, expressed through contrasting color choices and placements. The bright yellows and oranges signify sparks of activity and moments of clarity, while the deep blues and muted purples embody the weight of uncertainty and solitude in an empty space. The diagonal flow draws the eye from the bright disposition of activity to the darker areas, emphasizing the instability and tension within the piece. Each color block is arranged to create an unease and dynamism, as if light is struggling against the heavy dark masses, symbolizing internal confrontations and emotional echoes throughout the layout. The use of broken pixels introduces imperfections, adding to the chaotic element of panic within an overwhelming void of control, matching the seed's themes.</desc>
