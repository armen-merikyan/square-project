<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Extremes</title>
  <desc id="desc">The emotional tone grapples with the push and pull of defiance versus submission. The selected palette of black, dark violet, soft gold, and pale green offers a juxtaposition of darkness against light, capturing the complexities of these contrasting feelings. The main contrast surfaces through dense clusters of dark colors that create a sense of weight and gravity, interrupted by lighter hues—soft gold and pale green—representing the fragile nature of hope amidst struggle. The pattern flows from left to right, mimicking a sense of movement and tension, while maintaining negative space to evoke a feeling of unresolved emotion.</desc>
