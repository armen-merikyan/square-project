<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This artwork embodies the emotional contrast of softness and severity through a defined color palette of soft pinks and stark blacks. The dense collection of colors in the lower rows signifies weight and pressure, gradually transitioning to lighter hues that evoke a sense of release and airiness. The spiral flow within the layout promotes a dynamic tension, while the scattered repair style reflects interruptions, emphasizing both the imperfection of emotions and the quiet spaces that exist between them.</desc>
