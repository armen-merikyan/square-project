<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This artwork explores the tension between joy and grief through contrasting colors and patterns. The palette mixes vibrant yellows and oranges representing joy against darker muted purples and deep blues that embody grief. The central lower half creates a sense of weight and heaviness, while the upper half feels lighter and more expansive, suggesting an emotional split. The patterns of maze and frame showcase the complexity of these emotions, with bright accents interrupting the heavier backgrounds to emphasize the struggle between light and dark. Broken pixels introduce imperfection, reflecting the unpredictability of emotional experience.</desc>
