<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Wedges</title>
  <desc id="desc">This composition explores the emotional dichotomy of longing and resolve through a diagonal layout that separates two contrasting patterns. The palette of soft pink, vibrant red, muted gray, and dark maroon reflects the nuances of love and betrayal, illustrating the push and pull between hope and the sharp edges of damage. The main collision occurs centrally, where delicate maze-like patterns of longing disrupt the firm stacks of resolve, suggesting both connection and friction. Broken pixels add intentional disruptions, echoing the chaos in healing while still allowing for negative space that emphasizes a sense of serenity amid pressure.</desc>
