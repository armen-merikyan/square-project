<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone revolves around the tension between desire and emptiness, illustrated through contrasting color dynamics. The palette of hot coral and blood orange reflects vivid desire, while charcoal and hollow blue evoke emptiness. The primary collision occurs in the center, where the rippling desire meets the glitching emptiness, producing an abrupt disruption that suggests the struggle between feeling overwhelmed and contained. This evokes the sensation of an overflowing emotion striving against a restrictive boundary, while the falling arrangement mirrors tears or rain, further emphasizing the theme of longing within a limited space.</desc>
