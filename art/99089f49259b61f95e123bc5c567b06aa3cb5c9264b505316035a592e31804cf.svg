<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal in the Ashes</title>
  <desc id="desc">This piece captures the tension between ephemeral spark and settled ash through contrasting colors and patterns. The palette features deep teals and cosmic indigos representing the 'spark', contrasted with shades of void black and cold gold symbolizing 'ash'. The left side exhibits a ripple pattern, invoking movement and energy, while the right side employs a crosshatch design to suggest stillness and heaviness. The interplay of these patterns creates a sense of conflict and resolution, culminating in a dynamic piece that animates the struggle between light and dark, resilience and fragility.</desc>
