<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This piece explores the emotional duality of longing and resolve through a diagonal layout. The palette blends muted tones of 'compressed red' and 'faint peach' to emphasize tension, with 'dark navy' and 'dust gray' creating a firm contrast. The center features a collision of warm threads representing longing against the rigidity of firm frames symbolizing resolve, illustrating a push and pull between these emotions. The use of broken pixels introduces intentional disruption, reinforcing the theme of repair amidst damage. The negative space is intentionally placed to highlight both emotions, ensuring clarity and readability in the abstract design.</desc>
