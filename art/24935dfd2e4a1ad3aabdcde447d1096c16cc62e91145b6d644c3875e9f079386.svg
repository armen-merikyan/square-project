<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece captures the emotional dynamism of desire and restraint through contrasting saturated and muted colors. The selected palette of red oxide and blackened plum evokes a sense of warmth and heat, emphasizing desire, while the muted cream and iron gray suggest restraint and containment. The primary collision occurs in the center where vibrant layers interrupt the muted grid, symbolizing the tension between longing and limitation. The rising signal layout guides the viewer's eye upward, suggesting an aspirational movement amid the locked borders, represented by quiet negative spaces.</desc>
