<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">The emotional tone blends quiet with pressure, using a palette that reflects both soft and saturated colors. The dominant quiet hues create a muted field, representing calmness, while sharp contrasting elements introduce pressure that interrupts this tranquility. The abstraction of the seed is expressed through a dense collection of colors at one corner, gradually loosening towards the opposite edge, creating a sense of flow and transformation from crowding to clarity, emphasizing the tension between hard edges and soft zones.</desc>
