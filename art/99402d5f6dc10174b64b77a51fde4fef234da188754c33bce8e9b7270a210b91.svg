<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Balance</title>
  <desc id="desc">The emotional tone captures the tension between trust and suspicion through contrasting dark and warm colors. The palette uses warm ivory and soft gold to express trust, set against deep wine and ash gray representing suspicion, creating a layered complexity that feels both warm and hesitant. The primary contrast appears in the upper-left corner, where a buildup of density signifies suspicion, while the remaining space softens into an open, inviting glow of warmth, reflecting trust. This asymmetry aligns with the 'pressure_corner' layout, embodying the idea of emotional collision as suspicion pushes against a border of safety and warmth.</desc>
