<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This piece captures the emotional dichotomy of restlessness and peace through a palette of deep blue and pale yellow hues, suggesting a shift from calm to agitation. The darker tones represent moments of stillness while the brighter shades signal abrupt interruptions and dynamic motion. The central collision occurs in the middle rows, where dark and light colors coexist, illustrating an inner struggle. The split-screen pattern represents contrasting emotions lined with broken pixels that disrupt the order, mirroring life's unpredictable nature. The overall composition is meant to evoke a sense of yearning and quiet tension, balanced by moments of clarity.</desc>
