<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone combines chaos and clarity, reflecting the struggle between signal and noise. The palette of signal green, electric blue, and hot magenta creates a vibrant contrast against static gray and dead black, symbolizing clarity emerging from confusion. The main collision occurs centrally where stacked green hues disrupt the scattered gray, creating an incomplete repair appearance. This captures the essence of overlapping emotions—intense but fragmented, reflecting memory vs. erasure in a serene yet chaotic manner.</desc>
