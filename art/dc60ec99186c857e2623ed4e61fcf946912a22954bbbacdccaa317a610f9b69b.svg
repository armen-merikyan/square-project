<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork embodies the emotional tension between rage and calm. The left half features intense, jagged red tones, representing explosive rage, while the right half embraces cool, structured blues and whites, symbolizing calm and containment. The contrast is most notable at the vertical divide, where the aggressive chaotic red threads clash against the serene pale blue lattice. This composition tells a story of emotional struggle—a contained calmness overtaken by surging pressure and noise, perfectly echoing the seed's themes.</desc>
