<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece captures the tension between restlessness and peace, represented by the choice of a dark palette contrasted with pale accents. The conflict is evident in the arrangement of colors—quieter fields of dim cyan create a sense of shelter, while unexpected, fragmented segments of navy and black invoke a restless motion. The collision happens broadly down the diagonal, echoing both a fracture and a protective gesture among the colors. The broken pixels disperse tension, symbolizing disruptions within the structured squares, illustrating the struggle of memory and movement within abstract confines.</desc>
