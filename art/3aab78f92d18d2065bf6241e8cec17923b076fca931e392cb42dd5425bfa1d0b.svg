<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Worlds</title>
  <desc id="desc">This artwork encapsulates the emotional tension between control and panic through a stark division of colors. The top half incorporates a stable grid pattern representing control with muted sepia and tan tones, suggesting a sense of order. In contrast, the bottom half exhibits a chaotic crosshatch, introducing broken pixels and a greater density of dark colors, embodying panic. The clash between these two emotional states is felt most strongly at the center where control meets chaos; this collision creates a dynamic flow that echoes the seed's themes of confrontation and imbalance.</desc>
