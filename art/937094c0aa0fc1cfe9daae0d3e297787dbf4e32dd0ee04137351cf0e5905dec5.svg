<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">This piece captures the tension between relief and dread through contrasting colors and their placement. The chosen palette of pale mint, soft sky, storm gray, near black, and faded gold reflects emotional shifts, with storm gray and near black dominating the piece to represent dread against the soft sky's relief. The collision occurs in the center with a cluster of dark tones, dispersing into lighter edges, symbolizing both the weight of dread and hints of relief. The spiral flow suggests a movement from chaos to order, while the broken pixel imperfections create a sense of ancient fire, hinting at both fragility and strength.</desc>
