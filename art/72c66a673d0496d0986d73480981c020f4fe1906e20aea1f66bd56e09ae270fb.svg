<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone of this artwork encapsulates the tension between desire and emptiness. The contrasting palette reflects saturated, warm hues of desire with soft, low-saturation shades of emptiness. The main collision occurs in the center, where the rich coral and orange colors meet the muted blue and charcoal tones, symbolizing the struggle of craving against the constraints of containment. The layout features a broken frame, suggesting a boundary that is both intact and feelingly disrupted, allowing for glimpses of intensity while maintaining an overall quiet pressure. The chosen patterns of hinge and stairs symbolize the rise and fall of emotions, embodied through color placement and tonal shifts.</desc>
