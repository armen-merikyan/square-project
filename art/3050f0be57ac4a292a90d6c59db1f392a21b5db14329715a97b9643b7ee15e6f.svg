<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension at the Threshold</title>
  <desc id="desc">This artwork embodies the conflict between defiance and submission, with a heavy center contrasting lighter edges. The palette of warm ivory and deep wine evokes a sense of guilt and forgiveness, representing the struggle inherent in the emotional dichotomy. The collision of the 'crack' pattern of defiance in dark tones meets soft, ember-like patterns at the edges, creating an effect of tension where bold colors assert strength but are tempered by the softness around them. The broken pixels serve as intentional disruptions, reinforcing the complexity of navigating these emotional landscapes.</desc>
