<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The artwork embodies a tension between desire and emptiness by utilizing a saturated palette of warm corals and oranges that dominate the upper section, signifying the pull of desire. The lower section employs low-saturation grays and blues, representing emptiness. The collision between the two is accentuated in the middle where the two colors meet, creating a stark edge, echoing the struggle against a locked boundary. Rippling patterns in the warm colors contrast with the subdued tides of the cooler tones, capturing the essence of yearning against restraint.</desc>
