<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Uncertainty</title>
  <desc id="desc">This piece encapsulates the emotional tension of awe and terror by juxtaposing clusters of deep, radiant colors against more subdued shades. The dominant palette of burnt orange and gold against dark reds and charcoal creates a striking contrast that represents the battle between order and chaos. The warm colors evoke awe while the cooler tones introduce an element of terror, with soft edges providing a feeling of instability. The central division hints at a 'split screen,' reinforcing the emotional narrative of an ongoing conflict between two opposing feelings.</desc>
