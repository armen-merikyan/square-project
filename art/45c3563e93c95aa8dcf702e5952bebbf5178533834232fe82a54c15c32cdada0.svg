<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Caught Between Longing and Resolve</title>
  <desc id="desc">The piece embodies the emotional tension between longing and resolve, utilizing a palette of muted cream, red oxide, iron gray, blackened plum, and small orange. The muted colors signify the feeling of yearning, while the red oxide and small orange punctuate the composition with urgency and vitality. The primary contrast occurs in the upper left corner, where densely packed colors collide in a chaotic crosshatch that reflects the pressure of longing against the more structured shatter pattern that spreads toward the bottom right, mimicking the concept of resolve. The placement inspires thoughts of a 'cage', with its implications of confinement juxtaposed with the overflow of colors signifying an emotional burst, creating an intricate narrative of struggle, repair, and growth.</desc>
