<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This composition explores the juxtaposition of relief and dread, with the left side embodying density and grounding while the right transitions into a lighter, more expansive atmosphere. The palette includes cooling tones of pale mint and soft sky contrasted with the weight of storm gray and near-black, representing the tension between the two emotions. The dense layering on the left corresponds to 'dread' with a tight, rhythmic pattern, while the right's loose and lighter 'relief' allows for exhale and spacing. The collision mainly occurs vertically through the center, where these patterns overlap, signaling an emotional shift from oppression to liberation. Broken pixels introduce intentional imperfections, adding to the narrative of disruption and decay.</desc>
