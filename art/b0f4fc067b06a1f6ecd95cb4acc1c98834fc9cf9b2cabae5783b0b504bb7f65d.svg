<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tidal Fracture</title>
  <desc id="desc">This composition captures the juxtaposition of pressure and quiet, illustrating an emotional tension that emerges from dense clusters on one edge, loosening into calm negative space. The palette combines muted gray and soft off-white with punctuations of compressed red and dark navy, creating a striking contrast that can be felt like a wave crashing against a fragile shore. The collision primarily occurs across the diagonal, where darker hues contend with the lighter, conveying the struggle of clarity amidst confusion. The patterns 'broken_frame' and 'static' intertwine, revealing a dance of form and void, pressure and release within the 8x8 grid.</desc>
