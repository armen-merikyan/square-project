<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">This composition contrasts the vibrant bursts of joy represented by bright yellows and oranges against the heavier, more muted tones symbolizing grief in blue and purple. The darker colors dominate the left side of the grid, echoing a sense of weight, while the right side features lighter colors that pulse and expand, creating a dynamic interplay. The arrangement reflects a battle of emotions with symmetry broken by asymmetrical placement of colors, exemplifying the struggle of joy against grief. Jagged edges create a sense of disruption, mirroring the theme of betrayal for a deeper emotional resonance.</desc>
