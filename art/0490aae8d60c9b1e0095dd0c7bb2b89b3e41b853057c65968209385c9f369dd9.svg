<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Contrast</title>
  <desc id="desc">This artwork encapsulates the emotional tension between 'spark' and 'ash' through a palette that juxtaposes brightness and darkness. The clean white and bright warning orange represent moments of ignition and energy, while the ink black and violet gray signify the weight of restraint and the settling of ash. The collision occurs diagonally, where the stack pattern of 'spark' meets the crack pattern of 'ash,' resulting in a dynamic interplay of light and shadow across the square. This suggests the struggle of moving towards vitality while being held back by past memories. The use of broken pixels introduces intentional disruptions, echoing the scars of experience and the journey towards resilience amidst fragility.</desc>
