<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a struggle between desire for fulfillment and the constraints of emptiness. The palette, featuring warm tones (hot coral, blood orange) against cooler shades (charcoal, hollow blue), amplifies the tension of the emotional conflict. The pattern juxtaposes saturated, ladder-like forms that symbolize rising desire against the delicate, thread-like paths of emptiness, creating collisions throughout the piece. The edge style emphasizes a border-defining separation, highlighting the theme of restraint. The placement of the contrasting elements around the central point of the square engenders a feeling of chaotic longing entrapped by limitations.</desc>
