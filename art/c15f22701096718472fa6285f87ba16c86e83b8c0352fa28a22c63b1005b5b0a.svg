<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Shelter</title>
  <desc id="desc">This composition illustrates the emotional tension between safety and exposure, with the pale center representing vulnerability. The palette juxtaposes warm browns to convey safety against the cool pale tones of exposure, creating a visual echo of contrasting emotions. The clusters of shelter green break the central area, suggesting soft boundaries while the cold whites ripple outward, symbolizing the exposure to chaos. The primary focus collides at the center with a weighty presence of safety, while outer areas dissolve into the open blue, an echo of uncontained feelings. The patterns of target and ripple enhance this emotional interplay, inviting viewers to experience the delicate dance between protection and vulnerability.</desc>
