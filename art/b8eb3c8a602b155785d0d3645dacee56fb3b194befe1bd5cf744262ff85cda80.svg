<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Equilibrium</title>
  <desc id="desc">This piece encapsulates the emotional dichotomy of spark and ash through the contrasting use of warm and cool colors. The palette combines faded golds and soft skies to evoke a sense of hope against the backdrop of ash-gray quietude. The primary collision occurs in the center, where warm golden hues burst into cooler storm grays, symbolizing conflict and resilience. The broken pixels are distributed along the edges, reflecting imperfections and memories that fade yet linger, aligning with the theme of memory versus erasure. The asymmetrical placement of colors creates a tension that embodies the struggle between hunger and restraint, while the use of negative space invites contemplation amidst the chaos of color.</desc>
