<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast in Tension</title>
  <desc id="desc">This artwork embodies the emotional struggle between safety and exposure. The warm brown and shelter green on one side evoke a sense of protection, while the cold white and open blue offer a feeling of vulnerability. The diagonal arrangement visually represents the push and pull of these contrasting emotions. The palette was chosen to reflect warmth mingling with coolness, illustrating emotional tension. The collision occurs in the center, where the mirror-patterned colors meet the flame-patterned textures, creating a dynamic interplay that represents the psychological battle. Intentional broken pixels add an irregularity, suggesting the scars that come from navigating these emotions.</desc>
