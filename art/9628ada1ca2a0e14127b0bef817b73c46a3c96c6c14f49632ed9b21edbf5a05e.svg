<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">The emotional tone captured here reflects the tension between safety and exposure, where warm colors signify protection while cooler tones evoke the chill of openness. The palette consists of shelter green and warm brown contrasting with cold white and open blue to depict a calm yet dynamic emotional state. The layout, characterized by a vertical split, creates a central collision where warm threads seem to weave their way through ash fields of cold white, creating an impression of both pressure and release. Broken pixels intentionally disrupt the flow, suggesting imperfections in safety and the uncanny feeling of exposure, reinforcing the theme through layered texture and visual tension.</desc>
