<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece captures the emotional tension between vulnerability and strength through a diagonal disarray of color. The palette utilizes warm yellows and oranges to represent strength, contrasted sharply with a muted purple, symbolizing vulnerability, allowing for a dynamic interplay within the square. The central collision occurs in the middle of the grid, where bright colors burst through the darker, quieter tones. This arrangement reflects the ongoing battle between exposure and safety, evoking a sense of both tension and release as patterns of barcode and constellation disrupt one another while maintaining an underlying structure.</desc>
