  <title id="title">Emotional Flux</title>
  <desc id="desc">This artwork represents the tension between joy and grief using contrasting color palettes. The warm yellows and oranges are allocated to the edges, symbolizing joy's brightness pushing against the darker, muted blues and purples representing grief, centered asymmetrically to convey imbalance. The broken edges emphasize the theme of imperfection, while the arrangement creates a sense of pulse—reflecting emotional rhythms. The presence of negative space aids in showcasing the dichotomy of feelings, allowing for an exploration of relief amidst tension.</desc>
