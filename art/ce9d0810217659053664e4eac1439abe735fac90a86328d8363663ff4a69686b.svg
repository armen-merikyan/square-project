  <title id="title">Emotional Tension</title>
  <desc id="desc">This piece captures the tension between panic and control through the juxtaposition of contrasting colors and patterns. The dark colors signify the weight of panic, while the lighter tones hint at a desire for control. The broken dots and crosshatch patterns create visual disturbance, embodying the clash between these two states. The layout splits the canvas, reinforcing the sense of conflict, while negative spaces allow moments for unrest and reflection.</desc>
