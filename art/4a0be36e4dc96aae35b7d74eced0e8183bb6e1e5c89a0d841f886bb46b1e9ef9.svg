<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure of Desire</title>
  <desc id="desc">The emotional tone explores the tension between desire and restraint, captured through the use of bright, saturated tones contrasted against muted colors. The palette of hot coral and blood orange conveys desire, while charcoal and hollow blue represent restraint. This creates a dynamic interplay where hot colors invade from a corner, pushing towards a more contained, cool space at the opposite edge. The saturation versus muteness highlights the conflict between yearning and limitation, with the broken pixels symbolizing imperfections in this emotional exchange. The main collision occurs diagonally, emphasizing the feeling of an unstoppable force pressed against a barrier.</desc>
