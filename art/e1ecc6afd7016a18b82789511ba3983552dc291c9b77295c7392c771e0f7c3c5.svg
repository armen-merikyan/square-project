<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tear Through Connection</title>
  <desc id="desc">This artwork explores the emotional tension between loneliness and connection through a careful balance of warm and cool tones. The palette of yellow and orange evokes warmth and connection while the deeper blues and muted purples suggest the coolness of solitude. The center, comprised of fiery hues, bursts through a grid of cooler tones, showing the struggle between hidden and exposed emotions. The contrasting colors create a visual echo of connection battling against isolation, and the broken pixel strategy enhances the sense of imperfection while adding to the narrative of vulnerability and the rawness of emotional experiences.</desc>
