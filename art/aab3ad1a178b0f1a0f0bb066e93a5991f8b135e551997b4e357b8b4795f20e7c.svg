<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotion</title>
  <desc id="desc">This artwork captures the dualities of joy and grief through contrasting colors and patterns. The palette blends bright yellows and oranges representing joy with deep blues and muted purples symbolizing grief. The layout follows a rising signal, with brighter colors emanating from the center, creating a visual representation of hope while jagged edges suggest chaos. The interspersed burned edges evoke a sense of interruption, emphasizing the emotional struggle. The asymmetry further strengthens the narrative of tension between order and chaos. Broken pixels add a layer of imperfection, echoing the fragility of emotions.</desc>
