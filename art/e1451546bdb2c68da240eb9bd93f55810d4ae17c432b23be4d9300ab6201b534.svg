<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This piece embodies the emotional duality of restlessness and peace through a striking contrast of colors and placements. The palette merges warm and cool tones, embodying the clash between serene balance and unsettling motion. The tension is concentrated in the central diagonal, where jagged edge patterns intertwine, creating a stuttered pulse against calm islands. Broken pixels interject chaos into the serene structure, leading to patches of negative space that allow the viewer to breathe. This abstract representation of 'flame against shatter' resonates through the interplay of light and dark, capturing the essence of the seed's themes.</desc>
