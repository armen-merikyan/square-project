<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Light and Shadow</title>
  <desc id="desc">The emotional tone captures the tension between fleeting sparks of brightness and the settling quiet of ash. The palette (yellow, orange, deep blue, muted purple) evokes warmth and coolness in contrast, reflecting both the vibrancy of sparks and the subdued nature of ash. The main collision occurs at the center where brighter colors sharply intersect with darker tones, suggesting a dynamic interplay of resilience and fragility. The use of radial patterns for ash and glitch for spark reflects the chaotic nature of memories conflicting with the calm of erasure, creating a rich emotional narrative.</desc>
