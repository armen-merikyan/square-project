<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Boundaries</title>
  <desc id="desc">The emotional tone oscillates between intense desire and the quiet restraint, reflecting a dynamic tension. The palette of warm colors (hot coral, blood orange, dust pink) symbolizes the passionate ascent, while the cooler shades (charcoal, hollow blue) create boundaries and negative space, mirroring the feeling of restraint. The primary collision occurs centrally, where warmer tones burst forth, meeting the calmness of cooler colors, representing an inevitable push and pull. This abstract arrangement evokes a complex narrative of desire, pressure, and the fight against containment.</desc>
