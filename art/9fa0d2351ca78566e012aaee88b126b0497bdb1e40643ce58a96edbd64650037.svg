<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Into the Flame</title>
  <desc id="desc">This composition embodies the push and pull between joy and grief. The left side radiates warmth with bright yellows and oranges, reflecting joy—open, expansive, and vibrant. In contrast, the right side dwells in deep blues and muted purples, symbolizing grief—fragmented and heavy. The split layout emphasizes the duality of emotion while the soft wave-like patterns suggest a fluidity between the two states. The use of broken pixels introduces an element of imperfection, mirroring the complexities of these emotions, enhancing the sense of collision between bright and muted fields.</desc>
