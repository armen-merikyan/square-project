<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Suspicion</title>
  <desc id="desc">This artwork explores the emotional tension between trust and suspicion through a rising vertical flow. Warm pinks contrast against dark maroon and muted grays, embodying hope versus doubt. The center features a strong split of colors resembling the noise that interrupts the signal of trust. Broken pixels signify disruption and fragility amidst resilience, giving a visual pulse to the composition. Soft glow colors suggest warmth while hard shadows convey depth, creating a dialogue of emotional collision across the canvas.</desc>
