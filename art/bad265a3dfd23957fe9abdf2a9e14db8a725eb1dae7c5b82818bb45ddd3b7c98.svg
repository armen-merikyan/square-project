<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects the tension between desire and restraint, showcased through a vibrant palette of saturated hues clashing against muted tones. The color choices create a heat of desire with coral and orange, contrasted by calm charcoal and hollow blue, embodying a struggle at the center. The layout is designed to mirror with intentional disruptions, emphasizing the inability to expand beyond a defined border. This introduces a spiraling pressure throughout, suggesting a dance of emotions where the saturated is forced to intertwine with the muted.</desc>
