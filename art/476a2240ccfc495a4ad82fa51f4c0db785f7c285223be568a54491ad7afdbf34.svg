<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">The artwork reflects the tension between longing and resolve, illustrated through contrasting patterns. The palette combines earthy greens and browns with cool whites and blues to create a dialogue of safety vs. exposure. The central seam represents the collision between the two emotional states, using a fault line pattern for longing, expressed through warm earth tones that imply desire and unfinished paths, while the grid pattern for resolve uses cooler colors to signify clarity and boundary. Broken pixels disrupt the grid, mirroring the unpredictable nature of emotions, leaving intentional negative space to evoke a sense of yearning.</desc>
