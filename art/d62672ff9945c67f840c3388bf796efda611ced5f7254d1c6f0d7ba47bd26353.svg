<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This composition captures the emotional tension between restlessness and peace through a clash of colors and patterns. The palette, featuring clean whites and deep blacks alongside softer hues of ice blue and violet gray, represents the stark contrast between calmness (white and blue) and unsettling energy (black and orange). The main collision occurs diagonally, where the broken dots of restlessness in the bottom left clash with the flooded calm of the top right. The 'single_pixel' shape seed is abstractly represented through disrupted spacing, allowing negative space to integrate tension and suggest unresolved motion. This layout creates a visual dialogue of moving toward tranquility against a backdrop of chaos.</desc>
