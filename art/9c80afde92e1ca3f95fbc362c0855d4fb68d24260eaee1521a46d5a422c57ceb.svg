<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Desire Held Back</title>
  <desc id="desc">The emotional tone reflects a tension between warm desire and cool restraint. The color palette, featuring rich red oxide and muted cream against a backdrop of blackened plum and iron gray, juxtaposes saturation with mutedness, suggesting an internal conflict. The main contrast occurs at the center where warm, diagonal channels of red oxide and small orange collide with static areas of muted cream and iron gray, creating a visual heartbeat of desire meeting its limits. The pixel arrangement embodies a spiral pressure rising from a corner, fighting against a sealed edge, capturing the essence of desire confronting restraint.</desc>
