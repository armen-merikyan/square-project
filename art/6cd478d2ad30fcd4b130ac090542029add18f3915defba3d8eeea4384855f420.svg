<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Colors</title>
  <desc id="desc">The emotional tone juxtaposes 'relief' with 'dread.' The palette features soft mint and sky blue to evoke a sense of calm, contrasted with dark storm gray and near black suggesting heaviness. The main collision occurs centrally, where the scattered static patterns of lighter hues seem to repair or break through the heavier, chaotic gray textures. This reflects the seed's themes of pressure and resolution through color selection and placement that swirl into each other without definitive boundaries, embodying the tension between opposing emotional states.</desc>
