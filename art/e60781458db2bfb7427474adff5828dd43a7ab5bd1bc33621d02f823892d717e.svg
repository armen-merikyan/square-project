<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Fire and Silence</title>
  <desc id="desc">The emotional tone of this piece reflects the duality of spark and ash—where vibrant, sudden bursts of color clash against muted, settled tones. The palette comprises moss green, bone white, rust, stone gray, and small gold, symbolizing resilience and fragility. The main collision occurs in the diagonal layout, with a concentration of warm hues representing spark in the lower left, while cooler, muted tones suggest the erosion of memory and the weight of ash in the upper right. The broken pixels add intentional disruptions, evoking scars or remnants of what once was, enhancing the tension. By balancing 65% of the canvas with vibrant colors that suggest urgency against a backdrop that denotes restraint, the piece becomes a visual dialogue of struggle and harmony.</desc>
