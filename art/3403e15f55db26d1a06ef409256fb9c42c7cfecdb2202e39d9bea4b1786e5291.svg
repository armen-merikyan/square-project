  <title id="title">Between Protection and Exposure</title>
  <desc id="desc">This composition balances the emotional tension between vulnerability and strength. The palette draws from warm tones (yellow, orange) to evoke feelings of strength and protection, contrasted with cool tones (deep blue, muted purple) that symbolize vulnerability and exposure. The main collision occurs through the broken dots and solid blocks, where soft, thin shapes punctuate the stable center, representing the fragile intersection of these contrasting emotions. The arrangement intentionally leaves negative space, allowing the viewer to sense the tension between shelter and exposure.</desc>
