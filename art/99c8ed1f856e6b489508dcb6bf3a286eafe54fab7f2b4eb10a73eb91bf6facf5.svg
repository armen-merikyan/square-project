<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissonant Harmony</title>
  <desc id="desc">The emotional tone represents a dance between trust and suspicion, where the deep, rich colors embody suspicion while the glowing, softer hues illustrate trust. The palette, influenced by 'ancient_fire', uses burnt orange and dark red to evoke tension and caution, alongside the calming charcoal and gold to suggest warmth and serenity. The main contrast occurs centrally, where dense, warm colors collide with edgier, darker tones, suggesting an interruption of peace. This interplay of color fosters a visual narrative of resilience amidst anxiety, reflecting the seed's concept in an abstract form.</desc>
