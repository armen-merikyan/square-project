<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Two Patterns</title>
  <desc id="desc">This artwork captures the emotional conflict of defiance versus submission, expressed through contrasting colors and patterns. The dark violet and soft gold represent the tension of defiance, dominating the center, while the quiet pale green suggests a soft submission around the edges. The collision occurs predominantly at the center where the more aggressive ash field pattern interacts with the softer, broken frame, creating an intriguing dynamic. Broken pixels add to the depth and imperfection, supporting the theme of battle between feelings, thereby transforming the seed into an abstract representation of struggle.</desc>
