<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Silence and Weight</title>
  <desc id="desc">The emotional tone is derived from the duality of relief and dread. The palette, inspired by 'ancient_fire,' introduces warmth with burnt orange and gold, contrasting against the heavy charcoal and dark red to embody the collision of feelings. This contrast is palpable in the way brighter colors punctuate darker regions, creating a rhythm of high pressure and quiet. The layout reflects two battling patterns, fostering a sense of chaos amid calculated breaks in density, leading to moments of visual relief amid clashing colors.</desc>
