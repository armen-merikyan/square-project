<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Emotion</title>
  <desc id="desc">This artwork embodies the tension between envy and gratitude, represented through contrasting elements in colors and patterns. The warm palette of burnt orange, dark red, gold, and charcoal evokes a sense of ancient warmth while highlighting the resonant feelings. The pattern of flame conveys rising hopes against the cool, muted notes of charcoal which add depth and a sense of grounding. The layout mirrors the internal conflict, with slight asymmetry to represent broken expectations. Tension rises from the center outward, showcasing the juxtaposition of feelings as they interact and collide.</desc>
