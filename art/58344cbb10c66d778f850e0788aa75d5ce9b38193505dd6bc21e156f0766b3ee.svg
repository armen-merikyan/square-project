<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone captures the tension between awe and terror, using a palette of black, red, pale blue, and white to create juxtaposition. The black and red evoke a sense of deep emotional weight, conjuring feelings of terror, while pale blue and white emphasize awe and calmness. The layout sees a central pixel diverging vertically into chaotic wave patterns that symbolize the split between emotion ordering and chaos, mirroring the colliding feelings. The pattern differentiates itself through a maze-like quality on one side (reflecting awe) and a mirrored disorder on the other (reflecting terror), resulting in a visual conflict that resonates with broken memory. The negative space balances the density, ensuring a shift from calmness to pressure and a sense of unresolved motion.</desc>
