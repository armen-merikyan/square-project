<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional contrast between rage and calm is reflected in the use of a vibrant red against calm, pale blues and white. The palette speaks to the explosive nature of rage while the cooler colors attempt to create a soothing effect, resulting in a visual tension. The diagonal layout captures the struggle between overflowing chaos in the bottom left, represented by jagged red pixels, and the quiet expanse of blue space in the top right. The collision of patterns manifests as chaotic sparks intruding upon a calm field, inviting the viewer to navigate the intersection of noise and serenity.</desc>
