<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Hearts</title>
  <desc id="desc">This artwork embodies the emotional tension between joy and grief, using a palette of warm yellows and oranges to represent joy alongside muted purples and deep blues for grief. The contrast lies in the balance of 4 warm colors against 4 cool colors, echoing the push and pull of these emotions. The left side is denser, interrupted by a chaotic ring pattern, representing grief's weight, while the right mimics an expansive staircase of joy, creating a dynamic yet fractured symmetry, reflective of the heart's oscillation between these feelings. The presence of 'broken pixels' adds to the imperfection and complexity of love and betrayal, allowing for a rich narrative without depicting symbols.</desc>
