<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow and Containment</title>
  <desc id="desc">The emotional tone reflects a tension between rage and calm, symbolized by the explosive red and the tranquil pale blue. By placing the hotter, saturated reds in the top-left corner, the piece evokes a sense of overflowing energy. The cooler tones create a calming resistance, particularly in the lower-right, which is more muted to allow negative space that emphasizes the chaotic edge. Broken pixels disrupt the smoothness, suggesting interruptions in calm or violent eruptions. This arrangement captures a dialogue of emotional push and pull, resonating with the seed’s themes.</desc>
