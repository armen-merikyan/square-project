  <title id="title">Fractured Pulse</title>
  <desc id="desc">The emotional tone of this artwork embodies the tension between love and betrayal, illustrated through contrasting color values. The warm tones of pink and red signify love, while the darker maroon and gray evoke feelings of betrayal. The layout is split horizontally, with love occupying the upper half and betrayal the lower, creating an inherent division, like a broken heart. The patterns of radial symmetry in both halves reflect unity while suggesting undercurrents of conflict. The broken pixels signal imperfection, mimicking the jagged emotions tied to the theme, while the diamond shape forms a central point around which the contrasting energies collide. By leaving negative spaces strategically, the artwork allows for reflection amid emotional chaos.</desc>
