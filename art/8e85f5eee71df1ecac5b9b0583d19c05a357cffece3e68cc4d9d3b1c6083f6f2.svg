<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Limits</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of desire and restraint, using a palette that combines dynamic warm tones with subdued cool shades. The main contrast occurs in the center where bright accents (small_orange) are surrounded by muted colors (muted_cream and blackened_plum), illustrating the struggle between overflowing desire and containment. The layout, resembling eroded symmetry, reflects the decay of strict borders, while broken pixels introduce intentional imperfections, adding depth and complexity to the emotional narrative. Ultimately, it portrays a spiraling impact of pressure against limitations, inviting the viewer to engage with the flow and intentional collisions within the piece.</desc>
