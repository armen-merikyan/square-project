<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Resolution</title>
  <desc id="desc">The emotional tone of this piece captures the conflict between longing and resolve, represented through contrasts of warmth and coolness. The palette of hot coral, blood orange, and charcoal evokes feelings of urgency and desire, while hollow blue adds a sense of emptiness. The main collision occurs centrally, where the 'longing' (represented by a tide pattern in warm colors) meets 'resolve' (represented by a glitch pattern in cooler hues). The broken pixels symbolize moments of interruption and imperfection within this tension, creating a narrative of unresolved tension against a quieter background.</desc>
