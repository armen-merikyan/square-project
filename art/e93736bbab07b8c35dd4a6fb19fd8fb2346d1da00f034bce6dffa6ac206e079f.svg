<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Broken Harmony</title>
  <desc id="desc">The emotional tone navigates between the warmth of love and the pain of betrayal. The palette, featuring shades of pink and red against gray and dark maroon, evokes a sense of conflict and duality. The contrast emerges primarily in the split layout where warm hues attempt to harmonize while cool, muted tones interrupt, creating an asymmetric resonance. The patterns of a checkerboard (betrayal) and split-screen (love) interplay across the canvas, illustrating tension. This composition represents a struggle between opposites, encapsulating the complex feelings of connection and disconnection, perfect for invoking the emotional themes from the seed.</desc>
