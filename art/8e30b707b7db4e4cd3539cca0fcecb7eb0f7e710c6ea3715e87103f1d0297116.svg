<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone of the artwork captures the intense dichotomy between defiance and submission. The chosen palette of red, pale blue, black, and white speaks to the stark contrast between heated resistance (red) and the calming effect of submission (pale blue). Defiance occupies the central area, marked by a halo pattern, suggesting a bold, fiery stance. The edges, framed in pale blue and white, present a soft and yielding contrast, hinting at vulnerability. The collision occurs in the center where the fiery red disrupts the tranquil blue, creating a focal point that draws the viewer's eye. Broken pixels add intentional imperfections, symbolizing the struggles within this emotional conflict. The diagonal layout enhances the argument between these two opposing forces, allowing for a vivid portrayal of their dynamic interplay through color and placement.</desc>
