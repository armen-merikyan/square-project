<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shattered Resilience</title>
  <desc id="desc">This piece captures the emotional tension between vulnerability and strength. The palette features contrasting colors: warm coral and soft amber invoke warmth and lightness, symbolizing vulnerability; while cold slate and blue-black represent strength, emphasizing depth and starkness. The central area, filled with brighter hues, signifies the fragile point of light amidst darker edges, illustrating the tension of being both exposed and shielded. The pattern of quiet fields clashing with ladder-like interruptions reflects the staggering nature of resilience against overwhelming odds, creating a compelling visual narrative of collision and resolution.</desc>
