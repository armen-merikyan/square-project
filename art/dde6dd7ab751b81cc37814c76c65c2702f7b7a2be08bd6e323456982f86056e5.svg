<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Weight</title>
  <desc id="desc">This composition explores the emotional duality of tenderness and rage. The palette of deep reds and soft blues creates a stark contrast, representing the clash between a hot, compressed center and gentle edges. The black provides density and weight, while white adds moments of light and space, symbolizing moments of calm amidst turmoil. The central collision occurs in the middle of the frame, where the saturated red maze pattern (rage) meets the muted blue scar pattern (tenderness), interrupting one another and creating a dynamic flow that symbolizes the tension and push-pull of emotional experiences. The edge style features glowing elements that further enhance the sense of conflict and motion.</desc>
