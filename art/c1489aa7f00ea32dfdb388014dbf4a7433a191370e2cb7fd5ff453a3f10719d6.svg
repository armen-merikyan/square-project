<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Connection</title>
  <desc id="desc">This piece explores the emotional tension between loneliness and connection. The palette, constructed from lime, electric blue, magenta, and black, creates a stark contrast - the bright tones suggesting connection and vitality, while the black adds a layer of isolation. The top half employs a checker pattern (symbolizing the fragmentation of connection), while the bottom half uses a mirror pattern, reflecting solitude. The two halves collide at the center, where the brightness of lime and electric blue clash with the depths of black, illustrating the push and pull of emotions. A few broken pixels in the top row hint at imperfection and the fractured nature of connection, while allowing ample negative space to imply loneliness.</desc>
