<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Extremes</title>
  <desc id="desc">The emotional tone juxtaposes defiance and submission, as expressed through a strong core of black (#000000) surrounded by vibrant colors, representing an intense confrontation at the center. The use of the palette, primarily featuring lime (#A8D600) and electric blue (#007FFF) against a deep black, provides brightness that fights against the darkness. The collision occurs centrally with bright accents breaking through darker regions, while the 'broken frame' elements create irregularities, echoing the imperfect nature of this emotional struggle. The layout of stacked bands leads the eye outward, showing a transition from dense central energy to quieter edges, reflecting open versus closed spaces.</desc>
