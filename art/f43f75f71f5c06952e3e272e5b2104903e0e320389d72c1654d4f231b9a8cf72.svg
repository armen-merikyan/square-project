<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Emotion</title>
  <desc id="desc">This composition encapsulates the tension between love and betrayal through a split vertical layout. The left side employs warm pinks and reds, reflecting love's vibrant embrace, with mirrored shapes suggesting connection. In contrast, the right side employs cooler gray and dark maroon tones, representing betrayal's isolation, using stripes to evoke a façade of order amidst chaos. The division elicits a sense of collision, where colors interact yet retain distinct territories, embodying the emotional struggle. The central 'heart_fragment' shape is intentionally disrupted by broken pixels, enhancing the feeling of imperfection and unresolved tension, while still leaving ample negative space to allow the emotions to breathe.</desc>
