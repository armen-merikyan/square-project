<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dichotomy of Nourishment</title>
  <desc id="desc">This composition explores the emotional contrast between warmth and quietude. The palette balances the hot accents of 'spark' (compressed red, faint peach) against the settled tones of 'ash' (dust gray, off white). The pattern arrangement features a perimeter of darker hues representing restraint while brighter colors weave through the center, illustrating hunger's pull. The main collision occurs in the central four columns with bright accents cutting through a muted background, echoing the tension of need against restraint and memory against erasure.</desc>
