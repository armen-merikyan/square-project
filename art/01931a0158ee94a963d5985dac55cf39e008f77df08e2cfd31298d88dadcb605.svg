<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone is a conflict between restlessness and peace, distinguished by contrasting patterns of shatter and checker. The palette uses cosmic indigo and deep teal as calming fields, while void black and star white create sharp interruptions. The main collision occurs at the center, where the chaotic shatter pattern is surrounded by quiet symmetry. This reflects a memory of conflict against a backdrop of calm, embodying the seed's themes of tension and tranquility.</desc>
