<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Shelter</title>
  <desc id="desc">This piece visualizes the tension between safety and exposure, employing a palette that balances both warm and cool tones. The central area, consisting of pale skin tones (#f5d0b7) and soft greens (#c3d7a4), represents exposure and vulnerability, while the surrounding darker browns (#4e3b31) and muted blues (#7a9bc2) form a protective barrier. The main collision occurs at the center-left, where the warm and cool colors intersect, suggesting a dynamic interplay of safety and freedom. The broken pixels introduce an element of unpredictability, echoing the 'wound' shape seed and enhancing the emotional narrative of contrast and tension.</desc>
