<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">The emotional tone navigates the tension of love's warmth against the chilling presence of betrayal. The chosen palette of pinks and dark maroons conveys a duality: warmth and comfort paired with colder, more muted tones reflecting hurt. The interplay between sharp edges and soft gradients creates a visual whisper of conflict—the background represents external pressure, with a central focus suggesting an inner turmoil. Patterns of flame and mirror evoke chaotic love and fractured trust, illustrating the complexity of emotions. The arrangement leaves intentional negative spaces to signify loneliness, accentuating the contrast between being surrounded and feeling empty.</desc>
