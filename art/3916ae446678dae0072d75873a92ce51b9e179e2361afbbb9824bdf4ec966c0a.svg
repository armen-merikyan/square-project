<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Ambivalence</title>
  <desc id="desc">This composition embodies the emotional tension between longing and resolve. The dominant black creates a grounded, steady rise up the square, representing resolve, while the electric blue and magenta accents flash against it, expressive of longing and unfulfilled desire. The arrangement prioritizes distance and separation, with broken pixels introducing intentional disruptions mirroring the concept of a broken mirror, emphasizing fractured expectations. The upper left features a concentrated burst of bright colors, representing urgency, while the bottom right provides calmness through black, allowing for a visual contrast that speaks to the complex balance of emotions.</desc>
