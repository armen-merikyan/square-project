  <title id="title">Contrast of Emotions</title>
  <desc id="desc">The artwork embodies a dynamic struggle between the vitality of 'spark' and the somber presence of 'ash.' The palette reflects this by contrasting 'mourning black' and 'deep blue' (representing ash) with 'new leaf' and 'pale yellow' (symbolizing spark). The left side features a stacked pattern representing ash's muted and settled forms, while the right employs a crosshatch that bursts with energy. The center's collision creates tension, invoking a sense of resilience battling against fragmentation, resonant with the seed's thematic contrasts and emotional depth.</desc>
