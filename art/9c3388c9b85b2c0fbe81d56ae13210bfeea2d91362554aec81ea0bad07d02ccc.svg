  <title id="title">Fragile Constellation</title>
  <desc id="desc">This artwork embodies the tension between vulnerability and strength through contrasting colors and patterns. The palette invokes awe and terror with deep teal, cosmic indigo, and void black representing weight and vulnerability, while star white and cold gold bring lightness and strength. The collision occurs at the center, where the colors interact chaotically, embodying both collision and reflection, creating an inner void ringed by stability, forming a representation of safety amidst exposure. The broken pixels give a sense of imperfection, echoing the fragility in strength.</desc>
