  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece embodies the emotional conflict between rage and calm, reflecting a dynamic tension. The palette contrasts vivid reds representing explosive rage against softer pale blues and whites symbolizing calm and containment. The main collision occurs diagonally from the top left to the bottom right, where jagged red pixels burst into the calm blue landscape, illustrating containment being disrupted by overwhelming emotion. The use of broken pixels introduces a sense of imperfection, emphasizing the struggle between chaotic and serene forces within the 8x8 composition.</desc>
