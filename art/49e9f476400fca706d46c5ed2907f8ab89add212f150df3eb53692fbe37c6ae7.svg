<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragile Resilience</title>
  <desc id="desc">This artwork captures the emotional tension between vulnerability and strength through a contrasting palette of mellow greens and sharp yellows. The layout creates a 'broken frame' that suggests protection but allows for exposure. The center is weighted with rich deep olive, embodying strength, while lighter accents of honey gold and cream flutter around, representing vulnerability. The gentle bends in the patterns invite a sense of flow from corner to corner. The intentional 'broken pixels' introduce deliberate imperfections, echoing the theme of strength and fragility through its structure.</desc>
