<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone of rage and calm is explored through a palette of reds and blues, representing explosive versus tranquil feelings. The palette is intentionally contrasting; saturated reds attempt to overflow while the cooler pale blues contain them. The collision occurs in the center of the grid, where jagged red stripes disrupt the calm blue cross patterns, suggesting a battle between chaos and serenity. This results in an abstract burst of tension and release, reflecting the seed's themes of eroded symmetry and machine emotion.</desc>
