<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone combines the tension between safety and exposure, reflected in a palette that features calming greens and browns contrasted against the starkness of cold whites and pale skins. This collision of warmth and coolness creates a dynamic flow from top to bottom. The main contrast occurs at the center through a spiral pattern, where the darker hues create a soothing sense of enclosure while lighter colors introduce an echo of exposure, symbolizing vulnerability. The edge is accented with broken pixels, suggesting imperfections and disruptions in the perceived safety. Overall, the arrangement captures a dialogue between the desire for shelter and the innate curiosity to explore the vastness beyond.</desc>
