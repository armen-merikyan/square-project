  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition embodies the tension between vulnerability and strength, using a stark palette that emphasizes contrasts. The dark colors create a sense of strength and density in the corners, while lighter tones radiate from the center, symbolizing exposure. The main collision occurs diagonally, with the strong colors encroaching upon the lighter fields, representing the interplay of protection and exposure. This reflects the emotional weight inherent in the seed, resulting in a vivid experience of conflict through color placement.</desc>
