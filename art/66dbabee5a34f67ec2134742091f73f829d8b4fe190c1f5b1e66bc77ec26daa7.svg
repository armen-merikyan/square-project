<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This abstract composition explores the emotional tension between tenderness and rage. The palette of muted blues and sharp reds serves to distinguish the softness of tenderness from the harshness of rage. The central area, with a saturation of white and pale blue, contrasts the surrounding jagged red tones to evoke raw emotion and chaos. The broken pixels intentionally disrupt the flow, representing vulnerabilities and imperfections, while the layout of stacked bands signifies layers of emotional strata, suggesting a climb from quiet introspection to intense feelings. The composition's balance, with the clash of soft and hard edges, encapsulates the journey from sheltered calm to exposed turmoil.</desc>
