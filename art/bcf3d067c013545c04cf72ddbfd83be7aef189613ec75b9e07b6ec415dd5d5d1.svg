  <title id="title">Tension Between States</title>
  <desc id="desc">The emotional tone captures the struggle between restlessness and peace, reflected in the contrasting patterns of checker and pressure band. The palette of moss green and rust evokes both calm and tension, representing the conflicting feelings. The main collision occurs diagonally, where the patterns intersect, emphasizing a dynamic disruption that mirrors the concepts of memory and motion. The inclusion of broken pixels introduces intentional imperfections, reinforcing the themes of chaos against order while maintaining negative space to prevent overwhelming density.</desc>
