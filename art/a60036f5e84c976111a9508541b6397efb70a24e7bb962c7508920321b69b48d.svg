<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Waves of Tension</title>
  <desc id="desc">This artwork represents the emotional tug-of-war between restlessness and peace. The palette 'melancholy_wonder' suggests a muted atmosphere, evoking the quiet yet turbulent feelings of memory and motion. The arrangement emphasizes deeper colors—lavender_gray, muted_plum, and rain_blue—creating a foundation of stillness, interrupted by soft_cyan and moon_white, which signify bursts of energy and clarity. The main collision occurs in the center, contrasting the darker lower half against the lighter upper half, thereby embodying the push and pull of emotions. The use of broken pixels introduces an element of imperfection, reflecting the chaos stemming from a serene backdrop, culminating in an abstract representation of the complex and often conflicting sensations described in the seed.</desc>
