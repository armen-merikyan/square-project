<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Crown of Shadows</title>
  <desc id="desc">This piece explores the tension between panic and control through a contrasting palette of dark maroon and gray, symbolizing depth and instability against a backdrop of rigid, structured pink and red. The inner diamond shape represents control, while the outer frames convey a sense of chaotic pressure. The arrangement evokes layers of displacement and noise, reinforcing the emotional collision between inner calm and outer turmoil. The 'broken dots' pattern suggests undercurrents of panic that seep through the controlled core, while the outer edges create a sense of boundaries being tested. The use of negative space enhances the feeling of anxiety by suggesting voids amidst clutter, forming an unresolved narrative of emotion and experience.</desc>
