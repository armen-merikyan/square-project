<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipsed Echo</title>
  <desc id="desc">This piece embodies the tension between awe and terror, utilizing a palette of muted sepia, tan, dust gray, and faded blue to suggest a fragile memory. The arrangement allows for a structured split, echoing order vs chaos, where the left side signifies stability and the right hints at instability. The contrasting color blocks create a visual interruption, portraying the collision of emotions. The main contrast is at the center, where lighter and warmer hues transition to darker, cooler tones, embodying the instability of memory through spatial fragmentation, echoing the soft edges set in the art direction.</desc>
