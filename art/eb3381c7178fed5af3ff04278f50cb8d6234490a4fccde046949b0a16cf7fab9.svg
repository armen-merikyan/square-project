<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Clash of Emotions</title>
  <desc id="desc">The emotional tone combines tenderness with rage, reflecting both soft and hard elements in the arrangement. The palette shifts between deep black and bright red to illustrate anger contrasted against pale blue and white signifying gentleness. The central collision occurs in the middle of the square where grid-like chaos (rage) confronts the softer island patterns (tenderness), invoking a feeling of tension and dynamic interaction. This layout embodies the idea of falling pixels representing emotional descent, while maintaining a balance of space and density allowing for an emotional release.</desc>
