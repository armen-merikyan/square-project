<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Boundaries</title>
  <desc id="desc">This piece captures the emotional conflict between desire and restraint through a palette of warm and cool colors. The fiery hues of hot coral and blood orange represent desire, creating a feeling of urgency and warmth, while the muted tones of charcoal and hollow blue embody restraint, containing the vibrant energy. The composition spirals outward, with the center pulsing with warmer tones and cooler edges sealing the boundaries, showcasing the collision of emotions amidst deliberately broken pixels that disrupt uniformity, representing bursts of feeling. The layout guides the eye in a spiral pattern, creating movement and a sense of pressure against the edges, further emphasizing the central emotional struggle.</desc>
