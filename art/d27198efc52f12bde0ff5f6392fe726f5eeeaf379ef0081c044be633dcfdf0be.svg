<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotion Collision</title>
  <desc id="desc">The artwork navigates the tension between tenderness and rage by using a palette that balances warm reds with soft pale blues. The center is filled with a bright burst of red, suggesting an intense emotional core, while muted blues and whites encircle it, representing the calmness trying to contain that intensity. The broken pixels introduce a sense of imperfection, mimicking real emotional experiences, thereby enhancing the overall feeling of uncontrolled force versus quiet strength. The primary collision occurs in the center, illustrating the core conflict in the seed, while the surrounding edge serves to contain this tumultuous feeling, reflecting the battle of inside versus outside emotions in our lives.</desc>
