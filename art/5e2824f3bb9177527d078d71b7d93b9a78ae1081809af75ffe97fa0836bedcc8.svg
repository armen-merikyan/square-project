<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Exposure and Shelter</title>
  <desc id="desc">This composition embodies the emotional dance between vulnerability and strength. The palette of deep gray, muted red, soft pink, and dark maroon reflects the themes of intimacy and fear, encapsulating the essence of exposure and shelter. The central conflict appears in the middle rows, where brighter reds clash against the somber grays, creating a noticeable fracture that draws the eye, representing the raw emotion of a rising signal amid an impending flood. The use of soft edges alongside harsh contrasts allows for a narrative of fragility surrounding the strength that attempts to encase it, creating an interplay of soft and hard textures across the grid.</desc>
