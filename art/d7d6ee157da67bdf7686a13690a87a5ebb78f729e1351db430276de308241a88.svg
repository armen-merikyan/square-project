<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Dissonance</title>
  <desc id="desc">This piece explores the emotional tension between relief and dread. The left side, representing relief, utilizes lighter tones of burnt orange and gold to evoke warmth and lightness, fighting against the darker, heavier colors of dark red and charcoal on the right, embodying dread and pressure. The layout features a vertical split, with a gradual flow from light to dark, signifying the emotional shift. Broken pixels introduce an element of imperfection, enhancing the overall dissonance. The contrasting edges create a sense of conflict and interruption, while maintaining negative space to suggest emptiness or 'the void' within the emotional narrative.</desc>
