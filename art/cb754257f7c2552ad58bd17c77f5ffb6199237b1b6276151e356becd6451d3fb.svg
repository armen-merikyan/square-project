<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Persuasion</title>
  <desc id="desc">This artwork explores the emotional dynamics between trust and suspicion, with a focus on the contrasting patterns of stability and disruption. The palette, drawn from 'safety_exposure', includes shelter green for a sense of reassurance, warm brown for familiarity, pale skin for vulnerability, cold white for clarity, and open blue for emotional expansiveness. The diagonal layout showcases the fierce collision of patterns: one side represented by the structured rain of trust (soft and flowing) and the other the mirror of suspicion (fragmented and reflective). A small yet significant proportion of broken pixels introduces imperfection, echoing the real-life nuances of trust and suspicion. This composition maintains a central gravity, reflecting how these emotions occupy space, collide, and interact within relationships, allowing a quiet center to contrast with denser edges, creating a visual tension that captures the essence of the emotional struggle.</desc>
