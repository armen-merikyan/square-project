<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">The emotional tone reflects a tension between envy and gratitude, expressed through contrasting geometric patterns: the left side features structured stripes symbolizing gratitude, while the right portrays jagged, impermanent rain as a representation of envy. The palette elements include lime for vibrancy, electric blue for calm, black for depth, and magenta for turbulence, creating a dynamic but balanced composition. The collision between structured order and chaotic disarray highlights the emotional dichotomy promised by the seed, illustrating a conflict where one seeks harmony yet is interrupted by negativity. This balance is accentuated through the broken pixels that represent imperfections inherent in the emotional spectrum.</desc>
