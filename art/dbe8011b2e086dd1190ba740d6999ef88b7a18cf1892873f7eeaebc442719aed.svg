<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The painting embodies the tension between desire and restraint, utilizing a palette that juxtaposes saturated reds and muted creams. The strong, warm reds indicate intense emotions of desire, creating vibrant, diagonal lines against the edges, while the cooler, muted tones serve to contain these bursts of warmth. The outer border is defined by these restrained tones, illustrating the effort of holding back, while the central area showcases explosive patterns of barcode in rich red against subtle patches of gray, representing an internal struggle. The use of broken pixels enforces a feeling of imperfection, making the desire palpable yet imperfectly restrained within a sealed boundary. This visually illustrates conflict and tension in an abstract manner, resonating with the emotional complexity in the seed.</desc>
