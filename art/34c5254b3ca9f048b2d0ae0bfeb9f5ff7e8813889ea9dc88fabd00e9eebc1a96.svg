<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects the conflict between vulnerability and strength, suggesting a complexity of feelings. The palette of cosmic indigo, void black, star white, cold gold, and deep teal creates a balance between dark, heavy spaces and punctuations of light. The main contrast occurs at the center where pale and dense colors collide, creating a hollow effect surrounded by vibrant light—symbolizing the tension between exposure and protection. The zigzag flow combined with the maze pattern implies a chaotic yet rhythmic experience, while the broken pixels introduce intentional disruptions that echo the themes of weakness and strength, perfectly mirroring the emotional struggle embedded in the seed.</desc>
