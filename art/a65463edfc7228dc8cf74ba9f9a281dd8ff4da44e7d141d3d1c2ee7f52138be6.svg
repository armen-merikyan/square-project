<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Balance</title>
  <desc id="desc">This piece embodies the conflict between vulnerability and strength, using color to portray emotional tension. The palette consists of clean white and ice blue to represent clarity and fragile hope, while violet gray and warning orange evoke a sense of urgency and exposure. The main contrast occurs at the center, where a dense cluster of dark colors spills over lighter fields, illustrating the struggle between stability and exposure. The 'tiny_cross' shape seed is interpreted through patchwork and embers, resulting in a layout of scattered repair and bursts of light amid dark patches, reflecting the ongoing tension of brokenness and safety.</desc>
