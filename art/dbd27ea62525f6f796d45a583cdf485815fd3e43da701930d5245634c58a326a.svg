<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Resolution</title>
  <desc id="desc">The emotional tone reflects the tension between longing and resolve, embodying both gap and closure through contrasting patterns. The palette of burnt orange, dark red, charcoal, and gold represents warmth and intensity fighting against darker, cooler tones, symbolizing yearning. The main contrast runs from the center outwards, where vibrant colors pulse in a rhythmic dance, interrupted by quiet fields. This embodies the seed's themes, creating an abstract narrative of seeking and stability through visual marks that collide but also coexist in harmony. The careful placement of broken pixels introduces intentional 'imperfections' that mirror the emotional scars of longing and resolution.</desc>
