  <title id="title">Symmetry Fractured</title>
  <desc id="desc">This composition explores the tension between panic and control through an interplay of structured grid patterns and chaotic zigzags. The palette reflects rage with dark blacks alongside pale blues, creating a stark contrast that symbolizes the clash between order and chaos. The burned edges evoke a sense of urgency, while strategic use of broken pixels disrupts the symmetry, enhancing the feeling of imperfection and unresolved emotions. The negative space facilitates a breath between dense clusters of color, suggesting moments of chaos within the overall structure.</desc>
