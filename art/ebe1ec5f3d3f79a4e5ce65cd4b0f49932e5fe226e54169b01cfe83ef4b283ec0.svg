<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition explores the emotional dichotomy of vulnerability and strength. The palette of vibrant greens and blues contrasts with deep blacks and grays, suggesting both life and turbulence. A checkerboard pattern representing strength dominates the top half (60%), while delicate stripes symbolizing vulnerability tread lightly below (40%). The center serves as the main collision point where these two emotional states interact, showcasing a collision of color and texture. The use of broken pixels introduces intentional disruptions, enhancing the narrative of protection versus exposure.</desc>
