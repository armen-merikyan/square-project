<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Resilience</title>
  <desc id="desc">This artwork embodies the emotional tension between vulnerability and strength, expressed through contrasting rhythms and patterns. The muted cream and blackened plum offer a foundation of stability, while the red oxide introduces bursts of emotional intensity that symbolize moments of vulnerability. The ash field pattern suggests solidity, fighting against the braid pattern which evokes a delicate interplay of tension and fragility. The collision occurs predominantly at the center, where the colors overlap, highlighting the struggle within the emotional framework. Broken pixels disrupt the clear areas, symbolizing the inevitable scars on resilience.</desc>
