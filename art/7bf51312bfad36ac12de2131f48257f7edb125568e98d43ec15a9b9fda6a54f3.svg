<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Echoes</title>
  <desc id="desc">The emotional tone reflects a strong contrast between desire (intense warmth and saturation) and restraint (muted, confined space). Colors were chosen to convey depth and tension: the saturated reds and oranges represent desire, while the grays and blackened plums serve as the restrained boundaries. The main collision occurs in the center with a dense gathering of warm colors against cooler muted tones at the edges, symbolizing a push against limits. The layout creates an inward flow, emphasizing a pull towards the center, yet restrained by the borders.</desc>
