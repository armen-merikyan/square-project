<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Dissonance</title>
  <desc id="desc">This composition explores the emotional tension between love and betrayal through a palette of warm reds and soft grays, contrasting with dark maroon accents. The emotional collision manifests in the nearly symmetrical layout, disrupted by broken pixel placements that symbolize the 'broken heart' element of betrayal. The diagonal rise of colors guides the viewer's eye, suggesting a narrative of momentary beauty that conflicts with underlying tension. The right-weighted edges create a sense of imbalance, enhancing the theme of imperfection and echoing the duality of love and betrayal.</desc>
