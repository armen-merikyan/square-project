<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast in Motion</title>
  <desc id="desc">This artwork embodies the duality of joy and grief through contrasting color densities and arrangements. The left side employs bright yellows and oranges, capturing the essence of joy in a spark pattern, symbolizing exuberance and openness. The right side contrasts this with deeper blues and muted purples, reflecting the heavy and fragmented nature of grief in a split-screen layout. The uneven distribution creates weight on the left, invoking a gravitational pull towards the vibrant. The 'arrow' motif is abstracted into the color transitions, representing directionality amidst emotional turmoil. Overall, there’s a blend of structured symmetry clashing with breakages, highlighting the intersection of contrasting emotions.</desc>
