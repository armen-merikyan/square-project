<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This composition evokes a tension between tenderness and rage through contrasting colors and shapes. The palette—comprising saturated red for rage and muted pale blue for tenderness—reflects the emotional extremes while creating a sense of depth. The main collision occurs at the center, where a dense cluster of red jagged pixels disrupts the surrounding calm blue veil, symbolizing the struggle between these emotions. Broken pixels introduce imperfections that suggest the chaos of guilt and forgiveness, adding to the narrative of emotional conflict. The layout of an island amidst a sea of calm reinforces the idea of isolation within one's feelings.</desc>
