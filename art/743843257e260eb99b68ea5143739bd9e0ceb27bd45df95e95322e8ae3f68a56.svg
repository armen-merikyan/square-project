<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">The emotional tone captures the conflict between longing and resolve, with colors chosen to reflect warmth and coolness in emotional tension. The palette blends deep wine and soft gold to create a richness layered with ash gray for grounding. Quiet spaces represented by warm ivory contrast with the dense patches of deep wine in the center, symbolizing the collision between longing's echo and resolve's firmness. The diagonal patterns from the longing checker meet the resolve's patchwork, creating an interplay that breaks the frame at the edges, indicating emotion leaking through the barriers of self.</desc>
