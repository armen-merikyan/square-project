  <title id="title">Conflict of Affection</title>
  <desc id="desc">The emotional tone delves into the turbulence between love and betrayal, expressed through contrasting warm and cool colors. The palette combines pink and red to evoke love, with deep gray and dark maroon as symbols of betrayal. The main collision happens in the center with the intertwining patterns of flame and maze, creating a chaotic symmetry that feels both inviting and distant. The use of broken edges enhances the sense of imperfection and unresolved tension, while the layout allows for a distinct inner and outer dialogue, reflecting the complexity of relationships.</desc>
