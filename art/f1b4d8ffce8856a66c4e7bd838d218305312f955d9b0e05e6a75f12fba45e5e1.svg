<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragments of Inward Motion</title>
  <desc id="desc">The piece captures the emotional tension of longing and resolve, with a palette that juxtaposes subtle warmth against cooler tones. The primary focus is on a central collision where compressed red meets off-white, suggesting a vibrant yet fragmented experience. The layout mimics falling pixels, creating an effect of descent and reflection, representing both the weight of yearning and the clarity of resolution. Broken pixels add intentional disruption, enhancing the narrative of repair amidst perceived damage, while negative space provides breathing room, symbolizing serenity amidst urgency.</desc>
