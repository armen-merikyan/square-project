<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork captures the emotional tension between desire and restraint. The vibrant colors of hot coral and blood orange suggest a warm pull of desire, while the cool tones of charcoal and hollow blue create a feeling of restraint. The diagonal layout emphasizes the conflict: the saturated warm colors on one side are restricted by cold, muted colors on the opposite side. The presence of broken pixels serves as intentional disruptions, mimicking the scars of unfulfilled longing. This piece embodies the surrender of balance in a sea of contrasting emotions, allowing the viewer to feel the struggle of reaching while held back.</desc>
