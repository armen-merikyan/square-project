<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">The emotional tone reflects the conflict between control and surrender, illustrated through an interplay of defined shapes and soft, yielding textures. The palette of mourning black, deep blue, new leaf, pale yellow, and stone offers depth and renewal, creating a contrast between stability and emotional release. The main collision occurs at the center, where the rigid ring pattern of control meets the soft dot pattern of surrender, signifying struggle and resolution. Broken pixels disrupt the flow, emphasizing the imperfections in the balance between these forces, represented through emotional strata in the layout.</desc>
