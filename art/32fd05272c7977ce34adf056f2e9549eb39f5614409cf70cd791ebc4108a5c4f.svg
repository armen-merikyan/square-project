<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges: Tension and Release</title>
  <desc id="desc">This abstract artwork explores the emotional tension between rage and calm. The palette of reds and whites conveys an intensity often associated with rage, while the pale blue introduces an element of calmness. The arrangement uses a split vertical layout, where the left side builds in dark, jagged patterns reflecting rage through broken dots, creating a sense of pressure. The right exhibits a gentle flow of light colors representing calm, aligning with soft horizontal patterns. The collision occurs where these two emotional layers meet, creating a visual echo of conflict and reconciliation. The broken pixels add an imperfection, symbolizing the fragility of emotions.</desc>
