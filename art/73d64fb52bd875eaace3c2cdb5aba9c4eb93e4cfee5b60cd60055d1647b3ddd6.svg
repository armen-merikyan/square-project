<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Emotion</title>
  <desc id="desc">This composition captures the tension between love and betrayal through a split horizontal layout. The top half utilizes warmer pinks and reds representing love in a 'noise' pattern, rich with warmth and connection, while the bottom half shifts to cooler grays and dark maroon to convey feelings of betrayal, configured with a 'spark' pattern, suggestive of disruption and anxiety. The contrast emerges from the left-weighted edges creating a broken sense of symmetry, while the layout emphasizes the emotional collision between comfort and disarray. The interplay between the dense and empty spaces enhances the feeling of conflict, reflective of the seed's themes.</desc>
