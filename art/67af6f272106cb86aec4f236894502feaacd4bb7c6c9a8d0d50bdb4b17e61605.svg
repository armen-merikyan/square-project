<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Motion</title>
  <desc id="desc">This artwork captures the tension between restlessness and peace through an interplay of warm and cool tones. The palette features 'warm coral' and 'soft amber' as inviting elements reflecting peace, contrasted by the assertive 'cold slate' and 'blue black' representing discomfort and urgency. The grid's structure is intentionally disrupted by broken pixels that mimic 'memory', evoking a fleeting sensation. The primary collision occurs diagonally across the square, where the patterns of restlessness ('tide') meet the gentle waves of peace ('noise'). This juxtaposition embodies a quiet chaos, suggesting ongoing movement amidst a calm surface.</desc>
