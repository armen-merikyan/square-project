<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight and Light</title>
  <desc id="desc">The emotional tone reflects a struggle between dread and relief, utilizing a palette of burnt orange, dark red, charcoal, and gold to embody tension and warmth. The darker colors occupy the outer spaces, symbolizing the overwhelming weight of dread, while sparks of bright gold suggest moments of relief and hope, despite being scattered throughout the piece. This interplay creates a visual tension that echoes the seed's themes of imbalance and pain, with patterns of symmetry broken by jagged disruptions representing the fragility of calm against the weight of anxiety.</desc>
