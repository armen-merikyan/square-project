<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This composition embodies the emotional tension between vulnerability and strength. I utilized a palette of warm ivory and deep wine to create depth and sharp contrast. The strong central island of gold represents strength, juxtaposed against the checkerboard patterns of soft brown and ash gray symbolizing vulnerability, capturing the collision of these emotions at the center of the canvas. Broken pixels interrupt the flow, enhancing the feeling of imperfection, resembling scars on an otherwise smooth surface, suggesting resilience amidst fragility.</desc>
