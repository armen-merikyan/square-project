<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This composition reflects the tension between emptiness and desire, utilizing a palette that contrasts the warmth of desire with the coolness of emptiness. The warm tones of hot coral and blood orange represent the allure of desire, while the cool hues of charcoal and hollow blue evoke feelings of emptiness and restraint. The main collision occurs in the center, where an angry pulse of warmth meets the cool, subdued edges, creating a visual echo that emphasizes conflict. The broken pixels introduce intentional disruptions, representing the struggle of containment versus overflow, while the tidal pattern of emptiness clashes with the fault line of desire, creating a layered emotional strata. This piece invites reflection on the nature of human longing and the barriers we encounter.</desc>
