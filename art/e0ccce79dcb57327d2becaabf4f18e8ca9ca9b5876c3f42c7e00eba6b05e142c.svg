<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone of this piece contrasts the gentle warmth of softness with the strict precision of severity. The palette was chosen to represent this dichotomy: the soft pink and warm white signify embrace and gentleness, while the carbon black and steel gray provide a grounding severity. The collision occurs in the central columns where the halo pattern interrupts the flowing tooth patterns, creating a dynamic tension. This layout employs a vertical split, emphasizing the emotional weight of the left side against the rhythm and pulse of the right, reflecting a nuanced narrative of conflict and resolution.</desc>
