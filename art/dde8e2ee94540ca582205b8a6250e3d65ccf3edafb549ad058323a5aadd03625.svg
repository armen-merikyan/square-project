<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Light and Shadow</title>
  <desc id="desc">This composition embodies the emotional tension between fear and hope through contrasting colors and patterns. Dark tones represent the weight and jagged nature of fear, while soft gold and pale green hint at the rising light of hope. The layout creates a defined center where the glowing edges contrast with the dark corners, symbolizing a door between two emotional states. The juxtaposition of fractured and framed patterns illustrates the collision of these feelings, creating a dynamic and complex surface that invites contemplation.</desc>
