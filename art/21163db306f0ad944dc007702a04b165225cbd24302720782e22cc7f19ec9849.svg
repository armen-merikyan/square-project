<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Color</title>
  <desc id="desc">The emotional tone of this piece captures the push and pull between desire (represented by warm reds and oranges) and restraint (embodied by muted grays and creams). The palette creates an intense contrast with saturated colors almost spilling into the boundaries held by the softer hues, creating a geographical tension on the grid. The main collision occurs in the central area where bright colors emerge among muted fields, reflecting an emotional struggle between yearning and the need for containment. This is organized through the grid and fault lines that provide a structured yet chaotic background, suggesting layers of internal conflict that echo throughout the work.</desc>
