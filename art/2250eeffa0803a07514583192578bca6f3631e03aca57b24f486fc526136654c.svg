<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This piece interprets the emotional duality of love and betrayal, representing warm tones like pink and dark maroon clashing with cool grays. The pattern juxtaposes dense clusters on the left side symbolizing pressure and chaos, against the quieter sections on the right, signifying release and tranquility. Strategic placement of pixels creates visual echoes across the canvas, expressing rhythmic tension and emotional collision, while leaving ample negative space to enhance the contrast. The broken pixel elements disrupt the symmetry to convey the imperfection of feelings.</desc>
