<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This artwork reflects the emotional tension between defiance and submission through a contrasting palette of black and red against soft pale blues and whites. The composition emphasizes a checker pattern representing defiance at the edges and a structured grid for submission in the core, creating a dynamic tension. The hard edges frame the softer inner space, embodying the push and pull of conflicting emotions. There are intentional interruptions within the patterns to suggest falling pixels, illustrating moments of chaos and balance, mirroring the complexities of love and conflict.</desc>
