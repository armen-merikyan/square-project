<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Containment</title>
  <desc id="desc">This artwork captures the emotional tension between desire and restraint. The warm tones of red oxide and small orange create a sense of yearning and intensity, while the cool muted cream and blackened plum represent containment and restraint. The central collision occurs diagonally, where warm colors gradually eclipse cool tones, emulating the push and pull of emotional pressures. The palette reflects the hunger and complexity of these feelings, portraying a delicate balance of saturation versus softness. Broken pixels disrupt the symmetry, embodying imperfections in this emotional struggle.</desc>
