<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symphonic Disquiet</title>
  <desc id="desc">This artwork embodies the tension between restlessness and peace through contrasting colors and dynamic placements. The palette combines the calming nature of pale aqua and mist gray with the urgent intensity of alarm red and ink blue. The main collision occurs diagonally, where the bold alarm red interrupts the tranquil aqua, embodying an emotional push-and-pull. The spiral layout reflects memory and motion through twisting patterns, hinting at complexity without literal shapes. Broken pixels introduce imperfections that echo the disquiet within the calm and add to the piece's abstract narrative.</desc>
