<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolution</title>
  <desc id="desc">This composition captures the emotional tension between longing and resolve through a layered palette that communicates both warmth and urgency. The soft pale aqua and mist gray provide expansive quiet spaces contrasted by intense alarm red and ink blue, evoking connection through tension. The darkest colors anchor the piece, representing resolve, while the lighter tones suggest longing. The main collision occurs in the center, where stacked patterns of resolve clash asymmetrically with static patches of longing, illustrating the struggle between order and chaos.</desc>
