  <title id="title">Contrasting Echoes</title>
  <desc id="desc">This artwork embodies the struggle between restlessness and tranquility, illustrated through a contrasting palette of burnt orange and charcoal. The outer rows echo a sense of peace with warm, inviting tones of gold and burnt orange, while the inner rows introduce darker, more chaotic colors, representing the inner turmoil. The jagged edges convey a sense of interruption, while broken pixels add to the feeling of imperfection. The main collision occurs centrally, where the quiet space of gold meets the turbulent dark red, suggesting a memory in conflict with motion.</desc>
