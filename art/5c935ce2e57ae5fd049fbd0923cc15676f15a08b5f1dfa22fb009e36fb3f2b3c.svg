<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Pulse</title>
  <desc id="desc">The emotional tone captures the struggle between the warmth of desire and the cold of emptiness, represented through a palette of saturated and muted colors. The hot coral and blood orange suggest desire with their warm energy, while the charcoal and hollow blue introduce the weight and distance of emptiness. Contrast and collision manifest in the center, where a convergence of dense islands breaks into flowing stripes, representing the tension between yearning and restraint. The use of broken pixels introduces a sense of disruption, mirroring the impact of conflicting emotions.</desc>
