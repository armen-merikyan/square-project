<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This piece explores the tension between emptiness and desire, using a palette of warm reds and cool blues to represent these conflicting feelings. The mirror layout introduces symmetry with deliberate imperfections, embodying the imperfections of desire amidst feelings of emptiness. The sharp vs. soft contrast emphasizes collisions between the hard edges of wanting and the soft void of absence. Central to the design is the interaction of colors that lead the eye horizontally, signifying a movement from left to right that mirrors life's ebb and flow. Each row creates a rhythm of varying intensity, evoking emotion and unease.</desc>
