<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This 8x8 artwork plays with the tension of vulnerability and strength, utilizing a palette that oscillates between deep reds and crisp whites, representing the stark contrast between safety and exposure. The center explodes with red tones depicting strength, while pale hues and whites at the corners evoke vulnerability, creating a dialogue of collision and protection. The use of broken pixels introduces imperfection, symbolizing the fragility inherent in the struggle, while the irregular distribution establishes a sense of pressure and outburst in an otherwise structured environment.</desc>
