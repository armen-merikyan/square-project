<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Tension</title>
  <desc id="desc">The artwork explores the emotional narrative between vulnerability and strength through contrasting colors and patterns. The palette consists of deep navy and black representing strength, alongside dim cyan and white reflecting vulnerability, creating a visual dialogue that oscillates between dark and light. The collision occurs at the center with dense, tightly packed colors representing strength, while edges are softer and more fluid, creating a sense of exposure. This tension is accentuated by broken pixels that disrupt the smooth transitions, evoking a feeling of fragility amidst stability. The interplay of these intentional imperfections personifies the core themes of the seed, embodying an abstract landscape filled with emotional depth and complexity.</desc>
