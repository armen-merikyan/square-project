<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Duality</title>
  <desc id="desc">This composition explores the emotional contrast between trust and suspicion. The palette of burnt orange, dark red, charcoal, and gold evokes warmth but also foreboding. The symmetry of the left and right sides creates an appearance of balance, yet deliberate disruptions resonate through the pixel placement, introducing tension. The central focus emerges from an overlap of galactic colors, hinting at the complexity of emotions. The broken pixels symbolize the fractures in trust, while the maze-like patterns suggest suspicion, colliding at the center where shadows and glows clash, indicating emotional turbulence.</desc>
