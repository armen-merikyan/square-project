<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tensions</title>
  <desc id="desc">This piece explores the emotional duality of softness and severity, using a palette that juxtaposes warmth and coolness. The main contrast lies at the center where dense, sharp crimson confronts soft powder pink, representing guilt and forgiveness clashing with openness. The spiral pattern subtly counters the gentle grid, while broken pixels create an organic disruption, echoing the unresolved feelings of the seed. The layout densely fills the center, leading to a gradual lightening towards the edges, expressing the struggle between chaos and control.</desc>
