<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Shelter</title>
  <desc id="desc">This piece explores the tension between safety and exposure through a dense center representing protection and lighter colors at the borders evoking exposure. The palette contrasts the warmth of 'shelter_green' and 'warm_brown' with the cooler tones of 'cold_white' and 'pale_skin', creating a dialogue between comfort and vulnerability. The main collision occurs in the center, where the colors intertwine, suggesting a complex balance of emotions. The echoes of exposure ripple outward, forming a stark yet delicate frame of negative space that invites the viewer to reflect on the interplay of protection and openness.</desc>
