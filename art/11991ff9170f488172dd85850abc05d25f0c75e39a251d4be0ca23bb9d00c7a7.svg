<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone reflects the tension between vulnerability and strength, illustrated through contrasting colors. The palette of signal green, electric blue, dead black, static gray, and hot magenta embodies rising signals against a backdrop of potential flooding. The collision occurs centrally, where the strength pattern (scar-like structures in dark colors) confronts the vulnerability pattern (shattered light pixels). This results in a dynamic, fragmented composition that resonates with the seed's themes of exposure and shelter. At least 10% negative space is maintained to reflect the unsettled interplay between these contrasting emotions.</desc>
