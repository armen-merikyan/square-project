<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone of this piece embodies the tension between envy and gratitude, exploring the lightness of gratitude against the weight of envy. The palette draws from rich pinks and reds, symbolizing emotional depth, intertwined with grays and dark maroons that convey heaviness and turmoil. The flow of pixels moving upward on one side suggests an upward trajectory tied to gratitude, while the opposite side descends, representing the weight of envy. The contrasting patterns—rings for envy and targets for gratitude—clash against each other, generating a visual echo that captures the delicate balance of these emotions. Broken edges add an element of imperfection, emphasizing the chaos in the emotional landscape, while maintaining negative space to reflect moments of quiet.</desc>
