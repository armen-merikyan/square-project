<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Shelter</title>
  <desc id="desc">This composition explores the emotional tension between safety and exposure. The palette features 'shelter_green' and 'warm_brown' to convey a grounding, protective presence contrasted by 'open_blue' and 'cold_white', evoking vulnerability and openness. The dominant colors create a squaring effect around a central pale area, representing the protected yet exposed center. The contrast between broken and flowing patterns reflects the push and pull of pressure vs. release, with the main collision occurring at the center, where the calm meets the turbulent. The use of broken pixels adds a sense of imperfection, enhancing the emotional story of resilience within vulnerability.</desc>
