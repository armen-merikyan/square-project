<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone emphasizes the contrast between vulnerability's pale openness and strength's dense structure. The palette combines muted colors of shelter green and warm brown to suggest safety, clashing with cold white for exposed areas and open blue to symbolize desire. The main contrast resides on the diagonal, where rings of pale skin and cold white collide with braids of shelter green and warm brown, creating an interplay of hard versus soft. Broken pixels introduce an intentional disruption to emphasize imperfection and tension, reflecting the complex dynamics of protecting and exposing oneself.</desc>
