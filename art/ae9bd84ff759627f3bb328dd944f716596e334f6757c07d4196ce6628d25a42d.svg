<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Yearning</title>
  <desc id="desc">This composition captures the emotional tension between 'emptiness' and 'desire'. The palette balances warm coral and orange tones representing longing against cooler, muted shades like charcoal and hollow blue exuding a sense of void. The main collision occurs in the diagonal layout where desire fills the lower left and emptiness overwhelms the upper right, creating a push-and-pull effect. The structured ladder pattern of 'desire' disrupts amidst the shatter effect of 'emptiness,' mirroring the struggle between yearning and restraint. Broken pixels add an element of imperfection, enhancing the depth of the narrative.</desc>
