<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order and Chaos in Color</title>
  <desc id="desc">This piece embodies the emotional dichotomy of restlessness and peace, structured through a palette that balances muted and vibrant tones. The chosen colors—off-white and faint peach symbolize tranquility, while dark navy and compressed red represent turmoil. The collision occurs diagonally, creating a rhythmic interplay where quiet radial patterns from peace contrast with the disruptive patchwork of restlessness. The result is a visible tension as the eye navigates through a mixture of orderly sections and chaotic interruptions, capturing the essence of motion against stillness.</desc>
