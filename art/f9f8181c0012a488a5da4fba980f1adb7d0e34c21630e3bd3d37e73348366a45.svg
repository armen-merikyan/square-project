<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Reflection</title>
  <desc id="desc">The emotional tone juxtaposes a sense of yearning (longing) against a feeling of stability (resolve). The chosen palette of 'mourning_renewal' colors suggests depth through mourning black and deep blue, while introducing hope with new leaf and pale yellow. The patterns of pressure bands and barcode are visually colliding, where the former brings a fluid sense of longing, while the latter provides a clearer, structured resolve. The main contrast occurs centrally, demonstrating a delicate interplay of intention and chaos, echoing the themes of repair and damage, all while maintaining negative space for emotional breath.</desc>
