<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects the interplay between vulnerability and strength, creating a visual conflict of soft breaks contrasted against thick, stable borders. The chosen palette of reds, blacks, pale blues, and whites intensifies this contrast, with red symbolizing strength and the pale blue introducing vulnerability. The main collision occurs at the center where the radial pattern of vulnerability interrupts the stronger ring pattern, echoing feelings of tension and unresolved emotion. The broken pixels disrupt symmetry, adding to the sense of exposure amidst shelter, symbolizing both fragility and resilience.</desc>
