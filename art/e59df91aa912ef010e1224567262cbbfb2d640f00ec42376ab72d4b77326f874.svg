<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Tranquility</title>
  <desc id="desc">This artwork captures the emotional conflict between restlessness and peace through a deliberate use of contrasting colors and patterns. The palette of 'melancholy wonder' evokes a subdued mood, using soft cyan and lavender gray to represent tranquility, while brighter accents of moon white signify transient thoughts and disturbances. The primary collision occurs diagonally, where the structured fall of pixels representing peace meets the chaotic stack pattern of restlessness, allowing this tension to flow throughout the piece. Broken pixels introduce intentional disruptions, reminding us of the fragility in the balance between motion and memory, while leaving defined spaces conveys an underlying calm amidst the chaos.</desc>
