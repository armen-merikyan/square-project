  <title id="title">Echoes of Collision</title>
  <desc id="desc">This artwork explores the tension between restlessness and peace through contrasting colors and patterns. The palette of black, electric blue, magenta, and lime evokes a dynamic emotional landscape, with dark tones representing restlessness and vibrant colors signifying peace. The main collision occurs in the center, where the deep contrast of black meets bright electric blue, symbolizing the heart of the conflict. The falling pixels pattern reflects the constant motion against the grounding calm of the quieter colors, creating a rhythm of disruption and harmony reminiscent of memory and motion.</desc>
