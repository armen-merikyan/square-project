<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone is centered around the tension between emptiness and desire, represented by the saturation of colors encroaching upon defined edges. The warm palette of hot coral and blood orange evokes desire while the low saturation charcoal and hollow blue introduce feelings of emptiness. The main contrast occurs at the center, where these emotions collide, creating a visual pulse that spirals outward. The layout compresses marks toward an off-center point, symbolizing both a call to overflow and the pressure of containment.</desc>
