<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Amidst Stillness</title>
  <desc id="desc">The emotional tone captures a struggle between restlessness and peace, reflecting a dynamic tension that ebbs and flows. The palette of burnt orange, dark red, charcoal, and gold symbolizes warmth contrasted against shadows, representing the flicker of unrest against a backdrop of calm. The collision primarily occurs in the center, where warmer pixels interrupt cooler, more restrained fields, symbolizing memories jarring against a peaceful state. The abstract pattern emerges from the edge-crawl of darker pixels interspersed with patches of brighter colors, illustrating a layered motion that seeks resolution, akin to the tension of memories responding to the call of the present.</desc>
