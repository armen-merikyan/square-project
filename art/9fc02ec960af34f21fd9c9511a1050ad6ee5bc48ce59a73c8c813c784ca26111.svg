<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Tension</title>
  <desc id="desc">The emotional tone drawn from the seed reflects a core struggle between vulnerability and strength. The palette includes shelter green and warm brown to signify safety enveloping an exposed center, while open blue adds a spark of energy and cold white introduces an element of starkness. The interplay of checker patterns on the edges represents strength while echo patterns in the center create a sense of vulnerability. The main collision evokes a sense of conflict and drama, primarily located in the center where bright colors meet darker tones, thus emphasizing the tension between protection and exposure.</desc>
