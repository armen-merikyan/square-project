  <title id="title">Interplay of Resistance</title>
  <desc id="desc">This artwork expresses the emotional tension between defiance and submission through a contrasting color palette of dark and vibrant shades. The bright electric blue and magenta symbolize defiance while the black grounds the piece in submission. The center houses a strong concentration of dominant colors with a 'broken mirror' effect on the edges, representing the fragile balance between conflicting emotions. This grid creates a rhythmic pulse and visualization of resistance and acceptance, echoing the inward spiral and corner invasion from the seed.</desc>
