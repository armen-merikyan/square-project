<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Stripes</title>
  <desc id="desc">This composition explores the tension between control and panic through the use of contrasting patterns and colors. The chosen palette of sepia, tan, dust gray, and faded blue conveys a sense of nostalgia and evolution from panic (checker patterns) to control (stripes). The main collision occurs between dense clusters at the center and the softer edges, evoking the feeling of an internal struggle. The pixel bleed introduces imperfection, hinting at the fragility within the center, while the rising layout implies an aspiration towards control, creating an upward flow of emotion amidst chaos.</desc>
