<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light</title>
  <desc id="desc">This piece embodies the emotional contrast between fear and hope. The darker shades draw upon the weight of fear, creating a dense, enveloping environment, while the lighter accents suggest moments of hope peeking through. Using a split vertical layout, the colors ebb and flow — heavier blocks of black and dark violet on the left, contrasting with the luminous soft gold and pale green on the right. This collision illustrates a struggle between oppressive weight and the glimmering potential of light. The broken pixels introduce imperfection, aligning perfectly with the theme of machine emotion versus organic warmth.</desc>
