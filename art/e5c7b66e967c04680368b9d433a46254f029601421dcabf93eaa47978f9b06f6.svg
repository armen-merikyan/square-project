<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">The emotional tone of this composition explores the tension between longing and resolve. The palette combines warm coral and soft amber to evoke a sense of urgency against the coolness of cold slate and blue-black, creating a visual conversation of warmth vs. coolness. The collision occurs in the center, where dense clusters of warm colors break into the quiet field of cooler tones, suggesting a narrative of conflict and harmony, arrival and departure. The seed inspired the use of thin lines that create a structure yet allow for broken pixels to symbolize imperfection and the imprint of past experiences.</desc>
