<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Orbit</title>
  <desc id="desc">This composition translates the emotional duel of rage and calm through color. The palette of deep blacks and vibrant reds suggests the raw intensity of rage, colliding with the soft, pale blues of calm. The main contrast occurs at the center with sharp red jagged pixels intersecting the cool blue's maze-like texture, reflecting a crack against a mirror. The pattern flows diagonally, echoing the rising signal while intentionally leaving negative space to suggest the tension between feelings.</desc>
