  <title id="title">Exposed Horizons</title>
  <desc id="desc">This artwork captures the emotional juxtaposition of vulnerability and strength through a dynamic interplay of colors. The chosen palette, 'ancient_fire', evokes a sense of warmth and intensity, balancing strong hues with softer tones. The main collision occurs in the center, where deep burnt orange clashes against a muted charcoal background, simulating the tension between softness and firmness. The application of broken pixels throughout suggests imperfection and exposure, reinforcing the theme of vulnerability while framed by stronger color edges, creating a sense of safety contrasted by the unshielded chaos within.</desc>
