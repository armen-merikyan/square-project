<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Dissonance</title>
  <desc id="desc">The emotional tone focuses on the tension between joy (bright yellows and oranges) and grief (deep blues and muted purples). The palette symbolizes the battle between lightness and heaviness, echoing the collision of hope against despair. The hard edges give structure, while the diagonal layout reflects a shift from chaos to order, showcasing an upward movement of emotion—stair-stepping from grief-filled shadows to bright bursts of joy. This arrangement highlights the contrasts and emotional intensity derived from the seed, embodying a visual narrative of struggle and uplift.</desc>
