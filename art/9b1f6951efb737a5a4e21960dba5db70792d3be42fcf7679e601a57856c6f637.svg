<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Embrace</title>
  <desc id="desc">The emotional tone oscillates between warmth and tension, represented by the pink and red tones in juxtaposition with the darker grays. The palette chosen reflects love through warm shades, coupled with the edges of dark maroon representing betrayal and chaos encroaching from the borders. The central spread from the bottom-left to the top-right creates a diagonal conflict—soft broken dots of warmth clash against the rigid darker pixels, suggesting boundaries and barriers within emotional landscapes. The use of broken pixels adds to the fractured feeling, creating visual noise that echoes the inner turmoil of 'inside vs outside'. The abstract pattern showcases a subtle balance of warmth and pressure, developing a unique emotional narrative through color and contrast.</desc>
