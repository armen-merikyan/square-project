<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">The emotional tone juxtaposes envy and gratitude, creating a dynamic interplay. The selected palette of pink, red, gray, and dark maroon suggests warmth and heavy emotional undercurrents, echoing 'love_betrayal.' The composition employs a bottom-to-top flow to invoke rising tension, where the contrasting patterns of target and crosshatch embody the chaos of envy versus the serenity of gratitude. The left side is structured with clear patterns while the right disrupts this, represented through broken pixels that suggest imperfection and a 'mirror broken' effect, creating a visual tension and shift from calm to pressure.</desc>
