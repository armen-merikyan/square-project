<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">The emotional tone balances between warmth of safety and the vulnerability of exposure. The palette combines earthy tones of shelter green and warm brown to evoke a feeling of enclosure, with accents of pale skin and cold white that highlight fragility and openness. The main contrast occurs vertically, dividing the canvas into sheltered softness on the left and exposed vulnerability on the right. This collision creates a sense of tension where the patterns of a constellation and maze interplay, echoing the duality of comfort and fear. Broken pixels disrupt the smoothness, representing imperfections and the unpredictability of emotional states.</desc>
