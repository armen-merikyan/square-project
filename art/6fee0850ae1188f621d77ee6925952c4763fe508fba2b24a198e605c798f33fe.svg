<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Collisions</title>
  <desc id="desc">This abstract piece captures the emotional tension of pride versus shame, reflected in contrasting shades of sepia, tan, faded blue, and dust gray. The outer cells represent exposure with muted tones, while the intricate inner core showcases the noise of pride and the broken dots of shame, exemplifying their collision. The pattern flows from the bottom to the top, creating a sense of rising pressure before release, with jagged edges suggesting imperfections and interruptions within the perceived symmetry.</desc>
