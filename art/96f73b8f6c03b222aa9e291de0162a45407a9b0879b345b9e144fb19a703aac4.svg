<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Hearts</title>
  <desc id="desc">This artwork embodies the emotional tension between love and betrayal through the use of warmth and coolness. The palette incorporates pinks and reds to signal love, contrasted sharply against deep maroon and gray shades that represent deeper feelings of betrayal. The left side features a checker pattern reflective of love's symmetry, while the right employs a disrupted version with varying grays that signify feelings of conflict. The central division highlights the emotional break, further echoed by glowing edges, which create a sense of resonance and interruption, portraying the inherent struggle between intimacy and deceit.</desc>
