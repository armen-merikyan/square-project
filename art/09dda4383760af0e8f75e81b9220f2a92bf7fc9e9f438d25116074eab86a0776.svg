<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">This composition conveys the emotional duel of desire and restraint, using a contrasting palette of saturated versus muted colors. The warm hues of red oxide and small orange represent desire, exerting pressure against the cooler, contained edges of muted cream and iron gray, embodying restraint. The main collision of color occurs at the center, where the bright tones clash with the softer, more subdued backgrounds, illustrating an unresolved emotional tension. The layout suggests an opening allowing warmth to spill forth, while the broken pixels add intentional imperfections, symbolizing moments of vulnerability within the structured lattice of our emotions.</desc>
