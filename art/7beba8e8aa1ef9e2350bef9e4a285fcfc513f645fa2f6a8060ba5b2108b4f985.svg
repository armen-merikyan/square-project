<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Dissonance</title>
  <desc id="desc">The emotional tone of defiance versus submission is captured through a juxtaposition of dark and light colors, emphasizing conflict and interplay. The palette utilizes navy for its depth and seriousness, alongside muted black tones to evoke a sense of weight; this is contrasted with dim cyan to symbolize moments of subtle lightness or hope. The layout flows from the left, portraying a sense of invasion from one side, creating asymmetry and contrast. The collisions occur where darker edges meet unexpected lighter breaks, suggesting vulnerability amidst the dominating darkness, in line with the seed's tension.</desc>
