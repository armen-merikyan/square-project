<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Shadows</title>
  <desc id="desc">This artwork embodies the emotional contrast between fear and hope, capturing the essence of struggle and light. Dark tones like black and dark violet symbolize fear, creating a stark backdrop that feels heavy and oppressive. In contrast, soft gold and pale green emerge sporadically, representing flickers of hope against the darkness. The split vertical layout initiates a burst of tension, as colors collide and interact across the canvas. Jagged and soft edges introduce a dynamic flow, with jagged pixels representing unease and softer curves suggesting gentle rising light. The negative space permits moments of reflection amidst the heaviness, expressing the duality of emotion inherent in the seed.</desc>
