<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece captures the tension between rage and calm through contrasting colors and patterns. The palette features deep black and vibrant red representing rage, contrasted with softer pale blue and white symbolizing calmness. The center of the grid acts as the tension point where explosive, jagged red pixels collide with smaller, contained patterns of pale blue and white. This maintains an eroded symmetrical effect with slight misalignments, illustrating the struggle between contained calmness and overflowing rage. The edge style fades off at the borders, enhancing the sense of quiet isolation against the louder emotions within.</desc>
