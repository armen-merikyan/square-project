<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry vs Break</title>
  <desc id="desc">The emotional tone plays on the tension between trust and suspicion, where trust is represented by soft golds and pale greens conveying warmth and stability, while dark violets and black embody the coldness of suspicion. The split diagonal layout emphasizes this dichotomy, creating a jarring contrast that flows from the top-left corner to the bottom-right, symbolizing the battle between two states of mind. The broken pixels introduce intentional disruptions, echoing the theme of imperfection in relationships and perceptions. This composition creates a visual narrative of collision and resilience through color placement.</desc>
