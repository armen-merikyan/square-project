<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Boundaries</title>
  <desc id="desc">This artwork captures the tension between control and surrender, realized through a saturated central field that contrasts against muted edges. The palette of quiet pressure—off white and dust gray—provides a subdued backdrop, highlighting the dense red and navy center where control feels 'overfilled'. The main collision occurs at the center where the grid pattern representing control collides with areas of shatter reflecting surrender, creating a visual echo of conflict. The intentional broken pixels introduce imperfection, symbolizing the struggle within the dichotomy, while maintaining a necessary negative space that reinforces the concept of restraint.</desc>
