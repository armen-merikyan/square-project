<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The composition conveys a struggle between rage and calm through a vibrant palette. The use of bright reds (rage) contrasts sharply with soft blues (calm), creating an emotional pull. The sharp edges of the red pixels interrupt the smooth flow of blue, forming a jagged presence that aggressively expands from the corner. This 'corner invasion' introduces chaos amidst tranquility, symbolizing an emotional eruption where contained calmness meets overwhelming rage, suggesting turbulence in a tightly regulated environment.</desc>
