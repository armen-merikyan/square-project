<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contradictory Embrace</title>
  <desc id="desc">The artwork captures the dynamic tension between love and betrayal through juxtaposed colors. The palette blends warm pinks and reds, symbolizing love, with cooler grays and dark maroons representing betrayal. The outer rows adopt a checker pattern, evoking the feelings of chaos and fragmentation, while the core section uses a target pattern to signify warmth and connection. The broken pixels introduce imperfection, emphasizing emotional disruption. The overall flow is structured from left to right, signifying movement from stability to conflict, echoing the seed's narrative of contrasting emotions.</desc>
