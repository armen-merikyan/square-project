<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">The emotional tone reflects a tension between desire and emptiness, filled with a yearning for connection amidst quiet solitude. The chosen palette of soft gold, dark violet, and pale green embodies warm vs cool contrasts, suggesting hope and unfulfilled aspirations. The contrast lies predominantly in the interplay between the dense outer squares representing emptiness (dark violet accentuated with broken pixels) and the vibrant core (soft gold and pale green patterns) embodying desire. The layout emphasizes a central 'rising signal' against the 'burned edges' of loneliness, where the broken pixels represent imperfections—echoes of lost connections amidst the desire for warmth, creating a visual narrative of conflict and yearning.</desc>
