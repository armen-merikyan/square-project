<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece explores the tension between exposure and safety through a balanced interplay of colors and patterns. The warm brown and shelter green evoke feelings of both comfort and protection, while the pale skin and cold white colors represent vulnerability and openness. The split vertical layout symbolizes the division between these opposing emotions. The patterns of tide representing exposure blend with the framing of safety, creating a central emotional collision that resonates with the viewer. The broken pixels introduce imperfections and raw emotions, enhancing the piece's depth and complexity.</desc>
