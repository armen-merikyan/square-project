<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Dimensions</title>
  <desc id="desc">This artwork captures the emotional tension of defiance and submission through a juxtaposition of contrasting colors and patterns. The chosen palette—warm coral and cold slate—embodies the clash of warmth and coolness, signifying conflict and harmony. Defiance, expressed through vibrant patches of coral, occupies the top-left diagonal, while the muted presence of slate echoes submission in the bottom-right. A pulse of cyan interrupts the tranquility, emphasizing a glitching threshold at the center. The arrangement exhibits an 'uneven border' where many textures collide, creating an abstract narrative of struggle against order, inviting the viewer to experience the dynamic push and pull of these opposing forces.</desc>
