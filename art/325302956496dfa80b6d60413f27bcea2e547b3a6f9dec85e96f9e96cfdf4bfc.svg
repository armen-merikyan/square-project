  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The composition explores the tension between safety and exposure, contrasting warm earthy tones representing shelter against cool pale hues suggesting exposure. The central collision comes from the vertical and horizontal patterns that intersect, creating emotional pressure. The chosen palette of greens, browns, and pale colors emphasizes both softness and severity, embodying vulnerability amidst stability. Broken pixels create intentional disruptions in the 'shelter' regions to suggest the fragility of safety.</desc>
