<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Tension</title>
  <desc id="desc">This piece conveys the clash between panic and control through a palette of deep blacks, bright whites, and soft blue tones. The dark colors overtake the center, suggesting weight and chaos, while the white stripes radiate outward, symbolizing an attempt to establish order. The contrast occurs at the center, where the black overwhelms the surrounding light, creating a visual tension that echoes the emotional struggle. The seed's themes of 'full vs hollow' manifest as dense areas that bleed outward against the lighter, more structured elements, portraying a conflict while leaving sufficient negative space for the eye to rest amidst the chaos.</desc>
