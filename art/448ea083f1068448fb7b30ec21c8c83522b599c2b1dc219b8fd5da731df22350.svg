<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Symmetry</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of trust and suspicion through contrasting color fields. The color palette, influenced by 'love_betrayal', features deep reds and soft pinks to represent trust intertwined with dark maroon and gray, symbolizing suspicion. The left side leans heavily towards warmth, suggesting a secure base, while the right side introduces colder hues representing uncertainty, accentuated by a few off-kilter pixels that mimic the cracks of suspicion. The composition’s vertical split evokes an interplay of pressure and release, while the patterns of static and crack reflect both a foundation and disruption in relationships. The main collision occurs at the center of the piece, where the warm and cool hues intersect, creating tension and a dynamic flow outward, inviting contemplation of balance and resilience.</desc>
