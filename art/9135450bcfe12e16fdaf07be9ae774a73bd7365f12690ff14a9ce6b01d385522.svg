<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast in Motion</title>
  <desc id="desc">This abstract piece captures the dichotomy of softness versus severity through a carefully chosen palette of soft and sharp colors, reflecting emotional tension. The warmer tones of powder pink and warm white represent softness, while carbon black and sharp crimson express severity. The arrangement introduces a spiral flow that highlights the push and pull between these emotional states, with intensity concentrated toward the center to symbolize struggle, while lighter hues provide a counterbalance. Key contrasts appear as radial pulses at the core that disrupt the outer channels, echoing feelings of guilt and forgiveness, culminating in a visual narrative of tension between refuge and exposure.</desc>
