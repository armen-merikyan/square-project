<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse in Static</title>
  <desc id="desc">This composition embodies the emotional conflict between clarity (the signal) and chaos (the noise) through strategic color use. The palette features a bright 'signal green' and 'electric blue' surfacing amidst muted tones of 'static gray' and 'dead black.' This contrast showcases the struggle for visibility against overwhelming static. The 'last light' layout pushes a vibrant cluster toward one corner, echoing the idea of a singular, bright pulse fighting its way through chaos. Broken pixels introduce intentional disruptions, mimicking the idea of false echoes, ultimately allowing a visual representation of memory and imperfection.</desc>
