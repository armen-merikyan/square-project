<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece captures the emotional tension between rage and calm through a dichotomy of colors and textures. The vibrant reds signify rage and are arranged in a jagged 'ladder' pattern, symbolizing chaotic bursts of emotion, while cooler pale blue tones create a flood-like base, suggesting a calm undercurrent. The central collision arises from an interplay of these contrasting patterns, where the fiery reds attempt to break through the softness of blue, creating a visual representation of struggle and containment. The layout features moments of quiet space, with the narrow path echoing a 'quiet channel' that invites reflection amidst emotional upheaval.</desc>
