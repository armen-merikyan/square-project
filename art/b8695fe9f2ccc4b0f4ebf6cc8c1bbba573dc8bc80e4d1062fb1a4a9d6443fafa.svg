<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Disarray</title>
  <desc id="desc">This piece explores the tension between chaos and order, evoking the emotional contrasts of panic and control. The chosen colors from the 'broken_memory' palette—sepia, tan, dust gray, and faded blue—elicit feelings of nostalgia and unease, creating a depth akin to memories that are both cherished and painful. The left half, representing panic, employs a radial pattern with dense clusters of dark hues, while the right side embodies control with a crack pattern, interrupted by lingering negative space. The collision occurs at the boundary where chaotic elements meet structured forms, depicting the push and pull of emotions intricately woven into the fabric of experience.</desc>
