<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This piece captures the emotional tension of emptiness versus desire through layered, contrasting colors. The dark navy and black symbolize the feeling of emptiness, while the lighter, cooler tones of dim cyan create a sense of distant hope. The rising layout echoes the desire to ascend out of loneliness, while the irregular pixels introduce an element of disruption, representing the struggle between these two emotions. The piece oscillates between dense, warm areas and cooler spaces, creating a rhythmic pattern of push and pull, embodying the seed's themes of rising and falling.</desc>
