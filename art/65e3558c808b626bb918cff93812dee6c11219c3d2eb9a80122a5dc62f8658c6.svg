<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone juxtaposes the intense saturation of desire against the soft void of emptiness. The palette features warm tones like hot coral and blood orange representing desire, while the charcoal and hollow blue create a sense of depth and yearning. The contrast lies in the center, where bright colors clash with darker spaces, embodying tension yet hinting at a desperate push against boundaries, symbolizing unfulfilled desires encompassed by an encapsulating emptiness. The chosen patterns—noise for desire and flood for emptiness—intersect, leaving a breaking point that accentuates the core conflict.</desc>
