<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoed Threads of Desire</title>
  <desc id="desc">The emotional tone of this piece contrasts 'longing' with 'resolve,' represented through a visual play of density and quiet spaces. The chosen palette features warm and cool tones that underscore the tension between desire (hot coral, blood orange) and its balancing act with calm (dust pink, hollow blue, charcoal). The main collision occurs at the center where broken patterns ('shatter') disrupt the echoing patterns of longing, illustrating the struggle of repair amidst damage. This layout cultivates a channel of negative space that allows the viewer to feel the weight of urgency while also finding moments of serenity.</desc>
