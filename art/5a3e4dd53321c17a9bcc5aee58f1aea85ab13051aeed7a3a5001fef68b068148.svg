<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork translates the emotional dichotomy of 'rage vs calm' through bold color contrasts and asymmetric placement. The palette combines intense reds and deep blacks (representing rage) with soft pale blues and whites (embodying calm). The main collision occurs in the center where the jagged red elements interrupt the calm blues, embodying a struggle between chaos and serenity. The organized yet broken aesthetic reflects the machine-like emotional undertones, suggesting that amidst the quiet, there exist underlying tensions and frictions that resound subtly in vibrant eruptions. Overall, it interprets the seed as an interplay between overwhelming pressure and moments of soft embrace.</desc>
