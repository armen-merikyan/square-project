<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece explores the emotional dichotomy between vulnerability and strength. The muted tones of bone white and stone gray form a soft interior evoking vulnerability, while the richer moss green and rust provide a firmly structured outer layer representing strength. The arrangement creates a sense of conflict—a patchwork pattern interrupts a quiet field layout, reflecting the turmoil between the two emotions. A dominant quiet field in moss green occupies most of the space, countered by rust-tinged patches of vulnerability that collide towards the center, suggesting a tension—a flood pressing against a stack that seeks shelter.</desc>
