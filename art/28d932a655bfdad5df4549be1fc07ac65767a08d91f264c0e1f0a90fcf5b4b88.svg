<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This abstract composition conveys the tension between vulnerability and strength, using a palette that plays with muted tones and subtle contrasts. The colors are chosen to reflect a delicate balance: the muted cream represents vulnerability, contrasting against the stronger hues of red oxide and iron gray. The central collision of elements occurs diagonally where vibrant colors intersect with softer tones, creating both tension and harmony, and echoing the concept of a 'heart fragment' without literal representation. The layout features strength occupying one diagonal wedge and vulnerability dominating the other, while broken pixels introduce intentional imperfections that symbolize the intersection of these emotions. Negative spaces allow for breath within the intensity.</desc>
