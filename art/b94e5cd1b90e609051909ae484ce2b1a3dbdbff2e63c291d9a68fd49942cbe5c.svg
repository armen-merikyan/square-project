<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Symmetry</title>
  <desc id="desc">This piece captures the emotional tension between love and betrayal through a near-symmetrical design that subverts expectation. The palette combines warm pinks and soft reds with darker maroons and grays, creating a clash that embodies both tenderness and disillusionment. The radial pattern of despair plays against the checker-like formations of affection, while the broken pixels introduce imperfections that echo the theme of betrayal. The most pronounced contrasts occur in the center of the composition, where the warm colors collide with the cold grays, manifesting the complex interplay of emotions defined by the seed: a heart pulled violently between affection and heartbreak.</desc>
