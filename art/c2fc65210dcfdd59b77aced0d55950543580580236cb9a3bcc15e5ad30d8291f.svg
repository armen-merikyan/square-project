<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragile Horizon</title>
  <desc id="desc">The emotional tone of this piece embodies the tension between vulnerability and strength. The palette, consisting of sepia, tan, dust gray, and faded blue, reflects muted emotions, suggesting both decay and soft renewal. The main contrast is a gradient from darker, heavier colors at the bottom to lighter, airier hues above, symbolizing the struggle of rising from vulnerability toward strength. The patterns collide as the 'shatter' of strength is woven into the static 'vulnerability,' disrupting the smooth transition and creating a dynamic interplay throughout the piece. This embodies a delicate balance where calm meets pressure, showcasing the beauty in broken experiences and the complexity of emotional layers.</desc>
