<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Divide</title>
  <desc id="desc">The emotional tone is defined by the tension between defiance and submission, represented in a juxtaposition of dense and open spaces. The selected palette of black, electric blue, lime, and magenta reflects the clash between dark oppression and vibrant assertion. The contrast arises primarily from the bold border in electric blue which represents defiance—encasing the softer, muted inner core in lime that symbolizes submission. Randomly placed 'broken pixels' disturb the harmony, suggesting moments of disruption, aligning with the seed's concept of falling and weight. This layout evokes a feeling of struggle and contrast, embracing the heaviness of lower sections against lighter tones above, mirroring the emotional turbulence of love and betrayal, while respecting negative space, allowing for breathing room amidst the chaos.</desc>
