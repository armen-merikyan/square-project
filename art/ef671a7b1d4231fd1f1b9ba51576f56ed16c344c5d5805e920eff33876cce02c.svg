<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry Disrupted</title>
  <desc id="desc">This piece explores the tension between envy and gratitude using a palette dominated by dark navy and black to evoke depth and weight. The higher luminance of dim cyan represents gratitude, contrasting with the oppressive shadows that suggest envy. The stairs pattern flowing diagonally signifies the tumultuous journey of these emotions, while broken edges create a sense of imperfection indicating the disarray in a typically symmetrical nature. The collisions occur in the center, where dark hues wrestle with lighter ones, creating a vibrant central tension that speaks to unresolved emotional conflict.</desc>
