<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Division</title>
  <desc id="desc">The emotional tone reflects a conflict between brightness and grayness, symbolizing the struggle between hope (spark) and decay (ash). The palette mixes warm coral and soft amber as accents against muted cold slate and blue-black, establishing a striking contrast. This creates a visual impact where the warm colors are concentrated in the center, representing vitality clashing with the surrounding cooler tones, reminiscent of jagged edges and disruption. The patterns reinforce the idea of pulsating energy meeting static memory, with broken pixels adding intentional imperfections, symbolizing the scars of this dynamic tension.</desc>
