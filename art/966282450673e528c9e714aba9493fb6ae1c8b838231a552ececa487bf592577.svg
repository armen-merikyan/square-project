<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition reflects the emotional tension between vulnerability and strength. The palette, 'hot_coral', 'blood_orange', 'dust_pink', 'charcoal', and 'hollow_blue', creates a clash of warmth and coolness, symbolizing both safety and exposure. The main contrast occurs centrally where the broken frame (representing vulnerability) collides with solid blocks (representing strength). This arrangement of patterns—barcode for strength and a subtle broken frame for vulnerability—creates a dynamic narrative of tension and protection. The use of intentional broken pixels introduces a sense of imperfection, echoing vulnerability in a structured horizon. The layout fosters a visual argument, inviting the viewer to ponder the delicate balance of emotions portrayed.</desc>
