<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall</title>
  <desc id="desc">This artwork embodies the emotional tension between joy and grief, using a palette of warm yellows and oranges against cool deep blues and muted purples. The upward flow of the pixels on the lower half suggests hope and joy, while the downward colors on the upper half introduce a sense of grief and descent. The contrast between the bright and muted tones symbolizes the collision of emotion, with moments of white negative space allowing for breathing room amidst the tension. The flame pattern representing grief burns against the joyfully expansive rain pattern beneath, embodying the seed's themes of hidden vs exposed and the continuous interplay of light and dark.</desc>
