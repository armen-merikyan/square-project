  <title id="title">Tension of Boundaries</title>
  <desc id="desc">The emotional tone fluctuates between feelings of panic and control, creating an interplay between chaotic and structured energy. The chosen palette of sepia, tan, dust gray, and faded blue evokes a sense of nostalgia infused with unease, imitating the fading memories of an empty space. The main contrast arises from the central cluster of dense, structured noise against a backdrop of broken dot patterns, highlighting the tension between stability and instability. The arrangement echoes a spiral flow, suggesting the pull of an orbit while leaving enough negative space to represent the void of the room.</desc>
