<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The artwork captures the tension between longing and resolve through a palette of warm coral and orange against cooler charcoal and soft blue. The emotional dialogue is expressed through broken, jagged pixels that represent past scars, juxtaposed with bright pixels illustrating hope and potential repair. The collision of radial patterns of longing with crack patterns of resolve creates a dynamic visual rhythm at the center, evoking feelings of contrasting urges for action versus inaction. The negative space ensures a sense of quiet respite amid tension, making the unresolved emotions palpable but not overwhelming.</desc>
