<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This abstract composition reflects the tension between softness and severity. The palette combines warm whites and soft pinks to represent softness, while the sharp crimson and deep carbon black evoke severity. The central area is dense with marked patterns to symbolize emotional pulse points, creating a feeling of weight, set against quieter edges that signify shelter. The use of a jagged edge enhances the impression of interruption, with broken pixels intentionally placed to create both visual and emotional scars.</desc>
