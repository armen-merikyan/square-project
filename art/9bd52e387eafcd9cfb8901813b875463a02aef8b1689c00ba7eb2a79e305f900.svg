<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a dynamic tension between the warmth of desire and the coolness of restraint. A palette of hot coral and blood orange evokes pressing emotional heat, while the muted tones of charcoal and hollow blue insert a sense of cold barrier, symbolizing restraint. The primary collision occurs at the center where saturated colors meet the muted edges, encapsulating the push and pull of longing and limitation, as dictated by the seed’s theme. The abstract pattern suggests a glitch-like distortion representing the overlapping emotions, further intensified by broken pixels that imply imperfections in this emotional struggle.</desc>
