<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Edges</title>
  <desc id="desc">This composition explores the emotional tension between vulnerability and strength. The dark maroon and gray colors symbolize strength, forming a protective, thick border around an exposed, lighter pink center. The arrangement creates a stark contrast, embodying the conflict of hard edges shielding soft exposure. The broken pixels introduce imperfection, representing the scars of both vulnerability and strength. The layout flows from the top to the bottom, allowing the lighter colors to rise, emphasizing the struggle of exposure amid the solid walls that contain it. This interplay captures the seed's theme of connection and alienation and the dynamic of sheltering versus being open.</desc>
