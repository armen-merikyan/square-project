<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone blends the softness of tenderness with the abruptness of rage, creating a dialogue of pressure vs calm. The palette reflects this with deep reds representing rage and pale blues for tenderness, accented by contrasting blacks and whites. The main collision occurs at the center where tender stripes meet jagged edges, visually representing the struggle between protection and invasion. Negative space enhances the tension, allowing the eye to rest amidst the chaos. This arrangement suggests a rhythmic push and pull between peace and turmoil, echoing the complex emotions of the seed.</desc>
