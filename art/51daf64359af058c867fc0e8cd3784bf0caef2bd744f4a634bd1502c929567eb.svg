<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This composition embodies the emotional dichotomy of joy and grief, employing a palette of yellows and deep blues to represent warmth versus heaviness. The brighter colors penetrate the darker hues, suggesting moments of joy breaking through grief. The split screen layout creates tension as joy spreads from the bottom left, staving off the overwhelming blues that ascend from the top right. Hard edges mirror the conflict between order and chaos, while the presence of negative space softens the overall composition's pressure, suggesting uncertainty and fluctuation in emotions.</desc>
