<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Contrast</title>
  <desc id="desc">This piece conveys the emotional struggle between emptiness and desire through a palette of warm and cool tones. The heavy black occupies a central role, representing feelings of emptiness, while accents of lime and electric blue create a vibrant tension that symbolizes desire. The arrangement of colors flows from left to right, suggesting a rising signal through grid-like patterns where cool colors fight against warm ones. The 'burned edges' effect is shown in the use of darker shades contrasted by bright highlights, creating disruptions that echo the push-pull nature of human emotions.</desc>
