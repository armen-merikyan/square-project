<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension &amp; Release</title>
  <desc id="desc">This artwork embodies the struggle between defiance and submission through a layered composition where the top half is dominated by gradients of sepia and tan, suggesting a hardened interruption, while the bottom half softens into lighter tones of dust gray and faded blue, evoking a sense of retreat. The first four rows use a ladder pattern for defiance, emphasizing strong disruptions and structured verticals, while the submission rows feature a spark pattern that radiates outward, invoking a sense of diffusion. The collision occurs at the midline of the piece, forming a dynamic tension across the center, illustrating the conflicting emotion of restraint and the desire to expand beyond confines. The palette of muted tones enhances the emotional complexity while maintaining a subtle balance of negative space.</desc>
