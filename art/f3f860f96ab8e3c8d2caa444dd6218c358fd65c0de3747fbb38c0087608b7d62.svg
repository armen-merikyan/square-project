<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This composition evokes the emotional contrast between desire and emptiness, utilizing a palette that reflects warmth against coolness. The warm colors of hot coral and blood orange represent the yearning, while charcoal and hollow blue speak to the emptiness and restraint. The collision happens at the center where the warmer colors pulse outward like a rising signal, interrupted by the cooler tones which form a maze-like structure around the edges, suggesting containment. Broken pixels introduce intentional disruptions, enhancing the sense of struggle within the frame. Overall, the arrangement tells a story of tension between wanting more and facing barriers.</desc>
