<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Echoes</title>
  <desc id="desc">This piece embodies the emotional duality of panic and control, contrasting warm and cool tones to illustrate tension. The palette of dark red and burnt orange signifies the chaos of panic, while charcoal serves as a grounding element of control. The placement of colors creates a dynamic pattern where sharp warm hues collide energetically against cooler backgrounds, representing instability against a stable framework. The structure suggests an inner shape under pressure through chaotic placement, while leaving intentional negative spaces that narrate moments of stillness amid stress. The background layering hints at orbiting thoughts, reinforcing the theme of conflicting emotions without depicting any literal shapes.</desc>
