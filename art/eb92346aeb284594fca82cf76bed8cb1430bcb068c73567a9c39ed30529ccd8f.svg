<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This piece embodies the contrasting emotions of fear and hope. The top four rows represent fear through a dense grid of dark colors, with jagged edges reflecting jagged thoughts, creating a claustrophobic feeling. The bottom rows introduce pale green and soft gold in a crosshatch pattern, symbolizing hope breaking through negative space. Color collision occurs where the bold, dark pixels interact with lighter ones, allowing a glimpse of upward flow and potential amidst shadow. The overall composition reflects the push and pull between dark anxieties and light aspirations, echoing the seed's exploration of inside versus outside through emotional saturation.</desc>
