<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition captures the emotional struggle between the forces of safety and exposure. The palette features soft yet contrasting colors—gentle shelter greens and warm browns embrace a central pale skin color to symbolize safety. The darker edges mirror the pressure of exposure, while lighter hues cascade toward the center, introducing the idea of release. The ladder pattern represents exposure's rhythm, whereas the target pattern provides a secure backdrop, allowing one to echo into the other. The main collision occurs at the center, creating a spiral of tension and relief that illustrates the complex interplay of these contrasting emotions.</desc>
