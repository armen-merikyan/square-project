<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Connection</title>
  <desc id="desc">This artwork reflects the tension between loneliness and connection, seen through its dual-patterns and color density. The dark navy and black signify solitude, while the dim cyan introduces a hint of connection, creating contrast within the dense arrangement. The pixels are arranged to form an off-center heart fragment, symbolizing a yearning for connection within isolating circumstances. Broken pixels add imperfection, hinting at hidden vulnerabilities. The contrast between weighted sections and sparse spaces evokes a narrative of longing and fleeting contact.</desc>
