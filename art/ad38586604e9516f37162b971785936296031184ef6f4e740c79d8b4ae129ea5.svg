<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resilience</title>
  <desc id="desc">This artwork balances themes of vulnerability and strength, using a palette of cosmic indigo, void black, star white, cold gold, and deep teal. The deep teal and cosmic indigo create a stable center, representing strength, while the void black and cold gold create soft breaks and exposed areas symbolizing vulnerability. The main contrast occurs in the center, where the strength of deep teal collides with the vulnerability of cold gold, suggesting a quiet yet intense emotional dialogue. The patterns echo each other, creating a sense of connection and alienation, showcasing that vulnerability can coexist with strength.</desc>
