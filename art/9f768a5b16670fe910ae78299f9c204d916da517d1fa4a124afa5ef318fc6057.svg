<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">This composition embodies the tension between certainty and curiosity through contrasting colors and patterns. The palette combines muted hues, such as dust gray and off-white, to signify a sense of stability, while brighter accents like compressed red create points of interest that invite exploration. The layout, which is predominantly dim with a small bright cluster, reflects the struggle of finding clarity amidst chaos. The patterns collide at the center, where the split-screen certainty clashes with the threshold crashes of curiosity, emulating interference. This results in an emotional tension that captures the essence of rising signals against a backdrop of static, suggesting a rhythmic flow that transpires from bottom to top, revealing both relief and dread through the arrangement of colors.</desc>
