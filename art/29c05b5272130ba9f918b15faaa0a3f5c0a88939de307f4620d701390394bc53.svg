<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece embodies the tension between vulnerability and strength, utilizing a palette of clean white and ice blue as the soft foundations of vulnerability, contrasted against the deep ink black and warning orange to signify strength and pressure. The emotionally charged collision happens predominantly in the center, where strength's dark hues clash unexpectedly with the pale surroundings, creating a vivid echo of conflict. The placements are intentionally asymmetrical, leaving negative space to signify the fragility of the moment within the overflowing emotions, while broken pixels suggest the imperfections that come with such a raw exposure.</desc>
