  <title id="title">Tension of Asymmetry</title>
  <desc id="desc">The emotional tone explores the tension between defiance and submission, layered with the weight of uncertainty and dual narrative. The chosen palette of red, pale blue, black, and white reflects anger against calmness — a warm vs. cool contrast that embodies both passions. The arrangement creates a collision of boldness at the center with softer hues at the edges, highlighting the 'half-square' idea through asymmetry. Broken pixel placements enhance imperfection, while maintaining a negative space that emphasizes absence, aligning with the themes of falling and fragmentation.</desc>
