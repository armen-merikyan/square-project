<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition embodies the interplay between softness and severity, using a color palette that combines soft powder pink and warm white with harsher carbon black and sharp crimson to create emotional tension. The main contrast occurs centrally, where the pink and white hues clash against the dark boundary created by black and gray, suggesting a pulse of life struggling within a strict environment. The spiral layout reinforces a sense of movement, illustrating the gradual tension and release between these conflicting emotions. The use of broken pixels results in a disrupted yet cohesive structure, revealing vulnerability amid strength, thus mirroring the emotional journey from guilt to forgiveness.</desc>
