<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipsed Signals</title>
  <desc id="desc">The emotional tone of this piece navigates the tension between trust and suspicion through a divergence of color fields. The palette, rooted in hot coral and hollow blue, instills a sense of warmth while invoking the coolness of doubt, signifying the clash of emotional states. The main contrast emerges through a central collision of darker hues creating a shadow effect, representing suspicion, against a perimeter of brighter, warmer tones signifying trust. This duality is made visually prominent by the diagonal flow, suggesting a dynamic struggle between forces, illustrated through abrupt changes in color density and intentional 'broken pixels' for organic disruption, amplifying the narrative of resilience in fragility.</desc>
