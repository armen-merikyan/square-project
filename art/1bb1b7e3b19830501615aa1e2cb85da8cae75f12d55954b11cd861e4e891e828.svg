<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This abstract composition reflects the emotional tension between vulnerability and strength through the interplay of light and dark pixels. The soft ice-blue and pale white serve as the exposed center, suggesting vulnerability, while the deeper blacks provide a protective frame that embodies strength. The collision occurs in the center where ice-blue and warning orange disrupt the flow of darker colors, illustrating a struggle between the two emotional states. The patchwork of broken pixels introduces imperfection, representing the unguarded nature of exposure intertwined with the resilience of shelter.</desc>
