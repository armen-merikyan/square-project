<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Control</title>
  <desc id="desc">The artwork embodies the emotional dichotomy of panic and control through a radiant center that contrasts with the encroaching darker edges. The palette, drawn from the 'ancient_fire', evokes a sense of warmth yet chaos, reflecting the conflict between safety and anxiety. The primary collision occurs through the use of deep burnt orange at the core, signifying control, set against the volatile dark reds at the edges, which invoke a sense of panic. The structural pattern represents an orbiting motion, with orderly stripes juxtaposed against the chaotic stairs, symbolizing the conflict between stability and disorder, amplifying the emotional tension of the seed.</desc>
