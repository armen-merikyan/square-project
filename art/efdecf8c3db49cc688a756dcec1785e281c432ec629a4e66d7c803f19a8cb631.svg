<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory in Collision</title>
  <desc id="desc">The emotional tone reflects a struggle between tenderness and rage, captured through contrasting palettes. The use of deep red and black represents rage while pale blue and white signify tenderness, allowing for a striking visual narrative. The left side (emotion A - tenderness) features muted, softer shades that suggest protection and calm, while the right side (emotion B - rage) is accentuated with sharper colors and chaotic arrangements, suggesting a storm of intensity. The main collision occurs at the center, where the tension between these two emotions can be felt most vividly, creating a dynamic interplay of warmth and sharpness. The broken pixels introduce imperfections and echoes of memory, enhancing the abstract nature of the work.</desc>
