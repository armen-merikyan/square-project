<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Chaos</title>
  <desc id="desc">The emotional tone juxtaposes clarity with confusion, using a palette that transitions from dark violet to soft gold, suggesting tension between stability and disorder. The main contrast occurs around the center, where sharp, clear outlines of gold clash with the soft, uneven dots of violet. This creates a sense of 'falling pixels', embodying the idea of confusion radiating outward while maintaining a core of clarity—a dance between a chaotic flow on the edges and a concentrated calm at the center. The broken pixel elements represent the imperfections that enhance the narrative of collision between clarity and confusion.</desc>
