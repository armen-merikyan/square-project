<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone blends the tensions of desire and restraint, reflected through warm saturations clashing with muted tones. The chosen palette, which features hot coral and blood orange representing desire, pulsates against the charcoal and hollow blue that signify restraint. The composition's main collision occurs at the center, where a vibrant braid-like pattern of warm colors meets the cool dotted boundaries, creating a dynamic push and pull. The negative spaces establish a tranquil backdrop, allowing the energetic colors to resonate with a sense of locked potential. This abstract pattern captures a narrative of longing and the pain of limitation without literal representation.</desc>
