<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone captures the tension between void and longing. The palette blends warm tones of hot coral and blood orange to signify desire with the cooler hues of charcoal and hollow blue representing emptiness. The main contrast occurs at the bottom left, where desire spills over, colliding with the structural edge that contains the space. Patterns of noise and spark interact, reflecting chaotic energy meeting rigid boundaries, creating a dynamic visual echo of the seed's themes.</desc>
