<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight and Light</title>
  <desc id="desc">This artwork embodies the emotional tension between relief and dread, a duality captured through a palette of warm and cool colors. The pink and red hues symbolize the intensity of relief and emotion, while dark maroon and gray represent the foreboding presence of dread. The layout is designed with a heavy outer layer, contrasted by lighter inner pixels, echoing the feeling of an empty room; the stark contrasts create a visual push-pull that invokes contemplation and emotional reflection. Patterns of dots signify relief, punctuating the solid dark areas reflecting dread, embodying the conflict of symmetry and break. This assemblage shapes a vivid narrative, where bursts of light seek to emerge from underlying weight, prompting a viewer to experience the subtle interplay of emotions.</desc>
