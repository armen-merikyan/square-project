<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Flickering Duality</title>
  <desc id="desc">This piece captures the emotional tension between the fleeting spark of vitality and the quiet residue of ash reflecting memories of restraint. The palette, featuring warm shadow and lamp gold, symbolizes warmth interspersed with cool blue and distant lilac, representing both uplift and melancholic depths. The primary contrast occurs diagonally across the square, where the glitch pattern of sparks interrupts the smoother ring pattern of ash, evoking a sense of disruption and resilience amidst fragility, with negative space allowing for moments of quiet reflection.</desc>
