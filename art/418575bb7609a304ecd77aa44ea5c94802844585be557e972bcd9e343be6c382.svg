<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipsed Affections</title>
  <desc id="desc">This artwork conveys an emotional dichotomy between love and betrayal through a carefully chosen palette of tender pinks, deep maroons, and earthy grays. The diagonals suggest a rise, while the soft touch of warm colors contradicts the harshness of sharp contrasts, echoing themes of warmth versus coldness. The layering creates a tension of pressure encompassed by negative space, inviting the viewer to feel both the comfort of love and the abruptness of betrayal. The broken pixel elements introduce imperfection, enhancing the thematic contrasts of sharp versus soft.</desc>
