<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Patterns</title>
  <desc id="desc">The emotional tone captures the struggle between confusion and clarity, represented through an asymmetric arrangement of colors. The palette utilizes warm yellows and oranges to evoke a sense of clarity, juxtaposed against deep blues and muted purples that convey confusion. The main contrast occurs centrally, where brighter tones collide with darker, more muted hues, creating a dynamic tension reminiscent of the described ‘teeth against broken dots.’ The pattern alternates between filled and hollow spaces, embodying the push and pull of emotional states and allowing for an echo of unformed thoughts as they scatter outward, suggesting a chaotic yet organized release.</desc>
