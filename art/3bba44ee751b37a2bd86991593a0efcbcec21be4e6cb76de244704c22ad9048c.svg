<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Exposure</title>
  <desc id="desc">This artwork conveys a dynamic emotional contrast between safety and exposure. The palette consists of warm brown and shelter green to represent safety, contrasted with open blue and pale skin for exposure. The horizontal bands symbolize layers, shifting between density (warm brown) and openness (cold white). The main collision occurs in the center where exposure colors ripple through the earthy tones, creating tension and interaction between the two themes, with broken pixels reminiscent of scars that interrupt the smooth flow of the background. This complex interplay embodies the seed's themes beautifully, crafting a narrative of vulnerability juxtaposed with protection.</desc>
