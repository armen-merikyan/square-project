<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Dread and Relief</title>
  <desc id="desc">The emotional tone in this work explores the tension between light and darkness, embodying the conflict of dread and relief. The selected palette of industrial tones—burnt orange, dark red, charcoal, and gold—evokes a sense of warmth but also shadows. The layout follows an argument grid, creating a split between heavy dark segments that suggest a weighted atmosphere of dread and lighter checker patterns representing relief. The collision occurs in the intersection of the deep reds with the gold accents, creating tension that suggests a struggle between the opposing emotions. The presence of broken pixels adds an unpredictable element, symbolizing the cracks in both security and dread, enhancing the feeling of an empty room that feels both oppressive and freeing.</desc>
