<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Balance</title>
  <desc id="desc">This artwork reflects the emotional tension between panic and control through a striking contrast of colors. The palette of deep blacks and pale blues symbolizes the chaotic energy of panic juxtaposed with the calm neutrality of control. The arrangement creates a visual argument where control (represented by the organized patterns in blues) attempts to stabilize the overwhelming chaos of panic (expressed through fragmented blacks). The interplay of broken pixels introduces an element of imperfection, embodying instability and creating a dynamic flow that suggests an internal struggle. The overall layout emphasizes clustering around a central focus point, creating a sense of orbit and conflict in the space, embodying the themes of the seed in an abstract manner.</desc>
