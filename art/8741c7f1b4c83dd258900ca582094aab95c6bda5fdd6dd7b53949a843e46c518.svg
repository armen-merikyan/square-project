<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The composition navigates between rage and tenderness, with the deep blacks and vibrant reds representing the intensity of rage, while softer pale blues and whites introduce elements of tenderness. The center showcases a collision of these emotions where the deep, saturated colors collide with lighter, muted shades, creating visual tension. The layered bands suggest a journey, climbing through emotional strata, interrupted by areas of pixel bleed—where imperfections mark the passage between protective tenderness and raw rage. The use of broken pixels adds an element of intentional disruption, echoing the fragility of emotions. The final artwork captures the balance between vulnerability and strength, reflecting the complexity of inner feelings.</desc>
