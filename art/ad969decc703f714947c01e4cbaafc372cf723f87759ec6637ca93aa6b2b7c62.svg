<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tension</title>
  <desc id="desc">The emotional tone captures the struggle between defiance and submission through a contrast of warm and cool colors. The palette includes warm coral and soft amber juxtaposed against cold slate and blue-black, symbolizing the bright refusal clashing with enclosed softness. The broken pixels emphasize disruption, making the center feel attacked while the edges offer a subdued calm. The arrangement employs a circular inward spiral pattern for defiance and a threshold layout for submission, creating a tension-filled asymmetry where the dense cluster of dark colors collides with the emptiness of surrounding space, aligning with the seed's themes of invasion and escape.</desc>
