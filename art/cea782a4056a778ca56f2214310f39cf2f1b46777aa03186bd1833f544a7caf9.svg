<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Caught Between</title>
  <desc id="desc">This composition embodies the emotional tension between longing and resolve. The contrast between deep ink blacks and the bright pop of warning orange serves as a visual metaphor for the conflict between chaos and the order of emotions. The layout follows a diagonal wedge, where the black colors represent longing, hinting at a weighty, unfulfilled aspect, while the orange radiates a feeling of resolve, pushing energetically against the darker tones. The quiet blue hues create a spacious, calm area that gives relief amidst the denser black regions, embodying the tension and release dynamics suggested by the seed.</desc>
