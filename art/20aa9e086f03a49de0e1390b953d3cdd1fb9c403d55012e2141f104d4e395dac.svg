  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects the juxtaposition of vulnerability and strength, with a palette that plays on deep blues and pale yellows to embody sorrow and renewal. The contrast is primarily found in a dense cluster of strong colors at the center, representing strength, meeting a softer, less saturated edge that symbolizes vulnerability. The flow is diagonal, suggesting movement and interaction, while the broken pixels create intentional disruptions, giving a sense of imperfect beauty and tension.</desc>
