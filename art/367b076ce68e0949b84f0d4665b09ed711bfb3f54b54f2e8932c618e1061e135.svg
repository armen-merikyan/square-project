  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects a tension between vulnerability and protection. The palette balances cool tones (open blue, cold white) hinting at exposure with warm tones (warm brown, shelter green) suggesting safety. The main contrast occurs through a division in the center, symbolizing the fragility of balance between the two aspects. The patterns of 'channels' and 'halo' create visual interplay, while broken pixels add to the narrative, amplifying the sense of imperfection and conflict.</desc>
