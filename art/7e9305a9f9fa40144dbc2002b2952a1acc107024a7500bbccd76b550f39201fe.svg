<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Currents</title>
  <desc id="desc">This piece embodies the tension between softness and severity through a palette of powder pink and carbon black. The saturation of dark colors against lighter tones creates a dynamic interplay, with predominant areas of soft pink interrupted by sharp crimson and steel gray. The layout hints at order through structured patterns while allowing chaos at the edges with broken pixels, signifying leaky emotional boundaries. The patterns collide at the center, highlighting the friction between comfort and unease, resembling a pulse against a radial backdrop.</desc>
