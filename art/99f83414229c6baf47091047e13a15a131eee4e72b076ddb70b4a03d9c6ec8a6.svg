<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece captures the emotional tension between desire and emptiness, using a contrasting palette where warm, saturated tones collide with darker, cooler shades. The layout suggests two pulsating centers separated by negative space, symbolizing the struggle between overflowing desire and the limits of containment. The main contrast occurs at the central axis, creating a visual pulse that resonates with the underlying theme. 'Hot coral' and 'blood orange' express desire, while 'charcoal' provides a muted backdrop of emptiness. Broken pixels introduce imperfection, enhancing the sense of dislocation and urgency in the composition.</desc>
