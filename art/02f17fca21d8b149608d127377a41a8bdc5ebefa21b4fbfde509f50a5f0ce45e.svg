<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Shadows</title>
  <desc id="desc">The emotional tone captures the struggle between love and betrayal through opposing color influences—warm reds intersecting with cold grays, creating a dialogue of warmth fading into uncertainty. The palette embodies the duality of love (red, pink) and betrayal (dark maroon, gray). The pattern suggests a flow of love rising amidst chaotic interruptions, while broken edges represent the imperfections and conflicts within relationships. The density of color evokes the weight of emotions, contrasting against the negative space that hints at longing and absence, thus creating an impression of beauty interlaced with pain.</desc>
