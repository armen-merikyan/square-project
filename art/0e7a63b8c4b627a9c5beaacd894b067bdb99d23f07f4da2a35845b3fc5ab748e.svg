<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tension</title>
  <desc id="desc">This piece captures the emotional duality of relief and dread. The contrasting palette of muted storm gray and near black represents dread, while the soft sky and faded gold evoke feelings of relief and brightness. The layout initiates from a corner, suggesting a gradual invasion of dread, which collides with the lighter fields, maintaining a tension-filled negative space. Patterns clash as the darkened tones weave upwards in a ladder fashion from the corner against the light threshold of the relief palette. The use of broken pixels at varied intervals introduces intentional imperfection and echoes the theme of struggle.</desc>
