<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict and Resilience</title>
  <desc id="desc">This artwork embodies the tension between defiance and submission through a dynamic interplay of saturated colors and muted tones. The central region features deep blacks and vibrant oranges, representing defiance—bold, unyielding, and radiating warmth. The surrounding colors shift to icy blues and grays, symbolizing submission—calm, receding, and reflective. The contrast is most pronounced in the center, crafting a spiral movement that draws the eye inward, embodying the theme of inward spirals and corner invasions. Broken pixels introduce imperfection, creating a sense of unrest amidst the structured chaos. This composition narrates the struggle of maintaining strength and individuality against encroaching pressures, illustrating a rich, emotive journey without literal representation.</desc>
