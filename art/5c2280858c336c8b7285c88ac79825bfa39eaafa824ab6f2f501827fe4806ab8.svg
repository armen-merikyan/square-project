  <title id="title">Contrast in Motion</title>
  <desc id="desc">This artwork explores the emotional tension between longing and resolve through the palette of deep navy and bright white. The main collision occurs in the center, where dark and light shades intermix, reflecting the push and pull between chaotic thoughts and steady desires. The chosen patterns evoke a sense of tide and pulse, reflecting how emotional rhythms clash in moments of personal struggle. The use of negative space enhances the feeling of distance, while broken pixels serve as reminders of imperfection in our experiences.</desc>
