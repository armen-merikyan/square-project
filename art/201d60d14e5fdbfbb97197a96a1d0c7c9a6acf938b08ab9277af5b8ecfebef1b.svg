<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">This composition captures the tension between rage and calm through a dynamic contrast of warm and cool colors. The palette includes bold red and deep black representing the explosive emotion of rage, and pale blue and white symbolizing the calmness trying to contain it. The main collision occurs at the center, where jagged red pixels (representing shatter) disrupt the ordered bands of blue and white (representing ladder), creating a visual echo of tension. This translates the emotional trajectory defined by the seed, reflecting a push-and-pull between containment and overflow within an abstract structure that can be perceived as a ringed void, reflecting both chaos and serenity.</desc>
