<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter Collide</title>
  <desc id="desc">This piece illustrates the tension between safety and exposure through a contrast of colors that evokes warmth and coldness. The palette includes shelter green and warm brown to represent protection, while pale skin and cold white reflect vulnerability. The dominant green and brown occupy the left side, suggesting a heavy enclosure, while the lighter colors ripple and pulse from the right edge, creating a sense of exposure and movement, reflecting the emotional qualities derived from the seed's themes. The use of broken pixels introduces intentional imperfection, embodying the fragility of safety within exposure. The collision happens at the center-left, symbolizing the heart of the emotional conflict between security and freedom.</desc>
