<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Orbit</title>
  <desc id="desc">This piece embodies the emotional tension between defiance and submission. The chosen palette—deep reds, soft pinks, and muted grays—hints at themes of love and betrayal. The arrangement features a weighted bottom that evokes a feeling of gravity, while the contrasting colors fight for dominance, creating noise against a subdued frame. The central symmetry of the tiny plus shape dissects the space, representing the clash of opposing forces. The abrupt shifts in brightness from dark maroon to vibrant pink introduce a disruptive rhythm, echoing the theme of conflict and resolution throughout the piece.</desc>
