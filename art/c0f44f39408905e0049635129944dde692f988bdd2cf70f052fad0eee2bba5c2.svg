<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragments of Yearning</title>
  <desc id="desc">This piece encapsulates the emotional dichotomy of longing and resolve through juxtaposed colors and placements. The warm tones of powder pink and sharp crimson evoke a sense of desire and urgency, while the cooler carbon black and steel gray ground the composition with a sense of calm and containing strength. The main collision occurs in the center, where the crimson threads burst through muted fields, representing the struggle and tension between the two emotions. The placement of broken pixels adds an intentional imperfection, symbolizing the unresolved nature of the feelings, all within a 'broken frame' layout that suggests containment yet allows for emotional leaks.</desc>
