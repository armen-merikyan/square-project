  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece plays on the emotional tension between tenderness and rage through a carefully selected palette of saturated reds and muted blues. The main collision occurs in the center, where jagged radial patterns of red bleed into the smooth, rounded patterns of pale blue. The negative space, predominated by black and white, serves to reinforce the overall themes of restraint and quiet amidst the chaos, effectively embodying the struggle between power and vulnerability.</desc>
