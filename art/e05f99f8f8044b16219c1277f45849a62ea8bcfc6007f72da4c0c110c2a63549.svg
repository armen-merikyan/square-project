  <title id="title">Fractured Connections</title>
  <desc id="desc">This artwork explores the emotional tension between trust and suspicion. The palette, 'mourning_renewal', combines deep blues and muted yellows to represent resilience amidst fragility. The left half embodies 'trust' with brighter tones, suggesting a soft glow. In contrast, the right embodies 'suspicion' with darker colors deeply intertwined, creating a jagged collision. The layout features scattered repair paths of brightness peering through darker regions while preserving negative space, invoking a feeling of imbalance and unresolved tension.</desc>
