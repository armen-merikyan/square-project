<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center Against the Edges</title>
  <desc id="desc">The emotional tone of 'spark vs ash' suggests a struggle between dynamic energy and subdued remnants. The palette, comprising deep teal, cosmic indigo, and star white, conveys vivid tension against dark void black. The contrast is centered with lighter colors in a jagged pattern, representing sparks intruding into the ash's quiet realm, embodying the conflict of resilience against fragility. Broken pixels are sporadically placed to interrupt the balance, symbolizing the unpredictability of emotional states and memories, creating a sense of movement that resonates with the conflict depicted in the seed.</desc>
