<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erosive Balance</title>
  <desc id="desc">The emotional tone of this piece explores the tension between tenderness and rage. The chosen palette of saturated red, subdued pale blue, and stark black creates a visual dialogue between aggression and calm, embodying the struggle of emotions colliding. The main contrast occurs in the center, where jagged red patterns (representing rage) interweave with low-warmth fields of pale blue (representing tenderness) in a sharp yet soft confrontation, suggesting a clash of intimacy and intensity. The broken pixels introduce a sense of imperfection, allowing light to bleed into darker spaces, which signifies vulnerability amidst conflict. The composition respects negative space, drawing attention to the central drama that unfolds against its borders, creating a visual echo of the emotional complexities described in the seed.</desc>
