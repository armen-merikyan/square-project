<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This piece captures the tension between joy and grief, using a palette that blends bright yellows and muted purples to evoke a sense of emotional conflict. The colors reflect joy's warmth and grief's heaviness. The main contrast occurs between the vibrant, upward-climbing layers of yellow that signify movement towards hope and the dense, darker edges that hint at sorrow's grip. The choice of a split-screen affects the flow, with a rising signal that suggests an escape from despair, punctuated by hard edges symbolizing the abruptness of emotional shifts. The maze-like pattern for grief amplifies depth, while the noise-like spread for joy creates a sense of expansive emotion.</desc>
