<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece embodies the tension between vulnerability and strength, illustrated through a palette of navy and dim cyan that evoke depth and warmth. The collision occurs at the center, where exposed, lighter tones meet heavier, darker shades. The alternating barcode and ladder patterns create a dynamic interplay, enhancing the sense of shelter versus exposure. This arrangement reflects the emotional duality suggested by the seed, conveying a narrative of protection against external pressures while maintaining an exposed essence.</desc>
