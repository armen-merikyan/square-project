<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects the tension between desire and emptiness, portrayed through a contrasting palette of vivid warm colors representing desire (hot coral, blood orange) against cooler, muted tones suggesting emptiness (charcoal, hollow blue). The collision occurs at the center, where saturated islands of desire interrupt a broken dot pattern that represents restrained emptiness. This composition captures the struggle of yearning against confinement, echoing the seed's themes of containment versus overflow and quiet pressure versus rising signals.</desc>
