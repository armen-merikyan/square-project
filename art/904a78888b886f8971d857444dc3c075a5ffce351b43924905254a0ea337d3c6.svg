<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Through Static</title>
  <desc id="desc">The emotional tone reflects a clash between clarity and interference. The palette combines deep 'dead_black' and muted 'static_gray' to represent the noise, while 'signal_green' and 'hot_magenta' act as beacons of clarity within chaos. The pattern divides the grid—with the left representing static interruptions and right signaling a path through clutter, allowing for a chaotic yet intentional arrangement reflecting the seed's themes of conflict and memory. The main collision occurs in the center, where the brighter colors disrupt the darker fields, creating a sense of vibrant tension amidst the noise.</desc>
