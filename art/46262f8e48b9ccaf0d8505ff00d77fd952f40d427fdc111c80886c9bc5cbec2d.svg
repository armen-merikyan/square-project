<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This pixel art captures the emotional dichotomy between fear and hope through a vertical split layout. The left side employs darker hues like deep violets and blacks, creating an enveloping, maze-like intensity representing fear, while the right side features pale greens and soft golds that radiate light, symbolizing hope. The contrasting patterns—chaotic maze against a smoother crack—enhance this emotional tug-of-war. The jagged pixel edges on the left disrupt the calm while glowing accents on the right signify emerging hope. This arrangement expresses the battle between emotional weights and the resulting bursts of potential light.</desc>
