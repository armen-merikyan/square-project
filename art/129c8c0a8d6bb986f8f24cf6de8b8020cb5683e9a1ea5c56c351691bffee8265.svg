<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmonies</title>
  <desc id="desc">This piece embodies the emotional tension between love and betrayal through a stark contrast in colors and patterns. The warmth of pinks and reds representing love collides with the darker maroons and grays embodying betrayal. The layout presents a split, where softer gradients of pink swirl into sharp linear patterns of maroon, creating a twisted symmetry. The broken pixels introduce imperfections, enhancing the notion of fragmented relationships while leaving enough negative space to reflect an 'empty room' feel, allowing the viewer to contemplate the emotional depth.</desc>
