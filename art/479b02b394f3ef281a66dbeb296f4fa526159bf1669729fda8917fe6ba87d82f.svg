<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inner Turbulence</title>
  <desc id="desc">This work reflects an emotional duality between rage and calm through the juxtaposition of sharp reds and cool blues. The central region bursts with dense, jagged red pixels, representing an explosive state. Surrounding this, softer hues of pale blue and white create a mirror-like calmness, echoing the tension between chaos and serenity. The flow draws from outsides towards the center, enhancing the feeling of pressure from the edges concentrating inward. Despite the vibrant emotion, adequate negative space exists, emphasizing the isolation in the center and the contrasts in tone and density throughout the piece.</desc>
