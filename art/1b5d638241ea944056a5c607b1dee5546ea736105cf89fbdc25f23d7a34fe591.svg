<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissonance of Calm and Weight</title>
  <desc id="desc">This artwork embodies the emotional tension between 'quiet' and 'pressure.' The palette includes off-white and dust gray to evoke a sense of quietude contrasted with compressed red and dark navy that evoke weight and intensity. The main collision occurs in the central rows, where the reds and navies interrupt the quiet colors, creating a dynamic imbalance, suggesting a shattering effect against an otherwise tranquil background. The falling pixel layout symbolizes tears or raindrops, accentuating a layered density transitioning to stark contrasts.</desc>
