<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This composition explores the tension between desire and emptiness. The palette combines warm tones of hot coral and blood orange to embody desire, contrasted against the cooler tones of charcoal and hollow blue that represent emptiness. The dominant warm colors occupy the central area, creating a saturated pull, while the cooler colors retreat to the edges, suggesting an underlying claustrophobia. Broken pixels scattered throughout represent the fractures in both emotions, suggesting a dynamic interaction as the warm and cool tones collide within the threshold layout. The empty spaces invoke a sense of longing interrupted by the encroaching saturation, further emphasizing the narrative of hunger vs restraint.</desc>
