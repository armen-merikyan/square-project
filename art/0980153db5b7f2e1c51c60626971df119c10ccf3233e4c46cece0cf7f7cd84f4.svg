<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interwoven Hearts</title>
  <desc id="desc">This composition contrasts the joyous and vibrant hues of yellow and orange with the muted depths of deep blue and muted purple, symbolizing the dichotomy of joy and grief. The design is left-weighted to suggest unevenness, with reflections of upbeat dots colliding against the harsher tone of a grid-like pattern, each break in symmetry representing emotional fracture. The choice of patterns enhances this duality—with dots representing joy and hard edges illustrating grief—while preserving negative space to evoke stillness amidst emotional conflict.</desc>
