<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Ember and Dust</title>
  <desc id="desc">This artwork captures the tension between sparks of warmth and the cooling, settling ash. The left half embodies a vibrant pulse of energy with crosshatched patterns in warm sepia and faded blue, while the right half presents a stark contrast with muted gray and tan resembling ash. The jagged edges symbolize the imperfections in memory and resilience. The composition's central clash lies between the dynamic crosshatching and the settled islands of quiet, creating a visual argument between creation and erasure.</desc>
