  <title id="title">Light vs Weight</title>
  <desc id="desc">The emotional tone juxtaposes panic and control, creating an interplay of dense clusters of red and dark maroon against sparser fields of pink and gray. This highlights the struggle present in the seed, with the 'spark against target' evoking excitement amid chaos. The 4 dark colors create a weighty bottom half, representing control, while the lighter colors soften the top, suggesting panic. Broken pixels amplify the sense of disruption, while maintaining necessary negative space enhances the tension between the two emotional states.</desc>
