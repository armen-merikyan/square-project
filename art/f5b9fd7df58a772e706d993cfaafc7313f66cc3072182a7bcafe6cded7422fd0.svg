<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone captures the tension between defiance and submission, with the central bright color acting as a bold refusal, surrounded by darker, softer colors suggesting retreat. The palette of burnt orange, dark red, charcoal, and gold symbolizes an ancient fire, representing passion against darkness. The layout mirrors on the sides but introduces broken pixels for intentional imperfection, emphasizing contrast between the vigorous center and the subdued edges. The collision primarily occurs at the center, forming a junction of conflicting emotions that echo throughout the piece.</desc>
