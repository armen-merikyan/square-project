<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Tension</title>
  <desc id="desc">The emotional tone captures the struggle between defiance and submission. The palette of yellow, orange, deep blue, and muted purple evokes warmth against coolness, symbolizing the collision of opposing feelings. The radial pattern in the center represents defiance, while the stripes around it signify submission, with a chaotic open gate layout allowing contrasting flows. The main contrast occurs at the center, where brightness battles depth, suggesting an unresolved tension. Broken pixels disrupt the flow, adding character and reinforcing the idea of a threshold between chaos and order.</desc>
