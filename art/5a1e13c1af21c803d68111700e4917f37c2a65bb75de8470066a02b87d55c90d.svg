<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Elements</title>
  <desc id="desc">This artwork explores the emotional duality of vulnerability and strength through color and structure. The palette includes warm ivory and soft gold to symbolize strength, contrasted with deep wine and ash gray, representing vulnerability. The center of the piece is dominated by strong, dense blocks of color, signifying protection, while the surrounding lighter hues create an uncertain, open field, symbolizing exposure. The collision occurs at the edges where density meets lightness, creating a tension that reflects the struggle between safety and openness, as suggested by the seed ideas. The broken pixels add intentional imperfection, mirroring real-world vulnerabilities within a seemingly strong exterior.</desc>
