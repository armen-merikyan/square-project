  <title id="title">Fractured Balance</title>
  <desc id="desc">The artwork embodies the emotional tension between defiance and submission through a contrasting palette of dark and light tones. The intersecting patterns evoke interrupted flow, with the maze symbolizing defiance clashing against a soft crosshatch of submission. The central area features darker colors representing resistance, while the outer edges introduce lighter tones, suggesting vulnerability and enclosure. Broken pixels add an element of imperfection and chaos, aligning with the theme of scars versus smoothness.</desc>
