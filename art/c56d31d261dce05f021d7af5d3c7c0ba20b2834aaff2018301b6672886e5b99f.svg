<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Silence and Pulse</title>
  <desc id="desc">This artwork captures the emotional tension between longing (desire) and solitude (emptiness). The palette of navy, black, and dim cyan represents the cooler aspects of loneliness and distance, contrasted with warmer hints of white, suggesting fleeting moments of longing and desire. The radial pattern symbolizes emptiness, while the grid pressure serves as a background of desire, creating a dynamic interplay. A central block pattern suggests a heart fragment, with 'burned edges' visualized through subtle pixel variations, embodying brokenness and resilience. The placement of darker colors on the left transitions to lighter tones, symbolizing an ascent from emptiness to desire, reflecting the rise versus fall theme.</desc>
