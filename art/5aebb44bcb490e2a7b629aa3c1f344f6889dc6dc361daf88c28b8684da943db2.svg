<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This composition juxtaposes the emotional weight of pressure against the stillness of quiet. The dense areas of dark navy and compressed red create a sense of urgency and tension, contrasting with the softer off-white and faint peach, which evoke calm and clarity. The flow of color pulses diagonally across the grid, breaking into grids of muted tones encountering hard edges—a reflection of the seed's themes of collision, symmetry, and contradiction. The intentional broken pixels add a layer of imperfection reminiscent of shattering against the tide, reinforcing the delicate balance between opposing forces.</desc>
