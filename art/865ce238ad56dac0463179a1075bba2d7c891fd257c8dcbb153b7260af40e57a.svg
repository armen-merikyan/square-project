  <title id="title">Tension Between Shadows</title>
  <desc id="desc">This piece captures the emotional dichotomy of awe and terror. The selected palette of deep reds and grays reflects the weight of fear against lighter, vibrant pinks representing fleeting moments of wonder. The primary contrast occurs between the dense dark colors surrounding the edges versus the lighter center, creating a visual tension that echoes the split between safety and unease. The patterns evoke a soft yet jagged movement, symbolizing broken memories and the push-pull of conflicting emotions.</desc>
