<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork captures the emotional tension of 'rage' versus 'calm' through an asymmetric color arrangement. The use of stark contrasts between deep blacks and vibrant reds symbolizes the chaotic bursts of rage cutting through the cooler, subdued tones of pale blue and white, representing calm. The layout features a main collision in the center, where the jagged red stripes intersect with radial patterns of blue, suggesting an ongoing battle between contained pressure and an overflowing expression. Broken pixels introduce imperfections, evoking a sense of disruption. Overall, the interplay of brightness and darkness develops an emotional dialogue, accentuated by a subtle balance of both emotions.</desc>
