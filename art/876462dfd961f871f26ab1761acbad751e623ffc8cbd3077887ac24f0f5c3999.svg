<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Tension</title>
  <desc id="desc">This composition explores the emotional dichotomy of defiance and submission through the interplay of structured lattice patterns and softer ring designs. The color palette of moss green, bone white, rust, stone gray, and small gold reflects resilience against fragility, creating a rich contrast. The central square is defined by a dense cluster of warmer shades that symbolize defiance, while cooler tones encircle it, suggesting submission and the calmness of quiet spaces. The main collision occurs in the center, where the strong upward movement of green and rust battles the enclosing calm of bone white and gray, creating an unresolved tension that reflects a threshold between order and chaos.</desc>
