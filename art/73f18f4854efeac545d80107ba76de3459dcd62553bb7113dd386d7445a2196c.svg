<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience in Fragmentation</title>
  <desc id="desc">This composition captures the tension between the fleeting vibrance of 'spark' and the soft decay of 'ash.' The emotional palette of warm shadow and distant lilac represents the conflict between hope and restraint. The sharp contrast occurs in the center where jagged edges of light clash with muted backgrounds, creating a collision of memory and erasure, echoing the themes of resilience against fragility. The 'rising_signal' layout sends colors up, evoking an upward struggle, while broken pixels introduce deliberate imperfections, enhancing the narrative of survival amidst chaos.</desc>
