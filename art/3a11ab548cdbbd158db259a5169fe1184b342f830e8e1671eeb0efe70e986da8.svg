<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory in Motion</title>
  <desc id="desc">This artwork captures the tension between softness and severity, embodying a pulse-like rhythm through color placement. The softer palette (powder pink, warm white) creates a backdrop that speaks to gentleness, while the stark contrasts of carbon black and sharp crimson introduce the severity of emotions like guilt and tension. The layout shifts from cooler hues to emotional warmth, layered into bands that evoke a sense of movement and weight. The main collision occurs at the center, where the fierce crimson interrupts the soothing pink, reflecting the internal struggle between memory (softness) and action (severity).</desc>
