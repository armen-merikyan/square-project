<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tensions</title>
  <desc id="desc">This piece explores the tension between relief and dread, as the lighter tones strive toward the top while darker hues anchor the bottom, creating an atmospheric pressure. The use of electric blue and lime suggests a flicker of hope against encroaching shadows, while the black provides a grounding weightiness. The layout starts from the bottom corner, allowing the lighter colors to invade the space, creating a rhythm that expresses both movement and interruption, emphasizing the collision of emotions. The incorporation of broken pixels adds to the imperfection, enhancing the emotional narrative without clear representation.</desc>
