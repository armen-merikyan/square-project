<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">The emotional tone balances joy and grief, with the top half embodying expansive joy through brighter tones of yellow and orange, creating a vibrant, lively rhythm. The bottom half contrasts with deep blues and muted purples, conveying a somber, fragmented grief. The visual collision occurs at the division, where the bright patterns of joy (raindrops) meet the grid-like solidity of grief, enhancing the tension. The hard edges evoke a sense of unresolved emotions, representing safe vs. threatened through contrasting warmth and coolness.</desc>
