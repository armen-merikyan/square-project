<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Order and Chaos</title>
  <desc id="desc">The emotional tone reflects the conflict between panic and control, represented with sharp contrasts in the palette. The combination of burnt orange and dark red evokes chaos while charcoal and gold serve as anchors of stability. The central 4x4 is filled with stripes representing panic, contrasting with a frame of structured gradients that symbolize control. The jagged edges highlight disruptions and the 'broken pixels' introduce imperfection. This arrangement suggests a battle between emotional states, where the core feels overwhelmingly chaotic yet is framed by a desire for order.</desc>
