<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise Against Fall</title>
  <desc id="desc">The emotional tone captures a struggle between awe and terror, depicted through a palette of electric blue, magenta, and black. The colors create a stark contrast that embodies tension and instability. The layout mirrors itself, suggesting chaos amidst order, while broken pixels disrupt the expected symmetry, enhancing the feeling of uncertainty. The upward movement on one side contrasts with downward elements, embodying the emotional push-pull described in the seed. The maze pattern for awe and crosshatch for terror intermingle, creating an abstract narrative of conflicting emotions, where soft edges blend into sharper contrasts, signifying a balance that feels precarious yet essential.</desc>
