<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow and Containment</title>
  <desc id="desc">This piece explores the emotional conflict between desire and restraint. The warm colors of red oxide and small orange represent desire, forming a saturated pulse across the canvas, while the muted cream and iron gray act as calming boundaries, symbolizing restraint. The composition features dominant radial patterns interrupted by smoother flood-like areas, creating a push-pull between chaos and calm. The contrast mainly collides at the center, mimicking an internal struggle, and broken pixels add intentional imperfection, representing moments of conflict within stability.</desc>
