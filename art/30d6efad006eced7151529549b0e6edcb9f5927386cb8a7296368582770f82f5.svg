<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Extremes</title>
  <desc id="desc">This piece captures the emotional tension between defiance and submission through a carefully chosen palette of warm coral and cold slate to represent the contrasting emotional states. The flow shifts diagonally, with the main collision point at the center where darker hues of blue-black and cold slate overwhelm areas of soft amber and warm coral, symbolizing the central struggle. The broken pixel elements in the pattern add intentional disruptions representing glitches within the emotional spectrum, while areas of negative space offer moments of quiet amidst chaos. It evokes a sense of unsettled balance between order and chaos, reflecting the underlying themes from the seed.</desc>
