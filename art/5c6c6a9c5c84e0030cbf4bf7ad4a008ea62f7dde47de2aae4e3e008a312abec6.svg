<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone captures the tension between defiance and submission, visualized through a sharp contrast of colors. The chosen palette reflects an interplay of dark grays with bright accents of faded gold and soft sky, illustrating strong defiance against a backdrop of submission. The primary collision occurs at the center, where a brighter cluster of colors emerges, effectively showing an upward movement of defiance against the soft recess of subdued hues around the edges. The broken pixels create intentional disruptions, reinforcing the concept of struggle and imperfection, emphasizing the push against a collapsing backdrop.</desc>
