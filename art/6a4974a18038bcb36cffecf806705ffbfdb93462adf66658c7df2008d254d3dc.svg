  <title id="title">Harmony in Tension</title>
  <desc id="desc">This artwork captures the emotions of joy and grief through contrasting colors and patterns, represented by a bright palette of yellows and oranges meeting deeper blues and muted purples. The left side embodies joy with warm colors and open spaces, while the right side depicts grief with maze-like density and cooler tones. The vertical flow creates a wave-like motion suggesting oscillation between these emotional states, with broken pixels adding an element of imperfection, symbolizing the unpredictability of emotions.</desc>
