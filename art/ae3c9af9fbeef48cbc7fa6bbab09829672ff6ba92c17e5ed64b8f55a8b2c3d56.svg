<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light</title>
  <desc id="desc">The artwork evokes a duality between fear and hope, with a careful balance of dark and light tones. The palette combines dark violet and black to create an undercurrent of fear, punctuated by soft gold and pale green that symbolize hope breaking through. The layout rises upward, suggestive of ascension and tension, clashing at moments where the jagged edges of fear interrupt the smoother lines of hope. This complex interplay allows for an emotional rhythm of conflict and resolution.</desc>
