  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone conveys a struggle between restlessness and peace, embodied by sharp contrasts and patterns in the color palette. The selected colors—moss green and rust—contrast with bone white and stone gray, symbolizing tension and tranquility. The main collision occurs in the center, where structured lattice patterns of unrest interrupt the gentle, fault line emanating toward the edges, creating a dynamic yet unresolved composition that reflects the tension of memory against motion.</desc>
