<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Tension</title>
  <desc id="desc">The artwork conveys the emotional tug-of-war between defiance and submission. Using a palette of black, red, pale blue, and white, the contrast highlights the struggle. Black and red create a defiant tension, while pale blue and white offer a sense of calm. The arrangement is asymmetric, with denser clusters representing defiance around the center, while softer fields echo the theme of submission at the edges. The use of negative space enhances the feeling of unresolved tension, making the viewer reflect on the contrast between the strong inner push and the encompassing quiet.</desc>
