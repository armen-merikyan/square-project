  <title id="title">Tension of Contrast</title>
  <desc id="desc">The artwork reflects the emotional dichotomy between vulnerability and strength by juxtaposing warm and cool tones. The palette includes vibrant coral and orange tones representing strength, surrounded by softer pinks and deep charcoal, which evoke vulnerability and emptiness. The center displays a collision of assertive colors, representing a strong core, while the edges fade into quieter tones, suggesting a protective layer that is not entirely effective. This layout visually narrates the struggle between holding strong and the fragility that comes from exposure, aligning with concepts of pressure and emptiness.</desc>
