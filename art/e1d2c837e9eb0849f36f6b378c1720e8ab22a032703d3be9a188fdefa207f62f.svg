<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Tension</title>
  <desc id="desc">This piece explores the emotional contrast of awe and terror through its color palette of black, white, and shades of blue-red. The left side of the grid, echoing stability with lines of dark to light blues, suggests a calm yet imposing structure (awe), while the right side erupts into chaotic reds and blacks, symbolizing an unstable force (terror). The slight imbalance of broken pixels introduces imperfection, mirroring the human experience of facing awe conflicting with terror, while the layout forms a broken mirror embodying that duality.</desc>
