<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Flicker of Fractured Signals</title>
  <desc id="desc">This 8x8 composition explores the emotional dichotomy of 'signal vs noise', where the bright notes of clarity are intermittently disrupted by shadows of confusion. The palette of dark navy and black represents the noise, while dim cyan and white punctuate the space with moments of clarity. The contrast between solid darks and sharp whites at the center creates tension, suggesting a pulse fighting to be heard amidst chaos. The patterns of fault lines disrupt the linearity of the barcode noise throughout, visually embodying the struggle of coherent messages amidst interference. Broken pixels are intentionally deployed to accentuate imperfections, reinforcing the narrative of fragile connections in a crowded environment.</desc>
