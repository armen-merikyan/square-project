<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece juxtaposes the concepts of safety and exposure through color contrasts and patterns. The palette includes warm brown and shelter green representing safety, while the pale skin and open blue evoke vulnerability. The center of the artwork suggests a fragile balance, with a dense cluster of darker colors creating a border that feels protective but also closed. The light colors in the center contrast with the heavy borders, highlighting the tension between exposure and shelter. The patterns of dots (safety) collide with islands (exposure) around the center, with subtle broken pixels introducing intentional irregularities mirroring emotional complexity. This arrangement aims to invoke the feeling of navigating safety amidst vulnerability, embodying the duality of experience.</desc>
