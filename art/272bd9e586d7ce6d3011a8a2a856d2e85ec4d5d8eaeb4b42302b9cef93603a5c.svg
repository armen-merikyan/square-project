<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Strength in Fracture</title>
  <desc id="desc">This artwork embodies the emotional tension between vulnerability and strength. The palette leans towards deep, cosmic colors to evoke awe and terror, with cosmic indigo and deep teal creating a strong foundation, providing stability and depth. Accenting colors like star white and cold gold introduce a sense of tension and light, representing vulnerability amidst strength. The central collision occurs at the core of the piece, where a barcode pattern of deep teal interacts with lighter colors, creating a feeling of being exposed yet protected. The 'broken pixels' add an intentional disruption, echoing the theme of vulnerability in strength, capturing the essence of a fragile yet resilient state.</desc>
