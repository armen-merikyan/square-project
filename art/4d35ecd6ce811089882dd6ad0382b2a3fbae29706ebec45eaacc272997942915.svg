<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Longing</title>
  <desc id="desc">The emotional tone navigates the tension between 'emptiness' and 'desire', creatively visualized through a balanced 4x4 inner core and a contrasting outer edge. The palette of lime, electric blue, and magenta represents desire with vibrant energy, while black serves to express the void of emptiness. The stark transition from the colorful inner square to the heavy dark border creates a sense of noise against radial calm, suggesting a struggle between longing and void. Broken pixels add an element of imperfection that mirrors the heart's fragmentation in this dance of emotions.</desc>
