  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This abstract artwork reflects the tension between vulnerability and strength through the use of a pale center surrounded by contrasting dense colors. The palette, drawn from 'clarity_confusion', features ice blue and warning orange to evoke feelings of fragility and urgency. The color placements create a dynamic contrast where the orange accents collide sharply with the cooler tones, suggesting an emotional current in an outward spiral. Broken pixels interrupt the flow and add texture, embodying the theme of exposure within shelter.</desc>
