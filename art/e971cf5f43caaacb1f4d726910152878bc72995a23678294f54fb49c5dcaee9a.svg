  <title id="title">Overflowing Calm</title>
  <desc id="desc">The emotional tone combines rage, represented by sharp, jagged lines and vibrant reds, with calm, depicted through soft, horizontal patterns of pale blue. This palette creates tension where the dark edges of the reds clash against smoother blues. The contrast of the chaotic central pixels represents an explosion of emotion surrounded by a calm sea, embodying 'overflow vs containment'. The layout captures an island of frenzy nestled within a quiet field, representing the struggle and intersection of these feelings through color placement.</desc>
