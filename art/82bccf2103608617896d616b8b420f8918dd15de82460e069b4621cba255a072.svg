<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This piece embodies the emotional tension between desire and emptiness. The warm colors in the inner core (#FF6F61, #FF8C42, #FFC3A0) suggest a strong pull of desire, gradually transitioning to cooler tones (#3A5EBA, #2F3C66, #1B1B1B) that represent emptiness and restraint framing the core. The intentional imperfect pixels introduce a sense of disruption, echoing the theme of containment. The central conflict occurs in the middle of the grid where the warm and cool colors collide, creating a vibrant tension against the quiet edges. This arrangement fosters a feeling of aspiration suppressed by boundaries, resonating with the seed's themes of overflowing desire and constraining absence.</desc>
