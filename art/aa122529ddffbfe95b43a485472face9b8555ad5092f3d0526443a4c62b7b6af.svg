<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition captures the tension between 'spark' and 'ash' through contrasting warm and cool tones, illustrating resilience and fragility. The primary palette consists of deep blues and pale yellows, representing ash’s soft residue and sparks’ sudden brightness. The center of the square is filled with vibrant colors, embodying energy and tension, while the edges cool down into a subtle gray to imply shelter, reflecting the battle between density and openness. Broken pixels introduce imperfections, urging viewers to reflect on the theme of memory and erasure. The collision occurs diagonally, emphasizing the conflict between opposing feelings.</desc>
