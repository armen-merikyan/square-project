<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Fracture</title>
  <desc id="desc">This piece explores the emotional contrasts of awe and terror through a palette that juxtaposes rich black, dark violet, soft gold, and pale green. The layout suggests a battle between structured patterns (broken dots for awe) and chaotic interruptions (dots for terror). The flow spirals counterclockwise, emphasizing tension and the elusive nature of stability. Major collisions occur where the vibrant gold clashes against the dark violet, symbolizing moments of clarity amidst chaos. The broken pixels introduce a feeling of imperfection, mirroring the concept of fractured memories and the complex interplay of emotions.</desc>
