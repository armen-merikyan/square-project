<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Turmoil</title>
  <desc id="desc">This composition explores the emotional conflict between tenderness and rage, using a palette dominated by warm reds to represent rage, juxtaposed with cooler pale blues symbolizing tenderness. The arrangement creates a mirror effect with intentional 'broken' pixels that disturb the symmetry, illustrating how tenderness tries to contain the explosive nature of rage. The collision occurs prominently in the center where the crosshatch rage pattern clashes with the patchwork tenderness, creating a visual narrative of emotional conflict and resolution. Negative space is subtly employed to allow breathing room for feelings to resonate, while maintaining a sense of turmoil through color clashes and overlaps.</desc>
