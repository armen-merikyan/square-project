<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Discontent</title>
  <desc id="desc">The emotional tone reflects a struggle between restlessness and peace. The palette of sepia, tan, dust gray, and faded blue conveys a sense of warm nostalgia interrupted by cooler tones hinting at discomfort. The main contrast occurs at the center where vibrant yet broken accents collide with muted fields, reflecting the tension between desire for calm and the chaos of movement. This idea of 'overflow vs containment' is encapsulated in the design, where the patterns of pressure bands and threshold collide asymmetrically, creating a dynamic yet reflective composition.</desc>
