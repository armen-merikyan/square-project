<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">This artwork explores the deep emotional conflict between love and betrayal through its palette of pink, red, gray, and dark maroon. The gentle warmth of pink and red suggests love, while the darker hues introduce an unsettling undercurrent of betrayal. The layout is intentionally sparse, representing an empty room filled with unexpressed feelings. There's a notable collision of soft and sharp edges, with squares of contrasting colors creating a visual tension. The crosshatch pattern and the inclusion of broken pixels echo the imperfections in relationships, suggesting unresolved emotions. This piece conveys a sense of loneliness and tension as colors are paired but often disrupted, mirroring the conflicting feelings reflected in the seed text.</desc>
