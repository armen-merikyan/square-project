  <title id="title">Tension of Control</title>
  <desc id="desc">The emotional tone plays between panic and control, reflected in the palette choices of dark violet and soft gold against black and pale green, representing chaos and stability, respectively. The contrast is most obvious where the structured cracks of control clash with the radial panic patterns. The composition is divided into two sections, left being more uniform and stable, while the right exhibits chaotic disruptions, symbolizing the fight against disorder. The overall layout follows a vertical split, where elements collide, enhancing the sense of tension and release.</desc>
