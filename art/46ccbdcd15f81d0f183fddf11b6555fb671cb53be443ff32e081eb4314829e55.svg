<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">The emotional tone shifts between the heaviness of dread and the lightness of relief, as seen in the palette of dark storm grays contrasted with soft pastel mints and faded gold. The pattern of barcodes at the top row signifies chaos and pressure, creating a feeling of weight that collides with a maze-like structure in the lower rows providing a sense of relief. The use of broken pixels introduces subtle imperfections, enhancing the emotional impact while allowing a few areas of quiet space. The main contrast occurs between the center and the edges, emphasizing the collision of the two contrasting emotions.</desc>
