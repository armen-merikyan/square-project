<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shattered Clarity</title>
  <desc id="desc">This artwork embodies the emotional tension between clarity and confusion. The deep blacks and dark violets evoke a sense of confusion, while the soft gold and pale green represent clarity. The structured chaos of the crack pattern against a solid backdrop creates a feeling of conflict, as rigid forms collide with flowing movement, giving the impression of a fractured symmetry. The edge style introduces burnt elements, enhancing the feeling of tension and interruption in the composition, suggesting the pulse of turbulent emotions.</desc>
