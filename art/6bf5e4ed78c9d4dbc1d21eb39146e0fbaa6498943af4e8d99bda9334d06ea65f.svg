<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone explores the duality of awe and terror, using contrasting colors to express tension. The palette features deep blacks for the terror aspect, invoking a sense of foreboding, while pale blues and whites introduce an element of calmness or awe. This results in a dynamic visual tension, where the top rows—representing awe—are dominated by cool tones and structured patterns, evoking a feeling of stability. In contrast, the bottom rows—representing terror—leverage darker hues and chaotic patterns, symbolizing instability and fear. The jagged edges contribute to a sense of interruption and dissonance, with broken pixels denoting memories that evoke conflict. The negative space is preserved to enhance the contrast, suggesting an echo between calmness and chaos.</desc>
