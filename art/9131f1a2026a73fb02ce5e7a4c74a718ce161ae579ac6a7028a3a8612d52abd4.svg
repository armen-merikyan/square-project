<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Asymmetry</title>
  <desc id="desc">This artwork captures the emotional tension between confusion and clarity through a juxtaposition of crosshatch patterns representing chaos against structured dots symbolizing clarity. The palette features warm oranges and yellows on the left side blending into deep blues and muted purples on the right to highlight the contrast between safe warmth and threatened coolness. The layout splits the canvas vertically, creating a stark contrast in emotional narratives, while broken pixels introduce a sense of imperfection and a reminder of the unpredictable nature of emotions. The overall arrangement suggests a pulse, echoing the tension of asymmetry within symmetry.</desc>
