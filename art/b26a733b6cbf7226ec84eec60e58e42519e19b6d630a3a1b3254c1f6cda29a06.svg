<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This composition captures the emotional tension between desire and emptiness. The palette combines 'hot_coral' and 'blood_orange' to represent the vibrant pull of desire against a backdrop of 'hollow_blue' and 'charcoal,' suggesting the void of emptiness. The rising signal layout creates a sense of upward motion, as if hope is attempting to break through a contained boundary. The pattern merges a frame of saturated colors with scars of negative space, emphasizing the collision of abundance and restriction. Broken pixels intersperse to signify disruptions within the flow, embodying both the urgency of desire and the quiet of containment.</desc>
