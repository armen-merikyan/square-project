<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoed Duality</title>
  <desc id="desc">This composition embodies the emotional interplay between vulnerability and strength, using a palette that contrasts cold whites with warm browns and shelter greens. The dense outer edges, representing strength, confront the pale, exposed center, illustrating vulnerability. The main collision occurs where the inner and outer elements disrupt each other, creating a tension that speaks to the complex nature of protection and exposure. The patterns of stepwell and thread convey a sense of layered depth and delicate connection, while broken pixels offer intentional disruptions reflecting scars of experience.</desc>
