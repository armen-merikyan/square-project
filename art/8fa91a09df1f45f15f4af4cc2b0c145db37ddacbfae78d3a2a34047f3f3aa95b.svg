<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition captures the emotional dichotomy between rage and calm. The palette includes warm reds to symbolize rage and cooler pale blues to reflect calm, creating a tension that plays out across the square. The main collision occurs between the dark jagged red and the softer blue-green lines, invoking a sense of disruption and repair, suggesting the interplay between chaotic emotion and tranquil spaces. The zigzag pattern intertwines with the calmer ladder layout, embodying the struggle between these contrasting feelings, while broken pixels add intentional imperfections, enhancing the overall narrative of tension and release.</desc>
