<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast in Motion</title>
  <desc id="desc">This piece explores the emotional tensions of rage and calm through a dynamic interplay of colors. The chosen palette of stark reds and muted blues represents explosive energy colliding with quiet composure, embodying the clash of intense emotion and serene containment. The upward flow of pixels illustrates a rise in intensity, emphasizing patterns of split-screen chaos interrupted by subtle calm like a deep breath amidst turmoil. The center acts as a focal collision point, where jagged edges of red disrupt the soft checker pattern of blue, creating a visual representation of conflict. Intentional broken pixels serve as scars from this emotional battle, enhancing the overall narrative of struggle and harmony.</desc>
