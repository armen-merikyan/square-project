<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflicting Light</title>
  <desc id="desc">This composition encapsulates the emotional tension between fear and hope, using a palette that juxtaposes dark violet and soft gold to convey stark contrasts. The layout follows a corner invasion flow, with fear emerging from the lower left and upper elements adding a hopeful glow, finally culminating as the lighter colors converge in the center. The jagged patterns on the left evoke menace while the stair-like structure of yellow hues suggests ascent and optimism. The strategic placement of broken pixels adds unpredictability, enhancing the narrative of internal struggle against potential escape.</desc>
