<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Connections</title>
  <desc id="desc">The emotional tone encapsulates the tension between love and betrayal, expressed through the palette of pink and dark maroon. The pink conveys warmth and affection, while dark maroon reflects deeper, complex emotions tied to betrayal. The contrast is primarily between the softness of love (represented in the upper rows) and the harshness of betrayal (lower rows). The arrangement creates a zigzag flow, suggesting conflict and unresolved emotions. Broken pixels introduce imperfection, embodying the emotional friction between order and chaos. The overall composition resonates with themes of tension, collision, and the struggle between density and empty space, evoking an abstract narrative of fragmented human experience.</desc>
