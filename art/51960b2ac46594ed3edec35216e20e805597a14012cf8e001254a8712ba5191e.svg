<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissonance in Harmony</title>
  <desc id="desc">This piece explores the emotional tension between clarity and confusion through a gradient of warmth and coolness. The palette combines muted purples and deep blues to suggest calmness, contrasted with vibrant oranges and yellows, symbolizing confusion and intensity. The composition follows a diagonal flow, beginning with dense clusters of vibrant colors to evoke chaos, transitioning into softer, cooler tones representing clarity. Broken pixels introduce an element of imperfection, emphasizing the fragility of balance, while the main contrast surfaces in the top-left corner, where warmth meets coolness. The overlapping radial pattern embodies the interaction between structured clarity and chaotic noise.</desc>
