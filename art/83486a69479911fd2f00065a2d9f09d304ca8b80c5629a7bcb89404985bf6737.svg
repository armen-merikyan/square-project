  <title id="title">Exposed Fractures</title>
  <desc id="desc">The emotional tone reflects the tension between vulnerability and strength, with the palette of burnt orange, dark red, charcoal, and gold symbolizing ancient fire—warmth and conflict. The main contrast occurs in the center, where dense, darker colors collide with lighter hues, echoing the fragility and complexity of vulnerability. The seed's themes of exposure and fracture inspired a scattered, falling pixel layout that creates a sense of descent and disarray, embodying the emotional interplay of strength being challenged by exposure.</desc>
