<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This 8x8 pixel composition explores the duality of tenderness and rage through color and contrast. The rage is represented in deep, saturated reds and blacks, forming a harsh barcoded structure on one side, symbolizing compressed conflict. In contrast, soft pale blues and whites illustrate tenderness, creating an ash_field pattern that flows gently across the square, contrasting sharply with the intensity of rage. The center serves as a threshold where these emotions intersect, creating a quiet channel that embodies tension—both disrupted and harmonious. The broken pixels, scattered across the canvas, signify imperfections and disruptions in emotional expression, embodying guilt and forgiveness.</desc>
