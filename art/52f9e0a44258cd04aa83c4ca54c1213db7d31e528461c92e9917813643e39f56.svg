<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inner Tension</title>
  <desc id="desc">The emotional tone contrasts trust, represented by warm colors suggesting softness and safety, against suspicion, represented by darker, muted colors indicating watchfulness and tension. The palette comprises warm reds and muted creams clashing with blackened plum and iron gray, embodying the emotional struggle. The main contrast occurs at the center where brighter hues challenge the darker tones, embodying a flickering flow of energy, oscillating between hope and doubt. This dynamic landscape captures a struggle between a small, bright oasis of trust amidst a surrounding density of suspicion and pressure.</desc>
