<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Torn Connection</title>
  <desc id="desc">This composition embodies a tension between feelings of loneliness and connection, informed by the emotional contrasts present in the seed. The palette of pink, red, gray, and dark maroon suggests a spectrum of warmth and betrayal, where bright tones represent connection while darker hues signify isolation. The layout reveals this duality with the left side representing loneliness, characterized by dots suggesting isolation, and the right side offering a ring pattern symbolizing connection, resulting in a visual flow that climbs towards the separation. The contrast is most potent in the central column where colors collide, highlighting the painful intersection of feeling both connected and lonely. A few broken pixels are interspersed to symbolize imperfection and the chaotic nature of relationships.</desc>
