<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Desires</title>
  <desc id="desc">This piece embodies the tension between emptiness and desire through contrasting warm and cool tones. The palette, derived from sepia and faded blues, reflects the emotional depth of nostalgia. The top half, representing 'emptiness,' uses soft, muted colors arranged in a framed pattern, suggesting isolation. The bottom half, symbolizing 'desire,' features broken dots in vibrant shades that rise left to right, creating a sense of movement and yearning. The deliberate asymmetry with broken pixels evokes imperfection and collision, embodying the struggle between longing and void.</desc>
