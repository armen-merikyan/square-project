<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Heartbeats of Contrast</title>
  <desc id="desc">This artwork explores the emotional tone of desire and emptiness through a structured visual interplay. The palette of deep reds and soft grays signifies warmth and longing, while the pinks introduce a softer echo of hope and connection. The outer rows exhibit chaotic noise, contrasting with the calmness of the inner core, representing the tension between emptiness and desire. The pattern of 'stairs' fills the edges, slowly descending into a concentrated inner space of 'rain,' suggesting the quiet turbulence of emotion. The broken pixel implementations create imperfections that mimic the unpredictability of human feelings.</desc>
