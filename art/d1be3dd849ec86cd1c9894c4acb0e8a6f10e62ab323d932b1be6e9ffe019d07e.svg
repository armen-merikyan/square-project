<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork embodies the tension between tenderness and rage, capturing the push and pull of emotions. The palette employs deep, saturated reds to convey rage juxtaposed against muted blues, representing tenderness. The main collision occurs in the top left corner with concentrated reds bleeding into soft, maze-like patterns of pale blue, reflecting a mixture of pressure and quietness. The arrangement of colors creates an edge-crawl flow, symbolizing the intertwined dynamics of these opposing forces without leaning toward any literal representation. Broken pixels implement intentional disruptions, enhancing the concept of emotional scars and the complexity of human experience.</desc>
