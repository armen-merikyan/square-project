<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This composition evokes a tension between longing and resolve. The palette of muted cream, iron gray, red oxide, blackened plum, and small orange reflects a struggle for union. The edge style, described as 'pressure border', introduces contrast with a softness at the center representing longing, while assertive colors at the periphery suggest resolve. The defined halo void layout emphasizes the separated emotional layers, cultivating a visual dichotomy between quiet spaces and denser clusters of color. Broken pixels represent the imperfections of thought, akin to scars and indicative of a path towards repair.</desc>
