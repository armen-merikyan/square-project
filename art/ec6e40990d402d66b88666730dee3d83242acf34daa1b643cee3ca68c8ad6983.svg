<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Beneath the Surface</title>
  <desc id="desc">This artwork captures the tension between love and betrayal through a bold contrast of warm and cool colors. The palette consists of soft pinks, vibrant reds, and muted grays, evoking warmth against shadows of doubt. The rows exhibit a checker pattern layered with sharp, angled lines, representing the conflict of emotions. The broken pixels resemble a fractured heart, enhancing the sense of imperfection and desperation amidst beauty. The diagonal rise suggests an upward struggle, echoing both aspirations and disappointments, while strategic negative space allows for breath among the chaos, showcasing the deep emotional undercurrents beneath the surface.</desc>
