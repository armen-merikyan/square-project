<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Sparks</title>
  <desc id="desc">The emotional tone represents the chaotic clash of panic versus calm control. A palette dominated by dark tones suggests depth and unease, while the occasional bright accents punctuate moments of clarity or hope. The dominant contrast arises between the saturated darks and the scintillating points of light, embodying the struggle between control and chaos. Patterns of maze-like structure express control, while the scattered, jagged placements reflect the erratic nature of panic, making the square read as an unresolved tension of emotion.</desc>
