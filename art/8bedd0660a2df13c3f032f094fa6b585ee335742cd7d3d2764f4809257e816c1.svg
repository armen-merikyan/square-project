<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light and Shadow</title>
  <desc id="desc">The emotional tone reflects the struggle between softness and severity, depicted through contrasting bright colors against a heavy dark background. The palette incorporates hues of warmth and coolness, with powder pink and sharp crimson representing softness, while carbon black and steel gray introduce severity. The main collision occurs in the center, where the lighter fields seem to pulse against the darker weight, creating a tension reminiscent of guilt and forgiveness. The layout uses negative space effectively, emphasizing the off-center knot shape, suggesting an open gate to emotional complexity. The arrangement of colors evokes a spiral pattern, enhancing the feeling of movement and conflict within the square.</desc>
