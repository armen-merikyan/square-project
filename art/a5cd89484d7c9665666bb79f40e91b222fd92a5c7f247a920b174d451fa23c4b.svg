<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">This artwork embodies the emotional interplay between defiance and submission. The palette of reds and muted grays symbolizes passion and restraint, evoking a visceral tension. The bright accents of red (defiance) interrupt the darker fields (submission), primarily at the center, creating a central collision where resistance meets retreat. The patterns interplay like ebbing tides and scars, reflecting the chaotic dynamic suggested by the seed. The structure is intentionally uneven to emphasize disruption and maintain interest while keeping 15% negative space reflective of inward contemplation.</desc>
