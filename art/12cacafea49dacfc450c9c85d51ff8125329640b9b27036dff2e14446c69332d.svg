<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Flames</title>
  <desc id="desc">This piece captures the emotional conflict between loneliness and connection, symbolized through contrasting warm and cool colors. The top four rows embody loneliness, represented by dark hues and hollow spaces, while the bottom rows explore connection with warmer, more vibrant colors creating visual tension. The palette, characterized by burnt orange, dark red, and charcoal, evokes an ancient fire, fostering a sense of warmth amidst the coldness of loneliness. The arrangement reflects a crosshatch pattern that feels like a structured connection being challenged by the void, leading to an emotional collision in the center where isolation meets warmth and hope.</desc>
