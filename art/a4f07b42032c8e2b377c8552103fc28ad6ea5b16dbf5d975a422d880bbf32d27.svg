<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tension</title>
  <desc id="desc">The artwork encapsulates the emotional struggle between defiance and submission through a dramatic interplay of colors. The palette combines saturated alarm red and pale aqua, representing defiance and calm submission, respectively. The sharp contrast between bright and muted fields creates a dynamic tension, reflecting the conflict inherent in the seed. The placement of broken pixels adds to the sense of chaos and interruption, while maintaining a significant negative space, highlighting the struggle. The composition flows outward from the pressured corner, drawing the eye into a spiral of colors transitioning between resistance and calmness, embodying the themes of invasion and weight.</desc>
