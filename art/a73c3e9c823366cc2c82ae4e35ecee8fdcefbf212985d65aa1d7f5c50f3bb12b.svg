<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This composition captures the emotional tension between restlessness and peace through a diagonal flow that splits the canvas. The chosen colors evoke a juxtaposition between muted tones representing peace (#A4D7E1, #D5E8A9) and darker, more chaotic colors illustrating restlessness (#424B54, #1C1F27). The main collision occurs at the center where the radial pattern of soft colors meets the veil-like textures of dark shades, creating an edge that symbolizes disruption. Broken pixels are employed to introduce an element of imperfection, mirroring the struggle within the emotional theme, while ensuring at least 10% negative space provides breathing room amidst the intensity.</desc>
