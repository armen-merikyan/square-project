<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Journeys</title>
  <desc id="desc">This piece captures the emotional tension of nostalgia and progress through a palette that juxtaposes warm hues of yellow and orange against cool tones of deep blue and muted purple. The nostalgia is suggested through a flame-like, warm gradient transitioning to a structured, stair-like pattern symbolizing progress. The left side of the composition holds a dense, warm cluster, depicting memory, while the right side breaks apart, echoing transformation and change. The negative spaces serve as moments of calm, balancing the overall weight. This play between density and hollowness evokes a feeling of unresolved movement, enhancing the contrast encapsulated in the seed.</desc>
