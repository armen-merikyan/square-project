<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork encapsulates the emotional tension between safety and exposure, using a split-screen approach to represent the contrasting feelings. The palette features calm greens and browns to signify shelter and safety, while pale and cool tones suggest exposure. The central collision occurs with a dense layer of warm brown interrupting a cooler, open blue field, creating a dramatic interplay. The broken pixels introduce imperfections, echoing the fragility of both concepts, encapsulating the struggle between pressure and release.</desc>
