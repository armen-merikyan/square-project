<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork encapsulates the emotional dialogue between vulnerability and strength. Utilizing a palette of warm and muted tones, colors like muted cream contrast against heavy blackened plum and iron gray. The central area features a light reflective quality, symbolizing exposure, while the outer sections envelop it with denser hues, creating a sense of protection. The flow from left to right accentuates movement, with a broken layout reflecting imperfections and the need for safety amid exposure. The intentional disruptions mimic scars, emphasizing the tension of vulnerability amidst strength.</desc>
