<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Duality</title>
  <desc id="desc">The emotional tone reflects the tension between joy and grief, using a palette that juxtaposes bright yellows and oranges with deep blues and muted purples. The colors represent the vibrancy of joy battling the heaviness of grief, creating a split-screen effect of chaotic order. The main contrast is built through hard edges that divide the bright lower half from the muted upper half, suggesting a flow from bottom to top while incorporating both warmth and coolness. The overlapping radial and stripe patterns create a sense of movement and tension, encapsulating the essence of the seed as an abstract representation of emotional conflict.</desc>
