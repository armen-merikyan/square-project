<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Waves</title>
  <desc id="desc">This piece captures the emotional tension between awe and terror through a juxtaposition of colors and structure. The palette of electric blue and magenta represents the vibrancy and chaos, while black and lime convey depth and stability. The central area, which is a wave of broken pixels, evokes a feeling of instability amidst the softer edges of the outer frame, creating a tension that mirrors order versus chaos. The warm hues collide with cool tones, elevating the sense of an emotional push and pull, using the pattern of vertical waves to anchor the composition in a fluid emotional state.</desc>
