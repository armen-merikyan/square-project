<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Sparks and Ashes</title>
  <desc id="desc">This piece embodies the emotional tension between hope and decay, represented by the contrast of bright and muted colors. The palette features deep teal and cosmic indigo to symbolize memory and restraint, while cold gold offers a hint of brilliance amidst the ash tones. The main collision occurs in the bottom corner where warm colors clash with cooler shades, suggesting a struggle between desire and calm. The layout creates a sense of pressure emanating from this corner, layered with patchwork and stepwell patterns to evoke complexity and interaction, reflecting the push and pull of the seed themes.</desc>
