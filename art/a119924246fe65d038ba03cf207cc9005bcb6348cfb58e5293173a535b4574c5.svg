<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Control in Chaos</title>
  <desc id="desc">This piece embodies the struggle between confusion and clarity. The palette of deep navy and subtle dim cyan contrasts starkly with bold black, creating a sense of unease against fleeting moments of clarity. The tension peaks where thick outlines disrupt the flow of broken dots and jagged teeth patterns, showcasing the dance of conflicting emotions. Negative space introduces a breath of calm amid chaos, allowing the viewer to feel the pulse of both clarity and confusion.</desc>
