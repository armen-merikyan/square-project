<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone captures the tension between transient sparks of energy and the settled weight of ash. Colors were chosen to reflect a palette of contrast, with reds and creams representing sparks of life, while blacks and grays embody the ash's subdued presence. The main contrast occurs diagonally across the square, where the vibrant small orange clusters intermittently disrupt the muted gray and black background. This arrangement reflects the complexities of hunger versus restraint, where moments of ignition (spark) collide with periods of quiet and stillness (ash). The use of broken pixels introduces intentional imperfections that symbolize memory and the fragility of experience.</desc>
