<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rising Signal</title>
  <desc id="desc">The emotional tone reflects a struggle between longing and resolve, utilizing a palette that evokes serenity (pale aqua and mist gray) against urgency (alarm red and ink blue). The contrast of these colors plays off a main collision in the center where longing (represented by rings) clashes with the structure of resolve (depicted by rain patterns). Broken pixels introduce intentional disruptions representing chaos within the context of tightly woven patterns, enhancing the feeling of tension and release. The layout signifies a rising flow, invoking hope and aspiration amid a visible struggle.</desc>
