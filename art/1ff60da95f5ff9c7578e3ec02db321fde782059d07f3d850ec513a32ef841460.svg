<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tenderness and Rage</title>
  <desc id="desc">This artwork reflects the emotional tension between tenderness and rage using a palette that balances saturated and muted tones. The outer layer of black dominates with sharp edges, representing rage as it encases the softer inner core of pale blue and white, symbolizing tenderness. The collision occurs at the edges where the shatter pattern of tenderness meets the structured ring of rage, creating a visual tension indicative of internal conflict. The layout adheres to the 'frame_and_core' template, where the core 4x4 is softer and more open, while the outer 2 pixels create an isolation that speaks to the storms brewing outside versus the calm inside, capturing the essence of the seed's emotional narrative.</desc>
