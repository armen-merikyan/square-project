  <title id="title">Overflowing Containment</title>
  <desc id="desc">The emotional tone contrasts the explosive nature of rage with the calmness of nature, represented through jagged edges colliding with serene hues. The palette combines deep red and black representing rage, with soft pale blue and white embodying calmness. The main contrast lies in the diagonal spread from the corner, with red sharply interrupting the calm blue, creating a visible tension and rhythm. Broken pixels add a sense of imperfection across the composition, symbolizing the disruption of calm by chaos.</desc>
