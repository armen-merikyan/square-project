<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Balance</title>
  <desc id="desc">The emotional tone reflects the tension between trust and suspicion, expressed through a split layout that takes form in stacked bands. The palette of sepia, tan, dust gray, and faded blue echoes the theme of broken memory, with certain bands representing mistrust and others trust, creating emotional strata. The main collisions occur where color patterns overlap and interrupt, particularly in the center where suspicion's stark ash field meets the softer flood of trust. The use of broken pixels introduces imperfection, suggesting a fragility that underlies both emotions, making the viewer cognizant of the delicate balance in interpersonal relationships.</desc>
