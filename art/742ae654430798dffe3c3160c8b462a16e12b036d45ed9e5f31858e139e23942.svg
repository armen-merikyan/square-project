<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Contrast</title>
  <desc id="desc">This artwork captures the emotional tension between longing and resolve. The palette combines mourning black and deep blue to express depth and resonance, while pale yellow introduces accents of light, symbolizing moments of clarity amidst darkness. The contrast shifts from muted tones dominating the top left corner to a gradual interaction with brighter shades, creating a pulse-like rhythm across the piece. The main collision occurs in a central spiral where dark and light colors twist together, representing the interplay of pressure and release in our emotions. The broken pixels simulate imperfections, enhancing the feeling of disruption and echo throughout the grid.</desc>
