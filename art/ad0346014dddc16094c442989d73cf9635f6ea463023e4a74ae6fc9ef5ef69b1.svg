<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Collision</title>
  <desc id="desc">This composition evokes a struggle between defiance and submission through a split layout, where the left embodies static tension (defiance) and the right reveals an echo of softness (submission). The warm palette of yellows and oranges contrasts with deep blues and muted purples, instigating a conflict that resonates as an emotional heartbeat. The main collision occurs in the center, where an upward force meets a soft, receding field. The diagonal rise flow harmonizes this contrast and creates a dynamic movement, visually narrating the battle of emotions.</desc>
