  <title id="title">Echoes of Shelter</title>
  <desc id="desc">This composition captures the tension between exposure and safety through a split layout, with a sheltered outer layer contrasting a more exposed inner grid. The palette combines shelter green and warm brown to represent security, while pale skin and cold white suggest vulnerability. The main collision is felt at the center where the braided pattern of exposure interacts with the maze of safety, creating a dynamic interplay of softness and severity.</desc>
