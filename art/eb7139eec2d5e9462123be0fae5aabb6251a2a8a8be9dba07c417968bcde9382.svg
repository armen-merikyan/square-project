<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Frames</title>
  <desc id="desc">This abstract artwork captures the contrasting emotions of safety and exposure through a palette that balances muted greens and browns (representing safety and shelter) against bright accents of pale skin and cold white (symbolizing vulnerability and exposure). The layout is designed with a spiral pressure flow, drawing the viewer towards an off-center collision of color at the heart of the piece, representing the constant pull between these emotions. The use of broken pixels adds intentional disruptions that echo the fragility of the protection one seeks versus the inevitability of exposure, embodying the essence of the seed's emotional score.</desc>
