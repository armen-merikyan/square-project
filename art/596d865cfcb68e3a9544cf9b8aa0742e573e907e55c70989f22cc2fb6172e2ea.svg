<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotions</title>
  <desc id="desc">The emotional tone contrasts the hot intensity of rage with the cool stillness of calm, creating a dynamic tension throughout the piece. The palette utilizes deep reds to symbolize rage, while pale blue introduces calmness. The composition’s collision occurs at the center, where jagged red patterns (representing rage) interweave with horizontal blue segments (representing calm), creating a sense of disruption and interrupted symmetry. This reflects the struggle between overflowing emotion and contained serenity, as described by the seed input.</desc>
