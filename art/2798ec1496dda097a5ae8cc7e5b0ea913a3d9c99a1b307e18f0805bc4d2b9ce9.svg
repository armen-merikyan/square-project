<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Shelters</title>
  <desc id="desc">This composition explores the emotional tension between exposure and safety. The palette, comprising soft greens, warm browns, pale skin tones, cold whites, and open blues, represents the juxtaposition of warmth and coolness—shelter in softness against the vulnerability of bright, open spaces. The main contrast occurs at the center, where pale skin tones merge with open blues, creating an echo that pulses between the warmth of the borders and the coolness at the core. The tension is enhanced by interrupted lines, giving a sense of broken pixels and pressure against the clean edges—a metaphor for the fragility of safety in the face of exposure.</desc>
