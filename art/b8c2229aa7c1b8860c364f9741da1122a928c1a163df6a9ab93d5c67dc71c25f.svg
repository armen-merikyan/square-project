<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in the Lattice</title>
  <desc id="desc">The emotional tone centers around the unresolved tension between desire and restraint. The chosen palette of muted cream, blackened plum, red oxide, and small orange represents the warmth of desire contrasted with the coolness of restraint. The blackened plum and muted cream create a contained border, while the saturated red oxide bursts through, symbolizing desire's pressure against the restraints. The flow moves outward from the center, creating a gravitational pull, yet is interrupted by a narrow channel of negative space, representing the friction between longing and limitation. The aim was to evoke a narrative of emotional complexity through patterns that collide and interact.</desc>
