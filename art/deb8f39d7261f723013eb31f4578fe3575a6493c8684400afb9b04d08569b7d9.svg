  <title id="title">Tension and Restraint</title>
  <desc id="desc">This artwork captures the emotional tension between desire and restraint through a vibrant palette of saturated and muted colors. The main collision occurs at the center where warm, saturated tones (hot coral and blood orange) pulsate against the cooler, more restrained hues (charcoal and hollow blue). The spiral pressure layout suggests an inward pull of desire, while the thick edges symbolize confinement. The patterns of halo and crosshatch intermingle, illustrating the conflict inherent in unfulfilled longing and boundaries.</desc>
