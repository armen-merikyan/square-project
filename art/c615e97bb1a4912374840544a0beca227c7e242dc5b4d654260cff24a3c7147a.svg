<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Tides</title>
  <desc id="desc">This piece explores the emotional tension between envy and gratitude through a palette that juxtaposes deep blacks with soft blues and whites. The dark pixels embody weight and intensity, while the lighter shades introduce a sense of calmness and aspiration. The zigzag pattern represents the conflict and struggle inherent in these emotions, creating a visual rhythm that oscillates between heavy and light. The placement of bright colors amidst dense dark areas embodies the collision of these feelings, illustrating the push and pull between heaviness of envy and the lightness of gratitude.</desc>
