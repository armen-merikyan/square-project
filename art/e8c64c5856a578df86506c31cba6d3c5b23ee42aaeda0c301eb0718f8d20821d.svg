<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Movement</title>
  <desc id="desc">The artwork explores the emotional duality of softness versus severity through a clash of colors and patterns. The palette, consisting of muted powder pink and sharp crimson against a backdrop of warm white and deep carbon black, embodies this tension. The arrangement emphasizes the collision of severity (the deeper colors) and softness (the lighter hues) primarily at the center, where the most intense 'pulse marks' (sharp crimson) intersect with vast fields of gentle color. The broken pixels interrupt the flow, creating dissonance akin to guilt and forgiveness, while the deliberate asymmetry evokes a sense of unresolved motion, mirroring the nuanced struggle between these emotions.</desc>
