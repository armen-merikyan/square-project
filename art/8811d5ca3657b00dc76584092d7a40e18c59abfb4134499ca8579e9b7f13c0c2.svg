<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Frequencies</title>
  <desc id="desc">This artwork explores the duality of trust and suspicion through contrasting color patterns. The warm tones of coral and blood orange symbolize trust, while the cool, muted ash fields represented by charcoal and hollow blue evoke suspicion. The layout maintains a split vertical balance, where the outer dark border encloses a luminous core, maintaining emotional pressure. Broken pixels inject chaos and tension, suggesting imperfection within stability. The diagonal arrangement suggests a falling motion, representing fragility against resilience, as trust is challenged by suspicion despite efforts to remain grounded.</desc>
