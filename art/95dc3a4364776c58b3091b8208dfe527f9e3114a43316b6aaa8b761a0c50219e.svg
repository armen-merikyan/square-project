<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Unraveled</title>
  <desc id="desc">The emotional tone of this piece reflects a struggle between relief and dread, manifested through the contrasting palette of dark and light colors. The main collision occurs at the center, where storm gray pushes against faded gold, creating a tension that represents both weight and openness. This contrast is intensified by a crack pattern that evokes feelings of brokenness, while the noise pattern suggests a release. The top-heavy orientation guides the eye downward, creating a sense of slow sinking relief amidst the chaos. The placement of broken pixels adds intentional disruptions, enhancing the overall narrative of conflict and resolution.</desc>
