<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipsed Resonance</title>
  <desc id="desc">This artwork embodies the emotional tension between panic and control. The colors drawn from the 'broken_memory' palette evoke a sense of nostalgia and fragmentation—while sepia and tan offer warmth and stability, the dust gray and faded blue introduce a sense of distance and disquiet. The layout features a corner invasion that invites chaos from the periphery, while the rising and falling pixel pattern generates an oscillation between stability and instability. The placement of the colors creates a collision in the center, suggesting a spark amidst uncertainty, supported by broken pixels that symbolize unresolved moments. The abstract pattern captures the battle of emotions expressed in the seed, portraying a dance of light against shadow and control against chaos.</desc>
