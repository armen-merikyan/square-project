<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Conflict</title>
  <desc id="desc">This piece captures the emotional tension between 'spark' and 'ash', representing fleeting moments of vitality against the weight of residue. The palette intertwines warm accents of 'lamp_gold' and 'rose_clay' with cool undertones of 'cool_blue' and 'distant_lilac', reflecting the contrasting nature of vitality against stillness. The dominant presence of angular, jagged edges and the lattice pattern create a radiant conflict centered on the grid, emphasizing the collision of chaotic energy and settled silence.</desc>
