<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Yearning</title>
  <desc id="desc">The emotional tone captures the dichotomy between emptiness and desire, expressed through contrasting colors. The palette of warm reds and cool blues emphasizes this tension, creating a push-and-pull effect. The top half features a framing pattern representing emptiness with stark black edges, while the bottom half adopts a striped pattern to signify desire, showcasing movement from left to right. The collision occurs where the red stripes meet the cooler shades, reflecting unresolved emotions and energy. The broken pixels add imperfection, enhancing the sense of longing and fragmentation. This arrangement allows for both quiet negative space and vivid clashes of color, articulating the complex interplay of feelings stemming from the seed.</desc>
