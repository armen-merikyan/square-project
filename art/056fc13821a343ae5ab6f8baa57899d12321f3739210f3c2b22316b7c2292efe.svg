<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Resilience</title>
  <desc id="desc">This piece embodies the duality of vulnerability and strength, where the muted sepia and gray tones represent fragility, while the deeper blues provide a backdrop of resilient strength. The color palette reflects a sense of nostalgia and memory, with pale colors suggesting vulnerability and darker hues signifying protection. The collision occurs in the center, where light and dark hues blend into one another at jagged breaks, emphasizing the struggle between exposure and safety. The layout has broken edges, capturing moments of interruption and the paradox of seeking security in an uncertain environment. The crosshatch and stepwell patterns intertwine, representing the complex layers of emotion and the interplay of feelings evoked by the seed.</desc>
