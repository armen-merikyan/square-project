<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory in Motion</title>
  <desc id="desc">This piece embodies the tension between softness and severity through a palette of muted and sharp colors. The use of powder pink and warm white represents softness, while carbon black and sharp crimson introduce severe contrast. The grid pattern represents a gentle progression, while the rain-like severity breaks the softness, creating visual tension. The main collision occurs towards the center, suggesting a pulsating core of emotion—heartfelt yet stark, tying together the juxtaposed themes of guilt and forgiveness into an abstract vibrational pattern.</desc>
