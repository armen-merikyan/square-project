<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Falling Echoes</title>
  <desc id="desc">This composition embodies the tension between 'longing' and 'resolve' through contrasting patterns of claustrophobic density and serene quiet. The palette ranges from the earthy rust and moss green symbolizing resilience and growth, to the light bone white and stone gray representing fragility and repair. The dominant flow cascades vertically, resembling falling pixels, while quiet negative space in the corners allows for introspection. The main collision occurs centrally where stacked pixels reflect an urgent pulse, blending colors in a subtle interplay of warmth and coolness, illustrating the dichotomy of the seed emotions.</desc>
