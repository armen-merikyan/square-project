  <title id="title">Tension Between Spaces</title>
  <desc id="desc">The emotional tone explores the dichotomy of love and betrayal. The selected palette of pinks and maroons symbolizes warmth and intimacy, contrasted by shadowy grays that evoke a sense of unease. The main visual collision occurs with vibrant pink against darker edges, representing the interplay of hope and distrust. This abstract pattern emerges from the seed, where 'inside vs outside' dynamically influences the placement, suggesting a shift from comfort to tension, emphasized by negative space around dense color groups.</desc>
