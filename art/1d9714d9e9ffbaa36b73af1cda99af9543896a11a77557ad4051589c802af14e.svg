<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Balance</title>
  <desc id="desc">The emotional tone of this artwork captures the tension between envy and gratitude, representing the struggle between desire and appreciation. The palette, featuring deep blacks, dark violets, soft golds, and pale greens, reflects the complexity of these emotions—darkness symbolizing envy and light symbolizing gratitude. The contrast plays out across the canvas; the sharper patterns on one side represent envy with jagged interruptions, while the softer, flowing patterns on the opposite side express gratitude. This setup emphasizes the collision of emotions as one feels the pressure of envy while simultaneously seeking the calm of gratitude, creating a zigzag flow that visually represents this inner turmoil.</desc>
