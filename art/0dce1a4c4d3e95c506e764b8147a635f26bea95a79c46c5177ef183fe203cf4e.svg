<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Stillness</title>
  <desc id="desc">This artwork explores the emotional tension between quiet and pressure through the use of a muted palette and sharp contrasts. The dark navy serves as a weighted foundation, representing pressure, while off-white and faint peach create a calming, quietly spaced backdrop that offers contrast. The collision of color occurs predominantly from the center expanding outward, where the quiet tones push against the darker pressures, suggesting a struggle and a release in the flow. The layout evokes a symmetry that gradually breaks down at the edges, embodying the seed's themes of shatter and clarity amidst confusion.</desc>
