<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Resilience</title>
  <desc id="desc">The emotional tone captures the conflict between the fleeting, vibrant flare of 'spark' and the somber, settled nature of 'ash'. The chosen palette includes warm, contrasted hues of ripe green and honey gold to embody vitality, opposing the deep olive and cream that communicate restraint and softness. The main collision occurs across the diagonal, where jagged, glitch-inspired patterns disrupt the expected flow, symbolizing the struggle of memory being both present and erased. Broken pixels introduce intentional disruptions, reinforcing the themes of resilience and fragility. The layout creates a nearly mirrored composition with slight dissonance, emphasizing the tension inherent in these opposing forces.</desc>
