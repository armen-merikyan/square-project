<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ascent and Descent</title>
  <desc id="desc">This piece explores the emotional tension between joy and grief by using a split horizontal layout. The top four rows embody joy with vibrant colors that suggest lightness and movement, while the bottom rows represent grief with darker, heavier tones. The palette consists of warm yellows and oranges for joy, contrasted against deep blues and muted purples for grief. The central tension is manifested through sharp transitions where lighter colors clash with deeper shades. Broken pixels introduce imperfection, echoing the fragility of emotions, thus enhancing the sense of conflict and contrast. Overall, this composition illustrates the complex interplay between hope and sorrow, ascent and descent, as visualized through color and form.</desc>
