<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Island of Tension</title>
  <desc id="desc">This artwork embodies a struggle between defiance and submission through a dense central core and a surrounding quieter field. The palette blends vibrant signal green and hot magenta for tension against subdued static gray and dead black for grounding. The central diagonal pattern depicts defiance, while the surrounding negative cross represents submission, allowing them to collide visually. The broken pixels introduce an element of disruption, adding character to the defined structure of the piece.</desc>
