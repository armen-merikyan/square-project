<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory vs Motion</title>
  <desc id="desc">The artwork captures the tension between spark and ash, representing fleeting bursts of energy against a backdrop of quiet residue. The palette, combining pale aqua with muted gray and accents of alarm red, illustrates urgency intertwined with restraint. The central collision occurs through asymmetrical noise patterns intersecting a lattice, symbolizing disruption amidst memories and urges. The layout employs a mirror-broken style to evoke a sense of continuity interrupted, reflecting resilience through jagged edges that suggest both fragility and strength.</desc>
