<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Tension</title>
  <desc id="desc">The emotional tone captures the juxtaposition of quiet and pressure, utilizing a palette of muted and compressed colors to evoke depth and tension. The dominant dark navy creates a sense of weight, while faint peach provides a burst of soft contrast. The patterns reflect the dynamic nature of the emotions: 'stairs' symbolizing the build-up of pressure on one side, and 'channels' representing quiet flow on the other. The main collision occurs diagonally, suggesting an ongoing struggle between forces, reflective of the seed's themes of shatter and clarity.</desc>
