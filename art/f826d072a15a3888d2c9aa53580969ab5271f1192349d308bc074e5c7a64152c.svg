<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos: Emotional Echoes</title>
  <desc id="desc">This composition captures the emotional collision of desire and emptiness through contrasting patterns and colors. The left half, representing 'desire,' is filled with structured stripes in deep navy and dim cyan, symbolizing yearning and clarity. The right half embodies 'emptiness' with a staircase pattern in black and white, illustrating the void and disruption of rhythm. This tension creates an interplay between the ordered and the chaotic, reflecting the seed's themes of contrast, pressure, and quiet rhythm. The palette evokes feelings of loneliness blended with subtle hope, with a balance maintained through negative space to underscore the emotional narrative.</desc>
