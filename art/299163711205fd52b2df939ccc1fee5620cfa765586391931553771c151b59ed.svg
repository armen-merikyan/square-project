<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Contrasts</title>
  <desc id="desc">This composition embodies the interplay between softness and severity, with the warm whites and powder pink representing softness encroaching from one diagonal, while the deep blacks and sharp crimson introduce a severe backdrop. The main collision exists at the center where contrast is most intense, symbolizing an emotional struggle, shaped by the seed's suggestion of an open gate but with a crack representing vulnerability. The lattice pattern signifies structural softness while the constellation pattern infers a chaotic severity, creating a rhythmic flicker of emotional tension across the grid.</desc>
