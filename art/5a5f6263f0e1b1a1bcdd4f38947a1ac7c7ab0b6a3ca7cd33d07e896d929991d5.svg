<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Exposed and Enclosed</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of vulnerability and strength through its palette and structural layout. The muted cream acts as the delicate core, symbolizing vulnerability, surrounded by a robust outer layer in blackened plum, which signifies strength and protection. The use of hard edges creates a clear contrast, while the radial pattern within the center suggests a rising signal of exposure, disrupting the otherwise crosshatched outer defenses. The main collision lies in the transition between the soft inner and the thick protective border, evoking feelings of tension and connection despite barriers.</desc>
