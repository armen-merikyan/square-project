<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition reflects an emotional tension between vulnerability and strength. The muted palette of off-white, dust gray, and faint peach conveys a fragile yet warm atmosphere, while the compressed red and dark navy inject moments of disruption and intensity. The strong contrast occurs in the center, where the radial pattern of vulnerability collides with the split-screen strength, creating an interplay of hidden pressures and exposed layers. The arrangement symbolizes the struggle between protection and exposure, aligning with the seed's themes of resilience and desire.</desc>
