<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone explores a delicate interplay between vulnerability and strength, captured through a color palette of lime, black, electric blue, and magenta. The stark contrast presents a tension between softness (represented by lighter tones) and stability (represented by darker tones), while interruptions created by broken pixels symbolize imperfections in both strength and vulnerability. The central area showcases an exposed core surrounded by a heavier margin, emphasizing the meeting point of safety and exposure. The left and right sides almost mirror each other, yet minor disruptions challenge that symmetry, creating an ongoing dynamic.</desc>
