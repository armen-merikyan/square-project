<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">This artwork embodies the tension between spark (represented by bright, rhythmic accents) and ash (represented by subdued, thread-like backgrounds). The chosen palette of off-white elements creates a canvas of quietness, interrupted by sharp hues of compressed red that signify moments of ignition and vitality. The main collision occurs diagonally across the canvas, where the checkerboard pattern of ‘spark’ pushes against the muted ‘threading’ of ‘ash’, creating a clash of energy and stillness. The edge style is soft, allowing the viewer's eye to gently follow the rhythm of the colors. The negative space, which makes up about 20% of the image, enhances the feeling of breath amidst the chaotic interplay, symbolizing resilience within fragility. Overall, the composition portrays a narrative of survival amid contrasts, mirroring emotional struggles with its abstract patterns.</desc>
