<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Strength and Vulnerability</title>
  <desc id="desc">This composition captures the emotional interplay between strength and vulnerability through a palette of dark navy and dim cyan, contrasted by bright whites to emphasize moments of exposure. The center pulses with the tension of a pale, soft light, symbolizing vulnerability at the heart amidst darker, denser edges embodying strength. The chosen layout emphasizes two small centers, creating a rhythmic push and pull that highlights the contrast between dense and lighter fields, but without using literal representation.</desc>
