<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Tension</title>
  <desc id="desc">This piece captures the emotional duel between rage and calm, represented by a palette of deep black, fiery red, and serene pale blue. The black and red evoke a sense of anger and pressure, while pale blue introduces moments of quietness. The layout features a zigzag pattern where hot red accents collide against the calm strips of blue, illustrating the struggle between chaos and tranquility. The edge style is purposely harsh, underscoring the conflict. Intentionally broken pixels reflect scars and interruptions, heightening the emotional complexity within the scene.</desc>
