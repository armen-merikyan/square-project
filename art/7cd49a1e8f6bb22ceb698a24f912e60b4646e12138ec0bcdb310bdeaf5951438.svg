<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Balance</title>
  <desc id="desc">The emotional tone reflects a clash between control and panic, with colors illustrating this tension through the contrasting palette of muted purples and deep blues against vibrant yellows and oranges. The darker colors create a heavy backdrop, representing an unstable environment, while the bright shades act as sparks of hope and chaos. The pattern arrangement evokes a sense of collision and negotiation, where the bright colors intermittently pierce the dense blues and purples, mirroring moments where panic interrupts perceived control. This concept harmonizes with the arrow shape seed, suggesting both direction and conflict without literal representation, allowing an abstract exploration of emotions.</desc>
