<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Repair</title>
  <desc id="desc">This abstract piece explores the tension between longing and resolve, using a palette that reflects warmth and restraint. The muted shades of red oxide and blackened plum suggest longing, while the iron gray and muted cream convey a sense of resolve. The left half of the grid features a pattern of clustered color, implying density and weight of emotions, while the right side contrasts with clearer boundaries, representing steadiness. Broken pixels introduce intentional disruptions, enhancing the emotional narrative of repair versus damage. The collision occurs at the center where warm tones meet cooler, more defined sections, creating a visual echo of conflict and resolution.</desc>
