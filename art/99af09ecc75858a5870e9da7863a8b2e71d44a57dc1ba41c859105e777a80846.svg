<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Heart</title>
  <desc id="desc">This piece portrays the emotional conflict between joy and grief through a sharp horizontal split. The top half utilizes vibrant yellows and oranges, representing joy's spark and brightness, arranged in a 'teeth' pattern that suggests energy and motion. The bottom half uses deep blues and muted purples in a stair-like arrangement, echoing grief's heavier and more fragmented feeling. The thin outlines between colors act as a boundary that emphasizes the stark contrast between the two emotional states. The use of carefully placed broken pixels introduces imperfection, mirroring life's unpredictability amid these emotions. The negative space ensures that neither feeling overwhelms the other, creating a visual tension that reflects the complexity of human emotion.</desc>
