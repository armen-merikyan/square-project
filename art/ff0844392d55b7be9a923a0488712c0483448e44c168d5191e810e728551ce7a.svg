<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Tranquility</title>
  <desc id="desc">The overall emotional tone captures the delicate dance between restlessness and peace, represented through a mix of dark and light colors. The navy and black provide a calming weight, while the dim cyan and white inject a sense of spark and interruption. The collision of patterns—a structured falling pixel effect representing tranquility (from the peace pattern) against erratic dotted movements reflecting restlessness—creates tension in the layout. The primary contrast occurs in the center, where the dark colors dominate but are interrupted by lighter hues, embodying the struggle between serenity and agitation. The use of broken pixels introduces an element of imperfection, reinforcing the theme of unease within balance.</desc>
