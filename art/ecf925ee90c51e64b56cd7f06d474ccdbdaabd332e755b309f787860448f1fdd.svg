<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This piece embodies the emotional tension between security and vulnerability. The palette features 'shelter green' and 'warm brown' representing safety, contrasted against 'cold white' and 'open blue', expressing exposure. The broken pixel motif introduces intentional imperfections, embodying the struggle between protection and open space. The main collision occurs in the center, where stacked patterns of exposure push against the scattered dots of safety, creating a dynamic interplay of weight and lightness that reflects a braiding of contrast and an echo of emotions.</desc>
