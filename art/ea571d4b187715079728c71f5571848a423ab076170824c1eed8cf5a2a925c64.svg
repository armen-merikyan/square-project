<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Stillness</title>
  <desc id="desc">This piece encapsulates the emotional tug-of-war between rage and calm. The palette of reds and blues symbolizes the clash: vibrant cool tones of pale blue and white highlight moments of calm, while jagged red adds points of tension. The arrangement follows a spiral clockwise flow, with dense clustered placements of reds on the left, echoing rising pressure, while the right eases into the soft blues, creating a calm impact. Broken pixels introduce imperfection, reflecting the interruptions found in our emotional experiences. The layout presents a visual argument, with the calm tones attempting to fill spaces but frequently cut through by sharp red pixels, symbolizing the chaos of rage. This piece ultimately creates a visual narrative of balance and conflict across the canvas.</desc>
