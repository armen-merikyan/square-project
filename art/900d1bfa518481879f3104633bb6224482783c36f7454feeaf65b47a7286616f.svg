<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This artwork conveys the emotional dichotomy between defiance and submission through a stark juxtaposition of colors and patterns. The palette of black, electric blue, lime, and magenta creates a dynamic tension; black serves as a quiet field, while the vibrant colors punctuate with defiance. The collision occurs predominantly in the center, where the static pattern of defiance clashes with the halo of submission, creating a central chaos against an open gate, signifying vulnerability. Broken pixels introduce imperfections, reminiscent of scars, enhancing the emotional depth of the piece. The flow is captured in an inward spiral, visually guiding the viewer's gaze toward the core conflict.</desc>
