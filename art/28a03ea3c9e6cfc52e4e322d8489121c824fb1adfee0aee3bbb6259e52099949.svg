<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This piece captures the emotional tension between 'emptiness' and 'desire', portraying a struggle where a saturated warmth yearns against a stark, unyielding border. The palette blends vibrant coral and orange tones representing desire against muted blues and blacks that suggest emptiness. The main collision occurs centrally, where the checker pattern of desire intersects a crosshatch of emptiness, creating dynamic movement that echoes the push and pull of conflicting emotions. The presence of broken pixels represents intentional imperfections, adding to the tension.</desc>
