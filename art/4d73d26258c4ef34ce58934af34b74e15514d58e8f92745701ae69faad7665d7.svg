<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">This piece captures the emotional tension between defiance and submission, represented through contrasting colors and layouts. The palette plays with warm yellows and oranges against muted purples and deep blues to evoke feelings of joy intertwined with grief. The bottom-weighted arrangement emphasizes a feeling of pressure, while scattered, broken patterns like noise echo the conflict between order and chaos. The layout echoes a mirrored symmetry with intentional disruptions, representing the imbalance created by love and betrayal.</desc>
