<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Stillness and Motion</title>
  <desc id="desc">The emotional tone captures the juxtaposition of calmness represented by pale mint and soft sky against the agitation of storm gray and near black. The palette reflects a contrast between light and dark, suggesting peace in the center disrupted by the surrounding restlessness. Main contrasts emerge along the edges where colors collide, representing the conflict between memory and movement. The arrangement embodies two pulsating centers of tranquility juxtaposed against turbulent edges, echoing the seed's narrative of flight and grounding.</desc>
