<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Unsettled Harmony</title>
  <desc id="desc">This piece represents the tension between restlessness and peace through a contrasting palette of dark and warm colors. The clash of deep wine and soft gold signifies emotional discord, while ash gray serves as a quiet field that provides breathing space. The pattern reflects the 'pressure_corner' layout, where one quadrant is densely filled with radial shapes, creating an eruptive force that pulses against the calming backdrop of ash gray. The edges are intentionally uneven, suggesting shattering against a peaceful core, encapsulating the struggle of memory versus motion.</desc>
