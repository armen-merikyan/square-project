<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Worlds</title>
  <desc id="desc">This artwork evokes the emotional tension between loneliness and connection. The chosen palette of deep black juxtaposes with vibrant electric blue and magenta, representing silence and explosions of color, echoing the contrast of solitude against bursts of camaraderie. The top-heavy arrangement signifies weight from the loneliness above while the lower grid is more open, suggesting hidden connections. The crosshatch patterns evoke a fragmented space, representing the interplay of exposed vs. concealed emotions. This layout challenges the viewer to navigate the clashing sentiments of security and isolation.</desc>
