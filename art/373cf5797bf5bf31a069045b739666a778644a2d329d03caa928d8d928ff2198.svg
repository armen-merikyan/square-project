  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This artwork captures the emotional tug-of-war between deep desire and profound emptiness. The palette, dominated by warm tones of hot coral and blood orange, conveys the intensity of longing, while the subtle hollow blue suggests a sense of withdrawal. The main contrast occurs in the upper left corner where the vibrant colors collide with the muted charcoal and patchwork effects, illustrating the pressure of desire against the constraints of emptiness. The broken pixels create intentional disruptions, symbolizing the jagged edges of these conflicting emotions.</desc>
