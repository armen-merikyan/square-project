<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">This piece captures the tension between longing and resolve through sharply contrasting colors and varied pixel placements. The palette combines 'signal green' and 'hot magenta' for their emotional resonance, representing pulse and urgency, while 'dead black' and 'static gray' provide a moody backdrop of depth and repair. The central collision occurs in the middle of the grid, where the rippling pattern of longing meets the glitch-like interruptions of resolve, creating a sense of dynamic tension. The layout reflects a cross-current, with a prominent quiet space to suggest the unresolved nature of the emotions expressed in the seed.</desc>
