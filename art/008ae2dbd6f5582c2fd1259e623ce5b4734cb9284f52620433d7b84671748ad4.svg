<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This artwork explores the emotional tension between longing and resolve through a palette of muted and hopeful colors. The dark navy serves as a foundation that represents the depth of longing, while off-white and faint peach create highlights of resolve and potential. The main contrast occurs in the center, where broken gray pixels disrupt the harmonious flow, symbolizing the tension and imperfections in the journey of repair. The maze-like arrangement embodies a search for clarity, hinting at the struggle against the backdrop of serenity and urgency.</desc>
