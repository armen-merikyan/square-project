<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Stillness</title>
  <desc id="desc">This piece explores the emotional tension between restlessness and peace through a blend of soft and dark tones, symbolizing motion and tranquility, respectively. The chosen color palette (`shelter_green`, `warm_brown`, `pale_skin`, `cold_white`, `open_blue`) evokes a sense of warmth yet also contrasts sharply with darker shades to highlight the underlying struggle. The main contrast occurs diagonally, where brighter and muted colors collide, representing the chaos of memory versus the calmness of being present. The layout mimics a nearly symmetrical design marred by intentional breaks, reflecting the concept of mirrored emotions that don't quite align, inviting the viewer to ponder the nature of their own internal conflicts.</desc>
