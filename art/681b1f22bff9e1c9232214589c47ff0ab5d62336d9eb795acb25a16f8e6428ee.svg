<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Symmetry</title>
  <desc id="desc">This piece encapsulates the emotional interplay between envy and gratitude through a carefully chosen palette. The dark navy signifies depth and heaviness associated with envy, while the subtle dim cyan introduces an element of lightness and hope tied to gratitude. The contrast emerges from the jagged arrangement of colors where dense black interrupts lighter hues, creating tension reminiscent of a mirrored image that is both harmonious and fractured. The zigzag pattern mimics the stairs climbing towards an undefined light, illustrating the struggle between the pull of heavy emotions and aspirations for elevation. Broken pixels are subtly integrated to evoke the imperfections of this emotional landscape, maintaining about 15% negative space to enhance the sense of tension and release.</desc>
