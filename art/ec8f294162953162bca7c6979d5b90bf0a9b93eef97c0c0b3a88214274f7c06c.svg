  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone reflects the tension between vulnerability and protection. The palette blends warm browns and shelter greens to evoke safety, contrasted against the chill of pale white and open blue representing exposure. The central collision of colors creates a stark division, emphasizing the fragile balance where safety is compromised by exposure. Patterns of 'hinge' and 'spark' create a visual rhythm of interruption and soft barriers, echoing the themes of the seed through their collision and flow.</desc>
