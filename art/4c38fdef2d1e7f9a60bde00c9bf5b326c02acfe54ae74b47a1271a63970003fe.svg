<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Broken Harmony</title>
  <desc id="desc">This artwork reflects the emotional tension between love and betrayal. The chosen palette consists of warm pinks and reds symbolizing love, contrasted sharply with dark gray and maroon representing betrayal. The layout features a nearly mirrored image with intentional misalignments (broken pixels) to evoke feelings of disruption and unease, while maintaining 10% negative space to provide balance. The checker pattern symbolizes the warmth of love, while the spark patterns suggest abrupt interruptions and conflict. The composition narrates a transition from a warm, inviting space to one challenged by discord, ultimately embodying the struggle between connection and disconnection.</desc>
