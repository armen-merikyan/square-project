<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork embodies the tension between vulnerability and strength through its contrasting colors and patterns. The warm shadows and rose clay reflect a sense of strength and groundedness, while the cool blue and distant lilac introduce vulnerability and the fragility of the exposed center. The layout rises, symbolizing hope against incoming tides, while the broken pixels serve as intentional scars, representing past vulnerabilities. The collision is mainly centered, where the lighter hues of vulnerability interrupt the stronger, darker edges, making a statement about balance in chaos and the complexities of safety and exposure.</desc>
