<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone contrasts defiance with submission, symbolizing conflict through the use of color and pattern. The palette of pale aqua and alarm red emphasizes tension—calming cool tones clashing with vibrant urgency. The main collision happens at the center, where deep ink blue radiates outward, surrounded by soft gray and white interrupts from the periphery, creating a sense of a protected core under attack. The unequal patterns, noise and channels, overlap in dense formations versus quieter spaces, visually representing the struggle and the unseen emotions of rising chaos amid fleeting calm.</desc>
