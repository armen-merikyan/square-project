<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience and Fragility</title>
  <desc id="desc">This artwork embodies the tension between the lively spark of ambition and the quiet weight of ash, reflecting emotional contrasts of hunger against restraint. The palette, featuring hot coral and blood orange against shades of charcoal and hollow blue, creates a striking vibrancy juxtaposed with muted tones—symbolizing hope and despair. The composition flows from a dense corner, where the warmer colors dominate, suggesting a collision of energy amidst the encroaching quiet. The use of broken pixels introduces intentional disruption, adding texture and complexity, much like our memories which can be both vivid and erasing. This arrangement invites the viewer to explore the dynamic interplay between resilience and fragility.</desc>
