<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Dissonance</title>
  <desc id="desc">This artwork reflects the tension between signal and noise through its color palette and arrangement. The dominant use of deep navy suggests a calm, systematic pulse against the erratic chaos of lighter and darker greys. The deliberate placement and overlap of dark and light colors create a broken, jagged edge that imparts a sense of scars or interruptions, mirroring the idea of a broken mirror. The composition starts from the corner, as noise slowly diffuses outward while an underlying pulse struggles to assert itself. The mix of smooth dark fields with sharp contrasted accents embodies the emotional conflict inherent in the seed, creating a pathway of movement that feels both constrained and fracturing.</desc>
