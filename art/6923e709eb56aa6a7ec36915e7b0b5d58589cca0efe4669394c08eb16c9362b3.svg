  <title id="title">Exposure Against Shelter</title>
  <desc id="desc">The emotional tone highlights the tension between safety and exposure, using an earthy, contrasting palette that juxtaposes muted shelter greens and warm browns against the vulnerability suggested by pale skin and cool whites. The composition features a bright cluster of warm colors, representing exposure, against a deeper, darker field, depicting safety. This arrangement reflects the interplay between open vulnerability and protective boundaries, with the main contrast occurring in the center, creating a visual echo of tension and release.</desc>
