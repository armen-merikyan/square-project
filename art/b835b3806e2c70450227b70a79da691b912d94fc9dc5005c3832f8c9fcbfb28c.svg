<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Connections</title>
  <desc id="desc">The emotional tone of this piece contrasts loneliness and connection, embodied through a palette of dark navy, faint white, and muted cyan hues. The majority of the grid remains unoccupied, reflecting the loneliness, while bursts of dim cyan suggest moments of connection or connection missed. This use of color creates a stark contrast that emphasizes the tension between absence and presence, with top-weighted colors hinting at hidden shadows. The central arrangement reflects a fragment of a heart, feeling both exposed and confined. Broken pixels in random placements force moments of imperfection, enhancing the emotional depth of isolation and incomplete connection.</desc>
