<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissonance of Form</title>
  <desc id="desc">This artwork embodies the tension between confusion and clarity through varied patterns and color application. The palette of dark red, burnt orange, charcoal, and gold suggests both the warmth of clarity and the threat of confusion. The dominant grid pattern represents the chaos, while the central radial pattern seeks clarity, creating a lively contrast. Broken pixels are scattered to reflect disruption, enhancing the feeling of a corrupted symmetry. The artwork aims to mirror the emotional state suggested by the seed — a struggle to find clarity amidst confusion, framed by a thick outline for a sense of containment.</desc>
