<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Echo</title>
  <desc id="desc">The artwork embodies an emotional tension between awe and terror, utilizing the dark richness of colors to create weight and contrast with vibrant, glowing spots to convey moments of lightness and hope. The palette, anchored in burnt orange, dark red, charcoal, and gold, plays on warmth versus coolness, suggesting the tumultuous balance between feelings of fear and wonder. The layout mimics a rising signal, reflecting a push towards escape and aspiration, while the pattern types—broken dots and checker—evoke chaos against structured order. Key collisions occur where bright accents intersect with deep, muted expanses, echoing the struggle between light and darkness in both emotional and physical spaces.</desc>
