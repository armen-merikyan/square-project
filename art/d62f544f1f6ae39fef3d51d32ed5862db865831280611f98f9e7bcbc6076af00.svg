<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">This composition captures the emotional contrast between rage and calmness through color and placement. The palette combines intense reds with soft pale blues and neutral black and white tones, reflecting the explosive nature of rage pitted against the serene, quiet characteristics of calm. The main contrast emerges from the top left corner, where vibrant red hues burst into the muted blue fields, creating an aggressive zigzag pattern that interrupts the calm. The layout offers a pressure point, with the corner overflowing while the calmer areas spread softly, suggesting a dialogue between chaos and tranquility. The broken pixels introduce intentional disruptions, enhancing the theme of eroded symmetry and machine emotion in a tactile manner, without creating recognizable imagery, thus remaining purely abstract.</desc>
