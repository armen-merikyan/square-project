<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece explores the emotional tension between desire and emptiness through a stark contrast of colors. The outer border represents the quiet recess of emptiness with deeper, muted tones that evoke a sense of distance, while the inner 4x4 core expresses the vivid warmth of desire, symbolizing an overwhelming pull. The collision occurs at the border where the warm saturated tones meet the cool, hollow field, suggesting a desire striving against a confinement. Color choice reflects the push and pull: hot coral and blood orange ignite a feeling of yearning, whereas charcoal and hollow blue embody the feeling of restraint. The arrangement creates a spiral rhythm that leads the viewer's eye, reflecting the emotional currents implied in the seed.</desc>
