<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece navigates the tension between vulnerability and strength, utilizing a palette of signal green and electric blue to represent a dynamic interaction of emotions. The center is a pale area disrupted by stark contrasts of dead black and hot magenta, symbolizing exposure within a protective, yet eroding, boundary of static gray and darker tones. The rows alternate between dense patterns and quiet spaces, suggesting pressure against the frame of vulnerability. The collision occurs centrally, inviting a visual exploration of the contrasts present.</desc>
