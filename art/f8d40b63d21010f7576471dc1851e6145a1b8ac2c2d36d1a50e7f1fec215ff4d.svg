  <title id="title">Center Tension</title>
  <desc id="desc">This piece explores the emotional interplay between panic and control. The palette, drawn from 'broken_memory', features muted tones like sepia and faded blue, suggesting a nostalgic burden. The sharp contrast between the left and right sides reinforces the tension, as the left represents control through structured noise, while the right embodies the chaotic target pattern of panic. The pixel bleed effect introduces intentional imperfections, enhancing the theme of inner conflict, where the organized edges confront the chaotic center.</desc>
