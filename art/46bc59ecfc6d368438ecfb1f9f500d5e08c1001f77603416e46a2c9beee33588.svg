<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shifting Echoes</title>
  <desc id="desc">The artwork encapsulates the emotional tension between nostalgia and progress through its stark color contrasts and jagged edge interruptions. The lower half features denser hues of deep maroon and vibrant red, symbolizing the weight of nostalgia, while the upper half employs cooler grays, representing the clarity and forward momentum of progress. The edge style—jagged—mirrors the conflict inherent in these emotions. By integrating the 'window' shape from the seed as implied space rather than a literal representation, a horizontal split emphasizes the divide between past and future, with the drip pattern suggesting the fluid nature of time and memory. The use of broken pixels adds to the imperfection, hinting at fragmented memories and progress.</desc>
