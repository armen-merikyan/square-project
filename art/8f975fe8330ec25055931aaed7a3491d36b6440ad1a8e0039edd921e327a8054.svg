  <title id="title">Tension Spiral</title>
  <desc id="desc">This artwork embodies the emotional contrast between defiance and submission through a split vertical layout. The left side utilizes a scar pattern that symbolizes resistance with sharp crimson and carbon black, creating a dynamic conflict with the muted, soothing rain pattern of the right side. The palette of softness and severity illustrates the tension between the angular interruptions of defiance and the soft, downward folds of submission. The central collision where the two patterns meet symbolizes a point of invasion, echoing the inward spiral theme.</desc>
