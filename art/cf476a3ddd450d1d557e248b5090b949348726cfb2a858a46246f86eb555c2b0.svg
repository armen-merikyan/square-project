  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The artwork embodies the tension between safety and exposure, showcased through a contrast of soft and sharp colors. The palette centers around a warm brown, representing safety, which surrounds a vulnerable pale skin center. The radial pattern of the pale skin color creates a focal point of exposure, disrupted by dark green dots symbolizing safety. The collision occurs in the center, where the softness of pale skin meets the severity of dark colors, illustrating the battle of these opposing emotions.</desc>
