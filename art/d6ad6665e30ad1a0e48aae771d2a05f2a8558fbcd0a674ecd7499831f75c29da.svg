<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasts in Motion</title>
  <desc id="desc">The artwork embodies the emotional tension between vulnerability and strength, featuring a palette that reflects intimacy (rose clay, warm shadow) against the coolness of distance (cool blue, distant lilac). The main contrast occurs in the diagonal flow where dense 'strength' colors meet softer 'vulnerability' hues, creating an area of collision in the center while maintaining quiet spaces around it to allow the emotions to breathe into one another. Broken pixels act as deliberate disruptions, suggesting flaws and repair, echoing the reality of both emotional states. This composition prompts a spectral exploration of pressure, connection, and alienation inherent in human experience, aligning with the seed's themes.</desc>
