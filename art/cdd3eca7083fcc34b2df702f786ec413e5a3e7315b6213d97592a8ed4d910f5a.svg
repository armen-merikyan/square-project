<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Containment</title>
  <desc id="desc">This piece embodies the emotional conflict of rage and calm through contrasting colors and patterns. The dark and intense red hues represent rage, while the cooler pale blue and soft white colors suggest calmness. The outer border hosts the rage colors in a jagged pattern representing explosive energy, while the inner 4x4 grid employs a more subdued and smooth threshold pattern reflecting tranquility. The tension lies in the jagged red sparking against the soft blues, creating both a clash and a flow of emotion at the center, where contrasting energies collide yet also coexist.</desc>
