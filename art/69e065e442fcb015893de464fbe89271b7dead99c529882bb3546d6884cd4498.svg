<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This artwork contrasts the emotional tones of joy and grief by using a divided palette and asymmetric patterns. The left incorporates warm, bright colors like yellows and oranges, evoking joy and spark-like qualities, while the right utilizes deeper blues and muted purples, reflecting the calm yet heavy nature of grief. The zigzag flow enhances the feeling of contrast — with chaotic interruptions on the grief side, the joy section remains more ordered. The mixture of broken pixels adds imperfection, symbolizing the inherent complexity of these emotions. The palette choice emphasizes this duality with warm and cool tones, fostering a visual echo of emotional tension.</desc>
