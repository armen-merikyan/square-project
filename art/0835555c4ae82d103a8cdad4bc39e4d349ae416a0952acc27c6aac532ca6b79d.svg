<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">The emotional tone of this piece stems from the contrast between envy and gratitude, illustrated through a dark, warm palette that invokes tension and intimacy. The colors vary between the coolness of gray shades, representing detachment and emptiness, and the warmer pink and red hues that symbolize connection and warmth. The main contrast occurs in the middle rows where softer edges of pink collide with stark dark maroon, echoing the struggle between soft acceptance and harsher emotions. This conflict is reflected in the asymmetrical layout of pixels where the patterns of 'teeth' (envy) are interrupted by the 'spark' (gratitude), creating a visual dissonance that mirrors the duality of these emotions. The piece employs negative space effectively to evoke a sense of uncertainty and reflection, allowing for an atmosphere that is simultaneously chaotic and quiet.</desc>
