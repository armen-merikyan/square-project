<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Wave of Tension</title>
  <desc id="desc">This artwork embodies the emotional dynamics of control versus surrender, employing a palette that balances signal green and electric blue with grounded gray tones. The center of the piece bursts with tension, where dense clusters of colors coalesce, creating a feeling of pressure and confinement. The quieter edges, marked by static gray and dead black, suggest yielding and release. This contrast climaxes at the center, echoing the idea of overflow and containment, while broken pixels subtly disrupt the uniformity, symbolizing moments of stutter and hesitation. Overall, the arrangement invites viewers to explore the delicate balance between rigidity and fluidity.</desc>
