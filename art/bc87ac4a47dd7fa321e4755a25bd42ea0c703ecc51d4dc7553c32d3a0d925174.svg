<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Inversion</title>
  <desc id="desc">This piece explores the duality between relief and dread, with dark colors dominating the top weighed against lighter accents below, representing the push and pull of emotional pressure. The palette of deep navy and black embodies dread, while the sporadic presence of dim cyan and white offers glimpses of relief. The stark contrasts create a tension where lighter colors seem trapped amidst the oppressive dark, symbolizing the struggle between hope and despair. The arrangement reflects a corner invasion, where darkness attempts to dominate but is intermittently pierced by lighter patches, leaving spaces that evoke emptiness.</desc>
