<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Resilience</title>
  <desc id="desc">This artwork embodies the emotional tension between sparks of hope and the remnants of ash. The palette combines deep blacks to symbolize ash with vibrant reds to represent sparks, highlighted by pale blue fields inducing calmness. The central collision of colors conveys the fight between restraint and hunger, where dark jagged edges interrupt softer tones, suggesting a struggle that feels both intense and fragile. The pattern created diverges from evenness to evoke memories and echoes of past clashes, channeling both resilience and erasure.</desc>
