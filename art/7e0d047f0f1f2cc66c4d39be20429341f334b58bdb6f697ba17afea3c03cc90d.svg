<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resilience</title>
  <desc id="desc">This piece embodies the emotional tension between vulnerability and strength, represented through the juxtaposition of a soft interior against dense outer pixels. The palette of warm ivory and ash gray narrates a story of subtle warmth amidst harder edges, with deep wine and stain brown creating moments of confrontation and pressure. The main contrast emerges in the center, where warm colors pulse toward the cooler, deeper surroundings, creating a dialogue of connection and alienation. The arrangement follows the layout of two small pulses, reflecting the seed’s exploration of exposure and shelter.</desc>
