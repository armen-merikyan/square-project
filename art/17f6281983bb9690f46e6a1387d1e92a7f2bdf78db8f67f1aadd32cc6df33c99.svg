<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipsed Harmony</title>
  <desc id="desc">This artwork explores the emotional dichotomy of loneliness and connection. The chosen palette of burnt orange, dark red, charcoal, and gold draws from the theme of ancient fire, signifying warmth and intensity against a background of deep longing. The top half is dominated by muted colors representing loneliness, featuring broken dots that create a sense of isolation and vastness. The bottom half shifts to brighter tones in a chaotic teeth pattern, suggesting the vibrancy and chaotic nature of connection. The central 'tear' shape subtly interrupts the flow, symbolizing a fragile bond. The contrast between the top-heavy arrangement and the negative spaces evokes the tension between being exposed and hidden in relationships.</desc>
