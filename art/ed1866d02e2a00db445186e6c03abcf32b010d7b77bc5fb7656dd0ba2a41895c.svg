<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Boundaries</title>
  <desc id="desc">This piece captures the tension between the emotional weights of softness and severity, illustrated through the contrasting use of light and dark colors. The palette of powder pink and warm white evokes gentleness, while the sharp crimson and carbon black emphasize the severity, creating a dialogue about forgiveness and guilt. The layout mirrors a rising signal, suggesting movement and hope, as sparks of soft color interrupt the strong stripes of severity. The contrast bursts from the center, with broken pixels symbolizing imperfections in communication and emotional experience.</desc>
