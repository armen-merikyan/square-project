<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This artwork captures the emotional tension between defiance and submission through a dynamic contrast of colors that suggest weight and lightness. The palette of yellow and muted purple evokes warmth and melancholy, illustrating the struggle of choice. The checker pattern associated with defiance clashes with the noise pattern representing submission, creating a visual tension that reflects the emotional collision central to the seed. The arrangement is intentionally bottom-weighted, suggesting both support and the weight of unresolved feelings, while maintaining negative space to evoke openness and possibility.</desc>
