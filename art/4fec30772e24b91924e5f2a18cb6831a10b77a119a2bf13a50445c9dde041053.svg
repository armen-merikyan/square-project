<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">The emotional tone of this composition reflects a tension between longing and resolve. The chosen palette of moss green, bone white, rust, stone gray, and small gold was selected to evoke a sense of fragility juxtaposed with strength. The contrast is primarily located in the diagonal flow of the colors, where dense, somewhat chaotic areas of moss green and rust collide against quieter fields of bone white and stone gray, symbolizing the push and pull of emotions. The use of broken pixels introduces a sense of imperfection and disruption, highlighting the ongoing struggle between intimacy and distance, while the negative space allows for a breath amidst the density, enhancing the evocative nature of the artwork.</desc>
