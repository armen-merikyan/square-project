<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This piece reflects the emotional tension of trust versus suspicion. The palette of mourning black and deep blue represents the overshadowing weight of suspicion, while the pale yellow and new leaf colors symbolize the fragile light of trust attempting to pierce through the noise. The outer edges create a jagged boundary, highlighting suspicion, while the inner 4x4 maze pattern denotes the complexity of trust, with a soft glow against a hard shadow creating contrast. The collision of these two patterns suggests a struggle between opposing emotions, emphasizing resilience amidst fragility.</desc>
