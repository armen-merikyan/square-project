<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork expresses the tension between the deep low saturation of emptiness and the bright heat of desire. The palette features warm colors, primarily centering around hot coral and blood orange, which demonstrate desire; meanwhile, hollow blue and charcoal represent the repressing emptiness. The central collision occurs in the middle of the grid, where the saturation peaks against the surrounding low-saturation colors. The broken pixels serve as intentional disruptions, mimicking the feelings of boundaries and limits over desire.</desc>
