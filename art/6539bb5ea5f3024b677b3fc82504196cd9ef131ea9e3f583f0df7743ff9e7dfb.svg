  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This artwork captures the duality of joy and grief through contrasting colors and patterns. The warm yellows and oranges represent joy, while the deep blues convey grief, creating a dynamic tension. The radial patterns of joy scatter against the checker-like organization of grief, revealing the push and pull between lightness and heaviness. The layout embodies a split-screen feel, enhancing the emotional impact while leaving negative space to allow for reflection on the contrasting moods. The scattered arrangement simulates the unpredictable waves of emotion, with broken pixels signifying the imperfections we carry.</desc>
