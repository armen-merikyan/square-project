  <title id="title">Tension of Emotions</title>
  <desc id="desc">This composition engages the duality of desire and restraint, utilizing a palette that contrasts saturated and muted tones. The bright corals and oranges serve as surges of desire, while the subdued charcoals and hollow blues represent the steady restraint. The main collision is at the center, where crosshatch patterns of bright colors intermingle with broken frame structures of the muted tones, illustrating an emotional tug-of-war. The empty room layout provides a stark representation of the battle, with ample negative space amplifying the tension within the arrangement.</desc>
