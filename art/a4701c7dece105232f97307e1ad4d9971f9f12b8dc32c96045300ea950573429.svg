  <title id="title">Tension of Exposure</title>
  <desc id="desc">This artwork captures the emotional dichotomy of safety versus exposure through color and contrast. The cooler green and pale skin tones suggest softness and safety while the warmer, darker shades introduce an element of pressure and tension. The split vertical layout creates a clash in the center, where the pulse marks (representing exposure) collide with the flood pattern (representing safety), offering a narrative of conflict and balance. Broken pixels enhance this tension, introducing imperfection and echoing the themes of vulnerability and strength.</desc>
