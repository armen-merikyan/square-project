<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Uncertainty</title>
  <desc id="desc">The emotional tone reflects a duality of confusion and clarity. The chosen palette of burnt orange, dark red, charcoal, and gold symbolizes a fire of emotion—both warming and destructive. The contrasting stripes invoke a sense of chaotic movement against the structured crosshatch pattern, highlighting the collision between clarity and confusion. The main contrast occurs through densely packed warm tones on one side illustrating confusion, disrupted by expansive negative space of cool charcoal creating a visual balance. The abstract pattern suggests a pulsating rhythm, resonating with the theme of fluctuating emotions and fragmented symmetry.</desc>
