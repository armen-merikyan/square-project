  <title id="title">Tension of Time</title>
  <desc id="desc">This artwork explores the emotional contrast between nostalgia and progress through a mixture of vivid and muted colors. The palette includes deep blue for nostalgia, evoking calm and depth, and warm oranges for progress, signifying energy and movement. The arrangement features a split horizontal layout where warmer colors dominate the bottom half, representing growth and action, while cooler tones fade towards the top, suggesting memories and the passage of time. The jagged edges throughout create a sense of disruption between these contrasting worlds, as if they are battling for dominance. A few broken pixels add imperfection, reflecting the complex human experience between longing and advancement.</desc>
