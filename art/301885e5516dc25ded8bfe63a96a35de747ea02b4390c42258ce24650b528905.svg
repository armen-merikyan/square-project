<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone explores the tension between desire, represented by warm, saturated colors, and the emptiness conveyed through muted, low-saturation areas. The palette of hot coral, blood orange, dust pink, charcoal, and hollow blue illustrates this dichotomy. The collision occurs in the center with a dynamic spiral pattern that juxtaposes bold stacking against a backdrop of negative cross, invoking a sense of pressure. The seed's abstract quality is reflected in the spiral layout and the interplay of light and dark, echoing the balance of longing and constraint.</desc>
