<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Desire</title>
  <desc id="desc">The emotional tone centers on the clash between warmth of desire and the coldness of emptiness. The palette reflects this duality, using warm sepia tones to convey desire against muted cool colors of faded blue and dust gray to signify emptiness. The main contrast arises from the central spark that interrupts the cooler edges, representing the heart fragment amidst the noise of emotions. The edge style conveys a sense of unresolved tension, with jagged patches suggesting brokenness, mirroring the desire to connect amidst isolation.</desc>
