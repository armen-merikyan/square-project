<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This artwork embodies the emotional duality of joy and grief through contrasting colors and patterns. The palette is a mix of bright yellows and oranges representing joy, contrasted by muted blues and purples symbolizing grief. The checker pattern in the joyful sections suggests playful movement, while the crosshatch in the grief sections conveys heaviness and complexity. The flow from the bottom to top creates a rising signal, as if striving for balance, highlighted by the strategic placement of darker hues on one side to create psychological tension. The broken edges introduce imperfections, representing the unresolved emotions and the subtle vibrations of machine-like emotions in this emotional landscape.</desc>
