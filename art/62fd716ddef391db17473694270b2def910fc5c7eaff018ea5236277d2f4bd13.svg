<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Meets Restraint</title>
  <desc id="desc">This piece embodies the emotional struggle between emptiness and desire, using a color palette that oscillates between warm accents and deep, shadowy fields. The collision occurs at the center, where the two forces overlap—intense coral and orange that signal desire clash with cooler, muted blue and charcoal that evoke a sense of containment and emptiness. The arrangement of colors creates a spiral effect that symbolizes longing but is bound by a clear structure, reflecting the tension of reaching against restraint.</desc>
