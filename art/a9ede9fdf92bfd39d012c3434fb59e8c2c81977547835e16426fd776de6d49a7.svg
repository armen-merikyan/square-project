<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Dichotomy</title>
  <desc id="desc">The emotional tone reflects a juxtaposition of trust and suspicion, using a palette of moss green, bone white, rust, stone gray, and small gold to embody elements of resilience and fragility. Trust is represented through echoing patterns in soft gradients, while suspicion manifests in sharp contrasts from the ladder pattern. The main collision occurs diagonally, where warm tones from trust meet cooler tones of suspicion, symbolizing an emotional boundary. This delineation creates an abstract representation of inner conflict and resolution through color placement and rhythm.</desc>
