<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shadowed Resistance</title>
  <desc id="desc">This artwork captures the emotional tension between defiance and submission through sharp contrasts and layered patterns. The burnt orange and gold hues evoke a sense of fiery resistance, while the charcoal and dark red introduce shadows of submission. The left side utilizes a stacked pattern representing the defiance theme, interrupted by instances of broken pixels that serve as reminders of fragility. The right side flows into a ladder pattern, symbolizing the gradual, downward movement of submission. The center serves as a collision point, where the two themes intersect, and their contrasting natures create a tension that invites contemplation.</desc>
