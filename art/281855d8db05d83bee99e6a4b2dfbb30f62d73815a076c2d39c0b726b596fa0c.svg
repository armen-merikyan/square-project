<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone contrasts hot anger with cool serenity. The palette features intense reds representing rage and soft blues depicting calm, coexisting side by side to highlight their tension. The left side is dominated by jagged, red 'embers' which cut sharply through dense areas of black, representing compressed intensity, while the right showcases a halo of pale blue that gently envelops white, reflecting an even mood. The interaction is mainly defined at the vertical center where these emotional states collide and disrupt the calm, creating a feeling of overflow against a structured calmness. The layout emphasizes their split nature but the colors intermingle, suggesting a constant push-pull between chaos and tranquility.</desc>
