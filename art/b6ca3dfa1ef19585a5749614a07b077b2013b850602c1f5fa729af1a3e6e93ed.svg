<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This piece explores the emotional duality of defiance and submission through color collision and placement. The choice of a warm palette, led by 'lamp_gold' and 'rose_clay', symbolizes warmth and resilience, contrasting with cooler shades of 'cool_blue' and 'distant_lilac' that embody quietness and retreat. The dominant colors create an unmoved center while the edges display uneven textures, depicting the struggle against chaos. The main collision resides in the center, creating a cloud of tension amidst the calmer fields surrounding it.</desc>
