<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Shadows</title>
  <desc id="desc">This composition symbolizes the emotional interplay between defiance and submission, highlighting the contrasts of pressure and quiet. The palette of black, dark violet, soft gold, and pale green conveys a spectrum of feelings, with black and dark violet representing depth and intensity, while soft gold and pale green introduce gentle optimism against that weight. The edges use a burned style to suggest jagged interruptions, emphasizing the raw collisions of emotion in the center. The placement of vibrant colors is strategically reserved for the heart of the image to draw focus, while the edges convey an overwhelming heaviness that contrasts with the core's emerging light.</desc>
