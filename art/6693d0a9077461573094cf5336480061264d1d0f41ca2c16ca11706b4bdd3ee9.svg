<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Striking Balance on the Edge</title>
  <desc id="desc">This piece reflects the tension between defiance and submission with a stark color palette that embodies the emotional gravity of both experiences. The dominant tones incorporate shelter green and warm brown, symbolizing stability and warmth, enriched by pale skin for softness and open blue for contrasting clarity. The center of the grid features a collision of static patterns (submission) from pale skin and brown against jagged, assertive teeth patterns (defiance) from green and blue. The diagonal rise adds dynamic movement, while the uneven borders and broken pixels create a sense of disruption and tension, embodying the conflict of open vs closed spaces.</desc>
