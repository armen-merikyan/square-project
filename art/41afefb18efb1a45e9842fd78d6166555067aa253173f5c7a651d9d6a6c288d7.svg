<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotion</title>
  <desc id="desc">This pixel art expresses a dialogue between tenderness and rage through contrasting colors and patterns. The color palette of deep red, muted black, soft pale blue, and stark white enhances the emotional tension. The left side portrays tenderness with a ladder-like repetitive pattern in low warmth tones, while the right side represents rage with jagged disruptions. The central collision emphasizes an emotional struggle, where structured patterns of calm intertwine and disrupt against chaotic, sharp shapes, reflecting the themes of guilt and forgiveness. The broken pixels intentionally create scars, symbolizing unresolved feelings and imperfections within the harmony. There remains a slight negative space to provide breathing room, suggesting introspection.</desc>
