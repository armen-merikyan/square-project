<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone shifts between a warm pull of desire and a large blank area symbolizing emptiness. The palette features vibrant coral and orange representing desire, contrasted by the hollow blue and charcoal that suggest the restraint of emptiness. The central collision occurs in the mid-left of the grid, where warm colors abruptly meet cooler ones, capturing the tension between overflowing desire and the containment of boundaries. The layout is diagonal, with desire occupying one wedge and emptiness occupying the opposing area, enhancing the sense of tension and imbalance.</desc>
