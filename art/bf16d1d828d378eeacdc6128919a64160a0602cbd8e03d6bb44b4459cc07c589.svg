<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece reflects the emotional tension between desire and emptiness, where a saturated pull towards warmth and vibrancy is encircled by a void of cooler tones. The palette of hot coral, blood orange, and dust pink represents the intense desire, while charcoal and hollow blue depict an emptiness that feels constricting. The collision occurs at the center where the vibrant stripes disrupt the surrounding halo, creating a stark contrast that highlights frustration and aspiration. Colors are used to express a narrative of longing held back, a visual echo of the seed's theme, and invites the viewer to feel the push and pull of their own desires.</desc>
