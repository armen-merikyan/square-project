<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone combines a saturating pull of warm colors with the stark emptiness of low saturation blues and grey tones. The palette employs vibrant hues like hot coral and blood orange, contrasted against muted charcoal and hollow blue. This contrast embodies the tension between desire and containment, with warm colors suggesting an internal pull towards expansion, while the cooler tones create a sense of delineation and restriction. The main collision occurs in the center, where desire emerges, seeking to disrupt the edges, symbolizing the struggle against imposed limits. The broken pixels enhance this tension with imperfection, while maintaining a clear structure with negative space that emphasizes the emotional narrative of hunger restrained by surrounding boundaries.</desc>
