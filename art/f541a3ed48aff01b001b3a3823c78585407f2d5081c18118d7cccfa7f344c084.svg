  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This piece evokes the emotional weight of joy contrasted with grief through the interplay of bright yellows and muted purples. The palette radiates warmth while fragments echo deeper, darker tones. The rows establish a tension between order and chaos, with zigzag patterns symbolizing fleeting moments of connection amid a fragmented experience. The use of negative space invites breath and reflection, embodying the interplay of these emotions without literal representation.</desc>
