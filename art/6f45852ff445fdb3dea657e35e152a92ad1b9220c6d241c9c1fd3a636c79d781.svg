<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition captures the emotional tension between rage and calm. The black and red colors represent the explosive energy of rage, while the cooler pale blue and white hues embody the serenity of calm. The pattern flows downwards like falling pixels, creating a sense of descent that underscores the emotional weight—a clash where bright colors overlap the calmer tones, generating a striking contrast. Central to this composition are interruptions where the red jagged pixels interrupt the cool horizontal bands of blue, suggesting a battle between containment and release. The arrangement juxtaposes the dynamic, chaotic nature of rage against the stillness of calm, allowing the viewer to feel the collision of these emotional states in a visual rhythm.</desc>
