<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Reverie</title>
  <desc id="desc">This piece captures the emotional tension between nostalgia and progress through a deliberate use of contrasting colors. The palette of muted purples and deep blues represents the weight of nostalgia, while the warm yellows and oranges symbolize the vibrancy of progress. The top half employs a cleaner, structured layout, reminiscent of order and clarity, while the bottom half disrupts this with chaotic noise patterns, suggesting a breakdown or unease. The bottom-heavy composition mirrors the feeling of being weighed down by the past versus the clarity of forward motion, creating a narrative of conflict and balance.</desc>
