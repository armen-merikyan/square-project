<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">The emotional tone reflects a tension between joy and grief, contrasting warm hues representing joy (yellow and orange) against muted colors for grief (deep blue and muted purple). The center exhibits a strong collision with brighter colors colliding with darker tones, creating a visual representation of conflict. The use of dense versus empty spaces conveys moments of pressure and lulled quiet, while patterns of maze and split screen enhance the feeling of navigating through complex emotions. The alternating rows create a rhythmic wave that embodies the push and pull between joy and sorrow, reminiscent of the ebb and flow of internal conflicts.</desc>
