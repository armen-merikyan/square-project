<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Motion</title>
  <desc id="desc">This piece reflects the emotional duality of longing and resolve, using the palette of cosmic indigo and cold gold for depth and warmth. The primary collision occurs in the central row, where dark tones meet the brighter, golden accents—symbolizing the struggle between desire and affirmation. The patterns of frames and embers suggest an oscillation of emotions, embodying both entrapment and liberation through intentional disruptions (broken pixels) that create visual scars and imperfections, reinforcing the narrative of repair against damage. Overall, the layout resembles a mirrored approach while allowing imperfections to surface, showcasing beauty in contrast and complexity.</desc>
