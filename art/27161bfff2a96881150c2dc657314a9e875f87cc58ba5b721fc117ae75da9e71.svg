<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Control</title>
  <desc id="desc">This composition reflects the emotional dichotomy of 'panic' vs 'control' through a split layout: the upper segment embodies panic with a chaotic, dotted pattern in a palette of burnt orange and dark red, evoking a sense of urgency and jitter. The lower segment offers a mirrored, gold and charcoal arrangement representing control, where the density remains anchored, suggesting stability against the chaos above. The center is designed as a meeting point of these two feelings, with colors bleeding at the edges to symbolize the tension between the two emotional states, creating a visual echo of centralized strength interrupted by chaotic light.</desc>
