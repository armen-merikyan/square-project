  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone combines rage and calm, illustrating conflict through the palette of red, pale blue, black, and white. The clash occurs via a static pattern represented by red interspersed with calm thresholds of pale blue, forming an explosive contrast. The layout spirals toward an off-center collision that embodies both containment and overflow, with broken pixels adding imperfection and disorder, echoing the tension of the emotion pair.</desc>
