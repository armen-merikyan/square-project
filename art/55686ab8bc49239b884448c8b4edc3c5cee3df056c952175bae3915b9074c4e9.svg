<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Orbiting Dissonance</title>
  <desc id="desc">The emotional tone contrasts the chaotic energy of panic with the steady rhythm of control. This duality is represented through a palette of muted sepia tones and differentiated textures. The left side uses a 'checker' pattern, symbolizing the wild disruptions of panic, while the right exhibits a controlled 'rain' pattern, emulating a grounded sense of stability. Broken pixels are strategically placed to enhance the feeling of interruption and imperfection, emphasizing the emotional collision of intense contrasts. Light negative space rows suggest both emptiness and potential, enhancing the theme of 'inside vs outside'.</desc>
