<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Zigzag Tensions Between Light and Darkness</title>
  <desc id="desc">This composition captures the emotional interplay between panic and control. The chosen palette of dark violet, soft gold, and pale green evokes a sense of contrasting emotions: the darkness of panic against the lighter hues symbolizing control and clarity. The arrangement features a zigzag pattern reflecting chaos and conflict, where the bright golds serve as sparks of hope amidst the darker backgrounds. The use of broken pixels adds imperfection, signifying the struggle between order and chaos, while maintaining a 10% negative space for breathing room. The soft curves of the zigzag pattern imply a rhythmic movement, accentuated with hard edges to maintain tension.</desc>
