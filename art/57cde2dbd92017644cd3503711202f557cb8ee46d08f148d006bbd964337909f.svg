<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This artwork captures the emotional duel between relief and dread through a palette of dark and calm colors. The deep navy and black signify dread, while the white and dim cyan embody moments of relief. The contrasting layout of dark blocks at the top and lighter shades at the bottom illustrates a top-weighted feel, suggesting a weight pulling down, yet broken by lighter hues. The checker pattern symbolizing relief intersects sharply with dark flame-like forms, representing intensity and pressure amid stillness, evoking a sense of an empty room filled with clashing emotions.</desc>
