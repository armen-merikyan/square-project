<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Containment</title>
  <desc id="desc">This composition embodies the emotional conflict of desire versus restraint through color and placement. The palette, comprising 'hot coral' and 'blood orange' alongside muted tones like 'charcoal' and 'hollow blue', creates a dynamic interplay between vibrant longing and the weight of suppression. The main collision occurs centrally, where warm colors (representing desire) merge with the cooler hues of restraint, suggesting a spiraling tension. The rows descend like falling pixels, introducing both continuity and interruption, resonating with the interplay of hope and limitation.</desc>
