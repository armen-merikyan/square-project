<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Emotion</title>
  <desc id="desc">The emotional tone translates into a struggle between bright, warm sparks of hope and the encroaching dark weight of anxiety. The palette of warm yellow and orange conveys bursts of joy amid the deep blue and muted purple representing shadows and pressure. The contrast occurs diagonally, where bright elements clash with darker masses, suggesting a desperate battle for stability against an overwhelming force. The layout follows a corner invasion, reinforcing feelings of confinement and the pull between opposing forces. Broken pixel elements add imperfection, mirroring the chaos of the mind in turmoil.</desc>
