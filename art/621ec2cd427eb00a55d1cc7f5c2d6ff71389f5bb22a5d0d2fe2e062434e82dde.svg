<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This artwork reflects the emotional tension between rage and calm through stark contrasts. The palette features black and red representing the intensity of rage, while pale blue and white embody the softness of calm. The main confrontation occurs in the center with hot red ripples cutting through a cooler background of pale blue, creating a sense of collision and movement. The arrangement evokes an island within a sea, encapsulating the struggle of contained emotions overflowing into chaos. Broken pixels add an intentional imperfection that mirrors the unpredictability of these feelings.</desc>
