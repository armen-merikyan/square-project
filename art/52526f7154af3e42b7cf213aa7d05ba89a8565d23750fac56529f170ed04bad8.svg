<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects the delicate balance between vulnerability and strength, symbolizing an exposed core contrasted by robust outer layers. The selected palette of electric blue, signal green, and hot magenta evokes tension and dynamism against a stable base of dead black and static gray, amplifying the conflict. The main collision occurs off-center, where glitch patterns representing vulnerability disrupt the stacked strength colors. This interplay creates a rhythmic flow, as if the colors are in a nervous dance—reflecting the seed's themes of pressure and fluidity while leaving negative spaces to emphasize openness.</desc>
