<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Desires</title>
  <desc id="desc">This piece embodies the emotional tug-of-war between 'emptiness' and 'desire’. The palette moves through cooler grays to warms of pink and dark maroon, suggesting a struggle from isolation to yearning. The patterns shift diagonally, simulating a rhythmic rise of desire contrasted with descending emptiness. The use of glowing edges creates a visual tension between voids and hints of warmth, allowing the piece to breathe while maintaining a 10% negative space, symbolizing the unresolved nature of the emotional conflict.</desc>
