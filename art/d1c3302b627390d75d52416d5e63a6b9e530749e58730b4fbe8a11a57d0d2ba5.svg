<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Control and Chaos</title>
  <desc id="desc">The emotional tone embodies a conflict between panic and control, represented by dark versus light colors creating visual tension. The palette of black, dark violet, soft gold, and pale green conveys a spectrum of fear to hope, where the darker hues symbolize panic, encroaching on the lighter, more hopeful colors. The layout begins in the corner, with a structured grid pattern (control) transitioning into zigzagging chaos by the opposite edge. The arrangement illustrates how control intermittently breaks down into chaos, symbolized by an asymmetrical placement of colors, creating a friction that mirrors an emotional struggle of joy and grief.</desc>
