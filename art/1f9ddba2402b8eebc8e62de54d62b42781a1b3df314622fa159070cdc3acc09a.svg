<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Tension</title>
  <desc id="desc">This piece captures the emotional dichotomy of panic versus control through a structured layout that contrasts two emotional states. The left half, embodying panic, uses a jarring pattern of vibrant cyan against a dark navy background, creating a sense of chaos and urgency. The right side, representing control, features soft, broken dots of lighter grays and whites interspersed against the deep black, suggesting stability and serenity amid the turmoil. The palette of 'lonely_signal' enhances the distinction—dark tones evoke anxiety while lighter shades suggest clarity. The interplay of hard and soft edges within the center creates tension and motion, guiding the viewer from chaos to calm, embodying the idea of the center being under attack by the edges.</desc>
