<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This artwork explores the emotional tension between tenderness and rage through contrasting colors and spatial arrangements. The palette features deep blacks and vibrant reds for rage, while softer hues of pale blue and white represent tenderness. The hollow center creates space for introspection, surrounded by jagged bursts of red, symbolizing the interruption of calm with passionate energy. The 'broken pixels' introduce intentional imperfections, mirroring the raw edges of untamed emotion. This balance of chaos and calm is reflected in the oscillating patterns of cracks and noise, embodying a push and pull that resonates with the complexities of guilt and forgiveness.</desc>
