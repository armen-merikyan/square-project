<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Flowing Fury</title>
  <desc id="desc">The emotional tone captures the clash between rage and calm — where the dark intensity of rage (black and red) threatens to overwhelm the tranquil blues and whites, striving for containment. The pattern starts from the bottom left, sprawling diagonally with chaotic red braids that fracture the calm fields of pale blue and white. This corresponds to the layout specifications, establishing a harsh edge against softer hues, echoing the tension of the seed's themes: conflict, noise vs signal, and contained pressure against a quilt of calm.</desc>
