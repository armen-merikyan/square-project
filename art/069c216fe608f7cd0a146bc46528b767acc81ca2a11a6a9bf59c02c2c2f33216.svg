<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Resolution</title>
  <desc id="desc">This composition embodies the tension between longing and resolve, using dark hues to portray anticipation against the stability of warmer colors that symbolize resolve. The palette of mourning black and deep blue provides depth and a somber heartbeat, while pale yellow and new leaf create warmth and organic renewal. The main collision occurs centrally, where dense clusters of deeper tones create a sharp contrast against a softer background, suggesting a struggle between chaos and clarity. This juxtaposition of 'embers' against 'flame' manifests the desire for intimacy but recognizes the distance embedded in resolve, creating an emotive and stark abstract narrative.</desc>
