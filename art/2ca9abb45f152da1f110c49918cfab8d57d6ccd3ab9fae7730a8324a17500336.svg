<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Weight</title>
  <desc id="desc">This artwork embodies the emotional contrast between joy and grief. The color palette transitions between warm yellows and oranges suggesting joy, contrasted with deep blues and muted purples representing grief. The density of dark colors creates a weighty background, clashing against the bright accents that symbolize fleeting joy. The zigzag flow of color transitions creates a sense of rising tension, while the distributed negative space allows the vibrant colors to stand out, maintaining balance amidst the chaos. The patterns of crosshatch against frame elements reflect the fight between order and chaos, embodying the duality of machine emotion.</desc>
