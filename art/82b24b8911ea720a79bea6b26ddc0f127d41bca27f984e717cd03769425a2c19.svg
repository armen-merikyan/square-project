<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional core of this piece embodies the tension between vulnerability and strength. The pale center represents vulnerability, surrounded by bold blocks of deep blue and muted purple, which convey strength and stability. The corner-heavy edge style gives a sense of confinement and protection, while the zigzag flow disrupts the space, symbolizing the push and pull in emotional experiences. The palette of yellows and oranges intertwines lightness with the gravitational weight of deeper colors, emphasizing the constant negotiation between safety and exposure. The collision occurs at the core, advocating the struggle of embracing openness amidst surrounding strength.</desc>
