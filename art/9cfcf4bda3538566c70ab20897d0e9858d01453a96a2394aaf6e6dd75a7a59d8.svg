<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Connection</title>
  <desc id="desc">This artwork explores the emotional tension between isolation and togetherness, using a palette that contrasts bright lime and electric blue against deeply muted blacks and magentas. The arrangements create a center-weighted presence that feels both exposed and sheltered, symbolizing the clash between loneliness and connection. The layout mirrors on the edges with deliberate misplacements to evoke imperfections and the unpredictability of relationships. The broken pixels give a raw, untouched quality to the composition, connecting to the ancient fire theme by suggesting warmth amidst separation.</desc>
