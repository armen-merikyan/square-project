<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">The artwork embodies the emotional duality of joy and grief, captured through contrasting warm and cool hues. The palette merges yellows and oranges symbolizing joy with muted purples and deep blues reflecting grief. The zigzag and checker patterns evoke a sense of battle between the two states, with sharp contrasts featuring at the center where emotions collide. Broken edges add imperfection, suggesting the vulnerability inherent in both emotions, while maintaining negative space to allow for reflection. This configuration conveys a dynamic tension where joy bursts forth but is often interrupted by shades of grief, creating a complex emotional experience.</desc>
