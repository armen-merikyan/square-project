<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissonant Waves</title>
  <desc id="desc">The emotional tone represents the tension between defiance and submission, where contrasting dark and light colors manifest as conflicting forces. The palette of black, dark violet, soft gold, and pale green embodies the struggle for dominance—a stark contrast visually symbolizes the emotional battle. The repeated wave-like patterns in the center, disrupted by jagged edges, echo the push and pull of the conflicting emotions, creating a sense of weight and fluidity. The arrangement, with dark colors dominating the lower half, portrays a bottom-weighted feel, while the lighter tones attempt to penetrate from above, suggesting an unresolved interplay between hope and despair.</desc>
