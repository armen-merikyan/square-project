  <title id="title">Shelter and Exposure</title>
  <desc id="desc">The emotional tone reflects the struggle between safety and exposure, where the palette consists of soft greens and browns representing shelter and severity. The contrast occurs in the top-left, with warmer colors demanding attention, while a cooler, muted area emerges at the bottom-right, suggesting a release. The arrangement echoes the idea of a 'pressure corner' with dense marking, as though the higher density of lines on one side disrupts the stability of the calmer side, creating a rhythm of shelter versus exposure.</desc>
