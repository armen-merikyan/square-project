  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork explores the emotional tension between desire and emptiness, using a palette of warm coral and orange tones to represent desire, contrasted with cool charcoal and blue to depict emptiness. The central collision occurs in the middle rows where the saturation levels clash, creating a dynamic yet chaotic balance. The structured barcode and disrupted grid patterns convey a struggle between ordered desire and the restraint of emptiness, inviting viewers to reflect on the contrast of hunger for more against the feeling of being contained.</desc>
