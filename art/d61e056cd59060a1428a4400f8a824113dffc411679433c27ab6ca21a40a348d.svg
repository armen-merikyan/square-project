<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Realms</title>
  <desc id="desc">This artwork embodies a clash between defiance and submission, structured as a vertical split to represent opposing forces. The left half pulses with dynamic reds and oranges, depicting defiance through the 'echo' pattern, while the muted earthy tones in the right half soothe with a 'checker' pattern, illustrating submission. The broken edges imply disruption, and the central band is intentionally left open to evoke a threshold, representing the space between chaos and order. This choice of palette aligns with the emotional weight of hunger and restraint, suggesting both tension and release.</desc>
