<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This artwork evokes a poignant emotional tone where fear and hope collide. The palette of black, dark violet, soft gold, and pale green reflects the battle between darkness and light. The black and dark violet dominate the outer edges, suggesting confines of fear, while the soft gold and pale green emerge sporadically, symbolizing fleeting hope. The sharp vs. soft contrast is highlighted by jagged edges in darker tones clashing against the smooth, uplifting hues of hope. The central placement of subtle light denotes hope surrounded by an overwhelming sense of darkness, creating an abstract narrative of rising signal amidst the surrounding rain of broken patterns.</desc>
