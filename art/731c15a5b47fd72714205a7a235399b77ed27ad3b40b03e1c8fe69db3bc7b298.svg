<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Resilience</title>
  <desc id="desc">This piece captures the tension between vibrance and stillness. The chosen palette of warm coral and cold slate represents the juxtaposition of spark (vibrance) and ash (stillness). The collage of rain-like patterns against the tide evokes memory's push and pull, while broken pixels disrupt uniformity, symbolizing resilience amid fragility. The interplay between clusters of dense color (warm coral) in the center and quiet gradients (cold slate) at the edges represents the inner struggles against external restraint.</desc>
