  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork explores the contrast between tenderness and rage through color dynamics and spatial organization. The left side utilizes a muted palette with soft transitions, embodying tenderness, while the right side erupts in vivid, saturated colors indicative of rage. The center acts as a collision zone, where these emotions bleed into one another, creating tension. The jagged edges and broken pixels disrupt symmetry, emphasizing emotional turmoil and imperfection. The negative space introduces breathing room, enhancing the overall narrative of emotional struggle and coexistence.</desc>
