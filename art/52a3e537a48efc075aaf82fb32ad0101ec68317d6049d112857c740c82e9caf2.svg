<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This artwork explores the juxtaposition of grief and joy through contrasting color placements. The top half, characterized by muted purples and deep blues, represents the heaviness of grief, employing a radial pattern that suggests a pull inward—a retreat from lightness. The bottom half bursts with yellow and orange in a sharp 'teeth' pattern, expressing joy through angular assertions that seem to rise upward. The hard edges create tension between the two emotional states, while the distribution of broken pixels adds an element of imperfection, evoking the complexity of human emotions. The overall composition maintains a negative space that encourages tension and release, echoing a sense of unresolved emotional conflict.</desc>
