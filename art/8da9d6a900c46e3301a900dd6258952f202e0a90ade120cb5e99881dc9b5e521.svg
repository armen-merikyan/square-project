<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This piece embodies the emotional contrast of rage and calm through a dynamic interplay of color and pattern. The palette, featuring vehement reds juxtaposed against muted blues and blacks, conveys a struggle between intensity and tranquility. The bright red marks encroach from the bottom left corner, illustrating a collision that interrupts the calming pale blue halo spreading from the opposite corner. The arrangement suggests an ongoing battle between opposing forces, marked by both structured calmness and chaotic intensity, resonating with the seed’s themes of noise, erosion, and the delicate balance of emotion. Broken pixels add an intentional imperfection, mirroring the essence of both chaos and structure.</desc>
