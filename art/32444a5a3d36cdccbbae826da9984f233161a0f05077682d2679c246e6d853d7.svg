<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow and Containment</title>
  <desc id="desc">The artwork expresses the emotional contrast between certainty and curiosity. The left half, filled with structured barcode patterns, embodies certainty through rigid lines and a cooler palette focused on blues and grays, representing containment and order. The right half, defined by cracked patterns in hot magenta and vibrant signal green, evokes curiosity, hinting at spontaneous disruptions and unresolved questions. The collision between the halves occupies the center, where color and pattern collide, transforming into unexpected interactions, symbolizing the tension between the two emotions.</desc>
