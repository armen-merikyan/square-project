  <title id="title">Fractured Boundaries</title>
  <desc id="desc">The emotional tone is a clash between defiance and submission, represented through sharp contrasts and overlaps. The palette, 'safety_exposure', employs warm browns and cool blues to convey a sense of protection versus exposure. The central collision occurs between the warmth of the core and the cooler border, symbolizing the tension between resistance and retreat. The pattern of 'flame' hints at defiance, while 'constellation' captures the essence of submission, alluding to a complex interaction of force and fragility.</desc>
