  <title id="title">Weight of Balance</title>
  <desc id="desc">The composition captures the emotional tension between relief and dread through contrasting colors and symmetrical imperfection. The dark colors symbolize dread while the bright ones represent relief, creating a dialogue of emotional collision. The chosen palette—burnt orange, dark red, charcoal, and gold—contrasts warmth and heaviness. The patterns reflect a mix of radial relief amidst dotted dread, emulating a sense of pressure and lightness that echoes the theme of symmetry versus break. The central block of warm colors emerges against darker surroundings, emphasizing a fragile balance.</desc>
