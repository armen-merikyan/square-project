<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Trust and Doubt</title>
  <desc id="desc">This piece captures the emotional tension between trust and suspicion through a split layout. The palette of soft cyan, muted plum, and moon white introduces a melancholic yet hopeful atmosphere, where the left side is more structured (representing trust) and the right side exhibits a fragmented, chaotic grid (symbolizing suspicion). The collision occurs starkly down the center, where the patterns of 'teeth' and 'grid' interface, allowing for a visual representation of binary emotions that elude perfect harmony. The broken pixels inject a sense of imperfection and reflection, leaving negative space to suggest deeper contemplation.</desc>
