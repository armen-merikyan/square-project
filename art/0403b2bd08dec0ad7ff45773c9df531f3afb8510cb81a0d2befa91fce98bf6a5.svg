<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone captures the tension between dynamic ignition (spark) and settled remnants (ash). The palette, drawn from 'fear_hope,' combines dark violet and soft gold to evoke contrast between muted calm and vibrant bursts. The main collision occurs at the center, where jagged edges of the spark pattern disrupt the orderly flow of the ash pattern. This interplay of horizontal and vertical motifs illustrates a struggle between restraint and liberation, echoing the complexities of memory versus erasure.</desc>
