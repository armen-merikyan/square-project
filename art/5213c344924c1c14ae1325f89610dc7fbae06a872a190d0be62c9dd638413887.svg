<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Dissonance</title>
  <desc id="desc">This composition captures the conflict between clarity and confusion. The palette leverages deep navy and stark black to convey a sense of depth and void, while dim cyan adds a cooler contrast, acting as a fleeting signal. The patterns of signal (flood) dominate the lower half, while circular noise (ring) interrupts, creating visual tension. The arrangement allows the eye to be drawn upwards, echoing a rise amidst chaos and leaving negative space to sustain the pulse's readability.</desc>
