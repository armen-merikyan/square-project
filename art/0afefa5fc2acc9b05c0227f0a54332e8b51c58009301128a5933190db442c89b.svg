<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Silence</title>
  <desc id="desc">This piece explores the emotional dichotomy between rage and calm, using a palette of red (to signify explosive emotion) and pale blue (representing tranquility). The bright accents of red mark the periphery, suggesting an overflow of emotion, while cooler hues try to establish quiet spaces within the center. The central section is a structured calm, surrounded by jagged edges of red, evoking tension and interruption. The broken pixels throughout introduce imperfection, echoing the noise inherent in emotion. The layout hints at a rising pulse, with a central calmness that is progressively invaded by explosive color.</desc>
