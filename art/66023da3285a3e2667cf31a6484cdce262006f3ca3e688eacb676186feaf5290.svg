<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone captures the duality of joy and grief, illustrated through the contrast of vibrant yellows and oranges against deep blues and muted purples. The palette reflects warmth and depth, conveying joy as bright and open and grief as heavy and restrained. The zigzag flow pattern emphasizes movement between states—upward for joy and downward for grief. The negative space policy ensures a balance between density and calm, allowing the colors to interact without overwhelming the canvas. The jagged edges evoke a sense of disturbance, resonating with the struggle of opposing emotions.</desc>
