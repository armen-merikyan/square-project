<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoed Tensions</title>
  <desc id="desc">This piece embodies the emotional tension between longing and resolve. The selected muted cream and iron gray colors illustrate a serene background filled with the urgency of red oxide and small orange accents. The layout features an overfilled corner, creating a visual pressure that collides with the softer areas, embodying the concept of repair versus damage. The contrasting patterns of long tension (teeth) and resolute structure (stack) play off one another, echoing the complexities of desire and determination as abstract energy interspersed throughout the grid.</desc>
