<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissonant Harmony</title>
  <desc id="desc">The composition embodies the tension between confusion and clarity, achieved through a contrasting palette of warm oranges and yellows against deep blues and muted purples. The outer frame reflects a noise-like pattern, creating a sense of disorder, while the inner core seeks to achieve a semblance of symmetry. Broken pixels introduce imperfections to disrupt false harmony, enhancing the overall emotional depth. The arrangement intentionally plays with density and space, allowing certain areas to breathe while others pulse with color, alluding to the sensory overload of modern life and the yearning for clarity amid chaos.</desc>
