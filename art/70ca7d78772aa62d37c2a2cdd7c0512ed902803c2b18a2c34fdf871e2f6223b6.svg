<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This piece explores the tension between warmth and coldness, representing the emotional contrast of love and betrayal. The palette combines soft pinks and reds with stark maroon and gray, suggesting affection and loss. The main visual collision emerges from the asymmetrical distribution of soft hues against harsh edges, evoking the feelings of a broken relationship. The structure embodies a maze pattern interspersed with rough 'teeth' edges, reflecting the central theme of 'symmetry vs. break,' creating an abstract representation of emotional turmoil.</desc>
