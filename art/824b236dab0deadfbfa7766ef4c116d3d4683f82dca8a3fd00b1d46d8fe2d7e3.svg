<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall of Emotions</title>
  <desc id="desc">The artwork embodies the emotional contrast between awe and terror through a duality of structured stripes and chaotic flame patterns. The warm palette of yellow and orange represents awe, while the deep blue suggests a lurking terror. The vertical split layout reinforces the division of emotions, with the left side conveying a sense of stability and curiosity, and the right side expressing instability and chaos. The broken pixels introduce an element of imperfection, symbolizing fragmented memories impacting perception. The layering suggests a shift from calm into pressure, reflecting the dynamic interplay of emotions.</desc>
