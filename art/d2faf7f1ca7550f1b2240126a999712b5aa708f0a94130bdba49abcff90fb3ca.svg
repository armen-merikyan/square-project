<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This piece captures the emotional tension between longing and resolve through the interplay of muted and vibrant colors. The palette of sepia, tan, dust gray, and faded blue evokes a sense of nostalgia while suggesting a broken narrative. The collision occurs where the glitch pattern of longing meets the structured teeth pattern of resolve, primarily around the center and top left corner, creating a visual pull that feels incomplete yet hopeful. Broken pixels add to the feeling of disruption and imperfection, reinforcing a sense of longing amidst the resolve to create order.</desc>
