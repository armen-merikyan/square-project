<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone reflects a battle between the explosive energy of rage and the soothing nature of calm. The palette utilizes stark contrast with deep blacks and bright reds for rage, combined with soft pale blues and whites to depict calm. The main collision occurs in the center with jagged red patterns cutting through the serene blue horizontal bars, symbolizing the forceful intrusion of chaos into tranquility. Patterns reminiscent of a barcode evoke calm, while a braid-like texture illustrates the intensity of rage. Broken pixels introduce intentional imperfection, embodying the emotional upheaval suggested by the seed. The layout reflects a quiet field interrupted by sharp energy, capturing the essence of eroded symmetry and conflict between opposing forces.</desc>
