<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragile Fortress</title>
  <desc id="desc">The emotional tone balances vulnerability and strength, captured through a contrasting color palette of warm and cool tones. The overall feeling is of exposure with a fragile center (the light colors) surrounded by deeper hues, representing strength. The primary collision occurs in the center, where the stark contrast of soft pastel against deep blues and grays illustrates the tension of vulnerability against strength. The use of broken pixels introduces intentional disruptions mirroring the theme of vulnerability, while the contrasting patterns showcase the struggle between the two emotional states. The overall design embodies a sense of rising signal with an echoing pressure from the edges inward.</desc>
