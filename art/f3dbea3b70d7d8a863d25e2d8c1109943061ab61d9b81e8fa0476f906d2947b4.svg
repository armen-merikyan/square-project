<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">The emotional tone navigates the delicate balance between joy and grief, reflected in a palette of warm yellows and muted purples. Bright yellows represent joy's spark, while muted purples convey a sense of grief. The layout, with joy starting from the bottom left corner, creates a diagonal invasion of brightness, contrasting with the deeper, heavier colors that crowd the upper right. This shift suggests a collision of vibes between joy's light and grief's weight, with the edge style emphasizing this transition through a coarse, hard texture. Broken pixels enhance the feeling of fragmentation, allowing the emotions to bleed into one another, creating a tension that is both unsettling and beautiful.</desc>
