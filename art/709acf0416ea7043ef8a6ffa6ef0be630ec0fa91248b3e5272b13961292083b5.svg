<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Ascendancy</title>
  <desc id="desc">This composition embodies the emotional tension between relief and dread. The use of warm hues like yellow and orange create a feeling of fleeting hope, while the deep blue and muted purple represent the weight of dread and the dark pressure of an empty space. The contrasting colors reflect the emotional collision—the bright colors attempting to rise while dark tones capture the heaviness at the base. The pattern echoes a rising flow, yet with deliberate breaks, acting as both stair-like progression and cracks of interruption, highlighting the struggle between escape and entrapment.</desc>
