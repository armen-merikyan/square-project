<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Yearning and Limitations</title>
  <desc id="desc">This piece embodies the emotional duality of desire and restraint, using a palette that juxtaposes warm, intense colors with cooler, muted tones. The dominant presence of warm red_oxide signifies desire, while the muted cream and iron gray encapsulate restraint, creating an interplay of energy and calm. The pattern of channels signifies the unfolding of desire, while the pressure bands represent the barriers that contain it. The central collision occurs at the center of the grid, where vibrant warm hues clash against the cool muted shades, illustrating the tension that emerges from unfulfilled longing. The deliberate use of negative space emphasizes isolation, enhancing the emotional landscape of love and betrayal.</desc>
