<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">The emotional tone represents a tension between love and betrayal, illustrated through the use of a warm palette on the left (love) and a contrasting, cool palette on the right (betrayal). The chosen colors (pink and red for warmth, gray and dark maroon for coolness) convey feelings of warmth layered with coldness. The overlay of broken dots and rings exposes vulnerability amid the concrete forms, emphasizing the collision where emotions intertwine. The broken pixels add imperfection, suggesting the imperfect nature of relationships, while the split vertical layout accentuates the stark contrast. Negative space is preserved on the left to capture a sense of quiet introspection against the right's dense pressure of betrayal.</desc>
