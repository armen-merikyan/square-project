<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotion Fracture</title>
  <desc id="desc">This composition evokes the tension between love and betrayal through a division of warm and cool colors. The left side, representing love, uses soft pinks and warm reds in a flame pattern, suggesting warmth and connection. In contrast, the right side embodies betrayal with stark grays and a dark maroon against chaotic noise patterns, creating an unsettling atmosphere. The broken pixels disrupt symmetry, symbolizing the imperfections in emotionally charged relationships. The darker shades clash with the warmth, illustrating a juxtaposition that creates an emotional resonance, where light meets darkness, and harmony confronts discord.</desc>
