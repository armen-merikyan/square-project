<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece embodies the tension between 'defiance' and 'submission,' manifesting as a stark contrast across the canvas. The color palette, settled around earthy reds, muted creams, and dark plums, evokes a sense of grounded strength versus the quiet softness of retreat. The inner pixels display aggressive, angular 'islands' representing defiance, framed by a maze-like structure suggesting submission. The broken pixels introduced at intentional points disrupt visual flow, embodying moments of conflict and reflection. The quiet channel running through serves as a pathway of negative space, conveying the opposing forces grappling within an abstract narrative.</desc>
