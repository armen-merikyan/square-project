  <title id="title">Echoing Tensions</title>
  <desc id="desc">The emotional tone juxtaposes peace and restlessness, reflected in the color contrasts of cool and warm hues. The chosen palette of ice blue and warning orange represents the calm and the unsettling elements, respectively. The main collision occurs predominantly at the center where vibrant orange interrupts the cooler tones, creating a visual pulse. The layout is banded to emphasize a shift in density and temperature, allowing the viewer to feel the oscillation between serene spaces and dense cluster zones, echoing the seed’s dual themes of memory and motion.</desc>
