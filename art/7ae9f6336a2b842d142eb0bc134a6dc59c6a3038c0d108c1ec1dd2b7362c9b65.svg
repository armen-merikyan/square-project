<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Signal</title>
  <desc id="desc">The piece explores the tension between clarity and chaos, using a palette of navy, black, and bright dim cyan to evoke feelings of isolation and interference. The darker tones represent the 'noise', while the brighter cyan and whites signify moments of clarity that break through the static. The main contrast occurs at the center of the canvas where bright pixels collide with darker, denser colors, symbolizing the struggle of clear signals attempting to push through a cacophony of noise. The arrangement respects a scattered repair layout, with broken pixels that subtly disrupt the flow of the composition, reinforcing the idea of fragmented communication and memory.</desc>
