<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork explores the emotional juxtaposition of desire and emptiness. The color palette includes vibrant tones like hot coral and blood orange symbolizing yearning, contrasted with muted shades of charcoal and hollow blue that embody a sense of emptiness. The central area features a tumultuous collision of desire represented by intensive pulses of these warm colors, while the edges maintain a tranquil, restrained ambiance, emphasizing the tension between the two emotions. Broken pixels disrupt the flow, creating intentional imperfections, reflecting the chaos of internal conflict. The overall arrangement leads to a mirrored structure with slight discrepancies, echoing the theme of disrupted desire against secure boundaries.</desc>
