<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Duality</title>
  <desc id="desc">The emotional tone navigates between longing and resolve, represented through an interplay of warm and cool colors. The palette, 'ancient_fire', evokes warmth intertwined with depth—using burnt orange and dark red to embody yearning and passion, contrasted by charcoal as a boundary that contains and contains energy. The collision occurs at the top left corner, where the overfilled warmth spills into the quieter sections—creating a visual tension that reflects the struggle between containment and overflow, echoing the kinetic rhythm of threads within a veil. The broken pixels introduce imperfections, suggestive of a mirror fragmenting the image, adding complexity and depth that illustrate repair amidst damage.</desc>
