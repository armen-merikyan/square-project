<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork embodies the tension between defiance and submission through a careful arrangement of colors that clash and harmonize. The palette features deep black juxtaposed with dim cyan to create a stark contrast, reminiscent of a pulse battling against a glitch. The diagonal wedge layout, suggestive of rising tension against the confines, establishes a visual argument between order and chaos. The broken pixels introduce intentional disruptions, reinforcing the sense of conflict within the abstract forms. The central region displays a dense cluster, allowing for a quiet field towards the edges, embodying both resistance and enclosure, and emphasizing the core theme through color placement and pattern logic.</desc>
