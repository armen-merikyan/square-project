<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Signals</title>
  <desc id="desc">The emotional tone is a juxtaposition of joy and grief, represented by warm yellows and oranges against deep blues and muted purples. The palette captures the tension between light and shadow, with brighter colors emerging from darker backgrounds. The zigzag pattern of joy formed by stripes collides with the fragmented spark-like grief, creating a rhythmic tension across the composition. This creates a dynamic visual flow that suggests unresolved emotions and contrasts over time, echoing the rise and fall of signals in communication.</desc>
