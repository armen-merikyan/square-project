<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This piece explores the emotional dichotomy of desire and restraint, utilizing a palette that juxtaposes warm, saturated tones against cooler, muted shades. The contrast between hot coral and blood orange represents desire's pulsing intensity, while charcoal and hollow blue signify the boundaries and limitations of restraint. The central layout captures the tension where desire tries to push outward but is constrained, creating a spiraling pressure effect. This tension between colors and the positioning within the grid allows for a dynamic, yet controlled visual experience.</desc>
