<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erosion of Balance</title>
  <desc id="desc">The emotional tone balances strength and vulnerability, using a palette that evokes warmth and depth. The contrast is established through ashy grays battling rich deep wine and warm ivory, representing strength pushing against vulnerability. The center is a pale expanse, disrupted by darker colors, creating a stark collision at the heart of the piece, symbolizing a broken mirror reflecting both light and shadow. The broken pixels introduce intentional discord, emphasizing the themes of exposure and fragility in an otherwise balanced layout, guiding the viewer through an emotional journey of safety versus exposure.</desc>
