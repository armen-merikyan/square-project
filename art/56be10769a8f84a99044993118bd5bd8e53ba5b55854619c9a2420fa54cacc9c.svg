<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Edge of Defiance</title>
  <desc id="desc">This piece evokes a state of tension between defiance and submission through its contrasting palette. The bright coral and blood orange create a sense of vibrant pressure at the edges, while the deep charcoal and hollow blue form a subdued, quiet center. The asymmetrical arrangement disrupts the order, echoing the struggle between chaos and control. The collision of hues occurs primarily in the corners, emphasizing the 'open vs closed' motif suggested by the seed, while broken pixels introduce intentional imperfections to reflect the unpredictability of emotional states. The layout centers on a hollow core, reinforcing the idea of confinement amidst vibrant defiance.</desc>
