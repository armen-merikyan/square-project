<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition captures the emotional contrast of vulnerability and strength through the juxtaposition of dense, saturated color in the center against a lighter, more exposed border. The palette of clean white, ice blue, and warning orange symbolizes clarity amidst confusion. The collision occurs at the center where the strength of saturated colors meets the pale vulnerability, providing an abstract representation of conflicting emotions. Broken pixels are intentionally placed to signify imperfection and the fragility of strength, enhancing the interplay of protection and exposure.</desc>
