  <title id="title">Eroded Symmetry</title>
  <desc id="desc">This piece conveys an emotional dichotomy between restlessness and peace. The cooler colors like ice blue and violet gray signify serenity, while the bright warning orange disrupts with energetic pulses representing agitation. The layout disrupts symmetry, with bright sections at the corners and calm fields dominating the center, visually suggesting that restfulness is challenged by external pressures. Broken pixels introduce intentional chaos, placing an emphasis on the struggle between containment and overflow.</desc>
