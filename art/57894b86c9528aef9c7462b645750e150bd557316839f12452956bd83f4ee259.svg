<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Absence and Assurance</title>
  <desc id="desc">This composition captures the emotional tone of 'longing' juxtaposed with 'resolve'. The palette of pink, red, gray, and dark maroon embodies warmth mixed with depth, suggesting an inner struggle. The outer border in dark maroon signifies a strong resolve, while the inner frame, filled with lighter pinks and grays, evokes a sense of longing. The overlap creates a central contrast, where passion meets tranquility, encapsulating the collision between desire and security. The use of broken pixels introduces intentional disruptions, enhancing the sense of incomplete connection and whispering distances, adhering to the seed's abstract nature.</desc>
