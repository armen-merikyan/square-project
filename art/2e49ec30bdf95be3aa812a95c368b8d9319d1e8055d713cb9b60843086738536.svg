<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Release</title>
  <desc id="desc">The emotional tone combines the tension of pressure with the serenity of quiet. The palette features soft off-white and faint peach against the starkness of dark navy and compressed red, creating a visual tension that mirrors the calm and chaos of the seed's themes. The dark colors cluster at the edge, feeling weighted and dense, while lighter tones are positioned toward the center, suggesting release and expansion. This arrangement represents the collision of quiet against pressure, illustrating an open gate letting calm flow into a realm of tension.</desc>
