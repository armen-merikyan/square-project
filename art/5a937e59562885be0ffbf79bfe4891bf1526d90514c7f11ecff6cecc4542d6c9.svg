<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Silence</title>
  <desc id="desc">The emotional tone contrasts the weight of pressure with the stillness of quiet. The palette uses off-white and faint peach to embody softness and calm, while compressed red and dark navy introduce intensity and depth. The main collision occurs down the center where diagonal stripes of pressure clash against soft dot patterns of quiet, creating tension and visual interest. Utilizing the keyhole seed metaphorically inspired the jagged edges and affected arrangement, embodying both the potential for clarity and chaos.</desc>
