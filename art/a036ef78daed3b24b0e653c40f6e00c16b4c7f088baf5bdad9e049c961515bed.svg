<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Softness and Severity</title>
  <desc id="desc">The emotional tone reflects the struggle between soft, warm colors and stark, dark contrasts, representing softness vs severity. The chosen palette of soft pinks, warm whites, stark blacks, and cool grays underscores the collision of feelings: the warmth seeks to contain but is interrupted by the severity of dark edges. The layout depicts a cross-current, with soft ladder patterns being interrupted by sharper, veiled boundaries. Broken pixels are scattered throughout to symbolize scars and imperfections in this emotional narrative.</desc>
