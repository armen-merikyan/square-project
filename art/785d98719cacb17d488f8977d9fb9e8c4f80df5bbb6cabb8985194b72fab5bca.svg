<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Dichotomy</title>
  <desc id="desc">This piece explores the emotional tension between love and betrayal. The palette of warm pink and red juxtaposed with gray and dark maroon signifies love's warmth battling against the cold reality of betrayal. The layout guides the viewer's eye upward, suggesting hope amidst anguish, while the soft edges create a sense of vulnerability. The radial and striped patterns clash, mirroring the conflict of emotions, with interruptions symbolizing the cracks found in love. The piece is intentionally left with negative space to amplify feelings of isolation and the weight of unspoken emotions, while broken pixels disrupt the order, representing betrayal's impact.</desc>
