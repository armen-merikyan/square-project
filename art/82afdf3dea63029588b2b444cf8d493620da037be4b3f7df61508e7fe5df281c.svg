<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Caged Curiosity</title>
  <desc id="desc">This artwork captures the tension between certainty and curiosity through contrasting warm and cool colors. The palette consists of muted brown and gray tones representing certainty, while soft gold and deep wine introduce elements of curiosity and chaos. The composition flows from a dense center, where curiosity collides with certainty, towards lighter edges that symbolize release and exploration. Broken pixels interrupt the clean axis, echoing the push-and-pull dynamic suggested by the seed, creating an unresolved tension that invites the viewer in without offering clear resolution.</desc>
