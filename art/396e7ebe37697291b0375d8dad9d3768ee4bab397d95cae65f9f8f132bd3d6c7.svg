<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interwoven Struggles</title>
  <desc id="desc">This piece embodies the tension between defiance and submission. The dark colors represent defiance, asserting a strong presence in the center, while the muted tones reflect submission, flowing gently outward. The main contrast occurs where the saturated reds meet the softer creams and grays, creating visual sparks akin to collisions. This choreography emphasizes the emotional struggle, with sharp edges and soft folds expressing the complex relationship of resistance and acquiescence, as echoed in the seed words.</desc>
