<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This composition captures the tumultuous dynamics between love and betrayal through contrasting colors and patterns. The left half embodies love with warm pinks and reds scattered in a dot pattern, symbolizing warmth and connection. Conversely, the right half represents betrayal with tenebrous grays and dark maroon, using stripes to convey tension and division. The collision between the two halves is stark, mirroring the emotional conflict suggested in the seed. The imperfect spacing and occasional broken pixels evoke a sense of fragility, akin to a heart fractured yet attempting to heal.</desc>
