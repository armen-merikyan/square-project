<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension at the Threshold</title>
  <desc id="desc">This piece embodies the struggle between defiance and submission, presenting a layered tension where angular resistance collides with a soft, closed-off space. The cool palette of rain blue and lavender gray contrasts with bursts of soft cyan, depicting the interplay of order and chaos. The central pattern represents a keyhole, symbolizing a threshold, as bright colors pulse outward against muted fields, creating a rhythm that feels both chaotic and serene. The intentional placement of broken pixels adds a sense of imperfection, enhancing the emotional depth without representing literal meanings.</desc>
