<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This piece captures the emotional tension between joy and grief through contrasting warm and cool tones. The palette of yellows and oranges represents joy, while deep blues and muted purples signify grief. The layout establishes a dichotomy with joy depicted in the top half and grief in the bottom, employing hard edges to reflect emotional conflict. The upward spark-like patterns collide with heavier downward flows, suggesting a dynamic interplay of uplifting and suppressive feelings. The arrangement reflects the struggle between these emotions, emphasizing a sense of elevation against heaviness.</desc>
