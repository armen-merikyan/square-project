<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Reflection</title>
  <desc id="desc">The emotional tone oscillates between longing and resolve. The palette of pinks and reds juxtaposes soft warmth against the cooler grays and deep maroons, creating tension. The crosshatch pattern represents longing with its repetitive, incomplete lines, while the braided pattern signifies the resolve with strong interwoven colors. The main collision occurs centrally where the patterns intersect, reflecting the struggle between conflicted emotions. Broken pixels introduce imperfections, emphasizing vulnerability and the recent damage, mirroring the concept of a broken mirror.</desc>
