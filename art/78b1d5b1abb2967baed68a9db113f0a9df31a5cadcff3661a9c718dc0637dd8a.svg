<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Borders</title>
  <desc id="desc">This artwork captures the emotional tension between defiance and submission. The contrast between the sharp, rigid edges of dark colors against softer, muted hues suggests a battle between resistance and yielding. The palette of cosmic indigo and void black symbolizes depth and intensity, while the cold gold and deep teal provide a hint of warmth and emotional layering. The center is formed with darker shades, representing a firm and unmoved core, surrounded by lighter tones that evoke submission's fragility. The broken edges introduce an element of imperfection, creating voids that leak emotion, illustrating a constant struggle between the two states. The arrangement supports a spiral inward, evoking a sense of motion towards a singularity of feeling, representing conflict and convergence.</desc>
