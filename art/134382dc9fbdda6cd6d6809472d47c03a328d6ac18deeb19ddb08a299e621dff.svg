<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance in Dissonance</title>
  <desc id="desc">This piece explores the emotional conflict between joy and grief, using a palette of warm yellows and oranges against deep blues and muted purples, illustrating the contrast of joy's openness and grief's heaviness. The grid pattern represents the structure of joy, while the checker pattern for grief creates visual tension, with broken pixels introducing a sense of imperfection. The central theme is the struggle between symmetrical control and chaos, manifesting as a visually uneven balance that resonates with the seed's narrative.</desc>
