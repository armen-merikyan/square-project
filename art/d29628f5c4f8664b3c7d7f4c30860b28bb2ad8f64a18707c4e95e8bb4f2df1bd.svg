<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Uncertainty</title>
  <desc id="desc">This piece explores the emotional tension between trust and suspicion through contrasting colors and patterns. The palette incorporates soft mint and sky tones to evoke trust, while storm gray and near black introduce a level of suspicion. The arrangement features a circular motif in the center, surrounded by jagged forms representing pressure and noise, embodying feelings of duality. The broken pixels disrupt the harmony, reinforcing the concept of unresolved conflict and fragility. The main collision occurs in the center, where the warmth and softness clash with darker, harsher edges, symbolizing the struggle between security and doubt.</desc>
