<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Stillness and Eruption</title>
  <desc id="desc">This composition embodies the emotional conflict of rage versus calm through a diagonal arrangement. The palette employs deep reds and stark blacks representing rage, contrasted against soft pale blues and whites symbolizing calmness. The sharp, irregular 'pulse_marks' pattern of red disrupts the calm horizontal fields of blue, capturing the tension of an overwhelming emotion invading tranquility. Broken pixels add a sense of imperfection, suggesting that both emotions are in constant conflict yet entwined, finding resolution not in harmony but in dynamic disarray.</desc>
