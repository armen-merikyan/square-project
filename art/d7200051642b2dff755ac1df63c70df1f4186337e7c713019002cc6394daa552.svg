<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow Against Containment</title>
  <desc id="desc">This composition embodies the conflict between rage and calm through a juxtaposition of vibrant reds and tranquil pale blues. The emotional tone reflects inner turmoil, contrasting sharp, chaotic noise patterns against the more structured, calm 'teeth' pattern. The collision is primarily concentrated in the center where red disrupts the more orderly blue and white surroundings, signifying an eruption in an otherwise tranquil space. The chosen palette enhances this tearing of calm by allowing the vibrant red to spill into serene areas, creating an overwhelming sense of tension throughout the grid while adhering to the layout of 'mostly empty space with one meaningful object off-center.' The broken pixels inject an element of imperfection, resembling scars left from a tempestuous emotional clash, thereby adding depth to the abstract narrative.</desc>
