<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Broken Reflections</title>
  <desc id="desc">This artwork embodies the emotional struggle between love and betrayal through a carefully balanced composition of warm and cool colors. The palette of pink, red, gray, and dark maroon creates tension, with warm tones representing love and cooler tones representing the treachery of betrayal. The diagonal rise in the arrangement suggests a conflict, while broken pixels introduce a sense of imperfection. The main contrast occurs where the warm tones clash against the cooler ones, symbolizing fragmented emotions, and the layout reflects a nearly mirrored symmetry, disrupted subtly to convey a sense of imbalance inherent in relationships. Each pixel draws the viewer into the emotional current of the piece, capturing the essence of connection and disconnection.</desc>
