<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipsed Echoes</title>
  <desc id="desc">This piece explores the emotional tension between connection and loneliness. The palette, featuring muted sepia, tan, and dust gray, evokes a sense of faded memory and introspection. The top-heavy flow creates a sense of weight above, symbolizing the burden of isolation, while the off-center diamond shape emphasizes the struggle between hidden emotions and exposed vulnerabilities. The stark contrast of brighter pixels amidst the muted surroundings acts as bursts of connection trying to break through the loneliness, encapsulating the essence of the seed's themes.</desc>
