<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Echo</title>
  <desc id="desc">The emotional tone explores the tension between clarity and chaos, emphasized by dark tones symbolizing noise that collide with bright accents representing the signal. The palette of navy, black, dim cyan, and white highlights the struggle between interference and a readable rhythm, while the eroded symmetry suggests a breach at the edges, allowing noise to seep through. The checkered signal pattern is interrupted by broken frames which signify memories that disrupt the flow, creating a sense of collision in the center. Negative spaces contribute to the feeling of isolation among clusters of color, echoing the tension in the seed.</desc>
