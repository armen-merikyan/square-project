<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects the tension between vulnerability and strength, articulated through soft, muted colors against a rich, deep green foreground. The palette combines 'ripe green' and 'acid green' to represent growth and tension, while the 'cream' introduces a quiet softness amidst stronger hues, embodying safety within exposure. The main collision occurs in the center, where pulse marks of vulnerability clash with thick channels of strength, laid out with receding edges to suggest a flow of safety receding from impending threats. The absence of structure in the outer rows allows the central 3x3 area to resonate as the focal point against a backdrop of negative space.</desc>
