<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Resilience and Fragility</title>
  <desc id="desc">This piece embodies the emotional tension between 'spark' and 'ash'. The top half, representing 'spark', uses soft gold and pale green to evoke vitality and a hint of warmth, arranged in delicate, overlapping veils suggestive of a gentle ignition. The bottom half, signifying 'ash', employs dark violet and black, arranged in stark barcode patterns to symbolize settled dust and restraint. The collision occurs at the center, where these distinct patterns meet and disrupt each other. This juxtaposition asks the viewer to consider resilience in the face of fragility, highlighted by the jagged edges that reinforce the theme of disruption and recovery.</desc>
