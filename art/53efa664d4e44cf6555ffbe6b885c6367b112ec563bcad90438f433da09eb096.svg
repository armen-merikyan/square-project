<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmony in Collision</title>
  <desc id="desc">This artwork embodies the emotional tension between restlessness and peace through contrasting colors and patterns. The palette features greens and browns to evoke a sense of safety and grounding while punctuating chaos with stark blues and whites that interrupt the calm. The arrangement follows a flow from top to bottom, with the top half representing peace through organic, circular patterns of green, while the lower half fractures into chaotic cracks of blue and white, symbolizing restlessness. The central collision between these two emotional states creates a dynamic tension, inviting viewers to reflect on the delicate balance between stability and disruption.</desc>
