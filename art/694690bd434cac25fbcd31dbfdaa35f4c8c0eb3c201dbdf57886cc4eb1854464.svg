<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality in Motion</title>
  <desc id="desc">This abstract composition explores the emotional tension between nostalgia and progress. The palette combines dark hues symbolizing weight and calmness with soft, glowing accents representing hope and vitality. The contrast primarily happens between the bottom-heavy dark tones that suggest the pull of nostalgia, and the lighter, dynamic colors that spark ideas of rising progress. A split layout reflects the emotional divide, while the dripping and dotted patterns evoke a sense of tension and flow, mirroring the push and pull between these emotions. Overall, the piece captures the complexity of growth amidst the weight of memory.</desc>
