<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Tensions</title>
  <desc id="desc">The emotional tone contrasts the aggression of rage with the tranquil essence of calm. The palette of reds against cool pale blues and blacks accentuates this duality; bold reds seep and spill into structured calmness. The top four rows, representing rage, feature jagged, flame-like patterns giving a sense of compression and intensity, while the bottom rows embody calm, illustrated through soft, stair-step gradients, juxtaposing soft edges with hard interruptions of the upper sections. The central collision occurs at the boundary between layers, evoking a sense of turmoil within a structured environment, echoing 'contained vs overflowing'.</desc>
