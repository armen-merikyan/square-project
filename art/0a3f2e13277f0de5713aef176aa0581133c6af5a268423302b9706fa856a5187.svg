<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissonance and Harmony</title>
  <desc id="desc">This artwork explores the tension between restlessness and peace, embodying the emotional dichotomy through contrasting colors and patterns. The upper half, characterized by darker hues like #3C3C4D and #4F4F6F, denotes the chaotic nature of restlessness with jagged, cross-like disruptions. In contrast, the softer colors in the lower rows, such as #C6D4E5 and #F2F2F7, reflect a peaceful, candlelit ambiance, suggesting calmness and serenity. The central collision of the dark and light evokes a striking dance of memory versus motion, where the form of the fold subtly hints at the complexities of life, leading to an interplay of echo and presence. Throughout, broken pixels intersperse the grid, introducing imperfections that mirror the human experience: a reminder of fragility within the order.</desc>
