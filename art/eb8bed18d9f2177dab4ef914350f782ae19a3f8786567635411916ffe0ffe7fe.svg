<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition explores the emotional tension between softness and severity through a palette of light and dark shades. The colors shift from powder pink, representing softness, to carbon black, embodying severity. The center features a pale, exposed area that contrasts with the darker edges, suggesting vulnerability within a protective boundary. The diagonal layout invites unintended collisions between the soft, broken frame pattern and the rigid grid structure, visualizing the themes of guilt and forgiveness with a push-and-pull dynamic. The broken pixels introduce intentional imperfections that represent the unpredictable nature of emotions, enhancing the abstract narrative.</desc>
