<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This composition depicts the tension between softness and severity through contrasting colors. The warm whites and powder pinks offer a gentle embrace, while the carbon black and sharp crimson spikes introduce sharpness and weight. The crosshatch pattern dances over crack-like interruptions, evoking a spiral inward that flows amidst perceived chaos. The collision is intentionally placed at the center, where the warm tones fray against the aching boundaries of black, symbolizing emotional push and pull. The negative space surrounds the vibrant core, allowing the viewer a moment of contemplation amidst intensity.</desc>
