<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Order and Chaos</title>
  <desc id="desc">The emotional tone is derived from the struggle between 'panic' and 'control', illustrated through a palette that oscillates between deep navy and dim cyan to evoke feelings of isolation and depth, counterbalanced by stark, sterile whites that signify order. The layout follows a corner invasion, reinforcing the chaos spreading from the corner against a structured framework, creating a defined contrast. The pattern reflects controlled flames at one edge mixed with chaotic dots at the opposing side, showcasing the emotional collision. Broken pixels add imperfections to the otherwise structured grid, symbolizing the unpredictability of panic amidst the order.</desc>
