<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">The emotional tone encapsulates the tension between control and surrender through a palette evoking both weight (storm_gray, near_black) and lightness (pale_mint, soft_sky). The collision occurs centrally with faded_gold as an accent, which spills into surrounding muted colors. This represents the overflow versus containment, creating a visual echo of struggle and gentle descent, contrasting hard edges with soft gradients to illustrate the impact of control against an unlocked boundary.</desc>
