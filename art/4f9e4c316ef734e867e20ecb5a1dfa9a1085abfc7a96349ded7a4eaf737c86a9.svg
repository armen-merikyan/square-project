<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Contrast</title>
  <desc id="desc">This artwork explores the conflict between softness and severity by using a palette that harmonizes powder pink and warmer whites against the starkness of carbon black and steel gray. The center is densely packed with sharp crimson marks reminiscent of pulse points, creating a vivid collision that draws the eye inward, while the surrounding colors gradually shift towards a quieter, more muted gray. Broken pixels are intentionally utilized to create disruption, echoing the theme of guilt and forgiveness, while the spiral flow suggests a constant tension, dynamically pushing colors against one another. The overfilled center visually stands in contrast with the softer edges, embodying the emotional play of light versus dark in a structured but frenetic composition.</desc>
