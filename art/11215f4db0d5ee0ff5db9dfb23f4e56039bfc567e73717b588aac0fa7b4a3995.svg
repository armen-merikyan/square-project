<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Memory</title>
  <desc id="desc">This composition embodies the tension between relief and dread. The selected palette of sepia, tan, dust gray, and faded blue evokes nostalgia, hinting at memories that can be comforting yet haunting. The bright colors suggest moments of relief while the darker tones create a sense of heaviness. The arrangement features a central saturation point that is contrasted by muted backgrounds, portraying a struggle: light battling dark. The flame pattern lends chaotic energy, symbolizing dread, while cracks in the layout signify a presence of relief amidst disruption. The broken pixels introduce imperfection, enhancing the overall emotional narrative of fragmented memories, echoing the theme of the seed.</desc>
