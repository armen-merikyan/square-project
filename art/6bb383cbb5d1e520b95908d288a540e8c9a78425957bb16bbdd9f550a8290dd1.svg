<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embrace of Tension</title>
  <desc id="desc">The emotional tone reflects a battle between defiance and submission, embodied in the contrasting presence of dark and light shades. The palette combines deep reds with muted grays and creams, suggesting a struggle for dominance and the presence of quiet fields disrupted by accent colors. The main collision occurs in the corner, where dense colors form a powerful focal point, representing resistance, while the lighter tones spirale inward, indicating the pull of submission. This arrangement evokes a visual narrative of pressure at the edge, where the vibrant sparks of defiance resist the calming force of submission, creating a dynamic rhythm throughout the piece.</desc>
