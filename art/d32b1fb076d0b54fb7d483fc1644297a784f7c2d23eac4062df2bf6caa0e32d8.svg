<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissonant Echo</title>
  <desc id="desc">This artwork captures emotional tension between envy (represented by deep, muted colors) and gratitude (expressed with lighter, reflective tones). The edges feature dense black and navy shades that symbolize the weight of envy, creating a heavy border, while the inner core in dim cyan and white symbolizes gratitude, introducing a sense of hope. The contrast is most felt where the dark shades intrude upon the lighter inner colors, echoing the chaos and noise within a profoundly quiet room. The asymmetry created by the broken pixels infuses a sense of imperfection, further emphasizing the emotional struggle between rising hope and falling fear.</desc>
