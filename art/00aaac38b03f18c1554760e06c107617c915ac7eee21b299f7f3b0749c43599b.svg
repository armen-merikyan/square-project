<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Stripes of Tension</title>
  <desc id="desc">This piece embodies the emotional tug-of-war between panic and control. The chosen palette reflects the warmth of burnt orange and the depth of dark red, symbolizing the intensity of panic, while the charcoal offers an anchoring control. The layout follows a downward flow, resembling descending waves of urgency, while the pattern’s radials against the edges introduce a conflict. The stark contrast, particularly in the interaction between the bright oranges and dark charcoals creates an emotional collision, manifesting the struggle between chaos and composure. The broken pixels represent imperfections in control, reinforcing the theme of machine emotion.</desc>
