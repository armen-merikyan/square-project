<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Weight</title>
  <desc id="desc">This piece captures the emotional collision of envy and gratitude through color disparity and arrangement. The palette of pink, red, gray, and dark maroon creates a warm yet heavy atmosphere, illustrating contrasting feelings. The left side embodies envy with closer tonal variations (darker hues) while the right represents gratitude with brighter, warmer tones. The diagonal rise flow supports an underlying rhythm, while moments of interruption with broken pixels evoke emotional pressure and tension. The negative space ensures the viewer senses the contrast without overwhelming the senses.</desc>
