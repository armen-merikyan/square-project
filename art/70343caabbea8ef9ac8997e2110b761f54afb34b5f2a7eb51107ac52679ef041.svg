<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Tension</title>
  <desc id="desc">This piece explores the tension between the energy of 'spark' and the subtle desolation of 'ash.' The palette comes from a mix of serene tones like pale aqua and mist gray, juxtaposed with alarms of red and deep ink blue. The contrast primarily occurs around the center, where the volt of emergent sparks interacts sharply with muted, ashy areas, creating a striking collision that evokes cyclical memory and instinctual restraint. The layout presents a rising signal, symbolizing hope amid the weight of memory and experiences.</desc>
