<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">The Balance of Depth</title>
  <desc id="desc">This artwork embodies the emotional interplay between vulnerability and strength. The color palette juxtaposes deep blacks and the soft tranquility of pale blue, representing the tension between hard edges and the calming effect of shelter. The squares are arranged to create a crowded pressure in the top corner, symbolizing the overwhelming nature of exposure. As you move down the rows, the colors evenly transition to softer tones, echoing the transition from chaos to calm. The use of broken pixels at intermittent spots introduces a disruption, representing experiences that scar but ultimately shape us. The persistent black fields maintain a grounding presence, encapsulating the idea of stability amidst turmoil.</desc>
