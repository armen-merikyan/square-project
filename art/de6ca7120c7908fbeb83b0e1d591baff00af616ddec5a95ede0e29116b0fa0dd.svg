<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Resolutions</title>
  <desc id="desc">This piece explores the emotional tension between longing and resolve through the interplay of muted and vibrant colors. The palette, inspired by the 'hunger_restraint' theme, channels a sense of depth and weight via dark shades like blackened plum and iron gray, contrasted by small orange highlights to signify moments of urgency. The main collision of textures occurs in the bottom left corner, where densely packed colors suggest pressure and overflow, while the right side fades into quieter spaces, echoing the contrasting feelings. The broken pixels serve as intentional imperfections that reflect the theme of repair against damage, embodying the essence of a shattered but enduring mirror, symbolizing inner struggles and resolutions.</desc>
