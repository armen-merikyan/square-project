<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interwoven Hearts</title>
  <desc id="desc">This piece explores the emotional dichotomy of love and betrayal through contrasting colors and patterns. The palette incorporates shades of pink and dark maroon to evoke warmth and intensity, while gray suggests neutrality and complexity. There’s a strong tension created by the left half using a crosshatch pattern representing love, in contrast with the right, using a crack pattern to embody betrayal. The vertical split design reflects symmetry versus break, evoking a sense of conflict. The edges are sharp, suggesting a delicate balance disrupted by emotional collision, while broken pixels subtly introduce imperfection, mirroring real-world relationships.</desc>
