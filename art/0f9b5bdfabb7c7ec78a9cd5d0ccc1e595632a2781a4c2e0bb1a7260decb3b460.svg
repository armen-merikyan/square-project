<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Held Back</title>
  <desc id="desc">The emotional tone balances between the vivid warmth of desire and the cool, restrained edges of restraint. The palette draws from saturated hues of coral and orange evoking desire, contrasted with muted charcoal and blue representing restraint. The central collision occurs where vibrant colors meet the darker, sealed edges, creating tension. This reflects the struggle encapsulated in the seed concept. The use of broken pixels introduces intentional imperfection, symbolizing unresolved emotions and the push-pull nature of desire versus restraint.</desc>
