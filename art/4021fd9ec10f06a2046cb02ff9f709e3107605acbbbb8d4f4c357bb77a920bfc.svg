<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Motion</title>
  <desc id="desc">The emotional tone blends restlessness and peace, creating a dialectic of tension. The palette features dark colors (dead_black, static_gray) representing peace interspersed with vibrant colors (signal_green, electric_blue, hot_magenta) illustrating restlessness. This collision occurs primarily from the center diagonally outward, where glitch patterns clash with constellation patterns, symbolizing movement and static memory. The use of broken pixels adds intentional disruption, reflecting the unease against a backdrop of quiet. The flow and layout emphasize an opening which lets energy in, creating a dynamic yet balanced composition.</desc>
