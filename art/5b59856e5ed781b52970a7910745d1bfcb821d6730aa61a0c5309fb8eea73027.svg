<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This composition captures the emotional tension between joy and grief by employing a palette that emphasizes contrast: warm yellows and oranges represent joy, while deep blue and muted purple signify grief. The left side is structured with a grid pattern, evoking the weight of grief, while the right side introduces stair-like patterns that suggest joy's expansion. Broken pixels add imperfection, illustrating disruption in the symmetry. The lively yellow and deep blue clash at the center, where the emotions collide, creating a dynamic visual pulse. This arrangement echoes the emotional complexities surrounding love and betrayal, represented through color and abstract forms.</desc>
