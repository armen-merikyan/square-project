<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure &amp; Release</title>
  <desc id="desc">This artwork embodies the tension between quiet and pressure through its color palette and spatial arrangement. The top half uses muted shades of 'off_white' and 'dust_gray' to create a calm yet subtle environment, suggesting clarity amidst confusion. The bottom half introduces deeper, more compressed colors like 'dark_navy' and 'compressed_red', creating a dense, oppressive feel. The main collision occurs at the edge of the transition, where soft edges meet sharp contrasts, symbolizing a struggle between these emotional states. The broken pixel elements provide intentional disruptions, further enhancing the theme of shattering quiet against a tide of pressure.</desc>
