<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Healing</title>
  <desc id="desc">This artwork conveys the emotional turmoil of relief versus dread, using deep hues to represent the weight of dread and lighter accents for moments of relief. The palette of faded gold, pale mint, and soft sky serves to juxtapose the heaviness of near black and storm gray. The main contrast is found centrally, where brighter patches interrupt the dense grid of dark pixels, embodying the struggle and evolution within chaos that seeks order. The seed influenced the overall layout, where broken marks hint at repair, and the patterning symbolizes an incomplete journey toward balance.</desc>
