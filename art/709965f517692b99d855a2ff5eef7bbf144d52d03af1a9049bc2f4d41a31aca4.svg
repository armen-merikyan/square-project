<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Unseen Forces</title>
  <desc id="desc">This artwork captures the emotional tension between defiance and submission through the contrasting color palette of deep navy and stark whites. The left side, dominated by dark colors, represents defiance—dense and weighted—while the right side contrasts this with lighter hues, suggesting submission and openness. The arrangement, from left to right, mimics a gradual descent, echoing the falling pixels motif. The broken pixels add imperfection, enhancing the overall sense of struggle and unresolved emotion, while the negative space invites introspection.</desc>
