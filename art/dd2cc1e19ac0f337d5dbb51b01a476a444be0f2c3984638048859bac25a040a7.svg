<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This composition embodies the emotional tug-of-war between panic and control, using a palette of dark reds and charcoal to evoke stress and chaos, interspersed with sparks of gold and burnt orange representing moments of clarity and warmth. The flow is zigzagging, mirroring how emotions oscillate between extremes. The central contrast lies in a dense dark mass on one side, disrupted by bright accents, symbolizing control fighting against overwhelming feelings. The placement of 'broken pixels' introduces an element of imperfection, further enhancing the narrative of struggle. Negative space is respected, allowing for moments of breathing room in an otherwise chaotic arrangement.</desc>
