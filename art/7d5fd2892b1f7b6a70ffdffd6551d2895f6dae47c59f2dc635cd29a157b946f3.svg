<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Pulses</title>
  <desc id="desc">The emotional tone reflects the struggle between tenderness and rage, echoing a journey from calmness to explosive turmoil. The palette of black, white, pale blue, and red captures that duality—red represents rage while pale blue symbolizes tenderness. The arrangement utilizes broken pixels to create an imperfect surface that speaks to the emotional scars of conflict, while the flow from top to bottom reflects the upward climb of tension. The main collision occurs in the central area where warm red clashes with the cool blue, creating a vivid sense of emotional interruption against a muted backdrop, encapsulating the essence of both feelings.</desc>
