<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork embodies the emotional tension between vulnerability and strength. The chosen palette of cosmic indigo, void black, star white, cold gold, and deep teal invokes awe and terror, representing the dualities expressed in the seed. The pattern features strong, clear blocks at the center symbolizing strength, surrounded by fragile stripes expressing vulnerability. The central strip of void black creates a channel of negative space, contrasting with the dense texture of cosmos colors. The arrangement disrupts symmetry to emphasize imbalance, inviting viewers to explore the collision of these emotions.</desc>
