<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This artwork captures the duality of longing and resolve through a stark contrast in colors and patterns. The chosen palette of 'signal noise' colors—signal green, electric blue, dead black, static gray, and hot magenta—reflects the tension between chaos and order. The central collision occurs between the deep, longing blues and the electrifying greens, illustrating the emotional struggle between desire and determination. The flood pattern on one side symbolizes yearning, while the constellation pattern represents stability and resolution. Broken pixels are intentionally scattered, echoing the imperfections of human emotion, while the calm gray fields suggest moments of quiet reflection against the busy activity of desire and resolve.</desc>
