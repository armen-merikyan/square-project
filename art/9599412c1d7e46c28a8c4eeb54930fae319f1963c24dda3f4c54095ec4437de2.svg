<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Tension</title>
  <desc id="desc">The composition explores the emotional dichotomy of control and surrender. The palette features warm browns and greens juxtaposed with cool whites and blues to symbolize the containment versus overflow. The structured braid pattern represents control, while the checker pattern embodies surrender, creating dynamic contrast at the grid's center. Broken pixels interrupt the consistency, echoing moments of tension and release, as though the piece embodies both orderly and chaotic sensations.</desc>
