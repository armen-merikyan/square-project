<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Against Restraint</title>
  <desc id="desc">This piece embodies the emotional tug-of-war between desire and emptiness. The palette features warm, saturated hues like hot coral and blood orange that symbolize desire, set against cooler, muted tones such as charcoal and hollow blue reflecting emptiness. The central collision occurs at the grid's core where 'desire' patterns disrupt 'emptiness' threads, creating tension and resonance through the dynamic placement of colors, with broken pixels adding intentional imperfections. The negative space cuts a quiet channel, evoking a sense of longing restricted by boundaries.</desc>
