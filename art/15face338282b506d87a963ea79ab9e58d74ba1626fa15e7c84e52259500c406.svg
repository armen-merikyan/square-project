<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contested Boundaries</title>
  <desc id="desc">The artwork captures the emotional tension between desire and restraint. The palette consists of vibrant and muted tones, creating a contrast where warmer colors (hot coral and blood orange) embody desire, while cooler tones (charcoal and hollow blue) reflect restraint. The left side features a chaotic patchwork of desire, filled with energy, while the right exhibits a maze-like structure of restraint, presenting an organized yet constrained feeling. The collision, primarily concentrated in the center, encapsulates the struggle of these emotions visually, while broken pixels add a layer of imperfection, symbolizing the unpredictability of these feelings. The overall layout emphasizes the vertical split, representing the dichotomy of the emotional experience.</desc>
