<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Stillness</title>
  <desc id="desc">This piece captures the emotional struggle between quietude and pressure. The selected palette of off-white, dust gray, compressed red, dark navy, and faint peach allows for a soft yet weighted atmosphere. The dominant use of dark navy represents the pressure gathering at the edges, while faint peach offers a tranquil counterpoint at the center. The contrast highlights an area of collision in the center where the colors interweave—symbolizing a breaking point of clarity amidst the overwhelming pressure. The echo and hinge patterns create a dynamic flow, where dense groupings interrupt the stillness, reflecting the complex emotions encapsulated in the seed.</desc>
