<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This artwork embodies the emotional tension between envy (depth and darkness) and gratitude (light and warmth). The palette combines muted purples with bright yellows and oranges, representing gratitude's warmth contrasting against the heavy, deep blues that symbolize envy. The layout follows a corner invasion, suggesting how envy can creep in from the edges, while gratitude attempts to center the piece. The broken pixels create an imperfect surface, echoing the raw emotions of the theme. The contrast lies between the solid, structured corners filled with darker tones, while the center remains lighter, symbolizing hope amid turmoil.</desc>
