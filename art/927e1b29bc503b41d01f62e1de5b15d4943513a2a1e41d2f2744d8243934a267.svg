<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Confusion</title>
  <desc id="desc">This artwork embodies the tension between clarity and confusion through a contrasting palette of deep navy and light dim cyan. The falling pixel layout evokes the sensation of both descent and interruption, with a burst of color that pulses against a backdrop of darker shades. The collision occurs where the very light (dim cyan) meets the nearly complete void (black), representing the emotional conflict. Broken pixels introduce imperfection, adding to the sense of unease without forming recognizable patterns, thereby creating a narrative that is felt rather than seen.</desc>
