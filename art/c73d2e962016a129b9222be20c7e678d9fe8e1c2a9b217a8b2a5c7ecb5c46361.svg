<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Harmony</title>
  <desc id="desc">This work evokes a tension between chaos (panic) and order (control) through a palette rooted in shades of pink, red, gray, and dark maroon. The left side houses chaotic patterns, depicted by dotted pixel placements, leading to a discordant feeling of pressure. In contrast, the right side displays a more structured approach, featuring cracks that symbolize controlled tension. The edge bias further emphasizes this dynamic, with a more fragmented feel at the bottom suggesting a breaking point. The overall composition plays with the idea of density around a central focal point, prompting reflections on balance amidst disruption.</desc>
