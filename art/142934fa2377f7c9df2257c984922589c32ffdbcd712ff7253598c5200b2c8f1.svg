<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Confronting Chaos</title>
  <desc id="desc">The emotional tone of 'panic vs control' manifests through a clash of colors that represent a struggle between chaos (reds and oranges) and serenity (deep blues and purples). The warm palette suggests urgency and energy, while the cool tones provide needed equilibrium. This conflict finds expression in the alternating patterns of stripes and radial blocks that draw attention inward, creating a compression in the center, echoing the central theme. The irregularities, represented by 'broken pixels', introduce an element of imperfection and disruption, encapsulating the sensation of panic invading control. The negative space allows the viewer's eye to rest amidst the vivid chaos, enhancing the contrasting styles—making one feel the pressure and release that characterizes panic and control.</desc>
