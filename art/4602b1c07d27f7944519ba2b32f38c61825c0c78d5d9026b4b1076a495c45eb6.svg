<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This composition embodies the tension between joy and grief, utilizing bright yellow and deep blue to create a stark emotional contrast. Joy, represented by dots of yellow and orange, clashes with grief through subdued blues and muted purples. The chosen palette reflects a spectrum of feelings—from warmth to depth—allowing the eye to move upward on one side and downward on the other, symbolizing the emotional conflict in the seed. The jagged edges reinforce the theme of interruption and struggle, highlighting the inherent instability within the balance of emotions.</desc>
