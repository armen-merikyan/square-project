<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Halo of Hunger</title>
  <desc id="desc">This composition embodies the tension between desire and emptiness, utilizing a palette that communicates warmth and coolness. The hot coral and blood orange evoke desire, while the charcoal and hollow blue symbolize emptiness. The contrast of the light central area against darker edges illustrates a 'halo void', where desire attempts to overflow from the center but is contained by a stark border. Broken pixels introduce timely disruption, echoing the emotional unease between longing and restraint, while maintaining a visually readable structure.</desc>
