  <title id="title">Broken Symmetry</title>
  <desc id="desc">This artwork embodies the emotional tension between love and betrayal, juxtaposing warm pinks and reds with stark grays and dark maroon. The palette reflects warmth and intimacy against the colder, more fragmented aspect of betrayal. The main contrast resides in the top diagonal versus bottom depth, resembling a rise interrupted by a sudden break. The broken pixels disrupt the symmetrical flow, while the diagonal layout enhances the emotional narrative of a chaotic intrusion into a once harmonious space.</desc>
