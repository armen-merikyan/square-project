<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Channel of Emotion</title>
  <desc id="desc">The emotional tone contrasts tenderness with rage, depicted through a palette of black (representing rage and darkness) and pale blue (representing tenderness and calm). The dominant use of black creates a heavy atmosphere, while the subtle inclusion of blue introduces gentle interaction. The collision occurs in the center of the square, where the patterns of rage (lattice) intersect with the softer, more fluid patterns of tenderness (pulse marks). The jagged edges enhance the overall tension, incorporating broken pixels that symbolize imperfection and turmoil, creating a narrative of emotional struggle. Negative space is intentionally preserved to allow reflection amidst the chaos, conveying a quiet channel of thought and intensity amidst emotional upheaval.</desc>
