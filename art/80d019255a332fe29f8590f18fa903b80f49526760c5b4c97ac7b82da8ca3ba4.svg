<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This artwork embodies the emotional struggle between love and betrayal through a juxtaposition of warm and cool colors. The palette of warm pinks and dark maroons conveys love's vibrancy, while grays introduce an element of betrayal and chaos. The layout begins in the top-left corner, spreading diagonally to evoke the idea of an invading force of chaos. The broken pixels scattered throughout represent the cracks in trust and emotion, creating a sense of interruption within the harmonious flow of warmth. The main contrast occurs where the warm shades clash with the cooler, muted hues, illustrating the tension between calm and conflict, love and betrayal.</desc>
