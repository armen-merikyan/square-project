<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Tension</title>
  <desc id="desc">The artwork explores the struggle between defiance and submission through a clash of colors and patterns. The vibrant 'hot coral' and 'blood orange' serve as defiant sparks, emanating warmth and energy, while the 'charcoal' and 'hollow blue' embody submission, portraying cool, subdued spaces. This interplay creates a central collision, accentuated by broken pixels to signify disruption. The layout directed by 'corner_invasion' emphasizes the aggressive approach of bright colors from one corner, flowing diagonally against the empty, muted edge—mirroring the narrative of encroachment and retreat. The abrupt pattern transitions reflect emotional complexity, with both density and quietness articulated through the varied pixel arrangements.</desc>
