<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Shelter and Exposure</title>
  <desc id="desc">This composition embodies the emotional tension between safety and exposure, where the left half is dominated by gentle, muted tones representing safety, while the right reflects vulnerability with bright, vivid colors. The palette oscillates between warm browns and a shelter green juxtaposed against a pale skin and open blue, visually narrating the story of pressure bordered by soft edges. The main collision occurs in the center, creating a rhythm that suggests a pulse—a shift from calm to pressure, echoing both themes with depth. Broken pixels introduce intentional disruptions reflective of vulnerability.</desc>
