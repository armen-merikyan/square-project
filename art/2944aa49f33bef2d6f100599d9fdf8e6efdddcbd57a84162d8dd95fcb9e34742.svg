<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">This piece explores the emotional contrasts between joy and grief through a dynamic arrangement of color and structure. The palette features bright yellows and oranges representing joy, juxtaposed against deep blues and muted purples that signify grief. The collision occurs primarily along the central axis, delineating a zigzag motion that creates tension. The edge style is softened to mimic the impression of lingering emotions, while the broken pixels add a layer of imperfection reflecting the tumultuous nature of human experience. This abstract representation captures the essence of order and chaos, with a visual rhythm resonating through a mirrored layout, but disrupted by intentional imperfections.</desc>
