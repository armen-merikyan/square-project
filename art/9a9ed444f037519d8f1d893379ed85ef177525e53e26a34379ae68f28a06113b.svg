  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone centers around the conflict between strength and vulnerability, depicted through a blend of stark contrasts. The palette uses deep maroons and grays to symbolize strength, while soft pinks introduce vulnerability, creating an echoing tension. The central collision occurs in the middle, where darker colors clash with lighter forms, encouraging a visual representation of protective boundaries mixed with exposed fields. The broken pixels appear as intentional disruptions throughout, adding layers of imperfection that reflect the complexities of emotional experiences.</desc>
