<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Threads</title>
  <desc id="desc">The emotional tone is formed from the interplay of longing and resolve, symbolizing the push and pull of desire for wholeness against the fractures of experience. The palette incorporates warm corals and oranges to embody desire, offset by deep charcoal, representing unresolved damage. The contrasting pressure between radial patterns representing longing and veils of resolve creates a rich emotional landscape. The main collision occurs centrally, creating a focal point of intensity surrounded by negative space, echoing feelings of distance.</desc>
