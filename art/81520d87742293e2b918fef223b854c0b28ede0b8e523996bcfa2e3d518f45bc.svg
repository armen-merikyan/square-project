<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Unbound</title>
  <desc id="desc">The emotional tone captures the struggle between control and panic, reflected through contrasting color densities—stable muted shades collide with vibrant accents. The chosen palette of sepia, tan, dust gray, and faded blue evokes a sense of nostalgia and fragility, mirroring the feelings of instability associated with panic and lost control. The composition is purposefully imbalanced with denser areas at the top, indicative of pressure giving way to a quieter bottom, reflecting the emotional flow of rising pressure giving way to release. The pattern reflects broken pixels, creating an echo of instability while leaving negative space that symbolizes calm amidst chaos.</desc>
