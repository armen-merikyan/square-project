<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tide of Resilience</title>
  <desc id="desc">This artwork captures the emotional juxtaposition of vulnerability and strength through an interplay of colors. The palette consists of soft cool tones like rain blue and moon white, symbolizing vulnerability and muted plum to represent strength. The center pulses with strength, surrounded by lighter, more exposed colors that reflect vulnerability. The main collision occurs at the corners, where the pressure band pattern presents tightly packed colors, disrupting the tide pattern across the softer center. This captures a moment of emotional tension where strength encroaches on vulnerability, yet both coexist within the piece, reflecting the overarching themes of the seed.</desc>
