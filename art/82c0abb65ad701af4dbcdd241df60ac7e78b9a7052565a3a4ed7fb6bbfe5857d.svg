<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tension</title>
  <desc id="desc">This artwork embodies the struggle between desire and emptiness through a rich interplay of warm and cool colors. The palette of pinks and dark maroons argues with gray tones, illustrating contrasting emotional states. The arrangement leverages thick, broken edges that create tension at the borders, symbolizing the collision of these feelings. The pattern embodies a frame encroaching upon the checker-like emptiness, divided diagonally, suggesting a left-to-right flow while evoking the pull of a rising signal amidst noise, encapsulating the push and pull of yearning and void.</desc>
