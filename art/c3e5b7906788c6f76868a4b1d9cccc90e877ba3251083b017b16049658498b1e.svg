<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between States</title>
  <desc id="desc">The emotional tone reflects the dynamic struggle between longing and resolve, where burnt orange and gold evoke warmth and desire, while dark red and charcoal represent heaviness and grounding. The left side embodies longing with stretched diagonals using lighter hues and frames, contrasted by the right side's stack-like resolve in denser, darker colors. A split vertical layout showcases the collision where these two emotions meet, signifying both disruption and harmony within the 8x8 grid. Each side contains varied density, with distinct broken pixels serving as intentional flaws that suggest the imperfections in emotional realities. The quiet space versus the dense areas enhances the narrative of conflict and coalescence in an abstract manner.</desc>
