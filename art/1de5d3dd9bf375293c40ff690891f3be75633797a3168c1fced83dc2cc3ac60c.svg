<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Great Divide</title>
  <desc id="desc">The artwork conveys the emotional tension between envy and gratitude through contrasting colors and patterns. The chosen palette of lime, black, electric blue, and magenta emphasizes the duality, with lime and electric blue representing uplifting gratitude, while black and magenta embody the weight of envy. The core of the piece exhibits a radial pattern for envy, surrounded by a grid reflecting gratitude, capturing the contrast of pressure vs. lightness. The zigzag arrangement creates a dynamic visual tension, suggesting a struggle between rising and falling emotions, exemplified by the center-heavy design that disrupts symmetry and punctuates the piece with bursts of color.</desc>
