<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Colliding Extremes</title>
  <desc id="desc">This composition embodies the emotional tension between softness and severity, using a palette that balances powder pink and warm white with sharper accents of carbon black and sharp crimson. The soft colors flood the center, while broken dots of severity disrupt the edges, representing a spiral motion that captures the pulse of shifting emotions. The main contrast between the soft and sharp colors occurs at the borders, creating an intense collision that speaks to the dissonance in the seed's tone. Broken pixels add layers of imperfection, enhancing the sense of a chaotic yet structured emotional landscape.</desc>
