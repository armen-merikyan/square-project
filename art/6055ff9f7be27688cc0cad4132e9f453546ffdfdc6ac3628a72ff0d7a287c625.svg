<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Calm and Fury</title>
  <desc id="desc">This composition explores the emotional spectrum between calmness and rage through a careful balance of color and pattern. The palette features stark contrasts with the intense reds symbolizing rage and the soothing pale blue representing calm. The colors are distributed in a way that the majority represent rage, busting through the calming confines, creating a sense of overflow. The main collision occurs towards the center, where the jagged edges of red interrupt the tranquil blue maze pattern, creating a visual tension that speaks to the complexities of emotion. An intentional use of 'broken pixels' enhances the sense of eroded symmetry throughout the grid, further emphasizing the theme of chaos versus composure.</desc>
