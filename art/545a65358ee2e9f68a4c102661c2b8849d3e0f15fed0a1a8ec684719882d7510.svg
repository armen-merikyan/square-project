<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">The emotional tone reflects a struggle between control and surrender, depicted through a contrasting palette. The use of muted storm gray and deep near black grounds the piece, while the pale mint and faded gold provide highlights representing the tension of stasis against movement. The center is densely filled with darker tones to symbolize control, while the softer colors indicate a yielding edge, creating a dynamic collision. The pattern of thick outlines and broken pixels articulates the imperfection inherent in the balance of these emotions.</desc>
