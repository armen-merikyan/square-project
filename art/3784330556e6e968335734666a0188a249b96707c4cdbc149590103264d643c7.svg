<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork embodies the emotional tension between rage and calm through a stark palette of deep reds contrasted with airy whites and pale blues. The outer edges, dominated by black and red, represent the explosive nature of rage, while the inner core, arranged in a shatter pattern, contrasts this with soothing blue and white. The clash occurs predominantly in the center, creating a captivating dynamic that interrupts the serene space with aggressive streaks, illustrating a battle between contained emotions and their overflowing counterparts. This interplay of density and quiet space reflects the chaotic yet structured nature of modern existence, where emotions collide and coexist.</desc>
