<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Amplitude Disturbance</title>
  <desc id="desc">The emotional tone conveys the struggle between clarity (signal) and confusion (noise). The palette of deep blacks (representing loss and static) and vibrant greens and electric blues (symbolizing clear channels of communication) reflect this contrast. The main collision occurs centrally, where the bright colors clash with dark fields, creating a visual pulse amid the disturbance. The structure reflects echoes of memory and the tension of exposure versus shelter, with broken pixels representing disruptions within the communication flow. The grid-like pattern of the signal disrupts the otherwise chaotic noise, symbolizing a transient moment of clarity amidst confusion.</desc>
