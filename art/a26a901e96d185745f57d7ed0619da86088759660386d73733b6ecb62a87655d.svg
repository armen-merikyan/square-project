<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This piece captures the emotional tension between warmth and coolness, represented by contrasting hues of red (spark) and gray (ash). The dense cluster of darker tones on the left symbolizes restraint and memory, while the lighter colors on the right evoke a sense of calm and release. The jagged edge pattern and weighted diagonal emphasize the collision of feelings, creating a dynamic flow across the canvas. The selection of colors promotes a visual dialogue between pressure and liberation, echoing the seed's themes of resilience against fragility.</desc>
