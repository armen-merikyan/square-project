  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece captures the emotional tension between defiance and submission, utilizing a palette that evokes guilt and forgiveness through stained brown and soft gold contrasts. The composition balances angular resistance with receding patterns, highlighted by a central glitch that interrupts an otherwise enclosed field. The uneven border adds to a sense of chaos, while maintaining patches of quiet space, creating a dynamic rhythm that mirrors the push-and-pull between opposing emotions.</desc>
