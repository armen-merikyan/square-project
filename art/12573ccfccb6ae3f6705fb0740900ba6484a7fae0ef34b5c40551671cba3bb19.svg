<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Unraveled</title>
  <desc id="desc">The emotional tone contrasts relief and dread, creating a visual narrative that reflects a struggle between lightness and heaviness. The palette combines soft and muted tones symbolizing calm (pale mint, soft sky) with deeper, darker hues (storm gray, near black) evoking a sense of dread. The central collision occurs in the middle where heavy colors cluster against lighter ones, embodying an interruption between chaos and order. The stepwell and stairs patterns collide to create dynamic tension, representing the push-pull of emotions as they overlap. This abstract pattern aligns with the seed's themes of uncontrolled forces versus structured calm.</desc>
