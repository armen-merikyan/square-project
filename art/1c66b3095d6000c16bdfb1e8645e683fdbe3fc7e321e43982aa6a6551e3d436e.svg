<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">The emotional tone reflects the struggle between vitality (spark) and decay (ash). The chosen palette balances warm, soft tones of rose clay and lamp gold against cooler shades of distant lilac and cool blue, symbolizing the tension between warmth and coldness. The main collision occurs at the center, where the vibrant warm tones intersect with the muted shades, creating an echo of contrasts. The layout of scattered repair emphasizes interruptions and layering, allowing colors to blend while maintaining a sense of fragmentation and imperfection, akin to memories vs. their erasure.</desc>
