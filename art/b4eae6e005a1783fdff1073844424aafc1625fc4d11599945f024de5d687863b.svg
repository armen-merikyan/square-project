<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This abstract piece explores the tension between feelings of panic and control by contrasting warm and cool tones representing instability and stability. The palette of pink, red, gray, and dark maroon symbolizes the love-betrayal theme, where the brighter colors on top suggest hope but also instability, with darker hues indicating deeper, hidden turmoil. The arrangement includes broken pixels to convey imperfection and chaos. The flow moves from top to bottom, representing a descent from control to a chaotic potential at the edges, echoing the emotional journey implied by the seed text.</desc>
