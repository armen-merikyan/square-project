<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order in Chaos</title>
  <desc id="desc">The artwork embodies the tension between nostalgia and progress through a stark palette of red, black, pale blue, and white. The left side employs a ring pattern, symbolizing nostalgia—providing a comforting repetition—whereas the right destabilizes this with a flame pattern, representing chaotic progress. Broken pixels are strategically placed to introduce a sense of imperfection, contrasting the clean edges of the left side. The emotional tone captures the ambivalence of past comforts versus the pressing forward into the unknown, creating a dynamic interplay between calm and chaos.</desc>
