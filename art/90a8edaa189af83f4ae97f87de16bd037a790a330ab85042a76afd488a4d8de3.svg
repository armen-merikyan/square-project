<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork explores the tension between vulnerability and strength conveyed through the use of a stark color palette of burnt orange, dark red, charcoal, and gold. The grid-like strength is represented through the darker colors forming a barrier, while the lighter, more exposed colors represent vulnerability, particularly around the center. The negative space allows for echoes of emotion, emphasizing a fragility contrasted by a robust outer layer. The intentional broken pixels introduce irregularities, acting as disruptions in an otherwise structured environment, which alludes to the complexity of connection and alienation, as suggested by the seed.</desc>
