<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos: The Emotional Dance</title>
  <desc id="desc">This artwork captures the tension between softness and severity through a palette combining powdery and dark hues. The soft colors—powder pink and warm white—contrast sharply with the severity of carbon black and sharp crimson. The layout of broken frames creates tension with deliberate gaps, suggesting emotional leakage. The dominant soft colors occupy the upper left quadrant, while the darker shades cluster towards the bottom right, mimicking how emotional weight can settle. Broken pixels disrupt the flow, embodying the chaos amidst an underlying order, achieving a balance that reflects both guilt and forgiveness as dynamic forces.</desc>
