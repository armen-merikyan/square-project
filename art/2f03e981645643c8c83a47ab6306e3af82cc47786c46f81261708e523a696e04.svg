<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece embodies the emotional tension between desire and emptiness. The palette consists of saturated colors like hot coral and blood orange representing desire, contrasted by subdued tones like charcoal and hollow blue signifying emptiness. The strong contrast is led by a warm pull in the center (signifying desire) that is intercepted by cooler tones pushing against the frame. This creates an image of an emotional overflow clashing with containment, evoking a sense of longing that remains unfulfilled. The structure includes broken pixels to suggest intentional disruptions, embodying the struggle between yearning and restraint without representing any physical object.</desc>
