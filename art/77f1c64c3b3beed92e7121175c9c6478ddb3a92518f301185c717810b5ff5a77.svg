<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Walls</title>
  <desc id="desc">This artwork expresses the emotional duality of defiance and submission through the structured chaos of color. The palette, featuring deep black and contrasting soft gold, reflects the interplay of fear and hope. The primary contrast emerges from the dark hues at the edges, symbolizing submission, framed by warmer, lighter tones that echo defiance in the center, creating tension. As pixels fall from above, the layout signifies an emotional descent, with a weighty lower half suggesting the burden of hidden feelings. The broken pixel concept introduces imperfection, enhancing the emotional depth without literal representation.</desc>
