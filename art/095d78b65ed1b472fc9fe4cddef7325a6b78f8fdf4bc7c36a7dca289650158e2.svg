  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition embodies the emotional tension between rage and calm. The palette incorporates red for explosive energy and pale blue for tranquility, establishing a stark contrast. The dense center, represented by overlapping red crosshatch patterns, suggests noise and pressure, while the edges contain softer blue rings that signify calm. The broken pixels create intentional imperfections, adding to the chaotic feeling of the center and showing the struggle between containment and overflow. The collision primarily occurs in the center, emphasizing the erratic nature of rage while being framed by a calming yet imperfect boundary.</desc>
