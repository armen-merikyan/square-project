  <title id="title">Tension in Exposure</title>
  <desc id="desc">This composition explores the emotional tension between vulnerability and strength. The color palette features soft, warm tones representing vulnerability against cool, darker shades symbolizing strength. The main collision occurs at the corner which is densely packed while the rest of the grid spreads out, mirroring the idea of exposure fighting against shelter. The fractured 'shatter' pattern disrupts the dense areas, embodying a narrative of struggle amidst stability, highlighting both connection and alienation.</desc>
