<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Harmony</title>
  <desc id="desc">The emotional tone balances between the safety of warmth and the exposure of coolness. The palette incorporates 'shelter_green' and 'warm_brown' for safety, contrasting with 'cold_white' and 'open_blue' for exposure. The interaction of barcode and patchwork patterns creates a central collision between warm and cool colors, highlighting the tension between safety and exposure. The center is busy with warming earthy tones while the edges are softer and cooler, representing the pulse of emotional conflict and resolution at the boundaries.</desc>
