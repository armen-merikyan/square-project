<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Stillness and Motion</title>
  <desc id="desc">The emotional tone reflects a struggle between restlessness and peace, embodied by contrasting colors arranged in a rising signal layout. A palette of mourning black, deep blue, new leaf, pale yellow, and stone symbolizes the transition from darkness to light, with quiet fields clashing against vibrant accents. The central collision occurs at the diagonal, where darker colors penetrate lighter ones, invoking a sense of disruption yet yearning for balance. Broken pixels introduce imperfection, echoing the themes of memory and motion, while negative space emphasizes the internal conflict.</desc>
