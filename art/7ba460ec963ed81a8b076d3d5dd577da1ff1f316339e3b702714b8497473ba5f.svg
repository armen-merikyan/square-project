<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Tension</title>
  <desc id="desc">The emotional tone represents the delicate dance between vulnerability and strength. The color palette of ripe green, acid green, and honey gold evokes a blend of vitality and caution, suggesting a lively yet fragile atmosphere. The main contrast occurs in the center, where deeper olive shades collide with the more vibrant fields, embodying a central strength surrounded by the waves of vulnerability echoing outward. Patterns of crack and flame interweave, creating an image of soft breaks against strong pulses, reflecting the emotional complexity implied by the seed.</desc>
