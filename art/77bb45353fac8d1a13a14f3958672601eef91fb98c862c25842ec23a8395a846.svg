<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Contrasts</title>
  <desc id="desc">This piece embodies the emotional tension between clarity and confusion. The emotional palette combines lights and darks: electric blue and magenta represent the intensity of confusion, while the greens suggest a pulsing clarity. The left half plays with grid patterns to evoke clarity, while the right introduces chaos through broken pixel arrangements, creating visual friction. Key contrasts occur where the vibrant magenta clashes against muted blacks, echoing the push and pull of emotions, while areas of negative space enhance the feeling of imbalance and uncertainty.</desc>
