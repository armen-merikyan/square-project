<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Balance</title>
  <desc id="desc">This piece explores the emotional contrast between control and surrender, reflecting a struggle between rigidity and openness. The palette is rooted in mourning black and deep blue for depth and melancholy, accented with new leaf and pale yellow to symbolize renewal and hope. The arrangement centers around a dark core reminiscent of a crack, representing pressure, while lighter colors bleed outwards, symbolizing release and the relinquishing of control. The echo between the densely outlined central area and the softer, more fluid edges creates a dialogue of tension and resolution.</desc>
