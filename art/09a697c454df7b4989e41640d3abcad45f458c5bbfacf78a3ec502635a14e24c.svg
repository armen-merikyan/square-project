  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone juxtaposes the warmth of desire against the starkness of emptiness. The selected palette (hot coral and blood orange for desire, charcoal and hollow blue for emptiness) reflects this tension, with bold colors capturing the intensity of yearning. The central collision occurs at the axis of the grid, where vibrant color patterns clash with quieter spaces, symbolizing a struggle between aspiration and limitation. This dynamic informs the abstract arrangement, creating a sense of movement and disturbance, resonating with the theme of overflow contained.</desc>
