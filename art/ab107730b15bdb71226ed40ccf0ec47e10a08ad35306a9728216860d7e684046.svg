<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition embodies the emotional tension between desire and emptiness, where warm colors represent desire colliding against cool, restrained spaces that evoke void. The hot coral and blood orange serve as vibrant focal points against the deep charcoal and hollow blue, representing the clash of aspiration versus confinement. The broken pixels disrupt the flow to signify the imperfections in our desires and the struggle against boundaries. The tension peaks at the center, where desire's saturation fights for space, amidst a canvas of quiet emptiness that permeates the edges, illustrating a whisper of restraint.</desc>
