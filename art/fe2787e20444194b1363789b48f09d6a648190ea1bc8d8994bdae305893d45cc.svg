  <title id="title">Echoes of Shelter</title>
  <desc id="desc">This composition embodies the emotional tension between safety and exposure. The selected palette has earthy tones like 'shelter_green' and 'warm_brown' to evoke safety, contrasted with 'open_blue' and 'cold_white' that represent exposure. The main collision occurs vertically, with the cool colors emerging from the edges to create a sense of vulnerability against the grounding warm center. The pattern of fault lines in the exposure area interrupts the safety zone, suggesting an ongoing battle between protection and risk, mirrored in the divergence of flows.</desc>
