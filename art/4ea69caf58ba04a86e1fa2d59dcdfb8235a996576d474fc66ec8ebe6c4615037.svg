<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Waves of Emotion</title>
  <desc id="desc">This composition balances the dichotomy of joy and grief through contrasting palettes and patterns. The palette features bright yellows and oranges to evoke joy against muted blues and purples representing grief. The outer layers exhibit a crosshatch pattern symbolizing the weight of grief, while a softer circular ring of joyful colors forms the core, creating visual tension. The waves of color and the stark division across the center reflect the emotional pulls indicated by the seed, embodying both stability and break within its structure.</desc>
