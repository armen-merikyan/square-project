<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This composition explores the emotional tension between restlessness and peace. The palette, drawn from shades of black, dark violet, soft gold, and pale green, creates a visual representation of the duality. The left side, accented by dark tones, conveys restlessness with uneven frames that disrupt flow. In contrast, the right features soft gold and pale green stripes suggesting peace, creating a rhythmic pulse. The collision occurs centrally where the patterns intersect, depicting a struggle between calm and chaos. The edge-crawl style emphasizes the denial of resolution through jagged borders, while broken pixels introduce the element of imperfection, enhancing the overarching narrative of tension.</desc>
