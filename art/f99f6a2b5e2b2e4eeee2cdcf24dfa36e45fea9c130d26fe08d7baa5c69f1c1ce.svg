<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Ruin</title>
  <desc id="desc">The emotional tone of this artwork mirrors the contrast between love and betrayal, capturing the dynamic interplay of warmth and coldness. The palette combines soft pinks and reds representing love with dark maroon and gray signifying betrayal. The left half expresses warmth through a 'spark' pattern, while the right disintegrates into a more chaotic 'target' design, emphasizing the asymmetry between affection and heartbreak. The placement of darker, muted colors balances vivid hues, creating a collision that evokes deep emotional tension. Negative space is utilized to emphasize the unresolved feelings and fragments of love contrasted with betrayal's sharp edges.</desc>
