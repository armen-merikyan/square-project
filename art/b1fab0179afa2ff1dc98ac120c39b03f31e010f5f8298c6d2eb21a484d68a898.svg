<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Shelter</title>
  <desc id="desc">This piece communicates the emotional tension between safety and exposure through a deliberate division of warm and cool tones. The chosen palette reflects a balance of soft greens and browns evoking safety against cold whites and blues that suggest openness and vulnerability. The collision of the patterns occurs mainly in the center, where the pale skin and cold white intersect, representing a fragile balance. The layout of cascading colors splinters through the square, mimicking the push and pull of shelter enveloping the exposed center, delineating protection versus invasion.</desc>
