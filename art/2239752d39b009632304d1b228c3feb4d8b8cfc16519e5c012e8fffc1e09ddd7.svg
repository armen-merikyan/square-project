<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Trust</title>
  <desc id="desc">The artwork embodies the emotional duality between trust and suspicion through the use of contrasting colors and patterns. The color palette consists of muted tones like 'off_white' and 'dust_gray' to signify quietness and pressure, while 'compressed_red' provides an injection of urgency and accent. The diagonal flow from bottom to top mimics the struggle between hope and the weight of suspicion. The collision at the center creates a focal point that disrupts the calm, illustrating the internal conflict present in the seed. The broken pixels intentionally evoke imperfection and vulnerability inherent in relationships, reflecting the duality of resilience and fragility.</desc>
