<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotions</title>
  <desc id="desc">This piece reflects the tension between joy and grief through a carefully constructed palette of contrasting colors. The joyful hues of yellow and orange are juxtaposed with deeper blues and muted purples, symbolizing grief's weight. The top half is filled with bright, striped patterns representing the joyful and vibrant nature of life, while the lower half employs a 'noise' pattern in darker tones, echoing sorrow's complexity. The central zigzag of color creates a visual bridge between these two emotional states, embodying both disruption and connection.</desc>
