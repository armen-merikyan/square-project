<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Embrace</title>
  <desc id="desc">This composition embodies the emotional tension of love interspersed with betrayal. The palette features warm hues like rich pinks and deep reds juxtaposed against stark, muted grays, symbolizing warmth battling cold detachment. The outer border represents chaos and betrayal with a noisy pattern, while the central area, reflecting love, employs a split-screen technique, hinting at the fragility of relationships. The deliberate broken pixels in the borders suggest imperfections and cracks in trust, while leaving ample negative space evokes a sense of yearning and loss amid the emotional conflict.</desc>
