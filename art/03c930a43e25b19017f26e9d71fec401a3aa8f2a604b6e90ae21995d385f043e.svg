<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of fear and hope through a deliberate use of dark and light contrasts with a jagged pattern that evokes tension. The palette features deep blacks and dark violets that represent fear, anchoring the corners and edges of the composition, while soft golds and pale greens rise towards the center, signifying hope. The arrangement creates a wave-like flow that suggests movement and aspiration despite the surrounding darkness. The inclusion of broken pixels adds imperfection, representing the fragility of hope amidst fear. The interplay between sharp and soft colors further enhances this narrative of tension and resilience, capturing the ongoing struggle rather than depicting a literal representation.</desc>
