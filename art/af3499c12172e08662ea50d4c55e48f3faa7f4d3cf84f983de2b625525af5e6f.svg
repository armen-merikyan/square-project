<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetrical Disarray</title>
  <desc id="desc">This piece explores the tension between clarity and confusion through the use of a restricted color palette featuring deep blacks and dark violets against soft golds and pale greens. The conflict depicted here arises from the broken mirror layout, where the left and right halves share a common theme but introduce deliberate inconsistencies. The contrasting colors reflect emotional struggles: the darkness suggests confusion while soft hues represent moments of clarity. The arrangement flows outward from the center, creating a sensation of chaotic expansion, while jagged patterns punctuate the linear structure, evoking a sense of imperfection. This collection conveys the push and pull of clarity contrasted against chaos, fluidly resonating with the abstract seed.</desc>
