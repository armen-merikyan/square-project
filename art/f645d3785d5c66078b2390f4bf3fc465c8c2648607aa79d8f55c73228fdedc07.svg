<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs. Shelter</title>
  <desc id="desc">The emotional tone navigates the complexities of vulnerability and strength, using a palette of muted hues from 'melancholy_wonder' to evoke a sense of both security and openness. The dense outer maze pattern represents strength, with a clear boundary, while intermittent soft pulses in the center embody vulnerability. The main collision occurs in the center, where marks flow toward and interrupt each other, creating a dialogue of pressure and release, perfectly paralleling the seed's themes of exposure and emotional safety.</desc>
