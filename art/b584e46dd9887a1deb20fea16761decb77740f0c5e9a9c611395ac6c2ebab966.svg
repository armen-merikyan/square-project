<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry Disrupted</title>
  <desc id="desc">This artwork explores the emotional tension between confusion and clarity through a careful juxtaposition of dark and soft colors. The palette, derived from tones associated with fear and hope, emphasizes the struggle between dense clusters of confusion (represented by dark violet) and the softer hints of clarity (accentuated with pale green). The use of maze patterns throughout introduces overlapping paths that evoke feelings of uncertainty, while the lattice of crosshatching brings a fleeting sense of structure. The arrangement contains a sense of negative space to signify brokenness, embodying the continuous battle between coherence and disorder within human emotion.</desc>
