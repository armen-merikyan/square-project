<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">The piece embodies the dynamic tension between vitality (spark) and decay (ash). The chosen palette of black, dark violet, soft gold, and pale green facilitates a dialogue between dark, muted fields and bright accents, with the pale green representing hope amid the ash's fading presence. The collision occurs centrally, where the sparks of gold punctuate the softer, more persistent ash textures in dark violet. The pattern avoids symmetry, with broken pixels representing memory lost, creating an emotional disruption within the coherent structure.</desc>
