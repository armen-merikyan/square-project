<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Waves of Tension</title>
  <desc id="desc">The emotional tone here embodies the tension between longing and resolve, represented through a collision of warm and cool colors. A dominant cold slate represents longing, contrasting with warm coral, which embodies resolve. This results in a pull between the cool serenity and warm determination across the composition. The chosen palette reflects the conflict of connection and alienation, with broken pixels added to introduce imperfection and disrupt the expected pattern. The intersection of vertical and horizontal movements creates a chaotic yet introspective cross-current, emphasizing the emotional struggle intrinsically tied to the seed's abstract qualities.</desc>
