<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This artwork embodies the emotional struggle between joy and grief. The palette, consisting of vibrant yellows and muted purples, symbolizes the push and pull of light and dark emotions. The logical layout of boundary vs. core creates a stark contrast: the outer rows represent grief's heaviness while the inner rows pulse with sporadic brightness, creating collisions of feelings. The left-weighted spread further portrays asymmetry, echoing how joy can start and break from grief like an arrow of hope amidst shadow.</desc>
