  <title id="title">Memory vs Motion</title>
  <desc id="desc">This abstract piece explores the tension between control and surrender, represented through contrasting colors and forms. The use of 'clean white' and 'ink black' emphasizes clarity and depth, while 'ice blue' and 'violet gray' create a calming backdrop, suggesting surrender. The 'warning orange' acts as a focal point, illustrating moments of disruption. The pattern evokes a feeling of interrupted flow, with a central collision between darker and lighter elements, reflecting the emotional complexities inherent in the seed concept.</desc>
