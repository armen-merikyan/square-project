<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center Versus Edges</title>
  <desc id="desc">The emotional tone reflects the tension between defiance and submission. The palette of pink, red, gray, and dark maroon suggests love intertwined with betrayal, juxtaposing warmth against muted shades. The arrangement highlights a strong center (defiance) surrounded by softer edges (submission), creating a noticeable collision. The edge style is softened with broken pixels to evoke imperfection as a representation of conflict. The main contrast happens between the angular resistance of the center and the receding contrast of outer fields, which aligns well with the idea of an open gate allowing contrasting flows to intermingle and clash.</desc>
