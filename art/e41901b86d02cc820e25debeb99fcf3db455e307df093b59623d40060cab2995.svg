<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This piece captures the emotional tension between panic and control through contrasting colors and placement. The palette of deep navy and dark black juxtaposed with bright dim cyan represents the struggle between feeling overwhelmed and maintaining stability. The design features a mirrored layout with slight imperfections, highlighting the notion of instability. The upward and downward movements created by the gradient of colors suggest an emotional ebb and flow, while maintaining negative space allows for moments of quiet amidst chaos. The placement of sharper colors among the darker tones mirrors the unexpected sparks of panic.</desc>
