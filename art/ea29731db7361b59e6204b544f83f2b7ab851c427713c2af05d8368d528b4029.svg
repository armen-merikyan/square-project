<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">This abstract composition embodies the duality of joy and grief through a tension-filled arrangement. A mixture of warm yellows and oranges, representing joy, emerges from a backdrop of deep blues and muted purples, symbolizing grief. The layout descends like falling pixels, with brighter, checker-like patterns on the right colliding with the heavier, stair-like pattern on the left. The contrast between the light and dark sections creates an emotional pulse, suggesting the struggle between uplift and heaviness, while broken pixels introduce an imperfect beauty that reflects life's emotional asymmetries.</desc>
