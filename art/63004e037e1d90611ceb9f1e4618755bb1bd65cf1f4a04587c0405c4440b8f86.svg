  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece captures the emotional tension between vulnerability and strength using a palette that juxtaposes warmth and coolness. The light and airy colors in the center suggest exposure, while the darker tones around the edges convey strength. The patterns embody a fluid interaction: the strength embodies heavy edges while the vulnerability reflects light rain-like trails. The center is dense with strong accents in warning orange, creating a focal point, while the broken pixels represent scars of vulnerability and imperfection in the outer edges.</desc>
