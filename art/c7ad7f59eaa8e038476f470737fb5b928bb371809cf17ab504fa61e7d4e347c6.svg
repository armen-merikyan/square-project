<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow versus Containment</title>
  <desc id="desc">The emotional tone of this piece explores the tension between rage and calm. The selected palette of intense red and soft blue illustrates this juxtaposition, where the bright red symbolizes the chaos of rage, while the pale blue conveys a sense of calm. The primary collision occurs in the center, where hot maze-like patterns cut through the cooler shatter-like forms, creating an interplay of pressure and release. This reflects the concept of erosion, with symmetry disrupted at the edges, showcasing a gradual transition from volatility to stillness. The overall layout emphasizes areas of densely packed colors against sparsely filled sections, maintaining clarity while allowing emotional depth.</desc>
