<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition captures the dynamic tension between feelings of desire and emptiness. The palette, featuring hot coral and blood orange, signifies desire with its saturation, while hollow blue and charcoal evoke a sense of containment and vastness, reflecting emptiness. The primary collision occurs off-center, where a lattice pattern of warm pixels intersperses with split-screen cool colors, suggesting an unresolved push-pull between filling a void and the struggle against it. The use of broken pixels adds intentional disruptions, creating a sense of imperfection and echoes of memory throughout the grid.</desc>
