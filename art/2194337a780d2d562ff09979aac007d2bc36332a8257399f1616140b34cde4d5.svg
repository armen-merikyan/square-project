<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Pulse and Quiet</title>
  <desc id="desc">This artwork captures the emotional dialogue between longing and resolve, showcasing the tension and interplay of these feelings. The palette of mourning black, deep blue, new leaf, pale yellow, and stone evokes a sense of depth and renewal. Key contrasts are framed within the layout, where two distinct centers pulse against negative space, symbolizing growth against the backdrop of loss. Broken pixels introduce intentional disruptions, acting as reminders of scars and repairs. The extensive use of quiet fields allows for rhythmic pauses, balancing the strong emotional statements against the empty canvas of longing.</desc>
