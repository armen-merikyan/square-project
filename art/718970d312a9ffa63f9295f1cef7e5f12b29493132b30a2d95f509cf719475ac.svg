<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Spiral of Tension</title>
  <desc id="desc">This composition embodies the emotional tension between softness and severity through the juxtaposition of gentle pastel shades and stark, deep tones. The palette features soft pinks and warm whites to evoke softness, contrasting sharply with the severity of carbon black and sharp crimson. The spiral layout directs the viewer's eye toward a central pulse, symbolizing the tension of conflicting emotions. The checker pattern represents the gentle overlap of feelings, while cracks introduce imperfection and disruption, embodying guilt and forgiveness as subtle themes. The arrangement creates a central collision, where severity dominates yet is broken by soft layers, emphasizing the dynamic between intensity and calmness.</desc>
