<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">This piece captures the emotional conflict between control, represented by a dark, structured palette, and surrender, represented by lighter, softer hues. The palette includes deep shades of blackened plum and muted creams to convey heavy pressure, alongside bright accents of small orange that emerge at the center, suggesting moments of release. The collision occurs centrally, with a grid-like structure of control patterns pushing against more fluid, yielding barcode designs. The overall layout gives the impression of being surrounded, yet allowing for fragments of light to penetrate, echoing the struggle of holding onto control while inviting moments of surrender.</desc>
