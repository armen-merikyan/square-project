<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This composition reflects the emotional dichotomy of joy and grief through contrasting color palettes. The top half employs vibrant yellows and oranges representing joy, suggesting an upward movement and breaking open. Conversely, the bottom half features deep blues and muted purples to evoke a sense of heaviness and weight associated with grief. The layout showcases a cascading flow, alternating between orderly and chaotic patterns that reflect the tension between safe emotions and perceived threats. The edges are distinctly outlined to create a structured sense against the splintered emotions at play. Broken pixels add gentle imperfections, symbolizing the fragility of emotional states. The negative space is maintained, allowing for a breathing room that conveys the interplay between density and openness.</desc>
