  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition reflects a contrast between safety and exposure by using a palette that embodies warmth and sheltering tones against cooling, open colors. The upper four rows utilize warm brown and shelter green with structured, quiet textures, while the lower rows evoke the vulnerability of cold white and open blue through a stair-step pattern, suggesting descent into openness. The collision occurs through the horizontal split, emphasizing a tension between soft embrace and exposed edges, evoking the push and pull of these emotions as they interact within the grid.</desc>
