<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Quiet Collision</title>
  <desc id="desc">This piece embodies the tension between restlessness and peace, with a gentle gradient of muted colors contrasted by striking accents. The palette of deep blacks and soft golds evokes a sense of unease and warmth. The main contrast emerges from the stark diagonal shifts in the inner 4x4 section, representing the chaotic motion, interrupted by the radial calm suggested by the outer border. The pattern is built from 'crosshatch' for restlessness weaving into a 'radial' form for peace, forming a complex interaction of layered emotion.</desc>
