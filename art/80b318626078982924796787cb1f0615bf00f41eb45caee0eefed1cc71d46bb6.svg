<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Weight</title>
  <desc id="desc">The emotional tone combines the push and pull of defiance versus submission, reflected in contrasting colors. The palette incorporates deep reds and grays to symbolize love and betrayal, with brighter accents to suggest hope amidst weight. The layout flows upward, embodying a rising tension, while broken patterns introduce imperfection, echoing the concept of a struggle between control and surrender. The majority of dark hues at the bottom create a weighty foundation, disrupted by lighter pixels that ascend, suggesting an ongoing conflict without resolution.</desc>
