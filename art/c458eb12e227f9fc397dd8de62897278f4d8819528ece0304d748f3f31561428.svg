<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Ascent</title>
  <desc id="desc">The artwork captures the tension between joy and grief, represented through a stark palette of bright yellows and deep blues. The top half is filled with bright, jagged patterns, embodying joy's spark, while the bottom features heavier, muted tones that reflect grief and heaviness. This creates a visual collision, as the structured, fragmented pixels of joy fight against the subdued mass of grief, forming a layered narrative of emotional depth. The use of hard edges emphasizes boundaries between the two emotional states, creating a split-screen effect that is both chaotic and ordered.</desc>
