<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Pulse</title>
  <desc id="desc">This composition embodies the struggle between order and chaos, represented by sharp contrasts of color and texture. The palette features a mix of electric blue as a signal accent, hot magenta for the chaotic interruptions, and deep blacks and grays to create a background noise. The central area displays a dense pattern, mimicking the solid 'signal', while lighter areas provide a stark contrast to evoke a feeling of disruption. Broken pixels serve as emotional scars throughout, disrupting the full rhythm of the piece, echoing the theme of a pulse fighting against overwhelming noise, thus creating a dynamic yet fragmented visual experience.</desc>
