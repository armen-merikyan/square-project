<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Time</title>
  <desc id="desc">This piece captures the emotional contrast between nostalgia and progress through a striking combination of vertical patterns and colors. The left half, filled with warm magentas and deep blacks, evokes a sense of nostalgia, represented by stripes that suggest memories, creating a textured depth. The right half, in bright electrics and lime greens, symbolizes progress with a grid-like frame that contrasts the fluidity of nostalgia. The bottom weight of dark colors represents anchor points of the past, while lighter colors above suggest a rise towards the future. Broken pixel elements introduce imperfections, reflecting the disruption in the journey between these two states. The palette mirrors emotional warmth clashing against technological coldness, creating a visual tension that resonates with the seed's sentiments.</desc>
