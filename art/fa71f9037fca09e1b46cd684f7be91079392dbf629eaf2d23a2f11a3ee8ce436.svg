<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork captures an emotional duel between desire and emptiness. The warm glow of the central coral cluster represents the intense pull of desire, while the surrounding charcoal and blue tones evoke the presence of emptiness and restraint. The broken pixels introduce a sense of disruption and imperfection, mimicking the tension of unfulfilled yearning. The placement of colors—bright coral clashing with darker tones—creates a powerful signal against the noise of quiet spaces, illustrating the struggle within the frame. Just as the seed suggests a spiral movement, the arrangement invites the eye to traverse and engage with each pixel, reflecting both rise and containment, ultimately leading to an unresolved yet captivating tension.</desc>
