<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger's Edge</title>
  <desc id="desc">This composition embodies an emotional tension between desire and restraint. The palette of saturated colors like hot coral and blood orange pulses against the muted background of charcoal and hollow blue, representing intense desire striving towards muted restraint. The main collision occurs at the center where ripple patterns of intense colors disrupt the quieter spark patterns, encapsulating the struggle of hunger against confinement. The layout with a dense center and quiet edges emphasizes the feeling of confinement, where the vibrant colors seek to reach outward but are thwarted by the boundaries of more muted tones, echoing the seed's themes of sealed edges and emotional conflict.</desc>
