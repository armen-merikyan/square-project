<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of the Duality</title>
  <desc id="desc">This artwork explores the emotional tension between envy and gratitude, reflecting contrasting states through color placement. The palette of warm yellows and oranges symbolizes warmth and lightness, while deep blues and muted purples convey weight and depth. The arrangement uses broken pixels for imperfection, enhancing the emotional discourse. A zigzag flow pattern radiates upward, implying hope and struggle against noise, with a central tension illustrated by the darker colors pressing against brighter accents. The collision occurs primarily in the center, where light meets heavy, quiet against noise, creating a dynamic interplay that resonates with the duality of emotions.</desc>
