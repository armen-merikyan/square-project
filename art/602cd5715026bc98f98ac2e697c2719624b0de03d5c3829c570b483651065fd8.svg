  <title id="title">Fragments of Rest and Motion</title>
  <desc id="desc">This artwork captures the emotional dichotomy of restlessness and peace through an organized top section, providing a semblance of calmness, while the bottom section disrupts this order with chaotic arrangements. The palette oscillates between serene whites and blues symbolizing peace (upper rows) and deep blacks and vibrant oranges evoking restlessness (lower rows). The main collision arises where clean lines meet broken frames, creating a visual tension that reflects an inner dialogue of calm versus chaos.</desc>
