<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition reflects the emotional tug-of-war between desire and restraint. The warm, saturated colors represent desire, radiating warmth and energy, while the muted shades along the border symbolize the tension of restraint, creating an alive space that feels both fulfilling and confined. The densely filled center contrasts sharply with the restrained edges, suggesting a struggle. Broken pixels serve as subtle disruptions, representing imperfections in desire, while supportive rhythmic patterns (rain for desire, barcode for restraint) collide at the center, creating an active space of emotional turmoil. The arrangement allows for a predominance of warmth while holding back with the cool tension of the edges, fully translating the seed into an abstract narrative.</desc>
