  <title id="title">Tension Between Light and Dark</title>
  <desc id="desc">The artwork captures the emotional tension between joy and grief through a contrasting palette of warm yellows and oranges against deep blues and muted purples. This arrangement reflects the duality of the emotions, with joy occupying the upper half expressed in a radiant, open pattern, while grief inhabits the lower half, characterized by fragmented, heavy colors. The split horizontal layout evokes a sense of separation yet coexistence, allowing an exploration of how these emotions interact, collide, and impact each other.</desc>
