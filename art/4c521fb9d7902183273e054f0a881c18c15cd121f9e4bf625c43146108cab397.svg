<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Change</title>
  <desc id="desc">The emotional tone captures the tension between nostalgia and progress, symbolizing a push and pull between familiarity and advancement. The palette of black, dark violet, soft gold, and pale green evokes a mix of shadowy memories and hopeful future, where black signifies the weight of nostalgia while soft gold hints at progress. Sharp versus soft creates collision across the canvas: the lower half embodies solid grounding with dense clusters in dark hues, while the upper edges lighten and flow upward, symbolizing hope. The main contrast lies in the drop from dark to light, creating an echo of rising tension and calm against the memory of weight. A drip pattern interspersed with hollow spaces captures the essence of full versus empty—representing emotional echoes and shifts in perception throughout the design.</desc>
