<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Tension</title>
  <desc id="desc">This artwork captures the emotional tension between spark and ash, symbolizing hope against despair through the contrast of vibrant and muted colors. The palette leans heavily on deep teal and cosmic indigo for strong, resonant fields, punctuated by star white as an accent that draws attention and evokes sudden bursts of insight. The main conflict is centered in the grid with ash tones on the left, subtly merging into sparks of vivid colors on the right, suggesting movement through hunger to restraint. The layout mimics a mirror, but the intentional broken pixels introduce a sense of imperfection and vulnerability, enabling a narrative of resilience and fragility to emerge.</desc>
