<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This composition captures the emotional tension between resilience and fragility, using a contrasting palette of cosmic indigo and void black to convey depth and weight. The interplay of vibrant star white and cold gold as accents contrasts against muted tones, suggesting the clash between spark and ash. The layout features a dense center that gradually releases towards the edges, encapsulating the struggle between accumulation and dispersion, while broken pixels add intentional imperfection, emphasizing the complexity of memory and erasure. The main collision occurs in the center where the colors interact vigorously, creating a dynamic sense of movement and conflict.</desc>
