<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Echoes</title>
  <desc id="desc">This composition embodies the tension between vulnerability and strength through a contrast of warm and cool colors. The use of warm coral and soft amber in the left side symbolizes strength with their comforting, stable tones, while cold slate and blue black on the right introduces the feeling of vulnerability and exposure. The central collision of light and dark creates a visual dynamic that reflects the emotional interplay, where the structured ash field pattern meets the disrupted thread-like patterns, interrupted by random broken pixels representing the scars of vulnerability. The bottom weight of colors deepens the sense of grounding while the contrasting colors pulsate with emotional intensity.</desc>
