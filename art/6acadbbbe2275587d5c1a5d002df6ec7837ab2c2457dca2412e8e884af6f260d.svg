<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience Amidst Ashes</title>
  <desc id="desc">The emotional tone combines the vibrancy of 'spark' with the settled calm of 'ash', expressing a tension between hope and resignation. The palette features sepia and faded blue, embodying the muted strength of memory versus the quick bursts of brighter colors. The main collision occurs in the center, where jagged edges meet, reflecting conflict and resolution. The arrangement hints at upward and downward motion, creating a rhythm that suggests resilience contrasted against fragility. This contrasts the dense and urgent flows of colors, inviting contemplation on the balance of existence.</desc>
