<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Resilience</title>
  <desc id="desc">The emotional tone reflects the struggle between light (spark) and dark (ash), illustrated through a vibrant yet muted palette. The colors convey the warmth of lingering embers contrasted with the coldness of ash, creating a feeling of tension. The layout emphasizes a small bright cluster in the top right corner, a visual representation of hope and vitality against a larger expanse of dark. The patterns collide dynamically: ‘stairs’ for spark bring a sense of uplift, while the ‘stack’ for ash grounds the composition. Broken pixels disrupt the otherwise orderly structure, suggesting fragility amidst resilience. Overall, the piece symbolizes the coexistence of hope and despair, a complex emotional interplay.</desc>
