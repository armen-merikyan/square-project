<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">This piece reflects the duality of relief and dread through contrasting colors where warm, muted browns (sepia, tan) interact with cool shades (dust_gray, faded_blue). The layout emphasizes a central diamond-seed, suggesting pressure as it radiates outward. The use of broken pixels in the top rows introduces imperfection, echoing the theme of broken symmetry, while the lower rows provide a calming reprieve, suggesting a journey from chaos to calm. The interplay of light and dark creates a rhythm of emotional tension and contrast.</desc>
