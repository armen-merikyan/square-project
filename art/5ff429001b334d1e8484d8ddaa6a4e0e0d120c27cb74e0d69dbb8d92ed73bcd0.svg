<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Calm</title>
  <desc id="desc">This piece exploits the emotional tension between restlessness and peace through contrasting colors and patterns. The hot red accents clash against cool pale blue spaces, reflecting the conflict between movement and stillness. The arrangement is dominated by the quiet of blue, yet interspersed with fiery bursts and scattered black patches, illustrating memories being disrupted by the urgency of motion. The diagonal layout emphasizes an invasion of emotion that flows from the corner, transforming predictable harmony into an unsettled pulse.</desc>
