<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">This composition explores the emotional dynamics of defiance and submission through the juxtaposition of bold, dark colors and softer, light colors. The palette incorporates pinks and reds for warmth and emotional depth, contrasted with grays and dark maroon to signify weight and resistance. The upper half represents defiance with broken dot patterns, suggesting disruption and intensity, while the lower half, representing submission, is framed and structured – evoking stability with soft edges. The layout flows downward, creating a visual tension that echoes the struggle between these emotions, with weight concentrated at the bottom, reflecting the seed's theme of imbalance and density.</desc>
