<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">The emotional tone of this artwork revolves around the conflict between defiance and submission, represented by the choice of colors and their arrangement. The palette features black and dark violet to signify the weight of submission and the oppressive silence of dense areas, contrasted sharply with soft gold and pale green that symbolize flashes of defiance and hope. The main collision occurs in the center where vibrant pixels interrupt the darker fields, creating tension as they resist the encroaching submission. The patterns of crosshatch and flood evoke a sense of chaos and order, respectively, and together they produce a compelling narrative around struggle and resolution without literal representation. Broken pixels intentionally disrupt the flow, creating a sense of imperfection reflective of real emotional experiences. This layout embraces negative space, allowing the eye to breathe amidst the intensity of the interior, thus facilitating an impactful engagement with the viewer.</desc>
