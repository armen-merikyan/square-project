<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Longing and Void</title>
  <desc id="desc">This piece captures the emotional struggle between desire and emptiness. The chosen palette reflects warmth through shades of red and pink while the cool gray provides an anchor of emptiness. The upward and downward flow of pixels emphasizes a rising signal of hope contrasted by fragments of loneliness, resulting from the jagged placement of colors that represents disruptions in harmony. The broken edges signify imperfections and the tension introduced by noise, enhancing the theme of conflict combined with a hint of aspiration.</desc>
