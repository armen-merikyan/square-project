<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Trust and Suspicion</title>
  <desc id="desc">This artwork reflects the emotional tug-of-war between trust and suspicion. The muted palette of 'quiet_pressure' colors—off-white, dust gray, compressed red, dark navy, and faint peach—creates a balance between warmth and coolness. The diagonal flow creates an immediate visual impact, while the barcode patterns on both sides suggest tension and blockage. The contrast between the softer right side and the denser left side conveys an internal conflict, with broken pixels representing the cracks in trust. The central collision at the vertical seam serves as a threshold where these opposing emotions meet, inviting contemplation of their complex interplay.</desc>
