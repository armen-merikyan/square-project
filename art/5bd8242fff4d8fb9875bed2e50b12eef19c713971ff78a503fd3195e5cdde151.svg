<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Echo</title>
  <desc id="desc">This artwork reflects the tension between loneliness and connection using patterns of dark and light. The palette features navy and black representing weight and isolation, while single white pixels symbolize fleeting connections amidst the shadows. The contrast of deep colors creates an echo of emptiness that intertwines with the brightness of individual pixels, mirroring the highs and lows of emotional experience. The broken pixels introduce imperfection, enhancing the sense of vulnerability in connection amidst overarching solitude. The central 4x4 of white features a checker pattern to represent loneliness, while the border of dark hues creates a protective frame, resonating with the feeling of being both trapped and cocooned.</desc>
