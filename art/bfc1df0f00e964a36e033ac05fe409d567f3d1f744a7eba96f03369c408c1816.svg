<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience and Retreat</title>
  <desc id="desc">This composition embodies the tension between defiance and submission. The palette blends warm brown and shelter green to symbolize strength and safety, contrasted by pale skin and cold white illustrating vulnerability and openness. The center showcases an upward diagonal flow, creating a dynamic pulse of life and resistance against the surrounding muted tones, representing submission. The edges are intentionally broken with subtle glitches to emphasize imperfection and chaos, echoing the seed's themes of conflict.</desc>
