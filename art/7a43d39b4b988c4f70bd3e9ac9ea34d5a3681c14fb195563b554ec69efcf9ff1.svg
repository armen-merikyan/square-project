<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone contrasts warm, saturated colors of desire with cooler, muted tones of restraint. The palette features vibrant hues like hot coral and blood orange to depict the intense pull of desire, while charcoal and hollow blue suggest a sense of containment. The main collision occurs at the transition between the upper and lower halves—diagonal sweeps from the saturated colors clash against the stair-like arrangements of the muted colors, emphasizing the tensions of expansion versus restriction. This arrangement encapsulates a feeling of yearning constrained by limitations, reflecting the complex emotional landscape conveyed in the seed.</desc>
