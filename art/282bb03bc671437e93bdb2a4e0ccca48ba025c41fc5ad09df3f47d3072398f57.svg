<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Softness and Severity</title>
  <desc id="desc">The emotional tone of this artwork embodies the duality of softness and severity through layers of color and contrast. I utilized a palette that features soft hues like powder pink and warm white, juxtaposed against sharp crimson and carbon black to create tension. The main collision occurs in the center where darker colors sharply intersect with lighter ones, emphasizing the conflict between protective softness and assertive severity. The falling pixel layout captures the weight of these emotions, while broken pixels add intentional imperfection, embodying the struggle between guilt and forgiveness inherent in the seed's narrative.</desc>
