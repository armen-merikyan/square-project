<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The emotional tone of this piece plays with the duality of dread and relief through a carefully chosen palette. The contrast between the dark, heavy colors at the corners (#000000, #444444) reflects a sense of weight and tension, while the lighter, airy colors in the center (#F3FAD6, #B3D9D1) offer a soft release. The layout reflects a chaos-to-order principle where the darker edges spiral down toward lighter centers. Broken pixels disrupt the layers, adding depth and imperfection, embodying the anxiety and unexpected fractures in our emotional landscape.</desc>
