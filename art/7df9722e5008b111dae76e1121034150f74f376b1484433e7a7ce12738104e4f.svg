<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Quiet Collapse</title>
  <desc id="desc">The emotional tone represents a struggle between defiance and submission, creating a visual dichotomy through color placement. The palette incorporates navy, black, and dim cyan, evoking feelings of loneliness and isolation while allowing for tension with stark contrasts. The falling pixel layout signifies a rain-like descent, suggesting the oppressive weight of submission against the vibrant, upward energy of defiance. The main collision occurs where brighter accents of dim cyan disrupt the dark fields, embodying defiance amidst the enveloping submission. This pattern illustrates the emotional narrative, conveying push and pull, intrusion versus retreat, and the complexity of emotional states.</desc>
