<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Shelter</title>
  <desc id="desc">This artwork represents the emotional interplay between safety and exposure, utilizing a palette of shelter green, warm brown, pale skin, cold white, and open blue. The outer layer (safety) consists of heavier, darker colors creating a tactile barrier, while the inner core (exposure) features softer, lighter colors that echo vulnerability. This split vertical layout accentuates the tension between stability and vulnerability, with the main collision point at the center, where the patterns of the echo of exposure clash subtly with the tide of safety.</desc>
