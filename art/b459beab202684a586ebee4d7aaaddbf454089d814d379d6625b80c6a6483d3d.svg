<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality in Flow</title>
  <desc id="desc">The emotional tone captures the tension between vulnerability and strength, reflecting a visual contrast through color choice. The palette of black, dark violet, soft gold, and pale green portrays the struggle between dense moments and gentle spaces. The dark colors denote strength and pressure, while the lighter tones convey vulnerability and softness. The main contrast occurs diagonally, with the strength colors dominating one wedge and the vulnerability hues occupying the opposite, illustrating their connection and collision. The incorporation of broken pixels disrupts the symmetry, representing the fragility within strength and echoing the emotional narrative of internal conflict propelled by the seed text.</desc>
