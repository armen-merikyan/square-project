<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone explores the tension between desire and emptiness. The palette reflects warmth and coolness through warm coral, blood orange, and muted blues and blacks that symbolize yearning restrained by boundaries. The dynamic placement creates a visual interruption with distinct sections conveying pulsing warmth in conflict with vast, empty spaces, resonating with the ideas of pressure and quietness. The use of broken pixels adds intentional disruptions, symbolizing imperfections in desire. The main contrast occurs centrally, where warm colors collide with cooler tones, illustrating struggle and interaction between contrasting forces. The abstract patterns of stairs and threads reflect the complexity of these emotions, encapsulating both rising signals and contained overflow.</desc>
