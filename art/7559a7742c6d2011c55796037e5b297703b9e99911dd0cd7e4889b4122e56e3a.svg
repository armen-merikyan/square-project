<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Emotions</title>
  <desc id="desc">The emotional tone captures the complex interplay between envy and gratitude. The deep contrast of dark violet and black in the top rows represents the heavy weight of envy, while the soft gold and pale green in the bottom rows symbolize the lightness of gratitude. The layout spans diagonally, reflecting the flow from the center towards the edges, suggesting a shift between introspection and outward expression. The use of soft edges maintains a sense of movement and complexity, while broken pixels introduce an imperfection that evokes the human experience of fluctuating emotions. The negative space enhances the feeling of emptiness and quiet that accompanies these emotions, creating a balance between density and release.</desc>
