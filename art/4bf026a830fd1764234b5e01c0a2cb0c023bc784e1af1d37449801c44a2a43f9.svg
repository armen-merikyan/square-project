<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone of this piece reflects a struggle between desire and restraint, using a palette that balances saturated warmth with muted tones. The deep reds and small orange represent desire's intensity, while blackened plum conveys restraint's quiet containment. The main contrast occurs diagonally, where bright, dot-like patterns of desire collide with the threshold-like structure of restraint, creating an interesting interplay. Broken pixels are introduced as intentional disruptions, symbolizing moments of release and tension, reinforcing the theme of emotional collision.</desc>
