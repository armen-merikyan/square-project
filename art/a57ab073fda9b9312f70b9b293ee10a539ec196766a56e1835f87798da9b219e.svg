<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">This artwork reflects the tension between longing and resolve through a carefully chosen palette of muted purples and vibrant oranges. The warm colors evoke a sense of yearning, with orange representing urgency and muted purple symbolizing a serene yet broken state of being. The main collision occurs in the center where intense bursts of orange disrupt the tranquil muted background, suggesting a battle between calmness and the chaos of desire. This tension between the two emotions is further emphasized by the use of broken pixels that represent the scars of longing and the efforts of resolution, creating a rhythm of pulse and repair throughout the piece.</desc>
