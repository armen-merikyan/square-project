<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Reflection</title>
  <desc id="desc">The emotional tone juxtaposes peace and restlessness. The palette of navy, black, and dim cyan conveys depth and weight, while white serves as a calm contrast. The dense center embodies the restless elements, where darker shades mingle aggressively, symbolizing memory and motion. This chaos collides with lighter hues at the border, suggesting an unyielding peace attempting to encompass the turmoil yet remaining slightly detached. The use of broken pixels introduces an element of imperfection, echoing how memories can fracture over time.</desc>
