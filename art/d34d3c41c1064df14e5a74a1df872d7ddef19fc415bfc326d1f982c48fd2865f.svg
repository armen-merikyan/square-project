<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">This composition captures the emotional tension between longing and resolve. The palette includes deep teal and cosmic indigo for a sense of depth and emotion, contrasted with cold gold and white tones that symbolize clarity and resolve. The left side features a barcode pattern suggesting the chaos and yearning of longing, while the right uses dots to illustrate the order and strength of resolve. The collision occurs at the central divide, where the structured dots intersect the chaotic patterns, representing an emotional crossroads between the two states. The broken pixels disrupt order, akin to emotional scars, maintaining a balance of negative space to allow for contemplation.</desc>
