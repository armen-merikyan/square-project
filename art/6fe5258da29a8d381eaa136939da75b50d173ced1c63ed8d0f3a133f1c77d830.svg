<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Presence</title>
  <desc id="desc">This piece captures the emotional discourse of defiance and submission through a visual interplay of stark contrasts and unexpected interruptions. The palette comprises deep navy and black contrasting with subtle dim cyan and white, balancing quietude with bursts of energy. The left side (defiance) invokes angular resistance via a ring pattern, while the right (submission) uses the barcode pattern to convey a sense of ordered confinement. The center serves as a dynamic collision point, emphasizing tension against tranquility, mirroring life’s constant push-pull. Broken pixels are intentionally placed to symbolize imperfections and disruptions that emerge within the struggle.</desc>
