<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order Encounters Chaos</title>
  <desc id="desc">The emotional tone reflects a juxtaposition between softness and severity. The palette mixes warm whites and powder pinks with deep contrasts of carbon black and sharp crimson. The top and bottom of the composition are weighted with dark colors that represent severity, while the central area, framed by broken dots and crosshatches, allows for softer, gentler interactions. The collision occurs centrally, where patterns interrupt one another, suggesting the tension between control and chaos, guided by the seed’s conceptual influence on motion and weight.</desc>
