<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">The emotional tone captures the duality of joy and grief, juxtaposed in a split-screen format. The left side employs a structured maze pattern in warm yellows and oranges to evoke joy, while the right emerges through scattered dots in muted purples and deep blues to symbolize grief. The encounters between vibrant colors and muted tones create a striking collision, emphasizing the contrast between lightness and heaviness. Edges are deliberately hard to reflect tension, while uneven placements reflect machine-like emotions colliding with organic human feelings.</desc>
