<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Disruption</title>
  <desc id="desc">This artwork embodies the emotional tension between signal and noise through contrasting colors and patterns. The palette, featuring deep navy and hints of dim cyan, evokes a sense of isolation while punctuated by clean white accents that represent clarity of thought. The layout of noise on the left evokes chaos through a woven lattice pattern, while the right side features structured pulse channels, illustrating the battle of order against chaos. The main collision occurs at the vertical center, where both emotions meet, creating a visual interruption that echoes the seed's theme of broken signals and the interplay of sharp edges against softer tones.</desc>
