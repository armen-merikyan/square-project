<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Forces</title>
  <desc id="desc">This artwork captures the emotional contrast between panic and control through the use of a limited palette emphasizing sharp contrasts. The colors black, electric blue, magenta, and lime evoke a sense of urgency and mechanical emotion, where black serves as a grounding force against explosive accents of electric blue and magenta. The layout merges diagonal crack patterns representing panic with mirrored elements symbolizing control. The interplay between dense and sparse color placements creates a visual tension, mirroring the emotional conflict of the seed. The result is a visually engaging conversation between inside and out, chaos and order.</desc>
