<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The emotional tone conveys a push and pull between calm and rage, structured through jagged reds clashing against soothing pale blues and stark whites. The palette embodies the intensity of rage with reds and contrasts starkly with the tranquil pastels representing calm. The main collision occurs at the center, where sharp red pixels bleed into the soft blue background, echoing a tension that disrupts symmetry. The use of broken pixels suggests the imperfection of the clash, hinting at contained chaos in the orderly calm. This composition embodies the struggle of containment against overflowing emotions through disrupted patterns.</desc>
