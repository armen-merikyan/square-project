<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This piece captures the emotional tension between vulnerability and strength. The palette, 'softness_severity', combines soft hues like powder pink and warm white to represent vulnerability, contrasted by the starkness of carbon black and steel gray, representing strength. The broken frame layout conveys the idea of leaks of emotion through deliberate disruptions. The flow 'echo_right' creates an unfolding pressure towards the edge, while maintaining a pale exposed center, suggesting an ongoing internal conflict. The interplay of static patterns for strength and pressure bands for vulnerability creates a visual collision that echoes the theme of safety and exposure.</desc>
