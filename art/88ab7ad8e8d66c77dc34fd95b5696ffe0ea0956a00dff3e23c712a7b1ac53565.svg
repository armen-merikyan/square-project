<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Near vs Far</title>
  <desc id="desc">The emotional tone of this piece evokes a tension between longing and resolve, symbolized by contrasting colors and patterns. The palette, 'joy_grief', features deep blue and muted purple to represent calmness and introspection, while vibrant hues of yellow and orange symbolize warmth and urgency. The layout, 'scattered_repair', emphasizes interrupted paths of color to suggest incomplete healing or unresolved feelings, with noticeable collisions at the center where bright accents meet muted fields. The 'mirror' and 'grid' patterns reflect the emotional complexities of being caught between hope and disappointment, echoing themes of repair and damage without depicting literal shapes.</desc>
