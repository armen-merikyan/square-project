<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tides</title>
  <desc id="desc">This piece captures the dichotomy of joy and grief through a deliberate color arrangement. The palette of sunny yellows and oranges contrasts with deep blues and muted purples to reflect emotional tension. One side (top) exudes warm joy with bright colors arranged in a rhythm that suggests movement and lightness, while the bottom side embodies grief through darker tones with a chaotic, maze-like pattern. The absence of outlines enhances the fluidity between emotions, symbolizing the blurred lines of feeling. The broken pixel placements evoke imperfections in the emotional journey, creating a sense of interruption and echo between the two realms.</desc>
