<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Fracture</title>
  <desc id="desc">The emotional tone contrasts envy and gratitude, creating a visual tug-of-war. The palette, featuring vibrant lime, electric blue, and deep black, embodies the intensity of envy against the soft calmness of gratitude. The zigzag pattern symbolizes the chaotic nature of emotion, while broken pixels introduce an element of imperfection, echoing the fractured mirror of the seed. The arrangement offsets the center, suggesting a dynamic shift from heavy emotion to lighter gratitude. Main contrasts lie in the diagonal spread from vibrant colors to muted shadows, reflecting the complexity of these feelings.</desc>
