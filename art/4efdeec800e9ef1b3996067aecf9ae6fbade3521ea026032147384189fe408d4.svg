  <title id="title">Inside vs Outside</title>
  <desc id="desc">This artwork conveys the tension between loneliness and connection through contrasting colors and spatial dynamics. The warm tones of yellow and orange represent bursts of connection, while the deep blue and muted purple create a feeling of isolation. The top half, dominated by warm hues, invites connectivity, while the bottom half, cooler and softer, suggests solitude and introspection. The broken pixels disrupt the flow, symbolizing imperfections in emotional expression. The layout emphasizes the split between emotions, with an outside-inward flow that mimics an emotional shift. Overall, it encapsulates the complexities of experiencing both pressures and releases within interpersonal relationships.</desc>
