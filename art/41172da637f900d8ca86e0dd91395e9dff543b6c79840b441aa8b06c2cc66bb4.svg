<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Held</title>
  <desc id="desc">This artwork captures the tension of desire and restraint through an asymmetric arrangement of colors. The saturated hues of hot coral and blood orange symbolize intense longing, while the muted fields of charcoal and hollow blue illustrate the feelings of containment and restraint. The central collision of desire and restraint manifests through the 'teeth' and 'negative_cross' patterns, forcing interaction while leaving ample negative space to suggest struggle and unresolved tension. The flow from outside to inward reflects a push-pull dynamic, embodying emotional depth as the saturation of desire clashes against the cooler tones of restraint.</desc>
