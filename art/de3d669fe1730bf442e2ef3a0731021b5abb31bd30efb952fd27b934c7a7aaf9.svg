<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse in the Static</title>
  <desc id="desc">The emotional tone is defined by a tension between clarity and distortion. The palette, featuring navy and dim cyan against muted black, conveys depth and isolation, representing the 'signal' striving to break through the 'noise'. The main collision occurs in the center, where brighter colors disrupt darker fields, encapsulating the struggle between these two forces. The noise-patterned lattice intermingles with glitchy signals, forming a chaotic yet readable pulse, reminiscent of memory and echoes clashing within static spaces.</desc>
