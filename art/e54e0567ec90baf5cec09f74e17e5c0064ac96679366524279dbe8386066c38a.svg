<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Longing and Resolve</title>
  <desc id="desc">This artwork encapsulates the emotional tension between longing and resolve. The chosen palette—moss green, bone white, rust, stone gray, and small gold—reflects resilience and fragility, with the warm tones of rust and gold suggesting urgency colliding against the cool, calm gray and green representing containment. The center of the square is dense with rust and moss colors interspersed with soft whites creating saturated energy, while the edges flow outward with bone white and stone gray to evoke a sense of longing containment. Main contrasts occur centrally where the warmth of impulse meets the cooler themes of restraint before spiraling outward; broken pixels symbolize imperfections and repairs in the fabric of emotions.</desc>
