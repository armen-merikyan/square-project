<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Tones</title>
  <desc id="desc">This artwork captures the emotional tension between trust and suspicion through a split vertical pattern. The palette emphasizes clarity with whites and blues for trust contrasted against deep blacks and grays representing suspicion. The main collision occurs in the center, where the soft glow of whites meets the harsh shadows of darker shades, creating a dynamic interplay that embodies the essence of trust battling suspicion. The use of broken pixels adds a layer of imperfection, symbolizing resilience and fragility within relationships. Overall, the layout flows in a wave-like pattern, suggesting movement and unease, while preserving negative space to emphasize the emotional dichotomy.</desc>
