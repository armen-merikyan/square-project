<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">The composition captures the emotional tone of vulnerability contrasted with strength. The chosen palette of burnt orange, dark red, charcoal, and gold evokes warmth while highlighting the pain and pressure associated with vulnerability. The lattice pattern interspersed with the frame showcases a break in symmetry, reflecting the clash of emotions where the center represents strength supported by a protective frame, while the surrounding lattice conveys fragility. The collision of dark and light colors in the center tightens this narrative, visually representing a pressure border and an echo of robustness against the softer tones. The placement of broken pixels introduces intentional disruptions that symbolize the conflict and duality in our experiences.</desc>
