<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Echo</title>
  <desc id="desc">This piece juxtaposes the heat of rage with the softness of tenderness, embodied by the contrasting patterns of lattice and mirror. The palette blends intense reds with soft blues and whites, creating a dichotomy of compression and calm. The main collision occurs at the top left corner, where the saturation of red pixels, representing rage, bleeds into a gentle cascade of pale blue, signifying tenderness, creating a visual echo of emotional conflict. The broken edges denote imperfection and turmoil, reinforcing the tension between inside and outside. This artwork captures the essence of both emotional states, inviting the viewer to explore this delicate balance.</desc>
