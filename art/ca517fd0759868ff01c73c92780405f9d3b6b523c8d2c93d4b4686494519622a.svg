<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Certainty and Curiosity</title>
  <desc id="desc">This piece captures the emotional tension between certainty and curiosity through a split horizontal layout. The upper half, dominated by the certainty emotion, showcases stacked patterns utilizing muted greens and golds to suggest solid grounding. The lower half introduces curiosity, using scars of soft sky and storm gray colors that create movement and unresolved pathways. The edges are thick and dark, representing boundaries. The collision of these two emotions occurs at the center, where the stacked structure meets the more chaotic lower section, symbolizing the tension between stability and exploration. The palette was chosen for its ability to evoke a sense of relief from dread, with faded colors representing underlying tension.</desc>
