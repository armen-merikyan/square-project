<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Strength and Vulnerability</title>
  <desc id="desc">The emotional tone is a struggle between strength and vulnerability, depicted through a palette of burnt orange, dark red, charcoal, and gold representing warmth and intensity against the backdrop of exposure. The main contrast collides in the center where cracks (vulnerability) meet the pressure bands (strength), emphasizing a chaotic yet beautiful interplay. The seed guided the abstract pattern towards diagonal energy, with a quiet foundation interrupted by jagged elements, creating a dense feel on one side and more negative space on the other.</desc>
