<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">This composition explores the emotional tension between trust and suspicion through contrasting regions. The outer border uses dark navy to suggest shadowy suspicion, while the inner section employs faint peach and off-white to convey the warmth and openness of trust. The use of compressed red as an accent creates moments of interruption, signifying conflict within the layout. The collision of subtle textures arises from the diagonal flow, representing the delicate balance we navigate between these feelings. Broken pixels introduce an element of unpredictability, reinforcing the overarching theme of resilience amidst fragility.</desc>
