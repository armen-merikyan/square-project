<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Wholeness and Fracture</title>
  <desc id="desc">This composition captures the emotional dance between longing and resolve through contrasting visual elements. The top four rows, representing longing, use deep and muted tones in frames, suggesting a sense of enclosure and yearning, while the bottom four rows, reflecting resolve, utilize lighter hues and a field-like pattern to convey steadiness and open space. The use of blackened plum and red oxide provides a warm tension against muted cream and iron gray, reinforcing the collision of emotions. A focused collision at the center creates a dynamic interaction, symbolizing the struggle and balance between the two feelings, while the intentional broken pixels embed a sense of imperfection and repair within the structure, echoing the seed's themes.</desc>
