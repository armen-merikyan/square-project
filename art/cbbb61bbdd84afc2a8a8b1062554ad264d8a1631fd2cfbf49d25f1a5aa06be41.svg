<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The composition embodies the emotional tension between rage and calmness, utilizing a bold palette of red, pale blue, black, and white. The warm red is positioned at the center, symbolizing pressure and intense emotion, while calm, soft pale blue hues stretch outward, representing containment and serenity. The collision occurs in the center where dots from the 'rage' pattern invade the smooth transitions of the 'calm' stepwell, suggesting a chaotic eruption surrounded by an increasingly expansive calm atmosphere. The hollow center gives depth, creating negative space that enhances the feeling of eroded symmetry and spiraling emotions.</desc>
