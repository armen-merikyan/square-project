<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone embodies conflict and resolution, representing the tension between 'spark' and 'ash.' The selected palette of red, black, pale blue, and white strategizes on contrasts: red serves as the igniting spark while black symbolizes the cool, settling ash. The main contrast occurs across a diagonal that divides the artwork, with the spark colors (red and pale blue) erupting from one corner, colliding against the tranquil ash (black and white) that settles into the edges. This pattern resonates with the idea of resilience versus fragility, mirroring an invasion of intensity into calmness, creating an abstract narrative of struggle and balance.</desc>
