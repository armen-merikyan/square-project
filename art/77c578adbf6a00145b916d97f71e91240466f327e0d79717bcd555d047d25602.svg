<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition embodies the emotional tension between defiance and submission. The palette of black, dark violet, soft gold, and pale green represents deep conflict and fragile hope, creating layers of intensity. The outer border showcases a strong, angular feel with broken dots, while the inner 4x4 squares create a soft lattice that suggests retreat and gentleness. The main contrast occurs along the diagonal where hard edges of defiance interrupt the smooth curves of submission, yielding a dynamic push-pull effect, symbolizing the struggles of order versus chaos. The use of broken pixels throughout not only adds an element of unpredictability but also reinforces the idea of scars from conflict and disruption, while still leaving negative space for reflection.</desc>
