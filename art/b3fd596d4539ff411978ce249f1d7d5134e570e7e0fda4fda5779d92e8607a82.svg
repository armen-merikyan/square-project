  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece captures the tension between defiance and submission by creating a firm boundary through color contrast. The top half uses darker shades representing defiance, suggesting a confrontational stance, while the bottom half shifts to softer tones reflecting submission. The zigzag flow mimics a pulse that rises and falls, embodying conflict. The palette blends dark violet for intensity and pale green for tranquility, illustrating the push and pull between these emotions, while broken pixels signify disruption, enhancing the theme of struggle within balance.</desc>
