<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This composition captures the tension between joy and grief through a clash of warm and cool tones. The palette incorporates vibrant yellows and oranges to signify joy, contrasted against deep blues and muted purples representing grief. The layout begins in a corner, creating a diagonal flow that invokes a sense of invasion and disruption, while a broken edge style introduces imperfection, suggesting the unpredictability of emotions. The zigzag pattern symbolizes the tumultuous nature of feelings, where the bright hues of joy intermittently clash with the heavier tones of grief, creating moments of both brightness and depth.</desc>
