<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Balance</title>
  <desc id="desc">This piece explores the tension between vulnerability and strength through color contrast and placement. The palette of icy blues, stark blacks, and soft whites creates a visual dialogue reminiscent of fragility against a darkening weight. The central collision of the pale center, combined with broken dots and an overall spiral pressure layout, conveys a sense of interruption and reflection amidst chaos, mirroring the emotional weight of the seed's themes. The use of negative space allows for a breath, underscoring the fragility inherent in strength.</desc>
