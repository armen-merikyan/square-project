<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This artwork embodies the tension between control and surrender through a dynamic interplay of colors and forms. Using the warm tones of burnt orange and gold to represent the feeling of control against a backdrop of cooler blacks and charcoals that suggest surrender and quietness. The central area reveals a collision of radial patterns of the warm colors, overflowing with energy and pressure, while the edges gently fade into cooler tones, highlighting a release. The jagged edges add a sense of eroding boundaries, contrasting with the smoother radial flow toward the center. The design resonates with the theme of being overfilled yet contained, with the central pixels disrupting the calmness, conveying a navigational quality of tension and release.</desc>
