<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Threads</title>
  <desc id="desc">This composition embodies a push and pull between longing and resolve. The muted colors—moss green and stone gray—serve as the base, representing the weight of longing and the quiet through which it navigates. The interspersed bursts of rust and small gold mimic sparks of resolve, highlighting moments of clarity and determination. The main collision occurs in the center, where the barcode-like patterns of longing intersect with the denser, spark-like hints of resolve, creating tension while maintaining a sense of rhythm. Broken pixels are intentionally placed to signify disruptions in the flow, reflecting the imperfect journey between these feelings.</desc>
