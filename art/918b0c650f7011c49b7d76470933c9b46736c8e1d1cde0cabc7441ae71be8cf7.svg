<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">This composition expresses an emotional dichotomy between panic and control, utilizing a palette of sepia, tan, dust gray, and faded blue to evoke feelings of nostalgia mixed with instability. The calm tan and faded blue serve as the foundation, representing control, while the disruptive sepia and gray introduce a chaotic element, invoking panic. The arrangement features lines that gently descend from the center to the edges, creating a tug-of-war between the ordered center and the turbulent surroundings. The primary contrast emerges between the lighter center and the darker outer rows, highlighting the struggle for control amidst chaos. Representation of 'full vs hollow' occurs with the placement of dense colors against the lighter, fragmented spaces, creating visual tension.</desc>
