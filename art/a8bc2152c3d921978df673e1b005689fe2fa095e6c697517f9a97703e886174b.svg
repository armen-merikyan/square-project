<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Frames</title>
  <desc id="desc">The emotional tone embodies a push and pull between containment and release, reflecting the duality of control and surrender. The chosen palette of deep navy, muted black, and dim cyan suggests solitude and introspection, while the contrast of vibrant white serves as both a beacon and point of interruption. The pattern reflects this with jagged edges on one side, representing control, clashing with soft, maze-like forms on the other, symbolizing surrender. The center is the focal point, where the collision is strongest, creating tension and a release feel, surrounded by a delicate interplay of broken pixels that create visual disruptions without becoming literal.</desc>
