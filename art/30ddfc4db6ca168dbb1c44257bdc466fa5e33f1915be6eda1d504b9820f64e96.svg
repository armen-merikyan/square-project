<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Fragmentation</title>
  <desc id="desc">This piece explores the emotional tension between joy and grief through a split layout. The left side, representing joy, is filled with bright checker patterns in cheerful yellows and oranges, while the right side embodies grief, marked by muted dots in deep blues and purples. The contrast is stark, presenting joy's vibrancy against grief's somberness, with an arrow shape subtly guiding the flow from happiness to sorrow. Imperfections are introduced with broken pixels, adding a sense of disruption. The layout also addresses the left-weighted aspect, creating a visual imbalance that reflects emotional experiences. The use of negative space balances this piece, allowing each emotion to breathe despite its inherent tension.</desc>
