<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Affection</title>
  <desc id="desc">The emotional tone captured here dances between love and betrayal, symbolizing warmth versus cold separation. The palette utilizes warm pinks and deep maroons to express love, while gray tones represent the chill of betrayal. The sharp contrasts between the colors evoke tension, with the predominantly soft pinks confronting the harder gray and dark maroon edges. This nuance creates a dynamic conflict across the surfaces. The arrangement presents a near-symmetrical layout, broken by the unexpected diagonal elements that signify the rupture of harmony, a reflection of the seed's themes of space and contradiction.</desc>
