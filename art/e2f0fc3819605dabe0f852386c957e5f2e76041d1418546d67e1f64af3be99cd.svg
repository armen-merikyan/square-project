<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This abstract artwork captures the emotional struggle between restlessness and peace through its color palette and arrangement. The dark colors (#000000, #111111) reference feelings of confinement and chaos, while the addition of lighter hues (#7F7F7F, #A3A3A3) introduces elements of hope and calm within the tumult. The dominant black and deep navy tones flood one edge, signifying overwhelming feelings, while cooler, lighter colors push against the edges, symbolizing the yearning for tranquility. The collision occurs at the center where dark lattice patterns imply restless energy meeting quiet, glitch-like fields that represent peace. The broken pixels disrupt the grid, indicating imperfections in this emotional journey, enhancing the complexity of tension and release in the composition.</desc>
