<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This composition explores the tension between restlessness and peace through a diagonal gradient of color motion. The palette combines calming shades like distant lilac and cool blue with more intense hues like warm shadow and lamp gold, representing the interplay of sense and emotion. The main contrast occurs at the center where opposing patterns of flood (restlessness) and shatter (peace) collide, creating a visual push and pull that echoes the narrative of memory against motion. The deliberate placement of broken pixels introduces intentional disruption, suggesting the scars of experience and the journey between quiet and chaos.</desc>
