<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">The emotional tone of 'rage vs calm' manifests through the use of a high-contrast palette featuring deep blacks juxtaposed with vibrant reds and cooler tones of pale blue and white. This choice evokes tension between heat and coolness, embodying the calmness trying to encapsulate the eruptive rage. The design employs a two-pulse layout where busy, red pixels clash with calmer, pale blue ones. The main collision occurs in the center, emphasizing the overwhelming presence of rage, while the calm, vast spaces serve as a counterbalance, allowing for quiet yet looming tension throughout the piece. Broken pixels introduce an inherent imperfection, reflecting the theme of erosion in symmetry, enhancing the chaotic essence while preserving a structured flow.</desc>
