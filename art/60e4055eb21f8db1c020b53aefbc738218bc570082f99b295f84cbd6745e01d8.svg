<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Echoes</title>
  <desc id="desc">This composition embodies the emotional tension between longing and resolve through a palette of muted and warm tones. The use of off-white and dust gray serves as quiet fields that contrast deeply with the compressed red and dark navy, illustrating the pull between serenity and urgency. The patterns of 'maze' and 'tide' intermingle throughout the square, colliding prominently at the center, symbolizing the resolve rising through the longing. Broken pixels are sprinkled throughout to create an intentional disruption, echoing the theme of repair and damage without literal representation.</desc>
