<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience in Fractured Light</title>
  <desc id="desc">This piece captures the tension between the vibrant spark of light and the muted, ash-like remnants of memory. The palette, dominated by cosmic indigo and void black, echoes the emotional struggles of resilience against the weight of fragility. The main contrast occurs in the center where dense radial 'spark' patterns collide with quieter fields of ash, illustrating a push and pull of energy and stillness. The broken pixels introduce intentional disruptions, symbolizing the complexities of memory and the scars of experience. The overall composition adheres to a layout that emphasizes pressure at one corner, creating a visual dynamic that evokes both hunger and restraint.</desc>
