<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Lonely Resonance</title>
  <desc id="desc">This piece embodies the emotional tension between emptiness and desire, captured through the contrasting colors of a muted cool palette and warm burnt edges. The central placement of dark colors emulates a core of emptiness, surrounded by warmer tones that signify desire and yearning. The main collision occurs at the edges, where the warm colors press against the cool, creating a visual noise that represents the struggle between longing and isolation. The broken pixel technique introduces an imperfection that mirrors the fragmented heart, inviting interpretation and engagement with the emotion presented.</desc>
