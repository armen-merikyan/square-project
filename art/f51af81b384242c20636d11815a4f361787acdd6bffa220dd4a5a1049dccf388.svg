<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Convergence of Tension</title>
  <desc id="desc">The emotional tone of 'defiance vs submission' is captured through a stark contrast of vibrant greens and muted olive, depicting the struggle between resistance and concession. The color palette reflects both gratitude and envy—where deep olive and honey gold create a dense center representing defiance, while brighter acid green and cream suggest softer edges conforming to submission. The main collision occurs in the center, where saturated colors clash with negative space, yielding a dynamic, unsettled tension that embodies the idea of compressed energy battling against the surrounding quiet. The inward spiral concept animates the flow, while broken pixels punctuate the structure, introducing intentional imperfection and depth.</desc>
