<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Colors</title>
  <desc id="desc">This artwork explores the emotional conflict between desire and restraint using a palette that embodies both warmth and coolness. The warm tones represent desire (red oxide and small orange), while the muted shades serve as a metaphor for restraint (blackened plum, muted cream, and iron gray). The layout suggests falling pixels, creating a dynamic tension that visually descends through the piece, conveying layers of pressure and release. The main collision occurs in the center with vibrant reds clashing against muted spaces, reminiscent of how desire can unexpectedly break through barriers.</desc>
