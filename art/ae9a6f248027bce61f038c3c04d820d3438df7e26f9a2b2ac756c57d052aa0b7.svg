<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This composition embodies the emotional tension between tenderness and rage through a palette of saturated reds contrasting with muted pale blues. The upward pressure from the rage elements collides with the gentle, rounded presence of tenderness. The arrangement focuses on a diagonal flow from the bottom left, emphasizing the contrast through interference and quiet space. Broken pixels scatter throughout, serving as intentional disruptions that echo the idea of emotional scars and healing. The overall feel is one of wariness, allowing viewers to sense the push and pull of conflicting emotions.</desc>
