<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">This composition embodies the emotional dichotomy of rage and calm. The left side is overwhelmed with intense reds and blacks, symbolizing the explosive nature of rage—sharp, jagged interruptions (patterns) represent chaotic energy. The right side contrasts this with soft pale blues and whites, illustrating calm through gentle, spark-like patterns that offer containment. The juxtaposition of high-contrast cool and warm colors demonstrates the battle between chaos and tranquility. The main collision of emotions occurs in the center where the intense red pixels begin to approach the calming blue, suggesting a moment of pressure—showcasing the struggle of containing rage within the calm, highlighted by deliberate broken pixels to signify imperfection and emotional scars.</desc>
