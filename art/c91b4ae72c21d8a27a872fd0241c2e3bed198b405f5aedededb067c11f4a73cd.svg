<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragile Foundations</title>
  <desc id="desc">This abstract piece explores the tension between vulnerability and strength. The left half employs maze-like patterns in earthy colors representing strength, while the right half showcases lighter, more open patterns symbolizing vulnerability. The palette balances shelter green and warm brown with pale skin tones and cold white, creating emotional contrast. The main collision occurs at the vertical center, where heavy blocks of color encounter lighter fields, suggesting a dynamic push and pull reminiscent of the seed's themes. Broken pixels add intentional imperfections, enhancing the narrative of vulnerability amidst strength.</desc>
