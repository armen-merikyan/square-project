<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Weight</title>
  <desc id="desc">The artwork juxtaposes the emotional pulls of fear and hope through a stark color contrast, reflecting the conflict of lightness versus heaviness. Dark hues like black and dark violet convey the weight of fear, while soft gold and pale green represent flickers of hope. The mirror layout allows for a near-symmetrical flow yet incorporates intentional breaks to highlight imperfection, evoking a sense of tension. The sharp edges play against rounded, soft accents, creating a visual interplay between confinement and liberation.</desc>
