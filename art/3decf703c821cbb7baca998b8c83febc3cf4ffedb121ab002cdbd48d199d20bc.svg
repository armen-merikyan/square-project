<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This composition captures the emotional tension between fear and hope. The palette of deep blacks, dark violets, soft gold, and pale green embodies the stark contrast of encroaching darkness and emerging light. The zigzag pattern introduces a rhythmic flow, while the bottom-heavy layout emphasizes the weight of fear trying to overcome the hopeful center. As the softer gold and pale green pixels rise through the darkness, they suggest hope filtering through chaos, hinting at resilience amidst a backdrop of jagged edges and noise.</desc>
