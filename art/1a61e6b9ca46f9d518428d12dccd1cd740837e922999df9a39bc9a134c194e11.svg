<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This abstract piece captures the ongoing struggle between restlessness and peace through an interplay of warm and cool tones. The palette consists of muted fields like off-white and dust gray for calmness, with sharper accents in compressed red and dark navy to convey tension. The layout, eroded symmetry, emphasizes a central clash of unease and serenity, created by the shatter pattern leaking into the constellation pattern. The broken pixels introduce subtle chaotic interruptions, symbolizing the intrusion of anxiety within peaceful moments. The resulting arrangement evokes a sense of dynamic movement and stillness coexisting within a confined space.</desc>
