<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tear of Connection</title>
  <desc id="desc">The artwork reflects the emotional tug-of-war between loneliness and connection. The palette—consisting of burnt orange and dark red—conveys warmth and intensity, juxtaposed with charcoal for weight and gold hints for moments of connection. The patterns symbolize connection through clustered dots representing emotional proximity, while the voids represent loneliness. This interplay creates a cascading effect where colors seem to rain down, suggesting both togetherness and isolation. The top-weighted layout emphasizes density above, mirroring the pressure of external expectations versus internal emotion as the colors collide and echo—a representation of the hidden vs. exposed theme.</desc>
