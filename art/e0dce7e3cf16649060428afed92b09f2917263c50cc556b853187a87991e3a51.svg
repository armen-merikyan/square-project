<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This artwork embodies the tension between tenderness and rage through saturated and muted colors, with a central focus that echoes protection while being surrounded by contrasts. The palette of red and pale blue creates a visual play that delineates areas of soft contact against sharp ruptures, representing the emotional collision of the seed's themes. The arrangement features a deliberate interruption in the layout, allowing for visual ‘leaks’ around the edges, enhancing the sense of contrast. The central area is more saturated, symbolizing rage, while the edges host more muted hues, reflecting tenderness and forgiveness. The patterned flow spirals counterclockwise, inviting the viewer to navigate through this emotional landscape.</desc>
