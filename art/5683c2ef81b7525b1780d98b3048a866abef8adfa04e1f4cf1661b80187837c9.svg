<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure within Shelter</title>
  <desc id="desc">This piece embodies the tension between vulnerability and protection, using a palette that contrasts soft, warm tones against a cold, pale background, symbolizing the fragility of safety in the face of exposure. The arrangement creates an echo of tension, with more saturated colors clustering toward the edges, representing safety, while the center is left more open, suggesting exposure. The collisions manifest at the left side of the square where warm tones intersect with the cooler white to create a sense of both comfort and anxiety, forming a delicate balance that reflects the emotional weight of the duality expressed in the seed.</desc>
