<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork captures the tug-of-war between defiance and submission. The palette of hot coral, blood orange, and dusty pink asserts vibrancy against shades of charcoal, representing resistance and intensity. The bright cluster in the center contrasts with a darker field across the edges, illustrating a struggle between openness and enclosure. The elements collide through 'threshold' and 'broken_dots' patterns, representing the interplay between strength and vulnerability. The broken pixels disrupt uniformity, suggesting emotional scars and imperfections that emerge from conflict. The diagonal rise in flow signals a subtle ascension from subdued chaos towards a spark of vibrant resistance.</desc>
