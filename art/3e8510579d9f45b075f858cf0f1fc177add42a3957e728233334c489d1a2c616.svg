<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Pulse</title>
  <desc id="desc">This composition embodies the emotional tension between clarity (signal) and chaos (noise). The palette features deep navy and black as the predominant background colors to suggest isolation, while dim cyan and white act as bright accents that represent the rare moments of clarity emerging within the noise. The layout spirals to an off-center pulse, creating a focal point that feels both inviting and constraining—mirroring the struggle between exposure and shelter. The main collision occurs at the center with a lattice pattern interspersed by erratic 'embers' of static noise, symbolizing broken memories and fleeting connections amidst chaos.</desc>
