<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order and Rupture</title>
  <desc id="desc">This artwork captures the emotional tension between joy and grief, manifesting as a pattern where order meets chaos. The palette of warm yellow and deep blue suggests joy and grief respectively, creating a vibrant contrast. The center focus introduces the tiny cross motif, surrounded by a burst of spark-like patterns indicative of joy, breaking into a fragmented field resembling grief on the left. The use of broken pixels adds intentional imperfection, enhancing the feeling of unresolved emotion. Ultimately, this piece invites the viewer to navigate the interplay of structured joy against the backdrop of fragmented grief.</desc>
