<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This artwork conveys the tension between control and surrender using a bold juxtaposition of dark and bright colors, representing the collision of contained pressure and soft yielding. The palette features deep blacks and vibrant electric blues, suggesting a landscape of intense emotional conflict. The center, filled with magenta, symbolizes the overflowing essence of emotion, while the density of black at the corners encases this vibrant chaos, creating a sense of boundary and release. The stuttering pattern of braid and ripple evokes a sense of disruption, hinting at the struggle between maintaining control and the desire to let go, effectively capturing the essence of the seed.</desc>
