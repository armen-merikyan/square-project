<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Shadows</title>
  <desc id="desc">This piece embodies the emotional conflict between defiance and submission through contrasting colors and patterns. The warm, vibrant tones of burnt orange and gold represent defiance, clustered in the center as bright accents. The darker charcoal and dark red hues symbolize submission, creating a protective border. The broken pixels introduce imperfection and echo the tension, while the layout of 'last_light' allows a small bright area to remain active amidst a largely subdued field, inviting contemplation of the collision between energy and stillness.</desc>
