<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotion's Edge</title>
  <desc id="desc">The emotional tone weaves through a clash of joy and grief, realized through the warm and bright hues of yellow and orange against deep blue and muted purple. The palette juxtaposes light and shadow, suggesting an emotional horizon; the bright colors pulse and break through a grid of darker tones, embodying the tension of joy being overshadowed by grief. The pattern embodies 'broken dots' juxtaposed with heavy, 'rain-like' textures, creating a narrative of conflict, with the main collision happening in the center where the brighter yellows spread into the darker elements—suggesting hope amidst sorrow. The jagged edge style introduces an element of disruption, perfectly cementing the theme of love's betrayal.</desc>
