<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece captures the emotional tension between rage and calm, using a palette of red, black, pale blue, and white to represent these contrasting feelings. The use of pulse marks in red bursts through more tranquil blue horizontal flows, suggesting an explosive conflict at the center while leaving some negative space to symbolize calm. At the edges, a hard boundary emphasizes the struggle for containment against overflowing emotion.</desc>
