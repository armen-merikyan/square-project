<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The artwork contrasts vulnerability with strength through layers of color that suggest protection and exposure. The palette of clean white and ice blue evoke lightness and safety, while the darker hues of ink black and violet gray add depth and weight. The broken pixels introduce a sense of imperfection, emphasizing vulnerability. The main collision occurs in the center, where lighter threads intertwine with heavier sparks, creating a dynamic interplay between the two emotional states that is reflective of the seed's theme.</desc>
