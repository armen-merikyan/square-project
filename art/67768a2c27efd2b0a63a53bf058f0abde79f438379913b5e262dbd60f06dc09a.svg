  <title id="title">Fractured Shelter</title>
  <desc id="desc">The emotional tone echoes the tension between vulnerability and strength, illustrated through a soft, pale center surrounded by strong, dark edges. The palette of shelter green, warm brown, and pale skin softens the intensity, while cold white and open blue accentuate moments of exposure. The main contrast arises from the collision at the center where the noise-patterned vulnerability meets the structured stepwell of strength, creating a tension that evokes both fragility and resilience.</desc>
