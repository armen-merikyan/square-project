<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Containment</title>
  <desc id="desc">This artwork explores the emotional tension between desire and restraint through a juxtaposition of warm and muted colors. The chosen palette combines deep reds and blacks to convey desire against a backdrop of muted creams and cool grays representing restraint. The layout features a narrow negative space cutting through clusters of color, emphasizing both the pressure of emotion and the quiet containment. The main collision of colors occurs at the center where the warm tones pulse against the cooler background, highlighting the struggle between overwhelming desire and the bounds of restraint. Broken pixels introduce imperfections, suggesting emotional scars. The overall composition acts as a visual metaphor for this emotional tug-of-war, encapsulating the spiral of pressure and release inherent in love and betrayal.</desc>
