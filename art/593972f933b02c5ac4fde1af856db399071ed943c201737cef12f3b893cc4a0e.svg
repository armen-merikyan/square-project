<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Flame and Weight</title>
  <desc id="desc">This composition captures the emotional contrast of joy and grief using vibrant orange and yellow tones on the left for joy, presented through a flame pattern, while the right side embodies grief with a muted blue-purple checker pattern. The upper half uses lighter colors that evoke uplift and warmth, while the lower half with deeper tones suggests heaviness and reflection. The jagged edges introduce a feeling of chaos, representing the inner conflict between the two emotions—revealing and concealing aspects of the human experience. The palette is intentionally chosen for its warm (joy) and cool (grief) elements, highlighting the duality while maintaining an abstract rhythm that invites reflection.</desc>
