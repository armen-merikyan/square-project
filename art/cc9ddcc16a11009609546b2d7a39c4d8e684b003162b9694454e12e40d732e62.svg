<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone reflects a struggle between defiance and submission, represented through the tension of contrasting colors. The palette of muted creams, dark plums, and vibrant accents of red and orange creates a dynamic interplay. The stark black serves as the dominant background, symbolizing heavy submission, while bright shards of color ripple through as marks of defiance, forming a chaotic yet structured rhythm. The collision occurs primarily at the center, where the bright colors push against the surrounding darkness, suggesting a struggle for dominance. This results in a visually engaging pattern that captures the essence of the seed's emotional dichotomy while maintaining an abstract quality.</desc>
