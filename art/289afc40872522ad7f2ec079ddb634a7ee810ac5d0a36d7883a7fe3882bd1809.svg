<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition embodies the emotional tension between desire and emptiness. The color palette transitions from vibrant warm tones (hot coral, blood orange) that symbolize desire, to muted blues and grays (charcoal, hollow blue) representing emptiness. The layout starts from the corner, depicting an invasion of desire, which struggles against a boundary created by cooler colors, thus evoking a sense of containment. The main collision occurs where the warmer tones meet the cooler edge, drawing the eye and emphasizing the emotional struggle. Broken pixels introduce imperfection, suggesting leaks in restraint. Negative space balances the piece, illustrating the quiet pull of emptiness. Overall, the grid captures the essence of longing and limit, a reflection of inner conflict.</desc>
