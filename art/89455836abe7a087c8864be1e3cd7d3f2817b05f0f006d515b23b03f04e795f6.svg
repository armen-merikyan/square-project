<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This piece explores the tension between desire and emptiness through the use of a split horizontal layout. The top half, embodying desire, is rendered in a warm palette of saturated tones, with colors like hot coral and blood orange radiating a sense of energy and pull. In contrast, the bottom half reflects emptiness through muted hues and a target pattern, suggesting a withdrawal and isolation. The collision occurs at the center of the composition, where vibrant radial patterns encounter the spacious, low-saturation target areas, creating a vivid tension. The broken pixels intentionally disrupt the flow, echoing the themes of pressure and restraint.</desc>
