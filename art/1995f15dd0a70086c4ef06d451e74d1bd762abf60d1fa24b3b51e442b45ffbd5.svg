<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This piece embodies the tension between desire and restraint, using a palette that echoes deep emotional currents. The dark reds and muted tones symbolize the weight of unspent desire, contrasted with lighter, sporadic colors that represent fleeting hope or moments of brightness amid restraint. The central collision occurs as saturated colors vie for visual presence against sealed edges, portraying a feeling of pressure building against barriers. The crosshatch pattern representing desire clashes with the flood of restraint, making space for visual tension that doesn't resolve.</desc>
