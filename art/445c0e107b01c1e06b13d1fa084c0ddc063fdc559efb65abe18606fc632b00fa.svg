  <title id="title">Fractured Balance</title>
  <desc id="desc">This artwork explores the tension between love and betrayal, using a palette that symbolizes warmth (pink, red) alongside coolness (gray, dark maroon). The central structure showcases broken symmetry, reflecting the emotional clash. The contrasting colors flow in zigzag patterns, portraying the chaotic interactions of these emotions, while negative space emphasizes feelings of loneliness amid connection. The edge style ‘broken edges’ reinforces the idea of fragmentation, making the narrative compelling without literal representation.</desc>
