<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Dissonance</title>
  <desc id="desc">This artwork captures the tension between clarity and confusion through a nearly symmetrical layout marred by deliberate imperfections. The palette of black, dark violet, soft gold, and pale green evokes feelings of fear and hope, suggesting a nuanced emotional landscape. The contrast between the stark blacks and luminous gold creates an impactful collision, symbolizing moments of clarity that pierce through confusion. The broken pixel placements introduce a rhythmic pulse to the piece, embodying the seed's emphasis on interruption and change. The rhythmic patterns echo the struggle between order and chaos, making the viewer reflect on their emotional responses.</desc>
