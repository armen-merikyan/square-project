<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Elements</title>
  <desc id="desc">This abstract artwork captures the emotional interplay between vulnerability and strength, illustrating how these opposing forces coexist. The palette, featuring ice blue and violet gray, embodies fragility and the coolness associated with vulnerability, contrasted by the deep ink black representing strength. The layout mimics stacked bands, creating density which reflects pressure while allowing pockets of clean white and warning orange to break through, symbolizing moments of clarity within the chaos. The central collision occurs in the upper half, where darker, denser colors interact with lighter hues, creating a dynamic tension that resonates with the idea of the inner struggle of emotions.</desc>
