<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Stillness</title>
  <desc id="desc">This composition captures the emotional dichotomy of restlessness and peace through its color palette and arrangement. The use of cosmic indigo and deep teal embodies a sense of serene depth, while the cold gold and stark contrasts of void black introduce disruptive elements that represent restlessness. The main collision occurs diagonally across the square, where the peaceful hues meet the unsettling tones, creating a visual dialogue that echoes the themes of movement against stability, memory against the present moment. The broken pixels scattered throughout add intentional disruptions, enhancing the feeling of unsettled energy while still maintaining a gentle balance on the edge of chaos.</desc>
