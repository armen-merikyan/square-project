<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This piece embodies the tension between defiance and submission through contrasting color blocks and patterns. The deep blue and mourning black dominate the canvas, representing the strong presence of defiance. In contrast, pale yellow and the softer stone evoke submission, creating a battle of emotions. The collisions occur in the center where the angular mirror pattern interlaces with softer dots, suggesting confrontation and coexistence. The uneven border and broken pixels enhance the sense of chaos and imperfection, reflecting the discord inherent in the emotional struggle.</desc>
