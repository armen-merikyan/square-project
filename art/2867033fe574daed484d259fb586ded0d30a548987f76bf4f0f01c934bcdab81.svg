<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow and Containment</title>
  <desc id="desc">The emotional tone is a deliberate tension between the fury of rage and the serenity of calm. The palette features intense reds against soft pale blues, reflecting the struggle between hot and cool emotions. The central conflict occurs in the top left corner, where angry red flood patterns intercept the calm, crosshatched blues, creating visual noise in an otherwise quiet field. The seed inspired a clash of dense clusters and reserved spaces, leading to a structured yet chaotic abstract arrangement where one emotion's urgency disrupts the other's tranquility.</desc>
