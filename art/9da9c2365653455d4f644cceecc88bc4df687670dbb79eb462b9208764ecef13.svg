<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Emotions</title>
  <desc id="desc">The emotional tone reflects the struggle between emptiness and desire. A palette inspired by burned surfaces—burnt orange, dark red, charcoal, and gold—introduces warmth and depth alongside cool contrasts. The 8x8 canvas is designed with order vs chaos in mind, creating a tension where structured shapes collide with jagged breaks. The first four rows embody the warmth of desire while the last four express emptiness through shattered patterns, allowing the viewer to experience the conflict dynamically as the colors spiral clockwise and interplay across the grid. By leaving negative space strategically, it emphasizes the contrasting feelings, echoing the unresolved nature of desire against the backdrop of emptiness.</desc>
