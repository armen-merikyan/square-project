<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Resilience</title>
  <desc id="desc">This artwork captures the emotional tension of vulnerability and strength through a blend of soft and strong colors. The outer frame of deep greens and browns represents shelter and strength, while a pale center echoes vulnerability, giving a lightness contrasted against the denser, darker edges. The layered patterns (ring and stepwell) create interruptions, symbolizing moments of exposure amidst security, while the careful placement allows for a gentle visual flow from the center to the edges, suggesting both safety and exposure. This duality comes to life through the contrasting color palette, which emphasizes the themes of the seed.</desc>
