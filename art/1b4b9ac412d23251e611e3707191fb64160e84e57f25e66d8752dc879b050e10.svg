<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragile Strength</title>
  <desc id="desc">This composition explores the emotional dichotomy of vulnerability and strength through color placement. A warm yet grounded palette of burnt orange and dark red suggests strength, while charcoal and gold depict exposed sensitivity. The layout initiates in the corner, with pulse marks representing strength invading the territory of the shatter pattern representing vulnerability, thus creating a dynamic tension in the center. The hard edges establish structure against the flowing forms, while broken pixels introduce a sense of imperfection and organic disruption, mirroring the collision of emotions inherent in the seed's narrative.</desc>
