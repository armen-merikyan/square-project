<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Dissonance</title>
  <desc id="desc">This composition expresses the tension between trust and suspicion, using a palette that balances warm and cool tones. The darker hues represent suspicion, while the lighter shades evoke trust. The main collision occurs diagonally across the square, where the darker colors create a pressure border, framing the softer areas of muted cream. This sectional division leads to a visual representation of push and pull, symbolizing the emotional dynamics at play. The overall flow suggests fracture and interruption, reflecting the continuous struggle between clarity and noise. The intentional broken pixels introduce an element of imperfection, resonating with the theme of resilience amidst fragility.</desc>
