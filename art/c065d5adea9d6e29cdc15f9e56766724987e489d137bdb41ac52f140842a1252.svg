<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Breaking Tides</title>
  <desc id="desc">The composition explores the interplay between vulnerability and strength, illustrated through a contrasting palette of reds, pinks, and grays. The soft threshold patterns signify vulnerability with gentle, lighter tones, while the deep reds and dark maroon stripes convey strength. The dense center, symbolizing strength, is surrounded by a quieter negative space denoting vulnerability, allowing visual tension to arise from their collision. The zigzag flow adds an element of unease, while broken pixels create intentional disruptions to mirror the themes of fragmentation and resilience.</desc>
