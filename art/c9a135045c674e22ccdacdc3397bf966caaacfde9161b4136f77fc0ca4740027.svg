<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Clarity</title>
  <desc id="desc">This piece embodies the struggle of a clear signal trying to emerge from a chaotic noise. The outer border, a constellation of dark strokes, represents the noise—static gray and dead black colors create a heavy barrier. In the center, an electric blue grid breaks through, suggesting a distinct format that represents the signal, while hot magenta accents interrupt, providing rhythm and emotional tension. The diagonal flow hints at movement and struggle, as the contrasting patterns engage in an ongoing fight for space. This layout evokes emotions of both chaos and clarity, mirroring the tension within the seed's thematic elements of noise and signal.</desc>
