<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb &amp; Flow</title>
  <desc id="desc">This piece explores the emotional tension between desire and emptiness. The palette of burnt orange, dark red, charcoal, and gold reflects warmth juxtaposed against cooler shades, illustrating the longing and void inherent in the theme. The contrasting left and right halves represent the push and pull of desire (warm colors) and emptiness (cool colors). The arrangement includes broken pixels to signify imperfection, while the soft edges help convey a sense of vulnerability. The central collision happens where warm and cool colors interact, creating a visual echo that embodies the complexity of longing and loss. This abstract pattern reflects the tumultuous nature of human emotion without literal representation.</desc>
