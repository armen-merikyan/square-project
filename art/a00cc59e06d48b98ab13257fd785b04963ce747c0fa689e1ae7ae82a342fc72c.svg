<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Stillness and Force</title>
  <desc id="desc">The emotional tone conflicts between quietness and pressure, reflected in the color palette. The off-white and faint peach offer a soft field representing tranquillity, while dark navy and compressed red create tension and density. The layout emphasizes a quiet center with bursts of pressure at the borders, suggesting a struggle between calm and disruption. This reflects the seed's themes of hard edges meeting a soft horizon in an abstract dance of color and form.</desc>
