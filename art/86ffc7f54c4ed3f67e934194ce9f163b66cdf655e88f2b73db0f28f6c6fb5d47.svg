<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Embrace</title>
  <desc id="desc">The emotional tone contrasts the warmth of love with the coldness of betrayal. The palette combines soft pinks and reds to represent love, contrasted sharply with the dark maroon and gray symbolizing betrayal. The stark juxtaposition of colors creates a dissonance, with pressure building in the upper half against a calmer lower half, echoing the conflict between internal warmth and external coldness. The edge style implies burnt or brokenness, enhancing the fractured tension of the piece, while the patterns of raindrops and broken dots add texture, suggesting a complex emotional atmosphere.</desc>
