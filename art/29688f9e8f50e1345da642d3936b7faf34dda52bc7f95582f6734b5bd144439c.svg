<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shade</title>
  <desc id="desc">This composition captures the emotional contrast of joy and grief. The palette includes bright yellows and oranges that symbolize joy, interspersed with deep blues and muted purples representing grief, creating a dialogue between light and weight. The left side holds the warmth of joy with cracked patterns, while the right side adopts a flame motif for grief, smoothly colliding with the brighter forms, reflecting the emotional upheaval of this duality. The structured vertical layout emphasizes the split while still holding the tension in an overall balanced yet dynamic composition.</desc>
