<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Exposure</title>
  <desc id="desc">This artwork reflects the duality of softness and severity—its palette captures both with gentle powder pinks contrasted by the sharpness of carbon black. The layout emphasizes an overfilled center where colors collide, creating a dynamic push-pull tension. The predominant use of warm white and soft pink suggests softness, while the dark hues introduce severity. This contrast dominates the center, evoking a feeling of being surrounded yet exposed—encapsulating the emotional complexity of the seed's themes of vulnerability and protection.</desc>
