<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Time</title>
  <desc id="desc">This artwork explores the emotional contrast between nostalgia and progress through its color palette and layout. The darks embody the depth of nostalgia while lighter shades signify the starkness of progress. The split horizontal layout emphasizes the conflict, with dense crosshatch patterns for nostalgia confronting dotted patterns for progress. There is a sense of bottom weight, suggesting a fight for equilibrium. The arrangement creates tension with sudden interruptions of color, echoing the emotional narrative of a dynamic relationship between memory and advancement.</desc>
