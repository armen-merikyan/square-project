<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition embodies the tension between spark and ash, showcasing a vibrant palette battling against muted tones. The warm browns and shelter greens symbolize grounding and restraint, while the pale skin and open blue represent scattered light and bursts of energy. The main collision occurs at the center, where warm embers (represented by oranges and yellows) break through the cooler halo of ash, creating an emotional push and pull. The jagged edges intentionally disrupt the flow, reflecting the rawness of memory against erasure.</desc>
