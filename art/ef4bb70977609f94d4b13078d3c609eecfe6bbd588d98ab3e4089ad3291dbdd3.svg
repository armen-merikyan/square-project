<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Duality</title>
  <desc id="desc">This composition embodies the emotional tension between desire and restraint. The top four rows represent desire with a saturated and vibrant palette featuring reds and oranges, symbolizing passionate urges. The bottom rows embody restraint using muted cremes and grayers, depicting calmness and control. The central contrast lies where both emotions collide, suggesting a battle between the heating glow of desire and the cooling touch of restraint. The patterns interplay through mirroring and ash fields, creating an illusion of depth and complexity, inspired by spiral pressures that give a sense of movement and instability within a structured grid. Broken pixels create intentional disruptions, enhancing the feeling of conflict and imperfection in this emotional landscape.</desc>
