<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition articulates the emotional tension of 'emptiness vs desire' through a clash of saturated colors that represent cravings against muted backgrounds that evoke stillness. The cooler shades of charcoal and hollow blue, interspersed with sharp bursts of hot coral and blood orange, illustrate desire's pull while echoing the quiet restraint of emptiness. The intentional placement of broken pixels introduces a subtle imperfection, suggesting the impact of desire that disrupts empty spaces. The collision predominantly occurs in the center, where vibrant elements invite attention yet remain contained by darker edges, enforcing the contrast of abundance against absence.</desc>
