<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">The emotional tone reflects a struggle between defiance and submission, where bold contrasts in color represent the pressure of opposing forces. The palette of red, pink, gray, and dark maroon encapsulates love and betrayal, creating a visceral connection. Key contrasts arise in the central weights of color, where the dark maroon pixels collide with brighter shades, indicating the weight of emotion interspersed with lighter, more fragile elements. The mirror-broken layout creates an echo of both tension and calmness, disrupted by intentional flaws, reinforcing the theme of instability within closeness. This abstract composition visually narrates conflict within connection, capturing the essence of the seed.</desc>
