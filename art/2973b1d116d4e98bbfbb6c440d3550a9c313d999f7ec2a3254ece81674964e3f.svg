<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This piece explores the dynamic tension between panic and control. The palette of electric blue, lime, magenta, and black creates a stark contrast that captures the emotional turbulence implied in the seed. The upper half of the square flows upward in a chaotic striped pattern representing panic, while the lower half features a controlled checker pattern, representing stability. The rows contain deliberate interactions of these contrasting emotions, with broken pixels to represent imperfections and disturbances. The composition leaves ample negative space to enhance a sense of unresolved emotional tension, mirroring the push and pull of conflicting feelings.</desc>
