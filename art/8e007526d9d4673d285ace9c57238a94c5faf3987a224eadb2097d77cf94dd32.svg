<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shattered Affection</title>
  <desc id="desc">The art captures the emotional turbulence of love and betrayal through contrasting textures and colors. The warm pinks and reds represent love, while the darker maroons and grays signify betrayal, creating a tension that flows diagonally across the canvas. The pattern of broken and paired shapes mirrors the idea of a distorted symmetry, embodying both the affection and pain. The placement of colors allows for a rhythm of rising warmth interrupted by cool shadows, symbolizing the complexities of relationships.</desc>
