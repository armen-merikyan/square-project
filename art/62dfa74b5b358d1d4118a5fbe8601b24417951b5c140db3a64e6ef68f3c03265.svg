<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Cross Currents of Emotion</title>
  <desc id="desc">This composition embodies the tension between longing and resolve. The palette features soft, muted colors like pale mint and storm gray, interspersed with accents of faded gold to represent moments of clarity and hope amidst chaos. The checker pattern of longing collides with the constellation pattern of resolve, illustrating the juxtaposition of closeness and distance. The main collision occurs diagonally through the center, emphasizing a progressive movement from chaotic markers of longing to steadier patterns of resolve. Negative space emphasizes the feeling of searching and yearning for connection.</desc>
