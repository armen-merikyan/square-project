<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Resilience</title>
  <desc id="desc">The emotional tone captures the stark contrast between the vitality of 'spark' and the remnants of 'ash', suggesting a dialogue between presence and absence. The chosen palette of sepia, tan, dust gray, and faded blue conveys soft decay against sporadic bursts of brightness, echoing forgotten memories and sudden insights. The main contrast occurs diagonally, where vibrant 'spark' colors collide with muted 'ash' tones, mirroring the tension of memory versus erasure. The broken pixels introduce intentional imperfections, symbolizing the fragmented nature of these emotions, while still preserving an overall abstract coherence that invites contemplation.</desc>
