<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Emotions</title>
  <desc id="desc">The emotional tone of this artwork is rooted in the tension between envy and gratitude, creating a dynamic interplay of heavy and light. The selected palette incorporates deep blacks and rich dark violets to reflect the weight of envy, while soft gold and pale green invoke feelings of gratitude. The arrangement features a preference for asymmetry with heavier colors concentrated towards one edge, representing the dominant emotion, while the other edge remains lighter, signifying release. The patterns—noisy for envy and maze-like for gratitude—intertwine, creating a zigzag rhythm that echoes the complexities of these emotions. Broken pixels introduce a chaotic layer that highlights the fragility of balance. This composition resonates as an abstract reflection of contrasting emotional states, balanced by negative space to avoid overwhelming perception.</desc>
