<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a conflict between the saturated pull of desire and the muted containment of restraint. The palette combines warm, rich colors like red oxide and small orange which resonate with desire, contrasted against the cool, dark shades of blackened plum and iron gray that signify restraint. The center of the square is dense with rich colors representing desire, while the edges feature lighter, muted tones to indicate the sealed boundary of restraint. The spiral flow interjects through the pattern, suggesting a dynamic tension between these emotions, making the composition feel alive yet constrained.</desc>
