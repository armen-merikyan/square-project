<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This composition explores the emotional dichotomy of desire and emptiness through a vivid palette that contrasts warmth with coolness. The bright colors represent desire, creating an energetic pulse, while deeper shades illustrate feelings of restraint and emptiness. Notably, the central cluster of warm tones collides with the calmer edges, emphasizing a spiraling tension. Broken pixels introduce an imperfect, raw edge, echoing the struggle between overflow and containment. This piece embodies the push-pull dynamic of yearning amid boundaries.</desc>
