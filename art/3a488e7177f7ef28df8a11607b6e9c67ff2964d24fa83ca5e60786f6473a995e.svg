<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Turbulence</title>
  <desc id="desc">This artwork reflects the dynamic tension between restlessness and peace, presented through a gradient of contrasting emotions. The palette combines pale aqua and mist gray for calmness, contrasted with alarm red and ink blue to evoke urgency and chaos. The primary collision occurs diagonally, suggesting a pathway where serenity is constantly disrupted by sudden bursts of red, akin to an ember’s flicker against the backdrop of calm. The broken pixels introduce imperfections, mimicking the noise in memory, while the negative space around enhances the feeling of both isolation and open reflection, emphasizing the struggle between two emotional states.</desc>
