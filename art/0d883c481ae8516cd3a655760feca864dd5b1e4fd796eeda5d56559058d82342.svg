<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tides of Contrast</title>
  <desc id="desc">The emotional tone emphasizes a struggle between the dense pressure and stark quietude. The palette, featuring muted shades like off-white and dust gray, leans towards the quiet aspect, while compressed red introduces punctuated points of sharp contrast, symbolizing bursts of intensity. The main collision occurs diagonally from the bottom left to the top right, where the denser colors coalesce, creating a tension that feels almost alive, while soft colors recede, providing a sense of air. The seed's duality is expressed through the patterns of pressure framing the quiet cracks, illustrating the interplay of emotions.</desc>
