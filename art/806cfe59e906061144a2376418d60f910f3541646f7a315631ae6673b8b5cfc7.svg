<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Disrupted Harmony</title>
  <desc id="desc">This artwork captures the tension between signal and noise through a carefully curated palette of vibrant and muted colors. The use of electric blue and hot magenta as dominant colors represents clarity and disruption, respectively, contrasting beautifully with static gray and dead black to reflect interference. Each pixel placement is intentional, with broken pixels included to symbolize interruptions in the expected flow. The main contrast, centered in the grid, creates a visual pulse that oscillates between clarity and chaos, embodying the themes of exposure versus shelter, echo, and memory. The layout encourages movement from right to left, enhancing the feel of a dynamic conversation between the elements.</desc>
