<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone contrasts the fleeting ignition of 'spark' with the settled ash from a previous fire. This composition combines vibrant bursts of color with muted tones representing restraint. The chosen palette features black and dark violet to convey depth and weight, while soft gold and pale green introduce warmth and hope. The center is densified with bright gold accents, while darker edges struggle to contain it, reflecting an internal conflict. The collision of 'shatter' against 'echo' creates visually dynamic interactions, emphasizing tension and release within the confined square. Broken pixels disrupt symmetry, adding imperfections that suggest resilience amid fragility.</desc>
