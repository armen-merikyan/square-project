  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork captures the emotional tension between rage and calm. The palette blends bright reds, black, and calming pale blues and whites. Deep reds and blacks dominate the center, symbolizing rage, while cooler tones form a restraining border, representing calm. The edge style introduces sharp interruptions, mimicking corner sparks that create friction. The stepped patterns of rage collide with the soft veils of calm, manifesting the duality expressed in the seed.</desc>
