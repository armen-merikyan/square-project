<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shattered Affection</title>
  <desc id="desc">The composition explores the emotional tension between love and betrayal through contrasting colors and textures. The palette incorporates warm pinks and reds, symbolizing love, contrasted by deeper gray and dark maroon tones representing betrayal. Main conflicts arise in the center with brighter colors clashing against duller shades, creating a push and pull. This reflects feelings of warmth being undermined by coldness, mirroring the seed's themes of inside versus outside and broken symmetry. The crosshatch pattern indicates the complexity and noise within relationships, while the inclusion of 'broken pixels' symbolizes imperfection and emotional disruptions.</desc>
