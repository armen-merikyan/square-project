  <title id="title">Hunger and Restraint</title>
  <desc id="desc">The emotional tone reflects a dynamic tension between the desire to overflow and the inherent containment of the space. The palette incorporates warm hues of hot coral and blood orange to symbolize desire, while hollow blue and charcoal suggest emptiness. The collision is concentrated in the top left corner, where the vibrant colors band together, contrasting against the softer and cooler tones that spread across the rest. This layout disrupts the ordered feel, echoing the themes of pressure and quiet struggle, leading to a rich, abstract narrative of push and pull.</desc>
