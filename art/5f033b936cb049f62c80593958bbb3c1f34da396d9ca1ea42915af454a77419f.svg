<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Signal</title>
  <desc id="desc">The emotional tone reflects a tug-of-war between trust and suspicion, depicted through a palette that juxtaposes warm and cool hues to capture tension. The colors—charcoal for grounding, hot coral and blood orange for warmth, and dust pink for softness—emphasize the contrast between light and shadow while retaining a somber mood. The main collision occurs in the central area where clusters of warm colors disrupt the cooler, more static background, symbolizing the struggle between hope and hesitation. This layout, where dim space meets vibrant clusters, echoes the dynamic between trust's stability and suspicion's erratic nature.</desc>
