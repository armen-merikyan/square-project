<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece explores the emotional dichotomy of rage and calm through a contrasting palette. The vibrant red signifies the intense emotion of rage, while the soft pale blue represents calm. The collision occurs in the center where the fiery jagged patterns of red invade the obedient dot patterns of blue, creating a tension that embodies the struggle between frustration and tranquility. The visible imbalance, with a high concentration of red, illustrates an overflow of emotion against the backdrop of containing calm, giving the composition an unsettled yet dynamic quality.</desc>
