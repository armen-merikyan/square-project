<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Near vs Far</title>
  <desc id="desc">This artwork captures the emotional tension between longing and resolve through its contrasting color patterns and composition. The warm sepia and faded blue hues convey a sense of yearning and reflection, while the tan and dust gray create a grounding force reflecting a more resolute state. The sharpness of the lattice against the softness of the stair-like structure highlights the collision of these emotions. The central tension is accentuated by the distribution of colors, creating a visual pulse that feels both urgent and serene. Broken pixels intentionally disrupt the flow, suggesting imperfections and the 'mirror broken' theme of the seed, inviting the viewer to engage with unresolved feelings and memories.</desc>
