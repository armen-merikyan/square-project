<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone explores the dichotomy between softness and severity, reflected in the contrasting use of a warm palette and dark accents. The gentle powder pink and warm white represent softness, while the carbon black and sharp crimson bring in a sense of severity. The central focus is a subtle halo of softness, disrupted by severe dark pixels, creating tension where light and dark collide. The pattern merges 'dots' of softness with the 'negative cross' of severity, emphasizing vulnerability amid starkness. The layout centers on a hollow area encircled by heat and contrast, sustaining an evocative tension throughout the grid.</desc>
