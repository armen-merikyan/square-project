<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Stillness</title>
  <desc id="desc">This composition explores the emotional contrast between longing and resolve through a nuanced palette that embodies resilience and fragility. The moss green (#7D9A63) and stone gray (#7D7878) create a backdrop of calm, representing resolve, while bursts of bone white (#E8D9C2) and rust (#A04E3C) act as accents symbolizing longing and urgency that interrupt the quiet. The piece features a rich center defined by broken pixels that add intentional imperfections—emphasizing the theme of repair against damage. The collision occurs where the lighter colors create dynamic tension against the darker backgrounds, suggesting a fragile interplay of emotion and structure.</desc>
