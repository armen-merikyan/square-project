<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Stillness</title>
  <desc id="desc">This artwork embodies the emotional tension between defiance and submission. The palette, featuring deep navy, stark black, and dim cyan, represents a quiet yet persistent struggle against noise—a pulse of life amidst chaos. The black squares form the dominant central area, symbolizing the unmoved and strong core of defiance, while the cyan and white patches represent fleeting moments of submission, gently pushing outward. Broken pixels disrupt the edges, emphasizing the imperfection of both emotions. The zigzag flow across the bands echoes a rhythmic heartbeat, capturing the essence of conflict and resolution—an abstract representation of emotional layers and the push-pull of existence.</desc>
