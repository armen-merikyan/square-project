<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Reflection</title>
  <desc id="desc">This piece explores the emotional tension between envy and gratitude, rendered through contrasting color choices. The palette combines the vibrancy of lime and electric blue with the heaviness of black and magenta. The central collision occurs where bright lime pixels confront the surrounding dark mass, suggesting a struggle between lightness and weight. The pattern of jagged edges and zigzag flow disrupts any symmetry, embodying the emotional push-pull of the seed text. The strategic arrangement maintains over 10% negative space, echoing the idea of unresolved emotions, where what is left unsaid holds weight.</desc>
