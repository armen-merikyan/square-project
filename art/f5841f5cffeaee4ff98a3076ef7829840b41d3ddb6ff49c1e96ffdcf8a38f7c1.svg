<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Dread</title>
  <desc id="desc">The emotional tone of this piece oscillates between dread and relief, embodied by a stark contrast between dark and light colors. The palette shifts from deep navy to bright white, symbolizing the weight of anxiety versus the lightness of comfort. The layout emphasizes a split, with the left side featuring dense crosshatch patterns in darker shades, while the right side showcases lighter, airy crosshatches that suggest relief. The collision occurs at the center, inviting tension and a feeling of interruption. The seed's influence is seen in the asymmetry and breathability created, as if navigating a staircase in a cracked room, leading the viewer up and down emotionally while offering both weight and lift.</desc>
