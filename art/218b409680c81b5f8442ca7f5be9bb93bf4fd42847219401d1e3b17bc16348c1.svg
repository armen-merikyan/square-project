<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Convergence and Divergence</title>
  <desc id="desc">The artwork captures the emotional tension between joy and grief, embodying their juxtaposition through a contrast of warm and cool hues. The center is punctuated with a deep blue, representing grief, while vibrant yellows and oranges radiate outward, signifying joy. This creates a pulse effect, where the eye moves from the dense center outward into more open space. The checker patterns represent grief’s weight, while the noise of joy contrasts sharply, leading to feelings of fragmentation and resolution in the outer edges. The broken pixels disperse the rigid structure, enhancing the emotional complexity of love betrayed, suggesting a sense of imbalance amid the vivid emotional landscape.</desc>
