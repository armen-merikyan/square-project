  <title id="title">Tension of Yearning</title>
  <desc id="desc">The emotional tone explores the conflict between longing (desire) and limitation (restraint). The palette combines hot coral and blood orange, representing desire with vibrant warmth, contrasted against muted charcoal and hollow blue, symbolizing the presence of restraint. The main collision occurs in the center as saturated circles of warmth push against a lattice of subdued tones, suggesting a struggle. This grid layout creates a dynamic tension that embodies the spiral pressure implied by the seed, with an emphasis on flows of color meeting at center points, echoing love's contradictions.</desc>
