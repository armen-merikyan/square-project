<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This square encapsulates the emotional duality of desire and restraint, conveyed through a palette that balances warmth and coolness. The use of rich reds and muted creams signifies the intensity of longing against the stark contrast of deep purples and grays, representing the binding feelings of restraint. The arrangement forms a spiral that draws the eye inward, reflecting the pull of desire while remaining bounded at the edges, symbolizing limited freedom. The main collision occurs at the center with saturated colors bleeding into muted tones, creating a palpable tension that resonates throughout the piece.</desc>
