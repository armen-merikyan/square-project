<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This composition explores the emotional tension between tenderness and rage through contrasting color patterns. The upper four rows feature a halo pattern of soft blues and whites representing tenderness, while the lower four rows utilize a frame of deep reds and black to evoke the tumult of rage. The collision occurs in the middle where both patterns intersect, creating an echo of emotional conflict. The saturated colors clash with muted tones, demonstrating the inner struggle, while broken pixels provide a textured imperfection mirroring human complexity.</desc>
