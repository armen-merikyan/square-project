<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Time</title>
  <desc id="desc">The emotional tone reflects the struggle between nostalgia and progress. The palette of sepia, tan, dust gray, and faded blue evokes a sense of memory contrasting with forward movement. The top half muted and soft, suggests nostalgia's gentle pull, while the bottom bursts with fragmented progress in the form of broken dots amid a strong grid, creating a visual tension. The edges bleed into each other, symbolizing the complex interplay of fullness and emptiness in memory versus aspiration, while allowing for negative space to enhance the feeling of weight and release.</desc>
