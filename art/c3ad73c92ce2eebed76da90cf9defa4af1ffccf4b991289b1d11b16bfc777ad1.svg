<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork explores the emotional tension between safety and exposure. The chosen palette of 'shelter_green', 'warm_brown', 'pale_skin', 'cold_white', and 'open_blue' reflects softness and severity, creating an atmosphere of dynamic contrast. The dominant use of warm browns aligns with the concept of safety, creating a comforting barrier, while the pale skin and cold white evoke a sense of exposure at the center. The central collision between light and dark colors represents the tension of transition, creating a rhythm that flows like waves of emotional pressure. The quiet channel layout adds an element of negative space that emphasizes vulnerability at the heart of the composition, while the rhythm of the pulse marks speaks to the ebb and flow of protective versus exposed sentiments.</desc>
