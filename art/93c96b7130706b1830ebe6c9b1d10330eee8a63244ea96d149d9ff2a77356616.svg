  <title id="title">Collision of Stillness</title>
  <desc id="desc">This piece embodies the conflict between restlessness and peace through a contrasting palette. The warm tones of burnt orange and gold evoke tension, while the darker shades of charcoal and dark red symbolize the encroaching pressure. The main collision resides at the center, where organized patterns representing peace are disrupted by unsettling breaks that signify restlessness. This dynamic arrangement reflects the seed's narrative of memory and motion, creating a visual tension that oscillates between calm and chaos.</desc>
