<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This artwork embodies the emotional tension between emptiness and desire. The chosen palette of hot coral, blood orange, and dust pink signifies warmth and longing, while charcoal and hollow blue communicate cold restraint and distance. The central area is dense with color, reflecting overwhelming desire, while the outer border remains stark and subdued, indicating the struggle to contain that desire. The interaction between the maze-like patterns of warmth and the thread-like emptiness creates a collision at the center, depicting an emotional push and pull.</desc>
