<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Distortion</title>
  <desc id="desc">This artwork embodies the emotional tension between clarity (signal) and disruption (noise) through color and form. The palette of navy and dim cyan creates a stark contrast against the black, suggesting depth and shadow, while the white serves as a whisper of clarity amid chaos. The main collision occurs in the center, where dense segments of dark and light clash, simulating the echo of a pulse striving for clarity against a backdrop of interference. This evokes the tension and complexity suggested by the seed, where the stark edges clash against smooth gradients, representing the chaos of broken signals.</desc>
