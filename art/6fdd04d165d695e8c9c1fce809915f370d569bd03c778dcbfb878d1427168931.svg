<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone emphasizes the duality of joy and grief, represented by vibrant yellows and oranges vs muted blues and purples. The palette reflects joy with bright, rounded tones rising at the bottom-left, while the darker, fragmented tones encapsulate grief, creating a split emotional screen. The contrast between the warm and cool tones represents the collision between hope and sorrow. The hard edges and checker/mirror patterns respectively highlight the structured nature of joy against the disordered feel of grief, guiding the viewer's experience through each pixel's emotional weight.</desc>
