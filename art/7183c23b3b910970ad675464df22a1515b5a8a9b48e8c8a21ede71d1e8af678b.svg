<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">This artwork encapsulates the emotional tension between vitality (spark) and decay (ash). The palette of electric blue and magenta captures the dynamic bursts of emotion, contrasting with the grounding depths of black and muted gray tones that symbolize remnants of restraint and memory. The collision of the crack pattern on the left, symbolizing active life, against the softer veil pattern on the right suggests an interruption of energy by static, evoking both resilience and fragility. The layout emphasizes this duality with a vertical split that reflects opposing forces, creating a sense of unresolved tension throughout the piece.</desc>
