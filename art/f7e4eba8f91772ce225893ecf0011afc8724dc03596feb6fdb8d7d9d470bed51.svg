<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This composition explores the emotional tension between joy and grief. The left side features a structured pattern with warm, vibrant colors symbolizing joy, represented through a radial pattern suggesting expansion and energy. The right side introduces broken pixels and muted, heavier colors to signify grief, creating a staircase pattern that evokes a sense of decline and weight. The central area echoes this duality with contrasting colors colliding, suggesting a pulse between the two emotions. The use of glowing edges highlights the stark contrasts, visually representing the interplay of love and betrayal.</desc>
