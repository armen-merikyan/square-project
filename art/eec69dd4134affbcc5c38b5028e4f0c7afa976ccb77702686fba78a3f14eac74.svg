<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece explores the tension between desire and emptiness, using a palette of saturated warm colors alongside a muted neutral base to evoke contrasting emotions. The hot coral and blood orange represent desire, flowing and rising in a stutter step from the base. The charcoal acts as a firm boundary, creating an echo of containment that interrupts the upward flow. Broken pixels add intentional disruptions reflecting the struggle between aspiration and limitation, while a hollow blue provides a quiet space, representing the emptiness that desires to expand but is contained. The main collision of colors occurs centrally, where the saturated warm tones meet the cool charcoal, enhancing the feeling of tension and contrast, surrounded by a faint negative space.</desc>
