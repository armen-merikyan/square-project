  <title id="title">Disarray and Order</title>
  <desc id="desc">This artwork embodies the tension between panic and control through contrasting emotional tones. The palette of muted purples and deep blues suggests a somber yet reflective state, while fiery oranges and yellows introduce bursts of chaotic energy. The left half follows a structured crosshatch pattern, representing control, while the right side erupts into noise, symbolizing panic. This split layout emphasizes the conflict and interplay between the two states, with the center acting as a point of continuous struggle, where colors clash and bleed into one another.</desc>
