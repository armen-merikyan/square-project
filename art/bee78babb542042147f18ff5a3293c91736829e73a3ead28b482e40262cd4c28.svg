<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">The emotional tone straddles the tension between trust’s warmth and suspicion’s cold shadow. The palette blends soft hues of powder pink and warm white against sharper tones of carbon black and sharp crimson, embodying the collision between safety and unease. The layout presents a vertical split where trust is anchored to one side, cascading softly while suspicion disrupts the flow with darker pixels scattered like riddles in the background—invoking highs and lows, filled voids, and fragmentary whispers. The broken pixels serve as scars where trust wrestles with suspicion, allowing the piece to embody resilience amid fragility.</desc>
