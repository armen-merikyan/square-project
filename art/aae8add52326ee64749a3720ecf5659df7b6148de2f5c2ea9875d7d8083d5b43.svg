<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">This composition embodies the emotional tension between love and betrayal through contrasting palettes of warm pinks and deep maroons against muted grays. The central theme of pressure vs. emptiness is expressed by dense clusters of color mimicking chaotic noise around an open central space. The interaction of calm areas and dense clusters symbolizes the rise and fall of emotional states. The broken edges and intentional imperfections reflect the fragmented nature of relationships and emotions, while the overall arrangement maintains a balance of defined structure and chaos, indicative of the struggle between order and disarray.</desc>
