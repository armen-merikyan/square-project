<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork embodies the emotional contrast between desire and emptiness through an interplay of warm, energizing colors against cool, restrained shades. The saturated hot coral and blood orange permeate most of the square, symbolizing strong desires and ambitions, representing 60% of the canvas. In contrast, muted dusty pink and deep charcoal create a cold space, evoking feelings of emptiness that spread outward from the corner, aligning with the layout framework. Broken pixels in the central area create an intentional disruption, representing struggles or scars against the relentless pull of desire. This collision at the center generates a tension that echoes the essence of the seed, embodying the intricate dance between expanding need and confinement.</desc>
