<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Capture and Freedom</title>
  <desc id="desc">The emotional tone reflects a struggle between the warmth of desire and the coolness of restraint. The palette was chosen to evoke hunger and containment, featuring saturated red-oxide and small orange to represent desire, contrasted with muted creams and iron grays symbolizing restraint. The dominant flow direction mirrors rising hope against sealed edges, creating a rhythmic sweep of tension. The center features a collision of warm and cool colors, subtly interrupted by broken pixels that symbolize the fragility of emotions.</desc>
