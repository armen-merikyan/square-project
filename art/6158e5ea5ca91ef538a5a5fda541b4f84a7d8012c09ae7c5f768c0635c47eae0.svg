<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Symmetry of Emotion</title>
  <desc id="desc">This composition embodies the tension between defiance and submission, with rich, warm colors representing the fiery spirit of resistance and deeper, darker hues suggesting an enclosing, submissive force. The color palette, 'ancient_fire,' emphasizes warmth and intensity—burnt orange and dark red striking against the cooler, muted charcoal. The collision occurs most prominently in the center, where upward-moving ripple patterns of defiance clash against the soft, layered stripes of submission, creating an intense visual dialogue. The broken pixels symbolize scars of conflict, leaving deliberate imperfections that accentuate the overall emotion of the piece, while ensuring a negative space that invites contemplation.</desc>
