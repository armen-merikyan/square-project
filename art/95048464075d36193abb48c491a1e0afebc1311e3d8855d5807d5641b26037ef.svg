<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">The emotional tone evokes a struggle between joy and grief with a layout favoring weight on one side. The palette combines vibrant yellows and oranges reflecting joy, juxtaposed against deep blues and muted purples that express grief. The left side employs a striped pattern representing joy's vibrance, while the right features broken dots, symbolizing fragmentation and heaviness. The main contrast occurs between the structured joy and the chaotic grief, creating a visually arresting dialogue between feelings.</desc>
