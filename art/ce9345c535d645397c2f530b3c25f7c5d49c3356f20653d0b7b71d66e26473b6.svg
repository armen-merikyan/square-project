<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Amidst Static</title>
  <desc id="desc">The emotional tone reflects a struggle between clarity (signal) and obscurity (noise). The selected palette of navy, black, white, and dim cyan establishes a dichotomy—navy and black embody the density of noise, while white offers sharp contrast as the discernible pulse. The main collision occurs at the center, where chaotic patterns of dark colors interrupt the clear signal, symbolizing the interference of memories and echoes. The radial pattern reinforces the organic flow of this emotional clash, making it visually compelling without depicting literal imagery.</desc>
