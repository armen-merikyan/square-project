<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Harmony</title>
  <desc id="desc">This piece explores the emotional contrasts between longing and resolve, utilizing a palette that balances warm tones of rose clay and lamp gold with cooler shades of distant lilac and cool blue. The interaction of 'spark' and 'frame' patterns creates a dynamic rhythm, where the central collision occurs at the intersection of warm and cool, symbolizing the push-pull of emotion. Broken pixels introduce imperfect elements that speak to the state of being 'mirror broken', reinforcing the themes of repair and damage. Overall, this composition offers a visual dialogue between serenity and urgency through its abstract arrangement.</desc>
