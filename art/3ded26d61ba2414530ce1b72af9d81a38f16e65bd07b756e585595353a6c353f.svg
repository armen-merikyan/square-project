<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry of Dissonance</title>
  <desc id="desc">The emotional tone is captured in the juxtaposition of awe and terror, representing the push-pull between stability and chaos. The palette of dark violet, soft gold, and pale green evokes a sense of mysterious beauty against darker undertones, creating a visual tension. The contrast lies in the orderly stripes of awe and the jagged, chaotic stairs of terror, manifesting an interplay of contrasting emotions. The layout draws a boundary—where the outer ring embraces the calm yet disorienting chaos, while the center offers a reflective and unstable core. This composition embodies the split-screen concept through color placement, ensuring enough negative space to maintain the theme of broken memory and emotional weight.</desc>
