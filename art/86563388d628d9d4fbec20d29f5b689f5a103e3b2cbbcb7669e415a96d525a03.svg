<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">The emotional tone encapsulates the struggle between restlessness and peace. The warm, soft gold and warm ivory create a gentle balance representing peace, while the deep wine and ash gray signify restlessness. Contrasting with the brown's grounding nature, the composition features upward motion on one side and downward flow on the other, suggesting a dynamic push-pull. The mixed patterns of scar (indicating interruption and turmoil) and constellation (representing calmness and space) illustrate the interplay between these emotions, with the main collision occurring diagonally, emphasizing the tension within the square.</desc>
