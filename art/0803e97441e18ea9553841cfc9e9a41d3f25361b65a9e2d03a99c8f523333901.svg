<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Intent</title>
  <desc id="desc">This artwork captures the emotional tension of longing contrasted with resolve, expressed through a palette of soft cyan, muted plum, and lavender gray, symbolizing warmth and calmness against darker undertones. The aggressive chaotic patterns of longing, represented through concentrated clusters in bright fields, collide with structured, thread-like patterns of resolve that subtly weave through the darkness, creating a narrative of conflict and resolution. The flow is counteractive, emphasizing areas of density next to quiet spaces where the pixel density decreases, representing the push and pull of emotions and the halo border giving a sense of containment and definition to these feelings.</desc>
