  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition captures the emotional dichotomy of desire and emptiness through the warm saturation of colors representing desire, juxtaposed with cooler colors that signify emptiness. The left and right sides mirror with slight disruptions to symbolize the tension between reaching and being restrained. The palette includes vibrant hues like hot coral and blood orange to evoke desire while charcoal and hollow blue encapsulate the essence of emptiness. The main collision occurs centrally, creating a focal point where the warm colors demand attention while the cooler colors maintain a quiet pressure around them, embodying the struggle between yearning and limitation.</desc>
