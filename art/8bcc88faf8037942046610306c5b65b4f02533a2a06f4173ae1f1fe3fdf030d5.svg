<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This piece embodies the tension between quietness and pressure through a striking palette and strategic placement of colors. The dark navy and compressed red serve as visual weights that create a sense of pressure, while off-white and faint peach offer a counterpoint of softness, suggesting calm amidst chaos. The main collision occurs diagonally, where the dark and bright colors intersect, creating a dynamic flow as if they are pushing and pulling against each other, reflecting the seed's themes of contrast and conflict.</desc>
