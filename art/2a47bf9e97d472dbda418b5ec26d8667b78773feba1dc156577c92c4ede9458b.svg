<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Friction of Light and Shadow</title>
  <desc id="desc">This artwork captures the emotional tension between 'spark' and 'ash' through a contrast of vivid greens and blues against muted grays and blacks. The palette symbolizes scattered ignitions against the weight of ash, invoking a feeling of resilience amidst fragility. The central interruption—a jagged field of bright colors—suggests struggle, while the peripheries represent quiet decay, allowing for a visual narrative of conflict and memory. The layout echoes a worn symmetry, enhancing the overall tone of an unresolved argument.</desc>
