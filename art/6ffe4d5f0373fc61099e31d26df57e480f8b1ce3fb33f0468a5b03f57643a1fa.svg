<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Tension</title>
  <desc id="desc">This piece explores the emotional duality of restlessness and peace through an intricate layering of colors. The warm palette represents the underlying intensity and longing associated with restlessness, while cooler tones reflect moments of tranquility. The main collision occurs diagonally across the square, where the vivid hues clash with subdued tones, creating a visual representation of emotional conflict. The light vs dark contrast is pronounced, emphasizing the tug-of-war between the two states. The pattern reflects a patchwork of experiences and memories, evoking both a cluttered mind and serene moments. Intentionally broken pixels infuse a sense of imperfection, capturing the essence of chaos amidst calm.</desc>
