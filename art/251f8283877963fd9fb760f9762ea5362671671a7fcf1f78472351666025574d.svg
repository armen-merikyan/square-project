<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmony and Discord</title>
  <desc id="desc">The artwork embodies the emotional contrast between joy (depicted in warm, brighter colors) and grief (represented with cooler, muted tones). The left half features radial patterns in warm yellows and oranges indicating joy's expanding nature, while the right side showcases fragmented, flame-like patterns in deep blue and muted purple reflecting grief's sharp fragmentation. The sharp vs soft contrast is manifested by the hard transitions between colors, while the flow of diagonal fall suggests an emotional descent. Broken pixels are added to disrupt the patterns slightly, embodying the imperfection and conflict between these emotions.</desc>
