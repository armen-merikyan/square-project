<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This artwork embodies the tension between desire and emptiness. The chosen palette emphasizes the warm saturation of desire with hot coral and blood orange, contrasting against the coolness of charcoal and hollow blue to represent emptiness. The interaction between the glitch and echo patterns creates a dynamic collision in the center, reflecting the struggle for dominance. Broken pixels throughout add a sense of disruption, hinting at the fragility of balance. Overall, the piece presents an emotional dialogue of longing and limitation.</desc>
