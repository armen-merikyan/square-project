  <title id="title">Tension Between Here and There</title>
  <desc id="desc">The artwork embodies the emotional contrast between longing and resolve. The palette leans on deep blues and muted yellows, representing yearning and hope. The dominant deep blue fills a large portion of the square, echoing the feeling of longing. The radial pattern in yellow symbolizes resolve, creating a focal collision in the center. Broken pixel placements introduce a sense of imperfection, while quiet black borders create separation, enhancing the emotional tension between intimacy and distance.</desc>
