<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality Disrupted</title>
  <desc id="desc">This composition explores the tension between restlessness and peace, embodied through a contrast of dense, pattern-filled sections and open, serene spaces. The chosen palette of moss green, bone white, rust, stone gray, and small gold reflects the fragility of peace against the weight of restlessness. The top half, with its dot pattern representing restlessness, is visually interrupted by a calm mirrored balance in the bottom half. The collision occurs strongly in the middle, creating a dynamic yet unresolved emotional conflict throughout the grid.</desc>
