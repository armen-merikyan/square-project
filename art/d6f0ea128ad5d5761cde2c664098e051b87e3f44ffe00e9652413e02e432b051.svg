<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust</title>
  <desc id="desc">This artwork explores the tension between trust and suspicion through the use of color and pattern. The left side, embodying 'trust', uses a checker pattern in soft gold and warm ivory, illustrating a stable base. The right side, reflecting 'suspicion', employs a crosshatch of deep wine and ash gray, suggesting a fragmented view. The strong contrast between the rich, warm tones and the cooler, stark shadows creates a diagonal flow, symbolizing the unseen divides and subtle interplays of emotion. Broken pixels are employed as intentional disruptions, enhancing the feeling of collision and echo, embodying the imperfection inherent in both trust and suspicion.</desc>
