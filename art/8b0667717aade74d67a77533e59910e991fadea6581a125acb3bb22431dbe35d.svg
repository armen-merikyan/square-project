<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Harmony</title>
  <desc id="desc">The artwork embodies the emotional tension between restlessness and peace through the use of an ancient fire palette, incorporating burnt orange and dark reds to signify intense emotions against softer gold tones that suggest calm. A diagonal flow was used to create movement, while the halo void layout introduces a sense of spaciousness, interrupting the rhythm. The collision of energy is predominantly in the center with bright accents of burnt orange that clash against deeper dark reds, representing the struggle between states of being. This composition serves to illustrate the duality of existence, one side vibrant and fiery, the other quiet and restrained.</desc>
