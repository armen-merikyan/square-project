<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This artwork embodies the struggle between restlessness and peace through color and pattern. The outer ring, dominated by dark navy and compressed red, symbolizes restlessness with its chaotic tide-like appearance and uneven pulse. The central 4x4 core, employing off-white and faint peach, conveys peace and serenity, offering a gentle, quiet field. This layout illustrates the collision of emotions as dark hues surround and impose upon lighter tones. The broken pixels create imperfection, symbolizing disruptions in tranquility, while maintaining open spaces to represent moments of quiet. Overall, the combination captures the push and pull between chaos and calm beautifully.</desc>
