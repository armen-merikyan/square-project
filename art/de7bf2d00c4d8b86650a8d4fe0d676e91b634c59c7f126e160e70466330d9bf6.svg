<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality in Motion</title>
  <desc id="desc">This composition reflects the emotional tension between restlessness and peace through a contrast of dense clusters and quiet spaces. The palette mixes warm ivory and stain brown to evoke comfort against deeper, more assertive shades like deep wine and ash gray, representing chaos and unease. The diagonal edge style signifies movement and argument, while the patterns of pressure and glitch collide within the central area, emphasizing the struggle for peace amidst motion. The quiet corners signify resting places denied, accentuating the overall feeling of unresolved tension.</desc>
