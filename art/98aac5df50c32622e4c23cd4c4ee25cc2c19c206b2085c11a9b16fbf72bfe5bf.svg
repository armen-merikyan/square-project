<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Ascent</title>
  <desc id="desc">This piece embodies the emotional tension between longing and resolve through its contrasting color palette and structured yet chaotic pixel arrangement. The warm browns and soft golds symbolize hope and connection, while ash gray and deep wine evoke a sense of distance and introspection. The layout of the rising signal features clusters at the bottom interrupted by careful spacing, suggesting the arduous climb from desperation toward resolution. The edge style is intentionally uneven to evoke the unpredictability of emotion, with broken pixels adding layers of complexity and imperfection.</desc>
