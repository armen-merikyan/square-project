<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">This artwork captures the emotional tension between fear and hope through contrasting color placement. The top half employs dark hues to embody fear with jagged stripes that create a sense of pressure and confinement, leading the eye toward a void. In the bottom half, hues of soft gold and pale green bring a radial pattern that suggests hope and light breaking through, offering a visual release. The overall structure plays with flow from the outside inward, using broken pixels to enhance feelings of imperfection and uncertainty, while ensuring a balance between dense clusters and quiet negative space.</desc>
