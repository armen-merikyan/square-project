<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">The emotional tone represents the clash between defiance and submission, with defiance shown through strong angular arrangements and vibrant contrasting colors, while submission appears in softer, more muted tones. The palette consists of 'rose clay', 'warm shadow', 'cool blue', 'distant lilac', and 'lamp gold' to evoke intimacy yet distance, creating a dynamic interplay. The central area is more saturated to symbolize defiance, while the edges are calmer, allowing for an exploration of the edges between chaos and order, open and closed. Main contrasts happen diagonally across the grid, reflecting a pulse of tension and resolution throughout the piece.</desc>
