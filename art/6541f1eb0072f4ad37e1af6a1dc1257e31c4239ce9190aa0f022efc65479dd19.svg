<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Boundaries</title>
  <desc id="desc">This piece explores the emotional tension between defiance and submission, represented through the use of vibrant and muted colors. The cold gold and cosmic indigo serve as the main accents, creating pulses of energy surrounded by deeper, quieter tones of void black and deep teal that dominate the space. The layout opens like a gate, with a flow from left to right and a diagonal rise conveying motion and conflict. Broken pixels introduce intentional disruptions, emphasizing the collision of order and chaos. The central area is bright and active, contrasting with the subdued edges, which symbolize submission and containment.</desc>
