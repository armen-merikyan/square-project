<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">The emotional tone encapsulates the tension between nostalgia, represented by soft blues and whites, and progress, symbolized by darker, heavier blacks and reds. The palette contrasts cool and warm hues, creating visual friction. The layout splits horizontally, where light fragments enter from the top, highlighting moments of calmness ('nostalgia'). Conversely, the bottom half embodies density and weight with darker colors, creating an anchor that evokes a sense of struggle ('progress'). The chaos manifests through small broken pixels in the upper segment, cascading down like drops, integrating the juxtaposition of memory and advancement in a fragmented yet cohesive manner.</desc>
