<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">The emotional tone captures the clash between joy and grief, structured through a nearly symmetrical layout with broken elements to suggest imperfection. The color palette combines bright yellows and oranges representing joy with deep blues and muted purples that evoke grief, creating a stark contrast that emerges from left to right. The grid of blues suggests a sense of order disrupted by vibrant bursts of yellow, reflecting the pulse of emotions as they collide. This arrangement tells a story of fluctuating feelings, highlighting the beauty and pain of life's contrasts.</desc>
