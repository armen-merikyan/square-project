<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between States</title>
  <desc id="desc">This artwork explores the emotional tension between longing and resolve, using a palette that evokes hunger and restraint. The muted cream creates a quiet foundation while red oxide introduces warmth, symbolizing longing. The blackened plum and iron gray add depth and strength, representing resolve. The composition features a radial pattern of longing with bursts of noise indicating resolve, leading to a focal collision in the center. Broken pixels are incorporated to illustrate flaws and imperfections in both emotions, further enhancing the tension between containment and overflow. The layout erodes symmetry at the edges, mirroring the intentional dissonance of the emotional narrative.</desc>
