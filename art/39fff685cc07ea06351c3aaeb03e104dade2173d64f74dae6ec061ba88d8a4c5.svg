<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This piece captures the juxtaposition of joy and grief, where the upper half embodies joy through rounded stripes in warm yellows and oranges, suggesting openness and movement. The lower half, characterized by heavy blue and muted purple crosshatching, represents grief’s weight and fragmentation. The contrast emerges where the chaotic blues meet the structured warmth of the yellows, evoking tension. The design reflects a split-screen layout mirroring the emotional landscape while maintaining a balance of negative space.</desc>
