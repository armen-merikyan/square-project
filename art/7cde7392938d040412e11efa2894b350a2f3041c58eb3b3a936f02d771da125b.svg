<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragments of Emotion</title>
  <desc id="desc">The piece captures the emotional tension of love and betrayal through a structured contrast between warm and cool tones, creating a dynamic interplay between the heart’s warmth and the coldness of betrayal. The color palette of soft pinks and deep maroons embodies love, while stark grays evoke a sense of emotional noise representing betrayal. The composition balances dense sections with ample negative space to symbolize the emptiness within a once warm environment. The use of contrasting checker patterns and fragmented edges hints at the turmoil within personal relationships, showcasing the collision of feeling and the unresolved state of heart versus mind.</desc>
