<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Equilibrium</title>
  <desc id="desc">This artwork captures the emotional tension between vulnerability and strength through a dynamic balance of color and pattern. The palette consists of warm coral and soft amber to represent vulnerability, juxtaposed against cold slate and blue-black for strength. The broken pixels, scattered primarily in the center, symbolize the fragile nature of strength that can be easily disrupted. The layout spirals inward, creating a sense of pressure that culminates at the center, while jagged edges add to the feeling of disruption and imperfection. The collision of spark and barcode patterns illustrates the conflict and harmony within a fragile state of being.</desc>
