<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Fortitude</title>
  <desc id="desc">This artwork captures the emotional tension between vulnerability and strength. The palette blends soft and strong colors, where pale aqua represents vulnerability and deep ink blue signifies strength. The collision of dense patches of noise with lighter areas creates a composed chaos, reminiscent of strong walls with chinks that allow light to seep through. The deliberate 'broken_frame' layout emphasizes openings that invite interpretation. Contrast between the harsher alarm red and softer hues depicts interruptions in safety, while the arrangement of colors disrupts symmetry, embodying the challenge of exposure amidst fortitude.</desc>
