<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Signals</title>
  <desc id="desc">The emotional tone captured in this artwork reflects the tension between fear and hope. The warm dark colors (#000000, #5a0043) embody fear through a subdued contrast, with sharp, jagged edges representing the chaotic feelings associated with it. In juxtaposition, the soft gold (#f5bc42) and pale green (#97d095) represent hope, strategically placed to signify moments of light amidst darkness. The zigzag patterns of warm hues collide against the solidity of cool tones, amplifying that emotional push and pull. The placement creates a sense of rising and layering, which aligns with the seed's concept of a struggle between interior emotions and external displays.</desc>
