<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Tension</title>
  <desc id="desc">This composition explores the emotional duality between vulnerability and strength. The use of deep teal and cosmic indigo carries a sense of depth and introspection, while star white and cold gold provide striking contrast and brightness. The main collision occurs in the center, where broken dots (representing vulnerability) meet the structured stripes (representing strength), creating a dynamic tension that feels both protective and exposed. Negative space is maintained to enhance the feeling of weightlessness, echoing the central theme of light versus heavy.</desc>
