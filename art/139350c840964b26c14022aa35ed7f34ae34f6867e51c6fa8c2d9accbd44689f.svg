  <title id="title">Resilience in Tension</title>
  <desc id="desc">The emotional tone contrasts the sharp excitement of 'spark' against the settling calm of 'ash.' The palette chosen reflects intimacy and distance, where the warm tones symbolize hunger and the cooler shades represent restraint. The top rows embody the vibrant, jagged patterns of ascent, while the bottom rows soften into a muted wave, creating a dynamic rhythm. The central collision occurs where these contrasting emotional patterns meet at the midline, interrupting the flow and framing the tension of resilience versus fragility.</desc>
