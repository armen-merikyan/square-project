<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Restless Peace</title>
  <desc id="desc">The emotional tone speaks to the tension between calmness and unease, represented through contrasting colors. The palette combines warm whites and deep blacks, symbolizing peace and restlessness. The main contrast occurs diagonally, with darker tones crawling towards the corners, interrupting lighter fields. This reflects the ‘edge crawl’ theme and the inherent interference in calm moments. The patterns of ‘braid’ for restlessness and ‘echo’ for peace create a layered feel, resonating with the contrast of memory and motion.</desc>
