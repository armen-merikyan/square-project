  <title id="title">Radial Tension</title>
  <desc id="desc">This piece embodies the emotional struggle between control and panic through a contrasting color palette of burnt orange, dark red, charcoal, and gold. The palette represents the warmth of control against the starkness of panic, providing depth through a combination of dark bases and bright interruptions. The central filled square builds a strong focus while jagged edges introduce chaos, creating a balance between a filled core and hollow spaces that evoke tension. The flow is outward, hinting at a release from internal chaos, with pixel bleeds enhancing the sense of imperfection and unease.</desc>
