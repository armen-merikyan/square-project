<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension's Embrace</title>
  <desc id="desc">The artwork explores the tension between vulnerability and strength represented through a palette of cosmic indigo and void black as the grounding tones. The core is defined by radial patterns symbolizing vulnerability radiating outwards, while stronger, flood-like bands of color push against it from the edges, creating a dynamic visual clash. The main collision occurs at the center, where the pale interior succumbs to the intense surrounding colors, visualizing emotional pressure and release.</desc>
