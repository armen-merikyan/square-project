<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotionally Bound</title>
  <desc id="desc">This piece captures the duality of softness and severity by creating a weighted bottom that contrasts with a lighter top, suggesting the push and pull of emotion. The palette includes powder pink and warm white for softness, contrasted against carbon black and steel gray, embodying severity. The broken frame layout allows colors to bleed, illustrating the fluidity between feelings of guilt and forgiveness, while also providing clear 'soft' fields juxtaposed with 'severe' interruptions. The main collision occurs at center-left, where the majority of the crimson meets the subdued gray, symbolizing the heart of the emotional struggle.</desc>
