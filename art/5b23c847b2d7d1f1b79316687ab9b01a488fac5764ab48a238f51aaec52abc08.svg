<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The artwork conveys a stark emotional tension between rage and calm. The palette combines intense reds with soft pale blues and blacks to illustrate this duality. The focus of collision occurs in the center, where sharp red lattice patterns clash with the cool, echoing blue lines, creating a visual representation of pressure amidst calmness. The arrangement spirals outward, reflecting a struggle between the overpowering force of rage and the attempt to find balance, veiled by the calm surrounding it. Broken pixels add intentional imperfection, emphasizing the chaotic collision and the moments of quiet interruption in this emotional landscape.</desc>
