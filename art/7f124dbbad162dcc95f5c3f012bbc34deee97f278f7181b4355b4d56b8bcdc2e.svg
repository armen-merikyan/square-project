<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition invokes a strong emotional tension between defiance and submission through the juxtaposition of sharp versus soft elements. The palette, dominated by deep teal and void black, captures the intensity of conflict, while the lighter accents of cold gold and star white provide moments of interruption and reflection. The chalkboard-black surrounds the core of vibrant colors, symbolizing the chaos around a stark, defined center. The main collision occurs centrally, where the split-screen pattern of defiance clashes with a softer checker of submission, each vying for dominance yet maintaining an uneasy balance. The quiet channel layout facilitates a narrow path through the density, allowing for moments of silence amidst the surrounding chaos.</desc>
