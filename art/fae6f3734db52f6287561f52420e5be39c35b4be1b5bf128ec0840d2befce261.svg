<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ember and Flame</title>
  <desc id="desc">This composition reflects the tension between spark and ash, representing dynamic bursts of energy contrasted with soft, lingering remnants. The palette includes muted tones of storm gray and near black, symbolizing restraint and fading energy, while the vivid faded gold signifies the fleeting moments of intensity. The diagonal flow facilitates a sense of invasion, where the spark's vibrancy interrupts the silence of ash, creating a central collision at the center, symbolizing resilience’s fight against the weight of memories. The broken pixels serve as imperfect reminders of transient moments and the passage of time.</desc>
