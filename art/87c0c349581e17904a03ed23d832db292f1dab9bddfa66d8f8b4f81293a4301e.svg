<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">The emotional tone reflects a tension between longing and resolve, illustrated through contrasting patterns and colors. The palette of burnt orange, dark red, charcoal, and gold captures a warm yet urgent essence, evoking feelings of a broken mirror against a thread of hope. The arrangement features densely packed colors at the center, representing resolve, while the edges incorporate a quiet field, allowing for a sense of overflow, echo, and disruption. The central collision of noise patterns against the stretching sparks of longing represents a delicate interplay of emotion.</desc>
