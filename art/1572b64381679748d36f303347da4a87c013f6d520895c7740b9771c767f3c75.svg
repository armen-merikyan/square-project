<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Release</title>
  <desc id="desc">This piece balances the tension between control and surrender. I chose a palette of cosmic indigo and deep teal to evoke a sense of depth and expansive control, contrasted by the softness of star white and cold gold, representing surrender and gentle release. The upper four rows depict stacked halos of color in a measured grid, symbolizing structured control, while the lower four rows employ cracked and overlapping textures to evoke a sense of surrender, appearing chaotic yet elegantly interrupted. The main collision is centered, where rich colors clash with lighter tones, creating a dialogue of emotional echoes.</desc>
