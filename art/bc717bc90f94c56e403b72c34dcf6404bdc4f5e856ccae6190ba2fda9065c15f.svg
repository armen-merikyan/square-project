  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects the tension between vulnerability and safety. The chosen palette of shelter_green and warm_brown against pale_skin and cold_white emphasizes this duality. The main collision occurs diagonally where the static patterns of exposure intersect with the negative_cross pattern of safety, creating an intentional disruption and a balance of weight and lightness. The broken pixels represent scars of experience, adding to the complexity of emotions.</desc>
