<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">The piece embodies the tension between joy and grief, reflected in its top and bottom halves. The upper section features bright yellows and oranges, symbolizing joy through a stepping pattern, suggesting expansion and lightness. The lower half utilizes muted blues and purples to represent grief, arranged in a heavier, more concentrated ring pattern, creating a sense of weight. The fluidity of vertical waves introduces an ongoing oscillation, with occasional thin outlines suggesting interruptive moments that evoke emotional depth. The combination results in a visual dialogue expressing the dichotomy of emotions while allowing room for reflection and space.</desc>
