<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition balances the tension of spark and ash, using a palette that embodies desire and emptiness. The warm coral and blood orange clash with the cooler charcoal and hollow blue, creating a visual narrative of struggle between bursting brightness and quiet decay. The maze-like pattern of ash occupies the edges while crosshatching from the spark interrupts the center, forming an energetic collision that reflects resilience amidst fragility. The layout, featuring a narrow negative space channel, suggests a quiet path through dense emotional terrain, while broken pixels disrupt the continuity, signifying scars and echoes of memory.</desc>
