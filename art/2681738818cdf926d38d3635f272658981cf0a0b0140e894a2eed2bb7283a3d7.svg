<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece embodies the emotional tension between 'rage' and 'calm.' The palette employs deep blacks and vibrant reds to represent rage, while soft whites and pale blues evoke calmness. The main contrast occurs between the jagged, chaotic red dots (representing rage) that disrupt the smooth, stacked horizontal bands of pale blue and white (representing calm), illustrating an interruption of order. The form of the pixels suggests communication noise, blending the ideas of contained feelings clashing against the overwhelming nature of emotion, echoing the complexities of both states.</desc>
