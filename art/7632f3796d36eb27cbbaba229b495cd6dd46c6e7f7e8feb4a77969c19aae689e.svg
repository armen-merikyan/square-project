<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This composition balances joy and grief through contrasting color choices and structured placement. The upper half uses bright yellows and oranges to convey joy, using sharp 'teeth' patterns that give a sense of dynamic energy. In contrast, the lower half features deep blues and muted purples, structured around a maze-like pattern that echoes the complexity of grief. The hard edges between the two emotional states emphasize the boundary and tension, while the intentional broken pixels introduce imperfection and vulnerability. Through this arrangement, the artwork creates an abstract narrative of the coexistence of joy and grief, presenting a visual struggle yet harmony.</desc>
