<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Suspicion</title>
  <desc id="desc">This artwork explores the emotional contrasts of trust and suspicion through a grid and crosshatch pattern. The palette, featuring deep navy and black against dim cyan and white, represents the weight of suspicion juxtaposed with the lightness of trust. The composition starts from the corner, suggesting an invasion of emotion, with chaotic breaks that symbolize the tension created by opposing feelings. The interplay of structured patterns and unexpected breaks fosters a dynamic rhythm, reflecting the complex nature of human emotions.</desc>
