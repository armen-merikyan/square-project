<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone captures the collision between vulnerability and strength, showcased through a palette that oscillates between softness and severity. The use of powder pink and warm white embodies vulnerability, while carbon black and sharp crimson signify strength. The dense center is surrounded by a spiraling layout that implies struggle, with an intentional disruption through broken pixels to enhance the feeling of an eroded edge. This art piece explores the delicate balance between exposure and shelter—where the calm pale interior meets a threatening sharp boundary.</desc>
