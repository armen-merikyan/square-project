<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interwoven Radiance</title>
  <desc id="desc">This abstract artwork captures the tension between light and weight, reflecting the fight of spark against ash. The warm colors of soft gold and pale green punctuate the cooler darks of black and dark violet, suggesting moments of ignition against settled dust. The interplay of bright center points represents resilience amidst the shadows of memory and erasure. The layout of 'two pulses' creates a dynamic flow, with negative spaces emphasizing the central confrontation of emotions, allowing for an interplay of rhythm and interruption, visually narrating the struggle between hope and despair.</desc>
