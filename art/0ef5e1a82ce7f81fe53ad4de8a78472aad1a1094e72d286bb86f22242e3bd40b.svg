<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Tension</title>
  <desc id="desc">This composition embodies the emotional conflict of defiance versus submission. The use of black as the primary color represents a firm resistance and structured order, while the vibrant electric blue and lime introduce chaotic bursts that disrupt the calmness of negative space, embodying defiance. Magenta serves as an accent that punctuates the patterns, creating a sense of tension. The center is emphasized with a darker palette as an anchor point, illustrating strong resistance, while lighter colors ripple around, suggesting the chaotic nature of submission. The arrangement echoes a diagonal rise, expressing movement post-collision and emphasizing the emotional drama captured by the seed.</desc>
