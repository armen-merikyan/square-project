<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tide of Interruption</title>
  <desc id="desc">This artwork captures the tension between pressure and quietude. The palette juxtaposes off-white and dust gray for subtlety against bursts of compressed red and dark navy, creating a conflict that embodies the emotional resonance of the seed. The scattering of bright accent colors amidst muted fields suggests shattering tension, where still areas are abruptly interrupted, evoking the sensation of chaos against calm. The flow of the composition is diagonal to emphasize the break, with clusters of density accentuating the pressing nature while the softer spaces offer moments of respite. The edge design features broken pixels, introducing intentional imperfections that reflect the theme of counterflow and shatter, enriching the dialogue between clarity and confusion.</desc>
