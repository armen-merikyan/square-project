<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Waves of Uncertainty</title>
  <desc id="desc">This composition embodies the emotional tension between certainty and curiosity through contrasting colors. The palette merges warm earth tones with cool shades to create a visual conversation between grounded order and chaotic exploration. The arrangement features a dense cluster of deep greens and browns in one diagonal wedge, symbolizing a solid foundation, while the opposing wedge explodes with delicate blues and whites, evoking an airy sense of curiosity. The collision is intentional with chaotic placements of colors in the middle of the piece, creating a dynamic push and pull that reflects the tension of rising signals against receding edges. This layout mirrors the ebb and flow of feelings, emphasizing the balance and struggle between clarity and ambiguity.</desc>
