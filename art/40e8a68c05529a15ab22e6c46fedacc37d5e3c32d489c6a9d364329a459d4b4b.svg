<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork explores the emotional dichotomy between vulnerability and strength. The selected palette of pale aqua, mist gray, alarm red, ink blue, and clear white embodies the tension of serene undertones disrupted by urgent splashes of color. The main contrast occurs where vibrant alarm red intersects with the muted gray tones, establishing a collision of feelings in the center, symbolizing the struggle of exposure clashing with the desire for shelter. The pattern resembles a broken frame that surrounds the soft, exposed center, reflecting the complex interplay of protection and fragility. Through intentional disruptions—broken pixels—I evoke an abstract story of strength amid vulnerability.</desc>
