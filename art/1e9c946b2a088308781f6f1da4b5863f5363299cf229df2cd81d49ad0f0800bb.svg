<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Repair</title>
  <desc id="desc">This artwork explores the emotional tension between longing and resolve through the interplay of warm and cool tones. The palette features hot coral and blood orange contrasted with lighter hollow blue and dust pink, creating a vibrant yet serene atmosphere. The sharp, jagged edges reflect urgency and rupture, while the scattered layout mimics a fragmented path toward repair. The center showcases a collision of strength and vulnerability, representing the journey of emotional healing amidst the chaos of brokenness. Negative space is maintained to evoke both emptiness and potential, reinforcing a sense of distance and yearning.</desc>
