<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Reflection</title>
  <desc id="desc">The emotional tone displays a balance of longing and resolve, where the longing evokes an expansive, distant quality paired with resolve's firmness. The selected palette of lime, electric blue, black, and magenta suggests a cool and warm emotional tension, with lime and electric blue representing resolution and energy while black adds depth and contrast against vivid colors. The main collision lies in the center where black and electric blue overlap, creating a pulse-like dynamic in the composition. The 'halo' and 'echo' patterns create layered marks that suggest a narrative of repair and disruption, while the intentional broken pixels symbolize fractures in resolution and the need for connection. This arrangement allows for a spacious feel with quiet fields surrounding dense clusters, embodying the theme of contained yet overflowing emotions.</desc>
