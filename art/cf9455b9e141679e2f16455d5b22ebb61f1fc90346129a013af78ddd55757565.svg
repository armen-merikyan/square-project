<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Soft and Severe</title>
  <desc id="desc">The emotional tone evokes a tension between softness and severity, using a palette that juxtaposes soft hues with stark contrasts. The colors—the powder pinks and warm whites represent softness, while the carbon black and sharp crimson evoke severity. The main collision occurs at the center, where the maze of softer colors meets the stair-like structure of darker tones. This creates a visual pulse, reminiscent of the emotional tension described in the seed. The bottom-weighted layout emphasizes gravity towards the lower half, inviting a sense of introspection amidst the chaos of color.</desc>
