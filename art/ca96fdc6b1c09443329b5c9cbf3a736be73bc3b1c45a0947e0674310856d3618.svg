<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Boundaries</title>
  <desc id="desc">This abstract composition reflects the tension between vulnerability and strength, embodied by a palette of pale aqua and mist gray representing vulnerability, contrasted with alarm red and ink blue symbolizing strength. The flow of the piece suggests a stutter step, creating an experience of interruption between the dominant colors. The central area is busy with color, symbolizing the exposed core, while the edges are deliberately eroded and more muted, conveying instability and the pressure of external judgments. Broken pixels serve as subtle scars of imperfection, enhancing the theme of strength balanced against frailty. Overall, the placement creates a dynamic rhythm of collision and space, drawing the eye into the center, reminiscent of a tide against a constellation.</desc>
