<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Affection</title>
  <desc id="desc">The emotional tone juxtaposes warmth of love with the coldness of betrayal. The palette of pink, red, gray, and dark maroon creates a dynamic tension where softer colors signify love and darker hues symbolize betrayal. The contrasting arrangements—where filled squares (indicative of love) clash with broken dots (indicative of betrayal)—depict the emotional collision, reflecting the disparity between intimacy and heartbreak. The negative space is intentionally left to echo emptiness, enhancing the sense of an 'empty room' filled with tension.</desc>
