  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone embodies a struggle between vulnerability and strength through contrasting color usage. The pale center symbolizes exposure, while the dark edges provide a framed sense of safety. The palette consists of warm terracotta and distant lilac, bringing warmth and calmness amid the heavy shadows. The split layout denotes the interplay of both emotions, with the upper half embracing vulnerability through a patchwork pattern, and the lower half demonstrating strength with a stepwell structure. The collision occurs centrally, where elements intersect, suggesting a meeting of soft and hard.</desc>
