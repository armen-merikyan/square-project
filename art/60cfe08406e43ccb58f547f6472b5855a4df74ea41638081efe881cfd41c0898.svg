<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Sheltered Exposure</title>
  <desc id="desc">This piece encapsulates the tension between safety and exposure through a split composition. The warm browns and soft greens signify warmth and protection, while the cold white and pale skin tones evoke vulnerability. The tension is most pronounced diagonally, where cool colors clash with warm shades, symbolizing the struggle between safety and exposure. The use of broken pixels adds a layer of imperfection, representing real-life scars that disrupt the flow of tranquility, while maintaining an echo of softness against severity.</desc>
