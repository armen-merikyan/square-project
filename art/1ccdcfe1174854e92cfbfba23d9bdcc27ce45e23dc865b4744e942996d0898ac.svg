  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone of this artwork reflects the struggle between rage and calm, embodied in a color palette that contrasts intense red with pale blue and black. The layout features a broken frame, emphasizing the tumultuous collision of emotion. The central area is dominated by the hot red contrasts (rage), spilling outwards, while cooler blue tones (calm) attempt to contain this explosion. Broken pixels introduce a sense of imperfection, further enriching the narrative of a battle between order and chaos.</desc>
