<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tenderness and Rage</title>
  <desc id="desc">This artwork embodies the emotional tension between tenderness and rage, utilizing the palette of red, pale blue, black, and white to explore this dichotomy. The central area, marked by muted blacks and grays (indicative of rage), is interrupted by bursts of soft pale blue and white that symbolize tenderness. The chaos of the outer edges, marked by explosive reds, collides with these softer hues, suggesting an emotional push and pull that navigates through layers of broken pixels. The interplay between scattered, jagged patterns and smoother areas evokes feelings of conflict and resolution, echoing the themes present in the seed.</desc>
