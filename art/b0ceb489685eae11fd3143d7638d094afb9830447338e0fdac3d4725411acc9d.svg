<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension at the Threshold</title>
  <desc id="desc">This artwork embodies the emotional tension between restlessness and peace. The palette juxtaposes clean white and ice blue for serenity against ink black and warning orange that suggest unease, creating a dialogue of calmness interrupted by chaotic bursts. The center, marked by a cluster of brighter colors, signals intense motion, while the edges blend into tranquil whites and blues, illustrating a gradual transition. The main contrast lies in the center where the pulse of energy meets the edges’ calm—an interplay of noise and fault lines within an uninterrupted form. Each color's placement offers both collision and flow, reflecting the seed's themes of tension and quiet in a visual rhythm.</desc>
