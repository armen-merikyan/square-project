<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order in Chaos</title>
  <desc id="desc">This artwork explores the emotional dichotomy of joy and grief, represented through a contrasting palette of bright yellows and muted purples, embodying vibrant joy against subdued grief. The left side is weighted with warm, expanding hues, symbolizing an uplifting pulse, while the right employs fragmented dots in darker tones to convey grief's fragmentation. The asymmetrical pattern edges towards chaos, hinting at both the beauty and pain of emotional experiences, with the arrow-like shapes guiding the eye across the canvas. The grid against dots creates a dynamic interplay, with breaking symmetry representing the tension of duality.</desc>
