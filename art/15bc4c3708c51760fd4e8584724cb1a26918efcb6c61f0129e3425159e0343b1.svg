<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece represents the tension between vulnerability and strength through color and structure. The palette combines soft mint and faded gold to evoke an atmosphere of gentle warmth interrupted by storm gray, suggesting an overarching sense of dread under the surface safety. The contrast is most pronounced in the center where the saturated colors collide—symbolizing the battle between an exposed self and external pressures. The broken pixels introduce intentional imperfections, mirroring the fragility of safety and the risk of exposure. The overall flow is from right to left, guiding the viewer through the densest area toward the quieter edges, embodying the struggle between holding on and letting go.</desc>
