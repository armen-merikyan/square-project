<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger versus Restraint</title>
  <desc id="desc">This composition conveys a tension between desire and restraint, highlighted through juxtaposed colors. The palette of hot coral, blood orange, and dust pink represents warm longing, while charcoal and hollow blue introduce cooler, more restrained tones. The distribution favors warmer colors, creating a visual pull towards the edges while the cool colors form a sealed boundary. Broken dots and radial patterns overlap, reflecting the emotional clash inherent to the theme, suggesting reaching towards an unattainable border, filled with both brightness and muted tones.</desc>
