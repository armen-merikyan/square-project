<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Connection</title>
  <desc id="desc">The emotional tone reflects a juxtaposition of loneliness and connection, using a palette inspired by ancient fire: burnt orange and dark red suggest warmth yet contain depths of charcoal to signify isolation. The main contrast occurs at the center, where connected warmth tussles with the surrounding darker hues, symbolizing an inner struggle. The pattern mirrors a burst emanating from an off-center seed, creating echoes of connection through spaced layers, while hidden versus exposed is depicted by the varied densities of color and the integration of 'broken pixels' for imperfection.</desc>
