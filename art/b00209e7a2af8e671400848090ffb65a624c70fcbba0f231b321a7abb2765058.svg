<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Echoes</title>
  <desc id="desc">This artwork captures the emotional tension between severity and softness, creating a dynamic visual experience. The palette features a mix of carbon black and sharp crimson to represent severity, contrasted against powder pink and warm white for softness. The black and crimson dominate the outer edges, representing strict boundaries and dark rules, while the inner core uses the softer tones, creating a sense of anxiety with pulses of color that interrupt and collide. The pattern of ladders suggests structured chaos, emulating the way softness can fight against strict limits. The interplay of contrast forms a centered collision, reflecting the struggle between vulnerability and rigidity.</desc>
