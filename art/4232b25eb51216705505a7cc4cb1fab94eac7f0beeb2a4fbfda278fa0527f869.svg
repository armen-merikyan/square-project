<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Exposure</title>
  <desc id="desc">This piece explores the tension between vulnerability and strength. The use of pale aqua and mist gray evokes a soft, exposed center, while alarm red and ink blue deepen the feeling of strength around it. The arrangement allows clear contrasts between dense and empty spaces, symbolizing the push and pull of emotions. Most weight is on the red and blue, creating a frontal collision with the lighter colors that buffer the intense interaction. The 'cage' shape guides the view through the center, echoing the themes of safety and exposure amidst the chaos of broken pixels, mimicking imperfection and human experience.</desc>
