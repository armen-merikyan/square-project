<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Echoes</title>
  <desc id="desc">This piece embodies the tension between joy and grief, using a palette of warm, vibrant yellows and calming deep blues to create emotional contrast. The upper half hints towards a spark of joy, represented by bright tones and a noise pattern that suggests movement and expansion. In contrast, the lower half incorporates muted purples and deeper blues with a dotted pattern, evoking the heaviness of grief. The split horizontal layout reflects the dual nature of emotions, while the rhythmic flow implies a cyclical nature of these feelings. Overall, the piece conveys a dance between light and dark, joy and sorrow, reminiscent of ancient flames flickering against the constraints of order.</desc>
