<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Dark</title>
  <desc id="desc">The artwork explores the emotional tension between envy and gratitude, represented by contrasting light and dark colors. The palette blends soft gold (symbolizing gratitude) with deep dark violet and black (representing envy and weight). The contrast is notably sharp between the bright center and the surrounding darker pixels, embodying the struggle between these emotions. Zigzag patterns create a dynamic flow, enhancing the feeling of ascent against heaviness, evoking the sense of steps taken towards balance. Broken pixels introduce imperfection, suggesting the human experience amidst this emotional conflict.</desc>
