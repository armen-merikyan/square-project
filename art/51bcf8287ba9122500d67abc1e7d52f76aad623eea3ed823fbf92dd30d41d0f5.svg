<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension between Release and Containment</title>
  <desc id="desc">The emotional tone captures the conflict of desire (expressed through a warm, saturated color palette) versus the rigidity of restraint (illustrated through cool, restrained colors). The outer rows are dominated by deeper, muted tones to represent containment, while the inner rows utilize vibrant, pulsating colors that symbolize the warmth of desire. The spiral of contrast at the center creates a collision of emotional energy where the tension between a gathered glow and locked negative space is palpably felt. Broken pixels introduce intentional chaos, capturing the essence of struggle in this emotional landscape.</desc>
