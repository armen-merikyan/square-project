<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonant Decline</title>
  <desc id="desc">This artwork captures the emotional tension between dread and relief through contrasting colors and densities. The palette of burnt orange, dark red, charcoal, and gold represents ancient fire, evoking a sense of primal struggle and warmth amidst darkness. The pattern emerges from a grid layout that reflects colliding emotions: the dark reds and charcoals symbolize weight and pressure, while the burnt orange and golden hues offer moments of light and release. The arrangement is intentionally asymmetric, with pixel clusters indicating a rhythm of emotion, where the chaotic dark mass (dread) jostles against the sharper, luminous accents (relief). This reflects the essential conflict expressed in the seed, suggesting both tension and an underlying hope for balance.</desc>
