<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry vs Break</title>
  <desc id="desc">This composition captures the emotional duality of awe and terror through contrasting colors and patterns. The palette of yellow, orange, deep blue, and muted purple evokes warmth against the unsettling presence of darker hues, representing tension between order and chaos. The central seed takes the form of an abstract 'tear,' with a checker pattern symbolizing the awe, creating structured density in the center. The terror aspect is introduced through the target pattern, disrupted by broken pixels, representing the chaos that intrudes on harmony. This dichotomy is vividly felt across the arrangement, with bright elements colliding against muted background colors, creating a rhythm that prompts introspection and emotional turbulence.</desc>
