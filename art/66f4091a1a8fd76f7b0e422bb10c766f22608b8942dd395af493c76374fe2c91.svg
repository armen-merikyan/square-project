<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece encapsulates the emotional tension between vulnerability and strength through juxtaposition. The palette of sepia, tan, dust gray, and faded blue invokes a sense of broken memories and soft nostalgia. The main contrast lies in the dense central cluster of dark hues which creates a stark collision against the lighter background, symbolizing the exposed center protected by a larger quiet field. The broken pixels throughout add intentional disruptions to reinforce the idea of fragmented vulnerability within a framework of strength.</desc>
