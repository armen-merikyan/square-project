<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Static</title>
  <desc id="desc">This composition explores the emotional duality of signal and noise. The palette, highlighting signal green and electric blue against a backdrop of static gray and dead black, emphasizes the clash between clarity and interference. The dense center reflects a vibrant pulse, while the porous edges demonstrate struggle, embodying exposure vs. shelter. The vertical stripes suggest movement and clarity amidst chaos, interrupted sporadically by the scars of hot magenta to represent erasure and memory. This arrangement vibrates with a tension of echoing contrasts, ensuring a whisper of quiet space amidst the rush of noise.</desc>
