<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork explores the emotional duality of desire and emptiness through an interplay of high saturation and muted tones. The vibrant hot coral and blood orange represent desire, pushing against the shadows of charcoal and hollow blue that symbolize emptiness. The maze pattern of desire collides with target shapes of emptiness, creating an asymmetrical dance where the warm colors seek expansion within a constrained space. The bottom left corner, heavily saturated, confronts the cooler, quieter areas, highlighting the tension between yearning and restraint, while broken pixels disrupt the flow, adding a sense of imperfection and urgency.</desc>
