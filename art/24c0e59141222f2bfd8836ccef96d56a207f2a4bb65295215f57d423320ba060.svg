<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Dimensions</title>
  <desc id="desc">This piece captures the emotional tension between defiance and submission through its contrasting tones and chaotic yet contained patterns. The palette contrasts stark blacks with soft whites, representing order and chaos. There’s a collision at the center where brighter pixels ('unmoved center') intersect with darker tones ('soft collapse'), creating a pulse-like effect in their diagonal rise. The placement of broken pixels serves to evoke the feeling of imperfection within an attempt at cohesion, embodying the struggle between rigidity and fluidity in human emotion. Negative space is maintained to allow for breathing room amid the dense clusters, symbolizing the threshold between open and closed states of being.</desc>
