<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This piece explores the dualities of softness and severity, capturing a delicate emotional tone juxtaposed with sharp contrasts. The palette features muted tones of pink and warm whites against carbon black and steel gray, representing the softness weighted against the harshness of severity. The center of the square gives way to dynamic interactions and collisions between the soft echo pattern and the severe stepwell structure, suggesting a quiet channel of tension where emotions intersect and fade. Overall, the work illustrates a pulse of feeling that contrasts light against dark, evoking notions of guilt and forgiveness as echoes clash with defined boundaries.</desc>
