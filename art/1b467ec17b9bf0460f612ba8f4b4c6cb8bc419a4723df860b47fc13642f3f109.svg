<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Perception</title>
  <desc id="desc">This artwork reflects the emotional dichotomy of awe versus terror. The top half, imbued with warmer tones like sepia and tan, symbolizes awe through a balanced split-screen pattern, suggesting calmness and stability. The bottom half uses cooler colors such as dust gray and faded blue, creating a chaotic target pattern that evokes feelings of tension and unease. The contrasting edge styles—soft against hard—generate a felt collision of feelings, exemplifying the delicate balance between safety and fear hinted at by the seed's themes. Broken pixels introduce uncertainty, enhancing the overall narrative of memory and immersed experiences.</desc>
