<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the tension between control and surrender through color contrasts and spatial dynamics. The muted cream and blackened plum represent the weighted tension of control, while the vibrant small orange suggests surrender's delicate release. The central area showcases a patchwork of pressure, interrupted by flood-like bursts of contrasting color, representing emotional overflow. The uneven distribution mirrors the unpredictability of emotional states, while carefully placed broken pixels embody imperfection and vulnerability. The dominant dark tones clash softly with occasional brightness, creating a visual narrative of exposure versus shelter, drawing the viewer into a world where stability is both sought and relinquished.</desc>
