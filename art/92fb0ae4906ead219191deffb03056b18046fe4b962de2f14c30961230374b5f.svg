<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo and Collapse</title>
  <desc id="desc">The emotional tone reflects the tension between softness and severity. The palette combines warm and cool tones to express conflict and harmony: powder pink for gentleness, carbon black for strictness, with accents of sharp crimson to punctuate emotion. The main contrast occurs in the central area, where a dense cluster of softer shades interrupts the surrounding severity, representing the collision of guilt and forgiveness. This visualizes the spiraling counterclockwise motion, props up the weight at the bottom, and subtly leaves negative space echoing the idea of openness.</desc>
