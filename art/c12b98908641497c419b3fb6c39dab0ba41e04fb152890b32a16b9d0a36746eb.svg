<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos in Order</title>
  <desc id="desc">This piece explores the emotional tension between 'awe' and 'terror' through contrasting densities of color. The palette of black, dark violet, soft gold, and pale green embodies the interplay of darkness (fear, chaos) and light (hope, awe). The 'broken_pixels' introduce imperfection, symbolizing memory's frailty. The main contrast occurs at the split-screen where dark and muted elements clash with the soft gold highlights, visualizing the confrontation of opposing feelings. The pattern feels fluid yet structured, suggesting a dynamic yet unstable equilibrium, with 'inside_vs_outside' reflected in the layout's tension between dense clusters and negative space.</desc>
