<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Disrupted Balance</title>
  <desc id="desc">This composition explores the emotional tension between relief and dread through a dynamic interplay of colors and patterns. The contrast of dark shades representing dread fills the left side, creating a weighted, oppressive feeling, while warm accents evoke relief on the right. The layout symmetrically represents a balance that is undone—broken sections create a sense of disruption that references cracks and imbalances found in an empty room. The use of soft gold and pale green brings lightness and hope amidst darker hues like black and dark violet, suggesting a transition from tension to release. Overall, this abstract piece articulates a struggle between light and dark, reflecting instability yet retaining the beauty of resilience.</desc>
