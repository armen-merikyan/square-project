<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Sheltered Exposure</title>
  <desc id="desc">This composition reflects the emotional pull between safety and vulnerability. The top half employs darker, softer hues representing shelter and warmth (#4C3C28, #A56745) that create a frame-like quality. In contrast, the bottom half embraces lighter, cooler tones (#E3E6E0, #A4C8E1) suggesting exposure and a bright openness, aligned with the 'echo right' theme. The use of broken pixels (#D7B7A4) offers intentional disruption, symbolizing scars from external pressures and emphasizing an imperfection in the quest for safety. The negative space allows the viewer to breathe, balancing the weight of the composition.</desc>
