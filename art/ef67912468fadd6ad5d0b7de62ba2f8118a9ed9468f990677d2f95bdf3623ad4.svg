  <title id="title">Broken Affection</title>
  <desc id="desc">The emotional tone is centered around contrasting warmth and coldness, representing love and betrayal. The selected palette of pink and dark maroon embodies warmth, while gray introduces an element of detachment. The arrangement features rising patterns that create an upward movement, symbolizing hope against the underlying tension of brokenness. The collision happens in the center, where darker shades disrupt the lighter ones, embodying the struggle between deception and affection. This tension is accentuated by broken pixel elements at the edges, adding an imperfect layer to the symmetry, representing the fractured nature of the emotions.</desc>
