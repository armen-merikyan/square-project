<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Power Dynamics</title>
  <desc id="desc">This composition captures the emotional dichotomy of defiance versus submission through a layered, asymmetric design. The core of the square is dominated by a deep black, representing strength and resilience, while lighter accents of soft gold and pale green extend outward, signifying moments of vulnerability and softness. The palette reflects conflict — dark shades represent the heavy stance of defiance, while the gold and green thread through the grid in a whisper of submission. The inner spiral captures a sense of encroachment while echoes of black jut inwards, crafting a conversation between the solid core and the protruding lighter colors, illustrating struggle and resolution.</desc>
