<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects the tension between desire and emptiness, using a palette of warm, saturated colors for desire (hot coral, blood orange) contrasted against cooler, muted tones (charcoal, hollow blue) representing emptiness. The central contrast is between the vibrant dots that symbolize desire and the radial emptiness that envelops them, forming a spiral motion outward. This arrangement intensifies the feeling of yearning restrained by an invisible boundary, embodying the essence of the seed in a pure abstract form.</desc>
