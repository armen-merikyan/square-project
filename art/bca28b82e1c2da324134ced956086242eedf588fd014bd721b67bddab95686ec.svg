<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone embodies tension between vulnerability and strength, symbolized by dark, saturated colors representing strength colliding with softer, lighter shades portraying vulnerability. The palette includes deep teal and cosmic indigo to signify depth and strength, contrasting against star white for illumination and hope amidst shadows. The arrangement leans towards a dim background with a small bright cluster, positioning the main collision at the center, reflecting a fragile balance between exposure and harshness. The variation of pixel intensity creates a narrative of tension and relationship, inviting the viewer to sense the underlying struggle.</desc>
