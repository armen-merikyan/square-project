<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Signals</title>
  <desc id="desc">This composition explores the emotional contrast between desire and emptiness. The chosen palette of warm oranges and golden yellows represents desire, while deep blues and muted purples embody emptiness. The outer band of warm colors is fragmented and interrupted, creating a feeling of rising tension. The inner core of cool tones feels sparse and desolate, amplifying the sensation of loneliness. The juxtaposition of checker and crosshatch patterns visually narrates the push and pull between hope (desire) and isolation (emptiness), allowing a story of longing to unfold amidst the chaos.</desc>
