<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">The emotional tone draws from a tension between oppressive density and tranquil space. The palette includes darker, denser colors such as dark navy and compressed red to represent pressure, while off-white and faint peach evoke a sense of quietness, creating a stark contrast. The main collision occurs at the lower diagonal where dense color blocks fight against lighter, airy lattice structures, symbolizing the battle between stillness and pressure. The arrangement embodies a release from the weight, leading to a visual representation of clarity emerging from confusion.</desc>
