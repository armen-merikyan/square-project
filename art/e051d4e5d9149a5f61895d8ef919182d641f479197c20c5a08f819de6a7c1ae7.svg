<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">The emotional tone contrasts the essence of panic with the steadiness of control. The chosen palette of muted sepia, dusky gray, and faded blue mirrors a sense of nostalgia and unresolved tension. The top four rows embody chaos with abrupt color shifts and pixel bleed edges, creating an unsettling feeling, while the bottom four rows represent control through more stable, bound shapes and structured placement, embodying order. The interplay of dense clusters of hues against negative spaces suggests the conflict between the swirling emotions of panic and a desire for control, forming a zigzag undercurrent of interaction and unresolved dialogue.</desc>
