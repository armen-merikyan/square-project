  <title id="title">Collision of Emotion</title>
  <desc id="desc">This artwork captures the tension between tenderness and rage through the use of a split screen pattern, where the softer, muted tones blend into sharper contrasts. The palette of red for anger and pale blue for calm reflects their emotional extremes, with black creating a grounding presence. The arrangement ensures a heavy emphasis on rage, while maintaining a gentle flow of tenderness, symbolizing layers of emotion as they collide and intertwine throughout the space. The structure and layout mimic rainfall, creating a quiet yet tumultuous atmosphere, invoking feelings of introspection and connection.</desc>
