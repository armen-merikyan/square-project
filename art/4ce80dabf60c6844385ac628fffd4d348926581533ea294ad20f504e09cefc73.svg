<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Tenderness and Rage</title>
  <desc id="desc">This artwork embodies the contradiction between tenderness and rage through a juxtaposition of saturated and muted colors. The palette of deep reds and blacks represents the explosive emotions of rage, while pale blue and white offer a tender, calming balance. The collision occurs predominantly at the center, where broken pixels disrupt the flow, reflecting the turmoil within. The 'island and sea' layout emphasizes density against a quieter field, enhancing the theme of internal conflict. The interplay between the jagged edges of the rage and the soft overlaps of tenderness creates a layered, emotional landscape.</desc>
