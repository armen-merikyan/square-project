<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This composition explores the emotional tension between grief and joy through contrasting colors and patterns. The palette combines bright yellows and oranges representing joy (expanding, open) with deep blues and muted purples expressing grief (heavy, drooping). The outer layer uses broken dots to signify chaos and noise of grief, while a mirrored pattern in the center symbolizes the order and reflection found in joy. The juxtaposition creates a stair-step effect, enhancing the narrative of oscillation between safety and threat, or moments of joy piercing through the somber backdrop of grief. The main contrast occurs at the boundary between the inner and outer zones, epitomizing the struggle of emotions.</desc>
