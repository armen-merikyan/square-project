<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Worlds</title>
  <desc id="desc">This artwork encapsulates the emotional struggle between desire and restraint. The palette is driven by warm hues of hot coral and blood orange representing desire, counterbalanced by the muted tones of charcoal and hollow blue that signify restraint. The main contrast occurs in the center where saturated colors collide with muted edges, creating an intense focal point that captures the essence of conflicting emotions. The radial pattern shifts outward, while scar-like textures impose boundaries, echoing the metaphorical lattice against pressure. The negative space creates an essential void, amplifying the tension.</desc>
