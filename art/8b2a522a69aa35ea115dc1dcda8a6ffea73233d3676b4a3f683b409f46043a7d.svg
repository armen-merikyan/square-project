<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This composition explores the emotional tension between 'spark' and 'ash', juxtaposing sudden brightness against a backdrop of faded heat. The palette, featuring navy, black, single white, and dim cyan, embodies both the quiet remnants of ash and the abruptness of spark. The center features dense patterns that radiate outward, creating a visual conflict where the vibrant spark colors collide with muted ash tones. The radial pattern of ash contrasts against channel-like sparks, visually representing memories overshadowing the quick bursts of life. This arrangement captures the push-and-pull between resilience and fragility, echoing the duality in the seed.</desc>
