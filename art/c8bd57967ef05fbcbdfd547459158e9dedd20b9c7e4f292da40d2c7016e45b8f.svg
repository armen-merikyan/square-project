<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork embodies the tension between desire and emptiness. The top half features the warm palette of desire, characterized by saturated colors like hot coral and blood orange, creating a feeling of urgency and depth. In contrast, the bottom half employs cooler shades of charcoal and hollow blue, evoking an oppressive emptiness. Each row reflects distinct patterns; pulse marks in the top half create rhythm and intensity, while a flood of muted tones in the bottom offers calmness and blankness. The central collision of colors, where warm accents meet stark cooler regions, symbolizes a boundary that desire cannot cross. The broken pixels scattered through the piece serve as intentional disruptions, representing the frayed edges of hope and fulfillment.</desc>
