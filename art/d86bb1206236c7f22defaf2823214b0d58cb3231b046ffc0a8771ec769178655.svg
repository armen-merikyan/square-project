<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory in Motion</title>
  <desc id="desc">The artwork embodies the tension between light and dark, representing the battle between spark and ash. The palette, derived from 'mourning_renewal', includes deep blues and pale yellows that evoke a sense of quiet resilience against the backdrop of settled dust. The main collision occurs in the center, where sharp, jagged edges of dark convey conflict, interrupted by softer, spacious stripes of pale hues that suggest fleeting moments of clarity amidst chaos. This interplay of dense and quiet spaces mimics memory and motion, lighting up the space while acknowledging the weight of past ashes.</desc>
