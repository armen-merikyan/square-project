<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragments of Emotion</title>
  <desc id="desc">This artwork encapsulates the tension between joy and grief through a deliberate arrangement of contrasting colors and patterns. The bright yellows and oranges represent joy, contrasted with muted purples and deep blues symbolizing grief. The layout mirrors on the left and right but introduces disruptions in pixel alignment to reflect emotional fractures. The wave-like pattern interrupts the stripes, symbolizing how joy can crash against grief, while the thin outline offers a sense of framing that keeps these emotional elements contained yet present. The broken pixels instill imperfection, echoing the complexity of human emotion. Negative space allows for moments of contemplation amid the intensity.</desc>
