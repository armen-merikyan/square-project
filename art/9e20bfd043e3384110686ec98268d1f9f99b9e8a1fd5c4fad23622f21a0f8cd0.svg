<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The artwork explores the emotional tension of joy and grief, represented by warm colors (yellow, orange) colliding with deeper, muted tones (deep blue, muted purple). The center features a bright, open yellow contrasting against a maze-like structure of deeper hues around it, suggesting layers of grief surrounding the joy at the core. The piece’s layout features a left-weighted asymmetry, with the grid pattern representing the structured experience of joy, while the broken-edge style captures the interruptions caused by grief, creating a dynamic visual narrative of conflict and resolution.</desc>
