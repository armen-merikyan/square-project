<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The emotional tone reflects the struggle between desire and restraint, captured through a blend of saturated and muted colors. The palette features hot coral and blood orange as vibrant expressions of desire, while charcoal and hollow blue embody restraint. The main collision occurs in the center, where the brighter colors brush against the more subdued tones, suggesting overlapping emotional currents. The application of broken pixels introduces imperfections, evoking scars from this emotional battle. The rising flow layout implies a yearning that meets containment, and the varied patterns of stairs and sparks convey both the upwards movement of desire and the scattered interruptions of restraint.</desc>
