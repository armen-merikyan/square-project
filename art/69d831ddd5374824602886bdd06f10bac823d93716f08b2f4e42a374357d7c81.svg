<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone captures a struggle between the warm pull of desire and the cold expanse of emptiness. The palette transitions from deep charcoal to vibrant coral, highlighting this tension. The upper half displays the saturated warmth of desire through braided patterns, while the lower half is marked by glitchy disruptions representing emptiness. The collision occurs in the transition zone, creating a stark border that encapsulates the concept of restraint. Structured chaos emerges from the seed's representation of a crown, suggesting a layered complexity in this emotional narrative.</desc>
