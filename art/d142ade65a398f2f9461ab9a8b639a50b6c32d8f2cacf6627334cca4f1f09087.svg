<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Quiet Tension in Motion</title>
  <desc id="desc">This composition reflects the emotional tension between defiance and submission through a deliberate clash of structured patterns and expansive negative spaces. The chosen palette of soft pinks and stark blacks creates a visual dichotomy, enhancing the contrast between an unmoving center (defiance) and fluid outer edges (submission). The uneven border emulates a break in compositional order, allowing colors to spill over—echoing the effects of chaotic influences in a calm environment. The interplay of ripple patterns representing defiance against the constellation of submission punctuates the square, evoking a sense of unresolved conflict.</desc>
