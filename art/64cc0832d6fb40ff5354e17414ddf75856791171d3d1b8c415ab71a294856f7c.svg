<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Unity and Ruin</title>
  <desc id="desc">This piece encapsulates the emotional dichotomy of love and betrayal through the interplay of warm and cool colors. The palette blends soft pinks and reds with stark grays and dark maroon, narrating the warmth of love clashing with the coldness of betrayal. The layout mirrors almost perfectly, yet small disruptions hint at emotional fractures, seen through broken pixels scattered throughout the piece. The diagonal rise suggests an upward momentum, juxtaposed with broken edges representing the fragility of relationships. The tension between grouped and solitary colors articulates the conflict existing within loving bonds that are susceptible to betrayal.</desc>
