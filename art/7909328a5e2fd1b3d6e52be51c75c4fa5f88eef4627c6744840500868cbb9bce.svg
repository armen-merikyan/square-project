<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Gravity of Emotion</title>
  <desc id="desc">This composition embodies the tension between relief and dread. The chosen palette reflects muted sepia tones to evoke nostalgia, contrasting with faded blues suggesting heaviness or shadow. The dominant dark colors create a weighty, oppressive feel at the top, while lighter hues near the bottom provide a sense of escape and relief. The arrangement flows down like falling tears, embodying the emotional pull of dread balanced by fleeting moments of calm. The jagged edges are intentionally chaotic, embodying the broken areas of the pattern and the emotional clash between harmony and disruption.</desc>
