<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Longing and Resolve</title>
  <desc id="desc">This piece embodies the emotional tension between longing and resolve through contrasting patterns. The warm coral and soft amber colors reflect a sense of yearning, while the cold slate and blue-black provide a grounding presence, symbolizing resolve. The checker pattern evokes longing with its irregular connections, interrupted by a rain-like pattern that conveys a strong, straight-edge impulse. The central collision of colors creates a dynamic interplay, illustrating the struggle between the need to reconcile and the impulse to break free. The arrangement incorporates broken pixels to reinforce feelings of damage and repair, fostering an atmosphere of urgency and serenity alike.</desc>
