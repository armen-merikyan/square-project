<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust</title>
  <desc id="desc">The emotional tone balances between trust and suspicion, represented by the deep navy contrasting against muted blacks, creating a sense of pressure and noise. The quiet dim cyan serves as a boundary, embodying fragments of trust within the dense, saturated fields of suspicion. This dynamic creates a central clash, echoing the ‘signal vs noise’ theme with patterns that interrupt yet evoke a sense of resilience amidst fragility, where the ‘rain’ represents trust through organized flow against the ‘lattice’ chaos of suspicion.</desc>
