<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">The artwork reflects the emotional tension between envy and gratitude through a striking palette of dark navy and dim cyan against lighter tones, representing the weight of envy tempered by the lightness of gratitude. The composition feels left-weighted to emphasize a struggle, as dark colors dominate the left side while bright pixels introduce a counterbalance on the right. The zigzag motion mimics a restless interplay, embodying the broken mirror of conflicting emotions and creating a rhythmic pulse from top to bottom. This guiding flow resonates with a story of disruption complemented by quiet interruptions of color.</desc>
