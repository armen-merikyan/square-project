<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">The emotional tone navigates the juxtaposition between softness and severity, reflecting a dynamic interplay between light and dark. The palette combines soft hues like powder pink and warm white with sharper tones like carbon black and sharp crimson to establish a visual tension. The main collision occurs at the center of the square, where denser areas of warm and cold colors clash, created through a static severity pattern that contrasts with the soft crack patterns spreading outward. These moments of interruption and overlap evoke feelings of pulse and balance, aligning with the ideas of guilt and forgiveness expressed in the seed. The layout is designed to make the center feel heavy and filled, while the edges fade away, embodying the tension of the conceptual themes while maintaining an abstract form.</desc>
