<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in a Void</title>
  <desc id="desc">This piece explores the emotional contrasts of panic and control. The left side employs a checker pattern in dark violet and black to invoke the feeling of structured control with a sense of tightness, while the right side uses a rain-like pattern of pale green and soft gold, suggesting chaotic energy and spontaneous feelings. The clash of dense blacks interspersed with lighter colors represents a breaking point between stability and instability, echoing the seed concepts of inside vs outside and love betrayal. The negative space ensures the viewer feels the tension of a void, embodying the empty room, while broken pixels add a layer of imperfection, enhancing the emotional depth of the artwork.</desc>
