  <title id="title">Hunger Contained</title>
  <desc id="desc">This artwork encapsulates the tension between 'emptiness' and 'desire', strongly contrasting deep charcoal and quiet blue tones with vibrant coral and orange accents. The left half conveys restraint with low saturation, while the right bursts with saturation, suggesting an overflowing desire. The broken pixels introduce an intentional disorder, reflecting the idea of disruption against a structured environment. This split layout fosters the feeling of conflict between yearning and the barriers that limit it.</desc>
