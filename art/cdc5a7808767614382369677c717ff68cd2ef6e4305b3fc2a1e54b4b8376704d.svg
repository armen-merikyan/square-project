<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This piece captures the emotional tension between joy and grief through warm and cool color contrasts. The palette integrates yellow and orange to represent joy's spark, while deep blue and muted purple symbolize grief's weight. The zigzag flow composed of crosshatch and rain patterns suggests a dynamic shift between states, enhanced by broken pixels to introduce imperfections and evoke the complexity of emotion. The arrangement features a clear split with dense clusters at the top (representing high emotion) gradually softening toward the bottom (symbolic respite), maintaining a negative space that enhances the feeling of unresolved tension.</desc>
