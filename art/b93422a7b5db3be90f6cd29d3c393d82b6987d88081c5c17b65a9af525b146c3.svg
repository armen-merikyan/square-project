<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Division</title>
  <desc id="desc">The emotional tone conveys the tension between love (represented by softer, warmer colors) and betrayal (shown through cooler, darker hues). The palette features pinks and reds for warmth juxtaposed against dark maroon and gray, creating a feeling of conflicted emotions. The main contrast occurs in the use of paired shapes created through a crosshatch pattern that embodies love, colliding against a checker pattern that suggests betrayal. This collision creates an unresolved tension that echoes throughout the piece, encapsulating the emotional struggle of the seed.</desc>
