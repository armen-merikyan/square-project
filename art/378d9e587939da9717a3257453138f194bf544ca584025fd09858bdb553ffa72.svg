<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Affection</title>
  <desc id="desc">This composition captures the emotional tension between love and betrayal through a juxtaposition of warm and cool colors. The palette combines soft pinks and reds with stark grays and dark maroon, illustrating the warmth of love against the cold shadow of betrayal. The arrangement features a vertical wave flow that mimics the descent of emotions, creating a rhythmic yet interrupted sensation. The main contrast is achieved through the sharp edges of dark colors cutting through the softer hues, embodying the collision of feelings. The broken pixels introduce imperfections, reflecting the theme of betrayal within an otherwise harmonious setting, while negative spaces echo the loneliness suggested by the seed.</desc>
