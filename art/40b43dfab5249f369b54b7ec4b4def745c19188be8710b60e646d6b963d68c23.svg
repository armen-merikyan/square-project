<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Colliding Emotions</title>
  <desc id="desc">This artwork embodies the tension between restlessness and peace through a dynamic arrangement of color. The selected palette of mourning black, deep blue, new leaf, pale yellow, and stone reflects a spectrum of emotions, with deep hues suggesting depth and conflict, while light tones offer glimpses of calm. The main contrast occurs at the center, where the quiet symmetry of pale yellow clashes with the stuttered lines of black and blue, representing the restless motion against a backdrop of peace. The broken pixels create an organic texture that interrupts the flow, adding to the sense of struggle and duality, echoing the seed's themes of memory and motion.</desc>
