<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This composition explores the emotional tension between vulnerability and strength. The chosen palette of warm ivory, deep wine, and ash gray represents the duality: warm ivory and soft gold signify vulnerability, while the deep wine and stain brown allude to strength. The layout's split vertical format contrasts these emotions, where the left half (vulnerability) uses soft striped patterns and lighter colors creating an exposed feeling. The right half (strength) is a patchwork of darker, denser colors depicting a hard-edged barrier. Broken pixels disrupt the flow, suggesting imperfections and scars caused by pressure. The main collision manifests at the center, where both patterns clash, creating a dynamic visual tension.</desc>
