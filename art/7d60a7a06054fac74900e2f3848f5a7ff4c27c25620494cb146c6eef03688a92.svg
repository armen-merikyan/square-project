<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">The composition embodies the emotional contrast between softness and severity, utilizing a palette of powder pink and sharp crimson against deep blacks and grays. The left half, representing softness, is composed of gentle, powdery tones and negative cross patterns that feel tender and inviting. The right half reflects severity with a patchwork of deep, dark colors sharply cutting through lighter shades, creating a strict visual axis. The collision occurs at the midpoint where the soft colors meet the harsh patterns, symbolizing the tension between guilt and forgiveness. This piece illustrates a gradual shift from softness to severity, akin to a pulse transitioning through emotional states.</desc>
