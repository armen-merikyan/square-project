<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This piece captures the emotional tension between control and surrender through the contrast of dark and pale colors. The palette blends deep black and red, suggesting contained pressure, with soft pale blue and white representing yielding. The main collision occurs in the center, where dark tones converge, forcing a release into the lighter outer edges, signifying surrender. The broken pixel arrangement illustrates the imperfections and disruptions inherent in this emotional conflict, while the open corners allow for negative space to whisper of liberation.</desc>
