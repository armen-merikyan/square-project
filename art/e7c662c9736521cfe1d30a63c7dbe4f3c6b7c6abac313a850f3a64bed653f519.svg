<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order and Chaos</title>
  <desc id="desc">This piece contrasts the intensity of 'spark' with the subdued presence of 'ash.' The emotional tone reflects tension between ambition and limitation. The chosen palette combines 'cosmic indigo' and 'void black,' representing depth and repression, while 'star white' and 'cold gold' bring bursts of brightness, similar to sparks in darkness. The grid is segmented, with clusters of color that imply a push-and-pull dynamic: the broken dots suggest ongoing movement in the face of static ash, embodying resilience and fragility through their placement. The main collision occurs diagonally across the square, where vibrant colors clash with muted fields, creating an energetic yet desolate visual dialogue.</desc>
