<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Emotion</title>
  <desc id="desc">This artwork embodies the emotional tension between joy and grief through a deliberate juxtaposition of colors and patterns. The palette, featuring warm yellows and oranges alongside deep blue and muted purple, reflects this duality, with warm colors representing joy and cooler tones symbolizing grief. The split horizontal layout and wave-like movement evoke a sense of rising tension, while the crosshatch pattern introduces probing interruptions against a more solid checker. The density in the center contrasted with negative spaces accentuates the emotional struggle, emphasizing the collision between moments of brightness and the creeping shadows of sorrow.</desc>
