<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotions</title>
  <desc id="desc">This artwork captures the tension between tenderness and rage through a contrasting palette of saturated and muted colors. The deep reds represent the explosive nature of rage while the pale blues symbolize the gentleness of tenderness. The layout features a hollow center, surrounded by vigorous horizontal stripes that evoke rage, while gentle channels of color flow around it, creating an emotional pulse. This collision occurs at the center, where the reds and blacks meet the softer tones, embodying the push and pull between calmness and intensity.</desc>
