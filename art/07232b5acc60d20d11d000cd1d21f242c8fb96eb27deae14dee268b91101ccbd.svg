<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Resonance</title>
  <desc id="desc">The emotional tone is a juxtaposition of spark and ash, representing dynamic tension and quiet residue. I chose a palette of ice blue for calmness amidst the striking warning orange to signify bursts of energy. The contrast lies at the center, where jagged edges of vibrant orange collide with deep ink black, suggesting an interrupted narrative. The pattern reflects the braided quality of ash mixed with quieter spaces, creating a visual echo of resilience and fragility, while the negative space enhances the feeling of erasure. Overall, the arrangements create a dialogue of tension and release.</desc>
