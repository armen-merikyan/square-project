<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmony of Tensions</title>
  <desc id="desc">The emotional tone oscillates between defiance and submission, echoing a struggle between a firm center and surrounding chaos. The palette, 'hunger_restraint,' employs deep hues of red_oxide and blackened_plum for passion and conflict, contrasted with muted_cream for softness. The edge style is left-weighted, presenting a strong boundary where defiance meets submission—captured in the outer layers against a softer core. The main collision is centrally located, highlighted by the angular patterns of defiance that interrupt the softer rain-like submission colors. This dynamic interplays of tension and release resonate with the treatment of the seed, positioning a conflict in a visually abstract form.</desc>
