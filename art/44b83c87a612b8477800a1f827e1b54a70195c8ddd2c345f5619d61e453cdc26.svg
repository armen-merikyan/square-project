<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This composition embodies the emotional tension between envy and gratitude through a split vertical layout. The left side, representing envy, features darker, heavier colors symbolizing weight and pressure, while the right invokes gratitude with lighter, softer hues suggesting elevation and hope. The use of broken pixels introduces imperfection, resonating with the mirror broken concept. Collision occurs where the dark and light colors interact, creating a dynamic contrast throughout the piece. The chosen palette of black, dark violet, soft gold, and pale green captures the essence of fear and hope, forming a visual echo of the emotional struggle in the seed.</desc>
