<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Flux</title>
  <desc id="desc">This composition explores the emotional duality of confusion and clarity through contrasting color arrangements. The use of a dark navy and deep black creates a moody foundation, representing confusion and chaos. Meanwhile, single white and dim cyan punctuate the piece, instilling moments of clarity amidst the turmoil. The left-to-right flow symbolizes a journey from chaos to calm, where the thick outlines intersect and diverge. Broken pixels are introduced as interruptions, amplifying the sense of imperfection and imbalance, creating a narrative of persistent tension. The resulting grid structure emphasizes the contrasting patterns—split screen for confusion and radial for clarity—capturing the essence of the emotional experience without becoming literal.</desc>
