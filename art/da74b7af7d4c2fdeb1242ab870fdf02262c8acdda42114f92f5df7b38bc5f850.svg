<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This abstract piece encapsulates the duality of joy and grief through color contrasts and structural flow. The palette—bright yellows and oranges representing joy against deep blues and muted purples exuding grief—creates a visual tension. The split horizontal layout emphasizes a divide, while wave-like patterns suggest the ebb and flow of emotions. The use of broken pixels introduces an element of imperfection, echoing the fragmented nature of these feelings. The overall composition conveys a delicate balance between brightness and heaviness, invoking an emotional story of coexistence.</desc>
