<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Trust</title>
  <desc id="desc">This piece explores the duality of trust and suspicion through a stark palette of navy and black contrasting with soft white and dim cyan. The top half, reflecting 'trust,' is a checkerboard of balanced warmth, while the bottom half, representing 'suspicion,' features a grid of wave-like tension. The primary collision occurs at the horizontal split, embodying a shift in emotional states—subtle structured warmth giving way to a chaotic pattern representing doubt. The broken pixels throughout signal disruptions in trust, while maintaining a quiet field in the background.</desc>
