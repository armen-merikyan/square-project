<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This artwork captures the emotional tension between softness and severity through the juxtaposition of warm and cool colors. The palette features soft pinks and whites clashing with stark blacks and grays, creating an undercurrent of conflict. The main contrast emerges from the dense cluster of black in the bottom left, spilling into softer tones that represent forgiveness and lightness. The spiral pattern suggests movement and transition, echoing the ebb and flow of emotions, while broken pixels add an element of imperfection, symbolizing the fragmented nature of guilt and recovery.</desc>
