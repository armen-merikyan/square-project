<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone reflects a struggle between desire and emptiness. The color palette of hot coral, blood orange, and dust pink symbolizes warm desire, while cool charcoal and hollow blue represent the emptiness. The pattern of broken dots in the left half creates visual tension, while the rain-like pattern in the right evokes a sense of quiet desolation. The contrast is seen in the central area where the vibrant hues collide with the muted tones, illustrating the tension between the urge to overflow and the necessity of containment.</desc>
