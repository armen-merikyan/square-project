<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tectonics</title>
  <desc id="desc">This artwork encapsulates the tension between fear and hope, portrayed through contrasting patterns and colors. The chosen palette of deep black, dark violet, soft gold, and pale green emphasizes this duality, with darker colors representing fears and anxieties framing the lighter, hopeful center. The layout flows from the outer edges inward, suggesting that the pressures of emotion compress toward a more hopeful core, illustrated by the rising flame pattern in the center. Chaos is subtly introduced via broken pixels, creating a dynamic tension within this structured formation.</desc>
