<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Duality</title>
  <desc id="desc">This artwork captures the tension between desire and emptiness. The palette, featuring burnt orange and gold alongside darker tones, emphasizes the warmth of yearning against the coolness of absence. The outer edges, in deep charcoal, create a thick barrier that suggests protection while contrasting with the intricate maze within, representing the complexity of unfulfilled desire. The pattern alternates between densely packed colors and negative space, allowing moments of quiet reflection amidst emotional noise, embodying a heart fragment caught between longing and solitude.</desc>
