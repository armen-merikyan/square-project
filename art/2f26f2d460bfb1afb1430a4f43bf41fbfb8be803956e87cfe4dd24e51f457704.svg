<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Connection</title>
  <desc id="desc">The emotional tone of the piece reflects the tension between loneliness and connection. The palette features warm oranges and yellows representing ancient fire, creating warmth and a sense of potential connection, effectively colliding with the deep blues and muted purples that convey isolation. The placement of the colors showcases a contrast of central bursts surrounded by deeper, more muted tones, representing the hidden versus exposed feelings. The crosshatch pattern adds a rhythm of connection while maintaining a top-weighted density that suggests pressure from outside. This evokes a longing for connection amidst a backdrop of loneliness.</desc>
