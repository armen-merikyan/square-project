<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">This piece embodies the emotional struggle between lightness and heaviness, using a palette tinted with warmth to evoke both dread and relief. The bright burnt orange suggests moments of positivity and hope, while the deep charcoal creates a backdrop of struggle and tension. The layout favors negative space, emphasizing an 'empty room' where emotion fluctuates; the broken dots pattern reflects the chaos of dread, while the rings simulate the calm of relief, clashing to form a well-defined central focus. Collision occurs in the upper sections, where brightness fights against more oppressive colors, illustrating an internal struggle that aims for balance amidst fragmentation.</desc>
