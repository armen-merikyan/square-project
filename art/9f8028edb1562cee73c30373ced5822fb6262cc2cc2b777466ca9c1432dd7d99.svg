<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Motion</title>
  <desc id="desc">This composition captures the emotional tone of 'desire' and 'restraint' through contrasting palettes and spatial tension. The bright, warm colors—#FF6F61 (hot coral) and #FF4C00 (blood orange)—are used to signify desire and the need for connection, while muted tones like #3E3E3E (charcoal) and #A9CDE0 (hollow blue) embody restraint, creating a visual tug-of-war. The main collision occurs at the center of the square, where crosshatch patterns of sanguine warmth disrupt the muted stair-stepped restraint, embodying a dynamic shift. Their interaction simulates the ineffable push-pull of yearning and limitation, with broken pixels introducing intentional disruptions throughout, enhancing the overall emotional depth.</desc>
