<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in a Fractured Space</title>
  <desc id="desc">The emotional tone contrasts 'panic' and 'control', reflecting an inner battle within an empty room. The chosen palette of sepia, tan, dust gray, and faded blue creates a sense of nostalgia mixed with unease, representing how memories can feel both comforting and haunting. The main contrast appears in the center, where deep shades suggest tension against lighter hues, symbolizing the clash between order (control) and chaos (panic). The pattern of stripes on one side juxtaposed with a split screen embodies the fracture in emotional stability, while broken pixels convey imperfection and disruption in an otherwise calm space.</desc>
