<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">This piece embodies the emotional tension of longing against the grounded nature of resolve, visualized through deep contrast and fragmented patterns. The palette contains cosmic indigo and deep teal for a sense of depth and uncertainty, while star white serves as a stark yet calming accent, highlighting areas of intersection and collision. The grid is structured with a notable central vortex of activity, where darker patterns of longing collide with lighter, resolved spaces, creating an echo of conflict and serenity, reminiscent of the feeling of a fragmented mirror. The usage of broken pixels introduces intentional disruptions, evoking the sensation of damage and repair amid the overall composition, where emotion creates and alters the form.</desc>
