<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">The emotional tone draws from a juxtaposition of panic and control, visualized by a structured left side and chaotic right side. The palette features warm hues of pink and red to evoke a sense of urgency and tension alongside muted grays and dark maroon that signify control and stability. The main contrast is between the mirror pattern representing control and the cracked pattern embodying panic, which creates a visual collision. This opposition is further emphasized by the layout, creating a split that simulates an outer pressure pressing inward, reflecting the themes of internal conflict and emotional dissonance.</desc>
