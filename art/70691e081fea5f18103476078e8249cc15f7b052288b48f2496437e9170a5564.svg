<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos and Order</title>
  <desc id="desc">This composition embodies the tension between control and panic through a palette of burnt orange, dark red, charcoal, and gold, signifying the heat of conflict. The central area is deliberately dense, creating a 'center seed' around which more chaotic patterns emerge, reflecting the gradual breakdown into a maze-like structure towards the edges. The main contrast occurs at the boundary where structured control in dark reds collides with the chaotic, fiery oranges. This conflict resonates with the emotional essence of the seed, presenting an abstract narrative of descent into disorder.</desc>
