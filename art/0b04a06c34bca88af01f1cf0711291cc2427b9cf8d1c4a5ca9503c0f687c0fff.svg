<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This composition reflects the tension between longing and resolve, using a muted palette that evokes nostalgia and strength. The warm undertones of red oxide and small orange speak to a sense of yearning, while blackened plum and iron gray bring a shadowy weight, representing solidity and determination. The tension is emphasized at the center where the two emotional qualities collide, creating a dynamic interruption. The chosen lattice pattern for longing mingles with the mirrored structure of resolve, allowing the viewer to experience a layered emotional narrative.</desc>
