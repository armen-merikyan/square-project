<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Connections</title>
  <desc id="desc">The emotional tone reflects a struggle between loneliness and the desire for connection. The palette of sepia, tan, dust gray, and faded blue symbolizes the nostalgia and emotional weight associated with both emotions. The contrast is heavily evident in the center, where lighter tones represent connection and warmth attempting to burst from the darker, grid-like patterns of isolation. The top-weighted layout creates a feeling of pressure at the top, suggesting weight above, while broken pixels hint at imperfections in the emotional landscape.</desc>
