<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Layers</title>
  <desc id="desc">This artwork embodies the emotional contrasts of vulnerability and strength through color and pattern. The palette, composed of intimate yet distant hues, reflects the interplay between warmth (represented by rose clay and lamp gold) and coolness (cool blue and distant lilac). The main contrast emerges at the center, where densely layered 'ladder' patterns of strength confront the more exposed 'stripe' patterns of vulnerability, creating a visual tension that symbolizes the constant push and pull of emotional experiences. The intentional use of broken pixels enhances the sense of precious imperfection, echoing the complexities of personal strength and vulnerability.</desc>
