<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Clashing Pulses</title>
  <desc id="desc">This piece visualizes the emotional tension between tenderness and rage through color and pattern. The palette contrasts sharp reds representing rage with muted whites and pale blues conveying tenderness, embodying the struggle between explosive emotions and calm refuge. The composition features two distinct centers (the rage in red bursts and the tenderness in softer tones) pulsating toward one another, creating a zone of complexity. The overlapping patterns—embers of rage clashing with gentle rain—echo the central theme of conflict and the search for balance, all while keeping a significant negative space for emotional depth.</desc>
