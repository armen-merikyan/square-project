<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos and Light</title>
  <desc id="desc">This piece reflects the tension between confusion and clarity, using the palette from 'lonely_signal'—deep navy and black representing confusion, contrasted with bright white and dim cyan symbolizing clarity. The diagonal flow suggests falling pixels from the center outward, creating a tension where bright accents disrupt darker regions, invoking a sense of fragmentation amidst potential resolution. The contrast between full squares of color and hollow spaces expresses the dualities inherent in emotional experiences—from the vastness of confusion to moments of piercing clarity.</desc>
