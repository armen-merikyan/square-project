  <title id="title">Erosion of Shelter</title>
  <desc id="desc">The emotional tone presents a stark contrast between vulnerability and protection. The warm brown and shelter green evoke a sense of safety, while the pale skin and open blue suggest exposure. This duality is reflected through a split vertical layout, where one side is denser and more structured, embodying safety, and the other fades into softer, quieter islands of color representing vulnerability. The broken pixels add a sense of imperfection and interruption, enhancing the feeling of a fragile balance between shelter and exposure.</desc>
