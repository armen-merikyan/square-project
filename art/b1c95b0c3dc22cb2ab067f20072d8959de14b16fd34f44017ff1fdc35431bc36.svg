<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Fracture</title>
  <desc id="desc">This composition embodies the duality of 'awe' and 'terror' through contrasting colors and patterns. The palette of sepia and faded blue evokes an emotional grounding while introducing a sense of instability. The radial pattern emerging from the center symbolizes 'awe', while the crack patterns on the periphery echo 'terror', illustrating the conflict between order and chaos. Negative space is preserved, suggesting an unresolved tension, while broken pixels infuse imperfection, enhancing the emotional depth. The flow from bottom to top reinforces an ascending tension, contrasting with the soft edges that bind the chaos together, creating a whole that feels both cohesive and fractured.</desc>
