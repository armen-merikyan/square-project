<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry Fractured</title>
  <desc id="desc">This artwork conveys the emotional tension between panic and control through its contrasting warm and cool palette. The palette, inspired by 'broken_memory,' utilizes sepia tones for warmth and faded blue to introduce a cold, melancholic presence. The intersection of soft edges and broken pixels creates a sense of dynamic collision, suggesting order disrupted by chaos. The 'rising_signal' layout evokes a sense of hope, while the systematic grid of cooler tones attempts to assert control. However, irregular patterns of warm dots introduce an element of unpredictability, embodying the struggle between felt tension. Overall, this piece balances a rhythm of calmness and anxiety, echoing the seed's narrative of conflict.</desc>
