<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece explores the emotional tension between desire and restraint through contrasting colors and patterns. The saturated reds and muted creams symbolize a desperate yearning, while the deep blackened plum and iron gray create a sense of limitation and containment. A small, bright cluster in the center collides with the darker edges, representing conflicting emotions and narrative tension. As one moves outwards, the visual weight decreases, echoing the idea of a pervasive but restrained desire. The lattice 'teeth' pattern subtly interrupts the glowing 'embers', showing the struggle against digital borders and seals.</desc>
