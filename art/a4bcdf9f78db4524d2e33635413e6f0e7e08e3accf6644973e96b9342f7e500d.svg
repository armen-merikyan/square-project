<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Resolve</title>
  <desc id="desc">The emotional tone of this artwork captures the tension between longing and resolve. It uses dark reds and burnt oranges to evoke a deep emotional pull, interspersed with lighter gold to represent moments of clarity and resolution. The choice of charcoal grounds the piece, creating a contrast between the warmth of resolve and the cool shadow of longing, suggesting a complex interplay of emotions. The collision occurs in the center where the warm colors intersect with deep shadows, expressing the push and pull of these emotional states. The palette echoes the ancient fire theme, resonating with feelings of both comfort and unrest, while the layout maximizes negative space to enhance the feeling of both longing and emptiness around the framed central forms.</desc>
