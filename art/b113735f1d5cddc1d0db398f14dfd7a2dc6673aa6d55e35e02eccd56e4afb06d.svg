<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emptiness and Desire</title>
  <desc id="desc">This piece explores the emotional struggle between emptiness and desire, with a palette that juxtaposes muted dark tones against brighter hints of warmth. The center of the canvas emerges as a focal point, decorated with soft gold representing desire, while surrounding dark violets and blacks portray the emptiness surrounding it. The design applies a grid-like structure to depict an argument, where the stripes of desire clash with the raindrop patterns of emptiness. The effect ultimately creates a narrative of tension and collision, which reflects the ebb and flow of human emotion.</desc>
