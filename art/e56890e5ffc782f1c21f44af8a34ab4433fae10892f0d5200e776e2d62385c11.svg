<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Duality</title>
  <desc id="desc">This artwork captures the dynamic tension between fear and hope through contrasting elements of sharp and soft patterns. The palette mixes deep blacks and dark violets to represent fear, against soft golds and pale greens to embody hope. The layout starts heavy in one corner and lightens towards the center, evoking a rising signal. The broken pixels add a sense of imperfection and uncertainty, enhancing the emotional depth of the piece. This engagement of contrasting emotions radiates throughout the composition, echoing the complexities outlined in the seed.</desc>
