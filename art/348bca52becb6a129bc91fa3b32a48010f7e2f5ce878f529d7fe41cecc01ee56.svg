<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Stillness</title>
  <desc id="desc">The piece portrays the emotional dichotomy between restlessness and peace through a saturated versus muted palette. The warm tones of rust and small gold actively disrupt the quiet symmetry of moss green and bone white, creating a sense of tension. The arrangement, reflecting a pattern flow of inert calm interrupted by jagged edges of flame-like colors, illustrates the struggle between settled tranquility and an underlying turmoil. The main collision occurs predominantly in the center, embodying the idea of pressure against quiet escape, while intentional broken pixels hint at imperfections in the pursuit of peace.</desc>
