<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Restless Harmony</title>
  <desc id="desc">The emotional tone reflects the tension between chaos and tranquility. The palette of deep wine, warm ivory, ash gray, soft gold, and stain brown evokes feelings of warmth contrasted with muted calm. The collision occurs between the structured maze and the erratic spark patterns, primarily concentrated in the center of the grid, suggesting a struggle between two opposing forces. The restlessness is portrayed with broken, unsettled patterns, while peace emerges in the maze-like order, forming a dynamic, yet cohesive square.</desc>
