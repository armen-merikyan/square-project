<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Drift</title>
  <desc id="desc">The emotional tone reflects a struggle between the past and future, encapsulated in the split horizontal layout. The palette of navy and dim cyan evokes feelings of loneliness and contemplation tied to nostalgia, while the presence of black signifies the weight and density of progress. The contrast between darker shades and lighter hues in the grid creates a dynamic tension, bridging the dense presence of nostalgia against an evolving future. The main contrast occurs between the densely packed lower rows and the quieter spaces above, suggesting an upward struggle against external pressures.</desc>
