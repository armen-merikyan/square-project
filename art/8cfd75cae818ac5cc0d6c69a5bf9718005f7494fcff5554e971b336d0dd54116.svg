<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">This artwork embodies the collision between softness and severity, reflected through a blend of soft, powder-like colors against sharper, darker tones. The palette features lighter hues like powder pink and warm white to evoke a soft, nurturing quality contrasted with carbon black and sharp crimson for severity. The placement of colors creates a dense center of severity, interrupted by lighter tones that spiral outward, symbolizing the tension of guilt and forgiveness. The layout of 'scattered repair' emphasizes the idea of brokenness mending over time, creating visual narratives of feeling and resolution.</desc>
