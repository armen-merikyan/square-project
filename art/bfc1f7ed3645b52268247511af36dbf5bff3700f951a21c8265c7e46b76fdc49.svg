<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tide of Inquiry</title>
  <desc id="desc">This artwork embodies the emotional contrast of certainty and curiosity through a dynamic interplay of colors and patterns. The cool, muted tones convey a sense of stability and order, while the vibrant accents represent a desire for exploration and intrigue. The collision occurs at the center where the dense blue-black clashes with the soft amber, suggesting the tension between certainty (the structured border) and curiosity (the chaotic inner pattern). Broken pixels create intentional disruptions, highlighting a sense of imperfection and exploration. Altogether, this composition reflects an emotional journey from the assurance of the known to the depths of the unknown.</desc>
