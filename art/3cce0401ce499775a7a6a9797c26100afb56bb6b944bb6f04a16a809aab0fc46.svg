<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Dissonance</title>
  <desc id="desc">This abstract piece explores the tension between confusion and clarity. The use of deep black and striking electric blue serves to evoke both a sense of calm (clarity) and a sense of noise (confusion). The layout begins with a thick band of black at the bottom, suggesting weight and pressure, while the electric blue pulses upward in jagged patterns, creating a dynamic flow. Broken pixels introduce imperfection, emphasizing fragmentation amidst a near-symmetrical structure. The palette evokes emotions tied to technology and the mechanized world, where clarity often conflicts with overwhelming noise. The pattern flows diagonally, initiating from the bottom left, reminiscent of a disrupted pulse, creating an echo of dissonance.</desc>
