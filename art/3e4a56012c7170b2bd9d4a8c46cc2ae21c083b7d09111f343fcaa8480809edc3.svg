<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">This work encapsulates the vivid struggle between envy and gratitude. The palette, combining vibrant yellows and oranges with muted purples and deep blues, evokes the warmth of gratitude against the cool, heavy backdrop of envy. The central focus is a gradient burst of light-colored hues that symbolizes hope, drawing the eye inward like a soft tear against a tumultuous edge, creating a sense of balancing light against dark. This clashing between light and shadows expresses the emotional conflict defined by rising tension and falling relief.</desc>
