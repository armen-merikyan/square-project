<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Safety</title>
  <desc id="desc">This piece captures the emotional tension between vulnerability and protection. The palette mixes soft greens and warm browns (safety) with cold whites and pale tones (exposure), creating a juxtaposition of warmth and coolness. The central area is dense and textured with 'scar' patterns, while the outer fields breathe with 'broken dots,' symbolizing fluctuating safety and exposure. The main collision occurs in the center, where the denser colors swirl in a quiet crescendo against the calmer periphery, mirroring the emotional struggle depicted in the seed.</desc>
