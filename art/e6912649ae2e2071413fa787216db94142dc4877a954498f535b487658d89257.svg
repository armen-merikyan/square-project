<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This piece expresses a dynamic interplay between quiet and pressure. The palette consists of muted tones like off-white and dust gray to create a feeling of stillness, contrasted by the compressed red and dark navy, which evoke a sense of weight and tension. The sharp edges symbolize the hard contrast between the two emotions. The pattern flows from dense clusters on the left, suggesting pressure, loosening into a quiet gradient on the right, representing release, while negative spaces punctuate the canvas to draw attention to the emotional conflict.</desc>
