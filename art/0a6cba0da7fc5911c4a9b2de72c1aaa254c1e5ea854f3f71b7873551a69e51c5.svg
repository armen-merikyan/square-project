<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center and Edges</title>
  <desc id="desc">The emotional tone reflects a tension between vulnerability and strength, captured through the juxtaposition of soft and sharp colors. The palette, rooted in muted 'quiet pressure' colors, conveys an uneasy harmony: off-white represents exposure, while dark navy evokes a sense of strength. The main collision occurs in the central area, where soft ripple patterns (vulnerability) meet dense threads (strength), symbolizing the interaction between exposure and shelter. This creates a visual echo of fluctuating feelings, offering a dynamic array of emotional narratives.</desc>
