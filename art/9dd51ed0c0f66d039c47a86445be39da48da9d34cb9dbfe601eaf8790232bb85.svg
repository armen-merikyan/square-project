<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Silences</title>
  <desc id="desc">The artwork captures the emotional contrast between loneliness and connection. It employs a palette of pink, red, gray, and dark maroon, symbolizing warmth (connection) and coldness (loneliness). The central pixel represents the 'seed' of emotion, surrounded by the irregular rhythm of the burst, signifying connection's disruption. The stair pattern runs across the grid, echoing the feeling of being caught between different states: hidden vs. exposed, noise vs. silence. The broken pixels introduce an element of imperfection, enhancing the tension of the piece while maintaining the required negative space, giving room for reflection amidst emotional density.</desc>
