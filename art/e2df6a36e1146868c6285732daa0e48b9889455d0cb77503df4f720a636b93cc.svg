<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in the Void</title>
  <desc id="desc">This composition embodies the emotional duality of longing and resolve through the use of contrasting colors and patterns. The palette, derived from muted tones with slight warmth, suggests a sense of hunger and restraint—reflective of the push and pull within the seed. The dense center, composed of rich blacks and grays, symbolizes resolve while piercing shadows of red-oxide and muted cream create moments of longing. The collision occurs towards the center, where the heavier colors disrupt the surrounding quiet field, encapsulating the tension of breakage and wholeness, echoing the broken mirror imagery. The layout balances between island and sea, allowing whitespace to speak volumes, a necessary positive space which hints at serenity amidst urgency.</desc>
