<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition embodies the emotional tension between rage and calm, highlighted through the contrasting use of bold reds and calming blues. The warm red pressure bands, representing rage, surge from the central diamond shape, breaking into softer pale blue halos, symbolizing calm. The main contrast occurs in the center where these elements collide, giving a feeling of dynamic tension. The chosen palette pulls from hot and cool colors creating a clash that resonates with the emotional themes of control and overflow, while broken pixels induce a sense of imperfection among structured calm.</desc>
