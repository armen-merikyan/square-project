<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Dichotomy</title>
  <desc id="desc">This piece conveys the tension between envy and gratitude through a structured layout that splits the canvas vertically. The left side embodies envy with a maze-like pattern in dark colors, creating a chaotic and dense feel. The right side symbolizes gratitude with a soft, radial pattern in lighter shades, suggesting warmth and openness. The use of soft gold against dark violet creates sharp contrasts that resonate with the emotional collision of these feelings. Broken pixels introduce an intentional imperfection, reflecting the complexities of human emotions. Overall, this composition embodies an interaction of turmoil and tranquility, representing the push and pull of inner emotions.</desc>
