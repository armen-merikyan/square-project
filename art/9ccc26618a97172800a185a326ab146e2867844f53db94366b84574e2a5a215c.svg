<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone juxtaposes joy and grief. The palette incorporates bright yellows and oranges to symbolize joy, contrasted with deep blues and muted purples representing grief. This tension illustrates a split horizontal flow, where one side is dense and vibrant while the other is more subdued and lighter, creating a visual rhythm. Discrete color placements symbolize waves of emotion—ups and downs echoing the seed's theme of contrast. The thin outlines and broken pixels introduce a sense of imperfection and complexity within the arrangement, reinforcing the emotional collision between joy and grief.</desc>
