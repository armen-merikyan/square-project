<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Desire</title>
  <desc id="desc">The emotional tone reflects the tug-of-war between emptiness and desire, expressed through the contrast of the dark (symbolizing emptiness) and vibrant hues (symbolizing desire). The palette of black, dark violet, soft gold, and pale green conveys a mix of warmth and coolness, symbolizing the psychological layers of longing. The primary contrast emerges in the dynamic interplay of gold against the dark background, creating a resonant collision of light and shadow, highlighting emotional tension and unresolved yearnings. The central filling of soft gold pixels represents the beating heart of desire amidst the surrounding darker tones, which form a border of emptiness, encapsulating the feelings of solitude and yearning. Imperfections are added in the form of broken pixels to suggest the fragmented nature of these emotions, while leaving enough negative space to breathe and resonate with the viewer.</desc>
