<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Between Firmness and Fluidity</title>
  <desc id="desc">The emotional tone navigates the tension between softness and severity, portraying a balance of gentle and harsh qualities. The palette consists of powder pink for warmth and comfort, warm white for openness, carbon black for severity, steel gray to mirror complexity, and sharp crimson as an accent of intensity. The main collision occurs at the center, where the soft 'crack' pattern of pink disperses against the glitching 'chaos' of the surrounding blacks and grays, suggesting a struggle between these emotions. The bottom weighting in the design creates a visual pull, engaging the viewer to contemplate the unequal tension of light and dark.</desc>
