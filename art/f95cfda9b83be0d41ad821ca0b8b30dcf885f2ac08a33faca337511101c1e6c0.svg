<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Connection</title>
  <desc id="desc">The emotional tone captures a tension between loneliness and connection. The palette of burnt orange, dark red, charcoal, and gold evokes a sense of ancient warmth, reflecting a deep, hidden fire. The contrasts emerge in the dense outer layers, suggesting protection, while the lighter center attempts to burst forth, symbolizing a desire for connection. The checkered pattern in the inner square employs spatial oscillation between connection and isolation. The broken pixels create a sense of imperfection, embodying unresolved feelings as they collide with the stability of the structured outer layer. The visual narrative tells of a core yearning for connection entwined with the weight of solitude.</desc>
