<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center of Tension</title>
  <desc id="desc">The emotional tone stems from the juxtaposition of vulnerability and strength, suggesting a complex interplay between exposure and protection. The palette, drawn from 'lonely_signal', features deep navy and black to evoke a sense of strength, countered by dim cyan and white, representing vulnerability. The main contrast occurs where the dense, dark colors dominate the center, symbolizing a protective core in this abstract composition, while lighter colors attempt to break through, embodying exposure. The pattern merges ember-like strength with a checker-like vulnerability, creating a dynamic collision at the center that visually narrates the struggle between these contrasting emotions.</desc>
