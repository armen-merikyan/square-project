<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This composition embodies a struggle between desire and emptiness. The warm tones, represented by blood orange and hot coral, flood half the grid, creating a sense of yearning. In contrast, darker hues like charcoal invoke a feeling of containment and restraint, blocking expansion. The use of broken pixels introduces intentional disruptions, highlighting the conflict between overflowing emotions and the desire for order. The layout of descending pixels suggests a rain of emotions, echoing a quiet pressure against the firmly sealed edges, creating a dynamic yet restrained surface.</desc>
