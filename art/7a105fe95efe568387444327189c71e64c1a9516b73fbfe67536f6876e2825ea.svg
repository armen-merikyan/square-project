<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">This artwork embodies the emotional duality of envy and gratitude. The selected palette of deep navy and dim cyan symbolizes the weight of envy against the lightness of gratitude. The top four rows, reflecting envy, utilize a checker pattern that creates a sense of tension and density, while the bottom four rows use a grid pattern to reflect gratitude's structure and order. A notable contrast is achieved through the interplay of dark and light colors, emphasizing the emotional collision between despair and thankfulness. Areas of soft edges introduce a gentle transition between emotions, while a deliberate introduction of broken pixels creates an imperfection mirroring the unresolved nature of these emotions.</desc>
