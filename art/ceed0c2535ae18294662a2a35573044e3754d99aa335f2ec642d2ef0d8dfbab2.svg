<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Broken Harmony</title>
  <desc id="desc">This artwork represents the emotional tension between love and betrayal through a contrast of warm and cool colors. The palette blends soft pinks and reds with dark maroon and gray—symbolizing warmth and affection against the coldness of betrayal. The central area features circular forms suggesting love, while the outer regions exhibit a grid pattern that disrupts the symmetry, symbolizing chaos and discord. The burned edges create a sense of decay, reinforcing the themes of loss and conflict. The layout's focus on negative space enhances the feeling of emptiness and desolation, creating a visual narrative of broken connections and unresolved emotions.</desc>
