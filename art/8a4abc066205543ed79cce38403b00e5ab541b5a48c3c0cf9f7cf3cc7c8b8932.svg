<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This piece explores the emotional duality between fear and hope. The palette of deep black, dark violet, soft gold, and pale green represents the weight of darkness contrasted with fleeting optimism. The dominant use of jarring dark colors at the edges creates a sense of jagged fear, while the softer gold pixels visually symbolize small opportunities for hope emerging from the depths. The placement of broken dots emphasizes the feeling of chaos, while the center remains light and uplifting, offering a visual anchor. The zigzag flow implies upward movement towards resolution, creating a dynamic interplay between pressure and release throughout the composition.</desc>
