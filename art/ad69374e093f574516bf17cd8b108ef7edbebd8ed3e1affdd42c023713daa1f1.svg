<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone reflects a tension between the chaotic impulses of panic and the structured response of control. The chosen palette of pink, red, gray, and dark maroon embodies a sense of vulnerability interlaced with the weight of anxiety. The top rows, marked by striped patterns, illustrate the pulsating energy of panic, featuring darker shades that symbolize intensity and pressure. Meanwhile, the bottom rows consist of a grid pattern representing control, comprised of softer shades emphasizing structure and balance. The central broken pixels act as disruptions to the overall flow, accentuating the collision between the two emotional states while retaining negative space to prevent complete chaos.</desc>
