<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between States</title>
  <desc id="desc">This artwork embodies the emotional struggle between defiance and submission, utilizing a palette of bold, warm colors clashing against cooler, muted tones. The outer border reflects submission with subdued gray and black colors forming a quiet constraint. At the core, bright signal green and electric blue represent defiance, creating a stark contrast that pulses with energy. The placement of colors suggests a dynamic collision, with sharp edges of vibrant hues breaking through the calm, symbolizing the emotional push-pull. The broken pixel approach introduces intentional disruption, echoing the instability of the tension between the two emotional states while preserving necessary negative space for balance.</desc>
