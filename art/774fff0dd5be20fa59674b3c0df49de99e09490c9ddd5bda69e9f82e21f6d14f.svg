<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Desires</title>
  <desc id="desc">The emotional tone of this piece captures the struggle between desire and restraint, embodied through deep saturation and muted tones. The palette consists of warm reds juxtaposed against dark plums and soft creams, representing the visceral pull of desire and the cool containment of restraint. The collision occurs in the center, where warmer colors dominate but are interrupted by crosshatched patterns, the warmth bleeding into spaces while edges remain sealed, indicating the struggle to contain these emotions. The arrangement conveys a lattice of interconnected pressures, mirroring the internal conflicts suggested by the seed.</desc>
