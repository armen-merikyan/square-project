<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Desire</title>
  <desc id="desc">This piece captures the emotional duality of emptiness and desire, illustrated through the contrast of warm colors against deep blacks. The palette reflects both tranquility (pale blue and white) and intensity (red and black), creating a vivid tension. The 'stairs' pattern suggests a rise, overlapping with radial bursts, while the burned edges evoke a sense of jagged, unresolved emotions. The flow of colors leads from dark to bright, representing a journey through feeling. Negative space is preserved to evoke the essence of loneliness amidst desire.</desc>
