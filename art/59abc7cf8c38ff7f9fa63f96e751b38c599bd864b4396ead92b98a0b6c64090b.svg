<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Drawn Boundaries</title>
  <desc id="desc">This composition reflects the struggle between desire and restraint with a contrast of warm, saturated tones and cooler, muted colors. The warm reds and oranges accentuate the pull of desire, while the blacks and grays represent restraint. The collision occurs centrally, where the flowing split-screen pattern of desire encounters the noise of restraint. The broken pixel elements introduce subtle disruptions, echoing the imperfections in our emotional states, leading to a vivid abstract story of longing constrained by boundaries.</desc>
