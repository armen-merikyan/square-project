<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Dark</title>
  <desc id="desc">This artwork conveys the duality of 'panic' and 'control' through contrasting warmer and cooler tones. The palette combines gentle pinks with more assertive reds, set against a gray background, to evoke both emotion and restraint. The energetic 'flame' pattern on one side, symbolizing chaos, clashes with the more structured 'ring' pattern representing control. A few broken pixels create a sense of imperfection, emphasizing the struggle between these emotions within the canvas's composition. The layout allows for a visual argument, with negative space balancing the intense colors, guiding the eye through a narrative of emotional labor and unresolved tension.</desc>
