<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Tension</title>
  <desc id="desc">The emotional tone captures the juxtaposition of safety and exposure through a dense central island of colors that symbolize warmth and shelter, surrounded by a more open, cool palette that suggests vulnerability. The selected colors from the safety_exposure palette create a contrast between the warm brown and green of the 'shelter' emotions with the cold white and open blue that reflect 'exposure'. The main collision occurs in the center where warm and cool colors intersect, creating a tension that echoes the theme of protection versus openness. This arrangement illustrates the seed's narrative without depicting literal shapes, embodying instead the abstract qualities of emotional conflicts.</desc>
