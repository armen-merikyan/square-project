<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tidal Tension</title>
  <desc id="desc">This artwork embodies the emotional tone of quiet versus pressure through the use of muted and bold colors. The palette, consisting of off-white, dust gray, compressed red, dark navy, and faint peach, reflects a contrast between serene and forceful elements. The main collision occurs where the compression of dark navy meets the soft pulse of faint peach, suggesting an unresolved tension. The broken framework allows muted spaces to seep through, symbolizing the balance of chaos and clarity, an echo of 'island' amidst swirling emotions.</desc>
