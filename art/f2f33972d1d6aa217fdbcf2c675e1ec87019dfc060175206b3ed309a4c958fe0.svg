<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork embodies the tension between desire and emptiness through a gradient of warm and cool colors. The color palette, featuring hot coral and charcoal, contrasts the saturated pulse of desire against the low saturation of emptiness. The edge style of weighted diagonals and the flow from bottom to top visually represent the rising signals of desire trapped by the containment of the outer border. The central area displays broken pixels, symbolizing imperfections and disruptions, enhancing the feeling of anguish. The collision occurs prominently in the center, where the intense warm colors of desire clash with the cool emptiness, creating an emotional push and pull. The larger blank area invites the viewer to experience the quiet pressure of restraint.</desc>
