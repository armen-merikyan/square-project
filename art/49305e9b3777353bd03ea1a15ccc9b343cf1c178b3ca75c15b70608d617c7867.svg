<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Thirst</title>
  <desc id="desc">This artwork reflects the emotional tug-of-war between emptiness and desire, symbolized by the scattered use of vibrancy against darker, more subtle fields. The palette centers around warm tones like hot coral and blood orange to evoke desire, contrasted with cooler shades such as charcoal and hollow blue representing emptiness. The main collision occurs in the center with a dense cluster of color, while the outskirts remain significantly less saturated, creating a sense of longing that is palpable yet restrained. The calculated use of negative space enhances the feeling of containment versus overflow, grounding the composition in an emotional narrative that resonates with quiet pressure and broken continuity.</desc>
