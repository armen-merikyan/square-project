<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the emotional duality of tenderness and rage by using a palette that juxtaposes muted cool tones with saturated dark hues. The outer layer reflects rage through explosive contrasts in black and deep reds, symbolizing pressure and compression, while the inner core, shaded in pale blues and whites, embodies tenderness and gentle progression with a stair-step pattern. The main collision occurs at the transition edge where these two emotions intersect, creating a dynamic tension that guides the viewer's eye. The uneven border further emphasizes the interruption between the calmness and intensity, suggesting an ongoing narrative of human emotion struggling for balance.</desc>
