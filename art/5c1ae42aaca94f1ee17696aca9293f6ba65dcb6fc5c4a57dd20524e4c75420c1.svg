  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This artwork expresses the conflict between defiance and submission through the interplay of saturated and muted colors. The central rows create a 'pulse mark' effect, symbolizing resistance against the surrounding softer tones. The choice of hot coral and blood orange represents urgency and defiance, while dust pink and hollow blue embody quiet submission. The broken frame layout symbolizes the intersections between emotional states, allowing for visible breaks in the border to highlight the tension between open and closed spaces.</desc>
