<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a struggle between desire and emptiness, represented through a palette of warm shades like hot coral and blood orange clashing against the cooler, muted tones of charcoal and hollow blue. The dominant warm colors occupy the corner, symbolizing desire overflowing, while the darker colors are reserved for the opposing spaces that evoke a sense of restraint and hollow fields. The arrangement creates a visual tension and a feeling of pressure emanating from the corner, contrasting with quieter areas. This abstract composition resonates with the themes of pressure, interrupted flow, and intentional disruption, allowing the viewer to feel the balance of longing versus limitation.</desc>
