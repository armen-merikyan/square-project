<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Calm</title>
  <desc id="desc">This piece embodies the emotional tension between restlessness and peace. The color palette, featuring muted creams and deep oxide reds, symbolizes a struggle between quiet spaces and wandering impulses. The top half uses a flooding pattern to suggest a calm sea of muted colors, while the bottom half employs a checker pattern disrupting the serenity with erratic motion. The stark contrast in the middle represents the collision between peace and disturbance, underscored by broken pixels that introduce intended imperfection, embodying the theme of fragmented memories. The negative space enhances the feeling of unfulfilled longing amidst chaotic patterns.</desc>
