<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Amidst Static</title>
  <desc id="desc">The emotional tone of this piece reflects the struggle between clarity and chaos. The navy and dim cyan represent the enduring signal that seeks to emerge from the surrounding black noise, characterized by a radial pattern that suggests movement and fragmentation. The juxtaposition of dark fields against scattered lighter accents creates a sense of collision between noise and signal. The negative space allows for breathing room, emphasizing the central pulses and creating a rhythm that evokes the idea of separation and unity. The pattern reflects the attempt to find coherence in a tumultuous environment, embodying the seed's narrative.</desc>
