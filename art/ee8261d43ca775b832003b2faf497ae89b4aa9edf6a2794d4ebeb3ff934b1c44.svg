<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Drift</title>
  <desc id="desc">This piece embodies the emotional contrast of longing and resolve. The palette combines sharp crimson as a striking accent against the warm white and powder pink fields, representing the subtlety and yearning of longing. The structural contrast uses carbon black and steel gray to depict the firmness of resolve. The central collision occurs diagonally, where the thread-like patterns of longing weave through the veil of resolve, suggesting an ongoing negotiation between chaos and order in a conflicted space. Negative space allows for a feeling of breath and distance amidst the dense colors, echoing the emotional tension in the seed.</desc>
