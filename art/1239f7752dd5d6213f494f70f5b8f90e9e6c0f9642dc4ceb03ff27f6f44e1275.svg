<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Tension</title>
  <desc id="desc">This artwork embodies the duality of relief and dread, contrasting light and dark through a deliberate choice of colors. The black and pale blue create a stark dichotomy, where the dark hues suggest weight and foreboding, while the pale blue offers a sense of calm and distance. The layout emphasizes a small bright element surrounded by heavier shades, reflecting the emotional battle suggested by the seed text. The spiral flow creates an echo of movement and tension, inviting the viewer to traverse the space between quiet relief and looming dread. The broken pixels add an element of imperfection, which suggests unpredictability in the emotional experience.</desc>
