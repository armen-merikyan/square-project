<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Weight</title>
  <desc id="desc">This artwork captures the opposing emotions of joy and grief through a palette that juxtaposes bright yellows and oranges against deep blues and muted purples. The bright colors represent spark-like joy, while the darker hues symbolize heaviness and fragmentation associated with grief. The checkerboard pattern suggests order and chaos, with a zigzag flow that creates tension and rhythmic movement across the grid. The use of broken pixels adds a sense of imperfection, echoing the emotional complexity of the seed. The central focus remains on contrasting feelings, without literal representation, allowing the viewer to feel the emotional collision.</desc>
