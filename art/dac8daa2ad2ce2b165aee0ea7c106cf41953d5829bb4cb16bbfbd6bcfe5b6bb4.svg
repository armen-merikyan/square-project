<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Centers in Conflict</title>
  <desc id="desc">This piece juxtaposes the emotions of fear and hope by using dark, introspective colors alongside light, uplifting tones. The palette consists of black, dark violet, soft gold, and pale green, representing the spectrum of emotion and contrasting the heavy weight of fear with the lightness of hope. The canvas displays a split vertical layout where patterns symbolizing fear (jagged, rain-like textures) compete against those representing hope (soft, framed segments). The collision emerges at the center, where the darker hues want to dominate but are interrupted by glowing warmth, evoking a tension between despair and aspiration. The arrangement leaves negative space to imply emptiness and resistance, reinforcing the complexity of these emotions.</desc>
