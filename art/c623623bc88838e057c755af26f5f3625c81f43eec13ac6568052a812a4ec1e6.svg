<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Resolve</title>
  <desc id="desc">This artwork captures the tension between longing and resolve, using a palette of muted sepia, tan, dust gray, and faded blue to suggest a sense of faded memory and introspection. The primary emotional tension manifests in a checker pattern that interjects into a more structured hinge pattern, symbolizing the collision between chaos and order. The broken pixel elements introduce intentional disruptions, echoing the inner struggles of intimacy and distance while maintaining a loose symmetry across the grid, ensuring that the primary emotion of longing dominates without overwhelming the negative space. The dominant colors in the center create a compact strength while the edges fade, suggesting the quiet distance of unresolved emotions.</desc>
