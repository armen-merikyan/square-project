<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Emotion</title>
  <desc id="desc">This abstract piece captures the tension between envy (represented by darker, muted tones) and gratitude (symbolized by softer, lighter hues). The use of the 'broken_memory' palette reflects a sense of nostalgia and complexity in emotions. The contrast occurs primarily at the edges, where the darker colors collide with the lighter, suggesting a struggle between competing feelings. The arrangement of the checker pattern for envy meets the flame pattern of gratitude, creating a sense of unresolved conflict. The empty room idea introduces negative space, amplifying the feeling of isolation amidst emotional turmoil.</desc>
