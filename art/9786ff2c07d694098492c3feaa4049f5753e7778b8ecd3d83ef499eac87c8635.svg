<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">The emotional tone reflects the push-and-pull between vulnerability and strength, using a palette that juxtaposes warm and cool colors. The clean white and ice blue symbolize exposure and a sense of fragility, while the ink black and warning orange evoke resilience and stark contrasts. The primary collision occurs near the center with a dense cluster of dark colors interrupted by lighter tones, emphasizing the tension of shelter against exposure. This visual narrative emerges from the concept of hard edges vs. thin shelters, presenting an abstract rhythm of falling pixels to visualize the inner conflict.</desc>
