<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise Vs Fall</title>
  <desc id="desc">This piece explores the tension between peace and restlessness, using a palette of signal green, electric blue, dead black, static gray, and hot magenta to evoke emotional clash. The contrast between the tranquil, pale fields of electric blue and the disruptive, dark accents of dead black represents the tug-of-war between serenity and disquiet. The layout signifies an argument grid, where the upward motion of peace is met with the downward pull of restlessness, while broken frames add an intentional imperfection, representing memories and fragmented thoughts. The central collision occurs diagonally, creating a visual center of tension that embodies the emotional core of the piece.</desc>
