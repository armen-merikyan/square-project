<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Waves</title>
  <desc id="desc">This artwork explores the emotional tension between quietude and pressure. The palette combines soft off-whites and faint peaches with stark compressed reds and dark navies to illustrate a gradient of pressure. The main contrast occurs at the center where the dark navy and compressed red collide, creating a sense of disturbance within an otherwise quiet field with islands of muted colors. The layout follows an inward spiral, with radial patterns representing pressure around a central quiet space, echoing the nuances of a quiet versus pressure dynamic, embodying the notion of fragmentation and resolution.</desc>
