<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Edges</title>
  <desc id="desc">The emotional tone emerges from the contrasting themes of confinement (control) and liberation (surrender). The chosen palette of navy, black, single white, and dim cyan reflects a mix of density and isolation, enhancing the feeling of disquiet. The main collision occurs in the center with a burst of bright white against the dark, muted background, symbolizing a struggle between two opposing forces. The arrangement of quiet fields and islands captures this tension, evoking a sense of pressure being released amidst defined boundaries.</desc>
