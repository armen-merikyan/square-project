<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Clarity and Yearning</title>
  <desc id="desc">This piece captures the emotional tension of longing juxtaposed against resolve. The top half represents longing with a stepwell pattern of deep teal and cosmic indigo, evoking feelings of depth and retention, while the bottom half illustrates resolve with sturdy dots of cold gold and void black, symbolizing the strength of boundaries. The contrast between the calm depth and structured firmness creates a visual narrative of unresolved emotion. The collision occurs centrally, where the yearning shapes intersect with the unyielding structures, suggesting an ongoing internal dialogue.</desc>
