<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Balance</title>
  <desc id="desc">This piece explores the tension between rage and calm through a palette of reds, blacks, pale blues, and whites. The warm reds create a vibrant contrast against the cooler blues, embodying the collision of emotions suggested by the seed. The central row collision of the dark and warm colors creates a focal point of intensity, while the outer rows consist of softer, spaced-out hues to evoke a sense of calm. The idea of eroded symmetry is represented by the disruptions and broken pixel choices, enhancing the sense of dynamic tension in the grid while adhering to the structured, abstract layout.</desc>
