<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Friction of Feelings</title>
  <desc id="desc">This composition explores the emotional tension between love and betrayal, represented through a mix of warm and cool colors. Pink and red signify love's warmth, while dark maroon and gray embody the coldness of betrayal. The vertical arrangement mimics a rising signal, suggesting hope amidst chaos. Hard edges create tension, while the mix of grid and ring patterns evokes both order and emotional disruption. The main collision occurs with dense color clusters contrasted by negative space, allowing feelings of calm to echo against bursts of intensity. The seed's nuances are translated into an abstract narrative of conflict and resilience.</desc>
