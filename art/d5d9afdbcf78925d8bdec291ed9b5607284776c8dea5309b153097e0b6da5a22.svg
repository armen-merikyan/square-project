<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Silence</title>
  <desc id="desc">This abstract composition explores the emotional duel between envy and gratitude through the interplay of dark and light colors. The palette features strong contrasts: black represents envy, suggesting depth and heaviness, while soft pale blue and white signify gratitude and lightness, providing a feeling of relief and calm. The patterns are a mix of dense, dot-like clusters on one side representing envy and split screens of soft, balanced colors on the other, portraying gratitude. The asymmetry and placement create a collision that ebbs and flows, suggesting the push and pull of these emotions. By including broken pixels, I introduce imperfections, emphasizing the chaos of unresolved feelings—as if bursts of envy disrupt moments of gratitude.</desc>
