<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Tension</title>
  <desc id="desc">The composition embodies the emotional struggle between control and surrender. The warm tones of coral and orange signify desire and pressure, while the cooler shades of blue suggest tranquility and distance. The radial pattern representing control emanates from the corner, creating a striking contrast with the barcode pattern of surrender that intermittently disrupts the flow, echoing the tension of a signal struggling against noise. The intention is to reveal a dialogue of pressure clashing with release, centered around an overflow of emotions yet maintaining a sense of quiet along the edges.</desc>
