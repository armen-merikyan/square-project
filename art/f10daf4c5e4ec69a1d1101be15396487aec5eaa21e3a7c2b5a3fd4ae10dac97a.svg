<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone centers on the tension between vulnerability and strength, reflected in a soft core surrounded by a denser outer layer. The chosen palette, combining warm coral and cold slate, embodies emotional warmth clashing with cool detachment. The main contrast occurs at the center, where radial strength patterns intersect with ladder-like vulnerability forms, creating an impactful collision. The placement of broken pixels introduces intentional disruptions, emphasizing fragility within the stable design. This arrangement creates a sense of dynamic tension and movement, illustrating the struggle between exposure and protection.</desc>
