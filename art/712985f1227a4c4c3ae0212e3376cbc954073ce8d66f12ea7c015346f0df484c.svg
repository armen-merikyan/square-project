<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Dualities</title>
  <desc id="desc">The emotional tone explores the dualities of joy and grief, with warm orange and yellow representing joy, set against muted purple and deep blue expressing grief. The palette creates a dynamic tension between light and heavy tones, echoing the conflict between order and chaos. A zigzag pattern flows through the design, suggesting rising signals and interruptions. The layout mirrors itself with slight imperfections to reflect the unpredictability of emotions, especially around the center, which is more vibrant, while the edges fade into darker hues, symbolizing the contrast between the protected and the chaotic.</desc>
