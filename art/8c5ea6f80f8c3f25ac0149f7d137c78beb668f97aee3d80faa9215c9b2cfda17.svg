<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Containment</title>
  <desc id="desc">This artwork embodies the emotional tension between desire and restraint. The palette of hot coral, blood orange, and muted hollow blue symbolizes the push and pull of warmth versus coolness. The irregular placement of bright colors against the neutrals creates a dynamic collision at the center, representing the overwhelming nature of desire clashed with the cool, contained nature of restraint. The patterns of crack and ripple contribute to the spiraled flow, emphasizing a swirling pressure while leaving enough negative space that invites breathing room amidst the emotional intensity.</desc>
