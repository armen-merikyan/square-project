<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This artwork explores the emotional tension between longing and resolve, using the palette of shelter green, warm brown, pale skin, cold white, and open blue. The top half reflects longing through a ladder pattern that suggests a repetitive reach, while the bottom half embodies resolve through a tide pattern where colors ebb and flow. The warm vs cool contrast emerges as warm brown and pale skin meet the coolness of cold white and open blue, creating a dynamic pulse throughout. The broken pixels disrupt the structure, symbolizing the scars from attempts at repair, while quiet spaces prevent overwhelming density, allowing for moments of reflection.</desc>
