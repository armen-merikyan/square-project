<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Collision</title>
  <desc id="desc">This piece reflects the emotional tug of tenderness against the explosive force of rage. The selected palette of deep reds and blacks against muted pale blues and whites illustrates this conflict, where the warmth symbolizes tenderness and the harsh colors embody rage. The collision is situated mostly in the center, where the jagged 'rage' stair pattern interrupts the ash-like field of tenderness, creating a focal point of emotional turbulence. Overall, the layout strategically emphasizes erosion at the edges, leaving quiet negative space that evokes the feeling of internal struggle. The use of broken pixels subtly reinforces the fragility of this emotional state.</desc>
