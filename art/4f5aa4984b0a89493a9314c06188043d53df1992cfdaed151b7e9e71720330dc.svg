  <title id="title">Exposure vs. Shelter</title>
  <desc id="desc">The emotional tone juxtaposes safety with exposure, illustrating a struggle between warmth and coldness. The selected palette incorporates shelter green and warm brown to signify safety, contrasted with cold white and open blue to reflect exposure. The main collision occurs at the vertical split: the left side embodies a soft, calming pattern indicating safety, while the right side features a tumultuous tide pattern that evokes exposure. The broken pixels create a sense of interruption, enhancing the emotional depth of this dual theme.</desc>
