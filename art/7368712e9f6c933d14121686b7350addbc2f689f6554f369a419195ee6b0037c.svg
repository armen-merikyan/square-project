<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Battleground of Emotions</title>
  <desc id="desc">The artwork embodies a continual struggle between relief and dread through contrasting tones and patterns. A palette inspired by 'love_betrayal' mixes soft pinks with deep maroons to highlight the emotional turmoil. The dominance of dark colors in the top half represents dread while lighter colors break through the bottom, symbolizing relief. The arrangement is deliberately asymmetrical, evoking tension and painting a story of conflict and hope. This juxtaposition fosters an engaging visual experience, emphasizing emotional weight against moments of brightness.</desc>
