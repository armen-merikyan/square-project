<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone of this piece captures the tension between desire and restraint, expressing a saturated pull against a strong border. The chosen palette of deep reds, muted creams, and blackened plums mirrors the struggle between the intensity of desire and the calm of restraint, with the deeper tones representing burden and the softer colors suggesting hesitation. The layout is designed to have two contrasting patterns collide in the center, creating a vivid focal point that reflects the emotional conflict. In this arrangement, the desire element emerges in a saturated form, while the restraint remains anchored through limited marks around the edges, encapsulating the dynamic yet contained pulse inspired by the seed. Overall, the work explores the friction between love and betrayal as emotions spiral against a sealed border, generating an abstract journey of feeling.</desc>
