<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order and Chaos</title>
  <desc id="desc">This composition embodies the emotional duality of joy and grief through contrasting vibrant and muted colors. The palette consists of uplifting yellows and oranges unfolding on one side, symbolizing joy, while deep blues and muted purples contrast on the other, representing grief. The clean, structured pattern of joy meets the fragmented, chaotic arrangement of grief, split horizontally to emphasize this tension. The use of negative space aids a sense of weightlessness and hope, suggesting an upward flow from grief toward joy. The interruptions of bright colors among the darker hue sections evoke moments of clarity and introspection amidst the heaviness of grief, creating a dynamic visual pulse across the square.</desc>
