<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Interruption</title>
  <desc id="desc">This composition expresses the emotional tone of tension between clarity and chaos, realized through a palate of sharp contrasts and muted undertones. The contrasting colors embody the tension of 'signal' (clean, sharp colors) and 'noise' (darker, inconsistent shades), with 'signal_green' and 'electric_blue' leading the rhythm while static gray acts as an echo of confusion in the periphery. The central collision occurs where the pulse of green seeks to persist amid the static interruption, represented by broken pixels that scatter across the layout. The seed's thematic elements of exposure vs shelter and memory vs erasure influence the density, with clusters of muted tones encircling more vibrant centers, echoing an abstract narrative of trying to maintain clarity in a world of interference.</desc>
