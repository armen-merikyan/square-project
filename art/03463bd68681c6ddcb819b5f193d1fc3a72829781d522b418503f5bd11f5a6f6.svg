<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interwoven Pulses</title>
  <desc id="desc">The emotional tone represents a conflict between strength and vulnerability, captured through the color palette of faded gold and storm gray, juxtaposed against pale mint and soft sky for a cooling effect. This contrast creates a sense of tension and balance, with broken pixels strategically placed to embody imperfections in strength - almost like scars. The arrangement consists of stacked bands that alternate between denser areas and lighter colors, suggesting a flow that shifts from calm to pressure. The collision occurs at the center, where the dense stripes of strength break into softer, more vulnerable targets, embodying the emotional struggle inspired by the seed text.</desc>
