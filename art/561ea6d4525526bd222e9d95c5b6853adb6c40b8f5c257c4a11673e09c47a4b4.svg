<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast in Conflict</title>
  <desc id="desc">This artwork captures the emotional tension between defiance and submission through a palette of electric blue, lime, magenta, and black. The bold electric blue serves as the main accent, dominating the center as a focal point of resistance. Surrounding this intense core are softer, muted tones of lime and black, representing submission and encroaching boundaries. The collision occurs at the edges, where vibrant blue sparks interrupt the dark fields, creating a visual tension that encapsulates the seed's themes of conflict and dynamic struggle. Overall, the composition speaks to the push and pull of these emotions, structured by the halo void layout that emphasizes an unmoving center against a weighted environment.</desc>
