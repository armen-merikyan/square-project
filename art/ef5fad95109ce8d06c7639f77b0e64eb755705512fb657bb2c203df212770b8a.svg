<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Released</title>
  <desc id="desc">This composition embodies the emotional tension between quiet and pressure, with strong contrasts between dark, compressed colors and soft, muted tones. The palette includes off-white and faint peach for quiet spaces amidst the heavyweight dark navy and compressed red. The main collision occurs diagonally across the square, where pressure (darker tones) and quiet (lighter tones) meet, reflecting the contrasting feelings at play. The layout is based on a halo-void concept, with a dense center dispersing towards the edges, symbolizing a shattering against the tide of pressure.</desc>
