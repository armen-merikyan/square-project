<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Order and Chaos</title>
  <desc id="desc">The emotional tone mirrors the struggle of panic versus control, where one side emphasizes the chaotic flow and the other maintains structure. The dark colors signify the weight of panic, while the softer hues of pale green and soft gold bring a hint of hope and control. The sharp contrast between these dense, dark pixels and the lighter ones creates tension, representing the battle between chaos and order. The pattern of radiating chaos on one side collides with the structured framing of order, allowing for an emotional resonance that shifts from dense pressure to moments of calm. The broken pixels introduce imperfection, symbolizing disruption amidst the order.</desc>
