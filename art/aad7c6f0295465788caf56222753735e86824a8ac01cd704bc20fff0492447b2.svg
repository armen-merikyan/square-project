<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">The emotional tone of this piece conveys a tension between trust and suspicion, represented by contrasting structured patterns on one side and fragmented visuals on the other. The palette, drawn from 'hunger_restraint', effectively uses muted creams and deep plums to evoke warmth and underlying tension. The collision happens predominantly in the diagonal flow across the square, where structured static patterns give way to chaotic channels, reinforcing the theme of emotional conflict. Broken pixels serve as disruptions within the established order, enhancing the sense of conflict and fragility.</desc>
