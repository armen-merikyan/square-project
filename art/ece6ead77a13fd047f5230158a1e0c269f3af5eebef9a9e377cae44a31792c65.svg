<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Against Silence</title>
  <desc id="desc">This artwork reflects the emotional tension between pressure and quiet, with a dense arrangement of colors in the center transitioning to softer tones at the edges. The palette balances off-white and faint peach to evoke a sense of calm overcoming chaos, while dark navy and compressed red introduce sharp contrasts, creating a visual conflict. The collision of these patterns emerges from the zigzag flow, where densely aggregated dark tones at the center give way to lighter, mirrored regions on the periphery, representing a shattering of silence against a heavy tide.</desc>
