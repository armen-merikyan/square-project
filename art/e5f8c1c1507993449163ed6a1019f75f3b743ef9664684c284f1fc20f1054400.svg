<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast in Flux</title>
  <desc id="desc">This composition encapsulates the struggle between spark and ash, illustrating hunger and restraint through contrasting patterns. The left side embraces a structured grid representing the spark, filled with vivid bursts of soft gold on a dark violet backdrop. The jagged, maze-like right side embodies ash, with subtle hues of pale green merging into the quiet darkness. The emotional tension lies in the collision at the center, creating a dynamic crossing that represents the constant push and pull of resilience versus fragility. Overall, the color palette of black, dark violet, soft gold, and pale green emphasizes the juxtaposition of hope and despair.</desc>
