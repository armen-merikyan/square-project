<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition embodies the tension between defiance and submission through a diagonal division in the color palette. The dominant use of dark navy establishes a sense of protective defiance, contrasted sharply with the soft faint peach, representing submission. The muted dust gray acts as a quiet channel, allowing for a calm yet complex interplay of presence and absence. Each interaction of the crack pattern (defiance) and halo (submission) visually collides at the center point, creating a threshold that sparks emotional tension while preserving enough negative space to suggest an ongoing struggle.</desc>
