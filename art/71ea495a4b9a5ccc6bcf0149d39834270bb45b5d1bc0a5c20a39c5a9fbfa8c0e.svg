  <title id="title">Colliding Forces</title>
  <desc id="desc">The emotional tone reflects the tension between defiance and submission using saturated versus muted colors. The palette combines deep wine and ash gray, creating a striking contrast of warm and cool tones. The central collision occurs with bold strokes of warm ivory against a muted frame, suggesting the struggle between resistance and conformity. Elements like broken pixels amplify the chaotic feel, representing glitches in both order and chaos, while maintaining negative space that adds to the overall sense of tension.</desc>
