<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">The emotional tone echoes the conflict between defiance and submission, using a palette that embodies fear and hope: black and dark violet represent the weight of submission, while soft gold and pale green introduce elements of defiance and potential. The contrast lies in the bottom-weighting, where darker colors dominate, encased by lighter, hopeful accents that mimic falling pixels. This arrangement creates tension, echoing the struggle between open and closed spaces, as well as the imperfect nature of emotions, depicted by subtly broken pixel patterns. The noise against the frame creates agitation within the composition, offering a visual narrative of love and betrayal, captured in an abstract form.</desc>
