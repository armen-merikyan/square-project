  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork embodies the emotional polarity of rage and calm through contrasting colors and patterns. The palette features black and red to express intensity and chaos, while pale blue and white introduce a sense of stillness. The main collision occurs in the center, where sharp jagged shapes break into softer horizontal grids, creating tension between control and chaos. Broken pixels add imperfection, echoing the struggle between overflowing rage and sustained calm, manifesting the emotional turmoil suggested by the seed.</desc>
