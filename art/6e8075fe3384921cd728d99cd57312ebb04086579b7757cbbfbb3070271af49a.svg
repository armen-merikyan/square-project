<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Vertiginous Duality</title>
  <desc id="desc">This composition explores the emotional dichotomy of fear and hope. The selected palette, comprising deep blacks (fear) and soft golds (hope), reflects the tension of despair contrasted with the light of optimism. The upper rows feature jagged edges in dark colors creating a sense of pressure, while the lower rows, with their warmer hues and structured grid patterns, evoke rising hope. The split vertical layout introduces a collision of emotion, with shadows on one side and bursts of light on the other. The overall arrangement creates a narrative of a struggle between weight and buoyancy, leading the eye from dark to light—a journey from confinement to freedom.</desc>
