<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">The emotional tone is captured through a stark contrast between darkness and light, illustrating fear's weight against hope's glimmer. The palette combines deep blacks and dark violets with soft golds and pale greens, emphasizing the tension between light and dark. The main contrast occurs in the center where the light seems to push against the surrounding darkness, creating a burst effect. The radial pattern moving outward signifies the pressure of fear clashing with the warmth of hope, layered over a grid that hints at order amidst chaos.</desc>
