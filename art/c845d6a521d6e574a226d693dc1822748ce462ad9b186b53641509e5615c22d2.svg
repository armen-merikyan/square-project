<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow and Containment</title>
  <desc id="desc">This composition explores the contrast between restlessness and peace by using a palette that emphasizes warmth against cooler tones. The hot coral and blood orange represent the struggle and motion of restlessness, while the charcoal and hollow blue provide a soothing containment. The implementation of a 'broken frame' layout showcases interruptions along the edges where the intense colors spill out, suggesting a battle between holding on and letting go. The patterns of 'stairs' for restlessness and 'noise' for peace collide in the center, creating a rhythmic tension that speaks to the emotional depth expressed in the seed.</desc>
