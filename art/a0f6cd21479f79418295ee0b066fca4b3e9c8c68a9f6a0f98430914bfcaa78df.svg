<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece explores the emotional interplay between vulnerability and strength, represented in a split horizontal composition. The top four rows convey strength using deep, saturated colors reminiscent of a flood, creating a dense visual weight. Conversely, the bottom rows express vulnerability through a muted, maze-like pattern, suggesting fragility and openness. Central disruption occurs where these two emotional layers collide, forming a boundary that feels both protective and porous. The palette of burnt orange, dark red, charcoal, and gold embodies ancient fire, further enhancing the emotional temperature within the piece. The interplay between saturated and muted colors, alongside the intentional placements, echoes the tension of conflicting emotions, creating a dynamic yet cohesive abstract narrative.</desc>
