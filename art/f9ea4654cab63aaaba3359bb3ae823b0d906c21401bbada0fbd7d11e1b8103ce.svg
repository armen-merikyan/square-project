<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissonance of Resonance</title>
  <desc id="desc">The emotional tone of this artwork embodies the tension between trust and suspicion, experienced through the palette's juxtaposition of soft colors against darker tones. The 'quiet_pressure' palette brings forth a sense of discomfort, with faint peach and off-white representing fleeting trust within an overwhelming field of dust gray and dark navy, illustrating a struggle between clarity and noise. The main collision occurs in the center where faint peach and off-white break through the encircling darker tones, symbolizing those moments of connection amidst chaos. The layout of 'last_light' suggests that only a small section holds brightness in a pervading shadow, further emphasizing emotional contrast and echoing life's delicate balance of trust and suspicion.</desc>
