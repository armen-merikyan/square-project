<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipsed Longing</title>
  <desc id="desc">The emotional tone captured here reflects the tension between intense desire and the confines of restraint. The chosen palette of deep reds, muted creams, and a touch of gray conveys warmth and vulnerability, with a stark contrast to the heavier, darker shades that suggest boundaries and limitations. The arrangement features a dense center in saturated colors, gradually shaded out towards the edges, echoing the energy of longing pressed against the limits of untouched space. The interplay creates a rhythmic collision of warmth and coolness, emphasizing the push-pull dynamic inherent in the seed's themes.</desc>
