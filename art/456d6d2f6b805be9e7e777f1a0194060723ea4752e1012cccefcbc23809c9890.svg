<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Staircase</title>
  <desc id="desc">This piece captures the duality of longing and resolve through contrasting colors and expressions of shape. The chosen palette of ripe green and muted honey gold reflects the tension between growth and restraint. The flow resembles a rising signal with concentrated colors at the center, merging the chaos of dark greens with lighter, warmer tones. Main collisions occur where deep olive and acid green interact, symbolizing the push and pull of emotion, while intentional broken pixels disrupt the continuity, representing moments of chaos within order, highlighting the emotional journey of resilience against longing.</desc>
