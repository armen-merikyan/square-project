<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">The emotional tone contrasts restlessness with peace, expressed through a palette of warm reds and cool grays to represent tension. The dominant gray fields symbolize tranquility, occupying 65% of the space, while the warmer reds punctuate the edges and center, creating an unsettled balance. The patterns of crosshatch and hinge collide diagonally, suggesting a spiral of movement and stillness, echoing the struggle between memory and motion. Broken pixels are scattered across the grid to evoke imperfection, enhancing the chaotic yet harmonious transition between dual states.</desc>
