<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Tranquility</title>
  <desc id="desc">This composition captures the juxtaposition of restlessness against peace through a careful balance of color and placement. The palette features deep blues and mourning blacks to evoke a sense of depth and calm, contrasted by pale yellows symbolizing fleeting moments of light and urgency. The main collision occurs with densely packed dark colors at the center gradually giving way to lighter, dotted patterns at the edges, reflecting both confinement and the desire to break free. The broken frame layout emphasizes the notion of borders that are both present and fragile, hinting at the restless energy trying to seep through.</desc>
