<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Emotions</title>
  <desc id="desc">This artwork explores the emotional resonance between relief and dread through a structured top-to-bottom layout. The top half represents relief with warm yellows and muted purples, suggesting lightness and openness, achieved through soft, broken dot patterns that evoke a sense of space and freedom. In contrast, the bottom half embodies dread with darker deep blues and jagged orange flames, creating an oppressive density that feels like a heavy weight pressing down. The central collision of palette between bright warm hues and dark cool tones showcases the emotional struggle, emphasizing the push and pull between weight and lightness, relief and tension. Broken pixels add an element of imperfection, reflecting the rawness of these emotions while maintaining the abstract narrative without literal representation.</desc>
