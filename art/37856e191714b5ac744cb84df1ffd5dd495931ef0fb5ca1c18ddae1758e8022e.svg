<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Pressure</title>
  <desc id="desc">The composition explores the emotional contrasts of loneliness and connection through a careful palette of muted reds, pinks, and grays, punctuated by dark maroon. The top four rows represent the complexity of connection with a maze-like structure in densely grouped colors, while the bottom four rows depict loneliness through an open, framed negative space. The broken line shape allows for imperfections that symbolize disruptions in rhythm. This arrangement allows a collision of warmth and solitude, with darker edges contrasting the lighter center, embodying the tension described in the seed.</desc>
