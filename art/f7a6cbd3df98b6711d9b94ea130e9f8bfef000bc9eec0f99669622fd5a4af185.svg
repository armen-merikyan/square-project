<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Whispers in Static</title>
  <desc id="desc">This piece captures the emotional dynamics of signal vs noise, represented through a contrast between clean, pulsing colors and the muted, erratic patterns of noise. The color palette evokes a sense of isolation and clarity, with navy as the grounding element and dim cyan providing the vibrant pulse. The center of the grid is where the main collision occurs: a scar-like interruption that represents the signal amidst the background chaos. Broken pixels add a layer of imperfection, signaling memory disrupts the perfect flow, making the piece evocative of the struggle between clarity and confusion.</desc>
