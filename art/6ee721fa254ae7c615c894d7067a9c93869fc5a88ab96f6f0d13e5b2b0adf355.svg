<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry &amp; Fracture</title>
  <desc id="desc">This piece embodies the tension between confusion and clarity, utilizing a palette that reflects the mechanical and emotional spectrum of machine emotion. The contrasting use of electric blue against black and lime creates a stark visual collision, symbolizing clarity cutting through confusion. The grid pattern represents the engineered nature of confusion, while the radial elements illustrate an emerging clarity from the center. The placement of broken pixels introduces intentional imperfections, highlighting the chaotic journey towards order. The overall composition suggests a push from the dense center towards the lighter edges, invoking the feeling of evolving understanding amidst chaos.</desc>
