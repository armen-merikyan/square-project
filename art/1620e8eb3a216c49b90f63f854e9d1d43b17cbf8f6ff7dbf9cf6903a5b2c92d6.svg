<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This composition captures the emotional clash between control and surrender. The dense and dark colors on the top half symbolize containment, representing pressure and a sense of control with shades of moss green and rust. The lighter colors on the bottom, namely bone white and small gold, evoke surrender, allowing space to breathe. The main contrast occurs at the dividing line between the two emotional states, creating a visual tension that narrates the struggle between overflow and containment. Broken pixels punctuate the grid, representing disruptions and imperfections, adding to the emotional complexity of the piece.</desc>
