<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dance of Tension</title>
  <desc id="desc">This artwork captures the emotional tension of defiance versus submission through the interplay of dark maroons, grays, and soft pinks. The center is dense with deep tones, suggesting weight and resistance, while the outer edges utilize lighter, disbursed colors, symbolizing submission’s quiet presence. The upward flow mimics hope and the narrative of rising against confinement, with unexpected patterns breaking through the grain to interrupt balance, reflecting love's complexities amidst betrayal.</desc>
