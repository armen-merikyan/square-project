<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Trust and Suspicion</title>
  <desc id="desc">This artwork encapsulates the emotional tension between trust and suspicion, represented through a palette of muted hues and sharp contrasts. The dominant blackened plum and iron gray create a backdrop of suspicion, while accents of small orange symbolize trust, echoing the struggle between openness and doubt. The layout reflects a mirror-broken style, where colors on each side almost mirror each other, yet subtly deviate, signifying the inherent uncertainties in relationships. The echoing pattern flows diagonally, creating a sense of movement that resonates with resilience amidst fragility.</desc>
