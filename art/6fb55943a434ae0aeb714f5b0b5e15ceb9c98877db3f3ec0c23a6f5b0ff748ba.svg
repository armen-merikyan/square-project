<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This piece captures the emotional tension between restlessness and peace. The palette of soft pinks contrasts with deep maroons, embodying the lingering memories of calm disrupted by waves of anxious energy. The collision manifests diagonally, where stacked pixels of darker hues clash with lighter, more serene colors, creating a rhythmic sense of both instability and balance. Broken pixels introduce imperfection, enhancing the theme of restlessness against a backdrop of tranquil, smooth areas. The layout erodes symmetry, allowing edges to feel unsettled, reinforcing the emotional undercurrent of the piece.</desc>
