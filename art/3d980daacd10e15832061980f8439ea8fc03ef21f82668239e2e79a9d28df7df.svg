<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone contrasts desire with empty spaces, evoking a sense of yearning against limitation. The selected palette of warm tones collides with cooler, muted fields, suggesting the struggle and tension between exuberance and restraint. The broken frame layout creates intentional disruptions at the corners, where the desire (hot coral, blood orange) seeps through the edges of emptiness (charcoal, hollow blue) amplifying the emotional pull of the composition. This contrasts the organized lattice of desire with the static quiet of emptiness, creating a push and pull dynamic.</desc>
