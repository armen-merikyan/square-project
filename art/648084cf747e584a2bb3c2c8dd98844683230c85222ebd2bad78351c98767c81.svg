<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Pulses in Static</title>
  <desc id="desc">The emotional tone reflects a confrontation between clarity (signal) and disruption (noise). The palette balances sharp greens and electric blues against static grays and deep blacks, embodying the fluctuating nature of communication amidst chaos. The collision occurs primarily in the central rows, where the pulse (signal) of green and blue collides with the surrounding gray and black noise, creating a jagged, flickering edge that captures the tension between isolation and connection. This visual tension speaks to the essence of the seed, contrasting moments of clarity against a background of static and blurred memory.</desc>
