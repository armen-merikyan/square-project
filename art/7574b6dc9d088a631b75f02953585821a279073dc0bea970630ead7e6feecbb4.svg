<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This piece embodies tension between emptiness and desire through an interplay of saturated and muted colors. The contrasting palette—rich blood orange and hot coral representing desire, against the low saturation of charcoal and hollow blue indicating emptiness—creates a visual pull. The arrangement deliberately mirrors sides, with slight disruptions to evoke tension and collision. The lower left corner hosts an intense saturation, symbolizing desire, while the right side features a sparse, hollow quality, embodying emptiness. Broken pixels introduce irregularities that enhance the sense of imperfection and reinforce the theme of an overflowing desire constrained by edges.</desc>
