<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone balances between the saturation of desire and the muted calm of restraint. The palette of hot coral and blood orange represents vivid longing, while charcoal and hollow blue embody the weight of limitation. The pattern reflects a collision through a dominant warm barcode design interrupted by crack-like devices that suggest tension against sealed edges. This creates a sense of yearning toward broader boundaries that remain unreachable, evoking a push and pull in both structure and color.</desc>
