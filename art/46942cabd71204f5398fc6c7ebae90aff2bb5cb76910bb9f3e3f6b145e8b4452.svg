<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This artwork encapsulates the emotional dichotomy of love and betrayal through the tension between warm and cool colors. The sharp-edged red and pink tones evoke love and warmth, while the cooler grays represent betrayal and emptiness. The diagonal placement creates an unsettling balance, with ‘burned edges’ signifying sharpness and disruption in the otherwise soft square pattern. The composition allows for negative space, enhancing feelings of isolation which echoes the theme of 'empty room'. The crack and frame patterns harmonize the piece, conveying both connection and disconnection.</desc>
