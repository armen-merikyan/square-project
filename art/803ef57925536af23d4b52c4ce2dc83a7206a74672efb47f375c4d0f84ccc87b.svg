<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This piece explores the emotional tension between restlessness and peace through the interplay of color and pattern. A predominantly dark palette conveys the weight of restlessness, while lighter shades suggest peace. The blocky, broken edges signify interruptions that evoke the notion of motion versus stillness, with gaps allowed for quiet spaces. The diagonal flow of color movements creates dynamic tension, suggesting an ongoing battle between these emotions. The deliberate arrangement of broken pixels adds an element of imperfection, representing the persistent struggle of memory and motion.</desc>
