<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry vs Break</title>
  <desc id="desc">This artwork translates the emotional tension between rage and calm into a visual rhythm. The chosen palette of deep reds and soft pale blues captures the intensity of rage against the serenity of calm. The layout, almost mirrored, reflects harmony but with deliberate breaks where jagged pixels disrupt the symmetry, suggesting conflict. The edge style is weighted toward the top, creating a feeling of imbalance, while the diagonal fall flow guides the viewer’s gaze across the canvas, echoing the turmoil within. The arrangement creates a crisp contrast where calm hues are suddenly interrupted by powerful bursts of red, symbolizing the unresolved tension between opposing emotions.</desc>
