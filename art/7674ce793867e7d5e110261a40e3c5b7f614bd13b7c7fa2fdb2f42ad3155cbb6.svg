<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">This artwork captures the emotional tension between defiance and submission through contrasting color choices and placement. The palette of burnt orange, dark red, charcoal, and gold represents a fiery conflict, while the cooler tones of charcoal create depth and weight. The patterned flow spirals out from a central diamond shape, illustrating the struggle as lighter colors (defiance) clash against darker tones (submission). The disturbance created by broken pixels evokes feelings of imperfection and conflict, emphasizing the theme of interruption and unresolved tension. Negative space is used judiciously to allow a sense of quiet amidst the chaos.</desc>
