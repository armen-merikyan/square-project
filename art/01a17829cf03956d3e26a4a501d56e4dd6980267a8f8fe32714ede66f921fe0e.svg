<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order in Chaos</title>
  <desc id="desc">This piece captures the emotional dichotomy between control and panic, depicted through a split layout. The upper half features controlled, structured color placements in soft pinks and reds, symbolizing stability (control). The lower half uses fragmented gray and dark maroon dots to illustrate disorder (panic). The palette reflects the themes of love and betrayal, with bright accents amidst the muted tones creating tension. Negative space is intentionally left on the edges, allowing the eye to breathe amidst the chaos and enhance the contrast between the two emotional states.</desc>
