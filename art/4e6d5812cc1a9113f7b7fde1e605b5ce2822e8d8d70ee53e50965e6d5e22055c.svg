<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This piece embodies the emotional dichotomy of safety and exposure, achieved through an asymmetric arrangement with warm earthy browns representing shelter, and cool blues reflecting openness. The center, a pale skin tone, creates an echo of vulnerability, while the diagonal tension from the edges represents the push and pull between a heavy frame and the potential for exposure. Broken pixels introduce intentional disruption, embodying the scars of experience. Overall, the intersection of structured patterns and subtle chaos narrates the balancing act of safety against exposure.</desc>
