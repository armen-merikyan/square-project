<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tear of Connection</title>
  <desc id="desc">The emotional tone balances the struggle between loneliness and connection, demonstrated through a dense center surrounded by expansive negative space. The palette, primarily using navy and black with hints of dim cyan, reflects the contrast between isolation and warmth. The arrangement uses a checker pattern in the edges to represent loneliness, against a radial distribution towards the center, symbolizing connection. The main collision occurs at the center, where the weight of colors converges yet bursts outward, creating a feeling of tension and release.</desc>
