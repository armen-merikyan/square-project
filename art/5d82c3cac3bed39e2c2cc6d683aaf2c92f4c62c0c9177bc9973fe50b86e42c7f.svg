  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork explores the emotional collision between vulnerability and strength through a sparse central area surrounded by dense edges. The palette of sepia, tan, dust gray, and faded blue reflects broken memories, with quiet fields contrasting against rich tones, suggesting a delicate balance between exposure and safety. The main collision occurs in the top left corner, filled with darker, more assertive colors that overwhelm the lighter background, invoking a sense of pressure. The broken pixels disrupt symmetry, further emphasizing the theme of vulnerability amidst strength.</desc>
