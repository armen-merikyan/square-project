<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Safety</title>
  <desc id="desc">The emotional tone of this artwork balances between the notion of safety and exposure, layered with the pressure of change. The palette consists of a calming shelter green to represent the gentle weight of safety, contrasted by open blue echoing the vastness of exposure. The main collision occurs at the center, where a dense cluster of earthy warm brown interacts with pale skin tones, a representation of vulnerability amidst protection. The broken pixels introduce imperfections, signifying the unpredictability of this emotional dialogue. The overall flow is dictated from the bottom to top, moving towards resolution while allowing some areas to retain quiet negative space, highlighting the tension between these contrasting feelings.</desc>
