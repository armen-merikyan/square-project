<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Discord</title>
  <desc id="desc">This artwork captures the emotional dichotomy of rage and calm through a structured yet disrupted pattern. The palette of red, black, pale blue, and white reflects the contrasts in emotions: the red symbolizes explosive rage while pale blue and white evoke feelings of calm. The grid pattern on one side represents calm with soothing horizontal lines, while the opposing checker pattern symbolizes the chaotic, disruptive nature of rage. The dense use of red pixelation collides with the emptiness of pale blue, creating tension and visual excitement. This arrangement embodies an upward prompt towards hope and resolution, mirroring the rising signal of suppressed emotions breaking through.</desc>
