<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">The artwork channels the tension between brightness and decay, represented by the emotional pair of 'spark' and 'ash'. The chosen palette of yellows and oranges interspersed with deep blue and muted purple creates a visual echo of joy and grief, where the warm tones signify spark and energy while the cooler hues represent restraint and fading memories. The main collision occurs diagonally, where vibrant colors ripple against muted, ladder-like tones, structured yet disrupted by intentional 'broken pixels', signifying memory’s unpredictable nature. This layout evokes the dynamic interplay of light and shadow, creating an abstract narrative of resilience meeting fragility.</desc>
