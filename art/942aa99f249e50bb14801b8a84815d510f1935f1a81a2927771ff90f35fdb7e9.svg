  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition captures a tension between two emotions: vulnerability and strength. The palette includes pale aqua and mist gray as tranquil bases, while alarm red serves as an accent for urgency. The arrangement evokes a collision between order and chaos—strength appears in the dense blocks of blue, while pink glitches disrupt the flow, representing vulnerability. The emotional contrast is centered in the middle rows, where strength and vulnerability collide, creating a visual narrative that oscillates between serenity and urgency.</desc>
