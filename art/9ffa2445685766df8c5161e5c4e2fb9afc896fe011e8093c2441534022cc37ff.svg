<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition reflects a dynamic emotional tension between tenderness and rage. The palette of red, black, pale blue, and white represents contrasting moods: red signifies passion and intensity, while pale blue embodies calmness and vulnerability. The main contrast occurs in the center where intense, jagged rain-like patterns of red clash against soft, upward stair-like movements of pale blue. This symbolizes the struggle between raw emotion and the desire for stability. The structured, dense pattern pressures towards the center, creating an intentional overflow that disrupts serenity, while the quiet channel cuts through, allowing space for breath and reflection. The broken pixels suggest imperfections and scars within this emotional landscape, reinforcing the theme of vulnerability. Overall, it captures a story of emotional collision and yearning for balance amidst chaos.</desc>
