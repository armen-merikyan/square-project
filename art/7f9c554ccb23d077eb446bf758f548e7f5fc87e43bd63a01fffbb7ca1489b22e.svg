<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This composition embodies the tension between chaos and control through a dual-color scheme that juxtaposes warm and cool tones. The chosen palette of yellow and orange represents joy, while deep blue and muted purple convey grief. The zigzag and striped patterns create a sense of conflict and movement, with bright spots acting as sparks of hope amid darker swathes. The burned edges suggest wear and turbulence, echoing the struggle between control and panic. Negative space is strategically used to introduce moments of calm, contrasting with clusters of intense color that represent emotional pressure. Overall, the piece is a visual representation of fluctuating states of mind, filled with unresolved tension and layered depth.</desc>
