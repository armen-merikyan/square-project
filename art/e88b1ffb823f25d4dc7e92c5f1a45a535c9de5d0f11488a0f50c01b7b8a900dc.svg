<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Aspirations Entwined</title>
  <desc id="desc">This piece embodies the emotional tension between longing and resolve. The palette, inspired by 'awe_terror', features deep teal and cosmic indigo to convey a sense of depth and introspection, contrasted by cold gold and star white that illustrate brighter thoughts or moments of clarity. The collision occurs in the center where urge meets serenity, creating a spiral pressure effect, reflecting the push and pull of emotions. Broken pixels interrupt the continuity, symbolizing the imperfections in our journey, while the negative space enhances the overall tension, suggesting that amidst the chaos, serenity can still emerge.</desc>
