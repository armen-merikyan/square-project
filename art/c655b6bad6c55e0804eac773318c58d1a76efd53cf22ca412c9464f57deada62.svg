<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Jagged Path to Light</title>
  <desc id="desc">This piece embodies the emotional tension between fear and hope. The palette emphasizes contrasts: black and dark violet represent fear, while soft gold and pale green symbolize hope. The jagged patterns mimic the raw edges of fear, while the upward glow of the gold suggests a rising hope. The arrangement creates areas of dense color (fear) interrupted by sparse regions (hope), reflecting the push and pull between these emotions. There’s a deliberate collision of sharp edges with soft transitions, evoking the idea of vulnerability amidst struggle.</desc>
