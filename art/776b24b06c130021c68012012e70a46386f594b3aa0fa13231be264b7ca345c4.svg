<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork captures the emotional tension between awe and terror, symbolizing the protective and threatening experiences we encounter. The chosen palette of muted purples and deep blues contrasts with warm yellows and oranges, representing the clash between chaotic sensations and a sense of order. The layout, flowing from one corner, signifies the gradual invasion of awe, interrupted by waves of terror that ripple through the piece. The broken pixels suggest instability and imperfection, enhancing the emotional depth and creating a sense of fragmented memory. The balance between the soothing colors at the center and the more intense shades at the edges illustrates the struggle between safety and vulnerability.</desc>
