<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This composition evokes the emotional tug-of-war between desire and restraint. The chosen palette features warm and saturated colors like hot coral and blood orange, representing desire, against cooler muted tones like charcoal and hollow blue that symbolize restraint. The central collision occurs where the warm colors vibrate against the cooler shades, with defined borders reflecting the tension of containment. The 'rising_signal' layout supports the upward flow of emotions, while intentional broken pixels introduce imperfections, enhancing the sense of struggle between overwhelming desire and deliberate restraint.</desc>
