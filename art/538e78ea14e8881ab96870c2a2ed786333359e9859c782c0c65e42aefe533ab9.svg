<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflicted Balance</title>
  <desc id="desc">The emotional tone represents a struggle between restlessness and peace, captured through contrasting colors and patterns. The chosen palette comprises muted greens and golds to evoke a sense of both calm and agitation. The collage of ‘ladder’ and ‘embers’ patterns creates an uneasy tension, where the upper left corner is dominated by warm tones reflecting peace, while the restlessness in deeper greens progresses downward, interrupted by sharp, dark lines. The main collision occurs at the diagonal, symbolizing the push and pull between the two emotions, pulling the viewer's eye through the piece.</desc>
