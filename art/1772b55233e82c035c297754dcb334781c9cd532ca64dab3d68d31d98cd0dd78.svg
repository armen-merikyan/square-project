<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotions</title>
  <desc id="desc">This composition reflects the emotional battle between rage and calm by utilizing sharp, jagged patterns in warmer colors contrasted against softer, horizontal flows of cooler hues. The palette incorporates deep reds and stark blacks to express intensity and weight, juxtaposed with pale blues and white, emulating a sense of tranquility. The placement of colors is intentional, with chaotic lines suggesting eruptions of rage erupting from a stable center, portraying a fractured calm. The structured layout highlights areas of tension and release, enriched by strategically placed broken pixels to amplify the concept of imperfection and collision.</desc>
