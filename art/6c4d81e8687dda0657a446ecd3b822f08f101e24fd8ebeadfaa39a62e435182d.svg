<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotions</title>
  <desc id="desc">This composition reflects the emotional tension between restlessness and peace through a dynamically arranged palette of colors. A dominant dark edge (#4A4A2D, #606C38) symbolizes restlessness, while lighter tones (#DAEBAE, #FFF7E9) represent peace, giving a sense of a calming influence clashing against an unsettled mass. The diagonal arrangement serves to express conflict and movement, mimicking a journey through contrasting spaces. The use of broken pixels creates intentional disturbances in the calm areas, amplifying the emotion of disruption, akin to signals interrupted by noise.</desc>
