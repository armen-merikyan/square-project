<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Tension</title>
  <desc id="desc">The artwork juxtaposes the emotional turmoil of panic against the calm of control, utilizing a color palette of blacks and deep violets to suggest heaviness and uncertainty, contrasted by softer golds and pale greens that bring a sense of hope and stability. The left side is densely packed with maze-like patterns representing panic, while the right adopts a controlled dot pattern illustrating calmness. The edge is heavier on the top, indicating a pull towards uncertainty, while the lower part gradually lightens, symbolizing potential resolution. The broken pixels create imperfections, emphasizing the rawness of emotion while maintaining sufficient negative space to evoke reflection.</desc>
