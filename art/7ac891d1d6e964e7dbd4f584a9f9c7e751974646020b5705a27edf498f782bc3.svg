<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotion</title>
  <desc id="desc">The emotional tone reflects a tension between longing and resolve, exemplified through dense clusters of color contrasting with quiet spaces. The palette of moss green, bone white, rust, stone gray, and small gold evokes resilience intertwined with fragility. The main collision occurs centrally with the dense accumulation of colors, while calm edges struggle to contain the saturation, symbolizing the push and pull between desire and stability. This composition stands as a visual metaphor for an inner emotional landscape where unresolved feelings meet assured boundaries, forming a narrative rich in complexity.</desc>
