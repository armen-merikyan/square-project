<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tide of Tension</title>
  <desc id="desc">The emotional tone centers on the struggle between quietness and pressure, presenting a visual narrative of build-up and release. The palette balances calm, muted off-white and peach with dense, weighted dark navy and compressed red, illustrating a contrast between spaciousness and density. The core collision occurs from the radial pattern of pressure clashing with the echo of quiet spaces, specifically at the diagonal axis where colors intermingle and disrupt. This reflects the seed's themes of shattering against the tide and the push and pull of conflicting emotions.</desc>
