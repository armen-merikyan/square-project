<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">The emotional tone of this artwork juxtaposes the intense feelings of dread, represented by darker colors and dense patterns, against the soft relief suggested by lighter hues and more open spaces. The palette uses shades of gray to evoke the weight of dread, while quiet hues like pale mint and soft sky create feelings of relief. The main collision occurs where the darker hues concentrate at one edge, spiraling out toward lighter colors, symbolizing a release of tension. This aligns with the theme of order versus chaos, structured spirals breaking apart into lighter spaces.</desc>
