<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure &amp; Shelter</title>
  <desc id="desc">The artwork reflects the emotional dichotomy of vulnerability and strength through a balanced palette that contrasts muted tones with subtle accents. The center features a pale exposed color, symbolizing vulnerability, surrounded by water-like flows of dark navy and faint peach that imply strength and protection. The lattice (strength) collides with swirling target shapes (vulnerability) creating an engaging spiraling pressure effect towards an off-center focal point. Each row is intentional to demonstrate both a calmness and a tension that echoes the seed's narrative of exposure versus shield.</desc>
