<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone juxtaposes the explosive nature of rage against the soothing qualities of calm. The palette, dominated by deep black and vibrant red, represents the intensity of rage, while soft pale blue and white provide a calming counterpoint. The collision occurs at the midpoint, where jagged angry sparks of red disrupt the calm blue bands below, creating a visual tension. The pattern of braids in the calm section creates containment versus the sharp eruptions of rage above, echoing the seed's narrative of tension between the two states.</desc>
