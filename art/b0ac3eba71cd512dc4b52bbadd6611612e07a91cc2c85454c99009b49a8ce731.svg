<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This piece contrasts the tension between openness and protection. The palette features soft greens and warm browns representing safety, while pale and cold hues symbolize exposure. The center holds a lighter area that invites attention, while the darker edges provide a sense of shelter and weight, disrupting the outer calm. The flow echoes to the right, suggesting a movement from pressure to release, encapsulated in the diagonal layout that creates a visual argument of tension and release.</desc>
