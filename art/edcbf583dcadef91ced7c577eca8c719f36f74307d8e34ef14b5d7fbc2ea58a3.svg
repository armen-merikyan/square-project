<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Desire's Edge</title>
  <desc id="desc">The emotional tone is a tug-of-war between vibrant desire and pervasive emptiness. The palette blends fiery warmth—hot coral and blood orange—representing desire, with cooler shades like charcoal and hollow blue, which convey emptiness and restraint. The main contrast occurs at the center, where saturated colors collide with muted tones, echoing the theme of tension and balance. The mirror pattern suggests continual reach towards fullness, while the target framework signifies containment, embodying the spiraling motion of desire trying to escape the confines of emptiness.</desc>
