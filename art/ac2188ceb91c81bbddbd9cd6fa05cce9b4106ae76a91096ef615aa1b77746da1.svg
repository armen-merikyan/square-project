  <title id="title">Fractured Balance</title>
  <desc id="desc">This composition explores the emotional tension between safety and exposure through contrasting colors and patterns. The palette features warm brown and shelter green representing stability, juxtaposed with pale skin and cold white symbolizing vulnerability. The main collision occurs in the center where a grid pattern (safety) intersects with an echoing scar pattern (exposure), visualizing a struggle between control and chaos. Broken pixels disrupt the grid, adding layers of imperfection and suggesting an ongoing negotiation between structure and fragility.</desc>
