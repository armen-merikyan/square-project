<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Colliding Pulses</title>
  <desc id="desc">This composition mainly embodies the tension between desire and restraint, utilizing a palette that combines stark contrasts. The deep reds and muted creams convey saturation and softness, respectively, capturing emotional depth. The main contrast occurs diagonally, where the vibrant red-oxides clash with the blackened plum, suggesting a battle between yearning and suppression. The layout's quiet channel allows for negative space to accentuate the pressure of desire, creating a confined but dynamic flow akin to rising tension that's heavily weighted on one side but struggles against the sealed edges of the square.</desc>
