  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork conveys the emotional dichotomy between safety and exposure through contrasting color interactions and placements. The palette blends shelter greens and warm browns to create a nurturing feel, while pale skins and cold whites depict vulnerability. The central focus utilizes bold pixels to incidentally interrupt the surrounding darkness, embodying the echo of pressure. The split layout emphasizes tension and release, creating a visual pulse that mirrors the struggle between the two emotions.</desc>
