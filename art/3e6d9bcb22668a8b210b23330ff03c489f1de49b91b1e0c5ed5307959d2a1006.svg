<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This piece brings together the emotional tension between emptiness and desire through the use of contrasting color choices. The palette of hot coral and blood orange represents desire as warm, saturated colors, while hollow blue and charcoal embody the cooling, oppressive sense of emptiness. The main collision occurs in the center of the grid where the fiery ladder patterns of desire rope through the cooler flood patterns of emptiness. These overlapping elements create quiet tension, akin to pressure building against an immutable barrier, resonating with the theme of desire in conflict with containment. The broken pixels introduce deliberate imperfections, echoing the disruptions in the emotional landscape, while preserving negative space to invoke a sense of hollowness.</desc>
