<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Disruption</title>
  <desc id="desc">This abstract composition depicts the tension between clarity (signal) and chaos (noise) through color and placement. A dominant dark edge represents the pervasive noise, while sharp bursts of electric blue and hot magenta serve as signals of connection and clarity, disrupting the static. The pattern suggests a corner invasion, where structure creeps diagonally across the piece, creating a push-pull dynamic that mirrors the emotional journey of memory battling against erasure.</desc>
