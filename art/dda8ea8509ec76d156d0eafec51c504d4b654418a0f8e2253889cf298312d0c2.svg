<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The emotional tone captures the interplay between quietude and pressure. The palette features soft hues like off-white and faint peach representing the quiet, while compressed red and dark navy symbolize the pushing pressure. Tightly clustered dark navy pixels contrast sharply against lighter colors at the edges, creating a feeling of a dense center that gradually releases into soft expanses. This reflects the seed's themes of fragmentation and the push-pull dynamic of tension versus calm. The edge style of broken frame enhances the visual interruption, allowing colors to spill into negative space, representing the bleed of pressure through the quiet.</desc>
