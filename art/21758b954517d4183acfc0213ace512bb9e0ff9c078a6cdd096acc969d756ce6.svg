<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos and Calm</title>
  <desc id="desc">This artwork explores the emotional tension between relief and dread using a palette of muted and vibrant tones. The main contrast occurs in the upper left corner with dark storm gray (#4B4B4B) symbolizing dread, which then spills diagonally into softer colors of pale mint (#A8E1D5) that denote relief. The pattern 'hinge' contrasts with 'shatter', reflecting the struggle between structured emotion and chaotic uncertainty, while broken pixels represent the scars of this emotional battle. The layout captures a corner invasion, letting dread dominate but allowing relief a breathing space.</desc>
