<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork represents the emotional contrast between defiance and submission. The muted purples and deep blues form a quiet core, suggesting submission's retreat into calmness, while the vibrant yellows and oranges create a loud outer frame that embodies defiance, portraying a protective yet aggressive stance. The collision occurs at the edges of the central square, where islands of color (defiance) break into stripes (submission), creating a dynamic visual tension throughout the piece. Broken pixels introduce intentional disruptions, hinting at the imperfections of conflict without forming a definitive shape.</desc>
