<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Release</title>
  <desc id="desc">This piece captures the emotional contrasts of pressure and quiet through a dense cluster of dark navy in the top left, symbolizing compression and crowding, which gradually dissipates into the soft, muted tones of faint peach and off-white towards the bottom right. The palette juxtaposes hard edges from the compressed colors against the softer, more tranquil fields, representing the push and pull of emotional states. The main collision occurs diagonally, enhancing the tension and creating an open gateway for the viewer to engage with the ebb and flow of these emotions.</desc>
