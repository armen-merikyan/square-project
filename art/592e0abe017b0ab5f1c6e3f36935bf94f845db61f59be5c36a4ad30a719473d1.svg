<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Progress</title>
  <desc id="desc">The emotional tone balances nostalgia with the push for progress, embodied in a palette that transitions from dark reds and charcoals, suggesting heaviness and past memories, to burnt orange and gold, evoking a sense of hope and ambition. The top-heavy layout captures the idea of falling, representing layers of history crashing against the aspirations of future. The row placement enhances the idea of a drippy descent across the grid, echoing the struggle between full vs hollow, with sharper contrasts interrupting smoother flows, suggesting moments of tension and release.</desc>
