<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tidal Tensions</title>
  <desc id="desc">This artwork embodies the emotional tension between quiet and pressure. The palette of muted off-white, dust gray, and soft peach contrasts sharply with the compressed red and dark navy to create a sense of conflict. The central row represents a collision of color where the radial and braid patterns meet, suggesting an unresolved dialogue. The layout challenges the viewer's perception, with the density of the palette creating visual weight counterbalanced by the light hues, physically mirroring the ‘pressure vs release’ theme inherent in the seed.</desc>
