<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Balance</title>
  <desc id="desc">This piece embodies the emotional tension between awe and terror created by contrasting colors and placements. The 'ancient_fire' palette evokes a sense of primal energy, merging the warmth of burnt orange and gold with the weight of dark red and charcoal. The primary contrast occurs at the center, representing stability that fights against chaotic edges, illustrated through the falling pixel arrangement. The use of broken pixels adds texture, symbolizing fragmented memories. The overall composition reflects a journey from bright hope at the core to darker uncertainties at the periphery.</desc>
