<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone captures the tension between vulnerability and protection, represented through contrasting colors: soft greens suggest safety while stark whites and deep browns symbolize exposure. The main collision occurs in the center, where pale skin color disrupts the darker borders, emphasizing the fragility of open space against the surrounding stability. This duality creates an echo of pressures and releases, maintaining a sense of unresolved tension throughout the piece.</desc>
