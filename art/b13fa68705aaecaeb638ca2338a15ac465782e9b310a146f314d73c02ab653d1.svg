<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Chaos</title>
  <desc id="desc">This artwork embodies the emotional tension between confusion and clarity. The palette of black, red, pale blue, and white was chosen to emphasize the duality of rage and calm. The structured layout hints at symmetry through the central outline while introducing chaos with sudden interruptions of red flames and blue waves. The broken pixels evoke a sense of imperfection, reflecting confusion amidst attempts at precision. The main contrast occurs in the center, where dense color collides with empty space, creating a pulse that invites the viewer to explore the tension between stability and disruption.</desc>
