<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This piece captures the emotional tension between panic and control through a divided color palette. The left side utilizes cooler tones of electric blue and black to suggest stability, while the right experiments with the vibrant energy of magenta and lime to evoke a sense of chaos. The hard edges of color collisions create a stark visual divide, enhancing the feeling of separation between the two emotions. Noise patterns signify the instability of panic, while structured grids represent control. The uneven distribution of colors introduces a sense of imbalance—mirroring the emotional conflict captured in the seed—creating an artwork that embodies unresolved tension.</desc>
