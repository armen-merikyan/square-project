<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry Eroded</title>
  <desc id="desc">The artwork explores the emotional tension between confusion and clarity. The palette of deep blue, muted purple, and warm yellows creates a contrast reminiscent of joy and grief. The left side features radial patterns that create chaos, while the right side smoothens this with tooth-like clarity, emphasizing the center versus edges juxtaposition. Broken pixels interrupt the expected symmetry, suggesting fragments of thought and emotion in a machine-like structure, symbolizing the struggle between clarity and chaotic feelings.</desc>
