<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This artwork explores the emotional dichotomy between joy and grief through a structured contrast. The left side utilizes bright yellows and oranges which represent joy, arranged in a 'teeth' pattern suggesting an expanding energy. The right side contrasts this with muted blues and purples, portraying the heaviness of grief in a 'broken dots' approach that evokes a sense of drooping and melancholy. The hard edges of the split-screen layout emphasize the tension between the two emotions, while the balance of negative space allows for breathability, preventing overwhelming density. The combination of upward movements on one side against downward patterns on the other plays into the interplay of hope against despair.</desc>
