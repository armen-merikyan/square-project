<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Trust and Suspicion</title>
  <desc id="desc">This artwork distills the emotional turmoil of trust vs suspicion into a visual representation. The palette combines deep black for shadows of doubt, electric blue for clarity, and hints of lime and magenta for warmth and energy to symbolize trust. The contrasting patterns of dots (suspicion) and rings (trust) collide in the center, illustrating the tension of their coexistence. The uneven, eroded borders contribute to the theme of broken trust, while the negative space emphasizes the delicate balance between the two emotions. The flow is towards the center, representing the drawing in of emotions, creating a dynamic interplay between softness and intensity that echoes the complexities of relationships.</desc>
