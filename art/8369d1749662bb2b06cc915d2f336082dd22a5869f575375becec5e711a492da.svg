<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weighted Divide</title>
  <desc id="desc">The emotional tone expressed here oscillates between the boldness of defiance and the subtlety of submission, creating a rich narrative of tension and balance. The palette of electric blue, lime, magenta, and black evokes a mechanical emotion, reinforcing feelings of conflict and resolution. The main contrast occurs between the dense bottom colors and the lighter, open top, suggesting a push from weight to levity, while the placement of broken pixels introduces a sense of imperfection and randomness. This aligns with the idea of half-square and falling pixels, hinting at the struggle between openness and confinement. The layout is designed to emphasize the contrast, with meaningful clusters of color offset by significant negative space.</desc>
