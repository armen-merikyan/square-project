<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork embodies the tension between desire and restraint through a dynamic color palette of warm and cool tones. The selected colors—hot coral and blood orange represent the passionate urges of desire, while charcoal and hollow blue invoke the calm restraint. The diagonal flow of saturated 'stairs' patterns collides with the rippling shapes of muted colors, creating a sense of both upward movement and underlying tension. The central collision of colors suggests a struggle between release and containment, reflective of the emotional complexity in the seed. The layout leaves ample negative space to emphasize the contrast in feelings.</desc>
