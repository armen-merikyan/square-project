<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Calm and Chaos</title>
  <desc id="desc">This composition embodies the tension between restlessness and peace through a juxtaposition of sharp, crack-like patterns and smooth, ring-like formations. The palette features muted tones of shelter green and warm brown to evoke a sense of grounding and safety, contrasted with the starkness of cold white and open blue, representing a more unsettled state. The dominant presence of dark colors in the upper left corner signifies restlessness, while the lighter, smoother areas to the right provide a contrasting sense of peace. Broken pixels throughout disrupt uniformity, illustrating moments of interruption and tension. The main collision occurs diagonally, suggesting movement and emotional contention.</desc>
