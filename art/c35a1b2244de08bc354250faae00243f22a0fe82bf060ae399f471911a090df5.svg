<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Shelter</title>
  <desc id="desc">The emotional tone delivered through the palette emphasizes the contrast of safety (softness, warm browns) and exposure (cold whites, open blues). The repeated warm brown and shelter green suggest a stable frame around the cooler, more vulnerable colors. The main contrast happens in the center with cold white and pale skin colors, creating a striking echo effect against the warm background. This reflects the themes of pressure vs. release and the conflict between safety and exposure, illustrated by the interruptions in the structure of the pixel arrangement, tying back to the abstract narrative of vulnerability. The layout leaves ample negative space calling attention to the tension between the two emotional states.</desc>
