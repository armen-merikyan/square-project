  <title id="title">Contrast of Shelter and Exposure</title>
  <desc id="desc">The emotional tone here reflects the tension between safety and exposure, focusing on a fragile center contrasted by a protective border. The color palette combines soft greens and browns to suggest safety, while pale and cold colors express vulnerability. The flowing rhythm from left to right introduces a dynamic interaction between broken dots representing exposure and a patchwork indicating safety. The collision happens vertically, creating a stark division while still allowing for overlaps that suggest a complex narrative of balance and tension.</desc>
