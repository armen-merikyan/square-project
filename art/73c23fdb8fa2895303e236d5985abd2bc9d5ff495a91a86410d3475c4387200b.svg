<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Change</title>
  <desc id="desc">This piece captures the emotional tension between nostalgia and progress through a strong contrast of color and placement. The palette of muted purples, warm oranges, and deep blues reflects a balance of warmth and depth, evoking a sense of both comfort and unease. The split-horizontal pattern signifies a division—where the bottom rows embody the weight of nostalgia, filled with deeper colors, while the upper rows are more sparse, hinting at progress and airy possibilities. The use of broken pixels introduces imperfection, echoing the complexities of memory and growth, while maintaining an overall sense of quiet against the collision of emotional layers.</desc>
