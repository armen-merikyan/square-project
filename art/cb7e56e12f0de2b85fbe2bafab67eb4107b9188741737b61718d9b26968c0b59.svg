<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Exposure</title>
  <desc id="desc">This artwork explores the tension between safety and exposure. The color palette incorporates 'shelter_green' for a warm feeling of enclosure and 'open_blue' for a sense of exposure and vastness. The dominant warm brown surrounds a pale center, creating a soft yet firm border that reflects shelter. The main collision occurs along the vertical split, where the cool blue gently interrupts the warm tones, encapsulating the emotional duality. The varied pixel densities and broken pixels evoke moments of pressure and release, reinforcing the conceptual tension.</desc>
