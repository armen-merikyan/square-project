<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tension</title>
  <desc id="desc">The emotional tone captures the dynamic interplay between vulnerability and strength, illustrating the duality of exposure versus shelter through contrasting colors and patterns. The selected palette, with its warmer coral and soft amber alongside cold slate and blue black, evokes feelings of warmth and strength battling against cold isolation and vulnerability. The center features a complex collision of the mirror pattern (representing vulnerability) against a stable threshold pattern (indicating strength), creating visual tension. The use of broken pixels adds imperfections, enhancing the narrative of struggle and resilience. Negative space radiates from the edges, allowing the collision to breathe and emphasize the central theme of coexistence and contrast.</desc>
