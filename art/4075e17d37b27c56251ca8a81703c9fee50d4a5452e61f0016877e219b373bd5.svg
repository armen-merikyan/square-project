<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This artwork captures the emotional tension between joy and grief, juxtaposing bright and vibrant yellows and oranges against deep, muted blues and purples to express the weight of sorrow. Joy is portrayed through the maze-like patterns, suggesting complexity and brightness, while grief interrupts with a fragmented, target-like arrangement, embodying chaos and heaviness. The grid representation signifies the order and structure that grief disrupts. The left side of the composition is weighted with muted colors transitioning into brighter hues on the right, creating a flow that moves from low to high, reflecting a journey from despair to hope.</desc>
