  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone of this artwork delves into the tension between vulnerability and protection. The palette combines muted tones of shelter_green and warm_brown with accents of pale_skin and cold_white, embodying the delicate balance of safety and exposure. The layout features a striking negative space channel that divides dense clusters of broken dots symbolizing exposure, with a stitching thread pattern invoking shelter. This collision of patterns creates an accessible flow of flickering emotions, contrasting both heavy and thin textures. The center serves as a focal point, where soft colors dance against sharper edges, illustrating the overarching narrative of a fragile equilibrium.</desc>
