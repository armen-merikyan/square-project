<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Against Restraint</title>
  <desc id="desc">This piece embodies the tension between desire and emptiness, using a palette rich in warm coral and orange tones to signify a saturated yearning against more muted blue and charcoal backgrounds representing void and lack. The central contrast erupts through a cracked pattern weaving through areas of lattice, creating visual disruptions in the calm, quiet space. Broken pixels add imperfections, suggesting scars of unmet desires. The layout emphasizes two small centers filling with warmth, arcing toward each other amidst a large empty negative space, symbolizing a struggle for connection and containment.</desc>
