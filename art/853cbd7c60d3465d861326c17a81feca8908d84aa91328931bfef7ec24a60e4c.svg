<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Orbit</title>
  <desc id="desc">This piece captures the emotional struggle between panic and control through color contrast and pattern layout. The palette combines the deepness of black (#000000) and dark violet (#5C2E91) representing the chaotic elements of panic, while soft gold (#D6C27E) and pale green (#A3C9B0) introduce a feeling of control and stability. The diagonal movement from the top left to the bottom right creates a swirling tension, reflecting the delicate balance of emotions. Broken pixels disrupt the expected crosshatch pattern, symbolizing imperfections and the unexpected sparks within an empty space.</desc>
