<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This composition channels the emotional dichotomy of certainty versus curiosity. The palette of off-white and grey tones creates a subdued background, complemented by compressed red for moments of tension, while dark navy and faint peach offer contrast and warmth. The arrangement reflects a collision between structured frames (certainty) on one side and layered stacks of color (curiosity) on the other, highlighting an ongoing inner dialogue. The flow spirals outward, suggesting a rising signal amidst static. Broken pixels introduce intentional disruptions, embodying the feeling of dread within the framework of order.</desc>
