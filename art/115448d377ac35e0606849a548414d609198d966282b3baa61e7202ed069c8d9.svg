<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork embodies the tension between safety and exposure, utilizing a split vertical layout that emphasizes the contrasting emotions. The outer rows are framed with darker, muted colors, representing the protective safety dome, whereas the inner section features lighter, more vibrant hues to signify exposure and vulnerability. The combination of the sheltering browns and greens with the airy blues creates a dialogue of warmth and vulnerability. The edge style is a burned effect, indicating wear and imperfection while breaking from uniformity to enhance emotional depth. The collision occurs primarily at the center, where soft ripples of blue and skin tones face the weighty brown, encapsulating the balance of pressure and release in this abstract representation.</desc>
