<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Spectrum</title>
  <desc id="desc">This artwork embodies the contrast between joy and grief, using a palette that harmonizes warm and cool tones. The colors yellow and orange symbolize joy and openness, while deep blue and muted purple represent grief and heaviness. The patterned arrangement captures a zigzag movement, with vibrant colors fighting against darker tones, enveloping the central space yet leaving room for air. The hard edges offer a sense of conflict, while broken pixels suggest the raw imperfection of emotions. The layout is intentionally sparse, embodying the negative space rule to allow reflection amidst the emotional tension.</desc>
