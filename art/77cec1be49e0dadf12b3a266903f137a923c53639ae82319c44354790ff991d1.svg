<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Calm and Chaos</title>
  <desc id="desc">This square embodies the emotional dichotomy of restlessness and peace. The palette features soft pastels contrasted with deeper, muted tones, reflecting the tension between a serene state and the unease of motion. The main contrast emerges diagonally across the square, where sharp crimson touches meet calm carbon black, suggesting an interruption—a flame against a backdrop of stillness. The use of broken pixels introduces a subtle imperfection, symbolizing memory's interruptions and the erratic flow of thoughts, balanced against the peace of wider spaces in the composition.</desc>
