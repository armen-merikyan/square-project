<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Threads</title>
  <desc id="desc">This composition embodies the emotional tension between trust and suspicion by contrasting structured and chaotic patterns. The warm tones of lime and magenta represent trust, interwoven with cooler shadows of black and electric blue embodying suspicion. The left side adheres to a threaded structure, suggesting stability and warmth, while the right side breaks into a lattice pattern introducing a sense of tension and fragmentation. The collision occurs where these patterns meet, at the vertical center, creating dynamic interruption and a dance between security and doubt. The palette strengthens this duality through a playful yet controlled approach.</desc>
