<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This artwork embodies the emotional tension between trust and suspicion. The palette combines warm and cool colors to convey these contrasting feelings, with hot coral and blood orange suggesting warmth and trust, while charcoal and hollow blue evoke a sense of suspicion and distance. The broken dots pattern implies a soft, trusting foundation which collides with the sharp, channel-like shapes of suspicion. The center of the grid serves as a collision point, creating a visual focus where the two emotions meet, enhancing the feeling of unresolved tension.</desc>
