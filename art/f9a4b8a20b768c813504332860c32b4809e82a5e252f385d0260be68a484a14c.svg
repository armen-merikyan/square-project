  <title id="title">Tension in Asymmetry</title>
  <desc id="desc">This artwork captures the emotional dichotomy between restlessness and peace. The palette, featuring warm yellows and oranges against cool purples and deep blues, reflects the tension between a vibrant, chaotic pulse and a calm, muted background. The main collision occurs in the top corner, where bright, glitch-like patterns represent unrest, contrasting with the serene, broken dot patterns in the lower half that suggest peace and quiet. The asymmetrical layout reinforces this emotional struggle, embodying the conflict inherent in memory and motion. Broken pixels are integrated to create intentional disruptions that mirror the fragmented nature of thought and experience.</desc>
