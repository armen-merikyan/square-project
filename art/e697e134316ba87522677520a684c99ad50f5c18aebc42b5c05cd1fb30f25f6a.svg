  <title id="title">Vessel in Tension</title>
  <desc id="desc">The emotional tone encapsulates a delicate balance between safety and exposure, represented through a palette of soft greens and warm browns contrasted by cold whites and an open blue. The left side resonates with ‘safety’ through a crosshatch pattern in earthy tones, while the right side illustrates ‘exposure’ with a ring pattern in cooler hues, creating a dynamic tension. The main collision occurs in the center, where these contrasting patterns intertwine, embodying the struggle of protection versus vulnerability, enhanced by intentional broken pixels that symbolize disruptions in both safety and exposure.</desc>
