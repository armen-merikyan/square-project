<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Stillness Entwined</title>
  <desc id="desc">The emotional tone embodies a tension between quietude and pressure, with the palette carefully chosen to reflect this dichotomy. Soft off-white and faint peach represent quiet, while compressed red and dark navy illustrate pressure. The core conflict occurs at the center, where dense, sharp edges collide with soft, broken patterns, creating an area of tension that spreads toward the periphery, allowing for both contrast and a release into negative space. The interplay of patterns embodies the seed's themes of symmetry and disruption, evoking a dynamic, unresolved narrative without literal representation.</desc>
