<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Fracture</title>
  <desc id="desc">This piece embodies the tension between joy and grief. The palette combines bright hues of yellow and orange at the core (representing joy) with deep blues and muted purples at the edges (signifying grief). The order versus chaos theme manifests through hard edges dividing the light central area from the darker outer zones, creating a definite split that reflects the emotional conflict. The patterned arrangement suggests a stair-step movement towards the center, indicating a journey from chaos to order, yet the cracks in the outer layer introduce disruption. The contrast between the vibrancy of joy and the heaviness of grief creates a dynamic interplay that echoes the complexity of human emotions.</desc>
