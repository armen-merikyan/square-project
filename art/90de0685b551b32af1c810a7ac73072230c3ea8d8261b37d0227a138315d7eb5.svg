<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Order</title>
  <desc id="desc">The emotional tone reflects a dance between panic and control, illustrated by a stark contrast within the chosen palette. The top half employs a structured stripe pattern indicating control, working with dark violet and soft gold to evoke a feeling of stability but layered with unexpected splashes of pale green. The bottom half bursts into chaos with a dotted pattern, using black and dark violet, suggestive of raw, tumultuous emotions. Each pixel represents an emotional collision, with the transition from the structured top to the chaotic bottom providing a visual narrative reflecting the struggle between calmness and fear.</desc>
