<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Centering Tensions</title>
  <desc id="desc">This piece explores the emotional contrast of panic and control, embodied by a dense center and softer edges. The palette of dark navy and black against lighter dim cyan evokes feelings of claustrophobia while still allowing for moments of quiet. The dense vs. empty contrast manifests as a central region filled with rich colors, while the outer layer offers negative space, suggesting escape or resistance. Each row shifts the color intensity, using broken pixel aesthetics to illustrate disruption, underscoring the struggle between structured control and chaotic panic.</desc>
