<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone juxtaposes sharp anger against serene calmness, represented by a palette primarily of red (rage) contrasted with cooler blues and blacks (calm). The arrangement features jagged edges of red intersecting with deep, tranquil navy shades, creating tension at the borders where emotions collide. This stark contrast resonates with the theme of containment versus overflow, evoking a sense of both pressure and quiet undercurrents. The 'broken frame' layout draws attention to the edges, where intense emotions burst through the calm, reflecting the dynamic between chaos and tranquility.</desc>
