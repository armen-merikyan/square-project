<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Defiance</title>
  <desc id="desc">This artwork captures the emotional tension between defiance and submission. The color palette, featuring hot coral and blood orange for defiance and charcoal and hollow blue for submission, creates a striking contrast. The central area radiates with warm tones, representing defiance, while cooler colors recede towards the edges. The disrupted pattern illustrates the fight between rigid structure and chaotic flow, with some broken pixels adding an element of imperfection, suggesting vulnerability amongst the resilience. The collision between bright accents and muted fields emphasizes this duality, establishing a rhythmic push-and-pull across the canvas.</desc>
