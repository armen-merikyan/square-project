<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Shelter</title>
  <desc id="desc">The emotional tone of this piece juxtaposes the vulnerability of exposure against the comforting weight of safety. The palette combines cool tones of open blue and cold white with warm browns and greens representing shelter, suggesting a dichotomy of experience. The main collision occurs vertically along the center, where pulse mark patterns of exposure clash with the stable, target-like formations of safety, creating a feeling of tension yet offering quiet spaces to breathe. The broken pixels symbolize interruptions of both safety and exposure, enhancing the abstract narrative of gradual ascent as seen in the rising layout.</desc>
