  <title id="title">Lattice of Yearning</title>
  <desc id="desc">This composition embodies the push and pull of desire and restraint through a dynamic color interaction. The warm palette of hot coral and blood orange speaks to the intensity of craving, contrasted by the muted presence of charcoal and hollow blue, representing restraint. The primary collision occurs in the middle rows, where saturated colors clash with darker, more subdued tones to create tension. The patterning suggests a sweep of motion layered within a sealed boundary, communicated through radial and teeth patterns, evoking the complexity of emotional depth and conflict.</desc>
