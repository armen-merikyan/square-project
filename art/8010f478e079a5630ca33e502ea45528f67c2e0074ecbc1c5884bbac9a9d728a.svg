<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Echoes</title>
  <desc id="desc">This piece embodies the emotional tension between envy and gratitude. The warm palette of burnt orange and gold fights against the dark reds and charcoals, representing the weight of envy versus the lightness of gratitude. The broken line pattern reflects the deterioration of clarity amidst this conflict, while the grid layout instills a sense of order amidst chaos. The central area is dense with color, suggesting a heavy emotional burden, while outer spaces are kept lighter for contrast, indicating room for grace and reflection.</desc>
