<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This artwork represents the emotional struggle between panic and control, manifesting through an 8x8 grid divided between two contrasting states. The left side symbolizes panic, using deep shades of black and dark violet that evoke feelings of chaos and uncertainty. The right side embodies control with softer colors like pale green and soft gold juxtaposed against the darker elements. The composition flows horizontally, creating a wave-like rhythm where the spark pattern of the controlled pixels interrupts the randomness of the panic side. The broken pixels introduce unpredictability, mirroring the instability inherent in the struggle for control over chaos.</desc>
