<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symphony of Doubt</title>
  <desc id="desc">This artwork reflects the emotional tension between trust and suspicion through stark contrasts and overlapping patterns. The chosen palette of burnt orange, dark red, charcoal, and gold evokes a sense of ancient fire, symbolizing both warmth and potential danger. The radial pattern of suspicion collides with the smooth, flood-like quality of trust, creating interruptions in texture that speak to the theme of fractured relations. The central diagonal flow represents the challenge of navigating between these emotions, punctuated by broken pixels that illustrate unpredictability and doubt. The negative space gives room for reflection, embodying the tension inherent in trust and suspicion.</desc>
