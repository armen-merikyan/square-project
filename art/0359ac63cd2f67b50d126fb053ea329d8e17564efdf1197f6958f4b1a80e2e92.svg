<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This artwork reflects the tension between joy and grief, using a palette that contrasts bright yellow and orange to represent joy with deep blue and muted purple for grief. The layout is split vertically, emphasizing the stark emotional divide. The zigzag pattern suggests disruption, while the presence of broken pixels introduces imperfection, echoing the human experience. The main collision occurs in the center, where bright colors interact with muted hues, symbolizing the interplay of feelings. Negative space is included to prevent overwhelming density, allowing for moments of calm in between emotional highs and lows.</desc>
