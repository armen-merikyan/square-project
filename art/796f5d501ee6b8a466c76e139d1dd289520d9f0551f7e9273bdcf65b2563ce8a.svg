<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Equilibrium</title>
  <desc id="desc">The artwork captures the emotional tension between restlessness and peace through contrasting colors and patterns. The palette, combining deep teal and cosmic indigo with pale tones of star white, creates a dynamic interplay. The dominant dark hues reflect the unsettled nature of restlessness, while the softer whites and golds suggest fleeting moments of peace. The diagonal argument layout emphasizes a collision at the center, where movement meets calm, embodying the theme of tension. Broken pixels are scattered throughout to disrupt the symmetry, representing the imperfections of memory and the inherent chaos of motion.</desc>
