<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Weight</title>
  <desc id="desc">This artwork embodies the emotional struggle between defiance and submission, depicted through a sharp contrast of dark and light colors. The palette, consisting of black, dark violet, soft gold, and pale green, creates a dialogue between heaviness and hope. The 'falling_pixels' layout encourages a descending pattern, symbolizing the tension of lightness against grounding weight. The composition is bottom-weighted to represent the heaviness of submission battling against defiance's upward pull. This tension is reflected by colliding darker hues at the bottom, contrasting with the lighter tones that trickle down, echoing the emotional weight of love and betrayal.</desc>
