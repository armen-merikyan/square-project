<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Symmetry</title>
  <desc id="desc">This piece embodies emotional tension through the interplay of defiance and submission. The chosen palette, comprising sepia, tan, dust gray, and faded blue, conveys a sense of warmth intertwined with detachment. The peripheral colors represent submission’s retreat, while the center exudes defiance with deeper, more assertive hues. The main contrast unfolds at the core, where a radial pattern representing defiance collides with a veiled, soft border suggesting submission, encapsulating the dynamic tension between pressure and release. Broken pixels add an element of imperfection, enhancing the theme of erosion and creating visual interest within the rigid framework of the 8x8 grid.</desc>
