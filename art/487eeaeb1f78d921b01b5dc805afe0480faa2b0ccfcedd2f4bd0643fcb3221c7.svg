<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">hunger vs restraint</title>
  <desc id="desc">This composition balances the tension between the deep desires represented by warm, saturated colors and the encompassing emptiness shown through muted, darker hues. The palette highlights a struggle, with vibrant colors like #FF6F61 and #FFABAB signifying desire emerging against the backdrop of cool and calm shades like #101820 and #2C3E50, which symbolize restraint. The main collision occurs towards the center—a vibrant cluster disrupts the surrounding quiet fields, echoing the concept of overflow versus containment, creating a visual narrative of a 'pull' against a barrier. The use of broken pixels introduces intentional imperfection, reflecting the inherent conflicts described in the seed while adhering to the grid layout, resulting in a structured yet fluid composition.</desc>
