<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Invasion</title>
  <desc id="desc">This piece embodies the emotional tension between loneliness and connection, utilizing a muted color palette of deep blue, muted purple, yellow, and orange to convey warmth battling against the coldness of isolation. The arrangement features off-center, dense clusters reflecting moments of connection amidst large negative spaces, signifying both full and hollow feelings. The edges are left defined with thick outlines creating visual weight, while areas of broken pixels introduce an imperfect memory of connection, reinforcing themes of disruption and absence. The central battle between warmth and emptiness creates a rhythm of echoing emotions that invites the viewer to contemplate their own experiences of connection and isolation.</desc>
