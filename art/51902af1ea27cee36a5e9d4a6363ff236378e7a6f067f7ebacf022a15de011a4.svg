<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience in Fracture</title>
  <desc id="desc">This composition explores the tension between the sharpness of bright sparks and the weight of muted ash, conveying a dialogue of resilience against fragility. The chosen colors range from soft mint and faded gold, evoking warmth and light, to storm gray and near black, signifying depth and weight. The main collision occurs at the center where light and dark intersect sharply, creating a focal tension that mimics a jagged argument. The scar-like pattern of ash is disrupted by bursts of dots representing spark, illustrating a struggle that intertwines memory and erasure.</desc>
