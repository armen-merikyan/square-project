<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Pulse</title>
  <desc id="desc">This piece embodies the emotional tension between longing and resolve, utilizing dots to represent longing and pressure bands symbolizing resolve. The palette—pale mint introduces a calming essence while storm gray and near black evoke depth and seriousness, suggesting the weight of emotions. The primary collision occurs in the center, where the bright pressure bands conflict with the soft fading dots, creating an echo of experience that hints at repair amid damage. These elements together create a narrative of striving for serenity in the face of disruption.</desc>
