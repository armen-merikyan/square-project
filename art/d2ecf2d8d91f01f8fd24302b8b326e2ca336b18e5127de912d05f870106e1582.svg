<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece embodies the tension between emptiness and desire, utilizing a palette that juxtaposes saturated warmer tones against cool, quiet hues. The contrast is centered in the middle where the hot coral and blood orange create a pulsing effect, suggesting relentless craving, while the surrounding hollow blue and charcoal act as a calming containment. The clipped edges and broken pixel placements inject disorder amidst order, reflecting the struggle inherent in the emotional themes. The overall layout achieves a balance between dense islands of desire in the center against a broader field of restraint, symbolizing the constant push and pull of human emotion.</desc>
