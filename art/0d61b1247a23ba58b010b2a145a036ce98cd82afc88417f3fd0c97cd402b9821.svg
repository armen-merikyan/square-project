<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Extremes</title>
  <desc id="desc">The emotional tone explores the duality of spark and ash, creating a narrative of resilience against fragility. The chosen palette consists of hot coral and blood orange representing warmth and bursts of energy against the softer, muted dust pink and charcoal to evoke a sense of memory and residue. The primary contrast resides in the center, where the vibrant colors clash with the greyer hues, illustrating the argument between vitality and decay. This conflict emerges from the layered patterns of 'embers' juxtaposed against the 'channels', reflecting the tension of a wave breaking against a static shore, harnessing the shape of the wave to abstractly organize the emotional story through a visual representation of movement and stillness within the grid.</desc>
