<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Open Gate</title>
  <desc id="desc">This artwork embodies the emotional tension between vulnerability and strength using a color palette of black, lime, electric blue, and magenta to represent hard edges and unshielded light. The open gate layout allows an incoming flow of contrasting colors, creating a visual dialogue between the dense and quiet spaces. The center features soft, exposed constellations contrasted by the geometric teeth patterns defining the edges, illustrating the collision of exposure against a robust frame.</desc>
