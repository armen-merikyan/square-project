<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light</title>
  <desc id="desc">The emotional tone reflects the struggle between fear and hope, where dark elements represent fear's suffocating weight, while glowing colors signify hope's upward flow. The palette, featuring black, dark violet, soft gold, and pale green, embodies the duality of despair and aspiration. The main contrast surfaces at the intersection of dense dark colors and a burst of brighter hues in the center, echoing a sense of breakthrough against despair. The split vertical layout captures the essence of tension, as the interaction between jagged and smooth patterns creates a dynamic that resonates with both pressure and release. This abstract interpretation remains free of literal icons, focusing instead on the emotional flow generated by color and shape.</desc>
