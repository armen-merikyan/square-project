<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">The artwork explores the emotional dichotomy of joy and grief through color contrasts and placement. The palette of blue tones and spark-like yellows creates a tension where grief is expressed with muted, heavy colors interspersed with bright accents of joy. The zigzag pattern evokes movement, suggesting a transition from structured order to chaotic expression. Burned edges symbolize the sharpness of grief against the softness of joy, while broken pixels introduce imperfection, reinforcing emotional complexity. This arrangement leaves enough negative space to allow contemplation of the emotional experience.</desc>
