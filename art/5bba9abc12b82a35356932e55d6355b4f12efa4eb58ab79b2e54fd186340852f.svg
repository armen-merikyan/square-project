<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">The emotional tone captures the dynamic interplay between vulnerability and strength, represented visually through the palette of deep blacks and vibrant colors. The colors signal both exposure and protection—dark tones create a sense of depth while the electric blue and hot magenta offer sharp contrasts signifying bursts of strength. The collision occurs predominantly at the center, where light disrupts the darker surrounding areas, guiding the viewer's gaze through the piece. Patterns of broken dots suggest moments of strength amidst the frailty indicated by teeth-like edges of vulnerability, merging in a harmonious tension that evokes both anxiety and resilience.</desc>
