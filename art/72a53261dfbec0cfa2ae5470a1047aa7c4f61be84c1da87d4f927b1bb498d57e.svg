<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Stillness</title>
  <desc id="desc">This artwork explores the emotional dichotomy between quiet and pressure, visualizing the struggle through a palette that juxtaposes muted hues with sharper contrasts. The dominant usage of dark navy (#001F3F) frames the piece, symbolizing pressure at the borders, while off-white (#F7F9FC) creates an open center, suggesting quiet. The main contrast occurs centrally, where compressed red (#D50000) interrupts the calm, reminiscent of sudden tension rising through soft radiance. The resulting arrangement, steeped in asymmetry, embraces the notion of shattering against current expectations, echoing a layered emotional experience rather than a literal representation.</desc>
