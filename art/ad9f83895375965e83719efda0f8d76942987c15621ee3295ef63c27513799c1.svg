  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a tension between the saturated desire for warmth and the cool restraint of negative space, embodying a struggle where warmth reaches toward an unseen boundary. The palette of vibrant coral and orange colors expresses strong desire, while muted charcoal and deep blue signify restraint. The main collision occurs in the center, where warm colors burst against the constrained shape of the seal. The chosen patterns of spark and stairs create an interplay of energy and structure, contributing to a vivid yet controlled square.</desc>
