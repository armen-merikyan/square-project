<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork embodies the emotional tension between joy and grief. The palette combines vibrant yellows and oranges representing joy with deep blues and muted purples signifying grief, creating an interplay of expanding and heavy sentiments. The central region is dynamic with radial patterns, symbolizing movement and pulse, while the edges deploy a staircase-like arrangement to evoke fragmentation and weight. The contrasting elements—bright, expanding colors in the center versus the darker, cascading edges—illustrate a struggle for emotional dominance, reflecting the duality of the seed theme.</desc>
