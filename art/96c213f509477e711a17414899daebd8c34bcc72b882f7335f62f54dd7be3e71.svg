<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">This artwork embodies the emotional tension between tenderness and rage. I used a palette of saturated and muted colors to express these contrasts: the deep reds symbolize rage and the pale blues reflect tenderness. The tension is heightened by the chaotic spark pattern clashing against the soft glitch pattern, particularly in the central rows where they collide, representing a struggle for clarity amid noise. The quiet channel's presence allows space for contemplation, while broken pixels introduce intentional disruptions, reflecting the idea of guilt and forgiveness. The dominance of darker hues asserts a sense of pressure, emphasizing the collision of emotions, while lighter areas create moments of respite.</desc>
