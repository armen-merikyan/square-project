<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension's Embrace</title>
  <desc id="desc">This artwork captures the emotional dance between longing and resolve through a contrast between dark, muted colors and gentle pastels. The palette of rain blue, lavender gray, and soft cyan evokes a melancholic yet hopeful atmosphere. Using a central dense area of deep blues and plums, with breaks of lighter colors at the outer edges creates a layered effect that suggests a struggle between chaos and order. The collision of the longing 'hinge' patterns in dense clusters meets the structured resolve 'stripes' at the center, producing an engaging rhythm that reflects the emotional story of depth and intimacy at play.</desc>
