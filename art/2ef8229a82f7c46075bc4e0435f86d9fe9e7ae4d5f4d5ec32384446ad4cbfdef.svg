<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Threads</title>
  <desc id="desc">The emotional tone reflects a struggle between longing and resolve, using a palette of clean white, ice blue, ink black, violet gray, and warning orange. White serves as the negative space to symbolize emptiness and longing, while ice blue and violet gray create a calming background. The ink black represents strength and resolve, occupying the center where longing meets determination. The warning orange punctuates the piece, suggesting urgency and repair amidst breaks, echoing the notion of a broken mirror reflecting inner conflict. The collision occurs centrally, where the steady pulse of resolve disrupts the flowing ripples of longing.</desc>
