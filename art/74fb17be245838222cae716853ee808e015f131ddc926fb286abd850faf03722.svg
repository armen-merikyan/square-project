<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This piece embodies the emotional tension between quietness and pressure by using a palette that juxtaposes muted tones with occasional sharper accents. The left side reflects quiet (dust gray and faint peach), representing a soft horizon, while the right side, with darker shades of navy and compressed red, symbolizes the weight of pressure. The diagonal flow indicates a rise in intensity from left to right, where collisions occur as the colors transition, shattering the calm into a more chaotic state. Broken pixels add intentional disruption, enhancing the narrative of tension and contrast throughout the piece.</desc>
