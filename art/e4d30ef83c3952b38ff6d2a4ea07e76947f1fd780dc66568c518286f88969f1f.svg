<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Gratitude</title>
  <desc id="desc">This artwork embodies the emotional contrast between envy and gratitude through the juxtaposition of dark and light colors. The palette is dense with black and dark violet to reflect the weight of envy, while soft gold and pale green represent the lightness of gratitude. The chaotic arrangement of color—zigzagged and layered—shows the dual tension between heavy, muted fields and bright interruptions. Centering the lighter tones creates a focal point, while the asymmetry hints at the struggle of finding balance in conflicting emotions. The slight imperfections mirror life's inherent irregularities, suggesting that even amid positivity, shades of envy can seep through.</desc>
