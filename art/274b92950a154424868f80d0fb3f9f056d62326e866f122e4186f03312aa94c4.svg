<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">The artwork embodies the push and pull between relief and dread, reflecting the spectrum of emotions through contrasting color placement. The use of dark black and electric blue creates a heavy, oppressive atmosphere, while lime and magenta introduce bright interruptions that symbolize moments of relief. The density toward the top conveys weight, while the remaining negative space reflects emptiness, inviting contemplation. The asymmetrical arrangement of colors reflects the inherent imbalance in the emotional state described in the seed, positioning relief as an unexpected spark amidst the surrounding dread.</desc>
