<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Trust and Suspicion in Collision</title>
  <desc id="desc">This composition captures the emotional tension between trust and suspicion through a diagonal spread of colors. The moss green and bone white indicate trust, creating an open, warm field that contrasts with the rust and stone gray, which introduce tension and suspicion. The use of a grid pattern (trust) collides with the ladder pattern (suspicion), signifying a visual dialogue of stability against unease. Broken pixels disrupt the grid, echoing the fragility within apparent trust. The diagonal flow mimics a journey from a safe corner into an uncertain space, allowing the viewer to feel the push and pull of emotions.</desc>
