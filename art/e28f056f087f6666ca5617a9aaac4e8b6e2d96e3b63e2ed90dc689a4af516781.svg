<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Tension</title>
  <desc id="desc">The emotional tone reflects a push and pull between density and quiet spaces, using contrasting colors to evoke feelings of envy (represented by the dark blues and blacks) and gratitude (suggested through the softer lighter tones of cyan and white). The palette emphasizes loneliness with dark colors battling lighter, symbolizing the tension of conflicting emotions. The layout presents an argument grid where orderly stripes on one side clash with chaotic teeth patterns on the other. The interruption of space creates visual tension, suggesting unresolved feelings and emotional collisions throughout the piece.</desc>
