<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Flame and Dust</title>
  <desc id="desc">This composition embodies the emotional tension between vitality (spark) and decay (ash). The palette of black, dark violet, soft gold, and pale green reflects this duality, where soft gold symbolizes fleeting moments of brilliance against the somber permanence of black and dark violet. The primary collision occurs where vibrant gold ripples meet the shattered remains of gray, representing a battle of identities. The layout flows diagonally with jagged edges that narrate the struggle between preservation and erasure, allowing the eye to traverse between quiet and density, invoking a sense of resilience amidst fragility.</desc>
