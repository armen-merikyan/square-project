<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Flame</title>
  <desc id="desc">This composition captures the tension between loneliness and connection through a stark contrast that balances warm and cool tones. The top half features muted purples and deep blues to evoke a sense of isolation, interrupted by faint, broken pixels that suggest shattered memories. In contrast, the lower half introduces vibrant oranges and yellows that represent connection but maintain a sense of fragmentation with strategically placed dark colors. The edge on the right is weighted, creating an impression of convolution, while the flow suggests an unraveling spiral that emphasizes movement through darkness into light. The negative space is deliberately left around the central shapes, enhancing the feeling of emptiness, thus reinforcing the core emotional juxtaposition of loneliness against connection.</desc>
