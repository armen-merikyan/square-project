<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece contrasts vulnerability with strength, showcasing a pale core surrounded by deeper, more assertive colors to encapsulate protection versus exposure. The selected colors from the 'joy_grief' palette reflect the emotional tussle between warmth and coolness, employing yellows and oranges as buoyant yet delicate tones, while deep blue and muted purple ground the composition, symbolizing weight and resilience. The interplay between the warm inner colors that represent hope and the cooler border colors signify an emotional barrier or frame. Broken pixels create an imperfect edge, amplifying the tension leading to both vulnerability and strength. The collision of warm and cool colors primarily occurs in the center, where the lighter colors appear fragile against the stronger, darker surroundings, illustrating the fragility of hope against the weight of reality.</desc>
