<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects a delicate balance between vulnerability and strength, expressed through an interplay of soft and dense colors. The selected palette, featuring shelter green and pale skin, evokes warmth and safety, while cold white and open blue communicate exposure and fragility. The main collision occurs at the center, representing a vulnerable core surrounded by protective yet heavy tones at the edges, creating both tension and sanctuary. The zigzag flow and scattered repair layout symbolize the journey of resilience and the ongoing struggle between safety and vulnerability. Each broken pixel intentionally disrupts the strong color patterns, serving as scars yet essential marks of experience.</desc>
