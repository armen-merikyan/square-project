  <title id="title">Shelter in the Open</title>
  <desc id="desc">This artwork explores the tension between safety and exposure, utilizing a palette that balances gentle greens and browns with stark whites and pale skin tones. The central area, representing vulnerability, is framed by darker edges that convey protection yet allow for subtle interruptions. The patterns of constellations and stairs create a sense of a spiral flow, highlighting the push and pull between the two emotional tones. The main collision occurs vertically, accentuated by a broken pixel on one side to symbolize imperfection amidst the struggle for balance.</desc>
