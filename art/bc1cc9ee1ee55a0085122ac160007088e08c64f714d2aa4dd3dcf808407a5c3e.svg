<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">This piece captures the emotional tone of 'envy' and 'gratitude' through a tension between dark and light colors. The palette, consisting of deep reds, blacks, and pale blues, reflects the internal struggle and balance between overwhelming pressure and quiet reflection. The central pattern resembles a maze, symbolizing the complexity of emotions, while jagged edges introduce a sense of disturbance. The placement of the colors creates a clash of intensity, particularly where the reds meet the blacks, suggesting moments of collision amidst the calm. Between these strong contrasts, spaces are intentionally left, evoking feelings of pause and contemplation, a release from emotional chaos.</desc>
