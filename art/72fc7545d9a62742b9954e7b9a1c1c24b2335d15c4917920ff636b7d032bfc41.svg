<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">The composition embodies the emotional conflict of defiance versus submission through the juxtaposition of hard interruptions and soft collapses. The palette, drawn from 'gratitude_envy', features vibrant greens and muted tones to illustrate the tension between these emotions. The bright 'acid_green' and 'honey_gold' disrupt the muted fields of 'deep_olive' and 'cream', creating a sense of collision at the center, symbolizing the struggle. The arrangement suggests a spiral motion inward, representing the inward reflection of these emotions, while areas of negative space emphasize the tension and invite contemplation.</desc>
