<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Beneath the Surface</title>
  <desc id="desc">This piece embodies the emotional tension between fear and hope through contrasting color placements. The black (#000000) and dark violet (#5B2E91) define the fear element with their dense, dark hues conveying jagged edges and a suffocating atmosphere. In contrast, the soft gold (#E1C699) and pale green (#A9D5A8) evoke a sense of rising hope, creating a visual spark against the darker central hues. The split vertical flow divides the canvas, with fear emanating from the edges and hope presenting an upward burst in the center. This arrangement uses broken pixels to suggest imperfection, guiding the viewer’s gaze through a maze-like structure on one side while providing a gentle, uplifting rhythm on the other, simulating a crosshatch dynamic. The negative space allows a moment of quiet amidst the chaos, reinforcing the unresolved emotional battle.</desc>
