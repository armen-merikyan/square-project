<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Silent Conflict</title>
  <desc id="desc">The emotional tone reflects the tension between desire (represented by saturated, warm colors) and emptiness (represented by muted, cooler colors). The chosen palette, which includes hot coral and blood orange against hollow blue and charcoal, emphasizes the stark contrast of yearning versus absence. The main collision occurs at the center where jagged and shattering patterns blend into the quiet frame, creating a visual pulse of intensity interrupted by space. This layout captures the essence of being drawn toward something significant while facing barriers.</desc>
