  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone balances vulnerability and strength, leveraging a palette that contrasts warm browns and greens for safety with pale blues and whites for exposure. The center features lighter hues suggesting vulnerability, while the edges use dense, earthy colors for a grounding strength. The play between the contrasting patterns of the glitch and braid reflects the struggle for control, with a collision at the grid’s center, creating tension and a narrative of conflict.</desc>
