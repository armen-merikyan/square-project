<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs. Edges</title>
  <desc id="desc">The emotional tone of this artwork embodies the tension between loneliness and connection, depicted through a central burst of deep colors that evoke warmth and intimacy, contrasted with cooler, distant hues that represent isolation. The palette of reds, pinks, and darker maroons reflects the themes of love and betrayal, while grays serve as emotional buffers, portraying the contrast between inside and outside feelings. The composition plays with hard edges, where the dense center is met by fragmented, broken dot patterns at the edges, symbolizing the fragility of connection amidst an overwhelming sense of solitude. This dynamic collision urges the viewer to contemplate the push and pull of emotional experiences.</desc>
