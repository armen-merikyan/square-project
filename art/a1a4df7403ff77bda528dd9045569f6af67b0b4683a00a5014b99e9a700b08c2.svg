<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Currents</title>
  <desc id="desc">This piece conveys the tension between restlessness and peace through contrasting colors and patterns. The palette of shelter green, warm brown, pale skin, cold white, and open blue creates a balance of warmth and coolness. The arrangement features stacked colors representing peaceful moments interrupted by cracks signifying restlessness, with the main collision occurring diagonally across the square, fostering a sense of movement and instability. The negative space complements this tension, enhancing the emotional narrative of seeking calm while wrestling with a restless spirit.</desc>
