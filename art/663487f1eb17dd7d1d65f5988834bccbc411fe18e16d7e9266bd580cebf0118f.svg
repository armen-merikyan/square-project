  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece embodies the emotional tension between joy and grief, using a palette of warm yellows and oranges paired with deep blues and muted purples to evoke a sense of warmth in contrast to heaviness. The placement of colors creates a sense of symmetry that is disrupted by broken pixel placements, representing the conflict between order and chaos. The pulse and rising signal layout reflect movement and aspiration, while allowing negative space for breath and reflection.</desc>
