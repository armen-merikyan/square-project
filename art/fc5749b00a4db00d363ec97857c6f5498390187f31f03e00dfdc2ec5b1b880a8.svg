<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This artwork captures the emotional tension between 'quiet' and 'pressure.' The palette features muted tones like off-white and dust gray representing quietude, juxtaposed with the sharp contrasts of compressed red and dark navy that convey density and weight. The main collision occurs diagonally across the square, where the loose, mirrored patterns of quiet soft hues clash with the structured, channel-like elements of pressure, illustrating the struggle between calm and chaos. The arrangement and subtle 'broken pixels' distort the symmetry, creating a narrative of fragmentation and unexpected beauty.</desc>
