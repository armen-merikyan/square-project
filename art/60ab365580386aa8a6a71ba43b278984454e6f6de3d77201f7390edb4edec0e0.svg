<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Balance</title>
  <desc id="desc">The emotional tone of this piece reflects the push-pull dynamic between envy and gratitude. The 'ancient_fire' palette signifies the warmth of gratitude with burnt orange and gold, contrasted sharply by the darkness of charcoal and dark red representing envy. The layout divides the composition into two distinct emotional landscapes, with the left side suggesting a spark of envy through jagged patterns, while the right embodies a focal point of gratitude in a targeted arrangement. The central square is heaviest with charcoal, embodying the tension at the heart of the contrast. Broken pixels introduce imperfection, reflecting the messy reality of human emotions, while the negative space provides breathing room, symbolizing the relief brought by gratitude amidst envy.</desc>
