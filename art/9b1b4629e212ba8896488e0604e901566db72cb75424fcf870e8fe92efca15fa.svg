<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This piece captures the emotional conflict between restlessness and peace, where warm colors like red and pink suggest agitation, clashing with the cooler, muted grays and dark maroons representing tranquility. The central area showcases a broken line pattern, symbolizing the disruption of peace, surrounded by a crack pattern indicating ongoing tension. The main collision occurs at the center, with a warm color clash against cool tones. The palette reflects a sense of love and betrayal, reinforcing the inner turmoil of the piece. The layout prioritizes a small, central shape with surrounding pressure, allowing for a densifying visual narrative while maintaining essential negative space.</desc>
