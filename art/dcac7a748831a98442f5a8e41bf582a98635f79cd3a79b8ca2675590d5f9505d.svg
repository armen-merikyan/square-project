<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">The emotional tone balances tightly compressed areas with expansive quiet spaces, evoking both pressure and release. The palette features a blend of muted tones like dust gray and dark navy contrasted sharply with sparks of compressed red, suggesting tension against calm. The main collision occurs diagonally, where hard edges of color disrupt soft scars, symbolizing the interplay between effort and serenity. The seed's abstract concepts translate into a rising signal-like flow, embodying hope emerging from density.</desc>
