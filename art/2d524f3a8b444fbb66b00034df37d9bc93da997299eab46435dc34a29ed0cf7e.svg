  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone captures the tension between calm and rage through contrasting colors—cool blues representing containment and vibrant reds illustrating overflow. The interplay suggests a battle of forces where calm attempts to envelop chaotic energy. The central dense pattern illustrates that conflict directly, spilling over towards the edges where softer blues try to reign in the heat, creating a visual echo of contending emotions.</desc>
