<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">The artwork conveys a tension between lightness and heaviness, using a palette of navy, black, and dim cyan to reflect the emotional contrast of relief and dread. The central placement of bright colors interrupts the surrounding dark tones, suggesting a struggle against weight. This abstract pattern illustrates echoes of the 'empty room' layout, with areas of negative space that enhance the feeling of isolation and potential release. The flow is intentionally pulse-like, reflecting the rhythmic push and pull of contrasting emotions.</desc>
