  <title id="title">Fragmented Heartbeat</title>
  <desc id="desc">The emotional tone reflects the tension between love and betrayal, encapsulated in a contrast of warm and muted colors. The palette blends warm pinks and reds, symbolizing love, while dark grays and maroons introduce the cold bite of betrayal. The layout creates an argument grid where broken dots and stripes collide in an unresolved dance, suggesting a split heart that oscillates between fullness and emptiness. The broken pixels add to the feeling of imperfection, making the space feel alive yet fractured, capturing the essence of a conflicted heart.</desc>
