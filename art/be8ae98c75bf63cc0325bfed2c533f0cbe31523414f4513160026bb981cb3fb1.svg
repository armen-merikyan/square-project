<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Shadows and Light</title>
  <desc id="desc">This piece explores the duality of fear and hope. The upper rows, reflecting fear, utilize dark colors with jagged patterns representing threats, creating pressure and density. The lower rows, signifying hope, employ lighter colors with softer stripes, symbolizing upward movement and lightness. The contrast between the dark and the light serves as a narrative of struggle and resolution, where the central 'split' feels like an ongoing battle between contrasting emotions.</desc>
