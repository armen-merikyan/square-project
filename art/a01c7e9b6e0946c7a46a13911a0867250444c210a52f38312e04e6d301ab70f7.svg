  <title id="title">Ebb and Flow</title>
  <desc id="desc">This artwork captures the emotional dichotomy of joy and grief through a structured upper half and a chaotic lower half. The warm tones of yellow and orange juxtapose the cool deep blue and muted purple, representing joy rising against the weight of grief. The zigzag pattern introduces interruptions, while the burned edges suggest imperfection and complexity. The structured top suggests hope; the chaotic bottom speaks to sadness, creating a compelling visual narrative.</desc>
