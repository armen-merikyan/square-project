<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Harmony</title>
  <desc id="desc">This artwork captures the emotional tension between restlessness and peace through a jagged structure of contrasting colors. The palette, 'mourning_renewal', combines a deep blue and mourning black as dominant fields representing the weight of restlessness, while pale yellow and new leaf provide bright accents for moments of peace. The main collision occurs diagonally from the center, where the lighter colors disrupt the heavier tones, suggesting a struggle for balance amidst an overwhelming density. The arrangement of broken pixels introduces intentional imperfections, echoing the chaos of memory and the movement of time, creating a visual narrative of complexity and unresolved emotion.</desc>
