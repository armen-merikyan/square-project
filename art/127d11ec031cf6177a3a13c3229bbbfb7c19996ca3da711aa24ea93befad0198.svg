<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall: Dynamic Tension</title>
  <desc id="desc">The emotional tone of this composition contrasts joy and grief, represented by vibrant warm tones against cool, muted hues. The palette includes bright yellows and oranges for joy, signifying openness and expansion, while deeper blues and purples evoke a sense of droop and heaviness. This creates a visual tension where the left side contains brighter colors forming crack patterns of joy, while the right side is more subdued, illustrated through dotted patterns of grief. The layout emphasizes resurrection versus collapse with hard edges to convey tension amidst the calm. The collision happens prominently at the center, suggesting a push and pull between these emotional states. The arrangement follows a split vertical design, with significant negative space to enhance the feeling of solitude in grief, balanced by the chaos of joy on the opposite side.</desc>
