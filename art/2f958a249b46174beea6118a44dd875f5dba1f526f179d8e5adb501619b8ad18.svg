<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure in Shelter</title>
  <desc id="desc">This composition explores the emotional dynamic between safety and exposure, symbolizing an inward conflict of vulnerability versus protection. The overall palette combines earthy greens and browns signifying shelter with lighter, cooler hues representing exposure. The split_screen pattern reflects the emotional divide. The main collision occurs at the center, where the soft green shades of safety clash with pale skin tones, creating tension and dialogue between the two themes. The broken pixels add an intentional imperfection, suggesting wear and scars that accompany the push and pull of emotional states.</desc>
