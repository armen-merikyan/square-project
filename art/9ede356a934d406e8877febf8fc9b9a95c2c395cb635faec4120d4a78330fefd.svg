  <title id="title">Fractured Haven</title>
  <desc id="desc">This piece explores the emotional tension between safety and exposure. The color palette blends soft greens and warm browns to suggest protective elements, contrasting with pale and cold hues that signify exposure. The left diagonal, filled with soft greens and browns, represents shelter, while the right side features cold whites and blues, suggesting a sense of raw exposure. The shatter pattern amplifies this conflict, with broken pixels creating intentional disruptions, emphasizing the fragile border between comfort and vulnerability.</desc>
