<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece captures the emotional tension of desire and restraint through a stark contrast of saturated and muted colors. The palette of 'red oxide' and 'blackened plum' portrays the intensity of desire, while 'muted cream' and 'iron gray' signify restraint. The checker pattern at the center and stepwell framing pulse with layers of emotional depth. The dominant saturated colors collide with muted tones, creating focal points of warmth that cycle around the quiet edges, culminating in a dynamic composition that illustrates a constant push and pull, framed neatly by the double outline.</desc>
