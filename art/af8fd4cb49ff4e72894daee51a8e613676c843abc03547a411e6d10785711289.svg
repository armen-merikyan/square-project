<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erosion of Resilience</title>
  <desc id="desc">This artwork explores the duality of 'spark' and 'ash' through a muted yet radiant palette, invoking emotions of fragility and resilience. The color choices of moss green and rust suggest life struggling against decay, while the bone white introduces moments of clarity amidst chaos. The layout is dominated centrally by jagged edges of dense colors, symbolizing the struggle of memory against the erasure of past, while the periphery remains intentionally quieter, creating a contrast of pressure and breath. Patterns collide in the center, where the 'braid' of sparks emanates from the solid cross of ash, disrupted by intentional broken pixels to echo imperfections and memories that linger. The flow from bottom to top reflects the struggle towards resilience, building to a peak before gently receding, establishing a sense of motion despite the weight of struggle.</desc>
