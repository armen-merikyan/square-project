<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Echoes</title>
  <desc id="desc">The emotional tone captures the pull between longing and resolve, with a palette that contrasts quiet strength and warm beckoning. Moss green and stone gray provide a grounded foundation while rust and bone white evoke the unsettled spirit of yearning. The main collision occurs at the center, where dense stripes of longing intersect with defined frames of resolve, creating an interplay of pressure and release that reflects both intimacy and distance. The broken pixels scatter deliberately, introducing intentional imperfections that reflect the nuances of emotional experience.</desc>
