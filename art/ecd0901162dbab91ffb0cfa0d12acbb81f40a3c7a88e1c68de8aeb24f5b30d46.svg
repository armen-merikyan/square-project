<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Pulse</title>
  <desc id="desc">The emotional tone oscillates between the clarity of a signal and the chaos of noise. The selected palette merges vibrant signal green and electric blue with more subdued static gray and dead black, representing both clarity and interference. The collision occurs centrally, where the bright signal patterns seem to struggle against the encroaching noise effects, crafted with a checker-style noise pattern layered beneath flame-like signal sweeps. This arrangement reflects the challenge of maintaining clear communication amid distractions, embodying the given seed's themes of exposure and memory.</desc>
