<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone contrasts restlessness with peace, manifesting as a struggle between chaotic movement and tranquil clarity. I selected a palette of clean white, ice blue, ink black, violet gray, and warning orange to represent the dynamic interplay between calm and tension. The use of warm orange serves as a highlight that disrupts the cooler, more subdued colors, creating a collision in the center of the composition, where the most intense colors are placed. The layout features two pulsating centers that signify the push and pull of conflicting emotions, while broken pixels add intentional disruptions, mirroring the nature of memories and the sensation of motion. The pattern of alternating checker and ladder designs illustrates the stark contrast between serenity and anxiety, leading to a complex dialogue through color and form.</desc>
