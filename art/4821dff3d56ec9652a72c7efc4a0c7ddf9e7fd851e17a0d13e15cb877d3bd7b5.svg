<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This artwork captures the tension between tenderness and rage by juxtaposing saturated reds with muted blacks and pale blues. The corner invasion layout begins with an explosive red that disrupts the calmer, softer patterns of pale blue. The resulting echoes of color create a rhythmic conflict, where the forms collide and intertwine, emphasizing the struggle between overwhelming rage and the whispers of tenderness. These elements reflect feelings of guilt and forgiveness in the overall pattern of chaos and calm, making the viewer engage deeply with the emotional landscape.</desc>
