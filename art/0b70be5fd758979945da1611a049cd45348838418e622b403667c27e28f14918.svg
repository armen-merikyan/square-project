  <title id="title">Ebb and Flow of Trust</title>
  <desc id="desc">This artwork reflects the emotional tension between trust and suspicion through a warm palette of burnt orange and gold against darker tones like charcoal and dark red. The split vertical layout emphasizes this contrast, with a dense center surrounded by soft glowing edges symbolizing moments of trust overshadowed by suspicion. The use of braids and dots visually represents these emotional patterns intertwining and colliding, creating a dynamic flow that mirrors the contrasting themes present in the seed.</desc>
