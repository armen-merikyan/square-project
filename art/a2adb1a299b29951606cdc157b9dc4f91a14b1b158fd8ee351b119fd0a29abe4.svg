<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The artwork captures the emotional tensions between vulnerability and strength. The palette choice of cosmic indigo and void black represents deep, meditative spaces that create an aura of protection, while accents of cold gold and star white highlight areas of exposure. The collision occurs in the center, where the pattern shifts from a dense barcode of strength to an open stack of vulnerability, illustrating a conflict between stability and fragility. This dynamic interplay evokes a sense of flowing tension—reflecting the source seed's themes of strength vs. vulnerability.</desc>
