<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs. Chaos</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of trust and suspicion through the use of a structured versus chaotic arrangement. The upper rows represent trust with a smooth, rain-like pattern using tranquil colors from the 'broken_memory' palette, while the bottom rows convey suspicion through jagged, noisy placements that disrupt the order. The chosen palette emphasizes earth tones that evoke warmth and nostalgia, contrasting against fragments of disarray that suggest uncertainty. The piece deliberately utilizes negative space to enhance feelings of release amidst pressure, echoed in the broken pixel placements that create a visual tension on the canvas, perfectly aligning with the emotional seed of collision and contrast.</desc>
