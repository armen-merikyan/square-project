<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Yearnings</title>
  <desc id="desc">This abstract piece explores the emotional contrast of emptiness and desire, illustrated through layered colors and patterns. The palette, comprising pinks and deep maroons, suggests warmth battling against the cool gray, creating a visual representation of tensions and conflicts. The transition from darker colors at the base to lighter ones above symbolizes the rise of desire, while the flame pattern signifies the chaotic noise of suppressed emotions. Broken pixels add an element of imperfection, emphasizing the shattered nature of feelings, and leaving ample negative space enhances the sense of loneliness.</desc>
