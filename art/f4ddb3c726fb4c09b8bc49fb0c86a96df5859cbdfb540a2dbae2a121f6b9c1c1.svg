<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Distortion</title>
  <desc id="desc">The emotional tone captured here is the juxtaposition of clarity and confusion. The palette, rooted in deep navy and black, juxtaposes against vibrant dim cyan and stark white, creating a stark contrast that embodies the tension between order and chaos. The thick outline suggested by clashing colors at the edges hints at defined boundaries yet reveals subtle interruptions of broken pixels that express imperfections. The arrangement flows outward, reminiscent of pixels falling away yet rising in bursts of energy, symbolizing struggle and resolution. This layout balances calmness at the center with chaotic edges, inviting the viewer into a layered emotional experience that challenges perceptions of symmetry, invoking both clarity and confusion.</desc>
