<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone of this piece contrasts softness and severity, represented through a palette of powder pink and carbon black. The main collision occurs in the center with warm whites creating an open space surrounded by darker tones, symbolizing the tension between guilt and forgiveness. The spiral layout invokes a rhythmic movement from dark to light, reflecting the heart's pulse and battles between heavy emotions, while broken pixels introduce intentional imperfection. This arrangement embodies the complex dialogue of human emotions inherent in the seed, creating an interplay of presence and absence throughout the grid.</desc>
