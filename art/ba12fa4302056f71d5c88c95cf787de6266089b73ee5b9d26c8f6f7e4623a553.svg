<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Static Pulse</title>
  <desc id="desc">The emotional tone of this piece explores the persistent struggle between clarity (signal) and chaos (noise). The palette consists of 'signal green' for clarity, 'electric blue' for vibrancy, 'static gray' representing interference, 'dead black' evoking depth, and 'hot magenta' for stark contrast. The main collision occurs in the center where the saturated colors intermix, representing the 'overfilled center', while the outer edges fade into static gray, signifying the chaotic noise. The broken pixels intentionally disrupt the flow, creating an irregular pattern that resonates with the emotional theme of discord and the fight for communication within chaos.</desc>
