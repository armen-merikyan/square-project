<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Duality</title>
  <desc id="desc">This piece embodies the emotional tension between joy and grief, using oranges and yellows to convey joy and deep blues and muted purples to express grief. The contrast of bright, rounded patterns representing joy against the heavy, cross-hatched fields of grief creates a dynamic struggle. The split-screen layout mirrors order and chaos, while broken edges introduce an element of imperfection, a constant reminder that both emotions exist simultaneously. Negative space interrupts density, capturing the essence of moments caught between overwhelming feelings and quiet introspection.</desc>
