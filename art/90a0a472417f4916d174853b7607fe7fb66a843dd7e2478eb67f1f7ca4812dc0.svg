<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Connections</title>
  <desc id="desc">The emotional tone contrasts loneliness with connection, utilizing a palette of deep blacks, dark violets, soft golds, and pale greens to accentuate the tension between the two states. The left side features a grid pattern reflecting loneliness through tight, enclosed spaces, contrasted against the right's radial bursts symbolizing connection. The soft edges create a sense of introspection while introducing a feeling of quiet exposure that invites viewer engagement. The collision occurs where the dense grids meet the flowing radial patterns, capturing a dynamic conversation between isolation and togetherness.</desc>
