<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Echoes</title>
  <desc id="desc">This piece explores the emotional tension between joy and grief, captured through a vibrant palette of yellow and orange for joy, contrasted against deep blue and muted purple for grief. The split screen layout visually distinguishes the two emotions but uses a stair-step pattern to suggest an interplay, creating a paradox of order vs chaos. The central seed of emotion 'machine' manifests through hard edges and interrupted patterns, enhancing the feeling of being threatened yet safe. Broken pixels introduce an element of imperfection, making the artwork feel dynamic and reflective of human experience.</desc>
