<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Vortex of Contraction</title>
  <desc id="desc">The emotional tone reveals a clash between defiance and submission, illustrated through a swirling inward spiral that contrasts dense and empty fields. The 'awe-terrify' palette, featuring deep teal and cosmic indigo, emphasizes tension and shadow, while bright accents of star white create moments of sharp interruption. The spiral motif moves from a concentrated, dark center outward to a lighter periphery, embodying defiance against a submission to pattern. Broken pixels disrupt the spatial continuity, suggesting imperfection and resistance, enhancing the central struggle between light and dark.</desc>
