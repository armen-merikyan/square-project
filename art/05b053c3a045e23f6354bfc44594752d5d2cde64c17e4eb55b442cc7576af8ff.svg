<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tide of Tension</title>
  <desc id="desc">This composition explores the emotional dichotomy between quietude and pressure, utilizing a palette that blends muted tones with sharp contrasts. The dark navy and compressed red create a dense, weighted pressure in the lower half, while the off-white and faint peach offer a soft, almost whispering presence in the upper diagonal. This arrangement reflects the idea of 'pressure vs release,' as denser sections command presence at the base, juxtaposed against lighter, airy spaces. Broken pixels disrupt the symmetry, mirroring the tension of clarity and confusion, encouraging the viewer to explore the flow and rhythm across the square's surface.</desc>
