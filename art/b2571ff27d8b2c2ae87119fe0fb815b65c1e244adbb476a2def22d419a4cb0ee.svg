<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Worlds</title>
  <desc id="desc">This artwork embodies the emotional tensions of 'defiance' and 'submission'. The palette of pale mint and soft sky contrasts with storm gray and near black, visually representing the battle between lightness and heaviness. The central area is dominated by a lattice pattern in softer colors, suggesting defiance, while the edges are marked with barcodes in darker tones, indicating submission. The broken pixels are intentionally placed to create disruptions, echoing the theme of conflict and transition between states, and at least 10% negative space reinforces the feeling of tension and imbalance.</desc>
