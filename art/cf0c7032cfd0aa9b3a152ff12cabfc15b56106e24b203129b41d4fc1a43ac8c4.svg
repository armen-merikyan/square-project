<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This artwork explores the tension between control and surrender, depicted through a dominant frame of deep Black to establish a sense of security, encasing the softer, more vibrant interior. The colors transition from quiet static Gray representing containment to the lively Electric Blue and Signal Green suggesting bursts of emotion. The collision occurs at the center where the luminous colors 'spill' into the darker edges, embodying the struggle between pressure and release, giving an impression of gentle descent and tension breaking outwards. The stutter step pattern echoes both feelings—a measured rhythm interrupted by the vibrant interior.</desc>
