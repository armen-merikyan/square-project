<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmony in Tension</title>
  <desc id="desc">The artwork captures the emotional duality of restlessness and peace. The palette combines moss green and bone white to evoke calmness against rust and stone gray, representing turmoil. The edges are intentionally jagged to remind of instability while balancing negative space. The vibrant small gold serves as an accent, creating dynamic contrast amidst solidity, emphasizing the collision between the restless and peaceful emotions. The layout, featuring two pulses, draws the eye diagonally, suggesting a motion that is perpetual yet stilted.</desc>
