<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This piece captures the tension between joy and grief through a visual dialogue of color and pattern. The palette mixes bright yellows and oranges to represent joy against deep blues and muted purples symbolizing grief. This contrast is accentuated by a checker pattern that emulates grief's heaviness, while bright crack-like bursts suggest moments of joy erupting through. The arrangement intentionally leaves negative space to signify the unresolved emotional distances, creating a visual argument between order and chaos. The burned edges imply a sense of damage or history, while the zigzag flow indicates a struggle between the competing emotions.</desc>
