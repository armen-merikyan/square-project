<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">This piece embodies the emotional tension between fear and hope, structured with a split vertical layout representing contrasting feelings. The outer layer, dominated by deep blacks and dark violets, illustrates the encroachment of fear’s jagged essence through an asymmetrical pattern—spark-like glyphs creating noise and pressure. The inner 4x4 grid, however, pivots towards hope with soft golden and pale green hues in a checkerboard layout that evokes lightness, representing a transition from darkness. The main contrast is created where the solid darkness collides with bursts of light, illustrating an ongoing struggle between oppressive weight and the promise of upward lift. The use of broken pixels introduces imperfection, reinforcing the unpredictable nature of emotions.</desc>
