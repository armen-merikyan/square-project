<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Signals</title>
  <desc id="desc">This piece represents the emotional dichotomy of rage and calm through contrasting patterns and colors. The left side employs a cooler palette of pale blues and whites to symbolize calmness, while the right side bursts with reds and dark hues, embodying rage. The clean dot patterns on the calm side maintain tranquility, while the jagged shards on the rage side create tension and chaos. This interplay serves to reflect the emotional collision between order and disorder, embodying the themes evoked in the seed.</desc>
