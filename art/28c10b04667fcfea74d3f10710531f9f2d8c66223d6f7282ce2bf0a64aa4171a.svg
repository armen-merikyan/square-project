<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Tension</title>
  <desc id="desc">This piece presents an emotional tone of tension between softness and severity, utilizing a palette of powder pink and sharp crimson against deep shades of black and gray to emphasize divergence. The top half exhibits a pattern of 'checker', which symbolizes softness through warmer tones, while the bottom half reveals 'scar' motif, representing severity with harsher contrasts. The main collision occurs in the middle, where soft textures create an echo against sharper boundaries, reflecting the intricate balance of forgiveness and guilt. The design aims to explore how proximity and distance in emotion can coexist within a confined space.</desc>
