<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The composition embodies the emotional duality of 'rage' and 'calm.' The palette consists of bold reds and stark blacks for aggression, juxtaposed with soft pale blues and whites for tranquility. The main contrast, a collision of sharp red islands piercing through a calm halo of pale blue, is centralized, creating an intense focal point. The placement reflects tension, where contained color bursts disrupt quiet fields, symbolizing the struggle between calmness and uncontrolled rage. The jagged interruptions create a sense of energy that hints at machine-like precision and emotional volatility.</desc>
