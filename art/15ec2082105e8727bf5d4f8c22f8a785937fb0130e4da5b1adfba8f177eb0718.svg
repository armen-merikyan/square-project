<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Disrupted Echoes</title>
  <desc id="desc">This artwork captures the emotional tension between clarity and chaos. The palette features dark navy and black as the foundation, representing noise and static, contrasted with bright white and dim cyan, symbolizing signal and moments of clarity. The collision occurs diagonally, with the pulse of light cutting across the canvas, evoking a feeling of disruption amongst the dense background. The empty spaces in the layout reflect isolation, while broken pixels add intentional disruption, embodying the essence of memory and erasure, creating a discordant yet harmonized piece.</desc>
