<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This piece captures the emotional tension between desire and emptiness through a contrasting palette of warm and cool colors. The warm hues of coral and orange symbolize desire, highlighted by static patterns, while muted charcoal and hollow blue signify the emptiness that acts as a boundary. The main collision occurs diagonally across the canvas, where the patterns meet and disrupt each other, creating an emotional dynamic. The intentional use of broken pixels adds imperfection, reinforcing the struggle between the competing emotions. Negative space is maintained to emphasize the tension, creating a visual pull that embodies the overarching theme of hunger against restraint.</desc>
