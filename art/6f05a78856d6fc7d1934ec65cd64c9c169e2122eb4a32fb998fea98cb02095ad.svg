<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Tension</title>
  <desc id="desc">This piece reflects a duality between dread and relief. The top four rows are dominated by deeper blues and muted purples representing dread, creating an oppressive weight that transcends through various shades, while the bottom four rows present brighter yellows and oranges to embody relief and escape, contrasting sharply with the heaviness above. The grid structure of each section emphasizes the stark dichotomy while broken pixels introduce imperfection, echoing the complex emotions within the seed. The asymmetry creates a visual tension, suggesting an unresolved dialogue between the two emotional states.</desc>
