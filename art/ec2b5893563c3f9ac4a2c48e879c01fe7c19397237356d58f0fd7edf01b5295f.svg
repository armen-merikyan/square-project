<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">The emotional tone juxtaposes relief against dread, creating a visual tension through the palette of burnt orange, dark red, charcoal, and gold. The top weight of dark colors embodies dread, while the lighter colors represent flickers of relief. The asymmetric layout emphasizes a tension between order (grid) and chaos (checker) while allowing for negative space, embodying the concept of an empty room's emotional weight. The colliding elements create a rhythm that speaks to fluctuation—thus capturing the essence of the seed in a meticulously abstract pattern.</desc>
