<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Spiral of Tension</title>
  <desc id="desc">The emotional tone emerges from the interplay of defiance and submission, represented through a collage of shattering patterns and spirals that collide dynamically in the center. The chosen palette, 'hunger_restraint', emphasizes tension with warm reds against muted blacks and creams. The main contrast happens in the center with bright shards colliding with subdued circular patterns, symbolizing the struggle between chaos and calm, a spiral structure that suggests both invasion and containment. This arrangement captures the essence of the seed's narrative without resorting to literal imagery.</desc>
