<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inner Turmoil</title>
  <desc id="desc">This abstract piece embodies the emotional tension between defiance and submission. The top half features bold, dark colors representing defiance, with sharp contrasts and jagged patterns that suggest interruption and resilience. The bottom half shifts to muted tones, reflecting submission with soft textures and pulse marks. The gradual transition from dense, intense colors to lighter hues creates a visual rhythm of conflict and surrender, echoing the seed's themes of invasion and pressure. Accented areas of bright yellow cut through the darker palette, highlighting moments of clarity within chaos, synonymous with 'corner sparks' in the seed. The whole square maintains a spiral dynamic, leading the eye inward, while preserving enough negative space to allow for contemplation.</desc>
