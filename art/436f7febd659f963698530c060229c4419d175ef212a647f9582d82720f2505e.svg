<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Amidst Static</title>
  <desc id="desc">The emotional tone reflects the struggle of a readable signal submerged within a chaotic noise field. The chosen palette emphasizes a bright green and electric blue as signals of clarity, while dead black and static gray create dense, overlapping noise. The central pulse manifests at the diagonal, where the clean path of signal meets the disruption of static, embodying the collision of clarity and confusion. This arrangement echoes the dynamics of exposure and shelter, portraying an inviting rhythm interrupted by tension.</desc>
