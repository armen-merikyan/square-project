<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">The emotional tone captures the duality of envy and gratitude as they vie for dominance in a confined space. The palette, inspired by 'ancient_fire', contrasts warm burnt orange and gold with dark red and charcoal, symbolizing warmth and hard edges of emotion. The main collision occurs at the diagonal from the top left (representing envy) to the bottom right (representing gratitude), creating a textured flow that oscillates between calm acceptance and sharp emotion. The broken pixels introduce imperfection, embracing the chaos of emotion’s interplay – bridging the journey from rising hope to falling despair.</desc>
