  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone explores the tension between vulnerability and strength through contrasting color dynamics. The selected palette of ripe green, acid green, honey gold, deep olive, and cream emphasizes a range of emotional states, from softness to anchored resilience. The placement of brighter fields at the center symbolically represents exposure, while muted shades and broken pixels around the edges create an intentional sense of vulnerability. The main collision occurs centrally, where echoes of strength and vulnerability intersect, inviting tension and complex patterns of emotional interplay.</desc>
