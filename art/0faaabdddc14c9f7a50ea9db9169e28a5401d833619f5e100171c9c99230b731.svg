<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Heartstrings</title>
  <desc id="desc">This composition embodies the emotional dichotomy of love and betrayal, using a palette of pinks and reds to symbolize warmth and intimacy juxtaposed against deeper grays and dark maroons representing pain and conflict. The top four rows reflect love through soft, split-screen patterns of warm hues, while the bottom four rows exhibit betrayal through strong stripes of darker colors, creating a stark contrast. This duality reflects the complexity of relationships; the central collision is between the warm and cool tones, creating an emotional push and pull, reminiscent of the tension within the heart. The broken pixels hint at imperfections in love and the fractures caused by betrayal, reinforcing the need for balance between the two emotions.</desc>
