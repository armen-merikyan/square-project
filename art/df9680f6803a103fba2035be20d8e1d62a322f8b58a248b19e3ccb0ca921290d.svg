<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Boundaries</title>
  <desc id="desc">The emotional tone captures the struggle between yearning and confinement. The palette reflects a dichotomy; deep reds and muted creams suggest longing and restraint, while the iron gray and blackened plum create a stark backdrop that enhances the tension. The checker and radial patterns collide, where the bright cluster of warm red oxide punctuates the darker tones, drawing the eye to the center—a representation of desire that fights against the sealed edges. The main collision occurs at the center where warmth meets the coolness of restraint, embodying the push and pull of emotion.</desc>
