<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Light</title>
  <desc id="desc">The emotional tone captures the interplay between fear and hope, represented through a contrasting palette of dark violet and soft gold. The dark colors symbolize fear, creating an oppressive outer edge, while the lighter color represents hope, radiating from the center. The 'straight_vs_curved' contrast is established by sharp, jagged edges in the darkness that buffer the fluid, scattered dots of light, suggesting a battle between rigidity and softness. This composition conveys tension and release, with negative space representing moments of pause amidst chaotic bursts.</desc>
