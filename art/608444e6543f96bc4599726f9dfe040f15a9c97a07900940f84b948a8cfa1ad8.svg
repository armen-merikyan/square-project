<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone draws from the tension between panic and control, reflected in the palette choice of deep blacks and contrasting soft golds, which represent the tumult of feelings. The warm vs. cool contrast enhances the feeling of instability, where the soft gold sparks against the depth of dark violet. Pixels are scattered with intentional brokenness, like shattered edges reflecting moments of discord from the steadiness of the checker pattern, representing control. The falling pixel layout, resembling rain, suggests the emotional fallout of a chaotic mind trying to regain grip. Each row oscillates between density and negativity, creating a visual story of contrast, where calm colors disrupt through punctuated warm hues, reflecting both despair and the need for stability.</desc>
