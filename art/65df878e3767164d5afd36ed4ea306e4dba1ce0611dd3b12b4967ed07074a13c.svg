<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonant Disarray</title>
  <desc id="desc">The emotional tone represents a dynamic clash between structured signals and chaotic noise, with a palette emphasizing bright accents and deep contrasts. The use of vibrant colors like signal green and electric blue against muted backgrounds creates a push-and-pull effect, symbolizing the struggle of a readable pulse through interference. The main collision occurs in the center, where vibrant colors meet darker shades, embodying confusion interspersed with clarity. The broken pixels are strategically placed to reflect intentional disruptions within the composition, signifying scars of static within the coherent rhythm of signals.</desc>
