<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erosion of Control</title>
  <desc id="desc">This artwork embodies the tension between control and surrender, with an emphasis on contrasting densities and the ebb and flow of emotion. The palette of faded gold, storm gray, soft sky, and pale mint evokes a sense of unease juxtaposed with softness. The thick outline provides a contained pressure, while the overflow of colors in the center conveys the theme of surrender. The main collision occurs in the center where dense colors push against softer edges, creating visual dynamism and emotional narrative. The asymmetry in color density reflects the conflict inherent in the seed, revealing a story of emotional fragmentation and gradual release.</desc>
