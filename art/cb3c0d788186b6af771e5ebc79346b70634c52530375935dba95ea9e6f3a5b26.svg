<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonant Contrasts</title>
  <desc id="desc">The emotional tone balances joy and grief, represented by a palette of deep blue and warm oranges. The connection to grief manifests in broken dots on the left side, introducing fragmentation and heaviness, while the right side bursts with bright yellows and oranges, embodying joy's spark-like quality. The descending layout simulates tears or raindrops, framing the dual nature of experience – rising joy meets falling grief. The intersection point sees contrasting colors clash, creating a visual echo of the title's underlying themes of love and betrayal.</desc>
