<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Emotion</title>
  <desc id="desc">The composition captures the tension between defiance and submission through a defined palette of dark maroon, pink, gray, and red, embodying feelings of love and betrayal. The left side, flavored with deep grays and maroons, symbolizes submission's weight, while the right side bursts with vibrant pinks and reds, reflecting the spirited nature of defiance. The contrast cuts vertically down the center, accentuated by intentional 'broken pixels' that disrupt the flow, portraying emotional conflict. Empty spaces between pixels suggest moments of hesitation, generating a push-pull dynamic echoed throughout the community of colors.</desc>
