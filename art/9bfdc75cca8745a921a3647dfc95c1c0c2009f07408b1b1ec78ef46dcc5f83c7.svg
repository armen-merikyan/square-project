<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Resilience</title>
  <desc id="desc">This piece captures the emotional tension between vulnerability and strength through the juxtaposition of sturdy checker patterns and delicate barcodes. The palette, inspired by ancient fire, evokes warmth and intensity, amplifying the contrast. The dark reds and charcoals represent strength, while the lighter golds reflect the fragility of vulnerability. The main collision occurs in the central area where strength begins to overpower the softer edges, illustrating a transition from exposure to safety. Broken pixels introduce intentional imperfections, enhancing the narrative of struggle and resilience.</desc>
