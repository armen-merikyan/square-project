<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Boundary of Emotion</title>
  <desc id="desc">This artwork captures the tension between trust and suspicion through a divided 8x8 grid. The left side, embodying trust, features a threshold pattern marked by warm yellow and orange hues symbolizing openness and warmth. Conversely, the right side represents suspicion with echoes of muted purple and deep blue, suggesting unease and fragmentation. The vertical split emphasizes the clash while the glowing edges provide a sense of pressure and resolution. The main collision occurs around the center, where the patterns interweave, hinting at the complexities of human emotions.</desc>
