<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Light and Shadow</title>
  <desc id="desc">This artwork captures the emotional tension between joy and grief using contrasting colors: bright yellow and orange represent joy, layered against deep blue and muted purple, embodying grief. The central area, dominated by lighter edges, suggests moments of reassurance amidst heaviness. The pattern follows a checker and dot formation, tapping into the essence of joy's spontaneity meeting grief's structure. The stark contrasts and hard edges create collisions of emotional waves, while maintaining a sense of negative space that lets each color resonate independently.</desc>
