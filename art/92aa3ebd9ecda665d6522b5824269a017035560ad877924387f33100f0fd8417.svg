<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition captures the emotional tension between emptiness and desire. The contrasting colors represent desire's warmth and pull, with the hot coral and blood orange making up the dominant mood of longing. The hollow blue provides a backdrop of emptiness, suggesting vast space but is interrupted by the presence of charcoal to frame the edges, symbolizing restraint. The pressure band and stepwell patterns express the dynamics of reaching and containment, with broken pixels adding intentional disruptions, like scars of desire unmet. The collision occurs centrally, where warm colors converge and clash against the cool containment of the hollow blue, illustrating a dance of emotional states.</desc>
