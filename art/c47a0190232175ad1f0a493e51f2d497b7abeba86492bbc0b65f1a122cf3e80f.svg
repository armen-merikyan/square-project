<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotions</title>
  <desc id="desc">This piece captures the emotional tension between joy and grief through contrasting color choices and arrangements. The palette uses deep blue tones to represent grief, contrasted with bright spark-like yellows and oranges that embody joy. The flow is designed from bottom to top, evoking a sense of upward movement and resolution. The stair-step pattern suggests structured progression yet introduces soft edges to allow for emotional nuance. The sharp contrast of the darker colors against vibrant highlights creates a dynamic interplay, embodying both safety and threat within the same frame, achieving a layered complexity without forming literal representations.</desc>
