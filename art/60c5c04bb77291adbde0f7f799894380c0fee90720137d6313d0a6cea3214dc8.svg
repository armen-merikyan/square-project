<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">The emotional tone juxtaposes desire's vibrant energy against restraint's cool containment. The palette combines warm tones of red_oxide and small_orange to symbolize desire, while muted_cream and blackened_plum represent restraint, creating a dance of heated and subdued colors. The collision occurs centrally, where warm colors push towards the cooler edges, representing the tension between reaching out and holding back—a visual echo of conflict. The negative space interspersed throughout maintains an essential breath in the composition, allowing the emotions to hang in the balance, while broken pixels add imperfection to represent the vulnerabilities of love and betrayal.</desc>
