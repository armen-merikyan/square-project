<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Reflection</title>
  <desc id="desc">This piece captures the emotional contrast between longing and resolve through the pattern of barcodes interspersed with cracked, muted tones. The chosen colors resonate with the tension of 'signal_noise,' where vibrant greens and blues pulse against grounded blacks and grays. Clusters of bright colors suggest moments of yearning and urgency, while the surrounding muted spaces symbolize serenity and quiet reflection. Darker areas conflict with bursts of color, illustrating the collision of emotions, allowing a narrative of repair through damage to unfold subtly.</desc>
