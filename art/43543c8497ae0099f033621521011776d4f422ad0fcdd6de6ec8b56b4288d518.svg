  <title id="title">Fractured Affection</title>
  <desc id="desc">This artwork captures the emotional tension between love and betrayal through a juxtaposition of warm and cool tones. The pinks and reds symbolize warmth and love, while the dark maroon and grays represent betrayal and loss. The layout descends like fallen tears, creating a sense of emptiness while still holding a structured rhythm, evoking the sensation of broken symmetry. The use of broken pixels creates an imperfection that emphasizes the turmoil of the emotions, allowing the viewer to experience both the beauty of love and the pain of betrayal in the contrasting colors and patterns. The primary collision occurs where the warm hues meet the darker shades, symbolizing the conflicted feelings embedded within the themes of the seed.</desc>
