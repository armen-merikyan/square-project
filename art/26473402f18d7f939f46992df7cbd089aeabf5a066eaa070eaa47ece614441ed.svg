<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erosion of Shelter</title>
  <desc id="desc">This composition embodies the tension between safety and exposure through a layered palette of muted greens, soft browns, pale skin tones, and cool whites. The center is lightly saturated, symbolizing vulnerability, while darker hues encircle it, representing protective barriers. The collision occurs at the vertical split, where the soft tide pattern of warm brown and shelter green intersects with the noisy, exposed elements at the edges. Broken pixels introduce subtle imperfections, enhancing the emotional disruption. The arrangement suggests a flux between calm and pressure, beautifully reflecting the seed's themes.</desc>
