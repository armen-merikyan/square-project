<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Isolation</title>
  <desc id="desc">This piece captures the emotional tension between loneliness and connection. The dark palette represents the weight of solitude, contrasted by sporadic lighter tones that suggest fleeting moments of connection. The arrangement is off-center with darker colors dominating, embodying that feeling of being weighted down while small accents offer a sense of fleeting hope. The clash of dense blacks against subtle whites creates a rhythmic pattern of memory and longing, resonating with the seed's themes of brokenness and disconnection.</desc>
