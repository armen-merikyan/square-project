<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Threads</title>
  <desc id="desc">This piece explores the emotional interplay of longing and resolve through color, pattern, and spatial tension. The palette combines muted tones with sparks of intensity, creating a dichotomy between desolation and strength. The left half expresses longing through broken, disordered patterns, while the right carries a sense of resolution with structured, firm lines. The contrast primarily occurs along the center line, where the fragmented aspects of longing meet the composed order of resolve, symbolizing an emotional spectrum that is left unresolved yet charged with energy.</desc>
