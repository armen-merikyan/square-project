<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone explores the tension between strength and vulnerability, represented through stark contrasts and the breaking of patterns. The palette of muted grays and vibrant reds expresses the fragility of exposure (vulnerability) alongside the assertive strength demanded by dark maroon and deep pink. The main collision occurs in the center where the structured maze of strength (dark maroon) intersects with the gentle dotted vulnerability (pale pink), suggesting a battleground of feelings. The composition maintains a dim overall atmosphere, allowing a bright cluster to emerge, symbolizing brief moments of intensity amidst an overwhelming sense of quiet. Broken pixels serve as scars, hinting at past disruptions, enhancing the story of tension and relief.</desc>
