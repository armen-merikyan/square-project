<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This square artwork explores the emotional juxtaposition of panic (represented by sharp and warm colors) against the calm of control (cooled, structured tones). The palette stems from a machine emotionality, with lime and electric blue indicating chaos and vibrancy, while the black serves as a grounding contrast. The edge style features pixel bleed, evoking a sense of movement and disturbance. The zigzag pattern formed by the placement of color evokes rising tension; collisions occur toward the center, where chaos and control meet visually, creating an abstract narrative of an internal struggle.</desc>
