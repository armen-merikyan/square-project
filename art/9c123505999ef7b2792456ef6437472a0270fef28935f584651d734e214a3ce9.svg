<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos in Order</title>
  <desc id="desc">The contrasting emotional tones of 'panic' and 'control' shape this artwork. The top half features warm, chaotic colors that suggest uncertainty and instability, while the bottom half embraces cooler, structured tones reflecting control. The palette, derived from 'ancient_fire,' highlights the conflict between flame-like unpredictability and the grounding nature of dark tones like charcoal and deep reds. The collision occurs visually at the mid-point, where warm colors taper into cooler shades, representing the tension between the overwhelming and the orderly. The pattern suggests a breakdown of chaos into a comforting structure, mirroring the dynamic range of emotions candidly portrayed by the seed.</desc>
