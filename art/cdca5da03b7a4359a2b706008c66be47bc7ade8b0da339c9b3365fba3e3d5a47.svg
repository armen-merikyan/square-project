<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This abstract piece captures the emotional duel between fear and hope. The combination of dark hues like '#000000' and '#4B0082' represents the weight of fear, contrasted by the soft gold '#FFD700' that symbolizes hope and light emerging through darkness. The placement reflects a split vertical design that mimics conflict, with dense clusters emerging from the edges towards a brighter center, embodying bursts of possibility. The layout embraces a falling pixel motif, enhancing movement and tension from the outside inward, while the broken pixels introduce the imperfection highlighted by the nature of machine emotions.</desc>
