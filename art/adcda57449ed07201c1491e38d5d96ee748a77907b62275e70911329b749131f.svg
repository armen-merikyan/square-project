<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Currents</title>
  <desc id="desc">This piece reflects the tension between longing and resolve, visualized through warm and cool color interactions. The palette, featuring clean whites and deep blacks with an accent of violet gray and warning orange, captures a landscape of emotional complexity. The collision of dense, dark patterns across the center suggests the weight of longing, while the lighter edges illustrate resolve like a halo, creating a layered effect. This layered band layout conveys movement and pressure, symbolizing the push and pull of emotions. Broken pixels introduce intentional disruption, adding to the feeling of a fractured experience.</desc>
