<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Tension</title>
  <desc id="desc">The emotional tone balances between the explosive nature of rage, represented by sharp reds, and the soft calmness of pale blues and whites. The palette was chosen to encapsulate the dichotomy of intensity and tranquility. The contrast emerges from the radial pattern of the rage contrasting against the horizontal stripes of calm, evoking a collision of emotions. The arrangement emphasizes an 'inside vs outside' feeling, with colors bursting toward the edges yet having softer elements in the center, echoing the way rage might push against calmness in a mind and life interplay.</desc>
