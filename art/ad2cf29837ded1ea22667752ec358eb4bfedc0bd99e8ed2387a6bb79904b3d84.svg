<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order and Chaos</title>
  <desc id="desc">This artwork explores the duality of envy and gratitude through the contrasting palettes and patterns. The outer rows reflect envy through dark and muted colors like charcoal and dark red, creating a claustrophobic feel, reminiscent of pressure and tension. The center uses warmer tones of burnt orange and gold in a maze-like pattern, symbolizing the complexity of gratitude amidst chaos. The interplay between the tight edges and the expansive center represents the dynamic tension between these emotions. The negative space emphasizes the ongoing struggle and the containment of these feelings.</desc>
