<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissonance in Resonance</title>
  <desc id="desc">The emotional tone captures the tension between love and betrayal, utilizing a palette of warm pinks and reds contrasted against the cooler gray and dark maroon. The placement follows a mirrored layout that is intentionally disrupted by broken pixels, illustrating the conflict between harmony and chaos. The central shape—abstractly inspired by a fragmented heart—introduces a collision of emotions at the center, where vibrant warmth meets darker, cooler tones, suggesting a nuanced emotional experience of both affection and pain. The flowing pattern subtly echoes chaos with its broken dots while inviting organized structure through the symmetry of the layout, forming a rich narrative of interlinked yet contrasting feelings.</desc>
