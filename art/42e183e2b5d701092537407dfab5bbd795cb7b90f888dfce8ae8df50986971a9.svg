<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece explores the emotional tension between loneliness and connection through a contrasting palette of dark and vivid colors. The black forms a protective border while electric blue and magenta bursts from the center, portraying the conflict of connection seeking to break through isolation. The checker pattern represents loneliness, while the dots symbolize connection. We see a predominance of negative space, allowing the viewer to feel the void of isolation alongside the hints of warmth and connection. The deliberate asymmetry heightens the feeling of imbalance, resonating with themes of hidden versus exposed connections.</desc>
