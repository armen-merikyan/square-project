<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Broken Reflection</title>
  <desc id="desc">The emotional tone of this artwork captures the tension between love and betrayal, presenting a nearly mirrored image with intentional imperfections. The palette features warm pinks and reds juxtaposed with dark maroon and grey, embodying warmth against the coldness of betrayal. The contrast occurs through a split between soft ring patterns representing love and sharp spark patterns embodying betrayal. The placement of colors suggests an interrupted flow, where soft edges are met with burned fragments, symbolizing the pain of broken trust. This design evokes a potent narrative of emotional conflict, with echoes of paired shapes clashing in asymmetric spacing, inviting contemplation on relationships.</desc>
