<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges: A Tensioned Balance</title>
  <desc id="desc">The piece embodies the emotional dialogue of vulnerability and strength through a palette of muted and saturated colors. The off-white and faint peach symbolize vulnerability with a soft break, while the dark navy and compressed red evoke strength and resilience. The composition flows from the corners, highlighting a strong contrast in density, allowing elements to collide at the center where energy is both concentrated and disrupted. This interplay represents the tensions of emotional states, with broken pixels interrupting uniformity to express imperfections intrinsic in our experiences.</desc>
