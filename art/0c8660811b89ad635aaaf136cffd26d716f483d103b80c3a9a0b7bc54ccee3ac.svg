<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">The emotional tone captures the struggle between defiance and submission through contrasting color placements. The palette of navy and black evokes depth and intensity, while the dim cyan serves as a bright, assertive accent. The arrangement presents a dense, pulsating block of colors in the center, symbolizing defiance, surrounded by softer transitions that represent submission. The upward and diagonal movements in the pattern create a sense of rising tension, interrupted by the broken pixels, representing the unpredictability and glitches in emotions. The piece plays with the known vs unknown contrast, as the central area is dense and vibrant whereas the edges fade into quieter tones, suggesting a boundary between chaos and order.</desc>
