<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inverted Tension</title>
  <desc id="desc">This composition embodies the tension between softness and severity. The palette of powder pink, warm white, and sharp crimson represents the softness, while the darkness of carbon black and steel gray signifies severity. The main collision of colors occurs at the center, where warmth meets the cold boundary. The pattern of 'teeth' represents softness as it erupts from the top left, creating a spatial 'invasion' into the structured severity of the 'checker' pattern that occupies the lower right. The use of broken pixels adds intentional disruptions, suggesting imperfections in a controlled environment. Negative space is respected, reflecting the quiet amidst the tension.</desc>
