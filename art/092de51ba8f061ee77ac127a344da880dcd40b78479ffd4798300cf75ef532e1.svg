<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Weight</title>
  <desc id="desc">This artwork embodies the duality of fear and hope through a contrasting palette of dark and light shades. The predominant dark hues (#000000, #5D3A8D) illustrate the weight of fear, while bursts of soft gold (#D6C94A) symbolize flickering hope. The sharp contrasts occur along the vertical center, where opposing emotional currents collide. The crosshatch pattern suggests fragmentation and the complexity of emotion, while the broken edges mimic the disruption that fear can enforce against the gentle rise of hope, creating a space where light may peek through the weight of darkness.</desc>
