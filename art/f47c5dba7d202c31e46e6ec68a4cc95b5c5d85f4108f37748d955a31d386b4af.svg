<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">This piece embodies the emotional interplay between envy and gratitude, using a warm vs. cool contrast that suggests tension and resolution. The palette mixes yellow and deep blue to reflect moments of bright hope against darker corners of desire. The layout invites confrontation between two emotional patterns; 'rain' splashes against soft, broken dots representing gratitude, each clash creating a rhythm that echoes throughout the canvas. The edge style of soft transitions allows for density in some areas while keeping the viewer allowed room to breathe, reflecting the struggle between rising hope and falling despair. Breaks in the color pattern create imperfections, echoing the realities of navigating complex feelings. Overall, this artwork represents a powerful meditation on emotional conflict, inviting viewers to consider their own experiences of envy and gratitude through abstract means.</desc>
