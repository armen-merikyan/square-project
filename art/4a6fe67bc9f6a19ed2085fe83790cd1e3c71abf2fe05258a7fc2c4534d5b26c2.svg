<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone of this work captures the tension between defiance and submission, represented through a contrasting palette of muted fields and defining accents. The use of 'compressed red' against the softer 'off_white' creates a visual friction representing defiance penetrating an enclosed space. The main collision occurs in the center where the static pattern of defiance clashes with the broken dots of submission, creating a visual narrative of conflict and invasion. The form of the 'window' seed represents an opening, with color placements emphasizing movement towards and away from this center, reflecting the complexity of submission versus autonomy.</desc>
