<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Clash of Extremes</title>
  <desc id="desc">The emotional tone revolves around the tension between defiance and submission. The color palette, drawn from 'love_betrayal', uses a vivid red to signify defiance, supported by soft gray and dark maroon representing submission. The central area, densely packed with bold colors, represents a strong core of defiance, while the soft edges showcase submission, creating a collision that evokes both intensity and retreat. The layout employs a mirrored structure that mildly breaks in two or three pixels to introduce an element of chaos amid order, reflective of the ongoing struggle depicted in the seed text.</desc>
