<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry vs. Break</title>
  <desc id="desc">This composition contrasts the feelings of awe and terror through a split layout that visually represents the tension between order and chaos. The upper half uses a maze-like pattern in muted tones of sepia and tan, evoking awe through layers of complexity, while the lower half employs a cracking pattern with grays and faded blues, suggesting the unsettling nature of terror. The palette reinforces the emotional tone, with soft edges creating a sense of both connection and disruption. The collision is found at the midpoint where the structured and the fragmented meet, enhanced by the broken pixels that introduce an imperfection, reinforcing the theme of broken memory.</desc>
