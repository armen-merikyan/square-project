<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order in Chaos</title>
  <desc id="desc">The emotional tone reflects the contrast between restlessness and peace, emphasizing a sense of movement disrupted by calm. The palette, which includes warm browns and a cool pale green, evokes both grounding serenity and buried tension. The upper half embodies peace through a structured veil-like pattern, while the bottom savors chaos with a tide-like flow. The central collision occurs diagonally, interrupted by patches of warmer hues that suggest flames amidst a quiet field, reflecting an ongoing dialogue between stability and disruption.</desc>
