<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse in the Static</title>
  <desc id="desc">The emotional tone centers on the struggle of clarity amidst chaos, represented by defined sections of dark, quiet colors interrupted by a few lighter, vivid accents. The palette is a blend of navy and black for depth and noise, contrasted against isolated whites and dim cyan that symbolize fleeting signals. This reflects the push and pull between overwhelming noise and a single, clean pulse, embodying the 'signal vs noise' theme. The layout emphasizes a corner invasion, where your eye starts at the lower left and is drawn diagonally upwards, suggesting movement and escalation.</desc>
