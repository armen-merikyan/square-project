<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order Meets Chaos</title>
  <desc id="desc">The emotional tone of this piece explores the tension between softness and severity, translating the dualities from the seed into color and pattern. The palette combines warm tones like powder pink and warm white, suggesting softness and nurturing, against the sharp crimson and carbon black that embody severity and control. The upper half utilizes the 'embers' pattern, featuring soft, feathered contacts, while the lower half employs 'negative_cross', presenting a stark interruption of strict lines. The collision point centers the square, disrupting order with gentle chaos, reflecting the seed's emotional journey from guilt to forgiveness.</desc>
