<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Amidst Restraint</title>
  <desc id="desc">This abstraction conveys the tension between desire and emptiness through juxtaposed color palettes. The warm palette (hot coral and blood orange) represents desire, while the cooler tones (charcoal and hollow blue) signify emptiness. The dominant presence of warm colors alongside quiet expanses of cool creates a visual push and pull, illustrating the emotional struggle of yearning for more while feeling contained or restrained. Broken pixels introduce imperfections, symbolizing the disruption and leaks of desire against the ordered frame of emptiness. The main collision occurs centrally, where the warmer colors encroach into the cooler spaces, demonstrating the overwhelming force of desire in a restrained context.</desc>
