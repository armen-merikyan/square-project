<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This composition captures the emotional tension between safety and exposure. The palette of warm brown and shelter green provides a grounding presence, while the pale skin and open blue introduce moments of vulnerability and exposure. The layers create a contrast that feels fragmented on the left, suggesting safety through the 'ladder' pattern, while the barcode on the right introduces rhythmic exposure. The center, where these patterns collide, allows space for quiet reflection, embodying a gentle yet strained coexistence. The edge style is porous, symbolizing a transition rather than a boundary, with broken pixels intentionally disrupting the flow, adding to the emotional complexity.</desc>
