<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This artwork captures the tension between restlessness and peace through dense clusters of dark and warm tones colliding with lighter, muted colors. The palette of red oxide and blackened plum creates an emotional weight that is interrupted by muted cream and small orange, evoking memory and movement. The collision occurs primarily at the edges, where tension bubbles up against a field of light, illustrating a push against containment. The negative space embodies the essence of peace amidst the chaotic interplay of colors, shaped by the abstract concept of conflict and resolution suggested by the seed.</desc>
