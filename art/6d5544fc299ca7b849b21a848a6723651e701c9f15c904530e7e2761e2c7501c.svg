<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Patterns</title>
  <desc id="desc">This artwork embodies the duality of panic and control through contrasting color blocks. A central bright orange represents control, radiating outward, while muted blues and purples clash against it, signifying the chaos of panic. Using broken dots for the controlled area introduces unease within the structured center, while the outskirts are filled with radial rings of deep blacks and grays, depicting encroaching chaos. The palette reflects joy and grief—a balance between warmth and coolness. The overall composition flows diagonally from the corner, demonstrating an invasion of emotion that plays with the viewer's perception of space and density.</desc>
