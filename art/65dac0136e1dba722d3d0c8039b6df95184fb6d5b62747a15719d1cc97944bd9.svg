<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Doubt</title>
  <desc id="desc">The emotional tone captures the tension between trust and suspicion. The top half features a lattice pattern in muted hues of deep teal and void black, symbolizing suspicion with uneven reflections and dark slivers. In contrast, the bottom half employs a broken frame pattern with cosmic indigo and star white, instilling warmth and openness. The collision centers around the horizontal split, where the two emotional states meet, creating visual discord yet emphasizing resilience through fragmented beauty. This arrangement evokes a deliberate imbalance, allowing shadows and glows to play against each other, embodying the complexity of human interactions.</desc>
