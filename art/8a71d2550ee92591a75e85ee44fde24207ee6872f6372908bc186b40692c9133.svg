<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">The emotional tone contrasts the unease of restlessness with calming peace. The palette, composed of cosmic indigo, void black, star white, cold gold, and deep teal, creates an atmosphere of awe and terror. The dense band of dark colors in the upper half represents restlessness — a heavy collision of colors that reflects memory and motion, while the lighter colors below suggest spaces of peace. The main contrast occurs where the dark and light bands collide in the center, echoing a struggle between tension and calm. This interplay embodies the dynamic nature of the seed's emotional landscape.</desc>
