<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Repair</title>
  <desc id="desc">This piece explores the emotional tones of longing and resolve as they collide and interact within a defined space. The palette of signal green, electric blue, hot magenta, dead black, and static gray embodies a juxtaposition of vibrant hope and somber introspection. The composition favors density, with a block of noise representing resolve contrasted against quieter fields, suggesting a story of recovery amidst chaos. The broken pixels introduce intentional disruptions, reflecting the scars of damage while echoing the need for repair. The central collision is dense, acting as an island amidst a sea of calm, illustrating the emotional pull between urgency and serenity.</desc>
