<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Unstable Balance</title>
  <desc id="desc">The emotional tone shifts between trust and suspicion, using a palette of soft greens and warm browns to represent stability and warmth, contrasted against the colder whites and blues signaling tension and unease. The dominant color, 'shelter_green', occupies the majority of the square, suggesting a foundational sense of trust, while the introduction of 'cold_white' and 'open_blue' creates an airy, unstable environment, indicative of suspicion. The collision happens in the upper right corner, where layers of suspicion pressure against the softer trust, illustrating a struggle for balance as the patterns of 'embers' and 'ash_field' intersect, evoking a sense of conflict between protection and exposure.</desc>
