<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Pulse</title>
  <desc id="desc">The emotional tone of this piece captures the tension between longing and resolve, represented visually through contrasting colors and patterns. The palette 'ancient_fire' instills warmth through burnt orange and dark red, embodying yearning, while charcoal and gold add depth, integrity, and moments of brilliance against darker backdrops. The collision of structured shatter and free-flowing pulse marks forms an intense center, drawing the viewer in with a dynamic push and pull between chaos and calm, harmonizing the broken surfaces and edges that symbolize repair and damage. The visual weight sits heavily toward the longing, echoing throughout the grid and creating a complex emotional landscape infused with serenity and urgency.</desc>
