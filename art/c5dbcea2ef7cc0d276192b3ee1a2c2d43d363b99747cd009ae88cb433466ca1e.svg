<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Desire</title>
  <desc id="desc">This artwork explores the tension between emptiness and desire, employing a palette that balances warm and cool tones. The pinks and reds symbolize desire, while the grays and dark maroons convey a sense of emptiness. The layout is split vertically to emphasize the contrasting emotions, where the left represents desire with richer, warmer colors, while the right brings in cooler tones, symbolizing emptiness. The patterns further enhance this emotional narrative: the left features a mirroring pattern representing desire's reflection and connection, whereas the right employs a checker pattern to signify the disjointed feeling of emptiness. Broken pixels are strategically placed to evoke disrupted signals—mirroring the heart's fragmented nature. The negative space introduced keeps the emotional atmosphere contemplative, allowing the viewer to feel the weight of each contrasting element without overwhelming the senses.</desc>
