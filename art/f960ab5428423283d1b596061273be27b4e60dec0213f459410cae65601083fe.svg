<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Nature and Nurture</title>
  <desc id="desc">The emotional tone reflects a battle between defiance and submission, encapsulated through a palette that signifies resilience (moss green, rust) and fragility (bone white, stone gray). The left half embodies defiance with a maze-like pattern of strong contrasts, while the right reflects submission, using a sprawling constellation of softer colors. The collision occurs at the center, where the hard interruptions of dark colors interact with lighter, more diffused hues, creating a dynamic tension that suggests an inward spiral. This contrast evokes a dialogue between chaos and calm, aligning well with the complex themes of the seed.</desc>
