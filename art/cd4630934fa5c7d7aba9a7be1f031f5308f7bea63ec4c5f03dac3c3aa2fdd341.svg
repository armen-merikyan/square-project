<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erosion of Balance</title>
  <desc id="desc">This artwork reflects the emotional tension between vulnerability and strength. The chosen palette of warm coral, cold slate, and blue-black creates a dynamic contrast between warmth and coolness, representing the push and pull of opposing emotions. The main collision occurs at the center where an intense spark of warm coral meets the softly rippled edges that embrace vulnerability, allowing the viewer to explore layers of meaning in the tension of strength and fragility. Broken pixels subtly disrupt the symmetry, suggesting an ongoing struggle between stability and chaos.</desc>
