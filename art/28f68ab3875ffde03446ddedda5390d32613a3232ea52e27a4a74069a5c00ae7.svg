<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Threads</title>
  <desc id="desc">The emotional tone reflects the duality between longing and resolve, with longing characterized by a soft, muted palette representing nostalgia, while resolve features stronger, darker colors suggesting firmness. The palette of sepia and faded blues represents the past and nostalgia (longing) while the tan and gray evoke strength and grounding (resolve). The collision primarily occurs at the lower left corner where the muted colors begin to transition sharply into the more defined lines of the glitch pattern, creating a visual tension that mirrors the emotional struggle. The deliberate broken pixels introduce imperfection, highlighting the contrast between contained emotions and the overflowing urge for connection, resonating with the seed themes.</desc>
