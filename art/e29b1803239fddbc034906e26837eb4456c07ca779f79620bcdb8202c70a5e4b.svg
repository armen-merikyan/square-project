<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Presence</title>
  <desc id="desc">This piece embodies the tension between softness and severity through contrasting colors and patterns. The palette consists of muted grays and a single vibrant crimson accent, symbolizing the inner struggles of guilt and forgiveness against a backdrop of emotional noise. The soft frames created by light colors collide with the sharper, ladder-like patterns of dark tones, suggesting a pulsating rhythm of conflicting feelings. The visual weight is heavily skewed towards the dark side, with just enough vibrant marks interrupting the stillness to signify hope and release.</desc>
