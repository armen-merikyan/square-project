<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Duality</title>
  <desc id="desc">This composition captures the emotional tension between longing and resolve. The chosen colors of pink, red, gray, and dark maroon create a warmth contrasted by a grounding heaviness, reflecting the push and pull of these emotions. The layout simulates a border that is deliberately interrupted, allowing areas of negative space that suggest unresolved yearning while the clustered pixels in the center embody a sense of pressure and determination. The 'scar' and 'noise' patterns overlap, creating a visual narrative of cluttered thoughts and feelings that collide yet coexist within the confined space. The main collision point is around the center area, illustrating the intense struggle between the two forces of longing and resolve.</desc>
