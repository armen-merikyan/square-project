<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order in Chaos</title>
  <desc id="desc">This piece reflects the emotional tension between panic and control. The palette, dominated by deep maroon, gray, and hints of pink, conveys a sense of conflict, where the maroon represents control, and the pink signifies the chaos of panic. The layout flows upward, symbolizing hope or striving amidst disorder, while the combination of structured patterns on one half (controlled) and chaotic dot patterns on the other (panic) illustrates the ongoing struggle between these states. The use of broken pixels adds imperfection and emphasizes the transitional, unresolved nature of the moment captured in this artwork.</desc>
