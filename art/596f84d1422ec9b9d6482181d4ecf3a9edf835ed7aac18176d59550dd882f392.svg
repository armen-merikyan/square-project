  <title id="title">Echoes of Conflict</title>
  <desc id="desc">This artwork explores the emotional tension between love and betrayal, using a palette of warm reds and grays to evoke a sense of intimacy mixed with conflict. The outer edges are dense in darker maroon and gray, representing the heaviness of betrayal, while the inner area features lighter pinks and reds, suggesting love. The use of cracks and stripes reflects the chaotic collusion of these emotions. The asymmetrical placement and broken pixels create visual interruptions, reflecting unresolved conflicts and emotional scars.</desc>
