<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition expresses a tension between desire and emptiness, illustrated through contrasting colors and patterns. The palette features warm hues like blood orange and hot coral to convey desire, interspersed with cooler shades of charcoal and hollow blue, representing emptiness. The emotional collision is centered in the grid, where the saturated 'pressure_band' of colors meets the sparse 'barcode' pattern, creating a dynamic interplay. The edges are weighed down, symbolizing restraint against a backdrop of flowing desire, evoking the struggle between expansion and containment.</desc>
