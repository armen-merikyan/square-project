<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone of this piece explores the tension between vulnerability and strength. The chosen palette of soft powder pink, stark carbon black, and sharp crimson reflects the delicate balance of exposure against protection. The center is dense with a checker pattern, suggesting strength, while the edges transition into a flame pattern in muted steel gray and warm white, expressing vulnerability. This collision creates a tension that is felt most in the central rows, while the outer rows provide a backdrop of quiet instability. The broken pixels throughout evoke imperfection and scars, embodying the layered narrative of connection and alienation.</desc>
