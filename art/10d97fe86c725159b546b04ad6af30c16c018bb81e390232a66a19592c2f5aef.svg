<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resolved Echoes</title>
  <desc id="desc">This artwork embodies the emotional tension between longing and resolve. The palette, consisting of earthy greens and warm browns contrasted with cold whites and open blues, evokes a sense of shelter from overwhelming emotional surges. The central collision of colors signifies the push and pull of repair versus damage, with jagged edges creating a visual tension that mirrors the broken aspects of the seed. The arrangement of darker colors at the top descends toward lighter hues to represent a journey from heavy longing to a steady resolve, echoing the flowing tide and braided patterns. Broken pixels introduce intentional disruptions, enhancing the composition's emotional depth without representing a literal form.</desc>
