<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a balance between control and surrender, with a saturated central burst implying overflow, contrasting against contained edges. The palette of ripe green and honey gold conveys warmth and unease, embodying the tension between growth and restraint. The main collision occurs at the central off-kilter point, where vibrant greens clash against muted creams, echoing the stutter step of constant pressure and release. The jagged edges introduce interruption while maintaining a structured core, reminiscent of a compass's guidance yet fighting against the pull of emotional overflow. This arrangement narrates a struggle of holding back against an internal urge to transcend boundaries, capturing the essence of the seed through abstract pattern flourishes.</desc>
