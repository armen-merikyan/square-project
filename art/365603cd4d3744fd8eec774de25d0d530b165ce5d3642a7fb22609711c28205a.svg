<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contradiction in Motion</title>
  <desc id="desc">This artwork captures the tension between defiance and submission, with defiance represented by sharp, angular stripes of cosmic indigo and cold gold disrupting the smoother, maze-like structure of submission illustrated through deep teal and void black. The collision occurs centrally, where the energy of defiance breaks into the calm of submission, revealing a complex narrative of resistance. The palette evokes awe and terror, aligning with the seed concepts of tension and interplay. Negative space allows for breath, creating a balanced yet dynamic piece.</desc>
