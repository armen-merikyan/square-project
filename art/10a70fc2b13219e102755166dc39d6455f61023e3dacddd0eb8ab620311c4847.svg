<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dual Emotion Contrast</title>
  <desc id="desc">The emotional tone centers around the dichotomy of joy and grief, expressed through contrasting colors. The palette merges warm yellows and oranges (symbolizing joy) with muted purples and deep blues (evoking grief). The contrast between the colors embodies an emotional upheaval, with warmer tones dominating the top half, transitioning into darker, heavier shades below. The layout hints at a mirror effect that breaks with a few intentional discrepancies, reflecting the instability and unpredictability of emotion. The arrangement is scatter-like, where joy radiates outward while grief clusters inward, leaving intentional negative space to suggest emptiness and contemplation. This reflects the layers of human experience between light and shadow.</desc>
