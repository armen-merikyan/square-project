<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Clarity</title>
  <desc id="desc">The emotional tone navigates from confusion in dark hues to clarity with brighter accents, reflecting the dichotomy of chaos and order. The palette, 'lonely_signal', features dark navy and black suggesting depth and confusion, contrasted with dim cyan for subtle illumination. The overlap of dark and light pixels creates collisions that invite the eye to traverse the grid, reflecting themes of broken symmetry and echoing tension. The layout’s near-mirror quality, with select pixels intentionally misaligned, captures the essence of confusion versus clarity, making the piece both rhythmic and jarring.</desc>
