<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Chaos</title>
  <desc id="desc">This composition embodies the tension between panic and control through juxtaposed patterns and colors. The left half features a crosshatch pattern in muted sepia and tan, symbolizing panic's chaotic influence, while the right side showcases a ring pattern in faded blue, representing a desire for stability. The combination creates an echoing collision where the inner spark meets external disruption, revealing the struggle of emotions contained within an 'empty room'. The structural symmetry is disrupted by the 'broken pixels', enhancing the feeling of imperfection and raw emotion that characterizes love and betrayal.</desc>
