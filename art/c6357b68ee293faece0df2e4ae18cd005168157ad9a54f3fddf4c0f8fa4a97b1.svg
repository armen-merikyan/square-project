<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">The emotional tone of this piece captures the duality of dread and relief. The palette, featuring deep storm gray and rich faded gold, represents the heaviness of dread against the lightness of relief. The main collision occurs in the center where dense texture and patterning invoke pressure. The upward spiral movement contrasts against the quiet channel cutting through, embodying the tension between chaos and order derived from the seed. The placement of broken pixels serves as intentional disruptions, symbolizing flaws in the perceived order and adding depth to the emotional story.</desc>
