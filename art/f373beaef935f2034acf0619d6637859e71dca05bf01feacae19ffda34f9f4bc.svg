<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Convergence of Tension</title>
  <desc id="desc">This composition embodies the emotional tension of 'spark vs ash', with pulsating bright colors representing sparks colliding with muted grays of ash. The color palette harmonizes shades of aqua and ink blue with stark accents of alarm red, creating a dialogue between warmth and coolness. The layout is set diagonally, allowing the hot spark energy to dominate one wedge, while the cool restraint occupies the opposite. The main collision occurs at the center, where jagged edges of patterns overlap, suggesting friction and interaction between contrasting emotions. The use of broken pixels introduces intentional imperfections, enhancing the narrative of resilience and fragility amidst dynamic exchanges.</desc>
