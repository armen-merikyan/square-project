<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inner Tensions</title>
  <desc id="desc">This artwork embodies the emotional clash between hope and fear, with an approach that reflects dense pressure against quiet spaces. The palette comprises deep blacks, dark violets, soft golds, and pale greens to symbolize both the weight of fear and the light of hope. The layout represents an argument grid, illustrating two competing emotional landscapes—where softer golds and pale greens try to pierce through the dominating blacks and violets. The broken pixel technique introduces imperfection, adding depth to the concept. The dominant contrast runs vertically and horizontally, creating intersections of dense clusters and open spaces, suggesting the push and pull of emotions. The diamond shape isn't literalized but informs the central pattern evident throughout the piece, resulting in a rhythm that oscillates between overwhelming pressure and gentle release.</desc>
