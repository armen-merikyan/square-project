<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure Vs. Shelter</title>
  <desc id="desc">The emotional tone revolves around the contrast of safety and exposure. The chosen palette blends warm brown and shelter green for security against cold whites and open blues representing exposure. The central square uses a predominant shelter green, symbolizing protection, interrupted by pale skin and cold white accents that signify exposure – creating a tension between comfort and vulnerability. The placement of colors is designed to create a sense of echoing rhythm with the green anchoring the center. The open left side of the grid captures the idea of an 'open gate,' while the right half reinforces safety, achieving a balance of pressure and release.</desc>
