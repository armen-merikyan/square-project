<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotions</title>
  <desc id="desc">This piece embodies the duality of tenderness and rage. The palette combines the saturated crimson and muted blues to reflect the emotional tension between these states. The main collision occurs at the center with jagged reds shattering into softened blue, suggesting the weight of guilt bleeding into forgiveness. The arrangement of colors, punctuated with broken pixels, represents a struggle that is both personal and universal, a conversation between inner quiet and external chaos.</desc>
