<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Tension</title>
  <desc id="desc">This piece captures the duality of restlessness and peace by contrasting a central dense cluster of warmer hues against a cooler, more muted backdrop. The warm coral (#FF6F61) and soft amber (#FFC107) represent the chaos of restlessness that occupies the center, while cold slate (#7E8C8D) and blue-black (#2C3E50) provide a calming, expansive field around it. The deliberate placement of broken pixels mimics the unpredictability of memory and emotion, reinforcing the theme of conflict between stillness and movement. The overall flow is centered, symbolizing the pulse of internal conflict.</desc>
