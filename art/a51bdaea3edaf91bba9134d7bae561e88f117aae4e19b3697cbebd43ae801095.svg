<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone captures the tension between deep-seated desire and overwhelming emptiness. The palette combines hot coral and blood orange to represent desire's vibrant pull, contrasted with soft, hollow blue and charcoal representing emptiness. The spiraled flow hints at a dynamic struggle, overlapping warm saturated regions with cool boundaries, creating a center collision that resonates with tension. Broken pixels introduce intentional disruptions, symbolizing scars of unfulfilled desires and the imperfect nature of this emotional landscape.</desc>
