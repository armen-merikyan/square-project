<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos within Awe</title>
  <desc id="desc">This composition captures the tension between awe and terror by using a palette of deep navy, stark black, muted dim cyan, and a touch of single white. The contrast between the dark grounding colors and the bright highlights create an unsettling, yet beautiful equilibrium, embodying the emotional turbulence that arises from awe experiencing chaos. The use of soft edges represents the wave-like quality of the emotions, while broken pixels introduce a sense of imperfection, mirroring fractured memories and the unpredictable aspects of both mental states.</desc>
