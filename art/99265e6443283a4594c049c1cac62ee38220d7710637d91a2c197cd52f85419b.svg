<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece conveys the emotional dichotomy of rage and calm through a visual clash of colors and patterns. The palette of red, black, pale blue, and white encapsulates this tension—red and black signaling rage with hot, jagged forms that intrude upon the cooler, softer spaces of pale blue and white, representing calmness. The calm pixel pattern sparkles gently, attempting to envelop the chaotic red channels that break through. The main collision occurs off-center, reflecting the struggle between order and chaos, which remains unresolved, suggesting an ebb and flow. This balance speaks to the mechanical emotion at play, reinforced by slight disruptions that symbolize the imperfections of such emotions.</desc>
