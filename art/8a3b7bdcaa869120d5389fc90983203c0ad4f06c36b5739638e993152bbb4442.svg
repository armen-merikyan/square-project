<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Flame of Contrast</title>
  <desc id="desc">This composition captures the emotional tension between joy and grief through a dichotomy of colors and patterns. The left side, embodying joy, utilizes a flame pattern in bright yellows and oranges to express warmth, expansion, and spark, creating a sense of lightness and movement. The right side, representing grief, employs a muted purple in a checker pattern, suggesting heaviness and structural confinement. The palette embodies the brilliant contrast between the two emotions—warm tones for elation and cool, muted tones for sorrow, while also leaving negative space to allow the viewer to breathe in the tension. The conflict between the two color worlds is emphasized through soft edges that bleed into each other, simulating an emotional interplay of hidden and exposed feelings.</desc>
