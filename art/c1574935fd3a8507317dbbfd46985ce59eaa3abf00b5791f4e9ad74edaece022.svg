<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Strength and Vulnerability</title>
  <desc id="desc">This piece explores the tension between vulnerability and strength through a palette that combines deep shades with lighter accents. Cosmic indigo and void black represent strength and stability, while the cold gold and star white introduce moments of softness and vulnerability. The dominant dark colors create a dense 'island' in the center, with stark contrasts echoing the themes of break and pressure. The collision between the stark outlines and soft breaks is intentional to evoke an emotional tug-of-war, encapsulating the fragility hidden within strength.</desc>
