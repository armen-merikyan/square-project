<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Comfort and Strain</title>
  <desc id="desc">This artwork represents the emotional dichotomy of longing and resolve through color and form. The palette blends the warmth of shelter green and warm brown to evoke a sense of safety juxtaposed with the cool tones of pale skin and cold white, representing urgency and exposure. The collision occurs centrally, where the lattice pattern of resolve intersects with the island formations of longing, suggesting an ongoing struggle. The use of broken pixels adds to this narrative, introducing imperfections and disruptions, while maintaining a quiet negative space that echoes inner turmoil mixed with moments of serenity.</desc>
