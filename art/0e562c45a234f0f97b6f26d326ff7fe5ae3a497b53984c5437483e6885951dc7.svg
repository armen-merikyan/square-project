<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This piece explores the emotional tension between vulnerability and strength. It features a central area of warm white that symbolizes exposed vulnerability, surrounded by deep, dark colors that represent strength and protection. The palette incorporates soft pink for warmth, contrast with sharp crimson for urgency, and various greys for emotional depth. The layout, dominated by dark edges and a small cluster of light, captures a feeling of a fragile exposure amidst a robust shell, where the main contrast occurs at the center, creating a visual conflict. The crosshatch and lattice patterns cross each other to further symbolize this battle between the two emotions.</desc>
