  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This artwork reflects the emotional tension between vulnerability and strength, using a palette that captures the essence of safety and exposure. The cooler blue (#A3C1E0) suggests vulnerability, while the warm brown (#8B5B29) represents strength, creating a clash at the center where they intersect. Patterns of maze and embers evoke collision and connection within the grid’s structure, with broken pixels introducing a raw, imperfect edge. The central contrast is directed at the center, suggesting a focal point of struggle and connection, while maintaining negative space to signify openness and potential.</desc>
