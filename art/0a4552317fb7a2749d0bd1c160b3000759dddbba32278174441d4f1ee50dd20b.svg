<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This composition embodies the emotional turbulence between joy and grief, depicted through the contrast of colors. The palette combines bright yellows and oranges representing joy against muted purples and deep blues symbolizing grief. The zigzag pattern echoes a rising signal, an attempt to bridge chaotic emotions. The 'burned edges' style adds a raw, chaotic energy, while the layout follows a falling pixel structure, creating a sense of movement and depth amidst the emotional collision. Negative space is preserved to allow feelings to breathe, suggesting unresolved tension.</desc>
