<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">This composition embodies the emotional tension between defiance and submission through a diagonal layout. The contrasting patterns represent angular resistance with hues like rust and stone gray against soft, subdued fields of bone white and moss green. The center features stronger colors, depicting conflict, while the edges recede into quieter tones, symbolizing submission. Broken pixel placements create imperfections that echo the ongoing struggle and friction of emotions. This balance of tension gives life to an intricately layered narrative while maintaining abstract integrity.</desc>
