<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This piece embodies the tension between love and betrayal through a carefully chosen palette of warm pinks and deep maroons to signify love and intense emotions, contrasted by grays symbolizing the coldness of betrayal. The layout flows upward, suggesting hope and aspiration, yet the presence of broken pixels introduces an element of imperfection. Each row alternates dense patches with negative space, evoking feelings of isolation in a once warm room, echoing the seeds of loneliness and conflict. The sharp edges intermingle with softer colors to illustrate the collision between clarity and confusion in emotions.</desc>
