<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone oscillates between loneliness and connection, represented by stark contrasts of dark and vibrant colors. The palette features lime and electric blue for connection, invoking energy and warmth, while black and magenta symbolize loneliness, creating depth and obscurity. The center seed is a line, translated into a burst of contrast in the arrangement—where vibrant pixels collide with darker tones, representing connection fighting against isolation. The horizontal wave flow allows for movement from the edges to the center, while the corner invasion layout initiates the loneliness at the top, creating a visual narrative of struggle and impulse throughout the piece. With careful negative space and the crosshatch pattern, the composition reflects tension between exposure and protection, resulting in a visually captivating and emotionally resonant piece.</desc>
