<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Asymmetry</title>
  <desc id="desc">This piece captures the emotional tension between vulnerability and strength through a split vertical layout. The left half embodies strength with a ripple pattern, featuring dense and stable colors like deep carbon black and warm white. The right half reflects vulnerability using glitched, thin textures and lighter shades, creating a visual whisper of exposure. The broken pixels introduce intentional imperfections symbolizing the fragility of safety amidst strength. The palette oscillates between stark contrast and soothing tones, establishing a narrative of collision and balance around the center, inviting the viewer to explore the push and pull of these dual emotions.</desc>
