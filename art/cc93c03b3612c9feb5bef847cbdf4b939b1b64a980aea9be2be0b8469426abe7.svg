<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse in Static</title>
  <desc id="desc">This artwork conveys the emotional battle between clarity and chaos, embodying the idea of a 'signal vs noise.' The palette of navy, black, single white, and dim cyan establishes a stark contrast that reflects warmth against cool hues. The primary tension occurs at the center where dense marks of signal pulse clash with the irregular noise band patterns at the edges. This arrangement captures the essence of interruption and memory, illustrating the fragility and persistence of a single identifiable rhythm amidst overwhelming static. The intentional use of broken pixels adds areas of disruption, symbolizing the imperfections in our recollections and the echo of past experiences.</desc>
