<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Boundary Flow</title>
  <desc id="desc">The emotional tone conveys a tension between softness and severity, encapsulated in the selected colors which contrast warm whiteness against the saturation of carbon black. The collision occurs in the central squares where the harsh black marks break through the softer powder pinks and warm whites, suggesting a struggle between openness (softness) and closure (severity). The layout echoes a flowing spiral, indicating motion and direction while maintaining a center-heavy balance, symbolizing weight and grounding. The use of scattered broken pixels exemplifies imperfection, reinforcing the theme of duality and emotional complexity.</desc>
