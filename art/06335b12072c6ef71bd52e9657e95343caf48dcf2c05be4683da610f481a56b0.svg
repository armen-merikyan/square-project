<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">The emotional tone balances joy and grief, represented through a palette of warm and muted colors. The joy side uses vibrant yellows and oranges, embodying lightness and expansion, while the grief side utilizes deep blues and muted purples, invoking heaviness and fragmentation. The split vertical layout creates a strong contrast, emphasizing the collision of emotions. The checker pattern on the grief side contrasts with the noise on the joy side, creating a visual tension that captures the essence of battling emotions. The broken pixel elements throughout enhance the sense of imperfection and complexity within the emotional experience.</desc>
