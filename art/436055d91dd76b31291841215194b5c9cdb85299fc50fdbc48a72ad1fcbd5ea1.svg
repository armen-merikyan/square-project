<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Strained Horizons</title>
  <desc id="desc">The emotional tone of "fear" and "hope" is visually interpreted through a tension between dark and light colors. The palette utilizes deep blacks and violet shadows to convey fear, contrasted with soft gold and pale green to reflect hope. The main collision of color occurs in the center where darker shadows encroach upon the brighter tones, representing an internal struggle. The split vertical layout amplifies the feeling of division while the broken pixels introduce imperfection, echoing the tumultuous nature of the emotions. Patterns of flame and frame contribute to this dynamic, where the fear patterns create jagged tension against the hopeful framing below, encapsulating an abstract narrative of conflict and resolution.</desc>
