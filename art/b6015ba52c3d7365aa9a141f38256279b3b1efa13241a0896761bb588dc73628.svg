<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This artwork captures the emotional tension between vulnerability and strength. The palette of warm and cool colors reflects intimacy and distance—rose clay and warm shadow evoke safety while cool blue and distant lilac suggest exposure. The arrangement features a dominant center with muted backgrounds, patterned by thick, assertive blocks contrasting with lighter, more delicate veils. The main collision occurs in the center where the pattern pressures outward. The broken pixels symbolize the fragility of the mirrored horizon, hinting at both safety and potential exposure.</desc>
