<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Symmetry of Emotion</title>
  <desc id="desc">This composition embodies the emotional duality of longing and resolve, using a palette derived from gratitude and envy. The colors engage in a visual tension where rich greens are intertwined with soft creams, creating both connection and separation. The dominant color is deep olive, which represents the intensity of resolve, occupying about 65% of the space. The collision occurs in the center, where bright honey gold disrupts the darker hues, symbolizing the bittersweet nature of longing. Broken pixels are deliberately placed at the edges, adding an element of imperfection, akin to scars on an otherwise solid structure. The arrangement flows from bottom to top, suggesting a rise from quiet reflection to a firm commitment, echoing the sense of urgency against serenity.</desc>
