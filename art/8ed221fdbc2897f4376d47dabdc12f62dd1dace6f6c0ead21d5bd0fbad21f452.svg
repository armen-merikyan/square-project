<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Threshold</title>
  <desc id="desc">This composition reflects the tension between safety and exposure, using delicate contrasts and the metaphor of a split or seam in the center. The left side, in softer hues of shelter green and pale skin, symbolizes warmth and protection, while the right side employs cold whites and open blues to evoke vulnerability and exposure. The ripple and lattice patterns create a dynamic interplay, where the boundaries fragment yet intertwine, while broken pixels introduce deliberate imperfections, suggesting the fragility of both conditions. The tension between the heavier colors of safety and lighter tones of exposure captures the essence of emotional dichotomy, reflecting a journey from comfort to exposure.</desc>
