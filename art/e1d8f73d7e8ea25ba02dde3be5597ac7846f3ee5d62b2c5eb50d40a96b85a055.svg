<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Fracture</title>
  <desc id="desc">This composition embodies the tension between envy and gratitude through contrasting warmth and coolness of color. The palette, drawn from 'joy_grief', merges vibrant yellows and muted purples, signifying fluctuating emotions. The jagged edges create a sense of broken symmetry, reflecting the theme of imperfection, while the floral patterns of orange flames against dotted deep blue evoke a lively contrast in energy. This interplay is crucial to demonstrate the duality of feelings, with a clear collision happening in the center where color intensifies, illustrating the dichotomy of lightness and weight.</desc>
