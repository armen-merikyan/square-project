<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">The emotional tone reflects the duality of trust and suspicion. The palette, using warm yellows and oranges against deep blues and muted purples, evokes a sense of conflict and balance. The left side with a soft lattice pattern suggests trust, while the right side, characterized by ripples of suspicion, introduces a chaotic element. The main contrast occurs at the center, where these two patterns collide, creating an overlapping dialogue. The broken pixels provide intentional disruptions, embodying the fractures in trust and reinforcing the emotional narrative.</desc>
