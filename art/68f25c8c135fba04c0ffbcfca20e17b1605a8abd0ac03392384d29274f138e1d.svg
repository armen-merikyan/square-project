<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall of Emotion</title>
  <desc id="desc">The emotional tone is set around the conflict between envy and gratitude, contrasting the sensation of rising aspirations against the descending weight of discontent. The palette combines varying shades of pink, red, gray, and dark maroon to evoke the intensity of emotions—pink representing gratitude and softness, while dark red and maroon indicate envy and tension. The arrangement follows a zigzag flow, with noise on one side (representing envy) contrasted by a radial pattern of soft edges (grattitude) on the other. This creates a dynamic dialogue between dense clusters of color that suggest pressure and interruption. The use of broken pixels adds a layer of imperfection, enhancing the emotional complexity of the piece, while maintaining a negative space that symbolizes internal conflict and empty rooms. The central shape around the arrow aims to echo the movement of emotions, capturing the upward aspirations clashing with downward pulls in a visually striking way.</desc>
