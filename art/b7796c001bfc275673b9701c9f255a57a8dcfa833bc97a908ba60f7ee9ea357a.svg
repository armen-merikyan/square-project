  <title id="title">Tension Between Worlds</title>
  <desc id="desc">This artwork encapsulates the emotional push and pull between defiance and submission. The palette of sepia, tan, dust gray, and faded blue suggests a nostalgic yet conflicting landscape. The dark colors represent bulk and resistance, contrasting against lighter shades that signify yielding and calm. The main collision occurs diagonally, symbolizing the tension between opposing forces; this is enforced by a patchwork of blocks and static noise that disrupts order. The arrangement encompasses both dense patterns and intentional negative space, creating a dialogue of chaos and structure.</desc>
