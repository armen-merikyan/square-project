<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Tension</title>
  <desc id="desc">The emotional tone balances between defiance and submission, encapsulating a core of bright refusal surrounded by softer, enveloping colors. The chosen palette of lime, electric blue, magenta, and black represents vibrancy against void, symbolizing the tension of presence and absence. The main contrast occurs as bright colors spiral inward, suggesting defiance at the center, while softer tones calm yet encircle the edges, creating a delicate struggle. The veil shapes the structure, evoking a sense of interrupted flow and layered emotion through its spiral layout and incorporated broken pixels, adding to the concept of a veil that is both protective and intrusive.</desc>
