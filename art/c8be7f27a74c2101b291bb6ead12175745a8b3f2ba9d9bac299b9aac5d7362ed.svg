<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Elements</title>
  <desc id="desc">This composition encapsulates the emotional tension between spark and ash, illustrating the push and pull of vitality against the remnants of what once was. The palette comprises deep wine, warm ivory, ash gray, soft gold, and stain brown—each color narrates a phase of resilience (spark) and fragility (ash). The main contrast occurs centrally with vibrant hues interspersed within muted sections, representing the collision of life and decay. The 'hinge' and 'maze' patterns embody this duality, while broken pixels add an element of imperfection, enhancing the storytelling through color placement and rhythmic disruption.</desc>
