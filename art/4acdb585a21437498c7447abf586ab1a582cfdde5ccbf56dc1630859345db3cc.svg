<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This piece evokes a deep emotional tension through the clash of the warmth of tenderness against the cold sharpness of rage. The palette—predominantly red and black—reflects the intensity of these emotions, with pale blue and white serving as subdued counterpoints to provide balance and softness. The main collision occurs in the center with a stack of vibrant red breaking into the calm pale blue, representing an interruption of tranquility by underlying turmoil. The layout follows a falling pixels concept, suggesting weight and gravity, while the broken pixels introduce imperfections symbolizing the struggle between these contrasting feelings.</desc>
