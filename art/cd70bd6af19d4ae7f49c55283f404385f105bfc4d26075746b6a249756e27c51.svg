<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">The artwork represents the emotional struggle between defiance and submission through contrasting colors and patterns. The chosen palette of red, black, pale blue, and white conveys both tension and calm. The lower half represents defiance with bold reds and blacks, creating a sense of pressure and motion, while the upper half features cooler tones, suggesting a quiet submission. The main collision occurs at the center, where dense red frames interact with soft blue broken frames, allowing the viewer to sense the push and pull of opposing forces. This juxtaposition reflects the complexities of emotional dynamics and the delicate balance between order and chaos.</desc>
