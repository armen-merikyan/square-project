  <title id="title">Tension of the Machine Heart</title>
  <desc id="desc">This artwork captures the emotional duality of joy and grief through a stark contrast in color. The warm yellows and oranges evoke sparks of joy, while the deep blue and muted purple represent the heaviness of grief. The layout features a zigzag flow, reflecting movement and tension, with off-center patterns echoing the conflict between order and chaos. The use of broken pixels introduces imperfection, suggesting the complexity of emotions experienced. The central focus is a void of negative space surrounded by dynamic colors, symbolizing the struggle between happiness and sorrow.</desc>
