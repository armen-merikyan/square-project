<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the emotional tug-of-war between vulnerability and strength. The top four rows embody softness and exposure with muted tones of pale mint and soft sky, while the bottom rows represent strength through darker, more grounding colors like storm gray and near black. The light halo border creates a protective feeling, contrasting the dense center. Broken pixels serve as intentional imperfections, suggesting the impacts that both emotions have on the self. The main collision occurs where the strong, dark colors meet the soft, light ones, representing a transition from vulnerability to fortified strength, mirrored in both the layout and color placement.</desc>
