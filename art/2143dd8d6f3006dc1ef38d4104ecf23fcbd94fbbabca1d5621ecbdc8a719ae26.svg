  <title id="title">Collisions Within</title>
  <desc id="desc">The artwork explores the emotional tension between trust and suspicion using a stark black and pale blue palette. The left side embodies trust through structured stripes, while the right represents suspicion in a crosshatch pattern, creating a chaotic interplay. The main collision occurs in the center, where the two patterns meet, symbolizing the struggle between stability and uncertainty. The darker tones suggest isolation, contrasted by the gentle pale blue that invites calmness and resilience.</desc>
