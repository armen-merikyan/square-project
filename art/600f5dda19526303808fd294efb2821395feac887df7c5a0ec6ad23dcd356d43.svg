<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs. Shelter</title>
  <desc id="desc">This artwork captures the emotional contrast between vulnerability and strength through the arrangement of pale and dark tones. The chosen palette of guilt and forgiveness colors evokes a sense of depth and tension, with deep wine and soft gold acting as the accents that symbolize resilience amidst vulnerability. The rising signal layout suggests upward hope, with warm ivory and ash gray representing the exposed core, against clear blocks of stain brown. Broken pixels within the grid introduce intentional imperfection, highlighting the tension between safety and exposure, creating a visual collision primarily concentrated at the center. The artwork embodies the struggle between sheltering strength and the risks of openness.</desc>
