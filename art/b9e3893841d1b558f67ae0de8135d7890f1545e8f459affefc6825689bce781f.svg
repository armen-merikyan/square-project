<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece captures the emotional tension of softness fighting against the rigidity of severity. The palette of powder pink and warm white represents softness, while carbon black and sharp crimson introduce a cold boundary of severity. The layout is a mirror effect with intentional breaks that create a pulsating rhythm reflecting balance versus imbalance. A central collision occurs around the mid-left side, where warmth meets coolness. The spiral pattern evokes a sense of ongoing motion, aligned with the idea of conflicting emotional currents. This arrangement embodies the seed's themes of vulnerability juxtaposed with restraint.</desc>
