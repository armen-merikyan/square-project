<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">The artwork captures the emotional tension between relief and dread. The chosen palette of pale mint, soft sky, storm gray, near black, and faded gold reflects the contrast where lightness battles heaviness. The dense dark colors dominate the top corner, creating pressure, while softer hues spill out, embodying a release. The interplay — a battle of broken pixels against structured flows — evokes the ancient struggle of light fighting shadow, thereby transforming chaos into an abstract, resonant pattern.</desc>
