<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Shades</title>
  <desc id="desc">This piece represents the emotional tug-of-war between longing and resolve, captured through a palette of burnt orange and gold representing warmth and passion, contrasted against deep charcoal and dark red embodying conflict and urgency. The layout introduces a sense of asymmetry, where the left and right sides suggest a mirrored quality but with deliberate broken pixels to enforce a sense of repair amidst damage. The collision occurs mainly in the central region, where static patterns of longing meet the quiet fields of resolve, creating a dynamic visual rhythm that embodies both tension and release. The arrangement resonates with the feelings of an unfinished bridge connecting these emotions, while leaving negative space emphasizing the theme of separation and distance.</desc>
