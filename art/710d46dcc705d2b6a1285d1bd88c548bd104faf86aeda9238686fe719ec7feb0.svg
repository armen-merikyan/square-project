<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Fractures</title>
  <desc id="desc">This artwork embodies the tension of 'panic vs control' by dividing the composition into structured and chaotic elements. The left side maintains a checker pattern to represent control, while the right side disrupts this with erratic broken dots, symbolizing chaos. The palette of dark colors (navy and black) accentuates feelings of loneliness, contrasted by bright dim cyan and white sparks that signify moments of clarity amidst disruption. The sharp and soft contrasts enhance the feelings of stress and calm coexistence, leading to a visual narrative of inner conflict. The arrangement reflects emotional descent with more uninterrupted space at the top and dense collision at the bottom, mirroring the flow of panic descending into an empty, chaotic space.</desc>
