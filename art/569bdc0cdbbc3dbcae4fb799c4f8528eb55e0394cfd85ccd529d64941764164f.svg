<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">This artwork explores the emotional tension between awe and terror, using the palette of deep burnt orange, dark red, and gold against a backdrop of charcoal gray. The sharp vs. soft contrast is evident in the use of radial patterns for awe (represented by gold and burnt orange) and chaotic spark patterns for terror (depicted through dark reds on charcoals). The layout reflects an empty room with a central focal area filled with fragmented yet soft shapes, emphasizing both stability and instability. The composition suggests a story of confrontation and balance between overwhelming emotion and solace.</desc>
