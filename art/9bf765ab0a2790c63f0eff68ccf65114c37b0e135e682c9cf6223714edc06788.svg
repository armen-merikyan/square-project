<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This composition captures the emotional tension between desire and emptiness. The chosen palette includes warm tones of hot coral and blood orange against the cooler hues of charcoal and hollow blue, establishing a striking contrast that speaks to the push and pull of these emotions. The central section is dense with color, indicating an overwhelming thirst for fulfillment, while the edges remain muted, suggesting containment and restraint. Broken pixels add intentional disruptions, mirroring the imperfect journey from emptiness to yearning. The collision occurs primarily in the center, where passion and meekness fight for prominence, embodying the core of the emotional narrative.</desc>
