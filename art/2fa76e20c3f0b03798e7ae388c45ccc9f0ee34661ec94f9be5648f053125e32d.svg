<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict in Color</title>
  <desc id="desc">This composition captures the tension between defiance and submission through a contrast of angular resistance and enclosed fields. The palette—comprised of warm yellows and oranges against muted purples and deep blues—reflects joy intertwined with grief, enhancing the dialogue between chaos and order. The central area of warm colors disrupts the cooler, quieter boundaries, representing an emotional collision. The use of broken pixels adds imperfection, suggesting the fallout of these contrasting feelings. As such, this abstract piece embodies a push-pull dynamic, with colors vibrating against the quiet backdrop that surrounds them.</desc>
