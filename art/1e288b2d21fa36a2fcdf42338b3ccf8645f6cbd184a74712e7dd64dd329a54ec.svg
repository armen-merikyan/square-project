<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal Through Shadows</title>
  <desc id="desc">The emotional tone of this piece balances between trust and suspicion, creating a tension that is visually represented through the choice of colors and patterns. The muted greens and warm browns suggest stability, while the stark contrasts of pale skin tones and cold whites evoke feelings of uncertainty and coldness. The main collision occurs in the center, where the patterns of 'static' and 'barcode' overlap and disrupt each other, symbolizing the noise within clear intentions. The negative space allows for breathing room amidst the dense colors, embodying the tension encapsulated by the seed.</desc>
