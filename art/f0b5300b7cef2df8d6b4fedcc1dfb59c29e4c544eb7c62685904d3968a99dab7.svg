<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory vs Motion</title>
  <desc id="desc">This artwork plays with the emotional tension between softness and severity, using a directed palette of soft pinks and stark blacks to create contrast. The soft colors suggest gentleness and reflection, while the dark tones introduce a sense of weight and severity. A collision occurs in the center where the clustered pink broken dots meet the linear negative crosses of gray and black, creating a visual echo of interrupted patterns. The arrangement reflects the seed's theme of dynamic emotions with uneven density, representing the push and pull of guilt and forgiveness.</desc>
