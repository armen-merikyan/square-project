<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This piece captures the emotional duality of love and betrayal through contrasting warm and cool colors. The color palette swings between soft pinks, indicating warmth and affection, and dark maroons and grays symbolizing coldness and mistrust. The layout is intentionally sparse, creating an 'empty room' feel which symbolizes the isolation that often accompanies betrayal. Dark edges suggest ghosts of sharper emotional states, while symmetry is broken with disrupted patterns of diamonds and stripes, reflecting the conflict between love's wholeness and betrayal's fractures. The sharp angles imply tension while softer areas provide moments of pause, creating a dynamic interplay that resonates with the heart's journey. The collision happens in the central diagonal pathways where warm and cool contrast most intensely, embodying the complex relationship between these emotions.</desc>
