<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Dark</title>
  <desc id="desc">This abstract artwork embodies the emotional tension between fear and hope through its contrasting color palette and compositional structure. The top half, representing fear, utilizes dark hues (black and dark violet), creating a stark, heavy atmosphere with jagged edges and a mirror-like reflection pattern that suggests inner turmoil. The bottom half transitions to hope with soft golds and pale greens, employing a broken dots pattern that emits a sense of lightness and the warmth of possibility. The central division acts as a doorframe between two emotional realms, emphasizing the push and pull between weight and luminosity. As such, the square resonates with the stories of conflict and resolution, urging viewers to navigate through the shifting feelings of anxiety and optimism.</desc>
