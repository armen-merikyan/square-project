<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resilience</title>
  <desc id="desc">This piece conveys the duality of vulnerability and strength, with bold dark colors representing strength in contrast to lighter hues symbolizing vulnerability. The palette was chosen to reflect clarity and confusion, evoking a sense of tension and interplay. The central collision occurs between darker edges and a lighter core, suggesting a transition from pressure to release, embodying the relationship of safety and exposure. As pixels descend, they alternate between structured density and chaotic softness, allowing for both quiet spaces and dense clusters that reflect emotional depth.</desc>
