<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Balance</title>
  <desc id="desc">This composition captures the emotional dialogue between restlessness and peace. By contrasting gentle tones of pale mint and soft sky with deeper shades like storm gray and near black, the grid evokes a sense of calm disrupted by dynamic tensions. The dark colors represent the undercurrents of restlessness that interrupt the structure. The main collision occurs diagonally, showcasing how peace is punctuated by unsettling bursts of darker shades, creating an energetic push-pull. The arrangement results in an 8x8 field where serenity and agitation coexist, allowing the viewer to feel both the quiet and conflict within the piece.</desc>
