<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Echoes</title>
  <desc id="desc">This piece captures the emotional conflict between yearning and determination. The palette blends warm browns and greens to evoke safety while introducing cool whites for tension and interruption. The primary collision occurs in the central area, where deep, vivid colors pulse against muted hues, mirroring the unresolved nature of the seed, reflecting a broken yet repairable reality. The layout maintains a border of quiet negative space, framing juxtaposed patterns of longing (split-screen) and resolve (teeth), creating visual dissonance yet retaining a coherent narrative of emotional waves.</desc>
