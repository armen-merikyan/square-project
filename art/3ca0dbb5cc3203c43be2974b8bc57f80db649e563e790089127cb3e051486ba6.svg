<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Connection</title>
  <desc id="desc">This artwork captures the emotional struggle between loneliness and connection through juxtaposed warm and cool colors. A rich burnt orange and dark red palette signifies the intensity of connection while charcoal delineates the shadow of loneliness. The checker pattern for loneliness creates isolation, contrasting sharply with the broken dots pattern representing connection. Each color placement invokes a sense of tension and release, with the center heavily weighted and surrounded by spaces that either amplify or soften the emotional impact, capturing the essence of hidden versus exposed feelings.</desc>
