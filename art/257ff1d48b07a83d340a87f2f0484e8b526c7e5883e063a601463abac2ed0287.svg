<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Control</title>
  <desc id="desc">The composition reflects the emotional dichotomy between panic and control through contrasting patterns. The warm yellows and oranges represent energy and intensity, while deep blue and muted purple serve as a calming counterbalance, signifying control amidst chaos. The interplay of structured grids and erratic stairs embodies the conflict at the center versus the edges of the canvas, leading to a visual tension that suggests an emotional struggle between stability and anxiety. The broken pixels introduce imperfection, enhancing the sense of unease while maintaining a touch of negative space to prevent overwhelming density.</desc>
