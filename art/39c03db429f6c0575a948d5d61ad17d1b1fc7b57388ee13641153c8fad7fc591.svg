<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erosion in Balance</title>
  <desc id="desc">This composition reflects the emotional push and pull between rage and calm through stark contrasts and dynamic patterns. The palette of red and black represents the intensity of rage, while pale blue and white embody calm, maintaining a dialogue in the negative space. The arrangement creates jagged interruptions among the smoother fields, symbolizing the erosion of symmetry. The collision of sharp 'crack' patterns against articulated 'braid' forms highlights tension and resolution within the piece, mirroring the seed's exploration of emotional discrepancies.</desc>
