<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Heartbeats</title>
  <desc id="desc">The emotional tone intertwines joy and grief, creating a dialogue between warmth and muted sadness. The palette, consisting of yellows and deep blues, emphasizes joy’s expansive spark and grief’s weighing presence, visually capturing the interplay of these emotions. The edges are jagged, reflecting the broken nature of love and relationships. The center is slightly disrupted while the colors pulse in a diagonal flow, suggesting both collision and connection. The use of negative space (light grays) allows breathing room, symbolizing the weight of unspoken grief in contrast to the vibrant joy.</desc>
