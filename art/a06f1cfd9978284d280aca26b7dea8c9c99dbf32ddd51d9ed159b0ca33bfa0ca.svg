<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Shelters</title>
  <desc id="desc">This artwork reflects the tension between safety and exposure through a color palette that contrasts warm brown and shelter green, representing safety, against cold white and open blue, symbolizing exposure. The main collision occurs in the center, where ripple patterns of white interact with ring patterns of brown, creating a dynamic interplay of preserved and exposed emotions. The layout shows two small centers, echoing each other across negative space, reflecting the tension described in the seed. Broken pixels add intentional disruptions, enhancing the feeling of vulnerability and protection.</desc>
