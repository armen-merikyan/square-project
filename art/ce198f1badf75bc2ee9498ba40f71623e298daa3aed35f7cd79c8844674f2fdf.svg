<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Emotion</title>
  <desc id="desc">The emotional tone is a striking contrast between 'relief' and 'dread'. The palette integrates soft pinks and reds representing relief against the heavy darkness of dark maroon and muted grays, illustrating the tension of feeling overwhelmed versus finding calm. The placement of lighter colors in the top left suggests relief breaking through, while the saturation and heaviness descend down, embodying dread. The pattern reflects a split-screen where the relief in circular dot patterns struggles against the heavy, blocked forms of dark maroon and gray that fill the space. The layout begins in a corner, gradually spreading diagonally, emphasizing a slow invasion of relief struggling against oppression.</desc>
