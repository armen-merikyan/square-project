<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This composition embodies the emotional duality of fear and hope, represented through a contrasting palette of dark and vibrant colors. The use of black and dark violet reflects the weight of fear, creating a dense backdrop that contrasts with the soft gold and pale green, symbolizing the light of hope. The sharp vs. soft contrast creates a visual tension, with jagged edges on the darker side colliding against smooth stripes of hope, suggesting a struggle between dark and light. The layout mimics a mirror, emphasizing the duality while intentionally breaking the pattern, echoing the unpredictability of emotion.</desc>
