<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Equilibrium</title>
  <desc id="desc">The emotional tone embodies the tension between panic and control, captured through a zigzag flow that intersperses orderly structures with chaotic sparks. The palette of deep navy and dim cyan embodies a lonely signal, which contrasts sharply against the blackened edges representing burned emotions. The core area is rendered in stark divisions: an underlying controlled crosshatch pattern sporadically interrupted by jagged sparks of color, suggesting a heart at odds with itself. The placement of darker hues provides a grounding contrast to the lighter, chaotic sparks, enhancing the sense of collision and unresolved motion, while ensuring negative space remains evident as a backdrop to this emotional struggle.</desc>
