<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Dissonance</title>
  <desc id="desc">The emotional tone explores the tension between defiance and submission using a palette that juxtaposes cool and warm tones. The deep blue-black contrasts sharply against the warm coral and soft amber, embodying the push-pull dynamic. The main collision happens where bright accents disrupt the softer elements, echoing a struggle between chaos (signal) and calm (noise). The arrangement manifests an inward spiral against a backdrop of quiet resistance, representing the inward nature of conflict and the stark tension captured in the interactions. Pixels are intentionally distorted to convey imperfections, symbolizing the non-linear nature of emotions.</desc>
