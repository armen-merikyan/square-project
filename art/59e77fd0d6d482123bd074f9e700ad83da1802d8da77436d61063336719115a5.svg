<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">The composition speaks to the contradiction between longing and resolve through the use of warmer coral and soft amber that contrast against cold slate and blue-black tones. The warm colors begin in the top-left corner, symbolizing longing, and spread diagonally while the cold colors, representing resolve, occupy the opposite diagonal to create an ongoing conversation across the grid. Broken pixels are scattered sparsely, adding moments of disconnection and creating a sense of imperfection, enhancing the emotional conflict. The halo border softens the edge of the spread, ensuring a fluid connection between the two emotional states, while the mixture of patterns from ripple to spark reflects the varying intensity of each feeling, encapsulating a visual journey from intimate warmth to a controlled boundary.</desc>
