<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">This artwork captures the tension between defiance and submission through a dense center, suggested by dark navy and black tones, and encroaching lighter colors. The palette emphasizes a lonely signal surrounded by a chaotic backdrop, suggesting a struggle for space and identity. The main collision occurs where the dense center meets the struggling edges, embodying the pressure and release of the contrasting emotions. The broken pixels introduce an element of imperfection, symbolizing disruption in the otherwise structured emotional landscape.</desc>
