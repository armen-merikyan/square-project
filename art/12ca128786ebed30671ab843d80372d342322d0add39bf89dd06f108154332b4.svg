<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Fields</title>
  <desc id="desc">This artwork captures the emotional dichotomy of vulnerability and strength through color and texture. The palette of black, dark violet, soft gold, and pale green reflects a spectrum of fear and hope. The dominant dark tones symbolize strength while the softer hues suggest vulnerability. The center, representing stability, contrasts with the surrounding 'braid' patterns meant to evoke vulnerability, creating a dynamic interplay. The flow is outward from the corner, embodying the idea of expansion and invasion. Broken pixels disrupt the surface, symbolizing imperfections and scars of experience, while 10% negative space creates room for contemplation, enhancing the emotional tension. The primary collision occurs diagonally, inviting viewers to engage with the contrast between the robust and the fragile.</desc>
