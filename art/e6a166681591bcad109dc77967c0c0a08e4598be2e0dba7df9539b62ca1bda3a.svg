<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Calm</title>
  <desc id="desc">This piece captures the tension between restlessness and peace, manifesting as a collage of soft and sharp elements. The chosen palette of guilt and forgiveness tones, including deep wine and warm ivory, evoke a sense of depth and warmth while introducing slight dissonance. The main collision occurs at the center, where jagged stripes of deep wine conflict with smoother, soft gold fault lines, echoing the struggle of memory versus motion. The edge style, featuring broken frames, introduces interruptions that symbolize fractured thoughts and fleeting moments of clarity amidst chaos. Each row has been carefully crafted to establish both density and spaciousness, with intentional broken pixels creating a subtle imperfection reflective of human emotion.</desc>
