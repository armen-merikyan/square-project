<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Stair Step of Emotions</title>
  <desc id="desc">This piece explores the emotional tension between joy and grief through a split composition that uses a warm color palette of yellow and orange contrasting with muted tones of deep blue and muted purple. The joy is illustrated with brighter, vibrant colors that radiate from the center, while grief is depicted in darker, claustrophobic shades towards the edges, creating a stark collision between light and dark. The hard edges emphasize a sense of fragmentation—a visual metaphor for the split between order and chaos. Broken pixels introduce imperfection, echoing the unpredictable nature of emotions. The abstract stair-step pattern suggests a rising tension, balancing amidst contrasting densities from bottom to top.</desc>
