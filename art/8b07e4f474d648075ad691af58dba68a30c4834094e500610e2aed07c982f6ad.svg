<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Harmony</title>
  <desc id="desc">The emotional tone presents a dialogue between joy and grief, where joy brings brightness and expansion, while grief introduces heaviness and low tones. The palette leans towards bright yellows and oranges for joy, contrasting with deep blues and muted purples for grief, embodying the light of happiness battling the weight of sorrow. The main collision occurs at the center, where these oppositional colors meet, creating a dynamic push and pull. The jagged edges enhance the feeling of discomfort, while the stair-step pattern signifies movement and transition from chaos to order. This setup captures the complexity of emotional interactions, creating a rhythm of layering that remains abstract and non-representational.</desc>
