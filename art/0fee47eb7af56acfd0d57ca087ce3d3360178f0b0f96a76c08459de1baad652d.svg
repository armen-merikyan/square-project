  <title id="title">Edge of Contrast</title>
  <desc id="desc">This piece embodies the tension between fear and hope through hard edges and a glowing center, portraying a battle of emotions. The palette of dark violet juxtaposed with soft gold represents the weight of fear against the lightness of hope. The harsh dark borders symbolize dread, while the warm core suggests resilience. The vertical split enhances the collision of emotions, creating an engaging visual flow that moves from tension to hopeful illumination.</desc>
