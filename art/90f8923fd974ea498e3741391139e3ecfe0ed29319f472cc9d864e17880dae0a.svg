<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center of Echoes</title>
  <desc id="desc">This composition explores the tension between softness and severity. The palette combines soft hues of powder pink and warm white with darker accents of carbon black and sharp crimson. The center bursts with saturation, symbolizing the emotional weight of guilt and forgiveness, while the jagged borders create a feeling of struggle to contain these intense emotions. The density towards the center resonates with the idea of pulse marks, while the quiet edges suggest a retreat or reverberation of these feelings, embodying the collision and interaction of opposing forces.</desc>
