  <title id="title">Chaos in Stillness</title>
  <desc id="desc">This artwork reflects the emotional tension between restlessness and peace. The palette combines warm coral and orange tones to evoke a sense of urgency and energy, balanced by the cooler tones of charcoal and hollow blue signifying calmness. The main collision occurs in the central row, where vibrant colors ripple against muted tones, symbolizing the struggle between memory and motion. The arrangement embraces the ‘stacked bands’ layout, capturing shifting emotional strata, with broken pixels representing the imperfections of memory.</desc>
