<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoed Tension</title>
  <desc id="desc">This piece captures the emotional tug-of-war between safety and exposure. The palette, with 'shelter green' and 'warm brown' as dominant colors, reflects a gentle yet stable environment contrasted by the cool 'open blue' for exposure. The edges are jagged, enhancing the feeling of breaks and imperfections, while the center showcases a vivid collision of pressure bands creating a rhythmic interplay between density and openness. The seed's themes of duality inspired the vertical split, facilitating a dynamic interaction between the softness of shades and the severity of boldness throughout the composition.</desc>
