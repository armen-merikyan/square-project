<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece embodies the emotional contrast of tenderness and rage through a collision of hard and soft color placements. The sharp red and black fragments suggest the explosive nature of rage, clashing with the soft pale blue and white accents representing tenderness. The central area remains predominantly pale, implying vulnerability. Broken pixels disrupt the expected pattern creating tension and imprecision, mirroring emotional scars. The arrangement evokes a channel of quiet between two powerful emotional states, framed by sharper edges.</desc>
