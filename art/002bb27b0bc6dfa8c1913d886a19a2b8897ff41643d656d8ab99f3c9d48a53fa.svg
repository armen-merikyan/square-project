<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers in Contrast</title>
  <desc id="desc">This artwork embodies the tension between the vibrancy of 'spark' and the muted presence of 'ash.' The palette, featuring lime and electric blue against black and magenta, illustrates a collision of energy and stillness. The crosshatch pattern of sparks collides with the constellation form of ashes, creating breaks in a broken frame layout that frames the chaos within order. The center is dominated by electric blue, representing abrupt moments of clarity amidst dark, soft edges where memory and erasure meet.</desc>
