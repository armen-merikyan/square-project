<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone captures the tension between restlessness and peace, using a palette that juxtaposes the warmth of hot coral and blood orange with the coolness of charcoal and hollow blue. The central pattern interrupts with energetic broken dots to symbolize restlessness, while glitch patterns represent peace, creating a visual collision in the center with a halo effect around it. The choice of colors emphasizes light versus dark, allowing for a dynamic flow that communicates echoes of memory and motion within a structured grid. The broken pixels disrupt the order, suggesting an ongoing struggle and the constant push-pull between turmoil and tranquility.</desc>
