<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Affection</title>
  <desc id="desc">This composition explores the emotional tension of 'love vs betrayal' through a palette of warm and cool colors, juxtaposing the soft pinks and reds symbolizing love against dark maroon and gray shades representing betrayal. The contrast of density in the top left corner, with dense warm colors, clashes against the stark emptiness in the bottom right, creating a sense of unresolved emotion. The layout reflects a nearly symmetrical composition, disrupted by unexpected breaks, embodying the fracturing of trust. The broken pixel style enhances this tension, emphasizing imperfections that hint at the fragility of love.</desc>
