<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece embodies the emotional tension between vulnerability and strength through the use of a carefully curated palette of soft and strong colors. The dominant colors, 'mist_gray' and 'alarm_red', create a vivid contrast painting a picture of emotional struggle. The arrangement of stronger colors around a softer core suggests a protective layer, while the strategic placement of broken pixels communicates the fragility of strength. The palette emphasizes serenity while hinting at urgency, capturing the essence of the seed. The main collision occurs in the center where the strong colors merge with the soft, highlighting the theme of conflict and coexistence.</desc>
