<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Emotion</title>
  <desc id="desc">This piece contrasts the bright warmth of joy against the muted tones of grief, reflecting the dualities in life. The palette of yellows and oranges introduces a warmth that suggests joy, while the deep blue and muted purples embody the somber tones of grief. The structure is split horizontally to emphasize this contrast, presenting a grid-like pattern for joy that is orderly and uplifting, juxtaposed against a fragmented crosshatch for grief that conveys texture and depth. A few broken pixels add intentional imperfection, suggesting the complexity of emotion and the crisscrossing of experiences.</desc>
