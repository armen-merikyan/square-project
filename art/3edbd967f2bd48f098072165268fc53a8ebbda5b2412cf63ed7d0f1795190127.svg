<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tension</title>
  <desc id="desc">This piece captures the interplay between control and panic through a contrast of structured dots against a chaotic flame pattern. The warm palette of yellows and oranges symbolizes the underlying tension of panic, while muted blue and purple provide a calming counterbalance. The left side features organized, circular patterns representing control, while the right side erupts into jagged overlays, reflecting chaos and emotional turmoil. Broken pixels introduce imperfection, enhancing the theme of disrupted order.</desc>
