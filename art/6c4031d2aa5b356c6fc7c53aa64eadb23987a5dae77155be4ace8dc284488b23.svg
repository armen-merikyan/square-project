<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This piece captures an emotional tension between hollowness and yearning. The palette of hot coral and blood orange suggests desire’s vibrant pull, while hollow blue and charcoal represent a lingering emptiness. The collision occurs centrally, where saturated colors rise like signals against the subtle blue edges. The arrangement hints at cascading, falling pixels, creating a narrative of competition between filling the void and being restrained, palpable in the soft edge transitions.</desc>
