<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Gratitude and Envy</title>
  <desc id="desc">This artwork embodies the emotional tension between gratitude and envy, interpreted as a dialogue of warm and cool colors. The black and dark violet represent the weight of envy, while the soft gold and pale green suggest lightness and gratitude. The center displays a gathering of soft gold dots, symbolizing gratitude, surrounded by a jagged edge of dark violets and blacks signifying the noise of envy. The contrast highlights the emotional collision. The arrangement flows inward, creating a soft pressure against an empty room, evoking a sense of unresolved yearning while maintaining negative space.</desc>
