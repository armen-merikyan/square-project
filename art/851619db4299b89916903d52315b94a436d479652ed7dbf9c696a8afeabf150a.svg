<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Crosshatch</title>
  <desc id="desc">This artwork embodies the tension between loneliness and connection with a striking contrast of dark and bright colors. The chosen palette of black, electric blue, lime, and magenta reflects emotion; the darkness symbolizes isolation while the vibrant colors suggest a yearning for connection. The top-heavy flow creates a feeling of pressure pushing down, while the jagged edges represent disruption. The crosshatched pattern conveys a struggle, evoking feelings of hidden vulnerability alongside bursts of color that seek exposure. The deliberate placement of negative space allows breathability, emphasizing the isolation amidst the bursts of vibrancy.</desc>
