<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symphony of Dissonance</title>
  <desc id="desc">This piece explores the emotional tension between clarity and confusion through color and geometric arrangement. The dark tones of the palette evoke depth and complexity while light accents provide contrast, symbolizing fleeting moments of clarity amidst chaos. The placement of saturated colors at the edges creates a jagged outline, reflecting the theme of uncertainty, while the gradual rise in lighter hues towards the center suggests a yearning for clarity. Broken pixels are scattered throughout, enhancing the sense of discord and imperfection, which is central to the emotional narrative.</desc>
