<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Shadows and Light</title>
  <desc id="desc">This composition embodies a dynamic emotional conflict. The upper rows, steeped in the darkness of fear, use deep tones like black and dark violet, creating a dense atmosphere with jagged transitions. This evokes an oppressive weight, hinting at the anxiety of unresolved emotions. The lower section shifts into a lighter palette with soft gold and pale green, representing hope and optimism. Each color's placement accentuates the tension; dark edges contrast with lighter centers, suggesting light breaking through. The flow from dark to light mimics an upward surge of hope against the suffocating presence of fear, encapsulating the struggle between these two emotions.</desc>
