<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Within</title>
  <desc id="desc">The emotional tone embodies a struggle between envy and gratitude, blending intensity with a grounding calm. The 'ancient_fire' palette contrasts deep burnt oranges and dark reds with the muted stability of charcoal and gold, suggesting an inner turmoil subdued by appreciation. The layout initiates from a corner, representing envy encroaching into the serene space of gratitude, creating a zigzag effect that feels like a pulse of conflicting emotions. Broken pixels add a layer of imperfection, symbolizing unexpected disruptions within the emotional landscape, enhancing the overall depth of feeling. The minimal negative space accentuates the core emotional patterns, illustrating the tension between weight and lightness in this abstract experience.</desc>
