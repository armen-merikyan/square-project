<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Tranquility</title>
  <desc id="desc">This piece captures the emotional interplay between restlessness and peace. The palette blends cool tones (cold white, open blue) to evoke tranquility alongside warm shades (shelter green, warm brown) that reflect the unsettling tendencies of restless thoughts. The main contrast emerges in the diagonal arrangement, where glitch-like disruptions in color texture (representing restlessness) collide with structured grids of softer colors (emblematic of peace), suggesting an ongoing tension. Broken pixels introduced are intentional imperfections, symbolizing moments of disruption amid calm, with a significant area left negative to enhance the feeling of spaciousness and quiet.</desc>
