<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Safety in Exposure</title>
  <desc id="desc">This composition conveys the emotional tension between safety and exposure through a stark contrast in color usage. The palette of soft greens and browns represents the warmth of safety, while the pale skin and cold white hues suggest exposure and vulnerability. The center is deliberately left open, symbolizing a hollow space amid the protective colors on the edges. The horizontal barcodes symbolize safety intertwined with patchwork representing exposure, creating a layered tension that evokes both protection and fear. The collision occurs prominently in the center where the rigid safety patterns intersect with the fluid exposure, demonstrating a battle between comfort and risk.</desc>
