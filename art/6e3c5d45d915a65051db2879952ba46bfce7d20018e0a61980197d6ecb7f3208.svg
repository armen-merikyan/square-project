  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork juxtaposes the themes of vulnerability and strength through a split vertical layout, highlighting a soft break on the left side against structured lattice patterns on the right. The palette blends pale aqua and mist gray, embodying vulnerability, while alarm red and ink blue signify the strength. The collision of these emotions occurs prominently in the center, creating tension and contrasting serenity with urgency. The use of broken pixels mimics the imperfections and scars of emotional experience, adding depth and complexity to the presentation.</desc>
