<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Through Static</title>
  <desc id="desc">This artwork embodies the tension between clarity and chaos, represented by the emotional pair 'signal' and 'noise.' The chosen palette of signal green, electric blue, and hot magenta reflects a vibrant energy fraying at the edges with static gray and dead black providing depth and disruption. The inner section pulses with the green ash field pattern, while the outer border frames the chaotic static. The collision occurs at the center, where the luminous green confronts the oppressive gray, emphasizing a struggle to maintain clarity among distractions.</desc>
