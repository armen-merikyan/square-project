<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This artwork reflects the emotional duel between joy and grief, creating an upward flow on one side, transitioning into a downward movement on the other. The palette features warm yellows and oranges contrasting with deep blues and muted purples, representing the vibrancy of joy against the weight of grief. The 'zigzag' motif suggests unpredictability in emotions while the soft central edges create a sense of containment, enhancing the contrast between the structured joy and erratic grief. The arrangement of colors creates a sense of imbalance which echoes the chaotic nature of the emotional experience, leaving enough negative space to reflect on pain without overwhelming the senses.</desc>
