<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure Echo</title>
  <desc id="desc">This artwork explores the tension between safety and exposure using a bold color palette that contrasts a warm brown and shelter green with a soft cold white and an open blue. The center is densely filled, symbolizing pressure and exposure, while the edges attempt to provide a protective border but are disrupted by broken pixels, suggesting vulnerability. The barcode pattern represents exposure, while the fault line pattern implies safety. The visual balance shows a collision between the dense center and thin edges, creating an evocative interplay of tension and softness.</desc>
