<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Contrasts</title>
  <desc id="desc">This artwork captures the emotional tension between softness and severity, using a color palette of muted and sharp tones. The warm pink and white suggest a softness that collides with the harshness of black and crimson, evoking feelings of guilt and forgiveness amidst a delicate balance. The contrast is centralized, creating a visual pulse at the center that interrupts the diagonal flow from the corner, enhancing the sense of vulnerability amidst the severity. Broken pixels introduce intentional disruptions, mimicking the imperfections found within personal emotions and memories.</desc>
