<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow of Emotion</title>
  <desc id="desc">This artwork captures the tension between longing and resolution through contrasting colors and spatial arrangement. The palette, featuring soft powder pink and warm white, evokes a sense of affection and warmth while carbon black and sharp crimson introduce a firm contrast, emphasizing resolve. The arrangement follows a falling pixel layout, where colors descend, suggesting an emotional release. The main collision occurs in the center of the grid, where dense clusters of crimson and black intersect with expansive fields of soft tones—symbolizing the struggle between intimacy and distance in emotional experiences. Broken pixels introduce imperfections, reflecting the nuances of human emotion and experience.</desc>
