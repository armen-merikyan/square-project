<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Spiral Echoes of Tension</title>
  <desc id="desc">This piece captures the emotional tension between softness and severity through a structured spiral layout that weighs towards darker tones. The palette includes warm whites and soft pinks clashing against deep blacks and grays, suggesting a conflict of lightness versus heavy emotion. The main collision occurs in the center, where dark rigid structures disrupt the flowing lighter islands, creating a dynamic interplay between calm and chaos. Broken pixels introduce intentional imperfections that echo the theme of guilt and forgiveness, leaving space to breathe amidst the tension.</desc>
