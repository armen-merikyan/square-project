<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone juxtaposes warmth from love against the cool detachment of betrayal, creating a tension-filled composition. I selected a palette of pink, red, gray, and dark maroon to reflect these deep emotions, with warm colors representing love and cooler tones signifying betrayal. The main contrast manifests through the density of dark maroon on one side, while the gray and pink emerge in a spiral pattern, simulating a call-and-response of emotions. This arrangement suggests a narrative of oscillation between calmness and turbulence, echoing the central theme of fractured relationships.</desc>
