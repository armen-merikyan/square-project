<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Split Empathy</title>
  <desc id="desc">The emotional tone of 'loneliness vs connection' is expressed through the juxtaposition of dense, dark shades on the left, invoking feelings of isolation, and lighter hues on the right, signifying warmth and connection. The palette emphasizes a transition from black to pale blue, marking an emotional journey from darkness to light. The center seed 'tear' introduces organic shapes that break the structured grid, creating a disruption that mirrors feelings of loneliness amidst a quest for connection. The main contrast occurs at the vertical split, where dark and light collide, allowing for a dynamic echo of emotion that resonates through the arrangement.</desc>
