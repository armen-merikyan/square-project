<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Tension</title>
  <desc id="desc">This composition explores the tension between defiance and submission through contrasting colors and patterns. The left side, embodying defiance, utilizes darker tones (dark maroon and gray) that symbolize strength and resistance against submission, represented on the right by lighter shades (pink and red). The bottom-heavy arrangement reflects a weighty emotional pressure, while the cracked pattern of dark tones interrupts the smoother frames of the light side, suggesting a collision of feelings. The split layout enhances this contrast, with noise introduced by broken pixels amplifying the emotional discord portrayed in the seed.</desc>
