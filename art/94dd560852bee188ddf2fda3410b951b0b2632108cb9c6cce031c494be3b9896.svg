<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Calm and Chaos</title>
  <desc id="desc">This composition explores the emotional tension between restlessness and peace. The palette, inspired by 'gratitude_envy', uses ripe green and honey gold to evoke calmness, while deep olive and acid green introduce a sense of unrest. The pattern types of ripple for peace and ladder for restlessness create a tension through their contrasting layouts. The main collision occurs diagonally across the square, highlighting the interplay of motion and stillness. Broken pixels act as intentional disruptions, simulating the fleeting nature of memory and emotion. This arrangement presents a journey from calm to chaos, inviting the viewer to explore their own feelings within that spectrum.</desc>
