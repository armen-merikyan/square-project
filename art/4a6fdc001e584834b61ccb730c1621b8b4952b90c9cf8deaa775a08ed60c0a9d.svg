<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Dissonance</title>
  <desc id="desc">This piece encapsulates the emotional tension between awe and terror, using a palette that juxtaposes warm tones of yellow and orange against muted blues and purples. The duality evokes a sense of both wonder and dread. The central contrast occurs in the arrangement, where warm and cool colors collide, creating visual 'waves' that ebb and flow, reflecting order versus chaos. The use of broken pixels introduces imperfections that suggest fragmented memories, enriching the narrative of stability versus instability. The soft edges temper the harshness of the colors, inviting contemplation amidst the emotional noise.</desc>
