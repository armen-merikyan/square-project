<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">The emotional tone reflects a struggle between control, represented by strong, dark outlines, and surrender, expressed through soft, lighter colors. The selected palette, a mix of red oxide and muted cream, creates a juxtaposition of warmth and restraint. The collision occurs at the center, where the dense dark colors meet the lighter, airy tones, signifying an overflow into containment. This interplay embodies the chaotic dynamics of tension as colors push against one another within the structured 8x8 grid, leaving ample negative space to evoke a sense of uncertainty and unresolved emotion.</desc>
