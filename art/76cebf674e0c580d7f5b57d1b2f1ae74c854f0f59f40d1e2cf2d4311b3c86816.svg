<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Exposure</title>
  <desc id="desc">This composition explores the tension between vulnerability and strength through the contrast of colors and patterns. The palette combines warm coral and soft amber shades to convey a sense of warmth and exposure, while blue-black adds depth, suggesting rooted strength. The left side of the grid displays glitched patterns, representing strength with dense, thick edges, contrasted by soft, tooth-like interruptions in lighter hues on the right. The central collision marks an exposed area surrounded by weighted blocks of color, portraying a sense of both safety and recklessness. The broken pixels deliberately disrupt the uniformity, echoing the nuance of vulnerability. The flow from top to bottom indicates a shift from exposure to shelter, reinforcing the emotional narrative within the grid.</desc>
