<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Spaces</title>
  <desc id="desc">The emotional tone reflects the conflict between love and betrayal, illustrated through a contrasting palette of warm pinks and reds against muted grays and deep maroon. This suggests warmth battling against shadows of doubt. The chosen pattern strength is derived from a checkerboard that communicates the structured warmth of love, disrupted by cracked lines indicating betrayal's presence. The tension points occur diagonally as colors clash along the edges, embodying emotional dissonance while leaving space to signify unresolved feelings. The broken pixels create its imperfection, enhancing the rhythm of conflict and resonance.</desc>
