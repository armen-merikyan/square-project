<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">This artwork embodies the emotional push-pull between relief and dread. The palette combines soft mint and pale sky to suggest relief, contrasting against storm gray and near black to evoke dread. The layout divides the square diagonally, with lighter colors filling the upper-left corner, nurturing a sense of space and calm while the lower-right corner populates with darker figures that crowd and intrude. Broken lines represent imperfections, while irregular pixel placement creates an underlying tension and collision, harmonizing with the underlying theme of ancient fire as both a source of warmth and a fierce, consuming force.</desc>
