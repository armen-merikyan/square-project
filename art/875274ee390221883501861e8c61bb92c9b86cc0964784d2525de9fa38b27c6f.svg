<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Signals</title>
  <desc id="desc">This piece captures the emotional dichotomy of love and betrayal through an interplay of warmth and coolness. The palette combines soft pinks and reds, indicative of love, with deeper maroons and muted grays that represent the shadows of betrayal. The overall layout features a flow where pixels appear to cascade downward like falling tears, with the primary collision occurring diagonally across the piece, creating visual tension that echoes the themes of rising signals versus the weight of betrayal. The imperfect edges enhance the sense of brokenness, embodying the fragility of emotions while still allowing for moments of space—representing negative space reflecting calm amidst chaos.</desc>
