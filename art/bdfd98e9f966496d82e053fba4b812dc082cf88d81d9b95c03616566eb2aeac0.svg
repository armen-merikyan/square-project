<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Calm</title>
  <desc id="desc">This artwork embodies the emotional tension between rage and calm. The palette is dominated by deep blacks and fiery reds to represent the intensity of rage, contrasted with soft whites and pale blues to evoke calmness. The central dense area consists of jagged red patterns (representing rage) colliding with smooth, horizontal blue pathways (symbolizing calmness) at the center of the grid. The layout captures the struggle of overflowing emotions attempting to break out of their restraints, with the edges retaining a controlled serenity. Broken pixels introduce imperfections, symbolizing eroded symmetry and an unresolved emotional state. This interaction vividly portrays the collision of feelings while highlighting the dynamic between chaos and tranquility.</desc>
