<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Gravity of Duality</title>
  <desc id="desc">This composition explores the emotional tension between awe and terror through juxtaposition. The palette of lime, electric blue, magenta, and black captures the vibrancy and darkness inherent in the chosen emotions. The lime and magenta act as bright, hopeful blots against the encompassing black, suggesting a struggle between light and dark. The layout creates a split-screen effect—one side pulsating with vibrant noise (terror) and the other striving for stability (awe). Each corner unpredictably bursts with color, while the central square stays grounded in black, embodying the pain of broken memories. The arrangement evokes a quiet pressure where one feels entrapped between chaos and order, emphasizing the delicate balance of fear and wonder.</desc>
