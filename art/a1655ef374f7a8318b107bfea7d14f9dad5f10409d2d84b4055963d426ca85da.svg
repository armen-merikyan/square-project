<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Affection</title>
  <desc id="desc">The emotional tone is one of tension, contrasting love and betrayal. The palette, featuring warm pinks and bold reds versus muted grays and dark maroons, captures this dichotomy. The main collision occurs where warm colors abruptly meet the cold edges, symbolizing the clash between love's warmth and betrayal's chill. The pattern plays with a checker and spark formation, representing the equation of stability disrupted by cracks reminiscent of emotional upheaval. The layout splits emotion, creating a visual narrative of a heart in flux.</desc>
