<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone of this composition reflects a struggle between 'rage' and 'calm', represented by the contrasting use of hot reds against cooler, contained blues and whites. The palette was chosen to invoke feelings of intensity and serenity simultaneously. The main collision happens in the center where harsh red shards interrupt the cool, pale blue flood, reflecting the tension of chaos trying to breach calmness. The zigzag pattern of the rage represents an explosive conflict, while the calm flood creates a sense of serenity that threatens to overflow. Negative space is preserved to allow the viewer to breathe amidst the chaos, mimicking the emotional oscillation implied by the seed.</desc>
