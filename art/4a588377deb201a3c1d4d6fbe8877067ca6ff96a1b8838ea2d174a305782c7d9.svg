<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This artwork captures the emotional tension between 'longing' and 'resolve'. The palette of stain brown, ash gray, warm ivory, soft gold, and deep wine evokes feelings of weight and warmth. The contrast is established through clustered regions of warm colors (resolve) interrupted by larger swathes of cooler, muted shades (longing), symbolizing the push and pull of emotion. The main collision occurs diagonally across the canvas where the shift from intimate warmth to cool distance echoes the narrative of tension and resolution. The use of broken pixels introduces a layer of imperfection, adding depth to the emotional landscape.</desc>
