<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">This composition captures the emotional dichotomy of longing and resolve through a palette of stained browns and soft golds against muted ivories and grays. The interspersed lattice and checker patterns collide, mirroring the pulse of connection and disconnection. The central area features deeper colors representing resolve, while the lighter edges evoke longing, creating a tension that resonates throughout the piece. Broken pixels serve as disruptions, reflecting the imperfections of memory and the scars of unresolved emotions that enhance the sense of urgency within serenity.</desc>
