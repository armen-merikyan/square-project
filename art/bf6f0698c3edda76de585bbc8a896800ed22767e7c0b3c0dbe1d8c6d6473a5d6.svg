<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Signals</title>
  <desc id="desc">The emotional tone balances the deep feelings of emptiness with the yearning desire to connect. The palette, combining warm and cool tones, evokes a conflict where dark shadows represent emptiness while bright accents signify desire. The main contrast occurs between the clashing cool navy and dim cyan against the warm burnished edges emerging from black. The arrangement follows a zigzag layout, with a clean pattern on one side disrupted by broken dots representing chaotic emotion. This contrast simulates a rise and fall, echoing the push and pull of longing amidst solitude.</desc>
