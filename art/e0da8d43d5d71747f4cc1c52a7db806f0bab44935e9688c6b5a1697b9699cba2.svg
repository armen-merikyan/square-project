<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Pressure</title>
  <desc id="desc">This artwork reflects the emotional tension between rage and calm through a juxtaposition of colors and patterns. The palette combines deep blacks and vibrant reds for the chaotic, explosive elements, while soothing pale blues and whites represent calmness. The outer border, crafted with lattice patterns, signifies the overwhelming nature of rage, while the inner core, created using a grid pattern, suggests a sense of quietness struggling to assert itself. The collision occurs primarily at the center where the explosive red elements seep into the calm blue, creating a dynamic interplay of colors that evokes a layered narrative of contained versus overflowing emotion.</desc>
