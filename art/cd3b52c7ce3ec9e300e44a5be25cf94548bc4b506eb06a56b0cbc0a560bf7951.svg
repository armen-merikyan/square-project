<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">This piece embodies the emotional tension between loneliness and connection through the use of contrasting colors and patterns. The palette, dominated by electric blue and magenta against stark black, suggests a pulsating energy, embodying both warmth and isolation. The defined edges create a sense of separation, while the top-weighted layout emphasizes a pull towards the center, representing a yearning for connection. The 'spark' pattern evokes moments of solitary bursts amidst the grid-like structure of life, where echoes of connection are frequent yet fleeting.</desc>
