<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory_vs_Motion</title>
  <desc id="desc">The artwork embodies the emotional dichotomy of control and surrender through organized chaos. The palette 'intimacy_distance' signifies closeness and detachment, mixing warmer shades like 'rose_clay' and 'lamp_gold' against cooler tones such as 'cool_blue' and 'distant_lilac'. The outer border expresses control with a glitch pattern, enclosing a softer, released inner core that utilizes barcode motifs. The center features a noticeable collision, where the cooler colors spill into the warm fields, hinting at an overflow of emotions under pressure while the outer layers maintain a firm outline. Broken pixels are strategically placed to create dynamic imperfections in the order, emphasizing moments of surrender amidst the control framework, allowing the viewer to feel the tension of these opposing states.</desc>
