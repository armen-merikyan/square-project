<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Ignition</title>
  <desc id="desc">This artwork encapsulates the emotional contrast of 'spark' and 'ash' through a palette that combines burnt orange and dark red with the muted presence of charcoal. The jagged patterns represent the clash of sparks against the remnants of ash, creating an uneven dance across the canvas. The bright hues collide and interrupt the cooler tones, suggesting moments of tension and release, while remaining abstract. The composition flows diagonally, with the warm tones dominating while allowing space for the cooler, softer hues to create an atmosphere of contemplation and quiet.</desc>
