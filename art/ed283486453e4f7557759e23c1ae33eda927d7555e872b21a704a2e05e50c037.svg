<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Reflection</title>
  <desc id="desc">This pixel composition embodies the emotional interplay between longing and resolve. The color palette blends warm tones inspired by intimacy with cool hues reflecting distance, creating a visual tension of warmth against coolness. The main approximation of collision occurs at the center, where dense clusters of rose clay and lamp gold represent resolve, while distant lilac and cool blue create a surrounding quiet field of longing. This stark contrast highlights the emotional struggle and beauty drawn from their interaction. The lattice pattern weaves together the steady resolve, while the scar pattern punctuates the artwork with deliberate broken pixels symbolizing the imperfections of both emotion and experience. The layout follows an island-and-sea theme, where the dense center feels like a refuge within the calmer outer colors, evoking a sense of containment amid an emotional overflow.</desc>
