<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Beneath the Surface</title>
  <desc id="desc">This composition evokes the emotional tension between loneliness and connection through an interplay of dense and sparse color placements. The palette, dominated by deep navy and stark black, embodies loneliness, while the hints of single white and dim cyan signify fleeting connections. The structure is intentionally asymmetrical, with top-weighted darker rows suggesting a weight of solitude, while lighter pixels intermittently pierce through, representing moments of connection. The broken pixels create an imperfect flow, mirroring the fragility of emotional connections. The crosshatch pattern against a grid motif captures the duality of hidden versus exposed feelings, reinforcing the narrative without visual representation.</desc>
