<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This piece explores the emotional tension between softness and severity, using a palette of powder pink, warm white, carbon black, steel gray, and sharp crimson to highlight contrasts. The radial pattern of severity collides with the stacked pattern of softness, creating a vibrant intersection in the center that symbolizes conflict and coexistence. The slight asymmetry and broken pixels introduce intentional disruptions, expressing the emotional scars of guilt and forgiveness, while the bottom weighting evokes a sense of grounding amidst the open gates of possibility.</desc>
