<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erosion of Balance</title>
  <desc id="desc">This artwork explores the contrast between rage and calm through an interplay of sharp, hot colors and gentle, cool hues. The palette features intense red vying against pale blue and white, symbolizing the struggle of passionate chaos against soothing tranquility. The chaos is present in jagged patterns of red that interact sharply with soft, crack-like structures in blue and white, primarily concentrated in the center to show dominance. The layout evokes a sense of eroded symmetry, with corner sparks of color hinting at sudden bursts of emotion interrupting calm spaces. The broken pixels add imperfection, embodying the friction of these contrasting emotional states, while allowing for pockets of negative space that reflect moments of quiet.</desc>
