<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance Between Extremes</title>
  <desc id="desc">This artwork explores the emotional tension between awe and terror, showcasing warm and cool elements that create conflict. The chosen palette, featuring bold red against a grounding black, alludes to feelings of rage and calm, capturing life’s dichotomy. The contrast between the intense, vibrant pixels and soft, muted spaces mirrors the sense of instability versus stability. This fragmentation reinforces the idea of broken memory, echoed by the scattered pixel arrangement. The piece embodies a wave of chaotic energy that fluctuates, representing the ongoing struggle between order and chaos, like a pulse of raw emotion.</desc>
