<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This piece explores the emotional collision between defiance and submission, represented through a jagged edge layout that evokes tension. The palette employs hot coral and blood orange for moments of resistance, while dust pink and charcoal suggest submission's enveloping nature. The center of the grid is disrupted by broken pixels, reinforcing the feeling of attack versus protection. The main contrast occurs at the center, embodying the struggle between opposing forces, capturing an inward spiral of emotion.</desc>
