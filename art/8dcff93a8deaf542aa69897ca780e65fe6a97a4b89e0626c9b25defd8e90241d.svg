  <title id="title">Order vs Chaos</title>
  <desc id="desc">This artwork explores the emotional tension between softness and severity. The palette features soft pastels juxtaposed with stark blacks and grays to represent the divide between comfort and sharpness. The primary contrast occurs at the center, where soft pinks and whites collide with deep blacks, suggesting an internal struggle. The arrangement hints at a spiral pattern with greater density toward the bottom, reinforcing the concept of bottom weight, while negative space invites contemplation, framing the dynamic relationship between the elements.</desc>
