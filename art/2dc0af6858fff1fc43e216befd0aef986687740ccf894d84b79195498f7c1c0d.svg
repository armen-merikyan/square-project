<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This piece captures the emotional tension between defiance and submission through a vibrant palette of yellow and orange contrasted with deep blue and muted purple. The bright colors in the center symbolize defiance, while the surrounding muted tones represent submission, creating a striking contrast. The edge style reflects an uneven border, allowing the center's energy to leak outward, embodying a push-pull dynamic. Pulse marks suggest rhythm and energy while glitches represent disorder. The overall composition uses negative space to enhance the feeling of tension and release.</desc>
