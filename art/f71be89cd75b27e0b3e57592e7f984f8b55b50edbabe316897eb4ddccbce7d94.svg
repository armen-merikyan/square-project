<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone oscillates between anxiety (panic) and stability (control), embodied through intersecting patterns of cracked and checkered forms. The palette of sepia, tan, dust gray, and faded blue reflects a sense of nostalgia and muted emotions, providing a stark contrast that evokes tension and memory. The primary contrast occurs in the interplay between dark, heavy colors and the sporadic, lighter ones, creating a dynamic rhythm of light and weight. The concept of the moon, as a distant light source, manifests as pale interruptions amidst density, contributing to the overall abstract narrative of conflict and resolution.</desc>
