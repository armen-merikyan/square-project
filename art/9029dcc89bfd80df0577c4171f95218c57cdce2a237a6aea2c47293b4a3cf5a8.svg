<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">This piece reflects the emotional tension of longing and resolve, with the upper four rows expressing longing through soft, hollow patterns, and the lower four rows conveying resolve with glitch-like interruptions that suggest strength and assertiveness. The palette of moss green and bone white symbolizes resilience and fragility, while rust and stone gray add depth and contrast, laying bare the emotional struggles between the two opposing forces. The predominant use of broken pixels emphasizes imperfections and the nuanced texture of the human experience. The collision of soft and glitch textures signifies a dialogue—an unresolved interplay between desire and determination, contained within an 8x8 square.</desc>
