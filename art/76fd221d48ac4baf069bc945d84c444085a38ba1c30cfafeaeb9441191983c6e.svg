<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This piece explores the emotional tension between panic and control. The palette of pinks and dark maroon creates a contrast, suggesting warmth against an intensity that is almost overwhelming. The central lines break into radial patterns at the edges, evoking chaos and urgency. The control is represented by structured, broken dots, juxtaposed with the fluid radial directions of pinks that blur and bleed, suggesting the overwhelming nature of panic as it encroaches in waves. The layout is designed to evoke an argument, with soft edges creating movement and flow throughout the piece. The negative space leaves room for the viewer to feel the tension, embodying the struggle between calm presence and chaotic emotion.</desc>
