  <title id="title">Conflict of Hearts</title>
  <desc id="desc">This piece embodies the tension between love and betrayal by juxtaposing warm and cold hues. The palette features vibrant pinks and reds representing love, confronting the darker gray and maroon tones signifying betrayal. The contrast lies at the center where the warm grid-like pattern of love collides with the chaotic maze structure of betrayal. The broken pixels introduce an element of imperfection, reminding us of the fragility of human emotions and connections. The layout emphasizes two fighting patterns, with negative space enhancing the sense of uncertainty and unresolved feelings.</desc>
