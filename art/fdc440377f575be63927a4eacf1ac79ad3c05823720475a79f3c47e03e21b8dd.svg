<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This artwork captures the emotional clash between pride and shame through stark contrasts and a diagonal layout. The palette of lime, black, electric blue, and magenta symbolizes the vibrant struggle of emotions — lime for pride's brightness, black for shame's heaviness, electric blue for tension, and magenta for passionate release. The composition features a corner invasion pattern, enforcing pressure from the dominate colors in one corner, creating a sense of conflict that interrupts the flow towards calm. Broken pixels introduce imperfection, reflecting the unpredictability of emotions. Negative space is respected, offering respite from the intense color collision, embodying the theme of emotional release.</desc>
