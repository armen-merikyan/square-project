<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition explores the emotional tension between desire and emptiness. The palette features warm colors like hot coral and blood orange to embody desire, contrasted against muted tones of charcoal and hollow blue that evoke a sense of emptiness. The layout creates a threshold effect, visually splitting the canvas where desire's glitchy brightness collides with emptiness's tranquil islands. The viewer can feel the dynamic pull of saturation battling against the hollow spaces, allowing the main contrast to breathe through occasional broken pixels that disrupt the order and inject energy, making it a vibrant yet contemplative scene.</desc>
