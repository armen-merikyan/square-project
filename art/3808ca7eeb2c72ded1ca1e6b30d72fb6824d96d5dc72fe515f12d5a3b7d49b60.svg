<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shattered Serenity</title>
  <desc id="desc">The emotional tone explores the tension between restlessness and peace. The chosen palette of soft cyan, muted plum, and lavender gray juxtaposes tranquil hues against deeper, restless colors. The dominant dark mass in the center represents the heavier internal struggle, evoking a sense of confinement, while lighter accents sparkle at the edges, suggesting fleeting moments of peace. The juxtaposition of barcode patterns (peace) and thread patterns (restlessness) collide predominantly at the center, creating a visual noise that echoes the feeling of motion against calmness.</desc>
