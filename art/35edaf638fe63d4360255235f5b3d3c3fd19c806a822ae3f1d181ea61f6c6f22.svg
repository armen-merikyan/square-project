<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The artwork captures the emotional dichotomy between rage and calm through contrasting colors and patterns. Using a palette of deep reds against soft blues and whites, the grid disrupts the calm blue with sharp, jagged points of anger emanating from the center. The interplay between structured grids (rage) and soft textures (calm) represents this tension, while scattered broken pixels signify imperfection and emotional disturbances. The layout splits the canvas vertically, allowing one half to breathe while the other fights for space, echoing the themes of open vs closed.</desc>
