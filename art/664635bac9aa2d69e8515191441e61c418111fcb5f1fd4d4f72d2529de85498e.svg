<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragile Echoes</title>
  <desc id="desc">The emotional tone conveys a delicate push and pull between the exposed and the sheltered. The chosen palette of shelter green, warm brown, pale skin, cold white, and open blue reflects the calming safety of nurturance while also representing stark vulnerability. The main collision occurs in the center, contrasting the warm browns with colder whites, suggesting a dissonance between the soft and the severe. The layout mirrors almost perfectly but purposely introduces broken pixels to symbolize fractures in safety, enhancing the theme of vulnerability. This embodies the complex interplay between safety and exposure, echoing the tension embedded in the seed.</desc>
