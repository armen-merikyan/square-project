<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Duality</title>
  <desc id="desc">This artwork encapsulates the tension between nostalgia and progress through a dichotomous arrangement of colors. The palette features warm hues of yellow and orange, evoking nostalgia, contrasted against the deep blue and muted purple that channel notions of progress. The split horizontal layout employs a mirrored but broken design, emphasizing the rise and fall of memories against aspirations. Dense clusters of warm colors encounter cooler hues to symbolize emotional collision, while negative space elicits an echoing feeling of absence, mirroring the experience of time passing. The full vs hollow contrast highlights moments of fullness marred by emptiness, resonating deeply with the themes of the seed.</desc>
