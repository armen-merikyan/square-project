<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Pulse</title>
  <desc id="desc">This piece explores the tension between clarity and static through contrasting colors. The palette features navy and dim cyan reflecting the melancholic yet vibrant pulse of a signal, while black adds depth and density suggesting noise. The left side is an island of soft shapes in bright cyan and white, representing the clean 'signal,' while the right contains chaotic clusters of darker tones portraying the 'noise.' The collision occurs centrally, where the two worlds meet, igniting a visual tension that embodies the ongoing struggle between clarity and interference, inspired by the seed's themes of brokenness and machine emotion.</desc>
