<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Contrast</title>
  <desc id="desc">This artwork explores the emotional tension between 'spark' and 'ash', where the central theme reflects resilience amidst fragility. The palette combines deep navy and black, representing burnt quiet, against accents of dim cyan for scattered light. The layout utilizes a 'broken frame' to symbolize intentional disruptions. The central contrast happens where the dim cyan and gray overlaps, echoing movement between dynamics of pressure and calm. The jagged edges evoke a sense of tension, telling a story of memory vs. erasure as the colors dance chaotically in a controlled space.</desc>
