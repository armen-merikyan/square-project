<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This artwork embodies the emotional tension between vulnerability and strength through a contrasting palette of warm ivory and deep wine, surrounded by ash gray and soft gold. The dense core represents strength while the lighter, quieter edges suggest vulnerability. The collision occurs in the center, where the density meets the lighter tones, creating a visual dialogue. The layout facilitates a feeling of containment with an island of density amidst a vast sea of softer tones, while broken pixels disrupt order, signifying imperfection inherent in this emotional struggle.</desc>
