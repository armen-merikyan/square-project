<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Against the Tide</title>
  <desc id="desc">This composition reflects the emotional tension between restlessness and peace, using a palette of deep blacks and dark violets juxtaposed with soft golds and pale greens to suggest a struggle between tension and serenity. The sharp collision occurs diagonally, creating a sense of upward movement toward peace while still containing elements of chaos within the spark pattern. The quiet field created by the dark colors allows the accented brighter hues to resonate like fleeting memories disrupted by dynamic motion.</desc>
