<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This artwork explores the emotional contrast between the transient nature of sparks and the persistence of ash. The chosen palette of pale aqua and mist gray evokes a serene yet urgent dichotomy, while alarm red accents symbolize sudden bursts against the muted background. The main collision occurs diagonally, where dense patterns of ash interact with sharper, stacked forms of spark, suggesting memory that clashes with erasure. The quiet channel of negative space introduces a calm rhythm amidst the density, illustrating the tension in resilience versus fragility.</desc>
