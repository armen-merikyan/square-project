<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Tides</title>
  <desc id="desc">This artwork embodies the emotional duality of certainty and curiosity through a dynamic interplay of color and form. The palette combines the chaos of dark violet and black, representing curiosity's depth and uncertainty, with soft gold and pale green for the steadiness of certainty. The outer rows constructed with darker hues signify the overwhelming weight of chaos, while the central square in lighter tones hints at resolution and clarity. The flow centers around a conflict, with broken edges creating intentional disruptions, emphasizing unresolved tension between structured patterns and unpredictable pathways. This emotional complexity plays out as density disrupts negative space, encouraging the viewer to navigate their own responses within this visual narrative.</desc>
