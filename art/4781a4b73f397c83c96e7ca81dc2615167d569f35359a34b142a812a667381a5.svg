<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This composition explores the emotional conflict between vulnerability and strength. The pale aqua and mist gray serve as a quiet field, creating a foundation of softness amidst a rising strength represented by alarm red. The layout is designed to descend like rain, emphasizing the outside-inward flow, while the chosen patterns of 'islands' and 'hinge' collide in the center, generating contrast. Random broken pixels echo disruptions in emotional states, adding intentional imperfection and giving the composition depth without clear symbols or imagery. The tension between the soft and the bold creates a dynamic interplay, inviting reflection on exposure and shelter.</desc>
