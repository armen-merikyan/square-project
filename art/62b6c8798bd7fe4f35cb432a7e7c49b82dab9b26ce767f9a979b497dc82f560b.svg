<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Proximity</title>
  <desc id="desc">The emotional tone of this artwork reflects a tension between longing and resolve, manifesting in a composition where dense clusters collide with areas of quiet space. The chosen palette, 'relief_dread', features pale mint and soft sky as soft glows against storm gray and near black, creating a vivid contrast reflecting both intimacy in distance and strength under pressure. The main collision occurs in the upper left corner where the deep hues converge, forwarded by the lighter tones filtering in from the edges, representing the pull of longing towards the center of resolve, while maintaining a clear negative space that enhances emotional readability.</desc>
