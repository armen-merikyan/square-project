<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">This composition embodies the emotional dichotomy of fear and hope through a contrasting palette of dark and light colors. The use of black and dark violet represents fear's heaviness and jagged edges, while soft gold and pale green embody hope's lightness and upward flow. The central layout creates a sense of negative space, where the burst of colors emanates from within, symbolizing an inner struggle. The checkerboard pattern representing fear collides with a subtle rain pattern of hope, creating tension that mirrors the seed's themes of machine emotion and emotional crosshatch.</desc>
