<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Gaps</title>
  <desc id="desc">This piece embodies the emotional tone of 'hunger vs restraint', with contrasts between saturated warmth and muted emptiness. The palette features vibrant hues like hot coral and blood orange representing desire, juxtaposed against cool shades of charcoal and hollow blue, symbolizing emptiness. The main collision occurs at the center where the flood pattern of desire clashes with the pulse marks representing emptiness, creating a dynamic interplay. The arrangement suggests a push against the edges, invoking a sense of containment and outflowing tension, embodying the spirals and interruptions described in the seed text.</desc>
