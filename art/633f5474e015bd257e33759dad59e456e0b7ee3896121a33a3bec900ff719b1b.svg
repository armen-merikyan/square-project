<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Signals</title>
  <desc id="desc">The emotional tone is a tense interplay between desire and emptiness, encapsulated by the palette mixing deep black and dark violet representing emptiness with soft gold and pale green suggesting warm desires. The sharp contrast of dark tones near the edges collides with warmer center tones, creating a radial noise that echoes the core emotions. The layout flows diagonally from the corner, illustrating a rise against the emptiness, while broken pixels add imperfect detachment, emphasizing loneliness amidst connection. The arrangement suggests both a build-up of desire and an underlying emptiness, reflecting the push and pull of human emotion.</desc>
