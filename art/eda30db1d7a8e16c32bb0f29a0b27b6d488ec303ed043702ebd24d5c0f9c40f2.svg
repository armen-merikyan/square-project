  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone reflects the tension between joy and grief. The palette combines bright yellows and oranges, symbolizing joy, with deep blues and muted purples to convey grief. The contrasting patterns of radial expansion suggest the struggle for dominance, while jagged edges enhance the sense of chaos. The movement from bottom to top creates an uplifting feel on one side contrasted by a downward pull on the other, embodying the duality of emotions. The structured layout allows for both density and negative space, suggesting an ongoing battle between feelings.</desc>
