<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Harmony</title>
  <desc id="desc">This piece explores the emotional collision between trust and suspicion, reflecting the dichotomy through contrasting color patterns. The palette employs deep blues for trust and ashen tones for suspicion, establishing a gradient of warmth and coldness. The main collision occurs in the center, where the soft noise pattern disrupts the more static dot pattern of suspicion, creating a pulse of dynamics. The chosen colors and arrangements convey a sense of pressure and release, suggesting resilience amidst fragility, as indicated by the seed's narrative of complex emotional states.</desc>
