<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Island of Yearning</title>
  <desc id="desc">This composition evokes tension through contrasting emotional tones of desire and restraint. The palette, comprising rich reds and muted earth tones, was chosen to represent the passionate pulse of desire against the calming, yet secure, tones of restraint. The center is densely packed with saturated colors representing desire, while the surrounding muted colors evoke a sense of quiet restraint, creating a collision in the center of the composition. The patterns of 'constellation' and 'ladder' emerge from this contrast, as warmer dots of color push outward against a structured framework of cooler hues, illustrating the push and pull of emotional experience.</desc>
