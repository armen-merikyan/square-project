<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone juxtaposes the warmth of 'spark' against the muted calm of 'ash'. The selected palette, blending mourning black and deep blue with accents of pale yellow and new leaf, illustrates this contrast. The primary collision occurs in the center, where jagged edges of bright color disrupt the darker, layered fields, embodying tension between resilience and fragility. Patterns of braiding and sparking entwine, representing the struggle between impulsive action and controlled restraint, echoed across the diaphanous layers.</desc>
