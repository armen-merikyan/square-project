<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Emotions</title>
  <desc id="desc">The artwork captures the tension between envy and gratitude through a distinct use of color and positioning. The palette of soft pinks and deep maroons reflects the emotional intensity of the themes. The outer edges, populated with darker tones, represent envy—dense and somewhat oppressive—while the lighter, warm hues at the center symbolize gratitude and openness. The arrangement disrupts this emotional landscape with jagged transitions, creating a visual echo of conflict. The pattern of rising and falling emerges through upward-moving colors juxtaposed against downward shades, reflecting the duality of emotional experience and the interplay of pressure and release inherent in the seed.</desc>
