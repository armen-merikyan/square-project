<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">The artwork embodies the emotional tension between vulnerability and strength, using a palette of burnt orange, dark red, charcoal, and gold—colors that evoke warmth and intensity versus muted calm. The patterns reflect vulnerability through soft halos and strength through rigid, stair-like formations. The primary collision is centered, where the warmth of burnt orange interacts with the dark red, representing exposure meeting shelter, creating a compelling contrast that captures the dynamic interplay of emotions. The use of broken pixels introduces intentional imperfections, enhancing the feeling of fragility amidst strength.</desc>
