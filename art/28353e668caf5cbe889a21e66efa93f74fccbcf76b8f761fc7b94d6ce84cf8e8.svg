<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork encapsulates the emotional tension between calm and rage. The color palette consists of red for rage, complemented by cooler shades of pale blue and white to represent calmness. The black frames the chaos, creating a stark contrast that emphasizes the clash of emotions. The main collision occurs in the center where jagged red channels cut through the soft mirror patterns of blue. This juxtaposition translates the seed's complexities into an abstract composition, evoking feelings of pressure and quiet resistance. The structure intentionally incorporates broken pixels to signify imperfections and emotional scars, enhancing the sense of a fragmented experience.</desc>
