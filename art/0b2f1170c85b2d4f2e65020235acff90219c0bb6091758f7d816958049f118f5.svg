<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition captures the emotional interplay between vulnerability and strength through layers of color and contrast. The chosen palette of deep reds, muted creams, and iron grays embodies an underlying hunger for protection while illustrating the rawness of exposure. The main collision occurs in the center where the thick, stair-like edges (strength) are visually disrupted by flowing channels (vulnerability), creating a sense of tension and dynamic motion. This captures the essence of the seed, reinforcing the themes of pressure, desire, and the delicate balance between safety and exposure.</desc>
