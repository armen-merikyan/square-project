<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Emotion</title>
  <desc id="desc">This artwork contrasts the feelings of fear and hope, using a division between dark and light colors that aligns with the 'split_vertical' layout. The left-side features jagged patterns reflecting fear, with deep blacks and dark violets creating a dense atmosphere. In contrast, the right shows hope through soft gold and pale green dots, suggesting a gentle rise amidst tension. The glowing edges border the center, emphasizing the struggle between the darkness of fear and the lightness of hope. This creates a dynamic visual story of emotional duality as the colors pulse against each other, inviting the viewer to explore the space between tension and relief.</desc>
