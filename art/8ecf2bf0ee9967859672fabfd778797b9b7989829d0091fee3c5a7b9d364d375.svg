<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Worlds</title>
  <desc id="desc">This piece captures the emotional duality of rage and calm through a structured split layout. The left side embodies the explosive nature of rage with shades of red that display density and pressure, creating a stark contrast against the serene pale blue of the right side, representing calmness. Each color collides without forming an identifiable shape, reflecting the chaos and tranquility that lives within. The negative space is preserved to enhance the feeling of isolation and distance, creating an echo of the 'tiny face' mentioned in the seed, suggesting loneliness amidst conflict.</desc>
