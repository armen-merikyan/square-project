<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory in Motion</title>
  <desc id="desc">This artwork captures the emotional tension between softness and severity. The palette features powder pink and warm white to represent softness, contrasted sharply by carbon black and sharp crimson, which embody severity. The layout suggests an erosion of symmetry, highlighting this contrast through irregular patterns—soft 'stairs' and rigid 'threads' merging imperfectly. The collision of these elements occurs predominantly in the center, where the bold crimson interrupts the gentler tones, creating a visual echo of tension, where guilt may mingle with forgiveness.</desc>
