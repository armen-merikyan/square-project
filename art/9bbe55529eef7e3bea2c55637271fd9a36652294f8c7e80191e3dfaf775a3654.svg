<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Desired Closure</title>
  <desc id="desc">This composition reflects the deep emotional pull between longing and resolve by utilizing a palette that embodies warmth, urgency, and muted calmness. The main contrast happens between the upper rows, representing longing through a flood pattern of warm reds and pinks, while the lower half embodies resolve with a quieter, cooler gray palette. The dense clusters of warm colors interrupt the calm gray, creating an emotional collision that echoes the themes of brokenness and repair. Broken pixels are intentionally placed to suggest imperfection in the journey towards resolution, enhancing the tension between desire and fulfillment.</desc>
