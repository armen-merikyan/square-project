<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Divided Echoes</title>
  <desc id="desc">This artwork captures the emotional tension between trust and suspicion through sharp contrasts and soft gradients. The top half, representing trust, utilizes a stepwell pattern in warm yellows and oranges to create a feeling of open warmth and a stable base. The bottom half symbolizes suspicion through a muted checker pattern using deep blues and muted purples, evoking unease and reflection. The collision occurs at the center, where the two emotional qualities meet, representing the ongoing battle between openness and doubt. The use of broken pixels throughout the interface adds intentional disruptions, hinting at the fragility of both emotions.</desc>
