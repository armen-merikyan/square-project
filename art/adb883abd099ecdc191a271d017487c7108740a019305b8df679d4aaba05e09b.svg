<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Connection</title>
  <desc id="desc">The emotional tone of this artwork explores the tension between loneliness and connection. The palette combines deep blue to evoke loneliness, countered by vibrant yellow and orange suggesting warmth and connection. The arrangement emphasizes a heavy central area to represent the intense feeling of isolation, surrounded by lighter colors that hint at connection but remain fragmented. The contrast occurs primarily in the center vs. edges, exemplifying 'hidden vs exposed,' where the heart is represented in deep hues while softer colors intermingle at the edges, creating a pulsating feel that resonates with the idea of a tear and ancient fire.</desc>
