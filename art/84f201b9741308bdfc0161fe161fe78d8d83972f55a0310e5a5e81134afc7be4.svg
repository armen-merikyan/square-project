<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece explores the emotional dichotomy of vulnerability and strength. The pale mint (#B3E5E0) at the center evokes a sense of vulnerability, while the storm gray (#A48B8B) borders create a strong contrasting frame, suggesting protection. Faded gold (#E7D44B) instances embody delicate moments within a structure of safety and exposure. The broken pixels introduce intentional imperfections, representing the fragility of confidence amidst strength. The arrangement shows a collision of order and chaos, emphasizing how exposure can either empower or disintegrate.</desc>
