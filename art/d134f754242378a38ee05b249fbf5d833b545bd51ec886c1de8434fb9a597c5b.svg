<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Beacons</title>
  <desc id="desc">This composition captures the emotional tension between longing and resolve through a palette of subdued lavenders and blues, interspersed with soft cyans to create echoes of serenity amidst a backdrop of urgency. The 'checker' pattern of longing collides with the structure of 'stepwell' for resolve, anchoring one side of the composition while allowing flickers of color to resonate in a contained yet overflowing manner. The broken pixels introduce intentional disruptions, symbolizing scars that reflect repair against the tumult of emotions, with a greater focus on the warmer hues signifying longing, while the cooler shades establish boundaries and resolve.</desc>
