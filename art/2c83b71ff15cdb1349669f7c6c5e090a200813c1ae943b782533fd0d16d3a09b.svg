<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork explores the tension between desire and emptiness through the juxtaposition of warm and cool colors. The palette of hot coral, blood orange, and dust pink represents desire, while charcoal and hollow blue symbolize emptiness. The collision occurs centrally, where the pulsating warmth meets the coolness of void, suggesting a yearning that is constantly interrupted. The use of broken pixels adds an intentional imperfection, creating a sense of tension between the structured layout and the unruly emotional currents, embodying the struggle of wanting more while facing restraints.</desc>
