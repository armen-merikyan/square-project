<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Elements</title>
  <desc id="desc">The emotional tone reflects a dynamic struggle between rage and calm, captured through contrasting colors of red and pale blue. The palette invokes tension with dark black framing, allowing the bright red to punctuate the calmness represented by blue. This results in a pattern that oscillates between bursts of intense color and softer spaces, symbolizing the push and pull of emotions. The zigzag flow captures movement, while broken pixels emphasize fragility amidst chaos, echoing the theme of collision faced by the central shape of the moon as it pushes against the darkness.</desc>
