<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">This composition captures the emotional tension between tenderness and rage. The palette of deep reds, muted blacks, and soft blues creates a stark contrast, where rage manifests as sharp, jagged shapes (flood pattern) dominating the canvas, while tenderness is expressed through rounded forms (pressure band) that seek to soften the edges. The center of the square represents the main collision point, illustrating the struggle between these emotions—where the controlled chaos of red interrupts the calm blues, evoking a sense of conflict. Broken pixels enhance this dynamic, suggesting scars of emotional turmoil. The arrangement implies a quiet channel that threads through the intensity, offering moments of reflection amidst the chaos.</desc>
