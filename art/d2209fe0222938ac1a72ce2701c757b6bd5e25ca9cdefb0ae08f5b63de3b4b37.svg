<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">The emotional tone shifts between nostalgia and progress, capturing a moment of conflict and balance. The chosen palette of deep reds and soft blues contrasts well, with black providing grounding and white adding clarity. The top half utilizes a calm, orderly blue grid, suggesting nostalgia, while the bottom intentionally disrupts this with chaotic red and black elements, representing progress amidst a struggle. A dip in color density at the center mimics a drip flow, embodying the tension of rising vs. falling emotions and leaving intentional negative space for breathing room amid the turmoil.</desc>
