<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Pulse</title>
  <desc id="desc">The emotional tone centers on the tension between clarity (signal) and confusion (noise), suggesting a journey through static with glimpses of clarity. The palette was chosen to reflect this: deep blacks convey the enveloping noise, electric blues and magentas offer piercing signals of clarity, while grays represent the static interference. The main collision occurs in the center, where bright accents disrupt the dark edges, symbolizing the readable rhythm that fights through the interference. The layout creates a hollow void that is both quiet and dense, embodying the concept of fighting against echoes.</desc>
