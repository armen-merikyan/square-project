<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contested Rebirth</title>
  <desc id="desc">The emotional tone captures the struggle between ignited ambition (spark) and residual memory (ash). The hot and bright colors push against cooler, muted tones, creating a visual tension that reflects the conflict inherent in personal resilience amidst decay. The palette is a deliberate choice to represent contrasting states—red for energy and vitality balanced with cool pale blue and black suggesting restraint and the weight of memory. The composition centers around a dense red area, suggesting an overwhelming vitality that bleeds outward, interrupted by cooler colors at the edges. The patterns collide and interact, forming a conflictual yet dynamic visual narrative of regeneration and neglect.</desc>
