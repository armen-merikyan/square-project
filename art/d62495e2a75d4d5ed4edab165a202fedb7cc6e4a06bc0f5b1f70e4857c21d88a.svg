<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This artwork embodies the emotional tension between dread and relief. The palette of pale mint, soft sky, and storm gray conveys both heaviness and lightness; the dark colors embody dread while the lighter tones suggest release. The pattern reflects two distinct motifs: a dense accumulation in the top left corner (dread) gradually peeling away into lighter colors (relief). The use of broken pixels throughout introduces intentional disruptions, reinforcing the theme of chaos amidst order. The main collision occurs diagonally across the canvas, creating a visual dialogue of pressure versus liberation.</desc>
