<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of the Heart</title>
  <desc id="desc">This composition captures the emotional dichotomy of joy and grief through contrasting colors and patterns. The palette consists of vibrant yellows and oranges representing joy, clashing with deep blues and muted purples, embodying grief. The interplay creates a visual tension, with the center hinting at an arrow shape to symbolize direction amidst chaos. The jagged edges create a sense of disruption, echoing the emotional conflict, while the use of a grid pattern on one side fosters a sense of structure against a chaotic, tooth-like pattern on the other, emphasizing the theme of pressure and release.</desc>
