  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone reflects the tension between control and surrender. The palette of blues and muted plums embodies melancholy and softness, while the jagged edges induce a feeling of interruption. The left side, dominated by subtle blues, suggests containment with a structured stacking pattern. The right side, with cracks of lavender and soft cyan, offers a release from pressure. The colors collide in the center, creating a visual tension that symbolizes the struggle between the two emotions.</desc>
