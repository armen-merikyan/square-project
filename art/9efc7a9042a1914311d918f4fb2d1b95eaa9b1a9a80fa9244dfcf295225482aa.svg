<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Doubt</title>
  <desc id="desc">This abstract composition captures the tension between trust and suspicion using a warm color palette juxtaposed against muted tones. The contrast arises from split vertical elements, where the left hints at warmth and stability, while the right echoes uncertainty through darker hues. The rows' diagonal fall embodies the sloping nature of emotion, while the intentional broken pixels symbolize scars and interruptions in perception. The combination of layered stair patterns on one side against an ash-field texture on the other creates rhythm, reflecting the delicate balance between trust and suspicion, forming a resonant emotional environment.</desc>
