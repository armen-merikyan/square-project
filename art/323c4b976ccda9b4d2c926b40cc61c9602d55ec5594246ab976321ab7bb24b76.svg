<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Harmony</title>
  <desc id="desc">This artwork embodies the tension between longing and resolve. The palette includes deep blacks (#000000) and a soft pale blue (#A6D8E0) to represent the contrasting emotions of urgency and calm. The main collision occurs through the interplay of dense dots and spread-out rings, creating a feeling of pressure within an open chaos. By applying 'broken pixels', the piece reflects on the repair vs damage theme, adding intentional disruptions that suggest emotional scars. The spiral layout leads the eye through a journey of motion yet captures moments of stillness, encapsulating the seed's themes into a coherent abstract form.</desc>
