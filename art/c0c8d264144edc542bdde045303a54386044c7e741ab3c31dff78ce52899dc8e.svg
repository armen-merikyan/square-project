<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Resilience</title>
  <desc id="desc">The emotional tone contrasts the vulnerability of an exposed center with the strength of surrounding edges. The palette includes soft pastel tones of pale mint (#A8E1DB), softened by muted storm gray (#7B8D92) providing a backdrop for heavy near black (#1C1C1C) which serves to frame and reinforce the core's exposure to potential disruption. The collision occurs at the center where broken pixels create an unsteady balance between structure and chaos, suggesting a dynamic interplay of strength against vulnerability. The visual rhythm is split vertically, embodying the movement from vulnerability on the left to strength on the right.</desc>
