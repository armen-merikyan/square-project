<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast Pulse</title>
  <desc id="desc">This piece evokes an emotional tone of tension between clarity and distortion, symbolizing the struggle of signals within noise. The dark palette reflects the overwhelming presence of static, coupled with brighter accents to signify moments of clear understanding, representing the struggle against erasure. The central collision in the square highlights the interaction of the pulse in the noise, while broken pixels introduce intentional disruptions, enhancing the sense of imperfection in communication. Overall, the layout follows a cross-current flow, with movements colliding centrally, creating an engaging rhythm of contrast.</desc>
