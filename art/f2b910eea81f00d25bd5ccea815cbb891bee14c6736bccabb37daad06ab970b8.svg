  <title id="title">Tension of Hearts</title>
  <desc id="desc">This artwork embodies the emotional tug-of-war between love and betrayal. The chosen palette of warm reds and soft pinks contrasts against colder grays and dark maroon to signify these conflicting sentiments. The outer frame, filled with darker colors, symbolizes betrayal and isolation, while the central area, with softer hues, represents love and warmth. The sharp edges of the darker shades cut across the softer centers, creating a visual representation of the emotional collision. The imperfect arrangement and broken pixels allude to the complexities within relationships, inviting viewers to navigate the interplay of warmth and conflict visually.</desc>
