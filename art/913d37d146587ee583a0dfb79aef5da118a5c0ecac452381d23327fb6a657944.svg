<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece embodies the raw emotional clash between rage and calm, evident through the use of a sharp contrast palette of deep reds and soft blues. The dense, jagged red sections disrupt the quiet, flowing blue areas, creating a visual tension that represents conflict. The central cluster of red signifies the overflow of emotion, while the surrounding blue areas act as a barrier trying to contain it, symbolizing the struggle between the two states. The broken pixels introduce imperfection, echoing the chaotic nature of feelings.</desc>
