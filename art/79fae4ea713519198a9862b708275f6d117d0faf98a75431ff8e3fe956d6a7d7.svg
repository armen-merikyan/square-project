<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This abstract piece embodies the tension of soft quietness colliding with dense pressure. The palette includes muted colors like off-white and dust gray to symbolize the quiet, contrasted against compressed red and dark navy to express pressure. The emotional journey is reflected in the placement of colors: darker hues cluster toward one edge, illustrating a build-up of pressure, while lighter tones create a soft horizon across the square, suggesting release. The central crack pattern emerging from the edge gives a sense of shattering against the dominating weight, further enhancing the feeling of conflict within the composition.</desc>
