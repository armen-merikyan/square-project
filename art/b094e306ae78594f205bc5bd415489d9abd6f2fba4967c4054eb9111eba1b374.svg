<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal in the Noise</title>
  <desc id="desc">This composition captures the tension between restlessness and peace through a visually fragmented structure that conveys both chaos and calm. The palette of muted plum, rain blue, and soft cyan evoke a sense of melancholy and tranquility, while lavender gray provides subtle contrast to denote instability. The layout features a narrow channel of negative space that interrupts dense clusters of color, emphasizing the fight for clarity amidst disruption. The dominant emotional tone of restlessness is communicated through scattered pixel arrangements and intentional broken pixels, which act as scars in the peaceful intentions, creating an abstract interplay of memory and motion.</desc>
