<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Elements</title>
  <desc id="desc">The emotional tone balances scattered light with settled dust, depicting an internal struggle where energetic sparks intersect with remnants of ash. The chosen palette of pale aqua, mist gray, alarm red, ink blue, and clear white emphasizes both urgency and serenity, depicting the tension of movement against stasis. The main contrast occurs in the center, where the jagged edges of ash meet the smooth, bright teeth of the spark patterns. This collision creates a visual tension embodying resilience against fragility, reminiscent of a wave crashing against the shore.</desc>
