<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Braid of Echoes</title>
  <desc id="desc">The emotional tone is created by juxtaposing gentle safety with exposed vulnerability. The selected palette of soft greens and subtle browns provide a calming base, while pale skin and cold white add echoes of exposure. The highest density is around the center, representing pressure, where warm browns clash against cooler whites, signifying the tension between protection and exposure. The broken pixels disrupt the neatness, echoing vulnerability, while the overall split vertical layout creates a cloth-like braiding of tones that suggests softness against severity.</desc>
