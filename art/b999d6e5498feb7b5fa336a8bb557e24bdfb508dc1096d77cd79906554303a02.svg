  <title id="title">Vertical Tension</title>
  <desc id="desc">This artwork captures the emotional interplay between longing and resolve through a split vertical layout. The left side embodies longing with soft pinks amidst broken dots, representing distant warmth and reaching gaps. The right side, representing resolve, utilizes a tide-like rhythm in darker maroons and gray, conveying locked shapes and compressed strength. The central collision occurs where the two emotions overlap, suggesting an intertwining of desires and resolutions, while the introduction of broken pixels creates intentional disruption, reflecting the imperfections inherent in emotional experiences.</desc>
