<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">The emotional tone of longing vs resolve creates a dynamic tension, reflected in the contrasting color palette of warm coral and orange hues against muted shades of charcoal and blue. The collision happens primarily in the central rows, where the patchwork of longing and the structured target pattern of resolve converge, creating a visual heartbeat effect. This pattern suggests the push and pull of desire and determination, interrupted by intentional broken pixels, symbolizing imperfection within that tension. The layout enhances this feeling by mirroring left and right but with a slight disruption, embodying the idea of near vs far.</desc>
