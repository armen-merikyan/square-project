<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Boundaries</title>
  <desc id="desc">The emotional tone reflects a struggle between warmth (desire) and coolness (restraint). The palette consists of saturated colors like hot coral and blood orange, symbolizing desire, contrasted against cooler tones like hollow blue and charcoal representing restraint. The main collision occurs in the center, where patchwork (representing desire) intersects with broken dots (representing restraint), suggesting a push and pull between overwhelming emotion and the borders of control. This conversation creates a visual narrative of tension and release, echoed through the arrangement and saturation of colors.</desc>
