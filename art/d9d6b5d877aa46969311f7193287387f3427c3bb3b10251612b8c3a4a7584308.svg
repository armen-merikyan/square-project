<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Memory</title>
  <desc id="desc">This artwork encapsulates the emotional struggle between nostalgia and progress. The palette consists of deep blacks representing nostalgia's weight and bright accents in electric blue and lime signifying the vibrancy of progress. The visual arrangement adheres to a split horizontal layout, where the upper section, brighter and lighter, contrasts sharply with the heavier lower section that carries darker hues. The zigzag flow enhances the effect of tension, suggesting a struggle between the past and future, where warmer hues collide with cooler ones, mirroring the emotional interplay proposed by the seed.</desc>
