<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between States</title>
  <desc id="desc">This composition reflects a struggle between defiance and submission, using a palette that balances the warmth of red (defiance) against the coolness of pale blue (submission). The top half features concentrated dark colors that symbolize weight and pressure, creating a tension with the lighter hues that filter in from the edges, suggesting an open space versus a heavier central mass. The flow is from left to right, mimicking the idea of noise against a frame, with broken pixels introducing fragmentation and imperfection, embodying emotional conflicts. The rows are deliberately bottom-weighted to signify the heaviness of unresolved feelings while leaving ample negative space as a nod to openness amidst chaos.</desc>
