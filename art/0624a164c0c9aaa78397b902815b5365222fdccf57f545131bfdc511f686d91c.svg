<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos Within Calm</title>
  <desc id="desc">The emotional tone captures a tension between the energetic bursts of rage and the subdued quiet of calm. The black and red colors symbolize the forceful elements, while pale blue and white indicate tranquility, creating a contrast that embodies 'signal vs noise.' The collision is centered where the checker pattern of red disrupts the horizontal islands of blue, illustrating the concept of an open gate allowing chaos to invade serenity. This arrangement reflects the dichotomy of contained versus overflowing emotions, resonating with the seed's essence.</desc>
