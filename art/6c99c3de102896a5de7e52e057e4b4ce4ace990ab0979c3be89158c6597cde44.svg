<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Conflict</title>
  <desc id="desc">The emotional tone reflects a stark juxtaposition between pride and shame, with a palette centered around deep reds and grays to evoke intense feelings. The upper half is dominated by vibrant reds and pinks demonstrating pride through a broken dots pattern, representing elevation and hope. In contrast, the lower half features muted grays and maroons, creating a sense of weight and discomfort suggestive of shame using sharp, pointed 'teeth' shapes that clash with the smoothness of the upper section. This layout emphasizes the struggle between elevation and descent, quiet and noise, thus creating a narrative of emotional tension.</desc>
