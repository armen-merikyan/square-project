  <title id="title">Emotion Collision</title>
  <desc id="desc">This artwork explores the emotional contrast of envy and gratitude using color arrangements that reflect density and release. The palette of black, lime, electric blue, and magenta suggests a stark contrast between heaviness (envy) and lightness (gratitude). The left side embodies a maze-like density representing envy, while the right half displays a split-screen clarity signifying gratitude. The sharp contrasts highlight the tension between two emotional states, creating a rhythmic pattern that reveals an undercurrent of conflict and resolution.</desc>
