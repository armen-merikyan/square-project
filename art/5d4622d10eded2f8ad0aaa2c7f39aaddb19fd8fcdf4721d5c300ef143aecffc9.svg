  <title id="title">Overflowing Tension</title>
  <desc id="desc">This artwork captures a tension between calm (represented by cool colors) and the intensity of rage (represented by sharp reds). The palette incorporates deep blacks and pale blues to embody the struggle between containment and overflow. The main collision occurs in the top-left corner, where jagged red pixels interrupt smoother blue bands, symbolizing an eruption of emotion against a quiet backdrop. The composition utilizes both broken and thread patterns to convey fragmentation and order, aligning with the idea of eroded symmetry found in the seed.</desc>
