<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">The emotional tone juxtaposes the sense of relief against the weight of dread. The palette, 'lonely_signal,' features deep navy and black to emphasize the heaviness of dread, contrasted with the bright dim cyan to symbolize moments of relief. The placement creates a corner invasion where dark colors dominate the upper quadrant, representing the weight, while lighter colors disrupt this flow, mirroring the struggle between fear and solace. The broken pixels introduce imperfection, reinforcing the theme of a fractured emotional landscape.</desc>
