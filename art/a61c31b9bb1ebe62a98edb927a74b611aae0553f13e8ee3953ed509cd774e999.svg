<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This abstract artwork embodies the tension between restlessness and peace. The palette combines electric blue and lime as vibrant accents to represent energy and motion, contrasted with deep blacks that signify calmness and quietness. The dominant black shades create a sense of protective containment, surrounding vibrant colors that represent the feeling of unrest intruding from the edges. The collision occurs diagonally, creating a feeling of movement and disruption across a seemingly balanced symmetry. This dynamic interplay visualizes the themes of memory versus motion, as the colors suggest layers of past experience colliding with present emotions.</desc>
