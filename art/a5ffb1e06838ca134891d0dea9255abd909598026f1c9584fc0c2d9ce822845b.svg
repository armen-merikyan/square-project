<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">This composition captures the emotional tension of desire versus restraint through contrasting warm and cool colors. The palette includes hot coral and blood orange to symbolize desire's warmth against muted tones of charcoal and hollow blue representing restraint. The checker pattern of desire collides with the channel pattern of restraint, primarily at the center where vibrant warms disrupt the soothing cools, creating a dynamic interplay. Negative space is preserved along the edges to echo the theme of containment, while broken pixels are strategically placed to evoke a sense of imperfection and complexity in the emotional experience.</desc>
