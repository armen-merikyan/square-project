<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Control and Surrender</title>
  <desc id="desc">This composition embodies the struggle between the structures of control and the fluidity of surrender. The color palette—warm coral, soft amber, and cold slate—creates an emotional dichotomy of warmth and coolness, evoking feelings of tension and release. The collision is most pronounced in the center, where the structured thread pattern representing control intertwines with the gentle threshold of surrender, creating a visual echo of conflict and harmony. Broken pixels introduce an intentional imperfection, suggesting the inherent flaws within systems of control, while preserving an ample negative space to enhance the feeling of loneliness against the backdrop of saturated colors.</desc>
