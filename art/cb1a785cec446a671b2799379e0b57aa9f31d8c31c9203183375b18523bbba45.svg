<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse in the Static</title>
  <desc id="desc">The artwork conveys a tension between clarity and confusion, reflecting the seed's duality of signal vs noise. The palette features a 'signal green' to represent the pulse of clarity against a backdrop of 'static gray' and 'dead black' for noise. Bright 'hot magenta' and 'electric blue' accents interrupt the otherwise dense color field, creating moments of collision. The flow reflects scatter with the main focus in the center, symbolizing a struggle for visibility amidst interference. The structured chaos of colors embodies the emotional conflict of memory vs erasure.</desc>
