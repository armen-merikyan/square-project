<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shattered Affection</title>
  <desc id="desc">The emotional tone encapsulates a tension between warmth and coldness, representing love versus betrayal. The chosen palette includes warm pinks and reds contrasted with dark grays to evoke a sense of heartbreak amidst affection. The left side reflects love's warmth characterized by softer hues, while the right introduces betrayal with deeper, harsher colors. The collision is seen where warm colors gradually fracture into cooler tones, symbolizing a broken symmetry. The patterns of 'rain' integrate the idea of overlapping emotions, reinforcing the sense of an emotional storm depicted through sharp versus soft edges.</desc>
