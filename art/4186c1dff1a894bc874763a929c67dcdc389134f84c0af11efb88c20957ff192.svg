<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This artwork conveys the emotional tension between desire and emptiness, utilizing a palette that juxtaposes vibrant, warm colors with muted, cool shades. The dominant use of hot coral and blood orange at the center represents desire's intense pull. In contrast, hollow blue and charcoal colors define the edges, embodying emptiness and containment. The broken pixel placements serve as intentional interruptions in this dynamic, emphasizing the concept of restraint at the borders while a warm saturation rises from the center, hinting at overflowing desire. The flow is from right to left, echoing the struggle between containment and overflowing warmth.</desc>
