<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">This composition captures the duality of defiance and submission through contrasting patterns of flames and stripes, organized in a split-horizontal layout. The colors, drawn from a palette of cosmic indigo, void black, and cold gold, create a sense of expansive depth (defiance) against the muted softness of deep teal and star white (submission). The vertical collision in the middle emphasizes the tension of the emotional interaction. Broken pixels introduce an element of imperfection, symbolizing emotional scars and disruptions, while maintaining a clear structure across both halves. The dominant chaos of the upper section evokes defiance, while the soft folds below express quiet submission, inviting viewers to reflect on the struggle between these powerful emotions.</desc>
