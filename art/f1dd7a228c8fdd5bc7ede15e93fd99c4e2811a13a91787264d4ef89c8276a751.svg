<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Desire</title>
  <desc id="desc">This work explores the emotional tension between emptiness and desire. The use of a limited palette—black, pale blue, and white—emphasizes the stark contrasts between warmth (desire) and coolness (emptiness). The left side rises with bright accents symbolizing desire, while the right descends into darker tones suggesting isolation. Broken edges create a sense of imperfection and loss. Main contrast occurs at the center, where the warm hues of desire collide with the cooler shades, forming a visual heart fragment that resonates with the themes of longing and solitude.</desc>
