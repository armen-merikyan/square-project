<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Resolutions</title>
  <desc id="desc">The emotional tone reflects a struggle between yearning and a sense of steadfastness, represented through contrasting colors and disrupted patterns. The palette of deep blues and muted colors evokes a sense of calmness intertwined with tension. The main collision occurs toward the center, where warm yellows meet the cool blues to illustrate the push and pull of longing and resolve. The ‘broken_frame’ layout suggests a containment that is not entirely closed, allowing for feelings to seep through, thus transforming the seed into an abstract representation of emotional complexity.</desc>
