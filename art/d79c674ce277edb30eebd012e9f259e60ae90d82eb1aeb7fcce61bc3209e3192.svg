<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition embodies the tension between explosive rage and serene calm. The palette uses stark contrasts with reds symbolizing intense emotion and pale blues representing tranquility. The collision occurs predominantly at the center where chaotic red transitions into softer shades, visually suggesting a struggle between containment and overflow. The zigzag pattern of rage disrupts the calm's symmetry, creating an echo of conflict against the quiet field backdrop that encourages introspection. Broken pixels introduce imperfections, enhancing the sense of erosion, while negative space is strategically used to represent calm amidst pressure, maintaining a balance between the two emotional extremes.</desc>
