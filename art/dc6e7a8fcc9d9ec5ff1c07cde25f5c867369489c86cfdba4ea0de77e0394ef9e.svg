<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs. Edges</title>
  <desc id="desc">This piece explores the emotional contrast of loneliness and connection by emphasizing a thick outline against a muted inner core. The palette of red, pale blue, black, and white reflects an internal struggle: red for passion and connection, pale blue for calm yet distant, black representing isolation, and white for the stark contrast of exposure versus concealment. The pattern captures a sense of a ‘burst’ where strong, vibrantly colored pixels collide with softer hues, embodying a balance between surrounding noise and singular moments of clarity. The top-weighted layout suggests imbalance, capturing the essence of pressure from above while maintaining elements of hidden space—representative of both loneliness and the search for connection.</desc>
