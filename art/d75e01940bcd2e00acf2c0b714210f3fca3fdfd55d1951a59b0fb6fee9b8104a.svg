<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Time</title>
  <desc id="desc">This piece captures the emotional tension of nostalgia against progress. The top half, reflecting nostalgia, uses a maze-like pattern with warm burnt oranges and dark reds to evoke warmth and memory, while the bottom half represents progress with structured stripes in charcoals and golds, presenting a feeling of clarity and advancement. The broken pixels create an imperfect grid, emphasizing the collision between the chaotic memories and the precise future, with a central 'diamond' shape suggesting a focal point of contemplation. The composition maintains significant negative space to avoid overwhelming the viewer, allowing an emotional pause.</desc>
