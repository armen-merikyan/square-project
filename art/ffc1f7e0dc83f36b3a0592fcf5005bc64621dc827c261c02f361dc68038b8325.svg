<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This artwork captures the emotional tension between softness and severity, reflecting the intertwining of gentle transitions against stark contrasts. The chosen palette blends powder pink and warm white on the left to evoke softness, while carbon black and sharp crimson on the right signify severity. The layout splits vertically, creating a collision between two opposing emotional realms where the soft negative cross pattern disrupts the checker on the right, suggesting an open gate through which chaos may enter. The flow is designed to collapse inward, hinting at bottom weight. The broken pixel addition creates intentional imperfections, enhancing the overall reflection of guilt and forgiveness as contrasting impulses that shape our emotional experiences.</desc>
