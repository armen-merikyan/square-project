<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Affection</title>
  <desc id="desc">The emotional tone reflects the tension between love and betrayal. Using a palette of pinks and dark maroon creates warmth contrasted by shadows, representing comfort fractured by loss. The layout alternates between soft stripes and a maze-like disturbance, where the collision occurs at the center, divided by a sharper edge. This duality symbolizes the battlefield of emotions—where love embodies warmth while betrayal introduces harshness, suggesting an unresolved struggle in a confined space.</desc>
