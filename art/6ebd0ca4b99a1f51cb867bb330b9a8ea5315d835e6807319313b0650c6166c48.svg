<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tear of Emotion</title>
  <desc id="desc">The artwork contrasts the claustrophobic feelings of envy against the expansive emotions of gratitude. The palette of electric blue and magenta captures the vibrancy of gratitude, with black representing the weight of envy. The arrangement features rising patterns on one side and descending chaos on the other, echoing the push and pull of these contrasting emotions. The broken pixel pattern adds an element of imperfection, symbolizing the jagged path we sometimes navigate between these two feelings.</desc>
