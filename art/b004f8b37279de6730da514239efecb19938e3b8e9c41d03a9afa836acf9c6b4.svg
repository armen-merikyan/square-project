<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Contrasts</title>
  <desc id="desc">This composition embodies a tension between softness and severity, mirroring the push and pull between gentle gradients and bold cuts. The palette of powder pink and sharp crimson creates a stark emotional dichotomy, while warm white bridges the two extremes, introducing an element of balance. The main tension lies at the center, where soft islands of color collide against the more severe hinge-like patterns, suggesting a conflict and resolution within the same space—reflective of guilt and forgiveness. The negative space ensures clarity and accentuates the pulse-like movement throughout.</desc>
