<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Constrained Yearning</title>
  <desc id="desc">The emotional tone reflects a tension between the vibrant pull of desire and the stark limitations imposed by restraint. The palette leans heavily on saturated warm tones like hot coral and blood orange to convey desire's fiery intensity, contrasted against muted tones of charcoal and hollow blue that signify restraint. The central area features overlapping stripes representing the struggle between these two emotions, with an intentional asymmetry creating a feeling of collision at the center. This design mirrors the concept of a well, with powerful urges pressing against a boundary, symbolizing the ache of longing thwarted by limits.</desc>
