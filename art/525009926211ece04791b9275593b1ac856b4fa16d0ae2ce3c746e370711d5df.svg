<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Essence</title>
  <desc id="desc">This piece embodies the tension between vulnerability and strength through a mix of dense and soft colors. The palette combines deep teal and cosmic indigo for strength, contrasted with void black and star white representing vulnerability. The central area symbolizes exposure, while the edges reflect protection, creating a visual echo. Broken pixel interruptions represent moments of fragility against solid form, enhancing the central collision of emotions. The stark contrast between light and dark mimics the struggle between shelter and exposure, giving a dynamic rhythm to the composition. This artwork navigates the themes of connection and alienation via its divided layout, structured to evoke a sense of uncertainty and balance.</desc>
