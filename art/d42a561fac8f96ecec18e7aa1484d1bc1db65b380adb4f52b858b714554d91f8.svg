<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This piece embodies the tension between awe and terror through contrasting color arrangements. The palette of dark maroon and soft pink hints at a complex emotional landscape, where warmth collides with the sharp edges of fear. The left side is structured in soft-edge patterns, suggesting stability and order, while the right erupts into jagged interruptions, reflecting chaos and fragmented memories. The central wave creates a tension point, inviting the eye to traverse the border of these contrasting feelings. Overall, this piece captures the delicate balance of stark, warm presence against disarray.</desc>
