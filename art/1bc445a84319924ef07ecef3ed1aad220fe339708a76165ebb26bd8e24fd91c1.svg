<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This artwork embodies the emotional conflict between vitality (spark) and stagnation (ash). The vibrant greens and golds represent the spark, contrasted against muted ochres and soft creams portraying the ash. The diagonal flow directs the eye from a burst of color on one side to a settling earth tone on the other, suggesting tension and resolution. The broken pixels create disruption, symbolizing the scars of memory. The layout emphasizes a defining seam between the two emotional states, while leaving a space to breathe, capturing the essence of resilience versus fragility.</desc>
