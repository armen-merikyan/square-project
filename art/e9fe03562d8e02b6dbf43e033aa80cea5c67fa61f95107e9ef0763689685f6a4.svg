<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">This composition encapsulates the emotional duel between desire and restraint through a vivid, saturated palette contrasting against muted tones. The warm colors (#FF6F61, #FF5842) create a vibrant pulse, representing desire, while cooler tones (#4A4E69, #9A8C98) symbolize restraint, creating negative space that restricts the brightness. The central tension arises where these colors collide, reflecting the push and pull of conflicting emotions. Patterns of threshold on one side clash with negative cross elements on the other, enhancing the narrative of struggle. Broken pixels are strategically placed to evoke imperfection and the scars of emotional conflict. The overall layout mimics the argument grid, where two emotional patterns vie for dominance, capturing the essence of intensity and unresolved tension.</desc>
