<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This composition plays on the emotional dichotomy of softness and severity. The palette utilizes soft pinks and warm whites to convey gentleness, while the presence of carbon black and sharp crimson introduces severity—a stark contrast central to the artwork. The dense center embodies intense emotions, while the struggle with the muted edges illustrates a battle between warmth and cold detachment. The collision occurs primarily towards the center, where the maze-like patterns of softness are interrupted by sharp, constellation-like marks of severity, creating a palpable tension that reinforces the theme of disruption and emotional struggle.</desc>
