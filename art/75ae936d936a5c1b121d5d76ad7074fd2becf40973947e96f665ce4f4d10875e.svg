<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs. Shelter</title>
  <desc id="desc">The emotional tone of this piece reflects the tension between softness and severity. The palette incorporates soft pinks and whites juxtaposed with deep blacks and steel grays, creating a visual dialogue of lightness battling darkness. The collision occurs predominantly in the center, where lighter tones fight to break free from heavier, sharper colors, representing a struggle between guilt and forgiveness. This interplay of circular 'hinge' patterns in light and 'stepwell' textures in dark facilitates a dynamic rhythm, while some broken pixels introduce intentional disruptions, emphasizing the delicate balance between shelter and exposure.</desc>
