<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Shores</title>
  <desc id="desc">This piece embodies the emotional tension between vulnerability and strength. The chosen palette of deep blue (#1E1E78) and pale yellow (#F6E39D) creates a dialogue of weight and lightness, emphasizing the struggles between robust borders and delicate centers. The pattern of the diamond shape serves as a metaphor for protected spaces surrounded by turbulence. The central concentrated cluster of darker colors represents strength, while the surrounding lighter hues suggest vulnerability, creating an intentional visual collision between the two emotions.</desc>
