<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition navigates the emotional spectrum between tenderness and rage through a strategic color palette of red, black, pale blue, and white that suggests both intensity and calmness. The dark colors anchor the viewer in the rage, while pale blues and whites create zones of tenderness, emphasizing vulnerability. The layout starts from the corner (rage), with color density spilling diagonally across the canvas, creating a collision in the central area, where tender colors subtly interrupt the stronger hues. The 'wave' shape seed is abstractly represented through fluid patterns that evoke shifts between pressure and quietness, balancing broken pixels as scars of emotional authenticity.</desc>
