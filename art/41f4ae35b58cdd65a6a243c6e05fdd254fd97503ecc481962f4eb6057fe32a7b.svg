<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork embodies the emotional contrast between vulnerability and strength, where the center, a lighter field, reveals an exposed state, framed by more intense colors representing strength. The palette draws from 'desire_emptiness', harmonizing warm coral and orange with the cool charcoal and hollow blue, evoking tension and release. The repeated crack pattern represents vulnerability, while dense stairs signify strength, with intentional disruptions (broken pixels) emphasizing the fragility in the structure. The composition features a quiet channel of negative space cutting through the pressure area, creating a dynamic pulse between calm and intensity.</desc>
