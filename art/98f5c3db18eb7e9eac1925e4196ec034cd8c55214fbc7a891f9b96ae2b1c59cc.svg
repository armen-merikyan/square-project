<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork explores the emotional tension between fear and hope through a split vertical layout. The black and dark violet represent fear with their jagged, cracked patterns, while the soft gold and pale green suggest hope with a glowing, radial movement. The main contrast occurs centrally, where dark colors clash against a soft, glowing center, symbolizing the conflict and interplay between despair and optimism. The layout emerges from the corners, creating a sense of invasion by fear into the space of hope, accentuated by broken pixels adding a layer of imperfection, reflecting the chaotic nature of emotion.</desc>
