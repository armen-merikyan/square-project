<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Tension</title>
  <desc id="desc">The emotional tone explores the duality of softness and severity, represented through a contrasting palette of warm and cool tones. The selection of powder pink and warm white contrasts sharply with carbon black and steel gray, creating a tension that speaks to internal conflicts of guilt and forgiveness. The core of the artwork features interrupted scar patterns that symbolize softness, while the outer frame employs crosshatch lines portraying severity, culminating in a visual contrast that embodies the seed's principles. The bottom-weighted layout further enhances the feeling of pressure, with broken pixel disruptions adding complexity and imperfection to the balance.</desc>
