<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Pulse</title>
  <desc id="desc">This composition captures the tension between longing and resolve through spatial and color contrasts. The warm coral (#FF6F61) represents the emotional pull and the sensation of reaching, while cold slate (#4A4E69) serves as a backdrop, evoking distance and contrast in feeling. The pattern influences emerge as a fragmented barcode in the lower half, symbolizing chaotic longing, thrusting upward into a structured frame of resolve in the upper half, reminiscent of strength and ascension. The intentional insertion of soft amber (#F6AB6D) creates bursts of urgency that contrast against the blue-black (#1B1E2A) for a sense of contained yet overflowing emotion. Broken pixels are introduced sparingly, providing disruption and highlighting imperfections akin to the themes of repair and damage. The arrangement allows for a balance between quiet fields and clustered urges, making the central pulse the focal collision point.</desc>
