  <title id="title">Tension in Motion</title>
  <desc id="desc">This artwork captures the emotional tension between longing and resolve. The palette features deep blacks and sharp reds to convey intensity, while pale blues and whites introduce a sense of distance and calm. The central collision occurs prominently with dark and light colors converging, creating a visual echo of yearning against steadiness. The patterns of target and noise suggest a pulse of conflicting feelings, transforming the emotional complexities into a fragmented yet cohesive abstract narrative.</desc>
