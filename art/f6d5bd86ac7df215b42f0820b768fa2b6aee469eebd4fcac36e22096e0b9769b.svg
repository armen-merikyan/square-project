  <title id="title">Hollow Embrace</title>
  <desc id="desc">This artwork captures the emotional tension between desire and restraint, showcasing a saturated palette offset by muted colors, where the vibrant hues represent intense longing that collides with a framework of restrained boundaries. Using broken pixels, the composition evokes feelings of imperfection and yearning. The layout features a central void surrounded by dense areas of color, illustrating the impact of desire pushing against the edges of limitation, enhancing the feeling of a locked space. The collision occurs primarily in the center and edges, where warmth meets cool muted shades, creating a dynamic interplay of emotion and form.</desc>
