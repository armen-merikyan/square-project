<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Tension</title>
  <desc id="desc">This piece embodies the emotional dichotomy of defiance and submission, expressed through a contrasting palette of muted and bright colors. The dominant dark shades represent submission, creating a heavy backdrop, while sporadic vibrant pixels punctuate the composition, symbolizing bursts of defiance. The intersection occurs strongly in the center, where the vibrant colors collide with the dense spaces, creating tension akin to a struggle against confinement. The broken pixels introduce imperfection, hinting at the fragility of this emotional landscape, while the overall layout reflects an unfinished narrative, reminiscent of both spirals and invasion.</desc>
