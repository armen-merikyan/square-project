<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotions</title>
  <desc id="desc">This piece explores the tension between vulnerability and strength, visually represented through a split layout. The left side uses deep tones of mourning black and deep blue to evoke the heavy weight of vulnerability, while the right side pulses with the brighter new leaf and pale yellow, embodying the rising signal of strength. The collision occurs predominantly at the center, where the dark and light contrast, leaving the edges softer to represent the tension between exposed and protected areas. The carefully chosen palette reflects mourning and renewal, creating an emotional resonance that echoes the seed's themes of connection and alienation.</desc>
