  <title id="title">Dissonance Within Order</title>
  <desc id="desc">This artwork captures the emotional tension between defiance and submission using an asymmetric layout that mirrors contrast within its structure. The palette, consisting of rich jewel tones and a muted cream, reflects the hunger for autonomy (defiance) and the soft retreat (submission). The main collision occurs in the center, where bright colors clash against darker tones, echoing the struggle between order and chaos. The broken pixel pattern represents imperfection and disruption, visualizing feelings of unrest and uncertainty while still allowing for quiet spaces that summarize retreat and contemplation.</desc>
