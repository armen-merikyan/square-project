<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Drift</title>
  <desc id="desc">This piece embodies the tension between nostalgia and progress, utilizing a palette of black, dark violet, soft gold, and pale green to illustrate the conflict between heavy darkness and light ambition. The top half features stripes of dark violet and soft gold, suggesting nostalgia's warmth, while the bottom half utilizes swirling patterns of black and pale green—symbolizing the pressure of progress. The layout effectively captures the split horizontal flow, allowing the viewer to experience gravity (bottom weight) and fleeting light (top lightness). The placement creates a stark contrast, inviting contemplation of both the serene past and the chaotic present.</desc>
