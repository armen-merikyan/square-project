<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Stillness</title>
  <desc id="desc">This piece explores the emotional tension between restlessness and peace. The palette, 'quiet_pressure,' mixes calming off-whites with deeper, darker tones that symbolize chaos and unease. The central region, using faint peach and dust gray, reflects a pale exposed space, while the darker navy hues at the edges evoke the feeling of closure and confinement. This creates a contrast—softness encountering heaviness—mirroring the struggle depicted in the seed. The broken pixels suggest interruptions and scars from unexpected memories, while the scattered repair layout speaks to attempts at resolving emotional disarray.</desc>
