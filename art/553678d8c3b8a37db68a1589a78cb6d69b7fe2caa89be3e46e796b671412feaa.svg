<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Connections</title>
  <desc id="desc">The artwork explores the duality of loneliness and connection through contrasting color palettes and patterns. The chosen 'broken_memory' palette—composed of sepia, tan, dust gray, and faded blue—evokes a sense of fading connections and nostalgia. The layout flows from the corner, representing loneliness creeping in while connection attempts to stabilize from the center. Patterns alternate between a checker for connection and broken dots for loneliness, creating a rhythm of collision and echo. The top-weighted design draws the eye upward, echoing the push and pull of emotional tension, while key negative spaces amplify the loneliness theme.</desc>
