<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Dissonance</title>
  <desc id="desc">The emotional tone reflects a struggle between calmness and panic, expressed through contrasting colors and patterns. The palette of electric blue, magenta, lime, and black captures the tension—electric blue and lime denote control, while magenta and black translate to panic. The composition features diagonal flows transitioning from vibrant to muted colors, with hard-edged structures interrupted by broken pixels to symbolize the emotional volatility and fragmentation inherent in the seed's themes. The clash and release of color create a narrative of unresolved emotional conflicts.</desc>
