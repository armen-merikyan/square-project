<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Lights</title>
  <desc id="desc">The artwork captures the emotional conflict between rage and calm through the use of contrasting colors and patterns. The top four rows embody the calmness represented by soft horizontal stripes of pale blue and white, evoking a sense of serenity. In contrast, the bottom four rows explode into contrasting jagged patterns of red and black, conveying the intensity of rage. The palette of reds (for rage) and blues (for calm) reflects the tension and balance, accentuated by broken pixel strategies to create a sense of imperfection and collision. The central 'crack' concept intersects these two emotional states, metaphorically suggesting a fracture in calm as intensity seeps in. The overall flow is from outside to inward, drawing viewers into the core conflict of emotional states, again reinforcing the theme of rising signals and isolation inherent in the seed.</desc>
