<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Contrasts</title>
  <desc id="desc">This composition reflects the interplay between joy and grief, employing an emotional palette of yellow and orange to embody joy, while deep blue and muted purple illustrate grief. The split horizontal layout introduces a clear separation yet allows for overlapping emotional expressions. The edge style evokes a sense of decay, symbolizing how joy can seem fragile against the weight of grief. The arrangement creates a visual rhythm, with bright dots interrupting dense fields of color, representing moments of joy piercing through sorrow. Overall, it captures the dynamic tension between opposing emotions, embodying both warmth and depth.</desc>
