<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Contrast</title>
  <desc id="desc">This piece embodies the emotional tension between defiance and submission through a jagged, interweaving pattern of colors, reflecting angular resistance with bright accents like electric blue and hot magenta, which symbolize defiance. The shattered and crack-like formations represent submission, creating an uneven border that evokes a sense of chaos. The subtle presence of dead black and static gray grounds the composition while hinting at underlying quietness, echoing the visual story of a threshold between opposing feelings. The arrangement maintains visual tension while leaving ample negative space for contemplation.</desc>
