<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Points</title>
  <desc id="desc">The emotional tone captures the tension between pressure and quiet, employing a palette of muted hues and warm undertones. The contrast between the dense edge on the left and the lighter shades on the right highlights the struggle of breaking free from weightiness into tranquility. The palette combines dark navy and compressed red to evoke pressure, while off-white and faint peach introduce elements of softness and release, creating a delicate balance. The arrangement features a collision of colors across the center, leading to a sense of fragmentation as sharp edges mix with soft areas, reminiscent of 'shattering against tide'. Thus, the seed is reflected in the abstract, portraying movement from density to release with a jagged edge.</desc>
