<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of relief and dread through color and placement. The palette of pink, red, gray, and dark maroon presents a clash between warmth and coldness, reflecting the pressure of heavy emotions against the lightness of relief. The left half vibrates with a grid pattern in pinks and reds, suggesting relief through structured calm. In contrast, the right half is bolder, with flame-like jagged arrangements in dark gray and dark maroon, symbolizing the chaotic weight of dread. Broken pixels introduce imperfection, enhancing the emotional texture and maintaining negative space, allowing the eyes to rest amidst the tension.</desc>
