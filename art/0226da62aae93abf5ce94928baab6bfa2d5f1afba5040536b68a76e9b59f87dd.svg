<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shattered Reflections</title>
  <desc id="desc">The emotional tone conveys a tug-of-war between confusion and clarity, mirrored in a nearly symmetrical pattern disrupted by intentional broken pixels. The chosen palette of deep navy, black, and a single white accent reflects feelings of loneliness and isolation, while dim cyan introduces a subtle warmth that contrasts the darker tones. The main collision occurs at the central area, where the colors transition from clarity to confusion, creating tension across the artwork. This imperfect symmetry emphasizes the struggle between cohesive understanding and fractured perception while adhering to the constraints of a 'mirror_broken' layout and 'teeth' pattern.</desc>
