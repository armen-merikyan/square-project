<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This artwork reflects a push and pull between defiance and submission. The color palette of lime, black, electric blue, and magenta creates a vibrant emotional landscape. The warm tones of lime and magenta clash against the cool black and electric blue, enhancing the tension in the piece. The broken pixels introduce an element of disruption, suggesting collisions of emotion—where the calmness of submission is interrupted by the sparks of defiance. The layout maintains a mirrored quality, yet with intentions disrupted, evoking the rhythm of unexpected emotional shifts throughout. This composition uses negative space effectively to create a feeling of quiet amidst the clashes, illustrating the dance between rhythm and release.</desc>
