<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This composition embodies the emotional conflict between relief and dread. The palette of muted storm gray, pale mint, and faded gold creates an atmosphere of tension highlighted by a mix of dark near-black. The collision occurs at the center where the radial pattern of relief (pale mint and faded gold) fights against the dense lattice of dread (storm gray and near-black). These colors represent the struggle of dark weight and the possibility of light breathing through. The structured arrangement, climbing upwards in a zigzag flow, contributes to a sense of impending resolution amidst uncertainty, enhancing the narrative of pressure and release.</desc>
