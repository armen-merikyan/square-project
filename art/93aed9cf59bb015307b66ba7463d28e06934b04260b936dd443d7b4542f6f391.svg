<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension &amp; Release</title>
  <desc id="desc">This composition explores the emotional tension between panic and control through contrasting patterns and colors. The left side, representing control, uses a more structured pattern of gentle rings in muted grays and dark maroon, suggesting stability. The right side, capturing panic, employs a radial pattern of bright pink and red, representing chaotic bursts of energy. The zigzag flow emphasizes the conflict between the two emotions, while broken pixels create a sense of imperfection. The palette of pink, red, gray, and dark maroon serves to enhance the themes of love and betrayal, creating a dialogue between soothing stability and overwhelming chaos.</desc>
