<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition captures the emotional tension between rage and calm through concentric patterns of color. The deep blacks and vibrant reds signify compression and anger, while soft pale blues and whites create a sense of space and quiet. The contrasting elements collide in the center, where vivid 'island' patterns of red disrupt the calmer echoes of pale blue, simulating an emotional push and pull. The overall structure evokes an eroded symmetry, with a clear edge style providing a boundary that hints at containment yet is breached by the explosive rage, reinforcing the seed's themes of emotional conflict.</desc>
