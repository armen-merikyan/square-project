<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Suspicion</title>
  <desc id="desc">This piece reflects the emotional dichotomy between trust and suspicion through colors and their arrangement. The palette consists of warm hues (yellow and orange) representing trust intertwined with cooler tones (deep blue and muted purple) symbolizing suspicion. The layout features a diagonal argument, creating a visual wedge where trust takes up a larger space, accentuated with broken pixels symbolizing imperfection and uncertainty. The main contrast lies in the split of color density, offering a soft glow of warmth against shadows that press from the edges, suggesting a tender yet fragile balance.</desc>
