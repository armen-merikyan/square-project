<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Abandonment</title>
  <desc id="desc">The emotional tone of this composition navigates the palpable tension between desire and restraint. The selected palette of rich reds and muted creams creates a warmth that speaks to longing, while iron gray introduces a holding back effect, emphasizing restraint. The bright small orange accents interrupt the dark, moody blacks, which in turn cluster toward the edges, mapping a boundary of emotional saturation. The central collision of the warm island patterns representing desire meets the more structured ladder-like restraint patterns, forming a dialogue that embodies the struggle between reaching out and holding back—an abstract reflection of the seed concepts.</desc>
