<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in the Void</title>
  <desc id="desc">The emotional tone captures the duel between defiance and submission, creating a sense of tension. The palette blends warm coral and soft amber with cool slate tones, suggesting warmth battling against coldness. The collision occurs diagonally through the center, illustrating the struggle between order and chaos as warm colors clash with cooler shades. The arrangement features a halo of softer colors around a deeper, darker center, symbolizing a quiet channel filled with pulse marks, representing the nuances of defiance in contrast to the surrounding submission. Broken pixels disrupt the patterns, adding imperfections indicative of the chaos within seeming calmness.</desc>
