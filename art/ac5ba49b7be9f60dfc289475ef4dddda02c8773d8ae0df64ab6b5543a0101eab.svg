<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Relief</title>
  <desc id="desc">This composition encapsulates the emotional tension between relief and dread. The chosen palette contrasts dark tones of black and dark violet representing dread with the brighter accents of soft gold and pale green signifying relief. The top four rows display heavier colors, creating a sense of weight, while the lower four rows introduce lighter hues that suggest brightness and hope. The broken pixels sporadically interrupt the visual flow, enhancing the theme of imperfection and the emotional struggle between these opposing forces. The patterns based on 'target' for dread and 'flame' for relief create visual contrasts that mirror the chaotic yet hopeful push toward balance.</desc>
