<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dreadful Relief</title>
  <desc id="desc">This piece captures the tension between relief and dread through a dichotomy of sharp contrasts. The palette of lime, electric blue, magenta, and black illustrates these emotions, with the vibrant colors suggesting moments of relief against a backdrop of darkness symbolizing dread. The layout originates from the corner, breaking symmetry and creating dynamic movement that reflects a diagonal fall - a visual metaphor for weightiness. The use of 'dots' for relief and the 'flame' for dread introduces both lightness and depth while ensuring the piece maintains a negative space of quiet against the chaotic patterning. The broken pixels enhance the feeling of imperfection and struggle, enhancing the emotional layers of the artwork.</desc>
