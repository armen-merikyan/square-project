<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Contrast</title>
  <desc id="desc">This composition explores the emotional dichotomy of defiance versus submission through a carefully curated palette and structured layout. The chosen colors — deep reds and pinks intermixed with soft grays and dark maroon — create a passionate contrast, evoking feelings of conflict and resilience. The left and right sides are almost mirrored, with slight imperfections that suggest a disruption in harmony, accentuating the theme of balance between two opposing forces. The use of stripes on one side represents defiance, while noise patterns on the other symbolize submission. This interplay creates a rhythm of visual tension, moving from bold, oppressive saturation in certain corners to open, softer spaces that invite the viewer to explore the emotional narrative of betrayal and love.</desc>
