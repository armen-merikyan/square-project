  <title id="title">Tension in Balance</title>
  <desc id="desc">This artwork explores the duality of fear and hope through a juxtaposition of dark and light hues. The palette reflects a cool darkness (#000000, #2E1A47, #3D2A78) contrasted with warm accents (soft gold #E1B000, pale green #A8D8B9) that suggest emergence from quiet pressure. The arrangement creates a sense of flow as colors cascade from the top, symbolizing emotion's descent, while maintaining negative space to evoke a feeling of balance amidst chaos. The jagged edges represent fear, while the upward flow of warm hues embodies hope, creating a rhythm of collision and release.</desc>
