<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork reflects the emotional tension between emptiness and desire through a palette of warm and cool colors. The vibrant hot coral and blood orange express the yearning of desire, while the quiet hollow blue and charcoal represent the emptiness and restraint. The composition features a strong radial pull at the center, mimicking the feeling of being drawn towards something unattainable, while the structured edges create a sense of containment, echoing the conflicting push and pull. Broken pixels introduce intentional imperfections, adding to the chaotic dance between the emotional extremes.</desc>
