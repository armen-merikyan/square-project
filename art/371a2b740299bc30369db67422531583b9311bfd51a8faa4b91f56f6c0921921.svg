<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition explores the emotional tension between vulnerability and strength through the use of jagged patterns and soft gradients. The palette consists of lime and electric blue for urgency, alongside deep black and vivid magenta, which introduces rich contrasts. The dominant black foreground, representing strength, occupies the diagonal from top left to bottom right, while electric blue and lime pools create a sense of exposed vulnerability in the opposite corner. The intentional disruption of broken pixels introduces a feeling of imperfection, hinting at raw edges of emotions.</desc>
