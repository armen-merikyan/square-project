<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Silence and Noise</title>
  <desc id="desc">The artwork explores the emotional tone of dread versus relief, reflecting the tension felt when contrasting emotions collide. The palette mixes vibrant electric blue and soft magenta against the deep, absorbing black, creating a stark division that invites contemplation. The layout follows a corner invasion of relief through rain-like patterns, dominating the space diagonally, while dark areas represent dread. By concentrating lighter colors towards one corner, a gradual release contrasts with a heavy, oppressive presence, embodying the emotional narrative of pressure stitching its way through quiet moments.</desc>
