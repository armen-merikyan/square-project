<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Balance</title>
  <desc id="desc">This piece explores the tension between strength and vulnerability in a symmetrically eroded form. The palette blends clean white and ice blue for a calm core, contrasted with the deep ink black and violet gray representing the edges of pressure and disruption. Central areas are lighter, representing vulnerability, while darker edges embody strength, interrupted by a few intentional broken pixels that suggest scars of experiences. The flow from left to right emphasizes motion and shifting dynamics, with the main collision occurring in the center where the lighter tones collide with darker shades, reflecting a dance between opposing forces.</desc>
