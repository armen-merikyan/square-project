<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Embrace</title>
  <desc id="desc">The emotional tone explores the tension between love and betrayal, represented through a palette of warm pinks and reds juxtaposed with the darker grays of betrayal. The first four rows suggest warmth and connection with broken dot patterns, while the bottom four rows express the sharpness and misalignment of betrayal using stair-like patterns. The central layout creates a split, visualizing the emotional divide, with abrupt collisions of color and form enhancing the narrative of conflict. Broken pixels are strategically placed to embody imperfections inherent in love.</desc>
