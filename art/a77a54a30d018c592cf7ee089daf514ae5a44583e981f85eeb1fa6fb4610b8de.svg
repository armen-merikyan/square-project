<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Contrasts</title>
  <desc id="desc">This piece captures the emotional struggle between softness and severity through a collision of light and dark colors. The central area, dense with shades of warm white and powder pink, evokes a sense of gentleness and forgiveness. In contrast, sharp crimson and carbon black disrupt the boundaries, representing severity and guilt. The flow leans towards a pulse-like pattern, embodying the dynamic tension of an open gate allowing quiet colors to be interrupted by darker hues. The pattern is intentionally asymmetric, inviting the viewer to navigate through density and quiet fields. The use of broken pixels reflects imperfections in emotional states, enhancing the narrative of struggle and release.</desc>
