  <title id="title">Emotional Collision</title>
  <desc id="desc">This artwork expresses the tension between tenderness and rage through contrasting color placement. The palette of deep blacks and reds represents the rage, while soft pale blues and whites signify tenderness. The main collision occurs diagonally, as the dark colors bleed into lighter stripes, creating a visual disconnect that embodies the emotional struggle of guilt and forgiveness. The hard edges emphasize the sharpness of rage against the gentle flow of tenderness, invoking a dynamic interplay of both feelings within a confined space.</desc>
