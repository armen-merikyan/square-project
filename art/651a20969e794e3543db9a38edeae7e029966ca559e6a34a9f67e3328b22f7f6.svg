<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Waves</title>
  <desc id="desc">This artwork embodies the tension between clarity and interference, reflected in the use of a bright signal color palette set against darker static tones. The green and electric blue represent a clear pulse amidst the surrounding noise, depicted by static gray and dead black. The checker pattern (signifying the signal) clashes with the broken frame style (representing noise), creating visual tension. The center of the grid serves as the focal point, where this collision feels most pronounced, embodying the concept of a 'pulse' being compromised by surrounding chaos. This piece invites the viewer to contemplate the balance between clarity and confusion, evoking a layered emotional response.</desc>
