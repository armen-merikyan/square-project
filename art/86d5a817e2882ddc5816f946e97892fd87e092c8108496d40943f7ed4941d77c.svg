<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone is defined by the dynamic interplay between desire's vibrant warmth and the cool distances of emptiness. The palette features hot coral and blood orange for warmth, contrasted with charcoal and hollow blue representing voids. The main contrast occurs at the center where the warm colors push outwards against the cooler edges, creating visual tension reminiscent of overflow contained. Patchwork-like placements for emptiness collide with the stepping patterns of desire, creating structured chaos. Broken pixels disrupt the order to convey the tension between longing and limitation.</desc>
