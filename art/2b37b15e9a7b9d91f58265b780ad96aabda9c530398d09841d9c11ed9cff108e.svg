<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Boundaries</title>
  <desc id="desc">This composition contrasts defiance and submission through a deliberate clash of structured and chaotic patterns. The left side features a stacked arrangement of muted blues and grays representing defiance; it conveys strength through angular resistance. The checker pattern on the right introduces lavender and soft cyan, simulating a sense of submission through its enclosed feel. Broken pixels disrupt both patterns, reflecting the glitches of real-life struggles between these emotional states. The palette, 'melancholy_wonder,' enhances the overall tone, inviting viewers to contemplate the dichotomy of emotions. The main collision occurs vertically, which echoes the concept of order vs chaos, effectively threading these two feelings together in an abstract narrative.</desc>
