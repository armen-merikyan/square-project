<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This piece captures the tension between the liveliness of 'spark' represented by warm reds, and the muted calm of 'ash' achieved with shades of black and pale blue. The interplay creates a visual narrative of hunger versus restraint, with the central collision of colors portraying a struggle between the two. The edge style hints at softness, while broken pixels serve as intentional disruptions that reflect imperfection. Color distribution maintains dominance where the red forms a wave against the black, emphasizing the emotional contrast within the grid, creating a rhythm of conflict and resolution.</desc>
