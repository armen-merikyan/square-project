<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Dichotomy</title>
  <desc id="desc">This abstract piece explores the contrasting emotions of joy and grief represented through a split vertical layout. The left half embodies joy with warm yellows and oranges, symbolizing openness and positivity, using striped patterns to evoke expansion. The right half channels grief with cool muted purples and deep blues, creating a sense of heaviness, utilizing dot patterns that suggest fragmentation and an oppressive weight. The hard edges and broken pixels introduce an element of chaos amidst order, emphasizing emotional turmoil and the collision of these contrasting states. The negative space allows the viewer to feel the emotional breadth, allowing both feelings to coexist while hinting at an unresolved tension. Overall, the piece captures the complexity of human emotion, reflecting the push and pull between joy's brightness and grief's shadow.</desc>
