<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between States</title>
  <desc id="desc">The emotional tone of this piece conveys the struggle between restlessness and peace, represented through a palette that juxtaposes moss green for tranquility against rust for turbulence. The composition flows from the top down, resembling falling pixels that mimic the weight of memory and movement. Main contrasts occur at the center with clashing colors, symbolizing the collision of emotions while softer edges welcome quiet spaces. The seed informs this arrangement by suggesting layered dynamics of emotional weight, echoing through cracked patterns that intertwine with broader, more serene pools of color. The discord and balance create a narrative of unresolved tension, with the broken pixels acting as scars of past emotions leaving an imprint on tranquility.</desc>
