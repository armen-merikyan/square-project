<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotion</title>
  <desc id="desc">The artwork captures the tension between joy and grief through a strategic use of colors and patterns. The palette consists of vibrant yellows and oranges to represent joy, contrasted against muted blues and purples for grief. The outer edges feature chaotic broken dots to symbolize grief, while the inner core uses a flame pattern representing joy, creating a visual vibrancy amidst the heaviness. This layout creates a sharp contrast, with an evident collision at the boundary where joy meets grief, highlighting the intricacies of emotional experiences. Negative space is utilized in the design to evoke feelings of void and openness, allowing the viewer to feel the shift from joy to grief and vice versa.</desc>
