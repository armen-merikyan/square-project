<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Tension</title>
  <desc id="desc">This artwork captures a visceral emotional exchange between envy and gratitude, contrasting heavy, dark colors with lighter ones to symbolize tension and resolution. The palette of pink, red, and gray conveys complex feelings, while the arrangement of colors employs a zigzag flow juxtaposed with a near symmetry to reflect the idea of a broken mirror—imperfections that reside at pivotal moments of emotional conflict. The density on the left hints at the weight of envy, while the lighter tones on the right suggest moments of gratitude, creating an abstract story of inner conflict.</desc>
