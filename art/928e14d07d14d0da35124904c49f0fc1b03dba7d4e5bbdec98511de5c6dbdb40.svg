<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Echo</title>
  <desc id="desc">This composition channels the tension between 'emptiness' and 'desire' through a warm vs cool palette, emphasizing contrasts. The top four rows represent desire with warm golds and soft greens in a checker pattern, suggesting movement and pull. The bottom four rows depict emptiness through muted blacks and dark violets in a maze formation, evoking a sense of quiet isolation. The interaction between the two halves creates a feeling of conflict and balance, while broken pixels introduce an element of imperfection, reflecting the complexity of emotions.</desc>
