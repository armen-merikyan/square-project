<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Lattice</title>
  <desc id="desc">This piece explores the emotional contrast between desire and restraint through a dynamic palette of saturated and muted tones. The vibrant reds and orange represent desire, surging against the more restrained blacks and grays which symbolize containment. The main collision occurs along the diagonal, where the crack-like pattern of desirous energy pushes into the crosshatch of restraint, creating a visual tension. The lattice forms an illusion of pressure that both holds back and creates movement, evoking feelings of love and betrayal as strong, passionate emotions intermingle with feelings of confinement.</desc>
