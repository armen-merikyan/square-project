<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erosion of Boundaries</title>
  <desc id="desc">This piece captures the emotional interplay between vulnerability and strength through a palette reminiscent of broken memories—sepia, tan, dust gray, and faded blue suggest warmth alongside cool detachment. The main contrast occurs in a central cascade of dark and muted colors touching lighter tones, embodying the tension between safety and exposure. Broken pixels disrupt the flow, giving texture and indicating the scars of experiences that shape resilience. Overall, the piece evokes a contemplative journey through emotional depths and lightness.</desc>
