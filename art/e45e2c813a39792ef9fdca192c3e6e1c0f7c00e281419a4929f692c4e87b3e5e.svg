<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition explores the tension between vulnerability and strength through contrasting colors and structured chaos. The palette combines saturated reds and blacks with muted pale blues and whites, symbolizing strength's warmth and vulnerability's coolness. The broken frame layout emphasizes the emotional leakage of vulnerability while the strong central area suggests stability. The collision between flame-like strength patterns and maze-like vulnerabilities produces a dynamic visual story of conflict and coexistence.</desc>
