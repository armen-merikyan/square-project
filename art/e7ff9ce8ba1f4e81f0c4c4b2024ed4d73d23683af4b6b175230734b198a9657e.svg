<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This composition evokes the emotional tension between restlessness and peace through contrasting patterns and colors. The darker outer border represents the unrest and chaos, with varied shades of black and gray creating a sense of pressure. The inner 4x4 checker pattern in light blues and whites symbolizes peace, offering a gentle and calming ambiance. The main collision of emotions occurs at the transition between these two zones, emphasizing an interruption between serenity and turmoil. The use of broken pixels within the orderly inner area signifies scars of experiences that disrupt tranquility, furthering the abstract narrative born from the seed.</desc>
