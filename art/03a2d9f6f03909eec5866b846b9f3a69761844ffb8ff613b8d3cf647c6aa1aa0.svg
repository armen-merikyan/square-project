<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">The emotional tone explores the interplay between longing and resolve—representative of a struggle between desire and stability. The palette, consisting of soft clay and distant lilac with accents of cool blue and warm shadow, creates warmth against cooler tones, symbolizing the interplay of urgency and calmness. The main contrast occurs in the top left corner where dense clusters of warmer colors collide with quieter spaces, effectively illustrating the thematic tension of ‘overflowing’ versus being 'contained.' Broken pixels introduce intentional scars, embodying the damage and repair inherent in the emotional narrative.</desc>
