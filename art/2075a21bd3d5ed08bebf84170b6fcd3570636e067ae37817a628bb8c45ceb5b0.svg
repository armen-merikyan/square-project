<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmonic Tension</title>
  <desc id="desc">This piece encapsulates the emotional interplay between vulnerability and strength through the use of a warm palette reminiscent of ancient fire. Dark reds and burnt oranges symbolize the core of strength, while softer shades introduce vulnerability. The stark contrasts of light and dark along with broken pixels in the center create a collision of feelings, representing exposure against the sheltering edges. The upward flow signifies hope emerging from struggle. The chaotic interplay of colors forms a rhythmic tension, evoking the ups and downs of emotional landscapes.</desc>
