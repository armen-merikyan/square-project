<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone expresses a balance between intense, compressed rage symbolized by the bold reds and dark shades, contrasting with the calming presence of pale blue and white, which represent quietness and containment. The chaos of the rage manifests in sharp, stepped patterns that interrupt the smoother floods of the calming colors. The main collision occurs at the edge, where jagged anger meets the soft flow, creating an unresolved tension. This layout mirrors a room where explosive energy collides with tranquil space, enhancing the theme of containment versus overflow. The use of broken pixels adds intentional disruptions to the serene calm, suggesting the impact of overwhelming emotions in a structured space.</desc>
