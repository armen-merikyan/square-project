<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition captures the emotional tension between emptiness and desire through a split layout, using a saturated palette that juxtaposes warm, bright hues with dark muted tones. The left side embodies the hunger for fulfillment with hopeful coral and orange tones, while the right side uses quiet charcoal and hollow blue to depict the coldiveness of restraint. The main collision occurs in the center where colors interact chaotically, and the broken pixels add a sense of disruption and unpredictability to the orderly structure, symbolizing the imperfections we face in our desires.</desc>
