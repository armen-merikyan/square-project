<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tide of Curiosity and Certainty</title>
  <desc id="desc">Emotional tone balances between the assuredness of certainty and the unpredictable nature of curiosity. The muted yet rich palette shifts from the calmness of pale mint and soft sky to the heavier storm gray and near black, representing the transition from clarity to chaos. The laid patterns of certainty–the stepwell design–collides with the curiosity-driven stripes, illustrating tension at the center, where the two emotional states intertwine. Broken pixels introduce intentional disruptions, symbolizing the interruptions of certainty by curiosity, creating an abstract narrative of rising signals and receding edges in an open gate layout.</desc>
