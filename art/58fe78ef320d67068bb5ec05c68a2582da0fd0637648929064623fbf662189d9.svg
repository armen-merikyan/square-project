<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragile Horizons</title>
  <desc id="desc">This artwork explores the tension between vulnerability and strength. The colors drawn from the chosen palette of 'safety_exposure'—shelter green, warm brown, pale skin, cold white, and open blue—create a foundation that balances warmth and coolness. The central block of pale skin and open blue suggests an exposed core, while the edges of warm brown and shelter green surround it, embodying strength and offering protection. The deliberate ‘broken pixels’ introduce irregularities, enhancing the sense of vulnerability. The evolution from lighter colors to darker at the corners conveys a narrative of safety encroaching upon exposure, with the main collision occurring in the center—visually representing the struggle between the two emotional states.</desc>
