<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order and Unrest</title>
  <desc id="desc">This composition contrasts the warmth of trust against the shadows of suspicion, as represented by the uneven distribution of the palette. The darker tones dominate the top left, reflecting suspicion and chaos, while the muted cream provides a stable base in the bottom right, symbolizing trust. The 'diagonal fall' leads the eye across the canvas, echoing tension and vulnerability as the colors collide and blend in the center. The edges, with eroded effects, suggest a boundary under pressure that strains yet holds firm.</desc>
