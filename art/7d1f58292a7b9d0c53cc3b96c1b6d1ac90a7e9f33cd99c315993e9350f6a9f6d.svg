<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Fulfillment</title>
  <desc id="desc">The emotional tone arises from a dynamic tug-of-war between the warm pull of desire and the cool void of emptiness. The palette reflects this through warm coral and orange hues symbolizing desire, contrasted against the muted tones of charcoal and hollow blue that evoke a sense of emptiness. The main contrast occurs at the center where pulses of warm colors collide with scattered cool fields, interrupted by broken pixels that symbolize imperfections in this emotional landscape, emphasizing the struggle between wanting and having.</desc>
