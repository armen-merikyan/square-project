  <title id="title">Tension in the Void</title>
  <desc id="desc">This artwork embodies the emotional tug-of-war between envy and gratitude, illustrated through a palette of bright yellows and muted purples balanced against deep blues. The use of a maze pattern represents envy as it twists and turns, while the mirror pattern reflects the calm of gratitude. The central area has dense color disruption mimicking noise, surrounded by softer edges that signify an empty yet filled space. The collision occurs heavily in the center where vibrant yellows clash with cooler blues, expressing the struggle of emotions rising and falling.</desc>
