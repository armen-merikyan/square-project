<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilient Fragmentation</title>
  <desc id="desc">This composition evokes the tension between vitality (spark) and decay (ash), using a palette of soft browns, ash gray, and warm ivory to symbolize fragility and resilience. The diagonal layout creates a clear collision between invigorating bursts of soft gold against muted tones, illustrating the struggle between hunger and restraint. The patterns—'noise' for ash and 'target' for spark—create a visual sense of interruption, echoing the contrast in memory and erasure, making the piece dynamically engaging yet abstract.</desc>
