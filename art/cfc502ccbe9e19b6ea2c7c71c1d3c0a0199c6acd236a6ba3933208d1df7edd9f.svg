<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow of Emotion</title>
  <desc id="desc">This piece explores the emotional pulse between confusion and clarity through a dynamic tension between dense pixels and open space. The chosen palette of pink, red, gray, and dark maroon reflects a narrative of love entwined with betrayal — vibrant warm tones clash with somber shades, suggesting a corrupting influence at the edges. The layout pits organized noise at the center against chaotic crack formations around the edges, embodying duality as the patterns fight for dominance while maintaining an intentional unevenness. The broken pixels interrupt the flow, symbolizing imperfections in clarity, while the gradients suggest a movement from the center outward, creating an unease tapering into stillness. This makes the viewer feel the weight of distorted clarity amidst chaos.</desc>
