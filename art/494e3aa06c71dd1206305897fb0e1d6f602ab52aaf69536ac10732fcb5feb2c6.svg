<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This composition embodies the emotional dichotomy of panic and control through a juxtaposition of ordered and fragmented patterns. The palette features warm yellows and oranges representing the urgency and chaos of panic, contrasted with the cooler deep blue and muted purple tones that signify stability and control. The flow radiates from the center, highlighting the emerging chaos in the corners while leaving intentional negative space that suggests an empty room. The structured 'stairs' pattern on one side, symbolizing control, collides with the swirling 'rings' on the opposite side, evoking the disorder of panic. The overall arrangement reflects inner turmoil—capturing the delicate balance of emotions as they orbit around the central spark of conflict.</desc>
