<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Broken Signal</title>
  <desc id="desc">The emotional tone explores the tension between clarity (signal) and distortion (noise). The selected palette, featuring 'signal_green' for clarity, 'electric_blue' for energy, 'dead_black' for depth, 'static_gray' for interference, and 'hot_magenta' for tension, establishes a vivid contrast. The main collision occurs at the center, representing the struggle of a clear signal trying to break through chaotic noise, while the layout emphasizes a diagonal flow leading from one corner, enhancing the feeling of invasion and the fight for presence within chaos. The 'fault_line' and 'echo' patterns visually manifest this tension, with broken pixels illustrating imperfections in the signal transmission.</desc>
