<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Boundary of Emotion</title>
  <desc id="desc">This composition explores the emotional dichotomy between desire and restraint through contrasting colors and patterns. The use of warm reds and muted creams signifies a warm pull of desire, set against darker, cooler shades of plum and gray representing restraint. The central region is densely punctuated with these warmer tones, creating a center pulse, while the outer edges softly recede into darker, restrained colors, enforcing a controlled boundary. The stepped patterns convey a structural tension, where warmer hues intermittently disrupt the cooler ones, reflecting the struggle of balance and juxtaposition in emotional experiences. Broken pixels introduce intentional imperfections, emulating the scars of love and betrayal inherent in the emotional narrative.</desc>
