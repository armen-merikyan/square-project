<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Presence</title>
  <desc id="desc">This composition explores the emotional tension between loneliness and connection. The selected palette, featuring electric blue and magenta, reflects vibrancy against a deep black background, suggesting bursts of connection amidst feelings of isolation. The main contrast lies in the arrangement, where darker shades dominate the corners while lighter, more vibrant colors shift toward the center, embodying the central theme of hidden versus exposed emotions. The flow of colors moves from right to left, echoing the ebb and flow of connection, with 'teeth' patterns creating jagged interruptions against the smoother 'stairs' of connection, mirroring the struggle between these two emotional states.</desc>
