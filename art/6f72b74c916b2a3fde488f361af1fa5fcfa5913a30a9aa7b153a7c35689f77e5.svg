<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension's Spectrum</title>
  <desc id="desc">Inspired by the emotional contrast of defiance versus submission, the palette of warm yellows and muted purples suggests a spectrum of feelings, with yellow representing defiance and muted purple signifying submission. The background flows from dark to light, creating a noise against the steady frame of the edges, capturing the tension between distant heaviness and lightness. Each row alternates between clustered warmth and detached coolness, with broken pixels introducing imperfection, representing the unresolved nature of emotional conflicts. This layout emphasizes a pulse-like rhythm, resonating the uneasy balance between the center and edges.</desc>
