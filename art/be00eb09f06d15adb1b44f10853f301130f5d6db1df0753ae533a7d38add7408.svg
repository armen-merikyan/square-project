<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Restoration</title>
  <desc id="desc">This artwork captures the emotional dichotomy of longing and resolve through the juxtaposition of dark, contemplative tones on the left, representing longing, with the brighter, more structured tones on the right, symbolizing resolve. The use of 'mourning_black' and 'deep_blue' creates a feeling of introspection, while 'new_leaf' and 'pale_yellow' convey the brightness of renewed hope. The collision occurs centrally as the shatter pattern crosses into the embers of the right side, reflecting tension between brokenness and restoration, with intentional disruptions mimicking gaps left by loss and the beauty of reparation. This composition strikes a balance between quiet and emotional density, leaving spaces that echo the emotional weight of the themes.</desc>
