<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Calm and Chaos</title>
  <desc id="desc">This piece explores the emotional duality of tenderness and rage, using a palette of red, pale blue, black, and white to contrast explosive energy with calm clarity. The vertical flow of pixels mimics falling rain or tears, suggesting an emotional descent. The arrangement is intentionally imperfect, with broken pixels introducing disruption and tension across the canvas, particularly at the center where the contrasting colors collide. This reflects the inner struggle of these feelings, creating an abstract narrative that speaks to guilt and forgiveness. The use of muted colors against saturated tones creates a quiet channel amidst the chaos, while interspersed quiet spaces enhance the overall dynamism of the work.</desc>
