<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Harmony</title>
  <desc id="desc">This artwork captures the emotional duel between rage and calm through a contrasting palette of deep, passionate reds and serene blues. The layout features a compromised center surrounded by flowing colors, representing how rage can creep into calm. The diagonal flow of reds intersperses with horizontal bands of pale blue, creating a dynamic tension that interrupts the calmness. The pattern mirrors around the center to echo the feeling of a fracture, while leaving negative space to suggest unresolved emotions and whispers of solitude.</desc>
