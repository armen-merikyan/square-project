<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone of this piece reflects the delicate balance between vulnerability and strength, represented through a split-horizontal layout. The upper four rows convey strength with quiet, stable shades of dark and muted colors, contrasted against the vulnerability expressed in the lower rows using electric and luminous colors, creating a striking visual tension. The palette is dominated by deep greens and blues for stability, punctuated by bright magenta and electric blue as accents of exposure and lightness, giving rise to a story of tension between dark protection and light vulnerability. The broken pixels introduce intentional disruptions, echoing the theme of fragility amidst strength and emphasizing the emotional depth of the contrasts.</desc>
