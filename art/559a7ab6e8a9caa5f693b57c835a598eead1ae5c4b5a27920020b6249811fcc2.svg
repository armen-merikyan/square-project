<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">This artwork captures the emotional conflict between joy and grief, using a palette of vibrant yellows and oranges against muted blues and purples. The zigzag pattern of joy, represented by bright sparks, collides with the melancholic dots of grief, creating a push-and-pull effect. The broken edges suggest a fragility inherent in the human experience, where fleeting joy battles against depths of grief. The layout offers a spacious center that invites contemplation, embodying the contrast of chaos and order, perfectly reflecting the seed's duality.</desc>
