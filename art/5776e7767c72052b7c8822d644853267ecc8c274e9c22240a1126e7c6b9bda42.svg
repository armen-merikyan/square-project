<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Trust</title>
  <desc id="desc">The emotional tone navigates between trust and suspicion, creating a tension that is visually represented through contrasting elements. The colors draw from a palette named 'lonely_signal,' using navy and dim cyan to evoke trust, while the presence of black adds a shadowy hint of suspicion. The visual flow exists in a mirrored layout with broken pixels, disrupting the stability that trust tries to build against suspicion's jagged islands. The collision occurs at the center, where trust's soft channels meet suspicion's dark islands, amplifying the emotional dissonance this seed suggests. Overall, the composition reflects resilience amid fragility with intentional negative space, allowing the colors to breathe within the structure.</desc>
