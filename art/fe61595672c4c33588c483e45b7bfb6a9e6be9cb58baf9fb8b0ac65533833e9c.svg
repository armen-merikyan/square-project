<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Control</title>
  <desc id="desc">This artwork embodies the emotional tug-of-war between control (represented through darker, anchored colors) and surrender (expressed via lighter, flowing hues). The palette employs deep blacks and blues for the asserting control, contrasted with soft whites and greys to suggest a release—a quiet surrender. The main collision occurs at the center, where the darker boundary of control interacts dynamically with lighter surrender, creating a tension that mimics the push and pull of the ideas in the seed text. The structured, slightly broken pixel layout suggests both rigidity and a hint of imperfection, resonating with the themes of containment and overflow.</desc>
