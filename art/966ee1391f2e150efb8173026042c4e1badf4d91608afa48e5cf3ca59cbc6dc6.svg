<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetrical Tension</title>
  <desc id="desc">This composition embodies the emotional conflict between control and surrender. The palette, drawn from the 'guilt_forgiveness' theme, features deep wine tones for intensity, softened by ash gray and warm ivory to represent the quiet spaces of surrender. The primary collision occurs in the center, where a thick outline of dark color interrupts lighter hues, creating a stutter-like response felt throughout the artwork. The lattice pattern on one side suggests a sense of control, while the grid on the other allows for released tension, symbolizing overflow and containment. Together, the piece invites contemplation on the balance between these opposing emotions.</desc>
