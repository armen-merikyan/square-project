<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Time</title>
  <desc id="desc">The emotional tone captures a dichotomy between nostalgia and progress, evoking a sense of tension that balances memory with forward movement. The palette of deep black, dark violet, soft gold, and pale green symbolizes the weight of the past against the sparks of growth and hope. The horizontal split creates a collision where the dense bottom half (blacks and violets) represents nostalgia, while the lighter upper half (golds and greens) signifies progress. The pattern features broken edges, reinforcing the imperfection inherent in this balance, while strategic negative space enhances the feeling of incomplete narratives, provoking reflection.</desc>
