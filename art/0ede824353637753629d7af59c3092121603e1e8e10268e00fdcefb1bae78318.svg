<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone focuses on the fragile balance between vulnerability and strength. The palette uses high-contrast colors to suggest tension; the electric blue and magenta represent energy and impact in the center, juxtaposed with the calmness of lime and black surrounding it. The main contrast occurs in the center where the checker and crosshatch patterns collide, embodying both the chaos of brokenness and the clear lines of strength. This layout fills the canvas with a sense of push and pull, echoing the themes of exposure and shelter. The broken pixels are strategically placed to enhance this narrative of imperfection and openness.</desc>
