<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilient Fracture</title>
  <desc id="desc">This artwork embodies the tension between vitality (spark) and decay (ash). The palette of ripe green and honey gold introduces warmth and vibrancy, while deep olive and cream suggest a grounded, muted resonance. The collision occurs sharply down the middle, dividing the canvas into lively bursts on the left and soft, muted tones on the right, representing emotional struggles. This visually represents the push and pull between life and obliteration, with jagged edges hinting at disruption, reflecting memories both cherished and lost.</desc>
