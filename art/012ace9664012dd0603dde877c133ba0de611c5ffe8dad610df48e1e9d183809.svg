<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Echoes</title>
  <desc id="desc">This piece captures the tension between tenderness and rage through a clash of soft and sharp colors. The use of muted blues reflects tenderness, while the contrasting deep reds and blacks represent rage. The layout features two pulses of color in the center, creating a collision of emotions, indicating the struggle between calm and chaos. The checker pattern for tenderness gently overlaps with ripple patterns of rage, suggesting movement and conflict while maintaining a coherent structure. Broken pixels are intentionally placed to add imperfection, evoking a sense of vulnerability amidst the turmoil.</desc>
