<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Orbit</title>
  <desc id="desc">This composition embodies the emotional conflict of panic versus control through a palette that balances warm yellows and oranges against deep blues and muted purples. The placement of the bright colors in the top left resonates with 'control,' suggesting warmth and intention, while the deep blue and muted tones symbolize the 'panic' spilling from the corners, creating an unstable sense of space. The mixture of crack patterns representing control and split-screen patterns representing panic highlights the duality inherent in the seed themes. There are jagged edges and broken pixels to enhance the feeling of interruption and imperfection, creating a rhythm of tension that resonates throughout.</desc>
