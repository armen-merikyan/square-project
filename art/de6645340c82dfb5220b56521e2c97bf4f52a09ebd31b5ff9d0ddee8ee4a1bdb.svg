<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Resolve</title>
  <desc id="desc">The emotional tone is a dance between longing and resolve, encapsulating tension within a structured chaos. The palette combines warm tones of red oxide and small orange with cooler shadows of iron gray and blackened plum, creating a visual conflict. The main collision occurs off-center, where the dense noise of resolve interrupts the flowing mirror patterns of longing. This abstraction effectively captures the essence of tension and release as defined by the seed, allowing for a space that feels both contained and overflowing, reflecting the dialectic of emotions.</desc>
