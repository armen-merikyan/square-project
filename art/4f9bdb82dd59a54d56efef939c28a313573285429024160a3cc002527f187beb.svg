<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">This composition captures the emotional tension between joy and grief through a contrasting palette of warm and cool colors. The left side employs a scattered 'noise' pattern evoking grief with deep blues and muted purples, while the right side showcases a structured 'checker' pattern symbolizing joy in bright yellows and oranges. The center holds an intentional break, achieving a pulse-like rhythm that conveys the heart's beats of conflicting emotions. The jagged edges signify the rawness of emotions and the spatial symmetry hints at an unresolved narrative.</desc>
