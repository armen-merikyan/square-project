<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This artwork embodies a tension between control and surrender, illustrated through a contrasting palette and composition. The color choices—cosmic indigo, void black, cold gold, and deep teal—evoke an awe-terror palette, where dark, muted colors represent containment and pressure, while brighter accents suggest moments of release and vulnerability. The central area of void black contrasts against the bright accents, representing an overwhelmed center that seeks a release. The ‘broken frame’ layout introduces interruptions, with deliberate breaks allowing emotions to leak out into the surrounding space. The patchwork and shatter patterns collide, creating a dynamic interplay that reflects the emotional conflict of control versus surrender. This composition ultimately captures a journey of tension and soft release in its abstract narrative.</desc>
