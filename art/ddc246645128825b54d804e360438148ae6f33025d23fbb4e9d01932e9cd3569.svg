<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition reflects the emotional tension between explosive rage and serene calm. The chosen palette of red and pale blue serves to intensify this contrast, where red patterns interrupt the expansive calm of blue. The main collision occurs towards the center, where jagged red echoes disrupt the horizontal flow of the calmer blue bars. The eroded symmetry of the grid introduces an asymmetry that mimics the unpredictable nature of emotions in conflict, embodying the idea of contained rage seeking release amidst a soothing backdrop.</desc>
