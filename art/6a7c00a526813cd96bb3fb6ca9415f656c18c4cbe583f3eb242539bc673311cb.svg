<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Stillness and Surge</title>
  <desc id="desc">This composition embodies the tension between restlessness and peace through color and structure. The color palette of signal green, electric blue, dead black, static gray, and hot magenta captures the energetic clash of emotions. The left half represents peace with calm fields of static gray and muted tones, while the right erupts with vibrant accents of electric blue and hot magenta suggesting motion and urgency. The collision occurs diagonally, allowing both emotions to weave around each other, interrupted by grounded blacks, representing a struggle against chaos within a structured layout. The design reflects a visual dichotomy that resonates with the complexities of memory and motion.</desc>
