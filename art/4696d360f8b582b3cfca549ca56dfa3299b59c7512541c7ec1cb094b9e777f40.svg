<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone captures the pull of desire clashing with the confines of restraint. The palette blends warm tones of hot coral and blood orange representing desire, while muted shades of charcoal and hollow blue serve to create a contrast of restraint. Centralized collisions emerge as saturated colors collide with sealed edges, representing the struggle between expansion and confinement. The pixel arrangement exhibits pulsing warm marks at the base with stark static patterns overlaying them, visually interpreting the push-pull dynamic of the emotional seed.</desc>
