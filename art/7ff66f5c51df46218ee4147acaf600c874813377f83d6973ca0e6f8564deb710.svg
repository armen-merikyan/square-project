<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone reflects a dialogue between safety and exposure, conveyed through contrasting color choices and patterns. The palette of shelter green and warm brown introduces a sense of stability, while pale skin and open blue evoke a feeling of vulnerability. The dominant use of warm brown suggests a strong protective barrier against the cooler tones of pale skin and open blue, colliding in the center of the square. The layout of falling pixels creates a visual metaphor for the tension between being sheltered and exposed, where soft edges encounter sharper contrasts, maintaining a balance of structure and disarray. The placement of broken pixels adds intentional disruptions, suggesting scars or memories that influence this emotional exchange.</desc>
