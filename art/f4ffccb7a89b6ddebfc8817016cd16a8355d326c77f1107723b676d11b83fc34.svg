<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contradiction</title>
  <desc id="desc">The emotional tone is a clash between defiance and submission, illustrated through a centered contrast. The palette of moss green, bone white, rust, stone gray, and small gold reflects both resilience and fragility. The main collision is in the center, where dark rust and moss green suggest defiance, while surrounding fields of lighter colors embody submission. This interplay creates a feeling of motion, like a spiral seeking balance but caught in resistance, shaping an abstract pattern that embodies tension and depth.</desc>
