<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This composition captures the emotional tension between safety and exposure. The palette, with soft greens and browns against pale skin tones and icy whites, balances warmth and coldness. The main collision, represented by denser crosshatch patterns on the left, echoes the pressure of 'safety', contrasting sharply with the more open, hinge patterns on the right, symbolizing 'exposure'. The layout allows for a cascading effect that channels the emotions downward, reminiscent of falling tears or ash, creating a dense yet breathable space within the abstract formation.</desc>
