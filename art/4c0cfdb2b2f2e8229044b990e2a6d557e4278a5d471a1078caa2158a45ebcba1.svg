<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone reflects a struggle between vibrant sparks of energy and muted ash-like residues. The palette combines bold 'signal green' and 'electric blue' as representations of the spark, while 'static gray' and 'dead black' evoke the ash. The main collision occurs centrally where the 'islands' of bright colors burst against the striped 'barcode' patterns of softer tones, creating a dynamic visual conversation between density and quietness. The jagged edges add a sense of disruption and movement, reminiscent of memories either forming or fading.</desc>
