<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Colors</title>
  <desc id="desc">This composition explores the emotional dichotomy of joy and grief through contrasting color blocks. The palette of warm yellows and oranges intertwined with deep blues captures the struggle between light and dark, joy and sadness. The top half features a structured grid pattern symbolizing joy, where the colors expand and resonate, while the lower half breaks apart into more chaotic stair-like arrangements denoting grief, creating a sense of heaviness. The jagged edges create interruptions, emphasizing the tension within the composition. Broken pixels introduce imperfection, mirroring the abrupt shifts in emotion, leaving just enough negative space to allow each emotional wave to breathe.</desc>
