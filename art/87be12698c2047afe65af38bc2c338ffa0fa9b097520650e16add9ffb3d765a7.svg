<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order in Chaos</title>
  <desc id="desc">This artwork captures the emotional complexity of trust versus suspicion through a deliberate clash of patterns and colors. The left side embodies trust with cooler tones of pale aqua and mist gray, depicting stability and calmness. Conversely, suspicion is represented by harsher hues of alarm red and ink blue, reflecting tension and instability. The palette was intentionally chosen to balance serenity and urgency, creating a visual resonance between the two emotions. The dense center displays a high concentration of colors, while the border contains these elements, creating a sense of pressure and confrontation. The main collision occurs in the center where the patterns of each emotional state interrupt each other, emphasizing the conflict and dynamic nature of the duality depicted. The overall structure serves to reflect the psychological interplay between trust and suspicion without representing any literal imagery.</desc>
