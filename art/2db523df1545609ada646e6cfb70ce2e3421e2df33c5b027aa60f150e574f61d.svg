<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone captures the tension between love and betrayal, utilizing a palette inspired by warmth and depth with shades of pink, red, gray, and dark maroon. The contrast lies in the soft 'stairs' pattern representing love, clashing against the jagged 'crosshatch' symbolizing betrayal, creating a fragmented rhythm across the canvas. The placement of colors seeks to evoke the push and pull of emotions, where the warm pinks attempt to rise against the cool grays, suggesting a diagonal rise toward some equilibrium that remains elusive, echoing the unease of the situation. Broken pixels are introduced to disrupt any sense of perfect harmony, imparting an additional layer of imperfection reflective of the themes woven into the seed.</desc>
