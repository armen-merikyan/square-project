<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Emotion</title>
  <desc id="desc">The artwork captures the duality of fear and hope through contrasting colors and patterns. Dark colors represent fear, creating tension in the corners, while soft gold and pale green emerge subtly, suggesting hope rising from within. The jagged edges provide a sharp contrast to the smoothness of hope, mirroring the emotional battle between these opposing forces. This tension is echoed by the empty spaces, allowing for a breathing room that reflects the theme of 'inside vs outside.' The unexpected placement of brighter colors disrupts the predictability, creating visual intrigue that embodies the zigzag movement of thoughts in a chaotic world.</desc>
