<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Divergence</title>
  <desc id="desc">This composition captures the emotional dichotomy of signal versus noise through a deliberately chosen palette of deep navy, stark black, and accents of dim cyan and white. The overlapping patterns of 'lattice' and 'frame' create a tension between clarity and confusion, with an emphasis on the center where the two sensations collide. The arrangement gives space for negative areas to breathe, signifying quiet amidst the chaos, while broken pixels add intentional disruptions reflecting the noise. This piece tells a story of seeking clarity through interference, creating an abstract visual pulse.</desc>
