<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This piece embodies the tension between restlessness and peace, using a palette that contrasts deep darkness with soft, pale hues. The black and dark violet represent the weight of restlessness, creating a dense, unsettled pulse. In contrast, the soft gold and pale green provide a sense of peace and quiet symmetry. The main collision occurs diagonally across the center, where the maze-like pattern of restlessness interjects with the more structured, mirrored calmness of peace. The uneven arrangement of colors reflects an unsettled rhythm, while the sealed edges create a boundary, emphasizing the contrast between serenity and tumult. The abstract pattern captures a journey through these emotional states without literal representation.</desc>
