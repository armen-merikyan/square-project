<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone captures the tension between desire (represented by warm, saturated colors) and emptiness (expressed through cool, low-saturation colors). The palette features vibrant hues of hot coral and blood orange, symbolizing intense longing, contrasted with charcoal and hollow blue that evoke a sense of void. The composition uses a corner layout to represent overflow, with the central collision occurring where the warm colors invade the cooler space, creating an asymmetrical dynamic that feels both pressured and interrupted. This arrangement embodies the conflict described in the seed, illustrating the push and pull of desire against the constraints of emptiness.</desc>
