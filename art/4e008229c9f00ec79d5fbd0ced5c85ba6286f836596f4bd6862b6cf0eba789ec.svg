<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone represents a struggle between defiance and submission, using a palette of mourning renewal colors to embody tension. The dominant shade of mourning black provides a stark backdrop, punctuated by vibrant new leaf accents that signal resistance and vibrancy. The arrangement suggests a rising signal as colors advance upward, with broken pixels introducing intentional imperfections symbolizing the fractures in emotions. The main collision occurs at the center, where defiant channels of colors clash against a subdued grid, illustrating the interplay between the defiant and the subdued, chaos and calm. This composition captures the complexity of emotional experiences without literal representation.</desc>
