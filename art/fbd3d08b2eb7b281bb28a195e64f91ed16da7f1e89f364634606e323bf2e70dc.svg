<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects a tension between control and surrender, illustrated through contrasting patterns: a structured maze representing control, and soft embers symbolizing surrender. The palette of muted cream for calm, with harsh reds and blacks capturing urgency and pressure, creates a dynamic collision in the center. An open-gate layout allows the embers to spill outward from the organized grid, exposing the vibrant core. The use of broken pixels introduces intentional chaos, disrupting the tranquility and enriching the narrative of struggle and interplay between containment and release.</desc>
