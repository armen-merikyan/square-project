<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Order and Chaos</title>
  <desc id="desc">The emotional tone combines themes of panic and control, encapsulating a fight between structured patterns and chaotic disruptions. The chosen palette, inspired by 'ancient_fire', employs burnt orange and dark red to evoke feelings of anxiety and urgency while contrasting with muted charcoal and gold to represent stability and warmth. The arrangement emphasizes straight versus curved lines, where burnt hues create jagged interruptions against the structured gold and charcoal backdrop, symbolizing the clash of order and chaos. Complex connections arise in the center, indicating a spark of conflict, while negative space on the edges allows for breathing room, echoing the tension of unresolved feelings.</desc>
