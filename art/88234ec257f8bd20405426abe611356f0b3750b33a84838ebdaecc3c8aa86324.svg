<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Torn Connections</title>
  <desc id="desc">The emotional tone of this piece embodies the struggle between loneliness and connection, depicted through a crosshatch pattern that juxtaposes warmth against cooler, darker shades. The palette reflects 'ancient fire'—burnt orange and dark red symbolize warmth and longing, while charcoal introduces the isolating darkness of loneliness. The main contrast manifests in the central area, where the lighter hues fight against the surrounding depth, representing the central struggle of reaching out within isolation. The seed inspired an abstract dialogue, where the split-screen pattern evokes hidden layers of emotion, making the viewer feel the tension between connection and detachment in the arrangement.</desc>
