<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Reflections of Duality</title>
  <desc id="desc">The emotional tone reflects an interplay of strength and vulnerability, suggesting an inner conflict. The palette of stain brown, ash gray, warm ivory, soft gold, and deep wine portrays warmth and depth, establishing a connection between the two emotions. The contrast is primarily centered, highlighting strength in the form of clustered bold hues meeting the softer, exposed tones at the edges. The core, resembling stability, faces the surrounding weightlessness, reinforcing the representation of 'center vs edges.' The use of broken pixels introduces an element of disruption, mirroring the theme of vulnerability amidst strength.</desc>
