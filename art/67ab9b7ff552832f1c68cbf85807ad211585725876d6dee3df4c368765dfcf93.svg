<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Edges of Light and Shadow</title>
  <desc id="desc">The emotional tone is a dance between the depths of fear and the glimmers of hope, portrayed through a stark contrast of dark and light. The palette utilizes black and dark violet to evoke a sense of weight and fear on the left, contrasted by the soft gold and pale green for a gentle hope on the right. The split layout captures the vertical divide between these emotions while the jagged edges create tension. Color placements echo bursts of fear intersecting with the fragile lines of hope, generating a rhythmic interplay that conveys the pressure of emotions against a background of intentional negative space.</desc>
