<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This artwork encapsulates the tension between vulnerability and strength through a carefully chosen palette of warm coral against cold slate. The cold slate creates a grounding effect, suggesting strength, while the warm coral introduces warmth, hinting at vulnerability. The contrast is evident at the center, where soft amber elements pulse, symbolizing an exposed core. The layout, using two small centers, allows for the interplay of colors to create an echoing rhythm against the sparseness of the surrounding fields, fulfilling the narrative of 'exposure vs. shelter'. Broken pixels disrupt the visual flow, reminding us of imperfections inherent in the human experience.</desc>
