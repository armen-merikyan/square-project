<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This artwork captures the interplay between quietude and pressure. The palette balances muted tones of off-white and faint peach against the more striking dark navy and compressed red, reflecting a tension between lightness and heaviness. The arrangement features dense clusters on the left side which slowly dissolve into a more open space on the right, symbolizing a release from pressure into clarity. The sharp edges contrast with softer gradients, allowing an exploration of disruption and harmony, shaped by the diagonal argument implied in the seed.</desc>
