<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Contrasts</title>
  <desc id="desc">This artwork explores the emotional dialectic between longing and resolve. The top half features a barcode pattern in varying shades of pink and red, evoking a sense of yearning with uneven edges that reflect the 'broken' nature mentioned in the seed. The bottom half switches to a braid-like pattern in gray and dark maroon, symbolizing the steadiness of resolve. The main collision happens vertically down the center, where the longing pixels transition abruptly into the steady colors, embodying the contrast between scattered impulses and firm boundaries. Quiet fields of gray purvey negative space, while accents of vibrant red pop against the muted tones, creating visual tension that narrates an unresolved journey.</desc>
