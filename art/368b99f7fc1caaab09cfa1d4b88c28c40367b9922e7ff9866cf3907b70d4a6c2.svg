<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">The emotional tone captures the struggle between vulnerability and strength, using a palette that evokes both fear and hope. The dark and muted colors represent vulnerabilities while soft gold and pale green symbolize resilience and hope. The dominant black and dark violet form a stable center, while the lighter colors flow like ‘falling pixels’ around it, representing the tension and hope in the chaos of exposure. The collision occurs at the edges where strength meets vulnerability, creating an asymmetrical balance that leaves negative space, enhancing the emotional impact of the piece.</desc>
