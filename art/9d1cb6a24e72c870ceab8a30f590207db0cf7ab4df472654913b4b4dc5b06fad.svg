<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Amidst the Static</title>
  <desc id="desc">The emotional tone of this artwork captures the tension between clarity (signal) and confusion (noise). The palette features deep navy and black to signify depth and weight, while dim cyan offers a soft, ethereal pulse, enhancing the psychological struggle. The main collision occurs centrally, where the bright rhythm of the signal clashes against scattered darker noise, creating a dynamic tension. This abstract representation draws from the concept of a knot, hinting at complex interconnections that evoke feelings of memory, interruption, and the fragility of clarity within chaos.</desc>
