<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Dissonance</title>
  <desc id="desc">This artwork embodies the emotional tension between fear and hope through a dynamic interplay of color and pattern. The chosen palette of black, dark violet, soft gold, and pale green reflects opposing emotional states—darkness and weight juxtaposed against light and growth. The dense left side, dominated by dark hues, represents fear, while the soft gold and pale green on the right suggest hope's emergence. The crosshatch pattern connects these layers, while broken pixels introduce disruption, echoing the tumult of transition. This asymmetry evokes a story of contrast and emotional struggle, with collisions occurring around the center, creating a sense of unresolved motion and duality.</desc>
