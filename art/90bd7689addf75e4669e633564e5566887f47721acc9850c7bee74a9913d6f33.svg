<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">This piece juxtaposes the raw intensity of 'rage' and the soothing properties of 'calm' through color choices. The black and red colors represent the chaotic, disruptive energy of rage, while the pale blue provides a counterfield of calm. The arrangement leads to a concentrated collision where red pixels break through the black void, creating a sense of pressure that suggests overflow. The calm colors swirl around the vibrant and jagged warm tones, creating a tangled emotional landscape following the 'half_square' shape seed metaphor. The noise pattern of rage intersects with a braid of calm, demonstrating the tension between these two emotions.</desc>
