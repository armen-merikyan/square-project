<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Boundaries</title>
  <desc id="desc">This abstract piece illustrates the tension between calm and rage. The palette of deep blacks and vibrant reds suggests emotional extremes, while pale blue offers a calm counterbalance. The structure contains a combination of glitch-like disruptions in the form of reds invading the tranquil pale blue horizontal bands. The arrangement flows diagonally from the bottom left corner, where the rage is most intense. This migration embodies the concept of emotional overflow against a calm backdrop, creating a dynamic collision in the center of the piece, where both emotional states meet and overlap, creating a visual echo of tension and release.</desc>
