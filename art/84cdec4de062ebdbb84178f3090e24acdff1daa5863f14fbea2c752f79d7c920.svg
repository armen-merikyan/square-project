<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry vs Break</title>
  <desc id="desc">This artwork navigates the emotional duality of joy and grief through contrasting patterns of expansion and fragmentation. The use of a warm palette (yellows and oranges) represents joy, juxtaposed against cooler tones (deep blue and muted purple) that symbolize grief. The left side embodies a vibrant, frame-like structure, reflecting moments of joy, while the right portrays a more grid-like and subdued composition, illustrating the weight of grief. The jagged edges suggest disruption in the narrative, while strategically placed broken pixels introduce an element of imperfection, enhancing the emotional turbulence conveyed in the artwork.</desc>
