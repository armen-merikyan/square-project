<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Diagonals of Tension</title>
  <desc id="desc">This piece captures the emotional dichotomy of restlessness and peace through diagonal flow and contrasting colors. The palette of pink, red, gray, and dark maroon suggests warmth interspersed with cold detachment, echoing the internal conflict. The design employs patchwork for peace contrasted against a split screen that conveys restlessness—creating tension throughout. The collision occurs primarily along the diagonal, creating an unsettled yet balanced arrangement. Broken pixels introduce an imperfect texture, symbolizing the scar of memory amidst a background of timeless tranquility.</desc>
