<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Embrace</title>
  <desc id="desc">The emotional tone captures the tension between vulnerability and strength, represented through contrasting colors and patterns. The palette of pale mint and storm gray creates a landscape of relief and dread, conveying the delicate balance between protection and exposure. The inner core features a lattice of soft sky, spilling into a strong, crack-patterned border of near black and faded gold. The main collision occurs at the center, where the softness of the inner grid conflicts with the hard edges of the outer frame, suggesting a pulse of connection and alienation. Uneven placements create a dynamic rhythm throughout, embodying the push and pull of emotion.</desc>
