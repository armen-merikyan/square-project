<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Space</title>
  <desc id="desc">This square embodies the tension between shelter and exposure. The palette balances warm browns and soft greens representing safety with open blue and pale skin tones echoing vulnerability. The dominant warm brown stretches across the left side, invoking a sense of protection, while the cold white and open blue penetrate from the right to challenge this safety, creating a diagonal movement of emotional debate. Broken pixels sporadically interrupt the flow, suggesting scars of experience and layers of memory, all while preserving moments of quiet negative space to allow the emotions to breathe.</desc>
