<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotion</title>
  <desc id="desc">This composition embodies the tension between rage and calmness, utilizing a palette of red, black, pale blue, and white to convey emotional conflict. The red occupies the corners with jagged, fault-line patterns representing rage, while the pale blue showcases calmness through horizontal ladder motifs. The main collision occurs diagonally, where the intense red sharply disrupts the serene blue, creating a visual echo of turmoil and tranquility. The black serves as a boundary, framing the chaos and providing depth. Broken pixels are distributed to depict imperfections, enhancing the phasing between emotions, mirroring real emotional patterns.</desc>
