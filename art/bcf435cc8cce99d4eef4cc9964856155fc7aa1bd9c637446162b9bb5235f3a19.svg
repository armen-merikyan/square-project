<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Resilience</title>
  <desc id="desc">This artwork embodies the emotional pull between spark and ash, utilizing a palette that reflects intimacy and distance. The contrast lies primarily in the slight shift between warm and cool hues, with the vibrant gold (#F4D03F) representing the spark of hope and the muted warm shadow (#A67B68) and cool blue (#6A9FB5) symbolizing the ash of restraint. The collision occurs diagonally, creating a dynamic tension across the square. The glitch and barcode patterns overlap, giving a sense of disrupted space and memory versus erasure, encapsulating the theme of resilience against fragile moments. Broken pixels enhance this sense of imperfection, reminding the viewer of scars that bear stories.</desc>
