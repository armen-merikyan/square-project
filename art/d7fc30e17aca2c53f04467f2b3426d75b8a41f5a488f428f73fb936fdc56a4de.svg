  <title id="title">Eroded Symmetry</title>
  <desc id="desc">This artwork captures the emotional tension between longing and resolve through a palette of quiet pressure tones, including off-white, dust gray, and hints of compressed red. The stark contrast between the soft fields and the occasional sharp red interruptions symbolizes the collision of intense feelings: the yearning for connection against the firmness of boundaries. The layout flows from the right to left like a pulse—echoing the rhythm of longing while the broken pixels create intentional, serene disruptions that reflect the theme of repair versus damage. The central collision is emphasized with denser color clusters and empty spaces, highlighting the emotional pull of symmetry worn away at the edges.</desc>
