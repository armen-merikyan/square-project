<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The artwork captures the emotional tension between desire and emptiness. The main palette consists of vibrant colors like hot coral and blood orange that symbolize desire, while muted tones like charcoal and hollow blue evoke feelings of emptiness. The center is saturated with the warm hues, representing the overwhelming pull of desire, while cooler colors outline the edges, visually containing this emotional surge, creating a sense of contrast between overflow and containment. Broken pixels interrupt smooth transitions, adding to the theme of disruption, while a vast area is intentionally left blank to reflect emptiness, allowing the viewers to feel both tension and release. The dense center encourages a spiraled interaction, suggesting a counterclockwise motion that is both chaotic and beautiful.</desc>
