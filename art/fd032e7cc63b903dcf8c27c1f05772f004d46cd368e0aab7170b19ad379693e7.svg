<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Burned Heartbeats</title>
  <desc id="desc">The emotional tone reflects the tension between love and betrayal, represented through contrasting palettes of warm pinks and deep maroons against muted grays. The layout suggests a descending flow, like tears through a broken mirror of emotions. Bold red accents punctuate the piece, creating collisions of feeling against the softer gray background. The presence of 'burned edges' in color placement conveys the scars left by conflicts of love and loss, while broken pixels introduce an imperfection that emphasizes the dissonance of this duality. The irregularities evoke the sense of a lonely signal, interrupted yet persistent.</desc>
