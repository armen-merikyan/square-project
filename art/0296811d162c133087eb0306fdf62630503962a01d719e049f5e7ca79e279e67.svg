<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Conflicting Forces</title>
  <desc id="desc">This artwork captures the emotional tension between defiance and submission. The deep blues and mourning blacks represent the defiance, creating a hard interruption at the center, while the pale yellows and new leaf colors suggest a soft retreat around the edges. The patchwork of darker colors collides with softer, muted hues, illustrating a struggle for dominance. The layout erodes symmetry at the corners, creating pockets of quiet against dense clusters, reflecting the theme of conflict and resolution inherent in the seed.</desc>
