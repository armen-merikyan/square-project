<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Calm</title>
  <desc id="desc">The emotional tone created is one of contrasting restlessness and peace, embodying the duality of memory and motion. The palette reflects a journey from dark to light, echoing hope amidst tension - black and dark violet symbolize restlessness, while soft gold and pale green evoke peace. The main collision occurs in the center where dark and gold accents meet, producing a dynamic interplay that suggests movement against a backdrop of calmness. The arrangement suggests a spiral pressure pattern, interrupted by flickers of warmth against more grounded tones, mimicking the ongoing push-pull of emotions captured in the seed.</desc>
