<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Static Pulse</title>
  <desc id="desc">The emotional tone of this artwork juxtaposes control with chaos, embodying the struggle of a clear signal against overwhelming noise. The palette uses deep navy and black to create a somber background, complemented by dim cyan that represents the ‘signal’ amidst dark ‘noise’. The contrast occurs predominantly in the center where lighter elements create a readable rhythm against scattered dark pixels. The edges are lit to imply structure, even though they disrupt with broken elements, symbolizing the imperfections inherent in our digital connections. This reflects the seed's nuances of collision and repair through the sparse bright pixels that emerge from the noise, showcasing how clarity strives amid disruption.</desc>
