<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience and Fragility</title>
  <desc id="desc">This artwork explores the tension between spark (a sudden ignition of emotion) and ash (the quiet aftermath of that ignition). The chosen palette of pink, red, gray, and dark maroon reflects warmth and turmoil alongside deeper, muted tones symbolizing residue and restraint. The left side, dominated by vibrant pinks and reds, evokes the feeling of sparks and emotional bursts, while the right side introduces softer grays and dark maroon to symbolize ash and restraint. The collision occurs centrally with a jagged edge, symbolizing the abrupt transition between these emotional states, creating a rhythmic wave as you visually traverse the piece. Broken pixels throughout offer imperfect moments of memory and history, echoing the theme of resilience versus fragility within this abstract representation.</desc>
