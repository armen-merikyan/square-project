<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragile Horizons</title>
  <desc id="desc">This composition captures the emotional tension between vulnerability and strength. The dominant presence of warm reds and coral tones symbolizes strength, while soft pinks suggest vulnerability. The contrasting elements emerge through frameworks of charcoal and hollow blue lines, creating a sense of both protection and exposure with an open corner edge style. The growth from the corner toward the opposite side represents an invasion of strength, interrupted by delicate, broken pixels symbolizing fragility, which offers an echo of vulnerability within the robust structure.</desc>
