  <title id="title">Shadows of Resilience</title>
  <desc id="desc">The emotional tone contrasts vulnerability and strength, capturing the delicate balance of exposure and protection. The palette combines soft tones like warm shadow and distant lilac with stronger accents like rose clay and lamp gold, creating an intimate distance. The main collision occurs in the center where broken frames symbolize vulnerability, while the thicker edges represent strength. The split-horizontal layout further emphasizes this contrast, with the top half feeling softer and more exposed, and the bottom half embodying a greater density and rootedness.</desc>
