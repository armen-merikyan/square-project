<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">The emotional tone reflects a struggle between desire (foreground warmth) and emptiness (background coolness). The palette combines vibrant yellows and oranges with subdued deep blue and muted purple, establishing a contrast where warm colors ascend in the upper half, symbolizing desire, while cooler shades occupy the bottom, representing emptiness. This split layout enhances the visual tension. The pattern of grid versus dot adds depth where the bright grid elements (desire) collide with sparse dot placements (emptiness). The overall arrangement strives to capture the unresolved interplay of emotions, portraying a narrative of yearning and solitude.</desc>
