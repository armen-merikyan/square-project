  <title id="title">Tension Between Longing and Control</title>
  <desc id="desc">This artwork captures the emotional conflict of desire and restraint through contrasting colors and dynamic patterns. The palette, featuring saturated tones like hot coral and blood orange, conveys an intense yearning, while muted shades such as charcoal and hollow blue represent constraint. The layout reflects two clashing patterns: a split screen suggests division and conflict, while a shatter pattern illustrates moments of interruption. The main collision occurs centrally, where hot colors meet cooler tones, embodying the struggle between explosive desire and the quiet pressure of restraint.</desc>
