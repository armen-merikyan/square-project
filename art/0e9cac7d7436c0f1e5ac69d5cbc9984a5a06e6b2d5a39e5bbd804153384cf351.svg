  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork explores the emotional duality of safety and exposure through contrasting colors and placements. Using a palette of soft greens and warm browns to represent safety, and cold whites and open blues for exposure, the design provides a stark visual tension. The main collision manifests in the center where softer colors meet sharp borders, representing the thin line between vulnerability and protection. The negative space enhances the sense of isolation and separation between the two emotional states, guiding the eye through a rhythmic path of tension and calm.</desc>
