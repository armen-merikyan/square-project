<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Fragmentation</title>
  <desc id="desc">This composition captures the emotional dichotomy of awe and terror through the contrast of vibrant colors and deep blacks, suggesting the tension between beauty and fear. The palette, consisting of lime, electric blue, magenta, and black, embodies a 'machine emotion' dichotomy, evoking both energy and darkness. The layout splits the canvas vertically, emphasizing that contrast, with a pattern transition from soft, flowing lines on the left (representing awe) to a jagged, step-like structure on the right (signifying terror). The broken pixels introduce imperfections, mirroring memory fragmentation and enhancing the sense of instability within the overall order. The strategic use of negative space balances the composition, allowing moments of quiet amidst the chaos.</desc>
