<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Threads</title>
  <desc id="desc">This artwork captures the emotional tension between longing and resolve. The color palette combines clean whites and soft blues to represent longing while deep blacks and violet grays signify resolve, creating stark contrasts that echo each other in a split layout. The main collision occurs in the central area, where pulse marks of warning orange interrupt the calm lattice pattern of longing. This suggests a strong emotional dialogue, representing the push-and-pull dynamics of seeking connection amidst the barriers of brokenness.</desc>
