<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tension between safety and exposure is expressed through a juxtaposition of saturated warm browns representing shelter and muted pale skins and blues symbolizing exposure. The palette creates a sense of comfort contrasted with the vulnerability of the open center. The collision occurs at the vertical split where dense lattice patterns of warmth meet the pressure bands of exposure, embodying a transition from protection to openness. Broken pixels add intentional imperfections to suggest the fragility of both states.</desc>
