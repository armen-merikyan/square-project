<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Desire</title>
  <desc id="desc">This artwork captures the emotional tension between desire and restraint. The palette of rich hues like red oxide and small orange conveys the passionate pull of desire, while blackened plum and iron gray introduce the suffocating nature of restraint. The main collision occurs in the center, where vibrant warm colors clash against muted shades, reflecting the struggle between overflowing emotion and boundaries. The 'eroded symmetry' layout enhances this contrast, depicting a decay at the edges to symbolize the delicate equilibrium. Overall, the piece transforms the seed into a dance of saturated warmth and muted coolness, portraying a complex narrative of yearning and limitations.</desc>
