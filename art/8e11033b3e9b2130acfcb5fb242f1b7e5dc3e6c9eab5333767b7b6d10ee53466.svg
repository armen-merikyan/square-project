<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Light</title>
  <desc id="desc">The emotional tone explores the tension between relief and dread through the contrast of dark and light colors. The palette, comprising black, dark violet, soft gold, and pale green, reflects a spectrum of emotions—black representing dread and soft gold embodying relief. The layout centers on a small cluster of bright tones amid a darker expanse, evoking a feeling of weight pressing against moments of hope. The arrangement consists of broken pixels, creating an imperfection that resonates with the theme of conflict. The top-weighted style anchors the composition, suggesting gravity and a push from above, while the crosshatch pattern on the sides evokes a sense of entrapment, leaving strategic negative space for quiet contemplation.</desc>
