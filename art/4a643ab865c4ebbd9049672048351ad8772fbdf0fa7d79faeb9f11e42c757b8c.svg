<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone captures the tension between desire and restraint, represented through a palette of saturated warm tones clashing with muted cool ones. The color placement creates a spiral pressure in the center, suggesting a pull towards the vibrant reds and oranges, while the edges remain sealed with darker, cooler hues like blackened plum and gray, symbolizing restraint. Broken pixels within the warm zone introduce an element of chaos and interruption, embodying the emotional battle in a way that remains abstract rather than literal. The collision occurs predominantly around the center where the desire colors meet the restrained edges, ensuring clarity in the emotional narrative without pictorial representation.</desc>
