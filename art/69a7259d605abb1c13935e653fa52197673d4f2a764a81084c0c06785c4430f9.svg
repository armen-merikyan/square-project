<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrasts</title>
  <desc id="desc">This piece reflects the emotional tension between quiet and pressure through the interplay of muted and dense colors. The palette, featuring off-white and dust gray for calm and compressed red and dark navy for intensity, creates a visual dialogue of contrast. The main collision occurs diagonally, where a denser cluster of red starkly interrupts a muted background, symbolizing pressure breaking into a quiet space. The inclusion of broken pixels introduces imperfection, representing shattering moments against the tide of clarity. The overall pattern, with its sharp edges and soft interruptions, encapsulates a complex emotional landscape that invites contemplation.</desc>
