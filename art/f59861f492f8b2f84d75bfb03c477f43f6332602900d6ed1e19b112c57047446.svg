  <title id="title">Tension of Gratitude</title>
  <desc id="desc">This artwork embodies the emotional tension between envy and gratitude, leveraging a muted palette reflective of both emotions. The colors are spread asymmetrically, creating a contrasting centerpiece that symbolizes the clash between feelings. The edges are soft while the center is more pronounced, embodying the struggle between feeling grounded and feeling disconnected. The negative space reinforces the concept of an 'empty room,' suggesting introspection and allowing the viewer to engage with both the loudness of emotion and the calm of reflection.</desc>
