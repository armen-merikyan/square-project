<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Release</title>
  <desc id="desc">The artwork embodies the emotional tension between pride and shame through contrasting bold warm and muted cool color fields. The choice of yellow and orange symbolizes joy and pride, while deep blue and muted purple evoke feelings of shame and introspection. The asymmetrical pattern suggests a flow of movement - pixels rise on one side, representing pride, and drop on the other, symbolizing shame. This collision of emotions is visually captured with a dynamic interplay of saturated and desaturated hues, allowing the viewer to feel the contrast between light and shadow, celebration and melancholy.</desc>
