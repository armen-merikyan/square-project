<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dichotomy of Emotion</title>
  <desc id="desc">This artwork encapsulates the tension between longing and resolve, using broken dots and patchwork patterns. The sepia, tan, and faded blue palette suggests a sense of nostalgia and repair amidst turmoil. The main collision occurs in the center, where patchwork cravings clash with the decisiveness of broken dots. The left diagonal wedge represents longing, saturated with warm tones, while the right reflects resolve through structured, cooler contrasts. Negative spaces serve as needed breaths in the composition, allowing the emotions to resonate without overwhelming.</desc>
