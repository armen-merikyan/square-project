<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Connection</title>
  <desc id="desc">The emotional tone captures a struggle between solitude and social ties. The palette of dark violet and soft gold introduces a tension of warmth and coolness. Dark colors dominate, suggesting loneliness, while soft gold provides fleeting moments of connection. The tension peaks at the edges, where hues collide, portraying a constant push and pull between being hidden and exposed. The pattern echoes the concept of 'inside vs outside', with a central empty space surrounded by color bursts, hinting at the struggles of mingling feelings.</desc>
