<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">The emotional tone captures the interplay between longing and resolve, where the first seeks connection while the second establishes firm boundaries. The palette of hot coral and dust pink brings warmth yet hints at emptiness, enhancing the contrast of resolve represented by dark charcoal. Amidst a quiet field of hollow blue, concentrated droplets of color create a sense of tension as they collide in the center, evoking the metaphor of a broken line. This pattern represents both repair and damage through the incorporation of broken pixels, introducing intentional imperfection that echoes the emotional narrative.</desc>
