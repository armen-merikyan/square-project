<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Calm and Chaos</title>
  <desc id="desc">This composition captures the emotional dichotomy of restlessness versus peace through contrasting patterns and colors. The 'barcode' pattern represents peace with its orderly forms, flowing horizontally, suggesting calmness, while the 'braid' pattern embodies restlessness, with a chaotic, intertwining structure that suggests movement and friction. The edges create a sense of containment yet contain deliberate breaks, allowing the restless emotion to seep into the peace, illustrated by an interplay between the dark navy and the lighter cyan that penetrate the space. The chosen palette—deep navy and black as grounding elements symbolizes weight and calm, contrasted with single white and dim cyan that provide moments of brightness and denote clarity amid the tension. The central focus of the collage reflects an imbalance, portraying the ongoing struggle between these two emotions through vivid collisions of color and aesthetic forms.</desc>
