<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Clarity</title>
  <desc id="desc">The emotional tone reflects the struggle between order (signal) and chaos (noise), captured through juxtaposed tailored patterns. The palette of deep navy and black acts as a calm foundation, evoking silence, while dim cyan provides a gentle pulse of energy, illustrating the idea of a signal trying to assert itself against a dark, chaotic background. The broken pixels create intentional disruptions that mimic the nature of interference and false echoes, mirroring the complex interplay of emotions within the seed. The main collision occurs towards the center, where patterns shift from the rigid structure of the signal into the fluid, chaotic form of noise, emphasizing the tension between these forces and creating a dynamic flow throughout the composition.</desc>
