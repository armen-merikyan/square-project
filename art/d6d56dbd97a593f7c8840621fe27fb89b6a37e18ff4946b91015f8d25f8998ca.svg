<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Quiet Collision</title>
  <desc id="desc">This piece explores the emotional contrast between softness and severity through a palette that balances warm and cool tones. The colors—a blend of powder pink, warm white for softness and carbon black, steel gray, sharp crimson for severity—create a visual tug-of-war. Each color is arranged to reflect a pulse against a radial quiet field, embodying a sense of emerging from a dark hoard (severity) into lightness (softness). The center holds a collision of colored ‘pulse marks’ surrounded by a boundary that feels restrictive, yet intentionally broken, suggesting openings to forgiveness against the weight of guilt.</desc>
