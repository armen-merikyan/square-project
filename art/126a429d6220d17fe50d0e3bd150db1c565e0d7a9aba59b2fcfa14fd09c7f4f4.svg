<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Elements</title>
  <desc id="desc">The emotional tone reflects the conflict between quietude and pressure, with the upper half representing softness in hues that evoke peace, while the lower half sharpens into darker and more compressed colors, portraying tension. The palette blends muted off-white and faint peach that evoke calm, crashing into dark navy and compressed red to create the sensation of pressure. The main contrast occurs diagonally across the grid, where the lightness of the calm meets the heaviness of the dense, pushing color below. The abstract pattern reflects a struggle between lightness and density, mirroring the seed's themes.</desc>
