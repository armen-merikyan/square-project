<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Existence</title>
  <desc id="desc">This artwork embodies the emotional interplay between restlessness and peace through the juxtaposition of structured and fragmented shapes. The selected palette of moss green, bone white, rust, stone gray, and small gold reflects resilience against fragility, evoking a sense of layered tension. The main collision occurs diagonally, where the calm ladder pattern rises against the chaotic broken frame, creating an engaging contrast. The placement of broken pixels adds intentional disruptions, enhancing the feeling of unrest among the tranquil elements. Overall, this composition visually expresses the struggle between movement and stillness, capturing the essence of the seed's emotional tone.</desc>
