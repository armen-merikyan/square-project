<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">This piece embodies the emotional dynamic between control and surrender through contrasting colors and patterns. The palette of warm ivory and deep wine represents the tension and softness of these emotions, while the halo and dot patterns create a visual stutter that reflects uncertainty and fluctuating signals. The central brightness suggests overflow—control being overrun by release—while darker edges contain the chaos, resulting in a collision at the center. Overall, this layout promotes a feeling of unresolved tension, evoking a pulse of experience trapped within static noise.</desc>
