<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Serenity</title>
  <desc id="desc">This artwork captures the tension between quiet and pressure through a palette of muted and dense colors. The dominant character is a deep, dark navy (#001F33), representing pressure, densely occupying the lower left, while lighter hues such as off-white (#F8F8F8) and faint peach (#FFDAB9) break free in the upper right, embodying the quiet. The central area showcases contrasts that create a diagonal argument: darker shades converge at one corner, while soft colors ripple and release toward the opposite side. This evokes feelings of struggle against release, echoing the emotional intricacies outlined in the seed.</desc>
