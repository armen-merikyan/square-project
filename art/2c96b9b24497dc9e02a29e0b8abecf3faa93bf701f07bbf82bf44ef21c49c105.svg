<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone fluctuates between the brightness of joy (represented by yellows and oranges) and the density of grief (pale blues and muted purples). The palette of yellows and deep blues creates a stark contrast, suggesting the tension between joy and grief. The pattern flows vertically, with lighter colors rising from the bottom against darker colors above, embodying a 'rise vs fall' dynamic. Broken pixels add an element of imperfection, mirroring the fragility of happiness amidst sorrow. The asymmetry of the colors represents how joy and grief interplay in life, while leaving sufficient negative space to evoke a sense of reflection and openness.</desc>
