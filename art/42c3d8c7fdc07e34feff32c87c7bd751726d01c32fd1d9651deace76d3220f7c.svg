<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Containment</title>
  <desc id="desc">The emotional tone expresses the tension between desire (vivid colors, dynamic patterns) and restraint (muted hues, structured presence). The chosen palette of hot coral and blood orange represents passionate desire and warmth, while charcoal and hollow blue are grounding colors that represent restraint and borders. The main collision occurs at the center where bright, saturated colors intersect with darker tones, representing the struggle for release amidst containment. The barcode and noise patterns interplay throughout, creating rhythm and pressure as they disrupt each other, inviting a visual dialogue of emotion rather than a literal representation. This approach captures the essence of ‘overflow vs containment’ as bright clusters assert against a dim overall ambiance, with serving negative spaces enhancing the concept of restraint. Overall, the square invites viewers into a complex emotional narrative of love and loss, longing and holding back.</desc>
