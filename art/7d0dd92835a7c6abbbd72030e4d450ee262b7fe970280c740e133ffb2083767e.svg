<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">The piece explores the emotional contrast of envy and gratitude, presenting a balance between vibrant and muted tones. The color palette of deep blacks and subdued blues creates a sense of weight and calmness, while the inclusion of white introduces bursts of hope and light against darker backgrounds, embodying gratitude. The arrangement reflects falling patterns, symbolizing emotional descent, with the lighter colors centrally positioned to represent moments of clarity amidst the heaviness. The tension between dark and light, noise and silence, creates a visual echo that speaks to the complexities of these feelings.</desc>
