<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects the tension between vulnerability and protection. The left half represents safety with rich brown and green tones signifying warmth and enclosure, utilizing a stair pattern that suggests stability. The right half embodies exposure with pale skin and cold white hues, employing a ring pattern that evokes vulnerability. The central collision occurs at the vertical divide, where safety's warmth contrasts sharply with exposure's lightness, symbolizing the delicate balance between them. This split conveys the themes of protection and vulnerability without literal representation, creating a dynamic flow across the grid.</desc>
