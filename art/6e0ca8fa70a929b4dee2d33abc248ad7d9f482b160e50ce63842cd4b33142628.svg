<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Patterns</title>
  <desc id="desc">This artwork captures the emotional duel between defiance and submission. The palette of moss green, bone white, rust, stone gray, and small gold reflects resilience juxtaposed with fragility, embodying a struggle. The lively central pixels (defiance) emit a hard, angular presence, while the softer, faded tones at the peripheries (submission) create a ripple effect, suggesting a quiet surrender. The collision occurs in the top-left corner where vibrant colors intensify, spilling outwards to the calmer fields, illustrating an overflowing pressure against subdued spaces. This arrangement embodies the themes of dominance and retreat, echoing the concepts woven in the seed.</desc>
