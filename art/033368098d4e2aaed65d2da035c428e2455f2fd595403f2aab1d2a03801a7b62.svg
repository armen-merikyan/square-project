<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Currents</title>
  <desc id="desc">This piece embodies the emotional dichotomy between awe and terror, with a carefully chosen palette of electric blue, lime green, and black to evoke tension. The left side plays into the awe with broken dots, creating a sense of wonder and lightness, while the right contrasts starkly with a dense field of stripes in black, signaling chaos and instability. The center core represents the conflict between these two emotions and the split-screen layout embodies their tension. The burnt edges hint at the imperfection of memories, while maintaining a significant amount of negative space to avoid overwhelming pressure, allowing the viewer's eye to rest on the shifting boundaries of emotion.</desc>
