<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust</title>
  <desc id="desc">The artwork explores the tension between trust and suspicion. The palette, consisting of hot coral and charcoal, creates a warm vs cool emotional contrast. The left side, representing trust, uses a structured hinge pattern with stable hues while the right, depicting suspicion, glitches in color to create a sense of distrust. This collision occurs diagonally, embodying the diagonal fall described in the seed. The design intentionally includes broken pixels to introduce imperfection, embodying the fragility within resilience. The overall composition balances clarity with disruption, reflecting the emotional tones inherent in the seed.</desc>
