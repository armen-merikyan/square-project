<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pull of the Abyss</title>
  <desc id="desc">This piece encapsulates the emotional tension between desire and restraint. The palette of red oxide and muted cream signifies a saturated longing against a backdrop of blackened plum and iron gray, creating a stark contrast between emotional intensity and the barriers of restraint. The collision occurs at the center, where pulse marks of warmth disrupt the muted split-screens that try to contain them. This interplay of saturation and muting directly relates to the seed's concept of hunger versus restraint, embodying a struggle that is effortlessly abstract yet deeply felt.</desc>
