<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The piece conveys an emotional tension between rage and calm through contrasting color placement and patterns. The left half embodies rage with sharp red and black accents, suggesting dynamic and aggressive energy, while the right half represents calm through softer pale blue and white hues, creating an echo of quiet. The main collision lies at the center, where the jagged edges of red clash with the smooth, serene blues, representing an ongoing struggle between chaos and tranquility — a visual metaphor for the ebb and flow of emotions shaped by the seed. The broken pixels introduce imperfections, reflecting the unpredictable nature of these emotions.</desc>
