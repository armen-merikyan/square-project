<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Within Balance</title>
  <desc id="desc">The emotional tone reflects the dichotomy of rage and calm. The palette combines deep blacks and stark reds to represent rage’s intensity against pale blues and whites symbolizing calm. The arrangement juxtaposes chaotic, jagged placements of reds against softer, more expansive blues, emphasizing tension. The pattern flows diagonally, suggesting a rising signal amidst contrasting pressure. The placement creates a sense of disturbance at the center while maintaining a surrounding calm, encapsulating the seed's essence of collision between contained rage and enveloping calm.</desc>
