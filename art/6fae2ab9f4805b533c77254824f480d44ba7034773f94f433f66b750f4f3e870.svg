<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Worlds</title>
  <desc id="desc">This artwork explores the contrasting emotions of envy and gratitude through color arrangements. The palette incorporates bold greens and deep blacks, suggesting the tension between lightness and darkness, positive and negative emotions. The sharp contrasts are formed by placing vibrant electric blue next to muted magenta. This creates a collision that evokes both envy (darkness) and gratitude (light). The arrangement of colors in a horizontal split emphasizes the division between these feelings, with softer edges hinting at the delicate balance humans navigate between aspiration and appreciation. The empty spaces act as a representation of potential and solitude, aligning with the theme of ‘inside vs. outside’ from the seed.</desc>
