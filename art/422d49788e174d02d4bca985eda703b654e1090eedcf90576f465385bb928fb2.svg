<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall</title>
  <desc id="desc">The emotional tone contrasts joy and grief through a palette of deep blue, muted purple, yellow, and orange. The blue and purple evoke grief's fragmented depth, while the yellow and orange spark with joy's expansion. The upward flow on one side juxtaposes downward movement on the other, creating a dynamic conflict. The main collision occurs at the midline, where joy's warmth meets grief's coolness, suggesting a tension between light and dark. This is reflected in the pixel arrangement that shifts between dense clusters and negative space, embodying the essence of the seed through abstract patterns rather than literal representation.</desc>
