<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Mirror of Emotion</title>
  <desc id="desc">This composition reflects the duality of awe and terror, using a palette that evokes nostalgia, reminiscent of broken memories. The left side features structured patterns, inspired by awe, utilizing shades of sepia and faded blue for a sense of calm. The right side contrasts sharply, breaking into chaotic designs with darker hues for terror, illustrating instability. The center serves as a split screen that magnetically draws the viewer, creating tension between stability and disruption. Broken pixels add texture, enhancing the feeling of fragmented memories.</desc>
