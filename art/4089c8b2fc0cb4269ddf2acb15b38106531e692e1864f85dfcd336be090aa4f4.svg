<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone reflects the tension between joy and grief, captured through a palette that contrasts bright yellow and orange warmth against deep blue and muted purple. The arrangement suggests a diagonal flow that moves from a vibrant left side towards a cooler, more fragmented right side, heightening the sense of imbalance. The broken pixels represent feelings of loss amidst bursts of joy, creating a sense of collision and unresolved emotion in the composition. This interplay between colors and patterns evokes a narrative of rising joy being tempered by the weight of grief.</desc>
