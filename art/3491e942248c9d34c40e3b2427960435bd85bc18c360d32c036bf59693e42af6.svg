<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">The emotional tone of this artwork captures the tension between relief and dread, symbolized by contrasting colors. The palette of deep blacks for dread and soft whites with pale blues for relief creates striking visual asymmetry. The pattern of dots radiating from the bottom left represents moments of relief, while jagged edges and darkness from the top right evoke a sense of impending pressure. The contrast between dense and hollow spaces strategically places visual weight, making one feel the emotional conflict expressed in the seed. This arrangement reflects the idea of an 'empty room' both filled and interrupted, resonating with the emotion pair, and conveying a story of tension and balance.</desc>
