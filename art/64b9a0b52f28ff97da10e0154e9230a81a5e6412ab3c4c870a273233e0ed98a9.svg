<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragile Resilience</title>
  <desc id="desc">This artwork explores the emotional tension between strength and vulnerability through a contrasting palette. The use of deep blues and blacks suggests rooted strength, while the pale yellow introduces a sense of vulnerability and exposure. The main collision occurs in the central region where the deep colors abruptly give way to the light, symbolizing the struggle between protection and exposure. Layout is heavy on one corner, with marks flowing outward to illustrate pressure and the interaction of contrasting emotions. Broken pixels disrupt the structure, reinforcing the narrative of imperfection and vulnerability in strength.</desc>
