<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Containment</title>
  <desc id="desc">This composition conveys a tension between the inner peace and outer restlessness, illustrated through the interplay of warmer and cooler colors. The chosen palette of sepia, tan, dust gray, and faded blue evokes nostalgia and calm while allowing for vibrant accents in a cool space. The main contrast emerges at the center, where the warmer tones clash with the cooler edges, suggesting interruption and a stuttered momentum. The arrangement respects the 'mirror_broken' layout with intentional disruptions that reflect the fragmented nature of memory, leading to a visually dynamic experience that resonates with the seed's themes.</desc>
