<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emergence of Contrast</title>
  <desc id="desc">This artwork explores the dynamic tension between fear and hope through a split layout that emphasizes verticality. The dark palette represents fear and its jagged edges, while the soft gold and pale green signify hope through upward flow and glowing edges. The contrast is primarily seen in the central vertical split, where light forms interrupt darker fields, creating a burst effect of emotion and possibility. The layout resembles a rising signal emitting from stillness, providing a sense of gradual emergence from darkness towards light.</desc>
