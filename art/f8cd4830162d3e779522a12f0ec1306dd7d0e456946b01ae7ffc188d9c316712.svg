<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Shelter</title>
  <desc id="desc">The emotional tone of vulnerability clashes with strength, creating a dynamic tension. The color palette of warm shadow and cool blue establishes a balance between intimacy and distance, evoking feelings of exposure and protection. Main contrasts appear around the central area, where burnt sienna 'crack' patterns collide with a soft 'flame' gradient of distant lilac, symbolizing the push and pull of emotional states. The broken frame layout allows intentional breaches, emphasizing moments of vulnerability. Overall, the composition weaves together these themes through structured patterns that disrupt, overlap, and interact.</desc>
