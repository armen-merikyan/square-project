<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Echo</title>
  <desc id="desc">This artwork explores the emotional duality of joy and grief through a distinct color palette of bright yellows and oranges contrasting against deep blues and muted purples. The top half of the grid embodies joy with a crosshatch pattern that signifies openness and warmth, while the bottom half represents grief through a frame that hints at confinement and heaviness. The arrangement plays with collision—joy’s vibrancy meets the muted grief directly along the split, creating a tension that mirrors the emotional conflict of the seed. Broken pixels are interspersed throughout to reveal imperfections, paralleling the complexities of human emotion. Negative space is maintained to allow the viewer to breathe between the contrasting emotions.</desc>
