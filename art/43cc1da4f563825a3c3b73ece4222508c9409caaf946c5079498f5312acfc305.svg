<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This composition captures the emotional struggle between control and panic through structured arrangements and scattered broken pixels. Utilizing a contrasting palette of warm sepia and cool faded blues emphasizes the tension: the outer edges display orderly patterns (representing control) while the inner core is filled with chaotic, broken dots (representing panic), creating distinct clashes. The overall flow mimics a diagonal descent, suggesting an unwinding of control. Centralized tension juxtaposed with negative space allows for an interpretation of emotional weight and release.</desc>
