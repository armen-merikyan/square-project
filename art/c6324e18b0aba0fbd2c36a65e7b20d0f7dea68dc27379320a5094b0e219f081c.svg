<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This artwork embodies the tension between defiance and submission through contrasting colors and spatial arrangements. The chosen palette of hot coral, blood orange, dust pink, charcoal, and hollow blue creates a vibrant yet somber atmosphere, emphasizing the push-pull between chaotic brightness and muted depth. The main collision lies at the center, where bold coral accents disrupt the softer braided patterns of pink and gray, symbolizing the conflict between structure and freedom. The arrangement reflects a diagonal rise, adding a dynamic flow from the bottom to the top, while broken pixels introduce deliberate imperfections, echoing the theme of disruption and repair.</desc>
