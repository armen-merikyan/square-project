<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Doubt</title>
  <desc id="desc">This composition explores the tension between trust and suspicion through the juxtaposition of distinct patterns. The left half utilizes a 'veil' pattern, softening the edges with off-white and faint peach to represent trust, evoking warmth and openness. Meanwhile, the right half employs a 'stack' pattern using darker tones of compressed red and dark navy, creating a sense of layered tension and unease. The main collision occurs at the center, where the blend of colors interrupts the flow, reflecting the struggle between the two emotions. The palette's interplay of muted and vibrant colors underscores the dichotomy, while intentional broken pixels disrupt any sense of perfection, suggesting that even amidst trust, suspicion lurks.</desc>
