<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">The emotional tone conveys a push-pull dynamic of longing versus resolve. The palette of navy, black, white, and dim cyan reflects a lonely yet striking conversation between stillness and urgency. The top rows embody longing with a radial pattern that creates a sense of reaching yet unfinished motion, while the bottom rows represent resolve through channeling lines, suggesting clarity and structure. The center collision of colors disrupts the flow, embodying the tension between these emotions, with broken pixels representing imperfections and interruptions, forming a narrative of repair amidst damage.</desc>
