<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Held Back</title>
  <desc id="desc">The emotional tone merges the warmth of desire against the coldness of emptiness. The palette introduces vibrant hot coral and blood orange as symbols of desire, while hollow blue and charcoal signify the weight of emptiness. The central collision occurs at the center where saturation meets low saturation, creating an interplay between the opposing forces of overflowing wish and restrained capacity. The broken pixels interrupt the smooth edges to convey scars of longing, and the density flares towards the middle to create a stark contrast with the quiet borders, resonating with the seed's theme.</desc>
