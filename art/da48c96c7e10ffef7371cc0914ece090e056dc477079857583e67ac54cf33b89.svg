<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Convergence and Divergence</title>
  <desc id="desc">This artwork embodies the tension between restlessness and peace through its contrasting colors and patterns. The pale aqua and mist gray evoke a sense of calm, while alarm red and ink blue represent intensity and urgency, creating a visual conflict. The arrangement features a diagonal split where the barcode pattern of peace intersects with the jagged, teeth-like pattern of restlessness, suggesting memory and motion. The collision point in the center amplifies this contrast, while broken pixels introduce an element of imperfection, echoing the theme of disturbance in peace. Emphasizing negative space fosters a breathability that captures the essence of calm amidst chaos.</desc>
