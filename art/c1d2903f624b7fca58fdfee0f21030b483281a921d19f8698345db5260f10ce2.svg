<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">This composition channels the emotional dichotomy of love and betrayal through a palette of warm pinks and reds to signify love, contrasted by cool grays representing betrayal. The layout follows a corner invasion pattern, where warm colors surge from one corner and conflict against the cool, gray tones that congest the opposing corner, creating a palpable tension. The edge style is top-weighted, allowing the colors to feel as if they are 'burned' into the canvas, with a few broken pixels introduced to indicate imperfection and distortion, resonating with the seed's themes of 'sharp_vs_soft' and 'crosshatch against noise'. This arrangement results in a story of longing and conflict, echoing the emotional wave reflected in the seed. The negative space is preserved, ensuring the artwork retains an airy quality despite the dense interactions between contrasting colors.</desc>
