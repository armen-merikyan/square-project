<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition captures the emotional tension between desire and emptiness through a contrasting palette of saturated warm colors against cool muted tones. The dynamic between a central warm spiral (representing desire) and the cooler blue-gray tones (embodying emptiness) creates a collision at the center, where these emotions meet and struggle for space. The layout is a threshold, where the warm colors flow in a rhythmic braid pattern that disrupts the radial emptiness around the edges. This yields a sense of tension and pressure, where desire reaches out but is contained by the cool boundary of the empty space, expressing the theme of overflow vs containment.</desc>
