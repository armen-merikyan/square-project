<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This piece captures the emotional tension of desire clashing with restraint. The warm embrace of hot coral and blood orange represents desire with their saturated vibrancy, while the cooler hollow blue gestures toward restraint, providing a tranquil boundary. The main collision occurs at the center, where the lattice pattern of desire intertwines with the defined, muted divisions of restraint's split-screen. Negative space in the corners draws attention to the locked edges, reinforcing the theme of hunger strained by invisible walls.</desc>
