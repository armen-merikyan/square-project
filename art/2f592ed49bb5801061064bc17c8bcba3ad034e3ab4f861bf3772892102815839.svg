<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This artwork embodies the tension between defiance and submission through contrasting colors and patterns. The palette features vivid warning orange and deep ink black to emphasize the emotional struggle, representing bright refusal versus a muted acceptance. The pattern alternates between pulse marks and patchwork to create a dynamic collision in the center, symbolizing the clash of emotions. The lower left corner is dense with black to evoke submission, while the upper right is punctuated by bright orange sparks of defiance, illustrating an intentional rupture in the otherwise orderly flow, thus portraying a spiraling inward conflict. Emphasizing negative space while ensuring an overall balance allows the eye to traverse the grid, reinforcing the themes of pressure and release, echoing the sentiments of the seed.</desc>
