<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">This piece embodies the emotional tension between joy and grief. The palette combines vibrant yellows and oranges to represent joy against deep blues and muted purples that signify grief. The symmetry of the layout is disrupted by strategically placed broken pixels, reflecting the idea of fragmentation within emotional states. The contrast between bright and dark colors creates a pulse effect, enhancing a feeling of instability, while left-weighted areas add to the gravity of grief. The overall composition yields a rhythm of conflict, echoing the complexities of love and betrayal.</desc>
