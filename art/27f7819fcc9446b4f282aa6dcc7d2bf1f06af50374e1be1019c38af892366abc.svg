<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Threads</title>
  <desc id="desc">This artwork embodies the emotional struggle between 'longing' and 'resolve', captured through a palette of navy, black, dim cyan, and white. The dark colors represent the weight of longing while the white and dim cyan introduce a sense of clarity and hope, embodying resolve. The collision in the center illustrates the tension of these emotions, with densely packed colors giving way to quiet contrast at the edges, signifying the push and pull of emotional states. Broken pixels disrupt the flow, adding a sense of imperfection and realism to the experience.</desc>
