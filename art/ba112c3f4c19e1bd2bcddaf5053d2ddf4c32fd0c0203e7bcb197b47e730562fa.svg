<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Spectrum</title>
  <desc id="desc">The emotional tone captures the clash between tenderness and rage, encapsulated by contrasting patterns. The chosen palette blends the sharp intensity of red with the calmness of pale blue and white, creating a visual narrative of tension. The main collision occurs diagonally across the board, where the jagged reds signify rage and the softer blues represent tenderness, reflecting on feelings of guilt and forgiveness. The open gate concept symbolizes a shift in perception, creating a 'quiet channel' amidst the storm. Broken pixels introduce disruptions, enhancing the sense of conflict and fragmentation against a backdrop of gentleness.</desc>
