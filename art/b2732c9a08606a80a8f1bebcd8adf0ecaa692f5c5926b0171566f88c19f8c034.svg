<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Connection</title>
  <desc id="desc">The artwork reflects the emotional dichotomy of loneliness versus connection by utilizing a palette inspired by ancient fire, characterized by warm burnt orange and dark red juxtaposed against cool charcoal. This contrast creates a tension where the warmth of connection struggles against the isolation depicted by stark, lonely spaces. The central diamond shape references the idea of a seed, surrounded by a burst of energy emanating diagonally, which symbolizes connection breaking through loneliness. The top-weighted design allows for gravity to be felt in the visual weight, while broken pixels introduce a sense of imperfection, mirroring the human condition amidst these emotions.</desc>
