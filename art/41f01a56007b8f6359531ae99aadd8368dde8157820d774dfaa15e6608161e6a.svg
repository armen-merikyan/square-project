<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension's Edge</title>
  <desc id="desc">This piece explores the emotional spectrum of panic versus control, utilizing the palette of pink, red, gray, and dark maroon to create a heavy yet vibrant contrast. The central control (radial pattern) clashes with outward panic (stairs pattern), embodying resistance and tumult. The transition from solid dark to sharp light reflects the struggle between holding power and feeling overwhelmed. The broken pixels introduce imperfection, mirroring the frailty of control in the face of chaos, while the negative space allows the emotions to breathe and reflect their tension.</desc>
