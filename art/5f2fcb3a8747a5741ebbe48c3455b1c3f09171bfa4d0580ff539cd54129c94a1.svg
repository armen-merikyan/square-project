<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensions of Interior and Exterior</title>
  <desc id="desc">The emotional tone reflects the clash between vulnerability and strength, where the dense center represents strength, while the softer edges symbolize vulnerability. The palette of red and black evokes intensity, while pale blue and white act as quiet fields, creating a stark contrast that embodies the ongoing battle of exposure versus shelter. The dense center is interrupted by softer, fragmented patterns, emphasizing moments of tension and interconnection. The placement of colors collides at the center, creating a vivid focal point, while edges seem to struggle to contain the core, resonating with the themes of collision and balance.</desc>
