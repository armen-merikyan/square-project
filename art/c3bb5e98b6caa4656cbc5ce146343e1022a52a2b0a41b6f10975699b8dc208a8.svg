<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">The emotional tone of this composition explores the duality of relief and dread. The palette incorporates shades of deep gray and warm pink to represent the underlying tension. The left and right sides mirror each other almost perfectly, highlighting symmetry, yet with subtle breaks introducing an element of chaos. These contrasts collide in the center, where the lighter tones appear to push against the denser darks, evoking feelings of weight against lightness. The use of broken pixels enhances the sense of imperfection and adds depth, making the viewer feel the push and pull between calm and tension.</desc>
