  <title id="title">Vessel of Contrasts</title>
  <desc id="desc">The emotional tone reflects the tension between safety and exposure, where a gentle yet weighty palette creates a vibrant dialogue. The colors embody warmth and fragility—shelter green and warm brown ground the piece in safety, while cold white and open blue introduce moments of vulnerability. The main contrast occurs in the center with a collision of softer and heavier tones, embodying a pulse of overlap and interruption. The split vertical layout emphasizes echoing boundaries, with broken pixels hinting at the imperfection of interaction.</desc>
