  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork evokes a tension between tenderness and rage through a palette that plays with saturated reds and muted, soft blues. The center features a lighter hue, suggesting vulnerability against a surrounding density of dark, jagged noise that reflects emotional turmoil. The quiet channel layout emphasizes the contrast, where the paths of muted tones interrupt the aggressive pixels of rage, creating a dynamic collision of feelings. The broken pixels serve as intentional scars, enhancing the theme of exposure and shelter.</desc>
