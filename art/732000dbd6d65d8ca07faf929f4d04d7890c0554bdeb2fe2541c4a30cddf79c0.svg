<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory and Motion</title>
  <desc id="desc">This composition embodies the tension between softness and severity, fostering an emotional landscape where gentle hues meet sharp contrasts. The chosen palette of powder pink and sharp crimson against carbon black and steel gray creates a dynamic interplay of warmth and starkness. The arrangement uses a central collision of darker colors, radiating outward into lighter fields, symbolizing a memory that interrupts the flow of motion. This captures the idea of interruption within the fluidity of guilt and forgiveness—where the past gently overlaps with the present.</desc>
