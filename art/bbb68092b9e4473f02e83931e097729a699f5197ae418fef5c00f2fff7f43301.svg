<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Threshold</title>
  <desc id="desc">This composition embodies the tension between defiance and submission through a split vertical layout. The left side, dominated by static patterns in cosmic indigo and void black, represents defiance with its strong, unmoving center. The right side, featuring a contrasting crosshatch pattern in deep teal and cold gold, suggests submission through its softer, more fluid arrangement. The clash between the structured pixels of the left side and the more dynamic right creates a pulse-like rhythm, echoing the seed's themes of chaos and order. The subtle broken pixels act as scars where pressures collide, inviting the viewer to contemplate the threshold between these opposing emotional states. The negative space is utilized to enhance the tension and separation, allowing for contemplation of the emotional narrative.</desc>
