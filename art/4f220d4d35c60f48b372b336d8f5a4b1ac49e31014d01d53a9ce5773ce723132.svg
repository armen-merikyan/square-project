<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Division of Echoes</title>
  <desc id="desc">This artwork embodies the emotional tension between trust and suspicion, utilizing a split vertical layout. The left side features soft, muted tones with a fault line pattern, representing trust, while the right side breaks into darker hues, echoing suspicion with a halo effect, creating a stark contrast. The collision occurs along the center where the clean, light colors abruptly meet the chaotic dark spectrum, suggesting an emotional rupture. The palette of ice blue, clean white, ink black, violet gray, and warning orange reinforces this thematic duality, evoking a sense of clarity on one side and confusion on the other. Each pixel placement creates an unsteady rhythm that reflects the constant push and pull of these emotions, styled with intentional brokenness to symbolize the imperfections and hesitations in trust and the shadows of suspicion.</desc>
