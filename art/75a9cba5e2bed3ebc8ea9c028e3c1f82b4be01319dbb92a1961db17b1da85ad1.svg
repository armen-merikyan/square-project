<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This abstract piece explores the tension between intense emotional states of 'rage' and serene 'calm'. The color palette features dominant reds symbolizing rage, contrasted sharply against cooler pale blue and white hues representing calmness. The rage emerges explosively from the center, with erratic patterns resembling a 'maze', while the calming colors create a structured 'stepwell' effect, suggesting containment. The arrangement flows in a spiral pattern, with interruptions and broken pixels creating a sense of chaos within the structured calm, embodying the conflict between those two states. The collisions occur in the center where the red predominates, capturing the essence of emotional volatility versus quietude.</desc>
