<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Dissonance</title>
  <desc id="desc">This piece conveys the emotional tension between trust and suspicion through the clash of warm and cool colors. The palette of lime and electric blue against deeper blacks introduces a sense of electric energy, hinting at both clarity and interference. The patterns of checker and halo collide, representing resilience and fragility—trust forms a stable checker pattern, while suspicion radiates outward chaotically through halos. The primary collision occurs in the center where these patterns overlap, creating a stark focus point that draws the viewer's eye. The broken pixels add intentional disruptions, reflecting the uncertainty embedded in relationships. The layout coils towards an off-center point, representing the push and pull of emotions, while maintaining approximately 10% negative space for balance, mirroring the tension between openness and guardedness.</desc>
