<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">This artwork captures the emotional tension between restlessness and peace. The contrasting palette of pale aqua, alarm red, ink blue, and mist gray generates a dynamic interplay of tranquility and urgency. The design follows a diagonal layout where peace occupies the lower left with a stacked pattern and restlessness dominates the upper right with a radial burst. The placement of alarm red acts as an interrupting peak, suggesting moments of tension against a broader calm, embodying the struggle between memory (the calm hues) and motion (the restless accents). Broken pixels disrupt the flow, implying imperfections in this emotional narrative, highlighting the fragility of peace amidst restlessness.</desc>
