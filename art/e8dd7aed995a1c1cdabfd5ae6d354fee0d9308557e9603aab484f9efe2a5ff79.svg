<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Strains of Balance</title>
  <desc id="desc">The emotional tone explores the tension between control and surrender, embodied in a clash of structured, sharp lines against softer, flowing forms. The palette uses deep blacks, punctuated by pale blue and white, to illustrate this friction, where the dark colors suggest control and pressure, while the lighter colors represent moments of release. The main collision occurs in the central area, where the chaos of the surrenders—represented by sporadic pale blue 'constellations'—intersects with the rigid pathways of control, creating a dynamic visual narrative of presence and absence. The arrangement of colors faithfully conveys an interplay of pressure and relief, embracing the emotional complexities of the seed.</desc>
