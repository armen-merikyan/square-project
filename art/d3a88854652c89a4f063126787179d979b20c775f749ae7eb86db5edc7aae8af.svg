<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">The emotional tone of desire meets the echo of emptiness, creating tension through a pattern that rises and seeks but remains confined. The selected palette reflects a fiery yearning with hot coral and blood orange against the cool, distant presence of hollow blue and charcoal, representing the hollowness of unfulfilled desire. The central collision occurs in the upward flow, where saturated colors clash with muted edges, suggesting a struggle between reaching and containing. Broken pixels add to the composition's unrest, mirroring the scars of desire unfulfilled, while maintaining a sense of negative space, allowing the feelings to breathe.</desc>
