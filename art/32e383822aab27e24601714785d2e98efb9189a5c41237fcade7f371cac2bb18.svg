<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissonance of Sparks</title>
  <desc id="desc">This artwork explores the tension between the warmth of 'spark' and the coolness of 'ash', representing resilience versus fragility through its bold contrast in colors. The palette balances 'signal_green' and 'electric_blue' as vibrant accents against the muted 'dead_black' and 'static_gray' that dominate the canvas, embodying the emotional push and pull of hunger versus restraint. The main collision occurs diagonally, where cool and warm tones intersect, creating a visual rhythm of interruptions that reflect the complexities of memory and erasure. The negative space allows the viewer to breathe amidst the chaos, simulating a moment of quiet reflection among jagged edges.</desc>
