<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of the Quiet</title>
  <desc id="desc">This composition explores the emotional dichotomy of longing and resolve through a careful arrangement of colors and patterns. The palette combines rich cosmic indigo with stark void black and luminous cold gold, which highlights a contrast between dense emotional layers and quiet spaces. The center contains a cluster of pulse-like marks in deep teal symbolizing longing, contrasting with a structured maze of resolve that forms around the edges. This collision creates an impression of a struggle between chaos and order, accentuating the emotional tone and enhancing the dynamic flow in the artwork.</desc>
