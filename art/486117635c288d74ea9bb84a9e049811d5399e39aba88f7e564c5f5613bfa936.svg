<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Resistance</title>
  <desc id="desc">The emotional tone of this piece reflects the struggle between defiance (represented by dark and angular forms) and submission (depicted by softer, lighter colors). The chosen palette features deep navy and black for shadowed edges, contrasting with dim cyan and white for highlights, creating a visual tension. The main collision occurs at the center, where dark and light patterns overlap, suggesting an ongoing struggle. Patterns of pressure band on the left and scar-like textures on the right contribute to the theme of resistance versus surrender, manifested through intentional pixel disturbances and negative space that invite contemplation.</desc>
