  <title id="title">Fractured Resilience</title>
  <desc id="desc">The emotional tone reflects a struggle between vulnerability and strength, embodied through a gradient of dense colors contrasting with a pale inner section. The palette of mourning black and deep blue conveys strength, while pale yellow suggests vulnerability and exposure. The main collision occurs at the center, where strong edges interrupt a soft halo effect, reflecting the tension between protection and exposure. Rows are arranged in a split-horizontal layout to illustrate this duality.</desc>
