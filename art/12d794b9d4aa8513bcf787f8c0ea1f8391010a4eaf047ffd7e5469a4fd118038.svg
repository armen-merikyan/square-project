<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Rest</title>
  <desc id="desc">The emotional tone reflects the tension between restlessness and peace. The chosen palette of lime, black, electric blue, and magenta creates a strong visual dichotomy, juxtaposing vibrant energy against dark, absorbing fields. The main contrast occurs centrally, where intense colors of restlessness collide with cooler, soothing tones of peace, resembling patches of warmth amidst shadows. The 'pillar' shape seed translates into structured vertical bands that allow for dynamic interactions, representing the conflict of memory versus motion and the turbulence of emotions. Broken pixels are intentionally placed to signify disruptions—both the warmth of a flame and the sharp edges of shattering chaos.</desc>
