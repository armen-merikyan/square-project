<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Waves</title>
  <desc id="desc">This piece captures the tension between restlessness and peace through an arrangement that emphasizes conflict and resolution. The palette consists of moss green and stone gray for peace, while rust and small gold introduce restlessness. The diagonal layout represents a division between these two emotional states, with the rust and gold intruding into the peaceful green and gray. The use of broken pixels creates a sense of imperfection and disruption, embodying the tension described in the seed text. The central conflict occurs where the restlessness clashes with the serene colors, creating a strong focal point for contemplation.</desc>
