<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers &amp; Flickers</title>
  <desc id="desc">The emotional tone captures the tension between fleeting spark and lingering ash, where vibrant accents collide with muted backgrounds. The palette combines earthy hues of rust and stone gray to embody ash and memory, while bursts of small gold represent sparks of life and vitality. The primary contrast lies in the jagged transitions between the densely packed spark patterns at the top, morphing into the more subdued ash representations below, all within a split-horizontal layout that evokes the push and pull of hunger and restraint.</desc>
