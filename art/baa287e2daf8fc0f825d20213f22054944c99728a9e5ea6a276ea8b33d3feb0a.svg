<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone juxtaposes vulnerability and strength, represented through a palette of black, lime, electric blue, and magenta, where stark black implies strength and vibrancy, while lime and magenta offer glimpses of vulnerability and desire. The arrangement creates a central collision of bold, strong colors accented by softer hues along the edges, embodying the struggle and interplay between these contrasting emotions. The ‘scar’ pattern bursts from the center towards softer spatial edges, emphasizing the pressure bordering this emotional conflict.</desc>
