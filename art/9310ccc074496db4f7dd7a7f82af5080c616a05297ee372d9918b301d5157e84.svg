<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Forces</title>
  <desc id="desc">This piece captures the emotional tension between relief and dread through a focused spatial divide. The palette of dark maroon, gray, and accents of pink and red evokes the weight of dread against warm relief. The top rows illustrate the oppressive weight through dense, dark colors, interrupted by lighter hues to suggest a flicker of relief. The bottom rows, bursting with radial patterns in pink and red, represent moments of joy and release, contrasting with the somber upper section. Each color placement emphasizes this push and pull, creating a vivid representation of emotional collisions.</desc>
