<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs. Shelter</title>
  <desc id="desc">This piece reflects the emotional tension between control and surrender, encapsulated by the contrasting patterns. The upper half’s halo reflects a sense of order and containment, using cool colors like dark navy and dust gray. The lower half's maze pattern introduces more dynamic, warmer hues like compressed red and faint peach, evoking a feeling of chaotic release. The thick outline binds the two together yet also creates tension, suggesting that while the center is engulfed, a balance is sought. The interplay between the two emotional states creates a compelling visual narrative of conflict and resolution.</desc>
