<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resistance</title>
  <desc id="desc">This piece captures the emotional tension between defiance and submission through contrasting color placements. The palette of deep wine and warm ivory evokes conflict and warmth, suggesting a struggle between movement and stillness. The central area is dense with static motifs representing defiance, while the edges employ a softer thread-like quality, symbolizing submission. This collision occurs diagonally, aligning with the open gate layout, drawing the viewer's eye across a divided struggle framed by an uneven border, thereby accentuating the push and pull of contrasting emotions.</desc>
