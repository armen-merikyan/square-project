<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Symmetry</title>
  <desc id="desc">This piece juxtaposes the emotional tensions of confusion and clarity through color dynamics and arrangement. The top four rows reflect clarity, employing a controlled palette of lime and electric blue, structured in horizontal stripes to create a sense of order and symmetry. In contrast, the lower four rows portray confusion, using chaotic, spark-like arrangements with blacks and magentas, introducing broken pixels for imperfection. The edge style is bottom-weighted, emphasizing an anchor of calm that contrasts with the chaotic upper layers, creating a pulse-like rhythm that invites the viewer to experience the oscillation between harmony and discord.</desc>
