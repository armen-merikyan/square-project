<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict and Resolution</title>
  <desc id="desc">This composition explores the emotional tension between desire and emptiness, with vibrant colors representing hunger striving against the dull, muted tones of restraint. The central collision occurs diagonally, where the lattice pattern of desire overlaps with the patchwork of emptiness. The palette combines warm corals and oranges with cool blues and charcoal, illustrating the struggle of overflowing emotions attempting to break free from containment. The uneven border further emphasizes a sense of instability, capturing the essence of the seed in an abstract narrative.</desc>
