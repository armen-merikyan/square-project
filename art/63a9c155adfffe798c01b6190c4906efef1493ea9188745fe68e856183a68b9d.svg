<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Stillness</title>
  <desc id="desc">This artwork captures the emotional tones of relief and dread through juxtaposed densities of dark and light colors. The palette of sepia, tan, dust gray, and faded blue emphasizes a feeling of nostalgia and unease. The main contrast lies in the transition from deep, rich colors in the bottom rows that evoke weight and pressure, illustrating dread, to lighter, more subdued tones in the upper sections that suggest an escape or relief. The pattern reflects the alternating placement of colors, balancing symmetry and break, echoing the conflict between feeling trapped and finding solace. The scattered yet upward-flowing dynamics amplify a sense of gradual ascent against the weight below.</desc>
