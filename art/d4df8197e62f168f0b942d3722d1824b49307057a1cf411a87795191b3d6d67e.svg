<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Waves</title>
  <desc id="desc">This composition balances the themes of vulnerability and strength through a contrast of dark, stable hues surrounded by lighter, broken elements. The palette features bold coral and orange accents against muted charcoal and blue, establishing a dynamic tension that resonates with the described emotional landscape. The main collision occurs towards the center, symbolizing the struggle between these contrasting forces, while the outer edges maintain a more delicate rhythm, reflecting the vulnerability aspect. By introducing broken pixels, the piece captures the unpredictable nature of human emotions, exemplified by the 'hinge' shape seed without direct representation.</desc>
