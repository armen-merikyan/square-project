  <title id="title">Contrast in Motion</title>
  <desc id="desc">This artwork encapsulates the emotional dichotomy of joy and grief through a palette that juxtaposes warm yellows and muted purples with deep blues. The layout is designed to mimic a mirrored effect with subtle disparities, hinting at the fragility of balance. The left side, represented by vibrant yellows and oranges, conveys joy and openness, radiating outward, while the right side, with its cooler tones, reflects grief through structured noise and hard edges. The collision happens centrally, where warm colors encounter cool, suggesting a push-pull of emotions. Broken pixels introduce an element of chaos, highlighting imperfection amidst contrasts, all while maintaining necessary negative space to evoke complexity without suffocation.</desc>
