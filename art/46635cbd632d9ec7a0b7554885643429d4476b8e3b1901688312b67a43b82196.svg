<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotion</title>
  <desc id="desc">This piece expresses the tension between joy and grief through contrasting warm and cool colors. The joyful maze pattern uses vibrant yellows and oranges, evoking brightness and openness, while the grief aspect is represented by muted purples and deep blues, embodying heaviness and fragmentation. The clash of vibrant and muted hues illustrates the emotional collision, creating an asymmetric tension across the canvas. The checker-like distribution mimics the zigzag and rising signals, symbolizing the push and pull of these conflicting emotions. Despite the intense color interaction, negative space is thoughtfully kept to accentuate the contrasting emotional qualities.</desc>
