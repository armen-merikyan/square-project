<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">This piece captures the emotional battle between joy and grief through contrasting colors and distinct patterns. The palette includes warm yellows and oranges representing joy, contrasted by deep blues and muted purples representing grief. The division of the square embodies a split screen; the top half presents fragments of joy in a sparking pattern while the bottom embodies grief with denser, darker colors. The tension is palpable with jagged edges suggesting chaos and discomfort, reflecting the complex interplay of feelings from joy to sorrow.</desc>
