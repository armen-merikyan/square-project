<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Boundless Tension</title>
  <desc id="desc">This composition embodies the emotional struggle between desire and restraint. The palette utilizes hot coral and blood orange to evoke an intense, yearning quality, contrasted with the calming presence of charcoal and hollow blue, representing limitation and tranquility. The main collision occurs in the center where vibrant colors clashing against muted edges symbolize the push and pull of yearning. The patchwork and quiet field patterns intermingle, illustrating the complexity of emotions—some areas densely packed and others more open, suggesting moments of pressure and release.</desc>
