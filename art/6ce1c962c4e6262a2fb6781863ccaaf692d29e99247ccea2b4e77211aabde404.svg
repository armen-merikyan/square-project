<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone of the piece explores the tension between desire and emptiness. The palette incorporates vibrant warm colors (hot coral, blood orange) to signify desire, contrasted by cooler tones (dust pink, charcoal, hollow blue) representing emptiness. The main collision occurs in the center, where saturated colors create a dense, pulsating core that fights against the cooler colors at the edges, evoking a sense of overflow battling containment. Broken pixels at the corners enhance the sense of imperfection, representing the struggle within this emotional push and pull.</desc>
