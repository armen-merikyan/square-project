<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">The emotional tone of this composition leans into the dichotomy of defiance versus submission. The palette consists of bright yellow and orange to denote defiance, contrasted with deep blues and muted purples representing submission. The arrangement follows a pattern of falling pixels to symbolize weight, with an emphasis on diagonal flow from left to right, creating a sense of movement and emotional tension. The central area is densely packed in contrast to the lighter edges, embodying the struggle and interplay between opening and closing, suggesting unresolved feelings of love and betrayal. Broken pixels create imperfection in the overall harmony, hinting at the noise against the frame, enhancing the complexity of emotions at play.</desc>
