  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition reflects the tension between joy and grief, inspired by the seed's emotional contrast. The left side embodies joy with bright, warm yellows and oranges in a dynamic flame pattern, while the right embraces grief through muted blues and purples arranged in a mirror pattern. The sharp edges and staggered layout suggest a struggle between safe and threatened spaces, allowing the colors to collide softly yet distinctly, creating an engaging emotional experience.</desc>
