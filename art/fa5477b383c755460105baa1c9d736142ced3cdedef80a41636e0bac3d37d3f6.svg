<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The piece captures the emotional tension between strength and vulnerability through a diagonal layout that sees a dense, warm palette clash with a cooler, lighter space. The darker tones are concentrated at the bottom-left corner, representing strength and stability, while the lighter shades fill the upper-right to suggest vulnerability and exposure. This contrast allows the viewer to feel the push and pull of these opposing forces. The structured chaos of broken pixels hints at imperfection, while the overarching flow invites contemplation on the delicate interplay between shelter and exposure.</desc>
