<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order and Erosion</title>
  <desc id="desc">The composition explores the emotional tension between tenderness and rage, employing a palette of rich contrasts with black and red representing rage, and muted whites and pale blues hinting at tenderness. The layout is symmetric but eroded at the edges, mirroring emotional disruption. A central clash between sharp red pixels, shaped like stairs, breaks into soft horizontal pale blue bands. This collision symbolizes the struggle and quietness against the backdrop of chaos, rendering a potent narrative of internal conflict.</desc>
