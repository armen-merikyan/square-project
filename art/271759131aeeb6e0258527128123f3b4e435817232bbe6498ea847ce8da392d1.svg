<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone centers on the juxtaposition of vulnerability and strength, symbolized through contrasting colors and arrangements. The palette, consisting of muted tones like off-white and dust gray against compressed red and dark navy, illustrates the tension between exposed emotions and protective barriers. The main collision occurs at the center, where the strength of dense reds and dark shades meets the vulnerability of soft whites and light grays, creating an interplay of solid structure and delicate openness. The arrangement of ‘embers’ and ‘stack’ patterns visually represents the struggle and coalescence of these emotions, with intentional breaks to suggest imperfections and interruptions in the experience, mirroring life's complexities.</desc>
