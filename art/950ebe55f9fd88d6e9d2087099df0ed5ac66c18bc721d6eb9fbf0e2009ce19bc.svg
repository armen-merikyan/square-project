<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Connection</title>
  <desc id="desc">This artwork embodies a tension between loneliness and connection, represented through a carefully selected palette of warm yellows and muted blues. The outer edges, filled with deep blues and muted purples, communicate solitude and a sense of weight, creating a stark contrast with the inner core—where warm yellows and vibrant oranges suggest lightness and connection. The fractured placement of broken colors within the frame signifies moments of disturbance and memory, while the varying densities create a rhythm that evokes the emotional push and pull of the seed's themes. The interplay between dense areas and negative space captures feeling, echoing the idea of ‘flame against broken dots’ through warm bursts interrupting cooler depths.</desc>
