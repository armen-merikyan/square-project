<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Longing and Resolve</title>
  <desc id="desc">The emotional tone reflects a dichotomy between longing, represented by ambient and softer hues, and the strength of resolve, illustrated through darker and more structured tones. The palette combines blacks for depth and reds for intensity, interspersed with cooler blue and white to signify calmness and quiet space. The contrast occurs diagonally, where dense clusters of red clash against stark white spaces, encapsulating a feeling of imbalance and tension. The pattern derived from the 'fault line' denotes fractures within intimacy and distance—the broken pixels subtly emphasize imperfections in the emotional journey.</desc>
