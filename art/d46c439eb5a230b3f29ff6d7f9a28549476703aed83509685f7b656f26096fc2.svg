<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tidal Embrace</title>
  <desc id="desc">This composition explores the tension between envy and gratitude. The palette, drawn from earthy tones of sepia and tan with touches of dust gray and faded blue, evokes a sense of broken memories interweaving two emotions. The left side is dominated by darker, muted shades representing envy, while the right lightens with brighter tones symbolizing gratitude. The collision occurs at the central axis where dark and light colors meet and intertwine softly, echoing the transition from pressure to calm. Each pixel is intentionally placed to maximize the contrast and maintain a sense of negative space, lending the artwork an immersive quality that invites reflection.</desc>
