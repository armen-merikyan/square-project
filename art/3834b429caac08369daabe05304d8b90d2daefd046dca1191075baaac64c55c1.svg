<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center of Tension</title>
  <desc id="desc">The emotional tone juxtaposes fear and hope through an interplay of light and dark colors. The dark pixels create jagged edges signifying fear, while glowing soft gold and pale green represent hope, forming an upward flow from the center. The split vertical layout introduces visual tension, as the left and right sides mirror but disrupt with intentional mismatched pixels, evoking a sense of imbalance and collision. The overall composition holds negative space to enhance the emotional depth, suggesting silence amidst chaos.</desc>
