<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece captures the tension between desire and emptiness using a palette that evokes both warmth and coolness. The 'ladder' pattern symbolically represents the yearning (desire), while the 'grid' pattern conveys confinement (emptiness). The main collision occurs in the center, where vibrant colors like hot coral and blood orange are aggressively interrupted by cooler tones like charcoal and hollow blue, suggesting a battle between expansive craving and the restrictive boundaries that contain it. This interplay of saturation and low saturation reflects the emotional turmoil embodied in the seed, creating a pulsating rhythm of encroaching desire against a hollow backdrop.</desc>
