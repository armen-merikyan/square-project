<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork explores the emotional duality of vulnerability and strength through a balance of light and dark tones. The palette features soft, pale colors representing vulnerability (bone white, moss green) contrasted against stronger, earthier tones (rust, stone gray). The main collision occurs towards the center, where the pale interior, denoting openness, meets the stable, darker edges that imply strength and frame. Broken pixels signify intentional disruptions, suggesting fragility within strength, evocative of a hinge that could swing either way. The layout is largely empty with a focus off-center, creating an inviting yet cautionary space, resonating with the themes of exposure and safety.</desc>
