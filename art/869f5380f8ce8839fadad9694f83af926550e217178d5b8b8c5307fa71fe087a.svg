<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Boundaries</title>
  <desc id="desc">The emotional tone reflects the struggle between desire's vibrant, saturated colors and restraint's muted hues. The palette of hot coral, blood orange, and hollow blue creates a contrast between warmth and coolness. The main collision occurs at the center, where warm colors break through a lattice of cooler tones, symbolizing the push and pull of emotional tension. The shatter pattern represents desire's chaotic nature, continuously interrupted by the restrained, sharp edges that represent boundaries, leading to a sense of unresolved conflict and a visual representation of the seed's themes.</desc>
