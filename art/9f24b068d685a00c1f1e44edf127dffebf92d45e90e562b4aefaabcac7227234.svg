<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dual Echoes</title>
  <desc id="desc">This piece embodies the emotional tension between envy and gratitude. The palette of burnt orange, dark red, charcoal, and gold reflects the warmth of gratitude battling the coldness of envy. The outer rows are more densely packed, reflecting a weighty environment of envy, while the inner grid portrays a lighter atmosphere of gratitude. The zigzag pattern adds a sense of disruption and flow, mirroring internal conflict, while maintaining a degree of negative space to emphasize the swirling emotion. The use of broken pixels introduces imperfection, symbolizing the jagged journey of self-reflection.</desc>
