<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Light and Shadow</title>
  <desc id="desc">This composition explores the emotional dichotomy of joy and grief through the interplay of warm yellows and oranges against deep blues and muted purples. The bright hues represent joy and vitality, while the darker tones embody grief and heaviness. The split-horizontal layout creates a stark contrast where the warmth of joy is evident above, gradually transitioning to the somber shades below. This tension is punctuated by the fragmented wave-like patterns, enhancing a sense of oscillation between hope and sorrow. The organized chaos of patterns symbolizes the complexities of human emotion—interrupted rhythms and hidden layers evoke the struggle between the exposed and the concealed.</desc>
