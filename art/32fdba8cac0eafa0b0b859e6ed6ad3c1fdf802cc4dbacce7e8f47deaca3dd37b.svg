<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Intersection of Shelter and Vulnerability</title>
  <desc id="desc">The emotional tone reflects a nuanced struggle between safety and exposure. The palette, combining warm browns, soft greens, and pale whites, suggests both a protective enclave and an open, vulnerable center. The collision arises from a central vertical division where the maze-like order of safety is interrupted by stepwell patterns of exposure, creating a tension between dense shelter and airy openness. Broken pixels add an element of imperfection, reinforcing the fragility of the depicted emotions.</desc>
