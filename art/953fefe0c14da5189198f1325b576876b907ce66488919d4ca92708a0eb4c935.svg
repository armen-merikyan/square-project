<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone reflects a clash between the bold assertion of 'defiance' and the soft retreat of 'submission.' Using a palette of moss green, bone white, rust, stone gray, and small gold, the center captures defiance with deeper hues, while surrounding edges introduce submission with lighter, more fragmented tones. The collision occurs in the center where the dense radial pattern of defiance meets the scattered dot pattern of submission, creating a dynamic tension. The corner invasion layout emphasizes this contrast, with a clear gradient from intense center to more subdued edges, encapsulating the inwards push against a soft collapse.</desc>
