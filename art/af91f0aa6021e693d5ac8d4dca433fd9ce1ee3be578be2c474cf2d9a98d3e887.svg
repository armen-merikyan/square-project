<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition embodies the emotional struggle between rage and calm through the juxtaposition of hot, vibrant hues against the cooler, subdued tones. Using a palette of red, pale blue, and black, the top half represents an explosive, chaotic energy filled with a lattice arrangement—where sharp red elements push against the softer blues, portraying a battle of forces. The bottom half employs a stacked pattern, establishing a more tranquil chord of contained energy with plenty of negative space, suggesting contemplation amid noise. The collision at the horizontal divide creates a visual dialogue of tension, representing both containment and eruption, embodying the chaos of emotion without literal representation.</desc>
