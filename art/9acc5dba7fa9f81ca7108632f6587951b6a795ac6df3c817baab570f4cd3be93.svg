<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">The emotional tone is rooted in the tension between 'trust' and 'suspicion', suggesting a struggle between clarity and confusion. The chosen palette of ancient fire colors—burnt orange, dark red, charcoal, and gold—evokes warmth alongside darker undertones, illustrating the collision of emotions. The contrast occurs primarily along a central diagonal where structured dots (symbolizing trust) interact with more chaotic stepwell patterns (representing suspicion). The final pattern embodies this conflict, with a clean left side and an interruptive, broken texture on the right, suggesting both resilience and fragility in connection.</desc>
