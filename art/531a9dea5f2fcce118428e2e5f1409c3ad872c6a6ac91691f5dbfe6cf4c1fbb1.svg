<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The work captures the emotional tension between love and betrayal through a palette of warm pinks and reds juxtaposed against cool grays and dark maroon, symbolizing warmth and depth. The flowing pattern suggests a descent reflecting chaos while maintaining a sense of falling resilience. The contrast of chaotic noise against structured rings illustrates the collision of emotions, where one side disrupts the other, evoking the feeling of heartbreak and longing. The broken pixel approach enhances the narrative of imperfection and fracture, emphasizing the theme without literal representation.</desc>
