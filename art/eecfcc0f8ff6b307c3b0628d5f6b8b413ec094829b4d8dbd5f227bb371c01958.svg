<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Quiet Pressure</title>
  <desc id="desc">This piece explores the dynamic tension between vulnerability and strength, represented through a palette of muted colors and structured contrasts. The off-white and faint peach colors suggest vulnerability and softness in the center, while dark navy and compressed red create an assertive frame that implies strength and protection. The collision occurs in the top left corner, where rich hues ebb against lighter tones, echoing the push and pull of exposure and shelter. The broken pixels introduce imperfection, reflecting the real emotional scars that come with duality.</desc>
