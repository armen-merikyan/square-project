<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Abstraction</title>
  <desc id="desc">This piece embodies the emotional contrast between quietness and pressure through a dense top-left corner and gradually fading hues across the square. The chosen palette of muted off-whites, dust grays, and a striking compressed red reflects the pressure of emotion, while the soft tones of peach depict quietness. The main contrast occurs where the dense colors begin to dissolve into lighter tones, suggesting a battle between the two emotional states. The broken frame pattern implies imperfection and disruption, symbolizing shatters against a silent backdrop, echoing the concepts from the seed.</desc>
