<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">The Edge of Control</title>
  <desc id="desc">The emotional tone presents a tension between the overwhelming nature of panic and the structured calm of control. The palette, dominated by dark navy and dim cyan, evokes a feeling of solitude and introspection. The contrast arises from the central diamond pattern where dark blacks collide with lighter cyans, creating a sense of controlled chaos emanating from the edges inward, reminiscent of panic creeping into a controlled state. Stripes of color bleed into one another, emphasizing the fluidity between emotions, while maintaining negative space that represents moments of stillness amid chaos.</desc>
