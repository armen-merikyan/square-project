  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork conveys a dynamic struggle between defiance and submission, represented by the dominating dark pixels that signify strength against a lighter background that evokes vulnerability. The palette of deep blacks and calm pale blues signifies the tension inherent in the theme. The central area, rich in dark tones, creates a protective block, while the edges are lighter and less saturated, embodying a sense of submission. The collision occurs sharply at the center where dark and light patterns interlace, symbolizing conflict, yet revealing quiet spaces that allow for introspection and balance.</desc>
