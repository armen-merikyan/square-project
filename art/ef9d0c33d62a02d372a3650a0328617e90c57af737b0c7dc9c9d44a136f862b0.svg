<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Crossing Signals</title>
  <desc id="desc">The emotional tone reflects a tension between trust and suspicion, expressed through a palette dominated by dark hues interspersed with vibrant accents. The color choices of static gray and dead black represent suspicion, while the signal green and hot magenta symbolize trust, creating a visual pulse amidst the noise. The central collision of these colors creates a sense of pressure where the patterns of dots (representing suspicion) converge with the fault line texture (representing trust), suggesting an interaction of emotions. This collision occurs at the center, emphasizing the struggle between these conflicting feelings.</desc>
