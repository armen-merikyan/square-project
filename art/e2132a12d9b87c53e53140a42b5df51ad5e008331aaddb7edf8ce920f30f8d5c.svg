<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Duality</title>
  <desc id="desc">This piece captures the tension between confusion and clarity by splitting the canvas into two emotional halves. The left side (confusion) employs dark shades of navy and black, using spark-like patterns to suggest chaotic energy and overlapping paths. The right side (clarity) utilizes lighter dim cyan and white tones, framed within darkness suggesting an echo of clarity amidst the confusion. The main collision occurs in the middle where dark meets light, provoking a sense of unresolved tension. The placement of the broken pixels serves to enhance the feeling of imperfection and the struggle between symmetry and chaos, recalling the emotional turmoil inspired by the seed.</desc>
