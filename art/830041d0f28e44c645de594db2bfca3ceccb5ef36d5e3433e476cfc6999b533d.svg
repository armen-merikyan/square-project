<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall</title>
  <desc id="desc">The artwork expresses the emotional dichotomy between envy and gratitude through color contrasts and patterns. The chosen palette of burnt orange, dark red, charcoal, and gold evokes a sense of warmth intertwined with tension, representing the struggle between these two emotions. In the center, the warm colors rise, suggesting gratitude, while the darker tones at the edges descend, symbolizing envy. The dot and teeth patterns create a rhythmic texture that confronts the viewer, highlighting the interplay and collision of emotions, while leaving negative space to suggest moments of introspection and quiet. The interplay of soft edges versus sharp patterns in the design encapsulates the nuanced relationship between these feelings, crafting a visual narrative of ascent and descent within the crowded space of emotion.</desc>
