  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition captures the emotional tension between desire and emptiness. The warm colors of hot coral and blood orange convey a saturated pull, while the cooler tones of charcoal and hollow blue represent containment and blankness. The visual flow rises from bottom to top, symbolizing hope clashing against a sealed edge that holds back expansion. The collision occurs primarily in the center, where the warm and cool colors intersect, creating a dynamic contrast. Broken pixels introduce imperfection, reflecting the struggle inherent in this emotional duality.</desc>
