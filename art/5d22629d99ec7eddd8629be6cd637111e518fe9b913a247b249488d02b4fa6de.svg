<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger's Edge</title>
  <desc id="desc">The emotional tone captures the friction between desire and restraint, embodied by a radical radial pattern in vibrant hues colliding with muted fields. The chosen palette of hot coral and blood orange represents the saturation of longing, contrasting against the darkness of charcoal which embodies contained spaces and restraint. The main collision occurs at the center with a burst of warmth, while the checker pattern at the edges echoes a restrained boundary, providing a visual tension that aligns with the concepts of pressure and borders as explored in the seed.</desc>
