<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects a tension between vulnerability and strength, embodied in contrasting colors and patterns. The chosen palette of yellow, orange, deep blue, and muted purple reflects warmth (strength) alongside coolness (vulnerability), creating a rich emotional landscape. The main contrast occurs in the corners, where a dense cluster of colors builds pressure while lighter, muted patches represent the exposed center. This structure evokes a sense of safety encroaching upon exposure, mirroring the seed's themes of shelter amidst vulnerability. The use of broken pixels reinforces the idea of imperfection, echoed in the jagged arrangement across the grid, creating an ongoing sense of tension and release.</desc>
