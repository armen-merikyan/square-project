<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Cracked Affection</title>
  <desc id="desc">The emotional tone of this piece contrasts feelings of warmth and intimacy against the coldness of betrayal. I selected a palette of pink, red, gray, and dark maroon to symbolize the duality of love's vibrant intensity versus the oppressive weight of betrayal. The primary contrast is depicted through the distribution of warmer colors on one side and cooler, muted tones on the other, suggesting a broken balance. The uneven placement of patterns evokes imperfection and tension, embodying the seed's exploration of conflict and emptiness, as spaces split diagonally create a sense of dissonance in an otherwise mirrored layout.</desc>
