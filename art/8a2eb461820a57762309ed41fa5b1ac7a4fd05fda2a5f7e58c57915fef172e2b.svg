<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolution</title>
  <desc id="desc">This piece captures the emotional tension between longing and resolve. The palette reflects a mourning yet renewing quality, with the deep blues suggesting depth and introspection, while pale yellow hints at hope and resolution. The top half embodies ‘longing’ with scattered, stacked patterns, exhibiting a sense of unfinished paths. The bottom half represents ‘resolve’ through a structured stepwell pattern signifying stability. The collision between chaotic stacks and orderly steps occurs at the middle, creating a dynamic yet serene visual tension that represents a journey between these emotional states.</desc>
