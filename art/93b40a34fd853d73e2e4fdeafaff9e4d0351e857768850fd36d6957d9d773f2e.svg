<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This artwork embodies the conflict between longing and resolve through emotional tension. The warm pink and red colors represent longing with soft echoes, while the darker gray and maroon denote a firm resolve expressed through the teeth-like pattern. The central collision draws the eye, showcasing the chaotic pull of desire against the steady rise of determination. The deliberately employed broken pixels introduce an element of imperfection, representing the disruption in search for connection, and establish a sense of distance amidst intimacy. Leaving a quiet field of gray as negative space creates a release, enhancing the emotional dynamics of pressure and emptiness, reflective of the seed's thematic dualities.</desc>
