<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipse of Emotions</title>
  <desc id="desc">This artwork captures the struggle between vulnerability and strength through a tension of color and form. The palette, consisting of mourning_black, deep_blue, new_leaf, pale_yellow, and stone, evokes an airy yet heavy emotional landscape. The saturated hues of deep_blue dominate, representing strength and stability, whereas the pale_yellow suggests vulnerability and exposure. The placement showcases a broken frame layout, allowing emotions to ‘leak’ through the edges. The main interaction occurs in the center, where the brightness of pale_yellow collides with the depth of deep_blue, establishing a strong contrast that illustrates the conflict between safety and exposure. Broken pixels across the piece add intentional imperfections, suggesting the scars of emotional experiences, while maintaining an abstract quality throughout the design.</desc>
