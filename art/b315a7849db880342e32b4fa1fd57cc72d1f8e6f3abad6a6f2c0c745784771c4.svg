<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragments of Emotion</title>
  <desc id="desc">This piece captures the duality of 'awe vs terror' through a structured yet chaotic arrangement. The palette of navy, black, and dim cyan creates a feeling of depth and quiet menace, while the inclusion of white offers moments of clarity amidst the darkness. The top four rows represent 'awe' with soft blending and noise patterns evoking wonder, while the bottom four rows portray 'terror' through jagged edges and crosshatch formations, embodying instability. The broken pixels introduce an element of imperfection, enhancing the emotional tension and inviting a closer inspection of the split-screen structure.</desc>
