  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone reflects a struggle between saturated desire and muted restraint. The palette of deep reds, blacks, and muted creams contrasts the warmth of longing against the cool edge of inhibition. The visual clash takes place around the center, where broken pixels disrupt the flow, symbolizing collision between yearning and limitation. The layout provides negative spaces that amplify emotional tension, with warm hues framing cool edges, creating an evocative push and pull across the square.</desc>
