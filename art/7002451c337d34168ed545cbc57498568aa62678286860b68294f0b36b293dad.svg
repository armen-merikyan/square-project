<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Thirst of the Void</title>
  <desc id="desc">This composition embodies a core emotional struggle between desire and emptiness, creating a vivid dialogue of saturation and restraint. The palette features warm tones like hot coral and blood orange to suggest the intense pull of desire, contrasted with the deep charcoal and hollow blue to evoke a sense of emptiness. The arrangement showcases a central block of warmth amidst surrounding cooler tones, with interrupted patterns that evoke collision and tension, illustrating how desire sharply counters the surrounding calm. The patterns alternate between densely saturated fields and quieter lattice structures, emphasizing the ongoing negotiation between these emotions.</desc>
