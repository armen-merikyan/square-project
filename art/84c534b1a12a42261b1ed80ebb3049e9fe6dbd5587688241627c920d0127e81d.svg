<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Clash of Stillness</title>
  <desc id="desc">This composition embodies the tension between restlessness and peace. The palette—rooted in warm shadows and cool blues—reflects intimacy and distance, creating emotional depth. The denser center, using rich hues, collides with lighter edges, forming a sharp contrast that evokes a sense of chaos restrained within boundaries. The patterns of 'stairs' and 'hinge' intersect through jagged movements, representing both struggle and moments of quiet. This interplay captures the essence of a restless memory confronted by serene motion.</desc>
