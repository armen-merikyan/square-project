<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragments of Emotion</title>
  <desc id="desc">This artwork embodies the duality of love and betrayal, employing a palette that juxtaposes warm hues of pink and red against the cool tones of gray and dark maroon. The layout follows a descending flow reminiscent of tears or ashes, suggesting an emotional descent from warmth to coldness. The broken edges create an imperfect symmetry, conveying the fractures in love and the misalignments of betrayal. The crosshatch and crack patterns interact to form a dense contrast at the center, representing the tumultuous interplay between love's warmth and betrayal's chill, culminating in an unresolved, yet palpable tension that resonates through the arrangement.</desc>
