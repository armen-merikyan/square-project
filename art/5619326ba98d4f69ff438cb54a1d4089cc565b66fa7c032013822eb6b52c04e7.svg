<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">The artwork explores the emotional duel between confusion and clarity. The chosen palette of warm burnt orange and dark red juxtaposes against deep charcoal and gold, symbolizing the tension between clarity (warm tones) and confusion (dark tones). The upper four rows represent clarity, with a structured 'spark' pattern, displaying organized bursts of color. Conversely, the lower rows reflect confusion with a 'mirror' pattern, presenting chaotic overlaps and dissonance. A thick outline adds definition while suggesting boundaries that are simultaneously respected and broken, echoing the emotional instability suggested by the seed. The overall composition balances density with negative space, maintaining visual tension without chaos.</desc>
