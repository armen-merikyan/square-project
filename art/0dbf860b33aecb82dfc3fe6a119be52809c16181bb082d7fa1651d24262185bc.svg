<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Desire and Restraint</title>
  <desc id="desc">The artwork captures the emotional conflict between desire and restraint through a dynamic interplay of saturated and muted colors. The palette of hot coral and blood orange represents desire's vibrant essence, while charcoal and hollow blue symbolize the restraint's cooler, more contained influence. The diagonal flow, starting from the corner, guides the viewer’s eye to the intensity of the center's colors where desire surges against the boundary of calm restraint, creating a vivid collision. Broken pixels introduce intentional imperfections, enriching the sense of struggle and adding irregularity to the flow.</desc>
