  <title id="title">Order vs Chaos in Motion</title>
  <desc id="desc">This artwork evokes a struggle between control and panic through its contrasting colors and patterns. The burnt orange and dark red represent the warm intensity of emotional chaos, while the charcoal and gold signify calmness and control. The layout splits the canvas into a structured grid on one side, gradually breaking apart into more chaotic patterns on the other, embodying the conflict suggested by the seed. Asymmetrical placements of the colors enhance the sense of collision, echoing the emotional turbulence expressed within the seed.</desc>
