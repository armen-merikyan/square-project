<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threads of Tension</title>
  <desc id="desc">This composition embodies the emotional juxtaposition of longing and resolve, capturing the push and pull of human experience. The palette leans towards deep, warm tones of burnt orange and dark red, illustrating urgency and depth, while charcoal offers a grounding contrast. The layout pushes emotional resolve upwards against the backdrop of longing, creating a diagonal division that instills a sense of movement. The broken pixels weave through, symbolizing the fractures inherent in both states. The interplay of patterns, where patchwork meets broken frame, results in moments of collision and quiet, representing the tension of repair amidst damage.</desc>
