<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Suspicion</title>
  <desc id="desc">The emotional tone fluctuates between warmth and darkness, portraying the tension found in the contrast of trust and suspicion. The palette incorporates soft and muted hues—the hot coral and blood orange suggest vitality and trust, while the charcoal and hollow blue introduce shadows of doubt. The main collision occurs diagonally across the piece, where warm colors interact with darker tones to evoke a feeling of unease amidst stability, signifying both trust and suspicion coiling together in a spiral pattern. The broken pixels serve as cracks in this facade, emphasizing imperfection and tension within the coexistence of these emotions.</desc>
