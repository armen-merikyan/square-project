<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Reflection</title>
  <desc id="desc">This artwork captures the duality of longing and resolve. The selected palette, 'melancholy_wonder', features soft, muted tones juxtaposed against hints of warmth to evoke a sense of distant yearning amidst the steadiness of resolution. The dense center demonstrates the resilient clashing of resolve—represented by the stepwell pattern—while the outer layers create a tranquil sea, symbolizing longing with a checker pattern. Broken pixels introduce intentional interruptions, enhancing the sense of repair within the damage. The main collision occurs at the center, anchoring the viewer's gaze while inviting exploration outward, reflecting a balance between contained emotions and overwhelming introspection.</desc>
