<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Boundary of Emotion</title>
  <desc id="desc">The artwork expresses the tension between desire and restraint through a palette of warm and muted colors. The saturated red oxide and small orange represent desire, while the blackened plum and iron gray encapsulate restraint. The pattern of grids and channels collides at the center, illustrating the dynamic between overwhelming passion and the need for control, bordered by a sealed edge to emphasize containment. This layout encourages a feeling of chaos within boundaries, drawing the viewer's attention to the emotional struggle encapsulated within the square.</desc>
