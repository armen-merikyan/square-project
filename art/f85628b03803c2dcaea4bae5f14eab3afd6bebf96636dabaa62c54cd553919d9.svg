<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Exposure</title>
  <desc id="desc">This artwork embodies the emotional tension between vulnerability and strength. The palette of navy, black, dim cyan, and whites presents a landscape of safety and exposure, contrasting dark and light to symbolize weight against ease. The central collision occurs where the dense, striped strength pattern, symbolizing stability, meets the fractal-like ember bursts of vulnerability, creating an unsettling yet beautiful disruption of space. This tension reflects the seed's themes, portraying strength as a protective layer amidst exposed light, evoking contemplation on safety and exposure.</desc>
