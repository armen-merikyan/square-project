<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Crimson Restraint</title>
  <desc id="desc">The emotional tone of this artwork reflects the inner turmoil between desire and restraint. A palette dominated by deep red and muted cream suggests saturation of longing, while blackened plum adds an ominous edge of restraint. The central collision occurs where vibrant reds press against the muted edges, embodying the struggle to break through locked confines. This dynamic is accentuated by the lattice-like structure that holds distinct yet colliding patterns of maze-like desire, creating an abstract representation of yearning constrained.</desc>
