  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork embodies the emotional tension between rage and calm. Warm reds and black represent rage, creating a chaotic core that clashes with the cooler pale blue and white surroundings, conveying calm. The sharp, jagged ring pattern represents the uncontained rage, while the maze-like calm layout flows to balance it. The main collision occurs in the center, where the fiery intensity meets the quiet spaces. The seed shaped the abstract narrative by suggesting a struggle between overflowing emotion and contained calmness.</desc>
