<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Desiring Boundaries</title>
  <desc id="desc">The emotional tone captures a dynamic tension between the intense desire represented by warm hues and the emptiness shown through cooler, muted tones. The selected palette of hot coral, blood orange, and dust pink expresses the hot, pulsating emotion of desire, contrasted against the character of charcoal and hollow blue, which emphasizes the void and distance. The primary collision occurs in the central square with more saturated colors, overpowering the ordered grid, and disruption inflicted by broken pixels suggesting the struggles against constraints, adding depth and complexity.</desc>
