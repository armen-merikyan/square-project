<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Quiet Desires</title>
  <desc id="desc">The emotional tone juxtaposes longing and resolve, using ice blue and warning orange to create tension. The palette leads with a cool base, suggesting serenity and calmness, interrupted by sharp, warm bursts of orange, reflecting urgency and a hint of conflict. The collision occurs centrally where the orange breaks through the blue, symbolizing a moment of realization amidst longing, while the remaining colors provide a backdrop of unresolved emotion. Broken pixels introduce intentional disruptions to echo the theme of emotional repair and damage, further emphasizing the non-linear journey between these feelings. The layout is sparse, reflecting an empty room concept, allowing for spaciousness which accentuates the main pattern and emotional narrative.</desc>
