<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">This artwork explores the tumultuous relationship between rage and calm. The palette of reds and pale blues is designed to highlight the tension between explosive and serene emotions. The clash of the cool tones representing calm is interrupted by fiery red accents that disrupt the overall tranquility. The zigzag pattern emerges as a visual metaphor for the internal struggle, creating visual collision points at the center. The presence of broken pixels introduces imperfections, embodying the chaos within. The arrangement maintains a sense of spatial division while allowing emotional flows to interact, resulting in an abstract narrative of containment challenged by overflow.</desc>
