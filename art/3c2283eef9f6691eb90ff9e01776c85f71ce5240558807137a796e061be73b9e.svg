<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece embodies the emotional tension between rage and calm through its palette of stark contrasts. The fiery reds represent the intense energy of rage, while the softer pale blue invokes a sense of calm. The outer border features darker and denser shades, encapsulating the explosive energy of rage, while the inner core introduces gentle cracks of blue creating a quiet area to balance the more aggressive colors. The use of broken pixels throughout introduces imperfection, reflecting the chaos of emotion. The zigzag and cracked pattern creates a visual interruption, emphasizing the collision between the two emotional states.</desc>
