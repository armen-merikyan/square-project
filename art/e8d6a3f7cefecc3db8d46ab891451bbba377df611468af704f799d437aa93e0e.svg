  <title id="title">Exposed Tension</title>
  <desc id="desc">This artwork explores the emotional duality of vulnerability and strength. The palette of muted cream, blackened plum, and small orange reflects a balance between heaviness and lightness, using warm tones to convey safety while allowing for moments of exposure. The main collision occurs through a diagonal sweep in the composition, where dense blocks of color interact with more static areas, creating both visual and emotional tension. The edge style intentionally frays, suggesting an incomplete narrative. The pattern flows towards an off-center point, echoing the theme of navigating the pull between being sheltered and being vulnerable.</desc>
