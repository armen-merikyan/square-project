<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of the Threshold</title>
  <desc id="desc">This artwork explores the emotional dichotomy of defiance and submission, depicted through contrasting patterns and flows. The chosen palette of hot coral, blood orange, dust pink, charcoal, and hollow blue embodies an interplay between warm and cool tones that suggest both conflict and resolution. The main contrast exists in the center where the radial pattern of defiance collides with the halo of submission, creating a focal point that draws the viewer's eye while also allowing for significant negative space. The arrangement intentionally disrupts the expected symmetry, reflecting the tension between order and chaos, akin to the pull between resilience and surrender in the emotional landscape.</desc>
