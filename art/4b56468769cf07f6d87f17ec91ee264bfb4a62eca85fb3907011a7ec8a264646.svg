<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Shadows</title>
  <desc id="desc">The emotional tone of this composition explores the conflict between love and betrayal through color tension and structured chaos. The palette, consisting of warm pinks and deep reds juxtaposed with cool grays and dark maroon, represents the warmth of love challenged by the starkness of betrayal. The main contrast occurs where sharp lines of gray cut through softer pinks, invoking a sense of disruption and intensity. The diagonal flow suggests a rising tension, and the patterns reflect a mix of raindrops transitioning into harsh stripes, symbolizing a journey from tenderness to conflict. The broken edge style introduces imperfection, emphasizing the unpredictability of emotions, while purposely leaving empty spaces to signify loneliness and unresolved feelings.</desc>
