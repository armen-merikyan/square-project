<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">This piece explores the tension between confusion and clarity through a rhythmic palette of pink, red, gray, and dark maroon. The arrangement uses a diagonal flow that simulates falling, representing the descent of clarity into confusion. Clarity is suggested through the structured placement of lighter shades, while darker tones create disarray at the edges. The contrast of full bold colors against empty pixel spaces echoes the dichotomy of certainty and uncertainty. Broken pixels introduce imperfections, hinting at the fragility of clarity amidst chaos.</desc>
