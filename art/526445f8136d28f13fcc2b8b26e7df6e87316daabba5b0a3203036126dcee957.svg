<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry and Disruption</title>
  <desc id="desc">The emotional tone portrays the struggle between joy and grief, using warm colors to represent joy against cool muted tones for grief. The contrasting palettes cast a visual battle: bright yellows and oranges in the inner core symbolize rising signals of joy, while deep blues and muted purples frame the edges, evoking the weight of grief. This arrangement creates a zigzag flow and a sense of dynamic disruption, where brighter colors collide with darker hues at the borders. The presence of broken edges introduces an element of chaos, enhancing the themes of tension and unresolved emotional states. The resulting pattern, with its split-screen approach, represents an abstract core of joy surrounded by grief, effectively conveying the complexity of these emotions without resorting to literal representation.</desc>
