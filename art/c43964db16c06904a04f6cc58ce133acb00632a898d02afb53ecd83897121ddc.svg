<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Preserved Sparks</title>
  <desc id="desc">The emotional tone represents a delicate balance between sharp vibrance (spark) and muted decay (ash). The palette of warm yellows and oranges intersects with deep blues and muted purples, creating a vivid contrast. The diagonal arrangement symbolizes the tension between hunger and restraint, while broken pixels introduce a sense of imperfection, echoing memories of the past. The central patterns collide—a braided warmth of sparks enveloped by jagged edges of ash—creating a dynamic composition that expresses resilience amidst fragility.</desc>
