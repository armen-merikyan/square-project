  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the emotional tension between exposure and safety using a palette that reflects warm shelter and cool exposure. The main contrast occurs between the dense dark borders and the lighter hues at the center, suggesting a protective boundary around a fragile core. The 'negative cross' pattern reflects the interplay of vulnerability and strength, while the 'broken frame' edge reinforces the idea of fractured safety. The arrangement of colors creates a rhythmic push and pull between clustered intensity and open calm, embodying the essence of the seed's themes.</desc>
