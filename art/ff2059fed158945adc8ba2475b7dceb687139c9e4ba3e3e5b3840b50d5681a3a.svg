<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Static Pulse</title>
  <desc id="desc">The emotional tone explores the struggle between clarity (signal) and chaos (noise). The chosen palette combines deep navy and dim cyan as dominant colors representing the signal, contrasted with black as the noise. The top four rows dominate the composition with clean patterns reflecting structured emotion, while the bottom four rows disrupt that clarity with clustered, chaotic arrangements. The central collision of brightness against darkness narrates the tension of seeking clarity amid disruption.</desc>
