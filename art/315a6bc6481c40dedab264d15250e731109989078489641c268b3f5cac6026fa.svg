<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tenderness and Rage</title>
  <desc id="desc">This composition embodies the emotional tension between two contrasting feelings. The top four rows represent tenderness with muted pastel blues and whites, suggesting quietness and protection, while the bottom four rows represent rage with vibrant reds and blacks, creating explosive contrasts. The palette of calm blues interspersed with sharp reds illustrates the push and pull of emotions. The predominant collision occurs at the center, where fiery red elements attempt to disrupt the serenity of the soft blue fields, portraying an emotional struggle between containment and overflow. The placement of darker colors near the edges heightens the sense of confinement despite the vibrant expression at the center, making a clear abstract statement about internal conflict.</desc>
