<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Desire</title>
  <desc id="desc">This artwork embodies the emotional tension between desire and restraint, using a palette that juxtaposes warm saturated hues against deeper muted shades. The hot coral and blood orange represent the vibrant pull of desire, while the charcoal and hollow blue signify the boundaries and limitations of restraint. The arrangement echoes a spiral pressure with a fundamental collision at the center where the warmth meets the cool, embodying a push-pull dynamic. Broken pixels are scattered throughout to represent imperfections and the scars of emotional conflicts. This composition creates a cohesive yet disruptive flow that leads the viewer's eye inward, reflecting the sensation of yearning while feeling confined.</desc>
