<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veils of Emotion</title>
  <desc id="desc">The emotional tone reflects the interplay between grief and joy, represented through contrasting hues. The palette employs warm yellows and oranges for joy, clashing against the deep purples and muted blues of grief. The layout facilitates a diagonal spread of these emotions, showcasing bursts of joy from the corners while the heaviness of grief lingers in the center. The broken dot and mirror patterns create visual texture, emulating the tension between different emotional states. This abstract pattern invites the viewer to experience a wave of sentiments — from brightness to shadow — embodying both the joy of moments and the weight of loss.</desc>
