<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Heart's Dissonance</title>
  <desc id="desc">This piece contrasts the warm hues of burnt orange and gold with the cool gray of charcoal, symbolizing the tension between desire and emptiness. The warm colors cluster towards the left, echoing desire and vibrancy, while the cooler shades arise from the right, suggesting emptiness and isolation. This offset creates a dynamic zigzag flow, drawing the eye along a diagonal path that evokes feelings of longing interspersed with silence. The imperfect arrangement of broken pixels adds a layer of depth, suggesting fragmented emotions. The radial noise and burned edges symbolize a heart fragmented by desires yet weighed down by emptiness, creating an unresolved but compelling tension throughout the composition.</desc>
