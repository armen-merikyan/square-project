  <title id="title">Fractured Flames</title>
  <desc id="desc">This artwork captures the emotional intensity of love versus betrayal through a contrasting palette of warm and cool tones. The left side expresses warmth with soft reds and pinks, while the right introduces a stark gray and dark maroon, symbolizing betrayal's cold touch. The split composition reflects the emotional tension and the 'split symmetry' indicated by the seed. The noise pattern on the betrayal side balances with the flames, suggesting a conflict between warmth and sharpness. The broken edges evoke a feeling of imperfection, emphasizing the themes of emotional fracture and resilience.</desc>
