<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This piece explores the contrast between joy and grief, embodied in a zigzag flow suggesting rising signals amid chaos. Colors like muted purple and deep blue represent grief with heaviness, while bright yellows and oranges introduce moments of joy, creating a visual tension. The layout is sparse with an off-center focus that emphasizes negative space, leading to an unresolved motion that speaks to the complexity of conflicting emotions. Broken pixels subtly fracture the surface, embodying imperfection and the chaotic interplay of experience.</desc>
