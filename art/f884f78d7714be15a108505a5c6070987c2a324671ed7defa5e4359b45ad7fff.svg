<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone bridges the clash between rage and calm. The palette uses dark, intense reds and blacks to embody rage while incorporating pale blue and white for calmness, creating a vivid emotional spectrum. The main collision occurs centrally, where jagged red 'stack' patterns of rage interrupt the quieter lattice-like structures of calm, suggesting an emotional push and pull. This reflects the seed's themes of chaos within structure through color placement and arrangement, while leaving negative space to emphasize the dynamics between containment and overflow.</desc>
