<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight and Lightness</title>
  <desc id="desc">The emotional tone of this artwork oscillates between relief and dread, conveying the tension between lightness and heaviness. The chosen palette features warm yellows and oranges to evoke a sense of relief, juxtaposed against deep blue and muted purple to represent dread. This contrast is further emphasized by the asymmetrical arrangement where the top rows are lighter and vibrant, symbolizing relief, while the bottom rows embrace darker and subdued tones that signal dread. The abstract pattern reflects a vertical wave-like flow, creating a sense of movement from top to bottom, complemented by sparse 'broken' pixels to add imperfection—suggesting cracks in both relief and dread. The negative space ensures a sense of balance, enhancing the emotional resonance of the composition.</desc>
