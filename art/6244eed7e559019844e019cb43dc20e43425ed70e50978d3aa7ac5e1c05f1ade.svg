  <title id="title">Fractured Harmony</title>
  <desc id="desc">This artwork explores the emotional tension between love and betrayal through contrasting warm and cool color palettes. The outer edges transition between dark maroon and gray, suggesting a shadowy betrayal, while the inner squares pulse with pinks and reds expressing warmth and connection. The pattern invokes layered warmth of checker and radial formations offering an echo of deep emotional complexity, presenting both symmetry and dissonance. Notice the broken pixels creating imperfection, enhancing the feeling of missed connections and unresolved feelings.</desc>
