<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Control Amidst Chaos</title>
  <desc id="desc">This artwork captures the tension between panic and control, with contrasting areas of dense noise evoking chaos and scattered specks signifying control. The color palette reflects these emotions—dark maroon and shades of pink introduce warmth and depth while gray adds a stabilizing element amid the chaos. The layout is descending, creating a 'falling pixels' effect that symbolizes the weight of emotional turmoil. The central focus, represented through lighter splashes of color, interrupts the overwhelmingly dark surrounding pixels, emphasizing the fragile stability in a chaotic context.</desc>
