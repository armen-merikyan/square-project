<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition captures the tension between defiance and submission through contrasting colors and patterns. The dominant maroon and gray signify a defiant, strong emotional core, while the softer pink tones represent submission, gently fracturing this central strength. A clockwise spiral flow evokes a sense of pressure surrounding a central pillar, symbolizing the inner struggle. The negative spaces allow the colors to breathe, preventing a complete collapse into chaos, while broken pixels intermittently disrupt and challenge the visual rhythm, mimicking the emotional turbulence inherent in the theme.</desc>
