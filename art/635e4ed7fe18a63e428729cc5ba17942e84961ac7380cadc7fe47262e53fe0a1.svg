<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Convergence of Tension</title>
  <desc id="desc">This piece captures the emotional spectrum of relief versus dread through a careful color arrangement. The palette integrates cool and warm tones with pale mint and faded gold suggesting relief, while storm gray and near black evoke a sense of dread. The collision occurs prominently at the center where dense clusters of dark hues dissolve into lighter frames. The pattern of unevenness creates a broken line aesthetic grounded in the shape of a 'hinge,' representing the tense balance between chaos and order. Negative space is deliberately embraced, allowing the weight of emotion to breathe across the square.</desc>
