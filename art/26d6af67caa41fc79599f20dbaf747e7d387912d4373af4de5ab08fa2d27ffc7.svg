<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">hunger_vs_restraint</title>
  <desc id="desc">The emotional tone emerges from a dichotomy between desire and restraint, suggesting a pull toward warmth while being confined by darker undertones. The selected color palette, featuring rich reds and muted grays, embodies the tension between vibrant aspirations and a heavy sense of confinement. The bright orange accents symbolize fleeting hope amidst the darker frames around the square, creating a sensation of collision that takes place predominantly at the center. This arrangement of colors pulses against a backdrop of locked, muted spaces, visually conveying the essence of the seed as an abstract story of longing checked by barriers.</desc>
