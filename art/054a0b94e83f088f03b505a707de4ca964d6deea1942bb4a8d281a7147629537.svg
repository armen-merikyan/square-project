<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">The artwork captures the emotional contrasts of emptiness and desire through a structured yet fragmented arrangement. The black and dark violet in the top half evokes a sense of quiet tension and psychological weight. The soft gold and pale green in the bottom represent moments of desire, flow, and release. The layout reflects a split horizontal design, implying a battle between rigidity and openness. Imperfections through broken pixels create an organic feel, suggesting that even structured signals can have interruptions. The flow of dark to light further narrates a journey from pressure to liberation.</desc>
