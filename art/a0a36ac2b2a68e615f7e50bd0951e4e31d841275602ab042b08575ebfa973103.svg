<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">The composition captures the emotional struggle between defiance and submission by using a contrasting palette of warm browns and cool greens. The upward flow signifies hope and ambition, while the shatter pattern disrupts the upward spirit, representing moments of submission. Central collisions of darker colors against muted lighter spaces create tension, echoing the continuous push-pull of emotion described in the seed. The broken pixels serve as intentional imperfections, adding depth and complexity to the narrative of resistance and acceptance in the visual space.</desc>
