<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Heartbreak</title>
  <desc id="desc">This composition embodies the emotional contrasts present in love versus betrayal. The left side, dominated by warm hues (pinks and reds), represents love — a soft, inviting warmth that feels both supportive and tender. The right side introduces darker, cooler tones (grays and dark maroon) to symbolize betrayal, forming a stark contrast that suggests conflict. The patterns of rings signify the interconnectedness of love, while cracks on the right illustrate the sharpness of betrayal, enhancing the emotional collision. The layout divides the square effectively, demonstrating the complexities of emotion through color and placement. Negative space is maintained, allowing feelings of loneliness to resonate. The overall tension is articulated through the asymmetry inherent in broken patterns, giving a sense of unresolved discord.</desc>
