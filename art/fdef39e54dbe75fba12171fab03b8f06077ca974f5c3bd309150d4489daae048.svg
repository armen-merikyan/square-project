<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Emotions</title>
  <desc id="desc">This piece reflects the emotional dichotomy of love and betrayal through a stark contrast of warm and cool colors. The palette, featuring reds and grays, represents the warmth of love against the chill of betrayal. The outer squares, influenced by the chaos of betrayal, employ a grayish tone and fragmented pattern resembling stairs, evoking feelings of disintegration. Meanwhile, the inner squares, warm reds intermixed with calm pinks, mirror the resilience of love yet shake with an unstable pattern, indicating both growth and fracture. The intentional placement of 'broken pixels' at diagonal lines symbolizes the cracks in relationships, while maintaining 12.5% negative space enhances the feeling of emptiness amidst the chaos.</desc>
