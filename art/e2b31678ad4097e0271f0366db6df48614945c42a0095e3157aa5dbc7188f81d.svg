<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Yearning and Strength</title>
  <desc id="desc">This artwork reflects a tension between 'longing' and 'resolve.' The palette, featuring mourning black and deep blue against highlights of new leaf and pale yellow, embodies the deep emotions of yearning juxtaposed with the hope of renewal. The diagonal rise pattern represents the constant push against chaos—a strong element of resolve breaking through the negative space. The background colors provide a dense field of feeling, while a few deliberate broken pixels introduce moments of interruption, echoing the complexities of intimacy and distance without forming literal shapes.</desc>
