<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Amid Static</title>
  <desc id="desc">This piece captures the constant struggle of clarity (signal) against the overwhelming chaos of interference (noise). The palette reflects this tension, using dark blacks and grays to represent static and confusion, contrasting with vibrant electric blues and hot magentas that symbolize clarity and urgency. The main collision happens at the center, where the bold green 'signal' interrupts the grayed out chaotic patterns, like a pulse trying to break through the noise. Each 'teeth' pattern creates defined spaces of clarity which are constantly interrupted by the chaotic 'stepwell' arrangement. This arrangement not only captures the emotion of struggle and hope but also delivers a visual narrative where clarity emerges from confusion, echoing the seed's exploration of exposure vs shelter.</desc>
