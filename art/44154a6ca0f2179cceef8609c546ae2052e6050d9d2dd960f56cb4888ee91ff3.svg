<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone reflects a struggle between desire and emptiness. The palette, featuring warm hues like hot coral and blood orange, encapsulates a yearning, while the cool shades of charcoal and hollow blue convey a sense of containment and spacing. The main contrast arises in the left half, where saturated colors collide with the emptiness of muted shades on the right, symbolizing the push-pull between longing and restraint. The broken pixels symbolize imperfections and disruptions, inherent to the emotional experience of desiring something out of reach.</desc>
