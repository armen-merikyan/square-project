<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">hunger_vs_restraint</title>
  <desc id="desc">This artwork encapsulates the emotional struggle between desire and emptiness. The palette features warm colors like hot coral and blood orange, representing desire, contrasted against the dark coolness of charcoal and hollow blue, evoking a sense of emptiness. The pattern of lattice conveys a pulsating energy indicative of desire, while the stripes symbolize the containment and restraint that emptiness brings. The main collision occurs in the center where the bright lattice pattern meets the darker, more subdued stripes, creating visual tension and inviting exploration of the space. Overall, this piece reflects the constant push and pull between overwhelming craving and stark limitation, resulting in a dynamic composition.</desc>
