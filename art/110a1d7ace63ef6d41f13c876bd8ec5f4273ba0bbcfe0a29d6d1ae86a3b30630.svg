<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone embodies a struggle between loneliness and connection. The chosen palette of warm yellow and orange juxtaposes with deep blue and muted purple, symbolizing warmth against isolation. The stark contrast draws attention to the center while the off-center pixels embody loneliness. Patterns of stripes suggest connection through movement, and checker-like placements interrupt the space, echoing the tension between hidden feelings and exposed surfaces. Each broken pixel represents imperfection—reflecting the raw nature of human connection against a backdrop of emotional complexity.</desc>
