<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Connection</title>
  <desc id="desc">This piece expresses the emotional tension between longing and resolve through a delicate interplay of muted and luminous colors. The pastel tones symbolize serenity, while deep navy represents resolve, creating a broken lattice of fields that suggest interrupted pathways. Collisions occur predominantly in the center where darker shades meet lighter ones, symbolizing the intersection of hope and uncertainty. The broken pixels introduce intentional imperfections akin to scars, echoing repair and distress while maintaining a sense of aspiration. The balance of quiet fields with sharper contrasts captures both the pulse of urgency and the calm of introspection.</desc>
