<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">The emotional tone explores the push and pull between envy (darkness) and gratitude (light), reflected through a split composition. The palette of deep maroon, red, pink, and gray symbolizes the weight of envy against the lightness of gratitude. The left side, dominated by dark shades with radial patterns, contrasts sharply with the lighter right side characterized by structured stripes. This duality introduces a conversational force—chaotic zigzags on the left versus calm rows on the right, illustrating the underlying emotional conflict. The arrangement encourages a gaze that flows from one side to the other, suggesting a journey between these feelings. Broken pixels introduce imperfection, hinting at the unpredictability of these emotions. The composition achieves a balance of negative space while maintaining tension, inviting the viewer to reflect on their own emotional narrative.</desc>
