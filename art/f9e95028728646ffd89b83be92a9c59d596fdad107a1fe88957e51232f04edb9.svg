<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall</title>
  <desc id="desc">This artwork explores the emotional tension between joy and grief through contrasting color palettes and placement. The top rows in warm yellows and oranges signify joy and hope, radiating warmth while encouraging upward movement. In contrast, the bottom rows in deep blue and muted purple evoke grief and introspection, creating a chill that pulls downward. The broken pixel effect introduces imperfections, reflecting the complexity of emotions as they collide. The layout captures a stair-step flow, suggesting a struggle between ascent and descent, while maintaining breathing space as it shifts between emotional states.</desc>
