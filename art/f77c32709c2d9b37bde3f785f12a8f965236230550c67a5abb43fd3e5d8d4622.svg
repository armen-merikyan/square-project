<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Layers</title>
  <desc id="desc">This artwork captures the conflict between defiance and submission, portrayed through contrasting emotional colors. The palette, rooted in guilt and forgiveness, reflects soft and heavy emotions. The collision of crack patterns, invoking defiance, contrasts with hinge patterns representing submission. The center serves as an unmoved focal point, while the edges echo a receding intensity. This layering creates a dynamic visual that flows diagonally, enhancing the emotional tension and the idea of boundaries being challenged and enveloped.</desc>
