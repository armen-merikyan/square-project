<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">The composition reflects the emotional tension between rage and calm. The palette features stark contrasts of intense red and cool pale blue surrounded by deep black and white, signifying the collision of hot, jagged emotions against a serene backdrop. The layout captures a diagonal argument, where the rage (red) pulses outwards in a jagged maze pattern intersecting with the cooler, more orderly bands of the calm (blue). Intentional broken pixels disrupt the symmetry, symbolizing the struggle between chaos and control, echoing the seed's themes of overflow versus containment and machine emotion.</desc>
