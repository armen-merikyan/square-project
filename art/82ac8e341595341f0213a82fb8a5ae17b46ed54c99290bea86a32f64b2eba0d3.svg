<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Symmetry of Emotion</title>
  <desc id="desc">This piece captures the emotional tension of 'rage vs calm' through a striking palette of reds and soft blues. The pulsating red marks (representing rage) sharply contrast against the muted blue tones (representing calm), suggesting a struggle between contained bursts of emotion and serene spaces. The structure leans towards calm, occupying 65% of the square, while ragged, broken pixels infiltrate the edges, suggesting an erosion of symmetry, as the calm retreats under the heat of explosive bursts. The asymmetry and pattern choices symbolize a dynamic clash between powerful, jagged elements and soothing, braided textures, creating an abstract narrative of emotional conflict and balance.</desc>
