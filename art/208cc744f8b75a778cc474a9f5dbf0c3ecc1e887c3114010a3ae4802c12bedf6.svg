<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Threads</title>
  <desc id="desc">This composition reflects the emotional tension between longing and resolve through color and placement. The palette of navy, black, dim cyan, and white creates a sense of depth and distance while suggesting serenity and urgency. The stark contrast of the dark hues against white spaces embodies the collision between fragmented feelings and the desire for clarity. The main contrast occurs at the center with densely packed colors representing resolve surrounded by void, evoking a sense of longing. The broken pixels serve as intentional disruptions, symbolizing scars of past desires, creating a quilt of unresolved emotions.</desc>
