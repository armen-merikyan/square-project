  <title id="title">Collision of Tones</title>
  <desc id="desc">This composition explores the emotional tug-of-war between softness and severity, creating a visual tension. The palette combines soothing powder pink and warm white against stark carbon black and sharp crimson, symbolizing the conflict of emotions. The central area features concentrated dark hues contrasting with the soft, lighter edges, emphasizing a sense of struggle and resolution. The arrangement evokes a spiral-like flow, with larger blocks of severity weighing down the bottom while softness radiates outwards, illustrating a dynamic interplay between conflicting feelings.</desc>
