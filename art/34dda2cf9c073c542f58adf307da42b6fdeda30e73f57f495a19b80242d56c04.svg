<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality in Pixels</title>
  <desc id="desc">The emotional tone is rooted in the tension of love and betrayal, diverging into sharp contrasts. The palette features warm reds and cool grays, enhancing feelings of love on one side and betrayal on the other. The left side employs a structured grid pattern, embodying the warmth and hope behind love, while the right side is marked by jagged and broken pixel placements that symbolize the betrayal. The contrast mainly occurs at the vertical split, where warmth clashes against coldness, visually narrating the struggle of broken symmetry—a metaphor for a fractured relationship.</desc>
