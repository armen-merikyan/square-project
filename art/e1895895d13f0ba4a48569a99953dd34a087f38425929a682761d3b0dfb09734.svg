<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Want</title>
  <desc id="desc">The emotional tone reflects a struggle between desire and emptiness, characterized by vibrant bursts of color against muted backgrounds. The chosen palette combines warm tones (hot coral, blood orange) representing desire and cool tones (charcoal, hollow blue) symbolizing emptiness. The main contrast occurs near the center, where a burst of 'ladder' patterns push against a backdrop of 'noise', suggesting a dynamic collision that interrupts the calm. Broken pixels disrupt the continuity to symbolize imperfections in desire, while the overall composition maintains an off-balanced rhythm reflecting 'quiet pressure' against the 'scattered repair' layout.</desc>
