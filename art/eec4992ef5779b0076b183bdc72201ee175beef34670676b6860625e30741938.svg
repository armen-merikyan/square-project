  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork captures the emotional conflict of tenderness and rage, illustrated through the use of a dense center surrounded by muted borders. The palette, a mix of red and blue with black and white, represents the heat of rage clashing against the calmness of tenderness. The central area is saturated with jagged red patterns (rage) which break through the softer rounded forms (tenderness) at the edges, creating a visible collision. The broken pixels add intentional disruptions, implying an imperfect balance between these emotions as they ebb and flow across the canvas.</desc>
