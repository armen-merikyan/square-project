<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Shelter</title>
  <desc id="desc">The emotional tone embodies the dichotomy of safety and exposure. The palette was carefully selected to contrast warm browns and soft greens (representing safety) against pale whites and bold blues (symbolizing exposure). The main collision occurs centrally, where the soft textures of rings (safety) embrace the scar-like patterns of exposure, creating tension. This arrangement illustrates a space where pressure meets release, as the thinner patterns from the left (safety) gradually fade into the heavy textures on the right (exposure), mirroring the emotional narrative in the seed.</desc>
