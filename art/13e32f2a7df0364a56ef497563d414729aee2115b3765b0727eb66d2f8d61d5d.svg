<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Emotions</title>
  <desc id="desc">This composition reflects the emotional tension between joy and grief through a careful arrangement of contrasting colors. The palette balances vibrant yellows and oranges representing joy against muted purples and deep blues symbolizing grief. The checker pattern for joy meets the broken dots of grief, creating visual tension and a dynamic that suggests a struggle. The layout, starting in the bottom corner and moving upwards, mirrors the transition from chaos to clarity, with hard edges providing a sense of conflict and stress. The shifts in density express the wave-like motion of emotions, leading to an abstract but resonant experience.</desc>
