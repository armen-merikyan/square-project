  <title id="title">Center of Duality</title>
  <desc id="desc">This artwork captures the emotional tension between fear and hope through contrasting dark and soft colors. The palette blends deep blacks and dark violets to represent fear with soft gold and pale green serving as symbols of hope. A vertical split reflects the duality, while the zigzag flow creates a sense of upward movement, invoking a rising signal of hope. The placement of colors creates a dynamic collision in the center, challenging the dark corners, while broken pixels introduce an element of imperfection, adding depth to the emotional narrative.</desc>
