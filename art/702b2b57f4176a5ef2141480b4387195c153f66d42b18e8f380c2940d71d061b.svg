<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal Pulse in Static</title>
  <desc id="desc">The emotional tone embodies the struggle between clarity and interference, represented through a palette filled with electric blues and vibrant greens for signals, contrasted with deep greys and blacks to symbolize noise. This composition uses an overfilled center layout where the vibrant colors collide against the darker shades, suggesting a dominant pulse of energy surrounded by static noise. The busy central area resonates with 'signal' emotion, while the border represents the 'noise' with a more subdued presence, inviting the viewer to explore the tension between clarity and obscurity. The intentioned broken pixels add disruptions that reflect memory, echoing how signals can become distorted over time, aligned with the seed's themes of exposure and shelter.</desc>
