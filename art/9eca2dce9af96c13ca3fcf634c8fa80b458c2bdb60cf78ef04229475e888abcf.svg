<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">The emotional tone juxtaposes joy and grief, represented through contrasting palettes. Joy emerges from bright yellows and oranges, while muted purples convey a sense of grief. The nearly mirror-like layout allows for a central axis but introduces discordance through a few strategically placed broken pixels, enhancing the notion of imperfection in balance. The chaotic flow, zigzag pattern, and checker-like placement represent the conflicts between each emotion, creating visual tension. The color placement leads to a dense cluster on one side while offering negative space on the other, symbolizing the push and pull between these contrasting feelings.</desc>
