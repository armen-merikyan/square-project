<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmony in Collision</title>
  <desc id="desc">This artwork explores the emotional tension between tenderness and rage through a palette of saturated reds and muted blues. The dominant black represents the grounding weight of rage, contrasting with softer pale blue frames that depict tenderness. The main collision occurs in the central area, where jagged, spark-like reds disrupt the calm blue borders, illustrating the battle between chaos and serenity. The design uses broken pixels to create intentional flaws, suggesting an imperfect yet beautiful coexistence of opposing emotions, influenced by the seed's narrative of inner struggle and resolution.</desc>
