<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">The artwork embodies the contrast between joy and grief through a bright, vibrant palette (yellow and orange) representing joy, juxtaposed against muted tones (deep blue and muted purple) symbolizing grief. The top half features a rhythmic pattern of dots symbolizing the lightness of joy, while the bottom half contrasts with a structured grid pattern, evoking the weight of grief. Interruption occurs where joy collides with grief; colors shift abruptly, creating a feeling of tension and complexity. The shape seed informs the jagged transitions between the two emotional states, enhancing the narrative of inner turmoil and fluctuation. The layout emphasizes separation while allowing for interactions between the two halves, exemplifying the coexistence of emotions.</desc>
