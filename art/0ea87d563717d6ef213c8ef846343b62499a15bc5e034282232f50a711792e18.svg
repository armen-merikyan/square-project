<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Joy</title>
  <desc id="desc">The emotional tone captures the tension between joy and grief, reflected in a split palette of vibrant yellows and muted blues. Joy is represented in the upper half with brighter yellows and oranges, while grief infiltrates from the lower half with deep blues and muted purples, creating a visual and emotional conflict. The chosen palette evokes warmth against coolness, suggesting a battle of feelings. The contrast lies diagonally, where the colorful crescendos of yellow collide with the fragmented blue dots, symbolizing the complex journey through grief and joy, while broken pixel placements reinforce imperfection and depth.</desc>
