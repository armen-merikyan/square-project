<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">The Crown of Tension</title>
  <desc id="desc">This artwork captures the emotional conflict of panic versus control through contrasting color placements and patterns. The warm, burnt orange and dark red palette represents the chaotic energy of panic, while the cooler, subdued tones of charcoal and gold symbolize a sense of control. The radial pattern emanates outward to suggest a center of chaos, while the jagged edges invoke feelings of tension and imperfection. The arrangement allows dense, saturated clusters of red to collide with the cooler backgrounds, illustrating a tumultuous push-pull relationship between emotions. Negative space frames the chaos, giving room for contemplation and creating a narrative that feels unresolved yet dynamic, reflecting the intricate dance between control and panic.</desc>
