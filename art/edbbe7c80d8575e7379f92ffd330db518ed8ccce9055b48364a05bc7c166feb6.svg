  <title id="title">Fluid Contrasts</title>
  <desc id="desc">This artwork embodies the dichotomy of vulnerability and strength through a clash of textures. The palette, consisting of muted cream, blackened plum, red oxide, iron gray, and small orange, emphasizes the softness of vulnerability against the density of strength. The central collision occurs in the middle of the square where strong stair-like patterns meet thin stripes, illustrating exposure to shelter. This tension creates an emotional rhythm full of layered contrasts and interruptions.</desc>
