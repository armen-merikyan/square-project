<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This composition embodies the emotional collision of fear (darkness, jagged edges) and hope (glow, upward flow). The palette of black, dark violet, soft gold, and pale green creates a balance between heavy, muted tones and subtle highlights. The left side reflects fear with darker colors arranged in a mirrored pattern to suggest pressure, while the right side offers lighter, checker-patterned colors, hinting at hope. The central arrangement allows for negative space to breathe, hinting at unresolved tension between the two emotional states, echoing the dynamic nature of our experiences as we navigate between them.</desc>
