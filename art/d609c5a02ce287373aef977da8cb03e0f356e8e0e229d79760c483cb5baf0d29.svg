<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Stillness</title>
  <desc id="desc">This composition embodies the tension between quiet and pressure through color and pattern. The palette features off-white and faint peach representing quiet, while dark navy and compressed red convey pressure. The top half's darker tones compress and create a feeling of density, while the lighter shades below suggest space and calm. The collision occurs diagonally, where the pressure meets the release, symbolizing the struggle between these emotions. The method of falling pixels enhances the concept of pressure descending, while the broken pixels introduce a natural imperfection to the design, mirroring life's unpredictable emotional landscape.</desc>
