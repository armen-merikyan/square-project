<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interplay of Rage and Tenderness</title>
  <desc id="desc">This composition explores the emotional duality of rage and tenderness through contrasting colors and spatial arrangements. The palette features saturated red and muted blue to symbolize these contrasting emotions. The left half, embodying rage, is dense with red tones and ash-like textures, creating a chaotic pressure point. The right half, representing tenderness, features pale blue and white framed spaces, suggesting quiet and lightness. The central vertical divide serves as a channel where these emotional states collide, interrupted by broken pixels that symbolize the imperfections and disruptions inherent in the emotional struggle. The intentional distribution allows one emotion to dominate while suggesting an ongoing tension.</desc>
