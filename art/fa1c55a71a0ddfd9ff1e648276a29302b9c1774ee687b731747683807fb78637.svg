<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Quiet Pulse in Static</title>
  <desc id="desc">The emotional tone captures the struggle between clarity (signal) and confusion (noise), using the palette of navy, black, and dim cyan to evoke depth and solitude. The main contrast emerges in the center, where bright accents appear intermittently against a dark, textured backdrop, suggesting a pulse attempting to rise above static interference. The arrangement reflects the seed's themes of exposure and memory, as fragments of 'signal' intrude into the dense 'noise', mirroring the notion of islands battling echoes in their surrounding sea.</desc>
