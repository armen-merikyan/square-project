<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece explores the dynamic tension between vulnerability and strength through color and form. The selected palette of pale mint, soft sky, storm gray, near-black, and faded gold creates a contrast between lightness and weight, embodying the themes of exposure and shelter. The strong accents of near-black and faded gold clash against the softer tones, with their placement suggesting the collision and interplay of strength and vulnerability. The layout incorporates a broken frame that allows light to seep through, representing the acceptance of vulnerability alongside a protective barrier.</desc>
