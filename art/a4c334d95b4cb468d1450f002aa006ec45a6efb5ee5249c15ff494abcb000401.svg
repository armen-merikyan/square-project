<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This artwork explores the emotional conflict between envy and gratitude, using colors to embody the tension between weightiness and lightness. The palette of deep reds and blacks reflects rage, while pale blues and whites suggest calmness. The outer border, heavy with dark hues, symbolizes envy, contrasting sharply with the lighter core representing gratitude. The zigzag diagonal flow captures the instability of emotions, while the broken pixels introduce a sense of imperfection, echoing the fragility of these feelings. The result is a visual representation of a tumultuous emotional journey, framed within contrasting spaces of heavy and light.</desc>
