<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Overflows</title>
  <desc id="desc">This composition captures the tension between control and surrender through a dynamic interplay of colors and patterns. The palette of mourning black, deep blue, and pale yellow evokes a depth of emotion, where dark areas symbolize control, while lighter colors signify surrender. The central collision occurs in the overfilled corner, where density meets quiet edges, creating a visual dialogue of pressure and release that reflects the seed's themes. The use of broken pixels introduces intentional imperfections, reinforcing the idea of surrender within control, creating an echo of emotional tension throughout the piece.</desc>
