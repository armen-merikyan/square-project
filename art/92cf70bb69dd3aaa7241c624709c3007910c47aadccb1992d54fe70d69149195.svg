<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Tensions</title>
  <desc id="desc">This piece reflects the emotional dichotomy between control and surrender through the juxtaposition of tightly structured pixels and liberating gaps. The muted tones of stain brown and ash gray evoke a somber atmosphere, while warmer aspects of soft gold and warm ivory suggest a delicate release. The gentle collision occurs in the center where thick outlines meet, illustrating a tension between overwhelming presence and sparse negative space, embodying the struggle between containment and overflow.</desc>
