<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetries in Collision</title>
  <desc id="desc">This piece explores the emotional conflict between peace and restlessness through a dichotomy of muted and saturated colors. The palette mixes shelter green and warm brown for grounding, balanced by bursts of open blue that symbolize fleeting moments of peace, contrasted with patches of cold white evoking shattering disruptions. The arrangement follows a diagonal flow, with a concentrated cluster of vibrant colors suggesting lively motion amid an overall subdued structure. This captures the tension of memory and motion, with the main collision occurring in the upper left corner where light hues break through the dark field, representing moments of clarity and tension against the backdrop of shadowy unrest.</desc>
