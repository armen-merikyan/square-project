<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotionally Fractured</title>
  <desc id="desc">The artwork embodies the tension between joy and grief, using bright yellows and oranges on one side to signify joy, while deep blues and muted purples evoke grief on the other. The clean maze-like pattern represents order and joy, while the mirror texture on the opposite side disrupts the flow, signifying chaos and unease. The transition is visually dynamic, with a stark contrast in brightness and texture, echoing the push-pull between these emotions. The use of hard edges emphasizes a sense of tension and boundary, reflecting the feelings of being both safe and threatened simultaneously. The layout flows from the bottom to the top, creating a sense of movement through the emotional spectrum, while broken pixels add a layer of imperfection, resonating with human experience.</desc>
