<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone captures a tension between vibrancy and containment—where warmth struggles against boundaries. The palette of hot coral and blood orange signifies desire's intensity, while charcoal and hollow blue represent the calming yet oppressive nature of restraint. The main collision happens in the center, where the saturated ripple motifs of desire meet the muted dot patterns of restraint, creating a visual push and pull that symbolizes the emotional struggle inherent in the seed. This contrast forms a quiet channel through dense patterns, illustrating the complex relationship between longing and limit.</desc>
