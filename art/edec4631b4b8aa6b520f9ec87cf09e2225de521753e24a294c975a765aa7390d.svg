<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork captures the emotional tension of vulnerability juxtaposed with strength. Using a palette of rich black, pale blue, and soft red, the contrast enhances the feeling of a strong protective center impacted by outer vulnerabilities. The arrangement showcases a collision in the center where bold patterns of strength, reflected through solid blocks, challenge the gentler, fragmented broken dots that represent vulnerability. The layout of falling pixels creates a sense of descent, evoking a flow from strength towards softer vulnerabilities, reinforcing the idea of exposure and shelter and suggesting an inward pull from the chaos outside. The use of broken pixels adds intentional disruption, enhancing the narrative of strength facing external pressure.</desc>
