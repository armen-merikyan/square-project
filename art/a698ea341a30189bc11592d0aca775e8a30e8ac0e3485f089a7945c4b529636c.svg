<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Borders</title>
  <desc id="desc">The emotional tone reflects the struggle between defiance and submission through a clash of angular and circular patterns. The palette combines harsh black and sharp crimson as contrasting elements representing defiance, while soft powder pink and warm white embody the submission. The main collision occurs at the center with pulse marks actively breaking apart the surrounding 'halo' of colors, creating a dynamic tension that both unfolds and constricts. The diagonal rise adds a sense of upward movement, enhancing the feelings of conflict and resolution. The uneven borders introduce an element of chaos, making the piece feel alive and fluctuating.</desc>
