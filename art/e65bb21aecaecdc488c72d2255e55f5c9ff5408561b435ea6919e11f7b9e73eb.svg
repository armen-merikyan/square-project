<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">This composition reflects the emotional tension between longing and resolve through the use of contrasting colors and patterns. The palette blends earthy moss greens and rusts with the crisp brightness of bone whites and small golds. The 'barcode' pattern represents resolve’s structured strength, while the crack pattern evokes the delicate nature of longing. The central collision occurs with the bands of gold and white intersecting rust and moss green, symbolizing the struggle between resolution and lingering yearning. Negative space guides the flow, allowing the eye to rest between the densely packed pulses of color, evoking an atmosphere of reflective urgency and quiet determination.</desc>
