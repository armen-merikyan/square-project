<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Chaos and Order</title>
  <desc id="desc">The emotional tone of this piece reflects the tension between panic and control. The palette, a deliberate combination of reds and blacks with hints of pale blue and white, evokes feelings of anger and calmness simultaneously. The top half, dominated by red and darker shades, represents the chaotic state of panic, while the bottom half uses lighter tones to symbolize control and reassurance. The main collision happens where the dark edges meet lighter centers, suggesting an inner conflict. The 'star' shape seed is abstracted by using a radial pattern of pressure, where the chaos seems to bleed inward toward the center, making one feel as though they're drawing in from the outside. Broken pixels add imperfection, enhancing realism and depth to the emotional narrative.</desc>
