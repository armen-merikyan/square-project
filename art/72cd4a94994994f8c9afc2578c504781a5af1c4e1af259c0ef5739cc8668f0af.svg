<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This composition embodies the emotional tension between desire and emptiness. The palette selection balances saturated tones like hot coral and blood orange representing desire against the muted charcoal and hollow blue, encapsulating feelings of restraint. The layout adopts a spiral flow that suggests a gathering of emotions towards an off-center collision in the grid. Here, the warm pulses of desire collide with the distant marks of emptiness, creating an echo of longing and silence. The edge style is deliberately cut, introducing imperfection and disruption, mirroring the internal struggle depicted in the seed text.</desc>
