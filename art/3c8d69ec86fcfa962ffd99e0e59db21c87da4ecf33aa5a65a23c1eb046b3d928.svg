<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contradiction</title>
  <desc id="desc">The emotional tone reflects a delicate balance between vulnerability and strength, represented through a palette that combines muted off-white and faint peach with deeper dark navy tones. The contrast is formed at the diagonal where the soft, exposed areas collide with the more structured checker pattern of the stronger shades. This setup creates an image of a shielded center, but with interruptions of dark elements suggesting encroaching vulnerability. The layout and patterns echo the tension between the two emotional states, making visible the layers of exposure and shelter.</desc>
