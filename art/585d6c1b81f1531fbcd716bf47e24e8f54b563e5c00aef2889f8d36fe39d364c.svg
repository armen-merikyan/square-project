<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Hearts</title>
  <desc id="desc">The emotional tone explores the bittersweet relationship between longing—represented by warm, vibrant colors—and resolve, marked by darker, more grounded hues. The palette includes burnt orange and dark red for longing, invoking warmth and desire, juxtaposed against charcoal, which embodies resoluteness and depth. The primary collision occurs centrally, where a dense clustering of warm tones confronts the stark emptiness of muted colors, creating a tension between pressure and quiet. This pattern reflects the dynamic forces of intimacy and distance through overlapping, pulsating arrangements, while broken pixels introduce intentional disruptions, reminding of the imperfections in emotional experiences.</desc>
