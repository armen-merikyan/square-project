<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Light and Weight</title>
  <desc id="desc">This composition evokes a struggle between spark and ash, illustrating the tension of hunger vs. restraint. The palette is chosen from muted grays (representing ash) contrasted by vibrant reds and soft creams (representing sparks of energy). The main collision occurs in the central area, where bursts of compressed red clash against an underlying field of dust gray, creating an emotional intensity. The patterns of 'stepwell' for brightness and 'ash_field' for darkness collide, representing memory vs erasure. This arranged chaos illustrates resilience through fragile bursts of energy amid overwhelming weight.</desc>
