<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This piece captures the emotional dichotomy of awe and terror through the use of contrasting colors—soft gold, dark violet, and pale green against an expansive black background. The soft gold represents a fleeting sense of awe, while dark violet introduces an element of underlying terror. The layout flows diagonally, evoking a rising signal of hope amidst chaotic noise represented by broken pixel patterns, symbolizing the clash of emotions. The placement allows for moments of quiet space interspersed with dense patches of color, suggesting a dynamic interplay between stability and instability.</desc>
