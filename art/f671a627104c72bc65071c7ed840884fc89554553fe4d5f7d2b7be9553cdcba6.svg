<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Struggles of Control</title>
  <desc id="desc">This composition embodies the tension of 'panic vs control' through a mixture of densely packed and sparse pixels. The palette of sepia and faded blue alludes to a sense of nostalgia and warmth, while darker tones create a stark contrast against lighter shades, evoking feelings of pressure and tranquility. Edges are weighted towards the bottom, suggesting the weight of control pushing down on rising elements that symbolize panic. The broken pixels introduce an element of chaos, capturing the disruption between these contrasting emotions. The arrangement creates a rhythm that oscillates between dense clusters and quiet spaces, inviting viewers to navigate the emotional landscape.</desc>
