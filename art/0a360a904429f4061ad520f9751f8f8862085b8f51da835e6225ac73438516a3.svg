<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition embodies the emotional tension between desire and emptiness. The warm colors (hot coral and blood orange) represent desire, saturating the central area, while cooler tones (charcoal and hollow blue) reflect emptiness, creating a felt border that contains the warmth. The pattern 'spark' overlays the gentler 'shatter' in the darker edges, symbolizing a struggle against restraint. The broken pixels introduce an intentional disruption, echoing the theme of interrupted desires, while the imperfect mirroring invites a sense of desolation amidst the yearning.</desc>
