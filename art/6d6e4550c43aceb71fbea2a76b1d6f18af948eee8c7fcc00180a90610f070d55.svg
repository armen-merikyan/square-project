<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resistance</title>
  <desc id="desc">This piece embodies the emotional tension between defiance and submission. The bright and angular tones signify defiance, while softer, muted colors represent submission. The palette features deep blues and pale yellows to balance the impact of darkness with moments of enlightenment, allowing for an interplay of shadow and light. The primary collision occurs in the center, where bright elements interrupt the surrounding calm, creating a dynamic visual rhythm. This interplay mimics the core dynamics of conflict and resolution, amplified through an asymmetric composition that draws the eye inward, representing the inward spiral from the edges. Negative spaces contribute to the theme of desolation amidst intensity, facilitating emotional reflection.</desc>
