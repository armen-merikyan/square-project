<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Trust and Suspicion</title>
  <desc id="desc">The emotional tone captures the tension between trust and suspicion, illustrated through a palette of deep greens and warm browns suggesting safety, contrasted with cold whites and pale skin tones to evoke unease. The central collision occurs between the densely packed vertical relationships on the left and the airy spaces on the right, portraying a split between certainty and doubt. The patterns of 'target' for trust and 'braid' for suspicion intertwine, with broken pixels creating intentional disruptions along the vertical split, embodying the fracture of balance and the complexity of human emotion.</desc>
