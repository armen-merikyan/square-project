  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone captures the tension between vulnerability and protection. The palette combines the warmth of sheltering greens and browns with the cool exposure of whites and blues, creating a visual rhythm that reflects pressure and release. The outer edges represent safety with a dense warmth, while the inner section introduces softer hues that represent exposure, allowing for gentle interaction. The collision occurs in the middle, where pulsing texture meets a guarded frame, illustrating the fight between these emotions.</desc>
