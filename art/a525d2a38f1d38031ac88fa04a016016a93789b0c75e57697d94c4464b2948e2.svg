<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition embodies the emotional tension between emptiness and desire. The selected palette features warm tones like hot coral and blood orange juxtaposed against deep charcoal and hollow blue, creating a vivid contrast that represents longing and containment. The layout suggests a rise of emotion, with warm colors climbing upwards from the bottom, evoking a sense of hope or aspiration. The main collision occurs in the center, where spark patterns of saturated colors clash against quieter, lower-saturation fields, reflecting the conflict between desire's pull and the constraints of emptiness. Broken pixels are strategically placed to introduce intentional imperfections, symbolizing the disruptions and edges of personal experience.</desc>
