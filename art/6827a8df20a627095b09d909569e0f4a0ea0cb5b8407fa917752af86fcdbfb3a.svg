<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Longing and Resolve</title>
  <desc id="desc">The emotional tone here contrasts the warmth of longing against the strength of resolve. Using a palette of soft pinks and deep reds for longing, paired with gray and dark maroon to convey resolve, creates a dynamic interplay. The main collision occurs in the center of the square where the shatter pattern of resolve intersects with the braid of longing, reflecting tension and emotion in contrast. This arrangement uses broken pixels to symbolize disruption and imperfection, emphasizing the theme of intimacy contrasted with distance. The layout 'open_gate' facilitates a flow towards the center, creating an echo of emotions across the canvas.</desc>
