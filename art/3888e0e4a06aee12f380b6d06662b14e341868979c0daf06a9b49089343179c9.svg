<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Calm</title>
  <desc id="desc">The emotional tone is a dynamic tension between explosive red and soothing pale blue, representing the internal conflict of rage versus calm. The chosen palette includes deep blacks and pure whites to create stark contrasts that emphasize the struggle. The main collision occurs at the center with sharp, jagged red patterns slicing through the serene blue background, illustrating the explosive energy of rage intruding upon calmness. The overlapping patterns mirror the 'ash_field' of rage and create a visually chaotic yet contained structure that resonates with the idea of 'contained vs overflowing'. The structure allows for quiet spaces, reflecting the calm amidst the overwhelming.</desc>
