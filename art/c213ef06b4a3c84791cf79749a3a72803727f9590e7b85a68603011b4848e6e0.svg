<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Shadows</title>
  <desc id="desc">The emotional tone of relief versus dread manifests through an interaction of contrasting colors: dark navy and intense black symbolize deep dread while lighter dim cyan represents fleeting moments of relief. The chosen palette evokes isolation and a yearning for lightness amidst pressure. The arrangement relies on a motif of rising signals from the bottom to the top, interspersed with moments of broken pixels that create an imperfection, embodying the disruption of dread against the hopeful rise of relief. The collision of dense dark areas with lighter hues reflects not just an emotional struggle, but also a visual tension that drives upwards, leading to an abstract narrative of escape and weight.</desc>
