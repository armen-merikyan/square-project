<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This piece explores the juxtaposition of softness and severity through a calculated yet chaotic arrangement. The palette incorporates soft tones of powder pink and warm white alongside the stark contrast of carbon black and sharp crimson, illustrating the tension between light and dark. The center is dense with a shatter-like pattern, mimicking emotional interruption, while the outer edges reflect the tide pattern, embodying a sense of order and limitation. The design emphasizes the collision in the center, where intensity and disruption coalesce, resulting in a pulse-like rhythm across the grid.</desc>
