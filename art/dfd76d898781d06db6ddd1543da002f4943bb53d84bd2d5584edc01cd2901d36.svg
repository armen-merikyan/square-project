<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone captures the clash between the fleeting brilliance of sparks and the muted residue of ash, symbolizing resilience against fragility. The palette combines warm 'compressed red' punctured by cooler tones of 'dust gray' and 'dark navy' to illustrate dynamic tension. The layout embodies a 'halo void,' with jagged interruptions in a central bright area contrasting against the cooler, darker edges. This placement highlights the emotional push and pull described by the seed, where memory and erasure, along with the battle between hunger and restraint, create a vivid yet contained atmosphere.</desc>
