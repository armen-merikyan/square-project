<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balancing Pulses</title>
  <desc id="desc">This piece embodies the tension between joy and grief through a carefully curated palette. The vibrant yellows and oranges represent joy, creating bright sparks reminiscent of laughter, while the muted purples and deep blues signify grief, bringing a somber depth. The arrangement is asymmetric, with joyous clusters on the right and grief-laden colors heavy on the left, creating a subtle imbalance that suggests emotional turmoil. The flow oscillates horizontally, representing the push and pull of these conflicting emotions, with broken pixels intermittently disrupting the symmetry, enhancing the feeling of unresolved tension.</desc>
