<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Emptiness</title>
  <desc id="desc">This artwork navigates the emotional dichotomy of panic and control through a juxtaposition of heavy, dark colors against bright accentuations. The palette draws from the 'broken memory' theme, utilizing muted sepia and tan tones for a sense of weightiness. The use of 'broken_dots' represents the control, while scattered grid patterns suggest an underlying panic. The layout implies an empty room filled with potential—highlighting the tension between stability and chaos. The diagonal flow leads the eye through the composition, while jagged edges provide a sense of fragmentation, mirroring the conflicting emotions of the seed.</desc>
