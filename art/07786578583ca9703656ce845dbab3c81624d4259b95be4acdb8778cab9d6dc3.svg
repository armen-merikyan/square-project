<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone combines a palpable yearning against imposed boundaries. The palette reflects a tension between warm colors symbolizing desire (hot coral, blood orange) and cooler tones illustrating emptiness (charcoal, hollow blue). The main collision occurs in the center, where dense, warm crosshatching interrupts the cooler, sparse 'teeth' pattern, creating both visual and emotional conflict. This interplay features broken pixels, hinting at imperfection and reinforcing the theme of restrained desire.</desc>
