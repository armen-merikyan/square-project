  <title id="title">Tension of Ascent</title>
  <desc id="desc">This artwork embodies a struggle between lightness and heaviness, mirrored in the color choices and patterns. The palette of burnt orange, dark red, charcoal, and gold reflects warmth against the depth of dread. The top-down layout evokes a falling sensation, while the stark contrast between the bright gold 'dots' of relief and the darker 'crack' patterns of dread creates tension. The symmetry vs. break motif is captured through unexpected bursts of color that interrupt the darker swaths, reminiscent of the emotional push and pull suggested in the seed.</desc>
