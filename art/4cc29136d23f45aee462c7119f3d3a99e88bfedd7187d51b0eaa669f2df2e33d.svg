<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotional Borders</title>
  <desc id="desc">This piece encapsulates the emotional tension between desire and restraint using a palette that contrasts warm saturation with muted hues. The hot coral and blood orange embody desire, appearing in dense clusters that break through the borders, while charcoal and hollow blue represent the restraint, forming a cooler, softer lattice that contains the intensity. The main collision occurs in the center with bright accents pushing against the tranquil tones, suggesting an ongoing struggle. Elements of broken pixels create intentional disruptions, mirroring the imperfections of human emotions and experiences. This abstract arrangement allows the viewer to interpret the ongoing battle between yearning and limitation without explicit representation.</desc>
