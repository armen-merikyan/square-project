<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This artwork captures the emotional tension between vulnerability and strength through a focus on exposed and protected areas. The palette, featuring soft gold and dark violet, represents hope and stability, while the use of black and pale green introduces depth and vulnerability. The main contrast happens at the center where clear blocks (strength) interrupt the pale interior (vulnerability), creating an engaging collision. The arrangement of colors suggests a flow outward from the center, symbolizing both safety and exposure, reflecting the delicate balance portrayed in the seed.</desc>
