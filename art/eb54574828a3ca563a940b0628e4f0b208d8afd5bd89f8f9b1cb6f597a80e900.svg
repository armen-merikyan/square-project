<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">This composition embodies the emotional struggle of vulnerability versus strength, using a palette that juxtaposes warm and cool tones: rose clay and lamp gold signify warmth and strength, while cool blue and distant lilac evoke vulnerability. The center of the grid, dominated by muted colors, reflects an exposed vulnerability, with the denser edges providing a sense of protective strength. The layout features a mirror-broken approach with intentional disruptions, enhancing the feeling of tension and asymmetry. The collision is most pronounced at the center, illustrating the push and pull of emotions.</desc>
