<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Collision: Overflow and Containment</title>
  <desc id="desc">This composition explores the tension between chaos and tranquility. The palette leans on deep black, vibrant red, serene pale blue, and crisp white, symbolizing rage intersecting with calm. The dominant black and red represent explosive emotions, creating a central collision point. In contrast, the soft blue and white add patches of calm that interrupt this intensity, embodying the pressures and constraints of the emotion pair. The layout of emotion A (rage) occupies the lower diagonal, while emotion B (calm) captures the upper section, creating a visual dialogue of conflict and balance.</desc>
