<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tension</title>
  <desc id="desc">The emotional tone of this artwork reflects a battle between panic and control, embodied through a color palette of red, pink, gray, and dark maroon. The use of sharp contrasts and soft backgrounds enhances this tension. The center starts with a burst of intense color, representing panic, while surrounding areas form softer, more ordered patterns that signify control. Interruption and collision are found where jagged streaks of red invade the calmer spaces, suggesting a struggle for dominance. This layout, flowing from corner to center, evokes a feeling of encroachment and chaos amid attempts to impose order.</desc>
