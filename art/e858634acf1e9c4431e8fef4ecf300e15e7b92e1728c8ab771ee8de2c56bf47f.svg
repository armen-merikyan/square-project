<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Contrast</title>
  <desc id="desc">This piece embodies the emotional duality of confusion and clarity through an interplay of sharp colors and broken lines. The palette of lime, electric blue, magenta, and black represents a vibrant clash and calmness. The arrangement contrasts densely packed colors in one corner (confusion) with a gradual fade into negative space (clarity). The dynamic flow from the corner creates a sense of movement, while irregular edges introduce subtle chaos—illustrating the tension between symmetry and disintegration, echoing the themes of noise against pulse.</desc>
