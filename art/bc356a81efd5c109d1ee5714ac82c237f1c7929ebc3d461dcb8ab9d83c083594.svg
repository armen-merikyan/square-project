<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Echoes</title>
  <desc id="desc">This work explores the tension between envy and gratitude through heavy contrasts and soft edges. The palette, a blend of burnt orange, dark red, charcoal, and gold, signifies ancient fire, reflecting the warmth of gratitude against the coldness of envy. The pattern of broken dots for envy juxtaposed with radial elements for gratitude creates a push-and-pull dynamic where the dark colors dominate the frame, but bright punctuations offer hope. The central focus—shifting from a structured flow to chaotic noise—creates an emotional turbulence that feels both centered and off-kilter.</desc>
