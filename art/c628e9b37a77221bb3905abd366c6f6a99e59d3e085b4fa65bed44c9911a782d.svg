<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Balance</title>
  <desc id="desc">This artwork explores the emotional tension between control and surrender, reflecting on the struggle of containment within overflowing emotion. The palette comprises softer tones of pale mint and soft sky, contrasted by deeper storm gray and near black hues, emphasizing the disparity between sides of the conflict. The bright accents of faded gold draw the eye towards the center, representing moments of pressure against the subdued background. The layout imitates falling pixels, which visually translates the concept of emotions descending under pressure, leaving intentional broken pixels to signify unresolved tension and cracks in surrender.</desc>
