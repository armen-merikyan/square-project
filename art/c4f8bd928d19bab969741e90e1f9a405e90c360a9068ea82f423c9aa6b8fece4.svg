<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This artwork embodies the contrast between nostalgia and progress. The top half features a maze-like arrangement, suggesting layers of memories and complexity, using a palette of deep black and electric blue that evoke wistfulness and nostalgia. In contrast, the bottom half displays a chaotic, noisy pattern in lighter neon colors (lime and magenta), illustrating the frenetic energy of progress. The collision is most prominent at the horizontal split, where nostalgic calm gives way to the chaotic pulse of advancement. This dynamic tension creates a visual narrative exploring the balance between security found in the past and the turbulence of the future.</desc>
