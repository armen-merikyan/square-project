<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Corner</title>
  <desc id="desc">This composition expresses the tension between rage and calm through the use of bold reds that spike across the grid, representing overflowing emotion, while cooler pale blues and black hues attempt to contain and offer structure. The palette creates visual dialogue where the acute contrast signifies a clash, particularly in the top corner where dense red jagged forms interrupt the quieter blue spaces below. The main collision occurs in the upper left, echoing pressure that ripples through the calm areas, reflecting the seed's thematic tension of turmoil against tranquility.</desc>
