<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Inside and Outside</title>
  <desc id="desc">This abstract piece captures the emotional dichotomy of love versus betrayal, represented by the choice of warm and cool tones juxtaposed against each other. The top half employs warm pinks and reds, embodying love's warmth and vibrancy, while the bottom half uses darker grays and dark maroon to emphasize the coldness and disillusionment associated with betrayal. The pattern is designed with crosshatching in the upper rows to symbolize the interconnectedness of love, contrasted by broken pixelation in the lower rows, hinting at the cracks that exist in relationships. This visual tension, combined with the symmetry versus imperfection, creates a push and pull that resonates with the themes of inside versus outside, inviting reflection on emotional experiences.</desc>
