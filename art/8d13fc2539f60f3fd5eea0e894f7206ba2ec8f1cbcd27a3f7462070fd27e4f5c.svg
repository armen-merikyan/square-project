<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of the Heart</title>
  <desc id="desc">This artwork embodies the emotional tension between longing and resolve, utilizing a contrasting palette of muted purple and deep blue to evoke feelings of depth and warmth against stark yellow and orange highlights. The main collision of color happens at the center, where the yearning patterns of broken frames interrupt the structured stripes of resolution. This interplay reflects the complexities of 'mirror broken' and 'contained vs overflowing'. The quiet fields help convey serenity amid urgency, creating an abstract narrative that invites introspection.</desc>
