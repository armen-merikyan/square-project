<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a struggle between expansive desire and the constraints of emptiness. The selected palette of warm tones—hot coral and blood orange—juxtaposes against cool shades like charcoal and hollow blue, illustrating the collision of feeling between vibrant desire and stark emptiness. The top half utilizes pulse marks to express fervent reach and saturation, while the bottom half, represented by a grid, embodies containment and order. The central tension manifests at the midpoint, where the colors bleed into one another, symbolizing both conflict and connection. Broken pixels introduce intentional imperfections, evoking the raw edges of desire thwarted by restraint.</desc>
