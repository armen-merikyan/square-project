<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This composition embodies the tension between joy and grief. The palette combines warm yellows and somber blues, evoking a blend of spark-like joy (yellow) and deep, fragmented grief (blue). The top half features brighter, patterned sections (representing joy) contrasted with the lower, more muted tones reflecting grief, creating instability. The zigzag and checked patterns emerge only at the edges, signifying the borderland between emotions. The broken pixels provide abstract imperfections that hint at the chaos inherent in the emotional experience, while some negative space towards the center keeps the composition from feeling too cluttered, suggesting a quiet calm amidst the turbulence.</desc>
