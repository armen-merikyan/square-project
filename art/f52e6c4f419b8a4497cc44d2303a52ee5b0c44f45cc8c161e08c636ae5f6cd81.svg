<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Embers</title>
  <desc id="desc">The emotional tone captures the tension between the warmth of sparks and the settled quiet of ash. The palette of burnt orange, dark red, charcoal, and gold reflects the ancient fire theme, where sparks symbolize energy and potential while ash represents stillness and the past. The contrast occurs diagonally from the corner, where the fiery accent colors clash with muted ash tones in a maze pattern from the left corner ghosting towards the right, interrupted by static fields of gold, suggesting a battle between memory and erasure. Broken pixels introduce visual imperfection, evoking feelings of resilience amid fragility.</desc>
