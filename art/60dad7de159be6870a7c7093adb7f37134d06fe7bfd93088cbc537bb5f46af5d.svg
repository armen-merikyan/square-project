<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Shelter</title>
  <desc id="desc">This 8x8 abstract artwork presents a tension between safety and exposure. The palette features earth tones representing shelter (warm brown, shelter green) interspersed with pale and cold hues (cold white, pale skin) symbolizing fragility and exposure. The diagonal layout enhances the sense of invasion, as warm colors emerge from a corner, introducing a bold clash with cooler tones that occupy the opposite space, creating a rhythmic push and pull. Broken pixels serve as disruptions that echo the emotional complexities of vulnerability, manifesting in a structured yet imperfect grid. This arrangement invites the viewer to explore the balance between comfort and exposure within the abstract territory.</desc>
