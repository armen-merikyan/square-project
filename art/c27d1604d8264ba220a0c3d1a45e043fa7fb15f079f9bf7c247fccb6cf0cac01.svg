  <title id="title">Eclipse of Certainty</title>
  <desc id="desc">This artwork conveys a tension between trust and suspicion through a diagonal invasion pattern. The palette, rooted in cosmic indigo and void black, reflects the awe and terror of inner conflicts. The dominant dark colors symbolize suspicion while the soft, glowing tones of deep teal and star white offer a hint of trust and hope. The collision primarily occurs in the center, where lighter colors attempt to break through a boundary of darker hues, illustrating resilience against fragility. Imperfections and broken pixels disrupt the flow, suggesting the inherent uncertainty in human emotions.</desc>
