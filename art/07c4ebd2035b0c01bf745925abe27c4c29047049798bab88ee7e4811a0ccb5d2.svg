<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The composition embodies the emotional tension between desire and restraint through saturated warm reds and muted grays. The dark reds evoke a strong pull indicative of desire, while the subtle creams symbolize the coldness of restraint. The layout shows a grid where desire permeates the center with crossing threads while at the edges deep muted colors lock in negative space, creating a trapped feeling. This collision occurs predominantly in the center, suggesting the conflict’s heart rather than a clear resolution, reflecting the spiral pressure mentioned in the seed.</desc>
