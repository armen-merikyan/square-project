<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This composition portrays the emotional contrast between envy and gratitude, using a palette of vibrant electric blue, lime green, and deep magenta, against a backdrop of stark black. The top half features a structured zigzag pattern reflecting the clean lines associated with gratitude, while the lower half breaks into irregular dots, embodying the chaos and disarray of envy—creating a balance between order and chaos. The diagonal flow suggests a climbing escape: hope rising against the weight of emotion. The inclusion of broken pixels introduces imperfections, enhancing the narrative of struggle and transition, showcasing the tension between lightness and weight, and serenity mixed with noise.</desc>
