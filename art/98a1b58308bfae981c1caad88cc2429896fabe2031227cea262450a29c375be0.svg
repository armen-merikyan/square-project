  <title id="title">Tension of Duality</title>
  <desc id="desc">This composition captures the emotional tone of conflict between vulnerability and strength. The soft palette of pale mint and soft sky represents vulnerability, while the storm gray and near-black denote strength. A broken frame feeling emerges from the layout that accentuates contrast, with dense dark edges encapsulating a softer center, simulating an ongoing tension between exposure and shelter. The main collision lies at the diagonal edges, where strong colors crash against serene hues, evoking a sense of instability and emotional undercurrent.</desc>
