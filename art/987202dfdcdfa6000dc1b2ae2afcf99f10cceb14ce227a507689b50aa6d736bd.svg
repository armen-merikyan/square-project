<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Symmetry</title>
  <desc id="desc">This piece embodies the emotional tension of restlessness against peace, represented by a palette that oscillates between warm ivories, deep wines, and cool grays. The layout, inspired by 'eroded symmetry', highlights a central collision of peace (represented by warm ivory) surrounded by restless accents (deep wine and stain brown). The intentional use of broken pixels introduces disruptions that symbolize fleeting emotions and fragmented memories, while maintaining a sense of balance through quiet areas of soft gold. The contrasting textures of dots (restlessness) and stairs (peace) merge to produce a dynamic visual narrative that captures the struggle between chaos and calm.</desc>
