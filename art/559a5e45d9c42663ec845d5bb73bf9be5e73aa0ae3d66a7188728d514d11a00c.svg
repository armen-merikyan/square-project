<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This composition embodies the emotional duality of restlessness and peace. Through a palette of soft bone white and earthy moss green juxtaposed against vibrant rust and small gold, it captures the tension between a quiet field and stuttered line dynamics. The diagonal layout creates an argument where the calming maze-like patterns of peace in the top-left wedge contrast sharply with the stacked, restless chaos in the bottom-right. Broken pixels disrupt the flow, symbolizing the 'flame against shatter', while leaving negative space enhances the sense of whispering tranquility amidst chaos.</desc>
