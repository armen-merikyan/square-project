<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rising Tension</title>
  <desc id="desc">This composition explores the emotional duality of joy and grief, channeling a contrast between bright, expansive colors and deep, muted tones. The top half features warm tones (yellows and oranges) that evoke joy, using a ring pattern to create a sense of movement and expansion. The bottom half transitions to cool, heavy blues and muted purples, arranged in a teeth-like pattern that suggests tension and grief. The zigzag flow accentuates the push-pull between rising signals of joy and the weight of grief, creating a dynamic yet unresolved emotional landscape. The edge style leans heavier on the right, reflecting an imbalance that speaks to the complexity of the dual experience, allowing specific areas of negative space to breathe within the density of the color clusters.</desc>
