<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The artwork explores the emotional dichotomy of vulnerability and strength. I used a palette of green, warm brown, pale skin, cold white, and open blue to create an interplay between safety and exposure. The lush green and warm brown symbolize strength and grounding, while the pale skin, cold white, and open blue express vulnerability and an unshielded atmosphere. The central region is more saturated and dense, embodying strength, while the periphery offers space, representing vulnerability. Main contrast arises where the dense colors collide with lighter shades, creating tension that hints at both exposure and protection.</desc>
