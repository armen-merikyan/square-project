<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This artwork explores the emotional tension between safety and exposure. The palette of shelter green and warm brown creates a warm, protective sensation, contrasted by the cold white and open blue that evoke feelings of vulnerability and exposure. The patterns interact where the barcode resistance of safety meets the ladder-like ascension of exposure, forming a striking contrast at the diagonal center. Sparse areas ensure that the piece breathes, aligning with the concept of negative space, allowing the 'safety' color to dominate while hinting at the underlying 'exposed' essence.</desc>
