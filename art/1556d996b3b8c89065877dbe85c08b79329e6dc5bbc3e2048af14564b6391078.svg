<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork explores the emotional tension between safety and exposure through a stark contrast between warm, soft colors representing safety and cooler tones symbolizing vulnerability. The top half of the grid embraces a broken frame pattern in greens and soft browns, evoking a sense of gentle shelter, while the lower half reflects a more open structure with pale skin and open blue tones, characterizing exposed fragility. The central collision lies in the middle row where both emotions clash, creating a visual balance yet emphasizing the push and pull of these contrasting feelings. Broken pixels are strategically placed to represent disruptions in both safety and exposure, simulating emotional scars and vulnerabilities.</desc>
