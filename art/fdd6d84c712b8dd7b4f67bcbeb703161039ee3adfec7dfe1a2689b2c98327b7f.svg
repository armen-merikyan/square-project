<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">This composition conveys the emotional tension between fear and hope, where the palette of deep blacks and dark violets embodies the oppressive weight of fear, contrasted sharply by the soft gold and pale greens representing the flickers of hope. The zigzag pattern suggests a rising signal amidst a rain of broken dots, creating a dynamic flow while leaving intentional negative space to evoke a feeling of isolation. The sharp vs. soft edges create a visual collision, reinforcing the theme of pressure against a center of quiet resilience.</desc>
