<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">The artwork explores the emotional dichotomy of longing and resolve through the interplay of soft, muted tones and sharp, vivid accents. The palette, drawn from 'resilience_fragility', uses moss green and bone white to evoke the softness of yearning, while rust and small gold introduce contrasting urgency and strength. The dominant quiet field creates a sense of serenity, interrupted by the boldness of resolve. The collision occurs centrally, as the ring patterns of resolve intersect with the constellation-like formations of longing, creating a visual dialogue of connection and disconnection, reflecting the seed's themes of repair and damage.</desc>
