<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition explores the theme of vulnerability juxtaposed with strength. The central area is painted with the pale hue of cream to signify exposure, while deep olive and ripe green delineate the edges, providing a sense of shelter around this vulnerability. The contrast between heavy hues and lighter tones creates a flickering effect that draws the eye to the center. The arrangement includes broken dots and hinge patterns that briefly collide, suggesting the constant tension between protection and exposure. The broken pixels act as intentional disruptions, contributing to the themes of imperfections that exist within strength, while still leaving enough negative space to allow for breath and distance. Overall, this piece encapsulates the delicate balance between vulnerability and strength, resonating deeply with the emotional tones laid out in the seed.</desc>
