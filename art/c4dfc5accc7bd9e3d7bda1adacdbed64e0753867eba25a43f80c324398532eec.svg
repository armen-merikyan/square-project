<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissonance of Emotions</title>
  <desc id="desc">This piece embodies the tension between longing and resolve, reflecting an emotional journey. The palette of soft powder pink, warm white, sharp crimson, and dark tones represents a push-pull dynamic: warmth against the shadows of uncertainty. The 'flood' and 'dots' patterns collide—flooding the lower half with color to suggest constrained growth, while dispersed dots above imply the fragility of hope. The lower density balances with a flicker of bright crimson, marking a surge of feeling in a dominant lower third, creating a narrative of struggle between emptiness and a desire for connection. The broken pixels add intentional imperfections, echoing the theme of emotional scar tissue, enhancing the overall abstract story.</desc>
