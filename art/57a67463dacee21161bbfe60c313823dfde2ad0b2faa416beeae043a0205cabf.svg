<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Fragments</title>
  <desc id="desc">This piece juxtaposes the warm tones of love against the sharper, muted shades of betrayal to create an emotional tension. The palette leans on reds and pinks representing love, contrasted by deep grays symbolizing betrayal. The arrangement allows for a 'rising signal,' with warm colors climbing upwards against a backdrop of rich, dark negatives, creating a visual echo of hope amidst distress. The diagonal flow in color placement suggests a crack, as if the love is attempting to break through a dense void, mirroring the seed's essence of conflict between harmony and chaos.</desc>
