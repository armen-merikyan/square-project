<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This artwork embodies the emotional duality of spark and ash, representing transient energy against lingering memory. The palette utilizes warm yellows and oranges for the sparks, juxtaposed with muted purples and deep blue to evoke ash and restraint. The central collision features bright accents at the core, generating a radiant buzz that contrasts with darker, more muted edges. A cross-current layout amplifies the tension of the dynamic patterns, where negative space introduces an essential calm against dense markings, suggesting a struggle between vitality and erosion.</desc>
