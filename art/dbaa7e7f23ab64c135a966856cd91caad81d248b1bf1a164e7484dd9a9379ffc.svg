<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork captures the emotional tension between desire and emptiness through a palette that oscillates between warm saturation and cool neutral tones. The main collision occurs diagonally from the bottom left corner, where the deep warmth of hot coral and blood orange suggests an intense yearning, while the muted shades of charcoal and hollow blue create a sense of containment and quiet pressure. The broken pixels introduce intentional disruption, forming an echo of imperfection that fits the theme of restraint amidst overflow. The overall pattern progresses from warmth to subdued tones, embodying the tension of longing constrained by boundaries.</desc>
