<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Symmetry</title>
  <desc id="desc">The emotional tone is a delicate balance between love and betrayal, represented through a palette of warm reds and cooler grays. The contrast arises from the symmetrical arrangement of warm colors on one side, shifting to cooler, desaturated tones that evoke feelings of abandonment and sadness. The arrangement flows diagonally to signify rising tension, while vertical displacement implies a fall from grace. The jagged edges introduce a sense of brokenness, as if pieces of a heart are scattered throughout. The broken pixels emphasize the imperfection intrinsic to love, leading to moments of unease amid the warmer hues. This composition encapsulates the conflict between the warmth of love and the chill of betrayal, resulting in a visual representation of emotional tension.</desc>
