<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Boundless Tension</title>
  <desc id="desc">The emotional tone embodies a struggle between control and surrender, manifesting as dense pressure against soft yielding. The palette of sepia, tan, dust gray, and faded blue evokes a sense of memory and transition, with muted colors creating a sense of calm amidst chaos. The main collision occurs in the center, where dense marks of sepia collide with quiet blues and grays, suggesting emotional overflow. The patterns of control manifest as structured blocks strengthened by the shadowed edges, while the surrender emerges radially, offering a release toward the corners. This juxtaposition of styles conveys complex feelings of tension and eventual unwinding.</desc>
