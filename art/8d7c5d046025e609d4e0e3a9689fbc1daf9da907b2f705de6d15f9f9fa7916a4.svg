<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">This composition expresses the tension between longing and resolve, using a muted color palette with sepia, tan, dust gray, and faded blue to represent nostalgia and warmth blending with a sense of urgency. The main collision occurs centrally, where warmer tones bleed into cooler shades, creating an echo of emotions that interact and interrupt one another. The use of broken pixels introduces imperfections, embodying the theme of repair versus damage, while maintaining sufficient negative space to convey a silent undercurrent of serenity. This abstract pattern captures the essence of emotional struggle and resolution without representing any literal concepts.</desc>
