<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Space</title>
  <desc id="desc">The emotional tone captures the struggle between desire and restraint, illustrated by warm, saturated colors clashing against cooler, muted tones to symbolize the push and pull of conflicting emotions. The palette of red oxide, blackened plum, and muted cream establishes a dance between heat and containment, with bright accents against darker fields to represent bursts of desire trying to break through restraint. The grid structure accommodates a central pressure point, where warm colors collide, creating a focal disruption amid the negative space, enhancing the feeling of tension and unresolved struggle.</desc>
