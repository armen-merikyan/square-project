<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erosion of Affection</title>
  <desc id="desc">The emotional tone suggests a narrative of conflict and intensity, reflecting love's warmth against betrayal's harshness. The chosen palette of pink, red, gray, and dark maroon denotes warmth and tension, indicative of love's allure versus betrayal's chill. The main collisions of color arise where vibrant pinks and reds intersect with darker maroons and grays, evoking the struggle between contrasting emotions. The layout of falling pixels introduces a sense of descent, mirroring the emotional decline from love to betrayal, while broken edges create an imperfection that resonates with the heart's fracturing. The pattern blends stripes (representing love) with subtle flames (representing betrayal), enhancing the chaotic flow and emphasizing the instability between the two feelings.</desc>
