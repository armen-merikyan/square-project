<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Horizons</title>
  <desc id="desc">This piece embodies the emotional tension between fear and hope, achieved through a stark black and violet palette representing the uncertainty and shadows of fear, contrasted with pale green and soft gold which symbolize light and optimism. The left side of the artwork reflects fear with jagged patterns, primarily using darker colors that create a dense, oppressive feeling, while the right side transitions to softer textures and colors, allowing more negative space that evokes a sense of liberation. The composition reflects an upward flow; as it moves rightward, there is a zigzag pattern of interaction between the sharp edges of fear and the gentle curves of hope, creating a whisper of connection despite tension. Broken pixels are interspersed to suggest imperfection and unpredictability, and the overall movement suggests a journey from chaos to clarity.</desc>
