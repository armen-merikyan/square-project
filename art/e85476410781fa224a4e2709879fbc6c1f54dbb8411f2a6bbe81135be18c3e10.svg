  <title id="title">Tension of Containment</title>
  <desc id="desc">This artwork explores the emotional dichotomy of desire and restraint. The warm, saturated tones represent the pulsating energy of desire, while the muted greys provide a sense of containment and restraint. The contrast is centered around the fourth and fifth rows, where bright colors collide with quieter shades, illustrating the emotional struggle. The use of broken pixels symbolizes imperfections and interruptions in this tension, allowing the viewer to feel the push and pull between these opposing forces.</desc>
