<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Pulses</title>
  <desc id="desc">This artwork evokes the emotional tension between clarity and interference through a palette that balances dark tones with bright accents. The navy and black represent noise and static, while the dim cyan serves as a faint signal among the clutter. The bright white edges symbolize clarity attempting to emerge from the chaos, creating a central collision point where a clean pulse of light disrupts the surrounding dark fields. The stepwell pattern adds rhythmic depth, highlighting the struggle between dominant and subdued elements, reminiscent of memory vs. erasure.</desc>
