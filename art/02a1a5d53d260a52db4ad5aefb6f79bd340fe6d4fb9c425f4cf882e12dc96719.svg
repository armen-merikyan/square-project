<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This composition embodies the emotional tension between 'emptiness' and 'desire'. The chosen palette of hot coral, blood orange, and dust pink evokes warmth and passion, suggesting desire, while charcoal and hollow blue introduce a sense of distance and emptiness. The central collision occurs where the warm, rippling patterns of desire meet the subdued, split-screen structure of emptiness, highlighted by broken pixels that symbolize interruptions in this emotional narrative. The quiet channel layout creates a stark contrast against vibrant saturation, encapsulating the struggle between a pull towards fulfillment and the barriers that contain it.</desc>
