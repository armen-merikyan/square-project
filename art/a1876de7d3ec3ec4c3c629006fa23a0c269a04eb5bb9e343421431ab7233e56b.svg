<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Whispers of Trust and Doubt</title>
  <desc id="desc">This piece captures the emotional tension between trust and suspicion through a carefully chosen palette of soft and muted hues. The contrast embodies a scattered repair where dark slivers and soft glows play against each other across the canvas, reflecting the struggle between reassurance and unease. The layout suggests a diagonal fall that reinforces the pressure at the border, hinting at vulnerability amidst resilience. The broken pixels serve as intentional disruptions that signify unresolved feelings, while the contrasting patterns of checker and quiet field visually collide and interrupt, enhancing the emotional depth.</desc>
