<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall</title>
  <desc id="desc">This piece captures the emotional tug-of-war between joy and grief. The left side, embodying joy, bursts with bright spark-like yellows and oranges, creating a feeling of elevation and warmth. The right side flows with heavy blue tones of grief, represented through darker stripes that evoke a sense of weight and introspection. The contrast creates a dynamic tension, as zigzag patterns on the left gesture towards ascendance, while the darker edges symbolize the burned, jagged paths of sorrow. The broken pixels introduce a sense of imperfection, echoing the reality of emotional experiences, while the negative space allows for breathing room amidst the emotional density.</desc>
