<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece embodies the emotional tension of desire and restraint. The palette of deep reds and muted creams reflects the heated pull of longing against the cold barriers of constraint. The layout follows a spiral pressure, emphasizing a build-up towards a conflicting center where deep hues collide with lighter tones. The use of broken pixels represents the imperfections of desire and moments of betrayal within the structure, while leaving intentional negative space to allow the colors to breathe and resonate. The main contrast occurs at the center where saturated colors meet muted shades, creating a visual dialogue of struggle.</desc>
