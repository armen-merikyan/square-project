<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Halo of Fractured Balance</title>
  <desc id="desc">This piece portrays the emotional tension between fleeting sparks of energy and the heaviness of ash, embodying resilience and fragility. The palette combines earthy moss green, bone white, rust, stone gray, and small gold to reflect both comfort and conflict. The interaction of static (spark) in the central white area colliding with jagged edges of muted tones (ash) creates a dynamic narrative of struggle and quiet strength. The halo structure amplifies this tension, with the light center fighting against heavier shadows, representing an ongoing battle between memory and erasure.</desc>
