<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This composition embodies the emotional duality of love and betrayal through a sharp contrast between warm, inviting colors and cool, oppressive tones. The top half uses warm hues (pink and red) to represent love, while the lower half employs darker shades (dark maroon, gray) to evoke feelings of betrayal. The clash occurs in the center with an echo of the contrasting colors, creating a subtle tension that reflects the seed's story of conflict. The use of broken pixels introduces a sense of imperfection, suggestive of the 'crack' and 'burned edges' from the seed phrases, reinforcing the layered complexity of emotional experiences.</desc>
