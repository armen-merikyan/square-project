<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Two Forces</title>
  <desc id="desc">This artwork embodies the emotional struggle between control and surrender, using a palette that reflects heaviness and renewal. The darker tones reflect containment and pressure, while the softer colors symbolize release and openness. The main contrast occurs in the center, where tightly packed dark colors meet lighter hues, illustrating the collision of these two emotional states. Broken pixels introduce imperfections, enhancing the narrative of disruption inherent in the push-and-pull dynamic. The diagonal layout symbolizes the ongoing struggle, with passion in one wedge and softness in the other, echoing the complexity of emotional experiences.</desc>
