  <title id="title">Dynamic Equilibrium</title>
  <desc id="desc">The artwork explores the interplay between vulnerability and strength, visualized through color density and pattern dynamics. The palette of warm shadow, cool blue, and lamp gold expresses intimate yet distant emotions, creating tension and resonance. The dense center symbolizes strength while the muted borders suggest vulnerability. The collision occurs at the center, where the glitch pattern swells against the halo, interrupted by broken pixels that evoke imperfections and echoes of the emotional struggle.</desc>
