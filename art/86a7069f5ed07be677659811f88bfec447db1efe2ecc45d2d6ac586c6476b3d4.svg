<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone embodies the tension between desire and restraint. The warm, saturated colors like hot coral and blood orange reflect the intensity of longing and desire, while the muted shades of charcoal and hollow blue symbolize restraint and containment. The main collision occurs at the center, where fiery hues meet the cooler tones, creating a juxtaposition that embodies struggle and yearning. The chosen palette emphasizes this emotional interplay, while the 'island and sea' layout allows for a dense cluster of desires surrounded by more muted, quiet spaces, reinforcing the theme of restrained ambition.</desc>
