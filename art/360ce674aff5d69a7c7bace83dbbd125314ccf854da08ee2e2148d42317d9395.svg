<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This artwork embodies the duality of confusion and clarity through contrasting color patterns and textures. The palette combines burnt orange and dark red with charcoal and gold, creating a warm, ancient fire aesthetic. The left side invokes confusion through crosshatch patterns, signifying chaos and overlapping paths, while the right side reflects clarity with framed stability. The central pixel arrangement suggests a flow from the chaotic edges inward, interrupted by 'broken pixels' that serve as a reminder of imperfection in symmetry. This juxtaposition leads to a sensory collision, with dark shades encroaching on lighter areas, expressing the tension between pressure and tranquility, while ensuring negative space invites contemplation.</desc>
