<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Time</title>
  <desc id="desc">The emotional tone of this piece reflects the push-and-pull between nostalgia and progress. The palette, inspired by 'ancient_fire', uses burnt orange and dark red to evoke warmth and memory, contrasted with charcoal to represent the weight of progress. The rows are structured with a split horizontal layout that juxtaposes the heaviness of nostalgic tones above with brighter tones below, arranging colors in a way that suggests an unsettling calm giving way to stirring energy. Broken pixels add imperfection, reinforcing the idea of unresolved tension.</desc>
