<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality in Motion</title>
  <desc id="desc">The emotional tone juxtaposes the heaviness of grief with the lightness of joy. The palette blends cheerful yellows and oranges with muted purples and deep blues, representing the spectrum of feelings. The main collision arises where the bright colors and dark backgrounds intersect, symbolizing the battle between joy and grief. The layout imitates falling rain, giving a motion toward the bottom, and the ‘stair-step’ pattern introduces a visual echo of rising and falling emotions, while broken pixels enhance the sense of imperfection, mirroring fragmented feelings.</desc>
