<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This artwork embodies the tension between vitality and decay, represented through a bold interplay of colors and patterns. The choice of 'signal_green' and 'hot_magenta' reflects the vivacity of 'spark', while 'dead_black' and 'static_gray' evoke the quiet despair of 'ash'. The contrasting patterns—'broken_dots' for spark and 'split_screen' for ash—collide in the center, illustrating a dynamic clash between energy and residue. The layout, a narrow channel of negative space created by layered density and jagged edges, encapsulates the duality of hunger versus restraint, with intermittent bursts of color signifying sparks of life amid the more muted backgrounds. The overall movement flows diagonally, reinforcing the narrative of resilience against fragility, while maintaining a balance that invites reflection on memory vs erasure.</desc>
