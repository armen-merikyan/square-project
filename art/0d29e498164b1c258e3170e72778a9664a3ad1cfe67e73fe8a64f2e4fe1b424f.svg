<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork captures the emotional tension between emptiness and desire. The palette features warm tones like hot coral and blood orange that represent desire, clashing against the cooler, muted tones of hollow blue and charcoal symbolizing restraint. The corner invasion layout allows the vibrant, saturated colors to dominate the top left corner, signaling a strong pull of desire that gradually clashes with the quieter emptiness. The broken pixels introduce intentional disruptions—marks of struggle and imperfection—creating a dynamic visual rhythm that reflects the push and pull of these opposing forces.</desc>
