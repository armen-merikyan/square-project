<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interference Pulse</title>
  <desc id="desc">The emotional tone encapsulates the struggle between clarity (signal) and distortion (noise). The palette, featuring deep navy and bright white, reflects this contrast: navy embodies the overwhelming static while white serves as a fleeting signal of clarity. The bottom half of the grid dwells in muted tones suggesting noise, while the top half features brighter accents representing moments of clarity. The main collision between these two emotional states happens along the center dividing line, allowing the viewer to feel the intrinsic conflict of noise outlined against clearer spaces. The layout's horizontal split enhances this conflict, signaling a struggle for dominance with broken pixels interrupting the perceived clarity, much like brief flashes of insight amidst chaos.</desc>
