<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Doubt</title>
  <desc id="desc">This composition embodies the emotional tension between trust and suspicion through a duality of color and texture. The navy and black evoke deep suspicion with a cold, enclosing feel, while the dim cyan acts as a softer glow, suggesting trust and warmth. The staggered patterns representing stairs create a dual flow—one towards upward movement (trust) and one sloping downward (suspicion), colliding prominently in the center. The use of broken pixels introduces intentional disruptions, enhancing the sense of fragile resilience within the structure. The overall aesthetic remains abstract, focused on emotional expression rather than literal representation.</desc>
