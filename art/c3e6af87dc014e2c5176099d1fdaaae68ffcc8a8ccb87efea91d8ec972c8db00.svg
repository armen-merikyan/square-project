<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">This abstract artwork encapsulates the emotional dance between rage and calm. The palette features bold reds representing rage contrasted with softer pale blues indicative of calm. The color placement creates a collision at the top left corner, where the warm red tones pulse outwards, attempting to overflow, while the cooler shades spread horizontally, echoing calm. Broken pixels are intentionally integrated to evoke a sense of disruption, resonating with the theme of eroded symmetry. The flow zigzags, emphasizing the push and pull between contained and overflowing emotions, crafting a visual narrative of tension.</desc>
