<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tension between emptiness and desire is illustrated through contrasting saturated and muted colors. The palette includes warm and cool tones to embody desire ('hot coral', 'blood orange') against the quieter, hollow tones of emptiness ('charcoal', 'hollow blue'). The echo pattern signifies the pulsating nature of desire, while the crack pattern represents the interruption of emptiness. The main collision occurs towards the off-center edge, with saturated colors colliding against muted backgrounds, evoking a sense of locked potential and unfulfilled longing.</desc>
