<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Containment and Release</title>
  <desc id="desc">This artwork embodies the emotional tension between control and surrender, using a palette that balances muted earth tones with cool accents. The main collision occurs in the center with a cluster of warmer shades, radiating outward into cooler hues, suggesting a release of pressure. The channels symbolize a contained flow while the rain pattern introduces a stuttering descent, capturing the essence of tension and the release that follows. The broken pixels disrupt the expected patterns, embodying moments of imperfection and emotional scars.</desc>
