  <title id="title">Collision of Motion and Stillness</title>
  <desc id="desc">The artwork captures the tension between peace and restlessness through a juxtaposition of calming and chaotic patterns. The color palette, blending clean white with icy blue and deep ink black, reflects intervals of tranquility interspersed with sharp urgency. The predominant use of larger white spaces suggests peaceful intervals, while the darker, braided lines of ink black symbolize restless motion, creating an unsettling yet captivating visual rhythm. This collision mainly occurs in the center, representing the core of the emotional conflict.</desc>
