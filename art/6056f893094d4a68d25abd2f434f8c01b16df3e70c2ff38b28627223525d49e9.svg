<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Presence and Absence</title>
  <desc id="desc">The emotional tone shifts from a vibrant core of gratitude in the center to the muted, uncertain edges symbolizing envy and fear. The palette of yellow, orange, deep blue, and muted purple accentuates this tension, with warm yellows contrasting against the cooler purples to create a dialogue between joy (gratitude) and uncertainty (envy). The collision of these colors occurs at the center, where bright dots of gratitude disrupt the softer frames of envy at the edges, illustrating the emotional push and pull that exists between these feelings in an empty room where echoes of past emotions linger.</desc>
