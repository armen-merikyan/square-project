<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This artwork encapsulates the struggle between joy and grief through color contrast and a fragmented layout. The palette blends deep blues and muted purples to represent grief alongside vibrant yellows and oranges illustrating joy. The color collision occurs in the central horizontal split, establishing a tension between the dark, heavy tones below and the light, spark-like colors above. This split evokes a wave-like rhythm—suggesting uplift yet framed with a thin outline to reinforce separation. The broken pixel technique introduces a sense of imperfection, symbolizing the unpredictability of emotions. Overall, the composition radiates a sense of momentary escape from heaviness into lightness, reflecting on the emotional waves of life.</desc>
