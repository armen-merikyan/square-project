<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece explores the tension between desire and emptiness, using a color palette that emphasizes saturation and contrast. The engaging interplay of warm hues (#FF6F61, #FF4500, #D5B29A) against muted tones (#4B4B4B, #A8D8E6) creates a dynamic visual narrative. The main collision occurs in the center, where bright colors vie for attention against a backdrop of quiet, darker shades, suggesting both the pull of desire and the void of restraint. The chosen patterns of 'islands' and 'teeth' reflect the structure of suppressed longing and occasional bursts of vibrancy.</desc>
