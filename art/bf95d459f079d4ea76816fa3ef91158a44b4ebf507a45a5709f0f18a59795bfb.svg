<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone weaves between joy and grief, capturing the duality through the use of colors. The palette of vibrant yellow and orange symbolizes joy, contrasting against the muted purples and deep blue representing grief. The interplay of colors follows an upward flow on one side, with zigzag patterns interspersing fragments of burning edges, suggesting the chaos and order within emotions. The main collision lies in the transition between bright yellows and deep blues, creating tension and balance that reflects the seed’s emotional schism, while broken pixels evoke imperfection in both joy and grief. This results in an abstract representation of rising signals against a backdrop of chaos and order.</desc>
