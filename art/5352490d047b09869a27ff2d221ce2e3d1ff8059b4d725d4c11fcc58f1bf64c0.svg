<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This composition reflects the tension between awe and terror through an interplay of dark and light colors, mirroring a sense of order against chaos. The top four rows, representing awe, utilize soft gold and pale green for a radiant feeling, contrasted with the bottom four rows of broken violet shades to evoke terror, punctuated by broken pixels that suggest memory and instability. The vertical wave flow implies movement, while maintaining negative space for a sense of breath in the density of the arrangement.</desc>
