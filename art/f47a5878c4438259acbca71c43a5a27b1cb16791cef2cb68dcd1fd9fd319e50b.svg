<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Torn Reflections</title>
  <desc id="desc">This abstract piece explores the emotional tension between love and betrayal, using a palette that merges warm pink and deep maroon with neutral gray for depth. The layout suggests symmetry disrupted by broken pixels to embody betrayal. The warm hues of pink signify love's comfort, while sharp contrasts and soft edges reflect the confusion and heartbreak of betrayal. The crosshatch pattern embodies connection being interrupted, while the diagonal rise creates a sense of movement—a push and pull between emotions. Negative space represents the emptiness left by betrayal, allowing the viewer to feel both the warmth of love and the coldness of disruption.</desc>
