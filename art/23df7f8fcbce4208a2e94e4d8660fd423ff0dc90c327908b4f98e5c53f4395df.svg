<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone of defiance versus submission is represented through a clash of structured pieces and chaotic movements. The palette, named 'quiet_pressure,' utilizes muted off-white and faint peach for softness and right-angle frames of dark navy for angular resistance, introducing an echo of tension. The main collision occurs diagonally across the center, where the ladder and rain patterns intersect, creating dynamic tension. Broken pixels serve as deliberate imperfections that amplify the emotional undercurrents of conflict between order and chaos, while ensuring that at least 10% of the square is left as negative space, allowing for an open field of contemplation amidst the tension.</desc>
