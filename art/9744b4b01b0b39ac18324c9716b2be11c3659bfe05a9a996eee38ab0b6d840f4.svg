<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This piece embodies the emotional tension between trust and suspicion as it displays a clear division while also suggesting integration. The moss green and bone white are chosen to represent resilience and clarity, while rust and stone gray introduce depth and a hint of fragility. The strong contrast of darker hues against lighter shades symbolizes the conflict between trust (light) and suspicion (dark). The main collision occurs diagonally, where the trust (mirrored patterns) disrupts suspicion (hinged patterns). The broken pixel elements subtly interrupt the flow, echoing the imperfections in communication. Overall, the artwork reflects an abstract journey through this emotional landscape.</desc>
