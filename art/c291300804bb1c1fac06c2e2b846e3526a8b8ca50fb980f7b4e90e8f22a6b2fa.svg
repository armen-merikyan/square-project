  <title id="title">Fractured Harmony</title>
  <desc id="desc">This artwork embodies a tension between the emotional contrasts of loneliness and connection, represented through sharp vs. soft edges. The palette of yellow, orange, deep blue, and muted purple gives voice to the duality of joy and grief. The main collision of emotion occurs at the center, where the bright yellow and deep blue create a striking contrast, framing the quieter, muted edges that suggest solitude. The jagged edges highlight feelings of pressure and interruption, while the carefully placed negative space allows for moments of quiet reflection.</desc>
