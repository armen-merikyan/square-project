<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry Disrupted</title>
  <desc id="desc">This composition explores the tension between control and surrender, with a dominant dark panel representing control while lighter colors signify a gentle surrender. The stark contrast between the dark navy and muted cyan creates a visual interruption, echoing the emotional struggle between holding on and letting go. The layout mimics a split vertically, emphasizing the clash of emotions. Broken pixel elements are introduced to enhance the sense of imperfection and disruption, capturing the essence of struggle. The choice of colors balances warmth and depth, drawing on the lonely signal concept of isolation amid chaos.</desc>
