<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Emotion</title>
  <desc id="desc">This artwork embodies the conflict between joy and grief through contrasting color patterns. The left side uses sharp, fragmented pixel placements in muted purples and deep blues to evoke feelings of grief, heavy and enclosed. The right side bursts with overlapping rain-like patterns of vibrant yellows and oranges, representing joy in open forms. The interplay between these two halves creates a dynamic balance, with jagged edges suggesting tension and resolution, while maintaining enough negative space to symbolize unresolved feelings.</desc>
