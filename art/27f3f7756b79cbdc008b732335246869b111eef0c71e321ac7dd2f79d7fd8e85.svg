<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork embodies the emotional struggle between emptiness and desire, using a color palette that juxtaposes warm, saturated hues of coral and orange representing desire against the muted, soft tones of charcoal and hollow blue symbolizing emptiness. The rising_signal layout guides the viewer's eye upward, suggesting hope and escape, while the disruptions from broken pixels create tension within the ordered placement. The pattern types—stepwell for desire and tide for emptiness—collide in a spiraling motion, echoing the conflict between overwhelming desire and the restrictive borders of emptiness. The main contrast occurs between the vibrant center and the subdued edges, creating a visual representation of this emotional push and pull.</desc>
