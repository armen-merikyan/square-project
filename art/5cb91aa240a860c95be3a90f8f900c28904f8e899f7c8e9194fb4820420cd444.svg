<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Centering Emotion</title>
  <desc id="desc">The emotional tone explores the duality of joy and grief, embodied through color contrasts. The palette of bright yellows and oranges represents joy, while deep blues and muted purples evoke grief. This contrasting interplay creates a central tension where the brighter colors radiate outward, symbolizing joy's attempt to penetrate the layers of grief. The composition features a zigzag flow with hard edges to emphasize the collision between these feelings, while the layout allows for a protected center surrounded by chaotic patterns, enhancing the narrative of protection versus vulnerability. The placement of broken pixels adds imperfection, adhering to the seed's narrative of emotional complexity. Negative space is preserved to breathe life into the piece, reflecting moments of calm amidst emotional turmoil.</desc>
