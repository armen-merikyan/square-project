<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Calm and Fury</title>
  <desc id="desc">This composition embodies the conflict between 'rage' and 'calm' through sharp contrasts in color and texture. The black and red hues represent the intensity of rage, while pale blue and white denote calmness. The layout features asymmetrical patterns where jagged red pixels interrupt smooth blue zones, embodying emotional collision. The spiral flow draws the eye inward, suggesting an underlying tension throughout the piece, portraying a mix of chaos and serenity as echoed in the seed's duality of emotions.</desc>
