<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">This abstract composition embodies the emotional tension between trust and suspicion. The chosen palette of 'mourning_renewal' suggests a delicate balance between dark, muted tones and the bright, hopeful emergence of new growth. The contrast of deep blacks and blues against pale yellows creates a striking collision, emphasizing the division between stability and unpredictability. This is visually represented through a split vertical layout where one side features a clean maze pattern symbolizing trust, while the other spikes with chaotic sparks, indicating suspicion. The edge style reflects brokenness, creating a metaphor for cracks in perception and resilience. The composition invites you to navigate the emotional landscape, with a gentle pulse suggesting an unresolved dynamic.</desc>
