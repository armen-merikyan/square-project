<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality in Motion</title>
  <desc id="desc">This piece embodies the emotional tension between joy and grief through a vibrant palette of warm yellows and oranges juxtaposed against deep blues and muted purples, suggesting a struggle between light and heaviness. The layout reflects an invasion from the corner, where brighter colors rise as flames against the calmer, darker background. The contrast is shown where the warmth of the yellows cuts into the cold, muted purples and deep blues, creating a wave of emotional collision. The broken pixel elements infuse a sense of imperfection, reinforcing the concept of hidden vs. exposed emotions.</desc>
