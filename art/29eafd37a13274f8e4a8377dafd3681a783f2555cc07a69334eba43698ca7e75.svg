<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Old and New</title>
  <desc id="desc">This artwork embodies the emotional tension between fear and hope through contrasting placements of dark and bright colors. The palette reflects deep purple and black to symbolize fear, while soft gold and pale green represent hope. The pattern starts from the bottom left, depicting fear's jagged advance as it rises sharply, creating a zigzag movement that interrupts the soft flow of hope's target-like shapes. The breakup of darker colors with small spots of lighter ones represents the struggle between bleakness and optimism, evoking a sense of conflict yet potential for resolution.</desc>
