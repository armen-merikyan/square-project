<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Forces</title>
  <desc id="desc">The emotional tone explores the dynamic confrontation between desire and restraint. A saturated palette of rich reds and muted creams creates an intensity that signals urgency alongside the weight of restraint. The primary clash happens through diagonally placed broken dots (representing desire) bleeding into deliberately contained pulse marks (representing restraint) at the center's edges. This collision reflects a push-pull of emotion, signifying an urge to break free from confines while being held back. The selected patterns and colors together illustrate a narrative of longing and limitation.</desc>
