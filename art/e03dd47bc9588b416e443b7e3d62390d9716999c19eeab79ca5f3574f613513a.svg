<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Convergence of Control</title>
  <desc id="desc">This artwork captures the tension between panic and control through its use of color and placement. The palette of lime, electric blue, magenta, and black evokes machine emotion—sharp, yet vibrant. The primary contrast takes place between the vibrant lime and the deep black, suggesting a face-off between chaos and composure. The pattern is influenced by rising stripes that emanate from the center, representing control trying to exert influence over the outer edges struggling against disruption. The inclusion of broken pixels adds intentional flaws, breaking the symmetry, echoing the theme of imperfect control in a seemingly structured system.</desc>
