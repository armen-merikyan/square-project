<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Strength</title>
  <desc id="desc">The emotional tone captures the tension between vulnerability and strength, using a palette that conveys safety and exposure. The lighter greens and pale tones symbolize vulnerability, whereas the deeper browns provide strength. The central collision, where the radial vulnerability patterns meet the strong stripes, creates an interruption at the core of the square. This reflects how exposure can exist even within strength, mirroring the seed's theme of interdependency. The broken pixels integrate imperfection, adding depth and resonance to the piece, aligning with the notions of shelter and being open.</desc>
