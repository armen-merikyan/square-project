<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Harmony</title>
  <desc id="desc">This composition captures the emotional conflict between safety and exposure through the use of a protective lattice frame surrounding a pale, open center. The palette of shelter green and warm brown signifies comfort and warmth, contrasted against the cold white and open blue that reflect vulnerability and exposure. The primary collision occurs at the edges, where warm and cool colors intermingle, creating a tension that represents the ongoing struggle between shelter and openness. This arrangement amplifies the sense of fracture and reaction across the square, embodying the theme of the seed while maintaining an abstract visual narrative.</desc>
