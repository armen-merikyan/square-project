<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erosion of Light</title>
  <desc id="desc">The emotional tone captures the tension between vibrancy (spark) and subdued presence (ash). The palette merges 'serenity_urgency' colors creating a visual tension with pale aqua and alarm red representing the divergent emotional forces. The central pulse of light (spark) collides with jagged edges of muted tones (ash), disrupting the symmetry. The dominant area leans towards ash colors while leaving enough negative space (clear white) to signify restraint, embodying the battle between energy and calm. Patterns of stripes and pulse marks create a rhythm that reflects the jagged nature of memory and erosion, reinforcing the narrative of resilience interspersed with fragility.</desc>
