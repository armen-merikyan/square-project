<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition captures the emotional tension between desire and restraint through a striking palette and an asymmetrical layout. The top four rows embody desire with vibrant, warm tones of hot coral and blood orange, creating a sense of urgency and pull. The bottom four rows reflect restraint, dominated by deep charcoal and hollow blue, suggesting containment. The sharp contrast between these sections represents the collision of feelings, with colors clashing and overlapping like the threads of a tightly woven lattice, while broken pixels interrupt the flow, adding imperfection and tension. The sealed edges evoke a border that cannot be crossed, amplifying the emotional conflict.</desc>
