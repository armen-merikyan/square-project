<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Trust and Suspicion</title>
  <desc id="desc">This piece embodies the emotional tension between trust and suspicion, using a palette that emphasizes machine and emotional contrasts. The left side, in electric blue and magenta, represents trust through a dense, pressure-band pattern, suggesting stability. The right side, dominated by shades of black, conveys suspicion with a sparking pattern that feels jagged and unstable. The vertical split combined with a narrow channel creates a visual echo of conflict, inviting the viewer to explore the relationship between these emotions. Broken pixels introduce intentional disruptions, representing fractures and scars in perception.</desc>
