<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hinge of Balance</title>
  <desc id="desc">This piece embodies the emotional tension between control and surrender through a palette of deep reds and soft blues, symbolizing the heat of struggle against the coolness of yielding. The central clash occurs with a burst of intense color, depicting the overwhelming pressure in contrast to calm borders, marking a clear interruption in the flow of serenity and chaos. The stair-step pattern suggests movement between levels of pressure, while the uneven distribution creates a sense of dynamic tension, reflective of the stutter-step struggle portrayed in the seed.</desc>
