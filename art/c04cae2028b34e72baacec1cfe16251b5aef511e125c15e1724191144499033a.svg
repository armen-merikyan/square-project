<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Corner</title>
  <desc id="desc">This artwork captures the emotional tension between vulnerability and strength through an interplay of sharp contrasts and soft elements. The palette, 'softness_severity', employs powder pink and warm white as a quiet field, while carbon black and sharp crimson create strong accents that symbolize hard edges and signals rising through vulnerability. The checker pattern for strength dominates the corner, while static textures emerge to remind of fragility, thereby allowing a visual collision in that space. The layout 'pressure_corner' leans on a compressed corner that spreads uncertainty into the quieter areas, invoking feelings of exposure and shelter, ultimately communicating the struggle between the two emotions distinctly on the canvas.</desc>
