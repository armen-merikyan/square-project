<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetrical Disruption</title>
  <desc id="desc">This artwork captures the tension between panic and control using a divided palette. The left half, representing control, is muted with blacks and greys, exhibiting a 'broken dots' pattern that hints at stability disrupted by imperfections. The right half embodies panic through vibrant reds and lighter whites, using a 'dots' pattern to create a sense of chaotic movement. The dominant contrasts lie at the vertical divide, echoing the themes in the seed of stability vs instability and emotional collision. The chosen palette enhances this dichotomy, with the darker tones fostering a feeling of containment while the brighter side exudes explosive energy.</desc>
