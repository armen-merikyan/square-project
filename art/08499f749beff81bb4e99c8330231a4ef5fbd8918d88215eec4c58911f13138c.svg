<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inner Conflict</title>
  <desc id="desc">The piece captures the emotional tension between safety and exposure. The palette combines shelter green, warm brown, and pale skin tones to suggest warmth and warmth's fragility. Cold white and open blue provide contrast, symbolizing exposure and the unsettling nature of being vulnerable. The dense center, using warm hues, represents security, while the jagged edges in cooler tones denote the anxiety of being exposed. The collision happens predominantly in the center, embodying the struggle between the desire for shelter and the inevitability of exposure, creating an inward spiral of emotions.</desc>
