<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Signals</title>
  <desc id="desc">The emotional tone encapsulates a struggle between trust and suspicion, illustrated through the contrasting palette of warm pinks and cool grays that embody warmth and discomfort respectively. The diagonal flow invites a sense of movement and tension, particularly where bright accents of pink collide with deeper maroon shadows, reflecting the push and pull of these contrasting emotions. The split vertical layout emphasizes the threshold between these feelings, creating a more dynamic interplay. Broken pixels are used deliberately to signify imperfections and disruptions in communication, mirroring the seed's themes of trust and noise.</desc>
