<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Interruption</title>
  <desc id="desc">This piece captures an emotional contrast between tenderness and rage, where the palette of deep black, saturated red, muted pale blue, and white highlights the collision of feelings. The structure portrays rage as it disrupts the gentle patterns of tenderness, with sharp pixel placements suggesting echoes of tension against a soft background. The corner invasion layout emphasizes how rage starts quietly yet builds, creating dynamic motion across the square. Broken pixels add intentional disruptions reflecting the nuances of guilt and forgiveness, intertwining both emotional threads.</desc>
