<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Resilience</title>
  <desc id="desc">The emotional tone captures the delicate tension between vulnerability and strength, represented by a split vertical layout. The palette, dominated by warm tones (hot coral, blood orange) on the left, emphasizes feelings of exposure and softness, while the cooler shades (charcoal, hollow blue) on the right suggest strength and protection. The main collision occurs in the center, where radial vulnerability clashes with a grid of strength, allowing the contrast to highlight the interplay between fragility and resilience. Broken pixels evoke imperfection, emphasizing the struggle and beauty found in both exposure and shelter.</desc>
