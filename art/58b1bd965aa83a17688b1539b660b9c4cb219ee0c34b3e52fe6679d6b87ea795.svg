  <title id="title">Fragmented Harmony</title>
  <desc id="desc">This artwork embodies the emotional duality of love and betrayal, using contrasting colors and patterns to evoke tension. The warm colors (pink and red) symbolize love, while the darker shades (gray and dark maroon) represent the ominous nature of betrayal. The pattern shifts from soft stripes suggesting intimacy on one side, to chaotic maze-like forms signifying betrayal on the other. The unresolved collision occurs at the center, where these two emotional realms meet and clash. Broken pixels introduce imperfections reflecting the inherent flaws in relationships, while maintaining ample negative space to suggest a sense of isolation amidst connection.</desc>
