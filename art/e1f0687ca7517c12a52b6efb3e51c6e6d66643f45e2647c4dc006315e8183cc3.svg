<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Light and Shadow</title>
  <desc id="desc">This artwork embodies the emotional struggle between the vitality of sparks and the weight of ashes. The palette, a blend of moss green, bone white, rust, stone gray, and small gold, reflects the resilience found in fragility and decay. The main contrast occurs centrally, where vibrant 'spark' colors burst against muted 'ash' tones, creating tension. The jagged edges disrupt the flow, representing the chaotic interactions of memory and experience, while negative space allows for breathing room, evoking a sense of introspection amidst the chaos.</desc>
