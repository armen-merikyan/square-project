<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Strata</title>
  <desc id="desc">This piece explores the tension between defiance and submission by utilizing contrasting emotional tones. The palette channels a sense of 'safety exposure' with the warm brown and shelter green representing defiance and a striking contrast against the cooler hues of pale skin and cold white, embodying submission. The arrangement creates a layered density that ebbs and flows like an inward spiral, with broken pixels interrupting the smoother transitions to emphasize the struggle between these two forces. The collision occurs prominently in the central band, where colors intertwine and confront each other, representing the dynamics of pressure and release.</desc>
