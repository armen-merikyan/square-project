<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece embodies the emotional tension between defiance and submission through contrasting pixel arrangements. The palette comprises warm tones (hot coral, blood orange) highlighting defiant energy, while cooler shades (charcoal, hollow blue) symbolize submission and quietness. The main collision occurs centrally, where a dense cluster of warm colors meets the soft ebb of cooler tones, suggesting resistance against a backdrop of retreat. This juxtaposition, combined with a broken edge style, eloquently narrates the narrative of opposition and balance, echoing the seed's themes through abstract expression.</desc>
