<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragments of Resonance</title>
  <desc id="desc">The emotional tone conveys a struggle between clarity (signal) and ambiguity (noise). The chosen palette of navy, black, dim cyan, and a hint of white reflects the depth of chaos and the rare moments of clarity. The main collision occurs in the center, where dense dark colors interrupt bursts of bright accents, symbolizing the pulse of signal fighting through a backdrop of noise. The 'broken pixels' add an intentional imperfection, highlighting moments of disruption that relate to 'mirror broken' and 'scarred vs smooth'. This grid articulates a struggle, with chaos invading from one corner, allowing for a sense of creeping tension against a silent backdrop.</desc>
