<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Signals</title>
  <desc id="desc">This abstract composition captures the emotional tension between emptiness and desire. The palette of deep navy and stark black plays on feelings of loneliness, while the accents of dim cyan introduce a hint of yearning. Colors ascend on the left side, suggesting hope and ambition, while they descend on the right, evoking a sense of loss. The interplay of organized checker patterns (representing desire) against a staggered pattern of color (representing emptiness) creates a dynamic collision at the center, symbolizing the struggle between these emotions.</desc>
