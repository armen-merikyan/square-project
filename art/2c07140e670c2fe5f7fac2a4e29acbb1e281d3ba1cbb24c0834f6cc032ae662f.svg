<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory vs Motion</title>
  <desc id="desc">The emotional tone of this piece reflects the balance between softness and severity, with sharp contrasts and gentle nuances. The chosen palette of soft powder pink and warm white contrasts with the deep tones of carbon black and steel gray. This interplay creates a narrative of tension, where the center, dominated by softer tones, evokes a sense of warmth and comfort, while the surrounding edges in darker colors prompt a feeling of restriction and severity. The patterns emerge through broken pixels, introducing an element of chaos to the organized layout, symbolizing the struggle between memory and motion as pulses of activity flow outward from the core, interrupted regularly by darker, more severe marks.</desc>
