<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">This composition captures the interplay between the explosive energy of rage and the serene weight of calm through a striking color palette. The bold reds represent the anger and chaos, colliding against the soft pale blues that symbolize tranquility. The pattern flows from top to bottom, starting aggressively with dark black and red tones at the top, transitioning into lighter blues and whites that create a sense of rising calm. The use of broken pixels introduces a sense of imperfection and tension, echoing the struggle between dual emotions, while maintaining a central negative space for balance.</desc>
