  <title id="title">Broken Reflections</title>
  <desc id="desc">This piece explores the emotional tension between love and betrayal through a mirrored layout with intentional imperfections. The warm hues of pink and red evoke love, while dark maroon and gray introduce an unsettling betrayal. The composition features broken symmetry, with a sharp contrast between soft and jagged edges suggesting the emotional conflict. The scattered placements of colors create a sense of chaos against the calm, reflecting the struggle between these emotions.</desc>
