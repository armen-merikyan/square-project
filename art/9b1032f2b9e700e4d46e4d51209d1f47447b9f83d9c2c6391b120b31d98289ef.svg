<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Heights</title>
  <desc id="desc">The composition embodies a duality of longing against resolve, utilizing a palette that evokes both warmth and cool detachment. The dense center, highlighted by deep teal and cosmic indigo, represents the overwhelming emotion of longing, while the void black and star white along the edges suggest a boundary of resolve. The intentional placement of cold gold pixels creates a sense of interruption and collision between the two emotional realms. The shaping of this piece draws from the vessel seed, implying a container for feelings, with a focus on density in the center and an open bordering struggle against collapse.</desc>
