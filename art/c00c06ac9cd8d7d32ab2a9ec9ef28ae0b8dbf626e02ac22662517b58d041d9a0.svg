  <title id="title">Hunger Imprisoned</title>
  <desc id="desc">The emotional tone contrasts desire—represented by saturated warm colors—with emptiness manifested in low saturation blues and blacks. The palette juxtaposes hot coral and blood orange blending against the coolness of charcoal and hollow blue, forming a tension that speaks to a quiet pressure. The main collision occurs at the center where high saturation colors clash with muted tones, symbolizing the struggle between yearning and restraint, echoing the spiral counterclockwise flow while leaving negative space for breath among the patterns.</desc>
