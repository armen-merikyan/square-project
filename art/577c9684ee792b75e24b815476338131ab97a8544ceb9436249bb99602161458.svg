<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">The emotional tone embodies a battle between joy's brightness and the heaviness of grief. The palette of bright yellows and oranges contrasts sharply against muted purples and deep blues, highlighting this duality. The arrangement employs a rising signal layout, symbolizing hope alongside despair, with broken pixels representing imperfection in both states. The joy pattern of mazes weaves through the grief's cracks, creating tension in the center—it's a subtle push and pull of emotions, represented by the sharper left-weighting contrasted with the rising flow.</desc>
