<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Turbulence</title>
  <desc id="desc">This artwork captures the emotional tension between certainty and curiosity through contrasting colors and patterns. The palette includes muted tones of off-white, dust gray, and faint peach to create a quiet field, while compressed red and dark navy serve as vibrant accents, suggesting the urgent signals of curiosity amidst the calm of certainty. The left half of the grid exhibits a mirrored pattern indicating firmness, while the right half features scar-like interruptions, creating visual collisions. The main contrast is between a solid navy core and the chaotic light edges, evoking the push and pull of curiosity battling against the structured residue of certainty.</desc>
