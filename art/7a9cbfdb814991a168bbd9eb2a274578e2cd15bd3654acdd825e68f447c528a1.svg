<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Quiet Disruption</title>
  <desc id="desc">The emotional tone captures a battle between restlessness and peace, creating a dynamic interplay. The warm coral and soft amber hues represent peace, providing a soothing background. In contrast, the cold slate and signal cyan interject moments of unrest, depicted through jagged edges and an interrupted crosshatch of patterns. The main collision is centered, suggesting a tension point, where quieter colors are disrupted by bolder hues, reflecting memory against forward motion. The diagonal flow embodies the conflict, leading the viewer’s eye across the piece in an unsettling yet harmonious dance.</desc>
