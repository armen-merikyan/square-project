<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">The emotional tone contrasts joy and grief, portrayed through a combination of vibrant and muted colors. The palette reflects this tension with yellow and orange representing joy, while deep blue and muted purple signify grief. The main collision occurs where the bright colors at the top intersperse with the dense, heavy tones below, creating a visual pulse reminiscent of shifting emotional states. The pixel arrangement features a left-weighted distribution, echoing a sense of imbalance as joy attempts to rise against the weight of grief. The use of broken pixels introduces imperfection, emphasizing the theme of love and betrayal within the emotional spectrum.</desc>
