<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Fracture</title>
  <desc id="desc">This artwork reflects the tension between restlessness and peace through a dynamic arrangement of colors. The palette features warm tones like hot coral and blood orange representing restlessness, while dusty pink and hollow blue evoke a sense of calm and serenity. The primary contrast between the warm and cool colors creates a visual stutter, symbolizing the tension of motion against stillness. The falling pixels layout allows the colors to cascade diagonally, representing the intersection of memories and motion, with broken pixels disrupting the flow to signify unresolved feelings. The dense placement of warmer colors in the top half contrasts with the cooler, sparser bottom, embodying the emotional struggle between chaotic energy and serene refuge.</desc>
