<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Resilience</title>
  <desc id="desc">The emotional tone juxtaposes vulnerability and strength, represented by the contrasting color palette of deep olive and honey gold against pale cream and ripe green. The top half uses a 'tide' pattern, suggesting fluidity and vulnerability, while the bottom half employs an 'echo' pattern, embodying strength through dense shapes. The primary collision occurs in the center where these two energies meet, creating a dynamic interplay of colors that reflect resilience emerging from fragility. Broken pixels introduce imperfection, enhancing the concept of emotional scars. The layout emphasizes a split representing the dichotomy, with negative space balanced to sustain visual clarity.</desc>
