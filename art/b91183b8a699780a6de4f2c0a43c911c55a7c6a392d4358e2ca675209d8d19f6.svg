<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This artwork embodies the emotional duality of joy and grief. The palette, featuring deep blues reflecting grief alongside vibrant yellows and oranges representing joy, creates a dialogue of tension and release. The design flows from left to right, emphasizing the heavier left side contrasted by lighter, open spaces on the right. The inner core is an intricate maze, symbolizing the complexity of joy, surrounded by jagged edges of deep blue stripes, representing grief. This dichotomy is further highlighted by broken pixels, introducing imperfections that echo a sense of lost symmetry, central to the emotional narrative of love and betrayal. Overall, the piece suggests a dynamic interplay of conflicting emotions, making the viewer contemplate each color's resonance before they converge into a symmetrical chaos.</desc>
