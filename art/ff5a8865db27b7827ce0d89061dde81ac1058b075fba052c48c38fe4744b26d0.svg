<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Safety</title>
  <desc id="desc">This composition embodies the tension between safety and exposure through a structured arrangement. The selected palette of soft greens and warm browns evokes a sense of shelter, while cool whites and blues introduce elements of exposure. The main collision occurs in the center, where a checker pattern of pale skin tones interrupts the warm hinge-like rows around it, portraying the constant interplay between comfort and vulnerability. The layout of a narrow negative space along the vertical channel adds to the feeling of contrast, reflecting the emotional complexities of protection and exposure.</desc>
