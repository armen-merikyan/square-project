<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This artwork captures the tension between desire and emptiness, with a dominant warm palette reflecting hunger and a cooler tone subtly illustrating the boundaries of restraint. The vibrant colors converge toward the top right corner, creating a saturated pull, while the lower sections feature muted tones and spaced empty cells that reinforce a feeling of lack. The edge style is characterized by glowing contrasts that signify the thin line between overflowing desire and contained emptiness. The arrangement disrupts symmetry, emphasizing an emotional collision, especially as the warm colors break towards the cooler, less saturated fields, creating a visual tension around the intersection of these two extremes.</desc>
