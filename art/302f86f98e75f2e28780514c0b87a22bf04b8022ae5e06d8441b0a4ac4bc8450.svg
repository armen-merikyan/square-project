<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure in Silence</title>
  <desc id="desc">This composition reflects the emotional tension between quiet and pressure, utilizing a palette that transitions from muted whites and grays to a deep navy that represents the weight of pressure. The contrast is most visible in the top-left corner, which is densely packed with the darker colors, gradually dispersing into lighter, softer shades towards the opposite corner. The jagged edges reflect a sense of disturbance, while the patchwork and braid patterns interplay to evoke the collision of calmness with chaos. The composition embodies a story of pushing against silence, where structure meets disarray.</desc>
