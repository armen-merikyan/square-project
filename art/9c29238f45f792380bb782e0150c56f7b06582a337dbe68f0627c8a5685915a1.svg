<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This piece captures the tension between 'spark' and 'ash,' highlighting resilience alongside fragility. The color palette of moss green, bone white, rust, and stone gray contrasts the light spark with the heavy remnants of ash. The central collision occurs in the middle rows, where the vibrant small gold ignites against the muted gray, creating a stark yet harmonious interplay. The patterns of 'shatter' and 'threshold' emerge from the jagged edges, suggesting a dynamic and fractured journey between memory and erasure.</desc>
