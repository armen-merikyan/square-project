<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissension in Balance</title>
  <desc id="desc">The emotional tone balances between the relief of warmth (represented by burnt orange and gold) and the dread of darkness (embodied by charcoal and dark red). The warm glow emerges from the corner, seeking to break through the weight of darkness, which occupies the bottom half. The jagged edges diversify the experience, creating a rhythm that feels both watchful and uneven, while the patterns of 'stairs' and 'flame' express an ascension above fear. This square highlights the dynamic contrast between a confined empty room and the chaotic pull of weighty emotions, forcing you to consider the tension in each block and how they intermingle.</desc>
