<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This abstract artwork captures the emotional tension between rage and calm. The top half employs a radial pattern of warm reds and explosive blacks, suggesting intensity and turmoil. The bottom half features cooler pale blues and whites in a split-screen style, representing serenity and quietness. The main contrast occurs where the two halves collide, creating an impactful boundary. Broken pixels disrupt the calmness, echoing the feeling of containment bursting into chaos, illustrating an eroded symmetry where signals of distress meet tranquil fields.</desc>
