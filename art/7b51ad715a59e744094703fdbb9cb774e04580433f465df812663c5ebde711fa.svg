<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shattered Harmony</title>
  <desc id="desc">This artwork embodies the emotional tension between love and betrayal through its color choices and abstract layout. The palette of warm pinks and deep maroons contrasts sharply with soft grays, reflecting a duality of warmth (love) and harshness (betrayal). The arrangement features a linear flow from left to right, creating a sense of movement while the broken pixels introduce imperfection and unease. The inner 4x4 section, marked by interspersed stripes and chaotic placement, suggests the tumult of a conflicted heart, while the outer layer encapsulates that turmoil in more stable, softened tones. The overall abstract pattern captures the struggle between desire and disappointment, mirroring the seed's themes.</desc>
