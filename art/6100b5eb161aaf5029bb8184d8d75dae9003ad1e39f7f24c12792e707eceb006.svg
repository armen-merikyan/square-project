<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Resilience</title>
  <desc id="desc">This piece embodies the emotional tension between vulnerability and strength, evoking the idea of an exposed center framed by dense, strong colors. The palette mixes hot coral and blood orange as the dominant elements, representing warmth and intensity, with charcoal and hollow blue offering counterbalance and reflection. The primary collision occurs in the top left corner, where the warm hues cluster against a cooler background, creating a vivid contrast that suggests both protection and exposure. The broken pixels introduce imperfections as scars or echoes, enhancing the narrative of resilience amid vulnerability, while the spiral flow inward symbolizes a movement of connection despite the alienation hinted by the layout and edge style.</desc>
