  <title id="title">Divide of Light and Shadow</title>
  <desc id="desc">This artwork explores the tension between fear and hope, using a palette that transitions from deep, dark colors to soft, light hues. The contrast is evident in the jagged, broken edges on one side, denoting fear, while the other side features gentle dots that radiate hope. This split evokes a sense of weightiness against lightness, embodying the emotional struggle of light against darkness. The negative space allows for breathing room, suggesting moments of relief amid struggle.</desc>
