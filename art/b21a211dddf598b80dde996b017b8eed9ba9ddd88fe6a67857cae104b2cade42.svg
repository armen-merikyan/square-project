<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">Reflecting the emotional contrast between restlessness and peace, the palette combines pale mint and soft sky for tranquility against the deeper tones of storm gray and near black, which evoke restlessness. The top half represents peace through broken dots, suggesting calm amidst the chaotic ripple of the bottom half, representing restlessness. The main collision occurs in the center with storm gray interrupting the peace, illustrating an emotional struggle, while closed corners contain the composition, emphasizing the contained feeling of both states.</desc>
