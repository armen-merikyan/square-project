<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissonance of Expectation</title>
  <desc id="desc">The emotional tone oscillates between feelings of awe, represented by cooler tones, and terror, embodied by darker shades. The chosen palette of navy and black creates an interplay of depth and shadow, suggesting a mysterious void. The layout follows a frame-and-core arrangement that presents stark contrast; the outer rows embody a sense of chaos through disturbed patterns, while the inner area offers structured clashing patterns through noise and radial effects. Broken pixels throughout enhance the feeling of instability, echoing the theme of 'broken memory,' while preserving negative space to reflect inner turbulence and resolution.</desc>
