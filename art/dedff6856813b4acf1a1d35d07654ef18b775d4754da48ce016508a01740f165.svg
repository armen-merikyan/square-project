<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This piece embodies a tumultuous emotional landscape, exploring the contrasts of love and betrayal. The use of a warm color palette—ranging from pinks to dark maroon—articulates affection and warmth, while the grays and blacks introduce elements of betrayal and chaos, signifying cracks in relationships. The layout juxtaposes a vibrant inner core against a darker, chaotic outer frame, highlighting the theme of pressure juxtaposed with a calm center. The broken pixel elements instill a sense of imperfection and interruption, visualizing the friction between love and betrayal. The composition flows like a heartbeat, erratic yet rhythmic, with spatial contrast enhancing the emotional tension throughout the piece.</desc>
