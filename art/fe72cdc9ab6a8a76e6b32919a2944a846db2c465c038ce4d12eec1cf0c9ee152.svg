<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of the Elements</title>
  <desc id="desc">This composition explores the emotional dynamics between envy and gratitude, represented through a balanced yet contrasting palette of vibrant colors. The black evokes weight and depth, while lime brings a sense of lightness and energy. The jagged edges from the ‘broken pixels’ represent imperfection and conflict. The zigzag pattern simulates a visual push-pull, capturing the essence of heavy versus light emotions. Main contrast occurs between the bold electric blue and softer magenta, creating tension in visual space. This design reflects the struggle and balance of emotions raised by the seed.</desc>
