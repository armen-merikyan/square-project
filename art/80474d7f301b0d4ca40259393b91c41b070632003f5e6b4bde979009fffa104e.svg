<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Affection</title>
  <desc id="desc">The emotional tone reflects the struggle between love and betrayal, layered with a sense of chaos and order. The palette of warm pinks and deep maroons suggests affection, while gray represents the brokenness of betrayal. The primary contrast lies in the warm colors at the edges versus the cooler gray tones within, symbolizing the divide between these emotions. The pattern echoes a heart fragment showing cracks, suggesting a disrupted symmetry, aligning with the idea of 'crack against stairs.' Each row creates a sense of rhythm, with some colors repeating like memories on the path from calm love to an undercurrent of betrayal, maintaining a balance amid chaos.</desc>
