<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension between Worlds</title>
  <desc id="desc">This artwork embodies the emotional conflict of panic and control through contrasting colors and patterns. The palette of yellow, orange, deep blue, and muted purple symbolizes the warmth of comfort clashing with the coldness of anxiety. Patterns of crack and mirror depict the instability in emotions, while the use of broken pixels introduces imperfection, emphasizing the chaotic nature of feeling trapped. The dominant presence of deep blue contrasts against vibrant yellows to evoke a sense of turmoil versus calm, a core theme expressed in the seed prompting. Overall, the abstract composition manifests the essence of emotional tension, embodying both density and open space.</desc>
