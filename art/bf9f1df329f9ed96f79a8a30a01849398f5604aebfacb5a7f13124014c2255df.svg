<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This piece reflects the emotional tension between tenderness and rage through a contrasting palette of deep reds and muted blues. The arrangement of colors follows a scattered repair layout where darker reds occupy most of the square, representing rage, while gentle blues and whites offer a sense of tenderness, creating a quiet space amidst the chaos. The collision occurs towards the center where bright accents interrupt the darker tones, suggesting moments of conflict and resolution. The layout embodies an abstract shape inspired by the concept of scars, reflecting the themes of guilt and forgiveness intertwined within the emotional spectrum.</desc>
