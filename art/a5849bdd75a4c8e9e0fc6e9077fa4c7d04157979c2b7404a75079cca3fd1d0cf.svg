<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Emotion</title>
  <desc id="desc">The emotional tone balances the stark contrast between joy (represented through bright yellow and orange) and grief (embodied in muted purples and deep blues). The left side is a radiant eruption of striped patterns indicating joy, while the right displays a radial undertow of softness and heaviness for grief. The use of broken pixels introduces elements of disruption, echoing the imperfection of emotional experiences. Key collisions occur at the central division where bright and muted tones meet, creating a visual pulse reminiscent of emotional oscillation. The layout captures the tension of left-weighted themes and symmetry versus breakage through careful color placement.</desc>
