<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Strength in Exposure</title>
  <desc id="desc">This composition captures the emotional tension between vulnerability and strength. The palette features warm coral and soft amber to evoke vulnerability, contrasting sharply with the cold slate and blue-black that communicate strength. The dominant color flow radiates outward from a pale center, suggesting exposure bathed in warm light, while hard edges of darker hues frame the piece, representing shelter. The collision occurs at the center, where light colors meet dark, embodying the struggle of these emotions intertwining.</desc>
