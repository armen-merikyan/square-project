<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Order</title>
  <desc id="desc">The emotional tone is a struggle between panic and control, reflected through the use of stark contrasts in the palette. The choice of red and black suggests urgency and instability, while pale blue introduces a hint of calm, attempting to balance the chaotic elements. The layout is a grid where the left side employs a structured, framed pattern symbolizing control, while the right breaks into a maze-like chaos, exhibiting the conflicting emotions. The collision occurs where these two opposing patterns meet, intensifying the narrative of instability and sparking emotional tension.</desc>
