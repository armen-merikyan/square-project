<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Tension</title>
  <desc id="desc">This composition encapsulates the emotional conflict between defiance and submission through sharply contrasting colors and disrupted patterns that ebb and flow across the grid. The left side, dominated by moss green and rust, represents defiance with its embers-like qualities, suggesting warmth and resistance. The right side, with bone white and stone gray, implies a sense of submission, characterized by soft cracks that mirror vulnerability and quiet tension. The broken pixels introduce intentional disruptions, emphasizing the fragility of this balance. The main collision occurs between the denser green and the softer gray, creating an arresting visual tension where resilience meets fragility, reflecting the emotional seed translating into a dynamic, abstract pattern.</desc>
