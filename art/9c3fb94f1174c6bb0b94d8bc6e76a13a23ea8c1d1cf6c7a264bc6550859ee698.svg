<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Symmetry</title>
  <desc id="desc">This composition embodies the tension between exposure and safety. The palette evokes warmth through the 'shelter_green' and 'warm_brown' colors, juxtaposed against the delicate 'pale_skin' and cool 'open_blue,' reflecting a balance of gentle weight and bright vulnerability. The edge style suggests a heavy foundation yet allows for softness in the center, creating a focal point of tension. The noise pattern disrupting the braid-like structure introduces a collision, aligning with the 'eroded_symmetry' concept, giving way to an interplay of solidity and delicacy. The broken pixels act as intentional disruptions that hint at imperfections, reinforcing the theme of sheltering from exposure within the stark borders of the grid.</desc>
