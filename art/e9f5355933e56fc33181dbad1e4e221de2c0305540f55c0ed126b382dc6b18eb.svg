<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This artwork captures the emotional tension between desire and emptiness. The top four rows, embodying 'desire,' use vibrant tones like hot coral and blood orange, creating a whisper of warmth and movement that feels intoxicating yet ensnared. The bottom four rows reflect 'emptiness' through the cool, muted hues of hollow blue and charcoal, suggesting a vast, unfilled space. The presence of broken pixels adds intentional disruptions, emphasizing the struggle between craving fulfillment and the brink of containment. The collision occurs at the boundary, where the warmth meets the cool, encapsulating the conflicting emotions of longing versus absence.</desc>
