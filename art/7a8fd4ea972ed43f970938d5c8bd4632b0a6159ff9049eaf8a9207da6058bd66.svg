<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Calm</title>
  <desc id="desc">The emotional tone juxtaposes restlessness and peace, creating a visual tension. The palette employs lime as a vibrant accent against the heavy black, illustrating the ongoing struggle between calm and chaos. The main collision occurs in the center where bright elements pulse amidst darker, static patterns. The 'crack' shape seed inspires an asymmetrical distribution of colors, where the disruptive mouth of unrest opens in the middle. The overall layout remains split vertically, emphasizing the containment of restlessness on the left and the serene fields on the right, while broken pixels serve as reminders of imperfection and disquiet in an otherwise structured composition.</desc>
