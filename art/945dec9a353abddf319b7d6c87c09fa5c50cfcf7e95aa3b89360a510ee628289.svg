<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The emotional tone of this piece explores the conflict between envy and gratitude, encapsulated in a heavy dark mass resisting a small, bright shape. The palette of electric blue, magenta, black, and lime reflects a clash of emotions, with vibrant colors representing gratitude pushing against the oppressive dark tones of envy. The contrast lies in the left side dominated by the deep blacks, while the right side introduces lighter, more vibrant colors in a zigzag pattern. Broken pixels enhance the feeling of imperfection and chaos, embodying the broken mirror metaphor. This abstract representation speaks to the struggle of finding balance in emotional contrasts.</desc>
