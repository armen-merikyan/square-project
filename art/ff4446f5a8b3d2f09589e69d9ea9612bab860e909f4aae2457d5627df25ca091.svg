<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This artwork channels the dualities of control and surrender through an intentional balance of pressure and release, illustrated by a dominant dark core (control) surrounded by softer, lighter hues (surrender). The palette combines mourning black and deep blue to establish a profound emotional weight, softened by the renewal brought by pale yellow and new leaf. The grid pattern contrasts with the spark pathway, emphasizing a collision at the center that embodies tension and resolution. The layout divides the square's emotional landscape through the 'threshold', echoing the duality of containment against overflow.</desc>
