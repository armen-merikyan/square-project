<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Waves of Emotion</title>
  <desc id="desc">The artwork embodies the duality of joy and grief through a careful balance of warm and cool colors. The palette of yellow and orange invokes joy, while deep blue and muted purple reference feelings of grief. This combination creates a wave-like flow across the composition, reflecting the ebb and flow of emotional experiences. The main contrast occurs in the central horizontal split, where warmer colors clash with cooler tones, generating a dynamic tension. Imperfections through broken pixels provide a sense of fragmentation, mirroring the complex nature of these emotions.</desc>
