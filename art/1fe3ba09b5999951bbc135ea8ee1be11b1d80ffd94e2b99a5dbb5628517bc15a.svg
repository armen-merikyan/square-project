<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This artwork embodies the emotional tension between softness and severity, utilizing a palette that juxtaposes warm whites and powder pinks against stark blacks and grays. The broken dot pattern suggesting severity interacts with the mirror softness pattern, creating a dynamic rhythm as some sections pulse with warmth while others remain cool and dark. The main collision occurs in the center, where the density of color provides weight, while the edges are left shadowed, evoking a sense of quiet contrast. The spiral layout suggests movement and tension, emanating from a focal point that draws the eye towards the chaotic blend of emotions.</desc>
