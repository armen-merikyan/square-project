  <title id="title">Weight of Emotion</title>
  <desc id="desc">The emotional tone encapsulates a tug-of-war between panic and control, represented through a clash of sharp contrasts. The palette, 'broken_memory', combines sepia, tan, dust gray, and faded blue—colors that reflect nostalgia and tension. The primary collision lies in the top-left quadrant, with deep blacks suggesting control vying against bright sparks of color symbolizing panic. Such graduated shifts and asymmetries guide the viewer through an abstract narrative of struggle, instability, and the concept of being caught between two states. The left side mirrors the right with intentional imperfections to embody the theme of instability and broken patterns.</desc>
