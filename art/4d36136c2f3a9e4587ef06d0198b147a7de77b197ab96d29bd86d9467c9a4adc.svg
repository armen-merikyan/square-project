<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Boundaries</title>
  <desc id="desc">This artwork embodies the emotional tension between control and surrender through a duality of patterns in colors. The upper half employs a mirrored pattern that represents control, utilizing deeper shades of charcoal and blood orange to create a sense of pressure and density. In contrast, the lower half embraces a stacked pattern with lighter shades symbolizing surrender, promoting calmness and openness with hot coral and dust pink. The main collision occurs horizontally near the center where the dark tones and warm hues meet, suggesting a push and pull between two emotional states. The chosen palette evokes a feeling of desire and emptiness, resonating with the initial seed's themes of overflow and containment. Broken pixels interrupt the flow, adding an organic imperfection to the controlled top layer, which enhances the complexity of the emotional narrative.</desc>
