<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This composition embodies the tension between restlessness and peace. The selected palette features deep black and vibrant electric blue to symbolize the struggle between the shadows of memory and impulses of motion. The design employs an asymmetrical arrangement, where the dark tones dominate the corners and hints of green and magenta disrupt their calm with energetic clashes in the center, illustrating the push and pull of emotions. The placement of broken pixels represents fragmented thoughts and fleeting moments. The overall rhythm flows diagonally from top to bottom, suggesting a sense of movement fighting against stillness.</desc>
