<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmony in Chaos</title>
  <desc id="desc">This piece captures the emotional tension between 'panic' and 'control,' where control is represented by soft radial patterns in the center while panic manifests through sharp frames on the edges. The palette comprises vibrant colors like electric blue and lime against the deep contrast of black, creating a sense of depth and urgency. The main collision occurs at the edges where the vibrant colors abruptly meet the dark, suggesting an inner struggle. This interplay of density and emptiness evokes a narrative of tension, with a subtle underlying rhythm that hints at maintaining calm amidst chaos.</desc>
