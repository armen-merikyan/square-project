<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Waves of Emotion</title>
  <desc id="desc">The emotional tone of this piece reflects the tension between joy and grief—summoning brightly hued warmth against cool, heavy tones. The palette features saturated yellows and oranges for joy and muted blues and purples to convey grief. The asymmetric layout suggests a struggle, with mirrored patterns disrupted by occasional empty spaces. The contrast between dense patches of color and sparse sections mirrors the fluctuation of emotions; the central wave pattern symbolizes movement between these conflicting feelings, while the broken pixel elements create a sense of imperfection that enhances the emotional narrative.</desc>
