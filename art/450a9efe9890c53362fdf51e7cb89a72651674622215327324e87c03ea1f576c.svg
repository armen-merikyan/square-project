<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This pixel art composition embodies the emotional juxtaposition of tenderness and rage, highlighted by sharp and soft elements. The chosen palette blends saturated reds with muted blues and deep blacks, reflecting the internal conflicts and contrasts between aggression (rage) and warmth (tenderness). The composition features a spiral channeling effect where dense clusters of red pixels on one side collide with a muted blue field, creating a sense of tension and release. Broken pixels add intentional imperfections, suggesting the scars of guilt or forgiveness. The main contrast occurs in the middle, drawing the viewer into the emotional struggle of rising upward towards tenderness, while being pulled downward by rage.</desc>
