<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Amidst Static</title>
  <desc id="desc">This artwork explores the emotional dichotomy of control and surrender. The palette of ripe green, honey gold, and deep olive embodies dynamic tension, where rich tones suggest control while lighter shades imply surrender. The central collision, characterized by the overlapping grid of control against softened hinge forms, represents the struggle between opposing emotions. The falling pixel layout portrays a sense of descent, echoing the ebb and flow of pressure against release, while broken pixels introduce intentional disruptions, evoking feelings of noise and interference. This creates an abstract story that invites the viewer to navigate the tension within.</desc>
