<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Light and Weight</title>
  <desc id="desc">The emotional tone captures the struggle between dread and relief, balancing dark, heavy colors against bursts of light. The palette of muted grays interspersed with pale mint and faded gold creates tension. The main collision occurs centrally where the soft ladder pattern of relief weaves into the darker islands of dread, embodying the chaos of emotion. Broken pixels serve as intentional scars, disrupting the flow and contributing to the feeling of a fractured journey. This abstract pattern reflects an intrinsic fight between opposing emotional states, rooted in the shape seed of a stair-step that suggests movement and transition.</desc>
