<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of the Unseen</title>
  <desc id="desc">This composition explores the emotional tension between the vastness of emptiness and the fervor of desire, represented through a saturated core of warm colors surrounded by a muted, shadowy frame. The core symbolizes desire, using hot coral and blood orange to invoke warmth and urgency, while the surrounding charcoal and hollow blue create a sense of distance and quiet restraint. The collision occurs at the edges, where vibrant colors attempt to break through the dark barriers, embodying the struggle of overflow vs containment. The layout features a broken frame, allowing light leaks of color, emphasizing the themes of disruption and desire. The use of broken pixels introduces imperfection, inviting contemplation and reflection on the emotional narrative.</desc>
