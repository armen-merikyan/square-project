<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Divergent Paths</title>
  <desc id="desc">The emotional tone captures the tension between control and surrender, using a palette of shelter green, warm brown, pale skin, and cold white for their relational warmth and coolness. Control is represented through a dominant warm brown surrounding a cooler pale center, reflecting the struggle against overflow. The center displays a stuttering pattern that emphasizes pressure points with darker hues, suggesting disruption. The edges have broken pixels, signifying vulnerability and exposure, creating a dialogue between the contained and the chaotic. This abstraction mirrors the seed's themes of collision and interplay.</desc>
