<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow and Containment</title>
  <desc id="desc">This composition embodies the tension between certainty and curiosity. The dominant darker shades evoke an atmosphere of containment against the brighter, warmer hues that suggest an overflow of ideas. The flow from left to right signifies a rising signal, juxtaposing the established order with chaotic curiosity. The collision occurs prominently in the center as the bright 'compressed red' violently interrupts the cooler palette of 'dust gray' and 'dark navy', reflecting the tension between two conflicting emotional states. The movement from dense pixel clusters toward quieter edges visually narrates a struggle between stability and exploration.</desc>
