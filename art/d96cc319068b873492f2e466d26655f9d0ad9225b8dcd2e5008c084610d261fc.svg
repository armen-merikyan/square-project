<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone oscillates between defiance and submission, employing a palette that juxtaposes muted, darker tones with bright accents to evoke tension. The layout prioritizes a dense, saturated center surrounded by struggling edges, reflecting the struggle between resistance (defiance) and yielding (submission). The main collision happens in the center with dark colors interspersed with brighter accents, creating a conflict that visually narrates the inner spiral of turmoil and calm. The patterns—a lattice and stairs—intersect, suggesting a complex interplay of rigidity and fluidity, while broken pixels introduce imperfection, hinting at the fragility of both states.</desc>
