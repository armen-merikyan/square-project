<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This artwork explores the emotional dichotomy of love and betrayal through contrasting color placements. The palette features warm reds and pinks to represent love, with dark maroon and gray symbolizing betrayal. The placement of vibrant colors in the center contrasts with a cooler, more muted edge, creating a sense of tension and conflict. The broken pixels throughout the pattern echo feelings of disconnection and imperfection, emphasizing the central ‘crack’ that emerges from the seed's exploration of fractured relationships. The use of diagonal flows across the canvas symbolizes both rising signals of emotion and the inevitable falls that accompany fragile bonds. The arrangement allows for pockets of negative space, amplifying feelings of isolation against the warmth of love's vibrancy.</desc>
