<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">The emotional tone is a push and pull between quietude and density. The chosen palette features off white and faint peach to symbolize softness and calmness, contrasted with compressed red and dark navy for the pressure elements. This creates a visual narrative of conflict as the dense center, filled with busy maze-like patterns, struggles against the quieter fields on the edges, representing clarity and confusion. The arrangement creates a sensation of interruption, with the busy center contrasting against the negative space, allowing for a sense of both comfort and tension.</desc>
