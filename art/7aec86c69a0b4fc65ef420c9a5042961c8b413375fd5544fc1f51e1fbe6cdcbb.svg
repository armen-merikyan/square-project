<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Contrast</title>
  <desc id="desc">The emotional tone reflects a duality between love and betrayal, where warmth clashes with coldness. The palette, featuring warm pinks and reds against deep grays and maroons, captures the essence of love's embrace and betrayal's sharp edge. The central tension arises from the intersection of soft hues clashing with sharper, darker edges, representing the emotional scars of heartbreak. Diagonal flows push the viewer's eye across the piece, evoking a sense of rising tension and uncertainty while leaving enough negative space to suggest an 'empty room' of unfulfilled potential.</desc>
