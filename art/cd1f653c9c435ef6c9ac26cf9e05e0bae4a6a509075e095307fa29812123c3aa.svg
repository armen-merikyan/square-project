<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry vs Disruption</title>
  <desc id="desc">The emotional tone explores the tension between panic and control, reflected in the contrasting patterns of ring and crosshatch. The chosen palette of navy, black, and dim cyan conveys a sense of loneliness and deep introspection. The left half represents the chaotic aspect of 'panic' with swirling ring motifs, while the right embodies 'control' through structured crosshatching, creating a rhythmic symmetry disrupted by imperfection. The interplay between densely packed colors and negative space enhances the feeling of unresolved emotional tension.</desc>
