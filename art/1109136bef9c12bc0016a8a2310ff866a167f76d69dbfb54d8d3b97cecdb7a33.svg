<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Gates of Contrast</title>
  <desc id="desc">This composition reflects the emotional struggle between softness and severity, using a palette of soft pastel colors juxtaposed with deep blacks and grays. The outer frame in carbon black and steel gray juxtaposes against the inner core of warm whites and powder pinks, embodying the tension between restraint and freedom. The collision occurs where these colors meet, showcasing a deliberate disruption through broken pixels, emphasizing the struggle within a calm facade. This arrangement mimics an open gate where softness is trapped within the rigidity of its boundaries, mirroring the idea of pulse marks and the complexity of guilt and forgiveness. The layout creates a visual dialogue of separation yet connection, where forms both collide and blend without losing their individual identities.</desc>
