<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This piece captures the emotional dichotomy between panic and control. The palette consists of warm yellows and oranges juxtaposed with deep blues and muted purples to evoke feelings of tension and calm. The left side follows a structured maze pattern symbolizing control, while the right side erupts into chaotic, stair-like patterns representing panic. The contrast occurs predominantly at the center where the two emotional states collide, creating a visual echo that hints at instability and an unresolved interplay between the two feelings. Broken pixels enhance the sense of chaos and imperfection, disrupting the order of the maze and allowing glimpses of the vibrant chaos beneath.</desc>
