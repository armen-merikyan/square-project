<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Emotion</title>
  <desc id="desc">The emotional tone revolves around the tension between defiance and submission. The chosen palette, featuring sepia and dust gray, conveys a broken memory, adding depth and weight. The arrangement flows from top to bottom, suggesting a descent of thoughts or feelings, while the use of alternating patterns—checker for defiance and spark for submission—creates a visual conflict. The main contrast is found in the balance between darker hues at the top, evoking heavier emotions, and lighter tones cascading down, symbolizing a release or surrender. This creates a layered effect, illustrating an intricate dance of confrontation and acceptance.</desc>
