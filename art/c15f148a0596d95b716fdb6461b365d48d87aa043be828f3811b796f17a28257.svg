<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This artwork captures the duality of joy and grief through its contrasting palette of vibrant oranges and muted blues, creating a dynamic tension. The top half embodies joy with bright, spark-like orange hues, while the bottom embraces grief with deeper blue tones, echoing a sense of heaviness. The misplaced pixel in the transmission creates a beautiful disturbance—symbolizing imperfection and the nuanced human experience. The palette was chosen to reflect warmth and coolness, allowing for a powerful emotional narrative. The central design shifts from bright warmth to cool depth, visually representing the conflict between joy and grief.</desc>
