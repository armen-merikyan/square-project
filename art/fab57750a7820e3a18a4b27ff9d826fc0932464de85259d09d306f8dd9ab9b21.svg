<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Dichotomy</title>
  <desc id="desc">This artwork captures the emotional tension between awe and terror, presenting a visual interplay of stability and chaos. The chosen palette of dark navy and black juxtaposed with soft dim cyan and solitary white evokes feelings of isolation and latent wonder. The sharp contrasts occur primarily along the wave pattern, where lighter colors break through denser areas, suggesting a struggle between order and chaos. The layout combines upward and downward movements, embodying a sense of rising awe clashing against underlying currents of terror. Broken pixels introduce intentional imperfection, reinforcing the theme of fractured memory and emotional complexity.</desc>
