<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo Pulse</title>
  <desc id="desc">The emotional tone reflects a battle between clarity and static, capturing the dynamics of 'signal vs noise.' The palette includes vibrant colors like signal green and electric blue to represent the pulse of clarity, juxtaposed with static gray and dead black to symbolize interference and noise. The main contrast occurs off-center, with vibrant colors colliding with muted tones, creating an impression of a focal pulse amidst chaos. The patterns of noise and signal overlap at edges, enhancing the feeling of interruption and echo, embodying the seed's themes of exposure and shelter.</desc>
