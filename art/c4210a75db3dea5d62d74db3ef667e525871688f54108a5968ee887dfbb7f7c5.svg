<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragile Fortitude</title>
  <desc id="desc">This piece embodies the interplay of vulnerability and strength through the use of a stark palette. The dominant dark tones represent strength and stability, forming a dense base across the center, while lighter colors emerge at the edges, signifying vulnerability and exposure. The spiral layout creates a pull towards a quiet off-center point, creating a fluid tension. The broken pixels strategically disrupt the harmony, echoing the fragility within strength. Overall, the artwork reflects the constant push and pull between feeling both secure and exposed.</desc>
