<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Stillness</title>
  <desc id="desc">This piece captures the emotional tug-of-war between restlessness and peace. The color palette features a predominantly dark and moody set of colors accented by brighter tones, symbolizing the battle between tension and calm. A core collision occurs diagonally across the canvas, where muted creams and deep grays contrast against vibrant reds and oranges, suggesting a flame of restlessness attempting to break the calm. The patch motif allows for irregular placements that mimic the complexity of memory and motion, while broken pixels introduce imperfections, embodying disruption. Overall, the composition expresses a struggle through deliberate contrast and rhythm, maintaining a sense of unresolved tension.</desc>
