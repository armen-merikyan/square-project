<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal and Shadows</title>
  <desc id="desc">This artwork embodies the tension between trust and suspicion, with a deliberate split down the center representing their dynamic relationship. The warm coral and soft amber hues signify trust, while the cold slate and blue-black offer a sense of suspicion and darkness. The main contrast lies in the center where the warm colors collide with the darker tones, creating a ripple effect that speaks to the waves of emotion in communication. The palette draws from the concepts of connection and alienation, with broken pixels introducing a sense of imperfection and chaos within the artwork, reflective of reality’s noisy signals and silent whispers.</desc>
