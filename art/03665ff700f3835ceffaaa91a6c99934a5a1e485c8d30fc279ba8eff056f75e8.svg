<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This piece embodies the tension between 'spark' and 'ash' through a dynamic interplay of colors that suggests both brightness and decay. The palette, featuring faded gold and storm gray, reflects the emotional spectrum of resilience against fragility. The patterns of pressure bands are contrasted with embers to evoke movement, while the negative space carved as a narrow channel represents restraint amidst the cluster of colors. The primary collision occurs diagonally across the square, highlighting the contest between vitality and burnout.</desc>
