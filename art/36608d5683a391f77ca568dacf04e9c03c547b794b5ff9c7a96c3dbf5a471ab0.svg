<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Embrace</title>
  <desc id="desc">This piece explores the tension between love and betrayal, using a duality of warm and cool colors to create emotional conflict. The palette of pink and red represents love, while gray and dark maroon suggest betrayal. The contrasting colors are split horizontally, resonating with the emotional dynamics of order and chaos. The rhythm of the piece ebbs and flows with dense patches juxtaposed against moments of negative space, embodying the idea of a heart fragmented yet yearning. The jagged edges reflect the cracks in trust, while radial patterns in the upper half evoke a sense of warmth, disrupted by the chaotic noise patterns in the lower half.</desc>
