<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos and Calm</title>
  <desc id="desc">This piece explores the emotional dialectic between tenderness and rage, represented through jagged and soft color patterns. The palette consists of deep red reflecting rage and cool blue symbolizing tenderness. The stark contrast between black and pale blue colors allows the chaos of broken pixel elements to erupt from a tranquil base, embodying tension between the emotional states. The pattern features pressure bands on one side disrupting a calm expanse on the other, creating a palpable collision where the intensity of red overflows into the quiet space, illustrated in pixel disarray.</desc>
