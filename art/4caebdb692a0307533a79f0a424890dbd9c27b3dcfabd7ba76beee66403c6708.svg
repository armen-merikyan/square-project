<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Boundaries</title>
  <desc id="desc">This artwork captures the emotional tension between two opposing forces: longing and resolve. The chosen palette of moss green, bone white, rust, stone gray, and small gold evokes feelings of resilience and fragility. The layout utilizes a quiet channel, creating a wide negative space that emphasizes the thick outlines of contrasting patterns. Longing is represented by a maze-like density in the center, colliding with resolute channels on the periphery, suggesting both confinement and the desire to break free. The broken pixels introduce an element of imperfection, reflecting the collision of emotions and experiences.</desc>
