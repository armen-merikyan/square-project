<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Reflective Disruption</title>
  <desc id="desc">The emotional tone captured is the tension between longing and resolve. The palette, featuring warm coral and cold slate, highlights this contrast; warm hues suggest a sense of yearning while the cooler shades bring a stabilizing counterpoint. The layout creates an off-center focus with ample negative space, emphasizing the distance between emotions. The collision occurs in the center, where brighter colors overlap muted tones, symbolizing the struggle between clarity and distortion. Patterns of glitch and negative cross create a rhythm that echoes the seed's complexity, suggesting both repair and damage. The broken pixels intentionally disrupt the grid, symbolizing flaws in resolution, forming a mirror-like tension throughout the composition.</desc>
