  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition embodies the tension between vulnerability and strength. The soft colors of rose clay and distant lilac create a warm yet vulnerable ambiance, with tiny accent points of lamp gold adding moments of strength and clarity. The layout mirrors the left and right sides but includes broken elements that symbolically reflect the emotional flaws, creating an unsettling yet balanced tension. The main contrast arises in the center, where light colors are engaged in a structured yet disrupted flow, echoing a struggle between exposure and protection.</desc>
