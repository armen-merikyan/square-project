<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This artwork explores the emotional tension between joy and grief, using a color palette that juxtaposes warm and cool tones to emphasize the duality. The left side bursts with bright yellows and oranges, representing joy, structured with a carefully arranged frame pattern that promotes harmony. Conversely, the right side transitions into the muted deep blues and muted purples of grief, marked by fragmented ring patterns that create a sense of disarray. The contrast occurs where these two emotional spaces collide, enhanced by the thin outlines that hint at structure without full control, representing our attempts to contain complex feelings. This duality in the grid layout visually expresses the struggle between order and chaos.</desc>
