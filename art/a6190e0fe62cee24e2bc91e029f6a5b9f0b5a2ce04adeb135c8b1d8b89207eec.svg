<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Harmony</title>
  <desc id="desc">This piece embodies the emotional duality of rage and calm, where the intense reds symbolize explosive energy, interrupting the soothing pale blue that represents calmness. The palette of black provides depth and grounding, while white reflects clarity amidst chaos. The main collision occurs near the center, with red glitch-like patterns disrupting the smooth tide of blue, forming a dynamic visual tension. The seed's influence led to a zigzag and glitched effect, showcasing the pulse between emotions, while maintaining some negative space for balance.</desc>
