<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone juxtaposes defiance's angular intensity and submission's quiet receding. The palette reflects the theme of 'broken memory' with earthy hues and muted tones, suggesting weighty contemplation. The central row captures a surge of defiance using a flame-like pattern, while the surrounding rows slowly sink into submission, creating a sense of pressure and quietness. The main collision unfolds between the center and the edges, with a rhythmic pulse marked by an interruption of lighter shades against darker tones.</desc>
