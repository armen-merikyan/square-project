<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Dissonance</title>
  <desc id="desc">The emotional tone contrasts awe and terror, embodied by a palette of burnt orange, dark red, charcoal, and gold—colors that evoke both warmth and unease. The top rows use broken dot patterns to illustrate awe, with soft edges creating a gentle rhythm. In contrast, the bottom rows employ rain-like patterns conveying terror, creating a jagged, unstable feel. The collision occurs at the center where the warm hues clash with the dark, almost chaotic marks, representing the unstable balance between order and chaos.</desc>
