<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resilience</title>
  <desc id="desc">This square embodies the tension between destruction and creation, captured through colors and patterns that reflect the duality of spark (warm, vibrant) and ash (cool, muted). The palette combines warm brown and shelter green for the vibrant edge with pale skin and cold white juxtaposed within. The dominant warm tone occupies the outer border, representing the spark, while the cooler inner core symbolizes ash. The contrast sharpens as the jagged edges of the patterns collide, interrupted by pixel imperfections that hint at resilience’s fragility. The arrangement channels a dynamic flow, echoing memory vs erasure.</desc>
