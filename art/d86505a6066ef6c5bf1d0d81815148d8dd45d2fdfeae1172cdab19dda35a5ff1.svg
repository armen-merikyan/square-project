<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Friction of Affection</title>
  <desc id="desc">This artwork explores the emotional tension between love and betrayal through a careful juxtaposition of warm and cool colors, indicating the warmth of affection while also allowing sharp, dark interruptions that evoke feelings of betrayal. The chosen palette of pink, red, gray, and dark maroon emphasizes emotional depth and conflict. The contrast predominantly occurs in the diagonal rises, where warm shades collide with the darker edges, representing the sharp vs soft dichotomy. The broken edges allow for an organic flow, while the layout mimics falling pixels, generating a sense of descent from emotional highs to lows.</desc>
