<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">This composition captures the tension between 'spark' and 'ash', reflecting sudden ignitions amidst muted backgrounds. The palette, blending warm shadows with cool blues, sets an emotional stage of intimacy against distance. The main contrast occurs at the center, where jagged edges of warmth collide with soft, muted cool tones, creating a push-and-pull effect. Broken pixels represent interference, making the overall pattern feel dynamic and unstable, symbolizing resilience amidst fragility. The wave-like structure evokes a pulse, enhancing the abstract nature of the piece while maintaining readability at a thumbnail size.</desc>
