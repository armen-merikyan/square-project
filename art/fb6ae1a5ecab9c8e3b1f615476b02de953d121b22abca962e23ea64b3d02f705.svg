<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This piece embodies the tension between love and betrayal, using shades of pink and red to express warmth alongside deeper maroons and grays to introduce a sense of discord. The layout of paired warm colors creates the illusion of unity, while the strategic placement of darker tones introduces an unsettling contrast, echoing the emotional turmoil of a split heart. The arrangement features a balance of dense clusters alongside negative spaces, representing the chaos of a broken relationship. The seed inspired a diagonal flow, suggested by the crack pattern, which becomes a metaphor for disarray, while the flame-like swirls symbolize the lingering warmth of love. The combination aims to create a visual conflict that invites the viewer to reflect on the complexity of emotions in relationships.</desc>
