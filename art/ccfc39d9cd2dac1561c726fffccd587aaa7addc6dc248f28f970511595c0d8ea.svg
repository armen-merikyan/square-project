<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Static Pulse</title>
  <desc id="desc">The emotional tone juxtaposes clarity against overwhelming static. The selected palette features deep navy for sense of calm, contrasted by dim cyan to represent the interruptions and variations of noise. The main contrast occurs at the center, where clear 'signal' (represented by white accents) fights to emerge from the surrounding 'noise' (muted black tones). The arrangement echoes the battle of memories fighting against erasure, accentuating the idea of a readable rhythm struggling to break through interference.</desc>
