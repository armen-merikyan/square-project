<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This piece explores the dichotomy of envy and gratitude through contrasting colors and patterns. The left side utilizes a mirror pattern in shades of sepia and tan, representing envy—a reflection of self that often feels heavy and static. The right side embraces crosshatch patterns in faded blue tones, symbolizing gratitude, evoking lightness and movement. The layout is split vertically, heightening the contrast between these emotions, with broken pixels illustrating imperfection and adding a touch of chaos. This captures the emotional turbulence of gratitude trying to overcome the weight of envy.</desc>
