<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Certainty and Curiosity</title>
  <desc id="desc">This piece explores the emotional tension between certainty and curiosity through a collision of well-defined stripes (representing certainty) and soft veils of color (symbolizing curiosity). The palette, consisting of lime and electric blue, contrasts vibrant energy against the solid grounding of black and magenta, embodying the struggle between an ordered existence and the pull of the unknown. The layout spirals inward, with the main collision occurring towards the center—where the clarity of stripes is broken by unexpected swathes of veiled hues, reflecting the chaos within order and the subtle pressure of emerging curiosity against stable forms.</desc>
