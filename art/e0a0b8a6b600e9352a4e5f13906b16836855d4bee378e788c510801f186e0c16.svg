<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork explores the emotional contrast between vulnerability and strength, with a palette that evokes awe and terror. The deep teals and cosmic indigos serve as a dense backdrop representing strength, while the lighter accents of cold gold and stark white punctuate the piece, symbolizing vulnerability. The placement of pixels forms a mirrored but broken layout, creating a central area of exposure surrounded by layers of strength. The flow mimics an inward spiral, suggesting pressure converging in the center, with intentional disruptions to signify fragility and disturbance. Overall, the collision occurs at the center where lighter and darker tones interact, accentuating the central theme.</desc>
