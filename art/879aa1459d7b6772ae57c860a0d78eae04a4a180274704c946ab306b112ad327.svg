<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance in Tension</title>
  <desc id="desc">The emotional tone combines a sense of longing with resolve, reflected in the warm coral and soft amber colors depicting warmth and hope against the cool depths of cold slate and blue-black, which embody distance and introspection. The pattern exhibits a halo of longing on the outer edges with dense clusters toward the center emphasizing a collision of feelings. Intentionally broken pixels introduce elements of imperfection and disruption, echoing the jagged path of resolution amidst chaos, while the layout offers a 'broken frame' invoking a boundary of experience.</desc>
