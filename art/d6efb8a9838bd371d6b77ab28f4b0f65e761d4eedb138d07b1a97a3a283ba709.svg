<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">The emotional tone of this piece reflects the tension between vulnerability and strength, expressed through contrasting color choices and patterns. The 'tide' pattern representing vulnerability flows gently, while the 'stairs' pattern for strength rises sharply, creating an unresolved motion across the canvas. The palette of hot coral and blood orange against charcoal and hollow blue suggests an emotional landscape of desire and emptiness, forming a visual dialogue of warmth battling coolness. The main collision occurs centrally, where the strong edges of the coral clash against the soft hues, creating a rich textural balance. This abstract representation invites the viewer to reflect on the interplay of these contrasting emotions.</desc>
