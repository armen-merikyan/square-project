<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light Against Weight</title>
  <desc id="desc">This artwork represents the emotional tension between softness and severity, portrayed through a palette that juxtaposes warm whites and soft pinks against the starkness of black and steel gray. The layout features a corner invasion, where the gentle colors flow diagonally from the top-left corner, gradually becoming interrupted by the dark, crack-patterned areas. This collision creates a pulse-like rhythm, suggesting a push and pull between gentle pressure and biting severity, while the deliberate inclusion of broken pixels adds intentional imperfections, enhancing the narrative of conflicting emotions.</desc>
