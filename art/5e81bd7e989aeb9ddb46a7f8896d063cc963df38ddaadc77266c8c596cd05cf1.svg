<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition juxtaposes vulnerability and strength through a delicate interplay of warm whites and sharp crimson against a base of carbon black and steel gray. The center employs a pale base, representing unshielded light, while the perimeter features deeper colors that embody protection and stability. The collision occurs at the center, where light meets darkness, suggesting tension and unresolved emotion. The broken pixels introduce imperfection, reflecting the theme of vulnerability. The balance of warm and cool tones captures the push and pull of exposure and safety, creating an engaging abstract narrative.</desc>
