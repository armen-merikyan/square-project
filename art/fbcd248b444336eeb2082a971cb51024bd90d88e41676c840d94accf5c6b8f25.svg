<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">Emotional tone is a tension between defiance and submission, represented by the bold contrast of sharp crimson against the soft palette of powder pink and warm white. The center bursts with aggressive patterns reflecting defiance, while the edges recede into quieter fields, portraying submission. The flow is left to right, creating a dynamic path through the grid that suggests a struggle along the channel of negative space. The deliberate collision between the dense central area and the lighter periphery creates a powerful visual story of tension and resolution.</desc>
