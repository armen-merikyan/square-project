<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Strength in Vulnerability</title>
  <desc id="desc">The emotional tone is a complex interplay between strength and vulnerability, expressed through a palette that includes rich greens and soft creams. The contrast lies in the densely packed blocks of darker shades representing strength, against the soft and exposed pale cream center, symbolizing vulnerability. The collision occurs around the center, where the two themes interact—strength crowds into vulnerability, creating tension in the composition. The chosen shape seed of 'shell' reflects a protective yet exposed quality, shaping the overall abstract feel.</desc>
