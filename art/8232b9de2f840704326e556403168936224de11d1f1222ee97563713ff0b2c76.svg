<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">The artwork captures the tension between defiance and submission through contrasting pixel patterns. An angular arrangement of bright lime and electric blue suggests defiance, creating a feeling of upward pressure, while softer magenta and black tones recede into the background as they ripple through the composition, symbolizing submission. The center features a clash of colors where these emotions collide, highlighting the interaction between strong and subdued tones. This central tension, paired with an open corner layout, expresses the theme of conflict and balance, while broken pixels introduce an element of imperfection, enhancing the theme of disruption and collision inherent in the seed.</desc>
