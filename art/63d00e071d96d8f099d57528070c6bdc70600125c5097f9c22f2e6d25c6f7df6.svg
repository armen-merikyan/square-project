<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The composition expresses a dynamic tension between desire and emptiness, reflected in the use of warm and cool colors. The palette features shades of hot coral and blood orange to embody desire, contrasted against the hollow blue's coolness representing emptiness. The layout adheres to the 'empty room' concept, presenting mostly negative space with an interruption of color in the center, where desire peaks. This is complemented by the split screen pattern for emptiness and a mirrored pattern for desire, allowing their qualities to collide in the center. The intentional inclusion of broken pixels introduces a sense of imperfection and disruption, mirroring the emotional struggle of overflowing desire restrained by the edges of emptiness. The collision of saturated colors against subdued backgrounds highlights the ongoing conversation between these opposing emotional states.</desc>
