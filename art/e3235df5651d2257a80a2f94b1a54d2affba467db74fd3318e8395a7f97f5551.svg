  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone reflects a duality between restlessness and peace, using warm and cool colors to depict the struggle. The palette, featuring warm coral and cold slate, embodies this tension. The main contrast occurs diagonally, where bright warm accents clash against cool fields, creating a sense of interruption and unresolved motion. Patterns of dots symbolize restlessness while rings provide moments of containment, blending in the center for a dynamic rhythm.</desc>
