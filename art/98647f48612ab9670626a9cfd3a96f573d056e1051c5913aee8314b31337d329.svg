<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Dark</title>
  <desc id="desc">This piece explores the emotional tension between trust and suspicion, using a palette that juxtaposes warm coral and soft amber against cold slate and blue-black. The flow from the corner creates a dynamic diagonal invasion of warmth, symbolizing trust, while the maze pattern suggests the complexity of suspicion. The dominant warm tones (approximately 65% of the grid) highlight a sense of resilience amid fragility, while intentional broken pixels introduce an element of disruption, echoing the uncertainty inherent in the emotional landscape.</desc>
