<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order and Chaos</title>
  <desc id="desc">This composition embodies the emotional tug-of-war between tenderness and rage. The palette features saturated red and muted pale blue to highlight the contrasting feelings. The left side (tenderness) employs a glitch pattern, representing gentleness through soft overlaps, while the right side (rage) features jagged cracks that disrupt the calm. The collision occurs at the vertical center, splitting the square and allowing each emotion to dominate its respective area. This layout serves to visually narrate the internal struggle of guilt and forgiveness, as the chaos interrupts the quiet channel of tenderness.</desc>
