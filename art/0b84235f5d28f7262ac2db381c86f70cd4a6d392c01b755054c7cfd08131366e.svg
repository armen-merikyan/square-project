<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone of desire and restraint creates a tension where vibrant colors clash with muted tones. The selected palette features rich reds and soft creams, symbolizing deep yearning countered by the weight of limitation. The main collision occurs at the center—radiant reds cascading outward while muted creams form a secure border, reflecting the 'open gate' layout, which suggests an entrance into this ongoing struggle. The maze-like pattern embodies the complexity of desire, while the tide pattern reinforces the feeling of limitation, creating an absorbing dynamic that is vivid and thought-provoking.</desc>
