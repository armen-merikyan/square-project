<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects a juxtaposition of the delicate balance between safety and exposure. The palette combines muted shelter green and warm brown to convey safety, contrasted against a bright pale skin and open blue that suggest exposure. The collision occurs at the center, where the two patterns overlap, creating a dynamic tension. The edge style is left-weighted, reinforcing a feeling of pressure at the borders while maintaining soft, flowing patterns that symbolize release. The abstract composition invites contemplation on vulnerability and protection.</desc>
