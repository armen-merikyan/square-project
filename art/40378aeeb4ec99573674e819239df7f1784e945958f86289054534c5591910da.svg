<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This artwork captures the emotional tones of restlessness and peace through a dynamic interplay of densely packed colors in the lower left corner that gradually dissipate towards the upper right, suggesting a movement from chaos to tranquility. The chosen palette of deep blues and muted yellows evokes a sense of mourning contrasted with renewal. The main collision occurs at the center where dense pixels representing restlessness disrupt the pale fields of peace, creating tension and rhythm throughout the piece. The pixel arrangement symbolizes the struggle of memory versus motion as colors fragment and overlap, embodying the concept of a wound that seeks healing.</desc>
