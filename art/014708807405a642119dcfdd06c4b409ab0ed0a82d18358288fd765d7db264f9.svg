<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">The emotional tone of nostalgia versus progress is explored through dynamic contrasts, using a palette inspired by ancient fire. The burnt orange and dark red suggest warmth and memory, while charcoal and gold represent a more modern, stark progress. The arrangement plays with flow, creating a bottom-weighted feel where darker elements anchor the piece. The central area consists of radial patterns suggesting calmness, juxtaposed with the chaotic outer edges, symbolizing progress. This collision creates an interplay between dense clusters of emotion and quiet spaces, embodying the essence of rise and fall in a visually abstract narrative.</desc>
