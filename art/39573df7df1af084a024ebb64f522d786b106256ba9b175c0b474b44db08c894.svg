<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Serenity</title>
  <desc id="desc">The emotional tone captures the tension between restlessness and peace through a palette of deep navy and dim cyan, set against black for depth and contrast. The dominant dark colors reflect a sense of unrest, while the accents of white and cyan soften the piece, indicating fleeting moments of peace amidst chaos. The placement of colors follows a spiral pattern, with broken edges representing disruptions, enhancing the narrative of a struggle between calmness and movement. The main collision occurs in the center, where navy and white intersect, creating a visual tension that echoes the themes of memory and motion, illustrating how peace sometimes fragments under pressure.</desc>
