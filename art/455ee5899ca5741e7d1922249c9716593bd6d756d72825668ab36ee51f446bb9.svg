<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Clashing Signals</title>
  <desc id="desc">This piece embodies the emotional tension between fear and hope. The dark palette, consisting of black and dark violet, suggests the weight of fear, while the accents of soft gold and pale green represent glimmers of hope. The asymmetrical placement creates a dynamic contrast, where the rich colors press against the lighter tones, evoking a conversation between shadow and light. The layout feels like jagged edges colliding with soft waves, encapsulating that constant struggle of emotions like rising signals and rain. Negative space is intentionally left to reflect moments of calm amid chaos.</desc>
