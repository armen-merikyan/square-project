<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetrical Fracture</title>
  <desc id="desc">This artwork explores the emotional tug-of-war between joy and grief through contrasting color blocks. The chosen palette—warm yellow and orange juxtaposed against muted purple and deep blue—represents joy's vibrancy clashing with grief's heaviness. The pattern reflects a symmetrical layout that disrupts towards the center, illustrating the tension of emotional collision. The arrangement includes broken pixels to signify imperfection, enhancing the narrative of a fractured smile amidst sorrow. The top rows feature brighter hues, while the bottom transits into deeper shades, embodying the journey from light to shadow, with negative space allowing for contemplation.</desc>
