<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects the tension between peace and restlessness, embodied by a gentle blend of muted and vibrant colors. The 'melancholy_wonder' palette evokes a sense of quiet but layered complexity. The dominant color, a soft cyan, creates a tranquil base, while darker hues signal unease, especially at the edges. The collision occurs primarily in the center, where the light against dark dramatically interacts with the diagonal lines evoking movement. Patterns of 'negative_cross' and 'ladder' collide and weave, suggesting both structured memory and chaotic motion, leaving room for negative space to emphasize the contrast.</desc>
