<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Threads</title>
  <desc id="desc">The emotional tone of 'longing vs resolve' inspired a palette that balances quiet, muted colors with sporadic accents. The off-white and faint peach provide a serene base, while the compressed red adds a sense of urgency that pierces through the calm. The dark navy serves as a firm boundary, mirroring the concept of locked shapes and clear boundaries amidst the gaps of longing. The main collision is situated centrally, where the maze of longing meets the target of resolve, creating tension in the shared space. The application of broken pixels throughout the major patterns introduces an element of disruption, reflecting the complexity of repair and damage without being overtly literal.</desc>
