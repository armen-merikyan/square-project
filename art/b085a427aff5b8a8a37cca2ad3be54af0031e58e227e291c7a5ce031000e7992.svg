<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Desire and Restraint</title>
  <desc id="desc">The composition embodies the emotional tension between longing and limitation, using saturated colors to represent desire, contrasted with muted tones symbolizing restraint. A checker pattern reflects the chaotic pull of desire, while negative crosses create interruptions that emphasize the boundaries set by restraint. The central collision among vibrant hues at the right side creates an overwhelming force of passion, portraying the heart of the conflict, while the lower left corner retains a calm, muted presence, signifying the weight of containment. Overall, the artwork illustrates a struggle where one emotion dominates, yet is perpetually countered by the other.</desc>
