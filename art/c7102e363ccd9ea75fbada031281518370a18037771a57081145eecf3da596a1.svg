<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">This piece encapsulates the emotional contrast of envy and gratitude through the juxtaposition of bright colors against darker backgrounds. The palette selects electric blue to symbolize clarity and energy, lime for vibrant positivity, and deep black for the weight of envy. The arrangement features a central zigzag pattern that embodies 'stairs against noise'—which suggests growth amidst chaos. Each edge is heavier, oppressing the lighter center, creating a sense of visual struggle, echoing the delicate balance of emotions. Broken pixels introduce imperfection, symbolizing the disruption of clarity, while negative spaces speak to moments of calm between emotional waves.</desc>
