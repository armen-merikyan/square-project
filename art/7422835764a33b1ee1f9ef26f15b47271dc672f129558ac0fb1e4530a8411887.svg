<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Balance</title>
  <desc id="desc">This piece captures the duality of panic versus control through contrasting elements structured in a horizontal split. The top half features a radial pattern using electric blue and magenta to create a sense of chaos and urgency, symbolizing panic. Conversely, the bottom half employs a ring pattern with lime and black, evoking stability and control. The clashes between bright and dark colors showcase the emotional turmoil, while the broken pixels introduce a layer of imperfection and tension, implying that balance is constantly under threat. This arrangement reflects the inner struggle intrinsic to the seed concept while maintaining a distinct abstract form without literal representation.</desc>
