<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Resistance</title>
  <desc id="desc">Embodying the emotional duality of defiance and submission, this artwork represents an intense interplay where bold angular shapes push against softer, receding forms. The chosen palette of moss green, bone white, rust, stone gray, and small gold establishes a blend of resilience and fragility. The main collision occurs in the center, where vibrant colors disrupt the softer edges, creating a visual tension. The seed's concept of corner invasion informs the layout, leading to a crescendo of color towards the center in a spiral motion, portraying the struggle between dense versus empty spaces.</desc>
