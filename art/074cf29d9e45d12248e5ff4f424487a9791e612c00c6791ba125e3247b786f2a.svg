<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Yearning</title>
  <desc id="desc">The emotional tone captures the tension between emptiness and desire, expressed through the choice of a warm vs. cool palette with burnt orange and dark red contrasting against deeper charcoals. The left half embodies the empty, muted tones arranged in a stair pattern, suggesting a gradual decline, while the right half explodes into radial warmth, depicting desire's chaotic rise. The broken pixel elements disrupt potential symmetry, enhancing the theme of fragmentation and noise. The split vertical layout illustrates the duality and the push-pull dynamic, filled with echoes of warmth and voids.</desc>
