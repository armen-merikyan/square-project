<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Hearts</title>
  <desc id="desc">This artwork explores the emotional dichotomy of love and betrayal through contrasts in color and pattern. A warm palette of pinks and reds represents love, creating a gentle yet vibrant atmosphere, while the darker tones signify betrayal, introducing tension and unease. The layout adheres to the idea of an 'empty room' with intentional negative space, enhancing feelings of isolation and introspection. The juxtaposition of the diagonal rise and broken edges creates a dynamic rhythm that shifts from the sharp to the soft, embodying the emotional rise and fall of relationships. The pattern of stairs leading to a checkerboard creates a sense of ascent but also potential downfall, echoing the complex nature of love and betrayal. Overall, the composition captures a narrative of emotional conflict where warmth meets sharpness in an abstract format.</desc>
