<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balancing Weight</title>
  <desc id="desc">This artwork embodies the emotional tension between relief and dread through contrasting colors and patterns. The outer rows in charcoal and dark red illustrate the weight of dread, while the inner rows filled with burnt orange suggest moments of relief. The use of broken dots juxtaposed against a noise pattern encapsulates the disrupted symmetry reflecting the tension between stability and chaos. The top-weighted placement aligns with the seed's intent to explore how heaviness contrasts with lighter elements, creating a narrative of bottled emotion and fluctuating stability.</desc>
