<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Vessels</title>
  <desc id="desc">This artwork reflects the emotional tension between safety and exposure, utilizing a palette that juxtaposes warm browns (shelter) with cool blues (exposure). The central area embodies vulnerability through pale skin tones, while dense layers of dark greens and blues create a protective border, suggesting oscillation between safety and exposure. The pattern clashes between fractured (shatter) and structured (negative cross) forms, representing the two emotional states colliding in a dynamic split. The main collision occurs vertically, reflecting the 'split vertical' theme, allowing both emotional expressions to be felt prominently without overwhelming each other.</desc>
