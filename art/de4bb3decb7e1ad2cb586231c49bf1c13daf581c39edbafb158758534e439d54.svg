<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Emotion</title>
  <desc id="desc">The emotional tone captures the tension between tenderness and betrayal. The warm palette of pinks and reds represents love, contrasted sharply with cool grays and dark maroon to symbolize betrayal. The pattern is split diagonally: one side exhibits soft checker patterns for warmth, while the other employs broken dots to suggest disruption, creating an argument grid of emotions. The edges are faintly burned and uneven, depicting the scars left by conflict and the fragility of connection. Overall, the artwork invites introspection on the coexistence of love and betrayal.</desc>
