<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Duality</title>
  <desc id="desc">The emotional tone navigates the tension between trust and suspicion, reflected in color choices. The palette of cosmic indigo, void black, star white, cold gold, and deep teal establishes a balance between darkness and light, enhancing feelings of warmth and distance. The main collision arises in the border area, where the dark colors of suspicion clash with the brighter tones of trust. The concept of a 'broken frame' is portrayed through asymmetrical patterns representing stairs interspersed with constellations, evoking resilience amid fragility while allowing negative space to breathe and hint at uncertainty.</desc>
