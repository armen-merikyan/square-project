<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of the Gate</title>
  <desc id="desc">This piece embodies the tension between softness and severity. The warm palette features powder pink and warm white juxtaposed against sharp crimson and carbon black, creating a visual dialogue of both gentle nudges and harsh boundaries. The barcoded pattern on the outer edges represents severity, framing the softer static core which suggests gentleness and acceptance. The main collision occurs in the center with areas of overlap creating a pulse effect. This spiral counter-clockwise motion reflects the interplay of emotional marks against the radial tension, allowing exploration of guilt and forgiveness within the abstract form.</desc>
