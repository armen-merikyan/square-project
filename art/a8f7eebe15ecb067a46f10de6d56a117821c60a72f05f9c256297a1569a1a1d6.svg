  <title id="title">Clash of Emotions</title>
  <desc id="desc">The emotional tone reflects the duality between joy and grief, with a palette focusing on warm yellows and oranges contrasting against deep blues and muted purples. The left side embodies joy through maze-like patterns and spark-like accents, while the right showcases grief with crack-like interruptions and heavy darker colors. The broken pixels create a sense of imperfection, enhancing the narrative of complexity in emotion. The asymmetrical layout heightens the feeling of unresolved tensions, making the viewer engage with the collision between brightness and heaviness.</desc>
