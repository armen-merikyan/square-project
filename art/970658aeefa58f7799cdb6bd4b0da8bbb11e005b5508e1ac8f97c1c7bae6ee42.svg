<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Through Static</title>
  <desc id="desc">This artwork encapsulates the tension between order and chaos, reflecting the emotional struggle of a clean signal attempting to break through layers of noise. The selected palette features vibrant signal green and electric blue as dominant colors, representing clarity and rhythm, while static gray and dead black introduce a sense of interference and obstruction, culminating in a dynamic yet chaotic emotional landscape. The primary collision occurs centrally, where the quiet spaces from the gray are interrupted by the bold electric blue, illustrating the push and pull between recognizable order and overwhelming noise. This collage of patterns and colors defines a visceral experience of communication amidst distortion.</desc>
