<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">The emotional tone captures the duality of restlessness and peace, represented by warm and cool colors contrasting against each other. The palette includes 'rose_clay' and 'lamp_gold' as warm accents against the cool 'distant_lilac' and 'cool_blue', symbolizing the flame of emotion against the backdrop of tranquility. The main collision occurs in the center where patches of warm shades clash with cooler tones, creating a sense of interrupted peace, echoing the seed's themes of memory and motion. The layout of two small center pulses reflects the idea of conflicting energies—pulling toward and away from each other, surrounded by negative space to signify unease.</desc>
