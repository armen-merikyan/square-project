  <title id="title">Weight of Contrast</title>
  <desc id="desc">This artwork juxtaposes the emotional weights of relief and dread through contrasting visual elements. The palette of dark maroon and gray evokes a sense of heaviness, while pink introduces sporadic moments of brightness that symbolize relief. The top-weighted arrangement emphasizes the tension with darker colors dominating the upper rows, while lighter colors break through, suggesting a struggle between despair and hope. The broken pixel style introduces imperfections, reinforcing the theme of conflict, while the grid and spark patterns convey the clashing emotions in abstract forms.</desc>
