<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Ascent</title>
  <desc id="desc">The emotional tone of this artwork explores the duality of fear and hope. The selected color palette of black, dark violet, soft gold, and pale green represents the tension between darkness and light. The dense areas of color in the corners create a sense of heaviness, while the lighter center emerges from this darkness, suggesting a rising signal of hope. The zigzag pattern, echoing the struggle inward and outward, encapsulates the internal conflict—sharp contrasts in color reveal the interruption of fear against soft glimmers of hope. Broken pixels add visual imperfection, suggesting that both emotions coexist imperfectly.</desc>
