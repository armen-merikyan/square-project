<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone captures the tension between joy and grief, reflected through the interaction of warm and cool colors. The palette draws from vibrant yellows and oranges to convey joy, contrasted by muted purples and deep blues expressing grief. The layout evokes falling pixels, symbolizing tears or rain, where the collision occurs predominantly in the central horizontal division – joy through brighter stripes clashing against sadder, muted backgrounds. The seed influences the patterning, creating a dynamic of symmetry where joy attempts to break through the heaviness of grief. The subtle fragmented pixels add a sense of imperfection, echoing the complexities of emotional experiences.</desc>
