<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal in Static</title>
  <desc id="desc">This artwork embodies the tension between clarity and chaos, mirroring the struggle of a clean signal fighting through layers of noise. The palette of navy, black, white, and dim cyan signifies emotional depth and isolation, with navy representing the background of noise and black illustrating the static. White serves as an accent representing the fleeting moments of clarity. The layout starts in the corner, illustrating the invasion of signal through noise, while broken pixels add disruption and reflect the concept of memory vs. erasure. The interplay between the clean pulse and the scattered static conveys the narrative of persistence in chaos, inviting a reflection on clarity in a complex world.</desc>
