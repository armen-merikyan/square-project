<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonant Static</title>
  <desc id="desc">The emotional tone of the piece centers on the conflict between clarity and interference, embodying the ideas of 'signal' and 'noise'. With dominant dark contrasts of navy and black representing noise, punctuated by bursts of dim cyan and a touch of white that simulate clear accents or 'signal', the palette encapsulates the struggle between chaos and clarity. The main collision occurs in the center, where the brighter colors clash against the dark background, mimicking the tension of a readable pulse amidst overwhelming static. This grid of colors reflects the random, fractured cadence of memory against the relentless push of noise, all while contemplating the themes of exposure versus shelter and connection versus isolation.</desc>
