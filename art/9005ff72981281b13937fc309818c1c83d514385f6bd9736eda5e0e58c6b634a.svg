<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collisions of Emotion</title>
  <desc id="desc">The emotional tone is captured through a juxtaposition of dark and light colors, reflecting the tension between pressure and quiet. The palette, featuring deep blacks (#000000), vibrant reds (#FF5722), and soft pinks (#FFB3BA), embodies the raw emotion and spontaneity of collisions. Main contrasts emerge where the dark hits the bright—indicating moments of conflict. The pattern is structured asymmetrically to echo the unpredictable rhythm of emotions; some areas are densely packed while others remain quiet. This reflects the complex interplay of feelings from the seed.</desc>
