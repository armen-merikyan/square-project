<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece captures the emotional tone of 'rage vs calm' by juxtaposing dynamic, jagged patterns representing anger with smoother, expansive patterns embodying tranquility. The palette contrasts vibrant reds and blacks—symbolizing rage—with calming pale blues and whites, emphasizing the conflict between turbulent energy and serene space. The composition features a split layout where intense colors dominate the left side, while the right embodies a quieter field, illustrating a struggle between containment and overflow. The tension builds at the center where patterns clash, creating moments of pressure and release.</desc>
