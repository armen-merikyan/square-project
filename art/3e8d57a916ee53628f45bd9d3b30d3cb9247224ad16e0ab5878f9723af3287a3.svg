<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Containment</title>
  <desc id="desc">The piece embodies the emotional tension between longing and resolve, using bold contrasts between warmth and coolness. The chosen palette of yellow and orange connotes urgency and hope against deep blue and muted purple representing calm and introspection. The primary collision occurs in the top left corner, creating a pressure point as warm tones spill into quieter spaces, simulating the struggle between overflow and containment. The presence of broken pixels subtly emphasizes themes of repair and damage, echoing the essence of scars versus healing within the overall pattern.</desc>
