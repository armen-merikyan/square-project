<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This artwork explores the emotional dichotomy between restlessness and peace. The palette of warm shadow and cool blue represents this contrast effectively, with cooler tones suggesting tranquility while warmer tones bring an unsettling vibrance. The collision occurs in the center with a denser cluster of darker hues, portraying a struggle against the lighter, calmer edges. The use of broken pixels implies disruptions in peace, symbolizing the tiny fractures in calmness that memory and motion can instigate, while the structured flow from right to left reinforces a sense of journey through turmoil towards serenity.</desc>
