<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order Amidst Chaos</title>
  <desc id="desc">The composition contrasts controlled patterns and chaotic overflow, symbolizing the tension between restraint and release. The 'melancholy_wonder' palette reflects the emotional undertones, with muted plum and soft cyan dominating to convey a feeling of introspection. The rows representing control have defined stair-like patterns while the surrender rows break from these, creating visual disruptions that reflect the seed's duality. The central area bursts with color, embodying overflow, while the edges maintain a structured feeling. Overall, the arrangement illustrates the struggle between finding order and embracing chaos.</desc>
