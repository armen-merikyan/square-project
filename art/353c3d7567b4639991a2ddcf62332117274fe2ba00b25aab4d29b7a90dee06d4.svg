<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs. Shelter</title>
  <desc id="desc">This piece captures the emotional tone of vulnerability and protection through a color palette that balances warm browns and soft greens with cool whites and a pale pink. The 8x8 grid uses a diagonal argument layout, with the warm tones (safety) occupying the bottom-left and the cool tones (exposure) thrusting into the upper-right. The broken edges signify the fragility of safety, while the thread patterns evoke a sense of ongoing tension between these two emotional states. The contrast peaks where the colors collide, particularly in the transition area, suggesting a constant push and pull between exposure and shelter.</desc>
