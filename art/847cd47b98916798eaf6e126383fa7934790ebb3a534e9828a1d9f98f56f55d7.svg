<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Contrast</title>
  <desc id="desc">This composition captures the emotional tension between signal and noise through a palette that blends sharp, luminous tones with muted, static greys. The outer edges, using deep blacks and grays, embody the noise, while the inner core utilizes vibrant greens and magentas representing clarity and interruption. The layout supports a 'frame and core' structure where the central pulse of color is designed to be read against the chaotic noise surrounding it. The intentional placement of broken pixels reflects the imperfections of memory, merging the structured 'signal' within an overwhelming field of 'noise.'</desc>
