<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This artwork explores the emotional duality of joy versus grief through color contrast and texture. The top half represents joy with alternating warm yellows and oranges, arranged in a rhythmic stripe pattern, suggesting expansion and brightness. The bottom half embodies grief with deep blue and muted purple, comprised of a largely chaotic split-screen pattern that conveys heaviness and introspection. The palette transitions from cheerful warmth to somber coolness, with interruptions where the colors collide, enhancing the emotional tension of the piece. Broken pixels create an imperfect flow that mirrors the inherent unpredictability of emotions.</desc>
