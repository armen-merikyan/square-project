  <title id="title">Tension in Contrast</title>
  <desc id="desc">The emotional tone juxtaposes awe and terror, revealing both beauty and chaos. The selected palette of deep blacks and dark violets represents the weight of fear, contrasted with soft golds and pale greens that evoke a sense of hope and wonder. The main collision occurs where deeper tones clash with lighter hues, encapsulating the fragile balance between stability and instability. The composition follows a split screen layout where each half engages in a quiet struggle, supported by broken edges that suggest imperfection and vulnerability.</desc>
