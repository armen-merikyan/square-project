<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tension</title>
  <desc id="desc">This artwork explores the emotional tension between rage and calm, using a palette that juxtaposes the heat of red with the softness of pale blue and black. The clash of jagged red marks cutting into the smoother blue stripes represents the overflow of emotion against the muted background, embodying the concept of a veil that both reveals and conceals feelings. The main contrast occurs at the center where the red overflow interrupts the calm blue, creating an emotional collision. The broken pixels add imperfections, symbolizing the disruption inherent in managing such intense feelings.</desc>
