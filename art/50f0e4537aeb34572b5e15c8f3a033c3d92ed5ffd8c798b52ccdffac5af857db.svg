<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Motion</title>
  <desc id="desc">The emotional tone oscillates between a calm, expansive peace and an unsettling restlessness. The chosen palette combines soft pastels for peace (pale mint and soft sky) against deep shades (storm gray and near black) to symbolize tension. The arrangement highlights the diagonal argument, where the cooler colors dominate one half, emphasizing peace, while the darker shades disrupt this calm, creating a fragmented rhythm. The broken frame pattern introduces intentional imperfections, resonating with the restlessness theme, while hints of faded gold add warmth—a fleeting moment of serenity amidst chaos.</desc>
