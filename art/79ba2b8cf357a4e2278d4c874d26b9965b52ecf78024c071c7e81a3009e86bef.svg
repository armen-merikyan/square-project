<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition embodies the tension between longing and limitation, using a palette that juxtaposes warm, saturated tones against cooler, muted colors. The vibrant hues of hot coral and blood orange represent desire, while the charcoal and hollow blue evoke a sense of emptiness and restraint. The arrangement creates a central collision point of colors, illustrating the struggle of unfulfilled wants surrounded by boundaries. The use of broken pixels introduces disruptions, reflecting imperfections and the chaotic nature of desire. This abstract pattern captures a feeling of dense pressure mingled with quiet spaces, emphasizing the emotional weight of longing.</desc>
