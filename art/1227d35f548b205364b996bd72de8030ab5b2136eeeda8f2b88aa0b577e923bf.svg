<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Spiral</title>
  <desc id="desc">The emotional juxtaposition of defiance and submission is mirrored in the color choices: bold compressed reds and deep dark navy clash with softer off-white and dust gray. The dominant presence of the compressed red represents defiance, creating a striking focal point that spirals inward while the surrounding muted colors suggest submission and quiet tension. The layout centers around a highlighted area, reflecting both an attack and a retreat through the collision of brightness in the center against the quiet fields at the edges, reinforcing the push and pull of these emotions.</desc>
