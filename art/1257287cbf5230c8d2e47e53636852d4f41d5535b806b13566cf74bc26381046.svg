<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tensions</title>
  <desc id="desc">This artwork captures the tension between awe and terror through color contrasts and abstract patterns. The palette of black, dark violet, soft gold, and pale green represents a spectrum from darkness to light, suggesting hope amidst fear. The left side, reflecting 'awe', uses a staircase pattern with soft edges to create a sense of upward movement and stability, while the right side embodies 'terror' with flame patterns that disrupt and break through order, producing instability. The overall contrast occurs in the central division, creating a deliberate split that reflects the emotional contrast of the seed. Broken pixels introduce imperfection, mirroring fragmented memory and further enhancing the sense of chaos against the calm.</desc>
