<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Desire</title>
  <desc id="desc">The emotional tone captures the tension between emptiness and desire, represented through contrasting colors. The chosen palette of deep black and dark violet suggests a void, while soft gold and pale green symbolize longing and hope. The left side employs a maze pattern to evoke emptiness with dark tones, while the right side mirrors the pulse of desire with a warm, golden reflection, creating a dynamic interplay of feeling. Hard edges on the transition evoke the fragile nature of shifting emotions, where desire collides with the stark reality of emptiness.</desc>
