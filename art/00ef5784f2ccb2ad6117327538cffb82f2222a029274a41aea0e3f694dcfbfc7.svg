<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Balance</title>
  <desc id="desc">This artwork embodies the emotional tension between control and panic, using a palette of lime, black, electric blue, and magenta to convey disruption and calmness. The left side echoes order through structured patterns of grid-like precision, while the right side erupts into chaotic arrangements, contrasting the calm with an intensified energy. The burned edges create a sense of rawness, suggesting a heaviness of emotion. The placement ensures negative space, evoking a feeling of unrest amidst the chaos, with areas of calm pushing against the fray. The zigzag motif symbolizes an uncontrollable spark against a rigid framework, seamlessly blending the emotions together without clear boundaries, hinting at the complexities of joy and grief.</desc>
