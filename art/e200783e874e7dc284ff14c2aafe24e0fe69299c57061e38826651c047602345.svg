  <title id="title">Tension Between Boundaries</title>
  <desc id="desc">This artwork translates the emotional tension of defiance contrasted with submission, represented through an interplay of colors and patterns. The chosen palette of pale mint and storm gray evokes both calm and starkness, suggesting conflict. The center is bright and saturated to symbolize defiance, while the darker edges create a sense of enclosure, reflective of submission. Broken pixels add irregularity, emphasizing the struggle between order and chaos, and the overall composition leads the eye from the vibrant center outward, illustrating the push and pull between opposing emotions.</desc>
