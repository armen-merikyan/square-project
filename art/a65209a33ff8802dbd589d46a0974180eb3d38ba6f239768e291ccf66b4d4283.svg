<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Echoes</title>
  <desc id="desc">This artwork encapsulates the emotional duel of love and betrayal through color and pattern. The chosen palette of warm pinks and reds signifies love's warmth, while the deep gray and dark maroon act as shadows of betrayal, creating an atmospheric tension. The left side features a structured staircase pattern representing love, while the right side opts for a chaotic checker pattern suggesting betrayal, creating clear emotional contrast. Key collisions occur where these two sides meet, enhancing the narrative of disruption and unresolved tension inherent in relationships. Broken pixels and hard edges disrupt harmony, reinforcing the theme of fractured emotions. Overall, the piece captures the complex interplay between intimacy, danger, and emotional turmoil.</desc>
