<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light and Weight</title>
  <desc id="desc">This artwork captures the emotional tension between relief and dread, using a palette that evokes the muted tones of memory and echo. The warm tones symbolize the warmth of relief, while the cool colors represent the heaviness of dread. Contrast emerges from the darker shades dominating the left side, interrupted by lighter accents that suggest moments of hope—creating a visual interplay of top-weighted heaviness against the lighter shapes below. The arrangement mimics a split pattern, reflecting the emotional duality of the seed; creating an abstract narrative of struggle and balance.</desc>
