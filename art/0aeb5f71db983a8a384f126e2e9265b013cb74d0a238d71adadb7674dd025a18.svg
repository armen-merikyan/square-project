<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition captures the tension between loneliness and connection through color placement and negative space. The left side, representing loneliness, uses darker tones to create a weighty effect, with a solitary pale green dot representing a single connection in an ocean of black. The right side embodies connection with muted golds and greens that stimulate interaction, emerging from the shadows but still showing hints of darkness. The diagonal flow from left to right emphasizes the shift from isolation to engagement. The broken pixels disrupt the symmetry, symbolizing imperfection in memory and connection, resulting in a thoughtfully abstract narrative.</desc>
