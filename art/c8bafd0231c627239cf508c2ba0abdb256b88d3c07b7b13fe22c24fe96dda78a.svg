<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Depths</title>
  <desc id="desc">This composition embodies the tension between softness and severity. The palette of powder pink, warm white, carbon black, and sharp crimson reflects the emotional dynamics, with pink and white providing a gentle backdrop, interrupted by stark black and red accents that create moments of gravity and collision. The light colors spill over from the center, creating a halo effect that contrasts with the darker tones at the edges, representing the ‘broken pixels’ that disrupt the flow. The overall effect is a sense of structured chaos, echoing the emotional interplay outlined in the seed, evoking feelings of guilt and forgiveness colliding with stark clarity.</desc>
