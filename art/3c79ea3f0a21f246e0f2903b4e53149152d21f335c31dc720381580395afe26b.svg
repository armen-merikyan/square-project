<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Desire and Emptiness</title>
  <desc id="desc">The emotional tone of this piece captures the tension between desire and emptiness, using a palette rooted in warm sepia and cool faded blue. Actual placements suggest a rising signal amidst a dark weight, with light colors spiraling clockwise, representing desire bursting through thick layers of emptiness. The warm colors at the edges reflect the longing, while the cooler, darker shades at the core signify isolation. The interplay of these elements culminates in a visual conflict throughout the square, enhancing the notion of a heart fragment, suggesting a profound yet fleeting longing amid stillness.</desc>
