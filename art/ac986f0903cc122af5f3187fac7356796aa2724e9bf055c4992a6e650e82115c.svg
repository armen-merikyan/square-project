<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry Fractured</title>
  <desc id="desc">The composition embodies the emotional tension between control and panic, using a palette dominated by dark tones of navy and black, interspersed with hints of dim cyan and white. The outer border reflects control with structured, consistent colors representing a grid-like order, while the inner 4x4 area expresses panic and chaos through broken pixel arrangements and abrupt color changes. The main collision occurs where the defined structure meets the chaotic core, suggesting a struggle between two opposing forces, effectively capturing the duality from the seed. Negative space is maintained to evoke a sense of emptiness amidst turmoil, further enhancing the artwork's emotional depth.</desc>
