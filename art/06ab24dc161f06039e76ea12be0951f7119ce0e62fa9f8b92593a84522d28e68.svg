<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of a Diagonal Heart</title>
  <desc id="desc">This artwork embodies the emotional duality of longing and resolve through a carefully chosen palette of deep blues and mourning blacks contrasted by the soft light of pale yellow. The diagonal layout emphasizes the collision of these emotions, with longing represented by fluid, flowing patterns in the top left, while resolve claims the structured crosshatch in the bottom right. The central area presents tension, where both emotions fight for space, creating a visual conversation of intimacy and distance. Broken pixels are interspersed to introduce imperfection, symbolizing the disruption caused by emotional conflict.</desc>
