<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Order</title>
  <desc id="desc">This piece explores the tension between clarity and confusion through a palette that merges warmth and depth. The burnt orange and dark red evoke a sense of turmoil and friction, symbolizing the chaos of falling pixels, while the gold serves as a thread of clarity peeking through. The layout suggests a rising signal, with a flow from right to left that creates a sense of movement and escape. The contrast of softer transitions against sharp boundaries between colors enhances the juxtaposition of clarity against confusion, embodying the theme of broken symmetry. The broken pixels are intentionally scattered to introduce imperfection without overwhelming the negative space, ensuring the composition resonates with emotional complexity.</desc>
