<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This artwork explores the tension between joy and grief through a pattern that contrasts structured warmth with fragmented coolness. The palette of warm yellows and oranges represents the spark of joy, while the muted blues and purples symbolize grief. The left side uses a checker pattern (joy) to evoke a sense of playful order, while the right adopts a stair-like arrangement (grief) to represent the descent into fragmented emotion. The thick outline adds weight, reinforcing the feeling of being trapped between these contrasting states. Broken pixels disrupt the symmetry, embodying the inherent conflict between joy and grief, suggesting an unresolved tension.</desc>
