<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone juxtaposes desire, represented by warm, saturated colors, against the void of emptiness via cooler, muted tones. The palette of hot coral and blood orange signifies urgency and a yearning pull, while charcoal and hollow blue evoke a sense of hollowness and distance. The collision occurs predominantly at the center, where warmth disrupts a quiet field, hinting at a restrained expansion against a dark backdrop. The layout embodies an 'open gate', allowing desire to emerge while still presenting the borders of containment.</desc>
