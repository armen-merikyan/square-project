<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Within Static</title>
  <desc id="desc">The emotional tone reflects the tension between the clean, bright pulses of signal against the blurring chaos of noise. The palette features contrasting colors: 'signal green' and 'electric blue' represent clarity and intention, while 'static gray' and 'dead black' convey a sense of heaviness and interference. The dominant presence of darker hues underscores the struggle of the 'signal' amid chaos. The main collision exists centrally, where the bright colors interact with more muted tones, suggesting the battle between clarity and distortion. The layout captures an overfilled center that radiates outward, demonstrating how the signal attempts to break free from surrounding noise.</desc>
