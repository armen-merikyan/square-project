<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory vs Motion</title>
  <desc id="desc">The emotional tone of the artwork plays on the conflict between control and surrender. The palette of moss green, bone white, rust, stone gray, and small gold captures a sense of resilience against fragility, illustrating the push and pull of these feelings. The main contrast occurs in the center where the thick rust outline breaks away, symbolizing pressure vs. release. The arrangement suggests a spark of emotion amidst channels of control, echoing the intricacies of memory enveloped in motion, represented by the flow of colors across the densely packed center and fading edges.</desc>
