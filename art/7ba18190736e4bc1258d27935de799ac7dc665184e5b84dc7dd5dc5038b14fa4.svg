<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Tension</title>
  <desc id="desc">This abstract artwork symbolizes the emotional tension between fear and hope through its color choices and composition. The palette combines deep blacks and dark violets to represent fear, contrasted with soft gold and pale green, embodying hope. The central area features dense, jagged patterns that create a sense of pressure and noise, suggesting fear's weight, while lighter hues radiate from the center, embodying hope's upward flow. The rough edges contrast the smooth areas, enhancing the emotional conflict of exposure versus concealment. This duality is further reflected in the layout, which presents a meaningful yet minimal central shape surrounded by negative space, echoing the split between encroaching fear and distant hope.</desc>
