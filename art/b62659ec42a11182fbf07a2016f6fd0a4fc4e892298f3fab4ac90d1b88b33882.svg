<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Comfort</title>
  <desc id="desc">This piece captures the tension between safety and exposure through gradients of warmth and coolness. The palette combines 'shelter_green' and 'warm_brown' for security and softness, while 'pale_skin' and 'cold_white' represent vulnerability. The central collision occurs between soft stripes of exposure and a heavier threshold framework that attempts to encapsulate the lightness of the center. This balance creates an emotional rhythm, wherein shades of lighter colors play a subtle echo against the broader weight of the darker hues. The broken pixels serve as interruptions, symbolizing the scars of vulnerability in the quest for safety.</desc>
