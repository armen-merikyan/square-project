<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Control</title>
  <desc id="desc">This piece embodies the emotional conflict between panic and control through a stark contrast in color and texture. The palette, derived from muted sepia tones and faded blues, conveys a sense of nostalgia intertwined with anxiety, creating a nostalgic yet tense atmosphere. The left half, favoring 'control', utilizes a ring pattern suggesting stability, while the right half employs a fragmented pattern indicative of 'panic'. The jagged edges amplify the sensation of disruption, while negative space carefully maintains a tension throughout the piece, allowing for breathing room amidst chaos. Collisions of dark vs. light hues provide a stark contrast, emphasizing the struggle between the two emotions, where every pixel placement enhances the artwork's dynamic narrative.</desc>
