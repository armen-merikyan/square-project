  <title id="title">Boundaries of Yearning</title>
  <desc id="desc">This artwork contrasts the warmth of desire with the cooler tones representing restraint. The top half, dominated by saturated yellows and pinks, evokes a vibrant yearning, while the bottom half incorporates blues and grays to signify containment. The broken pixels intentionally disrupt the flow, suggesting moments of hesitation amidst emotional urgency. The central collision of colors at the midpoint emphasizes the struggle between these opposing forces, embodying the seed's themes of desire entangled with restraint.</desc>
