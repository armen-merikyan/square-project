<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">This composition explores the duality between envy and gratitude, creating a visual tension that resonates with the emotional conflicts presented. The palette includes deep black and dark violet, representing the heavier emotions of envy, contrasted against soft gold and pale green, evoking feelings of gratitude and hope. The center features darker, denser colors, symbolizing the weight of envy, while the edges transition to lighter, softer hues, illustrating the gentle lift of gratitude. The jagged edges create interruptions, echoing the dissonance of emotions, while the flow from bottom to top symbolizes a rising conflict that yearns for resolution, reflecting the push-pull of the emotional narratives that inspired the piece.</desc>
