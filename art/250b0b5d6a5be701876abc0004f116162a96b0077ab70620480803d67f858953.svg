<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tides of Resilience</title>
  <desc id="desc">This piece captures the emotional tension between vulnerability and strength. The palette features muted tones of moss green and stone gray to create a sense of groundedness, contrasted with the warmer rust and small gold that symbolize moments of resilience and breakthroughs. The layout includes a strong outer border representing strength and a delicate inner core where vulnerability lives, mimicking the way strength can often feel like a protective shell around an exposed center. The broken pixels serve as scars, echoing imperfections, with the main collision occurring centrally where patterns of 'glitch' and 'halo' meet, representing the complex journey from fragility to durability. The flow of wave_vertical reflects the idea of cycles and the ongoing nature of these emotions.</desc>
