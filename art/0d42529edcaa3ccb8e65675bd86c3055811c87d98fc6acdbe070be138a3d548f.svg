<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Silent Tensions</title>
  <desc id="desc">This artwork captures the collision between fear and hope through its contrasting dark and light colors, suggesting a push-and-pull dynamic. The palette of black, dark violet, soft gold, and pale green evokes a tension between shadowy anxiety and gentle optimism. The edge style is weighted left, creating an asymmetrical balance that feels both confined and expansive. The checker pattern for hope and the flame pattern for fear interplay throughout, allowing sections of calm and pressure to collide and release tension, emblematic of emotional conflict. The central space remains somewhat empty, contributing to the overall feeling of unresolved conflict, complementing the emotional weight of the seed.</desc>
