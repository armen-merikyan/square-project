<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Boundless Tension</title>
  <desc id="desc">This artwork embodies the emotional duality of desire and restraint. The color palette, with the warm red_oxide and small_orange clashing against the cooler iron_gray and blackened_plum, symbolizes the tension between a passionate pull and a contained frame. The radial pattern representing desire sweeps across the canvas, meeting the structured flood of restraint, creating a delicate balance of chaos and order. The main collision occurs towards the center, drawing the eye and emphasizing the dynamic push and pull of these emotions. The negative spaces contribute to the feelings of longing and absence, enhancing the overall impact of the composition.</desc>
