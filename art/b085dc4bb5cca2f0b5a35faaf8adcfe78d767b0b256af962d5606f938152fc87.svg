<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Pulse</title>
  <desc id="desc">The composition explores the emotional tension between emptiness and desire through a split layout. The left side, representing emptiness, uses a pattern of soft dotted textures in muted and grayed tones to evoke a sense of quiet isolation and longing. In contrast, the right side represents desire, where warmer, radial patterns create a sense of movement and energy. The edges feature sharp contrasts, symbolizing the collision of feelings. The burned edges in the palette incorporate warm and cool shades, capturing the spectrum of emotion from faded memories to intense longing, resulting in a dynamic yet unresolved narrative.</desc>
