<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone encapsulates a struggle between restlessness and peace. The palette—featuring stain brown, ash gray, warm ivory, soft gold, and deep wine—was selected to reflect the complexity of these emotions. Dark and muted colors suggest areas of tension and disturbance, while warm ivory and gold provide gentle accents, echoing moments of calm and clarity. The primary collision happens diagonally, where dense gray and brown colors rise while lighter tones in beige and gold cascade down. The arrangement captures the conflicting pull between memory and motion, with broken pixels representing moments of interruption. Negative spaces add breathability while still honoring the layering of emotional depth.</desc>
