<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">The emotional tone plays between the warmth of longing and the firmness of resolve. The chosen palette reflects soft sky hues contrasted with deep storm gray and near black, creating a sense of tension. The main collision occurs centrally with dense patterns of 'stairs' (resolve) clashing with delicate 'crack' motifs (longing), allowing the two emotional states to interact yet remain distinct. The use of broken pixels introduces intentional disruptions that symbolize the imperfections in emotional expressions, while maintaining at least 10% negative space ensures the piece breathes without overwhelming order.</desc>
