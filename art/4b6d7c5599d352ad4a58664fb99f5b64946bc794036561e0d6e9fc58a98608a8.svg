<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This composition explores the emotional dichotomy of restlessness and peace by using a palette that juxtaposes softer hues against deeper, more pronounced colors. The warm pinks and reds represent the agitation and fervor of restlessness, while the gray and dark maroon signify a grounding peacefulness. The arrangement features a spiral layout, where patches of peace are interrupted by restless motifs, creating dynamic tension. The main collision occurs in the central region, where vibrant colors clash and retreat against calmer tones, embodying the struggle between movement and stillness, encapsulated in the seed concept.</desc>
