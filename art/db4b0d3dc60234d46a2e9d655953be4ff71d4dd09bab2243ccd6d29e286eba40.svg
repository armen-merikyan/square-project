<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Presence</title>
  <desc id="desc">The emotional tone captures the struggle between emptiness and desire. The chosen palette features contrasting warm (red) and cool (pale_blue) tones, embodying the pull of desire against the backdrop of emptiness. The layout emphasizes a central seed shape surrounded by jagged edges that visually represent pressure and noise. The density of the red stripes suggests desire breaking through the surrounding emptiness symbolized by the cooler colors. Broken pixels add paradoxical imperfections, enhancing the tension without depicting recognizable forms.</desc>
