<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone is grounded in the tension between vulnerability and strength, visualized through a palette that contrasts soft, warm colors with stark, deep shades. The use of powder pink and warm white evokes tenderness, while carbon black and steel gray assert a bold presence. The main collision occurs at the borders with strong edges, providing a frame for the softer center, creating a dynamic push and pull between exposure and protection. The random broken pixels introduce imperfection, symbolizing the scars of vulnerability and the complexity of strength. The arrangement flows in stacked bands, emphasizing emotional strata and depth.</desc>
