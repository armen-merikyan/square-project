  <title id="title">Emotional Collision</title>
  <desc id="desc">This artwork explores the tension between control and surrender, represented by a structured yet subtly fragmented pattern. The palette of rain blue, lavender gray, moon white, soft cyan, and muted plum evokes a feeling of melancholy wonder, capturing both cool restraint and soft yielding. The main collision occurs at the center, where the tighter ash field pattern for control meets the more chaotic patchwork representing surrender, inviting contemplation of each emotion's space and overlap while leaving intentional negative space for balance.</desc>
