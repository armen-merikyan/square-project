  <title id="title">Fractured Harmony</title>
  <desc id="desc">This piece captures the emotional tension between love and betrayal through warm and cool tones that clash yet resonate. The palette mixes soft pinks and reds with darker maroon shades to evoke warmth and danger in contrast. The arrangement features a core of dense color suggesting intimacy, bordered by lighter, fragmented edges symbolizing betrayal and disruption. The resulting pattern feels both harmonious and tense, echoing the interplay of beauty and pain inherent in relationships.</desc>
