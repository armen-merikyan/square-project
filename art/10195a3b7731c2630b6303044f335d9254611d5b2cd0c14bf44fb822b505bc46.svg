<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ember's Dichotomy</title>
  <desc id="desc">The emotional tone reflects a dynamic interplay between vulnerability and strength, encapsulated in a split vertical layout where the left side branches into muted textures and the right side expresses a bold, rhythmic crosshatch. The chosen palette evokes resilience with earthy moss green and bone white juxtaposed against rusty accents, generating a strong visual impact. The main collision occurs at the center, where the delicate patterns of vulnerability intersect with the strong framework of strength, symbolizing an emotional braid that holds yet frays. The arrangement of broken pixels introduces a sense of imperfection, suggesting that within strength lies a fragility that cannot be ignored.</desc>
