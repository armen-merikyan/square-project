<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Containment</title>
  <desc id="desc">This piece explores the emotional conflict between desire and restraint through contrasting color intensities and placement. The hot coral and blood orange represent desire, emerging from the center and pushing against the muted edges of charcoal and hollow blue, symbolizing restraint. The use of the stepwell and echo patterns creates dynamics of movement and collision, with the saturation peaking in the center and gradually cooling towards the borders. Broken pixels add to the narrative of imperfection, reflecting the struggle between wanting and holding back.</desc>
