<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow and Containment</title>
  <desc id="desc">The emotional tone of this piece reflects the tension between desire and restraint. The palette mixes warm, saturated reds and muted plums to evoke a push-and-pull sensation. The main collision occurs in the center where the bright peaks of warm colors compete against cooler, contained edges, creating a vivid burst amidst a restrained backdrop. Patterns of pressure and stacks play against each other, embodying the struggle encapsulated in the seed's themes of conflict and dichotomy, thus translating abstract emotions into a visual narrative.</desc>
