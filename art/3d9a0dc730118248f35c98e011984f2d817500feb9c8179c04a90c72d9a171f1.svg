<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Static</title>
  <desc id="desc">This composition captures the emotional tension between clarity and chaos, echoing the constant struggle of a discernible signal against overwhelming noise. The palette is dominated by deep navy and black to evoke the presence of noise, punctuated by bright white and dim cyan, representing the fragile signal trying to emerge. The primary collision occurs at the center, where legible rhythms intersect with chaotic patterns, suggesting a conflict between order and disruption. This arrangement mimics the themes of exposure and shelter, encapsulating the fleeting nature of memory amidst distortion.</desc>
