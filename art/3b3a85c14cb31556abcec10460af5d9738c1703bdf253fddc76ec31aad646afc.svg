<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory Waves</title>
  <desc id="desc">The emotional tone captures the dichotomy of fleeting brilliance (spark) against the lingering weight of decay (ash). The palette of deep blue, pale yellow, and mourning black creates a contrast where the warmer hues represent light and spark, while the darker tones embody ash and restraint. The collision occurs in the center, where barcode patterns (representing spark) clash with the pressure bands (representing ash), interrupting each other and creating a tension that reflects resilience amidst fragility. The resulting abstract pattern reflects the struggle between memory and movement, light and shadow, highlighting how emotions can interweave and disrupt.</desc>
