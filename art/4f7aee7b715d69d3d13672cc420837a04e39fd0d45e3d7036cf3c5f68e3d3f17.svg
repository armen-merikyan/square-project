<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece reflects the emotional tension between vulnerability and strength, utilizing a palette of warm and muted tones to highlight conflict. The colors hot coral and blood orange embody warmth and strength, while dust pink acts as a soft, vulnerable highlight. Charcoal introduces the weight of pressure, creating a dynamic contrast with the hollow blue, suggesting a loss or an absence. The main collision occurs in the center, where dense, warm embers draw focus, amidst a quieter backdrop, embodying the idea of exposure within a protective framework. This arrangement evokes a narrative of safety intertwined with exposure, addressing the fragility and resilience of the human experience.</desc>
