<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone here embodies a struggle between certainty and curiosity, represented by the deliberate straight lines of the 'thread' pattern meeting the intricate interruptions of the 'barcode' structure. This collision contrasts solid blacks and vibrant hot coral hues with muted charcoal and blood orange accents, fostering a visual representation of tension and unresolved exploration. The edges are sealed to exhibit firmness, while intentional broken pixels induce a sense of chaos and imperfection. The upward and downward flows symbolize duality—a tide against channels, creating balance and dissonance within the very enclosure of the square.</desc>
