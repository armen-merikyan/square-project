<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This composition explores the emotional juxtaposition of joy and grief through a split-screen layout, where the central area is deliberately intense, symbolizing an emotional battleground. The palette features vibrant yellows and oranges representing joy, contrasting with muted blues and purples expressing grief. The collision manifested in the hard edges creates tension—a sense of safe vs threatened. Progressing from bottom to top, there's a stair-stepping pattern that visualizes the struggle between expanding joy and encroaching grief.</desc>
