<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Tension</title>
  <desc id="desc">The emotional tone derived from the oppositions of envy and gratitude creates an interplay of dark and light, suggesting tension and release. The chosen palette of deep navy and dim cyan reflects the weight of envy while the white introduces moments of clarity and gratitude. The main contrast occurs diagonally across the composition, where darker colors converge from the corners, representing the weight of envy, towards lighter colors at the center, symbolizing gratitude. Broken pixels enhance the complexity and imperfection, creating a dissonance that echoes the emotional depth of the seed.</desc>
