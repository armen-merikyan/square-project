<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Boundaries</title>
  <desc id="desc">This piece captures the emotional duel of desire and restraint using a palette that oscillates between warmth and coolness. The palette consists of rich red oxide and muted tones, suggesting yearning against a backdrop of containment. The flow leans towards a spiral, indicating the cyclical nature of these emotions. The central collision, represented by alternating patterns of saturated 'desire' and muted 'restraint', creates a stark division, while the broken pixels introduce tension and disturbance—symbolizing unresolved conflicts. This abstract arrangement serves as a metaphor for the push and pull of love and betrayal, inviting the viewer into a complex emotional landscape.</desc>
