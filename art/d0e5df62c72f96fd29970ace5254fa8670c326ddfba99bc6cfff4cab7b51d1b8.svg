  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This artwork captures the emotional tension between restlessness and peace. The palette blends cool tones of 'ice_blue' and 'violet_gray' to represent tranquility, disrupted by the stark contrast of 'ink_black' and 'warning_orange' which symbolize agitation and uncertainty. The layout reflects a rising signal, with higher density at the center clashing with open, quiet spaces towards the edges. The diagonal arrangement adds a sense of motion and conflict, embodying the restless energy encapsulated in the seed.</desc>
