  <title id="title">Tension of Space</title>
  <desc id="desc">This composition captures the emotional conflict between defiance and submission through color placement and pattern. The palette emphasizes warmth (hot coral, blood orange) clashing against the cool tones of charcoal and hollow blue. The pattern shapes an invasion from the corner, fostering a sense of energetic tension. Sparse areas of dust pink provide necessary negative space, balancing the density of the other pixels and allowing the viewer to sense the interplay of pressure and release.</desc>
