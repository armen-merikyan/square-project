<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork expresses the emotional tension between defiance (represented by bold, interrupted colors) and submission (soft, muted colors). The palette highlights cosmic indigo and star white as central elements of defiance, set against the deep teal and void black representing submission. The collision occurs at the center, where the radial defiance pattern meets the hinge submission pattern, creating a dynamic contrast. The deliberate breaks in the border reflect moments of 'leakage' in the emotional landscape, while the asymmetry reinforces the sense of unevenness inherent in the struggle between these opposing forces.</desc>
