<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This artwork explores the tension between clarity and confusion through asymmetric arrangements, mirroring patterns disrupted by deliberate placement of color. The palette of reds, whites, and blues evokes a pulse, with deep contrasts symbolizing the chaos of conflicting emotions. The dense vibrant core, marked by red and pale blue, collides with expansive black and white spaces, creating a fractured symmetry. Given the seed, elements of noise and clarity play off one another, with thick outlines representing strength amidst vulnerability, encapsulating the essence of the emotional journey from rage to calm.</desc>
