<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotion's Fracture</title>
  <desc id="desc">The emotional tone reflects the tension between love and betrayal, using a palette of warm pinks and reds contrasted by darker hues of gray and dark maroon. This region captures the warmth and hope of love against the stark betrayal where the colors shift abruptly, defining their collision. The pattern adopts a radial approach for betrayal to suggest chaos while the grid reflects love’s strength and order, creating an emotional dichotomy. The diagonal fall in patterns suggests a fight between these emotions, where the vibrant reds and pinks intentionally clash with the dark maroon and gray, symbolizing unresolved tension and heartache. The arrangement fosters spaces of tension and silence, adhering to the negative space rule for impact and depth.</desc>
