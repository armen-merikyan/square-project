<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition captures the emotional tension between rage and calm through sharp contrasts of color and fragmented patterns. The palette of deep blacks and bright reds represents rage, while soft pale blues introduce calm. The main collision occurs in the center, where chaotic, jagged edges of red pixels interrupt the calm, horizontal fields of blue, illustrating the battle between overflowing emotion and the desire for containment. This aligns with the seed's themes of erosion and symmetry, resulting in an unsettling yet harmonious abstract expression.</desc>
