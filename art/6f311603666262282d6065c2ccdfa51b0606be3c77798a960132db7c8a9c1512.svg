<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone captures the struggle between defiance and submission, represented through contrasting color density and patterns. The palette, 'clarity_confusion', utilizes clean white and ice blue to symbolize submission while the ink black and warning orange embody defiance. The main collision occurs in the center, contrasting the dense black with the lighter blues, creating a vivid conflict as the barcode pattern of defiance overtakes the glitch-like edges of submission. The inclusion of broken pixels introduces intentional disruptions, reflecting the chaos of inner conflict, while allowing for a quiet field to signify space and contemplation.</desc>
