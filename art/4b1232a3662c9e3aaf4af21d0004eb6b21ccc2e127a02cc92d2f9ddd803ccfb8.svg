<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The composition embodies a battle between vulnerability and strength, where the inner square represents a delicate center surrounded by strong, rigid edges. This juxtaposition creates an emotional tension. The palette of red, black, pale blue, and white reflects the intensity of strength in black and red, contrasting with the softness of the pale blue and white representing vulnerability. The main collision occurs at the center where the delicate and strong colors interact, creating dynamic waves of pressure and exposure. The shattered pixels introduce a sense of unpredictability, while the outer edges provide a thick frame that holds this emotional narrative together, suggesting both protection and restriction.</desc>
