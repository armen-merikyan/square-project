<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Falling Tension</title>
  <desc id="desc">This artwork embodies the emotional duality of 'confusion vs clarity' through the juxtaposition of dense, dark hues against lighter, golden accents. The palette of burnt orange, dark red, charcoal, and gold delivers an ancient fire sensation, suggesting warmth but also an underlying chaos. The radial pattern reflects the concept of confusion, expanding outward from the center, where stark contrasts collide dramatically against muted tones, symbolizing the tension between clarity and confusion. Positioned subtly throughout are broken pixels representing imperfections, enhancing the complexity of emotions while adhering to a balance that maintains negative space.</desc>
