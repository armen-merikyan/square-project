<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Shadows and Light</title>
  <desc id="desc">This piece reflects the tension between fear and hope, utilizing darker tones to represent fear's ubiquitous presence, while softer gold and pale green hues suggest the flickering optimism of hope. The vertical split creates a stark contrast, with jagged edges representing fear on one side, colliding against smoother, glowy edges of hope. The use of broken pixels adds an imperfect feeling, emphasizing the emotional struggle present in the juxtaposition of lightness and weight, creating a dynamic flow within the constraints of the center_seed layout.</desc>
