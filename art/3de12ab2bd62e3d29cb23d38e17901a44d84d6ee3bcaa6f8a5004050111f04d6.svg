<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Echoes</title>
  <desc id="desc">The contrasts of 'emptiness vs desire' guided the palette choice of warm reds and cool grays, representing the struggle between these emotions. The row arrangement mirrors a rise and fall, placing lighter tones towards the top to suggest hope and warmth, with deeper, darker shades below to evoke a sense of heaviness and emptiness. The zigzag pattern simulates a heartbeat or pulse, showcasing the conflict and movement between desire and emptiness. The inclusion of broken pixels throughout creates disruption, underscoring the imperfections within emotions, while maintaining at least 10% negative space to evoke isolation and loneliness. This combination results in an abstract expression of longing and the weight of lost connections.</desc>
