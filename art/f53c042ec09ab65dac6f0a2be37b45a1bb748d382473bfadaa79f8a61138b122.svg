<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotions</title>
  <desc id="desc">This artwork explores the emotional conflict between rage and calm through a division of color, capturing the tension between explosive warmth and soothing coolness. The chosen palette of deep blacks and vibrant reds represents rage, while pale blues and whites embody calm. The left side of the grid (representing rage) features sharp jagged patterns that create a sense of explosive energy, contrasted on the right side (calm) with cracked, horizontal lines lending a feeling of steadiness and resilience. The main collision occurs at the center, where the warm and cool elements disrupt and blend, suggesting a dynamic but unresolved tension. The broken pixels sporadically disrupt the smoothness of calmness, reflecting the inevitable intrusion of chaos into tranquility.</desc>
