<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict in Color</title>
  <desc id="desc">The emotional tone captures the tension between defiance and submission, represented through a palette of deep wine, warm ivory, and ash gray. The collision of bright patches (defiance) against the softer, subdued tones (submission) creates visual conflict, especially in the center. The upward flow suggests an escape from density, while broken pixels introduce a sense of imperfection, further resonating with the theme of struggle between contrasting emotions. The patterns of patchwork and stairs intertwine throughout, leaving strategic negative spaces that emphasize the layered complexities of the seed concepts.</desc>
