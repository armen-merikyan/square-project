  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This composition captures the emotional tone of joy and grief through contrasting palettes and patterns. The warm yellows and oranges suggest joy, while the deep blues and muted purples convey the weight of grief. The asymmetrical wave in the patterns reflects the ebb and flow of these emotions. The checker pattern for grief introduces a structured tension, while the grid for joy offers bursts of light, resulting in a dense canvas that invites reflection amidst stark contrasts. The layout suggests a dynamic struggle, embodying the duality present within the seed.</desc>
