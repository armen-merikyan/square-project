<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Warmth and Fury</title>
  <desc id="desc">This artwork embodies the emotional tension between tenderness and rage, represented through a palette of deep reds and muted blues. The black dominates the composition, evoking a sense of urgency and threat. In contrast, pale blue acts as a safe space, suggesting calmness amidst the chaos. The design employs a broken frame layout to reflect interruptions and leaks of emotion, creating a center collision where the two patterns—a jagged threshold of rage and soft rings of tenderness—meet. The pixel bleed introduces imperfection, symbolizing the struggle between guilt and forgiveness, amplifying the narrative conflict.</desc>
