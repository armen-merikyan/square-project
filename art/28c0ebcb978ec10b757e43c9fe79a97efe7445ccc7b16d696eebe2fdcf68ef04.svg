<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Weight</title>
  <desc id="desc">This piece captures the emotional tension between envy, characterized by darker hues, and gratitude, represented by lighter shades. The palette of black, dark violet, soft gold, and pale green illustrates the clash of heavy emotions against lighter, hopeful feelings. The layout displays a mirror broken pattern, where the left and right edges almost reflect each other but contain intentional broken pixels, suggesting discord. The flow from left to right allows the eye to experience a gradual shift from darker to softer colors, reflecting the complexity of transitioning feelings. The dominant contrast occurs between the dense dark sections and lighter, airy spaces, accentuating the push and pull of the concepts underlying the seed text.</desc>
