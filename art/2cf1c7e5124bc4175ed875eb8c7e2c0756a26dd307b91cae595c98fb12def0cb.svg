<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone captures the pull between longing (desire) represented by saturated colors and the weight of absence (emptiness) in muted hues. The palette mixes warm shades like hot coral and blood orange to evoke desire with low-saturation colors like charcoal, echoing emptiness. The collision happens in the upper corner, where strong warm colors are layered to convey pressure against a quieter surround, creating a sense of an overflowing desire restrained by the darker edges. The layout suggests a push against a boundary, coordinating with the seed's thematic exploration of contrast.</desc>
