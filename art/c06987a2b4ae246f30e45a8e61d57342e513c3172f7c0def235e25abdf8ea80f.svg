<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Threads</title>
  <desc id="desc">This artwork explores the emotional push and pull between longing and resolve through contrasting colors and patterns. The chosen palette of muted shelter green and warm brown evokes a sense of stability and warmth, while open blue and cold white introduces an element of coolness and distance, embodying longing. The layout mirrors on both sides but introduces purposeful disruptions, representing the broken state and fragmented emotions. The intersection of lattice and dotted patterns creates a visual dialogue of active engagement against stillness, with the primary collision at the center reflecting the core of emotional conflict.</desc>
