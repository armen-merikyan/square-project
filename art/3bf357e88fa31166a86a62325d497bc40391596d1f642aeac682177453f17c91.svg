<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone of this artwork reflects a dynamic tension between safety and exposure, symbolized by the contrasting palette of warm browns and cool blues. The interaction of broken frame patterns, indicating shelter, collides with scars that symbolize exposure, creating a depth of emotional conflict. This is visually represented through a heavy lower section giving weight to the piece, while the upper area cascades with softer, more open colors, suggesting exposure and vulnerability. The central area serves as the main contrast, using darker tones to invoke protection while lighter shades around it create a sense of openness and air.</desc>
