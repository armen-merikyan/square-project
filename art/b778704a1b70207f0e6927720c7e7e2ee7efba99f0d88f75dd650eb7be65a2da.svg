<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This composition embodies the emotional tension of 'envy vs gratitude.' The contrasting palette of deep blacks and bright whites creates a visual struggle between dense, heavy emotions and light, uplifting ones. The black dominates the corners, embodying heaviness and fear, while the stark white dots in the center symbolize flickers of hope and gratitude against the oppressive background. The frame-like composition creates boundaries that echo the conflict, with the soft edges providing subtle transitions that mirror rising and falling emotions. The broken pixels introduce an element of imperfection, hinting at unresolved feelings.</desc>
