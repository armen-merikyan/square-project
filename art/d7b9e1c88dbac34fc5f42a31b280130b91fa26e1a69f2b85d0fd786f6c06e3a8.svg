<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emergence</title>
  <desc id="desc">The emotional tone reflects the struggle between ephemeral sparks of vitality and the enduring residue of ash, representing resilience against fragility. The palette serves to highlight this duality with the stark contrast of deep black and vibrant red against softer pale blue and white. The main collision occurs in the center, where radial patterns initiate from the core, disrupted by jagged edges representing the ash, creating an inherent tension. This layout seeks to evoke a sense of imbalance, as the radiant spark attempts to stretch outward while being contained by the ash's quiet pull.</desc>
