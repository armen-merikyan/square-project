  <title id="title">Tension Between Control and Chaos</title>
  <desc id="desc">This artwork reflects the emotional struggle between panic and control, using a palette of warm yellows and oranges contrasted with deep blues and muted purples. The central area, filled with brighter colors, represents control and a sense of focus, while the jagged, darker edges symbolize encroaching panic. The layout of flowing colors descending inward suggests a battle between stability and disruption. The combination of broken pixels creates deliberate imperfections, echoing the unpredictability of emotions. The negative space adds depth, allowing the viewer to breathe amidst the chaos.</desc>
