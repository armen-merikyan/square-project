<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inner Tension</title>
  <desc id="desc">The artwork embodies the emotional dualities of vulnerability and strength, represented through a juxtaposition of warm and cool colors. The chosen palette, consisting of deep reds and grays, conveys a sense of intensity and complexity. The central focus is a checker pattern representing vulnerability, disrupted by embers of strength that create a rising vs falling contrast. The overfilled corner highlights emotional pressure, while quiet spaces around balance this intensity, inviting the viewer to contemplate the interaction of struggle and stability. The visual rhythm evokes the sensation of flood against a stack, creating a palpable tension that reflects the intricacies of human emotion.</desc>
