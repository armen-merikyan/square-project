  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone reflects the tension between safety and exposure, achieved through a palette that balances warm brown and soft pale skin against cool shades of open blue and cold white. The contrasted patterns of hinge and checker create an interruption, with a dense cluster in the left side representing safety, while the right side remains more minimal to suggest exposure. The central region acts as a collision point, showing the delicate balance between these emotions.</desc>
