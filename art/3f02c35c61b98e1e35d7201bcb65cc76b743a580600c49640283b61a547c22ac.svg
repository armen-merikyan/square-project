<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Layers</title>
  <desc id="desc">This artwork captures the emotional contrast between vulnerability and strength through a palette combining soft and severe colors. The use of powder pink and warm white suggests vulnerability, while carbon black and sharp crimson evoke strength. The intersecting patterns—checker for strength and rain for vulnerability—create a central collision point, representing exposure to emotional extremes. Broken pixels are placed intentionally to signify scars and disruptions. This arrangement leans towards vulnerability but maintains strength through the density of color in the corners. Overall, the piece embodies a balance of conflict and connection.</desc>
