  <title id="title">Contrast of Incandescence</title>
  <desc id="desc">This piece explores the dynamic tension between 'spark' and 'ash.' The top half features a palette of vibrant colors (lime and electric blue) representing the energy and excitement of 'spark,' while the bottom half, in deeper tones (black and magenta), embodies the quiet remnants of 'ash.' The playful arrangement highlights the jagged edges and fault lines in both regions, symbolizing the collision of memories and the push-pull of desire against restraint. The chosen layout creates a visual divide, yet the textures within both portions intermingle, demonstrating the coexistence of resilience and fragility. Broken pixels serve as intentional disruptions, embodying the scars left by intense emotions.</desc>
