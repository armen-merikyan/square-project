<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone captures a tension between desire's warm pull represented by saturated reds and the cool, muted tones of restraint. The palette—includes deep, rich red oxides contrasting with the soft nuanced gray tones, exemplifies the clash between these emotions. The pattern's collision occurs in the central area where vibrant noise merges with scattered dots, echoing the struggle between the urge to expand and the confinement of edges. The diamond shape seeds the notion of entrapment, emphasizing the struggle of love and betrayal without literal representation.</desc>
