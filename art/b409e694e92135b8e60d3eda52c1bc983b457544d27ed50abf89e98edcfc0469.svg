<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition reflects the emotional tension between vulnerability and strength. The chosen palette, featuring electric blue, lime, magenta, and black, enhances this duality. Bright colors suggest light and exposure, while the dark tones introduce weight and grounding. The main contrast occurs in the center, where thin patterns of vulnerability disrupt the denser, more stable strength surrounding it, implying a fragile balance. Invoking concepts like broken mirrors and closed corners, the layout presents an opening on one side, allowing contrasting flows to mingle yet remain distinct.</desc>
