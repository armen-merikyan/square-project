<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This piece explores the emotional tension between rage and calm. The red tones represent bursts of chaotic energy, while the pale blue serves as a quiet field reflecting calmness. Rows are arranged in stacked bands to depict how emotional strata collide, with the chaotic red marks (representing rage) overflowing the calm blue patches, especially concentrated in the center where they intersect most vividly. The black is a stark boundary that contains the emotion, while the white serves as a necessary visual release. This arrangement captures the essence of conflict through color placement and emotional resonance.</desc>
