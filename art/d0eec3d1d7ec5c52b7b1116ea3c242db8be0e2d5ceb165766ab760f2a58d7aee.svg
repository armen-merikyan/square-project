<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This piece conveys the emotional tension between control and panic using contrasting patterns. The left side, representing control, employs a warm, structured flame pattern with burnt oranges and golds to invoke stability. In contrast, the right side embodies panic through a chaotic grid pattern in dark reds and charcoals, suggesting disorder. The collision occurs at the center, where the patterns meet, illustrating the tension between a structured environment and the chaos of internal conflict. The palette enhances the emotional weight, bringing warmth against the cold chaos in a stark display of blocked space and broken pixels, reflecting on the cracks present in both control and panic.</desc>
