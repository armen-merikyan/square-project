<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Affection</title>
  <desc id="desc">The emotional tone of this artwork contrasts love and betrayal, captured through a palette of warm pinks and reds juxtaposed with cool grays and deep maroons. The use of a checker pattern for betrayal clashes against a structured frame for love, creating a dynamic tension. The edges are intentionally fractured, portraying the disruption of harmony and an emotional 'crack' in the heart. Negative space is maintained, allowing the colors to breathe and emphasizing the ongoing struggle between density and emptiness, embodying the push and pull of these conflicting feelings.</desc>
