<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetrical Discord</title>
  <desc id="desc">This artwork reflects the tension between envy and gratitude. The muted, earthy palette of sepia, tan, dust gray, and faded blue evokes a sense of nostalgia and introspection. The main contrast emerges from the central area, where darker colors evoke envy, while lighter colors around the edges hint at gratitude and lightness. The zigzag pattern suggests a movement upward, embodying hope, yet the broken pixels embody imperfections of perception, creating an echo of imbalance. Thus, the piece embodies unresolved emotional states, inviting the viewer to ponder the dynamic interplay of feelings during fluctuating moments.</desc>
