<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Contrast</title>
  <desc id="desc">This artwork represents the emotional tussle between fear and hope, where dark colors signal fear’s weight, while lighter shades suggest hope’s rising potential. The split vertical layout exemplifies the dichotomy, with an imbalance reflecting the tension of straight versus curved forms. Colors are arranged to evoke movement: the upward soft golds and pale greens symbolize hope, punctuating the dense dark violets and blacks that represent fear. The controlled chaos of broken pixel segments enhances the sense of disturbance and interruption within the piece, embodying the struggle between these two emotional states.</desc>
