<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension's Edge</title>
  <desc id="desc">This piece captures the emotional tone of tension between vulnerability and strength. The palette of burnt orange, dark red, charcoal, and gold represents warmth, passion, and resilience amidst chaos. The dominant dark colors symbolize the strength of a dense center, while the lighter hues create subtle contrasts representing vulnerability, softly breaking against the edges. The main collision occurs toward the top left, where the colors densely cluster, suggesting pressure against a more open right side, evoking the feelings of exposure and isolation versus shelter.</desc>
