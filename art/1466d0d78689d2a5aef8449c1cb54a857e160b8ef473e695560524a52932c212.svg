<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">The emotional tone reflects the pull between fear and hope. The palette of dark violet, soft gold, and pale green captures the struggle between despair and upliftment. The split vertical layout emphasizes this duality, creating a sense of abrupt collision through jagged edges and bright accents against muted backgrounds. The pattern flows in a wave-like motion, suggesting both a structured approach to suffering and a hopeful escape. Broken pixels add an element of imperfection, showcasing the complexity of emotions that oscillate between weight and lightness.</desc>
