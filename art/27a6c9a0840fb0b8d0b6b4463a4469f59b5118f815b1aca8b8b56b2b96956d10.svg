<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dichotomy of Motion</title>
  <desc id="desc">This composition captures the emotional tension between restlessness and peace. The palette, inspired by the 'hunger_restraint' theme, uses muted cream and iron gray to signify stability and calmness broken by intense patches of red oxide and small orange, representing turmoil. The collision occurs diagonally, with the top-left corner embodying tranquility, gradually infiltrated by darker hues and warmer tones, illustrating the concept of memory versus motion. The thin versus heavy contrast is showcased through soft and jagged edges, creating an unsettled pulse while maintaining a certain degree of balance.</desc>
