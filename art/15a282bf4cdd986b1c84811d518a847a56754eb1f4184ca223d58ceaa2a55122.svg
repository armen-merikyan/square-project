<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoed Resistance</title>
  <desc id="desc">The emotional tone captures the struggle between defiance and submission, represented through a tension of warm and cool colors. The palette of shelter green and warm brown embodies safety and resilience, while cold white and open blue introduce a contrast of exposure and freedom. The collision of the quiet field of light greens with the dense stripes of warm browns creates a layered, almost compressed feel. This represents the inward spiral against encroachment—a visual echo of tension where one side feels tranquil yet conflicted, and the other oppressive yet vibrant. The broken pixels act as imperfections, symbolizing the scars of conflict, gently interrupting the flow, which organizes around a thematic exploration of containment versus liberation.</desc>
