<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Weight and Light</title>
  <desc id="desc">This piece embodies the emotional tension between relief and dread, captured through a palette of muted sepia and faded blue shades. The contrasting elements create a visual dialogue where the dark colors represent dread, weighing down from the top, while the lighter hues introduce moments of relief that surge from the center. The flow is directed from center outward, creating an unsettling yet harmonious rhythm, with stark boundaries mimicking broken edges that suggest a fragile structure. The broken pixels add imperfection, enhancing the sense of collision between opposing emotions, resulting in a layered and dynamic abstract narrative.</desc>
