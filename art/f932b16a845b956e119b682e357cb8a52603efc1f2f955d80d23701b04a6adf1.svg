<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow of Emotion</title>
  <desc id="desc">The emotional tone reflects the tension between awe and terror; it utilizes a palette evoking love and betrayal to highlight the dichotomy between soft warmth and heavy darkness. The left side features subtle pinks and reds, embodying awe, while the right erupts in dark maroons and grays representing chaos and terror. The contrast is stark with soft edges on the left transitioning into jagged, fractured areas on the right, mirroring feelings of stability versus instability. The seed 'crown' indirectly suggests elevation, yet it contrasts with the turbulent chaos, creating a feeling of suspended vertigo.</desc>
