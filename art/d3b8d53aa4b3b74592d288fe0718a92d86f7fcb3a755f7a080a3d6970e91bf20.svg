<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dualities in Motion</title>
  <desc id="desc">This artwork captures the emotional tension between envy and gratitude using a palette of black, pale blue, red, and white. The left side employs cooler tones reflecting introspection, while the right side is warmer, embodying warmth and thankfulness. The arrangement employs a mirroring layout with intentional 'broken' pixels representing disruption in harmony. This creates a gripping contrast at the center, where chaos meets calm, embodying the push and pull of fluctuating emotions. The soft edges emphasize the subtlety of feelings, merging influences that rise and fall as if to echo the emotional journey.</desc>
