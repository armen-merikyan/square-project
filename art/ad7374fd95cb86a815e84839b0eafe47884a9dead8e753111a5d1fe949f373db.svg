  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This composition embodies the emotional tension between safety and exposure. The palette mixes warm browns and soft greens for safety with cold whites and open blues suggesting exposure. The center holds a pale skin tone, representing vulnerability, surrounded by dense layers of warmer colors that push outward, creating a collision where tension and release meet. The vertical split leaves space for breath, allowing the patterns to collide and echo, reinforcing the themes of pressure against quietness, and creating a sense of subtle movement and abstraction.</desc>
