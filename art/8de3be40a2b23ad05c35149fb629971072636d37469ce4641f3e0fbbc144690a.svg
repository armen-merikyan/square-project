<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">The emotional tone plays with the interplay of longing and resolve, represented through a palette of yellow and muted purple tones to suggest warmth against coolness. The interaction between 'spark' and 'ring' patterns creates a visual echo where the firm boundaries of resolve collide with the unfinished notes of longing. The main contrast occurs in the center, where dense clusters of deep blue and orange collide with open spaces of muted purple, creating a dynamic tension. The broken pixels add a layer of imperfection, symbolizing repair amidst damage. This arrangement embodies the struggle between contained serenity and overflowing urgency, following an inward spiral flow that guides the eye through the piece.</desc>
