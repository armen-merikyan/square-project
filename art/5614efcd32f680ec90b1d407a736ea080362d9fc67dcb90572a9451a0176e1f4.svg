<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetrical Fracture</title>
  <desc id="desc">This piece embodies the emotional tension between envy and gratitude through use of contrasting colors and jagged, asymmetrical patterns representing imperfection. The palette of burnt orange, dark red, charcoal, and gold evokes warmth and depth, establishing a narrative of conflict and recognition. The primary contrast unfolds in the centralized area, where the lighter colors struggle against the deeper hues, simulating a ‘center-heavy’ weight, complemented by irregularities due to broken pixel placements. This reflects the complexity of the emotions described in the seed.</desc>
