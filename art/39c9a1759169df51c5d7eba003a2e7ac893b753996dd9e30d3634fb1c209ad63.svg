<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Collision</title>
  <desc id="desc">This piece captures the emotional tone of tension between clarity and chaos, represented by the color palette of dark navy and dim cyan against the stark white. The main contrast is created in the diagonal layout, where the smooth rhythm of signal (bright white) fights against the jagged, chaotic noise (darker hues). The broken pixels introduce imperfections, embodying the theme of rupture found in a 'broken mirror', while the negative space allows a pulse of silent reflection amidst the dense color clusters.</desc>
