  <title id="title">Inner Tension</title>
  <desc id="desc">This artwork reflects the emotional duality of 'defiance' and 'submission' through a stark contrast between dense clusters and quiet spaces. The palette of sepia, tan, and faded blue embodies a broken memory, evoking feelings of nostalgia and conflict. The structure favors a strong center which symbolizes defiance, surrounded by softer shades that recede into submission. The collision happens distinctly in the middle, where darker tones assert pressure against the lighter edges, enhanced by broken pixels that introduce small disruptions, symbolizing imperfect memories and unresolved tensions.</desc>
