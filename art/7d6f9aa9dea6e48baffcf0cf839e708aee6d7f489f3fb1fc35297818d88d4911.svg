<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Veils</title>
  <desc id="desc">This artwork embodies the emotional tension of 'defiance' against 'submission' through a juxtaposition of vibrant and muted colors. The palette of pink, red, gray, and dark maroon reflects love tainted by betrayal. The left and right sides of the grid feature a mirrored layout, disrupted by broken pixels to symbolize imperfection and chaos. The main collision occurs at the center where bright defying elements clash with dark ensconced tones, creating a pulse that resonates throughout the piece while leaving negative space to suggest the quietness of submission. The flow is vertical, highlighting the diagonal rise of defiance against a backdrop of submission's soft collapse.</desc>
