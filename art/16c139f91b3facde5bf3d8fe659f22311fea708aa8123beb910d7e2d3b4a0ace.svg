<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Within Static</title>
  <desc id="desc">This pixel art encapsulates a tension between vibrant signals and muted noise. The palette combines charging signal green and electric blue against a backdrop of static gray and dead black, reflecting feelings of clarity battling against chaos. The dominant signal colors emerge from the center, representing a bright pulse, while quieter colors occupy the edges, enhancing the contrast between activity and stillness. The pattern echoes the noise and disruption amid organized chaos, paralleling the core idea of 'islands' of clarity amidst interference.</desc>
