<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Longing and Resolve</title>
  <desc id="desc">This piece explores the emotional tension between longing and resolve, reflected through a palette of deep navy and muted grays that suggest both serenity and urgency. The main collision occurs across the center, where a stark contrast between soft dim cyan and dark navy creates a visual dialogue between quiet desire and firm boundary. The 'mirror_broken' layout is embodied in intentional disruptions created by broken pixels, which evoke the theme of repair versus damage, further enhancing the sense of an unresolved emotional landscape.</desc>
