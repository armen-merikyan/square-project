<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry Fractured</title>
  <desc id="desc">This artwork explores the emotional tension between confusion and clarity through a split horizontal design. The palette, rooted in 'ancient_fire', juxtaposes burnt orange and dark red against charcoal and gold, symbolizing warmth amidst chaotic distortions. The top half utilizes a crosshatch pattern, evoking clarity with structured lines, while the bottom half employs crack patterns, signifying breakdown and disorder. The edge style creates a weight towards the bottom, reflecting emotional gravity, while the broken pixels add subtle imperfections, enhancing the theme of fragmented clarity. The collision of solid colors against more muted tones builds a narrative of conflict—central clarity struggles under the demands of confusion.</desc>
