<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Dualities</title>
  <desc id="desc">This composition embodies the emotional tension between love and betrayal through contrasting colors and patterns. The palette combines warm pinks and reds to signify love, set against darker grays and dark maroons that represent betrayal. The placement favors vertical descending rows, mimicking the idea of tears or a downward spiral, with sharp and soft contrasts creating collisions within the grid. Broken pixels were strategically placed to underscore imperfection, adding to the feeling of a fractured connection. The delicate interplay of color creates a rhythm of warmth and coldness, echoing the seed's themes of intimacy disrupted.</desc>
