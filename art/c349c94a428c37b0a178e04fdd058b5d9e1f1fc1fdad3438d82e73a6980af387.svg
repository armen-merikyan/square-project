<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Weight</title>
  <desc id="desc">This artwork embodies the emotional duel of fear against hope through a split vertical layout that captures the tension. The palette features dark colors to evoke the heaviness of fear while incorporating soft gold and pale green as a representation of hope, suggesting lightness. The main contrast occurs through a jagged edge on one side against smoother linear flows on the other, symbolizing the battle between chaotic emotions and serene clarity. The placement emphasizes a central glow, but it is set against dark corners, creating a feeling of anticipation amid pressure, mirroring the seed's themes of emotional complexity.</desc>
