<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Emotions</title>
  <desc id="desc">This piece embodies the emotional tug-of-war between desire and restraint, best depicted through a warm and muted palette. Hot coral and blood orange represent the vibrant pull of desire, while charcoal and hollow blue serve as the boundaries of restraint. The contrasting colors play off each other, creating a spiral pressure effect that suggests an intense emotional struggle. The grid pattern encompasses the tension, feeling dense yet leaving intentional spaces that symbolize restraint. The chosen shape, a 'well', becomes an abstract metaphor for deep emotions trapped within borders, reflecting both a sense of containment and an unquenchable longing.</desc>
