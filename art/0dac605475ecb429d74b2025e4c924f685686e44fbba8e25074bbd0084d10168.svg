<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interwoven Tensions</title>
  <desc id="desc">The emotional tone of this artwork captures the struggle between defiance and submission, highlighted through contrasting colors and spatial dynamics. The selected palette—shelter green, warm brown, pale skin, cold white, and open blue—evokes feelings of safety and exposure, reinforcing the idea of protection versus vulnerability. The dominant presence of warm brown in the center signifies a resilient core, against an oscillation of muted greens and blues that signify external pressures and encroaching influences. The layering of pulse-like patterns around the edges creates a visual tension, while broken pixels introduce intentional disruptions, echoing the theme of incomplete repairs. This composition embodies a narrative of struggle, with distinct contrasts manifesting as sound waves, reflecting noise amidst resolved stillness.</desc>
