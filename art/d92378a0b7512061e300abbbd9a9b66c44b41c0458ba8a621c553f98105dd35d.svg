<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetrical Disarray</title>
  <desc id="desc">The composition explores the tension between clarity and confusion, using a palette of gray, red, and pink to evoke feelings of both love and betrayal. The outer border is a steady dark maroon creating a sense of control, while the inner section exhibits broken dots of pink and red to represent chaos and a sense of falling apart. The sharp contrasts arise primarily from the clash between the steady borders and the chaotic interior, highlighting the emotional struggle between stability and disorder. Broken pixels introduce imperfection, making the whole piece a canvas of conflicts, mirroring the essence of the seed text gracefully.</desc>
