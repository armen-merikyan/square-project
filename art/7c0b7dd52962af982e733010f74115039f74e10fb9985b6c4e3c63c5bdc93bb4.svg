<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork captures the emotional tension between desire and restraint, blending saturated colors that pulse with intensity against muted fields that represent containment. The central collision of warm hues in the middle (symbolizing desire) is interrupted by cooler, darker borders that signify limitations and restraint, creating an echo of pressure. The carefully chosen palette reflects this juxtaposition: vibrant hot coral and blood orange suggest longing and vitality, whereas charcoal and hollow blue symbolize the weight of restraint. The layout enhances the feeling of density at the center while leaving space at the edges, embodying the interplay of saturation vs. muted forms.</desc>
