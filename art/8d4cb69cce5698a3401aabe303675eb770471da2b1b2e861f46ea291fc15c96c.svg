<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal &amp; Echo</title>
  <desc id="desc">The artwork encapsulates the tension between restlessness and peace, portraying the dual nature of memory and movement. The chosen palette of black, white, and pale blue emphasizes both calm and chaotic elements — the black suggesting depth and instability while the white invokes clarity and peace. The main contrast lies in the center where disruptive dark patterns collide with lighter accents, symbolizing the struggle between turbulence and tranquility. The 'scattered_repair' layout evokes a patchwork feel, where attempts to seal chaos with lighter colors hint at fleeting moments of peace amidst restlessness, capturing the complexities of human emotion.</desc>
