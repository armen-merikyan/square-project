<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork explores the emotional dichotomy between desire and emptiness through a color palette that evokes warmth and coldness. The saturated tones like hot coral and blood orange represent desire, with their vibrancy suggesting a pull towards abundance. In contrast, hollow blue and charcoal reflect the emptiness, providing a muted backdrop that signifies restraint. The main collision occurs in the center where the warmer colors break into the cooler area, creating tension and an unresolved rhythm. The layout allows for two 'pulses' of emotion, reaching towards each other across negative space, encapsulating the struggle between overflowing desire and confining emptiness.</desc>
