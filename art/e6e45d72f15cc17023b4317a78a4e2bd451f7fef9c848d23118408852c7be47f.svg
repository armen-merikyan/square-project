<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This piece reflects the emotional tension between joy and grief through a duality in color and structure. The warm yellows and oranges signify joy, creating a spark-like rhythm, while the deep blues and muted purples symbolize grief with a more fragmented, drooping appearance. The layout introduces horizontal symmetry but with an imperfection that evokes a sense of loss or break. The broken pixels disrupt the grid-like order, enhancing feelings of conflict and unresolved emotion. The flow transitions gradually from dense patterns in the corners to negative space in the center, suggesting a release from pressure.</desc>
