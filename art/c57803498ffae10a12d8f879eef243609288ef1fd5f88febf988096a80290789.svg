<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry vs Break</title>
  <desc id="desc">The artwork visually narrates the tension between envy and gratitude through a contrasting palette of deep black, dark violet, soft gold, and pale green. Black and dark violet establish a heavy, almost oppressive weight in the corners, symbolically representing envy which intrudes and disrupts the serene flow of gratitude depicted by the lighter soft gold and pale green. Broken edges suggest the fracturing of emotions, while the jagged pattern creates a visual zigzag effect, echoing the chaotic nature of envy clashing with the calmness of gratitude. The negative space allows for breathing room, contrasting the dense areas and emphasizing the emotional push and pull defined by the seed's complexity.</desc>
