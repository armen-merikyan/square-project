<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Containment</title>
  <desc id="desc">This artwork captures the emotional juxtaposition of rage and calm through a clash of warm and cool palettes. The rich reds and deep blacks convey the intensity of rage, while the pale blue and white serve as efforts of calmness, creating a tension-filled narrative. The center is dense with color, representing an overflow of emotions as the outer edges attempt to contain this burst. The broken pixels introduce intentional disruptions that mirror the unpredictable nature of emotion. The collision occurs prominently in the center while the borders struggle to keep the colors restrained, echoing the duality expressed in the seed.</desc>
