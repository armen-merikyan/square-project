<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Tension</title>
  <desc id="desc">The emotional tone is a juxtaposition of safety and exposure, emphasizing the delicate balance between protection and vulnerability. The palette reflects this with warm browns and greens symbolizing safety against cool whites and blues denoting exposure, creating a visually compelling contrast. The main collision occurs at the vertical center where the warm crosshatch of safety meets the broken frame of exposure, causing an echo effect. The overall pattern reflects a push and pull between dense clusters of color and quieter spaces, echoing the inherent tensions in the seed's themes.</desc>
