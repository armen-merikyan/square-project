  <title id="title">Tension of Voids</title>
  <desc id="desc">The emotional tone embodies a struggle between lightness and heaviness, invoking feelings of relief intertwined with dread. The palette features deep navy and black to represent the weight of dread, contrasted with bright single white and dim cyan as moments of relief. The layout echoes a mirror broken with subtle disruptions, with most black and navy on one side, highlighting the central collision of white and cyan which fights for space and attention. The rhythm emerges from a pattern of radial density against stripes, suggesting motion and interruptions through the pixel placements, leaving negative spaces that offer breath and relief amidst pressure.</desc>
