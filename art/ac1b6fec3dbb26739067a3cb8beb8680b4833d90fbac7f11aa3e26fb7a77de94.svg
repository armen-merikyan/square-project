<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This artwork explores the tension between emptiness and desire. The outer frame, depicted in darker hues like charcoal and hollow blue, conveys a sense of containment and quiet pressure, while the inner patterns evoke a saturated pulse of hot coral and blood orange, representing desire. The deliberate placement of broken pixels creates an imperfection that symbolizes interruptions and collisions within this emotional landscape. The outer border maintains a steadfast structure, whereas the colorful inner section disrupts the norm, embodying the push and pull of the stated emotions.</desc>
