<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">This piece embodies the emotional contrast between 'envy' and 'gratitude', using a palette that emphasizes warmth versus coolness. The composition flows from the bottom to the top, indicating a rise in hope against the backdrop of inner turmoil. The cool blues representing gratitude create a soft but firm impact, colliding with the stark intensity of red representing envy. The patterns are intertwined – a mirror reflecting both emotions and a ring suggesting cyclical feelings. The use of negative space enhances the notion of an empty room filled with unexpressed emotions, allowing for moments of quiet amid the rising tension.</desc>
