<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Desire and Restraint</title>
  <desc id="desc">The emotional tone stems from the duality of desire and restraint, illustrated through the use of warm and cool colors throughout the piece. The palette showcases contrasting colors: warm reds and muted creams to symbolize desire, while deeper blackened plums and grays depict restraint. The main collision occurs at the center, where a vibrant cluster of warm colors is interrupted by cooler tones, echoing the conflict between pulsating warmth and contained energy in the layout. The spiral pressure creates a sense of dynamic movement, urging the viewer to experience both attraction and limitation as the patterns intersect and interact across the lattice structure.</desc>
