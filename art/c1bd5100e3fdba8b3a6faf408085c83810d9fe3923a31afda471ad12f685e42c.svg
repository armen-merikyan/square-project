  <title id="title">Tension of Emotions</title>
  <desc id="desc">This artwork explores the juxtaposition of fear and hope through a split vertical layout, where the left side embodies fear with darker hues and jagged formations, while the right side manifests hope with luminous colors and an upward flow. The palette, featuring blacks, dark violet for fear, and soft gold and pale green for hope, creates a strong contrast. The broken pixels symbolize imperfections in both emotions, echoing human vulnerability amidst the stark divide. The glowing edges reflect light versus weight, reinforcing the emotional conflict in a visually resonant way.</desc>
