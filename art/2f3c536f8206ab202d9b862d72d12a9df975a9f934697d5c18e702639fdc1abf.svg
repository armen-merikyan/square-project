<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Duality</title>
  <desc id="desc">The emotional tone of this piece reflects the tug-of-war between joy and grief, contrasting bright, expanding colors against muted, drooping hues. The chosen palette of yellows and oranges captures joy's spark, while deep blues and muted purples convey grief. This contrast is pronounced in the center of the composition, where joy radiates outwards, echoing the patterns of unsteady waves, while grief lingers at the edges. Broken pixels introduce an element of imperfection, signifying the struggle of hidden emotions versus exposed feelings. The arrangement of colors creates a flow mimicking a rainfall, adding a layer of depth and movement amid the chaos.</desc>
