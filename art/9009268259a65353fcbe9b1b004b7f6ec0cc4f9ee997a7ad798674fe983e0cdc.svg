<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Restraint</title>
  <desc id="desc">This composition visualizes the emotional tension between desire and restraint through color saturation and placement. The palette includes bold reds signifying desire and soft creams illustrating restraint, creating a dynamic contrast. The outer edge is a dark, muted tone representing the locked state of restraint, while the inner core bursts with saturated warmth, symbolizing visceral desire. The main collision is in the center, where bright reds and oranges intermingle with muted tones, embodying the struggle between desire and containment. The patterns, thread-like for desire and scarred for restraint, interweave and disrupt, mirroring the complex emotions associated with love and betrayal.</desc>
