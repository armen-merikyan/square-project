<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">The emotional tone captures the delicate balance between vulnerability and strength. The palette embraces strong contrasts with dark tones such as 'dead_black' and bright accents like 'hot_magenta' to depict the struggle between exposure and shelter. The main collision occurs predominantly in the center, where the crosshatch pattern of vulnerability overlaps with the noise of strength, creating a focal tension that draws the eye. The layout suggests an alternating conflict through the use of broken pixels which serve as intentional disruptions in the otherwise structured grid, making the piece feel alive and dynamic while maintaining its abstract nature.</desc>
