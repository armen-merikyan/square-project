<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order and Chaos</title>
  <desc id="desc">The emotional tone of this piece reflects the tension between panic and control, where one side embodies structured calmness and the other chaotic disarray. The palette of red, black, pale blue, and white symbolizes the discord between urgent emotions and soothing clarity. The left columns display a mirrored pattern, showcasing an organized sequence (control), while the right side erupts into a dotted chaos (panic), creating a clear visual collision. The subtle pixel bleed introduces intentional imperfection, reinforcing that chaos can intrude on order. The contrast of warm reds against cooler blues amplifies emotional intensity, suggesting a push-pull between stress and serenity.</desc>
