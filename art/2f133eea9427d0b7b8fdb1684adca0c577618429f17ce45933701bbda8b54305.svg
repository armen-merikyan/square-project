<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal &amp; Static</title>
  <desc id="desc">This artwork embodies the emotional tug-of-war between clarity (signal) and chaos (noise). The palette of navy, black, and dim cyan captures a somber mood, representing depth and introspection, while the single white functions as a point of clarity amid the muddiness. The top half is dominated by broken dots that resemble fleeting signals, suggesting fragmented memories, while the bottom maintains fault lines that simulate static disruptions. The composition interrupts the viewer's eye with a stark contrast between the dark, ‘noisy’ bottom and the ‘clear’ upper area, reflecting the tension between hopes and fears. A broken pixel technique enhances this effect, introducing intentional imperfections that hint at memory blur and loss.</desc>
