<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork embodies the emotional tension between desire and restraint through a blend of saturated and muted tones. The palette combines deep reds and rich blacks to evoke the intensity of hunger, while muted creams and grays allow for moments of calm reflection. The central collision of color occurs in the upper portion, where a checker pattern for desire meets the disruptive spark of restraint below, with broken pixels symbolizing cracks in control, creating a feeling of imbalance but also of hope. The rising signal layout visually lifts the viewer's gaze, suggesting an upward pull. The overall arrangement ensures that desire dominates the composition, capturing the struggle of yearning against a sealed boundary.</desc>
