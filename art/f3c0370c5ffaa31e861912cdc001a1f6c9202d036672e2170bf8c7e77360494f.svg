<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This artwork reflects a conflict between tenderness and rage through contrasting color patterns. The palette features muted tones of black and pale blue representing rage's darkness, alongside whites suggesting tenderness's softness. The left four columns (tenderness) use a barcode pattern, implying structure and gentleness, while the right four columns (rage) embrace an echo pattern, illustrating disruptions and intensity. The collision occurs at the center where the two patterns intersect, creating a dynamic tension that echoes the seed's themes of contrast and emotional depth.</desc>
