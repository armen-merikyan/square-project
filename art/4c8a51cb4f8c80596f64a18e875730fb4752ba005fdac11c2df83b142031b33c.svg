<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This piece embodies the emotional struggle between defiance and submission using a palette inspired by love and betrayal. The shades of pink and red represent passion and conflict, while the grays and dark maroons add depth and weight, creating a tension that fluctuates across the square. The layout flows downward like falling pixels, with a heavy bottom weight suggesting a sense of gravity or inevitability. The broken pixel pattern creates imperfection, inviting the viewer to notice the edges and conflicts, highlighting the contrasts of light against darkness. The main collision happens in the center where the colors intermingle and stark transitions occur, suggesting an ongoing emotional struggle that does not resolve neatly, embodying the theme of tension throughout the composition.</desc>
