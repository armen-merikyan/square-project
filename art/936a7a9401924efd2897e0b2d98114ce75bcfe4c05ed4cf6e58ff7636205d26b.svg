  <title id="title">Split Echo</title>
  <desc id="desc">This composition evokes the emotional tension between joy and grief by using a palette of yellow and deep blue against muted purples and orange. The left side exudes warmth and lightness, reflecting joy with rounded patterns, while the right side incorporates fragmented structures symbolizing grief and loss. The main contrast occurs in the central vertical axis, where the joy colors pulse outward and the grief colors seep inward, creating an unbalanced symmetry. Broken pixels enhance the imperfection motif, suggesting interruptions in emotional flow.</desc>
