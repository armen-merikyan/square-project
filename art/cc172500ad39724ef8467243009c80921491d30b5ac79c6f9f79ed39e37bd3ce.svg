<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension: Reflection of Chaos and Tranquility</title>
  <desc id="desc">This piece explores the emotional dichotomy of rage and calm using a palette of warm reds and cool blues. The rage is expressed in jagged pixel patterns that invade from the corner, contrasting with structured, serene horizontal bands of pale blue, creating a feeling of tension. The black and white pixels serve as interruptions, receiving the hot energy and breaking it, while also allowing quiet to coexist within the overall emotional landscape. This abstract arrangement captures the conflict between order and chaos, as well as the beauty in their collision.</desc>
