<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Harmony</title>
  <desc id="desc">The emotional tone captures the struggle between control and surrender through contrasting colors and patterns. The palette features warm colors (hot coral, blood orange) to symbolize the pressure of control, contrasted against muted tones (charcoal, hollow blue) representing surrender and the quiet emptiness. The main collision occurs in the center, where the warm hues clash with the cooler colors, embodying the tension and dance of emotional interaction. The layout reflects scattered repairs, with disruptions (broken pixels) serving as metaphorical scars and the whole composition narrating a story of balance amid chaos.</desc>
