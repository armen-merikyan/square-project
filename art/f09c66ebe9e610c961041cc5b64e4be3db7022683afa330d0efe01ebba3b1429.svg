<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone of this piece contrasts the ideas of vulnerability and strength, utilizing an 8x8 grid to reflect these dynamics. The color palette consists of a clean white for vulnerability and dark hues of ink black and violet gray to represent strength. The intersection of these emotions creates both contrast and conversation across the grid. Broken pixels introduce intentional disturbances, symbolizing the impacts that vulnerabilities can have on established strength, allowing for an energetic collision in the center, emphasizing the spiral layout. The overall flow and patterning suggest an ongoing tension, where structure meets chaos, enhancing the thematic exploration of exposure versus shelter.</desc>
