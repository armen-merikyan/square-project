  <title id="title">Echoes of Shelter</title>
  <desc id="desc">The emotional tone reflects a delicate balance between safety and exposure, demonstrated through contrasting colors and patterns. The palette features shelter green and warm brown representing security, and cold white and pale skin signaling vulnerability. The main contrast occurs vertically, with warmer tones in the left half suggesting safety, while cooler tones dominate the right, introducing an echo of exposure. The arrangement creates a visual tension that accentuates the push and pull between feeling secure and being open to influence.</desc>
