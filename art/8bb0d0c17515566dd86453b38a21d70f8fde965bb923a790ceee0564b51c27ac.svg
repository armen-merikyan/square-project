<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonant Collisions</title>
  <desc id="desc">This piece embodies the emotional tension between restlessness and peace, manifesting through contrasting patterns of noise and barcode. The palette, featuring cosmic indigo and void black, serves to convey depth and inner turmoil, while star white and cold gold act as points of focus, representing fleeting moments of calm amidst chaos. The center is densely packed with deep teal noise, emphasizing disruption, while the edges are somewhat subdued to create a sense of struggle against containment. The diagonal flow hints at movement and contrast; the collision occurs predominantly at the center where the saturation is highest, capturing the essence of memories that shift between clarity and chaos.</desc>
