<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone captures the tension between desire (warm, saturated colors) and restraint (muted, subdued shades). The palette is driven by a duality – vibrant hot coral and blood orange juxtapose against the cooler, charcoal and hollow blue, symbolizing an emotional struggle. The main contrast occurs centrally, where channels of saturated color collide with the veiled, muted tones, creating a pressure point within the square. This collision narrates a feeling of longing against imposed limits, reflecting deep emotional conflict as it spirals inward, suggesting anxious movement toward an unattainable edge. The use of broken pixels adds intentional imperfections, emphasizing the unresolved nature of desire and its complexities.</desc>
