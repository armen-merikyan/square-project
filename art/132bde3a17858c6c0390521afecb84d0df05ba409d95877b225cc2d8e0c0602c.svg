<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Chaos and Control</title>
  <desc id="desc">The emotional tone explores the duality of control amidst the chaos of panic. The chosen palette of burnt orange, dark red, charcoal, and gold reflects the intensity of these contrasting feelings, symbolizing heat and urgency in moments of crisis. The layout splits the composition into two halves, emphasizing the stark transition between structured control on the left and chaotic disruption on the right. The flow is from the center outward, giving a visual pulse that mimics the inner turmoil versus external composure. Broken pixels introduce a sense of imperfection, representing uncontrollable elements in an otherwise orderly setup, while leaving deliberate negative spaces enhances the tension. Overall, the abstract pattern conveys a feeling of unresolved conflict and emotional struggle.</desc>
