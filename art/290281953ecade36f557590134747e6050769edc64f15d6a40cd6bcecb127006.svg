<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Through Static</title>
  <desc id="desc">The emotional tone reflects the struggle of clarity against interference. The selected palette, featuring vibrant signal greens and hot magentas, evokes a sense of vitality amid static gray and dead black, representing confusion and chaos. The arrangement places clearer colors in the center to signify a pulse attempting to emerge from an environment filled with noise. The collision occurs through contrasting areas where vibrant hues clash against muted fields, embodying the idea of memory colliding with erasure, mirroring the tension between signal and noise.</desc>
