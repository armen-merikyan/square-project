<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Forces</title>
  <desc id="desc">This artwork encapsulates the emotional tension of defiance and submission through contrasting tones and patterns. The chosen palette of black, red, pale blue, and white creates a striking visual conflict, echoing the battle between lightness and weight. The left side mirrors the right with slight imperfections, inviting viewers to explore the subtle noise against the frame. The bottom-heavy layout introduces a feeling of pressure, while the central shape subtly evokes the moon, suggesting distance and quiet, thus balancing the open and closed themes. The interplay of color and placement emphasizes unresolved motion and emotional collision.</desc>
