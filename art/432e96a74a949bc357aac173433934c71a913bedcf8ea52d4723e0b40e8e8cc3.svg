<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Edge of Contrast</title>
  <desc id="desc">This piece captures the emotional tension between vulnerability and strength. The selected palette, drawing from shades of green, gold, and deep olive, suggests growth (strength) against a backdrop of muted tones (vulnerability). The layout features a hollow center, creating an intrinsic space of vulnerability which is surrounded by robust, denser colors, symbolizing strength. The collision of 'teeth' and 'stack' patterns creates disruptions that visually narrate the battle between these contrasting emotions. The dominant density of dark greens at the edges contrasts with the lighter, more fragile interior colors, echoing a struggle for protection in a world of exposure.</desc>
