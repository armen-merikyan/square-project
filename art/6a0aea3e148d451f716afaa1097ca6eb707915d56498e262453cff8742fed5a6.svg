<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This artwork explores the dynamic tension between defiance and submission, expressed through contrasting colors and patterns. The palette of lime, electric blue, magenta, and black reflects vibrancy and intensity, while soft edges create a sense of fluidity in this interplay. The top half, dominated by the fiery patterns of defiance, uses bright accents to evoke energy and urgency, while the bottom half's more subdued 'teeth' patterns suggest restraint and the quiet weight of submission. The collision point lies in the alternating color placements, disrupting the surface and inviting contemplation of their emotional engagement. The arrangement fosters both spread and density, offering a visual narrative of rising and receding feelings, encapsulated within a structured 8x8 grid.</desc>
