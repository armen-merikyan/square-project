<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">This artwork encapsulates the tension between envy and gratitude through an interplay of dark and light tones. The palette of navy, black, and dim cyan represents the depth of emotion, with black contrasting against the lighter shades of blue to create a sense of unease reflecting envy. The pattern follows an 'order_vs_chaos' motif, where stripes on one side oppose crosshatch on the other, illustrating the struggle of control within the emotional landscape. This composition captures how conflicting emotions can create an empty yet overwhelming space, almost like a silent room filled with unspoken tension. The juxtaposition of soft edges with the sharper patterns reflects the subtlety of human feelings, ultimately leaving negative space to breathe amidst this emotional noise.</desc>
