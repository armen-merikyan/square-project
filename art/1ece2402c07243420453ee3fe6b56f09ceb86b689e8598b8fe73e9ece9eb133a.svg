<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Desire</title>
  <desc id="desc">The emotional tone captures the conflict between desire and restraint through a vivid palette of vibrant coral and blood orange contrasting with muted charcoal and hollow blue. This contrast symbolizes the struggle where warm colors represent yearning and cool tones embody containment. The main collision occurs in the center, where the brighter hues seethe against the muted backgrounds, forming an abstract pulse of energy and restraint. The chosen patterns—broken frames and pulse marks—interact dynamically, inviting the viewer to experience the dissonance and harmony derived from the seed's themes of relational tension.</desc>
