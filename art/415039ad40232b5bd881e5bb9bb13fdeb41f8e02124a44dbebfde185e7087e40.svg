<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Shelter and Exposure</title>
  <desc id="desc">This artwork conveys the emotional contrasts of safety and exposure through a split vertical structure, where soft greens and warm browns foreground the sheltered feeling while cooler tones of pale skin, cold white, and open blue ripple through the canvas to evoke exposure. The pattern interplay of broken dots suggesting safety collides dynamically with braided forms representing exposure. The main collision occurs at the center, accentuating a tension between the dual aspects of protection and vulnerability, while leaving the edges soft, echoing the themes of pressure and release.</desc>
