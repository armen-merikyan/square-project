<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Currents</title>
  <desc id="desc">This abstract composition captures the emotional tension of restlessness colliding with peace. The palette features deep reds and grays reflecting the struggle between urgency and stillness, while the use of warm tones amidst cooler ones suggests a patchwork of memories that overlap in motion. The main contrast occurs diagonally from the bottom left to the top right, disrupting the calmness that seeks to stabilize the restless energy. The edges are thickly pronounced to emphasize the boundary between motion and tranquility, creating a visual spiral that hints at a journey between these states.</desc>
