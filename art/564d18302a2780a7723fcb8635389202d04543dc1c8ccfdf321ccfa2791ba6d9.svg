<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos: A Reflective Dance</title>
  <desc id="desc">This artwork embodies the emotional tension between envy and gratitude, employing a palette of burnt orange, dark red, charcoal, and gold to reflect warmth intertwined with darkness. The left side employs a frame-like pattern, suggesting order underpinned by gratitude, while the right exhibits an off-center crosshatch representing the chaotic struggle of envy. The composition flows diagonally, capturing the clash of emotions—dense clusters on the chaotic side gradually disperse into lighter, more open spaces, suggesting a subtle shift from pressure to release. The broken edge style denotes imperfections, enhancing the emotional discord between the two sides, as the chaos tries to invade and disrupt order.</desc>
