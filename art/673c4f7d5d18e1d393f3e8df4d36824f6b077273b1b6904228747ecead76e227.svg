<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Pulses</title>
  <desc id="desc">This composition explores the emotional tension between defiance and submission through color and pattern. The palette of black, dark violet, soft gold, and pale green represents the struggle of bright refusal clashing with soft collapse. The main collision resides in the center where the spark patterns of defiance (dark violet, soft gold) pulse energetically against the subdued dot patterns of submission (black, pale green). This arrangement creates a dynamic interplay, hinting at instability while maintaining a clear negative space that accentuates the emotional contrast. The broken pixels serve as intentional disruptions, reflecting the imperfection inherent in the struggle of these two concepts.</desc>
