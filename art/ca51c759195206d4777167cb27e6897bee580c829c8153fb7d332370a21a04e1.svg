<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Forces</title>
  <desc id="desc">The emotional tone of this piece reflects the tension between defiance and submission. Using a palette dominated by navy and black, the artwork encapsulates a balance of darkness with sparing bright accents that signify defiance. Dim cyan intermittently pulses through the black, conveying moments of tension and interruption. The collision between deeper hues and unexpected brighter touches at the center reinforces the narrative of quiet resistance against enveloping chaos, suggesting both conflict and resolution. The structured patterns of defiance, resembling flames, clash with the fault-line marks of submission, resulting in a rhythmic yet disrupted flow. The layout leaves ample negative space to imply a threshold, and the use of broken pixels adds a layer of imperfection, embodying the rawness of these emotions.</desc>
