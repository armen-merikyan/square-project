<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmony in Dissonance</title>
  <desc id="desc">The emotional tone reflects the duality of confusion and clarity by juxtaposing vibrant warm tones against muted, cooler colors. The palette, inspired by joy and grief, establishes a balance where orange and yellow illustrate moments of clarity while deep blue and muted purple embody confusion. The arrangement creates a tension between dense clusters at the top and open space below, capturing the ebb and flow of emotions. Patterns reminiscent of a maze at the top convey complexity, while rain-like dispersal below suggests an intentional release, resonating with the idea of an abstract wave without literal representation.</desc>
