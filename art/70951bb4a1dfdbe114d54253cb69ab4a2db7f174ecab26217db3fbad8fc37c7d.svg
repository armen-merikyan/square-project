<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Dread</title>
  <desc id="desc">The emotional tone of this piece captures the struggle and contrast between relief and dread, visualizing a tension-filled moment. The palette, consisting of warm oranges and yellows against deep blues and muted purples, embodies this duality, where warm tones symbolize relief and cooler tones represent dread. The composition uses a split-screen pattern to emphasize the conflict, with flowing diagonal contrasts creating motion from top to bottom, suggesting an emotional descent or struggle. The heavy presence of dark color on one side clashes with the lighter, broken dot patterns, representing fleeting moments of relief amidst overwhelming heaviness. The negative space allows the viewer to feel the emptiness of dread, enhancing the overall sense of tension and imbalance.</desc>
