<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Conflict</title>
  <desc id="desc">This piece explores the emotional tension between tenderness and rage through a palette of stark contrasts and deep saturation. The dominant colors of rich red and dark black represent the core of rage, while the soft tones of pale blue bring in moments of tenderness. The layout, structured in a mirroring fashion but intentionally broken, suggests an emotional disruption—a crack in the facade of calm that weaves through the artwork. The collision point lies in the center, where jagged reds interrupt the softer bands of blue, forming an intricate dance of overlapping emotions, capturing the essence of guilt and forgiveness. The intentional inclusion of broken pixels throughout creates a sense of imperfection and realism in the emotional journey.</desc>
