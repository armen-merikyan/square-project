<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork embodies the emotional collision between defiance and submission. The outer frame employs warm tones of yellow and orange, representing the aggressive nature of defiance, while the muted purple and deep blue core conveys a sense of submission and calm. The hard edges create tension between the contrasting emotional states, while the broken pixel elements introduce an imperfection that speaks to the fragility of both feelings. The layout, structured with a clear frame and a solid core, evokes a protective barrier around vulnerability, emphasizing the emotional release inherent in the experience of such contrasts.</desc>
