<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This artwork captures the tension between joy and grief through contrasting colors. The joy is represented by bright yellows and warm oranges that expand vertically, while the grief is symbolized by deep blues and muted purples that create a heavy, grounded presence. This split between the upper and lower halves suggests a wave-like undulation of emotion, creating an interplay of light against dark. The random placement of broken pixels introduces a sense of imperfection, echoing how emotions often collide. The jagged edges provide a visual interruption, reflecting the fragmented nature of joy alongside grief, while maintaining an overall balance in the 8x8 space.</desc>
