<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inner Conflict</title>
  <desc id="desc">This piece embodies the emotional tension between tenderness and rage, using the contrast of saturated reds against muted pale blues and whites. The raging colors clash diagonally with soft, rounded edges representing tenderness, allowing a feeling of rising conflict. The crown serves as a metaphorical anchor, signifying both protection and dominance, embodied in the design's pattern: jagged aggression meets calm horizontal waves. The broken pixels introduce intentional chaos, echoing the imperfections of emotional experiences.</desc>
