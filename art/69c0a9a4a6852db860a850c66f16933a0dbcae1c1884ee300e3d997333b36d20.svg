<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Duality</title>
  <desc id="desc">This artwork embodies the emotional struggle between vulnerability and strength, achieved through the visual tension created by contrasting colors and shapes. The palette of ripe green, acid green, honey gold, deep olive, and cream reflects a spectrum of emotions, from warmth and hope to tension and exposure. The collision occurs primarily in the center, where patches of vulnerability (soft greens and yellows) disrupt the strength of rigid forms (dark olive and cream), representing an inward pulse that pushes against the unyielding edge. This layered interaction, with broken pixels as disruptions, speaks to the essence of connection and alienation, both visually and emotionally.</desc>
