<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dualities in Pixel Form</title>
  <desc id="desc">This composition explores the emotional tensions of fear and hope, embodied in contrasting colors and patterns. The dark palette of deep blacks and dark violets represents fear in the left section, while soft gold and pale green invoke hope in the right. Jagged edges and a split vertical layout introduce a sense of division, with the more vibrant hues converging upwards in a zigzag pattern, reflecting the rising signal of hope against the oppressive heaviness of fear. Broken pixels create an intentional imperfection, echoing the complexity of emotion and fostering a delicate balance between pressure and release.</desc>
