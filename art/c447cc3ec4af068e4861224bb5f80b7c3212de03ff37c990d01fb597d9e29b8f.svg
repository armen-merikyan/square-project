<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Separation</title>
  <desc id="desc">This artwork embodies the emotional tension of longing and resolve, facilitating a rhythmic pulse through color. The warm coral (#FF6F61) and soft amber (#FFD54F) evoke feelings of warmth and longing, while the cold slate (#3B4A6F) and blue-black (#1A1A2E) assert a sense of resolve and structured strength. The center disruptive pattern of broken pixels introduces intentional scars amidst the organized chaos, suggesting both repair and damage. The collision occurs centrally, where the warmth of longing meets the coolness of resolve, creating a dynamic interplay that resists easy interpretation.</desc>
