<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This artwork embodies the emotional clash between restlessness and peace, represented by a dynamic interplay of colors. The palette, featuring cosmic indigo and void black, creates depth and tension, while star white and cold gold provide punctuations of light—speaking to fleeting moments of peace amidst turbulence. The dominant dark tones create a heavy backdrop against which lighter accents provide contrast, achieving the 'light_vs_weight' concept. The arrangement allows broken pixels to disrupt the static tranquility and reflect the fragmented nature of memory and motion, capturing the essence of the seed's abstract narrative.</desc>
