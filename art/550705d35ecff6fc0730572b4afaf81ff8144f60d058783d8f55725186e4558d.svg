<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Shadows</title>
  <desc id="desc">This piece explores the emotional duality of trust and suspicion through color and placement. The warm burnt orange and gold represent trust, bright but shadowed against the cool dark red and charcoal that symbolize suspicion. The composition reflects a vertical split with diagonals emphasizing pressure and tension, through the use of uneven block patterns. The presence of broken pixels creates small scars that disrupt evenness, echoing the theme of resilience and fragility, where the glows of confidence clash against the shadows of doubt. The central collision occurs at the intersection of warm and cool, guiding the viewer's eye while maintaining a sense of unresolved motion through the grid.</desc>
