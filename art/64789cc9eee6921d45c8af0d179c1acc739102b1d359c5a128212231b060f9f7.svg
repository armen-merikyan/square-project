<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Tension</title>
  <desc id="desc">This piece represents the emotional struggle between defiance and submission, using a dichotomy of dark and light. The choice of a contrasting palette—bold reds against deep blacks—highlights conflict and tension. The outer borders are dense and darker, symbolizing the weight of submission, while the inner core features lighter colors, suggesting the defiance to break free. The placement follows a flow from left to right, with a slight displacement that echoes the idea of falling pixels and the feeling of noise. The negative spaces serve as breathers, enhancing the sense of unresolved tension and marking the divisions between emotional states.</desc>
