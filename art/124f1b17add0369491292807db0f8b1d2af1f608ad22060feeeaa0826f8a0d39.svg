  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone of this artwork reflects a tension between longing and limitation, using a palette that contrasts warm saturation and muted coolness. The dominant presence of hot coral and blood orange suggests deep desire, while the charcoal and hollow blue represent the boundary of restraint, creating a visual struggle. The collision occurs at the center with a barcoded pattern denoting desire intersecting with dotted patterns of restraint, effectively symbolizing the push and pull of these emotions. Broken pixels introduce a sense of disruption, adding layers of complexity to the emotional narrative without literal interpretation.</desc>
