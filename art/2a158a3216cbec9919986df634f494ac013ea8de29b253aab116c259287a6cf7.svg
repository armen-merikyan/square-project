<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone juxtaposes joy and grief, expressing an ascending warmth against descending heaviness. The palette, featuring bright yellows and oranges for joy juxtaposed with deep blues and muted purples to signify grief, creates a vivid contrast. The light versus dark contrast is most pronounced in the zigzag flow, suggesting an oscillation between elation and sorrow. Each bright pixel interrupts the deeper tones, capturing the essence of collision in feeling, as the upper portion glows with sparks while the lower descends into muted noise. Thus, the placement evokes a story of emotional tension and unresolved conflict.</desc>
