<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Versus Restraint</title>
  <desc id="desc">This abstract artwork captures the emotional tension between desire and emptiness. The chosen palette of hot coral and blood orange represents the pulsing energy of desire, while the cool charcoal and hollow blue reflect the hollowness of restraint. The upper four rows convey a lively, flame-like pattern symbolizing the urgent pull of desire, intersecting with the more structured, lattice-like feeling of the lower rows that depict emptiness. The contrasting colors and patterns collide to create an unsettling yet compelling composition, while broken pixels introduce imperfection, embodying the chaos of desire suppressed. A large quiet field dominates to emphasize the struggle against the overflow of unmet needs.</desc>
