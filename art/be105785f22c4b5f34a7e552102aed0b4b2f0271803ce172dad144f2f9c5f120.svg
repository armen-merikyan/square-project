<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone emphasizes the conflict between fleeting sparks of hope and the stillness of ash, embodying resilience amidst fragility. The chosen palette reflects 'mourning renewal' with deep blue representing depth and memory, pale yellow as a hint of fleeting joy, and stone grey that provides grounding amidst chaos. The main contrast occurs in the center with dense stripes representing 'spark' crashing into maze patterns symbolizing 'ash', creating a visual echo of tension and release. The asymmetric arrangement and broken pixels enhance the narrative of imperfection and struggle.</desc>
