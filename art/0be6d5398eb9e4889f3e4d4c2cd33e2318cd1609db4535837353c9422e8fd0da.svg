<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Ascent</title>
  <desc id="desc">This artwork captures the emotional discord between defiance and submission, expressed through a triangular flow of color that rises diagonally. The palette features deep blacks contrasted with vibrant reds and soft pale blues to illustrate the tension between chaos and order. The broken dots signal the defiance, creating hard interruptions while the ripples suggest a submission motif that flows quietly, meeting with the sharp edges of disruption in the center. This collision point in the middle represents the threshold—a tumultuous area where both emotions can coexist uneasily. The uneven border reflects the chaotic nature of the scene, enhancing the contrast even further, bringing a sense of unresolved emotional tension to the piece.</desc>
