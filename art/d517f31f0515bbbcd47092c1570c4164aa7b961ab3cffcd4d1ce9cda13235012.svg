<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects the struggle between vulnerability and strength, captured through a palette of earthy, muted tones that evoke resilience. The left side embodies strength with dense, structured barcode patterns in darker greens and rust, while the right side reflects vulnerability with lighter, more chaotic checker patterns in pale whites and grays. The main collision occurs at the vertical center, where the contrasting energies clash—symbolizing the tension between protection and exposure. This arrangement enhances the narrative of resilient fragility and emotional complexity.</desc>
