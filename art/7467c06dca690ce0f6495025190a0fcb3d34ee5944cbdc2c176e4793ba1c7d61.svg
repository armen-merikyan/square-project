<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition embodies the emotional dichotomy of desire and emptiness, represented through a palette of warm and cool colors. The dominant hues of hot coral and blood orange signify desire, creating a central heat that contrasts with the faint perimeter of hollow blue, suggesting emptiness. The interplay of the frame-like structure, evoking desire's pull, collides against the negative cross pattern, symbolizing barriers and restraint. Using intentional broken pixels adds a sense of disruption, enhancing the tension between fullness and void. The layout resembles falling pixels, cascading from the top and anchoring the composition in a sense of gravity and longing, highlighting the ongoing battle between reaching out and the barriers that confine.</desc>
