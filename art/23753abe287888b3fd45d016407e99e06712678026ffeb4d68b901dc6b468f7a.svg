<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece explores the emotional tension between defiance and submission through a palette of soft and severe colors. The core idea of 'center vs edges' creates a balanced composition where muted backgrounds clash with striking accents. The main collision occurs at the center with sharp crimson and warm white, while the surrounding layers maintain a softer cadence of steel gray and powder pink. This represents the struggle and contrast inherent in the seed's emotional duality, with broken pixels introducing intentional imperfections that mirror the chaos of conflicting emotions. The structured but disrupted arrangement resonates with the idea of thresholds and borders, encouraging the viewer to decipher the emotional nuances within the abstract pattern.</desc>
