<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">The emotional tone of this piece reflects the tension between quietness and pressure. The palette features a mixture of muted tones like off-white and dust gray, combined with a bold compressed red and dark navy. This choice introduces a stark contrast, emphasizing the pressure against quieter spaces. The arrangement utilizes a stacked bands layout, with denser colors anchoring the left side symbolizing pressure, while the right gradually releases into softer hues of faint peach and off-white, representing quiet. The main collision occurs along the diagonal, where sharp edges meet softer transitions, echoing the title's theme of conflicting emotions. This use of color and form disrupts the space and creates a dynamic feeling, suggestive of shattering against a tide or the illusion of clarity in confusion.</desc>
