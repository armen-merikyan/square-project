<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Contrasts</title>
  <desc id="desc">This artwork expresses the emotional clash between love and betrayal. The palette incorporates warm pink and red to evoke passion and connection, contrasted with deep gray and dark maroon tones that signify conflict and sorrow. The arrangement features a sharp transition from lighter to darker colors rising vertically, symbolizing the ascent from hope to despair. A mixture of structured patterns for love (maze) and chaotic elements for betrayal (ring) creates an unsettling rhythm, diminishing neatness with a few broken pixels to showcase imperfection, representing memories that linger and interfere. The negative space exists to amplify feelings of isolation amid emotional noise.</desc>
