<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center Against the Abyss</title>
  <desc id="desc">This composition reflects the tension between fear and hope, with the top half embodying dense darkness and jagged edges, while the bottom half offers a fragmented crosshatch of soft gold and pale green to convey hope. The black and dark violet represent fear's emptiness, contrasting sharply with the small bursts of light in the lower section. The disruption of pattern and asymmetry creates a sense of unresolved emotion, as if hope is struggling against the oppressive weight of fear.</desc>
