<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">This abstract piece embodies the emotional conflict of vulnerability versus strength through contrasting color dynamics. The dark palette evokes a sense of depth and weight, symbolizing strength, while the soft gold and pale green introduce hints of vulnerability and hope. The layout features a central collision of colors that interrupt one another, aligning with the concept of strength being both protective and oppressive. The edges are jagged, suggesting vulnerability, while the dominant dark pixels create a stable foundation. Broken pixels throughout add an element of imperfection, a nod to the emotional scars of vulnerability. The overall composition remains abstract yet communicates layers of emotion through color and pattern.</desc>
