<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">This artwork encapsulates the emotional duality of 'signal vs noise' through a deliberate interplay of dark and light hues, reflecting static interference and a lone clean pulse. The palette borrows from the 'lonely_signal' family, with deep navy and black providing a tranquil, heavy foundation, contrasted by bright dim cyan and a single white highlight. The left and right sides echo each other, yet the deliberate misplacements introduce tension, embodying the concept of brokenness. The center pulse emerges as an effective yet intermittent path within the chaos, producing an overall sensation of tension between clarity and confusion.</desc>
