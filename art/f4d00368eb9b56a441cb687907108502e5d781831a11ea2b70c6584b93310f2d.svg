<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance in Tension</title>
  <desc id="desc">The emotional tone explores the contrast between defiance and submission, represented through a dominant lattice pattern for defiance, clashing against an interrupted split-screen for submission. A curated palette of warm and cool tones evokes feelings of intimacy amidst distance, with the warm shadow creating a strong presence at the center, interrupted by cool blue and distant lilac. The central area is heavily occupied, embodying the tension of defiance, while the edges allow for a quiet release, creating a deliberate collision that speaks to the struggle between order and chaos.</desc>
