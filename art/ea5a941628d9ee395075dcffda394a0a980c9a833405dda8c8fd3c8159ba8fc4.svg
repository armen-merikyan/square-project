  <title id="title">Erosion of Shelter</title>
  <desc id="desc">This piece embodies the emotional tension between vulnerability and protection. The palette, featuring 'shelter_green' and 'cold_white', reflects both tranquility and tension. The dominant cool colors represent exposure, while warmer hues in the border provide a sense of safety. The central collision of pale tones echoes vulnerability, contrasting sharply with the darker edges that feel like a protective barrier. The design mimics a split vertical flow, accentuating the push and pull between safety and exposure, creating a dynamic rhythm through contrasting patterns.</desc>
