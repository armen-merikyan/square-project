<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow of Emotion</title>
  <desc id="desc">The emotional tone reflects a clash between defiance and submission, mirrored by a palette of deep reds for intensity and pale blues for calm. The contrast is strikingly polarized from the edges towards the center, embodying a struggle between passionate fire (defiance) and subdued restraint (submission). The main collision occurs in the diagonally arranged colors from dark to light, conveying a sense of pressure that radiates inward while remaining tempered by open space, alluding to unresolved emotions. The pattern emerges from the tension, with certain pixels 'falling' into place, symbolizing the fragmentation of the emotional narrative.</desc>
