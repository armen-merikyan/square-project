<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Resolve</title>
  <desc id="desc">The emotional tone reflects a struggle between longing and resolve, embodied in the juxtaposition of warm and muted colors. The palette, comprised of red oxide and blackened plum, introduces heat and depth, while muted cream and iron gray provide a rich field of quiet contrast. A pulse runs diagonally through the composition, representing urgency amid serenity, allowing for a tension that dominates the canvas. The layout, eroded symmetry, highlights the balance between pressure and release, with broken pixels adding intentional disruptions, suggesting a narrative of imperfection and repair.</desc>
