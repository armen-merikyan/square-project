<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissonant Harmony</title>
  <desc id="desc">The emotional tone of this piece reflects the tension between relief and dread, using a palette that balances soft and muted tones for frustration against brighter accents. The color choice emphasizes a spiral movement, where dark hues dominate the top half (dread) while soft, lighter colors emerge toward the bottom (relief), creating a sense of rising tension. The sharp contrast between near-black and faded gold suggests a collision of emotions, while broken pixels symbolize the imperfections within this struggle. The layout disrupts even distribution, allowing for a dense concentration of dark colors in the upper rows and looser, airy qualities below, emphasizing the transition from chaos to order.</desc>
