<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Dichotomy</title>
  <desc id="desc">The artwork captures the tension between joy and grief by employing a sharp contrast in color and placement. The left side, dominated by vibrant yellows and oranges, represents joy with expanding patterns reminiscent of sparks and cracks, radiating positivity. In sharp contrast, the right side features deep blues and muted purples, encapsulating grief through a stair-step pattern that feels fragmented and heavy. The use of hard edges emphasizes a distinct separation between these emotions, while maintaining a sense of flow from bottom to top, illustrating a struggle between order and chaos. The layout allows for negative space, giving room for the emotions to breathe, while the arrangement reflects an inner conflict, resonating with the seed's themes.</desc>
