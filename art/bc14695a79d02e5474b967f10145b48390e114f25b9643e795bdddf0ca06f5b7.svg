<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Longing</title>
  <desc id="desc">This composition reflects the emotional dichotomy of emptiness and desire, with a diagonal layout that showcases the struggle between a hollow void and a vibrant need. The color palette incorporates warm and cool tones, contrasting the depths of charcoal (#333333) and hollow blue (#5B7FBA) against vibrant accents like hot coral (#FF5A5F) and blood orange (#FF4C00). The staircase pattern of desire pushes against the split screen of emptiness, creating a dynamic collision in the center of the square, where the saturation meets containment. Broken pixels are scattered sporadically, adding a sense of imperfection and tension to the piece, evoking the quiet pressure of expectations and the yearning for release.</desc>
