  <title id="title">Pulse of Hunger</title>
  <desc id="desc">The emotional tone reflects the tension between desire and restraint. The palette combines vibrant red_oxide and small_orange for saturation, representing the pull of desire, against muted_cream and blackened_plum illustrating the weight of restraint. The main collision is seen in the central cluster of intense colors surrounded by negative space, emphasizing the struggle to break free while being hemmed in. The layout embodies two pulses that both approach and repel each other, crafting a dynamic rhythm of longing and containment.</desc>
