<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Memory</title>
  <desc id="desc">The emotional tone embodies an interplay between the fleeting nature of sparks (ignition, vitality) and the heavy, quiet remnants of ash (softness, loss). The palette blends muted plum with soft cyan to represent memory's soft edges, while rain blue and lavender gray convey tension between the dualities of hunger and restraint. The contrast emerges as sparks of color appear in jagged clusters juxtaposed against smoother, muted fields, creating emotional collision at the center of the square. The pattern reflects sudden memories—interrupted cycles evoking both resilience and fragility, embodying the push and pull inherent in memory and erasure.</desc>
