<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition captures the emotional dichotomy of 'rage' and 'calm' as defined in the seed. The left side, dominated by darker colors (black, dark greys), represents contained rage—compressing energy and pattern through an ash-field texture, suggesting intensity in a restricted space. The right side balances this with cooler, gentle tones of pale blue and white, symbolizing calm and quiet, organized with dot patterns to evoke serenity. Main contrast occurs at the vertical divide, creating a dynamic tension as the dark tones erupt towards the center. This arrangement reinforces the narrative of a struggle between explosive emotion and tranquil containment, encapsulating the essence of the seed.</desc>
