<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">hunger_vs_restraint</title>
  <desc id="desc">This artwork explores the emotional contrast of desire versus emptiness, with a focus on a saturated pull meeting a restrained border. The left half uses warm, vibrant colors that evoke a sense of desire ('hot coral' and 'blood orange'), while the right half utilizes cooler, subdued shades that represent the hollowness of emptiness ('charcoal' and 'hollow blue'). The design features an asymmetric balance; the dominant desire colors (60%) manifest a glowing halo pattern, creating a stark contrast against the gentle, dotted emptiness on the right. The main collision occurs at the center, emphasizing a tension between the two emotional states. This interplay of colors and patterns reflects ongoing internal conflicts and the complexity of longing against restraint.</desc>
