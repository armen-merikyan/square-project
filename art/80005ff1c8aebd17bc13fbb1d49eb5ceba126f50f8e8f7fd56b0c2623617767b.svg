<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">The emotional tone of this piece reflects the tension between rage and calm, represented by the chaotic intermingling of hot reds and cooler blues. The choice of the palette with reds for rage, blacks for containment, and blues for calm creates a visual conflict. Central pulses of warm tones clash with horizontal bands of tranquil blues, embodying the theme of overflow versus containment. The negative space allows for a sense of breath amidst the dense pixel arrangements. The juxtaposition of barcoded coolness against jagged bursts suggests a rhythmic struggle, leading to the viewer's emotional engagement with the piece.</desc>
