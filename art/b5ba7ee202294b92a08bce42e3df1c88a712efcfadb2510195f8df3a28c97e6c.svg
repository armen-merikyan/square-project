<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork embodies the emotional tension between control and surrender, represented through a contrast of colors and patterns. The dominant black and pale blue convey a sense of contained pressure and calm expanse, respectively. The central area is filled with pale blue, symbolizing the exposed vulnerability, while black outlines create a thick frame of control around it. The checker pattern interrupts the constellation-like flow, suggesting an ongoing battle between density and emptiness. The main collision occurs at the center where the calm meets the constrained chaos, echoing the emotional struggle of relinquishing control.</desc>
