<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">The piece captures the emotional tone of restlessness against peace through a palette that juxtaposes vibrant and muted colors. The deep olive and cream serve to evoke tranquility, whereas the acid green and honey gold introduce tension. The main contrast, a shift from erratic patterns in the upper half to more structured, calming designs below, represents the struggle between inner chaos and outer tranquility, influenced by the concept of a 'ladder' which suggests movement and evolution. The broken pixels introduce disruptions, enhancing the sense of restlessness.</desc>
