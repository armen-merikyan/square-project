<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Ascent</title>
  <desc id="desc">This artwork encapsulates the emotional conflict between desire and restraint through a dynamic interplay of saturated and muted colors. The palette of hot coral, blood orange, dust pink, charcoal, and hollow blue evokes deep passion yet contrasts with reflective quietness. The spiral layout introduces a sense of pressure and motion, with the vibrant colors dominating the center, suggesting yearning while cooler tones retreat towards the edges, symbolizing the tension of restraint. Broken pixels disrupt the flow, reinforcing the imperfect nature of emotion, while maintaining a significant amount of negative space to let the viewer's eye pause and reflect on the collision of feelings.</desc>
