<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Contrast</title>
  <desc id="desc">This artwork explores the emotional interplay between trust and suspicion through contrasting patterns. The left half employs a warm burnt orange and gold palette to signify trust, flowing smoothly and encouraging openness. In contrast, the right half uses muted dark red and charcoal to express suspicion, characterized by fragmented and harsh edges that disrupt the flow. The center serves as a collision point, where the structured warmth encounters the chaotic shadows, creating tension within the pattern. The arrangement symbolizes the struggle of resilience against fragility, with broken pixels integrating imperfections as scars that hint at deeper narratives.</desc>
