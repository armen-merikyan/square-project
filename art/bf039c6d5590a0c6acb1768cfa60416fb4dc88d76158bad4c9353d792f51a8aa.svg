<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">The artwork captures the conflict between joy and grief through contrasting colors and patterns. The palette of bright yellows and oranges represents joy, opposing deep blues and muted purples signifying grief. The arrangement creates a visual tension with dense clusters of emotion on the left, softening into emptier space on the right. This split horizontal layout echoes the 'light vs weight' theme, allowing for a visual narrative of expansion and limitation, where bright, crackled forms clash against dot-like voids, reflecting feelings of conflict and resolution.</desc>
