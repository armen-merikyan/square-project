<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">This composition explores the tension between sudden brightness (spark) and settled dust (ash). The palette draws from muted earthy tones and stark contrasts, using warm brown and cold white as focal points. The main collision occurs diagonally, suggesting both movement and conflict, representing the struggle of resilience against fragility. The arrangement captures falling pixels, portraying the weight of memory against the desire to erase. Subtle broken pixel elements create imperfections, echoing the interplay of hope and despair throughout the square.</desc>
