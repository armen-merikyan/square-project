<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Boundless Tension</title>
  <desc id="desc">The emotional tone of desire vs restraint creates a visual push and pull within the composition. The palette comprises saturated hues like hot coral and blood orange to embody desire, contrasted against muted fields of charcoal and hollow blue, symbolizing restraint. The layout divides the canvas vertically, leading to a stark emotional collision at the center; the stepwell patterns reflect a rhythmic pressure that spirals inward, while the broken pixels act as scars on the otherwise smooth surface, suggesting imperfections in a struggle. This composition echoes the push against sealed edges, capturing the tension between longing and limitation.</desc>
