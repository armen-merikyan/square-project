  <title id="title">Tension of Asymmetry</title>
  <desc id="desc">This artwork captures the emotional tension between envy and gratitude through a deliberate imbalance in color distribution and patterns. The warm palette of burnt orange and dark red contrasts against the deeper charcoal, representing the weight of envy against the lightness of gratitude. The center features a densely packed formation that creates a sense of pressure, juxtaposed with lighter, more open areas, reflecting the unsettling echoes of broken mirrors. The zigzag pattern intersects with the stair formation, forming tension in both direction and texture, embodying the emotional struggle. The broken pixels introduce imperfection as a reminder of the unpredictability of emotions.</desc>
