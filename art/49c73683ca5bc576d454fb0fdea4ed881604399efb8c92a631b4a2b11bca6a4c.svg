<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Embrace</title>
  <desc id="desc">The emotional tone explores the contrast between vulnerability and strength, creating a visual narrative of resilience through the tension of exposed light against a dense dark background. The palette, rich in cosmic indigo and void black highlights a feeling of awe and terror, with cold gold and deep teal used to accentuate the push and pull between the concepts. The palette splits diagonally, with vulnerability represented by a radial pattern in lighter tones, and strength occupying the base with constellation motifs in darker shades, interrupted by scattered, broken pixels, symbolizing imperfections in both states.</desc>
