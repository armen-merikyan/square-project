<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Symmetry</title>
  <desc id="desc">This composition explores the tension between safety and exposure, incorporating a palette of shelter green, warm brown, pale skin, cold white, and open blue. The contrasting stripes of exposure (blue and white) clash with the thread-like patterns of safety (warm brown), creating a visual echo at the center while maintaining an eroded symmetry around the edges. The bold color placements suggest a protective vessel enveloping a vulnerable core, invoking feelings of both vulnerability and stability. Subtle broken pixels disrupt the harmony, representing imperfections and the delicate balance of safety amidst exposure.</desc>
