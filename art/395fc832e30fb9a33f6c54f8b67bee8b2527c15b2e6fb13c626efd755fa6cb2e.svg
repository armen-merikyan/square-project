<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Control</title>
  <desc id="desc">The emotional tone of the piece explores the tension between softness and severity. The chosen palette—powder pink and warm white suggesting softness, contrasted by carbon black and steel gray reflecting severity—creates a dynamic interplay. The main collision occurs in the corner, where dense clusters of darker shades pulse against the lighter hues, embodying pressure. This feels like a struggle between calm and chaos, echoing the seed's themes of conflict and resolution. The arrangement reflects a counter-clockwise spiral, hinting at unravelling or retreat, which threads throughout the layout and pattern.</desc>
