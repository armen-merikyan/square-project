<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">This artwork explores the emotional tension between longing and resolve through a juxtaposition of soft cool tones and sharp warm accents. The palette is inspired by the clarity of ice blue and clean white representing resolve, contrasted with warning orange, which embodies the urgency in the longing aspect. The composition features a central collision of soft dots (replicating longing) flowing downward, intercepted by more defined, rising lines of hues for resolve, creating a dynamic rhythm. The broken pixels are intentionally placed to suggest interruptions and imperfection, resonating with the theme of repair versus damage.</desc>
