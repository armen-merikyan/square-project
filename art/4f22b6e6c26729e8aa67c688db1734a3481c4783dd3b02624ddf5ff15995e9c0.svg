<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shattered Calm</title>
  <desc id="desc">The emotional tone shifts between moments of intense restlessness and soft peace. The palette comprises muted tones of shelter green, warm brown, and pale skin that evoke warmth and safety mixed with stark contrasts of cold white and open blue, suggesting tension. The main collision occurs at the center, where the checker pattern of peace intertwines with the chaotic negative cross of restlessness. This creates a visual narrative of movement battling stillness, with broken pixels representing the interruptions in calm.</desc>
