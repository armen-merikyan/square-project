<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The artwork explores the emotional tension between longing, characterized by radial patterns in muted tones, and resolve, represented by sharper, focused accents. The color palette of off-white, dust gray, compressed red, dark navy, and faint peach creates a calm yet charged atmosphere. The collision occurs at the center where radial patterns meet the structured 'target' design, symbolizing the push and pull between chaos and order. Negative space is intentionally incorporated to enhance feelings of distance within intimacy, allowing the visual narrative to breathe.</desc>
