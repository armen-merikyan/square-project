<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inside vs. Outside</title>
  <desc id="desc">The emotional tone conveys the tension between envy and gratitude, where the outer edges represent envy—denser, darker, and more chaotic—and the inner core symbolizes gratitude, lighter and more structured. The chosen palette of yellow and orange reflects warmth and hope, contrasting with the deep blue and muted purple that evoke feelings of sadness and incompleteness. Main contrast occurs at the boundary where the vibrant core meets the oppressive outer colors, suggesting a dynamic struggle between positive and negative emotions. The abstract pattern encapsulates this narrative through soft edges and broken pixels that mirror life's imperfections, evoking both fear and hope as one navigates through emotional layers.</desc>
