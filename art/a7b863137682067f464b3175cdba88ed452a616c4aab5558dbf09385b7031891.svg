<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">This piece captures the duality of longing and resolve through a juxtaposition of soft and strong colors. The palette, inspired by guilt and forgiveness, comprises warm ivories and deep wines which convey a sense of emotional weight and illumination. The asymmetrical grid pattern echoes the ideas of a 'broken mirror', suggesting both clarity and fracture. The main collision occurs centrally, where the radial pattern of resolve meets the checker pattern of longing, highlighting the tension between these emotions. The negative space allows the viewer to breathe amidst the complexity, enhancing the narrative of seeking balance in chaos.</desc>
