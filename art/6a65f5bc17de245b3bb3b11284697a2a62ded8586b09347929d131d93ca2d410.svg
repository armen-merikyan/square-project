<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone embodies a struggle between overwhelming desire and the constraint of emptiness. The palette is balanced between warm coral and orange to express desire, alongside cool charcoal and hollow blue suggesting void and distance. The main contrast emerges as the inner 4x4 grid of saturated colors battles against the cooler, darker outer border. The arrangement provides a visual echo, as vertical and horizontal bar patterns occasionally collide creating a spiraling, chaotic effect, while broken pixels denote imperfections, enhancing a feeling of continuity against disruption.</desc>
