<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Radial Tension</title>
  <desc id="desc">The composition embodies the emotional dichotomy of panic versus control. The chosen color palette features deep navy and black to evoke a sense of weight and confinement, contrasted against the brightness of white and dim cyan, which suggest clarity and escape. The central cluster of darker colors represents the overwhelming feeling of panic, while the lighter stripes radiating outward symbolize attempts at control, creating a dynamic collision at the center of the canvas. This action evokes an inward pull, where the edges provide a space of quiet contrast, allowing the viewer to engage with the emotional tension without literal representation. The broken pixel effect introduces imperfection, further emphasizing the theme of disrupted balance.</desc>
