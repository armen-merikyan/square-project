<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges: The Struggle of Presence</title>
  <desc id="desc">The emotional tone contrasts the fleeting spark of life against the quiet decay of ash. The palette combines stark colors representing clarity (white, ice blue) with darker tones (ink black, violet gray) to evoke a sense of tension between vibrancy and stillness. The main collision occurs at the center, where bright orange threads of resilience interrupt the surrounding ash-like gray fields, illustrating the struggle between memory and erasure. Each row's pattern reflects a stacked band layout, symbolizing how layers of emotional experiences shift from vibrancy to subtlety, creating a swirling dynamic of contrast and connection.</desc>
