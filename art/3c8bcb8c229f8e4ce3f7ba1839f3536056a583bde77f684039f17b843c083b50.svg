<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This piece encapsulates the emotional tension between joy and grief through contrasting colors and patterns. The dense orange and yellow on the left, representing joy, gradually shifts to the muted purples and deep blues of grief on the right. The use of crosshatch on the joy side symbolizes expansion and vitality, while the segmented teeth-like pattern on the grief side expresses fragmentation and drooping feelings. The strong vertical division highlights the collision of these emotions, creating a visual dialogue that represents the push and pull of these opposing states.</desc>
