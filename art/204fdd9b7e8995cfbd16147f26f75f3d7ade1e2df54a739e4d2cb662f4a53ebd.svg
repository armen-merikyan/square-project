<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork captures the emotional tension between desire and emptiness through a dynamic interplay of colors and patterns. The palette features warm tones of hot coral and blood orange to represent desire, contrasted by cool shades like charcoal and hollow blue for emptiness. The layout employs a narrow negative-space path to symbolize quiet pressure, while the broken dot and braid patterns collide in dense clusters at the center, symbolizing the conflict between saturation and restraint. Broken pixels introduce intentional disruptions, enhancing the notion of tension and fractured desire, with the dominant emotion of desire visually compelling at 65% coverage.</desc>
