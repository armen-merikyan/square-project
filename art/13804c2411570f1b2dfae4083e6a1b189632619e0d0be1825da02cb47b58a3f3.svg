  <title id="title">Weight of Emotion</title>
  <desc id="desc">This artwork embodies the tension between dread and relief through a palette of burnt orange, dark red, charcoal, and gold. The contrast is accentuated by placing lighter shades at the top, suggesting a heavy burden lifting downward. The grid pattern for dread contrasts with the crack pattern for relief, symbolizing fractured perceptions and emerging hope. The predominant dark colors create a looming weight, while scattered lighter pixels signify moments of brightness. Each color placement evokes emotional collisions, reflecting an intricate balance between despair and hope.</desc>
