<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Weight</title>
  <desc id="desc">The artwork embodies the emotional conflict between fear and hope. Each color represents different qualities—black represents fear's heaviness, while soft gold captures the lightness of hope. The 4x4 inner core bursts with radial patterns of pale green and gold, contrasting with the jagged black edges, emphasizing a boundary between tension and calm. The vertical split enhances the contrast of dark and light, creating a dynamic interplay of emotions that suggests a machine-like precision in the arrangement. The negative spaces contribute to the feeling of echoing decisions—space left implies quietness amidst pressure.</desc>
