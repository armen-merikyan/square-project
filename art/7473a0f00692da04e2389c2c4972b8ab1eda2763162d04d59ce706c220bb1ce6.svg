<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This artwork embodies the emotional duality of joy and grief, represented through contrasting color placements and patterns. The palette, featuring vibrant yellows and oranges juxtaposed with muted blues and purples, encapsulates the tension between uplifting and heavy emotions. The ‘falling_pixels’ layout introduces a sense of descent, while the jagged edges suggest interruption against a smooth emotional gradient. The use of crosshatch and dot patterns reflects the chaotic rhythm of joy's bursts colliding with the heavy weight of grief, creating a layered interplay of dense clusters and quiet spaces.</desc>
