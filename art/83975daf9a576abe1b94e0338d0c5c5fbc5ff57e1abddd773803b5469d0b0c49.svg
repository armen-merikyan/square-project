<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This piece embodies the contrasting emotions of joy and grief through a dynamic interplay of color and structure. The palette utilizes warm yellows and oranges to represent joy against deep blues and muted purples signifying grief. The center is a stark contrasting area that captures attention, suggestive of a pulse in the emotional landscape. The grid represents a structured approach to life, while the darker edges show how grief interrupts that symmetry, creating a tension that runs through the piece. The overall layout invites viewers to feel the push and pull of these two powerful emotions, while the broken pixels subtly contribute to the sense of imperfection in our emotional experiences.</desc>
