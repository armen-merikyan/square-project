<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This abstract composition captures the emotional tension between desire and restraint through a dynamic contrast of saturated and muted colors, reflecting a push and pull toward the edges. The warmer reds and oranges symbolize unfulfilled hunger, while the cooler muted creams and grays signify a locked border of restraint, creating a push-pull effect across the grid. The arrangement emphasizes a central collision of warm and cool colors, surrounded by areas of negative space, offering a sense of containment and pressure toward release. Notably, the pattern of 'rain' contrasts with the 'rings' of desire, illustrating the emotional conflict through their intersections.</desc>
