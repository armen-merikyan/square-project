<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience and Fragility</title>
  <desc id="desc">The emotional tone reflects the juxtaposition of vitality and decay, with warm sparks of color meeting the muted ash tones. The palette features quiet pressure colors like off-white and dust gray for the ash, contrasted with compressed red as accents representing the spark. The main collision occurs in the center where bright and dark interact, suggesting tension and release, as well as memory versus erasure. The jagged edges of the patterns evoke the idea of fragmentation and resilience amidst loss. The overlay of the veil and stack patterns creates a complex narrative of pressure and contrast, echoing the themes from the seed.</desc>
