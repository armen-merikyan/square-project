  <title id="title">Emotional Currents</title>
  <desc id="desc">This artwork captures the tension between joy and grief through a contrasting palette of deep blues and bright yellows. The top half represents joy with warm, vibrant colors, suggesting spark and openness, whereas the bottom half embodies grief through cooler, muted tones that create a sense of heaviness. The jagged edges signify the abrupt shifts in emotion, with the grid pattern in the grief section clashing against the flowing rain pattern in the joyful area, creating a visual collision. The arrangement reflects an inner struggle, with a central seed of tension surrounded by the nuanced push and pull of emotional states.</desc>
