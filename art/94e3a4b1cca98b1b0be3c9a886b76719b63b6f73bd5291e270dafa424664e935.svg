<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tension</title>
  <desc id="desc">This composition captures the push and pull between envy (dark, heavy colors) and gratitude (light, radiant accents). The palette, featuring deep blacks and soft golds, reflects the contrasting emotions. The dance of colors echoes the conflict between the weight of envy and the lightness of gratitude. The pattern plays with symmetry and asymmetry, creating a 'tiny_plus' central shape that disrupts the surrounding darker colors, while leaving significant empty spaces to evoke the feeling of an 'empty room'. This layout emphasizes the emotional distance and tension inherent in the themes provided.</desc>
