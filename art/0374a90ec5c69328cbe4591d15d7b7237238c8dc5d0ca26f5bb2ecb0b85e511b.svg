<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tidal Whispers</title>
  <desc id="desc">The emotional tone juxtaposes vulnerability and strength, expressed through a palette of warm yellows and muted purples set against a deep blue backdrop. The central square represents strength with its dense structure of warm colors, embodying stability, while the lighter, softer hues around the edges symbolize vulnerability, evoking a sense of exposure. The arrangement forms a dynamic contrast at the center, with density colliding against the quiet corners, mirroring the tides and the feeling of constantly breaking against barriers. Broken pixels are introduced to create intentional disruption, reflecting the imperfections in safety and exposure.</desc>
