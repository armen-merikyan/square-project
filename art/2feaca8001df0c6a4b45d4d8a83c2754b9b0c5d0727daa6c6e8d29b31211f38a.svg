  <title id="title">Order vs. Chaos</title>
  <desc id="desc">This composition explores the collision between envy and gratitude through a structured outer frame contrasted by a chaotic inner core. The warm hues of yellow and orange represent gratitude, while the deeper blues and muted purples symbolize envy. The main contrast occurs where the orderly pattern of the outer frame meets the unpredictable interruptions within, reflecting the tension between these two emotions.</desc>
