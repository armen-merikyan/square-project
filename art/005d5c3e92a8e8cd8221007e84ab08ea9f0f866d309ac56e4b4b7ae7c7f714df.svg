<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collisions</title>
  <desc id="desc">This artwork captures the tension between desire and restraint. The palette features warm hues of hot coral and blood orange to represent saturated emotional longing, contrasted with the deeper, cooler tones of charcoal and hollow blue, embodying restraint. The central area is dense and rich, suggesting overwhelming desire that collides with the muted edges symbolizing containment. The lattice layout signifies the structure attempting to hold back these intense colors, while the spiral-like flow indicates a swirling motion underlying the conflict. Broken pixels introduce nuances of imperfection and disruption, reinforcing the emotional struggle.</desc>
