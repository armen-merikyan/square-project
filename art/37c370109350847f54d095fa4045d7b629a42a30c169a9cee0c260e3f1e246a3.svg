<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience in Fragments</title>
  <desc id="desc">This piece contrasts the vibrance of heat ('spark') with the muted tones of ash. The palette combines warm shadow tones with accent colors from the 'spark' side, creating emotional tension in the layout. The main collision occurs in the center, where sharp, jagged static patterns of warm colors intersect with soft, dotted ash patterns, symbolizing resilience and fragility against the backdrop of memory and erasure. The use of broken pixels introduces imperfection, reflecting emotional scars. The overall arrangement creates a rhythm of pulse and stillness, conveying a story of conflict and coexistence.</desc>
