<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hungry Echoes</title>
  <desc id="desc">This artwork juxtaposes the emotional tension between emptiness and desire through a contrasting color palette. The warm hues of hot coral, blood orange, and dust pink represent desire, with an energetic pulse that suggests yearning and saturation. In contrast, charcoal and hollow blue symbolize emptiness, creating static areas that disrupt and contain the vibrant colors. The main collision occurs in the center, where desire's pulse marks overlaid on the quiet fields of charcoal create a sense of tension and interruption, echoing the internal struggle of wanting and restraint. Broken pixels introduce imperfection, resembling scars that speak to the struggle against containment. Overall, the composition embodies the narrative of an energetic pull hindered by boundaries, emphasizing the interplay of desire against the backdrop of emptiness. The negative space ensures clarity and focus on the central theme, encapsulating the emotional story within this abstract pattern.</desc>
