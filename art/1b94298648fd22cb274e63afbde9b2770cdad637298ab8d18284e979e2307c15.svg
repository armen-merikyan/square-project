  <title id="title">Symmetry in Disruption</title>
  <desc id="desc">This artwork captures the tension between confusion and clarity. The palette of sepia, tan, and faded blue evokes a sense of nostalgia while contrasting the starkness of the deeper gray tones. The split layout symbolizes a duality where the top half embodies clarity through clean, structured patterns, and the bottom half illustrates confusion with broken pixels that disrupt harmony. The thick outlines emphasize the center, drawing the eye outward into chaotic, fragmented shapes. Here, the center is a heavy concentration of clarity that gradually yields to disarray at the edges, mirroring the emotional journey from certainty to uncertainty.</desc>
