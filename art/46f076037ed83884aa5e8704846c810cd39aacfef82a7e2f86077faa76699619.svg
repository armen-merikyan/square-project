<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Desire</title>
  <desc id="desc">This artwork explores the emotional tension of emptiness versus desire. The palette combines warm yellows and oranges with deep blues and muted purples, reflecting a clash between aspiration (warm) and vacant stillness (cool). The bright colors punctuate the dark edges, symbolizing the sharp contrasts of yearning amidst void. The structure is framed with deeper colors, embodying the weight of emptiness, while the vibrant center signifies the pulse of desire. The broken pixel influences create a sense of imperfection and rawness, echoing the fragility of feelings.</desc>
