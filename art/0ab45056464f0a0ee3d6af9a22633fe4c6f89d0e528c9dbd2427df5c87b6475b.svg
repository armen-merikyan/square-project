<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension at the Threshold</title>
  <desc id="desc">This piece embodies the emotional dichotomy of defiance and submission through a carefully selected palette of muted and vibrant colors. The rain blue serves as a calm yet assertive background, embodying the chaos of defiance, while soft cyan and lavender gray introduce a sense of submission, softness, and quietness. The collision occurs primarily in the center, where the bright contrast of the moon white frames cuts sharply through the heavier edges, showcasing the tension between the two emotional states. The broken pixels serve as intentional disruptions, echoing significant moments of interruption, enhancing the overall narrative of pressure and release.</desc>
