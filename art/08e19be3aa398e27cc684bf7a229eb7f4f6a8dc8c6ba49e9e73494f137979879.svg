<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition embodies an emotional tug-of-war between rage and calm. The palette transitions from stark reds to muted blues, facilitating a strong visual narrative. The reds emerge fiercely at the center, disrupting the cooler, more serene tones that attempt to contain them at the edges. This juxtaposition of hot and cool reflects the seed's themes of conflict and balance, while the arrangement encourages the viewer's eye to navigate the tension created by juxtaposing sharp, jagged forms of red against smoother, horizontal fields of blue. Broken pixels are interspersed to symbolize the imperfections, reinforcing the idea of chaos within calm.</desc>
