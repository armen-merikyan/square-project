<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This composition embodies the emotional contrast between longing and resolve. The warm coral and soft amber instill a sense of distant warmth, representing longing, while cold slate and blue-black convey a sense of resolved strength, creating a dynamic tension across the grid. The main collision occurs in the center, where the warm colors of longing meet the dark, firm tones of resolve. The layout emphasizes an island of dense colors surrounded by softer hues, echoing the idea of intimacy versus distance, creating a visual metaphor for emotional thresholds.</desc>
