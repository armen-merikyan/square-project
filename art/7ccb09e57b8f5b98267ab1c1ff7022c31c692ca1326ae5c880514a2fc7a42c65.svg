<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This artwork embodies the emotional tension between trust and suspicion. The black (#000000) and pale blue (#A0C4F5) offer a stark contrast representing the back-and-forth tension of certainty and doubt. The dense clusters of broken dots on the left evoke suspicion, while the right side's clean lines symbolize trust, creating an interrupted channel that draws the eye diagonally. The use of vibrant red (#D94D38) as the accent color interrupts the calmer tones, suggesting a sudden disruption in the flow of emotions, with broken pixels representing the scars left by these feelings. The careful placement respects the need for negative space, allowing the colors to breathe and the emotional layers to resonate. The pattern is intentionally asymmetric, with collision occurring centrally, balancing chaos with moments of calm.</desc>
