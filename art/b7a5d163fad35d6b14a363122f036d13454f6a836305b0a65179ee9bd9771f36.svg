<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast and Containment</title>
  <desc id="desc">This composition captures the emotional tension of 'desire vs restraint' through a palette of warm red oxide and muted cream, interspersed with contrasts of blackened plum and iron gray. The predominant warmth signifies desire, spilling over from edges to suggest an emotional overflow, while the cooler tones serve as boundaries—highlighting the struggle between release and containment. Broken pixels represent scars of betrayal, creating visual echoes of tension, reflected in the glitched patterns against the structured stairs of restraint. The center captures the main collision, creating a dynamic contrast that invites the viewer to experience the emotional narrative.</desc>
