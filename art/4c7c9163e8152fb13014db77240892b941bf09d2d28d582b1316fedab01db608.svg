<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Harmony</title>
  <desc id="desc">This artwork embodies the emotional juxtaposition of restlessness and peace. The palette transitions from dark violet (#4B0082) to soft gold (#FFD700) to evoke warmth against cool depths. The patterns of stripes penetrate through halo-like disruptions, invoking chaos spilling into calmness. The tension is concentrated diagonally where warm gold illuminates the cool dark, creating stark contrast as shapes echo outwards, suggesting memory's motion against the stillness of reflection. Each broken pixel represents scars from overexertion and quiet moments of restraint, all while maintaining a necessary negative space for contemplation.</desc>
