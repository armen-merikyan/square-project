<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">The emotional tone reflects the conflict between envy and gratitude, captured in the split layout where the top reflects rising pressure and the bottom reflects a falling calm. Colors transition from a vibrant palette with reds and pinks associated with envy to the softer grays and dark maroons that evoke gratitude. The chaos of emotions is depicted with the sharp contrast in color density—bright, jarring colors above, merging into muted tones below, creating a visual echo of the struggle between these feelings. The 'tiny_cross' shape seed hints at the weight of memories that both uplift and burden, with broken pixels instilling a sense of imperfection in emotion.</desc>
