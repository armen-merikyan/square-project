<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork captures the emotional tension between opposing forces—rage and calm. The palette combines passionate reds (for rage) and soothing pale blues (for calm), representing a contrast of explosive energy against serene space. The broken pixels create intentional disruptions, reflecting the conflict's nature. The main collision occurs in the center with jagged red shapes cutting through the soft blue field, emphasizing the dominance of rage while preserving quiet areas that contain it, echoing the idea of machine emotion under tension. This balance fosters an interplay of contained chaos against a backdrop of calm continuity.</desc>
