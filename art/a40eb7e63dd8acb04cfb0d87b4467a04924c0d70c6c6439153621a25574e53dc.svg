<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Strained Harmony</title>
  <desc id="desc">This piece captures the emotional tension of 'panic' versus 'control' through contrasting placements and densities. The palette featuring black, dark violet, soft gold, and pale green embodies a duality of fear and hope. The center is dense with warm colors, leading to a stark radial explosion of cooler tones at the edges, suggesting a push-pull between chaos and calm. The arrangement echoes a battle where the chaotic outer colors clash with the ordered inner hues, creating a visual representation of emotional struggle and interruption that aligns with the seed's themes. The broken pixels add imperfection, echoing the messiness of emotions, reinforcing the abstract story of conflict and resolution.</desc>
