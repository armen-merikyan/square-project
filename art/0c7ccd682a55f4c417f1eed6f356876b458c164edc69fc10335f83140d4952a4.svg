<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">The emotional tone reflects a battle between vibrant sparks of energy and the muted, settling ash of memory and restraint. The chosen color palette, featuring 'signal_green' and 'hot_magenta' contrasting with 'static_gray' and 'dead_black', embodies this conflict through vivid accents interrupting the more subdued fields of ash. The main collision occurs vertically in the center, creating a sense of tension, while the asymmetrical distribution of colors creates a restless rhythm and evokes an unresolved feeling of yearning against inhibition.</desc>
