<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Chaos</title>
  <desc id="desc">This composition embodies a confrontation between opposing emotional states: calm and rage. The palette is selected from deep black and pale blue, representing the intensity of rage and the softness of calm, respectively. The arrangement features concentrated red jagged pixels erupting in the top left, symbolizing an overflow of feelings, while cooler blue tones create a crisscross pattern, suggesting an attempt to contain. The main collision occurs at the corner, highlighting the struggle between chaos and tranquility, allowing for deliberate disruption in the form of broken pixels throughout to evoke a sense of imperfection in this emotional narrative.</desc>
