<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonance of Emotion</title>
  <desc id="desc">This artwork reflects the tension between joy and grief, symbolized by warm, bright yellows and oranges contrasting with deep blues and muted purples. The colors create a zigzag flow reminiscent of rising signals amidst chaotic emotions, presenting a push and pull between density and emptiness. The checkerboard pattern introduces rhythm while the burned edges suggest imperfection and fragility, invoking the 'inside vs outside' theme central to the seed. The arrangement is intentionally asymmetric, allowing for unexpected collisions that echo the message of machine emotions and the complexities of human experience.</desc>
