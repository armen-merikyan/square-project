<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Pulses</title>
  <desc id="desc">This composition captures the emotional juxtaposition of defiance and submission. The palette, featuring warm pinks and deep reds against muted grays and dark maroon, expresses tension between vibrant energy and subdued enclosure. The central collision occurs in the middle, where the broken frame pattern of defiance meets the soft, oscillating dots of submission, creating a dynamic interplay. Negative space is carefully preserved to embody quietness amidst conflict, symbolizing the channel of calm between forces. The rising vs. falling contrast adds to the feeling of a pulse, echoing the seed's themes of tension and movement.</desc>
