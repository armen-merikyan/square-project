  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The composition reflects the emotional tension between safety and exposure, with a soft central area surrounded by heavier, darker borders. The palette combines a cool shelter green and warm brown to symbolize comfort against white and blue suggesting the starkness of exposure. The main collision occurs at the center where the two emotional states clash—bright areas erupt against muted tones, echoing the interplay of tension and relief. The vertical split reinforces this contrast, while broken pixels add imperfections, representing vulnerability.</desc>
