  <title id="title">Echoes of Dichotomy</title>
  <desc id="desc">This artwork conveys the tension between safety and exposure through complex layering and contrasting colors. The palette combines soft tones of shelter green and warm brown representing safety, alongside pale skin and cold white for exposure, creating a push-pull relationship. The main collision occurs centrally, where the bright accents echo against the muted backdrop, creating visual reverberation. Spaces are purposefully left negative to highlight vulnerability, amplifying the emotional dichotomy.</desc>
