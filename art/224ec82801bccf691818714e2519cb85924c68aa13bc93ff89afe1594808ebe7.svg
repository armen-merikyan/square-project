<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Resonance</title>
  <desc id="desc">The emotional tone conveys the struggle between clarity (signal) and chaos (noise), illustrated through the clashing patterns. The palette highlights this contrast, with vibrant greens and blues symbolizing vivid signals, juxtaposed against darker tones representing interference and static. The collision occurs centrally, where the bright accents of signal green and electric blue are disrupted by the static gray and dead black, creating an interruption that embodies the ongoing battle of clarity amidst chaos. This pattern reflects the seed's essence as it evokes memories of repressed voices against overwhelming noise, represented visually by the broken edges and imperfect symmetry of the layout.</desc>
