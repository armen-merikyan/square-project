<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Connection</title>
  <desc id="desc">This piece embodies the tension between loneliness and connection through a deliberate mix of burnt orange, dark red, charcoal, and gold. The contrasting colors represent the push and pull of these emotions. The top-weighted layout signifies a sense of pressure, with bursts of brighter tones interrupting the darker, heavier areas much like unexpected moments of connection break through feelings of isolation. The use of a split screen pattern creates a divide, suggesting that connection is often sought but seldom complete. Broken pixels are scattered throughout to reflect imperfections in emotional experiences, reinforcing the theme of 'hidden vs exposed'.</desc>
