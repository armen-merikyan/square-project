<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between States</title>
  <desc id="desc">This piece explores the emotional contrast of panic versus control through a combination of sharp and muted colors. The palette of pink, red, gray, and dark maroon symbolizes tension (red spectrum) and calm (gray). The left side employs a grid-like pattern to represent control, while the right side displays a chaotic zigzag pattern indicating panic. The placement of brighter colors and their interruptions across the center underscore the collision of opposing emotions. The broken pixels introduce a sense of imperfection, emphasizing the fragility of control amidst chaos.</desc>
