<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Balance</title>
  <desc id="desc">This artwork captures the tension between control and surrender through contrasting patterns and colors. The use of cosmic indigo and deep teal dominates the square, creating a calm yet complex texture, symbolizing 'control'. In contrast, the gentle specks of cold gold and star white intersperse throughout, suggesting 'surrender' and instigating a sense of interruption. The collision occurs predominantly in the center, where the dense, glitch-like arrangement meets the lighter, dot-like patterns, evoking a struggle between stability and chaos, echoing the seed’s themes of pressure and release.</desc>
