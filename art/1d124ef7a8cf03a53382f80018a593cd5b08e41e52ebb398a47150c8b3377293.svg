  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone captures the tension between safety and exposure, showcasing a pale center against darker borders, illustrating the vulnerability of exposure. The palette combines warm browns and greens suggesting warmth and safety, while colder hues represent the starkness of exposure. The main contrast occurs diagonally, where the safety fades into exposure, creating a visual echo. The chosen patterns of broken dots against fault lines enhance the feeling of rippling pressure. The layout intentionally reserves a negative space, allowing the emotions to breathe.</desc>
