<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inside Out: The Pulse of Emotion</title>
  <desc id="desc">This piece embodies a dual emotional landscape where joy and grief coexist. The palette, comprising warm yellows and oranges paired with muted purples and deep blues, captures a spectrum from brightness to heaviness. The outer border features a 'split screen' layout symbolizing grief, illustrated through darker, muted colors which create a sense of pressure. In contrast, the inner 4x4 area, crafted in a 'mirror' pattern, radiates joy with brighter hues, suggesting moments of hope amid sorrow. The collision occurs between the vibrant center and the subdued edges, representing the tension between joy and grief. With intentional broken pixels, the structure subtly disrupts the symmetry, echoing the complexities of love and betrayal, and the experience of loss intertwined with moments of joy.</desc>
