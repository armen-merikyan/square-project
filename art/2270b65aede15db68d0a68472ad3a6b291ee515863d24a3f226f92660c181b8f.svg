<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a struggle between the vibrant pull of desire and the stark hollowness of emptiness. The palette of hot coral and blood orange infuses warmth and saturation, symbolizing desire, contrasted against the low saturation of hollow blue, representing emptiness. The chaotic dots representing desire collide with structured islands of empty space, primarily occupying the center to illustrate tension. An imperfect layout with broken pixels at the corners captures the disruption of desired flow, while the invisible boundaries create a sense of restraint that ultimately dominates the space, echoing the underlying theme of overflow versus containment.</desc>
