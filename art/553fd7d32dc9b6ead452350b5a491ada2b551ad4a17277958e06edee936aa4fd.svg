<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Being</title>
  <desc id="desc">The emotional tone is a juxtaposition of vulnerability and strength, explored through a palette that balances cold darkness with teetering highlights. The colors evoke awe and terror, with deep teal and cosmic indigo suggesting both depth and weight, while star white represents fleeting clarity amidst chaos. The main collision occurs at the center, where strength (represented by structured crosshatching) meets vulnerability (depicted by broken frames), creating a visual tension. The layout of a central protected area surrounded by intense pressure gives the impression of both conflict and coexistence.</desc>
