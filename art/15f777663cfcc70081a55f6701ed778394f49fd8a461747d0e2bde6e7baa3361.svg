<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in the Quiet Channel</title>
  <desc id="desc">This piece invokes the emotional tones of 'spark' and 'ash,' contrasting bright, energetic interruptions with soft, muted fields. The palette combines shelter green, warm brown, pale skin, cold white, and open blue to convey both resilience and fragility. The main collision occurs at the center where jagged edges of dark colors (representing ash) interrupt flowing lighter bands (representing sparks). This dynamic interplay reflects the struggle of hunger and restraint, where density meets quietude.</desc>
