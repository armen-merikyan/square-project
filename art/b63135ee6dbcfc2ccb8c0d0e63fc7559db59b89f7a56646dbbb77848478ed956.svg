<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Shadows</title>
  <desc id="desc">This piece conveys the emotional tension of defiance struggling against submission through a dynamic interplay of color and pattern. The warm tones of yellow and orange represent defiance, while muted purples and deep blues emphasize submission. The layout spreads from the left, creating a diagonal flow that suggests an invasion, showcasing a clash between vibrant and subdued areas. The pixel arrangement reflects an abstract dialogue, with broken pixels introducing elements of imperfection, suggesting that both emotions coexist in a fragile state, with density at the bottom that anchors the piece. The use of negative space offers breathing room, balancing chaos and serenity.</desc>
