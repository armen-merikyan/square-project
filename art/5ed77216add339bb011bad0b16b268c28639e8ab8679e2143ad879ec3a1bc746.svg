<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in the Quiet</title>
  <desc id="desc">This artwork embodies the emotional juxtaposition of control and surrender. The palette of moss green, bone white, rust, stone gray, and small gold reflects resilience and fragility, creating an interplay of muted tones and warmer accents. The central collision occurs with the dense rust and green patterns, suggesting overflow against a backdrop of softer bone white, evoking the tension of control battling against surrender. The arrangement suggests a movement from the edges (control) towards the more chaotic center (surrender), illustrating the push and pull of emotions represented in the seed.</desc>
