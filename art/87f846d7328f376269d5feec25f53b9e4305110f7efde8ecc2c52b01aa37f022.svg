<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Emotions</title>
  <desc id="desc">This artwork represents the emotional tension of joy versus grief through a deliberate structure of color and arrangement. The selected palette features vibrant yellows and oranges, symbolizing joy, contrasted with deep blues and muted purples that evoke grief. Each color is placed to convey a dialogue between order and chaos; the left side embodies a cleansed, joyful energy with lively interactions, while the right side breaks into grays and blues, suggesting tears and somberness, played out in a rain-like descending flow. Bright accents emerge from the dark, representing hope in the midst of despair. The arrangement creates a visual echo of conflict and connection, illustrating the dichotomy of these emotions without forming concrete imagery. This ability to convey such depth through abstraction encourages reflection on the feelings of safety versus threat, and order's struggle against chaos.</desc>
