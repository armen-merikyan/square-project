<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">This artwork embodies the emotional struggle between love and betrayal. The warm colors of pink and red signify love's nurturing presence, while the dark maroon and gray introduce the cold sting of betrayal. There's a clear diagonal flow from vibrant warm tones that signal the rise of love to the descending dark tones of betrayal. Broken pixels discretely interrupt the pattern, illustrating the fractures inherent in tumultuous emotions. The 10% negative space enhances the chaotic sensation of a heart fragmented, echoing the tension throughout the piece.</desc>
