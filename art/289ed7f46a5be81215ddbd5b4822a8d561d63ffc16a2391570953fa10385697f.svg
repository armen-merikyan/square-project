<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The artwork captures the emotional tension between calm and rage through contrasting colors and patterns. The warm, jagged patterns representing 'rage' punctuate the cool, horizontal fields of 'calm' to convey a sense of interruption. The central collision of red and pale blue creates a sense of overflow, while broken pixels introduce a hint of imperfection that reflects the chaotic nature of emotions. The juxtaposition of dense, warm colors against soft, serene tones creates visual drama and resonates with the theme of contained versus overflowing sensations.</desc>
