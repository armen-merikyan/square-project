<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Ascent</title>
  <desc id="desc">The emotional tone balances between relief and dread, with a top-heavy composition that signifies pressure and weight. The palette of burnt orange, dark red, charcoal, and gold echoes the tension between warmth and heaviness. The design features dark colors occupying the upper rows while lighter colors emerge from the bottom, creating a sense of ascent amid clutter. The contrast is stark—dark, oppressive colors collide with lighter, hopeful ones, suggesting a struggle for balance in an empty space. Broken pixels introduce imperfection to the symmetry, emphasizing the idea of a crack in an otherwise structured environment.</desc>
