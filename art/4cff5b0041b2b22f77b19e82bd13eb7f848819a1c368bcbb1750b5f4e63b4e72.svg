  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone of this artwork reflects the delicate balance between vulnerability and strength. The upper half illustrates vulnerability with soft, pale colors and light textures, contrasted by the lower half embodying strength with deeper, rich colors and denser patterns. The palette features greens and browns to evoke a sense of safety against exposure, while the edge style creates a soft glow that denotes shelter. The main collision occurs at the horizontal divide, where the textures of stripes and veils interact, signifying the conflict and interplay between these emotional states. The placement of broken pixels throughout enhances the idea of disruption within both strength and vulnerability, suggesting both scars and repairs in the emotional landscape.</desc>
