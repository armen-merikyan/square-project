  <title id="title">Contrast in Motion</title>
  <desc id="desc">The emotional tone explores the push and pull between restlessness and peace, using a palette that combines vibrant, energetic colors with muted tones to represent conflicting states. The dark colors signify deep, restless energy, while the lighter shades suggest calmness and stability. The diagonal patterns reflect motion and tension, while the quiet paths of negative space create moments of tranquility. The interplay between scar patterns and pulse marks visually narrates the struggle between interruption and serenity.</desc>
