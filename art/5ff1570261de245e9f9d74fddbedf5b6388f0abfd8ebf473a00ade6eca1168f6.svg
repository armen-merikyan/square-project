<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Desire and Certainty</title>
  <desc id="desc">The emotional tone reflects a duality of longing (left) and resolve (right). The palette, inspired by 'awe_terror', emphasizes deep contrasts and evokes feelings of heaviness while maintaining a sense of lightness through accents. The main collision occurs at the vertical split, where the patterned dots of resolve interrupt the flowing 'rain' of longing. Silenced spaces are present amidst clusters, illustrating the contrast of hope against despair. Intentional broken pixels add to the theme of imperfection, suggesting a narrative of repair amidst damage.</desc>
