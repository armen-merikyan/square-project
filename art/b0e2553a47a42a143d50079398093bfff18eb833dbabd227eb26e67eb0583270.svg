<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This artwork explores the emotional duality of control and surrender through contrasting color dynamics. The cooler, muted tones represent restraint and containment, primarily occupying the left side. In contrast, the warmer, vibrant shades emerge from the center, suggesting an overflow that disrupts the contained pattern. The honey gold serves as an accent, invoking warmth in the chaotic center, while the cream provides gentle negative space, allowing for bilateral tension. The pulse mark pattern on the right overlaps systematic waves, embodying the struggle between firmness and disarray, with broken pixels introducing intentional imperfections. The dominant emotion is control, approximately 65%, while surrender spills over as a liberating intrusion.</desc>
