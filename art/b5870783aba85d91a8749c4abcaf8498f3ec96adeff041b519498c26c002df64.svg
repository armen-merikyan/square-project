<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Chaos</title>
  <desc id="desc">The emotional tone reflects a struggle between panic and control, embodied in a palette of burnt orange, dark red, charcoal, and gold—suggestive of fire and urgency. The contrast is achieved through dense clusters surrounded by hollow spaces, symbolizing control attempting to contain panic. The layout is nearly mirrored but disrupted by strategically placed colors, creating a visual tension. Patterns mimic flames on one side and mirrored order on the other, capturing the essence of the seed's duality between chaos and restraint, embodied by the 'broken pixels' theme that introduces imperfections and surprises.</desc>
