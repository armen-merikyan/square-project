<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inner Gradients</title>
  <desc id="desc">The emotional tone revolves around the tension between fear and hope, illustrated through contrasting color choices and structural placements. The chosen palette of black, dark violet, soft gold, and pale green evokes a dynamic push-and-pull between dark pressure and illuminating optimism. The main collision occurs at the center where soft gold meets the deep black corners, creating a feeling of unsettled tranquility. The falling pixel layout embraces the concept of tension released in gradual rhythms, harmoniously blending jagged edges of fear with soft, upward flows of hope through stripes, creating an abstract narrative of emotional duality.</desc>
