<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Potential</title>
  <desc id="desc">The emotional tone contrasts the heaviness of fear with the lightness of hope. The palette—black, dark violet, soft gold, and pale green—highlights the conflict between these emotions, with dark colors representing fear and lighter ones embodying hope. The sharp vs soft contrast is emphasized by the dark edges leading into a glowing center, alluding to the struggle between isolation and connection. The overall pattern resembles a burst originating from the center, creating a sense of rising tension and potential release, which aligns with the seed's themes of lightness against weight and emotional complexity.</desc>
