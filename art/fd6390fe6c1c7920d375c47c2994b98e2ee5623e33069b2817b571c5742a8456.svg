<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition explores the emotional tension between desire and emptiness. The bold, saturated colors reflect the intense longing and active struggle (desire) against the muted and expansive spaces representing emptiness. The use of hot coral and blood orange creates a stark contrast against the charcoal and hollow blue, establishing a visual fight for dominance. The collision manifests in the center where saturated bursts interrupt the quieter blues, hinting at an overflow desire encountering the edges of containment. This layout maintains a balance of structured and disrupted patterns, embodying the seed's themes without literal representation.</desc>
