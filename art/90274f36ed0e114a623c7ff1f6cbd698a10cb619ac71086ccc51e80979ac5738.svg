<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This artwork represents the emotional duality of longing and resolve through a contrasting palette of vibrant oranges and deep blues, symbolizing warmth and distance. The central dense area features broken dot patterns clashing against structured hinge shapes, creating an interplay of calm and urgency. The edges are quieter, suggesting a boundary that the central chaos struggles to contain. Broken pixels introduce intentional disruptions, reminiscent of repairs and scars, enhancing the emotional texture. The composition flows from the center outward, echoing the theme of seeking balance between conflicting emotions.</desc>
