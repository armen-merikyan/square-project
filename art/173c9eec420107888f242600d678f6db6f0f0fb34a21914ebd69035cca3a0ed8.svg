<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone suggests a struggle between the vibrancy of desire and the confinement of restraint. The palette of deep reds, muted creams, and dark hues reflects the saturation of longing contrasted with the coolness of boundaries, evoking a feeling of tension and pressure. The main collision occurs in the center where saturated colors clash against muted tones, creating layers of emotional currents. The spiral patterns symbolize the ever-present push and pull, while negative space enhances the feeling of isolation against the backdrop of desire.</desc>
