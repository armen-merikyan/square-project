  <title id="title">Tension of Duality</title>
  <desc id="desc">This artwork explores the emotional tension between vulnerability and strength, using a color palette that balances dark shades symbolizing strength with lighter hues representing vulnerability. The collision occurs centrally, where dense dark blocks meet the softer ladder patterns, creating visual disruption as they intertwine. The broken pixel placements signify the scars of resilience and repair against the backdrop of contrasting pressure, evoking a feeling of unsteady balance.</desc>
