<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Space</title>
  <desc id="desc">The emotional tone of this piece captures the conflict between desire and restraint, using warm colors to symbolize desire while cool tones contain that heat, creating an interesting push-pull dynamic. The palette includes hot coral and blood orange to evoke strong emotions, contrasted by charcoal and hollow blue that embody containment and structure. The main collision occurs in the center where the saturated colors clash with the muted tones, reflecting the tension of desire breaking through restraint. The layout evokes a halo void, allowing for a contrast between light and shadow. The shatter pattern illustrates the dynamic nature of desire while the braid pattern represents the tangled complexity of restraint.</desc>
