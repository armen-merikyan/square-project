<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">The emotional tone reflects the duality of spark and ash, representing moments of intense brightness clashing with remnants of warmth and decay. The palette combines muted tones of dust gray and off-white, allowing for a quiet background, while compressed red and dark navy act as prominent accents. This contrast creates a vivid collision in the center, symbolizing the tension between hunger and restraint. Patterns of halo (ash) seamlessly collide with constellation (spark), illustrating the intermingling of memories versus erasure. The jagged edges suggest that while one can seek stability through restraint, the chaos of memory creates interruptions in the flow, evoking resilience amidst fragility.</desc>
