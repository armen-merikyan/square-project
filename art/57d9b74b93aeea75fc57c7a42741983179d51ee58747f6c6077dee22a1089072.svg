<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone strikes a balance between desire and emptiness, evoking a sense of yearning restrained by boundaries. The color palette incorporates vibrant tones like hot coral and blood orange to signify desire, contrasted with cooler shades like charcoal and hollow blue that convey emptiness. The main collision occurs centrally with saturated hues flowing outward, interrupted by stark negative space, visually representing a pull towards something unattainable. This layout evokes a feeling of tension, where the desire for connection is met with the stark reality of a locked border, illustrating the conflict between yearning and limitation.</desc>
