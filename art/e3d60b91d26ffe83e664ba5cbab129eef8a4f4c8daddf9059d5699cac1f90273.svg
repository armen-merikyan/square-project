<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order Amidst Chaos</title>
  <desc id="desc">This composition expresses the emotional clash between control and panic. The palette, drawn from 'broken_memory,' symbolizes nostalgia and fragility—sepia and faded blue evoke calm, while dust gray adds uncertainty and tension. The dominant contrast lies in the layout: stripes representing control on the left, gradually disrupted by an explosion of crosshatch on the right, embodying chaos. The broken pixels introduce slight imperfections, representing unpredictable emotional disturbances. The overall flow from left to right carries a sense of descending turmoil, echoing the seed's themes of unstable emotions and the push and pull of inner versus outer turmoil.</desc>
