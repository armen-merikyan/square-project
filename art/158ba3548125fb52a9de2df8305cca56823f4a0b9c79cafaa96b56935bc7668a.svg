<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Exposure</title>
  <desc id="desc">The artwork embodies a juxtaposition of restlessness and peace through the use of a contrasting palette that emphasizes cold tones and bright accents. The deep teal (#005B5C) represents calmness while the void black (#000000) conveys restlessness. The diagonal layout fosters a tension between these emotions, with the lighter star white (#FFFFFF) clashing against darker hues, creating an interruption that suggests a struggle. The broken pixels add a layer of imperfection, contributing to the narrative of fragility amidst shelter. This aesthetic reflects the emotional complexity in our memories of motion and stillness.</desc>
