  <title id="title">Conflict of Emotions</title>
  <desc id="desc">This composition navigates the tension between control and panic, expressed through contrasting warm and cool colors. The palette includes vibrant yellows and oranges representing panic, set against deeper hues of blue and muted purples to invoke a sense of restraint. The arrangement of colors features sharp, zigzag patterns meeting softer, flowing lines, culminating in a visual conflict between chaotic impulses and structured calm. Burned edges of colors add an element of imperfection, suggesting a struggle amidst order and chaos, with negative spaces highlighting psychological tension.</desc>
