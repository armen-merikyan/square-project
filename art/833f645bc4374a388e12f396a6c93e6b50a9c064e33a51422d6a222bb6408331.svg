<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Harmony</title>
  <desc id="desc">This artwork embodies the conflict between restlessness and peace through an interplay of colors. The palette, composed of black, dark violet, soft gold, and pale green, signifies a struggle between darkness (restlessness) and light (peace). The contrast is primarily centered, creating a clash where vibrant gold meets the somber black and violet edges, echoing a sense of tension and unresolved motion. The patterns of stripes (peace) and frames (restlessness) intersect chaotically, suggesting a dynamic yet fractured state of being. The edge style is left-weighted, highlighting a sense of imbalance towards the darker side, representing the difficulty in achieving tranquility amidst chaos.</desc>
