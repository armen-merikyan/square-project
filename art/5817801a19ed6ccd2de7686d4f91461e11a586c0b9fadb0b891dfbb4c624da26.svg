<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition evokes the tension between vulnerability and strength, using a burnt orange and dark red palette that suggests warmth and intensity. The soft break of the 'mirror' pattern symbolizes vulnerability in the exposed pale center, while the flooded strength pattern surrounds it, creating a contrast that feels protective yet threatening. The collision occurs mainly in the lower left corner where the colors intertwine, suggesting a push and pull dynamic, while negative space allows for moments of quiet amidst the intensity.</desc>
