<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone of this artwork reflects the tension between desire and restraint. The palette of 'hot coral' and 'blood orange' symbolizes intensity and craving, while 'charcoal' and 'hollow blue' signify the cooler restraint. The dominant warm colors create saturated clusters that represent the overwhelming pull of desire, contrasted by the muted spaces invoking restraint. The primary collision occurs in the center with a chaotic blend of braiding and stair patterns, suggesting a struggle against boundaries. The sealed edges frame this emotional ebb and flow, allowing an abstract exploration of longing and limitation.</desc>
