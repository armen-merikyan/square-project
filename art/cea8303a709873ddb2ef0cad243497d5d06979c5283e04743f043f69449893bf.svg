  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This artwork explores the emotional tension of relief and dread by juxtaposing a heavy black background with light blue and white accents. The arrangement plays with vertical symmetry while introducing intentional breaks to suggest the weight of dread contrasted by moments of relief. The palette of dark and light tones evokes a feeling of isolation and hope, while the interplay of color creates visual friction that narrates a complex emotional landscape.</desc>
