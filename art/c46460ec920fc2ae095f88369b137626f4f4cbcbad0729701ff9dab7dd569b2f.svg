<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dichotomy of Emotions</title>
  <desc id="desc">This artwork captures the tension between dread and relief through its contrasting colors and patterns. The palette, consisting of deep blacks and dark violets for dread, interplays with soft gold and pale green, representing moments of relief. The dominant use of dark colors creates a weighty feeling in the top left corner, while lighter colors flow diagonally, embodying the notion of relief striving against a looming dread. The pattern of 'stairs' mimics a sense of ascent and transition, while the 'stripes' of dread make their presence known yet suggest a break in symmetry, enhancing the emotional conflict.</desc>
