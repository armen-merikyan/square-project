<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Tensions</title>
  <desc id="desc">This artwork explores the emotional tension between sudden brightness and faded remnants. The 'moss_green' and 'rust' colors represent resilience and fragility, fluctuating between the quiet ash and the vibrant spark. The outer edge celebrates a sense of stability with darker colors, while the inner 4x4 grid disrupts with bright accents and jagged patterns. The main contrast happens diagonally, where the vibrant spark collides with the calming ash, suggesting a perpetual struggle between light and shadow—between growth and decay, memory and erasure.</desc>
