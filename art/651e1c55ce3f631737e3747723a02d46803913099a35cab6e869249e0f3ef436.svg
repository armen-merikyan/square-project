<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This composition embodies the emotional tone of contrasting tenderness and rage. The palette mixes deep blacks and vibrant reds with serene pale blues and whites, suggesting a battle between calm and explosive energy. The dark, dense colors clump at one edge, breaking into lighter spaces across the square, symbolizing an emotional journey from compression to release. The main collision occurs in the center, where intense stripes of red (rage) cut through soft crosshatch patterns of pale blue (tenderness), creating a visual tension that echoes the seed's themes of conflict and emotional interplay.</desc>
