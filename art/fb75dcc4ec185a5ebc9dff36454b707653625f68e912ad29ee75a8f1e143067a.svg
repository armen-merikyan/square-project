<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This composition embodies a tension between emptiness and desire, where warm colors mirror the saturated needs of the human experience against a restrained flow of muted tones. The palette, with hot coral and blood orange, represents the intensity of desire, while charcoal and hollow blue evoke a sense of quiet emptiness. The layout presents a central dense cluster of warm colors surrounded by cooler fields, heightening the contrast between the two emotional states. This interplay is interrupted by intentionally placed broken pixels, enhancing the narrative of interrupted desires against a backdrop of restraint.</desc>
