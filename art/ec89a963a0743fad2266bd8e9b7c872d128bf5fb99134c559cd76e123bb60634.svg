  <title id="title">Collision of Tension</title>
  <desc id="desc">The artwork encapsulates the emotional struggle of defiance and submission using a hot coral and blood orange palette against a backdrop of charcoal and hollow blue. The left side represents defiance through angular, mirror-like patterns that create tension. The right side depicts submission with softer ember-like forms creating a sense of quiet collapse. The central pixel serves as the focal point of collision, embodying the conflict of emotions. The structured yet fragmented arrangement creates a narrative of contrast, echoing the balance of power and vulnerability.</desc>
