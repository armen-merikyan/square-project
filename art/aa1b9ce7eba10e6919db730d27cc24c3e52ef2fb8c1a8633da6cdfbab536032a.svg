<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">This artwork captures the conflict between tenderness and rage, with a palette of stark blacks and whites interspersed with pale blue. The black forms a dense, chaotic area that represents rage and pressure, while the pale blue introduces an element of tenderness and calm. The broken pixels serve as deliberate interruptions, creating a sense of imperfection and vulnerability. The overall composition features a scattering of softer, checker-patterned tender colors colliding with sharp, jagged forms of rage, predominantly occupying the central area to emphasize their clash. This juxtaposition illustrates both the emotional weight of guilt and the lightness of forgiveness, echoing the tensions described in the seed text.</desc>
