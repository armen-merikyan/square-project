<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This artwork embodies the duality of rage and calm through a stark contrast in color and structure. The top half is dominated by sharp reds and blacks, representing the intensity and chaotic nature of rage with jagged, thread-like patterns that intersect, suggesting an overflow of emotion. In contrast, the bottom half employs pale blues and whites in a structured, ladder-like arrangement, evoking a sense of calm containment. The main collision occurs at the horizontal divide, where the vertical spikes of the upper section sharply interplay against the soft, horizontal bands below, illustrating the tension between contained serenity and overflowing emotion.</desc>
