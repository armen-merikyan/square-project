<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotions</title>
  <desc id="desc">This composition reflects the emotional tension between envy and gratitude through a careful balance of dark and light colors, illustrating the struggle for dominance in an abstract format. The palette of black, white, and pale blue is chosen to signify the intensity of envy (represented through dark tones) versus the calmness of gratitude (illustrated by lighter shades). The pattern drawn from 'rain' for envy creates a chaotic lower half, while a 'checker' pattern for gratitude forms a structured grid above, visually depicting the rising vs falling theme. The arrangement creates a tension where the chaotic lower half confronts the neat upper portion, with soft edges blending the two, embodying a blend of hope against a backdrop of fear.</desc>
