<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Ember and Spark</title>
  <desc id="desc">The emotional tone captures the tension between decay and ignition, embodied in the palette's interplay of warm and cool colors. Cosmic indigo and deep teal represent the cool, settled ash, while star white and cold gold embody the sudden, bright spark. The contrast peaks around the center, where the split-screen pattern yields to the jagged edges of memory, forming a chaotic yet harmonious collision. Thus, the seed inspired a layout where the spark begins in the corner and radiates outward, with broken pixels introducing intentional imperfection for a raw, emotional impact.</desc>
