<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Resilience</title>
  <desc id="desc">The emotional tone of this piece captures the tension between 'spark' and 'ash', embodying transformation and struggle. The palette mixes vibrant colors like lime and electric blue with dark shades of black to create a contrast of vitality against a backdrop of decay. The collision occurs centrally where bright channels intersect with the muted barcode patterns, symbolizing the interplay between hunger (desire for growth) and restraint (the remnants of ash). Obscured and broken pixels interrupt the flow, reflecting the jagged edges of memories that challenge clarity and resilience.</desc>
