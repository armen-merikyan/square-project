<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Rift</title>
  <desc id="desc">The composition captures the tension between joy and grief, represented through vibrant yellows and oranges transitioning into muted blues and purples. The upper rows embody 'joy', using spark-like patterns with warm colors that create a sense of movement and brightness. The lower rows reflect 'grief', adopting a maze-like structure with darker hues that convey heaviness and depth. The split-horizontal layout emphasizes the contrast between these emotions, with the collision occurring at the central division where the warm colors abruptly meet the cooler shades. This representation of emotional duality and tension is integral to the narrative, echoing the struggle between hope and sorrow.</desc>
