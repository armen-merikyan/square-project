<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This piece evokes the tension between vulnerability and strength through a split horizontal layout. The top half embodies strength with a dense, structured arrangement of deep blues and grays, representing stability and clarity. The bottom half contrasts with a softer palette of pale aquas and whites, suggesting fragility and interweaving threads of vulnerability. The collision is centered through the transition, creating a ripple effect that symbolizes the push and pull between these emotions. Broken pixels introduce intentional imperfections, reflecting the scars of exposure, while the zigzag flow adds a dynamic tension throughout the piece.</desc>
