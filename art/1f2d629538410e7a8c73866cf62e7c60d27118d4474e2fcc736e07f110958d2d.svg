<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Desire</title>
  <desc id="desc">This piece captures the emotional push and pull between desire and emptiness. The warm palette of saturated colors—hot coral, blood orange, and dust pink—embodies desire, creating a vibrant center that radiates energy. In contrast, the cooler tones of charcoal and hollow blue define the outer edges, suggesting restraint and containment. The layout features a dense core of warmth, interrupted by patches of cool color, symbolizing the struggle to contain overflowing emotional intensity. Broken pixels provide an element of disruption, enhancing the theme of conflict, as they scatter across the piece, introducing a sense of imperfection that reflects the complex interplay of emotions.</desc>
