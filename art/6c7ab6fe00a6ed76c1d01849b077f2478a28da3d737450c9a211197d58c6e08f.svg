<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Resilience</title>
  <desc id="desc">The emotional tone reflects a delicate balance between vulnerability and strength, captured through a contrasting palette of deep olive and honey gold, symbolizing the clash of exposure and shelter. The edges feature hard, defined lines, creating a visual tension. The collisions of colors in the center, with pale regions surrounded by darker strokes, echo the push and pull of connection and alienation, where marks intersect yet remain distinct. The abstract pattern emerges as pulses toward the center, imbuing the piece with a sense of dynamic motion and emotional resonance.</desc>
