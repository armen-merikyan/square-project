<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Shadows</title>
  <desc id="desc">The emotional tone reflects a dynamic tension between trust and suspicion, using a palette of deep reds and soft blues to evoke warmth and coolness. The black creates a stark contrast, representing the shadows of suspicion, while the white serves as a subtle illumination, hinting at trust. The main collision occurs in the center, where radial patterns of suspicion disrupt the calm embers of trust, suggesting conflict between openness and concealment. This interplay creates a rhythm of pressure and release, illustrating the struggle between these contrasting emotions.</desc>
