<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Shifting Balance</title>
  <desc id="desc">This piece captures the tension between vulnerability and strength through a split vertical layout. The left side, representing vulnerability, is imbued with soft mint and sky tones, suggesting lightness and fragility, while the right side, embodying strength, uses deeper gray and near-black, establishing a solid and stable presence. The broken pixels disrupt the flow, symbolizing moments of crisis or fracture that provoke reflection. The central pulse of color encourages a feeling of collision and resolution, reflecting the seed's themes of exposure and safety.</desc>
