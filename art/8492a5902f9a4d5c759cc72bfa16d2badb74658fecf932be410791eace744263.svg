<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">The Weight of Emotion</title>
  <desc id="desc">This piece captures the tension between defiance and submission through a stark contrast of colors and patterns. The left side embodies defiance with a chaotic checker pattern using burnt orange and dark red, evoking energy and boldness, while the right side demonstrates submission through a subtle flame pattern with gold and charcoal, creating a feeling of warmth but restraint. The arrangement reflects a sense of falling from a point of tension to a quieter space, mirroring the emotional struggle. The main contrast occurs at the center, splitting the chaos from calm. The inclusion of broken pixels adds depth and imperfection, enhancing the narrative of conflict and resolution.</desc>
