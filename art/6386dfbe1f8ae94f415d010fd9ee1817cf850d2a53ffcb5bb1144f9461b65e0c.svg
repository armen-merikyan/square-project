  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The artwork juxtaposes the intense emotion of rage, represented by warm reds and chaotic patterns, against the calmness symbolized by cool blue tones and structured arrangements. The left half features threads of red that zigzag and collide with organized pale blue stacks on the right, capturing the essence of emotional conflict and containment. The contrast of hard shadows from the darker colors enhances the impact of the brighter hues.</desc>
