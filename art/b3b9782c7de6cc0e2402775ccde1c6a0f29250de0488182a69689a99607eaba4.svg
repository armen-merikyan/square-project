<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Emotions</title>
  <desc id="desc">This composition reflects the emotional tension of tenderness juxtaposed with rage. The colors chosen from the 'rage_calm' palette, including deep red and soft pale blue, create a striking contrast. The arrangement features a turbulent stacking of reds in a dominant, aggressive pattern, representing rage, while gentle tide-like waves of pale blue and white introduce a sense of softness and tenderness. The collision occurs mostly in the center, where sharp edges disrupt the softer tones, symbolizing the clash between these emotions. Broken pixels are scattered, enhancing the feel of disruption and imperfection, echoing the struggle between guilt and forgiveness. This square becomes an exploration of emotional extremes through abstract means.</desc>
