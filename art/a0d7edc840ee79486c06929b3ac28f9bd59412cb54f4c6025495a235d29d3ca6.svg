<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Within Bounds</title>
  <desc id="desc">This piece embodies the struggle between panic and control through a stark contrast in color and layout. The deep blacks represent the chaotic, external pressure of panic, while the soft golds and pale greens create grounded spaces suggesting control and hope. The left side is dense and dark, reflecting urgency, while the right is more open and balanced, allowing for moments of stillness. The use of different patterns — stripes against radiating elements — enhances the sense of conflict, giving the viewer an experience of navigating through turmoil towards clarity. The inner sections collide in abrupt color changes, symbolizing the transition from chaos to calm, leaving space to breathe.</desc>
