<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symphony of Control and Surrender</title>
  <desc id="desc">This artwork captures the emotional tension between control and surrender through a striking contrast of dark and warm hues. The palette of burnt orange and dark red suggests underlying intensity, while muted charcoal allows for a restful contrast, embodying struggle and release. The central area holds denser color overlapping, symbolizing an 'overfilled center' where control falters, while the softer edges suggest a gentle surrender to the flow. The broken pixels introduce intentional disruptions, enhancing the narrative of collision between stability and fluidity.</desc>
