<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This composition captures the emotional dichotomy between joy and grief through a structured split. The upper rows, representing joy, utilize a warm palette of yellows and oranges to convey energy and expansion, while the lower rows reflect grief with muted blues and purples, suggesting depth and heaviness. The contrast of warm top rows against the cool sadness below creates a visual tension, mirroring the emotional push and pull. Each row features clean lines against interrupted, broken pixels, embodying the order versus chaos theme. The edges are intentionally rough to symbolize the frayed emotions in such a complex experience. The pattern of rain across the joyful section subtly hints at the grief permeating joy.</desc>
