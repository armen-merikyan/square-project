<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The composition captures the tension between control and surrender through a split layout, with the left half reflecting structured control in muted tones and orderly channels, while the right side embodies the yielding nature of surrender through static irregularity. The palette of off-white, dust gray, and compressed red emphasizes a quiet pressure, creating a visual dialogue of conflict and harmony. The main collision occurs in the center, where structured lines from the left encounter softer static shapes from the right, suggesting an overflow of emotion and the push and pull of security versus vulnerability.</desc>
