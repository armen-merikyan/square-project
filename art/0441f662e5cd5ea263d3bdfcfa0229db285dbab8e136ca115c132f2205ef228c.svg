<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs. Fall</title>
  <desc id="desc">This artwork explores the tension between envy and gratitude. The palette, drawn from 'ancient_fire,' uses burnt orange and dark red to evoke a sense of deep emotion, while charcoal brings weight, symbolizing the heaviness of envy. Gold adds a glimmer of gratitude, creating a balance. The upward movement of colors on one side (warm tones) and the downward drift on the other (dark tones) creates a dynamic contrast. The interplay of patterns—zigzagging and maze-like—reflects the emotional conflict, suggesting movement amidst tension, with broken pixels introducing imperfection and emphasizing the struggle between these emotions.</desc>
