  <title id="title">Threshold of Emotions</title>
  <desc id="desc">This artwork captures the emotional tension between restlessness and peace through a dynamic color palette. Warm coral and soft amber evoke feelings of warmth and movement, while cold slate and blue-black represent cool containment. The main clash occurs in the center, where chaotic patterns of scars intersect with gentler glitch-like forms, translating the impact of memory and motion into visual disruption. The choice of colors reflects a conflict between comfort and unease, allowing the viewer to sense the turmoil beneath the surface calm.</desc>
