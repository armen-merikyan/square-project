<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Quiet Collision</title>
  <desc id="desc">The emotional tone explores the tension between defiance and submission, capturing an interplay between the bright refusal of defiance and the soft collapse of submission. The chosen palette, 'broken_memory', consists of muted sepia and faded blues to evoke nostalgia with an undercurrent of tension. The main collision occurs in the center where dense stripes of defiance, marked by deeper colors, intersect with the soft echoes of submission in lighter shades, creating a visual dynamic that suggests an inward spiral against an outward push. The quiet channel offers negative space that invites contemplation amidst the chaos.</desc>
