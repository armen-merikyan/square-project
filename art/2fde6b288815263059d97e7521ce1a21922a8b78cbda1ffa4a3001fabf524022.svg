<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Asymmetry</title>
  <desc id="desc">The emotional tone reflects a dance between longing and resolve, with a palette that captures warmth and depth. The warm oranges and yellows suggest yearning, while deep blues and muted purples evoke stability and grounding. The layout features pressure in the corner, highlighting a strong collision of colors and feelings, with threads of longing weaving through and resolving into a dense ash field. This intersection embodies the tension of emotions suggested by the seed—organized chaos. The main contrast lies in the mix of thicker color blocks representing resolve against the delicate presence of thread-like patterns of longing, fostering a dynamic yet conflicted visual narrative.</desc>
