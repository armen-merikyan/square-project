<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">This composition embodies the tension between longing and resolve, using a palette that oscillates between muted greens and warm browns to evoke feelings of grounding in contrast with fleeting moments of pale skin tones that suggest vulnerability. The central collision occurs through overlapping patterns: a maze representing longing contrasted with teeth shapes symbolizing resolve. These patterns collide predominantly in the center, signifying a struggle between containment and overflow, with intentionally broken pixels to embody the complexity of repair versus damage. The quiet edges provide a sense of frame, enhancing the emotional depth of the piece.</desc>
