<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Horizons</title>
  <desc id="desc">The emotional tone centers around the interplay between longing and resolve, which is expressed through contrasting densities and spatial arrangements. The chosen palette features warm ivory and soft gold to symbolize resolve, intertwined with deeper tones like deep wine and stain brown to convey longing. The collision occurs in the center, where dense clusters of wine interlace with spacious areas of ivory, suggesting a struggle between defined boundaries and diffuse aspirations. The pattern reflects cross currents and a push-pull dynamic, aligned with the themes from the seed text.</desc>
