<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Hearts</title>
  <desc id="desc">This artwork embodies the emotional tug-of-war between love and betrayal. The warm palette of reds and pinks juxtaposes with the deep gray and dark maroon reflecting deep emotional conflict. The upper half mimics the softness and symmetry of love, while the lower half subverts this with chaotic cracks and broken patterns, symbolizing betrayal. The flow of diagonal transitions from warm to dark emphasizes rising signals changing into a downward spiral, echoing the conflict. Notably, broken pixels create intentional imperfections, enhancing the sense of loss and divergence, pushing the viewer into a reflection on tension. Negative space creates breathing room amidst density, embodying calm against chaos.</desc>
