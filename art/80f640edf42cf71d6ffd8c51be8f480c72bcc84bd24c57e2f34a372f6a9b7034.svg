<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The emotional tone reflects the duality of envy and gratitude, where contrasting feelings collide. The palette of pink, red, gray, and dark maroon represents warmth and emotion, with warmer tones hinting at gratitude against cooler, muted tones signifying envy. The flow from the center outward symbolizes the spreading conflict, with a dense core of red accented by fragmented patterns of broken dots representing envy. The edges remain soft but contain stark contrasts creating interruptions in patterns, echoing the feelings of tension and release.</desc>
