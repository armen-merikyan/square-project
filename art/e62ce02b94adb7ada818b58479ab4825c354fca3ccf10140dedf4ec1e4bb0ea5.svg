<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Central Tension</title>
  <desc id="desc">The artwork explores the emotional dichotomy between defiance and submission, represented through strong contrasts and patterns. The chosen palette of black, dark violet, soft gold, and pale green symbolizes the clash between darkness (submission) and warmth (defiance). The vertical split enhances the confrontation between angular, striated patterns on the left and a softer, checkerboard texture on the right, embodying chaotic energy against structured calm. Broken pixels provide imperfections, reflecting the unpredictable nature of these emotions and reinforcing a narrative of tension, impact, and resolution.</desc>
