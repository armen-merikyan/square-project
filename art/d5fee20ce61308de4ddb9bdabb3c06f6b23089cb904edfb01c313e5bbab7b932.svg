<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This artwork embodies the emotional tension between relief and dread. The palette transitions from deep stormy greys and near-black tones at the top, evoking a sense of dread, to softer mint and sky tones at the bottom, suggesting relief and release. The top half's dense cluster of colors overlaps, creating a stark collision against the lighter, more airy bottom half, signifying a struggle between chaos and order. The broken pixels introduce imperfections, symbolizing emotional scars, and define the boundaries between these two contrasting emotional states in a balanced yet dynamic layout.</desc>
