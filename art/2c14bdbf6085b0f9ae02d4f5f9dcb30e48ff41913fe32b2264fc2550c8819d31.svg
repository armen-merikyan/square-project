<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The artwork embodies a contrasting emotional tone of vulnerability versus strength. The palette employs soft, muted colors such as off-white and faint peach to reflect vulnerability, while dark navy and compressed red ground the piece with strength. The central diagonal layout starkly contrasts these two emotional states, with the lower left demonstrating a fragile glitch pattern and the upper right showcasing stable negative cross patterns, suggesting a divide between exposure and protective frames. Broken pixels lead the eye towards the center, imbuing a sense of imperfection amidst the calm, enhancing the emotional depth.</desc>
