<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">The artwork explores the emotional dichotomy of nostalgia and progress through a bottom-weighted grid, where the darker hues anchor the base, contrasting with lighter colors that shift upwards, representing the pull of progress against the weight of memory. The palette of soft gold, dark violet, and black creates an interplay between hope and fear, emphasizing the collision of emotion with a structured layout. The imperfect, broken edges invoke the idea of fragmented memories in conflict with forward movement, embodying an unresolved tension that echoes through the composition.</desc>
