<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">This composition explores the duality of joy and grief, balancing bright warmth against deep blues. The top four rows express joy with rounded patterns of yellows and warm oranges, creating uplifting energy that suggests rising signals. The bottom half contrasts with fragmented patterns in muted purples and blues, evoking grief's heaviness. The sharp contrast between the clean shapes of joy and the disrupted forms of grief embodies the interplay of order and chaos. Broken pixels introduce subtle imperfections, mirroring the unpredictability of emotions.</desc>
