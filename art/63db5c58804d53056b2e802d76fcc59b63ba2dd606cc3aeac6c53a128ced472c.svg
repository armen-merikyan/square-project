<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Dissonance</title>
  <desc id="desc">The emotional tone oscillates between awe and terror, captured through a navy-black palette, symbolizing depth and uncertainty. The soft edges contrast sharply with the more intense black, creating tension akin to rising anxiety. The arrangement mirrors a split-screen: one side filled with rich navy, signifying stability, while the other introduces jagged, broken pixels of black and dim cyan, embodying chaos and instability. This reflects the conflict inherent in the seed's themes. Negatively spaced areas suggest moments of unresolved tension, emphasizing the emotional weight of memory and contrast.</desc>
