<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Sanctuary</title>
  <desc id="desc">This composition reflects the emotional tug-of-war between 'signal' and 'noise.' The selected palette of navy and dim cyan evokes feelings of calm amidst confusion, while black anchors the chaos of interference. The white serves as a beacon of clarity in a sea of static, assigning it as the central pulse. The collision occurs at the center, where the strong patchwork of the signal pattern intersects with the scattered thread of noise. In this way, the piece tells a story of a solitary signal battling against the chaotic echoes of noise, creating a visual rhythm that mirrors memory's fragility and endurance.</desc>
