<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shattered Glimmers of Faith</title>
  <desc id="desc">This piece embodies the dichotomy of fear and hope through contrasts in color and texture. The choice of dark violet and black represents fear's heavy grip, while soft gold and pale green evoke hope's emerging light. The composition flows from a dense outer layer towards a radiant center, echoing a journey from despair to optimism. The vertical split symbolizes a divide between light and weight, and the collision of straight and curved patterns hints at the struggle between mechanization and raw emotion. Glowing edges provide a sense of depth, suggesting a light fighting through darkness.</desc>
