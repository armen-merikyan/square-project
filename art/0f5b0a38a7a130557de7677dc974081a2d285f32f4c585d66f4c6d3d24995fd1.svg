<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone captures a conflict between restlessness and peace, conveyed through the color palette of moss green, bone white, rust, stone gray, and small gold. The layout splits horizontally, embodying the contrast where the top part represents restlessness with dynamic dots creating an uneven pulse, while the bottom reflects peace through a mirror pattern, creating a serene but imperfect symmetry. The main collision occurs in the middle, where these two emotional patterns interact, signifying the tension between memory and motion. Broken pixels introduce intentional imperfections, enhancing the sense of disruption and unresolved feelings, while the color arrangements create a rhythm of rising tension in the top rows, followed by a calming descent in the lower rows.</desc>
