  <title id="title">Tension of the Quiet Mind</title>
  <desc id="desc">The emotional tone reflects a struggle between restlessness and peace, creating contrasting experiences in color and arrangement. The palette combines clean white and ice blue for peace, while ink black and warning orange evoke restlessness. The top rows symbolize the maze of thoughts, while the bottom rows reflect the calm of clear space. The collisions primarily occur at the center where’s there’s a dense interaction of colors, representing conflict and resolution. The diagonal argument suggests movement, pulling from the restlessness into patches of serene white space.</desc>
