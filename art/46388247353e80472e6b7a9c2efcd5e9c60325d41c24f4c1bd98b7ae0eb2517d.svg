<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry vs Chaos</title>
  <desc id="desc">The artwork conveys the emotional tension between control and panic. The top four rows, depicting control, use a structured maze pattern in soft pinks and grays to suggest a sense of order and calmness. The bottom four rows embody chaos with jagged, ascending stair patterns in darker maroon and red hues, representing the feeling of urgency and disorder. The negative space is maintained to avoid overwhelming the viewer, creating echoes of both joy and grief within the composition. The thick outlining further emphasizes the collision of these two emotional states, allowing for an interaction that feels both resolved and unresolved at once.</desc>
