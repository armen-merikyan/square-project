<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This composition explores the contrasting emotional tones of panic and control. The chosen palette of deep blacks, dark violets, soft gold, and pale green fosters a sense of tension between hope and fear. The left half follows a maze-like pattern (control), tight and organized, while the right side breaks apart into chaotic radial reflections (panic) with more negative space, embodying an unsettling emptiness. The collision occurs where the structured order meets the erratic disarray, suggesting an internal struggle between stability and instability. This pattern tells a story of the overwhelming sensation of panic against the desire for control, emphasizing the emotional weight of the seed text.</desc>
