<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Calm and Chaos</title>
  <desc id="desc">This artwork embodies the tension between restlessness and peace through a dynamic yet structured arrangement of colors. The palette draws on melancholic hues like muted plum and soft cyan to evoke feelings of quiet introspection, while the contrast between light and dark creates an unresolved push-pull. The main collision occurs in the center with a radial pattern of soft cyan interrupted by chaotic patches of muted plum, representing memories against the backdrop of motion, shadowed by the calm edges framing the chaos.</desc>
