<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This work explores the tension between defiance and submission. The palette of dark maroon, gray, and muted pinks reflects both emotional states, with deep shades symbolizing defiance while lighter hues evoke submission. The center features dense clusters of dark maroon (#4B1F24) as a statement of strength, interrupted by quiet gray (#B0B3B7) that softens the edges, symbolizing the pull of submission. The layout creates a dynamic intersection where strong 'shatter' patterns collide with subtle 'split-screen' configurations, reinforcing the dichotomy of the emotions. The orderly arrangement breaks down into chaos at the periphery, creating visual tension representative of an ongoing struggle.</desc>
