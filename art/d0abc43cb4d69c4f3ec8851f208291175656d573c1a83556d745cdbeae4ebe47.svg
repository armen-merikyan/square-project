<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Drive</title>
  <desc id="desc">This piece captures the tension between certainty and curiosity through an interplay of structured patterns and chaotic disruptions. The palette is drawn from 'ancient_fire' to evoke warmth and energy, contrasting deep charcoal with glowing gold and burnt orange. The arrangement features a central mass of certainty, represented by staircase patterns in darker tones, interrupted by pulse marks in lighter shades, creating a visual dialogue of collision. The layout emphasizes erosion at the edges, with negative space as unfilled potential, embodying quiet versus clamorous growth.</desc>
