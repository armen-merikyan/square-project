<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">The emotional tone emerges from the tension between restlessness and peace, creating a collision of movement and stasis. The selected palette conveys resilience through earthy greens and soft whites intertwined with accents of rust and gold. This contrast reflects the struggle between the calming, gentle patterns of peace and the jittery, fragmented elements of restlessness. The primary collision occurs diagonally, dominated by the checker pattern representing restlessness, disrupted by soft bands symbolizing tranquility. The broken pixels interjected throughout serve as intentional imperfections, mirroring the layered complexity of memory against constant motion.</desc>
