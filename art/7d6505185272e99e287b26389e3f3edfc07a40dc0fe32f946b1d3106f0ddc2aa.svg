<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Weight</title>
  <desc id="desc">This artwork reflects an emotional dialogue between relief and dread through the juxtaposition of bright and dark colors. The bright colors signify relief and hope, while the darker tones embody the weight of dread. The palette features a mix of lime and electric blue to represent tension against a backdrop of black, creating depth and conflict. The grid pattern provides structure, while the broken pixels introduce imperfection, embracing the concept of interrupted symmetry. This combination results in a dynamic composition, where attention oscillates between the lighter and darker areas, embodying the essence of the seed.</desc>
