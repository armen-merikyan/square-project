<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Against Restraint</title>
  <desc id="desc">The emotional tone reflects the tension between desire and emptiness. The warm palette—hot coral and blood orange—dominates, symbolizing yearning, while charcoal and hollow blue evoke a sense of restraint and distance. The flow is upward, with desire concentrated in the bottom corner, transitioning to emptiness at the top, creating a spiral movement. The sharp contrast between vibrant colors and subdued greys highlights the collision of feelings, interrupted by deliberate 'broken' pixels that punctuate the surface, symbolizing disruptions and edges.</desc>
