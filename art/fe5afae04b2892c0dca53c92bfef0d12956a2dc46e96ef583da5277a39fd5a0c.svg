<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Connections</title>
  <desc id="desc">This artwork embodies the emotional tension between loneliness and connection. A palette of navy and dim cyan reflects isolation, while the stark contrast of black and white pixels suggests the sharp interactions and interruptions of connection. The top-weighted design creates a visual heaviness, offset by smaller bursts of light – mirroring how loneliness often feels heavy, while connection can erupt unexpectedly. The patterns echo a sense of hidden depths and the interplay of exposure versus concealment around a distinct center, symbolizing the struggle between intimacy and distance.</desc>
