<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece embodies the emotional tension between vulnerability and strength through a contrasting color palette of warm and cool tones. The primary contrast lies in the collision between the pale muted purples representing vulnerability at the center and the stronger, dense blocks of deep blue and orange around them, suggesting a protective frame. The checker pattern for strength disrupts the grid of vulnerability, creating tension and movement across the square. This reflects the struggle of opposing emotions, with the broken pixels serving as intentional disruptions, mimicking scars yet adding to the overall narrative of fragility and resilience.</desc>
