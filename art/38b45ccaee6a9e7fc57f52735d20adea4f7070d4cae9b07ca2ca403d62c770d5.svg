<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Egress and Control</title>
  <desc id="desc">The emotional tone centers on the conflict between desire and restraint. The palette combines the warmth of red oxides and muted creams to convey warmth and longing, set against the restrained intensity of blackened plum and iron gray. The dominant presence of desire is represented through bright patches reminiscent of pressure, pushing against the cooler, muted tones creating a structured lattice or border effect. The main contrast arises at the center, where warm colors collide with deep, dark hues, suggesting tension and release, aligning with the spiral pressure theme. The use of broken pixels introduces imperfection, echoing the struggle between these emotional states.</desc>
