<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Change</title>
  <desc id="desc">This artwork captures the tension between nostalgia and progress through a deliberate arrangement of colors and patterns. The palette combines deep navy with soft dim cyan, creating a somber mood that evokes memories yet hints at future possibilities. The heavy bottom-weighted arrangement suggests the impact of nostalgia as a counterpoint to the lighter, brighter areas that symbolize progress. The zigzag flow adds an element of unpredictability, as if memories dripped and pooled, highlighting echoes of the past colliding with aspirations for the future. The subtle broken pixels introduce imperfection, emphasizing the fragility of these emotions.</desc>
