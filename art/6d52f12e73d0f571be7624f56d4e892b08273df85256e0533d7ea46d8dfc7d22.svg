<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shattered Affection</title>
  <desc id="desc">The artwork engages with themes of contradiction—love contrasted against betrayal—echoed through the warm pinks and reds offset by stark grays and dark maroon. The arrangement plays with a nearly symmetrical layout disrupted by strategic placements of darker hues, creating a conflict that represents betrayal amidst the softness of love. The edges appear burned and worn, hinting at emotional scars, while sharp and soft contrasts evoke the tension between closeness and loneliness. The overall density varies across the canvas, fostering a rhythmic flow that suggests movement from the bottom (pain) to the top (resolution), yet leaves space for interpretation in the negative sections.</desc>
