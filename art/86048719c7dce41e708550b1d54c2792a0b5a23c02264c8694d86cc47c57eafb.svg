  <title id="title">Weight of Illusion</title>
  <desc id="desc">This artwork captures the emotional tension between relief and dread. The palette incorporates deep blue to evoke dread while injecting brightness through yellow, creating a stark contrast. The arrangement features a gradient descending from top to bottom, resembling the feeling of weight pulling down, with lighter stripes breaking through the dark spaces to signify moments of relief. The use of broken dots amidst stripes introduces imperfection, symbolizing struggle within the structured design. The collision occurs primarily where bright yellows are interspersed with muted purples and deep blues, creating a rhythm of hope against despair.</desc>
