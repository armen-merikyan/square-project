<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">The artwork embodies a tension between control and surrender, where vibrant colors representing surrender almost overflow against edges of calmer tones. The chosen palette features bright greens and golds against deeper olives and creams, symbolizing bursts of emotion constrained by darker hues. The center is saturated, illustrating a struggle to contain that energy, while the uneven borders echo a sense of gentle descent and quiet space. The collision occurs predominantly at the center, emphasizing a narrative of pressure versus release.</desc>
