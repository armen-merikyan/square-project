<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Harmony</title>
  <desc id="desc">This composition reflects the emotional struggle between panic and control, using a checkerboard pattern to evoke the feeling of control, disrupted by jagged crosses that suggest chaos and unevenness. The palette of yellow and orange brings warmth and dynamism, contrasted by the cool tones of deep blue and muted purple creating depth and weight. The arrangement features a balance of negative space signifying calm amidst the noise, while the ‘hole’ at the center symbolizes a void in the control structure, suggesting tension and unresolved conflict.</desc>
