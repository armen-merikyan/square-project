<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Reflection</title>
  <desc id="desc">The artwork explores the emotional contrast between defiance and submission through a split screen composition that feels mirrored yet disrupted. The subdued palette features soft grays and an off-white base, creating a quiet field that serves as the foundation for bursts of compressed red and dark navy. The central collision occurs diagonally, with vibrant strokes juxtaposed against muted shades. The broken edges reflect the tension in the narrative, echoing the asymmetric nature of defiance clashing with submission. This interplay creates a sense of tension and space, honoring the complexities of emotional responses.</desc>
