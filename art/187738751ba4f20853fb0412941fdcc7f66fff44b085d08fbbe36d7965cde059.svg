<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Presence and Absence</title>
  <desc id="desc">This piece captures the emotional dichotomy between emptiness and desire through rich color contrasts and patterns. The palette combines dark violet, soft gold, and pale green to evoke a sense of longing contrasted with void. The layout suggests upward movement, symbolizing a rise against the weight of despair. With broken pixels adding imperfection, the overall composition channels noise against the clean radial formations of desire, creating visual interruptions. There's tension in the placement of brighter hues amidst darker fields, implying hope and struggle.</desc>
