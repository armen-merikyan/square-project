<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision at Threshold</title>
  <desc id="desc">This artwork embodies the emotional tension between control and surrender through a deliberate clash of darker and lighter tones. The palette utilizes hues from 'resilience_fragility' to reflect a fight between stability and release. The central collision occurs where the darker colors converge with bright accents, symbolizing the struggle of localized pressure against open space. The shapes defined by pulse marks and scars manifest the ‘arrow’ seed metaphorically, creating movement and interruption in the grid structure. Broken pixels introduce imperfection, enriching the narrative of tension and resilience, while maintaining ample negative space to preserve quiet after the collision.</desc>
