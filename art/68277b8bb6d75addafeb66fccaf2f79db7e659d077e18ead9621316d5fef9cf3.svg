<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork explores the tension between softness and severity, using a palette that juxtaposes warm hues against stark blacks and grays. The top half embodies softness with lighter colors, creating a gentle gradient that suggests warmth and openness. The bottom half, in stark contrast, employs darker, more severe tones that convey a sense of confinement or pressure. The collision of these emotional tones occurs through a bold use of broken pixels, mirroring the struggle between the desire to expand and the boundaries imposed by severity. This duality captures an abstract narrative of conflict and balance, resonating with the conceptual seeds of guilt and forgiveness embedded within the emotional framework. The layout breaks the square in half, emphasizing the split between the two contrasting feelings, while the use of negative space allows for reflection amidst dense color clusters.</desc>
