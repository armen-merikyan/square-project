<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition captures the emotional tension between restlessness and peace through distinct color choices and patterns. The palette of burnt orange, dark red, charcoal, and gold evokes warmth and intensity, highlighting the struggle between a calming presence and a seething undercurrent of motion. The primary clash occurs diagonally, where intense flame-like patterns (representing restlessness) intertwine with stepwell-like structures (representing peace). Broken pixels scattered throughout serve as unresolved thoughts that disrupt the otherwise intentional arrangement, symbolizing the fleeting nature of calm. Negative space creates breathing room amidst the chaos, reinforcing the idea of restraint. This ties back to the seed's narrative of conflicting emotions manifesting through motion and stillness.</desc>
