<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece embodies the tension between desire and restraint through a palette that juxtaposes warm reds and muted creams. The saturated colors represent the emotional pull of desire, while the darker shades signify the limitations imposed by restraint. The layout flows diagonally from the bottom left, suggesting the initial surge of emotion being gradually confined towards the top right. The contrast of vibrant hues against subdued tones creates a feeling of collision, hinting at the dynamic struggle between reaching for love and the barriers that hold it back. The intentional disruption of color in a few pixels embodies the unpredictability of emotional experiences.</desc>
