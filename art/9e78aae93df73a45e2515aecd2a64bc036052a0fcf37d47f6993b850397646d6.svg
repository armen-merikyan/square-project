<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Static Pulse</title>
  <desc id="desc">The emotional tone embodies a struggle between clarity (signal) and chaos (noise). The palette of navy, black, and dim cyan creates a shadowy atmosphere that suggests depth while allowing bright white accents to emerge as signals of clarity. The pattern features a collision of shatter and teeth motifs, illustrated as muted colors surround a vibrant core in the center, symbolizing the core pulse trying to push through layers of disruption. This composition embodies a distinct tension with densely packed noise at the edges gradually softening towards a central focus, representing the interaction of exposure and shelter against a backdrop of echoes.</desc>
