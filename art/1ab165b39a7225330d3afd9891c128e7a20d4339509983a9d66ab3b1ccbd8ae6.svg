<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Forces</title>
  <desc id="desc">This abstract piece captures the tension between defiance and submission through fragmented patterns and contrasting colors. The chosen palette reflects resilience and fragility, with deep moss greens and soft bone whites conveying a sense of struggle and vulnerability. The center features a high density of rust and small gold accents, symbolizing the defiant core, which collides with quieter stone gray fields towards the edges, suggesting submission. This mix creates an intentional imbalance where collision occurs at the center, forming an emotional focal point amidst the surrounding tension of the edge colors, embodying the seed's exploration of contrasting qualities.</desc>
