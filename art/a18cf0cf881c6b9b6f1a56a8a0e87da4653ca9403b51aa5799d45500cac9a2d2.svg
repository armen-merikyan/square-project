<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This composition evokes the emotional tension between desire and emptiness. The palette of hot coral and blood orange represents the allure of desire, while the charcoal and hollow blue reflect a sense of emptiness and containment. The main contrast occurs along a diagonal where vibrant colors collide with muted tones, creating a dynamic push-pull effect. The edge style of eroded edges symbolizes the fragility of containment, while broken pixel placements suggest interruptions in the flow of desire. Overall, the abstract pattern narrates an inner conflict, with the top left corner saturated with warm colors and a gradual fade into cooler, hollow spaces.</desc>
