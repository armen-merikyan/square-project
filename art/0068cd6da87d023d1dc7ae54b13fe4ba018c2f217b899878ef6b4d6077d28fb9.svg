  <title id="title">Tension of Stillness</title>
  <desc id="desc">The artwork explores the emotional tension between restlessness and peace, reflecting a chaotic rhythm contrasted against calmness. The palette combines soft pink and warm white to evoke a feeling of peace, while sharp crimson and carbon black introduce restlessness. The layout consists of diagonal movements clashing at the center, emphasizing the argument between stillness and motion. Broken pixels create intentional disruptions, enhancing the sense of unease. Overall, a balance of clear spaces against densely packed colors signifies the struggle between peace and turmoil.</desc>
