<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">The piece embodies the emotional dichotomy of 'spark' and 'ash,' portrayed through a juxtaposition of dynamic and static forms. The palette leans toward a balance of intense colors such as deep red and black with the softer tones of pale blue and white, encapsulating the struggle between overwhelming pressure and serene calm. The main collision occurs horizontally, illustrating a wave of tension that meets a broader quiet channel of negative space, allowing the viewer to navigate both chaos and stillness. This composition reflects the layered nature of memory, intertwining resilience and fragility in its arrangement.</desc>
