<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmony in Chaos</title>
  <desc id="desc">This piece explores the emotional tension between restlessness and peace through contrasting color fields and patterns. The palette features soft greens and warm browns to evoke a sense of safety, while the inclusion of pale skin and cold white reflects moments of disruption. The edge style introduces a broken frame that conveys imperfection, while negative space allows for feelings of unease to emerge. The central collision occurs diagonally, where a checker pattern for peace meets the chaotic negative cross for restlessness, creating visual tension and a narrative of conflict between calm and turmoil.</desc>
