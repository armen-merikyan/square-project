<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Duality</title>
  <desc id="desc">The artwork captures the emotional interplay between spark and ash, embodying both ignition and decay. The use of a muted palette with deep blue, mourning black, and hints of pale yellow represents the tension between immediate energy and residual calm. The collision occurs diagonally across the square, where bright accents of pale yellow represent fleeting bursts of life against a backdrop of soft, ashy tones to evoke memory and resistance. The glitch patterns on one side contrast sharply with scar patterns on the other, illustrating the imperfection and duality of existence.</desc>
