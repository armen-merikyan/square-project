<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">The emotional tone reflects the duality of panic and control, depicted through an interplay of dark and light colors. The palette of black, dark violet, soft gold, and pale green captures the tension of fear and hope. The main contrast occurs between the densely packed dark hues at the bottom representing panic, and the lighter colors at the top suggesting release and relief. This movement from dark to light captures the emotional journey from pressure to release, while the irregular placement of pixels embodies the idea of collision and disruption, creating a sense of unease balanced by moments of calm.</desc>
