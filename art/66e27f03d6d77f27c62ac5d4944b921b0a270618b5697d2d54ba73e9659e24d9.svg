<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal and Static</title>
  <desc id="desc">This piece embodies the duality of restlessness and peace. The palette of soft off-white and faint peach symbolizes tranquility, while compressed red and dark navy evoke tension. The two small centers create a pulse across negative space, representing movement against a backdrop of static, mirroring memory versus motion. The intersection of contrasting colors speaks to the struggle of coherence in chaos, with broken pixels suggesting disruption. The overall form draws on the 'tear' shape seed, ensuring it flows within an abstract context rather than as a literal image.</desc>
