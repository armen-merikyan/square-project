<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Echoes</title>
  <desc id="desc">This artwork juxtaposes the heavy darkness of dread with the piercing relief of light, symbolizing the emotional duality present in the seed. The chosen palette of navy and black creates a strong foundation of darkness, reflecting the oppressive feelings of dread, while the dim cyan serves as a bright yet soft contrast, symbolizing moments of relief breaking through. The flow is designed top-to-bottom, echoing the descent into heaviness and the occasional spark of light. The arrangement includes asymmetrical patterns utilizing rings of light against dark backgrounds, suggesting the struggle between serenity and chaos, and how a dominant top-weighted structure battles the emerging sparks of relief.</desc>
