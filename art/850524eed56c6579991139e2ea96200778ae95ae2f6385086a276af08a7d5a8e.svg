<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece embodies the emotional tension between vulnerability and strength. The palette balances pale aqua and mist gray, signifying vulnerability, against deeper ink blue and alarm red which represent strength. The inner 4x4 section, framed by the stronger colors, creates a dynamic flow that echoes rightward, emphasizing the contrast. The broken dots pattern disrupts the calm of the frame, showcasing moments of fragility amidst strength. The potential negativity of space reflects the need for safety while exposing the raw core as a reminder of risks taken, creating a narrative of precarious balance.</desc>
