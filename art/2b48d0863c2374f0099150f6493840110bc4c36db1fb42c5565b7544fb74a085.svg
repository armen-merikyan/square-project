<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Complex Equilibrium</title>
  <desc id="desc">This piece explores the emotional tension between awe and terror through a contrasting palette of vibrant electric blue and magenta against deep black, suggesting a struggle between light and darkness. The sharp contrast between the colors creates a dynamic interplay that evokes feelings of instability and courage. The placement of electric blue dots in a radial pattern surrounded by dark edges symbolizes the push and pull of hope amidst chaos. Broken pixels introduce imperfection, adding to the complexity and instability of the emotions, while sufficient negative space allows the viewer to breathe amidst tension.</desc>
