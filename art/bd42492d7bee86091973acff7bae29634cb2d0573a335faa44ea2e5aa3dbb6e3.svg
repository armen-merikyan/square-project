<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Echoes</title>
  <desc id="desc">This composition captures the emotional conflict between clarity and distortion. The palette of deep navy, contrasting black, and accents of dim cyan represents the stark division between signal (clarity) and noise (static). The density of darker colors dominates the grid, symbolizing noise, while brighter colors emerge as a pulse of signal trying to break through the chatter. The broken pixels are intentionally placed throughout to signify interruptions, reinforcing the theme of memory vs. erasure. The layout follows a threshold where one emotion collides with the other, creating tension and depth.</desc>
