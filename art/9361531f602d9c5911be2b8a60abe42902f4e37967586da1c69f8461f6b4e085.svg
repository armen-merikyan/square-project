<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Desire</title>
  <desc id="desc">The artwork embodies the emotional tension between emptiness and desire, communicated through a palette that transitions from warm pinks and reds to cool grays and dark maroon. The jagged edges suggest a battle between the protective and the vulnerable, and the flow from the top left to the bottom right reflects the movement from emptiness into desire. Bright signals of desire interrupt the more muted areas representing emptiness, creating a dynamic contradiction. The spacing incorporates negative space to enhance the feeling of loneliness, emphasizing the contrasts of warmth against coldness in a zigzag rhythm.</desc>
