<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Stillness</title>
  <desc id="desc">The emotional tone reflects the struggle between control and surrender, manifesting in a stark contrast. The selected palette of navy and black creates a somber yet deep foundation, while the dim cyan serves as an accent, highlighting moments of tension. The main collision occurs at the center, where control (the thick, outlined structure) meets the yielding pattern of surrender, represented by lighter hues that break the rigidity of the outer layers. This arrangement captures the essence of 'signal vs noise', embodying an abstract narrative of balance amid chaos.</desc>
