<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Dichotomy</title>
  <desc id="desc">This piece embodies the complex relationship between tenderness and rage. The palette of red, black, pale blue, and white reflects the intensity of both emotions, with the sharp contrast between saturated red tones and muted blue fields highlighting their collision. The central area of the composition features jagged patterns of red ('shatter') that seem to bleed into softer blue ('spark') edges, creating a dynamic tension. This visual representation of emotional layers suggests a feeling of internal struggle and the coexistence of gentleness and ferocity, with broken pixels symbolizing imperfections in both feelings. The arrangement encourages a contemplative flow inward, demonstrating how these contrasting emotions can shape one another.</desc>
