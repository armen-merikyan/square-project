  <title id="title">Friction of Longing</title>
  <desc id="desc">The artwork explores the tension between desire and restraint through contrasting warm and cool colors. The palette includes red oxide and small orange to symbolize desire, while muted cream and iron gray embody restraint. The contrast peaks at the center where warm colors interact with the static quality of cooler hues, creating a dynamic collision that evokes both hope and confinement. The broken pixels serve as scars that add imperfection and nuance to the overall flow, illustrating the emotional struggle inherent in the themes of the seed.</desc>
