  <title id="title">Eroded Shelter</title>
  <desc id="desc">This artwork expresses a conflict between safety and exposure, using a contrasting palette of warm browns, soft greens, and cool whites to evoke a sense of vulnerability and protection. The diagonal flow suggests a tension between lightness and heaviness, while the main collision occurs in the center where the soft colors are interrupted by darker tones, inferring brokenness or disruption. The patterns of rings and ladders create an echoing effect as they weave through the square, enhancing the emotional narrative of strength against fragility.</desc>
