<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Embrace</title>
  <desc id="desc">This composition explores the emotional dichotomy of love and betrayal through a contrasting palette of warm pinks and reds against muted grays and dark maroon. The circular patterns of dots (representing love) collide with the jagged stripes (representing betrayal), emphasizing a struggle between intimacy and betrayal. The flow starts from a dense center, echoing a heart's fragmentation, and radiates outward, representing both a rising signal of hope and the scattered chaos of broken trust. The cracks and imperfections generated by broken pixels symbolize the inherent flaws in emotional connections.</desc>
