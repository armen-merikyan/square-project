<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry of Emotion</title>
  <desc id="desc">The emotional tone embodies the tension between 'awe' and 'terror', creating a visual dialogue of conflicting forces. The chosen palette of burnt orange, dark red, charcoal, and gold represents fiery intensity and hidden depths, mirroring the contrasting emotions. The primary contrast occurs along a vertical split where soft edges transition from warm chaos on one side to a more stable, ordered coolness on the other, creating a feeling of disturbance within balance. The pattern's asymmetry, alongside the introduction of broken pixels, suggests an interruption in memory, echoing the sense of lost stability amidst awe-inspiring chaos.</desc>
