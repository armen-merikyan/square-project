<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Duality</title>
  <desc id="desc">This abstract artwork embodies the emotional tension between confusion and clarity through contrasting blocks of color. The chosen palette of lime, black, electric blue, and magenta represents the vibrant yet chaotic nature of feelings, with lime and electric blue illustrating clarity, while the black and magenta highlight confusion. The arrangement exhibits a split vertical layout, emphasizing the conflict between symmetry and breakage. The broken pixels introduce imperfections, amplifying the emotional collision at the center, where chaos meets structure. Overall, the design flows diagonally, suggesting a pulse that transitions between calm and rage, encapsulating the emotional narrative inspired by the seed.</desc>
