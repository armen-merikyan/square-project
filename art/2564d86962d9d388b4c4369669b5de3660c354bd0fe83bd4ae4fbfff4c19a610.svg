  <title id="title">Locked Yearning</title>
  <desc id="desc">The composition captures the emotional tension between desire and restraint. The palette merges rich, saturated colors like red oxide and muted cream with darker tones, emphasizing the pull of longing amid limits. The dominant clusters of deep colors in the center clash with softer shades along the edges, creating a spiral tension that reflects the theme of pressure against a sealed border. The arrangement of colors forms a dynamic lattice, symbolizing the complexity of desire intertwined with restraint.</desc>
