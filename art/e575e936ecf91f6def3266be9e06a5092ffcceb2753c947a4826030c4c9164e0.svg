<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone explores the tension between defiance and submission. The palette of moss green, bone white, rust, stone gray, and small gold offers a balance of resilience and fragility. The main contrast occurs in the transition from the more vibrant broken dot patterns of defiance in the inner core to the subdued constellation patterns of submission at the edges. This serves as a metaphor for the conflict and interaction of these emotions, where the center holds energetic marks against a muted boundary, suggesting a dynamic yet fragile balance.</desc>
