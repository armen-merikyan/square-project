<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Light and Weight</title>
  <desc id="desc">The emotional tone of this piece juxtaposes lightness and softness with dark, heavy severity. The chosen palette blends soft pink and warm white against the stark contrast of carbon black and sharp crimson, creating a striking visual disturbance. The collision occurs prominently in the center, where softer elements are hemmed in by darker tones, echoing feelings of guilt and forgiveness. The flow from bottom to top represents a struggle between rising tension and present comforts, while the edge style allows the lighter hues to spill outwards, emphasizing the tension of an open gate. This arrangement reflects the core theme of opposing forces within the emotional spectrum.</desc>
