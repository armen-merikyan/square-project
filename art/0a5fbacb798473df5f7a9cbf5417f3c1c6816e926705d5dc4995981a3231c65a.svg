<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This composition captures the emotional tension between quiet and pressure. The muted palette of off-white and faint peach serves as a soft field against the more compressed hues of dark navy and compressed red, representing tension. The layout shows a broken frame that allows room for 'quiet' to seep in, fundamentally illustrating a collision between density (represented through the lower portions) and open space at the top, mirroring the quiet pressure dynamic of the seed. The contrast is emphasized at the center where dark navy meets peach, creating a dialogue of conflict and release.</desc>
