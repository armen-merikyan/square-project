<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotion</title>
  <desc id="desc">This abstract composition juxtaposes envy against gratitude through the tension of color patterns and spatial dynamics. The burnt orange represents warmth and connection, embodying gratitude, while the dark reds symbolize intensity and conflict, reflecting envy. The layout captures a corner invasion of dark tones that spread towards a softer center, illustrating the emotional pull from edges to the core. The use of negative space ensures the composition breathes, allowing the viewer to reflect on the emotions without being overwhelmed. Broken pixels introduce imperfection and a sense of the fleeting nature of these emotions, adding depth to the experience of the piece.</desc>
