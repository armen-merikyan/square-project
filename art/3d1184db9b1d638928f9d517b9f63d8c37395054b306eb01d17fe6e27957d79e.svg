<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Duality</title>
  <desc id="desc">This artwork embodies the tension between nostalgia and progress. The top half features cool blues and whites representing nostalgia's calm, balanced space, while the bottom bursts with warmer reds and blacks indicating the chaotic push of progress. The contrasting halves collide in the center, where shadows and light intertwine. The patterns evoke drips and teeth, symbolizing resilience in memory and the sharp advance of time. Broken pixels add a layer of imperfection, echoing the contrasts inherent in memory and advancement. Negative space, especially at the edges, invites contemplation of the unseen forces shaping our paths.</desc>
