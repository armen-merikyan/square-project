<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Release</title>
  <desc id="desc">The emotional tone captures the struggle between control and surrender, employing a palette of clean white, icy blue, deep ink black, and violet gray to evoke clarity amidst chaos. The main contrast occurs at the overfilled corner, where saturated hues collide with quieter spaces, suggesting a tension that echoes the theme of overflow versus containment. The wave shape seed translates into rhythmic patterns of control (rings) and surrender (crosshatch), creating a layered effect that invites the viewer to navigate through an emotional landscape of pressure and gradual release.</desc>
