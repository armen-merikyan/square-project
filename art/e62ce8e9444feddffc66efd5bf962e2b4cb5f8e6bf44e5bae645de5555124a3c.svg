<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone is anchored in the juxtaposition of desire and emptiness. The palette reflects this contrast through warm hues of hot coral and blood orange representing desire, contrasted with charcoal and hollow blue to depict emptiness. The collision occurs in the center of the grid, where warm tones break through a cooler, more restrained border. This arrangement suggests a push and pull, with desire pressing against the boundaries of containment. The patterns of hinge and negative cross create an interplay of warmth and coolness, representing the tension of craving and restriction harmoniously.</desc>
