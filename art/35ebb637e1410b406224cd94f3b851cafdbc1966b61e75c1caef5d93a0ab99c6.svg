<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Islands</title>
  <desc id="desc">This artwork captures the emotional tension between defiance and submission through the contrasting density and quiet areas. The use of a muted palette with 'pale mint,' 'soft sky,' and 'storm gray' reflects a calmness interrupted by 'near black' and 'faded gold' marks. The main collision occurs in the center with the dense patterns of the 'defiant' flame against the quieter borders of 'submission' noise, representing an emotional battlefield between control and chaos. Intentional broken pixels enhance the theme of disruption, suggesting imperfection in the struggle between these feelings.</desc>
