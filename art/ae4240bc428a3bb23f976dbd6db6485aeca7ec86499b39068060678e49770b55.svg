<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition embodies a conflict between the intense emotions of rage and the tranquility of calm. The palette of black, red, pale blue, and white creates a striking contrast, where the deep black and bright red dots represent chaos and intensity, intruding into a calm constellation of pale blue and white. The sharp transitions create a sense of confrontation, while the broken pixels introduce imperfections that symbolize emotional eruptions. The central clash occurs in the inner 4x4 grid, which is filled with rising chaotic energy, surrounded by a calmer outer edge. This arrangement illustrates the tension between containment and overflow, echoing the seed's themes of contrasting emotional states.</desc>
