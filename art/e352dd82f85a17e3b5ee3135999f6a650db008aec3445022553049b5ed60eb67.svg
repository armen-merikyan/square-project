<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork embodies the tension between defiance and submission through a stark palette of deep blacks contrasted with bright accents. The outer pixels invoke submission with darker colors forming an enclosing frame, while the inner pixels radiate defiance with bold, pulsating accents. The central collision, marked by an echo of higher contrast colors, represents the heart of the conflict. The uneven spacing and broken pixels introduce a sense of disruption, refracting the emotional narrative of chaos against structured order, enhanced by the discordant edges. This results in an artwork that feels alive and oscillating between states of pressure and release.</desc>
