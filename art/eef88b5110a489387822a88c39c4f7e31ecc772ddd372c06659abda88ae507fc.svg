<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Dark</title>
  <desc id="desc">The artwork embodies the emotional dichotomy of joy and grief through contrasting color patterns. The left side uses bright yellows and oranges symbolizing joy, arranged in a structured frame-like pattern, suggesting protection and energetic buoyancy. The right side uses deep blues and muted purples, arranged in a grid that conveys heaviness and complexity, representing grief. The stark separation creates a visual tension, illustrating the constant push-and-pull of these emotions, while hints of negative space suggest moments of relief amid pressure. The edge style is hard, creating a defined boundary between the two emotional states, while the broken pixel elements add a touch of imperfection, reflecting the chaos underlying these feelings.</desc>
