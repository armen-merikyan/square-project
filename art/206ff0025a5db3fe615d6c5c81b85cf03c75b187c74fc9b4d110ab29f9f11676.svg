<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Contrast</title>
  <desc id="desc">This piece explores the emotional tension between envy and gratitude. The palette of sepia, tan, dust gray, and faded blue portrays nostalgia and complexity, representing both feelings. The outer rows reflect the heavier emotion of envy, using darker shades to create a sense of weight, while the inner core uses lighter, more uplifting colors to symbolize gratitude. The arrangement yields rhythmic movement from edges to the center, suggesting a draw inward, creating a dynamic collision of light against dark that evokes both discomfort and tenderness. The deliberate broken pixels emphasize imperfection, mirroring the struggle between these conflicting emotions.</desc>
