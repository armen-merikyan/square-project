<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Echoes</title>
  <desc id="desc">This composition evokes the emotional clash between 'emptiness' and 'desire' via contrasting warm and cool tones. The top half represents 'desire' through brighter, more vibrant hues while the bottom half represents 'emptiness' with muted and dark colors. The palette, inspired by 'broken memory,' merges sepia, tan, and gray with faded blue, symbolizing warmth and coldness in tension. The central climax of collision happens where bright colors meet darker tones, creating a visual echo of conflicting emotions that pull at the viewer's heart, symbolizing disconnection yet yearning. The arrangement maintains negative space, giving breath to the emptiness motif while preserving emotional intensity.</desc>
