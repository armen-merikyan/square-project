<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Duality</title>
  <desc id="desc">This abstract composition embodies the emotional tug-of-war between envy and gratitude, reflected in its split layout and contrasting color dynamics. The left half, influenced by envy, showcases darker, muted tones (blacks and dark violets), suggesting tension and intensity. In contrast, the right half, colored in softer gold and pale green, symbolizes gratitude with a lighter, uplifting quality. The soft edges merge the two emotional states, while broken pixels inject a sense of imperfection, hinting at the fragility of feelings. The overall flow is horizontal, creating a wave-like motion that suggests an ongoing push and pull between contrasting emotions.</desc>
