<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Ruins</title>
  <desc id="desc">This composition explores the emotional contrast between panic and control. The chosen palette of red, black, pale blue, and white serves to illustrate intense emotional conflicts—red symbolizing panic and urgency, while pale blue and white evoke calmness and clarity. The edge style is left-weighted, emphasizing the loss of control towards the edges, creating a visual tension where the viewer's eye is drawn outward. In the center, a radial pattern of stripes represents structure and order, gradually disrupted by random pixel 'bleeds' that signify chaos and imperfection. The interplay between these patterns and colors suggests an emotional journey from a chaotic center outward, encapsulating the theme of losing control while striving for stability.</desc>
