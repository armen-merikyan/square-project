<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Conflict</title>
  <desc id="desc">The emotional tone emerges from the tension between restlessness and peace. The chosen palette of cosmic indigo (#5B2E91), void black (#000000), star white (#FFFFFF), cold gold (#D4AF37), and deep teal (#006B6E) represents deep emotional layers with contrasting brightness. The main collision occurs centrally, where the bright star white emerges from the encircling cold gold and deep teal patterns creating a sense of movement versus stillness. The static patterns evoke restlessness, while the flowing fields suggest peace. The broken pixels introduce intentional disruption, enhancing the overall emotional depth and engagement.</desc>
