<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition embodies the emotional tension between desire and restraint through contrasting colors and patterns. The use of warm, saturated hues like hot coral and blood orange suggests a strong pull of desire, while muted tones like charcoal create a sense of containment. The diagonal flow from the corner creates a dynamic tension, as vibrant colors weave through soft edges, echoing conflict. Main contrast occurs where saturated colors intersect with muted fields, emphasizing the struggle between yearning and limitation.</desc>
