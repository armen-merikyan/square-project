<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Shelter</title>
  <desc id="desc">This artwork explores the emotional contrasts of safety and exposure, portrayed through rectangular bands that mirror an echoing flow from left to right. The palette of shelter green and warm browns reflects a comforting safety, while pale skin tones symbolize vulnerability and exposure. The main collision occurs at the vertical split, where warmer hues stack against cooler tones, creating tension. Broken pixels introduce imperfections, embodying the fragility present in the balance of protection and openness. The layering creates a textured dialogue between soft density and sharp contrast, leaving a quiet void in one corner to emphasize the lack of exposure in a safe space.</desc>
