  <title id="title">Center vs. Edges</title>
  <desc id="desc">The artwork embodies a struggle between control and panic, emphasizing the contrast between solid, controlled structures and chaotic, scattered elements. The chosen palette of blacks, reds, and pale blues reflects intensity and calmness, symbolizing the emotional tension. The arrangement features dense clusters of dark colors that represent panic surrounding a lighter, more controlled center, echoing the seed's theme of central strength versus surrounding chaos. The asymmetrical distribution and pixel bleeding add a sense of disruption and uncertainty, fostering a persistent emotional collision.</desc>
