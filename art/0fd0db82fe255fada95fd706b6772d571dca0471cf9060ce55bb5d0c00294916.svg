<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Exposure</title>
  <desc id="desc">This piece embodies the tension between the warmth of safety and the starkness of exposure. The soft greens and warm browns represent layers of protection, creating a soothing barrier. Pale skin tones scattered amidst colder whites introduce delicate vulnerability, emphasizing the echoes of exposure. The contrast predominates at the vertical center, where warm tones bleed into cooler shades, suggesting a subtle shift between safety and vulnerability. The pixel arrangements suggest a split-screen effect, mirroring the dual nature of existence, while broken pixels add intentional disruptions, symbolizing the imperfection of experience.</desc>
