<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Release</title>
  <desc id="desc">The emotional tone contrasts quiet moments with dense pressure, captured by a palette of muted and accent colors. The use of dark navy and compressed red conveys weight and tension, while off-white and faint peach serve as an airy counterpoint, creating a sense of lightness that struggles against the heaviness. The collision occurs where the sharp edges of compressed colors clash with soft ripples of quiet tones, primarily across the center. The rising signal layout allows the pixels to ascend from dark, weighted areas into lighter spaces, suggesting a journey from strain to clarity.</desc>
