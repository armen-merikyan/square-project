<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">The emotional tone embodies a stark contrast between the fury of rage and the serenity of calm. The chosen palette of red, black, pale blue, and white emphasizes a turbulent core against a calming backdrop. The dense center featuring intense reds sparks outward to cooler tones, symbolizing energetic explosions against tranquil spaces. This array visually narrates how these emotions collide at the center, creating an echoing rhythm as the heat tries to overflow yet is partially contained by cooler hues, resonating with the seed's theme of tension between chaos and order.</desc>
