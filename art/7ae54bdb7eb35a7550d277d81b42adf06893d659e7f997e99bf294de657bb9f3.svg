<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The artwork captures the emotional tension between vulnerability and strength through a palette of muted purple and deep blue, contrasting with vibrant yellows and oranges that represent the core of vulnerability. The layout emphasizes a border that feels both protective and breached, allowing for light to seep through. The maze pattern reflects vulnerability’s chaotic nature, while the stepwell structure of strength provides a stable foundation. The collision occurs mostly at the center, where the colors interact, creating a push-pull dynamic of exposure and security.</desc>
