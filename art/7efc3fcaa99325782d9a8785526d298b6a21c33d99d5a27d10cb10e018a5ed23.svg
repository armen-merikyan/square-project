<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Safety</title>
  <desc id="desc">This artwork explores the tension between safety and exposure, utilizing a palette that juxtaposes warm brown and soft pale skin against the cooler tones of open blue and cold white. The center of the artwork is saturated with warm hues, symbolizing safety, while the cooler, softer colors echo around the edges, representing exposure. The dominant warm color forms a heavy border, which struggles to contain the outgoing reach of the blue ripples, portraying the emotional push and pull between feeling secure and vulnerable. The broken pixels serve as intentional disruptions, enhancing the sense of imperfection and tension. The central collision of color is prominent, reflecting the close proximity of warmth and vulnerability, a source of emotional complexity.</desc>
