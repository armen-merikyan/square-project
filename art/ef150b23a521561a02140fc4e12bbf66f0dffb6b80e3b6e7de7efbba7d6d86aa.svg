<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Flicker of Resilience</title>
  <desc id="desc">The emotional tone conveys the tension between ephemeral sparks of hope and the heaviness of ash. The palette of deep blacks contrasts with vivid reds and soft pale blues, portraying a struggle between raw energy and muted remnants. The layout descends like falling ash, embodying weight, while sharp bursts create interruptions amidst the flowing dark. The main collision occurs in the center, where the sudden brightness of red sparks interrupts the deep black, suggesting the fleeting nature of aspiration against the backdrop of restraint. Overall, this composition reflects the balance and tension of resilience against fragility.</desc>
