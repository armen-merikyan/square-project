<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">This artwork explores the emotional contrast between envy and gratitude, depicted through a palette of muted, earthy tones that evoke a sense of memory and softness. The clash between darker sepia and faded blue suggest a tumultuous inner landscape, where rising shades represent hope amidst a falling weight of despair. The layout mimics falling pixels, emphasizing a descent from brighter to deeper hues, while the frame-like patterns evoke softness and boundaries, capturing the essence of an empty room filled with tension. The use of broken pixels throughout the composition introduces imperfection and depth, bridging the stark contrast between gratitude's light and envy’s heaviness.</desc>
