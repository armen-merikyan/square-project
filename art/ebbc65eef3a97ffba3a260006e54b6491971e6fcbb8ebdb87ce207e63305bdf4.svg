<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Shadows and Light</title>
  <desc id="desc">This composition embodies the intense emotional duo of defiance and submission. The central element is assertive, represented by a bright, rich hue (honey gold), existing amid darker and muted colors that suggest confinement and pressure. The palette of 'gratitude_envy' offers contrasting tonalities where the deep olive and cream colors create a sense of space while the vibrant acid green symbolizes bursts of defiance. The collision occurs with bright accents interrupting the denser, muted fields, creating a tension that echoes the seed-themed struggle between opposing forces. The broken pixels add intentional disruptions, enhancing the emotive layer, emphasizing both the strength and vulnerability of this emotional landscape. This energetic yet chaotic layout captures the essence of struggle and resolution without a literal symbol.</desc>
