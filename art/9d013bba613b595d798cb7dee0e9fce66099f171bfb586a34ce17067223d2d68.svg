<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Struggle of Tension</title>
  <desc id="desc">This piece evokes the contrasting emotions of panic and control through a clash of dark and light elements. The palette, consisting of black, red, pale blue, and white, illustrates the tension between the warmth of emotion and the coolness of restraint. The use of dark blocks in the center conveys panic, surrounded by lighter, structured lines representing control, echoing the 'center vs edges' dynamic. Within this chaos, broken pixel placements disrupt the uniformity, injecting unpredictability and suggesting a bleed of emotions. The overall arrangement provides both density and negative space, embodying the struggle between seeking order within disorder.</desc>
