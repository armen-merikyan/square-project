<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotions</title>
  <desc id="desc">This piece embodies the tension between joy and grief through a palette that contrasts bright yellows and oranges against muted purples and deep blues. The grid pattern representing grief frames a central pulse of joy, while asymmetrical placements disrupt the visual harmony, symbolizing the fragility of emotional balance. Broken pixels introduce imperfection, enhancing the narrative of love and betrayal. The overall flow moves inward, emphasizing a core that seeks connection amid fragmentation.</desc>
