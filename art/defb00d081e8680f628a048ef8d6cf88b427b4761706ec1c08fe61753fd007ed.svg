<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmony in Dissonance</title>
  <desc id="desc">This piece embodies a conflict between awe and terror, depicted through the tension of contrasting colors and the arrangement of pixels. The palette of dim cyan and deep navy allows for a sense of loneliness while also echoing undercurrents of chaotic emotion. The main contrast occurs at the center, where brighter colors collide against a darker backdrop, suggesting both stability and instability. The soft edges create an impression of a wave-like motion, while the broken pixels throughout hint at memories interrupted, aligning with the concept of 'broken_memory'. The overall placement fosters a sense of movement, embodying the push and pull between awe and terror, as well as order and chaos.</desc>
