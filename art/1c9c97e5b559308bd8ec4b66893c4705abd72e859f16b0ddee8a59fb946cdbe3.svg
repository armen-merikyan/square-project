  <title id="title">Tension of Hearts</title>
  <desc id="desc">This artwork captures the emotional tension between love and betrayal, using a palette of warm pinks and deep reds contrasted with cool grays. The center features a dense cluster of warm colors suggesting love, surrounded by cold grays and dark maroon, representing betrayal. The diagonal placement creates a sense of rising tension that fractures at the edges, illustrated by subtle, broken pixels. This juxtaposition conveys the conflict between calm and chaos, embodying the essence of a heart fragmented yet still beating with intensity.</desc>
