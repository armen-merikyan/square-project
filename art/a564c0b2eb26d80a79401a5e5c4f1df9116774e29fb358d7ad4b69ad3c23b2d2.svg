<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Connection</title>
  <desc id="desc">This composition evokes the emotional struggle between loneliness and connection through contrasting colors and placements. The deep reds and muted grays suggest passion and betrayal, while bursts of pink symbolize tentative connections. A central 'hole' shape embodies the isolation, surrounded by a grid of intensifying colors that represent the pressures of connection and disconnection. The arrangement balances weight towards the top, highlighting hidden tensions contrasted with exposed warmth at the periphery.</desc>
