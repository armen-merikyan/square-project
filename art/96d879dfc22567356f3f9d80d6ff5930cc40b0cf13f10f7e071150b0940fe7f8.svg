<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Resilience</title>
  <desc id="desc">This piece embodies the tension between vulnerability and strength. The selected palette, 'broken_memory', balances muted sepia, tan, and dust gray with subtle accents of faded blue—suggesting a memory touched by time. The contrast is most pronounced diagonally across the square, where the light and pale interior (representing vulnerability) washes over a stable base of darker tones (representing strength). Broken pixels are scattered throughout, symbolizing the imperfections and fragility of exposure, while the surrounding structure evokes safety. The blend of split screen and ladder patterns reflects a push and pull between emotions, captured within the corner invasion layout.</desc>
