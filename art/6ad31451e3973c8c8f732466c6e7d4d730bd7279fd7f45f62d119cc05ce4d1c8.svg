<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This abstract composition explores the tension between safety and exposure through a vertically split layout, reflecting on emotional contrasts. The left section embodies safety with a soothing palette of shelter green and warm brown, evoking a gentle weight and stability. The right section, in cold white and open blue, represents exposure, filled with bright vulnerability and uncaptured edges. The center remains an intersection of these feelings, where colors collide and intertwine, capturing the essence of pressure and release, and the emotional flow from calm to intensity. Broken pixels are implemented to create intentional disturbances, emphasizing the imperfections that come with both safety and exposure.</desc>
