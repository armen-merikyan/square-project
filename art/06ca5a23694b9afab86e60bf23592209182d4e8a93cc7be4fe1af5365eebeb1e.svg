  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone balances warmth of safety with the cool uncertainty of exposure. The palette includes soft greens and warm browns to invoke shelter and protection, contrasted by a cold white that symbolizes vulnerability. The collision occurs in the center, showcasing a dense cluster of muted colors interrupted by brighter accents on either side, reflecting a braiding of emotional experiences. This grid echoes the ideas of pressure and release, with some pixels broken to symbolize imperfection and disruption.</desc>
