<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This composition juxtaposes the themes of trust (represented by cooler, stable colors) and suspicion (expressed through warmer, chaotic shades). The palette leans towards a vibrant contrast, highlighting the tension between stability (electric blue and static gray) and unpredictability (signal green, hot magenta). A diagonal collision in the center hints at the struggle between these emotional states, breaking down the grid patterns on one side with negative crosses on the other, to suggest an argument or conflict. The layout divides the canvas vertically but allows the colors to interact, symbolizing how trust can be disrupted by suspicion.</desc>
