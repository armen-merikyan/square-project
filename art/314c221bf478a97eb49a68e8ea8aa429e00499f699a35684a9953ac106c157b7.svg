<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Resilience</title>
  <desc id="desc">This piece explores the emotional tension between vulnerability and strength through contrasting colors that convey both exposure and shelter. The selected palette of deep reds and soft pale blues reveals a struggle, with red symbolizing strength and urgency, while pale blue hints at vulnerability and calmness. The main collision occurs in the center, where the warm reds intermingle with the cool blues, suggesting tension but also harmony. Broken pixels scattered throughout symbolize disruptions in this dual nature, creating a patchwork effect that embodies vulnerability within strength. The layout mirrors a fragmented repair, as jagged edges evoke the complexities of emotional experience.</desc>
