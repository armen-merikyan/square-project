<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Release</title>
  <desc id="desc">This composition captures the tension between the themes of quiet and pressure. The palette of off-white, dust gray, compressed red, dark navy, and faint peach evokes a balance of soft and heavy. The dense left diagonal represents pressure with chaotic sparks of red against a dark navy background, while the expansive right side embodies quiet with faint peach broken dots. The jarring collision occurs at the center where the two emotions meet, with broken pixels disturbing the flow, echoing the shattering against the tide. This visual narrative of fading pressure into quiet space reflects the emotional complexity captured in the seed.</desc>
