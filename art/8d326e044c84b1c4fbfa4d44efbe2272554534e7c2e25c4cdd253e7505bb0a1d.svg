<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">This composition reflects the duality of vulnerability and strength through a chaotic interplay of colors. The palette combines cool tones from the 'clarity_confusion' family with a lone 'warning_orange' for tension. The collision occurs at the center, where dense patterns of 'teeth' symbolize strength against the 'stripes' of vulnerability that fade outward, creating a feeling of both pressure and release. The feathered edges allow for a soft transition, while broken pixels introduce intentional imperfections that evoke the emotions of resilience amidst turmoil.</desc>
