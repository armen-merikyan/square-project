<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Currents</title>
  <desc id="desc">This piece explores the emotional terrain between vulnerability and strength. The palette of melancholic hues—blues and soft grays—symbolizes the weight of both states. The use of barcodes and stripe patterns expresses strength as rigid and resilient, while the gentle stripes evoke the fragility of vulnerability. The central collision occurs at the heart of the grid, where strong vertical lines of blue intersperse with softer, flowing edges of lavender and white, depicting tension and movement. Negative spaces represent moments of reflection amidst pressure, inviting viewers to ponder the interplay of emotions.</desc>
