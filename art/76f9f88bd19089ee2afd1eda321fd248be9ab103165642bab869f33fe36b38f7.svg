<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers and Radiance</title>
  <desc id="desc">The emotional tone navigates the tension between vibrant sparks and muted ashes, representing contrasting feelings of vitality and decay. The palette of deep blue, yellow, orange, and muted purple embodies bursts of energy beside gentle shadows. The main collision of colors occurs in the center, where the 'spark' (yellow/orange) collides with the 'ash' (muted purple/gray) creating a vivid tension against the quiet channel of negative space. The abstract patterns of constellation for spark and patchwork for ash display this emotional dichotomy effectively.</desc>
