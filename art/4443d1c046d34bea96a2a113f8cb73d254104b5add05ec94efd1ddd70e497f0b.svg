<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tension</title>
  <desc id="desc">This piece explores the contrasting emotions of envy and gratitude, represented through a palette of muted and vibrant colors. The outer border, darker hues, symbolizes envy—heavy and oppressive—while the inner core uses lighter, dynamic tones that evoke a sense of gratitude and lightness. The zigzag pattern of color shifts creates tension, reflecting the struggle between these feelings, while broken pixels symbolize imperfections and disruption in emotional balance. The interplay between heavy and light placements creates an echo of conflict, where the weight of envy clashes with the uplifting nature of gratitude.</desc>
