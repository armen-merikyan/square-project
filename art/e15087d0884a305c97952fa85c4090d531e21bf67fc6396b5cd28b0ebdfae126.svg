<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition reflects the emotional tension of desire versus emptiness through a dynamic interplay of color. The warm tones of Blood Orange and Hot Coral convey an intense drive, while the grounded presence of Charcoal and Hollow Blue instills a sense of limitation. The conflict manifests visually in the center and edges, where saturated colors intrude into softer spaces, creating disruption yet holding to a structured grid. Broken pixels are used to add intentional scars, denoting the imperfect nature of yearning. This arrangement embodies both the struggle against confinement and the acceptance of quiet spaces.</desc>
