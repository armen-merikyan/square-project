<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Patterns</title>
  <desc id="desc">This composition evokes a visceral emotional tone, contrasting confusion and clarity. The left half embodies clarity with the muted blues (#3F5F8E, #7E9BB3) suggesting calmness and order, juxtaposed against the darker, chaotic right half where the abstract patterns invoke confusion through irregular grids and interruptions in flow. The palette, inspired by 'broken_memory', employs soft and poignant colors to symbolize tumultuous emotions while maintaining a cohesive flow through the center. The broken pixels (#D5D5D5) introduce imperfection, enhancing the intended emotional tension. Overall, this piece embodies the essence of fragmentation and resolution without literal interpretation, evoking personal reflections of turmoil and understanding.</desc>
