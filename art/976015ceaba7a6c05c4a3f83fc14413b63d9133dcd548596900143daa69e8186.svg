<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">The artwork embodies the emotional clash between defiance and submission, using a palette that juxtaposes muted tones with a singular vibrant accent. The deep wine conveys the strength of defiance, while the soft gold serves as a beacon of submission. The central cluster of soft gold in a halo shape reflects bright refusal amid the overwhelming ash gray and deep browns of chaos that dominate the piece. The subtle broken pixels represent the scars of conflict, creating visual tension and dynamic flow, encapsulating the push and pull of emotions involved.</desc>
