<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotions</title>
  <desc id="desc">This artwork embodies the tension between restlessness and peace. Utilizing a palette inspired by 'ancient_fire,' the warm tones like burnt orange and gold push against deeper charcoal hues, portraying a dynamic interplay of warmth and intensity against shadows. The lattice pattern represents the underlying restlessness, with its interruptions and unevenness, while the broken frame brings a sense of quiet and resolution to the piece, demonstrating how chaos can be contained. The main contrast occurs in the center, where the lattice pushes against the serene frame, effectively manifesting the emotional conflict in abstract form.</desc>
