  <title id="title">Tension of Stillness</title>
  <desc id="desc">The emotional tone transitions from a sense of unrest to a soothing calm, represented through the juxtaposition of maze patterns on the left (restlessness) and checker patterns on the right (peace). The palette, inspired by 'gratitude_envy', features vibrant greens and soft creams to evoke both a lively struggle and a serene resolution. The main contrast lies in the center, where the dark olive collides with light tones, visually representing the tension of memory against the flow of motion.</desc>
