<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Shadows and Light</title>
  <desc id="desc">The emotional tone of this artwork embodies the struggle between fear and hope. The dark palette represents fear, while soft gold and pale green introduce elements of hope and light. The composition features a central burst of brighter colors against a darker background, suggesting a radiance struggling to break through. The jagged edges on the left depict the tension and fear, while smoother curves on the right allow for upward movement, indicating hope. The deliberate placement of broken pixels creates an imperfect yet dynamic flow, emphasizing the ongoing battle of emotions and maintaining 10% negative space to highlight this contrast.</desc>
