<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition reflects the emotional tension between rage and calm. The darker tones of black and deep blue symbolize the rage, while pale blue and white represent calmness. The main collision occurs at the center where fiery red and white pixels interrupt the soothing blue background, modeling chaos intruding upon tranquility. The use of 'shatter' and 'braid' patterns creates a dynamic contrast, embodying the conflict of contained emotions bubbling to the surface, shaped by the seed's themes of eroded symmetry and machine emotion.</desc>
