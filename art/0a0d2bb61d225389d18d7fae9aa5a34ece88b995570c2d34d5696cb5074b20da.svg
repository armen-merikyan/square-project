<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This piece captures the emotional dichotomy of love and betrayal through contrasting color patterns. The top half, representing love, is imbued with warm pinks and reds in a striped pattern, suggesting connection and tenderness. The bottom half encompasses the colder, greys and dark maroon hues arranged in a framed pattern, evoking feelings of distance and conflict. The sharp edges juxtaposed with softer, warm tones create a tension that mirrors the emotional struggle inherent in relationships. The slight imperfections throughout, represented by scattered darker pixels, immerse the viewer in a narrative of flawed beauty.</desc>
