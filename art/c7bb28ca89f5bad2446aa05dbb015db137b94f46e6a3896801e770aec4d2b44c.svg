<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Edge of Tension</title>
  <desc id="desc">This artwork explores the dichotomy of vulnerability and strength through contrasting hues and textures. The warm coral and soft amber evoke a sense of vulnerability, creating an inviting yet exposed center. In contrast, cold slate and blue-black edges impart strength and stability, forming a protective barrier. The palette suggests emotional highs and lows, while the layout features a 'small dense island' (the warm colors) immersed in a 'larger field' (the cooler colors) to symbolize internal struggle and external pressure. Broken pixels disrupt symmetry, representing the chaotic nature of personal growth and external conflicts.</desc>
