  <title id="title">Internal Oscillation</title>
  <desc id="desc">The artwork captures the tension between restlessness and peace, reflecting the ebb and flow of memory and motion. A palette of warm and cool tones contrasts the deep, muted presence of #5B3B3A (warm shadow) against the lighter, soothing #C4B6D4 (distant lilac), embodying conflict and tranquility. The dominant colors create a denser feel around the center, indicating emotional pressure, while broken pixels intermittently disrupt the expected order, resembling the unpredictable nature of thoughts and memories battling for attention. The spiral layout emphasizes movement and convergence, twisting towards a quiet center, symbolizing the constant negotiation between chaos and calm.</desc>
