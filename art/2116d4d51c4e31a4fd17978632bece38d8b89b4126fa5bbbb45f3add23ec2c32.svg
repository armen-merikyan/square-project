  <title id="title">Chaos and Clarity</title>
  <desc id="desc">This artwork represents the emotional tug-of-war between joy and grief, captured through a stark contrast of colors and patterns. The upper four rows embody the joy with a maze-like arrangement using yellows and oranges, which exude warmth and expansion. The lower rows delve into grief, featuring cooler tones of deep blue and muted purple in a cracked pattern, symbolizing fractures and heaviness. The visual tension arises from the zigzag flow, where bright colors clash against darker hues, creating a dynamic yet contemplative space that reflects the dualities of emotion and existence.</desc>
