<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Balance</title>
  <desc id="desc">The emotional tone is a dance between defiance and submission, symbolized through tense color contrasts. The palette, derived from 'fear_hope', employs black and dark violet to evoke a sense of struggle, while soft gold and pale green introduce a touch of hope or resolution. The main contrast occurs at the vertical split, which symbolizes a collision of emotions, capturing the weight of the bottom against the lightness of the top. The arrangement is intentionally broken and layered to reflect tension and release, where the patterns of 'flame' for both emotions create an unsettled rhythm, indicating strife yet signaling potential harmony.</desc>
