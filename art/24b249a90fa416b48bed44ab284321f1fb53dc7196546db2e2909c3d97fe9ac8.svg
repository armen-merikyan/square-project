<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The artwork embodies the emotional duality of panic versus control through the interplay of dark and light colors. The chosen palette—red, black, pale blue, and white—reflects tension and calm, with red and black representing chaos and panic while pale blue and white convey a sense of order and control. The pattern suggests a zigzag of emotions, rising with control and falling into the chaos of panic, creating an unresolved tension. The negative space remaining allows for breathability, emphasizing the ongoing struggle between the two feelings.</desc>
