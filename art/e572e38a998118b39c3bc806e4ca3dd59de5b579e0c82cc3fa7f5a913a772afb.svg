<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotions</title>
  <desc id="desc">This artwork explores the emotional tension between joy and grief, using a palette of warm yellows and deep blues to evoke these contrasting feelings. The arrangement creates a visual split, mirroring the conflict between stability and chaos. The colors are juxtaposed sharply at the center, reflecting the clash of emotions, while broken pixels add an element of imperfection, suggesting the complexities of human experience. The flow from bottom to top mirrors resilience, where brighter hues ripple upward, like sparks of joy, amidst the muted blues that represent grief.</desc>
