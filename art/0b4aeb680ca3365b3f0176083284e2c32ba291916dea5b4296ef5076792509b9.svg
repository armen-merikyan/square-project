  <title id="title">Symmetry vs Break</title>
  <desc id="desc">This artwork embodies a tension between awe and terror through contrasting color patterns. The left side employs a warm, inviting palette of soft pinks and reds, suggesting feelings of wonder and connection. The right side disrupts this warmth with jagged, scattered gray and dark maroon dots that evoke a sense of brokenness and chaos. The vertical split lays bare this dichotomy, while the soft edges of the warm colors meet the fractured geometric shapes, creating an unsettling yet intriguing balance between stability and instability.</desc>
