<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This piece captures the emotional conflict of restlessness against the calm of peace, depicted through contrasting color fields and patterns. The chosen palette consists of warm ivory and soft gold as a gentle base, symbolizing peace, and deep wine and ash gray for the layers of tension. The main collision occurs in the center, where restless stripes disrupt the softer fault line pattern, representing how memory (the past) interrupts the calm of the present. Broken pixels scattered throughout add to the imperfect nature of memory and experience, enforcing the theme of emotional turbulence.</desc>
