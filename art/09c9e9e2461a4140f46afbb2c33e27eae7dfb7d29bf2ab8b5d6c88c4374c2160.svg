<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This composition encapsulates the tension between love and betrayal through contrasting colors and patterns. The chosen palette of warm pinks and deep dark maroons evokes warmth and intimacy while also depicting the sharp pain of betrayal. The contrast manifests between lighter hues representing love and darker shades illustrating betrayal, creating an emotional collision at the center. The chosen patterns—stairs and dots—suggest the upward movement of 'love' paired with the static pressure of ‘betrayal’. This structure evokes a narrative of a conflicted inner room, where sharp and soft collides against a backdrop of noise, employing broken pixel effects to symbolize imperfections and emotional rawness.</desc>
