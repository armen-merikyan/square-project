<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition reflects the emotional tension between vulnerability and strength. The chosen palette of black, dark violet, soft gold, and pale green symbolizes hope and fear—creating contrast through dark and light. The main collision occurs in the top-left corner where dark violet and soft gold clash, representing the struggle of pressure within vulnerability against a framework of strength. The patterns of crosshatch and negative cross form an abstract rhythm that intertwines, suggesting an emotional braid, yet leaving ample negative space to represent emptiness and desire. The overall layout emphasizes a dynamic interplay of density and openness, aligning with the seed's themes of exposure and shelter.</desc>
