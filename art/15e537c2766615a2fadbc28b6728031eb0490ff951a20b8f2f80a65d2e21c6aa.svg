<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Emotion</title>
  <desc id="desc">This composition captures the tension between softness and severity while creating a dynamic interplay of light and dark. The palette combines powder pink and warm white to symbolize softness, contrasted by deep carbon black and steel gray representing severity. The central collision occurs in the middle of the square, where lighter colors pulse against darker patches, creating an emotional heartbeat against a backdrop of structured order, hinting at the tension between freedom and control. The edge style is sealed to suggest moments of closure while being slightly broken to acknowledge imperfections, reflecting the emotional landscape of guilt and forgiveness.</desc>
