<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">The Weight of Gratitude</title>
  <desc id="desc">The emotional tone explores the tension between envy and gratitude through contrasting colors and placement. A dark background represents envy while lighter colors symbolizing gratitude rise from the edges, creating a soft glow towards the center. This layout draws the eye inward, reflecting the flow of gratitude emerging from an otherwise empty, dark space. Juxtaposed colors embody the struggle—dark violet clashing against soft gold illustrates the competition between these feelings, as moments of hopeful light peek through the dense darkness, enhancing the tension of unresolved emotion.</desc>
