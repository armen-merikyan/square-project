<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse in Static</title>
  <desc id="desc">This composition expresses the emotional tension between clarity and chaos. The palette features deep navy and black to invoke a sense of isolation and noise, with the dim cyan acting as the accent signal, creating a pulsing element amid the dark. The layout, inspired by a spiral pressure, introduces a dominant cluster of noise in the corners, contrasted by a clear path of signal in the center, symbolizing the struggle to maintain clarity amid disruption. The use of broken pixels provides an intentional imperfection, echoing the theme of memory versus erasure.</desc>
