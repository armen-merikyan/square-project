<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Signals</title>
  <desc id="desc">The emotional tone captures the tension between clarity (the signal) and chaos (the noise). The palette features dark navy, black, and dim cyan, reflecting the depth and isolation of the signal amidst static. The main contrast resides in the overfilled corner, where dark colors collide with a bright, radial burst of white, emulating a 'pulse' against a backdrop of static patterns. This arrangement suggests disruption, memory, and the struggle for clarity within noise, representing the core themes of the seed.</desc>
