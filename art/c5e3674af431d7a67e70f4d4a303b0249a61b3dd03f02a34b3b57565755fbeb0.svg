<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Trust</title>
  <desc id="desc">The composition embodies the tension between trust (soft cyan, moon white) and suspicion (lavender gray, muted plum). The color palette evokes melancholy wonder, creating a contrast where the soft glow interacts with the darker shadows, presenting a push-pull effect. Central rows exhibit a collision of these emotions, with gentle blends on one side representing trust and fragmented sections on the other depicting suspicion. The 'broken pixels' add imperfection and depth, echoing the theme of resilience amidst fragility, while maintaining negative space to allow for breathability in a dense emotional landscape.</desc>
