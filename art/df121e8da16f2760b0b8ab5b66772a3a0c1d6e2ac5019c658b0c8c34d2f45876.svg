<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolution</title>
  <desc id="desc">This artwork captures the emotional tension between longing and resolve, embodying a narrative of transition and movement. The palette—comprised of pale aqua for serenity, mist gray for quiet reflection, alarm red to inject urgency, ink blue for depth, and clear white to emphasize boundaries—fits the contrasting emotions perfectly. The pattern uses broken frames to signify longing, hence it occupies around 65% of the space, while hinge shapes interrupt against it representing resolve. The main collision occurs in the bottom-left corner, where the density of colors suggests pressure, while the rest of the piece transitions into quiet negative space, echoing a sense of unresolved tension.</desc>
