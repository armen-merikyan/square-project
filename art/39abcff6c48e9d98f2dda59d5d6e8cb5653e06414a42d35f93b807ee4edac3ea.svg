<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone is anchored in the tension between desire (represented by vivid, warm colors) and emptiness (expressed through subdued, cool tones). The palette of hot coral and blood orange conveys urgency and yearning, while charcoal and hollow blue establish distant, quiet spaces. The main collision occurs in the center, where an intense visual rhythm of desire interrupts the calmer ash_field pattern representing emptiness. The layout, with the outer border asserting restraint, allows inner desire to spiral upward, creating a dynamic visual hierarchy that evokes longing and containment at once.</desc>
