<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasts of Heart</title>
  <desc id="desc">This piece captures the emotional dichotomy of love and betrayal through a carefully chosen palette of warm and muted tones. The interplay between reds and grays signifies a tension between warmth (love) and coldness (betrayal). The structure suggests a mirrored image, broken by sharp contrasts and soft gradients, evoking a sense of loss amid warmth. The diagonal rise contributes to a feeling of hope struggling against decay, embodying the complex emotions in the seed.</desc>
