<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Shelter and Exposure</title>
  <desc id="desc">This artwork embodies the emotional contrast of strength and vulnerability. The palette, inspired by 'ancient_fire' with burnt orange, dark red, and gold, symbolizes warmth and energy but also danger. The juxtaposition of the strong blocky patterns (crosshatch) and the soft, interwoven designs (braid) creates a striking visual tension where the center, representing vulnerability, is under attack by the surrounding edges of strength. Broken pixels scatter throughout to introduce intentional imperfections, reflecting scars of exposure within a mostly dark framework. The main collision occurs at the center, creating a visual narrative of conflict and protection.</desc>
