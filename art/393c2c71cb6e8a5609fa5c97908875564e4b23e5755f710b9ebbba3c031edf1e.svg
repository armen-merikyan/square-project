  <title id="title">Duality in Flux</title>
  <desc id="desc">This composition captures the emotional tension between joy and grief through a warm vs. cool contrast. The upper rows are filled with bright yellows and oranges to symbolize joy, while the lower rows feature muted purples and deep blues that evoke grief. The transition creates a visual wave pattern that suggests movement and conflict, portraying the struggle of hidden depths versus exposed heights. The use of a noise pattern for joy and a checker pattern for grief complements this emotional clash, echoing the fire of joy against the grays of grief.</desc>
