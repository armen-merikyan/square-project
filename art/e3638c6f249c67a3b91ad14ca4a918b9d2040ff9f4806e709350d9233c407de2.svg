<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Contrast</title>
  <desc id="desc">This artwork explores the emotional dichotomy of 'relief' and 'dread' through a carefully balanced palette and arrangement. The use of lime (relief) juxtaposed with black (dread) creates a visceral contrast, emphasizing the struggle between lightness and heaviness in emotional landscapes. The top-to-bottom gradient suggests an overwhelming pressure from above, while the split vertical layout captures the tension between the two states. The left side embraces the soothing rhythm of dotted patterns, reflecting relief, while the right side is sharply interrupted with dark stripes, symbolizing dread. Broken pixels on the edges contribute unpredictability, underscoring that relief may often be interrupted or overshadowed by dread.</desc>
