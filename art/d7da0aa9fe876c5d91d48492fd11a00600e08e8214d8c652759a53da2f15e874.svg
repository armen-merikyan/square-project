<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition reflects the emotional tension between defiance and submission through a carefully curated palette of contrasting colors. The use of carbon black and sharp crimson brings a sharp intensity, symbolizing defiance, while soft shades like powder pink and warm white suggest a submission that recedes. The collision occurs mainly at the center, which represents a strong angular resistance against the softness of the edges. The broken pixels introduce an element of unpredictability, echoing the chaos amid order in the layout. This spiral pressure layout guides the eyes inward, creating an emotional narrative of struggle and vulnerability.</desc>
