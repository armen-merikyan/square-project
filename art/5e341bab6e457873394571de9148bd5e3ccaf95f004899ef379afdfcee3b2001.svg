<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Flicker of Clarity in Static</title>
  <desc id="desc">This piece captures the emotional tension between signal and noise, using a palette that contrasts dark navy with bright white, and muted dim cyan. The arrangement facilitates a descent resembling falling rain, suggesting exposure. The brighter edges reflect clarity while the darker tones occupy the majority, embodying noise. This highlights a central pulse of clarity amidst a chaotic backdrop. Broken pixels create intentional scars, symbolizing memory and erasure, making the noise more palpable. The collision of stillness and activity creates a story of resilience against interference.</desc>
