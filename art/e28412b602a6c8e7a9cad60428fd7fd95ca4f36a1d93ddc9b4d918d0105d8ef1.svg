<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Light and Weight</title>
  <desc id="desc">This artwork explores the tension between vulnerability and strength. The palette, predominantly dark with central bright accents, represents the strength found within vulnerability, while the dusting of lighter hues suggests an exposed fragility. The central dense area symbolizes strength, contrasted by the surrounding layers of muted colors portraying the weight of vulnerability. Broken pixels add imperfections, signifying the inevitable disruptions in the interplay of emotions. The overall flow from right to left represents a potential shift in balance between safety and exposure.</desc>
