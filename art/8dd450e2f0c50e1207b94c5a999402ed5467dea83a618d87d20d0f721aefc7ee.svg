<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Encased</title>
  <desc id="desc">This piece encapsulates the emotional tension between defiance and submission. The dominant colors—vivid lime and electric blue—represent defiance, erupting into the muted blacks and magentas of submission. The grid structure plays into the idea of constraint and release, where the bright central block of lime and electric blue asserts its presence while the muted edges represent the encroaching weight of submission. The broken pixels in select rows add imperfection, symbolizing the unresolved nature of this emotional struggle. The primary collision occurs along the diagonal, emphasizing the push and pull of these conflicting forces in a visually dynamic way, creating an abstract pattern that echoes the nuances of the seed.</desc>
