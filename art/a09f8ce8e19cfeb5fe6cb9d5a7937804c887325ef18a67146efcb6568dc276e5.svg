<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition embodies the emotional dichotomy of rage and calm, with bright red pixels intruding upon cooler pale blue fields. The chosen palette reflects contrasting moods: the deep blacks symbolize containment while the reds suggest explosive energy. The play between static rage and horizontal calm creates rhythmic barriers, suggesting emotional tension where reds collide with blues, primarily at the center. The 'broken_frame' layout intentionally allows for gaps, representing the leaks of emotion. The 'barcode' calm pattern and 'static' rage pattern visually disrupt each other, generating an experience of conflict and harmony. Additionally, broken pixels enhance this tension by creating intentional imperfections.</desc>
