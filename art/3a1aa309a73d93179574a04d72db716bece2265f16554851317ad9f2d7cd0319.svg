<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece represents the struggle between desire and emptiness. The palette, including warm hues like hot coral and blood orange, symbolizes the pull of desire, while damp tones like charcoal and hollow blue represent emptiness. The movement begins in the corner, suggesting desire's invasion, while the contrasting colors collide and create tension in the center, encapsulated by a border reflecting containment. The use of broken pixels emphasizes imperfection and the chaotic nature of yearning against barriers. The negative space allows for a reflective moment, enhancing the clash between saturated and desaturated areas, echoing the emotional complexities of yearning against restraint.</desc>
