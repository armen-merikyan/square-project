<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Spiral Pressure</title>
  <desc id="desc">This composition explores the emotional tension between tenderness and rage through a spiral layout. The palette of saturated reds contrasts sharply with muted pale blues and blacks, creating a dynamic interplay of soft warmth against explosive pressure. The broken pixels disrupt the flow, symbolizing emotional scars and collisions of feeling. The main focus of this piece lies at the center, where the gentle overlaps of the tender patterns collide with jagged, cracked edges associated with rage, illustrating a struggle between vulnerability and aggression.</desc>
