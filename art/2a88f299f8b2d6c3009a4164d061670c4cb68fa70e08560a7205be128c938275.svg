<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Opposites</title>
  <desc id="desc">This piece embodies the tension between softness and fury, with a palette of deep red symbolizing rage contrasting against pale blue and black, hinting at a sense of calm and gentleness. The grid-like anchoring of lighter colors ebbs and flows with jagged, twisted forms of red, creating a dynamic that feels both dense and releasing. The central collision highlights the struggle of emotions with warm tones sizzling against cooler fields. The interactions suggest a dance between forgiveness and guilt under a starry chaos, allowing a glimpse into a fractured constellation of feelings.</desc>
