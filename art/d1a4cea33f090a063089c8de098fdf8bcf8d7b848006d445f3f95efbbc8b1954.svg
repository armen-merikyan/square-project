<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This artwork represents the tension between calm and rage through its color palette and arrangement. The primary clash occurs in the center, where dynamic reds (symbolizing rage) overlap with soothing pale blue markings (representing calm). The chosen palette includes stark contrasts of warm red, cool pale blue, intense black, and clean white. The diagonal flow mimics both the quiet and chaotic aspects, while broken pixels serve as intentional disruptions, signifying the emotional scars of such a collision, reinforced by the hollow center that echoes the layout concept of 'halo_void.' The overall arrangement suggests a struggle for containment amidst an outpouring of emotion.</desc>
