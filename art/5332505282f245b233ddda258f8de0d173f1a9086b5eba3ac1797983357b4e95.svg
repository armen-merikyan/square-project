<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece embodies the emotional battle between desire and restraint, with saturated colors representing desire contrasting against muted colors symbolizing restraint. The palette combines deep reds and soft grays to enhance this tension. The main collision occurs in the top-left corner, where vibrant reds meet more muted tones, creating a sense of pressure that radiates outward. The stepwell pattern encroaches upon the broken frame, allowing for a visual echo of conflict, inviting the eye to travel around and explore the intersection of these emotional states. The design intentionally leaves negative space to suggest the weight of locked emotions, allowing for reflection on the push-pull dynamic implied by the seed.</desc>
