<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This piece conveys an emotional tension between desire and emptiness. The vibrant palette features hot coral and blood orange to illustrate desire, contrasting against the muted dust pink and charcoal that evoke feelings of emptiness. The chaotic interplay of colors in a spiral pattern introduces a dynamic collision in the center, representing the struggle between overflowing desire and contained emptiness, while quiet spaces surround this central chaos, allowing for reflection and the feeling of pressure against the edges.</desc>
