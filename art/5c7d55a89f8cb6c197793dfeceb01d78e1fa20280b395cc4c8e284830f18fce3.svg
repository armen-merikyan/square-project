<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Halo of Contrasts</title>
  <desc id="desc">This composition embodies the tension between defiance and submission through a contrast of light and dark. The palette of black, dark violet, soft gold, and pale green illustrates hope against fear, where soft gold represents submission’s quiet allure and dark violet symbolizes defiance's boldness. A primary collision occurs in the center, where the gold disrupts a gradient of blacks and violets, echoing a struggle between upward movement (defiance) and downward pull (submission). The use of broken pixels adds intentional disruptions, creating a dynamic visual rhythm that conveys tension and resolution.</desc>
