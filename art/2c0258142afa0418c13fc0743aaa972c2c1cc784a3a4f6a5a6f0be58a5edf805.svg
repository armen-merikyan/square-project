<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork explores the interplay between vulnerability and strength, using a split vertical layout to depict these contrasting emotions. The left side embraces vulnerability with glitchy textures in soft colors, while the right side conveys strength through a constellation pattern in deeper tones. The juxtaposition of muted purples and oranges with deep blue creates tension and a pulse-like flow, guiding the viewer's eye from the exposed center to the protective edges. Broken pixels introduce intentional imperfections, symbolizing the fractures in both vulnerability and strength. The entire piece invites reflection on the balance between safety and exposure.</desc>
