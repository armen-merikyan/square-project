<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Waves of Emotion</title>
  <desc id="desc">This artwork embodies the tension between joy and grief using a palette of yellow and deep blue, representing warmth and heaviness, respectively. The left side features warmer yellows and oranges, evoking joy through expanding patterns of dots. In contrast, the right side employs blue tones arranged in a denser, more clustered format, suggesting grief through repetition and pressure. The broken edges on both sides signify the imperfection inherent in these emotions. The central wave-like pattern creates a visual interaction, making it a scene of emotional conflict and resonance.</desc>
