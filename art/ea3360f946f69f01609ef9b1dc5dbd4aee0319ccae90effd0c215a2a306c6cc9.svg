  <title id="title">Center of Tension</title>
  <desc id="desc">This piece represents the emotional duality of fear and hope, with a split vertical layout accentuating the contrast. The left side evokes fear through dark colors and jagged patterns, using deep blacks and dark violets to build a dense atmosphere. The right side symbolizes hope with lighter tones of soft gold and pale green in a crosshatch pattern, suggesting uplift and possibility. The glowing edges around the central division create tension, emphasizing the conflict between lightness and heaviness, reinforcing the emotional interplay implied in the seed.</desc>
