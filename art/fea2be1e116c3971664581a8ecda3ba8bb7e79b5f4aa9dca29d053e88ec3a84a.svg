<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Resilience</title>
  <desc id="desc">This piece embodies the tension between the muted tones of ash and the vibrant sparks of life. The palette includes 'shelter_green' and 'warm_brown' to emphasize the grounding qualities of memory, while 'open_blue' and 'cold_white' reflect the aspirational aspects of resilience. The main contrast occurs diagonally, with an interruption in the flow—representing how memories may resurface while one seeks to move forward. The jagged patterns of ash collide with the grid-like spark pattern, suggesting an ongoing struggle between movements of stagnation and bursts of energy, reflective of life's complex balance between restraint and hunger.</desc>
