<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Reclamation</title>
  <desc id="desc">This composition embodies the emotional duality of longing and resolve through contrasting patterns and color placements. The left side represents longing with soft green and warm tones in striped patterns, suggesting an intense reach towards connection. In contrast, the right side depicts resolve through a halo effect with cool whites and structured blue, creating a sense of calm and containment. The muted backdrop hints at distance and quiet, while strategic placements of broken pixels symbolize moments of disruption in the quest for balance. The interplay of tension between the sides encapsulates an emotional narrative of yearning met with strength.</desc>
