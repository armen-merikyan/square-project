<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaotic Renewal</title>
  <desc id="desc">This piece explores the tension between certainty and curiosity, with a color palette reflecting a mourning yet renewing quality. The deeper blacks and blues signify the weight of certainty, while pops of pale yellow and green introduce curiosity. The upward movement of darker hues collides with lighter accents, symbolizing the struggle of rising signals against chaos. The main contrast lies in the top left corner, where dark and light meet, creating an emotional rupture that leads the viewer’s eye across the grid.</desc>
