  <title id="title">Emotional Collision</title>
  <desc id="desc">This composition explores the tension between envy and gratitude, visualizing an emotional argument through contrasting patterns. The palette of lime, black, electric blue, and magenta symbolizes vibrant feelings while also suggesting depth and shadow. The central pattern, portraying rising versus falling, collides with softer edges, creating an area of tension that hints at both noise and calm. The arrangement captures a dynamic of control shifting from the center to the edges, invoking feelings of vulnerability and strength as it oscillates between softness and pressure.</desc>
