  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone captures the struggle and interplay between tenderness and rage, rendered in contrasting soft and sharp colors. The palette of black, pale blue, and white embodies a turbulent duality—where deep saturation meets muted fields—symbolizing both the calm and the storm. The collision occurs centrally with jagged pixels of black disrupting the soft blue horizon, echoing the inner conflict suggested by the seed. This design highlights an exposed center, evoking a sense of vulnerability amid protection, immersed in emotional tension and flow.</desc>
