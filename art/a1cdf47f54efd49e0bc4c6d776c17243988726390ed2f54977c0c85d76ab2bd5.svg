<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Against Restraint</title>
  <desc id="desc">This composition embodies the emotional tension between tenderness and rage by juxtaposing deep saturated reds against the muted and soft pale blues. The pattern reflects a diagonal flow from bottom left to top right, with the rage colors dominating the lower half, erupting into softer, haloed colors as they diffuse into the upper region, suggesting a constant struggle between chaotic emotion and serene calm. Disrupted pixels introduce intentional imperfections, echoing guilt and forgiveness throughout. The interplay of colors allows for an exploration of intensity versus subtlety, while the arranged chaos maintains legibility within the square.</desc>
