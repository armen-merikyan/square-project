<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Flicker of Resilience</title>
  <desc id="desc">This artwork captures the tension between vibrant sparks of life and the muted tones of ash through a striking contrast of colors. The palette combines deep blacks and bright whites with pale blues, representing both the exhaustion of restraint and the suddenness of vitality. The central clash of color creates a jagged edge, signifying the ongoing struggle between memory (the soft blue and white) and erasure (the dark hues). The arrangement allows for a balance of density and quiet space, with broken pixels acting as intentional disruptions in the otherwise structured flow, echoing the theme of resilience amidst fragility.</desc>
