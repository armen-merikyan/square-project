<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone contrasts the warmth of joy against the heaviness of grief. The selected palette of bright yellow and muted purple reflects this dichotomy, where joy is represented in a mirror-like repetition in the upper half and grief in a more fragmented frame in the lower. The main collision occurs at the center where jagged edges of dark blue interrupt the brightness, symbolizing the chaos within emotions. This arrangement captures the tension of rising signals disrupted by the shadows of grief.</desc>
