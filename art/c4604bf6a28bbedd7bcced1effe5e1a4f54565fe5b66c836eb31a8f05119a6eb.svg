<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This composition explores the tension between envy and gratitude, contrasting dense black and dark reds representing envy with lighter burnt oranges and soft golds signifying gratitude. The split layout emphasizes this emotional dichotomy, where the left has a steeper gradient and rhythmic ‘stairs’ pattern showing the sharp pressures of envy, juxtaposed against the softer edges and negative space on the right portraying the gentleness of gratitude. The slight imperfections introduce unrest into the symmetry, suggesting unresolved emotional themes.</desc>
