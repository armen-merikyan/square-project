<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Fracture</title>
  <desc id="desc">This composition explores the emotional dichotomy of confusion and clarity through a carefully structured layout. The top half represents clarity with vibrant shades of pink and red, arranged in a maze-like pattern that induces a sense of order and direction. The bottom half portrays confusion with overlapping target patterns in duller gray and dark maroon hues, suggesting intrusion and disorder. The jagged edges introduce a visual break, highlighting the contrast of a nearly mirrored image disrupted. The pulse-like rhythm is reflected by the arrangement where colors collide, creating an echoing tension beneath the surface, perfect for conveying emotional complexity.</desc>
