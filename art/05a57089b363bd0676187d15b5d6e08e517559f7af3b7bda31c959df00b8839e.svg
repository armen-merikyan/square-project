<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Edges</title>
  <desc id="desc">This composition captures the emotional conflict of defiance against submission through sharp contrasts and textured patterns. The palette, with warm clay and distant lilac, evokes intimacy, while cool blue and lamp gold introduce tension. The collision occurs where the dark corner transitions into soft, warm hues, suggesting the struggle between resilience and vulnerability. The pattern types, 'tide' for defiance and 'islands' for submission, intertwine, symbolizing the push and pull of the central theme.</desc>
