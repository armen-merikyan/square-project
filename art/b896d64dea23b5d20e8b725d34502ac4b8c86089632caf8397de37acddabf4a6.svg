<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensions of Ascent</title>
  <desc id="desc">This composition captures the emotional struggle between defiance (left) and submission (right), using contrasting color techniques to explore lightness and weight. The palette of muted purples and deep blues creates a sense of depth, while the bursts of yellow and orange evoke a feeling of tension and energy. The left side employs a maze pattern representing defiance with irregular, upward motions, while the right side uses stairs to signify submission and a smooth, downward pull. The central area represents a conflict, a meeting point of these opposing tensions, giving rise to an abstract narrative of emotional collision.</desc>
