<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Balance</title>
  <desc id="desc">The artwork explores the tension between vulnerability and strength through a palette emphasizing light and dark contrasts. The soft mint and faded gold symbolize warmth and hope amid emotional turmoil, while storm gray and near black introduce a weighty, protective element. The central area features a narrow path of negative space signifying exposure, contrasting the dense flow of colors around it. The collision of ‘pulse marks’ and ‘noise’ patterns creates an echo of fragile resilience against a backdrop of consuming density, evoking the emotional duality embedded in the seed.</desc>
