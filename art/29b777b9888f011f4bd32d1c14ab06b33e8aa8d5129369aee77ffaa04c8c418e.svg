<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This piece explores the emotional contrast between restlessness and peace. The chosen palette of pale aqua, mist gray, alarm red, ink blue, and clear white reflects a balance of calm and urgency. The composition features a diagonal collision, where the calmness of pale aqua and mist gray creates a serene field on one side, while the vivid alarm red and deep ink blue pulse with unrest on the other. The broken pixels introduce intentional disruptions, mirroring the chaotic movement and fleeting memories that tug against stillness. The artwork captures the dynamic tension between tranquility and emotional upheaval, inviting viewers to reflect on their own experiences of peace interrupted by restless thoughts.</desc>
