<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone is a contrast between safety (warm enclosure) and exposure (uncovered edge). I chose a palette reflecting this duality: soft greens and browns evoke warmth against the coolness of pale skin and open blue. The main collision of color occurs towards the center, where the noise of exposure (blue and pale) meets the grounding lattice of safety (green and brown). This pattern reflects the complexity of navigating vulnerability and protection through a spiral flow, emphasizing tension and release.</desc>
