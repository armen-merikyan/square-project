<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Mirrored Uncertainty</title>
  <desc id="desc">This piece embodies the tension between trust and suspicion through contrasting colors and patterns. The palette derives from deep olive and honey gold, representing grounded trust, while the accents of ripe green and acid green introduce a whisper of suspicion. The main collision occurs at the center, where ordered 'stepwell' patterns of trust meet the chaotic 'echo' of suspicion, creating a flickering visual tension that evokes both comfort and unease. The defined outline adds a sense of border pressure, emphasizing emotional boundaries while retaining quiet spaces for breath and interpretation.</desc>
