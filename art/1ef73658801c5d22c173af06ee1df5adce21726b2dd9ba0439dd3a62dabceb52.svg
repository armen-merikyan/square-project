<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Climbing Through Dissonance</title>
  <desc id="desc">This piece captures the emotional tension between longing and resolve, using a palette of cool and warm tones to highlight the struggle. The left side is dominated by deep blues and blacks, representing longing with a 'flame' pattern signifying flickers of hope and desire. The right side is brighter, with whites and oranges illustrating a sense of resolve and clarity, reflecting steady ambition. The main contrast collides in the center, where the 'flame' disrupts the structured 'mirror' pattern, creating a visual dialogue between chaos and order. The intentional broken pixels introduce an element of imperfection and a nod to the fractures in our emotions, creating depth in the abstract story.</desc>
