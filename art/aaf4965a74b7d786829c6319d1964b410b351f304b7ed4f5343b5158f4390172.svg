<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Contrasts</title>
  <desc id="desc">The emotional tone reflects the struggle between defiance, symbolized by deep, dark hues, and submission, embodied by lighter, muted shades. Using a palette of sepia, tan, dust gray, and faded blue, the contrast reveals the interaction of emotions—heavy darks on the left opposing soft, light colors on the right. The jagged edges represent interruptions in flow, while crosshatch and rain patterns convey the dynamics of pressure and release. The bottom-weighted layout emphasizes a lingering weight, promoting the idea of unresolved tension between the top (submissive) and bottom (defiant) halves, courtesy of the seed's themes.</desc>
