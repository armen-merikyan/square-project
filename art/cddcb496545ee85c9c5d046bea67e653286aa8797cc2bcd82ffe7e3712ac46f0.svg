<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">The emotional tone of this piece contrasts the gentleness of softness against the harshness of severity. Using a palette of muted tones like carbon black and steel gray juxtaposed with warm whites and powder pinks enhances the delicate tension between calm and pressure. The main collision occurs in the center, where the stark black abruptly interrupts the powder pink, suggesting a battle between order and chaos. This dynamic reflects the seed's themes of signals, noise, and the weight of emotional duality. Small disruptions throughout the grid echo imperfections, while the negative spaces invoke an air of introspection.</desc>
