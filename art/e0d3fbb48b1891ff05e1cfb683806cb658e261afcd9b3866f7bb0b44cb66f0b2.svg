<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This artwork captures the emotional tension between safety and exposure. The top four rows represent 'safety' with warm browns and soft greens, conveying a protective sensation. The bottom four rows embody 'exposure', dominated by cool whites and pale hues, suggesting a vulnerability. The main contrast occurs at the horizontal split, where the warm, soft edges of the protective palette collide with the sharp, cold aspects of the exposed colors. Broken pixels disrupt the flow, reflecting the imperfections of life and the struggle between comfort and exposure. Overall, this composition conveys a narrative of tension between these two emotional states through its contrasting colors, layered patterns, and deliberate imperfections.</desc>
