<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Conflict</title>
  <desc id="desc">This artwork captures the emotional tension between defiance and submission through color and form. A palette rooted in sepia tones and muted blues reflects the complexities of memory — warm versus cool. The left side symbolizes defiance with interwoven braids of darker colors, showcasing strength and interruption, whereas the right side, composed of subtle stripes in lighter hues, suggests a soft collapse and a quiet retreat. The main collision occurs in the center, where the dense patterns clash, creating a textured interplay of emotion. The edges are veiled with lighter shades, emphasizing the boundary between the two contrasting emotional states.</desc>
