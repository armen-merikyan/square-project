<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Presence</title>
  <desc id="desc">This artwork explores the emotional contrast between longing and resolve. The palette features vibrant accents of signal green and electric blue juxtaposed against static gray and dead black, representing the collision of optimism and void. The background maintains a quiet field, allowing bright colors to resonate. The main collision manifests through bold checker patterns clashing with flame-like swirls, symbolizing the struggle between orderly resolve and chaotic longing. The spiral pressure layout emphasizes motion towards an off-center point, mirroring the tension within the emotional theme.</desc>
