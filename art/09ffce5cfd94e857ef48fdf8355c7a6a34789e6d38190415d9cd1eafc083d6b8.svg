<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light Against Weight</title>
  <desc id="desc">The emotional tone explores the tension between panic and control. The palette of lime, black, electric blue, and magenta is chosen to signify vibrancy (control) contrasted with the depth of black (panic). The arrangement creates a feeling of rising upward energy battling downward weight, revealing a spark (lime) amidst dark tension. Broken pixels are scattered to symbolize imperfection and chaos, while the overall structure relays a sense of vertical aspiration against a backdrop of unstable darkness.</desc>
