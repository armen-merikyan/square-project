<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Pulses</title>
  <desc id="desc">This composition captures the tension between vulnerability and strength through a contrasting palette of deep blues and pale yellows. The center of the grid embodies vulnerability with a soft lattice of pale yellow, while the surrounding edges display a structured patchwork of dark hues, representing strength. The main collision occurs around the central pixels, where the two emotional tones blend and interrupt one another, evoking a sense of both protection and openness. The negative space has been kept intentionally minimal to enhance the feeling of exposure while maintaining balance in the composition.</desc>
