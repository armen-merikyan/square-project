<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order Against Chaos</title>
  <desc id="desc">This composition embodies the emotional tension of 'panic vs control' through distinct patterns and colors. The top four rows utilize a checker pattern in warm colors, representing control with muted burnt oranges and dark reds, suggesting a structured but oppressive atmosphere. In contrast, the bottom four rows implement a chaotic grid in cooler dark hues, creating a sense of instability and fragmentation. The edge style is bottom-weighted, visually grounding the chaos underneath the orderly top. The juxtaposition of the structured warmth against the fractured coolness encapsulates the emotional dissonance defined by the seed.</desc>
