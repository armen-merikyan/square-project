<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition explores the emotional tension between safety and exposure. The left side is dominated by a warm brown and shelter green palette evoking comfort and protection, while the right side features open blue and pale skin hues, suggesting vulnerability and openness. The use of a split vertical layout reflects the theme of dichotomy, with the main collision occurring at the center where the warm barrier meets the cool exposure. Broken pixels introduce a sense of imperfection, symbolizing the fragility of this balance. The echo effect of patterns from left to right emphasizes the ongoing interaction of these opposing forces, maintaining visual interest while respecting the emotional core of the piece.</desc>
