<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Currents</title>
  <desc id="desc">The emotional tone conveys a struggle between defiance and submission, represented through a divided color palette. The top half embodies defiance with assertive hues like rust and small gold, while the bottom reflects submission using muted tones like stone gray and bone white. The primary interaction occurs diagonally across the center, where colors clash and bleed into each other, symbolizing tension and instability. This reflects the seed's themes of conflict and the negotiation between forms of existence, creating a dynamic conversation of strength and vulnerability.</desc>
