<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The emotional tone explores a push and pull between defiance and submission, depicted with a palette of bright electric blue and lime against deep blacks, symbolizing conflict and resolution. The placement creates a bottom-weighted feeling, with the lighter colors 'falling' towards the bottom implied by the directional flow. Contrast emerges through jagged interruptions of bright colors in darker backgrounds, suggesting noise against a frame. This interplay evokes love betrayed, infusing weightiness and openness within the abstract pattern.</desc>
