<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Tensions</title>
  <desc id="desc">This piece embodies the emotional duality of softness and severity through a stark contrast between warm and cool colors. The selected palette includes soft tones of powder pink and warm white contrasted with the sharpness of carbon black and steel gray. The pattern is predominantly soft, with stripes symbolizing gentle pressure that envelops the more rigid island shapes representing severity. The main collision occurs in the upper left corner, symbolizing the beginning of an emotional invasion, while negative space flows diagonally to create balance.</desc>
