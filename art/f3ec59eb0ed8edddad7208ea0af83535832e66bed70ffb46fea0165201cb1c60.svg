<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tensions</title>
  <desc id="desc">This composition illustrates the emotional struggle of defiance against submission, capturing the tension through contrasting colors and patterns. The palette of muted cream, iron gray, red oxide, and blackened plum brings depth to the piece, implying both resistance and overwhelm. At the center, a 'line' reflects defiance's angularity while pulse marks radiate outward, suggesting submission's softer encroachment. The pattern collision occurs prominently around the center, with the density on one side contrasting with cleaner, muted fields on the opposite, embodying a dynamic yet unresolved interaction between both emotions.</desc>
