<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Shelter</title>
  <desc id="desc">This piece captures the tension between vulnerability and protection by using a palette that contrasts warm browns with soft greens and cool whites. The warm brown acts as the dense core, representing safety, while the cold white and pale skin colors create a sense of exposure. The interplay of the 'scar' and 'ladder' patterns reflects this tension by allowing overlaps that evoke both layers of protection and moments of openness. The collision occurs primarily at the center, where the dense saturation meets lighter colors, symbolizing the struggle between being sheltered and exposed. The edges feature broken pixels to signify imperfections in safety, embodying the quiet chaos of vulnerability.</desc>
