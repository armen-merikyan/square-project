<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Tension</title>
  <desc id="desc">The emotional tone captures the struggle of defiance against submission, creating a vivid contrast. The palette features muted sepia and gray tones that evoke an atmosphere of nostalgia and tension, while accents of faded blue add a spark of defiance. The crucial collision occurs in the center, where the densely patterned ‘flood’ of defiance interrupts the enveloping 'stripes' of submission, symbolizing an invasion of strength against containment. This arrangement reflects an inward spiral of emotions, where the outer edges suggest restraints poised to break with the burst of color within.</desc>
