<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Crosshatch</title>
  <desc id="desc">This piece embodies the tension of 'loneliness vs connection' through color contrasts and arrangement. The main palette of lime, electric blue, magenta, and black reflects vibrancy against starkness, with lime representing fleeting connection and black embodying isolation. The top-weighted layout emphasizes a heaviness at the top, symbolizing the burden of loneliness, while the bright bursts of color interrupt the grid-like nature of the piece, suggesting potential for connection. The pattern’s crosshatch mimics the emotional complexity, creating collisions of feeling, where bright hues attempt to penetrate the boundless black, representing the longing for connection amidst isolation.</desc>
