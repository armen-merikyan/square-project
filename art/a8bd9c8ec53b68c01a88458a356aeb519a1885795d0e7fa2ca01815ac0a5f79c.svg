<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order and Chaos</title>
  <desc id="desc">The emotional tone juxtaposes the calmness of control against the turbulence of panic. The chosen palette of black, dark violet, soft gold, and pale green evokes a sense of depth and conflict. The upper four rows embody control with a structured crosshatch pattern, using soft gold subtly against dark backgrounds to maintain a sense of stability. In contrast, the lower rows introduce chaos with a radial pattern of disarray, showcasing bursts of pale green, evoking a spark of panic against the darker foundation. The primary collision occurs where organized color transitions into unpredictability, emphasizing the tension of the emotional state depicted by the seed.</desc>
