  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece captures the emotional tension between vulnerability and strength. The palette ranges from deep blues and mourning blacks representing strength, contrasted by soft pale yellows symbolizing vulnerability. The central collision occurs at the intersection of dense colors and lighter shades, suggesting the struggle between protection and exposure. The layout signifies horizontal and vertical movements clashing in the middle, echoing the theme of connection versus alienation through an intentional imbalance in color density, while broken pixels serve as reminders of imperfection amidst strength.</desc>
