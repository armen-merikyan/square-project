<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The artwork represents the emotional tension between desire and restraint, using a palette of warm and cool tones to illustrate the conflict. The left half is dominated by saturated colors, representing the warmth of desire while the right half employs cooler, muted tones to depict restraint. The patchwork and constellation patterns collide in the center, creating a focal point where these emotions interact, evoking feelings of longing and tension. The sealed edges reinforce the idea of boundaries, mirroring the concept of unfulfilled desire against constraints.</desc>
