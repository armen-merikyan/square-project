<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone reflects the tension between rage and calm, using a palette contrasting hot reds and cool blues. The primary collision occurs in the central and upper left sections where jagged, fiery red islands disrupt the cooler, flowing pale blue bands that expand across the grid. This embodies the dichotomy of pressure versus release, with broken pixels symbolizing the scars of conflict within this emotional battle between containment and overflow. The layout of almost mirrored sections featuring intentional imperfections further emphasizes the underlying chaos, while maintaining clarity and readability at a thumbnail size.</desc>
