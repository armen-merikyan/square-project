<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inside the Tension</title>
  <desc id="desc">The artwork captures the tension between fear and hope, represented by a dark, structured palette juxtaposed with lighter, glistening tones. The base of deep blacks and dark violets counterbalances the luminous soft gold and pale green that suggest upliftment and potential. The composition reflects a split vertical layout, revealing conflict—pressure collides with aspiration through contrasting patterns of structured grid and chaotic spark. Negative spaces allow the viewer's eye to rest amid emotional density. This piece embodies a spirit of inner turmoil yet hints at a glimmer of hope peeking through.</desc>
