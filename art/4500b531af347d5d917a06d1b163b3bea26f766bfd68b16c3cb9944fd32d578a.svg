<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Longings</title>
  <desc id="desc">The emotional tone presents a dichotomy between emptiness and desire, captured in the contrasting palette of dark navy and bright whites. The interplay of colors creates a push and pull, where warmer tones approach from the corners, signaling the rise of desire, while cooler tones encapsulate emptiness in the center. The pattern mimics the motion of dots representing desire, while the stairs pattern symbolizes the weight of emptiness; together they collide to form a tense yet harmonious composition, echoing the complexities of longing and absence.</desc>
