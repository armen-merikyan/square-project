<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall</title>
  <desc id="desc">The emotional tone juxtaposes joy and grief, using a palette of vibrant yellows and muted blues to create tension. The joy is expressed through bright colors that resonate with spark-like energy, while grief is highlighted through deep blues that evoke a sense of droop and weight. The pattern reflects an upward and downward movement: the left side radiates warmth and joy in a 'teeth' pattern, while the right side embodies a radial pattern of muted blues resembling the weight of grief. The edge style adds a sense of interruption and chaos, enhancing the emotional dichotomy.</desc>
