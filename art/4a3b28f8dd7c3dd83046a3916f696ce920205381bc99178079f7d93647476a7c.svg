  <title id="title">Tension in Balance</title>
  <desc id="desc">This artwork captures the contrast between envy and gratitude through a jagged arrangement of colors reflecting emotional conflict. The dark maroon and red signify the weight of envy, while pink introduces moments of gratitude and lightness. The center is heavy, showcasing noticeable contrast against lighter pixels, invoking a sense of both protection and disturbance. The zigzag pattern symbolizes the chaotic flow between emotions, reinforced by the broken pixels that add imperfection and texture, echoing the theme of a broken mirror.</desc>
