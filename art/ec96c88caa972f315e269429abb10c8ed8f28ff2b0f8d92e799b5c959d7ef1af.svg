<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragments of Emotion</title>
  <desc id="desc">This piece embodies the duality of joy and grief through contrasting emotional tones and patterns. The left side is illuminated with vibrant yellows and oranges, representing joy's brightness and expansion in a crosshatch pattern. The right side embodies grief's heaviness with deep blues and muted purples, arranged in fragmented stripes, conveying a sense of disorder. The echo of this split horizontally suggests an unresolved tension, while the pixel bleed edges create a sense of imperfection, enhancing the emotional complexity. The negative space embodies the hidden aspects of both feelings, allowing the viewer to interpret the interplay freely.</desc>
