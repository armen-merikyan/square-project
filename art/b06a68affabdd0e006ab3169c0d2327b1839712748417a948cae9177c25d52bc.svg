<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a tension between desire and restraint, with rich saturation symbolizing longing and muted tones representing containment. The palette—comprising warm colors like hot coral and blood orange against cool charcoal and hollow blue—creates a striking contrast that echoes the conceptual collision of sentiments. The layout features a diagonal division, with desire occupying the upper left, marked by a flame pattern, while restraint fills the opposite wedge in a patchwork style. This setup fosters an interplay where saturated colors push against the sealed edges, embodying a longing that fights against boundaries, manifesting the complex narrative of love and betrayal.</desc>
