<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Flux</title>
  <desc id="desc">This composition captures the emotional duel between defiance and submission through a structured layout that contrasts sharp angular patterns with softer, receding fields. The palette of muted plum and rain blue conveys a feeling of melancholy, reflecting the tension in the scene. The main collision occurs in the center, where the busy maze patterns of defiance overlap the calmer threshold patterns of submission, creating a visual tug-of-war amidst the surrounding negative space. Broken pixels intentionally disrupt the flow, echoing the 'glitch' theme, while the jagged edges delineate an uneven border that signifies chaos encroaching on order.</desc>
