<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Absence</title>
  <desc id="desc">This piece encapsulates the emotional tension between emptiness and desire through color contrast and placement. The warm hues of sepia and tan signify the pull of desire, while the cooler tones of dust_gray and faded_blue suggest the absence that emptiness embodies. The arrangement features a collision between dense clusters of dark colors, hinting at unfulfilled longing, juxtaposed with brighter accents that represent fleeting wishes. The irregular flow and burned edges reinforce the chaos of conflicting emotions, creating a sense of unresolved motion through the grid layout.</desc>
