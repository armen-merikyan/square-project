<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Contrasts</title>
  <desc id="desc">This piece embodies the tension between defiance and submission through a stacked band layout, where the darker colors represent an unmoved center, contrasting sharply with softer hues that dilute toward the edges. Mourning black anchors the square, while pale yellow introduces warmth, creating an emotional echo. The collision of dense vs empty is expressed as a central mass recedes into more muted fields, suggesting a spiral of inward pressure. The broken pixels strategically disrupt the smoothness, embodying the conflict suggested by the seed.</desc>
