<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork explores the tension between vulnerability and strength through its contrasting colors and patterns. It utilizes a palette of cosmic indigo, void black, star white, cold gold, and deep teal to invoke feelings of awe and terror. The primary contrast lies between the cold, dark tones of strength at the edges and the softer, lighter tones of vulnerability at the center. As broken pixels interrupt the flow, they hint at the struggle of maintaining a protective barrier yet being exposed to outside influences. This asymmetry embodies the chaos of emotion and the complexity of human experience, resulting in a dynamic and evocative composition.</desc>
