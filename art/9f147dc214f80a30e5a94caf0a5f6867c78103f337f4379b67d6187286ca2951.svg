<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Dissonance</title>
  <desc id="desc">The artwork explores the emotional tension between defiance and submission, expressed through stark contrasts and a chaotic arrangement of colors. The palette of black, electric blue, lime, and magenta symbolizes resistance (black and magenta) against lightness (blue and lime). The use of jagged edges and a corner invasion design emphasizes pressure and movement towards the center, while the broken pixel aesthetics add an unsettling quality, reflecting the fragility of these conflicting emotions. The transitions and overlaps of colors create a sense of interruption and unresolved tension.</desc>
