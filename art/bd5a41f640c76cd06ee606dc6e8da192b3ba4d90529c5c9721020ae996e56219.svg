<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Joy and Grief</title>
  <desc id="desc">This artwork embodies the emotional struggle between joy and grief, with the top half representing joy through bright dots of yellow and orange while the bottom employs dense, muted blue and purple patterns to evoke grief. The hard edges create a sharp division that enhances the contrast between the open, spark-like patterns of joy and the fragmented noise of grief. The piece resonates with the idea of an emotional wave, where the flow descends, suggesting tears or falling memories, while a few broken pixels introduce an imperfection that mirrors the complexity of emotions.</desc>
