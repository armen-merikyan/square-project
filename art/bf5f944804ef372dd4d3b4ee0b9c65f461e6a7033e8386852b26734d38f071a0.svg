<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Dissonance</title>
  <desc id="desc">The artwork embodies the tension between confusion and clarity through a split composition. The top half features chaotic sparks of electric blue and magenta representing disorder, while the bottom settles into tranquil lime hues that signify clarity. The palette contrasts sharp colors against dark backgrounds, creating a feeling of pressure and release. The intersecting patterns reflect overlapping emotions, emphasizing the dynamics of clarity disrupted by confusion. The introduction of broken pixels enhances this jagged edge of imperfection, stirring a visual pulse throughout the design.</desc>
