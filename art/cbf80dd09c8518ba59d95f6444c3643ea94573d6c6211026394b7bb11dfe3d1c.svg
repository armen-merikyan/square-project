<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Tension</title>
  <desc id="desc">This composition captures the emotional conflict between 'panic' and 'control' using the palette inspired by 'ancient fire', featuring burnt orange and dark red against a backdrop of charcoal grey. The higher density of red and orange in the center symbolizes panic holding sway, while the cooler, darker edges symbolize control attempting to contain it. The 'teeth' and 'crack' patterns create a sense of disruption, embodying the experience of tumult in an empty room. Broken pixels introduce a level of imperfection, suggesting unresolved emotions. This byte of chaos amidst order allows the piece to reflect the ongoing dance of conflicting emotions while leaving enough negative space to resonate with the viewer's own perceptions of struggle and tension.</desc>
