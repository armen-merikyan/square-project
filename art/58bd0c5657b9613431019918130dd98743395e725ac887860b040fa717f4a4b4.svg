<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict in Compression</title>
  <desc id="desc">The artwork explores the emotional tension between defiance and submission through a contrasting palette that embodies both oppressive density and uplifting sparks of color. The deep blues and soft cyans represent the weighted submission, while the lavender gray introduces defiance through a sense of vibrancy and interruption. The main collision occurs in the center, where brighter accents flare amidst darker fields, symbolizing conflict between these emotions. The layout promotes an invasion from the corner, reflecting how submission can suffocate while defiance strives to break free, creating a dynamic push-pull throughout the composition.</desc>
