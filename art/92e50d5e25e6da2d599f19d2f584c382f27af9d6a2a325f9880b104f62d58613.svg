<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Forces</title>
  <desc id="desc">This artwork embodies the emotional tension between defiance and submission. The chosen palette reflects intimacy and distance, combining warm tones (rose clay, warm shadow) with cooler colors (cool blue, distant lilac) to create a pulsating tension. The split-screen and grid patterns collide in the center, representing the main conflict area where higher density and pressure meet quieter regions, suggesting an ongoing struggle. The design features broken pixels to emphasize disruption, echoing the themes of invasion and spiraling emotions, while keeping an open corner style to allow breathing space, symbolizing submission.</desc>
