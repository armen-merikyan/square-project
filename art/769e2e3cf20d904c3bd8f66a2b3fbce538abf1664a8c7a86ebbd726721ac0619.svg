<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">This piece reflects the contrasting emotions of longing and resolve. The palette, comprising hot coral, blood orange, dust pink, charcoal, and hollow blue, symbolizes warmth and desire meeting coolness and emptiness. The warm colors dominate 65% of the grid, suggesting yearning—expressed through the crosshatch pattern that appears chaotic and unfinished. The cooler shades represent resolve, manifested in a radial style, creating a calming, steady motion. The main collision occurs in the center, where warm and cool pixels clash, representing the struggle between the two emotions. Broken pixels introduce imperfections, enhancing the sense of repair against damage, and accentuating the feeling of a thread stretched taut between these dualities.</desc>
