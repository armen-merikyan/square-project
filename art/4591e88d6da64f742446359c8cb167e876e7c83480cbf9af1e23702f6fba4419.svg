<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This composition captures the emotional tension between pressure and quiet. The palette consists of muted tones like off-white and dust gray, contrasted with compressed red and dark navy to embody a feeling of weighted density. The central placement of deep navy acts as a hard edge that interrupts the surrounding soft hues, creating a sense of conflict. The crosshatch and thread patterns interlace, reflecting the zigzag flow of emotions, where the pressure pools at the edges and leaks into quieter spaces. The broken pixels serve as visual scars, hinting at disruptions within the serene background, inviting a contemplation of clarity amidst confusion.</desc>
