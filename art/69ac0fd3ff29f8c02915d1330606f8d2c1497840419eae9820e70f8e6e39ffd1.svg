<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Weight</title>
  <desc id="desc">This artwork explores the emotional dichotomy of fear and hope, contrasting dark corners of anxiety with a luminous center representing hope. The palette features black and dark violet emanating from the edges, creating a heavy feel, while soft gold and pale green burst forth from the center, symbolizing a glimmer of hope. The crosshatch pattern conveys the tension of fear as it surrounds the lighter teeth pattern that suggests uplift and ascension. Highlights along the edges encourage movement toward the center, lending the piece an emotional journey from weightiness to lightness.</desc>
