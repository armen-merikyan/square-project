<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamics of Memory and Motion</title>
  <desc id="desc">The artwork embodies the contrast between nostalgia and progress, represented through a visual tension between dark and light colors illustrating memory and forward movement. The palette of navy, dim cyan, and black creates a foundational weight, while strikes of white symbolizing fleeting clarity rise against the heavier colors. The layout, inspired by falling pixels and split horizontal, establishes a pulse motion—where one side suggests ascent and the other descent. The interspersed use of broken pixels enhances the concept of interrupted memories, while negative space amplifies emotional depth without overwhelming chaos.</desc>
