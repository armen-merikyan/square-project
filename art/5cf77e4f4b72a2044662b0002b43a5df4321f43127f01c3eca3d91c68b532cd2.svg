<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">The composition captures the dichotomy of longing and resolve expressed through a palette of deep contrast and muted spaces. The black and electric blue create immersive depth, representing longing's quiet pull, while the vibrant lime and magenta intersect sharply to symbolize the strength of resolve. The main collision occurs diagonally, illustrating the push and pull of emotions, where warmer colors burst into a cooler space, creating vibrant tension against the expansive void of surrounding dark. This layout evokes a feeling of balance and imbalance, a visual metaphor for an intimate yet distant emotional landscape.</desc>
