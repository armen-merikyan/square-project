<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The tone captures the tension between desire and restraint as saturated colors face muted boundaries. The palette of hot coral and blood orange symbolizes passionate longing, while charcoal and hollow blue create a cool, restrained contrast. The main collision occurs at the center, where a warm burst disrupts the cool grid-like lattice, symbolizing desire attempting to break free, but ultimately facing resistance. This pattern embodies emotional complexities, showing how yearning collides with barriers.</desc>
