<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict's Pulse</title>
  <desc id="desc">This artwork embodies the emotional tension between tenderness and rage, utilizing a palette of deep reds and muted blues to create a vivid contrast that conveys the duality of feelings. The darker, sharper reds represent rage, while the lighter, softer blues symbolize tenderness. The layered patterns reflect the complexity of clashing emotions, spinning like a spiral towards a central point of conflict, suggesting an unresolved tension. Broken pixels introduce imperfection, symbolizing emotional scars and the turbulence of the inner landscape. This arrangement captures the chaotic yet beautiful essence of struggle and resolution.</desc>
