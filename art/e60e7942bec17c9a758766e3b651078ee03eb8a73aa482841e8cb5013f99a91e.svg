<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Edge of Control</title>
  <desc id="desc">The emotional tone captures the tension between panic and control, evoked through contrasting color placement and hard edges. The 'ancient_fire' palette of burnt orange, dark red, charcoal, and gold intensifies the feeling of conflict. The left is dominated by chaotic flame-like patterns, indicating panic, while the right holds structured rain patterns, symbolizing control. The central space serves as a battleground where emotion bleeds between the two, embodying the struggle of maintaining balance. The strategic placement of colors creates collisions at the center, elevating the sense of unease mixed with a yearning for stability.</desc>
