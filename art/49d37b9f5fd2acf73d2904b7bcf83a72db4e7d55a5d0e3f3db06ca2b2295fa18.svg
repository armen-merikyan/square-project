<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone emerges from the tension between warmth and coolness, reflecting safety and exposure. The selected palette ranges from 'shelter_green' and 'warm_brown' for warmth, to 'cold_white' and 'open_blue' for exposure. The contrast occurs along a vertical split, where a densely braided pattern (representing safety) on one side collides with a lighter crosshatched pattern (representing exposure) on the other, creating a feeling of pressure against release. This echoes the chaos of vulnerability and comfort, capturing the essence of the seed in an abstract yet intentional arrangement.</desc>
