<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between the Gaps</title>
  <desc id="desc">This piece embodies the tension between longing and resolve, using a palette of sepia, tan, dust gray, and faded blue to evoke nostalgia and calm amid urgency. The contrast is established through a ring pattern of longing that juxtaposes with the crosshatch of resolve, each emotion commanding its space in a 4x4 inner core versus an outer border. The broken pixels serve as intentional disruptions that suggest repair and damage, emphasizing the complexity of feelings. The serenity and urgency are visually represented in regions of quieter colors against sharper, more vivid tones, echoing the dynamic and often conflicting emotions present in the seed.</desc>
