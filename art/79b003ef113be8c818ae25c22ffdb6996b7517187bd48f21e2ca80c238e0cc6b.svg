<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensions of Pulse and Void</title>
  <desc id="desc">This piece conveys the duality between desire and emptiness through a vertical arrangement. The top half, representing desire, bursts with warm colors interspersed with deeper muted tones, evoking longing but dampened by feelings of futility. The bottom half embodies emptiness with cooler grays suggesting absence, punctuated by darker edges that mirror the fractures of hope. The jagged edges create a feeling of disruption and echo the emotional tension in the piece, while the crosshatch pattern of warmth collides against a more radial, reflective geometry below, symbolizing the push and pull between these contrasting emotional states.</desc>
