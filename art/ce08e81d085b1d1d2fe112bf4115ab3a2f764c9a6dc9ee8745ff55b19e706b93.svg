<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Push and Pull</title>
  <desc id="desc">This piece captures the emotional tension between desire and restraint, utilizing a palette that alternates between saturated hues of red oxide and muted creams to embody the conflict. The rows feature a 'falling pixels' layout, symbolizing the weight of unfulfilled cravings contrasted by the sealed boundaries of restraint. Central to the piece is an area where warm colors meet cool undertones, creating a clash that represents the struggle inherent in desire versus restraint. The pattern of constellation versus ladder abstracts this interplay ingeniously, evoking a sense of movement and static tension throughout.</desc>
