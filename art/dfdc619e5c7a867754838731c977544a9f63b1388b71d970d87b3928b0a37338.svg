  <title id="title">Resilience in Fragility</title>
  <desc id="desc">This artwork explores the tension between vulnerability and strength, utilizing a palette of earthy tones like moss green and rust, contrasting with the softness of bone white. The central binding of dark colors represents strength, while the lighter shades disrupt around it, symbolizing exposure and moments of fragility. The patterns of 'target' and 'tide' collide primarily in the center, creating a dynamic interplay of hard and soft, suggesting a narrative of resilience amid fragility.</desc>
