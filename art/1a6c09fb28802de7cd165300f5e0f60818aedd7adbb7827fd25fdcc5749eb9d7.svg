<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition embodies the tension between restlessness and peace through a checkerboard pattern that reflects both orderly calm and chaotic movement. The palette combines muted grays and off-whites for peace, against compressed reds and dark navy representing restlessness. The primary collision occurs in the center, where less saturated colors disrupt the rest of the grid, creating moments of tension. This mirrors the seed’s themes of memory interleaved with motion, where sharp contrasts clash but also harmonize, suggesting an unresolved emotional narrative emphasized by broken pixels that signify scars of experience.</desc>
