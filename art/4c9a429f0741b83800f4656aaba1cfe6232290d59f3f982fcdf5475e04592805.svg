<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Signals</title>
  <desc id="desc">The emotional tone contrasts control with surrender, portrayed through rhythmic dots clashing with broken patterns across the grid. The palette brings in electric blue and magenta to highlight the intensity of pressure against a dominant black background that represents containment. The collision happens predominantly in the center, where the denser blue and magenta dots disrupt the surrounding quieter lime and black tones, suggesting a push and pull between chaos and order. This intersection embodies the essence of 'signal vs. noise', echoing the struggle between desire for control and the inevitability of surrender.</desc>
