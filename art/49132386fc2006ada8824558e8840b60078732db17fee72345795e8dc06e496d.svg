<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">This composition captures the emotional struggle between trust and suspicion, utilizing a contrast of soft colors versus dark shadows to embody this duality. The selected palette of clean whites and deep darks creates a tension of clarity (trust) versus confusion (suspicion). The patterns - grid for suspicion and scar for trust - interact in a way that reflects their ongoing battle. The collision is most pronounced along the central diagonal, where trust's soft glow interrupts the harder shadows of suspicion, creating a dynamic visual dialogue. The presence of 'broken pixels' symbolizes the inherent imperfections and breaks within these emotional states, enhancing the feeling of fragmentation when contrasting elements collide.</desc>
