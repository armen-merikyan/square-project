<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Balance</title>
  <desc id="desc">This composition juxtaposes restlessness and peace through an interplay of dark and light colors, embodying the tension between motion and stillness. The muted tones of mourning black and deep blue represent the depth of restlessness, while pale yellow introduces moments of calm. The arrangement creates a central collision, where the diamond shape is overwhelmed by patch-like fragments of ember colors radiating outward, interrupted by quiet spaces. This structure captures the essence of memory against motion, inviting viewers to explore the layered tensions within.</desc>
