<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone of this piece captures the tension between longing and resolve, utilizing a palette of deep blue and muted purple to convey depth and quiet reflection against vibrant bursts of orange and yellow representing urgency and clarity. The main contrast occurs at the center, where the barcode-like streaks of longing intersect with the glitch pattern of resolve, creating a pulsating rhythm that embodies the pulse of life between repair and damage. The use of broken pixels enhances the emotional scars, suggesting moments of imperfection within the controlled chaos of the patterns.</desc>
