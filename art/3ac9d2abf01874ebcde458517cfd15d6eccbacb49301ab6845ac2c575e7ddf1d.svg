<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Extremes</title>
  <desc id="desc">This piece evokes the emotional clash of defiance and submission, with dark colors symbolizing resistance and light tones representing yielding. The palette transitions from deep black to pale blue, forging a contrast between heaviness and lightness. The arrangement of colors from left to right illustrates the struggle as bold frames of black push against gentle flames of pale blue, creating a tension that resonates with the seed. The central focus is marked by clusters of deep colors, denoting density and weight, while the edges are more dispersed, suggesting an open-ended resolution. Broken pixels introduce imperfections, mirroring the conflicts inherent in the emotional dynamics of love and betrayal.</desc>
