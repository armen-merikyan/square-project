<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Asymmetry</title>
  <desc id="desc">This artwork embodies the emotional contrast between control and surrender through a fragmented yet intentional color arrangement. The palette pulls from deep blues and pale yellows, symbolizing calmness and energy. The cooler tones represent containment, while the bright accents of yellow embody overflow and tension. The main collision occurs centrally, where dark and light purples merge, creating an immersive dynamic that reflects the push-pull of opposing feelings. The stepped patterns disrupt uniformity, illustrating the concept of stutter and hinge as parts engage with each other throughout the piece.</desc>
