<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos and Order</title>
  <desc id="desc">This artwork embodies the conflict between panic and control through a tensioned color palette of deep blacks and bright accents that evoke emotions of fear and hope. The arrangement opts for contrast, with darker colors in the center representing control, while brighter hues suggest radiating panic toward the edges. The radial pattern emanates outward, demonstrating a breaching sense of urgency against a solid center, encapsulating a pulse-like rhythm reflective of fluctuating emotions. This abstract form allows the viewer to sense the struggle without depicting specific objects or symbols.</desc>
