<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Clarity Fractured</title>
  <desc id="desc">The emotional tone reflects a struggle between clarity and confusion illustrated through a split vertical layout. The left side employs a pattern representing clarity with a repeating 'teeth' motif in warm yellows and citrus to depict optimism and vitality. The right side juxtaposes it with a chaotic 'split_screen' pattern in cooler muted purples and blues to evoke confusion and depth. Collision happens centrally with a thick outline of darker colors, symbolizing the tension between these emotions, while small patches of negative space offer brief moments of calm, creating an echo of unresolved motion within the overall pulse of the piece.</desc>
