<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resistance</title>
  <desc id="desc">This artwork captures the emotional dichotomy of vulnerability and strength through a contrast of color and structure. The pale aqua and clear white represent vulnerability, creating a soft center that feels exposed and fragile. The alarm red and ink blue provide strength, framing this center and suggesting a pressure from the edges that weighs heavily, echoing a robust but uneven boundary. The zigzag flow introduces an element of tension, facilitating a juxtaposition where vibrant colors collide in corners, interrupting the otherwise serene palette of the center. Broken pixels symbolize scars or disruptions, enhancing the narrative of resilience despite exposure.</desc>
