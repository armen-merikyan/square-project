  <title id="title">Duality of Emotion</title>
  <desc id="desc">This artwork embodies the tension between awe and terror through a carefully chosen color palette and pattern arrangement. The outer border in shades of dark maroon and gray represents an overwhelming sense of terror and chaos, while the inner section using soft pinks emerges with awe and wonder. The center gives a feeling of stability amidst instability, reflected in a soft wave flow that astandardizes the contrasting feelings. Broken pixels manifest imperfection, enhancing the element of surprise and memory in the viewer's experience.</desc>
