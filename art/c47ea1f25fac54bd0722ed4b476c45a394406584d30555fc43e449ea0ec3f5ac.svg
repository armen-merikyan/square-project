<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Suspicion</title>
  <desc id="desc">This artwork plays with the emotional contrasts of trust and suspicion through the use of color and patterns. The palette, derived from 'machine_emotion', employs bold hues of lime and electric blue juxtaposed against the depth of black and magenta. The left side of the grid represents trust with calming channels of color flow, while the right side channels suspicion through jagged, threshold-like disruptions. The main collision occurs at the center, where stark contrasts create tension. Broken pixels disrupt the flow, embodying fragility within resilience, suggesting a battle between feelings. The layout of stacked bands amplifies this struggle—each layer shifting in density while retaining breathing space, honoring the necessity of negative space in conveying emotional weight.</desc>
