<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotions</title>
  <desc id="desc">This composition embodies the tension between rage and calm, represented through contrasting colors and patterns. The chosen palette incorporates deep black and vibrant red for the 'rage' element, while pale blue and white depict 'calm.' The black and red patterns echo jagged, aggressive movements that disrupt the calm blue, which is presented in stacked bands for a serene rhythm. The main collision occurs diagonally, where the red infiltrates the blue, illustrating the emotional struggle. The deliberate placement of broken pixels adds to the chaotic feeling, enhancing the theme of eroded symmetry.</desc>
