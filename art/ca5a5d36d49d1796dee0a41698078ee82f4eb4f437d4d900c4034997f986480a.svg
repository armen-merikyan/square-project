<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone of this square contrasts vulnerability with strength, creating a visual dialogue between softness and density. The chosen palette of pale aqua, mist gray, alarm red, ink blue, and clear white underscores this tension—pale aqua and mist gray suggest vulnerability and a delicate heart, while alarm red and ink blue provide contrast and a sense of urgency and strength. The layout features a diagonal argument, where serene colors form a soft corner while more dynamic hues create a dense cluster on the opposite edge, symbolizing the conflict and interdependence of the two emotions. The intentional placement of broken pixels throughout adds imperfections, representing the scars and interruptions of strength amid vulnerability, while maintaining clear negative space to evoke feelings of emptiness and desire.</desc>
