<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Conflict</title>
  <desc id="desc">This piece explores the emotional tug-of-war between defiance and submission. The palette of warm yellows and oranges contrasts with the deep blue and muted purple, representing brightness against weight. The composition utilizes a mirrored layout with intentional breaks, signifying errors in the perceived harmony. The pattern of crosshatches and cracks emphasizes conflict and tension, while the bottom-weighted design gives a sense of gravity, making the viewer feel both anchored and unsettled. Negative space around the composition adds a feeling of unresolved emotion and potential.</desc>
