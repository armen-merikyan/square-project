<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition explores the tension between peace and restlessness through a mix of cool and warm colors. The palette features cosmic indigo and void black for depth and calm, contrasted with star white and cold gold as bursts of light, reflecting movement and urgency. The main collision occurs centrally, where the ripple pattern of restlessness intersects with the constellation of peace, creating an overlap that echoes the emotional themes of memory and motion. The broken pixels serve as disruptions, suggesting scars of past chaos within a mostly serene landscape, with enough negative space allowing for an expansive feeling.</desc>
