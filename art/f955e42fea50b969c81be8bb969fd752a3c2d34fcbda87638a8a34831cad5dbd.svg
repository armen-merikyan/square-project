<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs. Weight</title>
  <desc id="desc">This composition explores the tension between panic and control, using a palette of deep reds and grays to evoke heavy emotions associated with betrayal and disruption. The contrast between bright pink sparks scattered across the dark maroon and gray backdrop creates a visual collision of feeling, where light seems to fight against the surrounding weight. The layout follows a 'corner invasion' pattern, allowing panic to emerge from one corner, filling the space while maintaining negative space that invites contemplation. The grid-like arrangement of grid pattern reflects chaos, while the cracks resonate with fleeting control, creating an unstable yet rhythmic environment.</desc>
