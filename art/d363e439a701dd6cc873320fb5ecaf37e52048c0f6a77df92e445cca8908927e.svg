<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the emotional tension between vulnerability and strength, using a palette that juxtaposes warm browns alongside cool greens and pale whites. The central area is marked by a pale skin tone as a symbol of exposure, while dark edges, representing the strength or shelter, frame it, creating a stark contrast. The collision occurs primarily in the center where the radial pattern of vulnerability meets the densely packed ash field of strength, inviting the viewer to explore the interplay of these emotions. The negative space acts as a quiet channel, allowing the eye to traverse through dense patterns reflecting the complex nature of safety versus exposure.</desc>
