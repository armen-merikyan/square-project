<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Release</title>
  <desc id="desc">This composition embodies the struggle between control and surrender, with a stark contrast established through the left and right halves of the square. The left side, dominated by darker maroon and gray hues, reflects control and restraint through its mirrored pattern that creates a sense of rigidity and containment. In contrast, the right side embraces lighter pink and red tones in broken dot patterns, suggesting an emotional release and overflow, hinting at vulnerability. The main collision occurs at the center where the two emotional signatures overlap, creating a visual tension that reflects the ongoing struggle between the two states. The chosen colors from the love_betrayal palette evoke complex emotional dynamics, reinforcing the narrative of longing and restraint throughout the piece.</desc>
