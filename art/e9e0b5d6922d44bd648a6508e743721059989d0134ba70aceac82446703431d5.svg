<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This composition embodies the emotional tension between joy and grief. The selected vibrant yellows and oranges represent moments of joy, while deeper blue tones reflect the weight of grief. The collision between bright and muted colors creates a dynamic rhythm, where the light pulses are juxtaposed against a darker grid backdrop. This grid signifies structure yet contains broken elements, echoing the unpredictability of emotions. The arrangement follows a scattered flow, amplifying the emotional conflict, while leaving sufficient negative space to maintain balance and tension. Overall, the artwork reflects a heartbeat of emotions, pulsing between light and dark, joy and sorrow.</desc>
