<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Joy and Grief</title>
  <desc id="desc">The emotional tone captures the duality of joy and grief, manifesting through a color palette of bright yellows and oranges for joy, contrasted against deep blues and muted purples representing grief. The upper rows reflect order through a structured grid pattern, while the lower rows devolve into chaotic, jagged placements symbolizing grief's unpredictability. The edges exhibit a 'burned' style, enhancing the theme of imperfection and the tension between the rigid and the disordered. The zigzag placement of the joy colors introduces dynamic tension, interrupted by the heavier grief tones.</desc>
