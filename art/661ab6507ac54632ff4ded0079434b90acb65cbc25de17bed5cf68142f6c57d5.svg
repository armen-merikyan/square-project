<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inner Tensions</title>
  <desc id="desc">This artwork embodies the emotional tug-of-war between tenderness and rage. The center features a soft blue field representing tenderness, surrounded by intense reds—a representation of rage. The fragmented layout suggests a fall, akin to tears or raindrops, where the soft, pale colors meet sharp edges of dark intensity. The palette contrasts hot and cool, with the red connecting to the more muted tones outside, echoing the internal struggle of navigating intense emotions. Broken pixels disperse throughout, symbolizing imperfections and the rawness of emotional experiences, while negative space allows for breathing room within the chaos.</desc>
