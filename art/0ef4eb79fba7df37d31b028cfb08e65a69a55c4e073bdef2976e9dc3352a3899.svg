<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone conveys a push and pull between rage (represented by sharp reds and blacks) and calm (represented by softer, muted blues and whites). The palette was chosen to reflect this duality, with intense reds and blacks creating sharp contrasts against calming pale blues. The main collision occurs in the center with vibrant reds almost spilling over into the quieter spaces, echoing the struggle between containment and overflow. The quiet channel layout leaves significant negative space on the left side, enhancing the sense of a wave-like movement while rings of color rise, sparking a layered emotional response. This arrangement reflects the tumultuous dance between order and chaos, making the artwork rich in emotional narrative without relying on literal representation.</desc>
