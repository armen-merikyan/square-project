<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Influence</title>
  <desc id="desc">The artwork captures the emotional tension between defiance and submission through a lattice and ring pattern interaction. The central cluster in alarm red represents defiance, breaking through the clearer, calm edges of pale aqua, while the mist gray and ink blue create an overwhelming presence that collides with both emotions. This forms an uneven border, suggesting chaos against a quiet, yet tense channel. The palette reflects serenity and urgency, with sharp contrasts and broken pixels creating intentional disruptions. The layout visually divides the space, invoking a sense of conflict between the protected center and the surrounding chaos.</desc>
