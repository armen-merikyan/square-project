<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Joy and Grief</title>
  <desc id="desc">This piece captures the emotional tension between joy and grief through color contrasts and spatial arrangement. The left side employs bright yellows and oranges (joy), woven into a maze-like pattern that symbolizes expanding warmth. In contrast, the right side employs deep blues and muted purples (grief), creating a flame pattern that signifies fragmented pain and heaviness. The central area symbolizes the heart of this emotional conflict. Broken pixels are introduced to enhance imperfection, suggesting the fractures in both emotions. The separation is stark, yet the edges are blended to signify their interrelationship, creating an abstract resonance of both simultaneous experiences.</desc>
