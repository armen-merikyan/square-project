<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tides</title>
  <desc id="desc">The emotional tone reflects a battle between tenderness, represented by muted blues and whites, and rage, depicted through saturated reds and blacks. The color palette creates a contrast where soft, gentle overlaps of tenderness clashing with explosive, jagged formations of rage evoke a sense of turmoil and unresolved tension. The layout, an island of chaotic red on a sea of calm, enhances the feelings of containment and overflow. The center of the square serves as the main collision point, where jagged red patterns invade the tranquil field, suggesting a struggle between conflicting emotions.</desc>
