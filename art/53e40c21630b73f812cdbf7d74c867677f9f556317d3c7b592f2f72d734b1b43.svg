<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Resolution</title>
  <desc id="desc">This piece embodies the emotional struggle between longing and resolve. The palette of moss green, bone white, rust, stone gray, and small gold reflects both resilience and fragility. The static pattern representing longing contrasts with the crosshatch representing resolve, creating a tension throughout the composition. The main collision occurs centrally with densely arranged colors separating quiet fields on the edges, suggesting a push and pull between emotions. Broken pixels introduce intentional disruptions, reinforcing the theme of repair amidst damage, echoing the seed's complexities.</desc>
