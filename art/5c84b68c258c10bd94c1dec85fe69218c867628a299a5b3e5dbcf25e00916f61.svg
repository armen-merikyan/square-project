  <title id="title">Collision of Sentiments</title>
  <desc id="desc">This artwork captures the tension between restlessness and peace through contrasting palettes and structured chaos. The left side employs a crosshatch pattern in earthy moss green and rust to evoke a feeling of unease, while the right side provides a soothing pale field with stone gray accents, symbolizing tranquility. The central diagonal serves as the main collision point where the two emotions meet, creating a dynamic visual dialogue. The broken pixels disrupt the tranquility with sudden sparks of gold, suggesting fleeting moments of unrest against a backdrop of calm.</desc>
