<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork captures the emotional tension between rage and calm through a diagonal layout. The intense reds and blacks represent rage, while the cool pale blue and white suggest calmness. The central collision occurs where vibrant red pixels radiate outwards, interrupted by softer blues that seek to contain them. This reflects the 'door' metaphor as a threshold between these emotions. The broken pixels add a sense of imperfection, reinforcing the chaos of rage against the serenity of calm, creating a rhythmic struggle across the canvas.</desc>
