<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork embodies the emotional tension between vulnerability and strength, mirrored in the contrast of light and dark colors. The palette combines soft hues of 'lavender_gray' and 'soft_cyan' with darker tones of 'muted_plum' and 'rain_blue', creating a delicate balance that reflects the 'last_light' layout. The small bright cluster symbolizes moments of exposure amidst a predominantly dim field, manifesting the idea of strength in fragility. The arrangement uses the 'veil' pattern to suggest vulnerability and the 'mirror' for strength, creating indirect reflections that occupy the center. Broken pixels are integrated to enhance the raw emotion of disruption, linking back to the seed's exploration of tension in personal experience.</desc>
