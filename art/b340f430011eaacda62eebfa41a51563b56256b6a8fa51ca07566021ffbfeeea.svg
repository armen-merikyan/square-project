<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This composition embodies the tension and release between awe and terror. The chosen palette, filled with electric blue and magenta against a stark black, highlights the emotional collisions through stark contrasts. The movement from one side to the other represents the rise of awe against the encroaching darkness of terror, with broken pixels adding imperfection and a sense of reality. The edge style reflects jagged interruptions in the emotional flow, while the negative space invites contemplation, further enhancing the themes of both pressure and release.</desc>
