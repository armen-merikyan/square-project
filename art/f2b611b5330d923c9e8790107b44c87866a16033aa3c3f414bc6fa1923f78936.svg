<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">The emotional tone reflects a tension between vibrancy and decay, captured through a palette of moss green, bone white, rust, stone gray, and small gold. The composition features a dense cluster of colors (spark) in the top left corner, gradually dispersing into a softer chaotic arrangement (ash) toward the bottom right. The collision occurs diagonally, showcasing the contrast between a lively emergence and a settling stillness, echoing themes of resilience against the weight of memory. Broken pixels disrupt the structure, adding intentional imperfections that suggest scars of past experiences.</desc>
