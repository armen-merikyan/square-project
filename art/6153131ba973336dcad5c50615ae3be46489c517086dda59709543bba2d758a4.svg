<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Edges</title>
  <desc id="desc">The emotional tone of this composition captures the push and pull between desire and restraint. The palette mixes warm, saturated colors like hot coral and blood orange, embodying desire, with cooler, muted shades like charcoal and hollow blue, representing restraint. The main collision occurs in the central rows where saturated colors disrupt the cooler edges, encapsulating the struggle of desire attempting to break free while restraint holds strong. This creates an echoing rhythm across the square that conveys rich emotional tension without visual literalism.</desc>
