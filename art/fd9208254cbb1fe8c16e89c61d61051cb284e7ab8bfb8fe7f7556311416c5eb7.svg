<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition embodies the struggle between defiance and submission through its contrasting colors and placements. The warm hues like hot coral and blood orange represent the defiant energies, sparking against the cooler, subdued tones of charcoal and hollow blue that symbolize submission. The edge layout, with breaks in the borders, allows an invasion of color from the center, indicating a tension that threatens to spill out. The constellation pattern emerges from the layered color fields, colliding with mazelike structures, creating a sense of chaos while allowing for scattered moments of emptiness, reflecting the emotional dynamics at play. The balance calls forth feelings of disruption and resolution, where the brighter accents pierce through the darker backgrounds, suggesting hope amidst struggle.</desc>
