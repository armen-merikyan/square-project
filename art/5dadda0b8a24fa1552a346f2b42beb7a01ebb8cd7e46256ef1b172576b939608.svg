<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece captures the tension between defiance and submission through a contrasting palette of burnt orange, dark red, charcoal, and gold. Defiance manifests in the central cluster of orange and red, representing both a hard interruption and angular resistance, while submission flows outward in soft, elongated black and grey patterns, creating a sense of downward fold. The diagonal layout enhances this emotional clash, where the intense center collides with the subdued edges, suggesting both strength and vulnerability. Broken pixels punctuate the design, adding a sense of imperfection and disruption, echoing the theme of conflict.</desc>
