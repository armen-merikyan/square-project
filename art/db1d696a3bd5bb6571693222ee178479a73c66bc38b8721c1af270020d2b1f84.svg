  <title id="title">Emotional Tectonics</title>
  <desc id="desc">The emotional tone manifests as a tension between calm (blue) and rage (red), utilizing a palette that reflects these contrasts. The structured movement of colors, where warm hues stimulate versus cold pastels compress, creates a visual argument filled with overlapping rhythms. Bright reds break through a serene blue background — a collision of color that emphasizes emotional release amidst built-up pressure. Different patterns evoke the calm ('crack') and rage ('flame') creating a vibrant, dynamic interplay.</desc>
