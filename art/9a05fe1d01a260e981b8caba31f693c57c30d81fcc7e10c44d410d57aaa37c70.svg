<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Emotion</title>
  <desc id="desc">This artwork juxtaposes the contrasting emotions of panic and control through a carefully chosen palette of dark and light colors. The primary colors used are navy and dim cyan, where navy represents the feeling of being overwhelmed, while dim cyan offers a spark of calm. The layout descends from the top, echoing falling pixels, suggesting tears or rain. The presence of broken pixels introduces an intentional imperfection that evokes feelings of instability and tension. The central collision occurs in the conflict between the dark mass (navy) and the light sparks (dim cyan), reflecting the struggle between panic and a desire for control, resulting in a visually dynamic arrangement.</desc>
