<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone reflects the tension between desire and emptiness. The palette combines warm, saturated colors like hot coral and blood orange for desire, contrasting sharply with the muted, low-saturation tones of charcoal and hollow blue representing emptiness. This creates a division in the 8x8 grid, where the top four rows pulse with intensity from warm colors patterned in cracks, juxtaposed against the bottom four rows filled with dotted, cool tones. The main collision occurs at the center, where these contrasting patterns intersect, echoing the struggle between overflow and containment.</desc>
