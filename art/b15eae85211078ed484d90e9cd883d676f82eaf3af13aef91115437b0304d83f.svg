  <title id="title">Chaos in Control</title>
  <desc id="desc">This artwork captures the tension between panic and control through a zigzag pattern, symbolizing the struggle between order and chaos. The palette of warm yellows and oranges contrasts against muted blues and purples, echoing the emotional tension of joy and grief. The main collisions occur in the central rows, where dense colors interact sharply with lighter ones, creating an energetic dynamic. This visual friction represents the sparks of argument and conflict hinted at in the seed, while the broken pixels suggest the imperfection found in both emotions.</desc>
