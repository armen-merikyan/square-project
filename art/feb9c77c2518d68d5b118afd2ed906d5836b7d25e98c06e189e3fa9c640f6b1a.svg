<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Emotions</title>
  <desc id="desc">This piece embodies the internal struggle between tenderness and rage. The palette combines muted tones with sharp reds, suggesting warmth against cold intensity. The main collision lies in the center, where jagged pixels of red clash with a gentle grid of pale blue, creating a visual tension that evokes emotional turbulence. Negative space represents quiet moments amidst chaos, while broken pixels signify scars of past experiences, reinforcing the theme of guilt and forgiveness. The flow guides the viewer's eye horizontally, inviting contemplation of the emotional landscape.</desc>
