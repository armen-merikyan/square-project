<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Signals</title>
  <desc id="desc">The emotional tone contrasts defiance's angular resistance with submission's soft collapse. The chosen palette of signal green, electric blue, dead black, static gray, and hot magenta creates a dynamic interaction of bright, assertive colors against muted fields. The collision occurs in the central rows, where stacked patterns of defiance in green and blue are interrupted by barcode patterns in gray, emphasizing the struggle between opposing forces. This abstract representation draws from the seed by using the 'veil' as a metaphorical boundary that separates the two emotions while echoing themes of inward and outward movement, creating depth and tension.</desc>
