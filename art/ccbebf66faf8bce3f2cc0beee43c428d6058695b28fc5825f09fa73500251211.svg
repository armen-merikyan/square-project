<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Emptiness and Desire</title>
  <desc id="desc">The artwork captures the tension between the emotional contrasts of desire and emptiness. The palette, featuring deep blacks, electric blues, and vibrant magentas, evokes the intensity and complexity of these feelings. The left-side warmth of magenta and lime contrasts sharply against the cooler electric blue and black on the right, representing desire rising against the background of emptiness. This interplay creates a palpable tension, where the viewer can almost feel the push and pull of conflicting emotions. The chosen layout flows diagonally from the corner, with bold color patterns of crosshatch and a split-screen feel correlating to desire and emptiness, respectively. The broken pixels introduce a sense of imperfection and fragility, enhancing the narrative of heart fragmentation. The result is an engaging piece that invites reflection on the spaces between these emotions.</desc>
