<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resilience</title>
  <desc id="desc">This piece captures the emotional tension between longing and resolve through a careful selection of colors. The darker shades represent longing, conveying depth and yearning, while the vibrant greens and yellows symbolize resolve and growth. The collision occurs in the center with the deep blue, providing a contrasting element that brings an intensity, mirroring the chaos within. The negative space creates a tension that allows the viewer to feel both the isolation of longing and the strength of resolve without literal interpretation.</desc>
