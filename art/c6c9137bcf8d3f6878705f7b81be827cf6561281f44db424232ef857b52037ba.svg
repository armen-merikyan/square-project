<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry Disrupted</title>
  <desc id="desc">The artwork captures the emotional tension between confusion and clarity through a contrast of dense, solid colors and lighter, hollow spaces. The palette incorporates electric blue and magenta against deep black, suggesting the machinery of emotion—sharp yet fluid. The arrangement plays with a spiral flow where bright colors intersperse with darker shades, establishing a dance of collision at the edges versus the clarity in the center. The checker pattern for clarity juxtaposes the dot motif for confusion, creating an abstract interpretation of transitioning feelings.</desc>
