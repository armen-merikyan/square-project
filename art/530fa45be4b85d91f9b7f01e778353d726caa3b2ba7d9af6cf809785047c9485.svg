<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Resistance</title>
  <desc id="desc">This piece encapsulates the emotional tension between defiance and submission. Using a palette of black, lime, electric blue, and magenta, it highlights the vibrancy of defiance against the quiet retreat of submission. The collision occurs predominantly in the center, where dense stripes of vibrant colors meet gently receding dots, symbolizing the struggle between persistence and surrender. The deliberate use of broken pixels introduces an element of imperfection, echoing life's unpredictable nature. The layout features falling pixels that minimize dense areas, allowing negative space to articulate the underlying quiet amidst the visual noise.</desc>
