<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Harmony</title>
  <desc id="desc">The emotional tone balances between restlessness and peace, utilizing a palette that embodies both unease and calm. The colors suggest a struggle between subtle warmth (muted cream, small orange) and heavy tension (blackened plum, iron gray). The main collision occurs in the central rows where patterns of 'ladder' (representing restlessness) meet 'checker' (representing peace), creating a dynamic flow from top to bottom that suggests movement and emotional layering. The arrangement captures a dance between memory and motion, echoing the push-pull between settled tranquil spaces and jagged, unresolved bursts of color.</desc>
