<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Chaos</title>
  <desc id="desc">This piece explores the emotional duality of restlessness and peace through color and composition. The chosen palette of deep black, dark violet, soft gold, and pale green echoes the tension between dark, chaotic energy and serene calm. The top half employs a split-screen pattern to symbolize restlessness, with dynamic clashes from dark violets and stark gold, denoting interruptions and turbulence. The bottom half uses a braided pattern of pale greens and soft golds to evoke peace, reflecting gentleness and a sense of balance. The collision occurs where the two emotions meet, creating a visual narrative of opposing forces pulling at the edges of the square. This placement highlights the struggle between motion and stillness, with intentional broken pixels adding imperfection and depth, revealing the underlying complexity of emotions.</desc>
