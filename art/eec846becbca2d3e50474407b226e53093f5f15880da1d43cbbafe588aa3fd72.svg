<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This piece captures the emotional duality of joy and grief shaped by the interplay of color and structure. The upper four rows evoke joy with warm colors like vibrant yellows and oranges, presented in dynamic striped patterns to symbolize movement and expanding emotions. In contrast, the lower four rows reflect grief through cooler blue tones and muted purples, arranged as dotted patterns representing heaviness and entrapment. The sharp edges create a tension between the joyful upward flow and the somber descent, embodying the zigzagging journey between these competing emotions. Overall, this piece captures the delicate balance between hope and sorrow, structured in a split horizontal layout that allows for both light and dark to coexist within a confined space, leaving necessary negative space to suggest unresolved emotional weight.</desc>
