<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">The emotional tone reflects the struggle between rage and calm, captured through color and texture. The black and deep red create a sense of chaos and intensity juxtaposed with the soft pale blue and white that inspire calmness. The layout is designed with falling pixels to symbolize tears or ash, emphasizing emotional release and descent. The pattern differentiates calm as delicate sparks, contrasted with rage's chaotic maze, allowing each emotion to collide and interrupt the other, creating an unresolved tension. This layout reinforces the theme of duality, amplified by broken pixels that evoke a sense of imperfection, enhancing the overall depth of feeling.</desc>
