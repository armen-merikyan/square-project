<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Tension</title>
  <desc id="desc">This piece captures the emotional tug-of-war between trust and suspicion, evoking a sense of layered complexity through color and form. The palette of warm oranges and yellows juxtaposed against cool deep blues and muted purples embodies this tension—warmth representing trust and coolness embodying suspicion. The main collision occurs in the central rows where the warm and cool colors meet, creating visual noise that metaphorizes the struggle for clarity amidst doubt. The chosen patterns of 'stairs' and 'veil' form a dynamic movement upwards against an 'ash field' background, symbolizing resilience in the face of adversity, while broken pixels introduce intentional imperfections, echoing the flaw in perfect trust.</desc>
