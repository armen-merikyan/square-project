<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Pulses</title>
  <desc id="desc">This artwork explores the emotional tension of longing and resolve, represented by contrasting colors and their arrangement. The selected palette combines the warmth of shelter green and warm brown to evoke intimacy, with cooler accents from cold white and open blue symbolizing distance. The two patterns of longing (grid) and resolve (islands) collide, creating a visual echo of pressure and release amidst spaciousness and density. The main contrast occurs centrally, where the 'islands' of resolve interrupt the grid of longing, symbolizing a clash between the desire for connection and the push towards independence. Broken pixels add imperfection, embodying the inherent complexity of the emotions at play.</desc>
