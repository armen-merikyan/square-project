<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Resonance</title>
  <desc id="desc">This artwork embodies the emotional dance between restlessness and peace, manifesting through the contrast of dark and light shades. The palette includes muted sepia and faded blue to evoke a sense of broken memories interlaced with clarity. The outer edges feature darker hues, suggesting heaviness and weight, while the inner 4x4 grid presents lighter colors in a crosshatch pattern, symbolizing energy and motion. The main collision occurs diagonally, creating tension and a push-pull between the crowded dark space and the airy light core, representing the dialectic of chaos and tranquility found in our memories.</desc>
