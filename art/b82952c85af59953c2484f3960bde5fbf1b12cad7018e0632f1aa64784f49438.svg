  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This artwork embodies the tension between vulnerability and strength, represented by a center of pale yellow (#F5E0A6) surrounded by deeper shades of blue and black. The use of ‘mourning renewal’ palette conveys a somber tone balanced by warmth. The dense center suggests strength, while the scattered, quieter colors symbolize vulnerability, creating a conflict that echoes the seed's themes. The main collision occurs at the center where bright tones fight against darker edges, embodying the push-pull of safety and exposure.</desc>
