<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece visualizes the tension between desire (represented by vibrant, warm tones) and emptiness (captured in muted, cooler shades). The palette of hot coral and blood orange against the backdrop of charcoal and hollow blue creates a stark contrast. The central collision occurs in the spiral formation, reflecting a pull towards the saturated core, while the edges remain contained, symbolizing restraint. The pattern of shattering desire disrupts the fault line of emptiness, emphasizing the struggle between these emotions.</desc>
