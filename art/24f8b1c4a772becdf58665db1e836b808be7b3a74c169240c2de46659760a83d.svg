<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Emotions</title>
  <desc id="desc">This artwork captures the emotional duality of tenderness and rage by creating a tense clash between saturated and muted colors. The black base serves as a calm foundation, representing quiet contemplation, while bright accents of red interject sharply, symbolizing sudden bursts of anger. The arrangement combines jagged edges interspersed with rounded forms to evoke a sense of overflowing emotions that spill beyond boundaries. The collision predominantly occurs in the center where saturated reds disrupt the surrounding blacks, echoing the internal struggle portrayed in the seed.</desc>
