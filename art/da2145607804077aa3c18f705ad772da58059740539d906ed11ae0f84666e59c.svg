<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Shelter</title>
  <desc id="desc">The piece embodies a duality of emotional tones—safety and exposure. The use of muted earth tones intertwines with soft blues, representing the tension between warmth and vulnerability. The center features dense layers of color that evoke a sense of pressure, contrasting with the empty edges that suggest exposure. The distribution of colors creates an interruption within the frame, highlighting the theme of a thin barrier protecting against encroaching forces. The pattern reflects a collage of safety and exposure, echoing a struggle between solidity and fragility.</desc>
