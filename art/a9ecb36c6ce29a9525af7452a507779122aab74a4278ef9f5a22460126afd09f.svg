<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone captures a conflict between softness and severity. The palette of powder pink, warm white, carbon black, steel gray, and sharp crimson embodies this dichotomy — the warm hues suggest tenderness, while the cool tones add a sense of harshness. The left side’s static softness transitions into the right side’s overwhelming severity, where the sharp crimson acts as an accent, marking the collision space. Negative space is utilized to emphasize the clash and openness created by the spiral flow, allowing the softer colors to gently counteract the starkness without creating symmetry.</desc>
