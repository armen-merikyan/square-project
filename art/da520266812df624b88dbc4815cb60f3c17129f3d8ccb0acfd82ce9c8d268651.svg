<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This artwork delves into the emotional dichotomy of safety versus exposure through its color choices and arrangement. The soft greens and warm browns evoke a sense of protection and stability, representing 'safety.' In contrast, the pale skin tones and cold whites signify vulnerability, portraying 'exposure.' The central area features a lattice pattern intertwined with pulse marks, symbolizing the tension between the two themes. The collision takes place vertically along the center, where warmth and coolness meet, creating a dynamic interplay of pressure and release. Broken pixels are intentionally scattered to signify disruptions, adding complexity and depth to the narrative. Negative spaces are carefully placed, allowing both themes to breathe, which contributes to an overall wage of emotional tension and calm.</desc>
