<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">In this composition, the emotional tone of vulnerability is represented by the off-white and faint peach colors, creating a pale center that feels exposed. The stronger, darker hues of compressed red and dark navy form protective boundaries that invoke strength. The main contrast between muted and saturated colors collides around the center of the grid, where the barcode pattern disrupts the embers motif, suggesting tension and interruption between stability and exposure. The arrangement leaves negative space around the central patch shape, enhancing the sense of isolation and vulnerability amidst surrounding pressure.</desc>
