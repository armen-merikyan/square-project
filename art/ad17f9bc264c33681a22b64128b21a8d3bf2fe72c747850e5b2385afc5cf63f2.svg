<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Tensions</title>
  <desc id="desc">This artwork embodies the emotional push and pull between defiance and submission. The chosen palette of moss green, bone white, rust, stone gray, and small gold reflects resilience and fragility, with rust and moss green symbolizing defiance through their bold, earthy tones, while soft bone white introduces a quiet dominance, hinting at submission. The stark contrast lies in the center where a denser arrangement of colors collides, representing a threshold between chaos and order. Eroded edges suggest vulnerability and the impact of resistance, encapsulating the dynamics of disruption and continuity.</desc>
