<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece captures the emotional tension of defiance versus submission through sharp contrasts and patterns. The palette, featuring deep reds and muted creams, symbolizes a struggle between bright refusal and receding focus, while the layout – climbing upward – conveys a sense of aspiration and conflict. Main collisions occur in the center, where a maze-like structure – representing defiance – intersects with crack patterns of submission, creating a visual complexity that evokes resistance amidst chaos.</desc>
