<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Dissonance</title>
  <desc id="desc">This artwork captures the tension between longing and resolve, using dark violet and soft gold to evoke emotions of yearning against a backdrop of stability. The dominance of dark violet in the upper rows conveys a sense of unfulfilled desire, while the soft gold interspersed in the lower rows offers moments of resolution and clarity. The diagonal flow symbolizes the struggle of forces, creating a palpable sense of interruption. Each pixel placement creates a rhythm that oscillates between dense and empty spaces, echoing the emotional pull of the seed.</desc>
