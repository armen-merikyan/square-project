<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone reflects the tension between panic and control. The palette, centered around burnt orange and dark red, evokes a sense of warmth battling against an undercurrent of anxiety represented by charcoal. The layout is designed to create a visual ascent on one side symbolizing hope while cascading down on the other side suggests chaos. The glows and pixel breaks interrupt the flow, representing instability amid the steady rise. The combination of grid-like patterns on the panic side and teeth-like patterns for the control side create a diagonal tension, illustrating the emotional push and pull sourced from the seed themes.</desc>
