<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Cross Current Emotions</title>
  <desc id="desc">This artwork explores the emotional tension between tenderness and rage. The palette features intense reds juxtaposed against calmer pale blues and whites, creating a battle between warm and cool tones. The arrangement has a broken edge style to reflect the rawness of emotions, while the pressure band pattern from rage collides with the gentle thread of tenderness at the center. This creates a dynamic focal point where the two feelings intersect, allowing the viewer to feel both the pressure of rage and the softness of tenderness, reminiscent of an internal struggle.</desc>
