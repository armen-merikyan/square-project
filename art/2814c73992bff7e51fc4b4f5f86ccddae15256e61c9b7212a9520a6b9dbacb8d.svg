<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Contrast</title>
  <desc id="desc">This composition embodies the emotional duality between emptiness and desire through a warm versus cool palette, emphasizing a rising vs falling contrast. The use of muted sepia and tan colors conveys feelings of nostalgia and loneliness, while faded blues introduce the yearning for connection and warmth. The main contrast occurs diagonally across the square, with cool colors penetrating the warmer tones, creating a sense of conflict and desire for the cooler, calm spaces amidst the heat. This layout reflects the seed's emotional weight through the spatial dynamics, echoing a flow from left to right, hinting at transition and disturbance.</desc>
