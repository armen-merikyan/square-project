<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of a Pulse</title>
  <desc id="desc">The emotional tone of this piece captures the tension between signal and noise, embodying both clarity and static interference. The palette features deep blacks to represent noise, paired with electric blues and greens as signals, enhancing contrast where clean pulses strive to emerge from chaotic patterns. The patterns of crosshatch for signals and stripes for noise collide primarily in the center, creating visual interruptions that symbolize moments of clarity amid confusion. This layout speaks to the theme of exposure against shelter, emphasizing the struggle for clarity in a sea of static echoes.</desc>
