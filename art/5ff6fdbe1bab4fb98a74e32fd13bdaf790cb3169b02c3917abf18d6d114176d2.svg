<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Reflection</title>
  <desc id="desc">This piece explores the emotional tension between envy and gratitude. The dark maroon and gray palette evokes a sense of weight and complexity, while the pink represents an uplift of gratitude amidst chaos. The left side follows a structured crosshatch pattern reflecting envy, while the right emits a spark-like dispersal, suggesting gratitude's lightness. The contrast lies in the organization on one side versus the disarray on the other. Broken pixels throughout symbolize imperfection and the subtle disruptions in emotional states. Overall, this tension is mirrored across the square, emphasizing the emotional collision of feeling centered yet disrupted.</desc>
