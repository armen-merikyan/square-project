<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Symmetry</title>
  <desc id="desc">This artwork explores the emotional tension between longing and resolve, using a palette that juxtaposes clean whites and icy blues against deep blacks and violet grays, creating a sense of clarity amidst confusion. The patterns of echo and crosshatch collide in the center, suggesting a moment of intense interaction—where longing reaches toward resolve yet faces resistance. The intentional broken pixels create disruptions along the edges, symbolizing the scars left by these emotions, while still allowing for negative space to emphasize the feelings of isolation and urgency. The dense center contrasts with the quiet corners, inviting a journey inwards, echoing the themes of repair vs. damage and contained vs. overflowing.</desc>
