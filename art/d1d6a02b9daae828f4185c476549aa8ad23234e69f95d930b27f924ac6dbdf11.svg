<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tension</title>
  <desc id="desc">The emotional tone presents a tension between strength and vulnerability, illustrated through contrasting colors and patterns. I chose a palette of deep blacks (ink black) for strength and lighter tones (ice blue and clean white) for vulnerability, creating visual echoes of collision throughout the square. The main conflict centers around the square's core, where stronger colors step out into the lighter fields, representing the pressure border where these emotions interact. The radial and stepwell patterns blend imperfectly, reflecting the complexity of emotions involved in desire and emptiness, leading to a layered impact.</desc>
