<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The composition captures the emotional tension between desire and restraint, using a palette that reflects vibrant yet subdued sentiments. The bright tones of hot coral and blood orange convey saturated yearning, while the muted charcoal and hollow blue signify locked negative space and containment. The main contrast occurs at the center where flowing broken dots of desire collide with the restrained tide pattern, creating visual and emotional disruption that echoes the seed's narrative of conflict. The negative space offers a necessary breath to the otherwise dense patterns, reinforcing the struggle between expansion and limitation.</desc>
