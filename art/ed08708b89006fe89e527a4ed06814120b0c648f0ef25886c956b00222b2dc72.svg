<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone embodies the tension between vulnerability and strength, encapsulated by a pale, exposed center surrounded by a dense, protective frame. The palette of moss green suggests resilience intertwined with moments of fragility through the softness of bone white and warmth of rust. The main contrast occurs at the border, where the dense colors clash with a subtle, fragile center, embodying the collision between strength and vulnerability. The patterns of barcode and veil interact visibly, generating tension throughout the piece, illustrating how exposure can lead to both strength and risk.</desc>
