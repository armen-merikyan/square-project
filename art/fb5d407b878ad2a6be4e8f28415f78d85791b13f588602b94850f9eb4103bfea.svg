<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">This composition explores the emotional duality of control and surrender. The palette, drawn from shades of green and brown with accents of pale skin and cold white, creates a feeling of safety and exposure. The distinct contrast occurs at the center where the overfilled warm browns collide with the cooler, lighter shades, symbolizing a struggle against an imposing weight. The patchwork control pattern emanates from this center, while the ring of surrender softens towards the edges, capturing a flow of inward spiral that draws the viewer's eye around the chaotic core.</desc>
