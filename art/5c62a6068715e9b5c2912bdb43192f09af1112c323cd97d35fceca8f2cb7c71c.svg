<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Hues</title>
  <desc id="desc">This composition balances the emotional tension between restlessness and peace. The colors drawn from the palette embody surreal contrasts, where cosmic indigo represents a calm night and void black suggests depth. The central flow of soft edges within a dim background is interrupted by brighter accents of star white and cold gold, creating a sense of movement and comfort. The 'spark' pattern of restlessness cuts through the 'stepwell' of peace, invoking a dynamic tension that echoes the conflict of memory vs. motion. This collision is concentrated in the middle, evoking the struggle amidst calmness, while leaving intentional spaces to amplify the contrast.</desc>
