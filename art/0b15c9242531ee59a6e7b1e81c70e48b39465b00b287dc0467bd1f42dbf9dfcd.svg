<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This composition explores the tug-of-war between longing and resolve, represented through contrasting color and pattern. The warm coral and soft amber depict the sense of yearning and warmth, whilst the cold slate, blue black, and signal cyan represent the clarity and strength of resolve. The warm colors provide a sense of distance and gentle opacity, while the cool hues assert boundaries with sharper contrasts. The collision occurs in the central rows, where the ripple of longing is interrupted by the negative-cross resolution—a visual representation of the struggle and interplay between these emotions. The broken pixels add imperfections to signify damage and repair, enhancing the emotional depth.</desc>
