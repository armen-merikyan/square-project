  <title id="title">Emotional Distortion</title>
  <desc id="desc">This artwork embodies the tension of conflicting emotions through a split layout. The top half features lively yellow and orange dots, symbolizing joy and expansion, while the bottom employs muted purples and deep blues, representing grief with fragmented patterns. The sharp edges create a sense of division and pressure, allowing the viewer to feel the contrast between the two emotional states, suggesting a constant push and pull within the human experience.</desc>
