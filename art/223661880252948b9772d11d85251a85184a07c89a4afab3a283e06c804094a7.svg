<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Shadows</title>
  <desc id="desc">The composition reflects the emotional tug-of-war between joy and grief. The palette utilizes bright yellows and oranges to suggest joy, while deep blues and muted purples symbolize grief. The left side features a denser pattern with deep hues to signify weight, while the right employs brighter, more open spaces indicating joy. The contrast between sharp and soft edges represents the collision of these emotions, with broken pixels enhancing the sense of imperfection. The central pulse creates a visual heart, signifying the emotional core of the piece, while the surrounding symmetry hints at vulnerability and disruption.</desc>
