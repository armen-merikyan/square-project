<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Tensions</title>
  <desc id="desc">This artwork embodies the emotional contrast of relief versus dread by utilizing a palette of deep reds and blacks, symbolizing dread, juxtaposed against pale blues and whites which stand for relief. The outer edges are heavy with darkness, conveying a sense of foreboding and weight, while the center showcases lighter tones, representing hope and clarity. The layered arrangement creates tension, where the calmness of light colors interrupts the oppressive dark, embodying a visual story of conflict and escape. The broken pixels introduce imperfections that reflect emotional turbulence, while the layout enforces a sense of structured chaos, filling the space yet allowing for essential negative space, meeting the challenge of heightened emotion without overwhelming it.</desc>
