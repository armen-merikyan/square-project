<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork encapsulates the emotional tug-of-war between desire and emptiness. The left half displays a saturated palette of hot coral, blood orange, and dust pink in a barcode pattern, symbolizing desire's pulse and reach, while the right side is dominated by charcoal and hollow blue in a quiet field arrangement, representing restraint and emptiness. The main collision occurs at the center, where these contrasting emotions intersect, creating tension. The broken pixels act as imperfections, echoing the stutter of desire against containment, providing a visual dissonance that enhances the theme.</desc>
