  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a tension between desire and restraint, expressed through a palette that balances warm saturation with muted tones. The darkest colors (charcoal) represent the restraint, while the brighter ones (hot coral, blood orange) illustrate layers of desire, creating a dynamic contrast. The arrangement features dense clusters towards the center, suggesting a spiral pull, while the edges exhibit cooler, sealed elements that symbolize restraint. The subtle inclusion of broken pixels introduces the imperfections and disruptions in the emotional experience.</desc>
