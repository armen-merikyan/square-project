<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Embrace</title>
  <desc id="desc">The emotional tone explores the tension between love and betrayal, juxtaposing warm and cold shades to represent inner conflicts. The palette of pink and red symbolizes affection, while the dark maroon and gray introduce a shadow of mistrust and isolation. The central area, an organized chaos reflecting love's clarity, is surrounded by jarring edges that speak to the disruptive nature of betrayal. The patterns of spark and stripes collide, creating a rhythmic disarray that tells the story of longing and loss, evoking feelings of both warmth and disconnection.</desc>
