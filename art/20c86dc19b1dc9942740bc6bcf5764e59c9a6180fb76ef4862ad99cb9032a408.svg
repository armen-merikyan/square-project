  <title id="title">Tension Between Calm and Chaos</title>
  <desc id="desc">This artwork captures the emotional tension between restlessness and peace. The palette features deep blues and pale yellows to evoke both calmness and agitation. The left half, filled with crosshatch patterns in darker tones, represents restlessness, while the right uses scar patterns in lighter hues to suggest peace. The main collision occurs along the vertical split, where the dense, chaotic left side interacts with the lighter, more open right side, illustrating the struggle between memory and motion.</desc>
