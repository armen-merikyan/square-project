<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Desire</title>
  <desc id="desc">This composition encapsulates the emotional tension between longing and resolve through a dynamic interplay of warm and cool tones. The palette, drawn from the 'desire_emptiness', features hot coral and blood orange that signify longing, juxtaposed against the grounding hues of charcoal and hollow blue representing resolve. The main collision occurs in the center with densely packed colors, allowing the quieter edges to express negative space—invoking feelings of distance and intimacy. The organized chaos reflects the visual rhythm of longing reaching toward resolve, while the broken pixels introduce intentional imperfections, underscoring the contrast between longing's rippling waves and the sharpness of resolve's 'teeth' pattern.</desc>
