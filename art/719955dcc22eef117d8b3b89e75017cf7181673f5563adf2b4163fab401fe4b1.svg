<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The piece embodies the emotional tension of 'rage' and 'calm', represented by warm versus cool tones. The vibrant reds and black convey the explosive nature of rage, while the pale blue and white symbolize calmness and containment. The outer layers in deep reds represent the overwhelming feeling, while the inner core, marked by calm blues, attempts to create a space of quiet. The zigzag pattern disrupts the tranquility brought by the pale blue, introducing a sense of conflict and tension. The choice of patterns reflects the emotional turmoil: sharp, jagged invasions of red disrupt the coolness, echoing the struggle between chaos and peace. The composition features a clear edge, with calmness attempting to reside in the center, showcasing a clash in a defined space, a visual battle that narrates the duality of emotions.</desc>
