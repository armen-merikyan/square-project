  <title id="title">Weight of Emotion</title>
  <desc id="desc">The emotional tone is an exploration of the duality between joy and grief, reflected in the palette choices. The warm yellows and oranges denote joy, while the deep blue and muted purple evoke a sense of heaviness and loss. The central contrast occurs where dense blue fields intersect with bright yellow patterns, creating a visual tension. This reflects the inherent conflict and blend of feelings — lightness against weight. The broken pixels add an element of imperfection and chaos, embodying the struggle within the emotional spectrum.</desc>
