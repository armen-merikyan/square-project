<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Trust and Suspicion</title>
  <desc id="desc">This artwork captures the emotional dichotomy of trust and suspicion through a deliberate imbalance in color and pattern. The palette leans toward muted earth tones with sepia and dust gray for an organic warmth, contrasted by cool faded blue for an air of mystery and noise. The left side presents a structured dotted pattern symbolizing trust, while the right disrupts this order with jagged noise suggesting suspicion. The collision occurs sharply in the central column, where these patterns fracture, embodying the tension between reliability and doubt. A broken border adds to this narrative, allowing elements to 'leak' from the confines of certainty.</desc>
