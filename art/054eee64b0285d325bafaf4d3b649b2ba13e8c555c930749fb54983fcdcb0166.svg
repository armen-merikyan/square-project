<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry Fractured</title>
  <desc id="desc">The artwork captures the emotional tension between envy and gratitude, symbolizing a conflict that feels both heavy and light. The palette of black, red, pale blue, and white juxtaposes dark emotions against lighter notes, embodying the weight of envy broken by gratitude's lightness. The arrangement creates diagonal flows of color, reflecting the rising signal of hope and the impact of interruptions, with the zigzag pattern symbolizing the chaos within this emotional journey. Contrasts are highlighted through heavy sections of black and bursts of red, illustrating the intense collision of feelings.</desc>
