<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Noise Pulse Interference</title>
  <desc id="desc">This abstract composition embodies the struggle between signal and noise, using a palette of dim cyan, navy, and black to represent noise while using areas of white to symbolize clearer, readable patterns. The main collision occurs in the center, where the white pulse tries to emerge from the dark, static backgrounds, showcasing the tension between chaos and clarity. The layout’s spiral approach embodies the ebb and flow of exposure versus shelter. Broken pixels are integrated to create visual dissonance, emphasizing the theme of erasure.</desc>
