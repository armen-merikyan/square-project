<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Tension</title>
  <desc id="desc">This composition captures the emotional contrast between longing and resolve through a palette of dark violet for depth and mystery, soft gold for an illuminating hope, and pale green for a serene yet urgent breath. The center creates a dense island of dark violet and soft gold, evoking a complex pulse between the seeking warmth of longing and the steadiness of resolve. The broken pixels introduce intentional disruptions, suggesting mirrors of broken connections, while whispering edges of pale green provide a quiet space to allow reflection. The contrasting starkness of black and dark violet with the warmth of soft gold and pale green recalls the delicate interplay of serenity and urgency.</desc>
