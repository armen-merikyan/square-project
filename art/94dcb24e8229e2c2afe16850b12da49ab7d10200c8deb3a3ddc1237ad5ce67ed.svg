<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Quiet</title>
  <desc id="desc">This composition captures the emotional dichotomy of defiance and submission through a structured yet chaotic arrangement. The palette of pale aqua, mist gray, alarm red, ink blue, and clear white creates a gentle tension between urgency and serenity. The sharp contrast of alarm red and aqua marks centers the grid while softer hues recede into the background, suggesting a quiet channel. Broken pixels disrupt smooth transitions, emphasizing the theme of uneven borders, thereby enhancing the journey from chaos to order—echoing the central concepts of quiet yet powerful defiance against submission.</desc>
