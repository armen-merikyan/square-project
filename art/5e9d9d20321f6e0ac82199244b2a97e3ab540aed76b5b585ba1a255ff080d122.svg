<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Release</title>
  <desc id="desc">This piece captures the emotional duality of control and surrender through a contrasting color palette where dark navy denotes constraint and pressure, and vibrant dim cyan represents overflow and release. The balance is disrupted by broken pixels, conveying the intentional imperfection of the emotional struggles described in the seed, with a center of bright accents colliding with darker edges, illustrating a struggle between containment and liberation.</desc>
