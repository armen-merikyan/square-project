<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This artwork captures the emotional tension between 'tenderness' and 'rage'. The palette features a stark contrast where deep blacks and vibrant reds dominate, symbolizing rage, while softer blues and whites gently interrupt, representing tenderness. The composition is structured around a 'quiet channel' of negative space that cuts through the dense patterns of rage, symbolizing a struggle between external chaos and internal calm. The broken pixels introduce imperfections, echoing unresolved emotions, while the intersecting patterns of checker and pressure bands create a visual collision, suggesting an emotional dialogue between comfort and turmoil.</desc>
