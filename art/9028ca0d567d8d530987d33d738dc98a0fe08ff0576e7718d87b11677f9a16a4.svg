<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition contrasts vulnerability and strength through the use of color density and pattern. The top rows reflect 'strength' with a stack pattern of deeper colors, suggesting a solid foundation, embodying strength and resilience. The bottom rows introduce 'vulnerability' with a dot pattern in lighter tones that evoke fragility and an exposed nature. The emotional palette combines pale aqua and mist gray to create serenity, while alarm red serves as an accent for urgency. The collision between strong, deep colors and lighter, softer ones creates a tension that mirrors the thematic interplay of exposure and safety. The broken pixels are intentionally placed to enhance the sense of interruption, adding scars to a seemingly stable structure. Overall, the grid captures the delicate balance between protection and exposure, establishing an abstract emotional narrative.</desc>
