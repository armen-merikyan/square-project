<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Tension</title>
  <desc id="desc">Exploring the emotional contrast between fear and hope, this piece captures the tension and dichotomy in color. The palette combines dark violet and black to represent fear, contrasted with soft gold and pale green to embody hope. The layout creates a split vertical composition, with jagged edges representing the harshness of fear colliding with glowing, smooth surfaces of hope. Each row reflects a density that mirrors the battle of emotions, leaving a touch of negative space to evoke the quiet amidst the chaos.</desc>
