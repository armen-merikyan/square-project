<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This composition explores the emotional tension between joy and grief through color contrast and placement. The warm yellows and oranges represent rising joy, radiating and expanding in the upper half, suggesting lightness. Meanwhile, muted purples and deep blues in the lower section evoke a sense of heaviness and depth, portraying grief. The upward movement of colors in the top half collides against downward spirals in the bottom, creating a dynamic flow that reflects the emotional push and pull, enhancing the sense of split between joy and grief. Imperfections (broken pixels) enhance the rawness of these emotions, giving voice to their chaos amidst the ordered split horizontal layout.</desc>
