<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">The emotional tone reflects a tension between control and surrender, highlighted by contrasting patterns; one side is structured with crack patterns indicating control, while the other side features ember-like textures suggesting surrender. The palette of muted off-white, dust gray, and dark navy captures a quiet pressure, with hints of compressed red providing emotional spikes. The central collision occurs where the two patterns meet, creating a visual dialogue between contained pressure and open yielding. This interaction gives life to the seed's themes of overflow and constraint, creating a narrative that brews beneath the surface, resonating with the ebb and flow of emotions.</desc>
