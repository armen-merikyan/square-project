<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symphonic Tension</title>
  <desc id="desc">This artwork explores the emotional dynamics of joy and grief through a contrast of warm and cool colors. The left side, representing joy, utilizes vibrant yellows and oranges arranged in a structured grid pattern, symbolizing openness and energy. In contrast, the right side embodies grief with deep blues and muted purples in a striped formation, creating a heavier, fragmented visual. The center reflects a collision point, hinting at unresolved emotions with the interplay of various shades. The layout is split vertically, where the flow of color rises diagonally, creating an asymmetrical balance that mirrors the tension described in the seed text. The presence of broken pixels introduces imperfection, emphasizing the fragility of emotion.</desc>
