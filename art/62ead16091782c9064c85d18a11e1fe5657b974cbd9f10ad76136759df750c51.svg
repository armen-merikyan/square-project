<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The composition reflects the emotional duality of vulnerability and strength, represented by a dense base of muted purples on the left, symbolizing safety and weight, contrasted sharply with the brighter yellows and oranges on the right, epitomizing exposure and light. The barcode pattern on the left echoes strength through structured rigidity, while the stacked pattern on the right suggests the fragility of vulnerability. A few intentionally broken pixels disrupt the steadiness, creating moments of imbalance that mirror the tension in navigating these emotions. The central collision occurs between the edge of the left's dark colors and the shifting brightness of the right, forming a horizon line that suggests both separation and connection. The overall layout intentionally divides the square into left and right, reinforcing the theme of emotional dichotomy, while preserving enough negative space to suggest room for contemplation.</desc>
