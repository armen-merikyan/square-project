<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Inquiry</title>
  <desc id="desc">This piece captures the emotional tension between certainty and curiosity through a palette of ripe green, acid green, honey gold, deep olive, and cream. The structured descending pattern conveys a calming pulse, representing certainty, while patches of chaotic colors introduce curiosity and unresolved paths. The collision occurs primarily in the center, where orderly edges brush against chaotic intersections, symbolizing the push-and-pull of structured thoughts against inquisitive exploration. The negative space enhances the sense of unresolved tension, portraying the mix of relief and dread in navigating the unknown.</desc>
