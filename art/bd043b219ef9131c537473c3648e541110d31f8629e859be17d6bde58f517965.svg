<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">The emotional tone explores dualities of awe and terror, captured in a palette of deep, dark hues intertwined with piercing white that symbolize stability versus instability. The contrast arises particularly in the upper row, combining darker colors that evoke feelings of weight and chaos, clashing with the single white pixel—representing a moment of awe. This interplay of light and dark, flowing from edge to center, reflects the seed's notion of a tear, invoking the feeling of a split screen against a wave-like backdrop, suggesting the ebb and flow between chaotic thoughts and the clarity of wonder. The layout intentionally leaves negative space, emphasizing the tension between presence and absence, light and dark, ultimately crafting an abstract yet emotionally resonant pattern.</desc>
