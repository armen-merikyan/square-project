<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone combines yearning for expansion with a feeling of containment, represented visually through a contrast of warm and cool colors. The palette draws from saturated reds and muted tones to illustrate desire (the warm colors) being obstructed by restraint (the cooler, muted colors). The main collision occurs in the center where the vibrant hues are interrupted by grey, embodying the clash between aspiration and limitation. This struggle shapes the abstract pattern, creating a sense of movement and tension within a confined space.</desc>
