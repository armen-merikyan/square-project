<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inner Fracture</title>
  <desc id="desc">The emotional tone dances between awe and terror, reflected by a color clash where soft browns meet sharp greys. The palette of sepia and dust_gray evokes a sense of broken memory, while the hidden layers of lighter tones represent awe through brightness. The primary contrast lies at the center where the lighter colors push against darker ones, indicating a collision of feelings and memories. The split_horizontal layout accentuates the juxtaposition, creating a visual tension between the heaviness of the bottom rows and the ethereal quality in the top, reflecting instability and the urge to escape into a more serene state.</desc>
