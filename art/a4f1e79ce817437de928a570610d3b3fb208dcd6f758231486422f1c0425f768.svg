<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Longing and Void</title>
  <desc id="desc">The emotional tone encapsulates the interplay between the warmth of desire and the spaciousness of emptiness. The palette mixes hot coral and blood orange against the muted hollow blue and charcoal to emphasize the yearning and the surrounding void. The top half employs a checker pattern representing the rhythmic pull of desire, while the bottom half features a tide pattern that evokes the ebbing nature of emptiness. The prominent collision occurs in the center where the warm colors clash with the cooler tones, creating a dynamic tension that speaks to the struggle between aspiration and limitation.</desc>
