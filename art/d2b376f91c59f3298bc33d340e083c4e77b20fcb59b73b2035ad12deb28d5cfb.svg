<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">This composition explores the emotional collision of 'rage' and 'calm' using a palette that juxtaposes intense reds against subdued blues and whites. The contrasting patterns—radial for rage and noise for calm—create a dynamic interplay where the heat of the central red sparks (representing rage) clashes with the cool, flowing blue that seeks to contain it. The layout presents a broken mirror effect, symbolizing the fractured nature of these emotions as they clash yet exist side by side, with the majority of the square dominated by the rage elements, while calm forms an undercurrent. Negative space is strategically left to emphasize the confrontation and tension between the two emotional states.</desc>
