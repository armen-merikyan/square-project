<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Confusion</title>
  <desc id="desc">This abstract artwork embodies the conflict between clarity and confusion. The palette features deep navy, stark black, and hints of dim cyan to symbolize a journey from clarity (the darker tones) into confusion (the lighter, disordered arrangements). The arrangement emphasizes a broken symmetry, where the inner 4x4 section experiences collision through scattered dots of lighter shades against the solid, consistent border. The thick outline represents stability, while the interruptions within evoke feelings of chaos and turmoil, echoing the emotional tone of the seed. The negative space in the corners allows for breathing room, balancing the dense conflict in the center.</desc>
