<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Waves</title>
  <desc id="desc">This artwork captures the emotional tension between envy and gratitude through contrasting colors. The dark violet conveys envy, while soft gold expresses gratitude. The pixel arrangement creates a zigzag pattern, representing conflict and movement, alongside a wave-like flow suggesting unresolved emotions. The layout features areas of density interrupted by negative space, embodying the struggle between lightness of gratitude and the weight of envy. The density builds around the central point, echoing the idea of a 'center-heavy' composition that heightens the emotional tension.</desc>
