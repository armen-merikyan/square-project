<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balancing Tensions</title>
  <desc id="desc">This piece embodies the emotional duality of tenderness and rage, using a palette that reflects both. The dark reds and blacks suggest rage, while the pale blues and whites evoke tenderness. The main collision occurs in the center, where jagged red pixels, reflecting anger, intersect with soft, flowing blue tones that suggest gentleness. The layout features a nearly enclosed frame that is intentionally broken, creating a visual metaphor for internal conflict and external expressions. This allows the viewer to explore the push and pull between these emotions amidst a flickering rhythm, emphasizing the interactions of quiet moments against bursts of intensity.</desc>
