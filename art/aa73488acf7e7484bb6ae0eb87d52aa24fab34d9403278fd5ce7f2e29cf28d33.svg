<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition embodies a struggle between defiance and submission. The palette, featuring compressed red against muted off-white and dust gray, represents conflict through color resonance. Bright accents disrupt the tranquility of the surrounding field, illustrating an upward block against the quiet collapse of submission. The main contrast occurs in the center where the intense red floods outwards, creating a focal point, while the more subdued tones recede, enhancing a sense of depth and conflict. The diagonal arrangement introduces movement, reflecting the tension between order and chaos.</desc>
