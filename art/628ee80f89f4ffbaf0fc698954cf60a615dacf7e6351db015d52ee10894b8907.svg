<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Heights</title>
  <desc id="desc">This artwork explores the emotional contrasts of envy and gratitude through a structured yet chaotic grid. The colors, predominantly from the 'lonely_signal' palette, create a monochromatic tension where deep navy and black suggest the weight of envy, while dim cyan and faint touches of white signify the lightness of gratitude. The low density on one side counterbalances the denser, darker cluster, reflecting the conflict between rising emotions and a grounded heaviness. The zigzag pattern, alongside broken pixels, adds an element of disruption that hints at the irony of a 'broken mirror', enhancing the themes of reflection and collision.</desc>
