<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Contrast</title>
  <desc id="desc">The emotional tone juxtaposes defiance and submission, encapsulated by a palette of 'safety_exposure' colors that oscillate between warmth and coldness. The bright, warm brown (#8B5A2B) serves as a defiant anchor amidst cooler tones, creating a pulsating center that contradicts the surrounding quiet blues and greens. The pattern employs a flood of defiance in the center with a crosshatch of submission radiating outward, suggesting tension and ambivalence. The main collision occurs in the central row, creating an inward spiral that draws the viewer toward a core of complexity and emotional depth, while negative spaces maintain a sense of calm amidst the chaotic intersections.</desc>
