<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Boundaries</title>
  <desc id="desc">This composition explores the emotional oscillation between longing and resolve. The outer layer in muted tones represents the weight of longing with colors like off-white and dust gray, symbolizing an expansive yet undefined quest for connection. The inner 4x4 matrix employs bright accents like compressed red and dark navy to signify resolve, breaking through the outer layers with deliberate intensity and structure. The arrangement features clusters and clear empty spaces that interplay to enhance the collision between tension and calm, while the broken pixels create intentional disruptions, reflecting scars of longing amidst a path toward clarity. Main contrast occurs diagonally, driving the eye's movement and emotional engagement throughout the piece.</desc>
