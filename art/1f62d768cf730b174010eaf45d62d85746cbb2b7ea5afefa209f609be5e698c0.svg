<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Dissonance</title>
  <desc id="desc">The artwork embodies the duality of 'awe' and 'terror,' represented through the contrasting warm 'burnt orange' and 'dark red' against the cool 'charcoal' and 'gold' hues. The top half features a checker pattern symbolizing awe's organized beauty, while the bottom half incorporates a ring pattern reflecting terror's chaotic swirl. This juxtaposition creates a tension of stability versus instability with soft edges amidst broken pixels, introducing an element of imperfection. The scattering flow emphasizes disruption, creating an echoing rhythm between composed form and fragmented memory.</desc>
