<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece captures the emotional tension between desire and restraint through a split composition. The upper half embodies 'desire' with saturated reds and muted creams, utilizing a grid pattern that suggests an overwhelming, pulsating energy. In contrast, the lower half reflects 'restraint' with darker hues like blackened plum and iron gray, laid out in tidal patterns that evoke a sense of confinement. The central collision occurs where these two emotions meet, creating a visual struggle between the urge to break free and the forces holding back. The color choices reflect the intensity of longing mixed with the dark weight of encumbrance, and the use of broken pixels introduces controlled imperfections, symbolizing the flawed nature of human emotion.</desc>
