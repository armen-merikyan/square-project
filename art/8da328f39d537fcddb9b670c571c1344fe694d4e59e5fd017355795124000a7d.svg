<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone captures the tension between explosive rage and serene calm. The palette uses bold reds to signify the intense emotional texture and soft pale blues that envelop the space, creating a balance of pressure and containment. The main collision occurs in the center, where jagged, crack-like forms in red sharply contrast with more echoing patterns in softer colors, symbolizing the chaotic interaction between these opposing emotions while the layout allows for a narrow negative space that provides breathing room against a crowded composition.</desc>
