<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Gratitude and Envy</title>
  <desc id="desc">The emotional tone juxtaposes the uplifting nature of gratitude against the suffocating pressure of envy. The palette consists of electric blue and lime to create vibrant bursts amidst a core of black, symbolizing contrasting feelings. The main collisions occur where the bright colors intersect with darker spaces, suggesting a struggle between light and shadow. The diamond shape at the core embodies an inner seed of hope cradled by jagged edges reflecting outside noise. Overall, the arrangement signifies the internal dynamics where gratitude rises, while envy pulls down, creating a tension in the emotional landscape.</desc>
