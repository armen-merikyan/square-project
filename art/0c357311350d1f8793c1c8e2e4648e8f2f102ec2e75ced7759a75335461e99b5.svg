<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">The emotional tone of this piece embodies a struggle between relief and dread, with a palette that juxtaposes warm yellows and oranges against cool muted purples and deep blues, reflecting both warmth and a sense of foreboding. The main contrast occurs in the top rows where lighter colors fight against darker tones, suggesting a tension that gradually dissipates towards the bottom, imparting a feeling of weight shifting. The rigorous arrangement follows a symmetrical pattern intertwined with broken pixels, echoing the themes of balance and interruption suggested by the seed.</desc>
