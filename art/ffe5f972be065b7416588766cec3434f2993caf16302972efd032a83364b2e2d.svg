<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs. Chaos</title>
  <desc id="desc">The emotional tone is a tension between trust and suspicion, reflected in the palette which juxtaposes warm and cool tones. The clean maze-like pathways represent trust, while the crack patterns convey suspicion, creating an unsettling yet dynamic interplay. The main contrast happens diagonally across the square, echoing a sense of conflict and resolution that challenges the viewer's perception of stability and disruption. The layout encourages an eye movement that embodies both safety in the ordered and uncertainty in the scattered, with broken pixels adding intentional disruptions that evoke a feeling of imperfect repair.</desc>
