<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Static Pulse</title>
  <desc id="desc">This piece captures the oscillation between restlessness and peace, embodying a tension that lies at the intersection of quiet moments and frenetic energy. The palette blends soft pinks and deep maroon with striking grays, creating a stark contrast that hints at emotional turbulence. The main collision occurs in the center, where restless patterns of dark shades clash with peaceful fields of lighter hues, symbolizing a struggle between static noise and the desire for clarity. The edges are slightly eroded, representing the gradual breakdown of tension, and each broken pixel serves as a visual echo of past disturbances, amplifying the disordered energy of motion throughout the piece.</desc>
