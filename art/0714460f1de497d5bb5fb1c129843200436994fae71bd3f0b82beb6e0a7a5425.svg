<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece embodies the emotional tension between vulnerability and strength. The warm brown and soft pale skin colors represent the exposed center, while the cool open blue and shelter green evoke feelings of protection and safety. The patterns of broken dots and hinge reflect the delicate balance of striving for shelter against incoming pressures. The primary collision occurs in the top corner, illustrating the overfilled dynamic, while maintaining a quiet negative space in the lower right, allowing for an organic flow reminiscent of the stories behind exposure and shelter.</desc>
