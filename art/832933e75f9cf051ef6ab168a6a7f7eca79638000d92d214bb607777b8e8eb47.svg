  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the tension between safety and exposure using a palette that shifts from warm browns symbolizing shelter to cold whites reflecting vulnerability. The main contrast occurs along a vertical split, with soft crosshatch patterns in the left half contrasting against the thread-like patterns of exposure in the right half. The imperfections introduced by broken pixels enhance the emotional depth, creating an echo of tension between the concepts of protection and vulnerability within a confined space.</desc>
