<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone explores the tension between desire and emptiness, depicting a saturated pull towards the edges—where containment meets an overflowing urge. The color palette was chosen for its warmth and coolness: the hot coral and blood orange represent desire while the charcoal and hollow blue encapsulate emptiness. The stark contrast between warm saturated colors and cooler muted tones creates a vibrant collision in the center of the grid that illustrates the tension between the two emotional states. The layout, inspired by a spiral pressure, adds a dynamic flow, suggesting a spiral movement towards an off-center point, further emphasizing the themes of yearning and restraint. The arrangement prioritizes quiet pressure against dense clusters, with broken pixels used to intentionally disrupt the flow, enhancing the narrative of longing met with barriers.</desc>
