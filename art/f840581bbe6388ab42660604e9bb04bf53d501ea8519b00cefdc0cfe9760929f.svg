<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Against the Seal</title>
  <desc id="desc">This piece embodies a tension between the emotional pull of desire and the containment of restraint. The palette comprises warm reds and oranges contrasted against deep muted plums and grays, reflecting the saturation of yearning versus the grayness of limitation. The main collision occurs at the center with a spiral pattern pulling outward, while broken dots interrupt the flow, creating visual tension. The structure is weighted towards the bottom, illustrating the heaviness of restraint while leaving sufficient negative space to symbolize unfulfilled desire.</desc>
