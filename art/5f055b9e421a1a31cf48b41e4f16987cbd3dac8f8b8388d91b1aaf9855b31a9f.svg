<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Approaching Boundaries</title>
  <desc id="desc">The artwork captures the emotional tension between longing and resolve through contrasting color blocks. The muted tones of 'dust_gray' and 'faint_peach' resonate with the sense of distance and warmth associated with longing, while the deeper 'dark_navy' and 'compressed_red' represent the compressed strength of resolve. The deliberate breaks in the layout symbolize the interruptions of emotion, allowing feelings to bleed through the edges. The pattern choice reflects radial expansions that create a gentle pull against the steady presence of broken dots, implying both intimacy and distance. The collision occurs primarily in the center, where the two patterns intersect, creating a focal tension that embodies the emotional core of the piece.</desc>
