<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone explores the tension between desire and emptiness, presenting a saturated pull on one corner (suggestive of desire) and a light, muted echo in the other regions (denoting emptiness). The color palette is chosen to embody warmth and depth (#FF6F61 for desire and #6A9BD1 for emptiness), allowing a stark contrast that highlights this struggle. The layout features an 'overfilled corner' where the warmer shades collide with the cooler, muted colors along the edges, creating a visual dialogue of pressure and release. Broken pixels introduce intentional disruptions, reflecting imperfections in the larger theme of unfulfilled longing.</desc>
