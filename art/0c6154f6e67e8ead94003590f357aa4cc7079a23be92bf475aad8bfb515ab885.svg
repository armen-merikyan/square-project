  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece captures the tension between fullness and emptiness. The warm palette evokes desire while the cool tones enact containment. The main collision occurs at the center, where the saturated colors pull against the darker outlines, hinting at both a yearning for freedom and the edges of restraint. The use of broken pixels throughout disrupts the flow, reinforcing the idea of emotional imperfection amidst the stark contrasts.</desc>
