<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Calm</title>
  <desc id="desc">This artwork embodies the tension between restlessness and peace through a stark contrast between dark, muted tones and bright accents. The palette, derived from the 'awe_terror' family, emphasizes cosmic indigo and void black for restlessness, symbolizing depth and confinement, while the star white and cold gold represent moments of clarity or peace. The main collision happens at the center where grid patterns (restlessness) intersect with thread patterns (peace), creating a visual dialogue of conflicting emotions. The arrangement of pixels deliberately introduces broken areas to suggest interruptions and imperfect memories, making the viewer reflect on the complexity of their experience with calm and chaos.</desc>
