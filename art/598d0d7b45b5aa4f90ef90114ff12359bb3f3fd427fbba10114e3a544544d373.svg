<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension's Edge</title>
  <desc id="desc">This piece embodies the emotional duality of vulnerability and strength. The palette of ripe green, acid green, and honey gold serves to highlight tension and contrast, symbolizing growth amidst struggle. The arrangement features dense clusters of green spiraling from the corners, suggesting strength, while thin radial patterns of cream and deep olive disrupt the flow, embodying vulnerability. The collision of these patterns occurs primarily at the center, where the colors intertwine, creating a dynamic interplay between the two opposing emotions. The use of broken pixels adds to the narrative of imperfection and resilience, contributing to a sense of urgency without overwhelming the visual space.</desc>
