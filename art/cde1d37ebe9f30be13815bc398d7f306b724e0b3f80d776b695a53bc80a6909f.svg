  <title id="title">Collision of Emotions</title>
  <desc id="desc">This artwork juxtaposes intense emotional contrasts, encapsulating 'tenderness vs rage' through the use of a saturated palette with punctuated black spaces. The primarily warm tones of red create an energetic core, while cooler pale blues embody a subdued calm, offering a dynamic interplay. The concept of 'inside vs outside' translates into jagged edges that interrupt smooth transitions, suggesting tension and release. The negative space allows for breath amidst the emotional density, giving balance to the intensity of the vibrancies clashing against the calming hues.</desc>
