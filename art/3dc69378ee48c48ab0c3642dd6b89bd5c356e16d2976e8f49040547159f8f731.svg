<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Resolve</title>
  <desc id="desc">The emotional tone combines 'longing' with 'resolve', suggesting a balance of reaching and solid strength. The palette of moss green, bone white, rust, stone gray, and small gold captures this duality with warm and cool contrasts. The main collision arises from the upward climbing patterns, creating tension between the longing represented by stairs and resolve captured in the checkerboard, but ultimately dominated by the warm moss green and stone gray fields. Broken pixels are scattered to denote imperfections, symbolizing damage and repair within the expansive canvas. This layout offers a sense of upward motion that embodies hope while acknowledging the unresolved feelings of longing.</desc>
