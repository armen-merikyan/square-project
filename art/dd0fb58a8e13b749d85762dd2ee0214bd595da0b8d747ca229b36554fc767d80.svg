<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Dissonance</title>
  <desc id="desc">This composition reflects the emotional tension between longing and resolve through contrasting colors and patterns. The palette shifts from warm ivory and deep wine in the top section, representing longing with interrupted barcode patterns, to a more structured combination of ash gray and soft gold in the bottom section, embodying the resolute strength through patchwork designs. The collision of chaotic elements reflects the struggle between repair and damage, with broken pixels as intentional disruptions that enhance the narrative of confrontation. This interplay creates an abstract dialogue, where the center serves as a focal point of tension, drawing the eye with rich color contrasts against quieter regions.</desc>
