<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">The emotional tone centers on a tension between desire and emptiness, using colors that evoke warmth and saturation against subdued tones. The palette of hot coral and blood orange embodies the urge for fulfillment, while the hollow blue and charcoal represent the void and containment. The main collision occurs at the center of the grid where saturated rings of color clash with muted islands, emphasizing the boundary between wanting and lacking. Broken pixels interrupt the flow, symbolizing the imperfections of longing and desire. The layout embraces a passage where desires meet their constraints, surrounded by negative space to suggest that the hunger remains unfulfilled.</desc>
