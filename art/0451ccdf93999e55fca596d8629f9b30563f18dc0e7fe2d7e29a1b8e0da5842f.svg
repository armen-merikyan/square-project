<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a struggle between the warmth of desire and the coldness of emptiness, captured through a palette of vibrant and muted colors. The use of hot coral and blood orange represents strong desire, while charcoal and hollow blue embody feelings of emptiness. The collision occurs in the center, where stripes of warmth intertwine with barcodes of restraint, visually reinforcing the tension of overflow and containment. Broken pixels add intentional disruption, echoing the imperfections of this internal conflict, while leaving negative space to imply a lingering absence.</desc>
