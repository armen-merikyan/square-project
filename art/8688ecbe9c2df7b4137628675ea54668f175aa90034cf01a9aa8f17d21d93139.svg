<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">This piece embodies the tension between restlessness and peace through a juxtaposition of chaotic and fluid patterns. The selected palette combines the calmness of pale aqua and mist gray with the urgency of alarm red and ink blue, creating a visual conflict. The main collision occurs in the center, where the contrasting patterns of 'constellation' and 'halo' interact, producing a dynamic resonance reminiscent of memory and motion. The overall structure maintains negative space along the edges to suggest the 'quiet channel', allowing viewers to feel both the pressure of restlessness and the tranquility of peace.</desc>
