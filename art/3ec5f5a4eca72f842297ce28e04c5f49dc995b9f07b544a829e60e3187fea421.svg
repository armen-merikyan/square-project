  <title id="title">Tension of Emotion</title>
  <desc id="desc">This artwork explores the emotional contrasts of tenderness and rage, with a structured collision at the center. The palette combines saturated red for rage and muted pale blue for tenderness, evoking the intensity of emotions clashing against a quiet backdrop. The flow zigzags across the pixel space focusing on a porous edge, representing both the fragility and resilience of emotions; the main conflict arises through the center, prompting an exploration of inner turmoil versus external calm.</desc>
