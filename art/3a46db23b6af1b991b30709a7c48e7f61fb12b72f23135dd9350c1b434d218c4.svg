<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This artwork captures the emotional tension between restlessness and peace through color and form. The palette of 'melancholy wonder' provides a soft base (light lavender and white) that implies calm. In contrast, static bursts of deeper colors (rain blue and muted plum) interrupt this serenity, representing agitation or movement. The collision occurs towards the center, where these contrasting emotions blend, creating a dynamic center of tension before dispersing into quieter corners. The negative space allows for breathing room and enhances the overall tranquility, embodying the push and pull between harmony and chaos.</desc>
