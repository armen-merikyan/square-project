<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Control and Chaos</title>
  <desc id="desc">The emotional tone reveals the conflict between panic and control, driving the composition to explore stability against chaos. The selected palette of dark navy and subtle dim cyan expresses a sense of depth, creating a void-like feel contrasting with points of brightness. The arrangement begins in the corners, with denser patterns of dim cyan (representing control) bleeding inward toward the center. This central region highlights pixelated interruptions (representing panic), giving birth to a swirling dynamic between calm and tension. The use of soft edges creates fluid boundaries between the colors, symbolizing the thin line between chaos and order. The overall piece reflects fluctuating emotions through intentional contrasts and placements.</desc>
