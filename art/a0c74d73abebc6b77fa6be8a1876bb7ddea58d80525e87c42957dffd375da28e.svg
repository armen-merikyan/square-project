<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This piece represents the emotional dichotomy of joy and grief, with the left half embodying joy through open, rounded patterns and bright yellows and oranges, while the right half conveys grief with drooping dots of deep blues and muted purples. The main contrast lies in the heavy dark mass of the right side, offset by scattered bright elements from the left that pulse against the grid-like arrangement. The broken pixel effect introduces imperfection, suggesting the unresolved nature of love and betrayal, giving the artwork both tension and a flicker of hope.</desc>
