<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Waves</title>
  <desc id="desc">The piece captures the tension between joy and grief through a contrasting palette of bright yellows and muted purples. The split layout emphasizes duality, with joy on the left and grief on the right. Warm tones peeking through the cools convey a flicker of light amidst a darker theme. The jagged edges evoke a sense of chaos and brokenness, representing the fragility of joy amidst grief. The arrangement creates density in the left (joy) contrasted by a heavier, more subdued right (grief), suggesting emotional conflict.</desc>
