<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Shelter</title>
  <desc id="desc">This composition embodies the emotional tension between safety and exposure. The palette features shelter green and warm brown to evoke a sense of protection, contrasted with open blue and pale skin, which represent vulnerability. The bands create a visual flow that suggests layers of tension, with the central area being lighter and more open, interrupted by darker edges that signify pressure and enclosure. The collision occurs at the center, where the conflicting patterns of radial and barcode meet, creating a visual dialogue of containment versus openness. Broken pixels serve as imperfections that hint at the fragility of safety in an exposed world.</desc>
