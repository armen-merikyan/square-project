<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork explores the emotional tension between desire and emptiness, illustrated through a diagonal layout where saturated warm colors represent desire, while cooler, muted tones signify emptiness. The palette features hot coral and blood orange creating a vibrant pull against the stark contrast of charcoal and hollow blue, evoking feelings of longing and restraint. The collision occurs at the diagonal edges, where desire reaches towards a perimeter of emptiness, yet the presence of broken pixels introduces disruption, suggesting the fragility of this emotional state. This interaction communicates a narrative of yearning held in check, captured through abstract forms and color placement.</desc>
