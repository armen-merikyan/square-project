<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Vessel of Tension</title>
  <desc id="desc">The artwork captures the emotional tug-of-war between safety and exposure through contrasting colors, clusters, and a structured format. The palette includes rich warm browns signaling protection, paired with soft pale skin and stark cold whites symbolizing vulnerability. The split layout creates a quiet channel down the center, where dense 'safety' colors collide with more scattered 'exposure' colors, echoing the pressure of confinement against the openness of risk. The placement of broken pixels introduces intentional imperfections, representing the fragility inherent in balancing these competing emotions.</desc>
