<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonant Conflict</title>
  <desc id="desc">This artwork expresses the tension between vulnerability and strength through contrasting colors and patterns. The warm coral and soft amber suggest a fragile center, while the cold slate and blue-black form a protective, dark boundary. The radial pattern from the corner conveys an invasion of vulnerability, where brighter accents struggle against deeper, muted fields. Broken pixels disrupt the harmony, representing imperfection and fragility in the face of overwhelming forces. The main collision occurs at the diagonal flow from the corner, emphasizing the emergence of vulnerability against the strength of the edges.</desc>
