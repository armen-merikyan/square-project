<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Desire</title>
  <desc id="desc">The artwork embodies the tension between desire and restraint through a dynamic palette of saturated and muted colors. Warm colors like hot coral and blood orange pulse against the calming depths of charcoal and hollow blue, illustrating the struggle of desire pushing against the restraint of muted tones. Color disruptions create a sweeping motion across the canvas, emphasizing the ongoing interplay of these conflicting emotions. The center features a collision of warmth and coolness, representing the heart of this struggle, while negative space around the edges enhances the feeling of containment.</desc>
