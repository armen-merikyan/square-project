<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Asymmetry of Emotion</title>
  <desc id="desc">This artwork represents the complex emotional dance between envy and gratitude, leveraging a color palette of navy, black, and varying shades of white and cyan. The structured grid on the left evokes envy through tight organization, while the chaotic splatters on the right symbolize gratitude's unexpected liberation. The main collision between the contrasting orders occurs at the center, illustrating a tension that emerges from moving between these emotions. The use of broken pixels introduces imperfection, nodding to the discord of a broken mirror reflecting our emotional states.</desc>
