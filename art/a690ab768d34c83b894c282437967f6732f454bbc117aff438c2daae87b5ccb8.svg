<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition embodies the tension between desire and emptiness, using a palette that juxtaposes saturated warmth against cool restraint. The outer border reflects a restrained space in deep charcoal, suggesting a locked boundary. Within, warm coral and orange strips pulse in channels, mimicking a rising signal of desire that conflicts with the surrounding stillness. Broken pixels add intentional disruptions like reminders of uncertainty, while the negative space leaves ample room for interpretation, portraying a quiet pressure that resonates throughout the piece.</desc>
