  <title id="title">Eroded Symmetry</title>
  <desc id="desc">This piece explores the emotional landscape of softness versus severity, using a palette that contrasts warm whites against deep blacks and grays. The warm pinks gently infiltrate the darker areas, suggesting a subtle encroachment of gentleness on strict boundaries. The main collision occurs in the center, where sharp crimson dots interrupt the subdued background, invoking feelings of tension and release. The layout of eroded symmetry ensures that the piece feels balanced yet imperfect, echoing the theme of repair versus damage inherent in the seed.</desc>
