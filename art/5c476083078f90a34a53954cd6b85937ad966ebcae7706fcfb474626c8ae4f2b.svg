<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Sentiments</title>
  <desc id="desc">This artwork embodies the tension between softness and severity through a carefully selected palette of colors: soft powder pinks and warm whites contrast sharply with deep carbon blacks and steel grays, representing the emotional collision. The layout features an overfilled center, suggesting density and pressure, while stark black pixels disrupt the outer edges to echo the fragility of the opposing sentiment. The arrangement spirals counterclockwise, inviting the viewer to traverse this emotional landscape, with quiet fields of color interrupted by sharp crimson accents, alluding to guilt and forgiveness. The patterns are intertwined yet distinct, embodying pulse marks against a backdrop of noise, reflecting complex emotional states—both gentle and harsh.</desc>
