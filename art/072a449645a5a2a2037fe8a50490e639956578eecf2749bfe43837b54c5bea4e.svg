<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This composition encapsulates the juxtaposition of joy and grief through contrasting colors and patterns. The left side employs bright yellows and oranges, representing joy through expanding shapes that evoke warmth and optimism. In contrast, the right side uses muted purples and deep blues to express grief with a fragmented, broken dot pattern that suggests heaviness and sorrow. The split layout mirrors this emotional clash and showcases the tension between the two moods, while the broken pixels add a sense of imperfection and chaos amidst the structured edges, alluding to life's unpredictability.</desc>
