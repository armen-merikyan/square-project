<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Calm and Chaos</title>
  <desc id="desc">This composition embodies the emotional tension inherent in 'restlessness vs peace.' The palette combines pale aqua and mist gray to create a soothing background, while alarm red and ink blue inject a sense of urgency and disruption. The main collision occurs in the central row, where squares of alarm red (representing discomfort) clash with the tranquil surrounding colors, forming an echo of turmoil. The rising signal layout suggests hope through upward movement, yet the use of broken pixels intentionally fractures the calmness, prompting contemplation of the dualities present.</desc>
