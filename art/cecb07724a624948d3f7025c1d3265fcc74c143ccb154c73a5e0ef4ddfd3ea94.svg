<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition captures the tension between vulnerability and strength through a split vertical layout. The left side represents vulnerability with soft, muted colors and flowing patterns, while the right side evokes strength with bold, jagged forms and strong contrasts. The palette of quiet pressure colors—muted off-white, soft gray, and deep navy—creates an emotional depth, where the central collision lies in the middle. Here, the braid of soft lines (vulnerability) intertwines with the glitch patterns (strength), suggesting an ongoing struggle. The broken pixels add intentional imperfections, symbolizing scars of experience that reside within both emotion currents.</desc>
