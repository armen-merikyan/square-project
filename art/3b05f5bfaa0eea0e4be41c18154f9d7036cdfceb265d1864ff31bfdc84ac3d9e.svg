<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry vs. Break</title>
  <desc id="desc">The emotional tone reflects a struggle between envy and gratitude, manifested through a palette of muted sepia and gray tones, interspersed with light faded blue that suggests a flicker of hope amidst heaviness. The layout holds an empty room concept emphasizing spaciousness, creating tension between dense clusters and quiet negative space. The central contrast occurs with the zigzag pattern (representing the emotion of envy) that disrupts the center, creating a collision with areas of calmness (the gratitude represented by softer shapes). Broken pixels introduce a sense of imperfection, reinforcing the concept of a 'mirror broken'.</desc>
