<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Ascent</title>
  <desc id="desc">This piece expresses the struggle between defiance and submission through contrasting colors and patterns. The palette of burnt orange, dark red, and charcoal embodies the emotional intensity of defiance, while gold introduces a quiet field, suggesting moments of submission. The rising signal layout reflects an upward movement, symbolizing hope against chaos, with pulse marks disrupting the thread pattern of defiance, creating a visual dialogue of conflict and resolution in the piece. The uneven border adds to the sense of disarray, reinforcing the emotions at play.</desc>
