<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger within Restraint</title>
  <desc id="desc">The emotional tone oscillates between intense desire and strict restraint. The palette features deep, rich colors like red oxide and blackened plum, symbolizing longing and the depth of unsatisfied emotion. Muted cream and iron gray provide the restrained boundaries, while small orange acts as a vibrant counterpoint, representing the spark of hope. The main collision occurs centrally as the saturated colors push against the muted edges, creating visual tension. This interplay embodies the struggle between the urge to break free and the confines that hold one back, translated into a rhythmic pattern of dots and broken dots across the grid, echoing the themes of hunger and restraint in a visually abstract manner.</desc>
