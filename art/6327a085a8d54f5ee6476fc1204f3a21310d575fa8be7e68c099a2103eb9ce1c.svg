  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece embodies the emotional tension between restlessness and peace. The palette mixes warm hues of 'hot coral' and 'blood orange' to express vibrancy and agitation, while cooler tones like 'charcoal' and 'hollow blue' represent calmness. The diagonal arrangement of the colors suggests movement and conflict, with broken pixels creating imperfections that reflect the chaos of memory and motion. The main collision occurs in the center with warm and cool hues intersecting, creating a visually stirring push and pull.</desc>
