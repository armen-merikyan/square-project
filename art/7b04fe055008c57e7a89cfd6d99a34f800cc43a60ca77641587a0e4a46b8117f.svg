<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The emotional tone reflects the struggle between defiance and submission, expressed through the jagged, angular shapes of defiance clashing with softer, flowing elements of submission. The palette of hot coral and blood orange conveys warmth and urgency, while charcoal and hollow blue introduce depth and contrast, creating an overarching tension. The main collision of patterns occurs towards the center, where the bold, target shapes of defiance meet the crack patterns of submission, suggesting a dynamic interplay of forces. Spaces of negative color amplify this push-and-pull, inviting the viewer to navigate the conflict of emotions.</desc>
