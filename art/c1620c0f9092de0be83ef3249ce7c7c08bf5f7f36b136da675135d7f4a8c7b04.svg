  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The artwork represents the emotional tension between rage and calm through contrasting color dynamics. The palette features deep blacks and radiant reds capturing the explosive feel of anger while softer, muted blues and whites convey the sense of calm. The main collision occurs in the center with intense lattice patterns intersecting the more tranquil crosshatch background. This visual juxtaposition echoes the seed's themes of containment versus overflow, using broken pixels to mimic the chaos inherent in both emotions.</desc>
