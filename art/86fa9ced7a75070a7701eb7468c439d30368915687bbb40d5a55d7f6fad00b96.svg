<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This artwork manifests the emotional tension between panic and control through a defined palette of dark violet, black, soft gold, and pale green. The outer borders reflect chaos and confusion, symbolizing order's fragility, while the inner pattern uses structured noise and crosshatch, embodying control's reactive tension. The variation of density and color introduces a sense of broken symmetry, creating visual clashes that resonate with the themes of argument and disruption. The incorporation of 'burned edges' with flawed pixels elicits a feeling of imbalance while maintaining a semblance of order. The sparse negative space signifies the stillness amidst emotional turbulence, enhancing the overall impact.</desc>
