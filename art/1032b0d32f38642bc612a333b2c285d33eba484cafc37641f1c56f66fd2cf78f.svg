<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Echo</title>
  <desc id="desc">The emotional tone oscillates between feelings of loneliness and connection. The palette's warm tones invoke warmth from connection (yellow and orange) while muted colors (deep blue, muted purple) convey the weight of loneliness. The main contrast occurs where vibrant colors penetrate the muted background, suggesting a struggle between isolation and connection. Inspired by the seed's focus on invasion and breakage, the pattern features a central burst of warmth that impacts the space, reflecting 'flame against broken dots'. Negative space is strategically left to accentuate loneliness, feeling like absence amid presence.</desc>
