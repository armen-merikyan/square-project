<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Shadows and Light</title>
  <desc id="desc">The artwork captures the emotional interplay between fear and hope through a palette of dark violet and soft gold contrasting with pale green. The inner 'wall' formed with dark pixels creates a sense of confinement, representing fear, while specks of soft gold and pale green emerge like hopeful signals breaking through jagged edges. The zigzag pattern is subtly suggested by the arrangement, evoking the flow of rain mixing with broken dots. Main contrast occurs at the center where gold accents clash with dark tones, highlighting conflict and transition.</desc>
