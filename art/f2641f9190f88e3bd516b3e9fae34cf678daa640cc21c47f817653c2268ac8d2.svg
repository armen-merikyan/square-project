<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This artwork embodies the tension between tenderness and rage, using a color palette that juxtaposes muted calmness with vivid intensity. The blacks symbolize rage and frustration, while pale blues represent tenderness and calmness. The grid layout allows for these emotions to 'fight' throughout the canvas, creating a sense of movement and complexity. The dominant pattern of 'shatter' collides with gentle ripples, especially in the center where the two emotional aspects intersect, illustrating a rupture of quiet against explosive fervor. Broken pixels are intentionally scattered, creating disruptions that mirror emotional scars, making the composition relatable yet abstract.</desc>
