<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork explores the emotional tension between rage and calm through contrasting colors and patterns. The palette of deep black and vibrant red represents the intensity and chaos of rage, while soft pale blue and white symbolize calm and tranquility. The dominant presence of red creates a feeling of pressure at the center, suggesting an emotional overflow, while the cooler colors softly surround it, embodying containment. The collision occurs in the central area, where the jagged intensity of the red disrupts the peaceful blue, reflecting the conflict of emotions inherent in the seed. The arrangement follows a maze-like structure for calmness and a rain-like pattern representing chaos. This interplay of dense clusters against quiet spaces evokes feelings of unresolved tension and emotional struggle.</desc>
