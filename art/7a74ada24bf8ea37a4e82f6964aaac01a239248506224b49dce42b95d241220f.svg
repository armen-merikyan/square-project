<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emptiness</title>
  <desc id="desc">The emotional tone oscillates between the richness of desire and the vastness of emptiness. The palette blends vibrant hot coral and blood orange with softer shades like dust pink and charcoal, embodying this tension. The strong contrast occurs in the center, where warm saturated dots collide with the structured barcode pattern, creating a visual friction that hints at conflict. The arrangement captures the essence of the seed through an abstract pattern—broken dots represent a yearning that reaches, while the barcodes symbolize containment and order.</desc>
