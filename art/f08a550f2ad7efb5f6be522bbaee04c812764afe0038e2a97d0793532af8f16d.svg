<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The piece captures the emotional tension between vulnerability and strength. The palette of burnt orange and dark red evokes warmth and intensity, representing strength, while the charcoal shadows suggest vulnerability and unpredictability. There is a clear contrast between the dense, strong colors at the edges (dark colors forming a protective frame) and the lighter, exposed center suggesting fragility. The main collision occurs diagonally from the corner, with strength pushing against vulnerability, creating a sense of dynamic pressure while maintaining negative space for balance. This abstract pattern allows for both protection and exposure, reflecting the seed's themes.</desc>
