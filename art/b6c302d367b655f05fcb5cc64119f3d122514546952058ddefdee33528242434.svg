<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonance of Dissonance</title>
  <desc id="desc">The emotional tone explores the tension between longing and resolve. The palette of stain_brown, ash_gray, warm_ivory, soft_gold, and deep_wine evokes warmth and introspection, while also alluding to the conflicted feelings inherent in the seed. The main collision occurs towards the center, where the denser stack of resolve colors meets the wide quiet field of longing, creating an interplay of pressure and release. This pattern reflects the push and pull of its source ideas, represented as fragmented shapes and contrasts, ultimately forming a cohesive yet complex abstraction.</desc>
