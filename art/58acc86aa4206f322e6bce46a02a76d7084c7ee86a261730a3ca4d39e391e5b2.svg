  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This composition captures the tension between safety and exposure through contrasting patterns and colors. The soft greens and browns represent shelter, while the pale and cool colors embody exposure's vulnerability. The interaction between the ash field and dot patterns creates a sense of ebb and flow, echoing the emotional theme of the seed. The central collision, where exposure interrupts the dense safety, conveys a narrative of vulnerability against a protective framework.</desc>
