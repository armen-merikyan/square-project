<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Shelter</title>
  <desc id="desc">This composition embodies the tension of safety and exposure. The palette incorporates a warm brown for the protective barrier and colder hues like pale skin and open blue to symbolize vulnerability, juxtaposing softness and severity. The main collision occurs at the center where the dense warm tones intersect sharply with the cooler, more exposed colors, creating a visual representation of the emotional conflict. The shatter pattern in the blue communicates disruption, while the spark pattern in brown provides a sense of connection, mirroring the themes of shelter and vulnerability. Each broken pixel introduces imperfection, enhancing the narrative of fragility amid strength.</desc>
