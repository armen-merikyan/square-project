<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone captures the tension between longing and constraint. The rich red oxide and muted cream evoke warmth and desire, contrasted by the cool shades of blackened plum and iron gray representing restraint. The layout emerges from the corner, with the split-screen and checker patterns colliding in the center, where the saturation of desire meets the boundaries of restraint, symbolizing an emotional struggle contained within a sealed edge. Broken pixels add intentional disruption, resembling scars of betrayal.</desc>
