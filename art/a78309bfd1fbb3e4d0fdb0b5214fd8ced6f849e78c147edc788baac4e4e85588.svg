<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This composition embodies the emotional tension between love and betrayal, with contrasting warm and cool colors. The chosen palette, featuring shades of pink and dark maroon, reflects warmth intertwined with deeper turmoil. The left side, suggesting love, utilizes softer coloration transitioning into deeper tones, presenting a juxtaposition with the more rigid and chaotic right side that embodies betrayal with sharper lines and darker hues. The flow rises diagonally, indicating a struggle between opposing emotions, while broken pixels introduce an imperfection that symbolizes the cracks in relationships, creating a dynamic interplay between control and chaos.</desc>
