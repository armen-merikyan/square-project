<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Spiral</title>
  <desc id="desc">This artwork captures the emotional dichotomy of rage and calm. The palette features bold reds juxtaposed with soft pale blues and whites, embodying the explosive energy of rage against a backdrop of serene calm. The primary contrast occurs where sharp, jagged red stripes collide with horizontal bands of gentle blue, suggesting an underlying tension. The spiral layout emphasizes a feeling of pressure, as colors converge towards a central point, enhancing the feeling of chaos forced into structure. Broken pixels are intentionally scattered throughout, embodying the idea of imperfections and interruptions that arise from conflicting emotions. Overall, the piece tells a story of struggle between containment and overflow, reflecting emotional turbulence through abstract forms.</desc>
