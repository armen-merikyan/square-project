<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Edge of Tension</title>
  <desc id="desc">This piece explores the emotional dichotomy between defiance and submission through vivid contrasts and layering. The palette, based on 'love_betrayal', incorporates sharp reds to signify defiance, juxtaposed with softer grays to embody submission. The dominant red area overwhelms the quieter gray, suggesting a feeling of tension and conflict. The pillar shape seed is hinted at through a structured yet chaotic arrangement, where the diagonal rise gives a sense of upward motion. Broken pixels randomly interrupt the flow, creating a glitch-like effect that signifies the disruption between order and chaos.</desc>
