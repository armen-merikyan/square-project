<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erosion of Emotion</title>
  <desc id="desc">The emotional tone of this piece is created through the coexistence of tenderness and rage, represented by contrasting patterns of softness and explosiveness. The palette consists of saturated red and muted pale blue, symbolizing the tumult between these feelings. The center of the composition displays a soft blue field of tenderness that is gradually invaded by jagged red edges representing rage, resulting in an erosion of symmetry at the corners to reflect the conflict within the emotional landscape. Broken pixels disrupt the grid, bringing a sense of imperfection, while the negative spaces allow the viewer to breathe amidst the chaos, making dramatic spaces of relief against the dense patterns.</desc>
