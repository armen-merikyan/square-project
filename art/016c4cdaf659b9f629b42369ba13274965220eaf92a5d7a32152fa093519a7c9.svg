<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Division</title>
  <desc id="desc">This piece explores the emotional tension between strength and vulnerability, utilizing a palette of moss green, bone white, rust, stone gray, and small gold. The colors represent a solid base of resilience contrasted against softer, lighter spaces suggesting vulnerability. The dominant moss green and rust create a dense matrix in the lower left, embodying strength, while the lighter bone white and stone gray expand towards the upper right, echoing fragile openness. The main collision occurs diagonally, where these two emotional spaces meet, creating an unresolved tension that reflects the dichotomy in the seed's themes.</desc>
