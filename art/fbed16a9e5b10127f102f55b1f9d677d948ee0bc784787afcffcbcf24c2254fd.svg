<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Connections</title>
  <desc id="desc">This piece explores the emotional conflict between loneliness and connection through a warm vs. cool palette, utilizing sepia and faded blue shades that symbolize warmth and introspection. The outer edges resonate with the feelings of loneliness through dark, muted colors that create a soft border, while the inner core employs contrasting warm colors to represent connection. The central 'pair of pixels' draws focus and creates a tension that feels both isolated and intertwined, symbolizing the complex relationships between hidden selves and exposed emotions. The fragmented nature of the patterns evokes both the warmth of connection and the piercing chill of loneliness, maintaining a quiet negative space which amplifies the feeling of exposure versus concealment.</desc>
