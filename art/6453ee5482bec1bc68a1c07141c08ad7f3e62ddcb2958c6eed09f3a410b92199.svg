<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Within Boundaries</title>
  <desc id="desc">The emotional tone reflects a push and pull between defiance and submission, illustrated through contrasting palettes in a split layout. The left side evokes strength and intensity with burnt orange and dark red, while the right emits a sense of calm restraint with charcoal and gold. The patterns reflect the structured chaos of 'rain' on the left and 'target' on the right—each color clashing subtly toward the edges, creating a dialogue between weight and lightness across the central axis. Broken pixels disrupt the symmetry, allowing space for tension to emerge, while negative space softens the impact, embodying the unresolved relationship between love and betrayal.</desc>
