  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the emotional contrast between vulnerability and strength. The palette of ripe green and cream establishes a sense of balance between nature's growth and the soft breaks of vulnerability. The dense island of darker colors amidst quieter fields suggests an impending pressure, while the broken pixels mimic the unpredictability of emotional experiences. The collision happens primarily in the center, where the dense strength metaphor outweighs the surrounding vulnerability, yet essential negative space remains to evoke introspection.</desc>
