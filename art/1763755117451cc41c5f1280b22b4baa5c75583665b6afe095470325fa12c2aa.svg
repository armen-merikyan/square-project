<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Shadows</title>
  <desc id="desc">This composition embodies the emotional interplay between dread and relief. The chosen palette features deep navy and black to evoke feelings of weight and dread, while punctuating it with dim cyan to suggest moments of relief and brightness. The main contrast occurs in the top section, where dark colors dominate to create a heavy atmosphere, while lighter cyan stripes interject, mirroring relief breaking through the oppressive weight below. This arrangement reflects the seed’s dichotomy of a cracked foundation with cracks interrupting the symmetry, visually representing an empty room where tension builds and ebbs away, creating a dynamic rhythm throughout the piece.</desc>
