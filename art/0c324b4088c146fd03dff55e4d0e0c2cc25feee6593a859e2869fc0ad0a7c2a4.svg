<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Desire Contained</title>
  <desc id="desc">The emotional tone captures a tension between hunger and restraint. The palette, featuring hot coral and hollow blue, embodies desire's vibrancy amidst the cool calm of emptiness. The central focus of warm hues intersects with cooler tones at the edges, creating a vivid contrast where desire spills towards a boundary, manifesting the struggle of overflow versus containment. The arrangement of warmer saturated colors juxtaposed with lighter, empty spaces forms an echo of a pulse trying to break through, creating a feeling of sought-after connection constrained by external limits.</desc>
