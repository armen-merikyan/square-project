<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Tensions</title>
  <desc id="desc">The emotional tone balances between vulnerability and protection, represented through a pale center surrounded by deeper, robust colors that create a visual tension. The chosen palette of soft greens and warm browns evokes safety and shelter, while the contrasting cool whites and blues reflect exposure and fragility. The main contrast occurs at the central band, where pressure from darker colors collides with lighter fields, suggesting both a border and a breach. This resonates with the seed's suggestion of a vessel—an entity capable of holding yet also allowing for exposure.</desc>
