<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges: Fractured Balance</title>
  <desc id="desc">This artwork embodies the tension between panic and control, using a palette of electric blue and magenta against deep black. The dominant diagonal flow, with colors radiating outward, represents the invasive nature of panic translating from a stable center to a chaotic edge. The broken pixel effect introduces imperfection, emphasizing the dissonance between structured control and eruptive emotion. Each row mirrors a clash and coexistence of colors, echoing feelings of instability with serene intervals of dark space.</desc>
