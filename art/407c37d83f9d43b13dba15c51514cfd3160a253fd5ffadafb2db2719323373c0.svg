<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience and Fragility</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of 'spark' versus 'ash', illustrating the tension between sudden brightness and a soft residue. The chosen palette of off-white, dust gray, compressed red, dark navy, and faint peach reflects a balance of quiet pressure and vibrant interruption. The layout, reminiscent of a hollow center ringed by contrasting colors, signifies the inner conflict between desire for fulfillment and restraint. Main contrast occurs in the center where jagged red cracks (representing sparks of intensity) interrupt a field of muted gray and navy, illustrating a collision of memories and emotions. The broken pixels enhance the sense of imperfection, suggesting resilience through fragments of recollection. Overall, the piece captures the push and pull of emotional experiences, evoking a sense of unresolved tension between opposing forces.</desc>
