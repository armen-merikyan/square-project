<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center Vs Edges</title>
  <desc id="desc">This artwork embodies the emotional tension between defiance and submission through an asymmetric distribution of colors. The bright accents of lavender_gray and soft_cyan represent defiance, asserting their presence in concentrated areas. In contrast, muted_plum and rain_blue evoke submission, creating a perimeter of subdued tension. The palette reflects a melancholy yet powerful narrative, symbolizing the struggle between a firm center and encroaching edges. The main collision occurs at the center where the crack pattern of defiance meets the threshold of submission, accentuating both the push and pull emotion. The broken pixels intentionally disrupt the flow, echoing scars and unresolved tension throughout.</desc>
