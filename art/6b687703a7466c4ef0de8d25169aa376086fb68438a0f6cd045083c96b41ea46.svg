<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This piece captures the tension between restlessness and peace. The palette pairs tranquil soft tones with stark, intense colors to create visual conflict. The main collision happens diagonally, with the restlessness (braid pattern) emerging prominently on one side, while the peaceful echo weaves through, forming a balance yet disjointed rhythm. The broken pixels symbolize disruptions in this balance, reflecting emotional scars and fleeting memories. Each color's placement reflects the push and pull of emotion, inviting the viewer to experience the interplay of memory and motion.</desc>
