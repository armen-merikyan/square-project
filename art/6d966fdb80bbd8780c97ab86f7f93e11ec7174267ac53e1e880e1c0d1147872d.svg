<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Presence</title>
  <desc id="desc">The emotional tone reflects the duality of envy and gratitude. The color palette of yellow, orange, deep blue, and muted purple embodies contrasting warmth and coldness. The central area has a dense arrangement, symbolizing pressure and noise of emotion, while the cooler outer edges give a sense of quiet and reflection. The use of broken pixels introduces imperfection, emphasizing the unresolved tension between rising hope (gratitude) and falling despair (envy). This juxtaposition creates emotional collisions and flows, embodying an inner struggle.</desc>
