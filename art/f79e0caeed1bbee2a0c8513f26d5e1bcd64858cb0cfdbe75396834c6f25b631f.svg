<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Contrasts</title>
  <desc id="desc">This piece embodies the emotional struggle between defiance and submission through contrasting colors and patterns. The left half, dominated by an angular checker pattern in warm coral and soft amber, symbolizes defiance, expressed through sharp contrasts and dynamic shapes. In contrast, the right half employs a smoother 'teeth' pattern in cold slate and blue-black, creating an enveloping feeling of submission. The center acts as a collision space, where warm and cool hues intermingle, creating a compelling tension. The choice of colors from the warm coral palette suggests warmth and refusal, while the cool colors evoke calmness and retreat, reflecting the emotional duality.</desc>
