<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The artwork explores the emotional tension between desire and emptiness through a clash of colors and patterns. The warm saturated tones of coral and blood orange represent a deep yearning and a pulse of energy, while the muted shades of charcoal and hollow blue symbolize restraint and quiet pressure, creating a balance of conflict. The center-heavy layout showcases a spiraling movement of desire combating the limitations of the border, reflecting the struggle between overflow and containment. The use of broken pixels adds intentional disruptions, mirroring the harsh realities of desire's limitations. The negative space is preserved to enhance the feeling of emptiness against a backdrop of yearning, highlighting the contrast further.</desc>
