<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Conflict</title>
  <desc id="desc">This artwork embodies the tension between pride and shame, visualized through contrasting colors and patterns. The navy and dim cyan evoke a sense of quiet depth, hinting at unresolved emotions, while the black serves as a grounding force, depicting a feeling of pressure. The bright single white pixels disturb the calm, creating collision points that suggest memory or moments of intense emotion. The arrangement flows in a clockwise pattern, guiding the eye through the piece while maintaining an aspect of asymmetry that reflects life's unpredictability. The edge style of pixel bleed enhances the imperfections, resonating with the concept of broken resilience and the beauty of chaos within human experience.</desc>
