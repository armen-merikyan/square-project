<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Balance</title>
  <desc id="desc">This piece captures the emotional tension between defiance and submission through the interplay of bold and muted colors. The palette of black, dark violet, soft gold, and pale green represents a gradient from heavy oppression to a glimmer of hope. The dense central area contrasts with the empty corners, embodying the idea of an unmoving center under pressure. 'Broken pixels' introduce intentional chaos, flowing from the center outward, symbolizing variances in human emotion. The patterns echo a rhythmic struggle between rising defiance and receding submission, framed within an eroded symmetry that signifies the battle against external forces.</desc>
