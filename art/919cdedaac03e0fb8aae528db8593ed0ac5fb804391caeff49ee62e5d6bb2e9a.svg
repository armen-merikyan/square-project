<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dichotomy of Light</title>
  <desc id="desc">This composition captures the tension between joy and grief through contrasting colors and patterns. The left half, representing joy, utilizes bright yellows and warm oranges arranged in a rhythmic, rain-like pattern. The right half, symbolizing grief, is composed of muted purples and deep blues in a broken dots pattern, evoking a sense of heaviness. The collision occurs at the midpoint, where the brightness of joy meets the weight of grief, resulting in a profound emotional dialogue. The thin outlines and broken pixels introduce a sense of disruption, mirroring the fragility of these emotions.</desc>
