<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Emotions</title>
  <desc id="desc">The emotional tone reflects a clash between love and betrayal, creating an intensity that flows across the canvas. The palette combines pinks and reds representing warmth and love against the grays and dark maroons symbolizing betrayal and discomfort. The arrangement emphasizes a central focus, surrounded by contrasting textures—striped patterns for betrayal and cracked shapes for love—creating a sense of pressure and complex emotional layers. Significant negative space enhances the feeling of loneliness, while broken pixels add imperfection and depth to the overall concept of inside vs outside.</desc>
