<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Connection</title>
  <desc id="desc">This composition explores the tension between loneliness and the yearning for connection. The palette, drawing from deep blacks, hints of dark violet, soft gold, and pale green, creates a contrast between the somber weight and the warmth of potential connection. The center showcases a small bright dot, symbolizing connection, surrounded by broken dots denoting loneliness. This creates a dense pressure around the empty space, evoking feelings of isolation against the hope of connection, encapsulating the emotional essence of the seed.</desc>
