<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This piece explores the tension between rage and calm through sharp contrasts and interrupted patterns. The palette mixes intense reds representing rage with soothing pale blues to reflect calm. The structure is centered, showing a heavy core surrounded by chaotic breaks, illustrating emotional pressure against tranquility. The clean lines of calm are disrupted by jagged ruptures of red, echoing emotional conflict. The result is an abstract portrayal of the struggle between dense feelings and quiet spaces.</desc>
