<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Dissonance</title>
  <desc id="desc">This piece explores the emotional tug-of-war between longing and resolve, utilizing the juxtaposition of dark and light hues to evoke tension. The palette reflects a cosmic indigo depth against a backdrop of void black serenity, punctuated by cold gold as an accent to symbolize moments of clarity amidst chaos. The placement and density of colors create a pulse-like rhythm, where the main contrast emerges through a collision at the center, enhancing the sense of movement and interaction between opposing emotions. The incorporation of broken pixels introduces intentional imperfections that mirror the fractured nature of the theme, guiding the viewer's eye across the composition's expansive negative space.</desc>
