<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Relief</title>
  <desc id="desc">This composition embodies the emotional dichotomy of relief and dread. The palette 'broken_memory' utilizes earthy and muted tones like sepia and dust_gray to evoke a sense of weight and nostalgia. The pattern contrasts sharply with lighter blue accents breaking the heavier borders, illustrating relief amidst the pressing sensation of dread. The deliberate arrangement of darker colors in the corners frames the lighter core, symbolizing the tension between an empty room and the emotional pressure it can invoke, resulting in an unresolved interplay of calm and rage.</desc>
