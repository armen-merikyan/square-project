<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">This piece explores the emotional tension between trust and suspicion through jagged patterns of color. The use of a soft palette of shelter green, warm brown, and pale skin against the stark presence of cold white evokes the conflicting feelings of safety and exposure. The darker colors create a sense of pressure toward the bottom left, while lighter hues diffuse upwards, mimicking the diagonal fall described in the seed. The interplay between dots and stripes reveals a push/pull dynamic, where trust's stability is juxtaposed against the instability of suspicion. The blocked edges signify boundaries that are both protective and limiting.</desc>
