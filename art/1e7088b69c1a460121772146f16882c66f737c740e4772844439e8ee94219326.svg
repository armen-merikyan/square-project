<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This composition expresses the emotional tension between envy and gratitude, using a jagged upward and downward movement. The palette of yellow, orange, deep blue, and muted purple captures warmth colliding against coolness, representing the spectrum of these emotions. The main contrast occurs in the left side where warm colors emerge through a maze pattern against the contrasting broken dots of cooler tones on the right. The arrangement encourages tension and release, as the distinct divisions create rhythmic echoes of visual energy.</desc>
