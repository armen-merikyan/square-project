<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Authority</title>
  <desc id="desc">This artwork captures the tension between panic and control using a contrasting palette of dark violet and soft gold against a black background. The center of the piece, reflecting a sense of control, is hard-edged and structured, while the outer areas are chaotic with splashes of pale green, representing panic. The patterns evoke a central throne-like quality, encircled by an explosive radial chaos—creating a gripping narrative of authority under siege. Broken pixels introduce imperfections, enhancing the emotional turbulence.</desc>
