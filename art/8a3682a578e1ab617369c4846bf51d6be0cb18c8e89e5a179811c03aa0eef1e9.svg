<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Waves</title>
  <desc id="desc">This artwork embodies the duality of joy and grief through a split pattern, where the left side utilizes vibrant yellows and warm oranges symbolizing joy, while the right side showcases muted purples and deep blues representing grief. The clean 'rain' pattern on the joy side contrasts sharply with the fragmented, 'stairs' influenced arrangement on the grief side, emphasizing chaos in contrast to order. The tension between the brightness of joy and the depth of grief creates a rhythm, portraying the oscillation between these emotions, all framed within an implied wave motion across the piece.</desc>
