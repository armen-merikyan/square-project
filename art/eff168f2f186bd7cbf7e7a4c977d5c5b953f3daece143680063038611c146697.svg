<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of the Spectrum</title>
  <desc id="desc">The emotional tone embodies the conflict between joy and grief through its contrasting color palette. The warm yellows and oranges represent joy, clashing against the muted purples and deep blues that signify grief. The layout features a mirrored structure with broken symmetry creating an 'off-center' effect, emphasizing the tension. Bright colors emerge in a zigzag pattern while darker hues create dense clusters, symbolizing the unpredictability of emotion. The broken pixels serve to further embody imperfection, contributing to an overall narrative of unresolved feelings amidst a structured yet chaotic backdrop.</desc>
