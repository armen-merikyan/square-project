<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Falling Between Worlds</title>
  <desc id="desc">This artwork captures the emotional tension between longing and resolve through its use of a pale, muted color palette that evokes a sense of melancholy. The contrasting patterns—checkerboard for longing and radial for resolve—create a visual push and pull across the grid, suggesting movement and conflict. The soft blue hues dominate the composition, representing longing (55-70% of the space), while the bursts of lavender-gray and muted plum signify resolve, interrupting the otherwise serene surface. The placement of more intense colors near the center creates a focal collision that highlights the emotional crux, while the quiet white spaces echo the themes of distance and unresolved feelings.</desc>
