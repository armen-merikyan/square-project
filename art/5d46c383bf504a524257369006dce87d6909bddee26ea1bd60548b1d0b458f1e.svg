<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork explores the emotional tension between desire and emptiness through contrasting colors and patterns. The palette features vibrant coral and orange to embody desire, juxtaposed with muted charcoal and hollow blue to signify emptiness. The two pulse shapes create a dynamic movement that suggests reaching and restraint, while broken pixels introduce an element of imperfection, echoing the struggle between these emotions. The main collision occurs at the center, where the warm colors converge and diverge within the space of the cooler hues, reflecting both overflow and containment. The layout enhances the feeling of conflict and unresolved tension, maintaining an abstract form throughout.</desc>
