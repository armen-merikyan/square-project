<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Against Restraint</title>
  <desc id="desc">This composition captures the emotional struggle of desire versus emptiness. The palette features vibrant hues of hot coral and blood orange, representing desire, juxtaposed with the muted tones of charcoal and hollow blue, symbolizing the heaviness of emptiness. The main contrast emerges along the diagonal, where the saturated colors clash against a backdrop of scaled-down tones, creating a palpable tension. The broken pixels introduce an element of disruption, reflecting the uneven balance of longing and containment, while the layout invites the viewer to sense the ache of aspiration constrained by borders.</desc>
