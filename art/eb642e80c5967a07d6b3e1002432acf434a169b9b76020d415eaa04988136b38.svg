<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece reflects the tension of 'restlessness vs peace' by employing a dynamic palette where vibrant hues collide with dark tones, accentuating the push and pull of emotion. The selection of hot coral and blood orange suggests a fervent energy, while hollow blue and charcoal introduce a grounding silence, representing the dichotomy between desire and calm. The central area is saturated, embodying an overfilled core that visually disrupts the edges, creating a sense of confinement. This layout encapsulates the struggle of memory against motion through echo-like patterns, aligning with the seed's exploration of contrasting emotions and boundaries. The interaction of colors creates a rhythmic flicker, enhancing the feeling of unsettled borders, while intentional broken pixels introduce imperfections, symbolizing the scars left by memories.</desc>
