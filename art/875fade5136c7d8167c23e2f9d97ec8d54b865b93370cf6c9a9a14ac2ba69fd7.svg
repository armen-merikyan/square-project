<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Vessel</title>
  <desc id="desc">The emotional tone reflects a tension between vulnerability and security, depicted through the interplay of color. The palette uses warmer browns and shelter greens to create a sense of warmth against the starkness of cold whites and pale skins. A cracked pattern is split vertically, with the warm veil overtaking the center, symbolizing safety's dominance in vulnerability. The collision of saturated hues on the right with softer tones on the left embodies the echo of exposure, suggesting that pressure and release are in constant dialogue. The intentional broken pixels disrupt the flow, infusing chaos into the structured framework, enhancing the overall tension.</desc>
