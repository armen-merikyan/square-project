<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow of Emotion</title>
  <desc id="desc">This abstract artwork embodies the emotional tension between tenderness and rage. The palette, dominated by deep blacks and vivid reds, represents the overwhelming nature of rage, while the soft pale blue and white serve to hint at tenderness and calm amidst chaos. The collision occurs at the center, where jagged red patterns cut into the quieter fields of blue, symbolizing the struggle and dynamic interplay between these two emotions. The quiet channel of negative space allows the viewer to breathe, representing moments of reflection in the midst of conflict, while the broken edges add a sense of imperfection and vulnerability to the composition.</desc>
