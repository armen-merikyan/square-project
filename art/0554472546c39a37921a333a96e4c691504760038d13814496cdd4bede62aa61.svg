<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Pattern and Disarray</title>
  <desc id="desc">The emotional tone is a juxtaposition between the chaotic energy of panic and the calmness of control. I chose a palette with saturated yellow and orange to symbolize joy and warmth, contrasting with muted purples and deep blues, representing deeper grief and pressure. The arrangement of colors follows a central flow radiating outward, highlighting areas of collision where bright colors clash against darker shades, creating a rhythm of tension and release. The use of broken pixels symbolizes imperfections within order, while the burned edges amplify that sense of chaos, reflecting the back-and-forth between these powerful emotions.</desc>
