<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Stripes</title>
  <desc id="desc">The emotional tone revolves around the contrasting feelings of panic and control, represented through a palette of pink, red, gray, and dark maroon. The grid pattern embodies the chaos of panic while the noise pattern imprints a semblance of control. The main collision occurs in the center where the dense gray and pink lines intersect, echoing the struggle between chaos and order. The layout of falling pixels contributes to the idea of emotional weight descending on the viewer, inviting reflection on the interplay of tension in control versus the descent into panic.</desc>
