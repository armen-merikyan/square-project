<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Veil</title>
  <desc id="desc">This artwork embodies a dynamic visual conversation between the intensity of rage and the tranquility of calm. The palette, consisting of deep blacks and vivid reds against soft pale blues and whites, creates the emotional tension of 'overflow vs containment.' The red, representing rage, erupts in jagged clusters at the center (the main collision point), while cooler colors diffuse outward, like a calming veil attempting to envelop the sharp angles, embodying the tension between emotions. The arrangement features gentle diagonal flows and layered patterns that interpret the abstract theme of eroded symmetry—a dance between chaos and serenity.</desc>
