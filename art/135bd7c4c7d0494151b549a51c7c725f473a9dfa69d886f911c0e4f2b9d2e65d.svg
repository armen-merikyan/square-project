<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition captures the emotional tension between desire and restraint. The palette features rich, saturated tones like red oxide and small orange that pulse with intensity, contrasting with the muted cream and blackened plum that evoke a sense of containment or restraint. The primary contrast occurs at the center of the grid, where bright colors collide with muted tones, creating a spiral pressure effect that reflects the struggle between expansion and confinement. The use of broken pixels adds intentional disruptions in this tension, enhancing the narrative of emotional complexity and unresolved push-and-pull, while the stacked bands create a layered visual experience that suggests movement and depth.</desc>
