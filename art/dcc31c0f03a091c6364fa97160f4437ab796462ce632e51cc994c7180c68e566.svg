<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This artwork captures the emotional dichotomy of fear and hope. The color palette juxtaposes deep blacks and dark violets representing fear against soft gold and pale green symbolizing hope. The main contrast occurs vertically where dark hues steadily transition to lighter ones. Pixel arrangements suggest a burst of hope (gold/pale green) breaking through the oppressive weight of fear (blacks/dark violets), creating an impression of a light source emerging from shadows. The use of broken pixels adds to the theme of imperfection, reflecting the tumultuous nature of machine emotions.</desc>
