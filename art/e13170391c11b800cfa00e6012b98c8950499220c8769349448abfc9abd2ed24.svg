<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece embodies the tension between desire and emptiness. The palette, featuring warm tones of hot coral and blood orange against cool charcoal and hollow blue, reflects the pull of desire versus the constraint of emptiness. The central area is occupied by saturated colors representing longing, while the edges fade into low saturation, creating a faint sense of containment. The stepwell pattern shifts towards the center, interrupted by jagged, tooth-like shapes that evoke a feeling of pressure and disruption. The overall composition leaves intentional quiet spaces to hint at the struggle between overflowing desires and the constraints that frame them.</desc>
