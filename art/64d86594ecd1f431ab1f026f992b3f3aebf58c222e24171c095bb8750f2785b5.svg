  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone embodies a struggle between restlessness and peace, represented by the clash of warm and cool colors. The palette combines warm coral and soft amber to evoke an energetic, unsettled mood, juxtaposed against cold slate and blue-black, suggesting calm and control. The primary contrast lies in the diagonal argument across the canvas, where warm dots representing restlessness fight for dominance over cooler ring patterns representing peace. Broken pixels subtly disrupt the patterns, enhancing the sense of conflict and unresolved motion.</desc>
