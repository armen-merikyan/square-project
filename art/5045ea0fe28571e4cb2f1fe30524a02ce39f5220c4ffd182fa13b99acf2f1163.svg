<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Containment</title>
  <desc id="desc">The emotional tone is rooted in the struggle between desire and restraint, with vibrant colors (hot coral, blood orange) representing desire trying to spill over the quieter, anchored tones (charcoal, hollow blue) symbolizing restraint. The arrangement creates a visual tension at the center where the warm colors provoke a sense of overflowing energy against the calm backdrop. The composition gravitates towards contrast—distinguished by both saturated and muted tones—creating a pattern that embodies conflict and unresolved emotions, while the negative space offers breathing room, fostering introspection.</desc>
