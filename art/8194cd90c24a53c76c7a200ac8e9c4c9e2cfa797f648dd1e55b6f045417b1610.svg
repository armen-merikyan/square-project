<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Signals</title>
  <desc id="desc">This artwork explores the emotional tension between defiance and submission. The use of a bold palette featuring signal green and hot magenta against deep black and static gray creates a vivid contrast, symbolizing the collision of these opposing emotions. The central focus, marked by a distinct pattern of ladder-like segments, disrupts the otherwise chaotic noise of submission, represented by the softer, noisier edges. This arrangement reflects a push and pull, creating a quiet channel in the center, while maintaining an uneven border that adds to the sense of disorder and urgency.</desc>
