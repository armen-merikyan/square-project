  <title id="title">Shadowlight Collision</title>
  <desc id="desc">The artwork intertwines defiance and submission through a stark contrast within a dimly lit landscape. The palette of mourning blacks and deep blues denotes sorrow and resistance, while pale yellow represents the fleeting spark of defiance against a backdrop of quiet submission. The main collision occurs toward the center, where intense patterns of flame reflect defiance, interrupting the softer, channel-like submission patterns. The broken pixels create intentional disruptions, symbolizing moments of unresolved tension amidst calm.</desc>
