<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Division</title>
  <desc id="desc">The artwork embodies the emotional contrast between love and betrayal through a split layout that visually narrates this dichotomy. A warm palette of pinks and reds, suggesting love, collides with darker gray and maroon tones, symbolizing betrayal. The left side employs a softer gradient, reflecting warmth and closeness, while the right side introduces sharper contrasts and disruptive patterns, representing pain and fracture. This reflects the seed’s dynamic of symmetry and break, where repeating motifs create a sense of tension before their inevitable disruption. The arrangement intentionally leaves negative space, highlighting the emotional void left by betrayal.</desc>
