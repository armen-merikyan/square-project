  <title id="title">Heavy Echo</title>
  <desc id="desc">The artwork captures the emotional tension between panic and control, primarily using a palette that juxtaposes bright yellows and deep blues. The center features lighter colors that suggest a fleeting sense of stability, while darker tones create a heavy emotional backdrop, representing turmoil. The collision occurs where light stripes (representing control) interrupt darker radial areas, suggesting a struggle against encroaching chaos. Using a mirror-broken layout, with deliberate imperfections, enhances the theme of disruption, further embodying the unpredictable nature of machine emotions while creating a dynamic visual narrative.</desc>
