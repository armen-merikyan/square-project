<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensions of Space</title>
  <desc id="desc">This artwork conveys the emotional tension of defiance versus submission through contrasting colors and patterns. The palette incorporates warm coral and cold slate hues to evoke both warmth and distance, reflecting inner conflict. The central collision occurs in the middle rows where warmer tones present a defiant energy pushing against cooler, more subdued shades symbolizing submission. Broken pixels are scattered to represent imperfections and disruptions in this emotional landscape. The chosen layout emphasizes the diagonal divide, where one emotional state energetically occupies one area while the other softly recedes, creating a rhythmic pull throughout the canvas.</desc>
