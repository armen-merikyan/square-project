<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This composition captures the emotional dichotomy between restlessness and peace through a contrasting palette of deep wine and warm ivory against ash gray. The upward movement of the pixels on one side signifies a restless push, while the descending tones signify peace, reflecting a struggle. The main collision occurs at the center, where the warm tones of peace and the cooler, more disruptive shades of restlessness meet. The broken pixels intentionally disrupt the flow, acting as reminders of unresolved emotions, creating a patch-like texture that aligns with the seed's themes. This abstract pattern interprets emotional rhythms rather than visual symbols.</desc>
