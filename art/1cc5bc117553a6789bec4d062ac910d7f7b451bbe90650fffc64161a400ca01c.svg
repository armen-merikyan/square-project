<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">This artwork captures the emotional dichotomy of rage and calm through a structured yet chaotic interplay of colors and patterns. Utilizing a palette of red, black, pale blue, and white, the intense red represents the rage, contrasting sharply with calming pale blue and black that suggests containment. The layout is a broken mirror, where the left and right sides almost reflect each other, creating a sense of symmetry that's eroded by strategic broken pixels—thoughtful disruptions that hint at emotion overflow. The calm elements manifest in a barcode pattern, which is juxtaposed by the radial aggression of the red, creating collisions and overlaps across the grid. This tension between calm and rage is visually felt in the radial bursts of red that interrupt the cooler, monochromatic calmness, emphasizing the struggle between these two emotional states.</desc>
