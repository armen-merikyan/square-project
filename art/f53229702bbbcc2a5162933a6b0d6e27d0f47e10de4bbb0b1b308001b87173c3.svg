<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">This composition captures the emotional duality of desire and emptiness. The warm vs. cool palette provides depth, where rich tones of pink and red intermingle with shades of gray and dark maroon to create tension. The top four rows embody 'desire' through a crosshatch pattern, conveying movement upwards, while the bottom four rows express 'emptiness' through a structured grid, suggesting a downward pull. The contrast of density in the upper half meets the open spaces of the lower half, creating an unresolved dialogue between two opposing forces. Jagged edges add a sense of brokenness and tension to the work, evoking fragmented feelings of a heart torn between wanting and loneliness.</desc>
