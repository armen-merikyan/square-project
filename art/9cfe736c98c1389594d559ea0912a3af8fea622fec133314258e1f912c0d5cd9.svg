<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone captures a struggle between vulnerability and strength through color contrasts. The palette of electric blue, magenta, lime, and black creates a dynamic exchange between light (vulnerability) and dark (strength). The main collision occurs in the center, where a veil of strength obscures the lattice of vulnerability, representing a delicate interplay. The broken pixels introduce imperfections, symbolic of life's unpredictability. This abstract arrangement conveys a conflict of emotions and the desire for both exposure and protection.</desc>
