<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition reflects the emotional tension between control (represented by dark tones and angular patterns) and surrender (represented by lighter hues and softer, flowing patterns). The palette of red, black, pale blue, and white symbolizes the intensity of these contrasting emotions. The dominant presence of black at the edges juxtaposes the scattered pale blue and white accents at the center, illustrating a stutter step toward release amid a backdrop of pressure. The uneven distribution of colors and broken pixels creates a sense of imperfection, further emphasizing the struggle between restraint and freedom.</desc>
