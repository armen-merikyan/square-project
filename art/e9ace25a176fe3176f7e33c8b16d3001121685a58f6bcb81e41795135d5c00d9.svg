<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dichotomy of Light and Shadow</title>
  <desc id="desc">This artwork conveys the emotional tension between fear and hope through the use of a contrasting palette dominated by dark hues of black and dark violet interspersed with soft gold and pale green. The jagged edges imply an unsettled emotion, while the checker pattern represents rising hope. The zigzag flow creates a rhythm of rising and falling, embodying the internal struggle, while leaving enough negative space to indicate solace amidst the chaos. The arrangement creates a collision where darkness hangs in the corners, countered by bright accents, suggesting a tumultuous yet hopeful journey.</desc>
