<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This piece explores the dual emotional tones of pressure and quiet through a juxtaposition of dense clusters and expansive spaces. The chosen palette combines deep navy with muted peach and gray, capturing the weight of pressure against the lightness of quietness. The central clash occurs diagonally, where hard edges of compressed red intersect with softer muted fields, suggesting a constant tension between conflicting emotional states. The pattern emerges from the concept of a coil moving inward, expressing a spiral of pressure that becomes increasingly loose towards the edges. This interplay of colors and spatial variation evokes a story of struggle and release, making evident the push and pull of emotion.</desc>
