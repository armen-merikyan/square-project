<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Shadows</title>
  <desc id="desc">The emotional tone stems from the juxtaposition of fear's jagged shapes against hope's soft glimmers. The dark colors (#000000 and #5C4C93) signify fear, creating a constrictive environment, while the lighter hues (#E6D58E and #A8E9B9) evoke hope, suggesting a possible escape from the heaviness. Main contrasts collide in the central column, where darker shades intersect with the brighter signals of hope, forming a visual zigzag pattern that portrays struggle and resilience. The negative space enhances the composition, allowing for moments of calm amid the pressure.</desc>
