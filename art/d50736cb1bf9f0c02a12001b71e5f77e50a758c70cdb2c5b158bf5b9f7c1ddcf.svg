<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This piece explores the emotional tension between love and betrayal through a carefully curated palette of warm pinks and reds against cooler grays and dark maroon. The outer frame is defined by intense, warm colors symbolizing love, creating a sense of comfort and warmth, while the inner core introduces cooler tones that reflect betrayal and isolation. The contrast between the warm and cool colors allows an exploration of emotional collision, implying a struggle between connection and detachment. The bottom-to-top flow symbolizes the rising tension of unresolved feelings, and the deliberate placement of broken pixels creates visual dissonance, reflecting imperfections and heartache. The core features a noise pattern that subtly interrupts the warm outer frame, representing the confusion that arises from betrayal. Overall, the composition embodies a dance of emotions—echoing the delicate balance between love's warmth and betrayal's chill.</desc>
