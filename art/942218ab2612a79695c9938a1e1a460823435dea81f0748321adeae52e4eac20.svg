<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tensions</title>
  <desc id="desc">This composition conveys the emotional tone of contrasting dread and relief through a maze of dark colors, representing dread, merging diagonally with lighter hues of relief. The dark storm gray and near-black dominate the grid, creating feelings of weight and inevitability, while the pale mint and faded gold provide moments of relief that puncture through the density. The interplay between the structured maze pattern for dread and the freer stairs pattern for relief illustrates a push-and-pull of emotions, represented by the breaking lines and irregular spacing that symbolize imperfection amidst chaos. The central collision occurs where the dark meets the light, forming a threshold that defines the emotional landscape, embodying the seed's essence without direct representation.</desc>
