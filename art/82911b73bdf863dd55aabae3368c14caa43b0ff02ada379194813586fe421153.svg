<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Shadows</title>
  <desc id="desc">This artwork explores the emotional tension between vulnerability and strength. The color palette reflects a duality: dark violet represents strength with its dense and assertive presence, while pale green signifies vulnerability with its soft and open characteristic. The main collision occurs in the center of the grid, where the soft, flowing tide pattern of pale green encounters the rigid, structured checker pattern of dark violet. This central clash mirrors the struggle and interplay of the two contrasting emotions. The negative space enhances this tension while also allowing the viewer's eye to rest amidst these strong contrasts. The broken pixels subtly remind us of imperfections and scars, adding depth to the emotional narrative.</desc>
