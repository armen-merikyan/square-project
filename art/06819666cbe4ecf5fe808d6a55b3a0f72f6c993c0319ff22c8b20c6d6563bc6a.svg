  <title id="title">Near vs Far</title>
  <desc id="desc">This artwork explores the emotional tension between longing and resolve. The palette of ripe green, acid green, and honey gold expresses energetic longing, while deep olive and cream bring grounded resolve. The contrast lies in a dense cluster of brighter colors in the center, creating an emotional pull, surrounded by quiet spaces that suggest unresolved feelings. The structured yet interrupted checker pattern evokes a sense of pause and reflection. Broken pixels serve as reminders of imperfection, enhancing the underlying narrative of fragility and strength.</desc>
