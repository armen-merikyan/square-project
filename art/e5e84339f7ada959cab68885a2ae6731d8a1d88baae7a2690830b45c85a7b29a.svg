<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Duality</title>
  <desc id="desc">The emotional tone balances between the heaviness of grief and the lightness of joy. Using a palette that combines vibrant yellows and oranges with deep blues and muted purples reflects the contrasting feelings. The layout emphasizes a strong contrast, with a maze-like structure representing joy in the inner core, surrounded by a checker pattern of grief at the edges. This creates a dynamic interplay between the bright and the subdued, where the bright colors pulse and expand, while the muted colors feel heavy and fragmented, encapsulating the interplay of love and betrayal. Broken pixels introduce an imperfection that enhances the overall emotional depth, with the central contrast occurring where these two emotional themes collide.</desc>
