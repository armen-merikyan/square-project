<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Echoes</title>
  <desc id="desc">This artwork captures the emotional tension between longing and resolve by using a palette of clean white, ice blue, ink black, violet gray, and warning orange. The white and ice blue establish a quiet, expansive field which represents longing, while the dark accents of ink black and warning orange create areas of dense structure symbolizing resolve. The main collision occurs in the center where these patterns overlap, reflecting the push and pull between chaos and order. The striped patterns for longing brush against the broken frame of resolve, enhancing the sense of tension that speaks to both intimacy and distance.</desc>
