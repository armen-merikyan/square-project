<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone centers around the duality of strength and vulnerability. The palette of clean white, ice blue, ink black, violet gray, and warning orange embodies both clarity and confusion. The use of white and pale blue represents light vulnerability, while the darker colors signify strength and stability, with white occupying the center to evoke exposure. The main collision occurs in the central area, where the tension between these emotions is strongest, portrayed by overlapping patterns of fault lines and noise, creating a sense of protected chaos. The rising signal layout evokes hope against a backdrop that hints at weight, with broken pixels introducing imperfection into the otherwise orderly composition.</desc>
