<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience in Contrast</title>
  <desc id="desc">The artwork embodies the emotional conflict between vulnerability and strength, depicted through an interplay of colors that evoke a sense of exposure and shelter. The palette combines warm brown and shelter green to convey strength, while pale skin and cold white express vulnerability. The central dense area shaped by a glitch pattern creates a stark contrast against the surrounding broken dots that represent fragile moments. This collision occurs at the center, inviting viewers to explore the tension between safety and exposure, resonating with the seed's themes. The intentional broken pixels add layers of imperfection, reflecting life's unpredictability, while maintaining a serene aesthetic through negative space.</desc>
