<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This artwork captures the emotional spectrum between rage and calm, presenting a stark contrast through the interplay of black and pale blue. The black represents compression and pressure, while the pale blue embodies calmness and lightness. The central area is densely packed, evoking a feeling of intensity, flanked by open spaces symbolizing tranquility. Sharp edges from the rage element collide with smoother transitions of calm, creating an unresolved tension that narrates a journey from chaos to serenity. The chosen colors and broken pixels reflect a confrontation against the mirror of self, finding beauty in imperfection and asymmetry.</desc>
