<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed vs. Sheltered</title>
  <desc id="desc">The emotional tone centers on the contrast between vulnerability and strength, depicted through a split in the composition that channels feelings of tension and protection. The palette, primarily dark with accents of pale blue and white, enhances the sense of vulnerability—expressed through the lighter, softer colors—against the solid strength of black. The main collision occurs towards the center, where the dark expands outward, threatening the pale core, embodying exposure facing potential encroachment. The presence of broken pixels serves to emphasize imperfection in the invulnerable form, suggesting scars and resilience in the face of fragility, while the negative space emphasizes a sense of emptiness and unease.</desc>
