<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Pulse</title>
  <desc id="desc">This artwork captures the tension between clarity and distortion, embodying the struggle of a pulse amidst chaotic noise. The palette utilizes deep navy and black as the dominant colors, symbolizing the density of noise, while the dim cyan represents the faint signal pushing through. The vertical split layout creates a clear division between the two emotional states, allowing the sharp, broken pixels to interrupt the overall composition, underscoring the theme of disruption amidst a structured framework. The left half is filled with darker, chaotic elements, while the right half contains lighter, clearer accents that collide with the heavier tones.</desc>
