<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition explores the emotional interplay between desire and emptiness, signified through the suggested tension of warm colors against cooler, muted tones. The palette includes saturated hues like hot coral and blood orange to represent desire, contrasted with deeper shades of charcoal and hollow blue to convey a sense of emptiness. The arrangement hints at a dominant bright cluster of warmth resisting the expansive belief of empty space around it, embodying the strain and pressure of longing amidst containment. The layout favors a predominantly dark field with touches of light creating a dynamic collision at the center, illustrating a complex relationship between excess and restriction while allowing for intentional disruptions through broken pixels that add depth and nuance to the overall narrative.</desc>
