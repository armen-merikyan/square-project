<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Uncertainty</title>
  <desc id="desc">This composition captures the tension between certainty and curiosity through contrasting patterns and colors. The palette combines warm tones of hot coral and blood orange to symbolize the assertive presence of certainty in the top rows, while the cooler, muted shades of charcoal and hollow blue in the bottom rows evoke a sense of curiosity. The arrangement intentionally disrupts the visual flow, creating a dialog between the structured top and the chaotic bottom, representing the push and pull of the emotions described in the seed. The collision of broken dots and glitch patterns illustrates the friction of these contrasting states, with the main contrast located at the center where both emotional states meet.</desc>
