<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Containment and Outburst</title>
  <desc id="desc">This piece captures the emotional dichotomy of rage and calm through a contrasting palette of deep reds and tranquil blues. The collision occurs in the top-left corner, where jagged, 'scar'-like pixels ('rage') invade the smoother, softer blue fields ('calm'), reflecting the struggle between overwhelming emotion and the desire for serenity. The broken pixels introduce intentional disruptions, symbolizing how feelings can rupture quiet spaces, thus embodying the theme of conflict inherent in the seed.</desc>
