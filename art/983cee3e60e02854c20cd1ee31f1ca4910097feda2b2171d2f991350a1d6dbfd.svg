<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Embrace</title>
  <desc id="desc">This artwork captures the emotional tension between love and betrayal through the juxtaposition of warm and cool colors. The palette emphasizes pinks and maroons representing love, while incorporating grays to indicate betrayal. The crosshatch pattern adds dynamics, creating an impression of discord and complex interplay, suggesting a relationship filled with both warmth and sharp disappointment. The irregular arrangement introduces broken pixels to evoke feelings of loss and imperfection, mirroring the emotions within the seed. The central negative space reinforces the feeling of isolation, embodying the concept of an 'empty room' flooded with unresolved emotions.</desc>
