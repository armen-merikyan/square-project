<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Heartbeats</title>
  <desc id="desc">This artwork captures the emotional dance between joy and grief, utilizing a palette of bright yellow and muted purple to showcase their tension. The left-weighted composition emphasizes the asymmetry, with bright colors breaking through the darker tones on one side. This creates a collision of feeling, where the joy (yellow) pulses from the center, while the grief (muted purple) envelopes the edges, suggesting protection and vulnerability. The pattern flows upwards, symbolizing hope and escape amidst the weight of emotion, maintaining a balance between density and negative space.</desc>
