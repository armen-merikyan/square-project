<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Tension</title>
  <desc id="desc">This artwork captures a dynamic interplay of relief and dread through contrasting color choices and emotional weight. The palette of pale mint and soft sky suggests a sense of lightness and release, while storm gray and near black invoke feelings of dread and pressure. The incorporation of checker and maze patterns emphasizes the dichotomy between order and chaos. The central collision occurs where the light tones break through a dense maze of dark hues, creating a visual representation of struggle and escape. Broken pixels introduce intentional imperfections, adding layers of emotion, reminiscent of unresolved tension. Overall, the artwork conveys a narrative of seeking relief amidst chaos, allowing the viewer to experience both discomfort and calm simultaneously.</desc>
