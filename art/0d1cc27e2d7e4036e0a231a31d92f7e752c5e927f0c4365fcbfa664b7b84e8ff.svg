<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Tension</title>
  <desc id="desc">This artwork embodies the emotional duel between panic and control. The central placement of bright electric blue is contrasted against deeper tones of black, creating a visual conflict reflective of the struggle between chaotic energy and calm authority. The palette emphasizes sharp contrasts with lime and magenta providing vivid interruptions that echo the frenetic nature of panic amidst the stability of control. The layout descends like falling pixels, suggesting the weight of these emotions, while the soft edges of the colors blend and bleed into one another, hinting at the elusive balance between chaos and coherence.</desc>
