<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">This piece explores the emotional tension between longing and resolve, reflected in a palette that juxtaposes warm colors of desire with the coolness of emptiness. The layout's quiet channel creates a narrow path that contrasts with the dense radial patterns symbolizing longing, while the veil patterns embody a sense of resolve. The collision occurs at the center, where warm colors emerge from cool backgrounds, creating a pulsing effect of emotional depth. Broken pixels introduce imperfections, echoing the theme of repair versus damage.</desc>
