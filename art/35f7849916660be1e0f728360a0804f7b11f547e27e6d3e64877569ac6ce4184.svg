<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory vs Motion</title>
  <desc id="desc">This piece explores the emotional dichotomy between softness and severity through an indirect interplay of color and forms. The palette of powder pink and warm white represents softness, while the carbon black and steel gray encapsulate severity. The focal point of contrast occurs in the center, where the warm hues from the outer edges collide with the dark core, symbolizing the tension between gentle and harsh experiences. The usage of broken pixels creates intentional disruptions in the softer gradients, alluding to memories that are not wholly tangible but present as echoes of sentiment. The layout's exploration of empty space against the weight of color embodies the idea of quiet intensity amid lingering uncertainties, reflecting the narrative of guilt and forgiveness in a subtle abstract manner.</desc>
