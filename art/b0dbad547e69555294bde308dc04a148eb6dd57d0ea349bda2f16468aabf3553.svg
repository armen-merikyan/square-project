<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This composition explores the tension between trust and suspicion, utilizing a palette that reflects the concepts of safety (shelter green, warm brown) versus exposure (cold white, open blue). The left side, dominated by the darker tones, evokes suspicion with a chaotic pattern reminiscent of teeth, while the right side offers a soft, rain-like quality representing trust. The main collision occurs at the vertical split where the colors nearly clash but maintain a boundary, suggesting the constant negotiation between these emotions. Broken pixels introduce deliberate imperfections, pushing the narrative of resilience amid fragility. Negative space is preserved, allowing the emotions to breathe and resonate.</desc>
