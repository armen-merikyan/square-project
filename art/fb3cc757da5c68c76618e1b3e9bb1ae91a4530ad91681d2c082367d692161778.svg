<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Stability</title>
  <desc id="desc">The emotional tone juxtaposes control's calmness with panic's chaos. The palette of navy, black, and dim cyan reflects loneliness and depth, evoking a sense of isolation amid tension. The main contrast occurs where structured grid patterns clash with fragmented, cracked areas, illustrating the struggle between order and chaos. The seed's notion of 'center vs edges' inspired the arrangement—with stronger colors from the edges bleeding inward, symbolizing the encroachment of panic into a controlled center. The edge style emphasizes bottom-weighting, creating a visual grounding that is upended by chaotic pixel arrangements, maintaining an air of unresolved tension.</desc>
