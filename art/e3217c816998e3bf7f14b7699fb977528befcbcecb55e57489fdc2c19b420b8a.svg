<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shifting Fortitudes</title>
  <desc id="desc">This composition embodies the tension between vulnerability and strength. The palette features soft colors like powder pink and warm white to represent vulnerability on the left side, contrasting sharply with the deeper hues of carbon black and steel gray that depict strength on the right. The collision happens in the center where strong radial patterns interact with softer halo effects, creating a dynamic disturbance. The 'diamond' shape is abstracted through a collision of textures that convey a push-pull between safety and exposure, symbolizing a core of vulnerability surrounded by fortifying edges.</desc>
