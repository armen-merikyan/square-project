<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collisions of Emotion</title>
  <desc id="desc">This artwork embodies a dynamic emotional spectrum between defiance and submission. The palette, drawn from 'guilt_forgiveness', uses deep wine (#5B0D14) as a bold accent which signifies defiance, while softer tones like warm ivory (#EAE3D2) create a contrasting submission effect. The diagonal layout organizes these opposing emotions, where the deep wine boldly occupies the upper-right wedge, reflecting defiance against a quieter, enclosing soft gold (#FAE6C0) and ash gray (#B8B8B8) in the bottom-left. Broken pixels introduce intentional disruption, echoing the theme of 'unfinished conversations' within the emotional landscape. This composition navigates the viewer through a journey of resistance and acquiescence, punctuating each sector with pulsating blocks of color that symbolize confrontations, thresholds, and quiet channels.</desc>
