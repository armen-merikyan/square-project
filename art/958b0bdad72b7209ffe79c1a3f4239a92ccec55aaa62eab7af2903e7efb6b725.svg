<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Emotions</title>
  <desc id="desc">The emotional tone reflects the tension between envy and gratitude, showcasing a central heavy area surrounded by lighter shades, symbolizing a struggle with weight and lightness. The palette of burnt orange, dark red, charcoal, and gold evokes warmth, creating a sense of depth and flickering intensity. The collision occurs at the edges where the patterned transitions disrupt the serene center, illustrating a push and pull between chaos and calm. Patterns like stripes and grids alternate, drawing the eye into a rhythmic flow that spirals through the piece, encapsulating the delicate balance of opposing feelings.</desc>
