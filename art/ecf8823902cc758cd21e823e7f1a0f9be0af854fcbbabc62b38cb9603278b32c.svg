<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Balance</title>
  <desc id="desc">This artwork encapsulates the emotional tension between restlessness and peace. The color palette features muted fields of off-white and dust gray representing tranquility, alongside bold bursts of compressed red and dark navy suggesting unease and agitation. The darkness interspersed with quiet light creates a clear contrast, embodying the struggle between peace and disruption. The overlapping patterns of broken dots (for tranquillity) and stacked structures (for restlessness) collide predominantly in the bottom corner, creating a sense of pressure and motion, which resonates with the seed's themes of memory and motion.</desc>
