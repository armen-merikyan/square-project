<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collateral Tides</title>
  <desc id="desc">This artwork encapsulates the emotional tension of softness and severity by contrasting gentle ripple effects with glitch-like interruptions. The palette combines the warmth of powder pink and warm white against the starkness of carbon black and steel gray, evoking feelings of vulnerability versus rigid control. The main collision occurs at the center, where quiet elements ripple into harsher, glitchy marks, reflecting a dichotomy that invites contemplation of guilt and forgiveness. The choice of a keyhole as a shape seed metaphorically represents an opening to deeper emotional landscapes, enriching the abstract narrative of the piece.</desc>
