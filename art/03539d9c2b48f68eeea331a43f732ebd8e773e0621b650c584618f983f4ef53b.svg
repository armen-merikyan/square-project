<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Divergence</title>
  <desc id="desc">This artwork embodies the emotional tension between defiance and submission. The palette of 'softness_severity'—a blend of warm whites with stark blacks and sharp crimson—reflects the struggle between the soft 'submission' lattice and the more angular 'defiance' rings. The arrangement creates stark contrasts, with the main collision at the center where dense crimson circles fade into an encircling grid of soft whites, suggesting both protection and a challenge. Broken pixels emphasize imperfection, disrupting the otherwise symmetrical layout to enhance the sense of invasion and pressure.</desc>
