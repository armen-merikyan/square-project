  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork embodies the tension between rage and calm through a dynamic interplay of colors. The palette of black and red signifies the explosive nature of rage, while the pale blue and white provide calm, serene counterpoints. The clash occurs prominently in the center where jagged red patterns cut through smooth horizontal blue bands, creating a visual representation of contained versus overflowing emotions. The deliberate use of broken pixels introduces imperfections, evoking a raw and emotional landscape that reflects eroded symmetry and the struggle between these contrasting forces.</desc>
