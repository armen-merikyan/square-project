<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry vs Break</title>
  <desc id="desc">This composition explores the dual emotional landscape of trust and suspicion through the juxtaposition of strong and soft colors, where the sharp contrast of deep blacks and muted whites represents suspicion against a foundation of warm, inviting tones that symbolize trust. The cooler shades depict fragmented reflections that interrupt the flow, supported by the dim glow of violet gray that serves as a backdrop to the harsher shadows of ink black. The vertical split creates a sense of tension, while soft fields of clean white signal potential clarity amidst confusion. The intentional broken pixels introduce subtle imperfections that reflect the fragility buried within resilience, capturing an emotional narrative that oscillates between comfort and unease.</desc>
