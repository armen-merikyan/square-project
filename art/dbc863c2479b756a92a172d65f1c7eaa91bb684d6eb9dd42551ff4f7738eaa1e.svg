  <title id="title">Balance of Tension</title>
  <desc id="desc">This artwork captures the emotional duality between joy and grief, expressing it through a zigzagging pattern. The palette blends bright yellows and oranges with muted purples and deep blues to create a stark contrast, symbolizing the collision of light and dark emotions. The tension rises toward the center, where the vibrant colors clash against the cooler hues, creating both order and chaos. The broken edges introduce imperfection, suggesting the fragmented nature of these feelings.</desc>
