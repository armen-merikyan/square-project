<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoed Balance</title>
  <desc id="desc">This artwork explores the emotional tension between safety and exposure through a soft color palette of warm brown and shelter green against a pale skin background, echoing the feeling of protection in an open space. The dominant warm brown occupies a diagonal wedge, while the cooler pale skin and hints of cold white breathe through, representing exposure. The contrast occurs through the density of warm colors colliding with lighter hues, punctuating the center, where vulnerability and shelter braid into a rhythmic pattern.</desc>
