<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmony in Dissonance</title>
  <desc id="desc">This artwork embodies the emotional tension between joy and grief. The upper half uses warm yellows and oranges, creating an expanding feel with circular patterns, representing joy and vibrancy. The lower half introduces deep blues and muted purples, emulating a fragmented, drooping quality that reflects grief. The contrast exists in the intensity of the upper colors meeting the subdued tones below, suggesting a transition from elation to sorrow. The intentional 'broken pixels' introduce imperfection, enhancing the narrative of hidden versus exposed emotions, while maintaining at least 10% negative space for visual breathing room.</desc>
