<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Tension</title>
  <desc id="desc">This artwork embodies the emotional tension between softness and severity. The palette combines sharp crimson and carbon black for stark contrasts, juxtaposed with soft hues of warm white and powder pink to evoke a sense of gentleness. The circular pattern of soft colors falters against the hard-edged cracks of severity, generating a collision in the center where the two emotional states interrupt each other. The overall structure is bottom-weighted, promoting a feeling of density toward the bottom while allowing openness at the top, suggesting release and airiness. The deliberate asymmetry in color application embodies the pulses of emotion, echoing the complexity of guilt and forgiveness.</desc>
