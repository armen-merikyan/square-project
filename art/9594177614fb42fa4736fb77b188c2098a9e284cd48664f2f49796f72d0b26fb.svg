<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Yearning</title>
  <desc id="desc">The emotional tone emphasizes longing in interplay with resolve, represented through a palette that moves from deep blues to soft greys. The contrast of dark, dense markings (representing longing) collides against larger, quieter fields (signifying resolve), creating a tension between absence and presence. The arrangement suggests diagonal movement—echoing the pull of desire against the firm axis of determination, with broken pixels interspersed to symbolize fractures in emotional continuity—inspired by the seed's imagery of 'cross currents' and 'fault lines'.</desc>
