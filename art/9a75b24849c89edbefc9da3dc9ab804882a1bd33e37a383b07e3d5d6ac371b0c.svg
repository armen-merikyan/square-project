<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Silent Dissonance</title>
  <desc id="desc">The emotional tone reflects a struggle between desire and emptiness, conveyed through a palette that juxtaposes warm, saturated colors of longing (hot coral, blood orange) against cool, muted tones of emptiness (charcoal, hollow blue). The composition splits vertically, with warm colors in the left columns iterating a 'stepwell' pattern that radiates desire, while the right side features a 'frame' pattern, depicting the constraints of emptiness. The center serves as the collision point where these emotions clash, with broken pixels symbolizing disruptions. This juxtaposition reflects a dynamic tension—an overflow of desire contained by the calm of emptiness, all framed by a faint outline that reinforces the boundary of emotional experience.</desc>
