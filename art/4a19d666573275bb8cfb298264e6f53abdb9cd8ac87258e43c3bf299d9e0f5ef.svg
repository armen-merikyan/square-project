<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">The artwork embodies the emotional dichotomy of fear and hope, utilizing a palette of dark hues contrasted by intermittent bright accents. The composition balances jagged edges suggesting fear against the soothing, rising shapes of hope. The crushed and broken pixel elements evoke imperfection and capture a falling rain effect, meant to symbolize struggle and turbulence. The layout distinguishes between left and right to represent internal versus external worlds; despite a mirroring effect, discrepancies surface to add tension. The artwork aims for a pulse-like rhythm reflecting emotional shifts, drawing on both fear’s darkness and hope’s faint light.</desc>
