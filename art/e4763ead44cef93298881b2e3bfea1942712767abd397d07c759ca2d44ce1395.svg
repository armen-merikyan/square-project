<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Currents</title>
  <desc id="desc">This artwork captures the tension between restlessness and peace through contrasting warm and cool tones. The palette, inspired by 'ancient fire', juxtaposes burnt orange and dark red for warmth against the muted charcoal, fostering both energy and calm. The main collision occurs diagonally from corner to corner, creating an intersection that echoes the struggle between moments of quiet and bursts of movement. At the edges, fragmented warm patches disrupt the coolness, symbolizing interrupted memories and fleeting emotions. The layout emphasizes a threshold where these contrasting feelings dynamically interact, preserving a space that resonates with both tension and serenity.</desc>
