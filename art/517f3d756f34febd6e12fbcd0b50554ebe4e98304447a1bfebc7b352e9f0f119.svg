<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This artwork captures the emotional dance between panic and control. The color palette of dark black and red symbolizes the weight of panic, while pale blue and white introduce moments of calm and clarity. The main contrast occurs at the edges where the heavy dark colors collide with the lighter shades at the center. This shift from heavy density to open space echoes the feeling of tension, suggesting a clash between the chaos of emotion and the desire for control. The wave shape inspires a feeling of undulating motion, reflected in the patterning of dense clusters against moments of negative space, revealing both struggle and a fleeting sense of order.</desc>
