<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erosion of Spark</title>
  <desc id="desc">This composition reflects the tension between bright, sharp vitality (spark) and muted, settled calm (ash). The chosen palette combines vibrant electric blue and magenta with deep black and subtle shades of gray, symbolizing the collision between energy and repose. The main contrast appears diagonally across the square, with clusters of bright colors gradually eroding into darker fields, creating a feeling of gradual loss or transition. The wave-like pattern from the spark side interrupts the frame-like structure associated with ash, embodying the interplay of memory versus erasure through the grid-like arrangement. Broken pixels add intentional disruptions, reflecting fragility within resilience.</desc>
