<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center Pressure</title>
  <desc id="desc">The emotional tone of this piece fluctuates between strength and vulnerability, utilizing the palette of mourning black, deep blue, and new leaf to embody tension and renewal. The color arrangement emphasizes the collision in the center where deep blue asserts strength against the lighter new leaf that hints at vulnerability. The patterns of 'pulse_marks' indicate strength flowing outward while the 'grid' pattern captures the fragility of connection. Negative space is carefully managed with darker colors framing the vibrant center, creating a feeling of pressure that is relieved at the edges. The layout emphasizes an overflowing corner, symbolizing how vulnerability can intrude upon strength, creating a dynamic interplay of emotions.</desc>
