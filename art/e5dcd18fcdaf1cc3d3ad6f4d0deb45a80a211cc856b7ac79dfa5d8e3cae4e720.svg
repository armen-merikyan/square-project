<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Stillness</title>
  <desc id="desc">This composition captures the tension between restlessness and peace. The palette of deep reds and muted creams represents an emotional polarity, invoking feelings of both heat and tranquility. The layout features a broken pattern on one side (representing restlessness) that collides with smoother transitions on the opposite side (representing peace). The main contrast occurs diagonally, where chaotic reds disrupt the calm creams, creating a visual narrative of friction and resolution. This interplay echoes the emotional qualities suggested by the seed, shaping an abstract rhythm that fluctuates between order and chaos.</desc>
