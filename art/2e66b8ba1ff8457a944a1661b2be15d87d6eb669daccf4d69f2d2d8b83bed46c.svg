<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light and Weight</title>
  <desc id="desc">This composition conveys the emotional dichotomy of joy and grief through contrasting color fields. The left side, representing joy, utilizes bright yellows and light oranges in a noise pattern, creating an expanding, open feel. The right side, symbolizing grief, uses deep blues and muted purples, arranged with fractured patterns to signify heaviness and fragmentation. The contrasting color placement creates tension, while the layout highlights a balance broken by perceived weight, with intentional empty spaces preserving a sense of release.</desc>
