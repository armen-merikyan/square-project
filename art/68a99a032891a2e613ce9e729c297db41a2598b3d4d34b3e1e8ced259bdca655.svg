<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Longing</title>
  <desc id="desc">The emotional tone evolves from a struggle between warmth (desire) and coolness (emptiness), represented by the palette of yellow, orange, deep blue, and muted purple. The pattern of frames (desire) creates a structured border that conflicts with the maze (emptiness) that occupies the inner space. The collision of bright yellows and oranges interacts with the deep blues and muted purples, invoking a sense of yearning amid isolation, with broken pixels adding an element of imperfection to convey the rawness of emotion.</desc>
