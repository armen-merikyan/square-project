  <title id="title">Tension Between Light and Dark</title>
  <desc id="desc">This artwork embodies the duality of relief and dread through contrasting colors and spatial arrangement. The chosen palette of dark violet, glimmers of soft gold, and pale green activates feelings of unease tempered by hope. The distribution creates a top-heavy layout, allowing darker colors to dominate while lighter shades peep through, suggesting tension and a yearning for balance. The symmetrical yet broken pattern reflects internal conflict, where the escape from dread is just within reach, but not fully realized.</desc>
