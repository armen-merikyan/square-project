<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork embodies the clash between desire and emptiness. The palette merges warm, saturated colors (hot coral, blood orange) symbolizing yearning, against cooler muted shades (dust pink, charcoal, hollow blue) representing hollowness. Desire dominates the composition, positioned in a diagonal wedge that evokes a relentless pull towards fulfillment, yet meets a stark boundary of cooler tones, suggesting a struggle against restraint. The broken pixels serve as interruptions, symbolizing the imperfections in the quest for balance. The overall narrative contrasts yearning for connection with an underlying void, effectively captured in an abstract dialogue of color and form.</desc>
