<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Yearnings</title>
  <desc id="desc">This artwork explores the tension of emptiness versus desire through a balanced yet asymmetric pattern. The palette, featuring deep navy and soft dim cyan, evokes feelings of solitude while hints of black create stark contrasts. The arrangement mirrors on either side but incorporates 'broken pixels' to illustrate interruptions that highlight the emotional conflict. The flow climbs through the density in the center towards the edges, suggesting a rising signal against a background of emptiness, mirroring the struggle between longing and solitude.</desc>
