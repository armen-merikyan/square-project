<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition captures the emotional tension between desire and emptiness through a blend of warm and muted colors. The hot coral and blood orange suggest a vibrant desire, while the charcoal and hollow blue embody a sense of emptiness. This juxtaposition creates a visual echo of conflict, as the bright cracks of desire struggle against the dense, muted areas of restraint. The central focus, marked by a denser pattern of warm colors, collides with the stark emptiness toward the edges, highlighting the overarching theme of yearning constrained by limits. The use of broken pixels adds intentional disruptions, reflecting imperfections in desire. The layout of scattered repairs adds depth to this emotional narrative, as bright accents emerge from dark voids.</desc>
