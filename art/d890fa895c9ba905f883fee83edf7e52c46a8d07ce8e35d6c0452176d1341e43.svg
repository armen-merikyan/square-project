<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Contrasts</title>
  <desc id="desc">This composition expresses the duality between envy and gratitude. The left half utilizes shades of dark maroon and gray, suggesting heaviness and reflection, like the mirror of envy. The right side, in light pinks and reds, conveys warmth and appreciation, highlighting gratitude's lightness. The jagged edges signify interruptions, combining both emotions in a constant push-pull. Flowing from left to right, the density builds towards the center, evoking tension that resolves but remains unresolved.</desc>
