<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resilience</title>
  <desc id="desc">This artwork embodies the emotional duality of vulnerability and strength through a dynamic balance of warm and cool colors. The palette of hot coral and blood orange evokes warmth and intensity, embodied by the 'strength' patterns in a stepwell format, contrasting with soft tones of dust pink representing 'vulnerability'. The edges are highlighted with a charcoal hue, denoting hard edges that protect the lighter pinks, creating a tension of exposure against shelter. The central collision point, where warm tones meet the cool shades, invites the viewer to explore the interaction of isolation and connection amidst negative space, symbolizing the push and pull between these emotional states. A few broken pixels introduce intentional imperfection, suggesting the scars of experience that shape resilience.</desc>
