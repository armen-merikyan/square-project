<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone is rooted in the tension between vulnerability and strength. The palette of clean white, ice blue, ink black, violet gray, and warning orange creates a stark contrast, embodying the tension between exposed light and the severity of dark edges. The collision occurs predominantly in the center with a chaotic interplay of broken pixels disrupting the order, symbolizing emotional leaks and unshielded spaces. The layout reflects a near-complete frame, with breaks showcasing vulnerabilities. The design captures a story of resilience and fragility, allowing quiet fields of color to balance against accentuating disturbances, encapsulating the essence of the seed.</desc>
