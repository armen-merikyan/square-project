<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Near vs Far</title>
  <desc id="desc">This piece captures the emotional tension between longing and resolve, represented through a contrast of colors that reflect both distance and connection. The selected palette of deep reds and soft pale blues conveys a narrative of struggle and serenity, while the inclusion of black and white adds an element of stark juxtaposition. The main collision occurs centrally, where dense and broken patterns intersect, symbolizing the tension between the desire for closeness and the barriers that exist. The abstract arrangement of colors embodies a pulse, echoing the nuances in human emotion without literal depiction.</desc>
