<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">The emotional tone captures the oscillation between restlessness and peace, where the gentle ripples of the lighter colors suggest serenity, while the darker tones invoke unease. The palette mixes cosmic indigo and void black to emphasize depth and contrast, while cold gold and deep teal introduce pockets of interruption and brightness, symbolizing fleeting memories and moments of peace. The main collision occurs at the bottom left corner, where dense textures of the 'braid' pattern create a visual weight against the lighter 'ripple' wave spreading outwards, representing the dynamic struggle between movement and stillness.</desc>
