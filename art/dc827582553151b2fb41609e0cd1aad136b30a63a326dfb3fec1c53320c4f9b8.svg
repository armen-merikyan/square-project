<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Resilience</title>
  <desc id="desc">This composition captures the emotional tension between vulnerability and strength through a layered approach. The pale ruptured center symbolizes exposure, surrounded by darker shades that offer a sense of density and protection. The chosen muted palette of off-white, dust gray, compressed red, dark navy, and faint peach creates a soothing yet contemplative atmosphere, with a focus on contrasts. The main collision occurs in the center, where light meets dark, reflecting the balance between safety and exposure. The arrangement reflects random cascades akin to falling pixels, embodying both chaos and structure, emblematic of the seed's narrative.</desc>
