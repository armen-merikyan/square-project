<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Choices</title>
  <desc id="desc">This artwork embodies the emotional tone of defiance versus submission through the contrasting palette of deep navy and black, representing the weight and pressure of emotions. The dim cyan adds an element of quiet defiance, while the white introduces moments of openness amid the darker shades. The 'falling_pixels' layout evokes a sense of descent and release, with colors cascading from dark to light, illustrating a fight against an oppressive frame. The bottom-weighted edge evokes a sense of being anchored, while the broken pixel placements create imperfections to signify the chaotic interplay of love and betrayal. Overall, the arrangement creates a dynamic tension, with sharp contrasts emphasizing the emotional struggle between hope and despair.</desc>
