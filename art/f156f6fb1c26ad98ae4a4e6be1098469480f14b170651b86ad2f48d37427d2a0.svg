<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Exposure</title>
  <desc id="desc">This piece embodies the emotional tension between safety and exposure through the use of contrasting colors and patterns. The palette draws from warm browns and cool greens, representing shelter and vulnerability, respectively. The placement of color creates an echo effect on the right, suggesting a push-pull dynamic. Light colors pulse from the center, interrupted by darker tones at the edges, capturing the essence of pressure and release. The collision points occur in the middle, where the warm inner tones clash against the cool outer borders, illustrating a struggle between enclosure and exposure.</desc>
