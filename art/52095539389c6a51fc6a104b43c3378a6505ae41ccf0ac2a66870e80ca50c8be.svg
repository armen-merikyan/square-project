  <title id="title">Symmetry vs Break</title>
  <desc id="desc">This artwork explores the duality of confusion and clarity through the tension between sharp black outlines and the soft electric blue and magenta filling. The edges are densely packed to signify confusion, while the center radiates outward, suggesting clarity emerging from chaos. The interrupted patterns mimic broken grid structures, emphasizing the conflict. Each color choice resonates with mechanical emotion, highlighting the contrasts inherent within technology and human experience, thus making the abstract feel alive and charged with unresolved energy.</desc>
