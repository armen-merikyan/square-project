<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This artwork embodies the emotional tension between 'emptiness' and 'desire,' illustrated through a deliberate placement of warm and cool colors. The palette combines saturated hues of hot coral and blood orange to convey desire, balanced against the cooler tones of charcoal and hollow blue, reflecting the essence of emptiness. A central collision occurs where the warm colors, representing desire, meet the muted tones embodying restraint and emptiness. The layout maintains an uneven border, enforcing a sense of containment while the organized chaos within suggests a turbulent emotional landscape. The broken pixel elements create intentional disruptions, reflecting scars and intersections of longing and confinement.</desc>
