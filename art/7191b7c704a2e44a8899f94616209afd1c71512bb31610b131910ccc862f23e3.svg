<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Clarity and Confusion</title>
  <desc id="desc">This piece embodies the emotional tension between clarity and confusion through contrasting colors and patterns. The palette blends warm yellows and oranges with the cool tones of deep blue and muted purple, symbolizing the struggle between joy and grief. The central section features dense dot patterns representing clarity, while the outer edges dissolve into a split-screen confusion, creating a dynamic push and pull. The thicker outlines provide a sense of structure despite the chaos, and broken pixels add imperfection, echoing the unpredictable nature of human emotion.</desc>
