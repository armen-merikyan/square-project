  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This artwork captures the tension between trust and suspicion through contrasting elements. The palette of hot coral and blood orange conveys warmth and vibrance, while charcoal shades introduce depth and a sense of unease. The layout reflects a vertical split, emphasizing conflict through a diagonal fall pattern that integrates soft threads of color and occasional interruptions from broken pixels. The dominant warm hues signify trust, while the darkened edges serve as shadows of suspicion, with the main collision occurring towards the center, creating a dynamic echo of emotional contrast.</desc>
