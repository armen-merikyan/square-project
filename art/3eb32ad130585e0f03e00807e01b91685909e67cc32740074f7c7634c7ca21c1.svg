<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This artwork explores the emotional contrast between vulnerability and strength, capturing an interplay of soft and rigid qualities. The palette features earthy tones of burnt orange and dark red paired with neutral charcoal and accented with gold, creating a dynamic balance. The central collision occurs in the upper midsection where damaged 'shatter' patterns overlap with softer 'fault_line' structures, depicting the tension between exposure and protection. This arrangement symbolizes the struggle of letting one's inner self show while simultaneously yearning for a shield.</desc>
