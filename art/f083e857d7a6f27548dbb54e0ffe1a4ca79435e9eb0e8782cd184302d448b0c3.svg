<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This composition reflects the emotional tension between safety and exposure, with a muted palette suggesting warmth alongside bright accents that evoke vulnerability. The use of ‘shelter green’ and ‘warm brown’ creates a soft barrier, contrasted with ‘open blue’ for exposure and ‘cold white’ representing vulnerability. The primary collision occurs at the center, with a crosshatch pattern symbolizing exposure and a rain-like texture for safety, creating rhythmic interplay and visual dissonance. The broken frame layout allows emotion to seep through, emphasizing the idea of vulnerability within protection, while strategic negative space adds to the overall emotional impact.</desc>
