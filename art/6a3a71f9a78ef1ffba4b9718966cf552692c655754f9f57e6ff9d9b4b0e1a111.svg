  <title id="title">Hunger Constrained</title>
  <desc id="desc">This piece explores the tension between desire and restraint. The palette uses hot coral and blood orange to embody the warmth of desire, while muted colors like charcoal and hollow blue represent restraint. The emotional collision occurs predominantly in the central region, where vibrant colors intersect with darker shades, suggesting a struggle against containment. The arrangement reflects a lattice pattern, where the chaotic warmth attempts to break through sealed edges, resonating with the themes of hunger versus limitation.</desc>
