<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This abstract artwork captures the tension between quietude and pressure through a palette that mixes soft and muted hues. The dominant dark navy (#001F3F) encapsulates the feeling of pressure, while faint peach (#FDE4D4) serves as the quiet respite. The contrasting colors create a visual conflict that illustrates the seed's themes of collision and disruption. The patterns are intentionally broken at the center, depicting how soft edges can give way to sharper forces, embodying the narrative of shattering tranquility against an overwhelming tide of emotions.</desc>
