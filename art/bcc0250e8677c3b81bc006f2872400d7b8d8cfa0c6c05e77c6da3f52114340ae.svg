<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork captures the tension between desire and emptiness by using a color palette that juxtaposes vibrant hues of coral and orange to express longing against cool and subdued shades of blue and charcoal that symbolize restraint. The contrast is concentrated in the center, where warm tones collide with the surrounding emptiness, represented by crosshatch patterns, lending a sense of interruption to the smooth flow of desire's fault lines. The structured yet porous edge style enhances the feeling of containment while allowing some degree of overflow. The spiral flow suggests an inward pulling force that instigates a continuous emotional push and pull. The broken pixel placements serve as intentional disruptions, inviting the viewer's focus towards the emotional scars of desire amidst the quiet pressure of emptiness.</desc>
