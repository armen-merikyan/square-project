<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Awe and Terror</title>
  <desc id="desc">This piece explores the emotional duality of awe and terror through warm and cool contrasts. The palette, inspired by fiery tones and deep shadows, emphasizes the underlying chaos against organized patterns. The edges are softened to suggest instability, framing a central core of broken textures that echo the concept of fragmented memory. The collision of dark reds and burnt oranges against cool greys and charcoals creates tension that captures the essence of being both drawn in and pushed away, mimicking the inherent push-pull of awe and terror.</desc>
