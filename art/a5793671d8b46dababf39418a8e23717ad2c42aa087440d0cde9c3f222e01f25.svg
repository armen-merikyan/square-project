<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">The emotional tone embodies a conflict between emptiness and desire, where vibrant expressions clash with dark absorptions. The palette features striking lime and electric blue contrasting against deep blacks and magentas, highlighting the tension between weight and luminosity. The layout splits the canvas vertically, accenting desire with bright hues on one side while the other side swells with darker tones, creating a sense of collision. Patterns of crosshatch evoke a rhythmic push-pull, reflecting the pressures of emotion in a soft, layered transition. Broken pixels introduce imperfection, lending a human touch to this abstract interplay, while maintaining necessary negative space for reflective pauses.</desc>
