<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">The artwork embodies the emotional tension between relief and dread, expressed through a palette of electric blue and lime clashing with depths of black. The pattern placement, with a top-heavy design giving way to lighter hues below, captures a descent from weighty emotion to lighter relief, as pixels rain down and collide within a grid. The use of broken elements introduces a fragmented symmetry, enhancing the sense of imbalance between the two strong emotional states, while the negative space allows for breath within the chaos.</desc>
