<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Safety and Exposure</title>
  <desc id="desc">The artwork embodies the emotional tension between vulnerability and strength, utilizing a palette that communicates safety through earthy and soft tones, yet hints at exposure with cool colors. The main collision occurs at the center where a dense cluster of warm brown represents strength, contrasting against soft, exposed edges in pale skin and cold white, representing vulnerability. The tension between thick structural colors and thin conceptual boundaries evokes a dance of protection and exposure, with broken pixels acting as scars of experience that disrupt the surface, echoing the theme of inner conflict.</desc>
