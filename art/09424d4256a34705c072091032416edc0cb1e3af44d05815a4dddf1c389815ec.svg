<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tear in the Void</title>
  <desc id="desc">This piece explores the emotional dichotomy of loneliness and connection through stark contrasts of color and placement. The palette combines deep blacks, vibrant reds, and soft blues, symbolizing the battle between isolation (black) and the yearning for connection (red). The arrangement features a dominant black section in the top left that disrupts a gradient of pale blue moving towards the bottom right. The sparse red is positioned centrally and randomly disrupted, reflecting moments of connection attempting to break through the overwhelming solitude. This creates a tension where the eye is drawn into the 'tear' of emotion, suggesting both pain and hope. Negative space is maintained to enhance the feeling of emptiness and longing.</desc>
