<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This artwork explores the emotional contrast between quietness and pressure through color arrangement and density. The palette shifts from soft, warm hues (off_white and faint_peach) symbolizing calmness, to darker, cooler tones (dark_navy) representing pressure. The arrangement features a checker pattern for pressure and a ring pattern for quiet, creating a tension-filled yet airy space in the center that gradually releases towards the borders. The deliberate breaks in the border evoke imperfection, allowing the quieter colors to seep through, suggesting both confinement and escape. The collision occurs around the center, where the most vibrant colors are tightly packed, contrasting with the expansive negative space that represents tranquility.</desc>
