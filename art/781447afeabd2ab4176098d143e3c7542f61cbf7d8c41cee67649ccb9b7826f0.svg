<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Reaching and Holding</title>
  <desc id="desc">The emotional tone of this piece captures the tension between longing and resolve, where yearning colors intermingle with assertive hues. The palate of pale aqua and ink blue represents longing's gentle yet persistent call, while the alarm red and clear white punctuate with moments of clarity and urgency. The main collision occurs centrally, where dense clusters of warm tones and sparse fields of cool colors interact, mirroring the push-pull dynamic of intimacy and distance. The arrangement emphasizes isolation through pattern complexity, suggesting a fight between chaos and order amid clear boundaries, in a composition that resonates with deep emotional currents.</desc>
