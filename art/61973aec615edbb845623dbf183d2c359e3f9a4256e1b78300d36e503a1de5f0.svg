<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonant Frequencies</title>
  <desc id="desc">The emotional tone reflects the tension between clarity and chaos, with a dominant signal represented by green and electric blue, contrasting against the scattered noise of static gray and hot magenta. The layout further emphasizes this split, with the left quadrants embodying a steady rhythm (pulse marks), while the jagged edges introduce disruption and uncertainty. The main collision happens in the center, where the 'signal' vibrates against the chaotic 'noise', creating an interplay that represents broken connections and unresolved emotions. Each broken pixel serves as a reminder of imperfection within the structures we create.</desc>
