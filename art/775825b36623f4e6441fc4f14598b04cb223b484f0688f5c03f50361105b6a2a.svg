<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Boundaries</title>
  <desc id="desc">This artwork contrasts softness and severity through the use of muted tones and sharp accents. The palette includes powder pink and warm white to evoke softness, contrasted against carbon black and sharp crimson for severity. The soft colors form a dense background, suggesting elements of serenity and calm, while the sharp accents interrupt the flow, symbolizing the suddenness of severity. The collision occurs at the center where the light and dark colors intersect, creating a focal point that invites the viewer to explore both emotional states. The convoluted pattern emerges from the pulse-like nature of the seed, reflecting conflict and continuity in abstract terms with broken pixels sprinkled throughout to suggest imperfections and interruptions in memory.</desc>
