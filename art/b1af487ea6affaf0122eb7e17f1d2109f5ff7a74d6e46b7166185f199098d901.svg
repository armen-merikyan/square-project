<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Fracture</title>
  <desc id="desc">The composition embodies the tension between joy and grief through a dynamic interaction of warmth and coldness. The palette features bright yellows and oranges representing joy, contrasted with deep blues and muted purples symbolizing grief. The overall arrangement utilizes a zigzag flow depicting the conflict and collision of emotions, while the pattern juxtaposes broken dots for grief against a split-screen layout representing joy. Negative space offers a reflective quality that embodies moments of vulnerability amidst chaos. The result is a striking balance between fragmentation and expansion, echoing the struggle between light and dark emotions.</desc>
