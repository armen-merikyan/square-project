<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Hearts</title>
  <desc id="desc">The emotional tone captures the conflict between envy and gratitude, translating their volatility into a burst of colors. The palette of deep blacks, dark violets, soft golds, and pale greens evokes conflicting feelings—black and violet suggest a weight of envy, while gold and green represent the warmth of gratitude. The contrast lies at the center, with a dense cluster encircling a softer inner space that reflects comfort and tension. The arrangement disrupts the viewer's eye, creating a rhythm of rising and falling elements, echoing the pulse of hope amidst fear. Imperfections and broken pixels introduce an element of raw authenticity, symbolizing the fragmented nature of these emotions.</desc>
