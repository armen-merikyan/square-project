<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Connection</title>
  <desc id="desc">This artwork embodies the emotional tension between loneliness and connection. The palette of burnt orange, dark red, charcoal, and gold reflects the motif of ancient fire—intensely warm yet deeply isolating. The contrast is emphasized by clusters of dark colors on the edges, evoking loneliness, while lighter spots burst in a jagged pattern toward the center, suggesting the desire for connection. The top-weighted layout with negative space encourages a feeling of longing, reminiscent of hidden emotions longing to surface. The mixture of checker patterns and broken dots conveys both isolation and the fragmented nature of connections.</desc>
