<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This composition embodies the emotional dichotomy of joy and grief. The warm yellows and oranges on the left evoke joy through a chaotic noise pattern, representing expansion and vibrancy. In contrast, the cooler tones of deep blue and muted purple on the right create a layered stripe texture, symbolizing grief's heaviness and fragmentation. The design employs a mirrored layout with deliberate breaks to reflect life's unpredictability, balancing dense clusters with negative space. The interplay of color and pattern illustrates the tension between the uplifting and the sorrowful, enhancing the narrative of duality in human experience.</desc>
