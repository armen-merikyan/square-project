<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight: A Tension in Colors</title>
  <desc id="desc">This artwork explores the emotional tension between awe and terror through a palette that contrasts deep, dark tones with soft, luminous highlights. The colors black and dark violet provide a sense of weight, while pale green and soft gold reflect moments of awe. The arrangement creates a diagonal flow where dark colors invade from one corner, symbolizing terror encroaching on the lighter area of hope. The patterns reflect the chaotic nature of terror (broken dots) versus the mirroring essence of awe, resulting in a dynamic yet unstable composition. The use of broken pixels introduces imperfection, enhancing the feeling of a fractured memory, aligning with the theme of instability in contrasting emotions.</desc>
