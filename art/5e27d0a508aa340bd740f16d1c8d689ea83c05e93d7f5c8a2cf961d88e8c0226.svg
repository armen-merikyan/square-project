<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonant Tensions</title>
  <desc id="desc">This artwork explores the emotional dance between longing and resolve through layered colors and patterns. The color palette transitions from muted storm grays representing longing to the firm tones of faded gold and near black, symbolizing resolve. The outer edges are dense with dark colors, creating pressure, while the center field is more open, representing a longing for connection amidst the chaos. The main collision occurs in the center, where a diagonal flow of pale mint and soft sky abruptly interrupts the heavier tones, emphasizing the emotional clash between aspiration and stability.</desc>
