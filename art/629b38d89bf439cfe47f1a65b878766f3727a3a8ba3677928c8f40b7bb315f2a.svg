<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Shelter</title>
  <desc id="desc">The emotional tone of this piece explores the tension between vulnerability and protection, using a palette that juxtaposes warm, earthy tones with pale, exposed hues. The contrast pits the gentle weight of safety against the bright vulnerability of exposure, with a main collision occurring in the center where warm brown encircles the pale skin tone. The layout suggests a near-enclosure, though broken pixels disrupt the continuity, evoking a feeling of tension and release in the context of safety's soft embrace battling exposure's starkness.</desc>
