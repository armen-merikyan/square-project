<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Resolute Spaces</title>
  <desc id="desc">This composition captures the emotional duality of longing and resolve through warm and cool tones that brush against each other. The palette blends deep blue and muted purple for introspection and yearning, contrasted with bright yellows and oranges signifying resolve and vibrancy. The edges are eroded, hinting at imperfection and the fragility of these emotional states. The main collision occurs centrally, where a patchwork of longing meets the structured stripes of resolve, creating a dynamic dance between these feelings, surrounded by quiet negative space to allow pause and reflection.</desc>
