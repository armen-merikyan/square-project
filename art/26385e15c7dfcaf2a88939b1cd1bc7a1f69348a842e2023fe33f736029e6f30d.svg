<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Between Softness and Severity</title>
  <desc id="desc">This artwork conveys the tension between softness and severity through color contrasts and patterns, with dominant warm tones interrupted by cooler, darker accents. The palette reflects a journey from warmth to heaviness, capturing both gentleness and intensity. The collision occurs centrally where softer gradients of pink and warm white meet the harder, darker edges of steel gray and carbon black, creating a dynamic yet grounded interaction. The presence of broken pixels reinforces memory and imperfection within this emotional experience, encapsulating the struggle between guilt and forgiveness.</desc>
