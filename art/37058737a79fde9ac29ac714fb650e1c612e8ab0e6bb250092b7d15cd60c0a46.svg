<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symphony of Light and Shadow</title>
  <desc id="desc">This piece evokes the emotional contrast between joy and grief through a split horizontal layout. The top half employs a cheerful palette filled with bright yellows and warm oranges, representing joy and spark-like moments of happiness. The bottom half is marked by muted purples and deep blues, reflecting grief’s heaviness and fragmentation. The zigzag flow enhances the dynamic tension, while intentional broken pixels introduce a sense of imperfection, suggestive of life’s unpredictable nature. The overall design captures a rhythmic push and pull between light and dark, echoing the complexity of human emotions.</desc>
