<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone reflects the tension between calmness and rage. A sharp contrast between warm reds, representing the explosive nature of rage, and cooler pale blues and blacks embodies the attempt to contain that intensity. The use of jagged, fault_line patterns signifies interruption and collision while softer ring patterns create spaces of calm, forming a nuanced emotional landscape. The layout erodes symmetry slightly towards the corners, suggesting encroaching chaos. The deliberate use of broken pixels introduces imperfections, enhancing the abstract narrative of containment versus overflow.</desc>
