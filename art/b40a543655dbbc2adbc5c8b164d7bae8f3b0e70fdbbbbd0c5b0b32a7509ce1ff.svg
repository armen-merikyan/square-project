<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Emotions</title>
  <desc id="desc">The artwork explores the emotional tension between envy and gratitude, using a color palette of deep blacks and soft pales to evoke these contrasting feelings. The darker colors represent envy, creating a collapsing inward effect, while the whites and pale blues symbolize layers of gratitude attempting to rise and break through. The layout follows an empty room concept with one side weighed naturally towards darker hues, embodying a soft edge style. The broken pixel placements add a sense of imperfection and emotional crack, allowing space for contemplation and unresolved feelings to exist alongside the attempt at lightness and release.</desc>
