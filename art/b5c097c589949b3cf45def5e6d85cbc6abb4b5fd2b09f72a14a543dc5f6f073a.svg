  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork juxtaposes emotional tones of vulnerability and strength through an intentional layout of colliding patterns. The selected palette comprises muted greens and honey golds, reflecting the complexity of both feelings. The 'negative_cross' and 'ring' patterns create intersections that symbolize the tension between exposure and shelter, where pale shades represent vulnerability in the center, while stronger, deeper tones provide an assertive frame. The layout emphasizes a threshold where these contrasts dynamically engage, offering visual tension through both order and disruption, inviting viewers to sense the balance between protection and openness.</desc>
