<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotion Collision</title>
  <desc id="desc">This piece embodies the struggle between tenderness and rage through a palette that juxtaposes saturated reds and muted blues. The dense, jagged red patterns signify rage while the soft, rounded blues represent tenderness, colliding at the center to create a visual tension. The ‘open_gate’ layout introduces an element of movement, suggesting an entry point for emotional contrast. The overall composition balances spaces of softness against the sharpness of red to reflect the push-and-pull of conflicting emotions, thus creating a conversation between these feelings.</desc>
