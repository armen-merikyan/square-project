<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Torn Connections</title>
  <desc id="desc">The emotional tone of 'loneliness vs connection' is expressed through a dynamic clash of color fields. The palette of warm yellows and oranges contrasts sharply with deep blues and muted purples, echoing the push and pull of isolation versus community. Central to the piece is a burst of warmth amid darker hues, illustrating the struggle between exposure and concealment. The broken pixel pattern reflects imperfection, mirroring the nuances of human emotion, while the empty spaces reinforce feelings of isolation, leaving negative space to evoke the silent gaps in connection.</desc>
