<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Time</title>
  <desc id="desc">This piece embodies the emotional duality of nostalgia and progress through a purposeful clash of colors and dynamic arrangements. The palette of soft pink and deep maroon represents both warmth and the weight of memories contrasted against the starkness of gray, denoting the relentless push of progress. The empty spaces embody the disconnection felt when nostalgia meets the forward motion of life. The target pattern clashes with drips, suggesting the pressure of moving forward while being weighed down by the past. The bottom-weighted edge supports a grounded feel, while varied pixel placements introduce an inherent tension, allowing the colors to 'argue' for control across the canvas.</desc>
