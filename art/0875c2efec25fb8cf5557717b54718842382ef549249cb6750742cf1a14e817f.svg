  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition captures the emotional dichotomy between rage and calm through contrasting patterns and colors. Bright, jagged reds collide with cooler, soft blues, representing explosive bursts of anger against a calm backdrop. The palette of red and pale blue creates a clear tension, with the black providing depth that enhances the sense of overflow. The central collision of vibrant dots against horizontal blue braids evokes disruption and imbalance, embodying the struggle between contained and overflowing emotions.</desc>
