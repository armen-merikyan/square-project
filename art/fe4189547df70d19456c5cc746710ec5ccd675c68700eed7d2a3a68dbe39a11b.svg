<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tide of Tension</title>
  <desc id="desc">This artwork captures the emotional juxtaposition of 'quiet vs pressure.' The palette features muted tones of off-white and dust gray to convey a sense of calm, contrasted by the striking compressed red and dark navy that symbolize the weight of pressure. The main collision occurs in the center where a tight cluster of darker colors is fractured by lighter hues, suggesting a release from tension. The layout flows in a spiral pattern, depicting the interplay of pressure retreating from the axis, embodying the concept of 'shattering against tide.' Broken pixels enhance the tension, creating intentional disruptions that echo the emotional intensity of the seed.</desc>
