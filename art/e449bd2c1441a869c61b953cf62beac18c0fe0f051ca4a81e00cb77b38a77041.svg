  <title id="title">Echo of Shelter</title>
  <desc id="desc">The emotional tone juxtaposes feelings of safety and exposure, creating a tension between warm earth tones of shelter and the cool, pale hues symbolizing vulnerability. The selected palette of shelter green and warm brown provides a protective foundation, while cold white and open blue represent the exposed center. The arrangement explores a vertical split where the left side conveys a quiet, stable shelter while the right introduces a pulse of marks, reflecting exposure. The collision occurs at the center, where the patterns of exposure interrupt the quiet field of safety, drawing the viewer's attention to the delicate balance between security and openness.</desc>
