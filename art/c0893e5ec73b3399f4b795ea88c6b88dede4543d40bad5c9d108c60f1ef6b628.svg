<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Intimacy</title>
  <desc id="desc">The emotional tone juxtaposes longing with resolve, suggesting a tension between yearning and stability. The palette blends pale aqua and clear white, evoking a sense of calm amidst alarm red, representing intensity and urgency. This setup creates a rich contrast where the central collision of longing (echo pattern) and resolve (spark pattern) emerges prominently from the organizing metaphor of the scar. The main collision occurs in the center, marked by the interplay of dense clusters and quiet fields, evocative of emotional distance and closeness. Broken pixels purposefully disrupt symmetry, mirroring the imperfections of relationships.</desc>
