<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality in Motion</title>
  <desc id="desc">This pixel composition captures the emotional tension between trust and suspicion through a blend of cool and warm tones, represented by the colors of ice blue and warning orange. The split vertical contrast signifies the divide between clarity and confusion, with the soft glow of white juxtaposing the deeper shadows of black. The diagonal patterning, evoking the notion of falling pixels, suggests a dynamic flow of emotion—creating both harmony and discord. The intentional placement of broken pixels introduces elements of unpredictability, echoing the complexities inherent in trust and suspicion.</desc>
