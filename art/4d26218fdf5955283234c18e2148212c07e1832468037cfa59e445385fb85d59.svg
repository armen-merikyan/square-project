<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Echoes</title>
  <desc id="desc">This piece explores the emotional tension between awe and terror through a palette that blends the warmth of burnt orange and gold with the cool depths of dark red and charcoal. The composition flows from dark to light, symbolizing a movement from chaos to order. The central wave pattern creates an upward lift that represents hope, while the broken pixels introduce a sense of instability and disruption, evoking fragmented memories. The combination of broken edges with soft transitions amplifies the tension, as moments of calm (light colors) clash with disruptive elements (dark colors), embodying the duality expressed in the seed.</desc>
