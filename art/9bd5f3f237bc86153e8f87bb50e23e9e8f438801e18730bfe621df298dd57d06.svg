<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Boundless Tension</title>
  <desc id="desc">The emotional tone reflects the conflict between desire (represented by warm, bright colors) and restraint (symbolized by cooler, muted shades). The palette includes hot coral and blood orange to express warmth and longing, while charcoal and hollow blue introduce a sense of containment and coolness. The split vertical layout creates a stark contrast, with predominantly warm colors on the left (emotion A: desire) and cooler colors on the right (emotion B: restraint). The broken pixels disrupt the smoothness of the piece, symbolizing the struggle between the two emotions. Patterns of pressure bands and braids visually articulate the tension as they collide and interact, reinforcing the idea of a struggle between overflowing emotion and held borders, particularly at the center, where the two emotional forces meet.</desc>
