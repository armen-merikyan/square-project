<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tides of Tension</title>
  <desc id="desc">This composition explores the emotional duality of quiet versus pressure, the interplay of symmetry and break. The palette, featuring muted tones like faint peach and dust gray, evokes soft calm, while darker shades like dark navy introduce weight and intensity. The pattern shatters across the grid, creating tension points where pressure collides with quiet voids, emphasizing disruption. The dominant dark colors contribute to a sense of pressure, while the lighter accents create quiet moments that interrupt, symbolizing the tension of the seed's concepts.</desc>
