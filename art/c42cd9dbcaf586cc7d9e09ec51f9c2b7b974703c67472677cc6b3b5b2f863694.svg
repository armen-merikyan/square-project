<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This artwork embodies the tension between longing and resolve, capturing emotional fluctuations through color and form. The palette of moss green and bone white suggests resilience amid fragility, while the introduction of rust and small gold accents adds warmth as contrasts against a serene stone gray backdrop. The broken frame layout introduces deliberate disruptions to symbolize the idea of repair versus damage, creating a visual echo of emotion that feels both contained and overflowing. The collision occurs predominantly in the center, where the gold and rust accents clash against the cool tones to evoke a sense of unresolved tension. This collision works metaphorically to express the push and pull of emotions described in the seed.</desc>
