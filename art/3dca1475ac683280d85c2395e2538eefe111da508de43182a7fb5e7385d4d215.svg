<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collisions</title>
  <desc id="desc">The emotional tone reflects the tension between pride and shame, captured through a contrasting palette of warm yellows and oranges against cool deep blues and muted purples. The design flows counterclockwise, embodying a spiral of shifting emotions. The layout suggests rising pressure on one side while maintaining a sense of negative space, contributing to the theme of unresolved emotion. Broken pixels introduce imperfection, enhancing the feeling of collision. The main contrast occurs where warm colors meet the shadows of muted tones, creating visual dynamism and suggesting the complexity of these emotions.</desc>
