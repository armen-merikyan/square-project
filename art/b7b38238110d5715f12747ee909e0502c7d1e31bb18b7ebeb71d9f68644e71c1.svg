<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Contrasts</title>
  <desc id="desc">This piece embodies the tension between defiance and submission through a strategically chosen palette of navy, black, and dim cyan, symbolizing depth and emotion. The stark contrast is achieved with dense black elements juxtaposed against lighter shades, creating a fractured balance. Each row depicts a clash of flowing patterns, where the grid of defiance (represented by deeper colors) collides with the jagged submission (illustrated by lighter tones), encapsulating the essence of the seed. The layout is designed to feel weighted towards the bottom, signifying the emotional heft of the themes explored. Negative space is sustained to allow for silence amidst noise, enriching the overall abstraction with a sense of unresolved motion.</desc>
