<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Order and Chaos</title>
  <desc id="desc">The emotional tone balances joy and grief, with the warm hues of yellow and orange reflecting joy and the muted purples showing the weight of grief. The palette choice mixes vibrancy and heaviness, creating a stark contrast that illustrates the emotional conflict. The pattern is split-screen, where joy occupies the top with a stair-step 'teeth' pattern while grief flows in a radial motion toward the bottom. This arrangement captures the push and pull of emotions, with hard edges providing a sense of separation yet connection between the two sides.</desc>
