<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transition</title>
  <desc id="desc">This artwork captures the emotional duality of longing and resolve through contrasting color interactions and patterns. The warm coral and soft amber evoke a sense of urge and connection, while the cold slate and blue-black provide depth and grounding. The edge style of pixel bleed enhances the feeling of brokenness, illustrating the concept of repaired damage but contained overflow. The tidal ‘longing’ pattern allows for flowing transitions, while segmented 'target' shapes inject moments of clarity. The collision happens predominantly in the top corner where the vibrant tones meet deeper hues, symbolizing the tension between aspiration and acceptance.</desc>
