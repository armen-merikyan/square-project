<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece embodies the emotional tension between desire and restraint. The palette combines saturated reds and muted greys to evoke intensity versus containment. The central region is dominated by bold colors to represent an overwhelming desire, while the periphery is muted, illustrating the restraint. The contrast creates a dynamic interaction, with deeper saturations meeting softer tones, suggesting a swirling pressure toward the edges, reflecting the conflict indicated by the seed.</desc>
