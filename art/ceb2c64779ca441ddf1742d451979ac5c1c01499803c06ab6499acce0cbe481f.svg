  <title id="title">Signal vs Noise</title>
  <desc id="desc">This composition captures the tension between the ephemeral nature of 'spark' and the persistence of 'ash'. The palette combines the sharp clarity of ice blue and warning orange with the softness of violet gray and clean white, suggesting a struggle between vibrancy and decay. The dominant colors create a stark contrast at the center, where the grid-like patterns of 'spark' collide with the maze-like structure of 'ash', embodying memory versus erasure. The use of broken pixels enhances the sense of disruption, emphasizing the dynamic interplay of fleeting moments against a backdrop of settled remnants.</desc>
