<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Duality</title>
  <desc id="desc">This piece embodies the tension between clarity and confusion, using a palette of electric blue, lime, and magenta to exemplify vibrant energy clashing with muted, dark passages. The top half suggests clarity, with structured patterns, while the bottom half introduces chaotic grid-like disruptions. The main contrast occurs at the row where the two themes merge, creating an intentional collision of emotions, representative of the pulse and interruption described in the seed. The abstract arrangement reflects the experience of navigating through a fragmented thought process.</desc>
