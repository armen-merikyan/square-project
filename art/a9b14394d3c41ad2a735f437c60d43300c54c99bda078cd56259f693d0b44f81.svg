<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Forces</title>
  <desc id="desc">This composition captures the emotional tension between vulnerability and strength. The palette of warm clay tones contrasts with cool blues, suggesting warmth clashing against cold detachment. The left side embodies vulnerability through a thread-like structure in soft clay colors, while the right recovers strength using clearer blocks of bluish tones. The broken pixels add imperfection, echoing the fragility of strength threatened by vulnerability. The main collision occurs in the center, where the two contrasting emotions physically confront each other, highlighting the push and pull of desire and emptiness.</desc>
