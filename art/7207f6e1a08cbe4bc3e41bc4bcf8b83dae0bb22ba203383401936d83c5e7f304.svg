<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symphony of Discord and Harmony</title>
  <desc id="desc">This piece explores the emotional dichotomy between confusion and clarity, representing it through a split vertical layout. The left side embodies confusion with chaotic patterns marked by muted purples and deep blue, while the right side radiates clarity using bright yellows and oranges in a radial manner. The palette 'joy_grief' captures a tension between light and dark, with warm colors clashing with cooler tones. The main contrast occurs in the jagged edges and broken pixels on the left, symbolizing disruption, set against the smooth, cohesive outline of the right section, alluding to clarity. This arrangement invites an emotional pulse, reflecting the chaotic yet rhythmic nature of the human experience.</desc>
