<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposing Forces</title>
  <desc id="desc">This artwork captures the emotional struggle between defiance and submission through contrasting colors and patterns. The palette of black, navy, and dim cyan conveys a sense of isolation and depth, while the intentional placement of light and dark creates a visual tension. The asymmetrical pattern, balancing broken dots against rhythmic stripes, echoes the conflict of love and betrayal. The bottom-weighted layout emphasizes the heaviness of submission, while the scattered upper elements depict the lightness of defiance, creating a dynamic visual story within the abstract constraints of the seed.</desc>
