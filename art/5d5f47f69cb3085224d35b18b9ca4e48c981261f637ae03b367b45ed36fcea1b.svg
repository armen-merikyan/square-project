<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Waves</title>
  <desc id="desc">This artwork explores the emotional tension between certainty and curiosity. The palette features deep burnt oranges and dark reds to evoke the warmth of certainty, offset by muted charcoals to represent the unknown and chaos. The central area is dominated by solid blocks of color, illustrating the 'center versus edges' theme, while the outer rings hint at curiosity through broken patterns that suggest movement and exploration. This balance creates a visual narrative of conflict and resolution, echoing the seed's themes of rising signals and receding edges.</desc>
