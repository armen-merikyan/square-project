<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork captures the emotional tension between a deep desire for more and the constraint of emptiness. The chosen palette features vibrant colors like hot coral and blood orange to represent desire, interspersed with muted tones like charcoal and hollow blue to symbolize emptiness. This contrast creates a visual narrative where warm colors spiral inwards against a backdrop of cooler shades. The collision occurs predominantly in the center, symbolizing the intense push-and-pull between the two emotions. Broken pixels disrupt the flow, echoing the imperfection of desire against a harsh reality.</desc>
