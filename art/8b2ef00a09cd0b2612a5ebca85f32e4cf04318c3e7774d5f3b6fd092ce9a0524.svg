<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Corner</title>
  <desc id="desc">The emotional tone captures the tension between restlessness and peace, where a dense collection of colors at the corner represents pressure, while lighter tones spread outward, signifying release. The palette consists of ripe green, acid green, honey gold, deep olive, and cream, chosen for their warm and cool contrasts that evoke natural emotional states. The central collision is between the dense, darker tones and the lighter colors, effectively portraying conflict without symbolism, as if the memory of peace grapples with restlessness. The 'broken line' shape seed manifests as a rhythmic flow from the edge, evoking waves of tension and calm across the square.</desc>
