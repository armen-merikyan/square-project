<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interwoven Tensions</title>
  <desc id="desc">The emotional tone is a balance between restlessness and peace, signified by a palette of soft pastel and deep gray hues. The palette creates a calm backdrop (pale mint, soft sky) contrasted by darker elements (storm gray, near black) that echo both motion and stagnation. The main collision occurs along the diagonal, where brighter, more vibrant colors meet subdued tones, creating a feeling of unresolved tension. Broken pixels scatter throughout, serving as intentional disruptions mimicking the fluctuating nature of memory and motion, while still leaving ample negative space to suggest room for contemplation and peace amidst chaos.</desc>
