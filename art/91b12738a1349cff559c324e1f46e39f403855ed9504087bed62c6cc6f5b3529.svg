<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This piece captures the emotional tension between envy and gratitude, employing a color palette that embodies fear and hope. The contrast between the soft gold representing gratitude and the dark violet symbolizing envy creates a visual dialogue. The upward movement of colors on the left hints at ambition, while the muted tones on the right suggest heaviness. The irregularity introduced through broken pixels creates a dynamic yet unresolved pattern, symbolizing the jagged nature of emotional experiences.</desc>
