<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">This piece explores the emotional collision between awe and terror. The top rows in dark violet and soft gold symbolize the awe of quiet rhythm, while the bottom rows, composed of blacks and pale greens, represent the chaos of terror under pressure. The contrasting colors create a visual tension, cascading from light to dark, reflecting a descent from calmness to intensity. The use of broken pixels introduces imperfections, emphasizing the rawness of emotion. The split layout highlights order versus chaos, a dance between structured and fragmented energy, embodying the seed's essence in an abstract form.</desc>
