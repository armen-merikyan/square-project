<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Softness and Severity</title>
  <desc id="desc">This artwork explores the emotional tension between softness and severity using a palette of muted and strong colors to create both stark contrasts and gentle overlaps. The primary contrast lies at the center where deep charcoal (#333333) meets the warm white (#F4F4F4) and soft pink (#E5B5C5), reflecting the collision of these opposing forces. The darker shades signify severity, while the powder pink and warm white evoke feelings of softness and warmth. The arrangement of softly rounded shapes around sharp edges further defines the tension, echoing the seed’s themes of conflict and resolution.</desc>
