<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Connections</title>
  <desc id="desc">The emotional tone captures the conflict between the vibrancy of 'spark' and the muted weight of 'ash'. The chosen palette of carbon black, sharp crimson, and warm white reflects this tension, with darker hues suggesting restraint and lighter tones representing moments of burst. The layout follows a spiral, creating a central collision where the patterns of warmth and rigidity intertwine and disrupt, reflecting the struggle of memory and erasure. The introduction of broken pixels adds intentional disruptions, enhancing the narrative of resilience against fragility within the grid. The interplay creates a visual rhythm that encapsulates the essence of the seed.</desc>
