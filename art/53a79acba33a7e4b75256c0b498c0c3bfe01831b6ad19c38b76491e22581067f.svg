<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Disruption</title>
  <desc id="desc">This artwork embodies the clash between clarity (signal) and confusion (noise), conveyed through stark contrasts and broken edges. The palette features navy as the dominant color representing depth and calm, while dim cyan serves as a bright pulse, creating a visual heartbeat amidst the chaotic blacks. The composition allows the signal to emerge as a clean pulse, occupying 65 percent of the space and interacting with areas of negative space that represent noise. The tension is heightened by the integration of broken pixels, imbuing the work with a sense of imperfection and emotional scars, echoing the theme of machine emotion.</desc>
