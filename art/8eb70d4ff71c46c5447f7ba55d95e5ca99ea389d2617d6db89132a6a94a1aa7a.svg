<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">This piece embodies the emotional clash between tenderness and rage through a palette that balances soft, muted tones with bold, saturated accents. The design features a central collision of colors where the deep reds signify rage while the pale blues represent tenderness, creating a dynamic interplay. This central pulse disrupts the surrounding quieter field of blacks and whites, aligning with the theme of 'inside vs outside.' The 'halo' shape seed, abstractly represented by the color arrangement, suggests a protective boundary around the more intense emotions, while broken pixels introduce intentional imperfections, enhancing the emotional depth. The negative space supports the notion of quiet amidst the chaos.</desc>
