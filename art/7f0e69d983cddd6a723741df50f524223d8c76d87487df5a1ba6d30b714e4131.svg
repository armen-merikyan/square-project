<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone revolves around the intense interplay between defiance and submission, represented through contrasting colors and patterns. The palette—hot coral, blood orange, and charcoal—reflects urgency and tension, while the hollow blue introduces an echo of calmness. The center is saturated with vibrant dots (defiance) disrupting the flood of darker colors surrounding it (submission), creating a struggle for dominance. The main collision occurs in the middle, where energy radiates outward but is contained by the heavier border, suggesting both chaos and order.</desc>
