<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Balance</title>
  <desc id="desc">The emotional tone reflects a struggle between trust and suspicion, using a palette that oscillates between the soft gold of hope and the dark violet of unease. The layout showcases a vertical split populated by a radial pattern representing trust in the center, while the edges echo suspicion with a harder frame. This contrast creates a feeling of tension—the soft glow of the central area diffuses into the harsher shadows at the borders, implying a slow disintegration of symmetry. The intentional broken pixels symbolize the fragility of trust against the backdrop of suspicion, inviting the viewer to ponder the layers of emotional complexity.</desc>
