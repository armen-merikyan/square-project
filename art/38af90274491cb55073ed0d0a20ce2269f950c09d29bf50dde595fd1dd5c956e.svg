<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Trust and Suspicion</title>
  <desc id="desc">This piece explores the emotional tension between trust and suspicion through contrasting colors and patterns. The outer border, representing suspicion, features deep wine and ash gray, creating an unsettling boundary, while the inner core is dominated by warm ivory and soft gold, suggesting a soft yet resilient trust. The thin broken pixel disturbances scattered throughout embody moments of doubt and imperfection, reinforcing the narrative of navigating relationships. The use of radial patterns within the core juxtaposes the chaotic broken dots of suspicion, emphasizing the collision between stability and uncertainty.</desc>
