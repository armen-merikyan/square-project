<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">The emotional tone captures the tension between confusion and clarity, expressed through a contrasting palette of red, black, pale blue, and white. The left half embodies confusion with a radial pattern, suggesting chaotic movement, while the right half's broken dots evoke clarity and structure. The jagged edges and thick outlines enhance this dialogue, with interruptions of black against vivid red marking the collision between dense emotion and lighter spaces, giving a feeling of fractured symmetry. This reflects the essence of the seed through the structured disarray.</desc>
