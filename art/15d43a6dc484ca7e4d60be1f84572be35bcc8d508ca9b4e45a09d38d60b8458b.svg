<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece embodies the emotional tension between 'rage' and 'calm'. The palette combines deep blacks, vivid reds, and pale blues to convey the clash of intensity and serenity. The black and red pixels are positioned to create a dynamic compression towards the center, symbolizing rage, while the lighter shades expand outward, representing calmness. The asymmetrical edge structure creates an illusion of fractured balance, echoing the seed's themes of contrast and interruption. The mirroring effect is disrupted by a few broken pixels, lending an imperfect beauty that suggests a torn narrative between forces.</desc>
