<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Warmth and Fracture</title>
  <desc id="desc">The emotional tone encapsulates the struggle between love and betrayal, expressed through a warm vs. cool color palette. Warm pinks and reds symbolize love, while darker shades of maroon and gray represent betrayal. The layout suggests spacious emptiness while the crosshatch pattern evokes tension between the two emotions. The arrangement creates a collision of feelings, highlighting asymmetry where one side, darker and denser, contrasts sharply with the lighter, more open area. This visual dialogue plays out through the selection of broken pixels, adding an element of imperfection that mirrors the emotional complexity of the theme.</desc>
