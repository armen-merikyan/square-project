  <title id="title">Echoes of Resilience</title>
  <desc id="desc">This artwork reflects the emotional duality of strength and vulnerability through an inward spiral layout that contrasts dark, heavy colors with lighter, more fragile tones. The palette consists of deep blacks and vibrant greens to represent strength, while softer electric blues symbolize vulnerability. The main collision occurs at the center, suggesting a tension between exposed fragility and a solid protective boundary. Broken pixels are intentionally placed throughout to introduce elements of imperfection and create a rhythm that carries the emotional narrative.</desc>
