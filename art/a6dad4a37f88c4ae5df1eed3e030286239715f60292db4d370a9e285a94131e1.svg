<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissonance in Patterns</title>
  <desc id="desc">The emotional tone captures a struggle between defiance and submission, using a palette of both assertive (alarm red, ink blue) and calm (pale aqua, mist gray) colors. The upper four rows showcase the bold checker pattern representing defiance, starkly contrasted with the lower four rows filled with the gentle sparks of submission. The central collision occurs in a light-to-dark gradient modulation across the square, symbolizing the tension of the emotional struggle, with intentional breaks to signify the chaos amid order.</desc>
