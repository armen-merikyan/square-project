<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone captures the tension between defiance and submission. The palette, ‘gratitude_envy,’ uses ripe green and acid green alongside honey gold to create a warm yet conflicted atmosphere. The central area is saturated with angular, irregular patterns, embodying defiance, while soft creams creep in from the edges representing submission. The main contrast occurs in the middle of the grid, where vibrant islands clash with the softer constellation of muted colors at the borders, creating an unresolved tension. This reflects the seed's narrative of chaos and order, a quiet channel filled with pulsations of color and disruption.</desc>
