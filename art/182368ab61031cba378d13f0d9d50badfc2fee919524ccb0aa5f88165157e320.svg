<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast in Echoes</title>
  <desc id="desc">This artwork explores the emotional tension between envy and gratitude through a structured yet noisy composition. The palette predominantly of black, electric blue, lime, and magenta captures an industrial, 'machine emotion' feel, creating a juxtaposition between cold metal vibes and vibrant impulses. Points of collision occur where magenta interrupts the green and blues, representing sudden shifts of emotion—echoes of envy striking gratitude. The 'empty room' layout leaves intentional negative space to enhance the feeling of isolation that often accompanies envy, while the contrasting edges create a sense of weight. The spiral clockwise flow adds dynamism, suggesting a movement from stillness to agitation, embodying the ongoing struggle within the emotional spectrum.</desc>
