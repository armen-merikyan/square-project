  <title id="title">Pulse of Duality</title>
  <desc id="desc">The emotional tone is conveyed through the contrasting themes of confusion and clarity. The palette of burnt orange, dark red, charcoal, and gold reflects ancient fire, evoking warmth and tension. The left side embodies confusion through chaotic ring patterns, while the right illustrates clarity with more structured flame patterns. A broken pixel approach reminds of imperfections, suggesting the fragility of clarity amidst chaos. The main contrast occurs where the dark red meets the gold, symbolizing rage clashing with calm, creating a pulsing rhythm across the canvas.</desc>
