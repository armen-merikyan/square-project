<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone blends strength and vulnerability, emphasizing a stark contrast between the stability of the center and the chaos of the edges. The palette of warm ivory, soft gold, deep wine, ash gray, and stain brown represents a spectrum from warmth to somber undertones, encapsulating feelings of guilt and forgiveness. The center pulse creates a stable core surrounded by halo-like patterns that resonate with vulnerability, while broken pixels disrupt symmetry, allowing for collisions that hint at deeper emotional narratives. The stark contrast primarily occurs near the center, with an interplay of static strength and soft vulnerability radiating outwards, symbolizing a dynamic tension between these states.</desc>
