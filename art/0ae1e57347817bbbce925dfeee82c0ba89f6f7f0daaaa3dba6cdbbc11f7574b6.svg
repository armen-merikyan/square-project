<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This composition expresses the emotional tension between control and surrender. The palette of sepia, tan, dust gray, and faded blue reflects a sense of nostalgia and muted introspection. The thick outlines of dark tones represent control, outlining a center that overflows with lighter colors, symbolizing surrender. The main collision occurs in the central rows, where saturated colors meet the quieter edges. This interplay echoes the stuttered steps of balance and pressure, while broken pixels create intentional disruptions, hinting at the chaos within structured patterns.</desc>
