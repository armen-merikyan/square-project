<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs. Release</title>
  <desc id="desc">This artwork embodies the emotional duality of 'quiet' and 'pressure.' The palette brings together muted tones like dust gray and off-white to represent quietude, contrasting sharply with the compressed red and dark navy that evoke a sense of pressure. The design features a dense cluster of darker shades in the top left, illustrating pressure, which gradually transitions to lighter colors towards the bottom right, suggesting a release and softening. The pattern of 'echo' intertwines with the 'stepwell,' creating an interplay where soft colors break against the hard edges, alluding to moments of tension and relief found within clarity and confusion.</desc>
