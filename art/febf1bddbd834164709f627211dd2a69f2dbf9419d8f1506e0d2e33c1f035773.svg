<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece embodies the tension between desire and emptiness. The palette blends warm tones of hot coral and blood orange, representing desire and vitality, against the cool, muted shades of charcoal and hollow blue, embodying emptiness and restraint. The stripes indicate a saturated pull towards the center, interrupted by echoes of negative space. The main collision of emotion occurs in the center where saturated patterns disrupt the quiet edges. This reflects the struggle between the yearning for more and the limitations we face, creating an intricate balance of movement and stillness.</desc>
