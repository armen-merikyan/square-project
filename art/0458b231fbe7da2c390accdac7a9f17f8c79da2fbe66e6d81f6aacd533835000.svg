<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone is a push and pull between the vibrant craving of desire and the passive silence of emptiness. The palette contrasts the warmth of saturated hues like 'hot_coral' and 'blood_orange' representing desire, against muted 'charcoal' and 'hollow_blue' embodying emptiness. Main collisions occur along the center where color densities collide, emphasizing the theme of restrained desire pushed against the edges of quietness. The layout suggests a mirroring effect that falters at a few broken pixels, symbolizing the imperfection in the emotional struggle.</desc>
