<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone navigates the tension between desire (warm, saturated tones) and restraint (cool, muted ones). The chosen palette of deep reds, blacks, muted creams, and grays explores this complex interplay. The major contrast is between the saturated left side, exhibiting a crosshatch pattern symbolizing desire, and the more restrained right side, which employs a checker pattern symbolizing resistance. This clash occurs just before the center, creating a sense of unresolved pull. The arrangement aims to visually express the struggle between yearning and limitation, both captured through color and structure.</desc>
