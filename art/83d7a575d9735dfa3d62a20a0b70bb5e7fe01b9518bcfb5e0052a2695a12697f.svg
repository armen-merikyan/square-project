<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone reflects the struggle between desire and emptiness. The palette features vibrant hues of hot coral and blood orange representing desire, contrasted against muted charcoal and hollow blue representing emptiness. The central dense pattern (desire) is interrupted by quiet edges of empty space, suggesting containment and tension. The collision occurs mainly in the center where warm colors saturate, while cooler tones push back at the borders, embodying the push-and-pull between overflowing longing and restrictive boundaries.</desc>
