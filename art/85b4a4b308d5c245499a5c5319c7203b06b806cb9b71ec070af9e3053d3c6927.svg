<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast in Motion</title>
  <desc id="desc">This artwork captures the emotional tension between defiance and submission through a careful arrangement of colors. The palette of moss green, bone white, rust, stone gray, and small gold reflects resilience amidst fragility, creating a dialogue of defiance in the saturated moss green against subdued bone white and stone gray. The main collision occurs diagonal from the bottom left to the top right, emphasizing upward movement and blockages with bright accents of small gold cutting through the quieter areas, embodying 'open vs closed' and the ‘threshold’ of emotion.</desc>
