<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">This piece explores the emotional tension between awe and terror, depicting a struggle through contrasting light and heavy colors. The dark palette invokes feelings of terror, while the lighter hues symbolize awe. The layout splits the piece into two emotional halves, with the top representing awe through a split-screen pattern, highlighted with soft gold and pale green, while the bottom side channels terror through a chaotic crosshatch of darker tones. The broken pixels add an imperfection that reflects the instability of memory, enhancing the tension between the two emotions. The combination of orderly placements in the top half juxtaposed with the chaotic arrangement below illustrates the battle between order and chaos, inviting contemplation on how these feelings collide and coexist.</desc>
