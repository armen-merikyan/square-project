<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">This piece presents an emotional narrative of quiet tensions versus unavoidable pressures through the juxtaposition of muted and intense colors. The palette captures the essence of clarity and confusion with 'off_white' and 'faint_peach' representing the quieter areas, contrasted by the deeper 'dark_navy' and 'compressed_red' that echo the pressure. The layout centers on a tension point where color density disrupts the calm, creating a pulsating pattern that flows in a counterclockwise spiral. The broken pixels intentionally displace order, embodying the shattering against ebbing tides, while the sharp-edged patterns collide with softer channels, reflecting the interplay of hard and soft in the emotional landscape.</desc>
