<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resolve</title>
  <desc id="desc">This piece captures the emotional juxtaposition of longing and resolve through a structured palette of warm and cool tones. The primary colors, hot coral and blood orange, symbolize a yearning pulse, while charcoal and hollow blue provide a calming counterpoint. The tension arises from the grid-like pattern of longing across the outer frame, contrasting with the intense flame-like inner core. The main collision occurs centrally, where coral threads bend against the resolute blue edges, creating a visual dialogue of impulsive desire and steadfast resolution. Broken pixels introduce intentional disruptions, echoing the theme of mending versus damage, leading to a vibrant yet serene composition that feels alive and dynamic.</desc>
