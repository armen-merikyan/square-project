<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This artwork embodies the emotional tension between insatiable desire and firm restraint. The color palette features warm correlations like 'hot coral' and 'blood orange' countered by the muted 'charcoal' and ethereal 'hollow blue,' visualizing the contrasts of warmth and coolness, saturation and muted tones. The main collision occurs in the center where warm colors swirl against the cool, symbolizing a locked boundary amidst an intense pull. The structured grid represents the desire pattern while the glitch-like interruptions signify restraint, illustrating a psychological struggle between expansion and containment.</desc>
