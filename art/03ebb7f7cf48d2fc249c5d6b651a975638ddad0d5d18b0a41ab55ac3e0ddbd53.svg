<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This artwork captures the emotional tension between joy and grief through a careful selection of contrasting colors. The warm colors of yellow and orange suggest joy, while the deep blues and muted purples evoke grief. The left-weighted layout introduces asymmetry with a dominant dark mass on the left, simulating the pull of grief, while the bright, open spaces represent bursts of joy. The interspersed patterns of checker and frame add complexity, highlighting the collision of emotions. Overall, the balance of color and placement creates a pulse and rhythm, conveying the unresolved interplay between hope and sorrow.</desc>
