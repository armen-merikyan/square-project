<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Order and Chaos</title>
  <desc id="desc">This piece captures the emotional struggle between panic and control through contrasting color placements and patterns. The palette of muted grays and stark reds evokes a somber mood, representing underlying tension and conflict. The use of sharp vs. soft contrasts mimics the push and pull of emotions; the presence of jagged edges mirrors chaos while the grid pattern attempts to impose order. The zigzag flow suggests movement and unpredictability, while the broken pixels introduce imperfection, symbolizing how chaos often intrudes upon control. The overall layout creates a sense of rising tension, with negative space allowing for pauses amidst clashing colors, embodying the dynamic of joy amidst grief.</desc>
