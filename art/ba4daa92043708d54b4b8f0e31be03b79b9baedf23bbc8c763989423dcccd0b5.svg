<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">The emotional tone is one of duality: longing intertwined with resolve, creating a dynamic tension across the grid. The selected palette of muted gray, deep maroon, soft pink, and red conveys warmth against stark shadows—representing desire clashing with clarity. The contrast sparks at the center, where echoing patterns of longing (represented by the soft pink and gray) collide with the firm, defined lines of resolve (the dark maroon and red). This interplay creates a visual rhythm that feels both urgent and serene, capturing the essence of the seed's themes of repair, damage, and the tension between overflowing emotion and contained resolve.</desc>
