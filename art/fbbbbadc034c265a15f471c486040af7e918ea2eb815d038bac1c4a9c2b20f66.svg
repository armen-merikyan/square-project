<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Calm and Turmoil</title>
  <desc id="desc">This piece encapsulates the tension between rage and calm, with warm reds sparking against more subdued pale blues and blacks. The jagged placements represent the 'spikes' of emotional rage, creating distinct disruptions in the otherwise quiet field of color. The dominant black and red contrast heavily emphasizes chaos at the center, while the lighter colors attempt to contain that energy, creating a profound sense of collision and unresolved tension. The layout, reminiscent of an island amidst a calm sea, reflects the emotional push and pull suggested by the seed.</desc>
