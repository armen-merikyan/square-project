<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">This artwork embodies the emotional tension between vulnerability and strength, using a palette that reflects warmth and coolness, with a focus on rose clay and distant lilac to evoke intimacy against an undercurrent of cool blue which suggests weight and exposure. The collision occurs centrally, with dense patterns of 'mirror' surrounded by lighter spaces reflecting the protective nature of the edges. Broken pixels create intentional disruptions, representing imperfection within both strength and vulnerability. The layout emphasizes an empty room, suggesting quiet tension and the urgency for balance between the center and edges, mirroring the complex interplay of these emotions.</desc>
