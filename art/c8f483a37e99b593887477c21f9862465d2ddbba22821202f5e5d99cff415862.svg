<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Serenity</title>
  <desc id="desc">This piece embodies the tension between 'longing' and 'resolve.' The top half reflects 'longing' with a muted palette of warm browns and soft greens, representing a soft pulse of emotion. The bottom half contrasts sharply with bold cooler hues of blue and white, symbolizing the compressed strength of 'resolve.' The broken pixels disrupt the serenity, adding intentional imperfections reminiscent of the fragmented feeling of longing. The main collision occurs in the middle, where warm and cool colors interweave the two emotional landscapes.</desc>
