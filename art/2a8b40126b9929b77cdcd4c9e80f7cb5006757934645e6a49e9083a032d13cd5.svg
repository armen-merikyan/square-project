<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Whispers of Trust and Suspicion</title>
  <desc id="desc">This composition embodies the emotional tension between trust and suspicion. The left side represents trust with a checker pattern in warm, soft greens and browns conveying stability and warmth. In contrast, the right side erupts into chaos with colder, muted whites and blues reflecting suspicion, marked by jagged interruptions and broken pixels. The palette balances warmth and coolness to evoke an emotional pull and convey the duality of these themes. The collision happens prominently along a diagonal that divides the grid, emphasizing the central thematic discord while still retaining a composition that flirts with order.</desc>
