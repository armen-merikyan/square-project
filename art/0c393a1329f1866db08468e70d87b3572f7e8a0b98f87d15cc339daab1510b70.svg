<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone of this artwork embodies a conversation between resilience and fragility. The chosen palette of moss green, bone white, rust, stone gray, and small gold reflects the organic struggle between exposed vulnerability—represented by the soft broken dots pattern—and the braiding strength of resilience. The left half, dominated by the broken dots, creates a feeling of delicate exposure, while the right side, adorned with dense braids of color, signifies a protective strength. The key contrast is located centrally, where these two patterns collide, suggesting an interplay of support and fragility, inviting the viewer to experience the tension of presence versus absence.</desc>
