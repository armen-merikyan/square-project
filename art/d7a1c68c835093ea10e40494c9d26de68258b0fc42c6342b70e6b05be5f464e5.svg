<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">The artwork explores the emotional dichotomy of love and betrayal through the use of warm pink and deep red contrasted against muted gray and dark maroon. The chosen colors create a tension that reflects the warmth of love clashing with the coldness of betrayal. The flowing arrangement is designed to evoke a sense of descending feelings, suggesting a transition from an inner warmth to outer chill, mirroring the themes of inside vs outside. The checkerboard pattern introduces an element of discord, with the broken pixels symbolizing imperfect love and uncertainty, while the negative space offers a breath amidst heavy emotion, representing loneliness and introspection.</desc>
