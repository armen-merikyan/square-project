<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Resolution</title>
  <desc id="desc">The emotional tone reflects a dynamic interplay between longing and resolve, articulated through color density. The chosen palette of 'relief_dread' captures the depth of longing with soft hues (pale mint and soft sky) contrasted by the assertive near black, evoking a sense of compressed strength. The main collision occurs in the center where patches of resolve (halo-like shapes in faded gold) interrupt the longing patterns ('patchwork' nature) around the borders, creating a quiet field amidst chaos. The negative space accentuates this emotional push and pull.</desc>
