<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Wholeness</title>
  <desc id="desc">The emotional tone captures the tension between longing (represented by soft pulses) and resolve (symbolized by strong fault lines). The palette, featuring signal green and electric blue, offers a striking contrast against the neutral base of dead black and static gray, allowing for a vibrant yet fragmented composition. The main collision occurs at the center, where the saturated colors battle dark edges, embodying the push and pull between containment and overflow. This interplay reflects the intricacies of longing and the desire for repair amidst feelings of damage, echoing the seed's themes of interruption and preservation.</desc>
