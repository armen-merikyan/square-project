  <title id="title">Fractured Integrity</title>
  <desc id="desc">This artwork embodies the emotional dichotomy between vulnerability and strength. The palette, drawn from 'safety_exposure', features muted tones like shelter green and warm brown juxtaposed with striking accents of cold white and open blue. The main contrast occurs at the center, where soft breaks in color collide with clear, rooted blocks. This collision symbolizes the struggle between exposure and protection. Broken pixels are strategically placed to suggest scars of past experiences, enhancing the theme of conflict and repair. The flow is horizontal, showcasing a narrative of gradual transition, while leaving negative space to evoke a sense of contemplation amid chaos.</desc>
