<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork conveys the tension between desire and emptiness through a vibrant and muted color palette. The bright shades of hot coral and blood orange symbolize desire, creating an emotional pulse that contrasts sharply with the low saturation hollow blue and charcoal, representing emptiness. The collision occurs primarily in the center, where the echo pattern of desire overlaps with the flood pattern of emptiness. The use of broken pixels introduces imperfections, reflecting a struggle against containment while maintaining an overall composition that feels both tense and controlled. The flow from outside to inward reflects the push and pull of these contrasting emotions.</desc>
