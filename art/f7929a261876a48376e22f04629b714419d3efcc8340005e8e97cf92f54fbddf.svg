<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ember Fracture</title>
  <desc id="desc">The emotional tone reflects a juxtaposition of love's warmth and betrayal's cold edge. The palette of pinks, reds, and gray serves to embody warmth and tension. The left side features dots, representing the softness and connection of love, contrasted against a crosshatch of gray and dark maroon on the right side that signifies betrayal. The broken pixels disrupt uniformity, echoing the theme of disconnection in an empty room. The stark transition between colors illustrates the emotional conflict, creating a rhythm of tension throughout the composition.</desc>
