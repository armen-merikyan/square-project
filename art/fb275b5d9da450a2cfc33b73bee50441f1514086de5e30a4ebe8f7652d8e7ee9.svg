<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Dissonance</title>
  <desc id="desc">This piece explores the emotional tension between confusion and clarity. The left half, dominated by darker shades of burnt orange and charcoal, evokes a sense of confusion through dense clusters, while the right half transitions into lighter, golden hues representing clarity. The central collision occurs at the midpoint, where these contrasting palettes meet and overlap, creating a visual pulse that suggests shifting emotions. The asymmetrical placement of colors embodies broken symmetry, while the broken pixels add imperfection, reinforcing the theme of disarray within clarity.</desc>
