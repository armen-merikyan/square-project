<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light Fragment</title>
  <desc id="desc">Emotional tone juxtaposes the heaviness of dread with the relief of light. The palette of pale mint and faded gold provides a comforting glow against the weight of storm gray and near black, which symbolize the overwhelming nature of dread. The primary collision occurs in the center, where the maze pattern of relief interrupts the ladder structure of dread, creating tension and visual interest. This arrangement expresses the struggle between light and dark in an abstract and emotional narrative.</desc>
