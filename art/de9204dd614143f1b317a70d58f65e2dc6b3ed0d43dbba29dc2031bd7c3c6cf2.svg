<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">The emotional tone of this artwork conveys a conflict between restlessness and peace, manifesting through the juxtaposition of chaotic and structured patterns. The chosen palette of pale aqua and mist gray evokes serenity, while alarm red and ink blue introduce urgency and tension. A central collision of colors in the middle-left and bottom-right corners represents the restlessness that disrupts the calm, with broken pixels that symbolize imperfections and interruptions in harmony. The balance of negative space enhances feelings of both solitude and congestion. This interplay forms an abstract representation of memory and motion without literal depiction.</desc>
