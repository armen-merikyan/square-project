<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Connections</title>
  <desc id="desc">The emotional tone captures the struggle between vulnerability and strength, using a palette that balances vibrant greens and golds against grounded earthy hues. The strong acid greens evoke alertness and energy, suggesting the rising signal of strength, while the creamy tones and deeper olives symbolize vulnerability's quiet field. The main contrast occurs as the jagged edges of the outer border, representing strength, collide with the softer, more open inner 4x4, symbolizing vulnerability. This creates a dynamic tension in the space, embodying the complexities of emotional connection and isolation.</desc>
