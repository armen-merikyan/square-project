  <title id="title">Fragile Balance</title>
  <desc id="desc">This artwork captures the emotional dialogue between vulnerability and strength using a palette of muted greens, browns, and soft blues, juxtaposed against stark whites. The central area is light and exposed, symbolizing vulnerability, while heavy, darker edges evoke strength and shelter. The contrast lies in the collision at the center, creating a dynamic push-pull sensation. The flow rises, representing hope and resilience despite the surrounding tension, reflecting the core idea of emerging from fragility toward empowerment.</desc>
