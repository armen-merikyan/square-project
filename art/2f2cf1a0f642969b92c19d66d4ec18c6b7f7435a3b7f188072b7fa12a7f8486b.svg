<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Anticipation</title>
  <desc id="desc">This artwork embodies the emotional clash between envy and gratitude. The dark palette of navy and black generates a grounding gravity, while sporadic bursts of dim cyan represent fleeting moments of gratitude that disrupt the solid void. The contradictions are captured through jagged edges hinting at instability while the central area remains softer, symbolizing a core of hope amidst the anxiety. The checker and target patterns collide, suggesting an ongoing struggle, echoed by the negative spaces that allow for breath and reflection in an otherwise dense battle of feelings.</desc>
