<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">This composition explores the emotional tension between vulnerability and strength through contrasting colors and patterns. The palette uses black for strength, emphasizing sharp edges, and electric blue and magenta to represent vulnerability, creating a soft yet vibrant focal point. The main collision occurs diagonally, illustrating the conflict between hard edges (strength) and fluid, open spaces (vulnerability). The pattern blends structured, spark-like blocks within an airy frame, creating a dynamic interplay that invites the viewer to navigate through feelings of exposure and protection.</desc>
