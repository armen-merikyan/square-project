<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Reflections</title>
  <desc id="desc">This artwork encapsulates the emotional tension between love and betrayal through the interplay of warm and cool colors. The palette consists of deep reds and warm pinks representing love, while dark maroon and gray symbolize betrayal. The outer rows frame a muted emotional landscape, suggesting isolation, while the inner rows use a staircase pattern to evoke a sense of upward motion and hope contrasted by the rigidity of the grid. The collision occurs as the warm heart-related colors meet the colder betrayal tones, creating an unresolved yet dynamic tension throughout the piece.</desc>
