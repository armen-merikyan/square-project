<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition embodies a tension between aspiration and constraint, using a stark contrast in emotional tones. The upper half is dominated by warm, vibrant colors symbolizing desire, depicted through a maze-like pattern that suggests movement and intention. The bottom half transitions to cooler, muted tones, exhibiting a sense of emptiness with an embers-like texture that conveys uncertainty and distant longing. The collision between these contrasting halves creates a visual echo of desire encountered with firm borders. Broken pixels intermittently disrupt the ordered flow, reinforcing the theme of interruption and the struggle of containment.</desc>
