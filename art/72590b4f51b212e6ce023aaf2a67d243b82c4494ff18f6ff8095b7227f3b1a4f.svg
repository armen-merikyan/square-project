<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">The emotional tone explores the conflict between restlessness and peace, using a palette that juxtaposes warm and cool colors to highlight tension. The darks (from 'stone_gray' and 'rust') suggest weight and restlessness, while the light colors (from 'bone_white' and 'small_gold') represent fleeting moments of tranquility. The main collision occurs in the center, where the crack pattern of restless colors interrupts the structured negative cross of peaceful colors, creating a visual dialogue of opposing feelings, echoing the essence of the seed.</desc>
