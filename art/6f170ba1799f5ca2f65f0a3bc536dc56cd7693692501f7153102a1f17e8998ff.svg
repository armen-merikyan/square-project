<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">This artwork embodies the emotional conflict between fear and hope. The outer rows utilize darker tones (#000000, #3D0053, #660066, #A30000) to evoke feelings of fear, representing jagged edges and a suffocating presence. In contrast, the inner rows introduce lighter, uplifting colors (#B7D99C, #D2E88C, #FFDA77, #FFE4B5) that symbolize hope through alternating checker patterns, suggesting an upward flow. The collision between the dark outer edge and the bright inner core establishes a stark dramatic tension, while the intentional placement of broken pixels adds a layer of imperfection that speaks to vulnerability. The overall layout follows a 'frame and core' concept, with 10% negative space throughout to maintain an emotional balance between chaos and calm.</desc>
