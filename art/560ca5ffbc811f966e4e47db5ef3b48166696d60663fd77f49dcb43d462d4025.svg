<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork captures the emotional dichotomy of 'emptiness' and 'desire' through its contrasting palette of warm, saturated colors against a backdrop of cool, muted tones. The warm hues of hot coral and blood orange represent yearning and energy, dominating the center of the piece. In contrast, the charcoal and hollow blue tones create a border that symbolizes containment and restraint, embodying the struggle against overflow. The chaotic yet structured arrangement reflects an ordered disruption, with broken pixels implemented to evoke an imperfect reality. This tension between the central saturation and the outer containment creates a dialogue that resonates with the seed's theme of desire battling against the constraints of emptiness.</desc>
