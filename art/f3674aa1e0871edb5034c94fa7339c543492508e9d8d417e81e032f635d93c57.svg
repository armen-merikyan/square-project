<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Boundaries</title>
  <desc id="desc">This piece explores the emotional dichotomy of control and surrender through color and texture. The palette, drawn from hues of pink, red, gray, and dark maroon, creates a warm yet conflicted atmosphere, where the pink and dark maroon denote warmth and tenderness while the gray gives a sense of restraint. The main contrast and collision occur centrally, where vibrant shades of red burst towards the edges, supported by rippling patterns encapsulating the ideas of overflow versus containment. This arrangement accentuates a feeling of urgency and restriction, echoing the central theme described in the seed.</desc>
