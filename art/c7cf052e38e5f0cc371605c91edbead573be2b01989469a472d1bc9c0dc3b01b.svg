  <title id="title">Fragmented Balance</title>
  <desc id="desc">This artwork juxtaposes the tension between restlessness and peace using a palette of warm brown, cool blue, and muted green. The dark colors represent peace while the bright patches reflect the disruptive energy of restlessness. The collision primarily occurs towards the center, creating a visual echo that gives a sense of unresolved motion, mimicking memory's fragmented nature. The broken pixels intentionally disrupt the harmony, suggesting the struggle between chaos and tranquility.</desc>
