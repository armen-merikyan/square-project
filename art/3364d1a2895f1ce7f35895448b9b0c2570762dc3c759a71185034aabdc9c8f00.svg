<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotions</title>
  <desc id="desc">The emotional tone of this piece captures the tension between tenderness and rage, conveyed through a palette that oscillates between muted tones and sharp accents. The dominant black (#000000) represents the compressed fury, while pale blue (#A3C1DA) serves as the abated calm in contrast. The layout incorporates a quiet channel in the middle, which disrupts a dense cluster of jagged patterns. Broken pixels suggest the unresolved journey of these emotions, adding intentional disruptions that echo the theme of guilt and forgiveness, allowing the artwork to breathe with both space and density.</desc>
