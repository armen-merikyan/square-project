<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The composition balances contrasting emotions of joy and grief through a palette that reflects both feelings: vibrant yellows and oranges symbolize joy, while deep blues and muted purples represent grief. This duality is expressed through a layout where pixels fall while simultaneously rising in weight. The glowing edges convey a sense of tension, drawing the eye inward where the grief is denser and the joy becomes punctuated. The asymmetry of the palette clashes in the center, demonstrating the impact of joy against the weight of grief, much like life itself. This creates a rhythm of pulse across the grid, echoing the emotional struggle.</desc>
