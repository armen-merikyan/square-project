<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Balance</title>
  <desc id="desc">This artwork explores the emotional tension between defiance and submission through a stark contrast in colors and patterns. The palette of burnt orange, dark red, charcoal, and gold evokes a sense of ancient fire, suggesting strength and vulnerability. The arrangement creates a mirrored effect, where the left side embodies defiance with chaotic noise patterns, while the right side embraces submission through soft, structured stripes. The central filled square symbolizes both openness and closure, inviting the viewer to feel the push and pull of emotions. The broken pixels across the edges interrupt the flow, enhancing the sense of imperfection and conflict inherent in the theme, contrasting density against negative space to create unease while maintaining imbalance.</desc>
