<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipsed Emotions</title>
  <desc id="desc">The emotional tone reflects the tension between love and betrayal, visualized as a striking contrast in warm and cool colors. The chosen palette embodies warmth (pinks and reds) alongside coolness (grays and dark maroon). This interplay forms a visual dialogue, where the outer border symbolizes the intensity of betrayal with broken symmetry and darker hues, while the inner core uses a flame-like pattern in softer colors to represent love. The diagonal rise helps create movement, suggesting an unresolved emotional journey. 'Burned edges' introduce a sense of imperfection, echoing the pain of betrayal amid lingering warmth, encapsulated in a fractured yet harmonious square.</desc>
