<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This piece explores the emotional dynamic between vulnerability and strength. The top half, using colors from the intimate palette—warm shadow and distant lilac—represents vulnerability with rippled patterns suggesting fluidity and an exposed core. The bottom half employs cool blue and rose clay in a structured stepwell formation, embodying strength and stability, framing the upper half. The main collision occurs at the horizontal divide, where the soft vulnerability meets the rigid strength, creating a visual tension. Broken pixels introduce intentional imperfections, echoing the fragility intrinsic to these emotions.</desc>
