<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">This artwork conveys the emotional pair of emptiness and desire through a strategic division of colors and spatial arrangement. The upper half, representing 'desire,' uses warm yellows and oranges, creating a sense of energetic pull, while the lower half, symbolizing 'emptiness,' employs muted purples and deep blues to evoke a feeling of quiet. The pattern of broken dots for emptiness interacts intriguingly with the mirrored pattern of desire, reflecting the tension between longing and void. The glowing edges accentuate the brightness of the desire palette, making the contrasting elements stand out crisply against the subtle deeper hues below. The intentional use of negative space enhances the emotional impact by allowing breathing room amid the color collisions.</desc>
