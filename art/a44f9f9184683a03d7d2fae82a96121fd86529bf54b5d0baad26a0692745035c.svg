<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Resolve and Longing</title>
  <desc id="desc">The emotional tone navigates between a yearning for connection and the firm boundaries of resolve, expressed through a palette of electric blue and magenta accented by deep black and bright lime. The use of black creates a stark contrast that represents the quiet void of longing, while the electric blue and magenta illustrate the urgency of resolution, colliding at the center to symbolize the struggle between these emotions. Broken pixels induce a sense of imperfection and disruption, echoing the themes of damage and repair. The arrangement has a central cluster of vibrant colors, surrounded by darker tones that hint at negative space, suggesting both a contained and overflowing emotional landscape.</desc>
