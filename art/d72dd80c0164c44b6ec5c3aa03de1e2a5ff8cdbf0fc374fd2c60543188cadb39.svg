<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Layers</title>
  <desc id="desc">The emotional tone captures the conflict between strength and vulnerability, with the palette of red, black, pale blue, and white highlighting these contrasts vividly. The predominant dark shades represent strength, providing a dense, stable base, while pale blue offers an exposed, fragile quality. The central collision occurs in the middle layers where the strength of the dark colors clashes with the fragile light. The layout emulates stacked bands of emotional strata, with intentional disruptions through broken pixels creating an impression of instability amidst the assertive borders, symbolizing hard edges. This pattern belies the complex interplay of connection and alienation, forming an abstract narrative of resilience and fragility.</desc>
