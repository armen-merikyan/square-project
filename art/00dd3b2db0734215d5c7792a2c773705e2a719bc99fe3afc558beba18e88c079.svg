<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Release</title>
  <desc id="desc">The emotional tone explores the conflict between control and surrender. The palette of moss green, bone white, rust, stone gray, and small gold reflects resilience and fragility, suggesting life amidst tension. Control manifests in the top rows through measured patterns of broken dots, while surrender flows into softer, negative cross patterns in the lower half, creating a visual dialogue. The main collision occurs in the vertical center where both patterns intersect, revealing a dynamic visual tension as the colors interact, evoking both a sense of pressure and eventual release.</desc>
