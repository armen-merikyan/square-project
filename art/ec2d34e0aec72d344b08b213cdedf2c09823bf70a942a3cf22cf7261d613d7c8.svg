<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone captures the tension between desire and emptiness. The palette blends saturated colors like hot coral and blood orange, reflecting desire's brightness, alongside charcoal and hollow blue, representing void and restraint. The left half of the grid is densely packed with warm colors portraying an overflow of need, while the right half features muted patches illustrating containment. Broken pixels add an intentional imperfection, embodying the scars of unfulfilled desire. The main collision occurs centrally, where warm and cool colors intersect, showcasing a conflict that invites the viewer to reflect on the push and pull of longing versus limitation.</desc>
