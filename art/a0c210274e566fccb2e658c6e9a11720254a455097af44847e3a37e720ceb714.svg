<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict Within Quiet</title>
  <desc id="desc">This piece embodies the emotional interplay between defiance and submission through the use of contrasting colors and intentional disruptions. The palette's muted cream juxtaposes with deep oxides and grays to illustrate layers of tension. The center is dense and vibrant, symbolizing defiance, while the edges fade into quieter tones, representing submission. The collision occurs centrally, where the ripple of defiance meets the cracks of submission, creating visual tension. Broken pixels disrupt the patterns, reflecting the chaos within a controlled environment.</desc>
