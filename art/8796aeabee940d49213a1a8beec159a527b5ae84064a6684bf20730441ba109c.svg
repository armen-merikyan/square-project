<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rising Signal</title>
  <desc id="desc">This artwork captures the emotional tension between joy and grief through a split horizontal layout, depicting an upward movement on one side (joy) and a downward pull on the other (grief). The palette blends warm yellows and oranges, representing joy, with cool blues and muted purples that evoke grief. The collision occurs in the center, where the colors interact, creating channels of flowing contrast that embody the duality of the emotions. Patterns emerge through 'ring' and 'frame' motifs, suggesting layers of feeling. The use of broken pixels reinforces the theme of imperfection in emotion, while maintaining a 10% negative space to allow the colors to breathe.</desc>
