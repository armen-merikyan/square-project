  <title id="title">Fractured Heartbeat</title>
  <desc id="desc">This composition embodies the emotional resonance of love and betrayal through contrasting palettes and patterns. The warm reds and pinks represent love, layered subtly against the more muted grays of betrayal. The jagged edges hint at the unseen fractures within relationships, while the crosshatch pattern in the center reflects warmth yet struggles under the flames of betrayal. The external layers present a chaotic border, which both enclose and threaten the core. Main contrast lies in the tension between warmth in the center and the cold gray engulfing it, suggesting a heartbeat fragmented yet persistent.</desc>
