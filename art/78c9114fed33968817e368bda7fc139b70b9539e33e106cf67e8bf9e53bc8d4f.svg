  <title id="title">Signal vs Noise</title>
  <desc id="desc">This artwork captures the tension between control and surrender through stark contrasts and layered patterns. The chosen palette reflects the duality of emotions: vibrant greens symbolize control, while softer honey gold and cream hints at surrender. The main collision occurs in the center, where structured patterns of 'stepwell' intersect with chaotic 'crosshatch', creating a visual pulse that conveys both pressure and release. Broken pixels introduce intentional disruption, enhancing the narrative of struggle between stasis and movement.</desc>
