<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Emptiness and Desire</title>
  <desc id="desc">The artwork explores the emotional dichotomy between emptiness and desire, signified by a contrast of warm and cool colors. The palette combines muted earth tones with faded blues, allowing for a subtle interplay of warmth and coolness. The layout features stripes indicating desire on one half, while the target pattern in muted shades invites feelings of emptiness. The top-weighted edge style signifies stability against the overwhelming noise of emotions, creating tension. Collisions occur where warm colors abruptly intersect cool tones, representing a struggle between opposing feelings.</desc>
