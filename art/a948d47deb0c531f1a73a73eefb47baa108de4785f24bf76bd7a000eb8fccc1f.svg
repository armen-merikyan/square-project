<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Signals</title>
  <desc id="desc">This piece explores the tug-of-war between vulnerability and strength. The dark blues and blacks represent strength and rootedness, creating a thick foundation that feels sturdy. The subtle dim cyan brings elements of vulnerability, suggesting a fragile layer that contrasts sharply against the dense colors. The interplay and clash occur primarily at the central pixels, symbolizing exposure amidst strength. The layout reflects a rising signal, conveying a sense of movement upward toward hope but disrupted by moments of vulnerability, much like signals battling against static interference. The broken pixels act as imperfections, highlighting the fragility within strength, creating a rich narrative of emotional tension throughout the piece.</desc>
