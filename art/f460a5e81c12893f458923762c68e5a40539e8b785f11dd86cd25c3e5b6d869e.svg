<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Forms</title>
  <desc id="desc">This composition embodies the emotional push and pull of longing contrasted with resolve. The palette of deep teal and cosmic indigo evokes depth and introspection, while hints of cold gold and star white punctuate the canvas, reflecting moments of clarity amidst the chaos. The main collision occurs diagonally across the center, where dynamic stripes meet a crack-like pattern, suggesting a struggle between order and chaos. Deeper colors dominate the left side, demanding attention, while lighter accents create airy, empty spaces reflecting the unresolved tension mentioned in the seed.</desc>
