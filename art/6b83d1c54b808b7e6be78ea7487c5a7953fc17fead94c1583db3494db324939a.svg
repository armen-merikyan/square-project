<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone captures a conflict between safety and vulnerability. The palette reflects 'shelter green' and 'cold white' for safety, and 'open blue' for exposure, creating a tension in color. The top rows evoke a protective feeling with muted, calming shades, while the bottom rows explode with vibrant indigo and pale skin tones, representing exposure. Contrast is emphasized by collision in the center, where safety softens the edges and the exposure radiates outward, creating echoes of color that interlace and disrupt. The positive and negative space rhythmically interplays to convey a story of juxtaposition.</desc>
