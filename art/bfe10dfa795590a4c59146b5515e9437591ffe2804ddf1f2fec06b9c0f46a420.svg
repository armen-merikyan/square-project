<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone oscillates between the vulnerability of exposure and the protective weight of safety, creating a tension that flows across the piece. The palette features colors symbolizing safety (shelter_green and warm_brown) and exposure (pale_skin, cold_white, and open_blue). The collision occurs centrally with brighter colors representing exposure meeting the darker tones of safety, creating a visual and emotional pulse. The two pulses of color play off one another, interrupted by broken pixels that hint at imperfections, emphasizing the theme of conflict between a fortified center and an open field.</desc>
