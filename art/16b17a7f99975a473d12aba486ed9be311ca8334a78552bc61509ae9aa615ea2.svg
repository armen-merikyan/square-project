<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Convergence of Tensions</title>
  <desc id="desc">The emotional tone of this piece captures the clash between defiance and submission, symbolized through contrasting colors and arrangement. The palette is rooted in 'awe_terror'—dark cosmic indigo and void black convey a sense of depth and obscurity, while accents of star white and cold gold add tension. The left side, embodying defiance, features framed patterns creating a sense of emergence, while the right, in submission, is dominated by a flooded approach that offers a soft enclosure. The main collision occurs at the vertical center, where the strong, bright colors of defiance fiercely contrast against the subdued, muted tones of submission, creating a dynamic play of emotions. The use of broken pixels introduces intentional scars, representing disruption within each emotional state, further enriching the narrative.</desc>
