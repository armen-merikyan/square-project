  <title id="title">Fractured Echo</title>
  <desc id="desc">The emotional tone explores the tension between love and betrayal, depicted through contrasting colors and placements. The selected palette of warm pinks and deep reds mirrors the warmth of affection, while dark grays and maroons introduce a sense of betrayal. The composition balances dense clusters of color with negative space, embodying the conflict of emotions. The design follows a mirrored layout with intentional disruptions to emphasize the theme of broken symmetry and the chaotic undercurrents of love.</desc>
