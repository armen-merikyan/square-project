  <title id="title">Tension of Duality</title>
  <desc id="desc">This piece embodies the tension between love and betrayal, mirrored yet interrupted by misalignment. The palette—soft pinks and deep maroons—evokes warmth and anguish, establishing contrast. The central diagonal rise meets a crosshatch pattern that clashes against sharp edges, representing emotional collision. The arrangement aims to capture a feeling of layered complexity, where warmth struggles against cold, echoing the themes of the seed.</desc>
