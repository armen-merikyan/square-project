<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoed Pulses</title>
  <desc id="desc">The emotional tone captures the tension of trust and suspicion, with trust prevailing in warm pastel shades contrasting against cooler muted hues. The selected palette's soft cyan and lavender gray evoke a sense of unease while residual black and plum hues create the weightiness of suspicion. The dense pattern of 'fault_line' meets the gentle interference of 'pulse_marks,' interrupting the balance with color collisions. Central placement of deep hues signifies a depth of emotion within the broader field of lighter colors, representing both resilience in trust and the fragility of suspicion.</desc>
