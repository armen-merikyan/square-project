<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflicted Clarity</title>
  <desc id="desc">The artwork embodies the emotional contrast between confusion and clarity, mirroring the tension of overlapping pathways. The color palette of lime, black, electric blue, and magenta reflects the duality; lime and electric blue suggest clarity and machine emotion, while black and magenta introduce confusion. The top half bursts with sharp contrasts and vivid colors, symbolizing clarity, against a lower half that deteriorates into sparks of confusion with subtle, fractured placements creating a 'broken' sense. The pattern logic radiates from the center outward, aligning with the seed's concept, while negative space preserves an element of calm against the dense chaos below, reflecting a balance between clarity’s intention and confusion’s intrusion.</desc>
