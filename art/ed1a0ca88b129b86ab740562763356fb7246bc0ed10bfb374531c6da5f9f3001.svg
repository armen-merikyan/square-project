<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This composition explores the emotional contrast between restlessness and peace. The palette of moss green and bone white evokes a sense of resilience and fragility, while the dominance of darker tones introduces an element of pressure. The higher density of color on the left symbolizes restlessness, utilizing abrupt transitions and uneven spacing to create an unsettling rhythm, while the gentle hues on the right promote a serene quality, creating a visual balance. The edge halo effect subtly contains the chaos, allowing the bright accents to peek through, representing hidden memories as if they are tracing paths through a tranquil surface.</desc>
