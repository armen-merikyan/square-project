<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Ambivalence</title>
  <desc id="desc">This composition captures the emotional tension between longing and resolve. The palette features warm clay tones and cool blues, symbolizing the dance between warmth of desire and the cool steadiness of resolution. The collision occurs centrally, marked by dark warm shadows intersecting with lighter cool blues, creating a vibrant tension. The barcode and stair patterns symbolize the converging forces of longing (barcode) that narrow against the structured ascent of resolve (stairs), creating a dynamic visual narrative of struggle and unity in divided space.</desc>
