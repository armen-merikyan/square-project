<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of defiance and submission through the use of a vibrant palette juxtaposed against muted tones. The colors are intentionally placed to create a sense of weight below, mimicking the phrase 'bottom weighted.' The interaction between bright yellows and oranges, representing defiance, is interrupted by the deeper blues and purples, echoing submission. The arrangement flows from left to right, enforcing a dynamic motion, while slight imperfections suggest a movement towards chaos within the structured grid pattern. Overall, the piece encapsulates the tension and emotional story of conflict, love, and betrayal through an abstract lens.</desc>
