<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal Contradictions</title>
  <desc id="desc">This artwork expresses the emotional tension between control and surrender through contrasting patterns. The green and blue tones represent control, structured in stripes, while the glitch of hot magenta disrupts these lines, evoking a sense of surrender. The center serves as the collision point where these two emotions meet, embodying both pressure and release through placement. The use of black and gray adds depth and interference, enhancing the feeling of clutter against an ordered backdrop, mirroring the struggle of maintaining structure amidst chaos.</desc>
