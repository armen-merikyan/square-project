  <title id="title">Broken Symmetry</title>
  <desc id="desc">The emotional tone of 'envy vs gratitude' suggests a tension between contrasting feelings. The chosen palette incorporates deep reds and grays, invoking warmth and coolness alongside weight and lightness. The main contrast occurs in the blend of dark maroon and bright pink, which represents envy and gratitude respectively, arranged in a zigzag pattern to symbolize the stair-like progression of emotions. This evokes a sense of disruption and reflection, aligning with the notion of mirrored imperfections and the interplay between heavy and light elements. The layout features falling pixels, allowing for negative space that enhances the visual contrast and discomfort, reinforcing the abstract story of complex emotional duality.</desc>
