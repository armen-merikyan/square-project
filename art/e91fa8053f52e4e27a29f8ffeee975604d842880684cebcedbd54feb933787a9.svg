<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone captures the tension between desire (warm, saturated tones) and restraint (dark, muted colors). The palette emphasizes the pull of vibrant contrasts—hot coral and blood orange symbolize active longing, while the charcoal and hollow blue create a feeling of containment and distance. The main collision occurs towards the center, where the intense colors of desire clash against the structured, hard edges of restraint, creating an abstract narrative of longing that is perpetually thwarted.</desc>
