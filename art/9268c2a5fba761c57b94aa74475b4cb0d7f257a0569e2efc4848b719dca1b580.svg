<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Structure and Chaos</title>
  <desc id="desc">This piece captures the emotional duality of panic (disorder) and control (order). The palette of black and dark violet evokes the weight of fear, while the soft gold and pale green introduce hope. The outer rows provide thick borders of black and dark violet to represent chaos, enclosing the inner 4x4 grid, which uses soft gold and pale green in a maze-like pattern. The main contrast occurs where the dark boundaries clash against the vibrant core, representing the internal struggle between control and chaos. The interplay of structured maze within the vibrant core offers a visual metaphor of fighting through panic towards clarity.</desc>
