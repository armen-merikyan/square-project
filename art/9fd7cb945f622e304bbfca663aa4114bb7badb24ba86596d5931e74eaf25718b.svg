<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Harmony in Tension</title>
  <desc id="desc">This composition channels the emotional highs of joy and the lows of grief, embodying a zigzag flow that mirrors life's unpredictability. The left half features bright yellows and oranges, reflecting joy's vibrant nature and sparkling optimism, while the right half embraces deep blues and muted purples, symbolizing the weight and contemplation of grief. The stark contrast between the warm, upward-swaying colors and cool, downward-dominant tones creates a dynamic tension, emphasizing the push and pull between these emotional states. The composition's broken pixels bring a sense of imperfection and authenticity, capturing the rawness of emotional experiences.</desc>
