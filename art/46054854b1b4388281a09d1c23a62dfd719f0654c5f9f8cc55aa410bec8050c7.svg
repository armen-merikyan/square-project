  <title id="title">Exposed Layers</title>
  <desc id="desc">This artwork conveys an emotional tension between safety and exposure. The chosen palette, inspired by soft greens and warm browns, evokes a sensation of shelter amidst vulnerability. A central pale area represents exposure, contrasted sharply by darker, more saturated tones at the edges, highlighting the pressure often associated with seeking safety. The collision occurs in the vertical split, illustrating the emotional wrestling between two opposing states. The design captures a layered narrative, akin to a quiet yet complex echo flowing from the core outwards.</desc>
