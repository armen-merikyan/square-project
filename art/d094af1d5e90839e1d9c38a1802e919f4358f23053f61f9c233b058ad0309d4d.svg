<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">This artwork explores the emotional tones of longing and resolve, using contrasting patterns to evoke tension and harmony. The selected palette consists of earthy moss green, warm rust, soft bone white, cool stone gray, and a hint of small gold, representing resilience mixed with fragility. The collision occurs at the center, where static marks of longing meet the dynamic crosshatch of resolve, creating an engaging balance. Patterns disrupt each other, embodying the push and pull of emotions, while broken pixels introduce intentional imperfection, mirroring the theme of repair versus damage. The layout fosters a sense of argument, leaving just enough negative space to evoke a feeling of open-endedness and reflection.</desc>
