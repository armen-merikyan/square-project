<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Harmony</title>
  <desc id="desc">The artwork reflects the emotional tension between restlessness and peace. The palette incorporates warm coral and soft amber for moments of calm, contrasted against cold slate and blue black to depict a sense of disquiet. The interaction between the flowing patterns, denser pulse marks and the lighter pressure bands, creates a visual dialogue, suggesting a balance between motion and stillness. The light vs dark contrast emphasizes the ongoing internal argument while the quiet channel of negative space runs diagonally, drawing the viewer’s eye through the piece, symbolizing the memories passing through motion. The deliberate placement of broken pixels adds an intentional disruption, capturing the raw feelings that fluctuate between clarity and turmoil.</desc>
