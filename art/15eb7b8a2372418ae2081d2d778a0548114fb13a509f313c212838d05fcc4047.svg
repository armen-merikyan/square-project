<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Disarray</title>
  <desc id="desc">This piece embodies the emotional duality of confusion versus clarity through the interplay of closely spaced color blocks that oscillate between dark and subdued tones. The palette, derived from 'broken_memory,' leans into sepia and faded blue shades to evoke a sense of nostalgia and ambiguity. By emphasizing the central area with dense colors while allowing edges to fade into lighter, nearly blank spaces, an effect of 'falling pixels' is created, mimicking the tension between fragmented clarity and obscured chaos. The thick outlines denote boundaries while leaving negative space to symbolize unresolved emotions. The overall movement from the center outward illustrates a gradual loss of defined structure, enhancing the feeling of confusion as clarity diminishes.</desc>
