<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Boundaries</title>
  <desc id="desc">The emotional tone captures the conflict between desire and restraint, expressed through a palette of saturated and muted colors. The colors incidentally collide, with warm reds and oranges representing desire spilling from a corner while the cooler tones impose boundaries, suggesting that desire exceeds containment. The pattern oscillates between braids of heat and patchworks of restraint, creating an energetic yet conflicted composition. The main contrast occurs at the center, where the warm colors penetrate the edges defined by muted tones, emphasizing the struggle and interplay within the square.</desc>
