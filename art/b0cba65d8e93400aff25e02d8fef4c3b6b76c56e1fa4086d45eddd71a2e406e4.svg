<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece explores the tension between vulnerability and strength through a palette of warm and cool colors. The hot coral and blood orange radiate a sense of strength, while the dust pink and hollow blue introduce vulnerability. The central area, dominated by pale colors, symbolizes exposure, with the heavier, darker shades at the edges providing shelter and definition. Contrasts between dense clusters and quiet spaces create visual disruption, echoing the emotional themes of the seed. The edges are softened, with broken pixels adding an element of imperfection, reinforcing the themes of exposure and the intricate interplay of human emotions.</desc>
