  <title id="title">Order and Disruption</title>
  <desc id="desc">This composition captures the tension between 'panic' and 'control' through a clash of structured patterns and chaotic bursts. The palette of pink, red, gray, and dark maroon mirrors themes of love and betrayal—evoking emotional depth and complexity. The left side reflects stability with a mirrored pattern, while the right side disrupts with erratic stripes representing chaos. This creates a visual conflict where the top-weighted arrangement symbolizes the struggle for control amidst the underlying panic.</desc>
