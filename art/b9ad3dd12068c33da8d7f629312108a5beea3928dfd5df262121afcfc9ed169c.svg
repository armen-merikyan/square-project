<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order in Chaos</title>
  <desc id="desc">This composition reflects the emotional tug-of-war between control and panic. The left side, embodying control, uses a cohesive dark palette with a split-screen pattern forming a solid base. In contrast, the right embraces chaos through a mirrored pattern, introducing jarring light tones, suggesting an intrusion into order. The palette of deep blacks and dim cyans evokes a chill, while the hints of white signal distress and fragmentation. The abrupt intersections between solid dark and fragmented lighter tones create a strong emotional collision that speaks to the tension of the seed. Broken pixels are introduced, enhancing the chaos and imperfection, contributing to the overall story of navigating control amidst bursts of panic.</desc>
