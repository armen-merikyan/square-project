<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Echo</title>
  <desc id="desc">This piece embodies the emotional struggle between panic and control through a stark contrast of deep, dark colors and softer, muted tones. The chosen palette of sepia, tan, dust gray, and faded blue speaks to the complexities of memory and emotion, as sepia relates to nostalgia and faded blue evokes a sense of calm amidst chaos. The central area is heavily populated with noise patterns, reflecting panic, while the edges are softer and more controlled, illustrating the desire for stability. The arrangement, with dense clusters in the center transitioning to open spaces at the edges, captures the conflict of seeking control in chaotic situations, creating a dynamic visual narrative of emotional tension.</desc>
