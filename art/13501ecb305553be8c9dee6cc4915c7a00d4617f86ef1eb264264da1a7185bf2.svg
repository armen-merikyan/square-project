<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">The emotional tone of 'defiance vs submission' acts as a guiding force for this composition, where angular resistance collides with soft collapse. The chosen palette—ripe green, acid green, honey gold, deep olive, and cream—reflects this duality of strength and delicacy, allowing for vibrant contrast against more subdued backgrounds. The main collision occurs in diagonal segments, where defiance (the scar pattern) fills one corner, resisting the gentle cracks of submission that encroach from the opposite wedge. The broken pixels introduce intentional disruptions that echo the struggle between these emotions, while maintaining a sense of spaciousness and dynamic rhythm across the canvas.</desc>
