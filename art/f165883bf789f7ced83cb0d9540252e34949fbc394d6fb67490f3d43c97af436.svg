<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition embodies the emotional struggle between defiance and submission. The palette of pale mint, soft sky, storm gray, near black, and faded gold visually reflect a sense of relief contrasting against dread. The dense center suggests defiance, pushing against the surrounding lighter colors that represent submission, creating a swirling tension. The main contrast lies at the center, where dark hues collide with the lighter edges, thereby echoing both pressure and release amidst a densely packed arrangement, interrupted by broken pixels that signify imperfections in this struggle.</desc>
