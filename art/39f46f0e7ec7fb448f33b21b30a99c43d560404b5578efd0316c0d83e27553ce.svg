<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Longing and Resolve</title>
  <desc id="desc">This piece captures the emotional tension between longing and resolve through a contrasting palette of warm corals and cool slates, arranged diagonally to depict the push and pull of emotions. The warm hues represent the yearning, whereas the cold tones signify certainty and strength. Patterns of stacked pixels clash with pulsing marks, creating a rhythmic heartbeat of unresolved feeling across the canvas. The asymmetry, punctuated by intentional broken pixels, embodies the disruptions of intimacy and distance, all while maintaining a central quiet space that invites contemplation.</desc>
