<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Serenity</title>
  <desc id="desc">This artwork embodies the tension between restlessness and peace, represented through contrasting colors. The dominant dark palette punctuated by lighter accents reflects emotional conflict. The use of navy and black introduces a foundation of depth and quietude, while the dim cyan introduces moments of brightness—echoing fleeting peace against the backdrop of turmoil. The diagonal arrangement suggests a movement that is both unsettling and sporadic, evoking the idea of motion. Broken pixels serve as intentional imperfections, enhancing the discord yet bringing a sense of resolution through lighter patches. The interplay of dark and light signifies memory versus motion, embodying the essence of the seed in an abstract, emotive narrative.</desc>
