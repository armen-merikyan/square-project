<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry vs Break</title>
  <desc id="desc">This artwork embodies the emotional tension between clarity and confusion, capturing dense moments of overlapping paths where clarity starts to dissolve into chaos. The chosen palette of pink and red conveys emotional intensity while gray and dark maroon capture the sense of confusion. The color placement emphasizes an asymmetrical pattern with a heavy center that gradually diffuses into lighter, broken areas, reflecting a push-pull dynamic between focus and fragmentation. By retaining a central pixel structure derived from the 'tiny_plus' seed while implementing the 'mirror_broken' layout, the work invites viewers to navigate their own emotional response amidst the structured chaos.</desc>
