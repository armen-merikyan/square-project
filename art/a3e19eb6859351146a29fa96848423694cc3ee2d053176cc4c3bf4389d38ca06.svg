<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Veil</title>
  <desc id="desc">This artwork explores the emotional tension between rage and calm through a contrasting palette of aggressive reds and soothing blues. The central focus erupts with intense, jagged red marks, symbolizing anger, while cooler, soft blue bands fight for containment around the edges, representing peace. The collision occurs predominantly at the center, where these energetic disparities interact, suggesting a chaotic encroachment of heat over serenity. The inclusion of broken pixels introduces intentional disruptions to echo the theme of eroded symmetry, contributing to a dynamic, yet imbalanced rhythm throughout the piece.</desc>
