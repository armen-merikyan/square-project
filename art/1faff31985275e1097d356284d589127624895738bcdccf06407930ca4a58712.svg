<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Echo</title>
  <desc id="desc">The emotional tone of the piece reflects a struggle between audible clarity ('signal') and overwhelming chaos ('noise'). The chosen palette of deep navy and dim cyan creates a stark contrast between shadowy echoes and a single pulse of light, representing the conflict between exposure and shelter. The dominant navy resembles depth and quiet tension, while the dim cyan acts as the bright, interrupted signal in this otherwise dense composition. The collision occurs centrally, where disparate patterns converge, echoing the themes of memory and erasure as they overlap.</desc>
