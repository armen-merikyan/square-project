<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects the struggle between yearning (desire) and limitations (emptiness) through a composition that contrasts bold warmth against cold, hollow spaces. The palette of hot coral and blood orange represents desire with vibrant intensity, while charcoal and hollow blue depict the contrast of emptiness with subdued, cool tones. The collision of dense, flooding patterns on the left with scattered islands of emptiness on the right visually narrates the push and pull of these emotions. This interspersing formation evokes feelings of pressure and containment, suggesting an imbalance with surrounding quiet within a restrictive border.</desc>
