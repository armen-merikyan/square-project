<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This composition reflects the emotional tension between certainty and curiosity. The dense clusters of dark greens evoke a sense of order and solidity, while the brighter accents of honey gold and acid green introduce curiosity and disruption. The main contrast occurs in the center where darker colors break into lighter accents, suggesting a push-pull dynamic. The jagged edges add to the chaos of the interplay between the two emotions, creating a sense of both confinement and liberation.</desc>
