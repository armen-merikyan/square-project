<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry vs. Disruption</title>
  <desc id="desc">This artwork explores the emotional dichotomy of joy and grief. The palette comprises bright yellows and oranges symbolizing joy, contrasted against deep blues and muted purple representing grief. The layout features a nearly symmetrical design interrupted by randomness, which reflects the notion of order versus chaos and safe versus threatened, where the viewer's eye travels from light to dark. The 'ring' and 'radial' patterns convey a sense of expansion and fragmentation, respectively, creating a pulse-like rhythm across the canvas that echoes the emotional tension of the seed.</desc>
