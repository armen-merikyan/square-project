<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Edges of Certainty</title>
  <desc id="desc">This composition embodies the emotional tension between trust and suspicion through a contrasting use of colors from the ‘hunger_restraint’ palette. The darker shades represent suspicion and create a sense of weight and pressure, while the muted cream and orange symbolize trust, offering glimpses of warmth and light. The interplay between the ripple pattern of suspicion and the thread-like continuity of trust creates a visual dialogue centered toward the grid's middle, symbolizing conflict and resolution. The design allows for negative space, echoing a quiet tension against denser hues, inviting the viewer to explore the emotional landscape within.</desc>
