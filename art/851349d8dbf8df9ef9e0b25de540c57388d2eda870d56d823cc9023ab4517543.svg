<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Fracture</title>
  <desc id="desc">This piece explores the complexity of emotional contrasts between defiance and submission. The palette of stain brown and deep wine symbolizes the weight of defiance against the soft gold and warm ivory representing submission, creating a dynamic tension. The primary collision occurs at the center where the pressure band pattern interrupts the stepwell layout, embodying a visual struggle between chaotic movement and ordered quietness. The arrangement of broken pixels adds a sense of imperfection, suggesting scars of conflict, while the negative space enhances the feeling of tension and unresolved feelings.</desc>
