<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Time</title>
  <desc id="desc">This piece evokes the emotional tension between nostalgia and progress. The palette of deep black and soft gold embodies the heaviness of memories alongside the lightness of aspiration. The warm vs cool contrast serves to illustrate a split, where the top half is more chaotic and vibrant, suggesting the bustling energy of progress, while the bottom half is anchored in deep, muted tones, representing a sense of grounding and nostalgia. The 'stairs' pattern reflects a rising motion, but also a struggle to balance between ascent and the weight of the past. Broken pixels introduce imperfection, enhancing the theme of interrupted memories.</desc>
