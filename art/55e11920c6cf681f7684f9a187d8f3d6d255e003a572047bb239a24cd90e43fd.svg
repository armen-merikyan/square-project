<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">This composition embodies the dynamic tension between restlessness and peace. The chosen colors in the palette, which include muted plum and soft cyan, evoke a sense of melancholy wonder. The cool tones (soft cyan and lavender gray) side against the warmer accents of rain blue and moon white, representing the struggle of containment against emotional overflow. The center of the arrangement features a collision of warm and cool colors, where the hot hues break through the cooler layers, creating visual stuttered lines reminiscent of restlessness. The edge style features inset outlines that contain the more chaotic core, hinting at an underlying order. The patterns of maze (peace) and stairs (restlessness) overlap and interrupt each other throughout the grid, enhancing the abstract conflict within the overall structure.</desc>
