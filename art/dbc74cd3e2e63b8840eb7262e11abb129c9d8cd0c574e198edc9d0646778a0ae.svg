<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Constraint</title>
  <desc id="desc">This piece reflects the emotional tones of defiance, represented by sharp contrasts and bold edges, versus submission, illustrated with softer, muted spaces. The clean white and icy blue create an atmosphere of calm pressure, whereas the violet gray and warning orange introduce sparks of intensity. The collision occurs in the center where angular lines of defiance clash with the flowing channels of submission, creating tension. The 'ember' shape seed influences the spiral pattern emerging from the center, symbolizing an inward motion that both protects and restricts the outer, softer tones.</desc>
