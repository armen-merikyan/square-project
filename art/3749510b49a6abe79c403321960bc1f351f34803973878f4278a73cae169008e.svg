<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Edge of Resonance</title>
  <desc id="desc">This artwork conveys an emotional tension between defiance and submission. The palette of stain brown and warm ivory represents the grounding weight of submission, while soft gold signifies the bright refusal of defiance. The central pattern features broken dots (defiance) tussling with a crosshatch (submission), creating a collision in the center that reverberates outward. The top-heavy edge weight suggests a protective halo around the vulnerable core, while broken pixels symbolize disruptions in this interplay. Overall, the arrangement evokes a sense of dynamic conflict, encapsulating the chaotic beauty of opposing forces.</desc>
