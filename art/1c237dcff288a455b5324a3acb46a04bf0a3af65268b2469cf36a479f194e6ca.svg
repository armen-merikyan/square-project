<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Change</title>
  <desc id="desc">This piece captures the tension between nostalgia and progress through a palette of deep contrasts, combining rich, dark hues with vibrant accents. The cool black and electric blue suggest a foundation of nostalgia while the bright lime and magenta represent the sharpness of progress. The layout, influenced by falling pixels, mimics the emotional descent, adding weight at the bottom to signify the lingering past. The jagged edges invoke chaos, embodying the struggle between memory and forward motion, while the broken pixels symbolize the imperfections inherent in this evolution.</desc>
