<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order in Chaos</title>
  <desc id="desc">The emotional tone is a tension between control and panic. I chose a palette combining muted purple for calmness and deep blue for depth, with warm yellow and orange to inject conflict and energy. The left half reflects structured control through straight patterns and muted colors, while the right erupts into chaos with jagged contrasts and disordered placements. The main collision occurs at the dividing line, where the clean, ordered pixels meet the chaotic, broken ones, suggesting a gradual shift from security to uncertainty. This encapsulates the ‘outside inward’ flow, highlighting how pressure builds from the edges towards the center, encapsulating a narrative of a retreat into chaos as stability drains.</desc>
