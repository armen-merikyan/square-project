<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Opposites</title>
  <desc id="desc">This artwork represents the conflict between vulnerability and strength. The left side, characterized by softer colors like warm coral and soft amber, embodies vulnerability through a flooding pattern that creates a feeling of exposure. The right side contrasts with the more stable, darker tones of cold slate and blue-black, applying a negative cross pattern that suggests strength and resilience. The collision happens where these two emotional realms meet, in the center of the square, creating an interplay of tension and connection. The design deliberately leaves space for reflection, embodying both the weight of emotion and the lightness of openness.</desc>
