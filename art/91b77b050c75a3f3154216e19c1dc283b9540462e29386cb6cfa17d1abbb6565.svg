<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Vulnerability</title>
  <desc id="desc">The emotional tone captures the tension between exposure and safety. The chosen palette of muted greens, soft browns, and pale whites creates a backdrop of quiet safety juxtaposed with brighter blues that signify open vulnerability. The main collision occurs in the center of the piece, where the brighter colors disrupt the softer tones, embodying the split between thin shelter and bright exposure. The pattern translates the seed's themes into an arrangement that suggests layering and rhythm through placement, suggesting a dynamic interaction of different emotional states.</desc>
