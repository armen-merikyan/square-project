<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Whispers of Contrast</title>
  <desc id="desc">This piece captures the emotional tension between loneliness and connection through a deliberate arrangement and palette inspired by warmth and muted tones. The choice of burnt orange and dark red evokes a sense of depth and intensity, suggesting both the warmth of connection and the heaviness of loneliness. The grid-like structure instills a cramped feeling, while the broken pixels disrupt this order, symbolizing imperfection and memory. The primary contrast occurs between the dark edges forming a protective barrier and vibrant warm hues that pulse from within, mimicking the struggle between isolation and reaching out.</desc>
