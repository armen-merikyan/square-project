<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Unfulfilled Signals</title>
  <desc id="desc">The emotional tone captures a tension between desire and emptiness. The chosen palette of warm hues (yellow, orange) against cool tones (deep blue, muted purple) creates a vivid contrast that embodies the push and pull of longing versus void. The main collision of emotions occurs where warm colors escalate from the left side of the composition, symbolizing desire, while the cooler colors dwindle at the right, representing emptiness. This layout gives an impression of a dynamic flow from intensity to a whispering quiet, echoing the seed's themes of rising signals and ambivalence.</desc>
