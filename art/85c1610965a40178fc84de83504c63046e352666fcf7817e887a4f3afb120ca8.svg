<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This artwork captures the oscillation between joy and grief through its contrasting color dynamics and arrangement. The palette of bright yellows and oranges symbolizes joy, while deeper blues and muted purples evoke a sense of grief. The asymmetrical pattern creates tension, with brighter hues clustering towards the upper left, suggesting an outburst of joy, whereas the deeper tones diffuse towards the lower right, representing the weight of grief. The ‘broken pixel’ elements disrupt the symmetry, embodying the idea of shattered balance as emotions collide, reflecting love and betrayal. The arrangement flows from the corner, allowing the contrasting energies to spiral out, creating a rhythmic pulse that enhances the emotional narrative.</desc>
