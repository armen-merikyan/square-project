<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">The emotional tone contrasts dread and relief, using a palette of dim greys and calming mint and soft sky to reflect this tension. The collision occurs in the center where dense dark colors create an unsettling core, while lighter hues spiral outward, suggesting a release. The framed edge embodies dread with uneven borders, while the inner grid lightens up, symbolizing relief as it opens the composition. The broken pixels add an intentional disruption to the pattern, enhancing the emotional conflict without literal representation.</desc>
