  <title id="title">Collision of Tides</title>
  <desc id="desc">This composition captures the emotional tones of 'quiet' and 'pressure' through contrasting color clusters and patterns. The chosen palette of soft off-white and faint peach represents calmness, while dark navy and compressed red evoke a sense of pressure and weight. The top half features a patchwork pattern that suggests dense pressure, while the bottom employs a fault line motif to illustrate quiet clarity. The main collision occurs diagonally across the center where these two patterns interact, representing a struggle between stillness and tension, echoing the seed's themes of conflict and resolution.</desc>
