<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Held Back</title>
  <desc id="desc">This composition captures the emotional tone of desire contrasted with restraint through a dynamic play of saturated and muted colors. The palette blends hot coral and blood orange to evoke warmth and yearning, intersected by cool charcoal and hollow blue that symbolize the boundaries and limitations of restraint. The central collision, marked by stacked warm colors in the lower half, collides with a cool pressure band in the upper zone, demonstrating the tension between reaching out and being held back. Overall, the art evokes an intense yet conflicted emotional narrative, channeling the push-and-pull dynamic expressed in the seed.</desc>
