<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Disarray</title>
  <desc id="desc">This artwork embodies the tension between clarity and confusion through a calculated imbalance of color and pattern. The use of a stark black and electric blue palette evokes a pulsating rhythm, contrasting the orderly checker pattern of clarity with the chaotic target pattern of confusion. The asymmetrical arrangement reflects the narrative of broken symmetry, while manipulating negative space maintains a breath amidst density. Each color placement expresses emotional duality—bright versus muted, striking against a dark foundation to elevate the thematic expression of chaos meeting clarity.</desc>
