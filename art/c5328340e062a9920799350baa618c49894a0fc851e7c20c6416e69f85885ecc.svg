<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inner Conflict</title>
  <desc id="desc">The emotional tone captures the essence of fear contrasting sharply with hope, represented through a dynamic palette of deep black and dark violet against soft gold and pale green suggesting light and growth. The split vertical layout generates a tension that echoes the dual nature of emotions, while the burst flow introduces a sense of energetic disruption. The crosshatch pattern embodies fear with jagged edges, while the stairs pattern represents hope with upward movement, creating a rhythmic collision throughout the piece. This abstract pattern emerges from the seed by enveloping a central shape, represented through changing color density and spatial arrangement.</desc>
