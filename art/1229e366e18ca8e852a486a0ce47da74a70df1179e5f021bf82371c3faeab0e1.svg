<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symphony of Contrasts</title>
  <desc id="desc">The artwork explores the tension between joy and grief by juxtaposing vibrant colors with muted tones. The joyful top half embodies brightness and openness through a composition of playful 'broken dots', suggesting a dance of light. The grief-laden bottom half adopts a staircase pattern in deep blue and muted purple, symbolizing heaviness and descent. The palette, featuring warm yellows and oranges against cool blues and purples, emphasizes emotional contrast. Here, the collision happens at the midpoint where joy meets grief, creating visual dissonance and a narrative of conflict. The layout harmonizes the two emotional states while leaving intentional negative space to suggest unresolved feelings.</desc>
