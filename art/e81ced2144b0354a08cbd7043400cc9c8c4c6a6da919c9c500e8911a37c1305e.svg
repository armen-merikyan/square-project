<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This artwork embodies a dichotomy between chaos and control, utilizing a palette that juxtaposes deep black and stark white with softer shades of pale blue and vibrant red. The black and white create a tension that suggests control, while the red and blue add emotional depth, representing panic and calm respectively. The layout features a zigzag pattern that mimics conflict and resolution—creating an imbalance that draws the eye. Broken pixels introduce imperfections, echoing the emotional turmoil of the subject. The pattern flows diagonally to reflect the rise and fall dynamic, emphasizing contrast and collision between emotional states. The negative space serves to highlight the chaos against the control, enhancing the overall impact.</desc>
