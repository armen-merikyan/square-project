<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Echoes</title>
  <desc id="desc">The emotional tone contrasts between the warmth of love and the sharpness of betrayal, reflected in the chosen palette of soft pinks and deep maroons creating a dialogue of pressure. The outer layers embody the chaotic 'betrayal' through sharp transitions between dark and light while the inner 4x4 core plays with the warmth, moving in a maze-like structure to suggest safety and intimacy. Broken pixels punctuate the design, introducing an imperfection echoing the theme of disrupted harmony through a delicate interplay of positive and negative space.</desc>
