<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork expresses the tension between desire and emptiness using warm and cool colors to create emotional resonance. The color palette of hot coral and blood orange conveys a sense of yearning, while the presence of charcoal and hollow blue introduces a feeling of restraint. The main collision occurs diagonally, where the warm 'desire' colors converge toward the cooler 'emptiness' colors, suggesting a struggle between expansion and containment. The broken pixels interrupt the flow, emphasizing the imperfections of this emotional dichotomy, while the empty spaces allow the viewer to breathe within the tension.</desc>
