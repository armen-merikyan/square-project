<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Contrast</title>
  <desc id="desc">The emotional tone captures the struggle between feelings of envy (represented by darker colors) and gratitude (the lighter accents). The palette of deep blacks and dark violets conveys weight and pressure, while soft golds and pale greens introduce lightness and warmth, suggesting calm moments amidst turmoil. The layout mirrors but with slight disruptions, reflecting the broken mirror theme, emphasizing the interplay and struggle of opposites. The contrast is pronounced with dense dark areas giving way to scattered brighter colors. The zigzag and spiral flows create a dynamic, almost chaotic rhythm, portraying the push and pull between these conflicting emotions.</desc>
