<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Near vs. Far</title>
  <desc id="desc">This piece captures the emotional interplay of softness and severity, with powder pink symbolizing tenderness and carbon black representing starkness. The palette emphasizes contrast, with gentle rounds of color bleeding into sharper, defined dots, creating a sense of pressure pushing against the quiet backgrounds. The layout starts from a corner, allowing softness to invade the space while maintaining negative space in the diagonals. The collision of patterns—soft blends against structured dots—invokes an ongoing dialogue between contrasting feelings.</desc>
