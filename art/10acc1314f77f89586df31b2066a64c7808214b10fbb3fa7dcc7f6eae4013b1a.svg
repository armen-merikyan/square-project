<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tension in Color</title>
  <desc id="desc">The emotional tone captures the conflict between defiance and submission, represented through contrasting fields of color. A palette of dark maroon and pink juxtaposes the feelings of weight and lightness. Dots represent defiance in the left half while flames symbolically suggest submission in the right. The primary contrast occurs in the central boundary, where the chaotic pinks and deep maroon create an unresolved tension, embodying the narrative of love and betrayal. The pattern flows from left to right, suggesting an uneven balance, enriched by broken pixels that add an element of imperfection, representing the struggle against conformity.</desc>
