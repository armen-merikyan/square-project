<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tides of Contrast</title>
  <desc id="desc">This composition explores the tension between certainty and curiosity. The outer region, depicted with darker tones, represents the weight of certainty and order, while the inner area embodies curiosity with lighter, more dynamic colors suggesting movement and exploration. The palette of off-white and dust gray anchors the piece with a quiet pressure, while compressed red and dark navy create striking contrast, evoking a sense of depth and collision. The main contrast occurs along the edges, where dark and light meet, reflecting the struggle between rigid boundaries and the flow of curiosity. This friction invites viewers to navigate the shifting spaces within, inspired by the idea of waves against channels.</desc>
