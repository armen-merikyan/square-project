<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Weight</title>
  <desc id="desc">This composition evokes the emotional struggle between fear and hope, captured through contrasting color palettes and arrangements. The left quadrants embody 'fear' with darker shades, sharp lines, and a feeling of jagged edges, representing weight and pressure. Conversely, the right quadrants symbolize 'hope' with softer, lighter colors and patterns that exhibit upward flow and glowing edges, suggesting illumination and elevation. The central area acts as a collision between these emotional states, creating visual tension. The fear_hope color palette reinforces this dichotomy through rich darks and soft lights, while the negative space ensures a sense of openness despite underlying pressures.</desc>
