<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Duality</title>
  <desc id="desc">This piece embodies the emotional duality of defiance and submission through a contrast of colors and patterns. The use of pale aqua as a soft backdrop represents submission, creating a serene field. In contrast, alarm red and ink blue punctuate the center, symbolizing defiance and chaotic pressure. The stepwell pattern of defiance is marked sharply against the smoother ash-field of submission, creating a collision that encourages the viewer to explore the tension between order and chaos. Broken pixels introduce intentional irregularity, amplifying the emotional disruption present within the structure. The arrangement spirals outward, carrying the viewer's gaze from a centralized clash of colors to the calmness of the edges, embodying the push and pull of contrast.</desc>
