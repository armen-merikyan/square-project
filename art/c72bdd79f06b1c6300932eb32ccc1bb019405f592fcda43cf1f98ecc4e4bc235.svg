  <title id="title">Memory vs Motion</title>
  <desc id="desc">This artwork juxtaposes the emotional contrasts of softness and severity, using a palette of muted and saturated tones to explore tensions between gentle transitions and sharp delineations. The main collision occurs centrally, with sharper contrasts in crimson and black interrupting softer shades of pink and gray, symbolizing struggle and fluidity in memory. The spiral pattern represents growth, countered by threaded lines that evoke restrictions, capturing the essence of unresolved emotions from the seed.</desc>
