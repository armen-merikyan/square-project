<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory and Motion</title>
  <desc id="desc">This piece captures the interplay of softness and severity through a diagonal layout. The palette features 'powder_pink' and 'warm_white' to embody softness, contrasted sharply by 'carbon_black' and 'sharp_crimson' to evoke severity. The central collision occurs between muted tones from the softness palette and stark dark accents from the severity side, representing the emotional tension of guilt and forgiveness, where memory collides with motion. The edge remains static with hints of disruption, suggesting an outward spiral of contemplation and release. The presence of negative space contributes to a sense of breath amidst the intensity, reinforcing the abstract concepts behind the seed.</desc>
