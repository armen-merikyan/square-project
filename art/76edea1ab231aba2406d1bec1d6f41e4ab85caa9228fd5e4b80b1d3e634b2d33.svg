<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the emotional tension between vulnerability and strength through a stark contrast of soft, pale colors and deep, intense hues. The palette reflects a balance of warmth and severity, embodying the exposed nature of vulnerability against the protective embrace of strength. The collision occurs where the sharper colors invade the softer ones, creating a sense of conflict. The arrangement of colors plays on the idea of pressure from the edges dominating the center space, with broken pixels creating intentional disruptions that symbolize imperfections in defense. The overall composition evokes an interplay of safety and exposure in a visually engaging and abstract form.</desc>
