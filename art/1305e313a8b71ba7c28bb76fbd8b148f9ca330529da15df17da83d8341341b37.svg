<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Shelter</title>
  <desc id="desc">The emotional tone reflects a tension between vulnerability (exposure) and comfort (safety). The color palette features 'shelter_green' and 'warm_brown' representing safety, juxtaposed with 'open_blue' hinting at exposure. The central area of 'pale_skin' is interrupted by 'cold_white', suggesting echoes of impact. The layout 'scattered_repair' is mirrored by the flowing 'channels' of exposure, while vertical 'barcode' patterns convey safety. The main collision is in the center, emphasizing the push-pull dynamic between the two emotions.</desc>
