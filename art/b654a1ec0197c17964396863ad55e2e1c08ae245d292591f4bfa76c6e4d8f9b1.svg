<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Unraveled</title>
  <desc id="desc">This piece captures the emotional pull of 'emptiness' contrasted against 'desire'. The outer border represents a sense of cool detachment with dark shades, framing a more vibrant core of warmth where desires collide. The use of pixel patterns—stripes for emptiness and dots for desire—creates a visual tension, suggesting movement from cool, stark edges toward a central burst of warmth. This reflects the rising versus falling dynamic as colors ebb and flow, interspersed with negative space to symbolize isolation, punctuated by warmer tones that express longing.</desc>
