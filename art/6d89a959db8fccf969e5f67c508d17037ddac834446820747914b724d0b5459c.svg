<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Equilibrium</title>
  <desc id="desc">This composition embodies the emotional tension between rage and calm. The palette features intense reds against cooler blues and whites, representing the explosive nature of rage juxtaposed with the soft embrace of calm. The chaos of jagged red pixels creates a halo effect in the center, clashing with the restrained blues that trend toward the edges, symbolizing containment. Such a visual conversation is enhanced by intentional broken pixels that disrupt symmetry, enhancing that sense of eroded balance mentioned in the seed. The overall layout hints at a broken frame, capturing the essence of internal struggle and balance.</desc>
