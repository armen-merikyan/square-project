<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Will</title>
  <desc id="desc">This artwork explores the emotional tension between defiance and submission. The palette, featuring earthy tones like moss green, stone gray, and rust, contrasts with bone white and small gold accents, symbolizing strength amidst fragility. The layout indicates a corner invasion, where the defiant parts expand diagonally while the submission colors recede. The primary collision occurs in the center, where the braid pattern of defiance intersects with the subdued pressure band of submission, creating a dynamic push-and-pull energy. Broken pixels enhance the sense of imperfection and disruption, aligning with the theme of conflict within balance.</desc>
