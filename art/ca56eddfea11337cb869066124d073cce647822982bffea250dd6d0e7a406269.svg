<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone of this artwork explores the tension between desire and emptiness, symbolizing a saturated pull against an impending boundary. The palette of hot coral and blood orange evokes warmth and yearning, while the charcoal and hollow blue introduce coolness, suggesting the absence and hollowness of containment. The collision occurs at the center where the dots of desire—the warm colors—interact with the cracked emptiness—represented by cool tones. Patterns of dots suggest desire trying to breakthrough amidst cracks that signify restraint and emptiness. This duality creates a visual story of longing and confinement without literal representation.</desc>
