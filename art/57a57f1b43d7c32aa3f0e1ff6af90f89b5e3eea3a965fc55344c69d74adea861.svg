<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">This composition embodies the emotional oscillation between joy and grief. Using a palette of vibrant yellows and oranges against deep blues and muted purples creates a striking contrast, representing the duality of emotions. The grid pattern emerges from joy, while the ring structure symbolizes grief, creating tension where they meet. The arrangement features a zigzag flow to convey movement and disruption, while ensuring there's enough negative space to reflect the weight of grief against the brightness of joy. The central area is busy with intersecting patterns, suggesting a heart of emotion, while the edges fade into darker tones, echoing the boundaries of sorrow.</desc>
