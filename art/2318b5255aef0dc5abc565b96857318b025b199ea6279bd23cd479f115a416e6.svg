<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tension</title>
  <desc id="desc">The emotional tone captures the battle between defiance and submission, using the palette of cosmic indigo, void black, star white, cold gold, and deep teal to create a sense of awe and terror. The contrasting thick diagonal stripes of cold gold against the radial, softer flow of deep teal illustrate the clash of order and chaos, with the center acting as a grounded focal point of defiance while edges represent submission. The use of broken pixels signifies interruptions and imperfections, adding depth to the narrative of conflict between opposing forces. Main contrast occurs where gold slices through the indigo background, embodying the threshold of tension.</desc>
