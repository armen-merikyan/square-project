<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetrical Disruption</title>
  <desc id="desc">This piece explores the emotional tension between clarity and confusion, represented through contrasting colors and patterns. The palette combines electric blue and lime to create vibrant intersections that pulse against the soft black undertones. The layout utilizes a central dark square surrounded by chaotic patterns of bright colors, reflecting the 'symmetrical_vs_break' theme. The confusion arises from the deliberate placement of broken pixels within the structured chaos, creating emotional friction and suggesting both clarity and distortion. The 'broken_dots' pattern representing clarity emerges from the confusion, while the darker, sharper contrasts echo the struggle of emotions.</desc>
