  <title id="title">Fluid Tension</title>
  <desc id="desc">This composition expresses the tension between control and surrender through contrasting color densities. The palette features black and pale blue, representing strong emotional contrasts: the deeper tones signify control, while the lighter hues symbolize surrender. The primary collision occurs in the center, where dense black outlines encircle pale blue spaces, creating the sensation of pressure versus release. The layout mirrors across the vertical axis with intentional breaks, symbolizing interruptions in flow and the ongoing struggle between two emotional states.</desc>
