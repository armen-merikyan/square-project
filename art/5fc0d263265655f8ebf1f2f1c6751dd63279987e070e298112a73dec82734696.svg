  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a tension between bright desire and muted restraint. The palette combines warm reds with cool muted blacks and creams, creating a push and pull of saturation vs muted tones. The main contrast occurs at the center where saturated colors intersect with darker edges, illustrating the struggle of desire against a sealed border. This pattern conveys a narrative of reaching within limitations, evoking feelings of longing intertwined with boundaries.</desc>
