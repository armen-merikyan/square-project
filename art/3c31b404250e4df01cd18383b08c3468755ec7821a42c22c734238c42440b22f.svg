<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Flow</title>
  <desc id="desc">This composition explores the emotional dichotomy of certainty and curiosity, channeling a sense of rising tension from a denser bottom to a more open top. The palette reflects a warm core, inviting curiosity with shades of hot coral and blood orange, contrasting against the darker tones of charcoal that evoke the feeling of confinement and chaos. The main contrast emerges in the center where static patterns of certainty collide with the erratic crosshatches of curiosity, creating visual tension and a sense of movement. This pattern illustrates the struggle and interplay between structure and exploration, where boundaries and curiosity coexist yet disrupt each other.</desc>
