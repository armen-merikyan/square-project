<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Tension</title>
  <desc id="desc">This artwork captures the emotional dichotomy of restlessness and peace through contrasting colors and patterns. The warm tones of hot coral and blood orange signify the unease and motion inherent in restlessness, while the cooler shades of charcoal and hollow blue bring a sense of calm and balance. The diagonal arrangement of colors introduces a dynamic tension, suggesting an ongoing argument between these emotions, while the porous edge style allows light to seep through, hinting at moments of peace amidst chaos. Broken pixels create intentional disruptions, representing the memories that instigate the tension, ensuring both elements coexist without resolution, echoing the essence of the seed.</desc>
