<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Solace</title>
  <desc id="desc">The artwork reflects a dynamic interplay between restlessness and peace. The chosen palette of signal green, electric blue, dead black, static gray, and hot magenta captures the vibrancy of unrest set against soothing undertones. The outer edges, composed mainly of dark tones, signify a closed, uneasy boundary, while the inner core utilizes lighter colors to suggest moments of serenity. The collision of static patterns in the edges against the smoother, hinged forms in the center creates a sense of movement and interruption, echoing the tension of memory and motion as they coexist.</desc>
