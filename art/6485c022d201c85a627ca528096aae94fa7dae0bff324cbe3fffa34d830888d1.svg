<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Uneven Echoes of Intention</title>
  <desc id="desc">This artwork captures the emotional tension between trust and suspicion through contrasting colors and patterns. The palette, featuring muted gray with sharp pink and red accents, reflects a struggle between stability and tension. The left side employs broken dots representing trust, creating an open, unbroken path, while the right is disrupted by a maze-like pattern embodying suspicion. The central collision invites the viewer into a dynamic space where emotion intersects, emphasizing a delicate balance of resilience and fragility, echoed by the use of jagged edges.</desc>
