<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory in Motion</title>
  <desc id="desc">This artwork explores the emotional contrast between softness and severity, utilizing a palette of soft powder pink and warm whites alongside stark carbon black and sharp crimson. The composition plays with the interplay of a chaotic constellation pattern (softness) and a structured stepwell layout (severity). The central area, enriched with crimson, suggests intensity, while the periphery, softened by pink and warm white gradients, evokes gentility. The collision between the soft and severe patterns is emphasized in the center, creating an area of tension that is both visually and emotionally impactful. The broken pixels introduce intentional imperfections, evoking memories and personal narratives set against a broader backdrop of emotional complexity.</desc>
