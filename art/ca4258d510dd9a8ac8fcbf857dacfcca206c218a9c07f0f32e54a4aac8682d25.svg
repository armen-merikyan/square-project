<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipsed Emotions</title>
  <desc id="desc">This abstract piece represents the complex relationship between envy and gratitude, visualized through contrasting colors and patterns. The palette, derived from 'ancient_fire', introduces warmth with burnt orange and gold, invoking feelings of aspiration and abundance, but is offset by darker shades symbolizing envy and inner turmoil. The left side employs a striped pattern, symbolizing the unresolved tension of envy, while the right disrupts this with a target shape, suggesting focus on gratitude. The composition flows from left to right, creating a movement that contrasts the chaotic interruptions on the left against the more grounded elements on the right. These placements create a collision of feelings, encapsulating the emotional interplay between heaviness and lightness.</desc>
