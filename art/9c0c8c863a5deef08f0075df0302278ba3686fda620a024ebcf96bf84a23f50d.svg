<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This artwork encapsulates the emotional tension between longing and resolve. The palette of lime, electric blue, black, and magenta reflects this duality—lime and electric blue symbolize longing with their vividness, while black conveys a strong, resolute boundary. The main contrast occurs in the center, where densely packed colors collide with more negative space, suggesting a struggle between the desire for connection and the ability to stand firm. The broken pixels intentionally disrupt the flow, echoing feelings of damage and repair, inviting the viewer into the dance of emotion captured within the pattern. The layout emphasizes a corner invasion, representing how longing spreads and interjects in a space defined by stronger shapes of resolve.</desc>
