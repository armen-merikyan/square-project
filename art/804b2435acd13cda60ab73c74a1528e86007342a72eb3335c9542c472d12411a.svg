<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Fracture</title>
  <desc id="desc">The composition explores the tension between joy and grief, with contrasting emotional tones reflected in the colors. The warm yellows and oranges on the left side symbolize joy, creating a vibrant energy, while the deep blues and muted purples on the right exhibit the heaviness of grief. This split layout emphasizes the dichotomy, and the pattern of teeth versus noise reflects the clarity of joy against the obscurity of grief. The collision occurs where these colors meet—creating a stark contrast, echoing the struggle between these emotions. Imperfections are introduced through selected pixels to evoke the nuances of emotional experiences, creating a deliberate brokenness within the expansive negative space that suggests a whisper of unresolved feelings.</desc>
