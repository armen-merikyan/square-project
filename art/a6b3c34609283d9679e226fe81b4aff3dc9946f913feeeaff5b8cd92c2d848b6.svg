<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Fracture</title>
  <desc id="desc">The emotional tone captures the tension between love and betrayal, encapsulated through contrasting color choices. The palette of warm pinks and reds woven with dark maroon and gray reflects the complexity of these feelings. The outer sections use a 'stairs' pattern to signify betrayal's harsh, jagged nature, while the inner space employs a 'rain' pattern to represent love's softness, creating a visual conflict. The stark contrast between the soft inner core and the sharp edges of betrayal contributes to a narrative of emotional conflict and unresolved tensions. Negative space accentuates feelings of emptiness and isolation, encapsulated by the surrounding darker hues.</desc>
