<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collisions of Trust</title>
  <desc id="desc">The emotional tone balances trust and suspicion, invoking tension and warmth through color placement. The palette blends deep wine and warm ivory to represent resilience against shades of ash gray and stain brown, highlighting the contrasting feelings. The composition uses diagonals and edges to suggest movement and pressure at the corners, while an inward spiral softens the balance. The main collision occurs subtly in the center, where the warm colors meet the cool, reflecting the push and pull between trust and suspicion.</desc>
