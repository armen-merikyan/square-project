<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Threads</title>
  <desc id="desc">This composition explores the emotional interplay of longing and resolve, using a palette that juxtaposes dark tones with moments of light. The top half reveals a chaotic pattern of dim cyan and black, embodying longing with a halo effect and scattered arrangement, suggesting a feeling of reaching out yet feeling distant. The bottom half firmly resolves into structured rows of navy and white, reflecting strength and compression. Key contrast resides at the center, where the emotions collide, demonstrating the tension and balance between yearning and determination. The presence of broken pixels adds intentional disruptions, symbolizing scars from the past, giving the piece depth and movement.</desc>
