<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Waves</title>
  <desc id="desc">The emotional tone reflects the conflict between certainty and curiosity, using color to illustrate pressure and quietness. The selected palette of deep navy and dim cyan conveys a sense of depth and calm against the starkness of black and white, highlighting the tension between order (certainty) and chaos (curiosity). The central collision occurs where the darker colors intrude into lighter spaces, creating an echo of interruption that speaks to the ebb and flow of these emotions. The use of broken pixels hints at imperfection and creates visual scars, resonating with feelings of relief from the cage of dread. The layout emphasizes quiet channels against dense pressure, illustrating the psychological conflict.</desc>
