<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure vs Release</title>
  <desc id="desc">This composition embodies the tension between quiet and pressure, where deep, dark colors weigh heavily in one corner, signifying pressure, while lighter tones create a lattice of space and clarity across the opposite side. The palette—off-white for calmness, dust gray for neutrality, compressed red as an accent of intensity, dark navy as the weight of pressure, and faint peach to introduce a sense of softness—was chosen to contrast the emotion spectrum. The collision occurs diagonally, from the dark navy heavy edge to the lighter, quieter hues that dissolve into the space, creating an effect of layered emotions—intense in one area and softly fragmented in the other. The patterns overlap and interrupt each other, delivering a visual narrative of internal struggle and resolution.</desc>
