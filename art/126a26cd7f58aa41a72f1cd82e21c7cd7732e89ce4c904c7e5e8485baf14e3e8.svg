  <title id="title">Beneath the Surface</title>
  <desc id="desc">This artwork embodies the emotional tension between love and betrayal through contrasting colors and layouts. The palette of warm pinks and deep maroons evokes feelings of intensity and vulnerability, while grays introduce an element of coldness, representing betrayal. The layout supports a corner invasion flow, with warm colors bleeding into cool ones, suggesting a deceptive comfort that festers. The broken pixels interrupt symmetry, reflecting the dissonance between internal and external experiences, and the patterned variations of radial warmth and striped coolness create a narrative of emotional conflict and unresolved tension.</desc>
