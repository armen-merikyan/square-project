<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collisions</title>
  <desc id="desc">The artwork captures the tension between envy and gratitude through a contrasting palette of dark violet and soft gold against a backdrop of black and pale green. The warm vs. cool contrast symbolizes the pressure of emotion colliding with a feeling of release. The 'corner_invasion' layout starts with the dark hues in the corner, spreading diagonally to create a sense of quiet space interrupted by vibrant patches of color, embodying the push and pull of emotion. The chosen patterns evoke a sense of scatter and spark, reinforcing the theme of chaotic yet beautiful emotional collisions.</desc>
