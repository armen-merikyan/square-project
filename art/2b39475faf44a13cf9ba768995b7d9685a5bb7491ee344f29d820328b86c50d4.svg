<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Shelter</title>
  <desc id="desc">This piece captures the emotional tension between safety and exposure. The palette of gentle greens and warm browns conjures feelings of shelter, while pale skin and cold whites introduce vulnerability. The top section, dominated by warmer colors, represents the feeling of safety, creating a weighty border that feels protective, contrasting sharply with the bottom's cooler colors which express exposure. The collision occurs in the center vertical split where the patterns of broken dots and ash fields intertwine, creating a visual tension that suggests movement and flow, reflecting the emotional themes born from the seed.</desc>
