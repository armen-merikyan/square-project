<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tear in the Fabric</title>
  <desc id="desc">This artwork reflects the emotional tension between loneliness and connection through a balanced yet asymmetrical color placement. The palette employs deep black and vibrant red for intensity intersected by the gentler pale blue and white, embodying bursts of connection. The top-weighted layout suggests pressure from above, hinting at the heaviness of solitude, while the scattered patterns of broken dots evoke fragments of memory and interaction. The central seed manifests as a space filled with cracks and interruptions, illustrating hidden depths within the fabric of connection emerges despite external pressures.</desc>
