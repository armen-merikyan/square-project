<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Frames</title>
  <desc id="desc">This artwork explores the emotional tension between certainty and curiosity through a structured yet disrupted pixel arrangement. The palette choices reflect clarity and confusion, emphasizing the contrast of icy blues and dramatic blacks against glowing whites and a vibrant warning orange. The main collision occurs centrally, where the dark, solid mass of black is interrupted by the bright almost chaotic orange, representing the struggle of curiosity fighting against the rigidity of certainty, all rising within the context of the layout which promotes upward movement, symbolizing hope or escape.</desc>
