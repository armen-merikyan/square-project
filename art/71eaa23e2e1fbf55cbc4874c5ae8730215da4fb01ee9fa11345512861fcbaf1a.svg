<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">This artwork captures the emotional tension between defiance and submission through color and form. The palette combines warm yellows and oranges with cool deep blues and muted purples to create a push-pull effect, reflecting light against weight. The left and right sides of the artwork mirror each other with slight disruptions, symbolizing the duality of emotions, while a 'half-square' shape resonates through the design as an echo of conflict and resolution. Broken pixels introduce imperfection, enhancing the sense of interruption. The overall arrangement evokes feelings of unresolved tension and balance, allowing the viewer to sense both openness and closure.</desc>
