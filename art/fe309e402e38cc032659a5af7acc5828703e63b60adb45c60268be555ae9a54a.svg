<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Silence and Noise</title>
  <desc id="desc">This piece embodies the emotional tension between defiance and submission through the juxtaposition of warm rust and moss green against cooler bone white and stone gray. The left half (defiance) features lighter accents suggesting energy and interruption, while the right half (submission) represents a quieter, more subdued rhythm. The central area showcases a clash of warmer and cooler tones, forming a pulsing pattern of diagonal lines, encapsulating the essence of the seed. Broken pixels introduce imperfection, reinforcing the theme of struggle within order.</desc>
