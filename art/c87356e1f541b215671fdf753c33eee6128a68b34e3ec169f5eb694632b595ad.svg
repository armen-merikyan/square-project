<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This artwork explores the emotional tension between restlessness and peace through a visually striking clash of contrasting patterns. The color palette reflects a balance of vibrancy and muted tones—hot coral and blood orange create dynamic warmth, while charcoal and hollow blue evoke calmness. The collision prominently occurs around the center, where the grid-like patterns of restlessness intersect with the serene rings of peace, illustrating a struggle between fluid motion and structured calm. Throughout, broken pixels added imperfections, symbolizing the unresolved tension of memory and motion, mirroring the seed's essence.</desc>
