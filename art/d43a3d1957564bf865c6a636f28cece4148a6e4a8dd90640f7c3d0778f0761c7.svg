<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Resonance</title>
  <desc id="desc">This composition captures the emotional tension between the ideas of spark and ash, reflecting the duality of resilience and fragility. The palette of cosmic indigo, void black, star white, cold gold, and deep teal evokes awe and terror, establishing a stark contrast that parallels the seed's themes. The outer border employs ash-like stripes, suggesting a sense of restraint and fading heat, while the inner 4x4 area uses crosshatch patterns infused with brighter accents reminiscent of sparks. The collision occurs predominantly at the center, where the contrasting patterns intersect, creating dynamic tension that speaks to the struggle between memory and erasure. Overall, the abstract arrangement embodies the intricate balance of holding on and letting go.</desc>
