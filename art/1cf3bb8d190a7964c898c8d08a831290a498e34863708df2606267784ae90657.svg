<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Symmetry</title>
  <desc id="desc">The artwork explores the tension between defiance and submission through a color palette of deep red and pale blue, contrasting aggressive warmth with cool tranquility. The collision occurs at the center, where the angular defiance of sharp red pixels meets a softness of pale blue mirroring the edges, creating a gradient of conflict. The placement emphasizes an open central space surrounded by darker tones, reflecting the balance between order and chaos suggested by the seed. Broken pixels throughout symbolize disruptions and imperfections in this emotional battle, and the layout follows an eroded symmetry, echoing the theme of quiet encroachment against an assertive center.</desc>
