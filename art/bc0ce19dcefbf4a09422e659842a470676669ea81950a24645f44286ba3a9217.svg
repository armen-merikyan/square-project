<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Against Restraint</title>
  <desc id="desc">The emotional tone plays on the tension between emptiness and desire, with the color palette capturing saturated warmth and deep blues to represent yearning and containment, respectively. The main contrast occurs at the grid's center where hot coral collides with charcoal, creating a visual explosion that embodies the struggle of desire meeting a barrier. Negative space provided by hollow blue emphasizes the overwhelming pull of hunger while deliberate broken pixels introduce imperfection, reflecting the chaotic nature of desire in contrast to the order sought by containment.</desc>
