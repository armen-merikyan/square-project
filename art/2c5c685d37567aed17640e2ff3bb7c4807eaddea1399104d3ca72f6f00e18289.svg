<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Static Pulse</title>
  <desc id="desc">The emotional tone reflects a struggle between clarity and chaos. The palette of navy, black, and dim cyan captures the tension, with navy acting as a deep ground for the signal and black embodying the noise. The layout presents a bordered noise (black and dark hues) framing a core of central clarity (cyan) that suggests a pulse fighting through static. The collision occurs predominantly in the central areas, where light interacts with dark, symbolizing memory against erasure, an attempt to maintain identity amidst confusion. The broken pixel placements enhance this sense of disruption, visually manifesting the abstract idea of signals attempting to break through noise.</desc>
