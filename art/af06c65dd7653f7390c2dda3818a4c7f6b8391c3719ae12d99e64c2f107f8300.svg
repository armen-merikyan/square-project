<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">This composition reflects the emotional duality of defiance and submission expressed through an inward spiral of color. The palette of rose clay and cool blue establishes a contrast between warmth and calm, creating a sense of tension. The edge style introduces an upward weight, emphasizing strong blocks of defiance in the center, clashing with softer halos of submission. The collision happens mainly at the center, where denser colors intersect with lighter hues, suggesting a struggle between these two forces, mirroring the inward spiral concept in the layout.</desc>
