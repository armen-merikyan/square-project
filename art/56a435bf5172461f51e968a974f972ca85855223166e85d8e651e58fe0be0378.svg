<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Shadows</title>
  <desc id="desc">The artwork depicts the emotional tension between love and betrayal through an interplay of warm and cool colors. The palette utilizes shades of pink and red to symbolize love, contrasted with dark maroon and gray representing betrayal. The diagonal rise in the layout suggests hope, while the asymmetric patterns evoke feelings of broken trust. This contradiction creates collisions of warmth and coldness, highlighting the complex nature of relationships. Selected colors fit within the context of ‘burned edges’ and ‘sharp vs soft’ by combining harsh contrasts with softer gradients, maintaining a balance of negative space as mandated by the design rules.</desc>
