<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Clarity</title>
  <desc id="desc">This composition balances the emotional tensions of signal and noise through the use of a dark palette representing noise against a bright central pulse of clarity. The contrast arises from the hard edges and diagonal layout, with muted tones framing an intense white center that simulates a readable rhythm amid static chaos. The seed's elements of exposure and invasion generate a collision of emotion, resulting in a structured randomness within a confined space that aims to evoke a sense of memory and erasure.</desc>
