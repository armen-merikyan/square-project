<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Dark</title>
  <desc id="desc">This piece captures the emotional tension between fear and hope through its jagged and soft contrasts. The palette of dark violet and soft gold conveys a struggle between heavy, dark corners and a glimmering center, representing hope. The layout, influenced by negative space, enhances the feeling of emotional weight on one side while allowing a small burst of light to exist, symbolizing hope. The zigzag flow of color placement creates a sense of rising signals and interrupted patterns, mirroring the uneasy dance of fear on the edges and hope at the core.</desc>
