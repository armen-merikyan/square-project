<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This piece embodies the emotional tension of vulnerability contrasted with strength. Using a palette of dark shelter green and warm brown to represent strength on the left, and pale skin tones with cold white and open blue on the right to illustrate vulnerability, the artwork employs a split vertical layout. The left is dense with striped patterns symbolizing strength and stability, while the right features stair-like patterns suggestive of fragility and exposure. The collision occurs at the center, where the contrasting emotions overlap, creating a visual dialogue of protection versus exposure. The incorporation of broken pixels adds imperfections, echoing real-world complexities in the emotional landscape, fostering a sense of depth and intrigue.</desc>
