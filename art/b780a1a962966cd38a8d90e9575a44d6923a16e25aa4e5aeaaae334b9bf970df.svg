<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balancing Tensions</title>
  <desc id="desc">The emotional tone captures the interplay between panic (represented by dense bursts of fiery colors) and control (expressed through cooler, more structured hues). The palette includes rich blacks and dark violets to signify depth and chaos, contrasted by soft golds and pale greens symbolizing hope and control. The main collision happens at the center, where the bright, flame-like colors unexpectedly burst against the darker background, suggesting both conflict and resolution. The zigzag pattern represents the chaotic movement of emotions, while symmetric placements invoke a desire for order, creating an intricate tension throughout the piece.</desc>
