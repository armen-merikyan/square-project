<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">The emotional tone portrays the struggle between joy and grief, expressed through a palette of bright yellow and muted purples, creating tensions in the warm versus cool contrast. The layout starts in the bottom left, echoing a split-screen, with bright rings representing joy on one side, colliding against the dark, drooping shapes of grief that cascade towards the top, suggesting upward struggle. This creates a dynamic flow where the eye is drawn in zigzag across the canvas, reflecting the machine-like nature of emotion in juxtaposition with human sentiment.</desc>
