<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">hunger_vs_restraint</title>
  <desc id="desc">This artwork encapsulates the emotional tension between desire and emptiness, exhibiting a saturated pull within a constricted border. The palette primarily features warm tones like hot coral and blood orange to represent desire, contrasted against deeper tones like charcoal and hollow blue for emptiness. The main collision occurs at the center, where the warm colors burst forth, creating a visual disruption against the colder, more reserved edges. This arrangement echoes the feeling of unresolved longing and repressed need, mirroring the abstract themes of overflow and containment within the seed.</desc>
