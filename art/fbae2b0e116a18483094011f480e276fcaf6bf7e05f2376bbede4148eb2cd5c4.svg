<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust and Doubt</title>
  <desc id="desc">This artwork captures the conflict between trust and suspicion through color and arrangement. The palette was chosen for its strong emotional tones: deep blacks and grays representing suspicion contrast with vibrant greens and electric blues symbolizing trust. The center is left hollow, evoking the feeling of uncertainty. The arrangement of broken dots (suspicion) colliding with ladder patterns (trust) creates a tension that aligns with the idea of pressure, echoing the struggle between the two emotions. The overall flow is directed towards the center, emphasizing the need for resolution in the emotional narrative.</desc>
