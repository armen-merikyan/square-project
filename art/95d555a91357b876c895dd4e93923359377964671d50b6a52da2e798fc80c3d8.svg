<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Scattered Repair</title>
  <desc id="desc">The emotional tone balances strength and vulnerability, expressing a tension between exposure and protection. The palette of signal green, electric blue, dead black, static gray, and hot magenta mirrors the duality of soft and hard edges, using brighter colors to 'patch' the darker ones, representing hope amid threat. The main collision occurs in the center, where the strong grid of stability clashes with the flame-like patterns of vulnerability, evoking an incomplete repair that reflects connection and alienation.</desc>
