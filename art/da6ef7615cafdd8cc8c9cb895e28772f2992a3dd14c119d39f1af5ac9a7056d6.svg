<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Conflict</title>
  <desc id="desc">The emotional tone captures the struggle between clarity and distortion. The palette of deep navy and dim cyan symbolizes the cold nature of noise juxtaposed against a stark white signal, creating a cold warmth. The contrast occurs primarily in the center, where jagged edges meet smooth fields, visually representing collision and echoes of communication. The patterns of scars against barcode lines create a narrative of interruptions, emphasizing the tension between structure and chaos, as suggested by the seed.</desc>
