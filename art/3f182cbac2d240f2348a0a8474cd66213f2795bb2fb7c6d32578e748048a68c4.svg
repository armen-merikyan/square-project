<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erosion of Emotion</title>
  <desc id="desc">This piece explores the emotional dichotomy of rage versus calm, using a palette that emphasizes both warmth (reds) and coolness (blues) to illustrate tension and containment. The arrangement features dominant red jagged lines encroaching upon cooler blue bands, embodying the struggle between chaotic expression and quietude. The placement includes intentional broken pixels to highlight imperfections, resonating with the idea of eroding symmetry and overlapping emotional states, creating a pulse of disruption amidst an otherwise calm field. The corner serves as a central collision point, accentuating the invasion of rage into tranquility.</desc>
