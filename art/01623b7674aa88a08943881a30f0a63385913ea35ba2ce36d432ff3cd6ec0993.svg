<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Reaching and Holding</title>
  <desc id="desc">This composition reflects the emotional tension of longing and resolve through an interplay of color and structure. The palette draws from contrasting warm and cool hues to embody feelings of safety and exposure. The layout features a spiral movement towards the center, representing the drawing in of longing against a backdrop of steady resolve. The main collision happens at the center with dense colors suggesting resolve, while the lighter shades around it provide a sense of distance and longing, creating a resonance between the pressures of connection and the quiet spaces of solitude. Broken pixels are intentionally placed to represent interruptions in the emotional flow, embodying the imperfection of the human experience.</desc>
