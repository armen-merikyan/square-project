<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Shadows</title>
  <desc id="desc">This piece explores the emotional contrast between longing and resolve through a gradient of dark, warm tones and structured color breaks. The palette of burnt orange, dark red, charcoal, and gold reflects a fiery intensity and underlying tension, while the halo border signifies a yearning for clarity amidst chaos. The dominant anxious energy from the longing manifests as dense patches in the center, disrupted by the steady structure of the resolve in the edges, forming an echoing boundary.</desc>
