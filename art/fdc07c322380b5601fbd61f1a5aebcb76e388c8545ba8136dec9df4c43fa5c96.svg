<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Signals</title>
  <desc id="desc">This piece represents the emotional clash between clarity and chaos—'signal vs noise.' The primary palette of deep navy and bright white embodies the struggle for rhythm against static. The clean pulse of light is strategically placed, fighting against the jagged, dark backgrounds that create a sense of interference. There are intentional broken pixels to suggest the scars of memory and disruptions that echo throughout the piece. The main collision occurs at the center of the grid, creating a focal point of tension amidst the surrounding noise, which encapsulates the abstract narrative of conflict and resolution.</desc>
