<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragmented Resilience</title>
  <desc id="desc">This piece embodies the tension between vulnerability and strength, using an 'embers' pattern in the lower half to represent strength as a dense, fiery foundation. The upper section mirrors this with softer, broken shapes symbolizing vulnerability—the cracks in the surface suggest fragility amidst stability. The palette of burnt orange, dark red, charcoal, and gold brings warmth while also creating a stark contrast—a visual battle between the unyielding ground and the shattered atmosphere. The main collision occurs at the center where structured, wavering patterns interact, emphasizing the push and pull of emotion in a confined space.</desc>
