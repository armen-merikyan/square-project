<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light vs Weight</title>
  <desc id="desc">The emotional tone explores the dichotomy of nostalgia versus progress, manifesting as a tension between lighter, airy colors representing nostalgia and denser, darker shades embodying progress. The chosen palette includes sepia and faded blue hues to evoke memories, while deeper darks create weight and pressure. The layout splits the square horizontally, allowing the lighter colors to drip upward, contrasting against a heavier foundation. This evokes a story of yearning to rise against the weight of reality, with sharp contrasts and dense clusters creating an emotional collision.</desc>
