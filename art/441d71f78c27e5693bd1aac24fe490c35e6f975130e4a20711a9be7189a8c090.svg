<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork embodies the tension between vulnerability and strength through the use of a muted palette and contrasting patterns. The main collision occurs at the center, where soft mint and storm gray engage in a 'braid' pattern, suggesting vulnerability's delicate balance against the structured ripple of near black and faded gold. The colors chosen reflect an emotional journey—from the fragile pale mint to the heavy depth of storm gray, creating a visual push-and-pull that evokes feelings of shelter and exposure. Negative space is preserved in the corners to enhance the contrast and give the viewer breathing room, balancing the intensity of deep hues with soft, open colors. The overall composition invites contemplation on the emotional intricacies of safety and risk.</desc>
