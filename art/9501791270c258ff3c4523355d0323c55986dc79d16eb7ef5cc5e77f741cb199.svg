<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Control and Surrender</title>
  <desc id="desc">This composition expresses the emotional dichotomy between control and surrender through a striking visual tension. The palette utilizes warm colors like hot coral and blood orange in contrast with cool shades such as charcoal and hollow blue. The center features a dense cluster of warm colors, invoking a sense of measured control, while the cooler edges represent the surrendering quality with soft contrasts. The collision occurs prominently in the middle to symbolize the struggle, with interruptions created by broken pixels adding an element of imperfection, suggesting an ongoing dynamic between the two emotional states.</desc>
