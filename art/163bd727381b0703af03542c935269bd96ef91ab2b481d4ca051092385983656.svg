<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragments of Emotion</title>
  <desc id="desc">This piece explores the emotional dichotomy of joy and grief. The palette juxtaposes bright yellows and oranges, which symbolize joy, against deeper blues and muted purples representing grief. The left side, filled with brighter colors and symmetrical patterns, contrasts sharply with a disruptive broken pattern on the right, illustrating the shift from coherence to fragmentation. The flow is orderly yet disrupted, showcasing how joy can collapse into sorrow, embodying the emotional tension of the seed.</desc>
