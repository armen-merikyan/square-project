<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resistance</title>
  <desc id="desc">This artwork depicts the emotional tension between defiance and submission through contrasting colors and patterns. The palette consists of 'cosmic_indigo', 'void_black', 'star_white', 'cold_gold', and 'deep_teal', which evoke a sense of awe and terror, embodying both struggle and acceptance. The bold interruption of bright colors against a backdrop of darker hues signifies the chaos of defiance against the quieter undertones of submission. The central collision occurs where warm tones clash with cool, representing the heart of the emotional conflict. This was inspired by the initial seed, translating the themes of confrontation and surrender into an abstract composition that invites reflection on balance and disruption.</desc>
