<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Within Boundaries</title>
  <desc id="desc">The emotional tone captures the conflict between panic and control, with dark and warm colors that embody intensity and depth. The palette 'ancient_fire' features burnt orange and dark red creating a sense of urgency, while charcoal and gold provide grounding contrast. The rows are arranged to suggest a radial pattern from the center, where the clash of colors represents panic encroaching on a controlled space. The pixel bleed effect introduces imperfection and encourages reflection on the fracturing of control, with a layout that allows some negative space, evoking an inward focus that enhances the emotional tension.</desc>
