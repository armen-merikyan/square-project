  <title id="title">Inner Tension</title>
  <desc id="desc">This piece reflects the emotional interplay between vulnerability and strength through contrasting dense dark tones and lighter, exposed shades. The muted cream serves as a quiet field, while the red oxide and small orange act as vibrant sparks of tension. The collision occurs mainly in the center, representing an exposed core surrounded by hard edges, with jagged interruptions from darker tones echoing the theme of exposure versus shelter.</desc>
