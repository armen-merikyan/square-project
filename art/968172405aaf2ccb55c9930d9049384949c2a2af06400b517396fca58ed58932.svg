<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension &amp; Release</title>
  <desc id="desc">This artwork captures the emotional struggle between pressure and quiet through a contrasting palette that balances warm and cool tones. The dominant dark navy and vivid compressed red represent pressure and vibrant clusters, while faint peach and off-white offer a release and softening in the edges. The collision occurs at the center, where the warmth of compressed red disrupts the cooler off-white, suggesting a conflict between dense emotion and serene space. The use of shattered patterns evokes a sense of breaking free, while the gentle wave vertical flow embodies a movement of overcoming tension.</desc>
