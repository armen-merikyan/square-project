  <title id="title">Eroded Symmetry</title>
  <desc id="desc">This piece captures the tension between peace and restlessness through color and structure. The palette, featuring deep blacks and vibrant greens, creates a stark contrast representative of stillness (peace) versus the pulses of motion (restlessness). The chaotic arrangement implies an unsettled narrative, with broken pixels serving as moments of disruption to the intended symmetry. The collision happens mostly at the diagonals, creating a displacement where quiet meets chaos, embodying both emotional states. Overall, it reflects a struggle with balance amid tumultuous inner memories and feelings.</desc>
