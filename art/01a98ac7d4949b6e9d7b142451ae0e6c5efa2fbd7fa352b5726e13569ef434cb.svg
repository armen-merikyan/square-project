<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This piece captures the emotional duality of joy (represented by warm colors) and grief (shown through muted tones). The palette features bright yellows and oranges transitioning into deeper blues and muted purples. The left half, filled with teeth-like patterns of joy, contrasts sharply with the somber, stripe-like organization of grief on the right. The upward momentum of the bright colors is interrupted by the darker, descending lines, representing a tumultuous interplay between order and chaos, evoking a sense of rising signals amidst the underlying sadness. Broken pixels add an imperfection that enhances the emotional weight. The structure adheres to a vertical split, with negative space employed thoughtfully to avoid overcrowding, reflecting the nuanced balance of emotions.</desc>
