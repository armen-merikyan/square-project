<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">The emotional tone reflects the duality of joy and grief, captured through a contrasting palette of vibrant yellows and oranges juxtaposed against deep blues and muted purples. This contrasts the 'open, rounded' quality of joy with the 'fragmented, heavy' nature of grief, creating a visual narrative of rising and falling emotions. The placement of colors creates echoes and interruptions across the grid, with a symmetrical layout allowing for subtle momentary breaks, representing the complexity of love and betrayal. The arrangement suggests a pulse where joy expands but is weighed down by grief, and the broken pixels add an intentional imperfection, enhancing the artwork's emotional depth.</desc>
