<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">The emotional tone balances between trust, represented by warm and stable colors, and suspicion, illustrated with darker, more fragmented tones. The palette of yellows and deep blues reflects warmth intertwined with layers of doubt. The main collision occurs vertically in the center, symbolizing the division of trust and suspicion, with bold accents from the 'teeth' and 'frame' patterns creating a vibrant push-pull effect. Broken pixels introduce imperfection, enhancing the theme of struggle between safety and doubt.</desc>
