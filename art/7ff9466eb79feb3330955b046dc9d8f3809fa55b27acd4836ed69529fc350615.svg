<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Whispers of Tension</title>
  <desc id="desc">This composition embodies the emotional tension between longing and resolve. The left side represents longing with a palette of deep blues and cyans, evoking a sense of distance and unfulfilled aspirations. The right side, dense with blacks and whites, symbolizes resolve—a strong, understated presence suggesting stability and strength. The jagged contrast between the two halves emphasizes internal conflict, while the broken pixels disrupt the flow and introduce a sense of imperfection, echoing the concept of a 'broken mirror.' The layout promotes a split vertical division, aligning emotional states with a stark visual split, reinforcing the chaos and serenity that coexist within. The patterns—fault lines and rain—create a rhythm that mirrors the emotions expressed in the seed, reflecting a narrative of pulse and quiet urgency.</desc>
