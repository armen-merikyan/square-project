<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Distrust</title>
  <desc id="desc">This artwork captures the emotional tension between trust and suspicion through contrasting color distributions and patterns. The palette embodies intimacy with shades of rose clay and distant lilac representing the warmth of trust, and cool blues as the cerulean shadow of suspicion. The edge features a dark warm shadow, providing a strong contrast that evokes a pressure border, while the core employs a flowing tide pattern, interrupted by crack-like segments, illustrating the fractures in trust. The main collision occurs between the dense layered shadows along the border, evoking feelings of suspicion, and a soft center, hinting at the fragile resilience of trust. The asymmetry enhances the feeling of unpredictability and the emotional complexity of the interaction.</desc>
