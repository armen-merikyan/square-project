<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tangled Emotions</title>
  <desc id="desc">This artwork represents the emotional tension of love and betrayal through sharply contrasting colors and uneven patterns, embodying both warmth and coldness. The palette balances soft pinks from love with deeper reds from betrayal, creating a visceral experience. The top rows reflect love's warmth, while the bottom rows depict betrayal's harshness, highlighted by broken pixels that signal imperfection. The interplay of dense clusters and negative space evokes a feeling of conflict, with collision points subtly disrupting the flow, mirroring the complexities of relationships.</desc>
