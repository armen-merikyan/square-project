<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Shelter</title>
  <desc id="desc">The emotional tone conveys a dynamic interplay between vulnerability and strength, highlighted by a stark contrast between the soft mint and faded gold colors against the storm gray. The center of the grid, embodying exposure, is surrounded by deeper, protective hues creating a visual push-pull effect. The placement of soft sky provides a lightness that ripples through the dense storm gray, suggesting a collision between calm and pressure. The shape of the 'vessel' influences the arrangement, creating a tension where the strong borders encase a more fragile core, embodying the essence of the seed without literal representation.</desc>
