<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Beneath the Surface</title>
  <desc id="desc">The composition embodies the emotional contrast of restlessness against peace, creating a visual dialogue of tension. The warm palette of hot coral and blood orange juxtaposed with the cool tones of charcoal and hollow blue conveys a push and pull between vibrant energy and calmness. The central density of colors mimics the chaotic motion of memory while the lighter edges signify a peaceful escape. Broken pixels serve as intentional disruptions, enhancing the sense of unresolved motion and echoing the theme of struggle between conflicting emotions.</desc>
