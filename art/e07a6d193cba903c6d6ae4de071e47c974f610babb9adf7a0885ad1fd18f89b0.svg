<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">The emotional tone balances between tenderness and rage, represented through a contrasting palette of deep reds and soft blues. The palette captures the explosive nature of raw emotion against the calming effect of tranquility. The collision mainly occurs in the center, where warm, jagged red pixels disrupt the calm blue bands, illustrating the friction between these feelings. The broken pixels create intentional disruption, enhancing the sense of conflict and resolution, tying into the seed by suggesting the inner battles of guilt, forgiveness, and the contrasting external world.</desc>
