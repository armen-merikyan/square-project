<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Equilibrium</title>
  <desc id="desc">This piece explores the emotional interplay between severity and softness. The palette, comprising soft powder pinks and sharp crimson, emphasizes the tension between warm and cool tones. The main collision occurs centrally, where the strong black and crimson frames meet the flooded pink, creating a dynamic yet structured chaos. The spiral flow illustrates movement and openness, mirroring the idea of a gate. The pattern types create conflict, with the fluid softness overlapping the rigid severity, symbolizing the ongoing negotiation between guilt and forgiveness.</desc>
