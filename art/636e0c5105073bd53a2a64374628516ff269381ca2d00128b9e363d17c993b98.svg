<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Calm</title>
  <desc id="desc">This piece embodies the emotional tapestry of restlessness interwoven with peace. The left side utilizes muted tones such as stone gray and moss green, representing the heaviness of memory and unease. Contrastingly, the right side bursts with small gold and bone white, signaling moments of clarity and resolution. The palette was chosen to convey resilience against fragility, fostering a sense of both calm and agitation. The central collision occurs diagonally, where the vibrant colors interrupt the subdued ones, creating a dialogue between light and dark, echoing the emotional struggle of longing for peace amidst chaos.</desc>
