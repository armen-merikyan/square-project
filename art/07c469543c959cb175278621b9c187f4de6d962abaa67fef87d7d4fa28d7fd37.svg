<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition reflects the tension between desire and emptiness. The bright, warm tones of hot coral and blood orange suggest a yearning that clashes with the cool, enveloping shadows of charcoal and hollow blue. The palette was chosen to illustrate the intense emotions of craving while providing a stark contrast against the quiet emptiness symbolized by the darker colors. The main collision occurs in the center where the warm, saturated colors push against the dark edges, representing an urge to overflow yet contained within boundaries. Each color placement echoes the conflict and interplay of these emotions, creating a rhythm of pressure and release throughout the 8x8 grid.</desc>
