<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Clashing Echoes</title>
  <desc id="desc">This piece embodies the emotional tension between tenderness and rage through color contrast and pattern collision. A palette of deep blacks and muted blues symbolizes rage, while delicate whites represent tenderness, creating weighty contrasts. The main collision occurs at the center, where jagged reds intrude upon the softer blues, symbolizing rage breaking through calm. The patterned structure echoes the seed's themes, with boundaries dissolved by an interplay of saturation and muteness, evoking a sense of conflicted space within a cohesive emotional narrative.</desc>
