  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition captures the emotional tension between vulnerability and strength through a contrasting palette of dark and bright colors. The black and electric blue create a strong foundation while the lime and magenta represent bursts of vulnerability, creating visual chaos. The main collision occurs around the center, where the electric blue dots intersperse amid darker fields, illustrating vulnerability piercing through strength. The jagged edges in the layout hint at breaks and leaks, aligning with the overarching themes of pressure and exposure.</desc>
