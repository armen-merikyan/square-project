<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This artwork embodies the tension between awe and terror, reflected in its color choices and arrangement. The navy and dim cyan create a foundation of coolness that symbolizes a deeper emotional pull. The stark contrasts arise between the muted fields and sharp bursts of stark white, suggesting moments of interruption that oscillate between calm and chaos. The pattern derived from broken dots and mirrored broken edges gives a sense of imperfection and instability, echoing the encroaching anxiety. This alignment with the seed highlights the struggle between order and chaos, showcasing a flow that embodies both rise and descent, enabling viewers to experience the collision of these powerful emotions.</desc>
