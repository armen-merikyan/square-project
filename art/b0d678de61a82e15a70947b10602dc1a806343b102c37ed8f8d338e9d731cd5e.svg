<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotion Collide</title>
  <desc id="desc">This piece represents the emotional tension between loneliness and connection through a grid-like arrangement. The dark, muted background symbolizes solitude while bursts of electric blue and magenta represent the sparks of connection struggling to break through. The center is the focal point, echoing the idea of hidden emotions exposed in oversaturation, creating a collision against the surrounding darkness. Patterns of broken dots signify fleeting connections while the ring-like placements echo a sense of isolation. Overall, the interplay between dark and vibrant colors invites the viewer to navigate feelings of disconnection amidst moments of brightness.</desc>
