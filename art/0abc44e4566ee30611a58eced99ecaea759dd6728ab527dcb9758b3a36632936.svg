<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Shelter</title>
  <desc id="desc">The emotional tone juxtaposes safety and exposure, reflected in bold contrasts of warm browns and soft pale skin against cold whites and open blues. The arrangement emphasizes a thick 'pressure corner' with heavy shielding colors at the top left, cascading towards softer hues, embodying gentle vulnerability. The shatter pattern reflects safety, whereas the scar texture evokes exposure. The flow recedes, suggesting a narrative of something being both protected yet under gentle assault, aligning perfectly with the tension between the chosen emotions.</desc>
