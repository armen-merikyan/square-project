<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Frames</title>
  <desc id="desc">The emotional tone reflects a tension between the security of certainty and the exploratory nature of curiosity. The dark tones suggest a grounding sense of certainty, providing structure, while the vibrant colors echo the sparks of curiosity and chaos, inviting exploration. The main collision occurs centrally with bright gold accents encroaching into the darker regions—symbolizing curiosity breaking the confines of order. The design illustrates the interplay of emotional contrasts, embodying the inner struggle of exploring beyond secured boundaries.</desc>
