<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Perspectives</title>
  <desc id="desc">This piece embodies the emotional dichotomy between envy and gratitude through contrasting colors and patterns. The dark palette represents the weight of envy, while the lighter tones reflect moments of gratitude. The flow from the bottom to the top establishes a rising motion that parallels hope in contrast to fear—a gradual elevation from darker shades that burst forth into lighter, softer hues at the edges. This juxtaposition of colors creates a harmonious tension, inviting the viewer to contemplate the interplay of these emotions in an abstract space.</desc>
