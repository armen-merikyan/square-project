<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects a tension between vulnerability and strength, portrayed through the contrasting palette of warm coral and cool slate. The main collision occurs in the center where the soft halo of warm colors meets the flood of deeper slate, suggesting the push-pull of safety and exposure while adhering to the empty room layout. The broken pixels disrupt uniformity, symbolizing the imperfect nature of safety against vulnerability. This aligns with the seed's themes, creating a visual narrative of confronting boundaries.</desc>
