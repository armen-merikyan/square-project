<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">hunger_vs_restraint</title>
  <desc id="desc">This composition juxtaposes the emotional themes of emptiness and desire, represented through a contrast between saturated warm colors and muted cool tones. The palette, drawn from the themes of the seed, includes vivid shades like hot coral and blood orange that represent desire, contrasted against the quiet and hollow blue embodying emptiness. The main collision occurs in the central area, where saturation meets muted tones, creating a sense of tension and pushing against the boundaries of the square. This echo from the central collision spirals outward, reflecting the spiral counterclockwise aspect of the seed. The broken pixels introduced throughout the piece serve to disrupt the flow, enhancing the feeling of restraint while maintaining the integrity of the abstract narrative.</desc>
