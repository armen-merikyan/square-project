  <title id="title">Torn Reflections</title>
  <desc id="desc">This piece evokes the emotional conflict of love and betrayal, represented through an almost mirrored layout, with intentional deviations to signify the broken nature of trust. The chosen palette centers around warm pinks and soft reds, signaling love, contrasted against muted grays and dark maroon representing the shadows of betrayal. The main collision occurs between the warm left side and the cooler, disrupted right side, creating an ongoing tension that echoes the struggle between optimism and mistrust, encapsulated through the fragmented pattern.</desc>
