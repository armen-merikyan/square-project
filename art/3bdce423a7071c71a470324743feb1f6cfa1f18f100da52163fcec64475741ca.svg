<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Light Against the Weight</title>
  <desc id="desc">The artwork captures the tension between restlessness and peace through a palette that balances muted green tones with crisp accents of honey gold. The dominant dark fields suggest weight and heaviness, while the small clusters of light evoke fleeting moments of clarity. This composition flows diagonally, emphasizing the motion in the restlessness theme, while edges remain sealed to create a sense of confinement. The broken pixels simulate imperfections, enhancing the contrasts and emotional tension present in the piece.</desc>
