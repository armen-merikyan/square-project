<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone is a dynamic tension between restlessness and peace, with the vibrant, unsettling colors representing motion at the edges and a more subdued, tranquil central block. The palette of signal green, electric blue, hot magenta, dead black, and static gray encapsulates both feelings. The collision occurs centrally where the calm colors are interrupted by the restless, jagged edges, reflecting the struggle between memory (peace) and movement (restlessness). This pattern evokes a sense of chaos balanced by calmness, embodying the themes of the seed in an abstract manner.</desc>
