<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory in Motion</title>
  <desc id="desc">This abstract artwork reflects the tension between 'certainty' and 'curiosity' through a palette of muted earth tones contrasted with a vibrant accent. The layout displays a diagonal argument with a dominant presence of solid fields on one side, symbolizing certainty, while interrupted frames suggest curiosity on the opposite. The collision occurs in the center, where clean lines meet splattered disruptions. The chosen colors evoke feelings of resilience against fragility, capturing the push of rising signals against receding edges, illustrating an emotional dance between order and chaos.</desc>
