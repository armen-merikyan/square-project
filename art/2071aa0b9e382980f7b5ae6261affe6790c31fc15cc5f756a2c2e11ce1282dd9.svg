<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs. Shelter</title>
  <desc id="desc">The emotional tone mixes warmth and vulnerability, illustrated by the contrast between soft, muted greens and browns representing safety, and cold whites and pale colors symbolizing exposure. The layout of the open gate allows for an inviting yet fragmented flow. The patterns juxtapose a structured grid against a ladder-like openness, where the main contrast collides at the center, enabling a feeling of conflicting emotions. Broken pixels introduce intentional disruptions, representing the imperfections inherent in the concepts of safety and exposure.</desc>
