<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Dualities</title>
  <desc id="desc">This piece embodies the interplay of vulnerability and strength through contrasting colors and patterns. The palette combines soft gold for warmth and hope, dark violet symbolizing depth and strength, pale green representing growth and openness, and black denoting barriers and the unknown. The layout features a corner invasion, where the stronger colors dominate the edges while lighter, more vulnerable shades occupy the center, creating a sense of exposure amidst strength. An uneven border style enhances the narrative of protection versus exposure, while the integration of broken pixels introduces imperfection, symbolizing the fragility of strength against vulnerability.</desc>
