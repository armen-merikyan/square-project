  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The composition captures an emotional tension between rage and calm through the dichotomy of hot and cool colors. The palette features vibrant reds contrasted against soft pale blues and whites. The grid-like arrangement represents anger and chaos, while broken dots symbolize tranquility, establishing a conflict where the intense center pushes against the surrounding calm. This collision occurs at the center of the square, creating a visual dynamic that embodies struggle and resolution within an orderly framework, with negative space reflecting moments of quiet amidst emotional overflow.</desc>
