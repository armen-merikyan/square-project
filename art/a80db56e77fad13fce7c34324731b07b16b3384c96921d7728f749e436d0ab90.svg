<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This composition communicates the emotional tension between desire and emptiness. The palette derives from the juxtaposition of warm, saturated colors like hot coral and blood orange against cooler, muted tones like charcoal and hollow blue. The ring pattern symbolizing desire produces a vibrant burst in the center, clashing with the constellation pattern representing emptiness, creating a hollow yet vibrant field. The threshold layout emphasizes the collision at the center, where desire attempts to expand into the void of emptiness. Broken pixels serve as disruptions along the edges, enhancing the feeling of tension and imperfection, while maintaining a quiet field of negative space around the corners, inviting the viewer to experience the emotional depth of the piece.</desc>
