<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This artwork explores the emotional tension between rage and calm through a split layout. The top 4 rows represent calmness with cool pale blue and white colors arranged in a soft spark pattern, creating a sense of space and tranquility. The bottom 4 rows depict rage using sharp, jagged red and black colors, forming a target pattern that contrasts fiercely with the upper section. The use of broken pixels introduces imperfection, symbolizing unresolved emotions. The layout emphasizes the collision between these emotional states, with negative space allocated to enhance the experience of quiet against pressure.</desc>
