<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone navigates the delicate balance between vulnerability and strength, illustrated through a palette that intertwines deep navy and black with vulnerable whites and soft dim cyan. The abrupt contrast between dark and light creates tension, suggesting conflict yet balancing through unity. The central area presents an exposed core, frame-like with a few broken pixels at the corners, symbolizing raw exposure amidst a protective environment. The collision manifests around the center, where robust dark tones interact with lighter shades, creating a poetic interplay of lightness and weight, mirroring the nuances of the seed's concept.</desc>
