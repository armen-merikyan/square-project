<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotion</title>
  <desc id="desc">This artwork captures the emotional tones of rage and calm through an intentional interplay of color and pattern. The palette juxtaposes fiery reds with tranquil pale blues, embodying the theme of 'overflow vs containment.' The primary collision occurs in the center, where vibrant reds ‘rain’ into a cooler, mirrored blue, suggesting a disturbance in an otherwise peaceful landscape. Broken pixels provide intentional disruptions, adding to the dynamic texture and imperfect symmetry inherent in emotional experiences. The upward flow of the composition embodies a sense of rising tension, highlighting the struggle between chaos and tranquility.</desc>
