  <title id="title">Tide of Resolution</title>
  <desc id="desc">This artwork reflects the emotional tension between longing and resolve through a palette that juxtaposes earthy tones with softer whites. The moss green and stone gray represent the depth of longing, contrasting with the sharp presence of rust, which stands for resolve. The central area pulsates with a collision of dense patches of color, symbolizing the struggle against chaos, while quiet bone white fields suggest moments of clarity and rest. The diagonal placements evoke a sense of falling and cross-currents of feeling, embodying the push and pull inherent in the emotional narrative.</desc>
