<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Calm</title>
  <desc id="desc">The emotional tone oscillates between restlessness and peace, symbolized by an ordered chaos of barcode patterns on one side (black and dark tones) contrasting with calm, wide-spaced stripes (pale blue and white) on the other. The palette of red, black, pale blue, and white reflects a tension between warm and cool emotions, suggesting heat versus tranquility. The main contrast lies diagonally across the piece, where the elements of disturbance and serenity collide, invoking the resonance of memory and motion in an abstract form. The jagged borders evoke dynamic energy, while broken pixels add intentional imperfections, enhancing the sense of movement and disruption.</desc>
