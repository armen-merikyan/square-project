<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of the Pulse</title>
  <desc id="desc">This composition explores the emotional dichotomy between 'signal' and 'noise' through a carefully crafted clash of colors and forms. The chosen palette of 'signal green', 'electric blue', 'static gray', and 'hot magenta' embodies both vibrancy and chaos. The center hosts the most saturated colors, creating a pulse of clarity (signal), while the corners fade into muted gray and deep black, representing confusion (noise). Each color's placement echoes the tension between clarity and disturbance, with broken pixels adding intentional chaos, suggesting memory interlaced with erasure.</desc>
