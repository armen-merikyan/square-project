<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow and Containment</title>
  <desc id="desc">This composition captures the tension between rage and calm, reflecting the dichotomy of emotional states. The left half employs a pressure band pattern marked by sharp, warm reds, symbolizing rage and chaos, contrasting against a structured grid of pale blue and white on the right, representing calmness and control. The collision occurs centrally, with jagged edges disrupting the serene horizontal lines, creating a sense of interruption and tension that aligns perfectly with the seed's themes. The palette emphasizes the struggle between the hot intensity of rage and the cool placidity of calm.</desc>
