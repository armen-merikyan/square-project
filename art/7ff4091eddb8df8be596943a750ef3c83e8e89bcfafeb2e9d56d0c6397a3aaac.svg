<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This composition captures the emotional dichotomy of safety and exposure through a medley of soft and dense colors. The palette is drawn from shelter green, warm brown for the grounded feeling, and cold white, pale skin, and open blue to evoke awareness and vulnerability. The collision occurs mainly at the center, represented by a bright cluster that flares against muted backgrounds. Spark and grid patterns interplay, signifying the conflict between openness and enclosing warmth. The jagged edge style disrupts the smooth flow, mimicking the tension between the two emotional states. The composition balances quiet space with an active focal point, leaving negative space that invites the viewer's gaze to drift.</desc>
