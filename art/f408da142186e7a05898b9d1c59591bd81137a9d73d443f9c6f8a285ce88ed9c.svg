  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This artwork embodies the emotional tension between tenderness and rage. The palette showcases deep blacks and stark whites to convey the depth of feeling, with pale blue offering a soothing contrast, representing tenderness against the harshness of rage. The collision occurs centrally, where the saturated reds ripple out from a muted core, suggesting an explosion of emotion restrained by the surrounding darkness. This pattern illustrates the struggle between desire and constraint, embodied in the flow of layers that pulse with contrasting pressure.</desc>
