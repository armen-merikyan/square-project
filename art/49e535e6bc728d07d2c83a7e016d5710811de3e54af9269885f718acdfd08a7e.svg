<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The artwork embodies the emotional tension between safety and exposure. The palette incorporates soft and warm browns to signify comfort and security, contrasted with cold whites and muted blues that invoke a sense of vulnerability and openness. The central 4x4 grid represents the feeling of exposure, surrounded by a warmer border that symbolizes shelter. Key contrasts occur between the warm barrier and cool core, creating a ripple-like wave of emotion across the canvas, echoing tension and revealing the core of feelings hidden beneath a protective shell.</desc>
