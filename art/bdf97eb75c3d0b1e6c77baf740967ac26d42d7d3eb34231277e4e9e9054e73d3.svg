<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Boundaries</title>
  <desc id="desc">This artwork embodies the emotional conflict of desire versus restraint, where warm colors symbolize desire's pull and cooler tones reflect the boundaries of restraint. The use of stripes on the left and channels on the right creates a dynamic tension, with a heavy emphasis on the warm side, hinting at overflowing desire. The collision occurs in the middle, where bright coral and subdued charcoal meet, enforcing the idea of sealed edges constraining an inner heat. This asymmetry maintains a sense of unresolved motion, with broken pixels representing scars of past emotional eruptions.</desc>
