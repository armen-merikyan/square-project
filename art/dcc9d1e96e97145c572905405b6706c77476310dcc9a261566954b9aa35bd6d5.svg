<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Recollection</title>
  <desc id="desc">This artwork embodies the emotional dichotomy of restlessness and peace, conveyed through the contrasting use of vibrant and muted colors. The selected palette of hot coral and hollow blue stimulates a heated yet tranquil dialogue, symbolizing tension amid remembrance. The collision of the 'rain' pattern, representing restlessness, with the 'echo' of peace manifests in dense clusters on the left while gradually softening towards the right, reflecting quiet moments. The jagged edges speak to fragmented memories, emphasizing the restless nature of recollection against the backdrop of the calm.</desc>
