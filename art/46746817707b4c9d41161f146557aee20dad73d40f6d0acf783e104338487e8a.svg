<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Quiet Interference</title>
  <desc id="desc">This artwork captures the tension between clarity and distortion, embodying the struggle of a signal attempting to emerge from a chaotic noise. The dark navy and clean white represent the signal, while dim cyan and black convey the disruptive noise. The composition features a jagged border to suggest a broken frame, where chaotic patterns interact with the central pulse. The pulse of white echoes in layers across the square, contrasting sharply against the thick noise clusters, manifesting a rhythm of conflict. The usage of broken pixels adds intentional flaws representing disruptions in memory. Overall, this arrangement articulates a narrative of survival amidst chaos, a serene signal overburdened by interference.</desc>
