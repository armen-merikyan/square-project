<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Hues</title>
  <desc id="desc">This piece contrasts the emotional weights of tenderness and rage through a palette of saturated reds against muted blues and blacks. The hot, aggressive reds occupy the upper left, resembling tumultuous feelings breaking through, while the softer blues provide a soothing counterbalance, hinting at forgiveness and gentleness. The collision happens at the mid-right where saturation and muteness meet, creating a visual echo of tension and calm. The arrangement embodies a quiet channel of experience that climbs from dark depths towards explosive light, offering a journey from chaos to peace.</desc>
