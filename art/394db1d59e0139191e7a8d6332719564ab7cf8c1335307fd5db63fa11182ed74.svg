<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tides</title>
  <desc id="desc">This artwork embodies the tension between softness and severity, evoking feelings of hope and gradual elevation amid a backdrop of weight and darkness. The palette incorporates powdery pinks and warm whites to represent softness, against the stark contrast of carbon black and steel gray, symbolizing severity. The main collision occurs in the central rows, where bright colors intrude upon the darker hues, suggesting a surge of light against an oppressive weight. The upward layout mirrors a rising signal, illustrating the push against gravity through color placement, with occasional broken pixels reflecting imperfections in this struggle.</desc>
