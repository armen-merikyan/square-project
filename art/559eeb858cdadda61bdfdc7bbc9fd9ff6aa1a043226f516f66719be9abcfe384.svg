<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tidal Interruption</title>
  <desc id="desc">This composition embodies the tension between quietude and pressure, evoking emotion through asymmetric placements of colors. The muted palette, dominated by dust gray and faint peach, symbolizes a calm undercurrent, while splashes of compressed red create abrupt shifts and evoke stress. The arrangement features denser clusters of dark navy at the edges, implying pressure, while off-white patches punctuate the central region, suggesting moments of clarity and spaciousness. The diagonal flow intersperses soft and hard edges, enhancing the tension between the two emotional states. The broken pixels introduce a sense of disruption without losing the overall abstract integrity.</desc>
