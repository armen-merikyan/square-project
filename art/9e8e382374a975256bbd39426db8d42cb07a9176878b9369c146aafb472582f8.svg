<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone conveys a tension between control and surrender, illustrated through contrasting colors and patterns. The chosen palette of warm corals and oranges against cooler yellows and blues creates a vivid interplay that reflects this struggle. The central area is filled with a dense layering of colors that symbolize overflow, while the edges feature more muted tones, representing containment. The broken pixels add intentional disruptions, suggesting vulnerability amidst a quest for stability. This collision predominantly occurs at the center, visually echoing the theme of pressure versus release, resulting in a dynamic visual narrative that empowers the core message of 'Hunger vs Restraint'.</desc>
