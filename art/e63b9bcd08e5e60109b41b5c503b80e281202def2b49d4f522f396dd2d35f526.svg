<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotions</title>
  <desc id="desc">This abstract artwork expresses the tension between tenderness and rage using a distinct color palette that contrasts sharp reds with muted blues and whites. The outer layer, representing rage, is jagged and chaotic, filled with broken pixels, while the inner 4x4, embodying tenderness, is a gentle flow of blue tones that cascade through the frame, evoking calmness. The main collision occurs at the boundaries between these two emotional states, where the jagged edges of red intrude upon the soft blue core, symbolizing the struggle between conflict and peace. This piece visually narrates the journey from turmoil to tranquility, guided by the relational themes present in the seed.</desc>
