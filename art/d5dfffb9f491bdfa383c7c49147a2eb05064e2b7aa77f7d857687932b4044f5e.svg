<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This composition embodies the tension between desire and emptiness, highlighted by a warm palette underscoring saturation and a cool undertone that emphasizes hollowness. The use of the lattice pattern for desire creates densely packed areas that ripple through the piece, while the shatter pattern for emptiness interjects fragmented quiet spaces that provide a counterbalance. The primary collision occurs in the center where warm hues intersect with the pale, hollow blue, establishing a stark emotional contrast while still allowing for a structured layout reminiscent of quiet channels. The broken pixels serve as intentional disruptions, injecting an element of imperfection that reflects the struggle between overwhelming cravings and the confines of restraint.</desc>
