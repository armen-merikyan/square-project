<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone embodies a struggle between longing and confinement. The saturated colors symbolize desire, while the muted tones reflect restraint, creating a tension throughout the piece. The palette of red oxide and blackened plum conveys warmth and depth, contrasting with the cold iron gray and muted cream, enhancing feelings of pressure and release. The main collision occurs in the center where the saturated hues weave into the muted background, depicting the push and pull of emotional states, aligned with the seed's theme of constricted feelings and expansion.</desc>
