<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Shelter</title>
  <desc id="desc">This piece captures the emotional tension between exposure and safety. The color palette—soft greens, warm browns, pale skin tones, cold whites, and open blues—parallels the theme of vulnerability cradled within safety. The dominant soft green represents safety, while colder shades infuse feelings of exposure. The central contrast occurs through vertical stripes of open blue against thick bands of brown, symbolizing the push and pull of protection against the chaos of exposure. The use of broken pixels throughout introduces intentional disruptions, echoing the fragility of safety. This arrangement creates a visual tension between gentleness and weight, effectively rendering the emotional weight of the piece without literal representation.</desc>
