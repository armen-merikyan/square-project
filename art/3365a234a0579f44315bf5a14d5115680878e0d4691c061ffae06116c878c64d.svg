<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Duality</title>
  <desc id="desc">This piece explores the emotive tension between confusion and clarity through a composed yet fractured layout. I chose a palette of pink, red, gray, and dark maroon to evoke warmth and intensity against a backdrop of muted grays, symbolizing the tumultuous emotions at play. The left side displays a rhythmic flow with radial patterns in warmer tones, embodying clarity, while the right side erupts into a chaotic interplay of cooler grays and maroons, signifying confusion. Contrasts emerge as pixels clash, reflecting the struggle between symmetry and imperfection, with 'broken pixels' disrupting established order and inviting dynamic energy into the piece. This dance captures the essence of pulse and syncopation amid chaos.</desc>
