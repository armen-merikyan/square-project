  <title id="title">Tension of Contrast</title>
  <desc id="desc">The artwork explores the emotional duality of emptiness and desire through a warm and cool palette. The dark colors serve as a heavy base, contrasting with sporadic bright accents to represent desire. The heart_fragment suggests a central emotional struggle, encapsulated within a 4x4 grid pattern that resonates with desire, while the outer edges showcase a crosshatch representing emptiness. The balance of the pieces creates a visual echo of tension, as if the heart is both yearning and being pulled away.</desc>
