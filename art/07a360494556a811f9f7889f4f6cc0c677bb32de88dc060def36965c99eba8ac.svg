<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotions</title>
  <desc id="desc">The emotional tone of this artwork is derived from the interplay of joy and grief, reflected through the use of warm yellows and oranges against muted blues and purples. The palette symbolizes the lightness of joy against the heaviness of grief, capturing the entangled nature of these emotions. The layout emulates a split screen; the upper section, influenced by joy, is filled with vibrant, radiant colors, while the lower section embodies grief with its darker, moodier hues. Hard edges create a sense of tension, marking the divide. In this arrangement, colors clash where joy interrupts the grief, emphasizing the collisions of feeling. The central area retains a stair-step pattern, symbolizing the journey through these emotions, suggesting movement between states. Negative space surrounds the core, conveying spaciousness despite the emotional weight, ensuring balance between density and openness.</desc>
