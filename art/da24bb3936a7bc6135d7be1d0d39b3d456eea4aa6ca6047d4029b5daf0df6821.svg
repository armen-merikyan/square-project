  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This piece embodies the duality between vulnerability and strength through its contrasting color palette and structured chaos. The center features a pale 'bone white' field, representing exposure, surrounded by darker hues of 'moss green' and 'rust' that convey strength and a sense of frame. The overall layout follows an 'eroded symmetry,' where strong vertical stacks alternate with softer, jagged edges, symbolizing interruptions and breaks. The emotional collision occurs primarily in the center, where the conflict of safety versus exposure creates tension, elevated by the strategic placement of broken pixels that add a visual sense of imperfection and disruption.</desc>
