<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Emotions</title>
  <desc id="desc">This pixel composition evokes the emotional tension between joy and grief by placing bright yellows and oranges, representing joy, against deep blues and muted purples, symbolizing grief. The contrasting colors collide at the center, suggesting the turmoil of conflicting feelings. The patterns draw on 'rain' for grief, creating a sense of fragmentation, while 'target' for joy brings rounded forms that challenge the heaviness of the outer edges. The thick outlines suggest demarcation, while broken pixels introduce imperfection, hinting at unresolved emotions. The flow from the center outward adds to the narrative of pressure escaping, reflecting the dynamic interplay of light and dark, dense and empty spaces.</desc>
