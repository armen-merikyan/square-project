<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Silent Confluence</title>
  <desc id="desc">The emotional tone reflects a tension between the brightness of sparks and the muted, dusty presence of ash. The palette is drawn from 'broken memory', with sepia and dust gray representing the weight of restraint and memory, while faded blue hints at the spark of life and resilience. The main collision occurs in the center where the warm, brown tones of ash clash against cold, bright hues—creating an echo of conflict and balance. The composition streams diagonally, capturing a sense of encroachment, where quiet areas of soft color contrast with denser clusters, symbolizing conflict and introspection.</desc>
