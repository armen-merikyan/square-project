<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Contrast</title>
  <desc id="desc">The artwork explores the emotional tension between loneliness and connection through a central burst of warmth against a backdrop of cooler hues. The palette—navy, black, white, and dim cyan—suggests deep emotional currents. The use of dark colors around the edges creates a sense of confinement, contrasting with the lighter central area that embodies connection. The crosshatch pattern signifies the complexity of interactions, while broken pixels embody imperfection and vulnerability. This composition captures the struggle between the warmth of connection and the isolating chill of loneliness, highlighting the push and pull of emotional experiences.</desc>
