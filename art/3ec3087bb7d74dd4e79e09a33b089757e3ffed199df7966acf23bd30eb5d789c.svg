<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Tranquility</title>
  <desc id="desc">This artwork embodies the emotional tension between restlessness and peace through a balance of color density and spatial arrangement. The palette of shelter green, warm brown, and cold white creates a landscape of cool tranquility contrasted with the lively warmth of warm brown, suggesting moments of frenetic energy amidst a calm background. The glitch pattern introduces disruptions signifying restlessness, while the grid gives a sense of structure that hints at peace. The collision occurs in the center where chaos meets calm, inviting the viewer to feel the pull between these opposing emotions.</desc>
