<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shattered Echoes</title>
  <desc id="desc">This artwork captures the tension between loneliness and connection through a juxtaposition of dark and warm colors. The palette of burnt orange and dark red evokes a sense of flickering flame amid overwhelming charcoal tones, suggesting both warmth and emptiness. The pattern reflects loneliness with scattered 'stairs' and an off-center dot that feels vulnerable within the protective 'frame' of darker colors. The collision of colors occurs where burnt orange meets dark red, highlighting the duality of connection and isolation. The design maintains negative space to reinforce the feeling of emptiness while keeping the energy alive with warmer accents, making the emotional story resonate throughout the composition.</desc>
