<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">The emotional tone encapsulates the tug-of-war between love and betrayal, distinguished by stark contrasts in color and texture. The palette, derived from varied shades of pink, red, gray, and dark maroon, evokes warmth intertwined with underlying tension. This interplay of warm and cool hues speaks to the heart's duality. The central contrast occurs between the soft, warm colors representing love and the sharp, darker edges suggesting betrayal. The seed manifested as a diagonal spread of checker and crack patterns—while some pixels exude warmth, others fracture that harmony, creating an unsettling balance, fitting the theme of conflicting emotions.</desc>
