<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This composition represents the emotional tug-of-war between joy and grief, utilizing a palette that contrasts warm yellows and oranges against deep blues and muted purples, portraying bursts of brightness against cooler, heavier tones. The layout features a split horizontal feel with forms that ripple like waves, emphasizing the dialogue of expansion and restriction—joy's expansion meets grief's density. Broken pixels suggest imperfections in emotions, presenting an authentic representation of human experience where joy is punctuated by the weight of grief. The use of crosshatching against a grid evokes tension, while the thin outlines create a subtle framework, binding the contrasting colors into an interwoven narrative that invites contemplation.</desc>
