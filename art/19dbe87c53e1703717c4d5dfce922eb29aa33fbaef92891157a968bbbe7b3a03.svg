<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This piece explores the duality of joy and grief through contrasting elements. The bright yellows and oranges symbolize joy, while muted purples and deep blues represent grief. The structured grid pattern on one side reflects order, whereas the chaotic 'teeth' pattern disrupts the calm, symbolizing grief’s intrusion. The transition from bright to muted colors establishes an emotional pull, suggesting a conversation between joy and grief. The arrangement descends like tears or rain, utilizing hard edges to emphasize clarity amidst chaos, allowing for a visual narrative that evokes reflection.</desc>
