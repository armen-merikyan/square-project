  <title id="title">Signal vs Noise</title>
  <desc id="desc">This artwork captures the tension between vitality and decay, with burnt orange and dark red representing the sparks of life, amidst charcoal and gold echoing the ash of restraint and memory. The checker pattern symbolizes the static of memory and erasure, while the echoing forms provide movement and vibrancy. The collision of these elements occurs diagonally, suggesting a struggle against the noise of memory, with negative space emphasizing the underlying fragility beneath resilience.</desc>
