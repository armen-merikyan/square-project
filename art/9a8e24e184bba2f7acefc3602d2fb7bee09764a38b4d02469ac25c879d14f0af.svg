<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Form</title>
  <desc id="desc">This composition embodies the dualities of emptiness and desire through a stark juxtaposition of a saturated color palette against muted tones. The core elements of desire create vivid segments that push towards the edges, contrasting against large voids that symbolize emptiness and restraint. The chosen palette of hot coral and blood orange radiates warmth and urgency, while charcoal and hollow blue invoke feelings of cool detachment and calm. The collisions are concentrated in the center, where saturated colors disrupt the quiet spaces, enhancing the tension of the overall pattern, depicting a continuous struggle between longing and limitation.</desc>
