<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Extremes</title>
  <desc id="desc">The emotional tone captures the struggle of defiance against submission, with a palette reflecting warmth and depth—burnt orange and gold as accents against dark red and charcoal's weight. The bright accents represent defiance while the darker tones symbolize the subtle pull of submission. The main collision occurs centrally, with lattice-like patterns tangling with scar-like disruptions, suggesting a quiet channel beneath the visible conflict. The edges maintain an open corner, allowing for a sense of space and unresolved tension, while broken pixels disrupt the flow, representing imperfections in this emotional struggle.</desc>
