<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Desire</title>
  <desc id="desc">The emotional tone captures a tension between emptiness and desire, reflected in the contrasting palette of warm sepia and cool gray tones. The layout follows a left-to-right flow, echoing the rise vs fall notion, where warmth collides with cooler hues to symbolize fluctuating emotions. The design intentionally retains open space to embody emptiness, using fragmented patterns that hint at desire without depicting it literally. This interplay creates a narrative of longing against a backdrop of solitude.</desc>
