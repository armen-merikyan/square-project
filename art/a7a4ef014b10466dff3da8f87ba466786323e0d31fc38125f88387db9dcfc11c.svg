<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Betrayal</title>
  <desc id="desc">The emotional tone reflects the tension between love and betrayal, employing a palette that contrasts warm pinks and reds with cooler grays and dark maroon, embodying the conflict between warmth and coldness. The arrangement features a cracked pattern on one side, suggesting betrayal, while the other side echoes love through softer, more vibrant hues. This collision occurs prominently in the center where warm colors meet muted tones, emphasizing the struggle. Negative spaces are utilized to signify unresolved emotions, ensuring the composition remains abstract yet emotive, invoking a sense of loneliness and conflict.</desc>
