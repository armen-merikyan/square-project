<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone contrasts the warmth of 'love' with the coldness of 'betrayal.' The palette features soft pinks and deep maroons, evoking a sense of intimacy and trust disrupted by darker shades representing pain and loss. The composition employs a split-screen layout to represent the tension between these emotions, creating clusters of warm colors battling the sharpness of dark hues. The collision happens through layers that echo throughout the design, with broken pixels suggesting imperfection and imbalance, mirroring the fragility of relationships. Negative space between clusters enhances the feeling of isolation and echoes the lonely signal implied in the seed.</desc>
