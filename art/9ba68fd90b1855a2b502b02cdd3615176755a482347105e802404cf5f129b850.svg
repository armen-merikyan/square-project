<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This artwork evokes a struggle between defiance and submission through contrasting color densities and placements. The palette draws from muted tones like dark navy and dust gray to convey a quiet pressure, while compressed red punctuates the center, representing bold defiance amid a quiet field. The main collision takes place at the center where the dense red clashes against the expansive off-white and faint peach edges, symbolizing the emotional battleground. The 'crack' shape seed influences the jagged disruptions in the arrangement, visually manifesting conflict through broken pixel usage.</desc>
