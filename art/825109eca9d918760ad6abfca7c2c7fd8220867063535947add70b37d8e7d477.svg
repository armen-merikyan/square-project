<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This artwork explores the dynamic tension between restlessness and peace, utilizing a palette of muted blues and grays to evoke a feeling of melancholic calm. The contrasting warm accents represent moments of agitation and interruption in an otherwise serene field. The pattern collides at the center, symbolizing the ongoing argument between emotional states. The corner invasion layout allows quieter colors to spread out, while defined, broken pixels act as scars disrupting the overall symmetry, reflecting both memory and motion. This creates an intentional conflict within the composition, illustrating a journey through chaotic thoughts towards a gentle stillness.</desc>
