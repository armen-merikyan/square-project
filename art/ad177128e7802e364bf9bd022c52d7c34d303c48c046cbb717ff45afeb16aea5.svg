<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">This composition embodies the emotional tension between trust and suspicion. The top half, aligned with 'trust', features a rhythmic pattern of lighter, soothing colors (electric blue and lime) suggesting balance and warmth, contrasting with the bottom half filled with chaotic, darker hues representing suspicion. The palette’s contrast supports the narrative of conflict and coexistence—where emotion wrestles with itself. A diagonal fall of darker shades represents an unexpected turn, while broken pixels introduce intentional imperfections, echoing the fragility within resilience. The layout, structured horizontally, symbolizes an unbroken journey disrupted by shadows of doubt.</desc>
