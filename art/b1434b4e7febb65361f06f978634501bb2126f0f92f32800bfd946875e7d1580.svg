<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resistance</title>
  <desc id="desc">This composition merges the emotional tones of defiance and submission through high contrast and overlapping patterns. The chosen palette of pink, red, gray, and dark maroon evokes a sense of betrayal and resilience. The radial pattern representing defiance creates a strong center that presses against the 'teeth' pattern of submission, symbolizing layers of tension. The main collision of colors occurs in the center, where the bold accents wrestle with softer edges, illustrating a struggle between control and surrender. The layout features a narrow path of negative space, emphasizing the themes of invasion and quiet pressure emerging from dense clusters surrounding the center.</desc>
