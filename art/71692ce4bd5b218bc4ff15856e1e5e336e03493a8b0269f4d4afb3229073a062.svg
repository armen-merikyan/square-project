  <title id="title">Collision of Emotions</title>
  <desc id="desc">This composition conveys the tension between desire and restraint through an interplay of vibrant and muted colors. The palette combines hot coral and blood orange, representing desire, with charcoal and hollow blue, embodying restraint. The main collision occurs at the center where bright accents break through softer stripes, creating an emotional push-pull. Utilizing emotions as a narrative lens shaped the placement into a dynamic, abstract pattern that captures the essence of conflict and resolution.</desc>
