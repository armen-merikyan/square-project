<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Boundaries</title>
  <desc id="desc">The emotional tone reflects the struggle between yearning (warm coral tones) and containment (cooler muted colors). The palette juxtaposes hot coral and blood orange with charcoal and hollow blue, symbolizing the push and pull of desire against the walls of restraint. The layout of falling pixels reinforces a sense of pressure descending from above, while contrasting clusters of color suggest intense emotions colliding in the center, creating a focal point which embodies conflict. Broken pixels add intentional disruptions as reminders of fragility in the balance between aspiration and fear.</desc>
