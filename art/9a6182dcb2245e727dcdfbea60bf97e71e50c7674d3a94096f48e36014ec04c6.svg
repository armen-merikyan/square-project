<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonance of Tension</title>
  <desc id="desc">The emotional tone captures a juxtaposition between relief and dread. A palette of faded golds against storm grays reflects the struggle between light and shadow. The upper left corner showcases dense dark tones creating a pressure build-up, while the right side releases into softer mint and sky colors, suggesting an exhalation of breath. The broken pixels, scattered throughout the piece, symbolize fracturing moments within this emotional landscape, enhancing the sense of tension. The collision occurs at the center, where deep charcoal meets a flash of pale mint, marking the shifting balance.</desc>
