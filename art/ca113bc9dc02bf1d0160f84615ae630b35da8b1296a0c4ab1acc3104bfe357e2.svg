<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Calm and Chaos</title>
  <desc id="desc">This piece explores the emotional landscape of restlessness juxtaposed with peace. It employs a palette drawn from the 'broken_memory' family, including sepia and faded blue, invoking both nostalgia and calm. The light-to-dark contrast is embodied through the layout of rows that fall from the top, symbolizing the weight of memories juxtaposed against the lightness of peace. The central collision occurs in the middle of the grid where warm accents juxtapose cooler undertones, creating a tension that captures the restless energy. The broken pixels add imperfection, suggesting disruptions within tranquil spaces, enhancing the overall theme without illustrating specific forms or figures.</desc>
