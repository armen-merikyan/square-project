<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tidal Collision</title>
  <desc id="desc">The artwork explores the tension between certainty and curiosity through a palette that contrasts intense reds with calming blues. The reds symbolize certainty, representing structures that emerge forcefully, while the blues depict curiosity, signifying fluidity and openness. The rising layout suggests an upward movement, capturing the essence of hope and tension. The collision occurs where warm red pixels invade the cooler blue areas, creating an emotional push-and-pull. Broken pixels are integrated to add an element of imperfection, emphasizing the disrupted sense of order, while maintaining enough negative space to breathe.</desc>
