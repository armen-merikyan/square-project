<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a tension between sparse emptiness and vibrant desire. The palette of hot coral and blood orange evokes warmth and eagerness, while the charcoal and hollow blue introduce a cool contrast, representing containment. The main collision occurs in the middle, emphasizing a central struggle. The left side is dominated by the dusty pink and charcoal from the theme of emptiness, while the right pulsates with warm colors, symbolizing desire. Broken pixels add a layer of disruption to the orderly structure, reinforcing a sense of pressure against a rampant inclination to overflow.</desc>
