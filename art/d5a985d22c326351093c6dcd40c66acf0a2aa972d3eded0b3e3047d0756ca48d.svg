<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Clash of Emotions</title>
  <desc id="desc">The piece encapsulates the emotional tension between tenderness and rage through a palette of stark contrasts. The use of black symbolizes the intensity and compression of rage, while muted tones of pale blue and white represent the softness of tenderness. The patterns diverge in the arrangement, with the lower half reflecting a mirrored intensity of reds and blacks symbolizing mesmerizing rage, while the upper half features softer pressure bands of pale colors cascading gently, hinting at tenderness. The center reveals a chaotic collision where the emotions meet—an upward surge of softer colors interrupted by sharp accents that project pressure. The overall flow guides the viewer's eye from the serene heights down into a tumultuous center, embodying the duality of conflict. The broken pixels add further to the narrative of emotional imperfection, creating disruptions that represent moments of reflection or resolution within the chaos.</desc>
