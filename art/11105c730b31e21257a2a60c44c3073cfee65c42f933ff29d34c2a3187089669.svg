<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory in Motion</title>
  <desc id="desc">This artwork embodies the tension between control and surrender, illustrated through the use of contrasting colors and patterns. The palette, consisting of warm shadow and cool blue, establishes an emotional gradient. The density of darker hues in the center represents the weight of control, while lighter tones at the edges suggest a surrendering void. The collision occurs in the center through thick outlines of patterns, creating a 'ring' structure that is disrupted by scar-like marks, symbolizing moments of release and transition. This permits a visual rhythm that mirrors an emotional journey of containment and overflow.</desc>
