<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This composition captures the emotional turmoil between joy and grief through the use of contrasting colors. The palette consists of bright yellows and oranges representing joy, alongside deep blues and muted purples signifying grief. The layout reflects a split horizontal pattern that mirrors the emotional dichotomy. The edges are deliberately left broken and soft to imply a transition between these states, giving a sense of moving from order into chaos. The colors collide in the center while the outer areas remain muted, suggesting a protective layer around the chaotic core of emotion.</desc>
