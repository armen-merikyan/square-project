<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Safety</title>
  <desc id="desc">The emotional tone centers on the struggle between safety and exposure, illustrated through contrasting warm and cool colors. The deep greens and browns signify safety, while pale tones of white and blue represent vulnerability. The central area is dense with a dark green, resembling a protective layer, while lighter colors push against it, evoking pressure and fragmentation. As the safety colors struggle to contain the echoes of exposure towards the edges, the layout creates a feeling of tension and unresolved collision. The broken pixels add notes of disturbance, calling attention to the imperfections in a protective framework.</desc>
