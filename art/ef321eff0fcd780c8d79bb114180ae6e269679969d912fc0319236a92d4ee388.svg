<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork conveys the emotional tone of tension between vulnerability and strength, using a palette that balances clarity and confusion. The colors, primarily clean white and ice blue with accents of ink black and warning orange, create a contrast where the pale exposed center symbolizes vulnerability, while the darker shades suggest strength encroaching. The main collision occurs in the center, where the blue meets the black, representing the push and pull of these conflicting emotions. Broken pixels interrupt the orderly flow, enhancing the idea of a mirror broken—perfectly imperfect. The layout creates a mirrored effect but purposefully disturbs it with mismatched colors, reinforcing the conceptual fractures embodied in the seed.</desc>
