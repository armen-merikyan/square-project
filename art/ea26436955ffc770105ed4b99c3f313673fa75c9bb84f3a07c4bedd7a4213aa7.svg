<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Existence</title>
  <desc id="desc">This abstract artwork captures the emotional spectrum between joy and grief. The top half bursts with vibrant yellows and oranges, representing joy's expansive nature, while the bottom half features deeper blues and muted purples, evoking a sense of grief and introspection. The hard edges throughout create a tension of safety versus threat, with a step-like arrangement suggesting a journey upwards amidst chaos. The contrast between warm and cool tones provides a visual echo of feelings, encasing the viewer in an intricate maze of emotions. The layout respects negative space, hinting at moments of quiet reflection amidst the storm of feelings.</desc>
