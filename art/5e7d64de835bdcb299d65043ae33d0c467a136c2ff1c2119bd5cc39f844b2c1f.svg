<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This composition embodies the tension between love and betrayal through color and pattern. The warm colors of pink and red suggest love, while the cooler gray tones introduce an aspect of betrayal. The main contrast occurs diagonally across the square, where warm colors collide with the cooler shades, evoking a visceral emotional push and pull. The layout balances mirroring elements with broken patterns, hinting at the fragmented pieces of the heart, while ensuring negative space allows the eye to navigate the emotional turmoil. The edges are kept sharp to suggest a sense of tension and potential rupture, reflecting interactions filled with both promise and disappointment.</desc>
