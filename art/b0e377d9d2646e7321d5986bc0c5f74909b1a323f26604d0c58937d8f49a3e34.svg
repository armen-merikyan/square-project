  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition contrasts the themes of vulnerability and strength using colors that reflect both soft and dense qualities. The top half embodies vulnerability with paler hues (soft breaks) signifying exposure, while the bottom half employs deeper tones (rooted contrast) representing strength. The broken pixels introduce a layer of imperfection, echoing the fragile relationship between the two emotions. Main collisions occur at the midpoint, where brighter accents meet dark territories, suggesting a dynamic interplay of memory versus erasure, symbolic of life’s contrasts.</desc>
