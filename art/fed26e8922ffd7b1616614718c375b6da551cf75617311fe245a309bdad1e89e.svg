<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Boundless Hunger</title>
  <desc id="desc">This composition reflects the tension between desire and restraint. The contrasting colors highlight the emotional collision: saturated tones of red oxide and small orange symbolize desire, while muted cream and iron gray represent restraint. The intentional breaks in the otherwise dark edges suggest struggle, as desire reaches towards what is contained. The layout emphasizes pressure against a border, embodying the push-pull dynamic inherent in the seed text.</desc>
