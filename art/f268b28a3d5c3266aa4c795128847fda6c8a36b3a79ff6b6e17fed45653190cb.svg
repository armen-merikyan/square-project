<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone reflects a conflict between vulnerability and strength, illustrated through a dense format contrasted by pale interruptions. The palette includes cool tones representing vulnerability (pale aqua and mist gray) alongside warm tones for strength (alarm red and ink blue). Main contrast occurs at the central column where the ‘negative_cross’ pattern disrupts the surrounding solid structures, symbolizing the juxtaposition of weakness disrupting stability. Broken pixels evoke scars of exposure, enhancing the sense of imperfection in the whole piece, creating a narrative of survival amidst instability.</desc>
