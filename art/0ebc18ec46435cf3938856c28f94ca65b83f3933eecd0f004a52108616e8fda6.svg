<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Pulses</title>
  <desc id="desc">This artwork embodies the struggle between clarity and chaos. The dark palette symbolizing noise contrasts sharply with the brighter signal hues, reflecting the challenge of finding clarity amid static. The main collision occurs at the center, where darker tones intersect with brighter accents, creating a dynamic tension. The edges have been fragmented to suggest imperfection and disruption, echoing the theme of a broken mirror, while retaining an abstract flow that alludes to the persistent pulse of emotion. The layout pulls inward, reinforcing the idea of pressure against solitude and uncertainty.</desc>
