<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The artwork captures the emotional tension between rage and calm through a deliberate clash of color and structure. The palette melds hot reds with cooler pale blues, creating a visceral contrast that conveys the struggle to contain overwhelming emotions. The dominant black forms suggest jagged scars, epitomizing rage as they cut through softer islands of pale blue, reflecting a battle between chaos and tranquility. The layout descends like falling pixels, creating a rhythm of release beneath an intense surface, thus embodying both a feeling of urgency and tranquil isolation.</desc>
