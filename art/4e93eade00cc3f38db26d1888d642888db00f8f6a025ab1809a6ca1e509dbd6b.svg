<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">The emotional tone represents the tension between joy and grief, using a palette of vibrant yellows and muted purples to create contrast. The left side embodies 'joy' through warm colors and dot patterns, suggesting lightness and warmth, while the right side conveys 'grief' using deeper blues and flame patterns, evoking weight and heaviness. The central column where colors collide echoes the conflict of emotions, with a surprising break in symmetry, reflecting both left-weighted pressure and moments of imbalance, alluding to love and betrayal. The arrangement maintains negative space, symbolizing pauses within the overwhelming emotions.</desc>
