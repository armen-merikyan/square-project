<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Symmetry of Tension</title>
  <desc id="desc">The emotional tone reflects a push and pull between safety and exposure. The soft hues of 'pale_skin' and 'shelter_green' create a warm protective space, while 'open_blue' and 'cold_white' suggest vulnerability and exposure. The main contrast happens in the central rows, where warm colors clash with cooler tones, creating a dynamic collision that echoes the seed's themes of pressure and release. The palette embodies a sense of eroding edges, allowing patches of negative space to breathe amidst the density, mimicking the sentiment of safety within exposure.</desc>
