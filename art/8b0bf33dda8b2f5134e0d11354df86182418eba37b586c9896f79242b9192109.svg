<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interference Pulse</title>
  <desc id="desc">This artwork captures the emotional dichotomy of 'signal vs noise' through a palette of deep navy and stark white, reminiscent of a machine’s operation under manual tension. The chaos is suggested through a scattering of harsh edges in dim cyan and black, presenting a struggle between clear rhythm and static interference. The collision occurs centrally, where the clean pulse of white interacts with the jagged dark tones—an echo of the broken mirror concept, representing clarity under duress. The negative space allows for contemplation amidst the chaos, inviting the viewer to reflect on the contrast and interplay between existence and disruption.</desc>
