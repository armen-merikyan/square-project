<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Contrast</title>
  <desc id="desc">This artwork captures the emotional interplay between joy and grief using a palette of warm yellows and oranges juxtaposed against deep blues and muted purples. The left side, symbolizing joy, employs a mirror pattern to create an open, expanding feel, while the right side employs a crosshatch pattern to evoke the weight of grief. The interplay between stability (warm colors) and instability (cool colors) shows the collision of these emotions, with a broken pixel aesthetic creating an irregular edge, as if memories are fraying at the seams. The composition centers on the tension, where bright accents of yellow interrupt the dominant deep blues, suggesting a spark of hope amidst grief.</desc>
