<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Near vs Far</title>
  <desc id="desc">This artwork captures the emotional tension between softness and severity. The palette features a mix of warm pinks and whites against cool blacks and grays, which represents the battle between gentle and harsh feelings. The pattern logic employs a checkerboard structure for softness interspersed with stacked severity marks. The center features a dense cluster of crimson, symbolizing the intense collision of emotions, while the surrounding areas blend lighter tones to suggest openness and space. The design invites reflection on the dynamic between pressure and release, echoing the notion of collisions and contrasts found in the seed.</desc>
