<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Duality</title>
  <desc id="desc">This piece explores the emotional tension between clarity and confusion. The contrasting palette of black, white, and shades of pale blue expresses the duality of rage and calm. The main collision occurs between the stark black areas that represent confusion and the brighter whites and blues symbolizing clarity. The layout flows upwards, suggesting hope emerging from disarray, while jagged edges create a visual disruption that embodies complexity. The broken pixels add intentional imperfection, emphasizing the struggle between symmetry and breakage while allowing for negative space, reflecting moments of pause in the chaos.</desc>
