<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipsed Emotions</title>
  <desc id="desc">The artwork is designed to explore the duality of joy and grief, embodied through contrasting textures and emotions. The left half uses vibrant yellows and oranges to represent joy, depicted through a maze pattern that suggests complexity and expanding warmth. In contrast, muted purples and deep blues on the right evoke feelings of grief, characterized by stripes that create heaviness and linear tension. The sharp contrast between the two halves underscores their emotional collision. The overall flow is a visual drip effect, reflective of how emotions can cascade and intermingle, with strategic broken pixels introducing an element of imperfection to signify the chaos of emotional experiences, while the split arrangement allows for a clear delineation between the two feelings. This composition, by maintaining negative space, allows each emotion to breathe and resonate.</desc>
