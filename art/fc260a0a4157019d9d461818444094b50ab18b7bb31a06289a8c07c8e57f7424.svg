<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This composition explores the duality of restlessness and peace. The muted color palette represents 'hunger restraint' with tones of red_oxide and blackened_plum reflecting a deep intensity, while muted_cream provides a gentle balancing field. The thick border illustrates a protective edge, fostering the feeling of shelter. The arrangement features a central path where the fragmented patchwork pattern of restlessness collides with the calm crosshatch structure of peace, creating a rhythmic pull from bottom to top. The intentional broken pixels elicit a sense of imperfection, symbolizing memory as an echo of motion, while negative spaces create breathing room, contrasting the dense patterns.</desc>
