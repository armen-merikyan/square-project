<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Horizons</title>
  <desc id="desc">This piece embodies the emotional tension between 'longing' and 'resolve.' The warm earthy tones of rose clay and warm shadow evoke an intimate distance, creating a pull towards the warm bottom half while the cooler shades of distant lilac and cool blue suggest a sense of resolve. The pattern of 'tide' in the upper half represents the ebb and flow of longing, while the 'crack' pattern in the lower half conveys a steady, grounded strength. The collision occurs through the center where warm and cool collide, broken by intentional disruptions, symbolizing the unresolved feelings between these emotions.</desc>
