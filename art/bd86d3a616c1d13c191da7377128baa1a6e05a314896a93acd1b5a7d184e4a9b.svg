<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone captures the tension between defiance and submission, mirrored in the color palette. The use of deep blues and stone greys suggests somberness while the pale yellow invokes hope and tension. The main contrast is established between the upward block of intensified colors in the central rows and the encompassing, receding borders in darker shades, representing chaotic edges versus a grounded center. This layout combined with falling pixel patterns reflects the struggle and transformation hinted at in the seed, creating an abstract narrative of conflict and resolution.</desc>
