<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tear and Release</title>
  <desc id="desc">This piece explores the tension between pride and shame, using the palette of red, pale blue, black, and white to evoke their emotional clashes. The left half, dominated by broken dots of red and soft pale blue, conveys the disarray of pride, while the right showcases a ring pattern in black and white, representing the rigid calm of shame. The contrast happens where the blue and red intermingle, suggesting pressure before a release, reflected in the irregular pixels that disrupt the pattern. The composition flows from the outside inward, echoing the internal battle present in the emotions.</desc>
