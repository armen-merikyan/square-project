<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension &amp; Tranquility</title>
  <desc id="desc">The emotional tone captured is the clash of restlessness and peace, represented through a nearly balanced but imperfect structure. The palette of soft cyan, lavender gray, and muted plum embodies peace with cool tones, while the rain blue and moon white add piercing contrasts. The main collision occurs in the central row, where intense blue meets softer gray, portraying the struggle between motion and stillness. Broken pixels introduce the element of disruption, hinting at unease. Overall, the grid flows with serenity interrupted by pulsating spots of color, mirroring the seed's themes of memory and motion.</desc>
