<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition embodies the tension between softness and severity by strategically placing bright accents that burst against a backdrop of cooler, muted tones. The palette features warm white and powder pink to symbolize gentleness, contrasted sharply with carbon black and sharp crimson to evoke rigidity and conflict. The main collision occurs diagonally from the top-left corner, where the vibrant colors intrude upon the softer hues, mimicking emotional turmoil and internal conflict. Broken pixels introduce intentional imperfection, adding depth to the narrative of strife and resolution, while allowing for the preservation of negative space that emphasizes the contrasting emotions.</desc>
