<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition captures the emotional tension between 'emptiness' and 'desire.' The palette includes 'hot coral' for warmth and urgency, 'blood orange' for striking intensity, 'dust pink' to soften edges, 'charcoal' for grounding, and 'hollow blue' to evoke a sense of distance. The contrasting 'warm pull' of saturated colors against muted fields creates a thoughtful balance. The central collision occurs where the vibrant reds and oranges burst through the darker tones, illustrating the powerful struggle of desires striving against the boundaries of emptiness. Broken pixels introduced in the corners add a sense of imperfection, reflecting disrupted ordering, while maintaining substantial negative space to emphasize the contrast between presence and absence.</desc>
