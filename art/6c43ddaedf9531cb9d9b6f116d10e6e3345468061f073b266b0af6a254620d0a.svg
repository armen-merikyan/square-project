<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Exposure</title>
  <desc id="desc">This piece captures the emotional tension between vulnerability and strength, represented through a clash of colors and patterns. The palette blends warm tones of coral and orange, symbolizing strength, with cooler, reflective hues of hollow blue, indicating vulnerability. The visual structure is characterized by a central disruption created by broken dots, a representation of strength, set against the encompassing stepwell pattern, which signifies vulnerability. The collision occurs around the center, where these two emotional forces meet, allowing for echoes of intensity and subdued backgrounds to play off each other. The negative space contributes to the feeling of exposure, inviting breathability around the central motifs of strength and fragility.</desc>
