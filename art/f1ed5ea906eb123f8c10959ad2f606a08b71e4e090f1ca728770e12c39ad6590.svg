<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Divergence</title>
  <desc id="desc">The emotional tone captures the push and pull between longing's warmth and resolve's rigidity. A palette of muted purple, deep blue, and vibrant orange reflects this dichotomy, creating a sense of depth and contrast. The collision is prominent in the center, where the warm colors disrupt a cooler backdrop, embodying chaos within order. The 'ladder' metaphor emerges as a diagonal pattern, representing both aspiration and struggle. Broken pixels introduce imperfection, mirroring emotional scars.</desc>
