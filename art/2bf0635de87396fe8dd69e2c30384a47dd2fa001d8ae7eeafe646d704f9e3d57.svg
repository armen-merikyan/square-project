<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Steps</title>
  <desc id="desc">This artwork embodies the emotional contrast between 'longing' and 'resolve' through its careful use of color placement and density. The selected palette of black, red, pale blue, and white creates a visual conflict—black and red representing resolve's firmness, while pale blue and white evoke a sense of longing and space. The main collision occurs in the center, where the dense red pulses meet the expansive pale blue, symbolizing an intimate distance. As the pixels fall from top to bottom, they suggest a migration of emotions—a journey between acceptance and desire.</desc>
