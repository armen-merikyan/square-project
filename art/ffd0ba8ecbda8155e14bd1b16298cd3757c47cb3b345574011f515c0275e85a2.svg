<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs. Edges: An Emotional Dichotomy</title>
  <desc id="desc">This composition explores the conflict between joy and grief through a divided emotional landscape. The top half represents joy with bright yellows and oranges, arranged in a checker pattern to emphasize openness and expansion. The bottom half embodies grief with muted purples and deep blues, incorporating a noise texture to evoke heaviness. The center of the grid is intentionally broken, creating contrast and representing the struggle of maintaining balance between the two emotions. The negative space enhances the feeling of interruption and the collision of emotions, allowing for quiet reflection amidst the density of contrasting hues.</desc>
