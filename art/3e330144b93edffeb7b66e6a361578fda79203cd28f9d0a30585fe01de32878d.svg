<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a struggle between the yearning for freedom (desire) and the oppressive nature of boundaries (restraint). The palette combines saturated hues of red oxide, intensifying the feeling of desire, contrasted with muted tones of gray and cream to signify restraint. The layout emphasizes negative space, with a central point of collision represented by a dense cluster of warm colors, creating an emotional pull towards the edges that are intentionally muted and sealed, symbolizing emotional barriers. The arrangement implies spiraling pressure against a backdrop of emptiness, reinforcing the concept of unfulfilled yearning.</desc>
