<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork represents the emotional tension between vulnerability and strength through a layered approach. The palette features deep navy and black for strength, contrasted sharply with pale shades of white and dim cyan, signifying vulnerability. The arrangement creates a flow that rises, suggesting hope and escape. Central to the piece is a broad collision where the quiet strength colors frame an exposed heart in light, demonstrating a confrontation of hidden fears against bold resolve. Broken pixels disrupt the grid slightly, symbolizing the frailty inherent in strength, further emphasizing the theme of exposure versus protection.</desc>
