<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Currents</title>
  <desc id="desc">The piece embodies the emotional tension of 'rage vs calm' through the juxtaposition of explosive reds and calming blues. The left side employs a stair-like pattern with deep reds and harsh blacks to signify compressed rage, while the right features a smoother flow with pale blues and whites, representing a calm space. The strong contrast occurs at the boundary, where fragmented blacks interrupt the smoothness, mimicking a crack in the calm that alludes to the anger beneath. The emotional seeds were interpreted as elements like density, pressure, and spacing, creating a dynamic where opposing forces clash gracefully.</desc>
