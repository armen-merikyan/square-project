<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Hunger</title>
  <desc id="desc">The emotional tone captures the internal conflict between desire (represented by saturated colors) and restraint (through muted tones and negative space). The palette, including red oxide and muted cream, reflects the warmth of longing against the coolness of limitation. The main collision occurs in the center where warm tones of desire intertwine with the calmness of restraint, creating a visual push and pull. The use of broken pixels introduces imperfection, mirroring the struggle within the emotional landscape.</desc>
