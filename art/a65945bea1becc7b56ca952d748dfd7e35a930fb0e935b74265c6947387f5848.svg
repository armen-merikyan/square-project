<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Light and Shadow</title>
  <desc id="desc">This piece captures the emotional tension between warmth and coolness, represented by the contrasting emotions of 'spark' and 'ash.' The palette consists of soft tones like faded gold and pale mint, providing an atmosphere of resilience against the weight of storm gray and near-black. The arrangement uses a scattered repair layout, where jagged edges suggest imperfection, while maintaining a dominant central spark of energy. This creates a focal point of collision in the center, transitioning to muted areas with crosshatch patterns of ash. The overall structure depicts memories interwoven with erasure, captured through color and density.</desc>
