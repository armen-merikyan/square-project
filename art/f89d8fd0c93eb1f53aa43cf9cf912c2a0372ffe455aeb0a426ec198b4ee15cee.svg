<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Emotions</title>
  <desc id="desc">This artwork explores the tension between tenderness and rage through a careful arrangement of colors. The palette features deep blacks representing rage contrasted with soft, pale blues encapsulating tenderness, mirroring the quiet spaces within chaos. The central pixels bleed into sharp reds, suggesting attacks or interruptions against muted fields, creating a visual collision that commands attention while still allowing for quiet moments. The pattern reflects both a checker motif filled with tension juxtaposed against a target-like shape, illustrating the push and pull of these emotional states. The layout leverages negative space to evoke feelings of isolation versus connection, tying back to the concept of inside vs outside.</desc>
