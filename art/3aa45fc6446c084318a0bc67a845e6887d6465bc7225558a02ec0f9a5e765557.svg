<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order and Chaos in Balance</title>
  <desc id="desc">This artwork captures a balance between grief and joy through contrasting color clusters. The palette interweaves warm yellows and oranges with cool deep blues and muted purples to evoke a tension between elation and sorrow. The right side evokes a sense of joy with a maze-like pattern of warm colors, while the left disrupts this flow with fragmented, ring-like forms representing grief. The flowing layout suggests a rising signal amidst the chaos, with the edge style lending weight toward the top, creating a sense of escape from underlying pressure, while retaining essential negative space for contemplation.</desc>
