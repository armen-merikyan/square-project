<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This composition captures the emotional tension between longing and resolve through contrasting patterns and colors. The dark void black acts as the foundation, representing the unresolved yearning. Cold gold and deep teal are used as highlights, echoing the tension of desire and the anchoring of resolve. Broken pixels are intentionally placed to signify disruption and echoes of damage within the steady inner core. The collision occurs centrally, where the structured teeth pattern meets the chaotic broken dots, symbolizing the interplay of conflicting emotions. The layout further emphasizes distance with a stable outer frame reflecting resolution while the inner chaos hints at longing.</desc>
