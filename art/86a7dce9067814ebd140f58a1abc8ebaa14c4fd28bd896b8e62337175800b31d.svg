<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Duality</title>
  <desc id="desc">This artwork captures the tension between joy and grief through contrasting textures and colors. The palette blends warm yellows and oranges with deep blues and muted purples to evoke feelings of brightness clashing against heaviness. The crosshatch and grid patterns represent the struggle between dense emotional weight and moments of lightness, while the thin outlines create a sense of separation and dissonance. The alternating densities suggest a conversation of emotions, embodying both fracture and cohesion, aligning with the themes in the seed.</desc>
