  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the emotional tension of control versus surrender through a diagonal interplay of geometric patterns. The palette of warm reds and cool grays suggests a struggle between containment and release. The checker pattern of control on one side intersperses with the flowing flame pattern of surrender, creating a visual conflict that evokes feelings of pressure interspersed with gentle release. The central region is more populated with darker colors, enhancing the impact of collision while lighter shades peek through as indications of resilience.</desc>
