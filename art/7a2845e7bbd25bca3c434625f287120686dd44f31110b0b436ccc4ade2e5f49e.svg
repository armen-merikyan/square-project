<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">The emotional tone revolves around the clash between control and surrender, represented through a pattern that features a dominant tide-like flow in greens and browns, symbolizing stability while allowing soft interruptions of pale skin and cold white to suggest moments of release. The color palette evokes safety yet hints at the fragility of exposure. The collision occurs centrally, where the dense, controlled colors meet the more yielding hues, illustrating a struggle of emotion. Broken pixels interrupt the flow, representing the static noise within the signal, further enhancing the concept of chaos within structure.</desc>
