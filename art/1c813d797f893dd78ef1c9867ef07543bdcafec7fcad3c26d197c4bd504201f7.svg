<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Amidst Static</title>
  <desc id="desc">Exploring the emotional tension between clarity and chaos, this piece uses a palette of deep navy and bright single white to embody the battle of signal against noise. The stark contrasts depict the clear paths of communication (white) overshadowed by layers of darker tones representing interference. The central clash occurs in the middle, where the stepwell pattern emerges from the veil of static, creating a palpable pulse of energy amidst darker, scarred edges that evoke tension. Broken pixels introduce intentional disruptions to reflect the unpredictability of the signals in this visual representation.</desc>
