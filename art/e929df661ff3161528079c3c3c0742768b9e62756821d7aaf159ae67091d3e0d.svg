<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos: A Tensioned Balance</title>
  <desc id="desc">This piece embodies the emotional dichotomy between trust and suspicion. The chosen palette reflects resilience with warm hues of moss green and bone white representing trust, while contrasting tones of rust and stone gray evoke suspicion. The layout follows a mirrored format disrupted by intentional imperfections, creating tension and intrigue. The collision occurs largely in the left quadrant, where the warm colors descend diagonally, interrupted by darker patches, symbolizing the delicate balance of emotions. This arrangement highlights the structure amidst chaos, inviting contemplation of the emotional landscape suggested by the seed.</desc>
