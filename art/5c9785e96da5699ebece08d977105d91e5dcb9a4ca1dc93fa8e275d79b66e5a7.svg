<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Release</title>
  <desc id="desc">The emotional tone reflects the struggle between dread and relief. The darker shades dominate the top half, representing dread with a checker pattern emphasizing weight and noise. The bottom half uses lighter colors in a broken frame pattern, signifying a soft escape and release. The collision occurs at the central division where dark and light meet, creating a visual tension. The use of colors from the palette underlines this contrast, with 'storm_gray' and 'near_black' representing dread, while 'pale_mint' and 'soft_sky' evoke relief.</desc>
