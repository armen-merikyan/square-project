<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Controlled Chaos</title>
  <desc id="desc">The emotional tone reflects the tension between panic and control, using the palette of electric blue, magenta, and black to suggest a stark contrast. Black represents the void of an empty room, while electric blue and magenta introduce sparks of energy battling against that void. The layout suggests tension with pixels that rise on one side, representing hope or control, and fall on the other, symbolizing panic. There’s a collision where the bright colors disrupt the darker tones, creating a sense of instability and emotional conflict throughout the piece.</desc>
