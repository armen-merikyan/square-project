<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Shelter</title>
  <desc id="desc">This piece embodies the tension between 'safety' and 'exposure'. The color palette combines gentle greens and warm browns to convey a sense of safety, contrasted against cold whites and an open blue that represent exposure. The design flows from a softly colored center outward, interrupted by deeper hues that create a visual echo of pressure versus release. The main collision occurs vertically, capturing the essence of divided feelings, while broken pixels introduce intentional imperfections reflecting the complexities of emotional states.</desc>
