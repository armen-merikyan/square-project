<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition captures the emotional tension between desire and restraint, embodied by a saturated center surrounded by muted edges. The use of vibrant colors like hot coral and blood orange represents yearning, while the cooler tones of charcoal and hollow blue signify containment. The juxtaposition creates a dynamic where the center radiates warmth, yet is constrained by the boundaries of the piece, exemplifying the struggle between growth and limitation, with the main collision occurring at the center where these feelings collide and resonate.</desc>
