<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Connection</title>
  <desc id="desc">The emotional tone reflects a tension between the warmth of connection and the coolness of loneliness. The palette of burnt orange, dark red, and gold embodies the ancient fire motif, symbolizing passion, with charcoal representing the shadows of isolation. Contrast is created through a top-weighted layout where warm colors burst through a central 'seed' of warmth surrounded by cooler spaces, suggesting hidden versus exposed feelings. The patterns of grid (connection) and maze (loneliness) collide in a dynamic arrangement, evoking a sense of struggle and resolution.</desc>
