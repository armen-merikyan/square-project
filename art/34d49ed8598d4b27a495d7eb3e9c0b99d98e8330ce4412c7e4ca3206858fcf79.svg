<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a struggle between the warm pull of desire and the cool, muted resistance of restraint. The palette incorporates vibrant coral and orange to symbolize desire while integrating charcoal and hollow blue to signify restraint, creating an evocative contrast. The main collision happens toward the center with broken dots representing desire meeting the stairs of restraint, creating a dynamic tension that illustrates the conflicting emotions linked to the seed. The broken pixels serve as intentional disruptions, echoing the theme of imperfect struggle.</desc>
