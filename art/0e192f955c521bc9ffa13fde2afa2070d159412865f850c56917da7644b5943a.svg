<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This composition captures the emotional tension between joy and grief. The upper half uses warm yellows and oranges, employing a crosshatch pattern to evoke brightness and openness, suggesting joy. The bottom half contrasts this with deep blues and muted purples in a fragmented crack pattern, symbolizing grief's heaviness and chaos. The negative space is strategically utilized to create balance amidst the emotion, reflecting the unresolved nature of joy and grief co-existing. The rising and falling dynamics are mirrored in the color flow, enhancing the overall tension and resonance of the artwork.</desc>
