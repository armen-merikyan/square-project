<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Pulse</title>
  <desc id="desc">This artwork embodies the conflict between clarity (signal) and disruption (noise). The palette features signal green and electric blue as vibrant emergences piercing through the static gray and dead black, creating a deep contrast that suggests tension and resolution. The primary collision occurs at the center with an intricate maze pattern representing a clear signal, interrupted by bursts of hot magenta which resemble noise interference. The layout creates horizontal and vertical movements, mimicking the chaos of interplay between exposure and shelter, ultimately leading to an abstract representation of emotional disturbance and search for continuity.</desc>
