<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Locked Desire</title>
  <desc id="desc">This artwork encapsulates the tension between desire and restraint. The warm, saturated hues of red and the muted cream symbolize unfulfilled longing against a backdrop of controlled structure. The lattice pattern collides with the more chaotic crack of desire, creating a visual representation of emotional conflict. The use of blackened plum and iron gray introduces depth, while broken pixels serve as intentional disruptions, echoing the imperfections of yearning. The central area provides a focus where these emotions collide, emphasizing the contrast between the vibrant and the restrained.</desc>
