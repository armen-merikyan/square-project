<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The composition embodies the tension between desire and emptiness, using an emotional palette of warm coral and orange to represent desire, contrasted with cooler hues like charcoal and hollow blue to signify emptiness. The sharp contrast creates a dynamic push-pull effect, where the brighter colors dominate the center, symbolizing hunger, while the cooler colors bleed into the edges, representing containment. The arrangement evokes a feeling of pressure with an element of negative space, allowing the viewer to feel the struggle between saturation and hollow absence. This abstract narrative is reflected in the use of disrupted patterns, reminiscent of a flowing shape caught against a hard frame.</desc>
