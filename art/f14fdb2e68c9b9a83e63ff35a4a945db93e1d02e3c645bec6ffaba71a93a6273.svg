<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition captures the tension between vulnerability and strength through dense, saturated colors in the center contrasting against lighter, more fragile tones along the edges. The palette balances electric blue and hot magenta as bold accents against the static gray and dead black, symbolizing strength and shelter. The main contrast occurs in the center where the tide pattern (representing strength) meets the flood pattern (representing vulnerability), reflecting emotional collisions. The central area is full, evoking an overwhelming feeling, while broken pixels introduce purposeful intricacies, echoing imperfections and scars. The design conveys the complex interplay of protection and exposure, where color placement signifies emotional weight and texture around a vulnerable core made stronger by the interaction.</desc>
