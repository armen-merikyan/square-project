<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Near vs Far</title>
  <desc id="desc">This piece embodies the emotional tension between longing and resolve, using a palette of contrasting hues. The upper section (representing longing) employs softer cool tones that create a sense of yearning and distance, divided by clear dark lines symbolizing structure and resolve below. The collision occurs at the center where the broken pixels disrupt the stability, representing the interplay of repair and damage. The defined yet contrasting edges give a gentle severity that mirrors the dual nature of emotions captured in the seed.</desc>
