  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone balances vulnerability and strength, employing a palette of warm and cool colors to evoke feelings of safety and exposure. The chosen colors—hot coral and blood orange for strength, alongside dust pink and hollow blue for vulnerability—collide in the center, highlighting the tension between protecting and exposing. The layout mimics falling pixels, suggesting an emotional descent where the main contrast occurs centrally, presenting a soft core shielded by darker edges that fades into space.</desc>
