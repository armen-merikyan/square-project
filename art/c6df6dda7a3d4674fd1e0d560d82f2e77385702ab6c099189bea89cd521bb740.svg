<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Dichotomy</title>
  <desc id="desc">The emotional tone reflects the tension between love and betrayal, expressed through a palette combining warm reds and cool grays to visualize conflict. The contrasting elements are represented by deep maroons and soft pinks, where the dark shades suggest the betrayal and the lighter hues symbolize love. The layout, while mostly empty, features a few clusters that create a sense of pressure against the vast negative space, echoing feelings of lost opportunity or fragmented connections. The diagonal flow of colors hints at unresolved movement, while the crosshatched patterns reflect the inner turmoil, further emphasized by the chosen edge style that plays on sharp vs soft.</desc>
