<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tidal Contrast</title>
  <desc id="desc">This artwork explores the emotional tension between vulnerability and strength using a color palette that expresses warmth and coldness. The use of warm coral and soft amber suggests vulnerability, while cold slate and blue-black represent strength. The central collision occurs through the jagged clash of warm and cool as it spreads from the corner, illustrating an invasion of warmth into a cold space, symbolizing the encroachment of vulnerability into rigid strength. Broken pixels add imperfect disruptions that evoke the fragility meant by 'mirror broken.' This arrangement creates a rhythm where the softness of the frame contrasts with the stronger, braided lines, emphasizing the dynamic duality of the emotions.</desc>
