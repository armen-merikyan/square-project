  <title id="title">Echo of Motion</title>
  <desc id="desc">This artwork captures the tension between restlessness and peace through contrasting colors and patterns. The palette of warm rose clay and distant lilac suggests intimacy, while cool blue adds depth, symbolizing motion's transient nature. Strong collisions of color occur at the edges, with dark colors giving way to brighter accents in the center, embodying the struggle between chaos and calm. The chosen patterns create a rhythm of interruption that pulls the eye, reflecting both memory and fleeting moments, while broken pixels introduce an element of imperfection, enhancing the emotional narrative.</desc>
