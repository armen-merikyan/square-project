<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition explores the emotional tension between defiance and submission through contrasting patterns and colors. The checker pattern symbolizes defiance, creating angular resistance around a soft maze-like backdrop that represents submission. The palette, including ripe green and honey gold, contrasts vibrant energy with subdued tones, creating a sense of conflict. The subtle broken pixels introduce an aspect of chaos while preserving the overall structure, reflecting the collision between control and disorder. The main collision occurs in the center where defiant edges pulse against subdued fields, inviting the viewer to navigate the emotional journey within the grid.</desc>
