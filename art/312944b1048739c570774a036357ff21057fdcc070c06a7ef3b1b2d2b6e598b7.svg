<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Hope and Fear</title>
  <desc id="desc">This artwork embodies the emotional tension between hope and fear. The palette mixes deep blacks and dark violets to evoke fear, contrasted with soft golds and pale greens symbolizing hope's gentle rise. The layout reflects falling pixels, creating a visual rhythm that mirrors release and pressure. The central pixels represent a quiet contrast to the edges, which erupt in darker tones, suggesting a battle between the two emotions. The spread of colors aligns with the pattern of falling pixels, allowing for moments of dense clusters and quiet negative space that invoke a feeling of unresolved tension.</desc>
