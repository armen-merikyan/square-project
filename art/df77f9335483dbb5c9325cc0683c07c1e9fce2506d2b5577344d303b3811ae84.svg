<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">This artwork articulates the emotional duality of joy and grief through a deliberate arrangement of color and shapes. The top half is characterized by warm yellows and oranges, representing joy, with a frame pattern that suggests openness. The bottom half contrasts with muted purples and deep blues to evoke grief, utilizing a split-screen that embodies fragmentation. The pattern creates a tension arising from the stark division between the vibrant upper colors and the heavy, somber lower hues, reflecting the collision of emotions. The use of broken pixels adds to the imperfection of memories, allowing space for unresolved feelings. The overall feeling of the piece moves bottom to top, mimicking an emotional ascent from grief towards a glimmer of joy, while maintaining a balance of quiet space and dense clusters, inviting reflection on the coexistence of these states.</desc>
