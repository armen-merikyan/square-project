  <title id="title">Echoing Exposure</title>
  <desc id="desc">The emotional tone captures the tension between vulnerability and protection, represented by a palette of soft greens and warm browns against pale and cold accents. The composition features a dense central cluster (safety) that merges with gentle ripples of color surrounding it (exposure). This evokes a sense of pressure from the inner island contrasting with the open outer field. The arrangement embodies a split vertical flow, while broken pixels serve as intentional disruptions reflecting the fragility of balance in safety and exposure.</desc>
