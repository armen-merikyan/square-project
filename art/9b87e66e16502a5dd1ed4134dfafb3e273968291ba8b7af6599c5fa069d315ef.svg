<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Transience</title>
  <desc id="desc">This piece embodies the emotional conflict between longing and resolve through a layout reminiscent of 'falling pixels.' The off-white and faint peach create an expansive negative space, symbolizing longing and the hope for connection, while the dark navy and compressed red evoke a sense of stability and resolve. The juxtaposition of soft edges surrounds the firm stripes, conveying steady progress amid scattered broken dots. This conflict is central, where the patterns of longing (dots) create a quiet echo against the resolve (stripes), ultimately crafting a dynamic narrative of tension and release.</desc>
