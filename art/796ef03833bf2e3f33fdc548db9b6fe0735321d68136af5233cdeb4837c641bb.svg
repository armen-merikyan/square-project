<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interwoven Tensions</title>
  <desc id="desc">The emotional tone reflects the interplay between 'longing' and 'resolve', with a deliberate split in color and form across the canvas. The left half employs warmer, muted tones to signify longing—using denim and electric blue—that convey depth and echo, while the right side embraces structured, brighter tones to symbolize resolve—magenta and lime—that create a sense of upward motion and firmness. The two emotional states collide diagonally, where the dark, dense blue fragments bridge into a magenta 'ladder,' creating interruptions as they overlap. The edge style is soft, allowing for gentle transitions between the two halves, while maintaining a healthy amount of negative space to evoke a feeling of tension and distance.</desc>
