<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Disruption</title>
  <desc id="desc">The emotional tone reflects the tension between clarity (signal) and chaos (noise), using contrasting colors to denote vibrancy against shadow. The palette of navy, black, white, and dim cyan represents isolation and the struggle to be seen through static interference. Central contrasts emerge where brighter shades disrupt the darker backgrounds, creating an impression of irregular, descending interruptions—akin to memories that are felt but often obscured. The seed informs the edges and fragmentation, where 'hole' inverts expectations, allowing for both emptiness and containment within the confines of structure.</desc>
