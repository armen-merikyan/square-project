<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The emotional tone reflects a struggle between intense defiance and softer submission. The chosen palette of yellow and orange signifies warmth and vibrancy, symbolizing defiance, while deep blue and muted purple introduce a sense of calm and containment. The sharp contrast of the warm colors in the top half against the cooler tones below creates a visual tension. This collision emphasizes the emotional pull between pressure and release, echoing the seed's themes. The pattern flows from bursts of energy (rain) in the top half to more structured forms (rings) at the bottom, embodying movement and resolution through color arrangement.</desc>
