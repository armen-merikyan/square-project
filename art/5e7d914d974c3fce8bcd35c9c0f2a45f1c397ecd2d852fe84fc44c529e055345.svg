<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Contrasts</title>
  <desc id="desc">This artwork reflects the duality of 'longing' and 'resolve,' with the warmer tones symbolizing yearning, and cooler shades providing a sense of strength and containment. The palette of muted cream, red oxide, and blackened plum creates an emotional tension against iron gray, where warmth of longing collides sharply with cool resolve. The composition features a main diagonal flow, where dense clusters of color stimulate interactions and evoke a sense of pulsating urgency, while maintaining spaces of quiet. The broken pixels introduce intentional disruptions, representing the wear of longing on one's resolve, allowing viewers to feel both the push and pull of these emotional forces.</desc>
