<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetrical Tension</title>
  <desc id="desc">The emotional tone reflects a clash between the feelings of dread and relief, mirrored through a contrast of dark and light colors. The palette of navy and dim cyan represents a lonely vibe, while the stark white offers a sharp relief against the oppressive dark colors. The flow of colors zigzags across the canvas, invoking a sense of movement from heaviness at the top to a light resolution at the bottom. The patterns of grid and crosshatch illustrate the tension between confinement (dread) and the potential for release (relief), creating an abstract narrative of conflict and resolution. Broken pixels throughout the piece introduce an element of imperfection, mirroring the chaos within structured settings.</desc>
