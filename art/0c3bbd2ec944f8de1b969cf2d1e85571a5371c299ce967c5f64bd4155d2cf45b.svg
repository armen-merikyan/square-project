<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork embodies the emotional tension of tenderness and rage. The palette of deep red, soft blue, and stark black creates a vivid contrast that encourages a powerful dialogue between emotions. The top half reflects rage through jagged patterns and saturated colors, while the bottom half embodies tenderness with glitch-like overlaps and muted tones. The flow is receding, suggesting a struggle against restraint with the breakage of pixel integrity—a theme of hunger conflicted with calm. The contrast exists primarily between the intense reds at the top and the gentle blues below, creating a stark emotional boundary.</desc>
