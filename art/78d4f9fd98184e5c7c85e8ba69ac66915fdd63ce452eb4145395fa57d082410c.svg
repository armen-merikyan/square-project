<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Within Silence</title>
  <desc id="desc">This composition represents the tension between defiance and submission through contrasting patterns and color. The bold black and deep blue evoke defiance with sharp angular interruptions, while muted tones of stone and pale yellow represent submission as they recede around the edges. The layout features a narrow path of negative space that channels the viewer’s focus inward, embodying the spirals and ring motifs. The broken pixels disrupt any sense of control, enhancing the raw emotion of conflict between density and emptiness.</desc>
