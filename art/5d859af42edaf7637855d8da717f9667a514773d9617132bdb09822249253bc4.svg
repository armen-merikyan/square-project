<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Dissonance</title>
  <desc id="desc">This composition explores the emotional turmoil between order (signal) and disorder (noise). The navy and dim cyan serve as the primary colors representing the clean pulse, while the contrasting black brings depth and chaos. The broken pixels introduce intentional disruptiveness, mirroring the jaggedness of life’s interruptions. The main collisions occur through the dense areas of black against the cooler tones, suggesting that amid persistence, moments of pause and clarity can emerge. The structure is designed symmetrically yet eroded at the edges, symbolizing the fragility of order when facing chaos.</desc>
