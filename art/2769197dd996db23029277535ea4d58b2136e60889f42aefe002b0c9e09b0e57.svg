<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Central Confrontation</title>
  <desc id="desc">This piece conveys tension through a clash of defiance and submission, with an upward surge against a receding background. The palette of black, dark violet, soft gold, and pale green enforces a dynamic contrast where the center radiates boldness, while the edges provide a subdued calm. The dominant bright spark in the center embodies defiance, surrounded by a soft, variable barcode pattern of submission, creating a rhythmic dance of color. Broken pixels introduce intentional disruptions that capture the essence of conflict without visual literalism.</desc>
