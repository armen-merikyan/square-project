<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inward Echo</title>
  <desc id="desc">This artwork captures the emotional tension between panic, represented by darker colors that create a sense of pressure, and control, indicated by lighter, calm colors. The palette of sepia, tan, and faded blue is reminiscent of a broken memory, evoking nostalgia and unease. The main contrast and collision occur in the transition between the darker outer pixels and the lighter central pixels, illustrating the conflict between chaos and order. The layout reflects an inward movement from the edges, enhancing the feeling of encroaching pressure as the 'wall' shape seed is abstracted into a structured chaos, suggesting both confinement and expansiveness.</desc>
