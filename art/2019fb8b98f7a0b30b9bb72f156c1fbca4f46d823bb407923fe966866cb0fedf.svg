<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Proximity</title>
  <desc id="desc">The emotional tone is a juxtaposition of longing and resolve, which translates to a visual interplay of quiet and density. The palette of clean white, ice blue, and ink black creates stark contrasts that embody the tension between the two emotions. The main collision occurs centrally, represented by varying densities of color, reflecting the push and pull between chaos (darker shades) and order (lighter shades). The broken pixels introduce intentional imperfection, hinting at the faults in 'resolve' against a backdrop of 'longing.' Overall, the seed inspired a pattern where the feelings subtlety engage in a visible dance, creating a rhythm of intimacy and distance.</desc>
