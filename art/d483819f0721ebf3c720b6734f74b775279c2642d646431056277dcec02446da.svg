<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork captures the juxtaposition of restlessness and peace through its contrasting patterns and colors. The palette, composed of sepia, tan, dust gray, and faded blue, reflects a muted nostalgia, evoking memory and emotion. The falling pixel layout symbolizes uncertainty as colors cascade, with the gray representing peace encroaching upon the darker, restless areas. The main collision occurs towards the center, where a checker pattern meets a lattice, showing the struggle between ongoing motion and a calm boundary. Asymmetry is employed to emphasize the feeling of unease, with broken pixels disrupting the grid, enhancing the sense of imperfection and echoing the theme of 'hunger against restraint'.</desc>
