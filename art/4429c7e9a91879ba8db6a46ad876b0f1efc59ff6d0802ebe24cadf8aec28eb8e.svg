<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone navigates the balance of vulnerability and strength, depicted through the contrast of deep burnt orange and soft gold against a backdrop of charcoal gray. The burnt orange dominates, representing strength, while the pale gold hints at vulnerability. The layout follows a stacked bands approach, with thick edges representing stability layered over the inner softness, signifying exposure. The main collision occurs at the center, where the colors meet and overlap, reflecting an interplay of emotions that evoke introspection and resilience. The palette choice enhances the warmth of strength against the coolness of vulnerability, creating a dynamic tension that invites contemplation.</desc>
