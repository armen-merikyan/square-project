<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotions</title>
  <desc id="desc">The artwork captures the dichotomy of longing and resolve through contrasting patterns and colors. The warm tones of yellow and orange signify warmth and comfort in moments of resolve, while deep blue and muted purple evoke feelings of nostalgia and yearning. The main collision occurs at the center, where broken dots of resolve disrupt the crosshatch of longing, representing the tension between fleeting desires and grounded strength. The broken pixels add intentional imperfection, enhancing the emotional depth.</desc>
