<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Tension</title>
  <desc id="desc">This composition explores the emotional tension between control and surrender, utilizing a palette that conveys quiet pressure with dark navy as the anchor and faint peach as a gentle release. The top four rows embrace a structured crosshatch pattern reflecting control, while the bottom rows dissolve into freeform rings symbolizing surrender. The central collision occurs with the merging of dark navy and faint peach, creating a visual tension echoing the theme. Broken pixels intentionally disrupt the structured flow, providing an organic feel to it, while negative spaces help maintain breathing room, ensuring the piece is emotive yet abstract.</desc>
