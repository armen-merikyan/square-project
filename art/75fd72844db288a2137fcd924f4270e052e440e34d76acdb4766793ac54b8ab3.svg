<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes in Black</title>
  <desc id="desc">This composition evokes the contrast of signal vs noise through a palette that oscillates between deep navy and muted dim cyan. The navy represents the noise—dense and overwhelming—while the dim cyan intermittently breaks through to suggest moments of clarity, like a pulse of signal amidst the static. The layout follows stacked bands to emulate emotional strata, where some sections are more dense, reflecting the pressure of noise, while others hold quiet spaces. Broken pixels disrupt patterns like random echoes, enhancing the sensory experience of interference. The main collision occurs in the center, where darker hues clash with lighter accents, promoting a tension that invites the viewer to navigate the complexity of memory versus erasure in a visual noise-scape.</desc>
