<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension at the Edge</title>
  <desc id="desc">The artwork represents a dynamic emotional contrast embodying 'control' through the dense, dark tones that create a thick outline in the corners. In contrast, 'surrender' is evoked by soft pinks that spiral inward in a gentle descent, representing an overflow of emotion. The collision occurs at the center where pressures meet soft yields, creating a visual tension. The selected palette enhances feelings of love entwined with betrayal, emphasizing the conflict between containment and overflow.</desc>
