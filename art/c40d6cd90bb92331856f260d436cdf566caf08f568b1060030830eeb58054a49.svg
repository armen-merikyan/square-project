<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Disruption of Serenity</title>
  <desc id="desc">This piece embodies the emotional tug-of-war between rage and calm. The palette juxtaposes bright reds (representing rage) with gentle pale blues and whites (emphasizing calm). The chaotic arrangement at the center symbolizes bright sparks of chaos cutting through a larger field of tranquility, embodying a clash between contained calm and an overflowing outburst. The placement follows a diagonal rise, creating tension as warm colors erupt from the cooler background. Broken pixels intersperse throughout as intentional disruptions, symbolizing scars of conflict amidst a quiet expanse.</desc>
