<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Reflection</title>
  <desc id="desc">The emotional tone reflects a struggle between longing and resolve, symbolized by the contrasting colors of the 'ancient_fire' palette. Dark reds and burnt oranges echo warmth and longing while gold represents hope and resolve. The layout mirrors yet diverges, highlighting inherent imperfections, creating a visual representation of tension with the weight of yearning on one side and a determined clarity on the other. The pattern of static intimacy against a quiet field portrays feelings of a distant connection, while broken pixels throughout signify both damage and the continuity of repair. This arrangement evokes an emotional landscape of unresolved tension, inviting the viewer to explore the interplay of longing and resolve.</desc>
