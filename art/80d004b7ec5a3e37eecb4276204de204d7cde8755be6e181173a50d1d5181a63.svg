<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Dissonance</title>
  <desc id="desc">This piece explores the emotional tension between joy and grief through a split layout. The left side, representing joy, uses warm yellows and oranges that convey a rounded, expanding energy, while the right side embodies grief with deep blues and muted purples, suggesting heaviness and fragmentation. The main contrast lies at the center, where both joy and grief collide, creating an impression of a mirrored image that is slightly out of sync—reflecting the internal battle between these emotions. The patterns chosen reinforce this narrative, with a mirror design for joy and a target pattern for grief, hinting at a chaotic split against an underlying order. Broken pixels lead to a sense of imperfection and vulnerability, inviting viewers to perceive the layers of emotion.</desc>
