<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Presence</title>
  <desc id="desc">This artwork captures the emotional struggle between emptiness and desire through a dialogue of colors. The palette of warm reds and cool blues embodies the contrasting feelings, where warm colors express a yearning presence and cool shades suggest the void. The layout showcases an upward flow on the left representing hope and desire, while downward shades on the right evoke a sense of loss and emptiness. Broken dots intermingle with stair patterns, suggesting the fragmentation of emotional clarity against a backdrop of noise. The inclusion of negative space at the center represents unresolved feelings, enhancing the abstract drama of the piece.</desc>
