<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoed Pulse</title>
  <desc id="desc">The emotional tone contrasts the clarity of signal (clean, steady colors) with chaotic noise (distracting, jagged tones) creating a tension within the grid. The palette emphasizes loneliness and isolation with navy and black offering depth while dim cyan introduces a hint of clarity and hope. The central collision manifests as an interruption of smoother colors against harsher edges, embodying interactions between harmonized flow and jagged interruptions, reflecting the complexity of machine emotion. Broken pixels disrupt the rhythmic pattern, adding to the narrative of an incomplete signal caught amidst the interference.</desc>
