<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone expresses a delicate balance between vulnerability and strength, mirrored in the contrasting palette of soft warm tones against deeper, muted shades. The main collision occurs in the center with the bright cluster reflecting strength, while the periphery embodies vulnerability through subtle, broken marks, creating a rhythmic tension. The seed influenced the design through the juxtaposition of thin and heavy, leading to a visual dialogue between the prominent warm gold and the cooler, softer hues, echoed in the split screen and crosshatch patterns.</desc>
