<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse of Dissonance</title>
  <desc id="desc">The emotional tone captures the struggle between panic and control, illustrated through contrasting colors. A palette of deep navy and subdued whites creates tension in a zigzag pattern, with control represented by structured shapes and panic by scattered dots. This arrangement brings about a clash between the rigidness of order and the unpredictability of chaos, enhanced by the broken pixel elements to evoke feelings of disturbance. The central area, filled with less dense color, provides negative space that adds to the overall unease, representing moments of clarity amid turmoil.</desc>
