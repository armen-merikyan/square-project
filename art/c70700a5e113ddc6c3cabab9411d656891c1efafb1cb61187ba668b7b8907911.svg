<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece explores the tension between desire and emptiness through a saturated warm palette juxtaposed against muted cool tones. The top left quadrants embody desire with a ripple pattern using heated colors like hot coral and blood orange, suggesting warmth and yearning. The bottom right quadrants represent emptiness with halo patterns rendered in charcoal and hollow blue, conveying subtlety and distance. The collision occurs where these emotions meet—highlighted in the center, where warm tones punctuate the cooler backgrounds. The fractured use of broken pixels serves to interrupt the flow and symbolize the tension of wanting against confinement, echoing the desire to break through boundaries.</desc>
