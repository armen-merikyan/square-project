<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension at the Threshold</title>
  <desc id="desc">This piece explores the emotional tension between defiance and submission. The palette of hot coral and blood orange marks a vibrant contrast against the muted tones of charcoal and hollow blue, illustrating the struggle between a bold, unmoving center and the surrounding chaos of submission. The diagonal rise pattern hints at a pulse marked by glitching moments of interruption, where colors collide yet remain distinct. Broken pixels are scattered throughout, introducing imperfection and intentional disruption that reflects the uneven border of emotional states. The layout embraces an open versus closed dynamic, inviting viewers to explore the threshold between conflict and calm.</desc>
