<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Pulse</title>
  <desc id="desc">This abstract composition plays on the emotional tension between signal and noise. The chosen palette of dark navy and dim cyan represents the depth of noise, while the occasional bright whites serve as signals of clarity. The layout rises from bottom to top, evoking a sense of hope amid confusion. The center features a collision of broken dots—symbolizing signal—interrupted by clusters of static islands. The broken pixels introduce intentional disruptions that reflect memories and echoes, enhancing the layered complexity of the piece.</desc>
