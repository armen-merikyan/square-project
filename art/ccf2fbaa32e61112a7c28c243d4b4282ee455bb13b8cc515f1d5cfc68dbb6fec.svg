<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">This artwork encapsulates the emotional dichotomy of envy and gratitude, portraying a conflict between dark and light. The selection of deep navy and black invokes the weight of envy, while the dim cyan provides a contrast representing the lightness of gratitude. The arrangement follows a rising pattern that suggests hope yet retains a boundary—a 'half square' which reminded me of the tension between emerging feelings and restrained spaces. The broken pixels introduce imperfections to echo the unpredictable nature of emotions, while negative space symbolizes the empty room where these emotions coexist, emphasizing a transition from chaos into clarity.</desc>
