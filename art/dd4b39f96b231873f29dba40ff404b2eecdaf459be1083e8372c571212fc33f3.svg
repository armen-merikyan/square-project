<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This piece captures the contrasting emotional tones of love and betrayal. Using a palette dominated by warm pinks and reds, punctuated by cool grays and dark maroons, it reflects the warmth of love against the coldness of betrayal. The layout features a zigzag flow, evoking a sense of falling, reminiscent of tears or ash, enhancing the feeling of vulnerability. The broken pixels intentionally disrupt symmetry, creating a visual tension that embodies the theme of 'fractured harmony'. Main contrasts appear between dense clusters of warm colors and sparse, empty spaces, portraying emotional highs and lows. The juxtaposition of mirrored forms suggests love's embrace, while the imperfections symbolize betrayal's intrusion, crafting an abstract narrative of conflict within relationships.</desc>
