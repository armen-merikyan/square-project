<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Weight</title>
  <desc id="desc">The artwork embodies the emotional duality of joy and grief through contrasting colors. The warm yellows and oranges symbolize joy, expanding outward against the deep blues representing grief, creating a visual push and pull. The layout employs a 4x4 symmetry with a contrasting use of 'frame' for joy and 'mirror' for grief, allowing for a central pulse of light disrupted by darker, weighted edges. This tension is mirrored in the broken pixels, introducing imperfection and a sense of unresolved emotion.</desc>
