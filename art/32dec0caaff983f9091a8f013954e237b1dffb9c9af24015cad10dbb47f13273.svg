<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Emotion</title>
  <desc id="desc">This composition reflects the emotional tension between joy and grief, balancing bright elements against deep, muted colors. The palette incorporates vibrant yellows and oranges to symbolize joy, contrasted with deep blues and muted purples representing grief, creating an unsettling yet resonant space. The zigzag pattern brings a sense of chaos within the order of rising signals, allowing for a dynamic visual representation of conflict and resolution. Juxtaposing sharp edges with softer tones creates a dialogue between the two emotions, emphasizing collision points while retaining open, negative spaces to alleviate the density.</desc>
