<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensioned Harmony</title>
  <desc id="desc">The emotional tone presents a dialogue between restlessness and peace by using a palette dominated by charcoals and warm hues indicative of ancient fire. Here, the vibrant burnt orange and deep dark red clash with subdued gold, creating a conflictual dynamism. The collision, primarily occurring in the center, represents a pulsating tension as the 'flame' pattern interrupts the quietness of ‘stepwell’. The layout of two small centers suggests conflicting thoughts battling yet remaining contained, synonymous with the emotional states derived from the seed. This abstract story captures a moment of urgency and tranquility, reflecting feelings encapsulated in memory and motion.</desc>
