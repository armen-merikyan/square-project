<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Tension</title>
  <desc id="desc">This piece embodies the emotional dialectic between joy and grief, utilizing a palette that juxtaposes warm tones like yellow and orange with cool blues and muted purples. The chaotic zigzag patterns representing grief are counterbalanced by the structured, orderly placement of joyful tones. The incorporation of burned edges simulates the passage of time and emotional scars, while the fragmentation and fills create a sense of noise against the solid core, echoing how memories pulse in contradiction to each other.</desc>
