<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Calm and Fury</title>
  <desc id="desc">This composition captures the tension between rage and calm using a palette that juxtaposes intense reds against soft blues and blacks. The bright reds symbolize explosive emotion, while the cooler tones represent quiet containment. The patterns of dots (representing calm) and jagged flames (representing rage) interlace, disrupting each other, particularly at the center where the collision of emotions is most pronounced, suggesting both chaos and an attempt at balance amid turmoil. The negative space is utilized to reflect calm and containment, creating a dynamic interplay of pressure and quietness.</desc>
