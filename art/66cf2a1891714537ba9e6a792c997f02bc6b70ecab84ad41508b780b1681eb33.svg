  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork embodies the emotional tension between safety and exposure. The palette, featuring deep greens and warm browns contrasted with pale and cold hues, creates a sense of both shelter and openness. The main collision occurs in the center, where the intense colors promise safety, yet are encroached by softer shades, representing exposure. The interplay of broken dots and target patterns establishes a rhythm of pressure and release, echoing the feelings of vulnerability against a comforting frame.</desc>
