  <title id="title">Echo of Shelter</title>
  <desc id="desc">The emotional tone captures the tension between vulnerability and protection, conveyed through a palette of earthy greens and warm browns for safety, offset by pale skin tones and cool whites for exposure. The layout implies a pressure corner, where the saturation builds up in the upper left against lighter environmental shades, creating a vivid echo of the tension. The radial pattern of exposure suggests an outward spread, while the broken frame of safety hints at inherent fragility. The main collision of warm tones versus cooler ones invites reflection on the coexistence of these emotional states.</desc>
