<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotions</title>
  <desc id="desc">This abstract composition explores the emotional dichotomy of fear and hope through contrasting color placements and shapes. The palette of deep black, dark violet, soft gold, and pale green symbolizes the tension between heavy, oppressive feelings and the lightness of hope. The arrangement creates collisions between the sharp, jagged edges representing fear and the softer, rising patterns of hope, particularly concentrated towards the center, suggesting a struggle for control. The use of broken colors within the grid reflects imperfect but real emotions, while the negative spaces allow room for breath and contemplation.</desc>
