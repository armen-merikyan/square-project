<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This piece expresses the duality of love and betrayal through a palette dominated by warm pinks and deep reds contrasted by muted dark maroon and gray. The layout is intentionally vertical, suggesting a descent and reflecting emotional weight, while the grid pattern embodies love's structure and betrayal's radial noise creates a sense of chaos. The left side features dense clusters of warm colors, erupting through breaks in the darker tones, illustrating the tension between warmth and coldness, emotional resonance, and abandonment. The main collision occurs in the center, where soft forms clash with harsh lines, narrating an unresolved emotional journey.</desc>
