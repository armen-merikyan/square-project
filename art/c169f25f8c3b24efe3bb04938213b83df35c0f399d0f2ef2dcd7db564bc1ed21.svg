<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Resolve</title>
  <desc id="desc">This artwork embodies the emotional tension between longing and resolve through juxtaposed patterns and colors. The palette, composed of moss green, bone white, rust, stone gray, and small gold, highlights the resilience of resolve against the fragility of longing. The interaction of the flooding and braided patterns creates a sense of movement, with a cool, quiet side contrasting the warm, dense clusters. The main collision occurs in the center, where the overlapping patterns suggest a struggle between hope and despair, framed by negative space to enhance the emotional depth.</desc>
