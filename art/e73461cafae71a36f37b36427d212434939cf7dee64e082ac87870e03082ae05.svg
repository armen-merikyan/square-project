<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges: A Tension of Contrast</title>
  <desc id="desc">This artwork explores the emotional tension between vulnerability and strength. The palette incorporates warm coral and soft amber to depict warmth and safety in the central region, symbolizing strength. In contrast, cold slate and blue-black create an enveloping edge that hints at alienation and exposure. The main collision occurs at the center where the radial pattern of strength meets the constellation pattern of vulnerability, representing the interplay of protection and breach. Broken pixels add intentional disruption, suggesting the imperfections in the balance between these feelings. The overall structure is a gradual transition from a dense center to a porous, lighter edge, embodying an emotional experience of oscillating between feeling secure in connection and exposed to the unknown.</desc>
