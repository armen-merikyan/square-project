  <title id="title">Heavy Light</title>
  <desc id="desc">This artwork captures the emotional tension between envy and gratitude through a stark contrast of colors. The palette consists of deep navy and black representing envy, with their density weighing down the composition, while the dim cyan introduces a soft, contrasting light representing gratitude. The layout splits into two contrasting sections, highlighting the psychological struggle between heavy tones above and lighter tones below. The zigzag flow suggests agility amidst heaviness, while broken pixel placements within the bottom rows signify fractured moments of gratitude amidst a flowing wave of calmness.</desc>
