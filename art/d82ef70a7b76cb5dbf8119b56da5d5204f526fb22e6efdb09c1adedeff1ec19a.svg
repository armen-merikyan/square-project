<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Clarity</title>
  <desc id="desc">The composition explores the emotional tension between confusion and clarity. A palette of yellow, orange, deep blue, and muted purple suggests warmth against calm, with yellow and orange representing clarity, which is intermittently disrupted by deep blue and muted purple, encapsulating confusion. Each color cluster is deliberately positioned to create a sense of collision, with darker colors pushing against brighter ones, creating a pulsating visual heartbeat. The pattern reflects a flow from center to edges, highlighting tension and release, intertwined with broken pixels that add to the sense of imperfection, resonating with the seed's theme of contrasting emotional states.</desc>
