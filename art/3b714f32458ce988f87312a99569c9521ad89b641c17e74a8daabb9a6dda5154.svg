<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissonant Pulse</title>
  <desc id="desc">The emotional tone of this piece reflects the tension between joy and grief through contrasting colors and patterns. The palette blends vibrant yellows and oranges representing joy, against deep blues and muted purples symbolizing grief. The central pattern plays with broken dots on the left, suggesting joy's fleeting nature, clashing with symmetric rings representing the weight of grief. The composition's left-weighted imbalance adds a feeling of being anchored by sorrow, while echoes of bright colors hint at uplifting moments. This creates a dynamic conversation between darkness and light, underscoring the complexities of emotional experience.</desc>
