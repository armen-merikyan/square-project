<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Duality</title>
  <desc id="desc">The composition explores the tension between envy and gratitude as opposing emotional forces. The palette, drawn from dark and muted tones like navy and black, represents the heaviness of envy, while muted whites and dim cyan suggest gratitude's subtle warmth. The placement of lighter tones at the edges draws the eyes inward, conveying the quiet crawl of gratitude into the heavy, textured center representing envy, which is clumped and dense. The contrasting patterns—grid for envy and teeth for gratitude—create a rhythmic push and pull, suggesting rising hopes colliding with falling fears, encapsulated in overlapping colors and a jagged edge style that evokes both jagged emotions and the soft edges of longing.</desc>
