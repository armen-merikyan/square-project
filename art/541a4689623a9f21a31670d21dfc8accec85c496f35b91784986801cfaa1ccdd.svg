  <title id="title">Light vs Weight</title>
  <desc id="desc">This artwork captures the tension between relief and dread. The palette consists of bold lime and electric blue against deep black, symbolizing hope amid heavy darkness. The upper half contains brighter accents for relief, tapering downwards into denser blacks that evoke a sense of dread. The arrangement creates a rising pattern from bottom to top, suggesting a struggle for escape, while broken pixels interrupt the flow, embodying moments of imperfection and chaos.</desc>
