<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Shades</title>
  <desc id="desc">This artwork explores the emotional dichotomy of fear and hope through a palette emphasizing deep shadows and soft highlights. The colors black and dark violet in the top rows represent the fear aspect, while pale green and soft gold contrastingly illustrate hope below. The first half features a grid-like arrangement to depict pressure, while the bottom half uses circular patterns that suggest rising signals of optimism. The layout captures a flow from edges toward a central focal point, maintaining a negative space towards the center, invoking an unsettled yet hopeful anticipation. The broken pixels create imperfections that nod to life's unpredictability, while the edge style weighs heavily at the bottom, enhancing the feeling of looming shadows.</desc>
