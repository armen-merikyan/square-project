<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Tension</title>
  <desc id="desc">This artwork embodies the emotional struggle between vulnerability and strength, portrayed through a dense center and stark edges. The warm coral and orange signify strength, while the soft pink represents vulnerability. The palette contrasts vibrant hues against deep charcoal and hollow blue to create an emotional echo. The arrangement sees a saturated center colliding with desaturated outer layers, illustrating the notion of a stable core under attack, facilitated by hard edges. Dispersed broken pixels introduce a sense of imperfection, enhancing the narrative of seeking shelter under pressure while exposing fragility.</desc>
