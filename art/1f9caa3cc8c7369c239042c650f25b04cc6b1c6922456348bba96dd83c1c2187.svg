<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Balance of Echoes</title>
  <desc id="desc">This artwork embodies the tension between strength and vulnerability by contrasting dense color blocks with lighter hues. The dark tones represent strength and rigidity, while the pale colors symbolize exposure and fragility. The collision of these elements occurs in the center, where the echo of darker colors pushes against the lighter patchwork, creating a rhythm of pressure and release, highlighting the emotional complexities of the seed. The chosen palette of mourning black, deep blue, new leaf, pale yellow, and stone reflects the somber yet renewing aspects of vulnerability and strength, creating a narrative of resilience and connection.</desc>
