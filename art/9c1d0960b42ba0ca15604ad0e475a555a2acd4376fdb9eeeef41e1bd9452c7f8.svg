<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tensions of Tranquility</title>
  <desc id="desc">This composition encapsulates the emotional dichotomy of restlessness and peace. The chosen palette of pale aqua and alarm red contrasts the tranquility of mist gray, creating a visual representation of conflict. The center is dense with grid patterns symbolizing restlessness, while maze-like lines of peace weave around it, forming a perimeter that reflects containment. The main collision occurs diagonally from the top left to the bottom right, where light and dark colors meet, representing the ongoing struggle between calm and chaos. Broken pixels are intentionally placed to disrupt the calm space, enhancing the feeling of tension. Overall, the artwork invites viewers to contemplate the balance between motion and stillness.</desc>
