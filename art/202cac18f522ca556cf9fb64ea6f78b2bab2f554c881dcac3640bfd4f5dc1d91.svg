<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Chaos and Control</title>
  <desc id="desc">This artwork embodies the emotional tension between panic and control, illustrated through a stark contrast in color and structure. The left half utilizes darker, cooler tones creating an atmosphere of restraint and symmetry (reflecting control), while the right side uses warmer contrasts that appear more chaotic and disordered. The checker pattern of the panic section disrupts the controlled flow of the teeth pattern in the control section, creating a visual 'spark' of conflict. Broken pixels introduce intentional flaws, embodying the idea of imperfection within both emotions. The asymmetrical color placements evoke feelings of unresolved motion and the interplay of emotional weights.</desc>
