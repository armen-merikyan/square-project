<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Chaos</title>
  <desc id="desc">The emotional tone reflects a balance between clarity and confusion, highlighted by the palette's transition from sharp black to pale blue which represents depth and fragmentation. The rows contain dense clusters of blacks and reds on the periphery, contrasted by whites and softer tones breaking through the center, embodying the layout of 'corner invasion'. The collision of thick outlines with broken pixels creates a visual tension that mirrors the emotional discord of the seed. The pattern follows a diagonal fall, echoing the uncertainty that permeates from the edges to the center, suggesting a story of conflict between structure and decay.</desc>
