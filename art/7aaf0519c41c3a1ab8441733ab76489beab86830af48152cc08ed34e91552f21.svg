<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory in Motion</title>
  <desc id="desc">This artwork expresses the tension between control and surrender through contrasting color patterns. The palette of moss green, bone white, rust, stone gray, and small gold emphasizes resilience and fragility, representing both a grounding stability and a loose, vulnerable edge. The central collision occurs between thick, structured outlines in moss green and the diffused, fault line-like interruptions in warm rust tones, creating a dialogue of pressure versus release. The arrangement of colors reflects the transition from the rigidity associated with control to the gentle flow of surrender, embodying a dynamic yet graceful balance of emotional states.</desc>
