<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension at the Edge</title>
  <desc id="desc">This composition reflects the emotional duality of control and surrender. The palette, including pale mint and storm gray, captures feelings of relief and dread, while evoking an endless sky contrasted against heavy density. The center holds vibrant colors representing an overwhelming pressure, while the darker borders introduce a sense of containment. The patterns of stacked control elements collide with shatter-like disruptions, illustrating the struggle between evasion and embrace. The tension culminates in the center, surrounded by vast negative space that encapsulates feelings of isolation and quiet resolve.</desc>
