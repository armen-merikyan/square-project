<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal and Static</title>
  <desc id="desc">This abstract piece encapsulates the emotional tug-of-war between tenderness and rage. The dominant black and red colors represent the explosive nature of rage, while pale blue offers a contrasting gentle touch, echoing tenderness. The central area features an agitated pattern reminiscent of static, encapsulating the inner turmoil, while muted areas around it serve as a cathartic release. The intentional broken pixels enhance the sense of disruption, grounding the piece in its emotional complexity without depicting literal forms, allowing the viewer to experience tension and resolution through color dynamics.</desc>
