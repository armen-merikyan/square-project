<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Flow</title>
  <desc id="desc">This artwork conveys a distinct emotional dichotomy between softness and severity. The warm palette—predominantly featuring powder pink and warm white—invokes a sense of gentle flow and comfort, while the stark contrast of carbon black and sharp crimson introduces moments of harshness and intensity. The arrangement has a dense cluster towards the center, symbolizing emotional weight, that subtly radiates outward, representing the gradual release of pressure. This captures the essence of the seed, emphasizing the movement from tension (severity) to calm (softness) through color and structure.</desc>
