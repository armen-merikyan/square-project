<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">The emotional tone reflects a dichotomy between nostalgia (warm, soft) and progress (cool, sharp). The palette 'broken_memory' utilizes sepia and faded blues to evoke a sense of warmth and history, contrasted with the clarity of cooler tones. The layout splits horizontally, creating a visible fracture, where the top half maintains a repetitive flame pattern (nostalgia) juxtaposed against the aggressive split-screen below (progress). Collisions occur where warm hues momentarily permeate the overlaying cool colors, suggesting an unresolved tension. This arrangement embodies a drift from the calm associated with memory into the pressure of forward momentum, where broken pixels symbolize the imperfections in this transition.</desc>
