<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Containment</title>
  <desc id="desc">This piece embodies the tension between restlessness and peace. The warm colors represent restless energy, breaking boundaries and encroaching into cooler spaces of tranquility. The palette, derived from 'broken_memory,' combines sepia and faded blue to evoke nostalgia and emotional depth. The edge style expresses receding edges, enabling a sense of motion towards calm. The main contrast, found primarily in the top half, creates a collision that signifies emotional turmoil as it flows downward like falling pixels, hinting at memories descending into clarity.</desc>
