<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">The composition explores the emotional conflict between joy (represented by bright yellows and oranges) and grief (embodied by deep blues and muted purples). The warm tones radiate outward in a radial wave, while the cooler colors create a crosshatch effect, suggesting a tension between expansion and constriction. The interplay of dense clusters and quiet spaces captures the essence of this duality, with a thin outline representing the fragility of emotion. The contrast reflects the break in symmetry, creating a layered narrative of growth through distress.</desc>
