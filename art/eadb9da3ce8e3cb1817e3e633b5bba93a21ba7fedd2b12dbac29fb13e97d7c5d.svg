<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order and Disruption</title>
  <desc id="desc">This artwork captures the emotional tension between softness and severity, utilizing a palette of gentle pastels against stark blacks and greys. The soft-grid pattern battles with pulse marks, creating a dynamic contrast at the center—where severity punctuates softness. The black and dark gray on one side embodies severity, while warmer whites and soft pinks emanate softness, allowing for a quiet chaos that expresses unresolved feelings of guilt and forgiveness. The layout features broken edges, symbolizing emotional leakages, adding to the layered story being told.</desc>
