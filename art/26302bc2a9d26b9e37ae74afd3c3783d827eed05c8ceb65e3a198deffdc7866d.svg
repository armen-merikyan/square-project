<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Ascent</title>
  <desc id="desc">This piece embodies the emotional tug-of-war between defiance and submission, framed by a palette of burnt orange, dark red, charcoal, and gold. The warm colors suggest an intense confrontation of feelings, while the cool charcoal base creates a stark contrast that reflects a grounding weight. The arrangement features a left-weighted design, with chaotic bursts of color cascading rightward, illustrating a landscape of tension. Areas of negative space serve as moments of pause and reflection amidst the dense clusters, creating an echo effect in the flow. The overall composition conveys an unresolved motion, capturing the heart of the seed through abstraction and chaos.</desc>
