<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Yearning Refusal</title>
  <desc id="desc">This composition embodies the tension between desire and emptiness through a clash of saturated and muted hues. The palette reflects warmth and coolness, with bright accents of hot coral and blood orange representing desire, countered by the grounding presence of charcoal and hollow blue symbolizing emptiness. The strong contrast is accentuated by rows filled with minimal disruptions, creating a sense of unresolved tension akin to a visual echo. The main disruption occurs toward the center-left, where desire and emptiness collide, illustrating the emotional push and pull described in the seed.</desc>
