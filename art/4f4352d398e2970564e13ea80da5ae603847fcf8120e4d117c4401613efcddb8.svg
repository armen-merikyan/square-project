<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece explores the emotional tension between softness and severity through contrasting color fields. The palette includes soft pink and warm white to embody softness and gentleness, while deep charcoal and steel gray evoke a sense of severity and restraint. The layout allows these emotions to collide sharply, with the left half embodying softness through feathered edges and flowing patterns, while the right half presents a stark, split-screen effect. The main contrast occurs in the center, where the lighter hues meet harsher dark tones, suggesting an open gate that is both welcoming yet guarded. Broken pixels are scattered to introduce imperfection, symbolizing guilt and forgiveness within the structured emotional landscape.</desc>
