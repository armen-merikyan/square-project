<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Contrast</title>
  <desc id="desc">The composition explores the emotional duality of joy and grief, using a palette that shifts from muted blues and purples to brighter yellows and oranges to embody both sadness and optimism. The top rows are darker and fragmented, representing grief with dots, while the bottom transitions into brighter stair-like patterns reflecting joy, creating a step-like ascent from sorrow to hope. The collision occurs at the center where colors meet, echoing the tension between safety and threat in a storm-like descent. This arrangement captures the essence of emotional struggle, presenting a layered narrative through abstract form.</desc>
