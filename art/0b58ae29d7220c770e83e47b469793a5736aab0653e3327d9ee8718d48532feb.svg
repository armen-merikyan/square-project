<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of the Flame</title>
  <desc id="desc">This composition reflects the emotional tension between joy and grief, with the palette of warm yellows and oranges contrasted against muted blues and purples. The pattern evokes an upward surge of joy on the left and a downward pull of grief on the right. The edge style adds visual weight, highlighting the hidden versus exposed themes, while broken pixels introduce an imperfect beauty, representing the fragility of emotions. The layout creates a battle of flow, encapsulating the essence of the seed without depicting any literal images.</desc>
