<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Symmetry</title>
  <desc id="desc">This piece embodies the tension between vulnerability and strength, utilizing colors that reflect strength through bold, saturated tones and vulnerability through softer, muted areas. The palette consists of lime for accentuation, black for depth, electric blue for contrast, and magenta for emotional richness. The main collision occurs at the center, where the strong lime colors break through the surrounding darker tones, suggesting a vulnerable heart amidst pressure. This arrangement resonates with the emotional duality described in the seed.</desc>
