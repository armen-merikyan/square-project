<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension's Embrace</title>
  <desc id="desc">This piece explores the emotional conflict of desire and restraint through a vibrant yet contained color palette. The dominant warm hues symbolize desire and pulse against a more muted, cooler background representing restraint. The warm coral and blood orange swell like pulses from the edges (desire) while the dust pink creates a soft encapsulating core (restraint). The collision occurs at the center where the warmer grid pattern interrupts the cooler stair pattern, creating tension. The sealed edges provide a boundary that amplifies this internal struggle. This artwork visually narrates the push and pull between longing and limitation, inviting viewers to reflect on their own experiences of desire.</desc>
