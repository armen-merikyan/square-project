<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Light and Shadow</title>
  <desc id="desc">The emotional tone is a delicate tension between joy and grief, which is reflected in the color palette of yellows and oranges contrasting with deep blue and muted purple. The joy is represented through bright, spark-like colors on the left, while the grief is expressed in more subdued tones on the right. The layout is split vertically, allowing for distinct yet intertwined emotional expressions. The collision occurs at the center where warm meets cool, providing an area of vibrational conflict. The patterns, reminiscent of flames and sparks, suggest movement and energy that echo the battling emotions described in the seed.</desc>
