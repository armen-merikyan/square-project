<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone embodies a struggle between desire and emptiness, represented through a palette of warm and cool tones. The dominant use of hot coral and blood orange suggests a heated yearning, clashing with subdued colors like charcoal and hollow blue that convey detachment and restraint. The interrupted pattern of pressure band and crosshatch creates a sense of collision, particularly at the center, where brighter pixels peek through the darker areas, forming a visual narrative of tension and incomplete repairs against a boundary. This reflects a metaphorical pressure block, where desire pushes against the limits of containment.</desc>
