<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Push and Pull Within Silence</title>
  <desc id="desc">This work captures the emotional tension between envy and gratitude. The selected palette of electric blue, lime, and magenta creates stark contrasts that symbolize envy’s vibrant intensity against gratitude's softer notes. The arrangement features a maze pattern on the left, suggesting envy’s complexity, while a raindrop pattern emerges toward the center, embodying gratitude’s more gentle essence. The soft edges of the palette create an overall feeling of fluidity, yet the interplay of dense areas against lighter spaces captures the friction between rising and falling emotions. Negative space is utilized to symbolically represent ‘empty room’ and reflects the moments of stillness amidst deep feelings, aligning with the abstract qualities derived from the seed.</desc>
