<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Waves</title>
  <desc id="desc">This artwork captures the duality of joy and grief through a vibrant yet subdued palette. The left of the canvas (representing joy) features bright yellows and oranges that create a sense of upward motion akin to sparks, while the right side (grief) uses deeper, muted blues and purples, embodying weight and calm. The interplay of these colors captures the tension between the two emotions, introducing a dynamic collision where bright oranges occasionally break through the muted tones, suggesting hope amidst sorrow. The split layout reinforces this division, while the uniformity of patterns (flame vs spark) maintains a rhythm, echoing the orbiting themes of the seed.</desc>
