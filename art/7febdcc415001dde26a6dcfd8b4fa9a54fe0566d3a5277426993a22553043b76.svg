<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Resilience</title>
  <desc id="desc">This composition embodies the tension between dynamic spark and static ash, with a palette inspired by the deep contrasts of navy and black against striking accents of dim cyan and white. The upper left corner allows sparks to pop with vibrant dots, while the lower right settles into muted fields representing ash, creating a collision of emotion. The jagged edges pattern clashes with the negative cross in a way that both interrupts the calm and evokes a sense of fragmented memory. This layout mirrors itself along a diagonal axis, reinforcing the theme of resilience through the interplay of density and quiet spaces.</desc>
