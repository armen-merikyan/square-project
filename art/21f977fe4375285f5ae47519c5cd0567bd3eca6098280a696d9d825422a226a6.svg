  <title id="title">Fragmented Duality</title>
  <desc id="desc">The emotional tone reflects a tension between warmth and coolness, embodying the contrast of love and betrayal. The palette of pink, red, gray, and dark maroon captures a spectrum from warmth to chill, allowing the viewer to experience both the comfort of love and the coldness of betrayal. The placement of colors creates asymmetric patterns where warm tones dominate the left side, invoking feelings of love, while cool gray tones break in from the right, suggesting the betrayal lurking within. The use of broken pixels introduces imperfection, mirroring emotional conflict, while maintaining a spacious layout that respects the negative space rule.</desc>
