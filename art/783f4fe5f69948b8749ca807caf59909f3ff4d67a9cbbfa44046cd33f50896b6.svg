<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Boundaries</title>
  <desc id="desc">This work explores the emotional dynamics of longing versus resolve. The palette, featuring stark contrasts between deep ink black and the soft ice blue, creates a visual tension suggesting unresolved feelings. The background is anchored by clean white, providing a quiet field that enhances the sense of yearning. The collision occurs at the center with vibrant warning orange, symbolizing moments of urgent connection amidst a backdrop of serenity. Broken pixels introduce intentional discrepancies, mirroring the imperfections in the emotional landscape, while the flowing pattern of threads represents the struggle of containment and overflow. This juxtaposition embodies the intricate dance between desire and restraint, creating a visually impactful narrative without literal representation.</desc>
