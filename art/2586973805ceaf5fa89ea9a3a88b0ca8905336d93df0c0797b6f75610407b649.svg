  <title id="title">Overflow of Curiosity</title>
  <desc id="desc">This artwork embodies the emotional dichotomy between certainty and curiosity. The palette of 'quiet pressure' creates a landscape of muted tones with a stark contrast of deep navy and compressed red accentuations. The main collision occurs at the center where the cooler colors clash with the hotter ones, representing curiosity penetrating the structured certainty. The placement of broken pixels adds intentional imperfections, embodying the theme of chaos within the confines of order. The layout mimics a mirror, creating an edge-crawl where one side seeks to dominate while the other side reflects a struggle for containment.</desc>
