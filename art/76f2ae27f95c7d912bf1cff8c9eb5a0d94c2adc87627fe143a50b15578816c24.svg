<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Emotions</title>
  <desc id="desc">This artwork embodies the tension between envy and gratitude through a dynamic interplay of color and structure. The palette, drawn from earthy washed tones of sepia and tan mixed with hints of gray and blue, reflects the underlying weight of these emotions, embodying the heaviness of envy alongside the lightness of gratitude. The left side, representing envy, features a split screen pattern that creates a dense, turbulent area, contrasted sharply by the grid-like arrangement on the right, symbolizing clarity and balance in gratitude. The broken pixels introduce imperfection, signifying the fragility of emotions, while the burned edges add a raw sense of transition. The composition features a vigorous upward and downward flow, reinforcing the emotive struggle, with an intentional asymmetry to suggest unresolved tension and contemplation on the viewer's part.</desc>
