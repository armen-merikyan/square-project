<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone juxtaposes explosive anger and soothing calmness, reflected in the color palette which oscillates between deep reds representing rage and soft blues symbolizing calming presence. The composition features an overall density of red indicating intrusion amidst a quieter blue field, creating an emotional tension. The structured maze of red bursts collides with pale blue embers, suggesting movement from chaos to tranquility, while broken black pixels introduce flaws and imperfections, supporting the theme of erosion and repair. This translation of the seed reflects complex emotional interactions without resorting to literal imagery.</desc>
