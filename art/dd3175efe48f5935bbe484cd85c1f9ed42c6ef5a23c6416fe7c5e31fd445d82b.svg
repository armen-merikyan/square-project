  <title id="title">Contrast of Flames</title>
  <desc id="desc">This artwork embodies the emotional tension between joy and grief, using a palette that oscillates between bright, warm colors and muted, darker shades. The bright yellows and oranges represent joy, radiating outward from the lower left corner, while the deeper blues and purples signify grief, creating a sense of heaviness in the upper right. The arrangement allows for a dynamic flow that splits horizontally, showcasing a collision of feelings where joy bursts forth but is continuously interrupted by layers of grief. The broken dots and mirror patterns provide an organic rhythm, emphasizing the deeper narrative of hidden emotions clashing in a releasing wave.</desc>
