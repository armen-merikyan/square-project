<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">This piece explores the emotional strain between tenderness and rage, utilizing a palette that embodies both extremes. The left side is dominated by muted pale blues representing tenderness, paired with soft white tones for contrast. The right side erupts with sharp reds and black, invoking a sense of rage and conflict. The split vertical layout amplifies the tension, transitioning from the calmness of the gentle ripples on the left to jagged, explosive patterns on the right, highlighting the internal struggle. The broken pixels create an intentional disruption, reflecting the unpredictability of these emotions.</desc>
