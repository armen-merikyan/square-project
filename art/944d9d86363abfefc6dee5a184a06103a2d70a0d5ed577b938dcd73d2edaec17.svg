<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This composition explores the duality of awe and terror while embodying the themes of order versus chaos. The warm tones of sepia and tan collide with the cool shades of dust gray and faded blue, establishing a strong contrast that captures the emotional struggle. The palette originates from the notion of 'broken memory', invoking a sense of scattered thoughts amidst a structured environment. The placement of colors follows a wave-like pattern moving vertically, where clusters of warm colors represent awe, while isolated cool tones signify terror. The broken edges and disrupted pixels create an imperfection that mirrors the instability between these two emotions, suggesting how they coexist and interact. The negative space is intentionally maintained to evoke a sense of lingering uncertainty, enhancing the overall feeling of unresolved tension throughout the piece.</desc>
