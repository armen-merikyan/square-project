<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interplay of Light and Shadow</title>
  <desc id="desc">This artwork explores the emotional dichotomy of joy and grief through color and form. The top half reflects joy through bright yellows and warm oranges, creating an upbeat, crosshatch pattern that suggests lightness and movement. In contrast, the bottom half embodies grief with deep blues and muted purples in a fragmented frame pattern, communicating heaviness and sorrow. The jagged edges disrupt the expected symmetry, suggesting tension and resolution within the emotional landscape. The spatial balance allows for a necessary negative space that enhances the feeling of release.</desc>
