<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order Meets Chaos</title>
  <desc id="desc">This piece expresses the tension between control and panic, reflected in the use of black for stability and pale blue for emotional upheaval. The contrast between the consistent dots and the chaotic crosshatch creates a visual narrative of an empty room descending into disorder. Negative space is maintained to allow breathing room for the palette to interact without overwhelming the viewer. The emotional tones pull back and forth, echoing the sensation of entering an uncertain space while keeping the vestiges of control. The layout simulates falling pixels, creating a sense of weightlessness amidst emotional gravity.</desc>
