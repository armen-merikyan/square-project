<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Mending the Pulse</title>
  <desc id="desc">The composition captures the emotional duality of 'longing' and 'resolve' through contrasting colors and patterns. The palette, dominated by navy and dim cyan, evokes a sense of depth and calm amidst the chaos of broken pixels representing 'damage.' The collision is centered, where structured radial patterns of resolve interlace with the fragmented 'teeth' pattern of longing, illustrating the tension between orderly progression and scattered desire. The quiet fields of black and subtle whites provide necessary negative space, suggesting reflection and balance amidst emotional overflow.</desc>
