<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetrical Fragments</title>
  <desc id="desc">The emotional tone oscillates between grief and joy, creating a palpable tension. The palette combines deep blue and muted purple to convey grief while introducing bright yellow and orange as sparks of joy. The laid-out pattern reflects a zigzagging motion that represents the chaos of emotions. The flow from outside inwards allows for both expanding joy and the weight of grief, disrupted with broken pixels to indicate imperfection. Contrasting straight and curved edges enhance the feeling of imbalance, fostering a sense of unresolved emotions.</desc>
