<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasting Currents</title>
  <desc id="desc">This piece channels the turbulence of 'panic' in a visually chaotic manner (as represented by jagged and erratic placements) against the stillness of 'control' (expressed through orderly, rhythmic spacing and rounded shapes). The palette of black, dark violet, soft gold, and pale green portrays the struggle between anxiety and calm—warm versus cool. The colors collide in a zigzag pattern, representing tension, with a dense center that transitions to open space. The broken edges reflect imperfections inherent within the emotional turmoil of the seed concept, crafting a narrative of internal conflict.</desc>
