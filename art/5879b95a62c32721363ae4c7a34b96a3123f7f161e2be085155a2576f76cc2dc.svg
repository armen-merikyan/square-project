<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This piece embodies the tension between desire and restraint through contrasting colors and patterns. The palette leans heavily on saturated tones of hot coral and blood orange to represent yearning, while the charcoal and hollow blue add a layer of muted restraint. The central focus is a vibrant clash, encased by darker edges that symbolize barriers. The spiral pressure from the outer bands suggesting desire pushes against the sealed borders, reflecting the emotional push and pull within this composition.</desc>
