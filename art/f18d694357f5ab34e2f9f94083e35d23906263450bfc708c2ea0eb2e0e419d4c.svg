<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Will</title>
  <desc id="desc">The emotional tones of control and surrender collide in this composition. The palette features vibrant colors like electric blue and magenta, representing conflicting feelings, while the black serves as a grounding void reflecting control's weight. The grid-like patterns of crosshatch denote the structure of control, while the scattered teeth pattern illustrates the release of surrender, emphasizing the tension between containment and overflow. The center, densely filled with bright colors, represents the overfilled emotion, while the broken pixels intentionally disrupt the symmetry, evoking a sense of tension and unpredictability.</desc>
