  <title id="title">Collision of Emotions</title>
  <desc id="desc">This artwork embodies the tension between tenderness and rage through a thoughtful arrangement of colors. The palette features deep reds expressing rage coupled with gentle pale blues symbolizing tenderness. The layout springs from the corner, illustrating how emotions invade the space, shifting towards the center. The use of broken pixels disrupts the linearity, portraying a sense of imperfection akin to human emotions that cannot be contained. This interplay of saturated and muted colors evokes an emotional narrative that feels both personal and relatable.</desc>
