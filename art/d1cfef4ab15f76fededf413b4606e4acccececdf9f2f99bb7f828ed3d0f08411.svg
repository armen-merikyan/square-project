  <title id="title">Emotional Fracture</title>
  <desc id="desc">This artwork embodies the duality of joy and grief through a contrast-heavy palette inspired by the seed's emotional tension. The warm tones of orange and yellow symbolize joy, while the deep blue and muted purple evoke grief. The arrangement creates a split visual impact, with joyful stair-step patterns colliding with the structured frame of grief, suggesting an ongoing struggle between order and chaos. The color choices create sharp contrasts with hard edges that heighten the sense of emotional conflict, embodying feelings of safety versus threat.</desc>
