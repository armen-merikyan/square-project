<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Balance</title>
  <desc id="desc">The emotional tone captures the struggle between control and surrender through contrasting colors. The palette consists of moss green for tension, bone white as a quiet field color, rust for accents, stone gray to symbolize containment, and small gold to provide moments of brightness. The main collision occurs at the center with vibrant colors pushing against the calm grays, representing an overflow of emotion against structured containment. The patterns intertwine as staggered bands (control) overlap with softer, stacked textures (surrender), creating a dynamic interplay throughout the square that embodies tension, interruption, and eventual release. The broken pixel elements enhance the sense of imperfection and struggle, reflecting the emotional journey of the seed.</desc>
