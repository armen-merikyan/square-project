<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Echoes</title>
  <desc id="desc">The emotional tone of defiance collides with submission, creating tension between sharp angular patterns and soft, receding spaces. The use of a limited palette—predominantly black and white with touches of pale blue and red—emphasizes this tension. The center features clusters of bright colors, representing defiance, while the edges recede into softer tones, embodying submission. The collision occurs primarily in the center where angular shapes intermingle with gentle echoes, generating a dynamic balance between resistance and surrender. This arrangement reflects the motifs of 'signal vs noise' and 'corner invasion' through the chaotic yet deliberate placement of pixels.</desc>
