<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This piece captures the emotional tension between desire and emptiness. The warm palette of hot coral and blood orange represents desire, with radial patterns drawing the eye toward the center where the intensity is heightened. Conversely, the muted hollow blue and charcoal tones signify emptiness, providing a contrast in texture and tone, with their radial patterns creating a sense of disruption. The left and right sides are mirrored with intentional anomalies to suggest the conflict between overflow and containment. The result is a dynamic collision of warmth and coolness, echoing the spiraling tension in the composition.</desc>
