<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This abstract artwork reflects the tension between softness and severity, utilizing a palette of warm and cool tones to convey emotional depth. The top four rows embody softness through a crack pattern, showcasing lighter hues like powder pink and warm white, creating a gentle context. The bottom four rows transition to severity, employing a constellation pattern with darker colors like carbon black and steel gray, introducing sharp contrast. The collision occurs in the center, where the warm pink edges disrupt the dark boundaries, emphasizing the emotional struggle between vulnerability and rigidity. Overall, this piece illustrates the interplay of light versus dark, emphasizing how softness tries to overflow containment while expressing guilt and forgiveness in abstract form.</desc>
