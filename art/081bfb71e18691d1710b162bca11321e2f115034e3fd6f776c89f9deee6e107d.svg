<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Core Collision</title>
  <desc id="desc">This piece explores the tension between defiance and submission through color and layout. The chosen palette of signal green, electric blue, hot magenta, and static gray reflects the vibrancy of a struggle against oppressive calm. The outer edges, filled with darker colors, represent the submission theme, wrapping around an explosive, bright center that illustrates defiance. The collision occurs prominently in the center of the artwork, where dense colors interrupt the softer edges, creating an unexpected spiral effect that suggests an inward movement despite the outer pressures. The broken pixels throughout introduce imperfections that highlight the emotional battle, effectively representing resilience. Negative space is utilized to enhance the feeling of enclosure and isolation, making the vibrant core stand out in contrast.</desc>
