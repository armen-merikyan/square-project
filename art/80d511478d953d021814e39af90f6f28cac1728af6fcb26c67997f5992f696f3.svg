<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrasts in Motion</title>
  <desc id="desc">This artwork embodies the tension between restlessness and peace through contrasting colors and placements. The palette reflects the emotional depth, utilizing darks for unease and softer hues for calm. The dominant blacks and violets create a dense, unsettling base at the bottom, rising towards lighter soft golds and pale greens that suggest hope and peace as they spread upwards. The main collision occurs diagonally, where the patterns of restlessness (constellation) disrupt the more peaceful noise-like textures. This evokes a narrative of conflict transitioning into tranquility.</desc>
