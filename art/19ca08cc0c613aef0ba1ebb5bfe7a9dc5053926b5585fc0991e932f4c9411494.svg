<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Shelter</title>
  <desc id="desc">This composition captures the emotional tension between safety and exposure through color contrasts and an interrupted pattern. The chosen palette of warm brown, cold white, and open blue represents the duality of soft shelter and harsh exposure, creating a dialogue of vulnerability and protection. The main collision occurs in the center with the ‘shatter’ pattern representing exposure, disrupted by the softer ‘ash_field,’ suggesting a barrier. The layout emphasizes a gradual diagonal transition that invites the viewer's gaze from the corner, embodying a spread of comfort against encroaching vulnerability.</desc>
