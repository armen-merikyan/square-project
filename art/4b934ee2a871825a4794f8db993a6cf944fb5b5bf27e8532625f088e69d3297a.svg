  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork embodies the emotional tension between rage and calm, with sharp contrasts represented through jagged shapes of deep red slicing through softer shades of pale blue. The palette of red and black contrasts with muted colors to signify passion versus tranquility. The center area depicts the collision of intense emotion that spills into calming spaces. The calm is a persistent background, while rage makes abrupt appearances, manifesting an emotional journey of containment interrupted by bursts of intensity.</desc>
