<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Control</title>
  <desc id="desc">This composition explores the emotional tension between panic and control through a balanced palette of burnt orange, dark red, charcoal, and gold. The vibrant contrast between warm (panic) and cool (control) tones creates a rhythmic clash, suggesting an unbearable push against the calming center. The layout reflects an argument grid, with a chaotic ring pattern on the extremes counteracting the structured crosshatch at the center, resulting in a clash between the controlled and the chaotic. The inclusion of broken elements enhances the sense of imperfection, contributing to the narrative of a battle between a composed surface and chaotic undercurrents.</desc>
