<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Empires of Emotion</title>
  <desc id="desc">This artwork captures the tension between defiance and submission, embodying an unyielding center clashing against softer edges. The chosen palette of rain blue and muted plum reflects a melancholic yet vibrant atmosphere, where cooler tones signify defiance and warmer accents suggest submission. The collision occurs at the center, where a ‘hinge’ of intense colors interrupts the flow of quieter spaces, evoking a sense of struggle amidst calm. This dynamic reflects the seed's narrative through contrasting patterns of broken dots and hinge shapes, translating emotional complexity into a structured abstract form.</desc>
