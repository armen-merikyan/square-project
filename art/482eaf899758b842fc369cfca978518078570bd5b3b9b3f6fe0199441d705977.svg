<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Flicker of Resilience</title>
  <desc id="desc">The emotional tone reflects the tension between brightness and decay—'spark' symbolizes fleeting moments of brilliance, while 'ash' represents remnants of what was. The palette chosen embodies warmth with burnt orange and dark red, contrasted against the cooling, muted presence of charcoal, suggesting a fight between vitality and exhaustion. The main collision occurs in the center, where the lighter hues encroach upon the grays, illustrating moments of memory attempting to breach the weight of erasure. Patterns derived from 'hinge' and 'teeth' create interrupted, jagged designs that echo this struggle, honoring both the spark's vibrancy and ash's quietude.</desc>
