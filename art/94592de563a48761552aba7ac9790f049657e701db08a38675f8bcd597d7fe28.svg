<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Pressure</title>
  <desc id="desc">The artwork reflects the emotional tension between quiet and pressure. The palette of off-white, dust gray, compressed red, dark navy, and faint peach influences a soft yet impactful juxtaposition. The dominant areas of dark navy embody the feeling of pressure, while the lighter tones serve as quiet interjections. The collision occurs in the center, where the compressed red disrupts the otherwise calm space, reflecting the dynamic interplay of pressure and release suggested by the seed. Each pixel arrangement is intentional, creating an abstract notion of tension and calm flowing across the square.</desc>
