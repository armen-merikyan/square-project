<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Static Pulse</title>
  <desc id="desc">This artwork embodies the tension between clarity (signal) and disruption (noise). The color palette blends electric blues and hot magentas as striking accents that pulse against a backdrop of static grays and dead blacks, evoking feelings of energy caught amidst chaos. The dominant dark field occupies most of the square, representing the enveloping noise, while the vibrant colors emerge in a corner, suggesting an invasion of clarity amidst overwhelming static. Each row's arrangement promotes a sense of collision and unevenness that mirrors the emotional density of memories and exposures fighting for space.</desc>
