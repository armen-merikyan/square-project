<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Duality of Tension</title>
  <desc id="desc">This composition captures the emotional conflict of relief versus dread. The chosen palette of soft sky, pale mint, storm gray, faded gold, and near black reflects cool and heavy tones, indicating the tension between light and dark. The contrast emerges as the bright accents of pale mint and soft sky clash against the deep storm gray and near black, creating visual friction. The checker pattern symbolizes relief while the channel pattern represents dread, overlapped in a chaotic, counterclockwise flow. The broken edges introduce imperfections, enhancing the feeling of tension and release across the canvas.</desc>
