<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in a Spiral</title>
  <desc id="desc">The emotional tone reflects a dynamic struggle between defiance and submission, symbolized by contrasting patterns of patchwork and dots. The palette, featuring moss green and rust, echoes resilience and fragility. A dense saturation in the top left corner creates visual pressure, while the rest of the grid disperses outward, embodying the idea of submission. The main collision occurs in the top left, signifying a confrontation between the strong, angular defiance and the soft, dot-based submission, aligned with the spiral flow from the center to the edges. This generates a narrative of tension and release through color and placement.</desc>
