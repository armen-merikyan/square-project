<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This composition embodies the emotional tension between vulnerability and strength. The palette of 'intimacy_distance' is chosen to elicit feelings of warmth and distance, balancing the soft vulnerability of rose clay and distant lilac with the strength of cool blue and lamp gold. The main contrast occurs in the transition from the dense top left area (strength) to the breakout of softer hues (vulnerability) moving toward the opposite corner. Shapes of flame and braid collide organically, creating textured interruptions that represent the emotional push and pull inherent in these themes.</desc>
