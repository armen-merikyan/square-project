  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork embodies the emotional tension between emptiness and desire. The palette features vibrant colors like hot coral and blood orange, symbolizing desire, set against muted tones of charcoal and hollow blue representing emptiness. The collision occurs centrally, where striped patterns of desire clash with a tide-like background of empty space, amplifying the contrast between pull and restraint. The layout undermines order, suggesting a pattern of broken marks led by desire's vibrant reach while cut edges signify moments of interruption.</desc>
