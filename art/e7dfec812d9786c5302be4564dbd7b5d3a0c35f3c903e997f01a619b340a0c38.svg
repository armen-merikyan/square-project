<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Flicker and Fade</title>
  <desc id="desc">This composition conveys the tension between the bright spark of life and the lingering ash of what remains. The palette combines electric blue and lime as vibrant, energetic contrasts, while black serves as a deep field that reinforces the sense of hunger and restraint. The pattern mixes the jagged, angular force of 'stairs' representing spark with the smooth, circularity of 'ring' capturing ash, allowing them to collide at the borders of the composition, creating a dynamic interplay. The broken pixels introduce intentional disruptions, symbolizing resilience amidst fragility. With a dominant quiet space juxtaposed against bursts of color, the piece embodies a push-pull rhythm, a visual dialogue reflecting memory and erasure.</desc>
