<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Shadows</title>
  <desc id="desc">The emotional tone of this artwork captures the tension between desire and restraint, reflecting the push and pull of longing and limitation. The palette features deep hues like red_oxide and blackened_plum representing desire, while muted_cream and iron_gray embody restraint. The main contrast occurs in the center where saturated, irregular markings collide with the stable stripes of cooler shades, highlighting the tension. The layout, inspired by a halo void, accentuates this conflict by leaving negative space that echoes both presence and absence, reinforcing the idea of longing being both expansive and confined.</desc>
