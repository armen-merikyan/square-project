<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eroded Symmetry</title>
  <desc id="desc">This composition captures the emotional interplay between vulnerability and strength through contrasting dark and light colors. The muted palette of off-white and dust gray evokes a sense of exposure, while the deeper tones of compressed red and dark navy evoke strength and resilience. The patchwork and ring patterns collide in the center, creating an intense focal point that contrasts with the eroded edges, illustrating a core of strength surrounded by the vulnerabilities of its environment. The broken pixels intentionally disrupt the symmetry, reflecting imperfections and the narrative of connection versus alienation.</desc>
