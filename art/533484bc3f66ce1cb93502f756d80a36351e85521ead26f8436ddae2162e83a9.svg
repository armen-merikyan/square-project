<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">The emotional tone reflects the duality of joy and grief, expressed through sharp contrasts in color. The palette transitions from warm yellows and oranges representing joy to muted purples and deep blues symbolizing grief. The left side has a maze-like arrangement symbolizing joy's chaotic expansion, while the right side features stripes that suggest grief's heaviness and order. The collision occurs where these patterns meet, representing the struggle between lightness and darkness. Broken pixels add a layer of imperfection, embodying the complexity of emotions.</desc>
