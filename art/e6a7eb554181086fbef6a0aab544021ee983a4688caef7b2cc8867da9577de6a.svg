<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork captures the tension between defiance and submission through a dynamic arrangement of colors. The palette of mourning_black, deep_blue, and pale_yellow reflects the emotional duality at play—black representing resistance and chaos, while pale yellow embodies submission and softness. The central area is active, with pulse-like yellow dots clashing against a backdrop of darker surroundings, creating a vibrant collision where submission meets defiance. The edges feature a muted tone to symbolize the quiet channel that surrounds the chaos, and the broken pixels introduce a sense of imperfection and disruption, reinforcing the emotional struggle of the piece. The use of negative space enhances the overall composition, allowing the eye to rest and reflect on the tension present in the grid, embracing both the hard interruptions and softer collapses inherent in this emotional dance.</desc>
