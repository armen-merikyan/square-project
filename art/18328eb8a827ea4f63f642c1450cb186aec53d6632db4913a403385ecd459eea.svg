<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonance of Yearning</title>
  <desc id="desc">This piece captures the emotional tension between desire and emptiness. The palette features warm, saturated colors like hot coral and blood orange to represent desire, clashing against the muted tones of dust pink and charcoal symbolizing emptiness. The interplay between static and ring patterns creates a dynamic flow, where the center bursts with heat and saturation while the corners evoke a sense of constraint and hollowness. The incorporation of broken pixels disrupts the symmetry, adding a layer of imperfection that resonates with the theme of restrained overflow.</desc>
