<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">This composition captures the emotional dichotomy of envy and gratitude, represented through vibrant contrasts and structured chaos. The palette shifts from deep blacks to vivid electric blues and magentas, symbolizing the intensity of envy, while the warmer lime suggests the softness of gratitude. The split layout forces a contrast between the dense, maze-like structure of the top half and the flame-like flow of the bottom, reflecting a movement from chaos to warmth. The broken pixels introduce an imperfection that speaks to the complexity of human emotion, signifying moments of interruption and reflection. The central shape seed, a tiny plus, symbolizes a point of focus amidst the chaotic flow, emphasizing the struggle between being centered and off-center, and the push-pull of these contrasting emotions.</desc>
