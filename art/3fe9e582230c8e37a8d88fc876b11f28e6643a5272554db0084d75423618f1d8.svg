<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between the Flames and Light</title>
  <desc id="desc">The emotional tone oscillates between the heaviness of grief and the brightness of joy. The chosen palette of warm yellows and deep blues represents this duality, where the warm colors (yellow, orange) embody joy, while the cool shades (deep blue, muted purple) evoke feelings of grief. This contrast is highlighted in a zigzag pattern that creates a sense of turmoil and motion, symbolizing the internal struggle. The central square employs a radial joy pattern, surrounded by warmer hues clashing against deeper, burnt edges reflecting the chaos of these emotions. Negative space is employed to signify moments of stillness against the background noise of emotion.</desc>
