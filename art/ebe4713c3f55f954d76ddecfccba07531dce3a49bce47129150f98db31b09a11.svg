<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Layers</title>
  <desc id="desc">The emotional tone is a juxtaposition of vulnerability and strength, represented through the use of a palette with vivid lime and electric blue highlights against deep, grounding blacks and subtle magenta tones. The arrangement creates a thick center, symbolizing strength, contrasted by softer, broken pixel areas that suggest vulnerability near the edges. The collision occurs in the middle bands, echoing the idea of shelter versus exposure, with the light colors peeking through darker frames. This reflects the seed's qualities of contrasting exposure against the need for safety, creating a spiraling tension that draws the viewer’s eye throughout the piece.</desc>
