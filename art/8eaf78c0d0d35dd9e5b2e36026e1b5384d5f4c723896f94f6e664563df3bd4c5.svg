<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Light and Shadow</title>
  <desc id="desc">This artwork embodies the emotional contrast between softness and severity, using a palette of powder pink, warm white, and sharp crimson against dark carbon black and steel gray. The central collision occurs in the upper left quadrant, where soft colors spiral away from an intense black mass, symbolizing the ongoing struggle between light and darkness. The ash field and stripes create a dynamic rhythm where bright accents punctuate the dark backdrop, reflecting the pulse of forgiveness amidst guilt. The deliberate use of broken pixels adds an imperfect, raw edge, enhancing the emotions tied to conflict and resolution.</desc>
