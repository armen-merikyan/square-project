<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This piece explores the emotional tension between envy and gratitude. The chosen palette of burnt orange, dark red, charcoal, and gold reflects warmth and ancient fire, symbolizing deep emotions that flicker within. The contrast between dark and bright pixels creates a rhythm of unresolved feeling—soft edges envelop harsh noise, suggesting the layers of pressure and release within an empty room. The collision between clusters of color represents the yearning tension while maintaining negative space to evoke the subdued nature of gratitude. The pattern arises from the conflict of soft against jagged edges, resonating with the emotional swirl of these concepts.</desc>
