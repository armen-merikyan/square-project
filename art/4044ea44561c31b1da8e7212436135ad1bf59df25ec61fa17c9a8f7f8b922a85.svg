<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Want</title>
  <desc id="desc">The emotional tone of this piece oscillates between deep longing and restrained absence, reflected in the use of strong contrast between the vibrant coral and orange against the subdued blues and grays. The palette was selected to embody desire with warm saturation while addressing emptiness through cooler, quieter tones. The main contrast lies centrally where vibrant colors interrupt a lattice of subdued hues, symbolizing the push and pull of longing within the structured yet disrupted framework, creating a sense of tension and release around the frame edges. The strong presence of broken pixels introduces intentional imperfections, mimicking the theme of contained overflow and fractured ambition.</desc>
