<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This artwork channels the emotional clash between rage and calm through contrasting colors and patterns. The calming pale blue and white serve as a serene backdrop, against which explosive, fragmented patterns of red and black assert dominance, particularly in the center. Here, the vibrant colors create visual tension, representing the struggle between chaotic energy and tranquil space. The placement of broken pixels interspersed with the orderly calm pattern evokes an unsettling yet captivating dynamic, prompting a conversation on the contrasts between overwhelming emotion and quietude. This juxtaposition, along with a hollow center framed by both cool and hot tones, conveys a rich narrative of conflict and harmony.</desc>
