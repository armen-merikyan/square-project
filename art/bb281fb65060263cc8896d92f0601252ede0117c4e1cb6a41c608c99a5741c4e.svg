<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure Shield</title>
  <desc id="desc">This composition embodies the emotional tension between safety and exposure through a thoughtful use of color and contrasting patterns. The palette blends warm brown and shelter green, symbolizing protection, with cold white and open blue to evoke feelings of vulnerability. The dominant broken dots represent safety, creating a soft, warm barrier in the upper half, while the stripes in the lower half signify exposure, conveying a sense of openness and constant risk. The split vertical layout emphasizes the dichotomy, while the interplay between the patterns allows for a dynamic conversation between protection and vulnerability, mirroring the push and pull of these emotions. The presence of broken pixels adds an element of imperfection, suggesting fragility and the unpredictability of safety.</desc>
