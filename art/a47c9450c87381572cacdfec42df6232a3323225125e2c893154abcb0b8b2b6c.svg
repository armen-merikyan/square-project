<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Equilibrium</title>
  <desc id="desc">This work captures the emotional tension between panic and control through a chaotic center surrounded by structured order. The palette of yellow and deep blue evokes feelings of joy and grief, emphasizing duality. The jagged edges contrast with the typically smooth appearance of a flame, suggesting brokenness. The central spark of orange represents a moment of chaos amidst control, while the surrounding muted hues contrast intense emotion, creating a visual narrative of struggle and balance.</desc>
