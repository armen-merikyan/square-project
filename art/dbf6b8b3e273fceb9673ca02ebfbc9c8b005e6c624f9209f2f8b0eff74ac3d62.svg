<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This abstract artwork captures the emotional tension between certainty and curiosity, embodied in a visual flow that moves upward on one side while echoing downward on the other. The palette of cosmic indigo and star white creates a stark contrast against void black and deep teal, emphasizing the collision between order and chaos. The top rows, dominated by solid blocks of color, suggest certainty, while the bottom rows introduce uneven patterns with small openings, reflecting curiosity. The intentional placement of broken pixels introduces imperfection, reinforcing the tension between control and unresolved motion.</desc>
