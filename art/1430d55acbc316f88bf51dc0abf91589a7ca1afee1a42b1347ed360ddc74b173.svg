<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Strata</title>
  <desc id="desc">The piece evokes a tension between 'longing' and 'resolve' through a palette that balances warm and cool tones. Shadows of dark navy and compressed red create a sense of deep, rich emotion, while the soft hints of faint peach and off-white introduce moments of clarity and hope. The dominant dark navy suggests a longing, contrasted by the firm structures represented by the lattice and thread patterns that signify resolve. The collision occurs centrally, where proximity and distance between colors suggest an emotional pull, reinforcing the continuous narrative of desire versus determination with a 'stacked bands' layout allowing for an ebb and flow of emotional density.</desc>
