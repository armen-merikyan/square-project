<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">The emotional tone contrasts restlessness and peace, vibrantly displayed through dense clusters of color in the corners meant to embody pressure, likened to a flame, while gentle shades at the center radiate tranquility. The palette uses warm hues like rose clay and lamp gold to symbolize comfort, contrasted by cooler shades of distant lilac and cool blue that evoke the distance of unresolved restlessness. The main collision occurs diagonally, with dark and light colors meeting, creating a visual echo of tension that ultimately hints at a seamless blend toward resolution. Broken pixels intentionally disrupt symmetry, introducing a sense of imperfection that resonates with the theme of memory against motion.</desc>
