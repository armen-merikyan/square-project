<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Climb of Emotion</title>
  <desc id="desc">This artwork captures the tension between longing and resolve using a palette that contrasts deep emotional depths with a halo of calm. The cosmic indigo and deep teal represent longing, evoking a sense of distant warmth and expansive hope. The use of cold gold and star white reflects resolve, bringing a compressed strength that embodies resilience. The diagonal rise of colors creates a narrative of tension and release, with clusters of cold gold intersecting with quiet fields of black and teal, ensuring the eye travels upward, symbolizing hope amidst chaos. Broken pixels interrupt patterns, hinting at imperfections in the emotional journey, in line with the seed's themes of cross-current and fault lines.</desc>
