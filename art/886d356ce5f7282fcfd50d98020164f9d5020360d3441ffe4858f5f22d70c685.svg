<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Frequencies</title>
  <desc id="desc">This composition captures the struggle between clarity (signal green and electric blue) and confusion (static gray and hot magenta). The palette reflects the push and pull of an active pulse navigating through layers of noise, with a predominantly dark background representing interference. The main contrast occurs in the center, where the structured ladder pattern (representing clarity) collides with the chaotic teeth pattern of noise. This spatial arrangement embodies the emotion of disruption, showcasing how moments of clarity can pierce through overwhelming noise.</desc>
