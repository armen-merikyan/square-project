<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">The emotional tone is reflected in the push and pull between the saturated warmth of desire and the muted coolness of emptiness. The palette, featuring hot coral, blood orange, and dust pink, evokes desire, while charcoal and hollow blue embody the sense of emptiness. The main contrast occurs at the center, where warm colors collide with negative space and cooler notes, creating a dynamic tension. The layout reflects a mirrored effect with intentional disruption through broken pixels, suggesting an imbalance. This arrangement symbolizes how the urge to overflow is contained at the edges, conveying a rich story of emotional complexity.</desc>
