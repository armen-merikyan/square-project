<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilient Collisions</title>
  <desc id="desc">This artwork captures the emotional tension between vulnerability and strength. The chosen palette of warm coral and cold slate creates a dynamic contrast that represents the duality of safety and exposure. The strong center, composed of solid dark colors, is interrupted by lighter accents, representing the unshielded light of vulnerability. The circular and split-screen patterns visually collide in the middle, serving as a metaphor for protection versus invasion. Broken pixels add intentional flaws, suggesting imperfection through life’s experiences, while the closed corners frame the chaos, revealing both the solid ground and the wavering edges that come with emotional exposure.</desc>
