<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory in Motion</title>
  <desc id="desc">The emotional tone captures the contrast between tenderness and rage, using a palette that embodies the interplay of muted blues and striking reds. The main collision manifests in the center of the grid with the jagged red fragments abruptly interrupting the soft blue fields, creating a sense of heated tension within a tranquil space. This reflects the dynamic described in the seed where softer emotions grapple with more turbulent ones, suggesting an inner dialogue. The style embraces an uneven edge theme, representing the chaos of conflicting feelings, while maintaining some negative space to symbolize introspection and quietness amidst the turmoil.</desc>
