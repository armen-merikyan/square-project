  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork captures the emotional tension between vulnerability and strength, employing a palette that balances deep teal, cosmic indigo, and cold gold. The core is a lighter field representing the exposed center, while dark borders surround it, suggesting both protection and confinement. The overlap of the mirror and braid patterns creates a dynamic rhythm that conveys an inner struggle; the center captures quiet vulnerability whereas the edges symbolize shelter, embodying the theme of conflict between exposure and safety.</desc>
