<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Echoes</title>
  <desc id="desc">This artwork translates the emotional tension between trust and suspicion through a color palette that juxtaposes warm and cool tones. The main colors, a soft powder pink and stark carbon black, represent the duality of warmth (trust) and severity (suspicion). The layout creates a pressure corner where the dark colors dominate, creating a sense of weight and distance while the light colors attempt to break through, suggesting resilience against fragmentation. The arrangement of colors flows from the corner to the center, symbolizing how trust can emerge from the depths of suspicion; irregular patterns of glitch and tide are used to illustrate the chaotic signals of noise. A few broken pixels add intentional disruption, reflecting emotional scars from the past, tying back to the seed's themes of resilience and fragility.</desc>
