<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resilience</title>
  <desc id="desc">The emotional tone is one of tension between light and shadow, capturing the struggle between spark (vibrant, lively moments) and ash (quiet, fading memories). The palette chosen reflects this duality—deep navy and black signify the weight of restraint, while the single white brings in that spark of life. Dim cyan acts as a quiet field, contrasting with the jagged edges of the central saturated area, suggesting collision and interruptions in memory. The composition promotes a dense center with color dynamics flowing outward, mirroring energy and exhaustion battling at the core.</desc>
