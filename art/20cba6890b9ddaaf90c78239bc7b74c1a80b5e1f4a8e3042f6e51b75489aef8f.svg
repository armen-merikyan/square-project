<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Repair vs Damage</title>
  <desc id="desc">The artwork encapsulates the emotional tension between 'spark' and 'ash,' utilizing a palette that emphasizes contrasts between warmth and coolness. Dark hues symbolize restraint, while bright accents signify moments of brilliance and vitality. The diagonal arrangement creates a visual flow that suggests conflict and resolution, embodying the concept of collision—the bright elements occasionally interrupt the dark fields, reflecting memory and erasure. The patterns—'target' and 'stepwell'—collide visually, evoking a sense of disruption yet cohesion. Broken pixels serve as moments of imperfection, creating a narrative of resilience amid fragility.</desc>
