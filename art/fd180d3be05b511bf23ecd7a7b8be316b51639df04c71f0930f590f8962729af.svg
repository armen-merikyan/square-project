<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This piece encapsulates the tension between loneliness and connection through a stark contrast of colors and patterns. The palette of pink, dark maroon, gray, and red represents both warmth and sorrow—evoking feelings associated with love and betrayal. The left-weighted composition and the use of stripes on the left symbolize isolation, while a sparse crosshatch pattern on the right signals a flicker of connection. Notable interruptions in the pattern add a sense of broken memory, emphasizing both absence and presence. The overall structure is intentionally unbalanced, inviting viewers to explore the emotional depth of loneliness amidst a yearning for connection.</desc>
