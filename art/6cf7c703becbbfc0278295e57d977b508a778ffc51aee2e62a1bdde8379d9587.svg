<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Inward Growth</title>
  <desc id="desc">The emotional tone reflects a struggle between defiance and submission, portrayed through a dense center and fading edges. The palette, 'mourning_renewal,' combines deep blue and pale yellow to convey conflict and resolution. The collision occurs at the center, filled with radial patterns of strong colors, while the edges, influenced by the braid pattern, are softer and lower in contrast. This interplay embodies the essence of the seed, creating a dynamic visual story of pressure and release.</desc>
