<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Resistance</title>
  <desc id="desc">The emotional tone here juxtaposes defiance and submission, embodied by the contrasting patterns of rigid rings symbolizing resistance against turbulent flames representing surrender. The palette of pink, dark maroon, red, and gray exemplifies the heat of conflict and the coolness of repression. The main collision occurs in the center, where the dark maroon rings strain against soft pink flames, creating a sense of tension and unresolved motion. The arrangement has a narrow path of gray negative space piercing through the dense color fields, enhancing the sense of struggle and imbalance, while broken pixels add an intentional disruption reflecting the scars of conflict.</desc>
