<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Boundless Yearning</title>
  <desc id="desc">This composition embodies the emotional tension between desire and restraint. The contrasting colors symbolize the struggle between saturated pulses of warmth and muted, contained edges. The color palette reflects 'hunger_restraint', conveying vibrancy with reds and oranges against the muted tones of blackened plum and iron gray, showcasing both overflow and containment. The main collision occurs in the center, where bright colors burst forth, juxtaposed against the darker, cooler hues that attempt to keep them in check. This duality creates a dynamic visual rhythm that speaks to themes of love and betrayal through the swirling patterns and borders.</desc>
