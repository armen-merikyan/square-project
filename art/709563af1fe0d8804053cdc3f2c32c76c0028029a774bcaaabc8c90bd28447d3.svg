<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Memory in Motion</title>
  <desc id="desc">The emotional tone portrays the tension between fleeting sparks of vitality and the settling calm of ash. The palette incorporates ripe green and honey gold as vibrant accents, while deep olive and cream ground the piece, embodying resilience amidst fragility. The main collision occurs diagonally, where the bright colors of 'spark' clash with darker, muted hues of 'ash', interrupted by intentional flaws to suggest imperfections in memory and time. This creates a wave-like flow that resonates with the idea of ebb and flow, a theme derived from the seed's complex contrasts.</desc>
