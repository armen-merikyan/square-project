<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension at the Threshold</title>
  <desc id="desc">The emotional tone captures the struggle between restlessness and peace, using a palette that expresses awe and terror. The presence of cosmic indigo and void black symbolizes the depth of unrest, while star white and cold gold provide brief moments of quiet radiance. The layout emphasizes a diagonal flow that creates tension along the edge, where chaotic patterns of rain (representing restlessness) collide with structured sparks (emblematic of peace). This interaction manifests as a pattern of conflicting colors and shapes, illustrating a constant push and pull between chaos and calm.</desc>
