<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Release</title>
  <desc id="desc">This artwork encapsulates the emotional tension between pressure and quiet through a dynamic interplay of color and pattern. The palette, featuring off-white, dust gray, compressed red, dark navy, and faint peach, creates a soft backdrop contrasted by sharper edges. The top-left corner holds dense, weighted clusters that dissolve into lighter, quiet areas towards the bottom right, symbolizing a release from pressure. The lattice and fault line patterns visually disrupt the symmetry, echoing the themes of shattering against the tide and the complexity of quiet and pressure.</desc>
