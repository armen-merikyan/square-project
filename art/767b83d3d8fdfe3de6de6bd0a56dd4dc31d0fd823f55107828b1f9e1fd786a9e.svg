  <title id="title">Collision of Tensions</title>
  <desc id="desc">The emotional tone conveys a dynamic struggle between softness and severity, illustrated through contrasting colors. The palette of warm white and sharp crimson represents warmth battling against the underlying darkness of carbon black and steel gray. Main collisions are found in the center, where harsh colors disrupt soft islands, echoing the emotional push and pull described in the seed. Through this arrangement, the artwork reflects both guilt and forgiveness, with dashes of color symbolizing tiny moments of clarity amidst pressure.</desc>
