<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Control and Chaos</title>
  <desc id="desc">This artwork explores the emotional dichotomy between panic and control through an interplay of dark and light colors. The selected palette blends ominous black and dark violet, symbolizing panic, with soft gold and pale green representing control and hope. The arrangement of colors creates a radial pattern emanating from the center, interrupted by jagged elements that suggest chaos. The collision of the dark edges against the lighter center emphasizes the push and pull of emotion, while the occasional 'broken pixels' add to the urgency and unpredictability of the panic theme. Overall, this piece captures an abstract representation of emotional pressure and release, reflecting the struggle between chaotic forces and the desire for control.</desc>
