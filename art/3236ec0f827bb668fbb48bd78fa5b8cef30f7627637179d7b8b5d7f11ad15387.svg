<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">The emotional tone reflects a struggle between defiance and submission, represented by strong color contrasts. The earthy hues of the palette carry a serene yet urgent weight, where deeper colors dominate to evoke defiance. The jagged edges and spiraling patterns suggest tension as they interrupt and collide within the central space, illustrating the struggle against soft collapse. The dense pixel arrangements at the edges signify a protective barrier, contrasting with the quieter center, demonstrating a balance between chaos and calm.</desc>
