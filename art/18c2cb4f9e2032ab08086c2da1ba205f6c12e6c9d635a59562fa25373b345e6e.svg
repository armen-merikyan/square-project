<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Signal</title>
  <desc id="desc">This composition plays on the emotional contrast between clarity and chaos, with dominant navy representing the clear signal battling the scattered static of dim cyan and black. The edges appear burned, signifying the struggle and imperfections in memory versus erasure. The center pulses with a checker pattern, interrupted by stair-like noise that disrupts and challenges the flow—from dark to light, suggesting an ongoing tension between presence and absence.</desc>
