<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Caught in Tension</title>
  <desc id="desc">This piece captures the emotional contrast of defiance and submission through its palette of dark navy, black, and hints of dim cyan, suggesting weight and depth. The left side is dominated by dark colors representing defiance, while the right, with its slight lightness, symbolizes submission. The composition employs asymmetry and broken edges to create interruptions, echoing feelings of tension and imbalance, as well as the complexity of love and betrayal. The falling pixels effect represents a collapse, while the split layout allows both emotions to coexist without resolution, highlighting their interplay.</desc>
