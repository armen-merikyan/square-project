<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Tension</title>
  <desc id="desc">This piece explores the emotional duality of vulnerability and strength through contrasting colors and patterns. The chosen palette reflects mourning and renewal, juxtaposing deep blues and blacks with vibrant pale yellows, symbolizing resilience and fragility. The central area features a lighter tone resembling an exposed vulnerability, flanked by dark shades representing strength. The collision happens where pale accents break through the darker bands, suggesting a rise in strength from a space of exposure. The scattered repair layout embodies a path of emotional healing with the strategically placed broken pixels initiating imperfection while allowing for light to seep through. The composition draws the viewer's eye inward, embodying an exploration of tenderness against a backdrop of hard edges, leaving enough negative space for contemplation.</desc>
