<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow and Containment</title>
  <desc id="desc">This artwork embodies the emotional tension between rage and calm, using the palette of red, black, pale blue, and white. The structure reveals a dominant black core that symbolizes calm contained under pressure, with bursts of red radiating outward, signifying the overwhelming force of rage. The central area creates a collision where the harsh lines of red jagged patterns disrupt the serene pale blue and white stepwell patterns surrounding it, echoing the chaotic back-and-forth between inner turmoil and outer tranquility. This tension captures the essence of eroded symmetry and the zigzag pattern present in the seed, allowing for a rich emotional story without literal representation.</desc>
