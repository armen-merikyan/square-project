<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Patterns</title>
  <desc id="desc">This composition embodies the emotional duality of rage and calm through its color choices and layout. The palette of deep reds emerges in the top rows, symbolizing sharp, intense feelings, while softer blues dominate the bottom, representing tranquility. The sharp contrast between the jagged patterns of the red pixels and the soft radial waves of the blue creates a powerful collision at the horizontal center, echoing the struggle between containment and overflow. The horizontal split layout captures the tension visibly, while broken pixels introduce a sense of imperfection that mirrors the emotional narrative implied by the seed.</desc>
