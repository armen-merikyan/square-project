<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Split Harmony</title>
  <desc id="desc">The composition explores the emotional tension between love and betrayal through warm pinks and deep reds juxtaposed against cooler grays and dark maroons. The left side (love) employs a pattern of framed warmth, while the right side (betrayal) features a sharper, target-style arrangement, symbolizing corruption in symmetry. The broken pixels evoke feelings of imperfection and disruption, enhancing the mood. The overall balance of colors and patterns embodies the interrupted echoes of these conflicting emotions, providing a narrative of presence and absence.</desc>
