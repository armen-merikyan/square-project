<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Cross Currents of Emotion</title>
  <desc id="desc">The piece captures the duality of certainty and curiosity through contrasting structured order with chaotic interruptions. The palette reflects warmth from orange and yellow against the cool depth of muted purple and deep blue, suggesting a push-and-pull dynamic. The main collision occurs at the center, where the structured horizontal flow meets abrupt vertical disruptions, creating a tension that embodies the emotional conflict of the seed. This piece invites the viewer to navigate between the solid form of certainty and the unpredictable movement of curiosity, mirroring the sensations of rising signals against receding edges.</desc>
