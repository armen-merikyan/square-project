<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order and Chaos</title>
  <desc id="desc">This piece embodies the emotional tension between 'spark' and 'ash', representing sudden bursts of energy colliding with remnants of restraint. The palette of 'relief_dread' features muted gray tones of 'storm_gray' and accents of 'faded_gold', illustrating the push and pull of energy versus decay. The primary contrast occurs centrally, with sharp diagonals from the bright 'near_black' interrupting soft gradients of pale and faded tones, echoing fragments of memory within the drama of a falling pixel layout.</desc>
