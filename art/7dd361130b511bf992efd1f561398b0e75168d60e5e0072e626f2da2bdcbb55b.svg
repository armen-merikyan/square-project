<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Balance</title>
  <desc id="desc">This composition embodies the emotional contrast between quietude and pressure. The chosen palette of muted off whites, faint peach, and dark navy represents a deep, soft calm juxtaposed against the intensity of compressed reds and gray. The diagonal layout allows for a pressure accumulation in the top left while the bottom right breathes with quiet spaces. Broken pixels create subtle imperfection, heightening the feeling of tension and release, as colors collide yet maintain a vibrant dialogue, representing an interruption in flow and a shatter against continuity.</desc>
