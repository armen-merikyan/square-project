<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">The emotional tone explores the juxtaposition between trust (represented by warm hues) and suspicion (reflected in cooler, muted shades). The palette balances vibrant yellow and deep blue, creating a cycle of intensity and somberness. The outer border, following a jagged edge style, embodies suspicion, while the inner crosshatch evokes trust. The placement of darker colors against lighter ones creates a visual collision, symbolizing the dynamic tension of emotional states. The structured flow into the center fosters a feeling of inevitable release, where chaos meets order in an abstract vibration that resonates with the seed's essence.</desc>
