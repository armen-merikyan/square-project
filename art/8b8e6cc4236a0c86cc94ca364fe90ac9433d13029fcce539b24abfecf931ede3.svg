<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Balance</title>
  <desc id="desc">The emotional tone is captured between the chaos of panic and the steadiness of control. The chosen palette of muted sepia tones mixed with hints of faded blue conveys nostalgia and disarray, embodying the struggle between order and chaos. The pattern reflects this duality through a grid on the left representing control and a crosshatch on the right expressing panic, disrupted by broken pixels that introduce intentional imperfections. The main collision occurs where these two patterns overlap, creating a visual tension that speaks to the uncertainty of emotions, akin to joy colliding with grief. The negative space maintains balance, allowing for moments of quiet amidst the chaotic interplay of colors.</desc>
