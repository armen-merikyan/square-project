<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This artwork explores the emotional tensions of envy and gratitude through contrasting elements. The palette is chosen from 'fear_hope', with black and dark violet representing the weight of envy, while soft gold and pale green symbolize the lightness of gratitude. The layout, resembling falling pixels, mimics the dual nature of emotions cascading in and out of focus, creating an overlapping pattern of organized chaos on the left and fragmented error on the right. The main contrast occurs between the structured dots of gratitude on one half and the noise of envy represented by smudged textures, highlighting the collision between calm gratitude and tumultuous envy. The inclusion of broken pixels disrupts the order, reinforcing the theme of emotional disturbance and fragmentation in our perceptions.</desc>
