<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Motions</title>
  <desc id="desc">The emotional tone depicts the struggle between defiance and submission, creating a visual narrative of tension and release. The palette, featuring bold shades of carbon black and sharp crimson against soft colors of powder pink and warm white, emphasizes the collision of strong emotions. The main contrast occurs diagonally across the square, representing the upward push of defiance against the subdued backdrop of submission, where pixels are intentionally broken to convey disruption. This captures the essence of 'quiet channel' through a mixture of sharp and soft, embodying both chaos and order.</desc>
