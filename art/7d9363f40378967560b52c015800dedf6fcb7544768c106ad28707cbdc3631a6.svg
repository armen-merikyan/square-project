  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone balances a warm yearning against a stark, cool emptiness. The palette contrasts blood orange and hot coral colors representing desire with charcoal and hollow blue depicting the sensation of emptiness. The pattern features a checker for desire clashing against a hinge for emptiness, with an off-center collision at the main body where desire fights against the containment represented by the edges, suggesting both pressure and release.</desc>
