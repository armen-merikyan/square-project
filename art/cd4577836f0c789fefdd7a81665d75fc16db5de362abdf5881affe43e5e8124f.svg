<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Dissonance of Light</title>
  <desc id="desc">This artwork embodies the emotional contrast between dread and relief. The palette blends dark tones of near black and storm gray with accents of faded gold and soft sky, capturing the essence of pressure yielding to release. The main collision occurs in the top left corner, where dense, chaotic patches of gray give way to a looser arrangement of lighter colors towards the bottom right, illustrating a transition from tension to liberation. The inclusion of broken pixels adds depth, representing scars of memory and experience amid the chaos. This visual layout aligns with the themes of the seed, evoking a feeling of encroaching shadows breaking into light.</desc>
