<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This piece encapsulates the emotional duel of love and betrayal through contrasting colors and placements. The chosen palette of pink, red, gray, and dark maroon vividly frames the warmth of love against the cold chill of betrayal. The layout mirrors subtly, suggesting an 'inside vs outside' tension with disrupted symmetry to represent broken connections. High contrast emerges in sharp, dark edges interplaying with soft, muted tones, echoing the emotional conflict. The pixel placements create a pulse of energy and static within the perceived quiet spaces, symbolizing loneliness and communication breakdown.</desc>
