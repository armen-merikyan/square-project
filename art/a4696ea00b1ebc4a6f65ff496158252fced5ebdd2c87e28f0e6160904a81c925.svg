<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Confrontation</title>
  <desc id="desc">This artwork conveys the emotional collisions of pride and shame, using a palette of dim cyan and black to emphasize the duality of these feelings. The choice of a dark color base signifies deep emotional pressure, while the pops of light colors suggest fleeting moments of clarity and relief. The patterns of 'crosshatch' (representing pride) and 'teeth' (for shame) create visual tension: textured clashes where one overwhelms the other. The placement reflects the 'corner invasion' layout, beginning with intense colors in one corner and spreading diagonally, allowing for a dynamic flow that echoes the complexity of the emotional experience.</desc>
