<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition embodies the tension between emptiness and desire. The use of 'hot coral' and 'blood orange' as dominant colors represents a saturated pull of human desire, while 'hollow blue' creates a vast, empty space that evokes a sense of restraint. The spiral layout suggests movement, with juxtaposed mirror and halo patterns that create audible tension. The broken pixel elements add imperfections, representing interruptions in the flow of desire, while the edges are defined to suggest containment. The overall emotional palette reflects a struggle between reach and refusal, encapsulating a spiraling emotional trajectory where desires peak but are ultimately contained.</desc>
