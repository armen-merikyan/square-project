<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Amidst Static</title>
  <desc id="desc">This composition captures the tension between 'signal' and 'noise', using a palette dominated by deep colors that align with the emotional tones of loneliness and interference. The main contrast occurs horizontally across the canvas, where the structured signal (dim cyan) clashes with chaotic patterns of dark shades (black and navy), suggesting a battle of clarity against confusion. The use of broken pixels adds intentionality, replicating disruptions that emphasize the emotional scars of communication. The ash field pattern suggests a quiet rhythm, while the crosshatch evokes disharmony, symbolizing the underlying narrative of a pulse trying to thrive in a sea of noise.</desc>
