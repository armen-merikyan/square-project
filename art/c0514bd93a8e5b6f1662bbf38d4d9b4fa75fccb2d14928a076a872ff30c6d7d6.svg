<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Echoes</title>
  <desc id="desc">This composition captures the tension between emptiness and desire through a deliberate play of warm and cool tones framed by broken edges. Using a palette of burnt orange, dark red, charcoal, and gold, a stark contrast emerges in the upper left against a cooler tone in the lower right, embodying a rising signal that underscores the emotional duality. The mirror-broken layout introduces intentional imperfections, where moments of warmth unexpectedly penetrate the cooler sections, representing bursts of desire interrupted by feelings of emptiness. The brush of broken pixels adds an element of distortion, enhancing the uneasy dance between calmness and pressure across the grid.</desc>
