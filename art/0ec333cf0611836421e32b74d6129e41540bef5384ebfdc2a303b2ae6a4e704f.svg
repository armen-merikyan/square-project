<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Motion</title>
  <desc id="desc">The emotional tone captures the struggle between desire and emptiness, reflected in the dynamic color interplay. The chosen palette, ranging from the vibrant heat of hot coral and blood orange to the calmer notes of dust pink and charcoal, creates a visual tension. The contrast is designed to erupt at the center, where vibrant colors pool against a backdrop of hollowness, symbolizing unfulfilled desire against constraint. The layout suggests an upward motion, with colors climbing out of the black void, giving an impression of hope thwarted by boundaries. Broken pixels introduce intentional imperfection, mimicking the scars of desire and the chaos of containment.</desc>
