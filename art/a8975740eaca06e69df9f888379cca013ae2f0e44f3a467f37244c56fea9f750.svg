<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Shadows and Light</title>
  <desc id="desc">This piece embodies the emotional dichotomy of fear versus hope, capturing the tension between dark, jagged elements and bright, structured forms. The chosen palette features dark violet and soft gold, representing fear and hope respectively. The left side employs a flame pattern, illustrating chaotic energy, while the right side utilizes a grid to symbolize stability and rising aspiration. The sharp edges on the left contrast starkly with the gentle curves on the right, enhancing the feeling of collision between confinement and liberation. The central empty spaces act as negative space, representing the potential for hope amidst fear.</desc>
