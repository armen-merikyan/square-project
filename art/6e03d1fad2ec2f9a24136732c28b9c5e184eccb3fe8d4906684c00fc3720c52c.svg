<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Desire and Restraint</title>
  <desc id="desc">This composition embodies the conflict between desire and restraint through color contrasts and patterns. The palette is rooted in intensive warmth (hot coral, blood orange) against cool muted tones (charcoal, hollow blue), accentuating the tension of emotions. The layout echoes scattered repair, where vibrant colors push against a boundary set by darker, more restrained hues. The central collision occurs with a dense cluster of warmer colors on the upper half, projecting brightness, while cooler tones encapsulate the lower half to represent restraint. The use of broken pixels introduces intentional disruptions, embodying the struggle within the emotions expressed.</desc>
