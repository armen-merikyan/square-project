<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Balance</title>
  <desc id="desc">The emotional tone captures the tension between the chaos of panic and the structure of control. I chose a palette of burnt orange and dark red to evoke urgency and depth, contrasting sharply with charcoal and gold. The main collision occurs at the center of the square, where radial patterns of control in gold are disrupted by striated panic in red and orange. This dynamic layout reflects a shift from outer chaos inward, punctuating moments of pressure with softer edges, mirroring the struggle of maintaining control against overwhelming feelings.</desc>
