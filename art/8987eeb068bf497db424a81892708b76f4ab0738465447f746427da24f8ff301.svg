<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Opposing Currents</title>
  <desc id="desc">This piece embodies the emotional dichotomy represented by yearning for connection against the stabilizing force of resolve. The palette of moss green, bone white, rust, stone gray, and small gold conveys fragility and resilience. The collision occurs centrally, with a lattice texture suggesting longing, contrasted against a dense split-screen layout indicating resolve. The use of broken pixels creates intentional disruptions, reinforcing the themes of repair and damage. Negative space allows the emotions to breathe, emphasizing the tension between containment and overflow.</desc>
