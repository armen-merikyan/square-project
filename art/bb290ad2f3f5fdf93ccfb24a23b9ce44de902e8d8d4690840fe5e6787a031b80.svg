<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signals Amidst the Noise</title>
  <desc id="desc">This artwork embodies the emotional tension between clarity and interference. The chosen palette of deep navy, black, and dim cyan represents both the quiet field of calm and the chaos of noise. The grid is punctuated by brighter pixels that symbolize moments of clear signal, while the darker tones echo static and disruption. The main collision occurs in the center, where the signal tries to assert itself against the surrounding noise, representing a struggle for clarity within chaos. The broken pixels create a sense of imperfection, suggesting memories or interruptions that shape our perception.</desc>
