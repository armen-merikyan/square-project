<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This piece explores the emotional tension between safety and exposure. The use of a soft, muted palette of 'shelter green', 'warm brown', and 'pale skin' juxtaposed with 'cold white' and 'open blue' illustrates the duality of these feelings. The predominant color is a calming shelter green that embodies protection, while sporadic bursts of warmer tones represent exposure and emotional risk. Main collisions occur at the center and along the right edge, where dappled dot patterns of exposure sharply contrast against the gentle ash field texture of safety, inviting thought on balance and vulnerability in our experiences. The broken pixel placements create intentional imperfections, symbolizing how our protective layers are often not absolute, allowing glimpses into deeper, unguarded spaces.</desc>
