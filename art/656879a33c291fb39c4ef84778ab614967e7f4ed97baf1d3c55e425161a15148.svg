  <title id="title">Chaotic Balance</title>
  <desc id="desc">The emotional tone of 'panic vs control' inspired a stark contrast between dark and vibrant colors. The palette combines black, electric blue, and magenta to evoke feelings of intensity and disruption, while lime introduces a hint of unsettling brightness. The arrangement features greater density in the center, intensifying the 'chaos' as it radiates toward the edges, which represent 'control.' The zigzag pattern contrasts established order with fragmented placement, illustrating a tension between the two emotions. Broken pixels simulate imperfections, emphasizing the struggle inherent in finding balance.</desc>
