<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Convergence of Fire and Dust</title>
  <desc id="desc">This artwork captures the emotional tension of resilience versus fragility through a clash of warm and cool tones. The palette of hot coral and blood orange provides vibrant accents representing sparks of life, contrasted with the muted ash tones of dust pink and charcoal to embody restraint and memory. The stark contrast features a central disruption, symbolizing the inevitable conflict between the two emotional extremes, while maintaining a quiet field of hollow blue that creates negative space, enhancing contemplation. The overall flow pulls from the center diagonally, echoing the 'stair step' shape seed through dynamic color placement.</desc>
