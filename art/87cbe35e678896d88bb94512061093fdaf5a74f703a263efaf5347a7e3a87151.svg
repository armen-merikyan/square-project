<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Struggle of Essence</title>
  <desc id="desc">The emotional tone contrasts panic and control. The palette of dark maroon, gray, and vibrant pink serves to highlight tension, where the pink represents the vibrant energy of panic and dark maroon embodies the heavy grip of control. The pattern features broken dots in the top half and target shapes in the bottom, representing the chaotic bursts of anxiety against a structured, calm foundation. The structure shifts from clearer shapes to a more chaotic composition, suggesting the ebb and flow between emotional states. The interplay creates a strong visual jerk between the light and dark, encapsulating a sense of struggle.</desc>
