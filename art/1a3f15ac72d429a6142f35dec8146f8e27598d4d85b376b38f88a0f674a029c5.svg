<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict Unbound</title>
  <desc id="desc">This composition explores the emotional tension between desire and restraint, using a palette that symbolizes hunger and control. The bright red_oxide is juxtaposed against muted_cream and iron_gray, representing saturated versus contained feelings. The main collision occurs centrally, where the broken dots of saturated colors display an outward push against the ring patterns of muted ones, creating an intense visual dialogue of overflow versus containment. This layout resembles an island surrounded by a sea of quiet, leaving intentional spaces that emphasize restraint amidst desire.</desc>
