<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Duality</title>
  <desc id="desc">This artwork captures the tension between fear and hope through a contrasting palette of dark hues and soft light. The composition features a gradient of colors that flow downward, resembling drips of emotion. The use of black and dark violet illustrates fear, with sharp edges embodying uncertainty. In contrast, soft gold and pale green introduce a hopeful element, creating a dynamic where the two emotions collide and coexist. Broken pixels introduce imperfection, emphasizing the struggle and resilience encapsulated within the theme of inside versus outside, encapsulated in the tight center-heavy layout.</desc>
