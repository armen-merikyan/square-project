<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center Against Edges</title>
  <desc id="desc">This artwork explores the tension between vulnerability and strength through an 8x8 structure. The palette 'gratitude_envy' blends deep olive and ripe green to evoke stability and growth, contrasted with honey gold as a soft interruption that indicates vulnerability. The negative cross creates a dense island of color at the center, surrounded by quieter hues that echo a sense of openness, while broken pixels simulate scars of experience. The collision occurs at the center, where intensity meets softness, emphasizing the push-pull of the emotional landscape.</desc>
