<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Shadow</title>
  <desc id="desc">The emotional tone of this piece reflects the struggle between joy and grief, utilizing a palette that juxtaposes warm tones of bright yellow and orange against cooler, muted blues and purples. The outer edges signify grief with denser, darker colors, while the inner area bursts with sparks of yellow and patterns of broken dots symbolizing joy. The arrangement reflects a horizontal split, creating a wave-like movement that contrasts quiet moments with bursts of activity. The application of broken pixels introduces a sense of imperfection, echoing the raw tension of the emotional experience conveyed through the seed.</desc>
