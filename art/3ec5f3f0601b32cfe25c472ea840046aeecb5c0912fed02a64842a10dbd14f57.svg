<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece explores the emotional tension between vulnerability and strength. The palette, featuring deep navy and dim cyan, reflects a lonely yet stable atmosphere, invoking a sense of both protection and exposure. The main contrast occurs at the center, where pale colors indicate vulnerability just behind the darker, protecting borders. The stripes (strength) collide with fault lines (vulnerability), creating a visually complex narrative that mirrors the emotional conflicts described in the seed. The layout emphasizes horizontal and vertical movements, capturing the tension of crossing currents within an 8x8 grid.</desc>
