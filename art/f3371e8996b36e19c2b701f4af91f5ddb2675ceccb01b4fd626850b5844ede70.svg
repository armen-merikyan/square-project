<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Signal vs Noise</title>
  <desc id="desc">This piece captures the emotional conflict between restlessness and peace. The palette of off-white, dust gray, compressed red, dark navy, and faint peach was chosen to reflect tranquility interspersed with vibrant interruptions. The dominant dark navy represents the calm dominating over the scattered elements of compressed red, which symbolizes restlessness. The pattern juxtaposes steady rows of the peaceful colors against stuttered blocks of the restless ones, creating a diagonal dynamic that suggests motion and memory. The juxtaposition conveys the tension of trying to retain peace amidst the noise and chaos, with broken pixels adding a layer of intentional imperfection, reminiscent of the disruptions in memory and perception.</desc>
