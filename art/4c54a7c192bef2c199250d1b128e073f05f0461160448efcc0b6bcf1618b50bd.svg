<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Awakening and Desolation</title>
  <desc id="desc">This composition evokes the emotional dichotomy of envy and gratitude, represented through contrasting textures and colors. The left side, embodying envy, uses a radial pattern of deep blue and muted purple, suggesting a calm but dense pressure, while the right side, representing gratitude, employs broken dots in warm yellows and oranges to create brightness against an underlying darkness. The overall flow is diagonal, suggesting forward motion and tension as if moving inward from the edges towards a core of human emotion. This layering emphasizes a conflict between hope and despair, with jagged edges enhancing the sense of brokenness. There’s at least 10% negative space to suggest emptiness and reflection, keeping the piece open to interpretation without literal representation.</desc>
