  <title id="title">Tension in Symmetry</title>
  <desc id="desc">This composition conveys the emotional tension between joy and grief through a palette of bright yellows contrasting muted blues. The center is filled with a diamond shape in yellow, symbolizing joy, while surrounding elements create a 'split screen' effect with striped patterns of deep blue to represent grief. The contrast is strongest along the edges, evoking a sense of collision between weight and lightness. The layout is intentionally asymmetrical to reflect heartbreak and betrayal, where symmetry meets disruption.</desc>
