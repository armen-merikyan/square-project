<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fragile Resilience</title>
  <desc id="desc">The emotional tone reflects a tension between strength and vulnerability, envisioned through the collision of radial and flame patterns. The palette of powder pink, warm white, carbon black, steel gray, and sharp crimson represents softness contrasted with severity, where warm shades suggest exposure and cold colors denote strength. The main contrast occurs centrally, where the heavy radial elements vie for dominance against the delicate flames sweeping outwards, embodying the struggle of resilience amidst fragility. Broken pixels disrupt the symmetry, reinforcing the theme of imperfections in safety.</desc>
