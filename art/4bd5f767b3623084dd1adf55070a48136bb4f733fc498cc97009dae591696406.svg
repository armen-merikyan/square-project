<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension &amp; Release</title>
  <desc id="desc">This artwork explores the emotional duality between envy and gratitude through opposing color placements and patterns. The palette of burnt orange, dark red, charcoal, and gold symbolizes both warmth and intensity, reflecting the undercurrents of these emotions. The layout features a significant amount of negative space suggesting an empty room, which amplifies the tension felt towards the conflicting emotions. Envy is represented through a maze-like pattern in dark red, while gratitude flows outward in a ring pattern with burnt orange accents, creating a vivid contrast. The soft edges throughout allow for a blending of feelings, while a few broken pixels introduce an element of imperfection, emblematic of disruption. The noise against cracks signifies moments of interruption, enhancing the layers of thoughtfulness and density in the piece.</desc>
