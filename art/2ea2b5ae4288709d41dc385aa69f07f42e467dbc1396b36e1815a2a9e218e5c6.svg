<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">The emotional tone revolves around a juxtaposition of quiet and pressure, conveyed through dense clusters of dark colors that give way to softer tones. The palette features off-white and faint peach lending a sense of calm, contrasting sharply against the darker hues of compressed red and dark navy, representing pressure. The composition utilizes a symmetric layout eroded at the edges, symbolizing a shift from clarity to confusion, with intentional disruptions (broken pixels) creating a fragmented narrative reflecting the struggle between firmness and softness. The main collision of contrast occurs diagonally, enhancing the narrative of tension erupting in gentle invitations to pause.</desc>
