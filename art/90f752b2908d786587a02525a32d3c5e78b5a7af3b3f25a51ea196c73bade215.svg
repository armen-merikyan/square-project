<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Motion</title>
  <desc id="desc">The emotional tone of this artwork captures the interplay between longing and resolve. The selected palette, 'signal_noise', combines cool tones like dead_black and electric_blue with warm accents of hot_magenta and signal_green, creating a dynamic tension. The main contrast occurs in the center where the maze-like pattern of resolve collides with the jagged teeth pattern of longing. Broken pixels introduce imperfections that mimic the theme of repair versus damage, while a quiet field of static_gray surrounds these denser clusters, creating a sense of separation. This reflects the emotional weight of yearning amidst a landscape of calm determination, showcasing the push and pull of emotions in abstract form.</desc>
