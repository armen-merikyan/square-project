<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Light and Weight</title>
  <desc id="desc">This piece captures the emotional duality of joy and grief through contrasting color palettes: bright yellows and oranges symbolize joy, while deep blues and muted purples evoke grief. The layout's vertical rise suggests an uplifting hope against the heaviness of grief, with crosshatch patterns representing fragmented feelings in the darker shades and rain-like marks in the vibrant colors. The central contrast happens in the middle rows, where the density of dark hues collides with scattered bright pixels, creating movement and tension.</desc>
