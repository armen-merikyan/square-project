<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition explores the tension between desire (represented by warmer, more saturated colors) and emptiness (illustrated by muted tones and spacious areas). The chosen palette—hot coral, blood orange, dust pink—conveys a warm pull, while charcoal and hollow blue embody the sense of distance and containment. The diagonal layout suggests a rising signal, with colors ascending towards a locked boundary at the top. The collision occurs where the warm desires meet the cool emptiness, disrupting the typical flow of expectation; the use of broken pixels adds imperfection which enhances the feeling of disruption and tension. Overall, this abstract pattern reflects the core emotional conflict of yearning for expansion while being restrained.</desc>
