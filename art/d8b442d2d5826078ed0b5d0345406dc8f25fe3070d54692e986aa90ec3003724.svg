<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">This artwork embodies the emotional tension between softness and severity. The palette features soft tones like powder pink and warm white juxtaposed against sharp crimson and deep carbon black, reflecting the struggle between gentle and harsh feelings. The design is structured into two distinct patterns: the 'ash field' of softness fills the left side, while the 'braid' of severity dominates the right, creating a visual argument. Broken pixels simulate imperfection and disruption, enhancing the chaotic feeling. The center serves as a collision point where these contrasting patterns interact, exemplifying the narrative of conflict and resolution within the emotional landscape.</desc>
