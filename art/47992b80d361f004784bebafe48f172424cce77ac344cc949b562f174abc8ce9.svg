<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">This piece explores the emotional duality of joy and grief, visually represented through color and layout. The top half employs a radial pattern using warm yellows and oranges to convey joy’s spark and openness, while the bottom half adopts a more fragmented 'stairs' style in deep blue and muted purple to express the heaviness of grief. The stark contrast between the two halves embodies the tension and conflict described in the seed. Juxtaposed colored pixels, particularly in the intersection, create a collision of mood, reflecting on the bittersweet nature of love and betrayal with an intentional imbalance, emphasizing the left-weighted chaos while maintaining visual harmony.</desc>
