<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Hearts</title>
  <desc id="desc">This composition evokes the emotional tension between love and betrayal through the juxtaposition of warm and cool colors. The palette combines soft pinks and reds signifying warmth and love, contrasted with dark maroon and gray representing betrayal’s cold grip. The layout employs a framed core, where the vibrant patterns of dots symbolize the joy of love and the maze-like patterns represent the complexity and deceit of betrayal. The broken edges suggest imperfections in relationships, creating an unresolved tension. The arrangement balances empty spaces, mirroring the 'empty room' concept while emphasizing the collision of emotions throughout the piece.</desc>
