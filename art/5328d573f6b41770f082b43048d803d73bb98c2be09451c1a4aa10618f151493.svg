<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Fractured Harmony</title>
  <desc id="desc">This composition explores the emotional duality of joy and grief through an interplay of colors that encapsulate brightness and heaviness. The left side features vibrant yellows and oranges, representing joy, arranged in a wave-like pattern suggesting an uplifting energy. The right side, in deep blues and muted purples, resonating with grief, plays with vertical stripes to create a sense of heaviness. The contrasting colors collide at the center, symbolizing the juxtaposition of these emotions and creating a visual tension that reflects the complexity of human experience. Broken pixels introduce imperfection, echoing the fragility of emotions, while negative spaces invite contemplation.</desc>
