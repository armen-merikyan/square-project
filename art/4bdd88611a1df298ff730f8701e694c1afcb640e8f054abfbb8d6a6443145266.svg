<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Erosion of Balance</title>
  <desc id="desc">The emotional tone of this artwork captures the tension between longing and resolve. The palette, featuring off white, dust gray, compressed red, dark navy, and faint peach, creates a subtle interplay between warmth and coolness. The dominant dark navy evokes a sense of firmness and stability (resolve), while faint peach and compressed red introduce feelings of yearning and intimacy (longing). The main collision occurs in the center, where a cluster of compressed red intersects with the quiet, expansive space of off white, representing a battle between chaos (longing) and order (resolve). This arrangement, along with the broken pixel disruptions, visually narrates the descent into emotional complexity, highlighting the delicate balance upheld by the contrasting colors.</desc>
