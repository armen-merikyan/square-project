<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece embodies the emotional tension between vulnerability and strength through its color choices and layout. The palette includes soft greens and browns to represent both shelter and exposure, with cold whites lending a feeling of openness. The main collision occurs in the center, where a dense pattern of warm colors (representing strength) interrupts a narrow path of cooler tones (representing vulnerability). The broken pixels scattered throughout create intentional disruptions, echoing the theme of imperfection within this emotional landscape.</desc>
