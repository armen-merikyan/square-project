<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Yearning</title>
  <desc id="desc">The emotional tone of this artwork captures the tension between emptiness and desire, represented through a color palette that juxtaposes dark navy and cool dim cyan against lighter accents. The flow moves from top to bottom, suggesting an upward yearning contrasted by elements that pull down, representing frustration. The choice of the crosshatch and ring patterns creates a dynamic interplay: the desire seeks upward and outward, while the ring implies a return to a center of emptiness. This collision is emphasized by unequal density and burnt edges, introducing a raw, imperfect quality that embodies longing. Negative spaces are utilized to maintain a sense of isolation and quiet, heightening the overall emotional narrative.</desc>
