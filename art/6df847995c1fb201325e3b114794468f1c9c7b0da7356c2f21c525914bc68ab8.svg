<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Stripes of Tension</title>
  <desc id="desc">The piece explores the tension between panic and control through radial patterns emanating from the center, using contrasting colors to evoke emotional volatility. The palette reflects muted warmth with sepia and tan clashing against cool dust gray and faded blue, representing the push and pull between engulfing chaos and structured calm. Main contrasts occur where the darker colors meet the lighter ones, creating a physical sensation of collision and disruption. The seed's directive of 'outside inward' inspires the patterned layers, with echoes of the deeper emotional conflict at the center.</desc>
