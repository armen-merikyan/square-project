<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoed Vulnerability</title>
  <desc id="desc">This artwork captures the emotional tension between the concepts of safety and exposure. The chosen palette of soft green, warm brown, and cool whites draws attention to contrasts—where the warmth signifies protection and the whites signify openness. The central pale skin color forms a 'vessel' of vulnerability, surrounded by stronger shades symbolizing the weight of safety, creating a sense of pulsing tension. The most significant collision occurs in the central region, where the delicate colors of exposure meet the denser colors of safety, fostering a feeling of both comfort and anxiety, influenced by the seed's qualities of thinness and heaviness.</desc>
