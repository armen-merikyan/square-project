<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order and Disruption</title>
  <desc id="desc">This artwork explores the emotional tension between trust and suspicion through contrasting patterns of lines and crosshatches. The palette emphasizes warmth with hot coral and blood orange, suggesting a sense of urgency and closeness, while charcoal and hollow blue introduce a shadowy depth symbolizing caution and weight of suspicion. The layout features a negative-space path that cuts through layers of dense color, accentuating the feeling of an unsteady balance between openness and watchfulness. The dominant pattern is stripes, representing trust, interrupted by sporadic crosshatches of suspicion, displaying the collision of these emotions. This dynamic is captured in the upper left quadrant where denser colors of suspicion interrupt the lighter, open areas, evoking a story of fluctuating perceptions.</desc>
