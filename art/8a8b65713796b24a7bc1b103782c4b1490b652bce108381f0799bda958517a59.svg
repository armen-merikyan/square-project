<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This composition encapsulates the emotional tension between defiance and submission, reflected by the bold checker pattern in the center representing defiance, clashing with softer scar patterns at the edges symbolizing submission. The palette of clean white, ice blue, ink black, violet gray, and warning orange facilitates vibrant contrasts and echoes of disturbance. The main collision occurs at the center, where the dark colors interrupt the lighter fields. Negative spaces are preserved to allow breathing room amidst the tension, reflecting the tension between chaos (core) and softness (edges). The emotion pair is skillfully rendered through overlapping patterns, suggesting a spiraling inward struggle.</desc>
