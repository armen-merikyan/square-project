<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Embers of Tension</title>
  <desc id="desc">This composition embodies the struggle between spark and ash, captured through a palette of warm corals and cool charcoals. The hot coral and blood orange represent sudden sparks of energy and agitation, while the dusty pink and charcoal evoke the settling, muted tones of ashes. The main collision of colors is found in the center, where bright ripples of orange clash with deeper, ashy tones—conveying a palpable tension of resilience against fragility. The upward flow suggests the striving for light, while broken pixels and an uneven distribution enhance the emotional weight and complexity of the piece.</desc>
