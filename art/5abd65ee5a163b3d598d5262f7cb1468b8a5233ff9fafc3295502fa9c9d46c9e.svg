<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Emotion</title>
  <desc id="desc">This piece explores the emotional tension between tenderness and rage through color and texture. The palette mixes saturated reds to express rage and muted pale blues to embody tenderness. The dense collection of darker hues in the top-left corner contrasts with the lighter colors diffusing across the grid, emphasizing a chaotic overflow that softens into calmness. This layout symbolizes the inner conflict of emotions, with the pixel bleed representing unresolved feelings. The fragmented quality of the pixels introduces the idea of disruption, embodying guilt and forgiveness as conflicting yet essential forces.</desc>
