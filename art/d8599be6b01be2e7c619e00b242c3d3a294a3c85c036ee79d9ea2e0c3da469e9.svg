<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tides of Emotion</title>
  <desc id="desc">This composition captures the ongoing struggle between certainty and curiosity through a split horizontal layout. The top half, embodying certainty, is composed of solid earthy tones like moss green and bone white, creating a sense of stability and order. These colors mirror the clarity and defined paths of structured thought. The bottom half, representing curiosity, introduces rust and stone gray in an undulating tide pattern, signifying dynamic exploration and uncharted territories. The collision occurs centrally, where the sharp, straight lines of the upper section begin to erode into the more fluid and chaotic forms below. The palette emphasizes resilience and fragility, balancing calmness with tension as colors interact and disrupt. Broken pixels sporadically punctuate both sections to signify imperfections in the emotional landscape, echoing the concept of evolving ideas amidst a backdrop of static.</desc>
