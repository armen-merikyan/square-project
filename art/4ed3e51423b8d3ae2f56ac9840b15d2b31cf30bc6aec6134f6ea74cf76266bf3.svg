  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This artwork captures the tension between vulnerability and protection. The palette, featuring soft greens and warm browns, reflects comfort and the safety aspect, contrasting sharply with the pale skin and cold white representing exposure. The distinct patterns, radial for safety and split-screen for exposure, clash diagonally, illustrating the collision of emotions. The light central area symbolizes an open experience while the darker edges frame and protect it, embodying the seed's exploration of safety through emotional pressure.</desc>
