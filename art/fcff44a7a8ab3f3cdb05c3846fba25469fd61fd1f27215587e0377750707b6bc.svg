<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Silent Collision</title>
  <desc id="desc">This composition channels the emotional tension between love and betrayal. The palette combines warm pink and red tones with muted gray and dark maroon to suggest a rich emotional landscape. The main contrast occurs in the vertical ascent from the bottom, where the warm colors wrestle with the softer, cooler elements, reflecting the inner turmoil of love versus betrayal. Sharp edges contrast soft, rounded placements, creating a rhythmic interruption that echoes the duality of the seed's themes. The placement of broken pixels introduces imperfection and uncertainty, resonating with the concept of love as a fragmented experience.</desc>
