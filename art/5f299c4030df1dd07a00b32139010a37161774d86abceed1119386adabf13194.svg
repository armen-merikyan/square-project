<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonance of Tension</title>
  <desc id="desc">The emotional tone centers on the duality of vulnerability and strength, conveyed through a split layout where the left half embodies softness and exposure, while the right half displays hard edges and resilience. The palette, consisting of mourning black, deep blue, new leaf, pale yellow, and stone, captures a spectrum of deep emotions reflecting both sorrow and renewal. The collision occurs at the vertical divide in the center, where dark, muted colors interplay with vibrant accents, suggesting tension and conflict between vulnerability and strength. The choice of patterns—'hinge' for vulnerability and 'shatter' for strength—enhances this idea through overlap and disruption.</desc>
