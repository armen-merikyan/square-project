<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Threads</title>
  <desc id="desc">This piece embodies the emotional dichotomy between longing and resolve. The left side, representing longing, is composed of warmer, more muted tones (rose_clay and warm_shadow) that suggest a gentle, stretching pull towards connection, while the right side, embodying resolve, uses cooler tones (cool_blue and distant_lilac) that offer a sense of stability. Broken pixels scattered throughout create a sense of imperfection and nostalgia, reinforcing the longing for wholeness. The intersection near the center presents a rich contrast, where the tension between delicate, stacked patterns of desire meets the glitch-like interruptions of firm resolve, embodying the struggle of seeking balance and coherence amidst emotional chaos.</desc>
