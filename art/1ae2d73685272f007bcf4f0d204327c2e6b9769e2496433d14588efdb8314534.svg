<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Symmetry in Disarray</title>
  <desc id="desc">The emotional tone juxtaposes restlessness against peace, using color to illustrate their tension. The palette of warm oranges and yellows contrasts with deep blues and muted purples, emphasizing a shift from chaos to calm. The main collision occurs in the center, where dense, glitch-like patterns of muted purples intersect with broken dots of yellow. This embraces the idea of memory and motion, creating a path through edges of light and dark. The layout follows a pressure corner, with one side overfilled, reflecting the emotional upheaval that leads into spacious calm, maintaining visual interest while suggesting an abstract narrative.</desc>
