<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition reflects the emotional tension of desire battling against the walls of emptiness. A palette of hot coral and blood orange evokes warmth and yearning, while the cooler hues of charcoal and hollow blue introduce a stark contrast, symbolizing containment. The arrangement creates a disruption in the center where hues collide, representing the overflow of desire against a restrained frame. The use of broken pixels in a few corners suggests imperfections and emotional scars, while leaving significant negative space embodies the underlying sense of emptiness, maintaining an abstract rhythm.</desc>
