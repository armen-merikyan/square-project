  <title id="title">Light vs Weight</title>
  <desc id="desc">The emotional tone embodies a push and pull between relief and dread. The palette of lime, black, electric blue, and magenta represents the brightness of relief clashing against the heaviness of dread. The main contrast occurs on the central vertical axis, where light colors interact with dark, creating tension. The asymmetry of broken pixels reflects the seed’s themes of fracture and imbalance, evocative of an empty room filled with conflicting energies.</desc>
