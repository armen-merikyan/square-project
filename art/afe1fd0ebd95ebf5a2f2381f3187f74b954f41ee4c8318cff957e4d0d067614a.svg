  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone captures the dualities of safety and exposure. The palette combines warm browns and greens for a sense of shelter with cold whites and pale hues representing vulnerability. The primary collision occurs vertically, where the warm 'safe' hues transition into cooler tones, echoing a split between protected and exposed areas. The patterns of 'hinge' and 'braid' interact, creating an undulating flow that connotes tension and release, central to the theme of vessel and pressure.</desc>
