<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This composition captures the emotional interplay between longing and resolve through a palette inspired by mourning renewal. The deep blues and black convey a feeling of weight and depth, while pale yellow introduces a flicker of hope. The composition uses a spiral-pressure layout to create a dynamic tension between clustered colors and negative space—representing longing—and a static pattern for the resolve, establishing a contrast between movement and stillness. Broken pixels serve as intentional disruptions that reflect the chaotic pulse of emotional experiences. The main collision occurs around the center, symbolizing the core of this emotional struggle.</desc>
