<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger and Restraint</title>
  <desc id="desc">This composition embodies the emotional tension between desire and emptiness. The palette of hot coral, blood orange, and dust pink evoke warmth and hunger, while charcoal and hollow blue integrate cold restraint. The central collision occurs in the grid’s core, simulating the spiral pressure where saturated colors push against the edges, representing the conflict of overflow versus containment. The pattern intertwines flame-like warmth with stacked emptiness, creating visual disarray and a sense of overlapping that reflects rising signals clashing with boundaries. Broken pixels disrupt the structure, creating tension and imperfection, aligning with the emotional narrative of longing versus limitation.</desc>
