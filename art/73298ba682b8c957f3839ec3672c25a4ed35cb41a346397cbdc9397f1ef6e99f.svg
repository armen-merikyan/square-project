<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Tension</title>
  <desc id="desc">This piece explores the emotional dichotomy of rage and calm, using a palette of red for intensity and pale blue for tranquility. The contrast manifests through dense, jagged red pixels in the center, representing rage, clashing against the organized, spaced-out blue tones that signify calm. The layout emphasizes an overfilled center with quiet edges, where breaks in the pixelation symbolize fleeting moments of control amidst chaos. The interplay of these colors creates emotional turbulence while still maintaining an abstract structure, drawing on concepts from the seed to convey a sense of collision and containment.</desc>
