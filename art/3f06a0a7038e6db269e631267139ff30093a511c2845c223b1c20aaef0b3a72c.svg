<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order and Chaos</title>
  <desc id="desc">This piece explores the emotional tension between control and panic, utilizing a palette that juxtaposes deep blacks with bright whites to embody stark contrast. The top four rows feature a controlled checker pattern, while the bottom rows disrupt this order with chaotic sparks, symbolizing the unexpected collisions of emotion. The layout emphasizes the split between these two states, providing a visual narrative of pressure and release, where broken pixels introduce imperfection in the midst of structure. The contrast is most evident at the division between calm control and chaotic disruption, suggesting an ongoing struggle within the emotional landscape.</desc>
