<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger Meets Restraint</title>
  <desc id="desc">This piece captures the emotional tension between desire and emptiness through a saturated palette of warm corals and deep blues. The central pulse of warm colors signifies desire, blooming towards the edges, while hollow blues create a counterpoint of emptiness, represented in softer hues that dominate the surroundings. The collision of the two emotions is palpable where the warm tones meet the cool, representing the struggle between impulse and restraint. The broken pixels introduce deliberate disorder, capturing the imperfections of desire and longing, while the layout emphasizes the push and pull between opposing forces. Overall, the arrangement serves as an abstract narrative of yearning constrained by boundaries, embodying the tension of 'hunger vs restraint'.</desc>
