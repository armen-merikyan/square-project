<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposed Resilience</title>
  <desc id="desc">This composition embodies the emotional tension between vulnerability and strength. The palette, consisting of soft off-white and faint peach tones contrasted with darker navy and compressed red, reflects the fragile yet powerful interplay. The main collision of colors occurs at the center, where a pale interior is set against a halo-like border, emphasizing exposure and shelter. The juxtaposition of the ladder pattern symbolizing vulnerability against the halo of strength creates a visual rhythm that represents resilience amidst tension.</desc>
