<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Emotion</title>
  <desc id="desc">This piece captures the tension between joy and grief using a palette of muted purples and deep blues contrasted with vibrant yellows and oranges. The upper half embodies joy with bright dotted patterns representing openness and vitality, while the lower half reflects grief through darker, flame-like patterns, suggestive of struggle and inner turmoil. The collision happens where these two emotional states meet, creating a dynamic interplay that illustrates the complexity and duality of human feelings. The layout is mirrored but disrupted, with broken pixels contributing to an overall sense of imperfection and authenticity, signifying how joy and grief coexist yet diverge in unexpected ways.</desc>
