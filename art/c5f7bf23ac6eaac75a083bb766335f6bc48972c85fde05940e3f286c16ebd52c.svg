<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Eclipsed Tension</title>
  <desc id="desc">The emotional tone of this piece embodies the dichotomy between panic and control. The color palette is drawn from darks to lights, utilizing black for depth and confusion contrasts against bright whites and pale blues that signify hope and control. The collision occurs predominantly where the blacks meet the whites, creating a sharp tension within the central diamond shape. The pattern embodies the spark of control attempting to break through chaos, represented by the surrounding noise of darker shades, reflecting the overwhelming nature of the 'empty room' metaphor. This layout climbs upward, emphasizing an escape from panic, with the edges weighted to suggest a fighting struggle against imbalance and instability.</desc>
