<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise and Fall</title>
  <desc id="desc">This composition encapsulates an emotional struggle between tenderness and rage, featuring a palette of black, pale blue, white, and red. The black and red signify the explosive nature of rage, while the pale blue and white evoke a sense of calmness. The upward flow of the palette on one side clashes with the downward motifs shaped by broken pixels on the other, creating an emotional tension through visual interruption. The broken frame suggests a leak of emotions, allowing the vividness of rage to challenge the calmness of tenderness, resulting in a rich tapestry of experiences that resonate with peaks and valleys of emotional states.</desc>
