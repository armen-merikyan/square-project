<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Longing</title>
  <desc id="desc">This artwork embodies the emotional tension between desire and restraint. The selected palette of deep red oxide and muted cream highlights the warm pull associated with longing, while iron gray and blackened plum represent the containment of those emotions. The left half of the grid features vibrant, irregular 'islands' of warmth, while the right displays smoother, mirrored patterns of cool restraint, creating a stark contrast at the center, where both emotions clash. The presence of broken pixels introduces an accidental beauty that suggests imperfections within the struggle of these feelings.</desc>
