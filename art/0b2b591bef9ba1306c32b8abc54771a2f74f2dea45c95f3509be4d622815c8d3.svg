<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pressure and Release</title>
  <desc id="desc">This piece embodies the tension of relief versus dread through the juxtaposition of vibrant and muted colors. The color palette reflects this emotional duality: electric blue and lime suggest moments of relief and brightness, while black provides a grounding heaviness. Main contrasts occur where bright colors collide with darker spaces, symbolizing the ongoing struggle within the mind. The seed inspired an arrangement that creates a flowing movement downward, emulating the feeling of weight pressing down yet leaving spaces that lead to moments of release.</desc>
