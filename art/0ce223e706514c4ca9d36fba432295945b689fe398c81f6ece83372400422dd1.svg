<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece embodies the tension between desire and emptiness through contrasting color saturation and patterns. The outer edges in darker, muted shades create a faint perimeter that evokes a sense of emptiness. In contrast, the central 4x4 grid bursts with warmer, brighter colors to suggest an intense longing. The broken pixel placements add intentional disruptions to the structure, symbolizing the struggle between overflowing desire and the containment imposed by emptiness. The collision occurs at the center, where vibrant patterns meet the restrained outer edges, emphasizing the emotional dichotomy of hunger versus restraint.</desc>
