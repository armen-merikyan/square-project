<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Contrast</title>
  <desc id="desc">This composition embodies the emotional tension of joy infused with grief. The color palette of deep blue and muted purples contrasts sharply with bright yellows and oranges, representing joy. The upper half features a structured checker pattern for joy, while the lower half collapses into a stair-like pattern, symbolizing grief. The wave of color from left to right evokes a feeling of movement and an internal conflict between hope and sadness, while the sparse negative space amplifies the sense of loss and yearning.</desc>
