  <title id="title">Tension Between States</title>
  <desc id="desc">This artwork embodies the emotional interplay of longing and resolve through contrasting colors and patterns. The palette, derived from 'quiet_pressure,' comprises off-white, dust gray, compressed red, dark navy, and faint peach, embodying an interplay between warmth and coolness. The central collision occurs in the middle with dark navy and compressed red representing longing and resolve, while off-white and faint peach create a quiet field. The maze-like patterns of longing intermingle with the more defined hinge shapes of resolve, resulting in a dynamic visual tension. Broken pixels scattered throughout signify disruption and the fragmented nature of emotions.</desc>
