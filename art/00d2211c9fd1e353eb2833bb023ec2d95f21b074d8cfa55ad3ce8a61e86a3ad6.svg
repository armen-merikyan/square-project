  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This artwork conveys the emotional tension between vulnerability and strength through a contrasting palette of muted greens and a small vibrant cluster. The darker hues represent strength and stability, while hints of bright green signify vulnerability, caught in the center. The composition employs hard edges to emphasize the impact of the exposed center against a backdrop of dense colors, creating a visual echo of protection and exposure. The deliberate placement of broken pixels introduces imperfection, adding to the emotional complexity.</desc>
