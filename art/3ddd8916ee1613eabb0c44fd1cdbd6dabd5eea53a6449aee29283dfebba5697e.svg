<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Inside vs Outside</title>
  <desc id="desc">This artwork expresses the emotional tension between joy and grief. The bright and warm palette represents joy through shades of yellow and orange, while the muted purples and deep blue serve to echo the heaviness of grief. The layout focuses on a central point with surrounding patterns, embodying symmetry with breaks that represent the disruptions of life. The use of mazes (joy) and frames (grief) creates a dynamic flow where the bright pixels pulse against darker clusters, suggesting a narrative of conflict and resolution—an exploration of love and betrayal.</desc>
