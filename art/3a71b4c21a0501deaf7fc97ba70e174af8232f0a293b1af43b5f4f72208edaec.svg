<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Asymmetry</title>
  <desc id="desc">The emotional tone reflects the push and pull of love and betrayal, where warm colors suggest intimacy while the darker tones introduce an unsettling contrast. The palette combines soft pinks and reds with gray and dark maroon, representing warmth disrupted by betrayal. The main contrast emerges in the left side with muted love tones that illuminate, while the right introduces darker hues that suffocate the space, creating a rhythm of alternating density and empty spaces. Crosshatch patterns emerge through the arrangement, interspersed with broken pixels that introduce imperfection and echo the seed's themes of broken symmetry and tension.</desc>
