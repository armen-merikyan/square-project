<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Near vs Far</title>
  <desc id="desc">This abstract work embodies the tension between longing and resolve, utilizing a palette of soft colors like rain blue and muted plum to convey melancholy. The colors create a halo-like border, contrasting with the center's emptiness, symbolizing open space versus dense emotional tie. The main collision occurs in the center where light (representing longing) meets the surrounding shadows (representing resolve), emphasizing the continuous struggle between these emotional states.</desc>
