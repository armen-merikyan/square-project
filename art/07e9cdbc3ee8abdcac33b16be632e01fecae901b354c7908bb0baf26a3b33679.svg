<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Veil of Tension</title>
  <desc id="desc">The emotional tone oscillates between defiance and submission, where sharp contrasts define the work. The palette, dominated by deep reds and soft grays, encapsulates the passionate struggle yet inherent calmness of submission. The center of the piece features darker tones spiraling outward, creating an impression of pressure against the softer, enveloping edges, demonstrating a collision between hard, angular defiance and a yielding, subdued atmosphere. Broken pixels introduce intentional disruptions, enhancing the narrative of battle against enclosure.</desc>
