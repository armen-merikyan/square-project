<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This piece captures the emotional tension between desire and emptiness. The chosen palette combines warm tones of 'hot coral' and 'blood orange' to represent longing, contrasted against the muted depth of 'charcoal' and 'hollow blue' symbolizing emptiness. The dominant warm colors occupy the top left wedge, while cool tones push against it from the bottom right, creating a dynamic conflict. The broken pixels introduce intentional imperfections, reflecting the unresolved struggle between these emotions. The diagonal layout amplifies this tension, presenting a clear contrast of saturation and muted space, encapsulating the theme of confinement and yearning.</desc>
