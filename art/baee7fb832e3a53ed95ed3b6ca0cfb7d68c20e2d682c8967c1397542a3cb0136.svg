<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resistance</title>
  <desc id="desc">This composition explores the emotional tension between vulnerability and strength. The palette transitions from warm tones that embody strength, represented by the 'lamp_gold' and 'warm_shadow', to cooler shades indicating vulnerability, like 'cool_blue' and 'distant_lilac'. The main collision occurs at the center, where warmer hues intersect with cooler ones, signifying a struggle between exposure and shelter. The 'embers' pattern represents vulnerability as delicate threads interwoven with the robust 'echo' of stronger colors, reflecting the intimacy of human emotions amidst conflict. Broken pixels serve as disruptions, adding depth and unpredictability, amplifying the narrative of connection and alienation.</desc>
