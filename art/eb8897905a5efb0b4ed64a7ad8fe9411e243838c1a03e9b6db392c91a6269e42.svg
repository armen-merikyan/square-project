  <title id="title">Center vs Edges</title>
  <desc id="desc">This artwork reflects the emotional tension between control and surrender, utilizing a palette that balances vibrant and muted tones. The central area is densely packed with dark colors, symbolizing control, while the edges are softer and lighter, indicating surrender. The contrast is amplified by the collision of sharp, structured patterns in the center against the fluid, split-screen design at the edges, representing a struggle between containment and release. The broken pixels add deliberate imperfections, enhancing the theme of conflict.</desc>
