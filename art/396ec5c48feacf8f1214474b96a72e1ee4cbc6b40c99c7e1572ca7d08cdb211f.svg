<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension at the Crown</title>
  <desc id="desc">This piece explores the dichotomy of 'panic' and 'control' through visual tension between the dense, radial patterns and the smoother edges. Using a palette of lime, black, electric blue, and magenta, I create a vibrant clash at the center, filled with dynamic chaos. The deliberate spacing and strategic placement of broken pixels suggest imperfections that highlight the emotional unrest, while the outer edges maintain a sense of containment, representing control. The balance of light and dark invokes a rhythm of emotional pulse, underscoring the idea of the center being both shielded and under siege.</desc>
