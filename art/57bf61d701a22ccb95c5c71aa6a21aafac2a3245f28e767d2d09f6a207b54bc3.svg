<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This square embodies the emotional tension between defiance and submission, reflected in the contrast of dark, dense colors clashing with lighter, open spaces. The palette of moss green, bone white, rust, stone gray, and small gold gives a feeling of resilience, hinting at a struggle within. The arrangement emanates from the corner, channeling an inward spiral where bold colors intrude on lighter spaces. The collision occurs prominently in the center, symbolizing the battle between invasive defiance and receding calm, creating a visual echo of tension and release.</desc>
