<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This piece captures the tension between restlessness and peace using a palette of red, pale blue, white, and black, representing fiery passion against tranquil calm. The dynamic arrangement of colors is staggered diagonally, suggesting motion from chaos (bottom left) to quietude (top right). Warm reds are interspersed with cool pale blues, reflecting the interplay of memory and movement. The patches of color spill over their designated areas, embodying the conflict between containment and overflow. Light and dark contrasts emphasize areas of tension and release, with white providing moments of breathable space, creating a visual echo of restlessness.</desc>
