<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Tranquility</title>
  <desc id="desc">This composition captures the emotional struggle between restlessness and peace. The palette combines vibrant coral and blood orange with subdued charcoal and hollow blue, creating a contrast between hot, dynamic colors and cooler, calming ones. The pattern of broken dots flows through the grid, representing both memory and motion, while static serves to highlight moments of interruption. The central void is marked by a collision of colors, symbolizing the tension at the heart of the emotional experience, particularly in corners and edges, where peace attempts containment yet is frequently interrupted by warmth.</desc>
