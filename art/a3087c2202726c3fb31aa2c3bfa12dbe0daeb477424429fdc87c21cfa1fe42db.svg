<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This piece embodies the tension between dynamic burst and residual quiet, reflecting the emotional contrasts of spark versus ash. The palette merges warm ivories and deep reds with cooler grays, symbolizing the interplay of energy and restraint. The layout captures diagonal movement, symbolizing invasion, typically from a vibrant corner (spark) towards a muted center (ash), creating a story of resilience meeting fragility. The edge style of receding edges enhances the illusion of depth while still allowing for prominent negative space, resonating with the idea of exposure.</desc>
