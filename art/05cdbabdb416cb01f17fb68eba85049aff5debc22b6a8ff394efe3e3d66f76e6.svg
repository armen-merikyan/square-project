<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Tension</title>
  <desc id="desc">The artwork embodies the emotional juxtaposition of defiance and submission. The palette features deep blue and mourning black as dominant hues to represent the pressure and tension of defiance, while pale yellow and new leaf introduce soft notes of submission. The central pulse, where colors collide, signifies an emotional threshold marked by glitch-like interruptions and diagonal patterns that radiate outward, creating a sense of chaotic order. Broken pixels disrupt the flow, emphasizing the uneven borders, allowing viewers to perceive a quiet channel amidst dense emotional layers.</desc>
