<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The emotional tone encapsulates a battle between light (spark) and the heaviness of ash (restraint), creating a feeling of tension and contrast. The palette of deep reds, muted creams, and shades of gray reflects the themes of hunger and restraint. The main contrast occurs diagonally, where vibrant colors collide with darker tones, suggesting a struggle. The jagged edges and broken pixels symbolize imperfection and memory leakage. This resulted in a pattern that feels both fragmented and resilient, echoing the seed's duality.</desc>
