  <title id="title">Conflict of Saturation</title>
  <desc id="desc">This composition captures the emotional tension of desire and restraint through color and pattern. The warm tones, #FF6F61 (hot coral) and #FF3D00 (blood orange), create a saturated pulse of energy at the center, while the muted blues and grays represent containment. The arrangement mimics a stacked band layout, creating a wave of warmth that is periodically interrupted by cooler, restrained spaces, suggesting the dynamic interplay between yearning and holding back. The use of broken pixels introduces imperfections as memories of tension, while negative spaces enhance the overall emotional depth and narrative flow.</desc>
