<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">The emotional tone juxtaposes internal chaos against serene calmness. The palette shifts from the deep intensity of red to the cool comfort of pale blue and white, creating tension in the center where hot and cold collide. The center showcases a fiery ladder-like pattern representing rage, interrupted by the soothing, ring-like calm of blue which envelops the edges, embodying the feelings of containment amidst chaos. The arrangement captures the essence of the seed, visioning a conflict between an overflowing emotion and the effort to maintain serenity.</desc>
