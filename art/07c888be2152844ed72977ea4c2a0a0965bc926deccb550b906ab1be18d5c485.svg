  <title id="title">Tension of Emotion</title>
  <desc id="desc">This artwork encapsulates the duality of love and betrayal, utilizing a palette of pinks and deep reds to express warmth and conflict simultaneously. The juxtaposition of soft edges and broken patterns creates a sense of unresolved tension, where the right side is slightly more vibrant, symbolizing love, and the left side employs darker tones with fragmented patterns to evoke betrayal. The overall abstract layout allows for waves of emotional flow while maintaining negative space to represent emptiness and the haunting effects of broken trust.</desc>
