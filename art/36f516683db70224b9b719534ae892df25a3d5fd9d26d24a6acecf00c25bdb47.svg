<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resilience and Fragility</title>
  <desc id="desc">This pixel art composition captures the emotional contrast between "spark" and "ash," embodying themes of sudden brightness against quiet remnants. The palette features lime and electric blue as vibrant accents against a deep black backdrop, representing resilient energy confronting the softness of settled ash. The interplay of dense and quiet spaces creates a layered effect, where the black forms the base of ash, while the brighter colors evoke sparks of movement, creating a striking visual tension that embodies the themes of the seed. The edge style enhances flow from the left, creating a jagged rhythm that disrupts traditional symmetry, allowing for a visual representation of memory and erasure through broken pixels scattered throughout the grid.</desc>
