<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Shelter</title>
  <desc id="desc">The emotional tone navigates between the comfort of safety and the vulnerability of exposure. The color palette comprises soft greens and earth tones to suggest protection, with pale skin and cold white adding a sense of fragility and openness. The main contrast occurs in the central area, where green meets the pale background, symbolizing the delicate balance of shelter against the threat of exposure. This conflict is further emphasized by the thin vs. heavy patterns interacting across the grid, creating a visual echo that echoes the idea of a thin boundary engaged in a struggle for space. Broken pixels serve as intentional disruptions, mimicking the scars of emotional exposure while allowing for the presence of negative space to breathe through the composition.</desc>
