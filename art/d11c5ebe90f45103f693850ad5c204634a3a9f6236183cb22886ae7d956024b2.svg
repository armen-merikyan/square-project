<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Contrast of Tensions</title>
  <desc id="desc">The emotional tone blends moments of calm with sharp bursts of rage, represented through an interplay of dark and light colors. The chosen palette of black, pale blue, and white serves to amplify both ends of this spectrum, where black forms a dense foundation while pale blue and white provide bursts of light. The main collision is between the jagged, stripe-like patterns of rage in the black blocks and the smooth, maze-like calm in the pale blue, creating a constant push and pull across the canvas. This echoes the tensions suggested by the seed, individually expressive yet collectively forming a unified abstract pattern.</desc>
