<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Signals</title>
  <desc id="desc">In this composition, I explored the tension between clarity and distortion, reflecting the interplay of signal and noise. The contrasting palette of electric blue and static gray serves to highlight moments of pulse interrupted by chaos. The center pulse, represented by a checker pattern in bright colors, collides with a halo of muted tones in the corners, embodying the emotional conflict within the seed. The broken pixels symbolize disruptions in communication, reinforcing the thematic elements of memory versus erasure.</desc>
