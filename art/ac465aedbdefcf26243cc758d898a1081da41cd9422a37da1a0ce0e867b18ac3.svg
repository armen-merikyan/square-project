<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Opposing Currents</title>
  <desc id="desc">The emotional tone is a push and pull between softness and severity, reflected through the interplay of warm and cool colors. The palette combines gentle hues of powder pink and warm white with sharp crimson and carbon black to signify tension. The checker pattern representing severity collides with the staircase pattern of softness, creating a dynamic intersection in the center which acts as the focal point. The irregular placements of dark pixels introduce a sense of weight and disruption that embodies the struggle between guilt and forgiveness. Negative space is preserved to highlight the emotional contrasts and give room for contemplation.</desc>
