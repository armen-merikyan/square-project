<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Flicker &amp; Fade</title>
  <desc id="desc">This composition embodies the tension between 'spark' and 'ash'—vibrancy colliding with subdued warmth. The chosen palette features a stark contrast with bright flashes of sharp crimson against deeply muted shades of carbon black and steel gray, suggesting an emotional duel of energy and stillness. The layout presents a dense center that captures warmth with sharp accents of color, while surrounding spaces are quieter, creating a feeling of both hunger and restraint. The pattern is interrupted by intentional broken pixels, symbolizing the jagged edges of memory and erasure that haunt this emotional battle, illustrating resilience amidst fragility.</desc>
