<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Collision</title>
  <desc id="desc">This piece embodies the duality of envy and gratitude, with a stark contrast established by employing darker shades on the edges (representing envy) and vibrant colors in the center (symbolizing gratitude). The palette of lime, electric blue, magenta, and black creates a visual tension where warmth and coolness collide, suggesting a movement from the soft edges inward toward the brighter center. The jagged edges convey a feeling of disruption, while the negative space allows for a breath amidst emotional intensity. Broken pixels introduce an element of imperfection reflecting the nature of these emotions.</desc>
