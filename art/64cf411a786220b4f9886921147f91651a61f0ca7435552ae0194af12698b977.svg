<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">The artwork captures the struggle between defiance and submission, reflected through a bold palette and contrasting patterns. The checker pattern for defiance creates a structured chaos centrally, representing strength and resistance, while the thread pattern for submission weaves softly around it, embodying fragility and yielding. This interplay creates a visual tension where the warmer honey-gold and acid-green colors dominate the center, suggesting energy and urgency, while cooler olive and cream tones create quiet spaces at the edges. The slight imperfections in the grid symbolize the emotional scars of conflict.</desc>
