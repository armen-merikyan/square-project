<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Interference Pulse</title>
  <desc id="desc">The emotional tone oscillates between static noise and a crisp signal, illustrated through the contrast of dark and electric colors. The palette includes 'signal_green' for the pulse's clarity, bright 'hot_magenta' as an interference, and 'static_gray' to underscore the noise. The main collision occurs at the center, where the vibrant green clashes with the jagged magenta, creating a frenetic rhythm amidst the surrounding static shades. The structured chaos reflects the seed's themes of exposure versus shelter and memory versus erasure. Each color placement reflects a struggle for dominance between the signal and noise, embodying an abstract tension.</desc>
