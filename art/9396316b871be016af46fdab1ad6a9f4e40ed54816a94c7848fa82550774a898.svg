<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Static</title>
  <desc id="desc">The emotional tone is a struggle between clarity and confusion, embodying the idea of a bright signal striving for recognition amidst overwhelming noise. The palette, using deep navy and dim cyan, conveys a sense of isolation broken by accent colors of white and gray, emphasizing the pulse of communication against stark chaos. The main collision occurs between the regular checker pattern of the signal (top four rows) and the chaotic broken dots of the noise (bottom four rows), illustrating the constant battle between clarity and distortion, while leaving ample negative space to highlight moments of silence that punctuate the noise.</desc>
