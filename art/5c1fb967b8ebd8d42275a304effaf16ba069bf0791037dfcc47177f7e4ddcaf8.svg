<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Transition</title>
  <desc id="desc">The emotional tone here juxtaposes the fleeting vibrancy of sparks against the settled softness of ash. The palette of mourning black, deep blue, new leaf, pale yellow, and stone conveys an interplay between dark and light, intense emotion contrasted with subtlety. The dominant color is deep blue, embodying the ash's stillness, while the new leaf green serves as a weaker spark breaking through. The inner 4x4 grid conveys a contained chaos, marked by a jagged pattern that collides and interrupts the softer border, making the central contrast feel active and layered with memory, evoking resilience amidst fragility.</desc>
