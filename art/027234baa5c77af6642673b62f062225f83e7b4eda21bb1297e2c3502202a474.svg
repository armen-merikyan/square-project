<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow vs Containment</title>
  <desc id="desc">This composition reflects the emotional tension between rage and calm through a stark contrast in palette and pattern. The palette combines hot reds representing rage and cooler tones of pale blue and black embodying calm. The red constellations cut through layered bands of soft blue rain, creating an effect of interruption and overlap. The central collision occurs at the midsection of the grid, where the chaotic heat of the red pixels disrupts the otherwise tranquil blue field. This captures the essence of the seed, with elements of sound against silence and motion against stillness, embodying the journey of contained emotions overflowing into chaos.</desc>
