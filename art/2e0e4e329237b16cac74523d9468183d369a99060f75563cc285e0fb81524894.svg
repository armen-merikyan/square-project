<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow</title>
  <desc id="desc">This piece explores the contrast between nostalgia and progress through a split horizontal layout, with the top half representing nostalgia's warmth and the bottom half symbolizing the coolness of progress. The palette intertwines vibrant electric blue and magenta for emotional resonance, contrasted by deep blacks which signify weight and gravity. A maze-like pattern creates density in the top, while lighter spaces emerge below, portraying a transition from calm to chaotic suggestions of change. The arrangement conveys an emotional ebb and flow, punctuated by broken pixels that symbolize imperfection in both memory and advancement.</desc>
