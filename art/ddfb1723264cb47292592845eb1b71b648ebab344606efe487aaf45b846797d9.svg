<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure and Shelter</title>
  <desc id="desc">This composition embodies the tension between vulnerability and strength. The muted palette conveys quiet pressure, with 'off_white' and 'dust_gray' as fields of vulnerability contrasted by 'compressed_red' and 'dark_navy' representing strength. The center is frail, bathed in lighter hues, interrupted by strong, dark edges, depicting strength's encroachment. The collision emerges at the center, where contrasting patterns collide, inspiring a sense of conflict between openness and protection. The layout mirrors the described emotional currents, encapsulating the essence of exposure against shelter.</desc>
