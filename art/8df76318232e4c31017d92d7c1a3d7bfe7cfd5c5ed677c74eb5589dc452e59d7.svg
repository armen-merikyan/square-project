<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Resonance of Opposites</title>
  <desc id="desc">This composition explores the tension between restlessness and peace through the use of a muted palette characterized by storm gray and near black for restlessness, and softer colors like pale mint and soft sky for peace. The diagonal layout emphasizes the collision of these contrasting emotions, with the dark tones encroaching into the lighter areas, creating a dynamic visual argument. The presence of broken pixels disrupts the otherwise smooth areas, embodying the feeling of unresolved tension and fragmented memories. The overall flow radiates from the center, allowing an exploration of emotional conflict as one navigates from a calm center towards the chaotic edges.</desc>
