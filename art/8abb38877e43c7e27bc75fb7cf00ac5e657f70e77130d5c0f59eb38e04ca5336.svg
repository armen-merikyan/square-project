<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork illustrates the emotional tension between control and surrender through a palette of muted earth tones and punctuated accents. The moss green and stone gray dominate, suggesting contained pressure. In contrast, the small gold and rust serve as vibrant interruptions, symbolizing moments of release amidst confinement. The center is heavily filled, embodying an overfilled sensation, while the edges remain sparse, evoking a quiet yearning for expansion. The pattern reflects a hinge-like movement amidst the interplay of softer constellations, emphasizing the dynamic collision inherent in the seed.</desc>
