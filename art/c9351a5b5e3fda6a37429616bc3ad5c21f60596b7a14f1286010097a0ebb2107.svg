<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Repose</title>
  <desc id="desc">This artwork reflects the emotional tension between longing and resolve, distinct yet intertwined. The palette of soft hues juxtaposes warm white and powder pink with stark carbon black, representing the conflict between desire (softness) and strength (severity). The flow is zigzagging, embodying interruptions and echoes between the two emotions, while the scattered repair layout creates a sense of distance overcome by resolve. The collision occurs around the center, where denser clusters of black and crimson meet lighter fields, inviting the viewer into a visceral experience of yearning and the strength required for resolution. The broken pixels introduce intentional imperfection, hinting at vulnerability.</desc>
