<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition explores the tension between the vibrant warmth of desire and the muted confines of restraint. The palette includes saturated colors like hot coral and blood orange, representing desire, contrasted against softer tones like dust pink and charcoal, embodying restraint. The top four rows pulsate with energy through a checker pattern, while the bottom four rows utilize a target pattern with more quiet zones and interruptions, creating a visual dialogue between the two emotions. The collision occurs mainly in the center, symbolizing the struggle between expansion and containment.</desc>
