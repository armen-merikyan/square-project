<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflow and Containment</title>
  <desc id="desc">The emotional tone captures the tension between rage and tenderness, using a palette of saturated red, muted pale blue, and neutral white/black. The red provides an intense, dominating presence representing rage, while the pale blue and white offer a cooling counterbalance. The main contrast occurs in the center where crimson rings (representing rage) intersect the softer staircase pattern of pale blue, creating a visual collision. The design reflects the themes of inner turmoil and gentle protection, embodying the battle of emotions as the saturated colors push against the cooler ones, encapsulated within the larger muted space.</desc>
