<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Transcendence of Emotion</title>
  <desc id="desc">The emotional tone juxtaposes joy's brightness against grief's depth, using an asymmetric layout that mirrors while deliberately breaking symmetry to evoke tension. The palette of vibrant yellows and oranges symbolizes joy, contrasted by muted blues and purples representing grief. Main contrasts emerge in the central wave, with bright colors exuding energy interrupted by darker, somber tones, creating a pulse that moves through the piece, embodying the struggle between love and betrayal.</desc>
