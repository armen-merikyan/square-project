<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Contrast</title>
  <desc id="desc">The emotional tone reflects the duality of vulnerability and strength, using a palette of pale aqua and clear white to signify fragility and alarm red for intense moments. The main collision occurs diagonally with a negative space that emphasizes the contrast between the dense weight of dark colors and the lightness of quieter hues, creating a visual tension that resonates with the themes of exposure and shelter. The patterns disrupt the space, mimicking the feeling of an ember (shape seed) flickering against a backdrop of tumultuous emotions, embodying the balance between strength and vulnerability without literal representation.</desc>
