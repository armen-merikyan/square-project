  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone reflects a conflict between vulnerability and strength, manifesting in a palette that captures intimacy and distance. The selected colors of rose clay and distant lilac evoke warmth while maintaining a cool edge, embodying the tension between safety and exposure. The strong center is surrounded by softer rings and intersecting crosshatches that create a dynamic collision of overlapping shapes, suggesting the durability of strength in contrast to the delicate presence of vulnerability. Specifically, the broken frame layout leaves deliberate spaces for light, introducing a subtle flow of tension between the colors, enhancing both the emotional and visual complexity.</desc>
