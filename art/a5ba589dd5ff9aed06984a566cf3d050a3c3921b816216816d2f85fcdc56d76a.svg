<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension Between Shadows</title>
  <desc id="desc">This composition explores the emotional dichotomy of trust and suspicion. The dense center, featuring warm tones of burnt orange and gold, represents trust with a structured dot pattern, suggesting warmth and stability. In contrast, the surrounding shadows in dark red and charcoal invoke suspicion, using a crosshatch pattern that creates an uneasy, textured feeling. The borders struggle to contain the colors from spilling over, symbolizing the pressure between these emotions. The alternating placement of colors reflects moments of collision, while broken pixels add imperfections that provide an authenticity to the tension. The overall visual rhythm suggests a gradual fall, capturing the essence of resilience amidst fragility.</desc>
