<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Stillness</title>
  <desc id="desc">This composition captures the emotional struggle between restlessness and peace. The palette of bold black, soft pale blue, and sharp red evokes both tension and calm. The dark colors represent the weight of restlessness while the blue provides a soothing counterbalance. The main collision occurs centrally, where intense broken dot patterns in red clash with a smoother tide-like pattern in pale blue, suggesting a dialogue of motion against stillness. The closed corners create a sense of confinement, while the quiet channel layout introduces negative space, adding to the tension and contemplation invoked by the piece.</desc>
