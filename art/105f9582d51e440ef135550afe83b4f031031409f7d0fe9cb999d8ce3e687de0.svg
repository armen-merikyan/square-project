<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This composition embodies the emotional tension between defiance and submission, represented through contrasts of brightness and darkness. The palette combines cosmic indigo and deep teal to suggest space and weight, while the accents of star white and cold gold create moments of defiance against a backdrop of subdued void black. The center is illuminated, symbolizing a last light of hope or resistance emerging from deeper layers of darkness. The broken pixels introduce intentional imperfections that reflect interruptions and invasions, further enhancing the emotional narrative.</desc>
