<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict and Harmony</title>
  <desc id="desc">This piece embodies the emotional tension of defiance and submission through color juxtaposition and structural layout. A core palette of warm rose clay and cool blue evokes intimacy and distance, reflecting the battle between static presence and dynamic movement. The central area holds stronger, bolder colors symbolizing defiance, while the outer layers employ softer hues that suggest submission, creating a visual 'invasion' towards the center. The broken pixels introduce intentional imperfection, mirroring the chaos inherent in conflict. Overall, the layout's stacked bands provide a rhythm of density and emptiness, inviting contemplation on the nature of emotional struggles.</desc>
