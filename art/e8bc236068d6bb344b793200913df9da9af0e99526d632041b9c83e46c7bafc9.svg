<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone of this piece highlights the tension between strength and vulnerability, reflected in the contrast between the solid colors representing strength and the softer, muted colors representing vulnerability. The palette, with deep teal and cosmic indigo providing a rich structure, embraces the idea of strength, while delicate star white and cold gold embody the exposed, fragile aspects. The main collision occurs in the center of the square, where these colors overlap to suggest a dynamic interaction between protection and exposure. The layout opens the gate to incoming flow while leaving negative weight on the edges, mimicking a pulse of energy. The interplay between the ladder and stepwell patterns creates visual rhythm and depth, evoking the dual themes of pressure and release, leading to a larger emotional narrative.</desc>
