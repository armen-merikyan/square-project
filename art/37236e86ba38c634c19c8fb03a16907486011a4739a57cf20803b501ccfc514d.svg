<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Control and Panic</title>
  <desc id="desc">This artwork embodies the emotional dichotomy between panic and control through its contrasting color palette and placement. Utilizing deep blacks for control and pale blues to signify panic, the design echoes a tension where the central chaos contrasts sharply with the surrounding order. The intricate balance of broken pixels symbolizes imperfection within the structured framework, embodying the art's themes of 'rise_vs_fall'. The use of dense colors against larger areas of negative space invites a feeling of unresolved tension, echoing the central conflict of the seed.</desc>
