<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Ascendancy</title>
  <desc id="desc">This composition captures the emotional contrast between longing and resolve. The palette, which includes 'shelter_green' for its depth and warmth, 'warm_brown' for stability, 'pale_skin' for intimacy, 'cold_white' for distance, and 'open_blue' for hope, reflects the complexity of these emotions. The layout follows a rising signal, with darker colors at the bottom representing the weight of longing, gradually transitioning to lighter shades at the top symbolizing resolve. The main collision appears in the center, where the vibrant warm brown meets the cold white, creating a dynamic tension that embodies the push and pull of these feelings. The structured placement of the colors maintains readability while expressing the evolving narrative of struggle, aspiration, and resolution.</desc>
