<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order vs Chaos</title>
  <desc id="desc">The emotional tone captures the duality of spark and ash, representing vitality against decay. The palette of faded gold, pale mint, and storm gray embodies this tension, with faded gold highlighting the spark and ash juxtaposing cool mint against warm gold. The main collision happens diagonally, where clean patterns of soft sky intersperse with jagged edges of storm gray, illuminating the struggle between restraint and hunger. This results in an 8x8 grid that evokes feelings of tension, memory, and a fragile balance between existence and erasure.</desc>
