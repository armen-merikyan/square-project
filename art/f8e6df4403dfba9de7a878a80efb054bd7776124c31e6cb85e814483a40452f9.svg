<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Betrayal</title>
  <desc id="desc">This artwork captures the dichotomy of love and betrayal through contrasting colors and patterns. The chosen palette features shades of pink and red for the warmth of love, opposed by dark maroon and gray, hinting at the chill of betrayal. The placement creates an push-and-pull effect, symbolizing the anxiety of relational conflict. This piece embodies an almost symmetrical layout, disrupted by 'broken pixels', suggesting the fragile nature of intimacy, while the hard edges emphasize the stark clash between affection and deceit. The visual tension is realized through dense clusters of color, representing chaotic feelings, set against quieter spaces of emptiness as a metaphor for introspection and loss.</desc>
