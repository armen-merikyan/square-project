<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Tranquility</title>
  <desc id="desc">The emotional tone explores the duality of restlessness and peace. The palette consists of warm coral and soft amber suggesting warmth and comfort, contrasted with cold slate and blue-black to evoke a sense of turmoil. This creates a collision at the center of the composition where the brighter hues of peace struggle against the darker tones of restlessness, represented by thick edges of muted colors that almost encase the vibrant inner core. The interplay between light and dark captures the essence of movement and stillness, resonating with the themes of memory and motion, echoing the idea of vibrant yet constrained emotions. The arrangement emphasizes a visual tension where dynamic movements are constantly interrupted by defined borders, reflecting an abstract narrative of energetic restraint.</desc>
