<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Diagonal Tension</title>
  <desc id="desc">This artwork explores the emotional dichotomy of trust and suspicion through a careful arrangement of color and pattern. The palette combines serene hues of pale aqua and mist gray with sharp touches of alarm red and ink blue, emphasizing contrast and presenting a balance between calm and urgency. The split layout reflects a diagonal argument, with the softer colors representing trust occupying the lower part and the more intense shades of suspicion rising on the upper part. The patterns intersect, creating a dynamic collision in the center that draws the eye and evokes feelings of tension, pressure, and conflict. This abstract piece visually narrates the complexities of navigating trust and suspicion, echoing the seed's abstract qualities of pressure borders and the fragility of resilience.</desc>
