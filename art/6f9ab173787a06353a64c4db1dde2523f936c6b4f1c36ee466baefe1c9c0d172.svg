<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">This artwork embodies the emotional tension between joy and grief through a contrasting color palette. The bright yellows and oranges symbolize joy, while the deep blues and muted purples reflect grief. The layout begins in the bottom left corner, with joy colors cascading diagonally, interrupted by heavier grief tones. This creates a feeling of rising intensity, with the darker hues establishing a boundary, hinting at the struggle between the two emotions. The checker pattern of joy collides with the density of grief, creating a zigzag-like rhythm and visual weight across the square.</desc>
