<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotions</title>
  <desc id="desc">The emotional tone oscillates between warmth and coldness, embodying the conflict of love and betrayal. The palette of pinks, reds, and dark maroons evokes warmth and passion, contrasted by grays that signify betrayal and emptiness. The arrangement features soft, warm checker patterns representing love, interrupted by harsh, structured stair-like elements that embody betrayal. This collision creates tension within the square, mirroring the inner turmoil suggested by the seed. The hard edges at the periphery and soft colors at the center contribute to the feeling of protecting softness being encroached upon by hardness, reflecting a journey from intimacy to isolation.</desc>
