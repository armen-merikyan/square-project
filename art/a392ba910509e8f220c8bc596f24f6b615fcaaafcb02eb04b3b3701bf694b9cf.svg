<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Longing</title>
  <desc id="desc">This composition navigates the tension between longing and resolve, represented through a palette of warm and cool hues that evoke feelings of desire and emptiness. The primary collision occurs in the center, where the maze-like pattern of longing clashes with the echoing shapes of resolve, creating jagged edges that suggest both repair and damage. The broken pixels introduce a sense of imperfection, echoing the seed's themes of brokenness and connection. The negative space amplifies the sense of longing, as if reaching out into the void.</desc>
