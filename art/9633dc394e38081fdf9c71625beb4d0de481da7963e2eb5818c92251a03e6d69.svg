<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This composition conveys the emotional tone of tension between control and surrender. The chosen palette of sepia, tan, dust gray, and faded blue evokes a sense of introspection and nostalgia while suggesting a rising energy. The contrast is primarily found in the center of the square, where warmer hues collide with cooler ones, symbolizing overflowing emotions fighting against the barriers of restraint. Broken pixels introduce intentional disruptions to emphasize the conflict between control and surrender. The arrangement flows vertically, enhancing the narrative of an upward struggle towards freedom against a bound edge.</desc>
