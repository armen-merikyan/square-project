<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict in Motion</title>
  <desc id="desc">This abstract artwork embodies the emotional tension between defiance and submission through a central spiral of defiance resonating in electric blues and greens, contrasting against the surrounding submission in muted gray and black. The intense colors at the center symbolize resistance and strength, while the edge colors softly dissipate, representing an enclosing moderate space. The broken pixels introduce intentional disruptions, adding an element of chaos to the calm, echoing the theme of internal struggle. The overall flow moves outward, portraying defiance as a spreading energy.</desc>
