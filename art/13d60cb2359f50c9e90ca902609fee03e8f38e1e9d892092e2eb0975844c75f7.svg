<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Beneath the Surface</title>
  <desc id="desc">This piece captures the emotional tension between longing and resolve. The palette of muted purple and deep blue embodies a sense of melancholic depth, contrasted sharply with vibrant yellows and oranges that symbolize moments of clarity and hope. The outer border, representing longing, creates a framework of muted tones, while the inner 4x4 grid bursts with more vivid colors, signifying resolve. The collision occurs in the center, where the warm hues disrupt the cool serenity, illustrating an internal conflict. Broken pixels throughout serve as intentional disruptions, suggesting the ongoing struggles inherent in this emotional landscape.</desc>
