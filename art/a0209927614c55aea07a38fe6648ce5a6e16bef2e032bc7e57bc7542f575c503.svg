  <title id="title">Exposure and Shelter</title>
  <desc id="desc">The emotional tone reflects a juxtaposition of vulnerability and protection, manifesting in the palette that contrasts warm browns and greens representing shelter with cooler tones suggesting exposure. The dominant soft tones occupy the left, with punctuations of brighter colors on the right to signify incoming pressure. Echoing the vertical split, the arrangement employs scattered dots against a lattice pattern, embodying the concept of fragile connections amidst heavy weight. This results in a visual sensation of tension and release across the grid.</desc>
