  <title id="title">Dichotomy of Light and Weight</title>
  <desc id="desc">This artwork captures the emotional tension between fear and hope, utilizing a palette of dark violet, soft gold, and pale green against a base of black. The contrast centers on the left side, with intense dark colors signifying fear, while the right slowly reveals lighter hues representing hope. The structure imitates a diagonal flow, encapsulating the concept of 'inside vs outside'. The patterns of jagged edges collide with smooth curves, representing inner turmoil versus external calm, while broken pixels enhance imperfection, embodying the rawness of emotion.</desc>
