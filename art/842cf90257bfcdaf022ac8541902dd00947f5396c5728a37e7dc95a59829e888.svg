<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Ebb and Flow of Emotion</title>
  <desc id="desc">This piece captures the emotional tension between fear and hope through a dense yet fragmented layout. The black and dark violet represent fear, creating a jagged boundary that constrains the softer tones of pale green and soft gold symbolizing hope. The dominant black pixels anchor a palpable weight, while the scattered bright pixels suggest moments of light and upward movement, embodying hope's resilience amidst overwhelming presence. An intentional broken pixel pattern signifies imperfection and ambiguity, echoing the fight between these conflicting emotions.</desc>
