<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Emotion</title>
  <desc id="desc">This piece embodies the complex interplay of joy and grief. The palette leans on bright yellow and orange to represent joy, while muted purple and deep blue convey grief, creating a resonant contrast. The layout mimics a mirror but is intentionally broken in the center, representing the unresolved tension between both emotions. The pattern shifts from a structured grid on the left to scattered, dot-like placements on the right, reflecting a pulse that is both coordinated and chaotic. This collision highlights both the joy of connection and the fragmentation of loss.</desc>
