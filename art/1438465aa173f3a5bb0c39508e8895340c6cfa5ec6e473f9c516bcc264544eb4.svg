<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Static Pulse</title>
  <desc id="desc">This artwork explores the tension between signal and noise through contrasting color arrangements. The palette, featuring 'signal green' and 'hot magenta', embodies the clarity of a single pulse in juxtaposition to the chaotic static of soft grays and blacks. The top half of the piece is dominated by the noise of dark blacks and grays, invoking interference and chaos, while the bottom half introduces bursts of vibrant colors in glitch patterns that break through the surface to suggest a clearer signal trying to emerge from the static. The collision occurs centrally, where soft edges of gray dissipate into sharp, glitching disruptions of green and magenta, symbolizing the struggle of clarity against overwhelming noise. Intentional broken pixels add a layer of imperfection that reflects the imperfections in communication. Negative spaces are left to prevent visual overcrowding, allowing the viewer to breathe within the density of color and pattern.</desc>
