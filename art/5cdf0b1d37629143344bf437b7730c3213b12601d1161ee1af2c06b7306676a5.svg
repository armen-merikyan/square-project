<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hollow vs Heavy</title>
  <desc id="desc">This composition captures the emotional tension between relief and dread, where the top left corner is intentionally overfilled with a dark mass to evoke feelings of dread, while the remainder of the square gradually lessens in density, introducing an airier, more relieved ambiance. The palette merges grim stormy grays with soft pastels, balancing dread with peaks of solace, while the broken pixels represent imperfections and disruptions in the emotional flow. The collision happens predominantly in the top-left where the dark colors clash with the lighter tones, manifesting the struggle between overwhelming pressure and gradual release.</desc>
