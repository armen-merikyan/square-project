<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension and Release</title>
  <desc id="desc">This piece captures the emotional tug-of-war between relief and dread. The palette—a mix of dark maroon, gray, and vibrant pinks—reflects this tension vividly. The dark colors dominate the composition, representing dread and heaviness, while splashes of pink offer moments of light and relief, akin to fleeting hope. The checker pattern evokes a sense of disruption and anxiety, creating interruptions amidst the relief that feels like a spark of joy. The placement of colors crafts a rhythm that pulsates between dark and bright, capturing both calmness amidst chaos and a structured yet broken symmetry.</desc>
