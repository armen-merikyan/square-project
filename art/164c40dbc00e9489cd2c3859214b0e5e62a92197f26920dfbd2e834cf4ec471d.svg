<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Shadows of Strength</title>
  <desc id="desc">This artwork captures the tension between vulnerability and strength by using a muted palette of sepia and faded blue tones, symbolizing the soft breaks of exposure against the structured crosshatch pattern of strength. The outer border, darker and deeper, represents strength, providing a frame that juxtaposes the fragile inner 4x4 of lighter colors depicted as soft, quiet fields. The central collision is felt as layers of emotion rise and fall, showing the nuanced balance between safety and insecurity. The intentional broken pixels suggest disruptions, aligning with the concept of vulnerability interrupting strength, creating a visual representation of their complex interrelationship.</desc>
