<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition embodies the emotional dichotomy of softness and severity, with a central core of lighter hues surrounded by darker, harsher tones. The palette consists of soft powder pink and warm white representing gentleness, contrasted by the sharp crimson and carbon black, invoking a strict severity. The interaction of texture—broken dots vs. teeth—creates visual tension, allowing the severe elements to penetrate the softer base, suggesting a conflict between protection and exposure. The inclusion of broken pixels scatters imperfection across the grid, further heightening the emotional intensity of the composition, while adhering to a falling pixel layout that evokes a sense of gravity and weight. The central collision occurs around the middle rows, where softness fights against severity, creating a dynamic interplay that reflects on the balance of guilt and forgiveness in the emotional narrative.</desc>
