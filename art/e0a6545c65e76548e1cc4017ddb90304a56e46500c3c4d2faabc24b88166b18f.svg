<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Between Longing and Resolve</title>
  <desc id="desc">This piece captures the emotional tension of longing and resolve through contrasting colors and patterns. The palette consists of dark violet, soft gold, pale green, and black, symbolizing the deep yearning (dark violet and black) against the light of resolved boundaries (soft gold and pale green). The pattern incorporates a patchwork of color clusters surrounded by a more subdued quiet field, aligning with the idea of hope surrounded by fear. The main collision occurs in the center with vibrant soft golds interrupting the deeper tones, lending an aura of clarity and light breaking into shadow, representing the journey from longing to resolve.</desc>
