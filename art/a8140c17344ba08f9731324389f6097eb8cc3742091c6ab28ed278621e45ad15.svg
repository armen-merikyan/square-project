  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">This artwork captures the tension between emptiness and desire through a color palette of warm tones against a backdrop of cooler, muted colors. The main contrast occurs at the center, where the saturated warm coral and blood orange pulse against the hollow blue and charcoal grid, symbolizing a locked tension fighting for release. The emotional tone straddles desire's warmth and emptiness's coolness with clear visual interruptions via broken pixels scattered throughout, suggesting both imperfection and depth within the narrative of containment.</desc>
