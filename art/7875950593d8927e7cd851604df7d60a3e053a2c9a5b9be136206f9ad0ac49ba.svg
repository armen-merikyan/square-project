<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Amidst Static</title>
  <desc id="desc">The emotional tone reflects a struggle between clarity and confusion—the vibrant signals (green, electric blue, hot magenta) represent hope and clarity, while the muted static gray and dead black embody chaos and noise. The contrast is pronounced at the center where bright colors break through the dark, mimicking a pulse trying to emerge from interference. This distinct collision centers the composition around the idea of persistent memory amidst erasure, echoing the seed's exploration of exposure and shelter in an abstract interplay.</desc>
