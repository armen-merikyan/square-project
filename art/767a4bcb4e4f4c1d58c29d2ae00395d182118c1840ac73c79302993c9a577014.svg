<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension in Shadows</title>
  <desc id="desc">This artwork embodies the emotional tension between trust and suspicion. The palette features deep blacks and dark violets to represent suspicion, while the soft gold and pale green evoke trust, creating a duality. The positioning of the darker colors dominates the upper left quadrant, suggesting an intrusion of suspicion into the otherwise warmer right side. The grid-like lattice pattern collides with diagonal stripes, highlighting the struggle between clarity and distortion. Broken pixels disrupt the flow, adding an element of imperfection, echoing the seed's theme of resilience and fragility amidst pressure.</desc>
