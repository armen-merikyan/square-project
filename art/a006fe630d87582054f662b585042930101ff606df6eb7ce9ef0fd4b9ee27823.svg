<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">The artwork explores the emotional tension between spark and ash, embodying resilience and fragility through a balanced palette of warm and cool hues. The colors, such as sepia and faded blue, represent the lingering contrast between vibrant sparks of potential against the muted tones of burnt remnants, suggesting the narrative of memory versus erasure. The main collision occurs diagonally from corner to corner, where the bright colors of potential rise against the soft, muted fields, inviting viewers to navigate through tension and calm. The broken pixels intentionally disrupt the flow, creating a sense of imperfection and reflection.</desc>
