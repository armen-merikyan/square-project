<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs. Restraint</title>
  <desc id="desc">This composition captures the emotional push and pull between desire and restraint. The palette leans heavily on deep, saturated tones with muted hints to reflect the tension—reds and plums represent desire, while creams and grays denote restraint. The main contrast occurs at the center, where the split-screen pattern of desire collides with the framing of restraint, suggesting a locked boundary that desires to break free. The rising signal layout emphasizes the upward struggle against a contained space, illustrating an abstract narrative of emotional conflict.</desc>
