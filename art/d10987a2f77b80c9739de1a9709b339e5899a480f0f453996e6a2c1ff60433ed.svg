<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Tension</title>
  <desc id="desc">This piece captures the emotional dichotomy of restlessness versus peace through a clear split layout. The left side reflects calmness with muted hues like soft sky and faded gold, while the right side evokes restlessness with storm gray and near black. The contrasting patterns of echo (peace) and static (restlessness) collide in the central band, amplifying tension. Broken pixels at the edges symbolize interruptions, creating a fractured yet cohesive story of memory and motion where light meets dark.</desc>
