<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoing Dissonance</title>
  <desc id="desc">The artwork captures the contrast of confusion and clarity through a split vertical layout, symbolizing the tension between these emotional states. The chosen palette of black, dark violet, soft gold, and pale green embodies a push-and-pull dynamic—black and violet represent confusion, fragmented edges, and chaos, while soft gold and pale green suggest clarity and hope. The broken dots pattern represents the chaotic noise clashing against the structured radial pattern of clarity, creating a visual pulse that echoes the concept of falling pixels against a backdrop of symmetry corrupted. This collision creates a feeling of dissonance, echoing the pull between chaos and order.</desc>
