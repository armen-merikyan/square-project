<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">This composition embodies the emotional tension between the concepts of safety and exposure. The palette features a blend of warm earthy colors and cool delicate shades, providing a contrast that captures both the weight of safety (warm brown and shelter green) and the lightness of exposure (pale skin and cold white). The left side showcases a 'flame' pattern representing safety through warmth, characterized by deep, enveloping colors. Conversely, the right features a 'flood' pattern symbolizing exposure, characterized by lighter, more open colors that invite a sense of air and vulnerability. The main collision occurs at the center, where the warm brown meets pale skin in a transition zone, emphasizing the struggle between protective enclosure and unguarded exposure. This creates a dynamic flow, particularly in the diagonal tension where different emotional states converge, making the overall design a narrative of balance and imbalance.</desc>
