<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Tides</title>
  <desc id="desc">This composition embodies the emotional duality of joy and grief by illustrating a stark contrast between light and dark, representing the push and pull of these feelings. The palette of bright yellows and oranges for joy, set against muted purples and deep blues for grief, highlights the weight of sorrow versus the uplifting nature of happiness. The joy section employs a crosshatch pattern, while the grief section is more fragmented to illustrate the feeling of brokenness. The central area has broken pixels to reflect imperfection, encouraging a sense of disruption in symmetry and balance, allowing the viewer to feel the emotional tension present in the piece.</desc>
