<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Rise vs Fall</title>
  <desc id="desc">This piece captures the emotional dichotomy of joy and grief through a mesh of color interactions and dynamic movements. The palette of yellow and orange symbolizes joy’s warmth and vibrancy, while deep blue and muted purple illustrate the depths of grief. The split layout introduces a tension where bright colors push upward against the darker tones which pull downwards, each seeking dominance. The ring patterns fragment the canvas, enforcing the theme of collision while the thin outlines of certain colors introduce a delicate structure amidst chaotic emotions. The broken pixels add imperfections, contributing to the layered narrative of emotional conflict.</desc>
