<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Overflowing Calm</title>
  <desc id="desc">The emotional tone reflects the struggle between restlessness and peace. The palette of dark violet and soft gold against black and pale green creates a contrast that hints at unease (restlessness) versus found moments of serenity (peace). The collision occurs at the center, where warmer colors overflow the cooler boundaries, embodying uncontrollable motion and urgency. The broken pixels enhance this tension, suggesting disruptions. The abstract pattern flows from dense conflict at the center to quieter edges, representing the internal tug-of-war between chaos and calm.</desc>
