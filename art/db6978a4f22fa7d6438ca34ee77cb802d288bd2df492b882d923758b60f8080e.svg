<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Collision of Tenderness and Rage</title>
  <desc id="desc">This composition embraces the emotional dichotomy of tenderness and rage, using a palette of red, pale blue, black, and white. The contrasting hues serve to represent the gentle pressure of tenderness against the aggressive saturation of rage. The central halo pattern, filled with muted blue, acts as a calm channel, while fiery red edges disrupt into the serenity, creating a dynamic collision. Broken pixels introduce intentional imperfections that reflect both guilt and forgiveness, evoking a sense of unresolved emotions. The overall balance allows tenderness to dominate while rage erupts around it, suggesting a constant interplay between these powerful feelings.</desc>
