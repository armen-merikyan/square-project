<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Weight of Contrast</title>
  <desc id="desc">The emotional tone is a balancing act between softness and severity, shadowed by the echoes of guilt and forgiveness. The palette combines powder pink and warm white to represent softness, contrasted with the sharp crimson and carbon black to embody severity. The collision occurs predominantly in the center, showcasing a dense pulse of emotion, while a narrow path of negative space traverses the grid, inviting the viewer to engage with both the soothing and intense. The interplay of 'islands' of soft colors against 'mirror'-like severity illustrates a constant dialogue of pressure and release, drawing on themes of memory and motion.</desc>
