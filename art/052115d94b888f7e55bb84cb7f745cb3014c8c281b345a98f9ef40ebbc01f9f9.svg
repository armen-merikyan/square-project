<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echo of Resilience</title>
  <desc id="desc">This piece captures the emotional tension between vulnerability and strength through the use of a cool palette interspersed with vibrant accents. The central radiating pattern represents vulnerability, while the firm, dark background conveys strength. The collision occurs in the center, where bright colors clash with the muted tones, illustrating the constant interplay of exposure against shelter. Broken pixels add unorthodox shapes, signifying the scars of experience, while leaving negative space highlights the essence of quiet amidst chaos.</desc>
