<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Hunger vs Restraint</title>
  <desc id="desc">The emotional tone reflects a push and pull between desire and emptiness, evidenced by the saturated colors against darker, more muted backgrounds. The palette features hot coral and blood orange as vibrant accents, representing the craving and longing. This contrasts sharply with charcoal and hollow blue, which embody the feeling of emptiness and restraint. The grid-like arrangement, combined with broken pixels, creates a sense of interrupted structure, suggesting both a desire to overflow and the weight of containment, enhancing the inner conflict. The collision occurs primarily in the central area, where vibrant colors abruptly meet the darker boundaries, reinforcing the struggle between these two emotions.</desc>
