<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Dissonance</title>
  <desc id="desc">This piece captures the emotional tension between loneliness and connection through contrasting warmth and darkness, suggesting a struggle between isolation and the longing for interaction. The chosen palette of burnt orange and dark red evokes a sense of internal heat amidst the charcoal void, while the layout creates a mirror effect with intentional breaks, symbolizing disrupted connections. The central 'hole' shape signifies absence surrounded by faint noise, emphasizing broken memories and the quiet yet pervasive feeling of solitude.</desc>
