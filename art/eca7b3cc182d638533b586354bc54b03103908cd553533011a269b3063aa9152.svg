<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Tension of Yearning</title>
  <desc id="desc">This artwork explores the emotional tug-of-war between desire and restraint, utilizing saturated colors like hot coral and blood orange to represent longing, while muted tones like charcoal and hollow blue symbolize the constraints of reality. The patterns collide in the center to express a tension; bright, wave-like tides of desire push against a structured patchwork of restraint. The negative spaces serve to accentuate the feeling of pressure held within the boundaries, highlighting the interplay of emotions that fracture and disrupt. The dark edges reinforce a sense of containment, contrasting sharply with the vibrant core of the composition.</desc>
