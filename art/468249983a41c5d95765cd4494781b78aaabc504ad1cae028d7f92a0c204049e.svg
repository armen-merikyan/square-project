<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Conflict of Order</title>
  <desc id="desc">This artwork embodies the emotional struggle between panic and control, represented through a radial pattern in the center that gradually meets the chaotic, target-like edges. The choice of a warm palette with burnt orange and dark red contrasts with the subdued charcoal background, symbolizing the intensity of panic battling against the steadiness of control. The pixel bleed effect introduces imperfection, emphasizing the fragility of this balance. The center is dense with color, creating a focal point of tension, while the edges diverge into subdued hues, allowing for grounding negative space, essential in capturing the essence of conflict.</desc>
