<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Order and Fracture</title>
  <desc id="desc">This piece explores the emotional tension between trust and suspicion through careful color placement and collision patterns. The palette predominantly features deep teal and cosmic indigo to evoke a calming sense of trust, contrasted with void black and cold gold, suggesting suspicion. The central area, reflecting the shape seed of 'stair_step', conveys resilience, while the outer edges imply fracture and uncertainty through broken pixels. The divided layout manifests a split-screen effect, with structured patterns on one side disrupted by chaotic islands on the opposite, ultimately embodying a complex relationship between order and chaos.</desc>
