<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Center vs Edges</title>
  <desc id="desc">This abstract work reflects the tension between rage and calm through color and pattern. The upper four rows represent calm, utilizing soft, pale blue tones that flow horizontally, symbolizing tranquility and balance. The lower four rows embody rage, with sharp red hues radiating diagonally, illustrating explosive emotions and creating a visual conflict with the calm above. The broken edges introduce an element of imperfection, representing cracks in the mirror of calmness. The central concentration of dark colors serves as an anchor, reinforcing the contrast of emotions and suggesting a center-heavy dynamic that pulls viewers' intent through the artwork. Negative space has been preserved to maintain balance and avoid overwhelming the senses, echoing the themes of pressure and release.</desc>
