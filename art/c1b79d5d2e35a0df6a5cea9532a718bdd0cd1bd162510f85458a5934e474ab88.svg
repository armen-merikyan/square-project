<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs. Shelter</title>
  <desc id="desc">This composition embodies the emotional tension between softness and severity. The palette features muted tones of powder pink and warm white contrasted with the starkness of carbon black and sharp crimson, creating a dialogue of warmth and cold intensity. The central collision occurs through the overlapping static and ripple patterns, where the softness of the pinks and whites blends into the harsh black and crimson, illustrating an open gate to incoming contrasts. The placement of colors forms shifts from calm to pressure while retaining a quiet field in the corners to suggest negative space. The broken pixels disrupt the otherwise structured layout, inviting the viewer to explore the imperfection inherent in the emotional experience, as represented by the juxtaposition of the gentle and the harsh.</desc>
