<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Trust</title>
  <desc id="desc">This piece embodies the emotional tension between trust and suspicion through a dualistic layout. The palette features muted tones like 'dust_gray' and 'faint_peach' to represent softness and warmth, contrasted with the harsh presence of 'dark_navy' and 'compressed_red' suggesting encroaching doubt. The central area symbolizes trust with its softer channel pattern, while the periphery embodies suspicion through a maze-like, fragmented structure. The broken pixels introduce intentional imperfections reflecting resilience amidst fragility, creating a visual echo of emotional conflict.</desc>
