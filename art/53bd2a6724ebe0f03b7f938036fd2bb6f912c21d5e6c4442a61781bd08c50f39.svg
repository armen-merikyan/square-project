<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Echoes of Resistance</title>
  <desc id="desc">The emotional tone of this artwork stems from a dance between strength and vulnerability, represented through a palette of cosmic indigo and void black contrasted by cold gold and star white. The central area reflects strength with framed patterns, while the edges convey vulnerability, strikingly cracked through broken pixels. The collision occurs toward the center, where the heavier colors intersect with lighter shades, evoking a sense of tension. This interplay between strong frames and crack patterns that interrupt creates a tapestry of emotion, mimicking the universe's chaos in the constellations that rise against an overwhelming tide.</desc>
