<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Threshold of Emotion</title>
  <desc id="desc">This artwork explores the emotional tension between safety and exposure, utilizing a split vertical layout. The chosen palette of muted shelter green and warm brown communicates security, while pale skin, cold white, and open blue introduce a sense of vulnerability. The main contrast occurs at the center where the entwining braid pattern meets dot clusters, symbolizing the clash between gentle safety and piercing exposure. The broken pixels serve as intentional scars, evoking a sense of fragile beauty amidst tension.</desc>
