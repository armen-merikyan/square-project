<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Exposure vs Shelter</title>
  <desc id="desc">The emotional tone contrasts vulnerability and strength. The palette features clean white and ice blue representing safety and lightness, while ink black and violet gray imply hidden weight and depth. The dominant colors create a sense of a soft break in the center surrounded by a darker, dense framework, reflecting the idea of incoming marks meeting shelter. The interaction between the pale center (vulnerability) and the heavier borders (strength) highlights the tension of exposure against protection. The broken pixels are distributed intentionally to symbolize the scars and imperfections in this emotional dialogue, delivering an abstract narrative of safety amidst exposure.</desc>
